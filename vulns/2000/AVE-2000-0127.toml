[basic]
description = "SSH 协议服务端 sshd 存在本地安全绕过漏洞。当系统配置为允许无交互式 shell 访问的本地用户登录时，sshd 未能正确限制此类用户的连接转发权限。攻击者（已拥有本地账户但无 shell 访问权限）可利用 sshd 的 TCP 连接转发功能，将连接重定向至使用系统标准密码数据库进行认证的本地服务（如 POP 或 FTP），从而绕过原本针对无 shell 用户访问限制的身份认证机制，以该用户身份访问受限服务。该漏洞影响使用 sshd 且启用 TCP 转发、并对部分本地用户禁用 shell 的 SSH 服务器部署环境，攻击前提为攻击者需先获得一个无 shell 权限的本地账户，CVSS 评分为 4.6，危害等级中等。"
published = "2000-02-11T05:00:00.000"
remediation = "升级到 SSH（OpenSSH/SSH Communications Security）2000年3月后发布的安全修复版本（如 OpenSSH 1.2.3p1 及以上，或对应厂商补丁）；在服务端 sshd_config 中禁用不安全的 TCP 转发（将 AllowTcpForwarding 设为 no），并限制无 shell 权限用户使用端口转发；同时关闭 POP/FTP 等服务对系统密码数据库的直接认证，改用独立认证机制作为缓解措施。"
score = 4.6
severity = "MEDIUM"
sources = ["cve"]
title = "OpenSSH SSH服务端 端口转发隧道认证绕过 本地权限提升漏洞"
updated = "2026-06-16T21:51:05.360"

