[basic]
description = "WebShield SMTP 4.5 邮件地址解析存在逻辑缺陷，当远程攻击者发送的邮件地址采用以句点（.）结尾的形式时，系统由于无法正确解析异常地址，导致进入无效循环状态，持续向自身发送邮件副本，造成邮件处理进程资源耗尽。攻击者可通过简单构造的异常邮件触发此漏洞，使目标系统无法正常接收处理邮件，导致服务完全中断。该漏洞影响早期Windows邮件服务器环境，并引发了后续SMTP安全补丁的制定。"
published = "2000-10-20T04:00:00.000"
remediation = "升级 Network Associates WebShield SMTP 至 4.5 以上版本，该漏洞已在后续版本中修复。如无法升级，可在邮件网关层配置规则过滤或剔除 From 地址末尾带句点 (.) 的邮件，并在 SMTP 服务器上设置邮件循环检测和最大投递次数限制，防止无限自循环导致拒绝服务。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Network Associates WebShield SMTP 4.5 邮件地址拒绝服务漏洞"
updated = "2026-06-16T21:52:22.790"

