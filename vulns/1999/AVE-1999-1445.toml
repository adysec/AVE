[basic]
description = "fte 软件包中的 fte-console 组件在处理虚拟控制台设备时未能正确释放 root 权限，存在权限提升漏洞。本地攻击者可利用该漏洞，通过虚拟控制台设备获取 root 权限，进而完全控制系统。该漏洞影响 fte 0.46b-4.1 之前版本，CVSS 评分 7.2，危害等级高。默认配置下存在风险，需要本地访问权限才能利用。"
published = "1998-12-07T05:00:00.000"
remediation = "升级 fte 软件包至 0.46b-4.1 或更高版本，该版本已修复 fte-console 未正确丢弃 root 权限的问题。如无法升级，可移除 fte-console 的 SUID 位（chmod u-s /usr/bin/fte-console）作为临时缓解措施。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "fte fte-console 本地权限提升漏洞"
updated = "2026-06-16T21:50:05.560"

