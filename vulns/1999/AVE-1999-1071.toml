[basic]
description = "Softarc FirstClass Internet Server 5.506 及更早版本中的 E-mail 客户端存在明文存储敏感信息的漏洞。服务器将用户账号和密码以明文形式保存在本地文件中，包括 5.506 版的 home.fc、3.5 版的 network.fc 以及启用日志时的 FCCLIENT.LOG 文件。本地攻击者若能访问这些文件，即可直接获取用户的凭证信息，进而冒充目标用户登录系统。该漏洞源于程序未对存储的敏感数据进行加密处理。"
published = "1999-08-30T04:00:00.000"
remediation = "升级 Softarc FirstClass Internet Server 至 5.506 以上版本。禁用调试日志功能以防止 FCCLIENT.LOG 记录明文凭据。通过文件系统 ACL 严格限制 home.fc、network.fc 和 FCCLIENT.LOG 的访问权限，仅允许必要系统账户读取。若厂商已停止支持，建议迁移至继续维护的邮件服务软件（如 Microsoft Exchange 或 Dovecot）以避免凭据泄露风险。"
score = 4.6
severity = "MEDIUM"
sources = ["cve"]
title = "Softarc FirstClass Internet Server 敏感信息明文存储漏洞"
updated = "2026-06-16T21:50:15.720"

