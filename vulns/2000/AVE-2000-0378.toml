[basic]
description = "Linux 系统 cdrecord 工具在处理 dev 参数时存在缓冲区溢出漏洞。本地攻击者可向 dev 参数传递特制字符串触发缓冲区溢出，从而获取 root 权限。该漏洞影响 Mandriva Linux Mandrake 7.0 及可能使用 cdrecord 的其他 Linux 发行版，CVSS 评分 7.2，危害等级高。攻击者需拥有本地系统访问权限，无需用户交互即可完成利用。"
published = "2000-05-29T04:00:00.000"
remediation = "升级 cdrtools 至 1.8a19 或更高版本，该版本修复了 cdrecord 的 dev 参数缓冲区溢出漏洞。如无法升级，限制本地用户对 cdrecord 的 SUID 执行权限：`chmod 0755 /usr/bin/cdrecord` 并移除 SUID 位 `chmod u-s /usr/bin/cdrecord`。"
score = 7.2
severity = "HIGH"
sources = ["exploitdb"]
title = "Mandriva Linux cdrecord 本地缓冲区溢出漏洞"
updated = "2026-06-16T21:51:46.153"

