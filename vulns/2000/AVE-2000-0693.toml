[basic]
description = "Microsoft IIS 5.0 的索引服务器（Index Server）存在配置缺陷漏洞。当启用了索引服务且目录设置了 Index 属性时，未经身份认证的远程攻击者可通过 WebDAV（Web Distributed Authoring and Versioning）搜索功能向目标服务器发送特制请求，从而列举 Web 根目录下的目录结构，导致服务器敏感信息泄露。该漏洞影响 Windows 2000 上运行的 IIS 5.0 版本，攻击者无需任何认证即可远程利用，危害等级中等，CVSS 评分为 5.0。"
published = "2000-12-19T05:00:00.000"
remediation = '升级至 Windows Server 2003 及以上版本自带 IIS 6.0/7.0，从根本上消除漏洞。若无法升级，通过 IIS 管理控制台禁用 WebDAV 扩展和索引服务 (Indexing Service)，或移除 WebDAV 映射 (修改注册表 HKEY_LOCAL_MACHINE\SYSTEM\CurrentControlSet\Services\W3SVC\Parameters\DisableWebDAV 为 1)。'
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Microsoft IIS 5.0 索引目录信息泄露漏洞"
updated = "2026-06-16T21:52:50.413"

