[basic]
description = "GNU C 库（glibc）2.1.3 版本存在 SUID/SGID 权限绕过漏洞。当 SUID 或 SGID 程序使用 LD_PRELOAD 环境变量加载共享库时，glibc 未验证 /etc/ld.so.cache 中预加载库同样具有 SUID/SGID 权限。本地攻击者可利用此缺陷加载 /lib 或 /usr/lib 中的恶意库文件，从而以高权限覆盖任意文件，实现本地权限提升。该漏洞影响 glibc 2.1.3 及更早版本，需本地用户账户权限方可利用。"
published = "2001-03-26T05:00:00.000"
remediation = "升级 glibc 至 2.2.0 或更高版本，该版本修复了 LD_PRELOAD 在 SUID/SGID 程序中不验证共享库权限的问题。如无法立即升级，可在 SUID 程序中设置 `LD_PRELOAD=` 为空环境变量，或移除 `/etc/ld.so.cache` 中非 SUID 用户的写入权限以缓解风险。"
score = 2.1
severity = "LOW"
sources = ["exploitdb"]
title = "GNU glibc LD_PRELOAD 本地权限提升漏洞"
updated = "2026-06-16T21:53:48.020"

