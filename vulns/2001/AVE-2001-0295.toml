[basic]
description = "Exim 3.x 邮件传输代理（MTA）在批量 SMTP 模式（-bS）下存在格式字符串漏洞。该漏洞源于 Exim 在处理邮件头部的域名字符串时未正确过滤格式字符串控制符，当管理员启用了语法检查（syntax checking）模式后，远程攻击者可以通过向 From 邮件头中注入格式字符串（如 %p），触发栈上内存信息泄露并进一步覆盖栈帧执行任意代码，最终以 root 权限完全控制目标服务器。该漏洞影响多种 Linux 发行版所打包的 Exim 3.x 版本，包括 Red Hat 3.22-10、Debian 3.12 及 Conectiva 3.16，利用门槛极低——仅需通过 SMTP 协议发送一封包含特制头部的邮件即可触发，无需身份认证。ExploitDB（EDB-ID: 20900）已公开可利用的本地提权利用代码，CVSS 评分为 7.5，危害等级较高。"
published = "2001-09-20T04:00:00.000"
remediation = "升级 Exim 至修复版本：Debian 系统升级至 exim 3.12-10.1（DSA-058），Red Hat 系统应用 RHSA-2001-078 安全补丁，Conectiva 系统安装公告 000402 对应更新包。若无法立即升级，可在 exim 配置文件中禁用语法检查模式（syntax checking）及批处理 SMTP 模式（-bS），避免攻击者利用格式字符串漏洞执行任意代码；同时建议限制本地用户对 /usr/sbin/exim 二进制文件的访问权限，仅允许必要的的执行权限。"
score = 7.5
severity = "HIGH"
sources = ["redhat"]
title = "University of Cambridge Exim 3.x 邮件传输代理格式字符串漏洞"
updated = "2026-06-16T21:54:46.620"

