[basic]
description = "Microsoft Office 中用于处理日文、韩文和中文 Word 5 文档的格式转换工具存在缓冲区溢出漏洞。当用户打开特制的畸形文档时，转换程序在处理畸形转换数据过程中发生缓冲区溢出，攻击者可借此以当前用户权限执行任意代码。该漏洞影响 Microsoft Office、Word、PowerPoint 及 Office Converter Pack 等组件，攻击者通常通过诱使用户打开恶意文档来实现利用。"
published = "2000-01-20T05:00:00.000"
remediation = "对于 Word 97/98/2000 及 PowerPoint 97/2000（东亚语言版本）以及 Office Converter Pack 2000，应立即安装 Microsoft 安全公告 MS00-002 提供的对应语言版本补丁。该漏洞已在 Office 后续版本中修复，建议将 Office 升级到 2003 或更高版本以彻底消除风险。如无法升级，可在防病毒软件中启用文档转换行为监控作为临时缓解措施。"
score = 7.2
severity = "HIGH"
sources = ["epss"]
title = "Microsoft Office Word 5 文档转换工具缓冲区溢出远程代码执行漏洞"
updated = "2026-06-16T21:50:58.527"

