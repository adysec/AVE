[basic]
description = "Microsoft Internet Information Services (IIS) 4.0 SP4 在未安装特定修补程序的情况下，存在认证绕过漏洞。远程攻击者可在特定条件下绕过身份验证机制，无需提供有效凭据即可访问受保护资源。该漏洞影响 IIS 4.0 版本，可通过 Microsoft Visual InterDev 6.0 连接触发，CVSS 评分 7.5，危害等级高。微软已发布相关修补程序修复此问题。"
published = "1999-12-31T05:00:00.000"
remediation = "该漏洞影响已停止支持的 IIS 4.0 SP4，建议立即升级至受支持的 Windows Server 版本（如 Windows Server 2019/2022 自带 IIS 10），并启用 Windows 身份验证模块，禁用匿名访问。如无法升级，在 IIS 管理器中为受影响站点启用「集成 Windows 身份验证」并关闭「匿名身份验证」作为临时缓解。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "Microsoft Internet Information Services 身份验证绕过漏洞"
updated = "2026-06-16T21:50:47.373"

