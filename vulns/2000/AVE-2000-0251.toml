[basic]
description = "RealNetworks RealPlayer 6/7 版本存在缓冲区溢出漏洞，远程攻击者可通过向目标用户发送包含超长 Location URL 的恶意链接，当用户点击该链接时触发缓冲区溢出，导致 RealPlayer 客户端崩溃，造成拒绝服务。该漏洞影响 RealPlayer 6 和 7 版本，攻击条件简单，无需身份认证，但 CVSS 评分仅 2.6，危害等级低。"
published = "2000-04-03T04:00:00.000"
remediation = "建议立即将 RealNetworks RealPlayer 升级至 8.0 及以上版本，该漏洞在后续版本中已被修复。如无法升级，可考虑卸载 RealPlayer 并改用其他播放器作为临时缓解措施。由于该版本已停止安全支持，建议彻底移除该软件以避免其他已知漏洞风险。"
score = 2.6
severity = "LOW"
sources = ["avd"]
title = "RealNetworks RealPlayer 6/7 缓冲区溢出漏洞"
updated = "2026-06-16T21:51:23.237"

