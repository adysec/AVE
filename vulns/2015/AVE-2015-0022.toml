[basic]
description = "Microsoft Windows HTTP 协议栈（HTTP.sys）中存在远程代码执行漏洞（MS15-034）。该漏洞源于 HTTP.sys 在解析特制 HTTP 请求时存在整数溢出或内存损坏问题，未经身份认证的远程攻击者只需向目标 IIS 服务器发送精心构造的 HTTP 数据包即可触发漏洞，实现远程代码执行，完全控制受影响系统。该漏洞影响 Windows 7 SP1、Windows Server 2008 R2 SP1、Windows 8/8.1 及 Windows Server 2012 等版本，CVSS 评分 9.8，危害等级严重。Microsoft 已于 2015 年 4 月安全更新（MS15-034）中修复此漏洞。"
published = "2015-04-14T20:59:01.263"
remediation = "立即安装 Microsoft 安全公告 MS15-034 对应补丁 (KB3042553)，覆盖 Windows 7 SP1/Server 2008 R2 SP1/Windows 8/8.1/Server 2012。如无法打补丁，可在 IIS 管理器中禁用内核模式缓存 (kernel-mode caching) 作为临时缓解措施，或在 IIS 的 URL 扫描模块中过滤包含过长 Range 头的请求。"
score = 9.8
severity = "CRITICAL"
sources = ["nuclei"]
title = "Microsoft Windows HTTP.sys 远程代码执行漏洞"
updated = "2026-06-17T00:22:44.360"

