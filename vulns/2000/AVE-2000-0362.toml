[basic]
description = "HP Web JetAdmin 5.6 Web 管理界面存在目录遍历漏洞。远程攻击者无需身份认证即可通过向 Web 接口发送包含 `../` 序列的特制 HTTP 请求，遍历服务器文件系统目录，读取任意敏感文件（如配置文件、密码文件等）。该漏洞允许攻击者获取服务器敏感信息，为后续攻击提供基础。CVSS 评分 7.5，危害等级高，影响部署了 HP Web JetAdmin 5.6 的设备。"
published = "2000-05-24"
remediation = "将 HP Web JetAdmin 升级至 6.0 或更高版本以修复目录遍历漏洞；如无法升级，在 Web 服务器或反向代理层面限制对 JetAdmin Web 界面的网络访问，仅允许受信任管理 IP 访问 8000 端口，同时禁用不必要的虚拟目录映射。对于已停止维护的系统，建议迁移至替代管理方案并隔离部署。"
score = 7.5
severity = "HIGH"
sources = [
    "cve",
    "exploitdb",
]
title = "HP Web JetAdmin 5.6 目录遍历漏洞"
updated = "2026-06-16"

