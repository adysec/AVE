[basic]
description = "SVGAlib zgv 3.0 至 7 及更早版本中存在权限泄露漏洞。zgv 是一款基于 SVGAlib 的图片查看工具，在处理子进程时未正确隔离 iopl(3) 特权级别。本地攻击者可利用该漏洞，通过运行特制的恶意程序继承父进程的高权限 I/O 操作权限，进而获取 root 权限。该漏洞需本地用户认证且低权限可用，影响 Linux 系统下使用 SVGAlib zgv 的环境。"
published = "1999-02-19T05:00:00.000"
remediation = "升级 zgv 至 3.0-8 或更高版本，该版本修复了 iopl(3) 权限泄露至子进程的问题。如无法升级，建议移除 zgv 的 setuid 位（chmod u-s /usr/bin/zgv），或限制仅受信任用户可通过 SVGAlib 执行图形程序，避免本地低权限用户利用该漏洞提权至 root。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "SVGAlib zgv 本地权限提升漏洞"
updated = "2026-06-16T21:50:32.183"

