[basic]
description = "FlowPoint DSL 路由器固件 3.0.8 之前版本存在安全设计缺陷，密码恢复功能被错误地暴露在 LAN 或 WAN 网络接口上，而非限制在串行控制台端口。远程攻击者无需认证即可通过网络访问该功能，对 6 位数字恢复密码进行暴力破解，一旦成功即可获得路由器的完全管理权限，进而控制目标设备。该漏洞影响所有运行 3.0.8 之前版本固件的 FlowPoint DSL 路由器，CVSS 评分 5.0，危害等级中危。"
published = "1999-08-07T04:00:00.000"
remediation = "将 FlowPoint DSL 路由器的固件升级至 3.0.8 或更高版本以修复密码恢复功能可被远程利用的缺陷。如暂时无法升级，应在边界防火墙或路由器上禁用来自 WAN 侧的远程管理访问，并仅允许通过串口控制台端口使用密码恢复功能，同时对管理登录启用账号锁定与强口令策略以缓解暴力破解风险。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Motorola FlowPoint DSL 路由器固件 密码恢复功能暴露导致暴力破解漏洞"
updated = "2026-06-16T21:50:37.530"

