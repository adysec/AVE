[basic]
description = "Windows NT 系统中存在关键注册表项权限配置不当的安全漏洞。该漏洞允许远程攻击者利用不恰当的注册表键值，在目标系统上执行未授权操作，可能导致系统信息泄露、权限提升或拒绝服务。由于受影响注册表项涉及系统核心功能，攻击者一旦利用成功可完全控制目标系统。该漏洞影响了 Windows NT 4.0 等早期版本，危害等级为严重。"
published = "1999-01-01T05:00:00.000"
remediation = '检查注册表键 HKEY_LOCAL_MACHINE\SYSTEM\CurrentControlSet\Control\ 下关键子键的值权限，将不当值修改为默认安全配置；同时安装 Windows NT 4.0 Service Pack 6a 及后续安全更新，限制对注册表的远程访问权限，仅允许授权管理员通过 ACL 进行修改。'
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "Microsoft Windows NT 注册表键值配置不当漏洞"
updated = "2026-06-16T21:48:44.057"

