[basic]
description = "` tags.<value>Netscape Enterprise Server 在启用 Web Publishing 功能时存在目录遍历漏洞。远程攻击者无需身份认证，通过向目标服务器发送特制的 GET 请求至 /publisher 目录，即可利用该目录下提供的 Java applet 浏览服务器上的任意目录，导致敏感信息泄露。该漏洞影响启用了 Web Publishing 功能的 Netscape Enterprise Server 版本，CVSS 评分 6.4，危害等级中危。"
published = "2000-03-11T05:00:00.000"
remediation = "禁用 Netscape Enterprise Server 的 Web Publishing 功能（管理控制台取消勾选 Enable Web Publishing），或通过访问控制规则限制对 /publisher 目录的访问（仅允许可信 IP）。建议升级至 Netscape Enterprise Server 3.6 SP3 及以上版本以彻底修复此漏洞。"
score = 6.4
severity = "MEDIUM"
sources = ["avd"]
title = "Netscape Enterprise Server Web Publishing 目录遍历漏洞"
updated = "2026-06-16T21:51:17.547"

