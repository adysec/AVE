[basic]
description = "Joomla! 的 TRAVELbook（com_travelbook）组件 1.0.1 版本存在目录遍历（本地文件包含）漏洞，其根源在于组件在处理 index.php 的 controller 参数时未对用户输入进行充分的路径过滤与校验。远程、无需身份认证的攻击者可通过向 index.php 提交包含“../”（点点）序列的恶意 controller 参数，突破目录限制读取服务器上的任意文件（如配置文件、源代码、敏感凭证等）。该漏洞影响安装并启用了 TRAVELbook 1.0.1 组件的 Joomla! 网站，攻击仅需构造特制 URL 发起 HTTP 请求即可，可造成敏感信息泄露，并可能被进一步利用产生其他未明影响。建议用户及时升级或停用存在漏洞的组件。"
published = "2010-04-26T18:30:00.753"
remediation = '建议立即升级 Joomla! TRAVELbook 组件至 1.0.2 或更高版本，官方已修复该目录遍历漏洞。若暂时无法升级，可在 Joomla 后台禁用 com_travelbook 组件，或在 Web 应用防火墙配置规则拦截包含 "../" 等目录遍历序列的 controller 参数请求。同时建议将 PHP 配置中 open_basedir 限制在网站根目录，限制 PHP 文件读取范围作为纵深防御。建议定期检查 Joomla 官方安全公告及时更新所有扩展组件。'
score = 7.5
severity = "HIGH"
sources = ["nuclei"]
title = "Joomla! TRAVELbook 组件 本地文件包含漏洞"
updated = "2026-06-16T23:18:34.427"

