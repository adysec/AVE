[basic]
description = "CVE-1999-0763 是 NetBSD 操作系统在多宿主主机（即配备多个网络接口并连接不同网络的主机）上存在的 ARP 缓存处理缺陷。攻击者可向其中一个网络发送特制的 ARP 数据包，由于系统未能正确隔离不同网络接口上的 ARP 信息，该数据包会被错误地用于修改另一个相连网络的 ARP 缓存条目，从而实施 ARP 欺骗或中间人攻击。该漏洞影响运行 NetBSD 且配置为连接多个网络的多宿主主机，攻击条件为攻击者能够访问其中一个相连网络并向目标发送伪造的 ARP 报文，利用方式是通过跨网络的 ARP 缓存污染实现流量劫持或会话拦截。CVSS 评分 6.4，危害等级为中危。"
published = "1999-05-01T04:00:00.000"
remediation = "升级到 NetBSD 1.4 及以上版本，或从 ftp://ftp.NetBSD.ORG/pub/NetBSD/misc/security/patches/19990505-arp 获取并应用内核补丁。如无法升级，可在各网络接口上使用 arp -s 添加静态 ARP 条目并配合防火墙规则限制 ARP 流量来源，作为临时缓解措施。"
score = 6.4
severity = "MEDIUM"
sources = ["epss"]
