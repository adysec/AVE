[basic]
description = "Linux 系统中的 Vixie Cron 存在环境变量注入漏洞，本地用户可通过设置 MAILTO 环境变量注入恶意参数到 sendmail 命令中，从而执行任意命令并实现权限提升。该漏洞影响 Caldera OpenLinux 2.2、Debian 2.1/2.2 及 RedHat 6.0 等早期 Linux 发行版，CVSS 评分 7.2（高危）。攻击者需具备本地账户权限，通过设置恶意 MAILTO 环境变量并在 cron 任务执行时触发 sendmail 调用，实现任意命令执行提权。厂商已发布补丁修复该环境变量注入漏洞。"
published = "1999-08-25T04:00:00.000"
remediation = "升级 Vixie Cron 至 3.0.1-74 或更高版本（Red Hat 6.1+、Debian 2.2r3+、Caldera OpenLinux 2.3+ 已修复）；或升级操作系统至 Red Hat 6.1+/Debian 2.2r3+/Caldera OpenLinux 2.3+。临时缓解：在 /etc/cron.allow 中限制可使用 cron 的用户，或在 /etc/cron.deny 中禁止非必要用户使用 cron；限制用户设置 MAILTO 环境变量权限。如无法升级系统，建议迁移至现代维护版本的 Linux 发行版（如 RHEL 9、Debian 12、Ubuntu 22.04+）。"
score = 7.2
severity = "HIGH"
sources = ["exploitdb"]
title = "Linux Vixie Cron MAILTO 环境变量本地命令注入漏洞"
updated = "2026-06-16T21:49:01.193"

