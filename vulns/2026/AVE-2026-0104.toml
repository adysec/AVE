[basic]
description = "WordPress SupportCandy 客服支持插件 3.4.6 及之前版本存在不安全直接对象引用（IDOR）漏洞，CVE 编号 CVE-2026-54826，CWE-639。已认证的订阅者用户可通过篡改请求中的对象标识符参数，越权访问其他用户创建的工单数据，导致敏感信息泄露。攻击者无需特殊权限，仅需订阅者账户即可利用，影响大量使用该插件的 WordPress 站点。CVSS 评分 7.6，危害等级高危。厂商建议升级至 3.4.7 及以上版本修复此漏洞。"
published = "2026-06-26T15:16:40.350"
remediation = "立即升级 Jenkins 至 2.516.2 LTS 或 2.518 及以上版本；在防火墙或反向代理层面限制 Jenkins CLI 端口（默认 50000）仅允许可信 IP 访问；启用 Jenkins 审计日志并监控异常 CLI 命令调用及 Groovy 脚本执行记录。"
score = 7.6
severity = "HIGH"
sources = ["hwpoc"]
title = "SupportCandy WordPress 插件不安全直接对象引用漏洞"
updated = "2026-06-29T18:16:37.700"

