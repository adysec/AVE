[basic]
description = "NAI Net Tools PKI Server 1.0 的 strong.exe 程序存在格式字符串漏洞，远程攻击者可通过向目标服务器发送包含特制格式字符串的 .XUDA 扩展名 URL 触发该漏洞，导致任意代码执行。该漏洞影响 HotFix 3 之前的所有版本，CVSS 评分 7.5，危害等级高。厂商已发布 HotFix 3 补丁修复此漏洞。"
published = "2000-10-20T04:00:00.000"
remediation = "立即升级 NAI Net Tools PKI Server 至 HotFix 3 或更高版本，该补丁修复了 strong.exe 中处理 .XUDA 扩展名 URL 时的格式字符串漏洞。如无法升级，建议在防火墙或反向代理层面拦截对 .XUDA 路径的请求，并限制对 PKI 服务端口的非信任网络访问。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "NAI Net Tools PKI Server 远程格式字符串漏洞"
updated = "2026-06-16T21:52:23.173"

