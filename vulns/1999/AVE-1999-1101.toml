[basic]
description = "Apple Mac OS X Server 1.0（版本 10.0）在运行 Apache HTTP 服务器时存在拒绝服务漏洞。远程攻击者无需身份认证，只需向目标服务器上运行的 CGI 程序持续发送大量的 HTTP GET 请求洪流，即可触发漏洞。由于每个请求都会由 Apache 派生出一个新的 CGI 进程，海量并发请求会在短时间内生成大量进程，耗尽系统资源，最终导致 Apache HTTP 服务器崩溃或系统停止响应。该漏洞影响运行 Mac OS X Server 1.0 并启用 CGI 的 Apache 服务，攻击条件仅为攻击者可访问目标 Web 服务的网络端口，利用方式是通过自动化工具高频请求 CGI 接口造成资源过载。"
published = "1999-06-03T04:00:00.000"
remediation = "升级 Apple Mac OS X Server 至 10.0.4 或后续版本以修复 Apache 进程耗尽问题；在 Apache 配置中限制 CGI 进程并发数（如设置 MaxClients 上限）并启用 mod_cgi 请求速率限制；无法立即升级时，可在前端防火墙或负载均衡器上对单个源 IP 的 HTTP GET 请求频率做限流，作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
