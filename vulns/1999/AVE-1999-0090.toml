[basic]
description = "suidperl（sperl）是 Perl 解释器中用于以提升权限执行 Perl 脚本的 setuid 辅助程序，其在处理用户输入时存在缓冲区溢出漏洞。本地攻击者可通过向 suidperl 传递特制参数触发栈溢出，覆盖返回地址后执行任意代码，从而获得 root 权限。该漏洞影响 Perl 4.x 至 5.x 版本，利用代码已公开，危害严重。"
published = "1997-05-29T04:00:00.000"
remediation = "升级 Perl 至 5.12.0 及以上版本（该版本已彻底移除 suidperl 组件），或安装对应发行版的安全补丁。如无法升级，执行 `chmod u-s /usr/bin/suidperl` 移除 suid 权限位作为临时缓解，并改用 `sudo` 替代 suidperl 的特权提升功能。"
score = 7.2
severity = "HIGH"
sources = ["epss"]
title = "Perl suidperl 缓冲区溢出漏洞"
updated = "2026-06-16T21:47:24.680"

