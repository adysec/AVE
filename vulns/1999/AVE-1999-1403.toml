[basic]
description = "4.4 BSD 内核中的异步 I/O 机制存在权限校验缺失漏洞。在设置 I/O 通知信号的接收进程时，内核未对用户凭证进行检查，导致本地攻击者可通过特定的 ioctl 和 fcntl 系统调用，将信号发送到任意进程 ID。本地低权限用户无需特殊授权即可利用此漏洞，向任意进程（包括高权限系统进程）发送信号，从而干扰或终止其正常运行，最终引发拒绝服务。该漏洞影响基于 4.4 BSD 内核的 FreeBSD 等操作系统，CVSS 评分 2.1，危害等级较低，利用需具备本地访问权限。"
published = "1997-09-15T04:00:00.000"
remediation = "建议升级 FreeBSD 至 4.4-RELEASE 或更高版本（已修补该内核异步 I/O 权限校验缺陷）。若暂无法升级，可通过内核参数限制普通用户对 ioctl/fcntl 的调用权限，或在防火墙层面限制本地特权用户滥用信号发送接口作为临时缓解措施。"
score = 2.1
severity = "LOW"
sources = ["avd"]
title = "FreeBSD 内核异步 I/O 凭证校验缺失导致本地拒绝服务漏洞"
updated = "2026-06-16T21:49:57.743"

