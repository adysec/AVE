[basic]
description = "Linux 内核 F2FS 文件系统驱动中的 `f2fs_fill_super()` 函数存在锁初始化顺序缺陷，在错误处理路径中 `spin_lock(&sbi->error_lock)` 被调用时该锁尚未通过 `spin_lock_init()` 完成初始化，导致内核 lockdep 报出锁依赖警告。本地攻击者可通过挂载特制 F2FS 文件系统镜像触发该错误路径，引发内核信息泄露或系统崩溃。该漏洞影响 Linux 内核各版本，CVSS 评分 5.5，危害等级中危。"
published = "2025-03-27T17:15:38.847"
remediation = "升级 Linux 内核至 5.19.9 或更高稳定版本（6.x/7.x），该补丁已在上游主线中合入，可通过发行版包管理器（如 apt upgrade linux-image / yum update kernel）更新。若暂无法升级内核，可考虑禁用 f2fs 文件系统挂载作为临时缓解措施，避免触发漏洞路径。"
score = 5.5
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux f2fs 文件系统锁初始化顺序不当导致内核锁依赖警告漏洞"
updated = "2026-06-17T05:19:01.177"

