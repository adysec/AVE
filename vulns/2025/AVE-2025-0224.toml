[basic]
description = "孚盟云的 `/Common/GetIcon.aspx` 接口存在 SQL 注入漏洞，攻击者可在未授权情况下通过构造恶意的 `FUID` 参数向后台数据库注入任意 SQL 语句。该漏洞由于未对用户输入进行有效过滤导致，攻击者可利用此漏洞获取数据库敏感信息甚至窃取系统管理员凭证，危害较大。受影响版本为未安装安全补丁的孚盟云部署实例。"
published = "0712"
remediation = "对孚盟云 GetIcon.aspx 接口的 FUID 参数实施严格的输入白名单校验，仅允许数字字符；同时升级孚盟云至官方最新安全版本，或联系厂商获取针对该 SQL 注入漏洞的热修复补丁。临时缓解措施可在 WAF 层面拦截对 /Common/GetIcon.aspx 且 FUID 参数包含 SQL 关键字（如 and、union、@@VERSION）的请求。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "孚盟云 GetIcon.aspx SQL 注入漏洞"
updated = "0712"

