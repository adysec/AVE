[basic]
description = "Symantec pcAnywhere 8.0 及 9.0 版本存在拒绝服务漏洞。远程攻击者可在连接建立后、登录提示框弹出前主动终止网络连接，使 pcAnywhere 远程访问服务无法正常处理该异常序列，进而导致服务崩溃或挂起，拒绝后续合法用户的连接请求。该漏洞攻击复杂度低，无需身份认证即可远程触发，影响所有运行 pcAnywhere 8.0/9.0 的系统。"
published = "2000-04-09T04:00:00.000"
remediation = "建议升级至 Symantec pcAnywhere 12.5 或更高版本，旧版 8.0/9.0 已不受支持且存在多个已知漏洞。如无法升级，应在防火墙层面限制 TCP 5631 和 UDP 5632 端口的访问来源，仅允许受信任 IP 连接，并禁用不必要的远程控制功能作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Symantec pcAnywhere 8.0/9.0 登录重置拒绝服务漏洞"
updated = "2026-06-16T21:51:22.387"

