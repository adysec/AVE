[basic]
description = "Flowerfire Sawmill 5.0.21 的 CGI 程序存在信息泄露漏洞，远程攻击者可通过向 rfcf 参数传入目标文件路径，使 Sawmill 尝试将该文件内容解析为配置命令，从而读取任意文件的首行内容。该漏洞影响 Sawmill 5.0.21 版本，CVSS 评分 5.0，危害等级中危。攻击者无需身份认证即可利用，可能导致敏感信息泄露。"
published = "2000-06-26T04:00:00.000"
remediation = "立即升级 Sawmill 至 5.0.22 及以上版本，该版本已修复 rfcf 参数路径遍历问题；如无法升级，在 Web 服务器（Apache/Nginx）层面限制对 Sawmill CGI 脚本的访问，仅允许受信 IP 段访问，并禁用 CGI 参数中的路径穿越字符。同时确保 Web 服务器不以高权限运行，减少信息泄露影响。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Flowerfire Sawmill 5.0.21 任意文件读取漏洞"
updated = "2026-06-16T21:52:03.573"

