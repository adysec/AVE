[basic]
description = "通达OA v11.6版本中general/report/report_bi/php/bi.cache.report.php及report_bi.func.php相关接口存在SQL注入漏洞，攻击者在未经认证的情况下可通过构造恶意的参数向后台数据库发起SQL注入请求，进而读取敏感数据、获取管理员凭据甚至写入 webshell 控制服务器，攻击门槛低且危害严重。"
published = "2023-08-08"
remediation = "升级通达OA至官方最新安全版本（v11.7及以上），并在未使用前对report_bi相关接口做访问控制与参数化查询加固，禁止公网暴露。可参考官方补丁：https://www.tongda2000.com/"
score = 8.5
severity = "HIGH"
sources = ["hwpoc"]
title = "通达OA v11.6 report_bi.func.php SQL注入漏洞"
updated = "2023-08-08"

