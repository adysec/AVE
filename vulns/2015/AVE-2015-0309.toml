[basic]
description = "Microsoft Windows Adobe Type Manager Library (atmfd.dll) 存在缓冲区下溢漏洞，远程攻击者可构造恶意 OpenType 字体文件，诱导用户打开包含该字体的文档或网页，触发缓冲区下溢导致远程代码执行。影响范围覆盖 Windows Vista SP2、Windows Server 2008 SP2/R2 SP1、Windows 7 SP1、Windows 8/8.1、Windows Server 2012/R2 及 Windows RT/8.1 等版本。攻击条件为需用户交互（打开恶意字体文件），攻击向量为网络，无需权限，成功利用可获取系统完整控制权限（CVSS 8.8 HIGH）。Microsoft 已在 MS15-078 安全公告中发布补丁修复该漏洞，CISA 已将其列入已知被利用漏洞目录。"
published = "2015-07-20T18:59:01.210"
remediation = '立即安装 Microsoft 安全公告 MS15-078 (KB3079904) 提供的安全更新，受影响系统包括 Windows Vista SP2、Windows Server 2008 SP2/R2 SP1、Windows 7 SP1、Windows 8/8.1、Windows Server 2012/R2、Windows RT 8.1。通过 Windows Update 自动更新或从 Microsoft Update 目录手动下载对应系统版本的补丁包安装。无法立即打补丁的系统，可暂时禁用 ATMFD.DLL 字体驱动作为缓解：以管理员权限运行命令 "ren %windir%\system32\atmfd.dll atmfd.dll.bak" 并重启系统（会导致 OpenType 字体无法渲染），或通过组策略禁用 "Windows 字体缓存服务" 作为临时缓解措施。'
score = 8.8
severity = "HIGH"
sources = ["kev"]
title = "Microsoft Windows OpenType Font Driver 缓冲区下溢远程代码执行漏洞"
updated = "2026-06-17T00:24:05.220"

