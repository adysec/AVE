[basic]
description = 'Matt Wright FormHandler.cgi 2.0 存在目录遍历漏洞，远程攻击者无需身份认证即可通过构造特制请求读取服务器上的任意文件。该漏洞利用方式有两种：一是通过 reply_message_attach 附件参数注入 ".."（点号）路径穿越序列，二是通过指定文件名作为模板进行文件读取。攻击者成功利用后可窃取敏感配置文件、密码文件或其他机密数据。该漏洞影响所有使用 FormHandler.cgi 2.0 版本的网站，由于 CGI 脚本通常以 Web 服务器权限运行，攻击者可能进一步获取服务器系统信息，威胁范围较广。'
published = "1999-11-12T05:00:00.000"
remediation = "升级 Matt Wright FormHandler.cgi 至修复后版本（2.0 之后官方补丁版），或移除该 CGI 脚本改用受控表单处理组件；在 Web 服务器中限制 CGI 脚本仅可访问自身目录并禁用用户上传/指定附件文件名，使用 chroot 或 open_basedir 限制脚本文件读取范围，并对 reply_message_attach 参数做路径遍历过滤（拦截 ../ 及绝对路径），作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Matt Wright FormHandler.cgi 目录遍历漏洞"
updated = "2026-06-16T21:49:36.070"

