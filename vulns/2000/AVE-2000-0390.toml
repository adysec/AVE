[basic]
description = "KDE kvt 终端模拟器存在格式化字符串漏洞，由于程序未能正确验证用户输入中的格式化字符串占位符，本地用户可通过向 kvt 程序传入特制的格式化字符串参数触发该漏洞，导致权限提升并获得 root 权限。该漏洞影响 KDE 桌面环境的 kvt 终端组件，CVSS 评分 7.2，危害等级高。RedHat 和 Caldera 等厂商已在安全公告中发布补丁修复此漏洞。"
published = "1999-06-01T04:00:00.000"
remediation = "立即升级 KDE kvt 至修复版本（KDE 1.1.2 以上补丁版），Red Hat Linux 用户安装 RHSA-1999:015 提供的更新包，Caldera OpenLinux 用户应用 CSSA-1999-015.0 补丁。如无法升级，移除 kvt 的 setuid root 权限位（chmod u-s /usr/bin/kvt）作为临时缓解措施。"
score = 7.2
severity = "HIGH"
sources = ["redhat"]
title = "KDE kvt 终端程序格式化字符串本地权限提升漏洞"
updated = "2026-06-16T21:51:34.897"

