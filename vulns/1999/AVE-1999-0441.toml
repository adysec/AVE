[basic]
description = "War-FTPD 1.65 在处理用户认证过程中的 Username 和 Password 字段时存在缓冲区溢出漏洞，未经身份认证的远程攻击者可通过向目标 FTP 服务器发送超长用户名或密码字符串触发该漏洞，导致远程代码执行。该漏洞 CVSS 评分 7.5，危害等级高危，Metasploit 框架已集成对应的利用模块。"
published = "1998-02-01T05:00:00.000"
remediation = "立即停止使用 War-FTPD 1.65，该软件已停止维护且不再发布安全更新。建议迁移至积极维护的 FTP 服务软件，如 vsftpd、ProFTPD 或 FileZilla Server。如无法立即迁移，应在防火墙层面限制对 FTP 端口（默认 21/TCP）的访问来源 IP，仅允许可信网络段连接，并将服务运行账户权限降级至最低。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "War-FTPD 1.65 缓冲区溢出漏洞"
