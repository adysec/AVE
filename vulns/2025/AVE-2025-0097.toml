[basic]
description = "索贝内容管理系统存在SQL注入漏洞，该漏洞位于 /sobey-mchEditor/mch/Articlelist/getList 接口，由于系统未对用户输入的参数进行充分的过滤与转义处理，导致攻击者可通过构造特制的SQL查询语句注入并执行任意数据库命令。攻击者无需身份认证即可利用该漏洞，从而获取数据库中的敏感信息，包括管理员凭据、用户数据等，严重威胁系统数据安全。该漏洞影响索贝内容管理系统的多个版本，建议用户尽快升级或实施安全防护措施。"
published = "0730"
remediation = "立即修改 /sobey-mchEditor/mch/Articlelist/getList 接口中的参数查询方式，将前端传入的参数改用预编译 SQL 预处理语句（PreparedStatement）或参数化查询，禁止直接拼接 SQL 字符串。同时通过 Web 应用防火墙（WAF）为该路径添加 SQL 注入规则拦截，如关键字过滤 union/select/sleep/and 1=1 等。若 mchEditor 模块非业务必需，建议临时禁用或限制仅内网白名单 IP 访问该接口。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "索贝 内容管理系统 SQL注入漏洞"
updated = "0730"

