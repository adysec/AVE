[basic]
description = "网络入侵检测系统（IDS）在处理 IP 分片数据包时存在重组逻辑缺陷，无法正确还原被拆分传输的碎片包。攻击者可将恶意流量拆分为多个分片发送，使攻击载荷绕过 IDS 的特征检测与告警机制，从而在监控盲区中完成入侵行为（如端口扫描或漏洞利用投递）。该漏洞影响当时依赖分片重组能力的各类网络入侵检测产品，攻击条件为攻击者能够向目标网络注入经过分片处理的网络流量，利用方式即构造特制分片包规避检测规则。"
published = "1999-01-01T05:00:00.000"
remediation = "升级所使用的网络入侵检测系统（如 Snort 升级至 1.6 及以上版本、ISS RealSecure 安装对应补丁）以修复分片重组逻辑；在 IDS  Sensor 配置中启用并正确设置 IP 分片重组（frag2/frag3）模块，合理配置碎片超时与重叠丢弃策略；在网络边界部署支持分片重组检测的防火墙，并启用防分片攻击（如限制异常小分片、丢弃重叠分片）作为缓解措施。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
