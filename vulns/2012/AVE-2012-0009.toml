[basic]
description = "Dolibarr CMS 3.2.0 Alpha 版本存在多处目录遍历漏洞，远程攻击者可通过在 document.php 的 file 参数或 comm/action/fiche.php 的 create 动作中 backtopage 参数构造包含 ..（点点）的路径序列，绕过访问限制读取服务器上任意文件，并可能结合文件包含实现远程代码执行。该漏洞影响 Dolibarr ERP/CRM 3.2.0 Alpha 及更早版本，CVSS 评分 7.5，危害等级高，攻击复杂度低且无需身份认证。"
published = "2012-02-21T13:31:47.830"
remediation = '''立即升级至 Dolibarr 3.2.0 以上稳定版本，官方已在 commit 5381986 和 8f9b998 中修复：对 GETPOST 参数增加 alpha/int 类型校验，并在 functions.lib.php 中过滤 `../` 路径穿越字符。如无法升级，可在 document.php 和 comm/action/fiche.php 中对 file 和 backtopage 参数增加 `preg_match('/(\.\.\/)+/', $val)` 拦截检查作为临时缓解。'''
score = 7.5
severity = "HIGH"
sources = ["nuclei"]
title = "Dolibarr CMS 目录遍历漏洞"
updated = "2026-06-16T23:39:17.287"

