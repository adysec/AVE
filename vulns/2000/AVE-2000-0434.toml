[basic]
description = "Savant WebServer 2.1 存在源代码泄露漏洞，远程攻击者通过发送不包含 HTTP 版本号的 GET 请求，无需任何认证即可直接读取服务器上 CGI 脚本的源代码，导致数据库连接信息、业务逻辑等敏感信息泄露。该漏洞利用难度极低，攻击者只需构造特殊 HTTP 请求即可触发。"
published = "2000-06-05"
remediation = "升级到 Savant WebServer 最新版本或更换为其他维护中的 Web 服务器软件；在服务器配置中禁止直接访问 CGI 脚本源码路径，并配置 Web 目录权限为最低必要权限，防止未授权文件读取。"
score = 5.0
severity = "MEDIUM"
sources = ["cve"]
title = "Savant WebServer 2.1 CGI 源代码泄露漏洞"
updated = "2000-06-05"

