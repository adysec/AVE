[info]
author = "AVE"
description = "检测 Cart32 2.6/3.0 购物车系统是否存在硬编码后门密码漏洞（CVE-2000-0429）。通过向 cart32.exe 发送包含后门密码 'wemilo' 的请求验证后门是否存在。"
id = "POC-AVE-2000-0352"
name = "Cart32 Backdoor Password PoC"
severity = "high"
tags = ["ave-2000-0352"]
vuln_id = [
    "CVE-2000-0429",
    "AVE-2000-0352",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/cart32.exe"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["Cart32"]
