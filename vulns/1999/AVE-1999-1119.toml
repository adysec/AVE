[basic]
description = "Cisco IOS 11.1 至 11.3 版本在启用分布式快速交换（DFS）功能时存在访问控制列表绕过漏洞。当路由器从启用 DFS 的输入接口向包含逻辑子接口的输出接口转发流量时，远程攻击者可利用该漏洞绕过 ACL 规则的限制，导致未授权网络流量通过安全边界。该漏洞影响大量 Cisco 路由器设备，CVSS 评分 7.5，危害等级高。Cisco 已发布相关修复方案。"
published = "1999-12-31T05:00:00.000"
remediation = "升级 Cisco IOS 至 11.3(4) 或更高版本以修复 DFS 模式下 ACL 绕过漏洞；如无法立即升级，可在受影响接口上禁用分布式快速交换（DFS）功能，改用传统的快速交换或进程交换模式作为临时缓解措施。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "Cisco IOS 分布式快速交换访问控制列表绕过漏洞"
updated = "2026-06-16T21:50:29.897"

