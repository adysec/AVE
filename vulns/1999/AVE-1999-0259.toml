[basic]
description = "IBM AIX 3.2.5/4.1/4.2 存在 TCP SYN Flood 拒绝服务漏洞。远程攻击者可通过向目标系统发送大量伪造源地址的 SYN 连接请求包，但不完成三次握手的 ACK 确认，导致目标系统耗尽其半开连接队列资源，使得合法连接无法建立，造成拒绝服务。该漏洞影响 IBM AIX 3.2.5、4.1 和 4.2 版本，利用门槛低，仅需普通网络访问即可发起攻击，属于经典的 TCP 协议层资源耗尽型拒绝服务攻击。"
published = "1996-09-19T04:00:00.000"
remediation = "升级 AIX 系统至 4.3.3 或更高版本，该版本及以上已内置 SYN flood 防护机制。运行 `no -o tcp_syncookies=1` 开启 SYN Cookie 保护，并执行 `no -o tcp_syn_rcvd_timeout=15` 缩短半连接超时时间。同时建议在网络边界部署防火墙并启用 SYN 阈值限制或 TCP 拦截功能，以缓解大量 SYN 报文冲击。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "IBM AIX SYN Packet 拒绝服务漏洞"
updated = "2026-06-16T21:47:37.367"

