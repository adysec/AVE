[basic]
description = "Linux 内核 ptrace 子系统中的 get_dumpable() 逻辑存在权限管理缺陷。ptrace_may_access() 在对没有内存描述符（mm）的线程（如内核线程）进行访问检查时，错误地使用了本应用于判断进程是否可 core dump 的 dumpable 标志，且传统的 capability 丢弃机制无法阻止该检查。本地攻击者可利用此缺陷绕过权限验证，获取内核线程的敏感信息或实现本地权限提升。该漏洞影响 Linux 内核版本，Linux 社区已在 6.12.13、6.18.22、6.19.12 及更高版本中修复。"
published = "2026-05-15T14:16:35.793"
remediation = "立即升级 Linux 内核至安全版本：稳定版升级到 6.12.13 及以上，长期支持版升级到 6.18.22 及以上，最新主线版升级到 6.19.12 及以上。可通过 `uname -r` 确认当前版本，使用发行版包管理器（如 `apt upgrade`、`yum update`）获取更新。如无法立即升级，可临时限制非 root 用户对 ptrace 的访问：通过内核参数 `kernel.yama.ptrace_scope = 1` 写入 `/etc/sysctl.conf` 并执行 `sysctl -p` 生效，阻止非授权进程间调试。"
score = 7.1
severity = "HIGH"
sources = ["hwpoc"]
title = "Linux Linux Kernel ptrace 本地权限提升漏洞"
updated = "2026-07-15T02:22:15.687"

