[basic]
description = "perlshop.cgi 购物车程序存在敏感信息泄露漏洞，该程序将客户敏感信息（如订单详情、个人数据等）存储在 Web 根目录下的目录和文件中，远程攻击者无需身份认证即可通过直接发送 HTTP 请求访问这些文件，从而获取客户隐私数据。该漏洞影响使用 perlshop.cgi 的早期 Perl 购物车系统，危害等级中等，攻击复杂度低。"
published = "2005-05-02T04:00:00.000"
remediation = "将 perlshop.cgi 的 data_dir 配置参数指向 Web 根目录之外（如 /var/lib/perlshop/data），并确保该目录权限设置为 700（仅运行 httpd 的用户可读写）。同时修改 shop.cfg 中 `$data_dir` 变量为绝对路径的外部目录，并在 Apache 配置中添加 `<DirectoryMatch /shop/data>` 拒绝规则以阻止直接访问遗留数据文件。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "PerlShop perlshop.cgi 敏感信息泄露漏洞"
updated = "2026-06-16T21:50:18.230"

