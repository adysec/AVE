[basic]
description = "Red Hat Linux 6.1 中的 tmpwatch 工具在处理目录时会为每个层级 fork 一个新进程，本地攻击者可在 /tmp 或 /var/tmp/ 中创建深度嵌套目录结构，导致系统 fork 大量子进程耗尽资源，从而引发拒绝服务。该漏洞影响 Red Hat Linux 6.1 i386 版本，CVSS 评分 2.1，危害等级低，需本地用户权限方可利用。"
published = "2000-11-14T05:00:00.000"
remediation = "立即安装 Red Hat Security Advisory RHSA-2000:080 提供的 tmpwatch 更新包，将 tmpwatch 升级至修复版本。临时缓解措施：在 /tmp 和 /var/tmp 目录设置磁盘配额和最大目录深度限制，防止创建过深嵌套目录。由于 Red Hat Linux 6.x 已停止维护，建议迁移至受支持的企业级 Linux 发行版。"
score = 2.1
severity = "LOW"
sources = ["exploitdb"]
title = "Red Hat Tmpwatch 递归目录拒绝服务漏洞"
updated = "2026-06-16T21:52:33.230"

