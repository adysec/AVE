[basic]
description = "Pragma Systems InterAccess TelnetD Server 4.0 Build 4 存在缓冲区溢出漏洞，远程攻击者可通过向 TelnetD 服务发送超长的登录用户名触发该漏洞，导致缓冲区溢出，进而可在目标系统上执行任意命令。该漏洞 CVSS 评分为 10.0，危害等级严重，影响该版本及之前版本。"
published = "2000-02-21T05:00:00.000"
remediation = "立即升级 Pragma Systems InterAccess TelnetD Server 至最新版本，或更换为 OpenSSH 等现代安全远程访问方案。如无法立即升级，在防火墙层面限制对 Telnet 端口（TCP 23）的访问，仅允许可信来源 IP 连接，并禁用匿名登录功能作为临时缓解措施。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "Pragma Systems InterAccess TelnetD 服务器缓冲区溢出漏洞"
updated = "2026-06-16T21:51:08.287"

