[basic]
description = "HP-UX 10.20 及 11.0 系统中的 man 命令存在不安全的临时文件创建漏洞，本地攻击者可通过在 /tmp 目录下创建符号链接（symlink）指向目标文件，诱使 man 命令在处理帮助文档时以 root 权限覆盖任意系统文件。该漏洞利用条件为攻击者拥有本地 shell 访问权限，可导致权限提升或系统文件破坏，CVSS 评分 4.6，危害等级中危。"
published = "2000-06-02T04:00:00.000"
remediation = "建议升级 HP-UX 至 11.11 或更高版本，或安装 HP 安全补丁 PHCO_21674（10.20）/ PHCO_21675（11.0）。临时缓解措施：以 root 身份执行 `chmod 1777 /tmp` 确保 /tmp 目录 sticky 位已设置，并限制本地非授信用户登录系统。"
score = 4.6
severity = "MEDIUM"
sources = ["epss"]
title = "HP HP-UX man 命令符号链接漏洞"
updated = "2026-06-16T21:51:47.947"

