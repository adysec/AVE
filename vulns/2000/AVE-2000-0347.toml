[basic]
description = "Linux Kernel 2.2.x 版本中的 knfsd NFS 服务器存在输入验证缺陷，远程攻击者可通过向目标系统发送包含负值大小参数的恶意 NFS 请求触发该漏洞，导致 knfsd 服务崩溃，造成拒绝服务。该漏洞影响 Linux Kernel 2.1/2.2.0/2.3.0 等版本，攻击无需身份认证且无需用户交互，危害等级中等。"
published = "2000-05-01T04:00:00.000"
remediation = "升级 Linux 内核至 2.2.19 或更高版本（该漏洞在 2.2.x 后续版本中已修复），或在 NFS 服务器上限制 knfsd 的访问来源 IP，仅允许可信网段连接，同时禁用 NFSv2 协议以降低攻击面。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Linux Kernel knfsd NFS 服务拒绝服务漏洞"
updated = "2026-06-16T21:51:31.287"

