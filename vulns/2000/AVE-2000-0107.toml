[basic]
description = "攻击者可以在用户首次删除文件前在recycler目录创建包含受害者SID的假子目录，然后分配任意权限，从而对目标用户的回收站进行文件创建、修改或删除操作。此漏洞仅影响NTFS文件系统，和共享机器上的恶意用户。"
published = "2000-02-01"
remediation = "安装MS00-007补丁（KB248399），仅需在运行NTFS文件系统的Windows NT 4.0机器上安装。"
