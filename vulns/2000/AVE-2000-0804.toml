[basic]
description = "Microsoft Internet Explorer 5.x 及 Outlook 中 DHTML 编辑控件（DHTMLED）存在任意文件读取漏洞。远程攻击者可构造恶意网页，通过操控 IFRAME 元素重定向其内容，诱使用户访问后即可读取目标系统上的任意文件内容。该漏洞影响 IE 5.x 及 Outlook 等多个微软产品，攻击者需诱导用户访问恶意页面，无需额外认证即可窃取敏感信息。"
published = "2000-07-14"
remediation = "安装 Microsoft 安全公告 MS00-055 提供的 Internet Explorer 累积安全更新补丁，该补丁限制 Scriptlet 组件仅渲染 HTML 文件，阻止非 HTML 文件的跨域读取。由于 IE 5.x 已停止支持，建议升级至 Microsoft Edge 或使用受支持的现代浏览器。"
score = 5.0
severity = "MEDIUM"
sources = [
    "cve",
    "nvd",
]
title = "Microsoft Internet Explorer/Outlook DHTML Edit Control 任意文件读取漏洞"
updated = "2026-06-16"

