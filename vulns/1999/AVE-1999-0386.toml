[basic]
description = "Microsoft Windows 95/98 系统内置的 Telnet 客户端存在缓冲区溢出漏洞，该漏洞源于程序在处理 Telnet 参数时未对输入长度进行有效校验。攻击者可通过构造包含畸形超长参数的恶意 Telnet 链接（通常嵌入在 Internet Explorer 5 网页中），诱使受害者点击触发本地堆溢出，从而覆盖内存中的关键数据并可能执行任意代码。该漏洞影响 Windows 95 和 Windows 98 操作系统，需要本地用户交互（点击恶意链接或访问恶意页面）方可利用，CVSS 评分 2.6，危害等级较低。"
published = "1999-08-16T04:00:00.000"
remediation = "立即通过 Windows Update 安装微软针对该 Telnet 客户端堆溢出的安全补丁，并将 Internet Explorer 5 升级至官方修复版本或更高版本；在无法立即打补丁的系统中，可通过「控制面板-添加/删除程序-Windows 安装程序」取消 Telnet 客户端组件的勾选以禁用该服务，作为临时缓解措施。"
score = 2.6
severity = "LOW"
sources = ["exploitdb"]
