[basic]
description = "GNU glibc 的 getaddrinfo 函数在处理 AF_UNSPEC 地址族查询且系统通过 /etc/resolv.conf 配置了 no-aaaa 模式时存在堆栈读取越界漏洞。当远程攻击者向目标系统发送大于 2048 字节的 TCP DNS 响应时，可触发越界堆栈读取，导致进程崩溃或泄露敏感堆栈内存数据。该漏洞影响 glibc 2.x 系列版本，CVSS 评分 6.5，危害等级中等。"
published = "2023-09-18T17:15:55.067"
remediation = "升级 glibc 至 2.37 及以上版本（各发行版对应包：Debian/Ubuntu 升级 libc6，RHEL/CentOS 升级 glibc），修复 commit 为 b327d1ef。无法立即升级时，在 /etc/resolv.conf 中移除 no-aaaa 选项，或限制 DNS TCP 响应不超过 2048 字节以缓解风险。"
score = 6.5
severity = "MEDIUM"
sources = ["msrc"]
title = "GNU glibc getaddrinfo 函数堆栈读取溢出漏洞"
updated = "2026-06-17T06:38:01.153"

