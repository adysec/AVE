[basic]
description = "Auction Weaver CGI 脚本 1.03 及更早版本存在路径遍历漏洞，远程攻击者可通过向 fromfile 参数提交包含 `..` 的恶意请求读取服务器上的任意文件，导致敏感信息泄露。该漏洞无需身份认证即可利用，攻击复杂度低，影响运行 Auction Weaver CGI 脚本的 Web 服务器。"
published = "2000-10-20T04:00:00.000"
remediation = '立即删除或禁用 auction_weaver CGI 脚本，该产品已停止维护且无安全更新。如业务必须使用，需在 Web 服务器层面对 fromfile 参数进行输入过滤，拒绝包含 "../" 或 "..\" 等路径遍历字符的请求，并限制 CGI 脚本的文件系统访问权限。建议迁移至其他受支持的竞品替代方案。'
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Auction Weaver CGI 任意文件读取漏洞"
updated = "2026-06-16T21:52:16.047"

