[basic]
description = "CSM Proxy 4.1 的 FTP 代理组件存在缓冲区溢出漏洞，远程攻击者可通过向 FTP 端口发送超长字符串，触发缓冲区溢出，导致代理服务崩溃，造成拒绝服务。该漏洞源于对用户输入长度缺乏校验，攻击者无需认证即可利用，影响 CSM Proxy 4.1 版本，危害等级中危。"
published = "1998-07-16T04:00:00.000"
remediation = "建议升级至 CSM Proxy 4.1 之后的安全版本（如果厂商已发布修复版本）；由于 CSM 公司及产品早已停止维护，实际可行方案为：在防火墙层面限制对 FTP 端口（21）的访问，仅允许可信来源 IP 连接；如仍需使用该代理服务，建议迁移至正在维护的替代代理产品。临时缓解措施可通过配置 Windows 防火墙或网络 ACL 阻断外部来源对 TCP 21 端口的访问。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "CSM Proxy 4.1 FTP 缓冲区溢出拒绝服务漏洞"
updated = "2026-06-16T21:49:49.540"

