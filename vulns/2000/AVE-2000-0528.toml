[basic]
description = "Windows 2000 存在桌面分离访问控制漏洞，本地用户进程可突破会话隔离，访问同一窗口站内其他用户的桌面会话。攻击者需具备本地登录权限且处于同一窗口站，通过调用窗口站API函数枚举并附加到其他用户桌面，可窃取敏感信息、键盘记录或注入恶意代码实现权限提升。该漏洞影响 Windows 2000 所有版本，CVSS 4.6 分（本地/低复杂度/无需认证/部分机密性/完整性/可用性影响），属于会话隔离缺陷导致的本地权限提升漏洞。微软已发布安全补丁修复该桌面隔离缺陷。"
published = "2000-06-15T04:00:00.000"
remediation = '建议立即安装 Microsoft Windows 2000 Security Rollup 1 (SR-1) 及 2000 年的累计安全更新，或应用 2000 年 6 月针对漏洞 CVE-2000-0475 的特定补丁。关闭所有非必需的本地用户账户、更换所有默认密码，并通过 GPO 禁用所有未认证的网络访问。如无法立即更新，可临时通过注册表禁用桌面共享功能（HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\Explorer\Policy\NoDesktopPolicy=1）以缓解桌面权限提升风险。'
score = 4.6
severity = "MEDIUM"
sources = ["avd"]
title = "微软 Windows 2000 访问控制漏洞"
updated = "2026-06-16T21:51:48.863"

