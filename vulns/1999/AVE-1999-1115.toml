[basic]
description = "thttpd HTTP 服务器 2.04-31 之前版本中的 tdate_parse 函数存在缓冲区溢出漏洞，远程攻击者可通过向目标服务器发送包含超长日期字符串的 HTTP 请求触发该漏洞，导致任意代码执行。该漏洞影响 thttpd 2.04-31 之前所有版本，CVSS 评分 7.5，危害等级高。受影响的系统需要升级到 2.04-31 或更高版本以修复此漏洞。"
published = "1999-11-16T05:00:00.000"
remediation = "升级 thttpd 至 2.04-31 或更高版本，该版本修复了 tdate_parse 函数对超长日期字符串的缓冲区边界检查。如无法升级，可在 thttpd 配置中禁用 HTTP Date 头解析或使用 mod_security 等 WAF 规则过滤超长 Date 请求头作为临时缓解。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "thttpd HTTP Server 缓冲区溢出代码执行漏洞"
updated = "2026-06-16T21:50:28.903"

