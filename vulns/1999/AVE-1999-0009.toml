[basic]
description = "GNU C 库（glibc）2.2 版本之前的 `tdelete` 函数存在未检查返回值漏洞。由于文档 `manual/search.texi` 缺少关于删除二叉查找树根节点时返回值的明确说明，开发者可能未正确处理该返回值，进而访问已释放的悬挂指针，导致内存破坏、程序崩溃或敏感信息泄露。攻击者可通过操控树结构触发此缺陷，影响所有依赖旧版本 glibc 的应用。该漏洞 CVSS 评分 9.8，危害等级严重。"
published = "2020-10-06T13:15:13.087"
remediation = "升级 GNU C Library (glibc) 至 2.2 或更高版本，该版本已在文档中明确注明 tdelete() 删除根节点时返回值为未定义。开发者应在调用 tdelete() 后始终检查返回值是否为 NULL，避免解引用悬空指针。如无法升级 glibc，应在应用层对 tdelete() 返回的指针做 NULL 判等处理，并避免依赖删除根节点后的返回值。"
score = 9.8
severity = "CRITICAL"
sources = ["osv"]
title = "GNU glibc tdelete 返回值未检查漏洞"
updated = "2026-06-16T21:47:53.723"

