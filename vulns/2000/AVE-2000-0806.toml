[basic]
description = 'Microsoft Visual InterDev 1.0 及 FrontPage 98 Server Extensions for IIS 中的 dvwssr.dll 组件存在缓冲区溢出漏洞。该漏洞源于 dvwssr.dll 在处理文件名参数时未对输入长度进行有效校验，攻击者可构造超长或经过混淆的文件名请求触发内存溢出。经过身份认证的远程用户可通过向存在该 DLL 的 IIS 服务器发送特制 HTTP 请求，导致服务器拒绝服务（服务崩溃）或在目标系统上执行任意命令。该漏洞又称"Link View Server-Side Component"漏洞，影响运行 FrontPage 98 服务器扩展的 IIS 及 Visual InterDev 1.0 环境，CVSS 评分 7.5，危害等级为高危。'
published = "2000-04-14T04:00:00.000"
remediation = "根据 Microsoft 安全公告 MS00-025，应删除服务器上所有 Dvwssr.dll 文件副本来消除漏洞（仅损失 Visual Interdev 1.0 生成 .asp 链接视图功能）。也可升级到不受影响的版本：安装 FrontPage 2000 Server Extensions 或 Office 2000 Server Extensions 即可自动修复；或将系统从 Windows NT 4.0 升级至 Windows 2000 以移除该组件。临时缓解措施：检查含该 DLL 的目录权限，确保其仅允许 Web 作者执行，切勿将其复制到低权限目录。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
