[basic]
description = "Jana proxy web server 1.45 及相邻版本存在目录遍历漏洞。远程攻击者无需身份认证，通过在 HTTP 请求中向目标服务器发送包含 `..`（点点）序列的恶意 URL 路径，即可突破路径限制读取服务器上的任意文件，导致敏感信息泄露。该漏洞影响 Jana Server 1.0、1.45、1.46 等版本，CVSS 评分 5.0，危害等级中危，攻击复杂度低且无需特殊权限。"
published = "1999-10-08T04:00:00.000"
remediation = "建议立即升级 Jana Server 至 1.46 以上版本（如官方已停止维护，应迁移至其他受支持的 Web 代理服务器）。临时缓解措施：在 Web 应用防火墙或反向代理层过滤 `../` 及 URL 编码变体（如 `..%2f`、`%2e%2e%2f`），并限制对敏感目录的访问权限。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Jana Proxy Web Server 目录遍历漏洞"
updated = "2026-06-16T21:49:41.140"

