[basic]
description = "HP-UX 11.04 VirtualVault (VVOS) 存在信息泄露漏洞。当网络接口配置了多个别名 IP 地址时，系统会将本应发送给受信任虚拟服务器的数据错误地路由至非特权进程，导致敏感信息泄露。攻击者无需身份认证即可利用该漏洞，但需要目标系统存在特定网络配置环境。"
published = "2000-04-06"
remediation = "建议立即安装 HP 针对 VirtualVault VVOS 发布的安全补丁（HP Security Bulletin HPSBUX0004-112），升级至修复后的 HP-UX 11.04 VVOS 版本。如无法立即修补，应避免在 VirtualVault 接口上配置多个别名 IP 地址，并将非必要的未授权进程从该网络接口上移除，以降低信息泄露风险。"
score = 5.0
severity = "MEDIUM"
sources = [
    "cve",
    "avd",
]
title = "HP-UX VirtualVault 多别名 IP 接口信息泄露漏洞"
updated = "2026-06-16"

