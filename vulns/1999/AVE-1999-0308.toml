[basic]
description = "CDE 通用桌面环境中的日历管理器服务守护进程 rpc.cmsd 存在缓冲区溢出漏洞，远程攻击者无需身份认证即可向目标系统发送特制请求触发该漏洞，导致拒绝服务或以 root 权限执行任意代码。该漏洞影响 Caldera OpenUnix 8.0、UnixWare 7.1.1、HP HP-UX 11.0、Solaris 7.0 及 SunOS 4.1.4 等多个 Unix 操作系统，CVSS 评分为 10.0，危害等级严重。攻击者可通过构造恶意的 RPC 调用来利用此漏洞。"
published = "1999-07-01T04:00:00.000"
remediation = "升级 Caldera OpenUnix 至 8.0.2、UnixWare 至 7.1.2、HP-UX 至 11.04 以上版本，或安装对应厂商安全补丁。如在受限环境中无法升级，建议在 inetd 配置中禁用 rpc.cmsd 服务，并在防火墙限制对 111 (portmap) 和 CDE 相关端口的访问。"
score = 10
severity = "CRITICAL"
sources = ["exploitdb"]
title = "多款Unix操作系统 CDE日历管理服务守护进程(rpc.cmsd) 缓冲区溢出漏洞"
updated = "2026-06-16T21:48:52.067"

