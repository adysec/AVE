[basic]
description = "Microsoft Index Server（索引服务器）存在信息泄漏漏洞，远程攻击者通过向目标服务器发送针对不存在的 Internet 数据查询（.idq）文件的 HTTP 请求，服务器返回的错误信息中会暴露 Web 目录的真实物理路径，导致敏感信息泄漏。攻击者可利用此信息进一步探测目标系统结构，为后续攻击提供基础。该漏洞影响 Microsoft Index Server 2.0 及更早版本，攻击复杂度低，无需身份认证即可远程利用。"
published = "2000-01-26T05:00:00.000"
remediation = "立即安装 Microsoft 安全公告 MS00-006 中针对 Internet Data Query 漏洞的补丁（KB252463），该补丁可用于 Index Server 2.0 和 Windows 2000 的 Indexing Service。如系统仍在运行 Index Server 2.0，建议升级至 Windows 2000 Indexing Service 并应用最新补丁；若无法立即升级，应在 IIS 配置中禁用 .IDQ 和 .HTW 文件的映射，或通过 NTFS 权限限制 web 目录的访问范围，防止攻击者通过构造不存在的 .idq 请求获取服务器物理路径信息。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Microsoft Index Server 信息泄露漏洞"
updated = "2026-06-16T21:50:59.800"

