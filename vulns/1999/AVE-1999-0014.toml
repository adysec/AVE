[basic]
description = "Microsoft Windows NT 4.0 Messenger 服务在解析超长用户名时存在边界处理缺陷，未经身份认证的远程攻击者可向目标系统发送特制的超长用户名数据包，触发服务崩溃，造成拒绝服务。该漏洞利用方式简单，攻击者无需复杂工具即可通过标准网络协议发包实施攻击，影响 Windows NT 4.0 全版本。"
published = "1999-07-23T04:00:00.000"
remediation = '安装 Microsoft 针对 Windows NT 4.0 的 Service Pack 5 (SP5) 或更高版本，该补丁修复了 Messenger Service 对畸形用户名处理不当的问题。对于已停止支持的旧系统，建议升级至 Windows Server 2003 或更高版本；若无法升级，可在服务管理器中禁用 "Messenger" 服务以消除攻击面。'
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Microsoft Windows NT Messenger Service 长用户名拒绝服务漏洞"
updated = "2026-06-16T21:47:56.923"

