[info]
author = "AVE"
description = "Red Hat usermode 软件包中的 userhelper 程序存在路径遍历漏洞，通过构造包含 .. 的路径结合 PAM 机制绕过目录限制，本地攻击者可提升至 root 权限。此 PoC 检查 userhelper 二进制文件是否存在"
id = "POC-AVE-2000-0045"
name = "CVE-2000-0052 PoC"
severity = "high"
tags = ["ave-2000-0045"]
vuln_id = [
    "CVE-2000-0052",
    "AVE-2000-0045",
]

[poc]
logic = "all"

[[poc.requests]]
path = "/usr/sbin/userhelper"
protocol = "file"

[[poc.requests.matchers]]
expect = true
part = "body"
regex = "."
type = "regex"
