[basic]
description = "Linux splitvt 1.6.3 及更早版本中存在栈缓冲区溢出漏洞。该漏洞源于 screen locking 功能在处理密码输入时未对用户提供的密码长度进行有效边界检查，本地攻击者可通过向该功能提交超长密码字符串触发缓冲区溢出，从而覆盖进程内存空间中的关键数据，成功利用此漏洞可将普通用户权限提升至 root 权限。该漏洞影响运行 splitvt 1.6.3 及更早版本的 Linux 系统，CVSS 评分 7.2，危害等级高。建议用户升级至 splitvt 1.6.4 或更高版本以修复此漏洞。"
published = "2000-06-01T04:00:00.000"
remediation = "升级 splitvt 至 1.6.4 及以上版本（最新为 1.6.6），可通过发行版包管理器安装：Debian/Ubuntu 执行 `apt install splitvt`，Gentoo 执行 `emerge app-misc/splitvt`。若无法升级，临时缓解措施为移除 splitvt 的 setuid root 权限位：`chmod u-s $(which splitvt)`，但此操作将导致普通用户无法正常使用锁定功能。建议长期改用 tmux 或 GNU screen 等现代终端复用器替代 splitvt。"
score = 7.2
severity = "HIGH"
sources = ["exploitdb"]
title = "Sam Lantinga splitvt 本地缓冲区溢出漏洞"
updated = "2026-06-16T21:51:47.820"

