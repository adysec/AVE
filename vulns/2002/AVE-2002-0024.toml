[basic]
description = "Linux 系统下的 super 命令（William Deich Super 3.x 版本）存在格式字符串漏洞，本地用户可通过向该命令传递包含格式说明符的长命令行参数触发该漏洞，导致以 root 权限执行任意代码。该漏洞影响 Super 3.x 全版本，CVSS 评分 7.2，危害等级高。攻击者需拥有本地系统访问权限，利用难度较低。"
published = "2002-08-12T04:00:00.000"
remediation = "立即升级 super 至 3.12 或更高版本，该版本已修复 syslog() 调用中的格式字符串漏洞。如无法升级，可移除 super 的 setuid 位（chmod u-s /usr/bin/super）作为临时缓解，仅允许受信用户执行。"
score = 7.2
severity = "HIGH"
sources = ["osv"]
title = "Linux Super 格式字符串本地权限提升漏洞"
updated = "2026-06-16T21:58:11.560"

