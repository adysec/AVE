[info]
author = "ave"
description = "验证Aladdin eSafe Gateway 3.0及更早版本脚本过滤绕过漏洞，通过将恶意脚本嵌入HTML标签属性（如BODY onload、A href、BUTTON、INPUT等）绕过SCRIPT标签过滤机制"
id = "POC-AVE-2001-0204"
name = "Aladdin eSafe Gateway Script-filtering Bypass PoC"
severity = "high"
tags = ["ave-2001-0204"]
vuln_id = [
    "CVE-2001-0520",
    "AVE-2001-0204",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "<body onload",
    "href=javascript",
    "onclick=",
]
