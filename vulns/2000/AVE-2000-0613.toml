[basic]
description = "OpenSSL 0.9.4 及 FreeBSD 平台上的 OpenSSH 未对 /dev/random 和 /dev/urandom 设备的存在性进行正确校验，而 FreeBSD Alpha 系统上并未提供上述熵源设备，导致这些应用程序在生成密钥对或会话密钥时依赖了可预测或不足的随机数源，从而生成了强度极弱的密钥。攻击者无需身份认证，只需在网络上捕获目标主机与服务器之间传输的加密通信数据包，即可利用弱密钥对加密流量进行离线破解或中间人攻击，进而窃取敏感信息或冒充合法用户。该漏洞影响运行 FreeBSD Alpha 并配置了 OpenSSL 0.9.4 或 OpenSSH 的系统环境。"
published = "2000-06-12T04:00:00.000"
remediation = '升级 FreeBSD 操作系统至 4.0-RELEASE 或更高版本，确保 /dev/random 与 /dev/urandom 设备节点存在。若短期内无法升级系统，可在 /etc/rc.conf 中添加 devfs 规则集以确保随机设备自动创建：devfs_system_ruleset="devfsrules_system"，或手动在 devfs 规则文件（/etc/defaults/devfs.rules）中为 Alpha 平台添加 random 和 urandom 设备规则并重启 devfs。同时将 OpenSSL 升级至 0.9.5 或更高版本，使其具备更完善的随机设备检测机制。如无法立即完成上述操作，应临时禁用受影响服务（如 OpenSSH）并重新生成所有使用 OpenSSL 0.9.4 生成的密钥对，防止弱密钥被利用。'
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "OpenSSL 随机数设备检查缺失弱密钥漏洞"
updated = "2026-06-16T21:51:56.717"

