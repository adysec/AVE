[basic]
description = "Kerberos 5 的 krb425_conv_principal 函数存在缓冲区溢出漏洞，远程攻击者无需身份认证即可通过向目标系统发送特制的 Kerberos 请求触发该漏洞，导致攻击者可以获得目标系统的 root 权限。该漏洞影响 Kerberos 5 及其相关实现（如 Cygnus Network Security、KerbNet 等），CVSS 评分 10.0，危害等级严重。"
published = "2000-05-16T04:00:00.000"
remediation = "立即升级 MIT Kerberos 5 至 1.1.1 或更高版本，该版本已修复 krb425_conv_principal 函数中的缓冲区溢出漏洞。Red Hat 用户请安装 RHSA-2000-025 提供的更新包；如无法立即升级，可在防火墙层面限制对 Kerberos 服务（端口 88/464/749）的远程访问作为临时缓解措施。"
score = 10
severity = "CRITICAL"
sources = ["redhat"]
title = "MIT Kerberos 5 krb425_conv_principal 函数缓冲区溢出漏洞"
updated = "2026-06-16T21:51:36.973"

