[basic]
description = "Novell NetWare 3.x 及更早版本存在权限提升漏洞。本地攻击者可通过伪造网络数据包（packet spoofing）向目标系统发送特制报文，利用系统对数据包源地址验证不严的缺陷，绕过访问控制机制获取更高权限。该漏洞影响 Novell NetWare 3.x 系列版本，CVSS 评分 4.6，危害等级中危。攻击者需具备本地网络访问能力，成功利用后可执行越权操作，威胁系统安全。"
published = "1999-12-31T05:00:00.000"
remediation = "升级到 Novell NetWare 4.x 或更高版本，该版本修复了数据包欺骗的认证漏洞。如无法升级，在网络交换机上启用端口安全与动态 ARP 检测（DAI），防止局域网内伪造数据包；同时在服务器网卡上绑定静态 MAC 地址，限制只有合法设备能发送认证请求。建议迁移至受支持的现代操作系统。建议立即升级至 Novell NetWare 4.x 或更高版本。如系统已停止支持且无法升级，应在交换机上启用端口安全（Port Security）和动态 ARP 检测（DAI）以防止局域网内数据包欺骗攻击，同时在服务器端配置静态 ARP 绑定。长期建议迁移至受支持的现代平台（如 OES、Windows Server 或 Linux）。"
score = 4.6
severity = "MEDIUM"
sources = ["avd"]
title = "Novell NetWare 本地权限提升漏洞"
updated = "2026-06-16T21:50:11.360"

