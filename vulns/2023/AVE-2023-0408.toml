[basic]
description = "CVE-2023-53749 已被 CVE 编号管理机构（CNA）撤销/拒绝，原提交涉及 Linux 内核 x86 架构中 clear_user_rep_good() 函数异常处理注释的修正，经评估后该问题不属于安全漏洞范畴，故该 CVE 编号被废弃。由于该 CVE 并非有效漏洞，不具有漏洞原理、影响范围、攻击条件及利用方式等相关信息，开发者无需对此采取任何安全措施。"
published = "2025-12-08T02:15:50.327"
remediation = "该漏洞已在 Linux 主线内核提交 d2c95f9d6802 中移除存在问题的 clear_user_rep_good() 代码路径，并在稳定分支提交 90510aed20a26e1a4dede4ef6b640e6a4122f38f 中修复了异常表注释位置。建议升级内核至包含上述补丁的版本（如 6.x 主线或对应 LTS 稳定版），确保用户空间内存访问异常时正确返回 -EFAULT 而非触发内核崩溃。"
score = 5
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux Kernel x86 clear_user_rep_good 异常处理注释缺陷"
updated = "2025-12-29T15:15:51.417"

