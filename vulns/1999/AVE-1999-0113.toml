[basic]
description = "Apache 1.1、NCSA httpd 1.5.2 及 Netscape Server 1.12/1.1/2.0 等早期 Web 服务器自带的 nph-test-cgi 脚本存在信息泄露漏洞。远程攻击者无需认证即可通过发送特制 HTTP 请求调用该脚本，遍历并列出 Web 主机上的任意文件列表，导致敏感信息泄露。该漏洞利用难度低，影响范围覆盖多种主流 Web 服务器版本，危害等级高。"
published = "1996-12-10T05:00:00.000"
remediation = "立即删除 Web 服务器上所有 nph-test-cgi 脚本文件（通常位于 cgi-bin 目录下），并移除相关 CGI 目录的执行权限。若运行 Apache，建议升级至 1.3.x 及以上版本；若为 NCSA httpd 或 Netscape Server，应迁移至维护中的 Web 服务器软件（如 Apache httpd 2.x）。在防火墙层面限制对 cgi-bin 目录的外部访问作为临时缓解。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "Apache NCSA HTTPd Netscape Server CGI 任意文件信息泄露漏洞"
updated = "2026-06-16T21:47:26.793"

