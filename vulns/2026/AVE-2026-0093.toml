[basic]
description = "Microsoft Defender 恶意软件保护引擎存在不当链接解析漏洞（CWE-59），低权限本地用户可通过创建恶意符号链接诱使 Defender 引擎在处理扫描文件时错误地跟随链接，从而以 SYSTEM 权限执行任意文件操作，实现本地权限提升。攻击者需先获得目标系统本地访问权限，利用难度中等。CVSS 评分 7.8，危害等级高。"
published = "2026-06-16T19:16:59.683"
remediation = '立即将 Microsoft Defender 防病毒引擎升级至 1.1.26060.3008 及以上版本。该更新通过 KB2267602 自动分发，也可手动运行 `MpCmdRun.exe -SignaturesUpdate` 强制更新。修复后可在注册表 `HKLM\SOFTWARE\Microsoft\Windows Defender\Signature Updates\Engine Version` 确认版本号。无法立即更新的环境下，可限制非管理员用户对 `%ProgramData%\Microsoft\Windows Defender` 目录的写权限作为临时缓解措施。'
score = 7.8
severity = "HIGH"
sources = ["hwpoc"]
title = "Microsoft Defender 恶意软件防护引擎本地权限提升漏洞"
updated = "2026-07-09T00:17:26.607"

