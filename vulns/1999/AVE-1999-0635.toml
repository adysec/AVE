[basic]
description = "Quakenbush NT 密码评估器（NT Password Appraiser）的演示版存在敏感信息泄露漏洞，该软件在评估密码强度时，将用户密码以明文形式通过网络传输，导致攻击者可通过网络嗅探方式截获目标系统的用户凭据。该漏洞影响 Quakenbush NT Password Appraiser 演示版，攻击者只需与目标处于同一网络段即可实施嗅探攻击，获取的密码可用于后续系统未授权访问。CVSS 评分 10.0，危害等级严重。"
published = "1999-01-01T05:00:00.000"
remediation = "立即停止使用 Quakenbush NT Password Appraiser 演示版，改用完整版或其他密码评估工具（如 John the Ripper、ophcrack）。如必须使用该工具，请确保在网络层启用加密（如 IPsec 或 VPN）以防止密码明文传输。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "Quakenbush NT密码评估器 网络明文传输密码漏洞"
updated = "2026-06-16T21:48:18.550"

