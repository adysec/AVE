[basic]
description = 'Netsweeper Web Panel 4.0.5 之前版本存在硬编码凭证漏洞，其 branding 账户使用固定的默认密码 "branding"。远程攻击者无需任何身份认证即可通过向 /webadmin/ 路径发送请求，利用该硬编码凭证直接登录管理后台，获取系统完全控制权限，包括敏感数据访问、配置篡改及进一步内网渗透。该漏洞影响所有低于 4.0.5 的 Netsweeper 版本，攻击复杂度低，危害严重。'
published = "2020-02-19T20:15:13.517"
remediation = "立即升级 Netsweeper 至 4.0.5 或更高版本，该版本已移除硬编码默认凭据。如无法立即升级，登录 Web Panel 后手动修改 branding 账户的默认密码为强密码（至少 12 位含大小写字母、数字和特殊字符），并在 Web 服务器（如 Apache/Nginx）层面限制 /webadmin/ 路径仅允许可信管理 IP 访问。"
score = 9.8
severity = "CRITICAL"
sources = ["nuclei"]
title = "Netsweeper Web Panel 硬编码凭证漏洞"
updated = "2026-06-17T00:18:38.907"

