[basic]
description = "tar-fs 包中的 index.js 文件存在不安全的符号链接解析与路径遍历漏洞。攻击者可通过构造恶意的 tar 压缩包，在解压过程中利用符号链接跳转到目标目录之外，实现任意文件写入或覆盖。该漏洞影响 tar-fs 1.16.4 之前、2.1.2 之前以及 3.0.8 之前的多个版本，CVSS 评分 7.5，危害等级高危。用户需升级至修复版本以防范此风险。"
published = "2025-03-27T17:15:53.250"
remediation = "将 `tar-fs` 升级到修复版本：1.x 分支升级到 ≥1.16.4，2.x 分支升级到 ≥2.1.2，3.x 分支升级到 ≥3.0.8。如暂时无法升级，在解压不可信 tar 文件前对文件路径进行校验，拒绝包含 `../` 及符号链接指向目标目录之外的条目。"
score = 7.5
severity = "HIGH"
sources = ["msrc"]
title = "tar-fs tar文件解压路径遍历与任意文件写入漏洞"
updated = "2026-06-17T07:00:44.367"

