[basic]
description = "Kerberos 5 的 krshd 守护进程存在缓冲区溢出漏洞，未经认证的远程攻击者可向目标系统发送特制请求触发该漏洞，成功利用可在目标主机上获取 root 权限。该漏洞影响 Kerberos 5 协议实现，攻击者无需任何凭据即可利用，危害极高，CVSS 评分 10.0。建议立即升级至修复版本或安装安全补丁。"
published = "2000-05-16T04:00:00.000"
remediation = "升级 MIT Kerberos 5 至已修复版本（krb5-1.2.1 及以上），或应用厂商安全补丁。如无法升级，建议禁用 krshd 服务（注释 /etc/inetd.conf 中 krshd 条目并重启 inetd），并在防火墙限制对 544 端口（krcmd/krshd）的访问。"
score = 10
severity = "CRITICAL"
sources = ["cve"]
title = "MIT Kerberos 5 缓冲区溢出漏洞"
updated = "2026-06-16T21:51:37.100"

