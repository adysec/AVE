[basic]
description = "Atlassian JIRA 3.7.3 的 Rainbow.Zen 扩展中存在跨站脚本（XSS）安全漏洞，该漏洞位于 jira/secure/BrowseProject.jspa 页面中。远程攻击者可通过向 id 参数注入恶意 Web 脚本或 HTML 代码实施攻击，当管理员或其他用户访问被篡改的页面时，恶意脚本将在浏览器中执行，导致敏感信息泄露（如 Session Cookie 窃取）或页面内容篡改。攻击无需身份认证，仅需诱使用户访问特制 URL 即可触发。Atlassian 已发布修复版本，建议升级至 3.7.4 或更高版本。"
published = "2007-02-12T20:28:00.000"
remediation = "立即从 JIRA 服务器中移除或禁用 Rainbow.Zen 扩展，以消除通过 `id` 参数注入脚本的攻击面。如仍需类似功能，替换为官方受支持的 JIRA 插件。在 Web 应用防火墙（WAF）层面添加规则，对 `/jira/secure/BrowseProject.jspa` 的 `id` 参数进行输入过滤，拦截 `<script>`、`onerror=` 等 XSS 载荷。如果无法移除该扩展，修改源码对 `id` 参数做严格的 HTML 实体编码输出。"
score = 6.8
severity = "MEDIUM"
sources = ["nuclei"]
title = "Atlassian JIRA 跨站脚本漏洞"
updated = "2026-06-16T22:36:28.833"

