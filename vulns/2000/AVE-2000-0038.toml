[basic]
description = "MySQL 3.22.27/3.22.29/3.23.8 版本存在权限管理缺陷，拥有 GRANT 权限的本地用户可利用 GRANT 语句修改任意 MySQL 用户的密码。攻击者只需具备本地数据库访问权限和 GRANT 授权即可触发该漏洞，无需额外认证。成功利用后可导致权限提升，获取其他用户的数据库访问控制权，影响数据库的完整性和机密性。该漏洞 CVSS 评分 6.4，危害等级中等。"
published = "2000-01-11T05:00:00.000"
remediation = "升级 MySQL 到 3.23.9 及以上版本，此漏洞已在后续版本中修复；限制 GRANT 权限仅授予受信任的管理员用户，避免将 GRANT 权限赋予普通用户；对于仍运行旧版本的系统，建议迁移至受支持的 MySQL 5.7 或 8.0 最新版本，并遵循最小权限原则分配用户权限。"
score = 6.4
severity = "MEDIUM"
sources = ["avd"]
title = "MySQL GRANT 全局密码修改漏洞"
updated = "2026-06-16T21:50:53.257"

