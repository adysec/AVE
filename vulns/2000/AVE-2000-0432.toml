[basic]
description = "CIFS Computer Browser 服务在处理特定网络帧时存在逻辑缺陷，远程攻击者无需身份认证即可向主浏览器发送特制的 ResetBrowser 帧，导致主浏览器服务崩溃或停止响应，造成拒绝服务。该漏洞影响 Windows 95/98/NT 4.0/2000 系统，CVSS 评分 5.0，危害等级中危。"
published = "2000-05-25T04:00:00.000"
remediation = "安装 Windows 2000 Service Pack 1 或更高版本（SP1 已修复此漏洞）；Windows NT 4.0 用户应升级至 Service Pack 6a 并安装安全汇总更新；Windows 95/98 用户应安装官方发布的 CIFS 浏览器安全更新。如无法升级，可在防火墙或路由器层面禁用 UDP 137-138 端口和 TCP 139、445 端口，阻止外部对 NetBIOS 和 SMB 服务的访问，作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Microsoft Windows CIFS Computer Browser 拒绝服务漏洞"
updated = "2026-06-16T21:51:38.717"

