[basic]
description = "Cart32 购物车系统中存在隐藏表单字段，导致远程攻击者可绕过权限验证，修改用户的敏感购买信息，如商品价格、数量及支付方式等，进而导致经济损失和数据篡改。该漏洞通过操纵未验证的表单参数实现，攻击者无需身份验证即可访问购物车操作功能。"
published = "2000-02-01"
remediation = "升级到 Cart32 2.2 或以上版本，移除隐藏表单字段，验证所有用户输入，使用服务端验证商品价格和订单计算，不信任客户端提交的数据。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "Cart32 购物车系统隐藏表单字段安全漏洞"
updated = "2000-02-01"

