[basic]
description = "Microsoft Index Server 2.0 存在源代码泄露漏洞，远程攻击者通过在 CiWebHitsFile 参数中的文件名后附加 %20 向 null.htw URL 发送特制请求，可导致服务器返回 ASP 文件的源代码而非执行结果。攻击者无需认证即可利用，进而获取敏感信息如数据库连接字符串、后台路径等，影响 Microsoft Index Server 2.0 版本。"
published = "2000-03-31T05:00:00.000"
remediation = "安装 Microsoft 安全公告 MS00-006 提供的补丁（Index Server 2.0 可从下载中心获取 Intel 或 Alpha 版本补丁；Windows 2000 Indexing Service 可从下载中心获取对应补丁）。如无法安装补丁，可在 IIS 管理器中移除 .htw 应用程序映射以禁用 WebHits 功能，防止 null.htw 被利用读取 ASP 源码。由于 Windows NT 4.0 及 Windows 2000 均已停止支持，建议升级至 Windows Server 2012 或更高版本。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Microsoft Index Server 2.0 ASP 源文件泄露漏洞"
updated = "2026-06-16T21:51:26.027"

