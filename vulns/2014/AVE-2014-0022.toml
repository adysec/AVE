[basic]
description = "Elasticsearch 1.2 之前版本默认启用动态脚本功能，远程攻击者可通过向 _search API 的 source 参数提交特制的 MVEL 表达式或 Java 代码，绕过安全限制实现远程代码执行。该漏洞影响所有未禁用动态脚本的 Elasticsearch 1.2 以下版本，CVSS 评分 8.1，危害等级高。攻击者无需认证即可利用该漏洞完全控制目标服务器，前提是 Elasticsearch 未运行在独立虚拟机中。官方已在 1.2 版本中将动态脚本默认禁用修复此漏洞。"
published = "2014-07-28T19:55:04.490"
remediation = "升级 Elasticsearch 至 1.2 或更高版本，该版本默认禁用动态脚本。如无法升级，在 elasticsearch.yml 中设置 `script.disable: true` 或 `script.groovy.sandbox.enabled: false` 禁用 MVEL 脚本执行，并确保 Elasticsearch 运行在独立虚拟机中。同时限制 _search API 的 source 参数访问权限。"
score = 8.1
severity = "HIGH"
sources = ["kev"]
title = "Elasticsearch 远程代码执行漏洞"
updated = "2026-06-17T00:07:37.603"

