[basic]
description = "Nosque Workshop 开发的 MsgCore 1.9（原名 Super Mail Transfer Package，SMTP）存在内存泄漏漏洞。远程攻击者无需身份认证，通过在同一个 SMTP 会话中重复发送 HELO、MAIL FROM、RCPT TO 和 DATA 命令，即可消耗目标服务器大量内存资源，最终导致 SMTP 服务崩溃，造成拒绝服务。该漏洞影响 MsgCore 1.9 版本，CVSS 评分 5.0，危害等级中危。"
published = "2000-01-13T05:00:00.000"
remediation = "立即停止使用 Nosque MsgCore 1.9 及更早版本，该产品已停止维护且无安全更新。建议迁移至主流维护的 SMTP 服务器软件（如 Postfix 3.x、Exim 4.x），并在 SMTP 服务端配置连接速率限制和会话超时参数，限制单会话内命令重复次数，同时部署入侵检测规则监控异常 SMTP 命令序列。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Nosque MsgCore 远程拒绝服务漏洞"
updated = "2026-06-16T21:50:56.910"

