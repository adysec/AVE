[basic]
description = "Internet Security Systems（ISS）BlackICE 个人防火墙/入侵检测系统在安全级别设置为 Nervous 或更低时，存在流量过滤绕过漏洞。Back Orifice 是一款远程管理工具，常被攻击者用于控制目标系统。受影响的 BlackICE Defender 2.1 及更早版本、BlackICE Pro 2.0.23 及更早版本未能正确识别和拦截 Back Orifice 通信流量，导致远程攻击者可在未授权情况下绕过安全防护，利用 Back Orifice 建立远程控制通道，完全控制目标系统。该漏洞 CVSS 评分 7.5，危害等级高。"
published = "2000-06-22T04:00:00.000"
remediation = "升级 BlackICE Defender 至 2.1 以上版本，或 BlackICE Pro 至 2.0.23 以上版本；同时将安全级别设置为 Paranoid 或更高，避免在 Nervous 及以下级别运行。由于 ISS BlackICE 系列产品已停止维护，建议迁移至受支持的现代端点防护方案（如 IBM Security 系列产品）以获得持续安全更新。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "Internet Security Systems BlackICE 后门检测绕过漏洞"
updated = "2026-06-16T21:52:00.177"

