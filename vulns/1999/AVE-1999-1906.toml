[basic]
description = 'Microsoft IIS 4.0 中的 Index Server 2.0 组件在注册表 AllowedPaths 键的 ContentIndex\Catalogs 子键中存储了被索引目录的物理路径信息。由于该注册表项的权限设置不当，本地及远程攻击者可通过访问注册表获取正在被索引的目录物理路径，从而泄露系统敏感信息。该漏洞影响 IIS 4.0 及配套的 Index Server 2.0 版本，CVSS 评分 7.5，危害等级高。攻击者无需身份认证即可利用此漏洞收集目标系统信息，为后续攻击提供铺垫。'
published = "1999-03-23T05:00:00.000"
remediation = '升级到 Windows 2000 或更高版本操作系统及对应 IIS 版本，Index Server 2.0 仅在 Windows NT 4.0 Option Pack 中提供，后续版本已修复此问题。如无法升级，应使用 regedt32 将注册表 HKEY_LOCAL_MACHINE\System\CurrentControlSet\Control\ContentIndex\Catalogs 键的权限从 Everyone 读取限制为仅 SYSTEM 和 Administrators 可访问，并移除 ContentIndex 子键下 AllowedPaths 中不必要的物理路径。'
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "Microsoft Index Server 物理路径信息泄露漏洞"
updated = "2026-06-16T21:50:21.197"

