[basic]
description = "SGI IRIX 6.2 系统中的 midikeys 和 soundplayer 程序存在本地权限提升漏洞。本地攻击者可通过在 .wav 文件中嵌入 shell 元字符，当 midikeys 程序处理该恶意音频文件时，soundplayer 会执行其中的 shell 命令，从而使攻击者获取 root 权限。该漏洞影响 SGI IRIX 6.2 版本，CVSS 评分 7.2，危害等级高。攻击者需拥有本地访问权限，利用难度较低。"
published = "1999-12-31T05:00:00.000"
remediation = "升级 SGI IRIX 至 6.3 或更高版本以修复 soundplayer/midikeys 程序对 shell 元字符过滤不严的问题。如无法升级，执行 `chmod u-s /usr/sbin/soundplayer /usr/sbin/midikeys` 移除 setuid 位，或限制可执行权限仅授予受信任用户组作为临时缓解措施。"
score = 7.2
severity = "HIGH"
sources = ["exploitdb"]
title = "SGI IRIX 6.2 midikeys/soundplayer 本地权限提升漏洞"
updated = "2026-06-16T21:50:49.387"

