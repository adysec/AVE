[basic]
description = "Bytes Interactive Web Shopper 购物车程序（shopper.cgi）1.0 及 2.0 版本存在目录遍历漏洞。远程攻击者无需认证即可通过向 newpage 参数提交包含 `..`（点点）的恶意路径，突破目录限制读取服务器上任意文件，如密码文件、配置文件等敏感信息，导致信息泄露。该漏洞利用方式简单，无需特殊权限，危害较大。"
published = "2000-12-19T05:00:00.000"
remediation = "Bytes Interactive Web Shopper 已停止维护且无官方补丁。建议立即迁移至现代受支持的购物车系统（如 WooCommerce、Magento）。临时缓解措施：在 Apache/Nginx 中配置重写规则，拦截 shopper.cgi 的 newpage 参数中包含 `..` 或 `%2e%2e` 的请求；限制 Web 服务器对 shopper.cgi 所在目录的文件读取权限；若业务上不再使用，直接删除 shopper.cgi 脚本。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Bytes Interactive Web Shopper 目录遍历漏洞"
updated = "2026-06-16T21:52:46.397"

