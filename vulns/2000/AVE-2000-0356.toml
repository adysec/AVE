[basic]
description = "CyberPatrol 的 cyberdaemon 组件中存在缓冲区溢出漏洞，该服务运行于 Gauntlet 防火墙（4.1/4.2/5.0）、WebShield E-ppliance（100.0/300.0）以及 IRIX 6.5.x 系统中。远程攻击者无需身份认证即可向目标发送特制请求触发溢出，导致服务拒绝响应或执行任意命令。该漏洞影响范围涉及多家厂商的多款安全产品，危害严重。"
published = "2000-05-18T04:00:00.000"
remediation = "该漏洞影响 Gauntlet Firewall 4.1/4.2/5.0、WebShield E-ppliance 100.0/300.0 及 IRIX 6.5.x 中的 CyberPatrol 守护进程 cyberdaemon。厂商 PGP 和 TIS 已发布安全公告并提供补丁，建议立即升级到修复版本。由于上述产品均已停止技术支持，强烈建议迁移至受支持的最新防火墙产品。临时缓解措施：在网络边界防火墙限制对 cyberdaemon 服务端口（默认 TCP 端口）的访问，仅允许可信 IP 连接。"
score = 10
severity = "CRITICAL"
sources = ["exploitdb"]
title = "CyberPatrol cyberdaemon 远程缓冲区溢出漏洞"
updated = "2026-06-16T21:51:43.900"

