[basic]
description = "3Com HiPerARC 路由器 4.0 至 4.2.29 版本的 Telnet 服务存在拒绝服务漏洞。该漏洞源于设备对 telnet 协议中 IAC（Interpret As Command）控制数据包的处理缺陷，远程攻击者无需身份认证，通过向目标设备 Telnet 端口发送大量 IAC 数据包洪流，可触发设备处理崩溃并强制重启，导致正常服务不可用。CVSS 评分 5.0，危害等级中等。"
published = "1999-08-12T04:00:00.000"
remediation = "升级 3Com HiperARC 至 4.2.29 之后的安全版本；如厂商已停止支持，建议在边界防火墙上限制 telnet 端口（23/TCP）仅允许受信 IP 访问，或直接禁用 telnet 服务改用 SSH 管理，同时配置入侵检测系统对 IAC 洪泛攻击进行告警和阻断。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "3Com HiPerARC Telnet服务IAC泛洪拒绝服务漏洞"
updated = "2026-06-16T21:50:13.440"

