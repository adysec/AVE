[basic]
description = "OpenClaw 个人 AI 助手存在服务端请求伪造（SSRF）防护绕过漏洞。攻击者可通过构造完整格式的 IPv4 映射 IPv6 地址（如 `0:0:0:0:0:ffff:7f00:1`，即 `127.0.0.1`）绕过 SSRF 防护机制，向本应被拦截的环回地址、私有网络或链路本地元数据端点发起请求，可能导致敏感信息泄露或内网探测。该漏洞影响 2026.2.14 之前的版本，CVSS 评分 7.5，危害等级高。开发者已在 2026.2.14 版本中修复此漏洞。"
published = "2026-02-19T23:16:25.653"
remediation = "升级到 OpenClaw 2026.2.14 及以上版本。如无法立即升级，可在网络层或应用层防火墙添加规则，拦截包含 0:0:0:0:0:ffff: 前缀的 IPv4-mapped IPv6 请求目标，并限制出站请求仅允许白名单目标地址。同时审查 SSRF 防护逻辑，确保 IPv6 字面量也被正确解析和过滤。"
score = 7.5
severity = "HIGH"
sources = ["hwpoc"]
title = "OpenClaw SSRF 防护绕过漏洞"
updated = "2026-06-17T10:26:05.667"

