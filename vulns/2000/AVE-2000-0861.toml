[basic]
description = "Mailman 2.0beta3 和 2.0beta4 版本中的 wrapper 程序存在格式化字符串漏洞，由于未能正确过滤不可信的格式化字符串参数，本地攻击者可通过向 wrapper 程序传递特制的格式化字符串触发该漏洞，导致权限提升。该漏洞影响 Mailman 2.0beta3 及 2.0beta4 版本，CVSS 评分 4.6，危害等级中危。建议升级至修复版本以消除此安全风险。"
published = "2000-10-20T04:00:00.000"
remediation = "升级至 Mailman 2.0 正式版（2.0.0 及以上）或最新稳定版本（2.1.x / 3.x）。如无法升级，移除 setuid wrapper 执行权限：chmod u-s /usr/lib/mailman/bin/mailmanctl，并限制本地非信任用户登录系统作为临时缓解措施。"
score = 4.6
severity = "MEDIUM"
sources = ["redhat"]
title = "GNU Mailman wrapper 程序格式化字符串本地权限提升漏洞"
updated = "2026-06-16T21:52:17.943"

