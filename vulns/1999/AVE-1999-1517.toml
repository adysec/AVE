[basic]
description = "DIT TransferPro 设备驱动在安装时将设备权限设置为全局可读可写，本地攻击者可利用此权限配置缺陷通过 ff 设备驱动直接访问磁盘，导致磁盘数据被破坏或敏感信息泄露。该漏洞影响 DIT TransferPro 设备，需要攻击者拥有本地访问权限方可利用，CVSS 评分 2.1，危害等级低。"
published = "1998-01-05T05:00:00.000"
remediation = '修复 TransferPro 安装后产生的设备文件权限问题：以 root 身份执行 chmod 600 /dev/ff* 限制仅 root 可读写；编辑 /etc/system 添加 "set reserved_device_perms=0600" 确保重启后权限不还原；修改 TransferPro 安装脚本，将设备创建时默认权限从 666 改为 600 或 640，防止后续安装再次出现世界可写设备。'
score = 2.1
severity = "LOW"
sources = ["avd"]
title = "DIT TransferPro 设备驱动权限配置不当漏洞"
updated = "2026-06-16T21:50:25.340"

