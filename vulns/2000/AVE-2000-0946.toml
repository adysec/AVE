[basic]
description = "Bardon Data Systems WinU 5.x 及更早版本使用弱加密算法存储其配置密码，本地攻击者可通过分析加密后的密码文件，利用其加密强度不足的缺陷还原出明文密码，从而获取系统管理权限。该漏洞攻击复杂度低，无需身份认证即可利用，影响 WinU 全系列早期版本。"
published = "2000-10-20T04:00:00.000"
remediation = "立即升级 WinU 至 6.0 或更高版本（如厂商已停止维护，建议迁移至其他密码管理工具）。若无法升级，限制本地非授权用户对 WinU 配置文件的读取权限（如 Windows ACL 仅允许 Administrators 组访问），并避免在多用户共享系统上使用该软件存储敏感密码。"
score = 4.6
severity = "MEDIUM"
sources = ["cve"]
title = "Bardon Data Systems WinU 密码弱加密漏洞"
updated = "2026-06-16T21:52:29.067"

