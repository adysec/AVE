[basic]
description = "SunOS 4.1.1 中的 TIOCCONS 接口未正确校验用户权限，本地用户可通过重定向控制台输入输出实现权限提升。该漏洞影响 SunOS 4.1.1 系统，需本地用户权限即可利用，攻击者可通过恶意重定向控制台输入输出获取提升权限，CVSS 评分 7.2，属于高危本地提权漏洞。"
published = "1990-12-20T05:00:00.000"
remediation = "升级到 SunOS 4.1.3 或更高版本（或迁移至 Solaris 2.x 系列），该版本已修复 TIOCCONS 权限检查缺陷。如无法立即升级，可通过停用 /dev/console 重定向功能、限制普通用户对 /dev/console 的访问权限，并将控制台访问限制在受信任的 tty 设备上作为临时缓解措施。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
