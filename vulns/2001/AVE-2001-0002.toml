[basic]
description = "SSH-1 协议在会话密钥协商过程中存在设计缺陷，远程攻击者可通过中间人攻击方式伪造与目标服务器相同的 Session ID，同时使用弱公钥对替换合法公钥，从而计算出对应的私钥。攻击者利用已破解的密钥对即可劫持会话并伪装成目标服务器，实现对加密通信的窃听与篡改。该漏洞影响所有使用 SSH-1 协议的系统与客户端，CVSS 评分 7.5，危害等级高。建议升级至 SSH-2 协议以彻底规避此漏洞。"
published = "2001-01-18T05:00:00.000"
remediation = "禁用 SSH-1 协议，仅使用 SSH-2。检查服务器 OpenSSH 配置（/etc/ssh/sshd_config），将 Protocol 设置为 2，并重启 sshd 服务。客户端也需禁用 SSH-1 兼容模式（Protocol 2）。对于老旧系统无法升级 OpenSSH 的，建议升级到支持 SSH-2 的版本（如 OpenSSH 3.4p1 及以上）。"
score = 7.5
severity = "HIGH"
sources = ["nuclei"]
title = "SSH SSH-1协议私钥计算漏洞"
updated = "2026-06-16T21:56:20.683"

