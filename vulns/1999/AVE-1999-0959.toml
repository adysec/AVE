[basic]
description = "Allaire ColdFusion 中的 mainframeset.cfm 页面存在安全绕过漏洞。该页面提供的 HTTP 客户端功能允许远程攻击者提交目标 URL，服务器会代表攻击者向内网其他端口上的 Web 页面发起请求，由于请求来源被伪造为本地回环地址（localhost），因此可以绕过基于 IP 地址或端口的访问控制策略。攻击者无需身份认证即可利用此漏洞扫描内网端口、访问内部受限资源，导致敏感信息泄露或进一步的横向攻击。CVSS 评分 7.5，危害等级高。"
published = "1999-12-31T05:00:00.000"
remediation = "升级至 ColdFusion 5.0 或更高版本（该版本修复了 mainframeset.cfm SSRF 绕过问题）；若无法升级，在 Web 服务器（IIS/Apache）层面通过 URL 重写规则或访问控制列表（ACL）禁止外部请求访问 /mainframeset.cfm 路径；同时在防火墙上限制应用服务器对外部端口的出站连接，防止被利用为内网探测代理。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "Adobe ColdFusion HTTP客户端安全绕过漏洞"
updated = "2026-06-16T21:49:46.283"

