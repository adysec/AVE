[basic]
description = "Kerberos 5 的 krb425_conv_principal 函数存在缓冲区溢出漏洞，远程攻击者可通过向目标系统发送特制的认证请求触发该漏洞，导致缓冲区溢出，进而实现任意代码执行并以 root 权限控制目标系统。该漏洞影响早期 Kerberos 5 实现，CVSS 评分 10.0，危害等级严重。建议用户及时升级至修复版本。"
published = "2000-05-16"
remediation = "升级 MIT Kerberos 5 至 1.1.1 或更高版本，该版本修复了 krb425_conv_principal 函数中的缓冲区溢出问题。如无法立即升级，可在服务端防火墙限制对 Kerberos 服务端口（默认 88/udp 和 749/tcp）的访问，仅允许可信网络段连接。"
score = 10.0
severity = "CRITICAL"
sources = ["cve"]
title = "MIT Kerberos 5 远程缓冲区溢出漏洞"
updated = "2026-06-16"

