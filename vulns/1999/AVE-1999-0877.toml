[basic]
description = "LBL tcpdump 3.4a 版本的 ip_print 处理函数存在拒绝服务漏洞，远程攻击者可通过发送零长度头部的特制数据包，触发 tcpdump 在打印数据包时陷入无限循环并导致核心转储，从而实施拒绝服务攻击。该漏洞影响 LBL tcpdump 3.4a 版本，CVSS 评分 7.5，属高危漏洞。攻击者无需认证即可远程发送恶意数据包触发漏洞，导致 tcpdump 进程崩溃并产生核心转储文件，造成服务拒绝。ExploitDB 已公开相关利用代码（tcpdump 3.4 - Protocol Four / Zero Header Length）。"
published = "2001-11-28T05:00:00.000"
remediation = "建议将 LBL tcpdump 升级至 3.4a7 及以上修复版本（或迁移至 tcpdump 3.5 以上版本），该版本修复了 ip_print 对零长度头部数据包的无限循环缺陷。如无法立即升级，可在抓包主机的前端防火墙或路由器上过滤畸形 IP 包，并避免在非信任网络接口上以 root 权限运行 tcpdump 作为临时缓解措施。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
