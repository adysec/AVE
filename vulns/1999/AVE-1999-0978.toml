[basic]
description = "Windows NT 4.0 在处理令牌环网络中的源路由数据时存在拒绝服务漏洞。远程攻击者无需身份认证，向目标系统发送特制的 Routing Information Field（RIF）数据包，构造跳数超过 7 的冗余路由条目，或包含重复的 Token Ring ID，即可触发内核错误，导致目标系统蓝屏崩溃。该漏洞影响 Microsoft Windows NT 4.0 系列操作系统，攻击成本低、无需用户交互，属于中等危害的拒绝服务漏洞。"
published = "1999-12-31T05:00:00.000"
remediation = "根本修复方案：由于 Windows NT 4.0 已终止支持，建议升级至受支持的 Windows Server 版本（如 Windows Server 2019 或 2022）。临时缓解措施：在网络边界防火墙或路由器上配置 ACL 规则，丢弃源路由选项（Source Routing）数据包，阻止含有异常 RIF 跳数（>7）或重复 Token Ring ID 的 Token Ring 源路由帧进入内部网络。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Microsoft Windows NT 4.0 Routing Information Field 拒绝服务漏洞"
updated = "2026-06-16T21:49:47.313"

