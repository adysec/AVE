[basic]
description = "CPIO 在 FreeBSD 2.1.0、Debian GNU/Linux 3.0 及其他操作系统上使用 `-O`（归档）或 `-F` 选项创建文件时采用 umask 值为 0 的权限策略，导致生成的文件权限为 0666（全局可读写）。本地攻击者可利用此缺陷读取或覆盖任意用户创建的 CPIO 归档文件中的内容，造成敏感信息泄露或数据破坏。该漏洞危害等级较低（CVSS 2.1），利用需要本地访问权限。"
published = "1996-07-16T04:00:00.000"
remediation = "升级 cpio 至 2.6 及以上版本，或手动在执行 cpio -O/-F 命令前执行 umask 022 设置默认文件创建掩码。如无法升级，应避免在多用户环境下使用 -O 和 -F 选项创建归档文件。"
score = 2.1
severity = "LOW"
sources = ["avd"]
title = "CPIO 不安全文件创建漏洞"
updated = "2026-06-16T21:50:44.777"

