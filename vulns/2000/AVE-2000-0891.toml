[basic]
description = "mopd（Maintenance Operations Protocol 加载器守护进程）存在缓冲区溢出漏洞，远程攻击者可通过向目标系统的 mopd 服务发送超长文件名的请求触发缓冲区溢出，导致任意代码执行。该漏洞影响运行 mopd 服务的 NetBSD 等 Unix-like 系统，攻击者无需身份认证即可远程利用，CVSS 评分 7.5，危害等级高。"
published = "2000-10-20T04:00:00.000"
remediation = "建议立即升级 mopd 至已修复版本：NetBSD 升级至 1.4.3 或更新版本（补丁见 cvsweb.netbsd.org 的 process.c r1.8）；OpenBSD 应用 2.7 版 mopd 补丁（见 openbsd.org/errata.html#mopd）；FreeBSD 安装 2000-08 月安全更新；Red Hat Linux 6.x 应用 RHSA-2000-050 提供的 RPM 更新。如无法升级，可在防火墙禁用 tcp/udp 端口 152（mopd 默认端口）或停止 mopd 服务以临时缓解。"
score = 7.5
severity = "HIGH"
sources = ["redhat"]
title = "NetBSD mopd 缓冲区溢出远程代码执行漏洞"
updated = "2026-06-16T21:52:24.187"

