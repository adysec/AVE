[basic]
description = "Linux gpm 程序在处理 /dev/gpmctl 设备时存在拒绝服务漏洞，本地攻击者可通过向该设备发送大量 STREAM 套接字连接请求，导致系统资源耗尽，造成拒绝服务。该漏洞影响 OpenLinux 2.3/2.4、RedHat 6.0/6.1、SCO eServer 2.3 等版本，CVSS 评分 2.1，危害等级低。攻击者需具有本地系统访问权限方可利用。"
published = "1999-11-23T05:00:00.000"
remediation = "升级 gpm 至 1.19 及以上版本（该版本修复了 /dev/gpmctl 设备文件对 STREAM socket 洪泛的处理逻辑）。如无法升级，可通过 chmod 600 /dev/gpmctl 限制设备文件仅 root 可访问，或使用 iptables 限制本地 loopback 接口的异常连接作为临时缓解措施。"
score = 2.1
severity = "LOW"
sources = ["redhat"]
title = "Linux GPM 本地拒绝服务漏洞"
updated = "2026-06-16T21:51:56.170"

