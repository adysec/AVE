[basic]
description = "Linux 内核 2.0.x 及 2.1.x 版本在 AMD K6 处理器上存在拒绝服务漏洞。本地攻击者可通过执行特定指令序列（涉及访问段外地址）触发处理器异常，导致系统崩溃。该漏洞影响运行上述内核版本的 Linux 系统，需本地用户权限才能利用，CVSS 评分 7.2，危害等级高。目前无官方补丁，建议升级至更高版本内核。"
published = "1998-06-22T04:00:00.000"
remediation = "升级 Linux 内核至 2.2.0 及以上版本，该版本已修复 AMD K6 处理器特定指令序列导致系统崩溃的问题。若无法升级内核，可应用内核社区提供的 AMD K6 处理器兼容性补丁（如 k6-fix 补丁），或在 BIOS 中禁用 AMD K6 的写分配缓存功能作为临时缓解措施。"
score = 7.2
severity = "HIGH"
sources = ["epss"]
title = "Linux Kernel AMD K6 处理器本地拒绝服务漏洞"
updated = "2026-06-16T21:50:26.983"

