[basic]
description = "金和OA协同办公系统的 DailyTaskListInfo.aspx 页面未对用户输入进行有效的过滤和参数化处理，存在 SQL 注入漏洞。未经身份认证的远程攻击者可通过向目标页面构造恶意 SQL 查询参数，从而窃取数据库中的敏感信息（如管理员账号密码、员工数据等），甚至可能获取服务器控制权限。该漏洞影响金和OA多个版本，攻击复杂度低，无需特殊权限即可利用。"
published = "0725"
remediation = "建议升级金和OA至官方最新版本（v6.x及以上），该版本已修复DailyTaskListInfo.aspx接口的SQL注入漏洞。如无法立即升级，可在Web应用防火墙（WAF）侧添加规则，对DailyTaskListInfo.aspx的传入参数进行SQL关键字过滤；同时修改IIS配置，禁用该页面的异常请求参数长度，并对数据库连接账户降权至仅执行存储过程权限作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "金和 金和OA DailyTaskListInfo.aspx SQL注入漏洞"
updated = "0725"

