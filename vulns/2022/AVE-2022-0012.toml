[basic]
description = "libxml2 的 xmlXIncludeAddNode 函数在处理 XInclude 包含关系时存在释放后重用漏洞（CWE-416）。当应用程序使用 libxml2 解析特制的 XML 文档时，由于内存管理不当，攻击者可通过构造恶意的 XML/XInclude 内容触发已释放内存的访问，导致拒绝服务或潜在的内存信息泄露。该漏洞影响 libxml2 2.11.0 之前的所有版本，CVSS 评分 8.1，危害等级高。建议用户升级至 libxml2 2.11.0 或更高版本以修复此漏洞。"
published = "2025-01-26T06:15:21.000"
remediation = "升级 libxml2 至 2.11.0 或更高版本，该版本修复了 xmlXIncludeAddNode 中的释放后使用漏洞。如无法立即升级，可禁用 XML XInclude 功能（设置环境变量 XML_XINCLUDE_DISABLE=1）作为临时缓解措施。"
score = 8.1
severity = "HIGH"
sources = ["msrc"]
title = "libxml2 xmlXIncludeAddNode 使用后释放漏洞"
updated = "2026-06-17T05:16:55.400"

