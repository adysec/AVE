[basic]
description = "Netris 0.5 及之前版本（0.52 以下）的 -w（等待）选项存在远程内存破坏漏洞。攻击者无需身份认证，只需向目标服务器的 9284 端口发送特制的超长字符串，即可触发缓冲区溢出，导致 netris 服务进程崩溃，造成拒绝服务。该漏洞影响 netris 0.3/0.4/0.5 版本，CVSS 评分 5.0，危害等级中危。"
published = "2003-08-27T04:00:00.000"
remediation = "升级 netris 至 0.52 或更高版本，该版本修复了通过向 9284 端口发送超长字符串导致服务崩溃的拒绝服务漏洞。如无法升级，建议在防火墙上限制对 9284 端口的公网访问，或避免使用 -w（wait）选项启动服务。"
score = 5
severity = "MEDIUM"
sources = ["osv"]
title = "netris 远程内存破坏拒绝服务漏洞"
updated = "2026-06-16T21:59:33.947"

