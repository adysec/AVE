[basic]
description = "Linux 内核 KVM 子系统的 x86 模块在处理客户机页表项（PTE）的访问/脏（A/D）位更新时存在缺陷。KVM 原本通过将客户机 PTE 映射到内核地址空间来更新 A/D 位，但 VM_PFNMAP 路径错误地假设 vm_pgoff 是映射 VMA 范围的基 PFN，这导致访问随机物理页帧号（PFN），可能造成敏感内存信息泄露。本地攻击者可利用此漏洞获取主机或其他虚拟机敏感数据。该漏洞影响 Linux 内核多个版本，CVSS 评分 5.5，危害等级中危。"
published = "2025-02-26T07:01:31.970"
remediation = "建议将 Linux 内核升级至 5.17.13/5.18.2 或更高版本（5.19+ 已包含修复）。对于自定义内核编译环境，可通过 git cherry-pick 合入以下三个补丁之一：38b888911e8d（5.17-stable）、8089e5e1d184（5.18-stable）或 f122dfe44768（主线）。若无法立即升级，避免在 KVM 场景下使用 VM_PFNMAP 映射（如 /dev/mem 之外的后端内存）作为临时缓解措施。"
score = 5.5
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux KVM 访客PTE A/D位更新内存越界访问漏洞"
updated = "2026-06-17T05:18:27.403"

