[basic]
description = "圣博润堡垒机存在远程代码执行漏洞，攻击者可通过向堡垒机管理后台发送特制的恶意请求，利用系统对用户输入过滤不严的缺陷注入恶意命令，从而在服务器端实现任意代码执行。成功利用该漏洞可完全控制受影响堡垒机系统，进而威胁通过该堡垒机管理的所有内部资产。该漏洞影响圣博润堡垒机多款型号及版本，攻击无需认证即可触发。"
published = "2025-07-03"
remediation = "立即联系圣博润官方获取最新安全补丁或升级运维安全管理系统至最新版本；如无法立即升级，在防火墙/安全组策略中严格限制堡垒机管理端口的访问来源IP，仅允许运维管理网段访问，同时禁用堡垒机Web管理页面的公网暴露，并开启系统日志审计以监控异常命令执行行为。"
