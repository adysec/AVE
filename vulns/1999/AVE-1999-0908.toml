[basic]
description = "RSAREF 2.0 是 RSA Security 发布的加密参考实现库，其加密和解密函数中存在缓冲区溢出漏洞。攻击者可通过向受影响函数传递特制输入数据触发栈溢出，导致拒绝服务或任意代码执行。由于该库被广泛集成到各类安全应用中，漏洞影响范围较大。"
published = "1999-12-01"
remediation = "RSAREF 2.0 已停止维护，建议用户迁移至更现代的加密库如 OpenSSL 或 Bouncy Castle，避免使用存在已知缓冲区溢出漏洞的旧版本 RSAREF 库。"
score = 10.0
severity = "CRITICAL"
sources = ["cve"]
title = "RSA Security RSAREF 2.0 加密解密函数缓冲区溢出漏洞"
updated = "1999-12-01"

