[info]
author = "ave"
description = "Solaris 7.0 chkperm 工具因未正确校验 VMSYS 环境变量路径安全性，本地攻击者可通过设置 VMSYS 并借助符号链接劫持读取 bin 权限文件实现本地权限提升。本 PoC 通过检查目标系统是否存在 chkperm 二进制以验证漏洞环境。"
id = "POC-AVE-1999-0659"
name = "CVE-1999-0860 chkperm 本地权限提升 PoC"
severity = "low"
tags = ["ave-1999-0659"]
vuln_id = [
    "CVE-1999-0860",
    "AVE-1999-0659",
]

[poc]
logic = "all"

[[poc.requests]]
path = "/usr/bin/chkperm"
protocol = "file"

[[poc.requests.matchers]]
expect = true
part = "body"
regex = ".+"
type = "regex"
