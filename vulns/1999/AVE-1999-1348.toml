[basic]
description = "HP Vue 3.0 图形用户界面环境存在权限提升漏洞，本地攻击者可通过利用 Vue 组件中的缺陷获取 root 权限。该漏洞影响 HP 9.x 系列操作系统，攻击者需拥有本地系统访问权限方可利用，无需身份认证即可提权至超级用户。HP 已发布补丁 PHSS_4038、PHSS_4055 和 PHSS_4066 修复此问题。"
published = "1994-05-18T04:00:00.000"
remediation = "立即安装 HP 发布的补丁 PHSS_4038、PHSS_4055 和 PHSS_4066，升级 Vue 3.0 至修复版本。如无法打补丁，应限制本地用户对 Vue 程序的执行权限，移除不必要的 setuid 位，并禁用 guest 账户作为临时缓解措施。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "HP Vue 本地权限提升漏洞"
updated = "2026-06-16T21:49:47.570"

