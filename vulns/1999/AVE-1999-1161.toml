[basic]
description = "Macromedia Shockwave 7 的自动更新功能存在信息泄露漏洞。该功能的实现会在执行自动更新检查时，将当前用户的登录密码以及硬盘相关信息以明文或弱保护方式回传至 Macromedia 服务器，而非仅传输必要的版本标识。该漏洞影响安装并启用自动更新功能的 Macromedia Shockwave 7 用户，攻击条件为受害者正常使用软件且处于联网状态，攻击者需能够截获或访问 Macromedia 服务器侧的回传数据方可获取敏感信息。利用方式即通过监听网络流量或控制回传路径，窃取用户密码与硬盘信息，进而可能导致账号失窃与隐私泄露。"
published = "1999-03-11T05:00:00.000"
remediation = "升级 Macromedia Shockwave 到修复该问题的后续版本（建议 8.0 及以上），并在无法升级时通过 Shockwave 设置或注册表项关闭自动更新功能，避免软件在后台将用户密码与硬盘信息回传至 Macromedia 服务器；同时可在网络出口防火墙限制客户端对 macromedia.com 自动更新域名的访问作为临时缓解。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
