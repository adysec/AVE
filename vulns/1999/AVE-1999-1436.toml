[basic]
description = "KDE 桌面环境的文件管理器 kfm 使用 TCP 套接字进行进程间通信，监听本地 TCP 端口处理文件操作命令。远程攻击者可通过向该 TCP 服务器发送 copy 命令，将任意文件复制到目标用户主目录下的 .rhosts 文件，从而获得远程访问权限。攻击条件为攻击者能够通过网络访问 kfm 监听的 TCP 端口，且目标系统上运行了 kfm 服务。"
published = "1997-05-05"
remediation = "将 kfm 的进程间通信方式从 TCP 套接字改为 AF_UNIX 域套接字，并正确设置套接字文件权限为仅本地用户可访问，避免远程攻击者直接连接 kfm 服务端口。"
score = 5.0
severity = "MEDIUM"
sources = ["cve"]
title = "KDE 文件管理器 kfm TCP 服务器远程文件修改漏洞"
updated = "2026-06-16"

