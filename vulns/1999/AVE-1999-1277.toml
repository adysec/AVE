[basic]
description = "Microsoft Internet Explorer 4 的 Internet WebBrowser ActiveX 控件存在安全缺陷，远程恶意网站运营者可在用户访问其网页时，利用该 ActiveX 对象调用剪贴板相关接口，在未经用户明确授权的情况下读取受害者系统剪贴板中的文本内容。该漏洞影响使用 Internet Explorer 4 浏览器并启用了 ActiveX 控件的 Windows 平台用户，攻击条件为受害者需主动访问攻击者控制的恶意网页。利用方式是通过网页中嵌入的脚本调用 WebBrowser 控件的剪贴板访问能力，从而窃取用户复制的敏感信息（如密码、账号等），造成用户隐私泄露。"
published = "1999-02-02T05:00:00.000"
remediation = '升级至 Internet Explorer 5.0 或更高版本，或在 IE 安全设置中禁用"对未标记为可安全执行脚本的 ActiveX 控件初始化并执行脚本"选项。临时缓解：在"Internet 选项 → 安全 → 自定义级别"中将该项设为"禁用"或"提示"，防止恶意网站通过 WebBrowser ActiveX 对象读取剪贴板内容。'
score = 2.6
severity = "LOW"
sources = ["exploitdb"]
