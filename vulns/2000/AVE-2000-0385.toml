[basic]
description = "BeOS 5.0 操作系统 TCP 协议栈在处理分片数据包时存在安全缺陷，当接收到特制 TCP 分片报文时，系统无法正确验证其完整性和有效性，导致内核缓冲区溢出或关键处理流程异常。这种缺陷影响 BeOS 5.0 及其后续版本，支持多种平台，包括旧世代的个人电脑和工作站。由于攻击者无需任何权限即可发起攻击，只要在网络中发送精心构造的、分片过大的 TCP 数据包，即可导致系统资源耗尽，使其无法正常响应用户请求，造成持续的拒绝服务效果。这种漏洞特别危险，因为它可以通过简单的网络流量就能触发系统崩溃，攻击者可以持续向目标发送分片报文，确保系统保持不稳定状态。该漏洞的低攻击复杂度和无需身份验证的特点，进一步放大了其危害性，使其成为攻击者理想的攻击手段。"
published = "2000-05-18T04:00:00.000"
remediation = "升级到修复了TCP分片处理漏洞的BeOS 5.1版本或更高版本（如BeOS 5.1或以后的OS后的板块）。如果无法立即升级，可通过防火墙禁用分片或使用网络ACL控制目标端口（如8080、1234）的TCP端口流量；同时确保网络安全设备支持对大型ICMP分片或TCP分片进行深度报文检查，并配置路由器或防火墙限制超过MTU的分包数量；紧急情况下，还可断开同网段机器的网络连接以遏制分片溢出攻击。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Be 公司 BeOS 5.0 TCP 分片 拒绝服务漏洞"
updated = "2026-06-16T21:51:47.320"

