[basic]
description = "Linux 系统中 man 程序在处理 -S 选项参数时存在堆缓冲区溢出漏洞。当本地用户向 man 命令传递超长的 -S 选项参数时，可触发缓冲区溢出，进而以 man 用户组权限执行任意代码。该漏洞影响 Immunix OS 6.2/7.0、RedHat 5.2/6.2/7.0、S.u.S.E 6.x/7.0/7.1 等多个 Linux 发行版。攻击者需在目标系统上具有本地访问权限才能利用此漏洞，成功利用后可获得与 man 用户组等价的操作权限，可能导致敏感文件被读取或系统被进一步控制。"
published = "2001-09-20T04:00:00.000"
remediation = "立即安装各发行版安全更新：RedHat Linux 5.2/6.2 升级 man 包至 1.5i-0.5x.1/0.6x.1，RedHat 7.0 升级至 1.5i-4，SuSE Linux 6.x/7.0/7.1 及 Immunix OS 6.2/7.0 应用对应厂商安全补丁，执行 rpm -Fvh man*.rpm（RHEL）或 rpm -Uvh man*.rpm（SuSE/Immunix）。如无法立即升级，可临时以 root 执行 chmod -s /usr/bin/man 移除 man 程序的 setgid 位作为缓解措施，或通过 /etc/sudoers 限制普通用户执行 man 程序。"
score = 4.6
severity = "MEDIUM"
sources = ["redhat"]
title = "Linux man 程序 -S 选项堆溢出漏洞"
updated = "2026-06-16T21:54:40.733"

