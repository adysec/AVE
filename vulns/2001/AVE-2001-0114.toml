[basic]
description = "BadBlue Personal Edition 1.02.07 Web 服务器中 ext.dll 组件存在路径泄露漏洞。远程攻击者无需身份认证，直接向目标服务器发送不带任何参数的 ext.dll 请求即可触发该漏洞，服务器返回的错误消息中会泄露服务器文件系统的物理路径信息，为后续攻击提供侦察基础。该漏洞影响 BadBlue 1.02.07 及更早版本，CVSS 评分 6.4，危害等级中危。"
published = "2001-05-03T04:00:00.000"
remediation = "升级 BadBlue 至 1.2.8 及以上版本，该版本修复了 ext.dll 无参数调用时泄露服务器物理路径的问题。如无法升级，可在 Web 服务器前端通过反向代理或 WAF 规则拦截对 /ext.dll 的直接访问请求，并配置 IIS/中间件自定义错误页面以隐藏内部路径信息。"
score = 6.4
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Working Resources BadBlue 完整路径泄露漏洞"
updated = "2026-06-16T21:54:00.720"

