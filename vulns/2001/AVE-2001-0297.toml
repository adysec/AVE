[basic]
description = "WebTrends Enterprise Reporting Server 3.1c 和 3.5 版本的HTTP服务器存在源代码泄露漏洞。未经身份认证的远程攻击者可通过在目标URL的文件名后添加URL编码的空格字符（%20），绕过服务器对脚本文件的保护机制，导致服务器以源代码形式而非正常执行后的结果返回脚本文件内容。攻击者借此可直接获取服务器上脚本的敏感信息，包括数据库连接凭据、业务逻辑代码和内部文件路径等机密数据。该漏洞影响 WebTrends Enterprise Reporting Server 3.1c 和 3.5 版本，攻击面覆盖所有将相关服务暴露在网络中的实例。"
published = "2001-09-20T04:00:00.000"
remediation = "建议立即将受影响服务器升级至 WebTrends Enterprise Reporting Server 更高版本，3.1c 和 3.5 均受影响且官方已发布安全修复。如无法立即升级，可在 WebTrends HTTP Server 的配置中对包含 URL 编码空格（%20）的 CGI 请求返回 403 Forbidden 错误以阻止源文件泄露。同时建议在防火墙或反向代理层对所有 CGI 脚本的请求统一过滤 %20 等控制字符，防止攻击者通过构造含编码空格的 URL 读取脚本源代码。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "WebTrends WebTrends HTTP Server 源代码泄露漏洞"
updated = "2026-06-16T21:54:46.967"

