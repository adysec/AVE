[basic]
description = "Microsoft IIS 4.0 存在域名解析访问限制绕过漏洞（Domain Resolution）。当用户发起初始会话请求时，若其 IP 地址无法成功解析为 DNS 域名，IIS 未能正确实施访问控制策略，导致远程攻击者可通过使用未注册反向 DNS 记录的 IP 地址绕过身份验证和权限限制，获取对受限资源的未授权访问。该漏洞影响 IIS 4.0 版本，CVSS 评分 7.5，危害等级高。攻击者无需认证即可远程利用，建议升级至更高版本或部署应用层防火墙进行缓解。"
published = "1999-12-31T05:00:00.000"
remediation = "升级至 IIS 5.0 或更高版本，该漏洞已在后续版本中修复。如无法升级，可在 IIS 管理器中禁用未解析域名的 IP 访问，或通过配置 URLScan 工具过滤无反向 DNS 记录的请求作为临时缓解措施。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "Microsoft IIS 4.0 域名解析访问限制漏洞"
updated = "2026-06-16T21:50:00.120"

