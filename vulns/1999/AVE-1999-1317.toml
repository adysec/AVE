[basic]
description = "Oracle Webserver（Oracle HTTP Server）2.1 版本在处理 PL/SQL 存储过程请求时存在拒绝服务漏洞。其原理是该服务对客户端发来的 HTTP 请求长度缺乏有效校验，当远程攻击者向运行 PL/SQL 存储过程的接口发送超长（异常长度）的 HTTP GET 请求时，会触发服务端资源耗尽或异常，导致服务崩溃而无法响应后续请求。该漏洞影响范围为部署了 Oracle HTTP Server 2.1 并启用 PL/SQL 存储过程功能的服务器。攻击条件为攻击者无需身份认证，仅需能通过网络访问目标服务器的 HTTP 服务端口即可。利用方式简单，攻击者使用普通 HTTP 客户端构造并发送一个包含超长请求行的 GET 请求即可发起拒绝服务攻击，造成业务中断。"
published = "1997-07-23T04:00:00.000"
remediation = "升级到 Oracle HTTP Server 2.1 的后续补丁版本（Oracle8i 8.1.7 及以上自带的 iAS 1.0.2.2 补丁集）以修复 PL/SQL 处理超长 HTTP 请求时的缺陷；在无法立即升级时，可在 Web 服务器前部署反向代理或负载均衡器，限制单个 GET 请求行长度（如不超过 8KB）并设置请求超时，对超长请求直接拒绝以缓解拒绝服务风险。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Oracle HTTP Server 2.1 PL/SQL 存储过程 长 HTTP 请求 拒绝服务漏洞"
updated = "2026-06-16T21:49:39.280"

