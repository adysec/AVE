[basic]
description = "Apache Fory 的 PyFory 组件 ReduceSerializer 存在反序列化安全漏洞，在处理 reduce-state 恢复和全局名称解析时绕过 DeserializationPolicy 验证钩子。攻击者可通过向使用 PyFory Python-native 模式且关闭 strict mode 的应用发送特制反序列化数据，绕过策略限制加载不安全类或函数，导致远程代码执行。该漏洞影响 Apache Fory 1.0.0 之前版本，CVSS 评分 9.8，危害等级严重。"
published = "2026-05-21T17:16:21.857"
remediation = "升级 Apache Fory 至 1.0.0 及以上版本，该版本在 ReduceSerializer 路径中强制实施 DeserializationPolicy 校验。如无法立即升级，确保启用 strict mode（禁用 Python-native 模式）作为临时缓解措施，避免在反序列化中处理不受信数据。"
score = 9.8
severity = "CRITICAL"
sources = ["hwpoc"]
title = "Apache Fory PyFory ReduceSerializer 反序列化漏洞"
updated = "2026-06-17T10:54:55.450"

