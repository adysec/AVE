[basic]
description = "Byte Fusion BFTelnet 1.1 存在缓冲区溢出漏洞，远程攻击者无需身份认证即可向目标系统的 Telnet 服务发送超长用户名数据，触发缓冲区溢出，导致服务进程崩溃，造成拒绝服务。该漏洞影响 BFTelnet 1.1 版本，攻击者只需网络可达即可利用，危害等级中危。目前官方已停止维护该产品，建议迁移至其他受支持的 Telnet 服务端软件。"
published = "1999-11-03T05:00:00.000"
remediation = "Byte Fusion BFTelnet 1.1 已停止维护，建议立即迁移至 OpenSSH 或 Dropbear 等现代安全远程访问方案。如必须使用 Telnet 协议，可替换为 PuTTY Telnet 或同步升级至 BFTelnet 最新版本（若厂商仍提供）。临时缓解措施：在防火墙或 TCP Wrappers 中限制 telnet 端口（默认 23）仅允许受信 IP 段访问，并启用入侵检测规则监控异常长度的用户名字段。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Byte Fusion BFTelnet 1.1 缓冲区溢出拒绝服务漏洞"
updated = "2026-06-16T21:49:17.913"

