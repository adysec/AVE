description = "新开普电子股份有限公司研发的掌上校园服务管理平台存在远程命令执行漏洞。攻击者可调用service.action接口发送恶意构造的请求，在服务器上执行任意命令，从而获取服务器控制权限，导致敏感数据泄露和系统被完全控制。"
published = "2023-08-09"
