[basic]
description = "红海eHR人力资源管理系统中存在文件读取漏洞，攻击者可通过权限绕过机制利用该漏洞读取服务器上的敏感文件（如配置文件、数据库连接信息等）。该漏洞无需登录认证即可远程触发，攻击门槛低，可能导致企业核心数据泄露。受影响版本包括红海eHR各历史版本，建议用户尽快升级至最新版本以修复此漏洞。"
published = "0702"
remediation = "升级红海eHR至官方最新版本，在系统配置中严格限制文件读取路径白名单，禁止目录遍历（../）操作，对用户输入的文件路径参数进行过滤和校验，仅允许读取指定目录下的文件。同时配置Web应用防火墙（WAF）规则拦截路径穿越攻击载荷。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "红海 eHR 文件读取漏洞"
updated = "0702"

