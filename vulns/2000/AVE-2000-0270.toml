[basic]
description = "IRIX 系统中默认安装的 Performance Copilot（性能监控工具）包含一个安全配置缺陷，其 pmcd 守护进程在默认配置下未对远程访问进行适当限制。未经身份认证的远程攻击者可通过网络连接到目标主机上监听的 pmcd 服务端口，进而读取包括系统运行状态、进程信息、硬件指标等在内的敏感系统信息。该漏洞影响采用默认安装方式且启用 Performance Copilot 的 SGI IRIX 操作系统，攻击条件仅为攻击者能够与目标的 pmcd 服务建立网络连接，无需任何凭据或本地权限，利用方式是通过标准的 pmcd 协议请求获取本不应暴露的系统内部数据，可能导致信息泄露并辅助后续攻击。"
published = "2000-04-12T04:00:00.000"
remediation = "建议升级 IRIX 至已修复该问题的补丁版本（SGI 官方补丁 4107 及以上，对应 IRIX 6.5.7m 或更新版本）。若无法立即升级，可停止 pmcd 守护进程（/etc/init.d/pmcd stop）或修改 /etc/perf/pmcd.options 限制仅本地访问，并在防火墙屏蔽 TCP 端口 4321（pmcd），仅放行受信任主机作为临时缓解措施。"
score = 6.4
severity = "MEDIUM"
sources = ["cve"]
title = "SGI IRIX Performance Copilot 信息泄露漏洞"
updated = "2026-06-16T21:51:23.630"

