[basic]
description = "多个 BSD 基础的操作系统中的 Telnet 守护程序 (Telnet Daemon, telnetd) 存在严重缓冲区溢出漏洞，攻击者可通过发送特制选项（包括 AYT（Are You There）命令）触发 telrcv 函数的未验证输入导致内存缓冲区溢出，从而在目标系统上执行任意代码。受影响的操作系统包括 Solaris 2.x/7.0/8、IRIX 6.5.x、OpenBSD 2.x、NetBSD 1.x、Debian 3 和 HP-UX 10，所有版本均存在该漏洞。攻击者无需身份验证即可远程利用此漏洞，CVSS 评分高达 10.0（CVSS：AV:N/AC:L/Au:N/C:C/I:C/A:C），对系统的保密性、完整性和可用性构成完全破坏。该漏洞源于 TelnetD 在处理协议选项时缺乏长度检查，攻击者可通过精心构造的网络包触发缓冲区溢出。操作系统厂商已发布安全补丁，建议用户升级到最新版本以修复此漏洞。"
published = "2001-08-14T04:00:00.000"
remediation = "建议立即禁用 telnet 服务并改用 SSH 协议（如 OpenSSH 3.4+），在防火墙层面封禁 TCP 23 端口；若必须保留 telnet，请升级至各厂商修复版本：Solaris 8 安装补丁 108968-18、108993-18；OpenBSD 升级至 3.0+；NetBSD 升级至 1.5.2+；Debian 3.0 安装 telnetd_0.17-14.1 补丁包（DSA-070）；HP-UX 10.20 安装 PHNE_22621；IRIX 6.5.x 安装补丁 3521；Gentoo 执行 emerge --update net-misc/netkit-telnetd（GLSA-200410-03）。"
score = 10
severity = "CRITICAL"
sources = ["redhat"]
title = "多厂商 TelnetD 缓冲区溢出漏洞"
updated = "2026-06-16T21:54:31.283"

