[basic]
description = "Windows NT 系统的日志记录功能存在安全配置缺陷，其日志文件被设置为不适当的最大容量上限或日志保留周期，导致关键安全事件日志在达到上限后被覆盖或过早清除，无法完整记录攻击者的操作痕迹。该漏洞影响采用默认或不当日志策略的 Windows NT 系统，攻击条件为攻击者需已获得系统访问权限或利用其他漏洞进入系统，通过触发大量日志写入耗尽日志空间，使后续入侵行为难以被审计追溯，从而降低被发现和取证的概率。此问题属于安全配置不当类弱点，可通过调整日志最大大小与保留策略加以缓解。"
published = "1999-01-01T05:00:00.000"
remediation = '升级到受支持的 Windows Server 版本（如 Windows Server 2022）以消除此历史配置缺陷。对于仍需运行 Windows NT 的系统，通过事件查看器（Event Viewer）分别设置应用程序日志、系统日志和安全日志的最大大小至合理值（建议不小于 10MB），并在日志属性中配置适当的覆盖策略，选择"按需要覆盖事件"或"归档日志文件后覆盖事件"以防止日志无限增长耗尽磁盘空间。同时启用自动日志归档功能，定期将日志备份至独立存储介质，确保安全事件日志满足合规审查要求。建议在网络边界部署集中式日志管理系统（如 SIEM），将所有服务器日志统一收集存储，避免单台服务器磁盘被日志占满导致服务中断。'
score = 10
severity = "CRITICAL"
sources = ["epss"]
