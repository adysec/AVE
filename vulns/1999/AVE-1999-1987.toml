[basic]
description = "QPC Software QVT/Term Plus 4.2d、4.3 及 QVT/Net 4.3 套件中的 FTP 服务器存在缓冲区溢出漏洞。未经身份认证的远程攻击者可通过发送超长的用户名或密码字符串触发该漏洞，导致服务拒绝，甚至可能在目标系统上执行任意代码。该漏洞影响 QVT/Term Plus 及 QVT/Net 套件的特定版本，CVSS 评分 7.5，属于高危漏洞。攻击条件仅需网络访问 FTP 服务端口，无需认证即可利用。"
published = "1999-11-10T05:00:00.000"
remediation = "建议立即升级 QPC Software QVT/Term Plus 至 4.3 以上版本或 QVT/Net 4.3 以上版本，或联系厂商获取 FTP 服务缓冲区溢出补丁。如暂无法升级，请在防火墙层面限制 FTP 服务（TCP 21 端口）仅允许可信 IP 访问，并禁用匿名 FTP 登录作为临时缓解措施。"
score = 7.5
severity = "HIGH"
sources = ["exploitdb"]
title = "QPC Software QVT/Term Plus 与 QVT/Net FTP 服务器 远程缓冲区溢出拒绝服务漏洞"
updated = "2026-06-16T21:50:40.440"

