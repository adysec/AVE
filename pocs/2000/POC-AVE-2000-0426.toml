[info]
author = "ave"
description = "检测 PDGSoft Shopping Cart 的 redirect.exe 和 changepw.exe 文件是否存在。存在即表明目标可能受 CVE-2000-0401 缓冲区溢出漏洞影响，攻击者可通过超长查询字符串触发远程代码执行。"
id = "POC-AVE-2000-0426"
name = "PDGSoft Shopping Cart redirect.exe/changepw.exe 缓冲区溢出漏洞检测 PoC"
severity = "high"
tags = ["ave-2000-0426"]
vuln_id = [
    "CVE-2000-0401",
    "AVE-2000-0426",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/redirect.exe"
protocol = "http"

[poc.requests.body]
content = ""
type = "raw"

[[poc.requests.matchers]]
expect = true
status = [
    200,
    302,
]
type = "status"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/changepw.exe"
protocol = "http"

[poc.requests.body]
content = ""
type = "raw"

[[poc.requests.matchers]]
expect = true
status = [
    200,
    302,
]
type = "status"
