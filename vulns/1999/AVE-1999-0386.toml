[basic]
description = "Microsoft Windows 95 和 Windows 98 系统自带的 Telnet 客户端存在堆缓冲区溢出漏洞。当该客户端处理构造畸形的 Telnet 参数（如过长的命令行参数或特制的参数数据）时，由于缺乏充分的边界校验，会导致堆内存被覆盖。本地或远程的攻击者可通过诱导受害者使用恶意构造的 Telnet 参数（例如通过网页中的恶意链接或脚本调用 Telnet 客户端）触发此漏洞，可能造成客户端崩溃或在受影响系统上执行任意代码。该漏洞影响运行 Windows 95 与 Windows 98 并包含 Telnet 客户端的系统，攻击需借助社会工程诱导用户触发，利用门槛相对较高，CVSS 评分为 2.6，危害等级较低。"
published = "1999-08-16T04:00:00.000"
remediation = "建议立即升级至受支持的 Windows 版本（如 Windows 10/11），Windows 95/98 已停止支持且无官方补丁。若必须继续使用旧系统，请立即卸载或禁用 Telnet 客户端（控制面板→添加/删除程序→Windows 组件→取消勾选 Telnet 客户端），并改用 SSH 等加密协议替代明文 Telnet。网络层面在防火墙层面封禁 TCP 23 端口入站/出站，防止恶意 Telnet 参数触发堆溢出。"
score = 2.6
severity = "LOW"
sources = ["epss"]
title = "Microsoft Windows 95/98 Telnet客户端堆溢出漏洞"
updated = "2026-06-16T21:48:58.607"

