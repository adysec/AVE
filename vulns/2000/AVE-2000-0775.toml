[basic]
description = "iPlanet 证书管理系统 4.2 及目录服务器 4.12 存在目录遍历漏洞。由于服务对用户输入的路径缺乏充分过滤，未经身份认证的远程攻击者可通过向 Agent、End Entity 或 Administrator 服务发送含有 `../` 的恶意请求，利用目录遍历技术突破路径限制，读取服务器上的任意文件，导致敏感信息泄露。该漏洞 CVSS 评分 5.0，危害等级中危。"
published = "2000-12-11T05:00:00.000"
remediation = "建议升级到 Oracle Directory Server Enterprise Edition 11gR1 (11.1.1.7.0) 或更高版本，该版本已修复路径遍历问题。如无法升级，应在反向代理或 WAF 侧过滤 ../ 等路径遍历序列，并限制 Agent、End Entity、Administrator 服务的访问来源 IP 至可信管理网段。长期方案建议迁移至当前仍受支持的 LDAP 目录服务器（如 389 Directory Server）以获取持续安全更新。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Netscape Directory Server 4.12 目录遍历漏洞"
updated = "2026-06-16T21:53:05.947"

