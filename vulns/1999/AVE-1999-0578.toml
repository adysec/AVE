[basic]
description = "IBM Rational ClearCase for Unix 3.2 版本中的 db_loader 程序存在竞态条件漏洞。本地攻击者利用该程序在处理 SUID 位设置时的时序问题，通过精心构造的竞争条件操作，可在目标系统上以 root 权限执行任意代码，实现本地权限提升。攻击者需要具备本地系统访问权限，且成功利用需满足特定的时序窗口条件。"
published = "1999-02-08"
remediation = "升级到 IBM Rational ClearCase 的修复版本（3.2 之后的版本已修复此问题）。由于该产品已停止维护，建议迁移到受支持的配置管理解决方案，或在系统层面限制不可信用户对 db_loader 程序的执行权限。"
score = 6.2
severity = "MEDIUM"
sources = [
    "cve",
    "exploitdb",
]
title = "Rational Software ClearCase for Unix db_loader 条件竞争本地权限提升漏洞"
updated = "2026-06-16"

