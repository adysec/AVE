[basic]
description = "tags.<value>Linux 内核 mlx5 网卡驱动在处理 E-switch（嵌入式交换机）配对时存在释放后使用漏洞。当用户将设备从 switchdev 模式切换至 legacy 模式，或卸载/重载设备时，上行链路端口的卸载与 E-switch 解配对的执行顺序存在竞态条件，导致已释放的 peer mlx5e_priv 结构体被继续访问，触发空指针解引用，造成内核崩溃。该漏洞影响使用 Mellanox ConnectX 系列网卡且启用 VF_LAG 的 Linux 系统，CVSS 评分 5.5，危害等级中等。本地攻击者需具有普通权限并通过卸载绑定 VF_LAG 的网卡设备来触发此漏洞。"
published = "2025-09-17T15:15:38.603"
remediation = "升级 Linux 内核至 6.1.31、6.3.5 或 6.4 及以上版本。如无法升级内核，可在卸载 mlx5 模块前先将网卡从 switchdev 模式切换为 legacy 模式（`devlink dev eswitch set pci/$BDF mode legacy`），避免触发 E-switch 配对解绑时的野指针访问导致内核崩溃。"
score = 5.5
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux Kernel mlx5 驱动 E-Switch 配对处理不当导致内核崩溃漏洞"
updated = "2026-06-17T06:44:57.767"

