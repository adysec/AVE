[basic]
description = "Microsoft 365 Copilot 存在开放重定向漏洞（CWE-601），未经授权的远程攻击者可通过精心构造的 URL 将用户重定向到恶意外部站点，进而通过网络利用该漏洞实现权限提升。攻击者无需身份认证，仅需诱使用户点击特制链接即可触发。该漏洞影响 Microsoft 365 Copilot 相关组件，CVSS 评分 9.3，危害等级严重。Microsoft 已在安全更新中对此漏洞进行修复。"
published = "2026-07-02T23:16:50.867"
remediation = "该漏洞为 Microsoft 365 Copilot 云服务侧漏洞，微软已通过服务端更新完成修复，用户无需手动安装补丁。请确保 Microsoft 365 Copilot 客户端及浏览器扩展更新至最新版本（通过 Microsoft 365 门户检查更新）。作为深度防御措施，建议组织部署 Web 内容过滤策略，对 Copilot 返回的链接进行合法性校验；同时加强用户安全意识培训，避免点击不可信的重定向链接。"
score = 9.3
severity = "CRITICAL"
sources = ["hwpoc"]
title = "Microsoft 365 Copilot 开放重定向漏洞"
updated = "2026-07-07T14:24:12.110"

