[basic]
description = "OpenOffice.org 2.4 之前版本在处理 Quattro Pro (QPRO) 文件时存在多个基于堆的缓冲区溢出漏洞，攻击者可通过构造恶意的 Attribute（属性）记录和 Font Description（字体描述）记录触发堆缓冲区溢出。远程攻击者诱导用户打开精心制作的 QPRO 文件即可触发漏洞，导致应用程序崩溃造成拒绝服务，甚至可能在用户上下文中执行任意代码。该漏洞影响 OpenOffice.org 2.4 之前的所有版本，攻击向量为网络传播，攻击复杂度中等，无需身份认证，成功利用可导致部分机密性、完整性和可用性损失，CVSS 评分 6.8（中危）。升级至 OpenOffice.org 2.4 或更高版本可修复此漏洞。"
published = "2008-04-17T19:05:00.000"
remediation = "建议立即升级 OpenOffice.org 至 2.4.0 或更高版本（如 Apache OpenOffice 4.x 或 LibreOffice 7.x 系列）。Ubuntu 用户请执行 `sudo apt update && sudo apt upgrade openoffice.org` 安装 USN-609-1 补丁；Gentoo 用户执行 `emerge --update '>=app-office/openoffice-2.4.0'`。临时缓解：禁用 Quattro Pro 文件格式支持或禁止打开不可信的 .qpro/.wb1/.wb2/.wb3 文件。"
score = 6.8
severity = "MEDIUM"
sources = ["tenable"]
title = "OpenOffice.org 2.4 及早期版本 Quattro Pro 文件解析堆缓冲区溢出漏洞 (CVE-2007-5745)"
updated = "2026-06-16T22:46:44.867"

