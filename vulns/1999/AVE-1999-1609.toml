[basic]
description = "HP VirtualVault 安全绕过漏洞，攻击者可利用受信任网关代理（TGP）机制 bypassing 补丁 PHSS_17692 限制，对系统发起非授权访问。该漏洞源于虚拟存储系统身份验证机制缺陷，允许任意未授权进程绕过访问控制，对文件进行非法读写或进行系统操作。攻击者无需具备管理员权限，只需向虚拟存储服务发送特定协议命令，即可取得对安全敏感数据的访问权限，导致企业敏感信息泄露、篡改或被恶意利用。HP 早前曾发布安全补丁，但实际应用中仍存在配置缺陷导致漏洞无法彻底修复，影响范围涵盖 Windows/Linux 多平台虚拟存储环境。"
published = "2000-01-18T05:00:00.000"
remediation = "升级 HP VirtualVault 至包含 PHSS_17692 之后修复补丁的版本（如 PHSS_18500 及以上），并通过 Software Distributor 重新安装 TGP 模块。临时缓解：在 Trusted Gateway Proxy 配置中收紧进程访问控制列表，禁止未授权进程建立 TGP 连接，并限制仅允许受信虚拟主体访问代理端口。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
