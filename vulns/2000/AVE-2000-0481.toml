[basic]
description = "Winamp 2.64 及更早版本在处理 .m3u 播放列表文件时存在缓冲区溢出漏洞。攻击者通过构造包含超长 #EXTINF: 扩展字段的恶意 .m3u 文件，诱使用户打开后即可触发缓冲区溢出，从而在受影响的系统上执行任意代码。该漏洞无需认证，攻击者可远程通过社会工程方式传播恶意播放列表文件进行利用。"
published = "2000-07-20"
remediation = "升级到 Winamp 2.65 或更高版本，避免打开来源不明的 .m3u 播放列表文件。官方已在后续版本中修复此漏洞。"
score = 7.5
severity = "HIGH"
sources = [
    "cve",
    "exploitdb",
]
title = "NullSoft Winamp 2.64 .m3u 播放列表缓冲区溢出漏洞"
updated = "2000-07-20"

