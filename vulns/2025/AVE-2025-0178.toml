[basic]
description = "用友畅捷通T+的InitContext接口存在登录绕过漏洞，攻击者无需有效凭证即可通过构造特制的HTTP请求绕过身份验证机制，直接访问系统后台功能。该漏洞源于InitContext在处理会话初始化时未对用户身份进行充分校验，导致权限验证逻辑被绕过。攻击者可利用该漏洞获取系统管理权限，进而进行数据窃取、篡改或植入后门等操作，对业务系统安全构成严重威胁。"
published = "0702"
remediation = "建议立即将畅捷通T+升级至最新版本（T+Cloud 19.0 / T+专属云 19.0 / T+软件包 13.0），并安装官方最新安全补丁，下载地址为 https://www.chanjetvip.com/product/goods/goods-detail?id=53aaa40295d458e44f5d3ce5。SaaS 版 T+Cloud 用户无需操作，畅捷通运维团队会自动完成更新。如无法及时升级，可通过 WAF/应用防火墙对 InitContext 接口路径进行访问控制，并限制非必要公网 IP 对 T+ 系统的访问作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "用友 畅捷通T+ InitContext 登录绕过漏洞"
updated = "0702"

