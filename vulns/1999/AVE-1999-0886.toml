[basic]
description = "Behold Software Web Page Counter 2.70 版本中的 counter.exe 程序存在拒绝服务漏洞。该程序在处理外部请求时未对传入参数长度进行合法性校验，远程攻击者无需身份认证，只需向运行该计数器的服务发送一个包含超长参数的请求（如通过 URL 传递过长的 argument），即可触发程序异常挂起（hang），导致服务无法正常响应后续请求，造成拒绝服务。该漏洞影响所有运行 Behold Software Web Page Counter 2.70 且暴露 counter.exe 的 Web 服务器，攻击门槛低、可远程利用，虽不造成代码执行，但会中断网站正常的访问统计与页面服务。"
published = "1999-05-19T04:00:00.000"
remediation = "建议立即停用 Behold Software Web Page Counter 2.70 的 counter.exe 组件，或升级至厂商发布的最新版本（如有）。若业务必须保留，可在 Web 服务器层面配置请求长度限制（如 IIS 的 maxUrlLength/maxQueryString），并在防火墙层面拦截异常长参数请求作为缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Behold Software Web Page Counter counter.exe 拒绝服务漏洞"
updated = "2026-06-16T21:49:33.700"

