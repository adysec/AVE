[basic]
description = "SunOS 4.1.1 系统中 Sun Source (sunsrc) 磁带安装程序存在本地权限提升漏洞。由于 `/usr/release/bin/makeinstall` 和 `/usr/release/bin/winstall` 两个程序被设置为 setuid root 权限，本地攻击者可利用这些程序以 root 权限执行任意操作，从而完全控制目标系统。该漏洞影响 SunOS 4.1.1 版本，CVSS 评分 7.2，危害等级高。攻击者需拥有本地系统访问权限方可利用。"
published = "1991-05-20T04:00:00.000"
remediation = "建议升级至 Solaris 7 或更高版本（已修复该漏洞），或执行 chmod u-s /usr/release/bin/makeinstall /usr/release/bin/winstall 移除 setuid 位，若不使用该功能可直接删除这两个二进制文件彻底消除风险"
score = 7.2
severity = "HIGH"
sources = ["exploitdb"]
title = "Sun Microsystems SunOS 4.1.1 本地权限提升漏洞"
updated = "2026-06-16T21:49:46.150"

