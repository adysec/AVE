[basic]
description = "Whois Internic Lookup 程序 whois.cgi 存在命令注入漏洞，攻击者可在域名查询输入框中注入 Shell 元字符（如分号、反引号、管道符等），绕过输入验证直接在服务器上执行任意系统命令。该漏洞影响运行该 CGI 程序的所有 Web 服务器，无需身份认证即可远程利用，CVSS 评分 7.5（高危）。攻击者只需构造包含恶意命令的域名参数提交查询请求，即可获得服务器操作系统级别的控制权限，进而窃取数据、植入后门或横向移动。"
published = "1999-11-09T05:00:00.000"
remediation = "立即停用或删除存在漏洞的 whois.cgi 脚本，改用经过安全审计的 Whois 查询工具（如 jwhois、whois 命令行工具）。如必须使用 CGI 接口，需对 domain 参数做严格输入过滤，禁止 `;` `|` `` ` `` `$` `(` `)` 等 shell 元字符，并使用 escapeshellcmd/escapeshellarg 函数处理后再传入系统命令。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "Internic Whois 查找程序代码执行漏洞，攻击者可通过向域名输入非法 shell 元字符在服务器上执行任意命令，这是一个通过构造恶意域名输入实现服务器端代码执行的高危安全问题。"
updated = "2026-06-16T21:49:27.610"

