[basic]
description = "iParty Conferencing Server 1.2 及更早版本存在缓冲区溢出漏洞，远程攻击者无需认证即可通过连接默认 6004 端口并发送大量扩展字符，触发缓冲区溢出导致服务器崩溃拒绝服务。该漏洞影响 iParty Conferencing Server 所有低于 1.2 的版本，CVSS 评分 5.0，危害等级中危。"
published = "1999-05-08T04:00:00.000"
remediation = "iParty Conferencing Server 1.2 及更早版本已不受支持，建议升级至官方修复后的最新版本（如有）。如厂商已停止维护，应在防火墙层面限制对 TCP 端口 6004 的访问，仅允许可信 IP 连接，或将该服务器置于独立网络隔离区以降低暴露风险。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "iParty Conferencing Server 远程缓冲区溢出拒绝服务漏洞"
updated = "2026-06-16T21:50:43.843"

