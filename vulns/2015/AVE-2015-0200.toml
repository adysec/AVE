[basic]
description = "Microsoft Office 2013 SP1 和 2013 RT SP1 存在未初始化内存使用漏洞（CWE-824），远程攻击者可通过诱导用户打开特制的恶意 Office 文档触发该漏洞，导致未初始化的内存被错误引用，进而在用户上下文中执行任意代码。该漏洞影响 Microsoft Office 2013 SP1 及 2013 RT SP1 版本，CVSS 3.1 评分 8.8（高危），攻击向量为网络、攻击复杂度低、无需特权但需用户交互，对机密性、完整性、可用性均造成高影响。攻击者需诱导受害者打开恶意构造的 Office 文档即可触发漏洞实现远程代码执行，Microsoft 已于 2015 年 6 月发布安全公告 MS15-070 修复此漏洞，建议用户尽快应用补丁并提高对未知来源文档的警惕性。"
published = "2015-06-10T01:59:36.483"
remediation = "立即安装 Microsoft 2015 年 6 月安全更新 MS15-060 (KB3054851) 修复 Office 2013 SP1/RT SP1 未初始化内存漏洞。通过 Windows Update 自动更新或手动下载 KB3054851 补丁包安装。无法立即打补丁时，建议禁用 Office 文档自动打开功能，在受信任位置设置中禁用不受信任位置的文档打开，并配置 Outlook 阻止自动预览 Office 文档作为临时缓解措施。"
score = 8.8
severity = "HIGH"
sources = ["kev"]
title = "Microsoft Office 2013 未初始化内存使用漏洞"
updated = "2026-06-17T00:22:57.577"

