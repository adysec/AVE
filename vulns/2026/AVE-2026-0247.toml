[basic]
description = "Gitea Docker 镜像默认配置中将 `REVERSE_PROXY_TRUSTED_PROXIES` 设置为 `*`，即信任所有来源 IP 的反向代理标头。当管理员启用 `ENABLE_REVERSE_PROXY_AUTHENTICATION` 后，任意远程攻击者无需认证即可通过构造特制的 `X-WEBAUTH-USER` 等 HTTP 标头，冒充任意用户身份访问 Gitea 实例。该漏洞影响 Gitea Docker 镜像 1.26.2 及之前版本，CVSS 评分 9.8，危害等级严重。攻击者只需发送携带伪造标头的 HTTP 请求即可完成利用，无需任何权限。"
published = "2026-07-03T21:16:56.660"
remediation = "立即升级 Gitea Docker 镜像至 1.26.4 或更高版本（1.26.3 因存在仓库代码页加载回归问题不建议使用）。如无法立即升级，在 Docker 的 app.ini 中将 `REVERSE_PROXY_TRUSTED_PROXIES` 从 `*` 改为实际反向代理 IP 段（如 `127.0.0.0/8,::1/128`），并确认 `ENABLE_REVERSE_PROXY_AUTHENTICATION` 仅在需要时手动开启。如无法修改配置，在防火墙/安全组层面限制 Gitea 实例仅允许信任的反向代理 IP 访问。"
score = 9.8
severity = "CRITICAL"
sources = ["ghsa"]
title = "Gitea Docker 镜像反向代理信任代理配置不当漏洞"
updated = "2026-07-07T18:16:35.380"

