[basic]
description = "SGI IRIX 6.2 操作系统自带的 soundplayer 程序存在本地权限提升漏洞。该程序在播放音频文件时会调用 midikeys 程序处理 `.wav` 文件，但未对文件内容进行安全过滤，导致其中嵌入的 shell 元字符会被当作命令执行。已登录本地系统的普通用户可构造包含恶意 shell 元字符的特制 `.wav` 文件，借助 soundplayer 与 midikeys 的交互以 root 权限执行任意命令，从而完全控制受影响主机。该漏洞影响运行 IRIX 6.2 的 SGI 工作站与服务器，攻击前提为攻击者需具备本地账户访问权限。"
published = "1999-12-31T05:00:00.000"
remediation = "建议升级到 SGI IRIX 6.2 的补丁版本或更高版本（如 IRIX 6.3+），该漏洞已在官方安全补丁中修复。如无法升级，可移除 midikeys 和 soundplayer 程序的 setuid 位（chmod u-s /usr/bin/midikeys /usr/bin/soundplayer），或限制本地用户对 .wav 文件的执行权限作为临时缓解措施。"
score = 7.2
severity = "HIGH"
sources = ["cve"]
