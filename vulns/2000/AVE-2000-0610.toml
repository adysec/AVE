[basic]
description = "SGI IRIX WorkShop 调试与性能工具套件中 cvconnect 组件存在任意文件写入漏洞。本地攻击者利用程序对文件路径处理不当的缺陷，通过构造特制的参数执行 cvconnect，可将任意内容写入系统任意文件，从而导致权限提升或系统服务崩溃。该漏洞影响 SGI IRIX 操作系统多个版本，CVSS 评分 7.2，危害等级高。"
published = "2000-06-20T04:00:00.000"
remediation = "升级 SGI IRIX 至包含补丁的版本（如 6.5.x 以上），或移除 cvconnect 的 setuid 位：chmod u-s /usr/bin/cvconnect。如无法升级，限制可执行 cvconnect 的用户组，仅允许受信任管理员使用。"
score = 7.2
severity = "HIGH"
sources = ["cve"]
title = "SGI IRIX WorkShop 本地任意文件写入漏洞"
updated = "2026-06-16T21:51:56.420"

