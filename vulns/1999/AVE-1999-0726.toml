[basic]
description = "Gordano NTMail 4.2 的 Web 管理界面存在路径遍历漏洞，未经身份认证的远程攻击者可通过发送包含 .. (dot dot) 序列的特制 HTTP 请求，绕过目录访问限制读取服务器上的任意文件。该漏洞影响 Gordano NTMail 4.2 版本，攻击者无需任何凭据即可利用，可能导致邮件配置文件、系统文件等敏感信息泄露。建议升级到最新版本以修复此漏洞。"
published = "1999-05-26T04:00:00.000"
remediation = "建议将 Gordano NTMail 升级至 4.3 或更高版本，该版本修复了 Web 组件对 `../` 路径穿越序列的过滤缺陷。若无法立即升级，可在 Web 邮件服务配置中禁用或限制 Web 文件访问功能，并在前置防火墙或反向代理层对包含 `..`、`%2e%2e`、`../` 及编码变体的 HTTP 请求路径进行拦截，同时限制 Web 服务进程对系统目录的文件读取权限。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Gordano NTMail 路径遍历任意文件读取漏洞"
updated = "2026-06-16T21:49:20.713"

