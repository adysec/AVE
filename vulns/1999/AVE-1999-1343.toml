[basic]
description = "Oracle Webserver 2.1 及更早版本以 setuid root 权限运行，但配置文件归 oracle 账户所有。任何获得 oracle 账户访问权限的本地或远程攻击者均可通过修改配置文件，利用 setuid root 权限提升至 root 权限，或修改任意文件，造成系统完全失陷。"
published = "1997-09-19"
remediation = "升级到 Oracle Webserver 2.1 以上版本，或将配置文件所有权改为 root 用户并移除 oracle 账户的写权限，避免配置被低权限用户篡改。"
score = 10.0
severity = "CRITICAL"
sources = [
    "cve",
    "epss",
]
title = "Oracle Webserver 2.1 及更早版本 setuid root 配置权限提升漏洞"
updated = "2026-06-16"

