[basic]
description = "WordPress 的 Roberta Bramski Uploader 插件 1.0.4 版本中 views/notify.php 文件存在跨站脚本（XSS）漏洞。远程攻击者可通过向 notify 或 blog 参数注入恶意 Web 脚本或 HTML 代码，当管理员或其他用户访问受影响的页面时，注入的脚本将在浏览器中执行，可能导致敏感信息泄露或会话劫持。该漏洞无需身份认证即可利用，影响使用该插件的 WordPress 站点。"
published = "2014-04-04T14:55:11.307"
remediation = "立即停用并删除 Uploader 1.0.4 插件，该插件已长期无人维护且官方不再提供安全更新；建议替换为功能相近的活跃维护插件（如 WordPress Media Library Categories）。若必须临时使用，编辑 views/notify.php 文件，对 notify 和 blog 参数使用 esc_html() 或 wp_strip_all_tags() 进行输出编码过滤，同时在 Web 服务器（如 Nginx/Apache WAF）层面添加规则拦截包含 <script> 等恶意标签的请求。"
score = 4.3
severity = "MEDIUM"
sources = ["nuclei"]
title = "WordPress Uploader 插件跨站脚本漏洞"
updated = "2026-06-16T23:53:04.660"

