[basic]
description = 'tags.<value>Microsoft Windows NT 4.0 的 KnownDLLs 注册表项 HKLM\System\CurrentControlSet\Control\Session Manager\KnownDLLs 存在权限配置不当，允许本地普通用户进行写入修改。攻击者可利用该漏洞将 KnownDLLs 列表指向恶意的动态链接库文件，当系统或应用程序加载对应 DLL 时，恶意代码将以 SYSTEM 权限执行，最终实现本地权限提升。该漏洞主要影响 Windows NT 4.0 SP4 及更早版本，成功利用需要攻击者具备本地登录能力并能修改目标注册表键值。'
published = "1999-02-20T05:00:00.000"
remediation = '安装 Microsoft 提供的 MS99-006 热修复补丁，该补丁将 KnownDLLs 列表的默认权限修改为只读，阻止普通用户篡改 DLL 映射。如无法安装补丁，可临时通过注册表将 HKEY_LOCAL_MACHINE\System\CurrentControlSet\Control\Session Manager 下的 ProtectionMode 设为 REG_DWORD 值 1 以启用系统基对象保护。'
score = 4.6
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Microsoft Windows NT 4.0 KnownDLL 本地权限提升漏洞"
updated = "2026-06-16T21:48:15.863"

