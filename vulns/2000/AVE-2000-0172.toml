[basic]
description = "Corel Linux OS 1.0 中的 setxconf 工具存在本地权限提升漏洞。当使用 -T 参数运行时，setxconf 会执行用户指定的 .xserverrc 文件，由于未对文件来源和内容进行安全检查，本地低权限用户可通过创建恶意 .xserverrc 文件并配合 setxconf -T 参数触发该漏洞，从而获取 root 权限。该漏洞影响 Corel Linux OS 1.0 版本，CVSS 评分 7.2，危害等级高。"
published = "2000-02-24T05:00:00.000"
remediation = "建议立即移除 setxconf 的 setuid 权限：以 root 身份执行 `chmod u-s /usr/bin/setxconf`，阻止普通用户以 root 权限执行该程序。同时删除不受信任用户的 ~/.xserverrc 文件。由于 Corel Linux 已停止维护且无官方补丁，建议迁移至仍受支持的主流 Linux 发行版（如 Ubuntu LTS 或 Debian）以获取持续安全更新。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "Corel Linux setxconf 本地权限提升漏洞"
updated = "2026-06-16T21:51:11.990"

