[basic]
description = "OpenServer 5.0.5 系统中的 sar 命令（系统活动报告工具）存在缓冲区溢出漏洞。该漏洞位于 sar 处理命令行参数的代码中，当本地用户以超长字符串作为 -o 参数（指定输出文件）的值执行 sar 命令时，由于程序未对输入长度进行边界检查，导致缓冲区被溢出覆盖。攻击条件要求攻击者具备目标系统的本地登录权限（普通用户即可），无需远程网络访问。成功利用后，攻击者可通过精心构造的输入覆盖返回地址并执行任意代码，从而将权限提升至 root（超级用户），完全控制受影响的 OpenServer 5.0.5 主机。"
published = "2002-05-01T04:00:00.000"
remediation = "建议立即安装 Caldera 发布的 CSSA-2002-SCO.17 安全补丁，升级系统自带的 sar 二进制文件至修复版本以消除缓冲区溢出漏洞。若无法立即应用补丁，可临时移除 /usr/bin/sar 的 SUID 权限或通过文件权限限制普通用户执行该命令，作为缓解措施降低本地提权风险。"
score = 7.2
severity = "HIGH"
sources = ["cve"]
