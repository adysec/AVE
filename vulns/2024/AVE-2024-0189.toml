[basic]
description = "深澜计费管理系统（CPE）的 strategy 模块存在 Java 反序列化漏洞。攻击者在无需认证的情况下，可通过向目标系统发送 POST 请求至 `/strategy/ip/bind-ip` 接口，并在请求体中构造恶意的序列化数据，触发服务端在反序列化过程中的任意代码执行（RCE）。该漏洞影响部署了深澜计费管理系统的相关网络环境，攻击条件为攻击者能够访问系统的 Web 管理端口并构造包含特制 Cookie 与序列化载荷的 HTTP 请求。成功利用后，攻击者可远程在服务器端执行任意命令，进而完全控制服务器、窃取计费数据或植入持久化后门，危害等级较高。"
published = "0726"
remediation = "立即联系深澜厂商获取并升级计费管理系统至修复该反序列化漏洞的最新版本；如暂无法升级，可在 WAF 或反向代理层对 /strategy/ip/bind-ip 的 POST 请求做请求体反序列化黑名单过滤与白名单校验，并限制该接口仅允许受信任内网 IP 访问，关闭不必要的外网映射作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "深澜计费管理系统strategy接口反序列化漏洞"
updated = "0726"

