[basic]
description = 'Xerox DocuColor 4LP 打印机的 HTTP 服务器存在输入验证缺陷，远程攻击者无需认证即可通过向目标设备发送包含大量连续 "." 字符的超长 URL，导致服务器进程陷入死循环或资源耗尽，造成拒绝服务（系统挂起）。该漏洞影响 Xerox DocuColor 4LP 系列打印机，攻击复杂度低，利用方式简单，可直接导致设备无法正常提供打印服务。'
published = "1999-10-13T04:00:00.000"
remediation = "该设备已停止技术支持，无官方补丁可用。建议在防火墙上限制对打印机 TCP 80 端口的访问，仅允许受信任的管理 IP 段连接；如无需 Web 管理功能，可在 Fiery 控制面板中禁用 HTTP 服务。作为临时缓解措施，可在网络层部署 IPS/IDS 规则，拦截包含大量连续点号（.）的异常 URL 请求。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Xerox DocuColor 4LP HTTP服务器拒绝服务漏洞"
updated = "2026-06-16T21:50:14.327"

