[basic]
description = "Flowerfire Sawmill 5.0.21 存在弱密码加密漏洞，程序使用脆弱的加密算法存储用户密码，远程攻击者无需身份认证即可通过分析加密机制轻易还原明文密码，进而获取系统管理员权限并修改 Sawmill 配置。该漏洞影响 Sawmill 5.0.21 及更早版本，攻击复杂度低，危害较大。"
published = "2000-06-26T04:00:00.000"
remediation = "立即升级 Sawmill 至 5.0.22 或更高版本，该版本已改用强加密算法存储密码。如无法升级，在 Web 服务器层面限制对 Sawmill 管理界面的访问 IP 白名单，并确保配置文件权限为 600 仅允许运行用户读取。"
score = 7.5
severity = "HIGH"
sources = ["exploitdb"]
title = "Flowerfire Sawmill 5.0.21 弱密码加密漏洞"
updated = "2026-06-16T21:52:03.697"

