[basic]
description = "Guestbook CGI 程序存在命令注入漏洞，远程攻击者可在未授权的情况下通过向 Guestbook 提交包含 shell 命令的恶意输入，导致服务器端执行任意系统命令。此漏洞属于典型的 CGI 输入验证缺失，影响使用 Guestbook 脚本的多种 Web 服务器。攻击者无需认证即可发送特制 HTTP 请求触发命令执行，从而获取服务器控制权。"
published = "1997-09-01T04:00:00.000"
remediation = "立即删除或替换存在漏洞的 Guestbook CGI 脚本（如 cgi_guestbook），改用经过安全审计且支持输入验证的现代留言本程序；在 Web 服务器（Apache/Nginx）中禁用 CGI 执行权限或限制 CGI 目录的可执行权限；对所有用户输入进行严格过滤，禁止特殊字符（`;`, `|`, `&`, `$` 等）传入系统命令调用函数。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "CGI Guestbook 远程命令执行漏洞"
updated = "2026-06-16T21:47:58.530"

