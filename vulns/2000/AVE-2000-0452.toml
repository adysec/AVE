[basic]
description = "Centrinity FirstClass Intranet Server 5.770 及 6.1 之前版本存在拒绝服务漏洞，远程攻击者无需身份认证即可利用该漏洞，通过向目标服务器发送含有超长 To 邮件头的邮件，导致服务器处理异常而崩溃或停止响应。该漏洞影响 Centrinity FirstClass Internet Services server 5.770 及更早版本，CVSS 评分 5.0，危害等级中危。厂商已发布后续版本 6.1 修复此问题。"
published = "2000-06-27T04:00:00.000"
remediation = "升级 Centrinity FirstClass Intranet Server 至 6.1 或更高版本，该版本已修复长邮件头导致的拒绝服务问题。如无法立即升级，可在邮件网关层面过滤或截断过长的 To 头字段作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Centrinity FirstClass Intranet Server 长邮件头拒绝服务漏洞"
updated = "2026-06-16T21:52:01.190"

