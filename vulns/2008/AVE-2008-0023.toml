[basic]
description = "Apple QuickTime 7.4.5 之前版本在处理影片中的外部 URL 时存在不当校验缺陷，属于输入验证不足导致的信息泄露漏洞。远程攻击者可构造含恶意外部链接的电影文件，诱使受害者下载或打开该影片后，QuickTime 会在未充分验证的情况下访问外部资源，从而向攻击者泄露敏感信息。漏洞影响安装低于 7.4.5 版本 QuickTime 的 Windows 等主机，攻击需用户交互（如下载/打开特制影片），CVSS 评分 4.3，危害等级中等。Apple 已在 QuickTime 7.4.5 中修复此问题。"
published = "2008-04-04T17:44:00.000"
remediation = "立即将 Apple QuickTime 升级至 7.4.5 或更高版本；Windows 用户可通过 Apple 官网下载安装包覆盖安装，Mac 用户通过软件更新获取。若无法立即升级，应暂时禁用 QuickTime 浏览器插件、避免打开来源不明的电影文件，并在防火墙/代理层拦截对不可信外部 URL 的自动请求作为临时缓解。"
score = 4.3
severity = "MEDIUM"
sources = ["tenable"]
title = "Apple QuickTime 信息泄露漏洞"
updated = "2026-06-16T22:50:48.510"

