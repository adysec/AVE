[basic]
description = "WebSiteTool 购物车应用程序存在信息修改漏洞，远程攻击者可通过修改页面中的隐藏表单字段值，篡改商品价格、数量等敏感购买信息，从而以低于正常价格的金额完成交易。该漏洞源于服务端未对客户端提交的隐藏字段数据进行有效验证，攻击者无需认证即可利用，影响该购物车系统的所有部署版本。"
published = "2000-02-01T05:00:00.000"
remediation = "服务端必须对所有表单提交数据进行完整性校验，禁止仅依赖隐藏字段传递敏感信息（如价格、订单金额）。建议将关键数据存储在服务端 Session 中，并在提交时与数据库中的预期值进行比对。如果仍在使用 WebSiteTool，应升级到支持服务端校验的最新版本，或迁移至现代购物车系统（如 Magento、WooCommerce）。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "WebSiteTool 购物车应用程序隐藏表单字段信息修改漏洞"
updated = "2026-06-16T21:51:01.310"

