[basic]
description = "Cisco Catalyst 4000/5000/6000 系列交换机 SSH 服务存在协议不匹配拒绝服务漏洞。远程攻击者无需认证即可通过使用非 SSH 客户端连接目标设备的 SSH 服务，触发协议协商错误，导致设备异常拒绝服务。该漏洞影响运行 6.1 版本软件的 Cisco Catalyst 系列交换机，CVSS 评分 5.0，危害等级中等。目前厂商已发布相关安全建议，建议用户升级至修复版本或采取访问控制措施缓解风险。"
published = "2001-02-12T05:00:00.000"
remediation = "建议将 Cisco Catalyst 交换机系统软件升级至 CatOS 6.2 及以上版本，该版本已修复 SSH 协议不匹配导致的拒绝服务问题。若无法立即升级，可在交换机上配置 ACL 限制 SSH 服务的访问来源 IP，仅允许受信任的管理网段连接。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Cisco Catalyst 4000/5000/6000 交换机 SSH 协议不匹配拒绝服务漏洞"
