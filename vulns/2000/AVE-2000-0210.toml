[basic]
description = "Linux 系统中的 kreatecd 工具存在路径信任漏洞，该工具在调用 cdrecord 程序时未对用户提供的路径参数进行充分校验，导致本地攻击者可通过构造恶意路径替换正常 cdrecord 程序，从而以 root 权限执行任意代码。该漏洞影响 Halloween Linux 4.0 及 S.u.S.E. Linux 6.0/6.1/6.2/6.3 等多个发行版本，CVSS 评分 7.2，危害等级高。攻击者需拥有本地系统访问权限方可利用。"
published = "2000-03-16T05:00:00.000"
remediation = "升级 kreatecd 至不受信任路径影响的版本，或移除 kreatecd 的 setuid 权限位（chmod u-s /usr/bin/kreatecd），确保 cdrecord 程序路径为硬编码绝对路径而非用户可控制的变量。如无法升级，可卸载 kreatecd 软件包或限制可执行用户组。"
score = 7.2
severity = "HIGH"
sources = ["cve"]
title = "S.u.S.E. Linux kreatecd 本地权限提升漏洞"
updated = "2026-06-16T21:51:16.747"

