[basic]
description = "IRIX 6.5、Solaris 7.0 和 Turbolinux 4.2 系统中 Canna 输入系统的 uum 程序存在缓冲区溢出漏洞。该漏洞源于程序在处理输入数据时未对缓冲区边界进行有效检查，本地攻击者可通过传入超长字符串触发溢出，进而执行任意代码并获取 root 权限。受影响系统包括 IRIX 6.5、Sun Solaris 7.0 及 Turbolinux 4.2，攻击者需要具备本地访问权限才能利用此漏洞。"
published = "1999-11-02T05:00:00.000"
remediation = "升级到已修复的 Canna 输入系统版本（IRIX 安装厂商安全补丁、Solaris 应用 Sun 推荐补丁簇、Turbolinux 升级至 4.2 后续修正包）。在无法立即打补丁前，可用 chmod 0755 移除 uum 程序的 setuid root 位（chmod u-s /usr/bin/uum），或限制仅授权用户访问以缓解本地提权风险。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "IRIX Solaris Turbolinux Canna输入系统 uum程序 本地缓冲区溢出漏洞"
updated = "2026-06-16T21:49:23.260"

