[basic]
description = "BIND 4 的 nslookupComplain 函数存在缓冲区溢出漏洞，远程攻击者无需身份认证即可通过网络向目标 DNS 服务器发送特制的查询请求触发该漏洞，成功利用可导致 root 权限获取，完全控制目标系统。该漏洞影响 BIND 4 系列版本，CVSS 评分 10.0，危害等级严重。建议升级至 BIND 8 或更高版本以修复此漏洞。"
published = "2001-02-12T05:00:00.000"
remediation = "立即升级至 BIND 9.x 或更高版本，BIND 4 已停止维护且不再接收安全更新。如无法升级，在防火墙规则中限制对 DNS 服务器的递归查询来源 IP，仅允许可信网络段访问，并禁用 nslookup 组件的非必要功能以降低攻击面。"
score = 10
severity = "CRITICAL"
sources = ["redhat"]
title = "ISC BIND 4 nslookupComplain 函数缓冲区溢出远程代码执行漏洞"
updated = "2026-06-16T21:53:29.170"

