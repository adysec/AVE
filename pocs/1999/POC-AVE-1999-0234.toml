[info]
author = "ave"
description = "Microsoft FrontPage Personal Web Server 存在缓冲区溢出漏洞，远程攻击者通过向 _vti_bin/shtml.dll 发送超长请求可导致拒绝服务或任意代码执行。"
id = "POC-AVE-1999-0234"
name = "CVE-1999-0681 PoC"
severity = "medium"
tags = [
    "cve-1999-0681",
    "frontpage",
    "buffer-overflow",
]
vuln_id = [
    "CVE-1999-0681",
    "AVE-1999-0234",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/_vti_bin/shtml.dll"
protocol = "http"

[poc.requests.headers]
User-Agent = "AVE/1.0"

[[poc.requests.matchers]]
expect = true
status = [
    200,
    401,
    403,
    500,
]
type = "status"
