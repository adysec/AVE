[basic]
description = "Corel Linux OS 1.0 的 buildxconf 工具存在任意文件写入漏洞，本地攻击者可通过向 `-x` 或 `-f` 参数传入特制路径，以 root 权限创建或修改系统任意文件，导致权限提升。该漏洞影响 Corel Linux OS 1.0 版本，CVSS 评分 7.2，危害等级高。攻击者需拥有本地 shell 访问权限，利用方式简单，无需认证即可实施提权攻击。"
published = "2000-02-24T05:00:00.000"
remediation = "建议立即卸载或移除 Corel Linux OS 1.0 中 buildxconfig 程序的 setuid 位（chmod u-s /usr/bin/buildxconfig），防止本地用户通过 -x 或 -f 参数任意写文件。最根本的修复是升级到受支持的 Linux 发行版（如 Ubuntu/Debian），因 Corel Linux 已停止维护且不再发布安全更新。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "Corel Linux OS 1.0 buildxconfig 本地任意文件写入漏洞"
updated = "2026-06-16T21:51:11.867"

