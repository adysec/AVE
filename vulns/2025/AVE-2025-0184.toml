[basic]
description = "东胜物流软件 WorkFlowGridSource.aspx 页面存在 SQL 注入漏洞，攻击者可在未经授权的情况下通过构造特制的 SQL 语句参数注入后台数据库，导致敏感数据泄露（如用户凭证、订单信息），甚至获取服务器控制权。攻击条件低，仅需目标系统开放 Web 服务即可实施。该漏洞影响东胜物流软件多个版本。"
published = "0712"
remediation = "厂商已发布安全补丁，建议将东胜物流软件升级至最新版本。如无法立即升级，在 Web 服务器（IIS）层面配置 URL 重写规则，对 WorkFlowGridSource.aspx 页面的参数进行过滤，拦截单引号、SQL 关键字等恶意字符；同时对该页面参数改用参数化查询方式，修复 SQL 注入漏洞。"
score = 5
severity = "MEDIUM"
