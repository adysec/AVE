[basic]
description = "Linux 内核 USB gadget 子系统的 FunctionFS（f_fs）驱动中存在条件竞争漏洞。当系统启用 `panic_on_warn` 参数时，`functionfs_bind` 函数中不必要的 `WARN_ON` 调用会触发内核恐慌（kernel panic），导致系统重启或不可用。该漏洞影响运行 Linux 内核且使用 USB gadget 功能的设备，CVSS 评分为 4.7（中危）。攻击者需在本地具有一定权限并能够触发 ADB 功能路径与 UDC 写操作的竞争场景才能利用此漏洞。攻击利用会导致系统服务中断（可用性影响），但无法获取敏感数据或提升权限。上游社区已通过移除 `functionfs_bind` 中的 `WARN_ON` 调用来修复此问题。"
published = "2025-01-19T12:15:25.477"
remediation = '升级 Linux 内核至 >=5.15.0 或 >=6.1.0（具体取决于发行版的补丁策略），并重启系统。Debian 12 (bookworm) 应升级到 学士计划中的补丁版本；Ubuntu 24.04 LTS 应应用 USN-7381-1 安全更新；所有 RHEL/CentOS/Fedora 系统应更新到官方提供的内核补丁。升级后验证内核版本包含对 CVE-2024-57913 的修复（检查补丁日志中的 "usb: gadget: f_fs: Remove WARN_ON in functionfs_bind"）。如无法立即升级，可通过 `/proc/sys/kernel/panic_on_oops` 设置为 0 临时禁用 panic_on_warn 以减少风险。重启后检查 functionfs 驱动状态，确保 none 警告已被移除。'
score = 4.7
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux 内核 USB Gadget FunctionFS 竞态条件导致内核恐慌漏洞"
updated = "2026-06-17T08:14:13.227"

