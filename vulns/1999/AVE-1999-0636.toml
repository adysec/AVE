[basic]
description = "思科路由器NAT功能存在拒绝服务漏洞。攻击者可通过向Telnet端口发送精心构造的FTP PORT命令，消耗路由器NAT会话资源，导致设备无法正常提供网络地址转换服务。该漏洞无需认证即可远程触发，影响所有运行NAT功能的思科路由器。"
published = "1999-11-04"
remediation = "该漏洞影响运行NAT功能的思科路由器。建议升级到不受影响的IOS版本或关闭不必要的NAT服务。受影响的用户可以联系思科获取更详细的修复信息。"
score = 5.0
