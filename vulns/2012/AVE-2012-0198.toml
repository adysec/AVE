[basic]
description = "Adobe Flash Player 存在内存破坏漏洞，远程攻击者可通过诱导用户访问特制的网页或打开恶意文件触发内存损坏，导致任意代码执行或拒绝服务。该漏洞影响 Windows/Mac OS X 平台 10.3.183.20 之前及 11.x 11.3.300.257 之前版本、Linux 平台 10.3.183.20 之前及 11.x 11.2.202.236 之前版本、Android 2.x/3.x 平台 11.1.111.10 之前版本、Android 4.x 平台 11.1.115.9 之前版本，以及 Adobe AIR 3.3.0.3610 之前版本。攻击者利用此漏洞无需身份认证，但需要用户交互（如点击链接或打开文件），CVSS 评分 7.5，危害等级高。Adobe 已发布安全更新修复该漏洞，该漏洞已被 CISA 列入已知被利用漏洞目录（KEV）。"
published = "2012-06-09T00:55:00.987"
remediation = "升级 Adobe Flash Player 至 Windows/Mac 版 11.3.300.257 或 10.3.183.20 以上、Linux 版 11.2.202.236 或 10.3.183.20 以上、Android 版 11.1.115.9 以上，并将 Adobe AIR 升级至 3.3.0.3610 以上。鉴于 Adobe Flash Player 已于 2020 年底停止支持，建议彻底卸载 Flash Player 并迁移至 HTML5 方案以根除风险。"
score = 7.5
severity = "HIGH"
sources = ["kev"]
title = "Adobe Flash Player 内存破坏远程代码执行漏洞"
updated = "2026-06-16T23:40:50.083"

