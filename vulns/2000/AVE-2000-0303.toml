[basic]
description = "OpenBSD 2.5 系统的 cron（时钟守护进程）在处理 argv[] 参数时存在空终止符缺失漏洞，导致函数指针数组未被正确终止，传递给 cron 的伪 popen 函数后可被利用。本地攻击者可通过构造特制的命令行参数触发此内存处理缺陷，成功利用可实现权限提升，获取 root 权限。该漏洞影响 OpenBSD 2.5 版本，CVSS 评分 7.2，危害等级高。建议升级至不受影响的版本或应用补丁修复。"
published = "2001-03-12T05:00:00.000"
remediation = "升级 OpenBSD 至 2.6 及以上版本，其中已修复 cron 进程的 argv 空终止检查。若无法升级，可限制本地用户对 cron 作业的写入权限，并移除 crontab 的 setuid 位作为临时缓解措施。编译时启用栈保护选项也可增加利用难度。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "OpenBSD cron 本地权限提升漏洞"
updated = "2026-06-16T21:51:27.240"

