[basic]
description = "Linux 内核中 MediaTek MT7915 WiFi 驱动（mt76）的 `mt7915_mcu_exit` 函数存在内存泄漏漏洞。当 `mt7915_firmware_state` 执行失败时，MCU SKB 队列未及时清理，导致已分配内存无法释放。本地攻击者可反复触发固件状态检测失败，耗尽系统内存资源，最终导致拒绝服务。该漏洞影响使用 mt76 驱动的 Linux 内核版本，CVSS 评分 5.5，危害等级中危。"
published = "2025-10-01T12:15:48.550"
remediation = "升级 Linux 内核至 6.1.64+、6.6.3+ 或 6.7+ 版本，其中已合入修复提交 9aa9d1f2c6（修复 mt7915_mcu_exit 中 skb 队列未清理导致的内存泄漏）。如无法升级内核，可卸载 mt7915 驱动模块（modprobe -r mt7915e）禁用受影响硬件，或通过内核 livepatch 机制应用热补丁。"
score = 5.5
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux 内核 mt7915 WiFi 驱动内存泄漏漏洞"
updated = "2026-06-17T06:45:24.440"

