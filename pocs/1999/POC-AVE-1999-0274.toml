[info]
author = "AVE"
description = "检测 Bluestone Sapphire Web 服务器是否使用可预测的会话 ID。通过获取服务器分配的会话 ID 并检查其长度和随机性，判断是否存在会话劫持风险。"
id = "POC-AVE-1999-0274"
name = "Bluestone Sapphire Web Server Session Hijacking PoC"
severity = "high"
tags = ["ave-1999-0274"]
vuln_id = [
    "CVE-1999-0699",
    "AVE-1999-0274",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "header"
type = "word"
words = [
    "SessionID=",
    "sessionid=",
    "JSESSIONID=",
    "sapphire_session",
]
