[basic]
description = "广联达 LinkWorks（BIM协同平台）的DataSvc.asmx接口中的GetAllData方法存在未授权访问漏洞。攻击者无需任何身份认证即可通过POST请求调用该接口，获取系统中的用户数据、组织结构等敏感信息，可能导致信息泄露和进一步攻击。"
published = "2024-05-15"
remediation = "在Web服务器层面限制对/WebService/Lk6SyncService/MrMMSSvc/DataSvc.asmx路径的访问，配置IP白名单或添加身份认证机制；同时建议联系广联达官方获取安全更新。"
score = 5.0
severity = "MEDIUM"
sources = ["hwpoc"]
title = "广联达 LinkWorks DataSvc GetAllData 未授权访问漏洞"
