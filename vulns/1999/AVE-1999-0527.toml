[basic]
description = "Solaris 操作系统中 /bin/fdformat 命令存在缓冲区溢出漏洞，本地用户通过向该命令传递特制的超长参数触发缓冲区溢出，从而获得 root 权限执行任意代码。该漏洞影响 Solaris 2.4 版本，攻击者需具备本地系统访问权限，利用条件较低，可完全控制目标系统，危害等级为高。"
published = "1997-04-01T05:00:00.000"
remediation = "安装 Sun Security Bulletin #138 提供的对应补丁程序。如仍使用 Solaris 2.4，请应用 Sun 官方补丁集修复 fdformat 缓冲区溢出问题。若无法立即打补丁，可作为临时缓解措施移除 fdformat 的 setuid 权限：chmod 0555 /bin/fdformat 或 chmod 0555 /usr/bin/fdformat。长期解决方案建议升级至 Oracle 仍提供支持的 Solaris 11 及以上版本。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "Sun Solaris fdformat 本地缓冲区溢出漏洞"
updated = "2026-06-16T21:48:08.140"

