[basic]
description = "mSQL (Mini SQL) 2.0.1 及更早版本存在缓冲区溢出漏洞，远程攻击者可通过向目标 mSQL 服务发送特制超长数据包触发缓冲区溢出，进而覆盖返回地址，导致远程代码执行。该漏洞影响 mSQL 2.0.1 及之前版本，CVSS 评分 7.5，危害等级高。攻击者无需身份认证，仅需网络可达即可实施利用，建议升级到最新版本或停止使用以修复此漏洞。"
published = "1999-01-01T05:00:00.000"
remediation = "升级 mSQL 至 2.0.2 及以上版本。由于 mSQL 已长期停止维护，建议迁移至 MySQL/MariaDB 等仍在维护的数据库系统；如无法立即迁移，应在防火墙层面限制对 mSQL 服务端口（默认 1114/tcp）的访问，仅允许可信 IP 连接。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "Hughes mSQL 远程缓冲区溢出漏洞"
updated = "2026-06-16T21:48:03.350"

