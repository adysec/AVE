[info]
author = "ave"
description = "验证 Internet Explorer 4.x/5.x ActiveX 参数解析缓冲区溢出漏洞（Malformed Component Attribute），通过构造畸形 ActiveX 组件属性参数检测目标浏览器是否易受攻击。该漏洞为客户端浏览器漏洞，需在受控环境中验证。"
id = "POC-AVE-2000-1108"
name = "Microsoft Internet Explorer 4.x/5.x ActiveX 参数解析缓冲区溢出 PoC"
severity = "high"
tags = ["ave-2000-1108"]
vuln_id = [
    "CVE-2000-0464",
    "AVE-2000-1108",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/cve-2000-0464-poc.html"
protocol = "http"

[poc.requests.body]
content = ""
type = "raw"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "CVE-2000-0464",
    "Malformed Component Attribute",
]
