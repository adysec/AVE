[basic]
description = "HP-UX 操作系统的 aserver 程序存在权限提升漏洞。本地攻击者可通过设置恶意 PATH 环境变量，使 aserver 在执行 awk 命令时执行恶意程序，从而获取更高权限。该漏洞影响 HP-UX 系统 June 1999 版本中的 aserver 程序，CVSS 评分 7.2，危害等级高。"
published = "2000-01-02T05:00:00.000"
remediation = "升级 HP-UX 系统至最新补丁级别，安装 HP 针对 aserver 程序路径注入漏洞的官方安全补丁（PHCO_20199 或更新版本）；在补丁不可用的情况下，移除 aserver 的 setuid 位（chmod u-s /usr/sbin/aserver），限制本地用户通过修改 PATH 环境变量执行任意 awk 命令导致提权。临时缓解措施可监控 aserver 进程的异常调用行为。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "HP-UX aserver 本地权限提升漏洞"
updated = "2026-06-16T21:50:57.287"

