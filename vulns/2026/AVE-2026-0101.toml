[basic]
description = "WordPress Widget Options 插件（widget-options）≤ 4.2.3 版本中存在代码注入漏洞（CWE-94），认证后的 Contributor 及以上权限用户可利用插件功能注入恶意代码，在无需其他特殊条件的情况下实现远程命令执行。该漏洞影响所有使用该插件的 WordPress 站点，CVSS 评分 9.9，危害等级严重。攻击者只需拥有 Contributor 账号即可发起攻击，无需额外权限配合。目前暂无公开 PoC 及 Nuclei 模板，Patchstack 于 2026-06-17 公开披露，建议用户尽快升级至 4.2.4 及以上版本。"
published = "20260617"
remediation = "立即将 Widget Options 插件升级至 4.2.4 及以上版本（当前最新版 4.2.5），该版本已专门修复 Contributor+ 权限远程代码执行漏洞。如无法立即更新，临时措施包括：在 WordPress 后台将可疑 Contributor 用户降级为 Subscriber，或通过 functions.php 禁用插件中的 Display Logic 功能（add_filter('widget_options_display_logic', '__return_false')），同时审计拥有 Contributor 及以上角色的用户列表。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "WordPress Widget Options 插件 远程代码执行漏洞"
updated = "20260617"

