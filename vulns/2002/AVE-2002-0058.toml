[basic]
description = "perl-MailTools 套件 1.47 及之前版本中的 Mail::Mailer Perl 模块默认使用 mailx 作为邮件发送程序，远程攻击者可通过在邮件正文中插入恶意命令，当 mailx 处理该邮件时导致任意命令执行。该漏洞影响所有使用受影响版本的 perl-MailTools 的应用程序，CVSS 评分 7.5，危害等级高。建议升级至 1.48 及以上版本。"
published = "2002-11-12T05:00:00.000"
remediation = "升级 perl-MailTools 至 1.51 或更高版本。Debian 用户请安装 DSA-386 安全更新（apt-get install perl-mailtools）。Mandrake Linux 用户安装 MDKSA-2002-076 更新。如无法升级，可修改 Mail::Mailer 配置将默认 mailer 从 mailx 改为 sendmail 等更安全的程序，并在邮件发送前对邮件正文进行转义过滤，防止特殊字符被 mailx 解释执行。"
score = 7.5
severity = "HIGH"
sources = ["osv"]
title = "Perl MailTools 邮件发送远程代码执行漏洞"
updated = "2026-06-16T21:59:02.240"

