[basic]
description = "ircII 4.4 IRC 客户端在处理 DCC 聊天功能时存在缓冲区溢出漏洞，远程攻击者可通过向目标用户发送恶意的 DCC 聊天请求触发该漏洞，在受影响系统上以客户端进程权限执行任意命令。该漏洞影响 Michael Sandrof 开发的 ircII 4.4 及早期版本，攻击者无需认证即可利用，危害等级中危。"
published = "2000-03-10T05:00:00.000"
remediation = "升级 ircII 至 4.5 或更高版本以修复 DCC chat 功能中的缓冲区溢出漏洞。如无法升级，可在客户端配置中禁用自动接受 DCC 聊天请求，或设置 dcc_autoget 为 off 并避免连接不可信 IRC 服务器作为临时缓解措施。"
score = 5.1
severity = "MEDIUM"
sources = ["avd"]
title = "ircII 4.4 IRC客户端 DCC聊天功能远程缓冲区溢出漏洞"
updated = "2026-06-16T21:51:10.400"

