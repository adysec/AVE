[basic]
title = "HP-UX MPower 文件权限设置不当导致本地权限提升"
description = "HP-UX 10.x 系统中的 MPower 组件部分文件被设置了不安全的权限，导致本地攻击者可以利用这些文件获取更高权限，实现权限提升。攻击者需要本地访问系统，无需认证即可利用此漏洞。"
severity = "HIGH"
score = 7.2
sources = ["cve", "avd"]
published = "1997-01-30"
updated = "2026-06-16"
remediation = "应用 HP 安全公告 HPSBUX9701-051 中提供的补丁，修复 MPower 组件文件权限设置问题，限制非授权用户对敏感文件的访问。"
[references]
