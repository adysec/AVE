[basic]
description = "Greg Matthews Classifieds.cgi 是一款基于 Perl 的 CGI 分类广告脚本。该脚本在处理用户输入的分类参数时未对 shell 元字符进行过滤，攻击者可构造包含分号、管道符或反引号等特殊字符的请求，使脚本在调用系统命令时执行非预期操作，从而以 Web 服务器运行权限远程读取服务器上的任意文件（如 /etc/passwd 或脚本源码）。攻击条件为目标站点启用了该 CGI 脚本且可被匿名访问，无需身份认证。"
published = "1999-12-15T05:00:00.000"
remediation = "升级到 Greg Matthews Classifieds.cgi 已修复元字符过滤的版本，并使用安全的文件读取函数替代系统命令调用。如暂无法升级，应修改 classifieds.cgi 脚本，对用户输入中的分号、管道符、反引号等 shell 元字符进行严格过滤与转义，同时将 CGI 脚本运行账户降权至最低权限以缓解风险。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Greg Matthews Classifieds.cgi Shell元字符远程任意文件读取漏洞"
updated = "2026-07-18T00:00:00Z"

