[basic]
description = "Network Associates WebShield SMTP 4.5 的收件人字段处理逻辑存在输入验证缺陷，远程攻击者可通过向 SMTP 服务发送包含畸形收件人字段的邮件，触发服务处理异常导致崩溃或资源耗尽，造成拒绝服务。该漏洞影响 WebShield SMTP 4.5 版本，无需认证即可远程利用，攻击复杂度低，但仅能造成拒绝服务，无法实现远程代码执行或权限提升。"
published = "2001-01-09T05:00:00.000"
remediation = "该漏洞影响 Network Associates（后为 McAfee）WebShield SMTP 4.5。该产品已长期停止维护，McAfee 未发布补丁。建议立即迁移至受支持的现代邮件安全网关（如 McAfee Email Gateway 最新版本）；若无法迁移，可在上游 SMTP 代理层配置收件人字段格式校验规则，限制收件人字段只允许邮箱标准字符（字母、数字、@、.、-、_），并拒绝空值或包含控制字符的异常收件人，同时启用 SMTP 会话速率限制以缓解拒绝服务攻击影响。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "McAfee WebShield SMTP 4.5 收件人字段拒绝服务漏洞"
updated = "2026-06-16T21:53:12.690"

