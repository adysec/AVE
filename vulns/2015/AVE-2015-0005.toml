[basic]
description = "WordPress simple-image-manipulator 插件 1.0 版本存在访问控制缺陷，未经身份认证的远程攻击者可通过构造特制的 HTTP 请求，利用插件中缺乏权限校验的文件下载功能，读取服务器上的任意文件（如 wp-config.php 等敏感配置文件），导致敏感信息泄露。该漏洞影响 simple-image-manipulator 插件的所有版本，攻击无需用户交互，利用难度低，危害等级高。"
published = "2016-10-06T14:59:11.257"
remediation = "立即从 WordPress 站点删除 simple-image-manipulator 插件（该插件已于 2013 年关闭且不再维护），在 wp-content/plugins/ 目录下删除 simple-image-manipulator 文件夹。如暂时无法删除，可在 .htaccess 中添加规则阻止对 /wp-content/plugins/simple-image-manipulator/controller/download.php 的访问：`RewriteRule ^wp-content/plugins/simple-image-manipulator/ - [F,L]`。"
score = 7.5
severity = "HIGH"
sources = ["nuclei"]
title = "WordPress simple-image-manipulator 插件远程文件下载漏洞"
updated = "2026-06-17T00:21:16.093"

