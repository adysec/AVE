[basic]
description = "Qualcomm Eudora 邮件客户端存在附件警告绕过漏洞（Stealth Attachment），是由于其对 .lnk 快捷方式文件的处理缺陷所致。攻击者可构造指向 .exe、.com、.bat 等可执行附件的 .lnk 文件，通过邮件发送给目标用户。当用户点击该快捷方式时，系统将执行其所引用的可执行附件，但因 Eudora 仅检测直接附件类型而未对 .lnk 文件的目标进行安全检查，导致用户警告机制被绕过。该漏洞影响 Eudora 4.x 至 6.1.1 版本，CVSS 评分 7.5，危害等级高，攻击者只需诱使用户点击邮件中的恶意 .lnk 文件即可实现远程代码执行，属于链接跟随（CWE-59）类漏洞。"
published = "2000-04-28"
remediation = "升级至 Eudora 6.0 及以上版本，该版本引入了 LaunchProtect 机制，可有效拦截通过 .lnk 快捷方式绕过附件警告的攻击。由于 Eudora 已停止维护，建议迁移至 Thunderbird 等仍在安全更新的现代邮件客户端。临时缓解措施：在 Eudora 设置中启用「显示所有文件扩展名」，并教育用户不要打开来源不明的 .lnk 附件。"
score = 7.5
severity = "HIGH"
sources = [
    "cve",
    "exploitdb",
]
title = "Qualcomm Eudora 可执行附件启动警告绕过漏洞"
