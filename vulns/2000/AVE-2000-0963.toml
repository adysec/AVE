[basic]
description = "htgrep CGI 程序存在任意文件读取漏洞，远程攻击者无需身份认证即可通过向 hdr 参数传入目标系统上的完整文件路径名，利用该漏洞读取服务器上的任意文件，导致敏感信息泄露。该漏洞影响部署了 htgrep CGI 程序的 Web 服务器，攻击复杂度低，危害等级中等。"
published = "2000-11-14T05:00:00.000"
remediation = '立即删除或禁用服务器上的 htgrep CGI 脚本（通常位于 cgi-bin/htgrep），或限制其执行权限（chmod 000）。如业务必须使用，修改脚本源码对 hdr 参数做路径白名单校验，仅允许访问指定目录下的文件，并过滤 "../" 等目录遍历字符。建议迁移至现代替代方案。'
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "htgrep 任意文件读取漏洞"
updated = "2026-06-16T21:52:33.597"

