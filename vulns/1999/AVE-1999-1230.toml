[basic]
description = "SGI IRIX 4.x 和 5.x 系列操作系统的 serial_ports 管理程序在运行时依赖用户的环境变量 PATH 来定位并执行 ls 命令。由于程序未对 ls 的路径进行硬编码或严格校验，本地普通用户可在可写目录（如 /tmp）中放置伪造的 ls 木马程序，并将其加入 PATH 环境变量的最前面。当 root 用户或系统管理员执行 serial_ports 时，程序会优先调用攻击者伪造的 ls，进而执行任意命令并继承 root 权限，导致本地权限提升。"
published = "1994-10-02T04:00:00.000"
remediation = "升级到 SGI 官方发布的 IRIX 6.2 或更高版本，或安装 SGI 针对 serial_ports 的安全补丁（如 5.x 系列的 patch 版本）。如暂无法升级，可将 serial_ports 程序权限设为仅 root 可执行（chmod 700 /usr/sbin/serial_ports），并清理普通用户可写目录（如 /tmp）以防止在其中放置伪造的 ls 木马程序，同时限制非授权用户对该管理程序的访问。"
score = 6.2
severity = "MEDIUM"
sources = ["exploitdb"]
title = "SGI IRIX 5.2/5.3 本地权限提升漏洞"
updated = "2026-06-16T21:49:32.487"

