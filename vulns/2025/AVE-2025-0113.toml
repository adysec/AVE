[basic]
description = "用友 Nccloud 系统存在 Java 反序列化漏洞，攻击者可向目标系统发送特制的序列化数据触发不安全的反序列化操作，进而执行任意代码，获取服务器控制权。该漏洞影响用友 Nccloud 多版本，危害严重。攻击者无需认证即可远程利用，建议用户及时升级至安全版本。"
published = "0709"
remediation = "立即联系用友技术支持获取NCCloud最新安全补丁进行升级，或通过用友产品安全中心（security.yonyou.com）下载对应版本的漏洞修复包。如无法立即升级，在WAF中配置规则拦截对/nccloud/路径下请求中包含的序列化数据特征（如java.lang.Runtime、java.lang.ProcessBuilder等关键字），同时在JVM启动参数中添加-Dcom.sun.jndi.rmi.object.trustURLCodebase=false和-Dcom.sun.jndi.ldap.object.trustURLCodebase=false以禁用JNDI远程加载，并限制服务器对外部LDAP/RMI服务的出站连接。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "用友 NC Cloud 反序列化远程代码执行漏洞"
updated = "0709"

