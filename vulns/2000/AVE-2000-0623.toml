[basic]
description = "Tigris远程访问服务器11.5.4.22之前版本存在登录认证审计绕过漏洞。漏洞原理在于当用户首次登录认证失败但后续尝试成功时，服务器未正确记录Radius计费/审计信息，导致审计日志缺失。影响范围为Tigris远程访问服务器11.5.4.22之前版本，CVSS评分5.0（中等），完整性影响部分。攻击条件为攻击者可网络访问服务器且能进行多次登录尝试，无需预先认证。利用方式为攻击者故意首次登录失败后再次成功登录，绕过Radius计费审计机制，逃避安全审计追踪。3Com已在11.5.4.22版本修复该漏洞。"
published = "2000-06-13T04:00:00.000"
remediation = "立即升级 Tigris 远程访问服务器至 11.5.4.22 或更高版本。若无法立即升级，请在 Radius 服务器配置中启用详细记账日志记录失败登录尝试（Acct-Status-Type=Start/Stop 包含失败尝试），并在防火墙层面限制 Radius 端口（UDP 1812/1813）仅允许信任 NAS 访问，同时启用双因子认证作为缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Tigris 远程访问服务器 登录认证漏洞"
updated = "2026-06-16T21:51:57.653"

