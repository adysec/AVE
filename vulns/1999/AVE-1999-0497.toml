[basic]
description = "Solaris NIS+ 的 nis_cachemgr 缓存管理器存在安全设计缺陷，未经身份认证的远程攻击者可利用该漏洞向缓存中注入恶意的 NIS+ 服务器信息。当客户端查询网络信息服务时，将连接到攻击者控制的伪造服务器，导致敏感信息（如用户凭据、主机配置）被窃取或服务遭到劫持。该漏洞影响 Solaris 2.3/2.4/2.5/2.5.1 等版本，CVSS 评分 7.5，危害等级高危。"
published = "1997-10-01T04:00:00.000"
remediation = "针对 Solaris NIS+ 的 nis_cachemgr 漏洞，建议立即安装 Sun Security Bulletin #155 中提供的官方补丁。如运行 Solaris 2.3/2.4/2.5/2.5.1 且无法打补丁，应在网络边界通过防火墙限制对 nis_cachemgr 端口（TCP/UDP 387）的访问，仅允许受信 NIS+ 服务器通信。由于 NIS+ 已停止维护，建议迁移至基于 LDAP 的命名服务以获得长期安全支持。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "Sun Solaris NIS+ nis_cachemgr 安全绕过漏洞"
updated = "2026-06-16T21:48:06.247"

