[basic]
description = "织梦内容管理系统（DedeCMS）V5.7.114 版本后台 /dede/sys_verifies.php 文件中存在 PHP 表达式注入漏洞。攻击者在登录后台后，可通过向 getfiles 动作的 refiles[] 参数注入恶意 PHP 代码，利用 ${} 语法执行任意系统命令，最终完全控制服务器。该漏洞源于程序未对用户输入进行有效过滤和转义处理。"
published = "2024-07-07"
remediation = "升级 DedeCMS 至官方最新版本（V5.7.118 或更高），对 sys_verifies.php 中 refiles[] 参数进行严格输入过滤，禁止传入包含 ${} 语法的恶意载荷，并限制后台管理目录仅允许可信 IP 访问。"
score = 5.0
severity = "MEDIUM"
sources = ["hwpoc"]
title = "织梦DedeCMS V5.7.114 后台 sys_verifies.php 远程代码执行漏洞"
updated = "2024-07-07"

