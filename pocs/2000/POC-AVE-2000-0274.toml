[info]
author = "AVE"
description = "检测 Microsoft Windows 95/98 网络组件处理超长 UNC/file:// 路径时的缓冲区溢出漏洞。通过 HTTP 服务构造包含超长文件名的恶意 HTML 页面，当目标用户使用 IE5 浏览器访问时触发溢出，可导致远程代码执行。"
id = "POC-AVE-2000-0274"
name = "Microsoft Windows 95/98 UNC Buffer Overflow PoC"
severity = "high"
tags = [
    "cve-2000-0330",
    "windows",
    "buffer-overflow",
]
vuln_id = [
    "CVE-2000-0330",
    "AVE-2000-0274",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["file://"]
