[basic]
description = "Linux 内核的 `/proc/pid/smaps_rollup` 接口存在空指针解引用漏洞。当进程未建立任何虚拟内存区域（VMA）时，读取该文件会触发空指针解引用，导致内核崩溃。本地攻击者可通过创建特定进程并读取其 smaps_rollup 文件利用此漏洞，造成拒绝服务。该漏洞影响 Linux 内核相关版本，NVD 已将其标记为已撤销。"
published = "2025-10-04T16:15:47.390"
remediation = "升级 Linux 内核至包含 commit 7c6a3f65e58e（修复 /proc/pid/smaps_rollup 中 vma 为 NULL 时的空指针解引用）的版本，具体为 5.19 及以后的内核主线版本。若无法升级内核，可限制非 root 用户读取 /proc/<pid>/smaps_rollup 的权限作为临时缓解：chmod 400 /proc/*/smaps_rollup（需内核支持）。"
score = 5
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux Kernel /proc/pid/smaps_rollup 空指针解引用漏洞"
updated = "2025-10-10T16:15:50.427"

