[basic]
description = "Ascend CascadeView/UX 1.0 的 TFTP 守护进程存在符号链接攻击漏洞。本地攻击者可通过在 TFTP 服务可访问目录中创建符号链接，利用 tftpd 的文件操作权限以提升后的权限读取或覆盖系统任意文件。该漏洞影响 CascadeView/UX 1.0 版本，攻击者需拥有本地系统访问权限，CVSS 评分 4.6，危害等级中危。"
published = "1999-12-31T05:00:00.000"
remediation = "建议立即升级至 Ascend 官方修复版本或迁移至受支持的网络设备管理系统。如无法升级，应将 TFTP 服务运行在 chroot 环境中，限制其对文件系统的访问范围；同时严格管控本地用户对 TFTP 目录的写入权限，避免攻击者通过符号链接指向敏感文件（如 /etc/shadow）。若业务不需要 TFTP 服务，建议直接禁用 tftpd 进程以消除攻击面。"
score = 4.6
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Ascend CascadeView/UX TFTP 符号链接本地权限提升漏洞"
updated = "2026-06-16T21:50:49.637"

