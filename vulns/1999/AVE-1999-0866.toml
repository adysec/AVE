[basic]
description = "Microsoft HTML 控件（用于 Internet Explorer 5.0、FrontPage Express、Outlook Express 5、Eudora 等）存在 HTML 表单控件拒绝服务漏洞。远程攻击者可通过恶意网页或 HTML 邮件，利用表格单元格中超大的 HTML 表单字段（如文本输入框）触发 CPU 100% 占用，导致拒绝服务。影响 IE 5.0、FrontPage Express、Outlook Express 5、Eudora 等使用 MS HTML 控件的产品，攻击者只需诱导用户访问恶意页面或打开恶意邮件即可触发，导致系统资源耗尽拒绝服务，CVSS 评分 5.0（中危）。"
published = "1999-08-27T04:00:00.000"
remediation = "建议将 Internet Explorer 升级至 Microsoft 发布的累积安全更新版本（IE 5.01 SP2 及以上并安装对应安全补丁），FrontPage Express、Outlook Express 5 同步安装 Office/Outlook 组件更新。如暂无法升级，可在邮件客户端禁用 HTML 邮件自动渲染、使用纯文本阅读，并通过代理网关过滤含超大表单字段的网页作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
