[basic]
description = "SGI IRIX 6.2 系统的 midikeys 与 soundplayer 程序存在本地权限提升漏洞。本地攻击者可通过在 .wav 文件名中嵌入 shell 元字符，当 midikeys 程序处理该恶意文件时触发命令执行，从而获取目标系统的 root 权限。该漏洞影响 SGI IRIX 6.2 版本，CVSS 评分 7.2，危害等级高。"
published = "1999-12-31T05:00:00.000"
remediation = "升级到 SGI IRIX 6.3 或更高版本（该版本已修复此问题）；如无法升级，立即移除 midikeys 和 soundplayer 程序的 SUID 位（chmod u-s /usr/sbin/midikeys /usr/sbin/soundplayer），并将可执行文件权限改为 750（chmod 750 /usr/sbin/midikeys /usr/sbin/soundplayer），仅允许 root 组执行。同时建议在系统层面禁用非 root 用户加载 .wav 文件到声音设备的能力。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "SGI IRIX 本地权限提升漏洞"
updated = "2026-06-16T21:50:49.387"

