[info]
author = "ave"
description = "Microsoft IIS showcode.asp allows remote reading of arbitrary files"
id = "POC-AVE-1999-0352"
name = "CVE-1999-0736 PoC"
severity = "medium"
tags = [
    "cve-1999-0736",
    "ave-1999-0352",
]
vuln_id = [
    "CVE-1999-0736",
    "AVE-1999-0352",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/iissamples/exair/howitworks/showcode.asp"
protocol = "http"

[poc.requests.headers]
User-Agent = "AVE/1.0"

[[poc.requests.matchers]]
expect = true
status = [200]
type = "status"
