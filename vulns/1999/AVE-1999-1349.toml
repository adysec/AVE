[basic]
description = "HP 9.x 操作系统中的 VUE 3.0（Visual User Environment）存在权限提升漏洞。本地用户可利用 VUE 环境的缺陷，通过特定操作绕过权限限制，成功利用后可获取 root 超级用户权限，完全控制目标系统。该漏洞影响 HP 9.x 系列系统，CVSS v2 评分 7.2，危害等级高。HP 已发布补丁 PHSS_4994 和 PHSS_5438 修复此漏洞。"
published = "1994-04-20T04:00:00.000"
remediation = "应用 HP 官方补丁 PHSS_4994 和 PHSS_5438 修复 VUE 3.0 权限提升漏洞。建议升级 HP-UX 系统至包含该补丁的最新版本，并限制本地用户对 VUE 环境的访问权限。"
score = 7.2
severity = "HIGH"
sources = [
