[basic]
description = "Microsoft DirectX 中的 DirectShow 组件 quartz.dll 的 QuickTime 电影解析滤镜存在空字节覆盖漏洞。远程攻击者可借助特制的 QuickTime 媒体文件触发该漏洞，导致任意代码执行。该漏洞影响 Windows 2000 SP4、Windows XP SP2/SP3 及 Windows Server 2003 SP2 等系统，CVSS 评分 8.8，危害等级高危。该漏洞已于 2009 年 5 月被检测到在野外利用，Microsoft 在安全公告 MS09-028 中修复了此漏洞。"
published = "2009-05-29T18:30:00.187"
remediation = '立即安装 Microsoft 安全公告 MS09-028 (KB971633) 提供的安全更新。Windows 2000 SP4 用户需根据 DirectX 版本安装对应更新（DirectX 7.0/8.1/9.0c 各有独立更新包）；Windows XP SP2/SP3 和 Windows Server 2003 SP2 用户通过 Windows Update 自动更新或手动下载 KB971633 安装即可。临时缓解措施：以管理员身份运行 regedit，删除注册表项 HKEY_CLASSES_ROOT\CLSID\{D51BD5A0-7548-11CF-A520-0080C77EF58A} 以禁用 quartz.dll 对 QuickTime 内容的解析，或运行 cacls %WINDIR%\SYSTEM32\quartz.dll /E /P everyone:N 限制该 DLL 的访问权限。'
score = 8.8
severity = "HIGH"
sources = ["kev"]
title = "Microsoft DirectX DirectShow QuickTime Movie Parser Filter 远程代码执行漏洞"
updated = "2026-06-16T23:07:28.827"

