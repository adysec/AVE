[basic]
description = "Fortra GoAnywhere MFT 的许可证 Servlet（License Servlet）存在不安全的反序列化漏洞。由于该组件在验证许可证响应时仅依赖可被合法伪造的签名，具备有效伪造签名的攻击者能够构造并反序列化由攻击者完全控制的任意对象，进而在服务器端触发命令注入，实现远程代码执行。该漏洞影响运行 Fortra GoAnywhere MFT 的相关版本，攻击者可经网络远程利用，无需身份认证即可通过特制的许可证响应请求达成利用，CVSS 评分为 10.0，危害等级为严重。"
published = "2025-09-18T22:15:41.857"
remediation = "立即将 GoAnywhere MFT 升级至 7.6.3 或 7.8.4 及以上版本以修复 License Servlet 反序列化漏洞。升级前请确认许可证响应签名验证机制已正确配置，升级后重启 License Servlet 服务。若暂无法升级，建议在防火墙层面限制对 License Servlet 路径的访问，仅允许可信 IP 访问，并监控异常出站连接作为临时缓解措施。"
score = 10
severity = "CRITICAL"
sources = ["hwpoc"]
title = "Fortra GoAnywhere MFT 许可证 Servlet 反序列化命令注入漏洞"
updated = "2026-06-17T08:27:33.740"

