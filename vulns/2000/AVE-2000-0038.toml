Description: MySQL 3.22.x/3.23.x 版本中存在权限管理漏洞，拥有 GRANT 权限的本地用户可以利用 GRANT 语句修改任意 MySQL 用户的密码，包括管理员账户，导致权限提升和未授权访问数据库。
Remediation: 升级到 MySQL 3.23.9 或更高版本，限制 GRANT 权限仅授予可信任管理员，定期审计用户权限变更日志。
