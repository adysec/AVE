[basic]
title = "FreeBSD/NetBSD/Linux 共享内存 mmap/shmget 拒绝服务漏洞"
description = "这是一个FreeBSD/NetBSD/Linux共享内存系统的mmap/shmget拒绝服务漏洞。基于BSD 4.4代码构建的共享内存实现中，mmap和shmget等内存分配函数存在缺陷。攻击者可以利用这些函数分配大量内存并触发持续的页面错误，导致系统崩溃和服务中断。这种攻击可以绕过系统内存限制（如rlimits），完全消耗系统可用内存。这一攻击行为可以由未经验证的远程攻击者或普通用户执行，无需任何特殊权限。该漏洞的CVSS评分为5分，但对于关键服务器和多用户系统仍构成严重威胁，可能导致系统完全不可用。"
severity = "MEDIUM"
score = 5.0
sources = ["cve"]
published = "1999-07-15T04:00:00.000"
updated = "2026-06-16T21:50:36.717"
remediation = "建议升级操作系统内核至修复版本：FreeBSD 升级至 3.2-RELEASE 或更高版本，NetBSD 升级至 1.4 或更高版本，Linux 内核升级至 2.3.x 系列补丁版本。如无法升级，可通过调整内核参数限制单进程共享内存上限（如 Linux 的 kernel.shmall 和 kernel.shmmax），并在 /etc/security/limits.conf 中设置严格的 memlock 和 as 限制以缓解风险。"
