[basic]
description = "Moreover.com 的 cached_feed.cgi 脚本（版本 4.July.00）存在目录遍历漏洞。远程攻击者无需身份认证即可通过在 `category` 或 `format` 参数中注入 `..` 序列，突破路径限制，读取服务器任意文件，如系统配置文件或敏感数据。该漏洞属于典型的输入验证缺陷，可导致信息泄露甚至进一步渗透，需升级或移除受影响脚本。"
published = "2000-12-19T05:00:00.000"
remediation = "升级 Moreover 缓存订阅系统至官方修补版本，删除或禁用 cached_feed.cgi 脚本的 category 与 format 参数的路径穿越攻击入口；若无法升级，可移除该 CGI 脚本或通过 Web 服务器配置（如 Apache mod_rewrite）过滤包含 `..` 的请求参数作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Moreover.com cached_feed.cgi 目录遍历漏洞"
updated = "2026-06-16T21:52:44.133"

