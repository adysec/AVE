[basic]
description = "用友 U8 Cloud 的 FileManageServlet 接口存在权限绕过漏洞，未经身份认证的远程攻击者可通过向 /service/FileManageServlet 发送特制 POST 请求，利用序列化数据绕过权限校验，实现任意文件读取，导致敏感信息泄露。该漏洞影响用友 U8 Cloud 多个版本，攻击复杂度低，无需用户交互，危害较大。"
published = "0705"
remediation = "升级用友U8 Cloud至官方最新安全补丁版本，或联系用友获取FileManageServlet权限校验补丁。临时缓解措施：在Nginx/WAF层配置规则，拦截对`/service/FileManageServlet`路径的非授权POST请求，或限制该接口仅允许内网IP访问。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "用友 U8 Cloud FileManageServlet 任意文件读取漏洞"
updated = "0705"

