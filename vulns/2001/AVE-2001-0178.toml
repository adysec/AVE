[basic]
description = "LICQ 是一款即时通讯软件，其 1.0.3 之前版本的日志记录函数存在缓冲区溢出漏洞。远程攻击者无需身份认证即可向目标系统发送特制的恶意数据包，触发缓冲区溢出，导致拒绝服务，甚至可能执行任意代码。该漏洞影响 LICQ 0.85/1.0.1/1.0.2 等版本，CVSS 评分 7.5，危害等级高。厂商已在 LICQ 1.0.3 版本中修复此漏洞。"
published = "2001-07-02T04:00:00.000"
remediation = "升级 LICQ 至 1.0.3 或更高版本，该版本已修复日志函数中的缓冲区溢出漏洞。如无法立即升级，可在防火墙规则中限制对 5190 端口的非信任来源访问，并禁用 LICQ 的日志记录功能作为临时缓解措施。"
score = 7.5
severity = "HIGH"
sources = ["exploitdb"]
title = "LICQ 日志函数远程缓冲区溢出漏洞"
updated = "2026-06-16T21:54:18.820"

