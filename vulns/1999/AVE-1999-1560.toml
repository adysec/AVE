[basic]
description = "SGI IRIX 中的 /usr/sbin/Mail 程序在启动时未能正确将组 ID 切换为启动用户的组 ID，导致该程序以错误的组权限运行。本地攻击者可利用此缺陷读取系统中其他用户的邮件内容，造成敏感信息泄露。该漏洞影响 SGI IRIX 3.3 及 3.3.1 版本，需要本地系统访问权限方可利用，CVSS 评分 2.1，危害等级低。"
published = "1990-10-31T05:00:00.000"
remediation = "建议升级 SGI IRIX 至 4.0 或更高版本，或安装 SGI 针对该漏洞发布的 Mail 补丁程序。临时缓解措施：以 root 执行 chmod g-s /usr/sbin/Mail 移除 setgid 位，并将邮件目录权限设为 700 以防止其他本地用户越权读取邮件。"
score = 2.1
severity = "LOW"
sources = ["avd"]
title = "SGI IRIX Mail 本地信息泄露漏洞"
updated = "2026-06-16T21:50:42.350"

