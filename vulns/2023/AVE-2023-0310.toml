[basic]
description = "TOTOLINK无线路由器存在安全漏洞，影响运行固件版本V5.3c5507及以下版本的设备。该漏洞属于商业nday（未公开披露），漏洞类型尚未明确，无CVE编号，CVSS评分未公布。攻击者在能够访问路由器网络接口的前提下，可通过向目标设备发送特制请求触发该漏洞，进而获取路由器控制权限或造成服务中断。受影响范围涵盖使用该固件版本的所有TOTOLINK品牌路由器设备。"
published = "2023-08-09"
remediation = "建议禁止将路由器管理界面（如80/443/8080端口）映射到公网，通过防火墙仅允许受信任内网IP访问；关闭不必要的远程管理功能（如Telnet/SSH/WAN侧管理），并定期关注TOTOLINK官方固件更新以升级至修复版本。"
score = 5.0
severity = "MEDIUM"
sources = ["hwpoc"]
title = "TOTOLINK 路由器 V5.3c5507 及之前版本 安全漏洞"
updated = "2023-08-09"

