[basic]
description = "Linux 内核 x86 FRED（灵活返回与事件分发）子系统中存在 WFE（WAIT_FOR_ENDBRANCH）状态未清除漏洞。当 CPU 间接分支跟踪器（IBT）处于 WFE 状态时，若解码器发现非 ENDBR 指令会触发 #CP 异常。FRED 机制在入口栈中保存并恢复 WFE 状态，但软件未在异常处理路径中清除该状态，导致从引发 #CP 的指令恢复执行时再次触发 #CP，形成死循环。本地攻击者可通过触发缺失 ENDBRANCH 的 #CP 异常（如运行 IBT 自测程序）造成系统拒绝服务。该漏洞影响 Linux 内核 x86 架构，CVSS 评分 5.5，需本地低权限访问。"
published = "2025-01-06T17:15:41.480"
remediation = "建议立即将 Linux 内核升级至 6.6.70、6.12.8 或 6.13 及以上版本，对应补丁提交为 b939f108e86b、dc81e556f2a0、151447859d6f。Ubuntu 24.04 LTS 用户可通过 apt update && apt upgrade 安装 linux-image-6.11.0-1011-lowlatency（USN-7381-1）或 linux-image-6.8.0-1028-nvidia（USN-7514-1）修复此问题。升级后须重启系统生效。如无法立即升级，可在启动参数中添加 ibt=off 禁用 IBT 作为临时缓解措施，但会降低控制流完整性保护。"
score = 5.5
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux kernel x86 FRED 缺失 ENDBRANCH 处理导致拒绝服务漏洞"
updated = "2026-06-17T08:12:55.900"

