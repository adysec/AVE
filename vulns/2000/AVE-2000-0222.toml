[basic]
description = "Hotmail 未对用户邮件中的 JavaScript 代码进行有效过滤，远程攻击者可通过向受害者发送包含恶意 IMG 标签的特制邮件触发漏洞，当受害者使用 Hotmail 打开邮件时，LOWSRC 或 DYNRC 参数中嵌入的恶意脚本将在浏览器中自动执行，导致任意代码执行。该漏洞影响 Hotmail 网页邮件服务，CVSS 评分 7.5，危害等级高。"
published = "2000-01-04T05:00:00.000"
remediation = "微软已通过服务器端更新修复此漏洞，方案包括：1) 对 IMG 标签的 LOWSRC 和 DYNRC 属性实施严格的输入过滤，禁止嵌入 JavaScript 代码；2) 启用 HTML 邮件内容安全策略（CSP），阻止内联脚本执行；3) 建议用户启用邮件纯文本模式，在 Outlook.com 设置中关闭 HTML 渲染作为临时缓解措施。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "Microsoft Hotmail 远程代码执行漏洞"
updated = "2026-06-16T21:50:58.153"

