[basic]
description = "Microsoft Windows Media Player 7.0 处理 .ASX（Active Stream Redirector）文件时存在缓冲区溢出漏洞，远程攻击者可构造特制的 .ASX 文件诱导用户打开，触发缓冲区溢出，进而导致任意代码执行。该漏洞影响 Windows Media Player 7.0 及可能更早版本，CVSS 评分 7.5，危害等级高危。用户应避免打开来源不明的 .ASX 文件并更新至最新版本。"
published = "2001-01-09T05:00:00.000"
remediation = "立即安装 Microsoft 安全公告 MS00-090 提供的补丁：Windows Media Player 6.4 用户下载 https://www.microsoft.com/download/details.aspx?FamilyId=9B94D3F0-9CF3-4A5F-8215-A221DDD923B0，Windows Media Player 7 用户下载 https://www.microsoft.com/download/details.aspx?FamilyId=BAF62356-D717-4B8F-97E0-299A7697A083。也可通过 Windows Media Player 自动更新功能获取修复。对于仍在使用旧版系统的环境，建议升级操作系统或更换为支持最新安全更新的 Windows Media Player 版本。"
score = 7.5
severity = "HIGH"
sources = ["exploitdb"]
title = "Microsoft Windows Media Player 7.0 ASX 远程缓冲区溢出漏洞"
updated = "2026-06-16T21:53:10.483"

