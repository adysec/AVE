1. It's a buffer overflow in `mhshow` in the Linux `nmh` package
2. Remote attackers can execute commands via malformed MIME headers in an email message
3. Red Hat released RHSA-2000:006 to fix this
4. The fix version for Red Hat was nmh-0.27-3 or later
The previous TOML had a remediation field that was empty (the content was just a long rambling text that didn't actually contain remediation). I need to write a proper remediation in Chinese.
