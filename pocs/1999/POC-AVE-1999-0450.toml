[info]
author = "ave"
description = "检测 Netscape Enterprise Server 3.6 的 Accept 命令缓冲区溢出漏洞。通过发送超长 Accept 请求头触发缓冲区溢出，若服务器崩溃或返回异常状态则存在漏洞。"
id = "POC-AVE-1999-0450"
name = "Netscape Enterprise Server Accept Buffer Overflow PoC"
severity = "medium"
tags = ["ave-1999-0450"]
vuln_id = [
    "CVE-1999-0751",
    "AVE-1999-0450",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/"
protocol = "http"

[poc.requests.headers]
Accept = ""

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "Connection refused",
    "No route to host",
]
