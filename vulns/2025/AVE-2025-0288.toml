[basic]
description = "驰骋 BPM 低代码开发平台中的 RichUploadFile 组件存在任意文件上传漏洞，未授权的远程攻击者可通过构造恶意 HTTP 请求，将包含恶意代码的 WebShell 文件上传至服务器，从而获取服务器控制权，实现远程代码执行。该漏洞影响驰骋 BPM 多个版本，攻击复杂度低，无需用户交互，危害严重。"
published = "0719"
remediation = "在 RichUploadFile 接口中增加文件类型白名单校验，仅允许上传图片/文档等安全类型（如 jpg/png/pdf），禁止上传 jsp/php/aspx 等可执行脚本文件；对上传文件内容头做 MIME 类型二次校验，防止伪造扩展名绕过；将上传目录权限设置为不可执行脚本（取消 write+execute），并随机化重命名存储文件名；配置 Web 服务器禁止访问上传目录下的脚本文件（如 Nginx 配置 location 对 .jsp/.php 返回 403）；建议联系厂商获取官方修复补丁或升级到最新版本以关闭该接口的未授权访问。如无法立即修复，可在 WAF 层面拦截对 /RichUploadFile 接口的 POST 请求中含 .jsp/.php/.aspx 后缀的文件上传流量作为临时缓解。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "驰骋 BPM 低代码开发平台 RichUploadFile 任意文件上传漏洞"
updated = "0719"

