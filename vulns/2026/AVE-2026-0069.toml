[basic]
description = "cPanel & WHM 的 cpdavd 组件存在权限管理与路径过滤不当漏洞，未经身份认证的远程攻击者可通过向 /cgi-bin/cpdavd/attachment 接口发送特制的包含路径遍历序列（如 ../../etc/passwd）的 HTTP 请求，绕过访问限制读取服务器上的任意文件。该漏洞影响 cPanel & WHM 多个版本，CVSS 评分 8.6，危害等级高。目前厂商尚未发布官方补丁，建议用户限制相关接口的访问权限。"
published = "2026-05-13T22:16:42.817"
remediation = "立即升级 cPanel/WHM 至修复版本：11.124.0.40+、11.126.0.61+、11.130.0.25+、11.132.0.34+、11.134.0.28+ 或 11.136.0.12+，WP Squared 升级至 11.136.1.15+。执行 `/scripts/upcp --force` 更新，使用 `/usr/local/cpanel/cpanel -V` 验证版本。如无法立即升级，可在防火墙层面阻断对端口 2079 和 2080 的入站流量作为临时缓解措施。"
score = 8.6
severity = "HIGH"
sources = ["hwpoc"]
title = "cPanel & WHM cpdavd 任意文件读取漏洞"
updated = "2026-06-17T10:29:46.957"

