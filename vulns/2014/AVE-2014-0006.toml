[basic]
description = 'Titan FTP Server 10.40 build 1829之前版本的Web界面存在目录遍历漏洞。远程攻击者可通过向search-bar参数提交包含".."（点点）的路径序列，利用Go动作触发目录遍历，从而列出服务器上所有用户名。该漏洞源于程序未对用户输入的文件路径进行充分过滤，属于CWE-22路径遍历类漏洞。攻击者无需身份认证即可利用，CVSS评分5.0，危害等级中等。建议用户升级至10.40 build 1829或更高版本以修复此漏洞。'
published = "2014-04-29T10:37:03.780"
remediation = "立即升级 Titan FTP Server 至 10.40 build 1829 或更高版本，该版本已修复 Web 接口中 search-bar 参数路径遍历漏洞。如无法立即升级，应在防火墙层面限制对 Titan FTP Server Web 管理界面（默认端口 80/443）的访问，仅允许受信任 IP 连接，并禁用不必要的 Web 管理功能作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["nuclei"]
title = "Titan FTP Server 目录遍历漏洞"
updated = "2026-06-17T00:05:38.810"

