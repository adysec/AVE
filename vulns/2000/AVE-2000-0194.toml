[basic]
description = "Red Hat Linux 6.0 的单用户模式身份验证存在安全绕过漏洞。本地攻击者可在系统引导进入单用户模式时，在密码提示符处按下 Ctrl+C 中断验证流程，从而绕过 root 密码认证直接获取 root 权限。该漏洞影响 Red Hat Linux 6.0 版本，攻击者需具备物理或控制台访问权限才能利用。"
published = "2000-02-23T05:00:00.000"
remediation = "在 LILO 配置文件 /etc/lilo.conf 中添加 `restricted` 和 `password=密码` 选项，然后运行 `lilo` 重新加载配置；或在 /etc/inittab 中将单用户模式行修改为 `~~:S:wait:/sbin/sulogin` 强制要求密码认证。如无法立即修改，可在 BIOS 设置中禁止从软盘/CDROM 引导并启用引导密码作为临时缓解。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "Red Hat Linux 6.0 单用户模式权限提升漏洞"
updated = "2026-06-16T21:51:15.137"

