[basic]
description = "Shadow Op Software Dragon Server 1.0/2.0 的 FTP 服务组件存在输入验证缺陷，远程攻击者无需身份认证即可通过向目标 FTP 服务器发送超长的 USER 命令（用户名参数），触发缓冲区溢出或服务崩溃，导致拒绝服务。该漏洞影响 Dragon Server 1.0 及 2.0 版本，攻击复杂度低，无需特殊权限即可利用。"
published = "2000-06-16T04:00:00.000"
remediation = "Dragon Server 1.0/2.0 已停止维护且厂商 Shadow Op Software 已不存在，无官方补丁。建议立即迁移至仍受支持的安全 FTP 服务器（如 vsftpd、ProFTPD 或 FileZilla Server），在防火墙/IPS 上限制对 TCP 21 端口的访问来源并配置规则拦截超长 USER 命令请求作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Shadow Op Software Dragon FTP Server 拒绝服务漏洞"
updated = "2026-06-16T21:51:49.370"

