[basic]
description = "Windows NT 4.0 的 TCP/IP 协议栈实现（tcpip.sys）存在拒绝服务漏洞。当目标系统在同一网络接口上绑定了多个 IP 地址时，远程攻击者无需身份认证即可向目标发送特制的 ICMP 子网掩码地址请求（Subnet Mask Address Request）数据包，触发系统内核崩溃或网络协议栈挂起，导致目标系统无法正常处理网络通信。该漏洞影响 Windows NT 4.0 SP4 之前的所有版本，攻击者仅需构造一个 ICMP 报文即可完成攻击，利用门槛极低。微软已在 Windows NT 4.0 Service Pack 4 中修复此问题。"
published = "1999-12-31T05:00:00.000"
remediation = "安装 Windows NT 4.0 Service Pack 4（SP4）或更高版本，该更新修复了 tcpip.sys 对 ICMP Subnet Mask 地址请求包的处理逻辑。如无法升级，可在边界防火墙上过滤入站 ICMP 类型 17（Subnet Mask Request）报文作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Microsoft Windows NT 4.0 ICMP Subnet Mask 拒绝服务漏洞"
updated = "2026-06-16T21:49:50.523"

