[basic]
title = "HP Visualize Conference FTP 未授权文件传输漏洞"
description = "HP Visualize Conference 的默认 FTP 配置存在授权绕过漏洞，会议中的任意参与者可在未经其他参会者授权的情况下向其发送文件。攻击者利用该默认配置缺陷，通过 FTP 协议向目标用户推送恶意文件，可能导致敏感信息泄露或进一步渗透。该漏洞影响 HP-UX 系统上的 HP Visualize Conference 软件，无需身份认证即可远程触发，CVSS v2.0 评分 7.5，危害等级高。"
severity = "HIGH"
