[basic]
description = "OpenBSD ftpd、NetBSD ftpd、ProFTPd 及 Opieftpd 等 FTP 服务器在 setproctitle（亦称 set_proc_title）函数中未正确过滤不可信格式字符串，存在格式化字符串漏洞。远程攻击者可通过向 FTP 服务器发送特制的格式字符串参数触发该漏洞，导致服务崩溃（拒绝服务）或执行任意命令。该漏洞影响多个 BSD 系 FTP 服务器实现，CVSS 评分 5.0，危害等级中等。"
published = "2000-07-07T04:00:00.000"
remediation = "升级 OpenBSD ftpd 到修复版本（如 OpenBSD 2.7 之后的安全补丁版本），升级 ProFTPd 到 1.2.0rc2 或更高版本。临时缓解措施：在 ftpd 配置中禁用 setproctitle 调用，或在代码层面确保 setproctitle 使用固定格式字符串而非直接传入用户可控内容作为格式化参数，避免格式化字符串注入。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "OpenBSD ftpd 格式化字符串远程代码执行漏洞"
updated = "2026-06-16T21:52:01.777"

