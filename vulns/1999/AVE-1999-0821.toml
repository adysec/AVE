[basic]
description = "Windows NT 系统中关键系统文件或目录权限设置不当，导致低权限用户或本地攻击者可能读取、修改或删除系统关键文件，从而造成信息泄露、权限提升或系统崩溃。该漏洞影响 Windows NT 4.0 及更早版本，攻击者只需拥有本地访问权限即可利用，无需特殊条件。攻击者可利用不当权限覆盖系统文件或获取敏感信息，严重威胁系统安全性。微软已在后续安全更新中修复此问题。"
published = "1999-01-01T05:00:00.000"
remediation = '使用 Windows NT 资源工具包中的 cacls 或 xcacls 工具，将系统关键目录（如 %SystemRoot%、%SystemRoot%\System32）的权限设置为 Administrators 和 SYSTEM 完全控制，Users 仅读取和执行。对于已停止支持的 Windows NT 4.0，建议升级至受支持的 Windows Server 版本以持续获取安全更新。'
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "Microsoft Windows NT 系统文件权限漏洞"
updated = "2026-06-16T21:48:38.460"

