[info]
author = "AVE"
description = "检测目标是否提供可触发 Netscape Communicator JPEG 注释堆溢出漏洞的恶意 JPEG 图片。漏洞存在于 Netscape Communicator 4.73 及更早版本，当 JPEG 注释段包含非法字段长度值 1 时触发堆缓冲区溢出。"
id = "POC-AVE-2000-0510"
name = "CVE-2000-0655 JPEG Comment Heap Overflow PoC"
severity = "medium"
tags = [
    "cve-2000-0655",
    "jpeg",
    "heap-overflow",
    "netscape",
]
vuln_id = [
    "CVE-2000-0655",
    "AVE-2000-0510",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/poc-cve-2000-0655.jpg"
protocol = "http"

[poc.requests.body]
content = ""
type = "raw"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "JFIF",
    "FFFE",
]
