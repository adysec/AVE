[basic]
description = "Apache 1.3.12 在 SuSE Linux 6.4 系统中的默认配置启用了 WebDAV 扩展模块，远程攻击者可通过向目标服务器发送特制的 PROPFIND HTTP 请求方法，利用服务器对 WebDAV 目录列举功能的错误配置，实现对任意目录的遍历与文件列表获取。该漏洞可能导致敏感文件路径泄露，为进一步攻击提供信息支撑。攻击无需身份认证，仅需网络可达即可触发。受影响的版本主要为 SuSE Linux 6.4 中搭载的 Apache 1.3.12。"
published = "2000-11-14T05:00:00.000"
remediation = "升级 Apache 至 1.3.14 及以上版本，或在 httpd.conf 中注释掉 LoadModule dav_module modules/mod_dav.so 行以禁用 WebDAV 模块，也可在 Directory 配置中添加 `<LimitExcept GET POST OPTIONS>` 限制来阻止 PROPFIND 请求。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Apache HTTP Server 1.3.12 WebDAV 目录列举漏洞"
updated = "2026-06-16T21:52:38.377"

