[basic]
description = "NFS 服务中的 rpc.statd 组件存在输入验证缺陷，远程攻击者无需身份认证，可通过向目标系统发送特制的恶意 RPC 请求，利用该漏洞非法删除或创建任意文件。该漏洞影响多种 Unix 操作系统（包括 DG/UX 等），CVSS 评分 5.0，危害等级中等，攻击者利用后可破坏系统文件完整性，进而实施进一步的入侵攻击。"
published = "1996-04-24T04:00:00.000"
remediation = "升级 nfs-utils 至修复版本（Linux 系统升级至 0.1.6 以上），或安装对应操作系统的安全补丁。如无需 NFS 服务，可停止 rpc.statd 服务（`service nfs-kernel-server stop`）并禁用端口映射（rpcbind）。在防火墙上限制对 TCP/UDP 111 和 32771 端口的访问，仅允许可信来源连接。"
score = 5
severity = "MEDIUM"
sources = ["redhat"]
title = "多种 Unix 系统 NFS rpc.statd 远程文件创建删除漏洞"
updated = "2026-06-16T21:47:21.823"

