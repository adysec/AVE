[basic]
description = "BEA WebLogic Server 的代理插件存在缓冲区溢出漏洞，远程攻击者可通过向目标服务器发送包含超长路径的 .JSP 扩展名特制 URL 请求，触发缓冲区溢出，从而在系统上执行任意命令。该漏洞影响多个 BEA WebLogic Server 版本，CVSS 评分 10.0，危害等级严重。攻击者无需身份认证即可远程利用，建议升级至修复版本或安装补丁。"
published = "2000-10-20T04:00:00.000"
remediation = "升级至 BEA WebLogic Server 5.1.0 SP8 及以上版本即可修复该漏洞。该漏洞源于代理插件对超长 .JSP 扩展 URL 请求的缓冲区边界校验缺失，导致远程攻击者无需认证即可触发缓冲区溢出并执行任意命令。建议同时限制反向代理仅允许可信来源的请求，并禁用不必要的 .JSP 映射。"
score = 10
severity = "CRITICAL"
sources = ["cve"]
title = "BEA WebLogic Server 代理插件缓冲区溢出远程代码执行漏洞"
updated = "2026-06-16T21:52:15.377"

