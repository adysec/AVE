[basic]
description = "Joomla! 的 Jimtawl（com_jimtawl）组件 1.0.2 存在目录遍历（路径遍历）漏洞，根源在于其对用户传入的 `task` 参数未做充分的路径安全校验，未过滤 `../`（点点）序列。远程攻击者在无需身份认证的情况下，可向 `index.php` 的 `task` 参数注入包含 `../` 的恶意路径，从而跨越 Web 根目录读取服务器上的任意文件（如配置文件、密码文件等敏感信息），并可能借此造成其他未明确说明的安全影响。该漏洞影响运行 Joomla! 并安装了 Jimtawl 1.0.2 组件的网站，攻击条件仅为目标站点存在该脆弱组件且可直接访问前端入口，利用方式简单，危害较大。"
published = "2011-03-23T22:00:01.683"
remediation = "立即升级或卸载存在漏洞的 Janguo Jimtawl (com_jimtawl) 1.0.2 组件，改用官方已修复的版本；若暂无法升级，请登录 Joomla! 后台在「扩展管理」中禁用或移除该组件，并在 Web 服务器（如 Apache）配置中拒绝 index.php 中 task 参数包含 `../` 序列的请求，作为临时缓解措施。"
score = 7.5
severity = "HIGH"
sources = ["nuclei"]
title = "Janguo Jimtawl 组件 目录遍历漏洞"
updated = "2026-06-16T23:25:30.723"

