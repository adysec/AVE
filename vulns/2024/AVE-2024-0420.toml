[basic]
description = """360天擎终端安全管理系统存在SQL注入漏洞，位于报表同步接口 /api/dp/rptsvcsyncpoint 的 ccid 参数处。该接口未对用户输入进行充分的参数化处理和过滤，攻击者可构造包含恶意SQL片段（如 "';SELECT PG_SLEEP(5)--"）的 ccid 参数值发起请求，使后端数据库执行非预期的SQL语句。成功利用可导致数据库信息泄露、数据被篡改，甚至结合数据库权限实现进一步内网渗透。该漏洞影响使用存在缺陷版本的360天擎系统，攻击条件为攻击者能够网络访问该接口且无需身份认证，通过发送特制HTTP请求即可远程触发。"""
published = "0725"
remediation = "建议立即升级 360 天擎至 V5.0 版本及以上版本（建议升级至最新 V5.0.1.1030 版本），或通过 360 安全卫士企业版控制台一键修复。临时缓解措施：在 WAF/防火墙层面配置 SQL 注入防护规则，拦截包含 ';SELECT PG_SLEEP、UNION SELECT、OR 1=1 等特征的 SQL 注入载荷；同时在应用层对 /api/dp/rptsvcsyncpoint 接口的 ccid 参数实施严格的参数化查询与输入校验，禁止拼接 SQL 语句。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
