[basic]
description = "IBM AIX 4.3.2 系统的 ftpd 守护进程在处理 FTP 协议数据时存在缓冲区溢出漏洞。由于 libc 库相关函数对用户输入的长度校验不足，远程攻击者可在未通过身份认证的情况下，向目标 FTP 服务的 21 端口发送超长且特制的命令或参数，触发栈缓冲区溢出并覆盖返回地址，进而在目标系统上以 root 权限执行任意代码。该漏洞影响运行 AIX 4.3.2 且开启 ftpd 服务的系统，攻击仅需网络可达目标即可发起，无需任何身份凭证。"
published = "1999-09-28"
remediation = "安装 IBM 官方 APAR 补丁 IY26576，或直接升级至 AIX 4.3.3 或更高版本以彻底修复该缓冲区溢出漏洞。在补丁安装前，可通过编辑 /etc/inetd.conf 注释掉 ftpd 服务条目并重启 inetd 进程临时禁用 FTP 服务；若业务需要 FTP，则通过 TCP Wrappers 配置仅允许可信 IP 地址访问 21 端口，以缩小攻击面。"
score = 10.0
severity = "CRITICAL"
sources = [
    "cve",
    "exploitdb",
]
title = "IBM AIX ftpd 远程缓冲区溢出漏洞"
updated = "1999-09-28"

