[basic]
description = "INN（InterNetNews）新闻服务器 2.2.1 及更早版本存在缓冲区溢出漏洞，远程攻击者可通过向目标系统发送特制的恶意文章数据触发该漏洞，导致服务进程崩溃，造成拒绝服务。该漏洞影响运行 INN 2.2.1 及之前版本的系统，攻击者无需认证即可远程发起攻击，危害等级中等。建议升级至更高版本修复此漏洞。"
published = "2000-10-20T04:00:00.000"
remediation = "升级 INN 至 2.3.0 或更高版本，该版本已修复缓冲区溢出问题。如无法升级，可在配置文件 `/etc/news/inn.conf` 中限制可连接客户端 IP 范围，并在防火墙层面限制 119 (NNTP) 端口的访问来源，仅允许受信任的新闻服务器连接。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "ISC INN 缓冲区溢出拒绝服务漏洞"
updated = "2026-06-16T21:51:33.303"

