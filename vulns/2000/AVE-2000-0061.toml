[basic]
description = "Nosque MsgCore 1.9（原 Super Mail Transfer Package，简称 SMTP）SMTP 服务器在处理 SMTP 会话命令时存在内存泄漏漏洞。远程攻击者无需身份认证，只需在同一个 SMTP 会话中重复发送 HELO、MAIL FROM、RCPT TO 和 DATA 等命令，即可触发服务端内存持续泄漏，最终导致系统内存耗尽、SMTP 服务崩溃或不可用，构成拒绝服务攻击。该漏洞影响运行 MsgCore 1.9 版本的邮件服务器，攻击门槛低、效果直接。Nosque 已在后续版本中修复了该内存泄漏问题，建议升级至修复版本。"
published = "2000-01-13T05:00:00.000"
remediation = "建议将 Nosque MsgCore 1.9 替换为当前主流维护中的 SMTP 服务器（如 Postfix、Exim、Microsoft Exchange 等），升级至各厂商最新稳定版本以消除该内存泄漏漏洞。如短期内无法完成替换，可在防火墙或路由器上对同一源 IP 的 SMTP 连接数进行速率限制，并限制单次会话中 HELO、MAIL FROM、RCPT TO、DATA 命令的重复次数，同时缩短会话空闲超时，以临时降低被拒绝服务攻击的风险。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Nosque MsgCore 内存泄漏拒绝服务漏洞"
updated = "2026-06-16T21:50:56.910"

