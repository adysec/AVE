[info]
author = "ave"
description = "检测 AnalogX SimpleServer:WWW 1.0.5 缓冲区溢出漏洞。向目标 80 端口 /cgi-bin/ 路径发送超长 GET 请求（约 8000 字符），触发栈溢出导致服务进程崩溃，造成拒绝服务。验证方式为发送畸形请求后检查服务是否无法响应。"
id = "POC-AVE-2000-0396"
name = "AnalogX SimpleServer:WWW 1.0.5 缓冲区溢出拒绝服务 PoC"
severity = "high"
tags = ["cve-2000-0473"]
vuln_id = [
    "CVE-2000-0473",
    "AVE-2000-0396",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/cgi-"
protocol = "http"

[[poc.requests.matchers]]
expect = true
status = [200]
type = "status"
