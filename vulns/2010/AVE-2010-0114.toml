[basic]
description = "Joomla! JExtensions JE Job (com_jejob) 组件 1.0 版本的 index.php 文件中 item 操作的 catid 参数存在 SQL 注入漏洞。未经身份认证的远程攻击者可通过向 catid 参数传递特制的 SQL 语句，执行任意 SQL 命令，导致数据库信息泄露、数据篡改甚至服务器完全沦陷。该漏洞影响使用该组件的所有 Joomla! 站点，攻击者无需认证即可远程利用，CVSS 评分 7.5，属高危漏洞。攻击者可构造恶意 catid 参数值（如 ' UNION SELECT ...）注入 SQL 语句，获取数据库敏感信息或写入 Webshell 进一步控制服务器。厂商已停止维护该组件，建议立即卸载或升级至安全版本。"
published = "2011-11-02T21:55:16.997"
remediation = "立即升级或卸载存在漏洞的 Harmistechnology JE Job (com_jejob) 1.0 组件，替换为官方已修复版本或停用该组件。临时缓解措施：在 Joomla 后台禁用 com_jejob 组件，并通过 Web 应用防火墙对 index.php 的 catid 参数做 SQL 注入过滤与输入校验，限制远程匿名访问。"
score = 7.5
severity = "HIGH"
sources = ["nuclei"]
