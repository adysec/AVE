[basic]
description = "Microsoft IIS 4.0/5.0 存在可执行文件请求解析漏洞，远程攻击者无需身份认证即可通过向目标服务器发送特制的 HTTP 请求，在可执行文件名称后附加操作系统命令，触发 IIS 解析缺陷从而执行任意命令。该漏洞影响 Windows NT 4.0 及 Windows 2000 上运行的 IIS 4.0/5.0 版本，CVSS 评分 7.5，危害等级高。微软已在 2000 年 10 月安全公告 MS00-080 中发布补丁修复此漏洞。"
published = "2000-12-19T05:00:00.000"
remediation = '及时安装 Microsoft 安全公告 MS00-080 对应补丁，或升级 IIS 至 6.0 及以上版本（Windows Server 2003+）。如无法升级，在 IIS 管理器中禁用 .bat/.cmd 等可执行文件的脚本映射，并在 Web 站点权限中移除"执行（如 ISAPI 应用程序或 CGI）"权限，改为仅"脚本"权限。'
score = 7.5
severity = "HIGH"
sources = ["exploitdb"]
title = "Microsoft IIS 可执行文件解析远程命令执行漏洞"
updated = "2026-06-16T21:52:40.523"

