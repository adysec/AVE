[basic]
description = "Linux 内核 IPv6 协议栈中的 __ip6_append_data 函数存在符号整数溢出漏洞，该函数将 length 变量定义为 int 类型，在计算附加数据长度时（如 2147479552 + 8567）超出 int 表示范围，导致整数溢出。本地攻击者可通过精心构造的 sendmsg 调用触发该溢出，造成内核行为不可预测，可能导致系统崩溃或信息泄露。该漏洞影响 Linux 内核 5.16 及之前版本，CVSS 评分 5.5，危害等级中等。Linux 社区已通过将 length 变量类型改为 size_t 修复此问题。"
published = "2025-02-26T07:01:48.433"
remediation = "立即升级 Linux 内核至 5.18.6、5.15.180 或 5.10.236 及以上版本，各稳定分支已分别包含修复 commit f93431c86b63。该漏洞为 __ip6_append_data 函数中 length 变量使用有符号 int 类型导致整数上溢，攻击者可利用特制 IPv6 报文触发拒绝服务。如无法立即升级内核，可执行 sysctl -w net.ipv6.conf.all.disable_ipv6=1 并写入 /etc/sysctl.conf 禁用 IPv6 协议栈作为临时缓解措施。"
score = 5.5
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux IPv6 __ip6_append_data 整数溢出漏洞"
updated = "2026-06-17T05:18:59.157"

