[basic]
description = "SalesLogix eViewer 的 slxweb.dll 管理程序未对用户进行身份认证，远程攻击者可通过直接访问该组件的 URL 发送管理命令（如 command=shutdown）导致进程终止。由于该组件默认安装在 Web 服务器的 /scripts 目录且无法更改位置，攻击者可重复发送请求造成持续性拒绝服务，使应用程序无法正常提供服务。"
published = "2000-08-03T04:00:00.000"
remediation = "从 Web 服务器中移除 slxweb.dll 管理组件，或在 Web 服务器配置中限制对 /scripts/slxweb.dll 及 /scripts/slxweb.dll/admin 的访问路径，仅允许受信任的内网地址访问并启用身份认证。如短期内无法移除，应在边界防火墙或反向代理上阻断外部对 slxweb.dll 管理接口的未授权请求。"
score = 5.0
severity = "MEDIUM"
sources = ["cve"]
title = "SalesLogix eViewer slxweb.dll 未授权访问拒绝服务漏洞"
updated = "2026-06-16T21:51:22.993"

