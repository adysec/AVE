[basic]
description = "Adtran MX2800 M13 多路复用器以太网接口存在拒绝服务漏洞，远程攻击者无需认证即可向目标设备的以太网接口发送大量 ICMP Ping 数据包（Ping Flood），耗尽设备处理资源导致系统崩溃重启。该漏洞影响 Adtran MX2800 M13 系列复用器，CVSS 评分 5.0，危害等级中等。可通过限制 ICMP 流量速率或访问控制列表缓解风险。"
published = "2000-04-19T04:00:00.000"
remediation = "该设备已停止技术支持，无法通过官方补丁修复。建议在边界防火墙上配置 ICMP 速率限制（如每秒 10 个包），或添加 ACL 仅允许受信任源 IP 发送 ICMP 请求至该接口。条件允许时应升级至支持抗 ICMP 洪泛攻击的较新型号复用器设备。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Adtran MX2800 M13 Multiplexer 以太网接口拒绝服务漏洞"
updated = "2026-06-16T21:51:24.773"

