[basic]
description = "Cisco IOS 11.1 至 12.1 版本的 HTTP 服务存在输入验证不当漏洞（CWE-20）。远程攻击者无需身份认证，通过向目标路由器或交换机发送包含 `%%` 字符串的特制 URL 请求，即可触发该漏洞，导致设备 HTTP 服务崩溃，造成拒绝服务。该漏洞影响大量 Cisco 路由器和交换机设备，CVSS 评分 7.1，危害等级高。目前 Cisco 已发布安全公告，建议用户升级至不受影响的 IOS 版本。"
published = "2000-04-26T04:00:00.000"
remediation = "升级 Cisco IOS 至 12.1.5 或更高版本，该漏洞已在后续版本修复。如无法升级，可在全局配置模式下使用 `no ip http server` 命令禁用 HTTP 服务，或通过访问控制列表（ACL）限制仅允许可信管理 IP 访问 HTTP 服务（80/443 端口）作为临时缓解措施。"
score = 7.1
severity = "HIGH"
sources = ["exploitdb"]
title = "Cisco IOS HTTP 拒绝服务漏洞"
updated = "2026-06-16T21:51:35.753"

