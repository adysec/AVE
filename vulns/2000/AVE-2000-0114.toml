[basic]
description = 'Microsoft IIS 3.0/4.0 及 Microsoft Index Server 2.0 内置的示例 Internet Data Query (IDQ) 脚本存在目录遍历漏洞。远程攻击者无需身份认证，通过向目标服务器发送包含 "../" 序列的特制 HTTP 请求，即可突破路径限制读取服务器上的任意文件（如系统配置文件、源代码等）。该漏洞利用难度低，可导致敏感信息泄露，影响 Windows NT 4.0 等平台。微软已在安全公告 MS00-006 中发布补丁修复此漏洞。'
published = "2000-01-26"
remediation = "此漏洞影响已停止支持的 IIS 3.0/4.0 及 Index Server 2.0，建议立即升级至 Windows Server 2016+ 自带的 IIS 10 或更高版本。如无法升级，可卸载 Index Server 和 IDQ 脚本映射（.idq/.ida），并在 IIS 管理器中禁用「允许路径中包含..」选项。对无法修补的旧系统应隔离网络或下线。"
score = 5.0
severity = "MEDIUM"
sources = ["cve"]
title = "Microsoft IIS 及 Index Server 目录遍历漏洞"
updated = "2026-06-16"

