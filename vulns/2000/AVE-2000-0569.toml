[basic]
description = "NAI Net Tools PKI 服务器 1.0 版本（HotFix 3 之前）的 strong.exe 程序中存在目录遍历漏洞。远程攻击者可通过向注册服务器发送特制的 HTTPS 请求，在路径参数中使用 `../` 序列进行目录跳转，从而突破 Web 根目录限制，读取服务器上的任意敏感文件（如配置文件、密码文件等）。该漏洞无需认证即可利用，攻击复杂度较低。"
published = "2000-10-20T04:00:00.000"
remediation = "立即安装 NAI Net Tools PKI Server 1.0 HotFix 3 或更高版本，该补丁修复了 strong.exe 中路径遍历问题。如无法升级，应在防火墙或反向代理层面限制对 /enrollment 路径的 HTTPS 访问，仅允许受信 IP 访问 PKI 服务端口。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "NAI Net Tools PKI 服务器目录遍历漏洞"
updated = "2026-06-16T21:52:22.920"

