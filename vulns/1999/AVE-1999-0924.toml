[basic]
description = "WS_FTP Pro 6.0 在初始化文件 ws_ftp.ini 中采用弱加密算法存储用户口令，攻击者在获取该配置文件后即可轻易解密出明文口令，进而获取系统登录权限。该漏洞利用难度较低，无需特殊权限即可利用，对受影响系统的机密性和完整性构成严重威胁。"
published = "1999-07-29T04:00:00.000"
remediation = "升级 WS_FTP Pro 至 6.5 或更高版本，该版本已修复密码弱加密问题；鉴于 WS_FTP Pro 已停止维护且不再有安全更新，建议迁移至支持现代安全凭据存储的 FTP/SFTP 客户端（如 FileZilla 或 WinSCP），避免在配置文件中以任何形式明文或弱加密保存密码。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "WS_FTP Pro 配置文件口令弱加密漏洞"
updated = "2026-06-16T21:49:40.527"

