[basic]
description = "MySQL 3.23.36 之前版本存在目录遍历漏洞，本地攻击者可通过创建以 `..`（点号）开头的数据库名称，利用符号链接覆盖任意系统文件，从而提升权限至 root。该漏洞影响 MySQL 3.20.32 及 3.23.34 等版本，攻击者需拥有本地数据库创建权限，CVSS 评分 4.6，危害等级中危。"
published = "2001-06-27T04:00:00.000"
remediation = "升级 MySQL 至 3.23.36 或更高版本，该版本修复了目录遍历漏洞，禁止数据库名以 `..` 开头。如无法升级，可在应用层校验所有数据库创建请求，拒绝名称以 `..` 开头的操作，并限制 MySQL 运行用户的文件系统权限，避免写入敏感目录。"
score = 4.6
severity = "MEDIUM"
sources = ["exploitdb"]
title = "MySQL 符号链接文件覆盖漏洞"
updated = "2026-06-16T21:54:15.013"

