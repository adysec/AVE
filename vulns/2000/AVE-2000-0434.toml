[basic]
description = "Savant WebServer 2.1 存在一个 CGI 源代码泄露漏洞。攻击者可通过发送不包含 HTTP 版本号的 GET 请求远程读取 CGI 脚本的源代码。该漏洞影响 Savant WebServer 2.1 版本，攻击者无需身份验证即可利用该漏洞获取源代码，泄露服务器内部实现和敏感信息。该漏洞由攻击者发起的简单网络请求即可触发，攻击条件非常宽松。该漏洞利用攻击者编写的恶意请求，可直接通过 Web 浏览器或网络工具实现，攻击过程无需复杂交互，攻击者可轻松获取服务器源代码，进而进一步攻击服务器，危及系统安全。该漏洞 CVSS 评分 5.0，风险等级中低，影响服务器信息安全和代码安全。"
published = "2000-06-05T04:00:00.000"
remediation = '建议立即停用 Savant WebServer 2.1 并迁移至现代 Web 服务器（如 IIS 10+、Apache 2.4+、nginx 1.18+）。若必须继续使用，请在前置防火墙或 WAF 层面拦截不包含 HTTP 版本号（如无 "HTTP/1.0" 或 "HTTP/1.1"）的 GET 请求，并限制 CGI 目录执行权限、禁用目录浏览。建议尽快完成迁移，该软件已于 2000 年停止维护，无官方补丁可用。'
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Michael Lamont Savant WebServer 2.1 CGI 源代码泄露漏洞"
updated = "2026-06-16T21:51:54.847"

