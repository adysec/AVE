ave_id = "AVE-2026-0188"
aliases = ["CVE-2026-42208", "GHSA-r75f-5x8p-qvmc", "HWPOC-2026-034c822c"]
[basic]
title = "LiteLLM 代理 API 密钥验证中的预认证 SQL 注入漏洞"
description = "LiteLLM 是一个 AI 网关代理服务器，用于以 OpenAI 兼容格式调用大模型 API。版本 1.81.16 至 1.83.7 之前，代理在验证 API 密钥时直接将攻击者通过 Authorization 头部传入的密钥值拼接到 SQL 查询字符串中，而非作为参数化查询的绑定变量传递。未经认证的远程攻击者可向任意 LLM API 路由（如 POST /chat/completions）发送精心构造的 Authorization 头部，经由代理的错误处理路径触发该漏洞，从而读取甚至修改代理数据库中的敏感数据，包括用户凭据和 API 密钥，进而获得对代理及所管理凭证的未授权访问权限。"
severity = "CRITICAL"
score = 9.8
sources = ["hwpoc", "cve"]
published = "2026-05-08"
updated = "2026-07-14"
remediation = "立即将 LiteLLM 升级至 1.83.7 及以上版本，该版本已将用户输入作为参数化查询的绑定变量而非拼接到 SQL 字符串中修复此漏洞。如无法立即升级，可在 general_settings 中设置 disable_error_logs: true 阻断未认证输入到达脆弱查询的路径。该漏洞已被 CISA KEV 收录并检测到在野利用，应优先处理。"
[references]
urls = ["https://github.com/BerriAI/litellm/security/advisories/GHSA-r75f-5x8p-qvmc", "https://github.com/BerriAI/litellm/releases/tag/v1.83.7-stable", "https://nvd.nist.gov/vuln/detail/CVE-2026-42208"]
