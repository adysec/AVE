[basic]
description = 'Qualcomm Qpopper 2.53 及 3.0 版本 POP3 服务器在处理邮件消息时存在输入验证缺陷。当攻击者发送一条长度恰好为 1023 个字符且以 \n 结尾的特制邮件消息时，程序内部的 fgets 函数无法正确识别消息结束标识，导致缓存处理异常，进而引发拒绝服务或邮箱数据损坏。远程攻击者无需身份认证即可通过向目标服务器的 110 端口投递恶意邮件触发该漏洞。'
published = "2000-04-21T04:00:00.000"
remediation = '升级 Qpopper 至 3.0.1 或更高版本，该版本已修复 fgets 函数对消息行尾 \n 字符串的错误识别问题。如无法升级，可在 POP3 服务前端部署内容过滤规则，拦截长度超过 1023 字节且以 \n 结尾的异常邮件行，或限制单封邮件最大行长度以缓解拒绝服务攻击。'
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Qualcomm Qpopper 拒绝服务漏洞"
updated = "2026-06-16T21:51:28.230"

