[basic]
description = "Red Hat JBoss Enterprise Application Platform（JBoss EAP）4.2.0.CP09 之前版本及 4.3.0.CP08 之前版本中存在访问控制漏洞。远程攻击者可通过向 status servlet 发送带有 full=true 参数的恶意请求，绕过权限检查获取已部署 Web 应用的敏感上下文信息。该漏洞源于 CVE-2008-3273 修复不完整导致的回归问题，CVSS 评分 5.0，危害等级中危。受影响的版本包括 JBoss EAP 4.2.0 系列及 4.3.0 系列，建议升级至 CP09/CP08 及以上版本。"
published = "2010-04-28T22:30:00.840"
remediation = "升级 JBoss EAP 至 4.2.0.CP09 或 4.3.0.CP08 及以上版本（对应 RHSA-2010:0376/RHSA-2010:0377）。如无法立即升级，可在反向代理或防火墙层面限制对 /status 及 /JMX 端点的外部访问，仅允许可信任管理 IP 访问；同时禁用 status servlet 的 full=true 参数查询功能，或直接移除部署中的 status-invoker.sar 组件作为临时缓解。"
score = 5
severity = "MEDIUM"
sources = ["nuclei"]
title = "红帽 JBoss Enterprise Application Platform 信息泄露漏洞"
updated = "2026-06-16T23:18:22.633"

