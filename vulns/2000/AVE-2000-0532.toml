[basic]
description = "Shadow Op Software 开发的 Dragon FTP Server 1.0 及 2.0 版本存在拒绝服务漏洞。远程攻击者无需身份认证，通过向 FTP 服务的 USER 命令发送超长字符串，可触发服务器缓冲区溢出或异常处理错误，导致 FTP 服务进程崩溃，无法继续提供正常的文件传输服务。该漏洞攻击复杂度低，仅需网络可达即可利用，影响运行 Dragon FTP Server 的各类 Windows 系统。"
published = "2000-06-16T04:00:00.000"
remediation = "该产品已停止维护，建议立即迁移至仍在安全支持周期内的 FTP 服务器软件（如 vsftpd、ProFTPD 等），并在迁移前通过防火墙限制对 FTP 服务端口（默认 21）的访问来源 IP，同时在 FTP 服务器配置中限制 USER 命令输入长度不超过 64 字节以缓解拒绝服务风险。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Shadow Op Software Dragon FTP Server 拒绝服务漏洞"
updated = "2026-06-16T21:51:49.370"

