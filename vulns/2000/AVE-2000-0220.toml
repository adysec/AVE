[basic]
description = "GeoCel WindMail 3.0 存在远程文件读取漏洞。攻击者可通过向邮件系统提交包含 shell 元字符（如管道符、分号等）的特制请求，利用 WindMail 对用户输入过滤不严的缺陷，实现对目标系统任意文件的远程读取甚至命令执行。该漏洞影响 WindMail 3.0 版本，攻击者无需身份认证即可远程触发，CVSS 评分 5.0，危害等级中等。建议用户升级至更高版本或对用户输入进行严格过滤。"
published = "2000-03-25"
remediation = "升级 WindMail 至 3.0 以上版本，或安装厂商发布的安全补丁。如已停止支持，应对用户输入中的 | & ; $ ` 等 shell 元字符进行严格过滤，避免拼接至系统命令。建议迁移至仍在维护的邮件客户端（如 Thunderbird、Outlook），并限制邮件服务器对内部命令执行接口的访问。"
score = 5.0
severity = "MEDIUM"
sources = [
    "cve",
    "avd",
]
title = "GeoCel WindMail 3.0 远程文件读取漏洞"
updated = "2000-03-25"

