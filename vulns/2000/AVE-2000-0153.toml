[basic]
description = "Sun StarOffice 5.1 的 StarScheduler Web 服务器组件存在路径遍历漏洞，远程攻击者无需身份认证即可通过向目标发送包含 `..` 序列的特制 HTTP 请求，突破目录限制读取服务器上的任意文件，导致敏感信息泄露。该漏洞影响 Sun StarOffice 5.1 版本，攻击复杂度低，危害等级中等。"
published = "2000-03-09T05:00:00.000"
remediation = "建议立即升级 StarOffice 至 5.2 或更高版本，该漏洞已在后续版本中修复。如无法升级，可在 StarScheduler 配置中禁用 Web 服务器模块，或通过防火墙限制对 StarScheduler Web 服务端口（默认 8080）的访问，仅允许受信任 IP 连接。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Sun StarOffice 5.1 任意文件读取漏洞"
updated = "2026-06-16T21:51:09.300"

