[basic]
description = "HP-UX 11.00 及 10.20 系统中的 crontab 命令存在不安全的符号链接处理漏洞（CWE-59）。本地攻击者可通过在 /tmp 目录下创建指向目标文件的符号链接，利用 crontab -e 选项编辑计划任务时的文件操作缺陷，使 crontab 读取任意系统文件并通过错误信息泄露文件内容。该漏洞攻击复杂度低，无需特权即可利用，但需要本地用户身份访问系统。"
published = "2000-12-19T05:00:00.000"
remediation = "立即安装 HP 为该漏洞发布的 PHCO_22044 或等效安全补丁包，将 HP-UX 升级至 11i v1 (11.11) 及以上受支持版本。在 /tmp 目录上设置粘滞位（chmod 1777 /tmp），防止非所有者删除或重命名临时文件。通过编辑 /etc/cron.allow 文件将 crontab 使用权限限制为仅授权用户，并移除 /etc/cron.deny 中的通配条目以阻止未授权用户调用 crontab -e。"
score = 5.5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "惠普 HP-UX crontab 本地任意文件读取漏洞"
updated = "2026-06-16T21:52:53.140"

