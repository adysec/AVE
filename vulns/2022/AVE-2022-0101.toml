[basic]
description = "Linux 内核 MSM DRM 驱动程序中存在空指针解引用漏洞，由于驱动组件的 .remove 和 .shutdown 回调在硬件关闭逻辑上不一致，当 GPU 子设备探测失败导致 .bind 回调未执行时，系统关机过程中将调用 drm_atomic_helper_shutdown() 对未初始化的 DRM 设备进行操作，尝试获取未初始化的互斥锁，进而触发内核空指针解引用导致系统崩溃。本地攻击者可利用此漏洞通过构造特定硬件状态触发内核崩溃，造成拒绝服务。该漏洞影响 Linux 内核使用 MSM DRM 驱动的 Qualcomm 平台系统。"
published = "2025-09-15T14:15:36.873"
remediation = "升级 Linux 内核至已修复版本：5.19.17、6.0.3 或 6.1 及以上。对于使用 5.9 至 5.19.x 分支的系统，升级到 5.19.17 或更高版本；对于使用 6.0.x 分支的系统，升级到 6.0.3 或更高版本。若无法立即升级内核，可在系统关闭前手动禁用 msm DRM 驱动模块（rmmod msm 或在 modprobe.d 中黑名单 msm 模块），避免 shutdown 阶段触发空指针解引用导致内核恐慌。发行版用户可通过各自的包管理器（如 apt upgrade linux-image / dnf update kernel）安装已包含补丁的内核版本。"
score = 5.5
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux Kernel MSM DRM 子系统关机流程不一致导致内核崩溃漏洞"
updated = "2026-06-17T05:23:05.937"

