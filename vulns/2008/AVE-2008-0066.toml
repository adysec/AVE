[basic]
description = "思科 IOS 12.4 系统在 871 集成服务路由器上的 HTTP 管理组件存在多处理跨站请求伪造（CSRF）漏洞。远程攻击者可通过构造特制 HTTP 请求，诱使已认证的管理员在不知情的情况下访问恶意页面，从而以管理员权限执行任意命令，如通过 /level/15/exec/- 路径执行特权命令。该漏洞影响 Cisco 871 系列路由器，需结合社会工程学诱导目标管理员触发，CVSS 评分 4.3，危害等级中危。思科已发布安全公告建议用户限制管理访问来源。"
published = "2008-09-18T20:00:00.530"
remediation = "升级到不受此漏洞影响的 Cisco IOS 版本（如 15.x 系列），或迁移至支持的安全版本。如无法升级，在路由器上禁用 HTTP 管理服务（no ip http server），改用 HTTPS 管理（ip http secure-server）并配置 ACL 限制仅允许受信任管理 IP 访问。同时启用 AAA 认证和命令授权（aaa new-model），防止未授权命令执行。Cisco IOS 12.4 已停止支持，建议尽快迁移至受支持版本。"
score = 4.3
severity = "MEDIUM"
sources = ["kev"]
title = "Cisco IOS HTTP Administration 跨站请求伪造漏洞"
updated = "2026-07-14T05:16:15.780"

