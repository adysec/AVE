[basic]
description = "这是实际的字段内容"
published = "1999-12-01T05:00:00.000"
remediation = "该漏洞源于 Solaris/SunOS 的 arp 命令在解析 -f 参数指定文件时，将解析失败的行直接以内存转储形式输出，导致本地用户可读到包含敏感信息的文件内容。修复建议：升级到已修复该问题的 Solaris 2.6 及更高版本（或应用 Sun 相应的厂商补丁），并限制 arp 命令的普通用户执行权限；在无法立即升级时，可通过移除 /etc/arp 相关脚本中可被普通用户调用的 -f 选项、收紧文件权限（如 chmod 750 /usr/sbin/arp）以及利用 sudo 规则限制 arp 的使用作为临时缓解措施。"
score = 2.1
