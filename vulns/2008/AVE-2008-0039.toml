[basic]
description = "OpenOffice.org 2.x 版本（低于 2.4.2）存在多个整数溢出漏洞，攻击者可通过构造包含恶意 EMR 记录的 EMF 文件嵌入 StarOffice/StarSuite 文档，触发堆缓冲区溢出，进而实现远程任意代码执行，完全控制受害主机。该漏洞影响 Windows、Linux 等多平台 OpenOffice 部署，攻击向量为网络传播恶意文档，无需认证即可利用，CVSS 9.3 分级为 CRITICAL 级别，严重威胁系统机密性、完整性与可用性。"
published = "2008-10-30T20:00:00.903"
remediation = "将 OpenOffice.org 升级至 2.4.2 或更高版本（包括 3.0 系列）以修复此漏洞。前往 https://www.openoffice.org/download/ 下载对应操作系统的最新安装包并覆盖安装。如企业环境中使用 Ubuntu/Debian，可通过 apt-get install openoffice.org 获取上游厂商已修复的软件包。该漏洞无临时绕行方案，必须升级到修复版本后方可使用经 OOo/StarOffice 处理的文档中的 EMF 嵌入图片。"
score = 9.3
severity = "CRITICAL"
sources = ["tenable"]
title = "Apache OpenOffice OpenOffice.org 2.x 整数溢出导致堆缓冲区溢出漏洞"
updated = "2026-06-16T22:53:23.013"

