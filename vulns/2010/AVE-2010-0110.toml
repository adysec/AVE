[basic]
description = 'Joomla! 的 JotLoader（com_jotloader）组件 2.2.1 版本存在目录遍历（本地文件包含）漏洞。该组件在处理 index.php 的 section 参数时未对用户输入进行充分过滤与校验，远程攻击者可在该参数中插入 "../" 等目录遍历序列，从而读取目标服务器上任意文件（如配置文件、敏感源码等）。攻击无需身份认证，仅需向受影响站点发送特制的 HTTP 请求即可触发，影响所有运行 JotLoader 2.2.1 的 Joomla! 站点，可能导致敏感信息泄露与进一步入侵。'
published = "2010-12-29T22:33:32.633"
remediation = "建议立即将 JotLoader 组件升级至官方发布的 2.2.2 或更高版本（修复了 section 参数的目录遍历过滤）。若暂无法升级，可在 Joomla 后台禁用或卸载 com_jotloader 组件，并在 Web 服务器（如 Apache）配置中通过 mod_security 规则拦截包含 ../ 及 null 字节的 section 参数请求，同时在 php.ini 中设置 open_basedir 限制文件访问范围作为临时缓解措施。"
score = 6.8
severity = "MEDIUM"
sources = ["nuclei"]
title = "Joomla! JotLoader 组件 目录遍历本地文件包含漏洞"
updated = "2026-06-16T23:25:11.130"

