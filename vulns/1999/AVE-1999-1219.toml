[basic]
description = "Debian GNU/Linux 的 netstd 软件包中的 FTP 客户端存在缓冲区溢出漏洞。当 FTP 客户端接收到超长或特制的服务器响应时，由于缺乏正确的边界检查，可触发缓冲区溢出。攻击者可通过搭建恶意 FTP 服务器并诱导用户连接，导致客户端崩溃或实现以当前用户权限执行任意代码。该漏洞影响 Debian 2.0 及早期版本系统。"
published = "1999-01-03"
remediation = "升级 netstd 软件包至包含补丁的最新版本，或使用更安全的替代方案如 openssh sftp/scp。避免使用 FTP 客户端连接不可信的 FTP 服务器，限制 netstd 软件包的使用范围。"
score = 7.2
severity = "HIGH"
sources = ["cve"]
title = "Debian GNU/Linux netstd FTP客户端缓冲区溢出漏洞"
updated = "2024-11-20"

