[basic]
description = "SalesCart 购物车应用存在不安全的数据处理漏洞，远程攻击者可通过修改表单中的隐藏字段（Hidden Form Fields）来篡改敏感的交易信息，包括商品价格、数量及订单金额等。攻击者无需身份认证即可利用此漏洞，通过构造特制的 HTTP 请求直接修改提交的支付参数，造成未授权的价格变更或虚假交易。该漏洞影响 SalesCart 购物车系统，CVSS 评分 7.5，危害等级高。厂商已发布安全更新，建议用户升级至最新版本。"
published = "2000-02-01T05:00:00.000"
remediation = "立即升级 SalesCart 至最新版本，确保所有订单金额、数量等敏感数据存储在服务端会话而非 HTML 隐藏表单字段中；在服务端对提交的价格、商品 ID 等参数做完整性校验，拒绝与预期值不符的请求。如无法升级，应自行修改代码，用服务端 Session 替代隐藏字段存储购物车数据，并对所有表单提交参数执行服务端二次验证。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "SalesCart 购物车应用隐藏表单字段敏感信息篡改漏洞"
updated = "2026-06-16T21:51:00.290"

