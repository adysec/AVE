[basic]
description = "Excite for Web Servers (EWS) 1.1 版本存在密码存储安全漏洞，该软件在加密密码时会将明文密码的前两个字符直接附加到加密结果的开头，导致加密密码泄露了明文密码的部分信息。远程攻击者可利用此特性结合暴力破解或字典攻击方式，大幅降低猜测密码的难度，从而获取系统未授权访问权限。该漏洞影响 EWS 1.1 版本，CVSS 评分 7.2，危害等级高。"
published = "1998-11-30T05:00:00.000"
remediation = "Excite for Web Servers (EWS) 1.1 已停止维护且不再提供安全更新，建议立即迁移至其他受支持的 Web 服务器软件。如因遗留系统无法迁移，须手动修复文件权限：将 EWS 安装目录权限设为 750，确保 Architext.conf 配置文件仅对运行用户可读写（chmod 600），并移除其他用户对安装目录的写权限。同时限制 AT-admin.cgi 管理接口仅允许受信任 IP 访问，并在 Web 服务器前端或防火墙层面添加访问控制规则。密码加密缺陷无法通过配置修复，须在应用层改用随机盐值加密存储密码。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "Excite Excite for Web Servers 密码加密漏洞"
updated = "2026-06-16T21:49:39.893"

