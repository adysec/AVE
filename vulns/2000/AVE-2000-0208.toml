[basic]
description = "PowerScripts PlusMail WebConsole 1.0 的 CGI 程序存在权限认证缺陷，密码文件权限设置不当，导致远程攻击者无需有效凭据即可通过直接访问或修改密码文件来执行任意命令。该漏洞影响 PlusMail WebConsole 1.0 版本，CVSS 评分 7.5，危害等级高，攻击者利用此漏洞可完全控制目标邮件服务器。"
published = "2000-01-11T05:00:00.000"
remediation = "立即将 PlusMail 密码文件权限修改为 600（仅所有者可读写），禁止密码文件存放于 Web 可访问目录下。通过 Web 服务器（如 Apache）配置对该 CGI 脚本实施 IP 白名单访问控制和额外 HTTP 基本认证。由于 PowerScripts 产品已停止维护且不再发布安全更新，建议迁移至仍保持维护的邮件管理平台以彻底消除风险。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "PowerScripts PlusMail WebConsole 弱认证漏洞"
updated = "2026-06-16T21:50:56.790"

