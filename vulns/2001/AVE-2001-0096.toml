[basic]
description = "Microsoft Internet Security and Acceleration (ISA) Server 2000 的 Web 代理组件存在输入验证缺陷，远程攻击者无需身份认证即可通过发送特制的超长 Web 请求触发该漏洞，导致 Web 代理服务崩溃，造成拒绝服务。该漏洞影响 ISA Server 2000 所有版本，CVSS 评分 7.5，危害等级高危。受影响的系统需要安装安全更新或限制可提交的请求长度以缓解风险。"
published = "2001-07-02T04:00:00.000"
remediation = "安装 Microsoft 安全公告 MS01-016 提供的补丁程序，或升级至 ISA Server 2000 Service Pack 1 及以上版本。也可在 ISA Server 管理控制台中，配置 Web 请求筛选规则，限制单次请求的最大 URL 长度以缓解攻击。"
score = 7.5
severity = "HIGH"
sources = ["exploitdb"]
title = "Microsoft ISA Server 2000 Web Proxy 拒绝服务漏洞"
updated = "2026-06-16T21:53:56.570"

