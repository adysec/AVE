[basic]
description = "WordPress DB Backup 插件 4.5 及更早版本中的 download.php 文件存在目录遍历漏洞。由于程序未对 file 参数中的路径进行有效过滤，远程攻击者可通过在 file 参数中注入 ../ 等目录跳转序列，绕过访问限制读取服务器上的任意文件，如 wp-config.php 等敏感配置文件。该漏洞无需身份认证即可利用，攻击复杂度低，影响所有使用该插件的 WordPress 站点。建议用户立即升级插件至最新版本或移除该插件以消除风险。"
published = "2014-12-31T22:59:04.583"
remediation = "立即将 DB Backup 插件升级至 5.0 或更高版本（当前最新为 6.0），该版本已修复 download.php 中 file 参数未过滤路径遍历序列的问题。如无法升级，可删除插件目录中的 download.php 文件，或在 Web 服务器（如 Nginx/Apache）层面添加规则拦截包含 `../` 的请求路径，同时限制 `/wp-content/plugins/db-backup/` 目录的访问权限。"
score = 5
severity = "MEDIUM"
sources = ["nuclei"]
title = "WordPress DB Backup插件 目录遍历漏洞"
updated = "2026-06-17T00:17:47.680"

