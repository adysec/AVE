[basic]
description = "Joomla! 的 Canteen（com_canteen）组件 1.0 版本在 menu.php 中存在 SQL 注入漏洞。该组件在处理用户请求时未对传入 index.php 的 mealid 参数进行严格的输入校验与转义，导致攻击者可通过构造恶意的 SQL 语句拼接至数据库查询中。未经身份认证的远程攻击者可向目标站点发送特制的 HTTP 请求，利用该参数执行任意 SQL 命令，进而读取、篡改或删除数据库中的敏感数据，甚至在特定配置下进一步获取系统权限。该漏洞影响所有安装了 Canteen 1.0 组件的 Joomla! 站点，攻击条件仅需目标站点对外开放 Web 服务且存在该缺陷组件，利用方式简单，危害等级较高。"
published = "2011-11-01T22:55:04.023"
remediation = "由于 Joomla! Canteen (com_canteen) 组件 1.0 存在 SQL 注入漏洞且厂商已停止维护，建议立即从 Joomla! 后台卸载并彻底删除该扩展。若业务必须使用，应在代码中对 index.php 传入的 mealid 参数强制类型转换为整型（intval）并使用参数化查询/预处理语句，同时部署 WAF 拦截含 SQL 关键字的恶意请求作为临时缓解措施。"
score = 7.5
severity = "HIGH"
sources = ["nuclei"]
title = "Miniwork Com Canteen 1.0 SQL注入漏洞"
updated = "2026-06-16T23:25:54.267"

