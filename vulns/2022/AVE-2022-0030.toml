[basic]
description = "该漏洞涉及 Linux 内核 MMC（多媒体卡）核心子系统中将 `sprintf()` 替换为 `sysfs_emit()` 的代码改进。`sprintf()` 在 sysfs 显示函数中使用时存在缓冲区安全问题，而 `sysfs_emit()` 是内核提供的安全替代函数，可避免缓冲区溢出风险。该 CVE 已被 CVE 编号机构撤销/拒绝，并非实际安全漏洞，CVSS 评分为 0，不影响任何产品版本。"
published = "2025-02-26T07:01:03.620"
remediation = "升级 Linux 内核至 v5.18 及以上版本，该版本已合入上游提交 f5d8a5fe77ce 将 MMC 核心驱动中所有 sprintf() 替换为安全的 sysfs_emit()。对于无法升级内核的发行版，可反向移植该单个提交到当前内核源码的 drivers/mmc/core/ 目录下。临时缓解措施可限制本地用户对 /sys/bus/mmc/ 目录的访问权限。"
score = 5
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux MMC 核心子系统 sysfs_emit 安全加固改进"
updated = "2026-03-24T09:16:18.790"

