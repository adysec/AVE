[basic]
description = "IMail POP3 守护进程使用弱加密算法对邮件数据进行存储和传输，本地攻击者可通过分析加密强度不足的数据流或存储文件，绕过访问控制机制读取其他用户的邮件内容及敏感文件。该漏洞影响 IMail 系列版本，攻击者需具备本地系统访问权限，利用难度较高，CVSS 评分 2.1，危害等级低。"
published = "1999-03-04T05:00:00.000"
remediation = "建议升级到 Ipswitch IMail 6.0 及以上版本，该版本改进了 POP3 守护进程的认证加密机制，不再使用弱可逆加密存储密码。如无法升级，可在注册表中将 POP3 服务端口更改为非标准端口，并通过 Windows 本地安全策略限制仅允许受信任管理员账户登录服务器，阻止非授权本地用户交互式登录以降低攻击面。"
score = 2.1
severity = "LOW"
sources = ["avd"]
title = "Ipswitch IMail POP3 弱加密信息泄露漏洞"
updated = "2026-06-16T21:50:50.127"

