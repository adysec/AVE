[basic]
description = "Apache IoTDB 的 DataNode 接口未对查询的时间范围和聚合间隔施加合理限制，远程攻击者可通过构造极端参数（如超大时间跨度搭配最小聚合间隔）的查询请求，迫使 DataNode 在内存中构建过大的结果集，导致 Java 堆内存耗尽、进程崩溃，造成拒绝服务。该漏洞影响 Apache IoTDB 1.3.3 至 2.0.8 之前版本，CVSS 评分 7.5，危害等级高。官方已在 2.0.8 版本中修复。"
published = "2026-07-06T09:16:35.037"
remediation = "升级到 Apache IoTDB 2.0.8 及以上版本，该版本已对查询时间范围和聚合间隔施加合理限制，防止堆内存耗尽。临时缓解措施：在网关或反向代理层限制对 DataNode 的查询接口访问，并配置 JVM 堆内存上限（-Xmx）以控制单次查询最大内存消耗。建议同时监控查询请求中的时间范围参数，拒绝超过阈值（如时间跨度超过 30 天且聚合间隔小于 1 秒）的请求。"
score = 7.5
severity = "HIGH"
sources = ["hwpoc"]
title = "Apache IoTDB 极端时间范围查询致堆耗尽拒绝服务漏洞"
updated = "2026-07-07T17:53:36.780"

