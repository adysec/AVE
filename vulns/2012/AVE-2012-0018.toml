[basic]
description = "2 Click Social Media Buttons WordPress 插件 0.34 版本之前的 libs/xing.php 文件中存在跨站脚本漏洞，远程攻击者可通过向 xing-url 参数注入恶意的 Web 脚本或 HTML 代码触发该漏洞，导致恶意脚本在用户浏览器中执行。该漏洞影响启用该插件的 WordPress 网站，CVSS 评分 4.3，危害等级中危。攻击者无需认证即可实施攻击，需诱使用户访问特制链接。"
published = "2012-08-13T22:55:01.567"
remediation = "升级 WordPress 插件 2 Click Social Media Buttons 至 0.34 或更高版本，该版本已修复 xing-url 参数未正确过滤导致的 XSS 漏洞。如无法立即升级，可在 WordPress 后台暂时禁用该插件，并检查主题或功能中是否硬编码了相关短代码调用。"
score = 4.3
severity = "MEDIUM"
sources = ["nuclei"]
title = "Ppfeufer 2 Click Social Media Buttons WordPress 插件跨站脚本漏洞"
updated = "2026-06-16T23:44:45.333"

