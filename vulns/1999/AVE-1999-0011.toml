[basic]
description = "Lucent Ascend 路由器远程管理服务存在拒绝服务漏洞。未经认证的远程攻击者可向目标路由器的 150 端口（远程管理端口）发送特制数据包，导致路由器管理服务崩溃或停止响应，造成正常的远程管理功能不可用。该漏洞影响 Lucent Ascend 系列路由器，攻击者无需身份认证即可利用此漏洞实施拒绝服务攻击，危害网络设备的远程管理能力。"
published = "1999-03-01T05:00:00.000"
remediation = "升级 Ascend 路由器固件至厂商最终支持版本（如有），或在防火墙上限制 TCP/UDP 150 端口仅允许受信任管理 IP 地址访问，并禁用不必要的远程管理功能（如 SNMP/TFTP 等辅助协议）；建议将老旧的 Ascend 路由器替换为受支持的新一代产品，同时使用带外管理网络（OOB）或 VPN 隧道保护管理通道，避免将管理接口暴露在非信任网络中。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Lucent Ascend 路由器远程管理拒绝服务漏洞"
updated = "2026-06-16T21:47:56.547"

