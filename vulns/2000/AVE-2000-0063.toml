updated = "2026-06-16"
remediation = "编辑 aserver 脚本将 ps 和 grep 命令路径改为绝对路径（如 /usr/bin/ps 和 /usr/bin/grep），并移除 aserver 的 setuid 权限位（chmod u-s /usr/bin/aserver），同时限制可执行用户组为受信任管理员。由于该漏洞年代久远，HP 已停止对 HP-UX 10.x/11.x 的主流支持，建议升级至受支持的操作系统版本。"
