[basic]
description = "SapporoWorks WinProxy 2.0 及 2.0.1 版本的 POP3 服务存在缓冲区溢出漏洞，远程攻击者无需身份认证即可通过向 POP3 服务发送超长的 USER、PASS、LIST、RETR 或 DELE 命令触发缓冲区溢出，从而在目标系统上执行任意命令。攻击者可直接利用该漏洞完全控制受影响的主机。官方尚未发布修复补丁，建议用户停止使用或升级到更高版本。"
published = "2000-06-27T04:00:00.000"
remediation = "立即升级 WinProxy 至 2.0.2 或更高版本，该版本已修复 POP3 服务中 USER、PASS、LIST、RETR、DELE 命令的缓冲区溢出问题。如厂商已停止支持且无法升级，建议在防火墙上阻止外部对 POP3 端口（默认 110/TCP）的访问，或更换为其他受支持的代理软件。"
score = 7.5
severity = "HIGH"
sources = ["exploitdb"]
title = "SapporoWorks WinProxy POP3 远程缓冲区溢出漏洞"
updated = "2026-06-16T21:52:04.063"

