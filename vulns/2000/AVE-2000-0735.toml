[basic]
description = "NetWin dMailWeb 及 CWMail 2.6g 版本的 POP 邮件服务器存在安全配置漏洞。其默认配置下完全信任所有 POP 服务器，未对连接来源进行任何身份验证校验，导致远程攻击者无需有效凭据即可绕过正常认证机制，直接向目标服务器发送恶意 POP 请求，造成服务拒绝。该漏洞影响 NetWin dMailWeb 与 CWMail 2.6g 版本，CVSS 评分 5.0，危害等级中危。"
published = "2000-06-23T04:00:00.000"
remediation = "升级 NetWin dMailWeb/cwMail 至最新修复版本（2.6g 之后版本已修复此信任配置缺陷），或手动修改配置文件将 POP 服务器信任列表限制为仅授权已验证的服务器。如无法升级，在网络层面通过防火墙限制对 POP 端口（110）的访问来源 IP，仅允许受信任的邮件服务器地址连接。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Netwin DMailWeb/CWMail 2.6g POP Server 拒绝服务漏洞"
updated = "2026-06-16T21:52:06.450"

