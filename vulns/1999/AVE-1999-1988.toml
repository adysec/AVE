[basic]
description = 'RPMMail 是一款用于接收和处理电子邮件的 Linux 程序，其 1.4 之前版本在解析邮件协议时存在命令注入漏洞。该程序在处理 SMTP 会话的 "MAIL FROM" 命令时，未对发件人地址中的特殊字符进行安全过滤与转义，直接将其拼接进后续的 shell 命令中执行。远程攻击者无需身份认证，只需向运行 RPMMail 的服务端发送一封在 "MAIL FROM" 命令中携带 shell 元字符（如分号、反引号、管道符等）的特制电子邮件，即可在目标系统上以程序运行权限执行任意系统命令。该漏洞影响所有使用 RPMMail 1.4 之前版本的 Linux 系统，攻击条件仅为能够与目标邮件服务建立 SMTP 连接，利用方式简单且危害极大，可导致服务器被远程控制。'
published = "1999-10-04T04:00:00.000"
remediation = "立即升级 RPMMail 至 1.4 或更高版本，可从 ftp://reedycreek.com 下载 rpmmail-1.4-2.i386.rpm 进行更新。若无法升级，请移除 /home/rpmmail/rpmmail 的 SUID 权限（chmod 755 /home/rpmmail/rpmmail）或卸载该软件包，并在防火墙层面限制 25 端口的入站连接作为临时缓解措施。"
score = 10
severity = "CRITICAL"
sources = ["cve"]
title = "Linux RPMMail 邮件命令注入远程代码执行漏洞"
updated = "2026-06-16T21:50:40.817"

