[basic]
description = "Gordano NTMail 4.2 内置 Web 服务器未对用户请求的文件路径进行充分校验，远程攻击者可通过在 URL 中插入 ../ 序列绕过目录限制，读取服务器任意文件（如 boot.ini）。该漏洞无需身份认证即可利用，攻击者只需知道目标文件名即可通过 HTTP 请求获取敏感信息。影响 Gordano NTMail 4.2 版本，CVSS v2.0 评分 5.0，危害等级中危。"
published = "1999-05-26"
remediation = "Gordano NTMail 4.2 已停止维护，建议升级到不受影响的最新版本；如无法升级，应通过防火墙限制对 NTMail Web 服务端口（默认 8000）的访问，仅允许可信 IP 连接，并禁用不必要的 Web 管理功能。"
score = 5.0
severity = "MEDIUM"
sources = ["cve"]
title = "Gordano NTMail 4.2 路径遍历漏洞"
updated = "2026-06-16"

