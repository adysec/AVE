[basic]
description = 'Cisco 路由器 9.17 及更早版本存在安全漏洞，远程攻击者可通过构造特定的 IP 源路由数据包绕过设备的安全限制。正常情况下，管理员可通过配置 "no ip source-route" 命令来禁止转发源路由数据包，但由于系统对这类数据包的过滤机制存在缺陷，攻击者可利用 IP 源路由选项人为指定数据包传输路径，从而绕过访问控制列表（ACL）等安全控制措施，访问本应受到限制的网络内部资源，导致敏感信息泄露或网络拓扑暴露。'
published = "1993-04-22"
remediation = '在路由器全局配置模式下执行 "no ip source-route" 命令禁用 IP 源路由转发功能，并在受影响接口上应用严格的访问控制列表（ACL）以过滤所有携带源路由选项的数据包。同时应将 Cisco IOS 升级至受影响版本之后的安全版本，以彻底消除该漏洞。'
score = 7.5
severity = "HIGH"
sources = [
    "nvd",
    "cve",
]
title = "Cisco 路由器 IP 源路由安全绕过漏洞"
updated = "2026-06-16"

