[basic]
description = "Elasticsearch 的 PatternBank 类中的 innerForbidCircularReferences 函数存在不受控制的资源消耗漏洞（CWE-400）。具有 read_pipeline Elasticsearch 集群权限的恶意用户可通过构造特制的递归查询请求，触发深度递归调用，导致 Elasticsearch 节点因资源耗尽而崩溃，造成拒绝服务。该漏洞影响 Elasticsearch 多个版本，CVSS 评分 6.5，危害等级中等。建议用户升级至修复版本以消除风险。"
published = "2025-04-08T17:15:34.880"
remediation = "升级 Elasticsearch 至 8.15.1 或更高版本。对于无法立即升级的环境，应从不可信用户的 Elasticsearch 集群角色中移除 read_pipeline 权限，阻止攻击者利用 PatternBank 类的递归缺陷触发节点崩溃。同时建议在集群层面配置线程池和断路器参数（如 circuit_breaker.request.limit），限制递归操作资源消耗。"
score = 6.5
severity = "MEDIUM"
sources = ["msrc"]
title = "Elastic Elasticsearch 不受控制的资源消耗漏洞"
updated = "2026-06-17T08:07:57.677"

