[info]
author = "ave"
description = "检测 Microsoft IIS 4.0/5.0 ssinc.dll 缓冲区溢出漏洞。通过请求 .shtml 页面验证服务器端包含（SSI）功能是否启用，SSI 启用是触发 CVE-2001-0506 漏洞的前提条件。"
id = "POC-AVE-2001-0201"
name = "Microsoft IIS 4.0/5.0 SSI Buffer Overflow PoC"
severity = "high"
tags = ["ave-2001-0201"]
vuln_id = [
    "CVE-2001-0506",
    "AVE-2001-0201",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/ssi_test.shtml"
protocol = "http"

[[poc.requests.matchers]]
expect = true
status = [200]
type = "status"
