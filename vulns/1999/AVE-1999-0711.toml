[basic]
description = "Microsoft Site Server 3.0 及 Microsoft Commercial Internet System (MCIS) 2.0/2.5 在发送包含 Set-Cookie 头的网页时未设置 Cookie 过期时间，导致页面可被代理服务器缓存。当多个用户通过同一代理访问目标站点时，后续用户可能收到缓存页面中相同的 Cookie（含 GUID 认证标识），从而以其他用户身份登录并访问其个人数据。攻击者无需特殊权限，仅需与目标共享同一代理服务器即可利用此漏洞。Microsoft 已在安全公告 MS99-035 中发布补丁修复此问题。"
published = "1999-09-10T04:00:00.000"
remediation = "安装 Microsoft 安全公告 MS99-035 提供的补丁程序，升级 Site Server 3.0/MCIS 2.0-2.5 至最新版本。同时建议在 Web 服务器配置中为 Set-Cookie 响应头显式设置 Expires 和 Cache-Control: no-cache 标记，并关闭基于 Cookie 的自动认证机制，改用会话级别的安全认证方式。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Microsoft Site Server 和商业 Internet 系统 Cookie 未设置过期时间漏洞"
updated = "2026-06-16T21:49:18.670"

