[basic]
description = "Zimbra Collaboration Server 7.2.2 及 8.0.2 版本中存在目录遍历漏洞，远程攻击者可通过向 /res/I18nMsg,AjxMsg,ZMsg,ZmMsg,AjxKeys,ZmKeys,ZdMsg,Ajx%20TemplateMsg.js.zgz 发送特制请求，在 skin 参数中注入 ../ 序列读取服务器任意文件。攻击者可利用该漏洞获取 LDAP 凭据，进而通过 service/admin/soap API 创建管理员认证令牌，最终实现远程代码执行。"
published = "2013-12-14"
remediation = "升级 Zimbra Collaboration Server 至已修复该漏洞的版本，在反向代理或 WAF 层过滤 skin 参数中的目录遍历字符序列（如 ../），限制对 /res/ 路径的未授权访问，并将 LDAP 管理端口（7071）限制为仅内网可访问。"
score = 5.0
severity = "MEDIUM"
sources = [
    "cve",
    "exploitdb",
]
title = "Zimbra Collaboration Server 目录遍历漏洞"
updated = "2013-12-14"

