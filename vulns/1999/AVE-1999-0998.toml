[basic]
description = "Iomega ZIP-100 磁盘驱动器存在安全绕过漏洞，攻击者在拥有物理接触磁盘驱动器的条件下，可先插入已知密码的磁盘，待驱动器断电后手动替换为目标磁盘，再利用已知密码访问受保护的目标磁盘内容。该漏洞源于密码验证机制仅验证磁盘而非驱动器的设计缺陷，影响所有使用 ZIP-100 驱动器的系统，需物理接触才能利用。"
published = "2001-12-21T05:00:00.000"
remediation = "由于该漏洞源于 ZIP 驱动器硬件密码验证机制的局限性，建议：1）禁止将敏感数据存储在仅依赖 ZIP 驱动器硬件密码保护的磁盘上，改用软件加密方案（如 VeraCrypt、BitLocker）加密磁盘内容；2）物理管控 ZIP 磁盘的访问权限，确保磁盘在不使用时安全存放；3）废弃磁盘须进行物理销毁或消磁处理，防止被攻击者通过磁盘替换手法绕过密码访问数据。"
score = 4.6
severity = "MEDIUM"
sources = ["avd"]
title = "Iomega ZIP-100 安全绕过漏洞"
updated = "2026-06-16T21:49:52.640"

