[basic]
description = "用友U8-CRM系统exportdictionary.php接口存在SQL注入漏洞，value参数未经过滤直接拼接SQL语句，攻击者可通过DontCheckLogin=1绕过登录验证，发送包含WAITFOR DELAY延时注入payload的GET请求执行任意SQL命令。该漏洞影响用友U8-CRM系统exportdictionary.php接口，攻击者无需身份认证即可通过构造恶意GET请求利用SQL注入漏洞，可导致数据库敏感信息泄露、数据篡改甚至服务器控制权获取。攻击者可通过构造value=1';WAITFOR DELAY '0:0:5'--等payload进行延时注入验证漏洞存在，进而实施数据窃取、篡改或进一步渗透攻击。"
published = "0819"
remediation = "立即升级用友U8-CRM至官方最新安全版本，该漏洞在后续版本中已修复。临时缓解措施：在Web应用防火墙(WAF)中配置规则拦截对 /devtools/tools/exportdictionary.php 的访问请求，或删除该文件；同时检查并移除代码中 DontCheckLogin=1 参数导致的认证绕过逻辑，对所有接口强制进行身份校验和参数过滤。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "用友 U8-CRM SQL注入漏洞"
updated = "0819"

