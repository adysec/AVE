[basic]
description = "Open WebUI 是一个自托管的人工智能平台，在 0.6.6 版本之前存在存储型跨站脚本漏洞。攻击者可在聊天消息中插入未转义的 HTML 标签和恶意 JavaScript 代码，当其他用户打开包含恶意代码的聊天记录时，脚本会在受害者浏览器中执行，窃取访问令牌从而完全控制受害者账户。若受害者是管理员，攻击者可进一步创建恶意 Python 函数实现服务器端远程代码执行。此外，该漏洞可通过社区共享功能实现跨用户传播，危害范围广泛。"
published = "2025-05-05T19:15:57.197"
remediation = "立即升级 Open WebUI 至 v0.6.6 或以上版本，该版本已对 HTML 标签进行正确转义以防御 XSS。如无法立即升级，建议在管理面板中关闭「Enable Community Sharing」功能，并禁止用户分享聊天记录以降低攻击面。临时缓解措施还可配置 WAF 规则过滤聊天消息中的恶意 HTML/JavaScript 载荷。"
score = 5.4
severity = "MEDIUM"
sources = ["ghsa"]
title = "Open WebUI 存储型跨站脚本漏洞"
updated = "2026-06-17T09:26:52.230"

