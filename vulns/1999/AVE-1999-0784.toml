[basic]
description = "Debian Linux 系统中 htdig 搜索引擎组件存在命令注入漏洞，由于对文件名中的 Shell 元字符过滤不严，远程攻击者可通过上传或构造包含 Shell 元字符的恶意文件名，在搜索索引处理过程中注入并执行任意系统命令。该漏洞影响安装了 htdig 搜索引擎的 Debian Linux 系统，CVSS 评分 7.5，属高危漏洞。攻击者无需身份认证即可远程利用，通过构造包含反引号、分号、管道符等 Shell 元字符的文件名，在搜索引擎索引处理时触发命令注入，从而获得服务器操作系统级别的命令执行权限。Debian 官方已发布安全更新修复该漏洞，建议及时升级 htdig 软件包至修复版本。"
published = "1999-12-09T05:00:00.000"
remediation = "立即升级到 ht://Dig 3.2.0b6 或更高版本，该版本修复了文件名中 shell 元字符导致的命令注入问题。由于 ht://Dig 项目已停止维护，建议迁移至替代搜索引擎（如 Apache Solr 或 Elasticsearch）。如无法立即迁移，可在 Web 服务器层面过滤包含 `;`、`|`、`` ` ``、`$` 等 shell 元字符的请求参数作为临时缓解措施。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
