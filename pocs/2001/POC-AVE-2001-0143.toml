[info]
author = "ave"
description = "通过特制 HTML 页面中的 JScript 脚本，反复创建和删除与浏览器窗口对象关联的 COM 对象，触发 MSHTML.dll 解析异常，导致 Internet Explorer 或 Outlook 崩溃。攻击者需诱导用户访问恶意页面或打开恶意邮件。"
id = "POC-AVE-2001-0143"
name = "Microsoft Internet Explorer / Outlook MSHTML.dll 拒绝服务 PoC"
severity = "medium"
tags = ["ave-2001-0143"]
vuln_id = [
    "CVE-2001-0322",
    "AVE-2001-0143",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}"
protocol = "http"

[[poc.requests.matchers]]
expect = false
part = "body"
type = "word"
words = [
    "MSHTML",
    "crash",
]
