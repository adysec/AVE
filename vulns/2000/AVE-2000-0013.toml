[basic]
description = "Savant WebServer 2.0 存在空字符拒绝服务漏洞，远程攻击者通过在请求 URL 中插入空字节（null character）可导致服务器进程崩溃，造成服务中断。该漏洞无需身份认证即可远程触发，攻击门槛低，影响 Savant WebServer 2.0 所有安装版本。攻击者只需向目标发送包含空字符的恶意 HTTP 请求即可实现拒绝服务攻击。"
published = "1999-12-28T05:00:00.000"
remediation = "厂商已停止维护 Savant WebServer 系列，无官方补丁可用。建议立即迁移至仍在活跃维护的 Web 服务器（如 Apache HTTP Server 或 Nginx）。临时缓解措施：在反向代理或 WAF 层面配置规则，拦截请求 URL 中包含空字符（`%00`）的 HTTP 请求，以降低拒绝服务攻击风险。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Michael Lamont Savant WebServer 2.0 URL 空字符拒绝服务漏洞"
updated = "2026-06-16T21:50:49.510"

