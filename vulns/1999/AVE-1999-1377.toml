[basic]
description = "Sambar Server 4.1 beta 版本内置的 dumpenv.pl 脚本未进行访问控制，远程攻击者无需身份认证，仅需向目标服务器发送针对该脚本的 HTTP GET 请求，即可获取服务器环境变量、系统路径及配置等敏感信息。该漏洞影响 Sambar Server 4.1 beta 版本，攻击条件简单、可远程触发，可能导致服务器内部配置与路径暴露，便于进一步渗透，CVSS 基础评分 5.0，属中危级别信息泄露漏洞。"
published = "1998-06-10"
remediation = "升级到 Sambar Server 4.1 正式版或更高版本，新版本已移除或限制 dumpenv.pl 脚本访问权限；若暂时无法升级，应在 Web 服务器配置中禁止外部访问 dumpenv.pl（如添加访问拒绝规则或将该脚本移出 Web 根目录），并定期检查服务器脚本暴露情况。"
score = 5.0
severity = "MEDIUM"
sources = ["avd"]
title = "Sambar Server 4.1 beta dumpenv.pl 信息泄露漏洞"
updated = "2026-07-19"

