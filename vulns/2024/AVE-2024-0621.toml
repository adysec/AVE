[basic]
description = "Linux 内核 ksmbd（SMB/CIFS 协议实现）在通过 notify_change 修改文件 mtime 时未同时设置 ATTR_CTIME 标志，导致 setattr_copy_mgtime 触发内核警告并可能造成系统崩溃。本地已认证攻击者可通过 SMB2 协议发送特制的 set info 请求修改文件时间戳来触发此漏洞，造成拒绝服务。该漏洞影响 Linux 内核 6.13-rc1 及之后版本，CVSS 评分 5.5，危害等级中等。"
published = "2025-01-15T13:15:14.060"
remediation = "立即更新 Linux 内核至修复版本：稳定分支升级到 6.6.70+、6.12.9+ 或 6.13+；Ubuntu 24.04 LTS 用户安装 linux-image-6.11.0-1011-lowlatency 6.11.0-1011.12~24.04.1 及以上版本（对应 USN-7381-1）。如无法立即重启，可临时禁用 ksmbd 内核模块（执行 `sudo modprobe -r ksmbd` 并加入黑名单 `/etc/modprobe.d/blacklist-ksmbd.conf`），或通过防火墙限制 SMB 端口（445/tcp）的访问来源。"
score = 5.5
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux Kernel ksmbd 文件时间属性设置不当导致内核警告漏洞"
updated = "2026-06-17T08:14:10.020"

