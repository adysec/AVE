[basic]
description = "Microsoft Windows 95 和 Windows NT 4.0 的 IP 碎片重组模块存在缺陷，远程攻击者可通过发送特制的畸形 IP 分片数据包（Bonk 变种），利用 UDP 协议的分片偏移量计算错误，导致目标系统内核崩溃或蓝屏死机，造成拒绝服务。该漏洞无需认证即可远程触发，影响 Windows 95 及 Windows NT 4.0 所有版本。"
published = "1998-02-13T05:00:00.000"
remediation = "升级至 Windows 2000 或更高版本系统，已不受此漏洞影响。若因特殊原因仍运行 Windows 95/NT 4.0，安装 Microsoft 1999 年安全更新 MS99-017（KB191725）可修复 IP 分段重组校验逻辑。临时缓解措施：在路由器/防火墙上阻断进入内网的畸形 IP 分片包，或限制入站 ICMP 流量降低攻击面。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Microsoft Windows 95/NT 4.0 IP Fragmentation 拒绝服务漏洞"
updated = "2026-06-16T21:48:01.117"

