[basic]
description = "Matt's Whois 程序的 whois.cgi 脚本存在命令注入漏洞，由于对用户提交的域名参数缺乏有效过滤，远程未授权攻击者可在 Whois 查询输入框中注入 Shell 元字符（如分号、反引号、管道符），将任意系统命令拼接进后端 Shell 执行，导致以 Web 服务器权限实现远程代码执行。该漏洞影响部署了 Matt's Whois 早期版本的 Web 服务器，攻击者无需认证即可远程利用，CVSS 评分 7.5（HIGH），影响服务器完全可控性与数据机密性。建议升级至修复版本或禁用该 CGI 脚本，并对用户输入实施严格的 Shell 元字符过滤与命令参数化处理。"
published = "1999-11-09T05:00:00.000"
remediation = "建议立即停用 Matt's Whois (whois.cgi) 脚本并替换为现代维护的 WHOIS 查询工具（如 whois 命令行工具或现代 Web 界面）。若必须保留，请在 CGI 脚本中添加严格的输入验证，仅允许字母数字、连字符和点号，过滤所有 Shell 元字符（; | & ` $ ( ) 等），并在 Web 服务器层面配置 WAF 规则拦截包含 Shell 元字符的域名参数请求。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "Matt Whois whois.cgi 远程代码执行漏洞"
updated = "2026-06-16T21:49:27.737"

