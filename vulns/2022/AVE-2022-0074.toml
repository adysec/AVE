[basic]
description = "Linux 内核 Marvell OcteonTX2 网络驱动 octeontx2-pf 中存在 SQE（发送队列条目）阈值检查缺陷，驱动基于硬件更新的 SQB 计数判断可用 SQE 数量，可能导致在 NAPI 处理完同一索引处先前发送的 SQE 对应的 CQE 之前就提交新的 SQE，造成 SKB 指针丢失进而引发内存泄漏。本地低权限攻击者可利用该漏洞触发系统拒绝服务，CVSS 评分 5.5，危害等级中等。"
published = "2025-05-01T15:16:09.410"
remediation = "升级 Linux 内核至 6.0.9 或更高版本，或 cherry-pick 提交 015e3c0a3b16193aab23beefe4719484b9984c2d（主线）及 f0dfc4c88ef39be0ba736aa0ce6119263fc19aeb（稳定分支）。如无法立即更新，可限制非授权用户对 Marvell OcteonTX2 网卡设备的本地访问权限作为临时缓解措施。"
score = 5.5
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux kernel octeontx2-pf 驱动 SQE 阈值检查不当导致内存泄露漏洞"
updated = "2026-06-17T05:19:19.407"

