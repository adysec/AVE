[basic]
description = "mgetty 软件包中的 faxrunq 和 faxrunqd 工具存在符号链接遍历漏洞。本地攻击者可在 /var/spool/fax/outgoing/.last_run 目录中创建指向目标文件的符号链接，从而以 fax 后台进程权限创建或修改系统任意文件。该漏洞影响 mgetty 1.1.19 至 1.22.8 版本，需要本地访问权限，CVSS 评分 2.1，危害等级低。"
published = "2000-10-20T04:00:00.000"
remediation = "立即升级 mgetty 至 1.2.1 或更高版本，该版本已修复 faxrunq/faxrunqd 脚本中不安全临时文件创建问题。如无法升级，可移除 faxrunq 和 faxrunqd 的 setgid 权限位（chmod g-s /usr/bin/faxrunq /usr/bin/faxrunqd），并确保 /var/spool/fax/outgoing/ 目录仅允许 fax 用户写入，防止普通用户创建符号链接。"
score = 2.1
severity = "LOW"
sources = ["exploitdb"]
title = "Gert Doering mgetty 符号链接遍历漏洞"
updated = "2026-06-16T21:52:16.667"

