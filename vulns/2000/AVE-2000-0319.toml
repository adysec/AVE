[basic]
description = 'Sendmail 8.10.x 版本中的 mail.local 组件未能正确识别标识消息正文结束的 ".\n" 字符串，远程攻击者可通过发送特制的长度为 2047 字符且以 ".\n" 结尾的消息行触发此缺陷，导致邮件服务拒绝服务或邮箱数据损坏。该漏洞影响 Sendmail 8.9.3 及更早版本，攻击无需身份认证，利用复杂度较低，危害中等。'
published = "2000-04-23T04:00:00.000"
remediation = '升级 Sendmail 至 8.11.0 或更高版本，该版本已修复 mail.local 对消息结束符 .\n 的错误处理逻辑。如无法立即升级，可在邮件服务器前端部署内容过滤规则，拦截包含超过 2047 字节且以 .\n 结尾的邮件行。'
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Eric Allman Sendmail mail.local 拒绝服务漏洞"
updated = "2026-06-16T21:51:28.097"

