[basic]
title = "Microsoft SQL Server 7.0 Enterprise Manager 登录凭据弱加密存储漏洞"
description = "Microsoft SQL Server 7.0 的企业管理器（Enterprise Manager）在注册新服务器时，若用户未勾选"始终提示输入登录名和密码"选项，会使用弱加密算法存储数据库登录 ID 和密码。本地攻击者可通过访问系统的配置文件，获取经弱加密处理的凭据数据，利用算法弱点还原出明文凭证，从而获得目标数据库服务器的未授权访问权限。该漏洞影响 Microsoft SQL Server 7.0 版本，CVSS v2 评分 7.2，属于高风险漏洞（AV:L/AC:L/Au:N/C:C/I:C/A:C）。官方建议用户始终启用登录提示选项或升级至更高版本的 SQL Server 以规避此风险。"
severity = "HIGH"
score = 7.2
sources = ["avd", "cve"]
published = "2000-03-14"
updated = "2026-06-16"
remediation = "建议立即安装 Microsoft SQL Server 7.0 Service Pack 2 (SP2) 或更高版本，同时在 Enterprise Manager 中勾选"Always prompt for login name and password"选项以防止凭据本地存储。由于 SQL Server 7.0 已停止支持，强烈建议升级至 SQL Server 2019 或 2022 等仍在维护的版本，并启用 SSL/TLS 加密连接保护传输凭证。"
