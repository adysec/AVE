[basic]
description = "mailto CGI 脚本存在命令注入漏洞，由于对 emailadd 表单字段缺乏输入验证和过滤，远程未授权攻击者可通过提交包含 Shell 元字符（如分号、反引号、管道符等）的恶意邮件地址，在服务器上下文中执行任意系统命令。该漏洞影响部署了易受攻击 mailto CGI 脚本的 Web 服务器，攻击者无需认证即可远程利用，CVSS 评分 7.5（高危），可导致服务器完全沦陷、敏感数据窃取及后续横向渗透。修复建议：升级或替换为安全的邮件处理组件，严格过滤用户输入中的 Shell 元字符，实施最小权限原则运行 CGI 脚本。"
published = "2000-11-14T05:00:00.000"
remediation = "立即移除或替换漏洞 mailto CGI 脚本，改用安全的邮件处理库（如 Perl MIME::Lite、PHP mail() 等）并严格过滤 emailadd 等输入字段中的 Shell 元字符（; ` | & $ ( ) 等）；若必须保留 CGI，请以最低权限用户运行 CGI 进程，并在 Web 服务器层配置 WAF 规则拦截包含 Shell 元字符的请求。建议升级至现代 Web 框架（如 PHP/Node.js/Python 框架内置邮件发送功能）彻底替代老旧 CGI 脚本。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "mailto CGI 脚本 命令注入漏洞"
updated = "2026-06-16T21:52:39.473"

