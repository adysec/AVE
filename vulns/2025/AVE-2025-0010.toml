[basic]
description = "联想网盘 FileZ 客户端存在开放重定向漏洞（CWE-601）。该漏洞源于客户端对外部传入的 URL 校验不严格，未能正确验证重定向目标的合法性。当本地用户在终端上访问攻击者精心构造的恶意链接时，客户端会将其重定向至攻击者控制的外部站点，进而可能诱导用户泄露会话凭证、身份令牌或其他敏感信息。攻击需目标系统本地用户主动点击或访问特制 URL 方可触发，利用门槛较低但需用户交互。该漏洞影响使用存在缺陷版本 FileZ 客户端的联想网盘用户，CVSS 评分为 5.1，危害等级为中危。"
published = "2025-04-25T16:15:25.857"
remediation = "建议立即将联想 FileZ 客户端升级至联想官方发布的最新安全版本（参考 Lenovo 安全公告 Lenovo Security Advisory），并在升级前避免点击来历不明的链接、仅通过官方或可信域名访问网盘。企业管理员可在网络出口防火墙/代理层对 FileZ 相关域名的重定向目标做白名单校验，禁止跳转到非可信第三方域名，作为临时缓解措施。"
score = 5.1
severity = "MEDIUM"
sources = ["hwpoc"]
