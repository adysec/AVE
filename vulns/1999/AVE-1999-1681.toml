[basic]
description = "Infoseek Ultraseek 2.1 及 3.1 for NT 版本存在缓冲区溢出漏洞。远程攻击者可通过向目标服务器发送超长 GET 请求触发该漏洞，导致缓冲区溢出，从而在服务器上以系统权限执行任意命令。该漏洞影响运行于 Windows NT 平台上的 Infoseek Ultraseek 搜索引擎服务，攻击者无需身份认证即可远程利用，危害等级高。"
published = "1999-12-15T05:00:00.000"
remediation = "Infoseek Ultraseek 已停止维护且不再受支持，建议立即升级至受支持的搜索引擎产品（如 Elasticsearch、Apache Solr），或将该服务器从公网隔离并部署 WAF 规则拦截超长 GET 请求作为临时缓解措施。"
score = 7.5
severity = "HIGH"
sources = ["exploitdb"]
title = "Infoseek Ultraseek 缓冲区溢出漏洞"
updated = "2026-06-16T21:49:29.210"

