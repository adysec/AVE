[basic]
description = "Sendmail 8.6.11 及 8.6.12 版本存在拒绝服务漏洞。远程攻击者可通过向目标邮件服务器发送特制的畸形邮件或精心构造的 SMTP 请求，触发程序在处理邮件头或 MIME 内容时的逻辑异常，导致服务进程崩溃或进入死循环，造成邮件服务不可用。该漏洞利用复杂度低，无需认证即可远程触发，影响使用上述版本的所有 Unix/Linux 邮件系统。"
published = "1999-01-01T05:00:00.000"
remediation = "升级 Sendmail 至 8.6.13 或更高版本，此版本已修复该拒绝服务漏洞。若无法升级，可在 sendmail.cf 中限制并发连接数（MaxDaemonChildren 参数）并配置防火墙限制 SMTP 端口的来源 IP，作为临时缓解措施。建议迁移至当前仍受维护的 Sendmail 版本（如 8.17.x）或更换为 Postfix 等替代 MTA。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Eric Allman Sendmail 8.6.11/8.6.12 拒绝服务漏洞"
updated = "2026-06-16T21:47:54.477"

