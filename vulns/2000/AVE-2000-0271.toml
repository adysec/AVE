[basic]
description = "Microsoft JET 数据库引擎在处理特制数据库查询时存在 VBA Shell 漏洞，攻击者可通过构造恶意数据库查询语句执行任意系统命令。该漏洞影响 JET 3.5/3.51/4.0 版本，无需身份认证即可利用，可导致目标系统被完全控制。由于 Microsoft JET 引擎被广泛集成于多种应用程序中，攻击面较大，建议用户安装相应安全补丁或升级至更新版本。"
published = "1999-08-20T04:00:00.000"
remediation = "立即安装 Microsoft 安全公告 MS99-030 提供的 Jet 数据库引擎更新补丁（下载地址：https://www.microsoft.com/download/details.aspx?FamilyID=3EFBE71A-00BB-48CE-930A-47FB9827E1E7），该补丁适用于 Jet 3.5 及后续版本。对于仍在使用 Jet 3.5 以下版本的系统，建议升级到 Jet 4.0 或更高版本。作为临时缓解措施，在 Office 中禁用 VBA 宏自动执行，不打开来源不明的 Access 数据库文件及包含数据库查询的 Office 文档。"
score = 7.2
severity = "HIGH"
sources = ["cve"]
title = "Microsoft JET 数据库引擎 VBA Shell 代码执行漏洞"
updated = "2026-06-16T21:51:28.873"

