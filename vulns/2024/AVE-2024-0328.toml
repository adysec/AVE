[basic]
description = "某短视频直播打赏系统后台管理模块存在任意文件上传漏洞。攻击者通过向/admin/ajax/upload接口发送特制multipart/form-data请求，将type参数设置为php、filename后缀设置为.php，即可绕过文件类型校验上传PHP脚本。上传成功后可直接通过Web访问该脚本，实现远程代码执行，完全控制服务器。该漏洞无需特殊权限，仅需后台普通用户身份即可利用。"
published = "2024-06-15"
remediation = "限制上传目录禁止执行PHP脚本，配置Web服务器禁止解析upload目录中的PHP文件；对上传文件进行服务端MIME类型校验（检查文件头魔术字节），禁止仅依赖Content-Type头判断；对上传文件名进行白名单过滤，仅允许图片扩展名；升级系统至厂商发布的最新安全版本。"
score = 5.0
severity = "MEDIUM"
sources = ["hwpoc"]
title = "某短视频直播打赏系统后台任意文件上传漏洞"
updated = "2026-07-19"

