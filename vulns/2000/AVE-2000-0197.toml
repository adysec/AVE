[basic]
description = "wmcdplay 是 WindowMaker 桌面环境下的一款 CD 播放器程序，其 1.0 beta1-2 版本在处理命令行参数时存在缓冲区溢出漏洞。由于程序未对用户输入的命令行参数长度进行边界校验，本地攻击者可通过向程序传入超长的参数值，使栈缓冲区溢出并覆盖返回地址，进而以 root 权限执行任意代码。该漏洞影响运行 wmcdplay 1.0 beta1-2 且以 root 权限安装或 setuid root 的 Linux/Unix 系统，攻击条件为攻击者需具备本地登录权限并能够执行该程序。利用方式即构造包含超长参数的命令行调用 wmcdplay，触发溢出后劫持程序控制流实现本地提权。"
published = "2000-03-10"
remediation = "移除 wmcdplay 程序的 SUID 位（执行 chmod u-s /usr/bin/wmcdplay），或卸载该程序；若必须保留，请升级至修复版本（1.0 beta3 及以后），或改用非 SUID 的替代播放器如 gnome-cd 或 kscd 以避免本地提权风险。"
score = 7.2
severity = "HIGH"
sources = ["exploitdb"]
title = "Sam Hawker wmcdplay CD 播放器缓冲区溢出漏洞"
updated = "2026-07-19"

