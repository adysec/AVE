remediation = "厂商已确认该漏洞但未计划修复。建议在防火墙或设备 ACL 中限制对 TCP 23 端口的访问，仅允许受信任管理 IP 连接；如业务允许，直接禁用 telnet 服务，改用 SSH 进行远程管理；同时限制设备可同时建立的 telnet 会话数至 1~2 个以降低被占满的风险。"
