[basic]
description = "F5 BIG-IP 的 TMUI（流量管理用户界面）存在身份验证绕过漏洞，未经认证的远程攻击者通过向管理端口或 self IP 地址发送特制的未公开请求即可绕过配置实用工具的认证，从而以 root 权限执行任意系统命令。该漏洞影响多个 F5 BIG-IP 软件版本，CVSS 评分 9.8，危害等级严重。"
published = "2023-10-26T21:15:08.097"
remediation = "立即升级 F5 BIG-IP 至以下修复版本：17.x 升级至 17.1.0.3 及以上、16.x 升级至 16.1.4.1 及以上、15.x 升级至 15.1.10.2 及以上、14.x 升级至 14.1.5.6 及以上、13.x 升级至 13.1.5.1 及以上。临时缓解措施：在防火墙层面严格限制对 BIG-IP 管理端口（443/tcp）和 self IP 地址的访问，仅允许可信任管理网段连接，禁用对 TMUI 的公网暴露。"
score = 9.8
severity = "CRITICAL"
sources = ["hwpoc"]
title = "F5 BIG-IP TMUI 远程代码执行漏洞"
updated = "2026-06-17T06:31:32.640"

