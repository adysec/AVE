[basic]
description = "BSD 系列操作系统（包括 SunOS 4.1.1、BSD 4.3、A/UX 2.0.1 等）中的 lpr 行式打印服务存在任意文件写入漏洞。本地攻击者可通过符号链接（symlink）攻击，在反复调用 lpr 命令约 1000 次后，利用程序对临时文件处理不当的竞态条件，将任意内容写入或覆盖系统任意文件，从而可能导致权限提升或破坏系统完整性。该漏洞 CVSS 评分 2.1，危害等级低，利用需本地访问权限。"
published = "1999-12-31T05:00:00.000"
remediation = "升级 lpr 到已修复符号链接竞争条件的版本，或替换为 LPRng/CUPS 打印系统。临时缓解措施：限制本地用户执行 lpr 的权限，将 lp 设备文件权限设为 0700，并监控 /tmp 目录的符号链接创建行为。"
score = 2.1
severity = "LOW"
sources = ["avd"]
title = "BSD lpr 符号链接攻击本地任意文件写入漏洞"
updated = "2026-06-16T21:49:43.580"

