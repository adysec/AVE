[basic]
description = "Grub2 的 JPEG 解析器在处理特制 JPEG 图片文件时存在堆越界写入漏洞。由于 JPEG 解析过程中对内部缓冲区边界检查不充分，攻击者可通过向系统加载特制的 JPEG 图片触发该漏洞，造成堆内存越界写入。成功利用此漏洞可能覆盖敏感数据，进而绕过 Secure Boot 安全启动保护机制。该漏洞需本地高权限访问，影响使用 Grub2 引导程序的各种 Linux 发行版。建议用户及时安装厂商提供的补丁更新。"
published = "2025-02-18T19:15:16.387"
remediation = "将 grub2 升级至 2.12 以上版本。各发行版操作如下：RHEL 9 用户执行 `dnf update grub2` 升级至 grub2-1:2.06-104.el9_6 及以上版本（对应 RHSA-2025:6990）；Debian/Ubuntu 用户执行 `apt update && apt upgrade grub-pc` 获取包含上游补丁的更新包；其他发行版更新 grub2 至含 commit 2c34af90 的版本。更新后执行 `grub2-mkconfig -o /boot/grub2/grub.cfg`（UEFI 环境下为 `grub2-mkconfig -o /boot/efi/EFI/redhat/grub.cfg`）重新生成引导配置，并重启系统使修复生效。如无法立即更新，可启用 Secure Boot 并配置 shim 签名验证作为临时缓解措施。"
score = 6.7
severity = "MEDIUM"
sources = ["msrc"]
title = "Grub2 JPEG解析器堆越界写入漏洞"
updated = "2026-06-29T23:16:40.800"

