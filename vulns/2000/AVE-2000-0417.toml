[basic]
description = "Veritas Volume Manager 3.0.2/3.0.3/3.0.4 版本中存在文件权限配置不当漏洞。该软件在运行时会创建全局可写（world writable）的 .server_pids 文件，本地攻击者可利用该文件权限缺陷，将任意恶意命令写入此文件中。当 vmsa_server 脚本执行时，会读取并执行 .server_pids 文件中的命令，从而导致攻击者以脚本运行权限执行任意代码，实现本地权限提升。攻击者需要拥有本地系统访问权限，无需身份认证即可利用该漏洞，CVSS 评分 7.2，危害等级高。"
published = "2000-06-16T04:00:00.000"
remediation = "立即将 Veritas Volume Manager 升级至 3.1 或更高版本（该版本已修复 .server_pids 文件权限问题）。如无法升级，手动执行 `chmod 600 /var/opt/VRTSvmsa/.server_pids` 限制该文件仅 root 可读写，并检查 vmsa_server 脚本是否引用其他可写文件。同时移除该文件中的非预期内容，定期审计 `/var/opt/VRTSvmsa/` 目录权限。"
score = 7.2
severity = "HIGH"
sources = ["epss"]
title = "Veritas Software Volume Manager 本地权限提升漏洞"
updated = "2026-06-16T21:51:51.310"

