[basic]
description = "i-drive Filo 软件的 HTTP 代理服务器存在缓冲区溢出漏洞，未经身份认证的远程攻击者可通过向目标系统发送超长的 HTTP GET 请求触发该漏洞，导致任意代码执行。该漏洞影响 i-drive Filo 相关版本，CVSS 评分 10.0，危害等级严重，建议用户及时升级或采取缓解措施。"
published = "2000-06-07T04:00:00.000"
remediation = "该漏洞影响 i-drive Filo HTTP 代理服务器，厂商已停止维护多年，无官方补丁可用。建议立即停止使用该软件，迁移至仍受支持的代理服务器（如 Squid、HAProxy 或 Nginx）。如需临时过渡，可在网络边界防火墙或 WAF 上限制对 Filo 代理端口的访问，并对入站 HTTP GET 请求做长度限制（如 max_uri_length 不超过 4096 字节），同时将代理隔离在独立网络段内，缩小攻击面。"
score = 10
severity = "CRITICAL"
sources = ["cve"]
title = "i-drive Filo HTTP代理服务器 缓冲区溢出远程代码执行漏洞"
updated = "2026-06-16T21:51:35.267"

