[basic]
description = "Vixie cron 组件在处理 crontab 文件中的 MAILTO 环境变量时存在缓冲区溢出漏洞。本地攻击者可利用该漏洞，通过向 crontab 文件中写入超长的 MAILTO 变量值触发缓冲区溢出，从而获取 root 权限。该漏洞影响 Caldera OpenLinux 等系统，CVSS 评分 7.2，危害等级高。建议用户升级至最新版本或限制 crontab 文件的写入权限。"
published = "1999-08-25T04:00:00.000"
remediation = "升级到 OpenLinux 更新版本的 vixie-cron 包（修复版本见厂商 1999 年安全公告并打全系统补丁）。临时缓解措施：将 crontab 文件及 cron 服务目录权限收紧为仅 root 可写（chmod 600 /etc/crontab 且 chmod 700 /var/spool/cron），并限制普通用户使用 crontab 命令（移除 /usr/bin/crontab 的 setuid 位或仅授权信任用户），避免通过过长 MAILTO 环境变量触发缓冲区溢出提权。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "Caldera OpenLinux Vixie cron 缓冲区溢出漏洞"
updated = "2026-06-16T21:49:13.990"

