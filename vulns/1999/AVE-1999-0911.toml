[basic]
description = "Vermillion FTP Daemon VFTPD 1.23 存在缓冲区溢出漏洞，远程攻击者可通过向 FTP 服务发送多个超长 CWD 命令触发该漏洞，导致目标服务崩溃引发拒绝服务，在特定条件下还可利用该漏洞执行任意命令。该漏洞影响 VFTPD 1.23 版本，CVSS 评分 7.5，危害等级高，建议升级至更高版本或部署入侵检测规则进行防护。"
published = "1999-11-22T05:00:00.000"
remediation = "Vermillion FTP Daemon VFTPD 1.23 已停止维护且不再受支持，建议立即迁移至其他活跃维护的 FTP 服务器软件（如 vsftpd、ProFTPD 或 FileZilla Server）。如无法立即迁移，可在 FTP 服务器前端部署 WAF 或 IPS 规则，对 CWD 命令参数长度进行限制（建议不超过 256 字节），并在防火墙层面限制仅允许可信 IP 访问 FTP 端口（21/TCP）作为临时缓解措施。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "Vermillion FTP Daemon 缓冲区溢出拒绝服务漏洞"
updated = "2026-06-16T21:49:37.050"

