[basic]
description = "Windows NT 4.0 打印后台处理程序（Print Spooler）存在缓冲区溢出漏洞，远程攻击者可通过向目标系统发送特制的后台打印请求触发该漏洞，成功利用可导致拒绝服务或获取系统权限。该漏洞影响 Windows NT 4.0 系统，CVSS 评分 7.2，危害等级高。由于打印服务默认开放相关端口，攻击者无需身份认证即可远程利用，风险较大。"
published = "1999-11-04T05:00:00.000"
remediation = '立即安装 Microsoft 安全公告 MS99-047 对应补丁，或升级至 Windows NT 4.0 Service Pack 6 (SP6) 及以上版本。如无法升级，在注册表中将 HKEY_LOCAL_MACHINE\SYSTEM\CurrentControlSet\Control\Print\DisableFileDownload 设为 1 以禁用打印后台处理程序的远程请求处理功能，并在防火墙层面限制 445/TCP 和 139/TCP 端口的入站访问。'
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "Microsoft Windows NT 4.0 打印假脱机程序 缓冲区溢出权限提升拒绝服务漏洞"
updated = "2026-06-16T21:49:17.180"

