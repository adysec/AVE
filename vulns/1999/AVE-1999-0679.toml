[basic]
description = "hybrid-6 IRC 服务器（EFnet 常用）的 m_invite 功能存在缓冲区溢出漏洞，远程攻击者可通过发送特制的 invite 选项触发溢出，从而在目标系统上执行任意命令。该漏洞可导致服务器完全被控制，需立即修复。"
