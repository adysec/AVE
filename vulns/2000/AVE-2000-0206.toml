[basic]
description = "A-V Tronics InetServ 3.0 WebMail 系统存在缓冲区溢出漏洞。该漏洞由长 GET 请求触发，可导致远程代码执行攻击。攻击者无需身份验证即可向目标系统发送特制的长 GET 请求，利用内存溢出执行任意命令。该漏洞影响 A-V Tronics InetServ 3.0 版本，CVSS 评分高达 10.0，危害等级极高。攻击者可完全掌控受害服务器，窃取敏感数据或进一步横向移动。该漏洞致命性极强，已被广泛用于网络攻击中，攻击者可轻易实现远程代码执行。"
published = "2000-01-17T05:00:00.000"
remediation = "该产品（A-V Tronics InetServ 3.0）已停止维护，官方未发布安全补丁。建议立即停用 InetServ 并迁移至受支持的 Web 邮件服务（如 Roundcube、SquirrelMail 等仍在维护的替代方案）。如无法立即替换，应在防火墙层面限制对 WebMail 端口的访问，仅允许受信 IP 连接，并部署 WAF 拦截超长 GET 请求。"
score = 10
severity = "CRITICAL"
