[basic]
description = "Microsoft Windows 95 及 Windows 98 系统的 IPX 协议实现存在安全缺陷，远程攻击者可通过向目标主机发送源 IP 地址为广播地址的特制 ICMP Ping 数据包，触发目标系统 IPX 协议栈处理异常，导致系统崩溃或停止响应，造成拒绝服务。该漏洞无需身份认证即可远程利用，影响 Windows 95 和 Windows 98 操作系统，CVSS 评分 5.0，危害等级中等。"
published = "2000-10-20T04:00:00.000"
remediation = "安装微软 MS00-054 安全公告提供的补丁（Windows 95 下载 265334US5.EXE，Windows 98/98 SE 下载 265334USA8.EXE），补丁使 NWLink 忽略伪造源地址的 IPX Ping 请求。如 NWLink/IPX 协议非业务必需，在「网络属性」中卸载该协议以彻底消除攻击面。同时在网络边界路由器上配置 ACL 丢弃 IPX 协议包（多数互联网路由器默认丢弃 IPX），阻止外部恶意用户向内网发送特制 IPX Ping 报文。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Microsoft Windows 95/98 IPX 数据包 拒绝服务漏洞"
updated = "2026-06-16T21:52:23.300"

