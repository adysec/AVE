[basic]
description = "Squid 代理服务器 2.4.STABLE6 之前版本存在多个缓冲区溢出漏洞。远程攻击者可利用以下三种方式触发溢出：一是通过 MSNT 认证辅助程序（msnt_auth）处理 denyusers 或 allowusers 文件时，二是通过 gopher 客户端协议解析时，三是通过生成 HTML 输出的 FTP 服务端目录列表解析器。成功利用可导致服务崩溃（拒绝服务）或可能执行任意代码。CVSS 评分 7.5，危害等级高。建议升级至 Squid 2.4.STABLE6 及以上版本。"
published = "2002-07-26T04:00:00.000"
remediation = "升级 Squid 至 2.4.STABLE6 或更高版本以修复缓冲区溢出漏洞。如无法立即升级，在 squid.conf 中禁用 gopher 协议（http_port 配置后添加 `gopher` 协议限制），并移除或注释掉 msnt_auth 认证助手的 denyusers/allowusers 文件配置，同时关闭 FTP 目录列表的 HTML 输出功能作为临时缓解措施。"
score = 7.5
severity = "HIGH"
sources = ["osv"]
title = "Squid 缓冲区溢出拒绝服务代码执行漏洞"
updated = "2026-06-16T21:57:59.680"

