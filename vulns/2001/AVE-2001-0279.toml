[basic]
description = "Solaris 2.6 至 8 版本（x86 架构）的 xlock 程序存在堆缓冲区溢出漏洞，本地攻击者可通过设置过长的 XFILESEARCHPATH 或 XUSERFILESEARCHPATH 环境变量触发堆溢出，从而获取 root 权限。该漏洞影响 Solaris 2.6 至 8 的 x86 版本，攻击者需具备本地访问权限，利用方式为设置超长环境变量触发堆溢出实现权限提升至 root，CVSS 评分 7.2（本地访问、低复杂度、无需认证、完全影响机密性/完整性/可用性）。"
published = "2001-10-30T05:00:00.000"
remediation = "立即应用 Sun Solaris 8 补丁 111585-01 (x86) 或升级至 Solaris 8 更新 7 及以上版本。若无法立即打补丁，可执行 chmod -s /usr/openwin/bin/xlock 移除 xlock 的 setuid 位，或通过限制本地用户登录权限作为临时缓解措施。"
score = 7.2
severity = "HIGH"
sources = ["exploitdb"]
title = "Sun Solaris xlock 堆溢出漏洞"
updated = "2026-06-16T21:54:41.860"

