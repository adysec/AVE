[basic]
description = "AMANDA（Advanced Maryland Automatic Network Disk Archiver）2.3.0.4 版本中存在多处缓冲区溢出漏洞。远程攻击者可通过向 amindexd 守护进程发送超长命令触发溢出，导致任意代码执行；本地用户亦可利用 amcheck、amgetidx、amtrmidx、createindex-dump、createindex-gnutar 等工具的超长命令行参数触发溢出，实现权限提升或任意代码执行。该漏洞 CVSS 评分 10.0，危害等级严重，受影响系统需尽快升级至修复版本。"
published = "2002-10-04T04:00:00.000"
remediation = "立即升级 AMANDA 至 3.5.3 或更高版本，该漏洞在后续版本中已修复。如无法升级，在防火墙层面限制对 amindexd 服务（默认端口 10080）的访问，仅允许可信备份客户端连接，并限制本地非授权用户对 amcheck、amgetidx 等 SUID 程序的执行权限。"
score = 10
severity = "CRITICAL"
sources = ["osv"]
title = "AMANDA 多缓冲区溢出远程代码执行漏洞"
updated = "2026-06-16T21:58:21.380"

