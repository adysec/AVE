[basic]
description = "Lotus Domino HTTP 服务器存在缓冲区溢出漏洞，远程攻击者无需身份认证即可向目标服务器发送超长 URL 请求，触发 HTTP 服务组件的缓冲区溢出，导致服务进程崩溃并拒绝服务。该漏洞影响 Lotus Domino 早期版本，CVSS 评分 5.0，危害等级中等。攻击者仅需通过网络发送特制 HTTP 请求即可利用，无需任何前置权限，但无法实现远程代码执行。"
published = "1999-12-21T05:00:00.000"
remediation = "将 Lotus Domino HTTP 服务器升级至 R5.0.1 或更高版本（R5.0.2+ / R6 / R7 / R8 / R9 均不受影响）以修复长 URL 导致的缓冲区溢出问题。如暂时无法升级，可在 HTTP 层配置 URL 长度限制（notes.ini 设置 HTTPMaxURL=1024）作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Lotus Domino HTTP 服务器缓冲区溢出拒绝服务漏洞"
updated = "2026-06-16T21:50:50.597"

