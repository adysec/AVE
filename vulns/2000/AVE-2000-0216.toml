[basic]
description = "Norton AntiVirus for Internet Email Gateways 的 Web 服务器组件存在缓冲区溢出漏洞，远程攻击者可通过向目标系统发送超长 URL 请求触发该漏洞，导致服务崩溃进而造成拒绝服务。该漏洞影响了运行 Norton AntiVirus for Internet Email Gateways 的邮件网关系统，CVSS 评分 5.0，危害等级中危。受影响用户需及时更新病毒定义库或安装官方补丁以修复此漏洞。"
published = "2000-03-17T05:00:00.000"
remediation = "建议升级至 Symantec 针对 Norton AntiVirus for Internet Email Gateways 发布的最新补丁版本（该漏洞在 2000 年 3 月后的更新中已修复）。由于该产品已停止维护，建议迁移至 Symantec Email Security 系列受支持产品。临时缓解措施包括在防火墙上限制对 Web 管理端口的源 IP 访问，或禁用 HTTP 管理接口。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Symantec Norton AntiVirus for Internet Email Gateways Web服务器缓冲区溢出拒绝服务漏洞"
updated = "2026-06-16T21:51:17.670"

