[basic]
description = "Ascom Timeplex 路由器存在调试模式信息泄露漏洞。远程攻击者无需身份认证，仅通过发送特定序列的 CTRL-D 控制字符即可使目标路由器进入调试模式，从而获取敏感配置信息或执行未授权操作。该漏洞影响 Ascom Timeplex 系列路由器，CVSS 评分 7.5，危害等级高。厂商已发布安全更新修复此漏洞。"
published = "1997-05-15T04:00:00.000"
remediation = "此漏洞影响已停止支持的旧版 Ascom Timeplex 路由器。建议立即更换为受支持的现代路由器设备；如无法更换，应严格限制管理接口的网络访问（仅允许受信任 IP 通过专用管理 VLAN 访问），在边界防火墙上封锁路由器管理端口（如 Telnet 23/UDP 161 SNMP），并禁用不必要的远程管理服务以降低攻击面。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "Ascom Timeplex 路由器调试模式信息泄露漏洞"
updated = "2026-06-16T21:49:48.530"

