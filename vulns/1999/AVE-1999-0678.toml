[basic]
description = "FTGate Web 服务器的文件路径处理机制存在目录遍历漏洞，攻击者可通过 '' 路径遍历技术访问文件系统外部目录，可读取操作系统上同驱动器的任意文件，泄露敏感系统配置文件和用户数据。此漏洞可远程利用，且无需身份验证，攻击者仅需知晓目标文件路径即可获取相关信息，威胁系统数据安全和隐私保护。"
published = "1999-11-04T05:00:00.000"
remediation = "由于该漏洞影响产品已停止支持，建议对系统进行全面重构并使用现代安全框架。如无法更换，建议部署 Web 应用防火墙 WAF 以拦截路径遍历攻击；配置反向代理服务器规则，拒绝包含 '..' 路径的 HTTP 请求；严格限制 FTGate Web 管理界面访问权限，仅允许从可信内网 IP 段访问；部署日志审计系统以追踪异常文件访问行为。"
score = 5.0
severity = "MEDIUM"
sources = ["exploitdb"]
title = "FlosieTek FTGate Web 服务器目录遍历文件读取漏洞"
updated = "2026-06-16T21:49:15.820"

