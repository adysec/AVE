[basic]
description = "Aladdin Knowledge Systems eToken 3.3.3 硬件令牌存在 PIN 码提取漏洞。具有物理接触权限的攻击者可通过直接操作设备 EEPROM 重置 PIN 码，从而绕过原持有者设置的 PIN 认证，获取令牌中存储的敏感信息。该漏洞攻击复杂度低，无需身份认证即可利用，影响机密性、完整性和可用性。厂商至今未发布官方补丁，建议用户采取物理访问控制措施。"
published = "2000-05-04T04:00:00.000"
remediation = "Aladdin eToken 3.3.3 已停止支持，建议立即升级至支持防篡改 EEPROM 写入保护的新型号（如 eToken 5100 系列）。在完成替换前，须将 eToken 存放于上锁的保险柜中，仅限授权人员在监控环境下使用，并启用物理访问日志审计。同时建议在 BIOS 层面禁用 USB 存储设备引导，防止攻击者通过专用硬件工具直接读写 EEPROM。"
score = 4.6
severity = "MEDIUM"
sources = ["epss"]
title = "Aladdin Knowledge Systems eToken PIN提取漏洞"
updated = "2026-06-16T21:51:42.583"

