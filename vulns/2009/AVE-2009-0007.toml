[basic]
description = 'Cisco Linksys WVC54GCA 无线视频监控摄像头 firmware 1.00R22 及 1.00R24 版本的 adm/file.cgi 脚本存在目录遍历漏洞。远程攻击者无需身份认证，通过在 next_file 参数中传入编码的 %2e%（即编码后的 ".."）或绝对路径，即可突破路径限制读取设备上的任意敏感文件（如配置文件、密码等）。攻击复杂度低，无需用户交互，可能导致设备敏感信息泄露，进而被利用进行更深层次的攻击。受影响的设备包括 Linksys WVC54GCA 系列无线摄像头。'
published = "2009-05-06T16:30:00.627"
remediation = "该设备已停产且官方未发布修复此目录遍历漏洞的补丁。建议升级至最终固件 1.1.00 build 2（可能修复部分安全问题），并将摄像头隔离在独立 VLAN 中，通过防火墙限制只有特定内网 IP 能访问 TCP 80/443 端口，同时禁止在路由器上为该设备做端口转发；如需远程访问，应通过 VPN 接入内网后再管理。"
score = 7.8
severity = "HIGH"
sources = ["nuclei"]
title = "Linksys WVC54GCA 无线摄像头目录遍历漏洞"
updated = "2026-06-16T23:07:31.290"

