[basic]
description = "Internet Explorer 5.0 存在窗口欺骗漏洞，远程攻击者可通过构造恶意网页，利用浏览器窗口地址栏与内容区域显示不一致的缺陷，伪装成合法网站诱导用户访问。当用户浏览攻击者控制的页面时，浏览器地址栏可显示为受信任域名，而实际内容区域加载的是恶意页面，导致用户误信并输入敏感信息（如账号密码、信用卡号等），造成信息泄露。该漏洞影响 Windows 平台上 Internet Explorer 5.0 及早期版本，攻击条件低，仅需用户点击恶意链接即可触发。"
published = "1999-04-01T05:00:00.000"
remediation = "立即升级至 Internet Explorer 5.01 Service Pack 2 或更高版本，该漏洞已在 IE 5.01 SP2 中修复。对于仍使用 IE 的旧系统，建议禁用 Active Scripting 功能并启用 Internet 区域安全级别为「高」，同时考虑迁移至现代浏览器（如 Edge/Chrome）以彻底规避风险。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Microsoft Internet Explorer 窗口欺骗漏洞"
updated = "2026-06-16T21:48:27.857"

