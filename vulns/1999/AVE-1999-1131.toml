[basic]
description = "IBM SP2 系统数据存储库 (SDR) 中的 sdrd 守护进程存在未授权文件读取漏洞，远程攻击者无需身份验证即可通过 sdrd 守护进程读取系统任意文件。该漏洞影响 IBM Scalable POWERparallel (SP) 2.0 系统中的 SP2 System Data Repository (SDR) 组件，CVSS 评分 5.0（中等严重性）。攻击者可利用 sdrd 守护进程的权限验证缺陷，远程匿名读取系统敏感文件，导致敏感信息泄露。IBM 已发布相关补丁修复该漏洞，建议受影响用户及时升级修补。"
published = "1999-12-31T05:00:00.000"
remediation = "建议升级至 IBM SP2 System Data Repository (SDR) 修补版本或升级至更新版本的 IBM POWERparallel 系统。若无法升级，请在防火墙层面封锁 sdrd 守护进程监听端口（默认 TCP 端口），或在不使用 SDR 服务时彻底禁用 sdrd 守护进程；同时配置网络访问控制列表 (ACL) 限制仅受信管理网段可访问 SDR 服务端口，作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "IBM Scalable POWERparallel SP 2.0 sdrd 任意文件读取漏洞"
updated = "2026-06-16T21:50:32.927"

