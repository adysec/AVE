[basic]
description = "Microsoft Internet Explorer 4.x 与 5.x 以及 Outlook 98 存在客户端窗口引用重定向漏洞（CWE-59 链接劫持）。远程攻击者可通过恶意网页或 HTML 邮件中的脚本调用 window.open 创建对客户端窗口的引用，并利用服务器端重定向将该窗口指向本地文件（如 file:// 协议资源），从而跨安全边界读取用户本机文件内容实现信息泄露。攻击需诱使用户访问特制网页或打开恶意邮件，在用户浏览器上下文中执行脚本并触发重定向，影响 IE 5.01 及更早版本。"
published = "1999-12-08T05:00:00.000"
remediation = "升级到 Microsoft Internet Explorer 5.01 Service Pack 1 或更高版本，并安装微软安全公告 MS99-050 提供的对应补丁；同时使用 Outlook 安全更新阻断恶意 HTML 邮件中的脚本执行。"
score = 5.1
severity = "MEDIUM"
sources = ["avd"]
title = "Microsoft Internet Explorer 跨窗口文件读取信息泄露漏洞"
updated = "2026-06-16T21:49:27.357"

