[basic]
description = "通过 ufsrestore 命令的缓冲区溢出漏洞影响原始的 Solaris 系列操作系统。由于 ufsrestore 程序对用户输入的路径参数处理存在缺陷，导致其分配的缓冲区大小不足以容纳过长的路径字符串。当攻击者向系统提供超过缓冲区容量的路径名时，程序会发生缓冲区溢出，允许攻击者执行注入的shell代码。根据 CVSS 向量评分（AV:L/AC:L/Au:N/C:C/I:C/A:C），该漏洞允许身份验证或授权的本地攻击者完全控制操作系统权限（可读、可写、可执行），并可能永久破坏系统可用性。该漏洞主要影响 Solaris 2.5、2.6、7.0 和 8 版本，在上述操作系统上执行 ufsrestore 命令的本地用户或进程均可触发此漏洞。攻击者通过向 ufsrestore 命令传递超长路径名，即可绕过对输入长度的常规限制，从而劫持程序控制权，最终达到获取权限的攻击目的。仅要求本地访问权限，且利用方式相对简单，但风险极高，可能导致系统被完全控制，数据泄露或破坏。该漏洞最早出现在 2000 年 6 月 14 日，至今已有十余年历史，但针对此漏洞的补丁相对较晚，许多旧版 Solaris 系统可能仍然受到影响。"
published = "2000-06-14T04:00:00.000"
remediation = "建议立即安装 Sun Microsystems 发布的官方安全补丁：Solaris 8 安装补丁 108993-01 或更高版本，Solaris 7 安装 107544-01 或更高版本，Solaris 2.6 安装 106089-01 或更高版本，Solaris 2.5.1 安装 103642-01 或更高版本。可通过 SunSolve (sunsolve.sun.com) 下载对应补丁包并使用 patchadd 命令安装。如无法立即打补丁，建议暂时移除 ufsrestore 的 setuid 位（chmod u-s /usr/lib/fs/ufs/ufsrestore）作为临时缓解措施，并限制本地用户对 ufsrestore 命令的执行权限。建议尽快升级至 Solaris 9 或更高版本彻底修复该漏洞。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "Sun Solaris ufsrestore 缓冲区溢出漏洞"
updated = "2026-06-16T21:51:48.330"

