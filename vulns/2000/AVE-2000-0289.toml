[basic]
description = "Windows 2000 在使用 OEMPreinstall 选项进行无人值守预安装时，会为 All Users 和 Default Users 目录设置不安全的默认权限，导致本地攻击者可利用该权限配置缺陷访问或修改其他用户的文件和数据。该漏洞影响 Windows 2000 系统，CVSS 评分 7.2，危害等级高。攻击者需具有本地访问权限方可利用，建议安装安全更新或手动修正目录权限配置。"
published = "2000-04-07T04:00:00.000"
remediation = "安装 Windows 2000 无人值守安装完成后，应立即手动修复 All Users 和 Default Users 目录的 ACL 权限，限制非授权用户的写入访问。建议使用安全模板 (Security Templates) 强制应用最小权限策略，或升级至受支持的操作系统版本。如无法升级，可在安装后运行 `secedit /configure /cfg sec_template.inf` 重新应用安全配置。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "Microsoft Windows 2000 无人值守安装权限配置漏洞"
updated = "2026-06-16T21:51:25.530"

