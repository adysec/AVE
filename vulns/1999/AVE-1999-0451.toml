[basic]
description = "Info2www 是一个将 GNU Info 文档转换为 HTML 页面的 CGI 脚本，其 1.0 和 1.1 版本存在输入验证不严的安全漏洞。远程攻击者无需任何身份认证，通过向目标服务器上的 info2www CGI 脚本发送精心构造的 HTTP 请求，利用脚本对用户输入参数过滤不当的缺陷，可实现任意文件读取或远程命令执行。该漏洞影响部署了 Info2www CGI 脚本的 Web 服务器，攻击门槛低，危害严重。"
published = "1998-03-01T05:00:00.000"
remediation = "立即从 Web 服务器上删除或禁用 info2www CGI 脚本，或移除该脚本的可执行权限（如 chmod -x info2www.cgi）。如业务必须使用，可在 Web 服务器（Apache/Nginx）配置中限制只允许内网 IP 访问该脚本，并对输入参数进行严格过滤。建议使用更现代的替代方案替代该 CGI 程序。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "Info2www CGI 输入处理不当致远程文件访问与命令执行漏洞"
updated = "2026-06-16T21:48:02.100"

