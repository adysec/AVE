[basic]
description = "FreeBSD 系统自带的 metamail 邮件处理工具存在命令注入漏洞。远程攻击者可通过向目标用户发送特制的 MIME 邮件消息，在消息头中嵌入恶意命令。当用户使用 metamail 处理该恶意邮件时，漏洞被触发，导致以当前用户权限在系统上执行任意命令。该漏洞无需身份认证即可远程利用，但需要用户主动触发邮件处理操作，影响范围较广。"
published = "1997-05-21T04:00:00.000"
remediation = "升级 metamail 至已过滤 MIME 邮件头 shell 元字符的修补版本；若无法升级，建议直接卸载 metamail（pkg delete metamail）并改用 procmail 或 maildrop 等现代邮件处理工具替代；同时配置邮件客户端不自动调用 metamail 处理来自不可信来源的 MIME 邮件。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "FreeBSD Metamail 任意命令执行漏洞"
updated = "2026-06-16T21:47:25.340"

