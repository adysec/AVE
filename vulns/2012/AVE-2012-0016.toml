[basic]
description = "MF Gig Calendar WordPress 插件 0.9.2 版本存在跨站脚本（XSS）漏洞。攻击者无需认证即可通过向日历页面的查询字符串中注入恶意 Web 脚本或 HTML 代码，当管理员或其他用户访问被篡改的页面时，恶意脚本将在浏览器中执行，可能导致敏感信息泄露或会话劫持。该漏洞影响 WordPress MF Gig Calendar 0.9.2 版本，CVSS 评分 4.3，危害等级中危。"
published = "2012-10-01T23:55:01.440"
remediation = "立即升级 MF Gig Calendar 插件至 1.2.1 或更高版本，该版本已修复查询字符串未正确转义导致的 XSS 问题。由于该插件已于 2024 年 3 月从 WordPress 官方仓库下架，建议停用并删除该插件，改用仍在维护的替代插件（如 The Events Calendar）。临时缓解措施可在 WAF 层面添加规则过滤查询字符串中的 `<script>` 等恶意标签。"
score = 4.3
severity = "MEDIUM"
sources = ["nuclei"]
title = "WordPress MF Gig Calendar 插件跨站脚本漏洞"
updated = "2026-06-16T23:44:41.517"

