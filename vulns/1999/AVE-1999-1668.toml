[basic]
description = "标签之间。<value>Microsoft Exchange 5.5 存在访问控制列表（ACL）处理漏洞，对 ACL 的修改不会立即生效，需要等待目录存储缓存刷新后才能生效。未经身份验证的远程攻击者可以利用此漏洞，在 ACL 修改后、缓存刷新前的时间窗口内，使用已被撤销的权限访问 Exchange 服务器资源，导致未授权访问敏感信息或执行未授权操作。该漏洞影响 Microsoft Exchange 5.5 版本，CVSS 评分 7.5，危害等级较高。"
published = "1999-12-13T05:00:00.000"
remediation = "建议将 Microsoft Exchange 5.5 升级至 Service Pack 4，并安装最新累积补丁以修复 ACL 缓存刷新缺陷。作为临时缓解措施，修改访问控制列表后应立即手动刷新目录存储缓存（重启 Directory Store 服务或使用管理工具强制刷新），确保权限变更即时生效，避免旧缓存导致越权访问。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
