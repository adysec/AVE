[basic]
description = "Linux 内核 x86 架构的 clear_user_rep_good() 函数中，异常处理表的注释位置错误：rep movsb 指令的异常表条目指向了其之前的寄存器移动指令而非实际用户空间访问指令。当用户空间访问触发异常时，异常处理程序无法在异常表中找到对应指令，导致内核无法正确返回 -EFAULT 错误码，而是触发内核 oops 崩溃。该问题影响使用 rep stosb/movsb 进行用户空间内存清零操作的场景，如 ext4 文件系统的 DIO 读取路径。该 CVE 已被撤销，因为相关代码已从主线内核中移除。"
published = "2025-12-24"
remediation = "该 CVE 已被撤销，相关代码已从主线内核中移除（commit d2c95f9d6802）。如需修复，可合入补丁 commit b805d212c394f291f116b12c53401e7ba0c4d408，或升级至包含该补丁的内核版本。"
score = 3.5
severity = "LOW"
sources = ["cve"]
title = "Linux Kernel x86 clear_user_rep_good 异常处理注释缺陷导致内核崩溃"
updated = "2025-12-29"

