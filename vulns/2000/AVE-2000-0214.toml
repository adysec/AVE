[basic]
description = "Netscape Enterprise Server 3.0/3.6/3.51 版本中存在目录索引配置缺陷，当服务器启用 Directory Indexing 功能时，远程未经身份认证的攻击者可通过向服务器发送特制的 Web 发布标签请求（如 `?wp-ver-info` 和 `?wp-cs-dump`）触发目录列表泄漏，从而获取服务器目录结构与文件清单。该漏洞可能导致敏感信息泄露，为后续攻击提供攻击面。CVSS 评分 5.0，危害等级中危。"
published = "2000-03-17T05:00:00.000"
remediation = "升级到 Netscape Enterprise Server 3.6 SP2 及以上版本。在管理控制台关闭 Directory Indexing 选项，并删除或限制访问 `wp-*.html` 及相关 CGI 文件。如无法升级，在反向代理或 WAF 层拦截包含 `?wp-ver-info`、`?wp-cs-dump` 等参数的请求；同时建议迁移至 Oracle iPlanet Web Server 或 Nginx 等现代 Web 服务器以获得持续安全支持。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Netscape Enterprise Server 目录索引漏洞"
updated = "2026-06-16T21:51:17.417"

