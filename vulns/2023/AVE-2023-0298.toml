[basic]
description = "致远互联 OA A6 协同办公系统存在未授权敏感信息泄露漏洞，攻击者无需身份认证即可通过构造特定 URL 路径直接访问系统内置的敏感接口或配置文件，从而获取系统配置文件、数据库连接信息、用户账号及密码哈希等敏感数据。该漏洞影响致远 OA A6 的多个历史版本，攻击方式为远程匿名访问，无需任何前置认证条件，攻击门槛极低，可导致敏感信息外泄并进一步被用于内网渗透，危害等级为高危。"
published = "2023-08-08"
remediation = "升级致远互联 OA A6 至厂商已修复的安全版本，并关闭或限制对敏感配置文件及管理接口的匿名访问权限，在 Web 服务器层面配置访问控制列表（ACL）禁止未授权 IP 访问相关路径，同时修改默认数据库与系统账号口令并定期审计访问日志。"
score = 7.5
severity = "HIGH"
sources = ["hwpoc"]
title = "致远互联 OA A6 敏感信息泄露漏洞"
updated = "2023-08-08"

