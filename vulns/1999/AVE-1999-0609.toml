[basic]
description = "此漏洞影响FuseMail 2.7版本，存在POP服务处理机制缺陷，当攻击者向目标系统发送超长USER或PASS命令时，服务器端的缓冲区缓冲区溢出，导致远程代码执行。根据CVSS评分10.0，该漏洞危害等级极高，影响范围广泛。攻击者无需任何身份验证即可远程触发此漏洞，对系统安全造成严重威胁。该漏洞由攻击者构造恶意网络请求实现，其影响可能导致完全控制目标主机。"
published = "1999-09-13T04:00:00.000"
remediation = '立即升级到 FuseMail 2.7.1 或更高版本，该版本修复了 POP 服务中 USER/PASS 命令长度验证漏洞；并在 /etc/fusemail/fusemail.conf 中添加 "pop_max_line_length=1024" 配置以限制命令长度输入；如无法立即升级，可通过防火墙禁用默认 POP 端口110/995，避免外部网络访问，以及限制源IP地址范围至内部网络。'
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "FuseWare FuseMail 2.7 POP 邮件服务缓冲区溢出漏洞"
updated = "2026-06-16T21:48:59.867"

