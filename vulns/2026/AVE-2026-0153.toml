[basic]
description = "Apache HTTP Server 在处理配置文件中的正则表达式时存在缓冲区下写漏洞，由于未对输入长度进行充分校验，攻击者可通过构造特制的配置文件或利用特定模块触发缓冲区溢出，导致内存越界写入。该漏洞影响 Apache HTTP Server 多个版本，成功利用可能导致敏感信息泄露或服务崩溃，需要结合特定配置条件触发。"
published = "20260608"
remediation = "建议立即将 Apache HTTP Server 升级至 2.4.68 或更高版本，该版本已修复 `ap_regname()` 函数中因有符号字符溢出导致的堆缓冲区下写漏洞。如无法立即升级，避免在配置中使用包含用户可控输入的正则表达式，并限制不可信用户对配置文件的写入权限作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "Apache HTTP Server 配置正则表达式缓冲区下写漏洞"
updated = "20260608"

