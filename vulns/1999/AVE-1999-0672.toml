[basic]
description = 'Falcon Web Server 存在目录遍历（任意文件读取）漏洞，其原理是服务器未对请求路径中的".."（点点）序列进行充分过滤与规范化校验。远程攻击者无需认证，只需向目标服务器发送包含"../"或"..\"等目录回溯序列的特制 HTTP 请求，即可突破 Web 根目录限制，访问文件系统上的任意文件，如配置文件、密码文件等敏感数据。该漏洞影响运行 Falcon web server 的服务器，攻击条件仅需网络可达目标服务且能构造恶意 URL，利用方式简单，通过普通浏览器或脚本即可发起。'
published = "1999-10-26T04:00:00.000"
remediation = "升级到 Apache Tomcat 3.1 或更高版本（Falcon web server 的后续产品），新版本已修复 URL 路径中 .. 序列未经过滤即可访问任意文件的问题。将 Web 根目录配置为仅包含所需静态文件的最小目录，并使用操作系统权限限制 Web 服务器进程对敏感目录的访问。在防火墙或反向代理层面过滤含 .. 和 %2e%2e 的请求 URL，阻止路径遍历请求到达后端服务器。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Falcon Web Server 目录穿越任意文件读取漏洞"
updated = "2026-06-16T21:49:15.097"

