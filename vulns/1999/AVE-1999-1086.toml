[basic]
description = "Internet Explorer 5.0 的安装向导 (ie5setup.exe) 在进行无人值守安装时存在安全缺陷，会擅自禁用屏幕保护程序，若安装过程中发生故障或中断，系统将处于无锁屏保护状态，可能被具有物理访问权限的本地用户非法访问；同时还会禁用任务计划程序服务 (Task Scheduler)，阻止安全关键程序的定时执行，降低系统整体安全性。攻击者需具备本地物理访问权限，CVSS 评分 7.2，危害等级高。"
published = "1999-03-23"
remediation = '安装完成后手动重新启用屏幕保护程序，并在控制面板中重新启动 Task Scheduler 服务（net start "Task Scheduler"）。建议升级至 IE 6.0 及以上版本，或改用现代浏览器替代。如非必需，避免使用无人值守模式安装旧版 IE。'
score = 7.2
severity = "HIGH"
sources = ["cve"]
title = "Internet Explorer 5.0 安装向导信息泄露漏洞"
updated = "2026-06-16"

