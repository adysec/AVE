[basic]
description = "shell-quote 包 1.8.5 之前版本的 `parse()` 函数在 token 归约阶段使用 `Array.prototype.concat` 作为累加器，每次迭代都会复制整个增长的数组，导致解析时间复杂度达到 O(n²)。未认证的远程攻击者只需向调用 `parse()` 的代码路径提交一段普通空格分隔字符串（无需 shell 元字符），即可阻塞 Node.js 单线程事件循环长达数十秒，造成拒绝服务。该漏洞仅影响可用性，不涉及代码执行或数据泄露，修复版本为 1.8.5。"
published = "2026-06-25T05:16:52.763"
remediation = "立即将 shell-quote 升级至 1.8.5 及以上版本：npm install shell-quote@^1.8.5。如无法立即升级，可在调用 parse() 前限制输入字符串长度（如不超过 1000 字符）或对输入进行 token 数量截断作为临时缓解措施。"
score = 8.7
severity = "HIGH"
sources = ["ghsa"]
title = "shell-quote parse 函数二次复杂度拒绝服务漏洞"
updated = "2026-06-26T19:03:34.507"

