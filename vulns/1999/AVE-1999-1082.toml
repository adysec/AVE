[basic]
description = "Pegasus 电子邮件客户端 3.0 及更早版本存在密码存储加密强度不足漏洞。程序将 POP3 账户密码使用弱加密算法处理后明文或近似明文存储在 pmail.ini 配置文件中，本地攻击者只需访问该文件即可轻易解密获取密码，进而读取目标用户的电子邮件内容。该漏洞利用门槛低，无需特殊权限，属于本地信息泄露风险。"
published = "1999-05-15T04:00:00.000"
remediation = "建议升级至 Pegasus Mail 3.1 及以上版本，该版本改进了 POP3 密码的加密存储方式。若无法升级，应限制对 pmail.ini 文件的本地访问权限，仅允许必要用户读取，并避免在多用户共享系统上使用该客户端处理敏感邮件。"
score = 3.6
severity = "LOW"
sources = ["cve"]
title = "Pegasus 邮件客户端 POP3 密码弱加密存储漏洞"
updated = "2026-06-16T21:50:17.223"

