[basic]
description = "Man and Mice DNS PRO 5.7 存在拒绝服务漏洞，远程攻击者可通过向目标 DNS 服务器发送大量连接请求，耗尽系统资源导致服务不可用。该漏洞影响 DNS PRO 5.7 版本，攻击者无需身份认证即可发起攻击，利用难度较低。建议升级至最新版本或限制连接数以缓解风险。"
published = "1999-12-20T05:00:00.000"
remediation = "建议立即升级至 BlueCat 当前支持的 Micetro 或 Integrity DDI 平台，替代已停止维护的 DNS PRO 产品。同时配置防火墙规则限制单 IP 并发连接数，并在 DNS 服务器上启用速率限制（rate limiting）以缓解大量连接导致的拒绝服务攻击。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Man and Mice DNS PRO 5.7 连接拒绝服务漏洞"
updated = "2026-06-16T21:50:50.247"

