[basic]
description = "Red Hat Linux 6.1 中的可插拔认证模块（PAM）存在账户锁定机制缺陷，未能正确限制对已禁用的 NIS 账户的访问权限。本地攻击者可通过 NIS 认证接口绕过账户禁用策略，利用已禁用的 NIS 账户登录系统，获取非授权访问权限。该漏洞影响 Red Hat Linux 6.1 及可能使用相同 PAM 配置的其他发行版，CVSS 评分 4.6，危害等级中危。攻击者需具备本地访问权限，利用难度较低。"
published = "1999-10-13T04:00:00.000"
remediation = "升级 Red Hat Linux 的 PAM 软件包至修复版本（如 pam-0.68-10 及以上），或升级至 Red Hat Linux 6.2 及以上版本。如无法升级，在 `/etc/pam.d/` 配置文件中确保 `pam_unix_auth.so` 和 `pam_deny.so` 模块正确配置，对禁用 NIS 账户添加 `account required pam_unix_acct.so` 规则，防止已禁用账户通过 NIS 认证绕过锁定机制。"
score = 4.6
severity = "MEDIUM"
sources = ["avd"]
title = "Red Hat Linux PAM NIS禁用账户访问控制漏洞"
updated = "2026-06-16T21:51:32.820"

