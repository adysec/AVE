[basic]
description = "Linux 内核 2.6.36 之前版本中 Reliable Datagram Sockets（RDS）协议的 rds_page_copy_user 函数未正确验证用户空间传入的内存地址，本地攻击者可通过精心构造 sendmsg 和 recvmsg 系统调用触发此漏洞，实现权限提升至 root。该漏洞影响所有使用受影响内核版本的 Linux 发行版，攻击者需拥有本地用户权限即可利用，危害等级高。"
published = "2010-12-06T20:13:00.513"
remediation = "立即将 Linux 内核升级至 2.6.36 及以上版本，该版本修复了 rds_page_copy_user 函数未正确验证用户空间地址的问题。如无法立即升级内核，可通过 `modprobe -r rds` 命令卸载 RDS 内核模块，并在 `/etc/modprobe.d/` 中添加 `blacklist rds` 配置禁止自动加载，作为临时缓解措施。"
score = 7.8
severity = "HIGH"
sources = ["kev"]
title = "Linux Kernel RDS 协议本地权限提升漏洞"
updated = "2026-06-16T23:23:47.610"

