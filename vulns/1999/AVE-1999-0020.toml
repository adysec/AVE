[basic]
description = "Apache Web Server for Win32 存在文件访问限制绕过漏洞。当攻击者在请求的 URL 末尾追加一个点号（.）时，服务器无法正确解析文件名，导致原本受限的文件可以被未经认证的远程攻击者访问。该漏洞影响了在 Windows 平台上运行的 Apache HTTP Server，攻击者无需认证即可利用此漏洞读取服务器上的敏感文件，如配置文件、密码文件等，造成信息泄露危害。"
published = "1999-12-12T05:00:00.000"
remediation = "升级 Apache HTTP Server for Win32 至 1.3.1 及以上版本（或迁移至 2.x 系列），该问题在 Apache 1.3.1 中已修复 Windows 平台路径规范化处理。如无法升级，可在 httpd.conf 中使用 mod_rewrite 规则对请求 URL 末尾的 . 进行过滤或重写，或配置 <Directory> 访问控制禁止路径末尾带点号的请求。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Apache HTTP Server Win32 版本点号追加路径信息泄露漏洞"
updated = "2026-06-16T21:48:04.840"

