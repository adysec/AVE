[basic]
description = "FreeBSD 2.2 及更早版本在通过 NFS 导出文件系统时，未正确限制对设备特殊文件（如 /dev 下的块设备与字符设备）创建硬链接的权限。本地或具有 NFS 挂载访问权限的攻击者可利用此缺陷，在导出的文件系统上创建指向设备文件的硬链接并反复访问，导致系统资源被异常占用或内核处理异常，进而引发拒绝服务。攻击条件为攻击者需能挂载或访问受影响的 NFS 导出目录，并在其中创建硬链接。"
published = "1998-06-16T04:00:00.000"
remediation = "建议升级到 FreeBSD 3.0 或更高版本，该问题已在后续版本中修复。若无法立即升级，应限制本地用户对设备特殊文件（/dev 目录）的访问权限，并避免将设备文件所在目录通过 NFS 导出；同时可在挂载 NFS 文件系统时添加 nodev 选项，禁止在该文件系统上解释设备文件，作为临时缓解措施。"
score = 5.5
severity = "MEDIUM"
sources = ["epss"]
title = "FreeBSD 2.2 NFS 设备文件硬链接拒绝服务漏洞"
updated = "2026-06-16T21:49:02.953"

