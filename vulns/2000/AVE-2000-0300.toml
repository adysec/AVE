[basic]
description = "Inter7 vpopmail 的 vchkpw POP3 认证组件存在缓冲区溢出漏洞，远程攻击者可通过向 POP3 端口发送特制的超长用户名或密码数据包触发栈溢出，成功利用可在目标系统上以 root 权限执行任意代码。该漏洞影响 vpopmail 3.4.11 及之前版本，CVSS 评分 10.0，危害等级严重。"
published = "2000-01-21T05:00:00.000"
remediation = "立即升级 vpopmail 至 3.4.12 或更高版本，该版本已修复 vchkpw 认证模块中用户名/密码长度未校验导致的缓冲区溢出问题。如无法升级，可在 tcpserver 或 xinetd 层限制 POP3 认证请求的用户名字段长度不超过 64 字节，作为临时缓解措施。"
score = 10
severity = "CRITICAL"
sources = ["exploitdb"]
title = "Inter7 vpopmail (vchkpw) 本地缓冲区溢出漏洞"
updated = "2026-06-16T21:50:58.910"

