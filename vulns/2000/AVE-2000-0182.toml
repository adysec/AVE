[basic]
description = "Oracle 8.1.5.x for Linux 安装程序在创建 orainstRoot.sh 文件时未正确处理符号链接，错误地跟随恶意符号链接并在全局可写权限下生成该文件。本地攻击者可利用此漏洞篡改安装脚本内容，在 Oracle 安装过程中获取 root 权限，实现本地权限提升。该漏洞影响 Oracle8i Standard Edition 8.1.5 for Linux 版本，需要攻击者拥有本地系统访问权限。"
published = "2000-03-05T05:00:00.000"
remediation = "升级至 Oracle 8.1.6 或更高版本。安装前检查并清理 `/tmp` 及 Oracle 安装目录中的所有符号链接，确保安装路径不被攻击者控制。安装后立即执行 `chmod 755 $ORACLE_HOME/orainstRoot.sh` 收紧文件权限，并验证该文件所有者是否为 root。如无法升级，在安装脚本运行时以 root 身份监控文件系统变更，确保关键文件不被恶意覆盖。"
score = 6.2
severity = "MEDIUM"
sources = ["avd"]
title = "Oracle Oracle8i 标准版 8.1.5 Linux 安装程序本地权限提升漏洞"
updated = "2026-06-16T21:51:13.403"

