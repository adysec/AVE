[basic]
description = 'Elixir 的 Tesla HTTP 客户端库中的 `Tesla.Multipart.part_headers_for_disposition/1` 函数在处理 multipart 请求的 Content-Disposition 参数值时，未对回车符（\r）、换行符（\n）和双引号（"）进行转义或过滤，导致攻击者可通过控制文件名（filename）、字段名（name）或其他 disposition 参数注入额外的 part 头部或向 part 体前添加恶意字节。该漏洞影响 tesla 0.8.0 至 1.18.2 版本，攻击者无需身份认证即可利用，但需要控制部分输入参数，CVSS 评分 2.1，危害等级低。已在 tesla 1.18.3 版本中修复。'
published = "2026-06-02T20:16:38.847"
remediation = '立即将 tesla 升级至 1.18.3 或更高版本（`mix deps.update tesla`）。如无法立即升级，在调用 `add_field/4`、`add_file/3` 或 `add_file_content/4` 前，对 disposition 参数值进行校验，拒绝包含 `\r`、`\n` 或 `"` 字符的输入。'
score = 2.1
severity = "LOW"
sources = ["ghsa"]
title = "elixir-tesla Tesla Multipart 组件 Content-Disposition 参数转义不当导致多部分标头注入漏洞"
updated = "2026-07-22T19:10:00.120"

