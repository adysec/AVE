[basic]
description = 'TP-Link 产品目录遍历漏洞是由于 Archer C5、C7、C8、C9、TL-WDR3500、TL-WDR3600、TL-WDR4300、TL-WR740N、TL-WR741ND、TL-WR841N 等多个 TP-Link 系列无线路由器产品在登录功能的路径参数处理中存在输入验证不足的问题。攻击者可以构造包含 ".." 目录遍历符号的恶意 HTTP 请求，绕过路径验证访问到 web 根目录之外的敏感文件。该漏洞影响范围广泛，涉及多个 TP-Link 产品型号及版本，攻击者无需认证即可远程触发。利用该漏洞，攻击者能够读取路由器配置文件、密码文件等系统关键文件，导致敏感信息泄露，严重威胁网络设备安全。 CVSS 评分 7.5，威胁等级为高危，已被 CISA 纳入已知利用漏洞清单。'
published = "2015-04-22T01:59:02.553"
remediation = "建议立即登录 TP-LINK 官网下载并升级至以下固件版本：Archer C5 升级至 150317 或更高版本，Archer C7 升级至 150304 或更高版本，Archer C8 升级至 150316 或更高版本，TL-WDR4300 升级至 150302 或更高版本，TL-WR740N/741ND 升级至 150312 或更高版本，TL-WR841N/841ND 升级至 150310 或更高版本。若暂时无法升级，建议在防火墙层面限制 WAN 口对管理界面的访问，或仅允许受信任 IP 访问管理界面作为临时缓解措施。"
score = 7.5
severity = "HIGH"
sources = ["kev"]
title = "TP-LINK 多款路由器 目录遍历漏洞"
updated = "2026-06-17T00:25:09.817"

