[basic]
description = "Sun Solaris 7.0 的 /usr/bin/lpset 程序中存在缓冲区溢出漏洞，本地低权限用户可通过向该程序提交特制的参数或环境变量触发缓冲区溢出，覆盖内存空间，从而获取 root 权限，完全控制目标系统。该漏洞影响 Sun Solaris 7.0 版本，攻击者需具有本地登录权限，无需网络访问即可完成提权利用。"
published = "1999-05-11T04:00:00.000"
remediation = "安装 Sun 官方补丁 106980（Solaris 7 适用），或升级至 Solaris 8 及以上版本。临时缓解措施：以 root 执行 `chmod 555 /usr/bin/lpset` 移除 setuid 位，限制本地普通用户以提权方式运行该程序。"
score = 7.2
severity = "HIGH"
sources = ["cve"]
title = "Sun Solaris 7.0 lpset 本地缓冲区溢出漏洞"
updated = "2026-06-16T21:49:01.700"

