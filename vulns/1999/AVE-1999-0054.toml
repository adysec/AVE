[basic]
description = "S.u.S.E Linux 5.2 系统中 gnuplot 程序存在本地缓冲区溢出漏洞。由于 gnuplot 在处理特定输入时未对数据长度进行充分检查，导致本地用户可通过向程序提交特制超长参数触发缓冲区溢出，从而覆盖内存中的关键数据，实现权限提升获取 root 权限。攻击者需具有本地系统访问权限，无法远程利用。该漏洞影响 S.u.S.E Linux 5.2 等早期 Linux 发行版。"
published = "1999-03-04T05:00:00.000"
remediation = '立即执行 `chmod -s /usr/bin/gnuplot` 移除 gnuplot 的 suid root 权限位，这是最直接有效的缓解措施。同时将 gnuplot 升级至 3.7 及以上版本，该版本已修复 plot.c 中 HOME 环境变量的栈缓冲区溢出漏洞。如使用 S.u.S.E 系统，可将 `/etc/rc.config` 中 `PERMISSION_SECURITY` 设为 `"paranoid"` 以自动管理 suid 权限。作为深度防御，建议限制普通用户对 svgalib 和 /dev/mem 的访问。'
score = 4.6
severity = "MEDIUM"
sources = ["exploitdb"]
title = "SuSE Linux gnuplot 本地缓冲区溢出漏洞"
updated = "2026-06-16T21:48:20.127"

