[basic]
description = "Linux NFS 服务存在缓冲区溢出漏洞，远程攻击者可通过向目标系统发送特制的超长路径名请求触发该漏洞，导致任意代码执行。该漏洞影响早期 Linux 发行版中运行的 NFS 服务，攻击者无需身份认证即可利用，CVSS 评分 10.0，危害等级严重。建议用户升级至修复版本或应用相关安全补丁。"
published = "1999-11-09T05:00:00.000"
remediation = "立即升级 Linux 内核至各发行版对应的安全修复版本：Red Hat Linux 升级至 kernel 2.2.5-22（RH42 及更新版）、Debian GNU/Linux 2.1（slink）升级至 kernel 2.0.38-1、SuSE Linux 安装 1999 年 11 月发布的 kernel 更新包。如无法升级内核，可在 /etc/exports 中使用 secure 选项限制客户端来源，并通过 iptables 限制 NFS 端口（2049/TCP、2049/UDP）仅对可信网段开放作为临时缓解。"
score = 10
severity = "CRITICAL"
sources = ["redhat"]
title = "Linux NFS 服务器缓冲区溢出代码执行漏洞"
updated = "2026-06-16T21:49:09.053"

