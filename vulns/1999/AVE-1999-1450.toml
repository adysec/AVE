[basic]
description = "RealSystem G2 服务器将管理员密码以明文形式存储于全局可读取的配置文件中，导致本地攻击者可通过读取该配置文件获取管理员权限。该漏洞允许已获得本地系统访问权限的低权限用户直接窃取管理员凭据，进而实现权限提升。受影响的版本包括 RealSystem G2 及可能的相关组件，危害等级中等，建议立即修改文件权限并升级至安全版本。"
published = "1998-12-10T05:00:00.000"
remediation = "立即升级 RealSystem G2 至官方修复版本（如 RealSystem G2 6.0.3 及更高版本），或迁移至 RealNetworks 后续支持的 Helix Server 系列。同时将配置文件权限设置为仅管理员可读（chmod 600），并移除其他用户的读取权限。如产品已停止维护，建议替换为其他流媒体服务器软件（如 Wowza Streaming Engine 或 Nginx-RTMP）以彻底消除风险。"
score = 4.6
severity = "MEDIUM"
sources = ["epss"]
title = "RealNetworks RealSystem G2 Server 权限提升漏洞"
updated = "2026-06-16T21:50:06.293"

