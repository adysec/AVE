[basic]
description = "Windows NT 4.0 的 Messenger 服务在处理用户登录认证时存在缓冲区溢出漏洞，远程攻击者可通过向目标系统的 Messenger 服务发送超长的用户名字段，触发服务进程缓冲区溢出而崩溃，导致拒绝服务。该漏洞影响 Windows NT 4.0 版本，攻击者无需任何身份认证即可远程发起攻击，利用条件简单，可导致目标系统 Messenger 服务不可用。厂商 Microsoft 至今未发布官方补丁，建议用户禁用 Messenger 服务或通过防火墙限制对该服务的访问。"
published = "1999-07-23T04:00:00.000"
remediation = "立即升级至 Windows 2000 或更高版本操作系统，Windows NT 4.0 已于 2004 年停止支持，不再提供安全更新。如无法升级，可在网络边界防火墙过滤 NetBIOS（137-139 端口）和 SMB（445 端口）流量，阻止外部用户向 Messenger 服务发送恶意报文。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Microsoft Windows NT 4.0 Messenger Service 拒绝服务漏洞"
updated = "2026-06-16T21:47:56.923"

