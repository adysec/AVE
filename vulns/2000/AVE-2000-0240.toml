[basic]
description = "RealNetworks RealServer（含 7.0 及 Pro 版本）在处理端口 7070 上的流式媒体服务请求时，未能对客户端传入的数据进行充分校验。远程攻击者无需身份认证，只需向目标服务器 7070 端口发送构造畸形的输入数据，即可触发服务异常，导致 RealServer 拒绝服务（DoS），使合法用户无法访问流媒体服务。该漏洞影响运行 RealServer 7.0 及 Pro 版本的服务端系统，攻击条件为攻击者能够网络访问目标 7070 端口，利用方式是通过发送特制报文使服务崩溃或挂起。"
published = "2000-04-20T04:00:00.000"
remediation = "升级 RealNetworks RealServer 至修复版本 7.0.1 或更高（RealServer G2 7.0.1 build 285 及以上），并从官方下载安装最新补丁。如无法立即升级，可在防火墙或边界设备上屏蔽 TCP 7070 端口的入站连接，限制仅内网可信地址访问，作为临时缓解措施。"
score = 7.8
severity = "HIGH"
sources = ["exploitdb"]
