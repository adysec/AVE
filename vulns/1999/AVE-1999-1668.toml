[basic]
description = "Microsoft Exchange 5.5 存在访问控制漏洞，管理员对访问控制列表（ACL）的修改不会立即生效，需等待目录存储缓存刷新后才能应用。在此期间，系统实际运行的访问控制规则与预期配置不一致，可能导致已被修改权限的用户在缓存刷新前仍可访问本应受限的资源。攻击者可利用此时间窗口绕过访问控制策略，获取未授权访问权限，影响系统机密性与完整性。CVSS 评分 7.5，危害等级高。"
published = "1999-12-13T05:00:00.000"
remediation = '安装 Microsoft Exchange 5.5 Post-SP3 安全更新（即 Exchange 5.5 SP3 之后发布的累积安全修补程序）。临时缓解措施：修改 ACL 后手动重启 Microsoft Exchange Directory Service（DS），或在注册表中调低目录存储缓存刷新间隔（HKEY_LOCAL_MACHINE\System\CurrentControlSet\Services\MSExchangeDS\Parameters\Cache Refresh Interval（秒））以加速生效。根本解决建议升级至受支持的 Exchange 2016/2019 版本，Exchange 5.5 已停止支持多年，不推荐继续使用。'
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "Microsoft Exchange 5.5 ACLs 访问控制漏洞"
updated = "2026-06-16T21:49:28.833"

