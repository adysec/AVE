[basic]
description = 'suidperl（sperl）5.00503 版本在调用 /bin/mail 发送错误报告时，未正确过滤文件名中的 "~!" 转义序列。本地攻击者可利用 "interactive" 环境变量结合包含该转义序列的文件名触发 suidperl 执行，从而以 mail 程序权限执行任意命令，实现本地权限提升。该漏洞影响 Perl 5.00503 及之前版本，CVSS 评分 7.2，危害等级高。'
published = "2000-10-20T04:00:00.000"
remediation = "升级 Perl 至 5.6.0 或更高版本，该版本已修复 suidperl 的 ~! 转义序列过滤缺陷。如无法升级，可移除 suidperl 的 setuid 权限（chmod u-s /usr/bin/suidperl），或直接删除 suidperl 可执行文件，改用 sudo 替代 setuid 提权方案。"
score = 7.2
severity = "HIGH"
sources = ["redhat"]
title = "Perl suidperl 本地权限提升漏洞"
updated = "2026-06-16T21:52:18.217"

