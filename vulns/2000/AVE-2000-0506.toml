[basic]
description = "Microsoft Site Server 3.0 Commerce Edition 自带的示例网站未对用户提交的标识号进行有效性验证，存在 SQL 注入漏洞。远程攻击者可通过向受影响示例站点发送特制 HTTP 请求，在参数中嵌入恶意 SQL 语句，绕过身份认证执行任意数据库命令，导致敏感数据泄露或服务器遭控制。该漏洞影响 Site Server 3.0 Commerce Edition 版本，CVSS 评分 7.5，危害等级高，无需身份认证即可远程利用。Microsoft 未发布官方补丁，建议移除示例网站或升级至 Site Server 4.0。"
published = "2000-02-18T05:00:00.000"
remediation = "立即删除 Microsoft Site Server 3.0 Commerce Edition 附带的示例网站（位于 /samples 目录），或禁用 IIS 中对应的虚拟目录。对识别号参数实施严格的输入验证，过滤 SQL 特殊字符（如单引号、分号、-- 注释符），并使用参数化查询替代动态 SQL 拼接。该产品已停止支持，建议升级至受支持的电子商务平台。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "Microsoft Site Server 3.0 Commerce Edition SQL注入漏洞"
updated = "2026-06-16T21:51:07.640"

