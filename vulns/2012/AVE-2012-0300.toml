[basic]
description = "Adobe Flash Player 11.4.402.265 之前版本中的 Matrix3D 类的 copyRawDataTo 方法存在整数溢出漏洞（CWE-190）。远程攻击者可通过向受影响的 Flash Player 环境提交特制的畸形参数触发该漏洞，导致内存破坏，进而实现任意代码执行。攻击者通常利用恶意构造的 SWF 文件诱导用户访问，在用户交互条件下完成利用。该漏洞影响 Adobe Flash Player 全平台版本，CVSS 评分 8.8，危害等级高。Adobe 已在 11.4.402.265 版本中修复此漏洞。"
published = "2012-09-24T17:55:07.217"
remediation = "立即升级 Adobe Flash Player 至 11.4.402.265 或更高版本。由于 Adobe Flash Player 已于 2020 年底停止支持并终止分发，建议彻底卸载 Flash Player 并移除浏览器插件，同时禁用浏览器中所有与 Flash 相关的加载项，以彻底消除攻击面。"
score = 8.8
severity = "HIGH"
sources = ["kev"]
title = "Adobe Flash Player Matrix3D类整数溢出远程代码执行漏洞"
updated = "2026-06-16T23:46:05.460"

