[basic]
description = "Joomla! 的 Picasa 组件（com_joomlapicasa2）2.0 及 2.0.5 版本中存在目录遍历漏洞。远程攻击者可通过向 index.php 的 controller 参数传入 `../` 序列，绕过路径限制读取服务器上的任意本地文件，如配置文件等敏感信息。攻击无需认证，风险等级高，CVSS 评分 7.5。建议升级至最新版本或禁用该组件。"
published = "2010-04-08T16:30:00.877"
remediation = '立即卸载 com_joomlapicasa2 组件，该扩展已长期停止维护且官方未发布任何安全补丁。在 Joomla! 后台「扩展管理→管理」中找到该组件并点击「卸载」。如需替换图片管理功能，建议改用官方维护的组件（如 Phoca Gallery 或 Joomla! 核心自带的媒体管理器）。同时确保 Joomla! 核心程序升级到最新版本，并在 .htaccess 中添加对 controller 参数的过滤规则：RewriteCond %{QUERY_STRING} controller=\.\./ [NC,OR]'
score = 7.5
severity = "HIGH"
sources = ["nuclei"]
title = "Joomla! Picasa组件 本地文件包含漏洞"
updated = "2026-06-16T23:18:04.060"

