[basic]
description = "Nortel Networks Nautica Marlin 桥接设备（交换机）的 SNMP 服务存在拒绝服务漏洞。该设备在处理送往 SNMP 端口（UDP 161）的 UDP 数据包时，未能正确处理长度为零的畸形数据包。未经身份认证的远程攻击者只需向目标设备的 SNMP 端口发送一个零长度的 UDP 数据包，即可触发该缺陷，导致设备 SNMP 服务崩溃或设备停止正常转发，造成网络服务中断。该漏洞影响运行相关固件的 Nautica Marlin 桥接设备，攻击条件简单，无需认证且可远程利用，属于典型的可用性破坏型漏洞。"
published = "2000-02-25T05:00:00.000"
remediation = "建议升级 Nortel Nautica Marlin 桥接设备至厂商发布的安全固件版本（具体版本号请向 Nortel 技术支持确认并刷入最新补丁）。如无法立即升级，可在边界防火墙或 ACL 上过滤发往设备 SNMP UDP 端口（161）的畸形零长度 UDP 报文，并仅允许受信任管理网段访问 SNMP 服务，作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "北电网络 Nautica Marlin SNMP服务拒绝服务漏洞"
updated = "2026-06-16T21:51:15.397"

