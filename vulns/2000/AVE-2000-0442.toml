[basic]
description = "BRU 备份软件存在环境变量注入漏洞，本地低权限用户可通过设置 BRUEXECLOG 环境变量指定一个备用的配置文件路径，使得 BRU 程序启动时读取该配置文件并向其中写入日志数据。攻击者利用此特性可将任意数据追加写入到文件系统中任意文件内，从而篡改系统文件、提升权限或造成拒绝服务。该漏洞影响 BRU 15.1 和 16.0 版本，攻击条件为攻击者已获得目标主机的本地登录权限，且 BRU 软件以具有写入关键文件权限的用户身份运行。成功利用该漏洞可导致文件完整性被破坏，进而危害整个系统的安全性。"
published = "2000-06-05T04:00:00.000"
remediation = "建议升级 BRU 至修复此漏洞的安全版本，或联系 Enhanced Software Technologies 获取补丁。临时缓解措施：通过命令 `chmod u-s /usr/sbin/bru` 移除 BRU 的 setuid 位，限制普通用户无法以 root 权限执行 BRU，从而阻止通过 BRUEXECLOG 环境变量修改系统文件。如业务允许，亦可暂时停用 BRU 备份服务，改用其他备份工具替代。"
score = 7.2
severity = "HIGH"
sources = ["epss"]
title = "Tolis Group BRU 备份软件 环境变量本地文件任意写入漏洞"
updated = "2026-06-16T21:51:57.010"

