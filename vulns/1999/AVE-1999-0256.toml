[basic]
description = "IBM AIX 3.2.5 系统中的 rlogin 实现在处理 -froot 参数时存在授权绕过漏洞，远程攻击者或本地用户无需有效认证即可通过向 rlogin 命令传递 -froot 参数获取 root 权限。该漏洞允许低权限用户或未经认证的远程攻击者完全控制系统，危害等级严重。受影响版本包括 IBM AIX 3.2.5 及可能受影响的同类 rlogin 实现。"
published = "1994-05-23T04:00:00.000"
remediation = "立即升级至 IBM AIX 7.3 或 7.2 最新 Technology Level，rlogin 协议已在现代 AIX 版本中默认禁用。如无法升级，在 /etc/inetd.conf 中注释掉 login/shell/exec 行并重启 inetd 以关闭 r-commands 服务；使用 SSH 替代 rlogin，并在 /etc/ssh/sshd_config 设置 PermitRootLogin no 禁止 root 直接登录；在 /etc/hosts.equiv 和 ~root/.rhosts 中删除 + 通配符条目。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "IBM AIX login 命令权限提升漏洞"
updated = "2026-06-16T21:47:36.820"

