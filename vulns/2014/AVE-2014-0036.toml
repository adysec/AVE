[basic]
description = "WordPress WP Content Source Control 插件 3.0.0 及更早版本中的 downloadfiles/download.php 文件存在目录遍历漏洞。该漏洞源于 file_get_contents 函数未对 path 参数进行充分的路径过滤，允许未经身份认证的远程攻击者通过构造包含 ../ 序列的恶意请求，读取服务器上任意文件，导致敏感信息泄露。攻击者无需任何认证即可利用，攻击复杂度低，仅需发送特制 HTTP 请求即可触发。"
published = "2014-08-22T14:55:09.377"
remediation = '立即将 WP Source Control 插件升级至 3.1.1 或更高版本（该版本已修复目录遍历漏洞）。如无法升级，删除或重命名 `downloadfiles/download.php` 文件，或通过 `.htaccess` 添加 `RewriteRule ^wp-content/plugins/wp-source-control/downloadfiles/download\.php - [F,L]` 拒绝直接访问该文件，同时在 WordPress 根目录 `wp-config.php` 中定义 `DISALLOW_FILE_EDIT` 为 true 以增强安全防护。'
score = 5
severity = "MEDIUM"
sources = ["nuclei"]
title = "WordPress WP Content Source Control 插件目录遍历漏洞"
updated = "2026-06-17T00:11:26.790"

