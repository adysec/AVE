[basic]
description = "Corel Linux 1.0 中 Dosemu（DOS 模拟器）的默认配置存在安全缺陷，允许本地用户通过执行 system.com 程序获取系统最高权限。攻击者只需拥有本地访问权限，无需认证即可利用此漏洞完全控制系统。"
published = "2000-03-02"
remediation = "限制 Dosemu 配置文件的访问权限，移除不必要的 setuid 权限设置，或升级到已修复此问题的 Corel Linux 更新版本。"
score = 7.2
severity = "HIGH"
sources = [
    "cve",
    "exploitdb",
]
title = "Corel Linux 1.0 Dosemu 默认配置本地权限提升漏洞"
