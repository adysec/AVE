[basic]
description = "Cobalt RaQ2 服务器固件 2.0.15 及更早版本中，内置的 siteUserMod.cgi 程序未对请求来源和身份进行充分校验，远程攻击者无需提供管理员凭据即可直接向该 CGI 接口发送特制请求，绕过正常认证流程并修改站点用户参数、添加或提升用户权限，从而获取服务器管理控制权。攻击者可利用该漏洞在无需本地访问的情况下，通过网络对暴露的 RaQ2 管理 Web 服务发起请求完成提权。"
published = "2000-01-30"
remediation = "升级 Cobalt RaQ2 服务器固件至 2.0.16 及以上版本（Sun Cobalt 官方已发布修复补丁），或升级至 RaQ3/4 系列设备。临时缓解措施：在 Web 服务器配置中限制 /cgi-bin/siteUserMod.cgi 仅允许受信任管理员 IP 访问，或通过 .htaccess 添加访问限制。"
score = 7.2
severity = "HIGH"
sources = ["cve"]
title = "Cobalt RaQ2 siteUserMod.cgi 认证绕过权限提升漏洞"
updated = "2026-07-18"

