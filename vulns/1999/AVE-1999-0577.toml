[basic]
description = "Cfingerd 是一款用于替代系统 finger 守护进程的服务程序，当管理员在配置中启用 ALLOW_EXECUTION 选项时，程序会在代表用户执行指定程序前未能正确地降低（drop）自身权限。由于权限处理不当，本地已登录的普通用户可利用该缺陷，通过触发 Cfingerd 以用户身份执行程序的操作，使被执行的程序在仍保留 root 特权的情况下运行，从而提升自身权限至 root，完全控制受影响主机。该漏洞仅影响启用了 ALLOW_EXECUTION 功能的 Cfingerd 安装，攻击前提是攻击者已具备目标系统的本地账户访问权限。"
published = "1999-08-10T04:00:00.000"
remediation = "升级 Cfingerd 至修复该权限提升问题的版本（建议升级到 1.4.3 及以上），或编辑配置文件 cfingerd.conf 将 ALLOW_EXECUTION 选项设为禁用（no）以关闭该功能。若无法立即升级，可暂时移除 setuid root 权限（chmod u-s /usr/sbin/cfingerd）作为缓解措施，并限制仅可信本地用户访问 finger 服务。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
