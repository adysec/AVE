[basic]
description = "Stalker CommuniGate Pro 3.2.5 及更早版本的 Web 管理界面存在路径遍历漏洞。远程攻击者无需身份认证即可通过向管理接口发送包含 `..`（点点）序列的特制 HTTP 请求，突破目录限制读取服务器上的任意文件。该漏洞可导致敏感信息泄露，包括配置文件、密码文件等系统关键数据，CVSS 评分 5.0，危害等级中危。受影响版本应升级或限制管理接口访问以修复此漏洞。"
published = "2000-04-03T04:00:00.000"
remediation = "升级 CommuniGate Pro 至 3.2.6 或更高版本，该版本修复了 Web 管理界面中「..」目录遍历问题。如无法升级，应在防火墙或反向代理层面限制对 Web 管理端口（默认 8000）的访问，仅允许可信任管理 IP 连接。同时禁用管理界面的目录列表功能作为深层防护。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Stalker CommuniGate Pro 任意文件读取漏洞"
updated = "2026-06-16T21:52:09.323"

