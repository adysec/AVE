[basic]
description = "Smurf 攻击是一种分布式拒绝服务攻击方式，攻击者向目标网络的广播地址发送源地址伪造为受害者的 ICMP Echo Request 数据包，导致该网络内所有主机同时向受害者发送 ICMP Echo Reply 响应，造成流量放大效应，最终耗尽受害者带宽和系统资源。该漏洞影响 Linux Kernel 2.0/2.1、Digital UNIX 4.0D、FreeBSD 2.2.4、HP-UX 10.20/11.0、IBM AIX 3.2.5、NetBSD 1.2、Solaris 2.5.1 等多个操作系统版本，攻击者无需认证即可远程触发，CVSS 评分 5.0，危害等级中等。缓解措施包括在边界路由器上禁用 directed broadcast 功能以及配置 ICMP 流量过滤。"
published = "1998-01-05T05:00:00.000"
remediation = "在路由器上配置 `no ip directed-broadcast` 禁止转发定向广播包，并在网络边界过滤 ICMP echo request 广播流量。在 Linux 系统中执行 `echo 1 > /proc/sys/net/ipv4/icmp_echo_ignore_broadcasts` 忽略 ICMP 广播请求，或在内核参数中设置 `net.ipv4.icmp_echo_ignore_broadcasts=1`。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "多款Unix系统 ICMP广播放大 拒绝服务漏洞"
updated = "2026-06-16T21:48:33.307"

