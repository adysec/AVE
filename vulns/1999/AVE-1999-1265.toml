[basic]
description = "AIX 4.1.4 及 HP-UX 10.01 与 9.05 操作系统中存在拒绝服务漏洞。本地用户可通过 socket 连接本地主机的某个端口后调用 shutdown 清除该 socket，随后复用同一 socket 连接本地主机的另一个不同端口，触发系统异常进而导致崩溃。该漏洞利用条件较低，需本地用户权限即可实施，影响 IBM AIX 4.1.4/4.1.5 及 HP HP-UX 9.05/10.01/10.20 等版本。"
published = "1997-03-05T05:00:00.000"
remediation = "建议将 AIX 升级至 4.2 或更高版本，HP-UX 升级至 10.30 或 11.00 及以上版本，这些版本已修复 connect() 调用后的 shutdown 导致的崩溃问题。作为临时缓解措施，可限制非授信本地用户的 shell 访问权限，并通过系统审计日志监控异常的 socket 操作行为。"
score = 2.1
severity = "LOW"
sources = ["epss"]
title = "HP HP-UX 与 IBM AIX connect() 本地拒绝服务漏洞"
updated = "2026-06-16T21:50:22.600"

