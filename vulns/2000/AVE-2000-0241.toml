[basic]
description = "Cisco Catalyst 交换机 5.4.x 版本存在认证绕过漏洞，本地攻击者可在未提供正确密码的情况下，通过特制操作绕过认证直接获取设备的 enable 特权模式访问权限，从而完全控制目标交换机。该漏洞影响 Cisco Catalyst 系列交换机运行的 5.4.x 版本固件，CVSS 评分 4.6，危害等级中危。建议升级受影响的固件版本或配置严格的访问控制列表以缓解风险。"
published = "2000-04-20T04:00:00.000"
remediation = "升级 Cisco Catalyst 软件至 5.5 或更高版本，该版本修复了 enable 密码验证绕过漏洞。如无法升级，请在全局配置模式下使用 `enable secret` 命令设置加密密码替代 `enable password`，并配置 AAA 认证（`aaa new-model` + `aaa authentication enable default group tacacs+ enable`）以强制要求密码验证。同时限制管理接口的访问 IP 范围（`access-class` 或 ACL）。"
score = 4.6
severity = "MEDIUM"
sources = ["avd"]
title = "Cisco Catalyst 使能密码旁路漏洞"
updated = "2026-06-16T21:51:21.513"

