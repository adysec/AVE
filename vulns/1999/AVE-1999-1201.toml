[basic]
description = "Sun Solaris 2.x 系统在启动过程中，rcS 和 mountall 程序在 fsck 文件系统检查失败时会自动在系统控制台启动一个特权 shell（root 权限），攻击者通过物理接触目标系统控制台即可获取 root 权限。该漏洞影响 Solaris 2.4 之前版本，利用条件要求攻击者具有物理访问权限，危害等级高。"
published = "1999-12-31T05:00:00.000"
remediation = "建议升级到已修复的 Solaris 2.5 或更高版本（安装 Sun 官方补丁 103594 系列），并在无法立即升级时于系统控制台物理加锁、限制物理访问，同时在启动脚本中对 fsck 失败做显式处理并禁用自动进入特权 shell 的行为。"
score = 7.2
severity = "HIGH"
sources = ["cve"]
title = "Sun Solaris rcS/mountall 权限提升漏洞"
updated = "2026-06-16T21:50:46.540"

