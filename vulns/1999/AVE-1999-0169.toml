[basic]
description = "PHP/FI 的 mylog CGI 脚本存在路径遍历漏洞，远程攻击者无需身份认证即可通过构造特制的 URL 参数，读取目标服务器上的任意文件，导致敏感信息泄露。该漏洞影响 PHP/FI 1.0、FI 2.0 及 FI 2.0 b10 版本，利用方式简单，CVSS 评分 7.5，危害等级高。"
published = "1997-10-19T04:00:00.000"
remediation = "立即移除服务器上 PHP/FI 1.0/2.0 的 mylog/mlog CGI 脚本文件，或升级至 PHP 3.0 及以上版本，该漏洞在后继版本中已修复。如无法升级，在 Web 服务器配置中禁止对该脚本的外部访问，并将 PHP/FI 替换为受支持的 PHP 版本。"
score = 7.5
severity = "HIGH"
sources = ["exploitdb"]
title = "PHP PHP/FI mylog 脚本任意文件读取漏洞"
updated = "2026-06-16T21:47:30.230"

