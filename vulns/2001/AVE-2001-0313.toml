[basic]
description = "Icecast 1.3.10 及更早版本存在目录遍历漏洞，远程攻击者可通过在 HTTP 请求中使用编码后的路径穿越字符（如 .. ）构造恶意 URL，绕过服务器路径校验读取服务器上的任意敏感文件。该漏洞无需身份认证，攻击者可利用此缺陷获取配置文件、密码文件等敏感信息，导致信息泄露。Icecast 1.1.x 至 1.3.x 全系列版本均受此漏洞影响，CVSS 评分 5.0，危害等级中等。"
published = "2001-10-18T04:00:00.000"
remediation = "建议将 Icecast 升级至 1.3.11 或更高版本以修复该目录遍历漏洞。对于 Debian 系统用户，可通过 apt 安装 Debian 安全更新 DSA-089 中发布的 icecast-server 1.3.10-1 修复包（执行 apt-get update && apt-get install icecast-server）。如暂时无法升级，可在 Icecast 配置文件中限制 serve 目录的访问范围，或在前端部署反向代理过滤包含 URL 编码字符（如 %2e%2e）的恶意请求，以降低攻击者读取服务器敏感文件的风险。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Xiph.org Icecast 目录遍历漏洞"
updated = "2026-06-16T21:54:57.107"

