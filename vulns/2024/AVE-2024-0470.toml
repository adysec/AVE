[basic]
description = "PHP 8.3.19 之前版本及 8.4.5 之前版本中存在 Use-After-Free 漏洞，该漏洞源于 php_request_shutdown 过程中引用计数处理不当。当 __set 方法或 ??= 运算符与异常处理交织执行时，可触发已释放内存的重复使用。若攻击者能够控制内存布局并向目标 PHP 应用发送特制的恶意输入，则可利用该漏洞实现远程代码执行。该漏洞影响大量使用受影响 PHP 版本构建的 Web 应用，CVSS 评分 9.2，危害等级严重。建议用户升级至 PHP 8.3.19 或 8.4.5 及以上版本修复此漏洞。"
published = "2025-04-04T18:15:48.020"
remediation = "立即将 PHP 升级至 8.3.19 或 8.4.5 及以上版本。该漏洞影响 PHP 8.3.* < 8.3.19 和 8.4.* < 8.4.5，由异常处理器与 __set 或 ??= 运算符交互导致堆释放后使用（Use-After-Free），可被利用实现远程代码执行。PHP 8.2 及更早版本不受影响。如无法立即升级，应避免在 __set 方法中触发异常，或严格过滤用户可控输入以防止内存布局操控。"
score = 9.2
severity = "CRITICAL"
sources = ["msrc"]
title = "PHP 请求关闭过程释放后重用远程代码执行漏洞"
updated = "2026-06-17T06:57:21.650"

