[basic]
description = "IBM WebSphere 2.0 和 3.0 版本中的 ikeyman 工具使用弱加密算法存储 SSL 连接密钥数据库的密码，攻击者可通过分析加密后的密码文件，利用弱加密的脆弱性还原出明文密码，从而获取密钥数据库的访问权限。该漏洞影响 IBM WebSphere 2.0 及 3.0 版本，CVSS 评分 10.0，危害等级严重。建议用户升级至不受影响的版本或采用强加密方式存储密钥数据库密码。"
published = "1999-10-24T04:00:00.000"
remediation = "升级到 IBM WebSphere 4.0 或更高版本，该版本已弃用 ikeyman 工具并改用更安全的密钥库管理方式。如无法升级，应避免使用 ikeyman 存储 SSL 密钥库密码，改用 keytool 等工具手动管理密钥库，并对密钥库文件设置严格的文件系统权限（仅允许管理员访问）。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "IBM WebSphere ikeyman 弱加密密码漏洞"
updated = "2026-06-16T21:49:22.783"

