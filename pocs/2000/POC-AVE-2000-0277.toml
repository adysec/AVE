[info]
author = "AVE"
description = "构造含有自引用DNS名称压缩指针的恶意DNS报文，发送到目标网络，检测tcpdump/Ethereal在处理该报文时是否因无限循环而导致CPU耗尽拒绝服务"
id = "POC-AVE-2000-0277"
name = "CVE-2000-0333 PoC"
severity = "medium"
tags = [
    "cve-2000-0333",
    "dos",
    "dns",
    "tcpdump",
]
vuln_id = [
    "CVE-2000-0333",
    "AVE-2000-0277",
]

[poc]
logic = "any"

[[poc.requests]]
path = "{{Hostname}}"
protocol = "dns"

[[poc.requests.matchers]]
expect = false
part = "body"
type = "word"
words = ["timeout"]
