[basic]
description = "Microsoft Windows NT 4.0 系统的 Netbt.sys 驱动（负责 NetBIOS over TCP/IP 名称解析）存在拒绝服务漏洞。当系统作为客户端向远程 DNS 服务器发起主机名查询时，若攻击者能够控制或伪造该 DNS 服务器（例如通过中间人攻击或劫持 DNS 响应），使其返回一个 IP 地址为 0.0.0.0 的异常解析结果，Netbt.sys 在处理该非法地址时会触发缺陷，导致系统崩溃并停止响应。该漏洞仅影响 Windows NT 4.0 操作系统，攻击条件为攻击者能够向目标主机返回恶意构造的 DNS 解析响应，利用方式是通过操纵 DNS 服务器返回 0.0.0.0 地址以引发远程拒绝服务。"
published = "1999-12-31T05:00:00.000"
remediation = "建议立即升级至 Windows NT 4.0 Service Pack 6a 或更高版本（如 Windows 2000/XP/Server 2003），并应用微软安全公告 MS99-037 发布的补丁（Q269874）。若无法立即升级，请在防火墙层面限制仅允许受信任的 DNS 服务器（如企业内部 DNS），禁止外部 DNS 解析请求，并在主机防火墙层面禁止 NetBIOS over TCP/IP（NetBT）协议端口（UDP/TCP 137、138、139、445）对外暴露，作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "微软 Windows NT 4.0 Netbt.sys 拒绝服务漏洞"
updated = "2026-06-16T21:49:58.753"

