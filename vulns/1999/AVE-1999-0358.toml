[basic]
description = "Red Hat Linux 4.2/5.2/6.0 系统中的 telnet 远程服务存在环境变量处理漏洞。该漏洞源于 in.telnetd 程序在处理客户机发送的 TERM 环境变量时未能对其进行充分验证，导致当目标系统接收到特定格式的 TERM 环境变量时，远程攻击者可利用该漏洞触发服务崩溃进程，使得 telnet 服务无法正常响应。从属于 TCP 的网络服务，运行在各种 LINUX/UNIX 操作系统中。攻击者可通过向 telnet 服务发送特定格式的环境变量数据包，触发该漏洞，造成目标服务器上的 telnet 远程服务完全宕机，导致用户无法远程登录系统。该漏洞为远程拒绝服务型漏洞，攻击者无需任何权限即可远程触发，仅需在攻击过程中发送一个特定的 TERM 环境变量即可。该漏洞对远程 telnet 服务访问的网络服务构成严重威胁，影响整个网络服务的可用性。 telent 远程服务在 Red Hat Linux 4.2/5.2/6.0 版本中普遍存在，而 Red Hat Linux 的广泛应用使得大量网络服务器面临风险。该漏洞的 CVSS 评分为 6.4，威胁等级为中危。相关安全厂商已发布安全公告，建议用户升级到更高版本以获取修复补丁。"
published = "1999-08-19T04:00:00.000"
remediation = "建议立即禁用 telnet 服务（chkconfig telnet off 并重启 xinetd），迁移至 SSH 替代远程管理。受影响的 Red Hat Linux 4.2/5.2/6.0 均已停止维护，建议升级至受支持的 RHEL 8/9 或其他现代发行版。若短期内无法升级，可通过 iptables 限制 23 端口的访问源 IP，仅允许可信网段连接，降低被攻击风险。"
score = 6.4
severity = "MEDIUM"
sources = ["epss"]
title = "Red Hat Linux in.telnetd TERM 环境变量畸形数据拒绝服务漏洞"
updated = "2026-06-16T21:48:57.517"

