[basic]
description = "Novell NetWare 5.1 远程 Web 管理工具存在缓冲区溢出漏洞，远程攻击者可通过向目标系统发送特制的超长 URL 请求触发该漏洞，导致服务拒绝或任意命令执行。该漏洞影响 Novell NetWare 5.1 版本，CVSS 评分 7.5，危害等级高。攻击者无需身份认证即可利用，建议升级至最新版本或禁用远程 Web 管理功能。"
published = "2000-04-19T04:00:00.000"
remediation = "升级到 Novell NetWare 5.1 Support Pack 1 (SP1) 或更高版本，该补丁已修复远程 Web 管理组件中的缓冲区溢出漏洞。如无法升级，可在服务器上停止 webadmin.nlm 和 webhttp.nlm 服务，或在网络边界防火墙阻断对 8008/TCP 和 8009/TCP 端口的访问作为临时缓解措施。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "Novell NetWare 5.1 远程管理缓冲区溢出漏洞"
updated = "2026-06-16T21:51:20.243"

