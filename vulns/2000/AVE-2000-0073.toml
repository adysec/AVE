[basic]
description = "Microsoft Office 系列产品（Word、PowerPoint 等）中的日文、韩文和中文 Word 5 文档格式转换工具存在缓冲区溢出漏洞。当用户使用受影响的 Office 版本打开特制的畸形文档数据时，转换程序在处理畸形转换数据时触发缓冲区溢出，攻击者可利用该漏洞执行任意代码。攻击者需诱导用户打开恶意文档方可利用，影响范围包括 Office 2000 及早期版本。微软已发布安全公告和补丁修复此漏洞。"
published = "2000-01-20T05:00:00.000"
remediation = "建议受影响的日文、韩文、简体/繁体中文版 Microsoft Office 97/2000（Word 97/98/2000、PowerPoint 97/2000）及 Office Converter Pack 2000 用户立即安装 MS00-002 公告提供的专用补丁，分别从对应区域的 Office Update 网站下载 Word 5 转换器更新包。若无法立即打补丁，应避免打开来路不明的东亚语言 Word 5 文档，并在注册表中禁用 Word 5 文档格式转换器作为临时缓解措施。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "Microsoft Office Word 5 文档格式转换器缓冲区溢出漏洞"
updated = "2026-06-16T21:50:58.527"

