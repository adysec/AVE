[basic]
description = "Lotus Notes Domino 的 Web 服务器 CGI 目录存在权限绕过漏洞，由于服务器未正确禁用对 cgi-bin 目录的匿名访问，远程攻击者无需身份认证即可通过 HTTP 请求直接访问该目录下的 CGI 脚本，可能导致敏感信息泄露或未授权操作。该漏洞影响 Lotus Domino 多个版本，CVSS 评分 5.0，危害等级中危。建议升级至修复版本或对 cgi-bin 目录配置适当的访问控制策略。"
published = "1999-12-21T05:00:00.000"
remediation = '升级至 Lotus Domino 5.0.1 及以上版本，该版本已修复 cgi-bin 目录匿名访问控制缺陷。同时，在 Domino 服务器配置文档中，将 cgi-bin 的 ACL 权限设置为仅允许已验证用户访问，并删除 "Anonymous" 条目。若无法升级，可在服务器文档的 "HTTP 协议" 选项卡中，将 "允许匿名访问" 设为 "否"，并限制 IP 白名单范围作为临时缓解措施。'
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Lotus Domino HTTP 服务器 cgi-bin 目录未限制匿名访问漏洞"
updated = "2026-06-16T21:50:50.480"

