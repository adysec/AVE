[basic]
description = "Solaris 系统中的 NIS+ 缓存管理器（nis_cachemgr）存在安全漏洞，远程未经认证的攻击者可以利用该漏洞向受信任的 NIS+ 服务器列表中添加恶意 NIS+ 服务器。成功利用后，攻击者可以提供伪造的 NIS+ 数据，导致系统配置被篡改、认证绕过或权限提升。该漏洞影响 Solaris 2.3、2.4、2.5、2.5.1 等多个版本。"
published = "1997-10-01"
remediation = "建议升级到 Solaris 7 及以上版本，或安装 Sun 安全公告 #155 提供的补丁。同时限制对 NIS+ 服务的网络访问，在防火墙层面过滤不可信来源的请求，禁用不必要的 NIS+ 服务。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "Sun Solaris NIS+ 缓存管理器允许添加恶意 NIS+ 服务器"
updated = "2024-11-20"

