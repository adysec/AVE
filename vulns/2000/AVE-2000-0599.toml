[basic]
description = "Net Tools PKI 服务器在 XUDA 模板文件未包含其他文件的绝对路径名时，未能正确限制远程攻击者的访问权限，导致访问控制失效。远程未经认证的攻击者可利用路径遍历缺陷访问服务器上本应受限的文件，造成部分完整性破坏（CVSS 5.0，AV:N/AC:L/Au:N/C:N/I:P/A:N）。该漏洞影响 Net Tools PKI 服务器相关版本，攻击者无需认证即可通过网络远程利用，通过构造恶意路径请求读取或篡改服务器敏感文件，导致数据完整性部分受损。Net Tools 已发布补丁修复该路径遍历访问控制缺陷，建议用户尽快升级至修复版本并配置严格的文件访问控制策略。"
published = "2000-06-19T04:00:00.000"
remediation = "建议立即升级 Net Tools PKI Server 到最新修补版本（建议升级至 2.0 版本或更高版本，官方已发布修补补丁）。若无法立即升级，必须在所有 XUDA 模板文件中使用绝对路径名引用其他文件，并配置 PKI 服务器访问控制列表（ACL）限制仅允许受信任 IP 访问。临时缓解措施：在防火墙层面限制 PKI 服务器端口（默认 80/443）仅允许信任 IP 访问，并禁用匿名访问权限。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Net Tools PKI Server 访问控制漏洞"
updated = "2026-06-16T21:51:55.743"

