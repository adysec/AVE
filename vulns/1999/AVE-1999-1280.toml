[basic]
description = "Matt Wright 的 textcounter.pl 1.2 版本存在任意命令执行漏洞，由于 CGI 脚本未对用户输入进行充分过滤，远程攻击者可通过构造包含 Shell 元字符的恶意参数（如分号、反引号、管道符等）注入任意系统命令，导致在 Web 服务器权限下执行任意代码。该漏洞影响所有部署该版本计数器脚本的 Web 站点，CVSS 评分 10.0（严重），攻击者无需身份认证即可远程利用，仅需向目标 URL 发送精心构造的 HTTP 请求即可触发漏洞，获取服务器控制权。"
published = "1998-06-24"
remediation = "升级 textcounter.pl 至最新版本或应用官方补丁，对用户输入中的 shell 元字符（如分号、反引号、管道符、美元符号）进行严格过滤或转义后再传递给系统命令。如无可用补丁，建议立即移除该脚本，改用支持输入验证的替代方案（如 CGI::Minimal），并在 Web 服务器层面限制对该脚本的访问权限。"
score = 10.0
severity = "CRITICAL"
sources = [
    "cve",
    "avd",
]
title = "Matt Wright textcounter.pl 任意命令执行漏洞"
updated = "2026-06-16"

