[basic]
description = "Rsync 在处理 `--inc-recursive` 增量递归选项时存在路径遍历漏洞。该选项在客户端默认启用，且服务端可在未获客户端明确授权的情况下强制启用。由于对符号链接（symlink）的验证不充分，结合基于文件列表的去重检查机制，恶意 rsync 服务端可将文件写入客户端预期目标目录之外的任意位置，实现路径遍历攻击。攻击者可通过构造特制文件列表，将恶意文件写入受害者系统中以合法目录命名的任意路径，严重威胁系统完整性与数据安全。该漏洞影响 Rsync 全版本用户，CWE-22 分类，CVSS 评分 6.5，危害等级中等。"
published = "2025-01-14T18:15:25.467"
remediation = "升级 rsync 至 3.4.0 及以上版本（上游于 2025 年 1 月 14 日发布修复）；RHEL/CentOS 用户安装 RHSA-2025:2600 等对应安全更新；Debian 用户参照 DLA-2025-01 公告更新。临时缓解措施：在客户端使用 `--no-inc-recursive` 禁用增量递归模式，并避免使用 `-l`/`-a` 参数连接不可信的 rsync 服务端。"
score = 6.5
severity = "MEDIUM"
sources = ["msrc"]
title = "Rsync rsync 路径遍历漏洞"
updated = "2026-06-30T00:16:48.573"

