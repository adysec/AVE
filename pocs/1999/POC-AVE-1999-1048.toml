[info]
author = "AVE"
description = "检测 gzexe 脚本是否存在且使用不安全的临时文件创建方式，该漏洞允许本地用户通过符号链接攻击覆盖其他用户文件"
id = "POC-AVE-1999-1048"
name = "CVE-1999-1332 PoC"
severity = "medium"
tags = ["cve-1999-1332"]
vuln_id = [
    "CVE-1999-1332",
    "AVE-1999-1048",
]

[poc]
logic = "all"

[[poc.requests]]
path = "/usr/bin/gzexe"
protocol = "file"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["#!/bin/sh"]
