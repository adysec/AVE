[basic]
description = "Microsoft Windows 95/98/NT 4.0/2000 及终端服务器系统在处理 IP 分片重组时存在资源管理错误漏洞。远程攻击者无需身份认证，只需向目标系统发送大量相同的特制 IP 分片数据包（即 Jolt2 攻击），即可触发该漏洞，导致目标系统 CPU 资源被耗尽，从而引发拒绝服务。该漏洞影响范围广泛，攻击条件简单，危害等级较高。"
published = "2000-05-19T04:00:00.000"
remediation = "安装 Microsoft 安全公告 MS00-029 对应补丁，或升级至 Windows XP 及以上版本。对于无法升级的旧系统，可在防火墙或路由器上配置过滤分片 IP 数据包（特别是相同偏移量的分片）作为临时缓解措施。"
score = 7.8
severity = "HIGH"
sources = ["avd"]
title = "Microsoft Windows IP 分片重组拒绝服务漏洞"
updated = "2026-06-16T21:51:26.387"

