[basic]
description = "Citrix Nfuse 1.51 存在 Web 根目录路径泄露漏洞，攻击者可向 launch.asp 发送缺少 session 字段的畸形请求，导致服务器在错误响应中泄露 Web 根目录的绝对路径。该漏洞影响 Citrix Nfuse 1.51 版本，CVSS 评分 5.0（AV:N/AC:L/Au:N/C:P/I:N/A:N），属于中危信息泄露漏洞。攻击者无需身份认证即可远程发起攻击，通过构造畸形 HTTP 请求获取服务器 Web 根目录绝对路径，进而辅助后续攻击如路径遍历、文件包含等漏洞利用。Citrix 已发布补丁修复该漏洞，建议升级至修复版本。"
published = "2001-10-18T04:00:00.000"
remediation = "建议升级到 Citrix Nfuse 1.52 或更高版本（如 Citrix Presentation Server 4.0 及以上），该版本已修复 launch.asp 会话字段缺失导致的 Web 路径泄露漏洞。若暂时无法升级，可在 Web 服务器（IIS）层面配置 URL 扫描规则拦截缺少 session 参数的 launch.asp 请求，或在 ISAPI 过滤器中拦截不带 session 字段的请求，同时在 IIS 中禁用详细错误信息返回以防止路径泄露。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Citrix Nfuse 1.51 Web根目录泄露漏洞"
updated = "2026-06-16T21:54:54.400"

