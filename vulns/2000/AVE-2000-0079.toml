[basic]
description = "HP-UX 10.30 和 11.00 版本中的路径最大传输单元（PMTU）发现过程存在缺陷，当系统接收到特制的小尺寸数据包时会产生大量响应流量，从而被远程攻击者利用作为数据包放大器，造成拒绝服务（DoS）放大攻击。攻击者无需认证即可通过网络远程触发此漏洞，主要影响系统的可用性，导致网络带宽被耗尽或服务中断。"
published = "2000-01-24"
remediation = "HP 已发布针对该漏洞的补丁：HP-UX 10.30 安装补丁 PHNE_20880，HP-UX 11.00 安装补丁 PHNE_20892。如无法立即打补丁，可临时关闭 PMTU 发现功能，执行 ndd -set /dev/ip ip_path_mtu_discovery 0 或在 ndd 中将 ip_ire_pathmtu 设为 0，并限制外部 ICMP 不可达报文入口作为缓解措施。"
score = 5.0
severity = "MEDIUM"
sources = ["cve"]
title = "HP-UX 路径最大传输单元发现拒绝服务漏洞"
updated = "2026-07-18"

