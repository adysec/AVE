[basic]
description = "SGI IRIX 5.x 至 6.3 版本的 Indigo Magic System Tour (systour) 包中存在本地权限提升漏洞。RemoveSystemTour 程序在执行时会通过 inst 命令调用 .exitops 程序，本地攻击者可在用户目录下创建特制的 .exitops 木马程序，当 inst 命令执行时以 root 权限运行，从而获取系统 root 权限。攻击者需具备本地账户访问权限即可利用此漏洞，影响 SGI IRIX 5.3 和 6.2 等版本。"
published = "1996-10-30T05:00:00.000"
remediation = "删除 systour 包或对 RemoveSystemTour 二进制文件执行 chmod -s 去除 setuid 权限。安装 SGI 官方安全公告 19961101-01-I 对应的补丁程序，将 IRIX 系统升级至已修复此漏洞的版本。同时检查系统中是否存在非授权的 .exitops 文件，确保环境变量和 inst 配置文件未被恶意篡改。"
score = 7.2
severity = "HIGH"
sources = [
    "cve",
    "exploitdb",
]
title = "SGI IRIX Indigo Magic System Tour 本地权限提升漏洞"
updated = "2026-06-16T21:50:19.480"

