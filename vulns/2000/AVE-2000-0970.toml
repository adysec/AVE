[basic]
description = "CVE-2000-0849是Microsoft Windows Media Services 4.0/4.1中存在的一个竞态条件漏洞，攻击者无需认证即可通过向目标系统的Windows Media Unicast Service发送特定格式的恶意请求触发 race 条件导致服务崩溃。该漏洞影响Windows Media服务器的正常运行，使服务无法正常处理有效的媒体流请求，造成媒体服务拒绝服务。攻击者可以通过精心构造的畸形网络请求诱发系统在处理媒体服务过程中出现资源竞争或状态异常，最终导致服务不可用。尽管漏洞的CVSS评分较低（2.6）和攻击难度较高，但该漏洞仍可能被恶意攻击者利用，导致企业媒体服务中断，影响用户体验和业务 continuity。该漏洞已被Microsoft修复，补丁信息可在官方安全更新中获取。"
published = "2000-11-14T05:00:00.000"
remediation = "建议立即安装微软发布的安全补丁 MS00-086（针对 Windows Media Services 4.0/4.1），或升级至 Windows Media Services 9.0 及以上版本。如无法立即打补丁，可在防火墙层面封禁 TCP 1755 端口（Windows Media Unicast Service 默认端口），或禁用 Windows Media Unicast Service 服务作为临时缓解措施。"
score = 2.6
severity = "LOW"
sources = ["cve"]
title = "微软 Windows Media Services 4.0/4.1 拒绝服务漏洞"
updated = "2026-06-16T21:52:35.773"

