[info]
author = "AVE"
description = "检测 Microsys CyberPatrol 注册信息泄露漏洞。CyberPatrol 4.0 客户端向 cybercentral.microsys.com 以 HTTP POST 提交注册信息时，信用卡号仅用简单替换密码编码，其余字段（邮箱、姓名、地址、电话等）均为明文传输，攻击者可嗅探网络流量获取敏感信息。"
id = "POC-AVE-2000-0828"
name = "CVE-2000-1173 PoC"
severity = "medium"
tags = ["cve-2000-1173"]
vuln_id = [
    "CVE-2000-1173",
    "AVE-2000-0828",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/register.cgi"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "CyberPatrol",
    "registration",
]
