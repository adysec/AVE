[basic]
description = "Vixie Cron 是 Linux 系统中广泛使用的任务调度程序，其 MAILTO 环境变量在处理 cron 任务输出时存在参数注入漏洞。本地攻击者可通过在 crontab 中设置特制的 MAILTO 变量值，向 sendmail 命令注入额外参数，从而以 root 权限执行任意命令或操纵邮件发送行为。该漏洞影响 Caldera OpenLinux 2.2、Debian 2.1/2.2、RedHat 6.0 等发行版，CVSS 评分 7.2，危害等级高。攻击者需拥有本地系统访问权限以创建或修改 crontab 条目，利用条件相对有限但危害严重。"
published = "1999-08-25T04:00:00.000"
remediation = "升级 Vixie Cron 至 3.0pl1-55 或更高版本，该版本修复了 MAILTO 环境变量注入问题。对于 Debian 系统，安装 cron 包更新至 3.0pl1-57+；对于 RedHat 系统，应用 RHSA-1999:026 提供的补丁。如无法升级，可在 crontab 中避免使用 MAILTO 变量，或限制 crontab 文件仅允许 root 用户修改。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "Linux Vixie Cron MAILTO 环境变量本地命令注入漏洞"
updated = "2026-06-16T21:49:01.193"

