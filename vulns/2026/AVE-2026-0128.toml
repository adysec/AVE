[basic]
description = "Microsoft SharePoint 存在远程代码执行漏洞（CNVD-2026-26519），攻击者可利用该漏洞向目标 SharePoint 服务器发送特制请求触发代码执行，从而控制受影响系统。该漏洞影响 Microsoft SharePoint Server 多个版本，攻击者无需身份认证即可远程利用，危害严重。建议用户及时关注厂商安全更新以获取修复补丁。"
published = "20260713"
remediation = "建议立即安装 Microsoft 2026 年对应月份 SharePoint 安全更新（关注 MSRC 安全公告），通过 Windows Update 或 Microsoft Catalog 下载补丁。临时缓解措施包括：在 SharePoint 服务器前端 WAF 上限制透传特殊 HTTP 请求头，关闭不必要的 SharePoint 自定义表单功能，降低攻击面。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "Microsoft SharePoint 远程代码执行漏洞"
updated = "20260713"

