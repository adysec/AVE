[basic]
description = "一些防火墙或包过滤系统存在策略绕过漏洞，当接收到设置了 IP 保留位的分段 SYN 数据包时，未能正确重组和检查这些特殊构造的报文，导致过滤规则被绕过。远程攻击者可利用此技术向受保护网络发送恶意数据包，从而规避防火墙的访问控制策略。该漏洞影响早期的多种防火墙产品及包过滤实现，CVSS 评分 7.5，危害等级高。受影响的厂商已通过规则更新或补丁修复此问题。"
published = "1999-01-01T05:00:00.000"
remediation = "升级防火墙固件至最新版本，启用分片数据包重组与深度检测功能，配置安全策略对所有分段 SYN 数据包进行完整重组后再执行访问控制规则，同时禁用或丢弃携带 IP 保留位的异常分片数据包。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "防火墙 IP 保留位分段 SYN 数据包策略绕过漏洞"
updated = "2026-06-16T21:47:58.897"

