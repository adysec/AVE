[basic]
description = "WordPress 插件 WP AmASIN - The Amazon Affiliate Shop 0.9.6 及更早版本中的 reviews.php 文件存在绝对路径遍历漏洞，远程未经身份认证的攻击者可通过向 url 参数传递完整的系统路径，绕过目录限制读取服务器上的任意文件（如配置文件、数据库凭证等敏感信息），导致敏感信息泄露。该漏洞无需登录即可利用，攻击复杂度低，影响运行该插件的所有 WordPress 站点。"
published = "2014-10-21T15:55:06.313"
remediation = "立即在 WordPress 后台停用并删除 WP AmASIN - The Amazon Affiliate Shop 插件（版本 0.9.6 及更早版本均受影响）。该插件已长期未更新，建议替换为仍在维护的 Amazon 联盟插件（如 Amazon Associate Link Builder）。如暂时无法替换，在 WordPress 根目录 .htaccess 中添加 `RewriteRule ^wp-content/plugins/wp-amasin/reviews.php - [F,L]` 阻止对 reviews.php 的访问作为临时缓解。"
score = 5
severity = "MEDIUM"
sources = ["nuclei"]
title = "WordPress WP AmASIN - The Amazon Affiliate Shop插件目录遍历漏洞"
updated = "2026-06-17T00:10:16.200"

