"Solaris snoop 工具在处理 rpc.rquotad 服务的 GETQUOTA 请求时存在缓冲区溢出漏洞。远程攻击者无需身份认证即可通过发送特制的 GETQUOTA 请求触发缓冲区溢出，从而在目标系统上以 root 权限执行任意代码。该漏洞影响 Solaris 2.4/2.5/2.5.1/2.6/7.0 等多个版本。"
