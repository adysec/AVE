[basic]
description = "Zyxel WRE6505 v2 固件 V1.00(ABDV.3)C0 的 CGI 程序存在命令注入漏洞（CWE-78），LAN 中相邻攻击者可通过向设备 Web 管理界面发送特制的 HTTP 请求，在目标设备上以 root 权限执行任意操作系统命令。该设备已停产（EOL），Zyxel 不再提供安全更新，建议用户更换设备；临时缓解措施包括在网络层限制管理界面的访问来源 IP，避免将管理端口暴露至公网。"
published = "2026-05-12T04:16:29.360"
remediation = "Zyxel WRE6505 v2 已停产（EOL），厂商不再发布安全补丁，建议立即更换为仍在支持周期内的 Zyxel 设备型号。在更换前，作为临时缓解措施：在路由器/防火墙上配置 ACL，仅允许受信任的 IP 地址访问设备管理界面（默认 80/443 端口），禁止将管理端口暴露至公网；同时将设备置于独立 VLAN 中，限制与核心网络的通信。若无需远程管理，可关闭设备的 Web 管理功能。"
score = 8.8
severity = "HIGH"
sources = ["hwpoc"]
title = "Zyxel WRE6505 Web 界面命令注入漏洞"
updated = "2026-06-17T11:02:05.663"

