[info]
author = "ave"
description = "检测目标是否运行 Mobius DocumentDirect for the Internet 1.2 的 ddicgi.exe CGI 组件。该组件存在缓冲区溢出漏洞，远程攻击者可通过超长 User-Agent 头触发溢出执行任意命令。发送 GET 请求至 ddicgi.exe 路径，根据响应状态码判断目标是否存在该组件。"
id = "POC-AVE-2000-0607"
name = "Mobius DocumentDirect for the Internet 1.2 ddicgi.exe 远程缓冲区溢出 PoC"
severity = "critical"
tags = ["ave-2000-0607"]
vuln_id = [
    "CVE-2000-0828",
    "AVE-2000-0607",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/scripts/ddicgi.exe"
protocol = "http"

[poc.requests.body]
content = ""
type = "raw"

[[poc.requests.matchers]]
expect = true
status = [200]
type = "status"
