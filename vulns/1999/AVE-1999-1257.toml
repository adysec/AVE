[basic]
description = "SGI IRIX 5.2 及更早版本的帮助系统组件 sgihelp 中存在权限验证缺陷，本地攻击者可通过 clogin 命令利用该漏洞提升至 root 权限。该漏洞影响 SGI IRIX 5.1/5.2 版本，CVSS 评分 7.2，危害等级高。攻击者需要拥有本地访问权限方可利用，成功利用后可完全控制受影响的系统。Exploit-DB 已公开该漏洞的利用代码。"
published = "1994-08-11T04:00:00.000"
remediation = "SGI IRIX 已停止维护，建议立即迁移至受支持的操作系统（如 Linux）。如无法迁移，可限制本地用户对 sgihelp 和 clogin 命令的执行权限，移除 setuid 位：chmod u-s /usr/sbin/sgihelp，并移除不必要的本地用户账户以降低攻击面。"
score = 7.2
severity = "HIGH"
sources = ["epss"]
title = "SGI IRIX sgihelp 本地权限提升漏洞"
updated = "2026-06-16T21:49:58.367"

