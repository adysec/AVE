[basic]
description = "金和OA（Jinhe OA）的 TaskReportConfirm.aspx 页面存在 SQL 注入漏洞，攻击者通过 POST 请求向该页面提交特制的 id 参数，可利用时间盲注技术（如 WAITFOR DELAY）延迟数据库响应以窃取数据。该漏洞影响金和OA系统，攻击者无需身份认证即可远程利用，可能导致敏感数据泄露或数据库被篡改，危害较大。"
published = "0711"
remediation = "联系金和网络官方获取 TaskReportConfirm.aspx 模块的安全补丁，或升级至最新修复版本（C6 安全更新包）。临时缓解措施：在 WAF 或反向代理层面添加规则，拦截对 /c6/Jhsoft.Web.dailytaskmanage/TaskReportConfirm.aspx 的 POST 请求中 hidReportID 和 id 参数包含 SQL 特殊字符（如 '、WAITFOR、DELAY、 UNION 等关键词）的恶意流量，并对 .NET 应用启用参数化查询以阻断注入路径。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "金和OA TaskReportConfirm.aspx SQL注入漏洞"
updated = "0711"

