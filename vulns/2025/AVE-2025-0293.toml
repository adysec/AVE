[basic]
description = "管伊佳ERP系统存在任意文件上传漏洞，攻击者可通过构造特制HTTP请求绕过服务端校验，直接上传恶意WebShell至服务器可写目录，从而获得服务器控制权限，实现远程代码执行。该漏洞影响管伊佳ERP多版本，攻击无需身份认证，利用难度低，危害严重。"
published = "2025-05-17"
remediation = "建议在服务器端对上传文件进行严格的白名单后缀校验（仅允许 jpg/png/pdf/doc 等业务必需类型），禁止上传 jsp/php/asp/exe/jar 等可执行脚本文件；同时将上传目录设置为不可执行权限（取消 +x），并对上传文件重命名为随机 UUID 文件名防止路径猜测。如无法立即修复，可在 WAF/反向代理层配置规则拦截包含恶意文件后缀的 POST 请求作为临时缓解。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "管伊佳ERP任意文件上传漏洞"
updated = "2025-07-21"

