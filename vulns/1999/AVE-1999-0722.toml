[basic]
description = "ColdFusion Server 4.0 的示例应用程序中存在信息泄露漏洞，远程攻击者无需身份认证即可通过直接访问 sourcewindow.cfm 文件查看服务器上的任意源代码文件。该漏洞利用方式简单，攻击者只需构造特制的 HTTP 请求即可获取 Web 应用源码，进而可能发现其他敏感信息或攻击入口。影响所有运行 ColdFusion Server 4.0 的服务器，CVSS 评分 5.0，危害等级中危。"
published = "2001-03-12T05:00:00.000"
remediation = "删除 ColdFusion Server 4.0 安装目录下的 `cfdocs/exampleapp/sourcewindow.cfm` 示例文件，或通过 Web 服务器（如 IIS/Apache）配置访问控制规则禁止外部访问 `/cfdocs/` 路径。建议升级至 Adobe ColdFusion 2023 或更高版本，旧版本已停止安全支持。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Allaire ColdFusion Server 4.0 源代码泄露漏洞"
updated = "2026-06-16T21:49:20.130"

