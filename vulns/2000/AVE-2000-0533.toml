[basic]
description = "CVS 1.10.8 客户端存在路径名信任漏洞。当用户连接至恶意 CVS 服务器时，服务器可向客户端发送特制路径名，欺骗客户端在本地任意位置创建文件，可能导致文件覆盖或代码执行。攻击者需诱使受害者连接至其控制的 CVS 服务器，攻击条件相对有限。该漏洞影响 CVS 1.10.8 及之前版本，CVSS 评分 2.1，危害等级低。"
published = "2000-10-20T04:00:00.000"
remediation = "立即将 CVS 客户端升级至 1.10.9 或更高版本，该版本已添加服务端路径名校验，防止任意文件创建。如无法升级，应仅连接可信 CVS 服务器，并确保 CVS 工作目录所在路径通过文件系统权限严格控制写入范围，禁止使用 pserver 方式连接不可信来源。"
score = 2.1
severity = "LOW"
sources = ["exploitdb"]
title = "CVS CVS Server 1.10.8 任意文件创建漏洞"
updated = "2026-06-16T21:52:15.130"

