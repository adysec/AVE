[basic]
description = "Datadog dd-trace-py（Python APM 客户端）在解析 W3C Baggage HTTP 头时存在资源分配不当漏洞。该库在提取（extract）路径上未对 Baggage 头的条目数量（默认上限 64）和总字节数（默认上限 8192）进行限制，而仅对注入（injection）路径施加了限制。远程未认证攻击者可向目标服务发送包含大量逗号分隔键值对或单个超大值的 Baggage 头，导致 tracer 为每个键值对分配哈希表条目，从而消耗无限制的 CPU 和内存资源，造成拒绝服务。该 Baggage 传播风格在多数受影响版本中默认启用，任何使用受影响 dd-trace-py 版本且暴露于互联网的 HTTP 服务均受影响。已在 dd-trace-py 4.8.2 版本中修复。"
published = "2026-07-17T21:17:07.070"
remediation = "立即将 dd-trace-py 升级至 4.8.2 或更高版本。如无法立即升级，从 DD_TRACE_PROPAGATION_STYLE 中移除 baggage 以禁用 baggage 提取；同时在上游代理或 Web 服务器（如 Nginx large_client_header_buffers、Apache LimitRequestFieldSize）限制 HTTP 请求头最大大小作为临时缓解措施。"
score = 7.5
severity = "HIGH"
sources = ["ghsa"]
title = "Datadog dd-trace-py W3C Baggage 头解析拒绝服务漏洞"
updated = "2026-07-20T20:16:44.510"

