[basic]
description = "CRYPTOCard CRYPTOAdmin for PalmOS 使用弱加密算法存储用户的 PIN 码，攻击者在获取 Palm 设备的 .PDB 数据文件后，可通过暴力破解或逆向分析手段还原 PIN 码，进而生成有效的 PT-1 双因素认证令牌。该漏洞影响 CRYPTOCard CRYPTOAdmin 4.1 版本，利用前提是攻击者能够访问物理设备上的 .PDB 文件，属于本地信息泄露漏洞，CVSS 评分 2.1，危害等级低。"
published = "2000-04-10T04:00:00.000"
remediation = "该漏洞源于 CRYPTOCard CryptoAdmin 4.1 for PalmOS 使用弱加密算法存储用户 PIN，攻击者可读取 .PDB 文件后破解 PIN 生成有效 PT-1 令牌。由于该产品已停止维护，建议立即停止使用 CRYPTOCard CryptoAdmin 4.1，迁移至支持强加密（如 AES-256）的双因素认证解决方案；同时确保 PalmOS 设备上的 .PDB 文件通过文件系统权限限制访问，并对存储敏感数据的文件实施全盘加密。"
score = 2.1
severity = "LOW"
sources = ["avd"]
title = "CRYPTOCard CRYPTOAdmin for PalmOS 弱加密漏洞"
updated = "2026-06-16T21:51:22.627"

