[basic]
description = "gnapster 与 knapster Napster 客户端程序未正确限制仅允许访问 MP3 文件，存在目录遍历漏洞。远程攻击者可通过向目标客户端发送特制请求并指定任意文件的完整路径，从而读取客户端系统上的任意文件，包括敏感配置文件等。该漏洞影响 John Donoghue Knapster 0.9 及 1.3.8 版本，危害等级高，攻击者无需身份认证即可利用。"
published = "1999-05-01T04:00:00.000"
remediation = "该漏洞影响已停止维护的 Knapster 0.9/1.3.8 客户端，官方已无安全补丁可用。建议立即卸载 Knapster 并改用其他受支持的 Napster 兼容客户端；如无法卸载，在防火墙/路由器层面阻止该客户端对外 TCP 连接（默认端口 8888/6699），并限制本地文件系统权限，避免敏感目录被遍历读取。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "John Donoghue Gnapster/Knapster 客户端任意文件读取漏洞"
updated = "2026-06-16T21:51:39.690"

