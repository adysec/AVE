[basic]
description = "Trn 新闻阅读器存在本地符号链接漏洞，本地用户可通过创建符号链接指向其他用户文件，在特定条件下覆盖目标文件内容。该漏洞源于程序在处理临时文件时未对符号链接进行充分校验，攻击者需要拥有本地系统访问权限，利用难度较低但影响范围有限（仅影响同系统用户），CVSS 评分 2.1 危害等级低。"
published = "1999-08-20T04:00:00.000"
remediation = "升级 Trn 至修复了不安全临时文件创建的版本（trn 4.0-test77 之后版本），或在 Linux 内核中通过 fs.protected_symlinks=1 启用符号链接保护（sysctl -w fs.protected_symlinks=1）。如无法升级，建议将 /tmp 挂载为 noexec,nosuid 并使用 private /tmp 模式（systemd 默认启用），同时在 cron 中定期清理 /tmp 下的 Trn 临时文件。使用 tmpfiles.d 或 pam_namespace 对每位用户隔离临时目录可彻底阻断此类攻击。"
score = 2.1
severity = "LOW"
sources = ["avd"]
title = "Trn 本地用户符号链接覆盖其他用户文件漏洞"
updated = "2026-06-16T21:48:57.870"

