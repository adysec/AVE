[basic]
description = "rpc.statd 是 NFS 文件共享服务中的状态监控守护进程，nfs-utils 软件包中的 rpc.statd 存在格式字符串漏洞。远程攻击者可通过向目标系统发送特制的 RPC 请求，利用未正确过滤的格式字符串参数执行任意代码，从而获取 root 权限。该漏洞影响 Conectiva、Debian、RedHat、S.u.S.E、Trustix 等多个 Linux 发行版的早期版本，CVSS 评分 10.0，危害等级严重。厂商已发布安全补丁修复此漏洞。"
published = "2000-07-16T04:00:00.000"
remediation = '升级 nfs-utils 至 0.1.17 及以上版本，该版本修复了 rpc.statd 中未正确清理格式化字符串的问题。如无法立即升级，可在 /etc/hosts.deny 中添加 "rpc.statd: ALL" 并在 /etc/hosts.allow 中仅放行可信 IP，或禁用 NFS 服务 (service nfs stop && chkconfig nfs off) 作为临时缓解措施。'
score = 10
severity = "CRITICAL"
sources = ["redhat"]
title = "Linux nfs-utils rpc.statd 远程格式字符串漏洞"
updated = "2026-06-16T21:52:13.413"

