[basic]
description = "HP JetAdmin 6.0 Web 管理服务在处理发送至 8000 端口的畸形 URL 请求时存在输入验证缺陷，远程未认证攻击者可通过发送特制的畸形 HTTP 请求触发服务异常，导致打印管理服务拒绝服务。该漏洞影响 HP Web JetAdmin 6.0 版本，CVSS 评分 5.0（中等），攻击向量为网络、攻击复杂度低、无需认证、仅影响可用性。攻击者无需身份认证即可远程发送恶意构造的 URL 请求至 8000 端口，导致打印管理服务崩溃或无响应，影响打印服务可用性。HP 已发布补丁修复此漏洞，建议升级到修复版本。"
published = "2000-05-24T04:00:00.000"
remediation = "升级到 JetAdmin 6.1 或更高版本，应用官方安全补丁以修复服务拒绝漏洞。可通过 JetAdmin 管理控制台禁用不必要的端口（关闭 8000 端口）或配置防火墙规则限制访问源。临时代理措施：启用 JetAdmin 的服务自动重启功能，使用基于状态的监控来检测服务异常，确保应急响应团队及时采取行动。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "HP Web JetAdmin 6.0 拒绝服务漏洞"
updated = "2026-06-16T21:51:44.803"

