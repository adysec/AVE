[basic]
description = "FreeBSD 系统的 healthd 健康监控守护进程存在缓冲区溢出漏洞。本地攻击者可向 healthd 发送特制的输入数据触发缓冲区溢出，覆盖内存中的关键数据结构，从而获得 root 权限。该漏洞影响运行 healthd 的 FreeBSD 系统，攻击者需要拥有本地访问权限，CVSS 评分 7.2，危害等级高。建议升级至已修复版本或禁用 healthd 服务以缓解风险。"
published = "2000-04-10T04:00:00.000"
remediation = "升级 FreeBSD 至包含 healthd 漏洞修复版本（如 FreeBSD 3.4-RELEASE 之后的安全补丁版），或在 /etc/rc.conf 中将 moused_enable 设为 NO 以禁用 healthd 服务，限制本地用户执行权限以降低提权风险。"
score = 7.2
severity = "HIGH"
sources = ["cve"]
title = "FreeBSD healthd 缓冲区溢出漏洞"
updated = "2026-06-16T21:51:25.057"

