[basic]
description = "cURL 及 cURL-SSL 早期版本（curl 早于 6.0-1.1、curl-ssl 早于 6.0-1.2）存在远程缓冲区溢出漏洞。攻击者可通过构造特制请求强制触发超长错误消息生成，导致栈缓冲区溢出，进而实现远程任意代码执行。该漏洞影响广泛使用的 cURL 客户端及依赖其库的应用，攻击者无需身份认证即可远程发起攻击，CVSS 评分 10.0（CVSS:3.0/AV:N/AC:L/PR:N/UI:N/S:U/C:H/I:H/A:H），属严重级别。攻击者通过发送精心构造的恶意请求触发错误处理路径，利用缓冲区溢出覆盖返回地址或函数指针，实现任意代码执行并完全控制目标系统。cURL 官方已在 6.0-1.1 及 6.0-1.2 版本中修复该漏洞，建议升级至修复版本或更高版本。"
published = "2000-12-19T05:00:00.000"
remediation = "升级至 curl 7.4 或更高版本（含 curl-ssl 对应更新版本），该版本已修复长错误消息触发的缓冲区溢出问题。如无法立即升级，可在应用层限制 curl 处理的服务器响应长度，避免超长错误消息被传入缓冲区。"
score = 10
severity = "CRITICAL"
sources = ["redhat"]
title = "cURL curl 远程缓冲区溢出漏洞"
updated = "2026-06-16T21:52:53.267"

