[info]
author = "AVE"
description = "检测 Allmanage 2.6 的 allmanageup.pl CGI 文件上传脚本是否可被未授权直接访问。远程攻击者无需认证即可调用该脚本上传恶意文件、修改用户账户或网页内容。"
id = "POC-AVE-2000-0474"
name = "Allmanage allmanageup.pl 未授权访问检测 PoC"
severity = "high"
tags = ["ave-2000-0474"]
vuln_id = [
    "CVE-2000-0435",
    "AVE-2000-0474",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/cgi-bin/allmanageup.pl"
protocol = "http"

[[poc.requests.matchers]]
expect = true
status = [200]
type = "status"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/allmanageup.pl"
protocol = "http"

[[poc.requests.matchers]]
expect = true
status = [200]
type = "status"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/Allmanage/cgi-bin/allmanageup.pl"
protocol = "http"

[[poc.requests.matchers]]
expect = true
status = [200]
type = "status"
