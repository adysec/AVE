[basic]
description = 'Internet Explorer 5.0及更早版本默认启用"跨不同域的导航子框架"选项，导致攻击者可通过构造恶意网页嵌入跨域框架，实施框架欺骗攻击。攻击者可利用该漏洞在受害者浏览器中伪造合法网站的框架内容，窃取用户敏感信息或实施钓鱼攻击。该漏洞影响IE 5.0及更早版本，CVSS评分2.6，属低危漏洞，攻击者需诱导用户访问恶意页面方可触发。'
published = "1999-11-01T05:00:00.000"
remediation = '在IE浏览器注册表中禁用"Navigate sub-frames across different domains"功能（HKEY_CURRENT_USER\Software\Microsoft\Internet Explorer\Main\FeatureControl\FEATURE_WINDOW_RESTRICTIONS），防止iframe劫持攻击。'
score = 2.6
severity = "LOW"
sources = ["epss"]
title = "Microsoft Internet Explorer 跨域框架导航漏洞"
updated = "2026-06-16T21:49:08.450"

