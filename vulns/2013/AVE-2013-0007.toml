[basic]
description = "WordPress 的 Traffic Analyzer 插件 3.3.2 及更早版本中存在跨站脚本（XSS）漏洞，该漏洞位于 `js/ta_loaded.js.php` 文件中。远程攻击者可通过向 `aoid` 参数注入恶意 Web 脚本或 HTML 代码触发该漏洞，当管理员或其他用户访问被注入恶意代码的页面时，脚本将在受害者浏览器中执行，可能导致敏感信息泄露、会话劫持或钓鱼攻击。该漏洞 CVSS 评分 4.3，危害等级中危。"
published = "2013-05-10T21:55:02.460"
remediation = "该插件已长期未更新，建议立即停用并删除 Traffic Analyzer 插件。如必须保留使用，需在 js/ta_loaded.js.php 中对 aoid 参数进行严格的输入转义（如 htmlspecialchars），或在 Web 应用防火墙（WAF）层面添加过滤规则拦截恶意脚本注入。"
score = 4.3
severity = "MEDIUM"
sources = ["nuclei"]
title = "WordPress Traffic Analyzer 插件跨站脚本漏洞"
updated = "2026-06-16T23:55:20.563"

