[basic]
description = "syslog-ng 日志守护进程的 TLS 证书主机名验证功能存在通配符匹配过于宽松的安全漏洞。`tls_wildcard_match()` 函数错误地允许了 `foo.*.bar` 这类不合规的通配符证书模式，同时还能匹配 `foo.a*c.bar` 等部分通配符，这违反了 TLS 证书验证标准。攻击者可通过中间人攻击利用此缺陷，使用精心构造的恶意证书绕过主机名验证，导致 TLS 连接被劫持，破坏通信完整性。该漏洞影响 syslog-ng 4.8.2 之前的所有版本，CVSS 评分 7.5，危害等级高。官方已在 4.8.2 版本中修复此问题。"
published = "2025-05-07T16:15:21.980"
remediation = "立即升级 syslog-ng 至 4.8.2 或更高版本，该版本已修复 TLS 证书通配符匹配过于宽松的问题。如无法立即升级，可在 TLS 配置中禁用通配符证书匹配，或使用明确的非通配符证书替代。对于使用 syslog-ng 的 Linux 发行版，请关注各发行商的安全更新推送。"
score = 7.5
severity = "HIGH"
sources = ["msrc"]
title = "OneIdentity syslog-ng TLS证书通配符匹配绕过漏洞"
updated = "2026-06-17T07:57:24.830"

