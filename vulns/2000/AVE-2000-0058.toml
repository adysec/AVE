[basic]
description = "Microsoft IIS 4.0 存在信息泄露漏洞，远程攻击者可通过向目标服务器发送带有 .ida 或 .idq 扩展名的不存在文件请求，利用服务器返回的错误信息获取网站文档根目录的真实物理路径。该漏洞影响 IIS 4.0 版本，攻击者无需认证即可利用，获取的路径信息可为进一步攻击（如文件包含、目录遍历）提供基础。CVSS 评分 5.0，危害等级中危。"
published = "2000-01-11T05:00:00.000"
remediation = "立即升级至 IIS 5.0 或更高版本（Windows 2000 及以上系统），该漏洞在 IIS 5.0 中已修复。如无法升级，请在 IIS 管理器中删除 .ida 和 .idq 应用程序映射（网站属性 → 主目录 → 配置 → 应用程序映射），或卸载 Index Server 服务以消除 .ida/.idq 扩展的处理程序。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Microsoft IIS 4.0 信息泄露漏洞"
updated = "2026-06-16T21:50:56.437"

