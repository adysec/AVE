[basic]
description = 'WinRAR 在处理压缩包内文件路径时存在目录穿越漏洞，攻击者可构造包含特殊路径（如 "../"）的恶意压缩包文件并诱导用户打开，触发缓冲区溢出导致远程代码执行。该漏洞影响 WinRAR 多个版本，无需身份认证但需用户交互配合，CVSS 评分 7.8，危害等级高。用户应升级至最新版本或应用官方补丁修复。'
published = "2025-06-21T01:15:29.123"
remediation = "立即升级 WinRAR 至 7.12 或更高版本（建议升级至最新版 7.23），该漏洞已在 7.12 版本中修复。无法立即升级时，避免打开来源不明的压缩文件，并禁用 WinRAR 自动解压功能作为临时缓解措施。"
score = 7.8
severity = "HIGH"
sources = ["hwpoc"]
title = "RARLAB WinRAR 目录穿越远程代码执行漏洞"
updated = "2026-06-17T10:01:24.380"

