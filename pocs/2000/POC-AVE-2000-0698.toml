[info]
author = "AVE"
description = "检测PHP 3.0/4.0错误日志格式化字符串漏洞(CVE-2000-0967)。通过检查PHP版本头信息判断目标是否运行存在漏洞的PHP版本(低于3.0.17或4.0.3)。"
id = "POC-AVE-2000-0698"
name = "PHP 3.0/4.0 Error Logging Format String PoC"
severity = "critical"
tags = ["cve-2000-0967"]
vuln_id = [
    "CVE-2000-0967",
    "AVE-2000-0698",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "header"
type = "word"
words = [
    "PHP/3.0",
    "PHP/4.0",
    "PHP/3.",
    "PHP/4.",
]
