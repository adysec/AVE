[basic]
description = "Windows NT 系统未使用具备访问控制列表（ACL）机制的 NTFS 文件系统，而是采用 FAT16/FAT32 等不支持文件级权限控制的文件系统格式，导致任意本地用户均可绕过权限检查直接读取、修改或删除系统中的敏感文件。由于缺乏文件系统级别的安全隔离机制，攻击者可利用此缺陷实现权限提升或敏感信息泄露，严重影响系统机密性与完整性。该漏洞 CVSS 评分 10.0，危害等级为严重。"
published = "1999-01-01T05:00:00.000"
remediation = "立即将 Windows NT 系统所在分区的文件系统由 FAT/FAT32 转换为 NTFS（通过 `convert c: /fs:ntfs` 命令完成，无损转换）。NTFS 提供文件级 ACL 权限控制，可防止未授权访问。Windows NT 产品已停止支持，强烈建议升级至 Windows Server 2016/2019/2022 或 Windows 10/11 等受支持版本以获取持续安全更新。"
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "Microsoft Windows NT 文件系统非 NTFS 安全漏洞"
updated = "2026-06-16T21:48:40.830"

