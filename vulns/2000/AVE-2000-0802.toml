[basic]
description = "Microsoft Windows Media Player 7.0 在处理自定义皮肤文件(.wms)时存在任意脚本执行漏洞。由于播放器未对皮肤文件中嵌入的脚本代码进行安全验证，远程攻击者可构造包含恶意脚本的特制 .wms 文件并托管在恶意网站上，诱使用户访问后触发该漏洞。成功利用后攻击者可在用户上下文中执行任意脚本，获取用户权限。Microsoft 已在安全公告 MS00-090 中发布补丁修复此问题。"
published = "2001-01-09"
remediation = "安装 Microsoft 安全公告 MS00-090 提供的 Windows Media Player 7 安全更新补丁（下载地址：https://www.microsoft.com/download/details.aspx?FamilyId=BAF62356-D717-4B8F-97E0-299A7697A083），或升级到 Windows Media Player 7.1 及以上版本。如无法升级，可在 IE 中禁用 Windows Media Player 的 ActiveX 控件，并配置组策略禁止运行 .wms 皮肤文件。"
score = 4.6
severity = "MEDIUM"
sources = [
    "exploitdb",
    "cve",
]
title = "Microsoft Windows Media Player 7.0 任意脚本执行漏洞"
updated = "2026-06-16"

