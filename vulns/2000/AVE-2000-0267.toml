[basic]
description = "Red Hat Piranha 虚拟服务器套件中的 passwd.php3 CGI 脚本存在命令注入漏洞，本地攻击者可通过在输入参数中注入 shell 元字符（如分号、管道符等）绕过输入过滤，导致任意命令执行。该漏洞影响 Red Hat Piranha 虚拟服务器套件，CVSS 评分 10.0，危害等级严重。攻击者需具有本地访问权限，利用难度较低，Metasploit 框架已集成对应利用模块。"
published = "2000-04-24T04:00:00.000"
remediation = "升级 Red Hat Piranha Virtual Server Package 至修复版本，或删除 passwd.php3 脚本。如无法升级，在 Apache 配置中限制该脚本仅允许本地访问（如 <Location /passwd.php3> Deny from all </Location>），并对用户输入做严格过滤，禁止 shell 元字符（; | & $ `）。"
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "Red Hat Piranha 虚拟服务器套件 passwd.php3 任意命令执行漏洞"
updated = "2026-06-16T21:51:28.470"

