[basic]
description = "Unix 系统上运行的 PGP 5.x 版本中 pgpk 命令在非交互式密钥对生成过程中使用了熵源不足的随机数据生成机制，导致生成的密钥对可被预测。攻击者可通过分析生成的公钥推断出对应的私钥，从而解密受 PGP 加密保护的通信内容或伪造数字签名。该漏洞影响使用 PGP 5.x 自动密钥生成功能的 Unix 系统，CVSS 评分 2.1，危害等级低。"
published = "2000-05-24T04:00:00.000"
remediation = "升级到 PGP 6.x 或更高版本，该版本修复了随机数生成问题。如无法升级，应避免使用 pgpk 的非交互模式生成密钥对，改用交互式密钥生成方式（如 pgp -kg）以确保熵源充足。临时缓解措施可使用 GnuPG 替代 PGP 5.x 进行密钥管理。"
score = 2.1
severity = "LOW"
sources = ["cve"]
title = "PGP 5.x 密钥生成随机数可预测漏洞"
updated = "2026-06-16T21:51:44.950"

