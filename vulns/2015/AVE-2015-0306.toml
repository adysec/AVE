[basic]
description = "Microsoft Office 多个版本存在内存破坏漏洞（CWE-787 越界写入），攻击者可通过诱导用户打开精心构造的恶意 Office 文档（如 PowerPoint 或 Word 文件），触发内存损坏从而在目标系统上远程执行任意代码或导致拒绝服务。该漏洞影响 Microsoft PowerPoint 2007 SP3、Word 2007 SP3、PowerPoint 2010 SP2、Word 2010 SP2、PowerPoint 2013 SP1、Word 2013 SP1 及 PowerPoint 2013 RT SP1 等多个版本。攻击向量为网络，攻击复杂度低，无需权限但需要用户交互（打开文档），成功利用可导致系统机密性、完整性和可用性均遭到高度破坏（CVSS 8.8 HIGH）。该漏洞已被 CISA 列入已知被利用漏洞目录，建议立即安装微软发布的安全更新（MS15-070）或升级至 Office 2016 及以上版本。"
published = "2015-07-14T21:59:35.987"
remediation = "立即安装 Microsoft Office 2007/2010/2013 的安全更新，包括 2015 年 7 月和 8 月的累积更新，或升级到 Office 2016 及以上版本。如需紧急修复，可在注册表中禁用 Office 的外部实体解析功能，并禁止从互联网下载未经签名的 OLE 对象作为临时缓解措施"
score = 8.8
severity = "HIGH"
sources = ["kev"]
title = "微软 Office 远程代码执行漏洞"
updated = "2026-06-17T00:24:04.850"

