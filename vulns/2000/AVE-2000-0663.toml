[basic]
description = "NetcPlus BrowseGate 2.80 存在缓冲区溢出漏洞，远程攻击者可通过向 HTTP 请求中发送超长的 Authorization 或 Referer MIME 头触发该漏洞，导致目标服务崩溃拒绝服务，甚至在特定条件下可能执行任意命令。该漏洞影响 BrowseGate 2.80 版本，危害等级中等，攻击者无需身份认证即可远程利用。"
published = "2000-12-19T05:00:00.000"
remediation = "升级 BrowseGate 至 v2.80.001 及以上版本，该补丁可从 NetCPlus 官方站点下载。若无法升级，可在代理服务器前端部署 IPS/IDS 设备，对 HTTP 请求头（尤其是 Authorization 和 Referer 字段）进行长度限制，阻止超长头部字段的畸型请求。"
score = 5
severity = "MEDIUM"
