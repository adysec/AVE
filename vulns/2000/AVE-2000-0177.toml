[basic]
description = "微软 Clip Art Gallery 5.0（Microsoft Office 组件之一）处理 CIL（剪贴画库）文件时存在缓冲区溢出漏洞。远程攻击者可构造特制 CIL 文件并诱使用户打开，触发缓冲区溢出，导致拒绝服务或在受影响系统上执行任意命令。该漏洞利用需用户交互，影响安装了 Clip Art Gallery 的 Microsoft Office 系统，Microsoft 已通过安全公告 MS00-015 发布补丁修复。"
published = "2000-03-06T05:00:00.000"
remediation = "立即安装 Microsoft 安全公告 MS00-015 提供的 Clip Art Gallery 补丁。访问 https://www.microsoft.com/download/details.aspx?FamilyID=ed83e9c7-a80c-44b5-8ff5-f75d6bfdbd9b 下载并安装。如无法安装补丁，可禁用 Clip Art Gallery 对 CIL 文件的自动处理，并在浏览器和邮件客户端中设置不自动下载外部剪贴画内容以降低风险。"
score = 5.1
severity = "MEDIUM"
sources = ["avd"]
title = "Microsoft Clip Art Gallery 5.0 缓冲区溢出漏洞"
updated = "2026-06-16T21:51:12.620"

