[basic]
description = "WU-FTPD 2.6.1及更早版本在启用调试模式时存在格式字符串漏洞。远程攻击者可通过向FTP服务器发送特制的PASV端口分配参数，该参数被记录时触发格式字符串漏洞，从而执行任意命令。攻击无需身份认证，可完全控制目标系统，CVSS评分10.0，危害等级严重。受影响的软件包括WU-FTPD 2.4.2、2.5及2.6系列版本。"
published = "2001-03-26T05:00:00.000"
remediation = "立即升级 wu-ftpd 至 2.6.2 或更高版本，该版本已修复调试模式下的格式字符串漏洞。如无法升级，在配置文件中将 `debug` 选项设为 `no` 或注释掉该行以禁用调试模式。建议迁移至 vsftpd 或 ProFTPD 等持续维护的 FTP 服务器软件。"
score = 10
severity = "CRITICAL"
sources = ["redhat"]
title = "WU-FTPD 调试模式格式字符串远程代码执行漏洞"
updated = "2026-06-16T21:53:50.493"

