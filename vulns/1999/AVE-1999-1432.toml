[basic]
description = "Netscape 4.5 中的 Java 实现存在授权绕过漏洞，Java Applet 未正确限制只能连接加载其来源的主机，而是允许连接到任意远程主机，违反了 Java 沙箱安全模型。远程攻击者可诱使用户访问恶意网页，触发该漏洞执行未授权操作，如扫描内部网络或发起网络请求。该漏洞 CVSS 评分 5.1，危害等级中危，影响 Netscape 4.5 及可能的相关版本。"
published = "1997-08-01T04:00:00.000"
remediation = "升级到 Netscape Navigator 4.51 或更高版本以修复 Java 小程序跨主机连接的授权缺陷；如无法立即升级，可在浏览器中禁用 Java 或在防火墙层面禁止浏览器进程向非源主机发起出站连接作为临时缓解措施。"
score = 5.1
severity = "MEDIUM"
