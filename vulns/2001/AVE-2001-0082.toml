[basic]
description = "Micro Focus Cobol 4.1 在启用 AppTrack 功能后，安装过程中会创建 mfaslmf 目录及 nolicense 文件，但未正确设置这些文件与目录的访问权限，导致本地普通用户可修改其中的关键文件。攻击者利用该配置缺陷可提升自身权限，实现本地权限提升攻击。该漏洞影响 Micro Focus Cobol 4.1 版本，需要攻击者具有本地系统访问权限，CVSS 评分 4.6，危害等级中危。"
published = "2001-06-02T04:00:00.000"
remediation = "限制 `mfaslmf` 目录权限为 750 或更低，并将 `nolicense` 文件权限设为 600，仅允许管理员访问。如非必要，禁用 AppTrack 功能。升级到 Micro Focus Cobol 4.1 以上版本以彻底修复此权限漏洞。"
score = 4.6
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Micro Focus Cobol 4.1 本地权限提升漏洞"
updated = "2026-06-16T21:53:53.100"

