[basic]
description = "War FTPd 1.6x 存在缓冲区溢出漏洞，远程攻击者可通过向 FTP 服务发送超长的 MKD（创建目录）或 CWD（切换目录）命令触发缓冲区溢出，导致服务进程崩溃，造成拒绝服务。该漏洞影响 WarFTPd 1.66/1.67 版本，攻击者无需认证即可利用，危害等级中等。"
published = "2000-02-01T05:00:00.000"
remediation = "升级 War FTPd 至 1.67-3 以上版本，官方已修复 MKD/CWD 命令缓冲区溢出问题。若无法升级，建议在防火墙或路由器层面限制对该 FTP 服务的访问，仅允许可信 IP 连接，并禁用匿名写入权限作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Jgaa WarFTPd 1.6x MKD/CWD 命令缓冲区溢出拒绝服务漏洞"
