[basic]
description = 'Tenda 多款路由器固件的 /bin/httpd 组件中存在硬编码认证后门漏洞。login() 函数在正常 MD5 密码验证失败后，会调用 GetValue("sys.rzadmin.password") 从设备配置中读取预设后门密码，并与用户输入进行明文 strcmp() 比对，匹配即授予 role=2 管理员权限。该过程不校验用户名，任意用户名配合后门密码即可完成未授权登录。攻击者可通过 Web 管理界面直接利用此后门获取设备完全控制权，影响范围广泛，CVSS 评分 9.8，危害等级严重。'
published = "2026-07-06T20:16:29.450"
remediation = "厂商暂未发布修复固件，建议立即在路由器管理界面中关闭远程Web管理功能，并将管理端口仅绑定到内网；如业务允许，将受影响设备隔离至独立VLAN并限制管理IP白名单；密切关注Tenda官方下载页面（tendacn.com/download）获取更新；长期建议更换为有安全维护支持的路由器设备。"
score = 9.8
severity = "CRITICAL"
sources = ["hwpoc"]
title = "Tenda 多款路由器固件硬编码认证后门漏洞"
updated = "2026-07-08T14:16:54.773"

