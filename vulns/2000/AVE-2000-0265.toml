[basic]
description = "Solaris 2.6 与 7.0 系统中的 lp 打印命令存在缓冲区溢出漏洞。由于程序在处理 -d 参数时未对用户输入的长度进行边界校验，本地用户可通过在命令行中传入超长的 -d 选项参数，使缓冲区溢出并覆盖相邻内存。攻击者在本地拥有普通用户权限即可利用该漏洞执行任意代码，进而提升权限至 root，完全控制受影响系统。该漏洞仅影响本地已登录用户，无法被远程利用。"
published = "2000-04-24T04:00:00.000"
remediation = "立即应用 Sun Microsystems 针对 Solaris 2.6/7.0 的官方安全补丁（Solaris 7 推荐升级至 106976-08 及更高版本簇，Solaris 2.6 应用对应修订版 lp 补丁），并通过 patchadd 安装后重启相关打印服务。临时缓解措施：用 chmod 去除 /usr/bin/lp 的 setuid root 位（chmod u-s /usr/bin/lp），限制仅授权用户访问打印命令，同时配合 RBAC 将打印操作权限授予受信账户，并审计本地用户执行带超长 -d 参数的 lp 命令的异常行为。"
score = 7.2
severity = "HIGH"
sources = ["exploitdb"]
title = "Sun Solaris lp 命令缓冲区溢出漏洞"
updated = "2026-06-16T21:51:27.727"

