[basic]
description = "Microsoft FrontPage Server Extensions 中的 Visual Studio RAD Support 子组件存在缓冲区溢出漏洞，远程攻击者可通过向 fp30reg.dll 发送超长注册请求（URL）触发缓冲区溢出，导致任意命令执行。该漏洞影响 Microsoft Visual Studio 及 FrontPage Server Extensions 相关版本，CVSS 评分 7.5，危害等级高。Microsoft 已在 MS03-051 安全公告中发布补丁修复此漏洞。"
published = "2001-07-21T04:00:00.000"
remediation = "安装 Microsoft 安全公告 MS03-051 提供的更新补丁，或升级至受支持的最新 Windows 版本及 IIS 版本。如无法安装补丁，可在 IIS 中移除 FPSE 扩展映射（删除 .dll 关联）或禁用 FrontPage Server Extensions 服务作为临时缓解措施。"
score = 7.5
severity = "HIGH"
sources = ["exploitdb"]
title = "Microsoft Visual Studio RAD Support 远程缓冲区溢出漏洞"
updated = "2026-06-16T21:54:07.960"

