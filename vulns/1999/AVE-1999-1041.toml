[basic]
description = "SAS System 5.18 for VAX/VMS 存在不安全的目录和启动文件权限配置漏洞。由于系统安装时未正确设置目录及启动文件的访问权限，本地攻击者可利用该漏洞修改或替换关键文件，从而获取更高权限。该漏洞影响 SAS System 5.18 版本，攻击者需具有本地系统访问权限，CVSS 评分 7.2，危害等级高。建议用户升级至修复版本或手动调整文件权限配置。"
published = "1999-12-31T05:00:00.000"
remediation = "立即修复 SAS System 5.18 安装目录及启动文件的权限配置，确保目录权限设置为 755（drwxr-xr-x），启动文件权限设置为 644（-rw-r--r--），仅允许管理员（SYSTEM/ROOT）拥有写入权限。同时移除不必要的世界可写（world-writable）权限位，并定期审计文件权限变更。如条件允许，升级到 SAS System 6.0 及以上版本以彻底解决权限问题。"
score = 7.2
severity = "HIGH"
sources = ["cve"]
title = "SAS System 5.18 for VAX/VMS 本地权限提升漏洞"
updated = "2026-06-16T21:50:11.993"

