[basic]
description = 'CVE-1999-0634 已被拒绝使用。该编号原用于描述"SSH 服务正在运行"这一配置状态，但经评估该条目并非直接引入安全漏洞的缺陷，而属于安全配置管理范畴。此类配置项更适合纳入通用配置枚举（CCE）体系进行管理，因此 CVE 编号委员会决定拒绝此编号。该问题不涉及具体的攻击方法、漏洞原理或影响范围。'
published = "1999-01-01T05:00:00.000"
remediation = "评估 SSH 服务是否必需，非必需则关闭 sshd 服务（systemctl disable sshd）；如需保留，配置密钥认证登录、禁用 root 直接登录（PermitRootLogin no）、修改默认端口 22 为高编号端口、限制来源 IP（hosts.allow/iptables），并保持 OpenSSH 为最新稳定版本。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "SSH 服务运行配置暴露"
updated = "2023-11-07T01:54:59.870"

