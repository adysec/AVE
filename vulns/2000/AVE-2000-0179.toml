[basic]
description = "Trend Micro OfficeScan 3.5 的 HTTP 组件 tmlisten.exe 存在拒绝服务漏洞，远程攻击者无需身份认证即可通过向目标服务器的 12345 端口发送特制的畸形数据，触发 tmlisten.exe 进程内存处理异常，导致进程崩溃，从而使 OfficeScan 客户端管理服务不可用。"
published = "2000-02-28"
remediation = "下载并安装 Trend Micro 官方提供的 OfficeScan 3.5 专用补丁（ofce_patch_35.htm），该补丁修复了 tmlisten.exe 处理畸形数据时崩溃的问题；同时建议在防火墙策略中限制对 TCP 端口 12345 的外部访问，仅允许受信任的 OfficeScan 管理服务器地址进行通信，作为临时缓解措施。"
score = 5.0
severity = "MEDIUM"
sources = ["cve"]
title = "Trend Micro OfficeScan 3.5 tmlisten.exe 拒绝服务漏洞"
updated = "2026-06-16"

