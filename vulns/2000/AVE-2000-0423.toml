[basic]
description = "Netwin DNEWSWEB 是一款新闻组 Web 接口 CGI 程序，在处理 group、cmd 和 utag 等参数时存在缓冲区溢出漏洞。远程攻击者可通过向 CGI 程序发送超长参数触发缓冲区溢出，从而在服务器上执行任意命令。攻击无需身份认证，可远程利用。"
published = "2000-05-05"
remediation = "建议升级到 Netwin DNEWSWEB 的最新版本，或对 CGI 程序的输入参数进行长度校验和过滤，限制 group、cmd、utag 等参数的最大长度以防止缓冲区溢出。"
score = 5.0
severity = "MEDIUM"
sources = ["cve"]
title = "Netwin DNEWSWEB CGI 缓冲区溢出漏洞"
updated = "2000-05-05"

