[basic]
description = "Yamaha MidiPlug 1.1 b-j 版本存在本地缓冲区溢出漏洞，攻击者可通过向 EMBED 标签中的 Text 变量传递超长字符串触发缓冲区溢出，导致程序崩溃或执行任意代码。该漏洞影响 Yamaha MidiPlug 1.1 b-j 及更早版本，需用户访问恶意网页或打开恶意文件触发，CVSS 评分 5.1，危害等级中危。"
published = "1999-11-02T05:00:00.000"
remediation = "立即卸载 Yamaha MidiPlug 1.1 b-j 组件，或通过控制面板 → 添加/删除程序移除。如仍需使用 MIDI 功能，请升级到不受影响的替代软件。在浏览器中禁用 ActiveX 控件或使用不支持 ActiveX 的现代浏览器可防止通过 EMBED 标签触发漏洞。"
score = 5.1
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Yamaha MidiPlug 本地缓冲区溢出漏洞"
updated = "2026-06-16T21:49:23.023"

