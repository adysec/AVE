[basic]
description = "AOL Instant Messenger (AIM) 3.5 客户端在处理特制消息时存在输入验证缺陷，远程攻击者可通过向目标用户发送包含畸形 ASCII 值的消息，导致 AIM 客户端崩溃或停止响应，造成拒绝服务。该漏洞无需身份认证即可触发，攻击条件简单，影响 AOL Instant Messenger 3.5 版本。CVSS 评分 5.0，危害等级中危。"
published = "2000-03-02T05:00:00.000"
remediation = "升级 AOL Instant Messenger 至 4.0 或更高版本，该漏洞已在后续版本中修复。如无法升级，建议禁用 AIM 的消息预览功能或使用防火墙规则阻止来自不可信来源的即时消息连接。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "AOL Instant Messenger 3.5 消息 ASCII 值拒绝服务漏洞"
updated = "2026-06-16T21:51:11.313"

