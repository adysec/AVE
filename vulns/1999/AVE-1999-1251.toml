[basic]
description = "CVE-1999-0966 是 Solaris 系统中 libc 库的 getopt 函数存在的本地缓冲区溢出漏洞。由于 getopt 在处理命令行参数 argv[0] 时未对输入长度进行边界校验，本地用户可构造超长 argv[0] 参数触发缓冲区溢出，进而覆盖相邻内存并提升权限至 root。该漏洞影响运行 Solaris 操作系统的本地账户，攻击条件为攻击者需拥有目标系统的本地登录权限，利用方式是通过执行特制程序使溢出覆盖返回地址或环境变量以实现本地提权。"
published = "1997-01-27T05:00:00.000"
remediation = "建议升级到 Sun 已发布修复该 libc getopt 缓冲区溢出补丁的 Solaris 版本（如 Solaris 2.6 的 105755 补丁簇或 Solaris 7 的 108116 补丁簇）。如无法立即打补丁，应限制普通用户对受影响 setuid root 程序的执行权限，并定期审查系统中 setuid 文件以降低本地提权风险。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
