[basic]
description = "Linux 内核 MPTCP（多路径 TCP）协议实现在处理未接受子套接字销毁时存在释放后使用（Use-After-Free）漏洞。由于未正确同步被动套接字的清理过程，在 token 查找时可能访问已释放的内存对象，导致系统崩溃或潜在权限提升。本地攻击者可通过构造特殊的 MPTCP 连接触发此漏洞，影响所有使用受影响 Linux 内核版本（6.2-rc5 之前）的系统。该漏洞 CVSS 评分 7.8，危害等级高。"
published = "2025-05-02T16:15:26.237"
remediation = "升级 Linux 内核至 6.1.22、6.2.8 或更高版本。内核 5.7 至 6.1.21 以及 6.2 至 6.2.7 均受影响。如无法立即升级，可通过禁用 MPTCP 内核模块（`modprobe -r mptcp`）作为临时缓解措施。"
score = 7.8
severity = "HIGH"
sources = ["msrc"]
title = "Linux Kernel MPTCP 释放后使用漏洞"
updated = "2026-06-17T06:44:14.520"

