[basic]
description = "CVE-2000-0138 描述了系统中被植入分布式拒绝服务（DDoS）攻击工具的情况，包括控制端（master）、代理端（agent）或僵尸程序（zombie）。具体涉及 Trinoo、Tribe Flood Network（TFN）、TFN2K、stacheldraht、mstream、shaft 等六种 DDoS 工具。攻击者通过这些工具在已被入侵的主机上建立僵尸网络，远程下发攻击指令，向特定目标发送大量恶意流量，导致目标网络带宽耗尽或系统资源枯竭，无法提供正常服务。攻击条件为攻击者已获得系统访问权限并安装了相应的 DDoS 恶意程序，危害程度中等。"
published = "2000-05-02T04:00:00.000"
remediation = "使用最新病毒库的杀毒软件全盘扫描并清除 Trinoo、TFN、TFN2K、stacheldraht、mstream、shaft 等 DDoS 木马；在防火墙上封锁已知端口（Trinoo 的 1524/tcp、27444/udp、31335/udp，Stacheldraht 的 16660/tcp、65000/tcp，mstream 的 12754/tcp、15104/tcp）；检查系统自启动项、计划任务和异常网络连接，移除可疑进程和文件，并限制非必要对外通信。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "系统被植入 DDoS 攻击工具（Trinoo/TFN/TFN2K/stacheldraht/mstream/shaft）拒绝服务漏洞"
updated = "2026-06-16T21:51:04.757"

