[basic]
description = "Linux kernel 的 powerpc/prom_init 中存在设备树属性缺失问题，部分 PowerMac 设备的 escc 节点缺少 #size-cells 属性，导致内核启动时触发设备树地址/大小单元解析警告（WARNING），影响系统启动流程的正常执行。该问题需要本地攻击者具有系统登录权限，通过触发内核设备树解析路径来利用。该 CVE 已被 CVE Numbering Authority 撤销，确认不属于安全漏洞范畴。Linux 主线内核已通过 prom_init 启动阶段自动补充缺失的 #size-cells 属性完成修复。"
published = "2025-01-08T18:15:19.030"
remediation = "升级 Linux 内核至以下已包含补丁的版本：5.4.287、5.10.231、5.15.174、6.1.120、6.6.66、6.12.5 及以上。对于 Ubuntu 24.04 LTS 用户，安装 USN-7381-1 或 USN-7450-1 安全更新。如无法立即升级，可在启动参数中添加 `loglevel=3` 临时屏蔽内核 WARN 输出，但建议尽快更新内核以彻底消除该告警。"
score = 5
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux Kernel PowerPC prom_init 缺少 powermac #size-cells 修复"
updated = "2026-01-05T11:17:29.617"

