[basic]
description = "JieLink+ 智能终端操作平台在 `/report/ParkOutRecord/GetDataList` 等多个接口处存在未授权敏感信息泄露漏洞。攻击者在无需有效身份认证的情况下，仅需构造带有伪造 `Authorization: Bearer test` 及管理员 Cookie（如 `userid=admin`）的 HTTP GET 请求即可访问这些接口，绕过平台访问控制逻辑，获取停车场出场记录、用户标识等敏感业务数据。该漏洞影响运行 JieLink+ 智能终端操作平台的设备，可被远程利用，导致关键信息暴露，进而为后续越权操作或系统入侵提供条件。"
published = "0823"
remediation = "建议升级 JieLink+ 智能终端操作平台至厂商最新修复版本，并联系捷顺科技获取对应安全补丁。临时缓解措施：在反向代理或网关层对 /report/ParkOutRecord/GetDataList 等敏感接口增加身份认证与访问鉴权，限制仅可信内网 IP 可访问，并禁用匿名 Bearer token 及默认 admin 账户的未授权调用。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "JieLink JieLink+智能终端操作平台 敏感信息泄露漏洞"
updated = "0823"

