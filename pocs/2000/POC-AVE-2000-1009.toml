[info]
author = "AVE"
description = "向 Rockliffe MailSite Management Agent 的 wconsole.dll 发送超长 query_string 参数的 HTTP GET 请求，检测是否触发缓冲区溢出导致服务异常"
id = "POC-AVE-2000-1009"
name = "Rockliffe MailSite Management Agent wconsole.dll 缓冲区溢出漏洞 PoC"
severity = "critical"
tags = [
    "cve-2000-0398",
    "buffer-overflow",
    "rce",
]
vuln_id = [
    "CVE-2000-0398",
    "AVE-2000-1009",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/wconsole.dll"
protocol = "http"

[poc.requests.body]
content = ""
type = "raw"

[poc.requests.headers]
User-Agent = "AVE/1.0"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "access violation",
    "segmentation fault",
    "buffer overflow",
    "stack overflow",
    "exception",
    "fatal error",
    "runtime error",
]

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/cgi-bin/wconsole.dll"
protocol = "http"

[poc.requests.body]
content = ""
type = "raw"

[poc.requests.headers]
User-Agent = "AVE/1.0"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "access violation",
    "segmentation fault",
    "buffer overflow",
    "stack overflow",
    "exception",
    "fatal error",
    "runtime error",
]

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/mailsite/wconsole.dll"
protocol = "http"

[poc.requests.body]
content = ""
type = "raw"

[poc.requests.headers]
User-Agent = "AVE/1.0"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "access violation",
    "segmentation fault",
    "buffer overflow",
    "stack overflow",
    "exception",
    "fatal error",
    "runtime error",
]
