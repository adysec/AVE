[basic]
description = "这是一个针对 OpenOffice 的国际组件 for Unicode 库的严重 Heap 溢出漏洞，攻击者通过精心构造的 ODF 文档（包含 XForms）文件触发，可导致任意代码执行。该漏洞影响 OpenOffice 全部产品版本，可通过电子邮件或网络共享等方式远程触发，无需用户交互即可执行恶意代码。攻击者可借此获取目标系统控制权，读取敏感文件，部署后门程序，破坏系统完整性。Microsoft 和 Apache 已发布安全补丁，用户需及时更新到最新版本方可防护此漏洞。"
published = "2008-01-29"
remediation = '建议立即升级 OpenOffice.org 至 2.3.1 及以上版本（或 2.4.0+），同时升级 ICU 库至 3.8.1 及以上版本。如暂无法升级，可在 OpenOffice 中禁用 XForms 功能（工具→选项→OpenOffice.org Writer→取消勾选"启用 XForms"）作为临时缓解措施，并避免打开不可信的 ODF 文档。'
score = 5
severity = "MEDIUM"
sources = ["tenable"]
title = "International Components for Unicode ICU 堆缓冲区溢出漏洞"
updated = "2008-01-29"

