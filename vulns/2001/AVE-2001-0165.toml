[basic]
description = "Linux Kernel 2.4 的 IPTables 防火墙中 FTP 状态检测模块（ip_conntrack_ftp）存在访问控制绕过漏洞。远程攻击者可通过向 FTP 服务器发送包含任意 IP 地址和端口号的 PORT 命令，使防火墙将该条目添加到 RELATED 表中并允许通过，从而绕过防火墙规则限制。该漏洞影响 Linux Kernel 2.4 系列内核，CVSS 评分 7.5，危害等级高。"
published = "2001-07-02T04:00:00.000"
remediation = "升级至 Linux 2.4.4 及以上版本内核，该漏洞已在 2.4.4 中修复。如无法升级内核，可卸载 ip_conntrack_ftp 内核模块（`rmmod ip_conntrack_ftp`）或不在 iptables 中加载相关规则，改用应用层 FTP 代理（如 Squid）替代有状态检测以降低风险。"
score = 7.5
severity = "HIGH"
sources = ["exploitdb"]
title = "Linux Kernel 2.4 IPTables 防火墙 FTP 状态检测访问限制绕过漏洞"
updated = "2026-06-16T21:54:14.747"

