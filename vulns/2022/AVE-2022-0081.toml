[basic]
description = "Linux 内核 USB Gadget 子系统的 usb_udc_uevent() 函数中存在释放后使用（Use-After-Free）漏洞。该漏洞源于 uevent 回调处理与 gadget 驱动注销之间存在竞态条件：usb_udc_uevent() 在访问 udc->driver 指针时未持有 udc_lock 互斥锁，若 gadget 驱动被同时卸载，已释放的驱动结构体可能被继续访问，触发 KASAN 检测到的释放后读错误。本地攻击者可通过精心构造的 USB 设备热插拔操作触发此竞态条件，导致系统崩溃或潜在权限提升。该漏洞影响 Linux 内核 5.19-rc4 及之前版本，CVSS 评分 7.8，危害等级高。Linux 内核社区已通过添加互斥锁修复此问题。"
published = "2025-06-18T11:15:25.480"
remediation = "升级 Linux 内核至 5.19-rc5 及以上版本，或合入提交 `https://git.kernel.org/pub/scm/linux/kernel/git/torvalds/linux.git/commit/?id=bfe6c2f6f1c6a955f04f7ad0b22d2c7c3b5e9e38`。如无法立即升级，可禁用 USB Gadget 相关模块（如 `modprobe -r usb_f_* g_*`）或限制物理 USB 设备接入以降低攻击面。"
score = 7.8
severity = "HIGH"
sources = ["msrc"]
title = "Linux 内核 USB Gadget 释放后使用漏洞"
updated = "2026-06-17T05:19:40.303"

