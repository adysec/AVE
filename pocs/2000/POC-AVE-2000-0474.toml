[info]
author = "AVE"
description = "检测 Allmanage Website 管理软件 2.6 中 allmanageup.pl CGI 脚本是否可被远程未授权访问。该脚本本应受权限控制，但可被直接调用，攻击者可利用其上传功能修改用户账户或网页内容。"
id = "POC-AVE-2000-0474"
name = "Allmanage allmanageup.pl 未授权文件上传 PoC"
severity = "high"
tags = ["ave-2000-0474"]
vuln_id = [
    "CVE-2000-0435",
    "AVE-2000-0474",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/cgi-bin/allmanageup.pl"
protocol = "http"

[poc.requests.body]
content = ""
type = "raw"

[[poc.requests.matchers]]
expect = true
status = [200]
type = "status"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "allmanageup",
    "upload",
    "Content-Type",
]
