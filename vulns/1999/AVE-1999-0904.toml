[basic]
description = "CVE-1999-0618是一个针对主机rexec（远程执行）服务的安全漏洞，该服务允许在Unix/Linux系统中进行远程命令执行。此漏洞存在权限提升问题，攻击者可通过向目标主机发送恶意rexec请求，获取更高权限或直接执行任意命令。该漏洞影响所有启用rexec服务的主机，包括历史遗留Unix/Linux系统。攻击者无需身份验证即可触发漏洞，利用rexec服务通常具有root权限，一旦被利用，攻击者可完全控制受影响系统。尽管现代操作系统已逐渐废弃此服务，但历史遗留系统仍存在风险。此类权限提升漏洞可能导致系统完全失控，后果非常严重。"
published = "1999-01-01T05:00:00.000"
remediation = "立即禁用 rexec 服务：在 Linux/Unix 系统中执行 `systemctl stop rexec && systemctl disable rexec`（或从 inetd/xinetd 配置中注释掉 rexec 行并重启服务）。在 /etc/hosts.equiv 和 .rhosts 文件中移除所有信任条目。使用 SSH（OpenSSH）替代 rexec 进行远程命令执行，确保 `/etc/ssh/sshd_config` 中 `PermitRootLogin` 设为 `without-password` 或 `no`，并禁用 `rhostsRSAAuthentication` 和 `HostbasedAuthentication`。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "BSD rexec 服务权限提升漏洞"
updated = "2026-06-16T21:48:44.510"

