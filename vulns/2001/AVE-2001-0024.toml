[basic]
description = "BitchX IRC 客户端在处理 DNS 反向解析时存在缓冲区溢出漏洞。当远程攻击者控制的服务器返回超长的主机名或域名时，BitchX 客户端在解析该 DNS 响应时未对数据进行充分边界检查，导致缓冲区溢出。攻击者可利用此漏洞造成客户端拒绝服务，甚至执行任意代码。该漏洞影响 BitchX 1.0 c17 及更早版本，无需身份认证即可远程触发，CVSS 评分 10.0，危害等级严重。目前已存在公开的利用代码。"
published = "2001-02-16T05:00:00.000"
remediation = "立即升级 BitchX 至 1.0 正式版或更高版本，该版本已修复 DNS 主机名解析缓冲区溢出问题。各发行版用户请安装对应补丁：FreeBSD 安装 FreeBSD-SA-00:78 安全公告更新，Red Hat Linux 应用 RHSA-2000-126 提供的 bitchx-1.0-1 更新包，Mandrake Linux 安装 MDKSA-2000-079 补丁。由于 BitchX 项目已停止维护，建议迁移至 irssi、WeeChat 或 HexChat 等仍在维护的 IRC 客户端。"
score = 10
severity = "CRITICAL"
sources = ["redhat"]
title = "BitchX IRC Client DNS缓冲区溢出漏洞"
updated = "2026-06-16T21:53:33.680"

