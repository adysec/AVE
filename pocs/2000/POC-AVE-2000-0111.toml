[info]
author = "AVE"
description = "检测 Allaire ColdFusion Server 4.0/4.0.1 中 CFCACHE 标签将临时缓存文件存放于 Web 文档根目录的信息泄露漏洞"
id = "POC-AVE-2000-00001"
name = "CVE-2000-0057 PoC"
severity = "high"
tags = ["cve-2000-0057"]
vuln_id = [
    "CVE-2000-0057",
    "AVE-2000-00001",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/cfcache.map"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["cfcache"]
