[basic]
description = "OpenOffice.org 包含一个整数下溢漏洞，影响版本早于 2.4。该漏洞源于对 Quattro Pro（QPRO）文件中数值验证不足，攻击者可构造包含特制值的文件触发异常循环和堆栈缓冲区溢出。在远程非认证攻击者条件下，可导致拒绝服务（崩溃）并可能执行任意代码。具体而言，攻击者通过向目标系统发送恶意构建的 Quattro Pro 文件，利用该整数下溢缺陷破坏内存控制流，实现远程代码执行能力。该漏洞影响广泛，因为许多用户仍在使用旧版 OpenOffice 软件。Microsoft（后更名为 LibreOffice）在随后的版本更新中修复了此漏洞，建议用户尽快升级至支持安全补丁的版本以消除风险。"
published = "2008-04-17T19:05:00.000"
remediation = "建议立即升级 OpenOffice.org 至 2.4 或更高版本（如 LibreOffice 3.0+），或从官网 https://www.openoffice.org/download/ 下载最新版本覆盖安装。若暂时无法升级，请勿打开来源不明的 Quattro Pro (.qpro/.qpw) 文件，并配置邮件网关拦截 .qpro 附件作为临时缓解措施。Linux 发行版用户可执行 `apt update && apt upgrade openoffice.org`（Debian/Ubuntu）或 `yum update openoffice.org`（RHEL/CentOS）完成升级。"
score = 6.8
severity = "MEDIUM"
sources = ["tenable"]
title = "OpenOffice.org Quattro Pro 文件缓冲区溢出代码执行漏洞"
updated = "2026-06-16T22:46:45.273"

