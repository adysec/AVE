[basic]
description = "Nortel Nautica Marlin 桥接设备的 SNMP 服务存在拒绝服务漏洞，未经身份认证的远程攻击者可通过向目标设备 SNMP 端口（UDP 161）发送零长度 UDP 数据包，触发 SNMP 服务进程崩溃，导致设备拒绝服务。该漏洞影响 Nortel Nautica Marlin 系列桥接设备，攻击复杂度低，无需认证即可远程利用。"
published = "2000-02-25T05:00:00.000"
remediation = "升级 Nortel Nautica Marlin 设备固件至最新版本；如无法升级，可在设备 ACL 中限制 SNMP 端口 (UDP 161) 仅允许信任源 IP 访问，或在边界防火墙上过滤发往该端口的零长度 UDP 数据包。如业务不需要 SNMP 管理，建议直接关闭 SNMP 服务。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Nortel Nautica Marlin SNMP 服务 UDP 数据包拒绝服务漏洞"
updated = "2026-06-16T21:51:15.397"

