[basic]
description = "Microsoft Office 2000 存在 DLL 搜索路径劫持漏洞。当用户打开 Office 文档时，应用程序会优先在文档所在目录中搜索 riched20.dll 和 msi.dll 等动态链接库，而非直接搜索系统目录。攻击者可利用该机制，将恶意 DLL 放置在文档同一目录下，诱使用户打开文档后触发 DLL 加载，从而实现任意代码执行。该漏洞 CVSS 评分 10.0，影响 Windows NT 4.0 及 Windows 2000 平台上的 Office 2000，无需身份认证即可远程利用，危害极高。"
published = "2000-11-14T05:00:00.000"
remediation = "安装 Microsoft Office 2000 Service Release 1 (SR-1) 或更高版本更新，该补丁修改了 DLL 搜索顺序，确保系统目录优先于文档目录被检索。如无法升级，建议在打开来源不明的 Office 文档前，将文档移至不包含 untrusted DLL 的安全目录，并教育用户勿从不可信来源打开 Office 文档作为临时缓解措施。"
score = 10
severity = "CRITICAL"
sources = ["exploitdb"]
title = "Microsoft Windows NT 4.0/2000 DLL 搜索路径任意代码执行漏洞"
updated = "2026-06-16T21:52:36.387"

