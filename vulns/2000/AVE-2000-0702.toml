[basic]
description = "FreeBSD 系统中 libedit 库在搜索 .editrc 配置文件时存在不安全搜索路径漏洞。libedit 会优先查找当前目录而非用户主目录中的 .editrc 文件，本地攻击者可在共享目录中植入恶意 .editrc 配置文件。当其他用户在该目录中调用依赖 libedit 的程序（如 sh、ftp）时，恶意配置代码将被执行，造成本地权限提升或任意代码执行。攻击需对目标目录拥有写入权限，CVSS 评分 4.6，危害等级中危。"
published = "2000-07-05T04:00:00.000"
remediation = "立即升级 FreeBSD 至 2000-05-22 之后的版本，或从 ftp://ftp.FreeBSD.org/pub/FreeBSD/CERT/patches/SA-00:24/libedit.patch 下载补丁，进入 /usr/src/lib/libedit 执行 `patch -p < libedit.patch` 后重新编译系统。临时缓解措施：避免在可被其他用户写入的目录（如 /tmp）中交互式运行依赖 libedit 的二进制程序（如 /bin/sh、/usr/bin/ftp）。"
score = 4.6
severity = "MEDIUM"
sources = ["cve"]
title = "FreeBSD libedit 本地代码执行漏洞"
updated = "2026-06-16T21:52:04.467"

