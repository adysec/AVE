[basic]
description = "Linux 内核 lpfc（LightPulse Fibre Channel）SCSI 驱动程序中存在内存泄漏漏洞，当 NPIV（N_Port ID Virtualization）端口发送 PLOGI_RJT（端口登录拒绝）响应时，在 lpfc_ignore_els_cmpl() 和 lpfc_els_rsp_reject() 函数中未正确释放从 login_mbox 分配的内存，导致内存泄漏。本地攻击者可利用此漏洞通过反复触发特定 ELS 命令导致系统内存资源耗尽，造成拒绝服务。该漏洞影响使用 lpfc 驱动且启用 NPIV 功能的 Linux 系统，CVSS 评分 5.5，危害等级中等。"
published = "2025-02-26T07:01:29.400"
remediation = "建议升级 Linux 内核至 5.15.61 及以上版本，或应用各长期维护分支的对应补丁：5.10.x ≥5.10.136、5.4.x ≥5.4.211、4.19.x ≥4.19.255。如无法更新内核，可在不影响业务的前提下卸载 lpfc 内核模块（modprobe -r lpfc）作为临时缓解措施。"
score = 5.5
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux Kernel SCSI lpfc 驱动内存泄漏漏洞"
updated = "2026-06-17T05:18:22.337"

