[basic]
description = "Linux 内核 OrangeFS 文件系统驱动中的 orangefs_sysfs_init() 函数存在内存泄漏漏洞（CWE-401），当加载并卸载 orangefs 内核模块时，动态分配的 kobject 对象未能正确释放，导致内核内存持续泄漏。本地攻击者可通过反复插入和移除该模块触发此漏洞，造成系统内核内存资源耗尽，最终导致拒绝服务。该漏洞影响 Linux 内核，CVSS 评分 5.5，危害等级中危。"
published = "2025-09-15T15:15:43.500"
remediation = "升级 Linux 内核至 6.0.16/6.1.2 及以上版本，或合入补丁 commit 1f2c0e8a587b（6.0.y）/224094902941（6.1.y）/9ce4ba7fff5a（主线）。如果无法立即升级，可通过 `modprobe -r orangefs` 卸载 orangefs 模块，并禁止自动加载（在 /etc/modprobe.d/ 中添加 blacklist orangefs）作为临时缓解措施。"
score = 5.5
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux Kernel OrangeFS 内存泄漏漏洞"
updated = "2026-06-17T05:23:13.213"

