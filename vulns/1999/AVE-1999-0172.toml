[basic]
description = "Windows NT 与 Windows 2000 系统默认管理员账户名为「Administrator」，该已知账户名降低了暴力破解与字典攻击的难度。攻击者可利用该默认账户名对管理员账户实施密码爆破，进而尝试获取系统最高权限。该问题属于安全配置缺陷，影响所有采用默认安装配置的 Windows NT 4.0 及 Windows 2000 系统，CVSS 评分 2.1，危害较低但会削弱系统整体安全性。"
published = "1999-01-01"
remediation = "建议立即将 Windows NT/2000 的默认管理员账户「Administrator」重命名为自定义名称，禁用该账户的远程交互式登录权限，并启用账户锁定策略与强密码复杂度要求，限制管理员组的网络访问范围，必要时应迁移至仍受安全支持的现代 Windows 版本。"
score = 2.1
severity = "LOW"
sources = ["cve"]
title = "Windows NT/2000 默认管理员账户名配置缺陷漏洞"
updated = "2026-07-17"

