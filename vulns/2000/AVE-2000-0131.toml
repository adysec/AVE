[basic]
description = "Novell GroupWise 5.5 Enhancement Pack 中的 Java Server 组件存在拒绝服务漏洞。远程攻击者可通过向 servlet 发送超长 URI 请求，导致 Java Server 处理异常而崩溃，进而使 Web Access 服务不可用。攻击无需身份认证，仅需发送特制 HTTP 请求即可触发。该漏洞影响 GroupWise 5.5 Enhancement Pack 版本，危害等级中危。"
published = "2000-02-07T05:00:00.000"
remediation = "建议升级至 Novell GroupWise 6.0 及以上版本，该版本已修复 Java Server 组件对超长 URI 请求的处理逻辑。如无法升级，可在 Web 服务器或反向代理层配置 URI 长度限制（如限制 URL 不超过 1024 字节），并过滤对 /servlet 路径的异常请求；同时建议在防火墙上限制对 GroupWise Web Access 端口的非信任来源访问作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Novell GroupWise Web Access Enhancement Pack 拒绝服务漏洞"
updated = "2026-06-16T21:51:05.753"

