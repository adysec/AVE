[basic]
title = "BMC Patrol Agent 3.2.5 UDP Flooding 拒绝服务漏洞"
description = "BMC Patrol Agent 3.2.5 存在安全漏洞，远程攻击者可通过向 UDP 端口发送大量洪水数据包，导致 Patrol 服务耗尽系统资源而崩溃，造成拒绝服务。该漏洞无需认证即可远程利用，攻击复杂度低。"
severity = "MEDIUM"
score = 5.0
sources = ["cve", "epss"]
published = "1999-04-01"
updated = "2026-06-16"
remediation = "BMC 官方已停止支持 Patrol Agent 3.2.5 版本，建议升级到不受影响的最新版本；如无法升级，应在防火墙层面限制对 UDP 端口的非必要访问，仅允许可信来源 IP 连接。"
[references]
urls = ["http://www.iss.net/security_center/static/4291.php", "http://www.securityfocus.com/archive/1/13204", "http://www.securityfocus.com/bid/1879"]
