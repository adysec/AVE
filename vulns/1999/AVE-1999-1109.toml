[basic]
description = "WU-FTPD 及其衍生 FTP 服务器在处理 message 文件中的宏变量时存在缓冲区溢出漏洞。攻击者可通过向 FTP 服务器发送包含恶意宏变量的消息文件，触发栈缓冲区溢出，从而以 root 权限在远程服务器上执行任意代码。该漏洞影响 WU-FTPD 2.6.0 之前的多个版本，攻击条件为 FTP 服务器启用了 message 文件功能且攻击者能够上传或修改 message 文件内容。成功利用后可完全控制目标 FTP 服务器，进而威胁整个系统的安全。"
published = "1999-10-01"
remediation = "立即将 WU-FTPD 升级至 2.6.0 及以上版本（或迁移到已修复的 proftpd/vsftpd），该版本修复了 message 文件中宏变量处理导致的缓冲区溢出。若无法立即升级，可在 ftpaccess 配置中移除或注释所有 message 指令、删除匿名用户可写的 message 文件，并在防火墙限制仅允许可信 IP 访问 21 端口作为临时缓解。"
score = 9.8
severity = "CRITICAL"
sources = ["exploitdb"]
title = "WU-FTPD message 文件宏变量缓冲区溢出漏洞"
updated = "2026-06-16"

