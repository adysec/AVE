[basic]
description = "该 CVE 编号已被分配机构拒绝/撤销，当前状态为无效。原申报内容涉及 Linux 内核 squashfs 文件系统驱动中 squashfs_read_xattr_id_table 函数的健全性检查增强，旨在修复读取扩展属性（xattr）ID 表时可能存在的内存越界访问问题。由于该 issue 被确认不构成安全漏洞或属于重复编号，CVE 编号已被正式撤销，不适用于实际漏洞场景的利用或修复。"
published = "2025-03-27T17:15:45.057"
remediation = "立即将 Linux 内核升级至以下修复版本：4.14.306、4.19.273、5.4.232、5.10.168、5.15.93 或 6.1.11 及以上版本。对应修复提交为 de2785aa3448（v6.1.11）、cf5d66120924（v5.15.93）、db76fc535fbd（v5.10.168）等。如无法立即升级内核，可通过禁用 SquashFS 文件系统挂载作为临时缓解措施，或在挂载时使用 `no_xattr` 选项禁止扩展属性处理以避免触发漏洞路径。"
score = 5
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux Kernel squashfs 扩展属性标识表读取合理性检查绕过漏洞"
updated = "2025-10-07T07:15:37.377"

