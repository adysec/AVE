[basic]
description = "OpenClaw 沙箱系统的绑定挂载拒绝列表存在路径遍历逻辑缺陷，仅检查源路径是否在阻塞路径下，未反向验证阻塞路径是否位于源路径之下。攻击者可通过将 /home 或 /var 等目录挂载到沙箱内部，从而读取所有用户的 SSH 密钥、AWS 凭证、GPG 机密信息，或通过获取 Docker socket 实现沙箱逃逸。该漏洞影响 OpenClaw 绑定挂载机制，CVSS 评分 8.4，危害等级高，需要具备沙箱配置权限的攻击者利用。"
published = "20260713"
remediation = "升级 OpenClaw 至修复双向路径检查的版本（修复绑定挂载拒绝列表仅检查源路径是否在阻塞路径下、未反向检查阻塞路径是否位于源路径之下的缺陷）。如无法升级，可限制容器/沙箱的绑定挂载权限，仅允许白名单目录挂载，并在主机侧通过 AppArmor/SELinux 策略禁止挂载 /home、/var、/etc 等敏感目录作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "OpenClaw 绑定挂载路径遍历沙箱绕过漏洞"
updated = "20260713"

