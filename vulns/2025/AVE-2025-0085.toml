[basic]
description = "` tags.<value>联软 UniSDP 零信任访问控制系统的 /emm-core/oauth/token 接口未实施有效的身份验证与访问控制措施，存在信息泄露漏洞。远程攻击者无需任何权限即可直接向该端点发送 HTTP 请求，获取 OAuth 认证令牌等敏感信息，进而利用泄露的令牌接管系统管理权限，对企业内网安全构成严重威胁。"
published = "0724"
remediation = "升级联软UniSDP至最新版本以修复OAuth接口权限验证缺陷。同时，在Web服务器或API网关层对 /emm-core/oauth/token 路径添加IP白名单访问控制，禁止未经认证的请求访问该端点。作为临时缓解措施，可配置WAF规则拦截对 /emm-core/oauth/token 的匿名外部请求。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "联软 UniSDP 零信任访问控制系统 OAuth Token 信息泄露漏洞"
updated = "0724"

