[basic]
description = "Red Hat Linux 系统中的 xconq 及 cconq 游戏程序存在缓冲区溢出漏洞，本地攻击者可通过向 USER 环境变量传入超长字符串触发该漏洞，导致缓冲区溢出，从而获取额外的系统权限。该漏洞影响 Red Hat Linux 发行版中安装的 Stanley T. Shebs Xconq 7.2.2 及更早版本，CVSS 评分 4.6，危害等级中危。攻击者须拥有本地系统访问权限方可利用此漏洞。"
published = "2000-06-22T04:00:00.000"
remediation = "建议升级 xconq 至 7.2.3 及以上版本，该版本已修复 USER 环境变量缓冲区溢出漏洞。如无法升级，可通过移除 setuid 权限（chmod u-s /usr/bin/xconq）限制本地提权风险，或使用 SELinux 策略限制 xconq 进程的权限范围作为临时缓解措施。"
score = 4.6
severity = "MEDIUM"
sources = ["cve"]
title = "Red Hat Linux xconq/cconq 本地缓冲区溢出漏洞"
updated = "2026-06-16T21:52:07.173"

