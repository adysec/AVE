[basic]
description = "MHonArc 邮件归档工具 2.5.13 及之前版本存在跨站脚本（XSS）漏洞。远程攻击者可通过向邮件列表发送包含恶意 HTML 代码的邮件，当 MHonArc 处理并生成 Web 归档页面时，未对邮件内容中的 HTML 标签进行充分过滤，导致恶意脚本在用户浏览器中执行。攻击者无需身份认证即可利用此漏洞，影响所有使用 MHonArc 生成邮件归档的网站。升级至 2.5.14 版本可修复此漏洞。"
published = "2003-01-02T05:00:00.000"
remediation = "升级 MHonArc 至 2.6.18 或更高版本（官网最新为 2.6.19），该版本修复了 HTML 过滤器的 XSS 漏洞。Debian 用户应升级至 2.5.2-1.3 或更新版本。如无法立即升级，可在 MHonArc 配置中启用 `TEXTAREAS` 或 `MIMEFILTERS` 过滤 HTML 邮件内容，将不可信来源的 HTML 邮件转为纯文本显示作为临时缓解措施。"
score = 4.3
severity = "MEDIUM"
sources = ["osv"]
title = "MHonArc HTML 邮件归档跨站脚本漏洞"
updated = "2026-06-16T21:59:14.087"

