[basic]
description = "Red Hat Linux 系统中的 screen 终端复用器程序未正确使用 Unix98 伪终端（pty）机制，默认使用传统 BSD ptty，导致本地用户可向其他用户终端写入任意数据或执行命令，造成终端劫持、输入捕获或权限提升。攻击者只需拥有本地系统账号即可利用此漏洞，影响 Red Hat Linux 多个发行版本。厂商已发布安全更新修复该问题。"
published = "2000-01-04T05:00:00.000"
remediation = "升级 screen 程序至 3.7.6 及以上版本（该版本开始默认启用 Unix98 pty 支持），或安装 Red Hat 提供的对应内核安全更新。如无法升级，可在 screen 配置文件中设置 `termcap` 限制非特权用户的窗口写入权限，或改用 tmux 等默认使用 Unix98 pty 的终端复用器。"
score = 10
severity = "CRITICAL"
sources = ["redhat"]
title = "Red Hat Linux screen 程序本地终端写入漏洞"
updated = "2026-06-16T21:49:16.680"

