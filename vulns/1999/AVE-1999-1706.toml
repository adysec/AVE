[basic]
description = "Internet Explorer 4 在处理 URL 中的 32 位纯数字无点 IP 地址时，将其错误地解析为主机名而非 IP 地址。当用户访问包含无点 IP 地址的 URL 时，IE 会应用本地 Intranet 区域的安全设置，而非更严格的 Internet 区域设置。远程攻击者可以通过构造包含自身服务器无点 IP 地址的恶意 URL，诱使用户访问，从而绕过安全区域限制执行未授权操作，如运行 ActiveX 控件或脚本。该漏洞影响 Internet Explorer 4.0、4.01 及 4.01 SP1 版本。"
published = "1999-12-31"
remediation = "安装 Microsoft 安全公告 MS98-016 提供的补丁，或升级至 Internet Explorer 5 及以上版本。如无法安装补丁，可将本地 Intranet 区域安全设置调整为与 Internet 区域相同，禁用 NTLM 自动认证以降低风险。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "Microsoft Internet Explorer 4 无点 IP 地址安全区域绕过漏洞"
updated = "2024-06-16"

