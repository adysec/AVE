[basic]
description = 'Netscape Communicator 浏览器在处理 HTML TITLE 标签中嵌入的 JavaScript 代码时存在信息泄露漏洞。远程攻击者可通过诱导用户访问恶意网页，利用 "about" 协议获取浏览器内部信息，包括浏览历史、配置数据等敏感内容。该漏洞影响 Netscape Communicator 4.x 版本，攻击者无需身份认证即可实施攻击，但需要用户交互配合。此漏洞 CVSS 评分 2.6，危害等级低。'
published = "1999-05-24T04:00:00.000"
remediation = "升级到 Netscape Communicator 4.73 或更高版本，该版本修复了 TITLE 标签中 JavaScript 可访问 about 协议信息的问题。由于 Netscape Communicator 已停止维护，建议立即迁移至现代浏览器（如 Firefox、Chrome），并在迁移前禁用浏览器 JavaScript 功能作为临时缓解措施。"
score = 2.6
severity = "LOW"
sources = ["avd"]
title = "Netscape Communicator 浏览器信息泄露漏洞"
