[basic]
description = "tags.<value>OpenBSD 2.x 系统中的 fstat 程序存在格式字符串漏洞，由于程序在处理 PWD 环境变量时未正确过滤用户输入，导致本地攻击者可通过向 PWD 变量传递特制的格式字符串触发该漏洞。成功利用后攻击者可获取 root 权限，实现本地权限提升。该漏洞影响 OpenBSD 2.x 系列版本，也可能影响其他基于 BSD 的操作系统，CVSS 评分 7.2，危害等级高。OpenBSD 官方已发布补丁修复此漏洞。"
published = "2000-12-19T05:00:00.000"
remediation = "升级 OpenBSD 至 3.0 或更高版本，该漏洞已在后续版本中修复。如无法升级，限制非信任用户的本地登录权限，并移除 fstat 程序的 suid 标志位（chmod u-s /usr/bin/fstat）作为临时缓解措施。"
score = 7.2
severity = "HIGH"
sources = ["exploitdb"]
title = "OpenBSD fstat 格式字符串本地权限提升漏洞"
updated = "2026-06-16T21:52:55.937"

