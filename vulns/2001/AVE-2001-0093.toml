[basic]
description = "GoAhead WebServer 2.1 及更早版本存在目录遍历漏洞。攻击者无需身份认证，仅通过向目标服务器发送包含 `../` 序列的特制 HTTP GET 请求，即可绕过路径限制读取服务器上的任意文件。该漏洞源于服务器对用户请求路径过滤不严，未能正确规范化 `../` 等目录回溯序列，导致攻击者可遍历至 Web 根目录以外的敏感文件（如 `/etc/passwd`、配置文件等），造成信息泄露。攻击条件简单，无需特殊权限即可利用。"
published = "2001-05-03T04:00:00.000"
remediation = '''
The user wants me to generate a [remediation] field for CVE-2001-0228. This is a directory traversal vulnerability in GoAhead web server 2.1 and earlier. Let me provide a specific, actionable remediation suggestion in Chinese.

GoAhead WebServer is an embedded web server. For such an old vulnerability (2001), the affected version is 2.1 and earlier. The remediation should recommend upgrading to a version that fixes the issue, or implementing a WAF rule / input validation as mitigation.

GoAhead web server 2.1.0 and earlier are vulnerable. The fix would be to upgrade to GoAhead 2.1.1 or later, or apply input filtering for ".." sequences.

Let me provide a concrete remediation.<value>升级 GoAhead WebServer 至 2.1.1 或更高版本，该版本已修复路径遍历问题。如无法升级，在反向代理或 WAF 层面添加规则，拦截包含 "../" 或 "..\" 序列的 HTTP GET 请求，同时对 URL 中的路径参数进行规范化校验。'''
