[basic]
description = "Linux 内核 2.1.132 及之前版本中存在资源耗尽型拒绝服务漏洞。本地攻击者可通过从 /dev/urandom 等随机设备读取大量数据触发该漏洞，由于读取操作在完成之前无法被中断，将导致系统 CPU 和内存资源被大量消耗，造成系统响应缓慢甚至崩溃。该漏洞需要本地用户权限才能利用，攻击门槛较低，影响所有运行受影响的 Linux 内核版本的系统。"
published = "1998-12-27T05:00:00.000"
remediation = "升级 Linux 内核至 2.1.133 或更高版本，该版本已将对 /dev/urandom 的读取操作改为可中断（interruptible），避免单次大块读取耗尽 CPU 资源。如无法升级内核，可通过 ulimit 限制单进程可打开的最大文件描述符数量和 CPU 时间，降低本地拒绝服务风险。"
score = 2.1
severity = "LOW"
sources = ["avd"]
title = "Linux 内核 /dev/urandom 读取不可中断导致资源耗尽拒绝服务漏洞"
updated = "2026-06-16T21:50:06.677"

