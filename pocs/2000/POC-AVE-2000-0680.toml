[info]
author = "ave"
description = "验证 CVE-2000-0929 Windows Media Player 7 OCX 控件嵌入式拒绝服务漏洞。通过构造包含未正确关闭的 OCX 嵌入式控件的 RTF 邮件内容，导致支持 RTF 格式的邮件客户端（Outlook/Outlook Express）在处理时崩溃。漏洞原理：Windows Media Player 7 的 OCX 控件在嵌入 RTF 邮件时未能正确关闭，邮件客户端解析该畸形控件时触发异常。ExploitDB 已有公开 PoC（EDB-20240）提供汇编源码与二进制程序。"
id = "POC-AVE-2000-0680"
name = "Microsoft Windows Media Player 7 OCX Embedded Control DoS PoC"
severity = "medium"
tags = [
    "cve-2000-0929",
    "dos",
    "ocx",
    "media-player",
]
vuln_id = [
    "CVE-2000-0929",
    "AVE-2000-0680",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "Microsoft",
    "Windows Media Player",
]
