[basic]
description = "tags.<value>MacOS Runtime Java (MRJ) 2.1 及更早版本以及 Microsoft 虚拟机（MacOS 版）中的 java.net.URLConnection 函数存在安全绕过漏洞。远程攻击者可通过构造恶意的 HTTP 重定向响应，诱使受影响的 Java 运行时环境连接至任意主机，从而违反 Java 安全模型，可能导致信息泄露或进一步攻击。该漏洞 CVSS 评分 10.0，危害严重。"
published = "2000-10-20T04:00:00.000"
remediation = "建议升级到 MacOS Runtime Java (MRJ) 2.2 或更高版本，或迁移至 Apple 官方提供的更新版 Java 运行时环境。若无法升级，应禁用浏览器中的 Java Applet 支持，并在系统层面限制 Java 网络权限，仅允许信任站点执行 Java 代码。对于使用 Microsoft VM for MacOS 的用户，建议完全迁移至更新的 Java 运行环境如 Oracle Java SE 或 OpenJDK，并移除旧版 Microsoft VM。"
score = 10
severity = "CRITICAL"
sources = ["cve"]
title = "Apple MacOS Runtime Java 及 Microsoft VM URLConnection 安全限制绕过漏洞"
updated = "2026-06-16T21:52:00.303"

