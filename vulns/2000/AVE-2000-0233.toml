[basic]
description = 'Windows NT 4.0 的 Cryptography\Offload 注册表项默认权限设置不当，本地攻击者可通过读取该注册表项获取其他用户的加密密钥，导致敏感信息泄露。该漏洞影响 Windows NT 4.0 及 Terminal Server 版本，CVSS 评分 7.2，危害等级高危。攻击者需具备本地系统访问权限，可对同一系统上的其他用户加密密钥实施窃取，进而伪造数字签名或解密受保护数据。'
published = "2000-04-12T04:00:00.000"
remediation = '将系统升级至 Windows 2000 及以上版本以彻底修复该默认权限问题；若无法升级，使用 regedt32 手动设置 HKEY_LOCAL_MACHINE\SOFTWARE\Microsoft\Cryptography\Offload 注册表项的权限为仅允许 Administrators 和 SYSTEM 完全控制，删除 Everyone 和 Users 组的写入与读取访问权。'
score = 7.2
severity = "HIGH"
sources = ["epss"]
title = "Microsoft Windows NT 4.0 OffloadModExpo 加密注册表项权限漏洞"
updated = "2026-06-16T21:51:20.513"

