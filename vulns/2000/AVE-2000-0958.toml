[basic]
description = "Auction Weaver 1.0至1.04版本中的CGI脚本中心存在路径遍历漏洞，由于未对表单字段名称进行有效验证，远程攻击者可通过向目标系统发送包含`..`（点点）序列的特制HTTP请求，利用目录遍历技术删除服务器上的任意文件与目录。该漏洞影响Auction Weaver 1.0至1.04版本，CVSS评分7.5，危害等级高，攻击者无需身份认证即可远程利用，可能导致服务中断或数据丢失。"
published = "2000-12-19T05:00:00.000"
remediation = '建议立即升级 Auction Weaver 至 1.05 或更高版本（如厂商已发布修复版）。若厂商已停止维护无法升级，则需在 Web 应用层对表单字段名进行严格过滤，拒绝包含 `..`、`/`、`\` 等路径遍历字符的输入；同时在 Web 服务器（如 Apache/IIS）层面限制 Web 进程对文件系统的写权限，仅允许写入指定上传目录，并禁用 `..` 路径解析。建议迁移至仍在维护的替代拍卖系统。'
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "CGI Script Center Auction Weaver 任意文件删除漏洞"
updated = "2026-06-16T21:52:31.680"

