[basic]
description = "Perl Web Server 0.3 及更早版本存在目录遍历漏洞，远程攻击者无需身份认证即可通过在 URL 中添加 `..`（点点）序列绕过路径限制，读取服务器上任意文件。该漏洞源于程序未对用户请求中的路径进行充分过滤和规范化处理，攻击者只需向目标服务器发送特制的 HTTP 请求即可利用，可导致敏感信息泄露（如配置文件、密码文件等）。CVSS 评分 5.0，危害等级中危。"
published = "2001-06-27T04:00:00.000"
remediation = "建议立即停止使用 Perl Web Server 0.3 及更早版本，迁移至受支持的 Web 服务器（如 Apache httpd 或 Nginx）。在迁移完成前，可在反向代理或 WAF 层面拦截包含 `../` 路径遍历序列的 HTTP 请求，同时对用户输入的 URL 进行规范化处理，移除所有相对路径引用。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Perl Web Server 目录遍历漏洞"
updated = "2026-06-16T21:54:21.163"

