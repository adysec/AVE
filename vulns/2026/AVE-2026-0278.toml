[basic]
description = "Decidim 是一套公民参与平台框架。其管理后台用户搜索端点 GET /admin/organization/users 使用来自 params[:term] 的不可信输入构造 SQL ORDER BY 表达式，且字符串插值发生在 ActiveRecord 消毒处理之前。攻击者需持有管理员会话，通过构造特殊搜索字符串可向 PostgreSQL 注入任意 SQL，利用时序差异进行盲注，读取数据库角色权限范围内的其他表数据或造成拒绝服务。"
published = "2026-07-13"
remediation = "升级 decidim-admin 至 0.30.9、0.31.5 或 0.32.0 版本。如暂无法升级，应严格审查并限制具有后台访问权限的管理员账户，仅授权可信人员，以降低被利用风险。"
score = 6.8
severity = "MEDIUM"
sources = [
    "cve",
    "github",
]
title = "Decidim 管理后台用户搜索 SQL 注入漏洞"
updated = "2026-07-13"

