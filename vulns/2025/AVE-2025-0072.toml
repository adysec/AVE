[basic]
description = "美特CRM系统的/mobile/mobileupload.jsp接口未进行身份验证与文件类型过滤，远程攻击者可直接向该接口上传恶意JSP文件，从而获取服务器控制权，实现远程代码执行。该漏洞影响多版本美特CRM，危害严重，攻击者无需任何权限即可利用。"
published = "2025-07-10"
remediation = "厂商应升级美特CRM至安全版本，在/mobile/mobileupload.jsp接口增加身份验证机制，对上传文件进行严格的类型白名单过滤，配置Web容器禁止上传目录的脚本执行权限，并部署WAF规则拦截恶意文件上传请求。"
score = 7.5
severity = "HIGH"
sources = ["hwpoc"]
title = "美特CRM mobileupload.jsp任意文件上传漏洞"
updated = "2025-07-14"

