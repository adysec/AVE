[basic]
description = "Internet Explorer 4.0 存在任意文件读取漏洞（Freiburg 文本查看问题），远程攻击者可通过在恶意网页中嵌入小型 IFRAME 元素，利用 Dynamic HTML（DHTML）技术将用户本地的文本和 HTML 文件内容发送至攻击者控制的服务器。该漏洞无需用户交互即可触发，影响使用 IE 4.0 的 Windows 系统，CVSS 评分 5.0，危害等级中等。受限于浏览器版本，该漏洞仅影响早期 Windows 平台。"
published = "1999-12-31T05:00:00.000"
remediation = "升级至 Internet Explorer 4.01 及以上版本即可修复此漏洞。早期版本中 IFRAME 与 DHTML 的组合未对跨域文本读取做安全限制，升级后禁止了子框架跨域访问本地文件。如无法升级，可在浏览器安全设置中将「允许 META REFRESH 通过 IFRAME 运行」禁用，或使用最新版 Edge/Chrome 替代。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Microsoft Internet Explorer 任意文件读取漏洞"
updated = "2026-06-16T21:50:30.877"

