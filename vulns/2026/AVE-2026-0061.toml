[basic]
description = "XWiki 平台 ssx 和 jsx 端点存在路径遍历漏洞（CWE-23），远程攻击者无需身份认证即可通过构造带有前导斜杠的 resource 参数，利用路径穿越读取 WEB-INF/xwiki.cfg 等敏感配置文件，获取数据库凭证等关键信息可进一步导致远程代码执行。该漏洞影响 XWiki 16.10.17 以下、17.4.9 以下、17.10.3 以下及 18.1.0-rc-1 以下版本，CVSS 评分 9.3，危害等级严重。"
published = "2026-05-20T20:16:36.027"
remediation = "立即升级 XWiki 至 18.1.0-rc-1、17.10.3、17.4.9 或 16.10.17 及以上版本。如无法立即升级，在反向代理层（如 Nginx/Apache）配置规则拦截访问 /bin/ssx/ 和 /bin/jsx/ 路径的 resource 参数含 /../ 或前导斜杠的请求，或通过防火墙限制对 XWiki 管理端口的访问作为临时缓解措施。"
score = 9.3
severity = "CRITICAL"
sources = ["hwpoc"]
title = "XWiki XWiki Platform 路径遍历漏洞"
updated = "2026-06-17T10:22:01.020"

