[basic]
description = "Apache Tomcat Servlet 3.2.2 之前版本存在目录遍历漏洞，远程攻击者可发送不带 HTTP 协议规范（如 HTTP/1.0）的畸形 URL 请求，绕过安全限制读取任意 JSP 文件源代码，导致敏感源代码泄露。影响 Apache Tomcat Servlet 3.2.2 之前版本，攻击者无需身份认证即可远程利用。攻击条件为发送不以 HTTP/1.0 或 HTTP/1.1 结尾的畸形 HTTP 请求，服务器解析异常导致返回 JSP 源码而非执行结果。"
