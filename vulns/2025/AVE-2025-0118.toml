[basic]
description = "用友畅捷通T+软件的Save*InfoToFile接口存在任意文件上传漏洞，未经身份认证的远程攻击者可通过构造特制的HTTP请求向目标系统上传恶意文件，成功利用后可获取服务器控制权，实现远程代码执行。该漏洞影响畅捷通T+全版本，危害严重，建议用户尽快升级至官方修复版本。"
published = "0702"
remediation = "立即升级畅捷通T+至官方最新版本（≥18.0），该版本已修复 Save*InfoToFile 接口未授权文件上传缺陷。如无法升级，可在 IIS 或反向代理层配置规则，拦截对 Save*InfoToFile 的 POST 请求；同时限制 Web 应用上传目录不可执行脚本权限。建议在 WAF 中添加规则阻断上传 .jsp/.asp/.aspx/.php 等可执行文件。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "用友畅捷通T+ 任意文件上传漏洞"
updated = "0702"

