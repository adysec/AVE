[basic]
description = "Lsof（List Open Files）工具在处理超长命令行参数时存在缓冲区溢出漏洞，本地攻击者可利用该漏洞以 root 权限执行任意代码。受影响系统包括 Debian 2.0、FreeBSD 3.2、OpenBSD 2.4、RedHat 5.2 及 SuSE 6.1 等版本，危害等级高。攻击者需具备目标系统的本地访问权限，即通过本地账号登录后运行特制的 lsof 命令即可触发漏洞，无需额外认证条件。"
