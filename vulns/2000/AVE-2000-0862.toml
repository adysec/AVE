[basic]
description = "FreeBSD 系统的 libmytinfo 库存在缓冲区溢出漏洞，本地攻击者可通过向 TERMCAP 环境变量传入超长字符串触发该漏洞，导致缓冲区溢出，从而以受影响进程的权限执行任意代码。该漏洞影响 FreeBSD 多个版本，CVSS 评分 7.5，危害等级高。攻击者需拥有本地系统访问权限方可利用此漏洞。"
published = "1990-05-09T04:00:00.000"
remediation = "升级 FreeBSD 至 4.0 及以上版本（该版本已重写 ncurses 库，彻底修复此漏洞）。如无法升级，对 3.x 系统应用官方补丁：下载 libmytinfo.patch 后以 root 执行 `cd /usr/src/lib/libmytinfo && patch < patchfile && make all && make install` 重新编译 libmytinfo 共享库。临时缓解措施：使用 libfind.sh 脚本扫描系统中所有链接 libmytinfo 的 setuid/setgid 二进制文件，移除其 setuid/setgid 权限或限制可执行用户范围。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "FreeBSD libmytinfo 库缓冲区溢出漏洞"
updated = "2026-06-16T21:51:36.727"

