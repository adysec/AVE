[basic]
description = 'Crosscom/Olicom XLT-F XL 80 IM 设备（固件版本 V5.5 Build Level 2）存在默认 SNMP 团体字符串漏洞。设备内置了未公开的默认团体字符串 "ILMI"，远程攻击者无需认证即可利用该字符串通过 SNMP 协议读取或修改设备配置信息，可能导致敏感信息泄露或设备配置被篡改。该漏洞影响特定版本的 Olicom XLT-F 系列网络设备，攻击者只需网络可达即可利用，无需任何身份验证。'
published = "2001-06-18T04:00:00.000"
remediation = "立即修改 SNMP 默认 community string，删除或更改 'ILMI' 为自定义复杂字符串；在设备 ACL 中限制 SNMP 仅允许受信管理 IP 段访问；在边界防火墙上阻断 UDP 161/162 端口的外部访问。建议联系厂商确认是否有固件更新可彻底修复此问题。"
score = 6.4
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Crosscom Olicom XLT-F XL 80 IM SNMP 默认 Community 字符串漏洞"
updated = "2026-06-16T21:54:11.897"

