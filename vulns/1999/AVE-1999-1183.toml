[basic]
description = "Texas A&M University 开发的 Tiger 安全审计工具中，某个脚本存在输入验证不足漏洞。本地攻击者可通过构造特制命令参数，诱使该脚本以 Tiger 进程权限（通常为 root）执行任意命令，从而导致权限提升。该漏洞影响 Tiger 全版本，CVSS v2.0 评分 7.2，危害等级高危。厂商已发布补丁修复此问题。"
published = "1999-07-20T04:00:00.000"
remediation = "立即从 ftp://net.tamu.edu/pub/security/TAMU/ 下载并安装官方补丁；确保 Tiger 仅由受信任的 root 用户在受控环境中运行（如定时任务而非普通用户触发）；如无法获取补丁，建议彻底移除 Tiger 或禁用其特权执行权限，改用 lynis 等 modern 替代工具。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "Texas A&M University Tiger 本地命令执行漏洞"
updated = "2026-06-16T21:50:43.110"

