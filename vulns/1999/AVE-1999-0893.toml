[basic]
description = "Microsoft Exchange 5.0 和 5.5 版本在处理畸形的 NNTP（网络新闻传输协议）数据或 SMTP（简单邮件传输协议）数据时存在缺陷，远程攻击者可向目标邮件服务器发送特制的畸形数据包触发服务进程错误，导致 Exchange 服务崩溃或拒绝服务。该漏洞影响 Microsoft Exchange Server 5.0 和 5.5，无需身份认证即可远程利用，CVSS 评分 5.0，危害等级中等。"
published = "1999-12-31T05:00:00.000"
remediation = "将 Microsoft Exchange Server 升级至 5.5 Service Pack 3（SP3）或更高版本（Exchange 5.0 用户需先迁移至 5.5 再安装 SP3）。如无法升级，可在服务器管理中禁用 NNTP 虚拟服务器服务，并在防火墙策略中限制 TCP 25（SMTP）和 TCP 119（NNTP）端口的访问来源为可信 IP 段。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Microsoft Exchange Server 5.0/5.5 NNTP 和 SMTP 拒绝服务漏洞"
updated = "2026-06-16T21:49:35.187"

