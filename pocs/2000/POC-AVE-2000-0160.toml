[info]
author = "ave"
description = "iPlanet Web Server 4.1 存在拒绝服务漏洞，远程攻击者可通过发送大量GET请求消耗服务器内存，导致系统内核崩溃（kernel panic），造成服务不可用。该漏洞无需身份认证即可远程利用，攻击复杂度低。"
id = "POC-AVE-2000-0160"
name = "iPlanet Web Server 4.1 GET请求拒绝服务漏洞 PoC"
severity = "medium"
tags = ["ave-2000-0160"]
vuln_id = [
    "CVE-2000-0182",
    "AVE-2000-0160",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "header"
type = "word"
words = ["Server: iPlanet-WebServer"]
