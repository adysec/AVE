[basic]
description = "Stalker CommuniGate Pro 3.2.5 及更早版本的 Web 管理界面存在路径遍历漏洞，远程攻击者无需认证即可通过在 URL 中注入 `../` 序列实现目录跳转，从而读取服务器上的任意文件，包括配置文件、密码文件等敏感信息。该漏洞允许攻击者获取系统关键数据，为进一步渗透提供基础。"
published = "2000-04-03T04:00:00.000"
remediation = "升级 CommuniGate Pro 至 3.2.5 之后的修复版本（官方已在 2000 年 7 月发布补丁）；同时将 Web 管理接口绑定到内网地址，在防火墙层面限制管理端口（默认 8010 端口）仅允许受信管理 IP 访问；使用反向代理对请求路径进行 `../` 过滤，防止路径穿越攻击。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Stalker CommuniGate Pro 目录遍历漏洞"
updated = "2026-06-16T21:52:09.323"

