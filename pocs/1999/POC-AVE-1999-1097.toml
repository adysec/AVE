[info]
author = "ave"
description = "检测目标 BSD 系统是否存在 fsdb 文件系统调试器，该工具可被用于绕过安全等级 1 的不可变文件保护机制。攻击者通过卸载文件系统后使用 fsdb 直接操作底层设备清除文件 immutable/append-only 标志位。"
id = "POC-AVE-1999-1097"
name = "BSD UFS Secure Level 1 Bypass PoC"
severity = "low"
tags = ["ave-1999-1097"]
vuln_id = [
    "CVE-1999-1394",
    "AVE-1999-1097",
]

[poc]
logic = "any"

[[poc.requests]]
path = "/sbin/fsdb"
protocol = "file"

[[poc.requests.matchers]]
expect = true
part = "body"
regex = ".+"
type = "regex"

[[poc.requests]]
path = "/usr/sbin/fsdb"
protocol = "file"

[[poc.requests.matchers]]
expect = true
part = "body"
regex = ".+"
type = "regex"
