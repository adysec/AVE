[basic]
description = "Microsoft IIS FTP 服务的 LIST 命令存在缓冲区溢出漏洞，远程攻击者无需身份认证即可向目标服务器发送特制的 FTP LIST 请求触发缓冲区溢出，导致拒绝服务，部分情况下可执行任意命令。该漏洞影响 IIS 服务器，CVSS 评分 7.5，危害等级高危。受限于当时系统安全机制，攻击者需具备 FTP 目录列出权限。"
published = "1999-01-27T05:00:00.000"
remediation = "升级 Windows NT 4.0 至 Service Pack 5 (SP5) 或更高版本，或安装 Microsoft 安全公告 MS99-003 提供的补丁 (Q188348)。如无法立即升级，可在 IIS 管理器中禁用 FTP 服务或限制 FTP 目录写入权限作为临时缓解措施。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "Microsoft IIS FTP 服务缓冲区溢出漏洞"
updated = "2026-06-16T21:48:12.357"

