[basic]
description = "SCO UnixWare 7.1.0 的软件包管理命令存在不安全的权限设置漏洞，本地攻击者利用该漏洞可绕过权限限制添加或移除系统软件包，可能导致系统配置被篡改或安装恶意软件包。此漏洞需要本地访问权限，攻击复杂度较低，CVSS 评分 4.6，危害等级中等。"
published = "2001-03-12T05:00:00.000"
remediation = "建议立即应用 SCO 安全公告 SB-99.09b 中提供的补丁程序，修复 packaging 命令（如 pkgadd/pkgrm）的不安全权限问题。如无法打补丁，应严格限制本地用户对系统的交互式登录权限，移除不必要的本地用户账户，并审查 /var/sadm/pkg 等软件包管理目录的权限设置，确保仅 root 用户可执行软件包安装与删除操作。"
score = 4.6
severity = "MEDIUM"
sources = ["cve"]
title = "SCO UnixWare 软件包管理命令本地权限提升漏洞"
updated = "2026-06-16T21:51:32.180"

