[basic]
description = "ISC InterNetNews (INN) 2.3.0 之前版本中的 innfeed 组件存在命令行缓冲区溢出漏洞。本地 news 组中的攻击者可通过向 innfeed 程序提交超长的 -c 命令行参数触发缓冲区溢出，从而获取提升的权限。该漏洞影响 ISC INN 2.x 系列版本，攻击前提是攻击者已拥有 news 组本地账户权限，CVSS 评分 4.6，危害等级中危。"
published = "2001-04-21T04:00:00.000"
remediation = "升级 ISC INN 至 2.3.0 或更高版本，该版本已修复 innfeed 的 -c 参数缓冲区溢出问题。如无法立即升级，应严格限制 news 组用户的登录权限，移除不必要的组成员，并监控 innfeed 进程的命令行参数长度。"
score = 4.6
severity = "MEDIUM"
sources = ["osv"]
title = "ISC InterNetNews (INN) innfeed 本地缓冲区溢出漏洞"
updated = "2026-06-16T21:56:17.047"

