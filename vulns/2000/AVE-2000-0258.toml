[basic]
description = "LCDProc 0.4 版本中存在缓冲区溢出漏洞，远程攻击者可通过向 screen_add 命令发送特制数据触发该漏洞，导致目标系统以 root 权限执行任意代码。该漏洞影响 LCDProc 0.4 及更早版本，攻击者无需身份认证即可远程利用，CVSS 评分 10.0，危害等级严重。目前官方已发布修复版本，建议用户立即升级。"
published = "2000-04-21T04:00:00.000"
remediation = "升级 LCDproc 至 0.5.7 或更高版本，该版本已修复 screen_add 命令缓冲区溢出漏洞。如无法立即升级，配置 LCDd 绑定监听地址为 127.0.0.1（在 LCDd.conf 中设置 Listen=127.0.0.1），并在防火墙层面限制外部对 TCP 13666 端口的访问作为临时缓解措施。"
score = 10
severity = "CRITICAL"
sources = ["cve"]
title = "LCDproc 0.4 远程缓冲区溢出漏洞"
updated = "2026-06-16T21:51:25.167"

