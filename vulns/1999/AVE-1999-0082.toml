[basic]
description = "SGI IRIX 6.3 系统中的 pset 命令存在缓冲区溢出漏洞，本地攻击者可利用该漏洞通过向 pset 命令提交特制的输入参数触发缓冲区溢出，从而获取系统 root 权限。该漏洞影响 SGI IRIX 6.3 及更早版本，攻击者需拥有系统本地访问权限方可利用，危害等级中等。"
published = "1997-07-16T04:00:00.000"
remediation = "升级至 SGI IRIX 6.4 或更高版本（如 6.5.x），该漏洞在 pset 命令重写后已修复。如无法升级，可临时移除 pset 的 setuid root 权限位：chmod u-s /usr/sbin/pset，防止普通用户触发提权。SGI IRIX 已停止支持超过十五年，强烈建议迁移至仍在维护的现代操作系统。"
score = 4.6
severity = "MEDIUM"
sources = ["epss"]
title = "SGI IRIX pset 命令缓冲区溢出本地权限提升漏洞"
updated = "2026-06-16T21:47:22.857"

