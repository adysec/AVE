[basic]
description = "NBase 公司生产的 NH2012、NH2012R、NH2015 及 NH2048 系列交换机存在一个无法禁用的硬编码后门密码漏洞。远程攻击者无需认证即可利用该默认后门密码登录交换机管理界面，从而完全修改设备配置、更改网络策略或植入恶意规则。此漏洞影响范围广泛且利用难度极低，CVSS 评分高达 10.0，危害等级为严重。"
published = "1998-07-20T04:00:00.000"
remediation = "建议立即将受影响 NBase 交换机替换为支持现代安全认证机制的设备，因 NBase 已停止运营且从未发布真正的修复补丁（仅更改了后门密码字符串），硬件替换是唯一彻底解决方案。若无法立即替换，须在网络边界防火墙配置 ACL 严格限制仅特定受信任管理 IP 地址可访问交换机的 telnet 管理端口（TCP 23），同时在交换机上使用 `set-ip` 命令将管理 IP 设为不可路由的私有地址段以禁用远程管理功能，并物理保护串口控制台防止本地接触。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "N-Base 交换机后门密码漏洞"
updated = "2026-06-16T21:50:24.177"

