[basic]
description = "w3m 是一款基于文本模式的网页浏览器，其 0.3.2.2 之前版本在处理 IMG 标签的 ALT 属性时存在跨站脚本攻击（XSS）漏洞。由于程序未对 IMG 标签 ALT 属性中的 HTML 标签进行正确转义过滤，远程攻击者可通过构造包含恶意 IMG 标签的特制网页，诱使用户使用 w3m 访问该页面，从而在用户浏览器上下文中执行任意脚本代码，导致敏感信息泄露（如 Cookie 或本地文件）。该漏洞影响范围广泛，攻击条件简单，仅需用户访问恶意页面即可触发。"
published = "2003-02-19T05:00:00.000"
remediation = "升级 w3m 至 0.3.2.2 或更高版本。Debian 系统执行 `apt-get update && apt-get install w3m`，Red Hat 系统执行 `up2date w3m` 或通过 Red Hat Network 安装更新。如无法升级，在 w3m 配置文件 `/etc/w3m/w3mconfig` 或 `~/.w3m/config` 中禁用 frame 支持（`display_frame 0`），并避免使用 `-F` 参数启动 w3m。"
score = 5
severity = "MEDIUM"
sources = ["osv"]
title = "W3M IMG标签ALT属性跨站脚本攻击（XSS）漏洞"
updated = "2026-06-16T21:59:08.977"

