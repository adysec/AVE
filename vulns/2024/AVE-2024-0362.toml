[basic]
description = "网康 NS-ASG 安全网关存在信息泄露漏洞，攻击者可通过访问 /configsave/ 目录下载 manufacture-default.tar.gz 配置文件，获取设备敏感配置信息，包括网络拓扑、认证凭据等。该漏洞无需认证即可利用，攻击复杂度低。"
published = "2024-07-26"
remediation = "在 Web 服务器（如 Nginx/Apache）配置中禁止访问 /configsave/ 目录，删除或移走 manufacture-default.tar.gz 文件，并配置访问控制策略仅允许授权 IP 访问管理后台。同时升级 NS-ASG 至最新版本以修复路径遍历问题。"
score = 5.0
severity = "MEDIUM"
sources = ["hwpoc"]
title = "网康 NS-ASG 安全网关信息泄露漏洞"
