[basic]
description = "高通 Eudora Internet Mail Server (EIMS) 2.01 及更早版本在 MacOS 系统上存在缓冲区溢出漏洞。远程攻击者可通过向 106 端口发送过长的 USER 命令触发缓冲区溢出，导致拒绝服务攻击。该漏洞影响 Qualcomm Eudora Internet Mail Server 1.2 版本，攻击者无需认证即可远程利用，CVSS 评分 5.0，属中危级别。"
published = "1998-04-14T04:00:00.000"
remediation = "建议立即迁移至现代邮件服务器软件（如 Postfix、Exim、Microsoft Exchange），Qualcomm Eudora Internet Mail Server 已于 2006 年停止开发且无安全补丁。临时缓解：防火墙屏蔽 TCP 106 端口（POP3 服务端口），或在防火墙/TCP Wrapper 限制仅信任 IP 访问 106 端口，同时禁用不必要的 POP3 服务。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "高通 Eudora 互联网邮件服务器 1.2 远程缓冲区溢出漏洞"
updated = "2026-06-16T21:49:44.867"

