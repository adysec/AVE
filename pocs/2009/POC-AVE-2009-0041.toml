[info]
author = "ave"
description = "Adobe Flash Player 10.x（10.0.42.34 之前版本）及 Adobe AIR 1.5.3 之前版本存在内存破坏漏洞。攻击者可通过构造特制的恶意文件或网络内容触发内存越界写入，无需身份认证即可在目标系统上执行任意代码。该漏洞影响所有使用受影响版本 Flash Player 或 Adobe AIR 的 Windows 系统，攻击条件为受害者打开或加载恶意 Flash 内容。"
id = "POC-AVE-2009-0041"
name = "CVE-2009-3797 PoC"
severity = "critical"
tags = ["ave-2009-0041"]
vuln_id = [
    "CVE-2009-3797",
    "AVE-2009-0041",
]

[poc]
logic = "all"

[[poc.requests]]
path = "/etc/passwd"
protocol = "file"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["root:"]
