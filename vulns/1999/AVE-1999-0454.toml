[basic]
description = "MetaInfo MetaWeb Web 服务器存在未授权脚本上传与执行漏洞。远程攻击者无需身份认证即可通过 HTTP 请求向目标服务器上传任意脚本文件，并直接访问执行该脚本，从而获取服务器控制权或执行任意命令。该漏洞影响 MetaWeb 多个版本，CVSS 评分 10.0，危害等级严重。目前厂商已停止维护，建议用户迁移至其他 Web 服务器软件。"
published = "1999-01-01T05:00:00.000"
remediation = "立即停止使用 MetaInfo MetaWeb 服务器，该产品已停止维护且无安全更新可用。迁移至受支持的 Web 服务器（如 Apache HTTP Server 或 Nginx），并配置严格的上传权限控制，禁止脚本文件在可写目录下执行。如无法立即迁移，应将服务器置于隔离网络并限制外部访问。"
score = 10
severity = "CRITICAL"
sources = ["exploitdb"]
title = "MetaInfo MetaWeb 文件上传与脚本执行漏洞"
updated = "2026-06-16T21:48:02.347"

