[basic]
description = "Linux 内核 MTD（Memory Technology Device）子系统的 init_mtd() 函数存在资源泄漏漏洞。在模块初始化过程中，若 init_mtdchar() 调用失败，mtd_bdi 未能正确注销，导致后续重新加载 mtd 模块时因设备名冲突而失败。本地攻击者可利用此漏洞触发拒绝服务（需具备模块加载权限），影响使用 Linux 内核 MTD 子系统的系统。CVSS 评分 5.5，危害等级中等。"
published = "2025-09-15T15:15:41.953"
remediation = '升级 Linux 内核至 6.2 及以上版本，或更新至发行版已包含该修复的内核包（如 5.10.163、5.15.88、6.1.6）。无法立即升级时，可临时卸载 mtd 内核模块（modprobe -r mtd）并黑名单加载（echo "blacklist mtd" >> /etc/modprobe.d/blacklist.conf），避免在受影响的模块环境中重载触发资源泄漏。'
score = 5.5
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux Kernel MTD 核心模块资源泄漏漏洞"
updated = "2026-06-17T05:23:11.620"

