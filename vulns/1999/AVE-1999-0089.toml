[basic]
description = "SGI IRIX 5.3及6.2版本系统中的 ordist 命令存在缓冲区溢出漏洞。本地攻击者可利用特制的输入参数触发该漏洞，覆盖内存中的关键数据，从而获取 root 权限。该漏洞影响 SGI IRIX 系列操作系统，攻击者需拥有本地访问权限，无需身份认证即可提权至 root 级别，CVSS 评分 8.4，危害等级高。"
published = "1997-07-16T04:00:00.000"
remediation = "建议立即升级到 SGI IRIX 6.5 或更新版本，并安装 SGI 安全补丁包。如无法升级，临时缓解措施为移除 ordist 的 setuid 位：chmod 0755 /usr/bsd/ordist，阻止普通用户以 root 执行 ordist。对于仍在运行的遗留系统，建议迁移到受支持的 Linux/Unix 平台。警惕：移除 setuid 位后 ordist 的部分功能将不可用。"
score = 8.4
severity = "HIGH"
sources = ["epss"]
title = "SGI IRIX ordist 本地权限提升漏洞"
updated = "2026-06-16T21:47:23.303"

