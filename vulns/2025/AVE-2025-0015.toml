[basic]
description = "Next.js 中间件存在认证绕过漏洞（CWE-285/863），攻击者通过在请求中构造恶意的 `x-middleware-subrequest` 请求头，可绕过中间件中的权限检查逻辑，直接访问本应受保护的内部路由。该漏洞影响 Next.js 全系版本（1.11.4 至 12.3.5/13.5.9/14.2.25/15.2.3 之前版本），所有依赖中间件进行鉴权的 Next.js 应用均受影响。CVSS 评分 9.1，危害等级严重。修复方式为升级至安全版本或在 Web 服务器层（如 WAF/Nginx）过滤 `x-middleware-subrequest` 请求头。"
published = "2025-03-21T15:15:42.660"
remediation = "升级到 Next.js 12.3.5+ / 13.5.9+ / 14.2.25+ / 15.2.3+ 或更高版本；如无法立即升级，在 Nginx/Apache/WAF 层配置规则拦截并删除外部请求中的 `x-middleware-subrequest` 请求头。"
score = 9.1
severity = "CRITICAL"
sources = ["hwpoc"]
title = "Vercel Next.js 中间件认证绕过漏洞"
updated = "2026-06-17T09:05:53.640"

