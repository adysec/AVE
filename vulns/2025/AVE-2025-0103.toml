[basic]
description = "泛微 ecology9 的 FormmodeFieldBrowserServlet 接口存在严重的SQL注入漏洞，攻击者无需认证即可向该接口发送恶意请求，利用参数注入实现对数据库的任意操作。该漏洞影响泛微ecology9全系列产品，攻击者可通过构造恶意SQL查询语句读取、修改或删除敏感数据，甚至可能导致整个应用服务器沦陷。漏洞位于后台Servlet组件，处理用户输入参数时未进行有效过滤和转义，是典型的注入类安全问题，极易被攻击者利用，对企业数据安全构成严重威胁。"
published = "2025-07-02"
remediation = "立即升级泛微ecology9至最新安全补丁版本（明确指定版本号），同时在反向代理层或WAF设备中添加严格的输入验证规则，对FormmodeFieldBrowserServlet接口的参数进行参数化查询和SQL关键字过滤处理，并限制该接口仅允许白名单IP访问。"
score = 8.5
severity = "HIGH"
sources = ["hwpoc"]
title = "泛微 ecology9 FormmodeFieldBrowserServlet Servlet 接口 SQL 注入漏洞"
updated = "2026-07-20"

