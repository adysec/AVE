[basic]
description = "MIT Kerberos 5 的 krb425_conv_principal 函数在将 Kerberos V4 主体名转换为 V5 格式时，对输入长度缺乏边界检查，存在栈缓冲区溢出漏洞。远程攻击者无需身份认证即可向密钥分发中心（KDC）或相关服务发送特制的 Kerberos 认证请求，触发溢出并以 root 权限执行任意代码。受影响版本包括 Kerberos 5 1.0 及 Cygnus Network Security、Kerbnet 等早期实现，危害等级严重。"
published = "2000-05-16"
remediation = "受影响用户应升级至已修复该漏洞的 MIT Kerberos 5 1.1.1 或更高版本（krb5-1.1.1 已修复 krb425_conv_principal 缓冲区溢出）。Red Hat 用户安装 RHSA-2000-025 对应补丁包；若暂无法升级，可在 krb5.conf 配置中禁用 krb4 兼容转换（将 krb4_convert 设为 false 并移除 v4 兼容配置），同时以最小权限运行 KDC 并过滤非信任网络对 88/750 端口的访问。"
score = 10.0
severity = "CRITICAL"
sources = ["cve"]
title = "MIT Kerberos 5 krb425_conv_principal 函数缓冲区溢出漏洞"
updated = "2026-06-16"

