[basic]
description = "Solaris 2.6 动态链接器在处理 LD_PROFILE 环境变量时存在不安全文件创建漏洞。本地攻击者可通过结合符号链接攻击，在运行 setuid 或 setgid 程序时触发动态链接器以特权身份创建恶意文件，从而可能导致权限提升或系统文件被覆写。攻击前提是拥有本地 shell 访问权限，利用难度较低。该漏洞影响 Solaris 2.6 操作系统。"
published = "1999-09-22T04:00:00.000"
remediation = "建议升级至 Solaris 7 及以上版本（该漏洞在 Solaris 7 中已修复），或安装 Sun 安全补丁 106541-13 及后续版本。如无法立即升级，可通过限制普通用户设置 LD_PROFILE 环境变量（在 /etc/system 中配置并重启）作为临时缓解措施，或移除 prof(1) 的 setuid 权限。"
score = 4.6
severity = "MEDIUM"
sources = ["avd"]
title = "Sun Solaris 动态链接器 LD_PROFILE 本地文件创建漏洞"
updated = "2026-06-16T21:49:03.317"

