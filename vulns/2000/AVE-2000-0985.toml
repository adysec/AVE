[basic]
description = "EFTP 2.0.4.281 中存在缓冲区溢出漏洞，当远程攻击者向服务器发送不包含换行的特殊字符串并快速断开连接时，程序的堆内存区域将被非法覆盖，导致核心程序崩溃无法响应。该漏洞影响 EFTP 服务端软件，直接导致拒绝服务攻击，无法继续提供网络文件传输服务。此外，攻击者可能通过精心构造的溢出载荷劫持程序执行任意代码，控制受影响主机。该漏洞属于典型的网络协议解析安全缺陷，攻击者无需任何权限即可远程触发，因此在互联网暴露的 EFTP 服务器均面临严重威胁。漏洞 CVSS 评分 5.0，资深级别，需要立即修复以确保网络文件传输服务的可用性和安全性。"
published = "2000-11-14T05:00:00.000"
remediation = "升级到包含安全补丁的 EFTP 2.0.4.282 或更高版本，修复缓冲区溢出漏洞；禁用不必要的 EFTP 服务，限制匿名访问权限，通过防火墙封锁端口2121/20000，将终端最大处理字符串长度限制为1024 字节，强制所有客户端在发送指令前使用 STX/ETX 帧标记数据结束，避免触发 DoS 攻击。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Khamil Landross And Zack Jones EFTP 缓冲区溢出拒绝服务漏洞"
updated = "2026-06-16T21:52:38.617"

