[basic]
description = "Hassan Consulting Shopping Cart 1.18 的 shop.cgi 脚本对 page 参数未做充分的路径过滤，存在目录遍历漏洞。未经认证的远程攻击者可通过向 page 参数传递包含 `../` 序列的特制 HTTP 请求，绕过路径限制，读取 Web 服务器上的任意文件（如系统配置文件、源代码等），导致敏感信息泄露。该漏洞利用无需特殊权限，攻击门槛低，危害中等。"
published = "2000-12-19T05:00:00.000"
remediation = '立即升级到 Hassan Consulting Shopping Cart 的最新版本（如有），否则自行修复 shop.cgi，对 page 参数做路径过滤，拒绝包含 "../" 或 "%2e%2e/" 的输入。同时配置 Web 服务器（Apache 的 mod_rewrite）限制 CGI 可访问目录范围，或迁移到现代受维护的购物车系统以彻底消除风险。'
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Hassan Consulting Shopping Cart 目录遍历漏洞"
updated = "2026-06-16T21:52:46.263"

