[basic]
description = "金蝶 Apusic 应用中间件存在远程代码执行漏洞，由于对用户输入数据验证不严，攻击者可通过构造特制的恶意请求包，利用反序列化或命令执行接口，在未经身份认证的情况下向目标服务器提交攻击载荷，进而实现远程代码执行，完全控制服务器。该漏洞影响金蝶 Apusic 全系列版本，危害严重，建议用户尽快升级至最新版本。"
published = "2025-07-04"
remediation = "建议立即联系金蝶官方获取 Apusic 应用中间件安全补丁并升级至最新版本；在升级前可临时通过防火墙限制对中间件管理端口及反序列化接口的访问，部署 Web 应用防火墙（WAF）拦截恶意载荷，同时禁用不必要的远程调试功能和默认管理路径，并加强服务器日志审计以实时检测异常访问行为。"
score = 9.8
severity = "CRITICAL"
sources = ["hwpoc"]
title = "金蝶 Apusic 应用中间件远程代码执行漏洞"
