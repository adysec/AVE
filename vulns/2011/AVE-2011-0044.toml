[basic]
description = "Adobe Flash Player 10.2.154.27 之前版本及 Adobe AIR 2.6.19140 之前版本存在类型混淆漏洞，攻击者可通过构造特制的 SWF 文件（如嵌入 Office 文档的 .swf）触发对象类型混淆，导致远程代码执行或应用崩溃。该漏洞影响 Windows、Mac OS X、Linux、Solaris 及 Android 平台上的 Flash Player 及 Adobe Reader/Acrobat，早在 2011 年 4 月已发现在野利用。CVSS 评分 8.8，危害等级高。"
published = "2011-04-13T14:55:01.217"
remediation = "将 Adobe Flash Player 升级至 10.2.154.27 及以上版本，Adobe AIR 升级至 2.6.19140 及以上版本，Adobe Reader/Acrobat 9.x 升级至 9.4.4、10.x 升级至 10.0.3（Mac）或 10.0.1（Windows）。临时缓解措施可在浏览器中禁用 Flash 插件，并在 Microsoft Office 中禁用嵌入的 SWF 内容执行。"
score = 8.8
severity = "HIGH"
sources = ["kev"]
title = "Adobe Flash Player 类型混淆远程代码执行漏洞"
updated = "2026-06-16T23:27:44.830"

