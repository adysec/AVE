[basic]
description = "Rational Software ClearCase for Unix 3.2 中的 db_loader 程序存在竞争条件漏洞。本地用户可利用该程序在处理 SUID 位时的竞态缺陷，通过精心构造的时序攻击绕过权限检查，将普通文件权限提升至 root 级别。攻击者需具有本地系统访问权限并精确控制竞争窗口，成功利用后可获取目标系统的完全控制权，CVSS 评分 6.2，危害等级中危。"
published = "1999-02-08T05:00:00.000"
remediation = "升级 Rational ClearCase 至 3.2.1 及以上版本，官方已修复 db_loader 中的竞态条件问题。如无法升级，可手动移除 db_loader 程序的 SUID 位（chmod u-s /path/to/db_loader），并限制仅授权用户可执行该程序，作为临时缓解措施。"
score = 6.2
severity = "MEDIUM"
sources = ["avd"]
title = "Rational Software ClearCase db_loader 竞态条件本地权限提升漏洞"
updated = "2026-06-16T21:48:12.480"

