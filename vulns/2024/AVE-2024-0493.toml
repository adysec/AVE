[basic]
description = "LuaJIT 及 OpenRusty luajit2 的栈溢出处理函数（lj_state.c）存在越界读取漏洞（CWE-125）。当 Lua 脚本触发栈溢出时，处理函数未能正确校验内存边界，可被攻击者利用构造特制脚本触发越界读取，导致敏感信息泄露。CVSS 评分 9.1，危害严重。影响 LuaJIT 2.1 及之前版本、OpenRusty luajit2 v2.1-20240314 之前版本。用户应升级至 luajit2 v2.1-20240314 或更高版本修复。"
published = "2025-07-07T17:15:27.527"
remediation = "将 LuaJIT 升级至包含 commit defe61a56751 的版本（2024 年 3 月后快照）；使用 OpenResty 的用户将 luajit2 升级至 v2.1-20240314 或更高版本。Debian 用户可通过 `apt upgrade luajit` 安装 2025 年 8 月 LTS 安全更新。无法立即升级时，可在应用层限制不可信 Lua 脚本的加载执行作为临时缓解。"
score = 9.1
severity = "CRITICAL"
sources = ["msrc"]
title = "LuaJIT 和 OpenRusty luajit2 栈溢出处理程序越界读取漏洞"
updated = "2026-06-17T07:15:39.223"

