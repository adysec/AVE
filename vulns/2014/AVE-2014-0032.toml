[basic]
description = "Fonality trixbox 的 maint/modules/ 目录下多个 PHP 文件存在目录遍历漏洞。远程攻击者无需身份认证即可通过向 lang 参数注入 `../` 序列，跨目录读取服务器上任意文件，如 `/etc/passwd` 等敏感配置文件。该漏洞影响 trixbox 全版本，CVSS 评分 5.0，危害等级中危。攻击者仅需发送特制 HTTP 请求即可触发，利用方式简单且已有公开 PoC。"
published = "2014-07-28T15:55:04.477"
remediation = "升级 Fonality trixbox 至官方发布的最新安全版本；如已停止维护，建议迁移至其他受支持的 PBX 系统（如 FreePBX 或 Asterisk 官方发行版）。临时缓解措施：在 Web 服务器（Apache/Nginx）层面配置 URL 重写规则，拦截包含 `../` 的 `lang` 参数请求，或限制 `maint/modules/` 目录的访问权限。"
score = 5
severity = "MEDIUM"
sources = ["nuclei"]
title = "Fonality trixbox 多个目录遍历漏洞"
updated = "2026-06-17T00:11:04.493"

