[basic]
description = "Adobe Reader 和 Acrobat 存在释放后使用（Use-After-Free）漏洞。攻击者可通过向用户发送特制的 PDF 文件，诱导其打开后触发内存错误引用，从而导致任意代码执行。该漏洞影响 Windows 和 Mac OS X 平台上 Adobe Reader/Acrobat 10.x 系列低于 10.1.9 及 11.x 系列低于 11.0.06 的版本。利用无需身份认证但需要用户交互，已被 CISA 列入已知被利用漏洞目录（KEV），在野攻击活跃。"
published = "2014-01-15T16:13:04.100"
remediation = "立即升级 Adobe Reader 及 Acrobat 至 10.1.9 / 11.0.06 或更高版本；可通过软件内置更新功能 (帮助 → 检查更新) 或访问 Adobe 官网下载最新安装包。对于无法立即升级的系统，建议禁用浏览器内 PDF 预览插件，并将 PDF 文件默认使用浏览器外打开，降低触发 use-after-free 利用的风险。"
score = 8.8
severity = "HIGH"
sources = ["kev"]
title = "Adobe Reader/Acrobat 释放后使用远程代码执行漏洞"
updated = "2026-06-17T00:03:09.010"

