[basic]
description = "Gossamer Threads DBMan 2.0.4 中的 db.cgi CGI 脚本存在信息泄露漏洞，远程攻击者可通过向 db 参数传递不存在的数据库名称，触发脚本返回系统环境变量及配置信息。该漏洞无需身份认证即可利用，可能导致敏感信息泄露，为进一步攻击提供便利。受影响版本为 DBMan 2.0.4。"
published = "2000-05-05T04:00:00.000"
remediation = "升级至 DBMan 2.0.5 或更高版本，该版本已修复 db.cgi 在接收非 existent 数据库参数时泄露环境变量和配置信息的问题。若无法升级，可在 Web 服务器层面对 db.cgi 实施访问控制（如限制来源 IP、移除 CGI 执行权限），并在脚本入口处增加参数校验，拒绝包含非预期 database 参数的请求。"
score = 6.4
severity = "MEDIUM"
sources = ["cve"]
title = "Gossamer Threads DBMan 2.0.4 db.cgi CGI脚本信息泄露漏洞"
updated = "2026-06-16T21:51:35.887"

