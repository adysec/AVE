[basic]
description = "Solaris 系统 sysdef 命令存在内核内存泄露缺陷，本地攻击者可利用该命令读取内核敏感数据，进而获取 root 权限。该漏洞影响 Solaris 2.3、2.4、2.5 和 2.5.1 版本，攻击者需要本地系统访问权限。"
published = "1997-10-01"
remediation = "升级 Solaris 系统至厂商提供的最新补丁级别，限制普通用户对 sysdef 命令的执行权限，或移除 sysdef 命令的 setuid 位。"
score = 7.2
severity = "HIGH"
sources = ["cve"]
title = "Solaris sysdef 命令本地权限提升漏洞"
updated = "2026-06-16"

