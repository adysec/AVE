[basic]
description = "BSD 操作系统中 xlock 屏幕锁定程序存在缓冲区溢出漏洞。本地攻击者可通过向 xlock 程序发送特制的超长输入数据触发缓冲区溢出，从而覆盖内存中的执行流程，实现以 root 权限执行任意命令。该漏洞影响多个 BSD 衍生系统，攻击者需要拥有本地系统访问权限，无需认证即可利用，CVSS 评分 8.4，危害等级高。"
published = "1997-04-26T04:00:00.000"
remediation = "升级 xlock 至 xlockmore 2.5 及以上版本，或从操作系统厂商获取对应补丁（Sun 补丁 ID 10145）。在无法升级的环境中，限制不可信用户本地登录权限，移除 xlock 的 setuid root 权限位以阻止提权，或使用其他屏幕锁定工具替代。"
score = 8.4
severity = "HIGH"
sources = ["epss"]
title = "BSD xlock 缓冲区溢出本地代码执行漏洞"
updated = "2026-06-16T21:47:25.473"

