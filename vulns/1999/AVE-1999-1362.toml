[basic]
description = "CSM Proxy 4.1 的 FTP 端口处理组件存在缓冲区溢出漏洞，远程攻击者无需身份认证即可向目标服务器的 FTP 端口（默认 21）发送超长字符串，触发缓冲区溢出导致代理服务崩溃，造成拒绝服务。该漏洞影响 CSM Proxy 4.1 版本，攻击条件低，仅需网络可达即可实施。"
published = "1998-07-16T04:00:00.000"
remediation = "CSM Proxy 4.1 已停止维护，无官方补丁可用。建议立即升级至受支持的代理服务器软件（如 Squid、HAProxy 等）。如无法升级，在防火墙层面限制对 FTP 端口（21）的访问，仅允许受信任 IP 连接，并部署入侵检测系统监控异常流量。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "CSM Proxy 4.1 FTP 缓冲区溢出拒绝服务漏洞"
updated = "2026-06-16T21:49:49.540"

