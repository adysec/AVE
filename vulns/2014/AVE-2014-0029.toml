[basic]
description = "WordPress Tera Charts 插件 0.1 版本中存在目录遍历漏洞，由于未能正确过滤 `charts/treemap.php` 和 `charts/zoomabletreemap.php` 中 `fn` 参数的用户输入，允许未经身份认证的远程攻击者通过 `../` 路径穿越序列读取服务器上的任意文件，导致敏感信息泄露。攻击无需任何认证，利用复杂度低，仅需向目标站点发送特制的 HTTP 请求即可触发。"
published = "2014-07-11T20:55:03.420"
remediation = "立即停用并删除 Tera Charts (tera-charts) 插件 0.1 版本，该插件已长期未维护且无安全更新。如仍需使用图表功能，请替换为其他受支持的 WordPress 图表插件（如 Chartify 或 Visualizer）。同时，在 Web 服务器（Nginx/Apache）配置中禁用 `fn` 参数对文件系统的目录遍历访问，添加规则拦截 `../` 路径模式。作为深层防护，确保 WordPress 安装目录 `wp-content/plugins/` 具有最小权限（755），并启用 Web 应用防火墙（WAF）规则拦截路径遍历攻击。"
score = 5
severity = "MEDIUM"
sources = ["nuclei"]
title = "WordPress TeraCharts 任意文件读取漏洞"
updated = "2026-06-17T00:10:48.557"

