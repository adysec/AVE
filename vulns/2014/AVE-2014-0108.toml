[basic]
description = "Adobe Acrobat/Reader 10.x 10.1.11 之前版本和 11.x 11.0.08 之前版本在 Windows 上存在沙箱绕过漏洞，攻击者可通过未公开的攻击向量绕过沙箱保护机制，在权限上下文中执行任意本地代码。该漏洞影响 Windows 平台上的 Adobe Reader 和 Acrobat 10.x 版本（10.1.11 之前）及 11.x 版本（11.0.08 之前），CVSS 3.1 评分 9.8（严重），攻击向量为网络、攻击复杂度低、无需权限、无需用户交互，机密性、完整性、可用性影响均为高。该漏洞已被列入 CISA 已知被利用漏洞目录，卡巴斯基威胁报告显示其曾被用于定向攻击。Adobe 已发布安全更新修复该漏洞，用户应升级至 10.1.11 或 11.0.08 及以上版本。"
published = "2014-08-12T21:55:06.460"
remediation = "立即升级 Adobe Reader/Acrobat 至 10.1.11 或 11.0.08 及以上版本（Windows 版本）。临时缓解：在 Adobe Reader/Acrobat 首选项中禁用 JavaScript，或在浏览器中禁用 Adobe PDF 插件，限制非受信 PDF 文件打开权限。"
score = 9.8
severity = "CRITICAL"
sources = ["kev"]
title = "Adobe Acrobat Reader 任意代码执行漏洞"
updated = "2026-06-17T00:03:15.103"

