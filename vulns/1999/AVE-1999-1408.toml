[basic]
description = "WFTPD FTP服务器在处理MKD（创建目录）和CWD（切换目录）命令时存在缓冲区溢出漏洞。远程攻击者无需身份认证，通过向目标FTP服务器发送特制的MKD和CWD命令序列创建深层嵌套目录，可触发栈缓冲区溢出，导致以root权限执行任意代码，完全控制受影响系统。该漏洞影响WFTPD 2.34/2.40/3.0版本，CVSS v2评分10.0，危害等级严重。"
published = "1999-10-28"
remediation = "WFTPD已停止维护多年，官方不再提供安全更新。建议立即将FTP服务迁移至仍在维护的FTP服务器软件（如vsftpd、ProFTPD或FileZilla Server），并配置防火墙限制FTP服务仅对可信网络开放，同时禁用匿名登录和危险FTP命令。"
score = 10.0
severity = "CRITICAL"
sources = [
    "cve",
    "exploitdb",
]
title = "Texas Imperial Software WFTPD FTP服务器 远程缓冲区溢出漏洞"
updated = "2024-11-20"

