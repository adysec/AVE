[basic]
description = "HP-UX 10.00 和 10.01 版本中的 nettune 工具以 setuid root 权限安装，导致本地用户可通过修改关键网络配置信息触发拒绝服务漏洞。该漏洞源于 nettune 程序以 root 权限运行且缺乏适当的权限检查，本地攻击者可利用该工具修改关键网络配置参数，导致网络服务中断或系统网络功能瘫痪。攻击条件要求攻击者拥有本地系统访问权限，利用方式为直接调用 nettune 工具修改网络配置参数。CVSS 评分 2.1，属于低危本地拒绝服务漏洞，影响范围限于 HP-UX 10.00 和 10.01 版本。"
published = "1996-06-07T04:00:00.000"
remediation = "升级到 HP-UX 10.20 或更高版本以修复该缺陷；在无法立即升级时，使用 chmod u-s /usr/sbin/nettune 移除 nettune 的 setuid root 权限，并限制仅 root 可访问，防止本地用户篡改关键网络配置引发拒绝服务。"
score = 2.1
severity = "LOW"
sources = ["avd"]
