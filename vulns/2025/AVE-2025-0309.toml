[basic]
description = "用友畅捷通T+ 存在信息泄露漏洞，攻击者无需认证即可通过向 `/tplus/ajaxpro/Ufida.T.SM.Login.UIP.LoginManager,Ufida.T.SM.Login.UIP.ashx?method=CheckPassword` 接口发送特制请求，获取系统中已注册的用户列表及账号信息，导致敏感数据泄露。该漏洞影响畅捷通T+ 全版本，攻击条件简单且危害较大，建议用户尽快升级至最新版本或限制接口访问权限。"
published = "0705"
remediation = "建议升级畅捷通T+至最新版本（≥13.0），或安装官方发布的安全补丁。临时缓解措施：在Web应用防火墙(WAF)或反向代理层面添加规则，拦截对 `/tplus/ajaxpro/Ufida.T.SM.Login.UIP.LoginManager,Ufida.T.SM.Login.UIP.ashx` 路径的异常访问请求，并限制该接口仅允许内网IP访问。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "用友 畅捷通T+ getdecallusers 信息泄露漏洞"
updated = "0705"

