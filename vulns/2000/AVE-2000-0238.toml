[basic]
description = "Panda Security 3.0 存在安全配置缺陷，本地用户可通过 Windows 系统自带的「添加/删除程序」控制面板直接卸载该安全软件，无需管理员权限验证。攻击者在获得系统本地访问权限后，可利用此漏洞轻松移除防病毒防护，使目标系统暴露于恶意软件感染风险之下，为后续安装后门、木马等恶意程序创造有利条件。"
published = "2000-04-17"
remediation = "升级 Panda Security 至 3.0 以上版本（如 Platinum 或 Global 版），这些版本在卸载时要求输入管理员密码。如无法升级，可通过组策略或注册表禁用普通用户的「添加/删除程序」权限，防止非授权卸载杀毒软件。同时开启 Windows 审核策略，监控 msiexec 卸载行为。"
score = 4.6
severity = "MEDIUM"
sources = [
    "cve",
    "avd",
]
title = "Panda Security 3.0 安全软件可被任意卸载漏洞"
updated = "2026-06-16"

