[basic]
description = "Windows NT 4.0 帮助文件实用程序（help file utility）在处理格式错误的帮助文件（.hlp/.chm）时存在缓冲区溢出漏洞。未经身份认证的远程攻击者可通过诱骗用户打开特制的恶意帮助文件触发该漏洞，导致在目标系统上执行任意代码或造成拒绝服务。该漏洞影响 Windows NT 4.0 全系列版本（含 SP1 至 SP5），CVSS 评分 4.6，危害等级中等。攻击者通常将恶意帮助文件捆绑于邮件附件或下载链接中，诱导用户手动打开即可触发利用。Microsoft 已在后续安全更新中修复该漏洞，受影响用户应安装相应补丁并避免打开来源不明的帮助文件。"
published = "1999-05-17T04:00:00.000"
remediation = '安装 Microsoft 于 1999 年 5 月 17 日发布的安全公告 MS99-015 所附补丁（KB231605），或通过 Windows Update 自动更新以消除该漏洞。如补丁不适用于当前环境，应将系统升级至受支持的 Windows 版本（如 Windows Server 2012 R2 或更高版本）。作为临时缓解措施，将 %windir%\Help 目录的写入权限限制为仅管理员，并禁止打开来源不明的 .hlp 帮助文件，同时部署应用控制策略阻止非授权帮助文件的执行。'
score = 4.6
severity = "MEDIUM"
sources = ["epss"]
