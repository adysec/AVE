[basic]
description = "GlimpseHTTP/WebGlimpse 中的 aglimpse CGI 程序存在远程命令注入漏洞。aglimpse 组件在处理用户输入时未正确过滤管道符（|），攻击者可通过向该 CGI 接口发送特制的 HTTP 请求，将任意系统命令通过管道传递给底层 shell 执行，导致远程代码执行。该漏洞影响 GlimpseHTTP 1.0/2.0 及 WebGlimpse 1.0 版本，CVSS 评分 7.5，危害等级高危。攻击无需身份认证，利用难度低，可导致目标服务器敏感信息泄露或完全受控。"
published = "1997-07-01T04:00:00.000"
remediation = "删除或禁用 GlimpseHTTP 及 WebGlimpse 中的 aglimpse CGI 脚本，或升级至不受影响的版本。建议停止使用已停止维护的 GlimpseHTTP 产品，迁移至活跃维护的 Web 服务器（如 Apache HTTP Server 或 Nginx），并移除所有 CGI 脚本的未授权执行权限。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "Glimpse HTTP/WebGlimpse aglimpse CGI 远程命令执行漏洞"
updated = "2026-06-16T21:47:41.957"

