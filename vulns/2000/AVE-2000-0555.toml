[basic]
description = "StarOffice StarScheduler 组件存在缓冲区溢出漏洞，远程攻击者无需身份认证即可向目标服务器发送超长 GET 请求触发该漏洞，导致堆栈缓冲区溢出，进而以 root 权限执行任意代码。该漏洞影响 StarOffice 系列产品，CVSS 评分 10.0，危害等级严重，建议用户及时升级至修复版本。"
published = "2000-03-09T05:00:00.000"
remediation = "StarOffice 已发布 StarScheduler 补丁，建议升级至 StarOffice 5.1a 或更高版本以修复此缓冲区溢出漏洞。该产品已停止维护，建议迁移至 LibreOffice 等仍在维护的办公套件；如无法升级，可在 Web 服务器前端限制 HTTP 请求 URI 长度以缓解风险。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "StarOffice StarScheduler Web 服务器缓冲区溢出漏洞"
updated = "2026-06-16T21:51:09.427"

