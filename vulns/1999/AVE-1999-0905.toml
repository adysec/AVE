[basic]
description = "Microsoft FrontPage 在默认配置下会将网站表单提交的结果保存于文档根目录下的 /_private/form_results.txt 文件中，该文件具有全局可读权限且可直接通过 HTTP 访问。由于该路径为默认位置且未进行访问控制，远程攻击者无需身份认证，只需向目标站点发起普通的 HTTP GET 请求即可读取此文件内容，从而获取其他用户通过表单提交的敏感信息，如姓名、邮箱、电话、留言等个人数据。该漏洞影响使用默认配置且未修改该文件权限或移除该文件的 Microsoft FrontPage 网站，属于信息泄露类配置缺陷。"
published = "1999-08-24T04:00:00.000"
remediation = "升级到 Microsoft FrontPage 2000 或更高版本，并在 Web 服务器中删除站点根目录下 /_private/form_results.txt 文件。将表单结果保存路径移出 Web 文档根目录，或在 Web 服务器配置中拒绝对该目录的匿名访问（如用 .htaccess 或 IIS 目录权限设置为不可列出、不可读取），对表单提交内容做访问控制与加密存储以缓解信息泄露。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = '{"_meta":{},"stopReason":"end_turn","usage":{"inputTokens":10796,"outputTokens":20,"totalTokens":10816}}'
