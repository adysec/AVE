[basic]
description = "天翼视联指挥调度管理平台 uploadgps.php 接口存在 SQL 注入漏洞，攻击者可在未经认证的情况下通过构造特制的 HTTP 请求参数注入恶意 SQL 语句，进而获取数据库中的敏感信息甚至获取服务器权限。该漏洞影响天翼视联指挥调度管理平台相关版本，危害较大，建议用户及时升级修复。"
published = "0723"
remediation = "厂商应立即对 uploadgps.php 中所有用户输入参数进行参数化查询改造，使用 PDO 预处理语句替代字符串拼接 SQL；同步在 Web 应用防火墙（WAF）侧添加对该接口 POST 参数的 SQL 注入特征过滤规则，拦截常见注入载荷（如 union、sleep、单引号闭合等）；限制数据库连接用户权限至最小必要范围，禁止使用高权限数据库账户连接 Web 应用。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "天翼视联 天翼视联指挥调度管理平台 uploadgps.php SQL注入漏洞"
updated = "0723"

