[basic]
description = "Apple WebObjects Developer 4.5 包中的 WebObjects.exe 存在缓冲区溢出漏洞。攻击者无需身份认证即可通过网络向目标系统发送包含超长 HTTP 请求头（如 Accept 字段）的特制请求，触发缓冲区溢出导致服务拒绝。该漏洞影响运行 Windows NT4 系统并配合 IIS4.0 CGI 适配器使用的 WebObjects Developer 4.5 版本。攻击者仅需向受影响服务器发送构造好的 HTTP 请求即可利用此漏洞，使 WebObjects 服务崩溃或不可用。"
published = "2000-04-04T04:00:00.000"
remediation = "建议将 Apple WebObjects Developer 升级至 5.0 或更高版本以彻底修复此缓冲区溢出漏洞。如短期内无法升级，可在 IIS 4.0 中通过注册表限制 MaxFieldLength 和 MaxRequestBytes 参数，或在防火墙/WAF 层面拦截超长 HTTP 请求头（如 Accept），以临时缓解拒绝服务攻击风险。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Apple WebObjects Developer 远程缓冲区溢出漏洞"
updated = "2026-06-16T21:51:25.650"

