[basic]
description = "SGI IRIX 操作系统的帮助系统组件 sgihelp（含打印管理器）在 5.2 及更早版本（含 5.1）中存在本地权限提升漏洞。该漏洞源于 sgihelp 在处理请求时未正确校验用户权限，本地已登录的普通用户可通过调用 clogin 命令等途径利用该程序缺陷，以非正常方式获取 root 超级用户权限。由于该漏洞为本地漏洞，攻击者需先获得目标系统的合法本地账户访问权限才能实施利用，影响范围为运行 IRIX 5.1 与 5.2 的 SGI 工作站及服务器。"
published = "1994-08-11T04:00:00.000"
remediation = "升级 SGI IRIX 至 6.2 或更高已修复版本，并安装 SGI 官方针对 sgihelp 与打印管理器的安全补丁（如适用补丁集）。若无法立即升级，可临时移除或限制 sgihelp、clogin 等脆弱二进制文件的 setuid root 权限（使用 chmod u-s 取消 setuid 位），并限制非授权本地用户访问以缓解本地提权风险。"
score = 7.2
severity = "HIGH"
sources = ["exploitdb"]
title = "SGI IRIX 5.1/5.2 sgihelp 本地权限提升漏洞"
updated = "2026-06-16T21:49:58.367"

