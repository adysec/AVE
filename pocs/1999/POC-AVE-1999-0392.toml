[info]
author = "ave"
description = "检测 Microsoft Hotmail 中通过 HTML STYLE 标签嵌入 JavaScript 的跨站脚本漏洞（CVE-1999-0750）。攻击者可在 STYLE 标签中注入 javascript:url 或 expression() 等恶意代码，当用户使用 IE5 或 Netscape 4.x 访问包含恶意 STYLE 标签的邮件时，脚本在用户浏览器上下文中执行。"
id = "POC-AVE-1999-0392"
name = "Microsoft Hotmail STYLE Tag XSS PoC"
severity = "medium"
tags = ["ave-1999-0392"]
vuln_id = [
    "CVE-1999-0750",
    "AVE-1999-0392",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/mail/"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["Hotmail"]
