[basic]
description = 'Cisco 路由器 9.17 及更早版本存在安全绕过漏洞，远程攻击者可通过向目标设备发送特制的 IP 源路由数据包，绕过本应通过 "no ip source-route" 命令拒绝的访问限制。该漏洞允许攻击者绕过 ACL 等安全策略，实现未授权网络访问。攻击者只需向目标路由器发送特制 IP 数据包即可触发，无需任何身份认证。该漏洞影响运行 Cisco IOS 9.17 及之前版本的路由器设备。'
published = "1993-04-22T04:00:00.000"
remediation = "升级 Cisco IOS 到 9.17 以上版本以修复源路由绕过漏洞。在全局配置模式下执行 `no ip source-route` 命令禁用 IP 源路由功能，并在所有入站接口上配置 `ip verify unicast source reachable-via rx` 防止源地址欺骗。无法升级时，在边界路由器上使用 ACL 过滤源路由选项（IP 协议号 4）的数据包作为临时缓解。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "Cisco 路由器 IP 源路由安全绕过漏洞"
updated = "2026-06-16T21:49:57.987"

