[basic]
description = "OpenEMR 4.1.0 存在多处目录遍历漏洞，远程认证用户可通过在 contrib/acog/print_form.php、load_form.php、view_form.php 或 trend_form.php 等页面的 formname 参数中注入 ..（点点）序列，绕过路径限制读取服务器上的任意文件。攻击者无需特殊权限，仅需拥有系统合法账号即可利用该漏洞获取敏感信息，如配置文件、数据库凭证等。该漏洞源于程序未对用户输入的 formname 参数进行充分的路径过滤与校验，属于典型的 CWE-22 路径遍历漏洞，CVSS 评分 3.5，危害等级低。"
published = "2012-02-07T21:55:03.547"
remediation = "升级 OpenEMR 至 4.1.1 或更高版本，该版本已修复 formname 参数路径遍历漏洞。如无法升级，在 contrib/acog/print_form.php、interface/patient_file/encounter/load_form.php、view_form.php、trend_form.php 中对 formname 参数实施白名单校验，仅允许预定义表单文件名，拒绝包含 ../ 的输入。同时限制 Web 服务器对敏感目录的读取权限。"
score = 3.5
severity = "LOW"
sources = ["nuclei"]
title = "OpenEMR 4.1.0 路径遍历本地文件包含漏洞"
updated = "2026-06-16T23:38:37.527"

