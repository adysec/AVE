[basic]
description = "Id Software 出品的 Quake 1 及 NetQuake 游戏服务器存在拒绝服务漏洞。攻击者可通过伪造源地址，向目标服务器持续发送大量 UDP 连接请求数据包，触发服务器对连接资源的不当处理，导致资源耗尽或正常玩家被强制断开连接。该漏洞影响运行 Quake 1（1.9 版本）及 NetQuake 服务的服务器，攻击者可利用任何能发送 UDP 数据包的网络主机远程发起，无需身份认证，只需具备向目标服务器网络可达的条件即可造成服务不可用。"
published = "2001-07-17T04:00:00.000"
remediation = "建议将 Quake 1.服务器升级至官方后续修复版本（id Software 发布的 1.09 及以上补丁版本），启用服务端内置的连接速率限制与玩家上限保护；在网络层面通过防火墙或路由器对来自单个源 IP 的 UDP 6112 端口（Quake 默认端口）连接请求进行限速与伪造源过滤，并对未知来源 UDP 流量做丢包策略，以缓解 UDP 洪泛造成的资源耗尽与强制断连。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "ID Software Quake 1.9 UDP 洪水拒绝服务漏洞"
updated = "2026-06-16T21:50:44.320"

