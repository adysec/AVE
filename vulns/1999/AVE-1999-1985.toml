[basic]
description = "IBM HomePagePrint 1.0.7 for Windows98J 中的 IMG_SRC HTML 标签处理存在缓冲区溢出漏洞。当用户使用存在漏洞的浏览器访问恶意网站时，攻击者可通过在 HTML 页面中构造超长的 IMG_SRC 属性值触发缓冲区溢出，从而在受害者系统上执行任意代码。该漏洞无需用户交互即可触发，CVSS 评分 7.5，危害等级高，影响安装了 IBM HomePagePrint 1.0.7 的所有 Windows98J 系统。"
published = "1999-11-02T05:00:00.000"
remediation = '建议立即卸载 IBM HomePagePrint 1.0.7，该产品已停止维护且不再提供补丁下载。可改用操作系统自带打印功能或其他受支持的打印软件替代。在 IE 浏览器中禁用 ActiveX 控件和插件执行（安全级别设为"高"），并可考虑升级操作系统至受支持版本以彻底消除该风险。'
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "IBM HomePagePrint 缓冲区溢出漏洞"
updated = "2026-06-16T21:50:38.487"

