[basic]
description = "VideoLAN VLC Media Player 0.8.6d 的 httpd_FileCallBack 函数（network/httpd.c）存在格式化字符串漏洞，远程攻击者可通过在 HTTP 连接的 Connection 参数中注入格式化字符串格式符（如 %n、%s 等）触发该漏洞，导致远程代码执行。该漏洞影响 VLC 0.8.6d 及可能更早版本，攻击者无需认证即可远程利用，通过发送精心构造的 HTTP 请求即可触发。CVSS 评分 7.5（HIGH），攻击向量为网络、攻击复杂度低、无需认证、可导致机密性/完整性/可用性部分影响。ExploitDB 已公开 PoC（EDB-ID 5519），攻击者可构造恶意 HTTP 请求实现远程代码执行。VideoLAN 已在后续版本中修复该漏洞，建议升级至修复版本。"
published = "2008-01-17T01:00:00.000"
remediation = '建议立即升级 VLC Media Player 至 0.8.6e 或更高版本（如 0.8.6f、0.9.x、1.0.x 等后续稳定版）。下载地址：https://www.videolan.org/vlc/ 。如暂无法升级，可在防火墙或网络层面禁止 VLC 的 HTTP 服务端口（默认 8080）对外暴露，或在 VLC 设置中禁用 HTTP 界面（工具 → 偏好设置 → 界面 → 主界面 → 取消勾选 "Web 界面"）。'
score = 7.5
severity = "HIGH"
sources = ["tenable"]
title = "VideoLAN VLC媒体播放器0.8.6d 远程格式字符串漏洞"
updated = "2026-06-16T22:48:34.030"

