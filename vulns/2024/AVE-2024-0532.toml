[basic]
description = "Linux 内核 DLM（分布式锁管理器）子系统中存在空指针解引用漏洞。当从 request_lock() 函数调用时，由于 lkb->lkb_resource 尚未通过 attach_lkb() 完成资源分配，在特定日志输出路径下可能触发空指针解引用，导致系统崩溃（拒绝服务）。该漏洞需本地低权限用户触发，影响系统可用性，CVSS 评分 5.5，危害等级中危。"
published = "2025-01-11T13:15:22.583"
remediation = "立即升级 Linux 内核至以下安全版本：5.15.209 及以上、6.1.167 及以上、6.6.66 及以上、6.12.5 及以上，或直接升级至 6.13 主线版本。对应补丁提交为 2db11504ef82、6fbdc3980b70、b98333c67daf、8d55ce46dd54、e1ffea6bec96。Siemens SIMATIC S7-1500 MFP 系列用户请参考 Siemens 安全公告 SSA-019113 和 SSA-082556 更新固件。如无法立即升级，可禁用 DLM 内核模块（modprobe -r dlm）作为临时缓解措施。"
score = 5.5
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux Kernel DLM 空指针解引用漏洞"
updated = "2026-07-14T13:17:10.107"

