[info]
author = "ave"
description = "通过检查 /usr/openwin/bin/kcms_configure 文件存在性，验证目标系统是否存在 kcms_configure 缓冲区溢出漏洞（CVE-1999-0818）。该文件为 setuid root 二进制，存在于 Solaris 7.0 及更早版本 OpenWindows 中。"
id = "POC-AVE-1999-0580"
name = "Solaris 7.0 kcms_configure NETPATH 环境变量缓冲区溢出漏洞 PoC"
severity = "high"
tags = ["ave-1999-0580"]
vuln_id = [
    "CVE-1999-0818",
    "AVE-1999-0580",
]

[poc]
logic = "all"

[[poc.requests]]
path = "/usr/openwin/bin/kcms_configure"
protocol = "file"

[[poc.requests.matchers]]
expect = true
part = "body"
regex = "."
type = "regex"
