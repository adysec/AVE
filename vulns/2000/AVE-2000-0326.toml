[id]
ave_id = "AVE-2000-0326"
aliases = ["CVE-2000-0396"]
[basic]
title = "Pacific Software Carello 1.2.1 文件复制与源代码泄露漏洞"
description = "Pacific Software Carello 1.2.1 购物车软件中的 add.exe 程序存在文件复制漏洞。远程攻击者无需身份认证即可通过向 add.exe 发送特制 HTTP 请求（如 http://target/scripts/Carello/add.exe?C:\directory\filename.ext），将服务器上的任意文件复制到可访问的目录（生成带数字后缀的副本），从而读取 Web 脚本（如 .ASP 文件）的源代码，导致敏感信息泄露。攻击者只需知道目标文件路径且匿名账户对相关目录有写入权限即可利用此漏洞。"
severity = "MEDIUM"
score = 5.0
sources = ["cve"]
published = "2000-05-24"
updated = "2026-06-16"
remediation = "由于 Pacific Software 已停止维护 Carello 系列产品，建议立即迁移至仍在维护的购物车系统（如 Magento、WooCommerce 等）。若短期内无法迁移，应在 IIS 中删除或重命名 add.exe 文件，并配置 IIS 权限禁止匿名用户访问该文件；同时安装 URLScan 工具拦截对 add.exe 的请求，且将 .asp 文件所在目录的读取权限设置为仅允许 IIS 辅助进程账户访问。"
