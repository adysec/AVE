[basic]
description = "Microsoft IIS 4.0 存在信息泄露漏洞，远程攻击者可通过向服务器发送特制的 .ida 或 .idq 扩展名请求（指向不存在的文件），利用服务器返回的错误信息获取网站文档根目录的真实物理路径。该漏洞属于权限许可和访问控制缺陷，可能导致攻击者进一步探测服务器目录结构，为后续攻击提供信息支撑。此漏洞影响 IIS 4.0 版本，无需身份认证即可远程利用，危害等级中等。"
published = "2000-01-11T05:00:00.000"
remediation = "该漏洞影响已停止支持的 IIS 4.0（Windows NT 4.0 Option Pack），微软官方已不再提供安全更新。建议立即升级至受支持的 Windows Server 版本（如 Windows Server 2019/2022）及对应 IIS 版本。如无法升级，可通过 IIS 管理控制台将自定义错误消息配置为通用页面，禁用详细错误信息泄露，同时在 URLScan 或 ISAPI 筛选器中阻止 .ida/.idq 扩展名请求以缓解路径泄露风险。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Microsoft IIS 4.0 路径信息泄露漏洞"
updated = "2026-06-16T21:50:56.437"

