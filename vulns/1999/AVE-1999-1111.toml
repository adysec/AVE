[basic]
description = "Zeus Web Server 的搜索功能存在任意文件读取漏洞。该服务允许用户通过搜索引擎接口传入文件名参数，但未对用户输入的文件路径进行合法性校验与访问限制，导致未经身份认证的远程攻击者可通过构造特制请求，将任意文件（如配置文件、密码文件等敏感内容）的路径作为搜索选项提交给服务器，从而越权读取目标系统上的任意文件内容。此漏洞影响运行 Zeus Web Server 的受影响版本，攻击仅需通过网络向目标服务器发送恶意 HTTP 请求即可触发，无需登录凭据，危害性高，可导致服务器敏感信息泄露。"
published = "1999-10-25T04:00:00.000"
remediation = "建议升级至 Zeus Web Server 3.3d 或更高版本以修复该任意文件读取漏洞，相关补丁详情可参考 Zeus Technology 官方安全公告 (http://www.zeus.com/products/ws/advisories)。如无法立即升级，可在 Zeus 配置文件 zeus.conf 中禁用搜索引擎功能，将 SearchEngine 指令设置为 off 并重启服务；同时在防火墙或反向代理层限制对搜索引擎相关 URL 路径的访问，仅允许可信 IP 访问管理端口，防止外部攻击者利用搜索选项读取服务器敏感文件。对于已停更的 Zeus Web Server，建议迁移至现代 Web 服务器（如 Nginx 或 Apache）以彻底消除风险。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
