[basic]
description = "海康威视 IVMS 综合安防系统存在 Spring Boot Actuator 配置不当漏洞，其 /env 端点未做身份验证限制，导致攻击者可直接访问该接口获取系统环境变量及配置文件中的数据库账号密码、Redis 密码等敏感凭据。攻击者无需任何认证即可远程利用，获取敏感信息后可进一步渗透内网或控制安防系统，危害较大。建议升级至修复版本或禁用 Actuator 暴露端点。"
published = "08.11"
remediation = "立即升级海康威视 iVMS-4200 至 V3.10.0.7 及以上版本、iVMS-8700 至 V4.6.1 及以上版本，或 HikCentral Professional 至 V2.5.0 及以上版本。如无法立即升级，可在反向代理层（Nginx/Apache）配置访问控制规则，禁止外部访问 /actuator/、/env、/dump 等 Spring Boot Actuator 端点路径，或通过防火墙限制对 8080/8443 等管理端口的访问来源 IP。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "海康威视 IVMS综合安防系统 敏感信息泄露漏洞"
updated = "08.11"

