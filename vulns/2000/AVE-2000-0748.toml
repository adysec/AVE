[basic]
description = "libX11 X 库在处理资源掩码时存在拒绝服务漏洞，当资源掩码值为 0 时，会导致程序陷入无限循环，从而引发拒绝服务。远程攻击者可利用特制的 X11 协议请求触发此漏洞，影响 Open Group X11r6 3.3.3 至 4.0 版本。该漏洞为中等危害等级，攻击者无需认证即可实施攻击，影响系统的图形界面服务可用性。"
published = "2000-06-19T04:00:00.000"
remediation = "升级 libX11 至 4.0 以上版本，在 X11 配置中限制远程连接请求的 resource mask 范围，或通过 xhost 禁用远程 TCP 连接，仅允许本地 Unix Socket 访问 X 服务以缓解该拒绝服务风险。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Open Group X11r6 libX11 拒绝服务漏洞"
updated = "2026-06-16T21:52:07.550"

