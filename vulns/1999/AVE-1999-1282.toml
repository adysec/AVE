[basic]
description = "SunOS 4.1 至 4.1.2 版本的 NFS 服务在处理 32 位 UID 时仅检查低 16 位而忽略高 16 位，导致本地用户可将自身 UID 的低 16 位设置为 0 来冒充 root 用户（UID 0），从而获取超级用户权限。攻击者需具备本地系统访问权限，通过构造特定 UID 值的进程即可绕过 NFS 的权限检查机制，实现对文件系统的越权访问。Sun 官方已发布 NFS jumbo patch 补丁修复该问题。"
published = "1992-12-30"
remediation = "安装 Sun 官方发布的 NFS jumbo patch 补丁，该补丁修复了 NFS 对 32 位 UID 高 16 位处理不当的问题；在无法立即打补丁的情况下，应在 /etc/exports 中限制 NFS 导出目录仅对可信主机开放，并通过防火墙限制对 2049 端口的访问作为临时缓解措施。"
score = 7.2
severity = "HIGH"
sources = [
    "cve",
    "avd",
]
title = "SunOS NFS 本地权限提升漏洞"
updated = "2026-06-16T21:49:32.350"

