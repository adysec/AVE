[basic]
description = "Linux 内核 Btrfs 文件系统的 `btrfs_cont_expand` 函数中存在竞态条件漏洞。在调用 `read_folio` 读取页面内容后、重新加锁之前，`release_folio` 可能被触发并清除页面的私有数据（PagePrivate），导致后续访问子页面位图时触发断言失败，造成内核崩溃（拒绝服务）。本地攻击者可通过在启用子页面块大小的 Btrfs 文件系统上执行特定的文件写入或复制操作触发此漏洞，影响 Linux 内核多个版本，CVSS 评分 5.5，危害等级中等。"
published = "2025-09-15T15:15:51.930"
remediation = '升级 Linux 内核至 6.5 及以上版本，或应用相应稳定版内核 (6.1.x/5.15.x) 中已包含该修复的补丁。对于无法立即升级的系统，可通过限制本地用户执行 copy_file_range 系统调用来降低触发概率，但最根本的措施仍是安装包含 commit 34b64e73f40a ("btrfs: set_page_extent_mapped after read_folio in btrfs_cont_expand") 的内核更新。'
score = 5.5
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux kernel btrfs 拒绝服务漏洞"
updated = "2026-06-17T06:44:37.477"

