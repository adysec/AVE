[basic]
description = "Great Circle Associates 开发的 Majordomo 邮件列表管理软件 1.94.4 版本中的 resend 命令存在命令注入漏洞。本地攻击者可通过向 resend 命令参数中注入 shell 元字符（如分号、管道符等），利用该漏洞以 Majordomo 进程权限执行任意系统命令，从而提升权限。该漏洞影响 Majordomo 1.94.4 及可能更早版本，攻击者需拥有本地系统访问权限，CVSS 评分 4.6，危害等级中危。"
published = "1999-12-28T05:00:00.000"
remediation = "立即升级 Majordomo 至 1.94.5 或更高版本，该版本修复了 resend 命令未正确转义 shell 元字符的问题。如无法立即升级，可先移除 resend 程序的 setuid/setgid 权限位（chmod u-s /path/to/resend），并限制仅管理员可执行该命令，以降低本地提权风险。"
score = 4.6
severity = "MEDIUM"
sources = ["avd"]
title = "Great Circle Associates Majordomo 本地权限提升漏洞"
updated = "2026-06-16T21:50:52.027"

