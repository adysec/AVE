[basic]
description = "OpenWrt luci-app-samba4 存在 ACL 权限配置不当漏洞，其 read ACL 不当授予了 /usr/sbin/smbd 的 file.exec 权限，导致经过身份验证的委派用户能够以调用者控制的命令行参数执行 Samba 守护进程。攻击者可向 root 权限的 smbd 进程传递 message command 等任意 Samba 全局选项，当 SMB 协议消息被处理时触发命令执行。该漏洞影响运行 OpenWrt 并启用 luci-app-samba4 组件的设备，CVSS 评分 8.7，危害等级高。"
published = "2026-07-12T12:16:45.977"
remediation = "立即升级 OpenWrt 至修复该漏洞的版本（关注官方安全公告中 luci-app-samba4 的补丁更新）。临时缓解措施：移除 /usr/sbin/smbd 文件上多余的 file.exec ACL 权限（执行 `setfacl -x u:anyuser:exec /usr/sbin/smbd`）；在 luci-app-samba4 配置中禁用未使用的 Samba 全局选项传递功能；在防火墙层面限制 SMB 端口（139,445）仅允许受信任的内网 IP 访问；审查并收紧 luci-app-samba4 的 ACL 配置，确保 smbd 可执行文件仅对 root 具有执行权限。"
score = 8.7
severity = "HIGH"
sources = ["hwpoc"]
title = "OpenWrt luci-app-samba4 远程代码执行漏洞"
updated = "2026-07-13T20:03:31.703"

