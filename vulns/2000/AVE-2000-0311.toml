[basic]
description = "Linux 系统的 pam_console PAM 模块在用户登录时会对多种设备文件执行 chown 操作以赋予其所有权，但由于在用户注销后这些设备的打开文件描述符未被正确关闭，导致该用户能够保留对设备的访问权限。当后续其他用户登录时，先前用户可利用保留的文件描述符持续监控设备上的活动，造成会话隔离失效和信息泄露。该漏洞影响 RedHat Linux 6.0/6.1/6.2 版本，CVSS 评分 7.2，危害等级高危。"
published = "2000-05-03T04:00:00.000"
remediation = "升级 RedHat Linux 至 7.0 或更高版本，其中包含修复后的 pam_console 模块。如无法升级，可手动应用 RedHat 官方补丁 RHSA-2000:020，修改 pam_console 源码在用户注销时关闭所有设备文件描述符后重新编译安装。临时缓解措施可限制多用户共享控制台访问权限。"
score = 7.2
severity = "HIGH"
sources = ["cve"]
title = "Red Hat Linux 6.0、6.1、6.2 pam_console 模块设备文件描述符残留导致信息泄露漏洞"
updated = "2026-06-16T21:51:35.513"

