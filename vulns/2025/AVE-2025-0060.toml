[basic]
description = "美特 CRM 的 headimgsave 接口存在 SQL 注入漏洞，攻击者通过向 accountid 参数注入恶意 SQL 语句，可利用时间盲注技术（如 SLEEP 函数）判断数据库结构并窃取敏感数据。该漏洞无需复杂权限即可远程利用，影响使用美特 CRM 系统的相关企业，可能导致用户数据泄露。建议厂商对用户输入进行参数化查询过滤以修复此漏洞。"
published = "0705"
remediation = "建议对 accountid 参数实施参数化查询或预编译语句，严格过滤用户输入，禁止拼接 SQL 语句。如厂商有更新版本，请立即升级至最新版；无法升级时，部署 WAF 规则拦截含 SLEEP/AND/OR 等 SQL 注入特征请求作为临时缓解。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "美特 CRM headimgsave SQL注入漏洞"
updated = "0705"

