[basic]
description = "HP-UX 11.0 系统中的 newgrp 命令存在权限提升漏洞。该命令在处理用户组切换操作时未能正确验证用户权限，导致本地攻击者可通过执行特制的 newgrp 命令获取更高权限。攻击者需拥有本地系统访问权限，利用该漏洞可提升至其他用户或组的权限，进而执行未授权操作。该漏洞影响 HP-UX 11.0 版本，CVSS 评分 4.6，危害等级中危。"
published = "2000-10-20"
remediation = "建议升级 HP-UX 11.0 至最新补丁包，或安装 HP 官方发布的 newgrp 安全补丁。如无法立即升级，可临时移除 newgrp 的 setuid 权限：chmod u-s /usr/bin/newgrp，以消除本地提权风险。"
score = 4.6
severity = "MEDIUM"
sources = ["cve"]
title = "HP HP-UX newgrp 命令本地权限提升漏洞"
updated = "2000-10-20"

