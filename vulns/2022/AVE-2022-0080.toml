[basic]
description = "Linux 内核 BPF 子系统中的 bpf_jit_limit 变量存在数据竞争漏洞，由于在读操作时未使用 READ_ONCE() 宏进行同步，并发写操作（通过 sysctl 接口调用 WRITE_ONCE()）可能导致读取到撕裂数据（load-tearing）。本地攻击者可通过低权限访问触发该条件竞争，造成内核信息泄露或系统拒绝服务。该漏洞影响 Linux 内核版本，CVSS 评分 4.7，危害等级中危。"
published = "2025-06-18T11:15:24.013"
remediation = "立即升级 Linux 内核至 5.19.8 或更高版本（含 6.x LTS 系列），或合入补丁提交 ba632ad0bacb / 0947ae112108。该 commit 在读取 bpf_jit_limit 时添加 READ_ONCE() 配对宏以消除加载撕裂的竞态条件。若无法升级，可通过设置 sysctl kernel.unprivileged_bpf_disabled=1 禁止非特权 BPF 程序加载，或通过内核参数 bpf_jit_enable=0 关闭 BPF JIT 编译作为临时缓解。"
score = 4.7
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux Kernel BPF 数据竞争漏洞"
updated = "2026-06-17T05:19:38.483"

