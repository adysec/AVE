[basic]
description = "该漏洞存在于 Netscape Enterprise Server 3.5.1 与 Netscape FastTrack Server 3.01 中。服务器在处理 URL 时未能正确处理 URL 编码的空格字符（%20），当攻击者向一个 CGI 脚本或服务器端脚本的 URL 末尾追加 %20 时，服务器会错误地将请求解析为对源文件的访问，从而将本不应返回的脚本源代码直接返回给客户端。攻击无需身份认证，仅需构造包含 %20 的简单 HTTP 请求即可读取服务器端脚本源码，导致应用程序逻辑、内部实现及潜在敏感信息泄露，为后续进一步攻击提供线索。"
published = "1999-09-01"
remediation = "升级至 Netscape Enterprise Server 3.6 或 FastTrack Server 3.02 及以上版本；临时缓解可在 Web 服务器前部署反向代理或重写规则，拒绝 URL 路径中包含 %20 编码的脚本请求，并限制对脚本源文件的直接访问。"
score = 5.0
severity = "MEDIUM"
sources = ["cve"]
title = "Netscape Enterprise 与 FastTrack Web 服务器源代码泄露漏洞"
updated = "2026-07-18"

