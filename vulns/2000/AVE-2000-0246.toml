[basic]
description = "BeOS 4.5 及 5.0 版本存在本地拒绝服务漏洞。本地攻击者可通过向系统发送特制的直接系统调用（使用中断 37）导致内核崩溃，造成目标系统拒绝服务。该漏洞源于操作系统对系统调用参数校验不严，攻击者无需特殊权限即可触发，影响 BeOS 4.5 和 5.0 版本，CVSS 评分 2.1，危害等级低。"
published = "2000-04-10T04:00:00.000"
remediation = "BeOS 已停止维护且原厂商已倒闭，官方不再提供安全更新。如必须运行 BeOS 环境，建议限制本地用户登录权限、禁用不必要的外部系统调用接口，并将系统部署于隔离网络环境中。最佳缓解方案是迁移至受支持的现代操作系统（如 FreeBSD、Linux）运行 BeOS 兼容层。"
score = 2.1
severity = "LOW"
sources = ["avd"]
title = "Be BeOS 本地拒绝服务漏洞"
updated = "2026-06-16T21:51:22.743"

