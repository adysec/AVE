[basic]
description = "用友NC存在SQL注入漏洞，位于/oacoSchedulerEvents/changeEvent接口的event_id参数处。攻击者无需认证即可通过POST请求向该参数注入恶意SQL语句，利用Oracle数据库函数dbms_pipe.receive_message可实现延时盲注，进而获取数据库敏感信息。该漏洞影响用友NC全版本，危害严重。"
published = "0701"
remediation = "升级用友NC至最新安全补丁版本（NC6.5 Patch 202503或更高、NC Cloud 2025.05版本或更高），并联系用友官方获取针对`/portal/pt/oacoSchedulerEvents/changeEvent`接口的专项修复补丁。临时缓解措施包括：在WAF/IPS中配置规则拦截对`changeEvent`接口`event_id`参数的SQL注入载荷（如`dbms_pipe`、`AND 1=`等关键字），并限制对该路径的外部网络访问。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "用友NC changeEvent SQL注入漏洞"
updated = "0701"

