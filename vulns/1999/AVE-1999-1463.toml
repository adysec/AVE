[basic]
description = "Linux 系统中的 rcp 命令存在任意文件写入漏洞。当用户 UID 为 65535（如 nobody 用户）时，由于 chown 等系统调用将 65535 解释为 -1，导致文件所有权修改失败，从而使低权限用户能够覆盖任意文件。攻击者可利用此漏洞以低权限用户身份写入系统关键文件，实现权限提升或系统破坏。"
published = "1997-02-03"
remediation = "升级到 Red Hat Linux 4.0 之后的安全更新版本（如 5.0 及以上），该漏洞已在后续发行版中修复。若无法升级，建议禁用 rcp 命令，改用 ssh/scp 替代；同时严格控制系统用户 UID 分配，避免出现 65535 这类被系统特殊解释的 UID 值。"
score = 10.0
severity = "CRITICAL"
sources = ["cve"]
title = "Linux rcp 任意文件写入漏洞"
updated = "2026-06-16"

