[basic]
description = "Internet Explorer 5 在处理收藏夹图标（Favorites icon）时存在缓冲区溢出漏洞。由于程序未对畸形的图标数据做边界校验，远程攻击者可通过构造特制的 Favorites 图标文件诱导用户访问或加载，触发缓冲区溢出并绕过内存保护机制，从而在目标系统上以当前用户权限执行任意命令。该漏洞影响使用 IE 5 的 Windows 平台用户，攻击需依赖诱使用户交互（如访问恶意网页或打开恶意收藏项），成功利用后可完全控制受影响主机。"
published = "1999-05-27T04:00:00.000"
remediation = "安装 Microsoft 安全公告 MS99-018 发布的补丁程序（KB231450），将 Internet Explorer 5 升级至修复版本。如无法立即安装补丁，可临时禁用收藏夹图标显示功能作为缓解措施，并尽快升级至受支持的现代浏览器版本。"
score = 7.6
severity = "HIGH"
sources = ["avd"]
title = "Microsoft Internet Explorer 5 缓冲区溢出远程代码执行漏洞"
updated = "2026-06-16T21:49:05.283"

