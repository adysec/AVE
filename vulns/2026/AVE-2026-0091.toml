[basic]
description = "Apache Log4j API 的 MapMessage JSON 序列化功能在处理非有限 IEEE 754 浮点值（NaN、Infinity、-Infinity）时存在编码缺陷，导致生成的 JSON 不符合 RFC 8259 标准。当应用程序使用 JsonTemplateLayout 的消息解析器或依赖 MapMessage.asJson() 的布局，并记录了包含攻击者可控浮点值的 MapMessage 时，非有限值会被直接输出为裸令牌，造成 JSON 格式错误。该漏洞可能破坏下游日志记录及解析流程，影响 Apache Log4j API 2.13.1 至 2.25.4 版本及 2.26.0 版本，CVSS 评分 6.3，危害等级中危。用户应升级至 2.25.5 或 2.26.1 版本以修复此问题。"
published = "2026-07-10T22:16:42.540"
remediation = "升级 Apache Log4j API 至 2.25.5 或 2.26.1 及以上版本，这两个版本已对非有限浮点值输出符合 RFC 8259 标准的 JSON。如无法立即升级，可在应用层对日志中浮点输入进行校验过滤，避免将 NaN/Infinity 等非有限值传入 MapMessage。"
score = 6.3
severity = "MEDIUM"
sources = ["hwpoc"]
title = "Apache Log4j API MapMessage JSON 序列化编码漏洞"
updated = "2026-07-14T20:03:09.910"

