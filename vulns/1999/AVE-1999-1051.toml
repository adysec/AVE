[basic]
description = "Red Hat Linux 4.0 中 cmu-snmp SNMP 软件包 3.3-1 之前版本的 snmpd 服务器存在配置错误漏洞。由于默认配置不当，未经身份认证的远程攻击者可利用 SNMP 协议的读写权限（public/private 团体字串）访问目标系统，读取或修改敏感系统信息，可能导致配置泄露或系统被篡改。该漏洞危害等级为中危，CVSS 评分 6.4，建议升级至 cmu-snmp 3.3-1 或更高版本以修复此问题。"
published = "1999-12-31T05:00:00.000"
remediation = "升级 cmu-snmp 软件包至 3.3-1 或更高版本，同时修改 /etc/snmpd.conf 配置文件中默认的 public/private community 字符串为复杂随机值，并在 iptables 防火墙中限制 SNMP（UDP 161/162 端口）仅允许受信管理主机访问。禁用 SNMP 读写权限（将 snmpd.conf 中 rwcommunity 项改为 rocommunity），如无需使用则直接停止 snmpd 服务。"
score = 6.4
severity = "MEDIUM"
sources = ["epss"]
title = "Red Hat Linux snmpd 服务器配置错误漏洞"
updated = "2026-06-16T21:50:13.290"

