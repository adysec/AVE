[basic]
description = "FreeBSD 2.2 及更早版本中的 union 联合文件系统存在拒绝服务漏洞，本地用户可通过执行一系列特制的 mount_union 命令触发系统重载，导致系统临时不可用。该漏洞影响 FreeBSD 2.2 及更早版本，也可能波及其他使用 union 文件系统的操作系统。由于需要本地访问权限且不涉及数据泄露，CVSS 评分 2.1，危害等级低。"
published = "1996-05-17T04:00:00.000"
remediation = "升级 FreeBSD 至 2.2 以上版本，该漏洞已在 FreeBSD-SA-96:10 公告对应的补丁中修复。当前所有受支持的 FreeBSD 版本（11.x 及以上）均不受此漏洞影响，建议运行 `freebsd-version` 确认系统版本，如低于 2.2 请立即升级至最新稳定版。"
score = 2.1
severity = "LOW"
sources = ["avd"]
title = "FreeBSD union 文件系统本地拒绝服务漏洞"
updated = "2026-06-16T21:50:10.577"

