[basic]
description = "imwheel 工具存在缓冲区溢出漏洞，由于 imwheel-solo 脚本在处理 HOME 环境变量时未正确限制输入长度，本地攻击者可通过设置超长 HOME 环境变量触发缓冲区溢出，从而获取 root 权限。该漏洞影响 Halloween Linux 4.0 及 RedHat Linux 6.1/6.2 等系统，CVSS 评分 7.2，危害等级高。攻击者需拥有本地访问权限即可利用，无需用户交互。"
published = "2000-03-13T05:00:00.000"
remediation = "立即卸载 imwheel 软件包（`rpm -e imwheel` 或 `apt-get remove imwheel`），或升级到不受影响的版本。如业务必须使用，限制可执行 imwheel-solo 脚本的用户范围，并移除该脚本的 SUID 位（`chmod -s /usr/bin/imwheel-solo`）以消除本地提权风险。"
score = 7.2
severity = "HIGH"
sources = ["cve"]
title = "Linux imwheel 缓冲区溢出导致本地权限提升漏洞"
updated = "2026-06-16T21:51:16.610"

