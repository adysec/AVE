[basic]
description = "PGP 5.x在Unix系统上的pgpk命令在非交互式密钥对生成时使用熵源不足，导致生成的密钥对具有可预测性。该漏洞影响PGP 5.x版本在Unix系统上的所有安装。攻击者需具备本地访问权限，无需认证即可利用熵源不足预测生成的私钥，进而解密通信或伪造签名，CVSS评分2.1（本地攻击/低复杂度/部分机密性影响）。"
published = "2000-05-24T04:00:00.000"
remediation = "建议立即升级到 PGP 6.0 或更高版本（如 GnuPG 1.0+），这些版本修复了随机数生成器使用不充分熵源的问题。若无法立即升级，请务必使用交互模式（交互式敲击键盘/移动鼠标收集熵）生成密钥对，严禁在脚本/脚本化脚本中使用非交互模式生成密钥。同时建议撤销并重新生成所有非交互模式下生成的密钥对，并更新对应的公钥分发渠道。若必须继续使用 PGP 5.x，请在生成密钥前手动向 /dev/random 写入额外熵数据（如 `dd if=/dev/random of=/dev/random bs=1k count=1`），并确保系统熵池充足（`cat /proc/sys/kernel/random/entropy_avail` 应大于 1000）。"
score = 2.1
severity = "LOW"
sources = ["avd"]
title = "PGP 5.x 自动密钥生成程序随机性不足漏洞"
updated = "2026-06-16T21:51:44.950"

