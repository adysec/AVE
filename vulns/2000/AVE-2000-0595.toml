[basic]
description = "Microsoft Outlook 和 Outlook Express 存在拒绝服务漏洞，远程攻击者可通过发送包含空白 BCC、Reply-To、Return-Path 或 From 字段的电子邮件触发该漏洞，导致目标邮件客户端崩溃或停止响应。该漏洞影响 Microsoft Exchange 4.0 和 5.0 版本，CVSS 评分 5.0（AV:N/AC:L/Au:N/C:N/I:N/A:P），属于中等危害级别。攻击者无需身份认证即可远程利用，仅需向受害者发送精心构造的恶意邮件即可造成拒绝服务影响，用户打开或预览该邮件时即会触发漏洞。"
published = "2000-06-05T04:00:00.000"
remediation = "建议立即升级至 Microsoft Exchange Server 2003 或更高版本（如 Exchange 2010/2013/2016/2019），或迁移至 Microsoft 365 Exchange Online。若仍在运行 Exchange 4.0/5.0，建议立即隔离相关系统，并在邮件网关层面配置规则拦截包含空白 BCC、Reply-To、Return-Path、From 字段的邮件作为临时缓解措施。由于 Exchange 4.0/5.0 已于 2004 年停止支持，无官方补丁可用，必须迁移至受支持版本彻底解决该拒绝服务漏洞。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Microsoft Exchange 4.0/5.0 字段空值拒绝服务漏洞"
updated = "2026-06-16T21:51:55.220"

