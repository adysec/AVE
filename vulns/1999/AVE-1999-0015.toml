[basic]
description = "ToolTalk 数据库服务器（rpc.ttdbserverd）存在缓冲区溢出漏洞，远程攻击者无需身份认证，通过向目标系统发送特制请求即可触发缓冲区溢出，从而以 root 权限执行任意命令。该漏洞影响 Xi Graphics Maximum CDE 1.2.3、TriTeal TED CDE 4.3 及 Sun Solaris 2.5.1 等系统，CVSS 评分 10.0，危害等级严重，属于当年最具破坏力的远程代码执行漏洞之一。"
published = "1998-04-01T05:00:00.000"
remediation = "立即禁用 rpc.ttdbserverd 服务（进程名：rpc.ttdbserverd），执行 /usr/bin/killall rpc.ttdbserverd 终止进程，并从 /etc/inetd.conf（或 /etc/xinetd.d/）中注释 rstatd/rusersd 相关行后重启 inetd。对于 SGI IRIX，应安装 SGI 安全公告 19981101-01 中提供的补丁。对于 Sun Solaris 系统，应用 Sun 提供的对应安全补丁（如 SunOS 5.5.1 相关补丁）。上述操作系统均已终止安全支持，强烈建议迁移至受支持的现代操作系统。"
score = 10
severity = "CRITICAL"
sources = ["exploitdb"]
title = "Common Desktop Environment ToolTalk RPC 服务缓冲区溢出远程代码执行漏洞"
updated = "2026-06-16T21:47:18.353"

