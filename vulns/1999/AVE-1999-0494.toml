[basic]
description = "SunOS 与 Linux Slackware 系统中 ypbind 服务在启用 -ypset 或 -ypsetme 选项时存在路径遍历漏洞。远程或本地攻击者可通过构造包含 ..（点点）的特殊请求，绕过目录限制覆盖系统任意文件，导致权限提升或服务异常。该漏洞影响运行 ypbind 且开启上述选项的 SunOS 及 Slackware 系统，危害等级高。"
published = "1997-02-05T05:00:00.000"
remediation = "禁止使用 -ypset 和 -ypsetme 参数启动 ypbind，仅允许通过 ypserv 配置文件（/var/yp/securenets）确定的受信 NIS 服务器绑定。在防火墙层面限制 UDP 端口 111 和 32770-32800 的外部访问，或禁用 NIS 改用 LDAP 认证。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "SunOS ypbind 路径遍历文件覆盖漏洞"
updated = "2026-06-16T21:48:05.990"

