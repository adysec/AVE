[basic]
description = "Caldera 及 Mandrake Linux 等发行版的 kdm 默认配置存在信息泄露漏洞，kdm 未对 XDMCP（X Display Manager Control Protocol）连接进行有效的来源限制，允许来自任意主机的 XDMCP 连接请求。远程攻击者可通过 XDMCP 协议连接到目标系统的显示管理器，从而获取登录界面截图、用户名等敏感信息，或绕过额外的访问控制限制。该漏洞影响了 Caldera、Mandrake Linux 等多个发行版，攻击者无需任何认证即可远程利用。"
published = "1999-08-22T04:00:00.000"
remediation = "Caldera OpenLinux 用户应安装 CSSA-1999-021.0 安全公告提供的 kdm 补丁包；Mandrake Linux 用户应升级至 MDKSA-2002:025 公告对应的修复版本。如无法升级，编辑 kdm 配置文件（如 /etc/kde/kdm/kdmrc），将 XDMCP 的 Enable 选项设为 false 以禁用 XDMCP 服务，或在 Xaccess 文件中限制仅允许受信任的 IP 地址连接。"
score = 10
severity = "CRITICAL"
sources = ["cve"]
title = "Caldera Mandrake Linux kdm XDMCP 默认配置信息泄露漏洞"
updated = "2026-06-16T21:51:35.020"

