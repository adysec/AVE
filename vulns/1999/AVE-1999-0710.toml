[basic]
description = "Sun Solaris 2.5.1、2.6 及 7.0 的 TCP 流驱动程序存在递归调用 mutex_enter 的缺陷，远程攻击者无需身份认证即可向目标主机发送特制的 TCP 连接请求，触发内核互斥锁被重复加锁，导致系统内核 panic 崩溃，造成拒绝服务。该漏洞无法被用于远程代码执行或数据窃取，但可使受影响系统丧失网络服务能力，影响运行上述版本 Solaris 的服务器与工作站。"
published = "1999-09-23"
remediation = "建议升级到已修复该缺陷的 Solaris 补丁集群版本：Solaris 2.5.1 安装补丁 103630-28 及以上，Solaris 2.6 安装补丁 105402-27 及以上，Solaris 7 安装补丁 106726-11 及以上；若暂无法升级，应在网络边界防火墙限制对 Solaris 主机的入站 TCP 连接来源，仅允许可信 IP 访问以降低被远程触发的风险。"
score = 5.0
severity = "MEDIUM"
sources = ["avd"]
title = "Sun Solaris TCP 流驱动程序递归 mutex_enter 拒绝服务漏洞"
updated = "2026-07-17"

