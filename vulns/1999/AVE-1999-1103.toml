[basic]
description = 'ICQ 99a 内置的 Web 服务器（build 1701）在启用"Active Homepage"功能后存在信息泄露漏洞。远程攻击者可通过向目标服务器发送请求并对比响应状态码——文件存在时返回"404 Forbidden"、文件不存在时返回"404 not found"——来探测服务器上任意文件是否存在。该漏洞利用条件简单，无需认证即可实施，可被用于信息收集和后续攻击铺垫。CVSS 评分 5.0，危害等级中危。'
published = "1999-05-01T04:00:00.000"
remediation = '关闭 ICQ Web Server 的 "Active Homepage" 功能，或升级至 ICQ 2000 及以上版本。如仍需使用旧版，修改 Web 服务器配置使其对所有不存在的文件返回统一 403 状态码，防止路径枚举。'
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "ICQ ICQ 99a 信息泄露漏洞"
updated = "2026-06-16T21:50:23.923"

