[basic]
description = "Microsoft IIS 在处理 HTTP 请求时未能正确规范化（canonicalize）URL，导致 URL 中的转义字符（如 Unicode/UTF-8 编码序列）在解析过程中未被正确解码和处理。远程攻击者无需身份验证，只需在请求 URL 中插入特殊转义字符，即可构造绕过访问限制的请求，从而绕过第三方软件的访问控制机制，获取未授权的资源访问权限。该漏洞影响 Internet Information Server（IIS）、Site Server 及 Site Server Commerce 等产品，CVSS v2 评分 6.4（Medium）。Microsoft 已在 MS99-061 安全公告中发布修复补丁。"
published = "1999-12-21T05:00:00.000"
remediation = "安装 Microsoft 安全公告 MS99-061 发布的补丁（KB246401），升级 IIS 至最新安全版本，并在第三方应用程序中对 URL 进行严格规范化校验，防止转义字符被用于绕过访问控制机制。"
score = 6.4
severity = "MEDIUM"
sources = ["cve"]
title = "Microsoft Internet Information Server / Site Server 安全绕过漏洞"
updated = "2026-06-16T21:50:50.710"

