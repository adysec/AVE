[basic]
description = "MailForm 2.0 的 mailform.pl CGI 脚本存在路径遍历漏洞，未对 XX-attach_file 参数进行路径验证，导致远程未认证攻击者可通过构造恶意文件路径（如 /etc/passwd）读取服务器任意文件内容，脚本会将文件内容作为附件发送给攻击者。影响 MailForm 2.0 版本，攻击条件为远程网络访问且无需认证，攻击者可直接通过 HTTP 请求发送包含恶意文件路径的 POST 请求实现任意文件读取，导致敏感信息泄露，CVSS 评分 5.0（中危）。"
published = "2000-11-14T05:00:00.000"
remediation = "建议立即停用或删除 MailForm 2.0 的 mailform.pl CGI 脚本，改用成熟安全的邮件表单处理程序（如 PHPMailer、Nodemailer 等现代框架）。若必须保留，需在 Web 服务器层面（如 Apache 的 .htaccess 或 Nginx location 块）禁止访问 mailform.pl，或在脚本中对 XX-attach_file 参数实施严格路径遍历过滤（仅允许指定目录下的附件文件名，禁止目录遍历字符 ../ 等）。建议迁移至现代 Web 框架内置的邮件发送组件，彻底替换该老旧 CGI 脚本。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Matt Wright MailForm 任意文件读取漏洞"
updated = "2026-06-16T21:52:39.353"

