[basic]
description = "Ivanti Sentry 存在操作系统命令注入漏洞，攻击者可通过向 /mics/api/v2/sentry/mics-config/handleMessage 接口发送特制请求，在目标系统上执行任意 OS 命令。该漏洞影响 Ivanti Sentry 产品，可导致服务器被完全控制、数据泄露或横向移动，攻击者无需身份认证即可利用，攻击复杂度低。目前 Ivanti 已发布安全公告，建议联系技术支持获取修复补丁，或通过限制接口访问来源 IP、禁用远程管理功能、部署 WAF 规则拦截命令注入特征等方式进行临时缓解。"
published = "nday"
remediation = "联系 Ivanti 技术支持获取官方安全补丁并升级至最新版本；在防火墙或反向代理层面严格限制 `/mics/api/v2/sentry/mics-config/handleMessage` 接口仅允许可信管理 IP 访问；禁用 Sentry 远程管理功能（Remote Management）；部署 WAF 规则拦截包含系统命令关键词（如 `;`、`|`、`&&`、`$(...)`）的请求载荷以作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "Ivanti Sentry OS 命令注入漏洞"
updated = "nday"

