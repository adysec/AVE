[basic]
description = "Linux 内核 ATA over Ethernet (AoE) 驱动中存在释放后使用 (Use-After-Free) 漏洞，源于 `aoecmd_cfg_pkts()` 函数对 `struct net_device` 的引用计数更新不当。本地攻击者可通过竞态条件在结构体释放后通过 `skbtxq` 全局队列访问已释放内存，导致系统拒绝服务或潜在代码执行。该漏洞影响 Linux 内核各版本，CVSS 评分 7.0，危害等级高。"
published = "2024-01-04T17:15:08.803"
remediation = "升级 Linux 内核至 6.9 或更高版本，其中包含上游提交 f98364e926626c 的修复。对于 Red Hat Enterprise Linux 6/7，安装 Red Hat 提供的对应内核安全更新。Debian 10 用户应用 2024 年 6 月发布的 LTS 内核更新。如无法立即升级且未使用 AoE 设备，可临时通过 blacklist aoe 内核模块或卸载 aoe 驱动防止漏洞利用。"
score = 7
severity = "HIGH"
sources = ["zdi"]
title = "Linux 内核 ATA over Ethernet (AoE) 驱动释放后使用漏洞"
updated = "2026-06-17T06:50:25.857"

