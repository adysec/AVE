[basic]
description = "Fluent Bit 3.1.9 的 OpenTelemetry 输入插件存在空指针解引用漏洞。当该插件监听网络端口运行时，攻击者可向目标发送 Content-Length 为 0 的特制数据包，触发 process_payload_traces_proto_ng() 函数在处理过程中将 0 值传递给 cfl_sds_len 函数，该函数尝试对空指针进行类型转换导致程序崩溃。此漏洞无需身份认证即可远程触发，攻击者只需能够访问 OpenTelemetry 端点即可实施拒绝服务攻击，影响 Fluent Bit 3.1.9 版本，CVSS 评分 7.5，危害等级高。"
published = "2025-02-18T18:15:25.833"
remediation = "立即升级 Fluent Bit 至包含该修复的版本。官方已在 PR #9993 中修复此漏洞，修复合并于 2025-02-24，影响 master 及 v3.1/v3.2 分支。建议升级到 v3.1.10 以上、v3.2.x 最新版或 v4.2.5/v5.0.6 及以上版本（这些版本均包含该补丁）。如无法立即升级，可在 OpenTelemetry 输入插件前部署反向代理（如 Nginx），过滤掉 Content-Length 为 0 的请求，或在防火墙层面限制对 OpenTelemetry 端口的访问仅允许受信任来源。"
score = 7.5
severity = "HIGH"
sources = ["msrc"]
title = "Fluent Bit OpenTelemetry输入插件空指针解引用拒绝服务漏洞"
updated = "2026-06-17T08:04:47.890"

