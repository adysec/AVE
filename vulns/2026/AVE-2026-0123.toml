[basic]
description = "WordPress Kirki 插件（Freeform Page Builder、Website Builder & Customizer）在 6.0.0 至 6.0.6 版本中存在权限提升漏洞。该漏洞源于密码重置功能在处理用户名时未验证邮箱地址归属，未经身份认证的远程攻击者可利用任意邮箱地址接收目标用户的密码重置链接，从而实现账户接管，获取网站管理员权限。攻击无需任何前置条件，CVSS 评分 9.8，危害等级严重。建议升级至 6.0.7 及以上版本或完全卸载该插件。"
published = "2026-06-02T04:17:03.550"
remediation = "立即升级 Kirki Framework 至 6.0.7 或更高版本（若已停止使用则彻底卸载该插件）。临时缓解措施：在主题 functions.php 中添加 `add_filter('wp_ajax_kirki_ajax', '__return_false');` 禁用漏洞相关的 AJAX 处理，并审计现有用户账号，移除可疑未授权账户。"
score = 9.8
severity = "CRITICAL"
sources = ["hwpoc"]
title = "Kirki WordPress 插件账户接管漏洞"
updated = "2026-06-17T11:03:38.207"

