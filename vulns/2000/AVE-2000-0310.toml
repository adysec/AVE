[basic]
description = "Windows NT 4.0 远程注册表服务存在输入验证漏洞，本地认证用户可通过向远程注册表服务器发送特制的畸形请求，导致 winlogon 进程异常崩溃，造成目标系统拒绝服务。该漏洞影响 Windows NT 4.0 所有版本，Microsoft 已在 MS00-040 安全公告中发布补丁。攻击者需拥有有效凭据才能利用此漏洞。"
published = "2000-06-08T04:00:00.000"
remediation = '安装 Microsoft 安全公告 MS00-040 提供的补丁，或升级至 Windows 2000 及以上版本。临时缓解措施：在注册表中将 HKLM\SYSTEM\CurrentControlSet\Control\SecurePipeServers\winreg 的远程访问权限限制为仅授权管理员，或通过防火墙阻止 135/TCP 端口入站连接。'
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Microsoft Windows NT 4.0 Remote Registry 拒绝服务漏洞"
updated = "2026-06-16T21:51:35.390"

