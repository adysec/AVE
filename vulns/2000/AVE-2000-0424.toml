[basic]
description = "MDaemon POP3 服务器存在缓冲区溢出漏洞，远程攻击者无需身份认证即可向 POP3 服务端口（110/TCP）发送特制的超长用户名，触发缓冲区溢出，导致服务进程崩溃，造成拒绝服务。该漏洞影响 Alt-N Technologies MDaemon 邮件服务器，攻击复杂度低，可被远程利用。厂商已发布修复版本限制用户名长度。"
published = "2000-05-24T04:00:00.000"
remediation = "立即升级 MDaemon 至 3.1.1 或更高版本，该版本已限制 POP 服务器用户名长度以防止缓冲区溢出。如无法升级，可在防火墙或 TCP Wrappers 中限制对 POP3 端口（110/TCP）的访问来源 IP，仅允许受信任的邮件客户端连接，降低远程攻击面。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Alt-N Technologies MDaemon POP服务器缓冲区溢出拒绝服务漏洞"
updated = "2026-06-16T21:51:38.083"

