[basic]
description = "South River Technologies Titan FTP Server 6.05 存在栈缓冲区溢出漏洞，远程攻击者可通过向目标 FTP 服务器发送特制的 DELE 命令触发该漏洞，导致拒绝服务或远程代码执行。该漏洞影响 Titan FTP Server 6.05 build 550 及之前版本，攻击者无需认证即可利用，危害等级高危。"
published = "2008-11-29"
remediation = "立即升级 Titan FTP Server 至最新版本（该漏洞已在 6.05 build 550 之后的版本修复）；由于旧版 Titan FTP Server 已停止维护，建议迁移至 Titan MFT 或 Titan SFTP Server。如无法升级，在防火墙层面限制 FTP 端口（默认 21）的可信源 IP 白名单，并在服务器上禁用 DELE 命令或限制其执行权限作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["nuclei"]
title = "South River Technologies Titan FTP Server 远程缓冲区溢出漏洞"
updated = "2008-11-29"

