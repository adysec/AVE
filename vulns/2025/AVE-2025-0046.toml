[basic]
description = "金和OA（协同管理平台）的 TaskReportConfirm.aspx 接口存在 SQL 注入漏洞。攻击者可在未授权的情况下向该接口传递特制的恶意参数，拼接执行任意 SQL 语句，进而窃取数据库中的敏感数据（如用户凭证、系统配置），甚至可能通过写 WebShell 等方式获取服务器控制权。该漏洞利用难度低，无需复杂权限认证，对部署了相关版本金和OA的企业内网构成严重威胁。"
published = "2025-07-10"
remediation = "联系金和网络官方获取安全补丁，升级至修复此漏洞的最新版本。临时措施：在 IIS 中添加 URL 重写规则，对 TaskReportConfirm.aspx 的传入参数进行严格过滤，拦截 select/union/insert 等 SQL 关键字；部署 WAF 规则防御 SQL 注入攻击。代码层面应改用参数化查询替代字符串拼接。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "金和OA TaskReportConfirm.aspx SQL注入漏洞"
updated = "2025-07-10"

