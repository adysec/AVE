[basic]
description = "Debian GNU/Linux 的 netstd 软件包中的 FTP 客户端存在缓冲区溢出漏洞，远程攻击者可通过向目标系统发送特制的 FTP 响应数据触发该漏洞，导致拒绝服务或潜在代码执行。该漏洞影响 Debian 2.0 及 Stanford University bootpd 2.4.3 等版本，CVSS 评分 7.2，危害等级高。攻击者无需认证即可利用此漏洞，建议用户升级至修复版本。"
published = "1999-01-03T05:00:00.000"
remediation = "升级 Debian 系统至 3.0 (woody) 或更高版本，netstd 包在后续版本中已修复此缓冲区溢出漏洞。如无法升级系统，可卸载 netstd 包并改用独立的 ftp 客户端（如 lftp 或 ncftp）替代。对于 Debian 2.0 用户，建议从 security.debian.org 获取 netstd 补丁版本。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "Debian GNU/Linux netstd FTP 客户端缓冲区溢出漏洞"
updated = "2026-06-16T21:49:19.180"

