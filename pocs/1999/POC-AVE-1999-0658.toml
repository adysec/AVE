[info]
author = "ave"
description = "验证 Solaris/SunOS arp 命令 -f 参数是否存在本地信息泄露漏洞。arp -f 读取指定文件时会将无法解析的行输出到 stdout，导致文件内容泄露。"
id = "POC-AVE-1999-0658"
name = "CVE-1999-0859 Solaris arp 本地信息泄露 PoC"
severity = "medium"
tags = ["ave-1999-0658"]
vuln_id = [
    "CVE-1999-0859",
    "AVE-1999-0658",
]

[poc]
logic = "all"

[[poc.requests]]
path = "/etc/passwd"
protocol = "file"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["root:"]
