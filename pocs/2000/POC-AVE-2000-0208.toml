[info]
author = "ave"
description = "检测 PowerScripts PlusMail WebConsole 1.0 的 CGI 程序 /cgi-bin/plusmail 是否存在并存在密码文件权限缺陷，远程攻击者可通过该漏洞读取任意文件或执行命令。"
id = "POC-AVE-2000-0208"
name = "PowerScripts PlusMail WebConsole 弱认证 PoC"
severity = "high"
tags = ["ave-2000-0208"]
vuln_id = [
    "CVE-2000-0074",
    "AVE-2000-0208",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/cgi-bin/plusmail"
protocol = "http"

[[poc.requests.matchers]]
expect = true
status = [200]
type = "status"
