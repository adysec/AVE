[basic]
description = "Check It Out 购物车应用程序存在远程安全漏洞，其根本原因在于将商品价格、金额等敏感购买信息保存在客户端可见的隐藏表单字段中，且服务端在处理订单时未对这些数据进行校验。未经身份认证的远程攻击者只需在浏览器中查看页面源码并篡改这些隐藏字段的值（如修改商品单价或总金额），再提交表单，即可以任意价格完成购买，从而绕过正常的价格计算逻辑。该漏洞利用门槛极低，无需特殊工具，任何能访问在线商店的用户均可实施攻击，主要影响使用 Check It Out 购物车程序的电子商务网站，可造成商家经济损失。CVSS 评分 7.5，危害等级为高危。"
published = "2000-02-01T05:00:00.000"
remediation = "建议升级 Check It Out 购物车应用至修复隐藏表单字段篡改漏洞的最新版本，或升级至 3.0 以上版本。临时缓解措施：在服务端实施价格/数量等敏感字段的服务端验证与签名校验，禁止仅依赖隐藏表单字段传递价格等敏感数据；在 Web 应用防火墙（WAF）层面配置规则拦截篡改隐藏字段的请求；部署应用层防火墙（WAF）规则拦截篡改隐藏表单字段的恶意请求。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "Check It Out 购物车应用程序远程安全漏洞，允许攻击者通过隐藏表单字段修改敏感的购买信息，导致数据篡改和潜在财务损失"
