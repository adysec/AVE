[basic]
description = "Microsoft Office 98 Macintosh 版在创建文件时未对分配的磁盘空间进行初始化清理，导致先前删除文件中的残留数据被写入新创建的 Office 文件中，造成敏感信息泄露。攻击者通过获取目标用户的 Office 文档，即可从中提取可能包含密码、私人通信等内容的残余数据。该漏洞影响 Office 98 Macintosh Edition，CVSS 评分 2.1，危害等级低，需本地文件访问权限方可利用。"
published = "1999-12-31T05:00:00.000"
remediation = "建议升级至 Microsoft Office 2001 for Mac 或更高版本，该漏洞已在后续版本中修复。作为临时缓解措施，在保存 Office 文件前使用磁盘擦除工具对文件存储区域进行清零处理，或使用文件加密软件保护敏感数据以防止信息泄露。"
score = 2.1
severity = "LOW"
sources = ["cve"]
title = "Microsoft Office 98 Macintosh Edition 信息泄露漏洞"
updated = "2026-06-16T21:50:03.430"

