[basic]
description = "Mint HTTP/2 客户端在处理 PUSH_PROMISE 帧时存在资源分配无限制漏洞。lib/mint/http2.ex 中的 decode_push_promise_headers_and_add_response/5 函数在收到服务端推送承诺帧后，直接将每个承诺的流 ID 插入 conn.streams 映射中，而未检查 max_concurrent_streams 并发限制。攻击者控制的恶意 HTTP/2 服务端可发送大量 PUSH_PROMISE 帧但不发送对应的响应 HEADERS 帧，导致每个承诺帧在客户端内存中永久占用约 148 字节的条目，最终耗尽客户端进程内存造成拒绝服务。该漏洞影响 mint 0.2.0 至 1.9.0 之前的所有版本，CVSS 评分 8.2，危害等级高。服务端推送默认开启，无需应用主动启用即可被利用。建议升级到 mint 1.9.0 或更高版本，或在连接到不可信服务端时设置 client_settings 中 enable_push 为 false 以禁用 HTTP/2 服务端推送功能。"
published = "2026-06-02T16:16:44.627"
remediation = "将 Mint 升级至 1.9.0 或更高版本（含补丁 commit 70b97b6）。如无法立即升级，在连接不可信服务器时通过 `client_settings: [enable_push: false]` 禁用 HTTP/2 Server Push，Mint 将在 PUSH_PROMISE 到达时直接返回 PROTOCOL_ERROR 从而阻断攻击路径。"
score = 8.2
severity = "HIGH"
sources = ["ghsa"]
title = "elixir-mint Mint HTTP/2 客户端 PUSH_PROMISE 资源耗尽拒绝服务漏洞"
updated = "2026-07-22T19:10:00.120"

