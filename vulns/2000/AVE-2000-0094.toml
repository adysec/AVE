[basic]
description = "WebSiteTool 购物车应用程序存在敏感信息篡改漏洞。该程序的购买流程依赖前端隐藏表单字段（hidden form fields）来传递商品价格、数量等敏感交易数据，且服务端未对这些字段进行校验或服务端侧二次确认。远程攻击者可在提交订单前，通过拦截并篡改 HTTP 请求中的隐藏表单字段值（如修改商品单价、数量或其他购买信息），以非预期的价格或条件完成购买。该漏洞影响所有使用 WebSiteTool 购物车应用程序的网站，攻击条件为攻击者能够正常访问目标网站的购物流程并拦截/重放其表单提交请求，无需身份认证即可利用。"
published = "2000-02-01T05:00:00.000"
remediation = "升级 WebSiteTool 购物车程序到已修复该隐藏表单字段篡改问题的官方版本（联系 vendors 获取 2000 年补丁）。临时缓解措施：在服务器端对订单金额、商品数量等敏感字段重新校验，禁止信任客户端提交的隐藏表单值，并对关键交易参数进行签名或会话绑定验证。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
