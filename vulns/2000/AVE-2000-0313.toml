[basic]
description = "NetBSD 1.3.3 及部分 Linux 系统中 traceroute 工具存在参数解析缺陷，本地用户可通过向 -w（waittime）选项传入超长数值，导致程序内部解析异常并将数据包发送延迟置为零。攻击者可利用该漏洞以极快速度向目标系统发送大量数据包，造成网络拥塞或拒绝服务。该漏洞需要本地用户权限才能触发，CVSS 评分 5.0，危害等级中危。"
published = "2001-03-12T05:00:00.000"
remediation = "NetBSD 用户应立即应用 19990217-traceroute 补丁（可从 ftp.NetBSD.ORG 获取），或升级至 NetBSD 1.3.3 以上版本。临时缓解措施：执行 `chmod u-s /usr/sbin/traceroute` 移除 traceroute 的 setuid 位，限制仅 root 用户可运行。Linux 用户应升级 traceroute 至 1.4a7 以上版本，或通过包管理器安装更新（如 `apt-get update && apt-get upgrade traceroute`）。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "NetBSD 和 Linux traceroute 本地拒绝服务漏洞"
updated = "2026-06-16T21:51:27.480"

