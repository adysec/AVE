[basic]
description = "Microsoft IIS 3.0 和 4.0 在 x86 和 Alpha 平台上存在 HTTP GET 拒绝服务漏洞，远程攻击者可通过发送畸形的 HTTP GET 请求触发该漏洞，导致 IIS 服务挂起停止响应，造成拒绝服务。该漏洞影响运行在 x86 和 Alpha 处理器架构上的 IIS 3.0 和 4.0 版本，攻击者无需身份认证即可远程发送畸形 GET 请求触发漏洞，导致 Web 服务停止响应。该漏洞 CVSS 评分 5.0，属于中危级别拒绝服务漏洞，微软已发布补丁修复该漏洞。"
published = "1999-12-31T05:00:00.000"
remediation = "安装 Microsoft Security Bulletin MS99-019 的安全补丁（KB234905），修复 IIS 3.0/4.0 对畸形 HTTP GET 请求处理不当导致的拒绝服务漏洞。若无法立即打补丁，可在 IIS 管理器中删除 .HTR、.IDC、.STM 等不需要的脚本映射，或在防火墙层面过滤包含畸形请求行的 HTTP 请求作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Microsoft IIS 3.0/4.0 HTTP GET 拒绝服务漏洞"
updated = "2026-06-16T21:49:34.207"

