[basic]
description = ".NET XML 加密实现 (System.Security.Cryptography.Xml 中的 EncryptedXml) 存在资源分配无限制漏洞 (CWE-770)。攻击者可构造恶意加密 XML 数据，触发不受控的资源消耗，导致拒绝服务。影响 .NET 8.0.0-8.0.28、.NET 9.0.0-9.0.17、.NET 10.0.0-10.0.9 版本中使用 System.Security.Cryptography.Xml 包的应用，CVSS 7.5 (HIGH)，网络远程利用、低攻击复杂度、无需权限和用户交互。攻击者仅需发送精心构造的加密 XML 数据即可触发资源耗尽导致服务拒绝。微软已在 .NET 8.0.29、.NET 9.0.18、.NET 10.0.10 中修复，开发者需升级 System.Security.Cryptography.Xml NuGet 包至修复版本并重新编译部署应用。"
published = "2026-07-14T20:17:37.120"
remediation = "立即通过 NuGet 更新 System.Security.Cryptography.Xml 包：.NET 8.0 升级到 8.0.29，.NET 9.0 升级到 9.0.18，.NET 10.0 升级到 10.0.10。使用 Visual Studio NuGet 包管理器、Package Manager Console 执行 `Update-Package -Id System.Security.Cryptography.Xml` 或 .NET CLI 执行 `dotnet add package System.Security.Cryptography.Xml` 更新后重新编译部署应用。建议同步更新 .NET Runtime/SDK 到对应版本（8.0.29/9.0.18/10.0.10）以获得完整防护。若暂时无法升级，可在网络层限制非受信 XML 输入作为临时缓解。"
score = 7.5
severity = "HIGH"
sources = ["ghsa"]
title = "Microsoft .NET XML加密拒绝服务漏洞"
updated = "2026-07-22T21:17:40.760"

