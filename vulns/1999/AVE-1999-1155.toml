[basic]
description = "Gene6 G6 FTP Server 2.0 在处理 FTP 登录过程的 USER 与 PASS 命令时，未对用户名和密码字符串的长度进行任何有效性校验。远程攻击者无需身份认证，只需向服务器发送超长的用户名或密码字符串，即可触发服务器资源耗尽并最终导致服务崩溃，造成拒绝服务。该漏洞影响 Gene6 G6 FTP Server 2.0 版本，攻击条件为能够与目标 FTP 服务建立TCP连接并发送登录命令。"
published = "1999-11-17"
remediation = "升级到修复了该问题的 Gene6 G6 FTP Server 后续版本；若无法立即升级，可在 FTP 服务器前端部署入侵检测规则，对超过 200 字节的 USER/PASS 命令直接拦截并断开连接，同时在防火墙层面限制 FTP 服务仅对可信 IP 开放。"
score = 5.0
severity = "MEDIUM"
sources = ["cve"]
title = "Gene6 G6 FTP Server 2.0 超长用户名密码拒绝服务漏洞"
updated = "2026-07-16"

