[basic]
description = "Inter7 vpopmail vchkpw 程序在 4.8 版本前存在格式化字符串漏洞，vchkpw 程序在调用 syslog 时未正确清洗不可信的格式化字符串，远程攻击者可通过发送包含任意格式化指令的 USER 或 PASS 命令触发该漏洞，导致拒绝服务。该漏洞影响 Inter7 vpopmail 4.5 和 4.7 版本（4.8 之前版本），CVSS 评分 5.0（AV:N/AC:L/Au:N/C:N/I:N/A:P），属于网络可访问、低攻击复杂度、无需认证、部分可用性影响的拒绝服务漏洞。攻击者无需认证即可远程发送包含格式化字符串指令（如 %n、%s 等）的 USER 或 PASS 命令，导致 vchkpw 进程崩溃或异常行为，造成邮件服务拒绝服务。升级至 vpopmail 4.8 或更高版本可修复该漏洞。"
published = "2000-06-30T04:00:00.000"
remediation = "建议立即升级 vpopmail 至 4.8 或更高版本（官方已修复该格式化字符串漏洞）。若无法立即升级，可通过 TCP Wrappers 或防火墙限制 vchkpw 服务仅允许受信 IP 访问，并在 syslog 配置中禁用 vchkpw 的格式化字符串日志记录功能作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Inter7 vpopmail Syslog 拒绝服务漏洞"
updated = "2026-06-16T21:52:02.937"

