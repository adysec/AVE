[basic]
description = "Linux 内核 BPF 子系统中存在一个由 freplace 程序与尾调用（tailcall）组合引发的无限循环漏洞。当 entry_freplace 的附加目标为 subprog_tc，而尾调用又指向 entry_tc 时，会形成 entry_tc → subprog_tc → entry_freplace → tailcall → entry_tc 的死循环。由于每次执行 entry_freplace 时 tail_call_cnt 计数器都会重置为零，尾调用机制无法终止，最终导致内核崩溃（kernel panic）。本地攻击者只需低权限即可触发此漏洞，造成系统拒绝服务。该漏洞影响 Linux 内核各发行版版本，CVSS 评分 5.5，危害等级中等。"
published = "2025-01-11T13:15:22.390"
remediation = "立即将 Linux 内核升级至 6.12.5 或更高版本（主线内核已包含修复提交 987aa730bad3 和 d6083f040d5d）。各发行版用户请安装对应安全更新：Ubuntu 24.04 LTS 安装 USN-7381-1 或 USN-7450-1 更新，SUSE Linux Enterprise 15 SP6 安装 SUSE-SU-2025:1177-1 更新。如无法立即升级，可通过 seccomp 限制 BPF 系统调用（禁用 bpf() 和 BPF_PROG_TYPE_EXT 相关操作）作为临时缓解措施。"
score = 5.5
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux Kernel BPF 尾调用无限循环拒绝服务漏洞"
updated = "2026-06-17T07:57:45.727"

