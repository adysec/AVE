[basic]
description = "Open WebUI（自托管AI平台）存在存储型跨站脚本（Stored XSS）漏洞，CWE-79分类。低权限用户可通过`/api/v1/files/`接口上传包含恶意JavaScript代码的HTML文件，服务器返回文件ID后，攻击者可构造链接诱导管理员点击，从而劫持管理员账户，进而利用管理员权限通过平台功能实现远程代码执行。默认配置下低权限用户上传的文件仅管理员或上传者自身可查看，限制了攻击面但未消除风险。该漏洞影响0.6.6之前版本，CVSS评分5.3，危害等级中危。"
published = "2025-05-05T19:15:57.050"
remediation = "升级 Open WebUI 至 v0.6.6 及以上版本（官方已修复文件上传 XSS 漏洞）。如暂无法升级，可在反向代理层限制 `/api/v1/files/` 端点的上传文件类型，禁止上传 `.html` 后缀文件作为临时缓解措施。"
score = 5.3
severity = "MEDIUM"
sources = ["ghsa"]
title = "Open WebUI 存储型跨站脚本漏洞"
updated = "2026-06-17T09:26:38.630"

