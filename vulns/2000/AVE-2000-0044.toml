[basic]
description = "Linuxconf 1.1.6 r10 存在远程缓冲区溢出漏洞，攻击者可通过向目标系统提交超长参数触发缓冲区溢出，导致任意代码执行并以 root 权限完全控制受影响系统。该漏洞无需身份认证即可远程利用，危害等级严重，CVSS 评分 10.0。建议用户立即升级至高版本或应用补丁。"
published = "1999-12-21T05:00:00.000"
remediation = "立即升级 Linuxconf 至 1.1.7 及以上版本，或卸载 linuxconf 软件包（该项目已停止维护），改用 Webmin/Cockpit 等现代管理工具替代。如无法升级，在防火墙层面限制对端口 98/tcp 的访问，仅允许可信 IP 连接。"
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "Linux Linuxconf 远程缓冲区溢出漏洞"
updated = "2026-06-16T21:50:49.870"

