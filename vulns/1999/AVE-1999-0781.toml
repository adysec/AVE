[basic]
description = "CVE-1999-0524 是 Linux 内核中 ICMP 协议实现存在的信息泄露缺陷。目标系统默认允许任意远程主机向其发送 ICMP 掩码请求（Type 17/18）与 ICMP 时间戳请求（Type 13/14），并在未做来源限制的情况下返回本机的子网掩码、当前时间戳及发送时间戳等网络配置信息。攻击者在无需身份认证的条件下，只需向目标主机发送特制的 ICMP 请求报文即可获取上述信息，从而辅助推断目标网络拓扑、子网划分及系统时钟，为后续针对性攻击提供侦察依据。该漏洞影响启用了相关 ICMP 响应功能的 Linux 内核系统，虽属中危信息泄露，但在内网探测与隐蔽侦察场景中具有一定利用价值。"
published = "1997-08-01T04:00:00.000"
remediation = "升级 Linux 内核至发行版提供的最新安全版本，并在 sysctl.conf 中设置 net.ipv4.icmp_echo_ignore_broadcasts=1 以禁用对广播地址的 ICMP 响应。同时通过 iptables 或 nftables 添加规则阻断外部主机发来的 ICMP timestamp 请求（类型 13）和 ICMP address mask 请求（类型 17），例如使用 iptables -A INPUT -p icmp --icmp-type timestamp-request -j DROP 和 iptables -A INPUT -p icmp --icmp-type address-mask-request -j DROP。如无法立即升级内核，可在防火墙层限制 ICMP 类型 13 和 17 的入站流量作为临时缓解。"
score = 4
severity = "MEDIUM"
sources = ["epss"]
title = "Linux Kernel 远程主机 ICMP 信息泄露漏洞"
updated = "2026-06-16T21:48:34.703"

