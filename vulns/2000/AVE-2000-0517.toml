[basic]
description = "GAMSoft TelSrv telnet 服务器 1.5 及更早版本存在缓冲区溢出漏洞，远程攻击者可通过向服务器发送超长的用户名数据触发该漏洞，导致服务进程崩溃造成拒绝服务。该漏洞影响 GAMSoft TelSrv 1.5 及之前版本，CVSS 评分 5.0，危害等级中等。攻击者无需身份认证即可远程利用，Metasploit 框架已集成对应利用模块。"
published = "2000-07-17T04:00:00.000"
remediation = "建议立即停用 GAMSoft TelSrv，迁移至 OpenSSH 等现代加密远程管理方案。如无法替换，应在网络边界防火墙限制 TCP 23 端口的访问来源，仅允许受信任 IP 连接，作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "GAMSoft TelSrv 远程缓冲区溢出漏洞"
updated = "2026-06-16T21:52:13.277"

