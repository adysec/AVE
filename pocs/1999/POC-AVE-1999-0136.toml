[info]
author = "ave"
description = "FLEXlm License Manager 在 IRIX 和 Solaris 2.5.1 系统中以 root 权限创建全局可写(666)的锁定文件并跟随符号链接，本地攻击者可通过创建符号链接实现权限提升。验证方式：检查 /var/tmp/ 下 FLEXlm 锁定文件。"
id = "POC-AVE-1999-0136"
name = "IRIX / Solaris FLEXlm License Manager Symlink Attack PoC"
severity = "high"
tags = ["ave-1999-0136"]
vuln_id = [
    "CVE-1999-0051",
    "AVE-1999-0136",
]

[poc]
logic = "any"

[[poc.requests]]
path = "/var/tmp/locksuntechd"
protocol = "file"

[[poc.requests.matchers]]
expect = true
part = "body"
regex = ".+"
type = "regex"
