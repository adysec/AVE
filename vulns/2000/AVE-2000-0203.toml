[basic]
description = "Linux 2.2.x 内核中 Unix 域套接字存在资源限制缺陷，wmem_max 参数未对本地用户可创建的 Unix 域套接字数量进行有效限制。本地攻击者可通过在受影响系统上大量请求创建 Unix 域套接字，耗尽系统内核内存资源，从而导致系统拒绝服务。该漏洞影响 Linux 2.2.12/2.2.14/2.3.99 及 RedHat 6.x 等版本，CVSS 评分 2.1，危害等级低。由于需要本地用户权限，攻击门槛较高。"
published = "2000-03-23T05:00:00.000"
remediation = "升级 Linux 内核至 2.2.16 及以上版本，该版本已对 Unix 域套接字数量施加限制，防止本地用户通过创建大量套接字耗尽系统资源。对于 RedHat 6.x 用户，建议升级至 RedHat 官方提供的最新内核更新包，或迁移至受支持的操作系统版本。"
score = 2.1
severity = "LOW"
sources = ["epss"]
title = "Linux Kernel 2.2.x Unix 域套接字拒绝服务漏洞"
updated = "2026-06-16T21:51:16.173"

