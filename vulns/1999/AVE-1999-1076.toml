[basic]
description = "Windows NT 存在安全策略绕过漏洞。当服务器主机名超过 13 个字符时，系统无法正确解析 Ntconfig.pol 文件中的全局组策略配置，导致已设限制策略无法生效。攻击者利用该漏洞可绕过管理员设定的安全策略获取非授权访问权限，影响 Windows NT 系列系统。此漏洞源于系统在处理长主机名时策略引擎的异常行为，无需特殊工具即可利用。"
published = "1999-12-31T05:00:00.000"
remediation = "将服务器主机名缩短至 13 个字符以内，确保 Ntconfig.pol 全局组策略正常生效。安装微软 KB Q163875 提供的 hotfix 补丁以彻底修复该问题。鉴于 Windows NT 已停止安全支持，建议升级至 Windows Server 2003 或更高版本操作系统。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "Microsoft Windows NT Ntconfig.pol 策略安全绕过漏洞"
updated = "2026-06-16T21:50:16.343"

