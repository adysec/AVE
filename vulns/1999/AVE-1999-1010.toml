[basic]
description = 'SystemSoft SystemWizard 软件包在 HP Pavilion PC（Windows 98 系统）中安装了两个标记为"对脚本安全"的 ActiveX 控件（Launch 控件和 RegObj 控件），远程攻击者可通过构造恶意网页调用这些控件执行任意命令。该漏洞影响 HP Pavilion PC 及可能其他平台和操作系统，攻击者只需诱导用户访问恶意网页即可触发，无需任何身份认证。CVSS 评分 7.5，危害等级高。'
published = "1999-12-31T05:00:00.000"
remediation = "在注册表中为 SystemWizard 的两个 ActiveX 控件（Launch 和 RegObj）设置 killbit，将对应 CLSID 下的 Compatibility Flags DWORD 值设为 0x400，阻止 Internet Explorer 调用；同时卸载 SystemWizard 软件包。建议将操作系统升级至受支持的 Windows 版本以彻底消除遗留 ActiveX 安全风险。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "SystemSoft SystemWizard ActiveX 远程代码执行漏洞"
updated = "2026-06-16T21:49:56.753"

