[basic]
description = "微信 Windows 客户端 3.9.11.25 版本存在自触发远程代码执行（Self RCE）漏洞。该漏洞源于客户端在解析或处理特定构造的数据时缺乏充分的安全校验，导致攻击者可在目标用户本地环境中执行任意代码。影响范围为安装了微信 3.9.11.25 版本（Windows 平台）的终端用户。攻击条件通常是受害者需在本机运行受影响版本的微信，并触发漏洞相关的特定操作或处理恶意构造的内容，从而实现无需额外远程交互的本地自触发代码执行，进而完全控制用户会话与系统资源。"
published = "0726"
remediation = "建议立即将微信电脑版升级至 3.9.12 及以上修复版本（通过微信客户端「设置→关于微信→检查更新」或官网 https://weixin.qq.com 重新下载安装）。如无法立即升级，应避免点击或打开来自陌生联系人的文件/链接，并在企业环境中通过终端管控策略限制微信进程对本地命令执行接口的调用，关闭自动下载文件功能以降低被诱导触发远程代码执行的风险。"
score = 5
