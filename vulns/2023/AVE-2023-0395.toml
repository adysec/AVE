[basic]
description = "Linux 内核内存管理子系统（mm/memcontrol.c）中的 obj_stock_flush_required() 函数存在空指针解引用漏洞。由于 stock->cached_objcg 字段在检查和解引用之间存在竞态条件（data race），本地攻击者可通过特定套接字选项设置（setsockopt）等系统调用触发该竞态，导致内核崩溃（Oops），造成拒绝服务。该漏洞影响 Linux 内核 6.3-rc2 及之前版本，CVSS 评分 4.7，危害等级中危。修复方式是对 stock->cached_objcg 的所有访问使用 READ_ONCE()/WRITE_ONCE() 宏以消除竞态。"
published = "2025-09-18T14:15:43.417"
remediation = "升级 Linux 内核至 6.3 及以上版本（含补丁 commit 使用 READ_ONCE()/WRITE_ONCE() 保护 stock->cached_objcg 访问），或应用对应长期支持分支（6.1.y、5.15.y、5.10.y）中反向移植的稳定补丁。发行版用户可通过包管理器安装最新内核更新（如 `apt upgrade linux-image` / `yum update kernel`）并重启系统生效。"
score = 4.7
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux Kernel 内存管理子系统空指针解引用漏洞"
updated = "2026-06-17T06:45:13.540"

