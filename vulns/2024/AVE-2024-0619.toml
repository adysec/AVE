[basic]
description = "Linux 内核的 OCFS2 文件系统存在释放后使用（Use-After-Free）漏洞，当挂载 OCFS2 文件系统后以只读方式重新挂载时，dqi_priv 指针被释放但未置空，导致悬垂指针。本地低权限攻击者随后通过 quota_getnextquota 系统调用访问该悬垂指针，触发 slab 内存释放后重用，可能造成系统崩溃或权限提升。该漏洞影响使用 Linux 内核 OCFS2 文件系统的发行版，CVSS 评分 7.8，危害等级高。"
published = "2025-01-15T13:15:13.710"
remediation = "立即升级 Linux 内核至以下已修复版本：5.4.290+、5.10.234+、5.15.177+、6.1.125+、6.6.70+、6.12.9+，或应用主线补丁 commit 2d4311924863。Debian 11 用户请安装 DLA-4075-1 更新，Ubuntu 24.04 LTS 用户请安装 USN-7381-1 更新。如无法立即升级，避免在 OCFS2 文件系统上执行 quota_getnextquota 系统调用，并避免将 OCFS2 挂载点从读写重新挂载为只读。"
score = 7.8
severity = "HIGH"
sources = ["msrc"]
title = "Linux Kernel ocfs2 释放后使用漏洞"
updated = "2026-06-17T08:14:09.720"

