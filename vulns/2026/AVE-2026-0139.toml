[basic]
description = "天锐绿盾审批系统 `updateFilePrintParams.do` 接口存在 FastJson 反序列化漏洞，由于系统未对用户传入的 JSON 数据进行安全过滤和类型校验，攻击者可通过构造恶意的 FastJson 序列化数据触发反序列化操作，导致远程代码执行。该漏洞影响天锐绿盾审批系统多个版本，攻击者无需身份认证即可利用该漏洞完全控制目标服务器，危害严重。建议升级 FastJson 版本并启用 safeMode 进行防护。"
published = "nday"
remediation = '将 FastJson 升级至 1.2.83 及以上版本（或 2.0.26 及以上版本），并在项目中通过 System.setProperty("fastjson.parser.safeMode", "true") 或 JVM 参数 -Dfastjson.parser.safeMode=true 启用 safeMode，彻底禁用 autoType 功能以防止反序列化攻击。同时升级天锐绿盾审批系统至厂商提供的最新补丁版本。'
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "天锐绿盾 审批系统 FastJson反序列化漏洞"
updated = "nday"

