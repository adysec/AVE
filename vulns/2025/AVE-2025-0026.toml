[basic]
description = "Personal Weather Station Dashboard 12_lts 版本存在路径遍历漏洞，未经身份认证的远程攻击者可通过向 /others/_test.php 发送特制的 test 参数（如 ../../../apache/conf/ssl.key/server.key）实现目录遍历，从而读取服务器任意文件，包括以明文方式泄露服务端 SSL 私钥等敏感信息。该漏洞 CVSS 评分 5.8，危害等级中危。建议升级至最新版本修复。"
published = "2025-05-07T18:15:43.393"
remediation = "升级 PWS Dashboard 至 12_lts 之后的安全版本；如无补丁，立即删除或禁用 `/others/_test.php` 文件；在 Web 服务器（Apache/Nginx）层面添加规则，拦截包含 `../` 的 `test` 参数请求；限制 Web 进程对敏感目录（如 `/etc`、SSL 密钥目录）的读取权限。"
score = 5.8
severity = "MEDIUM"
sources = ["hwpoc"]
title = "Personal Weather Station Dashboard 任意文件读取漏洞"
updated = "2026-06-17T09:28:06.057"

