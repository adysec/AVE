[info]
author = "ave"
description = "验证 Nortel Networks Optivity NETarchitect 2.0 中 bna_pass 程序的 PATH 环境变量注入漏洞。通过检查 /opt/bna/bin/bna_pass 二进制文件是否存在，确认目标系统是否安装了受影响的 Optivity NETarchitect 软件。该文件存在表明系统可能受此本地权限提升漏洞影响，攻击者可通过操纵 PATH 环境变量在目录前添加恶意 rm 程序来执行任意命令。"
id = "POC-AVE-2000-0010"
name = "CVE-2000-0009 PoC"
severity = "high"
tags = ["ave-2000-0010"]
vuln_id = [
    "CVE-2000-0009",
    "AVE-2000-0010",
]

[poc]
logic = "all"

[[poc.requests]]
path = "/opt/bna/bin/bna_pass"
protocol = "file"

[[poc.requests.matchers]]
expect = true
part = "body"
regex = ".+"
type = "regex"
