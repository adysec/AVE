[basic]
description = "Linux 内核 mlx5e 驱动在处理封装锁（encap lock）时存在空指针解引用漏洞。当模块卸载过程中仍有对等 tc 流处于 offload 状态时，上游链路 rep 配置文件切换为 nic 配置导致 neigh encap 锁被销毁；后续 VF 代表网卡注销触发非对等 tc 流删除，进而级联删除对等流。对等流删除过程会尝试获取已被销毁的 encap 锁，触发空指针解引用导致内核崩溃。本地攻击者可通过构造特定的 tc 流卸载配置触发此漏洞，造成拒绝服务。该漏洞影响 Linux 内核中 Mellanox mlx5 网卡驱动相关版本，CVSS 评分 5.5，危害等级中危。"
published = "2025-05-02T16:15:29.430"
remediation = "将 Linux 内核升级至 6.1.21、6.2.8 或更高版本，其中已合入清理 mlx5e tc eswitch 时清除 peer flow 的修复补丁（commit c9668f0b1d28 / b7350f8dbe0c2）。如无法立即升级内核，可卸载 mlx5_core 模块前先移除所有 tc flower 流表规则避免触发释放后空指针解引用。"
score = 5.5
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux Kernel mlx5e 网卡驱动封装锁清理空指针解引用漏洞"
updated = "2026-06-17T06:44:18.430"

