[basic]
description = "Windows NT 系统的事件日志（Event Log）配置了不恰当的访问控制权限，导致权限设置过于宽松。该漏洞影响运行 Windows NT 操作系统的服务器与工作站，攻击者只需具备本地或远程的普通用户访问权限，即可读取、篡改或清除系统安全事件日志，从而掩盖其入侵痕迹、破坏审计完整性，并可能借此获取系统配置与用户活动等敏感信息。利用方式通常为直接访问事件日志文件或调用相关 API，绕过应有的安全限制，造成日志机密性与完整性受损。"
published = "1999-01-01T05:00:00.000"
remediation = '安装 Windows NT 4.0 Service Pack 6a 或更高版本安全更新，修复事件日志默认权限配置不当问题。如无法安装补丁，通过 regedt32 将注册表项 HKEY_LOCAL_MACHINE\SYSTEM\CurrentControlSet\Services\EventLog 的权限限制为仅 Administrators 和 SYSTEM 完全控制，并确保 %SystemRoot%\System32\config\*.evt 文件权限仅允许 Administrators 组读写。'
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "Microsoft Windows NT 事件日志访问权限不当远程安全漏洞"
updated = "2026-06-16T21:48:41.650"

