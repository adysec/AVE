[basic]
description = "Zope 2.2.4 之前版本存在本地角色计算缺陷，已认证用户可通过精心构造的请求绕过预设的访问控制限制，获取超出其权限范围的管理员或更高权限。该漏洞源于 Zope 对用户本地角色（Local Roles）的权限判定逻辑不完善，导致角色继承与权限边界校验失效。攻击者只需拥有普通用户账户即可利用此漏洞，无需特殊网络条件，CVSS 评分 7.2，危害等级高。"
published = "2001-03-12T05:00:00.000"
remediation = "立即将 Zope 升级至 2.2.4 或更高版本，该版本修复了本地角色计算不当导致权限绕过的缺陷。如无法立即升级，可临时移除受影响用户的本地角色分配，改用全局角色替代，并严格审查用户权限配置。"
score = 7.2
severity = "HIGH"
sources = ["redhat"]
title = "Zope Zope 本地角色权限提升漏洞"
updated = "2026-06-16T21:53:42.550"

