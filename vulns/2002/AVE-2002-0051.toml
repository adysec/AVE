[basic]
description = "Heartbeat 0.4.9 及更早版本中存在多处格式化字符串漏洞，远程攻击者可通过向 UDP 端口 694 发送特制数据包触发该漏洞，导致任意代码执行。该漏洞影响所有运行 Heartbeat 服务的系统，无需身份认证即可远程利用，CVSS 评分 10.0，危害等级严重。厂商已发布补丁修复此漏洞，建议用户升级至最新版本。"
published = "2002-10-28T05:00:00.000"
remediation = "升级 heartbeat 至 0.4.9.0l-7.2 或更高版本（Debian 3.0 woody 对应 DSA-174）。如无法升级，在防火墙或 iptables 层面限制外部对 UDP 694 端口的访问，仅允许受信任源 IP 通信。同时禁用 heartbeat 的格式字符串调试功能（如有），并确保 heartbeat 以最小权限用户运行。"
score = 10
severity = "CRITICAL"
sources = ["osv"]
title = "Linux HA heartbeat 格式化字符串远程代码执行漏洞"
updated = "2026-06-16T21:58:56.743"

