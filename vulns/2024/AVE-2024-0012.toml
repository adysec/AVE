[basic]
description = "Oracle WebLogic Server Core 组件存在安全漏洞，未经身份认证的远程攻击者可通过 T3、IIOP 协议向目标服务器发送特制请求，成功利用后可未授权访问服务器中的敏感数据，导致机密性受损。该漏洞影响 WebLogic Server 12.2.1.4.0 及 14.1.1.0.0 版本，CVSS 评分 7.5，危害等级高危。Oracle 已在 2024 年 4 月关键补丁更新中修复此漏洞，建议用户尽快升级至修复版本。"
published = "2024-04-16T22:15:14.580"
remediation = '建议立即升级Oracle WebLogic Server至2024年7月关键补丁更新（CPU）修复版本：12.2.1.4.0升级至2024年7月PSU补丁（补丁编号35304436），14.1.1.0.0升级至2024年7月PSU补丁（补丁编号35304441）。若暂无法升级，可在防火墙层面限制T3/IIOP协议端口（默认7001/7002）仅限可信IP访问，或在WebLogic控制台启用"Enable IIOP"和"Enable T3"为false禁用相关协议作为临时缓解措施。建议尽快通过Oracle Support下载并应用官方补丁补丁包（p35304436_122140_Generic.zip / p35304441_141100_Generic.zip）。'
score = 7.5
severity = "HIGH"
sources = ["hwpoc"]
title = "Oracle WebLogic Server 远程代码执行漏洞"
updated = "2026-06-17T07:08:20.627"

