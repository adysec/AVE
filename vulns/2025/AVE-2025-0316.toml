[basic]
description = "奇安信SecFox运维安全管理与审计系统存在命令执行漏洞（CNVD-2025-16451）。由于系统对用户输入过滤不严，攻击者可通过构造特制请求包向目标系统发送恶意数据，在未授权的情况下远程执行任意系统命令，进而完全控制服务器。该漏洞影响SecFox运维安全管理与审计系统多个版本，攻击复杂度低，无需用户交互，危害严重。"
published = "0721"
remediation = "建议立即升级奇安信SecFox运维安全管理与审计系统至厂商发布的最新安全版本，关闭系统对外暴露的非必要端口和服务，在Web应用防火墙（WAF）侧添加针对命令注入特征的防护规则，同时限制管理后台的访问来源IP为可信管理网段。如无法立即升级，可临时禁用系统后台中涉及命令执行的接口模块。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "奇安信 SecFox运维安全管理与审计系统 命令执行漏洞"
updated = "0721"

