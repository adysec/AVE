[basic]
description = "OpenBSD 2.4 操作系统 IP 碎片重组模块存在资源耗尽漏洞，远程攻击者无需身份认证，通过向目标系统发送大量特制的 IP 分片数据包即可触发该漏洞。由于系统在处理大量分片包时未能有效释放已分配的资源，导致内存或内核缓冲区被耗尽，最终造成系统拒绝服务。该漏洞影响 OpenBSD 2.4 版本，攻击者仅需具备网络可达条件即可实施利用，复杂度较低。"
published = "2001-03-12T05:00:00.000"
remediation = "建议立即升级到 OpenBSD 2.5 或更高版本。如无法升级，请依次应用 OpenBSD 2.4 errata 页面提供的源代码补丁：先应用 #maxqueue 补丁（增加 IP 碎片队列上限），再应用补丁 006（修复 IP ipq 竞态条件导致的远程崩溃），最后应用补丁 008（限制 IP 分片重组资源消耗，防止大量分片包耗尽系统资源）。应用补丁后需重新编译内核并重启生效。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "OpenBSD 2.4 IP分片重组 拒绝服务漏洞"
updated = "2026-06-16T21:51:26.990"

