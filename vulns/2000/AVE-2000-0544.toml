[basic]
description = "Microsoft SQL Server 的 DTS（数据转换服务）包属性对话框存在密码明文泄露漏洞。本地攻击者可通过访问 DTS 包的属性设置界面，直接查看以明文形式存储的数据库连接密码，导致敏感凭据泄露。该漏洞影响 Microsoft SQL Server 7.0 及更早版本，攻击者需拥有本地操作系统访问权限，无需身份认证即可利用。由于密码以明文存储于 DTS 包中，任何能够打开 DTS 包属性对话框的用户均可获取数据库凭据，进而可能访问后端数据库中的敏感数据。"
published = "2000-05-30T04:00:00.000"
remediation = "升级到受支持的 SQL Server 版本（如 SQL Server 2019/2022），该漏洞仅影响已停止维护的 SQL Server 7.0 及更早版本。如无法升级，限制对 DTS 包文件的访问权限，仅允许管理员账户读取包含密码的 DTS 配置文件，并避免在 DTS 包属性中保存明文密码。"
score = 2.1
severity = "LOW"
sources = ["epss"]
title = "Microsoft SQL Server DTS 密码泄露漏洞"
updated = "2026-06-16T21:51:50.143"

