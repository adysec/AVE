[basic]
description = "Linux 内核块设备子系统中存在使用后释放（Use-After-Free）漏洞。当磁盘进行重验证（revalidation）操作更新 conventional zones 位图时，`disk_zone_is_conv()` 辅助函数在并发访问中可能引用已释放的内存，导致内核崩溃或拒绝服务。该漏洞影响使用分区块设备（zoned block devices）的 Linux 系统，本地攻击者需具备低权限访问，通过触发磁盘重验证操作即可利用，CVSS 评分 5.5，危害等级中等。"
published = "2025-01-11T15:15:07.803"
remediation = "建议升级 Linux 内核至 6.12.8、6.11.11、6.6.73、6.1.125、5.15.176 或 5.10.232 及以上版本（含修复提交 493326c4f10c）。若无法立即升级内核，可通过禁用 SCSI 设备的区域重新验证功能（echo 0 > /sys/block/sdX/queue/zoned）作为临时缓解，或限制本地非特权用户对块设备的访问权限。建议优先通过发行版内核更新（如 Ubuntu USN-7381-1）部署修复内核包。"
score = 5.5
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux Linux内核块层常规区域位图使用后释放漏洞"
updated = "2026-06-17T08:14:07.467"

