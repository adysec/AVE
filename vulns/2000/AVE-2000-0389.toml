[basic]
description = "Sam Lantinga 的 splitvt 1.6.3 控制台工具存在严重的缓冲区溢出漏洞。此漏洞源于屏幕锁定功能的处理逻辑缺陷，当用户输入过长的密码时，会导致程序分配的缓冲区溢出。通过精心构造的超长密码，攻击者可以覆盖相邻内存区域，劫持控制流并执行任意代码，最终实现系统权限的提升。该漏洞仅影响本地用户，攻击者无需认证即可通过屏幕锁定功能发起攻击，影响 Linux 系统的安全性。受影响版本涵盖整个 splitvt 1.6.3 及其所有早期版本。攻击者需要物理访问权限或能触发屏幕锁定功能来利用此漏洞。该漏洞利用了程序内存安全管理的不足，攻击者可以利用缓冲区溢出攻击来绕过安全限制，从而获得 root 权限。这是一个典型的本地权限提升漏洞，攻击者可以利用用户在登录屏幕锁定时输入的过长密码来触发溢出，导致程序崩溃并劫持控制流，从而执行任意代码。安全性高，建议对系统进行系统补丁或升级到安全版本。此漏洞作为经典的权限提升攻击手法被广泛应用于诸多安全渗透测试中，作为安全认证体系中权限变更和提升其中的关键测试点和控制手段之一。"
published = "2000-06-01T04:00:00.000"
remediation = "建议立即升级 splitvt 至 1.6.4 或更高版本（若发行版已发布修复版本）。若无法升级，请立即移除 splitvt 二进制文件的 SUID 权限：chmod u-s /usr/bin/splitvt，或在编译选项中禁用屏幕锁定功能（--disable-lock）后重新编译安装。 Debian 用户可安装 2000 年 6 月发布的安全更新（DSA-0605），其他发行版请参考对应安全公告升级软件包。若暂无补丁，请暂时卸载 splitvt 或限制普通用户执行权限（chmod 700 /usr/bin/splitvt）。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "Sam Lantinga splitvt 缓冲区溢出漏洞"
updated = "2026-06-16T21:51:47.820"

