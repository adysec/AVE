[basic]
description = "部分防火墙或网络过滤器在处理分片 SYN 数据包时存在策略绕过漏洞，攻击者可通过向目标网络发送设置了 IP 保留位的特制分片 SYN 数据包，绕过防火墙或过滤器的访问控制规则，未经授权访问受保护的内部网络资源。该漏洞影响多种品牌和型号的防火墙产品，远程攻击者无需身份认证即可利用，CVSS 评分 7.5，危害等级高。厂商通过更新防火墙的分片重组和标志位检查逻辑修复此问题。"
published = "1999-01-01T05:00:00.000"
remediation = "对防火墙启用状态检测（Stateful Inspection）功能，确保所有IP分片报文在重组完成后再进行规则匹配，禁止直接放行分片SYN包。同时在防火墙上配置策略丢弃IP头部保留位非零的数据包，并禁用非必要接口的IP路由转发功能作为临时缓解措施。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "防火墙或过滤器 IP分片SYN数据包 安全策略绕过漏洞"
updated = "2026-06-16T21:47:58.897"

