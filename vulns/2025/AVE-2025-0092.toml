[basic]
description = "用友畅捷通T+的GLSyncService.asmx接口存在SQL注入漏洞，攻击者无需身份认证即可通过SOAP协议向GetSourceAccountDataTable方法发送特制XML请求，在versionType参数中注入恶意SQL语句，可获取数据库敏感信息（如管理员密码、财务数据等）。该漏洞影响畅捷通T+全版本，攻击复杂度低，危害严重。"
published = "0705"
remediation = "建议升级用友畅捷通T+至最新安全版本（≥17.0），官方已修复GLSyncService.asmx接口的SQL注入漏洞。如无法立即升级，可在Web应用防火墙(WAF)配置规则拦截SOAP请求中的SQL注入特征（如UNION、SELECT、@@VERSION等），并在网络层限制对/tplus/GLSyncService.asmx路径的访问仅允许受信IP。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "用友 畅捷通T+ GLSyncService.asmx SQL注入漏洞"
updated = "0705"

