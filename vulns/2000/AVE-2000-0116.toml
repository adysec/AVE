[basic]
description = "Cat Soft Serv-U FTP Server 2.5/a/b 版本中 SHGetPathFromIDList 函数存在缓冲区溢出漏洞。远程攻击者可通过向目标 FTP 服务器发送包含畸形 .lnk 文件的 LIST 命令，触发缓冲区溢出，导致服务拒绝服务崩溃。该漏洞影响 Windows 95/98/2000/NT 4.0 平台上的 Serv-U FTP Server，攻击条件简单，无需身份认证即可实施。"
published = "2000-02-04T05:00:00.000"
remediation = "升级 Serv-U FTP Server 至 2.5c 或更高版本，该漏洞已在后续版本中修复。如无法升级，在防火墙侧限制 FTP 服务仅对可信 IP 开放，并禁止上传 .lnk 文件作为临时缓解措施。"
score = 2.1
severity = "LOW"
sources = ["epss"]
title = "Cat Soft Serv-U FTP Server 缓冲区溢出漏洞"
updated = "2026-06-16T21:51:03.660"

