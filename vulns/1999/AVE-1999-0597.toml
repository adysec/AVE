[basic]
description = "SCO UnixWare 7.1 系统中 /var/mail 目录的默认权限设置存在安全漏洞，本地用户可利用该目录的宽松权限读取或修改其他用户的邮件内容，导致敏感信息泄露。该漏洞源于系统安装时 /var/mail 目录权限配置不当，未对用户间访问进行隔离。攻击者只需拥有本地系统访问权限即可利用，无需额外认证。该漏洞影响 SCO UnixWare 7.1 版本，CVSS 评分 3.6，危害等级低。"
published = "1999-12-03T05:00:00.000"
remediation = "建议立即升级到最新的 SCO UnixWare 7.1 补丁包或操作系统升级版本，其中修复了 /var/mail 的默认权限设置，或将系统升级到 SCO OpenServer 6/R4，或应用安全补丁包 v7.1.x 以强制文件所有者为 mail 用户、权限为 750 目录/700 文件，并重新建立邮件权限控制机制。如无法立即应用补丁，可临时通过 chmod 755 /var/mail 并 chown mail:system /var/mail/* 等命令对邮件目录进行临时权限加固。"
score = 3.6
severity = "LOW"
sources = ["avd"]
title = "SCO Unixware 7.1 /var/mail 目录权限配置不当漏洞"
updated = "2026-06-16T21:49:08.210"

