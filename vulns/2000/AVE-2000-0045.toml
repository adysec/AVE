[basic]
description = 'Red Hat usermode 软件包中的 userhelper 程序存在路径遍历漏洞，本地用户可通过 PAM 身份验证机制利用 ".." 目录穿越序列绕过路径限制，从而获得 root 权限。该漏洞影响 Mandrake 6.x、RedHat 6.x 及 Turbolinux 3.5/4.x/6.0.2 等发行版本，攻击者需具有本地系统账户才能利用。'
published = "2000-01-04T05:00:00.000"
remediation = "升级 usermode 软件包至修复版本（如 Red Hat 6.x 应安装 usermode-1.11 或更高版本），或移除 userhelper 二进制文件的 setuid 权限位（chmod u-s /usr/sbin/userhelper），防止普通用户以 root 权限执行路径穿越操作。对于已停止支持的旧系统，建议迁移至受支持的操作系统版本。"
score = 7.2
severity = "HIGH"
sources = ["epss"]
title = "Red Hat userhelper PAM 路径遍历本地权限提升漏洞"
updated = "2026-06-16T21:50:54.140"

