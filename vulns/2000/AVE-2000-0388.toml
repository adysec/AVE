[basic]
description = "Caldera 系统中 dump 软件包 0.4b4 版本所包含的 rmt 命令存在本地权限提升漏洞。由于 rmt 命令在处理特定操作时未正确限制权限，本地攻击者可通过执行特制的 rmt 命令获取系统 root 权限，从而完全控制目标系统。该漏洞攻击复杂度低，无需身份认证，但需要本地访问权限。"
published = "2000-07-12T04:00:00.000"
remediation = "立即升级 Caldera OpenLinux 系统中的 dump 软件包至高于 0.4b4 的版本，该补丁已由 Caldera 在安全公告 CSSA-1999-014 中发布。如无法升级，可移除 rmt 命令的 setuid 权限（chmod u-s /sbin/rmt），并限制仅受信任用户可执行 dump/restore 操作。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "Caldera dump 软件包 rmt 命令本地权限提升漏洞"
updated = "2026-06-16T21:51:34.767"

