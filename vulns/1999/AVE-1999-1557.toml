[basic]
description = "Windows NT 4.0 的 SNMP 代理程序 snmp.exe 存在内存泄漏漏洞，远程攻击者可通过向目标系统发送大量包含无法解码的对象标识符 (OID) 的 SNMP 数据包，导致代理程序内存不断消耗直至耗尽，从而引发拒绝服务。该漏洞影响未安装 Service Pack 4 及以上更新的 Windows NT 4.0 系统，攻击者无需身份认证即可远程触发，CVSS 评分 5.0，危害等级中等。"
published = "1997-12-23T05:00:00.000"
remediation = '安装 Windows NT 4.0 Service Pack 4 或更高版本以修复 SNMP 代理 snmp.exe 的内存泄漏漏洞。如无法升级，可在防火墙或路由器上限制仅允许受信任的管理站访问 UDP 端口 161，或在注册表中禁用 SNMP 服务（HKEY_LOCAL_MACHINE\SYSTEM\CurrentControlSet\Services\SNMP\Start 设为 4）。'
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Microsoft Windows NT 4.0 SNMP Agent 拒绝服务漏洞"
updated = "2026-06-16T21:50:46.050"

