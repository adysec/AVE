[basic]
description = "Mint HTTP/2 客户端在处理 HEADERS 帧时存在无限制资源累积漏洞。当客户端收到未设置 END_HEADERS 标志的 HEADERS 帧后，后续的 CONTINUATION 帧数据会被无上限地追加到连接级缓冲区中，且未对帧数量或总大小设置任何限制。远程未认证攻击者可通过控制恶意 HTTP/2 服务器向目标客户端持续发送 CONTINUATION 帧，导致客户端内存被耗尽，进而造成 BEAM 进程崩溃（拒绝服务）。仅需建立单条连接即可触发该漏洞。该漏洞影响 Mint 0.1.0 至 1.9.0 之前的所有版本，CVSS 评分 8.2，危害等级高。"
published = "2026-06-02T16:16:44.930"
remediation = "升级 Mint 至 1.9.0 或更高版本（`mix deps.update mint`），该版本已限制 HTTP/2 CONTINUATION 帧累积大小。如无法立即升级，在连接不可信服务器时传入 `protocols: [:http1]` 选项强制使用 HTTP/1.1 以规避漏洞。"
score = 8.2
severity = "HIGH"
sources = ["ghsa"]
title = "elixir-mint Mint HTTP/2 CONTINUATION 泛洪拒绝服务漏洞"
updated = "2026-07-22T19:10:00.120"

