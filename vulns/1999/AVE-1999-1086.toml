[basic]
description = "Internet Explorer 5.0 的安装向导程序 ie5setup.exe 在无人值守安装过程中会禁用系统屏幕保护程序，若安装过程出现故障或中断，拥有物理访问权限的本地用户可趁系统无人看管时直接操作目标主机；同时该程序会禁用任务计划程序服务，导致系统无法按时执行安全关键程序（如自动更新、病毒扫描等），降低系统整体安全性。该漏洞影响 Internet Explorer 5.0 版本，CVSS 评分 7.2，危害等级高。"
published = "1999-03-23T05:00:00.000"
remediation = "升级至 Internet Explorer 5.01 或更高版本，该漏洞已在后续版本中修复。如无法升级，在运行 ie5setup.exe 完成安装后，手动重新启用屏幕保护程序（控制面板→显示→屏幕保护程序）和任务计划程序服务（services.msc→Task Scheduler→启动类型设为自动并启动服务）。建议改用现代浏览器替代 IE。"
score = 7.2
severity = "HIGH"
sources = ["cve"]
title = "Microsoft Internet Explorer 5.0 安装向导信息泄露漏洞"
updated = "2026-06-16T21:50:17.730"

