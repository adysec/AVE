[basic]
description = "Debian man-db 软件包中的 zsoelim 程序存在符号链接（symlink）攻击漏洞。zsoelim 在处理文件时未正确验证文件路径，本地攻击者可创建一个指向目标系统敏感文件的符号链接，当 zsoelim 跟随该符号链接处理文件时，将导致目标文件被覆盖，从而造成任意文件写入。攻击条件为本地低权限用户即可触发，无需远程访问。该漏洞影响 Debian man-db 2.3.10 等早期版本，CVSS v2 评分 10.0，危害等级为高危，可能导致权限提升或系统文件被破坏。"
published = "1999-06-12T04:00:00.000"
remediation = "升级 man-db 软件包至当前稳定版本（2.9.x 或更高），该漏洞存在于 zsoelim 的符号链接处理逻辑中，新版已修复此问题。执行 apt update && apt upgrade man-db 完成更新。作为临时缓解措施，可移除 zsoelim 的 setuid/setgid 位（chmod u-s,g-s /usr/bin/zsoelim），并避免在受信目录以外使用 man 工具，同时在 /tmp 等临时目录挂载时启用 noexec 和限制符号链接创建。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "G. Wilford man 符号链接攻击本地文件覆盖漏洞"
updated = "2026-06-16T21:48:56.240"

