[basic]
description = "Oracle WebLogic Server 的 UDDI Explorer 组件存在服务端请求伪造（SSRF）漏洞，远程攻击者无需认证即可向目标服务器发送特制 HTTP 请求，利用该漏洞可让服务器向任意内网或外网地址发起请求，从而导致敏感信息泄露。该漏洞影响 Oracle Fusion Middleware 10.0.2.0 及 10.3.6.0 版本，CVSS 评分 5.0，危害等级中危。Oracle 官方已在 2014 年 7 月关键补丁更新中修复此漏洞。"
published = "2014-07-17T05:10:15.733"
remediation = "立即安装 Oracle 2014 年 7 月关键补丁更新（CPU July 2014，补丁编号参考 My Oracle Support Note 1666884.1），将 WebLogic Server 升级至 10.3.6.0 及以上补丁版本。如无法立即升级，可在 Web 应用防火墙（WAF）或反向代理层面配置规则，拦截对 /uddiexplorer/ 路径的异常外部请求，同时限制 WebLogic 服务器出站访问内网目标地址的范围作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["nuclei"]
title = "Oracle WebLogic Server SSRF 漏洞"
updated = "2026-06-17T00:09:35.657"

