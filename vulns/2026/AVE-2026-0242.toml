[basic]
description = "AWS CDK（aws-cdk-lib）的 NodejsFunction Docker 捆绑流程中存在操作系统命令注入漏洞（CWE-78）。当项目使用 nodeModules 参数进行 Docker 构建时，攻击者通过控制 package.json 文件中依赖版本字符串，注入恶意 shell 元字符，可在运行 CDK 工具链的主机上执行任意命令。该漏洞影响 aws-cdk-lib 2.260.0 之前的所有版本，CVSS 评分 7.0，危害等级高。攻击者需具备修改项目 package.json 依赖版本字符串的能力，利用条件相对受限但危害严重。官方已在 v2.260.0 版本中修复此漏洞。"
published = "2026-07-01T19:16:36.157"
remediation = "立即将 aws-cdk-lib 升级至 v2.260.0 或更高版本 (npm update aws-cdk-lib / pip install --upgrade aws-cdk-lib)。如无法立即升级，在 Docker 打包构建过程中严格校验 package.json 中所有依赖版本字符串，过滤 shell 元字符（如 `;&|$`），避免将不可信的用户输入直接传入 NodejsFunction 的 nodeModules 配置项。"
score = 7
severity = "HIGH"
sources = ["ghsa"]
title = "AWS aws-cdk-lib NodejsFunction Docker 捆绑功能操作系统命令注入漏洞"
updated = "2026-07-01T20:17:01.490"

