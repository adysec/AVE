[basic]
description = "simplestguest.cgi 是由 Leif Wright 开发的 CGI 留言簿程序，其 guestbook 参数未对用户输入进行有效过滤，远程攻击者可通过在参数中插入 shell 元字符（如 |、;、` 等）执行任意系统命令，导致远程命令执行漏洞。攻击者无需身份认证即可利用，可完全控制目标服务器。该漏洞 CVSS 评分 10.0，危害等级严重。"
published = "2001-02-12T05:00:00.000"
remediation = "建议立即删除或禁用服务器上的 simplestguest.cgi 脚本（该程序已停止维护）。如需替代方案，可部署 Serendipity 或 WordPress 等现代留言板程序。如必须保留功能，应在 CGI 代码中对所有用户输入调用 escapeshellarg() 函数或使用正则过滤 `;&|` 等 shell 元字符后重新编译部署。"
score = 10
severity = "CRITICAL"
sources = ["exploitdb"]
title = "Leif M. Wright simplestguest.cgi 远程命令执行漏洞"
updated = "2026-06-16T21:53:30.413"

