[basic]
description = "Lotus Domino HTTP 服务器存在缓冲区溢出漏洞，远程攻击者无需身份认证即可通过向目标服务器发送超长 URL 请求触发该漏洞，导致服务器进程崩溃从而造成拒绝服务。该漏洞影响 Lotus Domino HTTP 服务组件，攻击条件简单，危害等级中等，建议及时更新补丁。"
published = "1999-12-21T05:00:00.000"
remediation = "升级 Lotus Domino 服务器至 5.0.1 或更高版本，该版本已修复 HTTP 服务对超长 URL 请求的缓冲区边界检查缺陷。如无法升级，可在反向代理或负载均衡器层面限制 URL 长度不超过 2048 字节，并部署 Web 应用防火墙（WAF）过滤异常超长请求作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Lotus Domino HTTP Server 缓冲区溢出拒绝服务漏洞"
updated = "2026-06-16T21:50:50.597"

