[basic]
description = 'OpenSSH 1.2.27 版本的 SSH 服务端在密钥协商阶段存在安全策略绕过缺陷。按照服务端安全策略本应禁止客户端使用"none"加密算法（即不加密的明文传输），但受影响的服务器在协商过程中未能正确校验客户端所选加密方式，导致客户端可以强制使用"none"密码套件建立连接。攻击条件为攻击者能够与目标 OpenSSH 1.2.27 服务建立 SSH 连接，并在密钥交换阶段协商加密算法。成功利用后，攻击者与该服务的通信将不经过任何加密保护，导致会话内容以明文方式传输，从而可被中间人监听、窃取凭据或篡改数据，造成机密性破坏。该漏洞影响运行 OpenSSH 1.2.27 的服务器，CVSS 评分 2.1，危害等级较低，但可能削弱 SSH 通信的安全性保障。'
published = "1999-12-14T05:00:00.000"
remediation = '升级 OpenSSH 至 1.2.28 或更高版本（修复了允许客户端使用 "none" 加密算法的策略绕过问题）。若无法立即升级，可在服务端配置文件 sshd_config 中设置 Ciphers 明确限定为已批准的加密算法列表，禁止使用 "none"，并重启 sshd 服务生效。'
score = 2.1
severity = "LOW"
sources = ["epss"]
