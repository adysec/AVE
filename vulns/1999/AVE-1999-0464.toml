[basic]
description = 'IIS 服务器在处理 NTFS 文件系统中的 ASP 脚本请求时存在源文件泄露漏洞。NTFS 文件系统支持备用数据流（ADS），攻击者通过在 ASP 文件 URL 后添加 "::$DATA" 字符串，可绕过正常的脚本执行机制，直接读取 ASP 文件的原始源代码。该漏洞存在于 Microsoft IIS 3.0/4.0 及 Personal Web Server 2.0/3.0/4.0 中，远程攻击者无需身份认证即可利用，获取的 ASP 源码可能泄露数据库连接凭据、业务逻辑等敏感信息，CVSS 评分 5.0，危害等级中危。'
published = "1998-06-01T04:00:00.000"
remediation = '升级 IIS 至 5.0 及以上版本（随 Windows 2000 及以上系统提供）可彻底修复此漏洞。无法升级时，安装 Microsoft 于 1998 年发布的安全补丁（MS98-004）。临时缓解措施：在 IIS 管理器中删除 .asp 文件扩展名的 "读取" 权限，仅保留 "脚本" 权限，可防止 ASP 源码直接泄露。同时确保网站目录位于 NTFS 分区且配置正确的 ACL 权限。'
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Microsoft IIS 与 Personal Web Server ASP 源码泄露漏洞"
updated = "2026-06-16T21:48:03.587"

