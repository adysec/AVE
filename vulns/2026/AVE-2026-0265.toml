[basic]
description = "uutils coreutils 的 cut 工具在处理 `-z`（空终止符）与 `-d ''`（空分隔符）组合参数时存在逻辑错误，导致 `-s`（仅输出包含分隔符的行）标志被忽略。该漏洞源于程序将特定参数组合错误路由至换行符分隔的专用代码路径，未检查记录抑制状态，从而输出本应过滤的完整未分隔记录及 NUL 字节。此行为与 GNU coreutils 存在差异，影响依赖 `cut -s` 过滤未分隔数据的自动化管道，造成数据完整性风险。CVSS 评分 3.3，危害等级低，攻击者需本地触发。"
published = "2026-04-22T17:16:43.200"
remediation = "升级 uutils coreutils 至包含此修复的版本（关注 GitHub uutils/coreutils 仓库的发布说明，该漏洞由 Zellic 通过 coreutils-private PR #102 报告）。如暂时无法升级，可将依赖 cut 的脚本中的 `cut -z -d '' -s -f N` 替换为 GNU coreutils 版本的 cut（安装 GNU coreutils 包并使用 `gcut` 命令），或改用 awk/sed 等工具实现相同的分隔过滤逻辑，例如 `awk -v RS='' -F'' '{if(NF>=N) print $N}'` 来替代 cut -s 的行为。"
score = 3.3
severity = "LOW"
sources = ["ghsa"]
title = """The user wants me to generate a [title] field for CVE-2026-35381. Let me analyze the information: - Vendor: uutils (or possibly GNU coreutils, but specifically uutils coreutils) - Product: coreutils (specifically the `cut` utility) - Vulnerability type: 逻辑错误 (logic error) - specifically parameter handling flaw The title format is: "厂商 产品 漏洞类型" From the NVD description and other info: - Product: uutils coreutils cut tool - Vulnerability: A logic error where `-s` flag is ignored when combined with `-z -d ''` options, causing undelimited records to be emitted instead of suppressed. So the title should be something like: "uutils coreutils cut 工具参数顺序错误漏洞" or "uutils coreutils cut 逻辑错误漏洞" Looking at the Chinese description from AVD: "uutils coreutils cut工具参数顺序错误漏洞(CVE-2026-35381)" - this gives us a good hint. The title format is "厂商 产品 漏洞类型": - 厂商: uutils - 产品: coreutils cut 工具 - 漏洞类型: 逻辑错误漏洞 or 参数处理逻辑错误漏洞 Let me craft a concise title following the "厂商"""
updated = "2026-06-17T10:40:29.780"

