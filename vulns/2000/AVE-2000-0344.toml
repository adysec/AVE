[basic]
description = "NetWin DNews 5.3 的 DNEWSWEB CGI 程序存在缓冲区溢出漏洞。远程攻击者无需身份认证即可通过向 group、cmd、utag 等参数提交超长字符串触发缓冲区溢出，从而在服务器上以 CGI 进程权限执行任意命令。该漏洞影响 DNews Web News Server 5.3 版本，CVSS 评分 5.0，危害等级中危，利用复杂度低且无需认证即可远程利用。"
published = "2000-05-05T04:00:00.000"
remediation = "建议立即升级 NetWin DNewsWeb 至 5.4c3 或更高版本，可从厂商 FTP 服务器 ftp://ftp.netwinsite.com/pub/dnewsweb/beta/ 获取对应系统版本。如无法立即升级，可在 Web 服务器或 WAF 层面对 dnewsweb/dnewsweb.exe 的 group、cmd、utag 等参数做长度限制（建议不超过 256 字符），并限制该 CGI 程序的执行权限作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "NetWin DNews 5.3 DNEWSWEB CGI 缓冲区溢出漏洞"
updated = "2026-06-16T21:51:42.067"

