[basic]
description = "ARCAD Systemhaus 0.078-5 在安装时将关键程序及文件设置为全局可写权限，本地攻击者可利用此缺陷用特洛伊木马替换正常程序，从而在目标系统上实现权限提升。该漏洞影响 ARCAD Systemhaus 0.078-5 版本，CVSS 评分 4.6，攻击者需具备本地系统访问权限，危害等级中危。"
published = "1999-09-29T04:00:00.000"
remediation = "升级 ARCAD Systemhaus 至最新版本以修复文件权限问题；如无法升级，手动执行 `chmod 755` 或 `chmod 750` 收紧关键程序与文件权限，确保仅属主和授权用户可写；并部署文件完整性监控（如 Tripwire）检测异常文件变更。"
score = 4.6
severity = "MEDIUM"
sources = ["avd"]
title = "ARCAD Systemhaus 本地权限提升漏洞"
updated = "2026-06-16T21:50:15.203"

