[basic]
description = "dbadmin CGI 程序 1.0.1 版本存在缓冲区溢出漏洞，远程攻击者可通过向目标服务器发送特制的 HTTP 请求触发该漏洞，导致任意命令执行。该漏洞影响 Linux 平台上运行 dbadmin CGI 程序的系统，攻击者无需身份认证即可远程利用，CVSS 评分 7.5，危害等级高。建议升级至最新版本或禁用受影响组件以降低风险。"
published = "1998-10-08T04:00:00.000"
remediation = "立即卸载 dbadmin v1.0.1，该软件已停止维护且无修复补丁。改用现代数据库管理工具（如 phpMyAdmin、Adminer 等）替代。如无法替换，在 Web 服务器（Apache/Nginx）中通过 .htaccess 或 location 指令设置 IP 白名单和 HTTP Basic 认证，限制仅授权管理员访问该 CGI 路径，同时配置防火墙仅允许可信 IP 段访问服务器 80/443 端口。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "dbadmin CGI 程序缓冲区溢出远程代码执行漏洞"
updated = "2026-06-16T21:50:19.093"

