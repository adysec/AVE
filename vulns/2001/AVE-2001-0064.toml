[basic]
description = "glibc 2.1.9x 及更早版本在执行 setuid/setgid 程序时，未正确清除 RESOLV_HOST_CONF、HOSTALIASES 和 RES_OPTIONS 等环境变量，导致本地攻击者可通过设置恶意环境变量劫持动态链接库加载路径，从而以提升的权限读取系统上任意文件。该漏洞影响 Linux 系统，攻击者需拥有本地账户权限，利用门槛较低，已有公开利用代码。"
published = "2001-03-26T05:00:00.000"
remediation = "升级 glibc 至 2.2 或更高版本，该版本在 execve 调用前正确清除了 RESOLV_HOST_CONF、HOSTALIASES 和 RES_OPTIONS 环境变量。对于无法升级的旧系统，可在编译 setuid/setgid 程序时手动调用 unsetenv() 清除上述环境变量作为临时缓解措施。"
score = 2.1
severity = "LOW"
sources = ["redhat"]
title = "GNU glibc setuid/setgid 程序环境变量处理不当本地信息泄露漏洞"
updated = "2026-06-16T21:53:48.183"

