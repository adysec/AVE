The vulnerability is about mtr (My TraceRoute) tool using seteuid instead of setuid when dropping privileges, allowing local users to regain root privileges.
- title: "mtr 网络诊断工具权限提升漏洞" - this is a privilege escalation vulnerability
- description: Need ≥50 chars Chinese. The mtr program only uses seteuid() to drop privileges, which is insufficient. A local attacker can regain elevated privileges because seteuid can be reversed, unlike setuid which permanently drops privileges.
- severity: HIGH (CVSS 7.2)
- score: 7.2
- remediation: Upgrade to a patched version of mtr that properly uses setuid() instead of seteuid() to permanently drop privileges. Or apply vendor patches.
