[basic]
description = "QPC Software QVT/Term Plus 4.2d/4.3 及 QVT/Net 4.3 套件的 FTP 服务器存在缓冲区溢出漏洞。远程攻击者可通过向 FTP 登录过程发送超长的用户名或密码字符串触发该漏洞，导致目标服务崩溃并造成拒绝服务，在特定条件下还可能执行任意命令。CVSS 评分 7.5，危害等级高。"
published = "1999-11-10T05:00:00.000"
remediation = "该漏洞影响已停止维护的 QPC Software QVT 系列产品，厂商已不再提供安全更新。建议立即迁移至其他受支持的 FTP 服务器软件（如 vsftpd、FileZilla Server），并在迁移前通过防火墙限制仅允许可信 IP 访问 FTP 端口（21/TCP），同时禁用匿名登录和未使用的 FTP 账户。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "QPC Software QVT Term FTP 服务器缓冲区溢出漏洞"
updated = "2026-06-16T21:50:40.440"

