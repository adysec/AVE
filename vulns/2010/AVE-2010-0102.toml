[basic]
description = "Joomla! 组件 Foobla Suggestions 1.5.1.2 存在目录遍历漏洞（CWE-22），攻击者可通过 index.php 的 controller 参数传入目录遍历序列（如 ../）读取服务器任意文件。该漏洞影响使用该组件的 Joomla! 站点，CVSS 评分 6.8（中危），攻击者无需认证即可远程利用，通过构造恶意 controller 参数实现任意文件读取，可能导致敏感配置文件、源代码泄露。ExploitDB 已收录公开利用代码。"
published = "2010-07-30T20:30:03.927"
remediation = '升级或卸载存在漏洞的 Foobla Suggestions (com_foobla_suggestions) 组件 1.5.1.2 版本，或替换为其修复版本（需过滤 controller 参数中的 "../" 等目录穿越字符）。若无法立即更新，可在 Joomla! 后台禁用该组件，并通过 .htaccess 添加规则拒绝 index.php 请求中携带 "controller=../" 或 NULL 字节等穿越序列，作为临时缓解措施。'
score = 6.8
severity = "MEDIUM"
sources = ["nuclei"]
title = "Joomla! Foobla Suggestions 组件 本地文件包含漏洞"
updated = "2026-06-16T23:21:45.433"

