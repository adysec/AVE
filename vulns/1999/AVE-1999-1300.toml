[basic]
description = "Network Security Wizards 公司开发的 Dragon-Fire IDS 1.0 中的 dfire.cgi 脚本存在命令注入漏洞。远程攻击者可通过向该 CGI 脚本发送特制的包含 shell 元字符的 HTTP 请求，在目标服务器上以 Web 服务进程权限执行任意系统命令。该漏洞 CVSS 评分 10.0，危害等级严重，攻击者无需认证即可远程利用，可能导致服务器完全受控。"
published = "1999-08-05T04:00:00.000"
remediation = "该产品（Dragon-Fire IDS 1.0）已停止维护，建议立即升级至现代入侵检测系统（如 Snort、Suricata 等）。临时缓解措施：在 Web 服务器上移除或禁用 dfire.cgi 脚本，并在防火墙层面限制对该 CGI 的访问来源。"
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "Network Security Wizards Dragon-Fire IDS 远程命令执行漏洞"
updated = "2026-06-16T21:49:19.050"

