[basic]
description = "phpMyAdmin 的 /config/config.inc.php 配置文件中存在静态代码注入漏洞，远程攻击者无需身份认证即可通过 setup.php 页面的 save 操作向配置文件写入任意 PHP 代码，进而获得远程代码执行权限。该漏洞影响 phpMyAdmin 2.11.x 系列早于 2.11.9.5 版本及 3.x 系列早于 3.1.3.1 版本，CVSS 评分 9.8，危害等级严重。由于无需认证即可利用且存在公开的 Metasploit 利用模块，实际攻击风险极高。"
published = "2009-03-26"
remediation = "立即升级 phpMyAdmin 至 2.11.9.5 或 3.1.3.1 及以上版本；删除或限制访问 /setup/ 目录，在 Web 服务器配置中添加访问控制规则禁止外部访问 setup.php；禁用 config 目录的写入权限；如无法升级，可临时移除 config/config.inc.php 文件并设置 $cfg['SetupDisable'] = true。"
score = 9.8
severity = "CRITICAL"
sources = ["nuclei"]
title = "phpMyAdmin 配置文件静态代码注入漏洞"
updated = "2026-06-16"

