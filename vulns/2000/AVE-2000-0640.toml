[basic]
description = 'IPFilter 防火墙 3.4.3 及更早版本在配置重叠的 "return-rst" 和 "keep state" 规则时存在竞争条件漏洞，远程攻击者可通过精心构造的网络数据包利用该竞争条件绕过防火墙的访问限制规则，导致防火墙访问控制策略失效。该漏洞影响 IPFilter 3.4.3 及更早版本，攻击者需具备网络访问权限且攻击复杂度较高，利用成功可导致防火墙完整性保护部分失效，CVSS 2.6 分（低危）。'
published = "2000-05-26T04:00:00.000"
remediation = '建议升级 IPFilter 防火墙至 3.4.4 或更高版本修复该竞争条件漏洞。若暂无法升级，请检查防火墙规则配置，避免同时使用重叠的 "return-rst" 和 "keep state" 规则，或将两类规则拆分至不同规则组避免竞争条件触发。同时建议在边界防火墙层面增加访问控制列表 (ACL) 作为纵深防御缓解措施。'
score = 2.6
severity = "LOW"
sources = ["epss"]
title = "IPFilter 防火墙安全绕过漏洞"
updated = "2026-06-16T21:51:59.123"

