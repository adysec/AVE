[basic]
description = "Tiki Wiki CMS Groupware 5.2 版本存在本地文件包含漏洞，攻击者可通过构造恶意文件路径参数，利用输入验证不当缺陷包含本地任意文件，进而读取敏感文件或执行任意代码。该漏洞影响 Tiki Wiki CMS Groupware 5.2 版本，CVSS 评分 9.8（CRITICAL），攻击者无需认证即可远程利用，通过构造恶意文件包含路径实现任意代码执行或敏感文件读取，危害等级严重。官方已发布补丁修复该漏洞，建议用户尽快升级到修复版本。"
published = "2019-10-28T15:15:12.583"
remediation = "tags.<value>建议立即升级至 Tiki Wiki CMS Groupware 5.3 或更高版本（官方已在 5.3 修复该 LFI 漏洞）。若暂时无法升级，可在 Web 服务器层面限制对 tiki-print_multi_pages.php 等受影响脚本的访问，并配置 PHP 的 open_basedir 限制文件包含路径；同时在防火墙层面封禁可疑请求参数（如 page、lang 等）作为临时缓解措施。"
score = 9.8
severity = "CRITICAL"
sources = ["nuclei"]
title = "Tiki Wiki CMS Groupware 本地文件包含漏洞"
updated = "2026-06-16T23:24:25.063"

