[basic]
description = "GNU gzip 软件包中的 gzexe 工具在处理可执行文件时使用了不安全的临时文件创建方式，将临时文件创建在可预测的目录路径下。本地攻击者可利用符号链接（symlink）攻击，在目标用户执行 gzexe 前创建指向其他用户文件的符号链接，从而导致任意文件被覆盖或破坏。该漏洞影响 Red Hat Linux 5.0 及更早版本，CVSS 评分 2.1，危害等级低，触发条件要求攻击者拥有本地账号访问权限。"
published = "1999-12-31T05:00:00.000"
remediation = "升级 gzip 软件包至包含暂时文件安全创建的版本（如 1.2.4 以上），或升级 Red Hat Linux 至 5.0 以上版本。如无法升级，设置环境变量 TMPDIR 为仅 root 可写的目录，限制本地普通用户创建符号链接攻击。"
score = 2.1
severity = "LOW"
sources = ["osv"]
title = "GNU gzip gzexe 不安全的临时文件创建漏洞"
updated = "2026-06-16T21:50:12.877"

