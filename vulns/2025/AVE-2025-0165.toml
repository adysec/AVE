[basic]
description = "金和OA /c6/Jhsoft.Web.dailytaskmanage/AddTask.aspx 接口存在SQL注入漏洞，攻击者通过POST请求向TaskExecutorID参数注入恶意SQL语句（如WAITFOR延时注入），可窃取或篡改数据库数据。该漏洞影响金和OA系统，攻击无需身份认证，攻击者仅需构造特制XML数据包即可远程利用，危害较大。"
published = "0710"
remediation = "建议升级金和OA C6至官方发布的最新版本，或联系厂商获取针对该SQL注入漏洞的安全补丁。临时缓解措施：在Web应用防火墙（WAF）中添加规则，对 /c6/Jhsoft.Web.dailytaskmanage/AddTask.aspx 的 POST 请求中 TaskExecutorID 参数进行SQL注入关键字过滤，并限制该接口仅允许可信IP访问。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "金和OA AddTask 接口 SQL 注入漏洞"
updated = "0710"

