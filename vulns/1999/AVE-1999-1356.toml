[basic]
description = "SunOS 4.1.2 及更早版本中存在权限提升漏洞，本地用户可通过向动态链接的 setuid/setgid 程序（如 login、su、sendmail）设置 LD_* 环境变量（如 LD_PRELOAD）来劫持动态链接库，从而以提升后的权限执行任意代码。该漏洞利用条件为拥有本地系统访问权限，攻击者可通过加载恶意共享库绕过权限检查，获取 root 权限。此漏洞影响范围广泛，危害等级高。"
published = "1992-05-27T04:00:00.000"
remediation = "升级 SunOS 至 4.1.3 或更高版本，该版本修复了动态链接 setuid/setgid 程序对 LD_* 环境变量的处理。如无法升级，可移除受影响程序的 setuid/setgid 权限位（如 chmod u-s /usr/bin/login），或通过系统安全补丁集禁用 LD_PRELOAD/LD_LIBRARY_PATH 在 setuid 程序中的传递。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "Sun SunOS 动态链接程序环境变量注入权限提升漏洞"
updated = "2026-06-16T21:49:48.683"

