[basic]
description = "tags.<value>W3M 是一个流行的命令行网页浏览器，其 0.2.1 及更早版本在处理 MIME 邮件头时存在缓冲区溢出漏洞。当远程攻击者向使用 W3M 的目标发送包含超长 base64 编码 MIME 头的恶意邮件或网页内容时，W3M 解析该头字段时发生缓冲区溢出，可能导致执行任意代码。此漏洞影响所有使用受影响版本 W3M 的系统，攻击者无需身份认证即可在远程发起利用，造成权限提升、信息泄露或系统被完全控制。"
published = "2001-09-20T04:00:00.000"
remediation = "立即将 w3m 升级至 0.2.2 或更高版本以修复 MIME 头 base64 缓冲区溢出。Debian 用户应执行 apt-get update && apt-get install w3m 以获取 DSA-064/DSA-081 补丁版本，FreeBSD 用户应安装 FreeBSD-SA-01:46.w3m 安全补丁。如无法立即升级，应临时避免使用 w3m 访问不可信或未知网站，因恶意远程服务器可通过构造超长 base64 编码 MIME 头字段触发缓冲区溢出并执行任意代码，可通过先使用 curl 等工具下载网页再本地查看代替直接使用 w3m 浏览外部内容作为临时缓解措施。"
score = 7.5
severity = "HIGH"
sources = ["exploitdb"]
title = "W3M 0.2.1 及更早版本 MIME 报文头缓冲区溢出漏洞"
updated = "2026-06-16T21:54:47.737"

