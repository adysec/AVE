[basic]
description = "XMail POP3 服务器 0.59 版本之前存在缓冲区溢出漏洞，由于 POP3 服务在处理 USER 命令时未对用户名长度进行边界检查，导致远程未认证攻击者可通过发送超长的 USER 命令参数触发栈缓冲区溢出，进而覆盖返回地址实现远程代码执行。该漏洞影响 XMail 0.59 之前所有版本，CVSS 评分 10.0（严重），攻击向量为网络远程、无需认证、低攻击复杂度，攻击者只需向目标 POP3 服务端口（默认 110 端口）发送超长用户名即可触发漏洞，成功利用可获得服务器最高权限执行任意代码。该漏洞于 2000 年 11 月 14 日披露，XMail 0.59 版本已修复该漏洞，建议升级至 0.59 或更高版本。"
published = "2000-11-14T05:00:00.000"
remediation = "建议立即升级 XMail POP3 服务器至 0.59 版本或更高版本（官方下载地址：http://www.xmailserver.org/download.html）。升级前请备份配置文件和邮件数据。若无法立即升级，请在防火墙层面限制 POP3 端口（默认 110/tcp）仅允许可信 IP 访问，或临时停用 POP3 服务作为临时缓解措施。升级后请重启 XMail 服务并验证 POP3 服务正常运行。"
score = 10
severity = "CRITICAL"
sources = ["cve"]
title = "XMail POP3 服务器 缓冲区溢出 远程代码执行 漏洞"
updated = "2026-06-16T21:52:34.590"

