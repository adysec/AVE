[basic]
description = "Linux 内核 Qualcomm SCM（安全通道管理器）固件驱动中存在空指针解引用漏洞。由于 qcom_scm_get_tzmem_pool() 函数在 SCM 设备缺失时会返回 NULL，而调用者未正确检查返回值，导致在特定条件下对空指针进行解引用操作，引发内核崩溃。本地攻击者需具备低权限即可触发此漏洞，造成系统拒绝服务。该漏洞影响使用 Qualcomm 芯片的 Linux 内核系统，已在 Linux 内核主线中修复。"
published = "2025-02-27T03:15:10.977"
remediation = "建议立即将 Linux 内核升级至 6.12.16、6.13.4 或 6.14 及以上版本。对于无法升级内核的系统，可手动 cherry-pick 补丁提交 cd955b75849b、57a811c0886f 或 94f48ecf0a53 到对应内核分支，在 drivers/firmware/qcom/qcom_scm-smc.c 中增加对 qcom_scm_get_tzmem_pool() 返回 NULL 的判空处理。临时缓解措施可禁用受影响设备上的 Qualcomm SCM 固件接口模块加载。"
score = 5.5
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux Kernel Qualcomm SCM 固件空指针解引用漏洞"
updated = "2026-06-17T08:14:06.587"

