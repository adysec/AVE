[basic]
description = "Alibaba 2.0 中的 genkey 密钥生成工具使用 RSA 指数 1 生成密钥对，由于指数为 1 时加密等同于明文传输，导致所有交易数据以明文形式在网络中发送。攻击者可通过网络嗅探等方式截获敏感交易信息，造成数据泄露。该漏洞影响 Alibaba 2.0 版本，危害等级中等，需升级至修复版本或更换密钥生成工具。"
published = "1999-12-31T05:00:00.000"
remediation = "立即停止使用 Alibaba 2.0 及其 genkey 密钥生成工具，替换为支持标准 RSA 密钥生成（指数 65537）的现代电子商务平台。在迁移完成前，对传输数据额外启用 TLS 1.2+ 加密通道，并禁用服务器上 genkey 的执行权限。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Alibaba genkey RSA密钥生成弱算法漏洞"
updated = "2026-06-16T21:50:27.233"

