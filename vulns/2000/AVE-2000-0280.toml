[basic]
description = "OpenLDAP 1.2.7 至 1.2.10 版本中存在本地符号链接攻击漏洞。当 OpenLDAP 服务在 `/usr/tmp/` 目录下创建临时文件时，未对文件路径进行充分的安全检查，本地攻击者可通过预先创建恶意的符号链接文件，诱导 OpenLDAP 进程向任意系统文件写入数据，从而实现权限提升或破坏系统文件完整性。该漏洞攻击复杂度低，但需要本地用户账户权限。"
published = "2000-04-21T04:00:00.000"
remediation = "升级 OpenLDAP 至 1.2.11 及以上版本，该版本修复了 /usr/tmp/ 目录下临时文件创建时未检查符号链接的问题。Red Hat 用户可安装 RHSA-2000-012 提供的更新包；Caldera OpenLinux 用户应应用 CSSA-2000-009.0 补丁。临时缓解措施：确保 /usr/tmp/ 目录的 sticky 位已设置（chmod +t /usr/tmp），并限制不可信用户的本地登录权限。"
score = 2.1
severity = "LOW"
sources = ["exploitdb"]
title = "OpenLDAP 本地符号链接漏洞"
updated = "2026-06-16T21:51:30.277"

