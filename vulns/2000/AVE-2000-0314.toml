[basic]
description = "NetBSD 1.3.3 及部分 Linux 系统中的 traceroute 工具存在源地址伪造漏洞。本地低权限用户可修改 traceroute 所发送数据包的源 IP 地址，从而发起 IP 欺骗攻击。攻击者利用此漏洞可伪造数据包来源，绕过基于 IP 的访问控制或隐藏攻击来源。该漏洞需要本地系统访问权限，攻击条件受限，CVSS 评分 5.0，危害等级中危。"
published = "2001-03-12T05:00:00.000"
remediation = "升级 NetBSD 至 1.4 及以上版本，或应用 NetBSD-SA1999-004 提供的 traceroute 补丁修复 waittime 参数未作边界检查导致 select(2) 立即返回的缺陷。临时缓解措施可执行 `chmod u-s /usr/sbin/traceroute` 移除 suid 位，仅允许 root 用户运行 traceroute。Linux 系统应更新 traceroute 至支持源地址合法性校验的版本。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "NetBSD traceroute 本地源地址伪造漏洞"
updated = "2026-06-16T21:51:27.607"

