[info]
author = "AVE"
description = "检测 WordPress Movies 插件 0.6 及更早版本中 getid3/demos/demo.mimeonly.php 页面的 filename 参数是否存在反射型 XSS 漏洞"
id = "POC-AVE-2014-0020"
name = "WordPress Movies <= 0.6 跨站脚本漏洞 PoC"
severity = "medium"
tags = [
    "cve-2014-4539",
    "wordpress",
    "wp-plugin",
    "xss",
]
vuln_id = [
    "CVE-2014-4539",
    "AVE-2014-0020",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/wp-content/plugins/movies/getid3/demos/demo.mimeonly.php"
protocol = "http"

[poc.requests.body]
content = ""
type = "raw"

[poc.requests.headers]
User-Agent = "AVE/1.0"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["demo.mimeonly.php"]
