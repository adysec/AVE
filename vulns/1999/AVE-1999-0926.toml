[basic]
description = "Novell NetWare Web Server 3.x 随附的 Examples Toolkit v2 包含一个名为 files.pl 的示例 CGI 脚本。该脚本存在任意文件读取漏洞，远程攻击者无需认证即可通过构造 file 参数传入服务器上任意文件或目录的路径，从而读取敏感系统文件内容，例如系统配置文件、密码文件或应用程序数据，进而为进一步攻击收集信息。"
published = "2002-01-15"
remediation = "从 Web 服务器根目录中删除或禁用 Examples Toolkit 自带的 files.pl 脚本及其相关 CGI 示例文件，并将 /cgi-bin/ 目录执行权限限制仅对必要脚本开放。如条件允许，升级到更高版本的 Web 服务器软件，并关闭不必要的示例脚本和调试接口，避免将敏感配置文件暴露在 Web 可访问路径下。"
score = 5.0
severity = "MEDIUM"
sources = [
    "exploitdb",
    "cve",
]
title = "Novell NetWare Web Server 3.x files.pl 任意文件读取漏洞"
updated = "2026-07-18"

