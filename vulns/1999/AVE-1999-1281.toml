[basic]
description = "svgalib 1.2.10 及更早版本中的 zgv 图形查看器存在本地缓冲区溢出漏洞。该程序在处理 HOME 环境变量时未对输入长度进行有效边界检查，本地攻击者可通过设置超长的 HOME 环境变量值触发栈溢出，进而覆盖返回地址并执行任意代码。该漏洞影响使用 svgalib 进行图形显示的系统环境，攻击需具备本地登录权限，成功利用后可能导致以 zgv 运行用户权限执行恶意代码，进而获取对系统的未授权控制。建议用户及时升级 svgalib 至修复版本，或避免在不受信任的环境中运行 zgv。"
published = "1997-06-19T04:00:00.000"
remediation = "升级 svgalib 到 1.2.10 之后的版本以修复 zgv 中的缓冲区溢出漏洞。如暂无法升级，可临时卸载 zgv 程序，或限制 HOME 环境变量长度不超过 1024 个字符作为缓解措施。"
score = 4.6
severity = "MEDIUM"
sources = ["exploitdb"]
title = "svgalib zgv 本地缓冲区溢出漏洞"
updated = "2026-06-16T21:50:32.297"

