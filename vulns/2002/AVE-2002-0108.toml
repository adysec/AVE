[basic]
description = "VTun 2.0 至 2.5 版本使用电子密码本（ECB）模式加密，该模式采用弱加密算法导致相同明文块产生相同密文块，远程攻击者可通过分析密文模式推断明文内容，从而窃取敏感信息。该漏洞影响 VTun 2.0 至 2.5 所有版本，CVSS 评分 7.5（高危），攻击向量为网络、攻击复杂度低、无需权限和用户交互，机密性影响高。攻击者仅需拦截或监听加密隧道流量，通过分析相同密文块模式即可推断明文内容，无需特殊权限或用户交互即可实施被动窃听攻击获取敏感数据。VTun 官方已在后续版本中修复该弱加密模式问题，建议升级至修复版本或改用更安全的加密模式（如 CBC、CTR 等）。"
published = "2002-12-31T05:00:00.000"
remediation = "升级到 VTun 2.6 或更高版本，停止使用 ECB 模式加密；如果无法立即升级，请修改配置文件将加密模式改为 CBC 或指定更安全的算法；同时限制网络访问权限以防止远程攻击者获取敏感信息。"
score = 7.5
severity = "HIGH"
sources = ["osv"]
title = "VTun VTun 2.0-2.5 ECB模式弱加密信息泄露漏洞"
updated = "2026-06-16T21:59:48.237"

