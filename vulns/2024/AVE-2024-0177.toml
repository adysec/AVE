[basic]
description = "用友NC-Cloud blobRefClassSearch接口存在FastJson反序列化远程代码执行漏洞。未经身份认证的攻击者可向/ncchr/pm/ref/indiIssued/blobRefClassSearch端点发送精心构造的JSON载荷，利用FastJson反序列化机制触发恶意代码执行，从而完全控制目标服务器。该漏洞影响用友NC-Cloud多个版本，攻击门槛低、危害大，CVSS评分严重。官方已发布安全补丁，建议用户立即升级至最新版本并限制相关接口访问权限。"
published = "0725"
remediation = "建议升级用友 NC-Cloud 至官方发布的安全修复版本（联系用友获取对应补丁包并升级至最新版本）；临时缓解措施为在应用服务器前部署 WAF 拦截对 /ncchr/pm/ref/indiIssued/blobRefClassSearch 接口的恶意 JSON 请求，关闭 FastJson 的 autoType 功能（设置 ParserConfig.getGlobalInstance().setAutoTypeSupport(false)），并限制该接口仅允许内网访问。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "用友 NC-Cloud FastJson反序列化远程代码执行漏洞"
updated = "0725"

