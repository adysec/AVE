[basic]
description = "Kashipara Food Management System 1.0 版本中 party_submit.php 文件对 party_address 参数未进行充分的输入过滤和转义处理，攻击者可构造恶意脚本注入页面，当管理员或其他用户访问受影响页面时脚本自动执行，导致敏感信息窃取、会话劫持等危害。攻击者无需身份认证即可远程触发，利用复杂度低。"
published = "2024-01-07"
remediation = "对 party_address 等用户输入参数实施严格的输入验证和 HTML 实体编码转义，建议升级到官方修复版本或应用 WAF 规则拦截 XSS 攻击载荷，同时启用 Content-Security-Policy HTTP 响应头增强防护。"
score = 6.1
severity = "MEDIUM"
sources = [
    "cve",
    "hwpoc",
]
title = "Kashipara Food Management System 跨站脚本漏洞"
updated = "2024-06-17"

