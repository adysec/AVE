[basic]
description = "Red Hat Linux 5.1 及更早版本中的 SysVInit 组件存在缓冲区溢出漏洞。本地攻击者可利用该漏洞通过向 SysVInit 发送特制的输入数据触发缓冲区溢出，从而获取 root 权限。该漏洞影响 Red Hat Linux 5.1 及之前版本，CVSS 评分 7.2，危害等级高。由于攻击者需要本地访问权限，攻击门槛较高，但一旦利用成功可完全控制系统。"
published = "1999-12-31T05:00:00.000"
remediation = "升级至 Red Hat Linux 5.2 或更高版本，该版本已修复 SysVInit 缓冲区溢出问题。对于已停止支持的旧版本，建议迁移至现代受支持的 RHEL 发行版（如 RHEL 7/8/9），并确保系统初始化组件保持最新安全更新。"
score = 7.2
severity = "HIGH"
sources = ["cve"]
title = "Red Hat Linux SysVInit 缓冲区溢出权限提升漏洞"
updated = "2026-06-16T21:50:12.473"

