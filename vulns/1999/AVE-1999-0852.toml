[basic]
description = "Groupwise web服务器GWWEB.EXE存在路径遍历漏洞，攻击者可通过HELP参数未授权访问服务器真实文件路径。漏洞影响Linux/Windows等Groupwise服务器版本，攻击者无需认证即可触发导致敏感文件信息泄露。攻击过程包括：1）利用HELP参数探测服务器目录结构，2）逐层遍历文件系统，3）泄露关键配置文件、密码文件等敏感信息，甚至可能导致进一步权限提升。该漏洞源于输入验证不足和路径拼接不当，暴露了Web服务器在路径安全控制方面的严重缺陷。"
published = "1999-12-19T05:00:00.000"
remediation = "建议升级到 Novell GroupWise 5.5 或更高版本（含 WebAccess 补丁），其中已修复 GWWEB.EXE 通过 HELP 参数泄露服务器真实路径的问题。若无法立即升级，可在 Web 服务器配置中对 GWWEB.EXE 的 HELP 参数请求进行过滤或禁用该参数，并通过前端反向代理隐藏内部路径信息作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Novell GroupWise Web Server GWWEB.EXE 路径遍历漏洞"
updated = "2026-06-16T21:49:30.503"

