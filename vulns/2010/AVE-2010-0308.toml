[basic]
description = "Microsoft Windows Shell 在处理 .LNK 和 .PIF 快捷方式文件的图标显示时存在远程代码执行漏洞。攻击者可通过构造恶意的快捷方式文件（如放置在 U 盘或网络共享中），当 Windows Explorer 自动解析其图标时触发漏洞，无需用户额外交互即可执行任意代码。该漏洞影响 Windows XP SP3、Server 2003 SP2、Vista SP1/SP2、Server 2008 SP2/R2 及 Windows 7 等多个版本，CVSS 评分 7.8，危害等级高危。2010 年 7 月已被在野利用，Microsoft 已发布安全公告 MS10-046 修复此漏洞。"
published = "2010-07-22T05:43:49.703"
remediation = "安装 Microsoft 安全公告 MS10-046 (KB2286198) 补丁，该补丁修复了 Windows Shell 处理 .LNK 和 .PIF 快捷方式文件时的图标显示漏洞。临时缓解措施包括：禁用 WebClient 服务、在防火墙阻止 TCP 139/445 端口、禁用自动播放功能，以及通过组策略限制用户安装未签名 ActiveX 控件。"
score = 7.8
severity = "HIGH"
sources = ["kev"]
title = "Microsoft Windows LNK 快捷方式文件远程代码执行漏洞"
updated = "2026-06-16T23:20:59.973"

