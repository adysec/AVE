[basic]
description = "Microsoft Internet Explorer 4 中的 Internet WebBrowser ActiveX 控件存在剪贴板信息泄露漏洞。远程攻击者可通过构造恶意网站，诱使用户访问后利用该 ActiveX 对象读取用户剪贴板中的敏感内容（如密码、文本等），导致机密信息泄露。该漏洞影响 Internet Explorer 4 版本，攻击条件为用户需访问恶意网站，CVSS 评分 2.6，危害等级低。"
published = "1999-02-02T05:00:00.000"
remediation = '升级到 Internet Explorer 5 及以上版本即可消除此漏洞。对于无法升级的旧系统，可通过注册表为 Internet Explorer WebBrowser ActiveX 对象 (CLSID: {8856F961-340A-11D0-A96B-00C04FD705A2}) 设置 kill bit：在 HKEY_LOCAL_MACHINE\SOFTWARE\Microsoft\Internet Explorer\ActiveX Compatibility 下创建该 CLSID 项，将 Compatibility Flags DWORD 值设为 0x400 以禁用该控件。建议同时在 IE 安全设置中将「Internet 区域」的「对标记为可安全执行脚本的 ActiveX 控件执行脚本」设为禁用。'
score = 2.6
severity = "LOW"
sources = ["avd"]
title = "Microsoft Internet Explorer 4 剪贴板信息泄露漏洞"
updated = "2026-06-16T21:50:28.370"

