[basic]
description = "Windows 2000 无人值守安装功能在使用 OEMPreinstall 选项时，系统安装程序会错误地将 All Users 和 Default Users 目录的权限设置为不安全状态，导致这些目录对所有本地用户可写。本地攻击者可利用该权限配置漏洞读取或篡改其他用户的配置文件和私人数据，进而获取敏感信息或实现本地权限提升。攻击者需具备系统本地登录权限，无法通过远程方式利用此漏洞。"
published = "2000-04-07"
remediation = "在 Windows 2000 无人值守安装完成后，手动重置 All Users 和 Default Users 目录的 ACL 权限：使用 xcacls 或 cacls 命令将 %ALLUSERSPROFILE% 和 %DEFAULTUSERPROFILE% 目录权限设置为管理员完全控制、普通用户只读。同时在应答文件 unattend.txt 中删除或注释掉 OEMPreInstall 选项，避免下次自动安装时再次生成不安全权限。"
score = 7.2
severity = "HIGH"
sources = ["cve"]
title = "Microsoft Windows 2000 无人值守预安装权限配置不当漏洞"
updated = "2026-06-16"

