[basic]
description = "ISC INN（InterNetNews）新闻服务器中的 inews 程序存在缓冲区溢出漏洞。远程攻击者可通过向目标系统发送特制的新闻文章数据触发该漏洞，导致缓冲区溢出，进而可能造成拒绝服务或在目标系统上以 news 用户权限执行任意代码。该漏洞影响 ISC INN 2.2 及 RedHat Linux 6.0 等版本，CVSS 评分 7.5，危害等级高。"
published = "1999-09-01T04:00:00.000"
remediation = "升级 ISC INN 至 2.3 或更高版本，该版本已修复 inews 缓冲区溢出漏洞。Red Hat Linux 6.0 用户应安装厂商提供的对应安全更新包。如无法升级，建议限制 inews 程序的 SUID 权限并仅允许受信用户访问新闻服务器。"
score = 7.5
severity = "HIGH"
sources = ["exploitdb"]
title = "ISC INN inews 缓冲区溢出漏洞"
updated = "2026-06-16T21:48:53.177"

