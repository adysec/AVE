[basic]
description = "用友畅捷通T+ 的 FileUploadHandler.ashx 接口存在任意文件上传漏洞，未经身份认证的远程攻击者可通过构造特制的 multipart/form-data 请求，上传包含恶意代码的 ASP 文件至目标服务器，从而获得服务器控制权，实现远程代码执行。该漏洞影响用友畅捷通T+ 全版本，危害等级严重。"
published = "0702"
remediation = "立即联系畅捷通技术支持（400-6600-566）获取并安装最新安全补丁包，修复版本为 T+ 18.0 及以上对应补丁。临时缓解措施：通过 WAF 或反向代理规则拦截对 /tplus/SM/SetupAccount/FileUploadHandler.ashx 的 POST 请求，限制文件上传接口的访问来源 IP，并对上传文件类型做严格白名单校验。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "用友 畅捷通T+ FileUploadHandler 任意文件上传漏洞"
updated = "0702"

