[basic]
description = "FreeBSD 系统下运行的 Seyon 终端模拟器（2.1 rev. 4b i586-Linux 版本）存在本地权限提升漏洞。其原因在于程序在解析命令行 `-emulator` 参数时未对用户输入进行充分校验与边界检查，攻击者在本地系统中可构造一个恶意的模拟器程序，并通过 `-emulator` 参数将其路径传递给 seyon。当具有特权（setuid）的 seyon 程序启动时，会加载并执行该恶意程序，从而使本地普通用户以 seyon 的特权身份运行任意代码，实现本地权限提升。该漏洞影响使用受影响版本 seyon 且以特权方式安装的 FreeBSD 系统，攻击需具备本地登录权限并能在目标主机上放置可执行文件，利用方式简单，仅需构造恶意程序并指定 `-emulator` 参数即可触发。"
published = "1999-11-08T05:00:00.000"
remediation = "升级 FreeBSD 至当前安全维护版本（stable/14 或 stable/15），受影响的 seyon 2.1 rev. 4b 已在后续版本中移除或修复。临时缓解措施：通过 pkg delete seyon 卸载 seyon 终端模拟器，或通过 chmod 取消其 setuid/setgid 位（chmod -s /usr/local/bin/seyon），限制普通用户执行权限。对于仍运行旧版 FreeBSD 的系统，可应用补丁禁用 -emulator 参数传递或限制该参数仅接受绝对路径且不允许 Shell 元字符，防止攻击者注入恶意程序路径。"
score = 4.6
severity = "MEDIUM"
sources = ["avd"]
title = "FreeBSD Seyon 终端仿真程序本地权限提升漏洞"
updated = "2026-06-16T21:49:07.710"

