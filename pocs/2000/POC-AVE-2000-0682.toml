[info]
author = "AVE"
description = "检测 Samba SWAT (Web Administration Tool) 是否在目标上运行。SWAT 2.0.7 存在 cgi.log 符号链接漏洞，本地攻击者可利用该漏洞覆盖任意文件。此 PoC 通过 HTTP 请求验证 SWAT 服务是否存在。"
id = "POC-AVE-2000-0682"
name = "CVE-2000-0935 PoC"
severity = "high"
tags = ["cve-2000-0935"]
vuln_id = [
    "CVE-2000-0935",
    "AVE-2000-0682",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/"
protocol = "http"

[poc.requests.body]
content = ""
type = "raw"

[poc.requests.headers]
User-Agent = "AVE/1.0"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "Samba Web Administration Tool",
    "SWAT",
]
