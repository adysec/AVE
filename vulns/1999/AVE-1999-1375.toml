[basic]
description = "Maximizer Enterprise 4 日历与地址簿程序存在访问控制缺陷，当日历被共享时，任意用户均可修改其他用户的日历内容，无需额外授权。该漏洞源于程序未对共享日历的修改操作进行身份验证与权限检查，攻击者只需能够访问共享日历即可实施篡改，影响日历数据的完整性与用户隐私。CVSS 评分 5.0，危害等级中等。"
published = "1999-01-14T05:00:00.000"
remediation = "立即将 Maximizer Enterprise 4 升级至最新受支持的 Maximizer CRM 版本（当前已演进为 SaaS 云架构），该漏洞属于旧版日历共享功能的设计缺陷。如无法升级，应在 Maximizer 配置中严格限制日历共享范围至最小受信任用户集，并定期审计日历修改日志以检测未授权变更。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Maximizer Enterprise 4 权限许可和访问控制漏洞"
updated = "2026-06-16T21:49:52.400"

