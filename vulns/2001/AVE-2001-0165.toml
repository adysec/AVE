[basic]
description = "Linux 2.4 内核 IPTables 防火墙的 ip_conntrack_ftp 模块存在访问控制绕过漏洞。远程攻击者可通过向受防火墙保护的 FTP 服务器发送特制的 PORT 命令，在其中指定任意 IP 地址和端口号，该连接将被添加到 RELATED 表中并被防火墙放行，从而绕过 iptables 设置的访问限制规则，实现非授权访问内网资源。该漏洞影响 Linux 2.4 内核系列版本，CVSS 评分 7.5，危害等级高。"
published = "2001-07-02T04:00:00.000"
remediation = "升级 Linux 内核至 2.4.3 及以上版本，或安装对应发行版补丁：Red Hat 用户应用 RHSA-2001-052/RHSA-2001-084，Mandrake 用户应用 MDKSA-2001-071。临时缓解措施可卸载 ip_conntrack_ftp 模块（rmmod ip_conntrack_ftp），或配置 iptables 规则限制 RELATED 状态连接仅允许可信源地址。"
score = 7.5
severity = "HIGH"
sources = ["redhat"]
title = "Linux Kernel 2.4 IPTables FTP 状态检测防火墙规则绕过漏洞"
updated = "2026-06-16T21:54:14.747"

