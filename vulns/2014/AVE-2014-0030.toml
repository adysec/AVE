[basic]
description = "WordPress 的 Cross-RSS（wp-cross-rss）插件 1.7 版本中存在绝对路径遍历漏洞（CWE-22）。未经身份认证的远程攻击者通过向 proxy.php 文件的 rss 参数传入服务器上的完整绝对路径，可直接读取任意文件内容，导致敏感信息泄露。该漏洞源于程序未对用户输入的 rss 参数进行有效的路径过滤与校验，攻击者无需任何权限即可利用，攻击复杂度低，影响网站数据保密性。"
published = "2014-07-11T20:55:03.453"
remediation = "立即删除或禁用 WordPress Cross-RSS (wp-cross-rss) 插件 1.7 版本，该插件已长期未维护，建议寻找替代插件。如暂时无法删除，编辑 proxy.php 文件，对 rss 参数使用 realpath() 函数进行路径规范化校验，禁止包含 ../ 或绝对路径。配置 Web 服务器禁止 proxy.php 的外部直接访问。"
score = 5
severity = "MEDIUM"
sources = ["nuclei"]
title = "WordPress Cross-RSS插件目录遍历漏洞"
updated = "2026-06-17T00:10:48.660"

