[basic]
description = "Microsoft IIS 5.0 在处理进程内系统文件查找时使用相对路径，导致本地权限提升漏洞。攻击者可在受影响系统上放置特洛伊木马文件，当 IIS 加载进程内组件时，由于路径解析机制缺陷，系统会优先加载攻击者放置的恶意文件而非原始系统文件，从而以 SYSTEM 权限执行任意代码。该漏洞影响 Windows 2000 上运行的 IIS 5.0 版本，攻击者需拥有本地访问权限，无需身份认证即可利用。Microsoft 已发布安全公告 MS01-044 修复此漏洞。"
published = "2001-09-20T04:00:00.000"
remediation = '安装 Microsoft 安全公告 MS01-044 提供的累积补丁 (Q301625)，或升级至 Windows Server 2003 及以上版本。如无法升级，在 IIS 管理器中禁用不必要的 ISAPI 扩展和应用程序映射，限制本地用户对系统目录的写入权限，并确保 %windir%\system32 等关键目录仅允许 Administrators 完全控制。'
score = 7.2
severity = "HIGH"
sources = ["exploitdb"]
title = "Microsoft IIS 5.0 In-Process Table 权限提升漏洞"
updated = "2026-06-16T21:54:26.223"

