[basic]
description = "rpc.rquotad（远程磁盘配额守护进程）是基于 RPC 协议的过时服务，默认通过端口映射器注册，允许任意远程用户无需认证即可查询目标系统的用户磁盘配额信息。攻击者可通过 RPC 扫描探测该服务，从而获取系统用户名列表及配额使用情况，为后续密码爆破或权限提升攻击收集侦察信息。该协议缺乏安全认证与加密机制，属于不安全配置问题而非软件缺陷，应当禁用。"
published = "1999-01-01T05:00:00.000"
remediation = "建议立即禁用 rpc.rquotad 服务：在 Linux 中执行 `systemctl stop rpc-rquotad && systemctl disable rpc-rquotad`（或 `killall rpc.rquotad`）；在 /etc/inetd.conf 中注释掉 rquotad 行并重启 inetd。同时配置 iptables 防火墙规则限制对 RPC 端口 111 和 2049 的外部访问，仅允许受信 IP 段。如在共享存储场景中必需，替换为 NFSv4 内建配额管理，不再依赖独立 rquotad 服务。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "UNIX rpc.rquotad 远程权限提升漏洞"
updated = "2026-06-16T21:48:44.947"

