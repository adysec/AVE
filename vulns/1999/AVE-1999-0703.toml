[basic]
description = "Byte Fusion BFTelnet 1.1 存在缓冲区溢出漏洞，远程攻击者可通过向目标系统的 Telnet 服务发送超长用户名，触发缓冲区溢出，导致服务进程崩溃，造成拒绝服务。该漏洞影响 BFTelnet 1.1 版本，攻击无需身份认证，通过网络即可实施，危害等级中等。"
published = "1999-11-03T05:00:00.000"
remediation = "Byte Fusion BFTelnet 1.1 已停止维护，厂商未发布安全更新。建议立即停止使用 BFTelnet，迁移至受支持的 Telnet/SSH 服务器（如 OpenSSH 或 Dropbear）。如无法立即替换，可在防火墙层面限制对 TCP 23 端口的访问来源 IP，仅允许受信任的管理网段连接，作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Byte Fusion BFTelnet 1.1 长用户名缓冲区溢出拒绝服务漏洞"
updated = "2026-06-16T21:49:17.913"

