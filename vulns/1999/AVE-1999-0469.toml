[basic]
description = "Allaire ColdFusion（现 Adobe ColdFusion）管理控制台在启用高级安全功能后存在权限验证缺陷，远程未经授权的攻击者可通过 Start/Stop 管理工具直接向目标服务器发送停止操作指令，导致 ColdFusion 服务进程被异常终止，造成拒绝服务。该漏洞影响 ColdFusion 4.x 及更早版本，攻击者无需认证即可利用，CVSS v2 评分 5.0，危害等级中危。厂商已发布安全公告并提供修复补丁。"
published = "2001-03-12"
remediation = "建议升级Adobe ColdFusion至2023或更高版本，并关闭Advanced Security模式或严格限制管理员账户访问权限。通过Web.config配置禁用Start/Stop实用程序功能，作为临时缓解措施可通过防火墙限制针对管理员页面的网络访问，确保仅从内部网络可访问。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Macromedia ColdFusion 管理员 远程拒绝服务漏洞"
updated = "2001-03-12"

