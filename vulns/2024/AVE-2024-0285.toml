[basic]
description = "飞讯云WMS 的 `/MyDown/MyImportData` 接口存在前台 SQL 注入漏洞，攻击者无需登录认证即可通过 `opeid` 参数注入恶意 SQL 语句。该漏洞源于系统未对用户输入进行有效的过滤与参数化处理，攻击者可利用 `WAITFOR DELAY` 等时间盲注技术探测数据库内容，进而窃取敏感数据或获取系统控制权。该漏洞影响飞讯云WMS 全版本，危害严重。"
published = "0725"
remediation = "联系飞讯云厂商获取最新安全补丁或升级至最新版本；对 /MyDown/MyImportData 接口的 opeid 参数实施严格输入过滤与参数化查询，禁止拼接 SQL 语句；在 Web 应用防火墙（WAF）侧配置针对 SQL 注入的规则，拦截含有 WAITFOR DELAY、UNION、SELECT 等敏感关键词的请求作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "飞讯云WMS 前台SQL注入漏洞"
updated = "0725"

