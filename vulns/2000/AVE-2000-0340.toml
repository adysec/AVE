[basic]
description = "gnapster 和 knapster Napster 客户端未正确限制仅允许访问 MP3 文件，存在任意文件读取漏洞。远程攻击者可通过指定目标文件的完整路径名，诱使客户端读取本地任意文件，导致敏感信息泄露。该漏洞影响 John Donoghue Knapster 0.9 及 1.3.8 版本，CVSS 评分 7.5，危害等级高危。建议用户升级至不受影响版本或禁用相关功能以规避风险。"
published = "1999-05-01T04:00:00.000"
remediation = "立即卸载 gnapster/knapster 客户端，改用其他安全的音乐播放软件。如无法卸载，可在防火墙层面限制客户端仅允许连接 Napster 服务器的 6699/TCP 端口，并配置主机防火墙规则阻止客户端对外发起非 MP3 路径的任意文件读取请求。FreeBSD 用户可参考 FreeBSD-SA-00:18 安全公告应用补丁。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "John Donoghue Knapster 客户端任意文件读取漏洞"
updated = "2026-06-16T21:51:39.690"

