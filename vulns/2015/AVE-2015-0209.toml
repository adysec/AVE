description = "Microsoft Windows 内核模式驱动 win32k.sys 存在内存损坏漏洞（CWE-119、CWE-416 Use After Free），本地攻击者可通过诱导用户运行精心构造的恶意应用程序触发内核内存损坏，进而实现本地权限提升或导致拒绝服务（内存损坏）。该漏洞影响 Windows Server 2003 SP2/R2 SP2、Windows Vista SP2、Windows Server 2008 SP2/R2 SP1、Windows 7 SP1、Windows 8/8.1、Windows Server 2012/R2 及 Windows RT/8.1 等多个版本，CVSS 3.1 评分 8.8（高危），攻击向量为本地、攻击复杂度低、权限要求低、无需用户交互，机密性/完整性/可用性影响均为高。该漏洞曾被 Duqu 2.0 等高级持续性威胁组织在野利用，Microsoft 已于 2015 年 6 月安全更新中修复。"
