[basic]
description = "Cisco 路由器 IOS 系统的联机帮助功能存在信息泄露漏洞，未获得 enable 高权限的低权限用户可利用 help 系统中的 show 命令查询设备敏感配置信息，包括运行配置、接口状态、路由表等。攻击者只需拥有非特权的 CLI 访问权限即可利用该漏洞，无需身份认证。该漏洞影响 Cisco 2500/2600/3600/4000/7200/7500 等多款路由器的 IOS 系统，CVSS 评分 2.1，危害等级低。"
published = "2000-05-03T04:00:00.000"
remediation = "升级 Cisco IOS 至不受影响版本（如 12.0(5) 及以上），或应用 Cisco 发布的对应安全补丁。同时配置 privilege 级别限制，对非特权用户禁用 show 命令中的敏感信息输出，并在 line vty 下添加 access-class 限制管理访问来源 IP。"
score = 2.1
severity = "LOW"
sources = ["cve"]
title = "Cisco 路由器在线帮助系统信息泄露漏洞"
updated = "2026-06-16T21:51:31.413"

