[basic]
description = "KDE kvt 终端模拟器存在格式化字符串漏洞，由于程序在处理用户输入时未对格式化字符串参数进行正确过滤，导致本地攻击者可通过向终端传递特制的格式化字符串触发该漏洞，从而获取系统 root 权限。该漏洞影响 KDE 早期版本，攻击者需拥有本地系统访问权限，利用难度较低，危害等级高。"
published = "1999-06-01T04:00:00.000"
remediation = "将 KDE 软件包升级至修复此格式化字符串缺陷的版本：Red Hat Linux 用户安装 RHSA-1999-015 提供的更新包，Caldera OpenLinux 用户安装 CSSA-1999-015 提供的更新包。临时缓解措施可移除 kvt 的 setuid root 权限（chmod u-s /opt/kde/bin/kvt），防止本地用户利用该漏洞提权至 root。"
score = 7.2
severity = "HIGH"
sources = ["cve"]
title = "KDE kvt 格式化字符串漏洞"
updated = "2026-06-16T21:51:34.897"

