[basic]
description = "Windows NT 计划任务调度程序使用当前登录交互用户的驱动器映射，导致本地用户可通过将特洛伊木马批处理文件替换原始批处理文件来提升权限。攻击者利用此漏洞可获取系统级访问权限。"
published = "2000-02-14"
remediation = "Windows NT 4.0 已停止支持，建议升级至受支持的 Windows 版本（如 Windows Server 2019/2022）。若无法升级，应限制交互用户对计划任务目录的写入权限，并确保计划任务引用的批处理文件位于受保护的目录中，防止被恶意替换。"
score = 4.6
severity = "MEDIUM"
sources = ["cve"]
title = "Microsoft Windows NT 计划任务权限提升漏洞"
updated = "2000-02-14"

