[basic]
description = "GNOME gdm、KDE kdm 及 wdm 的 XDMCP 解析代码存在缓冲区溢出漏洞，未经身份认证的远程攻击者可通过向目标系统发送特制的超长 FORWARD_QUERY 请求触发该漏洞，导致远程代码执行或拒绝服务。该漏洞影响 gdm 1.0.x/2.0.x BETA/2.2.0 等版本，CVSS 评分 10.0，危害等级严重。"
published = "2000-05-24"
remediation = "升级 GNOME gdm 至 2.2.0.1 或更高版本、KDE kdm 及 wdm 至各发行版修补版本（如 Caldera OpenLinux 安装 CSSA-2000-013 补丁、SuSE Linux 安装 suse_security_announce_49 更新）。若无法升级，建议在防火墙限制 XDMCP 端口（177/UDP）访问来源 IP，或禁用 XDMCP 服务改用 SSH X11 转发。"
score = 10
severity = "CRITICAL"
sources = ["cve"]
title = "GNOME gdm XDMCP 缓冲区溢出漏洞"
updated = "2026-06-16T21:51:50.913"

