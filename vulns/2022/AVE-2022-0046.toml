[basic]
description = "Linux 内核 SCSI lpfc 驱动程序中存在引用计数缺陷漏洞。当插入外部回环插头进行短时回环测试后拔出并接入正常目标线缆时，由于回环模式下发送的 FLOGI 请求被 ABTS 中止，但 ABTS 因地址无效被丢弃在链路上。回环测试完成后原本的 ABTS 完成事件引用已释放的 fabric ndlp，导致系统在 `lpfc_set_rrq_active()` 例程中发生内核崩溃（oops）。本地攻击者需物理接入目标设备并通过插拔回环插头触发此条件，造成拒绝服务。CVSS 评分 5.5，危害等级中等。"
published = "2025-02-26T07:01:26.543"
remediation = "立即升级 Linux 内核至 5.18.3 或更高版本（5.19+ 亦不受影响），对应补丁提交为 ead76d4c09b89f4c8d632648026a476a5a34fde8。如无法立即升级内核，可临时避免在运行 lpfc 驱动的 SCSI 设备上使用外部回环线缆测试后直接切换至直连目标设备，操作前确保 ABTS 超时完成以规避引用释放后重用的内核崩溃。"
score = 5.5
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux kernel lpfc 驱动外部环回模式空指针解引用漏洞"
updated = "2026-06-17T05:18:15.920"

