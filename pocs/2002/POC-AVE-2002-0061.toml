[info]
author = "ave"
description = "检测 MHonArc 2.5.12 及之前版本中 MIME 邮件头跨站脚本漏洞。攻击者通过发送包含恶意脚本的 MIME 头名称的邮件，当 MHonArc 生成 HTML 归档页面时未正确转义头名称，导致 XSS 执行。通过请求 MHonArc 归档页面确认应用存在。"
id = "POC-AVE-2002-0061"
name = "MHonArc 2.5.x MIME Header XSS PoC"
severity = "medium"
tags = ["ave-2002-0061"]
vuln_id = [
    "CVE-2002-1307",
    "AVE-2002-0061",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "MHonArc",
    "MHonArc Archive",
]
