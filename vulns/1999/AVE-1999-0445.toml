[basic]
description = "jj CGI 程序存在命令注入漏洞，由于程序未对用户输入进行充分的过滤处理，远程攻击者可通过向 CGI 参数传递 shell 元字符（如分号、管道符等）执行任意系统命令。该漏洞影响早期使用 jj CGI 程序的 Web 服务器配置，CVSS 评分 7.5，危害等级高，建议禁用该 CGI 程序或升级至安全版本。"
published = "1996-12-24T05:00:00.000"
remediation = "建议立即从 Web 服务器 cgi-bin 目录中删除或禁用 jj CGI 程序，或对用户输入严格过滤，转义 shell 元字符（; | & ` $ ( ) { } < >），避免将用户输入直接传递给 system()/popen() 等函数。如业务确需该功能，应使用参数化方式调用系统命令替代直接拼接字符串。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "通用 jj CGI 程序命令执行漏洞"
updated = "2026-06-16T21:48:01.353"

