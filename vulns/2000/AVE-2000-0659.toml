[basic]
description = "QSSL Voyager 2.0 1B Web 服务器在 QNX 405 演示光盘版本中，将敏感的 Web 客户端信息存储在 Web 文档根目录下的 .photon 目录中。远程攻击者可通过直接访问该目录下的文件，获取包括用户会话数据在内的敏感信息，导致信息泄露。该漏洞影响 QSSL Voyager 2.01B 版本，CVSS 评分 5.0，危害等级中危。"
published = "2000-12-19T05:00:00.000"
remediation = "立即将 Voyager 服务器升级到 2.01B 以上版本，或迁移至 QNX 6 及以上版本。如无法升级，手动删除 Web 根目录下的 .photon 目录，并配置 Web 服务器禁止访问以点号开头的目录（如 Deny access to .photon），同时修改文件权限为 600 以防止未经授权的读取。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "QSSL Voyager 2.0 Web 服务器 .photon 目录信息泄露漏洞"
updated = "2026-06-16T21:52:43.850"

