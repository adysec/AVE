[basic]
description = "CVS Kit CVS Server 1.10.8 中 Checkin.prog 功能存在访问控制缺失漏洞，远程攻击者作为 CVS 提交者可在服务器上创建恶意的 Checkin.prog 或 Update.prog 程序，当其他用户执行 CVS 提交操作时触发恶意代码执行，从而植入木马程序。该漏洞影响 CVS 1.10.8 版本，CVSS 评分 7.2，危害等级高。建议用户升级至不受影响的版本并限制 CVS 仓库的提交权限。"
published = "2000-10-20T04:00:00.000"
remediation = "升级至 CVS 1.11 或更高版本，该版本已限制只有 CVSROOT 目录下的管理员才能创建和修改 Checkin.prog 及 Update.prog 文件。如无法升级，可手动移除 Checkin.prog 和 Update.prog 功能（注释或删除 CVSROOT/checkoutlist 中相关项），并在 CVS 服务器防火墙上限制对 2401 端口的访问来源。同时审查 CVSROOT 目录的写入权限，确保只有受信任的管理员拥有写权限。"
score = 7.2
severity = "HIGH"
sources = ["exploitdb"]
title = "CVS Kit CVS Server 1.10.8 任意程序执行漏洞"
updated = "2026-06-16T21:52:15.253"

