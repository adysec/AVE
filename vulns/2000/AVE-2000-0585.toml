[basic]
description = "MediaHouse Software 出品的 Statistics Server LiveStats 5.02x 存在远程缓冲区溢出漏洞，远程攻击者可通过向目标服务器发送超长 HTTP GET 请求触发缓冲区溢出，进而导致服务崩溃或执行任意命令。该漏洞影响 LiveStats 5.02x 版本，攻击者无需身份认证即可远程利用，危害较大。"
published = "2000-10-20T04:00:00.000"
remediation = "建议立即升级至 LiveStats 5.3 或更高版本（若 MediaHouse 已发布修复版本）。该产品已停止维护多年，强烈建议迁移至现代 Web 统计分析平台（如 Matomo、Umami 等）。作为临时缓解措施，可在反向代理或 WAF 层面限制 HTTP GET 请求 URL 长度不超过 1024 字节，并限制 Statistics Server 端口的访问来源 IP 范围。"
score = 7.5
severity = "HIGH"
sources = ["exploitdb"]
title = "MediaHouse Software Statistics Server LiveStats 远程缓冲区溢出漏洞"
updated = "2026-06-16T21:52:27.433"

