[basic]
description = "Sun Solaris 7.0 系统中的 dtprintinfo 工具存在缓冲区溢出漏洞，该程序位于 /usr/dt/bin/dtprintinfo，在处理特制输入时未正确验证缓冲区边界，导致可被利用覆盖内存数据。本地攻击者可通过向 dtprintinfo 传递超长参数触发溢出，进而以 root 权限执行任意代码，实现权限提升。该漏洞影响 Solaris 7.0 版本，需本地访问权限，CVSS 评分 7.2，危害等级高。"
published = "1999-05-10T04:00:00.000"
remediation = "安装 Sun 官方补丁 107080-01（SPARC 平台）或 107081-01（x86 平台）修复 dtprintinfo 缓冲区溢出漏洞。若无法打补丁，立即移除 dtprintinfo 的 setuid 位：chmod -s /usr/dt/bin/dtprintinfo，或限制仅管理员可执行：chmod 700 /usr/dt/bin/dtprintinfo。如不需要 CDE 打印功能可直接删除该二进制文件。"
score = 7.2
severity = "HIGH"
sources = ["cve"]
title = "Sun Solaris dtprintinfo 本地缓冲区溢出漏洞"
updated = "2026-06-16T21:49:05.767"

