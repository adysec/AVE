[basic]
description = "IBM AIX 系统中 Navio NC 的 netstation.navio-com.rte 配置脚本存在权限配置不当漏洞。该脚本在执行后将 /tmp 目录通过 NFS 导出为全局可读可写，导致任意能访问 NFS 共享的远程用户均可读取或篡改 /tmp 下的临时文件，可能造成敏感信息泄露或权限提升。攻击者无需认证即可利用此漏洞。影响 Navio NC 1.1.0.1 版本，CVSS 评分 5.0，危害等级中等。"
published = "1999-01-29T05:00:00.000"
remediation = "手动修改 /etc/exports 文件，移除对 /tmp 目录的 world-readable 和 world-writable 导出权限，重启 NFS 服务；升级 netstation.navio-com.rte 至不受影响的版本；或联系 IBM 获取 Navio NC 配置脚本修正补丁。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "IBM AIX Navio NC netstation.navio-com.rte配置脚本信息泄露漏洞"
updated = "2026-06-16T21:50:41.320"

