[basic]
description = "Windows NT 的屏幕保护程序在切换安全上下文时未正确验证权限变更状态，导致本地攻击者可通过特殊操作利用该漏洞以提升的权限运行任意程序。该漏洞影响 Windows NT 4.0 及 NT 3.5.1 全系列服务包版本，CVSS 评分 7.2，危害等级高。攻击者需具备本地系统访问权限方可利用。"
published = "1999-03-12T05:00:00.000"
remediation = '安装 Windows NT 4.0 Service Pack 5 或更高版本，该更新修复了屏幕保护程序未正确验证安全上下文的问题。如无法升级，可禁用屏幕保护程序（控制面板→显示→屏幕保护程序→选择"无"），并要求用户在离开时手动锁定工作站（Ctrl+Alt+Del→锁定工作站）。'
score = 7.2
severity = "HIGH"
sources = ["epss"]
title = "Microsoft Windows NT 屏幕保护程序权限提升漏洞"
updated = "2026-06-16T21:48:16.647"

