[basic]
description = "IBM AIX 操作系统 4.1 和 4.2 版本中，lquerypv 命令存在安全漏洞。攻击者在执行 lquerypv 命令时，通过指定 -h 参数可以访问系统中的任意文件，导致未经授权的文件读取攻击。该漏洞影响范围涵盖了 IBM AIX 4.1 和 4.2 版本的整机系统，攻击者只需具备对系统的基本访问权限即可发起攻击，通过构造恶意命令参数实现对敏感文件（如密码文件、配置文件等）的读取，严重威胁系统安全，暴露用户隐私和系统关键信息。"
published = "1999-12-31T05:00:00.000"
remediation = "建议升级至 IBM AIX 4.3 或更高版本，或安装对应 APAR/PTF 补丁（如 IY06567/IX49520）。若无法立即升级，可通过 chmod 700 /usr/sbin/lquerypv 限制命令执行权限仅限 root，并加强文件权限控制限制敏感文件读取权限作为临时缓解措施。建议尽快规划系统升级至受支持的 AIX 版本。"
score = 2.1
severity = "LOW"
sources = ["exploitdb"]
title = "IBM AIX lquerypv 本地文件读取漏洞"
updated = "2026-06-16T21:49:45.383"

