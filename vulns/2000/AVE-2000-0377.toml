[basic]
description = "Red Hat Linux 6.0 在安装 /dev/pts 伪终端文件系统时使用了不安全的权限模式，本地用户可以写入其他终端设备的 tty 文件，从而读取或篡改其他用户终端会话内容，导致敏感信息泄露或权限提升。"
published = "1999-06-01"
remediation = "Red Hat 发布安全公告 RHSA-1999:014-01，建议用户更新 initscripts 软件包至修复版本，或手动修改 /dev/pts 文件系统挂载选项，限制本地非特权用户对伪终端设备的写入权限。"
score = 4.6
severity = "MEDIUM"
sources = ["cve"]
title = "Red Hat Linux 6.0 /dev/pts 伪终端文件系统权限漏洞"
updated = "2026-06-16"

