[basic]
description = "SunOS 4.1.1 至 4.1.3c 版本中的 loadmodule 程序，以及以 setuid/setgid 权限安装的 modload 程序（含 Open Windows 3.0 中的相关组件）存在未知缺陷。本地已登录的普通用户可通过精心构造环境变量，在调用这些程序时影响其加载模块的行为，从而将自身权限提升至 root。该漏洞仅影响具备本地系统访问权限的用户，无法被远程利用，但一旦成功利用即可完全控制受影响主机，危害等级极高（CVSS 评分 10.0）。"
published = "1999-12-31T05:00:00.000"
remediation = "建议升级到 SunOS 4.1.4 或更高版本，并安装 Sun 官方提供的 patch 100572/100573 系列补丁修复 loadmodule 与 modload 的权限缺陷。如无法立即升级，应以 root 身份执行 chmod u-s /usr/bin/loadmodule 及 chmod u-s /usr/bin/modload 移除其 setuid/setgid 位，并限制普通用户对相关二进制文件的执行权限，避免通过环境变量进行本地提权。"
score = 10
severity = "CRITICAL"
sources = ["cve"]
