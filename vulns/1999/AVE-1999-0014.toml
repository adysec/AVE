[basic]
description = "Windows NT 4.0 Messenger 服务存在拒绝服务漏洞。远程攻击者可通过向目标系统的 Messenger 服务发送包含超长用户名的精心构造的消息报文，触发服务崩溃并停止响应，导致系统无法正常接收和显示消息通知。该漏洞影响 Windows NT 4.0 系统，攻击无需身份认证即可远程触发，属于中等危害级别的拒绝服务漏洞。"
published = "1999-07-23T04:00:00.000"
remediation = "安装 Windows NT 4.0 Service Pack 3（SP3）或更高版本，该更新已修复 Messenger Service 因超长用户名导致缓冲区溢出的拒绝服务漏洞。如无法安装补丁，可通过服务管理器（services.msc）将 Messenger Service 禁用，并同时在防火墙层面阻止入站 UDP 135、137-138 及 TCP 139、445 端口作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Microsoft Windows NT 4.0 Messenger Service 拒绝服务漏洞"
updated = "2026-06-16T21:47:56.923"

