[basic]
description = "glibc 2.1.1 的 unsetenv 函数存在缺陷，当程序接收到重复的环境变量（如 LD_PRELOAD 或 LD_LIBRARY_PATH）时，未能正确清除该变量，导致本地攻击者可在 setuid 程序（如 ProFTPd 1.2 pre6 等以 root 权限运行的服务）中注入恶意共享库，进而实现本地提权至 root。该漏洞影响使用 glibc 2.1.1 的 Linux 系统，攻击者需具备本地账户权限，通过设置重复环境变量启动 setuid 程序即可触发，利用方式为构造恶意 LD_PRELOAD/LD_LIBRARY_PATH 环境变量劫持动态链接器加载恶意 so 文件实现代码执行。CVSS 7.2（本地/低复杂度/无需认证/完全影响）。"
published = "2000-11-14T05:00:00.000"
remediation = '立即升级 ProFTPd 至 1.2.0 正式版或更高版本（如 1.2.10），或升级 glibc 至 2.1.2 以上版本修复 unsetenv 漏洞。若无法立即升级，可临时在 /etc/ftpaccess 中添加 "DenyAll" 限制匿名访问，或在防火墙层面限制 FTP 端口 (21/tcp) 仅允许受信 IP 访问作为临时缓解措施。建议优先从 ProFTPd 官网 (http://www.proftpd.org/) 下载最新稳定版源码编译安装，或使用发行版包管理器 (如 apt upgrade proftpd / yum update proftpd) 更新至修复版本。若使用 Mandrake Linux，请安装官方安全补丁 MDKSA-2000:040。'
score = 7.2
severity = "HIGH"
sources = ["cve"]
title = "ProFTPD ProFTPd 1.2 pre6 snprintf 格式化字符串漏洞"
updated = "2026-06-16T21:52:32.550"

