[basic]
description = "QMS CrownNet 是 QMS 2060 打印服务器上运行的 Unix 管理工具，存在严重身份认证缺陷：该工具允许任意用户以 root 权限直接登录系统而无需密码验证。攻击者只需通过网络连接到目标打印服务器上的对应管理端口即可触发，无需提前获取任何凭证。成功利用后，攻击者可获得打印服务器的完全控制权，进而读取、修改或删除打印机配置及网络设置。此漏洞影响运行 CrownNet Unix 实用程序的 QMS 2060 系列设备。"
published = "1999-08-19"
remediation = "立即将 CrownNet 固件升级至 3.0 或更高版本（该版本已修复默认 root 无密码登录问题）；若无法升级固件，则通过防火墙规则限制 TCP 端口 515（lpd）和 CrownNet 管理端口（默认 2000/TCP）仅允许可信 IP 访问；如无需远程管理功能，建议在 CrownNet 配置界面中直接禁用 Unix 实用程序服务；将 QMS 2060 打印机部署于独立隔离 VLAN，避免暴露在通用网络中。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "QMS CrownNet Unix实用程序认证绕过漏洞"
updated = "1999-08-19"

