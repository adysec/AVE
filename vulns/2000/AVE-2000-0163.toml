[basic]
description = "RealMedia RealServer 5.0及7.0版本存在内部地址泄露漏洞。该漏洞源于服务器在响应特定请求时未能正确隐藏内网IP地址，导致即使服务器配置为仅返回公网地址，远程攻击者仍可通过发送特制请求获取目标服务器的真实内部IP地址。攻击者利用此信息可进一步探测内网拓扑结构，为后续攻击提供信息支撑。该漏洞无需身份认证即可利用，危害等级中等。"
published = "2000-03-08T05:00:00.000"
remediation = "建议将 RealServer 升级至 8.0 或更高版本（已修复 IP 地址泄露问题）。如无法升级，可在防火墙或反向代理层面限制对 RealServer 管理端口（默认 7070/9090）的访问来源，仅允许受信内网 IP 访问，同时禁用 RTSP 协议中的非必要信息回显功能，作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "RealNetworks RealServer 内部 IP 地址泄露漏洞"
updated = "2026-06-16T21:51:10.650"

