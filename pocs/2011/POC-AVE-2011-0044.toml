[info]
author = "AVE"
description = "检测 Adobe Flash Player 10.2.153.1 及更早版本中的类型混淆漏洞（CVE-2011-0611）。通过嵌入特制 SWF 文件触发对象类型混淆，导致内存破坏。PoC 基于 Metasploit 模块（exploit-db.com/exploits/17175）和公开 PoC 仓库（fankh/vulnerability-poc），通过 HTTP 服务恶意 HTML 页面验证漏洞存在。"
id = "POC-AVE-2011-0044"
name = "CVE-2011-0611 Adobe Flash Player Type Confusion PoC"
severity = "high"
tags = [
    "cve-2011-0611",
    "flash",
    "type-confusion",
    "rce",
]
vuln_id = [
    "CVE-2011-0611",
    "AVE-2011-0044",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "Flash Player",
    "application/x-shockwave-flash",
]
