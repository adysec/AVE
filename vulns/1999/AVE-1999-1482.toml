[basic]
description = "Microsoft Windows NT 3.51 及 NT 4.0 的 WINS（Windows Internet 名称服务）存在资源耗尽型拒绝服务漏洞。远程攻击者可通过向目标 WINS 服务器发送大量格式错误的数据包，触发服务端资源过度消耗，导致系统响应缓慢、事件日志被错误信息填满。该漏洞影响 Windows NT 3.51 和 NT 4.0 版本，CVSS 评分 6.4，无需身份认证即可远程触发。"
published = "1998-05-09T04:00:00.000"
remediation = '停止使用已停止支持的 Windows NT 3.51/NT 4.0，升级至受支持的 Windows Server 版本（如 Windows Server 2019/2022），或迁移 WINS 服务至最新系统。如无法立即升级，在网络防火墙层面阻止对 UDP 137 端口的非授权访问，并限制仅允许受信客户端连接 WINS 服务器，同时配置注册表 `HKEY_LOCAL_MACHINE\SYSTEM\CurrentControlSet\Services\WINS\Parameters` 下的 `UseSelfFixing` 为 0 以降低异常包影响。'
score = 6.4
severity = "MEDIUM"
sources = ["avd"]
title = "Microsoft Windows NT WINS 拒绝服务漏洞"
updated = "2026-06-16T21:50:16.593"

