[basic]
description = "AnalogX SimpleServer:WWW 1.0.1 HTTP 服务器在处理 GET 请求时存在缓冲区溢出漏洞，未对请求长度进行边界检查。远程未授权攻击者可通过发送超长的恶意 GET 请求触发栈缓冲区溢出，覆盖返回地址实现远程代码执行，CVSS 7.5 高危。该漏洞影响 AnalogX SimpleServer:WWW 1.0.1 版本，攻击者无需身份认证即可通过网络远程发起攻击，成功利用可在目标系统上以服务进程权限执行任意代码，完全控制受影响服务器。ExploitDB 已公开 PoC 利用代码，攻击者可直接利用实现远程代码执行。"
published = "1999-12-31T05:00:00.000"
remediation = "升级 AnalogX SimpleServer:WWW 至 1.0.2 或更高版本（官方已修复 GET 请求缓冲区溢出漏洞）。若无法升级，建议在防火墙层面限制 HTTP 服务仅允许可信 IP 访问，或禁用该服务并迁移至 Apache/Nginx 等维护中的 Web 服务器。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "AnalogX SimpleServer:WWW 1.0.1 缓冲区溢出漏洞"
updated = "2026-06-16T21:50:49.127"

