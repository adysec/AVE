[basic]
description = "Netscape Enterprise Server 3.6 在 HP-UX VirtualVault 平台上存在拒绝服务漏洞。远程攻击者无需身份认证即可向目标服务器发送特制请求，触发服务进程异常崩溃，导致正常用户无法访问 Web 服务。该漏洞影响运行于 HP-UX VVOS 系统上的 Netscape Enterprise Server 3.6 版本，CVSS 评分 5.0，危害等级中等。目前厂商已停止支持该产品，建议用户迁移至其他受支持的 Web 服务器软件。"
published = "1999-03-01T05:00:00.000"
remediation = "安装 HP 安全公告 HPSBUX9903-092 中提供的补丁程序。由于 Netscape Enterprise Server 3.6 及 HP-UX VirtualVault VVOS 均已停止技术支持，建议迁移至受支持的 Web 服务器平台（如 Apache HTTP Server 或 Nginx）及现代操作系统。如无法立即迁移，可在网络边界防火墙配置访问控制规则，仅允许可信 IP 访问服务端口（默认 80/443），并限制对服务端口的异常请求频率以缓解 DoS 攻击。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Netscape Enterprise Server HP-UX VirtualVault 拒绝服务漏洞"
updated = "2026-06-16T21:48:29.133"

