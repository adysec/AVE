[basic]
description = 'Microsoft Internet Explorer 4.01/5.0 中多个 ActiveX 控件（Kodak/Wang Image Edit、Image Annotation、Image Scan、Thumbnail Image、Image Admin、HHOpen、Registration Wizard、IE Active Setup）被错误标记为"安全可脚本"，且存在缓冲区溢出漏洞。远程攻击者可构造恶意网页诱导用户访问，触发 setupctl.dll 等控件的缓冲区溢出，在用户当前权限下创建/修改文件并执行任意命令。影响 Windows 95/NT 4.0 系统上的 IE 4.01/5.0，CVSS 5.1 中危，需用户交互才能利用。'
published = "1999-09-10T04:00:00.000"
remediation = '升级到 Microsoft Internet Explorer 5.5 或更高版本（安装对应 Windows 95/NT 4.0 的最新累积安全补丁）。如无法立即升级，可在 IE 安全设置中将"对未标记为可安全执行脚本的 ActiveX 控件初始化和脚本运行"设为"禁用"，并在注册表中将 imgedit.ocx、imgscan.ocx、imgthumb.ocx、imgadmin.ocx、hhopen.ocx、regwizc.dll、setupctl.dll 对应 Kill Bit 设为 0x00000400 以禁用这些控件作为临时缓解。'
score = 5.1
severity = "MEDIUM"
sources = ["exploitdb"]
title = '{"_meta":{},"stopReason":"end_turn","usage":{"cachedReadTokens":10368,"inputTokens":584,"outputTokens":21,"totalTokens":10973}}'
