[basic]
description = "InduSoft Web Studio 7.1 SP2 Patch 4 之前版本的 NTWebServer 组件存在目录遍历漏洞，远程未授权攻击者可通过发送特制的 Web 请求，利用目录遍历漏洞读取 APP 文件中的管理员密码，进而实现远程任意代码执行。该漏洞影响 InduSoft Web Studio 7.1 SP2 Patch 4 之前的所有版本，CVSS 评分 9.8（CRITICAL），攻击无需身份认证且无需用户交互，攻击复杂度低，影响范围广，危害等级严重。攻击者可通过构造包含目录遍历序列的 Web 请求，绕过路径限制访问敏感文件，获取管理员凭证进而完全控制受影响系统。"
published = "2014-04-25T05:12:07.787"
remediation = '立即升级至 InduSoft Web Studio 7.1 SP2 Patch 4 或更高版本（现 AVEVA Plant SCADA），补丁可从 AVEVA 官方支持门户下载。若暂时无法升级，可在 Web 服务器前部署 WAF 规则拦截包含 ../ 或 ..\ 的路径遍历请求，同时限制 NTWebServer 服务仅监听内网 IP，禁止公网直接访问。'
score = 9.8
severity = "CRITICAL"
sources = ["kev"]
title = "施耐德电气 InduSoft Web Studio 路径遍历漏洞"
updated = "2026-06-17T00:03:37.613"

