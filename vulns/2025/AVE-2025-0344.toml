[basic]
description = "泛微 E-cology9 OA 系统存在远程代码执行漏洞，攻击者可在未授权的情况下通过构造特制的 HTTP 请求包触发漏洞，利用系统对用户输入数据的反序列化处理或文件上传功能绕过安全校验，在目标服务器上执行任意命令，获取服务器完全控制权。该系统广泛应用于国内政企单位的办公自动化场景，部署量大、影响面广。漏洞利用无需特殊权限，仅需目标系统对外开放 HTTP/HTTPS 服务；攻击复杂度低，危害等级严重。"
published = "0701"
remediation = "建议立即升级泛微E-cology9至厂商最新发布的月度安全补丁版本（如v10.57及以上），同时通过访问控制限制对 /api/bsh、/email/、/weaver/bsh/ 等敏感路径的非授权访问，并在 WAF 侧添加针对 Java 反序列化及命令执行的规则作为临时缓解措施。"
score = 5
severity = "MEDIUM"
