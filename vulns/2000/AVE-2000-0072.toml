[basic]
description = "Netscape Communicator 中的邮件通知工具 nsnotify 在使用 IMAP 协议连接邮件服务器时忽略用户已配置的 SSL 加密偏好，始终以明文方式传输认证凭据。位于同一网络的远程攻击者可实施中间人攻击或被动嗅探网络流量，捕获 IMAP 会话中的用户名和密码。该漏洞影响 Netscape Communicator 及 Navigator 系列浏览器，攻击条件低，危害中等，可能导致邮件账户被完全控制。"
published = "2000-01-12T05:00:00.000"
remediation = '该漏洞存在于已停止维护的 Netscape Communicator 中，官方未提供补丁。建议立即停止使用 Netscape Communicator 收发邮件，升级至支持强制 IMAPS（IMAP over SSL）的现代邮件客户端，如 Thunderbird、Outlook 或 Apple Mail，并在客户端设置中勾选"始终使用 SSL/TLS 连接"选项。如无法立即迁移，可在网络层面部署 VPN 隧道或将邮件服务器的 IMAP 端口（143）通过防火墙限制仅允许加密隧道流量，作为临时缓解措施。'
score = 5
severity = "MEDIUM"
sources = ["epss"]
