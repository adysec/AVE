[basic]
description = "Pine 邮件客户端 4.21 版本之前存在 shell 元字符过滤漏洞。远程攻击者可通过向用户发送包含恶意 URL 的邮件，当用户点击该 URL 时，Pine 未能正确过滤其中的 shell 元字符，导致攻击者可以在目标系统上以用户权限执行任意命令。该漏洞影响 Pine 4.21 之前的所有版本，无需身份认证即可触发，CVSS 评分 10.0，危害严重。"
published = "1999-11-18T05:00:00.000"
remediation = "升级至 Pine 4.21 或更高版本，该版本已修复 URL 中 shell 元字符的过滤逻辑。如无法升级，可禁用 Pine 的 URL 自动调用功能，或限制邮件客户端调用外部程序（如 web 浏览器）的权限，避免传递含特殊字符的 URL 给 shell 处理。"
score = 10
severity = "CRITICAL"
sources = ["cve"]
title = "University of Washington Pine URL 命令注入漏洞"
updated = "2026-06-16T21:51:32.313"

