[basic]
description = "泛微（Weaver）e-cology9 OA 系统存在 SQL 注入漏洞，问题位于 weaver/weaver.email.FileDownloadLocation 接口的 fileid 参数。该接口未对用户输入的 fileid 参数进行充分的类型校验与过滤，攻击者在 download=1&fileid= 参数中拼接如 -2 or 1=1 的恶意 SQL 片段即可改变原查询逻辑。未经验证的远程攻击者仅需构造特制 HTTP 请求即可发起攻击，无需身份认证，成功利用可读取、篡改后台数据库中的敏感数据（如用户凭证、业务信息），影响使用存在缺陷版本的所有泛微 e-cology9 OA 系统部署。"
published = "0726"
remediation = "建议立即升级至泛微 ecology9 OA 最新安全版本（建议升级至 V9.0.220825 或更新版本），并应用厂商发布的 SQL 注入补丁补丁包。如无法立即升级，建议在 WAF 层面配置 SQL 注入防护规则拦截含有 SQL 注入特征的请求，同时在防火墙层面限制 weaver/weaver.email.FileDownloadLocation 接口的外网访问权限，仅允许内网信任 IP 访问作为临时缓解措施。"
score = 5
