[basic]
description = "Linux 内核 ath11k 无线驱动中的 mhi 模块存在内存泄漏漏洞。在 ath11k_mhi_register() 函数中，mhi_alloc_controller() 分配的内存空间在 ath11k_mhi_read_addr_from_dt() 执行失败时未调用 mhi_free_controller() 释放，导致内存资源无法正确回收。本地攻击者可利用此漏洞通过持续触发特定错误路径消耗系统内存，造成拒绝服务。该漏洞影响 Linux 内核中使用了 ath11k 驱动的设备，CVSS 评分 5.5，危害等级中危。"
published = "2025-09-18T16:15:45.247"
remediation = '升级 Linux 内核到 5.19.17、6.0.3 或 6.1 以上版本即可修复。具体提交为 015ced9eb63b、43e7c3505ec7、72ef896e80b6，可执行 `git cherry-pick` 将这些补丁合入当前内核源码树。无法升级时，可通过禁止加载 ath11k 内核模块（`echo "blacklist ath11k" >> /etc/modprobe.d/blacklist.conf`）临时缓解。'
score = 5.5
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux kernel ath11k MHI 内存泄漏漏洞"
updated = "2026-06-17T05:23:30.527"

