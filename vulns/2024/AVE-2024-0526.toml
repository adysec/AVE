[basic]
description = "Python Requests 库存在 URL 解析缺陷，攻击者可通过构造恶意 URL 诱导用户访问，导致 .netrc 文件中存储的凭据被泄露给第三方。该漏洞影响 Requests 2.32.4 之前的所有版本，利用条件为攻击者需诱使用户通过 Requests 库访问特制 URL，且目标环境中存在 .netrc 凭据文件。成功利用可导致敏感凭据泄露，影响系统安全。建议升级至 2.32.4 及以上版本，或通过设置 trust_env=False 禁用 .netrc 加载以缓解风险。"
published = "2025-06-09T18:15:24.983"
remediation = "升级 Python Requests 库至 2.32.4 或更高版本（pip install --upgrade requests）。如无法立即升级，在创建 Session 时设置 trust_env=False 禁用 .netrc 自动加载，或在代码中移除 .netrc 文件依赖。"
score = 5.3
severity = "MEDIUM"
sources = ["msrc"]
title = "PSF Requests 凭据泄漏漏洞"
updated = "2026-06-17T07:56:30.697"

