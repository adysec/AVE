[basic]
description = "Pacific Software URL Live! 1.0 Web 服务器存在目录遍历漏洞，远程攻击者可通过向目标服务器发送包含 `..`（点点）序列的恶意 HTTP 请求，绕过路径限制读取服务器上的任意文件。该漏洞影响 URL Live! 1.0 版本，攻击者无需身份认证即可利用，可能导致敏感信息泄露，CVSS 评分 5.0，危害等级中危。"
published = "1999-10-28T04:00:00.000"
remediation = '该漏洞存在于已停止维护的 Pacific Software URL Live! 1.0 中，厂商已不再提供安全更新。建议立即迁移至受支持的 Web 服务器（如 Apache HTTP Server 2.4.x 或 Nginx 最新稳定版）。如无法迁移，可在反向代理或 WAF 层面添加规则拦截包含 `../` 或 `..\` 的 URL 请求路径，并禁用目录列表功能作为临时缓解措施。'
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Pacific Software URL Live! 1.0 目录遍历漏洞"
updated = "2026-06-16T21:49:19.300"

