[basic]
description = '微信 Android 版存在特殊字符会话消息处理缺陷，由于对消息中的 BEL 控制字符（0x07）渲染异常未做有效过滤，攻击者可通过向目标用户发送包含 \n\a（0x0a 0x07）的恶意消息触发该漏洞，导致微信客户端进程崩溃，造成拒绝服务。该漏洞影响微信 Android 版多个版本，攻击成本低，仅需发送一条特制消息即可触发，用户接收消息即受影响，且无需任何用户交互。'
published = "20260708"
remediation = "更新微信 Android 版至 8.0.47 及以上版本（该版本已修复特殊字符渲染异常导致的崩溃），在「设置-关于微信-检查新版本」中更新。如无法立即更新，可在微信「设置-通用-存储空间」中清理异常会话的缓存数据，避免打开包含可疑特殊字符的聊天窗口作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "腾讯微信 Android 版特殊字符消息拒绝服务漏洞"
updated = "20260708"

