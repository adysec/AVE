[basic]
description = "SGI IRIX 5.3 至 6.5.10 系统中，InPerson 套件的 inpview 程序在启动时会直接信任 PATH 环境变量来查找并执行 ttsession 程序，而未对其进行安全校验。本地已登录的低权限用户可通过在 PATH 中前置一个伪装的恶意 ttsession 程序（特洛伊木马）来诱使 inpview 以 root 权限执行该恶意程序，从而完成本地权限提升、获取 root 访问权限。该漏洞影响上述多个 IRIX 版本，攻击条件为攻击者需具备本地系统账户且可修改自身环境变量，利用方式即构造恶意 PATH 指向伪造的 ttsession 程序。"
published = "1997-05-07T04:00:00.000"
remediation = "升级到 SGI IRIX 6.5.11 或更高版本（已修复 inpview 对 PATH 的信任问题）。如暂时无法升级，可移除 inpview 的 setuid root 位（执行 chmod u-s /usr/IP32/bin/inpview 或对应路径），并限制普通用户对 InPerson 套件的访问权限；同时清理不可信用户可写目录、避免将其加入 PATH，以阻止构造伪造 ttsession 实现本地提权。"
score = 7.2
severity = "HIGH"
sources = ["exploitdb"]
