[basic]
description = "Inter7 vpopmail 的 vchkpw POP 认证组件存在缓冲区溢出漏洞，远程攻击者可通过向 POP3 服务发送超长用户名或密码参数触发该漏洞，导致缓冲区溢出，从而以 root 权限执行任意代码。该漏洞影响 vpopmail 3.4.11 及更早版本，利用复杂度低，危害等级严重。"
published = "2000-01-21T05:00:00.000"
remediation = "立即将 vpopmail 升级至 3.4.12 及以上版本，该版本已修复 vchkpw POP 认证模块中用户名/密码长度未校验导致的缓冲区溢出漏洞。如无法立即升级，可限制 POP3 服务的访问来源 IP，仅允许受信网段连接 110 端口作为临时缓解措施。"
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "Inter7 vpopmail（vchkpw）POP认证组件缓冲区溢出漏洞"
updated = "2026-06-16T21:50:58.910"

