[basic]
description = "Hughes Technologies Virtual DNS (VDNS) Server 1.0 存在拒绝服务漏洞。远程攻击者无需身份认证，只需连接到目标服务器监听的 6070 端口，发送任意数据后立即关闭连接，即可触发该漏洞，导致 VDNS 服务崩溃或停止响应，造成拒绝服务。该漏洞影响 VDNS 1.0 版本，CVSS 评分 5.0，危害等级中危。目前官方尚未发布补丁，建议通过防火墙限制对 6070 端口的访问以降低风险。"
published = "2001-08-22T04:00:00.000"
remediation = "建议立即升级到 Hughes Technologies VDNS Server 2.0 或更高版本（如果厂商已发布修复版本）；如产品已停止维护，应迁移至现代 DNS 服务器方案（如 BIND 9、PowerDNS、Unbound）。临时缓解措施：在防火墙上限制端口 6070 的入站访问，仅允许受信任 IP 地址连接；部署网络层连接速率限制，防止大量短连接耗尽服务资源。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Hughes Technologies VDNS Server 拒绝服务漏洞"
updated = "2026-06-16T21:54:34.413"

