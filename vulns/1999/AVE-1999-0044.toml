[basic]
description = "ISC BIND 4.9 及 8 版本中的 DNS 消息处理组件存在拒绝服务漏洞，远程攻击者无需身份认证即可向目标服务器发送特制的恶意 DNS 查询消息，利用消息解析过程中的缺陷触发服务崩溃，导致 DNS 服务不可用。该漏洞影响大量使用上述版本 BIND 的 DNS 服务器，攻击者通过发送精心构造的 DNS 请求报文即可实施攻击，无需复杂前置条件。"
published = "1998-04-08T04:00:00.000"
remediation = "升级至 BIND 8.2 或更高版本以修复 DNS 消息解析缺陷；BIND 4.9/8 系列已停止维护，建议迁移至 BIND 9.x 系列并升级到 ISC 发布的最新稳定版（如 9.18.x 或 9.20.x）。如暂无法升级，应在边界防火墙上限制外部 DNS 查询来源 IP 并启用递归查询访问控制列表以降低攻击面。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "ISC BIND 4.9/8 DNS Message 拒绝服务漏洞"
updated = "2026-06-16T21:47:20.340"

