[basic]
description = "MIT Kerberos 5 (krb5-1.2.6及更早版本)、KTH Kerberos 4 (eBones 1.2.1之前版本) 以及启用 Kerberos 4 支持的 KTH Kerberos 5 (Heimdal 0.5.1之前版本) 中的 kadm_ser_in 函数存在缓冲区溢出漏洞。该函数未正确验证请求的长度字段，导致未经身份认证的远程攻击者可发送特制的恶意请求，触发缓冲区溢出并在目标系统上执行任意代码。该漏洞影响 Kerberos 认证服务的核心管理守护进程，CVSS 评分 10.0 (AV:N/AC:L/Au:N/C:C/I:C/A:C)，危害等级为严重。攻击者无需认证即可远程利用，完全控制受影响系统。"
published = "2002-11-04T05:00:00.000"
remediation = "升级 MIT Kerberos 5 到 1.2.7 或更高版本，KTH Kerberos 4 升级到 1.2.2 或更高版本，KTH Kerberos 5 升级到 0.5.2 或更高版本。如无法立即升级，建议禁用 kadmind 服务并配置防火墙仅允许内部网络访问，禁用所有明文协议认证，并强制使用强密码策略。"
score = 10
severity = "CRITICAL"
sources = ["osv"]
title = "MIT KTH Kerberos 缓冲区溢出远程代码执行漏洞"
updated = "2026-06-16T21:58:59.010"

