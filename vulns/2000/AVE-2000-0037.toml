[basic]
description = "MacOS 9 系统在处理畸形数据包时存在 ICMP 放大攻击漏洞。攻击者向目标 Macintosh 系统发送特制的畸形数据报，系统会响应生成大量 ICMP 数据报，导致网络流量被放大，可被用作 DDoS 反射放大攻击的放大器。该漏洞允许远程攻击者利用目标系统放大攻击流量，对第三方网络造成拒绝服务影响，攻击条件低，无需认证即可实施。"
published = "1999-12-28T05:00:00.000"
remediation = "建议立即升级至 Mac OS X 或更高版本操作系统，MacOS 9 已停止安全支持且无法修复此设计缺陷。临时缓解措施可在网络边界防火墙或路由器上过滤入站畸形 ICMP 数据包，并限制 ICMP 速率以防止被用作放大攻击源。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Apple MacOS 9 ICMP 放大反射拒绝服务漏洞"
updated = "2026-06-16T21:50:52.757"

