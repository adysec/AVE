[basic]
description = "Allaire Spectra 1.0 配置向导（Configuration Wizard）存在拒绝服务漏洞，远程攻击者可通过向目标系统发送特制的 URL 请求，反复提交数据集合进行索引操作，导致服务器资源耗尽，无法响应正常服务请求。该漏洞无需身份认证即可触发，攻击门槛较低但仅造成服务不可用，不影响数据完整性。CVSS 评分 5.0，危害等级中等。"
published = "2000-01-04T05:00:00.000"
remediation = "建议将 Allaire Spectra 升级至 1.0.1 或更高版本，该版本修复了 Configuration Wizard 对重复提交请求的处理逻辑。如无法升级，应在 Web 服务器（如 IIS）层面限制对 /spectra/config/ 路径的访问，仅允许受信管理 IP 访问该目录，或移除 Configuration Wizard 组件以消除攻击面。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Allaire Spectra 1.0 Configuration Wizard 拒绝服务漏洞"
updated = "2026-06-16T21:50:54.023"

