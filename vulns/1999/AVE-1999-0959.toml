[basic]
description = "ColdFusion 的 HTTP Client 应用存在安全绕过漏洞，远程攻击者可通过向 mainframeset.cfm 应用提交目标页面参数，利用服务器端请求转发机制访问受限制的 Web 页面。由于该请求从服务器本地发起，访问控制机制无法有效拦截，导致攻击者能够绕过端口级别的访问限制，获取本应受保护的非授权资源。该漏洞影响 Adobe ColdFusion 相关版本，CVSS 评分 7.5，危害等级高。"
published = "1999-12-31T05:00:00.000"
remediation = "升级 ColdFusion Server 至官方修复版本（4.5.1 及以上），或移除/重命名 `mainframeset.cfm` 文件阻断代理请求路径。临时缓解措施为在 Web 服务器层（如 IIS）配置 URL 访问规则，禁止外部请求访问 `mainframeset.cfm`，并在防火墙规则中限制 ColdFusion 服务对外部内网端口的出站连接。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "Allaire ColdFusion HTTP Client 访问限制绕过漏洞"
updated = "2026-06-16T21:49:46.283"

