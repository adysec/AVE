[basic]
description = "Microsoft Windows NT 4.0 Terminal Server 存在身份认证绕过漏洞。当客户端在完成身份认证之前建立新连接时，服务器会执行额外的未授权处理操作，远程攻击者无需任何认证即可利用此缺陷向目标系统发送大量连接请求，消耗服务器资源，最终导致终端服务拒绝服务。该漏洞影响 Windows NT 4.0 Terminal Server 版本，CVSS 评分 5.0，危害等级中危。"
published = "1999-08-09T04:00:00.000"
remediation = "立即安装 Microsoft 安全公告 MS99-028 提供的补丁，该补丁强制终端服务器在建立连接前完成身份验证，从而阻止未认证的连接请求洪泛攻击。如无法安装补丁，可在防火墙层面过滤 TCP 端口 3389（RDP 默认端口），仅允许可信 IP 地址发起连接。由于 Windows NT 4.0 Terminal Server 已停止支持，建议升级到受支持的 Windows Server 版本。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Microsoft Windows NT 4.0 Terminal Server 拒绝服务漏洞"
updated = "2026-06-16T21:48:50.027"

