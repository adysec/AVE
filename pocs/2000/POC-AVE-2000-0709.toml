[info]
author = "ave"
description = "Red Hat Linux 6.2 的 Piranha 虚拟服务器软件包中，Web GUI 管理界面存在硬编码后门账户与密码漏洞。攻击者可通过使用预设的默认凭据登录管理后台，实现远程未经授权的系统命令执行。"
id = "POC-AVE-2000-0709"
name = "Red Hat Piranha Default Password Authentication Bypass"
severity = "high"
tags = ["ave-2000-0709"]
vuln_id = [
    "CVE-2000-0248",
    "AVE-2000-0709",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/cgi-bin/piranha"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["Login"]
