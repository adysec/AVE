"该漏洞为历史遗留问题，受影响系统应升级到 Sun 官方提供的安全补丁版本，或禁用 rpc.rquotad 服务（在 /etc/inetd.conf 中注释掉 rquotad 行并重启 inetd），以降低被远程利用的风险。"
