[basic]
description = "HP LaserJet 打印机 JetDirect 卡配置 TCP/IP 协议时存在安全绕过漏洞。远程攻击者可直接向目标打印机的 TCP 9099 和 9100 端口发送 PostScript 文档，绕过打印过滤器执行任意打印操作或获取敏感信息。该漏洞影响配置了 JetDirect 卡的 HP LaserJet 系列打印机，CVSS 评分 7.5，危害等级高危。"
published = "1997-10-04T04:00:00.000"
remediation = "建议升级 HP JetDirect 固件至最新版本（建议升级至 J.60.09 或更高版本），或在打印机管理界面禁用 TCP 端口 9099 和 9100 的原始打印功能。若无法升级固件，建议在网络防火墙或打印机访问控制列表中阻断外部访问 TCP 9099 和 9100 端口，仅允许受信任打印服务器 IP 访问。同时建议启用打印机的访问控制列表（ACL）功能，限制仅授权 IP 地址可提交打印任务。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
