[basic]
description = "Windows NT 4.0 存在空会话（Null Session）远程访问注册表的权限漏洞。未经身份认证的攻击者可通过 SMB 协议建立空会话连接，远程匿名访问目标系统的注册表，获取系统配置、用户账户信息、网络共享设置等敏感数据。该漏洞影响 Windows NT 4.0 所有 SP 版本，CVSS 评分 7.5，危害等级高。Microsoft 至今未完全移除该默认行为，需通过修改注册表或限制 IPC$ 访问进行缓解。"
published = "1997-01-01T05:00:00.000"
remediation = '升级到 Windows NT 4.0 Service Pack 6a，并设置注册表项 HKEY_LOCAL_MACHINE\SYSTEM\CurrentControlSet\Control\LSA 下的 RestrictAnonymous 值为 2，禁止空会话枚举 SAM 账号和共享。同时禁用 NetBIOS over TCP/IP，在防火墙层面阻止 137-139、445 端口的外部入站连接。'
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "Microsoft Windows NT 4.0 空会话远程注册表访问漏洞"
updated = "2026-06-16T21:48:38.693"

