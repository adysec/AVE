[basic]
description = "亿邮电子邮件系统多因子认证模块存在逻辑缺陷，未经充分身份验证的用户可在特定条件下绕过二次认证机制，直接获取受限邮箱账户的访问权限。该漏洞影响部署多因子认证功能的亿邮电子邮件系统，攻击者只需具备基本网络访问能力即可在不知晓完整凭证的情况下突破认证防线。攻击者通过构造特殊请求或利用认证流程中的时序缺陷，可绕过短信验证码、动态口令等多因子认证步骤，从而非法访问企业邮箱内的敏感邮件和数据。"
published = "0715"
remediation = '立即联系亿邮（北京亿中邮信息技术有限公司）技术支持获取认证逻辑缺陷修复补丁，升级至最新安全版本。如无法立即升级，在系统配置中临时关闭多因子认证模块的"免认证跳过"选项，并启用严格的服务端会话校验机制，确保每次请求均经过完整的认证令牌验证流程，禁止前端绕过后端校验。'
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "亿邮 电子邮件系统 多因子认证逻辑缺陷"
updated = "0715"

