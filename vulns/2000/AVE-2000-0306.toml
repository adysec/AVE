[basic]
description = "Red Hat Linux 系统在安装过程中使用基于 DES 算法的 crypt() 函数对初始账户密码进行加密存储，而非更安全的 MD5 算法。由于 DES 加密仅取密码前 8 个字符参与运算，导致弱密码防护与哈希碰撞风险。该漏洞影响安装时采用默认加密方式的 Red Hat Linux 发行版，本地或具备读取密码文件权限的攻击者可通过暴力破解或字典攻击轻易还原用户口令，进而提升权限或横向移动。利用方式通常为获取 /etc/shadow 或 /etc/passwd 后针对 DES 哈希进行离线破解。"
published = "2000-01-21T05:00:00.000"
remediation = "升级到 Red Hat Linux 6.2 及以上版本，安装 shadow-utils 与 pam 相关更新包（如从 Red Hat 安全公告获取的修复 RPM），并修改 /etc/pam.d/passwd 与系统认证配置，将密码加密方式由 crypt() 的 DES 改为 md5 或 sha512；同时使用 `authconfig --passalgo=md5` 重置加密算法，并对现有账户执行 `passwd` 强制重设密码以迁移哈希。临时缓解可将 /etc/login.defs 中 ENCRYPT_METHOD 设为 SHA512 并限制口令文件访问权限。"
score = 10
severity = "CRITICAL"
sources = ["cve"]
