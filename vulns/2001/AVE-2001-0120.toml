[basic]
description = "tinc 1.0pre3 及 1.0pre4 版本存在重放攻击漏洞。远程攻击者可通过嗅探网络流量并重放捕获的数据包，向用户会话中注入恶意数据，导致会话劫持或数据篡改。该漏洞利用方式简单，攻击者仅需具备网络监听能力即可实施攻击，无需认证。此漏洞影响 tinc VPN 早期预览版本，建议升级至更新版本修复。"
published = "2001-12-31T05:00:00.000"
remediation = "升级到 tinc 1.0pre5 或更高版本，该版本修复了数据包重放攻击问题。建议直接升级到最新的 tinc 1.1 稳定版，该版本使用全新协议并修复了所有已知安全弱点。如无法升级，可在 tinc 配置中启用 MACLength 选项并设置为完整 HMAC 长度以增强数据包认证强度。"
score = 5
severity = "MEDIUM"
sources = ["osv"]
title = "tinc VPN 重放攻击漏洞"
updated = "2026-06-16T21:56:23.890"

