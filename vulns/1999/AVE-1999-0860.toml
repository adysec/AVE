[basic]
description = "路由器或防火墙的包过滤规则未能正确处理异常的 IP 分片数据包，导致攻击者可通过发送特制的分片包绕过访问控制列表或入侵检测系统。该漏洞允许未经认证的远程攻击者绕过安全策略，可能导致信息泄露或服务不可用，影响运行各类开源路由软件及防火墙系统。CVSS 评分 7.5，危害等级高。"
published = "1999-01-01T05:00:00.000"
remediation = "在路由器或防火墙上启用分片包重组与深度检测功能，设置最小分片大小限制，丢弃异常的微小分片包。配置访问控制列表（ACL）对分片包进行精确过滤，防止攻击者利用分片绕过安全策略。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "OpenSource Router 分片数据包过滤绕过漏洞"
updated = "2026-06-16T21:48:41.290"

