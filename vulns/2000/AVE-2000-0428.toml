[basic]
description = "Microsoft SQL Server 7.0 混合模式认证功能存在敏感信息泄露漏洞。当 SQL Server 服务启动时，系统管理员 (sa) 账户的密码以明文形式记录在日志文件中，而该日志文件可被任意本地用户读取。攻击者获得系统本地访问权限后，可通过读取该日志文件获取 sa 账户密码，进而以数据库管理员身份登录 SQL Server，执行任意 SQL 命令或系统命令。该漏洞影响 Microsoft SQL Server 7.0 所有版本，CVSS 评分 2.1，危害等级低。"
published = "2000-05-30T04:00:00.000"
remediation = '升级到 Microsoft SQL Server 7.0 Service Pack 2 及以上版本，该补丁已修复 sa 密码明文记录问题。如无法升级，切换为 Windows 仅身份验证模式（不使用混合模式），并确保 SQL Server 安装日志目录（如 C:\MSSQL7\Log\）权限设置为仅允许管理员访问。'
score = 2.1
severity = "LOW"
sources = ["cve"]
title = "Microsoft SQL Server 7.0 sa账户明文密码存储漏洞"
updated = "2026-06-16T21:51:38.473"

