[basic]
description = "Trend Micro Interscan VirusWall for NT 的 SMTP 网关在处理 HELO 命令时存在缓冲区溢出漏洞。远程攻击者无需身份认证，可通过向目标系统的 25 号端口发送超长 HELO 命令触发缓冲区溢出，进而导致在受影响系统上执行任意代码。该漏洞影响 Interscan VirusWall 3.23 及 3.3 版本，CVSS 评分 7.5，危害等级高。"
published = "1999-11-07T05:00:00.000"
remediation = "立即升级至 Trend Micro 后续发布的 Interscan VirusWall 补丁版本（如 3.3x 以上），或迁移至 Trend Micro 当前支持的 InterScan Messaging Security 系列产品。如无法升级，可在网络边界 SMTP 网关上配置 HELO 命令长度限制（建议不超过 64 字节），并在防火墙上限制对 VirusWall SMTP 端口的来源 IP 为可信邮件服务器，作为临时缓解措施。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "Trend Micro Interscan VirusWall SMTP 网关 HELO 命令缓冲区溢出漏洞"
updated = "2026-06-16T21:50:38.173"

