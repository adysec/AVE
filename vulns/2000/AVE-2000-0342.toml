[basic]
description = "Cayman 3220-H DSL Router 的管理接口存在拒绝服务漏洞，远程攻击者无需身份认证即可通过向 HTTP 管理界面提交超长的用户名或密码字符串，触发路由器处理异常导致服务崩溃。该漏洞影响 Cayman 3220-H DSL Router 1.0 及 GatorSurf 5.3 等版本，CVSS 评分 5.0，危害等级中危。攻击者只需构造特制的 HTTP 请求即可实施攻击，利用门槛低，可导致路由器管理功能暂时不可用。"
published = "2000-05-17T04:00:00.000"
remediation = "该设备为 2000 年发布的已停产产品，厂商不再提供安全更新。建议将设备升级至支持安全认证的替代产品；如无法替换，可在路由器管理界面中限制管理端口仅允许内网可信 IP 访问，并在上游防火墙配置规则拦截对 TCP 80/443 端口的公网访问，同时设置合理的密码长度限制避免超长字符串触发 DoS。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Cayman 3220-H DSL Router 管理界面拒绝服务漏洞"
updated = "2026-06-16T21:51:40.330"

