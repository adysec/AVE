[basic]
description = "HP-UX 9.x 及 10.x 版本中集成的 X Window 系统环境下，vuefile、vuepad、dtfile 及 dtpad 等工具在调用时未对用户身份进行认证。本地攻击者可利用这些 setuid 程序以提升的权限执行操作，从而获取系统更高权限。攻击者需具备本地系统访问权限。"
published = "1997-09-01"
remediation = "升级 HP-UX 操作系统至 11.0 或更高版本。临时缓解措施：移除 vuefile、vuepad、dtfile、dtpad 的 setuid root 权限（执行 chmod u-s /usr/bin/vuefile /usr/bin/vuepad /usr/dt/bin/dtfile /usr/dt/bin/dtpad），并限制可执行这些程序的用户范围。"
score = 4.6
severity = "MEDIUM"
sources = [
    "cve",
    "avd",
]
title = "HP HP-UX X Window 工具权限提升漏洞"
updated = "2026-06-16"

