[basic]
description = "Netscape Communicator 4.06至4.61版本中存在缓冲区溢出漏洞，远程攻击者可通过向用户发送嵌有恶意EMBED标签的HTML页面，在pluginspage选项中构造超长字符串触发缓冲区溢出，导致拒绝服务或任意代码执行。该漏洞影响Netscape Communicator 4.x系列多个版本，攻击者需诱使用户访问特制网页，无需额外认证即可完成利用。"
published = "1999-09-02T04:00:00.000"
remediation = "升级 Netscape Communicator 至 4.7 及以上版本，该版本修复了通过 EMBED 标签 pluginspage 选项触发的缓冲区溢出漏洞。鉴于 Netscape 已停止维护，建议迁移至 Mozilla Firefox 或 Google Chrome 等现代浏览器。如无法升级，可在浏览器设置中禁用 Java/插件支持作为临时缓解措施。"
score = 5.1
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Netscape Communicator EMBED 标签缓冲区溢出漏洞"
updated = "2026-06-16T21:48:50.657"

