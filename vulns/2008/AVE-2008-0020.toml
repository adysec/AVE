[basic]
description = "Apache-SSL 在 apache_1.3.41+ssl_1.59 之前版本的 ExpandCert 函数未正确处理客户端证书 DN 中的 '/' 和 '=' 字符，远程攻击者可发送包含特殊字符的客户端证书主题，覆盖 Web 服务器使用的环境变量，导致内存泄露或 Web 应用潜在权限提升。影响 Apache-SSL 早于 apache_1.3.41+ssl_1.59 的版本，CVSS 7.5（高危），攻击者无需认证即可远程利用，升级至 apache_1.3.41+ssl_1.59 或更高版本可修复。"
published = "2008-04-04T00:44:00.000"
remediation = "建议立即升级 Apache-SSL 至 apache_1.3.41+ssl_1.59 或更高版本，可从官网 http://www.apache-ssl.org/ 下载最新源码包编译安装。若暂时无法升级，可在 Web 应用层增加证书 DN 字符过滤，拦截包含 '/' 和 '=' 等特殊字符的客户端证书主题字段，或在 Web 应用防火墙配置规则拦截异常证书请求作为临时缓解措施。"
score = 7.5
severity = "HIGH"
sources = ["tenable"]
title = "Apache Apache-SSL 权限提升漏洞"
updated = "2026-06-16T22:49:52.087"

