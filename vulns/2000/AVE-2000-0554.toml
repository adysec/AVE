[basic]
description = "ntop 的 Web 管理界面存在目录遍历漏洞，远程攻击者无需身份认证即可通过 `..`（点点）路径穿越攻击读取服务器上的任意文件。该漏洞影响 ntop 1.2 a7-9 版本，攻击者利用 Web 模式下的输入过滤缺陷构造恶意 URL，可越权访问 `/etc/passwd` 等敏感系统文件，导致信息泄露。"
published = "2000-10-20T04:00:00.000"
remediation = "升级 ntop 至 2.0 及以上版本，该漏洞在后续版本中已修复。如无法升级，应在防火墙或反向代理层面限制对 ntop web 管理界面的访问，仅允许可信 IP 连接，并禁用目录遍历所需的特殊字符序列。当前强烈建议迁移至 ntopng（ntop 现代版本）以获得持续安全更新。"
score = 5
severity = "MEDIUM"
sources = ["redhat"]
title = "Luca Deri ntop 目录遍历漏洞"
updated = "2026-06-16T21:52:18.493"

