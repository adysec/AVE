[basic]
description = "亿赛通电子文档安全管理系统UsersService接口存在Java反序列化漏洞，未经身份认证的远程攻击者可利用该漏洞向目标系统发送特制的序列化数据包，触发服务端反序列化操作，进而实现远程代码执行（RCE）。该漏洞影响亿赛通电子文档安全管理系统的多个版本，攻击者无需任何权限即可在目标服务器上执行任意命令，控制整个系统，危害严重。"
published = "0718"
remediation = "建议立即联系亿赛通（绿盟科技）获取并升级电子文档安全管理系统至官方发布的安全修复版本（对应补丁包版本请向厂商技术支持确认最新编号），升级前在应用服务器前端防火墙或 WAF 上临时封禁对 /UsersService 等 WebService 接口的外部访问，并禁用不必要的 SOAP/反序列化入口；同时收敛管理网段访问白名单，开启接口调用审计，避免未授权请求触发反序列化。升级完成后重启服务并验证接口正常。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "亿赛通 电子文档安全管理系统 反序列化远程代码执行漏洞"
updated = "0718"

