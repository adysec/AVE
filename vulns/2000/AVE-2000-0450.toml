[basic]
description = 'Microsoft Outlook 97/98/2000 及 Outlook Express 4.0/5.0 的邮件头解析组件存在缓冲区溢出漏洞。远程攻击者可通过向目标用户发送包含超长 Date 字段（GMT 域）的特制电子邮件，在解析邮件头时触发缓冲区溢出，导致任意代码执行。攻击者可在邮件中嵌入恶意载荷，用户只需在 Outlook 中预览或打开邮件即可触发，无需进一步交互。该漏洞又名"畸形邮件头"漏洞，影响多个早期 Outlook 版本。'
published = "2000-07-18T04:00:00.000"
remediation = "升级到 Microsoft Office 2000 SP3 或更高版本（Outlook 2002/XP 及之后版本已修复此漏洞），或安装 Microsoft 安全公告 MS00-043 对应的补丁。对于已停止支持的旧版 Outlook Express，建议升级到 Internet Explorer 5.01 SP4 或更高版本。作为临时缓解措施，可在邮件服务器或客户端配置邮件过滤规则，拦截包含异常长 Date 头的邮件。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Microsoft Outlook / Outlook Express 邮件头缓冲区溢出漏洞"
updated = "2026-06-16T21:52:00.813"

