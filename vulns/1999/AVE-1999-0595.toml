[basic]
description = "SuSE Linux 5.2 系统中的 lpc（行式打印机控制）程序存在缓冲区溢出漏洞，本地攻击者可通过向 lpc 程序发送特制的输入参数触发该溢出，从而获取 root 权限。该漏洞影响 SuSE Linux 5.2 版本，CVSS 评分 7.2，危害等级高。由于需要本地访问权限，攻击者须先拥有系统普通用户账户方可利用。"
published = "1999-02-02T05:00:00.000"
remediation = "升级 SuSE Linux 至 5.3 及以上版本，该版本已修复 lpc 程序缓冲区溢出漏洞。如无法升级，建议限制 lpc 可执行文件的 SUID 权限（chmod u-s /usr/sbin/lpc）以降低提权风险。"
score = 7.2
severity = "HIGH"
sources = ["epss"]
title = "S.u.S.E. Linux 5.2 lpc 缓冲区溢出本地权限提升漏洞"
updated = "2026-06-16T21:48:14.117"

