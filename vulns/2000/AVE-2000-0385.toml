[basic]
description = "BeOS 5.0 的 TCP 协议栈在处理分片数据包时存在缺陷，远程攻击者无需认证即可向目标主机发送特制的 TCP 分片报文，触发系统资源耗尽或协议栈崩溃，导致拒绝服务。该漏洞影响 BeOS 5.0 版本，CVSS 评分 5.0，危害等级中危。目前建议更新至最新补丁或采取访问控制措施。"
published = "2000-05-18T04:00:00.000"
remediation = "BeOS 5.0 已停止维护且不再有官方安全更新，根本解决方案是迁移至仍在支持期的操作系统（如 Linux 或 FreeBSD）。临时缓解措施：在网络边界防火墙上配置碎片包重组或丢弃规则，阻止分片 TCP 数据包到达 BeOS 主机；同时可在主机上使用第三方防火墙工具（如 ipfilter）过滤入站分片包。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Be BeOS 5.0 TCP分片拒绝服务漏洞"
updated = "2026-06-16T21:51:47.320"

