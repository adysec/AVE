[basic]
description = "网络入侵检测系统（IDS）在处理包含异常TCP序列号的数据包时存在逻辑缺陷，攻击者可通过向目标网络发送精心构造的异常序列号数据包绕过IDS的检测与重组机制，导致恶意流量无法被正确识别和告警。该漏洞影响多种主流IDS产品，攻击者无需认证即可远程实施绕过攻击，严重削弱网络安全监控与威胁检测的有效性。"
published = "1999-01-01T05:00:00.000"
remediation = "升级支持 TCP 流重组（stream reassembly）的入侵检测系统，如 Suricata、Zeek（原名 Bro），并启用 `stream.reassembly` 引擎；禁用纯包级检测的旧式 IDS（如 Snort 1.x 传统模式）。配置 IDS 确保 TCP 分片重组策略与受保护目标主机一致（如设置 `target-based` 策略），避免插包（insertion）和逃逸（evasion）攻击。定期更新检测规则集以覆盖已知逃逸技术。"
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "通用 网络入侵检测系统 TCP异常序列号绕过检测漏洞"
updated = "2026-06-16T21:48:42.620"

