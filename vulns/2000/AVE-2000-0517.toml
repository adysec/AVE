[basic]
description = "GAMSoft TelSrv 服务端软件存在缓冲区溢出漏洞，远程攻击者可通过向目标服务器的 telnet 服务发送超长用户名数据包，触发缓冲区溢出，导致服务崩溃拒绝服务，甚至可能执行任意代码。该漏洞影响 GAMSoft TelSrv 1.5 及更早版本，攻击者无需认证即可远程利用，危害较大。"
published = "2000-07-17T04:00:00.000"
remediation = "立即停止使用 GAMSoft TelSrv 1.5 及更早版本，因其厂商已停止维护且官方未发布补丁。建议迁移至现代 SSH 或安全 Telnet 服务器替代。如无法立即替换，在防火墙层面限制对 TCP 23 端口的访问来源，仅允许可信 IP 连接，以降低攻击面。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "GAMSoft TelSrv 远程缓冲区溢出漏洞"
updated = "2026-06-16T21:52:13.277"

