[basic]
description = "Microsoft Excel 在处理畸形记录对象时存在远程代码执行漏洞（Object Record Corruption Vulnerability）。攻击者可通过构造特制的 Excel 文件并诱使用户打开，触发内存破坏，从而在目标系统上以当前用户权限执行任意代码。该漏洞影响 Office 2000/XP/2003/2007/2008 for Mac、Excel Viewer 及 Office 兼容包等多个版本，CVSS 评分 7.8，危害等级高。用户无需额外交互即可被攻击，建议立即更新补丁。"
published = "2009-06-10T18:30:00.203"
remediation = "立即安装微软 2009 年 6 月安全公告 MS09-021 对应更新（Excel 2000 更新 KB969683、Excel 2002 更新 KB969682、Excel 2003 更新 KB969680、Excel 2007 更新 KB969679、Excel Viewer 更新 KB969686、Office for Mac 更新 KB969684/KB969685）。临时缓解措施：不要打开来源不明的 Excel 文件，使用 MOICE（Microsoft Office Isolated Conversion Environment）转换 Office 2003 格式文件以降低风险。"
score = 7.8
severity = "HIGH"
sources = ["kev"]
title = "Microsoft Excel 对象记录损坏远程代码执行漏洞"
updated = "2026-06-16T23:05:18.140"

