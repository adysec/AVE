[basic]
description = "Microsoft Index Server 2.0 存在 ASP 源码泄露漏洞。远程攻击者无需身份认证，只需向 null.htw 页面的 CiWebHitsFile 参数中附加 %20（URL 编码的空格字符），即可绕过服务器对 ASP 文件的解析机制，直接获取 ASP 文件的原始源代码。该漏洞导致 Web 应用中的数据库连接字符串、业务逻辑等敏感信息暴露，影响运行 Microsoft Index Server 2.0 的 Windows NT 4.0 系统。攻击者无需特殊权限，仅通过 HTTP GET 请求即可利用，危害等级中等。Microsoft 已在安全公告 MS00-006 中发布补丁修复此漏洞。"
published = "2000-03-31"
remediation = "建议安装 Microsoft 安全公告 MS00-006 提供的补丁，或升级至 Windows 2000 Service Pack 1 及以上版本。如无法升级，可在 IIS 管理器中移除 .ida/.idq 脚本映射作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Microsoft Index Server 2.0 ASP 源代码泄露漏洞"
updated = "2000-03-31"

