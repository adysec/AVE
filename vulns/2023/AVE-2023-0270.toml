[basic]
description = "绿盟（NSFOCUS）下一代防火墙存在任意文件上传漏洞，其文件上传接口未对上传文件的类型、路径及内容进行严格校验与身份认证。未经授权的远程攻击者可通过构造特制的 HTTP 上传请求，将恶意脚本或可执行文件上传至目标设备的 Web 目录，进而可能实现远程代码执行或获取设备控制权。该漏洞影响启用了相关上传功能且未修复的绿盟下一代防火墙设备，攻击条件为攻击者能够网络访问设备的管理或业务端口。建议受影响的用户及时升级固件并限制管理接口的访问来源。"
published = "08.14"
remediation = "建议立即将绿盟（NSFOCUS）下一代防火墙升级至厂商于 2023 年 8 月 14 日之后发布的最新固件版本，修复文件上传接口鉴权缺陷。临时缓解措施：在防火墙上限制管理口及上传接口的访问来源 IP，关闭不必要的文件上传功能，并通过 WAF 规则拦截对上传路径的非常规请求。"
score = 5
severity = "MEDIUM"
