[basic]
description = "Microsoft Internet Explorer 6 至 11 版本存在权限提升漏洞。远程攻击者可构造恶意网站，诱使用户通过 IE 浏览器访问该站点，从而在当前用户上下文中提升权限。该漏洞允许攻击者绕过 Internet Explorer 的安全区域保护机制，获取与当前用户相同的权限级别，进而执行任意代码或安装恶意程序。攻击成功的前提是用户必须点击恶意链接或访问被攻陷的网站。此漏洞已被 CISA 列入已知被利用漏洞目录（KEV），实际攻击中已被广泛利用。"
published = "2014-08-12T21:55:07.007"
remediation = '立即安装 Microsoft 2014 年 8 月安全更新 MS14-051（KB2976627），该更新通过为 Internet Explorer 添加额外的权限验证来修复此漏洞。可通过 Windows Update 自动获取更新，或从 Microsoft 下载中心手动下载安装。对于无法立即打补丁的系统，可在 Internet Explorer 中将 Internet 和本地 Intranet 安全区域设置为"高"，并禁用 Active 脚本执行作为临时缓解措施。该漏洞已被 CISA 列入已知被利用漏洞目录，建议优先修复。'
score = 8.8
severity = "HIGH"
sources = ["kev"]
title = "Microsoft Internet Explorer 权限提升漏洞"
updated = "2026-06-17T00:07:12.597"

