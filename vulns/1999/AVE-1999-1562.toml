[basic]
description = "Windows 2000 的 Internet 打印服务（IPP）ISAPI 扩展中存在缓冲区溢出漏洞。远程攻击者可通过 IIS 5.0 向目标系统发送特制的超长打印请求，触发缓冲区溢出，从而获得系统完全控制权限。该漏洞影响 Windows 2000 Server 系列，CVSS 评分 10.0，危害等级严重，且已有公开利用代码。"
published = "2001-06-27T04:00:00.000"
remediation = "立即安装 Microsoft 安全公告 MS01-023 对应的补丁程序，或升级至 Windows 2000 Service Pack 3 及以上版本。如无法安装补丁，可在 IIS 管理器中删除 .printer 脚本映射或禁用 Internet 打印服务作为临时缓解措施。"
score = 10
severity = "CRITICAL"
sources = ["exploitdb"]
title = "Microsoft Windows 2000 Internet 打印服务 ISAPI 扩展远程代码执行漏洞"
updated = "2026-06-16T21:53:56.810"

