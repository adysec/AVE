[basic]
description = "Windows NT 4.0 系统对可执行文件映像头的校验存在缺陷，攻击者可通过构造恶意的 PE 文件头，诱使用户执行该文件，触发系统内核解析异常，导致目标系统蓝屏崩溃，造成拒绝服务。该漏洞影响 Windows NT 4.0 版本，攻击者需要诱导用户运行特制程序，无法远程直接利用，CVSS 评分 7.8，危害等级高危。"
published = "1999-06-30T04:00:00.000"
remediation = "安装 Microsoft Windows NT 4.0 Service Pack 6a 或更高版本的安全更新，该更新修复了畸形文件映像头导致的拒绝服务问题。由于 Windows NT 4.0 已停止支持，建议升级到受支持的 Windows Server 版本。如无法升级，可在防火墙层面限制不可信程序执行权限作为临时缓解措施。"
score = 7.8
severity = "HIGH"
sources = ["epss"]
title = "Microsoft Windows NT 4.0 图像头处理拒绝服务漏洞"
updated = "2026-06-16T21:48:55.700"

