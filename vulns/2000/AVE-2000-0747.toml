[basic]
description = "Alabanza Control Panel 3.0 存在认证缺失漏洞，其 nsManager.cgi CGI 程序未对管理命令的访问进行密码验证，导致远程攻击者可直接向该 CGI 程序发送恶意请求来修改域名信息。攻击者无需任何身份凭证即可利用该漏洞，影响使用 Alabanza Control Panel 3.0 版本的服务器。CVSS 评分 7.5，危害等级高。"
published = "2000-12-11T05:00:00.000"
remediation = "立即联系 Alabanza 获取官方补丁，或升级至 Alabanza Control Panel 的最新安全版本。在 nsManager.cgi 中实施强制身份认证机制，限制该 CGI 仅允许授权管理员 IP 访问。如产品已停止维护，建议迁移至其他仍在安全更新的托管控制面板（如 cPanel、Plesk）以消除风险。"
score = 7.5
severity = "HIGH"
sources = ["exploitdb"]
title = "Alabanza Control Panel 3.0 管理命令认证绕过漏洞"
updated = "2026-06-16T21:52:59.573"

