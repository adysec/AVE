[basic]
description = "Windows NT 4.0 和 Windows 2000 的回收站机制存在权限处理漏洞。本地攻击者可在回收站目录（Recycler）中创建包含目标用户 SID 的子目录，从而读取或修改该用户的文件。该漏洞源于回收站子目录创建时未正确验证用户权限，攻击者需拥有本地系统访问权限方可利用，CVSS 评分 3.6，危害等级低。"
published = "2000-02-01T05:00:00.000"
remediation = '安装 Microsoft Security Bulletin MS00-007 提供的更新，或升级至 Windows NT 4.0 Service Pack 6 及以上版本。临时缓解措施可限制用户对回收站目录 %SystemDrive%\RECYCLER 的写入权限，仅允许系统账户和 Administrators 组访问。'
score = 3.6
severity = "LOW"
sources = ["epss"]
title = "Microsoft Windows NT 4.0 和 Windows 2000 回收站预创建文件夹权限漏洞"
updated = "2026-06-16T21:51:02.643"

