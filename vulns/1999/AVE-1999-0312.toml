[basic]
description = "Windows NT 4.0 系列系统的远程访问服务（RAS）客户端在解析电话簿条目时存在缓冲区溢出漏洞。攻击者可通过构造恶意的电话簿文件并诱使用户在 RAS 连接中打开该条目，触发溢出后可在目标系统上执行任意命令或造成拒绝服务。该漏洞影响 Windows NT 4.0 及 SP1 至 SP5 所有版本，攻击条件要求能够诱导用户导入或打开特制电话簿文件。Microsoft 已发布 MS99-030 安全公告对此漏洞进行修复，建议受影响用户下载并安装官方补丁。"
published = "1999-05-20T04:00:00.000"
remediation = "建议立即安装 Microsoft Windows NT 4.0 的 RAS Phonebook 漏洞安全补丁（Microsoft Security Bulletin MS99-020，对应补丁 Q194693）。如无法立即打补丁，可暂时停用 Remote Access Service (RAS) 服务，并限制普通用户对相关 .pbk 电话簿文件及 RAS 配置目录的写权限作为临时缓解措施。"
score = 4.6
severity = "MEDIUM"
sources = ["epss"]
title = "Microsoft Windows NT RAS Phonebook 缓冲区溢出漏洞"
updated = "2026-06-16T21:48:54.323"

