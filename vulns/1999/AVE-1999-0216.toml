[basic]
description = "BSD 系统的 profil(2) 系统调用存在设计缺陷，本地攻击者可通过结合性能剖析（profiling）机制与 execve 系统调用，修改程序运行时的内部数据空间。由于 profil 在进程调用 execve 后未正确清除或重置剖析缓冲区指针，恶意用户可利用该缺陷向特权程序的内存空间写入任意数据，从而实现本地权限提升。该漏洞影响 NetBSD 1.4、OpenBSD 2.5 及 Solaris 7.0 等操作系统，需要攻击者拥有本地登录权限方可利用，CVSS 评分 7.2，危害等级高危。"
published = "1999-08-09T04:00:00.000"
remediation = "升级到已修复该漏洞的 NetBSD 1.4.1 及以上版本、OpenBSD 2.6 及以上版本以及 Solaris 7 的相应内核补丁（如 Sun 发布的 Solaris 7 安全补丁簇）。如暂无法升级，可通过在 /etc/system 中限制或移除普通用户对 profil(2) 系统调用的访问权限，并收紧本地用户权限、启用内核安全加固（如 OpenBSD 的 securelevel）作为临时缓解措施。"
score = 7.2
severity = "HIGH"
sources = ["epss"]
