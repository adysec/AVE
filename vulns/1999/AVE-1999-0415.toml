[basic]
description = "Cisco 7xx 系列路由器 telnet 服务存在缓冲区溢出漏洞，远程攻击者无需认证即可向目标设备的 telnet 端口发送特制的超长请求，触发缓冲区溢出，可能导致拒绝服务或任意代码执行。该漏洞影响 Cisco 7xx 系列路由器，CVSS 评分 5.0，危害等级中危。厂商已发布固件更新修复此漏洞。"
published = "1997-12-15T05:00:00.000"
remediation = "升级 Cisco 7xx 系列路由器 IOS 至不受 1999 年 telnet 缓冲区溢出漏洞影响的版本（如 11.3 以上），或在全局配置模式下使用 `access-class` 限制 telnet 访问源地址，或禁用 telnet 服务改用 SSH 协议。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Cisco 7xx 路由器 Telnet 服务缓冲区溢出漏洞"
updated = "2026-06-16T21:47:57.653"

