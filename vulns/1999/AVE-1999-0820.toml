[basic]
description = "Unix/Linux 系统中关键文件或目录权限设置不当的安全问题。当 /etc/passwd、/etc/shadow 等系统关键文件或目录权限过于宽松（如全局可写）时，本地攻击者可利用不安全的权限配置读取敏感信息、修改系统文件或植入恶意代码，从而实现权限提升或完全控制系统。该漏洞源于未遵循最小权限原则进行配置，影响所有 Unix/Linux 衍生系统，攻击者只需本地访问权限即可利用，无需认证，危害严重。"
published = "1999-01-01T05:00:00.000"
remediation = "立即检查并修复系统关键文件和目录的权限：使用 `chmod 644 /etc/passwd /etc/group` 和 `chmod 600 /etc/shadow /etc/gshadow` 恢复标准权限。对 `/bin`、`/sbin`、`/usr/bin` 等目录使用 `chmod 755`。建议定期运行 `rpm -Va`（RPM 系）或 `debsums`（Debian 系）审计文件权限异常。同时排查是否存在被提权的后门账户或 SUID 异常文件（`find / -perm -4000`）。"
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "Unix 系统关键文件或目录权限配置不当漏洞"
updated = "2026-06-16T21:48:38.350"

