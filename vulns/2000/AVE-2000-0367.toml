[basic]
description = "Marty Bochane MDBms 0.9 数据库服务器的 xbx 组件存在缓冲区溢出漏洞，未经身份认证的远程攻击者可通过向服务发送超长字符串触发缓冲区溢出，进而在目标系统上执行任意命令。该漏洞影响 Marty Bochane MDBms 0.9 版本，CVSS 评分 7.5（HIGH），攻击向量为网络、攻击复杂度低、无需认证，可导致机密性、完整性、可用性部分受损。攻击者无需认证即可远程发送恶意数据包触发漏洞，获取服务器控制权。ExploitDB (EDB-19966) 等公开渠道已披露利用代码。"
published = "2000-05-24T04:00:00.000"
remediation = "建议立即停止使用 Marty Bochane MDBms 0.9 数据库服务，并迁移至现代维护中的数据库系统（如 MySQL、PostgreSQL 或 SQLite）。若必须保留服务，请在防火墙层面封禁其监听端口（默认 TCP 端口），仅允许受信任 IP 访问，并禁用 xbx 命令接口。由于厂商已停止维护且无官方补丁，建议尽快迁移替代为长期支持的数据库产品。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "Marty Bochane MDBms 0.9 缓冲区溢出漏洞"
updated = "2026-06-16T21:51:45.073"

