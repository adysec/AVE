[basic]
description = "Windows NT 系统未对可移动媒体驱动器（如软盘驱动器和光驱）实施访问限制，导致本地用户或通过网络访问的攻击者能够绕过预期的访问控制机制，直接读取或写入可移动介质上的数据。该缺陷属于访问控制不当类问题，攻击者无需授权即可访问软盘、光盘等介质上存储的敏感信息，可能造成机密数据泄露、数据篡改及完整性破坏。该漏洞影响所有 Windows NT 版本，CVSS v2 评分高达 10.0，机密性、完整性与可用性均受完全影响。"
published = "1999-01-01"
remediation = '通过组策略或安全模板配置 NT 系统的 AllocateFloppies 与 AllocateCDRoms 注册表项（位于 HKLM\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Winlogon），将可移动介质驱动器的访问权限限制为仅交互式登录用户，禁止其他用户访问；同时建议升级到受支持的现代 Windows 版本并启用严格的设备访问控制策略以彻底消除风险。'
score = 10.0
severity = "CRITICAL"
sources = ["cve"]
title = "Microsoft Windows NT 可移动介质访问控制不当漏洞"
updated = "2026-06-16"

