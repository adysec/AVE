[basic]
description = "xterm 的日志功能（logging option）存在竞争条件漏洞，本地攻击者可通过利用该竞争条件，在日志文件写入过程中篡改目标文件的符号链接或内容，从而实现向任意文件写入数据的目的。该漏洞影响使用 xterm 终端的类 Unix 系统，攻击者需具备本地登录权限或 shell 访问能力才能触发利用。成功利用可导致本地权限提升或对系统文件进行未授权修改，危害等级中等。建议升级 xterm 至最新版本，并在多用户环境中合理配置终端权限以降低风险。"
published = "1997-09-19T04:00:00.000"
remediation = "升级 xterm 至 Patch #131（2000/03/03 发布）或更高版本，该补丁将 creat_as() 函数中的 O_APPEND 替换为 O_EXCL，并在打开日志文件后增加所有权和写权限校验，从而消除日志选项中的竞争条件。如无法立即升级，可临时通过 X 资源文件将 xterm 的 logfile 选项设为禁用状态，或在终端启动参数中取消 -l 选项以关闭日志功能，避免本地用户利用竞争窗口篡改任意文件。"
score = 6.2
severity = "MEDIUM"
sources = ["avd"]
title = "X.Org xterm 日志选项竞争条件本地文件修改漏洞"
updated = "2026-06-16T21:49:25.353"

