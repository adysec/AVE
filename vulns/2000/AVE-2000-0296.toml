[basic]
description = "Sniffit 0.3.x 的 -L 日志记录选项存在缓冲区溢出漏洞，远程攻击者可通过向目标 Sniffit 服务发送特制的超长 MAIL FROM 邮件头触发该漏洞，导致缓冲区溢出，进而实现远程代码执行。攻击者无需身份认证即可利用此漏洞完全控制受影响系统。该漏洞影响 Sniffit 0.3.6 HIP 及 0.3.7 Beta 版本，CVSS 评分 10.0，危害等级严重。目前已有公开的 ExploitDB 利用代码（ID: 19888）。"
published = "2000-05-02T04:00:00.000"
remediation = "立即停止使用 Sniffit 0.3.x 系列版本，该软件已长期无人维护且无官方补丁。建议迁移至 Snort、tcpdump 或 Wireshark 等活跃维护的网络监控工具。如暂时无法替换，务必禁用 -L 日志记录选项（不使用 -L normmail 参数启动），并在防火墙层面限制 Sniffit 所在主机的 SMTP 端口（25）入站流量，降低远程触发风险。"
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "Brecht Claerhout Sniffit 日志记录缓冲区溢出漏洞"
updated = "2026-06-16T21:51:31.160"

