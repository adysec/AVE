[basic]
description = "安数云综合日志分析系统存在远程代码执行漏洞，攻击者可通过向系统的后台管理接口发送特制的 HTTP 请求，在未授权的情况下直接执行任意系统命令。该漏洞源于系统对用户输入的参数过滤不严，导致攻击者能够绕过身份认证机制，利用命令注入或反序列化等技术实现远程代码执行。成功利用此漏洞的攻击者可完全控制目标服务器，进而窃取敏感日志数据、植入后门或横向移动攻击内网其他主机。该漏洞影响安数云综合日志分析系统的多个版本，危害等级严重，建议用户尽快升级至最新修复版本。"
published = "0725"
remediation = "建议立即联系安数云厂商获取并升级综合日志分析系统至修复版本；若无法立即升级，可在安全设备上通过 ACL 或防火墙策略限制该系统管理端口（如 80/443/9000）的访问来源，仅允许受信任内网 IP 访问，并关闭不必要的对外服务接口作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "安数云综合日志分析系统远程代码执行漏洞"
