[basic]
description = "Kaseya Virtual System Administrator（VSA）存在开放重定向漏洞。攻击者可构造特制URL，通过未充分验证的用户输入参数将用户重定向至任意外部网站，进而实施钓鱼攻击窃取敏感信息。该漏洞影响Kaseya VSA 7.x至9.1系列多个版本，攻击复杂度中等，无需身份认证即可远程利用，CVSS评分4.3。厂商已在7.0.0.29、8.0.0.18、9.0.0.14及9.1.0.4版本中修复此漏洞。"
published = "2015-07-20T23:59:01.940"
remediation = "立即升级 Kaseya VSA 至以下修复版本：V7.x 升级至 7.0.0.29，R8.x 升级至 8.0.0.18，R9.0 升级至 9.0.0.14，R9.1 升级至 9.1.0.4。如无法立即升级，可在 Web 应用防火墙（WAF）或反向代理层配置规则，拦截包含可疑重定向参数的请求，并对所有外部跳转目标进行白名单校验。"
score = 4.3
severity = "MEDIUM"
sources = ["nuclei"]
title = "Kaseya Virtual System Administrator 开放重定向漏洞"
updated = "2026-06-17T00:24:53.237"

