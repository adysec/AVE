[basic]
description = "ToxSoft NextFTP 1.82 客户端存在远程缓冲区溢出漏洞。攻击者可通过向 FTP 服务器发送特制的 CWD（Change Working Directory）命令，在客户端解析响应时触发缓冲区溢出，导致拒绝服务或远程代码执行。该漏洞影响 NextFTP 1.82 及更早版本，攻击者需诱导用户连接恶意 FTP 服务器即可触发，无需额外认证。CVSS v2 评分 5.1，危害等级中危。"
published = "1999-08-03"
remediation = "该漏洞影响 ToxSoft NextFTP 1.82 及更早版本，厂商已停止维护且不再发布安全更新。建议立即停止使用 NextFTP，迁移至支持安全更新的替代 FTP 客户端（如 FileZilla、WinSCP）。如无法立即替换，可在防火墙层面限制仅允许受信 IP 访问 FTP 服务器，并在客户端侧禁用主动模式下的 CWD 命令预处理功能作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "ToxSoft NextFTP 1.82 远程缓冲区溢出漏洞"
updated = "1999-08-03"

