[basic]
description = "Netopia R9100 及 R 系列路由器 4.6.2 版本存在 SNMP 表访问控制缺陷，即使管理员已配置禁止修改 SNMP 表，已认证的本地用户仍可绕过限制修改 SNMP 配置。攻击者需拥有路由器本地访问权限，利用该漏洞可篡改 SNMP MIB 表项，导致设备配置信息泄露或网络管理异常。该漏洞 CVSS 评分 3.6，危害等级低，但暴露了路由器权限分离机制的不足。"
published = "2000-05-16T04:00:00.000"
remediation = "Netopia R9100/R-series 路由器已停止维护，官方不再提供固件更新。建议立即更换为受支持的现代路由器产品。如无法更换，可采取以下缓解措施：1) 在路由器管理界面禁用 SNMP 写操作（SNMP write community）；2) 在防火墙层面限制仅允许受信任管理 IP 访问路由器的 SNMP 端口（UDP 161/162）；3) 将 SNMP 设置为只读模式，禁止通过 SNMP 修改配置。"
score = 3.6
severity = "LOW"
sources = ["avd"]
title = "Netopia R系列路由器 SNMP表修改漏洞"
updated = "2026-06-16T21:51:35.633"

