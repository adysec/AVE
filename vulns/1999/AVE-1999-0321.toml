[basic]
description = "OpenBSD 的 procfs 和 fdescfs 文件系统在 readdir() 函数中处理 uio_offset 参数时存在缓冲区溢出漏洞。本地攻击者可利用精心构造的 uio_offset 值触发缓冲区越界写入，导致内核内存损坏，进而实现权限提升。该漏洞影响 OpenBSD 2.5 及更早版本，但 procfs 和 fdescfs 默认未启用。"
published = "1999-08-12"
remediation = "升级到 OpenBSD 2.6 或更高版本。对于 OpenBSD 2.5，应用 errata 002 补丁。建议在不必要时禁用 procfs 和 fdescfs 文件系统。"
score = 4.6
severity = "MEDIUM"
sources = ["cve"]
title = "OpenBSD procfs/fdescfs readdir 缓冲区溢出漏洞"
updated = "2026-06-16"

