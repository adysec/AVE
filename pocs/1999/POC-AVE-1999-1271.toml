[info]
author = "AVE"
description = "HP JetAdmin D.01.09 for Solaris 在 /tmp/jetadmin.log 写入日志时未检查符号链接。攻击者可创建指向任意文件的符号链接，导致以 JetAdmin 权限修改目标文件权限，实现本地权限提升。"
id = "POC-AVE-1999-1271"
name = "HP JetAdmin Symlink Attack PoC"
severity = "high"
tags = [
    "cve-1999-1433",
    "symlink",
    "privilege-escalation",
    "hp-jetadmin",
]
vuln_id = [
    "CVE-1999-1433",
    "AVE-1999-1271",
]

[poc]
logic = "any"

[[poc.requests]]
path = "/tmp/jetadmin.log"
protocol = "file"

[[poc.requests.matchers]]
expect = true
part = "body"
regex = ".+"
type = "regex"
