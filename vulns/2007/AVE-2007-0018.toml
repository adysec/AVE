[basic]
description = "这是一个针对 libpng（PNG 文件处理库）的整数溢出漏洞。某些 PNG 文件解析函数未能对图像数据中的特殊标记块进行充分验证。当攻击者发送包含恶意构造 pCAL、sCAL、tEXt、iTXt 和 ztXT 标记块的 PNG 文件时，这些块会触发存储缓冲区的越界读操作，导致程序崩溃并出现拒绝服务的情况。未经身份认证的远程攻击者无需任何权限即可通过这种方式触发漏洞，通过单一 crafted PNG 文件就能使目标系统陷入不可用状态。该漏洞影响 Windows/Linux 等平台上使用 libpng 1.0.28 及更早版本、1.2.20 及更早版本的应用程序，攻击者只需将其精心构造的 PNG 文件发送到目标系统即可成功利用此漏洞，导致目标服务瘫痪。"
published = "2007-10-08T21:17:00.000"
remediation = "升级 libpng 到安全版本（≥1.0.29 或 ≥1.2.21），这修复了所有受影响的 chunk handlers（pCAL、sCAL、tEXt、iTXt 和 ztXT）中的 out-of-bounds read 漏洞。然后更新 VMware ESX Server 到支持安全版 libpng 的版本；如果无法立即更新，建议在防火墙层面过滤 PNG 文件或禁用 VCB Command Line 服务，以防止通过 crafted PNG 文件触发的 DoS 攻击。"
score = 5
severity = "MEDIUM"
sources = ["tenable"]
title = "libpng PNG 图像文件处理库输入验证漏洞"
updated = "2026-06-16T22:45:47.097"

