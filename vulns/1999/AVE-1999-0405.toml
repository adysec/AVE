[basic]
description = "Livingston Portmaster 设备存在拒绝服务漏洞，远程攻击者无需认证即可通过向目标设备发送特制的命令序列，触发设备异常重启，导致正常服务中断。该漏洞影响 Livingston 公司生产的 Portmaster 系列远程接入服务器设备，攻击者可在网络上直接触发漏洞，无需用户交互或复杂前置条件，危害中等。"
published = "1995-10-01T04:00:00.000"
remediation = "立即升级 Livingston Portmaster 设备固件至 Lucent 收购后发布的最新版本，限制可通过 telnet/串口发送管理命令的源 IP 地址范围，在边界防火墙上封锁对设备管理端口的非授权访问。鉴于该产品已长期停止技术支持，建议尽快迁移至仍在安全更新周期内的现代远程接入设备。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Livingston Portmaster 拒绝服务漏洞"
