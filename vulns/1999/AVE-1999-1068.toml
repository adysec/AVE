[basic]
description = 'KVIrc IRC 客户端 0.9.0 版本中存在目录遍历漏洞。当启用 "Listen to !nick &lt;soundname&gt; requests" 选项时，远程攻击者可通过向目标客户端发送特制的 DCC GET 请求，在请求路径中包含 "../" 序列实现目录穿越，从而读取任意文件。该漏洞影响 KVIrc 0.9.0 版本，危害等级中等，可能泄露敏感系统文件。'
published = "1999-09-24T04:00:00.000"
remediation = "升级 KVIrc 至 0.9.1 及以上版本，该版本已修复目录遍历问题。如无法升级，请在设置中关闭「Listen to !nick <soundname> requests」选项，或通过防火墙限制 IRC 客户端的 DCC 入站连接（默认端口 6667-6669）以降低风险。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "KVIrc IRC客户端目录遍历读取任意文件漏洞"
updated = "2026-06-16T21:50:15.337"

