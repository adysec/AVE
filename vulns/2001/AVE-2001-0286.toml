[basic]
description = "Vixie Cron 3.0.1-56 及更早版本存在栈缓冲区溢出漏洞，由于处理用户名输入时未正确校验长度，本地攻击者可通过创建超长用户名（超过 20 字符）触发栈溢出，覆盖返回地址或函数指针，从而以 cron 守护进程权限（通常为 root）执行任意代码，实现本地提权。该漏洞影响所有运行受影响版本 Vixie Cron 的 Linux/Unix 系统，攻击条件为本地账户访问权限且能控制用户名长度，利用方式为构造超长用户名触发缓冲区溢出并劫持控制流执行 Shellcode。"
published = "2001-08-22T04:00:00.000"
remediation = "升级 vixie cron 到 6.0 及以上版本或更换为 modern cron 实现（如 systemd-cron、busybox-cron 等），以获取包含用户名长度验证修复的安全更新。如无法直接升级，可通过限制用户的 shell 环境和增强日志审计来缓解风险。"
score = 4.6
severity = "MEDIUM"
sources = ["redhat"]
title = "Vixie cron 缓冲区溢出漏洞"
updated = "2026-06-16T21:54:32.120"

