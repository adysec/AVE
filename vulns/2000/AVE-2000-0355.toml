[basic]
description = "MetaProducts Offline Explorer 1.2 及更早版本存在目录遍历漏洞，远程攻击者可通过在 URL 中添加 ../ 序列绕过路径限制，从而访问服务器上的任意文件。该漏洞源于程序未对用户输入的文件路径进行充分过滤，CVSS 评分 5.0，危害等级中等，影响 Offline Explorer 1.2 及以下版本。"
published = "2000-05-19T04:00:00.000"
remediation = "立即升级 Offline Explorer 至 1.3 或更高版本（当前最新为 8.x），低版本已不再受支持。如无法升级，在 Web 服务器或反向代理层面过滤 URL 中的 `../` 及 `..` 序列，阻止目录遍历攻击。同时限制 Offline Explorer 对本地文件系统的访问权限，以最小权限原则运行该程序。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "MetaProducts Offline Explorer 目录遍历漏洞"
updated = "2026-06-16T21:51:43.747"

