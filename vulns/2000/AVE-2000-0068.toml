[basic]
description = "WebTV 电子邮件客户端存在安全漏洞，远程攻击者可通过向用户发送特制的 HTML 邮件，在用户打开邮件时强制客户端在用户不知情的情况下自动发送电子邮件。该漏洞属于 CSRF/邮件伪造类型，攻击者无需身份认证即可利用，影响 WebTV 电子邮件客户端用户，CVSS 评分 5.0，中等危害。"
published = "2000-01-02T05:00:00.000"
remediation = "微软已针对 WebTV 电子邮件客户端发布安全更新修复了此 HTML 邮件自动发送漏洞。由于 WebTV/MSN TV 服务已于 2013 年 9 月 30 日正式停服，建议用户立即停止使用该服务，迁移至受支持的电子邮件客户端（如 Outlook、Thunderbird），同时在邮件客户端中禁用 HTML 邮件的自动脚本及外链资源加载功能，避免受到类似攻击。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "WebTV 电子邮件客户端信息泄露漏洞"
updated = "2026-06-16T21:50:57.770"

