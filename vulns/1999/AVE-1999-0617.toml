[basic]
description = "该漏洞源于Linux内核中syslogd系统的设计缺陷，攻击者可通过向目标系统发送大量连接请求来触发拒绝服务攻击。当系统同时处理大量日志请求时，服务器会耗尽内存、CPU或文件描述符资源，导致syslog服务崩溃或长时间不可用。该漏洞影响所有运行Linux并启用syslog服务的版本，攻击者无需认证即可实施攻击，通过简单的网络工具或脚本即可实现，危害范围广泛，对系统日志记录功能造成严重破坏，需要管理员及时重新启动服务以恢复正常运行。"
published = "1999-11-19T05:00:00.000"
remediation = "升级 Linux 内核至 2.2.13 及以上版本（该版本已修复 syslogd 处理大量连接时的拒绝服务问题）。如无法立即升级，可在 syslogd 配置中限制单一来源最大连接数，或通过防火墙/iptables 规则限制来自不可信网络的 syslog 连接数量作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Linux Kernel Syslog 服务因大量连接导致拒绝服务漏洞"
updated = "2026-06-16T21:49:08.923"

