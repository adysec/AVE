[basic]
description = "WebGlimpse 2.18.7 及更早版本中的 wgarcmin.cgi 脚本存在目录遍历漏洞。远程攻击者可通过向 DOC 参数传递包含 `..`（点点）序列的特制请求，利用路径回溯技术突破目录限制，读取服务器上任意文件，包括敏感配置文件、密码文件等。该漏洞无需身份认证即可利用，攻击复杂度低，CVSS 评分 5.0，危害等级中等。"
published = "2012-03-19T18:55:02.327"
remediation = "升级 WebGlimpse 至 2.19.0 或更高版本，该版本已修复 wgarcmin.cgi 中 DOC 参数的目录遍历漏洞。若厂商已停止维护，建议迁移至其他活跃维护的搜索工具（如 Apache Solr、Elasticsearch），并在 Web 服务器层配置输入过滤规则，拦截包含 `../` 等路径遍历特征的请求。同时确保 wgarcmin.cgi 脚本对 DOC 参数做路径规范化检查，拒绝非授权路径访问。"
score = 5
severity = "MEDIUM"
sources = ["nuclei"]
title = "WebGlimpse wgarcmin.cgi 目录遍历漏洞"
updated = "2026-06-16T23:15:06.623"

