[basic]
description = "百易云资产管理运营系统存在 SQL 注入漏洞，该系统在处理用户输入的查询参数时未对传入数据做充分的过滤与转义，攻击者可通过构造恶意的 SQL 语句拼接至后端数据库查询中，从而绕过业务校验并读取、篡改或删除数据库中的敏感数据。该漏洞影响百易云资产管理运营系统的相关受影响版本，攻击者无需身份认证即可通过发送特制的 HTTP 请求访问系统接口触发漏洞，利用方式主要是向存在缺陷的参数提交精心构造的 SQL  payload 实现非法数据获取，可能导致资产信息、系统配置等核心数据泄露，危害程度较高。"
published = "0719"
remediation = "建议立即升级百易云资产管理运营系统至厂商发布的最新修复版本，并联系厂商获取对应安全补丁。如无法立即升级，可在 Web 应用防火墙（WAF）或反向代理层对该系统的数据库查询接口加入 SQL 注入规则过滤，限制对疑似注入参数的访问，同时收紧数据库账户权限，避免使用高权限账户连接数据库作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "百易云资产管理运营系统 SQL注入漏洞"
updated = "0719"

