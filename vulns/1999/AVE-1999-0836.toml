[basic]
description = "ZyXEL Prestige 路由器管理接口存在访问控制缺陷，其 Web 或 Telnet 等配置服务默认允许来自任意主机的连接，未经授权的远程攻击者可直接访问管理控制台进行配置修改、信息窃取或权限提升。该漏洞影响多个 ZyXEL Prestige 系列路由器型号，CVSS 评分 10.0，危害等级严重。厂商建议通过限制管理接口访问来源 IP 或禁用远程管理功能进行缓解。"
published = "1999-01-01T05:00:00.000"
remediation = "登录路由器管理界面，在「远程管理」(Remote Management) 中将「Secured Client IP」设为仅信任的管理员地址，切勿设为 0.0.0.0；同时在防火墙 ACL 中限制仅允许指定管理 IP 访问 Web(80/443) 和 Telnet(23) 端口。如无需 WAN 侧管理，彻底关闭 WAN 远程管理功能，仅保留 LAN 侧访问；若设备固件版本过旧，建议升级至最新固件或更换支持 SSH/HTTPS 安全管理的现代设备。"
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "ZyXEL Prestige Router 管理接口未授权访问漏洞"
updated = "2026-06-16T21:48:39.527"

