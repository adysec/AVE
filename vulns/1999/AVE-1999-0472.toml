[basic]
description = "Sun Java Web Server 1.1 Beta 存在源代码泄露漏洞，远程攻击者无需身份认证即可通过直接访问 .jhtml 文件获取服务器端 CGI 程序的源代码。该漏洞源于服务器对 .jhtml 扩展名文件处理不当，未能正确解析执行而是以文本形式返回源码，导致敏感业务逻辑和配置信息暴露。利用方式简单，仅需向目标服务器发送 .jhtml 文件请求即可触发。该漏洞影响 Sun Java Web Server 1.1 Beta 版本，攻击者可进一步利用泄露的信息发现更多安全缺陷。"
published = "1999-01-01T05:00:00.000"
remediation = "升级至 Sun Java Web Server 1.1 正式版或更高版本（如 1.1.3），禁用 Beta 版本的 .jhtml 源码直接输出特性；在 server.xml 中配置 JSP 编译缓存并限制静态文件目录访问权限。如已停止维护，建议迁移至 Oracle iPlanet Web Server 7.0 或改用 Apache Tomcat。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "Sun Java Web Server 源代码泄露漏洞"
updated = "2026-06-16T21:48:04.117"

