[basic]
description = "SCO Unixware 7.1 的 i2odialogd 守护进程存在远程缓冲区溢出漏洞，未经身份认证的远程攻击者可通过向该服务发送超长的用户名/密码认证字符串触发缓冲区溢出，导致攻击者以 root 权限在目标系统上执行任意代码。该漏洞影响 SCO Unixware 7.1 版本，CVSS 评分 10.0，危害等级严重。攻击者无需任何认证即可远程利用，且利用代码已公开，现实威胁极高。"
published = "1999-12-21T05:00:00.000"
remediation = "立即停用 i2odialogd 守护进程并移除可执行权限：`chmod -x /usr/sbin/i2odialogd && killall i2odialogd`。在网关/防火墙上封锁该服务所监听的 TCP 端口（默认 447），阻止外部访问。由于 SCO Unixware 7.1 已终止支持且不再发布安全补丁，建议将业务迁移至受支持的现代操作系统（如 Oracle Solaris 11.4 或 Linux），或将服务隔离在无外网权限的独立安全区域中运行。"
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "SCO Unixware 7.1 i2odialogd 远程缓冲区溢出漏洞"
updated = "2026-06-16T21:50:50.967"

