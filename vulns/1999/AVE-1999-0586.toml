[basic]
description = "CA ControlIT 4.5 存在拒绝服务漏洞，本地或远程攻击者无需身份认证即可向目标系统发送恶意请求，导致 ControlIT 服务进程崩溃重启或强制用户注销登录，造成正常用户无法访问系统资源。该漏洞影响 CA ControlIT 4.5 版本，攻击复杂度较低，可导致目标系统服务不可用，危害等级中等。"
published = "1999-01-01T05:00:00.000"
remediation = "CA ControlIT 4.5 已停止技术支持多年，官方不再发布安全补丁。建议升级至 CA（现 Broadcom）当前支持的远程控制产品（如 CA Privileged Access Manager - Remote Access）。如无法升级，应在防火墙层面限制对 ControlIT 服务端口（默认 TCP 1499）的访问，仅允许可信 IP 地址连接，并停止使用该旧版产品进行生产环境远程管理。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "CA ControlIT 4.5 拒绝服务漏洞"
