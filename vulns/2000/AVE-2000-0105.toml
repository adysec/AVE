[basic]
description = "Allaire Spectra 1.0 远程访问服务模块中的 invoke.cfm 模板存在安全绕过漏洞。该模板在处理 bAuthenticated 认证参数时未进行严格校验，未经身份认证的远程攻击者可通过构造或篡改该参数值绕过身份验证机制，从而直接访问受限资源或执行未授权操作。该漏洞影响 Allaire Spectra 1.0 版本，攻击者可利用该漏洞在无需凭据的情况下获取系统访问权限，CVSS 评分为 7.5，危害等级为高。攻击条件为攻击者能够通过网络访问目标系统的远程访问服务接口，利用方式简单且无需交互，仅需发送包含篡改参数的 HTTP 请求即可实现认证绕过。"
published = "2000-01-01T05:00:00.000"
remediation = "立即安装 Allaire Spectra 安全补丁（修复 invoke.cfm 模板中 bAuthenticated 参数可被客户端伪造绕过认证的问题），或升级至 Spectra 1.1 及以上版本。如无法立即打补丁，可在 Web 服务器层面对 Remote Access Service 目录设置 IP 访问控制，仅允许可信内网地址访问 invoke.cfm 及相关管理模板，作为临时缓解措施。由于 Allaire Spectra 已被 Macromedia 收购且停止支持，长期建议迁移至受支持的替代平台。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
