[basic]
description = "Netscape Enterprise Server 及 FastTrack Server 存在缓冲区溢出漏洞，远程攻击者可通过向目标服务器发送超长 HTTP GET 请求触发该漏洞，导致缓冲区溢出，进而获取服务器控制权限。该漏洞影响 Netscape Enterprise Server 3.6 SP2 及 FastTrack Server 2.0.1 版本，CVSS 评分 7.5，危害等级高。厂商已停止维护，建议用户迁移至其他受支持的 Web 服务器产品。"
published = "2000-01-04T05:00:00.000"
remediation = "建议立即将 Netscape Enterprise Server 升级至 3.6 SP3 或更高版本，FastTrack Server 升级至 2.0.1 以上补丁版本；无法立即升级时，可在前端反向代理或防火墙处限制 HTTP 请求行长度（如不超过 2048 字节），并部署过滤规则阻断异常超长 GET 请求以缓解远程溢出风险。"
score = 7.5
severity = "HIGH"
sources = ["exploitdb"]
title = "Netscape Enterprise Server/FastTrack Server 缓冲区溢出漏洞"
updated = "2026-06-16T21:48:57.993"

