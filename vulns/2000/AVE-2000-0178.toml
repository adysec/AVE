[basic]
description = "Internet Explorer 5.x 的 window.showHelp() 方法未正确限制 HTML 帮助文件（.chm）的执行来源，远程攻击者可通过 Microsoft Networking 协议诱导用户访问恶意网页，从而在本地执行任意命令。该漏洞影响 Internet Explorer 5.x 系列版本，攻击者无需身份认证即可利用，危害较大。微软已发布安全公告并提供修复补丁。"
published = "2000-03-01T05:00:00.000"
remediation = '立即停止使用 Internet Explorer 5.x，升级至 Internet Explorer 6 或更高版本（该漏洞在 IE 6 中已修复）。如无法升级，可通过注册表禁用 showHelp 功能：将 HKEY_LOCAL_MACHINE\SOFTWARE\Microsoft\Internet Explorer\Main\FeatureControl\FEATURE_RESTRICT_ABOUT_PROTOCOL_IE7 设为 1。长期建议迁移至 Microsoft Edge 等现代浏览器。'
score = 5.1
severity = "MEDIUM"
sources = ["cve"]
title = "Microsoft Internet Explorer 远程代码执行漏洞"
updated = "2026-06-16T21:51:12.747"

