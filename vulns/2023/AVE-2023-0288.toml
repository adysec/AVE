[basic]
description = "多个厂商的运维安全审计系统存在未授权任意文件上传漏洞。该系统在处理文件上传功能时未对上传接口进行严格的身份认证与权限校验，也未对文件类型、路径及内容进行有效过滤。攻击者在无需登录或授权的情况下，可直接构造恶意请求向服务器上传任意文件（如包含恶意代码的 WebShell 脚本）。成功利用后，攻击者可借此在目标服务器上执行任意代码或命令，进而完全控制受影响的运维审计设备，造成敏感运维数据泄露及内网横向扩散。该漏洞影响部署相关运维安全审计系统的多个厂商设备，且利用条件简单，仅需网络可达上传接口即可发起攻击，危害程度较高。"
published = "08.08"
remediation = "立即升级受影响的运维安全审计系统至厂商 2023 年 8 月及之后发布的安全版本（如官方补丁包 20230808 及以上），并关闭文件上传接口的公网访问权限。在无法立即升级时，可在 Web 应用防火墙（WAF）中配置规则拦截对上传路径的未授权 POST 请求，并限制上传目录的执行权限为只读作为临时缓解措施。"
score = 5
severity = "MEDIUM"
