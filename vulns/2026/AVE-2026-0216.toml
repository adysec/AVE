[basic]
description = "宏景 eHR 系统的 designateTask.do 接口存在 SQL 注入漏洞，攻击者无需身份认证即可通过构造特制的 taskid 参数向后台数据库注入恶意 SQL 语句，可导致数据库敏感信息泄露、管理员权限被窃取甚至服务器被远程控制。该漏洞影响宏景 eHR 全版本，攻击条件低仅需目标系统开放 Web 服务即可远程利用，危害严重。官方建议通过参数化查询、接口鉴权及内网访问限制等方式修复。"
published = "nday"
remediation = "对 designateTask.do 接口的 taskid 参数改用预编译绑定变量方式替代拼接 SQL；在应用层添加该接口的身份认证校验，仅允许已授权用户访问；数据库层面回收 xp_cmdshell 等高危权限并限制该接口的数据库连接账户仅具备必要表操作权限；在 WAF 侧配置 SQL 注入特征规则拦截 taskid 参数的恶意载荷；将该接口限为内网 IP 段访问。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "宏景 eHR designateTask.do SQL注入漏洞"
updated = "nday"

