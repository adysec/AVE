[basic]
description = "WWWBoard 2.0 存在密码文件泄露漏洞，其将加密后的用户密码存储于 `passwd.txt` 文件中，且该文件位于 Web 根目录下，远程攻击者无需身份认证即可直接通过浏览器访问该文件路径，获取所有用户的加密密码哈希值。攻击者可进一步对获取的密码哈希进行离线破解，从而获得用户账户的实际明文密码，进而完全控制受影响账户。该漏洞影响 WWWBoard 2.0 版本，CVSS 评分 10.0，危害等级严重。"
published = "1999-09-16T04:00:00.000"
remediation = "将 passwd.txt 文件移出 Web 根目录（如移至 WWWBoard 上级目录），并在 WWWBoard 配置中更新密码文件路径。同时通过 .htaccess 或 Web 服务器配置禁止直接访问 *.txt 文件。建议升级至 WWWBoard 2.1 或更高版本，或迁移至其他仍受维护的论坛软件。"
score = 10
severity = "CRITICAL"
sources = ["exploitdb"]
title = "WWWBoard WWWBoard 2.0 密码文件远程读取漏洞"
updated = "2026-06-16T21:49:23.863"

