[basic]
description = "SOPlanning 1.32及更早版本中的file_get_contents函数存在路径遍历漏洞。远程攻击者无需认证即可通过在URL路径参数中注入`..`（点点）序列，遍历服务器目录结构，判断任意文件是否存在。该漏洞源于程序未对用户输入的路径参数进行充分过滤，导致攻击者可利用目录穿越技术访问Web根目录之外的文件系统。虽然该漏洞仅能确认文件存在性而无法直接读取文件内容，但可为后续攻击（如信息收集、漏洞定位）提供重要线索。影响所有运行SOPlanning 1.32及之前版本的系统。"
published = "2017-08-31T22:29:00.233"
remediation = "升级 SOPlanning 至 1.33 或更高版本（厂商已于 2014 年 9 月发布补丁）。如无法立即升级，可在 Web 服务器（Apache/Nginx）层面配置规则，阻止对 `/process/feries.php` 的 `fichier` 参数包含 `..` 路径遍历字符的请求，或在 PHP 配置中禁用 `allow_url_fopen` 并关闭 `display_errors` 以防止错误信息泄露文件路径。"
score = 5.3
severity = "MEDIUM"
sources = ["nuclei"]
title = "SOPlanning 路径遍历漏洞"
updated = "2026-06-17T00:17:08.480"

