[basic]
description = "华天动力 OA 8000 系统中 downloadfortrace.jsp 接口存在任意文件读取漏洞，由于未对 filePath 参数进行有效的访问控制和路径过滤，攻击者可在未授权状态下通过构造包含 `../` 等路径穿越字符的恶意请求读取服务器任意文件（如 Windows 系统下的 win.ini 配置文件），导致数据库连接信息、系统配置等敏感数据泄露。该漏洞利用难度低，无需认证即可远程触发，危害较大。"
published = "0702"
remediation = '升级华天动力OA8000至官方最新安全版本；如无法升级，在Web应用防火墙(WAF)或反向代理层添加规则，拦截对 `/OAapp/jsp/trace_eWebEditor/downloadfortrace.jsp` 的访问请求，并对 `filePath` 参数进行路径遍历关键字（如 `../`、`..\`、`/../`）过滤；同时限制应用服务器运行账户对敏感系统文件（如 `/etc/passwd`、`c:/windows/win.ini`）的读取权限。'
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "华天动力 OA8000 任意文件读取漏洞"
updated = "0702"

