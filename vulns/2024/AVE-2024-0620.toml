[basic]
description = "Linux 内核 ALSA 音序器 OSS 兼容层在处理 SysEx 系统专属消息时存在竞争条件漏洞。OSS 音序器将 SysEx 消息拆分为 6 字节数据包进行传输，ALSA 音序器 OSS 层在重组这些数据包时未对内部缓冲区的访问进行充分同步，导致多个并发操作可同时访问同一缓冲区，引发越界内存访问。本地攻击者可通过构造特制的 SysEx 消息序列触发竞争条件，利用该漏洞读取敏感内核内存信息或导致系统崩溃。该漏洞影响所有使用 ALSA OSS 兼容层的 Linux 内核版本，CVSS 评分 6.3，危害等级中危。Linux 内核社区已通过引入互斥锁序列化 SysEx 消息处理流程修复此问题。"
published = "2025-01-15T13:15:13.820"
remediation = "建议立即升级 Linux 内核至 6.12.8、6.11.11、6.6.70、6.1.123 或更高版本（含回补修复的 LTS 分支）。SLES 15 SP3 用户安装 SUSE-SU-2025:0517-1 补丁，SLES 15 SP5 用户安装 SUSE-SU-2025:0577-1 补丁，Ubuntu 24.04 LTS 用户安装 USN-7381-1 内核更新。如暂无法升级，可通过禁用 OSS sequencer 模块（modprobe -r snd-seq-oss）作为临时缓解措施。"
score = 6.3
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux Kernel ALSA OSS 音序器 SysEx 消息处理竞争条件漏洞"
updated = "2026-06-17T08:14:09.900"

