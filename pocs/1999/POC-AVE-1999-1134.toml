[info]
author = "AVE"
description = "Sudo 1.5 在执行目标文件时，若文件不存在返回与存在时不同的错误信息，本地用户可利用此差异探测任意文件是否存在"
id = "POC-AVE-1999-1134"
name = "Sudo 文件存在性信息泄露漏洞 PoC"
severity = "low"
tags = ["cve-1999-1496"]
vuln_id = [
    "CVE-1999-1496",
    "AVE-1999-1134",
]

[poc]
logic = "any"

[[poc.requests]]
path = "/etc/shadow"
protocol = "file"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["root:"]
