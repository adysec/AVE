[basic]
description = "Microsoft Windows Kerberos 密钥分发中心 (KDC) 存在校验和验证绕过漏洞 (MS14-068)。KDC 在验证 Kerberos 票据中的 PAC (Privilege Attribute Certificate) 校验和签名时存在逻辑缺陷，未正确验证签名完整性。已认证的域用户可伪造包含任意权限的 PAC，将其注入伪造的 TGT (Ticket Granting Ticket) 中请求服务票据，从而将普通域用户权限提升至域管理员权限。攻击条件：攻击者需拥有有效的域用户凭证，且目标域控制器运行未修补的 Windows Server 2003 SP2 至 2012 R2、Windows Vista SP2 至 8.1 等受影响版本。该漏洞影响面覆盖所有受支持的 Windows 服务器及客户端版本，属于域环境提权的经典高危漏洞，已被列入 CISA 已知被利用漏洞目录 (KEV)，在 2014 年 11 月即遭野外利用。Mimikatz、Kekeo、PyKEK、Impacket、Rubeus、CrackMapExec、Metasploit 等主流工具均集成利用模块，攻击门槛极低，危害极大。"
published = "2014-11-18T23:59:02.503"
remediation = "立即安装 Microsoft 发布的 MS14-068 安全更新 (KB3011780)，受影响系统包括 Windows Server 2003 SP2、Vista SP2、Server 2008 SP2/R2 SP1、Windows 7 SP1、Windows 8/8.1、Server 2012/R2。通过 Windows Update 自动更新或从 Microsoft Update Catalog 手动下载对应补丁包安装。若无法立即打补丁，临时缓解措施：严格限制域用户权限、监控异常 Kerberos TGS-REQ/TGS-REP 流量、启用 Kerberos ARMOR/FAST 加密、限制域控制器仅接受加密类型为 AES 的 Kerberos 请求。"
score = 8.8
severity = "HIGH"
sources = ["kev"]
title = "Microsoft Windows Kerberos KDC 权限提升漏洞"
updated = "2026-06-17T00:12:54.610"

