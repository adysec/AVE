[basic]
description = "MySQL 3.22版本存在密码认证绕过漏洞。该漏洞源于MySQL客户端/服务器通信协议中的握手校验机制缺陷，攻击者可通过发送不完整或过短的校验字符串（check string）绕过密码验证流程，直接建立与数据库服务器的连接并访问数据。未经身份认证的远程攻击者仅需向目标MySQL服务端口（默认3306）发送特制的认证包即可触发该漏洞，无需提供有效凭据即可获取数据库访问权限。该漏洞影响MySQL 3.22系列多个版本（包括3.22.26至3.22.30），CVSS 2.0评分7.5（高危），攻击复杂度低，可导致数据泄露、数据篡改及完整性破坏。由于MySQL 3.22已停止维护，建议用户升级至当前受支持的MySQL版本以消除此安全隐患。"
published = "2000-02-08T05:00:00.000"
remediation = "立即将 MySQL 升级至 3.23.1 及以上版本，该漏洞在 3.23 分支中已修复。如无法升级，可在 my.cnf 中设置 `--skip-grant-tables` 为禁用状态，并限制数据库端口（默认 3306）仅对可信 IP 开放，配合防火墙规则限制外部访问。长期建议升级至当前仍受支持的 MySQL 版本（如 5.7 或 8.0）。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "MySQL MySQL 3.22 密码认证绕过漏洞"
updated = "2026-06-16T21:51:06.007"

