[basic]
description = "Sun StarOffice 5.1 办公套件中的 StarScheduler 组件内置了 Web 服务器，默认以 root 权限运行在 801 端口。该服务器未对用户请求中的路径进行充分过滤，远程攻击者可通过向目标发送包含 ../ 序列的特制 HTTP 请求，绕过目录访问限制，读取服务器上的任意文件（如 /etc/shadow）。攻击无需身份认证，可导致系统敏感信息泄露。"
published = "2000-03-09"
remediation = "Sun StarOffice 5.1 已停止维护，建议立即升级至 StarOffice 6.0 或更高版本。如无法升级，可禁用 StarScheduler Web 服务器组件，或在反向代理或 WAF 层面过滤包含 ../ 的路径遍历攻击载荷，限制对敏感文件的访问。"
score = 5.0
severity = "MEDIUM"
sources = ["cve"]
title = "Sun StarOffice 5.1 StarScheduler Web服务器路径遍历漏洞"
updated = "2026-06-16"

