[basic]
description = "Solaris 7.0 和 8.0 系统中的 Xsun X 服务器存在缓冲区溢出漏洞。本地攻击者可通过向 Xsun 的 -dev 参数传递超长字符串触发缓冲区溢出，成功利用此漏洞可获得 root 权限。该漏洞影响 Solaris 7.0 及 8.0 版本，CVSS 评分 7.2，危害等级高。攻击者需拥有本地系统访问权限，无需身份认证即可实施攻击，完全控制目标系统。"
published = "2000-04-24T04:00:00.000"
remediation = "立即安装 Solaris 7 的 Xsun 补丁 106577-xx（或 Solaris 8 的 108652-xx），可从 Oracle 支持网站下载。如无法打补丁，限制本地用户对 Xsun 二进制文件的执行权限（chmod 750 /usr/openwin/bin/Xsun），并移除不必要的 SUID 位作为临时缓解措施。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "Sun Solaris Xsun 本地缓冲区溢出漏洞"
updated = "2026-06-16T21:51:30.407"

