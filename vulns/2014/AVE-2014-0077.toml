[basic]
description = "Linux 内核 drivers/tty/n_tty.c 文件中的 n_tty_write 函数在处理 LECHO 与 !OPOST 组合模式时存在条件竞争漏洞。当本地用户通过读写操作传入超长字符串时，由于 tty 驱动程序访问权限管理不当，可触发内存破坏，导致系统崩溃或权限提升。该漏洞影响 Linux 内核 3.14.3 及之前版本，攻击者需具备本地用户权限，利用公开的竞争条件利用程序（如 ExploitDB 33516）即可实现提权，危害较大。"
published = "2014-05-07T10:55:04.337"
remediation = "升级 Linux 内核至 3.15-rc4 或更高版本（commit 4291086b），该提交修复了 n_tty_write 函数在 LECHO & !OPOST 模式下的竞态条件问题。如无法升级内核，可通过限制本地用户对 PTY 设备的访问权限作为临时缓解措施，或使用 grsecurity/PaX 等内核加固补丁降低利用风险。"
score = 5.5
severity = "MEDIUM"
sources = ["kev"]
title = "Linux kernel n_tty 条件竞争本地提权漏洞"
updated = "2026-06-17T00:02:29.250"

