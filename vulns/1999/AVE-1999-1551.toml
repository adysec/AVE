[basic]
description = "IBM AIX 系统中 Navio NC 的 netstation.navio-com.rte 配置脚本存在安全配置错误漏洞。该脚本在安装时错误地将 /tmp 目录通过 NFS 导出为全局可读可写权限，导致任何能够访问 NFS 共享的本地或远程用户均可读取、修改或删除其他用户创建的临时文件。攻击者可利用该漏洞窃取敏感信息或通过篡改临时文件实现权限提升。CVSS 评分 5.0，危害等级中等。"
published = "1999-01-29T05:00:00.000"
remediation = "删除或注释 netstation.navio-com.rte 脚本中 NFS 导出 /tmp 的配置行；限制 /etc/exports 中 /tmp 的访问权限为特定客户端 IP；如不需要 Navio NC 功能则卸载 netstation.navio-com.rte 软件包。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "IBM AIX Navio NC netstation.navio-com.rte 不安全配置漏洞"
updated = "2026-06-16T21:50:41.320"

