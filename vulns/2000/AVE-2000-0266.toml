[basic]
description = "Solaris 2.6 及 7.0 系统中的 lpset 命令存在缓冲区溢出漏洞，本地攻击者可通过向 -r 选项提交超长参数触发缓冲区溢出，成功利用后可获取 root 权限。该漏洞影响 Solaris 2.6 与 7.0 版本，CVSS 评分 7.2，危害等级高。利用前提是攻击者拥有系统本地账户权限。"
published = "2000-04-24T04:00:00.000"
remediation = "建议升级至 Solaris 11.4 或迁移至受支持操作系统。如无法升级，可移除 lpset 的 setuid root 权限（chmod u-s /usr/bin/lpset），限制本地用户对 lp 命令的访问权限，并监控 /var/adm/messages 中 lpset 相关异常日志作为临时缓解措施。"
score = 7.2
severity = "HIGH"
sources = ["epss"]
title = "Sun Solaris lpset 本地缓冲区溢出漏洞"
updated = "2026-06-16T21:51:27.843"

