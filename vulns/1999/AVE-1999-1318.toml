[basic]
description = "Xylogics Annex 终端服务中的 ping CGI 程序存在缓冲区溢出漏洞。该服务在为终端用户提供网络诊断等功能的 Web 接口中，未能对 ping CGI 程序所接收的 query 参数长度进行合理校验。远程攻击者可在未经身份认证的情况下，向目标终端服务发送包含超长 query 参数的特制 HTTP 请求，使程序在处理该参数时发生缓冲区溢出，进而耗尽系统资源或导致服务进程异常崩溃，造成目标设备拒绝服务（DoS）。攻击仅需网络可达目标服务并构造恶意请求即可实施，无需本地访问或特权凭据，主要影响运行 Xylogics Annex 终端服务并启用该 CGI 接口的设备可用性。"
published = "1998-07-25T04:00:00.000"
remediation = "建议将 Xylogics Annex 终端服务固件升级至厂商发布的安全补丁版本，修复 ping CGI 程序中的缓冲区溢出缺陷。如暂无法升级，应在防火墙或网络层面禁用或限制对 ping CGI 程序的远程访问，避免外部攻击者通过超长 query 参数触发拒绝服务。同时检查 Annex 服务日志中是否存在异常的 ping CGI 请求记录，确认设备未受此漏洞影响。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Xylogics Annex 终端服务 ping CGI 程序缓冲区溢出拒绝服务漏洞"
