[basic]
description = "Internet Explorer 4.x 及 5.x 版本存在 SSL 证书验证漏洞，当用户在同一个浏览器会话中与同一服务器建立新的 SSL 连接时，浏览器未能正确重新验证服务器证书的有效性。攻击者可通过中间人攻击方式向用户展示伪造的 SSL 证书，绕过证书信任链校验，从而窃取加密通信中的敏感信息。该漏洞影响 Internet Explorer 4.x 及 5.x 版本，攻击复杂度低，需用户在同一会话中发起多次 SSL 连接即可触发。"
published = "2000-06-05T04:00:00.000"
remediation = "升级 Internet Explorer 至 5.5 或更高版本，该漏洞已在 IE 5.5 及后续版本中修复。对于仍使用 Windows 98/2000 的环境，建议安装 Microsoft 安全公告 MS00-034 提供的补丁；对于现代系统，应彻底弃用 IE 并迁移至 Microsoft Edge 或 Chrome 等支持完整 SSL 证书验证链的现代浏览器。"
score = 2.6
severity = "LOW"
sources = ["cve"]
title = "Microsoft Internet Explorer 4.x及5.x SSL证书验证漏洞"
updated = "2026-06-16T21:51:54.587"

