[basic]
description = "Platinum Policy Compliance Manager (PCM) 7.0 的 smaxagent.exe 组件存在缓冲区溢出漏洞，远程攻击者可通过向 Agent 服务端口（1827/TCP）发送超长字符串触发该漏洞，导致任意命令执行。攻击无需身份认证，可完全控制受影响系统，危害严重。受影响版本为 PCM 7.0，建议升级至最新版本修复。"
published = "1998-12-04T05:00:00.000"
remediation = "联系 Platinum（后被 Computer Associates 收购）获取官方热修复补丁，升级至修复后的 PCM 版本。如无法升级，在防火墙或主机层面屏蔽 TCP 端口 1827，阻止外部向 smaxagent.exe 服务发送数据，以降低远程利用风险。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "Platinum Policy Compliance Manager 缓冲区溢出远程代码执行漏洞"
updated = "2026-06-16T21:49:49.290"

