[basic]
description = "NAI VirusScan NT 4.0.2 在通过 FTP 更新病毒定义文件 scan.dat 时存在更新验证缺陷。当更新过程实际失败时，软件仍错误地报告更新成功，导致系统管理员误认为病毒库已正确更新至最新版本。攻击者可利用此漏洞通过中间人攻击或篡改 FTP 服务器响应，使目标系统无法获取最新的病毒定义，从而降低对恶意软件的检测能力，增加系统被感染的风险。该漏洞影响 NAI VirusScan NT 4.0.2，CVSS 评分 5.1，危害等级中危。"
published = "1999-05-05T04:00:00.000"
remediation = "升级至 Network Associates VirusScan NT 4.0.3a，该版本已修复此问题。升级前建议先卸载或禁用 4.0.2 版本以避免服务无法正常停止。临时缓解措施：手动停止 VirusScan 引擎进程，等待数秒后手动复制病毒定义文件至 VirusScan NT 目录。"
score = 5.1
severity = "MEDIUM"
sources = ["epss"]
title = "NAI VirusScan NT 病毒定义更新验证缺失漏洞"
updated = "2026-06-16T21:49:55.253"

