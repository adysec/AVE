[basic]
description = "Infonautics 的 getdoc.cgi 脚本存在安全绕过漏洞，远程攻击者通过修改表单变量（form variable）即可绕过文档访问的支付验证阶段，未经授权获取受限文档内容。该漏洞源于服务端未对用户提交的表单参数进行充分校验，攻击者无需认证即可利用，CVSS 评分 5.0，危害等级中危。"
published = "2000-04-12"
remediation = "在 getdoc.cgi 的服务端支付验证逻辑中增加会话状态校验，所有支付确认须在后端 session 中标记并通过签名校验防止篡改，禁止仅依赖前端表单变量判断支付状态。如该 CGI 组件已无维护且无替代版本，建议直接停用或替换为支持服务端支付校验的文档管理系统。"
score = 5.0
severity = "MEDIUM"
sources = ["cve"]
title = "Infonautics getdoc.cgi 安全绕过漏洞"
updated = "2026-06-16"

