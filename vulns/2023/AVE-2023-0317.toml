[basic]
description = "Secomea GateManager 的调试控制台存在未受保护的备用通道（Unprotected Alternate Channel）漏洞，CWE-420。具有管理员权限的攻击者可通过该备用通道获取敏感信息。该漏洞影响 GateManager 10.0 至 10.1 之前版本，攻击者需具备管理员权限且能网络访问目标系统，成功利用后可导致敏感信息泄露，进一步威胁系统安全。"
published = "2023-04-19"
remediation = "建议升级 GateManager 至 10.1 或更高版本，或应用补丁版本 10.0.622425017 及以上。如无法立即升级，应限制对调试控制台的管理员访问权限，仅允许受信 IP 访问，并审计所有管理员账户的访问行为。"
score = 4.9
severity = "MEDIUM"
sources = [
    "cve",
    "hwpoc",
]
title = "Secomea GateManager 调试控制台未受保护备用通道信息泄露漏洞"
