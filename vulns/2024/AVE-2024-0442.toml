[basic]
description = "大华 DSS 智能监控系统在处理 emap/group_saveGroup 接口时，未对 groupName 参数进行严格的输入校验与过滤，将其直接拼接进 SQL 查询语句，导致存在 SQL 注入漏洞。攻击者无需身份认证，仅需向目标设备发送特制的 GET 请求，在 groupName 参数中插入恶意 SQL 片段（如 ' and 2333=2333 and 'hami'='hami）即可触发注入。该漏洞影响部署大华 DSS 系统的相关设备，攻击者可借此读取或篡改后台数据库内容，甚至进一步获取系统权限，危害较大。"
published = "0812"
remediation = "建议立即升级大华DSS至厂商发布的最新安全版本（联系大华技术支持获取对应补丁包）；如无法立即升级，可在WAF中针对 /emap/group_saveGroup 接口的 groupName 参数添加SQL注入防护规则，并限制该接口仅允许受信任内网IP访问，同时关闭不必要的外部网络暴露作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "大华 DSS 智慧社区综合管理平台 group_saveGroup 接口 SQL 注入漏洞"
updated = "0812"

