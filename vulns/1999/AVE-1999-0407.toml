[basic]
description = "Cat Soft Serv-U FTP Server 2.5 存在缓冲区溢出漏洞，远程认证用户可通过向目标 FTP 服务器提交超长的 CWD（切换目录）或 LS（列出文件）命令触发该漏洞，导致服务崩溃，造成拒绝服务。该漏洞影响 Serv-U FTP Server 2.5 版本，CVSS 评分 7.8，危害等级高。攻击者只需拥有合法登录凭据即可利用，无需其他特殊权限，利用难度较低。"
published = "1997-07-01T04:00:00.000"
remediation = "升级 Serv-U FTP Server 至 2.5a 或更高版本，该版本已修复长 CWD/LS 命令导致的缓冲区溢出漏洞。对于无法升级的旧系统，可在 FTP 代理或防火墙层限制 FTP 命令长度不超过 256 字节，并限制可登录用户为受信 IP 段。同时考虑迁移至仍在维护的 FTP 服务器软件以获得持续安全更新。"
score = 7.8
severity = "HIGH"
sources = ["epss"]
title = "Cat Soft Serv-U FTP Server 缓冲区溢出漏洞"
updated = "2026-06-16T21:47:56.290"

