[basic]
description = "Hughes Technologies Mini SQL (mSQL) 2.0.11 的 w3-msql CGI 程序中存在缓冲区溢出漏洞，远程攻击者无需身份认证即可通过向目标系统发送特制的 HTTP 请求触发该漏洞，成功利用可导致在服务器上执行任意命令。该漏洞 CVSS 评分 10.0，危害等级严重，影响 mSQL 2.0.11 及更早版本。"
published = "1999-12-27T05:00:00.000"
remediation = "立即升级 mSQL 至 2.0.12 或更高版本，此版本已修复 w3-msql CGI 缓冲区溢出漏洞。如无法升级，在 Web 服务器配置中移除或禁用 w3-msql CGI 处理程序，并限制对 CGI 目录的访问权限。"
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "Hughes Technologies Mini SQL (mSQL) 2.0.11 w3-msql 远程缓冲区溢出漏洞"
updated = "2026-06-16T21:50:49.253"

