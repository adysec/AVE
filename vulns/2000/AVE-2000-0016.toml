[basic]
description = "WindowMaker 的 wmmon 监控工具在 FreeBSD 系统上存在权限提升漏洞。由于该程序在读取用户配置文件时未对 .wmmonrc 文件进行严格的权限检查，本地低权限攻击者可在自身家目录中构造恶意的 .wmmonrc 配置文件，其中注入需以较高权限执行的指令（如通过指定自定义命令参数）。当 wmmon 以 root 或其他高权限用户身份运行时加载该配置文件，即可执行攻击者预先注入的命令，从而获得系统提权。该漏洞影响 FreeBSD 上运行 WindowMaker 的 wmmon 1.0 b2 版本，CVSS 评分 7.2，危害等级高。攻击者需具备对目标系统的本地 shell 或基本访问权限方可利用此漏洞完成权限提升。"
published = "1999-12-22T05:00:00.000"
remediation = "删除或禁用 wmmon 程序，或升级 WindowMaker 至 0.96.0 及以上版本。如无法升级，应将用户主目录下 .wmmonrc 配置文件的权限设置为 600 或更高，仅允许所有者读写，防止本地恶意用户篡改配置提权。建议同时检查系统中是否存在旧版 wmmon 并彻底移除。"
score = 7.2
severity = "HIGH"
sources = ["cve"]
title = "Window Maker wmmon 本地权限提升漏洞"
updated = "2026-06-16T21:50:50.007"

