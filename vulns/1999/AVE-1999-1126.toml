[basic]
description = "Mandriva Linux Mandrake 6.0 及 GNOME Libraries 1.0.8 中的 espeaker 程序存在本地缓冲区溢出漏洞。攻击者通过向 nethack 等程序传递超长的 --espeaker 参数，触发栈缓冲区溢出，覆盖返回地址实现任意代码执行，从而将本地用户权限提升至 root 权限。该漏洞影响 Mandrake 6.0 及使用 GNOME Libraries 1.0.8 的 Linux 发行版，攻击者需具备本地账户访问权限，通过构造超长参数字符串触发栈溢出并劫持控制流获取 root 权限。CVSS 评分 7.2，属高危本地提权漏洞。"
published = "1999-09-23T04:00:00.000"
remediation = "建议立即升级 GNOME 库至 1.0.8 以上修补版本，或升级 Mandriva Linux Mandrake 至 6.1 及以上版本。若暂无法升级，可通过 `chmod u-s /usr/games/nethack` 移除 nethack 等易受攻击程序的 setuid 位，或限制本地用户执行权限作为临时缓解措施。建议访问 Mandriva 官方安全公告获取官方补丁包进行升级。"
score = 7.2
severity = "HIGH"
sources = ["exploitdb"]
