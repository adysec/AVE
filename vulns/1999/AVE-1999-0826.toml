[basic]
description = "Windows NT 系统中 SYSKEY 机制存在密钥流重用漏洞。SYSKEY 用于加密 SAM 数据库中的密码哈希，但由于其在加密过程中重复使用相同的密钥流，攻击者可通过分析多个加密后的密码哈希值，利用密钥流重用特性还原出明文密码。该漏洞影响 Windows NT 4.0 及更早版本，本地攻击者需具备系统访问权限，可通过暴力破解或差分分析手段获取用户凭据，导致系统账户安全受到威胁。"
published = "1999-12-16T05:00:00.000"
remediation = '该漏洞影响 Windows NT 4.0 及更早版本且无官方补丁。建议立即升级至 Windows Server 2003 或更高版本操作系统，并启用 Kerberos 认证替代 NTLM；对于仍在使用 NT 的环境，应使用 SYSKEY 的增强模式（Syskey.exe /E）强制使用密码保护，并在注册表 `HKEY_LOCAL_MACHINE\SYSTEM\CurrentControlSet\Control\Lsa` 中设置 `NoLMHash=1` 禁用 LM Hash 存储以降低风险。'
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Microsoft Windows NT SYSKEY 密码哈希加密密钥流重用漏洞"
updated = "2026-06-16T21:49:28.960"

