[basic]
description = "RealNetworks RealServer (rmserver) 6.0.3.353 版本将管理员密码以明文形式存储在 rmserver.cfg 配置文件中，且该文件权限设置为世界可读。本地攻击者可通过读取该配置文件获取明文密码，进而获得服务器管理权限。攻击条件为拥有本地系统访问权限。"
published = "1999-04-14"
remediation = "升级到不受影响的 RealServer 版本；将 rmserver.cfg 文件权限设置为仅管理员可读；避免在配置文件中以明文存储密码。"
score = 4.6
severity = "MEDIUM"
sources = ["cve"]
title = "RealNetworks RealServer 6.0.3.353 密码明文存储权限提升漏洞"
updated = "2024-06-16"

