[basic]
description = "Oracle 8.1.5 Connection Manager Control 组件中的 cmctl 程序存在缓冲区溢出漏洞。本地攻击者可通过提交超长的命令行参数触发缓冲区溢出，成功利用此漏洞可获取目标系统的更高权限（权限可提升至 oracle 用户）。该漏洞影响 Oracle 8.x 系列版本，攻击者需具有本地系统访问权限才能利用此漏洞。攻击者可通过控制参数长度覆盖栈上的返回地址，执行任意 shellcode。"
published = "2001-01-09T05:00:00.000Z"
remediation = "升级 Oracle 8.1.5 到支持版本（推荐 19c 或 21c），并移除 cmctl 程序的 setuid/setgid 权限位。此外，以 root 身份执行 `chmod -s $ORACLE_HOME/bin/cmctl` 可阻止普通用户通过此漏洞提升权限。"
score = 4.6
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Oracle 8.x Connection Manager Control cmctl 缓冲区溢出漏洞"
updated = "2026-06-16T21:53:19.630Z"

