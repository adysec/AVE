[basic]
description = "Solaris libc 库、ufsrestore 及 rcp 工具在处理 LC_MESSAGES 环境变量时存在缓冲区溢出漏洞。本地攻击者可通过设置超长 LC_MESSAGES 环境变量触发缓冲区溢出，从而以 root 权限执行任意代码。该漏洞影响 IBM AIX 4.2.1 及 Sun Solaris 7.0 等 Unix 系统，CVSS 评分 7.2，危害等级高。厂商已发布补丁修复该问题。"
published = "1999-09-08T04:00:00.000"
remediation = "对 Sun Solaris 7.0 系统，安装 Sun 安全补丁 107733-01 或更新版本；对 IBM AIX 4.2.1 系统，升级到 APAR IX89537 修复版本或安装对应 bos.rte.libc 补丁包。无法立即升级时，可通过在 /etc/environment 或 shell 启动脚本中过滤 LC_MESSAGES 环境变量（如 unset LC_MESSAGES）来缓解该缓冲区溢出风险。"
score = 7.2
severity = "HIGH"
sources = ["cve"]
title = "IBM AIX / Sun Solaris LC_MESSAGES 环境变量 libc 缓冲区溢出漏洞"
updated = "2026-06-16T21:49:00.953"

