[basic]
description = "Intel NetStructure 7110 和 7180 设备存在未记录的后门账户漏洞（servnow、root、wizard），其密码可通过设备的 MAC 地址推算得出，攻击难度极低。远程攻击者无需身份认证即可利用该漏洞获取设备的 root 级别访问权限，完全控制受影响设备。该漏洞 CVSS 评分 10.0，危害等级严重。"
published = "2000-05-08T04:00:00.000"
remediation = "立即登录 Intel NetStructure 7110/7180 管理界面，修改 servnow、root、wizard 这三个内置账户的默认密码（这些密码可从设备 MAC 地址推算），避免使用可预测的密码生成算法。如无法修改密码，应在网络边界防火墙配置访问控制规则（ACL），仅允许受信管理 IP 访问设备的 SSH/Telnet/Web 管理端口（默认 80/443/23），并关闭不必要的远程管理服务以降低暴露面。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "Intel NetStructure 7110/7180 未记录账户密码可被猜测漏洞"
updated = "2026-06-16T21:51:36.250"

