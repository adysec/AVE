[basic]
description = "Secure Locate（slocate）是一款用于文件索引和搜索的工具，其数据库文件解析功能存在缓冲区边界检查缺陷。本地攻击者可通过构造恶意的 slocate 数据库文件，在其中指定超出预期缓冲区范围的偏移值，导致内存越界访问，进而触发内存损坏。成功利用此漏洞的攻击者可获取 root 权限，实现本地权限提升。该漏洞影响 slocate 2.0 及更早版本，攻击者需拥有本地系统访问权限以加载特制数据库文件。"
published = "2001-02-16T05:00:00.000"
remediation = "升级 slocate 至 2.0 及以上版本，该版本修复了数据库文件解析中的缓冲区边界检查缺陷。如无法升级，可改用 GNU findutils 自带的 locate 命令替代 slocate，或限制不可信用户对 slocate 数据库文件的写入权限，仅允许 root 用户更新数据库。MandrakeSoft 已发布 MDKSA-2000:085 安全公告，Debian 也已发布相应安全更新。"
score = 7.2
severity = "HIGH"
sources = ["redhat"]
title = "GNU slocate 本地内存破坏漏洞"
updated = "2026-06-16T21:53:35.530"

