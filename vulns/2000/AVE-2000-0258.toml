[basic]
description = "LCDProc 0.4 版本中存在缓冲区溢出漏洞，远程攻击者无需身份认证即可通过向 LCDProc 服务发送特制的 screen_add 命令触发缓冲区溢出，从而获得目标系统的 root 权限。该漏洞影响 LCDProc 0.4 及更早版本，攻击者利用门槛较低，CVSS 评分 10.0，危害等级严重。厂商建议升级至最新版本以修复此漏洞。"
published = "2000-04-21T04:00:00.000"
remediation = "立即升级 LCDProc 至 0.4.1 或更高版本，该版本修复了 screen_add 命令处理中的缓冲区溢出漏洞。如无法升级，在防火墙层面限制 TCP 13666 端口的访问来源，仅允许受信任的主机连接 LCDProc 守护进程。同时避免以 root 权限运行 LCDProc 守护进程，使用专用低权限用户运行以降低提权至 root 的风险。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "LCDProc LCDproc 远程缓冲区溢出漏洞"
updated = "2026-06-16T21:51:25.167"

