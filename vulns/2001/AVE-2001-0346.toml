[basic]
description = "procmail 3.20 及更早版本在以 setuid root 权限运行时，其信号处理机制存在竞争条件漏洞。本地攻击者可在信号处理程序正在执行时发送特定信号，触发竞争条件导致内存破坏或权限提升，从而导致拒绝服务或获取 root 权限。该漏洞影响所有以 setuid root 方式运行 procmail 3.20 及更早版本的 Unix/Linux 系统，攻击者需具备本地账户权限并能精确控制信号发送时机才能利用。攻击者通过精心安排信号发送时机，在信号处理程序重入时破坏程序状态，实现权限提升或导致进程崩溃拒绝服务。"
published = "2001-10-18T04:00:00.000"
remediation = "升级 procmail 到 3.22 或更高版本（procmail 3.22 于 2001 年发布已修复该竞态条件）。Debian 用户可执行 `apt-get update && apt-get install procmail` 升级至 3.22-1 或更高版本；Red Hat 系列可用 `rpm -Uvh procmail-3.22-*.rpm` 升级。若无法立即升级，可临时移除 procmail 的 setuid 位：`chmod u-s /usr/bin/procmail` 作为临时缓解措施。建议尽快从官方源或 http://www.procmail.org/ 下载最新版本编译安装。"
score = 6.2
severity = "MEDIUM"
sources = ["redhat"]
title = "Procmail邮件处理工具信号处理竞态条件漏洞"
updated = "2026-06-16T21:55:11.907"

