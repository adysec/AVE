[basic]
description = "Microsoft Exchange Server 4.0/5.0 及 Alt-N MDaemon 等 NT 邮件服务器的 SMTP 服务存在缓冲区溢出漏洞。远程攻击者无需身份认证，通过向目标服务器发送超长参数的 HELO 命令，可触发缓冲区溢出，导致服务进程崩溃，造成拒绝服务。该漏洞利用方式简单，仅需构造特制 SMTP 数据包即可实施攻击，影响范围广泛。"
published = "1998-01-01T05:00:00.000"
remediation = "升级 Microsoft Exchange Server 至 5.5 或更高版本，该版本已修复 SMTP HELO 命令缓冲区溢出问题。对于 Alt-N MDaemon，升级至 2.72 或更高版本。如无法升级，在防火墙层面限制对 SMTP 端口（25/TCP）的访问来源，仅允许可信邮件服务器连接，并部署入侵检测规则拦截超长 HELO 参数。"
score = 7.5
severity = "HIGH"
sources = ["exploitdb"]
title = "Microsoft Exchange Server SMTP HELO 命令缓冲区溢出漏洞"
updated = "2026-06-16T21:48:04.237"

