[basic]
description = "WebRamp M3 路由器存在访问控制绕过漏洞，即使用户在管理界面中明确禁用了远程 telnet 和 HTTP 访问功能，设备仍会继续响应来自外部的 telnet 和 HTTP 连接请求。该漏洞源于访问控制逻辑实现存在缺陷，未正确应用用户配置的禁用规则。攻击条件为攻击者能够通过网络访问该路由器的管理端口（如 23 端口 telnet 和 80 端口 HTTP）。未经身份认证的远程攻击者可通过 telnet 或 HTTP 直接登录路由器管理界面，获取设备管理员权限，进而篡改路由配置、监控网络流量或进一步渗透内部网络。该漏洞影响所有未及时修复的 WebRamp M3 设备，CVSS 评分 7.5，危害等级高。"
published = "1999-01-21T05:00:00.000"
remediation = "WebRamp M3 路由器已停止技术支持，建议立即更换为支持现代安全标准的设备。如无法更换，可在上游防火墙或路由器上配置 ACL，仅允许受信任的内部 IP 访问路由器的 telnet（23/TCP）和 HTTP（80/TCP）端口，并禁止来自外网的所有管理访问。同时检查设备配置，确认已关闭不必要的远程管理服务。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "WebRamp M3 路由器远程访问控制绕过漏洞"
updated = "2026-06-16T21:50:04.060"

