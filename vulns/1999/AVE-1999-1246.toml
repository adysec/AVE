[basic]
description = "Solaris 操作系统的可插拔认证模块（PAM）存在缓冲区溢出漏洞。当用户通过 passwd、yppasswd、nispasswd 等程序修改密码时，会调用存在缺陷的 PAM 模块进行认证处理，由于对输入数据长度缺乏充分校验，本地攻击者可构造特制的认证请求触发缓冲区溢出，从而获得 root 权限。该漏洞影响 Solaris 2.3/2.4/2.5/2.5.1 等多个版本，CVSS 评分 7.2，危害等级高。官方建议安装 Sun 提供的安全补丁或升级系统。"
published = "1997-05-13T04:00:00.000"
remediation = "升级 Solaris 系统至 2.6 及以上版本，该版本已修复 PAM 模块和 unix_scheme 的缓冲区溢出漏洞。如无法升级，可限制本地用户对 passwd/yppasswd/nispasswd 的 SUID 执行权限（chmod 4750 /bin/passwd），并安装 Sun 官方补丁 ID 103670-03（SPARC）或 103671-03（x86）。"
score = 7.2
severity = "HIGH"
sources = ["epss"]
title = "Sun Solaris PAM 模块缓冲区溢出漏洞"
updated = "2026-06-16T21:49:50.657"

