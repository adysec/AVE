[info]
author = "ave"
description = "验证 Apache 2.0 至 2.035 版本中 ap_log_rerror 函数是否在 CGI 错误响应中泄露服务器绝对路径。通过请求一个触发 CGI 错误的路径，检查响应中是否包含文件系统路径信息。"
id = "POC-AVE-2002-0105"
name = "Apache HTTP Server 2.0.x ap_log_rerror Path Disclosure PoC"
severity = "medium"
tags = ["ave-2002-0105"]
vuln_id = [
    "CVE-2002-1592",
    "AVE-2002-0105",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/cgi-bin/test.cgi"
protocol = "http"

[[poc.requests.matchers]]
expect = true
status = [500]
type = "status"
