[basic]
description = "华盛顿大学 c-client 库（被 pine 等邮件客户端使用）存在缓冲区溢出漏洞，远程未认证攻击者可发送超长的 X-Keywords 邮件头触发栈溢出，进而在受害者机器上以当前用户权限执行任意代码。该漏洞影响所有使用受影响版本 c-client 库的邮件客户端（如 pine、alpine 等），CVSS 7.5 分（AV:N/AC:L/Au:N/C:P/I:P/A:P），攻击者只需发送一封包含超长 X-Keywords 头的恶意邮件即可触发，无需用户交互即可实现远程代码执行。"
published = "2000-11-14T05:00:00.000"
remediation = "建议升级 pine 和 alpine 邮件客户端至 2000 年 11 月后发布的版本（pine 4.44 及以上、alpine 0.999 及以上），或升级 UW c-client 库至 2000 年 11 月 14 日后发布的版本（c-client 2000c 及以上）。若无法立即升级，可在邮件服务器/防火墙层面配置规则拦截或截断超长 X-Keywords 头部（建议限制长度 ≤ 1024 字节）作为临时缓解措施，并建议迁移至维护中的现代邮件客户端（如 mutt、Thunderbird 等）。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "University of Washington pine IMAP 缓冲区溢出远程代码执行漏洞"
updated = "2026-06-16T21:52:35.527"

