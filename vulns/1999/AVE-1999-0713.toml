[basic]
description = "Pacific Software URL Live! 1.0 Web 服务器存在目录遍历漏洞，攻击者可通过在 HTTP 请求路径中插入 .. (dot dot) 路径遍历序列，绕过目录访问限制读取服务器上的任意文件。该漏洞无需身份认证，远程攻击者只需向目标发送包含特制路径的请求即可利用，可能导致敏感配置文件、源代码或系统文件泄露。受影响版本为 URL Live! 1.0，建议升级至安全版本或采取严格的目录访问控制措施。"
published = "1999-10-28T04:00:00.000"
remediation = '建议升级到 Pacific Software URL Live! 1.0 之后的修复版本（联系厂商获取补丁），或替换使用已修复的 Web 服务器软件。临时缓解措施：在 Web 服务器前部署反向代理/过滤层，拦截所有包含 "../" 与 ".." 序列及编码变体（如 "..%2f"、".%2e"）的请求路径，并限制服务器进程对系统目录的文件读取权限。'
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Pacific Software URL Live! 目录遍历漏洞"
updated = "2026-06-16T21:49:19.300"

