[basic]
description = "chargen（字符生成）服务是一种过时的网络诊断协议，默认监听 TCP/UDP 19 端口，在接收到连接请求后会持续输出大量字符数据。攻击者可通过伪造源 IP 地址向目标系统的 UDP chargen 服务发送小数据包，利用服务放大响应流量实施分布式拒绝服务（DDoS）攻击。此外，该服务无需认证即可访问，可能导致信息泄露和服务滥用。该问题属于安全配置缺陷，影响 Unix/Linux 及部分 Windows 系统中默认启用 inetd 的版本。修复措施为在 inetd 配置中禁用 chargen 服务（注释掉 /etc/inetd.conf 中相关行）或使用防火墙阻止外部对 19 端口的访问。"
published = "1999-01-01T05:00:00.000"
remediation = '在 Unix/Linux 系统中，编辑 /etc/inetd.conf 文件，注释或删除 chargen 相关行（如 chargen stream tcp nowait root internal），然后重启 inetd 服务（`kill -HUP <inetd_pid>`）。在 Windows 系统中，通过「服务」管理器禁用 "Simple TCP/IP Services" 或 "Character Generator" 服务。该服务为过时诊断协议，无业务依赖时应彻底禁用，防止被用于 UDP/TCP 反射放大攻击。'
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Unix Chargen 服务反射放大拒绝服务漏洞"
updated = "2026-06-16T21:48:46.383"

