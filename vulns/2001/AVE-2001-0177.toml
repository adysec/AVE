[basic]
description = "Trend Micro Interscan VirusWall for Linux 3.0.1 远程管理服务的多个 CGI 程序存在缓冲区溢出漏洞。远程攻击者无需身份认证即可通过网络向受影响 CGI 程序发送特制请求触发缓冲区溢出，从而以服务进程权限执行任意命令。该漏洞 CVSS 评分 10.0，危害等级严重，影响所有运行 Trend Micro Interscan VirusWall 3.0.1 的 Linux 系统。目前已存在公开的 Exploit-DB 利用代码，攻击者可轻易实施远程代码执行攻击。"
published = "2001-07-02T04:00:00.000"
remediation = "立即升级 Trend Micro Interscan VirusWall 至 3.0.1 以上已修复版本；如无法升级，在防火墙上严格限制 TCP 端口 1812 的访问来源 IP，仅允许受信任的管理员地址连接远程管理服务，并移除或禁用 /cgi-bin/ 目录下 catinfo 等 CGI 程序。由于该产品已停止维护，建议迁移至 Trend Micro 当前支持的网关防病毒产品。"
score = 10
severity = "CRITICAL"
sources = ["exploitdb"]
title = "Trend Micro Interscan VirusWall 远程管理服务 CGI 程序缓冲区溢出漏洞"
updated = "2026-06-16T21:54:17.930"

