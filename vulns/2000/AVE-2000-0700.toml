[basic]
description = "SuSE Linux 自带的 IMAP 服务器存在身份认证绕过漏洞，远程攻击者无需有效凭据即可绕过 IMAP 认证机制，直接获取服务器上的用户权限。该漏洞影响 SuSE Linux 系统中默认安装的 IMAP 服务组件，攻击者可通过向目标服务器的 IMAP 端口发送特制的认证请求数据包触发该漏洞，CVSS 评分 10.0，危害等级严重。建议用户及时升级 IMAP 服务程序或部署访问控制策略以降低风险。"
published = "2000-03-15T05:00:00.000"
remediation = "立即应用 SuSE 2000 年 3 月安全公告提供的 imapd 更新包，升级 imapd 至修复后的版本。由于 SuSE Linux 6.x 已停止维护，建议迁移至当前受支持的 SUSE Linux Enterprise 或 openSUSE Leap 发行版，并确保 imap 服务不与公网直接连接，同时在防火墙层面限制对 143 端口的访问作为临时缓解措施。"
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "SuSE Linux IMAP 服务器认证绕过漏洞"
updated = "2026-06-16T21:51:17.033"

