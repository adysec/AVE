[info]
author = "ave"
description = "检测目标 IIS 服务器 newdsn.exe CGI 脚本文件覆盖漏洞"
id = "POC-AVE-1999-0374"
name = "CVE-1999-0191 IIS newdsn.exe File Overwrite"
severity = "medium"
tags = [
    "cve-1999-0191",
    "iis",
    "cgi",
]
vuln_id = [
    "CVE-1999-0191",
    "AVE-1999-0374",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/scripts/tools/newdsn.exe"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "newdsn",
    "ODBC",
    "Data Source",
]
