[basic]
description = 'IrfanView32 3.07 及更早版本在处理特制的 Photoshop 图像文件时存在缓冲区溢出漏洞。攻击者可通过在图像文件头中 "8BPS" 标识符后附加超长字符串触发该漏洞，成功利用可在目标系统上执行任意命令。攻击者需诱使用户使用受影响版本打开恶意构造的 .PSD 图像文件，从而实现远程代码执行。该漏洞 CVSS 评分 7.5，危害等级高。'
published = "1999-11-09T05:00:00.000"
remediation = "立即升级 IrfanView 至 3.08 或更高版本（当前最新为 4.75）。该漏洞在 3.07 及更早版本中存在，后续版本已修复 Photoshop 文件头解析时的缓冲区溢出问题。如无法升级，避免使用 IrfanView 打开来源不明的 .psd/.psp 图像文件，并考虑使用其他图像查看软件作为替代。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "IrfanView IrfanView32 图片文件缓冲区溢出漏洞"
updated = "2026-06-16T21:49:44.740"

