[basic]
description = "Axent Raptor Firewall 6.0 存在 IP 选项零长度拒绝服务漏洞。远程攻击者可通过向受影响的防火墙系统发送特制的零长度 IP 选项数据包，导致防火墙服务崩溃或无法响应正常请求。该漏洞影响 Axent Raptor Firewall 6.0 版本，攻击者无需认证即可远程触发，危害等级中危。厂商已发布安全更新修复此问题。"
published = "1999-10-21T04:00:00.000"
remediation = "升级 Axent Raptor Firewall 至 6.0 以上版本，或安装厂商发布的安全补丁。如无法升级，可在防火墙配置中启用 IP 选项过滤规则，丢弃包含零长度 IP 选项的异常数据包。考虑到 Axent 已被 Symantec 收购且产品已停止维护，建议迁移至仍在安全支持周期内的替代防火墙产品。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Axent Raptor Firewall 6.0 IP选项零长度处理拒绝服务漏洞"
updated = "2026-06-16T21:49:18.040"

