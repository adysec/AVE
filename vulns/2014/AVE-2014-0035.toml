[basic]
description = "webEdition CMS 6.3.9.0 Beta 之前版本中的 showTempFile.php 文件存在目录遍历漏洞。经过身份认证的远程攻击者可通过向 file 参数传递 `../` 等路径遍历序列，绕过路径限制读取服务器上的任意文件，导致敏感信息泄露。该漏洞影响 webEdition CMS 6.3.9.0 Beta 之前的所有版本，攻击复杂度低，无需特殊权限即可利用。"
published = "2014-11-06T18:55:06.187"
remediation = "立即升级 webEdition CMS 至 6.3.9.0 Beta 或更高版本，该版本已修复 showTempFile.php 中 file 参数未正确过滤目录遍历序列的问题。如无法立即升级，可在 Web 服务器（如 Apache/Nginx）层面配置访问规则，限制对 /webEdition/showTempFile.php 的访问仅允许受信 IP，或添加 WAF 规则拦截包含 ../ 的请求作为临时缓解措施。"
score = 4
severity = "MEDIUM"
sources = ["nuclei"]
title = "webEdition webEdition CMS 目录遍历漏洞"
updated = "2026-06-17T00:11:17.340"

