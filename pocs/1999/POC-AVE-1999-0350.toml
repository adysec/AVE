[info]
author = "ave"
description = "验证本地用户在 KDE K-Mail 临时目录中是否可通过符号链接劫持 K-Mail 创建的临时文件。通过在临时目录预先创建指向敏感文件的符号链接，诱导以更高权限运行的 K-Mail 写入或覆盖目标文件，从而复现权限提升条件。本 PoC 仅做安全无损检测，不实际执行覆盖。"
id = "POC-AVE-1999-0350"
name = "CVE-1999-0735 KDE K-Mail 符号链接攻击 PoC"
severity = "medium"
tags = ["ave-1999-0350"]
vuln_id = [
    "CVE-1999-0735",
    "AVE-1999-0350",
]

[poc]
logic = "all"

[[poc.requests]]
path = "/etc/passwd"
protocol = "file"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["root:"]
