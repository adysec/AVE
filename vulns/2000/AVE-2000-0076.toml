[basic]
description = "BSD make 程序在 -j 选项下存在符号链接攻击漏洞，本地用户可通过精心构建的符号链接在并行执行过程中非法修改关键文件。该漏洞影响所有使用 BSD make 构建工具的 Unix 系统，导致权限提升和文件破坏。攻击者需具备本地访问权限并触发并行构建作业方可利用此漏洞，已确认对系统完整性和可用性构成严重威胁。"
published = "2000-01-19T05:00:00.000"
remediation = "升级 FreeBSD 系统至 2000-01-16 之后的版本，或应用 FreeBSD-SA-00:01 补丁：以 root 执行 `cd /usr/src/usr.bin/make && patch < /path/to/patch/file && make all && make install`，将临时文件创建方式从静态文件名改为 mkstemp() 安全随机生成。临时缓解措施：避免使用 `make -j` 并行编译选项。"
score = 6.2
severity = "MEDIUM"
