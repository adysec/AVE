[basic]
description = "Shadow Op Software 公司开发的 Dragon Server 1.0/2.0 中的 Telnet 服务存在拒绝服务漏洞。远程攻击者可通过向目标服务器发送超长用户名字符串，触发服务端处理异常，导致 Dragon Telnet Server 崩溃或停止响应，造成拒绝服务。该漏洞无需身份认证即可利用，攻击门槛较低，影响 Dragon Server 1.0 及 2.0 版本。"
published = "2000-06-16T04:00:00.000"
remediation = "由于 Shadow Op Software 已停止维护且无官方补丁，建议立即升级到不受影响的最新版本（如有），或在网络边界防火墙/IPS 上添加规则过滤超长 telnet 用户名（限制 username 字段不超过128字符），缓解 DoS 攻击。彻底解决方案为停用已过时的 Dragon Telnet Server，迁移至 OpenSSH 并关闭 telnet 端口（23/TCP）。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Shadow Op Software Dragon Server 远程拒绝服务漏洞"
updated = "2026-06-16T21:51:49.493"

