[basic]
description = "Texas Imperial Software WFTPD 2.41 及 WFTPD Pro 2.41 存在拒绝服务漏洞。攻击者可通过先发送 RENAME TO（RNTO）命令再发送 RENAME FROM（RNFR）命令触发协议处理异常，导致 FTP 服务崩溃。该漏洞源于程序对命令序列的错误处理，未正确校验 RNTO 执行前是否已执行 RNFR。利用该漏洞需具备本地系统访问权限，攻击条件较为受限，但一旦成功将造成 FTP 服务不可用，影响文件传输功能正常运作。"
published = "2000-07-11T04:00:00.000"
remediation = "立即将 WFTPD 升级至 2.41 以上版本（如 3.00+），该版本已修复 RNTO 命令在 RNFR 之前执行导致的崩溃问题。由于 Texas Imperial Software 已停止更新维护，建议迁移至其他活跃维护的 FTP 服务器软件（如 FileZilla Server、vsftpd 等）。若暂时无法迁移，可在防火墙和主机层面限制 FTP 服务的访问来源 IP，仅允许受信任的用户连接，并配置 FTP 服务器的超时和连接限制参数以降低 DoS 影响。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Texas Imperial Software WFTPD 2.4.1 拒绝服务漏洞"
updated = "2026-06-16T21:52:11.140"

