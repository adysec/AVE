[basic]
description = "Digital UNIX 4.0B 打补丁包 5 的 xterm 存在本地任意文件写入漏洞。当 xterm 在 DISPLAY 环境变量设置为无法访问的显示设备时被调用，会创建核心转储文件，本地攻击者可通过符号链接攻击该核心转储文件覆盖系统任意文件。攻击者需具备本地访问权限且能控制 DISPLAY 环境变量，利用符号链接将核心转储重定向至敏感文件路径实现任意文件覆盖，CVSS 评分 7.2，属高危本地权限提升漏洞。影响 Digital UNIX 4.0B 补丁包 5 版本的 xterm 组件。"
published = "1997-11-12T05:00:00.000"
remediation = "建议立即移除 /usr/bin/X11/xterm 的 setuid root 权限（chmod u-s /usr/bin/X11/xterm），并引导用户改用 dxterm 作为替代终端。Digital UNIX 4.0B 补丁包 5 引入的 xterm 替换版本存在该缺陷，卸载补丁包 5 或回滚至未打补丁的 xterm 版本可彻底修复。如无法立即回滚，设置核心转储目录限制（ulimit -c 0 或配置 core_pattern 限制写入目录）可作为临时缓解措施防止符号链接攻击覆盖系统文件。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "Digital UNIX xterm 符号链接任意文件写入漏洞"
updated = "2026-06-16T21:49:57.263"

