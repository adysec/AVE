[basic]
description = "Microsoft IIS 4.0 的 SMTP 服务 Pickup 目录存在拒绝服务漏洞。本地攻击者可在 Pickup 目录中创建一个文件名超长且扩展名为 .txt.eml 的邮件文件，当 Inetinfo.exe 进程尝试处理该文件时触发异常，导致 IIS 服务崩溃。该漏洞影响 IIS 4.0 版本，攻击者需具备本地文件写入权限，CVSS 评分 2.1，危害等级低。"
published = "2000-02-15T05:00:00.000"
remediation = "安装 Microsoft 安全公告 MS00-016 对应补丁，或升级至 Windows 2000 及以上版本操作系统的 IIS（如 IIS 5.0+）以彻底修复。如无法升级，在 IIS 管理器中移除 SMTP 服务的 Pickup 目录匿名写入权限，仅允许可信用户访问，并对该目录启用文件长度和扩展名过滤限制。"
score = 2.1
severity = "LOW"
sources = ["epss"]
title = "Microsoft IIS 4.0 Pickup目录拒绝服务漏洞"
updated = "2026-06-16T21:51:08.410"

