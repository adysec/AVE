[basic]
description = "University of Washington IMAP 软件包中的 pop2d POP 守护进程存在栈缓冲区溢出漏洞。远程攻击者通过向 FOLD 命令发送约 1000 字节的超长参数，可触发栈溢出，覆盖返回地址，从而以 nobody 用户权限执行任意代码。攻击者需先通过匿名代理功能登录认证，攻击条件为目标运行 pop2d 4.4 及更早版本。"
published = "1999-05-26"
remediation = "升级 University of Washington IMAP 软件包至 4.5 或更高版本，该版本修复了 pop2d 中 FOLD 命令的缓冲区边界检查问题。如无法升级，建议禁用 pop2d 服务（端口 109），改用更安全的 pop3d 或 IMAP 协议替代。"
score = 10.0
severity = "CRITICAL"
sources = [
    "cve",
    "exploitdb",
    "nvd",
]
title = "University of Washington IMAP pop2d 缓冲区溢出漏洞"
updated = "2026-06-16"

