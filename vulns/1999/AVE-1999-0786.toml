[basic]
description = "Windows NT 4.0 的服务控制管理器（SCM）存在严重的安全漏洞。该服务组件未对资源枚举请求参数进行有效验证，当远程攻击者向目标系统发送包含恶意构造参数的数据包时，可以触发 SCM 的崩溃或死锁状态，导致系统拒绝服务，无法正常提供服务。该漏洞影响范围广泛，不仅波及 Windows NT 4.0，还可能影响相关 Windows 版本。攻击者无需任何身份验证即可远程发起攻击，只要向目标服务器发送包含恶意参数的资源枚举请求即可。通过精心构造的资源枚举数据包即可利用该漏洞，导致目标系统服务不可用，可能会迫使系统重启，严重影响了系统的可用性和稳定性。"
published = "2000-05-16T04:00:00.000"
remediation = "升级到 Windows 2000 或更高版本以永久修复漏洞，并应用最新的安全补丁。如需保留 NT 4.0，可通过防火墙规则限制对端口 445 和 139 的访问，并禁用不必要的服务以减少攻击面。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "微软 Windows NT 4.0 服务控制管理器拒绝服务漏洞"
updated = "2026-06-16T21:49:27.227"

