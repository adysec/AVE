[basic]
description = "Sun Solaris（7.0、2.6、SunOS 5.7）及 IBM AIX 4.2.1 的 C 语言标准库 libc 及配套工具（ufsrestore、rcp）在处理 LC_MESSAGES 环境变量时存在缓冲区溢出漏洞。当用户通过 telnetd 等远程登录服务连接到目标系统，且客户端传递了超长 LC_MESSAGES 环境变量值时，libc 在解析本地化消息时未对输入长度进行边界检查，导致栈缓冲区溢出，可被利用以覆盖返回地址执行任意代码。该漏洞在 setuid/setgid 程序（如 login）启动时同样可被本地攻击者触发，实现权限提升至 root。攻击者无需身份认证，只需建立网络连接并发送特制环境变量即可完成利用，CVSS v2 评分 7.2（HIGH），危害等级严重。Sun 及 IBM 已分别通过安全公告和补丁修复该漏洞。"
published = "1999-09-08T04:00:00.000"
remediation = "将 Sun Solaris 升级到 Solaris 7 的推荐补丁簇（如 105396 系列）或升级至 Solaris 8 及以上版本；IBM AIX 升级到 4.2.1 的官方补丁包（APAR IX####）或升级至 AIX 4.3 以上。临时缓解措施：取消普通用户对 ufsrestore、rcp 等 setuid 程序的执行权限（chmod u-s），并限制环境变量 LC_MESSAGES 的注入，通过应用供应商提供的 libc 环境变量过滤补丁修复缓冲区溢出。"
score = 7.2
severity = "HIGH"
sources = ["epss"]
title = "IBM AIX 与 Sun Solaris LC_MESSAGES libc 缓冲区溢出漏洞"
updated = "2026-06-16T21:49:00.953"

