[basic]
description = "eEye Digital Security IRIS 1.01 beta 网络抓包分析工具存在拒绝服务漏洞，由于该软件在处理 UDP 连接时缺乏有效的连接数限制机制，远程攻击者可通过向目标系统发送大量 UDP 连接请求，导致 IRIS 软件资源耗尽，无法正常执行网络数据包捕获与分析功能。该漏洞影响 eEye IRIS 1.01 beta 版本，攻击者无需认证即可远程触发，对网络监控和安全分析环境构成威胁。建议用户升级至修复后的版本或部署访问控制策略限制 UDP 流量。"
published = "2000-10-20T04:00:00.000"
remediation = "升级 eEye IRIS 至 1.02 或更高版本，该版本已修复对大量 UDP 连接处理不当导致的拒绝服务问题。在网络边界防火墙上限制对 IRIS 管理端口的非授权访问，并部署入侵检测规则对异常 UDP 流量进行告警和限速。如产品已停止维护，建议迁移至其他主流网络入侵检测系统。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "eEye Digital Security IRIS 1.01 拒绝服务漏洞"
updated = "2026-06-16T21:52:22.280"

