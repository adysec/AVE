[basic]
description = 'ISC BIND 8.2.x 版本在处理 DNS NXT 记录时存在资源管理缺陷，未经身份认证的远程攻击者可通过向 DNS 服务器发送大量包含特制 NXT 记录的查询或响应，导致 named 进程持续打开新文件描述符而未能及时释放。当打开的文件描述符数量超过 "fdmax" 限制时，BIND 服务器将无法再接受新的 DNS 查询请求，最终导致拒绝服务。该漏洞影响 ISC BIND 8.2.2 及更早版本，同时影响 IRIX 6.5.17 和 Solaris 7.0 系统上运行的 BIND 服务。攻击者只需能够向目标 DNS 服务器发送网络数据包即可触发此漏洞，无需身份验证，利用门槛低。CVSS v2 评分为 5.0，危害等级为中危。ISC 已发布 BIND 8.2.3-P2 及后续版本修复此问题，建议受影响用户升级至安全版本。'
published = "1999-11-10T05:00:00.000"
remediation = "升级 ISC BIND 到 8.2.3 或更高版本（或迁移至 BIND 9.x），该版本修复了 fdmax 文件描述符耗尽导致的拒绝服务问题。如暂时无法升级，可在 named.conf 中限制监听地址、通过防火墙限制仅允许可信递归客户端访问 53 端口，并配置 rndc 限制查询来源以降低被耗尽 fdmax 的风险。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "ISC BIND 8.2.2 NXT 记录处理 fdmax 拒绝服务漏洞"
updated = "2026-06-16T21:49:11.040"

