[basic]
description = "Solstice Backup（Sun Microsystems 出品的备份恢复软件）中的 recover 程序存在权限检查缺失漏洞，本地攻击者可利用该程序恢复系统中本不应被访问的敏感文件，导致信息泄露。该漏洞需要攻击者已拥有本地系统访问权限，CVSS 评分 2.1，危害等级低。受影响版本包括 Solstice Backup 5.1、6.0 及早期版本，建议用户升级至最新版本或限制 recover 程序的可执行权限。"
published = "2000-01-01T05:00:00.000"
remediation = "升级 Solstice Backup 至 5.1 及以上版本，或限制 recover 程序的执行权限（chmod 750 /usr/sbin/recover），仅允许备份管理员组执行。同时通过文件系统权限（chmod 600）保护敏感备份文件，避免被未授权本地用户读取。若无法升级，可移除 recover 程序的 setuid 位（chmod u-s /usr/sbin/recover）作为临时缓解。"
score = 2.1
severity = "LOW"
sources = ["avd"]
title = "Sun Solstice Backup recover 程序本地敏感文件泄露漏洞"
updated = "2026-06-16T21:50:56.200"

