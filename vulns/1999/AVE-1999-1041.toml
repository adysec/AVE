[basic]
description = "SAS System 5.18 for VAX/VMS 因安装时目录和启动文件权限设置不当，导致本地用户可利用默认的不安全权限配置进行权限提升攻击。攻击者通过本地访问系统，利用目录或文件的弱权限（如过度宽松的 ACL 或属主设置）替换或修改可执行文件/配置文件，从而获取高于预期的系统权限，实现完全控制目标系统。该漏洞影响 SAS System 5.18 on VAX/VMS 版本，CVSS 评分 7.2，危害等级高。官方建议手动调整相关目录和文件的权限设置以降低风险。"
published = "1999-12-31T05:00:00.000"
remediation = "限制 SAS System 5.18 安装目录和启动文件的权限，确保只有授权管理员可读写。对目录执行 `chmod 750`，启动文件执行 `chmod 640`，移除其他用户的写权限。在 VAX/VMS 上设置 ACL 限制访问。若无升级可能，建议迁移到受支持的操作系统版本。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "SAS System VAX/VMS 权限提升漏洞"
updated = "2026-06-16T21:50:11.993"

