[basic]
description = "Hybrid IRC 守护进程（hybrid-6）的 m_invite 功能存在缓冲区溢出漏洞，远程攻击者无需身份认证即可通过向目标服务器发送特制的 INVITE 命令触发该漏洞，导致任意代码执行。该漏洞主要影响 EFnet 上运行的 hybrid-6 版本 IRC 服务器，CVSS 评分 7.5，危害等级高。攻击者利用此漏洞可完全控制受影响服务器，进而发起进一步攻击。"
published = "1999-08-13T04:00:00.000"
remediation = "立即升级 hybrid-ircd 至 7.0 或更高版本，该漏洞在 hybrid-7 中已修复 m_invite 命令的缓冲区边界检查。如无法升级，可在 IRC 服务器配置中禁用 m_invite 命令（通过屏蔽 invite 消息类型），或在网络边界防火墙限制对 IRC 端口（6667/TCP）的访问仅限可信 IP。"
score = 7.5
severity = "HIGH"
sources = ["exploitdb"]
title = "Hybrid IRCd 远程缓冲区溢出漏洞"
updated = "2026-06-16T21:48:49.900"

