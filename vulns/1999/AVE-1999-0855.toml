[basic]
description = "XSoldier 是一款运行于类 Unix 系统的 X11 太空射击游戏，其 0.96 及之前版本在解析命令行参数时存在栈缓冲区溢出缺陷。攻击者可通过构造超长的命令行参数（如游戏名称或关卡名）溢出缓冲区并覆盖返回地址，在目标用户权限下执行任意代码。攻击需诱使本地用户以恶意参数启动该程序，成功利用可导致系统被控制。"
published = "1999-12-08"
remediation = "升级到 XSoldier 1.0 或更高版本；若无法升级，应避免以不可信参数启动该程序，并移除 setuid 位（chmod u-s xsoldier）以降低被提权利用的风险。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "XSoldier 0.96 缓冲区溢出远程代码执行漏洞"
updated = "1999-12-08"

