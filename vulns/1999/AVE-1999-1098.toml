[basic]
description = 'The Economist 1999 屏幕保护程序在启用"密码保护"选项后存在安全绕过漏洞。具有物理访问权限的攻击者可在屏幕锁定状态下通过运行 Internet Explorer 绕过屏幕保护程序，从而读取受保护文件。该漏洞影响 The Economist 1999 屏幕保护程序版本，CVSS 评分 2.1，危害等级低。攻击者需具备物理接触目标系统的条件方可利用。'
published = "1999-06-03T04:00:00.000"
remediation = '该屏保为 1999 年发布的已停止维护软件，官方不再提供补丁。建议立即卸载该屏保程序，改用操作系统自带的锁屏功能（Windows 按 Win+L 键锁定工作站），并设置屏幕保护为 "无" 或使用 Windows 登录密码保护。同时启用组策略 "不显示最后的登录用户名" 和 "登录时间过期后锁定会话" 作为增强措施。'
score = 2.1
severity = "LOW"
sources = ["avd"]
title = "The Economist 1999 屏幕保护程序 安全绕过漏洞"
updated = "2026-06-16T21:50:21.577"

