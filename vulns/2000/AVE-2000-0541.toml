[basic]
description = "CGI Script Center 开发的 Auction Weaver 1.0.2 及更早版本的 CGI 脚本存在命令注入漏洞。由于未对 fromfile 参数中的 shell 元字符进行有效过滤，远程攻击者可通过向目标服务器发送特制 HTTP 请求，在 fromfile 参数中注入分号、管道等 shell 命令分隔符，从而在服务器端以 Web 进程权限执行任意系统命令。攻击者无需任何身份认证，即可利用此漏洞完全控制受影响系统。"
published = "2000-10-20T04:00:00.000"
remediation = "立即停止使用 Auction Weaver CGI 脚本 1.02 及更早版本，该产品已停止维护且无安全补丁。作为替代方案，彻底删除 auctionweaver.cgi 文件或从 Web 服务器中移除该 CGI 脚本目录。如必须继续使用，在 CGI 脚本入口处对 fromfile 参数进行严格过滤，禁止传入 `;`、`|`、`` ` ``、`$()` 等 shell 元字符，仅允许字母数字和文件路径合法字符，并在 Web 服务器层面禁用 CGI 目录的 POST 请求执行权限。"
score = 10
severity = "CRITICAL"
sources = ["exploitdb"]
title = "CGI Script Center Auction Weaver 远程命令执行漏洞"
updated = "2026-06-16T21:52:16.543"

