[basic]
description = "ISC BIND 8.2.2p1 及之前版本的 DNS 服务器 named 进程在处理 SIG（资源记录签名）资源记录时存在输入验证缺陷。攻击者可通过向目标 DNS 服务器发送包含特制畸形 SIG 记录的恶意 DNS 响应数据包，触发 named 进程异常，导致服务器崩溃或进入无限循环，从而造成 DNS 服务完全不可用，影响范围内所有依赖该 DNS 服务器进行域名解析的系统均会中断服务。该漏洞影响 BIND 8.x 系列至 8.2.2p1 版本，广泛运行于 Linux、Solaris 7、SunOS 5.7 等多种 Unix 及类 Unix 操作系统。由于攻击仅需网络可达即可发起，无需身份认证，远程攻击者利用难度极低。CVSS v2 评分为 10.0，危害等级为高。ISC 已发布补丁版本修复此问题，建议用户升级至 BIND 8.2.2p5 或更高版本。"
published = "1999-11-10T05:00:00.000"
remediation = "建议立即将 ISC BIND 升级至 8.2.2-P3 或更高版本以彻底修复该 SIG 记录解析缺陷。若暂时无法升级，可在防火墙或 ACL 上限制对 53 端口（TCP/UDP）的访问，仅允许可信主机查询，并关闭不必要的递归解析功能作为临时缓解措施。"
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "ISC BIND DNS服务器畸形SIG记录拒绝服务漏洞"
updated = "2026-06-16T21:49:09.437"

