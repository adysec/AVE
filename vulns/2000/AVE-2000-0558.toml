[basic]
description = "Unify eWave ServletExec 存在 JSP 源代码泄露漏洞，由于 Servlet 容器在处理 JSP 文件扩展名时未正确处理大小写敏感性，攻击者可通过将 URL 中的 .jsp 扩展名改为大写 .JSP 发起请求，绕过 JSP 编译执行流程，直接获取 JSP 源代码。攻击者无需身份认证即可远程利用，泄露的源代码可能包含数据库连接凭证、业务逻辑代码及敏感配置信息，导致敏感信息泄露及进一步攻击风险。"
published = "2000-06-08T04:00:00.000"
remediation = '建议立即迁移至现代 Servlet 容器（Apache Tomcat 9.0+/10.1+、Jetty 9.4+/11.0+ 或 WildFly/JBoss EAP 7.4+），彻底替换已停止维护的 Unify eWave ServletExec。若短期无法迁移，可在前置 Web 服务器（Apache HTTPD/Nginx/IIS）层面配置拦截规则拦截所有包含大写 .JSP/.Jsp/.jSp 等变体扩展名的请求（如 Nginx 配置 `location ~* \.jsp$ { return 403; }`），并在 ServletExec 配置中启用严格的大小写敏感 JSP 映射，同时部署 WAF 规则拦截大写 JSP 扩展名请求作为临时缓解措施。建议同步部署 WAF 规则拦截包含大写 JSP 扩展名的请求，并审计已泄露的 JSP 源代码是否包含敏感信息（数据库密钥、API 密钥、业务逻辑等）。'
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "Unify eWave ServletExec JSP源代码泄露漏洞"
updated = "2026-06-16T21:51:51.720"

