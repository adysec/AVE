[basic]
description = "S.u.S.E. Linux 6.3/6.4 版本中的 Gnomelib 库存在缓冲区溢出漏洞，源于对 DISPLAY 环境变量缺乏边界长度检查。本地攻击者可通过设置超长的 DISPLAY 环境变量值触发栈缓冲区溢出，进而在目标系统上以提升后的权限执行任意代码。该漏洞影响 SuSE Linux 6.3 和 6.4 版本，CVSS 评分 7.2（本地攻击、低复杂度、无需认证、完全机密性/完整性/可用性影响），攻击者需具备本地系统访问权限方可利用。攻击者可构造恶意环境变量触发缓冲区溢出，劫持程序控制流执行任意 Shellcode 实现本地提权。ExploitDB 已收录该漏洞的本地缓冲区溢出利用代码（EDB-ID: 19883）。"
published = "2000-04-29T04:00:00.000"
remediation = "升级至 S.u.S.E. Linux 6.4 或更高版本，该版本中的 gnomelib 已修复 DISPLAY 环境变量缓冲区溢出问题。如无法升级，可移除 /opt/gnome/sbin/gnome-pty-helper 的 setgid 权限（chmod g-s /opt/gnome/sbin/gnome-pty-helper），并限制本地用户对 DISPLAY 变量的异常长度输入作为临时缓解措施。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "SuSE Linux Gnomelib 本地缓冲区溢出漏洞"
updated = "2026-06-16T21:51:30.770"

