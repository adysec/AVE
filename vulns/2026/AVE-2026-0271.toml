[basic]
description = "Netty 框架中的 STOMP 协议解码器 StompSubframeDecoder 存在未限制请求头数量和大小的漏洞。maxLineLength 参数仅限制单行头部长度，但未对单个 STOMP 帧中的总头部数量或累积大小进行限制。远程攻击者可发送大量短头部数据，导致服务端内存无限增长直至 JVM 抛出 OutOfMemoryError，造成拒绝服务。该漏洞影响 Netty 4.1.136.Final 之前及 4.2.16.Final 之前的版本，CVSS 评分 7.5，危害等级高危。"
published = "2026-07-17T21:17:06.250"
remediation = "升级 Netty 至 4.1.136.Final 或 4.2.16.Final 及以上版本，这两个版本已对 STOMP 帧的头部总数和累积大小施加限制。如无法立即升级，可在应用层对 STOMP 连接设置最大头部数量阈值，或通过反向代理限制单连接请求体大小作为临时缓解措施。"
score = 7.5
severity = "HIGH"
sources = ["ghsa"]
title = "Netty StompSubframeDecoder 未限制请求头数量拒绝服务漏洞"
updated = "2026-07-21T20:25:45.920"

