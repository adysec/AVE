[basic]
description = "Trend Micro OfficeScan 存在远程拒绝服务漏洞，远程攻击者可通过网络重放管理员命令，未经授权修改 OfficeScan 客户端的配置信息，导致服务异常或中断。该漏洞影响 OfficeScan 早期版本，攻击者无需身份认证即可利用，危害等级中等。厂商已发布安全更新修复此漏洞。"
published = "2000-03-03T05:00:00.000"
remediation = "立即安装 Trend Micro 官方提供的 OfficeScan 3.5 补丁（下载地址：http://www.antivirus.com/download/ofce_patch_35.htm），修复管理命令重放问题。同时建议在防火墙层面限制对 OfficeScan 管理端口的访问，仅允许受信任的管理 IP 地址连接，防止外部攻击者重放管理命令篡改客户端配置。"
score = 6.4
severity = "MEDIUM"
sources = ["avd"]
title = "Trend Micro OfficeScan 远程拒绝服务攻击漏洞"
updated = "2026-06-16T21:51:13.267"

