[basic]
description = "Linux 内核 RDMA/rxe（Soft RoCE）驱动中存在释放后使用（Use-After-Free）漏洞。该驱动维护了对 net_device 的直接指针引用，当网络设备被删除释放后，已排队等待处理的工作队列事件 ib_cache_event_task 仍会访问已释放的 net_device，触发 slab 释放后内存访问，导致系统崩溃或潜在的信息泄露。本地攻击者只需低权限即可通过构造特定的网络设备生命周期操作序列触发此漏洞，实现权限提升或系统拒绝服务。CVSS 评分 7.8，危害等级高。"
published = "2025-01-15T13:15:11.563"
remediation = "升级 Linux 内核至 6.12 及以上版本，该版本包含修复 RXE 驱动 use-after-free 的补丁。对于 Ubuntu 用户，运行 sudo apt update && sudo apt upgrade 安装安全更新（Ubuntu 24.04 LTS 对应 linux-image 6.8.0-2042-raspi-realtime 及更高版本）。若无法立即升级内核，可在不需要 RDMA 功能的系统中禁用 rxe 模块（执行 sudo modprobe -r rxe 或在 /etc/modprobe.d/ 中添加 blacklist rxe），消除攻击面。重启系统使更改生效。"
score = 7.8
severity = "HIGH"
sources = ["msrc"]
title = "Linux Kernel RDMA/rxe 模块 net_device 释放后使用漏洞"
updated = "2026-06-17T08:14:03.390"

