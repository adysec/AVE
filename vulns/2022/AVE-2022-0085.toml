[basic]
description = "Intel SOF（Sound Open Firmware）音频驱动中 HDA-IPC 模块存在逻辑缺陷，在固件完成启动前处理 IPC 回复可能导致未初始化内存访问或状态不一致。本地攻击者可利用此竞争条件引发系统崩溃或内核信息泄露，影响搭载 Intel HDA 音频控制器的 Linux 系统。厂商已在内核主线中合入修复补丁。"
published = "2025-06-18"
remediation = "升级 Linux 内核至 5.19.4 或更高版本，或合入内核主线修复补丁 48945246cf80 / 499cc881b09c，在固件启动前过滤 IPC 回复，避免空指针解引用。"
score = 5.5
severity = "MEDIUM"
sources = [
    "kernel",
    "nvd",
]
title = "Linux kernel ASoC SOF Intel HDA-IPC 空指针解引用漏洞"
updated = "2025-06-18"

