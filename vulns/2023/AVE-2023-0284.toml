[basic]
description = "泛微 e-office OA 系统的 uploaderOperate.jsp 接口存在任意文件上传漏洞。由于该接口对上传文件的类型、后缀名及路径缺乏有效校验，未经身份认证的远程攻击者可构造恶意请求上传任意文件（如 JSP/PHP 网页木马）到 Web 可访问目录，进而在服务器上执行任意代码，最终获取服务器控制权限，造成敏感信息泄露、数据篡改等严重危害。"
published = "2023-08-08"
remediation = "升级泛微 e-office OA 至最新官方版本；在无法立即升级时，通过 WAF 或反向代理限制对 uploaderOperate.jsp 接口的外部访问，并对上传目录禁用脚本执行权限，同时严格校验上传文件的后缀名与内容类型。"
score = 8.5
severity = "HIGH"
sources = ["hwpoc"]
title = "泛微 OA uploaderOperate.jsp 任意文件上传漏洞"
updated = "2023-08-08"

