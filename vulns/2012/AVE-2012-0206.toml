[basic]
description = "Oracle Fusion Middleware 的 Oracle Reports Developer 组件中的 Report Server Component 存在未指定漏洞，远程攻击者可通过 URLPARAMETER 功能向 reports/rwservlet 发送特制请求，实现任意文件读取与上传。该漏洞影响 11.1.1.4、11.1.1.6 及 11.1.2.0 等版本，CVSS 评分 9.1，危害等级严重。攻击者无需身份认证即可远程利用，结合 CVE-2012-3153 上传 .jsp 文件可进一步实现任意代码执行。"
published = "2012-10-16T23:55:03.823"
remediation = "立即安装 Oracle 2012 年 10 月关键补丁更新（CPUOct2012），将 Oracle Fusion Middleware 升级至 11.1.1.7 或更高版本。如无法立即打补丁，可在 weblogic 管理控制台禁用 reports/rwservlet 的 URLPARAMETER 功能，或通过防火墙限制对 reports 服务的访问来源 IP。"
score = 9.1
severity = "CRITICAL"
sources = ["kev"]
title = "Oracle Fusion Middleware Oracle Reports Developer 远程代码执行漏洞"
updated = "2026-06-16T23:42:40.677"

