[basic]
description = "Vim 5.x 的备份文件和交换文件存在条件竞争漏洞，当受害者在全局可写目录中编辑文件时，本地攻击者可通过符号链接攻击修改其他用户正在编辑的文件。该漏洞影响 Vim 5.x 版本，CVSS 评分 2.1，危害等级低。攻击者需要拥有本地系统访问权限并具备目录写入条件，利用难度较高。"
published = "2001-06-18T04:00:00.000"
remediation = "升级到 Vim 6.0 及以上版本，该漏洞已在 6.0 版本中修复。如无法升级，避免在全局可写目录（如 /tmp）中编辑文件，或通过设置 `set backupdir=~/.vim/backup` 和 `set directory=~/.vim/swap` 将备份文件和交换文件重定向到用户私有目录，并确保该目录权限为 700 以防止其他用户访问。"
score = 2.1
severity = "LOW"
sources = ["exploitdb"]
title = "Vim 5.x Swap 文件竞争条件漏洞"
updated = "2026-06-16T21:54:15.247"

