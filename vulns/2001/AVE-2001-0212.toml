[basic]
description = "Solaris 2.6 及 7.0 系统中的 dtmail 程序存在缓冲区溢出漏洞。由于 dtmail 在处理 MAIL 环境变量时未对输入长度进行有效边界检查，本地攻击者可通过设置超长 MAIL 环境变量触发栈缓冲区溢出，覆盖返回地址或函数指针，从而劫持程序执行流程。成功利用此漏洞可使攻击者以 dtmail 进程权限（通常为 root 或 mail 用户权限）执行任意代码，实现本地权限提升。攻击者需拥有本地系统账户并具备 shell 访问权限即可发起攻击，无需用户交互。"
published = "2001-08-14T04:00:00.000"
remediation = "该漏洞影响已停止维护的 Solaris 2.6 和 Solaris 7，官方已不再提供安全更新。建议立即升级到受支持的 Solaris 11 或更高版本；若无法升级，可临时移除 dtmail 的 setuid 权限（`chmod 555 /usr/dt/bin/dtmail`）以阻断本地提权，同时限制非授权用户对 dtmail 的访问。"
score = 4.6
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Sun Solaris DTMail 环境变量缓冲区溢出漏洞"
updated = "2026-06-16T21:54:30.517"

