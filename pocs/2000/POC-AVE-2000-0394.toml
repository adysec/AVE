[info]
author = "ave"
description = "检测 Solaris 系统上 ufsrestore 二进制文件是否存在且具有 setuid root 权限，该程序存在缓冲区溢出漏洞（CVE-2000-0471），本地攻击者可通过超长路径名参数触发栈溢出获得 root 权限"
id = "POC-AVE-2000-0394"
name = "CVE-2000-0471 ufsrestore 本地缓冲区溢出 PoC"
severity = "high"
tags = ["ave-2000-0394"]
vuln_id = [
    "CVE-2000-0471",
    "AVE-2000-0394",
]

[poc]
logic = "any"

[[poc.requests]]
path = "/usr/lib/fs/ufs/ufsrestore"
protocol = "file"

[[poc.requests.matchers]]
expect = true
part = "body"
regex = "."
type = "regex"

[[poc.requests]]
path = "/usr/sbin/ufsrestore"
protocol = "file"

[[poc.requests.matchers]]
expect = true
part = "body"
regex = "."
type = "regex"
