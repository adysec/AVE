[basic]
description = "KDE konsole 终端模拟器存在权限检查缺陷，本地攻击者可通过访问其他用户正在使用的终端设备文件（如伪终端设备），劫持或窥探其会话内容，导致敏感信息泄露。该漏洞影响 KDE konsole 早期版本，攻击者需具备本地系统访问权限，CVSS 评分 7.2，危害等级高。"
published = "1999-01-06T05:00:00.000"
remediation = "升级 KDE konsole 到包含 TIOCSPTLCK 锁补丁的版本（1999 年后的 KDE 1.x 及以上版本均已修复）；如无法升级，确保系统 umask 为 077 且 /dev/pts/* 设备权限为 600，同时建议使用 `mesg n` 禁止其他用户写入当前终端，并通过内核参数 `kernel.yama.ptrace_scope=1` 限制进程间追踪。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "KDE konsole 本地会话劫持漏洞"
updated = "2026-06-16T21:50:04.577"

