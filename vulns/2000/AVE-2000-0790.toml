[basic]
description = 'AOL Instant Messenger（AIM）4.3.2229之前版本存在缓冲区溢出漏洞，远程攻击者可通过向目标用户发送特制的"buddyicon"指令，其中包含超长"src"参数触发缓冲区溢出，导致任意代码执行。攻击者只需诱使目标用户接收恶意消息即可完成利用，无需用户交互，危害性高。AOL已发布更新修复此漏洞。'
published = "2001-01-09T05:00:00.000"
remediation = "升级 AOL Instant Messenger 至 4.3.2229 或更高版本，该版本已修复 BuddyIcon 命令处理中 src 参数长度校验不足导致的缓冲区溢出问题。由于 AOL Instant Messenger 已停止维护，建议迁移至其他受支持的即时通讯软件以持续获得安全更新。"
score = 7.5
severity = "HIGH"
sources = ["exploitdb"]
title = "AOL Instant Messenger BuddyIcon 缓冲区溢出漏洞"
updated = "2026-06-16T21:53:08.013"

