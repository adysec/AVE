[basic]
description = "Kerberos 5 认证协议中的 krb425_conv_principal 函数存在缓冲区溢出漏洞，远程攻击者无需身份认证即可通过向目标系统发送特制的 Kerberos 请求触发该漏洞，导致缓冲区溢出，进而实现任意代码执行并以 root 权限完全控制目标系统。该漏洞影响多个 Kerberos 5 实现版本，CVSS 评分 10.0，危害等级严重。"
published = "2000-05-16T04:00:00.000"
remediation = "升级 MIT Kerberos 5 至 1.2 或更高版本，该漏洞在 krb5-1.2 中已修复。Red Hat 用户应安装 RHSA-2000-025 提供的更新包。如无法升级，可在 krb425_conv_principal 函数调用处添加输入长度检查，限制 Kerberos 4 主体名称长度不超过缓冲区大小，防止栈溢出。"
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "MIT Kerberos 5 krb425_conv_principal 缓冲区溢出漏洞"
updated = "2026-06-16T21:51:36.973"

