[basic]
description = "Joomla! 的 JE Form Creator 组件（com_jeformcr）1.0 版本中存在目录遍历漏洞。当 PHP 配置中的 magic_quotes_gpc 选项被禁用时，远程攻击者可通过向 index.php 的 view 参数传递包含目录遍历序列（如 ../）的恶意请求，实现读取服务器上任意文件。该漏洞可能导致敏感信息泄露，影响运行 Joomla! 且安装该组件的网站系统，CVSS 评分 4.3，危害等级中危。"
published = "2010-03-30T23:30:00.563"
remediation = "升级 JE Tooltip/Form Creator 至官方修复版本（如有），或彻底卸载该第三方组件改用官方替代方案。如无法升级，在 PHP 配置中启用 `magic_quotes_gpc = On`（兼容 Joomla 1.5 环境），并在 Web 服务器（Apache/Nginx）层面添加规则拦截 `view=` 参数中的 `../` 目录遍历序列作为临时缓解措施。"
score = 4.3
severity = "MEDIUM"
sources = ["nuclei"]
title = "Joomla JE Form Creator 组件目录遍历漏洞"
updated = "2026-06-16T23:17:52.450"

