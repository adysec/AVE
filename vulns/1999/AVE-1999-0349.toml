[basic]
description = "Novell NetWare Web Server 2.x 中的 convert.bas CGI 程序存在任意文件读取漏洞。远程攻击者无需认证即可通过向该脚本发送特制请求，读取 Web 服务器可访问的任意系统文件，导致敏感信息泄露。该漏洞利用方式简单，仅需构造包含目标文件路径的 HTTP 请求即可触发。"
published = "1996-07-01T04:00:00.000"
remediation = "立即删除或禁用 Web 服务器 scripts 目录下的 convert.bas 脚本，防止攻击者通过该 CGI 读取系统任意文件。升级至 NetWare 5.0 或更高版本（该漏洞已在后续版本修复）。由于 NetWare 系列产品已停止技术支持，建议将业务迁移至 Windows Server 或 Linux 等现代服务器平台。如无法立即迁移，在 Web 服务器前置防火墙或反向代理中限制对 scripts/convert.bas 路径的访问可作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Novell NetWare Web Server 远程任意文件读取漏洞"
updated = "2026-06-16T21:47:45.673"

