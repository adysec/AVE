[basic]
description = "天融信上网行为管理系统存在PHP敏感信息泄露漏洞，攻击者可通过向目标系统发送特制的HTTP请求，利用系统未对敏感文件访问进行有效权限控制的缺陷，直接读取系统配置文件、数据库连接信息等敏感数据。该漏洞影响天融信上网行为管理系统多个版本，攻击者无需身份认证即可远程利用，导致系统敏感信息泄露，进一步可扩大攻击面。建议用户及时联系厂商获取修复补丁或升级至最新版本。"
published = "08.08"
remediation = "立即联系天融信获取最新固件版本升级，修复 PHP 敏感信息泄露漏洞。临时措施：在 Nginx/Apache 配置中禁止直接访问 /phpinfo.php 等敏感路径，限制管理后台仅允许可信 IP 访问，并关闭 display_errors 等 PHP 调试选项。"
score = 5
