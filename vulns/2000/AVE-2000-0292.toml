[basic]
description = "Ipswitch IMail 服务器 6.02 及更早版本中存在拒绝服务漏洞，远程攻击者无需身份认证即可通过向 SMTP 服务的 AUTH 命令发送特制的 CRAM-MD5 认证请求，触发服务器处理异常导致服务崩溃。该漏洞影响 IMail 6.2 及之前版本，攻击复杂度较低，CVSS 评分 5.0，危害等级中危。厂商建议升级至更高版本以修复此漏洞。"
published = "2000-04-06T04:00:00.000"
remediation = "建议升级 Ipswitch IMail Server 至 6.2 以上版本，该版本已修复 AUTH CRAM-MD5 命令导致的拒绝服务漏洞。如无法升级，可在网络防火墙上限制对 143 (IMAP) 和 25 (SMTP) 端口的未授权访问，或禁用 CRAM-MD5 认证机制作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Ipswitch IMail AUTH CRAM-MD5 命令拒绝服务漏洞"
updated = "2026-06-16T21:51:25.897"

