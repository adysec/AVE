[basic]
description = "Perl 的 XML::Parser 组件（版本 2.47 及更早）中的 Expat.xs 文件 parse_stream() 函数存在堆缓冲区溢出漏洞。当使用 :utf8 PerlIO 层时，Perl 的 read() 函数返回解码后的字符，而 SvPV() 返回的是多字节 UTF-8 字节，其长度可能超过预分配的缓冲区大小，从而触发堆损坏（double free 或 corruption）导致程序崩溃。远程攻击者可通过构造恶意的 UTF-8 编码 XML 数据触发该漏洞，造成拒绝服务或潜在的内存破坏。CVSS 评分 7.5，危害等级高。"
published = "2026-03-19T12:16:16.120"
remediation = "升级 XML::Parser 至 2.46 或更高版本，该版本在 parse_stream() 中修复了 :utf8 PerlIO 层下因 UTF-8 解码字节长度超出缓冲区导致的堆溢出问题。建议在 Perl 代码中将输入流设为 :raw 模式（binmode(STDIN, ':raw')）以避免二次解码风险。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "XML::Parser Perl 模块堆缓冲区溢出漏洞"
updated = "2026-06-16T22:21:49.680"

