[basic]
description = "SGI IRIX 6.4 系统中的 xfsdump 工具存在本地权限提升漏洞。该工具在处理 bck.log 日志文件时未对文件路径进行充分验证，本地攻击者可通过构造符号链接将 bck.log 指向敏感系统文件，利用符号链接攻击使 xfsdump 以 root 权限写入或覆盖关键文件，从而获得系统 root 权限。攻击者需先获得目标系统的本地访问权限方可利用，成功后可完全控制受影响系统。"
published = "1997-05-07"
remediation = "升级 SGI IRIX 至 6.5.10 及以上版本，该版本已修复 xfsdump 符号链接问题。如暂无法升级，将 /var/xfsdump 目录权限设为 0755 且属主为 root，移除其他用户写权限，并确保 bck.log 不可被普通用户删除或替换。"
score = 6.2
severity = "MEDIUM"
sources = [
    "cve",
    "exploitdb",
]
title = "SGI IRIX xfsdump 本地符号链接提权漏洞"
updated = "2026-06-16"

