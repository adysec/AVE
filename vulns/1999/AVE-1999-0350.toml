[basic]
description = "KDE K-Mail 存在不安全的临时文件创建漏洞，本地攻击者可通过符号链接（symlink）攻击在用户临时目录中劫持 K-Mail 创建的临时文件，从而以目标用户权限覆盖或创建任意文件，实现权限提升。该漏洞影响 KDE 1.1/1.1.1、Caldera kdenetwork 1.1.1-1、Caldera OpenLinux 1.3/2.2 及 RedHat Linux 6.0 等版本，CVSS 评分 4.6，危害等级中危。攻击者需拥有本地账户访问权限，利用条件为诱使高权限用户运行 K-Mail 并触发临时文件操作。"
published = "2000-01-04T05:00:00.000"
remediation = "建议升级 KDE 至 1.1.2 或更高版本，并更新 kdenetwork 软件包以修复 K-Mail 的临时目录符号链接漏洞。作为临时缓解，可为每个用户创建独立且权限受限（0700）的临时目录，避免使用共享的可预测临时路径，并设置 TMPDIR 环境变量指向私有目录，同时开启内核 fs.protected_symlinks 保护以阻止符号链接攻击。"
score = 4.6
severity = "MEDIUM"
sources = ["exploitdb"]
title = "KDE K-Mail 临时文件符号链接攻击本地权限提升漏洞"
updated = "2026-06-16T21:48:56.883"

