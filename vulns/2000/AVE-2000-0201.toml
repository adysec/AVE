[basic]
description = "Pocsag POC32 程序存在安全绕过漏洞，远程攻击者可在未授权情况下直接访问其服务器端口，即使管理员已禁用该端口的访问选项。该漏洞源于程序未能正确限制远程用户对服务器端口的访问权限，导致原本应受限的服务暴露给外部网络，可能造成信息泄露或未授权操作。CVSS 评分 5.0，危害等级中等。"
published = "2000-03-07T05:00:00.000"
remediation = "由于 POC32 软件已停止维护，官方不再提供安全更新，建议立即在防火墙层面限制 POC32 服务端口的访问来源，仅允许受信任 IP 连接；如业务无需此服务，直接停用并关闭对应端口以彻底消除风险。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Pocsag POC32 安全绕过漏洞"
