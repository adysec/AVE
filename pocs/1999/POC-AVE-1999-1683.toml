[info]
author = "ave"
description = "验证目标 IIS 服务器是否暴露存在漏洞的 Microsoft Data Access Components (MDAC) RDS DataFactory 组件。通过向 /msadc/msadcs.dll 发送特制的 RDS DataFactory 查询请求，检测服务端是否返回正常 XML 响应（含 RDS 版本或错误结构），从而判定 RDS 接口是否可被未授权访问。该检测为安全无损请求，不会实际执行任意命令。"
id = "POC-AVE-1999-1683"
name = "CVE-1999-1011 MDAC RDS DataFactory 远程命令执行 PoC"
severity = "critical"
tags = ["ave-1999-1683"]
vuln_id = [
    "CVE-1999-1011",
    "AVE-1999-1683",
]

[poc]
logic = "all"

[[poc.requests]]
method = "POST"
path = "/msadc/msadcs.dll"
protocol = "http"

[poc.requests.body]
type = "raw"

[poc.requests.headers]
Content-Type = "application/x-www-form-urlencoded"
User-Agent = "AVE/1.0"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "RDS",
    "DataFactory",
    "msadcs.dll",
    "Error",
    "Microsoft",
]
