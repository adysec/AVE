[basic]
description = "Matt Wright FormHandler.cgi 脚本在默认配置下允许将任意目录作为附件目录，且仅对 /etc/ 目录做了访问限制。远程攻击者可通过 reply_message_attach 附件参数构造包含路径遍历序列（如 ../../../etc/passwd）的请求，读取服务器上的任意文件内容，造成敏感信息泄露。"
published = "1999-11-16T05:00:00.000"
remediation = "修改 FormHandler.cgi 脚本的默认配置，将 reply_message_attach 参数允许的附件目录严格限定在 Web 根目录下的专用附件目录，并在代码中显式过滤包含 '../' 等路径遍历序列的输入。同时移除对 /etc/ 目录的单一限制，改为仅允许白名单目录。升级到更新的表单处理脚本或应用官方安全补丁。在 Web 服务器层面对 cgi-bin 目录设置访问控制，仅允许可信来源访问。"
score = 5.0
severity = "MEDIUM"
sources = ["cve"]
title = "Matt Wright FormHandler.cgi 路径遍历任意文件读取漏洞"
updated = "2026-06-16T21:49:36.223"

