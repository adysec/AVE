[id]
ave_id = "AVE-1999-0744"
aliases = ["CVE-1999-0954"]
[basic]
title = "WWWBoard 默认用户名和密码漏洞"
description = "WWWBoard 是一款基于 Perl 的 Web 留言板系统，其默认安装包含预设的管理员用户名和密码（通常为 admin/admin）。远程攻击者无需身份验证即可利用默认凭据登录管理后台，从而完全控制留言板系统，包括删除/修改帖子、管理用户等操作。攻击条件简单，仅需网络可达即可。"
severity = "HIGH"
score = 7.5
sources = ["cve"]
published = "1999-09-16"
updated = "2024-11-20"
remediation = "安装后立即修改默认管理员用户名和密码，删除或禁用默认账户，并限制管理后台的访问 IP 范围。"
[references]
urls = ["http://www.securityfocus.com/bid/649", "https://nvd.nist.gov/vuln/detail/CVE-1999-0954"]
