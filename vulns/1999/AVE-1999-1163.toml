[basic]
description = "ProSoft NetWare Client 5.12 for Macintosh MacOS 9 存在会话管理缺陷，当用户从系统注销时，NDS（Novell目录服务）会话未自动终止，导致同一系统的其他用户可访问未受保护的NDS会话。攻击者利用该漏洞可无需认证即可访问受保护的网络资源，获取敏感信息或执行未授权操作。该漏洞影响 ProSoft NetWare Client 5.12 版本，CVSS 评分 4.6，危害等级中危。"
published = "1999-11-14T05:00:00.000"
remediation = "升级到 ProSoft Netware Client 5.12 以上版本，或迁移至受支持的 Novell/Micro Focus 客户端版本。在 MacOS 9 中，用户注销前应手动断开 NDS 连接，或通过系统策略强制注销时清除 NDS 会话缓存。建议升级至受支持的 MacOS 与 NetWare 客户端组合以彻底修复此问题。"
score = 4.6
severity = "MEDIUM"
sources = ["avd"]
title = "ProSoft Netware Client for MacOS 登录注销后NDS会话继承漏洞"
updated = "2026-06-16T21:50:38.030"

