[basic]
description = "GNU GRUB2 的 BFS 文件系统驱动程序中存在整数溢出漏洞。当读取包含间接映射表的文件时，grub2 未能正确验证要读取的 extent 条目数量，导致在处理特制或损坏的 BFS 文件系统时发生整数溢出，进而引发堆越界读取。本地攻击者需要拥有高权限，通过挂载恶意构造的 BFS 文件系统触发该漏洞，可能导致敏感内存信息泄露或 GRUB2 崩溃。该漏洞影响所有使用 grub2 的 Linux 发行版，CVSS 评分 6.0，危害等级中危。"
published = "2025-03-03T15:15:14.660"
remediation = "升级 grub2 至修复版本（>2.12）。若厂商尚未发布正式更新包，可从 grub-devel 邮件列表（https://lists.gnu.org/archive/html/grub-devel/2025-02/msg00024.html）获取补丁自行编译安装。Red Hat/CentOS 用户关注 RHSA 安全公告，Ubuntu/Debian 用户通过 `apt update && apt upgrade grub-pc grub2-common` 安装更新。由于该漏洞需要本地高权限且无法远程利用，临时缓解措施可限制系统物理访问和本地用户登录权限，仅允许受信任用户执行 grub2 相关操作。"
score = 6
severity = "MEDIUM"
sources = ["msrc"]
title = "GNU GRUB2 BFS文件系统解析器整数溢出导致堆越界读取漏洞"
updated = "2026-06-29T23:16:41.310"

