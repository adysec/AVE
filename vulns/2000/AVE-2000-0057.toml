[basic]
description = "Windows NT 4.0 的 LPC（本地过程调用）端口机制中存在权限提升漏洞，具体位于 NtImpersonateClientOfPort 系统调用中。本地攻击者可通过向目标系统提交恶意的 LPC 端口请求，欺骗服务器端线程模拟客户端身份，从而获取更高权限。该漏洞允许已登录系统但权限有限的用户完全控制系统，影响 Windows NT 4.0 全版本。"
published = "2000-01-12T05:00:00.000"
remediation = "立即安装 Microsoft 安全公告 MS00-003 提供的更新补丁，或升级至 Windows 2000 及以上版本。如无法升级，建议限制对受影响系统的本地访问权限，仅允许可信用户登录，并监控异常 LPC 端口请求行为。"
score = 7.2
severity = "HIGH"
sources = ["epss"]
title = "Microsoft Windows NT 4.0 LPC 端口请求欺骗权限提升漏洞"
updated = "2026-06-16T21:50:56.313"

