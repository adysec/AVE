[basic]
description = "Solstice Backup（太阳微系统公司的备份软件）中的 recover 恢复程序存在本地安全漏洞。该程序在恢复文件时未对目标路径与文件权限进行充分校验，导致本地已登录的普通用户可以利用 recover 将原本无权访问的敏感文件（如其他用户或系统受保护文件）恢复到自己可读取的位置，从而越权获取敏感信息。该漏洞影响运行 Solstice Backup 软件的本地系统，攻击条件为攻击者需在目标主机上拥有合法的本地账户并能够执行 recover 程序，利用方式即通过该程序恢复本不应被其访问的敏感文件。"
published = "2000-01-01T05:00:00.000"
remediation = "建议升级 Solstice Backup 至 Sun 官方发布的最新修复版本（应用相应安全补丁）。同时收紧 recover 程序的文件权限，限制普通用户对 recover 的执行权限，并对备份数据启用严格的访问控制列表（ACL），确保仅授权管理员可恢复敏感文件，防止本地用户越权还原受保护数据。"
score = 2.1
severity = "LOW"
sources = ["cve"]
title = "Veritas Solstice Backup 本地敏感文件恢复漏洞"
updated = "2026-06-16T21:50:56.200"

