[basic]
description = "Internet Information Server（IIS）的 ASP 缓存机制存在信息泄露漏洞。当两个虚拟服务器共享同一物理目录时，ASP 缓存未正确隔离不同站点的缓存数据，远程攻击者可通过发送特制 HTTP 请求访问共享目录下的缓存内容，获取其他虚拟站点的敏感信息（如源代码、配置数据等）。该漏洞影响 IIS 多站点共享目录的部署场景，CVSS 评分 5.0，危害等级中危。"
published = "1999-01-27T05:00:00.000"
remediation = "升级至 IIS 5.0 或更高版本以修复 ASP 缓存隔离缺陷。确保每个虚拟主机的根目录指向独立的物理路径，避免多个站点共享同一目录。同时安装 Microsoft 安全更新 MS98-004 及后续所有 IIS 累积补丁。如无法升级，可在 IIS 管理器中禁用 ASP 缓存功能（修改 AspCache 注册表项为 0）作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Microsoft IIS ASP 缓存信息泄露漏洞"
updated = "2026-06-16T21:48:12.237"

