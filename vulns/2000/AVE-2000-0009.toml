[basic]
description = "FTPPro 客户端将敏感信息以明文形式存储在本地文件中，本地用户可直接读取这些文件获取敏感数据。该漏洞源于程序未对存储的认证凭据、配置信息等敏感数据进行加密保护，导致拥有本地系统访问权限的攻击者可通过文件系统直接查看明文内容。攻击条件要求攻击者已具备目标主机的本地登录权限，利用方式为遍历 FTPPro 配置目录读取存储敏感信息的文件。漏洞影响 FTPPro 所有受影响版本，CVSS 评分 2.1，属于低危本地信息泄露漏洞。"
published = "1999-12-26T05:00:00.000"
remediation = "升级 FTPPro 至官方已修复的后续版本（建议联系厂商获取 2000 年后发布的安全版本），并将软件存储的敏感信息由明文改为加密保存。在无法立即升级时，应限制 FTPPro 所在主机的本地用户访问权限，使用文件系统权限（如 chmod 600）收紧配置文件读写范围，避免非授权用户读取明文敏感数据。"
score = 2.1
severity = "LOW"
sources = ["cve"]
