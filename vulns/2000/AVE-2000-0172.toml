"Corel Linux OS 1.0 中的 setxconf 工具存在本地权限提升漏洞。当使用 -T 参数调用 setxconf 时，程序会以 root 权限执行用户家目录下的 .xserverrc 文件。本地攻击者可以通过在 .xserverrc 文件中写入恶意命令，从而获得 root 权限，完全控制目标系统。攻击条件为拥有本地 shell 访问权限。"
