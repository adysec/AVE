[basic]
description = "True North Software Internet Anywhere Mail Server 2.3.x 的 POP3 邮件服务存在缓冲区溢出漏洞。远程攻击者可通过向该服务的 110 端口发送超长用户名，触发栈缓冲区溢出，可导致服务崩溃（拒绝服务）或在目标系统上执行任意命令。该漏洞无需身份认证即可利用，攻击门槛较低。受影响的版本为 Internet Anywhere Mail Server 2.3.x 系列。"
published = "1999-10-01T04:00:00.000"
remediation = "立即将 Internet Anywhere Mail Server 升级至最新可用版本，若厂商已停止维护（该软件发布于 2000 年前后），建议迁移至仍在维护的邮件服务器软件（如 Postfix、Microsoft Exchange 或 hMailServer）。临时缓解措施：在防火墙上限制 POP3（110 端口）的访问来源，仅允许可信客户端 IP 连接，降低远程攻击者发送超长用户名触发溢出的风险。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "True North Software Internet Anywhere Mail Server 缓冲区溢出漏洞"
updated = "2026-06-16T21:50:49.750"

