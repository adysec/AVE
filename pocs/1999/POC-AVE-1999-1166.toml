[info]
author = "ave"
description = "Eicon Networks DIVA LAN ISDN Modem 1.0/2.0 HTTP 管理接口 login.htm 页面中 password 参数存在缓冲区溢出漏洞。远程攻击者无需认证即可向该页面发送超长密码字符串，导致设备死机或重启。检测目标 login.htm 页面确认设备存在此漏洞。"
id = "POC-AVE-1999-1166"
name = "Eicon DIVA ISDN Modem login.htm 远程拒绝服务 PoC"
severity = "high"
tags = ["ave-1999-1166"]
vuln_id = [
    "CVE-1999-1533",
    "AVE-1999-1166",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/login.htm"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["password"]
