[basic]
description = "通达OA（通达信科办公自动化系统）存在敏感信息泄露漏洞，由于部分接口未对访问权限进行有效校验，导致未授权的远程攻击者可直接访问特定URL路径获取系统敏感数据，包括但不限于用户列表、组织架构、数据库连接配置、日志文件等内部信息。攻击者无需登录即可利用该漏洞，攻击复杂度低，可为进一步渗透提供信息支撑。该漏洞影响通达OA多个版本，建议用户及时更新至最新版本并配置访问控制策略。"
published = "0705"
remediation = '立即将通达OA升级至 V13.5 最新版（修正合集 13.5.260318），通过系统管理→定时任务设置开启自动更新，或手动执行 MYOA\bin\OfficeAuto.exe 进行更新。同时，在 Web 服务器（IIS/Apache/Nginx）配置中禁止目录浏览，限制 /inc/、/config/、/attachment/、/log/ 等敏感目录的直接 HTTP 访问，删除不必要的备份文件（如 .sql、.bak、.zip）和安装目录 /install/，并在系统管理→系统参数设置中关闭调试模式与详细错误回显。'
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "通达OA 敏感信息泄露漏洞"
updated = "0705"

