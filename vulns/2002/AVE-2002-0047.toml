[basic]
description = "Net-SNMP（原 ucd-snmp）软件包 5.0.1 至 5.0.5 版本的 SNMP 守护进程中，snmp_agent.c 文件的 handle_var_requests 函数存在空指针解引用漏洞。未经认证的远程攻击者可通过向目标系统发送特制的 SNMP 请求触发该漏洞，导致 SNMP 守护进程崩溃，造成拒绝服务。该漏洞影响范围广泛，攻击复杂度低，无需任何身份验证即可远程利用。"
published = "2002-10-11T04:00:00.000"
remediation = "升级 Net-SNMP 至 5.0.6 或更高版本（当前最新为 5.9.4）。Red Hat 用户应安装 RHSA-2002:228 提供的更新包。临时缓解措施：在防火墙上限制 SNMP 服务（UDP 161 端口）仅允许可信来源访问，或在 snmpd.conf 中配置访问控制列表（com2sec/group/view 指令）限制可查询的 MIB 范围。"
score = 5
severity = "MEDIUM"
sources = ["osv"]
title = "Net-SNMP SNMP守护进程拒绝服务漏洞"
updated = "2026-06-16T21:58:52.313"

