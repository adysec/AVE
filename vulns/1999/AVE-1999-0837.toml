[basic]
description = "思科缓存引擎存在访问验证缺陷，远程攻击者可通过提交空用户名和密码绕过身份认证机制，未经授权访问系统管理接口或敏感配置信息。该漏洞影响早期版本的 Cisco Cache Engine 设备，攻击者无需任何凭证即可利用此漏洞，导致设备管理权限遭非法获取。CVSS 评分 2.6，危害等级低，建议升级到不受影响版本或配置访问控制列表加以缓解。"
published = "1999-12-16T05:00:00.000"
remediation = "建议立即升级至 Cisco 替代产品（如 WAAS），该产品已修复空认证绕过漏洞。作为临时缓解措施，在边界防火墙上对缓存引擎管理端口（80/443）设置 ACL 限制仅允许受信管理 IP 访问，并启用 TACACS+ 或 RADIUS 强认证替代本地认证。"
score = 2.6
severity = "LOW"
sources = ["cve"]
title = "Cisco 缓存引擎访问验证漏洞"
updated = "2026-06-16T21:49:29.860"

