[basic]
description = "Microsoft Windows 95/98/NT 4.0 系统中 autorun.inf 功能存在代码注入漏洞。当系统访问非可移动介质时，会自动执行该介质根目录下的 autorun.inf 文件，本地攻击者可通过在共享驱动器或网络驱动器上放置恶意的 autorun.inf 文件，指定替代程序执行，从而在其他用户访问该驱动器时触发恶意代码。该漏洞影响 Windows 95/98/NT 4.0 版本，CVSS 评分 7.2，危害等级高。攻击者需要本地访问权限，利用难度较低。"
published = "2000-02-18T05:00:00.000"
remediation = '在 Windows NT 4.0 中，将注册表 `HKLM\Software\Microsoft\Windows\CurrentVersion\Policies\Explorer\NoDriveTypeAutoRun` 值设为 `0xFF` 以禁用所有驱动器的自动运行功能；在 Windows 95/98 中，在 `HKEY_LOCAL_MACHINE\Software\Microsoft\Windows\CurrentVersion\Policies\Explorer` 下新建 DWORD 值 `NoDriveTypeAutoRun` 并设为 `255`。由于这些系统已停止支持，建议升级至 Windows 10/11 并保持系统更新，同时在组策略中启用「关闭自动播放」策略。'
score = 7.2
severity = "HIGH"
sources = ["cve"]
title = "Microsoft Windows 95/98/NT autorun.inf 本地代码执行漏洞"
updated = "2026-06-16T21:51:06.887"

