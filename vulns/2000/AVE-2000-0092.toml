[basic]
description = "Debian 2.1 系统中 APC 电源管理守护进程 apcd 存在符号链接漏洞。由于该程序以 root 权限运行且在处理临时文件时未充分验证文件路径的真实性，本地攻击者可通过在临时目录中创建指向任意系统文件的符号链接，诱使 apcd 进程将数据写入目标文件，从而实现任意文件修改。该漏洞允许低权限的本地用户提升权限或破坏系统关键文件，危害等级高危，攻击者需要拥有本地系统访问权限。"
published = "2000-02-01T05:00:00.000"
remediation = "立即将 apcd 软件包升级至 0.6a.nr-5 及以上版本（2000-02-01 Debian 安全公告），该版本修复了临时文件创建时的竞态条件，使用 O_EXCL 标志防止跟随符号链接。如无法升级，建议在 /tmp 目录设置粘滞位（sticky bit）或禁用 apcd 服务作为临时缓解。"
score = 7.2
severity = "HIGH"
sources = ["epss"]
title = "Debian apcd 符号链接漏洞"
updated = "2026-06-16T21:51:00.917"

