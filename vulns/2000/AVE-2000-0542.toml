[basic]
description = "mgetty 软件包中的 faxrunq 和 faxrunqd 组件存在符号链接遍历漏洞。本地攻击者可通过在 /var/spool/fax/outgoing/ 目录下创建指向目标文件的符号链接 .last_run，利用该漏洞以受影响进程的权限创建或修改系统任意文件，实现本地权限提升。该漏洞影响 mgetty 1.1.19 至 1.22.8 版本，CVSS 评分 2.1，危害等级低，需本地访问权限方可利用。"
published = "2000-10-20T04:00:00.000"
remediation = "升级 mgetty 至 1.1.22 或更高版本，该版本修复了 faxrunq/faxrunqd 在处理 /var/spool/fax/outgoing/.last_run 时未正确检查符号链接的问题。如无法升级，可移除 faxrunq 和 faxrunqd 的 setuid 权限（chmod -s /usr/sbin/faxrunq /usr/sbin/faxrunqd）作为临时缓解措施。"
score = 2.1
severity = "LOW"
sources = ["cve"]
title = "Gert Doering mgetty faxrunq/faxrunqd 本地符号链接遍历漏洞"
updated = "2026-06-16T21:52:16.667"

