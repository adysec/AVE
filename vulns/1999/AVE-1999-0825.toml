[basic]
description = "Microsoft Windows NT 4.0（含 SP1 至 SP5）的注册表允许未通过身份认证的远程用户借助空会话（Null Session）建立匿名连接并远程访问注册表数据，而无需具备管理员权限。该漏洞影响所有启用默认安全配置、开放 139/445 端口且允许空会话连接的 Windows NT 4.0 系统。攻击者只需与目标主机建立空会话（无需用户名与口令），即可通过远程注册表服务读取、枚举甚至修改敏感配置信息，进而获取系统账户、共享及服务配置等关键信息，为进一步的权限提升与入侵创造条件。"
published = "1997-01-01T05:00:00.000"
remediation = '安装 Microsoft Windows NT 4.0 Service Pack 4 及以上版本补丁，在注册表 HKEY_LOCAL_MACHINE\SYSTEM\CurrentControlSet\Control\LSA 中将 RestrictAnonymous 设为 1（或 2）以禁止空会话枚举，并停止/禁用"Remote Registry"服务（将启动类型改为禁用），同时在边界防火墙阻断 TCP 139/445 端口的入站连接作为临时缓解。'
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = '{"_meta":{},"stopReason":"end_turn","usage":{"inputTokens":10853,"outputTokens":21,"totalTokens":10874}}'
