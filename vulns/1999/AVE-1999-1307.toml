[basic]
description = "FLEXlm许可证管理器（如6.0d版本）的默认配置存在严重的安全缺陷。远程攻击者无需身份认证即可通过发送包含lmdown命令的特制数据包，向目标FLEXlm许可服务器发起关闭请求。由于该命令的认证机制仅基于客户端自称具有root权限的信任模型，攻击者只需构造符合协议格式的请求报文，即可远程终止许可证管理服务，造成合法用户无法获取授权，进而导致依赖该许可的软件产品无法正常运行。该漏洞影响运行FLEXlm许可证管理器的各类工程软件、CAD工具及商业应用程序服务器，攻击者无需获取目标系统权限即可实现服务中断。"
published = "1998-09-25T04:00:00.000"
remediation = "升级 FLEXlm 许可管理器至 7.0 及以上版本（建议 11.x 最新版）。在新版中编辑许可服务配置文件，移除或不授予 `lmdown` 权限（使用 `lmgrd -z` 禁止远程关闭，或在 options 文件中删除 ADMIN 对应的关闭权限），并将 lmgrd 监听端口（默认 27000-27009）通过防火墙限制为仅允许可信内网 IP 访问，禁止公网直接连接。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "FLEXlm许可管理器远程服务器关闭漏洞"
updated = "2026-06-16T21:49:36.637"

