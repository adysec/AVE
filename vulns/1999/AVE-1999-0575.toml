[basic]
description = "Samba 是一款在 Linux/Unix 系统上实现 SMB/CIFS 协议的开源文件与打印共享服务软件。其核心守护进程 smbd 在处理客户端发送的畸形消息命令（message command）时存在缓冲区溢出漏洞。远程攻击者可构造超长或格式异常的消息命令数据包发送至开放 139/445 端口的 smbd 服务，触发栈缓冲区溢出，从而导致服务崩溃拒绝服务，在特定条件下甚至可执行任意代码并获得系统权限。该漏洞无需认证即可利用，威胁范围覆盖 2.0.5 之前的多个 Samba 版本。"
published = "1999-07-21T04:00:00.000"
remediation = "建议立即升级 Samba 到 2.0.5 或更高版本，该版本已修复 smbd 程序处理畸形消息命令时的缓冲区溢出问题。如无法立即升级，应通过防火墙限制对 139/445 端口的访问，仅允许可信主机连接 SMB 服务，并在 smb.conf 中配置 hosts allow 白名单以减小攻击面。"
score = 5.0
severity = "MEDIUM"
sources = ["epss"]
title = "Samba smbd 畸形消息命令缓冲区溢出漏洞"
updated = "2026-06-16T21:49:06.360"

