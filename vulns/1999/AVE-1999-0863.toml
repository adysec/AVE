[basic]
description = "AIX named-xfer 组件存在文件覆盖漏洞，系统组成员可通过 -f 参数指定恶意构造的区域文件，利用 named-xfer 处理区域传输时的权限缺陷覆盖任意系统文件，进而实现本地提权至 root。该漏洞影响 AIX 4.1.5 和 4.2.1 版本，攻击者需具备系统组权限并能访问 named-xfer 程序，通过精心设计的畸形区域文件触发漏洞，CVSS 评分 7.2，属于高危本地提权漏洞。"
published = "1999-09-23T04:00:00.000"
remediation = "建议升级 AIX 至 IBM 官方修复版本（4.3.2 或更高），或安装 IBM 针对 named-xfer 发布的 APAR 补丁（IX72659）。若无法立即升级，可移除 named-xfer 的 setuid/setgid 权限（chmod u-s,g-s /usr/sbin/named-xfer），并限制 system 组成员，禁止普通用户通过 -f 参数指定任意区域文件路径。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
