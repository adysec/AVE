[basic]
description = "这是一个影响 Oracle AIX 系统的 Web 监听服务漏洞。Oracle Web Listener for AIX 4.0.7.0.0 和 4.0.8.1.0 版本存在安全弱点，攻击者无需身份验证即可通过向目标系统发送特制的恶意 URL 包触发拒绝服务条件。该漏洞利用于 Web 监听器异常终止或重启，导致相关 Web 服务无法正常响应和处理请求。漏洞影响范围广泛，涵盖 4.0.7.0.0 和 4.0.8.1.0 两个版本的所有 AIX 平台。攻击过程相对简单，只需发送精心构造的无效 URL 即可触发漏洞。当前已知 CVSS 评分 5.0（MEDIUM 等级），为低复杂度网络攻击类型，不需要任何权限即可远程触发。对此漏洞的安全措施包括避免向系统中发送非标准 URL 请求，以及及时升级到 Oracle 为 AIX 系统发布的补丁支持版本。Oracle 已经在 2024 年 8 月的安全更新中发布了修复漏洞的补丁包，建议相关用户尽快更新系统版本。 (CVE-2000-0576)"
published = "2000-07-05T04:00:00.000"
remediation = "建议立即升级 Oracle Web Listener 至 4.0.8.2.0 或更高版本，或应用 Oracle 官方安全补丁 (Oracle Critical Patch Update 2000年10月版)。若暂时无法升级，可在网络层面配置防火墙规则拦截异常 URL 请求（如包含超长路径、异常字符的请求），或在 Web 服务器前端部署 WAF 规则拦截异常 URL 请求作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Oracle Web Listener URL 拒绝服务漏洞"
updated = "2026-06-16T21:52:02.060"

