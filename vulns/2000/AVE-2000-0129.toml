[basic]
description = "Axis 700 Network Document Server 存在路径遍历安全绕过漏洞。攻击者可通过在 URL 中构造 `..`（点点）序列绕过管理员密码认证，直接访问受保护的配置页面和管理接口。该漏洞源于服务器未对用户请求的 URL 路径进行充分的规范化校验，导致目录遍历攻击可被利用。成功利用此漏洞可导致设备配置泄露或未授权修改，影响 Axis 700 系列网络扫描仪设备。CVSS 评分 7.5，危害等级高。"
published = "2000-02-07T05:00:00.000"
remediation = "Axis 700 Network Scanner 已停产且不再受支持，建议立即将该设备从可公开访问的网络中隔离，仅允许受信任的内部 IP 访问设备管理界面；在防火墙或反向代理层面限制对设备管理 URL（如 /admin/*）的访问，并启用 HTTP 基本认证之外的额外访问控制层；如业务允许，建议更换为仍在厂商支持周期内的替代型号。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "Axis 700 网络扫描仪 安全绕过漏洞"
updated = "2026-06-16T21:51:05.503"

