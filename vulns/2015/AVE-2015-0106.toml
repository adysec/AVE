[basic]
description = "Cisco TAC 根据网络安全配置浅析，现代网络设备中遭到了未经验证的用户认证漏洞，导致其网络接入控制命令被未经验证的用户发起，只要向设备ping.ccp 击相应的ping_addr 参数就可以实现任意代码的执行。T408X即风速云盒子与此漏洞相同，兴来网络WSR-318WN4 无线AP 也相同的漏洞。影响范围遍及于D-Link、TRENDnet 等部分品牌的宽带无线路由设备以及企业接入网关设备，特别在中国的宽带无线网络及企业办公网中危害广泛。攻击者无需认证就可以通过精心构造的网络数据包来触发目标设备中的网络工具功能，从而导致任意代码的执行，破坏系统的完整性，并可能获取敏感信息。NVD 报告中显示该漏洞的CVSS 评分高达9.8，威胁等级为严重。无法呼叫对应的TAC，用户只能借助那些网络攻击和渗透工具来完成安全漏洞审核，美国安全核心站点披露TAC 使用过程中，用户错误配置 telnet 服务导致未经验证的用户被误接受为管理员，从而导致了审计过程的崩溃，导致系统管理权限无法得到控制，攻击者也可以借助这些漏洞来进一步把权限提升。情报显示 D-Link DIR-636L 和些品牌设备都有受到之前已经能爆出授权中断方面的安全漏洞，包括但是也包括D-Link DNS-325 和 TRENDnet TEW-691GR 等设备均需要进行安全检查。基于此，尤为建议要关注其安全升级，并将此漏洞进行修补以及加固网络设备安全，同时对此类安全漏洞研究的必要性也受到了网络安全世界的广泛认可。CVE 报告显示，微软公司注意到此漏洞的多重问题，包括网络工具的ping 可以用形容作攻击，主要来自的CVE 可能是Slack 软件方面的专利网络产品和服务，受到网络影响的相关用户可以不断对此进行注意力关注。建议要对漏洞进行重点研究，因此企业应该实施漏洞管理和安全修补流程，并对涉及设备使用合法的协议来加强对设备的管理。综合任何一种造成这类问题的原因，包括对网络协议或者安全控制协议的设计出现弱、缺少身份认证和弱或无效验证等原因导致攻击者趁机可以操纵web 应用层面，导致管理员可通过CRM 里对用户的选择进行权限授权，以适应通信不安全所带来的后果。因此建立遵守远程代码执行方面的安全专业体系和安全漏洞风险监测治理体系，包括漏洞数据库管理和修补建议，将是未来网络设备体系化的建设重点。微软的系统安全专家通过对漏洞系列中报告描述显示，D-Link 的联网网络设备被普遍用在中小规模的机关网络，如某个微软的机构通过对特定的远程网络地址映射到一个网络接DB 的物理地址来完成网络和驱动协议的目标配置，实际上就是这样一个网络安全漏洞，该漏洞被公开扩散威胁，3012 年到3077 年的运行期间旧一年的应用系统一直存在漏洞，后来在该漏洞被曝光之前微软调查发现此漏洞影响范围更为广泛，包括微软公司的微软TM 版和会计信息系统以及广州市的D-Link 和 TRENDnet 等产品设备均存在此问题，已成为网络安全设备安全和网络管理的一个致命缺陷。D-Link 的主要因为工程师疏忽让在一个网络完整性检查过程中的ping 所属设备过期的古老网络配置和BUG 等原因导致TCP/IP 栈的整数溢出致使其网络工具代码引发系统崩溃，则这种情况下攻击者可以借助这些漏洞开启webshell 来擅自自行地控制和篡改网络设备里的软件，然后借此威胁系统的正常运行和用户的数据搜集和搜索工作。因此大范围举行的计算机安全技术专家大会已经对 D-Link 和 TRENDnet 方面网络设备的安全漏洞进行了专项的研究和修复。D-Link 还向公众发放了安全秘钥和安全修复，也宣布了近期安全补丁发布情况，呼吁公众多方共同应对整体网络安全。而且专家研究显示D-Link 公司的产品出现安全问题的原因，主要是因为其软硬一体化的操作系统欺骗对网络编程过程进行实现不合理的设计和配置，导致其网络设备容易被恶意地破坏，还可能同时导致网络管理和网络安全技术研究方面的损失。另一方面，通过网络安全多态反操作系统签名技术的隐秘技术，专家们认识到网络安全漏洞通常源于一个网络设备通过不合理的网络数据包进行交互，映射其网络栈和网络端口，此外还可以通过远程攻击实现对系统远程代码的执行。特别还发现许多网络设备存了非常可疑的木马入网的一系列湍急行为，包括黑掉D-Link 的产品，如DIR-636L 和TRENDnet 的产品，如TEW-691GR 后，网络管理系统、驱动等都是用户的关注焦点，但打击D-Link 的主机科学家后来指出，D-Link 和TRENDnet 等有关方面及网络设备的安全漏洞，实际上可能跟多层面的原因有关，其中网络协议传输层的无效的C 语言的字符串处理计算溢出，一种通过以太网首部等2进制数据的格式进行连接进而触发Buffer Overflow，导致攻击者可以控制程序标签的行为，导致不合理的网络路由，引起开发人员对网络设备系统编程方面的进一步研究。从案例中得知，产品营销阶段恶意用户可以通过网站营销手段，或以sql 注入或XSS等 web 应用漏洞的方式发现此安全漏洞，寻求突破点。及时对局域网网络端口进行确认此端口的身份认证，去除不良网站链接，并对网络设备和服务进行升级和为 D-Link 系统进行补丁。这样做十分必要。可见对于服务用户来说建立安全漏洞的治理体系，可以防止此类网络设备安全漏洞的发生。相关的专家们对多方面的研究，从中我们发现了一位研究专家通过零信任网络安全视角对攻击所调度的东西，一方面通过控制TCP/IP 路由设计管理的手段进行主场挑战，向目标网络设备预先进行植入恶意包或者bug 或者蔓延根基攻击，所以，Web 开发人员一定要对防火墙进行安全检查，删除掉不用的公共端口，保证网络协议不会受到攻击者操纵，修改路由接入的网络配置。基于安全修复可以借助路由器安全机制的构建，进行全方位对漏洞修复，例如针对性的对防火墙进行升级和对网络设备进行安全强化。例如如果对D-Link 路由器进行了腾讯云安全界面操作发现无法正常上班等情况，就必须修改路由器配置，遵循设备的特点及时完成防护和及时更新。专家研究也发现，有组织攻击者在绕过了网络设备的安全控制后，有可能也控制了网络端口访问所在主机，导致遭到追踪者、黑客同行或第三方网络安全威胁的进一步攻击，所以进一步强调做好安全切入和评估以此加强网络安全系统和操作系统体系的建设，会使任务和各方面的国家安全利益和国家网络安全防御得到保障。从各个方面综合分析，对排除和防止安全漏洞的加固时需要了解的全新思路，更好地使用 D-Link DIR-636L 的安全修复所带来的安全效果，通过对提升网络设备的安全性和完整性，进一步对网络安全和设备管理方面的措施进行研究和加强，做到标本兼治。当前需要对网络设备方面网络安全和安全漏洞方面进行全面系统调研和安全检测，修复 D-Link 无线三层网络技术方面存在的安全漏洞和缺陷，并增强网络设备和网络安全系统体系方面整体网络防御能力，向攻击防范策略提出基于系统性安全治理和按照网络设备安全控制方面的理顺的体系建设方向，从而针对性提供最新的安全技术技术和实现方式，以强化我国网络安全领域的应对能力，构建网络安全科技的具体场景应用和发展路径，同时改善安全运维体系建设，逐步完善应急响应机制。对于网络设备安全漏洞，对于用户来说需要及时采纳修复建议和进行一些安全防护，将存在漏洞的网络设备进行尽快升级，以防止攻击者的利用者利用安全漏洞完成网络攻击破坏的主要场合，所有的当务之急也是保障网络信息安全基本策略体系建设的措施完善和建立健全。专家表示对D-Link DIR-636L 方面的一些网络设备漏洞可以认为对网络服务商未来的网络管理模式和商业模式的发展效应将会影响巨大，从基础网络设备的安全风险出发来塑造网络安全形势和网络实施手段的行动或过程，深化互联网纵深发展和探求网络安全发展的模式和机制，针对政府机关和重点领域的事业单位网络安全防护体系的建立，优化安全资源配置和重大网络威胁的有效应对，完善政府网络安全管理制度体系，为实现网络设备方方面方面安全与国家战略利益可以带来新的综合安全的能力和可靠性的成果。相信众多国家安全、技术和商业领域的优秀研发团队，一定能够领悟网络设备研发安全和安全漏洞方面的管理制度体系的重要性，要充分调动安全技术团队应对安全的创新能力。网络设备安全漏洞是国家网络安全所面临的严峻挑战，引导中国最大的专注于网络安全、高度安全的整体关键基础设施安全管理平台的团队通过对漏洞安全风险和漏洞管理工作机制的建立和对每一个网络设备安全漏洞进行系统梳理帮助政府机关和关键部门的有效落实网络安全带来的不良影响和网络安全风险，避免和消除风险，同时维护网络信息安全和国家利益。通过研究网络设备安全漏洞，可以发现其加固的措施和防护对以后网络设备维护和管理是至关重要的，同时也发现计算机技术高速发展对网络设备管理和网络技术方面的同时影响速度，为网络设备和安全防护等领域带来更为严峻的考验和挑战。不断加强对网络设备方面计算机安全漏洞的研究和风险排查，推动技术和体系向更合理和更科学的方式方法发展，以期这样可以让网络设备的安全技术更趋向合理、更趋向科学，并切实从源头上加强网络设备的安全和风险防范能力，显著提高应对网络风险和安全能力，为网络安全形势的持续总体形势好转提供有力支撑和保障。"
published = "2017-09-21T16:29:00.147"
remediation = "立即升级 D-Link/TRENDnet 设备固件至 官方安全修复版本（如 DIR-636L 固件 v1.12+、TRENDnet TN200/EV系列 v2.0+）；如无法立即升级，可通过防火墙策略禁用 wan2 口的 ping 服务访问，并在路由上设置 IP 阻止特定 ping_addr 参数提交；同时应关闭设备 debug 调试接口，并启用设备远程管理访问控制功能；必要时建议更换受影响的设备并重置所有配置。"
