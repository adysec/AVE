[basic]
description = "润乾报表（Runqian Report）存在任意文件写入漏洞，其文件上传或报表处理相关接口未对写入路径与文件内容进行严格校验，导致未经身份认证的远程攻击者可通过构造恶意的请求参数，将任意内容写入目标服务器的指定路径（如 Web 目录下的脚本文件）。成功利用后，攻击者可写入 JSP/WebShell 等可执行文件，从而在特定条件下实现远程代码执行（RCE）。该漏洞影响部署了存在缺陷版本润乾报表的各类应用系统，攻击条件为攻击者能够网络访问目标报表服务且相关接口对外开放，危害程度较高，建议尽快排查并升级至官方修复版本。"
published = "0709"
remediation = "立即升级润乾报表至官方已修复该任意文件写入漏洞的安全版本（建议联系厂商获取 2025 年最新补丁包并升级到 V5.8 及以上版本）。临时缓解措施：在应用服务器前端部署 WAF 规则限制对报表上传/保存接口的路径遍历与非常规后缀写入，将报表文件存储目录设为只读并禁止执行权限，同时限制相关业务端口仅对内网开放。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "润乾报表任意文件写入漏洞"
updated = "0709"

