[basic]
description = "Netscape Enterprise Server 3.5.1 及 3.6 版本的搜索引擎默认配置存在信息泄露漏洞。远程攻击者无需身份认证，通过向服务器发送特制的搜索请求（使用 HTML-tocrec-demo1.pat 模式文件），即可读取服务器上 JHTML 文件的源代码。该漏洞源于默认配置未对搜索功能进行适当的访问限制，导致敏感源代码被暴露。攻击者可利用泄露的源代码进一步分析应用逻辑，发现其他潜在安全缺陷。该漏洞影响 Netscape Enterprise Server 3.5.1 及可能更早版本，CVSS 评分 5.0，危害等级中危。"
published = "1999-07-30T04:00:00.000"
remediation = "建议升级至 Netscape Enterprise Server 4.0 及以上版本，或迁移至现代 Web 服务器（如 Apache/Nginx）。如无法升级，可删除或重命名默认搜索模式文件 `HTML-tocrec-demo1.pat`，并禁用搜索功能以阻止源码泄露。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Netscape Enterprise Server JHTML 源代码泄露漏洞"
updated = "2026-06-16T21:49:47.070"

