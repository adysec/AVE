[info]
author = "ave"
description = "SalesLogix eViewer 1.0 的 /scripts/slxweb.dll/admin 管理接口未经验证即可直接访问。远程攻击者可通过该接口执行 shutdown 命令使 slxweb.dll 进程崩溃，导致 eViewer 服务拒绝服务。验证方法来源于 Tenable NASL 脚本公开检测逻辑。"
id = "POC-AVE-2000-0247"
name = "SalesLogix eViewer slxweb.dll 管理接口未授权访问 PoC"
severity = "medium"
tags = ["ave-2000-0247"]
vuln_id = [
    "CVE-2000-0278",
    "AVE-2000-0247",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/scripts/slxweb.dll/admin"
protocol = "http"

[[poc.requests.matchers]]
expect = true
status = [200]
type = "status"
