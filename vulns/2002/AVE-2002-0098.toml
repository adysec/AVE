[basic]
description = "Cacti 0.6.8 之前版本存在敏感信息泄露漏洞，其 config.php 文件以明文存储 MySQL 数据库用户名和密码，且该文件权限设置为全局可读（world-readable）。本地攻击者可通过读取该配置文件获取数据库凭据，进而以 Cacti 用户身份修改数据库内容，可能导致权限提升或数据篡改。该漏洞利用条件为攻击者需拥有目标系统的本地访问权限。"
published = "2003-04-22T04:00:00.000"
remediation = "升级 Cacti 至 0.6.8 或更高版本，该版本已修复 config.php 中明文存储 MySQL 密码的问题。升级后执行 chmod 640 config.php 限制配置文件权限仅允许 Web 用户和 root 读取，并修改 MySQL 账户密码。如无法升级，立即执行 chmod 640 config.php 并移除文件中的数据库密码，改用环境变量或受限配置文件存储凭据。"
score = 4.6
severity = "MEDIUM"
sources = ["osv"]
title = "Raxnet Cacti 配置文件敏感信息泄露漏洞"
updated = "2026-06-16T21:59:24.310"

