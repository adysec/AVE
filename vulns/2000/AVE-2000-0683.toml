[basic]
description = "Inter7 公司 vpopmail 中的 vchkpw 程序在调用 syslog 时未对用户可控的格式化字符串进行清理，存在格式化字符串漏洞。远程攻击者可通过向目标邮件服务器的 110 端口发送包含特制格式化指令的 USER 或 PASS 命令，利用该漏洞触发拒绝服务。该漏洞影响 vpopmail 4.8 之前版本，CVSS 评分 5.0，危害等级中等。"
published = "2000-06-30T04:00:00.000"
remediation = "升级 vpopmail 至 4.8 或更高版本，该版本已修复 vchkpw 对 syslog 调用中格式串未清理的问题。如无法立即升级，可在防火墙或应用层限制对 vpopmail 服务端口的访问，仅允许可信 IP 连接以降低攻击面。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Inter7 vpopmail vchkpw 格式化字符串拒绝服务漏洞"
updated = "2026-06-16T21:52:02.937"

