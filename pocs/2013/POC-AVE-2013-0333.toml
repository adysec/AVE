[info]
author = "AVE"
description = "检测目标是否受 Microsoft Silverlight 5.1.20913.0 之前版本的指针验证漏洞影响。通过部署包含恶意 Silverlight XAP 应用的 HTML 页面，利用 ScriptObject.Initialize() 方法中不安全的指针解引用，触发敏感信息泄露。PoC 基于 Metasploit 公开模块实现，需配合 XAP 文件使用。"
id = "POC-AVE-2013-0333"
name = "CVE-2013-3896 Microsoft Silverlight 指针验证信息泄露漏洞 PoC"
severity = "medium"
tags = ["ave-2013-0333"]
vuln_id = [
    "CVE-2013-3896",
    "AVE-2013-0333",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["Silverlight"]
