[basic]
description = 'MetaProducts Offline Explorer 1.0.x/1.1.x/1.2.x 版本存在目录遍历漏洞，远程攻击者无需身份认证即可通过发送包含 ".." (点点) 序列的特制 HTTP 请求，绕过目录限制读取服务器文件系统上的任意文件。该漏洞源于软件对用户输入的路径参数缺乏有效过滤和规范化验证，攻击者可利用相对路径遍历序列访问 Web 根目录之外的敏感文件，如系统配置文件、源代码或数据库文件。漏洞影响 Offline Explorer 1.2 及更早版本，CVSS 评分 5.0 (AV:N/AC:L/Au:N/C:P/I:N/A:N)，属于中等严重度漏洞，攻击复杂度低、无需认证、仅影响机密性。攻击者可通过构造包含 ../ 序列的 URL 请求实现任意文件读取，可能导致敏感信息泄露。MetaProducts 官方已发布更新版本修复此漏洞，建议用户升级至 1.3 或更高版本。'
published = "2000-05-19T04:00:00.000"
remediation = '建议立即升级 MetaProducts Offline Explorer 到 1.3 及以上版本（官方已修复目录遍历漏洞），可从 MetaProducts 官网下载最新版本并覆盖安装。如暂时无法升级，请在 Web 服务器/防火墙层面配置规则拦截包含 ../ 或 ..\ 的请求路径，并限制 Offline Explorer 服务的文件系统访问权限至指定目录，禁止访问 Web 根目录以外的文件系统路径。'
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "MetaProducts Offline Explorer 1.0.x/1.1.x/1.2.x 目录遍历漏洞 (CVE-2000-0436)"
