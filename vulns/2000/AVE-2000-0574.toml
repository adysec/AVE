[basic]
description = "CUPS（Common Unix Printing System）1.04及更早版本在处理CGI POST请求时存在缺陷，未经认证的远程攻击者可发送特制POST数据包，导致服务进程崩溃，造成拒绝服务。该漏洞影响所有运行受影响CUPS版本的Unix/Linux系统。"
published = "2000-06-21T04:00:00.000"
remediation = "升级至CUPS 1.1.4及以上版本，或应用厂商发布的安全补丁，限制对CGI接口的未授权访问。对于已停止支持的旧版本，建议升级至仍在维护的CUPS发行版。"
score = 5.0
severity = "MEDIUM"
sources = ["cve"]
title = "Easy Software Products CUPS CGI POST 请求拒绝服务漏洞"
updated = "2026-06-16T21:51:53.533"

