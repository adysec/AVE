[basic]
description = "Google Chrome 的 V8 JavaScript 引擎存在任意命令执行漏洞，攻击者可通过诱导用户访问特制的恶意网页，触发 V8 引擎中的内存破坏问题，从而在目标系统上执行任意代码。该漏洞影响 Google Chrome 多个版本，威胁程度较高，可能导致浏览器沙箱逃逸或系统被完全控制。建议用户及时更新至最新版本以修复此漏洞。"
published = "0702"
remediation = "立即将 Google Chrome 升级至最新稳定版（≥130.x），可通过「设置 → 关于 Chrome」自动检查更新。V8 引擎漏洞随 Chrome 浏览器更新修复，无法单独修补。如无法立即升级，可启用 Chrome 沙箱隔离（--enable-sandbox）并关闭 V8 JIT（--jitless）作为临时缓解，但会显著影响性能。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "Google Chrome V8 远程代码执行漏洞"
updated = "0702"

