[basic]
description = "Extent Technologies RBS ISP Web 服务器存在目录遍历漏洞，远程攻击者无需认证即可通过向 Image 参数发送包含 `../` 的恶意请求，绕过路径限制读取服务器上的任意敏感文件，如配置文件、密码文件等。该漏洞影响 Extent RBS ISP 2.5 版本，危害等级中等，攻击复杂度低，只需构造特制 HTTP 请求即可利用。"
published = "2000-12-11T05:00:00.000"
remediation = "升级 Extent RBS ISP 至 3.0 及以上版本，对用户输入的 Image 参数做严格过滤，移除 `../` 等目录遍历字符序列。如无法升级，在 Web 服务器前端部署反向代理或 WAF 规则，拦截包含 `../` 的请求。限制 Web 进程运行于低权限账号并启用 chroot 隔离，降低敏感文件泄露风险。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Extent Technologies RBS ISP 目录遍历漏洞"
updated = "2026-06-16T21:53:01.183"

