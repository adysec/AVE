[basic]
description = "ht://Dig 是一款开源的 Web 搜索引擎，其 CGI 程序 htsearch 在处理用户传入的参数时，未对反引号（`）进行过滤，直接将参数传递给 shell 执行。攻击者可在 Exclude、config、restrict 等参数中嵌入反引号包裹的文件路径，导致服务器执行任意 shell 命令，从而读取服务器上的任意文件，如 /etc/passwd 等敏感系统文件。攻击无需认证，仅需向目标服务器发送特制 HTTP 请求即可触发。"
published = "2000-02-29"
remediation = "ht://Dig 已停止维护，建议升级到最后一个版本 3.2.0b6 或迁移至其他仍在维护的搜索引擎方案。如无法升级，应在 Web 服务器层面禁用或移除 htsearch CGI 脚本，并对 CGI 参数进行严格的输入过滤，避免将用户输入直接传递给 shell 执行。"
score = 5.0
severity = "MEDIUM"
sources = [
    "cve",
    "exploitdb",
]
title = "ht://Dig htsearch CGI 任意文件读取漏洞"
updated = "2000-02-29"

