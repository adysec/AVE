[basic]
description = "Sun Microsystems Solaris 7 及 8 操作系统中的 CDE（通用桌面环境）dtmail 和 dtmailpr 程序存在缓冲区溢出漏洞。当本地用户通过 -f 选项向这两个程序传入超长参数时，会触发栈缓冲区溢出，攻击者可利用此漏洞以 root 权限执行任意代码，完全控制系统。该漏洞无需网络访问，本地低权限用户即可发起攻击，对系统机密性、完整性和可用性造成严重影响。"
published = "1999-11-30"
remediation = "应用 Oracle 或 Sun Microsystems 发布的安全补丁修复此漏洞。临时缓解措施：以 root 身份执行 chmod 755 /usr/dt/bin/dtmail /usr/dt/bin/dtmailpr 移除 setuid root 权限，阻止本地用户通过 -f 选项触发缓冲区溢出提权；或直接执行 chmod 0 禁用这两个二进制文件，改用其他邮件客户端。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "Sun Solaris CDE dtmail 与 dtmailpr 本地缓冲区溢出漏洞"
updated = "2026-06-16"

