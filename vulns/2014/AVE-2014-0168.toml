[basic]
description = "Microsoft Word 在处理特制 RTF 格式文档时存在对象混淆漏洞（CWE-787），由于对 RTF 文件中对象类型的验证不充分，攻击者可构造恶意的 RTF 文档，通过诱导用户打开触发内存破坏，最终实现远程代码执行。该漏洞影响 Microsoft Word 2003/2007/2010/2013 及 SharePoint Server、Office Web Apps 等多个版本，CVSS 评分 7.8，危害等级高。该漏洞已在 2014 年 3 月被 MiniDuke APT 组织在野利用，Microsoft 于 MS14-017 安全公告中修复。"
published = "2014-03-25T13:24:01.067"
remediation = "安装 Microsoft 2014 年 4 月安全更新 MS14-017 (KB2953092)，该更新修复了 Word RTF 解析器中的内存损坏问题。受影响版本包括 Word 2003 SP3、2007 SP3、2010 SP1/SP2、2013 及 2013 RT。如无法立即打补丁，可启用 Microsoft 增强缓解体验工具包 (EMET) 或通过组策略禁用 Word 打开 RTF 文件关联作为临时缓解措施。"
score = 7.8
severity = "HIGH"
sources = ["kev"]
title = "Microsoft Word RTF解析远程代码执行漏洞"
updated = "2026-06-17T00:05:31.070"

