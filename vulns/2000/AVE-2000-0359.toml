[basic]
description = "NetBSD 1.4.2 及更早版本存在 IP 时间戳选项拒绝服务漏洞。该漏洞原理为远程攻击者向目标系统发送包含未对齐 IP 时间戳选项的恶意数据包时，由于内核在处理带有非标准对齐方式的 IP 时间戳选项时缺乏充分验证，导致内核panic或服务崩溃，从而引发拒绝服务。影响范围包括 FreeBSD 3.4/4.0/5.0 以及 NetBSD 1.4.2 及更早版本系统。攻击条件为：攻击者具备网络可达性，且无需认证凭据即可完成攻击。攻击者仅需构造并发送一个包含未对齐 IP 时间戳选项的数据包即可触发漏洞，利用方式简单，可直接导致目标主机不可用或服务中断，对系统可用性造成严重影响。"
published = "2000-05-01T04:00:00.000"
remediation = "NetBSD 用户应立即升级至 NetBSD 1.4.2 或更高版本，FreeBSD 用户应升级至 FreeBSD 4.1-STABLE、5.0-CURRENT 修复版本或更高版本。如无法立即升级，可在边界防火墙或路由器上配置 ACL，过滤携带 IP Timestamp 选项（option type 0x44）的数据包，以临时缓解拒绝服务风险。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "NetBSD IP Timestamp 选项拒绝服务漏洞"
updated = "2026-06-16T21:51:44.310"

