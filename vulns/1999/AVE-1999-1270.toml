[basic]
description = "Solaris 操作系统电源管理模块存在权限提升漏洞。当系统从挂起状态恢复时，xlock 屏幕锁定程序未能在挂起完成前及时启动，导致具备物理访问权限的攻击者可在系统恢复过程中短暂操作此前活跃的应用程序。攻击者可利用这一时间窗口输入恶意命令，从而获取更高权限。该漏洞影响 Solaris 2.4 至 2.6 版本。"
published = "1998-07-16T04:00:00.000"
remediation = "升级至 Solaris 7 或更高版本（Solaris 7 于 1998 年 11 月发布，已修复系统恢复时 xlock 启动时序问题）。如无法升级，禁用 sys-suspend 电源管理功能：编辑 /etc/power.conf，注释或删除所有涉及 suspend 的配置行，或通过 psradm -f 关闭自动挂起。临时缓解措施：在手动执行挂起前先运行 /bin/xlock 锁定屏幕。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "Sun Solaris 电源管理权限提升漏洞"
updated = "2026-06-16T21:50:25.720"

