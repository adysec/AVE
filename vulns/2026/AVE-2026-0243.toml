[basic]
description = "webpack-dev-server 5.2.5 及之前版本中存在跨站请求伪造（CSRF）漏洞。其内部开发端点 `/webpack-dev-server/open-editor` 和 `/webpack-dev-server/invalidate` 在处理 GET 请求时未验证请求来源，导致开发者在启动 dev server 后访问任意恶意网站时，该网站可跨域触发上述端点。攻击者可利用此漏洞在开发者编辑器中打开任意本地文件（包括项目根目录外的文件），并通过重复请求不断生成编辑器进程、强制触发重编译，从而消耗系统资源影响开发环境正常运行。该漏洞 CVSS 评分 4.7，危害等级中危，建议升级至 webpack-dev-server 5.2.6 及以上版本修复。"
published = "2026-07-03T17:16:53.620"
remediation = "立即将 webpack-dev-server 升级至 5.2.6 或更高版本，该版本已修复内部端点未经验证的跨域请求问题。如无法升级，可在反向代理层屏蔽 `/webpack-dev-server/open-editor` 和 `/webpack-dev-server/invalidate` 路径的 GET 请求，并将 dev server 的 `--host` 绑定为 `127.0.0.1` 避免外部网络访问。"
score = 4.7
severity = "MEDIUM"
sources = ["ghsa"]
title = "Webpack webpack-dev-server 跨站请求伪造漏洞"
updated = "2026-07-07T15:12:43.947"

