[basic]
description = "Internet Explorer 5.0 的 Microsoft Scriptlet 组件存在信息泄露漏洞，远程攻击者可诱导用户访问恶意网页，利用该组件绕过浏览器安全限制，读取客户端文件系统中的任意文件内容。该漏洞影响 Windows 平台上安装的 IE 5.0 版本，攻击者无需身份认证即可实施攻击，危害等级高，可能导致敏感信息（如本地文件内容）被窃取。"
published = "1999-04-09T04:00:00.000"
remediation = "立即安装 Microsoft 安全公告 MS99-012 提供的 MSHTML.DLL 更新补丁，将 Internet Explorer 升级至已修复版本。该补丁通过更新 MSHTML 解析引擎阻止恶意脚本自动粘贴文件名到文件上传控件，防止文件被未经用户确认即提交至远程服务器。如无法安装补丁，可禁用 ActiveX 控件和脚本功能作为临时缓解措施。"
score = 8.2
severity = "HIGH"
sources = ["epss"]
title = "Microsoft Internet Explorer 任意文件读取漏洞"
updated = "2026-06-16T21:48:27.557"

