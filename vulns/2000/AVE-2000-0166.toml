[basic]
description = "Allaire ColdFusion Server 4.x 版本中存在服务器信息泄露漏洞。远程攻击者无需身份认证，通过向目标服务器发送特制的 HTTP 请求访问 application.cfm 或 onrequestend.cfm 文件，即可获取服务器的真实物理路径信息。该漏洞利用方式简单且易于探测，泄露的路径信息可被用于后续更深入攻击的信息收集阶段，增加系统被进一步入侵的风险。"
published = "2000-03-01T05:00:00.000"
remediation = "升级到 Adobe ColdFusion 2018 或 2021 及以上版本（该漏洞仅影响 ColdFusion 4.x 及更早版本）。如无法升级，在 Web 服务器（IIS/Apache）层面配置规则阻止对 application.cfm 和 onrequestend.cfm 的直接访问；同时将 ColdFusion 管理台的错误处理设置为自定义错误页，关闭详细错误信息显示，防止路径泄露。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Allaire ColdFusion Server 路径信息泄露漏洞"
updated = "2026-06-16T21:51:11.173"

