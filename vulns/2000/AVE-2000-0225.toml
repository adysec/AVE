[basic]
description = "IBM AIX 操作系统的 Fast Response Cache Accelerator (FRCA) 组件中的 frcactrl 程序存在配置安全缺陷，本地攻击者可利用该程序的配置功能修改系统任意文件，导致权限提升或系统完整性遭破坏。CVSS 评分 7.2，危害等级高。"
published = "2000-04-26"
remediation = "安装 IBM APAR IY06437 提供的 AIX 安全补丁，或升级至 AIX 5.2 及以上版本。临时缓解措施：执行 chmod 0500 /usr/sbin/frcactrl 移除 setuid root 权限，若未使用 FRCA 功能可删除该二进制文件。"
score = 7.2
severity = "HIGH"
sources = [
    "cve",
    "avd",
]
title = "IBM AIX Fast Response Cache Accelerator 本地任意文件修改漏洞"
updated = "2026-06-16"

