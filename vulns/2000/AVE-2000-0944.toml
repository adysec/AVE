[basic]
description = "WircSrv IRC Server 5.07s 中存在任意文件读取漏洞。具有 IRC 操作员权限的攻击者可通过 importmotd 命令将服务器上的任意文件内容设置为 MOTD（每日消息），从而读取该文件。攻击者无需身份认证即可通过网络远程利用，但需要获得操作员权限。该漏洞仅影响机密性，不破坏完整性和可用性，CVSS 评分 5.0，危害等级中危。"
published = "2000-10-20T04:00:00.000"
remediation = "该漏洞影响 WircSrv IRC Server 5.07s 及更早版本，厂商已停止维护，无官方补丁。建议立即采取以下措施：1）编辑服务器配置文件，禁用 importmotd 命令或将 IRC 操作员权限降级为普通用户；2）在服务器上移除或重命名 importmotd 相关功能模块；3）迁移至仍在维护的 IRC 服务器软件（如 UnrealIRCd 或 InspIRCd），避免使用已停止维护的 WircSrv。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "WircSrv IRC Server 任意文件读取漏洞"
updated = "2026-06-16T21:52:28.567"

