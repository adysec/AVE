[basic]
description = "Sendmail 8.12.5 之前版本在配置使用自定义 DNS 映射查询 TXT 记录时，其处理 DNS 响应的代码中存在缓冲区溢出漏洞。远程攻击者可通过控制恶意 DNS 服务器向目标 Sendmail 服务器发送特制的 DNS 响应触发该溢出，导致服务拒绝响应，甚至可能执行任意代码。该漏洞影响广泛部署的 Sendmail 邮件传输代理，CVSS 评分 7.5，危害等级高。"
published = "2002-10-04T04:00:00.000"
remediation = "升级 Sendmail 至 8.12.5 或更高版本以修复 DNS 响应处理中的缓冲区溢出漏洞。如无法立即升级，可在配置中移除或禁用自定义 DNS map（custom DNS map）功能，避免查询 TXT 记录以降低攻击面。"
score = 7.5
severity = "HIGH"
sources = ["osv"]
title = "Sendmail DNS响应处理缓冲区溢出漏洞"
updated = "2026-06-16T21:58:21.937"

