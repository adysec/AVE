[basic]
description = "这是一个目录遍历安全漏洞，存在于 Cosmicperl Directory Pro 2.0 软件的 cosmicpro.cgi 脚本中。该脚本未能正确验证用户输入的 SHOW 参数，攻击者可通过在参数中嵌入“..”目录遍历符号，绕过应用程序验证，访问服务器上的任意文件。这可能导致数据库凭证、源代码、用户凭据等敏感信息泄露。漏洞性质为 CVSS 5.0 标准（攻击面：网络，复杂性：低，认证：无，机密性影响：部分）。受影响系统包括 Cosmicperl Directory Pro 2.0 及使用相同目录服务软件的组织。攻击者无需任何权限即可远程触发此漏洞，获取目标服务器文件系统中的敏感数据。通过这种漏洞，攻击者不仅可以窃取身份信息，还可能进一步开展身份欺骗、系统控制等更高级别的攻击。该漏洞已通过安全更新修复。"
published = "2001-10-18T04:00:00.000"
remediation = '建议立即停用或删除 Cosmicperl Directory Pro 2.0 中的 cosmicpro.cgi 脚本，或升级至官方发布的修复版本（如有）。若无法升级，请在 Web 服务器层面配置规则拦截包含 "../" 的 SHOW 参数请求，并在 CGI 脚本中添加输入验证过滤目录遍历序列，同时限制 Web 服务器进程对敏感目录的读取权限作为临时缓解措施。建议迁移至现代维护的目录程序替代该旧版本程序。'
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Cosmicperl Directory Pro 目录遍历漏洞"
updated = "2026-06-16T21:54:56.663"

