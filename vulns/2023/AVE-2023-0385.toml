[basic]
description = "Linux 内核 btrfs 文件系统存在死锁漏洞。在对块组进行重定位（relocation）操作时，系统先暂停 scrub，执行事务提交，再恢复 scrub。若事务提交进入临界区（TRANS_STATE_COMMIT_START）后失败且 scrub 处于暂停状态，将导致进程永久阻塞（死锁）。本地攻击者可通过 btrfs balance 或 relocate ioctl 在事务失败条件下触发该漏洞，造成系统拒绝服务（DoS）。该漏洞影响 Linux 内核多个版本，CVSS 评分 5.5，中危等级。"
published = "2025-09-17T15:15:38.727"
remediation = "升级 Linux 内核至 6.1.23/6.2.10/6.3 及以上版本；无法立即升级时，避免在 Btrfs 文件系统上同时执行 scrub 与 relocate 操作，先完成 scrub 再执行 balance/relocate。"
score = 5.5
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux btrfs 文件系统重定位清理死锁漏洞"
updated = "2026-06-17T06:44:57.963"

