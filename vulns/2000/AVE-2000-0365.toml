[basic]
description = "HP Web JetAdmin 6.0 存在拒绝服务漏洞，远程攻击者可通过向端口 8000 发送特制的恶意 URL 请求触发该漏洞，导致 JetAdmin 服务崩溃或停止响应，影响打印管理功能正常使用。攻击者无需认证即可实施攻击，造成服务可用性中断。"
published = "2000-05-24T04:00:00.000"
remediation = "升级 HP Web JetAdmin 至 6.5 及以上版本，该版本已修复畸形 URL 导致的拒绝服务漏洞。若无法升级，在防火墙上限制端口 8000 仅允许信任来源 IP 访问，并禁用 Web 服务的远程管理功能以降低攻击面。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "HP Web JetAdmin 6.0 拒绝服务漏洞"
updated = "2026-06-16T21:51:44.803"

