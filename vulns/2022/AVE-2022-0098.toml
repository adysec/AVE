[basic]
description = "Linux 内核蓝牙子系统的 EIR（扩展查询响应）处理函数中存在未初始化内存访问漏洞。由于 dev_name 和 short_name 字段不保证以 NULL 结尾，驱动使用 strlen() 计算长度时可能越界读取内核堆内存，导致敏感信息泄露。本地攻击者可通过蓝牙协议发起特制查询请求触发此漏洞，影响使用 Linux 内核蓝牙功能的系统，CVSS 评分 5.5，危害等级中等。Linux 内核主线已合入修复补丁。"
published = "2025-08-09T15:15:27.723"
remediation = "立即升级 Linux 内核至 6.0 及以上版本，或向后移植补丁 commit dd7b8cdde098 到当前内核并重新编译。如无法升级，可通过 `rmmod bluetooth` 禁用蓝牙模块或通过 `rfkill block bluetooth` 阻止蓝牙加载作为临时缓解措施。"
score = 5.5
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux Kernel Bluetooth EIR 信息泄露漏洞"
updated = "2026-06-17T05:23:02.183"

