[basic]
description = 'FloosieTek FTGate 2.1 Web 界面服务器存在目录遍历漏洞，远程未认证攻击者可通过构造包含 ".." 目录遍历序列的 HTTP 请求，绕过 Web 根目录限制读取服务器文件系统上的任意文件。该漏洞影响 FTGate 2.1 版本的 Web 管理接口，攻击者无需认证即可远程利用，通过构造包含 ../ 序列的 URL 路径遍历目录结构，读取敏感系统文件、配置文件或应用源代码。CVSS 评分 5.0（中危），攻击复杂度低、无需认证、可远程利用，影响机密性。FloosieTek 已停止维护该产品，建议迁移至受支持的邮件网关产品或实施严格的 Web 应用防火墙规则过滤目录遍历字符。'
published = "1999-11-04T05:00:00.000"
remediation = "立即升级 FTGate 至 2.1 以上版本，该漏洞已在后续版本中修复。如无法升级，在 Web 服务器或反向代理层拦截包含 `../` 的 URL 请求，并限制 Web 管理界面仅允许可信内网 IP 访问。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "FloosieTek FTGate 2.1 目录遍历漏洞"
updated = "2026-06-16T21:49:15.820"

