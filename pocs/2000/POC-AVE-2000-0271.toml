[info]
author = "ave"
description = "Microsoft JET 数据库引擎（3.5/3.51/4.0）存在 VBA Shell 漏洞，攻击者可构造含 Shell 函数调用的恶意数据库查询，使目标以当前用户权限执行任意操作系统命令。本 PoC 通过检查目标是否运行受影响 Jet 引擎版本并验证其是否支持 VBA Shell 调用进行安全无损验证。"
id = "POC-AVE-2000-0271"
name = "CVE-2000-0325 Microsoft JET VBA Shell PoC"
severity = "high"
tags = ["ave-2000-0271"]
vuln_id = [
    "CVE-2000-0325",
    "AVE-2000-0271",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}"
protocol = "http"

[poc.requests.headers]
User-Agent = "AVE/1.0"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "Microsoft",
    "Jet",
    "Access",
]
