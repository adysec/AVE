[basic]
description = "BSD 操作系统的 procfs（进程文件系统）存在本地权限提升漏洞，影响 FreeBSD 3.4、NetBSD 1.4.1 和 OpenBSD 2.6 等版本。该漏洞允许本地用户通过修改标准错误输出（stderr）的文件描述符，访问并篡改 /proc/pid/mem 进程内存接口，从而向进程内存空间注入恶意数据或修改关键内存内容，最终获取 root 权限。攻击前提是攻击者已获得目标系统的普通用户访问权限。"
published = "2000-02-16T05:00:00.000"
remediation = "建议将 FreeBSD 升级至 3.4-STABLE 及以上版本、NetBSD 升级至 1.4.2 及以上、OpenBSD 升级至 2.6 补丁版本或 2.7 及以上；如无法立即升级，可在 /etc/fstab 中移除 procfs 挂载项并执行 umount /proc 临时禁用 /proc 文件系统，或在内核配置中关闭 options PROCFS 后重新编译内核，以阻断通过 /proc/pid/mem 接口本地提权的利用路径。"
score = 7.2
severity = "HIGH"
sources = ["cve"]
