[basic]
description = "IBM AIX 4.1 和 4.2 版本中的 lquerypv 工具存在任意文件读取漏洞。本地攻击者可通过在 -h 命令行参数中指定目标文件路径，利用该工具以 root 权限读取系统上任意文件内容，导致敏感信息泄露。该漏洞影响 IBM AIX 4.1 及 4.2 版本，CVSS 评分 2.1，危害等级低，攻击者需拥有本地访问权限方可利用。"
published = "1999-12-31T05:00:00.000"
remediation = "升级 IBM AIX 至 4.3 或更高版本（AIX 4.1/4.2 已停止技术支持），或移除 lquerypv 的 setuid/setgid 权限位：chmod u-s /usr/sbin/lquerypv；同时通过文件系统 ACL 限制敏感文件仅允许 root 用户读取，防止低权限用户利用 -h 参数越权读取任意文件。"
score = 2.1
severity = "LOW"
sources = ["avd"]
title = "IBM AIX lquerypv 本地文件读取漏洞"
updated = "2026-06-16T21:49:45.383"

