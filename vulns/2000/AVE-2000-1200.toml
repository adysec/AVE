[basic]
description = "Danware NetOp 6.0 远程控制软件的文件传输机制存在访问控制缺陷，该漏洞源于文件传输功能缺少身份认证机制，导致未经授权的远程攻击者可在无需任何凭证的情况下通过网络连接目标系统，实现对服务器上任意文件的读取、写入和修改操作。该漏洞影响 Danware NetOp 6.0 版本，CVSS 评分 10.0，危害等级严重。厂商已发布安全公告，建议用户升级至不受影响的版本。"
published = "2000-05-23T04:00:00.000"
remediation = "升级至 Danware NetOp 7.0 或更高版本，该版本为文件传输功能加入了身份认证机制。如无法升级，在防火墙层面限制对 NetOp 文件传输端口（默认 3074/TCP）的访问，仅允许可信 IP 连接，并在 NetOp 安全策略中启用加密传输。对于仍在使用 6.x 系列的用户，Danware 曾在 2000 年 6 月发布安全补丁，建议立即安装。"
score = 10
severity = "CRITICAL"
sources = ["cve"]
title = "Danware NetOp 6.0 文件传输未授权访问漏洞"
updated = "2026-06-16T21:51:58.853"

