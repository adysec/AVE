[basic]
description = 'NeXT NeXTstep 2.1 及早期版本中，默认用户 "me" 被错误地赋予了 wheel 组权限，导致本地攻击者可利用 su 命令直接提权至 root。该漏洞属于权限配置错误，影响范围为 NeXT NeXTstep 2.1 及更早版本操作系统。攻击条件为攻击者已获得本地 "me" 用户访问权限，利用方式为执行 su 命令切换至 root 账户，从而完全控制系统。CVSS 评分 10.0，属于严重级别本地提权漏洞。'
published = "1991-05-14T04:00:00.000"
remediation = "升级 NeXT NeXTstep 至 3.0 或更高版本（移除 me 用户的 wheel 组特权）。在无法升级时，以 root 执行 `vipw` 或在 /etc/group 中从 wheel 组移除 me 用户，并更改 me 账户口令、限制其本地登录权限，作为临时缓解措施。"
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "NeXT电脑 NeXTstep 特权升级漏洞"
updated = "2026-06-16T21:49:54.997"

