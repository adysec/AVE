[basic]
description = 'Netscape Navigator 4.07 及 Communicator 4.73 之前版本存在 SSL 证书验证缺陷，未能正确校验 SSL 证书有效性。远程攻击者可利用该漏洞将合法 Web 服务器的流量重定向至恶意服务器，实施中间人攻击窃取用户敏感信息，被称为 "Acros-Suencksen SSL" 漏洞。影响范围为 Netscape Navigator 4.07 及 Communicator 4.73 前版本，攻击条件需诱导用户访问恶意站点或实施中间人劫持，CVSS 评分 2.6，危害等级较低。'
published = "2000-05-10T04:00:00.000"
remediation = "建议立即升级到 Netscape Communicator 4.73 或 Navigator 4.07 及以上版本，可从 Netscape 官网下载最新版本安装包覆盖安装。如无法立即升级，建议暂停使用 Netscape 访问 HTTPS 站点，改用已修复 SSL 证书验证漏洞的其他浏览器（如 IE 5.0+）访问敏感站点，并避免在不可信网络环境下进行敏感操作。"
score = 2.6
severity = "LOW"
sources = ["avd"]
title = "Netscape Navigator 和 Communicator 无效SSL证书警告旁路漏洞"
updated = "2026-06-16T21:51:38.967"

