[basic]
description = "Apache 1.2.5 及更早版本存在缓冲区溢出漏洞，远程攻击者可通过向目标服务器发送大量包含大量 `/` 字符的恶意 GET 请求触发此漏洞，导致 Apache 服务进程崩溃，造成拒绝服务。该漏洞影响 Apache 1.2.5 及之前所有版本，攻击无需身份认证，利用难度较低，CVSS 评分 5.0，危害等级中危。"
published = "1997-12-30T05:00:00.000"
remediation = "建议升级至 Apache 1.3.0 及以上版本，该版本已修复超大 GET 请求导致的缓冲区溢出。如无法升级，可在反向代理层（如 Nginx）限制单个 URI 长度不超过 4096 字节，并在 Web 应用防火墙中配置请求速率限制以缓解 DDoS 风险。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Apache HTTP Server 缓冲区溢出拒绝服务漏洞"
updated = "2026-06-16T21:47:36.150"

