[basic]
description = "Jeremy Arnold Worm Webserver 1.0 存在拒绝服务漏洞。远程攻击者可通过向目标服务器发送超长 URL 请求，导致服务器进程崩溃或资源耗尽，无法继续响应正常请求。该漏洞无需身份认证即可触发，攻击门槛低，影响 Worm Webserver 1.0 版本。由于该软件年代久远且已停止维护，建议用户迁移至其他受支持的 Web 服务器软件。"
published = "2000-10-20T04:00:00.000"
remediation = "立即停止使用已停止维护的 Worm Webserver 1.0，迁移至 Apache、Nginx 等仍在积极更新的 Web 服务器软件。如因特殊原因暂时无法替换，可在反向代理或防火墙上设置 URL 长度限制（建议不超过 2048 字节）并过滤畸形请求以缓解 DoS 风险。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Jeremy Arnold Worm Webserver 1.0 URL 拒绝服务漏洞"
updated = "2026-06-16T21:52:22.003"

