[basic]
description = "Linux kernel 的 AMD 显示驱动（drm/amd/display）中存在平面（plane）引用计数处理缺陷。备份和恢复平面状态时未正确维护引用计数，若在备份与恢复操作之间引用计数发生变化，可能导致内存泄漏（引用计数本应减少时）或双重释放/非法内存访问（引用计数本应增加时）。本地攻击者需具备低权限，通过触发特定显示状态切换操作即可利用该漏洞，造成系统崩溃或权限提升。CVSS 评分 7.8，危害等级高。"
published = "2025-01-08T18:15:18.333"
remediation = '升级 Linux 内核至 6.12.4 或更高版本（包含补丁 commit 8cb2f6793845f 和 27227a234c14）。各发行版用户：Ubuntu 安装 USN-7381-1/USN-7450-1 安全更新，RHEL/CentOS 使用 `yum update kernel`，Debian 使用 `apt update && apt upgrade linux-image`，更新后重启系统。如无法立即升级，可通过内核模块黑名单临时禁用 amdgpu 驱动：`echo "blacklist amdgpu" >> /etc/modprobe.d/blacklist-amdgpu.conf && update-initramfs -u`，但此措施将禁用 AMD 图形加速功能。'
score = 7.8
severity = "HIGH"
sources = ["msrc"]
title = "Linux kernel AMD Display 驱动平面引用计数内存管理漏洞"
updated = "2026-06-17T08:12:57.820"

