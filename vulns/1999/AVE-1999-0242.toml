[basic]
description = "Apache HTTP Server 1.2.5 及更早版本存在缓冲区溢出漏洞。远程未认证攻击者可通过向目标服务器发送大量包含大量 / 字符的 GET 请求触发该漏洞，导致 Apache 进程崩溃，造成拒绝服务。该漏洞影响 Apache 1.2.x 系列版本，攻击者无需认证即可发起攻击，利用门槛低。建议升级至 Apache 1.3.0 或以上版本进行修复。"
published = "1997-12-30T05:00:00.000"
remediation = "升级 Apache 至 1.3.0 或更新版本，该版本已修复此缓冲区溢出漏洞。考虑到此版本已极其老旧，强烈建议升级至 Apache 2.4.x 系列最新稳定版。如暂无法升级，可在反向代理或 WAF 层面限制单请求 URI 长度及 GET 请求频率作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Apache HTTP Server 缓冲区溢出拒绝服务漏洞"
updated = "2026-06-16T21:47:36.150"

