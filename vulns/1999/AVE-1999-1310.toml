[basic]
description = "VMS 操作系统 Monitor 工具（SYS$SHARE:SPISHR.EXE）存在本地权限提升漏洞，影响 VMS 5.0 至 5.4-2 版本。本地用户可利用该工具在处理权限控制时的缺陷，通过执行特制操作获得系统级特权，从而完全控制目标主机。该漏洞 CVSS v2 评分 7.2，危害等级高，攻击者需具备本地访问权限，无需用户交互即可利用。"
published = "1992-12-31T05:00:00.000"
remediation = "此 CVE 编号已被标记为 REJECT（与 CVE-1999-1395 重复），不存在实际安全漏洞，无需进行任何修复操作。请直接参考 CVE-1999-1395 对应的真实漏洞信息进行修复。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "HP OpenVMS Monitor 实用程序本地权限提升漏洞"
