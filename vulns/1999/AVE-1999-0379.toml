[basic]
description = "SuSE Linux 6.2 及之前版本以及 Slackware Linux 3.2/3.6 中 in.identd 服务存在默认配置缺陷，该服务在处理请求时设置了 120 秒的请求间隔等待时间，远程攻击者可利用此机制向目标系统发送大量连接请求，耗尽系统资源，导致拒绝服务。该漏洞影响多个 Linux 发行版本，危害等级中等。"
published = "1999-08-16T04:00:00.000"
remediation = "升级 SuSE Linux 至 6.3 或更高版本，或禁用 in.identd 服务（`/etc/init.d/identd stop && chkconfig identd off`）。如必须使用 identd，修改配置文件降低请求间隔时间或添加连接速率限制，防止远程攻击者利用 120 秒等待间隔耗尽连接资源造成拒绝服务。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "SuSE Linux in.identd 拒绝服务漏洞"
updated = "2026-06-16T21:48:58.247"

