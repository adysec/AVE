[basic]
description = "Solaris 系统中 lpset 命令存在缓冲区溢出漏洞，本地攻击者可通过向 -r 选项传递超长参数触发缓冲区溢出，导致内存破坏，从而获取 root 权限。该漏洞影响 Solaris 2.6 及 7.0 版本，攻击者需拥有本地账号才能利用，CVSS 评分 7.2，危害等级高。"
published = "2000-04-24T04:00:00.000"
remediation = "升级至 Oracle Solaris 8 或更高版本，或应用相应补丁集补丁。如短期内无法升级，应通过文件权限管理移除 lpset 的 setuid 权限（chmod -s /usr/bin/lpset），或通过 RBAC（基于角色的访问控制）限制普通用户执行 lpset 命令的权限，仅允许授权管理员操作，防止本地提权。"
score = 7.2
severity = "HIGH"
sources = ["cve"]
title = "Solaris lpset 本地缓冲区溢出漏洞"
updated = "2026-06-16T21:51:27.843"

