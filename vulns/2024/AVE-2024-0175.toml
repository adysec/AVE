[basic]
description = "亿赛通电子文档安全管理系统（CDGServer3）的 LogDownLoadService 接口存在 SQL 注入漏洞。该接口位于 /CDGServer3/logManagement/LogDownLoadService，在处理下载日志文件的请求时未对 logFileName、id 等参数进行充分的输入校验与参数化查询，导致攻击者可通过构造恶意的 id 参数（如注入 `';WAITFOR DELAY '0:0:6'--`）拼接至 SQL 语句中执行。未经身份认证的远程攻击者只需向该接口发送特制的 POST 请求（Content-Type 为 application/x-www-form-urlencoded），即可发起时间盲注等攻击，进而读取、篡改数据库内容，甚至进一步获取服务器权限。该漏洞影响部署了相关版本电子文档安全管理系统的企业环境，危害程度较高，建议尽快对参数进行安全过滤并升级至官方修复版本。"
published = "0816"
remediation = "建议将亿赛通电子文档安全管理系统升级至官方发布修复该 SQL 注入漏洞的安全版本（请向厂商获取对应补丁包并安装）；临时缓解可在 Web 应用防火墙或反向代理上对该系统的 /CDGServer3/logManagement/LogDownLoadService 接口启用 SQL 注入规则拦截，并限制仅内网可信 IP 访问，同时关闭不必要的日志下载功能。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "亿赛通 电子文档安全管理系统 LogDownLoadService SQL注入漏洞"
updated = "0816"

