[basic]
description = "Jakarta Tomcat 3.0 和 3.1 版本中的 Snoop Servlet 存在信息泄露漏洞。远程攻击者无需认证即可向目标服务器发送一个不存在的 .snp 后缀 URL 请求，触发 Snoop Servlet 返回系统属性、环境变量、请求参数等敏感信息。该漏洞可能导致服务器内部配置和文件路径等关键信息暴露，为攻击者后续入侵提供情报基础，影响所有运行在 Apache 下的 Tomcat 3.0 及 3.1 版本。"
published = "2000-10-20T04:00:00.000"
remediation = "升级到 Tomcat 3.2 或更高版本以彻底移除 Snoop Servlet；若无法升级，删除 `$CATALINA_HOME/webapps/ROOT/WEB-INF/web.xml` 中 Snoop Servlet 的 `<servlet-mapping>` 配置，或直接移除 `snoop.jar` 文件，并重启 Tomcat 服务使配置生效。也可在 Apache 反向代理层添加访问规则，拦截对 `*.snp` 路径的请求作为临时缓解。"
score = 6.4
severity = "MEDIUM"
sources = ["nuclei"]
title = "Apache Tomcat Snoop Servlet 信息泄露漏洞"
updated = "2026-06-16T21:52:25.440"

