[basic]
description = "Internet Explorer 4.0 在处理 EMBED 标签时存在缓冲区溢出漏洞，远程攻击者可构造包含恶意 EMBED 标签的特制网页，诱使用户访问后触发缓冲区溢出，导致任意代码执行。该漏洞影响 Windows 平台上的 Internet Explorer 4.0 版本，CVSS 评分 10.0，危害等级严重。攻击者可通过电子邮件或恶意网站传播利用代码，无需身份认证即可完全控制目标系统。"
published = "2000-01-04T05:00:00.000"
remediation = "立即升级 Internet Explorer 至 5.01 及以上版本，或安装 Microsoft 安全更新 MS99-037。鉴于 IE 4.0 已停止技术支持，建议升级至 IE 11 或改用 Edge/Chrome 等现代浏览器，同时在 IE 中禁用 ActiveX 控件及 EMBED 标签解析功能作为临时缓解措施。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "Microsoft Internet Explorer 缓冲区溢出漏洞"
updated = "2026-06-16T21:49:14.490"

