[basic]
description = "CVE-1999-0601 为网络入侵检测系统（IDS）中存在的TCP数据包处理缺陷。攻击者可在TCP三次握手过程中，将恶意载荷嵌入SYN、SYN-ACK等握手数据包的载荷字段或利用IP分片重组绕过IDS的深度包检测机制。由于早期IDS对TCP会话建立阶段的数据包缺乏完整重组与检测能力，导致攻击载荷可绕过安全审计直接到达目标主机。该漏洞影响了多种主流IDS产品的检测有效性，攻击者无需认证即可实施绕过，危害网络层面的安全监控体系。"
published = "1999-01-01T05:00:00.000"
remediation = "启用 IDS/IPS 的 TCP 流重组功能（如 Snort 的 stream_tcp 预处理器或 Suricata 的内置流引擎），配置为自动重组所有 TCP 会话的完整载荷后再进行规则匹配；同时启用 TCP 规范化（normalization）以丢弃重叠分片或异常标志位的数据包，防止分片逃逸攻击。"
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "通用 网络入侵检测系统 TCP握手数据绕过漏洞"
updated = "2026-06-16T21:48:42.863"

