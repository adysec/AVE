[basic]
description = "Adobe Reader 和 Acrobat 的 CoolType.dll 字体解析引擎在处理 PDF 文档内嵌的 TTF 字体时，对 SING（Smart INdependent Glyphlets）表中的 'uniqueName' 字段缺乏长度检查，存在栈缓冲区溢出漏洞。攻击者可通过构造特制的 PDF 文档（内含恶意 TTF 字体）诱导用户打开，触发缓冲区溢出，从而导致远程代码执行或应用程序崩溃。该漏洞在 2010 年 9 月已被在野利用，影响 Adobe Reader 和 Acrobat 9.4 之前版本及 8.2.5 之前版本（Windows/Mac OS X），Adobe 已发布安全更新修复。"
published = "2010-09-09T22:00:02.250"
remediation = "升级 Adobe Reader/Acrobat 至 9.4 或 8.2.5 及以上版本，禁用 PDF 阅读器中的内嵌字体解析功能，或使用替代 PDF 阅读器（如 Foxit Reader）打开可疑 PDF 文件，在 Web 网关层过滤含异常 TTF 字体的 PDF 附件。"
score = 7.3
severity = "HIGH"
sources = ["kev"]
title = "Adobe Reader 和 Acrobat CoolType 栈缓冲区溢出远程代码执行漏洞"
updated = "2026-06-16T23:21:41.330"

