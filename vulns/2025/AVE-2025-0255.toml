[basic]
description = "深信服OSM堡垒机/fort/portal_login接口存在命令注入漏洞，攻击者可在loginUrl参数中通过反引号构造恶意命令执行任意操作系统命令。该漏洞为未授权访问点，攻击者无需登录即可直接触发，成功利用后能够完全控制堡垒机系统及所管理的内部网络资产。"
published = "2025-01-01"
remediation = "联系深信服官方获取OSM堡垒机安全补丁并升级至最新版本。临时缓解措施包括限制/fort/portal_login路径仅允许可信IP访问、部署WAF规则拦截异常loginUrl参数中的命令注入特征。同时建议关闭未使用的管理接口，降低攻击面。"
score = 5
