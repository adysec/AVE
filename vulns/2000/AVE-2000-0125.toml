[basic]
description = "True North Internet Anywhere Mail Server 3.1.3 的 POP3 服务存在拒绝服务漏洞，远程未认证攻击者可通过向 POP3 服务发起大量并发连接请求，耗尽服务器连接资源导致服务拒绝。该漏洞影响 True North Internet Anywhere Mail Server 3.1.3 版本的 POP3 服务组件，CVSS 评分 5.0（中等严重），攻击者无需认证即可远程发起攻击，通过发送大量连接请求耗尽服务器资源导致拒绝服务。"
published = "2000-02-10T05:00:00.000"
remediation = "升级 True North Internet Anywhere Mail Server 至官方修复版本（3.1.4 及以上）。如暂无法升级，可在邮件服务器前端防火墙或路由器上限制单个源 IP 对 POP3（TCP 110 端口）的并发连接数与连接频率，并设置空闲连接超时断开，以缓解大量连接导致的拒绝服务攻击。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
