[basic]
description = "Zktime考勤管理系统iclock接口存在SQL注入漏洞，攻击者无需身份认证即可通过POST请求向/iclock/ic1ock端点提交恶意构造的SQL语句，导致数据库信息泄露、数据篡改甚至服务器被控制。该漏洞影响Zktime考勤管理系统全版本，攻击条件低，仅需目标系统开放Web管理端口即可远程利用。"
published = "0708"
remediation = "升级 Zktime 考勤管理系统至最新版本，厂商已修复 iclock 接口的 SQL 注入漏洞。如无法升级，在应用层对 `submit`、`sql` 等 POST 参数进行严格的输入过滤和参数化查询，禁止将用户输入直接拼接 SQL 语句。同时部署 WAF 规则拦截 `/iclock/ic1ock` 路径的恶意 SQL 请求，并最小化数据库账户权限，避免使用高权限账户连接应用。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "ZKTime 考勤管理系统 iclock 接口 SQL 注入漏洞"
updated = "0708"

