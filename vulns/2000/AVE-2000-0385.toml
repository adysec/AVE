[basic]
description = "BeOS 5.0 操作系统 TCP 协议栈在处理分片 TCP 数据包时存在缺陷，远程攻击者无需身份认证即可向目标发送特制的 TCP 分片报文，导致系统协议栈解析异常从而触发拒绝服务。该漏洞影响 BeOS 5.0 版本，攻击者只需具备网络访问能力即可发起攻击，危害等级中等。"
published = "2000-05-18T04:00:00.000"
remediation = "BeOS 5.0 已停止维护，官方未发布补丁。建议在边界防火墙上配置 TCP 分段重组深度检测规则，丢弃异常分片包；如非必要，停止暴露 BeOS 主机的网络服务，或将其隔离在独立网段中仅允许受信主机访问。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = 'The user wants me to generate a title field for CVE-2000-0463. Based on the information provided: - Vendor: Be (BeOS) - Product: BeOS 5.0 - Vulnerability type: TCP Fragmentation Remote Denial of Service - Description: BeOS 5.0 allows remote attackers to cause a denial of service via fragmented TCP packets. Following the format "厂商 产品 漏洞类型", I need to create a Chinese title. Let me think about this: - 厂商: Be (or 北京Be公司? Actually "Be" is the company name, and "BeOS" is the product) - Actually, looking at the example: "Microsoft Windows TCP/IP 远程代码执行漏洞" - the format is "Vendor Product VulnerabilityType" - For this CVE: Be BeOS 5.0 TCP Fragmentation Remote Denial of Service - In Chinese: Be BeOS 5.0 TCP分片远程拒绝服务漏洞 Actually, "Be" is the vendor and "BeOS 5.0" is the product. So: "Be BeOS 5.0 TCP分片远程拒绝服务漏洞" But "Be" as a company name - in Chinese context, it could also just be "Be" or referred to as the company behind Be'
updated = "2026-06-16T21:51:47.320"

