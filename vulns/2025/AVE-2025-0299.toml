[basic]
description = "金蝶云星空 BusinessDataService 服务的 BatchLoad.common.kdsvc 接口存在远程代码执行漏洞，未经身份认证的攻击者可通过向目标系统发送特制的 HTTP 请求，利用反序列化机制在服务器上执行任意代码。该漏洞影响金蝶云星空多个版本，可导致服务器被完全控制、数据泄露或勒索软件植入。目前官方已发布安全补丁予以修复。"
published = "0714"
remediation = "建议立即升级金蝶云星空至 2025 年 4 月及之后的安全补丁版本，或联系金蝶官方获取 BusinessDataService 接口的热修复补丁。临时缓解措施可在应用网关或 WAF 层面添加规则，拦截对 /BusinessDataService/BatchLoad.common.kdsvc 路径的 POST 请求，并限制该接口仅允许可信内网 IP 访问。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "金蝶 金蝶云星空 BusinessDataService.BatchLoad.common.kdsvc 远程代码执行漏洞"
updated = "0714"

