[basic]
description = "ToolTalk 数据库服务器（rpc.ttdbserverd）存在缓冲区溢出漏洞，未经身份认证的远程攻击者可通过向目标系统的 RPC 服务发送特制的请求数据触发该漏洞，导致以 root 权限执行任意命令。该漏洞影响 Sun Solaris 2.5.1、Xi Graphics Maximum CDE 1.2.3、TriTeal TED CDE 4.3 等操作系统。漏洞 CVSS 评分 10.0，危害等级严重，攻击者无需任何认证即可远程利用。"
published = "1998-04-01T05:00:00.000"
remediation = "安装操作系统厂商提供的 ToolTalk 补丁，或禁用 rpc.ttdbserverd 服务（如 Solaris 系统执行 `/etc/init.d/rpc.ttdbserver stop` 并编辑 `/etc/inetd.conf` 注释掉相应行）。在防火墙上阻止外部对 RPC 端口（111/tcp, 111/udp）和 ToolTalk 服务端口的访问作为临时缓解。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "Sun Solaris ToolTalk 数据库服务器缓冲区溢出漏洞"
updated = "2026-06-16T21:47:18.353"

