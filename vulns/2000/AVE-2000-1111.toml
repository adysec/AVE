[basic]
description = "Sambar Server 4.3 的 finger 和 whois 演示脚本存在缓冲区溢出漏洞，远程攻击者无需身份认证即可通过向目标服务器发送超长主机名字符串触发该漏洞，导致攻击者能够在服务器上以服务进程权限执行任意命令。该漏洞影响 Sambar Server 4.3 版本，CVSS 评分 10.0，危害等级严重，攻击复杂度低，且无需用户交互。"
published = "2000-06-01T04:00:00.000"
remediation = "立即删除 Sambar Server 中的 finger 和 whois 演示脚本（通常位于 cgi-bin 目录下），或直接禁用相关 CGI 功能。Sambar Server 4.3 已停止维护且不再有官方补丁，建议迁移至受支持的 Web 服务器（如 Apache、Nginx 或 IIS）。如无法立即迁移，应在防火墙层面限制对 Sambar Server 的访问来源 IP，仅允许可信网络段访问。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "Sambar Server finger和whois演示脚本缓冲区溢出远程代码执行漏洞"
updated = "2026-06-16T21:51:53.260"

