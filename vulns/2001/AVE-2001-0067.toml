[basic]
description = "qDecoder 库 5.08 及更早版本存在远程缓冲区溢出漏洞。该漏洞在处理 CGI 程序（如 CrazyWWWBoard、CrazySearch 等）接收的 HTTP 请求时，未对 MIME Content-Type 头部长度进行正确边界检查，远程攻击者无需身份认证即可通过发送特制的超长 Content-Type 头部触发缓冲区溢出，进而执行任意命令，完全控制目标服务器。"
published = "2001-05-03T04:00:00.000"
remediation = "立即升级 qDecoder 库至 5.08 以上版本（如存在），或停止使用基于 qDecoder 开发的 CGI 程序（CrazyWWWBoard、CrazySearch 等），迁移至现代 Web 框架替代方案。建议在 Web 服务器层面对 MIME Content-Type 头长度进行限制（如 Apache 的 LimitRequestLine 指令），并禁用对不可信 CGI 程序的访问。"
score = 10
severity = "CRITICAL"
sources = ["exploitdb"]
