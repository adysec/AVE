[basic]
description = "绿盟IPS（入侵防御系统）存在敏感信息泄露漏洞，系统未对 `users.json` 文件进行访问控制，导致远程攻击者无需任何认证即可通过直接访问该路径获取设备中的用户账户信息。泄露的数据可能包含用户名、密码哈希等敏感凭据，攻击者可利用这些信息进行进一步渗透攻击。目前该漏洞利用细节尚未公开披露。"
published = "0703"
remediation = "立即修改绿盟IPS Web管理后台的Nginx/Apache配置，禁止直接访问 `/users.json` 路径，添加 `location /users.json { deny all; }` 规则。同时升级到绿盟官方发布的最新IPS固件版本，修改所有管理员密码，并检查访问日志确认是否存在被利用痕迹。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "绿盟IPS users.json信息泄露漏洞"
updated = "0703"

