[info]
author = "AVE"
description = "检测 MHonArc 邮件归档服务是否存在跨站脚本漏洞（CVE-2002-0738），通过访问归档页面确认服务运行状态"
id = "POC-AVE-2002-0021"
name = "MHonArc 邮件归档跨站脚本漏洞 PoC"
severity = "high"
tags = ["ave-2002-0021"]
vuln_id = [
    "CVE-2002-0738",
    "AVE-2002-0021",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["MHonArc"]
