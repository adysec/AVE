[basic]
description = "BMC Software Patrol SNMP Agent 3.2.07 之前版本存在权限提升漏洞。本地攻击者可通过向 snmpmagt 程序传递目标文件路径作为第二个参数，以 root 权限创建任意全局可写文件，进而实现本地权限提升或系统文件篡改。该漏洞影响 Patrol 3.2.5 及更早版本，攻击者需具备本地系统访问权限，CVSS 评分 7.2，危害等级高。"
published = "1999-07-13T04:00:00.000"
remediation = "升级 BMC PATROL SNMP Agent 到 3.2.07 及以上版本，此版本修复了 snmpmagt 程序参数校验缺陷。如无法升级，限制本地用户对 snmpmagt 二进制文件的执行权限，仅允许受信管理员账户使用。同时监控 /tmp 等目录下异常的世界可写文件创建行为。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "BMC PATROL SNMP Agent 本地文件创建致权限提升漏洞"
updated = "2026-06-16T21:50:29.277"

