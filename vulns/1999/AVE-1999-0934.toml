[basic]
description = "UNIX 系统下的新闻阅读器 tin 和 rtin 在创建临时日志文件 /tmp/.tin_log 时使用了不安全的文件权限，并且程序会跟随符号链接进行操作。本地攻击者可通过预先创建符号链接指向目标文件，诱使程序以当前用户权限修改链接指向文件的权限，属于典型的符号链接攻击（symlink attack）。该漏洞影响多种 UNIX 发行版本，攻击者需要具有本地系统访问权限，利用难度较低，可能造成敏感文件权限被非授权修改。"
published = "2002-01-15T05:00:00.000"
remediation = "升级 tin 至 1.4 及以上版本，或 rtin 至更高版本，确保 /tmp/.tin_log 文件仅对当前用户可读写。如无法升级，可删除 /tmp/.tin_log 改为只读空文件并锁定权限，或使用 Sticky Bit 保护 /tmp 目录防止符号链接攻击。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "tin rtin UNIX新闻阅读器符号链接攻击漏洞"
updated = "2026-06-16T21:49:42.177"

