[basic]
description = "Go 语言 net/http 包在处理 HTTP 客户端重定向时存在安全漏洞。当客户端向 a.com 发送包含 Authorization 等敏感标头的请求，经过跨域重定向到 b.com 后，敏感标头本应被丢弃，但在后续同域重定向链（如 a.com → b.com/1 → b.com/2）中，敏感标头会被错误地恢复并发送到 b.com/2，导致敏感信息泄露。攻击者可利用精心构造的重定向链窃取用户凭据，影响使用 Go net/http 标准库的应用。该漏洞 CVSS 评分 6.1，危害等级中危。"
published = "2025-01-28T02:15:28.807"
remediation = "升级 Go 至 1.22.11、1.23.5 或 1.24.0-rc.2 及以上版本，这些版本已修复跨域重定向后敏感标头被错误恢复的问题。如无法立即升级，可在应用层对重定向链中的目标域名做白名单校验，避免敏感标头发往不可信域名。"
score = 6.1
severity = "MEDIUM"
sources = ["msrc"]
title = "Go net/http 跨域重定向敏感标头信息泄露漏洞"
updated = "2026-06-17T07:54:03.217"

