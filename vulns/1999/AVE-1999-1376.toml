[basic]
description = "cidentd 软件中的 ident 守护进程存在缓冲区溢出漏洞。本地攻击者通过在 .authlie 配置脚本中写入超长字符串，可触发缓冲区溢出，导致攻击者能够覆盖内存数据并执行任意代码，从而获取系统 root 权限。该漏洞攻击前提为拥有本地访问权限，利用难度较低，可造成权限提升，对系统机密性、完整性和可用性构成严重影响（CVSS 评分 7.2）。"
published = "1998-01-10T05:00:00.000"
remediation = "建议立即升级 cidentd 至 1.3.2 及以上修复版本，该版本已修复 .authlie 文件读取时的缓冲区边界检查缺陷。如无需 ident 认证服务，应直接卸载 cidentd 或禁用该守护进程；需继续使用时，限制仅可信任用户访问系统，并通过防火墙过滤 113 端口入站请求作为临时缓解。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "cidentd identd 缓冲区溢出漏洞"
updated = "2026-06-16T21:49:52.877"

