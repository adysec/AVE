[basic]
description = "Livingston RADIUS 实现存在缓冲区溢出漏洞，未经认证的远程攻击者可通过向 RADIUS 认证服务发送特制数据包触发缓冲区溢出，导致以 root 权限执行任意代码。该漏洞影响多个 Livingston 版本，CVSS 评分 7.5，危害等级高。建议升级至最新版本或部署访问控制列表限制 RADIUS 服务访问。"
published = "1997-12-01T05:00:00.000"
remediation = "立即升级 Livingston RADIUS 至 2.0 及以上版本，该版本修复了 RADIUS 代码中的栈缓冲区溢出漏洞。对于无法升级的旧系统，应在边界防火墙上限制对 RADIUS UDP 端口 1812/1645 的访问来源，仅允许受信任的 NAS 设备 IP 接入。建议迁移至当前仍受支持的 RADIUS 实现（如 FreeRADIUS 3.x），并在运行 RADIUS 服务的主机上启用栈缓冲区溢出保护机制（如 ASLR、NX）。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "Livingston RADIUS 缓冲区溢出漏洞"
updated = "2026-06-16T21:47:59.367"

