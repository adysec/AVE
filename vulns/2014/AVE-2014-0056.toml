[basic]
description = "WordPress 的 ThemePunch Slider Revolution（revslider）插件 3.0.96 之前版本及 Showbiz Pro 插件 1.7.1 及更早版本未正确限制管理员 AJAX 功能的访问权限，导致远程未经身份认证的攻击者可通过向目标站点发送特制的 HTTP 请求，利用 update_plugin 操作上传并执行任意恶意文件，或通过 delete_slider 操作删除任意滑块，亦可创建、更新、导入、导出任意滑块数据。该漏洞影响大量使用该插件的 WordPress 站点，攻击者无需任何身份验证即可完全控制目标服务器，危害严重。公开的 Metasploit 模块和 Nuclei 模板可自动化利用此漏洞。"
published = "2015-06-30T14:59:03.393"
remediation = "立即将 ThemePunch Slider Revolution 插件升级到 3.0.96 或更高版本，同时将 Showbiz Pro 插件升级到 1.7.1 以上。如无法升级，可删除插件中 /wp-admin/admin-ajax.php 对未授权用户的访问，或在 Web 服务器层面限制 /wp-content/plugins/revslider/ 目录的写入权限。"
score = 7.5
severity = "HIGH"
sources = ["nuclei"]
title = "ThemePunch Slider Revolution WordPress插件任意文件上传执行漏洞"
updated = "2026-06-17T00:18:53.573"

