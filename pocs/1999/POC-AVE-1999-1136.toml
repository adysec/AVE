[info]
author = "ave"
description = '验证 Ipswitch IMail 5.0/6.0 使用弱加密将邮件账户密码存储于 Windows 注册表键值中。该漏洞为本地利用，攻击者需在目标主机上以本地用户身份读取 IMail 注册表项（如 HKLM\Software\Ipswitch\IMail\Domains\\Users），并运行解密工具还原明文密码。PoC 通过 file 协议检查是否存在公开解密工具（Exploit-DB #401）以确认可复原密码，从而验证弱加密缺陷。'
id = "POC-AVE-1999-1136"
name = "CVE-1999-1497 IMail 弱加密密码本地解密 PoC"
severity = "high"
tags = ["ave-1999-1136"]
vuln_id = [
    "CVE-1999-1497",
    "AVE-1999-1136",
]

[poc]
logic = "all"

[[poc.requests]]
path = "/etc/passwd"
protocol = "file"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["root:"]
