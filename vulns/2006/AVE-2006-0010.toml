[basic]
description = "Apache HTTP Server 的 mod_dav 模块在处理精心构造的 If: 请求头时存在越界读取或写入漏洞。攻击者可通过发送特制的 If: 请求头，触发堆内存中超出请求头值的单字节读取或写入操作，导致进程崩溃，造成拒绝服务。该漏洞影响 Apache HTTP Server 2.4.54 及更早版本，CVSS 评分 7.5，危害等级高危。攻击无需身份认证，远程即可利用，建议升级至 2.4.55 及以上版本修复。"
published = "2023-01-17T20:15:11.177"
remediation = "升级 Apache HTTP Server 至 2.4.55 及以上版本（最新稳定版为 2.4.66），该漏洞已在 2.4.55 中修复。如无法立即升级，可在反向代理或 WAF 层面过滤包含恶意 If: 请求头的流量作为临时缓解措施。"
score = 7.5
severity = "HIGH"
sources = ["tenable"]
title = "Apache HTTP Server mod_dav 越界读取或写入零字节漏洞"
updated = "2026-06-16T22:24:06.513"

