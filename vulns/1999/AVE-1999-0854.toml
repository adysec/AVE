[basic]
description = "VDOLive Player 3.0.2 版本的解码播放模块存在缓冲区溢出漏洞。该播放器在解析用户提供的 .vdo 媒体文件时，未对文件内容进行边界校验，攻击者可通过构造特制的畸形 .vdo 文件触发栈缓冲区溢出，进而在受害者的客户端系统上执行任意命令。该漏洞影响运行 VDOLive Player 3.0.2 的 Windows 客户端，攻击条件为诱使本地用户打开恶意文件（亦可结合网页内嵌方式远程诱导打开），属本地触发、客户端执行的代码执行类漏洞。"
published = "1999-12-13T05:00:00.000"
remediation = "由于 VDO Live Player 3.0.2 源代码已公开且产品已停产，建议直接卸载此软件或更换为现代安全的视频播放器，如使用 VLC 播放器或 FFmpeg 在安全环境中处理 VDO 文件。如无法卸载，可禁止 .vdo 文件类型关联，并配置操作系统仅在隔离沙盒中打开此类文件，且关闭所有自动下载功能。"
score = 7.6
severity = "HIGH"
sources = ["avd"]
title = "VDO Live VDO Live Player 3.0.2 缓冲区溢出"
updated = "2026-06-16T21:49:30.627"

