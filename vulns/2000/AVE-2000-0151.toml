description = "mtr（My TraceRoute）网络诊断工具在尝试放弃特权时仅使用 seteuid() 系统调用，而非 setuid()。seteuid() 仅临时切换有效用户 ID，拥有 CAP_SETUID 能力的进程可恢复为 root 权限，导致本地攻击者能够重新获取提升后的特权，完全控制受影响系统。攻击条件为拥有本地 shell 访问权限。"
