[basic]
description = "OpenOffice.org 3.2 之前版本的 filter/ww8/ww8par2.cxx 文件在处理 Word 文档中的 sprmTSetBrc 表格属性修饰符时存在边界错误漏洞。远程攻击者可通过诱导用户打开精心构造的恶意 Word 文档，触发边界错误导致应用程序崩溃（拒绝服务）或可能执行任意代码。该漏洞影响 OpenOffice.org 3.2 之前的所有版本，CVSS 评分 9.3（CVSS:AV:N/AC:M/Au:N/C:C/I:C/A:C），属于严重级别代码执行漏洞（CWE-94）。攻击者无需认证即可通过网络远程攻击，需要用户交互打开恶意文档。OpenOffice.org 3.2 版本已修复此漏洞，建议用户升级至 3.2 或更高版本。"
published = "2010-02-16T19:30:00.580"
remediation = "建议立即升级 OpenOffice.org 至 3.2 或更高版本（如 Apache OpenOffice 4.x 或 LibreOffice 7.x 等维护分支）。从官网 https://www.openoffice.org/download/ 下载对应平台安装包并覆盖安装。若暂时无法升级，请暂停使用受影响版本打开来源不明的 Microsoft Word 文档，并部署文档杀毒/沙箱隔离作为临时缓解措施。"
score = 9.3
severity = "CRITICAL"
sources = ["tenable"]
title = "Apache OpenOffice Word 文档处理远程代码执行漏洞"
updated = "2026-06-16T23:11:20.637"

