[info]
author = "ave"
description = "通过构造含反斜杠的恶意 URL，验证 fast-uri 与 Node.js WHATWG URL 解析器之间的主机解析差异，检测目标应用是否存在 SSRF 绕过风险。"
id = "POC-AVE-2026-0245"
name = "fast-uri 主机混淆漏洞 PoC（反斜杠权限定符解析差异）"
severity = "high"
tags = ["ave-2026-0245"]
vuln_id = [
    "CVE-2026-16221",
    "AVE-2026-0245",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "fast-uri",
    "host_confusion",
]
