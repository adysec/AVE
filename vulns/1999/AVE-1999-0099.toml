[basic]
description = "ftpd 守护进程的信号处理例程中存在条件竞争漏洞（Race Condition），攻击者可利用信号处理时序差绕过文件访问控制，实现任意文件读取或写入。该漏洞影响多个 UNIX 系统中的 ftpd 实现，攻击者需与目标建立 FTP 连接并在特定操作窗口内触发竞态条件以完成利用，CVSS 评分 5.4，危害等级中危。"
published = "1997-05-29T04:00:00.000"
remediation = "升级 wu-ftpd 至 2.5.0 或更高版本，该版本修复了信号处理例程中的条件竞争问题。如无法升级，建议禁用 FTP 服务（systemctl disable vsftpd/wu-ftpd）或替换为 vsftpd/ProFTPD 等更安全的 FTP 守护进程。在不必要的情况下，可通过防火墙限制对 21 端口的访问作为临时缓解措施。"
score = 5.4
severity = "MEDIUM"
sources = ["epss"]
title = "多厂商 Unix ftpd 信号处理竞态条件漏洞"
updated = "2026-06-16T21:47:24.893"

