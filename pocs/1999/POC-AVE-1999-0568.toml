[info]
author = "ave"
description = "检查 Sun Solaris 7.0 系统中 /usr/dt/bin/dtprintinfo 是否存在。该 setuid 程序在处理 -p 参数时存在栈缓冲区溢出，本地攻击者可利用此漏洞以 root 权限执行任意代码。通过验证文件存在性确认攻击面。"
id = "POC-AVE-1999-0568"
name = "Sun Solaris dtprintinfo 本地缓冲区溢出漏洞 PoC"
severity = "high"
tags = [
    "cve-1999-0806",
    "solaris",
    "buffer-overflow",
    "local",
]
vuln_id = [
    "CVE-1999-0806",
    "AVE-1999-0568",
]

[poc]
logic = "all"

[[poc.requests]]
path = "/usr/dt/bin/dtprintinfo"
protocol = "file"

[[poc.requests.matchers]]
expect = true
part = "body"
regex = ".+"
type = "regex"
