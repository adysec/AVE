[basic]
description = "Red Hat Linux 6.0 中的 screen 和 rxvt 终端程序未能正确设置 tty 设备的权限模式，导致本地攻击者可利用该缺陷向其他用户的终端设备写入数据。该漏洞源于终端程序在创建或管理伪终端时权限配置不当，使得同一系统上的低权限用户能够向其他 tty 设备发送任意内容，可能造成信息泄露或干扰其他用户正常操作。攻击者需拥有本地系统访问权限方可利用，CVSS 评分 4.6，危害等级中危。"
published = "1999-06-01T04:00:00.000"
remediation = "升级 screen 和 rxvt 软件包至 Red Hat 官方安全公告 RHSA-1999:014-01 中提供的修正版本，或升级至 Red Hat Linux 6.0 之后的支持版本。若无法立即升级，可通过在 /etc/rc.d/rc.local 中添加 `chmod 620 /dev/pts/*` 命令，将伪终端设备权限从全局可写(666)改为属主和 tty 组可写(620)作为临时缓解措施。同时建议使用 `umask 027` 限制默认创建文件的权限。"
score = 4.6
severity = "MEDIUM"
sources = ["cve"]
title = "Red Hat Linux screen 与 rxvt 终端设备权限设置不当漏洞"
updated = "2026-06-16T21:51:33.790"

