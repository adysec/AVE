[basic]
description = "ISC DHCP 客户端程序 dhclient 存在命令注入漏洞，远程攻击者可通过在 DHCP 响应报文中注入 shell 元字符，使客户端在处理 DHCP 选项时执行任意系统命令。由于 DHCP 客户端通常以 root 权限运行，攻击者无需身份认证即可在目标系统上获得完全控制权，造成机密性、完整性和可用性的全面破坏。该漏洞影响运行 ISC DHCP 客户端的主流 Linux 及 Unix 类操作系统，CVSS 评分 10.0，危害等级严重。攻击者可在目标主机接入网络时，通过伪造 DHCP 服务器响应向客户端发送特制数据包完成利用，建议升级至 ISC DHCP 已修复版本以消除风险。"
published = "2000-06-24T04:00:00.000"
remediation = "立即将 ISC DHCP 客户端升级到 dhclient 2.0pl3 及以上（2.x 系列）或 3.0b1pl17 及以上（3.x 系列）；FreeBSD 用户可升级至 4.1-RELEASE 或之后基系统（已含 2.0pl3）。Debian 用户请安装官方安全更新后的 dhcp-client / dhcp-client-beta 包。若暂时无法升级，在 /etc/rc.conf 或网络配置文件中将 DHCP 客户端禁用，改为静态 IP 配置并重启网络服务，避免从不可信 DHCP 服务器获取配置。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "ISC DHCP client 远程代码执行漏洞"
updated = "2026-06-16T21:52:03.183"

