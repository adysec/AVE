[basic]
description = 'Rapidstream 2.1 Beta VPN 设备中的 sshd 程序存在硬编码后门账户漏洞，系统内置了名为 "rsadmin" 的默认管理员账户且密码为空字符串。远程攻击者无需任何身份认证，即可通过 SSH 服务直接使用该空密码账户登录目标设备，获得完全的管理员权限，进而执行任意系统命令、窃取敏感数据或控制整个设备。该漏洞影响 Rapidstream 2.1 Beta 版本，CVSS 评分 10.0，危害等级严重。厂商至今未发布官方补丁，建议立即更换受影响的设备或禁用 SSH 服务并配置严格的访问控制策略。'
published = "2000-10-20T04:00:00.000"
remediation = '立即禁用或删除 Rapidstream 2.1 Beta VPN 设备中硬编码的 "rsadmin" 账户，或为其设置强密码。如设备支持，升级到已修复此问题的官方固件版本。若无法升级，在防火墙上限制 SSH 端口的访问来源 IP，仅允许受信任的管理地址连接，并启用 SSH 登录日志审计以检测异常登录行为。'
score = 10
severity = "CRITICAL"
sources = ["cve"]
title = "Rapidstream sshd 硬编码空密码远程代码执行漏洞"
updated = "2026-06-16T21:52:28.447"

