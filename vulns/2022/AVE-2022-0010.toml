[basic]
description = "SDL2 图像渲染库中的 GLES_CreateTexture() 函数存在内存泄漏漏洞（CWE-401），由于未正确释放已分配的内存资源，远程攻击者可通过向使用 SDL2 的应用程序发送特制的纹理数据触发该漏洞，导致目标系统内存资源被耗尽，从而引发拒绝服务。该漏洞影响 SDL2 v2.0.4 及以上版本，SDL-1.x 不受影响，CVSS 评分 7.5，危害等级高。"
published = "2023-01-12T19:15:24.457"
remediation = "建议升级 SDL2 至 2.26.0 或更高版本，该版本已在 commit 00b67f55 中修复 GLES_CreateTexture 函数中 glGenTextures/glTexImage2D 失败时未释放 pixels 内存的问题。Debian 用户可通过 LTS 更新安装补丁，Gentoo 用户执行 emerge --oneshot >=media-libs/libsdl2-2.26.0。如无法升级，避免在 OpenGL ES 环境下使用 SDL2 处理流纹理作为临时缓解措施。"
score = 7.5
severity = "HIGH"
sources = ["msrc"]
title = "SDL SDL2 内存泄漏拒绝服务漏洞"
updated = "2026-06-17T05:21:42.807"

