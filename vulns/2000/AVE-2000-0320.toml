[basic]
description = "Kerberos 4/5 的 krb_rd_req() 兼容函数存在缓冲区溢出漏洞，远程攻击者无需身份认证即可向目标系统发送特制的 Kerberos 请求数据包，触发栈缓冲区溢出，从而获得 root 权限。该漏洞影响 Cygnus Network Security 4.0、KerbNet 5.0、MIT Kerberos 4/5 及 RedHat 6.2 等版本，CVSS 评分 10.0，危害等级严重。受影响系统需安装对应安全补丁或升级至修复版本。"
published = "2000-05-16T04:00:00.000"
remediation = "立即将 MIT Kerberos 5 升级至 1.1.1 或更高版本，该版本修复了 krb_rd_req() 函数中的缓冲区溢出漏洞；Red Hat Linux 6.2 用户请安装 RHSA-2000-025 提供的 krb5 更新包；使用 Cygnus Network Security 4.0 或 KerbNet 5.0 的用户应联系厂商获取对应安全补丁。如无法立即升级，可在防火墙层面限制 Kerberos 服务端口（TCP/UDP 88、464、749）的远程访问作为临时缓解措施。"
score = 10
severity = "CRITICAL"
sources = ["cve"]
title = "MIT Kerberos krb_rd_req 缓冲区溢出远程代码执行漏洞"
updated = "2026-06-16T21:51:36.847"

