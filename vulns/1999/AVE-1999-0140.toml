[basic]
description = "ICQ Webserver 存在目录遍历漏洞，远程攻击者无需认证即可通过向服务器发送包含 `../` 序列的特制 HTTP 请求，突破路径限制访问用户个人目录之外的任意文件，导致系统敏感信息泄露。该漏洞影响早期 ICQ 版本，攻击条件简单，危害等级中危。"
published = "1999-04-05T04:00:00.000"
remediation = "立即升级 ICQ 至 99a 或更高版本，该版本已修复目录遍历漏洞。如无法升级，请在 ICQ 设置中禁用内置 Web 服务器功能（Disable ICQ Web Server），并在防火墙层面阻止外部对 ICQ 默认 Web 端口（如 2000/tcp）的访问作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "ICQ ICQ Webserver 目录遍历漏洞"
