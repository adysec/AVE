[basic]
description = "Gogs（Go Git Service）0.3.1-9 至 0.5.6.1105 Beta 之前版本中存在多处 SQL 注入漏洞。由于 models/repo.go 和 models/user.go 对 api/v1/repos/search 及 api/v1/users/search 接口的 q 参数过滤不严，远程攻击者无需认证即可通过构造特制的 q 参数注入任意 SQL 命令，导致数据库敏感信息泄露、数据篡改甚至服务器被控制。CVSS 评分 7.5，危害等级高。"
published = "2014-11-21T15:59:09.773"
remediation = "升级 Gogs 至 0.5.6.1105 Beta 或更高版本，该版本已修复 models/repo.go 和 models/user.go 中搜索接口的 SQL 注入问题。如无法立即升级，可在反向代理层对 /api/v1/repos/search 和 /api/v1/users/search 接口的 q 参数进行输入过滤，限制仅允许字母、数字和常见搜索字符。"
score = 7.5
severity = "HIGH"
sources = ["nuclei"]
title = "Gogits Gogs SQL注入漏洞"
updated = "2026-06-17T00:17:09.033"

