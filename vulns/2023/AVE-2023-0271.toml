[basic]
description = "锐捷EG易网关（Ruijie EG系列企业级网关设备）存在一处安全漏洞，具体漏洞类型与触发原理在现有数据源中尚未明确披露（标记为未知）。该漏洞可能影响使用锐捷EG易网关设备的网络边界安全，攻击者若能够访问设备所在网络或管理接口，可能利用该缺陷对网关设备发起攻击，进而威胁内网安全。由于缺少公开的漏洞原理、CVSS评分及官方修复公告等详细信息，建议用户及时关注锐捷官方安全通告，升级设备固件至最新版本，并限制管理接口的访问来源以规避潜在风险。"
published = "08.09"
remediation = "将锐捷EG易网关设备固件升级至厂商于2023年8月9日之后发布的安全版本（建议联系锐捷技术支持获取EG系列最新固件并导入升级）。如暂无法升级，应在边界防火墙或上层设备上关闭该网关设备的互联网直接暴露面，仅允许受信任内网IP访问管理端口，并启用ACL访问控制与Web应用防火墙规则以缓解风险。"
