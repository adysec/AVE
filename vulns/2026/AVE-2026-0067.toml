[basic]
description = "JetBrains Hub 存在认证绕过漏洞（CWE-306），未经身份认证的远程攻击者可绕过登录验证机制直接访问管理后台接口，进而执行管理员权限操作，可能导致数据泄露或远程代码执行。该漏洞影响 JetBrains Hub 2025.3.119807 之前的所有版本，CVSS 评分 9.1，危害等级严重。官方已发布修复版本 2025.3.119807，建议用户立即升级。"
published = "2026-02-09T11:16:15.150"
remediation = "立即升级 JetBrains Hub 至 2025.3.119807 或更高版本，该版本已修复认证绕过漏洞。若无法立即升级，可在反向代理层对 Hub 管理端添加 IP 白名单访问控制并启用多因素认证（MFA）作为临时缓解。"
score = 9.1
severity = "CRITICAL"
sources = ["hwpoc"]
title = "JetBrains Hub 认证绕过与远程代码执行漏洞"
