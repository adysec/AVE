[basic]
description = "Duplicator WordPress 插件 0.4.5 之前版本中的 files/installer.cleanup.php 存在反射型跨站脚本（XSS）漏洞，远程攻击者通过向 package 参数注入恶意 Web 脚本或 HTML 代码，当管理员访问特制链接时脚本将在浏览器中执行，可能导致敏感信息泄露、会话劫持等危害。攻击无需认证，利用复杂度低。该漏洞影响 Duplicator 0.4.2/0.4.3/0.4.4 版本，CVSS 评分 4.3，危害等级中危。用户需升级至 0.4.5 及以上版本修复。"
published = "2013-08-09T21:55:07.157"
remediation = "立即将 WordPress Duplicator 插件升级至 0.4.5 或更高版本。如无法立即升级，可暂时禁用该插件，或通过 Web 应用防火墙（WAF）规则过滤 `package` 参数中的恶意脚本代码作为临时缓解措施。"
score = 4.3
severity = "MEDIUM"
sources = ["nuclei"]
title = "WordPress Duplicator 插件跨站脚本漏洞"
updated = "2026-06-16T23:57:37.980"

