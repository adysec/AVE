[basic]
description = 'Microsoft IIS 4.0 及 5.0 版本存在源代码片段泄漏漏洞，远程攻击者可通过在 URL 后附加 "+.htr" 后缀向目标 Web 服务器发送特制请求，触发服务器返回 ASP 或其他脚本文件的源代码片段，导致敏感信息（如数据库连接字符串、业务逻辑代码等）泄露。攻击者无需身份认证即可远程利用，进一步可结合泄露信息实施更深层次攻击。'
published = "2000-07-17T04:00:00.000"
remediation = '删除 IIS 中 .htr 的脚本映射（ISAPI 扩展），在 IIS 管理器中移除 "ssinc.dll" 对 .htr 扩展名的关联。升级至 IIS 6.0 或更高版本，或安装 Microsoft 安全更新 MS00-044。作为缓解措施，可在 Web 服务器上通过 URLScan 工具阻止包含 .htr 的请求。'
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Microsoft IIS 4.0/5.0 源代码片段泄露漏洞"
updated = "2026-06-16T21:52:08.837"

