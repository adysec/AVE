[basic]
description = "深信服零信任访问控制系统存在任意密码重置漏洞，攻击者无需认证即可通过构造特制的请求包绕过权限验证，重置任意用户的登录密码，从而获取系统管理权限。该漏洞影响深信服零信任接入平台多个版本，攻击条件低，危害严重，可能导致内部网络被未授权访问。"
published = "0709"
remediation = "立即升级深信服零信任（aTrust）至厂商发布的最新安全版本，修复密码重置接口未授权访问缺陷；在管理后台配置增强的密码重置验证机制，启用短信/邮箱二次验证码校验；通过WAF或Nginx规则限制对密码重置相关API的访问来源IP，禁止非内网IP直接访问重置接口；检查并关闭不必要的密码找回功能入口。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
