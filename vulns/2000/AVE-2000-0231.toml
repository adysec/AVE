[basic]
description = "Novell NetWare 5.1 远程 Web 管理工具存在缓冲区溢出漏洞，远程攻击者可通过向目标系统发送特制的超长 URL 请求触发该漏洞，导致服务拒绝或任意命令执行。该漏洞影响 Novell NetWare 5.1 版本，无需身份认证即可远程利用，CVSS 评分 7.5，危害等级高。厂商已发布安全补丁修复此问题。"
published = "2000-04-19T04:00:00.000"
remediation = "立即安装 Novell NetWare 5.1 Support Pack 5 或更高版本，该补丁限制了远程 Web 管理模块对 URL 长度的处理。由于 NetWare 5.1 已停止技术支持，建议升级到受支持的 Open Enterprise Server 版本。如无法升级，可在防火墙上限制对 Web 管理端口（默认 8008/8009）的访问，仅允许受信任管理 IP 连接，作为临时缓解措施。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "Novell NetWare 5.1 远程Web管理缓冲区溢出漏洞"
updated = "2026-06-16T21:51:20.243"

