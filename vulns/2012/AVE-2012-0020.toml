[basic]
description = "WordPress 的 Download Monitor 插件 3.3.5.9 之前版本存在跨站脚本（XSS）漏洞，远程攻击者可通过向默认 URI 的 dlsearch 参数注入恶意 Web 脚本或 HTML 代码，当管理员或其他用户访问受影响页面时脚本被执行，导致敏感信息泄露或会话劫持。该漏洞无需身份认证即可利用，影响大量使用该插件的 WordPress 站点。"
published = "2014-09-04T14:55:09.960"
remediation = "立即将 Download Monitor 插件升级至 3.3.5.9 或更高版本。如无法升级，可在 WordPress 后台禁用该插件，或通过 Web 应用防火墙（WAF）规则过滤 dlsearch 参数中的恶意脚本代码作为临时缓解措施。"
score = 4.3
severity = "MEDIUM"
sources = ["nuclei"]
title = "WordPress Download Monitor 插件跨站脚本漏洞"
updated = "2026-06-16T23:45:41.530"

