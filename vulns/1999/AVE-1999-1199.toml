[basic]
description = "AIX 4.3 的 nslookup 工具中存在缓冲区溢出漏洞，本地用户可通过向命令行参数传递超长 hostname 字符串触发缓冲区溢出，从而实现任意代码执行。该漏洞影响 AIX 4.3 操作系统，本地攻击者需具有系统登录权限，利用难度较低，CVSS 评分 7.2，危害等级高。建议受影响的系统及时升级至安全版本或安装 IBM 发布的补丁程序。"
published = "1999-09-30T04:00:00.000"
remediation = "立即安装 IBM AIX 4.3 的 APAR IY02120 补丁修复 nslookup 缓冲区溢出漏洞；如无法打补丁，可删除 nslookup 的 setuid 位（chmod u-s /usr/bin/nslookup）缓解本地提权风险，或限制不可信用户的本地登录权限。建议升级至 AIX 5.1 及以上版本以彻底规避此问题。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "IBM AIX nslookup 本地缓冲区溢出漏洞"
updated = "2026-06-16T21:50:46.297"

