[basic]
description = "Infopop Ultimate Bulletin Board (UBB) 的 topic 隐藏字段存在命令注入漏洞，远程攻击者可通过在 topic 隐藏字段中注入 shell 元字符（如反引号、管道符等），在未授权的情况下利用 Web 应用权限执行任意系统命令。该漏洞影响 UBB 及相关版本，攻击者无需身份认证即可远程利用，CVSS 评分 10.0，危害等级严重。厂商已发布安全更新修复此漏洞，建议用户升级至最新版本。"
published = "2000-02-11T05:00:00.000"
remediation = "立即升级至 UBB 6.0 及以上版本，该版本已在 topic hidden 字段处理中过滤 shell 元字符（; | ` $() {} <> &）。若因兼容性无法升级，应修改 ubb_lib.cgi 中处理 topic 隐藏字段的代码，对用户输入使用 Perl 的 quotemeta 函数转义特殊字符，或改用列表参数形式的 system() 调用而非字符串传递。鉴于 UBB 已停止维护，建议迁移至 phpBB、Discourse 等持续更新的现代论坛系统。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "Infopop Ultimate Bulletin Board 远程代码执行漏洞"
updated = "2026-06-16T21:51:05.100"

