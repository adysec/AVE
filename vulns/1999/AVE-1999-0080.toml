[basic]
description = "SGI IRIX 6.3 系统中的 df 命令存在缓冲区溢出漏洞，本地普通用户可通过向 df 命令传入特制参数触发缓冲区溢出，从而获取 root 权限。该漏洞影响 SGI IRIX 6.3 版本，攻击者需拥有本地系统访问权限才能利用，CVSS 评分 7.2，危害等级高危。"
published = "1997-07-16T04:00:00.000"
remediation = "安装 SGI 提供的 IRIX 补丁 19970505-02-PX 或升级至 IRIX 6.4 及以上版本。如无法立即打补丁，可先执行 `chmod u-s /usr/sbin/df` 移除 df 的 setuid root 权限作为临时缓解措施；同时建议部署 AUSCERT overflow_wrapper 工具限制 df 命令行参数长度不超过 32 字节，并启用 syslog 记录异常调用行为。"
score = 7.2
severity = "HIGH"
sources = ["epss"]
title = "SGI IRIX df 命令本地缓冲区溢出权限提升漏洞"
updated = "2026-06-16T21:47:22.730"

