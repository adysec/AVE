[basic]
title = "Caldera OpenLinux 2.3 Ident 守护进程拒绝服务漏洞"
description = "Caldera OpenLinux 2.3 系统中的 IDENT 服务（identd）在处理每个 IDENT 请求时会创建多个线程，远程攻击者可以通过发送大量 IDENT 请求消耗系统资源，导致服务拒绝服务。该漏洞无需认证即可远程利用，影响系统可用性。"
severity = "MEDIUM"
score = 5.0
sources = ["cve", "epss"]
published = "1999-10-08"
updated = "2026-06-16"
remediation = "升级到 Caldera OpenLinux 2.3 的补丁版本，或禁用 identd 服务。官方安全公告 CSSA-1999-029.1 提供了修复补丁，可从 Caldera 官方 FTP 获取。"
