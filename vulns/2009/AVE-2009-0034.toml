[basic]
description = "OpenOffice.org XPMReader::ReadXPM 函数存在整数溢出漏洞，攻击者可通过诱导用户打开精心构造的恶意 XPM 图像文件，触发堆缓冲区溢出实现远程代码执行。该漏洞影响 OpenOffice.org 3.2 及之前版本，攻击向量为网络，攻击复杂度中等，无需身份认证即可利用，成功利用可导致完全的机密性、完整性和可用性丧失（CVSS 9.3，CVSS:3.0/AV:N/AC:M/PR:N/UI:R/S:U/C:H/I:H/A:H）。攻击者需诱导受害者打开恶意 XPM 文件，触发 XPMReader::ReadXPM 函数中的整数溢出导致堆缓冲区溢出，进而在用户上下文中执行任意代码。OpenOffice.org 3.2 版本已修复此漏洞。"
published = "2010-02-16T19:30:00.377"
remediation = "立即升级 OpenOffice 到 3.2 或更高版本，应用 Apache 2010 年 8 月安全更新或直接更新到 3.2.1。此前版本存在多项安全问题，需一次性修复所有漏洞。如无法立即更新，可在 OpenOffice 配置中禁用 XPM 文件预览功能以缓解风险。"
score = 9.3
severity = "CRITICAL"
sources = ["tenable"]
title = "OpenOffice.org XPM 文件整数溢出堆缓冲区溢出代码执行漏洞"
updated = "2026-06-16T23:10:33.623"

