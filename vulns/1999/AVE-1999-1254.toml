[basic]
description = "Solaris 2.5.1 及更早版本中的 chkey 工具存在缓冲区溢出漏洞，本地攻击者可通过向 chkey 程序提交超长命令行参数触发该漏洞，导致缓冲区溢出，从而获取 root 权限。该漏洞影响 Solaris 2.5.0 和 2.5.1 版本，攻击者需拥有本地系统访问权限，利用难度较低，危害等级高。"
published = "1997-05-19T04:00:00.000"
remediation = "升级到 Solaris 10 或以上版本，应用 late 1990 年代初的安全更新包（如 Solaris 2.5.1 的 1999 年 12 月补丁包）。如果无法升级，请限制普通用户对 /usr/bin/chkey 命令的访问权限，确保只有受信任的管理员可以执行此命令，并定期检查权限配置。"
score = 7.2
severity = "HIGH"
sources = ["exploitdb"]
