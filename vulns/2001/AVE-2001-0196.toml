[basic]
description = "NullSoft Winamp 2.6x 及 2.7x 版本在处理 AIP 文件时存在缓冲区溢出漏洞，攻击者可通过构造包含超长字符串的恶意 AIP 文件并诱导用户打开，触发栈缓冲区溢出，从而在目标系统上执行任意代码。该漏洞无需身份认证即可利用，攻击复杂度低，影响 Winamp 多媒体播放器的广泛用户群体，可能导致攻击者完全控制受影响的系统。"
published = "2001-06-27T04:00:00.000"
remediation = "升级到 Winamp 2.80 及以上版本，该版本已修复 AIP 文件解析中的缓冲区溢出问题。如无法升级，避免打开来源不明的 .aip 文件，并在邮件网关和下载服务器层面拦截 .aip 后缀文件。鉴于 Winamp 已停止维护，建议迁移至其他受支持的媒体播放器。"
score = 7.5
severity = "HIGH"
sources = ["exploitdb"]
title = "NullSoft Winamp AIP 缓冲区溢出漏洞"
updated = "2026-06-16T21:54:24.330"

