[basic]
description = "Mars NetWare Emulation (NWE, mars_nwe) 软件包中存在缓冲区溢出漏洞，攻击者可通过向目标系统提交超长目录名触发该漏洞，导致缓冲区溢出，进而实现本地权限提升或拒绝服务。该漏洞影响 Martin Stover Mars NWE 0.99 及更早版本，CVSS 评分 7.2，危害等级高。攻击者需拥有本地访问权限方可利用此漏洞。"
published = "1999-08-31T04:00:00.000"
remediation = "立即卸载 mars_nwe 软件包（apt-get remove mars_nwe），该软件已停止维护多年且已从 Debian 仓库移除。迁移至其他受支持的 NetWare 兼容解决方案（如使用 Samba 替代文件共享服务）。如暂时无法卸载，严格限制本地登录用户为受信任账户，并通过 iptables 限制对 524/TCP 和 524/UDP 端口的访问以降低攻击面。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "Martin Stover Mars NWE 缓冲区溢出漏洞"
updated = "2026-06-16T21:49:01.833"

