[basic]
description = "Matt Wright 开发的 download.cgi 1.0 存在路径遍历漏洞。远程攻击者无需认证即可通过向 `f` 参数传入 `..`（点点）序列实现目录穿越，从而读取服务器上的任意文件，包括配置文件、密码文件等敏感信息。该漏洞利用难度低，攻击者仅需构造特制 HTTP 请求即可触发，对系统保密性构成严重威胁。CVSS 评分 5.0，危害等级中危。"
published = "1999-09-09T04:00:00.000"
remediation = '升级 download.cgi 至 2.0 及以上版本（该版本修复了路径遍历问题），或替换为维护中的替代方案。如无法升级，在脚本中对 f 参数进行路径规范化校验，拒绝包含 ".." 或 "/" 的输入，并将脚本运行目录限制在特定子目录下。同时配置 Web 服务器（如 Apache 的 <Directory> 指令）禁止脚本访问 web 根目录外的文件。作为临时缓解措施，可移除或禁用 download.cgi 脚本。'
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Matt Wright download.cgi 任意文件读取漏洞"
updated = "2026-06-16T21:50:18.610"

