[basic]
description = "BSDI 公司发布的 Gauntlet 防火墙 5.0 版本在按特定错误顺序安装官方补丁时，会导致防火墙的访问控制规则、地址过滤与日志记录等安全功能未能正确加载或完全失效。攻击者可在补丁安装顺序不当的情况下，通过向受保护网络发起远程连接绕过防火墙的安全策略，从而访问原本被拒绝的内部资源。该问题并非代码层面的内存破坏，而是安装部署流程缺陷，攻击条件为管理员错误地按非官方推荐顺序打补丁且未完成配置校验。"
published = "1999-10-18"
remediation = "严格按照 BSDI 官方文档规定的顺序重新安装 Gauntlet 5.0 全部补丁程序，安装完成后重启防火墙服务并逐一核对访问控制规则、地址过滤与日志功能已正确加载；在确认生效前临时收紧边界路由器入站 ACL 以限制可疑连接，并开启防火墙规则变更审计与日志巡检。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "BSDI Gauntlet 防火墙 补丁安装顺序错误导致安全规则失效漏洞"
updated = "2026-06-16"

