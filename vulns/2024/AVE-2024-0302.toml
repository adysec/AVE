[basic]
description = "科荣 AIO 管理系统的 ReadFile 接口未对文件路径参数进行有效过滤，攻击者可通过构造包含 ../ 的路径参数实现目录遍历，读取服务器上任意文件，如 web.xml 配置文件、数据库连接配置等敏感信息，导致系统核心数据泄露。攻击者无需身份认证即可远程利用。"
published = "2024-07-26"
remediation = "联系科荣官方获取安全补丁升级至修复版本。临时缓解措施：在 WAF 或反向代理层对 /ReadFile 接口的 path 参数进行过滤，禁止包含 ../ 等目录遍历字符；限制该接口仅允许内网 IP 访问；对 fileName 和 path 参数实施白名单校验，仅允许读取业务所需的合法路径。"
score = 5.0
severity = "MEDIUM"
sources = ["hwpoc"]
title = "科荣 AIO 管理系统任意文件读取漏洞"
updated = "2024-07-26"

