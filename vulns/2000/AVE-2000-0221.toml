[basic]
description = "AnalogX SimpleServer:WWW 1.0.3 版本 HTTP 服务器存在拒绝服务漏洞。远程攻击者可通过向 /cgi-bin 路径发送特制的短 GET 请求，导致服务器进程崩溃或停止响应，造成拒绝服务。该漏洞无需身份认证即可远程触发，攻击条件简单，影响运行该版本 HTTP 服务的所有系统。CVSS 评分 5.0，危害等级中等。"
published = "2000-03-25T05:00:00.000"
remediation = "立即升级 AnalogX SimpleServer:WWW 至最新版本 1.24（官网下载 analogx.com/contents/download/network/sswww.htm），该版本已修复 CGI 目录相关的已知漏洞。如无法升级，可删除或禁用 /cgi-bin 目录，在防火墙中限制对服务器 80 端口的非信任来源访问作为临时缓解措施。"
score = 5
severity = "MEDIUM"
