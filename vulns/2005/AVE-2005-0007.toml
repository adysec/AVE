[basic]
description = "Cofax 2.0 RC3 及之前版本的 search.htm 页面存在跨站脚本（XSS）漏洞，远程攻击者可通过向 searchstring 参数注入恶意 Web 脚本或 HTML 代码实施攻击。当管理员或用户访问被利用的链接时，恶意脚本将在受害者浏览器中执行，可能导致会话劫持、敏感信息泄露等危害。该漏洞影响 Cofax 1.9.9c/1.9.9d/2.0 RC1/2.0 RC2/2.0 RC3 等多个版本，CVSS 评分 4.3，危害等级中等。"
published = "2005-12-20T02:03:00.000"
remediation = "对 search.htm 中 searchstring 参数进行严格的输入过滤与输出编码，过滤 <script>、onerror 等危险关键字并 HTML 实体编码输出。由于 Cofax 项目已停止维护无官方补丁，建议迁移至活跃维护的 CMS 系统，或在 Web 应用防火墙（WAF）层面添加规则拦截包含 XSS 特征的请求作为临时缓解。"
score = 4.3
severity = "MEDIUM"
sources = ["nuclei"]
title = "Cofax Cofax 跨站脚本漏洞"
updated = "2026-06-16T22:18:42.187"

