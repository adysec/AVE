[info]
author = "ave"
description = "验证 RealPlayer 6/7 Location 缓冲区溢出漏洞。远程攻击者通过构造包含超长 Location URL 的 HTTP 重定向响应，诱使用户点击恶意链接后导致 RealPlayer 客户端发生缓冲区溢出而崩溃，造成拒绝服务。该漏洞影响 RealPlayer 6.x 和 7.x 版本，攻击无需身份认证，仅需用户交互即可触发。参考 ExploitDB #19834。"
id = "POC-AVE-2000-0251"
name = "RealNetworks RealPlayer 6/7 Location Buffer Overflow PoC"
severity = "low"
tags = ["ave-2000-0251"]
vuln_id = [
    "CVE-2000-0280",
    "AVE-2000-0251",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/"
protocol = "http"

[poc.requests.body]
content = ""
type = "raw"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["HTTP/1.1 302"]
