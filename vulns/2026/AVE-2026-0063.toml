[basic]
description = "Apache IoTDB 的 Thrift RPC 查询处理器对 sessionId 参数缺乏严格校验，未经认证的远程攻击者可通过构造带有伪造 sessionId 的请求绕过 openSession 身份认证，直接获取合法的时序数据查询结果，导致未授权读取敏感数据。该漏洞影响 Apache IoTDB 1.3.3 至 2.0.8 之前版本，CVSS 评分 9.1，危害等级严重。建议升级至 2.0.8 版本修复。"
published = "2026-07-06T09:16:35.163"
remediation = "立即升级 Apache IoTDB 至 2.0.8 或更高版本，该版本修复了 Thrift RPC 会话 ID 校验缺陷。如无法立即升级，可在网络层面限制对 IoTDB Thrift RPC 端口的访问，仅允许受信任 IP 连接，并启用会话认证日志进行监控。"
score = 9.1
severity = "CRITICAL"
sources = ["hwpoc"]
title = "Apache IoTDB Thrift RPC 身份认证绕过漏洞"
updated = "2026-07-07T17:50:26.877"

