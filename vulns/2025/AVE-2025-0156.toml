[basic]
description = "汉王EFaceGo人脸识别考勤系统管理后台的 monadFileUpload.do 接口存在任意文件上传漏洞，由于未对上传文件的类型和内容进行有效校验，未经身份认证的远程攻击者可直接向该接口发送特制的 multipart 表单请求，上传包含恶意代码的 JSP 文件至服务器目录，从而获得服务器控制权，实现远程代码执行。该漏洞影响汉王EFaceGo系列设备，攻击复杂度低，危害严重。"
published = "0721"
remediation = "联系汉王厂商获取 EFaceGo 设备最新固件升级包，升级至修复任意文件上传漏洞的版本；同时在 Nginx/反向代理层添加规则，拦截对 `/manage/leaveList/monadFileUpload.do` 路径的 POST 请求及 `.jsp/.jspx` 后缀文件上传；限制管理后台访问 IP 白名单，避免将管理接口暴露在公网。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "汉王 EFaceGo 任意文件上传漏洞"
updated = "0721"

