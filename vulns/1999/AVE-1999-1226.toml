[basic]
description = "wwwboard 留言板系统存在输入验证缺陷，远程攻击者可通过向目标服务器发送特制的畸形参数请求，绕过正常的权限检查机制，直接删除留言板中的任意文章。该漏洞影响使用 wwwboard 的 Web 应用环境，攻击者无需身份认证即可远程触发，导致留言数据被恶意删除，破坏系统数据完整性。CVSS 评分 5.0，危害等级中等。"
published = "1998-09-03T04:00:00.000"
remediation = "升级 wwwboard 至最新版本（如 1.2 及以上），该版本修复了通过畸形参数删除留言文章的问题。由于 wwwboard 已长期未维护，建议迁移至其他活跃维护的留言板系统（如 phpBB、Discourse 等）作为根本解决方案。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "wwwboard 远程删除留言板文章漏洞"
updated = "2026-06-16T21:49:21.090"

