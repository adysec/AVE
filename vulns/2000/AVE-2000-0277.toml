[basic]
description = "tcpdump及Ethereal等网络抓包工具在处理畸形DNS数据包时存在拒绝服务漏洞。由于DNS数据包压缩指针的跳转偏移量可被构造为指向自身，导致解压过程陷入无限循环，造成应用程序无响应或崩溃。远程攻击者无需身份认证，只需向目标网络发送特制的DNS数据包即可触发此漏洞，影响tcpdump 3.4/3.5 alpha及Ethereal 0.8.4/0.8.5/0.8.6版本。"
published = "1999-05-31T04:00:00.000"
remediation = "升级 tcpdump 至 3.6 或更高版本，升级 Ethereal（Wireshark）至 0.8.7 或更高版本；若无法升级，可在捕获时添加 -d 或 --dns 过滤规则丢弃畸形 DNS 数据包，或在网络边界防火墙/UPS 设备上限制 DNS 响应包大小并启用深度包检测防畸形报文过滤。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "tcpdump 和 Ethereal DNS 解析器无限循环拒绝服务漏洞"
updated = "2026-06-16T21:51:29.867"

