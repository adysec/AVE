[basic]
description = "Windows NT 在执行关键系统程序时，会优先搜索用户主目录（默认为 %systemroot%）而非其他系统目录查找 NDDEAGNT.EXE、EXPLORER.EXE、USERINIT.EXE 或 TASKMGR.EXE 等进程。由于根目录默认允许用户写入，本地攻击者可将特洛伊木马程序放置于该目录，待系统启动或用户登录时被优先执行，从而绕过访问限制或提升权限。该漏洞影响 Windows NT 系列操作系统，CVSS 评分 7.2，危害等级高。"
published = "1999-06-28T04:00:00.000"
remediation = '将系统分区格式化为 NTFS 并设置根目录权限，仅允许 Administrators 组写入。通过"域用户管理器"为每个用户设置独立的主目录路径（如 C:\Users\%username%），避免使用默认根目录作为主目录。安装 Windows NT 4.0 Service Pack 6a 及后续所有安全更新。定期检查系统目录中是否存在异常的 EXPLORER.EXE、NDDEAGNT.EXE、USERINIT.EXE、TASKMGR.EXE 文件。'
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "Microsoft Windows NT 安全绕过漏洞"
updated = "2026-06-16T21:50:17.093"

