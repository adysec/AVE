[basic]
description = "佳能 imageCLASS MF654Cdw 等多款小型办公多功能打印机与激光打印机的 PJCC 请求解析组件存在堆缓冲区溢出漏洞。该漏洞源于对 CPCA 列表处理时边界检查不足，网络相邻且未经验证的攻击者可通过向目标设备发送特制的 PJCC 数据包触发堆缓冲区溢出，导致任意代码执行或设备无响应。受影响机型包括佳能 Satera LBP670C/MF750C、Color imageCLASS LBP630C/MF650C、i-SENSYS LBP630C/MF650C 等多系列产品固件 v06.02 及之前版本，CVSS 评分 9.3，危害等级严重。"
published = "2026-01-16T00:16:27.767"
remediation = "立即将受影响 Canon 打印机/多功能一体机固件升级至 v06.03 或更高版本。具体型号包括：Satera LBP670C/MF750C 系列、Color imageCLASS LBP630C/MF650C 系列、imageCLASS LBP230/MF450 系列、i-SENSYS LBP630C/MF650C 系列等（完整列表见 Canon 安全公告 CP2026-001）。如无法立即升级，可在网络防火墙或交换机 ACL 中限制对打印机 TCP 端口 9013（CADM 服务）的访问，仅允许受信任的管理主机连接，作为临时缓解措施。"
score = 9.3
severity = "CRITICAL"
sources = ["zdi"]
title = "佳能 imageCLASS MF654Cdw 打印机 PJCC 请求解析堆缓冲区溢出远程代码执行漏洞"
updated = "2026-06-17T08:35:35.110"

