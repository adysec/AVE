[basic]
description = "SmartMax MailMax 1.0 的 SMTP 服务组件存在缓冲区溢出漏洞，远程攻击者无需身份认证即可向目标系统的 SMTP 端口发送特制的超长命令或参数，触发栈缓冲区溢出，从而在受影响系统上执行任意代码。该漏洞影响运行 MailMax 1.0 的 Windows 系统，CVSS 评分 7.5，危害等级高。目前已有公开的利用代码。"
published = "1999-02-14T05:00:00.000"
remediation = "SmartMax MailMax 已停止维护，官方未发布任何安全补丁。建议立即停止使用 MailMax 1.0 SMTP 服务，迁移至受支持的邮件服务器（如 Microsoft Exchange、Postfix、Exim 等），并在防火墙层面限制对 SMTP 端口（25/TCP）的访问来源，仅允许可信 IP 连接。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "SmartMax MailMax 1.0 SMTP 远程缓冲区溢出漏洞"
updated = "2026-06-16T21:48:19.490"

