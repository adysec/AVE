[basic]
description = "深信服应用交付报表系统存在远程命令执行漏洞，攻击者可通过向目标系统发送特制的HTTP请求，利用系统对用户输入过滤不严的缺陷，在未经身份认证的情况下直接执行任意系统命令。该漏洞影响深信服应用交付报表系统多个版本，攻击者无需任何权限即可远程利用，可导致服务器被完全控制，危害严重。建议用户及时升级至最新版本以修复此漏洞。"
published = "08.09"
remediation = "建议立即安装深信服应用交付报表系统最新安全补丁（建议升级至8.10及以上版本），并应用关联安全更新。如无法立即打补丁，可在网络出口处部署WAF规则集阻断对/report/目录的串联请求，并限制该目录的访问权限为仅内网IP访问。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "深信服 应用交付报表系统 远程命令执行漏洞"
