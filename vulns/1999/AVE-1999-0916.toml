[basic]
description = "rstatd（远程统计服务）是基于 RPC 协议运行的系统服务，默认监听在端口 111/TCP 或 111/UDP，向未经身份认证的远程攻击者提供系统性能统计数据（包括 CPU 负载、磁盘 I/O、内存使用等敏感信息）。该服务本身不提供任何访问控制机制，攻击者无需任何凭证即可通过 rpcinfo 或 rstat 协议查询目标系统，导致系统运行状态信息泄露。泄露的信息可被用于识别系统负载模式、辅助后续精准攻击。此外，常见 rstatd 实现（如 SunOS、Linux 等）历史上存在缓冲区溢出漏洞，远程攻击者可利用特制 RPC 请求触发拒绝服务甚至远程代码执行。该漏洞影响所有运行 rstatd 服务的 UNIX/Linux 系统，属于高危暴露风险。"
published = "1999-01-01T05:00:00.000"
remediation = "禁用 rstat/rstatd 服务，执行 `chkconfig rstatd off`（SysV）或 `systemctl disable rstatd && systemctl stop rstatd`（systemd），并在防火墙中封禁端口 111 (TCP/UDP，portmapper) 和 rstatd 使用的随机 UDP 端口范围，阻止外部 RPC 查询。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Sun Microsystems RPC rstatd 服务权限提升漏洞"
updated = "2026-06-16T21:48:44.800"

