[basic]
description = "Rsync 文件同步工具中存在客户端文件信息泄露漏洞（CWE-390），攻击者可通过搭建恶意 rsync 服务器诱导客户端连接。在文件从客户端向服务端传输过程中，服务端会发送本地文件的校验和供客户端比对以确定需传输的数据。恶意服务端通过发送针对任意文件的特制校验和值，基于客户端的响应逐字节重建客户端文件内容，导致敏感信息泄露。该漏洞影响所有使用 rsync 进行文件传输的场景，CVSS 评分 6.1，危害等级中危。"
published = "2025-01-14T18:15:25.297"
remediation = "立即将 rsync 升级至 3.4.0 或更高版本。RHEL 用户安装 RHSA-2026:19368/RHSA-2026:20603 等安全更新；Debian 用户参照 DLA-2025-008 更新至修复版本。如无法升级，避免使用 rsync 从不可信服务器拉取文件，或使用 --dry-run 预览文件操作后再执行。"
score = 6.1
severity = "MEDIUM"
sources = ["msrc"]
title = "Rsync 服务器端泄露客户端任意文件漏洞"
updated = "2026-06-30T00:16:48.400"

