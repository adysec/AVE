[basic]
description = "Netsweeper 的 webadmin/policy/group_table_ajax.php 页面存在跨站脚本（XSS）漏洞，由于对用户输入的 PATH_INFO 参数未进行充分的转义处理，远程攻击者可构造恶意 URL 诱使用户点击，从而在目标浏览器中执行任意 HTML 或 JavaScript 脚本。该漏洞影响 Netsweeper 3.1.10 之前版本、4.0.x 系列 4.0.9 之前版本及 4.1.x 系列 4.1.2 之前版本，攻击无需身份认证但需用户交互，CVSS 评分 6.1，危害等级中危。"
published = "2020-02-19T20:15:13.173"
remediation = "升级 Netsweeper 至安全版本：3.x 系列升级到 3.1.10 及以上，4.0.x 系列升级到 4.0.9 及以上，4.1.x 系列升级到 4.1.2 及以上。如无法立即升级，可在 WAF 或反向代理层对 `webadmin/policy/group_table_ajax.php/` 路径的 `PATH_INFO` 参数进行 HTML 编码过滤，阻止未转义的特殊字符注入。"
score = 6.1
severity = "MEDIUM"
sources = ["nuclei"]
title = "Netsweeper Netsweeper 跨站脚本漏洞"
updated = "2026-06-17T00:18:38.240"

