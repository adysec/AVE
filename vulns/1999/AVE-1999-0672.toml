[basic]
description = "Falcon Web Server 在处理请求路径时未正确校验目录遍历序列，远程攻击者可通过在 URL 中注入“../”等点点路径穿越组件，绕过文档根目录限制读取服务器上任意文件。攻击无需身份认证，在网络可达且服务对外提供 Web 访问时即可实施，可能导致配置文件、凭据或敏感业务数据泄露。"
published = "1999-10-26"
remediation = "停用或替换存在缺陷的 Falcon Web Server；若必须继续使用，应在前置反向代理或 Web 应用防火墙中拦截含“../”的路径穿越请求，限制进程用户权限与可读目录范围，并尽快迁移至已修复路径规范化的替代 Web 服务。"
score = 5.0
severity = "MEDIUM"
sources = [
    "epss",
    "nvd",
    "cve",
]
title = "Falcon Web Server 目录遍历任意文件读取漏洞"
updated = "2026-06-16"

