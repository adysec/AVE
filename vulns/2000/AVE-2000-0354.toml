[basic]
description = "Matt Kruse Calendar Script 2.2 中的 calender.pl 和 calendar_admin.pl 脚本存在任意命令执行漏洞。由于未正确过滤用户输入中的 shell 元字符，远程攻击者可通过向脚本提交特制参数注入并执行任意系统命令。该漏洞无需认证即可利用，可导致服务器完全受控，影响部署了该日历脚本的系统。建议升级至更高版本或移除受影响脚本。"
published = "2000-05-16T04:00:00.000"
remediation = "建议停止使用已停止维护的 Matt Kruse Calendar Script 2.2，或升级至官方修复版本。如无法升级，须在 calender.pl 和 calendar_admin.pl 中对用户输入严格过滤 shell 元字符（; | & ` $），使用 Perl 的 -T 脏数据检测模式，并避免将用户输入直接传递给 system() 或 exec() 调用。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "Matt Kruse Calendar Script 2.2 任意命令执行漏洞"
updated = "2026-06-16T21:51:43.250"

