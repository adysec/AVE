[basic]
description = "GNOME gdm、KDE kdm 及 wdm 等显示管理器的 XDMCP 解析代码存在缓冲区溢出漏洞。远程攻击者无需任何身份认证，通过向目标系统发送特制的超长 FORWARD_QUERY 请求即可触发该漏洞，导致缓冲区溢出，进而可执行任意命令或造成拒绝服务。该漏洞 CVSS 评分 10.0，危害等级严重，影响范围广泛，攻击复杂度低，且无需用户交互。"
published = "2000-05-24T04:00:00.000"
remediation = "升级 GNOME gdm 至 2.2.1 或更高版本；升级 KDE kdm 至包含补丁的版本；Caldera OpenLinux 用户安装 CSSA-2000-013 提供的更新包，SUSE Linux 用户安装 SuSE Security Announce 49 提供的更新。如无法立即升级，可在 /etc/X11/xdm/Xaccess 中限制 XDMCP 来源地址，或在防火墙层面禁用 UDP 端口 177（XDMCP 默认端口）以阻止远程利用。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "GNOME gdm/KDE kdm/wdm XDMCP 缓冲区溢出远程代码执行漏洞"
updated = "2026-06-16T21:51:50.913"

