[basic]
description = "fdmount 是一款用于挂载软盘的工具，其在处理挂载点参数时存在缓冲区溢出漏洞。本地属于 floppy 组的攻击者可通过向 fdmount 提供超长的挂载点路径参数触发缓冲区溢出，从而以 root 权限执行任意代码。该漏洞影响 S.u.S.E.、Slackware、Turbolinux 及 OpenLinux 等多个 Linux 发行版本，CVSS 评分 7.2，危害等级高。"
published = "2000-05-22T04:00:00.000"
remediation = "升级 fdmount 至最新补丁版本，或直接卸载 fdmount 软件包（现代系统已无需软驱支持）。临时缓解措施：移除 fdmount 二进制文件的 setuid 权限（chmod u-s /usr/bin/fdmount），并检查 /etc/fdmount 配置文件，确保 floppy 组用户不被授予不必要的权限。"
score = 7.2
severity = "HIGH"
sources = ["cve"]
title = "Linux fdmount 本地缓冲区溢出漏洞"
updated = "2026-06-16T21:51:44.043"

