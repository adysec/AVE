[basic]
description = "TenFour TFS Gateway 4.0 在非默认配置下存在拒绝服务漏洞。远程攻击者可通过发送包含错误发件人和收件人地址的邮件消息，导致网关每 10 秒持续尝试返回该消息，形成处理循环，大量消耗系统资源，造成邮件服务不可用。该漏洞无需身份认证即可远程触发，CVSS 评分 5.0，危害等级中危。受影响版本为 TenFour TFS Gateway 4.0，建议升级或修复地址验证逻辑。"
published = "1999-08-31T04:00:00.000"
remediation = "TenFour TFS Gateway 4.0 已停止维护，厂商不再提供安全更新。建议立即升级至不受影响的替代产品或迁移至其他网关方案；如无法升级，应避免启用非默认的地址验证绕过配置，并在防火墙上限制对网关服务的非必要访问。临时缓解措施可配置消息队列超时策略，防止无效地址消息导致持续重试造成资源耗尽。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "TenFour TFS Gateway 4.0 拒绝服务漏洞"
updated = "2026-06-16T21:50:36.357"

