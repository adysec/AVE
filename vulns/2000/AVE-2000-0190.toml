[basic]
title = "SCO UnixWare cu 本地权限提升漏洞"
description = "SCO UnixWare 7.x 系统中的 cu 串行通信程序存在安全漏洞。cu 程序以 setuid root 权限运行，在处理特制命令行参数时未能正确验证用户输入，导致本地攻击者可通过向 cu 程序传递恶意参数触发权限提升，从而获得 root 权限。攻击者需要拥有系统本地访问权限，无需额外认证即可完全控制系统。"
severity = "HIGH"
score = 7.2
sources = ["cve"]
published = "2000-02-08"
updated = "2024-06-16"
remediation = "SCO 已针对此漏洞发布安全补丁，建议升级到最新版本。由于 UnixWare 7.x 已停止官方支持，建议迁移到受支持的操作系统平台，或严格限制不可信用户对系统的本地访问权限，并移除 cu 程序的 setuid 位以降低风险。"
