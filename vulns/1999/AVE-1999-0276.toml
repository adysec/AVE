[basic]
description = "Microsoft Windows NT 4.0 系统中的电话拨号程序（dialer.exe）存在缓冲区溢出漏洞。当攻击者在 dialer.ini 拨号配置文件中写入格式错误的拨号条目时，可触发 dialer.exe 的缓冲区溢出，进而在目标系统上执行任意代码。该漏洞影响 Windows NT 4.0 SP 1 至 SP 5 的所有版本，攻击者需要具备在本地系统上修改或创建恶意 dialer.ini 文件的能力，通常通过社会工程学手段诱导用户打开特制拨号文件或替换配置文件实现利用。成功利用该漏洞的攻击者可获得与拨号程序相同的系统权限，对受影响系统造成严重安全威胁。"
published = "1999-07-29T04:00:00.000"
remediation = "立即安装 Microsoft 1999 年 11 月发布的安全公告 MS99-048 对应补丁（适用于 Windows NT 4.0 各 SP 版本），通过 Windows Update 或微软官网下载更新。如暂无法打补丁，可在组策略中限制普通用户对 dialer.ini 文件的写入权限，并禁止用户打开来源不明的拨号配置文件作为临时缓解措施。"
score = 6.2
severity = "MEDIUM"
sources = ["epss"]
