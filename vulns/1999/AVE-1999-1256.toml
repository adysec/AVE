[basic]
description = "IBM AIX 4.2 及早期版本中的 ping 命令存在栈缓冲区溢出漏洞，本地攻击者可通过向 ping 命令传递超长命令行参数触发栈溢出，覆盖返回地址并执行任意代码，从而获得 root 权限。该漏洞影响 AIX 4.2 及更早版本，攻击者需具备本地账户访问权限，通过构造超长参数调用 ping 即可触发缓冲区溢出实现本地提权至 root 权限，CVSS 评分 7.2，属高危本地提权漏洞。IBM 已发布补丁修复该漏洞。"
published = "1997-07-21T04:00:00.000"
remediation = "建议将 IBM AIX 升级至 4.3 或更高版本（官方已在该版本中修复 ping 缓冲区溢出）。若暂无法升级，可通过应用 IBM 官方补丁（如 APAR IX84737 等对应修复包）并限制普通用户对 /usr/sbin/ping 的执行权限（移除 setuid 位或收紧文件权限）作为临时缓解措施，同时加强本地用户账户管理。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "IBM AIX ping 缓冲区溢出漏洞"
updated = "2026-06-16T21:49:57.010"

