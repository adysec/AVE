[basic]
description = "NetScaler ADC 和 NetScaler Gateway 的管理接口存在不正确的访问控制漏洞（CWE-1284），具有网络访问权限的攻击者可利用 NetScaler 管理接口的权限验证缺陷，绕过访问限制获取未授权访问。该漏洞影响运行特定固件版本的 NetScaler ADC 与 NetScaler Gateway 设备，可能导致敏感信息泄露或系统配置被篡改，CVSS 评分 8.7，危害等级高。Citrix 已发布安全公告并建议用户尽快升级修复。"
published = "2025-06-17T13:15:21.377"
remediation = "升级 NetScaler ADC / Gateway 至以下安全版本：ADC 及 Gateway 14.1 升级至 14.1-43.56 及以上，13.1 升级至 13.1-58.32 及以上；ADC FIPS 12.1 升级至 12.1-55.328，13.1 升级至 13.1-37.235；ADC NDcPP 13.1 升级至 13.1-37.235。如无法立即升级，可在网络层面限制仅可信管理网段访问 NetScaler 管理接口（Management Interface），并启用 IP 白名单或防火墙规则阻断非授权来源。"
score = 8.7
severity = "HIGH"
sources = ["hwpoc"]
title = "Citrix NetScaler ADC 及 NetScaler Gateway 管理接口访问控制不当漏洞"
updated = "2026-06-17T09:47:44.240"

