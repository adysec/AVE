[basic]
description = "NetBSD 系统在 VAX 架构上的 ptrace 调试接口存在权限检查缺陷，本地攻击者可通过调试进程修改 PSL（处理器状态长字）寄存器内容，从而绕过系统权限限制获取 root 权限。该漏洞影响 NetBSD 多版本，CVSS 评分 7.2，危害等级高。利用条件为拥有本地 shell 访问权限，无需额外认证。"
published = "2000-02-01T05:00:00.000"
remediation = "升级 NetBSD 至 1.4.2 及以上版本（该版本修复了 ptrace(2) 允许调试进程修改 VAX PSL 的问题），或在无法升级时移除受影响用户的 ptrace 操作权限，限制可登录 VAX 主机的本地用户范围。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "NetBSD VAX ptrace 本地权限提升漏洞"
updated = "2026-06-16T21:51:07.147"

