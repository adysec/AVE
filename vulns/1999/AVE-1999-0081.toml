[basic]
description = "BIND DNS 服务器存在 DNS 缓存投毒漏洞，由于使用可预测的查询 ID 作为事务标识符，远程攻击者可通过向目标 DNS 服务器发送伪造的 DNS 响应报文，在无需认证的情况下实施缓存投毒攻击，将合法域名解析指向恶意 IP 地址，导致用户被重定向至恶意网站或遭受中间人攻击。该漏洞影响早期 BIND 版本，CVSS 评分 5.0，危害等级中等。"
published = "1997-08-13T04:00:00.000"
remediation = "升级 BIND 至 4.9.7 或 8.2 及以上版本，该版本引入了随机化 DNS 查询 ID 机制，防止攻击者预测 ID 实施缓存投毒。若无法升级，可在 named.conf 中限制递归查询仅对受信任内部网段开放（allow-recursion），并在边界防火墙上阻断 UDP 53 端口的非授权外部访问作为临时缓解。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "ISC BIND DNS 查询标识符可预测导致缓存投毒漏洞"
updated = "2026-06-16T21:47:22.577"

