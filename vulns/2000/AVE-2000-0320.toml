[basic]
description = "MIT Kerberos 4/5 及 RedHat 6.2 等系统中的 krb_rd_req 函数存在缓冲区溢出漏洞，远程攻击者无需身份认证即可向目标系统发送特制的 Kerberos 认证请求数据包，触发栈缓冲区溢出，从而以 root 权限执行任意代码。该漏洞影响 Cygnus Network Security 4.0、KerbNet 5.0、MIT Kerberos 4/5 及 RedHat 6.2 等版本，CVSS 评分 10.0，危害等级严重。"
published = "2000-05-16T04:00:00.000"
remediation = "升级 MIT Kerberos 至 1.1.1 及以上版本，Red Hat 6.2 用户应安装 krb5-1.1.1-3 或更新版本。Kerberos 4 已停止维护，建议迁移至 Kerberos 5 并禁用 krb_rd_req 兼容接口。如无法升级，在 krb5.conf 中设置 `allow_weak_crypto = false` 并禁用 V4 兼容模式以缓解风险。"
score = 10
severity = "CRITICAL"
sources = ["redhat"]
title = "MIT Kerberos krb_rd_req 函数远程缓冲区溢出漏洞"
updated = "2026-06-16T21:51:36.847"

