[basic]
description = "tags.<value>Windows NT 4.0 SP3 之前版本的 TCP/IP 协议栈存在 IP 分片重组逻辑缺陷，远程攻击者无需身份认证即可向目标系统发送缺少首个分片的畸形 IP 分片数据包，导致协议栈错误地将后续分片重组成有效会话，从而绕过防火墙访问控制规则或造成系统崩溃引发拒绝服务。该漏洞影响 Windows NT 4.0 全系版本，CVSS 评分 5.0，危害等级中危。微软已在 SP3 更新中修复此漏洞。"
published = "1997-07-10T04:00:00.000"
remediation = "升级 Windows NT 4.0 至 Service Pack 3 或更高版本。如无法立即升级，在网络边界部署支持碎片重组和深度包检测的防火墙，阻止不完整的 IP 碎片包进入内网。同时可在主机层面启用 TCP/IP 堆栈强化注册表设置，限制碎片重组缓冲区大小。作为临时缓解措施，可在网关上丢弃不带首片段的 IP 碎片包。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Microsoft Windows NT 4.0 TCP/IP 碎片重组拒绝服务漏洞"
updated = "2026-06-16T21:50:29.653"

