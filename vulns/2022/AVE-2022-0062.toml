[basic]
description = "Linux 内核 SRCU（可睡眠 RCU）子系统的 cleanup_srcu_struct() 函数存在释放后使用漏洞。该函数仅检查了正在进行中的宽限期（GP），但未检测尚未启动但可能随时启动的宽限期，导致在并发场景下 SRCU 结构被提前释放后仍被引用，触发内存损坏。本地攻击者可通过加载特制模块利用此漏洞，实现权限提升。该漏洞影响 Linux 内核多个版本，CVSS 评分 7.8，危害等级高。"
published = "2025-02-26T07:01:40.237"
remediation = "将 Linux 内核升级至 5.18.11 及以上版本（5.18.x 系列）或 5.19+。对应修复提交：主线补丁 e997dda6502e，稳定分支补丁 8ed00760203d（已合入长期支持内核）。若无法立即升级，建议在未信任环境中限制本地用户访问权限作为临时缓解措施，因为该漏洞需要本地低权限访问才能触发。"
score = 7.8
severity = "HIGH"
sources = ["msrc"]
title = "Linux Linux 内核释放后使用漏洞"
updated = "2026-06-17T05:18:45.300"

