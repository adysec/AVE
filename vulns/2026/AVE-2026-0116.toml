[basic]
description = "FatFs（ChaN FatFs）在启用 FF_LBA64=1 并使用 GPT 分区扫描功能时存在无限循环漏洞（CWE-835）。攻击者通过向目标设备提供包含特制 GPT 分区表的镜像文件，触发 find_volume() 函数中由 GPTH_PtNum 字段控制的无界循环，导致系统在挂载扫描时陷入长时间阻塞，造成拒绝服务。该漏洞影响 FatFs R0.16 之前的所有版本，CVSS 评分 4.6，危害等级中危。攻击者需物理接触目标设备写入特制镜像，攻击条件较为受限，但在嵌入式/IoT 设备场景中仍具有实际威胁。"
published = "2026-07-01T15:17:12.553"
remediation = "建议将 FatFs 升级至 R0.16 或更高版本，该版本已通过 test_gpt_header() 对 GPT 分区条目数上限和 CRC 完整性进行校验，防止恶意分区表触发无限循环。如无法立即升级，可在 ffconf.h 中将 FF_LBA64 设置为 0 以禁用 GPT 分区扫描，作为临时缓解措施。"
score = 4.6
severity = "MEDIUM"
sources = ["hwpoc"]
title = "ChaN FatFs GPT 分区扫描无限循环拒绝服务漏洞"
updated = "2026-07-02T14:38:25.923"

