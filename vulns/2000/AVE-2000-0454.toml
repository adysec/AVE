[basic]
description = "Bugzilla 2.8 的 process_bug.cgi 脚本存在操作系统命令注入漏洞，该脚本在处理用户输入时未对 shell 元字符进行正确过滤和转义，远程未经身份认证的攻击者可通过向 process_bug.cgi 发送包含特殊 shell 元字符（如分号、管道符等）的恶意请求，在服务器端注入并执行任意操作系统命令，从而完全控制目标服务器。利用该漏洞无需任何用户交互，攻击复杂度低，可导致敏感信息泄露、系统权限被获取及服务瘫痪。Mozilla 曾发布安全公告建议用户升级以避免受影响。"
published = "2000-05-11"
remediation = "升级 Bugzilla 至 2.10 或更高版本（官方安全公告 https://www.bugzilla.org/security/2.10/）。临时缓解：在 process_bug.cgi 中对用户输入进行 Shell 元字符过滤，或通过 Web 应用防火墙 (WAF) 拦截包含反引号、分号、管道符等 Shell 元字符的请求参数。受影响版本为 Bugzilla 2.10 之前的所有版本，建议尽快升级至当前维护版本（如 5.0.6、4.4.13、5.4、6.0 等）以获得完整安全修复。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Mozilla Bugzilla 远程代码执行漏洞"
updated = "2000-05-11"

