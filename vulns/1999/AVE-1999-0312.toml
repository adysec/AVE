[basic]
description = "Microsoft Windows NT 4.0 远程访问服务（RAS）电话簿组件存在缓冲区溢出漏洞。攻击者可通过向 RAS 客户端提供特制的电话簿条目触发该漏洞，导致缓冲区溢出，从而执行任意命令或造成拒绝服务。该漏洞影响 Windows NT 4.0 及所有 Service Pack 版本，攻击者需诱使用户加载恶意电话簿文件方可利用，CVSS 评分 4.6，危害等级中危。"
published = "1999-05-20T04:00:00.000"
remediation = "建议立即从微软官网下载并安装安全公告 MS99-025 对应的补丁程序（适用于 Windows NT 4.0 各 SP 版本，安装后等同于修复 RAS 电话簿溢出）。如无法立即打补丁，可暂时禁用或限制远程访问服务（RAS）的使用，避免不可信用户配置电话簿条目作为临时缓解措施。"
score = 4.6
severity = "MEDIUM"
sources = ["exploitdb"]
