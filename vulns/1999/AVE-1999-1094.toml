[basic]
description = 'NetWare NFS 模式 1 和 2 在实现 Unix "只读" 标志时存在权限许可漏洞。该漏洞源于系统将设置为 "只读" 的文件所有权更改为 root 用户，导致本地攻击者可通过创建 setuid 程序并将其标记为 "只读" 来利用此机制，NetWare-NFS 会自动将其转换为 root 所有的 setuid 程序，从而使攻击者获得 root 权限。该漏洞影响 Unix 平台上的 NetWare NFS 服务，CVSS 评分 7.2，危害等级高。'
published = "1999-12-31T05:00:00.000"
remediation = "立即安装 Novell 官方补丁（TID 2940551），或升级 NetWare NFS 至不受影响的版本。如无法升级，应禁止普通用户在 NFS 共享目录中创建 setuid 文件，可在 exports 配置中添加 `nosuid` 挂载选项作为临时缓解措施。"
score = 7.2
severity = "HIGH"
sources = ["cve"]
title = "Novell NetWare NFS 本地权限提升漏洞"
updated = "2026-06-16T21:50:19.213"

