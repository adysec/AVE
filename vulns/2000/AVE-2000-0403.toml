[basic]
description = "Check Point Firewall-1 4.0 及 4.1 版本在处理 IP 分片重组时存在缺陷，未经身份认证的远程攻击者可向目标系统发送大量特制的畸形分片 IP 数据包，触发内存耗尽或处理逻辑异常，导致防火墙服务停止响应，造成拒绝服务。该漏洞影响 Check Point Firewall-1 4.0/4.1 版本，CVSS 评分 5.0，危害等级中危。厂商已发布安全公告建议升级至修复版本。"
published = "2000-06-06"
remediation = "升级 Check Point Firewall-1 至 4.1 SP2 及以上版本，该版本已修复分片包处理缺陷。如无法升级，可在防火墙规则中启用分片包丢弃选项，并配置 anti-spoofing 防止伪造源 IP 的分片攻击。同时建议在网络边界限制入站分片包速率。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Check Point Firewall-1 畸形IP分片报文拒绝服务漏洞"
updated = "2026-06-16"

