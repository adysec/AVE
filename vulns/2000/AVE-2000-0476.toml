[basic]
description = "RedHat 和 Mandrake Linux 发行版中的 Kon2 (Kanji on Console) 软件的 /usr/bin/fld 程序存在缓冲区溢出漏洞。本地攻击者可通过向该程序提供包含超长 CHARSET_REGISTRY 或 CHARSET_ENCODING 设置的恶意输入文件触发缓冲区溢出，成功利用此漏洞可获得 root 权限。该漏洞影响 Mandrake 7.0/7.1 及 RedHat Kon2 0.3.9 版本，CVSS 评分 7.2，危害等级高。"
published = "2000-06-21T04:00:00.000"
remediation = "立即升级 kon2 至 0.3.9-4 或更高版本，该版本修复了 fld 程序在处理 CHARSET_REGISTRY 和 CHARSET_ENCODING 长字符串时的缓冲区溢出问题。如无法立即升级，可临时移除 /usr/bin/fld 的 setuid 位（chmod u-s /usr/bin/fld），以阻止本地普通用户通过该漏洞获取 root 权限。"
score = 7.2
severity = "HIGH"
sources = ["exploitdb"]
title = "Linux Kon2 fld 缓冲区溢出漏洞"
updated = "2026-06-16T21:52:05.970"

