[basic]
description = "Icecast 是一款开源的音频流媒体服务器软件，用于在网络上进行音频流的分发和播放。其 print_client 函数存在严重的格式字符串漏洞，该函数在处理客户端请求信息时，未对用户输入数据进行严格过滤，直接将其作为格式化字符串参数传递给格式化输出函数。未经身份认证的远程攻击者可构造包含特定格式字符（如 %n、%x、%s 等）的恶意请求，利用格式化输出函数的特性读取或篡改进程内存中的数据，最终实现任意代码执行。该漏洞影响 Icecast 1.3.8beta2 及更早所有版本，攻击者仅需能够访问 Icecast 服务端口即可利用，无需任何认证凭证。CVSS 评分 10.0，危害等级为严重。建议用户升级到 Icecast 1.3.9 或更高版本以修复此漏洞。"
published = "2001-03-26T05:00:00.000"
remediation = "Icecast 1.x 系列已停止维护，不存在针对该漏洞的修补版本。应立即迁移至 Icecast 2.5.0（当前最新稳定版），该版本为完全重写的代码，不受此漏洞影响。下载地址：https://icecast.org/download/。若无法立即迁移，应通过防火墙将 Icecast 服务端口（默认 8000）限制为仅受信 IP 访问，或直接停止 Icecast 1.x 服务。Red Hat 用户可参考安全公告 RHSA-2001-004 获取对应发行版的修复补丁。"
score = 10
severity = "CRITICAL"
sources = ["redhat"]
title = "Icecast 音频流媒体服务器 print_client()格式字符串远程代码执行漏洞"
updated = "2026-06-16T21:53:51.830"

