[basic]
description = "Debian nvi 软件包中的 nviboot 启动脚本存在文件删除漏洞，本地攻击者可通过在 vi.recover 文件中构造畸形条目来删除系统任意文件。该漏洞影响 Debian 系统中使用 nvi 文本编辑器的版本，攻击者需要拥有本地访问权限才能利用。由于该漏洞可能删除关键系统文件，可导致服务异常或拒绝服务。CVSS 评分 2.1，危害等级低。"
published = "1999-12-30T05:00:00.000"
remediation = "升级 nvi 软件包至包含修复的版本（Debian 在 2000 年初已修复该问题，当前稳定版 nvi 1.81.6 已不受影响）；如无法升级，限制普通用户对 /var/tmp/vi.recover/ 目录的写入权限，并确保 nviboot 启动脚本在处理恢复文件时对文件名中的空格和特殊字符进行正确转义和引号包裹。"
score = 2.1
severity = "LOW"
sources = ["avd"]
title = "Debian nvi vi.recover 恶意条目导致本地文件删除漏洞"
updated = "2026-06-16T21:50:57.030"

