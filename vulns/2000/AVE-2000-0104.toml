[basic]
description = "McAfee VirusScan 4.0、Network Associates for Windows NT 4.0.2/4.0.3a 及 Norton AntiVirus 2000 默认配置未对 Windows 回收站使用的 RECYCLED 文件夹进行病毒扫描，导致攻击者可将恶意代码存放于回收站中以规避杀毒软件检测。攻击者需具有本地文件写入权限，将恶意程序或脚本放入回收站目录即可绕过杀毒扫描，后续通过诱导用户执行或利用自动运行机制触发恶意代码执行，影响运行上述杀毒软件默认配置的 Windows NT 4.0 系统，CVSS 评分 7.2（HIGH），属于安全配置缺陷导致的防御绕过漏洞。"
published = "1999-12-22T05:00:00.000"
remediation = '建议升级 McAfee VirusScan 至 4.5 版本或 Norton AntiVirus 至 2001 版本，并在杀毒软件设置中启用"扫描回收站"选项；若无法升级，请手动配置扫描策略包含 RECYCLED 文件夹，并定期清空回收站作为临时缓解措施。建议从厂商官网下载最新病毒库与程序补丁。建议配合防火墙限制可疑可执行文件运行。'
score = 7.2
severity = "HIGH"
sources = ["cve"]
title = "McAfee VirusScan Norton AntiVirus 回收站排除漏洞"
updated = "2026-06-16T21:51:02.397"

