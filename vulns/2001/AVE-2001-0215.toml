[basic]
description = "KTH Kerberos IV 存在本地文件覆盖漏洞，由于程序在处理票据文件时未对符号链接进行充分校验，本地攻击者可通过创建指向系统关键文件的符号链接，诱使 Kerberos 服务将票据数据写入目标文件，从而实现任意文件覆盖。该漏洞攻击复杂度较高，需要本地访问权限，但成功利用可能导致系统文件被破坏或服务异常。受影响的版本包括 KTH Kerberos IV 系列，建议用户升级至修复版本或限制本地用户访问权限。"
published = "2001-02-16T05:00:00.000"
remediation = "立即升级 KTH Kerberos IV 至 Red Hat 安全公告 RHSA-2001-025 中提供的修补版本，或应用官方发布的 symlink 漏洞补丁。由于 KTH Kerberos IV 已停止维护，建议迁移至 MIT Kerberos 或 Heimdal 等活跃维护的 Kerberos 实现，并确保票据文件存储目录（如 /tmp）启用 sticky 位（chmod +t /tmp）以防止本地 symlink 攻击。"
score = 1.2
severity = "LOW"
sources = ["redhat"]
title = "KTH Kerberos IV 任意文件写入漏洞"
updated = "2026-06-16T21:53:32.023"

