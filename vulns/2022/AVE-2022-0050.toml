[basic]
title = "Linux 内核 loop 设备驱动释放时死锁漏洞"
description = "Linux 内核的 loop 块设备驱动中存在不当锁处理漏洞（CWE-667），由于 gendisk 私有数据中存储的 lo_device 指针生命周期管理不完善，在某些竞态条件下设备释放后仍可被访问，导致潜在死锁。本地攻击者可通过精心构造的循环设备挂载操作触发此问题，造成系统拒绝服务。该漏洞影响 Linux 内核各主要版本，CVSS 评分 5.5，危害等级中等。建议更新至包含补丁的内核版本以修复此漏洞。"
severity = "MEDIUM"
score = 5.5
sources = ["msrc", "cve"]
published = "2025-02-26"
updated = "2026-06-17"
remediation = "升级 Linux 内核至 5.18.3 或更高版本，包含提交 d2c7f56f8b5256d57f9e3fc7794c31361d43bdd9（主线）和 aadd1443aae7fe8956e3b11157827067f034406a（稳定分支）的补丁，修复 loop 驱动中 gendisk 私有数据 lo_device 的生命周期管理缺陷，避免设备释放后仍被访问导致的死锁。各发行版应及时移植对应补丁至其内核包。临时缓解措施：通过 cgroups 或 udev 规则限制非特权用户创建 loop 设备的权限。"
