[basic]
description = 'S.u.S.E. Linux、Slackware、Turbolinux、OpenLinux 等多个 Linux 发行版中的 fdmount 工具存在栈缓冲区溢出漏洞，源于对 mountpoint 参数缺乏长度校验。本地攻击者若属于 "floppy" 用户组，可通过传递超长 mountpoint 参数触发溢出，覆盖栈上返回地址或函数指针，从而执行任意代码并提升至 root 权限。该漏洞影响 S.u.S.E. 4.x/5.x/6.x/7.0、Slackware 3.x/4.0、Turbolinux 6、OpenLinux 7.0 等版本，攻击向量为本地、低复杂度、无需认证，CVSS 7.2（HIGH），可导致系统完全失陷。厂商已发布补丁修复，用户需升级 fdmount 或移除其 setuid 位。'
published = "2000-05-22T04:00:00.000"
remediation = "升级到包含安全修复的Linux发行版版本，如升级S.u.S.E.到SPx以上版本、Slackware到4.1以上版本、Turbolinux到8以上版本、或OpenLinux到9.0以上版本，并移除过时的fdmount工具；如无法立即升级，可通过修改权限限制仅允许非root用户执行fdmount命令，并限制mount点参数长度为32字符以下，以降低被利用的风险。"
score = 7.2
severity = "HIGH"
sources = ["epss"]
title = "Linux fdmount 本地缓冲区溢出漏洞"
updated = "2026-06-16T21:51:44.043"

