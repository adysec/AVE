[basic]
description = "Linux 内核 Rockchip SARADC 驱动的触发缓冲区实现中存在信息泄漏漏洞。由于触发缓冲区中的 'data' 本地结构体在向用户空间推送数据时，仅通过 iio_for_each_active_channel() 为活跃通道赋值，未对非活跃通道进行初始化，导致未初始化的内核栈内存内容被泄露至用户空间。该漏洞影响搭载 Rockchip SoC 并使用 rockchip_saradc 驱动的 Linux 设备（如 Rockchip 平台的开发板、嵌入式设备等）。攻击条件为本地访问权限、低攻击复杂度、低权限且无需用户交互 (CVSS:3.1/AV:L/AC:L/PR:L/UI:N/S:U/C:H/I:N/A:H，CVSS 7.1 HIGH)。本地攻击者可通过触发 ADC 触发缓冲区读取操作，获取内核未初始化的栈内存数据，导致高机密性影响（信息泄漏）和高可用性影响（可能导致系统崩溃）。Linux 内核已通过在使用前将结构体初始化为零来修复该漏洞。"
published = "2025-01-19T12:15:24.897"
remediation = "建议立即升级 Linux 内核到已修复版本：Linux 6.12.8、6.11.11、6.6.73、6.1.123、5.15.176、5.10.235、5.4.289 或更高版本。Debian 11 请安装 DLA-4075-1 更新（linux 5.10.235-1），Ubuntu 24.04 请安装 USN-7381-1（linux 6.8.0-52.52），Ubuntu 20.04 请安装 USN-7459-1（linux 5.15.0-130.139），RHEL/Rocky/AlmaLinux 请关注 RHSA-2025 相关公告并升级内核。如无法立即重启内核，可临时禁用 rockchip_saradc 驱动（`modprobe -r rockchip_saradc` 或在内核命令行添加 `module_blacklist=rockchip_saradc`）作为缓解措施，但会导致 Rockchip ADC 功能不可用。"
score = 7.1
severity = "HIGH"
sources = ["msrc"]
title = "Rockchip SARADC 驱动触发缓冲区信息泄漏漏洞"
updated = "2026-06-17T08:14:12.060"

