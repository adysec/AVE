[basic]
description = "Qpopper 2.53 及更早版本中存在格式化字符串漏洞，本地攻击者可通过在邮件 From: 头部中构造特制的格式化字符串，当 euidl 命令处理该头部时触发漏洞，导致攻击者获取系统特权。该漏洞影响 Cobalt RaQ 2.0/3.0 及 qpopper 2.52/2.53 等版本，CVSS 评分 7.5，危害等级高。建议升级至 qpopper 2.53 以上版本以修复此漏洞。"
published = "2000-05-24T04:00:00.000"
remediation = "升级 Qpopper 至 2.54 及以上版本，该版本修复了 euidl 命令处理 From: 头时的格式化字符串漏洞。如无法升级，可在 qpopper.conf 中禁用 euidl 命令（设置 allow-euidl = no），并限制本地用户对 POP3 服务的访问权限。"
score = 7.5
severity = "HIGH"
sources = ["exploitdb"]
title = "Qualcomm Qpopper EUIDL 命令格式字符串本地权限提升漏洞"
updated = "2026-06-16T21:51:44.560"

