[basic]
description = "Axent NetProwler 3.0 入侵检测系统存在拒绝服务漏洞。远程攻击者无需身份认证即可通过网络向目标系统发送特制的畸形 IP 数据包，触发 NetProwler 的中间人（Man-in-the-Middle）检测签名处理逻辑，导致该安全软件自身崩溃或停止响应，从而丧失入侵检测能力。该漏洞影响 NetProwler 3.0 版本，CVSS 评分 5.0，危害等级中等。厂商已停止支持该产品，建议用户升级至替代方案。"
published = "2000-05-18T04:00:00.000"
remediation = "该漏洞影响 Axent NetProwler 3.0，该产品已停止维护且厂商未发布补丁。建议立即升级至 Symantec 或其他厂商仍在支持周期的入侵检测系统。如无法升级，可在 NetProwler 配置中禁用 Man-in-the-Middle 签名规则，并在网络边界防火墙添加规则丢弃异常分片 IP 数据包作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Axent NetProwler 3.0 畸形IP数据包拒绝服务漏洞"
updated = "2026-06-16T21:51:37.467"

