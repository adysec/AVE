[basic]
description = "FTPx FTP Explorer 1.0.00.10 版本存在弱密码加密漏洞。该软件在存储 FTP 站点的用户名、密码及配置文件时使用了弱加密算法，本地攻击者可访问存储的配置文件，通过分析弱加密数据还原出明文密码，进而获取目标 FTP 服务器的访问权限。该漏洞影响 FTPx FTP Explorer 1.0.00.10 版本，CVSS 评分 4.6，危害等级中危。攻击者需具备对受影响系统的本地访问权限方可利用。"
published = "2000-02-24T05:00:00.000"
remediation = "立即停止使用 FTP Explorer 1.0.00.10，其加密算法过于简单（使用 XOR 或类似弱算法），存储的 FTP 密码可被轻易逆向还原。建议迁移至支持强加密存储的 FTP 客户端，如 FileZilla（免费开源，支持主密码加密凭据库）或 WinSCP（支持 AES 加密存储站点凭据）。如暂时无法更换客户端，切勿在软件中保存任何 FTP 密码，改为每次手动输入，并在操作系统层面限制该程序所在目录的访问权限（仅允许 Administrators 组读取）。"
score = 4.6
severity = "MEDIUM"
sources = ["avd"]
title = "FTPx FTP Explorer 弱密码加密漏洞"
updated = "2026-06-16T21:51:14.457"

