[basic]
description = 'Pandora FMS 在 3.1.1 版本之前存在多个目录遍历漏洞（CWE-22）。未经身份认证的远程攻击者可通过向 ajax.php 的 page 参数、general/pandora_help.php 的 id 参数，或 operation/agentes/networkmap.php 的 layout 参数传入包含 "../" 等路径遍历序列的特制请求，利用 PHP 本地文件包含机制读取、包含并执行服务器上的任意本地文件。其中 networkmap.php 的 layout 参数更可被滥用来创建、修改或删除任意本地文件。该漏洞影响所有 3.1.1 之前的 Pandora FMS 版本，攻击仅需网络访问 Web 接口即可发起，无需登录凭证，CVSS 评分 7.5，危害等级为高。'
published = "2010-12-02T17:15:00.597"
remediation = "建议立即升级 Pandora FMS 至 3.1.1 或更高版本。若暂时无法升级，可在 Web 应用防火墙配置规则拦截包含目录遍历序列（如 ../）的 page、id、layout 参数请求，并限制 ajax.php、pandora_help.php、networkmap.php 的访问权限为仅可信 IP。"
score = 7.5
severity = "HIGH"
sources = ["nuclei"]
title = "Pandora FMS 目录遍历漏洞"
updated = "2026-06-16T23:24:30.327"

