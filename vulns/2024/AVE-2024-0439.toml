[basic]
description = "信呼（Xinhu RockOA）v2.6.2 版本在 openmodhetong/openapi 模块的 data 接口中存在 SQL 注入漏洞。攻击者无需身份认证，可通过构造包含 Base64 编码恶意载荷（如 MScgYW5kIHNsZWVwKDUpIw==，解码为 1' and sleep(5)#）的 nickName 参数，向 /index.php?m=openmodhetong|openapi&d=task&a=data 接口发送特制 GET 请求，利用程序未对用户输入做有效过滤的缺陷将恶意 SQL 拼接至查询语句中执行。成功利用可造成数据库信息泄露、绕过鉴权甚至进一步获取服务器权限，影响运行该版本的办公自动化系统。"
published = "0807"
remediation = "升级信呼 Xinhu RockOA 至官方发布的 v2.6.3 或以上修复版本，并前往官网下载覆盖升级包重新部署。如暂时无法升级，可在 Web 服务器（如 Nginx/Apache）侧配置 WAF 规则，拦截对 /index.php?m=openmodhetong 等路径中 nickName 参数的 Base64 编码恶意载荷与 SQL 关键字，同时限制后台接口仅允许受信任内网 IP 访问，并强制所有用户重新登录以失效现有会话 Cookie。"
score = 5
severity = "MEDIUM"
