[basic]
description = "Solaris snoop 网络诊断工具在处理 rpc.rquotad 服务的 GETQUOTA 请求时存在缓冲区溢出漏洞。远程攻击者无需身份认证即可发送特制的 GETQUOTA 数据包触发溢出，从而在目标系统上以 root 权限执行任意代码。该漏洞影响 Solaris 2.4/2.5/2.5.1/2.6/7.0 等多个版本。"
published = "1999-12-09"
remediation = "该漏洞为历史遗留问题，受影响系统应安装 Sun 官方安全补丁（参见 Sun Security Bulletin #190），或禁用 rpc.rquotad 服务，在 /etc/inetd.conf 中注释 rquotad 行并重启 inetd 进程以降低风险。"
score = 10.0
severity = "CRITICAL"
sources = [
    "cve",
    "epss",
]
title = "Sun Solaris snoop 缓冲区溢出漏洞"
updated = "2026-06-16"

