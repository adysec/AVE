[basic]
description = "Qpopper 2.53 及更早版本存在格式字符串漏洞，攻击者可在邮件的 From 头部构造格式化字符串，当系统通过 euidl 命令处理该邮件时触发漏洞，导致格式化字符串被传递至输出函数执行，造成未授权内存读写。该漏洞影响 Qpopper 2.52、2.53 及更早版本，同时波及 Cobalt RaQ 2.0/3.0 等使用受影响 qpopper 的服务器。攻击条件为攻击者需具备目标系统的 POP3 账户或本地访问权限，能够向系统提交包含恶意 From 头的邮件。利用成功后攻击者可提升到更高系统权限执行任意命令，造成严重的系统安全风险。"
published = "2000-05-24T04:00:00.000"
remediation = "将 qpopper 升级到 2.53_1 或更高版本。受影响版本包括 2.53 及更早版本，2.53_1 已修复此漏洞。如暂时无法升级，可通过在邮件客户端中禁用 UIDL/EUIDL 命令作为临时缓解措施。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "Cobalt RaQ qpopper 格式字符串权限提升漏洞"
updated = "2026-06-16T21:51:44.560"

