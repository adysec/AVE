[basic]
description = "Pragma Systems InterAccess TelnetD Server 4.0 存在拒绝服务漏洞，远程攻击者可通过向目标 Telnet 服务发送特制的终端客户端配置文件信息，导致服务进程崩溃或无法响应正常请求。该漏洞影响 InterAccess TelnetD Server 4.0 版本，攻击无需身份认证，低门槛即可实施，属于中等危害的可用性破坏。"
published = "2000-02-24T05:00:00.000"
remediation = "建议立即升级 Pragma Systems Telnet Server 至最新版本（当前版本已更名并持续更新），该漏洞仅影响已停止维护的 InterAccess TelnetD Server 4.0。如无法升级，应在防火墙层面禁用 Telnet 端口（默认 23/TCP）访问，并迁移至 SSH 协议（如 Pragma Fortress SSH Server）替代不安全的 Telnet 服务，以避免远程拒绝服务攻击。同时对终端客户端配置输入实施严格的格式校验和长度限制。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Pragma Systems InterAccess TelnetD Server 4.0 远程拒绝服务漏洞"
updated = "2026-06-16T21:51:14.190"

