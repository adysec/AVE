[basic]
description = "CREAR ALMail32 1.10 POP3 邮件客户端存在缓冲区溢出漏洞。远程攻击者可通过向目标用户发送包含恶意构造的 From: 或 To: 邮件头部的特制邮件，触发客户端在处理邮件时发生缓冲区溢出，导致程序崩溃或执行任意代码。该漏洞影响 ALMail32 1.10 版本，CVSS 评分 5.1，危害等级中危。受影响的用户应升级至更高版本以修复此漏洞。"
published = "1999-08-08T04:00:00.000"
remediation = "建议立即升级 CREAR ALMail32 至 1.10 以上修补版本，或从官方渠道下载最新版本安装。若暂无法升级，建议在防火墙层面限制 POP3 服务端口（默认 110）仅允许受信 IP 访问，并在邮件客户端配置中禁用对长 From/To 头部的解析，作为临时缓解措施。"
score = 5.1
severity = "MEDIUM"
sources = ["epss"]
title = "CREAR ALMail32 1.10 缓冲区溢出漏洞"
updated = "2026-06-16T21:48:49.103"

