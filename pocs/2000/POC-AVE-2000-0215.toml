[info]
author = "AVE"
description = "检测目标 Netscape Enterprise Server 是否开启 Web Publishing 功能导致 /publisher 目录可被访问。发送 GET 请求至 /publisher，若返回 200 状态码且页面包含 Java applet 相关内容，则存在目录列举漏洞。"
id = "POC-AVE-2000-0215"
name = "Netscape Enterprise Server 目录列举漏洞 PoC"
severity = "medium"
tags = ["ave-2000-0215"]
vuln_id = [
    "CVE-2000-0237",
    "AVE-2000-0215",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/publisher"
protocol = "http"

[[poc.requests.matchers]]
expect = true
status = [200]
type = "status"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "publisher",
    "applet",
    "Directory",
]
