[basic]
description = "OpenBSD 2.4 内核的 TSS（任务状态段）处理逻辑存在缺陷，本地攻击者可通过运行 crashme 程序触发内核崩溃，导致系统拒绝服务。该漏洞源于内核在 TSS 切换时未正确处理异常状态，攻击者无需特殊权限即可利用，影响 OpenBSD 2.4 版本。CVSS 评分 5.0，危害等级中等，建议升级至更高版本修复。"
published = "1999-03-21T05:00:00.000"
remediation = "立即升级到 OpenBSD 2.5 或更高版本；若无法升级，请从 OpenBSD 官方 errata 页面下载并应用 2.4 内核补丁 019（针对 crashme 程序导致的 TSS 处理崩溃），该补丁以 unified diff 格式提供，按补丁内说明重新编译内核后重启即可。作为临时缓解措施，可限制本地用户登录或禁用 crashme 等压力测试工具的运行权限。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "OpenBSD 2.4 内核 TSS 处理拒绝服务漏洞"
updated = "2026-06-16T21:48:29.517"

