[basic]
description = "Microburst uStorekeeper 1.61 存在目录遍历漏洞，远程攻击者可通过向 file 参数传递包含 ..（点点）的恶意路径，绕过访问限制读取服务器上的任意文件。该漏洞影响 uStorekeeper 1.x 版本，攻击者无需身份认证即可利用，可能导致敏感信息泄露（如配置文件、密码文件等）。Exploit-DB 已公开该漏洞的利用代码，攻击门槛低，危害较大。"
published = "2001-06-18T04:00:00.000"
remediation = "立即升级 uStorekeeper 至最新版本（如厂商已停止维护，建议迁移至其他受支持的电子商务平台）。若无法升级，在 Web 服务器层面对 `file` 参数进行输入过滤，禁止包含 `../` 等目录遍历序列，或使用 Web 应用防火墙（WAF）拦截包含路径遍历特征的请求。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Microburst uStorekeeper 目录遍历漏洞"
updated = "2026-06-16T21:54:21.613"

