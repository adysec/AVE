[basic]
description = "Sun 基于 Web 的企业管理（WBEM）安装脚本在安装过程中将管理员密码以纯文本形式写入文件，且该文件权限设置为全局可读，导致任何本地用户均可直接读取其中存储的明文密码。攻击者利用此漏洞获取管理员凭据后，可登录 WBEM 服务并接管系统管理功能，从而完全控制系统配置与监控接口，造成机密性、完整性和可用性的全面损失。该漏洞影响运行 Sun WBEM 的 Solaris 系统，CVSS v2 评分 7.2，危害等级为高。"
published = "1999-12-05T05:00:00.000"
remediation = "立即安装 Sun 发布的 Solaris WBEM 补丁（如 Solaris 2.6/7 的相应 WBEM 更新包），将安装脚本中存储密码的世界可读文件权限改为 0600 且仅限 root 访问；编辑安装脚本停止以明文写入密码，改用受限权限的临时文件或提示交互输入；升级到修正后的 Solaris WBEM 版本，并定期审计 /etc 及 WBEM 目录下配置文件权限。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
