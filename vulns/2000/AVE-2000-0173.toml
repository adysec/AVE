[basic]
description = "Linux nmh（新邮件处理程序）软件包中的 mhshow 组件存在缓冲区溢出漏洞，远程攻击者可通过向受害者发送包含特制 MIME 头的恶意电子邮件触发该漏洞，导致在目标系统上执行任意代码。该漏洞影响使用 nmh 的 Linux 系统，CVSS 评分 7.5，危害等级高。"
published = "2000-02-28T05:00:00.000"
remediation = "升级 nmh 至 0.27 或更高版本，该版本已修复 mhshow 中 MIME 头部处理的缓冲区溢出问题。如无法升级，建议禁用 mhshow 对 MIME 邮件的自动处理功能，或限制邮件客户端仅接收纯文本邮件以降低攻击面。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "Linux nmh mhshow MIME头部处理 缓冲区溢出远程代码执行漏洞"
updated = "2026-06-16T21:51:12.113"

