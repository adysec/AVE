[basic]
description = "Netscape Communicator 4.73 及更早版本的 JPEG 图像解析组件存在堆溢出漏洞。当用户使用受影响版本浏览器打开包含恶意 JPEG 图片的网页时，图片中的 JPEG 注释段若包含非法的字段长度值 1，可触发堆缓冲区溢出。远程攻击者可利用此漏洞导致目标系统拒绝服务，或在用户权限下执行任意代码。此漏洞通过社会工程方式诱导用户访问恶意网站或打开恶意图片即可触发，无需额外认证。"
published = "2000-07-25T04:00:00.000"
remediation = "升级 Netscape Communicator 至 4.74 或更高版本以修复 JPEG 注释堆溢出漏洞。由于 Netscape Communicator 已停止维护，建议立即迁移至现代浏览器（如 Firefox、Chrome），避免继续使用存在已知远程代码执行漏洞的过时软件。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Netscape Communicator JPEG注释堆溢出漏洞"
updated = "2026-06-16T21:52:12.003"

