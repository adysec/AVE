[basic]
description = "Quake 1 及 NetQuake 游戏服务器存在基于 UDP 连接包洪泛的拒绝服务漏洞。未经验证的远程攻击者无需任何身份凭证，即可向目标服务器发送大量伪造源地址的 UDP 连接请求数据包，通过持续洪泛流量快速耗尽服务器的玩家槽位资源上限，触发服务强制断开连接或造成服务器资源枯竭，从而中断正常玩家的游戏会话。该漏洞影响运行 Quake 1 引擎的游戏服务器，攻击条件为攻击者能够访问目标服务器的 UDP 端口（默认 27500 端口），利用方式简单且无需复杂的交互过程，仅通过持续发包即可达成拒绝服务效果。NVD 对该漏洞的 CVSS v2 评分为 5.0，危害等级为中等。"
published = "2001-07-17T04:00:00.000"
remediation = "建议为 Quake 1 服务器部署来源 IP 限速与连接频率限制（如使用社区补丁或防火墙对 UDP 27500 端口做速率控制），在服务器端启用最大玩家数上限与连接重试节流，并在边界防火墙对伪造源地址的 UDP 数据包进行过滤与黑名单阻断，作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Quake 1 及 NetQuake 游戏服务器 UDP 连接包洪泛拒绝服务漏洞"
updated = "2026-06-16T21:50:44.320"

