[id]
ave_id = "AVE-2000-0293"
aliases = ["CVE-2000-0342"]
[basic]
title = "Qualcomm Eudora 可执行附件警告绕过漏洞"
description = "Qualcomm Eudora 4.x 邮件客户端存在"隐形附件"安全绕过漏洞（CWE-59：链接跟随）。远程攻击者可构造包含 .lnk 快捷方式文件的恶意邮件，该快捷方式指向 .exe、.com、.bat 等可执行附件，从而绕过 Eudora 对可执行附件的用户警告机制。当用户打开看似无害的 .lnk 文件时，实际会触发指向的可执行文件，导致任意代码执行。该漏洞影响 Eudora 4.2 及 4.3 版本，CVSS 评分 7.5，危害等级高。"
severity = "HIGH"
score = 7.5
sources = ["cve"]
published = "2000-04-28"
updated = "2026-06-16"
remediation = "升级至 Eudora 5.0 及以上版本，该版本已修复 .lnk 文件绕过可执行附件警告的问题。也可在 Eudora 中开启显示文件扩展名并禁用自动打开附件。由于 Eudora 已停止维护，建议迁移至 Thunderbird 等受支持的邮件客户端。"
