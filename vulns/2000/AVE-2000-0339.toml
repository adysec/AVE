[basic]
description = "Matt Wright FormMail CGI 脚本 1.6/1.7/1.8 版本存在信息泄露漏洞。远程攻击者可通过向 env_report 参数发送特制请求，无需身份认证即可获取服务器环境变量（如系统路径、配置文件路径等敏感信息），导致敏感数据泄露。该漏洞影响 FormMail 1.6、1.7 及 1.8 版本，攻击复杂度低，仅需网络访问即可利用。官方已停止维护，建议用户迁移至替代方案。"
published = "2000-05-10T04:00:00.000"
remediation = "立即升级 Matt Wright FormMail 至 1.9 或更高版本，该版本已移除 env_report 参数功能。如无法升级，直接删除或禁用 FormMail CGI 脚本，改用更安全的现代表单处理方案（如支持输入验证的 Perl/PHP 邮件脚本）。同时确保 CGI 目录权限设置为 755，避免其他环境变量泄露。作为临时缓解措施，可在 Web 服务器配置中拒绝包含 env_report 参数的请求。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Matt Wright FormMail CGI 环境变量泄露漏洞"
updated = "2026-06-16T21:51:39.580"

