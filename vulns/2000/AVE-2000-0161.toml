[basic]
description = "ircII 4.4 至 4.7 版本的 IRC 客户端存在缓冲区溢出漏洞，远程攻击者可通过向目标客户端发送特制的 DCC 聊天请求触发该漏洞，导致任意代码执行。攻击者无需身份认证，仅需诱使目标用户连接恶意 IRC 服务器或接收恶意 DCC 请求即可完成利用。该漏洞影响 ircII 4.4-7 版本，CVSS 评分 5.1，危害等级中危。"
published = "2000-03-10T05:00:00.000"
remediation = "立即升级 ircII 客户端至 4.4H 或更高版本，该版本修复了 DCC chat 功能中的缓冲区溢出漏洞。Red Hat Linux 用户可通过 RHSA-2000-008 获取更新包，使用 rpm -Uvh ircii-4.4H 命令安装。如无法立即升级，可在 IRC 客户端配置中禁用 DCC chat 功能作为临时缓解措施。"
score = 5.1
severity = "MEDIUM"
sources = ["cve"]
title = "ircII IRC 客户端 DCC Chat 缓冲区溢出漏洞"
updated = "2026-06-16T21:51:10.400"

