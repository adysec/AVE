[basic]
description = "Linux 内核 TI AM65 CPSW 以太网驱动中存在 PM 运行时引用计数泄漏漏洞。在 am65_cpsw_nuss_ndo_slave_open() 函数的错误路径中未正确调用 pm_runtime_put() 释放电源管理引用，导致 PM 运行时引用计数泄漏。本地攻击者可利用该漏洞导致设备无法进入低功耗状态，引发系统功耗异常增加，最终造成拒绝服务。该漏洞影响 Linux 内核，CVSS 评分 5.5，危害等级中等。"
published = "2025-10-01T12:15:39.560"
remediation = "升级 Linux 内核至 6.0.16 或 6.1.2 及以上版本（对应提交 a8846b339860、5821504f5073、2c14f5cf74c4）。若运行自定义或 LTS 内核，需 cherry-pick 上述提交至本地内核源码树后重新编译部署。由于该漏洞属于驱动程序缺陷，无法通过配置修改缓解，必须完整重启以加载修复后内核。"
score = 5.5
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux 内核 TI AM65 CPSW 以太网驱动 PM 运行时泄漏漏洞"
updated = "2026-06-17T05:23:36.087"

