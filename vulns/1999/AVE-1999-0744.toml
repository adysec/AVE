[basic]
description = 'WWWBoard 存在默认用户名和密码的弱配置漏洞，远程攻击者可通过使用已知的默认凭据（如用户名 "root" 或 "admin" 及对应默认密码）直接登录系统后台管理界面，获取完全控制权限。该漏洞影响所有使用默认配置的 WWWBoard 版本，攻击者无需任何身份认证即可实施攻击，危害等级高。建议用户立即修改默认凭据或升级至修复版本。'
published = "1999-09-16T04:00:00.000"
remediation = "立即删除或修改 WWWBoard 安装目录下的默认管理员账户（默认用户名/密码多为 admin/admin 或 guest/guest），在 passwd.txt 中设置强口令并限制文件权限为 600。将 wwwboard.pl 及数据目录移出 Web 可访问路径，并通过 .htaccess 增加 IP 白名单或 Basic Auth 认证，禁止匿名访问管理脚本。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "开源软件 wwwboard 弱配置漏洞"
updated = "2026-06-16T21:49:23.980"

