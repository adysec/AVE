[basic]
description = "SGI MachineInfo CGI 程序默认安装在部分 Web 服务器上，会输出潜在敏感的系统状态信息，远程攻击者可利用该漏洞获取目标系统的敏感信息用于信息收集活动。该漏洞影响默认安装了 SGI MachineInfo CGI 程序的 Web 服务器，攻击者无需身份认证即可远程访问 CGI 程序获取敏感系统状态信息，CVSS 评分 5.0，属于中等严重程度信息泄露漏洞。"
published = "1997-05-07T04:00:00.000"
remediation = "建议立即删除或禁用 SGI IRIX Web 服务器中默认安装的 MachineInfo CGI 程序（通常位于 /cgi-bin/MachineInfo，可通过移除该文件或配置 Web 服务器拒绝访问该路径实现）。同时升级到已修复的 IRIX 6.5.15 或更高版本，并在边界防火墙处限制对 Web 服务器 cgi-bin 目录的外部访问作为临时缓解措施。"
score = 5
severity = "MEDIUM"
