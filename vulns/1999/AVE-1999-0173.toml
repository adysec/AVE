[basic]
description = "Windows NT 及 Windows 2000 操作系统在关机时未清除系统页面文件（pagefile.sys）中的残留数据，导致内存中的敏感信息（如明文密码、密钥、用户数据等）可能被写入磁盘并长期保留。本地攻击者在获取系统访问权限后可通过读取页面文件提取这些敏感信息，造成信息泄露。该漏洞影响 Windows NT 4.0 及 Windows 2000 系统，CVSS 评分 2.1，危害等级低。"
published = "2000-01-20T05:00:00.000"
remediation = '通过本地安全策略启用「关机：清除虚拟内存页面文件」（路径：安全设置→本地策略→安全选项），或设置注册表 HKLM\SYSTEM\CurrentControlSet\Control\Session Manager\Memory Management\ClearPageFileAtShutdown 为 1。建议升级至 Windows 2000 SP4 或更高版本以降低风险。'
score = 2.1
severity = "LOW"
sources = ["avd"]
title = "Microsoft Windows NT/2000 页面文件信息泄露漏洞"
updated = "2026-06-16T21:48:42.143"

