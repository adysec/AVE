[basic]
description = "满客宝智慧食堂管理系统存在任意文件下载漏洞，攻击者可通过构造特制的HTTP请求参数（如download、file、path等参数）绕过系统权限验证与路径过滤逻辑，利用目录遍历（如../../）直接读取服务器上的任意文件，包括数据库配置文件、系统源码、用户数据等敏感信息，造成严重的信息泄露。该漏洞攻击复杂度低，无需身份认证与用户交互即可远程利用，对系统保密性与数据安全构成直接威胁。"
published = "2025-07-02"
remediation = "升级到满客宝智慧食堂管理系统最新安全版本，严格对文件下载接口（如下载类请求参数）进行路径白名单校验与规范化处理，过滤../等目录遍历字符；在服务端增加身份认证与权限校验中间件，禁止未授权访问下载接口；若无法立即升级，可临时关闭或限制文件下载功能，并通过反向代理（如Nginx）限制下载路径仅限指定静态目录。"
score = 6.5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "满客宝智慧食堂管理系统任意文件下载漏洞"
