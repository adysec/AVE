[basic]
description = "Subscribe Me LITE 是一款 CGI 脚本中心产品，其 subscribe.pl 脚本在修改管理员密码时未进行有效的身份认证。远程攻击者无需任何凭证，直接向目标服务器发送带有 setpwd 参数的 HTTP 请求即可调用该脚本，从而任意更改管理员密码并获取 Account Manager 的管理权限。该漏洞影响 Subscribe Me Lite 2.0 版本，攻击复杂度低，危害等级高。"
published = "2000-10-20T04:00:00.000"
remediation = '厂商 CGI Script Center 已于 2000 年 8 月发布修复版本：在 subscribe.pl 的 setpwd 子程序中添加 `if (-e "$passfile/password.txt")` 检查，当密码文件已存在时禁止未授权重置。建议立即升级至该修复版本，或在 subscribe.pl 中手动增加上述密码文件存在性校验逻辑。由于该产品已停止维护且官方站点已不可访问，长期建议迁移至 Mailman 等现代邮件列表管理系统。'
score = 7.5
severity = "HIGH"
sources = ["exploitdb"]
title = "CGI Script Center Subscribe Me LITE 2.0 管理密码更改漏洞"
updated = "2026-06-16T21:52:16.277"

