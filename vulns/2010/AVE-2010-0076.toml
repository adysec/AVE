[basic]
description = "Joomla! Gadget Factory组件1.0.0和1.5.0版本存在目录遍历漏洞，由于index.php中controller参数未对用户输入进行充分验证，远程攻击者可通过在controller参数中提交目录遍历序列（如../）读取服务器上任意文件内容。该漏洞影响使用该组件的Joomla!站点，攻击者无需身份认证即可远程利用，可导致敏感文件泄露，CVSS评分7.5分，属高危漏洞。攻击者仅需构造包含目录遍历序列的恶意请求即可实现任意文件读取。"
published = "2010-05-19T12:07:52.727"
remediation = "升级到 Joomla! 3.x 或更高版本到 3.10.13 或安全版本，并确保卸载过时的 Gadget Factory 组件；如果无法立即升级，可在 Apache/Nginx 配置中阻止 .. (点 dot) 等非法路径访问；或者使用SELinux/AppArmor增强安全政策限制组件权限；通过.htaccess禁止访问 PHP 文件的父目录；以及对 index.php 和组件文件设置为安全权限 644；此外定期扫描上传文件和配置库以发现类似路径遍历漏洞。"
score = 7.5
severity = "HIGH"
sources = ["nuclei"]
