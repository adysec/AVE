[basic]
description = "运行 Cisco IOS 的思科千兆交换机路由器存在访问控制缺陷，远程攻击者可通过向目标设备发送特制数据包绕过 ACL 规则，实现未经授权的数据包转发。该漏洞影响运行 IOS 的思科千兆交换机路由器系列产品，攻击者无需身份认证即可利用，可能导致敏感信息泄露或网络流量被劫持。建议用户及时升级 IOS 版本或配置严格的访问控制列表以缓解风险。"
published = "1999-06-10"
remediation = "升级 Cisco IOS 至修复该漏洞的版本（如 12.0(5)XK 及以上），或在 ACL 中避免单独依赖 established 关键字，改用具体端口和协议的显式 permit/deny 规则组合实现访问控制。如无法升级，可在边界路由器上启用基于上下文的访问控制（CBAC）作为替代方案。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "思科 IOS 千兆交换机路由器访问控制绕过漏洞"
updated = "1999-06-10"

