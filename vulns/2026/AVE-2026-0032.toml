[basic]
description = "天玥网络安全审计系统存在命令执行漏洞，攻击者可通过构造特制的 HTTP 请求向系统注入恶意命令，从而在服务器端以系统权限执行任意命令。该漏洞源于系统对用户输入参数过滤不严，未对特殊字符进行有效转义。攻击者无需身份认证即可远程利用，获取服务器控制权，进而窃取审计数据或横向移动。影响天玥网络安全审计系统多个版本，危害严重。"
published = "08.08"
remediation = "联系启明星辰获取最新安全补丁，升级天玥网络安全审计系统至厂商发布的最新版本；在Web管理后台严格限制管理IP白名单，禁止将管理端口暴露在互联网；在网络边界部署WAF或IPS规则拦截命令执行攻击载荷；如非必要，临时关闭系统Web管理页面的对外访问权限。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "启明天玥网络安全审计系统命令执行漏洞"
updated = "08.08"

