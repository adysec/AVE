[basic]
description = "Linux 内核 SCSI lpfc 驱动中存在释放后使用漏洞，当 lpfc_issue_els_flogi() 函数执行 FLOGI 请求失败返回非零状态后，节点引用计数被递减以触发 nodelist 结构体释放。若此时存在待处理的 dev-loss-evt 任务，节点会被过早释放，当 dev-loss-evt 完成时引用已释放节点导致空指针解引用。类似地，在 PLOGI 处理中若 dev-loss-evt 待处理也存在相同问题。该漏洞影响使用 Emulex LightPulse FC 驱动的 Linux 系统，攻击者可通过触发特定 SCSI ELS 命令失败导致条件竞争，造成系统崩溃或权限提升。CVSS 评分 7.8，危害等级高。"
published = "2025-02-26T07:01:29.490"
remediation = "立即将 Linux 内核升级至 5.15.181（5.15 LTS 分支）、5.18.3 或 5.19 及以上版本，升级完成后重启系统使新内核生效。如无法立即升级，可通过 `sudo modprobe -r lpfc` 临时卸载 lpfc 驱动模块禁用 Emulex FC 适配器，但此操作将导致所有依赖该模块的光纤通道存储不可用，仅建议在非生产环境或冗余链路下作为临时缓解措施。"
score = 7.8
severity = "HIGH"
sources = ["msrc"]
title = "Linux kernel SCSI lpfc 驱动空指针解引用漏洞"
updated = "2026-06-17T05:18:22.550"

