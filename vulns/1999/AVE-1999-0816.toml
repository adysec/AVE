[basic]
description = "NFS（网络文件系统）服务存在访问控制配置缺陷，管理员错误地将根目录（/）或密码文件等系统关键数据导出为全局可读，导致同一网络中的任意攻击者无需身份认证即可通过 NFS 协议远程挂载并读取这些敏感信息。该漏洞直接影响 Unix/Linux 系统中 NFS 服务的配置安全性，攻击门槛极低，可导致系统全部数据泄露。建议限制 NFS 导出范围并启用访问控制列表。"
published = "1999-01-01T05:00:00.000"
remediation = "限制 NFS 导出的目录范围，仅导出必要目录而非根目录或敏感路径；在 /etc/exports 中使用 `root_squash` 选项压缩 root 权限，并指定允许访问的客户端 IP 或网段（如 `rw,root_squash,192.168.1.0/24`）；同时配置防火墙仅放行受信任来源的 NFS 端口（2049/TCP/UDP）。"
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "Unix NFS 服务端 Export 配置不当权限提升漏洞"
updated = "2026-06-16T21:48:37.323"

