[basic]
description = "WWWBoard 2.0 存在敏感信息泄露漏洞，其将加密后的用户密码存储在 `passwd.txt` 文件中，且该文件位于 Web 根目录下。远程攻击者无需身份认证，直接通过浏览器访问该文件路径即可获取所有用户的加密密码，进而可尝试离线破解获取明文密码，严重威胁系统安全。该漏洞影响 WWWBoard 2.0 版本。"
published = "1999-09-16T04:00:00.000"
remediation = "将 passwd.txt 移至 Web 根目录之外（如 /etc/wwboard/），或通过 .htaccess 添加 `<Files passwd.txt> Deny from all</Files>` 限制访问。由于 WWWBoard 已停止维护，建议迁移至现代论坛系统（如 phpBB 或 Discourse）。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "WWWBoard 2.0 远程密码泄露漏洞"
updated = "2026-06-16T21:49:23.863"

