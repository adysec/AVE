[basic]
description = "ONNX（Open Neural Network Exchange）机器学习模型互操作框架的版本转换器适配器存在空指针解引用漏洞（CWE-476）。当 `convert_version()` 函数处理包含零输入（zero inputs）的 Upsample 算子的恶意模型时，`Upsample_6_7::adapt_upsample_6_7()` 在 `onnx/version_converter/adapters/upsample_6_7.h:31` 行直接访问 `node->inputs()[0]->sizes()` 而未检查输入数量，导致空指针解引用和程序崩溃（SIGSEGV），造成拒绝服务。攻击者可构造 107 字节的 PoC 模型文件触发该漏洞。该漏洞影响 ONNX 1.9.0 至 1.22.0 之前版本，1.22.0 版本已修复。"
published = "2026-07-08T20:16:49.913"
remediation = "升级 ONNX 至 1.22.0 或更高版本，该版本修复了 Upsample 版本转换器适配器中未检查输入数量即访问 `node->inputs()[0]->sizes()` 导致的空指针解引用问题。如无法立即升级，可在调用 `convert_version()` 前对输入模型进行校验，确保 Upsample 节点输入数量大于 0，或使用沙箱环境隔离不可信模型的转换操作作为临时缓解措施。"
score = 5.5
severity = "MEDIUM"
sources = ["ghsa"]
title = "ONNX 版本转换器上采样适配器空指针解引用漏洞"
updated = "2026-07-13T17:02:01.533"

