[basic]
description = "HP OpenView OmniBack II A.03.50 存在命令执行漏洞，远程攻击者可通过向目标系统的 OmniBack 客户端发送特制请求触发该漏洞，从而在目标系统上以 OmniBack 进程权限执行任意命令。该漏洞影响 HP 11.x 及更早版本中运行的 OmniBack II A.03.50，Metasploit 框架已集成对应利用模块，攻击者无需高权限即可实施攻击，危害较大。"
published = "2001-06-02T04:00:00.000"
remediation = "升级 HP OpenView OmniBack II 至 A.04.00 或更高版本，该漏洞已在后续版本中修复。如无法升级，在防火墙上限制对 OmniBack II 服务端口（默认 5555/TCP）的访问，仅允许受信任的管理主机连接，并禁用不必要的远程管理功能。"
score = 4.6
severity = "MEDIUM"
sources = ["exploitdb"]
title = "HP OpenView OmniBack II 命令执行漏洞"
updated = "2026-06-16T21:54:04.593"

