[basic]
description = "Realtek SDK 中的 miniigd UPnP SOAP 服务存在远程代码执行漏洞。该服务在处理 SOAP 请求时未对 `NewInternalClient` 请求进行充分验证，未经身份认证的远程攻击者可通过发送特制的 SOAP 请求触发任意代码执行。该漏洞广泛影响采用 Realtek RTL81xx 芯片组的路由器及物联网设备，攻击者仅需向目标设备的 UPnP 端口（通常 49152 及以上随机端口）发送恶意请求即可无需身份验证实现远程利用，CISA 将其列入已知被利用漏洞目录。CVSS v3.1 评分为 9.8，属于严重级别，危害极大且利用门槛极低。"
published = "2015-05-01T15:59:01.287"
remediation = "升级到已打补丁的固件版本：D-Link 设备（DIR-615 升级至 6.07b01 或更高版本，DIR-600L 升级至 2.06b07 或更高版本，DIR-605L 升级至 3.04b02 或更高版本），ELECOM 产品（WRC-300FEBK/F300NF）请参照 https://www.elecom.co.jp/support/ 获取最新固件。如厂商未发布补丁，应立即禁用设备上的 UPnP（Universal Plug and Play）功能，消除 miniigd SOAP 服务的暴露面。如无法通过配置缓解，建议下线受影响设备并更换为其他厂商产品。同时在网络边界部署防火墙规则，禁止外部网络访问 miniigd SOAP 服务的 1900/UDP 端口，仅允许受信任的内网客户端访问该服务。"
score = 9.8
severity = "CRITICAL"
sources = ["kev"]
title = "Realtek rtl81xx miniigd SOAP 服务远程代码执行漏洞"
updated = "2026-06-17T00:16:37.030"

