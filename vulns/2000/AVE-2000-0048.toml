[basic]
description = "Handspring Visor 掌上电脑的 Network HotSync（网络同步）程序缺乏身份认证机制，远程攻击者无需任何凭据即可通过网络连接到目标设备的 HotSync 服务，直接窃取设备中存储的电子邮件、联系人、文件等敏感数据。该漏洞影响运行 Handspring Visor 的所有设备，由于同步过程中未实施任何访问控制或加密验证，任何处于同一网络可达范围内的攻击者均可利用此缺陷获取用户隐私信息，CVSS 评分 5.0，危害等级中等。"
published = "2000-01-05T05:00:00.000"
remediation = "Handspring Visor 已停产多年，无可用安全补丁。建议立即禁用 Network HotSync 功能，改用本地 USB 同步方式传输数据。若必须使用网络同步，请通过防火墙限制 HotSync 默认端口（TCP 14238/14239）的入站访问，仅允许可信 IP 连接，并确保设备处于受信任的内网环境中，切勿将其暴露于公网。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Handspring Visor Network HotSync 未授权访问漏洞"
updated = "2026-06-16T21:50:54.883"

