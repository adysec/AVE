[basic]
description = "Ascend Multilink PPP for ISDN 4.6 及早期版本在处理多链路 PPP 端点标识符时存在验证缺陷，远程攻击者可通过发送伪造的端点标识符数据包，触发协议栈异常导致拨号连接中断，造成拒绝服务。该漏洞影响 Ascend ISDN 接入设备 4.6 及之前版本，攻击者无需认证即可从远程发起攻击，利用方式为发送伪造的 PPP 端点标识符数据包，导致目标设备拨号连接中断或服务不可用，CVSS 评分 5.0，属中危拒绝服务漏洞。"
published = "1999-02-12T05:00:00.000"
remediation = "建议将 Ascend 路由器/接入设备的软件版本升级到 4.6 或更高版本（Ascend 官方已在该版本中修复 Multilink PPP 对伪造 Endpoint Identifier 的处理逻辑，可防止 ISDN 拨号远程拒绝服务）。如暂时无法升级，可在接入侧启用对 PPP 对等端 Endpoint Identifier 的合法性校验，并配置 ACL 限制仅允许受信任的 ISDN 拨号用户对端地址发起 Multilink 连接，作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Ascend Multilink PPP for ISDN 拒绝服务漏洞"
updated = "2026-06-16T21:49:56.330"

