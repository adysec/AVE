[basic]
description = "NetworkICE ICECap Manager 2.0.23 及之前版本中存在调试功能默认开启的安全漏洞。远程攻击者利用该调试功能可绕过脆弱的认证机制，无需有效凭证即可向目标系统提交未加密的事件数据。该漏洞暴露出产品在默认配置下的安全缺陷，攻击者可通过网络直接利用，影响系统事件数据的完整性与机密性。CVSS 评分 5.0，危害等级中等。"
published = "2000-05-17T04:00:00.000"
remediation = "升级到 NetworkICE ICEcap Manager 2.0.24 或更高版本；若无法升级，在 ICEcap 配置中禁用调试功能（debugging feature），并用防火墙规则限制仅受信任 IP 访问管理端口（默认 5000/tcp），避免将管理界面暴露在公网。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Internet Security Systems ICECap Manager 默认用户名和密码漏洞"
updated = "2026-06-16T21:51:32.053"

