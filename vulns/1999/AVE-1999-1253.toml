[basic]
description = "Windows NT 4.0 RPC 服务（Snork）存在拒绝服务漏洞。远程攻击者可通过向目标系统发送伪造的畸形 RPC 数据包，触发服务生成错误响应并发送回伪造的源地址，形成响应循环，大量消耗系统资源导致服务不可用。该漏洞影响 Windows NT 4.0 系统，攻击者无需身份认证即可远程触发，CVSS 评分 5.0，危害等级中危。"
