[basic]
description = "Windows 2000 Server 存在拒绝服务漏洞，远程攻击者无需身份认证即可通过向目标系统的多种 TCP 和 UDP 端口持续发送二进制零数据流，导致 CPU 占用率急剧上升，最终使系统无法正常响应请求。该漏洞影响 Windows 2000 Server 版本，攻击者只需具备网络访问能力即可实施攻击，无需任何授权。CVSS 评分 5.0，危害等级中等。建议用户升级至不受影响的操作系统版本或在网络边界部署入侵检测系统以缓解风险。"
published = "2000-06-30T04:00:00.000"
remediation = "Windows 2000 Server 已于 2010 年 7 月终止支持，建议立即升级至受支持的 Windows Server 版本（如 Windows Server 2019/2022）。如无法升级，可在防火墙或路由器上配置访问控制列表（ACL），仅允许可信 IP 访问服务器的 TCP/UDP 端口，并启用 TCP SYN Cookie 保护以缓解资源耗尽攻击。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Microsoft Windows Server 2000 端口洪水拒绝服务漏洞"
updated = "2026-06-16T21:52:02.560"

