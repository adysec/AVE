[basic]
description = "IBM Lotus Notes 在 5.02 版本之前存在默认 ECL（可执行内容语言）配置缺陷，允许远程攻击者通过在电子邮件中附加恶意程序，利用当用户打开邮件时自动执行该附件的方式，在目标系统上执行任意命令。该漏洞影响 Lotus Notes 5.02 之前的所有版本，攻击者无需身份认证即可触发，危害等级较高。用户只需打开钓鱼邮件中的附件即可被利用，Microsoft 已于相关安全更新中修复此问题。"
published = "2001-07-21T04:00:00.000"
remediation = '升级到 Lotus Notes 5.02 或更高版本，该版本已修复默认 ECL 的过度授权问题。升级完成后，对每个用户的 .id 文件执行以下操作：运行 Notes，选择 File -> Tools -> Switch ID 切换到目标 .id 文件，然后选择 File -> Tools -> User Preferences，点击 Security Options 进入工作站安全 ECL 对话框，选择默认模板并取消所有权限勾选，点击 Add 将可信开发者添加到白名单并为其单独配置所需权限。如暂时无法升级，可将所有表单和邮件的 ECL 设置为"无签名"并取消所有文件系统访问权限作为临时缓解措施。'
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "IBM Lotus Notes 远程代码执行漏洞"
