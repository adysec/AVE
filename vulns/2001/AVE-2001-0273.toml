[basic]
description = "Mutt 邮件客户端在 1.2.5 版本前处理 IMAP 协议响应时存在格式化字符串漏洞，未正确验证服务器返回的格式化字符串参数。攻击者可搭建恶意 IMAP 服务器，诱导受害者使用受影响版本的 Mutt 连接并接收邮件，通过精心构造的格式化字符串载荷覆盖栈内存中的函数指针或返回地址，实现远程任意代码执行。漏洞影响所有运行 Mutt < 1.2.5 的 Linux/Unix 系统，攻击者无需认证即可在用户查收邮件时触发漏洞，完全控制受害主机、窃取邮件数据或植入恶意软件。建议立即升级至 Mutt 1.2.5 或更高版本，或暂时禁用 IMAP 功能并限制非受信 IMAP 服务器访问。"
published = "2001-06-27T04:00:00.000"
remediation = "立即升级 Mutt 到 1.2.5 或更高版本（如当前稳定版 2.2.12）。若无法立即升级，可临时禁用 IMAP 功能或仅连接受信 IMAP 服务器，并在防火墙层面限制非信任 IMAP 服务器的 143/993 端口访问，作为临时缓解措施。"
score = 7.5
severity = "HIGH"
sources = ["redhat"]
title = "Mutt 邮件客户端 格式化字符串远程代码执行漏洞"
updated = "2026-06-16T21:54:22.390"

