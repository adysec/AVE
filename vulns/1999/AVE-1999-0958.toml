[basic]
description = "UUCP（Unix-to-Unix Copy Protocol）服务默认在 TCP 端口 540 上运行，该服务设计上缺乏充分的身份认证机制，远程攻击者可在无需认证的情况下通过 UUCP 协议与目标系统建立连接，执行文件传输、远程命令执行等操作，导致系统被未授权访问。该问题影响早期运行 UUCP 服务的多种 Unix 系统，攻击者利用此服务可窃取敏感文件或控制系统，危害严重。"
published = "1999-01-01T05:00:00.000"
remediation = "立即停止并禁用 UUCP 服务（uucp/uucico），执行 `systemctl stop uucp && systemctl disable uucp`（或对应 init 脚本 `service uucp stop && chkconfig uucp off`）。如业务必须使用，应配置 TCP Wrapper（/etc/hosts.allow 和 /etc/hosts.deny）限制可信来源 IP，并在防火墙上关闭 TCP 540 端口。若无需 UUCP 功能，建议直接卸载 uucp 软件包。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Multiple Unix UUCP 服务远程安全漏洞"
updated = "2026-06-16T21:48:46.627"

