[basic]
description = 'Webcom CGI Guestbook 的 wguest.exe 和 rguest.exe 组件存在任意文件读取漏洞。攻击者可通过向 "template" 参数传入恶意路径，利用目录遍历技术读取服务器上的任意文件，包括配置文件、密码文件等敏感信息。该漏洞无需身份认证即可远程利用，影响运行 Webcom Guestbook 0.1 版本的 Web 服务器，CVSS 评分 5.0，危害等级中危。建议升级至最新版本或移除存在漏洞的 CGI 程序。'
published = "1999-04-01T05:00:00.000"
remediation = "立即删除或禁用服务器上的 wguest.exe 和 rguest.exe 脚本，停止使用 Webcom CGI Guestbook 程序（已停止维护多年）。作为替代方案，部署其他仍在维护的留言本程序。同时配置 Web 服务器权限，限制 CGI 目录下脚本对任意文件的读取能力。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Webcom CGI Guestbook 任意文件读取漏洞"
updated = "2026-06-16T21:48:27.433"

