[info]
author = "ave"
description = "检测 Unix 系统 /etc/passwd 中是否存在多个账户共享相同 UID（尤其是非 root 账户配置为 UID 0）的配置缺陷，验证因 UID 重复导致的权限控制绕过漏洞"
id = "POC-AVE-1999-0818"
name = "CVE-1999-0556 PoC"
severity = "critical"
tags = ["ave-1999-0818"]
vuln_id = [
    "CVE-1999-0556",
    "AVE-1999-0818",
]

[poc]
logic = "any"

[[poc.requests]]
path = "/etc/passwd"
protocol = "file"

[[poc.requests.matchers]]
expect = true
part = "body"
regex = "^[^:]+:[^:]+:0:"
type = "regex"
