[basic]
description = "Microsoft FrontPage Personal Web Server (PWS) 存在缓冲区溢出漏洞，远程攻击者可通过向目标服务器发送超长 URL 请求触发缓冲区溢出，导致服务进程崩溃，造成拒绝服务。该漏洞影响 Windows 95 平台上的 FrontPage Server Extensions 3.0.2.926 及可能其他版本，攻击无需身份认证，危害等级中等。"
published = "2001-03-12T05:00:00.000"
remediation = "立即停止使用 Windows 95 及 Microsoft FrontPage Personal Web Server 1.0，该产品已终止支持且不再有安全更新。建议迁移至受支持的 Web 服务器（如 IIS 或 Apache），并在防火墙层面限制对 PWS 服务的网络访问作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Microsoft FrontPage Personal Web Server 缓冲区溢出拒绝服务漏洞"
updated = "2026-06-16T21:48:50.150"

