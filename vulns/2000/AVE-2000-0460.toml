[basic]
description = '该漏洞存在于 Netscape Professional Services FTP Server 1.3.6（LDAP Aware）中， assailants 利用目录遍历（Path Traversal）攻击向量，通过在 FTP 请求中使用 ".."(dot dot) 序列绕过目录限制，非法访问目标服务器上的任意文件。该漏洞严重威胁着系统安全，由于攻击无需任何身份验证即可触发，远程攻击者可以轻易遍历文件系统读取敏感文件，甚至可能进一步执行代码，导致系统完全失控。该漏洞影响 Netscape Professional Services FTP Server 1.3.6 版本， CVSS 评分 10.0，危害等级极高。攻击者仅需向目标 FTP 服务器发送包含恶意路径的常规FTP命令即可利用此漏洞，攻击条件极其简单，全球范围内数以万计的网络设备都受到此漏洞的影响。Microsoft 和其他厂商已发布安全补丁修复此漏洞，建议及时更新至最新版本。'
published = "2000-06-21T04:00:00.000"
remediation = "建议立即迁移至现代 FTP 服务器（如 vsftpd、ProFTPD）并启用 chroot 限制用户根目录。若必须继续使用 Netscape FTP 1.3.6，请在防火墙层面限制 FTP 端口(21/TCP)仅对可信 IP 开放，并在服务器文件系统层面为 FTP 用户设置严格 chroot 目录权限，禁止目录遍历权限。Netscape 官方已停止支持该产品，无官方补丁可用，建议尽快迁移替代。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "网景 Professional Services FTP Server 目录遍历漏洞"
updated = "2026-06-16T21:52:02.193"

