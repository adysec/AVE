[basic]
description = "Windows NT 账户策略存在安全漏洞，当远程用户的登录时间到期后，系统未能强制断开其与服务器的连接，导致用户可在授权时段外继续访问系统资源。该漏洞影响 Windows NT 系列操作系统，拥有有效域账户的远程攻击者可利用此问题绕过登录时间限制，在非授权时段持续访问服务器资源，CVSS 评分 10.0，危害等级严重。"
published = "1999-01-01T05:00:00.000"
remediation = '在 Windows NT 域用户管理器中选择"规则(Policies)→账户(Account)"，勾选"当登录时数到期时强制断开远程用户与服务器的连接(Forcibly disconnect remote users from server when logon hours expire)"。对于仍运行 Windows NT 的系统，建议升级至 Windows Server 2003 或更高版本，新版本默认启用该策略。'
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "Microsoft Windows NT 账户策略登录时间限制绕过漏洞"
updated = "2026-06-16T21:48:42.383"

