[basic]
description = "Keras 3.7.0 的 get_file 函数存在任意文件写入漏洞（CWE-494）。攻击者可构造包含符号链接或路径遍历载荷的恶意 tar 压缩包，通过诱导用户调用 get_file 函数下载并解压该文件，利用解压过程中未对文件路径进行充分校验的缺陷，将恶意文件写入用户系统的任意目录。该漏洞攻击复杂度低，无需身份认证，但需要用户交互，对系统完整性造成高影响，可能导致代码执行或敏感文件覆盖。"
published = "2025-01-08T17:15:15.817"
remediation = '立即将 Keras 升级至 3.12.3 或更高版本（`pip install --upgrade keras>=3.12.3`），该版本已对 `get_file` 函数中的 tar 文件提取进行多项安全加固，包括拒绝硬链接逃逸、阻止符号链接目录遍历、拒绝解压炸弹攻击、使用 `filter="data"` 安全提取模式。如无法立即升级，应避免使用 `get_file` 从不可信来源下载并解压 tar 文件，或在使用前手动校验 tar 文件内容是否包含路径穿越符号链接。'
score = 6.5
severity = "MEDIUM"
sources = ["msrc"]
title = "Keras 路径遍历漏洞"
updated = "2026-06-17T08:11:08.327"

