[basic]
description = "SSH 2.0.11及更早版本存在权限验证缺失漏洞，本地用户无需root权限即可请求从特权端口（端口号小于1024）进行远程转发。该漏洞源于SSH服务未对端口转发请求进行充分的权限检查，允许低权限用户利用SSH的远程转发功能绑定到系统特权端口，从而可能绕过安全策略或提升本地权限。攻击者需具备本地系统访问权限，利用条件相对有限，但成功利用后可造成权限提升或网络访问控制绕过。该漏洞影响SSH 2.0.11及之前版本，CVSS评分4.6，危害等级中危。"
published = "1998-12-29T05:00:00.000"
remediation = "升级到 SSH 2.0.12 或更高版本，该版本要求远程转发特权端口必须具有 root 权限。如无法升级，可在 sshd_config 中设置 PermitRootLogin no 并限制可登录用户白名单作为临时缓解。"
score = 4.6
severity = "MEDIUM"
sources = ["avd"]
title = "SSH 特权端口远程转发权限绕过漏洞"
updated = "2026-06-16T21:49:50.780"

