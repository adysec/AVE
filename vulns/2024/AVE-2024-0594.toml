[basic]
description = "Das U-Boot 在 2025.01-rc1 之前的版本中存在整数溢出漏洞，具体位于 ext4fs_read_symlink 函数。当处理 ext4 文件系统符号链接时，函数对一个 le32 变量执行加一操作（zalloc 分配）时发生整数溢出，导致 malloc 分配零字节内存，进而引发内存覆写。攻击者可通过构造包含恶意 inode 大小（0xffffffff）的 ext4 文件系统镜像，使设备在引导过程中触发该漏洞，实现任意代码执行或拒绝服务。该漏洞影响所有使用 U-Boot 引导加载程序的嵌入式设备和开发板，CVSS 评分 7.1（高危），攻击需物理接触或本地访问。修复方案为升级至 U-Boot 2025.01-rc1 或更高版本，厂商已提供补丁修复此整数溢出问题。"
published = "2025-02-18T23:15:09.710"
remediation = "立即升级 Das U-Boot 至 2025.01-rc1 或更高稳定版本（建议 2025.01 正式发布版）。编译升级流程：从 U-Boot 官方仓库（https://source.denx.de/u-boot/u-boot）克隆代码，切换至 v2025.01 标签，执行 `make <板型>_defconfig && make` 编译后刷写固件。若无法立即升级，可从上游获取 CVE-2024-57256 补丁（https://github.com/ocp-hm-openbmc-opf-ami/meta-ami 已收录该补丁文件），应用 `ext4fs_read_symlink` 函数中的 zalloc 大小校验修复，对 le32 变量加 1 前检查是否溢出。同时，限制设备从不可信 USB 存储设备启动，避免挂载来源不明的 ext4 分区，降低触发整数溢出的攻击面。"
score = 7.1
severity = "HIGH"
sources = ["msrc"]
title = "Das U-Boot 整数溢出漏洞"
updated = "2026-06-17T08:13:28.053"

