[basic]
description = "L0pht AntiSniff（后更名为 Stake AntiSniff）网络检测工具的 DNS 测试功能中存在缓冲区溢出漏洞。远程攻击者可在目标主机进行 DNS 测试期间，发送特制的畸形 DNS 响应数据包，触发栈缓冲区溢出，导致任意代码执行。该漏洞 CVSS 评分为 10.0，危害等级严重，无需身份认证即可远程利用。"
published = "2000-05-16"
remediation = "L0pht AntiSniff（@stake Researchers v1.0）已停止维护，官方未发布该漏洞的补丁。建议立即停用该产品并迁移至替代方案；如暂时无法停用，可在网络边界防火墙或 IDS/IPS 上配置规则，过滤或丢弃可疑的畸形 DNS 响应数据包，同时对 DNS 响应报文实施深度包检测，限制非标准格式的 DNS 应答进入内网。"
score = 10.0
severity = "CRITICAL"
sources = ["cve"]
title = "L0pht AntiSniff DNS 响应处理缓冲区溢出漏洞"
updated = "2026-06-16"

