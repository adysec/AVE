[basic]
description = "Microsoft Windows NT 与 Windows 2000 系统的命令处理器 (CMD.EXE) 存在缓冲区溢出漏洞，本地用户可通过向系统传递超长的环境变量 (Malformed Environment Variable) 触发该漏洞，导致命令处理器崩溃，造成拒绝服务。该漏洞影响 Windows NT 及 Windows 2000 系统，需要本地登录权限，CVSS 评分 5.0，危害等级中危。"
published = "2000-04-20"
remediation = "该漏洞影响 Windows NT 4.0 和 Windows 2000，这两款系统均已停止支持且不再有安全更新。建议立即升级至 Windows 10/11 或 Windows Server 2016/2019/2022 等受支持版本。如无法升级，可通过组策略限制本地用户登录权限，并监控 cmd.exe 异常调用行为作为临时缓解措施。"
score = 5.0
severity = "MEDIUM"
sources = ["cve"]
title = "Microsoft Windows NT/2000 CMD.EXE 缓冲区溢出拒绝服务漏洞"
updated = "2026-06-16"

