[basic]
description = "SCO OpenServer 系统中的 calserver 组件存在远程缓冲区溢出漏洞。未经身份认证的远程攻击者可通过向目标系统发送特制的超长消息，触发 calserver 中的缓冲区溢出，导致攻击者能够以 root 权限执行任意代码。该漏洞影响 SCO OpenServer 及 SCO UNIX 5 系列版本，CVSS 评分 10.0，危害等级严重。目前厂商已发布补丁修复此漏洞。"
published = "2001-03-12T05:00:00.000"
remediation = "立即从 ftp://ftp.sco.com/SSE/security_bulletins/SB-99.02a 获取并安装 SCO OpenServer 安全补丁 SB-99.02a。如无法安装补丁，可在 /etc/inetd.conf 中注释掉 calserver 服务行并重启 inetd 以禁用该服务，同时在防火墙层面限制对 457/TCP 端口的访问，仅允许可信 IP 连接。"
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "SCO OpenServer calserver 远程缓冲区溢出漏洞"
updated = "2026-06-16T21:51:26.513"

