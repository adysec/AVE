[basic]
description = "ARP（地址解析协议）协议设计上缺乏身份验证机制，在同一广播域内的任何攻击者均可向目标主机发送伪造的 ARP 应答报文，毒化其 ARP 缓存表，将目标 IP 地址与攻击者 MAC 地址关联。该漏洞影响所有使用 ARP 协议的网络设备，攻击者无需认证即可实施中间人攻击、IP 地址欺骗或拒绝服务攻击，是局域网中最基础且广泛存在的协议层安全问题。"
published = "1997-09-19T04:00:00.000"
remediation = "在关键网段交换机启用动态 ARP 检测 (DAI) 和 DHCP Snooping，阻止伪造 ARP 报文；对核心资产配置静态 ARP 条目；部署 ARP 防火墙或 arpwatch 等监控工具检测异常 ARP 变化；使用 IPsec/MACsec 加密通信链路，降低中间人攻击风险。"
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "TCP/IP ARP协议缓存投毒欺骗漏洞"
updated = "2026-06-16T21:48:48.363"

