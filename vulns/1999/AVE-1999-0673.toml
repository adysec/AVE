[basic]
description = "Falcon Web 服务器在处理文件名请求时存在信息泄露漏洞。远程攻击者无需身份认证，只需向服务器请求一个超长文件名的资源（例如超过系统路径长度限制的 URL），服务器在返回错误响应时会将 Web 根目录的绝对路径一同暴露出来。该漏洞影响运行 Falcon Web 服务器的系统，攻击条件为攻击者能够网络访问目标 Web 服务并发送构造的超长文件名请求。利用方式简单，通过普通 HTTP 请求即可触发，攻击者借此可获取服务器文件系统目录结构信息，为后续进一步攻击提供路径情报，CVSS 评分约为 5.0，危害等级中等。"
published = "1999-10-28T04:00:00.000"
remediation = "建议将 Falcon Web Server 升级到修复了 CVE-1999-0882 的最新版本，或替换为持续维护的 Web 服务器（如 Apache 或 Nginx）以彻底消除风险。临时缓解措施：在 Falcon 配置文件中启用自定义错误页面，将 404、403 等错误响应中的服务器绝对路径信息替换为通用提示文本，避免向攻击者泄露 Web 根目录路径。同时，在服务器前端部署 WAF 规则，拦截包含超长文件名的异常请求，阻断路径探测攻击面。"
score = 5
severity = "MEDIUM"
