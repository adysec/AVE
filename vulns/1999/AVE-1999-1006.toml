[basic]
description = "Netscape Enterprise Server 和 Netscape FastTrack Server 存在缓冲区溢出漏洞，远程攻击者可通过向服务器发送特制的 HTTP Basic Authentication 请求触发该漏洞，导致权限提升。攻击者无需身份认证即可利用该漏洞，成功利用后可获取服务器控制权限。该漏洞影响早期版本的 Netscape 企业级服务器产品，CVSS 评分 10.0，危害等级严重。"
published = "1999-12-01T05:00:00.000"
remediation = "建议立即迁移至现代 Web 服务器（如 Apache httpd 2.4.x、Nginx 1.24+ 或 IIS 10+），Netscape Enterprise/FastTrack Server 已于 2000 年代停止维护无补丁可用。若必须短期维持，请在防火墙层面禁止 HTTP Basic Authentication 端口访问，或配置 Web 应用防火墙拦截异常长 Authorization 头请求作为临时缓解。"
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "Netscape Enterprise Server FastTrack Server 缓冲区溢出权限提升漏洞"
updated = "2026-06-16T21:49:11.650"

