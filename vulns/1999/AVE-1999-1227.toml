[basic]
description = "Apple AppleShare Mail Server 5.0.3 及更早版本（运行于 MacOS 8.1 及之前系统）的邮件服务在处理 SMTP 协议命令时存在缓冲区溢出漏洞。该服务在解析客户端发送的 HELO 命令时未对输入长度做边界校验，当远程攻击者向目标服务器发送超长的 HELO 命令参数时，会超出程序分配的固定缓冲区，覆盖相邻内存并导致服务进程崩溃，引发拒绝服务（DoS）。攻击无需身份认证，仅需与服务器建立 TCP 连接并发送特制长命令即可触发。"
published = "1998-04-08T04:00:00.000"
remediation = "建议升级至 AppleShare IP Mail Server 5.0.4 或更高版本，或升级至 Mac OS 8.5 及以上版本。若无法升级，可在防火墙层面限制 SMTP 端口 (25) 仅允许受信 IP 访问，或暂时禁用 AppleShare Mail 服务作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
