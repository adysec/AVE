[basic]
description = "Pacific Software Carello 1.2.1 及更早版本的电子商务购物车系统存在命令执行漏洞。远程攻击者无需身份认证即可通过构造特制的 URL 向目标服务器发送恶意请求，利用该漏洞可获取额外权限并在服务器上执行任意系统命令。攻击条件简单，仅需目标系统运行受影响版本的 Carello 软件且可被网络访问，危害等级高，可能导致服务器完全被控、数据泄露或进一步横向移动。"
published = "2001-08-22T04:00:00.000"
remediation = "该漏洞影响 Pacific Software Carello E-Commerce 1.2.1 及更早版本，该产品已停止维护，无官方补丁。建议立即从 Web 服务器中删除或禁用 `/scripts/Carello/Carello.dll` 脚本，或通过 IIS 应用程序映射移除 .dll 的脚本映射。如业务必须保留，应在 Web 应用防火墙（WAF）层面添加规则，拦截包含 `CARELLOCODE=` 及 `VBEXE=` 参数的 URL 请求，并限制 `cmd.exe` 等系统命令的执行权限。"
score = 7.5
severity = "HIGH"
sources = ["exploitdb"]
title = "Pacific Software Carello E-Commerce 1.2.1 命令执行漏洞"
updated = "2026-06-16T21:54:38.190"

