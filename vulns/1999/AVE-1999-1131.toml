[basic]
description = "IBM Scalable POWERparallel (SP) 2.0 系统的 System Data Repository (SDR) 组件中的 sdrd 守护进程存在未授权文件读取漏洞。远程攻击者无需任何身份认证，通过向目标系统的 sdrd 服务发送特制请求即可读取服务器上的任意文件，导致敏感配置信息泄露。该漏洞影响 IBM SP2 2.0 版本，攻击条件简单，危害等级中等。"
published = "1999-12-31T05:00:00.000"
remediation = "立即安装 IBM 为 SP2 SDR sdrd 漏洞发布的官方补丁（参见 CIAC 公告 I-079A），升级 sdrd 守护进程至修复版本。如无法立即打补丁，在防火墙上限制对 sdrd 服务端口（默认 2215/TCP）的访问，仅允许受信任管理主机连接；若业务不需要 SDR 远程访问功能，可禁用 sdrd 服务或限制其仅监听本地回环地址。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "IBM Scalable POWERparallel (SP) 2.0 sdrd 远程文件读取漏洞"
updated = "2026-06-16T21:50:32.927"

