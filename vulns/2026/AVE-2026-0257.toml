[basic]
description = "pillow-heif 库的编码路径缓冲区验证中存在整数溢出漏洞。当攻击者提供特制的大尺寸 HEIF 图像时，`_pillow_heif.c` 中的 `_CtxWriteImage_add_plane()` 函数在缓冲区边界检查时发生整数溢出，导致堆越界读取。该漏洞可在默认配置下触发，无需特殊权限，可能导致服务器堆内存泄露至编码图像中（信息泄露）或进程崩溃（拒绝服务）。该漏洞影响 pillow-heif 1.3.0 之前的所有版本，CVSS 评分 5.5，危害等级中危。建议升级至 1.3.0 或更高版本修复。"
published = "2026-02-27T20:21:40.697"
remediation = "升级 pillow-heif 至 1.3.0 或更高版本，该版本修复了编码路径缓冲区验证中的整数溢出问题。如无法立即升级，应避免处理来自不可信来源的超大 HEIF 图片文件，并限制图片尺寸输入范围作为临时缓解措施。"
score = 5.5
severity = "MEDIUM"
sources = ["ghsa"]
title = "bigcat88 pillow-heif 编码路径缓冲区验证整数溢出漏洞"
updated = "2026-06-17T10:28:22.607"

