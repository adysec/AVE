[basic]
description = "泛微 E-Office 的 detail.php 文件存在 SQL 注入漏洞，未经身份认证的远程攻击者可通过向目标系统发送特制的 HTTP 请求，在参数中注入恶意 SQL 语句，从而绕过认证机制窃取数据库中的敏感信息（包括用户凭证、系统配置、业务数据等）。该漏洞攻击门槛低、影响范围广，对使用泛微 E-Office 的组织机构构成较大数据安全威胁。"
published = "08.08"
remediation = "立即从泛微官方安全补丁下载中心（https://www.weaver.com.cn/cs/securityDownload.asp）获取E-Office最新安全补丁包，或直接下载安全加固包（http://v10.e-office.cn/eoffice9update/safepack.zip）进行升级修复。该漏洞影响E-office v9.0 141103及以下版本，detail.php等多个接口均存在SQL注入风险。升级前请务必备份数据库和应用文件，按照补丁包内附带的操作手册执行升级。如暂时无法升级，应在WAF上对/detail.php等敏感接口的请求参数进行严格过滤，禁止包含union、select、insert、update、delete、drop等SQL关键字，并限制detail.php接口的访问来源为内网IP。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "泛微 eOffice detail.php SQL注入漏洞"
updated = "08.08"

