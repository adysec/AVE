[basic]
description = "Sun Java System Web Proxy Server（原名 Sun ONE Proxy Server）3.6 SP6 版本中存在缓冲区溢出漏洞。远程攻击者可通过向代理服务器发送特制的网络请求触发该漏洞，成功利用可在目标系统上以服务进程权限执行任意代码。该漏洞无需身份认证即可远程利用，攻击复杂度较低，影响运行该版本代理服务的所有服务器。由于官方已停止对该版本的支持，建议用户升级至受支持的最新版本。CVSS 评分 7.5，危害等级高。"
published = "2005-05-02T04:00:00.000"
remediation = "立即升级 Sun Java System Web Proxy Server 至 3.6 SP7 或更高版本，该版本已修复此缓冲区溢出漏洞。由于该产品已停止官方支持，建议迁移至现代代理服务器（如 Nginx、Apache Traffic Server 或 HAProxy）。如无法立即迁移，可在网络边界防火墙限制对代理服务器 8080 端口的访问，仅允许受信任源 IP 连接，并部署入侵检测规则拦截异常 HTTP 请求载荷。"
score = 7.5
severity = "HIGH"
sources = ["tenable"]
title = "Sun Java System Web Proxy Server 缓冲区溢出远程代码执行漏洞"
updated = "2026-06-16T22:12:41.757"

