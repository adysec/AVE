[basic]
description = "Omnicron OmniHTTPd 1.1 和 2.4 Pro 版本的 CGI 程序 imagemap.exe 存在缓冲区溢出漏洞，远程攻击者可通过向目标服务器发送特制的 HTTP 请求触发该漏洞，导致任意代码执行。该漏洞影响 OmniHTTPd 1.1 及 2.4 Pro 版本，CVSS 评分 10.0，危害等级严重。攻击者无需身份认证即可利用，可完全控制受影响服务器。"
published = "1999-10-22T04:00:00.000"
remediation = "该漏洞源于 OmniHTTPd 的 CGI 程序 imagemap.exe 存在缓冲区溢出，远程攻击者可发送特制请求执行任意命令。OmniHTTPd 已停止维护多年，官方不再提供安全更新。建议立即迁移至受支持的 Web 服务器（如 Apache HTTP Server 或 Nginx），并彻底移除或禁用 imagemap.exe 及所有遗留 CGI 脚本。临时缓解措施可在防火墙或反向代理层面限制对 CGI 目录的访问。"
score = 10
severity = "CRITICAL"
sources = ["exploitdb"]
title = "Omnicron OmniHTTPd CGI imagemap.exe 远程缓冲区溢出漏洞"
updated = "2026-06-16T21:49:23.620"

