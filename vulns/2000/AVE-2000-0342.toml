[basic]
description = "Cayman 3220-H DSL 路由器管理接口存在输入验证缺陷，远程攻击者无需身份认证即可通过向 HTTP 管理界面提交超长用户名或密码字段，触发缓冲区溢出导致设备服务崩溃或拒绝服务。该漏洞影响 Cayman 3220-H DSL Router 1.0 及 GatorSurf 5.3 版本，CVSS 评分 5.0，危害等级中危。厂商已停止支持该设备，建议用户升级至受支持的路由器产品。"
published = "2000-05-17T04:00:00.000"
remediation = "该设备已停产且厂商不再提供安全更新，无法通过官方补丁修复。建议对路由器管理界面实施 IP 访问控制列表（ACL），仅允许特定管理网段（如 192.168.1.0/24）访问端口 80/443；同时在边界防火墙阻断 WAN 侧对该端口的入站连接。最彻底的缓解措施是更换为仍受厂商安全支持的 DSL 路由器。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Cayman 3220-H DSL Router HTTP管理接口拒绝服务漏洞"
updated = "2026-06-16T21:51:40.330"

