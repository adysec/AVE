[basic]
description = "ProFTPD 1.3.3c 之前版本的 mod_site_misc 模块存在多个目录遍历漏洞，远程已认证攻击者可通过在 SITE MKDIR、SITE RMDIR、SITE SYMLINK 或 SITE UTIME 命令中注入目录遍历序列（如 ../），实现任意目录创建、删除、符号链接创建及文件时间戳篡改。漏洞源于模块未对用户输入的路径参数进行充分规范化校验，攻击者需拥有有效 FTP 账号并具备相应 SITE 命令权限，即可突破目录限制操作任意文件系统路径，导致文件系统完整性破坏、权限提升或拒绝服务。影响 ProFTPD 1.3.3c 之前所有版本，CVSS 评分 7.1（高危），CWE-22 路径遍历类型。"
published = "2010-11-09T21:00:04.413"
remediation = "建议立即将 ProFTPD 升级至 1.3.3c 或更高版本（从官方 http://www.proftpd.org/ 获取源码重新编译安装）以修复 mod_site_misc 模块目录遍历问题。如暂无法升级，可在 proftpd.conf 中通过 <IfModule mod_site_misc.c> 注释禁用 SITE MKDIR、RMDIR、SYMLINK、UTIME 等指令，或限制仅本地可信 IP 使用 mod_site_misc 功能作为临时缓解措施。"
score = 7.1
severity = "HIGH"
sources = ["nuclei"]
title = "ProFTPD mod_site_misc 模块目录遍历漏洞"
updated = "2026-06-16T23:23:43.130"

