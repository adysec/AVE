[basic]
description = 'BEA WebLogic 5.1.x 存在源代码泄露漏洞。远程攻击者无需身份认证，通过在 URL 中插入 "/ConsoleHelp/" 路径即可触发 FileServlet 错误解析机制，使服务器返回 JSP 等页面的原始源代码而非执行结果。攻击者可借此获取数据库连接凭证、业务逻辑及配置信息，为后续攻击提供跳板。该漏洞仅影响部署了 ConsoleHelp 功能的 WebLogic 5.1.x 版本。'
published = "2000-10-20T04:00:00.000"
remediation = "升级到 BEA WebLogic 5.1.0 Service Pack 2 或更高版本。如无法升级，编辑 weblogic.properties 文件，移除 weblogic.httpd.register.FileServlet 注册项，或在 weblogic.httpd.initArgs 中限制 FileServlet 仅服务于特定目录，同时禁用 /ConsoleHelp/ 路径的访问权限。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "BEA WebLogic 源代码泄露漏洞"
updated = "2026-06-16T21:52:15.503"

