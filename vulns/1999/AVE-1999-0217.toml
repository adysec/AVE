[basic]
description = "IBM AIX 4.2.1 系统中的 /usr/bin/portmir 命令存在本地缓冲区溢出漏洞，攻击者可通过向该命令传递特制超长参数触发栈溢出，覆盖返回地址以执行任意代码；同时该命令还存在不安全的临时文件创建问题，攻击者可利用符号链接竞争条件劫持临时文件实现提权。本地攻击者在拥有普通用户权限的条件下即可利用此漏洞获得 root 权限，影响 IBM AIX 4.2.1 及更早版本。"
published = "1997-10-29T05:00:00.000"
remediation = "立即升级至 IBM AIX 5.1 及以上受支持版本，该问题已在后续版本中得到修复。如无法升级，以 root 执行 chmod 0755 /usr/bin/portmir 去除 setuid 位，并移除其他用户执行权限：chown root:system /usr/bin/portmir；同时在 /etc/security/sysck.cfg 中移除 portmir 条目标记。临时缓解措施可将需要 portmir 功能的用户加入专用组，通过 sudo 授权最小权限使用。"
score = 7.2
severity = "HIGH"
sources = ["exploitdb"]
title = "IBM AIX 4.2.1 portmir 本地缓冲区溢出与不安全的临时文件创建漏洞"
updated = "2026-06-16T21:47:34.030"

