[basic]
description = "Joomla! 的 Projectfork 组件（com_projectfork）2.0.10 版本存在目录遍历漏洞，由于对 section 参数过滤不严，远程攻击者可通过向 index.php 传入包含 `../` 等目录遍历序列的特制请求，实现读取服务器上任意文件。该漏洞无需身份认证即可利用，可能导致敏感配置信息和数据库凭据泄露，危害较大。"
published = "2009-06-17T17:30:00.467"
remediation = '将 Joomla! 的 Projectfork (com_projectfork) 组件从 2.0.10 升级至官网发布的 2.0.11 或更高修复版本（可在 extensions.joomla.org 下载安装包后通过后台「扩展管理→安装」覆盖升级）；若暂不使用该项目协作功能，建议在后台组件管理中直接卸载 com_projectfork 或禁用该组件。临时缓解措施：在 Web 服务器（如 Apache）配置中对 index.php 的请求拦截包含「../」「..\」及 null 字节的 section 参数，或在 Joomla! 全局设置中限制 URL 参数并部署 WAF 规则过滤目录遍历序列，防止读取 /etc/passwd、配置文件等任意本地文件。'
score = 5
severity = "MEDIUM"
sources = ["nuclei"]
title = "Joomla! Projectfork 组件 2.0.10 本地文件包含漏洞"
updated = "2026-06-16T23:08:45.697"

