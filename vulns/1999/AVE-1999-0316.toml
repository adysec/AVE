[basic]
description = "Microsoft Excel 97 的病毒警告机制存在安全缺陷，远程攻击者可通过构造特制的 Excel 文件或利用特定方式触发该漏洞，绕过或禁用 Excel 内置的病毒警告功能，导致用户在不知情的情况下打开包含宏病毒的文件。该漏洞影响 Microsoft Excel 97 版本，攻击者无需身份认证即可利用，危害等级较低，CVSS 评分 2.6。"
published = "1999-05-07T04:00:00.000"
remediation = "升级到 Microsoft Office 2000 或更高版本，该漏洞已在后续版本中修复。如无法升级，建议在 Excel 97 中启用宏安全级别为「高」，并仅打开来自可信来源的 Excel 文件，同时安装 Microsoft 发布的 Office 97 SR-2 安全更新。此外，建议部署防病毒软件并配置为扫描所有 Office 文档附件。"
score = 2.6
severity = "LOW"
sources = ["avd"]
title = "Microsoft Excel 97 病毒警告机制绕过漏洞"
updated = "2026-06-16T21:48:54.573"

