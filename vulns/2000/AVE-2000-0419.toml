[basic]
description = "BEA WebLogic 5.1.0 默认配置存在源代码泄露漏洞，远程攻击者无需认证即可通过向目标服务器发送以 /file/ 开头的特制 URL 请求，触发默认 Servlet 直接返回文件源码而非执行。该漏洞可导致攻击者获取 Web 应用程序的敏感源代码，包括数据库连接配置、业务逻辑等关键信息，为后续攻击提供铺垫。影响 BEA WebLogic Express 3.1.8/4/5 及 WebLogic 5.1.0 版本。"
published = "2000-06-21T04:00:00.000"
remediation = "升级 BEA WebLogic 至 6.0 及以上版本，或修改 default servlet 配置，移除 /file/ 路径映射，禁止直接通过该路径访问文件源码。如无法升级，在 Web 服务器或防火墙层阻止对 /file/ 路径的外部访问请求。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "BEA Systems WebLogic 默认 servlet 源代码泄露漏洞"
updated = "2026-06-16T21:51:52.023"

