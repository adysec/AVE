[info]
author = "ave"
description = "验证 Internet Explorer 子框架欺骗漏洞，通过构造含恶意 JavaScript 的 HTML 页面，演示 IE 允许新窗口中合法站点的子框架被篡改为攻击者指定 URL 的行为"
id = "POC-AVE-1999-1202"
name = "Microsoft Internet Explorer Subframe Spoofing PoC"
severity = "low"
tags = ["ave-1999-1202"]
vuln_id = [
    "CVE-1999-0869",
    "AVE-1999-1202",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "window.open",
    "frames[2].location",
]
