[basic]
description = "Trend Micro PC-Cillin 6.0 内部代理端口未正确限制访问权限，远程攻击者可向目标系统上的内部代理端口发送恶意请求，导致代理服务崩溃或资源耗尽，造成拒绝服务。该漏洞影响 Trend Micro PC-Cillin 6.0 版本，攻击者无需身份认证即可远程利用，危害等级中等。"
published = "1999-12-29"
remediation = "升级 Trend Micro PC-Cillin 至 6.0 以上版本，该版本对内部代理端口实施了访问控制。如无法升级，在操作系统或网络防火墙层面配置规则，仅允许受信任 IP 访问 PC-Cillin 代理端口（默认 1080），阻止外部来源的代理连接请求。"
score = 5.0
severity = "MEDIUM"
sources = ["cve"]
title = "Trend Micro PC-Cillin 6.0 Proxy 拒绝服务漏洞"
updated = "2026-06-16"

