[basic]
description = "Solaris 2.6/7.0/8 系统中的 netpr 程序存在缓冲区溢出漏洞，本地攻击者可通过向 -p 选项传递超长参数触发该漏洞，导致任意代码执行。该漏洞影响 Solaris 2.6、7.0 和 8 版本，CVSS 评分 7.2，危害等级高。攻击者需拥有本地系统访问权限方可利用，成功利用后可获取目标系统的 root 权限。"
published = "2000-05-12T04:00:00.000"
remediation = "立即安装 Sun 官方补丁：Solaris 2.6 安装 107131-01，Solaris 7 安装 107132-01，Solaris 8 安装 108808-01。若无法打补丁，使用 chmod 700 /usr/bin/netpr 限制 netpr 仅 root 可执行，或通过 RBAC 移除普通用户的 netpr 访问权限作为临时缓解措施。"
score = 7.2
severity = "HIGH"
sources = ["cve"]
title = "Solaris netpr 本地缓冲区溢出漏洞"
updated = "2026-06-16T21:51:39.103"

