[basic]
description = "Solaris 2.3 至 2.6 版本中的 ping 命令存在输入验证缺陷，本地攻击者可通过 loopback 接口向组播地址发送特制 ping 请求（如执行 ping -i 命令），导致内核在处理异常路由数据包时触发系统 panic，造成拒绝服务。该漏洞影响 Solaris 2.3/2.4/2.5/2.5.1/2.6 等版本，CVSS 评分 2.1，危害等级低。利用该漏洞需要拥有本地 shell 访问权限，无法远程触发。"
published = "1997-06-26T04:00:00.000"
remediation = "升级到 Solaris 7 及以上版本，该漏洞已在后续版本修复。如无法升级，可在 /etc/rc2.d 启动脚本中添加 `ndd -set /dev/ip ip_respond_to_echo_broadcast 0` 限制 ICMP 多播响应，或使用 `route add -net 224.0.0.0 -interface lo0 -reject` 阻止环回接口的多播流量。"
score = 2.1
severity = "LOW"
sources = ["avd"]
title = "Sun Solaris ping 本地拒绝服务漏洞"
updated = "2026-06-16T21:50:24.550"

