[basic]
description = "Debian GNU/Linux 系统中 gnucash 所使用的 libguile.so 共享库文件被设置为全局可写权限，本地攻击者可利用该配置缺陷将恶意代码注入该共享库，当 gnucash 程序运行时自动加载被篡改的库文件，从而触发任意代码执行。该漏洞影响 Debian GNU/Linux 系统中安装 gnucash 的版本，CVSS 评分 7.5，危害等级高。建议用户立即修复 libguile.so 文件权限，防止本地提权攻击。"
published = "2000-02-05T05:00:00.000"
remediation = "立即修复 libguile.so 文件权限，执行 chmod 755 /usr/lib/libguile.so 移除全局可写权限。同时检查并修正 gnucash 软件包的文件权限配置，确保 umask 设置正确。如使用 Debian 系统，请升级至包含该修复的软件包版本（如 libguile-dev 1.3-12 或更新版本）。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "Debian GNU/Linux gnucash libguile.so 文件权限配置不当漏洞"
updated = "2026-06-16T21:51:05.630"

