[basic]
description = "Allaire JRun 2.3.x 中的 Servlet 示例存在信息泄露漏洞。远程攻击者无需身份认证，通过访问 SessionServlet 即可获取有效的 HttpSession ID。攻击者可利用泄露的 Session ID 劫持其他用户的会话，绕过认证机制获取未授权访问权限，进一步窃取或篡改敏感数据。该漏洞影响 JRun 2.3.x 系列版本。"
published = "2000-06-22T04:00:00.000"
remediation = "升级到 Allaire JRun 3.0 或更高版本，或在生产环境中删除 webapps 目录下的 Servlet 示例文件（特别是 SessionServlet），同时通过 Web 服务器（如 IIS/Apache）配置访问控制，限制对 /servlet/SessionServlet 路径的外部访问。"
score = 6.4
severity = "MEDIUM"
sources = ["cve"]
title = "Allaire JRun Servlet 示例信息泄露漏洞"
updated = "2026-06-16T21:51:57.270"

