[basic]
description = "Mobius DocumentDirect for the Internet 1.2 中的 ddicgi.exe 程序存在缓冲区溢出漏洞，远程攻击者可通过向目标系统发送超长 GET 请求触发该漏洞，导致任意命令执行。该漏洞影响 Mobius DocumentDirect for the Internet 1.2 版本，CVSS 评分 10.0，危害等级严重。攻击者无需身份认证即可利用，攻击复杂度低，可完全控制受影响系统。"
published = "2000-11-14T05:00:00.000"
remediation = "Mobius DocumentDirect for the Internet 1.2 已停止维护，厂商不再提供安全补丁。建议立即将 ddicgi.exe 程序从 Web 服务器中移除或重命名，并在 IIS/Web 服务器访问控制列表中禁止对 ddicgi.exe 的 GET 请求。同时迁移至受支持的文档管理解决方案，并在防火墙层面限制对该 Web 服务的公网访问。"
score = 10
severity = "CRITICAL"
sources = ["cve"]
title = "Mobius DocumentDirect for the Internet 缓冲区溢出远程代码执行漏洞"
updated = "2026-06-16T21:52:32.863"

