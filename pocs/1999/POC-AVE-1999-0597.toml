[info]
author = "ave"
description = "检测 SCO Unixware 7.1 系统中 /var/mail 目录的权限设置，验证是否存在本地用户可访问并读取/修改其他用户邮件的风险"
id = "POC-AVE-1999-0597"
name = "SCO Unixware 7.1 /var/mail 目录权限漏洞 PoC"
severity = "low"
tags = ["ave-1999-0597"]
vuln_id = [
    "CVE-1999-0825",
    "AVE-1999-0597",
]

[poc]
logic = "all"

[[poc.requests]]
path = "/var/mail"
protocol = "file"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["mail"]
