[basic]
description = "上海网仕科技 Transcoder MS 的 index.php 页面存在 SQL 注入漏洞，攻击者可通过向 login 接口的 name 参数注入恶意 SQL 语句，利用时间盲注技术（如 SLEEP 函数）获取数据库敏感信息。该漏洞无需身份认证即可远程利用，攻击者仅需构造特制的 POST 请求即可触发，可能导致用户数据泄露、数据库被篡改等严重后果。建议厂商尽快修复参数过滤机制。"
published = "0724"
remediation = "升级网仕 Transcoder MS 至最新版本，厂商已修复 login 接口参数化查询问题。如无法升级，在 WAF/IPS 侧配置规则拦截 `/webtrans/index.php` 路径下 `name` 和 `pass` 参数中的 SQL 关键字（如 SLEEP、AND、SELECT 等），并对该登录接口启用输入过滤与参数化校验作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "上海网仕科技 Transcoder MS SQL注入漏洞"
updated = "0724"

