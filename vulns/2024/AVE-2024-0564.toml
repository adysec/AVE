[basic]
description = "Linux 内核 DRM 子系统的 drm_mode_vrefresh() 函数在计算显示器刷新率时存在除零漏洞。该函数虽已检查 htotal 和 vtotal 是否为 0，但未充分处理 vtotal 与 htotal 乘积后仍可能出现的除零异常，导致内核崩溃。本地低权限攻击者可通过设置特定的显示模式参数触发此漏洞，造成拒绝服务。该漏洞影响所有使用受影响 Linux 内核版本的系统，CVSS 评分 5.5，危害等级中等。"
published = "2025-01-11T13:15:28.700"
remediation = "立即升级 Linux 内核至以下已修复版本：5.15.176、6.1.122、6.6.68、6.12.7 或 6.13 及以上。各发行版用户可通过包管理器更新：Ubuntu 运行 `apt update && apt upgrade linux-image` 并重启；Debian 参考 DLA-4041-1 公告更新内核。如无法立即升级，可通过 seccomp 或 AppArmor 限制本地用户加载自定义显示模式作为临时缓解。"
score = 5.5
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux kernel DRM modesetting 除零错误漏洞"
updated = "2026-06-17T08:12:07.457"

