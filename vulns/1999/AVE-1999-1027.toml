[basic]
description = "mSQL (Mini SQL) 2.0.6 存在信息泄露漏洞，远程攻击者可通过向目标服务发送特制的 ServerStats 查询，获取服务器敏感信息，包括当前登录用户列表、数据库名称及服务器版本号等。该漏洞攻击复杂度低，无需身份认证即可远程利用，可被攻击者用于信息搜集以辅助后续攻击，CVSS 评分 7.5，危害等级高。建议升级至最新版本或通过防火墙限制对 mSQL 服务的网络访问。"
published = "1999-02-15T05:00:00.000"
remediation = "升级至 mSQL 2.0.7 或更高版本（该版本已禁用远程统计查询 ServerStats）。如无法升级，在 msql.conf 中将远程访问选项 remote_access 设为 false（2.0.4.1 起默认关闭），并在防火墙层面限制对 mSQL 默认端口 1114 的访问，仅允许可信主机连接。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "Hughes Technologies mSQL 服务器信息泄露漏洞"
updated = "2026-06-16T21:50:03.557"

