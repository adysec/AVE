[basic]
description = "SmartCart 购物车应用程序存在安全设计缺陷，其订单表单中的商品价格、数量等敏感购买信息以隐藏表单字段（hidden form fields）形式传输。远程攻击者无需身份认证即可直接修改这些隐藏字段值，以任意价格提交订单，实现低价或零成本购买商品。该漏洞影响 SmartCart 多个版本，攻击条件简单，危害严重。"
published = "2000-02-01T05:00:00.000"
remediation = "将所有交易金额、商品价格等敏感数据从 HTML 隐藏字段移至服务器端会话（Session）管理，并在后端对订单金额、数量等参数进行严格的重新计算和校验，不信任任何客户端提交的价格数据。由于 SmartCart 已停止维护，建议迁移至仍受支持的现代购物车系统。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "SmartCart SmartCart 购物车应用敏感信息篡改漏洞"
updated = "2026-06-16T21:51:00.427"

