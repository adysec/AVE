[basic]
description = "Linux 内核的 ntb_hw_switchtec 驱动中存在移出边界漏洞，当调用 ntb_mw_clear_trans() API 时传入 addr 和 size 均为 0，导致 xlate_pos 计算为负数，从而在 BIT() 宏中触发负数位移操作，引发未定义行为。该漏洞源于 switchtec_ntb_mw_set_trans 函数未对 xlate_pos 进行有效性检查。本地攻击者可通过触发 NTB 内存窗口清除操作利用此漏洞，可能导致系统崩溃或信息泄露。CVSS 评分 7.1，危害等级高。"
published = "2025-04-16T15:15:52.717"
remediation = '立即将 Linux 内核升级到以下已包含补丁的稳定版本：5.4.292、5.10.236、5.15.180、6.1.134、6.6.87、6.12.23、6.13.11、6.14.2 及以上对应分支的最新版本。补丁 commit 为 de203da734fa（主线）及各稳定分支对应的 backport 提交。对于无法立即升级的系统，可通过模块黑名单临时禁用 switchtec 驱动（echo "blacklist switchtec" > /etc/modprobe.d/blacklist-switchtec.conf），但此措施将禁用 NTB 功能，仅作为临时缓解。'
score = 7.1
severity = "HIGH"
sources = ["msrc"]
title = "Linux kernel ntb_hw_switchtec 驱动越界移位漏洞"
updated = "2026-06-17T06:44:09.990"

