[basic]
description = "FaSTream FTP++ Server 2.0 存在目录遍历漏洞，远程攻击者无需身份认证即可利用 FTP 协议的 ls 命令，在请求路径中包含盘符名称（如 C:）来列出目标系统上的任意目录内容。该漏洞源于服务器对用户输入路径的过滤不严，未限制目录跳转字符，导致攻击者可越权访问文件系统。影响 FaSTream FTP++ Server 2.0 版本，CVSS 评分 5.0，危害等级中危。"
published = "2001-06-02"
remediation = "升级 FaSTream FTP++ Server 至最新版本（如有）；由于该产品已停止维护，建议迁移至其他活跃维护的 FTP 服务器（如 FileZilla Server、vsftpd）。临时缓解措施：在 FTP 服务器配置中限制 ls 命令的路径参数，禁止包含盘符或目录跳转字符的路径请求。"
score = 5.0
severity = "MEDIUM"
sources = [
    "cve",
    "exploitdb",
]
title = "FaSTream FTP++ Server 2.0 目录遍历漏洞"
