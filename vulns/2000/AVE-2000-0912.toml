[basic]
description = "cyrus-sasl 1.5.24 之前版本在 Red Hat Linux 7.0 中存在授权验证缺陷，本地用户可通过绕过指定的访问限制机制，获取非授权访问权限。该漏洞源于 sasl 库对用户授权检查不充分，攻击者只需拥有本地系统访问权限即可利用，无需特殊条件。成功利用后可能导致信息泄露、权限提升或数据篡改，CVSS 评分 4.6，危害等级中危。"
published = "2000-12-19T05:00:00.000"
remediation = "升级 cyrus-sasl 至 1.5.24 或更高版本。对于 Red Hat Linux 7.0 系统，可通过 Red Hat 官方渠道获取更新包并执行 rpm -Uvh cyrus-sasl-1.5.24.rpm 完成升级。如无法立即升级，可通过限制本地用户对 SASL 认证服务的访问权限作为临时缓解措施。"
score = 4.6
severity = "MEDIUM"
sources = ["redhat"]
title = "Red Hat Linux cyrus-sasl 安全绕过漏洞"
updated = "2026-06-16T21:52:51.077"

