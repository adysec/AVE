[basic]
description = "Red Hat Linux 4.0 系统中 cmu-snmp 软件包 3.3-1 版本之前的 snmpd 服务器存在配置错误漏洞。由于默认 SNMP 社区字符串未正确设置访问控制权限，导致远程攻击者无需认证即可通过 SNMP 协议读取和修改目标系统的敏感配置信息，如网络配置、用户账户数据等。该漏洞影响系统机密性和完整性，攻击者可通过简单 SNMP 请求即可利用，无需特殊权限。官方建议升级 cmu-snmp 至 3.3-1 或更新版本并配置访问控制列表进行修复。"
published = "1999-12-31T05:00:00.000"
remediation = "升级 cmu-snmp 软件包至 3.3-1 或更高版本，可通过 Red Hat 官方渠道获取更新。同时修改 /etc/snmp/snmpd.conf 配置文件，将默认 public/private 团体字串改为复杂随机字符串，并限制 snmpd 仅监听内网接口，在 iptables 防火墙中限制 UDP 161 端口的来源 IP 范围。建议将 SNMP 配置为只读模式，禁用 write 权限。"
score = 6.4
severity = "MEDIUM"
sources = ["avd"]
title = "Red Hat Linux cmu-snmp snmpd 配置错误漏洞"
updated = "2026-06-16T21:50:13.290"

