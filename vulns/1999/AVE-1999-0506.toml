[basic]
description = "Microsoft IIS 3.0 及 4.0 版本在处理双字节代码页（中文、韩文、日文）时存在配置缺陷，当服务器默认语言设置为上述语言时，远程攻击者可通过特制 HTTP 请求绕过文件解析机制，直接查看 ASP 等脚本文件的源代码，导致敏感信息泄露。该漏洞影响 IIS 3.0/4.0 版本，攻击者无需身份认证即可利用，CVSS 评分 7.1，危害等级高。"
published = "1999-08-19"
remediation = "安装 Microsoft 安全公告 MS99-022 提供的对应语言版本补丁。IIS 3.0 用户安装 IIS 3.0 补丁，IIS 4.0 用户安装重新发布的 IIS 4.0 补丁（修复了回归错误）。补丁须与 IIS 语言版本匹配而非服务器默认语言。如无法安装补丁，建议升级至 IIS 5.0 或更高版本。"
score = 7.1
severity = "HIGH"
sources = ["cve"]
title = "Microsoft IIS 3.0/4.0 双字节代码页信息泄露漏洞"
updated = "2026-06-16"

