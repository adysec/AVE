[basic]
description = "Stalker CommuniGate Pro 3.3.2 的 POP3 服务守护进程在处理用户认证请求时存在信息泄露漏洞。当远程攻击者尝试登录时，该服务对无效用户名和无效密码返回不同的错误消息，导致攻击者可通过暴力枚举方式逐个探测有效邮箱地址。该漏洞可利用标准 POP3 客户端协议直接触发，无需任何认证权限，为后续针对特定用户的钓鱼或 SPAM 攻击提供目标信息。CVSS 评分 5.0，危害等级中危。"
published = "2000-12-11T05:00:00.000"
remediation = "建议立即升级至 PragmaSys TelnetServer 2000 最新补丁版本或更高版本。如厂商已停止支持，应停止使用该服务并迁移至活跃维护的替代方案（如 OpenSSH）。临时缓解措施可在防火墙或主机层面禁用 Telnet 及 rexec 服务端口（23/TCP），限制可访问 IP 范围。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "PragmaSys TelnetServer 2000 rexec 缓冲区溢出漏洞"
updated = "2026-06-16T21:52:56.930"

