[basic]
description = "Nosque MsgCore 1.9（原名 Super Mail Transfer Package，SMTP）存在内存泄漏漏洞。远程攻击者无需认证，只需在同一会话中重复发送 HELO、MAIL FROM、RCPT TO 和 DATA 等 SMTP 命令，即可导致服务器内存资源被逐渐耗尽，最终造成拒绝服务（DoS）。该漏洞利用方式简单，无需特殊权限或复杂工具，攻击者仅需通过 Telnet 或 netcat 等基本网络工具即可发起攻击，影响 MsgCore 1.9 版本。"
published = "2000-01-13T05:00:00.000"
remediation = "建议升级到 MsgCore 2.0 或更高版本，该版本已修复内存泄漏问题。如无法升级，可在 SMTP 服务端配置中限制同一会话的 HELO/MAIL/RCPT 命令重复次数，或通过防火墙限制对 25 端口的访问来源 IP。作为临时缓解措施，可配置监控脚本定期重启 SMTP 服务进程以释放泄漏的内存。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Nosque MsgCore 1.9 内存泄漏拒绝服务漏洞"
updated = "2026-06-16T21:50:56.910"

