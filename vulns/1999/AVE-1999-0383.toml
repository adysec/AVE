[basic]
description = "Windows NT FTP 服务器（WFTP）在启用来宾账户且未设置密码时存在认证绕过漏洞。远程攻击者无需有效凭证，即可使用任意用户名和密码成功登录 FTP 服务器，从而获取服务器文件访问权限。该漏洞影响 Windows NT 系统，攻击者只需网络可达目标主机即可利用，CVSS 评分 10.0，危害等级严重。"
published = "1999-01-01T05:00:00.000"
remediation = "禁用 FTP 服务中的 Guest 账户匿名访问权限，或为 Guest 账户设置强密码；同时建议升级至 Windows NT 4.0 Service Pack 4 及以上版本，或在条件允许时迁移至受支持的新版 Windows Server 并强制启用账户密码认证。"
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "Microsoft Windows NT FTP 服务器认证绕过漏洞"
updated = "2026-06-16T21:47:53.867"

