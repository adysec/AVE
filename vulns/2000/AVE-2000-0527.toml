[basic]
description = "Infopulse GateKeeper 3.5 及更早版本存在远程缓冲区溢出漏洞，远程攻击者可通过向目标服务发送超长字符串触发该漏洞，导致攻击者能够在目标系统上以 GateKeeper 服务进程权限执行任意命令。该漏洞影响 Infopulse GateKeeper 3.5 及所有之前版本，CVSS 评分 7.5，危害等级高。"
published = "2000-07-13T04:00:00.000"
remediation = "立即停止使用 Infopulse GateKeeper 3.5 及更早版本，该产品已停止维护且厂商不再提供安全更新。建议迁移至其他受支持的远程访问网关产品。如无法立即替换，应在防火墙层面限制对 GateKeeper 服务端口（默认 TCP 23）的访问，仅允许受信任 IP 连接，并部署入侵检测规则拦截超长字符串请求以缓解缓冲区溢出风险。"
score = 7.5
severity = "HIGH"
sources = ["exploitdb"]
title = "Infopulse GateKeeper 远程缓冲区溢出漏洞"
updated = "2026-06-16T21:52:14.593"

