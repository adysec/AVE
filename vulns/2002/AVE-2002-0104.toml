[basic]
description = "Cyrus IMAP 服务器 1.4 至 2.1.10 版本的 imapparse.c 文件中存在整数溢出漏洞。远程攻击者无需身份认证即可向目标服务器发送特制的包含超长长度值的 IMAP 协议数据包，触发整数溢出进而导致堆缓冲区溢出，最终可在 Cyrus IMAPD 进程上下文中执行任意代码。该漏洞影响 Cyrus IMAPD 1.4、1.5.19、2.0.12、2.0.16、2.1.9 及 2.1.10 等多个版本，CVSS 评分 7.5，危害等级高。攻击者可在未登录前（Pre-Login）即触发该漏洞，利用门槛较低。"
published = "2004-06-14T04:00:00.000"
remediation = "升级 Cyrus IMAP 服务器至 2.1.11 或更高版本（该漏洞在 2.1.11 中修复），或升级至 2.2.x 系列。对于无法升级的旧系统，可在 imapd.conf 中设置 `loginrawdisabled: 1` 禁用未认证阶段的 raw 命令处理，并在网络层面限制对 IMAP 端口（143/tcp、993/tcp）的访问来源，仅允许可信 IP 连接。"
score = 7.5
severity = "HIGH"
sources = ["osv"]
title = "Cyrus IMAP 服务器预登录堆损坏远程代码执行漏洞"
updated = "2026-06-16T21:59:35.490"

