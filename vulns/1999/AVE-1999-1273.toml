[basic]
description = "Ray Chan WWW Authorization Gateway 0.1 是一款 CGI 程序，其 user 参数存在命令注入漏洞。远程攻击者可通过向该参数传递 shell 元字符（如分号、管道符等）来执行任意系统命令，从而完全控制目标服务器。该漏洞无需身份认证即可利用，攻击门槛低，危害严重。受影响的版本为 WWW Authorization Gateway 0.1，建议用户立即升级或停止使用该组件。"
published = "1998-07-08T04:00:00.000"
remediation = "立即从 Web 服务器 cgi-bin 目录删除或禁用 www_authorization_gateway.cgi 脚本，改用支持现代认证机制的替代方案（如 Apache mod_auth_openidc 或 OAuth 2.0），该程序已停止维护无法通过升级修复。如暂时无法移除，必须在代码中对 user 参数传入 system() 或 exec() 前过滤 shell 元字符（; | & ` $ ( ) { } 等），并对所有 CGI 输入启用 Perl taint 模式以防止命令注入。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "Ray Chan WWW Authorization Gateway 远程命令执行漏洞"
updated = "2026-06-16T21:50:26.230"

