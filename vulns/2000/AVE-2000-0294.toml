[basic]
description = "id Software 出品的 Quake3 Arena 游戏存在目录遍历漏洞。恶意服务器运营者可向连接至服务器的客户端发送特制的包含 `../` 路径序列的数据包，绕过文件路径限制，实现对客户端文件系统中任意文件的读取或写入操作。攻击者无需认证，仅需诱使玩家连接至恶意服务器即可触发该漏洞。"
published = "2000-05-03T04:00:00.000"
remediation = "升级 Quake III Arena 至 1.16 或更高版本，该版本修复了目录遍历漏洞。如无法升级，仅在客户端设置中禁用自动下载（set cl_allowDownload 0），并只连接可信任服务器作为临时缓解措施。"
score = 6.4
severity = "MEDIUM"
sources = ["avd"]
title = "id软件 Quake3Arena 目录遍历漏洞"
updated = "2026-06-16T21:51:26.143"

