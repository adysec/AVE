[basic]
description = "Solaris 2.5.1 的 automountd 守护进程在处理用户请求时未能正确过滤 shell 元字符，本地或远程攻击者可通过向 automountd 发送特制的包含 shell 元字符的请求触发该漏洞，从而以 root 权限执行任意命令。该漏洞影响 Solaris 2.5.1 及更早版本，CVSS 评分为 10.0，危害等级严重。攻击者无需身份认证即可利用此漏洞实现权限提升。"
published = "1997-11-26T05:00:00.000"
remediation = "立即安装 Sun 补丁 104654 或 104655（针对 Solaris 2.5.1/SunOS 5.5.1），或升级至 Solaris 2.6 及以上版本。若无法立即打补丁，可在 /etc/init.d/autofs 中禁用 automountd 服务（`/etc/init.d/autofs stop`），并在防火墙或 hosts.deny 中限制对 RPC 端口 111/2049 的访问作为临时缓解措施。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "Sun Solaris automountd 本地权限提升漏洞"
updated = "2026-06-16T21:47:55.103"

