[basic]
description = 'Apple PowerBook 笔记本电脑的"密码安全"控制面板存在安全绕过漏洞。具有物理访问权限的攻击者可通过使用紧急启动盘引导系统，绕过正常操作系统安全机制，利用磁盘编辑工具修改正常情况下不可访问的 aaaaaaaAPWD 文件中的密码开关或密码内容，从而完全绕过设备密码保护。该漏洞影响 Apple Mac OS 8.5 及 8.6 版本，CVSS v2 评分 4.6，攻击者需物理接触目标设备，但无需任何认证即可获取系统的完全访问权限，导致机密性、完整性和可用性均受部分影响。'
published = "1999-05-21"
remediation = "在 Mac OS 8.5/8.6 上启用 Open Firmware 密码保护，防止从外部启动磁盘引导系统；将启动顺序设置为仅内置硬盘，并设置固件密码阻止未授权修改。同时加强物理安全措施，使用防盗锁固定设备，防止攻击者获得物理访问权限。升级到 Mac OS 9 或更高版本可从根本上消除此漏洞。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Apple Mac OS PowerBook 密码安全绕过漏洞"
updated = "1999-05-21"

