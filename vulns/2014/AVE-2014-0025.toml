[basic]
description = "WordPress 的 Swipe Checkout for WooCommerce 插件 2.7.1 及更早版本中的 test-plugin.php 文件存在反射型跨站脚本漏洞。攻击者可通过向 api_url 参数注入恶意 Web 脚本或 HTML 代码，诱使用户点击特制链接后，在受害者浏览器中执行任意 JavaScript 代码，导致敏感信息泄露或会话劫持。攻击无需身份认证，但需要用户交互。该漏洞影响范围较广，CVSS 评分 6.1，危害等级中危。"
published = "2019-12-27T19:15:12.193"
remediation = "立即停用并从 WordPress 后台删除 Swipe Checkout for WooCommerce 插件（版本 2.7.1 及更早），该插件已不再维护且无安全更新可用。如业务依赖其功能，建议迁移至仍在维护的替代插件（如 FunnelKit Cart for WooCommerce 或 WooCommerce 原生结账流程）。作为临时缓解措施，可在 Web 应用防火墙（WAF）层面添加规则，对 api_url 参数中的 `<script>`、`onerror`、`onload` 等 XSS 载荷进行过滤拦截。"
score = 6.1
severity = "MEDIUM"
sources = ["nuclei"]
title = "WordPress Swipe Checkout for WooCommerce 跨站脚本漏洞"
updated = "2026-06-17T00:10:14.280"

