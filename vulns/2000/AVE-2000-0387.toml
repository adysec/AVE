[basic]
description = "Internet Explorer 4.x 和 5.x 系列在 DocumentComplete() 事件处理中存在跨框架访问验证漏洞。浏览器未能正确验证 iframe 所属域名，攻击者可构造恶意的跨域 iframe 通过文档完成事件读取目标用户的本地文件。该漏洞影响 Windows 系统上 IE 4.0/5.0/5.5 等版本，CVSS 评分 5.1，危害程度中危，攻击条件为网络、无身份验证。攻击者可通过嵌入恶意 iframe 诱骗受害者访问受控页面，从而非法读取浏览器缓存、Cookies 或本地文件等敏感信息，威胁用户隐私安全和数据完整性。"
published = "2000-05-17T04:00:00.000"
remediation = "安装 Microsoft 安全公告 MS00-033 发布的补丁程序，受影响版本为 Internet Explorer 4.0、4.01、5.0 及 5.01，需先升级至 IE 4.01 Service Pack 2 或 IE 5.01 再安装补丁。也可升级至 Internet Explorer 5.5 或 5.01 Service Pack 1，这两个版本不受此漏洞影响。补丁已并入后续公告 MS00-055，可通过 Microsoft Update 或下载中心获取 KB 262509 补丁包进行修复。如无法立即打补丁，临时措施为禁用 Active Scripting 或避免浏览不受信任的网站，降低恶意页面通过跨框架读取本地文件的风险。"
score = 5.1
severity = "MEDIUM"
sources = ["avd"]
title = "微软 互联网浏览器 跨框架访问漏洞"
updated = "2026-06-16T21:51:47.567"

