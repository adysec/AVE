[basic]
description = ".NET HTTP客户端存在 HTTP/2 协议处理缺陷，攻击者可通过发送特制 HTTP/2 数据流触发无限制资源分配（CWE-770），导致进程内存耗尽引发拒绝服务。该漏洞影响 .NET 8.0（≤8.0.28）、.NET 9.0（≤9.0.17）、.NET 10.0（≤10.0.9）全平台全架构版本，CVSS 3.1 评分 7.5（HIGH，AV:N/AC:L/PR:N/UI:N/S:U/C:N/I:N/A:H）。攻击者无需身份认证、无需用户交互，仅需通过网络发送恶意 HTTP/2 请求即可远程触发内存耗尽，导致 .NET 应用崩溃拒绝服务。自包含部署应用需重新编译部署修复版本（.NET 8.0.29/9.0.18/10.0.10）方能修复。Microsoft 已于 2026 年 7 月发布安全公告并提供修复版本。"
published = "2026-07-14T20:17:38.387"
remediation = "建议立即升级 .NET 运行时到修复版本：.NET 8.0 升级至 8.0.29，.NET 9.0 升级至 9.0.18，.NET 10.0 升级至 10.0.10。通过 `dotnet --info` 检查当前版本，使用 `dotnet workload update` 或下载安装程序更新 SDK/运行时，引用 NuGet 包的项目更新 Microsoft.NetCore.App.Runtime.* 包至对应修复版本并重新编译部署自包含应用。临时缓解可在 Kestrel/ASP.NET Core 中设置 `Limits.MaxConcurrentConnections` 限制并发连接数，或在反向代理层限制 HTTP/2 并发流数。更新后需重启所有 .NET 应用使补丁生效。"
score = 7.5
severity = "HIGH"
sources = ["ghsa"]
title = "微软 .NET HTTP/2 拒绝服务漏洞"
updated = "2026-07-22T21:17:42.163"

