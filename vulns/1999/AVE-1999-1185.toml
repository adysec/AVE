[basic]
description = "gFTP 是一款开源的 FTP 客户端软件。在 1.13 及 2.0.0 之前的其他版本中，程序会将用户登录 FTP 服务器时输入的明文密码直接记录在（1）软件界面的日志窗口中，或（2）写入本地日志文件内，而未做任何加密或掩码处理。该漏洞影响范围涵盖上述存在缺陷的 gFTP 版本用户，主要威胁来自本地场景：攻击者只需在受害用户使用 gFTP 后，直接查看其屏幕上的日志窗口输出，或读取存储在本地磁盘的日志文件，即可获取明文 FTP 凭据。利用方式简单且无技术门槛，无需远程网络访问，属于本地信息泄露类问题，可导致账户凭据被窃取并进一步被用于未授权访问 FTP 服务器。"
published = "1999-09-05T04:00:00.000"
remediation = '升级 gFTP 至 2.0.0 或更高版本，该版本已修复将 FTP 密码以明文记录在日志窗口和日志文件中的问题。若无法立即升级，可在 gFTP 设置中关闭"保存日志文件"选项并清除已有的 ~/.gftp/gftp.log 等日志文件中的明文密码，避免敏感凭据泄露。'
score = 4.6
severity = "MEDIUM"
sources = ["cve"]
title = "gFTP FTP客户端明文密码记录漏洞"
updated = "2026-06-16T21:50:43.360"

