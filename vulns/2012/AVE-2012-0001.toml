[basic]
description = "Apache Struts2 的 CookieInterceptor 组件在处理 HTTP Cookie 头时未对参数名称进行白名单校验，远程攻击者可通过向目标服务器发送特制的 Cookie 数据触发 Java 静态方法调用，从而实现任意代码执行。该漏洞影响 Apache Struts2 2.3.1.1 之前版本，CVSS 评分 6.8，危害等级中等。"
published = "2012-01-08"
remediation = '''升级至 Apache Struts 2.3.1.1 及以上版本，该版本修复了 CookieInterceptor 未对参数名进行白名单过滤的问题。同时建议升级至 Struts 2.3.18 以获取针对 S2-008 所有漏洞的完整修复。若无法升级，在 struts.xml 中为 CookieInterceptor 和 ParameterInterceptor 配置更严格的 acceptedParamNames 白名单过滤规则：[a-zA-Z0-9\.][()_']+，并关闭 DebuggingInterceptor（devMode=false）以防止 OGNL 表达式注入。'''
score = 6.8
severity = "MEDIUM"
sources = [
    "cve",
    "nvd",
    "nuclei",
]
title = "Apache Struts2 CookieInterceptor 远程代码执行漏洞"
updated = "2026-06-16"

