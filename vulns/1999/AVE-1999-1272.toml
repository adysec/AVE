[basic]
description = "Slackware Linux 3.2 至 3.5 版本的 login 程序在 /etc/group 文件缺失时未正确检测错误状态，导致程序无法正常降低特权级别。任何具有本地访问权限的攻击者登录服务器后，系统会错误地将 root 权限授予该用户，从而完全控制目标主机。该漏洞利用条件为 /etc/group 文件不存在或已被删除，攻击者需拥有本地账户，CVSS 评分 7.2，危害等级高。"
published = "1998-07-13T04:00:00.000"
remediation = "升级至 Slackware Linux 3.6 及以上版本，该版本已修复 login 程序在 /etc/group 缺失时的权限检查逻辑。如无法升级，确保 /etc/group 文件存在且属主为 root:root，权限设置为 644，并手动检查 login 二进制是否为最新补丁版本。"
score = 7.2
severity = "HIGH"
sources = ["epss"]
title = "Slackware Linux /etc/group 缺失导致本地权限提升漏洞"
updated = "2026-06-16T21:50:25.980"

