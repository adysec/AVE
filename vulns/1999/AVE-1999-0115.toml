[basic]
description = "Qbik WinGate 3.0、Pro 4.0.1 及 Standard 4.0.1 版本的 Winsock 重定向服务存在缓冲区溢出漏洞。远程攻击者无需身份认证即可向目标系统发送特制数据包触发该漏洞，导致 Winsock 重定向服务崩溃，造成拒绝服务。该漏洞影响 WinGate 上述版本，CVSS 评分 5.0，危害等级中等。建议用户升级至更高版本以修复此漏洞。"
published = "1999-02-22T05:00:00.000"
remediation = "升级 Qbik WinGate 至 5.0 及以上版本，该漏洞在后续版本中已修复。如无法升级，可在防火墙规则中限制对 Winsock Redirector 服务端口（默认 809）的访问，仅允许可信 IP 连接，以降低远程攻击面。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Qbik WinGate 缓冲区溢出拒绝服务漏洞"
updated = "2026-06-16T21:48:24.220"

