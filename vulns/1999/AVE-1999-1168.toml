[basic]
description = "Microsoft Windows NT 4.0 的远程访问连接管理器（RASMAN，RASMAN.EXE）服务的安全描述符 DACL 中包含不当的访问控制项（ACE），导致非特权用户可通过服务控制管理器（SCM）向该服务发起请求，包括修改服务可执行文件的路径与名称。攻击者可借此将 RASMAN 服务的 ImagePath 重定向至攻击者控制的恶意程序，当服务或系统重启时以 SYSTEM 权限执行任意代码，从而实现本地权限提升。攻击者需在目标机器上拥有有效的用户名和密码；若目标允许网络登录，则该漏洞可被远程利用，且恶意代码在特定条件下可位于远程主机。受影响版本包括 Windows NT 4.0 Workstation、Server、Enterprise Edition 及 Terminal Server Edition。CVSS 评分 9.0，属严重权限提升漏洞。"
published = "1999-09-17T04:00:00.000"
remediation = "参照 Microsoft 安全公告 MS99-041 及知识库文章 Q242294，运行 Microsoft 提供的修复工具将 RASMAN 服务安全描述符的 DACL 重置为正确权限值，移除允许非特权用户修改服务配置的不当 ACE；建议在所有允许非特权用户进行交互式或网络登录的 Windows NT 4.0 主机上执行该工具（即使已安装 SP6 也需运行），并限制网络登录权限以缩小攻击面。"
score = 9
severity = "CRITICAL"
sources = ["exploitdb"]
title = "Microsoft Windows NT 4.0 RASMAN 服务安全描述符本地权限提升漏洞"
updated = "2026-06-16T21:49:15.700"

