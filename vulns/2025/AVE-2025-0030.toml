[basic]
description = "Notepad++ 是一款免费开源的源代码编辑器，其 8.8.1 及之前版本的安装程序存在不安全的可执行文件搜索路径漏洞（CWE-272）。攻击者可通过社会工程学或点击劫持等方式诱骗用户将官方安装程序与恶意可执行文件下载至同一目录（如下载文件夹）。当用户运行安装程序时，恶意文件将以 SYSTEM 权限自动执行，导致权限提升。该漏洞影响 Notepad++ 8.8.1 及更早版本，CVSS 评分 7.3，危害等级高。开发者已在 8.8.2 版本中修复此漏洞。"
published = "2025-06-23T19:15:23.727"
remediation = "立即升级 Notepad++ 至 8.8.2 及以上版本，该版本已修复安装程序因不安全的可执行文件搜索路径导致的权限提升漏洞。临时缓解措施：将安装程序下载到除 Downloads 文件夹之外的其他目录（如桌面）后再运行，且确保下载目录中无恶意可执行文件；此外可通过组策略限制标准用户从 Downloads 目录执行安装程序。"
score = 7.3
severity = "HIGH"
sources = ["hwpoc"]
title = "Notepad++ Notepad++ 安装程序权限提升漏洞"
updated = "2026-06-17T09:30:49.357"

