[basic]
description = "Microsoft Virtual Machine（Microsoft VM）存在 Java 沙箱逃逸漏洞，远程攻击者可通过构造包含非法类型转换操作（Illegal Cast Operation）的恶意 Java Applet，诱使用户访问后触发该漏洞，从而突破 Java 安全沙箱限制并在目标系统上执行任意命令。该漏洞影响 Microsoft VM 多个版本，CVSS 评分 7.6，危害等级高危。"
published = "1999-10-21T04:00:00.000"
remediation = 'Microsoft Java Virtual Machine（Microsoft VM）已于 2007 年停止支持，建议立即卸载 Microsoft VM 并迁移至受支持的 Java 运行时环境（如 Oracle Java 或 OpenJDK）。在 Internet Explorer 中禁用 Java 小程序执行：工具 → Internet 选项 → 安全 → 自定义级别 → 禁用"Java 小程序脚本"。如无法立即卸载，将 Microsoft VM 升级至 Build 2442（2000 系列）或 Build 3188（3000 系列）以上版本。'
score = 7.6
severity = "HIGH"
sources = ["cve"]
title = "Microsoft Virtual Machine 远程代码执行漏洞"
updated = "2026-06-16T21:51:29.123"

