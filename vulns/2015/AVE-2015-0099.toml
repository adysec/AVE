[basic]
description = 'Cisco Prime Data Center Network Manager (DCNM) 7.1(1) 之前版本的 fmserver servlet 存在目录遍历漏洞 (CWE-22)。由于 servlet 未对用户提交的路径名参数进行充分验证和过滤，未经身份认证的远程攻击者可通过发送包含目录遍历序列 (如 "../") 的精心构造路径名参数，突破 Web 应用根目录限制，读取服务器文件系统上的任意敏感文件 (如配置文件、密钥、日志等)。该漏洞影响 Cisco Prime DCNM 7.1(1) 之前的所有版本，CVSS 3.1 评分 7.5 (HIGH)，攻击向量为网络 (AV:N)、攻击复杂度低 (AC:L)、无需权限 (PR:N)、无需用户交互 (UI:N)、不改变权限范围 (S:U)、机密性影响高 (C:H)、完整性和可用性无影响 (I:N/A:N)。攻击者只需网络可达目标 DCNM 服务器的 fmserver servlet 端点，即可发起攻击读取敏感文件。Cisco 已在 7.1(1) 版本中修复此漏洞 (Bug ID CSCus00241)，建议升级至修复版本。CISA 已将此漏洞列入已知被利用漏洞目录 (KEV)。'
published = "2015-04-03T10:59:04.290"
remediation = "立即升级Cisco Prime Data Center Network Manager到7.1(1)或更高版本，获取官方补丁修复目录遍历漏洞。同时关闭DCNM管理器的fmserver servlet服务或限制其访问权限作为紧急缓解措施，并加强系统安全配置，包括应用层路径验证和访问控制。"
score = 7.5
severity = "HIGH"
sources = ["kev"]
title = "Cisco Prime Data Center Network Manager 目录遍历文件读取漏洞"
updated = "2026-06-17T00:20:42.127"

