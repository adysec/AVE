[basic]
description = "AnalogX Proxy 4.04 及更早版本的 FTP 代理功能中存在缓冲区溢出漏洞。远程攻击者无需认证即可通过向目标服务器的 FTP 端口发送超长 USER 命令，触发缓冲区溢出，导致代理服务崩溃并造成拒绝服务。该漏洞影响 AnalogX Proxy 4.04 及之前版本，利用方式简单，危害中等。"
published = "2000-07-25T04:00:00.000"
remediation = "升级 AnalogX Proxy 到 4.05 或更高版本（如仍有支持）。如产品已停止维护，建议禁用 FTP 代理功能或迁移至其他持续维护的代理服务器软件（如 Squid），以消除该缓冲区溢出风险。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "AnalogX Proxy 缓冲区溢出拒绝服务漏洞"
updated = "2026-06-16T21:52:12.183"

