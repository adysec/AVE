[basic]
description = "SCO OpenServer 5.0.2及更早版本与SCO Internet FastStart 1.0的内核错误处理例程中存在权限许可和访问控制漏洞。本地用户可通过向系统发送特制请求触发内核错误处理缺陷，绕过安全检查并获取root权限。该漏洞影响范围广，攻击条件为拥有本地访问权限，危害等级高。"
published = "1996-06-07"
remediation = "安装SCO安全公告SB.96:01a提供的内核补丁修复错误处理例程中的权限缺陷。对于无法安装补丁的系统，限制非信任用户的本地登录访问并通过最小权限原则严格控制用户对内核接口的调用权限。由于SCO OpenServer 5.0.x已停止维护，建议迁移至仍受支持的操作系统。"
score = 7.2
severity = "HIGH"
sources = [
    "cve",
    "avd",
]
title = "SCO OpenServer和SCO Internet FastStart 内核错误处理权限提升漏洞"
updated = "2026-06-16"

