[basic]
description = "Windows 2000 Server、Advanced Server 和 Datacenter Server 中的域控制器存在拒绝服务漏洞。远程攻击者无需身份认证即可通过网络向目标域控制器发送大量畸形服务请求，导致 LSASS 或其他关键服务崩溃，造成系统停止响应或重启。攻击条件简单，仅需网络可达即可触发。"
published = "2001-07-21"
remediation = "安装微软安全公告 MS01-011 中提供的安全更新补丁。对于无法安装补丁的系统，建议在网络边界防火墙处限制对域控制器 TCP/UDP 135、139、445 端口的访问以缓解风险。"
score = 5.0
severity = "MEDIUM"
sources = ["cve"]
title = "Microsoft Windows 2000 域控制器拒绝服务漏洞"
updated = "2024-06-16"

