[basic]
description = "ISC BIND 域名服务器软件在处理 maxdname 相关逻辑时存在拒绝服务问题。攻击者无需身份验证即可向目标 BIND named 服务发送包含过长域名的 DNS 查询或响应相关数据，触发缓冲区或整数处理异常，导致 named 进程崩溃或卡死，造成 DNS 解析服务中断。该漏洞影响 ISC BIND 8.2.1 及更早版本，可在网络可达条件下远程触发，主要危害是可用性受损，企业与公网 DNS 环境中可能导致大范围名称解析失败。"
published = "1999-11-10"
remediation = "将 ISC BIND 升级至 8.2.2 或更高已修复版本；无法立即升级时，在 named.conf 中限制域名处理相关长度并启用 check-names 等严格校验作为临时缓解，并限制对 named 的网络访问面。"
score = 5.0
severity = "MEDIUM"
sources = [
    "avd",
    "nvd",
]
title = "ISC BIND maxdname 拒绝服务漏洞"
updated = "2026-06-16"

