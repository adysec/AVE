[basic]
description = "Linux 内核 mt76 无线驱动中的 mt7921 芯片驱动存在空指针解引用漏洞。在设备移除流程中，mt7921_pci_remove 函数过早释放 mt76 设备结构体，导致 devm_free_irq 尚未完成时 mt7921_irq_handler 中断处理函数仍可能被调用，从而访问已释放的内存触发内核崩溃。本地攻击者可通过热拔插或驱动解绑操作利用该漏洞，造成拒绝服务。CVSS 评分 5.5，中等危害。"
published = "2025-02-26T07:01:23.800"
remediation = "将 Linux 内核升级至 5.17.14、5.18.3 或 5.19 及以上版本，包含提交 ad483ed9dd51 的补丁。该修复将 mt76_free_device 延迟至 devm_free_irq 完成后执行，避免设备移除时中断处理程序访问已释放的内存导致空指针解引用崩溃。如无法立即升级，可避免在系统运行中热拔插或 unbind mt7921 无线网卡设备作为临时缓解。"
score = 5.5
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux kernel mt7921 WiFi 驱动释放后使用导致内核空指针解引用漏洞"
updated = "2026-06-17T05:18:10.293"

