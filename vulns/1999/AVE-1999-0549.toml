[basic]
description = "HP OpenView Omniback 存在远程命令执行和本地权限提升漏洞。远程攻击者可通过欺骗手段以 root 权限执行任意命令；本地用户则可通过符号链接攻击获取 root 权限。该漏洞利用条件较低，危害严重，影响 HP-UX 系统上的 OpenView Omniback 组件，CVSS 评分 7.5，风险等级高。厂商已发布补丁修复此漏洞。"
published = "1998-08-01T04:00:00.000"
remediation = "建议升级至 HPE Data Protector 最新版本（当前为 A.10.x 及以上），该产品已取代 HP OpenView Omniback II，并修复了此漏洞。如无法打补丁，可配置 Omniback 的 cell manager 启用身份认证（设置 OMNIBACK_AUTH=1）防止伪造攻击；在防火墙上严格限制仅受信管理主机访问 Omniback 服务端口（TCP 5555/5556）。对于本地 symlink 攻击，确保 Omniback 临时目录（如 /tmp/omni）设置粘滞位（chmod +t），仅允许属主删除或重命名文件，避免全局可写目录存放备份相关文件。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "HP OpenView Omniback 远程代码执行漏洞"
updated = "2026-06-16T21:48:10.450"

