[basic]
description = "Linux PA-RISC（parisc）架构内核中存在 TLB 缓存刷新缺陷。当页面不存在时，flush_user_dcache_range_asm 和 flush_user_icache_range_asm 函数中的 fdc 与 fic 指令会触发非访问数据 TLB 错误，导致缓存行无法被正确失效，进而可能引发内存损坏。该漏洞影响 Linux 内核 parisc 架构实现，本地攻击者可利用此漏洞导致系统崩溃或敏感信息泄露。CVSS 评分 7.1，危害等级高。官方已通过使用 flush_cache_pages() 临时别名映射方式修复。"
published = "2025-02-26T07:00:54.313"
remediation = "请升级 Linux 内核至 5.10.163、5.15.87、5.16.74 或更高版本（含对应 LTS 分支），该漏洞已在 `flush_cache_pages()` 使用临时别名映射修复非访问数据 TLB 缓存刷新的修复提交中合入。如无法立即升级内核，可禁用 parisc 架构上的 fdc/fdc 指令相关缓存优化功能作为临时缓解措施。"
score = 7.1
severity = "HIGH"
sources = ["msrc"]
title = "Linux Kernel PARISC 非访问数据 TLB 缓存刷新漏洞"
updated = "2026-06-17T05:17:16.480"

