[basic]
description = 'RPMMail 1.4 之前版本存在远程代码执行漏洞。攻击者可通过向目标邮件服务器发送特制的电子邮件，在 "MAIL FROM" 命令中注入 shell 元字符（如管道符、分号等），导致邮件系统在处理该命令时执行任意系统命令。该漏洞影响 Linux 平台下运行 RPMMail 服务的系统，CVSS 评分 10.0，危害等级严重。攻击者无需身份认证即可远程利用，可完全控制目标服务器。'
published = "1999-10-04T04:00:00.000"
remediation = "升级 RPMMail 至 1.4 或更高版本，该版本修复了 MAIL FROM 命令中 shell 元字符注入问题。如无法升级，在邮件服务器前端对 MAIL FROM 参数严格过滤 shell 特殊字符（如 `;` `|` `` ` `` `$`），或限制 SMTP 通信仅允许受信任来源连接。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "RPMMail 远程命令执行漏洞"
updated = "2026-06-16T21:50:40.817"

