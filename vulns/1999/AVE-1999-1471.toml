[basic]
description = "Sendmail 8.6.7 之前版本中存在操作系统命令注入漏洞，本地攻击者可通过向 debug（-d）命令行选项传入超大的数值参数触发该漏洞，利用 Sendmail 以 root 权限执行任意命令，实现本地权限提升。该漏洞影响 Sendmail 8.6.7 之前的所有版本，CVSS 评分 7.2，危害等级高。厂商已发布新版本修复此漏洞，建议用户升级至 Sendmail 8.6.7 或更高版本。"
published = "1996-08-30T04:00:00.000"
remediation = "立即升级 Sendmail 至 8.6.7 或更高版本，该版本已修复 -d 调试选项缓冲区溢出导致本地提权的问题。如无法升级，可限制非 root 用户执行 Sendmail 的 setuid 权限，移除 sendmail 的 setuid root 位（chmod u-s /usr/lib/sendmail），并限制对 -d 调试选项的访问。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "Sendmail 调试模式操作系统命令注入漏洞"
updated = "2026-06-16T21:50:10.013"

