[basic]
description = "Palo Alto Networks Prisma Cloud Compute Edition的Web界面存在会话过期不足漏洞（CWE-613）。当管理员删除用户后，该用户的Web会话不会立即失效，已删除用户仍可利用原有会话令牌继续访问系统，导致未授权访问。攻击者需具有低权限账号并诱导用户交互，攻击复杂度低，影响数据完整性。该漏洞不影响Prisma Cloud Enterprise Edition中的Compute组件。"
published = "2025-05-14"
remediation = "升级到Prisma Cloud Compute Edition 34.01.129或更高版本。该版本已修复会话过期问题，删除用户后其会话将立即失效。无变通方案或缓解措施可用。"
score = 2.0
severity = "LOW"
sources = ["cve"]
title = "Palo Alto Networks Prisma Cloud Compute Edition Web界面会话过期不足漏洞"
updated = "2025-06-23"

