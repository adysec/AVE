[basic]
description = "HP OpenView Network Node Manager 中存在隐藏的 SNMP 团体字符串，远程攻击者可利用该默认团体字符串通过 SNMP 协议访问目标系统，读取或修改 MIB 表中的敏感配置信息，导致信息泄露与配置篡改。该漏洞影响 HP OpenView 系列产品，攻击者无需身份认证即可远程触发，CVSS 评分 10.0，危害严重。"
published = "1998-11-02T05:00:00.000"
remediation = "立即禁用 SNMP 服务或修改 HP OpenView 默认 SNMP community strings（如 public/private），升级到已修复此漏洞的最新版本。在网络层面限制 SNMP（UDP 161/162）仅允许受信任管理源访问，必要时迁移至 SNMPv3 启用加密认证。"
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "HP OpenView SNMP 共同体字符串信息泄露漏洞"
updated = "2026-06-16T21:48:00.633"

