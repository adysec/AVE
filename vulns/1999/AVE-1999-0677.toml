[basic]
description = "Computer Software Manufaktur Alibaba 2.0 Web 服务器存在多个 CGI 漏洞，远程攻击者可通过向 URL 中注入管道符（|）等特殊字符，绕过输入验证执行任意系统命令。该漏洞影响 Alibaba 2.0 版本，攻击者无需身份认证即可利用，可能导致服务器被完全控制。CVSS 评分 3.6，危害等级低。"
published = "1999-11-03T05:00:00.000"
remediation = "建议立即停止使用已停止维护的 Alibaba 2.0 Web 服务器，迁移至 Apache HTTP Server 或 Nginx 等受支持的现代 Web 服务器。如无法立即迁移，可在反向代理或 WAF 层面过滤 URL 请求中的管道符 `|` 及其他 shell 元字符，并严格限制对服务器的网络访问来源。"
score = 3.6
severity = "LOW"
sources = ["epss"]
title = "Computer Software Manufaktur Alibaba 2.0 多个CGI远程命令执行漏洞"
updated = "2026-06-16T21:49:15.570"

