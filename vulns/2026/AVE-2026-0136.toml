[basic]
description = "OpenClaw 主机执行环境存在 OS 命令注入漏洞，由于过滤机制对用户输入的不完整禁止列表验证不充分，导致远程攻击者可通过构造特制请求向主机环境注入恶意操作系统命令，实现超出调用者预授权范围的任意命令执行或持久化执行。该漏洞影响 OpenClaw 主机执行环境，CVSS 评分 8.8，危害等级高，攻击者无需身份认证即可利用。"
published = "20260713"
remediation = "立即升级 OpenClaw 至 2026.6.6 或更高版本，该版本已修复 sanitizeEnvVars() 函数中 NODE_OPTIONS、BASH_ENV、PYTHONSTARTUP 等 12 个解释器启动变量绕过黑名单过滤的问题。如无法立即升级，请从工具白名单中移除 exec 工具，或限制受影响功能仅对可信操作者开放，并保持渠道和工具白名单最小化。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "OpenClaw 主机执行环境 OS 命令注入漏洞"
updated = "20260713"

