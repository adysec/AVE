[basic]
description = "FileZilla Server 0.9.31 之前版本中存在缓冲区溢出漏洞，远程攻击者可向目标服务器发送特制的 SSL/TLS 数据包触发该漏洞，导致拒绝服务。该漏洞源于对 SSL/TLS 数据包边界检查不充分，造成缓冲区溢出。影响 FileZilla Server 0.9.31 以下所有版本，CVSS 评分 4.3，危害等级中危。"
published = "2009-03-12T15:20:50.063"
remediation = "立即将 FileZilla Server 升级至 0.9.31 或更高版本，该版本已修复 SSL/TLS 数据包处理中的缓冲区溢出漏洞。如无法升级，可在服务器防火墙中禁用 TLS/SSL 端口（默认 990）或限制可信 IP 访问作为临时缓解。"
score = 4.3
severity = "MEDIUM"
sources = ["nuclei"]
title = "FileZilla FileZilla Server 缓冲区溢出拒绝服务漏洞"
updated = "2026-06-16T23:06:02.000"

