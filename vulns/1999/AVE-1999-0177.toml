[basic]
description = 'EZMall 2000 购物车 CGI 程序 "mall2000.cgi" 存在错误配置漏洞，未经身份认证的远程攻击者无需任何凭据即可通过网络直接访问该 CGI 程序，导致程序错误地泄露敏感私有信息。该漏洞影响部署 EZMall 2000 网上购物系统的 Web 服务器，攻击者只需向目标服务器发送特制的 HTTP 请求即可触发信息泄露，可能暴露客户订单详情、个人隐私数据等敏感内容。根据 NVD 记录，CVSS v2 评分为 5.0（中危），弱点类型为 CWE-200（向未授权方泄露敏感信息）。'
published = "1999-04-01T05:00:00.000"
remediation = "升级 EZMall 2000 购物车程序至官方修复版本，删除或限制对存在配置缺陷的 CGI 脚本 mall2000.cgi 的公开访问权限。正确配置 Web 服务器目录及文件权限，禁止匿名用户读取包含私密信息的配置文件、订单数据和用户资料。可通过 .htaccess 或服务器规则限制 /cgi-bin/ 目录访问，并在防火墙层面对管理接口做 IP 白名单限制。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "EZMall 2000 购物车 CGI 程序配置错误敏感信息泄露漏洞"
updated = "2026-06-16T21:48:43.457"

