[info]
author = "AVE"
description = "检测 Ascend CascadeView/UX TFTP 守护进程的符号链接攻击漏洞。通过检查 TFTP 服务是否可读取 /etc/passwd 文件，验证本地提权条件"
id = "POC-AVE-2000-0014"
name = "CVE-2000-0015 PoC"
severity = "medium"
tags = ["cve-2000-0015"]
vuln_id = [
    "CVE-2000-0015",
    "AVE-2000-0014",
]

[poc]
logic = "all"

[[poc.requests]]
path = "/etc/passwd"
protocol = "file"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["root:"]
