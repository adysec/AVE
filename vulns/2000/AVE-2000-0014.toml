[basic]
description = "tags.<value>Ascend CascadeView/UX 1.0 的 TFTP 服务器存在符号链接漏洞，本地攻击者可通过创建恶意符号链接，利用 TFTP 服务器处理文件时的权限缺陷，实现权限提升。该漏洞影响 Ascend CascadeView/UX 1.0 版本，攻击者需具备本地访问权限，通过构造恶意符号链接诱导 TFTP 服务器跟随链接访问敏感文件，从而实现权限提升。CVSS 评分 4.6，属于中等危害级别。"
published = "1999-12-31T05:00:00.000"
remediation = "建议立即停用 Ascend CascadeView/UX 1.0 TFTP 服务或升级至厂商修复版本（Lucent/Nokia 后续版本）。若必须使用，请将 TFTP 根目录权限设为仅 root 可写、禁用符号链接跟随，并在防火墙层面限制 TFTP (UDP 69) 仅允许受信管理网段访问。"
score = 4.6
severity = "MEDIUM"
sources = ["cve"]
title = "Ascend CascadeView/UX TFTP 符号链接本地权限提升漏洞"
updated = "2026-06-16T21:50:49.637"

