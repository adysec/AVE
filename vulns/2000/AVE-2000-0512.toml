[basic]
description = "AnalogX Proxy 4.04 及更早版本中存在缓冲区溢出漏洞，远程攻击者无需身份认证即可通过 FTP 协议发送超长的 USER 命令，触发目标代理服务中的缓冲区溢出，导致拒绝服务。该漏洞源于软件对用户输入长度缺乏有效校验，影响 AnalogX Proxy 4.04 及之前版本，CVSS 评分 5.0，危害等级中危。"
published = "2000-07-25T04:00:00.000"
remediation = "升级到 AnalogX Proxy 4.05 或更高版本（可从官方下载页面 analogx.com/contents/download/network/proxy.htm 获取）。由于 AnalogX 产品已停止维护且不再更新，建议作为长期方案迁移至仍在维护的代理服务器（如 Squid、HAProxy 或 Nginx）以替代 AnalogX Proxy。临时缓解措施可在防火墙或代理配置中限制 FTP 代理服务的访问来源 IP，仅允许信任网段连接。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "AnalogX Proxy 缓冲区溢出远程拒绝服务漏洞"
updated = "2026-06-16T21:52:12.183"

