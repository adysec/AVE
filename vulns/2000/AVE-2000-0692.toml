[basic]
description = "LBL Traceroute（LBNL Traceroute）1.4a5 及之前版本的 savestr 函数中存在堆溢出漏洞，本地用户可通过向该程序传递特制的 -g 选项参数触发堆缓冲区溢出，进而导致以 root 权限执行任意命令。该漏洞允许低权限本地用户实现权限提升，CVSS 评分 7.2，危害等级高。"
published = "2000-12-19T05:00:00.000"
remediation = "立即升级到 LBNL traceroute 1.4a6 或更高版本，该版本修复了 savestr 函数中的堆溢出问题。如无法升级，可通过限制普通用户对 traceroute 的 SUID 权限来缓解，执行 `chmod 0755 /usr/sbin/traceroute` 移除 SUID 位，防止本地用户利用 -g 选项触发溢出提权。"
score = 7.2
severity = "HIGH"
sources = ["exploitdb"]
title = "LBL Traceroute 堆溢出本地代码执行漏洞"
updated = "2026-06-16T21:52:50.113"

