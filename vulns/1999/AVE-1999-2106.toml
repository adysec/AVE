[basic]
description = "Microsoft Internet Information Services (IIS) 4.0 SP4 在未安装特定安全修补程序的情况下，存在认证绕过漏洞。由于特定条件下服务器未正确验证用户身份凭据，远程攻击者可通过 Microsoft Visual InterDev 6.0 等客户端工具直接访问受保护的资源，无需提供有效认证信息。该漏洞影响 IIS 4.0 及早期版本，攻击者利用此漏洞可绕过身份验证机制，获取受限目录或文件的未授权访问权限，进而可能进一步探测系统敏感信息。"
published = "1999-12-31T05:00:00.000"
remediation = "该漏洞影响已停止支持的 Microsoft IIS 4.0 SP4（Windows NT 4.0 Option Pack）。根本修复方案是升级操作系统至 Windows Server 2019/2022 及以上版本，使用 IIS 10.0 或更新版本。如无法升级，应安装当年发布的 SP4 安全修补程序（Hotfix），同时在 IIS 管理器中禁用未使用的身份验证方法，并限制通过 Visual InterDev 6.0 的远程管理连接。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "Microsoft Internet Information Services 身份认证绕过漏洞"
updated = "2026-06-16T21:50:47.373"

