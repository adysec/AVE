[info]
author = "ave"
description = "通过 HTTP 服务构造包含 Active Setup Control ActiveX 控件的 HTML 页面，验证 CVE-2000-0329 漏洞。远程攻击者可通过 HTML 邮件或网页中的嵌入式脚本触发 ActiveX 控件自动下载并执行恶意 CAB 文件，导致任意代码执行。"
id = "POC-AVE-2000-0272"
name = "Microsoft Internet Explorer/Outlook ActiveX CAB File Execution PoC"
severity = "medium"
tags = [
    "cve-2000-0329",
    "activex",
    "cab",
    "ms99-048",
]
vuln_id = [
    "CVE-2000-0329",
    "AVE-2000-0272",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/"
protocol = "http"

[[poc.requests.matchers]]
expect = true
status = [200]
type = "status"
