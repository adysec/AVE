[basic]
description = "ICMP（互联网控制消息协议）协议中的时间戳和网络掩码请求未作访问限制，远程攻击者可向任意运行 Linux 内核或类 Unix 系统的主机发送 ICMP Timestamp 或 Address Mask Request 数据包，从而获取目标系统的系统时间（可用于推算系统运行时长）和子网掩码（可用于推断网络拓扑结构）。由于 ICMP 协议设计缺陷，许多操作系统默认允许这些请求并回复响应，导致敏感网络信息泄露，进而为攻击者进一步渗透提供信息支撑。该漏洞无需身份认证即可远程利用，影响范围广泛。"
published = "1997-08-01T04:00:00.000"
remediation = "在防火墙层面配置规则阻止外部 ICMP 类型 13（时间戳请求）和类型 17（子网掩码请求）数据包进入内部网络。对于 Linux 系统，执行 sysctl -w net.ipv4.icmp_timestamp_ignore=1 禁用 ICMP 时间戳响应；对于 Cisco IOS 设备，使用 access-list 拒绝 icmp any any timestamp-request 和 mask-request 规则。在 Windows 防火墙中通过高级安全规则阻止入站 ICMPv4 时间戳请求。"
score = 4
severity = "MEDIUM"
sources = ["redhat"]
title = "Linux Kernel ICMP 网络掩码与时间戳请求信息泄露漏洞"
updated = "2026-06-16T21:48:34.703"

