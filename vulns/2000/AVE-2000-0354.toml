[basic]
description = "Matt Kruse Calendar Script 2.2 的 calender.pl 和 calendar_admin.pl 脚本存在任意命令执行漏洞，远程攻击者可通过在参数中注入 Shell 元字符（如分号、反引号、管道符等）执行任意系统命令。该漏洞源于脚本未对用户输入进行充分过滤与转义，导致攻击者可直接在服务器上以 Web 服务器权限执行任意命令。漏洞影响 Matt Kruse Calendar Script 2.2 版本，攻击者无需身份认证即可远程利用，CVSS 评分 7.5（高危），影响机密性、完整性和可用性。攻击者可通过构造包含 Shell 元字符的恶意参数触发漏洞，进而完全控制受影响服务器。官方已停止维护，建议迁移至维护中的日历应用或实施严格的输入验证与命令执行防护。"
published = "2000-05-16T04:00:00.000"
remediation = "升级到 Matt Kruse 日历脚本 2.3 或更高版本，修复 open() 函数的安全漏洞；修改验证配置文件字段数据，禁止 shell 元字符（如 |, ;, &, $）输入；改用安全的参数解析函数，替代直接拼接命令行为。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "Matt Kruse Calendar Script 2.2 任意命令执行漏洞"
updated = "2026-06-16T21:51:43.250"

