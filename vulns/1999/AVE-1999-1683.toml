[basic]
description = "该漏洞位于微软 IIS 4.0/5.0 所集成的远程数据服务（RDS）组件 DataFactory 中。攻击者可在未授权的情况下，通过向目标服务器发送特制的 HTTP 请求调用 RDS DataFactory 的 CreateObject 方法，从而在服务端实例化任意本地组件（如 MSADC 的 Advanced Data Factory 或 VbBusObj 业务对象），进而以 IWAM 或 SYSTEM 权限执行任意操作系统命令。此漏洞的攻击条件仅需目标开放 Web 服务且未删除或限制 RDS DataFactory 的注册表隐式调用项，即可被远程利用造成服务器完全沦陷。"
published = "1999-07-19"
remediation = '按照 Microsoft 安全公告 MS99-025，通过注册表编辑器或 REGDEL 工具删除 HKEY_LOCAL_MACHINE\SYSTEM\CurrentControlSet\Services\W3SVC\Parameters\ADCLaunch 下的 RDSServer.DataFactory、AdvancedDataFactory 和 VbBusObj.VbBusObjCls 三个键值，以禁用 RDS DataFactory 的隐式远程功能；同时移除服务器上 MDAC 自带的 RDS Sample Pages 目录。若系统仍依赖 RDS，应升级到 MDAC 2.1（全新安装而非从旧版本升级）并在注册表中显式配置允许调用的 Business Objects 键值，禁止未授权访问。'
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "微软 Windows NT IIS RDS DataFactory 远程命令执行漏洞"
updated = "2026-07-18"

