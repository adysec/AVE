[basic]
description = "WebTV 电子邮件客户端在处理 HTML 格式邮件时存在安全漏洞，远程攻击者可在用户不知情的情况下，通过构造包含恶意 HTML 代码的电子邮件或网页，诱使用户访问后，强制 WebTV 电子邮件客户端在未经用户授权的情况下自动发送邮件。该漏洞利用了客户端对 HTML 内容的解析缺陷，攻击者无需任何身份认证即可发起攻击，可能导致垃圾邮件发送或信息泄露，影响 WebTV 电子邮件客户端的用户隐私安全。"
published = "2000-01-02T05:00:00.000"
remediation = "建议立即将 WebTV/MSN TV 升级至官方最新版本（如仍未升级），并在邮件客户端设置中禁用 HTML 内容自动渲染，关闭「允许外部资源自动加载」选项。由于 WebTV 服务已于 2013 年终止运营，长期缓解措施应迁移至现代电子邮件客户端（如 Outlook、Thunderbird），同时在网关过滤包含恶意 JavaScript 或自动表单提交的 HTML 邮件。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "WebTV 电子邮件客户端 HTML注入漏洞"
updated = "2026-06-16T21:50:57.770"

