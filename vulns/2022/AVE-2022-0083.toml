[basic]
description = "Linux 内核 Mellanox mlx5 网卡驱动的链路聚合（LAG）模块存在逻辑缺陷漏洞，由于 MLX5_LAG_FLAG_NDEVS_READY 标志设置不当，当 PF0 和 PF1 加载顺序异常时可能导致空指针解引用。本地攻击者可通过触发特定的设备加载/卸载序列，使内核在调用 mlx5_lag_is_multipath() 时访问空指针，造成系统崩溃（拒绝服务）。该漏洞影响 Linux 内核 5.18 之前版本，CVSS 评分 5.5，危害等级中危。社区已在内核主线提交补丁修复此问题。"
published = "2025-06-18T11:15:28.063"
remediation = "建议升级 Linux 内核至 5.18 及以上版本，该漏洞已在 5.18-rc5 期间由 commit 修复。如无法升级内核，可应用对应稳定版内核的 backport 补丁（参考 kernel.org 稳定树），并避免在未完成双 PF 注册前热拔插 mlx5 网卡作为临时缓解。"
score = 5.5
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux kernel mlx5 网卡驱动 LAG 链路聚合空指针解引用漏洞"
updated = "2026-06-17T05:22:31.917"

