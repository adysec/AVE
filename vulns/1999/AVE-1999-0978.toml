[basic]
description = "Windows NT 4.0 在处理 Token Ring 网络的源路由转发信息时存在缺陷，远程攻击者无需身份认证即可通过向目标系统发送路由信息字段（RIF）中跳数超过 7 的特制数据包，或者包含重复 Token Ring ID 的列表，触发异常处理错误导致系统崩溃。该漏洞影响 Windows NT 4.0 操作系统，CVSS 评分 5.0，危害等级中等。"
published = "1999-12-31T05:00:00.000"
remediation = "安装 Microsoft 针对此漏洞发布的安全更新（KB Q179157），该补丁限制了 Token Ring 源路由数据包中 RIF 跳数及重复 ID 的处理。由于 Windows NT 4.0 已停止支持，建议升级至受支持的 Windows Server 版本。临时缓解措施可在网络边界防火墙或路由器上丢弃源路由选项（Loose Source Routing 和 Strict Source Routing）的 IP 数据包。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Microsoft Windows NT 4.0 Routing Information Field 远程拒绝服务漏洞"
updated = "2026-06-16T21:49:47.313"

