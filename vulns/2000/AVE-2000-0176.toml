[basic]
description = 'Microsoft SQL Server 7.0 企业管理器（Enterprise Manager）在注册新 SQL Server 实例时，若未开启"始终提示输入登录名和密码"选项，会使用弱加密算法存储登录凭据。本地攻击者可读取配置文件中的弱加密密文，通过暴力破解还原数据库管理员凭证，从而获取目标数据库的完全控制权限。该漏洞影响 Microsoft SQL Server 7.0，CVSS 评分 7.2，危害等级高。'
published = "2000-03-14T05:00:00.000"
remediation = '建议升级至 Microsoft SQL Server 2000 或更高版本，新版本已修复密码弱加密问题。如无法升级，在 Enterprise Manager 中注册 SQL Server 时必须勾选「始终提示输入登录名和密码」选项，避免凭据以弱加密方式存储于注册表。同时限制对注册表项 HKEY_CURRENT_USER\Software\Microsoft\Microsoft SQL Server 的访问权限。'
score = 7.2
severity = "HIGH"
sources = ["epss"]
title = "Microsoft SQL Server 7.0 密码弱加密漏洞"
updated = "2026-06-16T21:51:12.490"

