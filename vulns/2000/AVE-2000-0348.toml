[basic]
description = "UltraScripts UltraBoard 1.6 及其他版本存在拒绝服务漏洞。远程攻击者可通过在 Session 参数中引用 UltraBoard，导致 UltraBoard 进程不断 fork 出自身副本，耗尽系统进程资源，从而导致拒绝服务。攻击者无需身份认证即可远程发起攻击，仅需构造包含 UltraBoard 引用的 Session 参数发送请求即可触发漏洞，导致服务器资源耗尽、服务不可用。该漏洞影响 UltraBoard 1.6 及其他版本，CVSS 评分 5.0（中等危害），主要影响系统可用性。UltraScripts 官方已发布补丁修复此漏洞，建议用户升级至最新版本。"
published = "2000-05-05T04:00:00.000"
remediation = "建议立即升级 UltraBoard 1.6 到 1.8 或更高版本以获取 Session 参数验证补丁。如无法立即打补丁，请使用防火墙对管理端口进行源 IP 限制，有效降低程序异常的风险。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "UltraScripts UltraBoard 1.6 拒绝服务漏洞"
updated = "2026-06-16T21:51:42.443"

