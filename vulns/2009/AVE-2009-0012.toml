[basic]
description = "Joomla! 的 Roland Breedveld Album (com_album) 组件 1.14 版本中存在目录遍历漏洞，远程攻击者可通过向 index.php 传递含有 `../` 序列的恶意 target 参数，绕过路径限制访问服务器上的任意目录，可能导致敏感信息泄露或其他未明确的安全影响。该漏洞无需身份认证即可远程利用，影响所有运行该组件的 Joomla! 站点。"
published = "2009-09-23T12:08:35.360"
remediation = '建议立即卸载 Roland Breedveld 开发的 com_album 1.14 组件，该组件自 2007 年后未再更新，厂商已停止维护，不再存在安全补丁，应彻底移除以免继续受目录遍历攻击威胁。如暂时无法卸载，可在 Web 服务器层面（Apache/Nginx）配置规则拒绝 `target` 参数含有 `../` 的请求，或在 WAF（如 mod_security）中添加 `SecRule ARGS:target "\.\." "deny"` 规则作为临时缓解，同时尽快迁移至其他受支持的 Joomla! 相册扩展。'
score = 7.5
severity = "HIGH"
sources = ["nuclei"]
title = "Joomla! com_album 组件 1.14 目录遍历漏洞"
updated = "2026-06-16T23:11:22.553"

