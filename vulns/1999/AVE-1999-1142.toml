[basic]
description = "Xtramail 1.11 存在多处缓冲区溢出漏洞。攻击者可通过向 POP3 服务发送超长 PASS 命令、向 SMTP 服务发送超长 HELO 命令，或向 Control Service 发送超长用户名，触发缓冲区溢出，导致目标服务崩溃拒绝服务，并可能执行任意代码。该漏洞远程可触发，无需身份认证，CVSS 评分 7.5，危害等级高。"
published = "1999-11-10T05:00:00.000"
remediation = "立即停止使用 Artisoft XtraMail 1.11，该产品已停止维护且厂商 Artisoft 已不再提供安全更新。作为替代方案，迁移至受支持的邮件服务器软件（如 Exchange Server、Postfix 或 Dovecot）。若无法立即迁移，在防火墙层面限制对 POP3（110 端口）、SMTP（25 端口）及 Control Service（32000 端口）的访问，仅允许可信 IP 连接，并启用入侵检测规则拦截超长命令输入。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "XtraMail 缓冲区溢出远程代码执行漏洞"
updated = "2026-06-16T21:50:35.843"

