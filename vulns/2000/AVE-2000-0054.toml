[basic]
description = "英特尔 InBusiness 电子邮件站的 daynad 程序在处理管理请求时未实施任何身份认证机制，存在授权缺失漏洞。远程攻击者无需提供凭据即可直接连接该服务，进而修改系统配置、删除服务器上的文件，或读取用户的电子邮件内容。该漏洞影响运行 daynad 程序的英特尔 InBusiness E-mail Station 设备，攻击条件为攻击者能够与设备的 daynad 服务建立网络连通。利用方式是通过网络向目标发送未经认证的管理请求，即可实现未授权配置篡改、文件删除及邮件窃取等非授权操作。"
published = "1999-12-14T05:00:00.000"
remediation = "升级英特尔InBusiness E-mail Station至修复该授权缺陷的固件版本（联系英特尔获取2000年相应补丁）；如暂无法升级，应在边界防火墙或路由器上过滤访问该设备daynad服务端口（TCP 2008）的外部连接，仅允许受信任内网访问，并关闭不必要的远程管理功能以缓解未授权配置篡改、文件删除及邮件读取风险。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
