[basic]
description = "US Robotics/3Com Total Control Chassis（帧中继版本 3.6.22 至 3.7.24）存在安全绕过漏洞。当端口启用 set host prompt 设置时，设备未能正确执行访问过滤规则，远程攻击者只需在 host: 提示符处连续两次输入主机名即可绕过身份验证和访问限制，获取未授权访问权限。该漏洞影响使用帧中继模块的 Total Control 系列设备，CVSS 评分 7.5，危害等级高，攻击复杂度低，无需认证即可利用。"
published = "1998-05-11T04:00:00.000"
remediation = '升级 3Com Total Control Chassis 固件至 3.7.25 及以上版本以修复访问过滤器的绕过问题。如无法升级，可在端口上禁用 "set host prompt" 功能，并在上游路由器或防火墙配置严格 ACL，限制对 Frame Relay 端口的未授权访问。'
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "3Com Total Control Chassis Frame Relay 安全绕过漏洞"
updated = "2026-06-16T21:50:20.123"

