[basic]
description = 'BEA WebLogic Server 4.0.x/4.5.x/5.1.x 版本存在缓冲区溢出漏洞，远程攻击者可通过向服务器发送以".."字符串开头且超长的 URL 请求触发缓冲区溢出，导致任意命令执行。攻击者无需身份认证即可利用该漏洞完全控制目标服务器，CVSS 评分 10.0，危害等级严重。BEA 已在 WebLogic Server 5.1.0 版本中修复此漏洞。'
published = "2001-02-12T05:00:00.000"
remediation = '立即升级至 WebLogic Server 5.1.0 及以上版本，该漏洞在 5.1.0 中已修复。鉴于该版本已过于老旧，建议规划升级至 Oracle 仍在支持周期内的 WebLogic Server 版本。若无法立即升级，可在 Web 服务器或反向代理层过滤包含连续 ".." 的超长 URL 请求作为临时缓解。'
score = 10
