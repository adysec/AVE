[basic]
description = "基于 BSD 的 telnetd 守护进程在处理 telnet 协议选项时存在缓冲区溢出漏洞。远程攻击者可通过向目标系统发送特制的 AYT（Are You There）选项序列触发该漏洞，导致在目标系统上以 root 权限执行任意命令。该漏洞影响 Solaris 2.x/7.0/8、IRIX 6.5.x、OpenBSD 2.x、NetBSD 1.x、Debian 3 及 HP-UX 10 等多个操作系统，CVSS 评分 10.0，危害等级严重。攻击者无需身份认证即可远程利用，影响范围广泛。"
published = "2001-08-14T04:00:00.000"
remediation = "立即禁用 telnetd 服务（`systemctl stop telnetd && systemctl disable telnetd`），改用 SSH 进行远程管理。如无法立即替换，在防火墙层面限制 telnet（端口 23）仅允许受信任 IP 访问，并升级到各厂商已修复版本：Solaris 8 补丁 108906-11、OpenBSD 3.0+、NetBSD 1.6+、Debian 3.0 r1+、HP-UX 11.0 PHCO_24190。"
score = 10
severity = "CRITICAL"
sources = ["exploitdb"]
title = "多操作系统 BSD TelnetD 远程缓冲区溢出漏洞"
updated = "2026-06-16T21:54:31.283"

