[basic]
description = 'Bajie HTTP Web Server 0.30a 存在目录遍历漏洞，远程攻击者可通过向服务器发送包含特殊构造的"...."序列的URL请求，绕过路径过滤机制，实现任意文件读取。该漏洞利用方式简单，无需身份认证即可远程触发，可导致服务器敏感信息泄露（如配置文件、系统文件等），影响运行Bajie HTTP Web Server 0.30a版本的系统。'
published = "2000-10-20T04:00:00.000"
remediation = 'Bajie HTTP web server 0.30a 已停止维护，无安全更新可用。建议立即停止使用该服务器，迁移至 Apache HTTP Server 或 Nginx 等仍在维护的 Web 服务器。如无法立即迁移，可在反向代理或 WAF 层面配置规则，拦截包含连续多个点号（如 "...."）的 URL 请求路径，作为临时缓解措施。'
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Bajie HTTP Web Server 目录遍历任意文件读取漏洞"
updated = "2026-06-16T21:52:27.073"

