[basic]
description = "SunOS 4.1.1 至 4.1.3c 版本及 Open Windows 3.0 中的 loadmodule 与 modload 程序存在权限提升漏洞。当 modload 被授予 setuid/setgid 权限时，本地攻击者可通过精心设置的环境变量触发该漏洞，从而获取 root 权限。此漏洞影响 SunOS 及 Open Windows 系统，CVSS 评分 10.0，危害等级严重，厂商未发布官方补丁，建议用户通过移除 modload 的 setuid 权限进行缓解。"
published = "1999-12-31T05:00:00.000"
remediation = "立即应用 Sun 补丁 100124-01（参考 sunsolve.sun.com ID 00124-1），或升级至 SunOS 4.1.4。由于 SunOS 4.x 已停止维护，建议迁移到 Solaris 2.5.1 及以上受支持版本。临时缓解措施：以 root 执行 chmod 0555 /usr/bin/loadmodule /usr/bin/modload 移除 setuid/setgid 特权位，同时限制传递给 loadmodule 和 modload 的环境变量（如 PATH、LD_LIBRARY_PATH、IFS），防止本地用户通过恶意环境变量获取 root 权限。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "SunOS loadmodule/modload 本地权限提升漏洞"
updated = "2026-06-16T21:50:46.420"

