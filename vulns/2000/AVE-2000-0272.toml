[basic]
description = "Microsoft Internet Explorer 4.x/5 及 Outlook 2000/98/Express 4.x 中的 ActiveX 控件存在 CAB 文件执行漏洞。远程攻击者可通过向受害者发送包含恶意 CAB 文件附件及内嵌脚本的 HTML 邮件，利用 Active Setup Control 控件自动下载并执行其中的可执行代码，无需用户额外交互即可在目标系统上执行任意命令。该漏洞影响早期 Windows 平台上的 IE 与 Outlook 系列产品，攻击者利用门槛较低，可通过社会工程方式诱导用户打开邮件触发。"
published = "1999-11-11T05:00:00.000"
remediation = "升级到 Internet Explorer 6 及以上版本，或改用现代浏览器（如 Edge/Chrome）；在 IE 中将 Internet 区域安全级别设为「高」并禁用 ActiveX 控件；在 Outlook 中阻止 CAB 附件执行，设置以纯文本阅读邮件。该漏洞源于 Windows 2000 之前版本，建议同步升级操作系统。当前这些版本均已停止支持，彻底修复需升级到受支持的操作系统和浏览器。"
score = 5.1
severity = "MEDIUM"
sources = ["cve"]
title = "Microsoft Internet Explorer 及 Outlook ActiveX CAB 文件远程执行漏洞"
updated = "2026-06-16T21:51:29.370"

