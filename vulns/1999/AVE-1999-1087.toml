[basic]
description = "Solaris 2.6 及 2.7 系统中 /usr/bin/write 命令存在缓冲区溢出漏洞。本地攻击者可通过向 terminal name 参数传入超长字符串触发该漏洞，导致栈缓冲区溢出，从而以 root 权限执行任意代码。漏洞影响 Solaris 2.6 和 2.7 版本，CVSS 评分 7.2，危害等级高。攻击前提为拥有本地用户权限。"
published = "1999-03-08T05:00:00.000"
remediation = "立即移除 /usr/bin/write 的 setuid 权限（chmod u-s /usr/bin/write），消除本地提权路径。由于 Solaris 2.6/2.7 已停止支持，官方不再提供补丁，建议升级到 Solaris 10 及以上受支持版本，或迁移至 Oracle Solaris 11.4 并安装最新安全更新。"
score = 7.2
severity = "HIGH"
sources = ["epss"]
title = "Sun Solaris /usr/bin/write 本地缓冲区溢出漏洞"
updated = "2026-06-16T21:50:17.847"

