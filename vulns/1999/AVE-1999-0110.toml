[basic]
description = "SGI IRIX 6.2 操作系统中 fsdump 命令存在本地权限提升漏洞。由于 fsdump 在处理敏感文件时未能正确限制普通用户的访问权限，本地攻击者可通过修改系统敏感文件将自身权限提升为 root 超级用户，从而完全控制目标系统。该漏洞影响 SGI IRIX 6.2 版本，CVSS 评分 7.2，危害等级高。攻击者需具有本地系统访问权限方可利用。"
published = "1996-12-03T05:00:00.000"
remediation = "升级至 SGI IRIX 6.3 及以上版本以修复 fsdump 权限提升漏洞。临时缓解措施：执行 `chmod u-s /usr/sbin/fsdump` 移除 fsdump 的 setuid 位，阻止非授权用户以 root 权限运行；同时通过 `chmod 700 /usr/sbin/fsdump` 限制仅 root 用户可执行，防止本地用户提权。"
score = 7.2
severity = "HIGH"
sources = ["exploitdb"]
title = "SGI IRIX fsdump 本地权限提升漏洞"
updated = "2026-06-16T21:47:26.660"

