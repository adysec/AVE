[basic]
description = "Windows NT 系统的账户策略存在安全配置缺陷，当远程用户的登录时段（logon hours）到期后，系统并不会强制断开其已建立的远程会话连接。受影响的系统为配置了登录时间限制的 Windows NT 服务器，远程攻击者只需在允许时段内成功登录并建立会话，即可在授权时段结束后继续保持连接，绕过登录时间限制策略，持续访问服务器资源。该漏洞源于系统未对过期会话执行强制断开机制，攻击者无需特殊权限或额外工具即可利用，属于配置与策略强制执行层面的安全问题，CVSS 评分达到 10.0 的最高危险等级。"
published = "1999-01-01T05:00:00.000"
remediation = '建议升级至 Windows NT 4.0 Service Pack 6a 或更高版本（含修复补丁 Q244366），或应用微软安全公告 MS99-025 对应补丁。临时缓解：在用户管理器中启用"强制注销已过期登录时间"策略，或部署登录脚本定时强制断开过期会话。'
score = 10
severity = "CRITICAL"
sources = ["epss"]
