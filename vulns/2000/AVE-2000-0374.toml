[basic]
description = "Linux cdwtools 0.93 及更早版本中存在不安全的临时文件处理漏洞，由于程序在 /tmp 目录下创建临时文件时未进行充分的权限检查和文件名随机化处理，本地攻击者可通过符号链接攻击或竞争条件（TOCTOU）方式，在 /tmp 目录中预创建恶意符号链接指向系统关键文件，诱使以 root 权限运行的 cdwtools 进程覆盖或写入任意文件，从而将自身权限提升至 root。该漏洞利用需要本地用户身份且攻击复杂度较高，但成功利用后可完全控制目标系统。"
published = "1999-10-22T04:00:00.000"
remediation = "立即将 cdwtools 升级至 0.94 或更高版本（如已停止维护，建议彻底移除 cdwtools 软件包）。在无法升级的情况下，可通过在 /etc/fstab 中为 /tmp 分区添加 nosuid、noexec 挂载选项来缓解本地提权风险，同时确保 /tmp 目录权限为 1777（粘滞位已设置）。对于仍在使用该组件的老旧 SUSE Linux 系统，应安装 SUSE 安全公告中提供的补丁包。"
score = 6.2
severity = "MEDIUM"
sources = ["avd"]
title = "Linux cdwtools 本地权限提升漏洞"
updated = "2026-06-16T21:51:33.670"

