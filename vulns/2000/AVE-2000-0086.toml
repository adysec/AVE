[basic]
description = "SalesCart 是一款基于 Web 的购物车应用程序，其存在敏感数据可被篡改的安全漏洞。该应用的购买流程依赖前端 HTML 表单中的隐藏字段（hidden form fields）来传递商品价格、数量等关键信息，但服务端未对这些字段进行真实性校验与重新计算。未经身份认证的远程攻击者可通过拦截并修改提交订单时的隐藏表单字段（如商品单价、总价），将金额篡改为任意数值后提交，从而以极低价格完成购买。该漏洞影响所有使用 SalesCart 购物车且未在服务端校验订单数据的站点，攻击仅需能够访问目标购物页面并发起 HTTP 请求即可，利用门槛低，可直接造成商家经济损失。"
published = "2000-02-01T05:00:00.000"
remediation = "立即升级 SalesCart 至官方已修复版本（1.5 及以上），并在服务端对订单金额、商品数量等敏感字段进行二次校验与签名防篡改，禁止信任客户端提交的隐藏表单值；如暂无法升级，应在服务端移除对隐藏字段的依赖、改用会话存储订单状态作为临时缓解。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "SalesCart 购物车应用程序表单字段篡改漏洞"
updated = "2026-06-16T21:51:00.290"

