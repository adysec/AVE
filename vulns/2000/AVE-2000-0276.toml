[basic]
description = "Infonautics 公司的 getdoc.cgi 脚本存在安全绕过漏洞，远程攻击者可通过修改表单变量中的特定参数值，绕过文档访问的支付验证阶段，从而未经授权获取付费文档内容。该漏洞影响 Infonautics 相关 Web 应用，攻击条件简单，无需认证即可利用，对文档付费机制造成严重威胁。"
published = "2000-04-12T04:00:00.000"
remediation = "修改 getdoc.cgi 脚本，移除对客户端表单变量的信任：将支付状态验证移至服务端，基于会话（session）或数据库记录判断支付是否完成，而非依赖表单提交的隐藏变量。具体做法是在用户完成支付后，在服务端设置会话标记或写入支付记录，访问文档时查询该记录而非读取表单参数。如无法修改源码，应在 Web 服务器（如 Apache）层面配置该 CGI 脚本的访问控制，要求身份认证后再允许调用。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Infonautics getdoc.cgi 安全绕过漏洞"
updated = "2026-06-16T21:51:24.260"

