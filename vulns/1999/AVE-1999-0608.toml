[basic]
description = "INN（InterNetNews）新闻服务器的 inndstart 程序存在权限提升漏洞，本地攻击者可通过设置 INNCONF 环境变量指定恶意配置文件，使 inndstart 以提升的权限加载并执行该配置，从而获取系统更高权限。该漏洞影响多个 Linux 发行版中的 INN 软件包，攻击者利用此漏洞可完全控制受影响系统。厂商已发布安全补丁进行修复。"
published = "1999-05-11"
remediation = "升级 INN 至 2.2.2 及以上版本，该漏洞已在后续版本中修复。如无法升级，可移除 inndstart 程序的 SUID 位（chmod u-s /usr/bin/inndstart），阻止普通用户通过 INNCONF 环境变量加载恶意配置文件提权。同时限制对 INN 配置目录的写入权限。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "ISC INN 本地权限提升漏洞"
updated = "1999-05-11"

