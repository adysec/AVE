[basic]
description = "Microsoft IIS 3.0 和 4.0 存在源代码泄露漏洞，当服务器默认语言设置为中文、韩文或日文等双字节字符集（DBCS）语言时，IIS 对请求中的双字节字符处理存在缺陷，未经身份认证的远程攻击者可通过构造包含特殊编码字符的 URL 请求，绕过服务器对脚本文件的保护机制，直接查看 ASP、HTR 等服务器端脚本文件的源代码内容。该漏洞影响 Windows NT 4.0 系统上安装的 IIS 3.0 和 IIS 4.0，攻击者无需任何凭据即可利用，可能导致敏感信息泄露，包括数据库连接字符串、业务逻辑代码等关键信息。"
published = "1999-08-19T04:00:00.000"
remediation = '建议将 Microsoft IIS 升级到 4.0 的累积安全补丁或升级至 IIS 5.0（随 Windows 2000 提供）以消除双字节代码页漏洞。如无法立即升级，可在 IIS 管理控制台中关闭对中文、韩文、日文的双字节代码页支持，并为受影响的脚本目录移除"读取"权限、仅保留"脚本"执行权限，同时在前端代理层对包含高位字节（0x81–0xFE 后接 0x40–0xFE）的请求路径进行过滤拦截作为临时缓解措施。'
score = 7.1
severity = "HIGH"
sources = ["exploitdb"]
title = "Microsoft IIS 3.0/4.0 双字节代码页远程源码泄露漏洞"
updated = "2026-06-16T21:48:55.577"

