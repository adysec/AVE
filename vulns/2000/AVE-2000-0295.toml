[basic]
description = 'Microsoft IIS 4.0 和 5.0 的 IISADMPWD 虚拟目录组件存在输入验证缺陷，当该虚拟目录启用时，远程攻击者可通过向 inetinfo.exe 发送特制的畸形 HTR 请求（即"Undelimited .HTR Request"漏洞），触发服务进程崩溃，导致拒绝服务。该漏洞影响 Windows 平台运行 IIS 4.0 和 5.0 的服务器系统，CVSS 评分 5.0，危害等级中危。攻击者无需任何身份认证即可远程利用，但无法实现代码执行，仅能造成 Web 服务中断。'
published = "2000-05-10T04:00:00.000"
remediation = "立即安装 Microsoft 安全公告 MS00-031 补丁（已被 MS01-004 取代），或从 IIS 管理器的应用程序映射中移除 .HTR 脚本映射（ISAPI 扩展）。如果业务不需要 Web 密码管理功能，删除 .HTR 映射是根除此漏洞的最彻底方案。对于仍运行 IIS 4.0/5.0 的环境，建议升级至受支持的 IIS 版本。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Microsoft IIS 4.0/5.0 HTR Request 拒绝服务漏洞"
updated = "2026-06-16T21:51:26.273"

