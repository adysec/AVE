[basic]
description = "Yahoo Pager/Messenger 即时通讯客户端存在缓冲区溢出漏洞，远程攻击者可通过向目标用户发送包含超长 URL 的即时消息触发该漏洞，导致目标客户端程序崩溃，造成拒绝服务。攻击无需身份认证即可远程发起，攻击复杂度低，但仅影响客户端可用性，不涉及数据机密性与完整性。该漏洞 CVSS v2 评分为 5.0，危害等级中等。"
published = "1999-10-01"
remediation = "Yahoo Pager/Messenger 已停止维护且官方不再提供安全更新，建议立即卸载该软件，改用其他受支持的即时通讯客户端。如因业务必须使用，应避免点击消息中来自不可信来源的超长 URL，并在网络边界配置入侵检测规则过滤异常载荷。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "多种Unix系统 Pager工具 缓冲区溢出拒绝服务漏洞"
updated = "1999-10-01"

