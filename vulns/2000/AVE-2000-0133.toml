[basic]
description = "Zeus Web Server 3.x 存在空字符截断漏洞，远程攻击者通过在 URL 末尾添加空字符（%00）可绕过服务器访问控制，导致 CGI 程序源代码被泄露。该漏洞利用方式简单，无需身份认证，仅需向目标 Web 服务器发送特制 HTTP 请求即可触发。影响 Zeus Web Server 3.x 全版本，可导致敏感信息泄露，为后续攻击提供铺垫。"
published = "2000-02-08T05:00:00.000"
remediation = "升级 Zeus Web Server 至 4.0 或更高版本，该版本已修复空字符截断问题。如无法升级，在反向代理或 WAF 层面过滤 URL 中的 %00 空字符，并确保 Web 服务器对 CGI 脚本路径进行严格的输入验证，拒绝包含空字节的请求。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Zeus Web Server CGI 源码信息泄露漏洞"
updated = "2026-06-16T21:51:06.133"

