[basic]
description = "MIT Kerberos 4.0/5 1.0/5 1.1/5 1.1.1 版本 KDC（密钥分发中心）程序中的 set_tgtkey 函数存在缓冲区溢出漏洞（CWE-120），远程攻击者可通过向 lastrealm 变量发送超长数据触发该溢出，导致 KDC 服务崩溃，造成拒绝服务。该漏洞影响 MIT Kerberos 4.0 至 5.1.1.1 版本，攻击者无需认证即可远程利用，CVSS 评分 5.0，危害等级中等。厂商已发布补丁修复此漏洞。"
published = "2000-06-09T04:00:00.000"
remediation = "将 MIT Kerberos 5 升级至 krb5-1.2 或更高版本，或从 MIT 安全公告页下载并应用针对 krb5-1.0.x/krb5-1.1.1 的补丁（将 set_tgtkey 函数中的 strcpy 替换为 strncpy 并添加边界检查）。对于 MIT Kerberos 4 Patch 10，应用 MIT 提供的专用补丁。对于 KTH-krb4，升级至 0.10 或更高版本。如无法立即升级 KDC，可考虑迁移至 Heimdal（不受影响）作为替代方案。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "MIT Kerberos KDC set_tgtkey 缓冲区溢出拒绝服务漏洞"
updated = "2026-06-16T21:51:58.157"

