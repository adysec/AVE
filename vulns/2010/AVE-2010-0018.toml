[basic]
description = "Joomla! 的 JInventory 组件（com_jinventory）1.23.02 及之前版本中存在目录遍历漏洞，远程攻击者可通过向 index.php 的 controller 参数传递包含 ../ 的路径序列，绕过权限检查读取服务器上的任意文件，导致敏感信息泄露。该漏洞影响 JInventory 1.26.03 之前的所有版本，攻击无需身份认证，利用难度低。"
published = "2010-04-08T16:30:00.843"
remediation = "升级 JInventory 组件至 1.26.03 或更高版本，该版本修复了 controller 参数中的目录遍历漏洞。如无法立即升级，在 Joomla! 全局配置中启用「输入过滤」或通过 .htaccess 规则拦截包含 `..` 的 controller 参数请求作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["nuclei"]
title = "Joomla! JInventory 本地文件包含漏洞"
updated = "2026-06-16T23:18:03.933"

