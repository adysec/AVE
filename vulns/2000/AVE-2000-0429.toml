[basic]
description = "HP-UX操作系统SNMPD服务存在文件权限漏洞，该服务存储SNMP配置文件的权限设置不当，导致未授权攻击者可以读取或修改配置文件。攻击者可通过网络请求访问/snmpd.conf等敏感文件，获取系统配置信息，破坏SNMP服务正常运行，甚至可能利用配置漏洞提升系统权限。该漏洞影响HP-UX 10.20和11.0版本，攻击无需身份验证即可执行，安全风险极高。"
published = "2000-06-07"
remediation = "升级 HP-UX 至 11.0 补丁 PHNE_20004 或 10.20 补丁 PHNE_19987 修复 SNMPD 文件权限漏洞；或临时修改 /var/adm/snmpd/.snmpd 文件权限为 600 (chmod 600 /var/adm/snmpd/.snmpd) 并限制 snmpd 进程权限，防止非特权用户读取敏感配置文件。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "HP-UX 10.20/11.0 文件权限漏洞"
updated = "2000-06-07"

