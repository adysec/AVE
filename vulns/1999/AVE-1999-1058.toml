[basic]
description = "ICQ ActiveList Server 存在拒绝服务漏洞。远程攻击者无需身份认证即可向服务器监听的 UDP 端口发送特制的畸形数据包，导致 ActiveList 服务进程崩溃，严重时引发 Windows NT 系统蓝屏死机（BSOD）。该漏洞影响运行于 Windows NT 4.0 平台的 ICQ ActiveList Server，CVSS v2.0 评分 5.0，危害等级中危。攻击者只需发送非标准的原始 UDP 数据包即可触发，无需复杂利用条件。"
published = "1999-10-17T04:00:00.000"
remediation = "ICQ ActiveList Server 已停止维护，建议立即迁移至受支持的即时通讯服务或替代方案。如无法替换，应在防火墙层面限制对 ActiveList Server UDP 端口的访问，仅允许可信 IP 段连接，并部署入侵检测系统监控异常 UDP 报文。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "ICQ ActiveList Server UDP 数据包崩溃拒绝服务漏洞"
updated = "2026-06-16T21:50:14.200"

