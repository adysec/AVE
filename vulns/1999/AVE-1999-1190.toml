[basic]
description = "Seapine TestTrack 服务器存在拒绝服务漏洞，远程攻击者可通过向端口 99 发送 TCP 连接请求后立即断开连接（不发送任何数据）的方式，触发 TestTrackWeb.exe 和 ttcgi.exe 进程 CPU 占用率飙升，导致服务器响应缓慢或服务不可用。该漏洞无需认证即可远程利用，攻击门槛低，影响 Seapine TestTrack 服务器的正常运行。"
published = "1999-03-08T05:00:00.000"
remediation = "升级 Seapine TestTrack 至官方修复版本，或在防火墙/主机层面限制仅允许可信 IP 访问 TCP 端口 99，并对 TestTrackWeb.exe 和 ttcgi.exe 设置连接超时与速率限制，防止空连接耗尽 CPU 资源。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Seapine TestTrack 远程拒绝服务漏洞"
updated = "2026-06-16T21:50:43.967"

