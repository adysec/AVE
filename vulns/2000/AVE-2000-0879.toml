[basic]
description = "xpdf PDF 查看器 0.91 之前版本在处理 PDF 文档中嵌入的 URL 时，未对 URL 中的 shell 元字符进行正确过滤和转义，导致远程攻击者可通过构造包含恶意 URL 的特制 PDF 文件，诱使用户打开后触发命令注入漏洞，从而在目标系统上以当前用户权限执行任意命令。该漏洞影响所有 xpdf 0.91 之前版本，CVSS 评分 7.6，危害等级高。"
published = "2000-10-20T04:00:00.000"
remediation = "升级 xpdf 至 0.91 或更高版本。Debian 用户安装 xpdf 安全更新（参考 DSA-20000910a），Red Hat 用户应用 RHSA-2000-060 提供的更新包，Caldera 用户安装 CSSA-2000-031.0 补丁。如无法升级，避免在 xpdf 中点击 PDF 文档内的嵌入式 URL 链接。"
score = 7.6
severity = "HIGH"
sources = ["cve"]
title = "xpdf PDF Viewer 远程代码执行漏洞"
updated = "2026-06-16T21:52:21.320"

