[basic]
description = "OpenSource Printer 存在未授权访问漏洞，远程攻击者无需身份认证即可通过发送特制的打印任务强制目标打印机输出任意文档，或导致打印机进入瘫痪状态无法正常使用。该漏洞主要影响未设置访问密码的打印机，攻击者通过网络直接访问打印服务即可发起攻击，造成敏感信息泄露、纸张浪费或拒绝服务等后果。"
published = "1999-01-01T05:00:00.000"
remediation = "在打印机的管理界面中启用密码认证功能，配置强密码并限制仅授权用户可以提交打印任务；同时通过防火墙或网络访问控制列表（ACL）仅允许受信任的 IP 地址访问打印机端口，阻止外部未授权访问。建议升级到支持认证机制的最新固件版本，并在无法立即升级时暂时禁用远程打印功能，仅允许本地打印以降低风险。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "开源打印机远程安全漏洞"
updated = "2026-06-16T21:48:38.820"

