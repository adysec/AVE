[basic]
description = "Vipul Razor Agents（razor-agents）2.70 之前版本在处理异常 HTML 消息及畸形 Content-Type 等头部时存在缺陷，远程攻击者无需认证即可通过发送特制的畸形数据包触发该漏洞，导致目标服务崩溃或拒绝服务。该漏洞影响 Vipul Razor Agents 2.70 之前所有版本，CVSS 评分 5.0，危害等级中危。厂商已发布更新修复此漏洞，建议用户升级至 2.70 或更高版本。"
published = "2005-06-17T04:00:00.000"
remediation = """建议将 Vipul's Razor (razor-agents) 升级至 2.74 或更高版本。Debian Sarge 用户可通过 `apt-get install razor=2.670-1` 升级，Gentoo 用户执行 `emerge --sync && emerge --oneshot --verbose ">=mail-filter/razor-2.74"`。SpamAssassin 用户应同步升级至 3.0.4 以上版本。无临时缓解措施，建议尽快升级。"""
score = 5
severity = "MEDIUM"
sources = ["tenable"]
title = "Vipul razor-agents 拒绝服务漏洞"
updated = "2026-06-16T22:14:05.897"

