[basic]
description = "NetBSD 操作系统的 ARP 协议实现存在安全缺陷，系统在接收到 ARP 数据包时未对静态 ARP 条目进行有效保护。攻击者只要处于同一局域网二层广播域中，即可通过构造并发送伪造的 ARP 数据包（ARP 欺骗/ARP 毒化），使内核用攻击者提供的 MAC 地址覆盖管理员预先手动配置的静态 ARP 映射。该漏洞影响运行 NetBSD 且配置了静态 ARP 条目的主机，攻击无需身份认证，仅需网络可达。利用成功后，攻击者可实施中间人攻击、流量劫持或拒绝服务，进而监听或篡改目标主机与其他设备之间的通信।"
published = "1999-05-01T04:00:00.000"
remediation = "升级 NetBSD 到 1.4 及以上版本或应用特定安全补丁：https://ftp.NetBSD.org/pub/NetBSD/misc/security/patches/19990208-netstat，该补丁修复了 ARP 协议相关的内核内存访问控制问题。此外，如无法立即更新，可以通过 `chmod 400 /usr/sbin/netstat` 禁止非根用户访问 netstat 命令以缓解该 ARP 条目覆盖漏洞。"
score = 6.4
severity = "MEDIUM"
sources = ["cve"]
title = "NetBSD ARP 协议实现安全缺陷（ARP 欺骗）"
updated = "2026-06-16T21:49:00.597"

