[basic]
description = "Aptis Software TotalBill 3.0 的 sysgen 服务未实现身份认证机制，远程攻击者可直接连接该服务并指定待执行命令，导致未经授权的远程命令执行。攻击者无需任何认证即可利用该漏洞，获取目标系统的 root 权限，实现完全控制。该漏洞影响 TotalBill 3.0 版本，CVSS v2 评分 10.0，危害极高。"
published = "2000-10-20"
remediation = "立即在防火墙层面限制对 TotalBill sysgen 服务（默认端口）的访问，仅允许受信任管理 IP 连接。由于 Aptis Software 已停止维护，建议升级到替代计费系统或完全禁用 sysgen 服务，避免暴露未经认证的远程命令执行接口。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Aptis Software TotalBill 3.0 远程命令执行漏洞"
updated = "2000-10-20"

