[info]
author = "ave"
description = "验证 SCO UnixWare 7.1 的 pkg 命令（pkginfo、pkgcat、pkgparam 等）是否可通过 dacread 权限读取系统任意文件。该漏洞为本地权限问题，需在目标主机上以本地用户身份执行命令，尝试读取如 /etc/shadow 等受限文件以确认漏洞存在。"
id = "POC-AVE-1999-0614"
name = "CVE-1999-0828 UnixWare pkg 命令本地任意文件读取 PoC"
severity = "low"
tags = ["ave-1999-0614"]
vuln_id = [
    "CVE-1999-0828",
    "AVE-1999-0614",
]

[poc]
logic = "all"

[[poc.requests]]
path = "/etc/shadow"
protocol = "file"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["root:"]
