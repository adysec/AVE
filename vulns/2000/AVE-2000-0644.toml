[basic]
description = "该漏洞存在于AIX 4.2/4.3系统中的netstat命令中，该命令对-Zi选项缺乏访问控制验证。当本地用户在系统中执行netstat -Zar时，他们可以清除网络接口的统计信息，并可能因此对异常的网络活动进行伪装，以隐藏攻击痕迹。攻击者无需身份验证即可利用此漏洞清除系统网络统计数据，影响范围限于本地用户，能够对网络审计和异常检测造成严重干扰。该漏洞源于netstat程序未能对其特权选项进行充分的权限验证，攻击者可以轻易通过调用netstat的-Zi选项清除所有网络接口统计数据，随后直接从系统中抹除任何可疑的活动记录，导致安全工具无法获取有效的证据支持。"
published = "2000-11-14T05:00:00.000"
remediation = "建议升级 AIX 至 4.3.3 维护级别 08 或更高版本（安装 IBM 官方补丁 IY16543/IY16544），或通过 chmod 700 /usr/sbin/netstat 限制 netstat 执行权限仅限 root，配合 sudo 限制普通用户执行 netstat -Zi 参数，并开启 AIX 审计子系统 (audit) 监控 netstat -Zi 执行记录以便审计异常网络统计清除行为。"
score = 2.1
severity = "LOW"
sources = ["cve"]
title = "IBM AIX netstat -Zi 选项访问控制不当漏洞"
updated = "2026-06-16T21:52:38.860"

