[basic]
description = "佳能（Canon）多款小型办公多功能打印机和激光打印机在处理 CPCA 文件删除时存在无效释放（Invalid Free）漏洞（CWE-763）。同一网段的攻击者可通过发送特制请求触发该漏洞，导致打印机服务无响应或执行任意代码。受影响机型包括 Satera LBP670C/MF750C 系列、Color imageCLASS LBP630C/MF650C 系列、i-SENSYS LBP630C/MF650C 系列及 imageRUNNER 1643i 系列等，固件版本 v06.02 及更早版本均受影响。CVSS 评分 9.3，危害等级严重。"
published = "2026-01-16T00:16:27.597"
remediation = "立即将受影响佳能打印机/复合机固件升级至 v06.02 之后的最新版本，可通过 Canon 官方支持网站下载对应型号的固件更新包。同时，切勿将设备直接暴露在公网，应将其部署在防火墙或路由器后的私有网络环境中，使用私有 IP 地址，并禁用不必要的网络服务（如 BJNP 服务）以降低攻击面。"
score = 9.3
severity = "CRITICAL"
sources = ["zdi"]
title = "佳能 多款激光打印机与多功能一体机 CPCA 文件删除处理无效释放漏洞"
updated = "2026-06-17T08:35:34.937"

