[basic]
description = "Stalkerlab Mailers 1.1.2 中的 CGIMail.exe CGI 程序存在任意文件读取漏洞。远程攻击者可通过向 $Attach$ 隐藏表单变量中指定目标文件路径，利用该 CGI 程序的文件读取功能获取服务器上的任意文件内容，如配置文件、密码文件等敏感信息。该漏洞攻击复杂度低，无需身份认证，影响运行 Stalkerlab Mailers 1.1.2 的 Web 服务器，CVSS 评分 2.6，危害等级低。"
published = "2000-10-20T04:00:00.000"
remediation = "建议立即删除或禁用 Stalkerlab Mailers 1.1.2 中的 CGIMail.exe 文件；如业务需要保留该功能，升级到已修复此漏洞的最新版本（若厂商已停止维护则迁移至其他受支持的邮件网关产品），同时在 Web 服务器层面对该 CGI 程序添加 IP 白名单访问控制，并严格过滤 $Attach$ 参数中的路径遍历字符（如 ../）作为临时缓解措施。"
score = 2.6
severity = "LOW"
sources = ["cve"]
title = "Stalkerlab Mailers CGIMail 任意文件读取漏洞"
updated = "2026-06-16T21:52:21.180"

