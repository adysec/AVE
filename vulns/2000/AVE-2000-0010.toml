[basic]
description = "Nortel Networks Optivity NETarchitect 2.0 中的 bna_pass 程序调用系统 rm 命令时使用了受环境变量 PATH 影响的搜索路径，未指定绝对路径，导致本地攻击者可通过修改 PATH 环境变量将其指向恶意程序，从而以目标程序权限执行任意命令。此漏洞需要本地用户权限，利用难度较低。"
published = "1999-12-29"
remediation = "Nortel 已停止运营，官方无补丁可用。建议迁移至替代网络管理方案，并移除 bna_pass 程序的 SUID 权限（chmod -s /opt/bna/bin/bna_pass）。同时确保系统 PATH 环境变量在调用前重置为安全值，避免使用相对路径调用系统命令。"
score = 7.2
severity = "HIGH"
sources = ["cve"]
title = "Nortel Networks Optivity NETarchitect 本地命令执行漏洞"
updated = "2026-06-16"

