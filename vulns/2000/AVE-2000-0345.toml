[basic]
description = 'George Burgyan CGI Counter 4.0.2 和 4.0.7 版本存在输入验证漏洞，攻击者可通过构造恶意的查询字符串参数（如 "count" 参数）向 CGI 计数器程序发送特制请求，利用程序对用户输入缺乏有效过滤和验证，导致命令注入或任意命令执行。该漏洞影响使用受影响版本 CGI Counter 的 Web 服务器，攻击者无需身份认证即可远程发起攻击，通过构造包含 shell 元字符（如分号、反引号、管道符）的参数值，在服务器上以 Web 服务器进程权限执行任意系统命令，可能导致服务器完全被攻控。攻击条件为目标服务器部署了受影响版本的 CGI Counter 且 CGI 执行权限配置不当。攻击者可通过构造类似 `/cgi-bin/counter?count=;cat+/etc/passwd` 的恶意 URL 实现远程命令执行，获取服务器敏感信息或进一步控制服务器。建议升级至修复版本或禁用该 CGI 程序。'
published = "2000-05-15"
remediation = "立即将 George Burgyan CGI Counter 从 4.0.2/4.0.7 升级到最新可用版本或卸载该软件。该软件已停止维护，无法获得安全补丁。作为临时缓解措施，禁止访问 cgie/private 目录并限制 CGI 脚本执行权限至仅限 root 用户。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "George Burgyan CGI Counter 4.0.2/4.0.7 输入验证漏洞"
updated = "2000-05-15"

