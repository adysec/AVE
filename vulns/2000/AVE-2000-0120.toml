[basic]
description = "Check It Out 购物车应用程序存在敏感信息修改漏洞，远程攻击者可通过修改页面中隐藏表单字段的值来篡改购物车中的商品价格、数量等关键交易信息，从而以低于实际价格的金额完成购买，造成商户经济损失。该漏洞利用难度较低，无需身份认证即可远程触发。"
published = "2000-02-01T05:00:00.000"
remediation = "将 Check It Out 购物车应用升级至最新版本，在服务端对所有表单字段进行严格校验，禁止直接信任客户端提交的隐藏字段值；对价格、数量等敏感参数使用服务端会话存储而非客户端表单传递，并实施签名或 HMAC 机制防止篡改。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "Check It Out 购物车应用隐藏表单字段敏感信息篡改漏洞"
updated = "2026-06-16T21:51:04.273"

