[basic]
description = 'Mikoviny WP Custom Pages 模块（WordPress 插件，版本 0.5.0.1）的 wp-download.php 文件存在目录遍历（路径遍历）漏洞，属于 CWE-22 类型。该脚本在处理用户传入的 `url` 参数时未对路径进行充分校验与规范化，远程攻击者可在 `url` 参数中插入经过 URL 编码的 `..%2F`（即编码后的"点点斜杠"）序列，借此跨越 Web 根目录限制并读取服务器上的任意文件（如配置文件、源码或敏感系统文件）。该漏洞影响所有安装并使用此插件 0.5.0.1 版本的 WordPress 站点，利用条件仅需攻击者能够网络访问目标站点的 wp-download.php 接口，无需身份认证，通过构造恶意 HTTP 请求即可实现任意文件读取。'
published = "2011-04-10T02:51:20.167"
remediation = "建议立即升级 WordPress 插件 WP Custom Pages 至 0.5.0.2 或更高版本（官方已修复该目录遍历漏洞）。如暂时无法升级，可通过 Web 应用防火墙（WAF）或 Nginx/Apache 配置规则拦截包含 `..%2F` 或 `../` 等路径遍历序列的 `url` 参数请求，或临时禁用该插件的 `wp-download.php` 文件访问权限作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["nuclei"]
