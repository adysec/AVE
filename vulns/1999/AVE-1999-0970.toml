[basic]
description = "Cisco Catalyst 2900系列虚拟局域网交换机在处理802.1q中继标记时存在安全漏洞。远程攻击者可通过伪造中继标签中的VLAN标识符，将精心构造的802.1q帧注入到目标VLAN中，从而绕过VLAN隔离机制，实现跨VLAN访问。该漏洞允许攻击者访问本应隔离的VLAN网络资源，可能导致敏感信息泄露。攻击者需要能够发送特制的802.1q帧到目标交换机，无需身份认证即可利用。"
published = "1999-09-01"
remediation = "升级Cisco Catalyst 2900系列交换机至修复该漏洞的IOS版本，或配置VLAN访问控制列表(ACL)限制跨VLAN流量，禁用不必要的中继端口并采用VLAN安全最佳实践。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "Cisco Catalyst 2900系列VLAN交换机802.1q帧注入漏洞"
updated = "2026-06-16"

