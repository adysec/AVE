[basic]
description = "mgetty 1.1.22 在处理文件写入操作时存在符号链接（symlink）竞争条件漏洞。在特定配置下，本地攻击者可通过在临时目录中创建恶意符号链接，诱使 mgetty 进程将数据写入攻击者指定的任意文件路径，从而实现任意文件覆盖。该漏洞利用需要本地系统访问权限且依赖特定配置环境，攻击复杂度较高，但成功利用后可导致系统文件被篡改，影响系统完整性。"
published = "2001-03-12T05:00:00.000"
remediation = "升级 mgetty 至 1.1.24 或更高版本（该版本已修复临时文件创建中的竞态条件问题）。各发行版用户请安装对应安全更新：Debian 安装 DSA-011 更新包，Red Hat 安装 RHSA-2001-050 更新包，Mandrake 安装 MDKSA-2001-009 更新包。临时缓解措施：确保 /tmp 目录设置粘滞位（sticky bit），并限制不可信用户本地登录。"
score = 1.2
severity = "LOW"
sources = ["redhat"]
title = "mgetty 任意文件写入漏洞"
updated = "2026-06-16T21:53:44.993"

