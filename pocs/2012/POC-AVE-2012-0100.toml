[info]
author = "ave"
description = "检测 Adobe Flash Player 11.3.300.271（Windows/Mac）及 11.2.202.238（Linux）之前版本中的字体解析远程代码执行漏洞（CVE-2012-1535）。通过检查目标系统 Flash Player 版本号判断是否存在漏洞，该漏洞已被 CISA KEV 收录并在野利用。"
id = "POC-AVE-2012-0100"
name = "Adobe Flash Player 字体解析远程代码执行漏洞 PoC"
severity = "high"
tags = ["ave-2012-0100"]
vuln_id = [
    "CVE-2012-1535",
    "AVE-2012-0100",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/crossdomain.xml"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["flash"]
