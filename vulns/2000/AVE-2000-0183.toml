[basic]
description = "htsearch CGI 程序在处理用户参数时未正确过滤反引号（`）字符，远程攻击者可通过向 htsearch 传递包含反引号包裹的文件名参数，利用命令执行上下文读取服务器上任意文件。该漏洞影响 ht://Dig 3.1.1 至 3.2.0b1 版本，攻击者无需认证即可利用，可能导致敏感信息泄露。"
published = "2000-02-29T05:00:00.000"
remediation = "立即升级 ht://Dig 至 3.2.0b3 或更高版本，该版本已修复 htsearch CGI 对用户输入参数的反引号（backtick）过滤不严问题。如无法升级，应修改 htsearch 脚本源码，对用户传入的 `config`、`restrict`、`format` 等参数中的反引号、$() 等 shell 元字符进行严格转义或拒绝；同时在 Web 服务器（Apache/Nginx）层面禁止对 htsearch CGI 的匿名外部访问，仅允许内网可信 IP 调用，或直接移除该 CGI 程序。ht://Dig 已停止维护，建议迁移至其他活跃的站内搜索方案（如 Apache Solr 或 Meilisearch）。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "ht://Dig Group ht://Dig htsearch 任意文件包含漏洞"
updated = "2026-06-16T21:51:13.673"

