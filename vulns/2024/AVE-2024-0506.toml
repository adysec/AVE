[basic]
description = "Linux 内核调度器中的 sched_setaffinity 系统调用存在竞态条件漏洞。当任务的 CPU 亲和性设置与 cpuset 控制组更新同时发生时，由于验证逻辑不完善，内核会误触发 WARN 告警。本地攻击者可通过在 cpuset cgroup 中反复切换 CPU 范围并同时设置目标进程的 CPU 亲和性来利用此漏洞，导致内核输出告警信息，可能引发拒绝服务。该漏洞影响 Linux 内核各版本，CVSS 评分 5.5，危害等级中等。"
published = "2025-01-11T13:15:20.930"
remediation = "建议立即升级 Linux 内核至 6.12.5 或更高版本，该版本已包含修复补丁（提交 5c3fb75f538c / 70ee7947a290）。如无法立即升级，可通过内核启动参数添加 `sched_setaffinity_warning=0` 临时抑制相关警告，或在生产环境中使用 cgroup 限制非特权用户的 cpuset 操作权限作为缓解措施。"
score = 5.5
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux Kernel 调度器 sched_setaffinity CPU 亲和性竞态条件漏洞"
updated = "2026-06-17T07:48:28.710"

