[basic]
description = 'Phorum 3.0.7 的 auth.php3 认证脚本中存在后门访问漏洞。远程攻击者只需在 HTTP 请求中将 `PHP_AUTH_USER` 参数设置为特殊字符串 "boogieman"，即可绕过身份验证机制，直接访问受限的 Web 页面。该漏洞利用门槛极低，无需任何权限即可实施，可能导致敏感信息泄露或未授权操作。厂商至今未发布官方补丁，建议迁移至更高版本或采取 WAF 规则等缓解措施。'
published = "2000-12-31T05:00:00.000"
remediation = '立即升级 Phorum 至 3.0.8 及以上版本，该版本已移除 auth.php3 中的后门代码。如无法升级，手动编辑 auth.php3 文件，删除所有对 PHP_AUTH_USER 参数值为 "boogieman" 的特殊权限绕过逻辑，并在 Web 服务器层（如 .htaccess）对该文件增加 IP 访问控制或设置认证保护。'
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Phorum 3.0.7 auth.php3 后门访问漏洞"
updated = "2026-06-16T21:53:25.707"

