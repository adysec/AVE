[basic]
description = "Mutt 邮件客户端在处理特制邮件时未正确过滤 shell 元字符，远程攻击者可通过发送包含恶意构造的邮件触发该漏洞，导致在目标系统上执行任意命令。该漏洞影响 Mutt 邮件客户端多个版本，攻击者无需身份认证即可利用，危害等级高。"
published = "1998-07-28T04:00:00.000"
remediation = "升级到 mutt 1.0 及以上版本，该版本修复了 shell 元字符注入问题。如无法升级，避免使用 mutt 处理不可信邮件内容，或限制 mutt 执行环境权限作为临时缓解措施。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "Mutt 邮件客户端远程代码执行漏洞"
updated = "2026-06-16T21:49:22.417"

