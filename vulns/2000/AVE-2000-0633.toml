[basic]
description = "YaBB Bulletin Board 9.1.2000 存在目录遍历漏洞，远程攻击者可通过向服务器发送包含 `../` 序列的特制 HTTP 请求，绕过路径限制读取服务器上的任意文件（如 `/etc/passwd` 等敏感文件）。该漏洞源于对用户输入的路径参数缺乏充分的过滤与校验，攻击无需身份认证，利用难度低，可导致敏感信息泄露。"
published = "2000-11-14T05:00:00.000"
remediation = '升级 YaBB 至 9.1.2000 之后的版本，或手动在 CGI 脚本中对用户输入的文件名参数过滤 `../` 及 `..\` 等路径遍历字符，禁止访问非 `www` 目录外的文件。如无法升级，可在 Web 服务器层（如 Apache 的 `mod_rewrite`）限制对 `cgi-bin` 目录的访问范围。'
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "YaBB Bulletin Board 9.1.2000 任意文件读取漏洞"
updated = "2026-06-16T21:52:36.267"

