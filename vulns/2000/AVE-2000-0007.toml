[basic]
description = "strace 是一款 Linux/Unix 系统下的系统调用跟踪调试工具，其在处理内存映射文件名时存在缺陷，导致本地普通用户可利用 strace 跟踪其他进程系统调用的功能，通过构造特定的内存映射文件名来读取任意文件内容。该漏洞影响 strace 多个版本，攻击者需要拥有本地系统访问权限，无法远程利用，危害等级较低。厂商已发布修复版本，建议用户升级至最新版 strace。"
published = "1999-12-25T05:00:00.000"
remediation = "strace 4.4 之前的版本在解析 /proc/self/maps 时未正确限制内存映射文件名的读取权限，导致本地低权限用户可通过 trojan 程序配合 strace 读取任意文件内容。建议将 strace 升级至 4.4 或更高版本；如无法升级，应移除 strace 的 suid 权限位（`chmod u-s /usr/bin/strace`）并限制仅 root 用户可执行，同时避免在多用户环境下赋予不可信用户 strace 执行权限。"
score = 2.6
severity = "LOW"
sources = ["avd"]
title = "strace 任意文件读取漏洞"
updated = "2026-06-16T21:50:48.500"

