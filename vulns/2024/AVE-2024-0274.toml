[basic]
description = "LiveBOS 灵动业务架构平台在 UploadFile.do 接口中存在文件上传漏洞。该接口未对上传文件的类型与路径进行充分校验，攻击者在无需身份认证的情况下，可通过构造畸形的 multipart/form-data 请求（如利用 `UploadFile.do;.css.jsp` 这类路径混淆技巧）将恶意 JSP 脚本文件上传至服务器可解析目录，从而触发远程代码执行（RCE）。该漏洞影响使用 LiveBOS 灵动业务架构平台且对外开放该接口的相关业务系统，攻击条件仅需目标系统网络可达且接口未做访问限制，危害等级较高。"
published = "0807"
remediation = '建议立即将灵动业务架构平台（LiveBOS）升级至官方已修复该文件上传漏洞的安全版本（请联系厂商获取并部署最新补丁包）。如暂时无法升级，可在 Web 应用防火墙（WAF）上拦截对 /feed/UploadFile.do 路径及包含 ";.css.jsp" 后缀的恶意 multipart 上传请求，同时限制上传目录的执行权限、关闭不必要的文件上传接口，并仅允许受信任 IP 访问后台服务作为临时缓解措施。'
score = 5
severity = "MEDIUM"
