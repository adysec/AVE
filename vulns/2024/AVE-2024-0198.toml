[basic]
description = "泛微 e-cology 9 协同办公系统的 WorkflowServiceXml WebService 接口存在 SQL 注入漏洞。该接口在处理 SOAP 请求（如 getHendledWorkflo 等方法）时，未对 XML 报文中的用户输入参数进行严格的过滤与参数化校验，导致攻击者可在 POST 请求 `/services/WorkflowServiceXml` 的 SOAP Body 中构造恶意 SQL 语句，直接拼接至后端数据库查询。未经身份认证的远程攻击者只需发送特制的 SOAP/XML 数据包即可利用该漏洞，进而读取、篡改数据库内容，甚至在特定条件下实现远程代码执行。该漏洞影响使用 WorkflowServiceXml 接口的泛微 e-cology 9 系列产品，危害程度较高，厂商已发布相应安全补丁，建议受影响的用户及时升级修复。"
published = "0724"
