[basic]
description = "华为 HarmonyOS 的 IPC 进程间通信模块存在竞争条件漏洞（CWE-416 Use After Free），攻击者在低权限条件下通过网络向目标系统发送特制的 IPC 请求，由于模块在处理并发访问时未正确同步释放后的内存引用，可触发释放后使用，导致系统服务不可用。该漏洞影响多版本 HarmonyOS，CVSS 评分 6.4，危害等级中危。"
published = "20260609"
remediation = "建议将 HarmonyOS 系统升级至 6.0.0 及以上版本，该版本已在 2026 年 1 月安全更新中修复了 IPC 模块的竞争条件漏洞。如无法立即升级，可通过 Huawei Support 应用检查系统更新，并在设备端设置中开启「自动更新」确保及时获取补丁。对于受影响的设备，建议限制不可信应用的安装来源以降低攻击面。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "Huawei HarmonyOS IPC 模块竞争条件漏洞"
updated = "20260609"

