[basic]
description = "HP Deskjet 2800 系列打印机嵌入式 Web 服务存在授权缺失漏洞，未经验证的远程攻击者可通过网络访问向暴露的管理 API 端点发送 GET 请求，获取明文 Wi-Fi Direct 凭据、设备唯一标识信息及管理员安全状态配置等敏感数据。该漏洞影响固件版本低于或等于 TBP1CN2612AR 的设备，CVSS 评分 7.5，危害等级高。受影响的设置页面在正常 Web 界面访问时需管理员认证，但底层 API 端点缺乏权限校验导致信息泄露。"
published = "2026-07-06T19:16:55.963"
remediation = "立即将 HP Deskjet 2800 系列打印机固件升级至高于 TBP1CN2612AR 的版本，可通过 HP 官方支持网站下载最新固件。如无法立即升级，请在网络防火墙或路由器上限制仅允许受信任的管理 IP 地址访问打印机 80/443 端口，并禁用打印机 Web 服务的远程访问功能。"
score = 7.5
severity = "HIGH"
sources = ["hwpoc"]
title = "HP Deskjet 2800 系列打印机未授权访问漏洞"
updated = "2026-07-06T20:16:29.737"

