[basic]
description = "Windows NT 4.0 及 Windows 2000 系统的回收站功能存在安全设计缺陷，本地攻击者可通过在 recycler 目录下创建包含受害者安全标识符（SID）的子目录，从而读取或修改其他用户的文件。该漏洞源于回收站对目录权限的访问控制不当，攻击者需拥有本地系统访问权限方可利用，影响范围限于 Windows NT 4.0 和 Windows 2000 系统。CVSS 评分 3.6，危害等级低。"
published = "2000-02-01T05:00:00.000"
remediation = '建议立即升级至 Windows 10 或 Windows Server 2019/2022 等受支持版本，从架构层面消除此漏洞。如无法升级，可禁用回收站功能或通过组策略限制 recycler 目录（%SystemDrive%\RECYCLER）的写入权限，仅允许 SYSTEM 账户完全控制，并在本地安全策略中禁止非管理员交互式登录。临时缓解措施：使用 ICACLS 命令 `icacls %SystemDrive%\RECYCLER /inheritance:r /grant SYSTEM:F Administrators:F /deny Users:(W)` 限制普通用户对回收站目录的写入权限。'
score = 3.6
severity = "LOW"
sources = ["avd"]
title = "Microsoft Windows NT 4.0 回收站预创建文件夹漏洞"
updated = "2026-06-16T21:51:02.643"

