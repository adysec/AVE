[basic]
description = "Mailman 1.1 邮件列表管理软件存在命令注入漏洞，源于 %(listname) 宏扩展功能未对 shell 元字符进行有效过滤。拥有列表管理员权限的本地攻击者可通过构造包含 shell 元字符（如反引号、分号、管道符等）的列表名称，在宏扩展执行期间注入并执行任意系统命令，从而完全控制底层操作系统。该漏洞影响 Mailman 1.1 版本，CVSS 评分 7.2（高危），攻击向量为本地、攻击复杂度低、无需认证、完全影响机密性/完整性/可用性。攻击者需具备列表管理员权限方可利用，通过创建或修改包含恶意 shell 命令的列表名称实现任意代码执行。"
published = "2000-11-14T05:00:00.000"
remediation = "建议将 GNU Mailman 升级至 2.0b5 或更高版本（2.0 正式版）。该漏洞由 %(listname) 宏展开未过滤 shell 元字符导致，2.0b5 起已修复此问题并添加了适当的安全转义。可通过 ports 升级：在 /usr/ports/mail/mailman 目录执行 make reinstall，或从官网下载最新稳定版源码重新编译安装。如短期内无法升级且系统非必需，可暂时卸载 mailman 端口，或通过调整文件系统权限限制普通用户对 mailman 安装目录的访问作为临时缓解措施。"
score = 7.2
severity = "HIGH"
sources = ["cve"]
title = "GNU Mailman Mailman 1.1 代码执行漏洞"
updated = "2026-06-16T21:52:37.287"

