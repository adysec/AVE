[basic]
description = "Knox Software Arkeia 备份软件中的 nlserverd 守护进程存在拒绝服务漏洞，攻击者可通过向目标系统开放的特制端口发送超长字符串触发服务崩溃。该漏洞影响 Arkeia 4.0/4.1 版本，部署在多种操作系统平台上。未经身份验证的远程攻击者无需任何凭据即可利用此漏洞，只需向 nlservd 监听端口发送构造好的长字符串即可导致服务中断，造成拒绝服务。"
published = "1999-09-26T04:00:00.000"
remediation = "升级 Knox Software Arkeia 至 4.2 或更高版本，厂商已修复 nlservd 缓冲溢出及远程拒绝服务漏洞；如无法立即升级，应移除 /usr/knox/bin/nlservd 和 /usr/knox/bin/rnavc 的 SUID 权限（chmod u-s），并在防火墙中限制对 nlservd 服务端口的访问，仅允许受信任的管理主机连接，作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Knox Software Arkeia nlserverd 拒绝服务漏洞"
updated = "2026-06-16T21:49:03.567"

