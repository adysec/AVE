[info]
author = "ave"
description = "通过构造特制 HTTP 页面触发 IE 5.x 的 window.showHelp() 方法加载远程 .chm 文件，验证是否存在安全限制绕过漏洞。仅检测漏洞存在性，不执行恶意载荷。"
id = "POC-AVE-2000-0178"
name = "Internet Explorer 5.x HTML Help Remote Code Execution PoC"
severity = "medium"
tags = ["ave-2000-0178"]
vuln_id = [
    "CVE-2000-0201",
    "AVE-2000-0178",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "header"
type = "word"
words = [
    "MSIE 5.",
    "Internet Explorer 5",
]
