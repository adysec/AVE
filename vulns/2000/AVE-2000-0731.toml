[basic]
description = "Debian 系统自带的 top 进程管理工具中存在格式字符串漏洞，本地攻击者可通过 top 的 kill 或 renice 功能提交特制的格式字符串参数触发该漏洞，导致攻击者能够以 root 权限执行任意代码或读取敏感内存信息。该漏洞影响 Debian 系统多个版本，攻击者需要具备本地用户权限才能利用。"
published = "2000-12-11T05:00:00.000"
remediation = "立即升级 procps 包至已修复版本（Debian 3.0 woody 及以上），或应用 OpenBSD 官方补丁 028_format_strings.patch；FreeBSD 用户安装 FreeBSD-SA-00:62 安全公告对应补丁。临时缓解措施：移除 top 的 SUID 位（chmod u-s /usr/bin/top），限制本地非授信用户登录。"
score = 7.2
severity = "HIGH"
sources = ["exploitdb"]
title = "Debian top 格式字符串本地权限提升漏洞"
updated = "2026-06-16T21:52:56.410"

