[basic]
description = "tags.<value>泛微 ecology9 中的 ImportValidationFieldServlet 接口存在 SQL 注入漏洞，由于对用户传入的参数缺乏充分的过滤与转义处理，攻击者可通过构造特制的 HTTP 请求向数据库注入恶意 SQL 语句，成功利用该漏洞可窃取敏感数据、篡改数据库内容甚至获取服务器控制权。该漏洞影响泛微 ecology9 多个版本，攻击无需认证，仅需网络可达即可远程利用，危害较高。"
published = "0703"
remediation = "立即联系泛微官方获取 ecology9 最新安全补丁包进行升级，或升级至不受影响的最新版本。临时缓解措施：在 WAF/Web 应用防火墙上配置规则，过滤对 /api/ec/dev/js/ImportValidationFieldServlet 接口的 SQL 注入攻击载荷，严格限制该接口的访问来源 IP，并对输入参数进行特殊字符转义处理。"
