[basic]
description = "Red Hat Linux 5.2 i386/6.0 中 su 程序存在日志绕过漏洞。当 su 进程在超时前被强制终止时，系统不会记录失败的密码尝试日志，导致本地攻击者可通过暴力破解方式反复尝试密码而不被审计系统发现。该漏洞降低了暴力破解的门槛，影响 Red Hat Linux 5.2 及 6.0 版本。"
published = "1999-06-09"
remediation = "升级至 Red Hat Linux 6.1 及以上版本，该版本已修复 su 程序在超时前被终止时不记录失败密码的问题。如无法升级，建议使用 sudo 替代 su 进行权限切换，并启用 auditd 审计日志记录所有认证事件，同时限制本地用户登录的并发会话数。"
score = 7.2
severity = "HIGH"
sources = [
    "cve",
    "avd",
]
title = "RedHat Linux su 登录失败日志绕过漏洞"
updated = "2026-06-16"

