[basic]
description = 'tags, and should be at least 50 Chinese characters long.<value>这是一个针对 Joomla! 开源 CMS 的安全漏洞，该组件存在目录穿越漏洞。攻击者可以发送特制的 HTTP 请求，利用 view 参数中的 ".."(目录穿越) 串绕过访问控制，直接访问服务器上的任意文件。通过对 Joomla! 网站进行精心构造的请求，攻击者可以读取敏感文件，例如 /etc/passwd、配置文件、应用程序源代码，甚至是数据库凭证文件。该漏洞影响 Joomla! 1.0 系列的所有版本，攻击无需身份验证即可执行，用户无需登录即可通过普通网络请求访问目标网站，即可发动攻击。漏洞修复措施包括升级到最新版本的 Joomla! CMS，并对第三方组件进行安全审查和代码审计，确保其输入参数能正确进行验证和过滤。'
published = "2010-05-19T20:00:01.507"
