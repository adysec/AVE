[basic]
description = "NetBSD 1.3.3 及更早版本中的 VFS（虚拟文件系统）存在漏洞，本地攻击者可通过 ln 命令创建特制的符号链接文件触发该漏洞，导致系统拒绝服务。该漏洞影响 NetBSD 1.3.3 及之前版本，CVSS 评分为 2.1，危害等级低。攻击者需要拥有本地系统访问权限，利用方式简单，可造成系统不稳定或崩溃。"
published = "1999-04-12T04:00:00.000"
remediation = "升级 NetBSD 至 1.4 或更高版本以修复 VFS 符号链接处理缺陷；若无升级条件，可限制本地用户对 ln 命令的执行权限，或通过内核参数禁用不受信任的符号链接创建操作作为临时缓解。"
score = 2.1
severity = "LOW"
sources = ["cve"]
title = 'The user wants me to generate a Chinese vulnerability title for CVE-1999-0446 in the format "厂商 产品 漏洞类型" (Vendor Product Vulnerability Type). From the known information: - Vendor: NetBSD - Product: NetBSD 1.3.3 and earlier versions - Vulnerability Type: 拒绝服务 (Denial of Service) - The vulnerability is about creating an unusual symbolic link with the ln command, triggering a bug in VFS So the title should be: "NetBSD NetBSD 拒绝服务漏洞" - but "NetBSD NetBSD" is redundant. Let me think... The format is "厂商'
updated = "2026-06-16T21:48:24.840"

