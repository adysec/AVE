[basic]
description = "BisonWare BisonFTP Server 4.1 之前版本存在缓冲区溢出漏洞。远程攻击者可通过向 FTP 服务的 USER、LIST 或 CWD 命令发送超长字符串，触发栈缓冲区溢出，导致服务拒绝响应，甚至可执行任意代码。该漏洞无需身份认证即可利用，Metasploit 框架已集成对应的利用模块，风险较高。"
published = "1999-05-17T04:00:00.000"
remediation = "升级 BisonWare BisonFTP 服务器至 4.1 或更高版本以修复缓冲区溢出漏洞。如无法升级，在防火墙层面限制对 FTP 服务（默认端口 21）的访问，仅允许可信 IP 连接，并禁用匿名用户写入权限作为临时缓解措施。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "BisonWare BisonFTP Server 远程缓冲区溢出漏洞"
