[basic]
description = "Etype Eserv 2.9.2 及更早版本的日志记录功能存在缓冲区溢出漏洞，攻击者可通过发送超长的 MKD 命令触发缓冲区溢出，进而执行任意命令。该漏洞影响 Etype Eserv 2.9.2 及更早版本，CVSS 评分 10.0（CVSS:AV:N/AC:L/Au:N/C:C/I:C/A:C），危害等级严重。攻击者无需身份认证，可通过网络远程发送构造的超长 MKD 命令触发漏洞，导致服务器进程崩溃或执行任意代码，完全控制受影响服务器。Etype 已在后续版本中修复该漏洞，建议用户升级至修复版本。"
published = "2000-06-06T04:00:00.000"
remediation = "建议立即停用 Etype Eserv 2.9.2 及更早版本，迁移至现代维护中的 FTP 服务器（如 vsftpd、ProFTPD、FileZilla Server 等最新版）。若无法立即迁移，请在防火墙层面禁止外部访问 FTP 服务端口（默认 21/TCP），并在服务配置中禁用 MKD 命令及日志记录功能作为临时缓解措施。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "Etype Eserv 日志记录缓冲区溢出漏洞"
updated = "2026-06-16T21:51:55.100"

