[basic]
title = "Shoptron 购物车应用程序 远程信息修改漏洞"
description = "Shoptron购物车应用程序在处理用户提交的表单数据时存在验证不足的问题，攻击者可以未经授权访问隐藏的表单字段并篡改其中的敏感购买信息。该漏洞影响使用Shoptron系统的网上商店，攻击者只需访问目标网站的购物车页面并发送包含隐藏字段的操作请求即可触发，无需任何特殊权限。该漏洞可能导致攻击者修改商品价格、支付方式、送货地址等关键信息，从而可能导致经济损失或欺诈行为。攻击者利用该漏洞时无需复杂的操作技术，只需简单的HTTP请求即可达到目的。"
severity = "HIGH"
score = 7.5
sources = ["cve"]
published = "2000-02-01T05:00:00.000"
updated = "2026-06-16T21:51:00.540"
remediation = "升级到最新的Shoptron应用程序版本（2000-2001年间发布的修复版本），移除或保护所有隐藏表单字段；实施客户端和服务器端输入验证，对敏感购买信息字段应用访问控制；如无法立即升级，建议禁用允许参数修改的API接口或实施WAF规则阻止对隐藏字段的修改请求。"
