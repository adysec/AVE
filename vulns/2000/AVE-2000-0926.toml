[basic]
description = "Ghostscript 5.10-16 之前版本存在符号链接攻击漏洞。本地攻击者可通过创建恶意的符号链接文件，诱使 Ghostscript 在处理临时文件时将其重定向至目标文件，从而覆盖系统中其他用户的文件。该漏洞利用条件为攻击者拥有本地访问权限，且目标系统上存在其他用户可写的临时目录。成功利用可导致非授权文件覆盖，影响系统完整性和可用性。"
published = "2001-01-09T05:00:00.000"
remediation = "升级 ghostscript 至 5.10-16 或更高版本（如 5.50、9.00 等现代版本）。若暂无法升级，可限制 /tmp 目录权限为 1777（粘滞位），并配置 AppArmor/SELinux 策略禁止 ghostscript 进程跟随符号链接写入非预期路径。"
score = 3.7
severity = "LOW"
sources = ["redhat"]
title = "Artifex Ghostscript 符号链接攻击本地文件覆盖漏洞"
updated = "2026-06-16T21:53:17.397"

