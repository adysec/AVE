[basic]
description = "Linux 内核 IIO 子系统中的 Kionix KMX61 IMU 驱动触发缓冲区存在信息泄漏漏洞。漏洞原理是驱动使用的本地 buffer 数组在向用户空间推送触发缓冲区数据时，仅通过 iio_for_each_active_channel() 为活跃通道赋值，未初始化非活跃通道的数组元素，导致未初始化的内核栈内存被泄露至用户空间。影响范围为启用了 CONFIG_IIO_STM_SENSORS_KMX61 配置的 Linux 内核版本。攻击条件为本地攻击者拥有低权限访问权限，无需用户交互，可通过触发缓冲区读取操作获取内核内存敏感信息，导致高机密性影响和高可用性影响，CVSS 3.1 评分 7.1（HIGH）。修复方式为在使用 buffer 数组前将其初始化为零。Linux 内核已在相关版本中通过提交修复此漏洞。"
published = "2025-01-19T12:15:24.990"
remediation = '建议立即升级 Linux 内核至 6.12.10 或更高版本（包含修复补丁 0495104b0f2f36cb7a3413ea0cf997a2ae2a70e9）。Ubuntu/Debian 执行：apt-get update && apt-get install linux-image-6.12.10；CentOS/RHEL 执行：yum update kernel；Fedora 执行：dnf update kernel。如无法立即升级内核，可临时禁用 KMX61 驱动：echo "blacklist kmx61" > /etc/modprobe.d/kmx61.conf 并重启，或在内核配置中禁用 CONFIG_IIO_STM_SENSORS_KMX61 后重新编译内核。该漏洞影响内核 4.0 至 6.12.9 版本，本地低权限攻击者可读取内核栈内存，建议尽快应用厂商安全更新。'
score = 7.1
severity = "HIGH"
sources = ["msrc"]
title = "Linux Kernel KMX61 IMU 驱动 信息泄漏漏洞"
updated = "2026-06-17T08:14:12.337"

