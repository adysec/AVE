[basic]
description = "Cray UNICOS 6.1 及 6.0 版本中的 accton 命令存在任意文件读取漏洞。由于程序未对文件路径和访问权限进行充分校验，本地攻击者可通过传入特制参数或利用符号链接攻击的方式，以 accton 进程权限读取系统任意文件内容，同时可修改系统审计（accounting）配置，导致敏感信息泄露及审计日志异常。该漏洞需要本地系统访问权限，CVSS 评分 3.6，危害等级低。"
published = "1999-12-31T05:00:00.000"
remediation = "升级 Cray UNICOS 至 6.1 以上版本，或应用厂商针对 accton 的专用补丁。限制 accton 可执行文件的访问权限为仅 root 用户可执行（chmod 700 /usr/sbin/accton），并移除普通用户的 setuid 权限。同时通过文件系统 ACL 限制 /var/adm/pacct 等记账文件的读取权限，仅授权审计员可访问。"
score = 3.6
severity = "LOW"
sources = ["avd"]
title = "Cray UNICOS accton 任意文件读取漏洞"
updated = "2026-06-16T21:50:08.807"

