[basic]
description = "VMware 1.0.1 for Linux 版本存在本地缓冲区溢出漏洞。当攻击者在目标系统上设置超长的 HOME 环境变量后启动 VMware 进程时，程序在处理该环境变量的过程中发生缓冲区溢出，可能导致本地权限提升或任意代码执行。该漏洞影响运行 Linux 操作系统的 VMware 1.0.1 版本，攻击条件要求攻击者已拥有目标系统的本地访问权限。成功利用此漏洞可使攻击者获得与 VMware 进程相同的权限级别，从而进一步控制系统或执行恶意操作。"
published = "1999-06-26T04:00:00.000"
remediation = "立即将 VMware 升级至 1.0.2 或更高版本以修复本地缓冲区溢出漏洞。如暂时无法升级，可在启动 VMware 前通过 unset HOME 或限制 HOME 环境变量长度（如 export HOME=/tmp）来临时缓解攻击面。"
score = 7.2
severity = "HIGH"
sources = ["exploitdb"]
