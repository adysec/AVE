[basic]
description = "CUPS（Common Unix Printing System）1.1.14 至 1.1.17 版本中存在多处整数溢出漏洞。远程攻击者可通过两种途径利用该漏洞：一是向 CUPS 守护进程的 HTTP 接口发送特制请求触发溢出，二是通过 CUPS 过滤器处理恶意构造的图像文件导致内存破坏。攻击者无需身份认证即可远程执行任意代码，完全控制目标系统。该漏洞 CVSS 评分 10.0，危害等级严重，影响 Linux/Unix 系统上部署的 CUPS 打印服务。"
published = "2002-12-26T05:00:00.000"
remediation = "立即升级 CUPS 至 1.1.18 或更高版本，该版本修复了 HTTP 接口和图像处理代码中的整数溢出漏洞。如无法升级，可在 CUPS 配置文件 /etc/cups/cupsd.conf 中限制远程访问，将 Listen 绑定到 127.0.0.1:631 仅允许本地访问，并在防火墙中阻断外部对 631 端口的访问。"
score = 10
severity = "CRITICAL"
sources = ["osv"]
title = "Common Unix Printing System (CUPS) 整数溢出远程代码执行漏洞"
updated = "2026-06-16T21:59:13.460"

