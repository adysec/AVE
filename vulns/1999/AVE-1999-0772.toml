[basic]
description = "Windows 95 系统的 NETBIOS/SMB 共享密码存在可被猜测的弱点，未经身份认证的远程攻击者可通过暴力破解或弱口令字典尝试，获取目标系统共享资源的访问权限。该漏洞影响 Windows 95 及基于 NETBIOS/SMB 协议进行文件共享的早期 Windows 系统，攻击者只需能够连接到目标主机的 SMB 服务即可发起猜测，无需事先获取任何凭据，可能导致敏感文件被非法访问或篡改。建议用户为共享资源设置强密码策略，并限制 SMB 服务的网络访问范围以降低风险。"
published = "1997-01-01T05:00:00.000"
remediation = '在 Windows 95 网络中禁用不必要的"文件和打印机共享"服务，并为所有共享资源设置不少于8位且含大小写字母与数字的强口令；通过防火墙或路由器屏蔽 139/445 端口的入站 SMB 连接，或在网卡属性中仅绑定 TCP/IP 而不绑定"Microsoft 网络上的文件与打印机共享"以彻底关闭 NETBIOS 共享。'
score = 7.5
severity = "HIGH"
sources = ["epss"]
