[basic]
description = "Oracle Application Server 4.0.8.2 中 iPlanet Web Server (iWS) 4.1 的共享库 ndwfn4.so 存在缓冲区溢出漏洞。远程攻击者可通过向应用服务器发送特制的超长 HTTP 请求（如 /jsp/ 路径）触发该漏洞，导致任意命令执行。攻击无需身份认证，仅需网络访问即可利用，危害严重。受影响版本包括 Oracle Application Server 4.0.8.2 及配套的 iPlanet Web Server 4.1。"
published = "2001-07-02T04:00:00.000"
remediation = "升级 Oracle Application Server 至 4.0.8.2 以上补丁版本，或迁移至 Oracle AS 10g (9.0.4) 及以上版本。如无法升级，在 Web 服务器层面配置请求 URI 长度限制（如 LimitRequestLine 4096），并禁用不必要的 JSP 处理模块 ndwfn4.so。"
score = 7.5
severity = "HIGH"
sources = ["exploitdb"]
title = "Oracle Application Server ndwfn4.so 缓冲区溢出漏洞"
updated = "2026-06-16T21:54:16.467"

