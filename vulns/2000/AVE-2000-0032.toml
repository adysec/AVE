[basic]
description = "Great Circle Associates Majordomo 1.94.4 的 resend 命令存在 shell 元字符注入漏洞。本地攻击者可通过在 resend 命令参数中注入特殊 shell 元字符，以 Majordomo 进程权限执行任意系统命令，从而获取未授权的权限提升。该漏洞影响 Majordomo 1.94.4 及更早版本，CVSS 评分 4.6，危害等级中危。攻击者需具备本地系统访问权限方可利用。"
published = "1999-12-28T05:00:00.000"
remediation = "立即升级 Majordomo 至 1.94.5 或更高版本，该版本已修复 resend 命令对 shell 元字符（如 `;`、`|`、`` ` ``）的过滤缺陷。如无法升级，可移除 resend 命令的 setuid 权限（`chmod u-s /path/to/majordomo/resend`），并限制仅受信任用户可通过 wrapper 调用 resend。"
score = 4.6
severity = "MEDIUM"
sources = ["cve"]
title = "Great Circle Associates Majordomo 本地命令注入漏洞"
updated = "2026-06-16T21:50:52.027"

