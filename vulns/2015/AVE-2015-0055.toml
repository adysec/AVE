[basic]
description = "Microsoft Internet Explorer 9 至 11 版本存在 ASLR（地址空间布局随机化）安全绕过漏洞。未经身份认证的远程攻击者可构造恶意网站，利用该漏洞获取内存基址信息，从而绕过系统的地址空间随机化保护机制。该漏洞需要用户通过浏览器访问攻击者控制的特制网页才能触发，用户交互要求较低。成功利用后可导致内存地址被泄露，攻击者可基于泄露的地址信息进一步构造ROP链或实现远程代码执行，危及用户系统完整性与安全性。Microsoft已于2015年2月的安全更新中修复此漏洞。"
published = "2015-02-11T03:01:12.497"
remediation = "应用 Microsoft 2015 年 2 月安全更新 MS15-009（KB3021952 及 KB3034196），优先通过 Windows Update 自动安装；若手动安装，须先安装 KB3021952 并重启系统，再通过 Windows Update 获取并安装 KB3034196，以修复 Internet Explorer 9/10/11 的 ASLR 安全绕过漏洞。受影响的版本包括运行 Windows Vista SP2、Windows 7 SP1、Windows 8、Windows 8.1、Windows Server 2008 SP2、Windows Server 2008 R2 SP1、Windows Server 2012、Windows Server 2012 R2 的系统上的 IE 9、IE 10 和 IE 11。如无法立即打补丁，可暂时更换为其他浏览器或限制 IE 访问外部网站，以降低遭遇 crafted 网页攻击的风险。"
score = 6.5
severity = "MEDIUM"
sources = ["kev"]
title = "Microsoft Internet Explorer ASLR 安全机制绕过漏洞"
updated = "2026-06-17T00:19:30.960"

