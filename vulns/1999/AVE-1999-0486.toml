[basic]
description = "Microsoft Windows NT 4.0 的 Winpopup（信使服务）在处理用户名字段时存在输入验证缺陷，远程攻击者可向目标系统发送包含超长用户名的弹出消息触发该漏洞，导致目标系统耗尽系统资源或信使服务崩溃，造成拒绝服务。该漏洞影响 Windows NT 4.0 系统，无需身份认证即可远程利用，攻击复杂度较低，CVSS 评分 5.0，危害等级中等。Microsoft 官方未发布针对此漏洞的安全补丁。"
published = "1997-04-01T05:00:00.000"
remediation = "安装 Windows NT 4.0 Service Pack 6a (SP6a) 以修复 Winpopup 消息处理中的缓冲区问题。如系统已不受支持，建议立即升级至受支持的 Windows Server 版本，或在防火墙和本地安全策略中禁用 Messenger 服务（net stop messenger）。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Microsoft Windows NT 4.0 Winpopup 拒绝服务漏洞"
updated = "2026-06-16T21:48:05.240"

