[basic]
description = "Lucent Ascend MAX/Pipeline/TNT 系列路由器的 Discard Service（丢弃服务，UDP 端口 9）存在安全漏洞。远程攻击者可通过向目标路由器的丢弃端口发送特制的畸形数据包，触发服务处理异常，导致路由器拒绝服务。该端口被 Java Configurator 工具所使用，攻击无需认证即可发起，影响 Ascend MAX 5.0、Pipeline 6.0、TNT 1.0/2.0 等多个版本。CVSS 评分 5.0，危害等级中等。"
published = "1998-03-16T05:00:00.000"
remediation = "建议升级路由器固件至 Lucent 官方修复版本（MAX 5.0 以上、Pipeline 6.0 以上、TNT 2.0 以上）；在入方向访问控制列表（ACL）中添加规则拒绝外部对 UDP 端口 9 的访问；如无需远程 Java Configurator 管理，可在接口配置中禁用 discard 服务以消除攻击面。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Lucent Ascend MAX/Pipeline Router Discard Service 拒绝服务漏洞"
updated = "2026-06-16T21:47:29.030"

