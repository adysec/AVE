[basic]
description = "Citrix Metaframe 1.0 和 1.8 版本中的 ICA（Independent Computing Architecture）协议使用弱 XOR 加密算法对用户认证凭据进行加密，由于 XOR 加密方式极易被逆向破解，攻击者可通过网络嗅探或中间人攻击截获认证数据包，进而还原出明文用户名和密码。该漏洞影响 Citrix Metaframe 1.0/1.8 版本，CVSS 评分 10.0，危害等级严重。建议升级至修复版本或启用更强的加密机制。"
published = "2000-03-29T05:00:00.000"
remediation = "升级 Citrix MetaFrame 至 1.8 Service Pack 3 及以上版本（或部署后续安全补丁），启用 128 位 RC5 加密替代默认的弱 XOR 加密。如无法升级，可在 ICA 客户端与服务端之间强制使用 TLS/SSL 隧道封装认证流量，以弥补 ICA 协议自身的加密缺陷。长期建议迁移至受支持的 Citrix 产品（如 Virtual Apps and Desktops）以获取持续安全更新。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "Citrix Metaframe ICA 协议弱加密漏洞"
updated = "2026-06-16T21:51:18.517"

