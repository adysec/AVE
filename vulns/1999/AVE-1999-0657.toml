[basic]
description = "Microsoft Internet Explorer 5 在实现 Web 代理自动发现（WPAD）机制时存在安全配置缺陷，攻击者可搭建恶意的 WPAD 服务器，当 IE5 客户端尝试自动发现网络代理配置时，会被诱导连接到该恶意服务器并接收伪造的代理配置文件（wpad.dat），从而被远程修改浏览器的代理设置。该漏洞影响使用 IE5 且启用自动代理发现的 Windows 客户端，攻击条件为受害者网络内存在攻击者可控的 WPAD 服务器（如在局域网或可通过 DNS/DHCP 投毒抵达）。利用方式上，攻击者无需身份认证即可将受害者流量劫持至攻击者控制的代理，进而实施中间人监听、篡改或钓鱼攻击，可能导致敏感信息泄露。"
published = "1999-12-02T05:00:00.000"
remediation = "升级到已修复该问题的 Internet Explorer 5.01 Service Pack 1 或更高版本（建议升级至 IE 5.5/6.0）。如暂无法升级，可在 IE「Internet 选项→连接→局域网设置」中取消勾选「自动检测设置」与「使用自动配置脚本」，并手动指定代理；同时在 DNS 中创建 wpad 主机记录指向受信任服务器，或在边界防火墙/代理上阻断对外部 WPAD 的 DNS 与 DHCP 251 选项请求，防止客户端被诱导连接恶意 WPAD 服务器。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Microsoft Internet Explorer 5 WPAD 代理配置欺骗漏洞"
updated = "2026-06-16T21:49:12.260"

