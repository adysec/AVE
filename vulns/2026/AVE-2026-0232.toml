[basic]
description = "OpenClaw 主机执行环境存在 OS 命令注入漏洞，该漏洞源于过滤机制对用户输入的黑名单校验不完整，攻击者可通过注入恶意 OS 命令绕过权限限制，导致执行超出调用者预授权范围的操作，甚至实现持久化代码执行。CVSS 评分 8.8，危害等级为高危，攻击者无需身份认证即可远程利用该漏洞实施攻击。"
published = "20260713"
remediation = "立即将 OpenClaw 升级到 v2026.6.6 或更高版本（npm update openclaw 至 >=2026.6.6），该版本在 8c802aa 提交中修复了主机执行环境过滤缺陷。在升级前，可通过限制受影响功能仅对受信任操作员开放，或直接禁用该功能作为临时缓解措施；同时收紧 channel 和工具白名单，避免在互不信任的用户间共享同一 Gateway。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "OpenClaw 主机执行环境 OS 命令注入漏洞"
updated = "20260713"

