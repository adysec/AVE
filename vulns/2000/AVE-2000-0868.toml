[basic]
description = "Red Hat Linux 系统中 umb-scheme 3.2-11 软件包在安装时未正确设置文件权限，导致相关文件被设置为全局可写。本地攻击者可利用该配置缺陷，通过修改 umb-scheme 的可执行文件或库文件，插入恶意代码，从而在系统启动或普通用户调用该程序时以 root 权限执行任意命令。该漏洞影响 Red Hat Linux 系统，CVSS 评分 7.2，危害等级高，需通过限制文件权限或升级软件包修复。"
published = "2000-10-20T04:00:00.000"
remediation = "立即使用 `chmod -R o-w /usr/lib/umb-scheme*` 命令移除 umb-scheme 相关文件的全域可写权限，或升级到 umb-scheme 3.2-12 及以上版本。如不再使用该软件包，建议直接通过 `rpm -e umb-scheme` 卸载以彻底消除风险。"
score = 7.2
severity = "HIGH"
sources = ["redhat"]
title = "Red Hat Linux umb-scheme 文件权限配置不当漏洞"
updated = "2026-06-16T21:52:19.637"

