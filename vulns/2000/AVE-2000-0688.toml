[basic]
description = "HP-UX 操作系统的 aserver 程序存在符号链接漏洞，本地攻击者可通过创建恶意的符号链接文件诱导 aserver 程序以高权限访问目标文件，从而实现对系统文件的非授权读写操作。该漏洞允许拥有本地账户的攻击者获取 root 权限，完全控制系统。受影响版本包括 HP-UX 9000 系列等多个版本，需安装厂商补丁修复。"
published = "1999-01-02T05:00:00.000"
remediation = "立即升级 HP-UX 至最新支持的版本，或安装 aserver 补丁 PHSS_20000（1999年12月发布）。如无法升级，移除 aserver 的 setuid 权限：`chmod u-s /opt/audio/bin/aserver`，并限制非授权用户对 /tmp 目录的写访问权限，防止 symlink 攻击滥用。同时监控 /tmp 目录的可疑符号链接创建行为。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "HP-UX aserver 本地权限提升漏洞"
updated = "2026-06-16T21:50:48.357"

