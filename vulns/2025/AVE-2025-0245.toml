[basic]
description = "MetaCRM 客户关系管理系统 `/business/common/importdata/sendfile.jsp` 接口存在任意文件上传漏洞。攻击者可通过构造恶意 multipart 请求，直接上传 JSP 木马文件至服务器，进而获取服务器控制权，实现远程代码执行。该漏洞无需身份认证即可利用，攻击门槛低，可导致服务器敏感信息泄露、数据篡改或内网横向移动，危害严重。建议升级至官方修复版本或对该接口添加严格的文件类型校验与访问控制。"
published = "0701"
remediation = "立即升级MetaCRM至官方支持文件上传白名单功能的最新版本（通常为2.1.3及以上）。在升级前，建议立即禁用sendfile.jsp的HTTP方法，或在web.xml中添加全局静态资源白名单配置，仅允许特定后缀的文件（如.xlsx、.doc）上传使用。必要时部署反序列化安全增强措施，确保文件类型验证包含有效servlet安全检查。所有上传文件均应经过病毒扫描，并限制上传文件名长度和内容合法性。强制要求上传管理员邮箱验证以进一步降低风险。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "MetaCRM 客户关系管理系统任意文件上传漏洞"
updated = "0701"

