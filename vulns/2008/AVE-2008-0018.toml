[basic]
description = "SiteEngine 5.x 的 api.php 文件存在开放重定向漏洞，攻击者通过在 logout 动作的 forward 参数中构造恶意 URL，诱导已登录用户点击后将其重定向至任意外部网站，进而实施钓鱼攻击。该漏洞源于程序对用户输入的 forward 参数未进行充分校验，属于输入验证不完善（CWE-20）导致的安全问题。CVSS 评分为 5.8，危害等级中危，攻击复杂度较低，但需要用户交互配合才能完成利用。"
published = "2010-12-01T16:06:12.770"
remediation = "升级 SiteEngine 至最新版本，或手动修复 api.php 文件：对 `forward` 参数进行白名单校验，仅允许跳转至本站域名内的 URL；拒绝外部域名重定向请求。如无法修改代码，可在 Web 服务器（Nginx/Apache）层面添加规则拦截包含 `forward=http` 或 `forward=//` 的请求参数作为临时缓解措施。"
score = 5.8
severity = "MEDIUM"
sources = ["nuclei"]
title = "UC Gateway Investment SiteEngine 5.0 URL 重定向漏洞"
updated = "2026-06-16T23:03:57.420"

