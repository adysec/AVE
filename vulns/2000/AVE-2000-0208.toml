[basic]
description = "PowerScripts PlusMail WebConsole 1.0 的 CGI 程序存在不安全的文件权限配置漏洞，其密码文件权限设置不当，导致远程攻击者可通过直接访问或读取密码文件获得明文或可破解的凭据，进而以 Web 服务器权限执行任意命令。该漏洞利用门槛低，无需身份认证，影响运行 PlusMail WebConsole 1.0 的邮件服务器，CVSS 评分 7.5，危害等级高。"
published = "2000-01-11T05:00:00.000"
remediation = "立即修复密码文件的权限设置，将密码文件权限设置为 600（仅 owner 可读写），确保 Web 服务器进程以最低权限用户运行。由于 PowerScripts PlusMail WebConsole 1.0 已于 2000 年后停止维护，官方不再提供安全补丁，强烈建议迁移至现代邮件管理平台（如 Postfix + Webmin 或 Roundcube），并彻底停用 PlusMail CGI 组件。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "PowerScripts PlusMail WebConsole 弱身份验证漏洞"
updated = "2026-06-16T21:50:56.790"

