[basic]
description = "IMail 5.0 自带的 IMonitor 服务在处理网络请求时存在缓冲区溢出漏洞。未经身份认证的远程攻击者可通过向目标系统的 8181 端口发送超长字符串触发该溢出，从而导致拒绝服务，并可能进一步执行任意命令。该漏洞影响运行 Ipswitch IMail 5.0 版本的 Windows 服务器，攻击者无需任何凭据即可远程利用。ExploitDB 已公开相应的概念验证代码。"
published = "1999-03-01T05:00:00.000"
remediation = "建议立即升级 Ipswitch IMail 至 6.0 或更高版本（IMail 6.0 已修复该 IMonitor 缓冲区溢出漏洞），或迁移至 Progress Software 后续邮件产品。若无法立即升级，请在防火墙层面封锁 TCP 8181 端口（IMonitor 管理端口）对外部访问，或在 IMail 管理控制台禁用 IMonitor 服务作为临时缓解措施。建议同时升级至最新支持版本以修复其他已知漏洞。"
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "Ipswitch IMail 5.0 IMonitor 缓冲区溢出拒绝服务漏洞"
updated = "2026-06-16T21:49:35.570"

