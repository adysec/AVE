[basic]
description = "RedHat Linux 2.1 中的 abuse.console 程序在查找和执行 undrv 程序时使用相对路径名，导致本地用户可通过构造指向恶意程序的路径（如特洛伊木马程序），诱导 abuse.console 执行任意命令，从而实现本地权限提升。该漏洞影响 RedHat Linux 2.1 系统，攻击者需具备本地账户权限，通过控制 PATH 环境变量或创建同名恶意程序诱导 abuse.console 执行，从而提升至 root 权限。CVSS 评分 7.2，属于高危本地提权漏洞。Red Hat 已发布补丁修复该漏洞。"
published = "1996-02-02T05:00:00.000"
remediation = "建议立即升级至 Red Hat Linux 2.1 修补版本（应用 Red Hat 发布的 errata 补丁 RHSA-1999:047-01），或升级至更新版本的 Red Hat Linux。若无法立即升级，可通过修复 /usr/sbin/abuse.console 中的相对路径调用问题（将 undrv 替换为绝对路径 /usr/sbin/undrv），并限制普通用户对 abuse.console 的执行权限（chmod 750 /usr/sbin/abuse.console）作为临时缓解措施。"
score = 7.2
severity = "HIGH"
sources = ["exploitdb"]
title = "RedHat Linux 2.1 abuse.console 本地权限提升漏洞"
updated = "2026-06-16T21:50:33.307"

