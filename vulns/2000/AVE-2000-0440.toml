[basic]
description = "KDE 1.1.2 中 KApplication 类的配置文件管理功能存在安全漏洞，本地攻击者可通过精心构造的符号链接或配置文件操作，利用该漏洞覆盖系统任意文件，导致本地权限提升。该漏洞影响 KDE 1.1.2 及更早版本，攻击者需拥有本地系统访问权限，通过配置文件管理的缺陷将恶意内容写入敏感文件（如可执行脚本或系统配置文件），在特定条件触发后获得更高权限。CVSS 评分 7.2，危害等级高。"
published = "2000-05-31T04:00:00.000"
remediation = "升级 KDE 至 2.0 及以上版本，该漏洞已在后续版本中修复。如无法升级，限制受影响用户的配置文件写入权限，避免 KApplication 以过高权限运行，并定期审计 /tmp 等可写目录的符号链接攻击。"
score = 7.2
severity = "HIGH"
sources = ["redhat"]
title = "KDE KApplication 本地任意文件覆盖漏洞"
updated = "2026-06-16T21:51:55.997"

