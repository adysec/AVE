[basic]
description = "科立讯指挥调度管理平台存在 SQL 注入漏洞，攻击者可通过向相关接口传入恶意构造的 SQL 查询参数，绕过输入过滤直接与后台数据库交互，进而窃取敏感数据、篡改系统配置或获取管理员权限。攻击条件低，无需身份认证即可远程利用，危害较大。"
published = "0729"
remediation = "联系科立讯厂商获取指挥调度管理平台最新安全补丁，升级至修复SQL注入漏洞的版本。临时缓解措施：在Web应用防火墙(WAF)侧配置SQL注入攻击拦截规则，对用户输入参数进行严格的类型校验和特殊字符过滤，限制数据库账户权限为最小必要原则，禁用危险存储过程。"
