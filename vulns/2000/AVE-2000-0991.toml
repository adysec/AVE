[basic]
description = "LPPlus 打印服务组件（dccsched、dcclpdser、dccbkst、dccshut、dcclpdshut、dccbkstshut）安装时被设置为 setuid root 且全局可执行，导致任意本地用户均可启动或停止 LPD 打印服务进程，导致打印服务拒绝服务。攻击者仅需本地账户权限，无需认证即可直接执行上述程序控制打印守护进程，造成打印服务中断，影响范围涉及安装了 LPPlus 打印套件的 Unix/Linux 系统，CVSS 2.1 分值（本地访问/低复杂度/无需认证/部分可用性影响），属低危本地拒绝服务漏洞。"
published = "2000-11-14T05:00:00.000"
remediation = "建议立即卸载LPPlus服务或授予最小权限访问：`chmod 750 /usr/sbin/dccshed /usr/sbin/dcclpdser /usr/sbin/dccbkst /usr/sbin/dccshut /usr/sbin/dcclpdshut /usr/sbin/dccbkstshut`，并移除对所有用户的SetUID位。如果继续使用，必须限制用户到指定路径并启用系统审计日志记录以监控对LPD服务的任何启动/停止操作。建议安装最新的LPPlus安全补丁包（如版本X.X或更高），这些补丁修复了程序权限验证机制，并提供了强制访问控制策略来限制对这些服务的未授权访问。有关特定补丁或升级指南，请查阅供应商的公告或安全咨询。"
score = 2.1
severity = "LOW"
sources = ["cve"]
title = "LPPlus 打印服务提权漏洞"
updated = "2026-06-16T21:52:39.600"

