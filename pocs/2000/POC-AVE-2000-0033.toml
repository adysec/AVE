[info]
author = "ave"
description = "检测 Hughes Technologies Mini SQL (mSQL) 2.0.4.1-2.0.11 中 w3-msql CGI 程序是否存在，该程序在处理 Content-Length 头时存在 scanf() 缓冲区溢出漏洞，远程攻击者无需认证即可通过发送特制 HTTP POST 请求触发栈溢出，以 Web 服务器权限执行任意命令"
id = "POC-AVE-2000-0033"
name = "Hughes Technologies Mini SQL (mSQL) 2.0.11 w3-msql Remote Buffer Overflow PoC"
severity = "critical"
tags = [
    "cve-2000-0012",
    "buffer-overflow",
    "mSQL",
    "w3-msql",
]
vuln_id = [
    "CVE-2000-0012",
    "AVE-2000-0033",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/cgi-bin/w3-msql"
protocol = "http"

[poc.requests.headers]
User-Agent = "AVE/1.0"

[[poc.requests.matchers]]
expect = true
status = [
    200,
    301,
    302,
    401,
    403,
    500,
]
type = "status"
