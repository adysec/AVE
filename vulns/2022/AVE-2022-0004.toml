[basic]
description = "禅道项目管理软件（Zentao）存在目录遍历漏洞，远程攻击者可通过向 index.php 的 mode=getconfig 接口发送特制请求，遍历服务器目录并读取配置文件，导致数据库连接信息、系统设置等敏感信息泄露。该漏洞源于对用户输入路径的限制不恰当（CWE-22），攻击者无需身份认证即可利用，影响禅道 Demo15 等版本，CVSS 评分 7.5，危害等级高。"
published = "2022-09-19T16:15:11.350"
remediation = "立即将禅道升级至 15.1 及以上版本，官方已在新版本中修复了 mode=getconfig 接口的目录遍历漏洞。如暂时无法升级，在 Web 服务器（Nginx/Apache）层面添加规则，禁止对 index.php?mode=getconfig 的外部访问，同时对 /zentao/ 目录下的配置文件目录设置严格的读取权限，禁用 PHP 的 allow_url_fopen 以降低信息泄露风险。"
score = 7.5
severity = "HIGH"
sources = ["hwpoc"]
title = "易软天创 禅道 路径遍历漏洞"
updated = "2026-07-09T01:17:38.597"

