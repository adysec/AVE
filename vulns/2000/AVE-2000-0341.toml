[basic]
description = "IIS 4.0 和 5.0 的 FrontPage 服务器扩展组件中 shtml.exe 存在路径信息泄露漏洞。远程攻击者通过请求一个不存在的文件，服务器返回的错误消息会泄露服务器上 HTML、HTM、ASP 及 SHTML 等文件的物理路径。该漏洞虽不直接导致远程代码执行，但泄露的物理路径可为攻击者进一步探测和利用系统提供关键信息，降低后续攻击门槛。"
published = "2000-05-06T04:00:00.000"
remediation = '建议立即移除 FrontPage 2000 Server Extensions，或卸载 IIS 中不必要的 shtml.exe 映射。在 IIS 管理器中删除 .shtml 扩展名与 shtml.exe 的应用程序映射，或在 Web 服务器上直接删除/重命名 %ProgramFiles%\Common Files\Microsoft Shared\Web Server Extensions\40\bin\shtml.exe 文件。如果必须保留 FrontPage 扩展功能，应配置 IIS 自定义错误页面，防止返回完整的物理路径信息。'
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Microsoft IIS 4.0/5.0 FrontPage 服务器扩展完整路径披露漏洞"
updated = "2026-06-16T21:51:39.827"

