[basic]
description = "X Window System 的 Xt 工具库（Xt Intrinsics）中存在缓冲区溢出漏洞。本地攻击者可通过向使用了 XtAppInitialize() 函数的 X11 应用程序（如 xterm）发送特制参数触发栈溢出，从而以 root 权限执行任意代码。该漏洞影响 BSD/OS、FreeBSD、HP-UX、AIX、IRIX、SunOS 及 UnixWare 等多款 Unix 系统，CVSS 评分 7.2，危害等级高。"
published = "1997-05-01"
remediation = "升级 X Window System 的 libXt 库至修复版本，涉及系统包括 BSD/OS、FreeBSD、HP-UX、AIX、IRIX、SunOS 及 UnixWare 等。各厂商已发布对应安全补丁：IBM AIX 更新 X11.base.lib 至修复级别，HP-UX 安装 libXt 相关补丁，SunOS 安装对应 Sun 安全补丁集。对于已停止支持的旧版系统，建议迁移至受支持的操作系统版本并避免将 X 服务暴露给不可信用户。"
score = 7.2
severity = "HIGH"
sources = ["cve"]
title = "X Window System LibXt 库缓冲区溢出本地权限提升漏洞"
updated = "2026-06-16"

