[basic]
description = "畅捷通部分产品存在任意文件删除漏洞，攻击者可在未授权或低权限条件下通过构造特制请求，利用系统对文件路径校验不严的缺陷，删除服务器上任意文件。该漏洞可导致业务系统关键文件丢失、服务中断甚至拒绝服务，对系统可用性造成严重威胁。受影响版本包括多款畅捷通管理软件。建议用户及时关注厂商公告并升级至安全版本。"
published = "08.08"
remediation = "立即升级畅捷通 T+ 至官方最新补丁版本（V13.0 及以上补丁包），可在畅捷通服务社区下载对应版本最新补丁。若无法升级，在 IIS 中移除或限制 DownloadProxy.aspx 文件的访问权限，同时在 WAF 层面对 /tplus/sm/dts/downloadproxy.aspx 路径的 preload 参数做路径穿越特征过滤。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "畅捷通任意文件删除漏洞"
updated = "08.08"

