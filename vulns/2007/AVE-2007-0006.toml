[basic]
description = "phpPgAdmin 3.5 至 4.1.1（可能包括 4.1.2）版本中的 redirect.php 文件存在跨站脚本（XSS）漏洞。远程攻击者可通过 PHP_SELF 变量中的特定输入注入任意 Web 脚本或 HTML 代码，在用户浏览器中执行恶意脚本，导致敏感信息泄露或会话劫持。该漏洞利用无需认证，攻击复杂度较低，影响范围涵盖多个 phpPgAdmin 版本，与 CVE-2007-2865 的攻击向量不同。"
published = "2007-10-30T21:46:00.000"
remediation = "立即升级 phpPgAdmin 至 4.1.3 或更高版本，该版本已修复 redirect.php 和 login.php 中 PHP_SELF 输入的 XSS 问题。Debian Etch 用户应安装 DSA-1693 提供的 4.0.1-3.1+etch1 安全更新。若无法立即升级，可在 Web 服务器（Apache/Nginx）中限制对 redirect.php 的访问，或在 php.ini 中启用 `session.cookie_httponly` 和 `session.cookie_secure` 作为临时缓解措施。"
score = 4.3
severity = "MEDIUM"
sources = ["nuclei"]
title = "phpPgAdmin redirect.php 跨站脚本漏洞"
updated = "2026-06-16T22:46:42.930"

