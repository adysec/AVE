[basic]
description = "Big Brother系统和网络监视器的 bbd 服务器存在代码执行漏洞，攻击者可通过向 bbd 服务发送特制请求，利用输入验证缺陷在目标系统上执行任意命令。该漏洞影响 Big Brother System and Network Monitor 的相关版本，CVSS 评分 7.5（AV:N/AC:L/Au:N/C:P/I:P/A:P），属于高危漏洞。攻击者无需身份认证，通过网络即可远程触发，成功利用可导致系统完全被控，攻击者可完全控制受影响服务器。官方已发布补丁修复此漏洞，建议尽快升级至修复版本。"
published = "2000-05-18T04:00:00.000"
remediation = "立即将 Big Brother 监控系统迁移至其维护分支 Xymon（https://www.xymon.com/），Xymon 已修复 bbd 服务的命令注入问题。如短期内无法迁移，应立即停止 bbd 服务（执行 /etc/init.d/bb stop 或 kill bbd 进程），并从防火墙层面阻断外部对 Big Brother 服务端口（默认 1984/tcp、1985/tcp）的访问，仅允许内网可信管理地址连接。同时检查系统是否被利用，在 /var/log/bb 序列日志中搜索异常命令执行记录。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "Quest Software Big Brother System and Network Monitor 远程代码执行漏洞"
updated = "2026-06-16T21:51:45.600"

