[basic]
description = "AT&T System V Release 4（SVR4）操作系统的 login 程序存在权限提升漏洞，其实现在处理用户身份认证与登录会话初始化时存在缺陷，本地已登录的普通用户可利用该缺陷绕过正常的权限检查，将自身权限提升至 root 或等效特权。该漏洞仅影响运行 AT&T SVR4 及其衍生系统的本地环境，攻击者需先获得目标主机的本地访问权限（如一个低权限 shell 账号）方可利用。由于漏洞位于本地登录组件，攻击无需网络参与，但要求攻击者能够在目标系统上执行本地命令，属于典型的本地权限提升（LPE）类漏洞，可被用于完全控制系统。"
published = "1991-05-23T04:00:00.000"
remediation = "升级到已修复该 login 漏洞的 AT&T System V Release 4 最新维护补丁或迁移至受支持的 Unix 系统；临时缓解措施为限制普通用户本地登录权限、将 /bin/login 文件权限设为 0755 且属主为 root、并通过审计日志监控异常提权行为。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
