[basic]
description = "Lotus Domino 企业服务器及邮件服务器 5.0.1/5.0.2/5.0.3 版本的 ESMTP 服务存在缓冲区溢出漏洞。远程攻击者无需身份认证即可通过向目标服务器的 ESMTP 端口发送超长的 MAIL FROM 命令触发缓冲区溢出，导致服务崩溃，造成拒绝服务。该漏洞影响 Lotus Domino Enterprise Server 及 Mail Server 的多个版本，CVSS 评分 5.0，危害等级中等。厂商已发布安全更新修复此漏洞。"
published = "2000-05-18T04:00:00.000"
remediation = "升级 Lotus Domino Server 至 5.0.4 或更高版本，该版本已修复 ESMTP 服务中 MAIL FROM 命令的缓冲区溢出问题。如无法升级，可在防火墙上限制对 TCP 端口 25 的访问，仅允许可信 IP 连接 SMTP 服务，并配置 Domino SMTP 网关的入站连接限制以缓解攻击风险。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Lotus Domino Server ESMTP 服务缓冲区溢出漏洞"
updated = "2026-06-16T21:51:45.880"

