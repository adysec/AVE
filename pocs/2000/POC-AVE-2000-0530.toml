[info]
author = "AVE"
description = "通过诱导用户访问恶意网页，触发 Netscape Communicator 4.04-4.74 中 Java 小程序的 netscape.net.URLConnection 类绕过安全限制读取本地任意文件（Brown Orifice）"
id = "POC-AVE-2000-0530"
name = "Netscape Communicator 4.x URL Read PoC"
severity = "medium"
tags = ["cve-2000-0676"]
vuln_id = [
    "CVE-2000-0676",
    "AVE-2000-0530",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/brown-orifice.html"
protocol = "http"

[poc.requests.body]
content = ""
type = "raw"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["Brown Orifice"]
