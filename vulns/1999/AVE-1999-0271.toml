[basic]
description = "SGI IRIX 6.3 系统中的 mailx 程序存在缓冲区溢出漏洞，由于程序对用户输入的数据长度缺乏充分校验，当攻击者向 mailx 程序传入特制的超长参数时，可触发栈缓冲区溢出，导致程序异常崩溃。本地攻击者可利用该漏洞实现权限提升，获取 root 权限。该漏洞同样影响 RedHat Linux 4.2 和 Solaris 2.6 系统。CVSS 评分 4.6，危害等级中危。"
published = "1998-01-25T05:00:00.000"
remediation = "SGI IRIX 用户请安装 SGI 安全公告 19980605-01-PX 提供的 mailx 补丁；RedHat Linux 4.2 用户升级 mailx 到已修复版本；Solaris 2.6 用户安装 Sun 官方 mailx 补丁。临时缓解措施可移除 mailx 的 setuid 位：chmod u-s /bin/mailx。"
score = 4.6
severity = "MEDIUM"
sources = ["exploitdb"]
title = "SGI IRIX mailx 缓冲区溢出漏洞"
updated = "2026-06-16T21:47:38.563"

