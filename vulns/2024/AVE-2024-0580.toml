[basic]
description = "Linux 内核 DRM/STI 显示子系统的 sti_gdp_atomic_check 函数中存在错误指针解引用漏洞。drm_atomic_get_crtc_state() 函数在特定失败情况下会返回错误指针，而 sti_gdp_atomic_check 未对返回值进行有效性检查，直接使用该指针进行操作，导致内核崩溃。本地攻击者可通过加载特制的显示状态触发该错误路径，造成拒绝服务。该漏洞影响 Linux 内核各发行版本，CVSS 评分 5.5，危害等级中等。需更新至包含修复补丁的内核版本。"
published = "2025-01-08T18:15:18.560"
remediation = "升级 Linux 内核至以下安全版本：5.15.174、6.1.120、6.6.64 或 6.12.4 及以上（对应修复 commit: 3cf2e7c44、997b64c3f、b79612ed6、e965e771b、f5804567c）。使用 apt/yum 等包管理器更新内核包后重启系统即可生效。如无法立即升级，可通过禁用 STI 显示驱动模块（modprobe -r sti）作为临时缓解措施，但会导致 STI 图形输出不可用。"
score = 5.5
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux kernel drm/sti 错误指针解引用漏洞"
updated = "2026-06-17T08:12:58.133"

