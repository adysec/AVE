[basic]
description = "New API（LLM 网关与 AI 资产管理系统）0.12.0-alpha.1 之前版本中，邮箱绑定接口 GET /api/oauth/email/bind 和微信绑定接口 GET /api/oauth/wechat/bind 使用 GET 请求执行账户绑定等状态变更操作，违反 HTTP 方法语义。在会话 Cookie 允许跨站发送的部署环境下，远程攻击者可诱导已登录用户浏览器发起跨站请求，将攻击者控制的邮箱地址或 OAuth 身份绑定至用户账户，导致账户绑定状态被篡改。该漏洞属于跨站请求伪造（CWE-352），CVSS 评分 5.3，危害等级中危。开发者已在 0.12.0-alpha.1 版本中修复此问题。"
published = "2026-07-09T23:17:05.217"
remediation = "立即升级到 v0.12.0-alpha.1 及以上版本，该版本已将邮箱和微信绑定接口改为 POST 请求并添加 CSRF Token 校验。如无法立即升级，可在反向代理层对 /api/oauth/email/bind 和 /api/oauth/wechat/bind 路径拦截 GET 请求，仅允许 POST 方法作为临时缓解措施。"
score = 5.3
severity = "MEDIUM"
sources = ["ghsa"]
title = "New API 账号绑定跨站请求伪造漏洞"
updated = "2026-07-16T16:37:07.970"

