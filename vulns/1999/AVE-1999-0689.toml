[basic]
description = "SCO OpenServer 5.0.5 中的 userOsa 组件存在符号链接（symlink）竞争条件漏洞。该工具在处理临时文件时未正确验证文件路径，攻击者可利用这一时序问题将操作重定向至任意系统文件，通过创建指向敏感文件的符号链接实现文件损坏或覆写。该漏洞影响 SCO OpenServer 5.0.5 版本，CVSS v3 评分为 5.5（MEDIUM），CVSS v2 评分为 2.1（LOW）。攻击条件要求攻击者已在目标系统上拥有本地账户权限，无需额外特权即可利用，攻击成功后可导致文件完整性破坏、敏感数据篡改，甚至进一步引发权限提升或拒绝服务。SCO 官方已通过安全更新修复了此漏洞，建议受影响用户升级至补丁版本。"
published = "1999-10-11T04:00:00.000"
remediation = "SCO OpenServer 5.0.5 已停止官方支持，建议迁移至受支持的现代操作系统或升级至 SCO OpenServer 6.0 及以上版本。若短期内无法升级，应修改 userOsa 脚本中文件创建逻辑，改用 mktemp 或 open() 系统调用的 O_EXCL|O_CREAT 标志安全创建临时文件；同时将 umask 设置为 077，并定期清理 /tmp 目录下指向系统关键文件的符号链接。作为临时缓解措施，可在文件系统挂载选项中启用 nodev 与 nosuid，限制普通用户在 /tmp 目录创建设备节点和符号链接，以降低攻击面。"
score = 2.1
severity = "LOW"
sources = ["exploitdb"]
