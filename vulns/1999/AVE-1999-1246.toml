[basic]
description = "Solaris 系统中 PAM（可插拔认证模块）及 unix_scheme 认证方案存在缓冲区溢出漏洞。本地攻击者可通过向 passwd、yppasswd、nispasswd 等使用这些模块的认证程序发送特制输入，触发缓冲区溢出，从而获取 root 权限。该漏洞影响 Solaris 2.3、2.4、2.5 及 2.5.1 版本，CVSS 评分 7.2，危害等级高。攻击者需具备本地系统访问权限，无需身份认证即可利用。"
published = "1997-05-13T04:00:00.000"
remediation = "升级到 Solaris 2.6 或更高版本，或安装 Sun 安全补丁 105401-01（Solaris 2.4）及 105402-01（Solaris 2.5），限制本地用户对 passwd/yppasswd/nispasswd 的 setuid 执行权限作为临时缓解。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "Sun Solaris PAM 模块缓冲区溢出本地权限提升漏洞"
updated = "2026-06-16T21:49:50.657"

