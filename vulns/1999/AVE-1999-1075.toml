[basic]
title = "Microsoft Windows NT/2000 本地安全策略绕过漏洞"
description = "Windows NT 4.0 Terminal Server 及 Windows 2000 中，当管理员修改用户策略时，若本地 ntconfig.pol 文件不可写，策略更新将不会生效。本地用户可通过将策略文件设置为只读来绕过已实施的安全策略限制，获取非授权的系统访问权限。"
severity = "MEDIUM"
score = 4.6
sources = ["cve"]
published = "1999-12-31"
updated = "2026-06-16"
remediation = "确保 %SystemRoot%\System32\GroupPolicy\Machine\registry.pol 及 %SystemRoot%\System32\ntconfig.pol 文件的 NTFS 权限正确——仅允许 Administrators 和 SYSTEM 完全控制，移除 Users 组的写入权限。同时安装 Windows 2000 SP4 及后续累积安全更新，或升级至不再受影响的 Windows 版本（如 Windows Server 2003 及以上）。"
