[basic]
description = "Microsoft MSN Messenger Service 1.0 的 Setup BBS ActiveX 控件存在缓冲区溢出漏洞。远程攻击者可通过构造特制网页并诱使用户访问，触发 ActiveX 控件中的缓冲区溢出，导致攻击者能够在受影响系统上执行任意代码。该漏洞影响 MSN Messenger Service 1.0 版本，攻击条件为用户使用 Internet Explorer 访问恶意网页，危害等级高危。"
published = "1999-09-24"
remediation = "立即卸载 MSN Messenger Service 1.0 及关联的 Setup BBS ActiveX 控件，该产品已停止支持且不再接收安全更新。在 Internet Explorer 中禁用 ActiveX 控件执行（将 Internet 区域安全级别设为高，并启用「ActiveX 控件和插件」下的「禁用」策略）。建议迁移至 Microsoft Teams 或 Skype 等受支持的即时通讯方案。如因兼容性必须保留，请在组策略中设置 Kill Bit 禁用 CLSID 以阻止 ActiveX 控件在浏览器中实例化。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Microsoft MSN Messenger Service 1.0 Setup BBS ActiveX Control 缓冲区溢出漏洞"
updated = "1999-09-24"

