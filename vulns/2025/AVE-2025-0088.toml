[basic]
description = "HPE OneView 存在远程代码执行漏洞（CWE-94），攻击者可通过特制请求利用该漏洞，在无需身份认证的情况下远程执行任意代码。该漏洞源于对用户输入的代码注入过滤不严，CVSS 评分达 10.0，危害等级严重。成功利用可导致服务器完全受控，影响 HPE OneView 系列管理平台，建议立即更新至修复版本。"
published = "2025-12-16T17:16:07.843"
remediation = "立即将 HPE OneView 升级至 11.00 或更高版本。如无法立即升级，可在管理界面限制对 OneView 管理端口的网络访问，仅允许受信任的管理员 IP 连接，并在防火墙层面阻断非必要的 443/8443 端口外部访问作为临时缓解措施。"
score = 10
severity = "CRITICAL"
sources = ["hwpoc"]
title = "HPE OneView 远程代码执行漏洞"
updated = "2026-06-17T09:15:17.283"

