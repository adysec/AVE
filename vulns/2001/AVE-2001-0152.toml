[basic]
description = "DG/UX 4.20 的 lpsched（行式打印机调度守护进程）在处理超长错误消息时存在本地缓冲区溢出漏洞。本地攻击者可通过向 lpsched 提交特制的长错误消息触发缓冲区溢出，导致系统崩溃或执行任意代码。该漏洞影响 DG/UX 4.20 版本，攻击者需拥有本地系统访问权限才能利用，危害等级中危。"
published = "2001-06-27"
remediation = "升级 DG/UX 至厂商修复版本（如存在），或限制 lpsched 本地访问权限，仅允许受信用户执行 lp 相关命令。由于 DG/UX 已停止技术支持且无安全更新，建议迁移至受支持的 Unix/Linux 系统以彻底修复此缓冲区溢出漏洞。临时缓解措施：通过 chmod 700 限制 lpsched 可执行权限并启用系统审计日志监控异常错误消息。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "DG/UX lpsched 本地缓冲区溢出漏洞"
updated = "2001-06-27"

