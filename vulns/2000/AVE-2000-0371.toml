[basic]
description = "Omnis Studio 2.4 数据库字段加密模块使用简单的编码（trivial encoding）而非标准加密算法对数据库字段进行保护，每个未加密字节根据其原始值和在字符串中位置除以4的余数进行替换，导致存储的敏感数据可被轻易还原。本地攻击者可通过直接读取数据库文件或拦截应用程序数据流获取编码后的字段内容，利用简单解码手段（甚至纸笔计算）即可恢复原始明文，造成敏感信息泄露。该漏洞影响 Omnis Studio 2.4 版本，CVSS 评分 10.0，危害等级极高。"
published = "2000-05-01"
remediation = "升级 Omnis Studio 至 2.4 以上版本（如 3.x 或更高），新版已使用标准加密算法替代弱编码。若无法升级，应在数据库层面启用透明数据加密（TDE）或使用第三方加密工具对敏感字段额外加密，并严格限制数据库文件的访问权限，避免未授权读取。此外，开发者应避免依赖 Omnis Studio 内置加密功能保护敏感数据，改用经过验证的加密库。"
score = 10.0
severity = "CRITICAL"
sources = [
    "cve",
    "exploitdb",
]
title = "Omnis Studio 2.4 弱数据库字段加密漏洞"
updated = "2026-06-16"

