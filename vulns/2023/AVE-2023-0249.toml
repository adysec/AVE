[basic]
description = "Delta Electronics DIAScreen 1.2.1.23及之前版本存在越界写入漏洞（CWE-787），攻击者可诱使用户打开特制的项目文件触发堆栈缓冲区溢出，进而导致任意代码执行。该漏洞利用复杂度低，成功利用将造成机密性、完整性和可用性完全丧失。"
published = "2023-02-08"
remediation = "厂商已发布 DIAScreen 1.3.0 版本修复该漏洞，建议用户立即升级。同时应将控制系统网络与业务网络隔离，禁止从互联网直接访问。"
