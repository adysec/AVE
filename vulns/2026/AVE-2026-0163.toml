[basic]
description = "友数聚 CPAS 审计管理系统 doDownloadPicFile 接口存在任意文件读取漏洞，该系统未对文件路径参数 filePath 进行充分的过滤与校验，导致攻击者可通过构造包含 `../../` 等目录遍历序列的恶意请求，读取服务器上的任意文件（如 /etc/passwd 等敏感系统文件）。未经身份认证的远程攻击者可直接利用该漏洞获取数据库配置、系统账户等关键信息，严重威胁系统安全性。该漏洞影响友数聚 CPAS 审计管理系统的多个版本。"
published = "20260501"
remediation = "建议升级友数聚 CPAS 审计管理系统至最新安全版本；如暂无补丁，应在 `doDownloadPicFile` 中对 `filePath` 参数进行白名单校验，限制仅允许访问指定上传目录内的文件，并过滤 `../` 等路径遍历字符，同时配置 Web 中间件禁用对敏感系统路径的直接访问。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "友数聚 CPAS 审计管理系统任意文件读取漏洞"
updated = "20260501"

