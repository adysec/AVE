[basic]
description = "Sambar Server 4.3 的 finger 和 whois 演示脚本存在缓冲区溢出漏洞，远程攻击者可通过向目标服务器发送超长主机名参数触发该漏洞，导致缓冲区溢出，从而执行任意命令。该漏洞影响 Sambar Server 4.3 版本，CVSS 评分 10.0，危害等级严重。攻击者无需身份认证即可远程利用，建议用户升级至最新版本或禁用相关演示脚本。"
published = "2000-06-01T04:00:00.000"
remediation = "升级 Sambar Server 至 4.4 及以上版本，或删除服务器上的 finger.cgi 和 whois.cgi 脚本文件。无法升级时，在防火墙或 Web 服务器 ACL 中限制对这些 CGI 脚本的访问来源，仅允许可信 IP 段访问。同时禁用不必要的 CGI 演示脚本以减小攻击面。"
score = 10
severity = "CRITICAL"
sources = ["cve"]
title = "Sambar Server finger与whois演示脚本缓冲区溢出远程代码执行漏洞"
updated = "2026-06-16T21:51:53.260"

