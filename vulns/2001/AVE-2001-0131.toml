[basic]
description = "WFTPD Pro 3.0 存在远程缓冲区溢出漏洞，攻击者可通过向 FTP 服务器发送特制的超长 CWD 或 RETR 命令触发栈缓冲区溢出，从而在目标系统上执行任意命令。该漏洞影响 WFTPD Pro 3.00 版本，无需身份认证即可远程利用，CVSS 评分 10.0，危害等级严重。"
published = "2001-05-03T04:00:00.000"
remediation = "升级 WFTPD Pro 至 3.00 R1 及以上版本，该版本已修复 CWD/RETR 命令的缓冲区溢出问题。如无法升级，应在防火墙层面限制对 FTP 服务（默认端口 21）的访问，仅允许可信 IP 连接，并禁用匿名写入权限作为临时缓解措施。"
score = 10
severity = "CRITICAL"
sources = ["exploitdb"]
title = "Texas Imperial Software WFTPD Pro 远程缓冲区溢出漏洞"
updated = "2026-06-16T21:54:02.930"

