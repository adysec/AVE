[basic]
description = "WordPress 的 WP-FaceThumb 插件 0.1 版本中的 index.php 文件存在反射型跨站脚本（XSS）漏洞。远程攻击者可通过向 pagination_wp_facethumb 参数注入恶意 Web 脚本或 HTML 代码，当管理员或用户访问特制链接时，恶意脚本将在浏览器中执行，导致敏感信息泄露或会话劫持。该漏洞无需身份认证即可利用，影响所有使用该插件的 WordPress 站点。"
published = "2012-08-13T20:55:04.740"
remediation = "立即停用并删除 WP-FaceThumb 0.1 插件，该插件已长期未维护且无安全补丁。如必须使用，在主题 functions.php 中对 pagination_wp_facethumb 参数添加 esc_attr() 转义处理，或安装 Web 应用防火墙（如 Wordfence）拦截恶意请求作为临时缓解。"
score = 4.3
severity = "MEDIUM"
sources = ["nuclei"]
title = "Mnt-tech WP-FaceThumb WordPress 插件跨站脚本漏洞"
updated = "2026-06-16T23:41:26.297"

