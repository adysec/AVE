[basic]
description = "北京派网软件有限公司Panabit-Panalog大数据日志审计系统sprog_upstatus.php文件存在严重SQL注入漏洞。攻击者可远程向'id'参数注入恶意SQL语句（如：1 and updatexml(1,concat(0x7e,user()),0)），实现数据泄露、篡改或直接控制数据库。该漏洞影响Windows/Linux平台上部署的Panabit-Panalog审计系统，CVSS评分7.3（HIGH），威胁等级极高。攻击条件较低，无需身份验证即可触发，一旦被披露可被攻击者广泛利用。主要影响范围包括日志审计系统的访问控制、权限管理及审计数据完整性，可能导致严重的安全事件。"
published = "2024-03-21T02:52:26.287"
remediation = "立即对 /Maintain/sprog_upstatus.php 的 id 参数实施严格的输入过滤和参数化查询，禁止拼接 SQL 语句；部署 WAF 规则拦截含 updatexml、union、sleep 等 SQL 注入特征的请求；限制后台管理页面仅允许内网 IP 访问；如无法修复代码，建议暂时下线该接口或升级到 Panabit 官方后续发布的安全版本。"
score = 7.3
severity = "HIGH"
sources = ["hwpoc"]
title = "北京派网软件有限公司 Panabit Panalog 大数据日志审计系统 sprog_upstatus.php SQL注入漏洞"
updated = "2026-06-17T07:23:33.743"

