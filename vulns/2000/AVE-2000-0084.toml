[basic]
description = "Microsoft Systems Management Server (SMS) 2.0 的远程控制程序在安装时被设置了不安全的默认权限，导致本地用户能够修改或替换该程序的可执行文件。攻击者通过在获得本地低权限访问后，利用该不安全的权限配置覆盖远程控制程序，从而以 SYSTEM 权限执行任意代码，实现本地权限提升。该漏洞影响 Microsoft Systems Management Server 2.0 版本，危害等级高，需系统管理员手动修复默认权限设置。"
published = "1999-12-29T05:00:00.000"
remediation = "立即检查 SMS 远程控制程序文件（如 SMS_RC.exe）的 NTFS 权限，移除 Everyone 和 Users 组的写入权限，仅保留 Administrators 和 SYSTEM 完全控制。如无法修改权限，可卸载 SMS Remote Control 组件或使用组策略限制本地用户对 SMS 安装目录的访问。"
score = 7.2
severity = "HIGH"
sources = ["epss"]
title = "Microsoft Systems Management Server 2.0 默认权限提升漏洞"
updated = "2026-06-16T21:51:00.050"

