[basic]
description = "思科缓存引擎（Cisco Cache Engine）存在缓存内容替换漏洞。远程攻击者无需身份认证即可向缓存引擎发送恶意请求，替换或污染缓存中的合法内容，导致后续用户访问时被重定向至恶意资源或获取被篡改的数据。该漏洞源于缓存引擎对内容更新缺乏充分的访问控制与校验机制，影响使用思科缓存引擎的网络环境。"
published = "1999-12-16T05:00:00.000"
remediation = "将 Cisco Cache Engine 软件升级至版本 3.2.1 或更高版本，该版本修复了缓存内容替换漏洞。若无法升级，可在网络边界配置 ACL，限制仅信任源访问 Cache Engine 的管理接口（TCP 80）和代理端口（TCP 3128/8080），并禁用不必要的远程管理功能作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "思科缓存引擎缓存内容替换漏洞"
updated = "2026-06-16T21:49:29.483"

