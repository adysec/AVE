[basic]
description = "BSD make 程序在处理 -j 并行编译选项时存在符号链接竞争条件漏洞。本地攻击者可通过在 /tmp 目录下创建恶意符号链接，利用 make 程序在临时文件操作过程中的时间窗口，诱导程序向任意系统文件写入数据，从而导致权限提升或文件内容篡改。该漏洞影响多个 BSD 系统及衍生版本，CVSS 评分 6.2，危害等级中危。"
published = "2000-01-19T05:00:00.000"
remediation = "升级 BSD make 至 1.x 以上版本（该漏洞已在后续版本修复），或改用 GNU Make 替代以避免 /tmp 竞争条件。临时缓解措施：避免在全局可写目录下以 -j 参数执行 make，并确保 make 工作目录的 sticky bit 已设置（chmod +t /tmp）。"
score = 6.2
severity = "MEDIUM"
sources = ["avd"]
title = "BSD make 竞争条件漏洞"
updated = "2026-06-16T21:50:59.043"

