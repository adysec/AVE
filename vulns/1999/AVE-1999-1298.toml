[basic]
description = "SGI IRIX 6.3 和 6.4 系统上 NetWare Client 1.0 的 ipxchk 与 ipxlink 程序存在本地权限提升漏洞。攻击者可通过修改 IFS 环境变量，使这两个程序以 root 权限执行任意命令，从而完全控制系统。该漏洞仅需本地登录账号即可利用，无需远程访问权限，可导致攻击者获取系统最高权限，严重威胁系统机密性、完整性和可用性。"
published = "1998-04-08"
remediation = "安装 SGI 安全补丁 Advisory 19980501-01-P2869，将 NetWare Client 升级至修复版本；或从系统中移除 ipxchk 与 ipxlink 程序。同时应限制本地用户对 IFS 环境变量的写入权限，避免漏洞被利用。"
score = 7.2
severity = "HIGH"
sources = ["cve"]
title = "SGI IRIX NetWare Client ipxchk/ipxlink 本地权限提升漏洞"
updated = "2026-06-16"

