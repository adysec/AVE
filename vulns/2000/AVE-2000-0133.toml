updated = "2026-06-16"
remediation = "将 Zeus Web Server 升级至 3.4 及以上版本以修复空字节处理缺陷；禁用 allow CGIs anywhere 选项，将所有 CGI 脚本限制在专用 cgi-bin 目录中；在 Web 服务器或反向代理层添加输入过滤规则，拒绝包含空字节（%00）的 URL 请求；定期审查服务器配置，确保 CGI 目录权限设置正确。"
