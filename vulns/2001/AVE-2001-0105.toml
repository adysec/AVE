[basic]
description = "cfingerd 1.4.3 及更早版本在启用 ALLOW_LINE_PARSING 选项时存在缓冲区溢出漏洞。本地攻击者可通过在 .nofinger 文件中构造超长行数据触发该漏洞，导致任意代码执行。该漏洞影响 cfingerd 1.4.1/1.4.2/1.4.3 版本，CVSS 评分 7.2，危害等级高。建议升级至最新版本或禁用 ALLOW_LINE_PARSING 选项。"
published = "2001-10-18T04:00:00.000"
remediation = "升级 cfingerd 至 1.4.3-3+squeeze1 及以上版本（对应 Debian DSA-2635-1），或在 cfingerd 配置中关闭 ALLOW_LINE_PARSING 选项（禁用后该缓冲区溢出路径不可用）。建议直接移除 finger 服务（注释 inetd/xinetd 中 finger 端口），改用更安全的替代方案或完全禁用该协议。"
score = 7.2
severity = "HIGH"
sources = ["osv"]
title = "cfingerd 缓冲区溢出漏洞"
updated = "2026-06-16T21:54:51.640"

