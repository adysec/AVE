[basic]
description = """
Jeecg-Boot 是一款基于代码生成器的 Java 快速开发框架。其某些接口存在 SQL 注入漏洞，未授权的攻击者可通过构造恶意请求参数，在数据库查询中注入任意 SQL 语句，导致敏感数据泄露、数据篡改甚至远程代码执行。攻击者无需身份认证即可利用该漏洞。
"""
published = "2025-07-21"
remediation = "升级 Jeecg-boot 至 3.5.3 或更高版本，该版本修复了相关 SQL 注入漏洞。如无法升级，建议对用户输入参数进行严格的过滤和参数化查询处理。"
score = 5.0
severity = "MEDIUM"
sources = ["hwpoc"]
title = "Jeecg-Boot SQL 注入漏洞"
updated = "2025-07-21"

