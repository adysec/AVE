[basic]
description = "Napster 客户端 beta 5 版本存在缓冲区溢出漏洞，远程攻击者可通过向目标用户发送特制的超长消息触发该漏洞，导致 Napster 客户端程序缓冲区溢出而崩溃，造成拒绝服务。该漏洞影响 Napster beta 5 及可能更早版本，攻击者无需认证即可远程发起攻击，CVSS 评分 2.1，危害等级低。"
published = "2000-03-26T05:00:00.000"
remediation = "建议立即升级至 Napster beta 5 之后的修复版本；由于 Napster 官方服务已于 2001 年停止运营，该客户端已不再受支持，建议彻底停止使用 Napster 旧版客户端，改用其他现代文件共享软件作为替代方案。如仍需临时运行，可在网络边界防火墙封禁 Napster 使用的 TCP 端口 8888 和 6699，以阻止来自不可信来源的连接。"
score = 2.1
severity = "LOW"
sources = ["epss"]
title = "Napster Napster客户端 缓冲区溢出拒绝服务漏洞"
updated = "2026-06-16T21:51:23.380"

