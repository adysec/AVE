[basic]
description = "OpenSSH 3.0.1 及更早版本在启用 UseLogin 选项时，未对关键环境变量（如 LD_PRELOAD）进行有效过滤和清理。攻击者可在已登录目标系统的条件下，通过设置 LD_PRELOAD 等环境变量加载恶意共享库，在 SSH 会话切换过程中获取 root 级执行权限。该漏洞影响 OpenSSH 早期版本中启用了 UseLogin 功能的 Linux/Unix 系统，利用条件要求攻击者已具有本地用户访问权限，最终可导致本地权限提升并完全控制目标主机。"
published = "2001-12-21T05:00:00.000"
remediation = "升级 OpenSSH 至 3.0.2 或更高版本（如 OpenSSH 3.0.2p1 及以上），或在 sshd_config 中将 UseLogin 设置为 no 并重启 sshd 服务禁用 UseLogin 功能；同时建议在 /etc/ssh/sshd_config 中设置 PermitUserEnvironment no 并重启 sshd 服务以禁止用户自定义环境变量，彻底阻断 LD_PRELOAD 等环境变量注入提权路径。"
score = 7.2
severity = "HIGH"
sources = ["redhat"]
title = "OpenSSH OpenSSH UseLogin环境变量传递漏洞"
updated = "2026-06-16T21:55:08.570"

