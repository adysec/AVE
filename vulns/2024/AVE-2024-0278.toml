[basic]
description = "浪潮GS企业管理软件存在.NET反序列化远程代码执行漏洞，攻击者可通过向 `/cwbase/service/rps/xtdysrv.asmx` 接口发送特制的SOAP XML请求包触发反序列化操作，在服务端执行任意命令。该漏洞影响浪潮GS系列企业管理软件，攻击条件低，无需身份认证即可远程利用，危害严重。建议用户及时升级至安全版本或限制相关接口的访问权限。"
published = "0731"
remediation = "联系浪潮官方获取GS企业管理软件安全补丁，升级至修复版本。临时缓解措施：在IIS中限制 /cwbase/service/rps/xtdysrv.asmx 的访问IP白名单，配置WAF规则拦截SOAP请求中异常的BinaryFormatter载荷，并在Web.config中为TypeConverter添加自定义SerializationBinder限制反序列化类型白名单。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "浪潮GS企业管理软件 .NET反序列化远程代码执行漏洞"
updated = "0731"

