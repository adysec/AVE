[info]
author = "AVE"
description = "检测 Microsoft Windows 95/98 Telnet 客户端堆缓冲区溢出漏洞。通过 HTTP 返回包含恶意 rlogin: 协议 URL 的 HTML 页面，在 IE5 中打开可触发 telnet.exe 堆缓冲区溢出，导致拒绝服务或任意代码执行"
id = "POC-AVE-1999-0386"
name = "Microsoft Windows 95/98 Telnet Client Buffer Overflow PoC"
severity = "low"
tags = ["cve-1999-0749"]
vuln_id = [
    "CVE-1999-0749",
    "AVE-1999-0386",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["telnet:"]
