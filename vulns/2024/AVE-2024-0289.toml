[basic]
description = "方天云智慧平台系统 Upload.ashx 接口存在任意文件上传漏洞，未经身份认证的远程攻击者可通过构造特制的 multipart/form-data 请求，向服务器上传包含恶意代码的 .asmx 文件，从而获取服务器控制权，实现远程代码执行。该漏洞影响方天云智慧平台系统，危害等级严重，建议用户尽快修复。"
published = "0807"
remediation = "立即联系方天云官方获取最新安全补丁或升级版本，修复 Upload.ashx 文件类型校验缺陷。临时缓解措施：在 IIS 或反向代理层配置规则，禁止 Upload.ashx 上传 .asmx/.aspx/.ashx 等可执行脚本文件；或通过 Web 应用防火墙（WAF）拦截包含 multipart/form-data 中 filename 含可疑扩展名的请求；如业务不需要，可删除或禁用 Upload.ashx 接口。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "方天云 智慧平台系统 任意文件上传漏洞"
updated = "0807"

