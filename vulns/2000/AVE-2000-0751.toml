[basic]
description = "NetZero ZeroPort 3.0 及更早版本使用弱加密方法存储用户的登录凭据信息，本地攻击者可通过分析程序存储的加密数据，利用加密算法的弱安全性还原出明文密码。该漏洞源于软件对用户密码的加密强度不足，攻击者需具备本地系统访问权限，可导致用户账户凭证泄露，进而威胁账户安全。CVSS 评分 4.6，危害等级中危。"
published = "2000-07-18T04:00:00.000"
remediation = '升级 NetZero ZeroPort 至 3.0 以上版本，新版本改用了更强加密算法保护本地存储的登录凭据。如无法升级，可删除程序自动保存的密码（在拨号连接设置中取消"保存密码"选项），每次手动输入密码以降低泄露风险。对仍使用此类旧版拨号软件的终端，建议迁移至支持现代加密协议（如 TLS）的连接方案。'
score = 4.6
severity = "MEDIUM"
sources = ["cve"]
title = "NetZero ZeroPort 用户登录信息弱加密漏洞"
updated = "2026-06-16T21:52:08.213"

