[basic]
description = "NcFTPd FTP Server 2.4.1 之前版本中存在差一错误（Off-by-one）漏洞，远程攻击者通过向 FTP 服务器发送特制的超长 PORT 命令参数，可触发缓冲区溢出，导致服务进程崩溃，造成拒绝服务。该漏洞影响 NcFTPd 2.4.1 之前所有版本，攻击无需身份认证，仅需目标开放 FTP 端口即可实施。CVSS 评分 7.5，危害等级高。"
published = "1999-01-01T05:00:00.000"
remediation = "立即将 NcFTPd 升级至 2.4.1 或更高版本，该版本已修复 PORT 命令长参数导致的 off-by-one 越界写入问题。如无法升级，可在防火墙或 TCP Wrappers 中限制可连接 FTP 服务的源 IP 范围，降低远程攻击面。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "NcFTPd FTP Server PORT命令长参数越界拒绝服务漏洞"
updated = "2026-06-16T21:50:44.103"

