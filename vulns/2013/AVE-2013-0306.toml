[basic]
description = "Adobe Acrobat Reader 在处理 PDF 文档时存在释放后使用（Use-After-Free）内存破坏漏洞，漏洞位于 ToolButton 组件中。远程攻击者可构造特制的 PDF 文件，通过诱导用户打开该恶意文档触发漏洞，成功利用可在当前用户上下文中执行任意代码，完全控制受影响系统。该漏洞影响 Adobe Reader 和 Acrobat 9.5.5 之前版本、10.1.7 之前版本及 11.0.03 之前版本，无需身份认证且无需用户交互即可触发，CVSS 评分 9.8，危害等级严重。Adobe 已在 2013 年 8 月安全更新中修复此漏洞，且该漏洞已被 CISA 列入已知被利用漏洞目录（KEV）。"
published = "2013-08-30T20:55:06.230"
remediation = "升级 Adobe Reader/Acrobat 至 9.5.5（9.x 系列）、10.1.7（10.x 系列）或 11.0.03（11.x 系列）及以上版本。如无法立即升级，可在 PDF 阅读器中禁用 JavaScript（编辑→首选项→JavaScript→取消勾选「启用 Acrobat JavaScript」），并启用受保护视图（编辑→首选项→安全性→增强保护→勾选「启用增强保护」）以降低利用风险。"
score = 9.8
severity = "CRITICAL"
sources = ["kev"]
title = "Adobe Acrobat Reader 内存破坏漏洞"
updated = "2026-06-16T23:54:55.737"

