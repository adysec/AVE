[basic]
description = "IBM AIX 3.2 的 crontab 组件存在未指明安全漏洞，本地攻击者可通过未知攻击向量利用该漏洞提升权限至 root 用户，实现对系统的完全控制。由于漏洞细节未公开，攻击条件尚不明确，但攻击者需要具备本地系统访问权限方可利用，影响范围包括 AIX 3.2 版本。"
published = "1999-12-31T05:00:00.000"
remediation = "立即升级 AIX 至 4.1 或更高版本（IBM 已通过 APAR 补丁修复此漏洞），或限制 crontab 命令仅授权管理员使用，移除 /usr/bin/crontab 的 SUID 位（chmod u-s /usr/bin/crontab）作为临时缓解措施。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "IBM AIX 3.2 crontab 本地权限提升漏洞"
updated = "2026-06-16T21:50:47.120"

