[basic]
description = "KDE 桌面环境的文件管理器 kfm 在执行某些文件操作时会启动一个 TCP 监听服务。该服务缺乏身份认证的访问控制，未经授权的远程攻击者只要能与目标主机建立 TCP 连接，便可通过向该服务发送伪造的 copy（复制）命令，将文件写入或覆盖目标系统上的任意路径。成功利用该漏洞可使攻击者篡改系统关键配置文件、用户数据或其他任意文件，进而破坏系统完整性或为进一步入侵创造条件。攻击需目标主机运行 kfm 并开放相应 TCP 服务端口，且攻击者需能网络访问该端口。"
published = "1997-05-05T04:00:00.000"
remediation = "将 KDE 升级到 2.0 或更高版本，该版本已移除 kfm 中对 TCP socket 的依赖并改用 AF_UNIX socket 通信。若短期内无法升级，可临时禁用 kfm 的 TCP 服务功能，或通过防火墙规则阻断 1024 以上端口的对外监听，并严格限制 KDE 进程的本地文件写入权限，防止攻击者通过 TCP 发送 copy 命令篡改 ~/.rhosts 等敏感文件。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "KDE 文件管理器 kfm 远程文件篡改漏洞"
updated = "2026-06-16T21:50:04.457"

