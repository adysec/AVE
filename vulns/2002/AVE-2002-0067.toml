[basic]
description = "TightVNC 1.2.6 之前版本存在安全绕过漏洞。该漏洞源于服务端在多个连接中生成相同的 challenge 字符串，远程攻击者可通过嗅探其他用户的 challenge 与 response 数据，利用该固定 challenge 绕过 VNC 认证机制，从而在无需合法凭据的情况下获取对目标系统的远程访问权限。该漏洞影响所有使用 TightVNC 1.2.6 之前版本的系统，攻击者只需具备网络访问能力即可实施攻击，无需身份认证，危害较大。"
published = "2002-12-11T05:00:00.000"
remediation = "升级 TightVNC 至 1.2.6 或更高版本，该版本修复了每次连接生成相同 challenge 字符串的问题。如无法立即升级，应通过 SSH 隧道或 VPN 封装 VNC 流量，防止攻击者嗅探网络中的 challenge/response 数据；同时在防火墙层面限制 VNC 端口（默认 5900/TCP）仅允许受信任 IP 访问。"
score = 7.5
severity = "HIGH"
sources = ["osv"]
title = "TightVNC 认证绕过漏洞"
updated = "2026-06-16T21:59:07.640"

