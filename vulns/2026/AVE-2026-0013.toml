[basic]
description = "新华三 H3C ER3200G2 企业级路由器存在信息泄露漏洞，该设备的 Web 管理接口未对敏感信息访问进行有效权限校验，未经身份认证的远程攻击者可通过向特定 URL 路径发送特制请求，获取设备配置信息、系统日志、用户账号等敏感数据。攻击者可利用泄露的信息进一步渗透内网，该漏洞影响 ER3200G2 全系列固件版本。厂商暂未发布官方补丁，建议用户限制管理接口访问来源。"
published = "08.08"
remediation = "立即升级设备固件至最新版本（ERG2系列V5.30.23.1000及以上），可通过H3C官网下载中心获取。配置ACL访问控制列表，将Web管理接口（默认80/443端口）仅限内网可信IP地址访问，禁止暴露在公网。同时修改默认管理员密码，关闭HTTPS服务器中的调试接口和诊断页面，并定期审计设备日志中非授权访问记录。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "H3C ER3200G2 信息泄露漏洞"
updated = "08.08"

