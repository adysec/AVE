[basic]
description = "Windows NT SP2 系统中 Passfilt.dll 密码过滤组件存在安全设计缺陷，未有效阻止用户设置包含帐户名的弱密码。攻击者通过社工等手段获取目标系统有效用户名后，可结合用户名信息进行针对性密码猜测或暴力破解攻击，大幅降低密码破解难度。该漏洞影响 Windows NT SP2 版本，CVSS 评分 7.5，危害等级高危。建议管理员通过组策略强制实施密码复杂度要求并加强密码审计。"
published = "1999-12-31T05:00:00.000"
remediation = "升级至 Windows NT 4.0 SP3 及以上版本，或安装微软安全补丁。如无法升级，通过组策略编辑器启用密码复杂性要求，禁止密码包含用户名或部分用户名，并设置最小密码长度至少 8 位。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "Microsoft Windows NT 密码策略安全漏洞"
updated = "2026-06-16T21:50:10.843"

