[basic]
description = "McMurtrey/Whitaker & Associates 公司开发的 Cart32 购物车系统 2.6/3.0 及更早版本中存在硬编码后门密码漏洞。远程攻击者可利用该预设后门密码绕过正常认证机制，直接登录系统管理后台，进而执行任意命令并完全控制受影响的 Web 服务器。该漏洞无需任何用户交互即可远程触发，危害等级高。"
published = "2000-04-27T04:00:00.000"
remediation = "立即升级 McMurtrey / Whitaker & Associates Cart32 到 3.0.1 及以上版本，移除内嵌远程管理密码 backdoor。或通过强安全策略替换默认后台密码并禁用远程管理功能以临时缓解风险。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "McMurtrey/Whitaker & Associates Cart32 后门密码漏洞"
updated = "2026-06-16T21:51:42.837"

