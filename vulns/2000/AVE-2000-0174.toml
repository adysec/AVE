[basic]
description = "Windows NT 的计划任务调度器（Task Scheduler）在执行批处理文件时，会使用当前登录交互用户的驱动器映射而非系统账户的映射，导致本地低权限用户可通过将恶意批处理文件替换原始计划任务中的批处理文件，诱使系统以更高权限执行恶意代码，从而获取权限提升。该漏洞影响 Windows NT 4.0 系统，攻击者须具备本地登录权限，CVSS 评分 4.6，危害等级中危。"
published = "2000-02-14T05:00:00.000"
remediation = "立即安装 Windows NT 4.0 Service Pack 6a（最高版本服务包），该补丁已修复任务计划程序使用交互用户驱动器映射的问题。由于 Windows NT 4.0 已停止支持，建议升级至受支持的 Windows Server 版本（如 Windows Server 2019/2022）。临时缓解措施：限制可执行 AT 命令的用户权限，仅授权管理员账户使用计划任务功能。"
score = 4.6
severity = "MEDIUM"
sources = ["avd"]
title = "Microsoft Windows NT 计划任务权限提升漏洞"
updated = "2026-06-16T21:51:12.237"

