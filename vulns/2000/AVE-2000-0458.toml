[basic]
description = "wu-ftpd 2.6.0 及更早版本中的 lreply 函数未能正确清理不可信的格式字符串，存在格式化字符串漏洞。远程攻击者可通过 SITE EXEC 命令向目标 FTP 服务器发送特制的格式化字符串载荷，触发栈覆盖写入，从而在目标系统上以 FTP 进程权限执行任意命令。该漏洞影响广泛部署的 WU-FTPD 服务，CVSS 评分 10.0，危害等级严重，且已有公开的利用代码。"
published = "2000-07-07T04:00:00.000"
remediation = "立即升级 wu-ftpd 至 2.6.1 及以上版本，该版本修复了 lreply 函数中格式串处理不当的问题。鉴于 wu-ftpd 已停止维护，建议迁移至 vsftpd 或 ProFTPD 等仍在维护的 FTP 服务端软件。如无法立即升级，可在 inetd.conf 中注释 wu-ftpd 行并重启 inetd 服务，临时禁用 FTP 服务。"
score = 10
severity = "CRITICAL"
sources = ["redhat"]
title = "Washington University wu-ftpd 远程格式字符串漏洞"
updated = "2026-06-16T21:52:01.597"

