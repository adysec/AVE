[basic]
description = "华锐捷监控综合管理平台存在任意文件上传漏洞，位于 `uploadOffineMap` 接口中。由于未对上传文件的类型与内容进行有效校验，远程攻击者可绕过身份验证直接上传恶意脚本（如 Webshell）至服务器，从而获取服务器控制权限，实现远程代码执行。该漏洞影响华锐捷监控综合管理平台的多版本部署，危害较大。"
published = "0707"
remediation = "该漏洞为华锐捷监控综合管理平台 uploadOffineMap 接口未作文件类型与权限校验导致的任意文件上传。建议联系厂商获取安全补丁或升级至最新版本；同时立即在 Web 服务器层面对 /uploadOffineMap 路径添加扩展名白名单（仅允许 .png/.jpg/.bmp 等图片格式），上传目录禁止解析脚本文件（取消执行权限），并对上传文件名进行随机化重命名处理，防止直接访问恶意文件。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "华锐捷 监控综合管理平台任意文件上传漏洞"
updated = "0707"

