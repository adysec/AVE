[basic]
description = "SCO UnixWare 7.0、7.0.1、7.1 及 7.1.1 系统中，部分会在程序崩溃时生成核心转储文件（core dump）的程序会以可预测的文件名（如 ./core.pid）写入当前目录。本地已登录的普通用户可利用符号链接（symlink）攻击，预先将 ./core.pid 链接至其无权修改的敏感文件（如系统或他人的文件）。当目标程序崩溃并写入核心转储时，系统实际通过该链接覆盖被指向的文件内容。攻击者为本地用户，需具备目标程序所在目录的写权限并能够触发该程序崩溃，从而借核心转储机制篡改任意文件，可能造成本地权限提升或拒绝服务。"
published = "1999-12-03T05:00:00.000"
remediation = "升级到 SCO UnixWare 7.1.1 及以上已修复版本；临时缓解措施：在 /etc/conf/cf.d/mtune 或系统配置中禁用程序 core dump 功能（如执行 ulimit -c 0 限制核心文件生成），并确保用户无法在当前目录写入符号链接，避免核心文件被指向敏感路径。"
score = 7.2
severity = "HIGH"
sources = ["exploitdb"]
title = "SCO Unixware 7.0/7.0.1/7.1/7.1.1 coredump 符号链接本地文件篡改漏洞"
updated = "2026-06-16T21:49:12.973"

