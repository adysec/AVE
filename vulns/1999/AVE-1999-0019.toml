[basic]
description = "WebCom datakommunikation Guestbook 0.1 的 rguest.exe CGI 程序存在任意文件访问漏洞，由于未对用户输入的文件路径参数进行充分过滤，远程攻击者可通过向目标服务器发送特制 HTTP 请求，利用该 CGI 程序读取服务器上任意文件，导致敏感信息泄露。该漏洞影响 WebCom datakommunikation Guestbook 0.1 版本，无需身份认证即可远程利用。"
published = "1999-04-09T04:00:00.000"
remediation = '立即从 Web 服务器 CGI 目录中删除 wguest.exe 和 rguest.exe 文件，停止使用 Webcom Guestbook 0.1 并替换为其他受支持的留言本方案；同时检查 NTFS 权限，确保 IUSR_MACHINENAME 匿名账户仅拥有 Web 内容目录的最小读取权限，对系统目录（如 c:\winnt\system32）应禁止其读取。'
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "WebCom datakommunikation Guestbook rguest.exe 任意文件访问漏洞"
updated = "2026-06-16T21:48:04.593"

