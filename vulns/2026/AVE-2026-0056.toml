[basic]
description = "Google Chrome 的 V8 JavaScript 引擎存在越界读写漏洞，该漏洞源于 V8 引擎在处理特定 JavaScript 对象时对内存边界验证不足。远程攻击者可通过构造特制的 HTML 页面诱导用户访问，成功利用该漏洞可在沙箱环境内执行任意代码。该漏洞影响 Chrome 149.0.7827.103 之前的所有版本，CVSS 评分 8.8，危害等级高危。Google 已发布安全更新修复此漏洞。"
published = "2026-06-09T00:16:47.370"
remediation = "建议立即将 Google Chrome 升级至 149.0.7827.103 及以上版本，该版本已修复 V8 引擎中的越界读写漏洞。若使用 Chrome 自动更新，重启浏览器后可在 chrome://settings/help 确认版本。该漏洞已被 CISA 列入已知被利用漏洞目录，建议在 2026 年 6 月 23 日前完成修复。如无法立即升级，可在浏览器设置中启用安全浏览增强保护模式，并使用组策略限制用户对不可信网页的访问作为临时缓解措施。"
score = 8.8
severity = "HIGH"
sources = ["hwpoc"]
title = "Google Chrome V8 越界读写漏洞"
updated = "2026-06-17T10:14:19.413"

