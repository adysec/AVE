[basic]
description = "Gossamer Threads DBMan 2.0.4 的 db.cgi CGI 脚本存在信息泄露漏洞。远程攻击者可通过向 db 参数传递不存在的数据库名称，触发脚本返回系统环境变量及配置信息，导致敏感数据泄露。该漏洞攻击复杂度低，无需身份认证即可远程利用，影响 DBMan 2.0.4 及可能更早版本。"
published = "2000-05-05T04:00:00.000"
remediation = "建议立即升级 DBMan 至 2.0.5 或更高版本，该版本已修复 db.cgi 中 db 参数未经验证即输出环境变量的缺陷。如无法升级，修改 db.cgi 源码，在接收 db 参数后校验该数据库是否存在，若不存在则返回 404 而非泄露环境变量和配置信息。也可在 Web 服务器层用 rewrite 规则限制对 db.cgi 的访问或输入过滤。"
score = 6.4
severity = "MEDIUM"
sources = ["epss"]
title = "Gossamer Threads DBMan 2.0.4 信息泄露漏洞"
updated = "2026-06-16T21:51:35.887"

