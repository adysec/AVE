[basic]
description = "亿赛通电子文档安全管理系统 SecureUsbConnection 接口存在 Java 反序列化漏洞，未经身份认证的远程攻击者可通过向 /CDGServer3/SecureUsbConnection 接口发送特制的序列化数据包触发不安全的反序列化操作，导致远程代码执行。攻击者无需任何权限即可利用该漏洞完全控制目标服务器，影响部署了该系统的企业文档管理环境。"
published = "0812"
remediation = "联系亿赛通官方获取最新安全补丁，升级 CDG 电子文档安全管理系统至最新版本。临时缓解措施：在 Web 应用防火墙或反向代理层面添加规则，拦截对 `/CDGServer3/SecureUsbConnection` 路径的 POST 请求；限制该接口仅允许可信 IP 访问；禁用 Java 反序列化功能或部署 RASP 防护。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
