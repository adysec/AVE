[basic]
description = "SCO OpenServer 系统中的 MMDF 邮件服务器存在缓冲区溢出漏洞，远程攻击者无需身份认证即可向 SMTP 守护进程发送特制的超长 MAIL FROM 命令，触发缓冲区溢出，从而获取系统特权。该漏洞影响 SCO OpenServer 系列操作系统，CVSS 评分 7.5，危害等级高。厂商已发布安全补丁修复此漏洞。"
published = "2000-02-16T05:00:00.000"
remediation = "立即从 SCO 安全公告 SB-00.06a 获取并安装 MMDF 补丁，补丁位于 ftp://ftp.sco.com/SSE/security_bulletins/SB-00.06a。如无法打补丁，可在 SMTP 服务配置中限制 MAIL FROM 命令参数长度不超过 256 字节，或在网络边界防火墙封禁对 SMTP 端口（25）的非授权访问。由于 SCO OpenServer 已停止技术支持，建议迁移至受支持的 Linux 发行版或现代 UNIX 系统。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "SCO OpenServer MMDF SMTP 缓冲区溢出权限提升漏洞"
updated = "2026-06-16T21:51:07.263"

