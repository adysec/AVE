[basic]
description = "Linux 内核 2.2.10 及更早版本中的 IPChains 防火墙在重组 IP 分片前未对分片头部信息进行检查，导致远程攻击者可通过发送多个偏移量为 0 的恶意 IP 碎片绕过防火墙过滤规则。该漏洞影响使用上述内核版本并启用 IPChains 过滤机制的 Linux 系统，攻击者无需身份认证，只需向目标主机发送特制的重叠分片数据包即可规避访问控制策略，从而对受保护网络实施未授权访问或进一步攻击。"
published = "1999-07-27T04:00:00.000"
remediation = "建议将 Linux 内核升级至 2.2.11 及以上版本（或 2.0.x 系列最新补丁版），该版本已修复 ipchains 未重组 IP 分片即检查头部导致的过滤绕过问题。如无法立即升级，可在防火墙规则中启用 IP 分片重组检查（如开启 net.ipv4.ipfrag_* 相关内核参数），并丢弃 offset 为 0 的异常重叠分片，临时缓解远程绕过过滤规则的攻击。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "Linux 内核 IPChains IP 片段重叠绕过漏洞"
updated = "2026-06-16T21:49:31.960"

