[basic]
description = "Telnet 守护进程在处理 TERMCAP 环境变量时存在缓冲区溢出漏洞，远程攻击者无需身份认证即可通过向 telnet 服务发送特制的 TERMCAP 变量触发 tgetent() 函数中的栈溢出，从而在目标系统上以 root 权限执行任意代码。该漏洞影响 RedHat Linux 6.0 及 Slackware Linux 4.0 等早期 Linux 发行版，CVSS 评分 10.0，危害等级严重。"
published = "1997-10-18"
remediation = "建议立即升级至 RedHat Linux 6.1 及以上版本，或 Slackware Linux 4.1 及以上版本。如无法升级，建议禁用 telnet 服务（停止 telnetd 并移除 xinetd 中对应配置），改用 SSH 作为远程管理方案。同时排查受影响系统是否已被植入后门，必要时重新安装系统。"
score = 10.0
severity = "CRITICAL"
sources = ["cve"]
title = "RedHat Linux、Slackware Linux Telnet守护进程缓冲区溢出漏洞"
updated = "2026-06-16"

