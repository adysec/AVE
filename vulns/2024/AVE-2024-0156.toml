[basic]
description = "AJ-Report 是一款开源的数据可视化大屏工具，其 `/dataSetParam/verification` 接口在处理数据集参数校验时未对用户输入进行充分过滤与校验，导致攻击者可构造恶意请求（如通过 Content-Type 为 application/json 的请求体传入含命令拼接的参数）实现远程命令执行。该漏洞影响 AJ-Report 相关开源版本，攻击条件为攻击者能够访问目标系统的 Web 服务且无需身份认证，通过发送特制的 HTTP POST 请求即可在服务端执行任意系统命令，进而完全控制服务器，危害等级较高。"
published = "0725"
remediation = "立即更新AJ-Report至最新开发版本，应用官方安全补丁并修改/dataSetParam/verification;swagger-ui/路径的访问控制；如无法立即修复，可在Web应用防火墙中添加POST请求过滤规则作为紧急缓解措施。"
