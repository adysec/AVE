[basic]
description = "Gene6 G6 FTP Server 2.0 存在拒绝服务漏洞，远程攻击者可通过向该 FTP 服务器的认证模块提交超长的用户名或密码，触发缓冲区溢出，导致服务器进程资源耗尽而崩溃，停止响应合法用户请求。该漏洞攻击复杂度低，无需身份认证即可远程利用，影响 Gene6 G6 FTP Server 2.0 版本。"
published = "1999-11-17T05:00:00.000"
remediation = "升级至 Gene6 G6 FTP Server v3.x 或更高版本，该版本已修复用户名/密码长度未校验导致的拒绝服务问题。如无法升级，在 FTP 服务器配置中限制用户名和密码最大长度（建议不超过 32 字符），并配置速率限制策略防止大量异常连接耗尽服务器资源。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Gene6 G6 FTP Server 2.0 拒绝服务漏洞"
updated = "2026-06-16T21:50:36.847"

