[basic]
description = "Solaris 2.3 和 2.4 系统中的 NIS+ 服务的 nss_nisplus.so.1 库存在缓冲区溢出漏洞。本地攻击者可通过向该库函数传入特制参数触发缓冲区溢出，覆盖内存中的关键数据，从而获取 root 权限。该漏洞影响 Solaris 2.3 及 2.4 版本，CVSS 评分 7.2，危害等级高，需本地访问权限方可利用。"
published = "1997-07-30T04:00:00.000"
remediation = "立即安装 Sun Security Bulletin #148 中提供的 NIS+ 补丁程序。由于 Solaris 2.3 和 2.4 已停止技术支持，建议升级到受支持的 Solaris 版本（如 Solaris 10 或 11）。临时缓解措施：限制本地用户登录权限，仅允许受信任用户访问系统，并监控 /var/adm/messages 中的异常崩溃日志。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "Sun Solaris NIS+ 缓冲区溢出漏洞"
updated = "2026-06-16T21:50:24.043"

