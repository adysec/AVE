[info]
author = "AVE"
description = "检测目标 DNS 服务器是否开放递归查询，验证 DNS 反射放大攻击漏洞。发送 A 记录查询，若服务器返回包含 IN 类的 DNS 响应，表明其为开放解析器，可能被用于放大攻击。"
id = "POC-AVE-1999-1093"
name = "CVE-1999-1379 PoC"
severity = "medium"
tags = ["ave-1999-1093"]
vuln_id = [
    "CVE-1999-1379",
    "AVE-1999-1093",
]

[poc]
logic = "all"

[[poc.requests]]
dns_type = "A"
path = "{{Hostname}}"
protocol = "dns"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["IN"]
