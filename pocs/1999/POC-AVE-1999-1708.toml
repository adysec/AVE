[info]
author = "AVE"
description = "检测目标是否受 Internet Explorer 4.01 及更早版本中 mk: 协议缓冲区溢出漏洞影响。远程攻击者可通过构造超长 mk: 协议 URL 诱使用户点击，触发缓冲区溢出导致任意命令执行。验证方式为在 HTTP 响应中嵌入触发载荷并检查响应状态。"
id = "POC-AVE-1999-1708"
name = "Microsoft Internet Explorer MK协议缓冲区溢出PoC"
severity = "high"
tags = [
    "cve-1999-1094",
    "buffer-overflow",
    "ie",
    "mk-protocol",
]
vuln_id = [
    "CVE-1999-1094",
    "AVE-1999-1708",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/poc.html"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["mk:"]
