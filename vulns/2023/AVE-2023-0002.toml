[basic]
description = "F5 BIG-IP 配置实用程序（TMUI）存在认证绕过漏洞，未经身份验证的远程攻击者通过管理端口或自 IP 地址向目标系统发送特制未公开请求，可绕过配置实用程序认证机制，进而执行任意系统命令，实现远程代码执行。该漏洞影响 F5 BIG-IP 多个版本，CVSS 评分 9.8，危害等级严重，建议受影响的用户及时升级至安全版本修复。"
published = "2023-10-26T21:15:08.097"
remediation = "立即升级 F5 BIG-IP 至安全版本：17.1.0、16.1.3.3、15.1.10.2、14.1.5.0 或 13.1.5.1。如无法立即升级，可在配置中禁用 TMUI（流量管理用户界面）的外部访问，通过防火墙限制管理端口（443/tcp）仅允许受信任 IP 访问，或使用 iRule 限制对 /tmui/ 路径的访问作为临时缓解措施。"
score = 9.8
severity = "CRITICAL"
sources = ["hwpoc"]
title = "F5 BIG-IP 远程代码执行漏洞"
updated = "2026-06-17T06:31:32.640"

