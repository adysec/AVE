[info]
author = "ave"
description = "检测 Linux 系统上是否存在 fdmount 缓冲区溢出漏洞。fdmount 在处理超长 mountpoint 参数时存在栈溢出，属于 floppy 组的本地用户可借此提升至 root 权限。通过检查 fdmount 二进制文件的存在性来验证漏洞环境。"
id = "POC-AVE-2000-0358"
name = "CVE-2000-0438 fdmount Local Buffer Overflow PoC"
severity = "high"
tags = ["ave-2000-0358"]
vuln_id = [
    "CVE-2000-0438",
    "AVE-2000-0358",
]

[poc]
logic = "any"

[[poc.requests]]
path = "/usr/bin/fdmount"
protocol = "file"

[[poc.requests.matchers]]
expect = true
part = "body"
regex = ".+"
type = "regex"

[[poc.requests]]
path = "/usr/sbin/fdmount"
protocol = "file"

[[poc.requests.matchers]]
expect = true
part = "body"
regex = ".+"
type = "regex"

[[poc.requests]]
path = "/sbin/fdmount"
protocol = "file"

[[poc.requests.matchers]]
expect = true
part = "body"
regex = ".+"
type = "regex"
