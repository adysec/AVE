[basic]
description = "Microsoft Windows 95/98 网络组件在处理 UNC 路径时存在缓冲区溢出漏洞，远程攻击者可通过向目标用户发送包含超长文件名的恶意链接，诱使用户点击后触发缓冲区溢出，从而在目标系统上执行任意代码。该漏洞影响 Windows 95 和 Windows 98 系统，无需身份认证即可远程利用，CVSS 评分 7.5，危害等级高。"
published = "1999-11-12T05:00:00.000"
remediation = "Windows 95/98 已停止支持，建议升级到 Windows 10/11 等受支持版本。如无法升级，可在网络边界防火墙阻止 TCP 139/445 端口的入站 SMB 流量，并禁用 NetBIOS over TCP/IP 以降低攻击面。Microsoft 曾发布安全更新 (MS00-027) 修复此漏洞，但已不再提供下载。"
score = 7.6
severity = "HIGH"
sources = ["cve"]
title = "Microsoft Windows 95/98 UNC缓冲区溢出漏洞"
updated = "2026-06-16T21:51:29.500"

