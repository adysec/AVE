[basic]
description = "Ericsson Drutt MSDP（移动业务交付平台）4、5、6 版本的 Instance Monitor 组件存在目录遍历漏洞。远程攻击者无需身份认证即可通过向默认 URI 中注入 `..%2f`（点号编码斜杠）绕过路径限制，读取服务器上的任意文件，导致敏感信息泄露。该漏洞 CVSS 评分 5.0，危害等级中危，攻击复杂度低，已有公开 PoC 可利用。"
published = "2015-04-06T15:59:02.213"
remediation = "联系 Ericsson 获取 MSDP 4/5/6 的安全补丁（2015 年 3 月 12 日已发布），升级 Instance Monitor 组件至修复版本。如无法升级，在反向代理或 WAF 层面添加规则，拦截包含 `..%2f` 或 `%2e%2e%2f` 等路径遍历编码的 URI 请求，并限制 Instance Monitor 对外网的访问，仅允许管理网段访问。"
score = 5
severity = "MEDIUM"
sources = ["nuclei"]
title = "Ericsson Drutt Mobile Service Delivery Platform 4/5/6 Instance Monitor 路径遍历漏洞"
updated = "2026-06-17T00:23:41.940"

