[basic]
description = '''
Arcserve Unified Data Protection是VMware公司的一款综合数据保护解决方案。2015-4068 号目录遍历漏洞存在于 Arcserve UDP 5.0 更新版4 之前版本中。攻击者无需身份验证即可远程向 reportFileServlet 或 exportServlet servlet 提交特制文件路径，利用目录遍历缺陷访问系统敏感文件或清空重要数据，导致信息泄露或服务中断。漏洞 CVSS 评分 9.1，等级极高，对企业的IT系统构成严重威胁。该漏洞主要影响使用旧版 Arcserve UDP 的企业用户，攻击者可通过简单的网络请求实现敏感信息获取或系统破坏，目前该漏洞已得到修复。"""
```

