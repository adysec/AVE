[basic]
description = "AIX 4.3 系统中的 acledit 和 aclput 工具存在条件竞争漏洞（Race Condition），本地攻击者可通过符号链接攻击（symlink attack）利用该漏洞创建或修改系统文件，从而提升权限或破坏系统完整性。该漏洞影响 AIX 4.3 版本，攻击者需拥有本地访问权限，CVSS 评分 1.2，危害等级低。"
published = "1998-06-11T04:00:00.000"
remediation = "建议安装 IBM 提供的对应 APAR 补丁 IX72383（AIX 4.3），或升级至 AIX 5.1 及以上版本。临时缓解措施：使用 `chmod 500 /usr/bin/acledit /usr/bin/aclput` 移除两命令的 setuid 位，或通过 `chgrp` 限制仅允许可信用户执行；亦可移除两文件的 setuid 权限并替换为 sudo 授权方案。"
score = 1.2
severity = "LOW"
sources = ["avd"]
title = "IBM AIX acledit与aclput 符号链接攻击本地提权漏洞"
updated = "2026-06-16T21:50:31.927"

