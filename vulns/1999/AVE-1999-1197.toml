[basic]
description = "Windows NT 4.0 终端服务器版及 Windows NT Server 4.0 SP6 之前版本中的 Cenroll ActiveX 控件（xenroll.dll）存在资源耗尽漏洞。远程攻击者可通过诱导用户访问恶意网页触发该控件创建大量任意文件，导致系统资源被过度消耗从而引发拒绝服务。该漏洞影响 Windows NT 4.0 Terminal Server 及 Server 4.0 版本，需要用户与攻击者进行交互才能触发。"
published = "2000-12-14T05:00:00.000"
remediation = "安装 Windows NT 4.0 Service Pack 6 (SP6) 或更高版本，该版本已修复 xenroll.dll 中任意文件创建的问题。如无法立即升级，可在 Internet Explorer 中为 Cenroll ActiveX 控件设置 kill bit（CLSID: 43F8F289-7A20-11D0-8F06-00C04FC295E1），禁用其远程实例化；同时在防火墙层面限制入站连接，减少攻击面。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Microsoft Windows NT 4.0 Cenroll ActiveX Control 拒绝服务漏洞"
updated = "2026-06-16T21:50:45.793"

