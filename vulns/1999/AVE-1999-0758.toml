[basic]
description = "WolfPack Development 出品的 XSHIPWARS 网络游戏客户端（1.0 及 1.2.4 版本）所附带的 xsw 程序存在缓冲区溢出漏洞。该程序在处理用户输入（如命令行参数或网络数据）时未对长度做边界校验，导致超长数据覆盖栈上返回地址。本地或远程攻击者通过向 xsw 程序传递特制的超长输入即可触发溢出，进而执行任意代码或导致程序崩溃拒绝服务。该漏洞影响上述版本的 xsw 可执行程序，攻击条件为攻击者能够控制输入数据（本地执行或通过网络交互），利用方式即构造超长恶意载荷覆盖缓冲区实现代码执行。"
published = "1999-12-09T05:00:00.000"
remediation = "Xshipwars 1.0/1.2.4 已停止维护，官方不再发布安全更新。建议立即卸载该游戏软件，或将其部署在隔离网络环境中，限制仅受信任用户访问，并在防火墙层面阻止 xsw 程序监听的端口对外暴露，以降低远程缓冲区溢出被利用的风险。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "WolfPack Development XSHIPWARS 缓冲区溢出漏洞"
updated = "2026-06-16T21:49:26.220"

