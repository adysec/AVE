[basic]
description = "SCO OpenServer 5.0.5及之前版本与UnixWare 7.0.1及之前版本中，rlogin守护进程rshd和scheme服务存在安全漏洞。远程攻击者无需认证即可利用此漏洞获取系统权限，导致机密性、完整性和可用性受损。攻击者可通过网络发送特制请求利用该漏洞。"
published = "1999-01-27"
remediation = "SCO 发布了安全补丁 SSE (Security Supplement) 修复该漏洞。建议升级到 OpenServer 5.0.5 以上版本或 UnixWare 7.0.1 以上版本，并安装对应的安全更新。具体补丁可参考 SCO 安全公告 SB-99.03b 和 SB-99.06b。"
score = 7.5
severity = "HIGH"
sources = [
    "cve",
    "avd",
]
title = "SCO OpenServer/UnixWare rshd 与 scheme 服务远程权限提升漏洞"
