[basic]
description = "百卓（Patched）Smart 多业务网关智能管理平台存在安全漏洞。该平台作为企业级多业务网关的管理控制系统，因后台管理接口或认证机制存在缺陷，攻击者在未授权或弱口令等条件下，可通过构造特制的 HTTP 请求访问管理端，进而执行未授权操作、获取敏感配置或实现远程管理控制。攻击需能访问设备管理端口（通常 80/443），影响使用存在缺陷固件版本（如 08.09）的 Smart 多业务网关设备，可能导致设备被接管、内网渗透等严重后果。"
published = "08.09"
remediation = "建议立即升级百卓 Smart 多业务网关智能管理平台至厂商发布的最新修复版本（2023年8月9日后官方固件），并在升级前通过访问控制列表（ACL）限制管理平台的 Web 访问来源 IP，关闭不必要的远程管理端口，启用 HTTPS 并修改默认管理员口令作为临时缓解措施。"
