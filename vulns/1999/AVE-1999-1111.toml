[basic]
description = "Zeus Web Server 搜索引擎功能存在路径遍历漏洞，未经身份认证的远程攻击者可通过在搜索引擎选项参数中指定任意文件路径（含路径遍历序列）来读取服务器文件系统中的敏感文件。该漏洞影响所有启用搜索引擎功能的 Zeus Web Server 版本，攻击者无需账号凭据即可在低复杂度条件下远程利用，可能导致服务器配置文件、密码文件及应用程序源代码等机密信息泄露。CVSS v2 评分 10.0，危害等级严重。"
published = "1999-10-25T04:00:00.000"
remediation = '将 Zeus Web Server 升级至已修复该任意文件读取漏洞的官方版本（建议升级到 Zeus 3.3.7 及以上，或联系厂商获取针对 search 引擎参数的安全补丁）。如无法立即升级，可在 Web 服务器配置中禁用或限制内置搜索功能（关闭 search 选项或对其输入做严格路径过滤），并配置 Web 应用防火墙规则阻止包含 "../" 及绝对路径的请求，作为临时缓解措施。'
score = 10
severity = "CRITICAL"
