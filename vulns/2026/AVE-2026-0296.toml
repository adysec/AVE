[basic]
description = 'Elixir 的 Tesla HTTP 客户端库中 `Tesla.Middleware.FollowRedirects` 中间件存在大小写处理不当漏洞。该中间件在跨源重定向时本应过滤掉 `Authorization` 等安全敏感标头，但过滤检查使用小写字符串 `"authorization"` 进行大小写敏感比较。由于 Tesla 保留调用者提供的原始标头键名（如 RFC 7235 规范大小写的 `"Authorization"`），导致该标头绕过过滤检查，在跨源重定向请求中泄露给第三方目标服务器。攻击者通过控制重定向目标即可窃取受害客户端的 Bearer 令牌等凭据。该漏洞影响 tesla 1.4.0 至 1.18.2 版本，CVSS 评分 8.2，危害等级高。已在 1.18.3 版本中修复。'
published = "2026-06-02T20:16:38.390"
remediation = '立即升级 tesla 至 1.18.3 或以上版本（`mix deps.update tesla`），该版本已修复大小写敏感比较问题。如无法立即升级，将所有 HTTP 请求头键名统一转为小写，使用 `"authorization"` 而非 `"Authorization"` 设置认证头，可通过 `Tesla.put_header/3` 或自定义中间件强制规范化头键名作为临时缓解措施。'
score = 8.2
severity = "HIGH"
sources = ["ghsa"]
title = "elixir-tesla Tesla 跨源重定向授权标头泄漏漏洞"
updated = "2026-07-22T19:10:00.120"

