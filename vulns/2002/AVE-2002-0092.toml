[basic]
description = "Lynx 2.8.4 及更早版本存在 CRLF 注入漏洞，远程攻击者可通过在命令行提供的 URL 中嵌入编码的回车换行符（%0d%0a）及空白字符，向 HTTP 请求中注入伪造的 HTTP 头部，从而实施 HTTP 响应拆分或会话劫持攻击。攻击者无需身份认证即可远程利用，影响使用 Lynx 文本浏览器的系统。该漏洞 CVSS 评分 5.0，危害等级中等，RedHat 将其标记为低危。"
published = "2003-02-19T05:00:00.000"
remediation = "升级 Lynx 至 2.8.5 或更高版本。Debian Woody 用户安装 lynx 2.8.3-1.1（DSA-210），Mandrake 用户安装 MDKSA-2003-023 对应更新。如无法升级，避免在命令行中直接传递不可信 URL 给 Lynx，并配置代理服务器过滤 HTTP 请求中的 CRLF 字符。"
score = 5
severity = "MEDIUM"
sources = ["osv"]
title = "Lynx 命令行 URL CRLF 注入漏洞"
updated = "2026-06-16T21:59:16.067"

