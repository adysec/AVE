[basic]
description = "ypserv（NIS 网络信息服务服务器端程序）存在访问控制缺陷，本地已认证用户可绕过权限检查，直接修改其他用户的 GECOS 字段（用户描述信息）及登录 Shell。该漏洞影响运行 ypserv 的 NIS 域环境，攻击前提是攻击者在目标系统上拥有合法本地账户。利用方式上，本地用户通过调用相关 NIS 服务接口即可篡改其他账号信息，进而可能提升权限或实施进一步入侵，CVSS 评分为 7.2，危害等级高。"
published = "1999-10-23T04:00:00.000"
remediation = "升级 ypserv 至已修复版本（NIS 服务软件包最新版），并正确配置 /var/yp/securenets 文件限制可访问的客户端网段。同时启用 ypserv 访问控制，仅允许受信任主机绑定 NIS 域；对无需 NIS 的主机应停用并卸载 ypserv 服务，加固本地用户对 GECOS 及登录 shell 的修改权限。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
