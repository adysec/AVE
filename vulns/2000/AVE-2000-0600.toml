[basic]
description = "DNSTools 1.0.8及1.10版本的CGI应用程序存在输入验证漏洞，远程攻击者可通过在HTTP请求中向CGI脚本传递包含shell元字符的特制参数，绕过输入过滤机制，进而以Web服务器权限在目标系统上执行任意命令。该漏洞影响DNSTools 1.0.8及1.10版本，攻击者无需身份认证即可远程利用。"
published = "2000-03-02T05:00:00.000"
remediation = "修复 DNSTools CGI 脚本中 system() 调用前的输入验证缺陷：对 host_name 和 domain_name 等用户参数使用 Perl 的 quotemeta 函数或手动转义过滤分号(;)、管道符(|)、反引号(`)、美元符号($)等 shell 元字符。如厂商已停止维护无补丁版本，应立即移除 DNSTools CGI 目录或禁用 Web 服务器的 CGI 执行权限；临时缓解措施可在 Web 服务器层配置 mod_rewrite 规则拦截含 shell 元字符的请求。"
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "DNSTools DNSTools CGI 远程命令执行漏洞"
updated = "2026-06-16T21:51:09.670"

