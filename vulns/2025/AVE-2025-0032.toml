[basic]
description = "Letta AI代理框架（letta-ai Letta 0.7.12及之前版本）的 `/v1/tools/run` 接口存在代码注入漏洞（CWE-94）。由于服务端对用户提交的 `source_code` 参数缺乏有效的沙箱隔离与输入验证，远程攻击者可通过向该接口发送特制的JSON请求，注入恶意Python代码并利用 `os.popen` 等函数执行任意系统命令，从而完全控制目标服务器。该漏洞无需身份认证即可利用，CVSS评分8.8，危害等级高。"
published = "2025-07-22T17:15:33.750"
remediation = "升级至 Letta 最新版本（≥v0.16.8），该版本已通过 JSON 序列化替代 pickle 传输、模块白名单机制、E2B 沙箱集成等多层加固修复工具执行端点的代码注入漏洞。如无法立即升级，应立即执行以下缓解措施：（1）在反向代理（Nginx/Cloudflare）层面限制 `/v1/tools/run` 端点仅允许受信来源 IP 访问；（2）将 Letta 容器以非 root 用户运行（如 UID 1000）并启用 `--read-only` 只读文件系统；（3）在配置中启用 E2B 外部沙箱（设置 `E2B_API_KEY`）替代默认的本地目录沙箱执行工具代码，阻止任意系统命令执行。"
score = 8.8
severity = "HIGH"
sources = ["hwpoc"]
title = "Letta AI代理框架 远程代码执行漏洞"
updated = "2026-06-17T09:35:37.930"

