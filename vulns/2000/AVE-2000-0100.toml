[basic]
description = "BroadGun Software 旗下 CamShot WebCam 2.5 的 HTTP 服务器组件存在缓冲区溢出漏洞。远程攻击者无需身份认证，通过向目标服务发送超长 GET 请求即可触发缓冲区溢出，进而导致服务崩溃或远程代码执行。该漏洞 CVSS 评分 7.5，危害等级高，影响 CamShot WebCam 2.5 版本。目前已有公开的利用代码，建议用户升级至最新版本或停止使用受影响产品。"
published = "1999-12-30T05:00:00.000"
remediation = "立即停止使用 BroadGun CamShot WebCam 2.5，该产品已停止维护且无安全补丁可用。建议迁移至受支持的网络摄像头方案（如 Axis、Hikvision 等仍在更新中的产品）。若无法立即替换，可在网络边界防火墙或反向代理上限制对 CamShot HTTP 服务的访问，仅允许受信 IP 连接，并配置 WAF 规则拦截超长 GET 请求（超过 4096 字节）。"
score = 7.5
severity = "HIGH"
sources = ["exploitdb"]
title = "BroadGun Software CamShot WebCam 缓冲区溢出漏洞"
updated = "2026-06-16T21:50:53.007"

