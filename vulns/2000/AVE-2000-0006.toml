[basic]
description = 'ZBServer Pro Web 服务器存在路径处理缺陷，远程攻击者在未经过身份认证的情况下，可在请求的 URL 中插入一个点号（"."）来绕过服务器对可执行文件的访问限制，从而读取原本应当被保护的脚本或可执行文件的源代码。该漏洞影响运行 ZBServer Pro 的服务器，攻击仅需向目标发送特制的 HTTP 请求即可触发，利用门槛低且无需本地权限，可能导致网站源码、业务逻辑及敏感配置信息泄露，进而为后续更深入的攻击提供便利。'
published = "1999-12-01T05:00:00.000"
remediation = "建议立即升级至 ZBServer Pro 修复版本（建议升级至 2.0 以上修复版本或迁移至 Apache/IIS 等现代 Web 服务器）。若无法立即升级，可在 Web 服务器配置中禁止 URL 中包含点号（.）访问可执行文件源码，或在 Web 应用防火墙层面拦截包含连续点号的 URL 请求作为临时缓解措施。建议尽快迁移至受维护的现代 Web 服务器平台。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "ZBServer Pro 操作系统命令漏洞"
updated = "2026-06-16T21:50:48.240"

