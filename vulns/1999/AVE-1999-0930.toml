[basic]
description = "rwho/rwhod 服务运行于 Unix/Linux 系统，基于 UDP 协议广播用户登录状态、系统运行时间等信息。该服务默认不进行身份认证，攻击者可在同一广播域内监听并收集目标系统的用户名、登录时长、终端类型等敏感信息，为后续针对性攻击提供情报支撑。此漏洞源于服务设计缺陷，影响所有启用了 rwho/rwhod 的类 Unix 系统，CVSS 评分 5.0，危害等级中危。建议在无需使用该服务的环境中禁用或通过防火墙限制 UDP 端口 513 的访问。"
published = "1997-07-01T04:00:00.000"
remediation = "建议立即停止并禁用 rwhod 服务：`systemctl stop rwhod && systemctl disable rwhod`（Systemd 系统）或 `service rwhod stop && chkconfig rwhod off`（SysV 系统）。如业务确实需要 rwhod 服务，应在防火墙层面限制 UDP 端口 513 仅允许受信任网段访问，并配置 hosts.{allow,deny} 白名单控制连接来源。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "GNU RWHO/rwhod 服务信息泄露漏洞"
updated = "2026-06-16T21:48:45.330"

