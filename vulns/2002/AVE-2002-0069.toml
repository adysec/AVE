[basic]
description = "smb2www 980804-16 及更早版本存在未知代码执行漏洞，远程未授权攻击者可利用该漏洞在目标系统上执行任意命令。该漏洞源于 smb2www 对用户输入缺乏有效过滤，攻击者无需身份认证即可通过网络远程发送恶意请求触发漏洞，攻击复杂度低，可导致系统机密性、完整性和可用性均受到部分影响（CVSS 7.5，AV:N/AC:L/Au:N/C:P/I:P/A:P）。受影响范围为 smb2www 980804-16 及更早版本，攻击者可远程执行任意系统命令获取服务器控制权。Debian 已发布 DSA-203 等安全公告修复该漏洞，Nessus 等扫描器已收录检测插件（如 smb2www_cmd_exec.nasl、debian_DSA-203.nasl）。"
published = "2002-12-18T05:00:00.000"
remediation = "建议立即升级 smb2www 至 980804-16 之后的版本（如 980804-17 或更新版本），或从官方源获取修补补丁。若无法升级，请在防火墙层面限制对 smb2www 服务端口的访问，或暂时禁用该服务以防止远程命令执行攻击。"
score = 7.5
severity = "HIGH"
sources = ["osv"]
title = "smb2www smb2www 远程代码执行漏洞"
updated = "2026-06-16T21:59:08.430"

