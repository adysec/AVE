[basic]
description = "SGI IRIX 6.4 系统中的 cgi-bin 处理程序存在命令注入漏洞，远程攻击者可通过向目标系统发送精心构造的 HTTP 请求，利用该程序未正确过滤用户输入的问题在服务器上执行任意系统命令。该漏洞影响 SGI IRIX 6.4 版本，CVSS 评分 7.5，危害等级高，无需身份认证即可远程利用，可能导致服务器完全被控制。"
published = "1997-09-01T04:00:00.000"
remediation = "根据 SGI 安全公告 19970501-02-PX 安装对应补丁。由于 SGI IRIX 已停止技术支持且厂商已破产，建议尽快迁移至仍在安全维护期的操作系统；如无法立即迁移，应在网络层面限制对 CGI handler 的访问权限并禁用不必要的 CGI 程序。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "SGI IRIX CGI handler 远程代码执行漏洞"
updated = "2026-06-16T21:47:42.100"

