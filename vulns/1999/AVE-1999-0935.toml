The CVE is about tin 1.40 creating .tin directory with insecure permissions (likely 0777 or umask issues), allowing local users to read .inputhistory file containing passwords.
For remediation: Since this is from 1999, the fix would be to upgrade to tin 1.41+ or manually set permissions on .tin directory to 700.
Key facts:
- tin 1.40 (not 1.40, it's 1.4.0)
- The .tin directory is created with permissions drwxr-xr-x (755)
- The .inputhistory file is created with permissions -rw-rw-r-- (664)
- This allows local users to read passwords stored in .inputhistory
- CVSS v2 score: 4.6 MEDIUM (AV:L/AC:L/Au:N/C:P/I:P/A:P)
- Published: 1999-11-17
- The original Bugtraq post suggests: rm .inputhistory, touch new one, chmod 000
The remediation should be specific: upgrade to a newer version, or manually fix permissions as described in the Bugtraq post.
