[basic]
description = "SCO UnixWare 7.1 的 i2odialogd 守护进程存在远程缓冲区溢出漏洞。攻击者无需身份认证，通过向目标系统发送超长的用户名/密码认证字符串即可触发缓冲区溢出，导致远程代码执行，从而获得 root 权限。该漏洞 CVSS 评分 10.0，危害等级严重，影响 SCO UnixWare 7.1 版本。"
published = "1999-12-21T05:00:00.000"
remediation = "立即安装 SCO 官方安全补丁（补丁编号 erg711905），将 i2odialogd 升级至修复版本。如无法打补丁，在 inetd.conf 中注释 i2odialogd 服务行并重启 inetd 以禁用该服务，或在防火墙层面限制对 5678 端口的访问仅允许受信任 IP。"
score = 10
severity = "CRITICAL"
sources = ["cve"]
title = "SCO Unixware 7.1 i2odialogd 远程缓冲区溢出漏洞"
updated = "2026-06-16T21:50:50.967"

