[basic]
description = "Pegasus 电子邮件客户端 3.0 及更早版本在 pmail.ini 配置文件中使用弱加密算法存储 POP3 密码，本地攻击者可通过直接读取该配置文件并利用弱加密的逆向工程轻易解密出明文密码，进而获取用户邮箱的访问权限并读取邮件内容。该漏洞影响 Pegasus Mail 3.0 及之前版本，CVSS 评分 3.6，危害等级低，攻击前提是攻击者已获得本地系统访问权限。"
published = "1999-05-15T04:00:00.000"
remediation = "升级到 Pegasus Mail 4.0 或更高版本，该版本已使用更强的加密算法存储 POP3 密码。同时确保 pmail.ini 文件仅允许受信任用户访问，可通过文件系统权限将该文件设为仅当前用户可读。如果无法升级，建议更换为支持安全密码存储的其他邮件客户端。"
score = 3.6
severity = "LOW"
sources = ["avd"]
title = "Pegasus E-mail客户端弱加密存储密码漏洞"
updated = "2026-06-16T21:50:17.223"

