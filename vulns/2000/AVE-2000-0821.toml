[basic]
description = "多种 Unix 系统的 shell 程序（包括 tcsh、csh、sh、bash）在处理 here-document（<< 重定向）时存在符号链接竞争条件漏洞。本地攻击者可通过创建符号链接，诱使目标系统上使用 shell 脚本的其他用户在处理 here-document 时意外覆盖或创建文件，进而实现权限提升或数据破坏。该漏洞影响 Apple Mac OSX 10、HP-UX 9/10/11、Mandriva 6/7、RedHat 5/6、SCO 5、IRIX 6 等多个 Unix 操作系统版本，CVSS 评分 7.2，危害等级高。"
published = "2001-01-09T05:00:00.000"
remediation = "各发行版已发布针对性安全补丁：Red Hat Linux 用户安装 RHSA-2000:117（bash/csh/tcsh）及 RHSA-2000:121 更新；Debian 用户安装 20001111a 安全公告对应的 shell 更新包；FreeBSD 用户应用 SA-00:76 补丁更新 tcsh/csh；Caldera 用户安装 CSSA-2000-042.0 和 CSSA-2000-043.0 补丁；Mandrake 用户安装 MDKSA-2000:069 及 MDKSA-2000:075 更新；SGI IRIX 用户安装 20011103-02-P 补丁；Conectiva 用户应用 anuncio 000350/000354 更新。如无法升级，避免在多用户系统上信任特権用户对 shell here-document 的使用。"
score = 7.2
severity = "HIGH"
sources = ["exploitdb"]
title = "多款Unix系统Shell程序here-document符号链接条件竞争漏洞"
updated = "2026-06-16T21:53:13.380"

