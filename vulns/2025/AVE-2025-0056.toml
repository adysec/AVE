[basic]
description = "亿邮邮件网关存在远程命令执行漏洞，攻击者可通过在邮件附件文件名中注入恶意命令Payload触发漏洞。该漏洞源于网关对上传文件名过滤不严，允许使用反引号执行系统命令，攻击者可在目标服务器上执行任意命令，获取服务器控制权。漏洞影响亿邮邮件网关多个版本，危害严重。建议用户尽快升级至最新版本或部署安全防护策略。"
published = "0715"
remediation = "建议联系亿邮厂商获取官方补丁并升级邮件网关至最新版本；如暂无法升级，可限制 `/usr/local/eyou/gateway/ebaselib/bin/pdftotext` 文件执行权限（`chmod -x` 或移除 SUID），同时在 WAF/IPS 侧对附件文件名中含反引号、`$()` 等 shell 特殊字符的请求进行拦截作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "亿邮邮件网关远程代码执行漏洞"
