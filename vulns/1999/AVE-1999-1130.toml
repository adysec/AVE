[basic]
description = "SGI IRIX 6.5 至 6.5.2 版本的 nsd 组件存在信息泄露漏洞。nsd 在 UDP 端口上导出一个虚拟文件系统，远程攻击者无需身份认证即可通过挂载该虚拟文件系统，读取目标系统上的任意文件，并可能引发拒绝服务。该漏洞影响 SGI IRIX 6.5、6.5.1 及 6.5.2 版本，CVSS 评分 6.4，危害等级中危。厂商已发布安全补丁修复此问题。"
published = "1999-05-31T04:00:00.000"
remediation = "建议升级 SGI IRIX 至 6.5.3 或更高版本（如 6.5.30），该版本已修复 nsd 虚拟文件系统导出漏洞；如无法立即升级，请立即停用并禁用 nsd 服务（/etc/init.d/nsd stop && chkconfig nsd off），并在边界防火墙屏蔽 nsd 使用的 UDP 端口（通常为 2049/NFS 相关端口）以防止远程挂载和信息泄露，同时监控异常 UDP 流量作为临时缓解措施。必须升级至修复版本彻底修复。"
score = 6.4
severity = "MEDIUM"
sources = ["exploitdb"]
title = "SGI IRIX nsd 信息泄露漏洞"
updated = "2026-06-16T21:50:32.550"

