[basic]
description = "Red Hat Linux 发行版中的 net-tools 软件包存在多处缓冲区溢出漏洞。该软件包包含 ifconfig、netstat 等常用网络配置与诊断工具，由于在解析网络接口名称、参数等输入时未对边界进行充分校验，导致缓冲区可被超长输入覆盖。本地或邻近网络的攻击者在调用相关工具时可构造超长参数或特制网络数据，触发溢出并可能覆写内存执行任意代码，从而提升权限或造成程序崩溃拒绝服务。该漏洞影响使用存在缺陷版本的 Red Hat net-tools 包的系统，攻击需具备本地执行相关工具或向受影响服务传递恶意输入的条件。"
published = "1999-06-24T04:00:00.000"
remediation = "升级 net-tools 包至修复了缓冲区溢出漏洞的安全版本，Red Hat 用户可通过 RHSA1999:017 公告获取补丁并执行 yum update net-tools 完成升级。如暂时无法升级，应通过文件系统权限限制普通用户对 ifconfig、route、netstat 等网络管理命令的执行权限，仅允许 root 或授权管理员运行，以缩小攻击面。同时建议在防火墙层面限制不必要的网络扫描和外部探测，降低远程利用风险。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "Red Hat Linux net-tools 缓冲区溢出漏洞"
updated = "2026-06-16T21:48:58.483"

