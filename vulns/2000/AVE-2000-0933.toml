[basic]
description = "htDig 的 htsearch 程序在处理 config 参数时存在信息泄露漏洞。远程攻击者无需身份认证，通过向 config 参数传入一个不存在的配置文件路径，即可触发程序返回包含服务器完整物理路径的错误消息，从而泄露目标系统的目录结构信息。该漏洞影响 htDig 3.2 beta、3.1.6、3.1.5 及更早版本，攻击复杂度低，可为进一步渗透提供信息支撑。"
published = "2001-08-31T04:00:00.000"
remediation = "升级到 ht://Dig 3.2.0b6 或更高版本（SourceForge 可下载），该版本修复了路径泄露问题。如无法升级，修改 htdig 配置文件中 error_page 指令，将错误页面重定向到自定义模板而非显示默认错误信息；同时在 Web 服务器（Apache/Nginx）层面配置 ServerTokens Prod 和 ServerSignature Off 以抑制路径信息输出。由于 ht://Dig 项目已停止维护，建议迁移至 Lucene/Nutch 等活跃维护的搜索引擎替代。"
score = 5
severity = "MEDIUM"
sources = ["redhat"]
title = "htDig htsearch 物理路径信息泄露漏洞"
updated = "2026-06-16T21:53:20.877"

