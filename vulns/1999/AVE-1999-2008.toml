[basic]
description = "Adobe Acrobat Reader 4.0 中包含的 ActiveX 控件 pdf.ocx（PDF.PdfCtrl.1）1.3.188 版本存在缓冲区溢出漏洞。攻击者可通过构造恶意网页或文档，调用该控件的 pdf.setview 方法并传入超长参数，触发栈缓冲区溢出，从而以当前用户权限在受害者主机上执行任意代码。该漏洞需要用户使用支持 ActiveX 的浏览器访问受控页面即可利用，无需身份认证，危害严重。"
published = "1999-09-27T04:00:00.000"
remediation = "用户应升级到不受影响版本的Adobe Acrobat/Reader以替换存在缺陷的pdf.ocx控件（PDF.PdfCtrl.1 1.3.188），或通过删除/注销该控件禁用ActiveX功能。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "Adobe Acrobat Reader ActiveX 控件 pdf.ocx 缓冲区溢出远程代码执行漏洞"
updated = "2026-06-16T21:50:45.407"

