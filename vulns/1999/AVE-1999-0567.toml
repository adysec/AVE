[basic]
description = "CVE-1999-0346 是 PHP 的 mlog CGI 脚本中存在的一个任意文件读取漏洞。攻击者可通过向目标服务器上该脚本发送特制的 HTTP 请求，利用参数注入的方式读取服务器上的任意敏感文件（如 /etc/passwd、配置文件等），导致信息泄露。该漏洞影响早期 PHP 版本，攻击条件低（无需认证、远程利用）。CVSS 评分 5.0，危害等级中危。"
published = "1997-10-16T04:00:00.000"
remediation = "升级至 PHP 3.0.17 或更高版本（已修复该 CGI 漏洞），或删除/禁用服务器上的 mlog CGI 脚本。若无法升级，请在 Web 服务器配置中禁止执行 /cgi-bin/php/fi/mlog 等路径，并设置文件系统权限限制 CGI 进程仅访问必要目录。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "PHP PHP/FI mlog 任意文件读取漏洞"
updated = "2026-06-16T21:48:11.993"

