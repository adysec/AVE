[basic]
description = "Linux 系统下的 kreatecd 工具存在权限提升漏洞，该工具盲目信任用户提供的路径参数来定位 cdrecord 程序，未对路径进行充分校验。本地攻击者可通过设置恶意路径替换合法的 cdrecord 程序，从而以 root 权限执行任意代码。该漏洞影响 Halloween Linux 4.0 以及 S.u.S.E. Linux 6.0/6.1/6.2/6.3 等多个发行版本，CVSS 评分 7.2，危害等级高。"
published = "2000-03-16T05:00:00.000"
remediation = "建议移除 kreatecd 的 setuid 权限位（执行 chmod u-s /usr/bin/kreatecd），或升级到 S.u.S.E. Linux 6.4 及以上版本。如无法升级，可将 cdrecord 路径硬编码为 /usr/bin/cdrecord 并确保该路径不可被普通用户写入。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "Linux kreatecd 本地权限提升漏洞"
updated = "2026-06-16T21:51:16.747"

