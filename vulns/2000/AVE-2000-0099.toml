[basic]
description = "CSM mail server 存在缓冲区溢出漏洞，远程攻击者可通过向 SMTP 服务发送超长 HELO 命令触发该漏洞，导致目标服务崩溃拒绝服务，或执行任意代码。该漏洞影响 CSM 多个版本，CVSS 评分 10.0，危害等级严重。攻击无需身份认证，只需网络可达即可利用。"
published = "1999-12-29T05:00:00.000"
remediation = "升级 CSM mail server 至最新版本或更换为受支持的邮件服务器软件（如 Postfix、Exim）；在防火墙层面限制对 SMTP 端口（25）的访问来源 IP；配置入侵检测系统监控 SMTP HELO 命令的异常长度流量。"
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "CSM Mail Server 缓冲区溢出远程代码执行漏洞"
updated = "2026-06-16T21:50:52.883"

