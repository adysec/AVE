[basic]
description = "Linux 系统中 pam_console PAM 模块存在权限验证缺陷，当显示管理器（如 gdm 或 kdm）启用 XDMCP 协议时，本地用户可利用该漏洞绕过访问限制，获取系统控制台访问权限并执行关机重启等操作。该漏洞影响 Conectiva 4.x/5.x 及 RedHat 6.x 等版本，CVSS 评分 5.0，危害等级中等。建议受影响的用户更新软件包以修复此漏洞。"
published = "2000-07-27T04:00:00.000"
remediation = "立即通过 RHSA-2000:044 更新 pam_console 软件包至修正版本，或禁用显示管理器（gdm/kdm）的 XDMCP 功能：在 gdm.conf 中将 Enable=false 或注释掉 xdmcp 行；在 kdm 的 kdmrc 中将[Xdmcp]段下的 Enable 设为 false。该漏洞利用 XDMCP 协议从远程访问控制台，禁用 XDMCP 即可彻底阻止远程攻击。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Linux pam_console PAM 模块权限提升漏洞"
updated = "2026-06-16T21:52:13.697"

