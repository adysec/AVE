[basic]
description = "tcpdump 和 Ethereal（现 Wireshark）等抓包工具的 DNS 解码器在处理压缩 DNS 数据包时存在无限循环漏洞。远程攻击者无需认证，只需向目标发送特制的 DNS 报文，其中压缩指针偏移量指向自身，即可导致解码器在解压域名时陷入死循环，CPU 资源被耗尽，造成拒绝服务。该漏洞影响 tcpdump 3.4/3.5 alpha 及 Ethereal 0.8.4/0.8.5/0.8.6 等版本，可被用于远程拒绝服务攻击。"
published = "1999-05-31T04:00:00.000"
remediation = "升级 tcpdump 至 3.5.2 或更高版本，Ethereal 升级至 0.8.7 或更高版本（Ethereal 已更名为 Wireshark，建议直接安装最新版 Wireshark）。如无法升级，可在网络边界设备上过滤或丢弃畸形 DNS 数据包作为临时缓解。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "tcpdump Ethereal DNS解码器无限循环拒绝服务漏洞"
updated = "2026-06-16T21:51:29.867"

