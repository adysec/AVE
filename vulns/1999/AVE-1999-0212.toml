[basic]
description = "CREAR ALMail32 1.10 版本 POP3 邮件客户端存在缓冲区溢出漏洞。远程攻击者可通过向目标用户发送包含恶意构造的 From 或 To 邮件头部的特制邮件，在客户端接收并处理该邮件时触发缓冲区溢出，导致程序崩溃或执行任意代码。该漏洞影响 ALMail32 1.10 版本，攻击者无需身份认证即可利用，危害较高。"
published = "1999-08-08T04:00:00.000"
remediation = "该软件 CREAR ALMail32 1.10 已停止维护且不再有安全更新，建议立即卸载并迁移至受支持的现代邮件客户端（如 Mozilla Thunderbird、Microsoft Outlook）。如暂时无法替换，可在邮件客户端中禁用自动预览/解析邮件头功能，并在网络边界过滤可疑 POP3 流量作为临时缓解。"
score = 5.1
severity = "MEDIUM"
sources = ["exploitdb"]
title = "CREAR ALMail32 1.10 远程缓冲区溢出漏洞"
updated = "2026-06-16T21:48:49.103"

