[basic]
description = 'Netscape Communicator 4.x 浏览器在启用 JavaScript 功能时，存在一项安全绕过漏洞。当用户在隐私设置中选择"仅接受来自当前页面所属服务器的 Cookie"选项后，软件仍不会就该设置的实际执行情况向用户发出任何警告提示，导致用户误以为已启用了同源 Cookie 限制。攻击者可利用这一缺陷，通过构造包含跨站 Cookie 设置的恶意网页诱导用户访问，从而在用户不知情的情况下读取或写入来自第三方域的 Cookie，造成用户隐私信息（如会话标识、身份凭证等）泄露。该漏洞影响所有启用 JavaScript 的 Netscape Communicator 4.x 版本，攻击条件为攻击者需能够诱导受害者访问其控制的网页，利用方式相对简单，无需特殊权限即可实施，对用户浏览器隐私保护构成直接威胁。'
published = "1999-07-09"
remediation = "升级到 Netscape Communicator 4.5 及以上版本，或在浏览器设置中禁用 JavaScript（编辑 → 首选项 → 高级 → 禁用 JavaScript）。如无法升级，建议更换为现代浏览器（如 Firefox、Chrome），并在浏览器隐私设置中选择「拒绝所有第三方 Cookie」或启用「始终提示 Cookie」选项。"
score = 5.0
severity = "MEDIUM"
sources = ["avd"]
title = "Netscape Communicator 4.x JavaScript Cookie 隐私设置安全绕过漏洞"
updated = "2026-06-16"

