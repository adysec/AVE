title = "Behold Software Web Page Counter 2.70 counter.exe 拒绝服务漏洞"
description = "该漏洞存在于 Behold Software Web Page Counter 2.70 版本的 counter.exe 程序中。当远程攻击者发送以 %0A（换行）结尾的 HTTP 请求时，会导致计数器日志生成 malformed 条目，进而引发访问违反，导致程序 hang 死锁，无法提供服务。这是一个典型的拒绝服务漏洞，攻击者无需认证即可触发，影响特定 Web 计数器软件。"
