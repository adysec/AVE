[basic]
description = "PHPix Photo Album 1.0.2 及更早版本存在目录遍历漏洞，远程攻击者无需认证即可通过在 URL 中注入 `../` 等路径遍历序列，绕过访问限制读取服务器上的任意文件，导致敏感信息泄露。该漏洞利用简单，攻击者可获取配置文件、密码文件等敏感数据。"
published = "2000-12-19T05:00:00.000"
remediation = '升级至官方修复版本（如存在）；否则在代码中对用户输入的文件路径参数进行过滤，拒绝包含 `../` 或 `..\` 等目录跳转序列的请求，并使用 `basename()` 函数仅取文件名部分，同时限制访问目录为 `albums/` 等白名单路径。若无法修改代码，在 Web 服务器（如 Apache）层面通过 `RewriteRule` 拦截含 `..` 的 URI 请求作为临时缓解措施。'
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "PHPix Photo Album 目录遍历漏洞"
updated = "2026-06-16T21:52:46.000"

