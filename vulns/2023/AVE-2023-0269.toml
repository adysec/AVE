[basic]
description = "锐捷（Ruijie）交换机 WEB 管理系统存在 EXCU_SHELL 信息泄露漏洞。该系统在处理 EXCU_SHELL 相关请求时未对敏感接口进行充分的访问权限校验，导致未经身份认证的远程攻击者可通过构造特定的 HTTP 请求直接访问该接口，从而泄露设备内部的配置信息、用户凭证或其他敏感数据。该漏洞影响运行相应版本 WEB 管理系统的锐捷交换机设备，攻击条件为攻击者能够与设备的 WEB 管理端口（通常为 80/443）建立网络连通并发送特制请求，利用方式是通过直接访问暴露的 EXCU_SHELL 接口获取不应公开的信息，可能造成设备被进一步控制的风险。"
published = "08.14"
remediation = "登录锐捷官网下载并升级受影响的交换机固件至厂商 2023 年 8 月 14 日之后发布的最新版本（修复 EXCU_SHELL 信息泄露的版本）。如暂无法升级，可在管理网段 ACL 中限制仅允许运维 IP 访问 WEB 管理端口（默认 80/443），并关闭对外网暴露的 WEB 管理服务，同时将管理 VLAN 与业务 VLAN 隔离，启用 HTTPS 并强制管理员修改默认口令以降低信息泄露风险。"
score = 5
severity = "MEDIUM"
