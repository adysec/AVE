[basic]
description = 'Microsoft Internet Explorer 5 的 scriptlet.typelib ActiveX 控件被错误标记为"对脚本安全"，远程攻击者可通过构造恶意网页诱导用户访问，利用该控件在用户系统上写入任意文件并执行任意命令。该漏洞影响 Internet Explorer 5 及早期版本，Bubbleboy 蠕虫即利用此漏洞传播，CVSS 评分 5.1，危害等级中等。'
published = "1999-08-21T04:00:00.000"
remediation = '立即安装 Microsoft 安全公告 MS99-032 提供的补丁，该补丁移除了 scriptlet.typelib ActiveX 控件的"安全可脚本"标记。如无法安装补丁，可在 Internet Explorer 中将 Internet 安全区域设置为"高"并禁用 ActiveX 控件，或通过注册表设置该控件的 kill bit（CLSID: {06290BD3-48AA-11D2-8432-006008C3FBFC}）阻止其在 IE 中加载。'
score = 5.1
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Microsoft Internet Explorer 5 ActiveX 远程代码执行漏洞"
updated = "2026-06-16T21:48:48.493"

