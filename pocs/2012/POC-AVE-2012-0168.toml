[info]
author = "AVE"
description = "通过HTTP服务返回包含MSXML ActiveX漏洞利用的HTML页面，触发CVE-2012-1889未初始化内存破坏漏洞。当用户使用IE浏览器访问恶意页面时，MSXML解析特制XML内容导致内存破坏，可实现远程代码执行。"
id = "POC-AVE-2012-0168"
name = "Microsoft XML Core Services MSXML Uninitialized Memory Corruption PoC"
severity = "high"
tags = [
    "cve-2012-1889",
    "msxml",
    "rce",
    "memory-corruption",
]
vuln_id = [
    "CVE-2012-1889",
    "AVE-2012-0168",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["MSXML"]
