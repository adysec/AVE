[basic]
description = "SGI IRIX 6.x 系统中的 Performance Copilot 性能监控组件所包含的 PMCD（Performance Metrics Collector Daemon）存在资源耗尽型拒绝服务漏洞。远程攻击者无需身份认证即可向 PMCD 端口发送特制超长字符串，导致目标系统资源被大量消耗，造成拒绝服务。该漏洞影响 IRIX 6.3/6.4/6.5 等版本，CVSS 评分 5.0，危害等级中危。"
published = "2001-08-31T04:00:00.000"
remediation = "立即应用 SGI 安全公告 20020407-01-I 提供的补丁更新 Performance Co-Pilot。如无法立即打补丁，在防火墙或主机 ACL 中限制 PMCD 端口（默认 4321/tcp）仅允许可信 IP 访问，或停止并禁用 PMCD 服务（`/etc/init.d/pmcd stop; chkconfig pmcd off`）作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "SGI IRIX 6.5.x Performance Co-Pilot 远程拒绝服务漏洞"
updated = "2026-06-16T21:53:21.170"

