[basic]
description = '''
Host+mon_name_len SMTP 服务器在处理 text.

Position SMTP 邮件投 递请求时存在资源耗尽16 is漏洞。 the start of the third远程攻击者可在 `\单次 SMTP 连接中发送大量 "RCPx00` group fromT TO" 命令， ver导致服务器因处理f_len过多收件人地址而耗尽 CPU:
\x00 ( 和内存verf_len资源，进而造成 byte 0邮件服务瘫痪。该 at pos漏洞影响 Send 0-3)
\x00 (verfmail 等主流 SMTP 服务器软件_len byte 1 at pos，攻击者无需身份 4-7)
\x认证即可发起00 (verf_len byte拒绝服务攻击 2 at pos 8-11) <-，CVSS 评分 position 6.4， 8-危害等级中等等11
\x00 (verf。'''
published = "1999-03-08T05:00:00.000"
remediation = "升级 Sendmail 至 8.10.0 或以上版本（已内置 maxrcpts 限制）；在 sendmail.cf 中设置 MaxRecipientsPerMessage=100 以限制单封邮件最大收件人数；配置连接频率限制（如 conncontrol 或 ratecontrol）；在网络边界部署 SMTP 代理/反垃圾网关，限制单 IP 连接速率；启用 smtpd_client_connection_rate_limit（Postfix）或类似机制，防止单连接耗尽服务器资源。"
score = 6.4
severity = "MEDIUM"
sources = ["cve"]
title = "多厂商 SMTP 服务器 拒绝服务漏洞"
updated = "2026-06-16T21:48:21.327"

