[basic]
description = "朗新天霁 eHR 人力资源管理系统在 GetTrans.asmx、GetMessage、gete01bydeptcode 等多处接口存在 SQL 注入漏洞。未经身份验证的远程攻击者可通过向上述接口发送特制恶意 SQL 语句，利用数据库 xp_cmdshell 功能执行任意系统命令，或直接查询后台数据库获取员工个人信息、薪资数据、管理员密码等敏感内容，甚至可向服务器写入 webshell 获取服务器控制权。该漏洞利用难度低、影响范围广，直接威胁企业核心数据安全。"
published = "2024-08-16"
remediation = "立即联系朗新天霁官方获取安全补丁升级至最新版本；在 Web 应用防火墙（WAF）侧添加 SQL 注入拦截规则，对 GetTrans.asmx、GetMessage、gete01bydeptcode 等接口的输入参数进行严格过滤；代码层面改用参数化查询或预编译语句替代字符串拼接 SQL；禁用数据库 xp_cmdshell 扩展存储过程以降低 RCE 风险；遵循最小权限原则限制数据库连接账户权限。"
score = 7.5
severity = "HIGH"
sources = ["hwpoc"]
title = "朗新天霁 eHR 多处接口 SQL 注入漏洞"
updated = "2024-08-28"

