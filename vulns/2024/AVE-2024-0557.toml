[basic]
description = "Linux 内核 netfilter 子系统的 IDLETIMER 模块存在 ABBA 死锁漏洞。当删除引用某个 idletimer 的最后一条 iptables 规则时，若同时读取 sysfs 中该定时器的状态文件，将导致内核发生循环锁依赖（kn->active 与 list_mutex 互相等待），最终触发系统死锁。本地低权限攻击者可通过并发执行 iptables 规则删除与 sysfs 文件读取操作，造成内核软锁或系统崩溃，影响可用性。该漏洞影响使用 netfilter IDLETIMER 功能的 Linux 内核版本，CVSS 评分 5.5，危害等级中等。"
published = "2025-01-11T13:15:27.490"
remediation = "立即更新 Linux 内核至 6.6.67、6.12.6 或 6.13 及以上版本，该漏洞已在对应稳定分支中修复。Ubuntu 24.04 LTS 用户升级至 linux-image-6.11.0-1011-lowlatency 及以上版本（USN-7381-1），SUSE Linux Enterprise 15 SP6/SP7 用户安装 SUSE-SU-2025:1177-1 或 SUSE-SU-2025:01951-1 更新。如无法立即升级，避免在 IDLETIMER 规则与 sysfs 读取操作同时高并发执行，以降低触发死锁概率。"
score = 5.5
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux Kernel netfilter IDLETIMER ABBA死锁漏洞"
updated = "2026-06-17T08:10:38.287"

