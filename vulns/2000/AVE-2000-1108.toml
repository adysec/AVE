[basic]
description = 'Internet Explorer 4.x 及 5.x 版本的 ActiveX 参数解析功能存在缓冲区溢出漏洞，远程攻击者可通过构造特制的恶意网页，诱使用户访问后触发缓冲区溢出，从而在目标系统上执行任意命令。该漏洞又名"Malformed Component Attribute"漏洞，影响范围广泛，攻击者无需身份认证即可利用，危害等级高。'
published = "2000-05-17T04:00:00.000"
remediation = "建议受影响用户升级至 Internet Explorer 5.5 或 5.01 Service Pack 1（不受此漏洞影响），或安装微软安全公告 MS00-033 提供的修补程序（需先安装 IE 4.01 Service Pack 2 或 IE 5.01）。后续累积补丁已包含在 MS00-055 中。鉴于该漏洞年代久远，强烈建议停止使用 Internet Explorer，改用 Microsoft Edge 等现代浏览器。"
score = 7.6
severity = "HIGH"
sources = ["cve"]
title = "Microsoft Internet Explorer ActiveX 参数解析缓冲区溢出远程代码执行漏洞"
updated = "2026-06-16T21:51:47.443"

