[basic]
description = "CVE-1999-0257 即 Nestea 变种 Teardrop IP 碎片拒绝服务攻击，攻击者向目标系统发送精心构造的、偏移量重叠的畸形 IP 分片数据包，目标系统在重组这些分片时因算法缺陷导致内存计算错误，引发系统崩溃或重启。该漏洞无需认证即可远程利用，影响 Linux Kernel 2.6.20.1 及众多早期操作系统版本，CVSS 评分 5.0，危害等级中危。"
published = "1998-04-01T05:00:00.000"
remediation = "升级 Linux 内核至 2.6.20.1 以上版本（如 2.6.21+），该漏洞已在后续版本中修复。无法升级时，可在 iptables 中添加规则丢弃畸形 IP 分片包：iptables -A INPUT -f -m limit --limit 100/s --limit-burst 100 -j ACCEPT 或使用防火墙过滤分片重叠的恶意数据包作为临时缓解。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Linux Kernel IP Fragmentation Nestea 拒绝服务漏洞"
updated = "2026-06-16T21:48:00.990"

