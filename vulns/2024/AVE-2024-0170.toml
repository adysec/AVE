[basic]
description = "万户 ezOFFICE 政务办公系统 gov_documentmanager 模块中 receivefile_gd.jsp 接口存在 SQL 注入漏洞。攻击者无需身份认证，通过向 recordId 参数传入 SQL 延时注入载荷（如 waitfor delay '0:0:5'），可利用 SQL Server 的 WAITFOR DELAY 语句延时响应验证注入点，进而执行任意 SQL 语句实现数据库信息窃取、数据篡改或进一步服务器接管。该漏洞影响使用 gov_documentmanager 模块的万户 ezOFFICE 系统，攻击者仅需发送构造的 GET 请求即可无需认证触发漏洞，CVSS 评分高危。"
published = "0823"
remediation = '''
用户要求为漏洞 HWPOC-2024-024de5ea 生成 [remediation] 字段（中文修复建议，≥20字，具体操作：升级版本、配置修改、缓解措施，不要写“请参考官方公告”）。

已知信息：
- 漏洞编号：HWPOC-2024-024de5ea
- 原标题：万户 ezOFFICE receivefile_gd.jsp SQL 注入漏洞
- 原始描述：万户 ezOFFICE receivefile_gd.jsp SQL 注入漏洞 SQL注入 - GET /defaultroot/modules/govoffice/gov_documentmanager/receivefile_gd.jsp;.js?recordId=1;waitfor+delay+'0:0:5'--+ HTTP/1.1

