[basic]
description = 'Microsoft Internet Explorer 4.0 和 5.0 版本中的 Eyedog ActiveX 控件被错误标记为"可安全执行脚本"，导致远程攻击者可通过构造恶意网页诱导用户访问，利用该控件执行任意命令。该漏洞已由 Bubbleboy 蠕虫证实存在实际利用，影响早期 Windows 系统上的 IE 浏览器用户，危害等级中等。'
published = "1999-09-01T04:00:00.000"
remediation = "升级到 Internet Explorer 6 或更高版本，或使用现代浏览器（如 Edge/Chrome）替代。在 IE 中设置 ActiveX 控件为「禁用」或「提示」，并通过注册表设置 Kill Bit（CLSID: 00000000-0000-0000-0000-000000000000）禁用 Eyedog ActiveX 控件。对于无法升级的系统，在 Internet 安全区域将「下载已签名的 ActiveX 控件」设为「禁用」以缓解风险。"
score = 4
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Microsoft Internet Explorer 4/5 ActiveX Eyedog 远程代码执行漏洞"
updated = "2026-06-16T21:48:48.617"

