[basic]
description = "Adobe Acrobat 4.0 阅读器所捆绑的 Adobe Acrobat ActiveX 控件（pdf.ocx，ProgID 为 PDF.PdfCtrl.1，版本 1.3.188）存在缓冲区溢出漏洞。该控件在处理 pdf.setview 方法传入的参数时未进行充分的长度校验，导致超长输入可覆盖内存缓冲区。远程攻击者只需构造一个恶意网页或 HTML 文档，诱导受害者使用 Internet Explorer 等支持 ActiveX 的浏览器打开，即可触发该漏洞并在目标用户权限下执行任意代码。受影响范围为安装 Acrobat Reader 4.0 且加载该 ActiveX 控件的 Windows 系统，攻击无需身份认证，利用门槛较低。"
published = "1999-09-27T04:00:00.000"
remediation = '立即卸载 Adobe Acrobat Reader 4.0，升级至 Adobe Acrobat Reader DC (2024.005.20320 或更高版本) 或 Foxit Reader 等现代 PDF 阅读器。若必须使用旧版本，请在 IE/Edge 中禁用 "Adobe PDF Reader ActiveX 控件" (pdf.ocx) 并禁用 PDF 文件在浏览器中打开，同时在防火墙层面拦截恶意 PDF 下载链接作为临时缓解。建议通过 Adobe 官网或官方更新通道获取最新版本。立即部署补丁并清理已受感染系统的恶意 PDF 文件。'
score = 7.5
severity = "HIGH"
sources = ["exploitdb"]
title = "Adobe Acrobat ActiveX控件 缓冲区溢出漏洞"
updated = "2026-06-16T21:50:45.407"

