[basic]
description = "xpdf PDF 查看器客户端 0.91 之前版本存在符号链接攻击漏洞。本地攻击者可通过在临时目录中创建恶意符号链接，诱使 xpdf 在处理 PDF 文件时以当前用户权限将内容写入攻击者指定的任意文件，实现任意文件覆盖。该漏洞利用条件为攻击者拥有本地用户权限，影响范围包括 Linux/Unix 系统上使用受影响版本 xpdf 的环境，可导致敏感文件被篡改或系统服务被破坏。"
published = "2000-10-20T04:00:00.000"
remediation = "立即将 xpdf 升级至 0.91 或更高版本。各发行版用户可通过对应包管理器安装更新：Red Hat 用户安装 RHSA-2000:060 提供的更新包，Mandrake 用户安装 MDKSA-2000:041 提供的 xpdf-0.91 更新包。如无法立即升级，建议限制本地用户对 xpdf 临时文件的写权限，并避免以 root 身份运行 xpdf 以降低 symlink 攻击风险。"
score = 7.2
severity = "HIGH"
sources = ["redhat"]
title = "Xpdf PDF Viewer 本地符号链接攻击任意文件写入漏洞"
updated = "2026-06-16T21:52:21.473"

