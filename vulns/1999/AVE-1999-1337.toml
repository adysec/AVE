[basic]
description = "HP Apollo Domain/OS 操作系统的 /etc/suid_exec 程序存在安全漏洞，该程序与 Korn Shell (ksh) 相关，由于未正确限制 suid 权限，本地攻击者可通过执行特制的 suid_exec 程序提升至 root 权限。该漏洞影响 sr10.2 及 sr10.3 beta 版本，CVSS 评分 7.2，危害等级高。攻击者需拥有本地系统访问权限方可利用。"
published = "1990-12-31T05:00:00.000"
remediation = "建议立即升级 HP Apollo Domain/OS 至 sr10.4 或更高版本，该版本已修复 /etc/suid_exec 中 Korn Shell (ksh) 相关的权限提升漏洞。如无法升级，建议移除 /etc/suid_exec 程序的 SUID 位（chmod u-s /etc/suid_exec），并限制可执行该程序的用户范围。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "HP Apollo Domain/OS /etc/suid_exec 权限提升漏洞"
updated = "2026-06-16T21:49:45.133"

