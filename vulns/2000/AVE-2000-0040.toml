[basic]
description = "Corel Linux OS 1.0 的 get_it 程序存在 PATH 环境变量操纵漏洞。该程序在执行 cp 命令时未使用绝对路径，而是依赖用户提供的 PATH 环境变量来定位可执行文件。本地攻击者可通过修改 PATH 变量，将恶意程序命名为 cp 并置于优先搜索路径中，从而在 get_it 以 root 权限运行时执行任意代码，实现本地权限提升。该漏洞影响 Corel Linux OS 1.0 版本，CVSS 评分 7.2，危害等级高。"
published = "2000-01-12T05:00:00.000"
remediation = "立即从 Corel 官方补丁页面 (clos_patch1.htm) 安装安全更新，该补丁修复了 get_it 程序未对 cp 命令路径做安全限制的问题。如无法获取补丁，应限制本地用户对 get_it 程序的执行权限（chmod 700 /usr/bin/get_it），并尽快迁移至仍在维护的 Linux 发行版（如 Ubuntu/Debian），因为 Corel Linux 已停止技术支持。"
score = 7.2
severity = "HIGH"
sources = ["exploitdb"]
title = "Corel Linux OS 1.0 get_it 本地权限提升漏洞"
updated = "2026-06-16T21:50:53.630"

