[basic]
description = "Midnight Commander（mc）4.5.11 之前版本的 FTP 客户端存在敏感信息泄露漏洞。该客户端在访问 FTP 站点后，会将用户名和密码以明文形式存储于全局可读的历史记录文件中，导致本地其他用户可读取该文件获取凭证信息，进而实现权限提升。攻击者只需具备本地普通用户权限即可利用此漏洞。"
published = "1999-08-01"
remediation = "升级至 Midnight Commander 4.5.11 或更高版本，该版本已修复密码明文存储问题。如无法升级，立即执行 chmod 600 ~/.mc/history 限制历史文件权限为仅当前用户可读写，并删除该文件中已保存的明文密码条目。建议使用 .netrc 文件替代自动保存密码功能，并定期检查历史文件是否包含敏感信息。"
score = 4.6
severity = "MEDIUM"
sources = ["cve"]
title = "Midnight Commander FTP客户端历史文件敏感信息泄露漏洞"
updated = "2026-06-16"

