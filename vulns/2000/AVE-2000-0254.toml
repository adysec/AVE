[basic]
description = "RedHat Linux 6.x 的 X 字体服务器 (xfs) 存在缓冲区溢出漏洞，本地攻击者可向字体服务器发送畸形输入数据，触发缓冲区溢出导致服务崩溃，造成拒绝服务。该漏洞影响运行 X Font Server 的 RedHat Linux 6.x 系统，攻击条件为本地用户访问权限，利用方式为构造恶意字体请求数据包发送至 xfs 服务端口。CVSS 评分 2.1，属于低危本地拒绝服务漏洞。"
published = "2000-04-16T04:00:00.000"
remediation = "建议立即升级 Red Hat Linux 6.x 的 X Font Server (xfs) 到修复版本 xfs-1.0.1-3 或更高版本（RHSA-2000:031），可通过 `rpm -Uvh xfs-1.0.1-3.i386.rpm` 升级。若暂时无法升级，请立即禁用 xfs 服务：执行 `chkconfig --level 2345 xfs off` 并执行 `service xfs stop` 停止服务，或在 `/etc/X11/fs/config` 中设置 `no-listen = tcp` 禁止网络监听，仅允许本地 Unix 域套接字访问作为临时缓解措施。"
score = 2.1
severity = "LOW"
sources = ["exploitdb"]
title = "RedHat Linux X Font Server 缓冲区溢出拒绝服务漏洞"
updated = "2026-06-16T21:51:23.993"

