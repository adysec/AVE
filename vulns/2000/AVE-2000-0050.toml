[basic]
description = "Nortel Contivity 设备自带的 HTTP 服务器中，cgiproc 这个 CGI 脚本在处理请求时未对用户输入的文件名参数进行合法性与路径校验。未经身份认证的远程攻击者可通过向该 CGI 脚本发送特制的 HTTP 请求，在参数中直接指定目标文件名，从而绕过访问控制读取服务器上的任意文件。该漏洞影响运行 Contivity HTTP 服务器的相关 Nortel Contivity 设备，攻击仅需网络可达目标服务且无需任何权限，利用方式简单，可导致敏感配置或系统文件泄露，进而威胁设备安全。"
published = "2000-01-17T05:00:00.000"
remediation = "升级 Nortel Contivity 设备到修复该漏洞的固件/软件版本（咨询 Nortel 获取对应补丁），在无法立即升级时，通过防火墙 ACL 限制仅内网可访问 Contivity 的 HTTP 管理端口，并在 Web 服务器配置中禁用或移除 cgiproc CGI 脚本以阻断任意文件读取路径。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Nortel Contivity HTTP 服务器 cgiproc CGI 脚本任意文件读取漏洞"
updated = "2026-06-16T21:50:55.487"

