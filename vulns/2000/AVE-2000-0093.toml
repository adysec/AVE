[basic]
description = "Intellivend 购物车应用程序存在安全设计缺陷，远程攻击者可通过修改网页表单中的隐藏字段（Hidden Form Fields）来篡改敏感交易信息，如商品价格、数量或订单金额等。该漏洞无需身份认证即可利用，攻击者只需构造特制的 HTTP 请求即可直接修改未受保护的表单参数，导致未授权数据篡改和商业欺诈。CVSS 评分 7.5，危害等级高，影响使用 Intellivend 购物车系统的所有版本。"
published = "2000-02-01"
remediation = "该漏洞源于 Intellivend 购物车仅依赖客户端隐藏表单字段传递敏感数据，未做服务端校验。该产品已停止维护多年，建议立即迁移至现代电商平台，并在所有涉及金额和订单的接口强制实施服务端二次校验，以服务端会话记录为准，拒绝客户端提交的价格、数量等敏感字段。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "Intellivend 购物车应用隐藏表单字段远程信息篡改漏洞"
updated = "2026-06-16"

