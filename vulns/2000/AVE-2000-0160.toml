[basic]
description = "iPlanet Web Server 4.1 存在拒绝服务漏洞，远程攻击者可通过向目标服务器发送大量 HTTP GET 请求导致系统内存被过度消耗，进而触发内核 panic，造成服务中断。该漏洞无需身份认证即可远程利用，影响 iPlanet Web Server 4.1 版本。CVSS 评分 5.0，危害等级中危。"
published = "2000-02-23T05:00:00.000"
remediation = "升级到 iPlanet Web Server 4.1 Service Pack 7 或更高版本，该补丁修复了大量 GET 请求导致的内存耗尽问题。长期方案建议迁移至 Oracle iPlanet Web Server 7.0+ 等受支持版本。如无法升级，可部署反向代理或负载均衡器，对单 IP 来源的并发连接数和请求速率进行限制，作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "iPlanet Web Server 4.1 HTTP GET 拒绝服务漏洞"
updated = "2026-06-16T21:51:10.270"

