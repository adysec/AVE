[basic]
description = "Xibo（Spring Signage）数字标牌系统 1.2.3 之前版本及 1.4.2 之前版本的 index.php 中存在目录遍历漏洞。远程攻击者无需身份认证即可通过在 p 参数中插入 ../ 序列绕过路径限制，读取服务器上任意文件，包括配置文件、密码文件等敏感信息。该漏洞源于对用户输入路径过滤不严，攻击复杂度低，CVSS 评分 5.0，危害等级中危。"
published = "2013-10-02T22:55:23.680"
remediation = "升级 Xibo 至 1.2.3（1.2.x 分支）或 1.4.2（1.4.x 分支）及以上版本，该漏洞已在对应版本中修复。如无法立即升级，可在 Web 服务器（Apache/Nginx）层面配置过滤规则，阻止 `p` 参数中包含 `../` 的请求，同时对 `index.php` 的文件读取操作实施白名单路径校验，限制只能访问特定目录下的文件。"
score = 5
severity = "MEDIUM"
sources = ["nuclei"]
title = "Spring Signage Xibo 目录遍历漏洞"
updated = "2026-06-16T23:59:50.393"

