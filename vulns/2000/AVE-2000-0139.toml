[basic]
description = "Windows NT 的自动运行功能在处理非可移动介质上的 autorun.inf 文件时存在代码注入漏洞。本地攻击者可在共享驱动器或非可移动介质中放置恶意的 autorun.inf 文件，指定替代程序执行路径，当其他用户访问该驱动器时系统会自动执行攻击者指定的恶意程序。该漏洞影响 Windows 95/98/NT 4.0 等版本，CVSS 评分 7.2，危害等级高。攻击者需具备本地访问权限或诱导用户访问特制驱动器方可利用。"
published = "2000-02-18T05:00:00.000"
remediation = '在 Windows NT 4.0 中，通过注册表禁用非可移动介质的自动运行功能：将 `HKEY_LOCAL_MACHINE\Software\Microsoft\Windows\CurrentVersion\Policies\Explorer` 下的 `NoDriveTypeAutoRun` 值设为 `0x000000FF`（禁用所有驱动器自动运行）。Windows 95/98 用户可在控制面板中关闭"自动播放"功能。建议升级至 Windows 2000 或更高版本，这些版本默认对非可移动介质禁用 autorun.inf 自动执行。'
score = 7.2
severity = "HIGH"
sources = ["exploitdb"]
title = "Microsoft Windows 95/98/NT 4.0 autorun.inf 本地代码执行漏洞"
updated = "2026-06-16T21:51:06.887"

