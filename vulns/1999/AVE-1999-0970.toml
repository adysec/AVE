[basic]
description = "Cisco Catalyst 2900 系列虚拟局域网交换机中存在 IEEE 802.1q VLAN 遍历漏洞。远程攻击者可通过伪造中继标签中的 VLAN 标识符，向其他 VLAN 注入 802.1q 帧，从而打破 VLAN 隔离机制实现跨 VLAN 访问。该漏洞允许攻击者无需认证即可绕过网络隔离策略，窃取或篡改不同 VLAN 中的敏感数据。CVSS 评分 7.5，危害等级高。"
published = "1999-09-01T04:00:00.000"
remediation = "将所有非 trunk 端口设为静态 access 模式（`switchport mode access`），禁用 DTP（`switchport nonegotiate`），并在 trunk 端口上启用 VLAN 修剪（`vlan pruning`）以及限制允许的 VLAN 列表（`allowed vlan`）。同时配置本征 VLAN 为未使用的专用 ID 并关闭自动协商。这些措施可阻断伪造 802.1q 帧跨 VLAN 攻击。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "Cisco Catalyst 2900 VLAN交换机 未授权VLAN遍历漏洞"
updated = "2026-06-16T21:49:46.940"

