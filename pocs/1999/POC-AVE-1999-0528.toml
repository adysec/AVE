[info]
author = "ave"
description = "验证 Microsoft Internet Explorer 5.0/4.0.1 JavaScript URL 重定向漏洞（MS99-043）。攻击者通过构造包含恶意 JavaScript 代码的网页，利用 window.open 打开本地文件后通过 HTTP 重定向至 javascript: URL，使 JavaScript 在本地文件安全上下文中执行，从而读取本地文件内容。该 PoC 演示了该 URL 重定向机制的 HTML 代码片段。"
id = "POC-AVE-1999-0528"
name = "CVE-1999-0793 IE JavaScript URL Redirection PoC"
severity = "low"
tags = ["ave-1999-0528"]
vuln_id = [
    "CVE-1999-0793",
    "AVE-1999-0528",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/ms99-043-poc.html"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "window.open",
    "file://",
    "javascript:",
    "alert(",
]
