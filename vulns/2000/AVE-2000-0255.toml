[basic]
description = "CNC Technology BizDB 1.0 中的 CGI 脚本 bizdb-search.cgi 存在远程命令执行漏洞。该脚本在处理用户请求时未对 dbname 参数进行充分的输入过滤与转义，攻击者可构造包含 shell 元字符（如分号、管道符、反引号等）的恶意 dbname 参数，使目标系统通过 shell 解释执行攻击者注入的任意操作系统命令。该漏洞影响运行 BizDB 1.0 且暴露 bizdb-search.cgi 脚本的 Web 服务器，未经身份认证的远程攻击者只需向该 CGI 接口发送特制 HTTP 请求即可触发利用，进而完全控制目标服务器，危害等级极高（CVSS 满分 10.0）。"
published = "2000-04-12T04:00:00.000"
remediation = "建议立即升级至 CNC Technology BizDB 修复版本（建议升级至 2.0 或更高版本），或彻底删除/禁用 bizdb-search.cgi 脚本。若无法升级，请在 Web 服务器配置中禁止访问 /cgi-bin/bizdb-search.cgi，或在 WAF 层面拦截包含 shell 元字符（如 ; | & ` $ ( )）的 dbname 参数请求，同时限制 CGI 脚本执行权限为最小权限用户。"
score = 10
severity = "CRITICAL"
sources = ["exploitdb"]
title = "CNC Technology BizDB 1.0 远程命令执行漏洞"
updated = "2026-06-16T21:51:24.117"

