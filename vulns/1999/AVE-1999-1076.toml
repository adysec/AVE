[basic]
description = "Windows NT 系统在处理服务器名称超过 13 个字符的 Ntconfig.pol 策略文件时存在安全绕过漏洞。由于系统对全局组策略的强制执行机制存在缺陷，当服务器名过长时，系统无法正确应用针对全局组的安全策略限制，导致本地用户能够绕过管理员设定的组策略约束，获取超出预期的系统访问权限。该漏洞影响 Windows NT 系列操作系统，攻击者只需拥有本地访问权限即可利用，无需额外认证条件。CVSS 评分 7.5，危害等级高。"
published = "1999-12-31T05:00:00.000"
remediation = "将服务器名称改为不超过 13 个字符，确保 Ntconfig.pol 策略文件对全局组正确生效；升级至 Windows 2000 或更高版本以彻底修复此策略绕过问题。若无法升级，在组策略中手动审查全局组成员权限作为临时缓解。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "Microsoft Windows NT 组策略安全绕过漏洞"
updated = "2026-06-16T21:50:16.343"

