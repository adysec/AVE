[basic]
description = "FatFs R0.16 及更早版本中存在未初始化簇信息泄露漏洞。当通过 f_lseek() 函数将文件扩展至 EOF 之后时，新分配的簇未被清零即被使用，导致残留的磁盘数据可能被读取。本地攻击者可通过构造特制的 FAT 镜像文件，诱导目标系统处理该文件后读取未初始化的簇内容，从而获取敏感信息。该漏洞影响所有使用 FatFs 库的嵌入式设备，CVSS 评分 4.6，危害等级中危。"
published = "2026-07-01T15:17:12.763"
remediation = "升级至 FatFs R0.16 以上版本，若无法升级则手动修改 ff.c 中 f_lseek() 函数：调用 create_chain() 分配新簇后，使用 move_window() 配合 memset 将每个新分配的簇扇区清零，防止扩展区域暴露已删除文件残留数据。受影响的 ESP-IDF、STM32Cube、Zephyr、MicroPython、ArduPilot、RT-Thread 等下游项目应同步更新其 FatFs 分支。"
score = 4.6
severity = "MEDIUM"
sources = ["hwpoc"]
title = "FatFs f_lseek 越界后未初始化簇读取信息泄露漏洞"
updated = "2026-07-02T14:38:35.823"

