[basic]
description = "Mirabilis ICQ 0.99b 1.1.1.1 及 3.19 版本客户端存在远程缓冲区溢出漏洞。攻击原理在于程序在处理 ICQ 消息中的 URL 时未对输入长度进行充分校验，导致缓冲区溢出，远程攻击者可通过构造包含畸形 URL 的恶意 ICQ 消息，向目标系统发送特制数据触发溢出，从而在受害者机器上执行任意命令。该漏洞影响早期 ICQ 99b 系列客户端，攻击者只需知道目标 ICQ 号码即可发起远程利用，无需身份认证，攻击门槛低且危害较大。CVSS 评分 7.5，危害等级高。受影响版本应尽快升级至更高版本以消除该安全风险。"
published = "2000-01-10T05:00:00.000"
remediation = "立即升级 ICQ 99b 客户端至 3.19.1 或更高版本，Mirabilis 已发布补丁修复该缓冲区溢出漏洞。如无法立即升级，应在防火墙中限制 ICQ 客户端出站连接，并避免打开陌生用户发送的包含 URL 的消息，直至完成版本更新。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
