[basic]
description = "Windows 95 在启用 NetWare 网络的远程管理和文件共享功能时存在设计缺陷，当管理员远程登录系统后会自动创建隐藏的 C$ 共享目录，且未对共享访问权限进行有效限制。远程攻击者无需高级权限，只需通过网络映射该驱动器即可读取目标系统上的任意文件，导致敏感信息泄露。该漏洞影响 Windows 95 操作系统，利用方式简单，危害主要为信息泄露。"
published = "1999-12-31T05:00:00.000"
remediation = "立即禁用 Remote Administration 和 File Sharing for NetWare Networks 功能（进入控制面板 → 网络 → 服务，移除 File and Printer Sharing for NetWare Networks 及相关绑定）。由于 Windows 95 已终止支持，建议尽快迁移至受支持的 Windows 10/11 或 Windows Server 版本，并确保 SMB 服务不暴露于公网。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Microsoft Windows 95 远程任意文件读取漏洞"
updated = "2026-06-16T21:49:43.947"

