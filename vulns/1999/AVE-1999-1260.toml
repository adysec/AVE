[basic]
description = "SGI IRIX 5.x至6.3版本的systour系统漫游包中的Indigo Magic System Tour存在本地权限提升漏洞。当RemoveSystemTour程序执行inst命令时，会调用.exitops程序，本地攻击者可通过植入特洛伊木马.exitops程序获取root权限。"
published = "1996-10-30"
remediation = "该漏洞影响已停止支持的SGI IRIX 5.x至6.3版本。官方已发布安全公告19961101-01-I提供补丁，建议升级至IRIX 6.4或更高版本。如无法升级，可卸载systour软件包（versions remove systour）或移除RemoveSystemTour等受影响程序的setuid权限位（chmod -s /usr/sbin/RemoveSystemTour）。"
score = 7.2
severity = "HIGH"
sources = [
    "cve",
    "avd",
]
title = "SGI IRIX Systour 和 OutOfBox 本地权限提升漏洞"
updated = "2026-06-16"

