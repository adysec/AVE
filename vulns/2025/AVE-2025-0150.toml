[basic]
description = "金蝶 EAS 系统 AMF Endpoint 存在 Java 反序列化漏洞，攻击者可通过向目标系统的 AMF 协议端口发送特制的序列化数据触发反序列化操作，在服务器端执行任意代码，进而完全控制目标主机。该漏洞攻击复杂度低，无需身份认证即可远程利用，影响范围涵盖多个金蝶 EAS 版本，对企业内部管理系统构成严重安全威胁。"
published = "0707"
remediation = "建议联系金蝶官方获取 EAS 最新安全补丁进行升级，或升级至不受影响的 EAS 版本（如 V8.2+ 对应补丁包）。临时缓解措施：在 Nginx 或 WAF 层面限制对 /flex2gateway/amf 及 /messagebroker/amf 等 AMF 端点的外部访问，仅允许可信 IP 段访问 EAS 服务。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "金蝶 金蝶EAS AMF Endpoint反序列化远程代码执行漏洞"
updated = "0707"

