[basic]
description = "Caldera OpenLinux 2.3 默认安装中包含 CGI 程序 rpm_query，该程序未对访问来源进行有效身份验证和权限控制，导致远程攻击者可通过 HTTP 请求直接访问该 CGI 接口，获取系统已安装软件包的详细信息。此漏洞属于信息泄露类型，攻击者无需任何认证即可利用，收集到的软件包信息可用于后续针对性攻击，影响 Caldera OpenLinux 2.3 所有默认安装版本。"
published = "2000-03-05T05:00:00.000"
remediation = "删除或移除非必要的 `/cgi-bin/rpm_query` CGI 脚本，或在 Apache 配置中限制对该脚本的访问（如仅允许本地 IP 访问）。建议升级到不再包含此 CGI 程序的 OpenLinux 后续版本，或迁移至受支持的 Linux 发行版。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Caldera OpenLinux 2.3 rpm_query CGI 信息泄露漏洞"
updated = "2026-06-16T21:51:11.600"

