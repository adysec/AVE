[basic]
description = "CyberCash 多媒体收银机（MCK）在 Unix 系统上创建临时文件时使用了可预测的临时文件名且未采用安全的创建方式（如 mkstemp），攻击者可在 /tmp 目录下预先创建指向敏感文件的符号链接。当 MCK 以更高权限运行并写入该临时文件时，会因符号链接攻击覆盖任意文件，从而导致本地权限提升或拒绝服务。该漏洞无需远程访问，仅需本地用户权限即可利用，影响使用 MCK 的电子商务支付环境。"
published = "2000-01-11"
remediation = "升级到 CyberCash 官方修复版本，并将 MCK 运行目录权限收紧为仅属主可写（chmod 700），改用 mkstemp 等安全方式创建临时文件，定期审计 /tmp 下相关符号链接以缓解本地提权风险。"
score = 2.1
severity = "LOW"
sources = ["cve"]
title = "CyberCash MCK 不安全临时文件创建本地提权漏洞"
updated = "2026-07-18"

