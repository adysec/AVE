[basic]
description = "这是一个针对湖南众合百易信息技术有限公司资产管理运营系统comfileup.php文件上传功能的漏洞。该漏洞由于验证机制不足，攻击者可以通过伪造的HTTP POST请求向目标服务器上传恶意文件，包括可执行脚本，从而实现远程代码执行（RCE），完全控制受影响系统。该漏洞影响资产管理系统运行的所有Windows服务器版本，攻击者无需身份验证即可通过网络触发此漏洞。"
published = "0725"
remediation = "目前该系统官方尚未发布补丁，建议联系湖南众合百易信息技术有限公司获取修复版本或安全加固方案。临时缓解措施：在 WAF 或 Web 服务器层面拦截对 comfileup.php 的外部访问；严格校验上传文件类型、后缀名与 MIME，禁止上传 php、jsp、asp 等可执行脚本；将文件上传目录设置为不可执行权限（如 Nginx/Apache 关闭该目录的脚本解析）；对上传文件重命名并存储于 Web 根目录之外，从源头阻断 WebShell 落地与 RCE。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "湖南众合百易 资产管理运营系统 前台文件上传漏洞"
