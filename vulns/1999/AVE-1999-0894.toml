[basic]
title = "多种Unix系统 rpc.sprayd 服务运行配置风险"
description = "CVE-1999-0613 属于配置类安全问题而非软件代码缺陷。当主机上的 rpc.sprayd（网络 spray 性能测试 RPC 服务）处于运行状态时即被记录为本条。该服务协议本身缺乏充分安全保护，若暴露于不可信网络，可能被滥用进行流量探测、资源消耗或成为进一步攻击的跳板。攻击条件为网络可达且服务已启用；官方将其 CVSS 基准分设为 0，因其不作为软件漏洞计分，但配置不当仍可能带来安全隐患。影响范围主要为历史 Unix/Solaris 等启用 RPC sprayd 的系统。"
severity = "LOW"
score = 0.0
sources = ["cve"]
published = "1999-01-01"
updated = "2026-06-16"
remediation = "将 rpc.sprayd 仅限在受信任网段使用，对面向互联网的系统应禁用该服务；按系统文档正确配置并安装厂商推荐补丁，通过防火墙限制 RPC 相关端口仅对可信主机开放。"
