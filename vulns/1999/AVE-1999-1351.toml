[basic]
description = "Solaris 2.2 及更早版本、SunOS 4.1.x 系统中 /dev/audio 音频设备的权限配置存在缺陷，允许任意本地用户读取该设备文件。本地攻击者可利用此漏洞监听目标机器附近麦克风捕获的对话内容，导致敏感信息泄露。该漏洞源于操作系统对音频设备文件访问控制不当，攻击者只需拥有本地账户即可实施监听，无需额外权限。CVSS 评分 2.1，危害等级低。"
published = "1993-10-01T04:00:00.000"
remediation = "升级 Solaris 至 2.3 及以上版本，或 SunOS 至 5.x 系列。如无法升级，手动修改 /dev/audio 权限为 600（仅 root 可读写）：chmod 600 /dev/audio；若无需麦克风功能，可在系统 BIOS 或硬件层面禁用音频输入设备。"
score = 2.1
severity = "LOW"
sources = ["avd"]
title = "Sun Solaris 和 SunOS /dev/audio 本地权限许可漏洞"
updated = "2026-06-16T21:49:47.960"

