[basic]
description = "Yahoo Pager（后更名为 Yahoo Messenger）客户端存在缓冲区溢出漏洞，当其解析接收到的即时消息中嵌入的超长 URL 时，因未对 URL 长度进行边界校验，导致缓冲区被溢出覆盖。未经身份认证的远程攻击者只需向目标用户发送一条包含超长 URL 的恶意消息，即可触发该漏洞造成客户端崩溃或拒绝服务。该漏洞影响当时使用 Yahoo Pager/Messenger 客户端的 Windows 用户，攻击条件为攻击者能够与受害用户建立聊天会话并发送消息，利用方式简单，无需本地访问权限或用户交互之外的操作，但仅造成拒绝服务而非代码执行。"
published = "1999-10-01T04:00:00.000"
remediation = "建议立即升级 Yahoo Pager/Messenger 至 Yahoo 官方发布的安全补丁版本，或更换为最新版 Yahoo Messenger 客户端以修复缓冲区溢出漏洞。如无法立即升级，可在防火墙或网关层面过滤来自不可信来源的长 URL 消息作为临时缓解措施，或暂停使用 Yahoo Pager/Messenger 客户端，迁移至其他即时通讯工具。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Yahoo Pager/Messenger 缓冲区溢出拒绝服务漏洞"
updated = "2026-06-16T21:50:53.510"

