[basic]
description = "胜意费控云 connect 接口存在服务端请求伪造（SSRF）漏洞。攻击者可通过向该接口发送特制的 HTTP 请求，利用服务器端发起内网请求，从而探测内网资产、读取敏感文件或与内部服务交互。该漏洞无需认证即可利用，攻击者仅需构造恶意 URL 参数即可触发。受影响版本包括胜意费控云各版本，建议厂商及时修复此接口的访问控制与请求校验逻辑。"
published = "0719"
remediation = "升级胜意费控云至官方最新安全版本，对connect接口的URL参数实施严格的协议白名单限制（仅允许HTTP/HTTPS），禁用连接内网敏感地址（如127.0.0.1、169.254.169.254等）；在网络边界部署WAF拦截包含内网IP段、云元数据服务地址的恶意请求，并将connect接口访问权限限制至可信IP段，防止未授权利用。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "胜意 费控云 服务端请求伪造漏洞"
updated = "0719"

