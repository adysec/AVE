[basic]
description = "tags.<value>Lotus Domino 4.6.1 的 SMTP 邮件服务组件在处理 SMTP 命令时存在输入验证缺陷，远程攻击者无需身份认证即可通过向目标服务器发送超长字符串数据触发缓冲区处理异常，导致邮件服务进程崩溃或系统重启，造成邮件服务中断。该漏洞影响运行在 AS/400 及其他操作系统上的 Domino 4.6.1 版本，CVSS 评分为 5.0，危害等级为中等。攻击者可通过 Telnet 或脚本工具直接构造恶意 SMTP 请求进行利用，造成拒绝服务攻击。"
published = "1999-05-04T04:00:00.000"
remediation = "建议升级到 IBM Domino 4.6.2 或更高版本，该版本已修复 SMTP 组件对超长字符串输入缺乏边界检查导致的拒绝服务漏洞。如暂无法升级，应在 AS/400 防火墙或网关层对 SMTP 服务（TCP 25 端口）配置访问控制列表，仅允许可信来源 IP 访问，并在 Domino 配置文档中启用 SMTP 命令长度限制，通过设置 `SMTPMaxCommandLength` 参数来拦截超长 SMTP 命令，防止攻击者利用长字符串导致邮件服务崩溃。同时监控 Domino SMTP 任务日志，发现异常长连接请求时立即阻断。"
score = 5
severity = "MEDIUM"
