[basic]
description = "Windows NT 4.0 的 CIFS Computer Browser 服务存在拒绝服务漏洞，远程攻击者可通过向主浏览表发送大量主机宣告请求（HostAnnouncement Flooding），耗尽目标系统资源导致服务崩溃。该漏洞影响 Windows NT 4.0 系统，攻击者无需身份认证即可远程触发，利用难度较低。"
published = "2000-05-25T04:00:00.000"
remediation = '应用微软安全公告 MS00-036 对应补丁 (KB263307)，安装后在注册表中设置以下项以缓解攻击：在 HKLM\SYSTEM\CurrentControlSet\Services\MrxSmb\Parameters 下新建 DWORD 值 MaximumBrowseEntries（默认 100000）限制浏览表大小；在 HKLM\SYSTEM\CurrentControlSet\Services\RDR\Parameters 下新建 DWORD 值 RefuseReset 为 1 以忽略非法的 ResetBrowser 帧。同时在防火墙层面屏蔽 UDP 138 端口阻止外部 NetBIOS 流量。由于 Windows NT 4.0 已停止支持，建议升级到受支持的 Windows Server 版本。'
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Microsoft Windows NT 4.0 CIFS Computer Browser 拒绝服务漏洞"
updated = "2026-06-16T21:51:38.590"

