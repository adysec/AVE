[basic]
description = "Rockliffe MailSite Management Agent 的 wconsole.dll 组件存在缓冲区溢出漏洞，远程攻击者可通过向目标发送特制的 HTTP GET 请求，在 query_string 参数中传入超长字符串触发该漏洞，导致缓冲区溢出，从而在服务器上以系统权限执行任意命令。该漏洞影响早期版本的 MailSite 邮件服务器软件，CVSS 评分 10.0，危害等级严重。建议用户升级至最新版本或应用厂商提供的安全补丁。"
published = "2000-05-24T04:00:00.000"
remediation = "升级 Rockliffe MailSite 至官方修复版本（受影响版本为 2000 年 5 月前发布的旧版）。如官方已停止支持，应立即将 Management Agent 的 HTTP 管理端口（默认 32000）限制在可信内网 IP 范围内，或通过防火墙禁用对 wconsole.dll 相关路径的外部访问。建议迁移至仍在维护的商业邮件服务器产品，并彻底移除 MailSite Management Agent 服务。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "Rockliffe MailSite Management Agent 缓冲区溢出远程代码执行漏洞"
updated = "2026-06-16T21:51:37.960"

