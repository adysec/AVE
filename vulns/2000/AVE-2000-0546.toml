[basic]
description = "Sun AnswerBook2 的 dwhttpd Web 服务器管理接口未对后台 CGI 脚本的请求进行正确认证，远程攻击者无需任何身份凭证即可直接调用 admin CGI 脚本向管理界面添加任意用户账户，从而获得系统管理权限。该漏洞影响 Solaris AnswerBook2 1.4.2/1.4.3/1.4.4 版本，CVSS 评分 7.5，危害等级高。目前厂商已发布补丁修复此问题。"
published = "2000-10-20T04:00:00.000"
remediation = "立即停止并禁用 AnswerBook2 的 dwhttpd 服务（/etc/init.d/answerbook2 stop；rm /etc/rc*.d/*answerbook2），或从系统中彻底卸载 AnswerBook2 软件包（pkgrm SUNWab2m SUNWab2u）。如业务必须保留，在防火墙或 TCP Wrappers 中限制仅允许受信管理 IP 访问 8888 端口，并删除或限制 admin CGI 脚本的执行权限。Solaris AnswerBook2 已停止维护，建议迁移至 Oracle 官方文档站点获取文档服务。"
score = 7.5
severity = "HIGH"
sources = ["exploitdb"]
title = "Sun Solaris AnswerBook2 管理接口未授权访问漏洞"
updated = "2026-06-16T21:52:17.310"

