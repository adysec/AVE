[basic]
description = "Xi Graphics Accelerated-X 服务器存在缓冲区溢出漏洞，本地用户可通过向 display 或 query 参数提交超长字符串触发缓冲区溢出，从而获取 root 权限。该漏洞影响 Xi Graphics Accelerated X 4.0.x 及 5.0 版本，攻击者需拥有本地系统访问权限，无需身份认证即可利用，危害等级高。"
published = "1999-06-25T04:00:00.000"
remediation = "Xi Graphics 公司已停止运营，Accelerated-X 产品已停止维护且无安全补丁可用。建议立即迁移至 X.Org 或 Wayland 等现代 X 服务器；如无法迁移，应严格限制本地用户登录权限，移除受影响用户的 display/query 参数传递能力，并应用最小权限原则。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "Xi Graphics Accelerated-X 本地缓冲区溢出漏洞"
