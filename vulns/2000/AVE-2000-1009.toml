[basic]
description = "Rockliffe MailSite Management Agent 的 wconsole.dll 组件存在缓冲区溢出漏洞，远程攻击者可通过向目标系统发送特制的 HTTP GET 请求，在 query_string 参数中传入超长字符串触发缓冲区溢出，从而在受影响系统上执行任意命令。该漏洞影响 Rockliffe MailSite 邮件服务器管理组件，CVSS 评分 10.0，危害等级严重。攻击者无需身份认证即可远程利用，可能导致服务器完全被控。"
published = "2000-05-24T04:00:00.000"
remediation = "立即升级 Rockliffe MailSite 至最新受支持版本，或联系厂商获取针对 wconsole.dll 缓冲区溢出漏洞的安全补丁。如产品已停止维护，建议迁移至仍在安全更新周期内的替代邮件服务器软件，并在防火墙规则中限制对 Management Agent 端口（默认 32000/tcp）的访问来源，仅允许受信任管理 IP 连接。"
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "Rockliffe MailSite Management Agent 缓冲区溢出远程代码执行漏洞"
updated = "2026-06-16T21:51:37.960"

