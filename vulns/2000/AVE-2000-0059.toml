[basic]
description = "Visual Casel (Vcasel) 存在文件名信任验证缺陷，未能正确限制用户执行文件的路径验证。本地攻击者可利用相对路径名指定具有受信任文件名的替代文件，绕过安全检查并可能提升权限。该漏洞影响 Visual Casel 相关版本，CVSS 评分 4.6（中等），属于本地权限提升类漏洞。攻击者需具备本地系统访问权限，通过构造恶意相对路径诱导程序执行非预期文件，从而获取更高权限。"
published = "2000-01-17T05:00:00.000"
remediation = "该产品（VCasel 3.0）已停止维护，无官方补丁可用。建议立即停止使用 VCasel，迁移至现代访问控制解决方案（如 Windows 组策略或第三方权限管理软件）。作为临时缓解措施，可在系统层面限制本地用户对文件系统的写入权限，并启用应用程序白名单策略阻止未授权程序执行。"
score = 4.6
severity = "MEDIUM"
sources = ["cve"]
