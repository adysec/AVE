[basic]
description = "深信服终端检测响应平台（EDR）在 2016 至 2019 版本中存在认证绕过漏洞，攻击者无需有效凭证即可绕过登录验证机制，直接以任意用户身份登录系统管理后台，获取设备控制权限。该漏洞危害等级高，影响范围广泛，可能导致企业内部终端安全防护体系被攻破。厂商已在后续版本中修复该漏洞。"
published = "08.15"
remediation = "立即将深信服终端检测响应平台(EDR)升级至 3.2.19 或更高版本。如无法立即升级，可在 EDR 管理控制台配置 IP 白名单访问策略，仅允许可信管理 IP 访问 Web 管理端口，同时在网络边界防火墙限制对 EDR 管理端口的非授权访问作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "深信服 EDR 任意用户登录认证绕过漏洞"
updated = "08.15"

