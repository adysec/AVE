[basic]
description = "SCO UnixWare 7.1 及 7.1.1 EELS 子系统存在拒绝服务漏洞，远程攻击者无需身份认证即可通过发送特制请求触发该漏洞，导致目标系统服务崩溃或资源耗尽，影响系统可用性。该漏洞影响 SCO UnixWare 7.1/7.1.1 版本，攻击复杂度低，危害等级中危。"
published = "2000-03-10"
remediation = "建议立即应用 SCO 安全公告 SB-00.08a 中的 SSE 补丁包更新 EELS 组件。如无法获取官方补丁，应在网络边界防火墙限制对 UnixWare 7.1/7.1.1 服务器的非信任来源访问，或迁移至仍受支持的操作系统以避免暴露于已知拒绝服务攻击。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "SCO UnixWare 7.1/7.1.1 EELS 拒绝服务漏洞"
updated = "2000-03-10"

