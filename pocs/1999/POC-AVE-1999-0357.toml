[info]
author = "ave"
description = "检测 IIS/ Site Server 中 codebrws.asp 示例文件是否存在任意文件读取漏洞。该漏洞允许远程攻击者通过 /iissamples/sdk/asp/docs/codebrws.asp 路径浏览 Web 根目录下任意 .asp/.inc/.htm/.html 文件的源代码"
id = "POC-AVE-1999-0357"
name = "CVE-1999-0739 codebrws.asp Source Disclosure PoC"
severity = "medium"
tags = ["ave-1999-0357"]
vuln_id = [
    "CVE-1999-0739",
    "AVE-1999-0357",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/iissamples/sdk/asp/docs/codebrws.asp"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["View Active Server Page Source"]
