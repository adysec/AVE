[basic]
description = "Microsoft Outlook 98/2000 及 Outlook Express 4.0x/5.0x 存在缓存绕过漏洞。远程攻击者可通过向用户发送特制的 HTML 邮件，利用畸形邮件消息将恶意文件存储至客户端缓存目录之外，从而读取目标系统上的任意本地文件，导致敏感信息泄露。攻击者无须认证，仅需诱导用户打开恶意邮件即可触发，CVSS 评分 7.5，危害等级高。"
published = "2000-07-20T04:00:00.000"
remediation = "立即安装 Microsoft 安全公告 MS00-046 提供的补丁，或执行 Internet Explorer 5.01 Service Pack 1 或 IE 5.5 的默认安装以升级 Outlook Express 到 5.5 版本。Windows 2000 用户须安装 IE 5.01 SP1 或直接应用补丁。如无法打补丁，可配置邮件客户端以纯文本格式阅读邮件，并禁用 HTML 邮件渲染功能作为临时缓解措施。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "Microsoft Outlook 和 Outlook Express 缓存绕过信息泄露漏洞"
updated = "2026-06-16T21:52:07.677"

