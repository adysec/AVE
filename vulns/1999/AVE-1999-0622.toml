[basic]
description = "DataLynx suGuard 1.0 存在本地权限提升漏洞。该程序在执行 ps 命令时信任 PATH 环境变量，未对程序路径进行绝对路径引用，导致本地攻击者可通过修改 PATH 环境变量将恶意程序替换为 ps，从而以 root 权限执行任意命令。攻击者需具备本地系统访问权限，利用难度较低，危害较高。"
published = "1999-01-01T05:00:00.000"
remediation = "将 suGuard 中对 ps 命令的调用路径从相对路径改为绝对路径（如 /bin/ps 或 /usr/bin/ps），或在执行前将 PATH 环境变量重置为安全值（如 /bin:/usr/bin），防止攻击者通过篡改 PATH 劫持命令执行。建议立即停止使用已停止维护的 DataLynx suGuard，迁移到持续更新的替代方案（如 sudo 或 doas）。"
score = 4.6
severity = "MEDIUM"
sources = ["exploitdb"]
title = "DataLynx suGuard 1.0 本地权限提升漏洞"
updated = "2026-06-16T21:48:17.403"

