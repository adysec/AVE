[basic]
description = "Microsoft Internet Explorer 4.x/5 及 Outlook 2000/98/Express 4.x 中的 ActiveX 控件存在安全漏洞，远程攻击者可通过向受害者发送包含恶意 CAB 文件的 HTML 邮件附件，并利用嵌入脚本自动触发 ActiveX 控件加载执行该 CAB 文件。该漏洞允许攻击者在目标系统上以当前用户权限执行任意代码，影响广泛使用的 IE 浏览器和 Outlook 邮件客户端，用户无需额外交互即可受到攻击。"
published = "1999-11-11T05:00:00.000"
remediation = "建议升级至 Internet Explorer 5.01 Service Pack 2 及以上版本，或改用 Internet Explorer 6/7/8 等后续版本，同时在 Internet 安全区域将 ActiveX 控件设置为「禁用」或「提示」，并关闭 Outlook 预览窗格中 HTML 邮件的脚本执行能力以防止通过邮件附件触发的远程文件执行。"
score = 5.1
severity = "MEDIUM"
sources = ["epss"]
title = "Microsoft Internet Explorer/Outlook ActiveX CAB 文件远程执行漏洞"
updated = "2026-06-16T21:51:29.370"

