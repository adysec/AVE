[basic]
description = "Microsoft Hotmail 存在跨站脚本（XSS）漏洞，远程攻击者可通过在 HTML 的 STYLE 标签中嵌入恶意 JavaScript 代码，当用户使用 Microsoft Internet Explorer 5 或 Netscape Communicator 4.0/4.5/4.6 等浏览器访问 Hotmail 时，恶意脚本将在用户浏览器中自动执行，导致攻击者能够以用户身份执行任意操作，包括读取、篡改或删除邮件内容。该漏洞影响 Hotmail 邮件服务，CVSS 评分 5.1，危害等级中等。"
published = "1999-09-13T04:00:00.000"
remediation = "升级到现代浏览器（IE 5.5 及以上版本已修复此问题），或改用 Chrome/Firefox/Edge 等现代浏览器，其默认安全策略禁止在 STYLE 标签中执行 JavaScript。Hotmail 用户应确保使用最新版浏览器访问邮件服务，并启用浏览器 XSS 过滤器（现代浏览器默认开启）。"
score = 5.1
severity = "MEDIUM"
sources = ["avd"]
title = "Microsoft Hotmail 跨站脚本攻击漏洞"
updated = "2026-06-16T21:48:58.727"

