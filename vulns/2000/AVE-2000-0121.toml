[basic]
description = "@Retail 在线购物车应用程序存在安全设计缺陷，其商品表单中的价格、数量等敏感交易信息以 HTML 隐藏字段（hidden form fields）方式传递至服务端，而未在服务端进行有效的完整性校验。远程攻击者可通过拦截并篡改 HTTP 请求中的隐藏字段值（如将商品价格修改为任意金额），从而以极低价格完成订单，导致商家遭受经济损失。该漏洞影响 @Retail 购物车系统的多个版本，攻击条件简单，无需任何身份认证，仅需基本的网络通信能力即可实施。"
published = "2000-02-01T05:00:00.000"
remediation = "@Retail 购物车应用存在隐藏表单字段可被篡改的问题，应立即在服务端对所有表单提交数据进行完整性校验，禁止信赖客户端提交的隐藏字段值（如商品价格、数量等敏感信息）。同时建议升级到已修复此问题的版本，或替换为仍受支持且经过安全审计的购物车系统。若无法升级，应通过 Web 应用防火墙（WAF）对请求中 hidden 类型字段进行强制校验规则拦截作为临时缓解。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "Atretail 购物车应用隐藏表单字段敏感信息篡改漏洞"
updated = "2026-06-16T21:51:04.387"

