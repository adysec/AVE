[basic]
description = "Windows NT 系统未启用密码筛选工具（如 PASSFILT.DLL），导致密码复杂度策略无法正常执行，用户可设置空密码或弱密码。远程攻击者可通过暴力破解弱密码获得系统未授权访问权限，进而完全控制受影响的 Windows NT 系统。该漏洞影响所有未启用密码筛选功能的 Windows NT 版本，CVSS 评分 10.0，危害等级严重。"
published = "1999-01-01T05:00:00.000"
remediation = '在注册表 HKLM\SYSTEM\CurrentControlSet\Control\Lsa 中新建 Notification Packages 多字符串值，添加 PASSFILT 启用密码筛选器；通过本地安全策略（secpol.msc）开启密码必须符合复杂性要求，设置密码长度最小值≥8 位、密码最长使用期限≤90 天，确保 PASSFilt.dll 存在于 %SystemRoot%\System32 目录中。'
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "Microsoft Windows NT 密码筛选器未启用弱密码策略漏洞"
updated = "2026-06-16T21:48:39.403"

