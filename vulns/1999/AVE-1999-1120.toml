[basic]
description = "miniSQL 软件包中的 w3-auth CGI 程序存在缓冲区溢出漏洞，远程攻击者可通过向目标服务器发送包含超长 URL 或超长 User-Agent MIME 头的特制 HTTP 请求触发该漏洞，导致缓冲区溢出，从而执行任意命令。该漏洞影响运行 miniSQL 软件包的系统，CVSS 评分 7.5，危害等级高。攻击者无需身份认证即可远程利用，可完全控制受影响系统。"
published = "1999-09-30T04:00:00.000"
remediation = "立即停止使用已停止维护的 miniSQL 及其 w3-auth CGI 程序，该产品自 1999 年后已无安全更新。建议迁移至现代数据库方案（如 MySQL/MariaDB/PostgreSQL）并移除所有 w3-msql 相关 CGI 脚本。如因遗留系统无法立即迁移，应在 Web 服务器层面移除或禁用 w3-auth CGI 可执行权限，并在防火墙/反向代理中限制对该 CGI 的访问来源 IP，同时确保 HTTP_AUTHORIZATION 环境变量不被外部传入。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "Hughes miniSQL w3-auth 缓冲区溢出远程代码执行漏洞"
updated = "2026-06-16T21:50:30.497"

