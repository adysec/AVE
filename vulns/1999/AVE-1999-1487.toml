[basic]
description = "FreeBSD 2.1 及更早版本中的 ppp 程序存在缓冲区溢出漏洞，本地攻击者可通过向 HOME 环境变量传入超长字符串触发该漏洞，导致缓冲区溢出，从而获取提升的权限。该漏洞影响 FreeBSD 2.1 及更早版本，CVSS 评分 7.2，危害等级高。攻击者需具备本地系统访问权限方可利用。"
published = "1996-12-19T05:00:00.000"
remediation = "升级 FreeBSD 系统至 2.1.5 或更高版本，该版本已修复 ppp 程序对 HOME 环境变量的缓冲区边界检查。如无法升级，可移除 ppp 程序的 setuid 权限（chmod u-s /usr/sbin/ppp），限制本地普通用户执行 ppp 的提权路径。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "FreeBSD ppp 本地缓冲区溢出权限提升漏洞"
updated = "2026-06-16T21:50:19.610"

