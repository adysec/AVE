[basic]
description = "Cisco IOS 12.2(15)及之前版本中存在拒绝服务漏洞，远程攻击者可通过向目标设备的 Telnet 或反向 Telnet 端口发送特制的 TCP 连接请求，导致虚拟终端（VTY）连接被拒绝，造成设备无法接受新的管理登录会话。该漏洞利用难度低，无需身份认证即可触发，影响大量 Cisco 网络设备，需升级固件或配置访问控制列表（ACL）进行缓解。"
published = "2004-12-31T05:00:00.000"
remediation = "升级 Cisco IOS 至 12.2(15) 之后的安全修复版本。如无法立即升级，可采取以下临时缓解措施：(1) 启用 SSH 并禁用 Telnet 服务：line vty 0 4 下配置 transport input ssh；(2) 配置 VTY 访问控制列表，仅允许信任源 IP 连接；(3) 在入站接口部署 ACL 过滤 Telnet（23/TCP）及 Reverse Telnet 端口（2001-2999、3001-3099、6001-6999、7001-7099/TCP）；(4) 在分布式平台配置 rACL 保护路由处理器。"
score = 5.9
severity = "MEDIUM"
sources = ["kev"]
title = "Cisco IOS Telnet VTY 远程拒绝服务漏洞"
updated = "2026-06-16T22:07:45.380"

