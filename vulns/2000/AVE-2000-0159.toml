[basic]
description = "Check Point Firewall-1 3.0 与 4.0 版本存在内部地址泄漏漏洞。当防火墙处理网络连接时，数据包中会携带内部主机的私有 IP 地址信息，远程攻击者可通过嗅探或分析这些泄漏的数据包获取内网真实 IP 地址，进而为后续针对性攻击提供情报。该漏洞利用条件低，无需认证即可实施信息收集，严重威胁内网拓扑隐蔽性。Check Point 官方已发布安全公告，建议用户升级至修复版本或配置地址转换规则以缓解风险。"
published = "2000-03-11T05:00:00.000"
remediation = "升级 Check Point Firewall-1 至 4.1 或更高版本，该版本已修复内部地址泄漏问题。如无法升级，可在防火墙规则中启用「隐藏内部网络地址」(Hide Internal Network Address) 选项，并对外的 NAT 规则中禁用从 DMZ 到外部的源地址透传。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Check Point Firewall-1 内部地址泄漏漏洞"
updated = "2026-06-16T21:51:10.150"

