[basic]
description = "Apple QuickTime 在 7.4.5 及更早版本中处理电影媒体轨道时存在内存破坏漏洞，远程攻击者可通过构造特制电影文件（如 MOV、MP4 等格式）触发内存损坏，进而执行任意代码。该漏洞影响 Windows、Macintosh 等多个平台上的 QuickTime 用户，攻击者可制作含有恶意电影文件的网页链接或直接发送文件，诱骗用户用存在漏洞的 QuickTime 打开播放，成功利用后可完全控制受影响系统。"
published = "2008-04-04T17:44:00.000"
remediation = "立即将 QuickTime 升级到 7.4.5 或更高版本。打开 iTunes，依次选择「帮助」→「检查更新」，或前往 Apple 官网下载安装 QuickTime 7.4.5 安全更新。对于无需使用 QuickTime 的 Windows 主机，建议通过「控制面板」→「程序和功能」直接卸载。如暂时无法升级，应在系统防火墙或邮件网关处拦截 .mov、.qt、.pict 等 QuickTime 相关文件扩展名，避免打开来历不明的媒体文件。"
score = 6.8
severity = "MEDIUM"
sources = ["tenable"]
title = "Apple QuickTime 内存破坏远程代码执行漏洞"
updated = "2026-06-16T22:50:48.763"

