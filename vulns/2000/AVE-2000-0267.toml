[basic]
description = "Red Hat Piranha 虚拟服务器套件中的 passwd.php3 CGI 脚本存在命令注入漏洞，本地攻击者通过在输入参数中插入 shell 元字符可执行任意系统命令。该漏洞 CVSS 评分 10.0，危害等级严重，成功利用可使本地攻击者以 Web 服务器权限执行任意命令，完全控制目标系统。"
published = "2000-04-24T04:00:00.000"
remediation = "立即安装 Red Hat 安全公告 RHSA-2000-014 提供的更新，升级 piranha 包至修复版本；该版本已对 passwd.php3 脚本中的用户输入进行转义处理，阻止 shell 元字符注入。由于 Red Hat Linux 6.x 及 Piranha Virtual Server Package 已停止维护，建议迁移至受支持的 Red Hat Enterprise Linux 版本，并采用现代负载均衡方案（如 HAProxy 或 Keepalived）替代 Piranha。"
score = 10
severity = "CRITICAL"
sources = ["redhat"]
title = "红帽 Piranha Virtual Server Package passwd.php3 任意命令执行漏洞"
updated = "2026-06-16T21:51:28.470"

