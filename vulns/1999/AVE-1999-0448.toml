[basic]
description = "Miva htmlscript 2.x 中的 CGI 程序存在目录遍历漏洞，远程攻击者无需身份认证即可通过特制的 URL 路径参数，绕过路径限制访问服务器上的任意文件（如密码文件、配置文件等）。该漏洞影响 htmlscript 2.x 版本，攻击者只需发送 HTTP 请求即可利用，危害等级中等，建议升级至最新版本或禁用该 CGI 程序。"
published = "1998-01-27T05:00:00.000"
remediation = '升级 Miva htmlscript 至 3.0 或更高版本，该版本已修复目录遍历问题；如产品已停止维护，应立即从 Web 服务器 cgi-bin 目录中移除 htmlscript CGI 程序。临时缓解措施：在 Apache/Nginx 层面配置规则拦截包含 "../" 的 URL 请求，或通过 .htaccess 限制对 htmlscript 脚本的访问来源。'
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Miva htmlscript 2.x 目录遍历漏洞"
updated = "2026-06-16T21:48:01.847"

