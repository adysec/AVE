[basic]
description = "Intel NetStructure 7110 和 7180 设备存在未记录的后门账户漏洞（servnow、root、wizard），其密码可通过设备的 MAC 地址推算得出。远程攻击者无需身份认证即可利用该漏洞，通过猜测密码以 root 权限登录设备，完全控制目标系统。该漏洞影响 NetStructure 7110 及 7180 系列产品，CVSS 评分 10.0，危害等级严重。厂商未提供官方补丁，建议限制设备管理接口的网络访问权限。"
published = "2000-05-08T04:00:00.000"
remediation = "立即修改 Intel NetStructure 7110/7180 设备中 servnow、root、wizard 三个未记录账户的密码为强随机密码，避免使用与 MAC 地址相关的任何字符串；在防火墙上限制仅允许受信 IP 访问设备管理端口（Telnet/SSH/HTTP）；如业务允许，禁用未使用的 wizard 账户或将 shell 设为 /sbin/nologin；将设备置于隔离网段，避免暴露在公网。"
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "Intel NetStructure 7110 未记录账户密码漏洞"
updated = "2026-06-16T21:51:36.250"

