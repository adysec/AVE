[basic]
description = "Analog 统计分析软件 3.0 及更早版本中存在任意文件读取漏洞，远程攻击者可通过 forms 接口向目标系统发送特制请求，利用路径遍历或未授权访问方式读取服务器上的任意文件，包括配置文件、密码文件等敏感信息。该漏洞影响 Analog 3.0 及之前所有版本，CVSS 评分 5.0，危害等级中危。建议用户升级至最新版本或限制 forms 接口的访问权限以降低风险。"
published = "1999-12-31T05:00:00.000"
remediation = "升级 Analog 至 3.1 或更高版本，该版本对 forms 接口输入进行了路径验证，防止目录遍历攻击。如继续使用 CGI 模式，建议在 Web 服务器层面限制对 forms 接口的访问，仅允许可信 IP 提交查询。Analog 项目已于 2004 年停止维护，建议迁移至 GoAccess 或 Matomo 等现代日志分析工具。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Analog 任意文件读取漏洞"
updated = "2026-06-16T21:50:06.927"

