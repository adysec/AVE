[basic]
description = "SGI IRIX 6.x 及更早版本中的运行时链接器程序 rld 存在权限提升漏洞。本地攻击者可通过利用 setuid 和 setgid 程序在链接过程中对 rld 进行操纵，从而获取目标系统的 root 权限。该漏洞源于 rld 在处理特权程序时未正确验证调用者身份，导致低权限用户可借助已授权的 setuid/setgid 二进制文件执行任意代码，实现完全控制目标系统。攻击者需拥有本地 shell 访问权限，无需其他认证条件，攻击复杂度较低。"
published = "1997-05-28T04:00:00.000"
remediation = "立即应用 SGI 安全公告 19970504-01-PX 中提供的 rld 补丁，升级 IRIX 到包含修复的最新版本。由于 SGI IRIX 已停止维护，建议迁移至受支持的现代操作系统；若无法迁移，应限制本地用户对 setuid/setgid 程序的访问权限，并监控 rld 的异常调用行为作为临时缓解措施。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "SGI IRIX runtime linker 本地权限提升漏洞"
updated = "2026-06-16T21:49:48.800"

