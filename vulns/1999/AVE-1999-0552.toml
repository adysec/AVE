[basic]
description = "Novell NetWare 4.11 及更早版本的事务跟踪系统（Transaction Tracking System，TTS）存在拒绝服务漏洞。TTS 用于在数据库等事务操作中保证数据一致性，但该组件在处理客户端请求时缺乏有效的资源消耗限制。未经身份认证的远程攻击者可通过网络向目标 NetWare 服务器发送大量特殊构造的 TTS 相关请求，耗尽系统资源或触发异常处理，导致服务器无法响应正常服务请求，进而造成拒绝服务。该漏洞影响运行 Novell NetWare 4.11 及更早版本并启用 TTS 服务的系统，攻击仅需网络可达且无需合法凭据，利用门槛较低。"
published = "2001-03-12T05:00:00.000"
remediation = "建议将 Novell NetWare 升级至 4.11 之后的修复版本（如 NetWare 5.x），或安装 Novell 官方发布的 TTS 服务相关补丁。如无法立即升级，可在边界防火墙/路由器上限制对 NetWare 服务器 524 端口（NCP）及 TTS 相关服务的访问，仅允许受信任内网主机连接，并配置连接速率限制与并发请求上限，以降低远程大量请求触发拒绝服务的风险。"
score = 5.0
severity = "MEDIUM"
sources = ["epss"]
title = "Novell NetWare 4.11 事务跟踪系统拒绝服务漏洞"
updated = "2026-06-16T21:49:05.650"

