[basic]
description = "明源ERP 的 SSO 单点登录模块存在身份认证绕过漏洞，攻击者可通过向 /PubPlatform/nav/login/sso/login.aspx 接口发送特制 POST 请求，利用 __yzsAppSecret 参数及编码后的 user_info 数据绕过身份验证机制，获取有效 userToken 后直接访问系统后台。该漏洞导致未授权用户可绕过登录限制，获取 ERP 系统管理权限，造成敏感数据泄露。攻击者只需网络可达目标系统即可远程利用，无需任何认证信息，危害严重。"
published = "0703"
remediation = "联系明源云官方获取最新安全补丁，升级 ERP 系统至修复 SSO 认证绕过漏洞的版本。临时缓解措施：在 WAF/IPS 层面配置规则，拦截对 /PubPlatform/nav/login/sso/login.aspx 路径中 __yzsAppSecret 和 user_info 参数的非授权访问请求；限制该接口仅允许可信内网 IP 访问；审查并回收所有异常 userToken 会话。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "明源ERP SSO登录身份认证绕过漏洞"
updated = "0703"

