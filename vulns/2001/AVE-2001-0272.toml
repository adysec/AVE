[basic]
description = "Microsoft Internet Explorer 5.5 存在 CLSID 文件执行漏洞，该漏洞源于 IE 5.5 在文件名末尾包含类标识符 (CLSID) 时不会显示该 CLSID，导致攻击者可通过构造包含 CLSID 的文件名（如 document.txt{CLSID}），将可执行程序伪装成安全的文档文件类型，诱导用户点击执行恶意代码。该漏洞影响 Microsoft Internet Explorer 5.5 版本，攻击者需诱导用户点击恶意链接或打开恶意文件，利用方式为社工欺骗用户执行伪装成安全文档的恶意程序，CVSS 评分 5.0（中危），主要影响完整性，Microsoft 已发布安全更新修复此漏洞。"
published = "2001-09-20T04:00:00.000"
remediation = '建议立即停止使用 Internet Explorer 5.5，升级至 Microsoft Edge、Google Chrome 或 Mozilla Firefox 等现代受支持浏览器。如必须使用 IE，请升级至 IE 11 并安装最新累积安全更新（KB4598298 等）。临时缓解措施：在文件夹选项中取消勾选"隐藏已知文件类型的扩展名"，在 Internet 选项-安全-自定义级别中禁用"未标记为可安全执行脚本的 ActiveX 控件"和"对未标记为可安全执行脚本的 ActiveX 控件提示"，并通过组策略或注册表禁用 CLSID 扩展隐藏功能（HKEY_CLASSES_ROOT\CLSID\{...} 相关键值）。同时加强用户安全意识教育，不打开来历不明的文件附件。'
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Microsoft Internet Explorer 5.5 CLSID 文件执行漏洞"
updated = "2026-06-16T21:54:40.963"

