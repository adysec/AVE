[basic]
description = "多种 BSD 系操作系统的行打印守护进程（lpd/in.lpd）存在缓冲区溢出漏洞，未经身份认证的远程攻击者可通过向目标系统发送包含过长文件名的未完成打印作业，随后请求显示打印队列触发内存溢出，进而以 root 权限执行任意代码。该漏洞影响 FreeBSD 4.3 及更早版本、NetBSD 1.5.1 及更早版本、OpenBSD 2.9 及更早版本、BSD/OS 4.1 及更早版本等多个发行版，CVSS 评分 7.5，危害等级高。攻击者只需在网络可达目标主机的 TCP/515 端口即可发起利用，无需任何凭据。"
published = "2001-10-03T04:00:00.000"
remediation = "升级受影响系统到最新补丁版本：NetBSD 升级至 1.5 分支 2001-09-30 后的版本并重新编译安装 /usr/sbin/lpd；OpenBSD 升级至 2.9 或应用 2.8 errata 032 补丁；FreeBSD 升级至 4.2 以后的稳定版本。如暂时无法升级，若不需打印服务应立即停止 lpd 进程，并通过 /etc/hosts.lpd 限制仅允许可信主机访问，禁止任意来源连接 515 端口作为临时缓解措施。"
score = 7.5
severity = "HIGH"
sources = ["redhat"]
title = "多种 BSD 操作系统 lpd 远程代码执行漏洞"
updated = "2026-06-16T21:54:43.487"

