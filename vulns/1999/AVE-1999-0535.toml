[basic]
description = "Allaire Forums 2.0.4 版本中的 GetFile.cfm 脚本存在任意文件读取漏洞。该脚本未对用户输入的文件路径参数进行充分的合法性校验与访问控制，导致未经身份认证的远程攻击者可通过构造恶意的 HTTP 请求，向 GetFile.cfm 传递特殊参数来读取 Web 服务器上本不应公开的文件内容，如配置文件、源代码或敏感数据。攻击者可利用此漏洞进行信息探测与进一步攻击，影响范围涵盖运行 Allaire Forums 2.0.4 的服务器，攻击条件仅需网络可达目标且能访问该 CGI 页面即可。"
published = "2001-03-12T05:00:00.000"
remediation = "建议立即升级至 Allaire Forums 2.0.5 或更高版本，或升级至 Macromedia/Adobe 后续版本的 ColdFusion 论坛模块。若无法升级，请立即删除或重命名 GetFile.cfm 文件，或在 Web 服务器层面配置访问控制拦截对 GetFile.cfm 的所有请求，同时配置 ColdFusion 沙箱安全限制文件系统读取权限。"
score = 5
severity = "MEDIUM"
