title = "SunOS restore 命令本地权限提升漏洞"
description = "SunOS 4.0.3及更早版本中的restore命令存在本地权限提升漏洞。restore是用于恢复文件系统备份的系统工具，由于在执行文件恢复操作时未正确验证用户权限，导致本地攻击者可通过精心构造的备份文件或利用restore程序在处理文件时的缺陷，在恢复过程中以root权限执行任意操作，从而获得系统最高权限。该漏洞需要攻击者拥有本地系统访问权限，攻击复杂度较低。"
