[basic]
description = "Open WebUI 是一款自托管的人工智能平台，其 MarkdownTokens.svelte 组件在处理聊天消息中的 HTML 标签时存在存储型跨站脚本漏洞（CWE-79）。攻击者可在聊天内容中注入恶意 JavaScript 代码，当其他用户打开包含该消息的聊天记录时，脚本将在受害者浏览器中执行，窃取访问令牌并实现账户接管。若目标为管理员，攻击者还可通过创建包含恶意 Python 代码的函数进一步实现服务器端远程代码执行。共享的聊天记录可在社区内传播，形成蠕虫式攻击。该漏洞影响 0.6.6 之前的所有版本，建议升级至 0.6.6 及以上版本修复。"
published = "2025-05-05T19:15:57.197"
remediation = "立即升级 Open WebUI 至 0.6.6 或更高版本，该版本已修复 MarkdownTokens.svelte 中对 HTML 标签转义不充分的问题。如无法立即升级，建议在管理面板中禁用「社区分享」功能，并限制不可信聊天记录的导入与查看权限，避免攻击者通过共享的恶意聊天记录触发 XSS。同时审查并删除已有可疑的自定义函数以防止 RCE 利用。"
score = 5.4
severity = "MEDIUM"
sources = ["ghsa"]
title = "Open WebUI 存储型跨站脚本漏洞"
updated = "2026-06-17T09:26:52.230"

