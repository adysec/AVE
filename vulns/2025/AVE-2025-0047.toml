[basic]
description = "若依（RuoYi）后台管理框架的演示模块邮件接口存在任意文件读取漏洞。攻击者可通过 `/demo/mail/` 接口的 `filePath` 参数传入任意文件路径（如 `/etc/passwd`），由于服务端未对文件路径进行有效校验和权限控制，导致未授权用户可读取服务器上的敏感文件，造成信息泄露。该漏洞影响若依各版本，危害较高。"
published = "2025-07-03"
remediation = "建议升级若依至最新版本；在生产环境中禁用或移除演示模块（demo）；对 filePath 参数添加路径白名单校验，禁止包含 ../ 等目录遍历字符；对演示模块接口添加身份认证和权限控制。"
score = 5.0
severity = "MEDIUM"
sources = ["hwpoc"]
title = "若依 任意文件读取漏洞"
updated = "2025-07-20"

