[basic]
description = "Linux 内核 3.5.5 之前版本在 ARM v6k 和 v7 架构平台上，get_user 和 put_user API 函数未能正确验证用户空间传入的内存地址，导致本地攻击者可通过精心构造的应用程序读取或修改任意内核内存内容。该漏洞在 2013 年 10 月至 11 月期间已被广泛利用于针对 Android 设备的实际攻击中，攻击者利用此漏洞可实现本地权限提升，获取系统最高控制权。影响范围涵盖运行旧版 Linux 内核的 ARM 架构 Android 设备及嵌入式系统，CVSS 评分 8.8，危害等级高。"
published = "2013-11-20T13:19:43.023"
remediation = "升级 Linux 内核至 3.5.5 及以上版本，该版本合入了 commit 8404663f81d2 修复了 ARM v6k/v7 平台 get_user/put_user 未验证地址的问题。Android 设备用户请联系设备厂商获取对应安全补丁，或刷入已包含该修复的定制内核。如无法立即升级，可通过限制非授权应用安装、启用 SELinux 等缓解措施降低风险。"
score = 8.8
severity = "HIGH"
sources = ["kev"]
title = "Linux Kernel ARM 平台 get_user/put_user 本地权限提升漏洞"
updated = "2026-06-17T00:00:14.617"

