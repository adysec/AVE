[basic]
description = "Check Point VPN-1/FireWall-1 4.1及更早版本的协议检查器中存在缓冲区溢出漏洞，该漏洞位于模块间通信机制的Getkey函数中。远程攻击者无需认证，可通过向目标系统发送特制的协议请求触发缓冲区溢出，导致进程异常终止并引发拒绝服务。该漏洞影响所有部署Check Point VPN-1/FireWall-1 4.1及以下版本的防火墙设备，CVSS评分5.0，属于中等危害等级。"
published = "2000-11-14T05:00:00.000"
remediation = "立即升级 Check Point VPN-1/FireWall-1 至 4.1 SP1 或更高版本，该版本修复了 Getkey 函数的缓冲区溢出问题。由于 VPN-1/FireWall-1 4.x 系列已停止维护，强烈建议迁移至当前受支持的 Check Point Gaia OS 平台（R81 及以上版本）。短期内如无法立即升级，应在防火墙前端部署访问控制列表（ACL），限制对防火墙管理接口的网络访问，仅允许可信管理网络连接，从而降低远程攻击者触发该溢出的风险。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Check Point VPN-1/FireWall-1 协议检查器缓冲区溢出拒绝服务漏洞"
updated = "2026-06-16T21:52:31.557"

