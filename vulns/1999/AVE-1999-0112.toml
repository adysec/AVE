[basic]
description = "procmail 3.12 之前版本存在缓冲区溢出漏洞，本地或远程攻击者可通过在 procmailrc 配置文件中精心构造恶意的扩展变量，触发缓冲区溢出，从而在目标系统上执行任意命令。该漏洞影响运行 procmail 的各类 Linux 发行版（包括 Caldera OpenLinux），CVSS 评分 7.5，危害等级高危。"
published = "1999-04-05T04:00:00.000"
remediation = "升级 procmail 至 3.12 及以上版本，该版本已修复 procmailrc 配置文件中扩展处理的缓冲区边界检查缺陷。如无法升级，避免在 procmailrc 中使用不可信来源的变量扩展，并严格限制普通用户修改 procmailrc 配置文件的权限。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "Procmail procmailrc 配置文件扩展缓冲区溢出漏洞"
updated = "2026-06-16T21:48:23.947"

