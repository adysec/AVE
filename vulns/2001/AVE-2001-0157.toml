[basic]
description = "GoAhead WebServer 2.1 存在拒绝服务漏洞，远程攻击者无需身份认证即可向目标服务器的 /aux 路径发送特制 HTTP 请求，导致服务器进程崩溃或资源耗尽，无法正常响应后续请求。该漏洞影响 GoAhead WebServer 2.1 for Windows 版本，CVSS 评分 5.0，危害等级中等，利用方式简单。"
published = "2001-07-02T04:00:00.000"
remediation = "升级 GoAhead WebServer 到 v2.1.5 以上版本，该漏洞在后续版本中已修复对 Windows 保留设备名 `/aux` 的请求处理。如无法升级，可在 Web 服务器前端部署反向代理（如 Nginx）并配置规则拦截对 `/aux`、`/con`、`/nul` 等 Windows 保留设备名的 HTTP 请求作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Goahead Software GoAhead Web Server 拒绝服务漏洞"
updated = "2026-06-16T21:54:12.477"

