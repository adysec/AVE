[basic]
description = "Common Unix Printing System (CUPS) 1.1.14 至 1.1.17 版本的 filters/image-gif.c 组件在处理 GIF 图像时未正确校验零长度 GIF 图像的 chunk 头部，存在缓冲区溢出漏洞。远程攻击者可通过向目标 CUPS 服务发送特制的恶意 GIF 图像触发该漏洞，导致任意代码执行。该漏洞影响 Linux/Unix 系统中运行 CUPS 1.1.14-1.1.17 版本的设备，CVSS 评分 7.5，危害等级高。厂商已发布安全更新修复此漏洞。"
published = "2002-12-26T05:00:00.000"
remediation = "立即升级 CUPS 至 1.1.18 或更高版本。各发行版对应操作：Red Hat 安装 RHSA-2002:295 更新包；Debian 安装 DSA-232 更新包；SuSE 安装 2003-002 更新包；Mandrake 安装 MDKSA-2003:001 更新包。如无法升级，可在 CUPS 配置中禁用 GIF 图像过滤支持，或在网络层面限制对 CUPS 服务（默认端口 631）的访问。"
score = 7.5
severity = "HIGH"
sources = ["osv"]
title = "CUPS GIF 图像处理远程代码执行漏洞"
updated = "2026-06-16T21:59:11.790"

