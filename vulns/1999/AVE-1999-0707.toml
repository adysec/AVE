[basic]
description = "sccw（soundcard_cw）工具存在任意文件读取漏洞，本地攻击者可利用该工具读取系统上任意文件内容，导致敏感信息泄露。该漏洞源于 sccw 在文件读取操作中未对文件路径进行充分的权限校验，攻击者只需拥有本地系统访问权限即可利用，无需额外认证。CVSS 评分 2.1，危害等级低，仅影响机密性，不影响完整性和可用性。"
published = "1999-09-16T04:00:00.000"
remediation = "移除 sccw 程序的 setuid 权限位：`chmod u-s /usr/bin/sccw`。如无需使用声卡控制功能，建议直接卸载相关软件包：`apt-get remove sccw` 或 `yum remove sccw`。作为临时缓解措施，可通过 `chmod 000 /usr/bin/sccw` 禁止所有用户执行该程序。"
score = 2.1
severity = "LOW"
sources = ["avd"]
title = "soundcard_cw 本地任意文件读取漏洞"
updated = "2026-06-16T21:49:18.287"

