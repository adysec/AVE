[basic]
description = "Microsoft Windows NT 4.0 的远程过程调用（RPC）服务在处理命名管道（Named Pipes Over RPC）连接时存在资源管理缺陷，未能正确关闭无效的命名管道 RPC 连接。未经身份认证的远程攻击者可向目标系统发起一系列包含畸形数据的连接请求，由于系统无法及时释放这些失败连接所占用的资源，最终导致系统资源（如内存、句柄等）被持续耗尽，引发拒绝服务（DoS）。该漏洞影响运行 Windows NT 4.0 的服务器与工作站，攻击仅需网络可达目标主机的 RPC 端口，无需任何凭据即可远程触发，利用方式是通过反复建立并发送畸形数据连接使目标系统资源枯竭而停止响应。"
published = "1999-12-31T05:00:00.000"
remediation = '立即安装微软发布的 Windows NT 4.0 安全补丁（SP4 及之后补丁包，对应修复"Named Pipes Over RPC"漏洞的更新），通过 Windows Update 或手动部署补丁程序。如无法立即打补丁，应在边界防火墙或路由器上过滤 135、139、445 等 RPC/NetBIOS 端口的入站连接，并仅允许受信任内网主机访问命名管道服务，以缓解远程资源耗尽攻击。'
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "Microsoft Windows NT 4.0 Named Pipes Over RPC 资源耗尽拒绝服务漏洞"
updated = "2026-06-16T21:49:46.667"

