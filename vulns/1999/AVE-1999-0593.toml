[basic]
description = "FreeBSD 3.3 系统中的 xmindpath 工具存在缓冲区溢出漏洞，本地攻击者可通过向该程序传递特制的 -f 参数触发缓冲区溢出，从而获取目标系统的 root 权限。该漏洞影响 FreeBSD 3.3 版本，攻击者需拥有本地账号才能利用，危害等级中等。目前官方已发布补丁修复此漏洞。"
published = "1999-12-01T05:00:00.000"
remediation = "升级 FreeBSD 到 3.3-STABLE 之后已修复该漏洞的版本（或升级至 3.4-RELEASE 及以上），并移除或限制 xmindpath 程序的 setuid 权限（执行 chmod u-s /usr/bin/xmindpath）。若暂无法升级，可通过 chmod 000 禁用该二进制文件，或使用 sudo 限制仅授权用户运行，避免本地低权限用户借助 -f 参数溢出提权。"
score = 4.6
severity = "MEDIUM"
sources = ["exploitdb"]
