[basic]
description = "Apache OFBiz 的 /webtools/control/xmlrpc 接口所使用的 XML-RPC 事件处理器在处理 XML 请求时未对外部实体（XXE）进行限制，存在 XML 外部实体注入漏洞（CWE-611）。远程攻击者无需身份认证，只需向该接口发送携带恶意 DOCTYPE 声明的特制 XML-RPC 请求，即可利用外部实体引用读取目标服务器文件系统中的敏感文件内容，探测开放的网路端口，并可通过服务端返回的错误信息判断特定文件是否存在。该漏洞影响 Apache OFBiz 16.11.01 至 16.11.04 版本，CVSS 评分为 7.5（高危），攻击条件仅需网络可达目标服务并能够发送构造的 XML 请求，利用方式简便且可造成信息泄露。"
published = "2019-11-26T01:15:10.647"
remediation = "建议立即升级 Apache OFBiz 至 16.11.05 或更高版本（受影响版本：16.11.01 至 16.11.04）。如暂时无法升级，可在 webtools/WEB-INF/web.xml 中禁用 XML-RPC servlet（注释掉 xmlrpc servlet 及其映射），或在防火墙层面限制 /webtools/control/xmlrpc 端点的外部访问作为临时缓解措施。"
score = 7.5
severity = "HIGH"
sources = ["nuclei"]
