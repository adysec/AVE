[basic]
description = 'AnalogX SimpleServer:WWW 1.06 及更早版本存在目录遍历漏洞。远程攻击者无需身份认证，通过向目标 Web 服务器发送经 %2E URL 编码绕过过滤机制的特制请求（如将".."编码为"%2E%2E"），即可遍历服务器文件系统，读取任意文件内容。该漏洞利用难度低，影响范围广，可导致敏感信息泄露。厂商至今未发布官方补丁，建议用户升级或更换其他 Web 服务器软件。'
published = "2000-07-26T04:00:00.000"
remediation = "升级 AnalogX SimpleServer:WWW 至 1.07 及以上版本，该版本已修复 %2E 编码的目录遍历问题。若厂商已停止维护，建议迁移至 Apache httpd、Nginx 等仍在积极维护的 Web 服务器，并在迁移前在 Web 应用防火墙（WAF）侧配置规则拦截包含 `%2E%2E%2F` 或 `../` 的 URL 请求作为临时缓解。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "AnalogX SimpleServer:WWW 1.0.6 目录遍历漏洞"
updated = "2026-06-16T21:52:13.153"

