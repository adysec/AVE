[basic]
description = "Samba 2.0.5 之前版本的 smbd 守护进程在处理畸形消息命令时存在缓冲区溢出漏洞。本地攻击者可向目标 Samba 服务发送特制的恶意消息包触发该漏洞，导致服务进程崩溃或实现本地权限提升，获取系统高权限。该漏洞影响所有 Samba 2.0.5 之前版本，CVSS 评分为 5.0，危害等级中等。"
published = "1999-07-21T04:00:00.000"
remediation = "升级 Samba 至 2.0.5 或更高版本，该版本修复了 smbd 进程处理畸形消息命令时的缓冲区溢出漏洞。如无法升级，可在 smb.conf 中限制可访问 smbd 的源 IP 地址范围作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Samba smbd 缓冲区溢出漏洞"
updated = "2026-06-16T21:49:06.360"

