[basic]
description = "明源云 ERP 系统的 ApiUpdate.ashx 接口存在任意文件上传漏洞，未授权的远程攻击者可通过向该接口发送特制的 HTTP 请求，绕过文件类型校验上传恶意脚本文件（如 Webshell），从而获取服务器控制权限。该漏洞影响明源云 ERP 多版本，危害等级高，建议用户尽快升级至安全版本或配置访问控制策略。"
published = "08.14"
remediation = "联系明源云官方技术支持获取接口管家模块安全补丁，升级至修复 ApiUpdate.ashx 未授权上传漏洞的最新版本。同时配置 IIS 对该路径添加身份认证，限制仅允许内网 IP 访问；在 Web 应用防火墙 WAF 中添加规则拦截上传目录下 .asp/.aspx/.ashx/.cer 等可执行脚本文件；服务器层面设置上传目录无执行权限（取消 Script 和 Execute 权限），防止上传的恶意文件被解析执行。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = 'The user wants me to generate a `[title]` field for the vulnerability `HWPOC-2023-029b73e2`. Given information: - 漏洞编号: HWPOC-2023-029b73e2 - 原标题: 明源云 ERP ApiUpdate.ashx 文件上传漏洞 - 原始描述: 明源 明源云 ERP ApiUpdate.ashx 文件上传漏洞 任意文件上传 - 08.14 The format should be: "厂商 产品 漏洞类型" in Chinese, 20-100 characters. From the title, the vendor is "明源云" (Mingyuanyun), the product is "ERP", the vulnerable file is "ApiUpdate.ashx", and the vulnerability type is "任意文件上传" (arbitrary file upload). So a good title would be: "明源云 ERP ApiUpdate.ashx 任意文件上传漏洞" That is concise'
updated = "08.14"

