[basic]
description = "HP-UX 9.x 操作系统的 Xauthority 认证机制在特定条件下未能正确启用，导致本地用户即使未经显式授权也能访问 X 显示服务。该漏洞源于 X11 窗口系统的权限控制缺陷，攻击者只需拥有本地系统访问权限即可利用，无需特殊权限。成功利用后可获取其他用户的 X 显示内容，造成敏感信息泄露。HP 已发布相关安全公告修复此问题。"
published = "1994-07-13"
remediation = "升级 HP-UX 系统至 10.x 及以上版本，该版本完整支持 Xauthority 认证机制。如无法升级，可通过编辑 /etc/dt/config/Xservers 文件启用访问控制（加上 -nolisten tcp 参数），并使用 xhost 限制仅授权用户可访问 X 显示。同时确保用户主目录下的 .Xauthority 文件权限为 600。建议迁移至受支持的操作系统版本。"
score = 4.6
severity = "MEDIUM"
sources = [
    "cve",
    "avd",
]
title = "HP HP-UX Xauthority 本地授权绕过漏洞"
updated = "2026-06-16"

