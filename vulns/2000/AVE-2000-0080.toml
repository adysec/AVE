[basic]
description = "Qualcomm qpopper 3.0 beta 系列版本在处理 POP3 LIST 命令时存在缓冲区溢出漏洞。已认证的本地用户可通过向 qpopper 服务发送超长 LIST 命令参数触发栈缓冲区溢出，覆盖返回地址，从而以 qpopper 进程权限执行任意代码，获取系统控制权。攻击者可借此读取其他用户邮件或在服务器上执行任意操作，CVSS 2.0 评分 7.2，危害等级高。"
published = "2000-01-26"
remediation = "将 qpopper 升级至 3.0 beta 29 或更高版本，该版本修复了 LIST 命令的缓冲区溢出问题。若无法立即升级，建议限制 POP3 服务的网络访问范围，仅允许可信客户端连接，并在防火墙层面限制对 110 端口的访问。对于已停止维护的 qpopper，建议迁移到 Dovecot 等现代且仍在维护的 POP3 服务器软件。"
score = 7.2
severity = "HIGH"
sources = ["exploitdb"]
title = "Qualcomm qpopper 3.0 LIST 命令本地缓冲区溢出漏洞"
updated = "2026-06-16"

