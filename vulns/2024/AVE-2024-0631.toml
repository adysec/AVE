[basic]
description = "Linux 内核 vcnl4035 光传感器驱动（IIO 子系统）的触发缓冲区实现存在未初始化内存泄漏漏洞。驱动在向用户空间推送触发缓冲区数据时，使用的局部数组未对单个数据元素（u16 对齐至 8 字节）进行初始化，导致至少 4 字节未初始化内核内存被泄露至用户空间。本地攻击者只需低权限即可触发缓冲区读取，无需用户交互，可获取内核栈/堆敏感信息（机密性影响高），且可能引发拒绝服务（可用性影响高）。影响使用 vcnl4035 驱动的 Linux 内核版本，CVSS 3.1 评分 7.1（HIGH），攻击向量本地、攻击复杂度低、权限要求低。Linux 内核已通过将缓冲区数组初始化为零修复该漏洞。"
published = "2025-01-19T12:15:25.187"
remediation = '建议立即升级 Linux 内核至已修复版本：Ubuntu 24.04 LTS 升级至 linux-image-6.8.0-52-generic (USN-7381-1)；Ubuntu 20.04 LTS 升级至 linux-image-5.15.0-127-generic (USN-7459-1)；Debian 11 升级至 linux-image-5.10.223-1 (DLA-4075-1)。上游内核已在 v6.12-rc1 合并修复提交 8f8a6b8c8f3a (iio: light: vcnl4035: fix information leak in triggered buffer)。若无法立即升级内核，可通过禁用 vcnl4035 驱动缓解：echo "blacklist vcnl4035" > /etc/modprobe.d/blacklist-vcnl4035.conf 并重启或执行 modprobe -r vcnl4035 卸载模块（需确认设备不依赖该光线传感器）。'
score = 7.1
severity = "HIGH"
sources = ["msrc"]
title = "Linux内核 vcnl4035光传感器驱动 信息泄漏漏洞"
updated = "2026-06-17T08:14:12.680"

