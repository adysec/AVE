[basic]
description = "WordPress Tom M8te 插件 1.5.3 版本中存在目录遍历漏洞，位于 tom-download-file.php 文件中。由于该文件对 file 参数缺乏充分的过滤与验证，远程攻击者无需身份认证即可通过构造包含路径遍历序列（如 ../）的 file 参数，读取服务器上任意文件，导致敏感信息泄露。该漏洞影响所有使用 Tom M8te 1.5.3 版本的 WordPress 站点，攻击条件简单，仅需目标可访问即可利用。"
published = "2014-08-06T19:55:04.493"
remediation = "立即停用并删除 Tom M8te 插件 1.5.3 及更早版本，该插件已长期未更新维护。如必须使用，在 tom-download-file.php 中对 file 参数添加路径白名单校验，禁止包含 ../ 等目录穿越字符，并将可访问目录限制为插件自身目录。"
score = 5
severity = "MEDIUM"
sources = ["nuclei"]
title = "WordPress Tom M8te插件目录遍历漏洞"
updated = "2026-06-17T00:11:10.860"

