[basic]
description = "Cmail 2.4.7 的 Web 管理界面存在缓冲区溢出漏洞。未经认证的远程攻击者可通过向 8002 端口上运行的用户对话框发送超长用户名，触发缓冲区溢出，导致目标服务拒绝服务。该漏洞影响 Cmail 2.4.7 版本，CVSS 评分 5.0，危害等级中等，利用无需认证。建议升级至更高版本以修复此漏洞。"
published = "2000-06-05T04:00:00.000"
remediation = "升级到 Cmail 2.4.8 或更高版本以修复缓冲区溢出漏洞；如厂商已停止维护，建议迁移至其他受支持的邮件服务软件。临时缓解措施：在防火墙层面限制对 8002 端口的访问，仅允许可信 IP 地址连接，并监控该端口的异常大请求。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Cmail 2.4.7 Web 界面用户名字段缓冲区溢出拒绝服务漏洞"
updated = "2026-06-16T21:51:59.517"

