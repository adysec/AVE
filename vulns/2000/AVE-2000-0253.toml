[basic]
description = "华盛顿大学 IMAP 守护进程 imapd 4.7 版本中存在缓冲区溢出漏洞。拥有合法账户的攻击者可通过向服务器发送特制的 LIST 命令触发缓冲区溢出，进而在目标系统上执行任意命令。该漏洞影响 WU-IMAP 2000.287 及更早版本，远程攻击者可利用该漏洞完全控制受影响服务器。"
published = "2000-04-16T04:00:00.000"
remediation = "立即升级 UW IMAPD 至 4.8 及以上版本（4.7 及更早版本已修复此漏洞）。如无法升级，限制本地用户的 IMAP 命令执行权限，或在防火墙层面对 IMAP 端口（143）实施白名单访问控制。鉴于 UW IMAPD 已于 2022 年正式停止维护，建议迁移至持续维护的 Dovecot 或 Cyrus IMAP 替代方案。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "University of Washington IMAPD 缓冲区溢出漏洞"
updated = "2026-06-16T21:51:23.750"

