[basic]
description = "Raptor GFX 配置工具 pgxconfig 存在缓冲区溢出漏洞，本地攻击者可通过向命令行选项传递超长参数触发缓冲区溢出，从而获得提升的权限。该漏洞影响 Tech-Source Raptor GFX PGX32 2.3.1 及之前版本，CVSS 评分 7.2，危害等级高。攻击者需要拥有本地系统访问权限才能利用此漏洞，无法远程触发。"
published = "2000-10-20T04:00:00.000"
remediation = "立即移除 pgxconfig 的 setuid 权限（`chmod u-s $(which pgxconfig)`），并将该二进制文件权限修改为仅 root 可执行（`chmod 700 $(which pgxconfig)`）。如业务上无需使用该配置工具，可直接删除 pgxconfig 二进制文件。由于 Tech-Source 已停止支持该产品且无官方安全更新，建议迁移至受支持的替代显卡解决方案。"
score = 7.2
severity = "HIGH"
sources = ["cve"]
title = "Tech-Source Raptor GFX PGX32 pgxconfig 缓冲区溢出权限提升漏洞"
updated = "2026-06-16T21:52:17.183"

