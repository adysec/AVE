[basic]
description = "SalesLogix eViewer 1.0 的 slxweb.dll 管理程序存在认证缺失漏洞。远程攻击者无需任何身份验证，直接访问 slxweb.dll 管理页面即可触发该漏洞，导致目标系统服务崩溃，造成拒绝服务。该漏洞影响 SalesLogix eViewer 1.0 版本，CVSS 评分 5.0，危害等级中等。厂商未发布官方补丁，建议限制对该管理页面的网络访问权限。"
published = "2000-08-03T04:00:00.000"
remediation = "建议升级 SalesLogix eViewer 至最新版本（如有），或迁移至受支持的替代产品。如无法升级，可在 IIS 中将 slxweb.dll 管理路径限制为仅允许受信 IP 段访问，移除匿名访问权限，必要时直接删除或重命名 slxweb.dll 文件以彻底阻断攻击路径。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "SalesLogix Corporation eViewer 1.0 slxweb.dll 拒绝服务漏洞"
updated = "2026-06-16T21:51:22.993"

