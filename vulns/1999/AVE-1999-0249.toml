[basic]
description = "Common Desktop Environment (CDE) 的 dtspcd 守护进程存在符号链接（symlink）漏洞，本地攻击者可通过创建恶意符号链接诱导 dtspcd 以提升的权限读取或写入任意文件，从而执行任意命令获取 root 权限。该漏洞影响 CDE 2.1.20 及 Solaris 7.0 等版本，CVSS 评分 7.2，危害等级高。攻击者需拥有本地系统访问权限，利用难度较低。"
published = "1999-09-13T04:00:00.000"
remediation = "安装 Sun 安全公告 #192 中对应平台的 dtspcd 补丁（Solaris 7：Patch ID 106594-01；Solaris 2.6：106593-01；Solaris 2.5.1：106592-01），HP-UX 用户安装 HPSBUX9909-103 补丁。临时缓解措施可停止 dtspcd 服务（/usr/dt/bin/dtspcd -kill）或移除其 setuid root 权限（chmod 555 /usr/dt/bin/dtspcd）。由于 CDE 已停止维护，建议迁移至 GNOME/KDE 等其他桌面环境作为根本解决方案。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "Sun Solaris Common Desktop Environment dtspcd 本地权限提升漏洞"
updated = "2026-06-16T21:48:51.173"

