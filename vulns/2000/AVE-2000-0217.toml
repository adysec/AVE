[basic]
description = "Atrium Software Mercur WebView WebMail-Client 1.0 存在缓冲区溢出漏洞。远程攻击者可通过向 WebMail 服务器发送包含超长 mail_user 参数的 GET 请求触发缓冲区溢出，导致服务崩溃进而引发拒绝服务。该漏洞影响了 Mercur WebView WebMail-Client 1.0 版本，攻击者无需身份认证即可远程利用，危害等级中等。"
published = "2000-03-15T05:00:00.000"
remediation = "立即停止使用已停止维护的 Atrium Software Mercur WebView WebMail 1.0，迁移至仍在安全更新的现代 Web 邮件服务器（如 Roundcube、SquirrelMail 等）。如无法立即替换，在 Web 服务器或 WAF 层对 GET 请求的 mail_user 参数做长度限制（建议 ≤256 字符），并过滤包含超长参数的恶意请求作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Atrium Software Mercur WebView WebMail 缓冲区溢出漏洞"
updated = "2026-06-16T21:51:17.810"

