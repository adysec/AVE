[basic]
description = 'tags as the final output.<value>iCat Carbo Server 3.0.0 的 carbo.dll 组件中存在目录遍历漏洞。未经身份认证的远程攻击者可通过向 icatcommand 参数注入 ".." 路径遍历序列，读取服务器上的任意文件。该漏洞影响 iCat Electronic Commerce Suite 3.0 版本，攻击者无需凭据即可利用此漏洞获取敏感配置文件或数据文件，可能导致信息泄露。'
published = "1997-11-08T05:00:00.000"
remediation = "升级 iCat Carbo Server 至修复了该目录遍历问题的 3.0.1 或更高版本；如暂无法升级，请在 Web 服务器前端通过 WAF 或反向代理过滤 icatcommand 参数中的「../」及 URL 编码的目录穿越序列，并限制 carbo.dll 仅对可信来源开放访问作为临时缓解。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "iCat Electronic Commerce Suite 3.0 目录遍历任意文件读取漏洞"
updated = "2026-06-16T21:49:39.400"

