[basic]
description = "FreeBSD 系统中的 mount_union 命令存在权限许可与访问控制缺陷，本地已认证用户可利用符号链接（symlink）攻击手段，通过构造指向特权路径的恶意符号链接，诱使 mount_union 以更高权限执行操作，从而非法提升自身权限至 root 级别。该漏洞影响存在 mount_union 组件的 FreeBSD 系统版本，攻击前提是攻击者需具备本地系统访问权限并能在目标文件系统上创建符号链接，利用方式相对简单，无需远程网络访问即可完成本地提权。"
published = "1999-12-01T05:00:00.000"
remediation = "升级至 FreeBSD 3.3 或更高版本，该版本已修复 mount_union 对符号链接的检查逻辑。如无法升级，可移除 mount_union 的 setuid 位（chmod u-s /usr/sbin/mount_union）并限制可访问该命令的用户组，作为临时缓解措施。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "FreeBSD mount_union 权限许可和访问控制漏洞"
updated = "2026-06-16T21:49:25.107"

