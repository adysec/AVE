[basic]
description = "Delegate 应用代理程序在处理网络请求时存在多个缓冲区溢出漏洞，远程攻击者无需身份认证即可通过向目标系统发送特制的网络数据包触发该漏洞，导致任意代码执行。该漏洞影响 ETL Delegate 5.9.x 及 6.0.x 版本，CVSS 评分 7.5，危害等级高。建议用户升级至不受影响的版本或应用厂商发布的安全补丁。"
published = "1999-11-13T05:00:00.000"
remediation = "升级到 ETL Delegate 6.1.0 或更高版本，该版本修复了代理协议处理中的缓冲区溢出问题。由于该产品已停止维护，建议迁移至主流代理服务器（如 Nginx、HAProxy）作为长期解决方案，并在边界防火墙上限制对代理端口的非信任来源访问。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "ETL Delegate 远程缓冲区溢出漏洞"
updated = "2026-06-16T21:51:08.143"

