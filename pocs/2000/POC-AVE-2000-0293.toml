[info]
author = "ave"
description = "通过向 Eudora 邮件客户端发送包含 .lnk 快捷方式文件的恶意邮件，该快捷方式指向 .exe/.com/.bat 等可执行附件，绕过 Eudora LaunchProtect 安全警告机制，导致任意代码执行"
id = "POC-AVE-2000-0293"
name = "Qualcomm Eudora 4.x Attachment LaunchProtect Warning Bypass PoC"
severity = "high"
tags = ["ave-2000-0293"]
vuln_id = [
    "CVE-2000-0342",
    "AVE-2000-0293",
]

[poc]
logic = "all"

[[poc.requests]]
path = "/tmp/eudora_poc.lnk"
protocol = "file"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["L"]
