[basic]
description = "Seyon 是一款运行于 Linux/FreeBSD 系统的 X Window System 终端仿真程序。该漏洞源于 Seyon 在处理命令行 `-emulator` 参数时存在本地缓冲区溢出缺陷，程序未对传入参数做长度校验。已登录系统的本地用户可在执行 Seyon 时通过 `-emulator` 参数传入特制的恶意程序路径或超长字符串，覆盖栈上返回地址并注入恶意代码，从而将自身权限提升至 root。受影响版本主要包括 Seyon 2.1 rev. 4b（i586-Linux，如 RedHat 4.0/5.1）及 FreeBSD 上的相关版本，攻击需具备本地账户且能执行该程序。"
published = "1999-11-08T05:00:00.000"
remediation = "升级Seyon到最新版本（当前支持FreeBSD的最新版本），并确保使用安全版本的-4.x系列或更高版本；如果无法立即更新，可通过修改Seyon配置文件禁用-emulator参数以拒绝可疑程序作为临时缓解措施；同时增强系统权限控制，确保只有特权用户可以访问Seyon程序目录。"
score = 4.6
severity = "MEDIUM"
sources = ["exploitdb"]
title = "FreeBSD Seyon 终端仿真程序本地缓冲区溢出漏洞"
updated = "2026-06-16T21:49:07.710"

