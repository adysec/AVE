[basic]
description = "佳能多款激光打印机和小型办公多功能一体机 XPS 解析组件存在栈缓冲区溢出漏洞（CWE-787）。攻击者无需身份认证，通过向受影响设备发送特制的 XPS 文件即可触发栈缓冲区溢出，导致设备无响应或执行任意代码。该漏洞影响佳能 Satera LBP670C、MF750C、Color imageCLASS LBP630C/MF650C、i-SENSYS LBP630C/MF650C 及 imageRUNNER 1643i II 等系列固件 v06.02 及更早版本，在 Pwn2Own 大赛中被公开演示，CVSS 评分 9.3，危害等级严重。厂商已发布固件更新修复该漏洞。"
published = "2026-01-16T00:16:27.430"
remediation = "立即将 Canon 激光打印机/小型多功能一体机的固件升级至 v06.02 之后的最新版本，通过 Canon 官网对应机型的固件下载页面获取更新。同时，务必配置防火墙或路由器，确保打印机仅位于私有网络内并使用私有 IP 地址，禁止将打印机直接暴露在互联网上。"
score = 9.3
severity = "CRITICAL"
sources = ["zdi"]
title = "Canon 激光打印机 XPS解析器栈缓冲区溢出远程代码执行漏洞"
updated = "2026-06-17T08:35:34.763"

