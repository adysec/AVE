[basic]
description = "Microsoft IIS 4.0 的 FrontPage Server Extensions 组件中的 fpcount.exe 存在缓冲区溢出漏洞，远程攻击者可通过向目标服务器发送特制的 HTTP 请求触发该漏洞，导致任意代码执行。攻击者无需身份认证即可远程利用此漏洞，获取服务器的完全控制权限。该漏洞影响运行 IIS 4.0 并启用了 FrontPage Server Extensions 的 Windows NT 系统。"
published = "1999-01-14T05:00:00.000"
remediation = "立即升级 FrontPage Server Extensions 至 98 或更高版本（可从 Microsoft 网站下载更新），或直接删除 _vti_bin 目录下的 fpcount.exe 文件。对于仍运行 IIS 4.0 的服务器，建议升级至受支持的 Windows Server 版本（如 2008+）并迁移网站，因 IIS 4.0 已停止安全更新多年。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "Microsoft IIS FrontPage Server Extensions 缓冲区溢出远程代码执行漏洞"
updated = "2026-06-16T21:50:18.477"

