[basic]
description = "PHP-Nuke 1.0/2.5 版本中的 admin.php3 管理后台文件未能正确验证管理员密码，远程攻击者无需认证即可通过构造不包含 aid 或 pwd 参数的 URL 直接访问管理功能，从而获取网站管理权限。该漏洞影响 PHP-Nuke 1.0 和 2.5 版本，攻击者利用此漏洞可完全控制目标网站，包括修改页面内容、执行任意 SQL 查询等操作，危害较大。"
published = "2000-10-20"
remediation = "在 admin.php3 中增加会话认证检查，验证 aid 与 pwd 参数是否提供且与数据库中作者记录匹配，拒绝空密码认证通过。若 mysql_fetch_row 未返回有效行，应直接拒绝访问而非继续比较密码。由于 PHP-Nuke 已停止维护多年，强烈建议迁移至其他活跃维护的内容管理系统。"
score = 7.5
severity = "HIGH"
sources = [
    "cve",
    "exploitdb",
]
title = "PHP-Nuke admin.php3 管理权限绕过漏洞"
updated = "2026-06-16"

