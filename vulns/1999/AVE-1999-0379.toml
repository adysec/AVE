[basic]
description = "SuSE Linux 6.2 及更早版本中随附的 in.identd 服务在默认配置下，对来自同一来源的请求之间会强制等待约 120 秒。远程攻击者无需身份认证，只需持续向目标主机的 ident 服务（TCP 113 端口）发送大量或连续的连接请求，即可耗尽服务端的连接处理能力，使 in.identd 长时间无法响应合法的身份查询请求，从而造成拒绝服务（DoS）。该漏洞影响运行 SuSE Linux 6.2 及以下版本且启用默认 in.identd 配置的系统，攻击条件仅需网络可达目标 113 端口，利用方式简单，可通过自动化脚本批量发起连接触发。"
published = "1999-08-16T04:00:00.000"
remediation = "建议立即将 SuSE Linux 升级到 6.3 及以上版本，该版本已修复 in.identd 默认配置缺陷。如暂时无法升级，可修改 /etc/inetd.conf 中 ident 服务配置，将 in.identd 的超时等待时间由默认 120 秒调小（如添加 -t 或 -o 超时参数），或在防火墙/inetd 层面限制对 113 端口的外部连接，仅允许可信内网访问，以此缓解远程拒绝服务风险。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "SuSE Linux in.identd 拒绝服务漏洞"
updated = "2026-06-16T21:48:58.247"

