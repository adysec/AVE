[basic]
description = "WFTPD FTP服务器2.34/2.40/3.0版本存在远程缓冲区溢出漏洞，攻击者可通过发送一系列MKD和CWD命令创建嵌套目录，触发缓冲区溢出从而获得远程root权限。该漏洞影响WFTPD FTP Server 2.34、2.40和3.0版本，CVSS评分10.0（严重级），攻击者无需认证即可远程利用，通过构造特制的嵌套目录路径触发栈缓冲区溢出，最终实现远程代码执行获取服务器最高权限。Texas Imperial Software已发布补丁修复此漏洞。"
published = "1999-10-28T04:00:00.000"
remediation = "升级 WFTPD 至 3.00.00 以上版本，该漏洞已在后续版本修复。如厂商已停止维护，建议迁移至 vsftpd 或 ProFTPD 等持续更新的 FTP 服务器软件，并限制匿名用户写权限、禁用递归目录创建操作作为临时缓解措施。"
score = 10
severity = "CRITICAL"
sources = ["exploitdb"]
title = "WFTPD FTP Server 远程缓冲区溢出漏洞"
updated = "2026-06-16T21:49:23.500"

