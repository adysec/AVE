[basic]
description = "changedetection.io 是一款开源网页变更检测工具，其 `/static/<group>/<filename>` 路由存在路径遍历漏洞。攻击者无需身份认证即可将 `group` 参数设置为 `..`，导致 `send_from_directory` 函数将基目录上移至 `/app/changedetectionio`，从而读取应用源码文件（如 `flask_app.py`）。该漏洞影响 0.53.2 之前的所有版本，CVSS 评分 5.3，危害等级中危，可能导致敏感信息泄露。厂商已在 0.53.2 版本中修复此问题。"
published = "2026-02-19T15:16:11.947"
remediation = "升级至 changedetection.io 0.53.2 及以上版本，该版本修复了 `/static/<group>/<filename>` 路由的路径遍历漏洞。如无法立即升级，可在反向代理层面（如 Nginx）添加规则，过滤含 `..` 的静态路径请求作为临时缓解措施。"
score = 5.3
severity = "MEDIUM"
sources = ["ghsa"]
title = "changedetection.io 未授权静态路径遍历漏洞"
updated = "2026-06-17T10:24:47.783"

