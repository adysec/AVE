[basic]
description = "mtr（My Traceroute）网络诊断工具在尝试降低进程权限时，仅调用 seteuid() 临时切换有效用户 ID 而非使用 setuid() 彻底撤销特权，导致特权无法被真正丢弃。本地攻击者可通过已控制的低权限进程利用该缺陷重新恢复 root 权限，进而完全控制目标系统。该漏洞影响 mtr 0.28/0.41 版本及 Turbolinux 3.5/4.2/4.4/6.0 系列操作系统，CVSS v2 评分 7.2，危害等级高。"
published = "2000-03-03"
remediation = "升级 mtr 至 0.33 或更高版本，该版本使用 setuid() 与 seteuid() 组合正确释放特权，修复了本地权限提升漏洞。如无法立即升级，可临时通过移除 mtr 的 setuid 位（chmod u-s /usr/sbin/mtr）或以普通用户权限运行 mtr 来缓解风险，但会造成部分网络诊断功能受限。受影响的 Turbolinux 3.5 b2/4.2/4.4/6.0 用户应及时联系厂商获取安全补丁。此外建议在 /etc/sudoers 中对 mtr 设置仅允许授权用户通过 sudo 执行。"
score = 7.2
severity = "HIGH"
sources = ["cve"]
title = "Matt Kimball and Roger Wolff mtr 本地权限提升漏洞"
updated = "2026-06-16"

