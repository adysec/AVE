[basic]
description = "Oracle WebServer 2.1 在处理 PL/SQL 存储过程时存在输入验证缺陷，远程攻击者无需身份认证即可向目标服务器发送超长 HTTP GET 请求，触发服务进程崩溃或资源耗尽，导致拒绝服务。该漏洞影响 Oracle HTTP Server 2.1 版本，攻击复杂度低，危害等级中等。"
published = "1997-07-23T04:00:00.000"
remediation = "升级到 Oracle HTTP Server（Oracle Webserver 的后续产品）或迁移至受支持的 Oracle WebLogic Server。如无法升级，在反向代理或 WAF 层面限制 HTTP GET 请求 URI 长度不超过 2048 字节，并过滤包含超长查询参数的请求。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Oracle HTTP Server 2.1 PL/SQL 存储过程远程拒绝服务漏洞"
updated = "2026-06-16T21:49:39.280"

