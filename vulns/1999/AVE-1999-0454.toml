[basic]
description = "MetaInfo MetaWeb Web 服务器存在未经授权的脚本上传与执行漏洞。攻击者可通过 Web 界面直接上传任意脚本文件并远程执行，从而获得服务器的完全控制权限。该漏洞影响 MetaInfo MetaWeb 全版本，攻击条件简单，无需预先认证即可利用，CVSS 评分 10.0，危害等级严重。厂商已停止维护该产品，建议用户迁移至其他安全 Web 服务器方案。"
published = "1999-01-01T05:00:00.000"
remediation = "建议立即停止使用已停止维护的 MetaInfo MetaWeb 服务，迁移至 Apache HTTP Server、Nginx 等仍在积极维护的现代 Web 服务器。如无法立即迁移，须在前端部署反向代理，通过访问控制列表严格限制上传目录的可写和执行权限，同时禁用不必要的 CGI 脚本功能作为临时缓解。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "MetaInfo MetaWeb Web 服务器文件上传与脚本执行漏洞"
updated = "2026-06-16T21:48:02.347"

