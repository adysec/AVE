[basic]
description = "NetXRay 2.6 版本自带的 Web 管理工具（web-admin）在处理 HTTP 请求时存在缓冲区溢出缺陷。该工具在解析用户提交的 HTTP 请求时未对输入长度进行边界校验，当远程攻击者向监听的 Web 管理端口发送超长（异常长度）的 HTTP 请求时，会导致缓冲区被溢出覆写。其直接影响是目标系统服务崩溃，造成拒绝服务（DoS）；由于溢出可覆盖栈上返回地址等内存，攻击者还有可能进一步利用该缺陷执行任意命令，从而获得目标系统的控制权。该漏洞无需身份认证，攻击者只需能通过网络访问到 NetXRay 的 Web 管理接口即可发起攻击，利用方式简单，危害较大。"
published = "1998-02-18T05:00:00.000"
remediation = "建议升级到 NetXRay 3.0 或更高版本以修复该缓冲区溢出漏洞；若无法立即升级，可在边界防火墙或入侵防御系统上限制对 Web 管理端口（默认 TCP 80）的访问，仅允许受信任的管理 IP 连接，并关闭不必要的远程 Web 管理功能作为临时缓解措施。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
