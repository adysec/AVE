[basic]
description = "Xstream API 版本 1.4.6 及之前版本、1.4.10 版本中存在不安全的 XML 反序列化漏洞。如果安全框架未初始化，远程攻击者可通过向目标系统发送特制的 XML 或 JSON 数据流触发该漏洞，在目标服务器上执行任意系统命令。该漏洞影响广泛使用 Xstream 组件的 Java 应用，CVSS 评分 9.8，危害等级严重。建议用户初始化安全框架或升级至修复版本。"
published = "2019-05-15T17:29:00.297"
remediation = "升级到 Xstream 1.4.10 或更高版本，并在初始化时调用 `XStream.setupDefaultSecurity()` 启用安全框架，以限制反序列化类白名单。如无法升级，可在应用层对 XML 输入进行白名单校验，禁止反序列化危险类。"
score = 9.8
severity = "CRITICAL"
sources = ["nuclei"]
title = "Xstream API 不安全的XML反序列化远程代码执行漏洞"
updated = "2026-06-17T00:01:39.747"

