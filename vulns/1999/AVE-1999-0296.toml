remediation = "升级 HP-UX 系统至最新受支持版本并安装 HP 安全补丁 PHCO_16447。如无法升级，在 FTP 服务配置中禁用匿名文件传输功能，限制会议用户仅通过认证方式访问，并在系统层面配置防火墙规则限制非必要 IP 对 FTP 端口（21/TCP）的访问作为临时缓解措施。"
