[basic]
description = 'SSH 1.2.27 服务器存在安全策略绕过漏洞。攻击者在 SSH 连接协商阶段可强制请求使用 "none" 加密算法，即使服务器端策略禁止无加密连接，服务器仍会接受该请求并建立未加密会话。远程攻击者无需任何认证即可利用此漏洞，绕过服务器的安全加密策略，获取明文传输的敏感数据或对通信内容进行中间人攻击。'
published = "1999-12-14T05:00:00.000"
remediation = "升级 OpenSSH 至 2.1 或更高版本，SSH1 协议存在此设计缺陷，建议完全禁用 SSH1 协议并仅使用 SSH2。在 sshd_config 中设置 Protocol 2 并添加 Ciphers aes256-ctr,aes192-ctr,aes128-ctr 限制加密算法。如无法升级，在 sshd_config 中显式设置 Ciphers !none 禁用无加密连接。"
score = 2.1
severity = "LOW"
sources = ["cve"]
title = "OpenSSH 1.2.27 不允许的 none 加密算法绕过漏洞"
updated = "2026-06-16T21:49:30.990"

