[basic]
description = "Windows NT 4.0 在进行无人值守（unattended）安装时，安装配置文件中可能以明文形式包含本地 Administrator 管理员账户的密码等敏感信息。该漏洞影响所有采用无人值守方式部署的 Windows NT 4.0 系统，攻击条件为攻击者能够访问到安装过程中生成的应答文件（如 unattend.txt 等）。利用方式是攻击者读取该安装文件即可获取 Administrator 密码，进而以最高权限登录并完全控制系统，造成严重的权限泄露与安全隐患。"
published = "2000-04-11T04:00:00.000"
remediation = "微软已在 Windows NT 4.0 Service Pack 4 及后续补丁中修复该问题，应立即升级至 SP4 或更高版本；完成无人参与安装后，手动删除分布于磁盘的 Unattend.txt、Winnt.sif 等应答文件，避免其中包含的本地 Administrator 密码等敏感信息泄露；同时在共享与权限配置中禁止对系统分区及 %SystemRoot% 目录的匿名访问，并定期审计已部署镜像中的安装残留文件。"
score = 7.2
severity = "HIGH"
sources = ["epss"]
