[basic]
description = "HP-UX 11.0 的 net.init RC 脚本（S008net.init）在启动网络服务时会以 root 权限向 /tmp/stcp.conf 写入配置数据，但该文件路径为固定的临时目录且未做安全检查。本地攻击者可先创建符号链接，将 /tmp/stcp.conf 指向目标系统文件（如 /etc/passwd 等关键文件），当脚本执行写入操作时，攻击者即可实现任意文件覆盖，进而提升本地权限至 root。该漏洞的攻击前提是拥有本地 shell 访问权限。"
published = "2000-10-20T04:00:00.000"
remediation = "建议升级 HP-UX 11.0 到最新的 Patch 04（针对 CVE-2000-0702 的完整安全修复包），或安装包含 S701543 的 HP-UX 11.0 Security Update Package。通过修改 /etc/init.d/net.init，添加 `O_EXCL` 标志来确保 stcp.conf 文件安全创建，避免临时文件符号链接攻击。如无法立即升级，可临时将 /tmp 目录权限修改为 700，仅 root 用户可访问，并添加 `umask 077` 到登录 shell 中，以防止攻击者创建危害性文件。"
score = 7.2
severity = "HIGH"
sources = ["exploitdb"]
title = "HP HP-UX 11.00 net.init RC 脚本本地文件覆盖漏洞"
updated = "2026-06-16T21:52:18.083"

