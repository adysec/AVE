[basic]
description = "NTP 协议守护进程 ntpd（又称 xntpd/xntp3）4.0.99k 及更早版本中存在缓冲区溢出漏洞。远程攻击者可通过向目标 NTP 服务发送特制的超长 readvar 参数触发该漏洞，导致缓冲区溢出，进而造成服务崩溃（拒绝服务）或在目标系统上以 root 权限执行任意代码。该漏洞影响广泛部署的 NTP 服务，攻击无需身份认证，利用复杂度低，Metasploit 框架中已有公开利用模块，危害严重。"
published = "2001-06-18T04:00:00.000"
remediation = "升级 NTP 守护进程至 4.0.99l 或更高版本，该漏洞在 4.0.99l 中已修复。对于仍运行旧版 NTP 的系统，建议升级至当前稳定版（如 4.2.8p18+），并在防火墙限制对 NTP 服务（默认端口 123/udp）的访问来源，仅允许可信 IP 段连接。"
score = 10
severity = "CRITICAL"
sources = ["redhat"]
title = "NTP ntpd readvar 远程缓冲区溢出漏洞"
updated = "2026-06-16T21:54:15.800"

