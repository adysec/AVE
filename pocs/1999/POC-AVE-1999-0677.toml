[info]
author = "ave"
description = "验证 Alibaba 2.0 Web 服务器 CGI 命令执行漏洞，通过向服务器发送包含管道字符（'|'）的畸形 URL 请求实现，攻击者无需身份验证即可在服务器上执行任意操作。"
id = "POC-AVE-1999-0677"
name = "Alibaba Web Server 2.0 CGI Command Injection"
severity = "critical"
tags = ["ave-1999-0677"]
vuln_id = [
    "CVE-1999-0885",
    "AVE-1999-0677",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/cgi-bin/get32.exe"
protocol = "http"

[poc.requests.headers]
User-Agent = "AVE/1.0"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["Microsoft Windows"]
