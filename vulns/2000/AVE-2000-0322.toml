[basic]
description = "IC Radius 软件包存在缓冲区溢出漏洞，未经身份认证的远程攻击者可通过向目标系统发送包含超长用户名的认证请求触发该漏洞，导致服务崩溃和拒绝服务。该漏洞影响运行受影响版本 IC Radius 软件的系统，攻击者仅需通过网络向 RADIUS 认证端口发送特制请求即可完成利用，造成服务中断。"
published = "2000-04-24"
remediation = "IC Radius 软件包已停止维护，无法通过官方升级修复该漏洞。建议在 RADIUS 服务前端部署入侵检测规则，对超过 64 字节的 User-Name 属性进行拦截丢弃；并将 RADIUS 服务绑定至内网接口，避免暴露在公网。如条件允许，应迁移至仍在维护的 RADIUS 实现（如 FreeRADIUS 或 GNU Radius）。"
score = 5.0
severity = "MEDIUM"
sources = ["cve"]
title = "IC Radius 缓冲区溢出拒绝服务漏洞"
updated = "2026-06-16"

