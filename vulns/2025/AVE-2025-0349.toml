[basic]
description = "Wasmtime 是一个 WebAssembly 运行时，其在 37.0.0 和 37.0.1 版本中存在 C/C++ API 内存泄漏漏洞。由于开发过程中将 `ManuallyRooted<T>` 重构为 `OwnedRooted<T>` 类型时未正确集成到 C/C++ API 中，导致 `externref` 和 `anyref` 类型的宿主内存分配无法在 store 销毁时自动释放。C API 中的 `wasmtime_val_unroot` 函数因拼写错误实际无效，C++ API 缺少析构函数处理，以及宿主函数返回值未被取消根引用，共同导致持续内存泄漏。使用 C/C++ API 处理 `externref` 或 `anyref` 值的应用会累积泄漏宿主内存，长期运行可能导致拒绝服务。该漏洞不影响 Rust crate 及未使用相关类型的嵌入场景。已在 37.0.2 版本修复。"
published = "2025-10-07T19:15:38.780"
remediation = "升级至 Wasmtime 37.0.2 或更高版本，该版本已修复 `wasmtime_val_unroot` 函数未真正取消根对象的缺陷，并为 C++ API 的 `ExternRef`、`AnyRef` 和 `Val` 类型添加了析构函数。如无法立即升级，应避免在 C/C++ API 中使用 `externref` 和 `anyref` 类型，以消除内存泄漏风险。"
score = 1
severity = "LOW"
sources = ["ghsa"]
title = "Bytecode Alliance Wasmtime C/C++ API 内存泄漏漏洞"
updated = "2026-06-17T09:50:45.227"

