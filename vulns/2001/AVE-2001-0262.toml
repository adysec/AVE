[basic]
description = "Faust Informatics Freestyle Chat 服务器 4.1 SR3 之前版本存在目录遍历漏洞，远程攻击者可通过向服务器发送包含特殊构造的路径遍历序列（如 '...' 或 '....' 等变体）的 URL，绕过目录限制，读取服务器上的任意文件。该漏洞利用方式简单，无需身份认证即可通过网络远程触发，可能导致敏感信息泄露。攻击者只需构造特制 HTTP 请求即可实施攻击。"
published = "2001-08-14T04:00:00.000"
remediation = "升级 Faust Informatics Freestyle Chat 服务器至 4.1 SR3 或更高版本，该版本已修复目录遍历漏洞。如无法立即升级，可在 Web 服务器或反向代理层配置 URL 过滤规则，拦截包含 `..`、`...`、`....` 等路径遍历序列的请求，并限制应用程序对文件系统目录的访问权限。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Faust Informatics Freestyle Chat 目录遍历漏洞"
updated = "2026-06-16T21:54:38.287"

