[basic]
description = "Linux 内核 staging 子系统中 pi433 驱动程序存在内存泄漏漏洞。当调用 debugfs_lookup() 函数查找调试文件系统条目时，未正确调用 dput() 释放引用计数，导致内核内存随时间逐渐泄漏。本地攻击者可通过反复触发 debugfs 文件系统操作耗尽系统内存资源，造成拒绝服务。该漏洞影响使用受影响 Linux 内核版本的系统，CVSS 评分 5.5，危害等级中等。内核社区已通过改用 debugfs_lookup_and_remove() 函数修复此问题。"
published = "2025-09-17T15:15:39.523"
remediation = "升级 Linux 内核至 6.6 及以上版本（该漏洞已在 v6.6-rc1 修复），或合入对应补丁 commit `8b9c1b2`（将 `debugfs_lookup()` 替换为 `debugfs_lookup_and_remove()`）。如无法升级内核，可在内核参数中禁用 staging 驱动 pi433（`blacklist pi433`）作为临时缓解措施。"
score = 5.5
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux kernel staging pi433 debugfs 内存泄漏漏洞"
updated = "2026-06-17T06:44:59.227"

