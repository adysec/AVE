[basic]
description = '3Com OfficeConnect DSL Router 812/840 ADSL路由器4.2版本（运行OCR812路由器软件1.1.9及更早版本）的HTTP服务端口存在格式化字符串漏洞。远程未授权攻击者可通过向HTTP端口发送包含大量"%s"格式化字符串的超长字符串，触发格式化字符串漏洞导致路由器拒绝服务。该漏洞影响3Com OfficeConnect 812和840 ADSL路由器产品，CVSS评分5.0（AV:N/AC:L/Au:N/C:N/I:N/A:P），攻击向量为网络、攻击复杂度低、无需认证、仅影响可用性。攻击者只需向目标路由器HTTP端口发送包含大量"%s"格式化说明符的恶意HTTP请求即可触发漏洞导致设备拒绝服务，ExploitDB编号20847提供了公开利用代码。'
published = "2001-10-18T04:00:00.000"
remediation = '建议立即升级 3Com OfficeConnect DSL Router 812/840 的 OCR812 路由器软件至 1.1.10 或更高版本（如已停产无法升级，建议更换设备）。临时缓解措施：在防火墙层面限制 HTTP 管理端口（默认 80 端口）仅允许受信管理 IP 访问，或在边界防火墙拦截包含大量 "%s" 格式化字符串的异常 HTTP 请求。'
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "3Com OfficeConnect DSL 路由器 812/840 HTTP 端口格式化字符串拒绝服务漏洞"
updated = "2026-06-16T21:54:52.200"

