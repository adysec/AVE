[basic]
description = "OpenLDAP 1.2.7 至 1.2.10 版本中存在本地符号链接攻击漏洞。当 OpenLDAP 服务在处理临时文件时，不正确地使用了 `/usr/tmp/` 目录，未对临时文件的创建进行安全性检查。拥有本地系统访问权限的攻击者可通过创建恶意的符号链接，将临时文件重定向到任意系统文件，从而实现对目标文件的非授权修改。该漏洞攻击复杂度低，无需身份认证即可利用，但需要本地用户权限。CVSS 评分 2.1，危害等级低，影响 Linux 平台下运行 OpenLDAP 1.2.x 版本的服务器。"
published = "2000-04-21T04:00:00.000"
remediation = "升级 OpenLDAP 至 1.2.11 或更高版本，该版本已修复 `/usr/tmp/` 目录下的符号链接竞争条件。如无法升级，可将临时目录改为仅 root 可写的安全路径（如 `/var/tmp/openldap`），并确保 slapd 以非 root 用户运行，同时使用 `sticky bit` 保护共享临时目录。"
score = 2.1
severity = "LOW"
sources = ["avd"]
title = "OpenLDAP OpenLDAP 本地符号链接漏洞"
updated = "2026-06-16T21:51:30.277"

