[basic]
description = "Atrium Mercur Mail Server 3.2 存在路径遍历漏洞，本地攻击者通过在请求中注入 `../` 序列可突破目录限制，越权读取其他用户的电子邮件内容，并在服务器上创建任意文件。该漏洞根因在于软件对用户提交的文件路径参数缺乏充分的合法性校验，攻击者无需高权限即可利用此漏洞窃取敏感邮件数据或破坏系统文件，影响服务器数据机密性与完整性。"
published = "2000-04-21T04:00:00.000"
remediation = '升级 Atrium Mercur Mail Server 至 3.2 以上版本以修复路径遍历漏洞；若无法升级，在服务器端严格限制本地用户对邮件存储目录的访问权限，并通过应用程序层对用户输入的文件路径参数进行规范化校验，过滤 ".." 等目录穿越字符。同时建议以最小权限原则运行邮件服务进程，避免其拥有过高文件系统写入权限。'
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "Atrium Mercur Mail Server 目录遍历漏洞"
updated = "2026-06-16T21:51:27.977"

