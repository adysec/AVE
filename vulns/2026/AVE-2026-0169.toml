[basic]
description = "Google Chrome 浏览器蓝牙（Bluetooth）组件存在安全漏洞，由于对蓝牙设备通信过程中的对象生命周期管理不当，可能导致释放后重用（Use-After-Free）问题。攻击者可通过诱导用户访问特制的恶意网页，利用该漏洞在渲染进程环境中实现权限提升，进而绕过安全沙箱限制。该漏洞影响 Google Chrome 稳定版多个历史版本，CVSS 评分高危，攻击复杂度较低且无需额外权限。建议用户升级至官方发布的最新版本以修复此漏洞。"
published = "20260713"
remediation = "建议立即将 Google Chrome 更新至 2026 年 7 月安全更新后的最新稳定版，路径为 chrome://settings/help 自动检查并安装更新。企业用户可通过 Chromium 管理员策略推送更新。如暂时无法升级，可关闭 chrome://flags/#enable-web-bluetooth 中的 Web Bluetooth 功能，或在系统层面禁用蓝牙适配器作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "Google Chrome Bluetooth 组件权限提升漏洞"
updated = "20260713"

