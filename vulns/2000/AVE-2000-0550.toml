[basic]
description = "HP-UX 10.20 的 FTP 服务（ftpd）存在格式化字符串漏洞，远程攻击者无需身份认证即可在 PASS 命令中插入特制的格式化字符串参数，利用该漏洞可导致目标 FTP 服务崩溃（拒绝服务）或执行任意命令。该漏洞影响 HP-UX 10.20 版本，CVSS 评分 10.0，危害等级严重。"
published = "2000-10-20T04:00:00.000"
remediation = "立即安装 HP 官方针对此漏洞的安全补丁（HP-UX 10.20 ftpd 格式串漏洞补丁，可从 HP ITRC 获取）。如无法打补丁，建议禁用 ftpd 服务（`/sbin/init.d/inetd.conf` 中注释 ftp 行并重启 inetd），改用 SFTP/SCP 替代。HP-UX 10.20 已停止维护，应升级到受支持版本。"
score = 10
severity = "CRITICAL"
sources = ["exploitdb"]
title = "HP HP-UX ftpd 格式化字符串远程代码执行漏洞"
updated = "2026-06-16T21:52:17.697"

