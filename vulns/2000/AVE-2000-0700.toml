[basic]
description = "SuSE Linux IMAP 服务器存在安全绕过漏洞，远程攻击者无需身份认证即可绕过 IMAP 认证机制，获取服务器未授权访问权限。该漏洞影响早期 SuSE Linux 发行版中集成的 IMAP 服务组件，攻击者可通过构造特制的 IMAP 协议请求触发该漏洞，进而实现权限提升、邮件数据窃取或进一步渗透内网。CVSS 评分 10.0，危害等级严重。"
published = "2000-03-15T05:00:00.000"
remediation = "SuSE Linux 6.x/7.x 系列的 IMAP 服务器 (imapd) 已停止安全支持，建议立即升级到受支持的 SUSE Linux Enterprise Server 15+ 或 openSUSE Leap 15+ 发行版，并改用 Dovecot 或 Cyrus IMAP 替代存在安全风险的旧版 uw-imapd。如无法升级发行版，应在防火墙上限制对 143/tcp (IMAP) 和 993/tcp (IMAPS) 端口的访问来源，仅允许可信 IP 连接。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "SuSE Linux IMAP Server 认证绕过漏洞"
updated = "2026-06-16T21:51:17.033"

