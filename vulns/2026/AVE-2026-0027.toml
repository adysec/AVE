[basic]
description = '用友NC（Yonyou NC）企业资源管理系统中存在安全漏洞，原始报告未明确漏洞类型（标注为"未知"）。攻击者可能通过构造特制请求利用该漏洞，对系统的保密性、完整性和可用性构成威胁，可能导致未授权访问、敏感信息泄露或业务异常。用友NC广泛应用于大中型企业的财务核算、供应链管理及人力资源等核心业务领域，建议用户关注用友官方安全公告，及时评估并采取修复措施。'
published = "08.09"
remediation = "建议立即登录用友官方安全中心（security.yonyou.com）下载并安装NC系统最新安全补丁包，或升级至用友官方推荐的NC最新稳定版本。如无法立即升级，可在WAF或应用防火墙层面配置访问控制规则，限制对NC系统关键接口的访问来源IP，并关闭非必要的系统功能模块以缩小攻击面。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "用友 NC6563 未知漏洞"
updated = "08.09"

