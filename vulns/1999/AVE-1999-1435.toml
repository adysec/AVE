[basic]
description = "rsh守护程序（rshd）存在用户枚举漏洞，当远程攻击者向目标系统提交有效用户名与无效用户名时，守护程序返回不同的错误提示信息，攻击者可通过对比响应差异枚举系统中存在的有效用户账户，为后续暴力破解或针对性攻击提供便利。该漏洞影响所有运行rshd服务的Unix/Linux系统，CVSS评分5.0，危害等级中危。建议禁用rsh服务并改用SSH协议。"
published = "1997-06-13"
remediation = "禁用 rsh/rlogin 服务，改用 SSH（OpenSSH）替代远程访问。如必须保留 rshd，修改 /etc/hosts.equiv 和 ~/.rhosts 仅允许受信主机，并在 /etc/inetd.conf 中为 rshd 添加 TCP Wrapper 限制，同时配置 syslog 记录所有认证失败日志。"
score = 5.0
severity = "MEDIUM"
sources = ["cve"]
title = "BSD rshd 用户名枚举漏洞"
updated = "2026-06-16"

