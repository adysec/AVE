[basic]
description = "Meeting Maker 对用户密码采用弱加密算法（多表代换密码），远程攻击者可通过网络嗅探捕获加密后的密码数据，并利用该弱加密算法的可预测性快速还原明文密码，从而获取目标系统账户的未授权访问权限。该漏洞影响 Meeting Maker 多个版本，危害等级中等，攻击复杂度较低。"
published = "2000-04-25T04:00:00.000"
remediation = "建议立即将 Meeting Maker 升级至厂商最后发布的安全版本（如已不可获取，应迁移至受支持的现代会议调度系统）。如无法升级或迁移，应在网络层面限制对 Meeting Maker 服务的访问来源（仅允许受信任 IP 段），并通过 VPN/IPsec 加密客户端与服务器之间的所有流量以防止密码嗅探。此外，建议在服务器端启用更安全的认证机制（如集成 LDAP/AD 认证以替代内置密码认证）。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Meeting Maker 密码弱加密漏洞"
updated = "2026-06-16T21:51:28.997"

