[info]
author = "ave"
description = "检测目标服务器上是否存在 CVSWeb 1.80 中易受攻击的 cvsweb.cgi CGI 脚本。该脚本因 Perl open 函数对用户输入过滤不严，具有 CVS 仓库写入权限的攻击者可通过包含 shell 元字符的特制请求执行任意系统命令。"
id = "POC-AVE-2000-0524"
name = "CVSWeb 1.80 cvsweb.cgi 远程命令执行漏洞 PoC"
severity = "high"
tags = ["ave-2000-0524"]
vuln_id = [
    "CVE-2000-0670",
    "AVE-2000-0524",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/cgi-bin/cvsweb.cgi"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["cvsweb"]
