[basic]
description = "FreeBSD 3.5.1/4.2 系统中的 ja-elvis 和 ko-helvis 端口软件包存在缓冲区溢出漏洞，本地攻击者可通过向 elvrec 程序发送超长数据触发该漏洞，成功利用后可获取 root 权限。该漏洞影响 FreeBSD 3.5.1 及 4.2 版本，CVSS 评分 7.2，危害等级高危。"
published = "2001-06-02T04:00:00.000"
remediation = "建议立即移除或升级受影响系统上的 ja-elvis/ko-helvis 端口软件包：执行 `pkg_delete ja-elvis` 或 `pkg_delete ko-helvis` 删除；若需继续使用 elvis 编辑器，应通过 ports tree 更新至最新版本（`cd /usr/ports/editors/elvis && make install clean`），或从厂商获取打了补丁的版本。作为临时缓解措施，可通过 `chmod 4555` 移除 elvrec 的 setuid 位以阻止提权利用（`chmod 755 /usr/local/bin/elvrec`），并限制非信任用户本地登录。"
score = 7.2
severity = "HIGH"
sources = ["exploitdb"]
title = "FreeBSD ja-elvis/ko-helvis 缓冲区溢出本地权限提升漏洞"
updated = "2026-06-16T21:53:54.440"

