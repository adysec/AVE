[basic]
description = "SeaCMS 海洋影视管理系统的 /js/player/dmplayer/dmku/index.php 接口在处理 ac=edit 参数时，对 POST 参数 cid 缺乏有效过滤，导致存在基于时间的盲注 SQL 注入漏洞。攻击者可构造恶意 payload（如 sleep(6) 延时注入）延迟数据库响应，从而推断数据库结构并窃取敏感数据。该漏洞影响 SeaCMS 相关版本，无需身份认证即可远程利用，CVSS 评分较高，建议尽快升级至修复版本或对输入参数实施严格的预编译语句防护。"
published = "0826"
remediation = "建议立即升级 SeaCMS 海洋影视管理系统至最新版本（v13.2 或更高版本），官方已在最新版修复该 SQL 注入漏洞。如暂时无法升级，可临时通过 WAF 配置拦截含 sleep()/benchmark() 等延迟函数的 POST 请求，或在 Web 应用防火墙层面拦截含 cid=select/sleep/union 等 SQL 关键字的恶意载荷。建议同时限制数据库账号权限，禁用数据库管理员权限连接 Web 应用，最小化注入危害。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "SeaCMS 海洋影视管理系统 SQL注入漏洞"
updated = "0826"

