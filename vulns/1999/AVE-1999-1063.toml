[basic]
description = "Red Hat Linux 6.1及更早版本中rlogin服务的PAM配置文件存在规则顺序缺陷，限制性较弱的规则被置于限制性较强的规则之前，导致即使管理员通过/etc/nologin文件明确禁用了rlogin服务，攻击者仍可利用该配置缺陷通过rlogin协议远程访问目标主机，造成安全绕过。该漏洞影响Red Hat Linux 6.1及更早版本，CVSS评分7.5，危害等级高。"
published = "1999-10-07T04:00:00.000"
remediation = "升级 Red Hat Linux 至 6.2 或更高版本。如无法升级，编辑 /etc/pam.d/rlogin 配置文件，将 pam_nologin.so 规则移至 pam_rhosts_auth.so 等宽松规则之前，确保先检查 /etc/nologin 文件。同时限制 /etc/hosts.equiv 和 .rhosts 文件的使用范围。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "Red Hat Linux rlogin PAM 配置认证绕过漏洞"
updated = "2026-06-16T21:50:14.690"

