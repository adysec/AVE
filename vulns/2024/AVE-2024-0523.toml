[basic]
description = "GRUB2 的 HFS+ 文件系统驱动在处理挂载失败时未正确设置 ERRNO 值，导致引用计数（refcount）被重复递减两次，进而触发空指针访问。本地攻击者需具备高权限，通过挂载特制的恶意 HFS+ 文件系统即可触发此漏洞，造成系统崩溃或拒绝服务。该漏洞影响使用 GRUB2 引导程序的各类 Linux 发行版，CVSS 评分 4.4，危害等级中等。"
published = "2025-02-18T20:15:19.560"
remediation = "升级 GRUB2 至修复版本：Debian Bullseye 升级至 2.06-3~deb11u7，Bookworm 升级至 2.06-13+deb12u2，Trixie 升级至 2.12-9+deb13u2，Sid 升级至 2.14-3；RHEL/AlmaLinux 系列安装 ALAS2023-2025-937 安全更新。如无法立即升级，可在 grub.cfg 中禁用 HFS+ 文件系统支持（不加载 hfsplus 模块）作为临时缓解。"
score = 4.4
severity = "MEDIUM"
sources = ["msrc"]
title = "GNU GRUB2 HFS+ 文件系统驱动空指针解引用漏洞"
updated = "2026-06-29T23:16:41.793"

