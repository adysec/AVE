[basic]
description = "ISC BIND 4 和 BIND 8 的 DNS 服务器软件存在信息泄漏漏洞。远程攻击者无需身份认证即可向目标 BIND 服务器发送特制 DNS 查询请求，利用该漏洞可读取系统环境变量等敏感信息，导致机密数据泄露。攻击条件低，仅需网络可达即可触发。该漏洞影响 BIND 4.x 及 BIND 8.x 系列版本，CVSS 评分 5.0，危害等级中危。厂商已发布安全更新修复此漏洞，建议升级至 BIND 9 或更高版本。"
published = "2001-02-12T05:00:00.000"
remediation = "升级 BIND 4 至 4.9.7 及以上版本，或 BIND 8 至 8.2.3 及以上版本。Debian 用户应安装 DSA-026 提供的更新包；Red Hat 用户安装 RHSA-2001-007 提供的更新。如无法立即升级，可在防火墙限制对 DNS 服务器的非授权访问，并禁用递归查询以降低信息泄露风险。"
score = 5
severity = "MEDIUM"
sources = ["redhat"]
title = "ISC BIND 敏感信息泄露漏洞"
updated = "2026-06-16T21:53:29.280"

