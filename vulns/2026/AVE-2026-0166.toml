[basic]
description = "Google Chrome 资源管理错误漏洞（CNVD-2026-23387）源于浏览器对内存对象生命周期管理不当，在处理恶意构造的 HTML 页面时存在 Use-After-Free 缺陷。远程攻击者可通过社会工程学方式诱导用户访问特制网页触发此漏洞，成功利用可能导致远程代码执行或浏览器崩溃。该漏洞影响 Google Chrome 及基于 Chromium 内核的浏览器。"
published = "20260713"
remediation = "立即升级 Google Chrome 至 2026 年 7 月发布的最新稳定版（Chrome 128 及以上），可通过设置 → 关于 Chrome → 自动检查更新完成升级。如无法立即更新，可在浏览器设置中启用安全浏览增强保护，并关闭自动填充和开发者模式作为临时缓解措施。"
score = 5
