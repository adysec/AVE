[basic]
description = "绿盟SAS堡垒机local_user.php文件存在认证绕过漏洞，未经身份验证的远程攻击者可通过向该页面发送特制请求绕过登录认证机制，实现任意用户登录并获取系统管理权限。该漏洞影响绿盟SAS堡垒机相关版本，危害严重，建议用户及时升级修复。"
published = "08.11"
remediation = "立即升级绿盟 SAS 堡垒机至厂商发布的最新安全版本（SAS-H 系列建议升级至 V6.0.1.05 及以上版本以修复 local_user.php 认证绕过漏洞）。如无法立即升级，可在 WAF/IPS 侧配置规则封禁对 /api/virtual/home/status 及 local_user.php 路径的路径遍历攻击请求（如过滤 cat=../ 等参数），并在网络层面限制堡垒机管理后台的访问来源 IP，仅允许运维管理网段访问。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "绿盟 SAS堡垒机 local_user.php 任意用户登录漏洞"
updated = "08.11"

