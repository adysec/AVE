[basic]
description = "Microsoft Office 存在远程代码执行漏洞，该漏洞源于 Office 组件在解析特制文档文件时对内存处理不当。攻击者可构造恶意的 Office 文件并通过钓鱼邮件或网页下载等方式诱使用户打开，在当前用户上下文中执行任意代码。成功利用该漏洞可导致系统被完全控制，影响 Microsoft Office 多个版本。该漏洞需用户交互触发，但利用难度较低，危害严重。"
published = "20260713"
remediation = "立即安装 Microsoft 2026 年最新 Office 安全更新，可通过 Windows Update 或 Microsoft 更新目录获取。启用 Office 受保护视图（文件 → 选项 → 信任中心 → 受保护视图，勾选三项），设置文件打开时启用受保护视图。在组策略中禁用 Office 文件中 ActiveX 控件和宏的执行（用户配置 → 管理模板 → Microsoft Office → 安全设置 → 禁用所有宏且不通知）。教育用户不要打开来自不可信来源的 Office 文档附件。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "Microsoft Office 远程代码执行漏洞"
updated = "20260713"

