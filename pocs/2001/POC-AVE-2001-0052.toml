[info]
author = "AVE"
description = "检测目标 Tinyproxy HTTP 代理服务的堆缓冲区溢出漏洞（CVE-2001-0129），通过超长 CONNECT 请求触发 sprintf 堆溢出导致拒绝服务或任意代码执行"
id = "POC-AVE-2001-0052"
name = "CVE-2001-0129 PoC"
severity = "high"
tags = ["cve-2001-0129"]
vuln_id = [
    "CVE-2001-0129",
    "AVE-2001-0052",
]

[poc]
logic = "all"

[[poc.requests]]
method = "CONNECT"
path = "/invalid.host:1"
protocol = "http"

[poc.requests.body]
content = ""
type = "raw"

[poc.requests.headers]
User-Agent = "AVE/1.0"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["Tinyproxy"]
