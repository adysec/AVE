[basic]
description = "Netscape Messaging Server 3.54、3.55 及 3.6 版本存在拒绝服务漏洞，远程攻击者无需身份认证即可通过向 SMTP 服务发送一系列超长 RCPT TO 命令，消耗目标系统大量内存资源，导致服务响应缓慢或完全崩溃。该漏洞利用方式简单，攻击者只需构造恶意 SMTP 会话即可触发，影响所有运行上述版本的邮件服务器。"
published = "1999-10-29T04:00:00.000"
remediation = "Netscape Messaging Server 已停止维护，官方无补丁可用。建议升级至受支持的邮件服务器软件（如 Exchange、Postfix 等）。若无法升级，在 SMTP 网关或防火墙限制单连接 RCPT TO 命令数量及单行长度（如限制 ≤512 字节），并配置入侵检测规则拦截包含超长 RCPT TO 命令的 SMTP 流量。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Netscape Messaging Server 远程拒绝服务漏洞"
updated = "2026-06-16T21:50:38.627"

