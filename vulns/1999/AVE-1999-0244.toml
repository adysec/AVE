[basic]
description = "Netscape Communicator 4.06至4.61版本在处理HTML EMBED标签的pluginspage选项时存在缓冲区溢出漏洞。远程攻击者可构造包含超长pluginspage参数的恶意EMBED标签的HTML页面，诱使用户访问后触发缓冲区溢出，导致任意代码执行或浏览器崩溃。攻击者需诱导用户打开恶意网页，攻击门槛较低，受影响版本广泛。"
published = "1999-09-02T04:00:00.000"
remediation = "建议立即停止使用已停止维护的 Netscape Communicator 系列浏览器，升级至 Mozilla Firefox 或 Chrome 等现代浏览器。该产品已终止支持多年，无法通过补丁修复此漏洞，使用替代浏览器是唯一有效的解决方案。"
score = 5.1
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Netscape Communicator EMBED 缓冲区溢出漏洞"
updated = "2026-06-16T21:48:50.657"

