[basic]
description = "Adobe Reader 和 Acrobat 8.1.1 及之前版本中存在多个缓冲区溢出漏洞，漏洞位于 JavaScript 方法的 Collab.collectEmailInfo() 函数中。远程攻击者可通过向用户发送包含恶意超长 JavaScript 参数的 PDF 文件，诱使用户打开后触发缓冲区溢出，进而导致远程代码执行。该漏洞已有 Metasploit 框架的公开利用模块，被广泛用于定向攻击，危害严重。受影响版本包括 Adobe Reader 和 Acrobat 8.1.1 及更早版本。"
published = "2008-02-12T19:00:00.000"
remediation = "升级 Adobe Reader 和 Acrobat 至 8.1.2 或更高版本（官方安全公告 APSB08-13）。当前已停止维护的老版本建议迁移至 Adobe Acrobat DC 或使用其他受支持的 PDF 阅读器。无法立即升级时，可在浏览器中禁用 Adobe Reader 插件，并配置操作系统策略阻止 PDF 中 JavaScript 执行以降低攻击面。"
score = 7.8
severity = "HIGH"
sources = ["kev"]
title = "Adobe Reader 和 Acrobat Collab.collectEmailInfo() 缓冲区溢出漏洞"
updated = "2026-06-16T22:46:35.347"

