[basic]
description = "FreeBSD 操作系统的 VFS 文件系统缓存（vfs_cache）机制存在资源耗尽缺陷。具有本地账户权限的攻击者可以通过在系统中打开大量文件描述符来消耗内核文件缓存资源和文件表项，导致系统缓存溢出或文件表耗尽，从而使合法用户无法正常创建或访问文件，造成服务拒绝。该漏洞影响 FreeBSD 2.x 及 3.x 早期版本，攻击条件为攻击者已拥有本地 shell 访问权限且系统未施加文件描述符数量限制。"
published = "1999-09-22"
remediation = "将受影响的 FreeBSD 系统升级到 3.3-RELEASE 或更高版本，该版本已修复 vfs_cache 文件描述符资源耗尽缺陷。如暂无法升级，可通过 login.conf 中配置 openfiles 参数限制普通用户可同时打开的文件描述符数量，并收紧本地账户权限，减少非授权用户获取 shell 的机会，以此作为临时缓解措施。"
score = 2.1
severity = "LOW"
sources = [
    "cve",
    "avd",
]
title = "FreeBSD vfs_cache 拒绝服务漏洞"
