[basic]
description = "Microsoft Internet Explorer 8 在处理内存对象时存在释放后重用（Use-After-Free）漏洞，具体位于 CGenericElement 对象的虚函数表（vtable）中。远程攻击者可构造恶意网页，诱使用户通过 IE8 访问，触发已释放内存对象的访问，从而在当前用户权限下执行任意代码。该漏洞在 2013 年 5 月已被野外利用，影响 Windows 平台上的 IE8 浏览器，CVSS 评分 8.8，危害等级高。"
published = "2013-05-05T11:07:00.527"
remediation = '立即安装 Microsoft 安全公告 MS13-038 提供的更新 KB2847204。Windows XP/Vista/7 用户可通过 Windows Update 自动获取更新，或从 Microsoft 下载中心手动下载安装。同时必须安装 MS13-037（Internet Explorer 累积安全更新）以避免兼容性问题。对于无法立即打补丁的系统，可启用 EMET（增强缓解体验工具包）并配置与 IE 联动，或将 Internet 安全区域设置为「高」以阻止 ActiveX 控件和 Active Scripting，或应用 Microsoft Fix it 解决方案 "CVE-2013-1347 MSHTML Shim Workaround" 作为临时缓解措施。'
score = 8.8
severity = "HIGH"
sources = ["kev"]
title = "Microsoft Internet Explorer 8 释放后使用远程代码执行漏洞"
updated = "2026-06-16T23:51:15.717"

