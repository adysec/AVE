[basic]
description = "Blue World 公司开发的 Lasso 应用中的 CGI 程序存在任意文件读取漏洞，该 CGI 程序运行于 WebSTAR 及其他 Web 服务器上时，未对用户提交的文件路径参数进行充分过滤与验证。远程未经认证的攻击者可通过构造包含路径遍历序列的特制 HTTP 请求，读取服务器上任意文件，导致敏感信息泄露。CVSS 评分 5.0，危害等级中等。"
published = "1997-08-19T04:00:00.000"
remediation = "升级 Lasso 至 8.0 及以上版本，该 CGI 接口在后续版本中已重构并修复了路径遍历问题。如无法升级，在 Web 服务器层面限制对 Lasso CGI 脚本的访问权限，仅允许授权 IP 调用，并禁用目录遍历相关的 URL 参数传递功能。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Blue World Lasso CGI 任意文件读取漏洞"
updated = "2026-06-16T21:50:02.273"

