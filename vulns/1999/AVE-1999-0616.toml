[basic]
description = "SCO UnixWare 7.0/7.0.1/7.1 版本中的 Xsco 命令存在缓冲区溢出漏洞，其原理是程序在处理命令行参数时未对超长输入进行边界检查，攻击者通过传入一个超长参数即可覆盖栈内存并破坏程序执行流程。由于 Xsco 通常以特权身份运行，本地攻击者可利用该漏洞执行任意代码或提升权限至 root，从而完全控制受影响的系统。该漏洞需要攻击者具备本地访问权限，CVSS 评分为 7.2，危害等级为高危，影响范围限于上述 SCO UnixWare 版本。"
published = "1999-11-01T05:00:00.000"
remediation = "升级到支持并打了 Xsco 补丁的 SCO UnixWare 版本（7.2 或更高），并安装所有可用安全补丁。如需编译，请启用 GCC 的缓冲区溢出保护（-fstack-protector），最高权限运行 Xsco 命令以限制影响范围。"
score = 7.2
severity = "HIGH"
sources = ["exploitdb"]
title = "SCO UnixWare Xsco 缓冲区溢出漏洞"
updated = "2026-06-16T21:49:08.813"

