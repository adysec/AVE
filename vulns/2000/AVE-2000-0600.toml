[basic]
description = "DNSTools 软件的 CGI 应用程序存在输入验证漏洞，未对用户提交的参数进行充分过滤，远程攻击者可通过向 CGI 脚本传递包含 shell 元字符（如分号、管道符等）的恶意请求，触发系统 shell 执行任意命令。该漏洞影响 DNSTools 1.0.8 及 1.10 版本，攻击者无需认证即可远程利用，CVSS v2.0 评分为 10.0，可完全控制目标服务器，危害严重。"
published = "2000-03-02T05:00:00.000"
remediation = "建议立即升级 DNSTools 至最新版本（若已停止维护则彻底移除 DNSTools CGI 组件），或在 Web 服务器层面对 CGI 脚本的输入参数进行严格过滤，禁止 shell 元字符（如 `;`、`|`、`&`、`` ` `` 等）传入，同时以最小权限运行 Web 服务进程以限制命令执行后的影响范围。"
score = 10
severity = "CRITICAL"
sources = ["exploitdb"]
title = "DNSTools DNSTools 1.0.8/1.10 CGI 输入验证漏洞"
updated = "2026-06-16T21:51:09.670"

