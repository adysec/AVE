[basic]
description = 'Internet Explorer 5.0 及早期版本默认启用了"跨不同域导航子框架"选项，允许网页中的子框架被导航至其他域名。攻击者可利用该特性构造恶意页面，将目标网站嵌入透明框架并在上层覆盖诱导性内容，诱骗用户在不知情的情况下点击框架内元素，从而在目标站点上执行非预期操作（如修改设置、提交表单）。该漏洞影响使用受影响版本 IE 的用户，攻击者需诱导用户访问恶意网页，且目标站点需保持用户登录状态。Microsoft 后续版本已默认禁用该选项以缓解风险。'
published = "1999-11-01T05:00:00.000"
remediation = '将 Internet Explorer 升级至 5.01 Service Pack 1 或更高版本，新版本默认禁用"跨不同域导航子框架"选项；在组策略或 Internet 选项中将安全级别提高至"中"以上，并对不可信站点启用受限站点区域以阻止跨域框架导航。'
score = 2.6
severity = "LOW"
sources = ["avd"]
title = "Microsoft Internet Explorer 跨域框架导航欺骗漏洞"
updated = "2026-06-16T21:49:08.450"

