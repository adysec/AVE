[basic]
description = "MIT Kerberos 4 KDC 组件在处理 AUTH_MSG_KDC_REQUEST 请求时未正确验证空终止符，远程攻击者可通过向目标系统发送特制的畸形请求触发内存错误，导致 KDC 服务崩溃并引发拒绝服务。该漏洞影响 MIT Kerberos 4.0 及 Kerberos 5 1.0/1.1/1.1.1 等多个版本，CVSS 评分 5.0，危害等级中等，攻击者无需身份认证即可利用。"
published = "2000-06-09T04:00:00.000"
remediation = "立即升级 MIT Kerberos 5 至 1.2 及以上版本，或对 krb5-1.0.x 应用 MIT krb4kdc_10x_patch 补丁、对 krb5-1.1.x 应用 krb4kdc_111_patch 补丁；Kerberos 4 用户需升级至 Patch 10 以上并打对应补丁；KTH-krb4 用户升级至 0.10 及以上版本；Red Hat 用户安装 RHSA-2000-031 安全更新。"
score = 5
severity = "MEDIUM"
sources = ["redhat"]
title = "MIT Kerberos KDC 拒绝服务漏洞"
updated = "2026-06-16T21:51:58.560"

