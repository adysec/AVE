[basic]
description = "SGI IRIX 6.2 系统的 eject 命令存在缓冲区溢出漏洞，本地攻击者可通过向该命令提交特制参数触发溢出，从而获得 root 权限。该漏洞危害等级高，攻击者需具备本地系统访问权限，利用难度较低，影响 SGI IRIX 6.2 及之前版本。"
published = "1997-07-16T04:00:00.000"
remediation = "升级 SGI IRIX 至 6.3 及以上版本，或安装 SGI 官方提供的 eject 补丁。若无法升级，建议移除 eject 命令的 setuid root 权限（chmod u-s /usr/sbin/eject），限制本地普通用户以 root 权限执行该程序。"
score = 7.2
severity = "HIGH"
sources = ["exploitdb"]
title = "SGI IRIX eject 命令缓冲区溢出本地权限提升漏洞"
updated = "2026-06-16T21:47:22.983"

