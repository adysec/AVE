[basic]
description = "AnalogX SimpleServer:WWW 1.0.5 存在缓冲区溢出漏洞，远程攻击者可通过向 cgi-bin 目录发送超长的 GET 请求触发该漏洞，导致服务器进程崩溃从而造成拒绝服务。该漏洞无需认证即可利用，影响 AnalogX SimpleServer:WWW 1.0.5 版本，CVSS 评分 7.5，危害等级高。建议限制对 cgi-bin 目录的访问权限以降低风险。"
published = "2000-06-15T04:00:00.000"
remediation = "升级 AnalogX SimpleServer:WWW 到 1.05 以上版本，或更换为其他受支持的 Web 服务器软件。如无法升级，可在防火墙或反向代理层限制传入 GET 请求长度不超过 4096 字节，并过滤对 cgi-bin 目录的异常请求以缓解 DoS 风险。"
score = 7.5
severity = "HIGH"
sources = ["exploitdb"]
title = "AnalogX SimpleServer:WWW 1.0.5 缓冲区溢出拒绝服务漏洞"
updated = "2026-06-16T21:51:48.603"

