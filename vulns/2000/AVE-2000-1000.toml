[basic]
description = "i-drive Filo 软件的 HTTP 代理服务器存在缓冲区溢出漏洞。攻击者无需身份认证，可通过向目标代理服务器发送特制的超长 HTTP GET 请求触发缓冲区溢出，从而在受影响系统上以服务器权限执行任意命令。该漏洞影响 i-drive Filo 软件的 HTTP 代理组件，CVSS 评分 10.0，危害等级为严重。建议受影响用户立即升级或禁用相关服务以消除风险。"
published = "2000-06-07"
remediation = "i-drive 公司已停止运营，Filo 软件已停止维护且无官方安全补丁。建议立即停用该软件并迁移至活跃维护的 HTTP 代理方案（如 Squid、HAProxy 或 Nginx），同时在网络边界实施访问控制，限制对代理服务的访问来源并配置请求长度过滤。"
score = 10.0
severity = "CRITICAL"
sources = ["cve"]
title = "i-drive Filo HTTP代理服务器缓冲区溢出远程代码执行漏洞"
updated = "2026-06-16"

