[basic]
description = "GNU Bash 1.14 的提示符解析功能存在代码注入漏洞（CWE-94）。本地攻击者可通过创建一个与待执行命令同名的目录，当其他用户在该目录下执行命令时，Bash 的提示符解析机制会错误地执行攻击者预设的恶意代码，从而实现权限提升。该漏洞影响 GNU Bash 1.14 及更早版本，攻击者需具备本地访问权限，利用难度较低。"
published = "1999-04-20T04:00:00.000"
remediation = "升级 bash 至 2.0 或更高版本，该漏洞已在 bash 2.0 中修复。如无法升级，避免在共享系统上使用包含不可信路径的 PROMPT_COMMAND 或 PS1 变量，并限制普通用户在共享目录中创建目录的权限。"
score = 4.6
severity = "MEDIUM"
sources = ["exploitdb"]
title = "GNU bash 提示符解析本地代码执行漏洞"
updated = "2026-06-16T21:48:30.617"

