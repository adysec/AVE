[basic]
description = "Windows 2000 的受保护存储（Protected Store）在加密密钥选择机制上存在缺陷，未能自动选用可用的最强加密算法，默认使用 40 位加密而非 56 位 DES 加密，导致敏感数据保护强度不足。本地攻击者可通过物理接触或已获取的低权限账户访问系统，利用该漏洞破解或绕过弱加密保护，窃取受保护存储中的凭据、密钥等敏感信息。该漏洞影响 Microsoft Windows 2000 系统，需本地访问权限方可利用。"
published = "2000-06-01T04:00:00.000"
remediation = '安装 Microsoft 安全公告 MS00-031 提供的更新补丁，或升级至 Windows 2000 Service Pack 1 及以上版本。如无法安装补丁，可通过注册表将 Protected Store 加密算法强制设为 56 位 DES：在 HKEY_LOCAL_MACHINE\SOFTWARE\Microsoft\Protected Storage System Provider 下创建 DWORD 值 Use56BitEncryption 并设为 1。'
score = 3.6
severity = "LOW"
sources = ["epss"]
title = "Microsoft Windows 2000 Protected Store 弱加密漏洞"
updated = "2026-06-16T21:51:50.390"

