[basic]
description = "Trend Micro OfficeScan Corporate Edition 3.0/3.5/3.11/3.13 版本的客户端存在拒绝服务漏洞，远程攻击者无需认证即可向目标系统的 12345 端口建立 5 个 HTTP 连接，导致 CPU 利用率升至 100%，造成服务不可用。"
published = "2000-02-28"
remediation = "Trend Micro 已发布针对 OfficeScan 3.5 的补丁程序（ofce_patch_35.htm），建议升级至修复版本。若无法升级，应在网络边界防火墙中限制端口 12345 仅允许受信 IP 访问，或禁用 OfficeScan 客户端的远程管理监听功能，防止外部攻击者利用此漏洞耗尽 CPU 资源。"
score = 5.0
severity = "MEDIUM"
sources = ["cve"]
title = "Trend Micro OfficeScan 拒绝服务漏洞"
updated = "2026-06-16"

