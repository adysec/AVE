[basic]
description = "浪潮GS企业管理软件的BizIntegrationWebService接口存在.NET反序列化远程代码执行漏洞。攻击者无需身份认证即可通过SOAP协议向目标系统的/cwbase/gsp/webservice/bizintegrationwebservice/bizintegrationwebservice.asmx端点发送特制的XML序列化数据包，触发服务端反序列化机制，从而在目标服务器上执行任意系统命令。该漏洞可导致服务器被完全控制、数据泄露或内网横向移动，危害严重。受影响版本包括浪潮GS企业管理软件多个版本，建议用户尽快升级至安全版本或限制相关接口的访问权限。"
published = "0731"
remediation = "建议升级浪潮GS企业管理软件至最新安全版本，或联系浪潮获取针对 .NET 反序列化漏洞的安全补丁。临时缓解措施：在 IIS 层面限制 /cwbase/gsp/webservice/bizintegrationwebservice/ 路径的访问权限，仅允许可信 IP 调用该 WebService，并禁用不必要的 SOAP 接口。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "浪潮 GS企业管理软件 .NET反序列化远程代码执行漏洞"
updated = "0731"

