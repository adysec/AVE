[basic]
description = "Sojourn 搜索引擎 2.0 版本存在路径遍历漏洞。远程攻击者无需身份认证即可通过向搜索功能提交包含 `../` 序列的特制请求，突破目录限制读取服务器上的任意文件，如配置文件、密码文件等敏感信息。该漏洞源于程序未对用户输入的路径参数进行充分过滤，CVSS 评分 5.0，危害等级中危。"
published = "2000-03-14T05:00:00.000"
remediation = "该漏洞年代久远，Sojourn 2.0 搜索引擎已停止维护，无官方补丁。建议立即停止使用该产品，迁移至其他受支持的搜索引擎方案；如无法替换，需在 Web 服务器层面配置 URL 重写规则，拦截包含 ../ 的路径遍历请求作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Generation Terrorists Designs & Concepts Sojourn 2.0 目录遍历漏洞"
updated = "2026-06-16T21:51:10.033"

