[basic]
description = "百易云资管系统 `/adminx/imaRead.make.php` 接口存在 SQL 注入漏洞，攻击者通过 POST 请求向 `feeItem[]` 参数传入恶意构造的 payload（如利用 `updatexml` 报错注入函数），可获取数据库敏感信息。攻击者无需身份认证即可利用该漏洞，直接威胁系统数据安全。该漏洞影响百易云资管系统未修复版本，危害较大。"
published = "0707"
remediation = "立即联系百易云官方获取最新安全补丁，升级至修复SQL注入漏洞的最新版本。如无法立即升级，在Web应用防火墙(WAF)中添加规则拦截`/adminx/imaRead.make.php`路径下对`feeItem[]`参数的异常请求，并对所有用户输入实施严格的参数化查询和输入过滤。"
