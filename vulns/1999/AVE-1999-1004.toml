[basic]
description = "Netscape Navigator/Communicator 4.7 for Windows 95/98 版本存在缓冲区溢出漏洞。远程攻击者可构造包含超长参数的恶意 URL，在引用 .asp、.cgi、.html 或 .pl 文件的地址中，于 ? 字符之后附加过长的参数字符串，触发浏览器内存缓冲区溢出。该漏洞可导致程序崩溃引发拒绝服务，攻击条件为诱使受害者访问恶意 URL，严重时甚至可能允许攻击者在目标主机上执行任意命令。"
published = "1999-11-24"
remediation = "升级到不受影响的 Netscape 更高版本（4.7 之后的修复版本），或改用 Firefox、Chrome、Edge 等仍在维护的现代浏览器。避免点击来源不明或包含异常超长参数的 URL 链接，可在网关或代理层过滤含超长查询参数的请求以缓解攻击。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "Netscape Navigator/Communicator 缓冲区溢出远程代码执行漏洞"
updated = "2026-06-16"

