[basic]
description = "Rejetto HTTP File Server（HFS）2.3x 版本至 2.3c 之前版本的 parserLib.pas 文件中 findMacroMarker 函数存在远程代码执行漏洞。攻击者通过在搜索请求中插入 %00 空字节序列，可绕过宏解析器的安全检查，导致服务器执行任意恶意程序。该漏洞无需身份认证，攻击复杂度低，可远程利用。成功利用后攻击者可完全控制目标服务器，窃取敏感数据或植入后门。影响所有 Rejetto HFS 2.3x 系列版本，Metasploit 框架及多个公开 PoC 已发布，实际环境中已被广泛利用。"
published = "2014-10-07T10:55:04.493"
remediation = "立即升级 Rejetto HFS 至 2.3c 或更高版本，该版本修复了 parserLib.pas 中 %00 空字节序列导致的远程代码执行漏洞。如无法升级，应立即将 HFS 服务从公网断开，仅允许可信内网 IP 访问，并在 Web 应用防火墙上配置规则拦截包含 %00 的请求路径，同时禁用搜索功能作为临时缓解措施。"
score = 9.8
severity = "CRITICAL"
sources = ["nuclei"]
title = "Rejetto HTTP File Server 远程代码执行漏洞"
updated = "2026-06-17T00:12:50.983"

