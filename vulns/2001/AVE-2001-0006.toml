[basic]
description = "Lotus Domino Server 5.0.x 版本 Web 服务器存在目录遍历漏洞。远程攻击者无需认证即可通过向目标服务器发送包含 `..` 序列的特制 HTTP 请求，突破路径限制，读取服务器上任意文件，导致敏感信息泄露（如配置文件、密码文件等）。该漏洞影响 Domino Server 5.0.2、5.0.3 及 5.0.5 版本，CVSS 评分 5.0，危害等级中等。攻击复杂度低，无需用户交互，是典型的 Web 路径遍历漏洞。"
published = "2001-02-12"
remediation = "升级 Lotus Domino Server 至 5.0.6 或更高版本，该版本已修复目录遍历漏洞。如无法升级，在 Web 服务器配置中禁用对 ../ 路径序列的解析，并限制 Web 服务进程对文件系统的访问权限。"
score = 5.0
severity = "MEDIUM"
sources = ["cve"]
title = "Lotus Domino Server 目录遍历漏洞"
updated = "2026-06-16"

