[basic]
description = "sgml-tools（又称 sgmltools）1.0.9-15 之前版本在处理文档时创建临时文件使用了不安全的权限设置，导致本地攻击者可利用该漏洞读取正在被 sgml-tools 处理的文件内容，造成敏感信息泄露。攻击者无需特殊权限，只需在系统本地能够访问临时目录即可实施攻击。该漏洞影响 Linux 等 Unix 类系统上使用 sgml-tools 的所有版本，危害等级低，CVSS 评分 2.1。"
published = "2001-06-27T04:00:00.000"
remediation = "升级 sgml-tools 至 1.0.9-15 或更高版本。Debian 用户可通过 apt-get update && apt-get upgrade sgml-tools 命令更新。该版本修复了临时文件权限不安全的问题，确保处理中的文件不会被其他用户读取。如无法立即升级，可限制本地非信任用户登录系统作为临时缓解措施。"
score = 2.1
severity = "LOW"
sources = ["redhat"]
title = "sgml-tools 临时文件权限不当致信息泄露漏洞"
updated = "2026-06-16T21:54:16.120"

