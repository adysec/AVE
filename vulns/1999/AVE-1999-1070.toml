[basic]
description = "Nosque MsgCore 2.14 以明文形式存储密码：管理员密码存储在注册表 AdmPasswd 键中，用户密码存储在 Userbase.dbf 数据文件中。本地攻击者可读取这些明文凭据，进而获取系统未授权访问权限或提升权限。"
published = "1999-09-07"
remediation = "升级 MsgCore 到已修复此问题的版本；限制本地用户对注册表 AdmPasswd 键及 Userbase.dbf 文件的访问权限；对存储的密码进行加密处理以防明文泄露。"
score = 4.6
severity = "MEDIUM"
sources = [
