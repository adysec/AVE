[basic]
description = "SGI IRIX 操作系统的 /bin/login 程序存在本地缓冲区溢出漏洞。当 LOCKOUT 参数设置为非零值时，程序在处理登录请求时未对输入数据进行充分边界检查，导致栈缓冲区溢出。本地攻击者可利用该漏洞导致系统文件被破坏或创建恶意文件，进而实现权限提升，获取 root 权限。该漏洞影响 SGI IRIX 6.4 及更早版本，需要本地访问权限，攻击复杂度较低。"
published = "1997-05-26T04:00:00.000"
remediation = "升级到 SGI IRIX 6.5 或应用厂商提供的 /bin/login 补丁程序。如无法升级，应限制本地用户对系统的交互式登录访问权限，并监控异常的文件创建行为以降低利用风险。"
score = 8.4
severity = "HIGH"
sources = ["epss"]
title = "SGI IRIX /bin/login 本地缓冲区溢出漏洞"
updated = "2026-06-16T21:47:25.110"

