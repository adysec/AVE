[basic]
description = "Windows NT 4.0 系统对可执行文件映像头的验证存在输入验证不足漏洞（CWE-20）。本地攻击者可通过执行特制的恶意程序，利用畸形的文件映像头触发系统异常，导致目标系统拒绝服务。该漏洞影响 Windows NT 4.0 版本，攻击者需具备本地执行权限，无法远程利用，但成功利用后可使系统崩溃或服务不可用。"
published = "1999-06-30"
remediation = "安装 Windows NT 4.0 Service Pack 5 或单独安装 MS99-023 安全补丁。Windows NT Server 4.0、Windows NT Workstation 4.0 及 Windows NT Server 4.0 Terminal Server Edition 均受此漏洞影响，建议升级至 Service Pack 5 以彻底修复。"
score = 7.8
severity = "HIGH"
sources = [
    "cve",
    "avd",
]
title = "Microsoft Windows NT 4.0 畸形文件映像头拒绝服务漏洞"
updated = "2003-03-10"

