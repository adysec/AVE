[basic]
description = "Sun NetBeans Java IDE 内置的 HTTP 服务器（见于 NetBeans Developer 3.0 Beta 及 Forte Community Edition 1.0 Beta）未能正确依据配置中的 IP 地址访问控制规则限制访问。该内置 Web 服务默认随 IDE 启动并监听本地网络端口，攻击者可构造请求从任意远程 IP 地址绕过既定的 IP 白名单限制，在未获授权的情况下访问本应受限的服务器资源与开发数据。由于配置中的 IP 限制机制失效，任何能够与目标主机建立网络连接的远程攻击者均可远程利用此缺陷，造成信息泄露与未授权访问，CVSS 基础评分 7.5，危害等级为高。"
published = "1999-11-23T05:00:00.000"
remediation = "升级至 NetBeans 正式稳定版而非 Developer 3.0 Beta 或 Forte Community Edition 1.0 Beta，以彻底消除内置 HTTP 服务器的 IP 访问控制缺陷。如短期内无法升级，应在 IDE 项目设置中将 HTTP Server 的 Enable 选项设为 False，或在全局设置中移除 HTTP Server 模块，并建议在防火墙层面阻断 TCP 8082 端口以阻止外部未授权访问。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "Sun NetBeans Java IDE Web 服务器 IP 访问控制绕过漏洞"
updated = "2026-06-16T21:50:37.903"

