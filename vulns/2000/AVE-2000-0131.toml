[basic]
description = "Novell GroupWise Web Access Enhancement Pack 5.5 中的 Java Server 组件存在拒绝服务漏洞。远程攻击者可通过向 servlet 发送超长 URI 请求，导致服务器资源耗尽或服务崩溃，造成拒绝服务。该漏洞影响 Novell GroupWise Enhancement Pack 5.5 版本，攻击者无需身份认证即可利用，危害等级中等。"
published = "2000-02-07T05:00:00.000"
remediation = "该漏洞存在于 Novell GroupWise Web Access Enhancement Pack 5.5 中，该产品已停止维护且不再受支持。建议立即升级到受支持的 GroupWise 版本（如 GroupWise 2014 R2 或更高版本），并在 Web 服务器层面配置请求 URI 长度限制（如 IIS 中设置 MaxUrlLength 和 MaxQueryStringLength），同时部署 WAF 规则拦截超长 URI 请求作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Novell GroupWise Web Access Enhancement Pack 5.5 Java Server 长URL拒绝服务漏洞"
updated = "2026-06-16T21:51:05.753"

