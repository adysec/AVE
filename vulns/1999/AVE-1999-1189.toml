[basic]
description = "iParty Conferencing Server 1.2 及更早版本存在缓冲区溢出漏洞。该服务在默认端口 6004 上监听并接受连接，当远程攻击者与该端口建立连接并持续发送包含重复扩展字符（高位非 ASCII 字符）的特制数据报文时，由于程序未对输入长度进行正确校验与边界保护，导致缓冲区被越界写入并发生溢出，最终引发服务进程崩溃，造成拒绝服务（DoS）。攻击无需身份认证，仅需网络可达目标主机的 6004 端口即可远程触发，影响范围为运行 iParty Conferencing Server 1.2 及之前版本的系统，攻击方式简单且可被持续重放以反复使服务不可用。"
published = "1999-05-08T04:00:00.000"
remediation = "升级 iParty Conferencing Server 至修复该缓冲区溢出漏洞的后续版本（1.3 或更高），并从官网获取补丁安装。如无法立即升级，可在防火墙或边界设备上使用 ACL 阻断外部对默认端口 6004 的入站连接，禁止未授权主机访问该服务，以缓解远程拒绝服务风险。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "iParty Conferencing Server 缓冲区溢出拒绝服务漏洞"
updated = "2026-06-16T21:50:43.843"

