[basic]
description = "typespeed 0.4.2 及更早版本中存在缓冲区溢出漏洞，本地攻击者可通过向程序提交超长输入触发栈溢出，导致权限提升。该漏洞影响 typespeed 全系列低版本，攻击者需拥有本地系统访问权限，利用难度较低，成功利用后可获取与目标进程相同的用户权限，进而执行任意代码或控制系统。建议用户升级至最新版本以修复此漏洞。"
published = "2003-01-02T05:00:00.000"
remediation = "建议立即升级 typespeed 至 0.4.3 或更高版本（已修复该缓冲区溢出），Debian 用户可通过 apt 安装 DSA-217 安全更新包。若无法升级，请卸载 typespeed 或移除其 setuid 权限（chmod u-s /usr/games/typespeed）以阻断本地提权路径。"
score = 4.6
severity = "MEDIUM"
sources = ["osv"]
title = "typespeed 缓冲区溢出本地权限提升漏洞"
updated = "2026-06-16T21:59:14.200"

