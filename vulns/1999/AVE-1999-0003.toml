[basic]
description = "NFS mountd 服务存在缓冲区溢出漏洞，远程攻击者无需身份认证即可向目标系统发送特制请求触发该漏洞，成功利用后可获得 root 权限，完全控制受影响系统。该漏洞主要影响 Linux 系统，包括 RedHat Linux 5.1 和 Caldera OpenLinux Standard 1.2 等版本，CVSS 评分 10.0，危害等级严重。"
published = "1998-10-12T04:00:00.000"
remediation = '建议立即升级到 RedHat Linux 5.2 或更高版本，该版本已修复 NFS mountd 缓冲区溢出漏洞。如无法升级，可在 /etc/hosts.deny 中添加 "rpc.mountd: ALL" 并用 /etc/hosts.allow 仅允许信任主机访问，同时在 iptables 层面限制 TCP/UDP 2049 端口和 rpcbind 端口（111）的入站连接。若无需使用 NFS 服务，建议直接停止 mountd 服务（service nfs stop && chkconfig nfs off）。'
score = 10
severity = "CRITICAL"
sources = ["exploitdb"]
title = "RedHat Linux 和 Caldera OpenLinux NFS mountd 缓冲区溢出漏洞"
updated = "2026-06-16T21:47:18.113"

