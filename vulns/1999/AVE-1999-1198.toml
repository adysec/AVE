[basic]
description = "Red Hat Linux 的 screen 终端复用程序未使用 Unix98 伪终端（ptys），导致其创建的终端会话缺乏必要的权限隔离机制。本地攻击者可通过向其他用户使用的 screen 终端写入数据，实现会话劫持或任意命令注入。该漏洞影响 Red Hat Linux 多个版本，利用前提是攻击者拥有本地系统账户，攻击复杂度低，危害等级为高危。"
published = "2000-01-04T05:00:00.000"
remediation = "升级 Red Hat Linux 至 6.2 及以上版本（默认启用 Unix98 ptys），或单独升级 screen 程序至 3.07.06 及以上版本。如无法升级，在 screen 配置文件中添加 `defunix98 on` 启用 Unix98 pty 支持，并限制本地非信任用户登录系统以降低攻击面。"
score = 10
severity = "CRITICAL"
sources = ["cve"]
title = "Red Hat Linux screen 程序本地终端写入漏洞"
updated = "2026-06-16T21:49:16.680"

