[basic]
description = "StackGuard 1.21 之前版本存在缓冲区溢出安全绕过漏洞。攻击者可通过非线性攻击方式直接修改指向返回地址的指针，而非利用缓冲区溢出覆盖返回地址本身，从而绕过 StackGuard 的 Random 和 Terminator Canary 安全机制。该漏洞影响 StackGuard 1.21 之前所有版本，CVSS 评分 7.5，危害等级高。建议用户升级至 StackGuard 1.21 或更高版本以修复此漏洞。"
published = "1999-11-09T05:00:00.000"
remediation = "立即升级至 StackGuard 1.21 或更高版本，该版本引入 XOR 随机金丝雀机制，将返回地址与随机金丝雀值绑定，使攻击者无法在不破坏金丝雀的情况下直接修改返回地址指针。软件可从 http://immunix.org/downloads.html#sg1.21 获取。同时建议开发者避免在同一函数中同时使用 gets() 类溢出函数和指针间接写入操作。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "StackGuard 缓冲区溢出安全绕过漏洞"
updated = "2026-06-16T21:49:44.603"

