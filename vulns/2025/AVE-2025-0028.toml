[basic]
description = "飞致云 DataEase 是一款开源商业智能与数据可视化工具，其 2.10.10 之前版本存在 JWT 认证绕过漏洞。由于密钥验证机制未能正确生效，攻击者可伪造任意 JWT 令牌绕过身份认证，进而通过 PostgreSQL JDBC 接口实现远程代码执行。该漏洞影响范围广泛，攻击复杂度低，无需用户交互，CVSS 评分 7.7，危害等级高。厂商已在 v2.10.10 版本中修复。"
published = "2025-06-03T21:15:22.410"
remediation = "将 DataEase 升级至 v2.10.10 或更高版本，修复 JWT 认证绕过漏洞。如无法立即升级，可通过防火墙限制 DataEase API 接口访问，并部署 WAF 规则过滤伪造 JWT Token 的恶意请求作为临时缓解措施。"
score = 7.7
severity = "HIGH"
