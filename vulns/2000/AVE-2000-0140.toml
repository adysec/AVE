[id]
ave_id = "AVE-2000-0140"
aliases = ["CVE-2000-0156"]
[basic]
title = "Microsoft Internet Explorer 图片源重定向安全域绕过漏洞"
description = "Internet Explorer 4.x和5.x中存在安全域绕过漏洞，即\"Image Source Redirect\"漏洞。远程攻击者可通过操纵浏览器窗口导航流程，将窗口从攻击者控制的网站域导航至客户端本地文件，在跨域切换的短暂窗口期内读取客户端文件系统中的敏感文件。攻击者需要知道或猜测目标文件的名称和路径，且仅能读取可在浏览器窗口中打开的文件类型（如HTML、文本、图片等）。该漏洞无法用于添加、修改或删除文件。"
severity = "MEDIUM"
score = 5.1
sources = ["cve", "microsoft"]
published = "2000-02-16"
updated = "2024-11-20"
remediation = "安装微软安全公告MS00-009提供的补丁，可通过Windows Update或Microsoft Download Center获取。对于Internet Explorer 4.01 SP1及更早版本，需升级到最新版IE。由于IE已停止支持，建议迁移到Microsoft Edge等现代浏览器以获得持续安全更新。"
[references]
urls = ["https://docs.microsoft.com/en-us/security-updates/securitybulletins/2000/ms00-009", "https://exchange.xforce.ibmcloud.com/vulnerabilities/3996", "http://www.osvdb.org/7827"]
