[basic]
description = "Microsoft IIS 4.0 及 5.0 版本在处理映射到 UNC 共享的虚拟目录时存在源码泄露漏洞。当管理员将虚拟目录映射至远程 UNC 共享路径后，ISAPI 扩展处理逻辑未能正确执行，导致远程攻击者可通过构造特制 HTTP 请求绕过脚本执行权限检查，直接读取 ASP 文件及其他受保护文件的源代码。攻击者无需身份认证即可利用此漏洞获取敏感信息，如数据库连接字符串、应用逻辑代码等，为进一步渗透奠定基础。该漏洞影响 IIS 4.0 及 5.0 版本，CVSS 评分 5.0，危害等级中危。"
published = "2000-03-30T05:00:00.000"
remediation = "建议安装 Microsoft 安全公告 MS00-030 对应补丁（Q262694），或升级至 IIS 6.0 及以上版本。如无法升级，应避免将虚拟目录映射至 UNC 共享路径，改为使用本地目录；同时限制匿名用户对共享目录的访问权限，禁用 ASP 等脚本的 UNC 路径执行权限。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Microsoft IIS 4.0 UNC 映射虚拟主机信息泄露漏洞"
updated = "2026-06-16T21:51:18.773"

