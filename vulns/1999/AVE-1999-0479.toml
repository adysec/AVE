[basic]
description = "Microsoft Windows NT 4.0 WINS 服务在处理 UDP 数据包时存在缺陷，远程攻击者可通过向目标系统的 137 端口（NetBIOS 名称服务）发送大量特制的无效 UDP 报文，导致 WINS 进程异常终止，造成拒绝服务。该漏洞影响 Windows NT 4.0 SP4 之前的所有版本，攻击者无需认证即可远程触发，利用难度较低。"
published = "1998-08-01T04:00:00.000"
remediation = "建议升级到 Microsoft Windows NT 4.0 Service Pack 4 或更高版本以修复 WINS 服务漏洞。如暂时无法升级，可在网络边界防火墙和主机防火墙上过滤入站 UDP 137 端口流量，阻止非信任来源的 WINS 请求作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Microsoft Windows NT 4.0 WINS 拒绝服务漏洞"
updated = "2026-06-16T21:48:04.717"

