[basic]
description = "Sun Solaris 操作系统中 CDE（Common Desktop Environment）的 dtmail 邮件工具存在栈缓冲区溢出漏洞。当用户打开或处理特制邮件时，程序未能正确校验输入长度，导致攻击者可通过构造超长邮件内容覆盖栈上返回地址并执行任意代码。攻击条件为本地用户能够诱导目标用户使用 dtmail 打开恶意邮件，成功利用后可获取目标用户权限。"
published = "1999-12-01"
remediation = "升级到 Sun 发布的 Solaris 补丁集群（如 Solaris 2.6 的 105632 系列补丁），或禁用 CDE dtmail 改用其他邮件客户端，并限制本地用户对邮件工具的执行权限。"
score = 7.2
severity = "HIGH"
sources = ["cve"]
title = "Sun Solaris CDE dtmail 缓冲区溢出漏洞"
updated = "1999-12-01"

