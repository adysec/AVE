[basic]
description = 'NCSA Telnet 软件包在 Macintosh 和 PC 平台上的默认配置存在安全缺陷，即使配置文件中未包含 "ftp=yes" 选项，FTP 服务仍被默认启用。远程攻击者无需任何认证即可利用此配置漏洞，通过 FTP 协议对目标系统上的任意文件进行读取和修改操作，可能导致敏感信息泄露或系统文件被篡改。该漏洞影响 NCSA Telnet 软件包的 Macintosh 和 PC 版本，CVSS 评分 7.5，危害等级高。'
published = "1991-09-10T04:00:00.000"
remediation = "在 NCSA Telnet 配置文件中显式添加 `ftp=no` 行以禁用 FTP 功能；或直接删除或重命名 FTP 相关可执行文件。建议停止使用已停止维护的 NCSA Telnet，迁移至 OpenSSH 等支持加密的现代远程访问方案。如无法立即替换，在防火墙层面限制对 FTP 端口（21/TCP）的访问作为临时缓解措施。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "NCSA Telnet 默认配置远程文件读写漏洞"
updated = "2026-06-16T21:49:42.053"

