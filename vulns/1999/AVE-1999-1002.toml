[basic]
description = "nph-publish 1.2 之前版本存在目录遍历漏洞，远程攻击者在文件上传操作的路径名中使用 `..`（点点）目录遍历序列，可绕过路径限制以 Web 服务器权限覆盖任意文件。攻击者可通过上传恶意脚本覆盖关键文件导致远程代码执行或服务中断，无需身份认证即可远程利用。"
published = "1999-12-31T05:00:00.000"
remediation = "立即升级 nph-publish 至 1.2 或更高版本（下载地址：http://stein.cshl.org/~lstein/server_publish/）。如无法升级，直接删除或移除 nph-publish 脚本的执行权限（chmod -x nph-publish）。同时确保 Web 服务器以最低权限用户（非 root）运行，并将上传目标目录权限设置为非全局可写，避免攻击者利用目录遍历覆盖任意文件。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Nph-publish 目录遍历任意文件写入漏洞"
updated = "2026-06-16T21:49:52.990"

