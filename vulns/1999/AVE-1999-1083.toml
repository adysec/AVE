[basic]
description = "Internet Explorer 5.0 在访问未使用标准缓存控制机制的网站时，无法正确清理已存储的用户名/密码缓存信息，导致同一系统上的其他用户能够通过共享缓存区域访问先前用户登录过的受限网站。该漏洞影响 Windows 平台上使用 IE 5.0 的用户，CVSS 评分 4.6，危害等级中危。攻击者需具备本地系统访问权限，利用该信息泄露漏洞可获取受保护站点中的敏感数据。"
published = "1999-05-06T04:00:00.000"
remediation = "建议立即升级 Internet Explorer 至 6.0 或更高版本（IE 5.0 中该漏洞未修复）。在 IE「Internet 选项」→「内容」→「自动完成」中取消勾选「表单上的用户名和密码」，并勾选「不将加密的页面存盘」。通过组策略 (gpedit.msc) 启用「禁用密码缓存」(DisablePasswordCaching) 策略，防止密码被持久化存储。使用共享计算机的用户应在退出 IE 后手动清除历史记录和表单数据。该漏洞本质是缓存管理缺陷，升级浏览器是根治方案。"
score = 4.6
severity = "MEDIUM"
sources = ["epss"]
title = "Microsoft Internet Explorer 浏览器缓存凭据未重置漏洞"
updated = "2026-06-16T21:50:17.353"

