[basic]
description = "MailEnable 在 v10 之前的版本中存在反射型跨站脚本（XSS）漏洞，攻击者可通过向 /Mondo/lang/sys/Failure.aspx 组件的 state 参数中注入恶意 JavaScript 代码触发该漏洞。当用户访问攻击者构造的恶意链接时，所注入的脚本将在用户浏览器上下文中执行，导致攻击者能够窃取会话 Cookie、劫持用户账户、篡改页面内容或执行其他恶意操作。该漏洞无需身份认证即可远程利用，影响范围为所有 MailEnable 10 以下版本，CVSS 评分 9.8，危害等级严重。"
published = "2025-06-03T16:15:25.210"
remediation = "立即升级 MailEnable 至 v10.00 或更高版本，该版本已修复 failure.aspx 组件中未正确转义用户输入的问题。如无法立即升级，可在 Web 服务器（IIS）层面为 /Mondo/lang/sys/Failure.aspx 路径添加 URL 参数过滤规则，对 state 等参数中的特殊字符（如引号、尖括号）进行编码或拦截，作为临时缓解措施。"
score = 9.8
severity = "CRITICAL"
sources = ["hwpoc"]
