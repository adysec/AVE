[basic]
description = 'Sendmail 8.12.6、8.11.6-15 及 1998 年 5 月 19 日之后的部分 8.11 版本中，Sendmail Consortium 的受限 Shell（SMRSH）存在访问验证漏洞。攻击者可通过在命令中插入 "||" 双管道序列或 "/" 字符绕过 smrsh 的指令限制，执行未授权的额外命令。该漏洞需要本地访问权限，利用难度较低，成功利用后可导致机密性、完整性和可用性部分受损，CVSS 评分 4.6，危害等级中危。'
published = "2002-10-11T04:00:00.000"
remediation = "升级 Sendmail 至 8.12.7 或更高版本，该漏洞已在后续版本中修复。如无法立即升级，可禁用 smrsh（Sendmail Restricted Shell）功能，改用其他邮件过滤机制（如 milter）替代；或在 smrsh 配置中移除对危险命令（如 sh、perl 等）的授权，限制可执行命令列表。对于 Debian/Red Hat 等发行版，安装对应安全更新（如 Debian DSA-183、Red Hat RHSA-2002:217）。"
score = 4.6
severity = "MEDIUM"
sources = ["osv"]
title = "Sendmail SMRSH 双管道符绕过访问验证漏洞"
updated = "2026-06-16T21:58:51.747"

