[basic]
description = "Cat Soft Serv-U FTP Server 2.5.x 版本存在暴力破解绕过漏洞。该软件的反暴力破解机制存在设计缺陷，远程攻击者可先以合法用户身份（包括匿名用户）登录服务器，随后对其它用户账号实施密码暴力破解，而不会触发反暴力破解限制。此漏洞允许攻击者绕过账号锁定等保护措施，通过持续字典攻击获取其它用户的登录凭据，进而导致服务器被非授权访问，影响系统安全性。CVSS 评分 7.5，危害等级高。"
published = "2000-12-11T05:00:00.000"
remediation = "升级 Serv-U FTP Server 至 3.0 及以上版本，该版本修复了已登录用户可绕过反暴力破解机制的缺陷。若无法升级，建议禁用匿名登录（将匿名用户设置为不允许访问），并配置登录失败锁定策略（如 5 次失败后临时封禁 IP 15 分钟）以增强爆破防护。"
score = 7.5
severity = "HIGH"
sources = ["exploitdb"]
title = "Cat Soft Serv-U FTP Server 暴力破解漏洞"
updated = "2026-06-16T21:53:00.790"

