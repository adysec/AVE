[basic]
description = "GNU Bash 通过 4.3 版本存在命令注入漏洞，由于 CVE-2014-6271 修复不完整，Bash 在处理环境变量值时仍会解析函数定义后的尾部字符串，导致未经身份认证的远程攻击者可通过构造包含恶意函数定义和命令的环境变量，在目标系统上执行任意系统命令。该漏洞影响使用 Bash 的 SSH 服务（OpenSSH ForceCommand 特性绕过）、Apache HTTP Server 的 CGI 模块、DHCP 客户端等场景，攻击者可通过 HTTP 请求头、SSH 连接等方式注入恶意环境变量，实现未授权远程代码执行、文件写入等攻击，CVSS 评分 9.8，危害等级严重。"
published = "2014-09-25T01:55:04.367"
remediation = """立即通过系统包管理器升级 GNU Bash：Ubuntu 14.04 升级至 bash 4.3-7ubuntu1.2 及以上（12.04 至 4.2-2ubuntu2.3、10.04 至 4.1-2ubuntu3.2），Red Hat/CentOS 安装 RHSA-2014-1306 及后续 bash 安全更新，Debian 安装 DSA-3035 对应包；源码部署则应用 bash43-026（及 4.2/4.1 等分支等价补丁）或升级到 Bash 4.3.27 及更高已修补版本。无法立即升级时，临时限制会将不可信环境变量传入 Bash 的入口：关闭 Apache mod_cgi/mod_cgid 或改用非 Bash CGI、限制 OpenSSH ForceCommand/强制命令场景、过滤 DHCP 客户端脚本中的环境变量，并用 env x='() { :;}; echo vulnerable' bash -c "echo test" 验证补丁生效（输出中不应再出现漏洞行为）。"""
score = 9.8
severity = "CRITICAL"
sources = ["kev"]
title = "GNU Bash 远程代码执行漏洞"
updated = "2026-06-17T00:14:28.143"

