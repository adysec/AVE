[basic]
description = "Counter.exe 2.70 存在参数处理不足的漏洞，当攻击者向程序发送过长的参数时，程序会耗尽系统资源，导致服务长时间不可用。该漏洞影响 Behold Software Web Page Counter 2.70 2.70 版本，任何未经身份验证的远程攻击者均可通过发送精心构造的长参数触发漏洞。攻击者无需复杂技巧，只需向目标程序发送包含大量字符的参数即可引起程序崩溃或进入无限循环状态，从而使 Web 服务无法正常响应。此类拒绝服务漏洞在安全措施薄弱的早期软件版本中常见，攻击者可以轻易利用这一缺陷破坏网站服务的可用性。"
published = "1999-05-19T04:00:00.000"
remediation = "升级 Behold Software Web Page Counter 至修复了该长参数拒绝服务问题的后续版本（2.70 以上官方补丁版）。如无法立即升级，可在 Web 服务器前端部署 WAF/反向代理限制 counter.exe 传入参数的长度上限，并通过防火墙规则限制仅允许可信来源访问该 CGI 程序，作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Behold Software Web Page Counter 2.70 拒绝服务漏洞"
updated = "2026-06-16T21:49:33.700"

