[basic]
description = "Open WebUI 是一款自托管的人工智能平台，其 MarkdownTokens.svelte 组件未正确转义 HTML 标签，导致存在存储型跨站脚本（XSS）漏洞。攻击者可在聊天消息中注入恶意 JavaScript 代码，当其他用户打开该聊天记录时脚本自动执行，从而窃取用户访问令牌实现账户接管。若被攻击目标为管理员，攻击者可进一步利用函数功能执行任意 Python 代码，实现服务器端远程代码执行。攻击者还可通过社区共享功能将恶意聊天记录传播给其他用户，形成蠕虫式攻击。该漏洞影响 0.6.6 之前的所有版本。"
published = "2025-05-05T19:15:57.197"
remediation = "升级 Open WebUI 至 v0.6.6 或更高版本，该版本已修复 MarkdownTokens.svelte 中 HTML 标签未转义导致的存储型 XSS 问题。如无法立即升级，可在管理面板中关闭「Enable Community Sharing」功能，并禁用聊天记录对外分享，同时在前端部署 CSP（内容安全策略）限制脚本执行以作为临时缓解措施。"
score = 5.4
severity = "MEDIUM"
sources = ["ghsa"]
title = "Open WebUI 存储型跨站脚本漏洞"
updated = "2026-06-17T09:26:52.230"

