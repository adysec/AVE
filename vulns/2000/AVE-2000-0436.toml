[basic]
description = "Netscape Communicator 4.73之前版本及Navigator 4.07存在SSL证书验证缺陷，未能正确校验证书的有效性。远程攻击者可通过中间人攻击将合法服务器的流量重定向至恶意服务器，绕过SSL证书警告弹窗，导致用户敏感信息被窃取。该漏洞影响早期Netscape浏览器用户，攻击条件简单，危害较大。"
published = "2000-05-10T04:00:00.000"
remediation = "升级 Netscape Communicator 至 4.73 或更高版本，Netscape Navigator 至 4.07 或更高版本。由于该产品已停止维护，建议迁移至现代浏览器（如 Firefox、Chrome）以获得持续安全更新。如无法升级，可在网络层面配置 SSL 证书固定（Certificate Pinning）或部署 SSL 中间人检测设备作为临时缓解。"
score = 2.6
severity = "LOW"
sources = ["cve"]
title = "Netscape SSL证书验证绕过漏洞"
updated = "2026-06-16T21:51:38.967"

