[basic]
description = "OpenSSL 0.9.7-beta2 及之前版本、0.9.6d 及之前版本在处理 64 位平台上的整数 ASCII 表示时存在缺陷，远程攻击者可通过向使用受影响 OpenSSL 版本的服务发送特制数据触发此漏洞，导致拒绝服务甚至远程代码执行。该漏洞影响大量依赖 OpenSSL 的应用程序与系统（如 macOS X 及其他 UNIX-like 系统），CVSS 评分 7.5，危害等级高。"
published = "2002-08-12T04:00:00.000"
remediation = "将 OpenSSL 升级至 0.9.6e 及以上版本，或 0.9.7-beta3 及以上版本。各发行版用户请安装对应安全更新：FreeBSD 升级至 4.6.1-RELEASE-p10，Mandrake Linux 安装 MDKSA-2002-046 更新，Caldera OpenLinux 应用 CSSA-2002-033 补丁。临时缓解措施可在服务器端禁用 SSLv2 协议，客户端暂无有效缓解手段。"
score = 7.5
severity = "HIGH"
sources = ["osv"]
title = "OpenSSL 64位平台ASCII整数表示处理不当拒绝服务与代码执行漏洞"
updated = "2026-06-16T21:57:52.677"

