[basic]
description = "Apache HTTP Server 核心模块存在 HTTP 响应拆分漏洞（CVE-2024-42516）。攻击者若能操纵由服务器托管或代理的应用程序的 Content-Type 响应头，即可注入恶意响应头并拆分 HTTP 响应，导致缓存投毒、跨站脚本攻击（XSS）或会话劫持。该漏洞源于 Apache HTTP Server 2.4.59 中针对 CVE-2023-38709 的修补不完整，攻击者可通过控制后端应用或代理内容生成器的响应头，注入 CRLF 序列实现响应拆分。受影响版本为 Apache HTTP Server 2.4.0 至 2.4.63，攻击前提是攻击者能控制后端应用或代理内容的 Content-Type 响应头。"
published = "2024-07-18T00:00:00Z"
remediation = '升级 Apache HTTP Server 至 2.4.64 或更高版本（官方修复版本）。若暂时无法升级，可通过配置 mod_headers 模块过滤或清理后端应用返回的 Content-Type 等响应头中的 CRLF 字符（\r\n），或在反向代理层（如 Nginx）增加响应头清洗规则拦截包含换行符的恶意响应头，防止响应拆分攻击。'
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "Apache HTTP Server HTTP 响应拆分漏洞"
updated = "2025-07-10T00:00:00Z"

