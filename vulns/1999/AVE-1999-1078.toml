[basic]
description = "Windows NT 4.0 SP2之前版本的Win32k.sys存在拒绝服务漏洞。本地用户通过向特定WIN32K函数传递错误参数，可导致系统蓝屏崩溃。该漏洞影响Windows NT 4.0全系列版本，攻击者需具备本地登录权限，无需额外用户交互即可触发，属于低危本地拒绝服务漏洞。"
published = "1999-12-31"
remediation = "升级到 Windows NT 4.0 Service Pack 2 (SP2) 或更高版本，SP2 已修复 Win32k.sys 的参数校验缺陷。如无法升级，可限制本地用户登录权限作为临时缓解措施。"
score = 2.1
severity = "LOW"
sources = [
