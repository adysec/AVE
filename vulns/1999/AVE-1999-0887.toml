[basic]
description = 'Microsoft Outlook Express 4.27.3110 与 4.72.3120 版本在处理收到的邮件消息时存在缺陷。恶意用户可构造并发送一封包含特殊内容的邮件（邮件中以双句点".."结尾的行会被错误解析），使 Outlook Express 在接收后错误地重新进入 POP3 命令处理模式，从而导致当前 POP3 会话挂起、邮件客户端无响应，形成拒绝服务。该漏洞影响上述未升级的 Outlook Express 版本，攻击者只需能够向受害者发送电子邮件即可触发，无需身份认证或本地访问权限；受影响用户收取该特制邮件后便会遭遇服务中断，须升级至 4.72.3612.1700 及以上版本方可修复。'
published = "1999-05-11T04:00:00.000"
remediation = "升级 Microsoft Outlook Express 至 4.72.3612.1700 或更高版本，或通过 Windows Update 安装对应的安全更新。如短期内无法升级，建议临时修改 POP3 服务器配置，限制邮件大小并启用邮件头过滤以阻止含异常路径字符的消息到达客户端。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Microsoft Outlook Express POP3 拒绝服务漏洞"
updated = "2026-06-16T21:49:33.953"

