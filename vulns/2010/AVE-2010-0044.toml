[basic]
description = "Joomla! 的 Matamko 组件 1.01 版本存在目录遍历漏洞，远程攻击者无需身份认证即可通过在 index.php 的 controller 参数中传入 ../ 序列实现路径穿越，越权读取服务器上的任意文件，包括配置文件、数据库凭据等敏感信息，可能导致服务器完全沦陷。该漏洞影响 Joomla! 上运行的 Matamko 组件 1.01 版本，CVSS 评分 7.5，危害等级高危。"
published = "2010-04-23T14:30:01.417"
remediation = "立即卸载 com_matamko 组件（Joomla! 后台 → 扩展管理 → 管理 → 找到 Matamko 点击卸载）；若必须保留业务功能，则修改组件入口文件，对 controller 参数做白名单校验，仅允许字母数字控制器名，同时过滤 `../` 和 `%00` 等目录遍历字符，并配置 WAF 规则拦截包含 `controller=../` 的 URL 请求。版本已无法获取官方更新，卸载是最彻底方案。"
score = 7.5
severity = "HIGH"
sources = ["nuclei"]
title = "Joomla! Matamko 组件 本地文件包含漏洞"
updated = "2026-06-16T23:18:29.850"

