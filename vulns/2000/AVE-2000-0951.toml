[basic]
description = "BAIR 程序（个人隐私保护工具）未正确限制对 Internet Explorer Internet 选项菜单的访问权限，导致本地用户可通过修改启动 BAIR 程序的注册表键值来绕过限制，从而获取对 IE 安全设置的访问权限。该漏洞影响使用 BAIR 程序的系统，攻击者需要拥有本地访问权限，利用难度较低。成功利用后，攻击者可修改 IE 安全设置，可能导致信息泄露或权限提升。CVSS 评分 3.6，危害等级低。"
published = "2000-10-20T04:00:00.000"
remediation = '立即卸载 BAIR 软件，改用支持现代 Windows 版本的内容过滤方案（如 Microsoft Family Safety 或第三方 Web 过滤软件）。如必须继续使用 BAIR，通过组策略（gpedit.msc）限制非管理员用户对注册表 `HKEY_LOCAL_MACHINE\Software\Microsoft\Windows\CurrentVersion\Run` 路径的写入权限，防止本地用户删除 BAIR 启动项绕过过滤。'
score = 3.6
severity = "LOW"
sources = ["cve"]
title = "Personal Privacy 本地权限提升漏洞"
updated = "2026-06-16T21:52:30.690"

