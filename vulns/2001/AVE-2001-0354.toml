[basic]
description = "Internet Software Solutions Air Messenger LAN Server（AMLServer）3.4.2 存在完整路径泄露漏洞。远程攻击者无需身份认证，通过向目标服务发送特制请求并查看 HTTP 响应中的 Location 头字段，即可获取服务器目录的绝对路径信息。该信息泄露可能为后续目录遍历、文件读取等攻击提供辅助情报，影响运行该版本 AMLServer 的局域网即时通讯服务环境，CVSS 评分约 5.0，危害等级为中危。"
published = "2001-10-18T04:00:00.000"
remediation = "升级到 Internet Software Solutions Air Messenger LAN Server 最新版本，修复版本已发布。下载地址：https://www.internetsoftware.com/products/amlserver/。安装后重启服务生效。"
