[basic]
description = "ISC BIND 8.2 至 8.2.2-P6 版本存在拒绝服务漏洞，攻击者可通过向目标系统发送特制的压缩区域传输（ZXFR）请求并在未缓存的授权记录上执行名称服务查询触发漏洞，导致 BIND 进程崩溃或DNS服务中断。该漏洞影响范围涵盖使用受影响版本BIND的各种组织，可能导致网络服务中断。攻击者无需身份验证即可通过网络连接发起攻击，通过特定的请求模式利用BIND软件的查询处理机制中的资源耗尽或逻辑错误，触发系统资源耗尽或内存损坏，导致服务完全不可用。虽然该漏洞不影响保密性和完整性，但可用性影响程度达到部分影响（CVSS 评分 5.0）。Microsoft 及其他BIND相关厂商已发布安全更新修复此漏洞，用户应及时升级到支持版本。"
published = "2000-12-19T05:00:00.000"
remediation = "立即升级ISC BIND至8.2.3-P1或更高版本（如9.x稳定版），获取ISC官方安全补丁修复ZXFR漏洞。修改named.conf配置添加allow-transfer限制区域传输权限，配置allow-query限制查询来源，重启named服务生效。如无法立即升级，配置防火墙限制UDP/TCP 53端口仅允许信任网络访问，部署DNS缓存服务器预缓存权威记录以绕过ZXFR请求，监控named进程异常重启并配置自动重启机制作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "ISC BIND 8.2.2 ZXFR 请求拒绝服务漏洞"
updated = "2026-06-16T21:52:40.657"

