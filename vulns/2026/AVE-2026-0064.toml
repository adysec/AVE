[basic]
description = "Apache IoTDB DataNode 内部 RPC 接口在创建 Trigger 实例时，未对用户上传的 JAR 文件名进行充分校验，直接拼接路径导致路径遍历漏洞。若 DataNode 内部 RPC 端口暴露于不可信网络，攻击者可通过在 JAR 文件名中构造路径穿越序列（如 ../），将文件写入预期安装目录之外的位置，实现任意文件写入。该漏洞影响 Apache IoTDB 1.3.3 至 2.0.8 之前的版本，CVSS 评分 9.8，危害严重。官方建议升级至 2.0.8 版本修复。"
published = "2026-07-06T09:16:35.270"
remediation = "立即升级 Apache IoTDB 至 2.0.8 及以上版本。同时确保 DataNode RPC 端口（默认 6667）不暴露于不可信网络，通过防火墙限制仅内网访问，并审计已有 Trigger JAR 文件完整性。"
score = 9.8
severity = "CRITICAL"
sources = ["hwpoc"]
title = "Apache IoTDB DataNode 路径遍历漏洞"
updated = "2026-07-07T17:49:04.433"

