[info]
author = "AVE"
description = "Oracle WebLogic Server UDDI Explorer SSRF 漏洞 CVE-2014-4210，未授权攻击者可通过 operator 参数让服务器向内网任意地址发起 HTTP 请求。验证：检测 /uddiexplorer/SearchPublicRegistries.jsp 端点可用性。"
id = "POC-AVE-2014-0016"
name = "CVE-2014-4210 PoC"
severity = "medium"
tags = ["cve-2014-4210"]
vuln_id = [
    "CVE-2014-4210",
    "AVE-2014-0016",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/uddiexplorer/SearchPublicRegistries.jsp"
protocol = "http"

[[poc.requests.matchers]]
expect = true
status = [200]
type = "status"
