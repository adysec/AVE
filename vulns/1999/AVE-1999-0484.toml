[basic]
description = "Qbik WinGate 的 telnet 代理服务存在资源管理缺陷，远程攻击者可通过向目标主机的 localhost 端口发起大量并发连接请求，消耗代理服务的系统资源（如文件描述符、连接池等），导致代理服务无响应或崩溃，进而造成拒绝服务。该漏洞影响 WinGate 早期版本，攻击者无需认证即可触发，危害等级中危。"
published = "1998-02-21T05:00:00.000"
remediation = "tags.<value>升级 WinGate 到 2.1d 或更高版本，该版本已修复 telnet 代理对 localhost 大量连接导致的拒绝服务问题。在无法升级时，可在 WinGate 的 Telnet Proxy Service 属性中限制最大并发连接数，并在防火墙规则中限制对 telnet 代理端口（默认 23）的访问来源 IP。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Qbik WinGate 远程拒绝服务漏洞"
updated = "2026-06-16T21:48:04.970"

