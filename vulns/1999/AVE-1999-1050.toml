[basic]
description = "Elm 2.4 邮件客户端的 filter 命令存在多处缓冲区溢出漏洞。攻击者可通过向受害者发送包含超长 From: 或 Reply-To: 头的恶意邮件，或诱使用户以超长 -f 参数运行 filter 命令，触发缓冲区溢出，从而在目标系统上执行任意命令。该漏洞影响 Elm 2.4 版本，CVSS 评分 7.5，危害等级高。"
published = "1999-12-31T05:00:00.000"
remediation = "升级 Elm 到 2.4.5 或更高版本，该版本修复了 filter 命令中的缓冲区溢出问题。Red Hat 在 RH50 errata 中发布了针对 elm 的安全更新。如无法升级，建议禁用 filter 命令或避免使用 Elm 处理不可信来源的邮件，同时可考虑迁移至现代邮件客户端如 Thunderbird 或 Mutt。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "Elm 2.4 filter 缓冲区溢出代码执行漏洞"
updated = "2026-06-16T21:50:13.147"

