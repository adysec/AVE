[basic]
description = "易宝OA系统的/getPosition接口存在SQL注入漏洞，攻击者可通过构造特制的positionName参数直接注入恶意SQL语句，导致数据库敏感信息泄露。该漏洞利用方式简单，无需认证即可远程触发，影响易宝OA相关版本，危害较大。建议厂商及时对用户输入进行参数化查询过滤以防止SQL注入攻击。"
published = "0703"
remediation = "联系顶讯科技获取官方补丁，升级易宝OA至最新版本。临时缓解措施：在 WAF/应用防火墙中配置规则拦截 `/SmartTradeScan/StockTake/getPosition` 路径的 `positionName` 参数中 `'`、`AND`、`SELECT` 等 SQL 注入特征字符，同时对 `positionName` 参数实施严格的输入白名单校验，仅允许字母数字组合。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "易宝OA getPosition SQL注入漏洞"
updated = "0703"

