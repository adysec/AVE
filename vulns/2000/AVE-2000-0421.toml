[basic]
description = "XFree86 系统中的 libICE 库存在整数边界检查缺失漏洞，SKIP_STRING 宏在处理数据时未对用户指定的大数值进行正确校验，导致内存访问越界。远程攻击者无需身份认证即可通过网络向目标系统发送特制的 ICE 协议数据包触发该漏洞，造成 X11 服务进程崩溃，导致拒绝服务。该漏洞影响 XFree86 X11R6 3.3.x/4.0、Open Group X11r6 3.3.3-4.0 及 Gnome 1.0/1.1 等版本，CVSS 评分 5.0，危害等级中危。"
published = "2000-06-19T04:00:00.000"
remediation = "升级 XFree86 至 4.0.1 及以上版本，该版本修复了 libICE 中 SKIP_STRING 宏对长度值校验不严的问题。如无法升级，建议迁移至 X.Org Server（XFree86 已停止维护），并在防火墙层面限制对 X 服务端口（TCP 6000）的访问，仅允许受信任的主机连接。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "XFree86 libICE SKIP_STRING 拒绝服务漏洞"
updated = "2026-06-16T21:51:52.550"

