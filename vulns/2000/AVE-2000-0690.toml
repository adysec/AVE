[basic]
description = "CGI Script Center News Update 1.1 存在密码更改验证缺陷，未对原始管理员密码进行充分校验，远程攻击者无需知道原始密码即可直接修改管理员密码，导致完全控制新闻管理系统。该漏洞源于密码修改功能中缺乏必要的身份验证机制，攻击者可通过直接向密码更改接口发送构造请求完成密码重置，危害严重。CVSS 评分 9.8，影响所有运行 News Update 1.1 的 Web 服务器。"
published = "2000-12-19T05:00:00.000"
remediation = "立即停止使用 News Update 1.1，该软件已停止维护且无官方补丁。作为替代方案，删除或禁用 CGI Script Center News Update 的全部 CGI 脚本，或通过 Web 服务器访问控制列表（如 Apache 的 `.htaccess` 或 Nginx 的 `allow/deny` 指令）限制对 `news_update.cgi` 的访问来源 IP，仅允许可信管理 IP 执行密码修改操作。"
score = 9.8
severity = "CRITICAL"
sources = ["exploitdb"]
title = "CGI Script Center News Update 1.1 身份验证绕过漏洞"
updated = "2026-06-16T21:52:49.477"

