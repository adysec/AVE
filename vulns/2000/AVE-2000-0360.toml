[basic]
description = "SCO UnixWare 7.1.0 系统中的软件包管理命令存在不安全的权限配置漏洞，本地攻击者利用该漏洞可绕过权限限制添加或删除系统软件包，影响系统的完整性和可用性。攻击者需拥有本地访问权限，无需特殊条件即可利用，CVSS 评分 4.6，危害等级中危。"
published = "2001-03-12T05:00:00.000"
remediation = "立即应用 SCO 官方安全公告 SB-99.09b 中提供的补丁，升级受影响软件包至修复版本。如无法立即打补丁，可移除受影响打包命令（如 pkgadd、pkgrm 等）的 setuid/setgid 权限位，并严格限制本地用户仅授权可信管理员登录系统，以降低本地提权风险。"
score = 4.6
severity = "MEDIUM"
sources = ["avd"]
title = "SCO UnixWare 软件包管理命令权限提升漏洞"
updated = "2026-06-16T21:51:32.180"

