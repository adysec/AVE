[basic]
description = 'Majordomo 1.89 及 1.90 版本在处理邮件命令时存在命令注入漏洞，远程攻击者可通过向目标 Majordomo 服务器发送特制的邮件，在 Reply-To 字段中嵌入恶意命令并附带 "lists" 指令，从而在服务器上执行任意系统命令。该漏洞利用条件简单，无需身份认证，可导致服务器被完全控制，危害较大。'
published = "1994-06-09T04:00:00.000"
remediation = "升级 Majordomo 至 1.94 或更新版本，该版本修复了通过 Reply-To 头执行命令的问题；如无法升级，可在 majordomo.cf 配置中禁用外部 Reply-To 头处理作为临时缓解。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "Majordomo lists 命令远程代码执行漏洞"
updated = "2026-06-16T21:47:54.727"

