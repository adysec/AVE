[basic]
description = 'Decidim 开源参与式民主平台的"下载你的数据"功能存在不安全的直接对象引用漏洞。用户请求导出后，Decidim 端点正确校验了当前用户身份，但随后重定向到 Active Storage blob URL，该签名 URL 未绑定用户会话或一次性令牌，导致获得该链接的任何人都可在无需认证的情况下重复下载私密导出文件。攻击者可通过浏览器历史、日志、代理工具、截图、支持工单等渠道截获链接，从而访问敏感个人数据。CVSSv3 评分 6.5，攻击向量为网络远程、低复杂度、无需权限但需用户交互。'
published = "2026-07-13"
remediation = "升级 Decidim 至 v0.30.9、v0.31.5 或 v0.32.0 及以上版本，这些版本已通过引入 PrivateDownload 控制器使用 send_data 方法替代直接 Active Storage 重定向，为导出文件添加了访问控制校验。如无法立即升级，可在反向代理层为 /rails/active_storage/blobs/ 路径添加访问令牌校验，或配置 Active Storage 使用短期过期签名 URL（如 5 分钟），阻止泄露的链接被长期重放利用。"
score = 6.5
severity = "MEDIUM"
sources = [
    "ghsa",
    "cve",
]
title = "Decidim 私有导出可重放链接信息泄露漏洞"
updated = "2026-07-22"

