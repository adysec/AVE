[basic]
description = "Linux 系统中 dip（Dialup IP）程序存在本地缓冲区溢出漏洞，低权限本地用户可通过向 dip 程序提交超长参数触发缓冲区溢出，从而覆盖内存中的数据并执行任意代码，最终获取 root 权限。该漏洞影响多个 Linux 发行版中 dip 3.3.7 及更早版本，CVSS 评分 7.2，危害等级高。漏洞利用代码已公开，攻击者可在获得本地访问权限后实施提权攻击。"
published = "1996-07-09T04:00:00.000"
remediation = "建议升级 dip 至 3.3.7p 及以上已修复版本，该版本已修复缓冲区溢出问题。若无法升级，应立即执行 `chmod u-s /usr/sbin/dip` 移除 setuid 权限位，或通过 `dpkg-statoverride` 锁定文件属性，防止普通用户利用该漏洞获取 root 权限。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "Linux dip 本地缓冲区溢出提权漏洞"
updated = "2026-06-16T21:47:40.520"

