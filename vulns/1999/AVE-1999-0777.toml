[basic]
description = """
Hybrid Networks Cable Broadband Access System 1.0 的管理接口缺乏任何身份验证机制，其使用的 HSMP 协议完全未包含认证或访问控制功能。攻击者无需任何凭据即可通过网络远程连接到管理端口，绕过所有安全验证并执行任意管理命令。CVSS v2.0 评分为 10.0，攻击向量为网络远程攻击（AV:N），攻击复杂度低（AC:L），无需认证（Au:N），可导致完全机密性、完整性和可用性丧失（C:C/I:C/A:C）。该漏洞影响所有使用该系统的用户，攻击者可以完全控制受影响设备，进而操纵网络流量、窃取敏感数据或发起进一步攻击。
"""
published = "1999-10-06"
remediation = """
Hybrid Networks Cable Broadband Access System 为已停产产品，厂商未提供安全补丁。建议采取以下缓解措施：1）将设备隔离到独立管理 VLAN，通过网络分段限制对 HSMP 端口（默认 161/162）的访问；2）在边界防火墙上配置 ACL，仅允许受信管理 IP 地址访问管理端口；3）部署带外管理网关或堡垒机，对 HSMP 管理会话进行认证代理和审计记录；4）评估替代方案，迁移至支持认证机制的现代宽带接入管理系统。
"""
score = 10.0
severity = "CRITICAL"
sources = ["cve"]
title = "Hybrid Networks Cable Broadband Access System 远程管理认证缺失漏洞"
updated = "2026-06-16"

