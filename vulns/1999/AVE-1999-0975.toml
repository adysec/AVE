[basic]
description = "Windows NT 操作系统中因启用了 OS/2 或 POSIX 兼容性子系统而存在远程安全漏洞。OS/2 和 POSIX 子系统是 Windows NT 为兼容早期 OS/2 及 POSIX 应用程序而保留的遗留组件，通常无需启用。当这些子系统处于启用状态时，攻击者可通过目标系统的网络服务远程访问这些子系统，无需任何身份验证即可实现对受感染系统的完全控制，包括任意命令执行、文件读写及注册表修改等操作。该漏洞影响所有启用了 OS/2 或 POSIX 子系统的 Windows NT 系统版本，CVSS 评分 10.0，危害等级严重。攻击条件极为宽松，攻击者仅需具备远程网络访问权限即可发起攻击，利用复杂度低。管理员可通过禁用 OS/2 和 POSIX 子系统或升级到更高版本的 Windows 系统来消除此安全风险。"
published = "1999-01-01T05:00:00.000"
remediation = "在 Windows NT 中通过「控制面板 → 网络 → 服务」卸载或禁用 OS/2 与 POSIX 子系统（如无需运行此类程序则彻底移除），并安装 Microsoft 1999 年累积安全补丁（NT 4.0 Service Pack 4 及以上）。若无法立即升级，可在域控制器与边界防火墙限制对受影响主机的 SMB/NetBIOS 端口（139/445）访问，作为临时缓解措施。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
