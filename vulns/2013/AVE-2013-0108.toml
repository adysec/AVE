[basic]
description = "Adobe Flash Player 的 ExternalInterface ActionScript 功能存在未指定的远程代码执行漏洞，远程攻击者可通过诱导用户打开特制的 SWF 文件触发该漏洞，导致任意代码执行。该漏洞影响 Windows 和 Mac OS X 平台上的 Flash Player 10.3.183.67 之前版本及 11.6.602.171 之前的 11.x 版本，以及 Linux 平台上的 10.3.183.67 之前版本及 11.2.202.273 之前的 11.x 版本。攻击者需要用户交互（如点击链接或打开恶意文件）才能成功利用，该漏洞已在 2013 年 2 月被野外利用，CVSS 评分 8.8，危害等级高。"
published = "2013-02-27T00:55:01.160"
remediation = "立即升级 Adobe Flash Player 至以下安全版本：Windows/Mac 升级至 10.3.183.67 或 11.6.602.171，Linux 升级至 10.3.183.67 或 11.2.202.273。由于 Adobe Flash Player 已于 2020 年 12 月 31 日停止支持并结束生命周期，建议彻底卸载 Flash Player 组件，并在浏览器中禁用 Flash 插件，同时移除系统内所有 .swf 文件关联，以彻底消除风险。"
score = 8.8
severity = "HIGH"
sources = ["kev"]
title = "Adobe Flash Player 远程代码执行漏洞"
updated = "2026-06-16T23:49:50.320"

