[basic]
description = "用友 U8Cloud 系统 MeasureQResultAction 接口存在 SQL 注入漏洞，未经身份认证的远程攻击者可通过向 ActionServlet 接口发送包含 SQL 延时注入 Payload（WAITFOR DELAY）的 selectQueryCondition 参数触发该漏洞，导致数据库信息泄露或远程代码执行。该漏洞影响用友 U8Cloud 多个版本，攻击者无需身份认证即可通过构造恶意 GET 请求实施攻击，CVSS 评分预计高危，用友官方已发布补丁修复该漏洞，建议用户尽快升级至最新版本。"
published = "0826"
