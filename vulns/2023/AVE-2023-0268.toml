[basic]
description = "Microsoft Exchange Server 存在远程代码执行漏洞。由于服务端在处理特定请求时未能正确校验和净化用户输入，攻击者可构造恶意的请求数据，在无需身份认证或仅需低权限的情况下将恶意代码注入服务器进程并触发执行，从而完全控制受影响邮件服务器。该漏洞影响运行受支持版本的 Exchange Server（相关补丁于 2023 年 8 月 10 日修复），攻击条件为攻击者能够访问 Exchange 的 Web 服务端口（如 443）。利用方式通常借助特制 HTTP 请求或序列化载荷抵达存在缺陷的组件完成 RCE，危害等级严重，可导致邮件数据泄露与域内横向移动。"
published = "08.10"
remediation = "立即为受影响的 Exchange Server 安装微软 2023 年 8 月安全更新（SU 累积更新，如 Exchange 2019 CU13/2016 CU23 配套安全补丁），通过 Microsoft Update 或手动下载 KB 补丁部署并重启服务。如暂无法打补丁，应在边缘防火墙/反代层阻断对 /owa、/ecp 等 OWA 端点的异常外连请求，并启用 Extended Protection for Authentication (EPA) 与 TLS 证书绑定，限制仅内网可信 IP 访问管理接口以缓解风险。"
score = 5
severity = "MEDIUM"
