[basic]
description = "浪潮云财务系统 /cwba/se/service/GSP_UnitDefineWebService.asmx 接口存在命令执行漏洞，攻击者可在未授权的情况下向目标接口发送特制 SOAP 请求，利用 XML 外部实体注入或反序列化缺陷触发系统命令执行，进而获取服务器控制权。该漏洞影响浪潮云财务系统多个版本，可导致财务数据泄露、服务器被控等严重危害，CVSS 评分 9.8，危害等级严重。目前官方尚未发布正式补丁，建议限制相关接口的访问权限。"
published = "0730"
remediation = "建议立即联系浪潮官方获取针对该漏洞的安全补丁，升级浪潮云财务系统至最新版本。临时缓解措施包括：在 WAF 或 IPS 侧拦截对 `/cwba se/service/GSP_UnitDefineWebService.asmx` 的访问请求；在不影响业务的前提下，通过 IIS 或 Nginx 限制该 WebService 端口的访问来源 IP；删除或重命名存在漏洞的 `GSP_UnitDefineWebService.asmx` 文件并重启 Web 服务。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "浪潮云财务系统远程代码执行漏洞"
updated = "0730"

