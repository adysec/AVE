[basic]
description = "Serv-U FTP 服务器 2.5d 及更早版本的默认配置存在路径泄漏漏洞。远程攻击者无需身份认证，通过请求一个不存在的目录或文件 URL，即可从服务器返回的错误信息中获取服务器真实路径名。该漏洞可被用于信息收集，为后续攻击提供目标系统目录结构信息，影响范围较广，攻击复杂度低。"
published = "2000-02-29"
remediation = "升级 Serv-U FTP 服务器至 2.5e 或更高版本，该版本修复了默认配置下错误信息泄露真实路径的问题。如无法升级，可修改服务器配置，禁用详细错误信息显示，避免向客户端返回真实路径名。"
score = 5.0
severity = "MEDIUM"
sources = ["cve"]
title = "Serv-U FTP 服务器路径泄漏漏洞"
updated = "2026-06-16"

