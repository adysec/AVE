[basic]
description = 'Microsoft Internet Explorer 4.0.1 及 5.x 版本的"导入/导出收藏夹"功能存在代码注入漏洞。远程攻击者可构造恶意收藏夹文件，诱使用户通过该功能导入，从而在用户系统上执行任意代码或修改文件。该漏洞影响 IE 4.0.1 至 5.01 版本，攻击者无需身份认证，利用难度低，CVSS 评分 10.0，危害等级严重。Microsoft 已发布安全更新修复此漏洞。'
published = "1999-09-10T04:00:00.000"
remediation = "升级到 Internet Explorer 5.01 Service Pack 2 或更高版本以修复 ImportExportFavorites 漏洞。由于 IE 已停止支持，建议立即升级到 Microsoft Edge 或 Chrome 等现代浏览器，并在组策略中禁用 ActiveX 控件和脚本执行作为临时缓解措施。"
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "Microsoft Internet Explorer Import/Export Favorites 远程代码执行漏洞"
updated = "2026-06-16T21:48:52.797"

