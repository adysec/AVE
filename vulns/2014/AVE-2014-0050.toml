[basic]
description = "Netsweeper Web 管理后台的 webadmin/reporter/view_server_log.php 存在目录遍历漏洞。远程攻击者无需身份认证即可通过构造包含 `../` 路径序列的 log 参数，结合 stats 动作，遍历服务器文件系统目录并列出其内容。该漏洞影响 Netsweeper 3.1.10 之前版本、4.0.x 系列 4.0.9 之前版本及 4.1.x 系列 4.1.2 之前版本，攻击复杂度低，无需用户交互，可导致敏感目录结构泄露，为后续攻击提供信息支撑。"
published = "2020-02-19T20:15:13.253"
remediation = "升级 Netsweeper 至 3.1.10（3.x 分支）、4.0.9（4.0.x 分支）或 4.1.2（4.1.x 分支）及以上版本。如无法立即升级，可在 Web 服务器（如 Apache/Nginx）层面配置访问控制规则，限制对 `/webadmin/reporter/` 路径的访问，仅允许受信管理 IP 段访问该目录。"
score = 5.3
severity = "MEDIUM"
sources = ["nuclei"]
title = "Netsweeper Webadmin 目录遍历漏洞"
updated = "2026-06-17T00:18:38.357"

