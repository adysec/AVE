[basic]
description = "Linux xinetd 2.1.8.9pre11-1 及更早版本的 svc_logprint 函数存在缓冲区溢出漏洞，远程攻击者可通过发送超长的 ident 响应触发缓冲区溢出，导致在目标系统上以 xinetd 进程权限执行任意代码。该漏洞影响运行受影响版本 xinetd 的 Linux 系统，CVSS 评分 7.5（高危），攻击向量为网络远程、攻击复杂度低、无需认证，可导致机密性、完整性和可用性均受影响。攻击者无需认证即可远程发送恶意 ident 响应触发漏洞，Debian 已发布 DSA-063 安全公告提供修复补丁。"
published = "2001-10-18T04:00:00.000"
remediation = "建议立即升级 xinetd 至 2.1.8.9pre11 之后的版本，或安装各 Linux 发行版提供的安全更新（如 Debian DSA-063 补丁、Red Hat RHSA-2001:063 等）。若暂时无法升级，建议在防火墙层面限制 ident 服务端口（默认 113/tcp）的外部访问，或在 xinetd 配置文件 /etc/xinetd.conf 中禁用 ident 服务作为临时缓解措施。"
score = 7.5
severity = "HIGH"
sources = ["exploitdb"]
title = "Xinetd 2.1.8 缓冲区溢出漏洞"
updated = "2026-06-16T21:54:54.720"

