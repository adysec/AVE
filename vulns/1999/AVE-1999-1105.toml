[basic]
description = "阿里巴巴 2.0 中的 genkey 密钥生成工具存在 RSA 密钥对生成缺陷，其使用指数 1 生成 RSA 密钥对。由于 RSA 算法中指数为 1 时加密等同于明文传输，导致所有使用该工具生成的密钥进行的交易数据实际上以明文形式在网络中传输，攻击者可通过网络嗅探直接获取敏感交易信息。该漏洞影响阿里巴巴 2.0 版本，CVSS 评分 5.0，危害等级中危。"
published = "1999-12-31T05:00:00.000"
remediation = "升级 Alibaba 至 2.0 以上版本，确保 genkey 使用正确的 RSA 公钥指数（如 65537）而非指数 1。无法升级时应立即替换自行生成的 RSA 密钥对，并停止使用 genkey 工具生成加密密钥，改用 OpenSSL 等标准工具生成密钥对。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Alibaba 2.0 genkey RSA 密钥生成弱密钥漏洞"
updated = "2026-06-16T21:50:27.233"

