[basic]
description = "Squid 代理服务器 2.4.STABLE6 之前版本存在代理认证凭证转发漏洞，当用户通过 Squid 代理访问外部网站时，代理认证所需的用户名和密码可能被意外转发给第三方 Web 服务器，导致敏感认证信息泄露。攻击者可通过搭建恶意网站诱导受害者访问，从而窃取用户的代理登录凭据。该漏洞影响 Squid 2.4.STABLE6 之前所有版本，建议升级至最新版本。"
published = "2002-07-26T04:00:00.000"
remediation = "升级 Squid 至 2.4.STABLE6 及以上版本，该版本修复了代理认证凭证被转发的问题。如无法升级，在 squid.conf 中设置 `request_header_remove Proxy-Authorization` 禁止转发认证头，或使用 `proxy_auth` ACL 限制认证范围作为临时缓解。"
score = 5
severity = "MEDIUM"
sources = ["osv"]
title = "Squid 代理认证证书转发信息泄露漏洞"
updated = "2026-06-16T21:57:59.953"

