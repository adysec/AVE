[info]
author = "ave"
description = "检测 Windows NT/2000 本地 ntconfig.pol 文件是否可写，验证本地安全策略绕过漏洞"
id = "POC-AVE-1999-1075"
name = "CVE-1999-1358 PoC"
severity = "medium"
tags = ["ave-1999-1075"]
vuln_id = [
    "CVE-1999-1358",
    "AVE-1999-1075",
]

[poc]
logic = "any"

[[poc.requests]]
path = 'C:\WINNT\system32\GroupPolicy\Machine\registry.pol'
protocol = "file"

[[poc.requests.matchers]]
expect = false
part = "body"
type = "word"
words = ["Administrator"]

[[poc.requests]]
path = 'C:\WINNT\system32\GroupPolicy\User\registry.pol'
protocol = "file"

[[poc.requests.matchers]]
expect = false
part = "body"
type = "word"
words = ["Administrator"]
