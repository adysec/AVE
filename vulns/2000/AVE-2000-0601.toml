[basic]
description = "SGI IRIX 6.5.x 系统中的 InPerson 视频会议工具中的 inpview 程序存在竞态条件漏洞。本地攻击者可通过在 /tmp 目录下创建符号链接，利用该程序在处理临时文件时的竞态条件，以提升的权限覆盖或破坏系统任意文件，从而实现权限提升。攻击者需要拥有本地系统访问权限，且无需交互即可触发该漏洞。该漏洞影响 IRIX 6.5.x 系列操作系统。"
published = "2000-10-20"
remediation = "立即移除 /usr/lib/InPerson/inpview 的 setuid 位（chmod u-s /usr/lib/InPerson/inpview），并限制可执行权限为仅 root（chmod 700 /usr/lib/InPerson/inpview）。如不使用 InPerson 服务，建议直接卸载该软件包。SGI 已针对此漏洞发布安全补丁，请升级到 IRIX 6.5.x 的最新维护版本。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "SGI IRIX 6.5.x InPerson inpview 竞态条件漏洞"
updated = "2000-10-20"

