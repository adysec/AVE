[basic]
description = "NCSA HTTP守护进程（NCSA HTTPd）1.3版本中存在缓冲区溢出漏洞，远程攻击者可通过向目标服务器的HTTP服务发送特制的超长请求触发该漏洞，导致缓冲区溢出，进而实现远程命令执行。该漏洞影响NCSA HTTPd 1.x系列版本，攻击者无需认证即可利用，CVSS评分7.5，危害等级高。厂商已停止维护该软件，建议用户迁移至其他Web服务器软件。"
published = "1997-09-23T04:00:00.000"
remediation = "NCSA HTTPd 已停止维护超过 20 年，无官方补丁。建议立即迁移至活跃维护的 Web 服务器（如 Apache HTTP Server 2.4.x 或 Nginx 最新稳定版），迁移后关闭 NCSA HTTPd 进程并清理旧端口监听，同时配置防火墙限制 HTTP 端口仅对必要来源开放。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "NCSA HTTPd 远程缓冲区溢出漏洞"
updated = "2026-06-16T21:48:02.227"

