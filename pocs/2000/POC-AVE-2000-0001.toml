[info]
author = "AVE"
description = "向 /_vti_inf.html 发送 GET 请求，通过响应体中是否包含 _vti_bin/shtml.dll 路径引用来检测 Microsoft FrontPage Server Extensions 是否存在。若检测成功，攻击者可进一步利用 RPC POST 请求到 shtml.dll 获取匿名账户名称。"
id = "POC-AVE-2000-0001"
name = "Microsoft FrontPage Server Extensions 匿名账户名称信息泄露漏洞 PoC"
severity = "medium"
tags = ["ave-2000-0001"]
vuln_id = [
    "CVE-2000-0114",
    "AVE-2000-0001",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/_vti_inf.html"
protocol = "http"

[[poc.requests.matchers]]
expect = true
status = [200]
type = "status"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["_vti_bin/shtml.dll"]
