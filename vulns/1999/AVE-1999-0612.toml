[basic]
description = 'Microsoft BackOffice Server 4.0 安装程序在安装 SQL Server、Exchange Server 或 Microsoft Transaction Server 时，会要求用户输入相关服务账户名和密码，并将这些凭据以明文形式写入 <systemdrive>\Program Files\Microsoft Backoffice\Reboot.ini 文件中。安装完成后（无论成功与否），该文件未被自动删除。本地攻击者若能登录服务器，即可读取该文件获取明文账户密码，进而利用获取的凭据提升权限或访问受保护资源。'
published = "1999-02-12"
remediation = '安装完成后手动删除 <systemdrive>\Program Files\Microsoft Backoffice\Reboot.ini 文件，该文件仅由安装程序创建，删除后不会自动重建。建议在每次 BackOffice Server 4.0 安装完成后（无论成功与否）立即删除此文件，防止本地攻击者读取明文账户密码。'
score = 2.1
severity = "LOW"
sources = [
    "cve",
    "exploitdb",
]
title = "Microsoft BackOffice Server 4.0 安装程序敏感信息泄露漏洞"
updated = "2026-06-16"

