[basic]
description = "sigstore-go 是 Sigstore 项目用于签名和验证的 Go 语言库。其多日志阈值验证机制存在逻辑缺陷：当配置使用 N>1 个透明日志或 N>1 个签名证书时间戳时，阈值计数按每个条目或每条验证路径的见证者数量计算，而非按日志权威机构计算。这导致单个被攻破的透明日志可通过构造不同索引的多个条目，或单个被攻破的证书时间戳日志通过多次验证（跨多个证书链或嵌入多个 SCT），完全满足多日志阈值要求，从而绕过多日志安全策略。攻击者无需身份认证即可利用此漏洞，但攻击复杂度较高。该漏洞影响 sigstore-go 1.2.0 之前的所有版本，仅破坏签名验证的完整性，不影响机密性和可用性。"
published = "2026-07-17T20:17:21.963"
remediation = "将 sigstore-go 库升级至 v1.2.0 或更高版本，该版本修复了多日志阈值绕过问题。如使用 Cosign，确认其阈值设置为 1 可不受影响。由于无临时缓解措施，必须完成版本升级才能消除风险。"
score = 5.9
severity = "MEDIUM"
sources = ["ghsa"]
title = "Sigstore sigstore-go 多日志阈值绕过漏洞"
updated = "2026-07-21T20:25:45.920"

