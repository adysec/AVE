[basic]
description = "SCO UNIX 4.2 及之前版本中的 prwarn 程序存在安全漏洞，本地普通用户可通过向该程序发送特制参数触发缓冲区溢出或权限处理缺陷，从而获取 root 超级用户权限。该漏洞影响 SCO UNIX 4.2 及更早版本，攻击者需拥有系统本地访问权限方可利用，危害等级高。目前厂商已发布补丁修复此漏洞。"
published = "1994-11-30T05:00:00.000"
remediation = "该漏洞影响已停止维护的 SCO UNIX 4.2 及更早版本，厂商未发布官方补丁。建议立即升级至受支持的现代操作系统（如 Linux 或 BSD 发行版）；若无法升级，可移除 prwarn 程序的 setuid 权限（chmod u-s /usr/bin/prwarn）以阻断本地提权路径，并严格限制本地用户登录权限作为临时缓解措施。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "SCO UNIX 4.2 prwarn 本地权限提升漏洞"
updated = "2026-06-16T21:50:09.200"

