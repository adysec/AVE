[basic]
description = "Linux 系统 pam_console PAM 模块存在设备文件描述符泄露漏洞。当用户登录时，pam_console 会对各类设备文件执行 chown 操作以赋予当前用户访问权限，但在用户注销后，之前打开的设备文件描述符并未被正确关闭，导致已注销用户仍可保持对设备的访问能力。本地攻击者可利用此漏洞，在注销后持续监控后续用户登录时的设备活动，从而窃取敏感信息（如键盘输入、屏幕输出等）。该漏洞影响 RedHat Linux 6.0/6.1/6.2 版本，攻击者需具备本地登录权限，无需额外认证即可实施监控，CVSS 评分 7.2，危害等级高。"
published = "2000-05-03T04:00:00.000"
remediation = "升级到包含修复的 pam 版本（pam-0.68 及以上），该版本在用户注销时正确关闭所有控制台设备文件描述符。如无法升级，可修改 /etc/security/console.perms 配置文件，移除 pam_console 对敏感设备（如 /dev/tty*、/dev/mouse、/dev/audio）的自动 chown 权限，或直接禁用 pam_console.so 模块（从 /etc/pam.d/login 中注释掉 session required pam_console.so 行）。对于仍在运行 Red Hat Linux 6.x 的系统，建议立即迁移到受支持的 Red Hat Enterprise Linux 版本。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "RedHat Linux pam_console 模块本地信息泄露漏洞"
updated = "2026-06-16T21:51:35.513"

