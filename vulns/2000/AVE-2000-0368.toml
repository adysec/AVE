[basic]
description = "Red Hat Linux 6.1 中的 ORBit（CORBA 对象请求代理）和 esound（Enlightened Sound Daemon 音频守护进程）在实现本地认证机制时，未采用足够强的随机数生成算法来产生认证密钥，导致生成的密钥具有可预测性。本地攻击者可通过分析随机数生成规律，暴力猜测或推算出有效的认证密钥，从而绕过认证机制获取对 ORBit CORBA 服务或 esound 音频守护进程的未授权访问权限，可能导致服务被恶意操控或敏感信息泄露。该漏洞仅影响 Red Hat Linux 6.1 系统，攻击前提为攻击者需具备本地系统访问权限。"
published = "1999-12-03T05:00:00.000"
remediation = "建议升级至 Red Hat Linux 6.2 或更高版本，该漏洞在后续发行版中已修复 ORBit 和 esound 的随机数生成机制。若无法升级，可移除 esound 的 setuid 位（chmod u-s /usr/bin/esd）并限制本地用户对 ORBit 服务端口的访问，仅允许受信任用户使用相关服务。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "RedHat Linux 6.1 ORBit和esound弱认证漏洞"
updated = "2026-06-16T21:51:32.937"

