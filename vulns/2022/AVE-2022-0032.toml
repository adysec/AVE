[basic]
description = "Linux 内核 r8188eu 驱动中的 rtw_joinbss_event_prehandle 函数存在死锁漏洞。线程1持有 pmlmepriv->lock 锁后调用 del_timer_sync() 等待定时器停止，而定时器回调函数 rtw_join_timeout_handler 也需要获取同一把锁，导致相互等待形成死锁，系统无法响应。攻击者可利用此漏洞造成本地拒绝服务。"
published = "2025-02-26"
remediation = "升级 Linux 内核至 5.18.4 或更高版本，该版本已将 del_timer_sync() 移出锁保护范围并改用 spin_lock_irq() 修复死锁。"
score = 5.5
severity = "MEDIUM"
sources = ["cve"]
title = "Linux 内核 r8188eu 驱动死锁漏洞"
updated = "2026-06-17"

