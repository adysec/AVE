[basic]
description = "Windows NT 系统账户密码策略存在安全配置不当的问题，具体表现为密码最小长度过短、密码最长使用期限过长或密码历史记录不足等安全关键设置不合理。该漏洞影响 Windows NT 和 Windows 2000 操作系统，攻击者利用这些弱密码策略，可通过暴力破解或字典攻击的方式更容易地猜测用户密码，从而获得系统未授权访问权限。管理员应修改默认密码策略设置，强制要求复杂密码并缩短更换周期以缓解风险。"
published = "1997-01-01T05:00:00.000"
remediation = '打开「本地安全策略」(secpol.msc) → 账户策略 → 密码策略，将"密码必须符合复杂性要求"设为已启用，"密码长度最小值"设为至少12个字符，"密码最长使用期限"设为90天以内，"强制密码历史"设为记住24个密码；同时进入"账户锁定策略"将"账户锁定阈值"设为5次无效登录。对域环境通过组策略(gpmc.msc)在 Default Domain Policy 中统一下发，并执行 gpupdate /force 立即生效。'
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = '{"_meta":{},"stopReason":"end_turn","usage":{"inputTokens":10780,"outputTokens":20,"totalTokens":10800}}'
