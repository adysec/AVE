[basic]
description = "MSCOMCTL.OCX 中的 TabStrip ActiveX 控件存在系统状态破坏漏洞。远程攻击者可构造特制的 Office 文档或恶意网页，诱使用户打开后触发内存破坏，从而以当前用户权限执行任意代码。该漏洞影响 Microsoft Office 2003/2007/2010、SQL Server 2000/2005/2008/2008 R2、Commerce Server 2002/2007/2009、Host Integration Server 2004、Visual FoxPro 8.0/9.0 及 Visual Basic 6.0 运行时等多个产品，CVSS 评分 8.8，危害等级高危。攻击需用户交互（打开文件或访问网页），但无需身份认证，攻击复杂度低。Microsoft 已于 2012 年 8 月安全公告 MS12-060 中修复此漏洞。"
published = "2012-08-15T01:55:01.490"
remediation = "立即安装 Microsoft 安全公告 MS12-060 (KB2720573) 提供的安全更新。受影响产品对应补丁：Office 2003 SP3 安装 KB2726929，Office 2007 SP2/SP3 安装 KB2687441，Office 2010 SP1 (32位) 安装 KB2597986，SQL Server 2000 SP4 安装 KB983812 (GDR) 或 KB983811 (QFE)，SQL Server 2005 SP4 安装 KB2726929，SQL Server 2008/2008 R2 安装 KB2687441，Visual Basic 6.0 Runtime 安装 KB2708437。可通过 Windows Update 自动获取更新。如无法立即打补丁，可通过注册表设置 TabStrip ActiveX 控件 kill bit（CLSID: {1EFB6596-857C-11D1-B16A-00C0F0283628}）或在 Office 中禁用所有 ActiveX 控件作为临时缓解措施。"
score = 8.8
severity = "HIGH"
sources = ["kev"]
title = "Microsoft MSCOMCTL.OCX TabStrip ActiveX 远程代码执行漏洞"
updated = "2026-06-16T23:40:26.290"

