[basic]
description = "CUPS（Common Unix Printing System）1.04及更早版本中存在拒绝服务漏洞。远程攻击者无需身份认证即可通过向目标系统的CUPS服务发送特制的CGI POST请求，导致服务进程崩溃或资源耗尽，从而造成拒绝服务。该漏洞影响运行CUPS 1.04及之前版本的Unix/Linux系统，攻击条件简单，仅需网络可达即可触发。"
published = "2000-06-21T04:00:00.000"
remediation = "立即升级 CUPS 至 1.0.5 或更高版本，官方补丁位于 ftp://ftp.easysw.com/pub/cups/1.0.5/cups-DoS.patch。如无法升级，可在 Web 服务器或防火墙层面限制对 CUPS CGI 接口（尤其是 POST 请求）的远程访问，仅允许可信 IP 段访问打印服务端口 631。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Easy Software Products CUPS CGI POST请求拒绝服务漏洞"
updated = "2026-06-16T21:51:53.533"

