[basic]
description = "JBoss Seam 2 组件存在表达式语言（EL）注入漏洞，由于其对 JBoss EL 表达式的输入过滤不严，远程攻击者可通过向 JBoss Enterprise Application Platform 4.3.0 发送特制 URL 触发该漏洞，实现任意文件上传或远程代码执行。该漏洞影响 Red Hat Linux 平台上的 JBoss EAP 4.3.0，CVSS 评分 8.8，危害等级高。仅在 Java Security Manager 未正确配置时受影响，厂商已发布修复建议。"
published = "2010-08-05T13:23:09.477"
remediation = "升级 JBoss Enterprise Application Platform 至 4.3.0 CP07 及以上版本，或升级 JBoss Seam 至 2.2.1.CR2 及以上版本，以修复 Seam 组件对 EL 表达式输入过滤不严的问题。同时确保正确配置 Java Security Manager，限制表达式引擎权限，并部署 Web 应用防火墙 (WAF) 拦截包含 EL 表达式的恶意请求作为临时缓解。"
score = 8.8
severity = "HIGH"
sources = ["kev"]
title = "Red Hat JBoss Enterprise Application Platform JBoss Seam 2 表达式语言注入远程代码执行漏洞"
updated = "2026-06-16T23:19:29.840"

