[basic]
description = "GNOME 库 1.0.8 版本中存在本地缓冲区溢出漏洞，当程序（如 nethack）处理超长的 --espeaker 命令行参数时，未正确检查输入长度，导致栈缓冲区溢出。本地攻击者可利用该漏洞覆盖返回地址，以 root 权限执行任意代码。该漏洞影响 Mandriva Linux Mandrake 6.0 及使用 GNOME Libs 1.0.8 的系统，CVSS 评分 7.2，危害等级高。攻击者需拥有本地系统访问权限方可利用。"
published = "1999-09-23T04:00:00.000"
remediation = "升级 GNOME 库至 1.0.9 或更高版本，该版本已修复 espeaker 参数缓冲区溢出问题。如无法升级，建议移除 nethack 等受影响程序的 setuid 权限位（chmod u-s /usr/games/nethack），限制本地普通用户执行提权操作。"
score = 7.2
severity = "HIGH"
sources = ["cve"]
title = "Mandriva Linux GNOME 库 espeaker 本地缓冲区溢出漏洞"
updated = "2026-06-16T21:50:31.527"

