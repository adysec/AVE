[basic]
description = "FrontPage 97/98 服务器扩展中的 htimage.exe 和 Imagemap.exe 组件存在缓冲区溢出漏洞，远程攻击者可通过向目标服务器发送特制的请求触发该漏洞，导致服务器执行任意代码或拒绝服务。该漏洞影响 FrontPage 97/98 Server Extensions，CVSS 评分 7.5，危害等级高。攻击者无需身份认证即可利用，主要威胁 Web 服务器安全。"
published = "2000-04-19"
remediation = "立即卸载 FrontPage 97/98 Server Extensions，或删除 htimage.exe 和 Imagemap.exe 文件。若仍需使用，升级至 FrontPage 2000 Server Extensions 及以上版本（已修复该漏洞）。建议迁移至现代 Web 服务器，不再使用已停止维护的 FrontPage 扩展组件。"
score = 7.5
severity = "HIGH"
sources = [
    "cve",
    "epss",
]
title = "Microsoft FrontPage 97/98 Server Extensions 服务器端图像映射组件缓冲区溢出漏洞"
updated = "2000-04-19"

