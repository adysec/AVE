[basic]
description = "Cisco IOS 11.1 至 11.3 版本中启用了分布式快速交换（DFS）功能的路由器存在访问控制列表绕过漏洞。当路由器将流量从启用了 DFS 的入站接口交换到具有逻辑子接口的出站接口时，远程攻击者可利用此缺陷绕过 ACL 访问控制列表的过滤规则，导致未授权网络流量进入受保护网络段。该漏洞影响 Cisco IOS 11.1-11.3 版本，CVSS 评分 7.5，危害等级高。Cisco 已发布安全公告并提供修复建议。"
published = "1999-12-31T05:00:00.000"
remediation = "升级 Cisco IOS 至 11.3(6) 或更新版本以修复该漏洞。临时缓解措施：在接口配置模式下使用 `no ip route-cache distributed` 命令禁用分布式快速交换（DFS），或避免在启用了 DFS 的入站接口与逻辑子接口出站接口之间路由流量。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "Cisco IOS 分布式快速交换访问控制列表安全绕过漏洞"
updated = "2026-06-16T21:50:29.897"

