[basic]
description = 'Netscape Communicator 4.04 至 4.7 版本（以及可能的其他版本）在多种 UNIX 操作系统中运行时，会将字符 0x8b 转换为 "<" 符号，将字符 0x9b 转换为 ">" 符号。远程攻击者可在未对上述字符进行过滤的 CGI 程序中注入恶意脚本代码，当其他用户访问该页面时触发跨站脚本执行，导致敏感信息泄露或会话劫持。该漏洞影响广泛的 UNIX 平台 Netscape 浏览器用户，CVSS 评分 7.5，危害等级高。建议升级至不受影响的版本或部署额外的输入过滤机制。'
published = "1999-10-05T04:00:00.000"
remediation = "建议立即停止使用 Netscape Communicator 浏览器，迁移至 Firefox 或 Chrome 等受支持的现代浏览器。同时，Web 服务端 CGI 程序应对用户输出中的 0x8b 和 0x9b 字符进行 HTML 实体编码或过滤，防止跨站脚本攻击。由于 Netscape Communicator 已停止维护，无安全补丁可用，升级浏览器是唯一的根本解决方案。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "Netscape Communicator 跨站脚本漏洞"
updated = "2026-06-16T21:50:16.097"

