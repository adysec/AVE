[basic]
description = "Sybergen SyGate 2.0 及 3.11 版本存在拒绝服务漏洞，未经身份认证的远程攻击者可通过向目标系统内部网络接口发送特制的畸形 DNS UDP 数据包，导致 SyGate 代理服务崩溃，无法正常处理网络请求，造成共享上网服务中断。该漏洞利用方式简单，无需用户交互即可触发，影响使用 SyGate 作为共享上网网关的网络环境。"
published = "2000-06-30T04:00:00.000"
remediation = "由于 Sybergen Sygate 已停止维护且无官方补丁，建议立即停用该产品并迁移至受支持的防火墙软件（如 Windows Defender 防火墙或第三方企业级产品）。如无法立即迁移，可在网络边界防火墙配置规则过滤格式异常的 DNS UDP 数据包，同时在 Sygate 策略中限制内部接口接收的 DNS 流量来源，仅允许可信 DNS 服务器通信作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Sybergen Sygate 拒绝服务漏洞"
updated = "2026-06-16T21:52:01.067"

