[basic]
description = "Tridia DoubleVision 3.07.00 的 dvtermtype 组件存在缓冲区溢出漏洞，本地攻击者可通过向终端类型参数传递超长字符串触发栈溢出，覆盖返回地址并执行任意代码，从而提升至 root 权限。该漏洞影响 Tridia DoubleVision 3.07.00 版本，CVSS 7.2 分值（本地攻击、低复杂度、无需认证、完全影响 CIA），攻击者需具备本地账户访问权限并能执行 dvtermtype 程序，利用方式为构造超长终端类型参数触发缓冲区溢出实现提权。ExploitDB (EDB-20230) 及多个 GitHub 仓库均有公开 PoC 验证代码。"
published = "2000-11-14T05:00:00.000"
remediation = "建议立即卸载或升级 Tridia DoubleVision 至最新修复版本（建议升级至 3.07.00 之后的修复版本或联系厂商获取补丁）。若无法立即升级，可通过限制本地用户对 dvtermtype 二进制文件的执行权限（chmod 700 /usr/local/dv/bin/dvtermtype 或 chown root:root 并 chmod 4750）作为临时缓解措施，并限制本地非特权用户登录权限。建议尽快迁移至现代远程管理工具替代该旧版软件。"
score = 7.2
severity = "HIGH"
sources = ["cve"]
title = "Tridia DoubleVision dvtermtype 缓冲区溢出本地权限提升漏洞"
updated = "2026-06-16T21:52:37.840"

