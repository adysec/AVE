[basic]
description = "Delegate 应用代理（Delegate application proxy）5.9.x及6.0.x版本存在缓冲区溢出漏洞，远程攻击者可通过向目标服务发送特制的网络请求触发该漏洞，导致任意代码执行。该漏洞影响广泛使用 Delegate 代理的服务器环境，CVSS 评分 7.5，危害等级高危，建议用户及时升级至修复版本。"
published = "1999-11-13T05:00:00.000"
remediation = "立即升级 Delegate（ETL Delegate）至 6.1.0 或更高版本，该版本已修复多个缓冲区溢出漏洞。若无法升级，需在防火墙层面限制仅受信 IP 地址可访问 Delegate 代理服务（默认端口 8080），并启用应用层输入长度校验作为临时缓解措施。由于该软件已停止维护，建议迁移至 Nginx 或 HAProxy 等仍在维护的代理服务器。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "NEC Delegate 远程缓冲区溢出漏洞"
updated = "2026-06-16T21:51:08.143"

