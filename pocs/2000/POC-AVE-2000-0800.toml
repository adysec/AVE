[basic]
description = "FrontPage 97/98 Server Extensions 中的 htimage.exe 和 imagemap.exe 组件存在缓冲区溢出漏洞。服务端图像映射组件在处理用户提交的特制图像映射请求时，未对输入长度进行正确的边界校验，导致缓冲区溢出。攻击者通过向托管受影响 FrontPage 扩展的 Web 服务器发送精心构造的 HTTP 请求，可触发漏洞，服务器崩溃并可能导致任意代码执行，从而获得超出正常网站功能范围的非法访问权限。"
published = "2000-04-21"
remediation = "升级 FrontPage Server Extensions 到安全版本或应用厂商提供的安全补丁，建议升级到最新支持版本并立即应用 2000 年 6 月发布的 MS00-028 安全更新。"
score = 7.5
severity = "HIGH"
sources = [
    "exploitdb",
    "github",
    "nvd",
]
title = "微软 FrontPage 97/98 Server Extensions 图像映射缓冲区溢出漏洞"
updated = "2000-06-01"

