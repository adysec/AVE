[basic]
description = "Novell NetWare 5 及更早版本在 IPX 协议上运行且数据包签名级别低于 3 时存在权限提升漏洞。远程攻击者可通过伪造 IPC 分片数据包中的 MAC 地址，发送特制的 NetWare 核心协议（NCP）调用请求，从而绕过身份验证获取管理员权限。该漏洞影响 Novell NetWare 系列操作系统，CVSS 评分 10.0，危害等级严重。"
published = "1999-07-15T04:00:00.000"
remediation = "Novell NetWare 已停止维护多年，建议立即迁移至受支持的目录服务与文件服务器方案（如 Microsoft Active Directory + Windows Server 文件服务）。如仍在使用 NetWare，须将所有服务器和客户端的包签名级别（Packet Signature Level）设置为 3，并在组策略中禁止用户自行修改签名级别；管理员工作站应使用交换式以太网环境，避免与普通用户处于同一广播域；同时限制 IPX 协议仅用于受信任网段，并在防火墙上阻断不必要的 IPX 流量。"
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "Novell NetWare IPX管理会话伪骗漏洞"
updated = "2026-06-16T21:49:41.520"

