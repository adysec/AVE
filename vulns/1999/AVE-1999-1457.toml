[basic]
description = "Microsoft Windows 95及Windows NT 4.0的TCP/IP协议栈实现存在安全漏洞。远程攻击者无需认证即可通过发送PSH ACK等特殊构造的数据包，强制目标重置连接并从响应包中获取目标的最后一个序列号，随后伪造RST数据包断开目标与对端的TCP连接，造成拒绝服务。该漏洞影响所有运行Windows 95和Windows NT 4.0的系统。"
published = "1998-10-05"
remediation = "Windows 95和Windows NT 4.0已停止支持，建议升级到受支持的Windows版本。若无法升级，在网络边界部署防火墙过滤异常TCP包并启用TCP序列号随机化机制。"
score = 5.0
severity = "MEDIUM"
sources = ["cve"]
title = "Microsoft Windows 95/NT 4.0 TCP/IP 实现远程TCP连接重置漏洞"
updated = "2024-06-16"

