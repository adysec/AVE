[basic]
description = "SSH 2.0.12 及可能其他版本在用户认证过程中存在信息泄露漏洞。服务端对有效用户名与无效用户名的处理逻辑存在差异：有效用户名可多次尝试输入密码，而无效用户名仅提示一次即断开连接。未经认证的远程攻击者可通过发送大量 SSH 认证请求，根据服务器响应模式（是否提示输入密码而非立即拒绝）来枚举目标系统上存在的用户账户名。该漏洞虽不直接导致代码执行或权限提升，但枚举出的有效账户为后续暴力破解、密码喷洒或社会工程攻击提供了精准目标，显著降低了进一步攻击的门槛。"
published = "1999-06-09T04:00:00.000"
remediation = "升级至 OpenSSH 7.9 及以上版本，该版本对所有用户统一返回相同的密码提示次数，避免通过交互差异枚举有效账号。如无法立即升级，可改用键盘交互认证（KeyboardInteractive）替代密码认证，或在 sshd_config 中设置 `MaxAuthTries 1` 并将 `LogLevel VERBOSE` 以记录异常枚举行为作为临时缓解。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "SSH SSH 用户枚举漏洞"
updated = "2026-06-16T21:49:59.880"

