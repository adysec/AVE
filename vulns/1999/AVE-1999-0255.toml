[basic]
description = "CDE 桌面环境中的 dtaction 工具的 AddSuLog 函数存在缓冲区溢出漏洞。本地攻击者可通过向该函数传递超长的用户名字符串触发缓冲区溢出，成功利用此漏洞可获得目标系统的 root 权限。该漏洞影响 DIGITAL UNIX 4.0、AIX 4.3.2、CDE 2.1、IRIX 6.5.14 及 Solaris 7.0 等多个 UNIX 操作系统版本，CVSS 评分 7.2，危害等级高。"
published = "1999-09-13T04:00:00.000"
remediation = "针对各受影响系统安装对应厂商补丁：Digital UNIX 安装 Patch Kit 4.0f，AIX 安装 APAR IX89654，Solaris 安装补丁 107081-03 或更高版本，IRIX 安装 Patch 3930。临时缓解措施可移除 dtaction 的 setuid root 权限（chmod u-s /usr/dt/bin/dtaction），或限制可登录系统的本地用户范围。"
score = 7.2
severity = "HIGH"
sources = ["epss"]
title = "多厂商 CDE dtaction 工具缓冲区溢出本地权限提升漏洞"
updated = "2026-06-16T21:48:51.420"

