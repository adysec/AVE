[basic]
description = "在 Windows NT 系统中，用户账户可能被不当添加到高权限用户组（如 Administrators、Backup Operators、Domain Admins 等），导致低权限用户意外获得超出预期的系统访问权限。该漏洞源于系统组策略配置缺陷或管理失误，攻击者可利用已获取的低权限账户通过提权操作完全控制目标系统，影响 Windows NT 4.0 及更早版本。"
published = "1999-01-01T05:00:00.000"
remediation = "立即审查所有域控制器和成员服务器上 Administrators、Backup Operators、Domain Admins、Power Users 等高权限组的成员列表，移除非必要或未授权的用户账户。通过「管理工具 → 计算机管理 → 本地用户和组 → 组」逐一检查各组成员，确保仅保留最小必要权限。部署安全基线策略（如 Microsoft Security Compliance Toolkit），定期审计组成员变更日志，并启用 Windows 审核策略中的「组成员管理」事件审计。升级至 Windows Server 2003 或更高版本以利用细化的权限委派机制（如委派控制向导），避免将普通用户加入内置特权组。"
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "Microsoft Windows NT 用户组成员权限配置不当漏洞"
updated = "2026-06-16T21:48:43.093"

