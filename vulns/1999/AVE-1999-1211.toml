[basic]
description = "ucbmail 邮件处理程序存在命令注入漏洞，当从 INN（InterNetNews）新闻传输系统接收邮件时，未能正确过滤邮件内容中的 shell 元字符，远程攻击者可通过向目标系统发送特制的包含 shell 元字符的邮件数据包触发该漏洞，导致在目标服务器上以邮件服务进程权限执行任意命令。该漏洞影响运行 ucbmail 的 SPARC 架构系统，CVSS 评分 7.2，危害等级高。"
published = "1997-02-20T05:00:00.000"
remediation = "升级 INN 至 1.5.1 版本，并应用 ISC 提供的安全补丁 security-patch.04（下载地址 ftp://ftp.isc.org/isc/inn/patches/security-patch.04）。升级后务必执行 `make update` 并重启 INN 服务。如无法立即升级，可先应用对应版本的补丁（1.5 用 security-patch.01，1.4sec 用 security-patch.02，1.4unoff3/4 用 security-patch.03），再叠加 security-patch.04。同时检查 ucbmail 配置，确保 shell 元字符被正确过滤。"
score = 7.2
severity = "HIGH"
sources = ["epss"]
title = "Sun Microsystems Solaris ucbmail 远程代码执行漏洞"
updated = "2026-06-16T21:49:13.473"

