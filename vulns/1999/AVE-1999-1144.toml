[basic]
description = "Celtech ExpressFS FTP 服务器 2.x 版本存在缓冲区溢出漏洞，远程攻击者无需身份认证即可通过向 FTP 服务的 USER 命令发送超长字符串触发该漏洞，导致目标 FTP 服务进程崩溃引发拒绝服务，在特定条件下可能进一步实现任意代码执行。该漏洞影响 ExpressFS FTP 2.x 全版本，CVSS 评分 7.5，危害等级高。"
published = "2001-11-28T05:00:00.000"
remediation = "ExpressFS FTP Server 已停止维护且不再有安全更新，建议立即迁移至 vsftpd 或 ProFTPD 等受支持的文件传输服务。若无法更换，须在防火墙层面限制该 FTP 服务的源 IP 白名单访问，并部署 IPS 规则拦截超长 USER 命令的流量。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "Celtech ExpressFS FTP服务器 缓冲区溢出漏洞"
updated = "2026-06-16T21:50:36.223"

