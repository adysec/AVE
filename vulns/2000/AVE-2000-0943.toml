[basic]
description = "iputils 工具包中的 ping 命令存在缓冲区溢出漏洞，漏洞位于 outpack 或 buf 变量中。本地攻击者可通过向 ping 程序发送特制的网络数据包触发缓冲区溢出，导致内存数据被破坏，从而获取目标系统的 root 权限。该漏洞影响 Red Hat Linux 6.2 至 7J 及其他使用 iputils 20001010 之前版本的操作系统，攻击者需拥有本地访问权限，无需用户交互即可完成利用。"
published = "2000-10-18T04:00:00.000"
remediation = "升级 iputils 至 20001010 或更高版本。Red Hat Linux 用户可通过官方渠道更新 iputils 软件包，或从 https://www.skbuff.net/iputils/ 获取源码编译安装。如无法升级，可通过移除 ping 的 SUID 位（chmod u-s /bin/ping）限制本地非授权用户执行 ping 来缓解风险。"
score = 4.6
severity = "MEDIUM"
sources = ["redhat"]
title = "iputils ping 缓冲区溢出本地权限提升漏洞"
updated = "2026-06-16T21:53:23.813"

