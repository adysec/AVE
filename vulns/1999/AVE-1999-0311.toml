[basic]
description = "Compaq Tru64 UNIX 操作系统的 edauth 命令存在权限管理缺陷，本地攻击者无需额外认证即可利用该命令读取系统上的敏感文件，导致机密信息泄露。该漏洞影响 Compaq Tru64 UNIX 多个版本，攻击者需拥有本地系统访问权限方可利用，CVSS 评分 2.1，危害等级低。"
published = "1999-02-15"
remediation = "Compaq（现 HP）已针对 Tru64 UNIX 的 edauth 命令漏洞发布安全补丁，建议用户联系厂商获取对应操作系统版本的补丁程序，或升级到已修复该漏洞的 Tru64 UNIX 版本。由于该产品已停止主流支持，建议迁移至受支持的替代操作系统。"
score = 2.1
severity = "LOW"
sources = [
    "cve",
    "avd",
]
title = "Compaq Tru64 UNIX edauth 命令漏洞"
