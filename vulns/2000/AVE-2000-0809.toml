[basic]
description = "Microsoft Jet 数据库引擎中的 Text I-ISAM 组件存在安全漏洞，攻击者可通过构造特制的数据库查询语句，利用该组件对目标系统上的文本文件进行非授权修改。该漏洞影响使用 Jet 数据库引擎的应用程序（如 Microsoft Access 等），攻击者无需高级权限即可触发，可能导致数据完整性受损。CVSS 评分 7.6，危害等级高。"
published = "1999-07-28T04:00:00.000"
remediation = "安装 Microsoft Jet 数据库引擎安全更新 (MS99-030)，或升级至 Jet 4.0 Service Pack 5 及以上版本。如无法安装补丁，可通过限制对 Jet 数据库引擎的访问权限、禁用不必要的文本数据源 I-ISAM 驱动作为临时缓解措施。"
score = 7.6
severity = "HIGH"
sources = ["cve"]
title = "Microsoft Jet 数据库引擎 Text I-ISAM 组件文本文件修改漏洞"
updated = "2026-06-16T21:51:28.597"

