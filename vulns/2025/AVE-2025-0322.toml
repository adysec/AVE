[basic]
description = "南昊网上阅卷系统 `biaozhi_paper.jsp` 页面存在 SQL 注入漏洞，由于该页面未对用户输入的参数进行充分的过滤和转义处理，攻击者可通过构造特制的 SQL 语句注入到后端数据库查询中，进而获取数据库中的敏感信息（如用户账号、密码、试卷数据等），甚至可能通过 `xp_cmdshell` 等扩展功能获取服务器操作系统权限。该漏洞影响南昊网上阅卷系统的相关版本，攻击者只需能够访问该 Web 页面且无需身份认证即可实施攻击，危害较大。"
published = "0724"
remediation = "南昊网上阅卷系统 biaozhi_paper.jsp 存在 SQL 注入漏洞，建议立即升级到厂商最新发布的安全版本。在升级前，可通过 Web 应用防火墙（WAF）对包含 biaozhi_paper.jsp 的请求进行 SQL 注入特征拦截，过滤 union、select、insert、update、delete、drop 等关键字及单引号、分号等特殊字符。同时对该 JSP 页面的输入参数进行白名单校验，仅允许预期的数字型参数传入，拒绝非法字符。升级后应确保所有数据库查询使用预编译语句（PreparedStatement）替代字符串拼接，并对所有用户输入进行服务端验证与转义处理。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "南昊 网上阅卷系统 SQL注入漏洞"
updated = "0724"

