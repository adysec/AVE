CVE-1999-1166 is about ISS Internet Scanner 5.3 for Linux - the install.iss script allows local users to change permissions of arbitrary files.
- Description: "install.iss installation script for Internet Security Scanner (ISS) for Linux, version 5.3, allows local users to change the permissions of arbitrary files via a symlink attack on a temporary file."
- CVSS v2.0: Score 7.2 HIGH, Vector: (AV:L/AC:L/Au:N/C:C/I:C/A:C)
- Published: 02/20/1999
- References: http://www.securityfocus.com/archive/1/12640
- CWE: NVD-CWE-Other
