[basic]
description = "Allaire JRun 2.3.3 服务器存在任意代码执行漏洞。远程攻击者可利用跨站脚本（XSS）攻击向目标系统注入恶意 JSP 代码，随后直接调用 com.livesoftware.jrun.plugins.JSP Servlet 编译并执行该代码，导致无需认证的远程代码执行。该漏洞影响 Allaire JRun 2.3.x 版本，CVSS 评分为 10.0，危害等级严重。"
published = "2000-12-11T05:00:00.000"
remediation = "立即升级到 Allaire JRun 2.3.3 以上版本（安装 ASB00-29 安全补丁），或迁移至 Adobe ColdFusion 等受支持平台。临时缓解措施：在 Web 服务器配置中禁止直接访问 /servlet/ 前缀路径，并限制应用程序写入 Web 文档根目录下的文件，防止攻击者通过 XSS 注入 JSP 恶意代码。"
score = 10
severity = "CRITICAL"
sources = ["exploitdb"]
title = "Allaire JRun JSP Servlet 远程代码执行漏洞"
updated = "2026-06-16T21:53:03.580"

