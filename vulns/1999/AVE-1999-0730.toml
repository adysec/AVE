[basic]
description = "MediaHouse Software Statistics Server 4.28 及 5.1 版本中存在基于栈的缓冲区溢出漏洞，远程攻击者可通过向服务器发送特制的超长 'Server ID' 参数触发该漏洞，导致缓冲区边界溢出，进而覆盖返回地址，最终实现远程代码执行。攻击者无需身份认证即可利用此漏洞，成功利用后可完全控制受影响服务器。该漏洞 CVSS 评分 5.0，危害等级中危，建议用户升级至最新版本或应用厂商提供的补丁。"
published = "1999-09-30T04:00:00.000"
remediation = "该漏洞影响已停止维护的 MediaHouse Software Statistics Server 4.28/5.1，厂商已无安全更新。建议立即停用该产品并迁移至受支持的替代统计服务软件。如无法立即迁移，应在网络边界防火墙配置规则，限制仅可信 IP 访问 Statistics Server 端口，并在应用层部署入侵检测系统（IDS）拦截包含超长 Server ID 字段的恶意请求。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "MediaHouse Software Statistics Server 4.28/5.1 Server ID 缓冲区溢出漏洞"
updated = "2026-06-16T21:49:21.207"

