[basic]
description = "Solaris 8 及更早版本中 mailtool 所调用的 Xview 库存在缓冲区溢出漏洞。本地攻击者可通过设置超长的 OPENWINHOME 环境变量触发该漏洞，导致缓冲区溢出，从而以 mailtool 进程权限执行任意代码，实现本地权限提升。该漏洞影响 Solaris 8 及之前版本，攻击者需拥有本地账户才能利用，CVSS 评分 4.6，危害等级中危。"
published = "2001-08-14T04:00:00.000"
remediation = "立即安装 Sun 官方补丁 108434-03 或更高版本（适用于 Solaris 8），该补丁修复了 Xview 库在处理 OPENWINHOME 环境变量时的缓冲区溢出问题。对于 Solaris 7 及更早版本，请安装对应补丁 108435-03。如无法立即打补丁，可通过限制本地用户登录、移除 mailtool 的 setuid 权限作为临时缓解措施。由于 Solaris 8 已停止支持，建议迁移至 Solaris 11 或受支持的替代操作系统。"
score = 4.6
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Sun Solaris mailtool 本地缓冲区溢出漏洞"
updated = "2026-06-16T21:54:28.087"

