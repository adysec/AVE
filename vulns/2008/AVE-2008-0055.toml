[basic]
description = 'Sun xVM VirtualBox 1.6.4 之前版本的 VBoxDrv.sys 驱动中 VBoxDrvNtDeviceControl 函数对 IOCTL 使用了 METHOD_NEITHER 通信方式，且未正确验证 Irp 对象关联的内核地址缓冲区，导致本地攻击者可通过打开 \\.\VBoxDrv 设备并调用 DeviceIoControl 发送精心构造的内核地址触发漏洞，实现本地权限提升。该漏洞 CVSS 评分 8.8，危害等级高，影响所有 1.6.4 以下版本。'
published = "2008-08-05T19:41:00.000"
remediation = '升级 Sun xVM VirtualBox 至 1.6.4 或更高版本，该版本已修复 VBoxDrv.sys 驱动中对 IOCTL 缓冲区验证不足的问题。若无法立即升级，可限制本地用户对 \\.\VBoxDrv 设备的访问权限作为临时缓解措施。'
score = 8.8
severity = "HIGH"
sources = ["kev"]
title = "Sun xVM VirtualBox 权限提升漏洞"
updated = "2026-06-16T22:55:48.933"

