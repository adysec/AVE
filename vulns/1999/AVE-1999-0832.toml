[basic]
description = "Microsoft SQL Server 7.0存在输入验证缺陷，攻击者可通过发送畸形TDS数据包远程导致数据库服务崩溃，造成拒绝服务。该漏洞不会泄露数据或获得管理员权限，受影响机器可通过重启SQL服务恢复。仅当防火墙开放1433端口时才可被远程利用。"
published = "1999-11-19"
remediation = "安装Microsoft安全公告MS99-059发布的补丁，或升级至SQL Server 7.0 SP1a或更高版本，同时限制防火墙对1433端口的访问。"
score = 5.0
severity = "MEDIUM"
sources = [
    "cve",
    "exploitdb",
]
title = "Microsoft SQL Server 7.0 畸形TDS数据包拒绝服务漏洞"
