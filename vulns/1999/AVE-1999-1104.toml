[basic]
description = 'Microsoft Zero Administration Kit (ZAK) 1.0 的 Appstation 模式存在安全策略绕过漏洞。在应用白名单机制下，用户可通过 Office 97（如 Word）启动资源管理器 Explorer，进而将恶意软件安装至 TEMP 目录并重命名为允许执行的应用名称（如 Winword.exe），从而绕过"仅允许运行指定应用"策略。该漏洞允许受限用户在目标系统上执行任意未经授权的程序，破坏了 ZAK 的安全隔离机制。'
published = "2005-01-07T05:00:00.000"
remediation = "此漏洞存在于 ZAK 1.0 及 Office 97 环境中，建议升级至 Windows 2000 及以上版本，使用组策略（GPO）中的软件限制策略替代 ZAK，并启用 AppLocker（Windows 7+/Server 2008 R2+）限制非授权程序运行。同时限制用户对 TEMP 目录的写入权限，移除不必要的 Office 97 组件。"
score = 4.6
severity = "MEDIUM"
sources = ["avd"]
title = "Microsoft Zero Administration Kit (ZAK) 安全策略绕过漏洞"
updated = "2026-06-16T21:50:25.593"

