[basic]
description = "Apache HTTP Server 2.0.41 及更早版本中的 mod_dav 模块未能正确处理版本控制钩子（versioning hooks），存在空指针解引用漏洞。远程攻击者无需身份认证即可通过发送特制的 WebDAV 请求触发空指针解引用，导致 Apache 子进程崩溃，在 preforked 多进程模式下引发 CPU 资源耗尽，造成拒绝服务。该漏洞影响 Apache HTTP Server 2.0.41 及之前版本，升级至 2.0.42 及以上版本可修复。"
published = "2002-09-25T04:00:00.000"
remediation = "立即将 Apache HTTP Server 升级至 2.0.42 或更新版本，此版本修复了 mod_dav 处理 versioning hooks 时存在的空指针解引用缺陷。如无法立即升级，可在 httpd.conf 中注释或移除 LoadModule dav_module modules/mod_dav.so 行以禁用 WebDAV 功能，缓解拒绝服务攻击风险。"
score = 5
severity = "MEDIUM"
sources = ["osv"]
title = "Apache HTTP Server mod_dav 拒绝服务漏洞"
updated = "2026-06-16T21:59:37.033"

