[basic]
description = "ISC BIND 8.2.x 的 TSIG（事务签名）处理代码中存在缓冲区溢出漏洞，未经身份认证的远程攻击者可通过向 DNS 服务器发送特制的 TSIG 请求数据包触发栈溢出，导致远程代码执行并以 root 权限控制目标系统。该漏洞影响 BIND 8.2.x 系列版本，由于 DNS 服务通常以特权用户身份运行，成功利用可导致服务器完全失陷。"
published = "2001-02-12T05:00:00.000"
remediation = "立即升级 BIND 至 9.0.0 及以上版本（BIND 8 全系列已停止维护，不再发布安全补丁）。如无法升级，可在配置文件中禁用 TSIG 动态更新功能（options { tsig-lifetime 0; };）或在防火墙层面限制对 DNS 服务器 53/TCP 端口的访问来源。BIND 9 已完全重写 TSIG 处理逻辑，不受此漏洞影响。"
score = 10
severity = "CRITICAL"
sources = ["exploitdb"]
title = "ISC BIND 8 TSIG 远程栈缓冲区溢出漏洞"
updated = "2026-06-16T21:53:29.060"

