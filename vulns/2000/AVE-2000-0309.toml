[basic]
description = "Wired Community Software 开发的 WWWThreads 5.0 论坛软件存在 SQL 注入漏洞。该漏洞源于程序对传递给 SQL 查询的数字类型参数及表名未进行充分过滤和净化处理，导致远程攻击者可在无需认证的情况下，向查询参数中注入恶意 SQL 语句，从而非法获取论坛管理权限，进而实现数据窃取、篡改或完全控制论坛系统。CVSS 评分 7.5，危害等级高。"
published = "2000-02-03T05:00:00.000"
remediation = "建议升级至 WWWThreads 5.1 及以上版本，该版本已修复 SQL 查询中数值参数和表名参数未过滤的问题。如无法升级，应手动对所有传入 SQL 查询的用户输入进行严格过滤：数值参数使用 int() 强制类型转换，表名参数采用白名单校验，禁止直接拼接用户输入到 SQL 语句中，同时使用参数化查询替代字符串拼接。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "Wired Community Software WWWThreads 5.0 SQL注入漏洞"
updated = "2026-06-16T21:51:03.143"

