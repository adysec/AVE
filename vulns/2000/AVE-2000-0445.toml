[basic]
description = "Mirabilis ICQ 2000.0a 版本的网页邮件客户端在登录过程中会创建全局可读的临时文件，且登录完成后未及时删除，导致本地攻击者可通过读取该临时文件获取用户的登录凭据等敏感信息。该漏洞属于不完整清理（CWE-459），影响 ICQ 2000.0a 版本，需要本地系统访问权限，CVSS 评分 5.5，危害等级中危。"
published = "2000-06-06T04:00:00.000"
remediation = '升级到 ICQ 2000b 或更高版本，该版本修复了临时文件权限问题。如无法升级，在每次登录后手动删除 `C:\Program Files\ICQ\` 下生成的临时文件（`.tmp` 后缀），或通过组策略限制本地用户对临时目录的读取权限。Mirabilis ICQ 2000a 已在登录时创建全局可读临时文件且未删除，导致本地用户可窃取敏感信息。'
score = 5.5
severity = "MEDIUM"
sources = ["cve"]
title = "Mirabilis ICQ 2000.0 A 临时文件未清理致本地敏感信息泄露漏洞"
updated = "2026-06-16T21:51:58.990"

