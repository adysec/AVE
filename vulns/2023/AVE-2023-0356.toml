[basic]
title = "Linux 内核 thermal 子系统设备注册引用计数错误漏洞"
description = "Linux 内核 thermal 核心模块在 __thermal_cooling_device_register() 函数中存在设备引用计数使用不当缺陷，put_device() 在 device_register() 失败前被错误调用，且在部分错误路径上不必要地调用了 thermal_cooling_device_destroy_sysfs()。本地攻击者可利用此缺陷触发内核对象错误释放，导致系统崩溃或拒绝服务。该漏洞 CVSS 评分 5.5，攻击者需本地低权限访问，无需用户交互。"
severity = "MEDIUM"
score = 5.5
