[basic]
description = "surfCONTROL SuperScout 网页内容过滤软件在处理以点号（.）结尾的网站 URL 时存在分类失效漏洞。当用户访问带有尾部点号的域名时，该软件无法正确识别和匹配预设的访问控制策略，导致被限制访问的网站被错误地归类为允许访问，从而使内部用户能够绕过 Web 访问限制规则。攻击者只需在受限制网站的域名末尾添加一个点号即可触发该漏洞，利用难度极低，影响企业内容过滤策略的有效性。"
published = "2000-02-03T05:00:00.000"
remediation = "升级到 surfCONTROL SuperScout 最新可用版本，或迁移至受支持的 Web 过滤解决方案（如 Microsoft Defender for Cloud Apps 或 Forcepoint Web Security）。在 URL 过滤规则中增加对尾随点号（.）的规范化处理，确保所有 URL 在分类前去除末尾点号。如无法升级，在代理服务器或网关层面添加自定义规则，将含末尾点号的 URL 重写为标准格式后再进行过滤。"
score = 2.1
severity = "LOW"
sources = ["avd"]
title = "surfCONTROL SuperScout 安全绕过漏洞"
updated = "2026-06-16T21:51:03.020"

