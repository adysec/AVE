[basic]
description = "Linuxconf 是一个 Linux 系统配置工具，其早期版本在处理远程 HTTP 请求时存在缓冲区溢出漏洞。攻击者可以通过发送超长请求参数触发溢出，进而在目标服务器上以 root 权限执行任意代码，完全控制受影响的 Linux 系统。该漏洞影响广泛，利用条件简单，无需身份认证即可远程利用。"
published = "2000-01-01"
remediation = "升级 linuxconf 至厂商发布的安全补丁版本，或通过防火墙限制对 linuxconf 管理端口的远程访问，仅允许可信网络地址访问该服务。"
score = 10.0
severity = "CRITICAL"
sources = ["cve"]
title = "Linuxconf 远程缓冲区溢出漏洞"
updated = "2000-01-01"

