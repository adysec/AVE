[basic]
description = "Dansie Shopping Cart 3.0.4 的 cart.pl 脚本存在信息泄露漏洞，远程攻击者可通过向 env、db 或 vars 等表单变量发送特制 URL 请求，无需任何身份认证即可获取购物车数据库及系统配置信息，导致敏感数据泄露。该漏洞利用方式简单，影响范围较广，CVSS 评分 5.0，危害等级中等。"
published = "2000-04-14T04:00:00.000"
remediation = "建议立即升级 Dansie Shopping Cart 至最新版本（3.0.5 或更高），在 Apache/IIS 的 Web 根目录中移除或重命名 cart.pl 文件；如不再使用该软件，应彻底卸载并删除所有相关 CGI 脚本。在无法升级时，在 Web 服务器层限制对 cart.pl 的访问，仅允许授权 IP 请求该脚本，并在 Perl 脚本入口处过滤 env/db/vars 等敏感参数输入。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Dansie Shopping Cart 3.0.4 信息泄露漏洞"
updated = "2026-06-16T21:51:19.827"

