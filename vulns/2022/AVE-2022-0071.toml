[basic]
description = "Linux 内核 netfs 库在 RCU 读锁保护下遍历 xarray 时，缺少 xas_retry() 调用检查，导致迭代器可能返回 xarray 内部特殊标记值而非有效指针，访问该值会触发空指针解引用导致内核崩溃。该漏洞影响使用 netfs 的 Linux 内核版本（如 ceph 等网络文件系统），本地攻击者可通过构造特定文件读取操作序列触发此条件竞争，造成拒绝服务。"
published = "2025-05-01T15:16:04.347"
remediation = "建议升级 Linux 内核至 5.15.78、5.16.4 或更高版本（含对应 LTS 分支修复），该修复已合入主线并回移植各稳定分支。如无法升级内核，可禁用 netfs 相关功能（如减少 ceph 文件系统使用）作为临时缓解措施，但不推荐长期使用。"
score = 5.5
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux kernel netfs 空指针解引用漏洞"
updated = "2026-06-17T05:19:12.043"

