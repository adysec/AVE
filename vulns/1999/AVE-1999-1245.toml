[basic]
description = "HP-UX 操作系统自带的 passwd 命令在处理命令行参数时存在缓冲区溢出漏洞。由于未对用户输入长度进行充分校验，本地攻击者可通过向 passwd 命令传递超长参数触发栈溢出，覆盖返回地址，从而以 root 权限执行任意代码。该漏洞允许无特权的本地用户完全控制受影响的 HP-UX 系统，属于典型的本地权限提升漏洞。"
published = "1997-05-14"
remediation = "安装 HP-UX 安全公告 HPSBUX9701-045 中提供的补丁程序，或升级到修复此漏洞的 HP-UX 版本。如无法立即升级，建议限制非必要用户的本地登录权限，并监控 passwd 命令的异常调用行为。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "HP-UX passwd 命令缓冲区溢出漏洞"
updated = "2026-06-16"

