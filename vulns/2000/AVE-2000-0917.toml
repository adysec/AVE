[basic]
description = "O'Reilly WebSite Pro 2.3.7 在安装时将 uploader.exe 程序设置为所有用户可执行权限，导致远程攻击者无需身份认证即可直接调用该上传程序，向服务器上传并执行任意恶意文件。该漏洞影响 O'Reilly WebSite Pro 2.3.7 版本，攻击者只需能够访问目标服务器的 Web 服务即可利用，危害较大。"
published = "2000-10-20T04:00:00.000"
remediation = "立即删除或重命名 WebSite Pro 安装目录下的 uploader.exe 文件，或移除该文件对匿名用户的执行权限（chmod 750 uploader.exe）。在 Web 服务器或防火墙层面限制对 /uploader.exe 路径的外部访问。建议升级到不受影响的版本或迁移至其他受支持的 Web 服务器软件。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "O'Reilly WebSite Pro 任意文件上传与执行漏洞"
updated = "2026-06-16T21:52:26.580"

