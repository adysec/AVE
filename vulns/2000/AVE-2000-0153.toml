[basic]
description = "Sun StarOffice 5.1 的 StarScheduler Web 服务器组件存在路径遍历漏洞，远程攻击者无需身份认证即可通过向目标发送包含 `..`（点点）序列的恶意 HTTP 请求，实现任意文件读取。该漏洞可导致服务器上的敏感文件（如配置文件、密码文件等）被未授权访问，影响运行 StarOffice 5.1 的系统。攻击者只需能够访问目标 Web 服务端口即可利用，攻击门槛较低。"
published = "2000-03-09T05:00:00.000"
remediation = "升级到 Sun StarOffice 5.2 或更高版本，官方已在新版中修复了路径遍历漏洞。如无法升级，在 StarOffice 配置中禁用 StarScheduler Web 服务器组件，或在防火墙层面限制对 8080 端口的访问。鉴于该产品已停止维护，建议迁移至 Apache OpenOffice 或 LibreOffice 等活跃维护的开源办公套件。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Sun StarOffice 5.1 任意文件读取漏洞"
updated = "2026-06-16T21:51:09.300"

