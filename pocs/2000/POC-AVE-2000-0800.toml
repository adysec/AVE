[info]
author = "ave"
description = "检测 Microsoft FrontPage 97/98 Server Extensions 中 htimage.exe/Imagemap.exe 组件是否存在。该组件存在缓冲区溢出漏洞，远程攻击者可通过发送特制 GET 请求触发溢出导致任意代码执行或拒绝服务。"
id = "POC-AVE-2000-0800"
name = "CVE-2000-0256 PoC"
severity = "high"
tags = ["ave-2000-0800"]
vuln_id = [
    "CVE-2000-0256",
    "AVE-2000-0800",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/cgi-bin/htimage.exe"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "ImageMap",
    "Content-Type:",
    "htimage",
]

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/cgi-bin/Imagemap.exe"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "ImageMap",
    "Content-Type:",
    "Imagemap",
]
