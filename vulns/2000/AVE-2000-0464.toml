[basic]
description = "Canna 3.5 b2 版本输入系统中存在缓冲区溢出漏洞，远程攻击者可通过向目标系统发送特制的 SR_INIT 命令，并在其中包含超长用户名或组名字段，触发缓冲区溢出，从而在目标系统上执行任意命令。该漏洞无需身份认证即可利用，危害等级严重，CVSS 评分高达 10.0，影响使用 Canna 3.5 b2 版本的系统。"
published = "2000-07-02T04:00:00.000"
remediation = "升级 Canna 至 3.2.2 或更高稳定版本；在配置文件 /etc/hosts.canna 中限制允许访问的主机列表，仅放行 localhost 和必要可信主机；如非必需使用 Canna 服务，可直接卸载该软件包；使用 ipfw/ipf 防火墙限制外部对 Canna 端口（tcp/5680）的访问作为临时缓解。"
score = 10
severity = "CRITICAL"
sources = ["cve"]
title = "Canna Canna 输入法系统 远程缓冲区溢出漏洞"
updated = "2026-06-16T21:52:03.060"

