[basic]
description = "Microsoft Internet Information Server (IIS) 的 ASP 缓存机制存在信息泄露漏洞。当两个虚拟服务器共享同一物理目录时，ASP 脚本缓存未能正确隔离不同虚拟服务器之间的数据，导致攻击者可通过向目标服务器发送特制请求，获取同一物理目录下其他虚拟站点的敏感信息。该漏洞影响多个 IIS 版本，公开利用难度较低，可能导致网站配置文件、源代码等敏感数据泄露，CVSS 评分 5.0，危害等级中等。"
published = "1999-01-27T05:00:00.000"
remediation = "建议立即安装 Microsoft KB Q197003 安全更新（包含于 Windows NT 4.0 Security Rollup Package），该更新修复了 ASP 脚本缓存在虚拟服务器间的隔离问题。如无法安装补丁，应将每个虚拟服务器配置为使用独立的物理目录，避免不同虚拟主机共用同一目录；也可在 IIS 管理控制台中禁用 ASP 脚本文件缓存作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Microsoft IIS ASP 缓存信息泄露漏洞"
updated = "2026-06-16T21:48:12.237"

