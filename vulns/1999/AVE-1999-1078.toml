[basic]
description = "Windows NT 4.0 SP2 之前版本的 Win32k.sys 内核模块中存在参数校验缺陷，本地用户通过向特定 WIN32K 函数传递异常参数触发该漏洞，可导致系统内核崩溃引发拒绝服务。由于该漏洞需要本地访问权限且仅为 DoS 影响，危害等级较低。Microsoft 在 Windows NT 4.0 SP2 中修复了此问题。"
published = "1999-12-31T05:00:00.000"
remediation = "安装 Windows NT 4.0 Service Pack 2 (SP2) 或更高版本，该补丁修复了 Win32k.sys 对畸形参数的处理缺陷。如无法升级，可通过限制本地用户对系统的交互式登录权限降低风险。"
score = 2.1
severity = "LOW"
sources = ["cve"]
title = "Microsoft Windows NT Win32k.sys 本地拒绝服务漏洞"
updated = "2026-06-16T21:50:16.720"

