[basic]
description = "Microsoft Hotmail 网页邮件服务存在跨站脚本攻击漏洞，攻击者可在邮件内容中嵌入 HTML STYLE 标签并注入恶意 JavaScript 代码。当用户使用 Internet Explorer 5 或 Netscape Communicator 4.0/4.5/4.6 等早期浏览器查看该邮件时，由于 Hotmail 未对 STYLE 标签中的脚本内容进行充分过滤，注入的恶意脚本将在 Hotmail 页面上下文中执行。攻击者可借此窃取用户会话令牌、读取邮件内容或在用户账号中执行任意命令，无需受害者进行额外交互操作。该漏洞影响使用受影响浏览器访问 Hotmail 的所有用户，CVSS 评分 5.1，危害等级为中等。"
published = "1999-09-13T04:00:00.000"
remediation = "该漏洞位于 Hotmail 服务端，普通用户无需操作，由微软在服务器端修复 STYLE 标签过滤逻辑后自动生效。终端用户应将 Internet Explorer 升级至 5.01 SP2 或更高版本、Netscape Communicator 升级至 4.7 以上，并在浏览器中禁用活动脚本（IE：Internet选项→安全→自定义级别→禁用“活动脚本”；Netscape：编辑→首选项→高级→取消“启用JavaScript”）作为临时缓解。"
score = 5.1
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Microsoft Hotmail JavaScript 跨站脚本执行漏洞"
updated = "2026-06-16T21:48:58.727"

