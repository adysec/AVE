[basic]
description = "Windows NT 4.0 和 Windows 2000 系统的 DCE/RPC 协议实现中存在拒绝服务漏洞。远程攻击者无需身份认证即可向目标主机发送特制的 SMBwriteX 请求，其中包含无效的数据长度字段，导致目标系统在处理该畸形请求时消耗大量资源或崩溃，从而无法正常提供服务。该漏洞利用门槛低，只需通过网络发送恶意构造的数据包即可触发，影响范围涵盖 Windows NT 4.0 和 Windows 2000 全系版本。"
published = "2000-06-05T04:00:00.000"
remediation = "此漏洞影响已停止安全支持的 Windows NT 4.0 与 Windows 2000 系统。微软已发布安全公告 MS00-044 提供补丁，但该版本已生命周期终止（EOL），不再接收安全更新。建议立即升级至受支持的 Windows 版本（如 Windows Server 2019/2022）。若无法升级，应禁用 SMBv1 协议，同时在网络防火墙层面阻止 TCP 端口 139 和 445 的入站流量作为临时缓解。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Microsoft Windows NT 4.0/2000 DCE/RPC SMBwriteX 拒绝服务漏洞"
updated = "2026-06-16T21:51:57.897"

