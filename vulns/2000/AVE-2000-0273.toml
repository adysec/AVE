[basic]
description = "XFree86 3.3.x 版本（X11R6 相关实现）在处理 X 服务器命令行参数时，对 -xkbmap 参数的长度未做充分边界校验，存在栈缓冲区溢出漏洞。本地攻击者可在启动 X 服务器时传入超长的 -xkbmap 参数，覆盖栈上返回地址或关键数据，进而以 X 服务器的权限（通常为 root）执行任意命令，实现本地提权。该漏洞的攻击条件为攻击者需具备本地访问权限并能控制 X 服务器的启动命令行参数。CVSS 评分约 7.2，危害等级为高危，可导致权限提升与任意代码执行。"
published = "2000-04-16"
remediation = "将 XFree86 升级至已修复该问题的 3.3.6 版本或 4.0 及以上发行版；若暂时无法升级，应移除 X 服务器二进制文件的 setuid 权限（chmod u-s /usr/X11R6/bin/X），并限制普通本地用户启动 X 服务器及使用 -xkbmap 参数的能力，以阻断本地提权利用路径。"
score = 7.2
severity = "HIGH"
sources = ["cve"]
title = "XFree86 X11R6 -xkbmap 参数缓冲区溢出本地代码执行漏洞"
updated = "2026-07-19"

