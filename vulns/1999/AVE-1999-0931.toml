[basic]
description = "Microsoft Windows NT 4.0 系统的 AEDebug 注册表项在安装时被配置了不安全的访问控制权限，导致本地普通用户能够修改该注册表项的值。攻击者（已具备本地登录权限的用户）可将调试器路径指向其预先放置的特制木马程序（Trojan Horse）。当目标系统发生崩溃并触发错误调试机制时，系统会自动以高权限运行该被篡改的调试器，从而执行攻击者指定的恶意代码，实现本地权限提升。该漏洞属于本地利用型漏洞，利用前提是攻击者已能在目标主机上以普通用户身份登录并执行操作，无需远程网络访问，危害相对有限但可破坏系统完整性。"
published = "1999-12-31T05:00:00.000"
remediation = '升级至 Windows 2000 或更高版本系统，该漏洞已在后续版本中修复。如无法升级，可通过注册表编辑器 (regedt32) 将 HKEY_LOCAL_MACHINE\SYSTEM\CurrentControlSet\Control\Session Manager\Memory Management\AEDebug 键的权限设置为仅允许 Administrators 组完全控制，移除 Everyone 和 Users 组的写入权限。'
score = 4.6
severity = "MEDIUM"
sources = ["exploitdb"]
title = "微软 Windows NT 4.0 中间件用户外壳文件夹权限安全漏洞"
updated = "2026-06-16T21:49:41.253"

