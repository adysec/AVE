[basic]
description = "Internet Explorer 4.01 及 5 版本中集成的 HHOpen ActiveX 控件（hhopen.ocx）1.0.0.1 存在缓冲区溢出漏洞。远程攻击者可通过向该控件的 OpenHelp 方法传递超长参数触发缓冲区溢出，从而在用户浏览器上下文中执行任意命令。攻击者需诱导用户访问恶意网页即可完成利用，影响范围广泛，CVSS 评分 5.1，危害等级中危。"
published = "1999-10-31T04:00:00.000"
remediation = '升级到 Internet Explorer 5.01 SP2 或更高版本（如 IE 5.5/6.0），并通过「Internet 选项 → 安全 → 自定义级别」将 ActiveX 控件与插件中的"对未标记为可安全执行脚本的 ActiveX 控件初始化和脚本运行"设为禁用，或使用 kill-bit 禁用 hhopen.ocx (CLSID 为 AdBEEF00-2B54-11D3-8B9B-00C04F8EF2FF) 的实例化，临时缓解可将受信任站点之外的区域限制为不运行 ActiveX 控件。'
score = 5.1
severity = "MEDIUM"
sources = ["cve"]
