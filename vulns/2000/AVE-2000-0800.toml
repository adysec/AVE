[basic]
description = "Microsoft FrontPage 97/98 服务器扩展中的 htimage.exe 和 Imagemap.exe 组件存在缓冲区溢出漏洞。远程攻击者可通过向目标服务器发送特制的 HTTP 请求触发该溢出，导致服务器执行任意代码或拒绝服务。该漏洞影响 FrontPage 97/98 Server Extensions，攻击者无需身份认证即可利用，危害等级高。"
published = "2000-04-19T04:00:00.000"
remediation = '立即删除受影响服务器上所有 Htimage.exe 和 Imagemap.exe 文件，这些文件通常位于 FrontPage Server Extensions 安装目录下（如 `%ProgramFiles%\Common Files\Microsoft Shared\Web Server Extensions`）。对于使用 Windows NT 4.0 Option Pack 或 Personal Web Server 4.0 的系统，同样需搜索并移除这两个组件。ISP 应同时在 FrontPage Server Extensions 管理界面中限制用户上传时重新引入这两个文件。长期建议升级至 FrontPage 2000 Server Extensions 或更高版本。'
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "Microsoft FrontPage 97/98 Server Extensions 缓冲区溢出漏洞"
updated = "2026-06-16T21:51:20.110"

