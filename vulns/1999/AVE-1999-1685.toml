[basic]
description = "Ipswitch IMail 5.0 的 IMonitor 服务存在缓冲区溢出漏洞，未经身份认证的远程攻击者可通过向目标系统的 8181 端口发送超长字符串触发该漏洞，导致拒绝服务，甚至可能执行任意命令。该漏洞影响 Ipswitch IMail 5.0 版本，CVSS 评分 10.0，危害等级为严重。"
published = "1999-03-01T05:00:00.000"
remediation = "建议立即将 Ipswitch IMail 升级至 6.0 或更高版本，该版本已修复 IMonitor 在 8181 端口的缓冲区溢出问题。如暂时无法升级，应在防火墙/边界设备上封锁对 TCP 8181 端口的外部访问，仅允许可信管理网段连接，并停用非必需的 IMonitor 服务，同时启用连接速率限制以降低拒绝服务风险。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "Ipswitch IMail 5.0 IMonitor 缓冲区溢出拒绝服务漏洞"
updated = "2026-06-16T21:49:35.570"

