[info]
author = "ave"
description = "检测 SunOS 4.1-4.1.3 系统中 /usr/etc/crash 文件是否存在 SUID 权限位，具有 SUID 的 crash 工具允许普通用户以 root 权限访问内核内存，进而实现本地提权"
id = "POC-AVE-1999-1548"
name = "Sun SunOS crash SUID 权限检测 PoC"
severity = "high"
tags = ["ave-1999-1548"]
vuln_id = [
    "CVE-1999-1507",
    "AVE-1999-1548",
]

[poc]
logic = "all"

[[poc.requests]]
path = "/usr/etc/crash"
protocol = "file"

[[poc.requests.matchers]]
expect = true
part = "body"
regex = ".+"
type = "regex"
