[basic]
description = "MHonArc 2.5.12 及更早版本中存在跨站脚本（XSS）漏洞，远程攻击者可通过向目标用户发送包含恶意脚本代码的 MIME 头名称的电子邮件，当 MHonArc 将邮件归档转换为 HTML 页面时，未对 MIME 头名称进行充分过滤和转义，导致恶意脚本在用户浏览器中执行。成功利用该漏洞可窃取用户会话 Cookie、劫持会话或进行钓鱼攻击。攻击者无需身份认证，仅需诱使用户访问包含恶意邮件的归档页面即可触发。"
published = "2002-11-29T05:00:00.000"
remediation = "升级 MHonArc 至 2.5.13 或更高版本（2.5.13 已修复 MIME 头部 XSS 过滤缺陷）。Debian 用户可通过 DSA-199 安全公告更新至 2.5.2-1.2（woody）或 2.5.13-1（unstable）。如无法升级，可在 MHonArc 配置中启用 `MIMEFILTERS` 指令对邮件 MIME 头部进行 HTML 实体编码过滤，阻止恶意脚本注入。"
score = 6.8
severity = "MEDIUM"
sources = ["osv"]
title = "MHonArc 2.5.12 及之前版本 MIME 邮件头跨站脚本漏洞"
updated = "2026-06-16T21:59:05.180"

