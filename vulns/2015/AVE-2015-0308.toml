[basic]
description = "Microsoft Internet Explorer 11 存在内存破坏漏洞（CVE-2015-2425），属于越界写入类型（CWE-787）。攻击者通过构造恶意网页诱导用户访问，利用 IE 11 内存管理缺陷触发内存破坏，可导致远程代码执行或拒绝服务。该漏洞影响 IE 11 浏览器，CVSS 3.1 评分 8.8（HIGH），攻击向量为网络，攻击复杂度低，无需权限但需要用户交互，影响机密性、完整性和可用性均为高。该漏洞不同于 CVE-2015-2383 和 CVE-2015-2384，已被列入 CISA 已知被利用漏洞目录，Microsoft 已发布安全更新修复。攻击者需诱导受害者访问精心构造的恶意网站即可触发漏洞，实现远程代码执行或导致浏览器崩溃拒绝服务。"
published = "2015-07-14T21:59:36.813"
remediation = '建议立即安装 Microsoft 2015 年 7 月安全更新 MS15-065 (KB3065822)，通过 Windows Update 自动更新或从 Microsoft Update Catalog 手动下载安装对应 IE 11 补丁（Windows 7 SP1/Server 2008 R2 对应 KB3065822，Windows 8.1/Server 2012 R2 对应 KB3065820，Windows 10 对应 KB3074683）。无法立即打补丁时，可暂时禁用 IE 的 VBScript 脚本引擎（通过组件服务禁用 VBScript.dll 注册）或改用 Chrome/Firefox 等替代浏览器作为临时缓解措施，并部署网络层 IPS 规则拦截针对 IE 内存破坏的攻击载荷特征。建议尽快完成全网补丁部署并验证补丁安装状态（检查注册表 HKEY_LOCAL_MACHINE\SOFTWARE\Microsoft\Windows\CurrentVersion\Uninstall\ 下对应 KB 编号）。'
score = 8.8
severity = "HIGH"
sources = ["kev"]
title = "微软 Internet Explorer 内存破坏漏洞"
updated = "2026-06-17T00:24:05.047"

