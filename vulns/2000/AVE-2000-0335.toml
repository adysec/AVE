[basic]
description = "Microsoft IIS 4.0 和 5.0 存在畸形扩展名数据拒绝服务漏洞。远程攻击者可通过向目标 Web 服务器发送包含大量文件扩展名的超长复杂 URL 请求，导致 IIS 服务在处理畸形扩展名数据时耗尽系统资源或崩溃，从而造成拒绝服务。该漏洞无需身份认证即可远程触发，影响运行 IIS 4.0 和 5.0 的 Windows 服务器系统。"
published = "2000-05-11T04:00:00.000"
remediation = "安装 Microsoft 安全公告 MS00-030 对应的补丁程序：IIS 4.0 下载补丁 36FF8BC0-6D6A-4F5E-92AB-14E3800CF4DD，IIS 5.0 下载补丁 D6F4F73C-457C-4575-A797-69FBFE4A5B13；同时安装 KB260205 更新。鉴于 IIS 4.0/5.0 已停止支持，建议升级到受支持的 Windows Server 版本（如 Windows Server 2019/2022）并启用 URL 请求筛选以限制超长复杂 URL。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Microsoft IIS 4.0/5.0 畸形文件扩展名拒绝服务漏洞"
updated = "2026-06-16T21:51:39.220"

