[basic]
description = "Compaq Insight Management Agent 4.23及之前版本、Management Agents for Servers 4.40及之前版本在安装BMC Patrol组件时，会创建一个名为PFCUser的默认账户，该账户使用固定默认密码且拥有潜在危险权限。远程攻击者可利用该默认账户登录系统，获取未授权访问权限，进而执行任意操作。此漏洞属于弱配置缺陷，影响大量使用Compaq管理代理的服务器系统。"
published = "1999-12-31T05:00:00.000"
remediation = "立即修改 PFCUser 账户的默认密码为强口令，或删除该默认账户；升级 Compaq Insight Management Agent 至 4.24 及以上版本，或 Management Agents for Servers 至 4.41 及以上版本；在防火墙层面限制对管理端口的访问，仅允许受信任 IP 连接。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "BMC Patrol 默认口令配置漏洞"
updated = "2026-06-16T21:50:15.847"

