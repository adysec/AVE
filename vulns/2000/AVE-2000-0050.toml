[basic]
description = "Nortel Contivity HTTP 服务器的 cgiproc CGI 脚本存在任意文件读取漏洞，远程攻击者无需身份认证即可通过向该脚本传入指定文件名参数，读取服务器上的任意文件，导致敏感信息泄露。该漏洞影响 Nortel Contivity 系列 VPN 设备，CVSS 评分 5.0，危害等级中等。"
published = "2000-01-17T05:00:00.000"
remediation = "立即禁用 contivity HTTP 服务器上的 cgiproc CGI 脚本（删除或重命名该脚本文件），或升级到 Nortel 官方发布的最新固件版本。如无法升级，在反向代理或防火墙层面阻止对 `/cgiproc` 路径的外部访问请求，并将该设备隔离在网络边界，避免暴露在公网。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Nortel Contivity HTTP Server CGI 任意文件读取漏洞"
updated = "2026-06-16T21:50:55.487"

