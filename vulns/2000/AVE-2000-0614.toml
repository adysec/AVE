[basic]
description = "xinetd 2.1.8.x 版本在基于主机名进行访问控制时存在安全限制绕过漏洞。当连接客户端缺少反向 DNS 记录（PTR 记录）时，xinetd 无法正确解析其主机名，导致基于主机名的访问控制规则失效。远程攻击者可利用此漏洞，通过伪造或省略反向 DNS 记录的方式绕过 xinetd 配置的访问限制，从而访问本应被限制的服务。该漏洞影响使用 xinetd 2.1.8.x 且开启基于主机名访问控制的 Unix/Linux 系统，CVSS 评分 7.5，危害等级高。"
published = "2000-06-04T04:00:00.000"
remediation = "升级 xinetd 至 2.1.8.9pre6 或更高版本（推荐升级至 2.3.15 稳定版），该版本修复了反向 DNS 解析失败时仅依赖主机名进行访问控制导致绕过的问题。如无法升级，请在 only_from/no_access 配置中改用 IP 地址而非主机名进行访问控制，并确保网络环境配置正确的反向 DNS 解析。Debian 用户可通过 apt install xinetd 更新至修复版本。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = """The user wants me to generate a Chinese vulnerability title for CVE-2000-0536. The format is "厂商 产品 漏洞类型" in Chinese. Let me analyze the known information: - CVE-2000-0536 - Affects xinetd 2.1.8.x - It's about connection restriction bypass when hostnames are used for access control and the connecting host doesn't have a reverse DNS entry - The vulnerability allows bypassing access controls Title format: "厂商 产品 漏洞类型" - 厂商 (Vendor): xinetd (or just state it as xinetd since it's an open-source project/service) - 产品 (Product): xinetd - 漏洞类型 (Vulnerability type): 连接限制绕过漏洞 (connection restriction bypass) The original title from AVD is "xinetd 2.1.8.x连接限制漏洞" I think a good title would be: "xinetd 2.1.8.x 连接限制绕过漏洞" This follows the pattern: "厂商/产品 版本 漏洞类型" which is appropriate since xinetd is both the product name and effectively the "vendor"/project name.xinetd 是一个独立的开源服务，厂商/产品合一。漏洞本质是使用主机名"""
updated = "2026-06-16T21:51:56.867"

