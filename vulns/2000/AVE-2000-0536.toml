[basic]
description = "BEA WebLogic 5.1.x 的 JSPServlet 存在访问控制缺陷，远程攻击者无需认证即可直接调用该 Servlet 编译执行任意 JSP 源文件，从而在服务器上执行任意 Java 代码，完全控制目标系统。该漏洞影响 BEA WebLogic 5.1.x 全版本，CVSS 评分 10.0，危害等级严重。厂商已发布安全补丁修复此漏洞。"
published = "2000-10-20T04:00:00.000"
remediation = "立即将 BEA WebLogic Server 升级至 5.1.0 SP8 或更高版本，该版本修复了 JSPServlet 未正确限制访问权限的问题，阻止远程攻击者直接调用 Servlet 编译任意源文件。如无法立即升级，可在 web.xml 中通过 security-constraint 限制对 /servlet/* 路径的访问，仅允许受信任用户或内部网络调用，同时使用反向代理在网络层过滤对 JSPServlet 的直接请求。此外，禁用服务器上未使用的 JSP 编译功能，并确保普通用户无法上传任意文件至可被 Servlet 访问的目录。"
score = 10
severity = "CRITICAL"
sources = ["cve"]
title = "BEA WebLogic JSPServlet 远程代码执行漏洞"
updated = "2026-06-16T21:52:15.797"

