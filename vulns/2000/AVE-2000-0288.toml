[basic]
description = "Zone Labs ZoneAlarm 2.1.10 及更早版本的个人防火墙存在安全策略绕过漏洞。该防火墙未正确过滤源端口为 67（DHCP 服务端口）的 UDP 数据包，远程攻击者可利用此缺陷，通过发送源端口为 67 的特制 UDP 报文绕过防火墙规则，直接与目标系统内部服务通信，从而实施进一步攻击。该漏洞影响 ZoneAlarm 2.1.10 及之前版本，CVSS 评分 7.5，危害等级高。厂商已发布更新版本修复此问题。"
published = "2000-04-24T04:00:00.000"
remediation = "升级 ZoneAlarm 至 2.1.11 或更高版本，该版本已修复 UDP 源端口 67 绕过防火墙的缺陷；如无法升级，在防火墙自定义规则中添加对 UDP 源端口 67 入站流量的过滤拦截，作为临时缓解措施。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "Zone Labs ZoneAlarm 个人防火墙 UDP 端口 67 过滤绕过漏洞"
updated = "2026-06-16T21:51:30.653"

