[basic]
description = "中科汇联 EasySite 系统存在 XStream 反序列化安全漏洞，攻击者可构造包含恶意载荷的特制 XML 数据，通过向目标系统的 XStream 反序列化接口发送该数据触发反序列化操作，从而在服务端执行任意代码。该漏洞影响中科汇联 EasySite 系列版本，攻击无需身份认证，远程即可利用，危害严重。建议升级至修复版本或限制反序列化接口访问。"
published = "0703"
remediation = "升级EasySite系统中XStream组件至1.4.20及以上版本，内置安全框架默认启用白名单机制，阻止反序列化恶意类；如无法升级，可通过XStream的addPermission接口配置白名单，仅允许必要类进行反序列化，同时在WAF侧添加规则拦截包含恶意XML payload的请求作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "中科汇联 EasySite系统 XStream反序列化远程代码执行漏洞"
updated = "0703"

