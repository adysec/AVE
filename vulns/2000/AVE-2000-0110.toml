[basic]
description = "MS FrontPage服务器扩展中的htimage.exe CGI程序存在路径泄露漏洞。该漏洞允许远程攻击者通过向虚拟目录的htimage.exe程序发送特定的GET请求，获取到服务器的物理文件路径信息。该漏洞影响MS FrontPage服务器及其构建的虚拟目录环境。攻击者无需身份验证即可利用此漏洞，获取敏感的服务器文件路径信息，为进一步攻击提供情报支持，CVSS评分5.0，危害等级中等。该漏洞本质上是FrontPage Server Extensions CGI处理程序对用户输入缺乏有效验证，允许攻击者通过简单HTTP请求获取服务器内部路径信息。"
published = "2000-02-03T05:00:00.000"
remediation = "升级至 FrontPage 2000 Server Extensions SR-1 及以上版本（含 MS00-057 补丁），或在 IIS 中删除/禁用 _vti_bin/htimage.exe CGI 程序；若无法升级，可配置 URLScan 或 IIS 请求筛选规则拦截含 htimage.exe 的 GET 请求作为临时缓解"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Microsoft FrontPage Server Extensions htimage.exe 路径泄露漏洞"
updated = "2026-06-16T21:51:02.767"

