[basic]
description = "Third Voice Web Annotation 工具存在跨站脚本（XSS）漏洞。远程攻击者可在网页注释中注入恶意 JavaScript 代码，当其他 Third Voice 用户浏览被注释的页面时，注入的脚本会在用户浏览器中执行，导致攻击者能够窃取用户的敏感数据（如 Cookie、会话令牌）或伪造虚假网页内容实施钓鱼攻击。该漏洞影响 Third Voice Web Annotation 工具，攻击者无需身份认证即可利用，CVSS 评分 6.4，危害等级中危。"
published = "1999-12-31T05:00:00.000"
remediation = "立即卸载 Third Voice 浏览器插件/软件，该产品已停止维护且不再提供安全更新。使用现代浏览器（Chrome/Firefox/Edge 最新版）的内置 XSS 过滤机制防御此类攻击。如需网页标注功能，请改用 Diigo、Hypothesis 等仍在维护的替代工具。"
score = 6.4
severity = "MEDIUM"
sources = ["avd"]
title = "Third Voice Web Annotation 跨站脚本漏洞"
updated = "2026-06-16T21:49:51.783"

