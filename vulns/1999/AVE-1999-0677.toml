[basic]
description = "Computer Software Manufaktur（CSM）公司出品的 Alibaba 2.0 Web 服务器存在多个 CGI 程序漏洞。远程攻击者可在构造的畸形 URL 中插入管道符（|），使服务器在处理请求时将其后的内容作为操作系统命令执行，从而实现远程命令执行。由于漏洞可通过网络直接远程利用，无需身份认证，任何能够访问目标 Web 服务端口的攻击者均可发起攻击。受影响范围为运行 Alibaba 2.0 版本 Web 服务器的系统，攻击方式主要是向服务器发送包含管道符及 shell 命令的恶意 HTTP 请求，利用存在缺陷的 CGI 脚本触发命令注入。"
published = "1999-11-03T05:00:00.000"
remediation = "建议将 Computer Software Manufaktur Alibaba Web Server 升级到官方后续修复版本（2.0 之后的安全版本），并删除或禁用服务器上可被远程调用的存在缺陷的 CGI 脚本与可执行目录。若暂时无法升级，应在 Web 服务器前端部署防火墙或反向代理，过滤 URL 中包含管道符（|）及其他 Shell 元字符的畸形请求，禁止向 CGI 程序直接传入未经过滤的命令行参数以缓解远程命令执行风险。"
score = 3.6
severity = "LOW"
sources = ["avd"]
title = "Computer Software Manufaktur Alibaba 2.0 多个CGI漏洞"
updated = "2026-06-16T21:49:15.570"

