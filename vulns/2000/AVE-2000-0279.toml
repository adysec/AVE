[basic]
description = "WebStar HTTP 服务器存在缓冲区溢出漏洞，远程攻击者无需身份认证即可向目标服务器发送超长的 GET 请求，触发缓冲区溢出，导致服务进程崩溃，造成拒绝服务。该漏洞影响多个版本的 WebStar HTTP Server，攻击条件简单，危害等级中危（CVSS 5.0）。"
published = "2000-03-31T05:00:00.000"
remediation = "Webstar HTTP Server 已停止维护多年，无法通过官方补丁修复。建议立即迁移至受支持的 Web 服务器（如 Apache、Nginx 或 IIS），迁移前可配置防火墙限制仅允许可信 IP 访问 80 端口，并部署反向代理设置请求行长度限制（如限制 GET 请求 URI 不超过 1024 字节）作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Webstar HTTP Server 缓冲区溢出拒绝服务漏洞"
updated = "2026-06-16T21:51:24.517"

