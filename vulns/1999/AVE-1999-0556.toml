[basic]
description = "IBM AIX 操作系统的批处理队列（bsh）存在权限提升漏洞。当网络打印服务启用时，本地或远程攻击者可通过向批处理队列提交特制任务，利用不充分的权限控制机制获取超出授权的系统访问权限，导致攻击者能够执行任意命令或操作。该漏洞影响早期版本的 AIX 系统，CVSS 评分 7.5，危害等级高。"
published = "1994-06-03T04:00:00.000"
remediation = "立即安装 IBM 针对 AIX batch queue (bsh) 的安全补丁，升级到 AIX 4.3.3 及更高修复版本。如无法打补丁，可通过 `chsubserver -r bsh` 禁用 bsh 网络打印服务，或在 `/etc/security/user` 中限制 bsh 可执行权限仅为 root 用户。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "IBM AIX batch queue (bsh) 本地和远程权限提升漏洞"
updated = "2026-06-16T21:48:10.850"

