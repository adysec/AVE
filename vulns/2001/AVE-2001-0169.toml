[basic]
description = "`NTPd`（NTP 网络时间协议守护进程）4.0.99k 及更早版本中存在基于栈的缓冲区溢出漏洞，远程攻击者无需身份认证即可通过向 ntpd 服务发送特制的 `readvar` 参数触发该漏洞，由于程序未对用户输入长度进行有效校验，超长参数导致缓冲区溢出。成功利用该漏洞可导致服务崩溃拒绝服务，甚至以进程权限执行任意代码。该漏洞影响包括 Unix/Linux 及各类嵌入式设备在内的多平台 NTPd 部署环境，攻击条件简单（远程网络可达即可），CVSS 评分 10.0。Metasploit 框架已有公开利用模块。"
published = "2001-06-18T04:00:00.000"
remediation = "立即将 ntpd（NTP 守护进程）升级至 4.0.99l 或更高版本。各发行版用户请安装对应安全更新：Red Hat 安装 RHSA-2001-045 提供的更新包；Debian 安装 DSA-045 补丁；FreeBSD 应用 SA-01:31 安全公告中的补丁；Mandrake 安装 MDKSA-2001-036 更新。如无法立即升级，可在防火墙中限制对 NTP 服务（默认端口 123/UDP）的访问，仅允许受信任的源 IP 连接。"
score = 10
severity = "CRITICAL"
sources = ["exploitdb"]
title = "NTPd ntpd 守护进程 readvar 远程缓冲区溢出漏洞"
updated = "2026-06-16T21:54:15.800"

