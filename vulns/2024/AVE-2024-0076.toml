[basic]
description = "万户 ezOFFICE OA 系统的 OfficeServer.jsp 接口存在未授权文件上传漏洞。该接口未对上传文件的类型与内容进行有效校验，攻击者在未认证情况下，可通过向 /defaultroot/public/iWebOfficeSign/OfficeServer.jsp 发送特制的 DBSTEP 协议 POST 请求，将 FILETYPE 参数设为路径穿越值，并将恶意 JSP 代码作为文件体上传至服务器可解析目录，从而在目标系统上写入 WebShell 并实现远程代码执行。该漏洞影响使用万户 ezOFFICE OA 的相关版本，仅需网络可达且能访问该接口即可触发，危害较大。"
published = "0724"
remediation = "建议立即将万户 ezOFFICE OA 升级至厂商发布的安全补丁版本（2024 年官方修复版），并登录系统后台在「公共组件/iWebOfficeSign」模块中禁用 OfficeServer.jsp 的文件保存（SAVEFILE）功能、限制上传文件类型为白名单。如无法立即升级，可在 Web 服务器（如 Tomcat）层面对 /defaultroot/public/iWebOfficeSign/ 路径下的 .jsp 请求配置禁止解析，或通过反向代理/WAF 拦截包含 DBSTEP 头及 OPTION=U0FWRUZJTEU=（SAVEFILE）的 POST 请求作为临时缓解措施。"
score = 5
