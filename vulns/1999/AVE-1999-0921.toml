[basic]
description = "Webmin 0.5 之前版本存在认证机制缺陷，对有效用户名的登录密码尝试次数未作限制，远程攻击者可利用该漏洞对目标系统实施暴力枚举攻击，通过不断尝试常用或弱口令来猜测系统管理员密码，从而获取 Webmin 管理面板的访问权限并最终控制服务器。该漏洞影响 Webmin 0.5 及更早版本，属于高风险缺陷，攻击门槛较低，且无需提前获取任何认证凭据。"
published = "1999-12-31T05:00:00.000"
remediation = "立即升级 Webmin 至 0.5 或更高版本，该版本已限制同一用户名的密码尝试次数。如无法升级，可在 Webmin 前端配置额外认证模块（如 fail2ban）限制登录频率，并在防火墙层面将 Webmin 管理端口（默认 10000）仅对可信 IP 开放，同时启用强密码策略作为临时缓解措施。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "Webmin 密码暴力破解漏洞"
updated = "2026-06-16T21:49:40.017"

