[basic]
description = "OpenBSD 2.4 的 poll 系统调用存在拒绝服务漏洞。远程攻击者可通过向目标系统发送特制请求触发 poll 函数异常处理，导致系统内核崩溃或服务不可用。该漏洞影响 OpenBSD 2.4 版本，CVSS v2 评分 5.0，攻击复杂度低，无需认证即可远程触发，危害等级中等。建议升级到 OpenBSD 2.5 或更高版本以修复此问题。"
published = "1999-03-22"
remediation = "立即升级至 OpenBSD 2.5 或更高版本，该漏洞已在 OpenBSD 2.4 errata 003 号补丁中修复。如无法升级，可下载并应用 OpenBSD 官方提供的 poll(2) 源码补丁（https://www.openbsd.org/errata24.html#poll），重新编译内核后重启系统。对于已停止维护的旧版本，建议迁移至受支持的 OpenBSD 最新稳定版。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "OpenBSD poll 拒绝服务漏洞"
updated = "1999-03-22"

