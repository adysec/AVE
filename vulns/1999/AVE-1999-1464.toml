[basic]
description = "FreeBSD 2.1.5 之前版本中的 rzsz 模块所实现的 Z-Modem 协议存在设计缺陷，远程攻击者可通过向客户端发送特制文件，在 rz 程序处理过程中利用协议命令注入执行任意代码。该漏洞影响 FreeBSD 操作系统，危害等级高，可能导致目标系统被完全控制。需升级至 FreeBSD 2.1.5 或更高版本以修复此漏洞。"
published = "1996-07-16T04:00:00.000"
remediation = "升级 FreeBSD 至 2.1.5 或更高版本，该版本已修复 rz/rzsz 模块中 Z-Modem 协议的设计缺陷。如无法升级，建议禁用 rz/sz 命令的 setuid 权限，并限制仅受信来源可发起文件传输。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "FreeBSD rzsz 组件 Z-Modem 协议远程代码执行漏洞"
updated = "2026-06-16T21:50:08.943"

