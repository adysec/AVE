[basic]
description = "Cisco IOS Telnet 守护进程存在拒绝服务漏洞，远程攻击者可在 Telnet 协商阶段尚未就绪时向目标系统发送特制的 ENVIRON 选项数据包，触发设备处理异常导致系统重新启动。该漏洞影响 Cisco IOS 11.x 及 12.x 版本（至 12.0.7），攻击者无需身份认证即可实施攻击，造成目标设备服务中断，严重影响网络可用性。"
published = "2000-04-20T04:00:00.000"
remediation = "立即升级 Cisco IOS 至 12.0(7.1) 或更高维护版本，修复 Telnet 守护进程对 ENVIRON 选项的异常处理缺陷。无法立即升级时，建议禁用 Telnet 服务并改用 SSH 进行远程管理，同时在边界防火墙或路由器访问控制列表中限制对 Telnet 端口（TCP 23）的访问，仅允许可信管理地址连接。对于仍在运行 IOS 11.x 的设备，需先迁移至 IOS 12.x 再应用补丁版本。参考 Cisco 安全公告 cisco.com/warp/public/707/iostelnetopt-pub.shtml 获取具体修复版本信息。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Cisco IOS Telnet Daemon 拒绝服务漏洞"
updated = "2026-06-16T21:51:21.700"

