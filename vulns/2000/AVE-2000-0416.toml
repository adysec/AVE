[basic]
description = "Atrus Trivalie Productions 开发的 Simple Network Time Sync (SMTS) 守护程序 1.0 版本存在缓冲区溢出漏洞。远程攻击者无需身份认证，通过向目标系统发送超长字符串即可触发该漏洞，导致服务崩溃或执行任意代码。由于 SMTS 默认监听网络端口且未对输入长度进行有效校验，攻击条件简单，危害严重。CVSS 评分 10.0，影响系统完整性与可用性。"
published = "2000-06-01T04:00:00.000"
remediation = "立即卸载 Simple Network Time Sync 1.0 并替换为受维护的 NTP 服务（如 chrony 或 ntpd），通过包管理器安装并启用 chrony：`yum install chrony && systemctl enable --now chronyd`（CentOS）或 `apt install chrony && systemctl enable --now chrony`（Debian）。同时在防火墙层面限制 UDP 724 端口入站流量，仅允许受信任的 NTP 服务器 IP 访问：`iptables -A INPUT -p udp --dport 724 -s <信任IP> -j ACCEPT && iptables -A INPUT -p udp --dport 724 -j DROP`。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "Atrus Trivalie Productions Simple Network Time Sync 守护程序缓冲区溢出漏洞"
updated = "2026-06-16T21:51:51.177"

