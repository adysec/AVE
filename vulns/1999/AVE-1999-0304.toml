[basic]
description = 'SGI IRIX 6.2 系统中的 cgi-bin wrap 程序存在目录遍历漏洞，远程攻击者通过向目标发送包含 ".."（点点）序列的特制 HTTP 请求，可绕过路径限制，查看服务器上任意目录的列表信息，导致敏感文件路径泄露。该漏洞无需身份认证即可远程利用，影响 SGI IRIX 6.2 版本，CVSS 评分 7.5，危害等级高危。厂商建议升级至不受影响的版本或禁用相关 CGI 程序。'
published = "1997-04-19T04:00:00.000"
remediation = "立即安装 SGI 安全公告 19970501-02-PX 中提供的补丁，升级 IRIX 至修复版本。如无法立即打补丁，应移除或禁用 `/cgi-bin/wrap` 脚本，或修改 Web 服务器配置限制 CGI 目录访问权限，同时对所有用户输入进行 `..` 路径遍历字符过滤。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "SGI IRIX cgi-bin wrap 目录遍历漏洞"
updated = "2026-06-16T21:47:42.233"

