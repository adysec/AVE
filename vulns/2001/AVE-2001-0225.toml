[basic]
description = "fetchmail 5.5.0-2 及更早版本在处理 AUTHENTICATE GSSAPI 命令时存在缓冲区溢出漏洞，未经身份认证的远程攻击者可通过向运行 fetchmail 的邮件服务器发送特制的 GSSAPI 认证请求触发该漏洞，导致远程代码执行，完全控制目标系统。该漏洞影响 fetchmail 5.5.0-2 及之前所有版本，CVSS 评分 10.0，危害等级严重，无需认证即可远程利用。"
published = "2001-02-12T05:00:00.000"
remediation = "升级 fetchmail 至 5.5.1 或更高版本，该版本修复了 AUTHENTICATE GSSAPI 命令中的缓冲区溢出漏洞。如无法立即升级，可在 fetchmail 配置文件中禁用 GSSAPI 认证方式（设置 `auth ssh` 或 `auth password`），或在防火墙层面限制对 fetchmail 服务端口的访问。"
score = 10
severity = "CRITICAL"
sources = ["redhat"]
title = "Fetchmail AUTHENTICATE GSSAPI 命令远程代码执行漏洞"
updated = "2026-06-16T21:53:39.420"

