[basic]
description = "Check Point FireWall-1 3.0 及 4.0 版本在 VPN-1 模块处理 UDP 数据包时存在缺陷，攻击者可构造并发送特制的 UDP 数据包，经由 VPN-1 隧道转发至目标主机的 0 端口。由于防火墙未能正确校验此类异常数据包，目标主机处理时会发生异常，导致拒绝服务（DoS），使受影响的主机或网络服务中断。该漏洞无需身份认证，远程攻击者只要能够向 VPN 网关发送数据包即可触发，影响运行上述版本并启用 VPN-1 功能的防火墙防护下的主机，可被用于中断正常网络访问。"
published = "1999-08-09T04:00:00.000"
remediation = "建议将 Check Point FireWall-1/VPN-1 升级至 4.0 后续修复版本（如 4.1 及官方 Service Pack）。如暂无法升级，可在防火墙规则中显式丢弃发往内部主机 UDP 端口 0 的报文，并限制仅允许受信任的 VPN 加密隧道流量通过，以阻断经由 VPN-1 转发的恶意 UDP 探测包。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Check Point FireWall-1 3.0/4.0 VPN-1 转发 UDP 数据包拒绝服务漏洞"
updated = "2026-06-16T21:48:49.377"

