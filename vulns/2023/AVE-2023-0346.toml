[basic]
description = "MariaDB Server 在查询优化阶段存在缺陷，当处理特制 SQL 查询时，make_aggr_tables_info 与 optimize_stage2 函数中的异常会导致服务器崩溃且无法生成回溯日志。该漏洞影响 10.4 至 11.0 等多个版本系列，具有数据库操作权限的攻击者可通过构造恶意查询触发此问题，造成拒绝服务。CVSS 评分 4.9，危害等级中危。"
published = "2025-03-08T23:15:14.357"
remediation = "升级 MariaDB Server 至修复版本：10.5.x 升级到 ≥10.5.29，10.6.x 升级到 ≥10.6.22，10.11.x 升级到 ≥10.11.12，11.0.x 迁移至 11.4.6 或 11.8.2 及以上。如无法立即升级，可在应用层避免执行目标表出现在 SELECT 子查询中的 INSERT...SELECT 语句作为临时缓解。"
score = 4.9
severity = "MEDIUM"
sources = ["msrc"]
title = "MariaDB MariaDB Server 拒绝服务漏洞"
updated = "2026-06-17T06:44:01.203"

