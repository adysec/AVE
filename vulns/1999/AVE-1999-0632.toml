[basic]
description = "DPEC Courseware Web Server 存在密码修改漏洞，远程攻击者可在无需知道原始密码的情况下，直接修改其他用户的账户密码。该漏洞影响 DPEC Online Courseware 系统，攻击者利用此漏洞可获取其他用户的账户控制权，进而访问课程资料或执行未授权操作。由于无需身份认证即可利用，危害等级严重，CVSS 评分 10.0。"
published = "1999-01-01T05:00:00.000"
remediation = "立即停用 DPEC Online Courseware 并迁移至其他受支持的在线课程平台；如无法立即替换，应在 Web 服务器层面通过 ACL 限制管理后台访问 IP 范围，并禁用密码修改功能涉及的 CGI 脚本。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "DPEC Courseware Web Server 任意用户密码修改漏洞"
updated = "2026-06-16T21:48:18.173"

