[basic]
description = "FTPFS 是一款用于挂载 FTP 目录的文件系统工具，其 0.1.1/0.2.1/0.2.2 版本中存在缓冲区溢出漏洞。本地攻击者可通过向 mount 命令传递超长用户名参数触发缓冲区溢出，成功利用此漏洞可获得 root 权限。该漏洞攻击复杂度低，无需身份认证即可利用，影响系统完整性与可用性。"
published = "2001-06-27T04:00:00.000"
remediation = "立即卸载 FTPFS 内核模块（`rmmod ftpfs`），并删除或重命名模块文件（如 `/lib/modules/$(uname -r)/kernel/fs/ftpfs/ftpfs.o`）防止自动加载。该模块已长期无人维护，建议迁移至基于 FUSE 的现代替代方案（如 curlftpfs）替代 FTPFS 的全部功能。同时限制普通用户对 mount 命令的执行权限，移除 `/etc/fstab` 中所有 ftpfs 类型的挂载条目。"
score = 7.2
severity = "HIGH"
sources = ["exploitdb"]
title = "FTPFS mount 缓冲区溢出本地权限提升漏洞"
updated = "2026-06-16T21:54:21.837"

