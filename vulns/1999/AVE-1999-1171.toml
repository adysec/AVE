[basic]
description = "Microsoft IIS 3.0 及 4.0 版本存在 SSL 资源耗尽拒绝服务漏洞。由于 IIS 无法区分需要加密和不需要加密的页面，远程攻击者可通过向 HTTPS 端口发送大量针对非加密文件的 SSL 请求，强制 IIS 为明文内容执行不必要的 SSL 加密处理，导致服务器 CPU 资源被大量消耗，造成拒绝服务。该漏洞攻击门槛低，仅需网络可达即可利用。"
published = "1999-07-07T04:00:00.000"
remediation = '建议升级至 IIS 5.0 或更高版本（随 Windows 2000 及以上系统提供），旧版 IIS 3.0/4.0 已停止技术支持且无法通过补丁修复。如无法升级，可在 IIS 管理器中仅对包含敏感数据的目录和文件启用"要求安全通道(SSL)"，避免对所有资源强制 SSL 加密以降低资源消耗。同时建议迁移至受支持的 Windows Server 版本并启用最新安全更新。'
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Microsoft IIS 3.0/4.0 SSL Exhaustion 拒绝服务漏洞"
updated = "2026-06-16T21:50:39.457"

