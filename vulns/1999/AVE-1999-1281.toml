[basic]
description = "svgalib 1.2.10 及更早版本中的 zgv 图像查看器存在缓冲区溢出漏洞，本地攻击者可通过设置超长的 HOME 环境变量触发缓冲区溢出，进而以当前程序权限执行任意代码。该漏洞影响 svgalib 1.2.10 及之前版本，CVSS 评分 4.6，危害等级中危，攻击者需拥有本地系统访问权限方可利用。"
published = "1997-06-19T04:00:00.000"
remediation = "升级 svgalib 至 1.3.0 或更高版本（该版本修复了 zgv 中 HOME 环境变量的缓冲区溢出问题）。如无法升级，可在启动 zgv 前通过 `export HOME=$(echo $HOME | cut -c1-255)` 截断 HOME 变量长度作为临时缓解，或移除 zgv 的 setuid 权限。建议迁移至现代替代工具（如 feh、sxiv）以彻底规避风险。"
score = 4.6
severity = "MEDIUM"
sources = ["avd"]
title = "svgalib zgv HOME 环境变量本地缓冲区溢出漏洞"
updated = "2026-06-16T21:50:32.297"

