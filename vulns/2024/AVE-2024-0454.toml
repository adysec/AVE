[basic]
description = "孚盟云 CRM 系统的 /Ajax/AjaxMethod.ashx 接口中 action=getEmpByname 参数 Name 存在 SQL 注入漏洞，攻击者无需身份认证即可通过构造恶意 SQL 语句（如 Name=1'）注入 SQL 语句，导致数据库信息泄露、数据篡改甚至服务器权限获取。该漏洞影响孚盟云 CRM 系统相关版本，攻击者仅需发送构造的 GET 请求即可触发，无需身份认证，攻击门槛低、危害大。建议升级至官方修复版本，并对输入参数进行参数化查询或严格过滤。"
published = "0726"
remediation = "建议立即升级孚盟云CRM系统至最新版本（建议联系厂商获取最新安全补丁版本），修复AjaxMethod.ashx接口的SQL注入漏洞。临时缓解措施：在WAF层面配置SQL注入防护规则拦截包含SQL关键字的GET请求参数，或在Web应用防火墙配置参数过滤规则拦截Name参数中的单引号和SQL关键字。建议联系孚盟云官方技术支持获取官方补丁补丁包进行升级修复。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "孚盟云 CRM系统 SQL注入漏洞"
updated = "0726"

