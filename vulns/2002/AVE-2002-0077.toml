[basic]
description = "Common Unix Printing System (CUPS) 1.1.14 至 1.1.17 版本中存在远程代码执行漏洞。攻击者可通过向目标 CUPS 服务发送特制的 HTTP 请求，其中包含负数的 Content-Length 值或分块传输编码中的负数长度值，导致这些负数参数被传入 memcpy() 函数调用，从而触发缓冲区溢出，造成服务崩溃或执行任意代码。该漏洞无需身份认证即可远程利用，影响范围广泛，CVSS 评分 7.5，危害等级高。"
published = "2002-12-26T05:00:00.000"
remediation = "升级 CUPS 至 1.1.18 或更高版本。Red Hat 用户安装 RHSA-2002:295 提供的更新包；Debian 用户升级至 DSA-232 对应版本；SuSE Linux 用户应用 SuSE-SA:2003-002 补丁。如无法立即升级，在防火墙上限制对 CUPS 服务端口（TCP 631）的访问，仅允许受信任主机连接。"
score = 7.5
severity = "HIGH"
sources = ["osv"]
title = "CUPS 负长度HTTP头远程代码执行漏洞"
updated = "2026-06-16T21:59:11.457"

