[basic]
description = "Microsoft Windows NT 4.0（含 SP1 至 SP5）的远程访问服务管理器（RASMAN）存在安全描述符配置不当漏洞。该服务的安全描述符权限设置过于宽松，允许本地普通用户通过 Windows NT 服务控制管理器将 RASMAN 服务指向攻击者控制的备用程序。当系统加载被篡改的服务路径时，攻击者提供的恶意代码将以 SYSTEM 高权限账户身份运行，实现本地权限提升并完全控制受影响系统。该漏洞仅需本地登录权限即可利用，无需远程网络访问。"
published = "1999-09-17"
remediation = "安装 Microsoft 安全公告 MS99-041 中发布的修复补丁（知识库文章 Q242294），并将系统升级至 Windows NT 4.0 Service Pack 6 或更高版本；若无法立即打补丁，应通过注册表或组策略收紧 RASMAN 服务的安全描述符，限制普通用户对服务控制管理器中 RASMAN 服务配置的修改权限。"
score = 9.0
severity = "CRITICAL"
sources = ["avd"]
title = "Microsoft Windows NT 4.0 RASMAN 服务安全描述符配置不当本地权限提升漏洞"
updated = "2026-07-17"

