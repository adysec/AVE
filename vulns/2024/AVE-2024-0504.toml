[basic]
description = "containerd 容器运行时的用户 ID 处理存在整数溢出漏洞，当容器配置的 User 字段设置为超过 32 位有符号整数最大值（即 2147483647）的 UID:GID 时，整数溢出导致容器进程最终以 root 用户（UID 0）运行。该漏洞影响 containerd 1.6.38、1.7.27 及 2.0.4 之前的所有版本，可导致依赖非 root 用户运行容器的安全策略失效，产生意外提权风险。攻击者可通过加载特制镜像或调用相关 API 触发该漏洞。"
published = "2025-03-17T22:15:13.150"
remediation = "立即将 containerd 升级至 1.6.38、1.7.27 或 2.0.4 及以上版本以修复整数溢出漏洞。如无法立即升级，确保仅使用受信任的容器镜像，并限制非受信用户的镜像导入权限作为临时缓解措施。"
score = 4.6
severity = "MEDIUM"
sources = ["msrc"]
title = "containerd 用户ID处理整数溢出漏洞"
updated = "2026-06-17T07:46:12.817"

