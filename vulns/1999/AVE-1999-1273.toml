[basic]
title = "Ray Chan WWW Authorization Gateway 命令执行漏洞"
description = "Ray Chan 开发的 WWW Authorization Gateway 0.1 CGI 程序存在命令注入漏洞，远程攻击者可通过向 "user" 参数提交包含 shell 元字符的特制请求，绕过输入过滤在服务器上执行任意系统命令。该漏洞影响 WWW Authorization Gateway 0.1 版本，CVSS 评分 7.5，危害等级高，攻击无需身份认证，仅需网络访问即可利用。"
severity = "HIGH"
score = 7.5
sources = ["cve", "epss"]
published = "1998-07-08"
updated = "2026-06-16"
remediation = "立即停止使用 Ray Chan WWW Authorization Gateway 0.1 CGI 程序，该软件已停止维护且无安全更新。建议彻底移除 www_auth.cgi 脚本或禁用整个 CGI 功能，改用现代认证方案（如 Apache mod_auth、OAuth2 代理）。如暂时无法替换，须对 user 参数严格过滤 shell 元字符（;|&$()` 等）并限制 CGI 运行权限。"
