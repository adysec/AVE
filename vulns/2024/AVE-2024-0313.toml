[basic]
description = "海康威视综合安防管理平台（iVMS-8700/HikCentral）存在前台远程命令执行漏洞。攻击者通过向 /portal/cas/login/ajax/licenseExpire.do 接口发送特制POST请求，在JSON参数的operate或machines.id字段中注入系统命令，无需认证即可在服务器上以web权限执行任意命令，获取服务器控制权。该漏洞影响范围广，危害严重。"
published = "2024-06-01"
remediation = "官方已发布安全更新，建议立即升级综合安防管理平台到最新版本；如无法升级，临时措施包括：限制 /portal/cas/login/ajax/licenseExpire.do 接口的访问来源IP，部署WAF规则拦截包含系统命令的请求体，或移除该接口的对外暴露。"
score = 9.8
severity = "CRITICAL"
sources = ["hwpoc"]
title = "海康威视综合安防管理平台 licenseExpire 接口远程命令执行漏洞"
updated = "2024-06-01"

