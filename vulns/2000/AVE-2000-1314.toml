[basic]
description = "Linux 系统中的 Tnef 程序存在任意文件写入漏洞，远程攻击者可通过向目标系统发送特制的 TNEF 编码压缩附件触发该漏洞，由于附件中指定了解压输出的绝对路径名，导致攻击者可覆盖系统任意文件。该漏洞影响 SUSE Linux 等发行版，CVSS 评分 10.0，危害等级严重。"
published = "2000-07-10T04:00:00.000"
remediation = "升级 tnef 程序至 0.3.12 及以上版本，该版本修复了绝对路径遍历问题。如无法升级，建议限制 mail 相关服务对 TNEF 附件的自动解压处理，或禁用 tnef 程序对 compress 编码附件的自动解压功能。同时建议不在邮件服务器上以高权限运行 tnef 程序，以降低文件覆盖影响的严重程度。"
score = 10
severity = "CRITICAL"
sources = ["cve"]
title = "SuSE Linux TNEF 任意文件写入漏洞"
updated = "2026-06-16T21:52:06.793"

