[basic]
description = "NukeNabber 端口监听工具的 report.exe 组件存在拒绝服务漏洞。远程攻击者无需任何身份认证，仅需向目标主机的 1080 端口建立 TCP 连接但不发送任何数据，即可触发该漏洞。连接建立后系统自动调用 report.exe 程序，导致目标 CPU 使用率瞬间飙升至 100%，造成系统拒绝服务。该漏洞利用方式简单、攻击门槛低，属于典型的高危拒绝服务漏洞。"
published = "1998-11-05T05:00:00.000"
remediation = "NukeNabber 已停止维护多年，建议立即卸载该软件。如无法卸载，在防火墙层面禁止外部 IP 对 TCP 1080 端口的入站连接，仅允许受信 IP 访问。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Puppets Place NukeNabber 拒绝服务漏洞"
updated = "2026-06-16T21:50:06.550"

