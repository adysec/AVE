[basic]
description = "RealNetworks RealServer 管理实用程序存在缓冲区溢出漏洞。未经身份认证的远程攻击者可通过向服务器管理界面提交超长的用户名和密码触发该溢出，从而在目标系统上执行任意命令。该漏洞影响 RealNetworks RealServer 的相关版本，攻击者无需事先获取凭据即可通过网络远程利用，可导致服务器完全被控。CVSS v2 评分 10.0，危害等级严重。RealNetworks 已在官方安全公告中发布修复补丁，建议用户升级至安全版本并限制管理界面的网络访问范围。"
published = "1999-11-04T05:00:00.000"
remediation = "立即升级 RealNetworks RealServer 至官方修补版本（参考服务商公告 servg260.html），该漏洞通过超长用户名和密码触发缓冲区溢出导致远程代码执行。临时缓解措施：在防火墙层面限制对 RealServer 管理端口（默认 9090/TCP）的访问，仅允许可信管理 IP 连接。"
score = 10
severity = "CRITICAL"
sources = ["exploitdb"]
title = "Real Networks GameHouse dldisplay ActiveX 控件缓冲区溢出漏洞"
updated = "2026-06-16T21:49:16.937"

