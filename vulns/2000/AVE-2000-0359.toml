[basic]
description = "NetBSD 1.4.2 及更早版本、FreeBSD 3.4/4.0/5.0 系统中的 IP 协议栈存在缺陷，远程攻击者可通过向目标主机发送包含未对齐（unaligned）IP 时间戳选项的恶意数据包，触发内核处理异常，导致系统崩溃或拒绝服务。该漏洞利用无需身份认证，攻击门槛低，仅需构造特定畸形 IP 报文即可实施攻击。"
published = "2000-05-01T04:00:00.000"
remediation = "升级 FreeBSD 至 4.0-STABLE 之后的安全更新版本，或升级 NetBSD 至 1.4.3 及以上版本。如无法升级，可在边界防火墙上配置过滤包含 IP Timestamp 选项的异常数据包，或使用 ipfw/pf 规则丢弃此类畸形报文作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "FreeBSD/NetBSD 未对齐 IP 时间戳选项拒绝服务漏洞"
updated = "2026-06-16T21:51:44.310"

