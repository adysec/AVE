[basic]
description = "用友FE协同平台的 `/common/uploadFile.jsp` 接口存在文件上传漏洞，由于未对上传文件的类型和路径进行有效校验，攻击者可通过构造特制的 multipart/form-data 请求，将 JSP 等可执行脚本文件上传至指定目录，进而远程执行任意代码，完全控制目标服务器。该漏洞影响用友FE协同平台多个版本，攻击无需身份认证，危害严重。"
published = "0705"
remediation = "升级用友FE协同平台至最新安全版本，厂商已在后续版本中修复文件类型校验缺陷。如无法立即升级，在Nginx/WAF层面配置规则拦截对`/common/uploadFile.jsp`的POST请求及非图片扩展名上传；同时移除`/images/upload/`目录的JSP执行权限，防止已上传webshell被执行。若业务允许，直接删除`uploadFile.jsp`文件。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "用友FE协同平台文件上传远程代码执行漏洞"
updated = "0705"

