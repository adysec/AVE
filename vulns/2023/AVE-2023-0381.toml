[basic]
description = "Linux 内核 blk-mq 块设备多队列子系统中存在空指针解引用漏洞，当系统进行 I/O 调度器切换操作时，函数 blk_mq_elv_switch_none 在获取 q->sysfs_lock 锁后，q->elevator 指针可能因并发调度器切换而被置空，导致空指针解引用引发内核崩溃。本地攻击者可通过构造特定 I/O 调度器切换场景触发此漏洞，造成拒绝服务。该漏洞影响 Linux 内核多个版本，CVSS 评分 5.5，危害等级中危。"
published = "2025-09-16T08:15:38.457"
remediation = "升级 Linux 内核至修复版本: 5.10 系列 ≥ 5.10.202, 5.15 系列 ≥ 5.15.141, 6.1 系列 ≥ 6.1.66, 6.6 系列 ≥ 6.6.5, 或主线 ≥ 6.7。无法立即升级时，可通过内核启动参数 `elevator=none` 禁用 IO 调度器切换作为临时缓解。"
score = 5.5
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux kernel blk-mq 空指针解引用漏洞"
updated = "2026-06-17T06:44:45.783"

