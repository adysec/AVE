[basic]
description = "QuakeWorld 2.10 存在缓冲区溢出漏洞，远程攻击者可通过向目标服务器发送特制的超长初始连接数据包触发该漏洞，导致服务器崩溃（拒绝服务），在特定条件下可能实现任意代码执行。该漏洞影响 QuakeWorld 2.10 及更早版本，CVSS 评分 7.5，危害等级高。厂商至今未发布官方补丁，建议升级至不受影响的版本或部署网络层访问控制措施进行缓解。"
published = "1998-04-07T04:00:00.000"
remediation = "升级 QuakeWorld 服务端至 2.30 或更高版本，该版本已修复 connect 数据包无边界检查的问题。如无法升级，在防火墙（iptables/nftables）上限制 UDP 26000-26005 端口的入站流量仅允许可信 IP 来源，作为临时缓解措施。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "id Software QuakeWorld 远程缓冲区溢出漏洞"
updated = "2026-06-16T21:50:35.117"

