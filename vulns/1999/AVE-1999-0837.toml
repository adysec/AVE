[basic]
description = "思科缓存引擎（Cisco Cache Engine）在处理用户访问认证时存在访问验证缺陷，未对登录凭据进行严格校验。远程攻击者可在认证请求中提交空的用户名与密码（null username and password），绕过正常的身份验证机制，从而未经授权访问受保护的缓存服务或管理功能。该漏洞影响运行相关版本软件的思科缓存引擎设备，攻击无需本地权限，仅需网络可达并能够发起认证请求即可利用，危害程度中等，可能导致缓存内容被非法访问或设备配置被未授权操作。"
published = "1999-12-16T05:00:00.000"
remediation = "将 Cisco Cache Engine 升级至修复该空凭证认证绕过问题的官方固件版本（具体版本号以 Cisco 安全公告为准），并在无法立即升级时，于边界防火墙或访问控制列表（ACL）上限制仅允许受信任管理网段访问设备的管理端口，同时禁用匿名/空用户名空密码登录并强制配置强口令认证。"
score = 2.6
severity = "LOW"
sources = ["epss"]
title = "思科 缓存引擎 基于NULL凭证的认证绕过漏洞"
updated = "2026-06-16T21:49:29.860"

