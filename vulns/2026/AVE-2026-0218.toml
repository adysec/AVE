[basic]
description = "VMware Aria Operations（原 vRealize Operations）存在命令注入漏洞，攻击者可向受影响组件发送特制请求，在参数中注入恶意操作系统命令（如 `127.0.0.1;id`），导致在目标服务器上以服务权限执行任意命令。该漏洞可被低权限或远程未认证攻击者利用，成功利用后可完全控制受影响系统，造成敏感数据泄露或进一步横向移动。VMware 已发布安全更新修复此漏洞，建议用户立即升级至最新版本。"
published = "20260225"
remediation = "升级 VMware Aria Operations 至最新安全版本（8.18 或更高版本），具体补丁请从 Broadcom Customer Connect 获取。如无法立即升级，在 Aria Operations 前端反向代理（Nginx/HAProxy）层配置 WAF 规则过滤分号和管道符等命令拼接字符，限制管理接口仅允许可信 IP 访问以降低暴露面。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "VMware Aria Operations 命令注入漏洞"
updated = "20260225"

