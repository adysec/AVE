[basic]
description = "IIS 4.0 及 Site Server 3.0 自带的 Winmsdp.exe 示例文件存在任意文件读取漏洞。远程攻击者无需身份认证即可通过构造特制 HTTP 请求，利用该示例文件读取服务器上的任意文件，导致敏感信息泄露。该漏洞影响 Windows NT 4.0 平台上的 IIS 4.0 和 Site Server 3.0 版本，危害等级中等。"
published = "1999-12-31T05:00:00.000"
remediation = "删除 IIS 4.0 或 Site Server 3.0 服务器上的 Winmsdp.exe 示例文件（默认位于 /Msadc/Samples/Selector/ 目录），或升级到 IIS 5.0 及以上版本。如无法升级，在 IIS 管理器中禁用该示例目录的脚本执行权限作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Microsoft Internet Information Server 和 Site Server 任意文件读取漏洞"
updated = "2026-06-16T21:50:28.107"

