[basic]
description = 'glFTPd 1.17.2 存在默认账户后门漏洞，软件内置了一个用户名为 "glftpd"、密码为默认值且 UID 为 0（超级用户权限）的隐藏账户。远程攻击者可通过 FTP 协议登录该默认账户，直接获取目标服务器的 root 级控制权限，进而执行任意命令、窃取数据或植入恶意程序。该漏洞影响 glFTPd 1.17.2 及更早版本，CVSS 评分 7.5，危害等级高，建议立即升级或禁用默认账户。'
published = "1999-12-23T05:00:00.000"
remediation = "立即删除 glFTPd 中的默认 glftpd 用户账户，或修改其默认密码并移除 UID 0 的 root 权限。建议升级到已修复此问题的 glFTPd 版本（如 1.18.0 及以上），或迁移至其他受支持的 FTP 服务器软件（如 vsftpd、ProFTPD）以避免该后门账户被远程利用。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "glFTPd 1.17.2 默认账户远程代码执行漏洞"
updated = "2026-06-16T21:50:52.390"

