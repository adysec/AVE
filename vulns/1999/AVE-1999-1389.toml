[basic]
description = "Apache HTTP Server 1.3.1 及更早版本存在 MIME 头部解析拒绝服务漏洞（又名 Sioux 漏洞）。远程攻击者可通过向目标服务器发送大量同名 MIME 头的恶意 HTTP 请求，导致服务器资源耗尽而无法响应正常请求。该漏洞影响所有运行 Apache 1.3.1 及之前版本的系统，无需认证即可远程利用，CVSS v2.0 评分 10.0，危害等级严重。建议升级至 Apache 1.3.2 或更高版本以修复此漏洞。"
published = "1998-08-07"
remediation = "升级 Apache HTTP Server 至 1.3.2 或更高版本（该漏洞已在 1.3.2 中修复）。若无法升级，可在 httpd.conf 中通过 LimitRequestFields 指令限制单个请求允许的 HTTP 头字段数量，防止资源耗尽。建议直接升级至 2.4.x 最新稳定版以获得全面安全支持。"
score = 10.0
severity = "CRITICAL"
sources = ["cve"]
title = "Apache HTTP Server 1.3.1 MIME 头部拒绝服务漏洞"
updated = "2026-06-16"

