[info]
author = "AVE"
description = "检测 Microsoft Visual InterDev 1.0 / FrontPage 98 Server Extensions dvwssr.dll 缓冲区溢出漏洞。通过 HTTP GET 请求验证 _vti_bin/_vti_aut/dvwssr.dll 端点是否存在，若存在则说明系统安装了存在漏洞的组件，攻击者可能通过特制请求触发缓冲区溢出导致拒绝服务或远程代码执行"
id = "POC-AVE-2000-0806"
name = "CVE-2000-0260 PoC"
severity = "high"
tags = ["cve-2000-0260"]
vuln_id = [
    "CVE-2000-0260",
    "AVE-2000-0806",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/_vti_bin/_vti_aut/dvwssr.dll"
protocol = "http"

[[poc.requests.matchers]]
expect = true
status = [
    200,
    401,
    403,
    500,
]
type = "status"
