[basic]
description = "Allmanage 管理系统存在管理员密码检索漏洞，攻击者无需身份认证即可通过特定接口或参数遍历/读取管理员账号密码信息。该漏洞源于权限控制缺失或敏感信息暴露，远程未授权攻击者可直接访问特定接口获取管理员凭证，进而完全控制管理后台。影响 Allmanage 管理系统相关版本，攻击者无需任何前置条件即可远程利用，直接导致管理员账号密码泄露并实现权限接管。"
published = "2000-05-13"
remediation = "建议立即升级 Allmanage 到最新版本，或联系厂商获取安全补丁修复管理员密码检索漏洞。临时缓解措施：限制管理后台访问IP白名单，禁用默认管理员账户，强制启用强密码策略，并在Web应用防火墙配置规则拦截密码找回接口的异常请求。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "厂商 产品 漏洞类型"
updated = "2000-05-13"

