[basic]
description = "Apache 1.3.12 WebDAV 配置漏洞使远程攻击者能够列举任意目录。漏洞原理是 Apache 默认启用 WebDAV 功能，未经验证的用户可通过发送 PROPFIND HTTP 请求扫描目标系统目录结构，发现敏感文件名称。当攻击者向目标 Apache 服务器发送特制的目录遍历请求时，服务器会返回包含目录列表的完整响应。这些列表可能包含用户隐私文件、配置文件、源码文件等敏感信息，严重威胁系统信息安全。受影响范围通常包括部署 Apache 1.3.12 且保留默认配置的 web 服务器。攻击者无需任何身份验证即可执行该攻击，攻击复杂度低，属于典型的未授权信息泄露漏洞。这种漏洞最常见的利用方式是远程发送 PROPFIND 请求进行批量目录枚举，当服务器响应时直接提取目录名称进行分析。该漏洞 CVSS 评分为 5.0（CVSS:AV:N/AC:L/Au:N/C:P/I:N/A:N），仅影响保密性，体现了 Apache 配置安全的重要性。Microsoft 等厂商已发布安全公告，建议禁用 WebDAV 或升级到最新安全版本以消除此漏洞。"
published = "2000-11-14T05:00:00.000"
remediation = "建议升级 Apache 至 1.3.13 或更高版本，或在 httpd.conf 中注释掉 LoadModule dav_module 和 LoadModule dav_fs_module 以禁用 WebDAV 模块；若必须启用 WebDAV，请在配置中添加 Dav Off 并配置 <Limit PROPFIND> Require all denied </Limit> 限制 PROPFIND 方法访问；防火墙层面可拦截 PROPFIND/PROPPATCH 等 WebDAV 方法作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Apache 1.3.12 WebDAV 目录列举漏洞"
updated = "2026-06-16T21:52:38.377"

