[basic]
description = "Windows Media Player 中的 ActiveX 控件在 Internet Explorer 5.0 中处理文件请求时，若指定文件不存在则会返回特定的错误码。远程攻击者可构造恶意网页，通过向客户端发送包含该 ActiveX 控件的特制网页，利用控件返回的错误码差异来判断客户端本地文件是否存在，从而泄露敏感文件信息。该漏洞影响 Internet Explorer 5.0 浏览器用户，攻击者无需任何身份验证即可发起探测，成功利用可导致本地文件存在性被远程确认，威胁用户隐私与数据安全。"
published = "1999-11-14T05:00:00.000"
remediation = '建议升级到 Internet Explorer 5.01 或更高版本以修复该漏洞。具体操作：访问 Microsoft 官网下载中心获取 IE 5.01 安装程序并执行安装，或通过 Windows Update 自动更新至最新的 IE 安全补丁。对于 Windows 95/98/NT 4.0 用户，可安装 IE 5 的累积安全更新（1999 年 12 月发布）以修复 Windows Media Player ActiveX 控件泄露文件存在性信息的问题。如短期内无法升级，可通过 Internet 选项→安全→自定义级别，禁用"对未标记为可安全执行脚本的 ActiveX 控件初始化并执行"作为临时缓解措施，同时避免访问不受信任的网站。'
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Microsoft Internet Explorer 5 Media Player ActiveX 控件文件存在性信息泄露漏洞"
updated = "2026-06-16T21:49:44.477"

