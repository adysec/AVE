[basic]
description = "tcpdump 3.4 及 3.5 版本在解析 AFS ACL 数据包时存在多处缓冲区溢出漏洞。远程攻击者可通过向目标系统发送特制的 AFS ACL 数据包触发该漏洞，导致 tcpdump 进程崩溃或执行任意代码。该漏洞影响使用 tcpdump 3.4/3.5 版本的各类系统，CVSS 评分 10.0，危害等级严重。"
published = "2000-12-11T05:00:00.000"
remediation = "升级至 tcpdump 3.6 及以上版本。FreeBSD 用户参照 SA-00:61 为系统自带的 tcpdump 打补丁，或更新至 4.1.1-STABLE/3.5.1-STABLE 之后版本。Linux 发行版用户通过包管理器更新至厂商修复版本。临时缓解措施：在不可信网络中避免以 root 运行 tcpdump 抓包。"
score = 10
severity = "CRITICAL"
sources = ["exploitdb"]
title = "tcpdump AFS ACL 数据包缓冲区溢出漏洞"
updated = "2026-06-16T21:52:59.913"

