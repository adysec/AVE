[basic]
description = "WordPress Import Legacy Media 插件 0.1 及更早版本中存在跨站脚本漏洞。未认证的远程攻击者可通过 getid3/demos/demo.mimeonly.php 页面的 filename 参数注入任意 Web 脚本或 HTML 代码，当管理员访问恶意构造的链接时，攻击者可在浏览器会话中执行任意脚本代码，窃取 Cookie 或执行其他恶意操作。"
published = "2019-12-27T20:15:11.253"
remediation = "该插件已于 2014 年关闭且不再维护，建议立即在 WordPress 后台卸载并删除 Import Legacy Media 插件。如业务必需保留功能，请手动编辑 getid3/demos/demo.mimeonly.php 文件，对 filename 参数使用 htmlspecialchars() 函数进行 HTML 实体编码过滤以防止 XSS 攻击。"
score = 6.1
severity = "MEDIUM"
