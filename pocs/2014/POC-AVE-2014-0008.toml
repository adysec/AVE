[info]
author = "ave"
description = "检测 ZTE F460/F660 光猫 web_shell_cmd.gch 接口是否存在未授权访问，通过 GET 请求访问该路径并检查响应中是否包含 'please input shell command' 和 'ZTE Corporation. All rights reserved' 特征字符串，确认设备存在远程命令执行漏洞。"
id = "POC-AVE-2014-0008"
name = "ZTE F460 F660 光猫 web_shell_cmd 远程命令执行漏洞 PoC"
severity = "critical"
tags = ["ave-2014-0008"]
vuln_id = [
    "CVE-2014-2321",
    "AVE-2014-0008",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/web_shell_cmd.gch"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "please input shell command",
    "ZTE Corporation. All rights reserved",
]
