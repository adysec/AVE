[basic]
description = "SGI IRIX 6.2 系统中的 cgi-bin wrap 程序存在目录遍历漏洞，远程攻击者可通过在 URL 参数中使用 `..`（点点）序列绕过路径限制，访问并列出服务器上任意目录的内容。该漏洞无需身份认证即可利用，可导致敏感文件信息泄露，例如系统配置文件、用户数据等。攻击条件简单，仅需目标系统运行存在漏洞的 wrap CGI 程序即可实施。"
published = "1997-04-19T04:00:00.000"
remediation = "建议升级至 SGI IRIX 6.3 及以上版本，或直接移除系统 cgi-bin 目录下的 wrap CGI 脚本。若无法升级，在 Web 服务器（如 Netscape FastTrack）配置中严格限制 cgi-bin 目录访问权限，并禁用路径穿越（..）与目录列表功能以作临时缓解。"
score = 7.5
severity = "HIGH"
sources = ["exploitdb"]
title = "SGI IRIX cgi-bin wrap 目录遍历漏洞"
updated = "2026-06-16T21:47:42.233"

