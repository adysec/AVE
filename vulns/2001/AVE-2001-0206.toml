[basic]
description = "GnuPG (Gnu Privacy Guard) 1.05 及更早版本存在格式化字符串漏洞，源于程序在处理加密文件中存储的原始文件名时，未对格式化字符串进行正确验证。攻击者可构造包含恶意格式化字符串（如 %n、%s 等格式说明符）的文件名，将其加密后诱导受害者解密，解密过程中格式化字符串被作为格式参数处理，导致栈内存被任意读写，进而实现任意代码执行或提权。该漏洞影响 GnuPG 1.05 及更早版本，CVSS 评分 7.5（AV:N/AC:L/Au:N/C:P/I:P/A:P），属高危漏洞。攻击者无需身份认证即可远程利用，只需诱导用户解密恶意加密文件即可触发漏洞，攻击成功可导致系统完全被攻破。Debian 等发行版已发布安全公告 DSA-061 提供修复补丁，建议升级至 GnuPG 1.06 或更高版本修复该漏洞。"
published = "2001-08-14T04:00:00.000"
remediation = "建议立即升级 GnuPG 到 1.0.6 或更高版本（1.0.6 版本已修复此格式字符串漏洞）。通过包管理器更新：Debian/Ubuntu 执行 `apt-get update && apt-get install gnupg`，RedHat/CentOS 执行 `yum update gnupg`，或从官网 https://gnupg.org/download/ 下载最新版本编译安装。若暂时无法升级，请避免处理来源不可信的加密文件，并在防火墙层面限制非必要的网络服务暴露。"
score = 7.5
severity = "HIGH"
sources = ["redhat"]
title = "GNU GnuPG 1.0.x 格式字符串漏洞"
updated = "2026-06-16T21:54:27.560"

