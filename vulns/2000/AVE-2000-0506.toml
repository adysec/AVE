[basic]
description = "Microsoft Site Server 3.0 Commerce Edition 提供的示例站点和向导生成的代码存在输入验证漏洞。程序在处理数据库查询时未正确验证用户提交的标识编号参数，导致远程攻击者可通过向该参数注入恶意 SQL 命令，实现对后端数据库的创建、修改、删除或读取操作，严重威胁数据安全。"
published = "2000-02-18"
remediation = "安装 Microsoft 安全公告 MS00-010 提供的补丁程序，或参考知识库文章 KB252614 对代码进行修改，在数据库查询前对用户输入的标识编号参数进行严格的输入验证和过滤。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "Microsoft Site Server 3.0 Commerce Edition 输入验证漏洞"
updated = "2026-07-22"

