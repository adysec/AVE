[basic]
description = "Red Hat Linux 6.0 及 6.1 版本中 PAM 配置文件 /etc/pam.d/rlogin 的规则顺序存在缺陷，pam_rhosts_auth.so 的 sufficient 规则位于 pam_nologin.so 的 required 规则之前，导致即使管理员通过 /etc/nologin 文件禁用了 rlogin 登录，远程攻击者仍可利用 rhosts 认证机制绕过限制访问系统。"
published = "1999-10-07"
remediation = "修改 /etc/pam.d/rlogin 配置文件，将 pam_nologin.so 的 required 规则移至 pam_rhosts_auth.so 的 sufficient 规则之前，确保 nologin 检查优先执行。升级至 Red Hat Linux 6.2 或更高版本。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "Red Hat Linux PAM rlogin 配置绕过认证漏洞"
updated = "2026-06-16"

