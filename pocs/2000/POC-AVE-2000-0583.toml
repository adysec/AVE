[info]
author = "AVE"
description = "RobTex Viking server 1.06-370之前版本存在缓冲区溢出漏洞，通过发送超长HTTP GET请求可导致拒绝服务或远程代码执行"
id = "POC-AVE-2000-0583"
name = "CVE-2000-0775 PoC"
severity = "high"
tags = ["cve-2000-0775"]
vuln_id = [
    "CVE-2000-0775",
    "AVE-2000-0583",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/AAAA"
