[basic]
description = "Linux 内核 AMDGPU 驱动中的电源管理模块存在空指针解引用漏洞，当软件 SMU（系统管理单元）未启用时，`pp_funcs` 函数指针未正确初始化。在释放上下文过程中，`amdgpu_dpm_force_performance_level` 函数直接访问该未初始化的指针，导致内核空指针解引用崩溃。本地攻击者可通过运行 `amdgpu_test` 或构造特定的 AMDGPU ioctl 调用触发此漏洞，造成系统拒绝服务。该漏洞影响启用了 AMDGPU 驱动的 Linux 内核版本，CVSS 评分 5.5，危害等级中危。"
published = "2025-02-26T07:01:28.873"
remediation = "建议将 Linux 内核升级至 5.16.19 及以上版本（包含提交 91b8e8e5 修复的稳定版本），或直接升级至 5.17 主线版本。可通过发行版包管理器安装最新稳定内核，或从 kernel.org 获取源码手动编译。如果无法立即升级内核，可卸载 amdgpu 驱动模块（`rmmod amdgpu`）并改用开源 vesa 驱动作为临时缓解。"
score = 5.5
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux AMDGPU 驱动 SMU 禁用时空指针解引用漏洞"
updated = "2026-06-17T05:18:21.120"

