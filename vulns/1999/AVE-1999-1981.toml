[basic]
description = "BisonWare BisonFTP Server 3.5 及更早版本在处理 USER、LIST、CWD 等 FTP 命令时，对输入长度缺乏边界校验，存在多个栈缓冲区溢出漏洞。远程未授权攻击者可通过向 FTP 服务发送超长的命令参数触发溢出，导致服务崩溃造成拒绝服务，或在服务器进程权限下执行任意代码。该漏洞无需身份认证即可远程利用，攻击条件仅为网络可达目标 FTP 21 端口，影响范围覆盖 3.5 及之前版本，CVSS 评分为 7.5（高危）。"
published = "1999-05-17"
remediation = "升级 BisonWare BisonFTP Server 至 4.1 或更高版本以修复命令解析中的缓冲区溢出。若无法立即升级，应在防火墙限制对 TCP 21 端口的访问，仅允许可信 IP 连接，并关闭匿名账户作为临时缓解措施。"
score = 7.5
severity = "HIGH"
sources = [
    "exploitdb",
    "cve",
]
title = "BisonWare BisonFTP Server 3.5 远程缓冲区溢出漏洞"
updated = "2026-07-18"

