[basic]
description = "MobileOA 智能办公系统的 MobileOA.asmx Web 服务接口存在 SQL 注入漏洞。未经身份认证的远程攻击者可通过向 /iOffice/prg/set/wss/MobileOA.asmx 端点发送特制的 SOAP XML 数据包，注入恶意 SQL 语句，导致数据库中的敏感信息泄露、数据被篡改甚至后台管理员权限被窃取。该漏洞影响多个版本的 MobileOA 智能办公系统，攻击无需认证即可利用，危害严重。"
published = "0711"
remediation = "建议厂商对 MobileOA.asmx 中所有 SOAP 接口参数实施严格的输入过滤与参数化查询，避免拼接 SQL 语句；同时升级智能办公系统至厂商发布的最新安全版本。临时缓解措施：在 WAF 或反向代理层面拦截对 /iOffice/prg/set/wss/MobileOA.asmx 的异常 POST 请求，过滤 body 中的 SQL 关键字（如 UNION、SELECT、INSERT），并限制该接口仅允许可信内网 IP 访问。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "智能办公系统 MobileOA.asmx SQL注入漏洞"
updated = "0711"

