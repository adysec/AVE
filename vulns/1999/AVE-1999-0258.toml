[basic]
description = "AIX 3.x 操作系统中的 bugfiler 程序存在任意文件创建漏洞，本地攻击者利用该程序可创建或覆盖系统文件，从而获取 root 权限。该漏洞影响 AIX 3.x 版本，攻击者仅需本地账户即可利用，无需用户交互，危害较高，CVSS 评分 7.2。"
published = "1997-09-01T04:00:00.000"
remediation = "升级 AIX 系统至 4.1.0 或更高版本，该漏洞已在后续发行版中修复。临时缓解措施：以 root 执行 `chmod u-s /usr/bin/bugfiler` 移除 setuid 特权位，防止本地用户通过 bugfiler 获取 root Shell；若无需使用 bugfiler 工具，可直接 `chmod 700 /usr/bin/bugfiler` 限制仅 root 可执行。请评估是否需同时更新 `bos.rte.security` 文件集的相关安全补丁。"
score = 7.2
severity = "HIGH"
sources = ["exploitdb"]
title = "IBM AIX bugfiler 本地权限提升漏洞"
updated = "2026-06-16T21:47:37.230"

