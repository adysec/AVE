[basic]
description = "ComfyUI-Manager 存在 CRLF 注入漏洞，攻击者可在 HTTP 响应头中注入换行符实现 HTTP 响应拆分，进而操纵服务器端行为，最终导致远程代码执行。该漏洞影响 ComfyUI-Manager 3.39.2 以下版本，攻击者无需特殊权限即可远程触发。厂商已发布 3.39.2 版本修复此漏洞。"
published = "nday"
remediation = "立即将 ComfyUI-Manager 升级至 3.39.2 或 4.0.5 及以上版本（最新版为 4.2.2），升级命令：在 `ComfyUI/custom_nodes/comfyui-manager` 目录下执行 `git pull`。此漏洞通过在 `write_config()` 函数中添加 CRLF 和 NULL 字符过滤逻辑修复。如无法升级临时缓解：仅在受信任网络运行 ComfyUI，通过防火墙限制外部对 ComfyUI 端口的访问，避免使用 `--listen` 选项将服务暴露在公网。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "ComfyUI ComfyUI-Manager CRLF 注入导致远程代码执行漏洞"
updated = "nday"

