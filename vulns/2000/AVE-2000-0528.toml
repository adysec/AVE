[basic]
description = "Windows 2000 桌面隔离漏洞（Desktop Separation）允许同一窗口工作站（Window Station）内的本地用户进程访问其他用户的桌面会话。由于系统对桌面对象的访问控制检查不充分，攻击者可在登录同一系统的用户之间越权操作，窃取键盘输入、截取屏幕内容或注入恶意数据。该漏洞需攻击者拥有本地账户权限，无法远程利用，CVSS 评分 4.6，影响 Windows 2000 所有版本。Microsoft 未发布官方补丁，建议通过最小化多用户并发登录缓解风险。"
published = "2000-06-15T04:00:00.000"
remediation = "安装 Microsoft 针对 Windows 2000 Desktop Separation 漏洞的安全更新（MS00-032），限制同一工作站内进程对用户桌面的跨用户访问。由于 Windows 2000 已停止支持，建议升级至受支持的 Windows Server 版本以获得持续安全更新。"
score = 4.6
severity = "MEDIUM"
sources = ["cve"]
title = "Microsoft Windows 2000 桌面隔离访问控制漏洞"
updated = "2026-06-16T21:51:48.863"

