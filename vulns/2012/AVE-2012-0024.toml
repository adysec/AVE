[basic]
description = "Forescout CounterACT NAC 设备 7.0 之前版本的 assets/login 页面存在开放重定向漏洞。远程攻击者可通过向 a 参数传入恶意 URL，将用户重定向至任意外部网站，进而实施钓鱼攻击。该漏洞源于程序对用户输入的 URL 参数缺乏充分校验，属于输入验证不完善（CWE-20）。CVSS 评分 5.8，危害等级中危，影响部署了 Forescout CounterACT NAC 设备的网络环境。"
published = "2012-12-05T11:57:15.210"
remediation = "升级 Forescout CounterACT 至 7.0 或更高版本，该版本修复了 `/assets/login` 中 `a` 参数未正确校验 URL 导致开放重定向的问题。如无法立即升级，可在反向代理或 WAF 层面对 `/assets/login` 的 `a` 参数添加 URL 白名单校验，仅允许内部可信域名，防止被用于钓鱼跳转。"
score = 5.8
severity = "MEDIUM"
sources = ["nuclei"]
title = "Forescout CounterACT 开放重定向漏洞"
updated = "2026-06-16T23:46:00.127"

