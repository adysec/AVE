[info]
author = "AVE"
description = "检测 Linux Kernel 2.0.x 版本，该版本 TCP 协议栈存在端口拒绝服务漏洞，本地用户可通过多线程程序占用非特权端口导致端口永久处于 CLOSE_WAIT 状态，系统网络服务不可用"
id = "POC-AVE-1999-0690"
name = "CVE-1999-0451 PoC"
severity = "low"
tags = ["cve-1999-0451"]
vuln_id = [
    "CVE-1999-0451",
    "AVE-1999-0690",
]

[poc]
logic = "any"

[[poc.requests]]
path = "/proc/version"
protocol = "file"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["Linux"]
