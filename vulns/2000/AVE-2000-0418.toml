[basic]
description = "Microsoft Windows Media Services 4.0/4.1 的 Windows Media Encoder 组件存在拒绝服务漏洞。远程攻击者可通过向目标系统发送特制的畸形请求，导致 Windows Media Encoder 服务崩溃或停止响应，造成拒绝服务。该漏洞影响 Windows Media Services 4.0 及 4.1 版本，无需身份认证即可远程触发，CVSS 评分 5.0，危害等级中等。Microsoft 已在安全公告 MS00-038 中发布补丁修复此漏洞。"
published = "2000-05-30T04:00:00.000"
remediation = "立即安装 Microsoft 安全公告 MS00-038 提供的补丁，该补丁更新 Windows Media Encoder 至 4.1 修复版本，可正确处理畸形请求。下载地址：https://www.microsoft.com/download/details.aspx?FamilyId=9009CF6D-ABC0-4E0F-AE0E-70A7A22F8420。如无法安装补丁，可在防火墙层面限制对 Windows Media Encoder 服务的网络访问，仅允许受信任的 Windows Media Server IP 与其通信，作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Microsoft Windows Media Services 拒绝服务漏洞"
updated = "2026-06-16T21:51:51.460"

