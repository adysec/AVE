[basic]
description = "TFTP（Trivial File Transfer Protocol）服务未配置为在受限目录中运行，导致远程攻击者无需身份认证即可通过TFTP协议读取目标系统中任意可访问文件，包括密码文件、配置文件等敏感信息。该漏洞广泛影响早期Unix/Linux系统及嵌入式设备中默认配置的TFTP服务，攻击者只需知道目标IP地址并发送TFTP读取请求即可实施信息窃取，利用难度极低。"
published = "1991-09-27T04:00:00.000"
remediation = "将 TFTP 服务配置为在 chroot 隔离目录中运行（如 /tftpboot），限制文件访问范围；在防火墙上禁止 TFTP 端口（UDP 69）对外开放，仅允许受信 IP 访问；如非必要，建议停用 TFTP 改用 SFTP/SCP 等加密文件传输协议。确保 TFTP 进程以低权限用户（如 nobody）运行，避免以 root 权限执行。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "TFTP 路径限制绕过信息泄露漏洞"
updated = "2026-06-16T21:48:31.613"

