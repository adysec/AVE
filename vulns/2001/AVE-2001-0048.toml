[basic]
description = "OmniHTTPd 2.07 中 CGI 脚本 statsconfig.pl 对 cgidir 参数缺乏充分的过滤验证，远程攻击者可通过构造恶意的 cgidir 参数值，利用目录遍历技术将任意文件写入目标服务器任意路径，导致服务器文件被覆盖破坏，甚至结合文件上传获得服务器控制权。该漏洞影响 Omnicron OmniHTTPd 2.0.7 版本，无需认证即可远程利用。"
published = "2001-03-12T05:00:00.000"
remediation = "建议立即停止使用已停止维护的 OmniHTTPd 2.0.7，迁移至 Apache、Nginx 等仍在安全更新周期内的 Web 服务器。如无法立即迁移，可删除或禁用 statsconfig.pl 脚本，并在 Web 服务器或网络防火墙层面限制对脚本目录的远程访问。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Omnicron OmniHTTPd 任意文件写入漏洞"
updated = "2026-06-16T21:53:40.907"

