[basic]
description = "Qualcomm Eudora 4.x 邮件客户端存在安全警告绕过漏洞（Stealth Attachment）。攻击者可通过向目标用户发送包含 .lnk 快捷方式文件的邮件，该快捷方式指向可执行附件（如 .exe、.com、.bat），从而在用户点击时直接运行恶意代码，绕过程序对可执行附件的安全警告提示。该漏洞影响 Eudora 4.2 及 4.3 版本，CVSS 评分 7.5，危害等级高。"
published = "2000-04-28T04:00:00.000"
remediation = "建议立即停止使用已停止维护的 Qualcomm Eudora，迁移至支持活跃安全更新的邮件客户端（如 Mozilla Thunderbird、Microsoft Outlook）。若暂时无法迁移，请在 Eudora 设置中将「Warning」级别调至最高，并避免打开任何来源的 .lnk 附件文件，同时在操作系统层面配置组策略禁止通过 .lnk 快捷方式启动可执行文件。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "Qualcomm Eudora 附件警告绕过漏洞"
updated = "2026-06-16T21:51:31.033"

