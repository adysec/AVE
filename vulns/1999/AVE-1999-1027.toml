[basic]
description = "mSQL（Mini SQL）2.0.6 版本存在信息泄露漏洞，远程攻击者可通过向目标数据库服务器发送特制的 ServerStats 查询请求，无需任何身份认证即可获取服务器敏感信息，包括当前登录用户列表、数据库名称及服务器版本号等。该漏洞本质上是由于 ServerStats 功能未对查询来源进行访问控制，导致数据库元信息被非授权访问。CVSS 评分 7.5，危害等级高，影响所有运行 mSQL 2.0.6 的系统。"
published = "1999-02-15T05:00:00.000"
remediation = "升级到 mSQL 2.0.7 或更高版本，该版本已禁用远程 ServerStats 查询功能。若无法升级，在 msql.conf 中将 RemoteAccess 设为 0 禁止远程访问，并在防火墙限制对 1114/TCP 端口的访问，仅允许受信任主机连接。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "mSQL 信息泄露漏洞"
updated = "2026-06-16T21:50:03.557"

