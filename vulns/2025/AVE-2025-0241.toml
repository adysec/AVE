[basic]
description = "深信服服务端存在远程代码执行漏洞，攻击者可通过向目标服务器发送特制的恶意请求触发该漏洞，无需身份认证即可在服务器端执行任意代码。该漏洞影响深信服多款产品，攻击者可利用该漏洞完全控制受影响服务器，进而实施数据窃取、勒索软件部署等恶意行为。建议用户尽快升级至最新安全版本以修复此漏洞。"
published = "2025-07-18"
remediation = "立即联系深信服技术支持获取最新安全补丁或升级至该产品（深信服服务器端应用/组件）的最新稳定版本。如暂无法升级，可在网络边界防火墙配置访问控制策略，严格限制仅可信IP地址访问管理端口（如TCP 443/8443等），并开启Web应用防火墙（WAF）防护规则拦截常见的RCE攻击载荷。同时建议禁用非必要的远程管理功能和接口，降低攻击面。"
score = 5.0
severity = "MEDIUM"
sources = ["hwpoc"]
title = "深信服 服务端 远程代码执行漏洞"
