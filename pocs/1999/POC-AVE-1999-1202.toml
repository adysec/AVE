[info]
author = "AVE"
description = "检测目标是否受 Internet Explorer 框架欺骗漏洞影响，通过构造包含恶意框架的 HTML 页面验证同源策略绕过"
id = "POC-AVE-1999-1202"
name = "CVE-1999-0869 PoC"
severity = "low"
tags = ["cve-1999-0869"]
vuln_id = [
    "CVE-1999-0869",
    "AVE-1999-1202",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/poc.html"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["frame"]
