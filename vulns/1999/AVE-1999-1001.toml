[basic]
description = "Cisco IOS 11.2 及更早版本中 Cisco Cache Engine 所使用的 Web 缓存控制协议（WCCP）存在身份验证缺失漏洞。远程攻击者无需任何认证即可向目标设备的 UDP 端口 2048 发送特制 WCCP 数据包，从而劫持并重定向 HTTP 流量至任意主机，导致敏感信息泄露或中间人攻击。该漏洞利用条件简单，影响范围广泛，危害等级高。"
published = "1999-12-31T05:00:00.000"
remediation = "升级 Cisco IOS 到 12.0 或更高版本以启用 WCCP MD5 认证支持；在无法升级的设备上，通过 ACL 限制仅允许受信任的缓存引擎 IP 向 UDP 2048 端口发送 WCCP 报文，并在网络边界过滤该端口的入站流量。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "Cisco Cache Engine Web缓存控制协议未授权访问漏洞"
updated = "2026-06-16T21:49:52.753"

