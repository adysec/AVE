[basic]
description = "IBM Scalable POWERparallel (SP) 2.0 系统中的 sdrd 守护进程存在未授权文件读取漏洞。该守护进程作为系统数据仓库（SDR）的远程访问接口，未对客户端请求进行身份验证，导致远程攻击者无需任何认证即可通过网络向目标 sdrd 服务发送特制请求，读取服务器上的任意文件。该漏洞影响 IBM SP2 系统，攻击者利用难度较低，可导致敏感信息泄露，CVSS 评分 5.0，危害等级中等。"
published = "1999-12-31T05:00:00.000"
remediation = "升级 IBM SP2 系统软件至厂商已修复版本（如 2.1 及以上），或禁用 sdrd 服务。如无法升级，在防火墙层面限制对 sdrd 端口（默认 2132/TCP）的访问，仅允许受信任管理节点连接，并配置 TCP Wrappers 进行主机访问控制。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "IBM Scalable POWERparallel (SP) 2.0 SDR 远程文件读取漏洞"
updated = "2026-06-16T21:50:32.927"

