[basic]
description = "Microsoft Windows 95/98/NT 4.0 系统的 TCP/IP 协议栈在处理畸形的分片 IGMP 数据包时存在输入验证缺陷（CWE-20）。远程攻击者无需身份认证即可发送特制的分片 IGMP 报文，导致目标系统性能下降、蓝屏崩溃或网络服务完全中断。该漏洞主要影响 Windows 95/98 系列，Windows NT 4.0 因其他系统机制保护攻击难度较高。"
published = "1999-07-03"
remediation = "安装 Microsoft 安全公告 MS99-034 提供的官方补丁。Windows 95/98 用户可通过 Windows Update 获取更新，Windows NT 4.0 用户可从 Microsoft 下载中心获取补丁。同时建议在网络边界防火墙过滤 IGMP 协议报文以缓解风险。"
score = 7.8
severity = "HIGH"
sources = [
    "cve",
    "avd",
    "exploitdb",
]
title = "Microsoft Windows IGMP 分片报文处理拒绝服务漏洞"
updated = "1999-09-03"

