[basic]
description = "SilverPlatter WebSPIRS 3.3.1 存在目录遍历漏洞，远程攻击者无需身份认证即可通过向 sp.nextform 参数提交包含 `..`（点点）序列的恶意请求，突破路径限制读取服务器上的任意文件。该漏洞影响 WebSPIRS 3.1 及 3.3.1 版本，可导致敏感信息泄露，CVSS 评分 5.0，危害等级中危。"
published = "2001-06-02T04:00:00.000"
remediation = "升级 SilverPlatter WebSPIRS 至厂商已修复的最新版本（3.3.1 之后版本）；如产品已停止维护，建议迁移至 OVID 或其他受支持的替代平台。在 Web 服务器或 WAF 层对 sp.nextform 参数严格过滤 `../` 及空字节编码，限制 WebSPIRS 应用程序的文件系统访问权限仅限必要目录。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "SilverPlatter WebSPIRS 目录遍历漏洞"
updated = "2026-06-16T21:53:53.440"

