[basic]
description = "AnalogX SimpleServer:WWW 1.08 及之前版本中存在拒绝服务漏洞。远程攻击者通过向目标服务器发送特制的 HTTP 请求访问 /aux 目录（Windows 保留设备名称），可触发系统设备名称解析异常，导致服务进程崩溃或停止响应。该漏洞利用难度低，无需身份认证，攻击者仅需构造恶意 HTTP 请求即可实施攻击，严重影响服务可用性。"
published = "2001-07-02T04:00:00.000"
remediation = '升级至 AnalogX SimpleServer:WWW 1.09 或更高版本（如仍能获取），该版本已修复 /aux 路径导致的拒绝服务问题。由于该产品已停止维护，建议迁移至仍在维护的 Web 服务器（如 Apache HTTP Server、Nginx 或 IIS）。若短期内无法替换，可在反向代理或防火墙层配置规则，拦截包含 "/aux" 路径的 HTTP 请求作为临时缓解措施。'
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "AnalogX SimpleServer:WWW AUX 目录拒绝服务漏洞"
updated = "2026-06-16T21:54:12.590"

