[basic]
description = "Linux printtool 工具在配置打印机共享时，将打印机配置文件权限设置为全局可读，导致本地攻击者可通过读取配置文件获取打印机共享密码。该漏洞影响使用 printtool 的 Linux 系统，攻击者需拥有本地访问权限，利用难度较低，可导致打印机共享凭据泄露，进而未经授权访问打印机资源。"
published = "2000-03-09T05:00:00.000"
remediation = "升级 printtool 至 2000 年 4 月后的修复版本，或手动执行 chmod 600 /etc/printcap /etc/printers.conf 限制打印机配置文件的读取权限为仅 root 可读，同时在 printtool 运行前设置 umask 077 防止新生成的文件权限过宽。"
score = 2.1
severity = "LOW"
sources = ["cve"]
title = "Red Hat Linux printtool 打印机共享密码信息泄露漏洞"
updated = "2026-06-16T21:51:10.530"

