[basic]
description = "SCO Unix 4.0 及更早版本中的 passwd 口令修改程序存在安全漏洞，本地攻击者可利用该漏洞导致系统拒绝服务，使合法用户无法正常登录系统。该漏洞影响 SCO Unix 4.0 及之前版本，CVSS 评分 6.4，危害等级中危。攻击者需具有本地访问权限，通过触发 passwd 程序异常状态来阻止用户登录，目前厂商已停止支持该产品。"
published = "1993-05-24T04:00:00.000"
remediation = "该漏洞影响已停止维护的 SCO Unix 4.0 及更早版本，厂商未发布补丁。建议将系统升级至受支持的现代操作系统（如 Linux 或 BSD 发行版）；若无法升级，应限制对 passwd 命令的访问权限，仅允许受信管理员通过本地控制台使用，并在系统层面监控 /etc/passwd 和 /etc/shadow 文件的异常修改行为。"
score = 6.4
severity = "MEDIUM"
sources = ["avd"]
title = "SCO Unix 4.0 passwd 拒绝服务漏洞"
updated = "2026-06-16T21:49:51.167"

