[basic]
description = "Linux 2.2.x 内核的 IP 伪装（IP masquerading）功能存在安全漏洞，远程攻击者可通过修改外部源 IP 地址和端口号，使其与已建立连接的参数相匹配，从而将 UDP 数据包路由至内部接口。该漏洞允许攻击者绕过防火墙规则访问内部网络资源，影响运行 Linux 2.2.x 内核的系统。攻击者无需认证即可利用此漏洞，但需要掌握已建立连接的相关信息。"
published = "2000-03-27T05:00:00.000"
remediation = "升级 Linux 内核至 2.4.x 或更高版本，该漏洞已在后续内核版本中修复。如无法升级内核，可在防火墙规则中限制 UDP 端口转发，仅允许已知合法源 IP 的 UDP 流量通过，并启用 iptables 的 conntrack 状态检查以验证连接合法性。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Linux Kernel IP Masquerading 安全绕过漏洞"
updated = "2026-06-16T21:51:24.380"

