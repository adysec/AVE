[basic]
description = "Metamail 2.7-7.2 之前版本中存在任意文件写入漏洞。远程攻击者可通过发送包含 uuencode 附件的恶意邮件，在附件中指定目标文件的完整路径名，Metamail 在处理邮件时调用 uuencode 脚本（如 sun-audio-file）将附件内容写入攻击者指定的任意路径，从而覆盖系统文件。攻击者无需身份认证即可利用此漏洞，可能导致系统文件被篡改或服务异常。该漏洞影响 Metamail 2.7-7.2 之前的所有版本，CVSS 评分 2.6，危害等级低。"
published = "2003-08-15T04:00:00.000"
remediation = "升级 Metamail 至 2.7-7.2 及以上版本，该版本修复了 uuencode 脚本中未对附件路径进行安全检查的问题。同时建议在邮件客户端中禁用自动解码 uuencode 附件的功能，并配置邮件过滤器阻止含完整路径的 uuencode 附件。"
score = 2.6
severity = "LOW"
sources = ["epss"]
title = "Metamail uuencode 附件处理任意文件写入漏洞"
updated = "2026-06-16T21:50:03.937"

