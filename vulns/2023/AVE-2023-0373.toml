[basic]
description = "Linux 内核 RxRPC 协议实现中存在资源管理缺陷，当用户态程序通过 sendmsg() 系统调用创建 rxrpc 调用时，调用会被排队等待连接和通道分配。如果当前调用在分配完成前被中断，后续 sendmsg() 调用将返回 EBUSY 错误且无法正常中止等待中的进程，导致系统资源无法释放。本地攻击者可利用此漏洞造成拒绝服务，CVSS 评分 7.8，危害等级高。"
published = "2025-09-15T15:15:48.510"
remediation = "升级 Linux 内核至 6.2.16 及以上版本（长期稳定分支）或 6.3.3/6.4 及以上版本，合入 rxrpc sendmsg 中断时调用终止的修复提交 0eb362d25481。如无法立即升级内核，可限制非信任用户对 AF_RXRPC 套接字的访问权限，或通过 seccomp 策略拦截 rxrpc 相关系统调用作为临时缓解。"
score = 7.8
severity = "HIGH"
sources = ["msrc"]
title = "Linux kernel RXRPC 连接分配前进程中止拒绝服务漏洞"
updated = "2026-06-17T06:44:32.280"

