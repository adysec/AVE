[basic]
description = "Vixie Cron 在 Red Hat Linux 及 S.u.S.E. Linux 系统上存在缓冲区溢出漏洞，攻击者可通过特制的 MAILTO 环境变量值触发该漏洞。该漏洞影响 Red Hat Linux 4.2/5.2/6.0 以及 S.u.S.E. Linux 6.0/6.1 等版本。未经身份认证的远程攻击者可在 cron 任务中设置超长的 MAILTO 环境变量值，当系统尝试向该地址发送邮件通知时，cron 进程将触发缓冲区溢出，攻击者可能借此获得 root 权限执行任意代码。CVSS 评分 7.5，危害等级高。"
published = "1999-08-25T04:00:00.000"
remediation = "升级到已修复该漏洞的 Red Hat Linux 6.1 及以上版本或 S.u.S.E. Linux 6.2 及以上版本，并安装厂商发布的 Vixie Cron 安全补丁（如 Red Hat RPM 更新包）。如无法立即升级，可临时删除或限制 crontab 中 MAILTO 环境变量的使用，并将 /usr/bin/crontab 权限收紧为仅 root 可写，以降低被本地用户利用缓冲区溢出提权的风险。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
