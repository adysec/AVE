[basic]
description = "Microsoft Clip Art Gallery 5.0 存在缓冲区溢出漏洞，远程攻击者可通过向用户发送特制的 CIL（剪贴画库）文件触发该漏洞，导致目标系统拒绝服务或执行任意代码。该漏洞影响 Microsoft Clip Art Gallery 5.0 版本，CVSS 评分 5.1，危害等级中危。利用方式为构造恶意 CIL 文件并诱导用户打开。"
published = "2000-03-06T05:00:00.000"
remediation = "建议升级到 Microsoft Clip Art Gallery 5.0 的补丁版本（已包含在 Microsoft Security Bulletin MS00-015 中），或卸载 Clip Art Gallery 5.0 并安装 Office 2000 SR-1 及以上版本。如无法升级，可在浏览器中禁用 ActiveX 控件对 CIL 文件的自动处理以缓解风险。"
score = 5.1
severity = "MEDIUM"
sources = ["epss"]
title = "Microsoft Clip Art Gallery 5.0 缓冲区溢出漏洞"
updated = "2026-06-16T21:51:12.620"

