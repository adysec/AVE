[basic]
description = "Red Hat Linux 系统中 gkermit 程序被错误地设置了 setgid uucp 权限，导致本地普通用户可利用该缺陷以 uucp 组身份修改该组拥有的文件。攻击者需拥有本地系统账户并具备执行 gkermit 的权限，通过利用不当的 setgid 权限提升自身文件操作能力，可能导致系统敏感文件被篡改或破坏。该漏洞影响 Red Hat Linux 多个版本，CVSS 评分 4.6，危害等级中危。"
published = "2000-06-21T04:00:00.000"
remediation = "执行 `chmod g-s /usr/bin/gkermit` 移除 setgid 权限位，或安装 Red Hat 官方 Errata 更新（RHSA-2000:037）升级到修复版本。如无法立即更新，可卸载 gkermit 软件包（`rpm -e gkermit`）作为临时缓解措施。"
score = 4.6
severity = "MEDIUM"
sources = ["cve"]
title = "Red Hat Linux gkermit 本地文件修改漏洞"
updated = "2026-06-16T21:52:05.607"

