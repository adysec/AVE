[basic]
description = "AVM KEN! ISDN Proxy Server 1.3.10 及 1.4.30 版本存在输入验证缺陷，远程攻击者可通过向目标服务器发送特制的畸形请求报文，触发服务处理异常导致崩溃，造成拒绝服务。该漏洞无需认证即可触发，攻击门槛低，受影响设备在公共网络下攻击面较大。厂商暂未发布官方补丁，建议限制网络访问权限缓解风险。"
published = "2000-04-12T04:00:00.000"
remediation = "升级 AVM KEN! 至 1.4.31 或更高版本。如厂商已停止支持该产品，建议停止使用 AVM KEN! ISDN Proxy 并迁移至现代替代方案；临时缓解措施可在防火墙或边界设备上限制对 ISDN Proxy 服务的访问，仅允许受信任 IP 连接。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "AVM KEN! ISDN Proxy 拒绝服务漏洞"
updated = "2026-06-16T21:51:20.893"

