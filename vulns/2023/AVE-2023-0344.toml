[basic]
description = "Linux 内核 mm/khugepaged 子系统存在条件竞争漏洞，由于 collapse_and_free_pmd() 函数在释放页表时未正确持有 anon_vma 锁，本地攻击者可通过竞态条件合并相邻 VMA 的 anon_vma（与子进程共享），导致并发 rmap 遍历访问正在被释放的页表，进而触发 use-after-free 和锁依赖警告。该漏洞影响 Linux 内核多个版本，CVSS 评分 7.8，危害等级高，本地低权限用户可利用此漏洞实现权限提升或系统崩溃。"
published = "2025-03-27T17:15:43.330"
remediation = "升级 Linux 内核至以下已修复版本：5.4.299+、5.10.243+、5.15.192+、6.1.11+ 或 6.2+。修复提交为 mm/khugepaged 中在持有 mmap 锁后重复检查 ->anon_vma，防止折叠页表时的释放后使用竞争条件。对于无法立即升级的系统，可通过内核命令行参数 `transparent_hugepage=never` 禁用透明 hugepage 作为临时缓解措施。"
score = 7.8
severity = "HIGH"
sources = ["msrc"]
title = "Linux Kernel mm/khugepaged 匿名映射 VMA 竞争条件导致释放后使用漏洞"
updated = "2026-06-17T06:43:58.280"

