[basic]
description = "KDE K-Mail 存在符号链接攻击漏洞，本地攻击者可在用户临时目录中预创建恶意符号链接，当 K-Mail 在处理临时文件时将会跟随符号链接覆盖或创建任意系统文件，从而导致权限提升。该漏洞影响 KDE 1.1/1.1.1、RedHat Linux 6.0、Caldera OpenLinux 等系统，攻击者需拥有本地账号权限方可利用。"
published = "2000-01-04T05:00:00.000"
remediation = "升级 KDE 至 1.1.2 及以上版本，或升级操作系统至现代发行版。K-Mail 在临时目录中使用可预测文件名创建文件，攻击者可通过符号链接攻击劫持文件操作。如无法升级，确保 umask 设置为 077 并限制本地用户对 /tmp 的写权限作为临时缓解。"
score = 4.6
severity = "MEDIUM"
sources = ["epss"]
title = "KDE K-Mail 临时目录符号链接攻击本地权限提升漏洞"
updated = "2026-06-16T21:48:56.883"

