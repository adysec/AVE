[basic]
title = "TOTOLINK A6000R 路由器 webcmd 接口未授权远程命令执行漏洞"
description = "TOTOLINK A6000R 路由器固件中存在 webcmd 接口未授权访问漏洞，攻击者无需身份验证即可通过 HTTP 请求直接访问该接口，构造恶意命令参数实现远程命令执行，获取设备最高权限。该漏洞影响固件版本 V4.1.0cu.2317_B20241217 之前的版本，攻击者可借此植入后门、窃取配置或篡改网络流量，对使用该路由器的网络环境造成严重安全威胁。"
severity = "MEDIUM"
score = 5.0
sources = ["hwpoc"]
published = "2024-07-26"
updated = "2024-07-26"
remediation = "立即将 TOTOLINK A6000R 固件升级至最新版本（V4.1.0cu.2317_B20241217 或更高），该版本已修复 webcmd 接口未授权访问问题。如无法升级，在路由器防火墙中禁止 WAN 侧访问 80/443 管理端口，并限制仅内网可信 IP 可访问管理界面。同时检查并删除 /www/ 目录下可疑文件，确认设备未被植入后门。"
