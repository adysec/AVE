[basic]
description = 'MultiHTML 1.5 CGI 脚本存在文件泄露漏洞，远程攻击者可通过向 "multi" 参数传递特制文件名，读取服务器上的任意文件，甚至可能执行任意命令。该漏洞源于程序未对用户输入的文件名进行充分过滤，导致路径遍历攻击。攻击者无需认证即可利用，影响使用 MultiHTML 1.5 的 Web 服务器。'
published = "2000-12-19T05:00:00.000"
remediation = '立即从 Web 服务器 cgi-bin 目录中删除 `multihtml.pl` 脚本，改用 Apache 原生 SSI（`<!--#include virtual="..."-->`）替代其功能。如无法删除，在 Web 服务器配置中为该脚本设置严格的 DocumentRoot（如 `/var/www/html`），并禁用 CGI 对路径遍历的解析。同时修补脚本源码：移除 `open(FILE, "$multi")` 的直接调用，改为先校验 `multi` 参数值仅允许预定义的 HTML 文件名列表，禁止任何用户直接传入路径；对 `multi` 参数做严格的字符白名单过滤，丢弃包含 `..`、`/`、`%00` 的输入。建议以最小权限运行 CGI 进程，必要时将脚本放入 chroot 环境隔离。'
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "MultiHTML 1.5 CGI 脚本文件泄露漏洞"
updated = "2026-06-16T21:52:44.943"

