[basic]
description = "mpack 1.5 及更早版本中的 munpack 工具存在目录遍历漏洞，远程攻击者可通过在待解压文件的文件名中插入 ../（点点斜杠）序列，绕过路径限制，在父目录中创建新文件。攻击者无需身份认证即可利用此漏洞，可能导致任意文件写入，进而结合其他漏洞实现远程代码执行或系统控制。该漏洞影响 mpack 1.5 及之前所有版本，CVSS 评分 6.4，危害等级中危。"
published = "2003-04-11T04:00:00.000"
remediation = "升级 mpack 至 1.6 或更高版本，该版本修复了 munpack 对 ../ 序列的路径过滤不严问题。如无法升级，可限制 mpack 处理用户上传文件时的解压目录权限，或使用 AppArmor/SELinux 策略限制 munpack 的文件写入范围。"
score = 6.4
severity = "MEDIUM"
sources = ["osv"]
title = "mpack munpack 目录遍历漏洞"
updated = "2026-06-16T21:59:18.320"

