[basic]
description = "AltaVista Search Intranet 2.0 b/2.3 版本中的 query.cgi CGI 程序存在目录遍历漏洞。远程攻击者无需身份认证即可通过在查询参数中构造 `../` 序列，突破 Web 文档根目录限制，读取服务器上的任意文件。该漏洞利用方式简单，对机密性构成严重威胁，CVSS 评分 5.0，影响运行该版本 AltaVista 搜索引擎的 Intranet 系统。"
published = "1999-12-29T05:00:00.000"
remediation = '立即升级 AltaVista Search Intranet 至最新受支持版本。由于该产品已停止维护，建议迁移至现代搜索引擎解决方案。临时缓解措施：在 query.cgi 入口对用户输入进行严格过滤，拦截包含 ".." 或 "/" 等路径遍历字符的请求，或在 Web 服务器层面配置 URL 重写规则阻止此类攻击模式。'
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "AltaVista Search Intranet 目录遍历漏洞"
updated = "2026-06-16T21:50:52.507"

