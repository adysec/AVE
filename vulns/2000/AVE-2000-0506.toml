[basic]
description = "Microsoft Site Server 3.0 Commerce Edition 自带的示例网站以及站点向导生成的代码，在接收用户输入的标识号后未进行充分验证，直接将其拼入 SQL 查询语句。攻击者只需向受影响页面提交含恶意 SQL 片段的请求，即可在无需身份验证的情况下操纵后端数据库，执行任意查询以读取敏感数据、篡改或删除记录，甚至可能获取数据库服务器的高级权限，造成数据泄露与业务中断。"
published = "2000-02-18"
remediation = "安装 Microsoft Site Server 3.0 Commerce Edition 的 MS00-010 安全更新补丁（KB252614），该补丁修正了示例站点及向导生成代码中的用户输入验证缺陷。已使用受影响代码作为模板开发自定义站点的管理员，需参照 KB252614 中的代码示例，对所有用户输入实施严格验证，改用参数化查询或存储过程访问数据库，并确保 Web 应用使用的数据库账号仅授予最小必要权限。如暂无法立即打补丁，应临时下线所有基于受影响模板部署的示例站点，并在防火墙层限制对 Site Server 后端的直接数据库访问。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "Microsoft Site Server Commerce Edition SQL注入漏洞"
updated = "2026-06-16"

