[basic]
description = "Check Point VPN-1/FireWall-1 4.1 及更早版本存在 FTP 连接强制绕过漏洞。由于防火墙网关在处理特定畸形 FTP 命令（如 PORT 命令）时未正确校验连接目标地址，导致攻击者可将 FTP 数据连接重定向至任意第三方服务器（FTP Bounce），从而绕过防火墙访问控制策略。此漏洞允许未经身份认证的远程攻击者通过发送特制的无效 FTP 命令，利用受影响的防火墙设备探测内网服务或对第三方发起匿名扫描攻击。管理员应及时升级至不受影响版本。"
published = "2000-11-14T05:00:00.000"
remediation = "升级 Check Point VPN-1/FireWall-1 至 4.1 SP1 及以上版本，该漏洞已在后续版本中修复。如在旧版环境下无法升级，可在 properties 中禁用 FTP Security Server，改为纯状态检测模式处理 FTP 流量，或通过防火墙规则限制仅允许内部客户端访问外部 FTP 服务器以降低攻击面。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Check Point VPN-1/FireWall-1 FTP连接强制绕过漏洞"
updated = "2026-06-16T21:52:32.053"

