[basic]
description = "CRYPTOCard CRYPTOAdmin 4.1 版本存在弱加密实现漏洞。该产品作为密码管理与加密管理工具，采用了强度不足的加密算法或加密机制，导致其保护的数据可被攻击者通过暴力破解、密码分析等手段还原。攻击者可利用此漏洞获取经弱加密保护的敏感凭据或认证信息，进而绕过系统安全机制。该漏洞影响所有使用 CRYPTOAdmin 4.1 版本的系统环境，建议升级至更高版本或采用更强的加密算法。"
published = "2000-04-10"
remediation = "升级 CRYPTOAdmin 至 4.1 以上版本，该版本已修复弱加密算法问题。如无法升级，应避免在网络中传输明文凭证，并使用 TLS/SSH 等加密通道管理 CRYPTOCard 设备，同时在防火墙中限制对管理端口的访问来源。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "CRYPTOCard CRYPTOAdmin 4.1 弱加密漏洞"
updated = "2000-04-10"

