[basic]
description = "CA ControlIT 4.5 存在拒绝服务漏洞，本地或远程攻击者无需身份认证即可向目标系统的 ControlIT 服务发送特制请求，导致目标系统强制重启或强制已有用户会话注销，造成服务不可用。该漏洞影响 CA ControlIT 4.5 版本，攻击者可通过网络远程触发，无需复杂前置条件即可实现拒绝服务攻击。"
published = "1999-01-01T05:00:00.000"
remediation = "CA ControlIT 4.5 已停止维护，建议迁移至厂商当前支持的远程管理解决方案。临时缓解措施：在防火墙上限制仅允许受信任 IP 访问 ControlIT 服务端口（默认 TCP 1499），并禁用不必要的远程控制功能。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "CA ControlIT 4.5 拒绝服务漏洞"
updated = "2026-06-16T21:48:13.103"

