[basic]
description = "Microsoft JET 数据库引擎在处理数据库查询时存在 VBA Shell 漏洞，攻击者可通过构造特制的数据库查询语句调用 VBA Shell 函数，从而实现任意命令执行。该漏洞影响 JET 3.5、3.51 及 4.0 版本，利用方式为向目标系统提交恶意构造的数据库查询请求，无需高级权限即可触发，可能导致敏感数据泄露或完全控制目标系统。"
published = "1999-08-20T04:00:00.000"
remediation = '立即安装 Microsoft 安全公告 MS99-030 提供的 Jet 数据库引擎更新补丁（下载中心 ID: 3045），覆盖 Jet 3.5/3.51/4.0。对于 Jet 4.0 系统，额外应用 KB239114 更新；对于 Jet 3.5/3.51 等已停止支持的版本，建议升级到 Jet 4.0 及以上受支持版本。同时将注册表 HKEY_LOCAL_MACHINE\SOFTWARE\Microsoft\Jet\4.0\Engines\SandboxMode 设置为 2，禁用 VBA Shell 函数调用，并对来自不可信来源的 .mdb/.xls 文件弹出安全警告，禁止自动执行数据库查询。'
score = 7.2
severity = "HIGH"
sources = ["epss"]
title = "Microsoft JET 数据库引擎 VBA Shell 命令执行漏洞"
updated = "2026-06-16T21:51:28.873"

