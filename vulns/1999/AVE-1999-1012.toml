[basic]
description = "Microsoft IIS 3.0 在处理 ASP 页面请求时存在拒绝服务漏洞。其 URL 解析逻辑未能对路径中的正斜杠（/）字符数量进行合理限制，当远程攻击者向目标服务器发送一个 URL 中包含大量连续斜杠的特制 ASP 页面请求时，服务器会因异常的资源消耗或解析异常而无法正常响应后续请求，导致服务中断。该漏洞影响运行 Microsoft IIS 3.0 且启用 ASP 功能的 Web 服务器，攻击者无需身份认证，只需能通过网络访问目标站点即可发起攻击，利用方式简单，可对站点可用性造成严重影响。"
published = "1999-12-31T05:00:00.000"
remediation = "建议将 Microsoft IIS 3.0 升级至 IIS 4.0 或更高版本（如 Windows 2000 自带的 IIS 5.0），从根本上修复 ASP 页面解析缺陷。若暂无法升级，可在 IIS 中限制单个请求 URL 长度、配置 URLScan 工具过滤含异常数量斜杠的请求，并部署前端防火墙/反向代理限制超大 URL 请求作为临时缓解措施，同时监控 ASP 站点异常访问日志。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
