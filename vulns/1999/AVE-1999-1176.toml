[basic]
description = "Cabletron SmartSwitch Router (SSR) 8000 路由器在固件版本 2.x 中存在 ARP 请求处理能力的设计缺陷，其每秒仅能处理约 200 个 ARP 请求。位于同一广播域或二层网络中的攻击者，可向目标设备发送超过该速率限制的 ARP 请求洪水（ARP flooding），耗尽设备的处理能力，导致合法 ARP 请求无法被正常响应，进而引发网络中断或服务不可用的拒绝服务（DoS）攻击。该漏洞影响运行 2.x 固件版本的 SSR 8000 系列设备，攻击者无需身份认证，仅需具备向目标网络发送大量 ARP 包的能力即可利用，CVSS 评分约为 5.0，危害等级中等。"
published = "1999-11-24T05:00:00.000"
remediation = "建议将 Cabletron SmartSwitch Router 8000 固件升级至 3.0 或更高版本，该版本提升了 ARP 请求处理能力并修复了 ARP 泛洪拒绝服务问题。如暂无法升级，可在路由器上配置 ARP 速率限制或入口过滤（如启用端口安全、限制每端口学习速率），并在上游边界防火墙/ACL 上对 ARP 广播流量进行限速，以缓解大规模 ARP 请求泛洪攻击。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Cabletron SmartSwitch Router 8000 ARP Flooding 拒绝服务漏洞"
updated = "2026-06-16T21:50:41.563"

