[basic]
description = "Apache 2.0 至 2.035 版本中 ap_log_rerror 函数在处理 CGI 应用错误时，将包含服务器完整路径的错误信息直接发送给客户端，导致敏感信息泄露。远程攻击者无需认证即可通过触发 CGI 错误获取服务器绝对路径，为进一步攻击（如 LFI、目录遍历）提供信息支撑。该漏洞影响范围广，利用条件低，CVSS 评分 5.0，危害等级中危。"
published = "2002-05-06T04:00:00.000"
remediation = "升级 Apache HTTP Server 至 2.0.36 或更高版本。具体操作：从 https://httpd.apache.org/download.cgi 下载 Apache 2.0.36 源码包，编译安装替换旧版本；或使用系统包管理器更新（如 yum update httpd / apt upgrade apache2）。如无法立即升级，可在 httpd.conf 中将 ErrorDocument 指令指向通用错误页面，避免 CGI 错误时泄露服务器绝对路径信息。"
score = 5
severity = "MEDIUM"
sources = ["osv"]
title = "Apache HTTP Server 信息泄露漏洞"
updated = "2026-06-16T21:59:36.810"

