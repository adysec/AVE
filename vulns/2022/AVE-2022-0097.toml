[basic]
description = "Linux 内核 arm64 架构中的 swapper 页表项未设置 UXN（非特权执行永不）权限位，当系统支持 FEAT_EPAN 特性时，idmap 页表的读/写访问被拒绝，导致访问 __idmap_kpti_flag 时触发内核 panic，造成本地拒绝服务。该漏洞影响支持 FEAT_EPAN 特性的 arm64 平台上的 Linux 内核，攻击者需具备本地用户权限。该问题已在内核上游版本 c3cee924bd85 的代码重构中被修复。"
published = "2025-06-18T11:15:54.297"
remediation = '建议将 Linux 内核升级至以下包含修复的版本：主线 v5.19-rc1 及以上（合入 commit c3cee924bd85），或稳定分支 v5.18.5+、v5.15.48+、v5.10.125+、v5.4.200+、v4.19.248+、v4.14.284+、v4.9.319+、v4.4.319+。如无法升级，可在内核启动参数中添加 "arm64.nopauth" 禁用 FEAT_EPAN 作为临时缓解措施，但会降低硬件安全特性。'
score = 5.5
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux Linux内核 arm64 页表权限访问拒绝漏洞"
updated = "2026-06-17T05:23:02.067"

