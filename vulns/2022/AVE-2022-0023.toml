[basic]
description = "Linux 内核 Btrfs 文件系统在修复（repair）机制中存在释放后使用漏洞。当提交修复 bio 失败时，submit 辅助函数已自动对 bio 调用 bio_endio() 进行清理，但代码随后再次尝试释放同一 bio，导致竞态条件下触发释放后使用及空指针解引用。本地攻击者可利用此漏洞造成系统崩溃或潜在权限提升，影响使用 Btrfs 文件系统的 Linux 内核版本。"
published = "2025-02-26T07:00:53.927"
remediation = "立即升级 Linux 内核至 5.18 及以上版本，或更新至 5.10.248/5.15.184/5.16.19/5.17.2 及对应长期支持分支的更新版本。对于无法立即升级的系统，可通过内核 live patching 机制（如 kpatch、KernelCare）应用热补丁，临时避免触发 btrfs repair 路径以降低风险。"
score = 7.8
severity = "HIGH"
sources = ["msrc"]
title = "Linux kernel btrfs 释放后使用漏洞"
updated = "2026-06-17T05:17:15.850"

