[basic]
description = "Linux 内核跟踪子系统（tracing）存在空指针解引用漏洞，由于直方图（histogram）值未禁止字符串、堆栈跟踪、符号、分组桶等非法修饰符，本地攻击者可通过 kprobe_events 接口构造含 .buckets 等修饰符的跟踪事件并触发直方图读取操作，导致内核空指针解引用（CWE-476），进而引发系统崩溃拒绝服务。该漏洞影响 Linux 主线内核多个版本，需具有本地访问权限及 tracing 文件系统操作权限，CVSS 评分 5.5，危害等级中危。Linux 内核社区已发布修复补丁予以修复。"
published = "2025-05-02T16:15:28.270"
remediation = "建议将 Linux 内核升级至 6.1.23、6.2.8 或更高版本（包含提交 e0213434fe3e、2fc0ee435c92、39cd75f2f3a4 的任一稳定分支），这些版本已禁止直方图值使用不支持的修饰符，可防止触发空指针解引用导致内核崩溃。如无法升级内核，应避免在 tracing 事件中设置使用了 buckets/log/stacktrace 等不支持修饰符的 histogram trigger，特别是针对 kprobe 事件的 vals 字段不要包含 .buckets 等修饰符。"
score = 5.5
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux Kernel 追踪子系统直方图空指针解引用漏洞"
updated = "2026-06-17T06:44:16.930"

