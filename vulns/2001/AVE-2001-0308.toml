[basic]
description = 'Apache 1.3.20 启用 Multiviews 选项时存在目录索引泄露漏洞，远程未认证攻击者可通过构造包含 "M=D" 查询参数的 URL 绕过索引页面，直接列出目录内容并浏览文件。该漏洞影响 Apache 1.3.20 及可能更早版本，攻击者无需认证即可远程利用，仅需目标服务器开启 Multiviews 选项并配置不当，通过发送特制 HTTP 请求即可获取目录列表信息，导致敏感文件泄露，CVSS 评分 5.0（中等危害），主要影响机密性。Apache 官方建议升级至修复版本或禁用 Multiviews 选项缓解风险。'
published = "2001-10-01T04:00:00.000"
remediation = "升级 Apache 服务到 1.3.21 或更高版本，该版本已修复 Multiviews 目录索引漏洞；如无法立即升级，可在 Apache 配置文件中添加以下配置以禁用 Multiviews 功能：`Options -MultiViews`；并确保服务运行在安全端口，限制外部访问权限；同时监控服务日志以发现潜在的目录遍历攻击尝试。"
score = 5
severity = "MEDIUM"
sources = ["redhat"]
title = "Apache HTTP Server 1.3 目录索引漏洞"
updated = "2026-06-16T21:54:51.233"

