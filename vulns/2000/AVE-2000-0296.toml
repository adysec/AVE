[basic]
description = "Sniffit 0.3.x 的邮件日志记录功能存在缓冲区溢出漏洞，当启用 `-L` 日志选项时，攻击者可通过向目标 Sniffit 服务发送特制的包含超长 MAIL FROM 头的电子邮件数据包触发缓冲区溢出，导致远程攻击者能够以 Sniffit 进程权限执行任意命令。该漏洞影响 Sniffit 0.3.6 及 0.3.7 Beta 版本，危害等级严重，攻击者无需身份认证即可利用。"
published = "2000-05-02T04:00:00.000"
remediation = "立即升级至 Sniffit 0.3.7 Beta 以上版本，并避免在生产环境以 root 权限运行 Sniffit。建议使用 Wireshark/tcpdump 等活跃维护的替代工具进行网络抓包分析。如必须继续使用，请使用栈保护编译选项（如 -fstack-protector）重新编译并限制监听来源 IP。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "Sniffit 0.3.x -L 日志记录选项远程缓冲区溢出漏洞"
updated = "2026-06-16T21:51:31.160"

