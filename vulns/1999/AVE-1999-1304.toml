[basic]
description = "Progressive Networks RealServer 5.0 及更早版本的 pnserver 组件在处理短小畸形请求时存在漏洞，远程攻击者可通过发送特制的短小畸形请求触发拒绝服务，导致服务崩溃或无响应。该漏洞影响 RealServer 5.0 及更早版本，CVSS 评分 7.8，属于高危拒绝服务漏洞。攻击者无需身份认证即可远程发送特制短请求触发漏洞，导致服务拒绝服务。Progressive Networks 已在后续版本中修复此漏洞，建议用户升级到修复版本。"
published = "1998-01-15T05:00:00.000"
remediation = "建议立即升级 RealServer 到 G2 或更高版本，或安装 RealNetworks 官方安全补丁（详见 http://service.real.com/help/faq/serv501.html）。如暂时无法打补丁，应在防火墙或访问控制层面限制对 pnserver 默认端口 7070 的访问，仅允许受信任的 IP 地址连接，作为临时缓解措施。"
score = 7.8
severity = "HIGH"
sources = ["epss"]
title = "Progressive Networks RealServer 5.0 畸形短请求拒绝服务漏洞"
updated = "2026-06-16T21:49:35.440"

