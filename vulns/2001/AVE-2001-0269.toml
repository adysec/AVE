[basic]
description = "MIMAnet 的 viewsrc.cgi 2.0 存在目录遍历漏洞，远程攻击者可通过向 `loc` 参数传递 `../` 等路径穿越序列，绕过访问限制读取服务器上的任意文件。该漏洞影响运行 MIMAnet source viewer 2.0 的 Web 服务器，攻击者无需身份认证即可利用，可能导致敏感信息泄露（如配置文件、系统文件等）。由于 CGI 脚本未对用户输入的路径参数进行充分过滤，攻击者只需构造特制的 HTTP 请求即可触发。"
published = "2001-08-22T04:00:00.000"
remediation = "立即删除或禁用服务器上的 `viewsrc.cgi` 脚本，该软件已停止维护且不再有安全更新。如仍需源码查看功能，改用现代 Web 服务器（如 Apache/Nginx）内置的目录浏览模块或独立代码查看工具，并对用户输入参数做严格的路径白名单过滤，禁止包含 `../` 等目录遍历字符。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "MIMAnet viewsrc.cgi 目录遍历漏洞"
updated = "2026-06-16T21:54:39.950"

