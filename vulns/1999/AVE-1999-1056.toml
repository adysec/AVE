[basic]
description = "Hylafax 4.0.2 中的 faxalter 组件存在本地缓冲区溢出漏洞。本地攻击者可通过向 -m 命令行参数传递超长字符串触发缓冲区溢出，成功利用该漏洞可获得目标系统的更高权限。该漏洞影响 Hylafax 4.0.2 版本，CVSS 评分 7.2，危害等级高。建议用户升级至最新版本以修复此漏洞。"
published = "1999-11-04T05:00:00.000"
remediation = "升级 Hylafax 至 4.1 或更高版本（当前最新稳定版为 7.0.11），该漏洞已在 4.1 中修复。如无法升级，可移除 faxalter 二进制文件的 suid 位（chmod u-s /usr/local/bin/faxalter）阻断提权路径，或限制本地可登录用户为受信任账户。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "HylaFAX faxalter 本地缓冲区溢出漏洞"
updated = "2026-06-16T21:50:13.947"

