[basic]
description = "DEC OpenVMS VAX 5.5-2 至 5.0 及 OpenVMS AXP 1.0 版本中存在未明本地页面管理漏洞，本地攻击者可通过利用系统页面管理机制的缺陷，成功触发后可提升至系统级权限，完全控制受影响系统。该漏洞源于操作系统对内存页面的权限控制不当，攻击者需要拥有本地账户访问权限才能进行利用。"
published = "1993-02-24T05:00:00.000"
remediation = "立即升级 OpenVMS VAX 至 V5.5-2 以上版本，OpenVMS AXP 升级至 V1.0 以上版本，并安装 CERT/CC 公告 CA-1993-05 中对应的安全补丁。对于无法升级的遗留系统，应严格限制本地用户登录权限，仅授予可信管理员账户访问，并启用系统审计日志监控异常提权行为。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "DEC OpenVMS 本地权限提升漏洞"
updated = "2026-06-16T21:50:10.310"

