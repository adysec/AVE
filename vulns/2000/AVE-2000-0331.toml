[basic]
description = "L0pht AntiSniff（后更名为 @stake AntiSniff）DNS 响应处理组件存在缓冲区溢出漏洞。远程攻击者可向运行 AntiSniff 的目标主机发送特制的 DNS 响应数据包，触发堆栈缓冲区溢出，从而以系统权限执行任意命令。该漏洞影响 AntiSniff 1.0 及 Researchers 1.0 版本，CVSS 评分 10.0，危害等级严重，攻击者无需认证即可远程利用。"
published = "2000-05-16T04:00:00.000"
remediation = "立即升级到 @Stake 官方发布修复的 AntiSniff 版本（1.0.2 或更高），原补丁曾发布于 http://www.l0pht.com/advisories/asniff_advisory.txt。由于该产品已停止维护，建议迁移至仍受支持的替代网络监控工具。临时缓解措施可在防火墙上限制仅允许与受信 DNS 服务器通信，并部署 IDS 规则检测异常大尺寸的 DNS 响应包，防止恶意 DNS 响应触发溢出。"
score = 10
severity = "CRITICAL"
sources = ["exploitdb"]
title = "L0pht AntiSniff DNS 响应缓冲区溢出远程代码执行漏洞"
updated = "2026-06-16T21:51:38.847"

