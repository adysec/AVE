[basic]
description = "AN-HTTPd 1.20b 随附的示例 CGI 脚本（test.bat、input.bat、input2.bat、envout.bat）未对用户输入进行过滤与转义，导致远程命令执行漏洞。未经身份认证的远程攻击者可通过向目标服务器发送包含 shell 元字符（如管道符）的特制 HTTP 请求，在 CGI 脚本参数中注入任意操作系统命令并执行。该漏洞影响所有部署 AN-HTTPd 1.20b 及早期版本的 Windows 系统，攻击者无需任何凭据即可利用。修复方式为删除上述示例 CGI 脚本文件，或升级至官方发布的 1.21 版本。"
published = "1999-11-02T05:00:00.000"
remediation = "删除 cgi-bin 目录下 test.bat、input.bat、input2.bat 以及 ssi 目录下 envout.bat 这四个示例 CGI 脚本，防止远程攻击者通过 shell 元字符执行任意命令。同时升级到 AN-HTTPd 1.21 版本，该版本已移除有漏洞的示例脚本。如暂时无法升级，请确保 web 根目录下不存在上述 bat 文件，并在 Web 服务器配置中禁止执行 cgi-bin 目录外的脚本。"
score = 7.5
severity = "HIGH"
sources = ["exploitdb"]
title = "AN-HTTPd 1.2b CGI 远程命令执行漏洞"
updated = "2026-06-16T21:49:23.150"

