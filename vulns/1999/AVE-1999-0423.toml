[basic]
description = "PHP/Fi 2.0 的 php.cgi 脚本未对用户输入的路径进行有效过滤，存在目录遍历漏洞。远程攻击者无需身份认证，可通过向目标服务器发送包含 `../` 等路径遍历序列的特制 HTTP 请求，读取系统上任意文件（如 `/etc/passwd`、配置文件等）。该漏洞影响 PHP/Fi 2.0 及更早版本，可导致敏感信息泄露，CVSS 评分 10.0，危害等级严重。"
published = "1997-08-01T04:00:00.000"
remediation = "临时缓解措施为在 Web 服务器配置中限制 php.cgi 访问路径，禁止直接通过 URL 执行任意文件。彻底修复需立即停用已停止维护的 PHP/FI 2.0，升级至 PHP 8.5.x 或 8.4.x 等受支持版本，并启用 cgi.force_redirect 及 doc_root 指令限制 CGI 模式下的目录访问范围。"
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "PHP PHP/fi 2.0 目录遍历漏洞"
updated = "2026-06-16T21:47:58.650"

