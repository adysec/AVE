[basic]
title = "Martin Schulze Cfingerd 1.4.2 GECOS 字段缓冲区溢出漏洞"
description = "cfingerd 是一款类 Unix 系统上的可配置 finger 服务守护程序。其 1.4.2 版本在解析用户 GECOS 字段时存在栈缓冲区溢出漏洞，未对输入长度进行有效校验。本地攻击者可通过 passwd 命令或直接修改 /etc/passwd 设置超长 GECOS 字段，当 cfingerd 处理该字段时触发缓冲区溢出，覆盖返回地址，从而以 root 权限执行任意代码。攻击需要本地系统访问权限，无需额外认证。"
severity = "HIGH"
score = 7.2
sources = ["cve", "avd", "exploitdb"]
published = "1999-09-21"
updated = "2026-06-16"
remediation = "升级 cfingerd 至 1.4.4 或更高版本以修复该缓冲区溢出漏洞。如无法立即升级，可在 cfingerd 配置文件中限制 GECOS 字段最大长度，或临时禁用 finger 服务作为缓解措施。"
