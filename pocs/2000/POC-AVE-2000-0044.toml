[info]
author = "ave"
description = "检测 Linuxconf 1.1.6 r10 及更早版本是否存在远程缓冲区溢出漏洞。通过向 linuxconf 服务（默认端口 98/980）发送超长参数或检测服务 banner 来识别漏洞。该漏洞可导致远程攻击者以 root 权限执行任意代码。"
id = "POC-AVE-2000-0044"
name = "Linux Linuxconf 远程缓冲区溢出漏洞 PoC"
severity = "critical"
tags = ["ave-2000-0044"]
vuln_id = [
    "CVE-2000-0017",
    "AVE-2000-0044",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "linuxconf",
    "Linuxconf Web Access",
    "System configuration",
    "htmlaccess",
    "control panel",
]

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/linuxconf/"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "linuxconf",
    "Linuxconf Web Access",
]

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/htmlaccess/"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "linuxconf",
    "htmlaccess",
]

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "header"
type = "word"
words = ["linuxconf"]
