[basic]
description = "Microsoft Windows 95/98 的 NetBIOS 协议实现存在空源名称处理缺陷，远程攻击者无需身份认证即可向目标系统发送特制的 NetBIOS 会话请求数据包，其中源名称字段设置为 NULL，导致目标系统网络服务崩溃或停止响应，造成拒绝服务。该漏洞影响 Windows 95 和 Windows 98 系统，攻击条件低，仅需通过网络发送单个恶意数据包即可触发，CVSS 评分 5.0，危害等级中危。ExploitDB 已公开该漏洞的利用代码。"
published = "2000-05-02T04:00:00.000"
remediation = "由于 Windows 95/98 已停止支持且无官方补丁，建议在防火墙或边界路由器上阻止 UDP 137-138 端口和 TCP 139 端口的入站流量，以阻断远程 NetBIOS 攻击。同时可在网络适配器属性中禁用 NetBIOS over TCP/IP，或升级至受支持的 Windows 版本（如 Windows 10/11）并启用 Windows Defender 防火墙。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Microsoft Windows 95/98 NetBIOS 空源名称拒绝服务漏洞"
updated = "2026-06-16T21:51:31.690"

