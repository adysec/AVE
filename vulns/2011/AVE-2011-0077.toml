[basic]
description = "Microsoft Windows 辅助功能驱动程序（afd.sys）存在权限提升漏洞。该驱动未正确验证从用户模式传递到内核模式的输入，本地攻击者可通过运行特制应用程序触发漏洞，从而在目标系统上以提升的权限执行任意代码。该漏洞影响 Windows XP SP2/SP3 及 Server 2003 SP2 版本，Microsoft 已在 MS11-080 安全公告中发布补丁修复。"
published = "2011-10-12T02:52:43.910"
remediation = "安装 Microsoft 安全公告 MS11-080 对应补丁 (KB2592799)，升级至 Windows XP SP3 最新补丁包或 Windows Server 2003 SP2 最新补丁包。如无法打补丁，建议删除或禁用 afd.sys 驱动文件（需注意可能影响网络功能），并通过组策略限制非管理员用户登录系统以降低攻击面。"
score = 7.8
severity = "HIGH"
sources = ["kev"]
title = "Microsoft Windows AFD.sys 本地权限提升漏洞"
updated = "2026-06-16T23:30:35.373"

