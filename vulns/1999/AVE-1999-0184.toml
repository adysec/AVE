[basic]
description = 'Microsoft Internet Explorer 5 中的 scriptlet.typelib ActiveX 控件被错误地标记为"安全用于脚本", 导致远程攻击者可通过诱导用户访问恶意网页, 利用该 ActiveX 控件执行任意命令(如 Bubbleboy 漏洞演示的文件写入攻击)。该漏洞影响 Microsoft Internet Explorer 5 版本, 攻击条件为用户访问恶意网页并启用 ActiveX, 攻击者可借此在用户系统上执行任意代码或写入文件, CVSS 评分 5.1, 属中危漏洞。'
published = "1999-08-21T04:00:00.000"
remediation = "建议立即升级至 Internet Explorer 5.01 SP1 或更高版本，或安装 Microsoft 安全公告 MS99-032 补丁（KB240308）；无法升级时可在 IE“Internet 区域”安全设置中将“运行未标记为安全的 ActiveX 控件”设为“禁用”，或为 scriptlet.typelib (CLSID: 06290BD5-48AA-11D2-8432-006008C3FBFC) 设置 Kill Bit 禁用该 ActiveX 控件"
score = 5.1
severity = "MEDIUM"
sources = ["epss"]
title = "Microsoft Internet Explorer 5 ActiveX 安全标记错误远程代码执行漏洞"
updated = "2026-06-16T21:48:48.493"

