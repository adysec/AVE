[basic]
description = "IrfanView IrfanView32 3.0.7 图像文件缓冲区溢出漏洞"
published = "1999-11-09"
remediation = "立即升级 IrfanView 至 3.07 以上版本，当前最新版本为 4.75，可从官网 https://www.irfanview.com 免费下载。该漏洞在解析 Photoshop 图像文件（8BPS 头部）时存在缓冲区溢出，攻击者可通过构造特制图像文件触发远程代码执行。如无法立即升级，建议不要使用 IrfanView 打开来源不明的 .psd 或 Photoshop 格式文件，并考虑使用其他图像查看软件作为临时缓解措施。"
score = 5
