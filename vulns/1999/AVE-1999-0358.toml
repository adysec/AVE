[basic]
description = "Red Hat Linux 4.2/5.2/6.0 系统自带的 in.telnetd Telnet 守护进程存在输入验证缺陷，远程攻击者无需身份认证即可向目标系统发送特制的 TERM 环境变量，触发服务进程异常终止，导致拒绝服务。该漏洞影响 Red Hat Linux 4.2、5.2、6.0 等多个版本，攻击条件低，仅需网络可达即可实施。"
published = "1999-08-19"
remediation = "建议立即禁用 in.telnetd 服务并改用 SSH 远程登录：注释 /etc/inetd.conf 中 telnet 行后重启 inetd 服务。如必须使用 telnet，请升级至 Red Hat Linux 6.2 及以上版本。对于已达生命周期的 Red Hat Linux 4.2/5.2/6.0，建议迁移至受支持的企业级发行版。"
score = 6.4
severity = "MEDIUM"
sources = ["avd"]
title = "Red Hat Linux in.telnetd 拒绝服务漏洞"
updated = "2026-06-16"

