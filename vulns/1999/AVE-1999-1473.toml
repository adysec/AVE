[basic]
description = "HP-UX 操作系统的 dtlogin 和 dtsession 组件存在安全绕过漏洞。本地攻击者可通过利用该漏洞绕过身份认证机制，获取系统未授权的访问权限并提升至更高权限。该漏洞影响 HP-UX 10.10 和 10.20 版本，CVSS 评分 4.6，危害等级中危。建议用户及时升级系统或应用厂商发布的安全补丁以修复此漏洞。"
published = "1997-01-07T05:00:00.000"
remediation = "立即安装 HP 安全公告 HPSBUX9701-055 中提供的对应补丁。对于 HP-UX 10.10 系统，安装 dtlogin/dtsession 安全补丁 PHSS_10666；对于 HP-UX 10.20 系统，安装补丁 PHSS_10667。如系统已停止维护无法获取补丁，应限制本地用户对 dtlogin 和 dtsession 二进制文件的执行权限，或升级至受支持的 HP-UX 11i 版本。"
score = 4.6
severity = "MEDIUM"
sources = ["avd"]
title = "HP HP-UX dtlogin/dtsession 安全绕过漏洞"
updated = "2026-06-16T21:50:10.170"

