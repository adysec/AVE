[basic]
description = 'Sun Solaris x86 2.4、2.5 及 2.5.1 版本中的 nlps_server 组件存在缓冲区溢出漏洞。远程攻击者无需认证，通过向 TCP 2766 端口（System V 监听服务）发送以 "NLPS:002:002:" 开头超长字符串，即可触发缓冲区溢出，以 root 权限执行任意代码。该漏洞影响 Solaris x86 系列多个版本，危害等级严重。'
published = "1999-12-31T05:00:00.000"
remediation = "立即升级至 Oracle Solaris 10 或 11 等受支持版本，新版本已修复该缓冲区溢出漏洞。如无法升级，立即在 /etc/inetd.conf 中注释或删除 nlps_server 条目并重启 inetd 服务，同时在防火墙规则中阻止对 TCP 2766 端口的外部访问，仅允许受信任管理 IP 连接。"
score = 9.8
severity = "CRITICAL"
sources = ["epss"]
title = "Sun Solaris x86 nlps_server 缓冲区溢出漏洞"
updated = "2026-06-16T21:50:46.927"

