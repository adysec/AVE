[basic]
description = "aVirt Rover POP3 服务器 1.1 版本存在缓冲区溢出漏洞，远程攻击者无需身份认证即可通过向目标服务器发送超长用户名参数触发该漏洞，导致服务器进程崩溃或拒绝服务。该漏洞影响运行 aVirt Rover POP3 server 1.1 的邮件服务器系统，攻击者只需连接到服务器的 POP3 端口（110）并在 USER 命令中传入特制超长字符串即可使服务不可用。由于该服务器是早期流行的 POP3 服务程序，存在该版本的系统均面临被拒绝服务攻击的风险。建议升级至最新版本或更换更安全的 POP3 服务软件以修复此漏洞。"
published = "1999-12-27T05:00:00.000"
remediation = "建议升级 aVirt Rover POP3 服务器至官方已修复的后续版本（如 1.2 及以上），或停用存在漏洞的 POP3 服务。作为临时缓解措施，可在防火墙/边界设备上限制仅允许受信任 IP 访问 110 端口，并部署入侵检测规则拦截超长 USER 命令以防范拒绝服务攻击。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "aVirt Rover POP3 服务器缓冲区溢出拒绝服务漏洞"
updated = "2026-06-16T21:50:55.140"

