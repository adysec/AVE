[info]
author = "ave"
description = "检测 O'Reilly WebSite 1.1e / Website Pro 2.0 服务器上 /cgi-dos/ 目录下是否存在 args.bat 或 args.cmd 脚本，该脚本存在命令注入漏洞"
id = "POC-AVE-1999-1003"
name = "O'Reilly WebSite args.bat/args.cmd 命令执行漏洞 PoC"
severity = "high"
tags = ["cve-1999-1180"]
vuln_id = [
    "CVE-1999-1180",
    "AVE-1999-1003",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/cgi-dos/args.bat"
protocol = "http"

[[poc.requests.matchers]]
expect = true
status = [200]
type = "status"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/cgi-dos/args.cmd"
protocol = "http"

[[poc.requests.matchers]]
expect = true
status = [200]
type = "status"
