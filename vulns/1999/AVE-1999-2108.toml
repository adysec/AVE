[basic]
description = 'Microsoft Windows 的 Internet 名称服务（WINS）存在安全缺陷，远程攻击者可通过发送特殊的"1Ch"注册请求，诱使 WINS 将域控制器指向攻击者控制的恶意服务器。成功利用该漏洞可导致目标网络失去连接（拒绝服务），或通过域名解析劫持窃取域用户凭据。攻击无需身份认证，仅需向 WINS 服务发送特制注册包即可触发。该漏洞主要影响使用 WINS 的 Windows 域环境，当网络中仍在使用 Windows 95/98 客户端或主域控制器不可用时，其影响范围可能受到一定限制。'
published = "2009-01-15T01:30:00.407"
remediation = "升级到已修复该问题的 Windows NT 4.0 SP6a 或 Windows 2000 SP2 及以上版本；在 WINS 服务中禁用对 1Ch（域控制器）NetBIOS 名称的远程动态注册，并配置仅允许受信任的域控制器进行名称注册；在边界防火墙限制 137/UDP、138/UDP、139/TCP 及 42/TCP 端口的外部访问，临时缓解来自不可信网络的 WINS 注册攻击。"
score = 7.6
severity = "HIGH"
sources = ["cve"]
title = "Microsoft Windows Internet Naming Service 域控制器重定向欺骗漏洞"
updated = "2026-06-16T21:50:47.633"

