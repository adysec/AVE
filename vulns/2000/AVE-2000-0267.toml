[basic]
description = "Red Hat Piranha 虚拟服务器套件中的 passwd.php3 CGI 脚本存在命令注入漏洞，本地攻击者可通过在输入参数中插入 shell 元字符（如分号、管道符等）绕过输入过滤，在目标服务器上以 Web 服务进程权限执行任意系统命令。该漏洞影响运行 Piranha 虚拟服务器套件的 Red Hat Linux 系统，CVSS 评分 10.0，危害等级严重。攻击者成功利用后可完全控制受影响的服务器，获取敏感信息或进一步横向移动。"
published = "2000-04-24T04:00:00.000"
remediation = "立即删除或禁用 Red Hat Piranha Virtual Server Package 中的 passwd.php3 脚本，或升级到包含修复的更新版本；同时严格限制对 CGI 脚本的访客权限，对用户输入过滤 shell 元字符（如 ;、|、` 等），并确保 Web 服务以最小权限运行。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "Red Hat Piranha Virtual Server Package passwd.php3 任意命令执行漏洞"
updated = "2026-06-16T21:51:28.470"

