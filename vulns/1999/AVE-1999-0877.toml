[basic]
description = "LBL tcpdump 3.4a 的 ip_print 过程在处理零长度头部的数据包时存在无限循环漏洞，远程攻击者可发送特制的零长度头部数据包，导致 tcpdump 在打印数据包时陷入无限循环并触发核心转储，从而造成拒绝服务。该漏洞影响 tcpdump 3.4a 版本，攻击者无需认证即可远程利用，仅需向目标发送恶意构造的数据包即可触发漏洞，导致抓包分析工具崩溃无法正常工作，CVSS 评分 7.5，属于高危漏洞。"
published = "2001-11-28T05:00:00.000"
remediation = "建议升级 tcpdump 至 3.4.1 或更高版本（该版本修复了 ip_print 零长度头部导致的无限循环漏洞）。临时缓解措施：在不可信网络环境避免直接运行 tcpdump 抓包，或使用 -s 0 限制抓包快照长度以规避触发漏洞数据包。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
