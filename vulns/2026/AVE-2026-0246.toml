[basic]
description = "Gitea 双因素认证中存在 TOTP 单次使用校验缺陷，包括 Web 2FA 路径的 TOCTOU 竞争条件漏洞和 Basic-Auth 的 `X-Gitea-OTP` 头缺少重放校验两个问题。攻击者可在短时间窗口内并行提交请求，利用竞争条件或直接重放同一有效的 TOTP 验证码绕过单次使用限制，在未授权情况下完成登录。该漏洞影响 Gitea 1.5.0 至 1.26.3 之前版本，CVSS 评分 7.1，危害等级高，建议升级至 1.26.3 及以上版本修复。"
published = "2026-07-03T21:16:56.543"
remediation = "升级 Gitea 至 1.26.3 或更高版本，该版本修复了 TOTP 一次性验证缺陷。如无法立即升级，可在反向代理层对 2FA 登录路径（/user/login/two_factor）添加速率限制，并禁用 Basic Auth 的 X-Gitea-OTP 头传递作为临时缓解措施。"
score = 7.1
severity = "HIGH"
sources = ["ghsa"]
title = "Gitea TOTP 一次性验证绕过漏洞"
updated = "2026-07-07T18:16:35.270"

