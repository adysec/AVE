[basic]
description = "HP-UX 10.30 及 11.00 系统的路径最大传输单元（PMTU）发现过程存在缺陷，当远程攻击者发送特制的小尺寸数据包时，目标系统会生成大量响应流量，导致该主机被利用为流量放大攻击的反射器，从而消耗网络带宽和系统资源，造成拒绝服务。该漏洞无需认证即可远程触发，影响 HP-UX 多个版本。"
published = "2000-01-24T05:00:00.000"
remediation = "建议立即升级 HP-UX 系统至 11.04 及以上版本，或安装 HP 安全补丁 PHNE_21471（HP-UX 10.30）及 PHNE_21472（HP-UX 11.00）。临时缓解措施：在路由器或防火墙上限制 ICMP 不可达消息的速率，或通过 ndd 命令禁用 PMTU 探测（ndd -set /dev/ip ip_path_mtu_discovery 0）。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "HP HP-UX Path MTU Discovery 拒绝服务漏洞"
updated = "2026-06-16T21:50:59.420"

