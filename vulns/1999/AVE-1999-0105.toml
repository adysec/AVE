[basic]
description = "华盛顿大学实现的 IMAP 和 POP 服务器中存在缓冲区溢出漏洞，未经身份认证的远程攻击者可通过向运行 imapd 服务的 Linux 系统发送特制请求触发该漏洞，导致缓冲区溢出，进而造成远程代码执行或任意文件读取。该漏洞影响使用华盛顿大学实现 IMAP/POP 协议套件的 Linux 系统，危害等级严重。"
published = "1997-04-07T04:00:00.000"
remediation = "升级 UW IMAP 至 4.5 及以上版本，该版本修复了 imapd 及 popd 中的缓冲区溢出漏洞。如无法升级，建议禁用 IMAP/POP 服务，改用 SSH 隧道加密访问邮件，或在防火墙层面限制对 143/110 端口的访问作为临时缓解。"
score = 10
severity = "CRITICAL"
sources = ["exploitdb"]
title = "华盛顿大学 IMAP 与 POP 服务器缓冲区溢出漏洞"
updated = "2026-06-16T21:47:26.303"

