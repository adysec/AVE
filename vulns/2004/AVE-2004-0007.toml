[basic]
description = "DistCC 分布式编译器守护进程（distccd）存在命令执行漏洞，当服务器未配置访问限制时，远程攻击者可通过向守护进程发送特制的编译任务请求，从而在目标服务器上以守护进程权限执行任意系统命令。该漏洞影响 distcc 2.x 版本（含 XCode 1.5 等集成产品），CVSS 评分 9.3，危害等级严重。建议配置访问控制列表或使用 SSH 加密模式修复。"
published = "2004-12-31T05:00:00.000"
remediation = "配置 distccd 的 `--allow` 参数仅允许受信 IP 段（如 `distccd --allow 192.168.1.0/24`），或改用 SSH 加密隧道模式 (`--ssh`) 传输编译任务；在防火墙层面限制 3632 端口的入站访问，仅对编译客户端开放；升级至 distcc 3.0 及以上版本可获得更完善的访问控制机制。"
score = 9.3
severity = "CRITICAL"
sources = ["nuclei"]
title = "DistCC 守护进程远程代码执行漏洞"
updated = "2026-06-16T22:10:08.157"

