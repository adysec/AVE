[basic]
description = "Trustix Linux 发行版在安装 Apache-SSL 的 httpsd 程序时，错误地将其设置为全局可写权限（world-writeable），导致本地普通用户可利用该权限配置缺陷，直接将 httpsd 二进制文件替换为特洛伊木马程序。当系统重启或服务重新启动时，被替换的恶意程序将以 httpsd 原有权限（通常为 root 权限）执行，从而实现本地权限提升。该漏洞影响 Trustix 系统中使用 Apache-SSL 组件的版本，攻击者需拥有本地系统访问权限方可利用，CVSS 评分 4.6，危害等级中危。"
published = "2000-10-20T04:00:00.000"
remediation = "立即检查 httpsd 程序文件权限，执行 `chmod 755 /path/to/httpsd` 移除全局可写权限；升级 Trustix 至最新版本或迁移至受支持的 Linux 发行版；部署文件完整性监控（如 AIDE/Tripwire）定期校验关键二进制文件哈希值。"
score = 4.6
severity = "MEDIUM"
sources = ["cve"]
title = "Trustix Apache-SSL 本地权限提升漏洞"
updated = "2026-06-16T21:52:29.327"

