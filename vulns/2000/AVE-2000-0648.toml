[basic]
description = "Apache mod_perl 模块在 Mandrake Linux 6.1 至 7.1 版本的默认配置中，将 /perl/ 目录设置为可浏览状态，远程攻击者无需认证即可通过 HTTP 请求列举该目录下的文件列表，从而获取服务器上的脚本文件路径及名称等敏感信息。该漏洞影响 Mandrake Linux 6.1、7.0、7.1 多个版本，危害等级中等。建议修改 Apache 配置，禁用目录浏览功能以修复此漏洞。"
published = "2000-11-14T05:00:00.000"
remediation = "修改 Apache 配置文件中的 `<Directory /perl/>` 段，移除 `Options Indexes` 指令（或改为 `Options -Indexes`），然后重启 Apache 服务使配置生效。如果系统版本过旧无法升级，建议将 `/perl/` 目录迁移至非 Web 可访问路径并限制访问权限。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Mandrake Linux Apache mod_perl 目录泄露漏洞"
updated = "2026-06-16T21:52:40.130"

