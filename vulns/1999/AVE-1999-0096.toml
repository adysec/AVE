[basic]
description = "SGI IRIX 6.4 及之前版本中的 /bin/login 程序存在本地权限提升漏洞。当 LOCKOUT 参数设置为非零值时，攻击者可通过精心构造的输入触发缓冲区溢出，以 root 权限创建或破坏系统文件，从而完全控制目标系统。该漏洞需要攻击者拥有本地 shell 访问权限，利用门槛较低，危害严重。SGI 已发布安全补丁修复此问题。"
published = "1997-05-26T04:00:00.000"
remediation = "立即安装 SGI 1997 年 5 月安全公告 19970508-02-PX 提供的修补补丁。临时缓解措施：在 /etc/default/login 配置文件中将 LOCKOUT 参数设为 0 并重启 login 服务。由于 SGI IRIX 已停止技术支持多年，建议尽快迁移至仍受支持的操作系统。"
score = 8.4
severity = "HIGH"
sources = ["exploitdb"]
title = "SGI IRIX login 本地权限提升漏洞"
updated = "2026-06-16T21:47:25.110"

