[basic]
description = "FFmpeg 的 libavcodec 库中 MagicYUV 解码器存在堆越界写入漏洞，当处理特制且含有奇数 slice_height 的 MagicYUV 视频数据时，未正确校验边界导致堆缓冲区溢出。远程攻击者可构造恶意媒体文件诱导用户解析，触发拒绝服务或在特定条件下实现远程代码执行。该漏洞影响 FFmpeg 8.1.2 之前版本，CVSS 评分 8.8，危害等级高。"
published = "2026-06-18T14:17:36.660"
remediation = "升级 FFmpeg 至 8.1.2 或更高版本，该版本已修复 libavcodec/magicyuv.c 中 slice_height 校验缺失导致的堆越界写入问题。如无法立即升级，可在调用 FFmpeg 处理 MagicYUV 格式视频时，通过输入验证拦截非标准分辨率的畸形文件作为临时缓解措施。"
score = 8.8
severity = "HIGH"
sources = ["hwpoc"]
title = "FFmpeg MagicYUV 解码器堆缓冲区溢出漏洞"
updated = "2026-07-15T01:17:04.820"

