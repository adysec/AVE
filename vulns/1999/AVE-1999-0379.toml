[basic]
description = "SuSE Linux 6.2 及 Slackware Linux 3.2/3.6 中 in.identd（ident 协议守护进程）采用默认配置，在处理每个请求后会等待 120 秒才响应。远程攻击者无需身份认证，只需向目标主机的 ident 服务端口（113）建立大量 TCP 连接并发送请求，即可耗尽服务端的连接资源与处理能力，使 in.identd 无法响应后续正常请求，造成拒绝服务。该漏洞影响上述版本中默认启用的 ident 服务，攻击条件仅需网络可达目标端口，无需本地权限，属于远程可触发的可用性破坏型漏洞。"
published = "1999-08-16T04:00:00.000"
remediation = "建议升级到 SuSE Linux 6.3 及以上版本或 Slackware 4.0 及以上版本，其中 in.identd 已修正请求处理间隔。如无法立即升级，可编辑 /etc/inetd.conf 将 identd 启动参数改为带连接数限制的模式（如 in.identd -i -t120 -o -e -l），或在 /etc/hosts.deny 中限制仅信任网段访问 ident 服务（113/tcp），并考虑在边界防火墙屏蔽对外 113 端口作为临时缓解。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
