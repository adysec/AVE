[basic]
description = "汉王e脸通综合管理平台 `/manage/resourceUpload/imgDownload.do` 接口未对 `filePath` 参数进行有效过滤和校验，导致存在任意文件读取漏洞。未经身份认证的远程攻击者可通过构造恶意请求，读取服务器上任意文件（如 WEB-INF/web.xml、配置文件等），从而获取数据库凭证、系统配置等敏感信息，为后续更深层次攻击提供跳板。该漏洞影响汉王e脸通综合管理平台全版本，危害较大。"
published = "0711"
remediation = '在 `/manage/resourceUpload/imgDownload.do` 接口中对 `filePath` 参数进行严格的路径白名单校验，禁止包含 `../`、`..\` 等目录穿越字符，仅允许访问指定上传目录内的文件；同时实施身份认证与权限校验，确保未授权用户无法调用该接口。建议联系汉王获取官方补丁或升级至最新版本。'
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "汉王e脸通综合管理平台任意文件读取漏洞"
updated = "0711"

