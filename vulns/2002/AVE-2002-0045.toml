[basic]
description = "Canna 3.6 及更早版本中存在输入验证缺陷，远程攻击者无需身份认证即可向运行 Canna 服务的系统发送特制请求，触发服务崩溃导致拒绝服务，或泄露敏感信息。Canna 是一款 Unix/Linux 系统上广泛使用的日文假名汉字转换输入法服务，该漏洞影响所有使用 Canna 3.6 及之前版本的系统，CVSS 评分 6.4，危害等级中危。Red Hat 和 Debian 均已发布安全公告修复此漏洞。"
published = "2002-12-18T05:00:00.000"
remediation = "升级 Canna 至 3.7 或更高版本。Debian 用户应升级至 3.5b2-46.2（woody），Red Hat Linux 用户安装 RHSA-2002:261 提供的更新包。如无法立即升级，可在防火墙限制对 Canna 服务端口（默认 5680）的访问，仅允许可信来源连接。"
score = 6.4
severity = "MEDIUM"
sources = ["osv"]
title = "Canna 请求验证不当远程拒绝服务与信息泄露漏洞"
updated = "2026-06-16T21:58:51.490"

