[info]
author = "ave"
description = "检测目标页面是否包含利用 Microsoft Internet Explorer 5.01 及更早版本或 Outlook 98 的 window.open 服务器端重定向漏洞（CVE-1999-0981）的 JavaScript 代码，攻击者通过 window.open 创建窗口引用并结合服务器端重定向可访问客户端本地文件实现信息泄露"
id = "POC-AVE-1999-0791"
name = "Microsoft IE/Outlook 98 window.open Redirect PoC"
severity = "high"
tags = ["ave-1999-0791"]
vuln_id = [
    "CVE-1999-0981",
    "AVE-1999-0791",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/"
protocol = "http"

[poc.requests.headers]
User-Agent = "AVE/1.0"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["window.open"]
