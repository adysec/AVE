[basic]
description = "IRIX 6.4 及更早版本中 OSF 分布式计算环境（DCE）安全守护进程（secd）存在缓冲区溢出漏洞。远程攻击者可通过向该服务提交超长的 principal、group 或 organization 字段数据触发缓冲区溢出，导致系统拒绝服务。该漏洞影响 SGI IRIX 6.4 及之前版本，CVSS 评分 5.0，危害等级中等。厂商已发布安全补丁修复此问题。"
published = "1997-10-24T04:00:00.000"
remediation = "升级 SGI IRIX 至 6.5 及以上版本，或安装 SGI 官方安全补丁。如无法升级，可在 /etc/inetd.conf 中禁用 dced 服务，或使用 TCP Wrappers (hosts.deny) 限制对 DCE secd 端口的访问，仅允许信任主机连接。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "SGI IRIX DCE secd 缓冲区溢出拒绝服务漏洞"
updated = "2026-06-16T21:49:47.187"

