[basic]
description = "Windows NT 操作系统存在路径劫持漏洞，由于系统环境变量 PATH 中包含了当前工作目录（.），本地攻击者可在特定目录中放置与常用系统程序同名的特洛伊木马程序，诱使系统或管理员执行该恶意程序，从而提升权限。该漏洞影响 Windows NT 系列版本，需本地访问权限方可利用。"
published = "1997-07-25T04:00:00.000"
remediation = '从 PATH 环境变量中移除当前工作目录 (.)，可通过系统属性 → 高级 → 环境变量编辑 PATH 值，删除末尾的 %SystemRoot%\system32;%SystemRoot%; 之后的单独句点条目；限制普通用户对系统目录的写入权限；应用程序中始终使用绝对路径调用系统命令。'
score = 4.6
severity = "MEDIUM"
sources = ["epss"]
title = "Microsoft Windows NT PATH 环境变量本地权限提升漏洞"
updated = "2026-06-16T21:49:58.113"

