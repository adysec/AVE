[basic]
description = "SquirrelMail 的 Address Add 插件 1.9 及 2.0 版本中的 add.php 存在跨站脚本（XSS）漏洞，远程攻击者可通过向 IMG 标签注入恶意 Web 脚本或 HTML 代码实施攻击。当管理员或用户访问被注入恶意代码的页面时，脚本将在浏览器中执行，可能导致敏感信息泄露。该漏洞影响 SquirrelMail 1.4.2 及安装了受影响插件的环境，攻击无需认证，危害等级中危。"
published = "2005-10-04T22:02:00.000"
remediation = "升级 SquirrelMail 至 1.4.3a 或更高版本，该版本已修复 add.php 的 XSS 问题。如无法升级，可删除 plugins/address_add/add.php 文件或卸载 Address Add 插件。同时配置 Web 应用防火墙对输入参数中 IMG 标签进行过滤作为临时缓解。"
score = 4.3
severity = "MEDIUM"
sources = ["nuclei"]
title = "SquirrelMail Address Add Plugin 跨站脚本漏洞"
updated = "2026-06-16T22:16:18.220"

