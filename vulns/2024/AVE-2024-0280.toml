[basic]
description = "H3C SecPath 下一代防火墙的 local_cert_delete_both 接口存在任意文件上传漏洞，攻击者可通过构造特制的 multipart 表单数据包向该接口发送 POST 请求，在未经充分认证的情况下上传恶意文件至服务器，进而实现远程代码执行。该漏洞可导致攻击者完全控制受影响设备，影响部署了 H3C SecPath 系列下一代防火墙的各类网络环境，危害严重。"
published = "0812"
remediation = "立即联系 H3C 官方获取最新安全固件版本并升级，该漏洞在 `/webui/?g=local_cert_delete_both` 接口存在任意文件上传缺陷，升级后该接口已移除文件上传功能。临时缓解措施：在防火墙上配置 ACL 规则，限制仅信任 IP 可访问 Web 管理界面（默认端口 8443），并禁用不必要的 Web 管理功能。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "H3C SecPath下一代防火墙任意文件上传漏洞"
updated = "0812"

