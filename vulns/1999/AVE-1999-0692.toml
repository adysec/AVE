[basic]
description = "某开源应用程序的开发者在代码中预留了后门密码，导致未经授权的远程攻击者可通过该预设密码直接登录系统或访问敏感功能，完全绕过正常认证机制。该漏洞影响多个开源应用版本，CVSS 评分 10.0，危害等级严重。受影响的系统管理员应检查并更换所有默认凭据，同时更新至已移除后门的版本。"
published = "1999-01-01T05:00:00.000"
remediation = "立即审查受影响应用的源代码，移除所有硬编码的后门账号和密码；修改所有默认凭据为强密码；更新到已修复此问题的官方最新版本；如无法升级，在应用层和网络层同时实施访问控制，限制对受影响服务的访问来源 IP。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "OpenSource Application 后门密码漏洞"
updated = "2026-06-16T21:48:25.590"

