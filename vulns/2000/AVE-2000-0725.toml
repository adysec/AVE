[basic]
description = "Hilgraeve HyperTerminal 客户端在处理 telnet URL 时存在缓冲区溢出漏洞。远程攻击者可通过向目标用户发送包含超长字符串的恶意 telnet 链接，诱使用户点击触发缓冲区溢出，从而在受影响系统上以当前用户权限执行任意命令。该漏洞影响 Windows 98、Windows ME 及 Windows 2000 操作系统自带的 HyperTerminal 6.0 版本，CVSS 评分 7.5，危害等级高。Microsoft 已在安全公告 MS00-079 中发布补丁修复此问题。"
published = "2000-12-19T05:00:00.000"
remediation = "立即安装 Microsoft 安全公告 MS00-079 提供的补丁程序（KB274729），或通过 Windows Update 获取更新。对于已终止支持的 Windows 98/ME，建议升级至 Windows XP 及以上版本；如无法升级，可在控制面板中卸载或删除 HyperTerminal 组件（hypertrm.exe），并在防火墙中禁用 TCP 端口 23（Telnet），阻止外部对 Telnet URL 协议的调用。使用 SSH 或第三方终端工具替代 HyperTerminal 作为临时缓解措施。"
score = 7.5
severity = "HIGH"
sources = ["exploitdb"]
title = "Hilgraeve HyperTerminal Telnet 缓冲区溢出漏洞"
updated = "2026-06-16T21:52:55.553"

