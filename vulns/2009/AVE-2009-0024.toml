[basic]
description = "Apache Tomcat 示例 Web 应用中的日历组件 jsp/cal/cal2.jsp 存在跨站脚本（XSS）漏洞，由于对用户提交的 time 参数未进行充分输入过滤和输出编码，导致攻击者可构造恶意 URL 诱导用户访问，从而在受害者浏览器中执行任意 JavaScript 代码。该漏洞影响 Apache Tomcat 4.1.0 至 4.1.39、5.5.0 至 5.5.27 以及 6.0.0 至 6.0.18 版本，CVSS 评分 4.3（中危），攻击向量为网络，攻击复杂度中等，需用户交互但无需认证，成功利用可窃取会话 Cookie、篡改页面内容或发起进一步攻击。Apache Tomcat 已在后续版本中修复该漏洞，建议升级至修复版本或删除示例应用。"
published = "2009-03-09T21:30:00.217"
remediation = "建议升级 Apache Tomcat 至 4.1.40、5.5.28、6.0.19 或更高版本。若暂时无法升级，请删除 Tomcat 安装目录下的 webapps/examples 目录（含 cal2.jsp 示例应用），或在 web.xml 中移除该示例应用的 servlet 映射，防止攻击者利用 cal2.jsp 的 time 参数注入 XSS 攻击代码。"
score = 4.3
severity = "MEDIUM"
sources = ["tenable"]
title = "Apache Tomcat 跨站脚本漏洞"
updated = "2026-06-16T23:05:48.120"

