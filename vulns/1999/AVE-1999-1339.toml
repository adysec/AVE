[basic]
description = "Solaris 2.6 系统中的 ndd 工具存在安全配置缺陷，本地攻击者可通过修改特定 TCP/IP 协议栈参数（如 TCP 窗口大小、重传超时等），导致系统网络协议栈行为异常，进而引发拒绝服务。该漏洞影响 Solaris 2.6 版本，攻击者需拥有本地系统访问权限，无需高权限即可触发。由于 ndd 工具未对参数修改操作进行充分的权限校验和范围限制，导致低权限用户可滥用该工具破坏网络功能。"
published = "1998-03-11T05:00:00.000"
remediation = "升级到受支持的 Solaris 版本（如 Solaris 11）或迁移至其他受支持操作系统。如无法升级，通过 chmod 700 /usr/sbin/ndd 限制 ndd 命令仅允许 root 执行，并通过 RBAC 策略细化网络参数修改权限，同时启用审计日志监控 ndd 调用行为。"
score = 2.1
severity = "LOW"
sources = ["avd"]
title = "Sun Solaris ndd 本地拒绝服务漏洞"
updated = "2026-06-16T21:49:45.513"

