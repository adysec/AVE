[basic]
description = "Solaris 7.0 的 DMI（桌面管理接口）组件中 /var/dmi/db 数据库存在拒绝服务漏洞。本地攻击者可通过向该数据库添加格式错误的文件，触发 dmispd 守护进程崩溃，导致系统 DMI 服务不可用。该漏洞需要本地用户权限才能利用，攻击复杂度较低，影响 Solaris 7.0 系统。"
published = "1999-12-22T05:00:00.000"
remediation = "从 SunSolve 获取并安装 DMI 修补补丁 (Patch ID 107080-xx)，或升级至 Solaris 8 及以上版本。如业务不需要 DMI 服务，可执行 `/etc/init.d/dmi stop && mv /etc/init.d/dmi /etc/init.d/dmi.disabled` 禁用该服务，并限制 `/var/dmi/db` 目录仅允许 root 用户读写。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "Sun Solaris DMI 拒绝服务漏洞"
updated = "2026-06-16T21:50:51.683"

