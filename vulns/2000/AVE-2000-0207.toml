[basic]
description = "imwheel 中的 imwheel-solo 脚本存在缓冲区溢出漏洞，本地攻击者可通过设置超长的 HOME 环境变量触发该漏洞，导致缓冲区溢出，从而获得 root 权限。该漏洞影响 Halloween Linux 4.0 及 RedHat Linux 6.1/6.2 等版本，CVSS 评分 7.2，危害等级高。攻击者需拥有本地系统访问权限方可利用。"
published = "2000-03-13T05:00:00.000"
remediation = "升级 imwheel 至修复此缓冲区溢出漏洞的版本（参考 Red Hat 安全公告 RHSA-2000:016），或直接删除 imwheel-solo 脚本的 setuid root 权限位（执行 chmod u-s /usr/bin/imwheel-solo）以阻止本地提权。如不需要鼠标滚轮工具，建议直接卸载 imwheel 软件包：rpm -e imwheel。"
score = 7.2
severity = "HIGH"
sources = ["epss"]
title = "RedHat Linux imwheel 本地缓冲区溢出权限提升漏洞"
updated = "2026-06-16T21:51:16.610"

