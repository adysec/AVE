[basic]
description = "猎鹰安全（金山）终端安全系统 V9 存在远程代码执行漏洞，其 /inter/software_relation.php 接口在处理 multipart/form-data 上传请求时未对用户输入进行充分校验与过滤，攻击者可在表单字段中注入并执行恶意代码。该漏洞影响开放 6868 端口、部署猎鹰安全终端安全系统 V9 的服务端，攻击条件为攻击者能访问目标 Web 接口并发送特制 HTTP POST 请求。利用方式是向该接口发送含恶意载荷的 multipart 表单数据，可在未授权情况下实现远程命令执行并控制目标服务器。"
published = "0725"
remediation = "建议立即联系金山/猎鹰安全厂商获取并升级至官方已修复该 RCE 漏洞的 V9 安全补丁版本；在无法立即升级时，于 Web 应用防火墙（WAF）上拦截 6868 端口 /inter/software_relation.php 的 multipart 文件上传请求，限制该管理端口仅允许受信任内网 IP 访问，并临时关闭非必要的文件上传功能作为缓解措施。"
