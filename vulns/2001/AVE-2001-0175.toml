[basic]
description = "AdCycle 0.78b 的 AdLibrary.pm 模块存在 SQL 注入漏洞，远程攻击者无需身份认证即可通过向目标系统发送特制的 HTTP 请求，在 Agent 请求头中插入恶意 SQL 语句，该语句被拼接至用于验证登录信息的 SQL 查询中，从而导致攻击者绕过认证获取管理员权限。该漏洞影响 AdCycle 0.77 及 0.78b 版本，CVSS 评分 7.5，危害等级高。Exploit-DB 已公开利用代码，建议用户升级至最新版本或对用户输入进行严格过滤。"
published = "2001-06-27T04:00:00.000"
remediation = "升级 AdCycle 至官方最新版本（若已停止维护则建议迁移至其他广告管理系统）。如无法升级，修改 AdLibrary.pm 中对 User-Agent 头部的处理逻辑，使用参数化查询（prepared statement）替代字符串拼接构造 SQL 语句，并对所有用户输入（包括 HTTP 头部字段）进行严格的特殊字符过滤。临时缓解措施可在 Web 服务器（如 Apache）层面限制 adcenter.cgi 的访问来源 IP，或部署 WAF 规则拦截包含 SQL 注入特征的 User-Agent 请求。"
score = 7.5
severity = "HIGH"
sources = ["exploitdb"]
title = "Adcycle AdLibrary.pm SQL注入漏洞"
updated = "2026-06-16T21:54:17.143"

