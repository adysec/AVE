[basic]
description = "miniSQL 数据库管理软件中的 w3-auth CGI 程序存在缓冲区溢出漏洞，远程攻击者可通过向目标服务器发送特制的 HTTP 请求，在 URL 或 User-Agent MIME 头部中传入超长字符串触发缓冲区溢出，从而在受影响系统上执行任意命令。该漏洞影响运行 miniSQL 软件的系统，攻击者无需认证即可远程利用，CVSS 评分 7.5，危害等级高。"
published = "1999-09-30T04:00:00.000"
remediation = "移除或禁用 miniSQL 软件包中的 w3-auth CGI 程序。如仍需使用，限制仅可通过 localhost 访问该 CGI，并在 Web 服务器（Apache 等）配置中对 w3-auth 路径添加 IP 白名单和认证机制，防止未授权远程访问。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "Hughes Technologies miniSQL w3-auth 缓冲区溢出远程代码执行漏洞"
updated = "2026-06-16T21:50:30.497"

