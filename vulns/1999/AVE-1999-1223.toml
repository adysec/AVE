[basic]
description = "BNC IRC 代理版本 2.2.4、2.4.6 和 2.4.8 存在缓冲区溢出漏洞，远程攻击者可通过发送特制数据触发缓冲区溢出，从而在目标系统上提升权限并执行任意代码。该漏洞影响 BNC IRC 代理 2.2.4、2.4.6 和 2.4.8 版本，CVSS 评分 7.5，危害等级为高危。攻击者无需身份认证即可远程利用该漏洞，通过发送精心构造的恶意数据包触发缓冲区溢出，进而获取系统权限。官方已发布更新版本修复该漏洞，建议用户及时升级至最新版本。"
published = "1998-12-26T05:00:00.000"
remediation = "立即升级 BNC 至 2.4.9 或更高版本（该版本已修复缓冲区溢出问题）。由于 BNC 项目已停止维护，建议迁移至 ZNC、soju 等仍在维护的 IRC bouncer 替代方案。如无法升级或迁移，可在防火墙层面限制 IRC 代理端口（通常为 TCP 113/6667-7000）仅允许受信任 IP 访问，并禁用匿名连接功能作为临时缓解措施。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "BNC IRC 代理 缓冲区溢出漏洞"
updated = "2026-06-16T21:49:25.720"

