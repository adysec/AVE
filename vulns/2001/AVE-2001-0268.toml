[basic]
description = "O'Reilly Software WebSite Professional 2.5.4 及更早版本存在路径泄露漏洞。远程攻击者可通过向目标 Web 服务器发送包含冒号（:）字符的特制 URL 请求，触发服务器返回包含物理路径的错误信息，从而获取网站根目录的绝对路径。该漏洞有助于攻击者进一步探测系统目录结构，为后续攻击（如文件包含、目录遍历）提供信息支撑。攻击条件简单，无需身份认证即可远程利用。目前厂商已停止支持该产品，建议用户迁移至其他受支持的 Web 服务器软件。"
published = "2001-08-22T04:00:00.000"
remediation = "O'Reilly Website Professional 已停止维护，官方不再发布安全更新。建议立即迁移至其他受支持的 Web 服务器软件（如 Apache HTTP Server 或 Nginx）。如无法立即迁移，可在 Web 服务器前端部署反向代理或 WAF，过滤包含冒号字符的畸形 URL 请求，并禁用目录列表功能以降低信息泄露风险。"
score = 7.5
severity = "HIGH"
sources = ["exploitdb"]
title = "OReilly Software WebSite Professional 路径泄露漏洞"
updated = "2026-06-16T21:54:39.500"

