[basic]
description = "Samba smbmnt 组件存在竞争条件漏洞，本地攻击者可利用 smbmnt 挂载文件系统时的竞争窗口，通过精心构造的时序攻击将文件系统挂载到任意指定位置，从而实现权限提升或文件系统劫持。该漏洞影响运行 Samba smbmnt 组件的 Linux/Unix 系统，攻击者需具备本地用户权限并能调用 smbmnt 命令，利用竞争窗口在挂载操作完成前替换挂载点路径，实现任意路径挂载从而实现权限提升或敏感文件访问。CVSS 评分 7.6，属高危漏洞，建议升级 Samba 至修复版本并限制 smbmnt 执行权限。"
published = "2000-07-12T04:00:00.000"
remediation = "建议升级 Samba 至 2.0.7 或更高版本（1999 年 9 月发布的修复版本）。若无法立即升级，可移除 smbmnt 的 setuid 位（chmod u-s /usr/bin/smbmnt）或限制普通用户执行权限（chmod 750 /usr/bin/smbmnt），并限制普通用户挂载权限（编辑 /etc/fstab 添加 user,noauto 选项或使用 sudo 限制）作为临时缓解措施。建议尽快升级至 Samba 4.x 以上长期支持版本彻底修复。"
score = 7.6
severity = "HIGH"
sources = ["epss"]
title = "Samba smbmnt 竞争条件导致本地用户挂载任意文件系统漏洞"
updated = "2026-06-16T21:49:06.467"

