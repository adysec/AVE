[basic]
description = "广州拓波 TurboMail 邮件系统存在任意用户登录漏洞，未授权攻击者可通过绕过登录验证机制，以任意用户身份直接登录系统后台，获取邮件数据和管理员权限。该漏洞远程可触发，无需用户交互，攻击者仅需构造特制的认证请求即可完成利用。影响范围覆盖 TurboMail 全版本，可能导致企业邮件系统敏感信息泄露和服务器被远程控制。"
published = "0703"
remediation = "立即联系广州拓波官方获取最新版本补丁，或升级至修复该漏洞的最新 TurboMail 版本；如无法升级，在 Nginx/反向代理层添加访问控制规则，限制邮件系统管理后台的源 IP 白名单；同时开启系统登录日志审计，监控异常登录行为；在身份校验代码中增加 Session 与 Token 双重验证机制，修复认证逻辑缺陷。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "广州拓波 TurboMail 系统任意用户登录漏洞"
updated = "0703"

