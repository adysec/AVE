[basic]
description = "MacOS Runtime Java (MRJ) 2.1 及更早版本以及 MacOS 版 Microsoft 虚拟机中的 URLConnection 函数存在安全模型绕过漏洞，攻击者可通过恶意网站利用 HTTP 重定向绕过 Java 安全模型的沙箱限制，强制 Java 应用程序连接任意远程主机。该漏洞影响运行 MRJ 2.1 及更早版本的 MacOS 系统以及使用 Microsoft VM for MacOS 的环境，CVSS 评分 10.0（严重）。攻击者只需诱导用户访问恶意网页，即可通过 HTTP 重定向绕过 Java 沙箱限制，建立任意网络连接，可能导致敏感信息泄露、内网探测或进一步攻击内网主机。Apple 和 Microsoft 已发布补丁修复此漏洞，建议升级至 MRJ 2.2 或更高版本，或升级 Microsoft VM 至修复版本。"
published = "2000-10-20T04:00:00.000"
remediation = "建议立即卸载或禁用 MacOS Runtime Java (MRJ) 2.1 及更早版本、Microsoft VM for MacOS 等受影响 Java 虚拟机。因上述产品早已停止维护无官方补丁，建议彻底卸载 Java 插件或在浏览器中彻底禁用 Java 插件。如必须保留 Java 环境，请在防火墙层面禁止 Java 进程发起任意出站 HTTP 连接，并部署网络层出站访问控制策略限制 Java 进程仅访问受信任目标 IP 段。建议迁移至现代受支持的 Java 运行环境（如 OpenJDK 17+ LTS 版本）并配置安全管理器限制网络权限。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "Apple MacOS Runtime Java MRJ 与 Microsoft VM for MacOS java.net.URLConnection HTTP 重定向任意主机连接漏洞"
updated = "2026-06-16T21:52:00.303"

