[basic]
description = "PHP/FI 的 mlog CGI 脚本存在任意文件读取漏洞，攻击者无需身份认证即可通过向目标服务器发送特制请求，利用脚本对用户输入过滤不严的缺陷，读取系统上任意文件（如 /etc/passwd），导致敏感信息泄露。该漏洞影响早期的 PHP/FI 版本，攻击复杂度低，危害较大。"
published = "1997-10-16T04:00:00.000"
remediation = "此漏洞影响 PHP 3.x 及早期 PHP 4.x 版本的 CGI mlog 脚本。修复措施：1) 将 PHP 升级至 4.1.0 及以上版本，该版本已移除此危险脚本；2) 如无法升级，立即删除 phpfi 目录下的 mlog.php 文件或移除整个 phpfi 扩展目录；3) 禁用 CGI 模式的 register_globals 配置选项以降低文件包含风险。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "PHP CGI mlog 脚本任意文件读取漏洞"
updated = "2026-06-16T21:48:11.993"

