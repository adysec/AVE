[basic]
description = 'Fetchmail 6.1.3 及更早版本中存在基于堆的缓冲区溢出漏洞。该漏洞源于程序在处理邮件头中大量本地地址时，未将 "@" 字符计入缓冲区长度计算，导致缓冲区分配不足。远程攻击者可通过向目标邮件服务器发送特制的邮件头，触发缓冲区溢出，从而在目标系统上执行任意代码。该漏洞影响 Fetchmail 6.1.3 及之前版本，CVSS 评分 7.5，危害等级高。'
published = "2002-12-23T05:00:00.000"
remediation = "升级 Fetchmail 至 6.2.0 或更高版本。Debian 用户运行 apt-get update && apt-get install fetchmail 安装 DSA-216 提供的更新包；Red Hat 用户安装 RHSA-2002:293/RHSA-2002:294 提供的更新包；Mandrake 用户安装 MDKSA-2003:011 更新。如无法升级，可在邮件服务器上限制邮件头中收件人地址数量，或禁用 fetchmail 对本地地址的缓冲区处理功能作为临时缓解措施。"
score = 7.5
severity = "HIGH"
sources = ["osv"]
title = "Fetchmail 堆缓冲区溢出远程代码执行漏洞"
updated = "2026-06-16T21:59:11.030"

