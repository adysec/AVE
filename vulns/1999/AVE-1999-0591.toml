[basic]
description = "Microsoft Site Server 2.0 与 IIS 4.0 存在任意文件上传漏洞，远程攻击者可通过 HTTP 协议向目标网站上传包含 ASP 脚本的恶意文件，从而在服务器端执行任意命令。该漏洞影响 Microsoft Site Server 2.0 及 IIS 4.0 版本，攻击者无需身份认证即可利用，危害等级高。厂商已发布安全更新修复此漏洞。"
published = "1999-01-30"
remediation = "安装 Microsoft 官方针对 Site Server 2.0 的安全更新补丁，或禁用 IIS 4.0 中 Site Server 上传目录的脚本执行权限（移除 Scripts 和 Execute 权限），限制匿名用户对上传目录的写入权限。由于该产品已停止支持，建议迁移至受支持的替代产品。"
score = 7.2
severity = "HIGH"
sources = ["cve"]
title = "Microsoft Site Server 2.0 任意文件上传漏洞"
updated = "2026-06-16"

