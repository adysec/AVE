[basic]
description = "Red Hat Linux 6.1 及更早版本中的 Xsession 存在安全绕过漏洞，本地受限用户可通过 kdm 启动 KDE、GNOME 等桌面环境，绕过系统对 .xsession 文件的执行限制，从而以非预期权限运行任意脚本或配置，造成未授权访问。攻击者需具有本地系统账户并能登录图形界面，即可触发该漏洞。"
published = "1999-10-07T04:00:00.000"
remediation = "升级 Red Hat Linux 至 6.2 及以上版本。如无法升级，可移除受限用户的 kdm 登录权限，编辑 /etc/kdm/kdmrc 配置限制 kdm 会话启动类型，或直接禁用 kdm 改用文本终端登录。由于 Red Hat Linux 6.x 已停止维护，建议迁移至受支持的企业级 Linux 发行版。"
score = 4.6
severity = "MEDIUM"
sources = ["avd"]
title = "Red Hat Linux Xsession 安全绕过漏洞"
updated = "2026-06-16T21:50:14.813"

