[basic]
description = 'jq 命令行 JSON 处理工具 1.7.1 及之前版本的 decNumber.c 中的 decNumberCopy 函数存在类型混淆漏洞（CWE-843），未正确区分 NaN（非数值）与普通数值类型，导致栈缓冲区溢出和越界写入。攻击者可通过构造包含特定 NaN 数字字符串（如 "1 NaN123" 后跟大量数字）的 JSON 输入，配合 --slurp 参数使用减法过滤器（如 .-.）触发该漏洞，造成拒绝服务或潜在的信息泄露。该漏洞需本地访问且利用复杂度较高，CVSS 评分 8.1，影响所有使用 jq 1.7.1 及之前版本的系统。'
published = "2025-02-26T16:15:16.237"
remediation = "立即将 jq 升级至 1.8.0 及以上版本（当前最新为 1.8.2），该版本已合入拒绝解析带载荷 NaN（如 NaN123）的修复补丁。可通过包管理器更新（如 apt install jq=1.8.2、brew upgrade jq）或从 https://github.com/jqlang/jq/releases 下载最新二进制替换。如无法升级，可在输入 JSON 前通过预处理过滤包含 NaN 后跟数字的字符串作为临时缓解措施。"
score = 8.1
severity = "HIGH"
sources = ["msrc"]
title = "jq 栈缓冲区溢出漏洞"
updated = "2026-06-17T08:08:52.940"

