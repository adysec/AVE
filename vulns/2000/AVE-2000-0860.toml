[basic]
description = "思科 GSR（Gigabit Switch Router）系列路由器运行特定 IOS 版本时，对线卡故障处理存在缺陷，远程攻击者可利用该缺陷绕过 ACL（访问控制列表）或导致接口停止转发数据包，造成安全策略失效或拒绝服务。该漏洞影响运行 IOS 11.2(15)GS1A 至 11.2(19)GS0.2 及部分 12.0 版本的 GSR 设备，CVSS 评分 5.0，危害等级中危。"
published = "2000-10-20T04:00:00.000"
remediation = "升级 Cisco IOS 至 12.0(5)XG 或更高版本，该版本修复了线卡故障处理逻辑。如无法升级，可在接口下配置 ACL 并启用 ip unreachables 增强过滤，同时监控 linecard 状态日志以及时发现异常故障。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Cisco Gigabit Switch Routers ACL 安全绕过漏洞"
updated = "2026-06-16T21:52:17.820"

