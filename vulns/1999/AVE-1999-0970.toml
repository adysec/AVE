[basic]
description = "Cisco Catalyst 2900 系列虚拟局域网（VLAN）交换机存在 IEEE 802.1q VLAN 遍历漏洞。远程攻击者可通过在 trunk 标记中伪造 VLAN 标识符，向目标 VLAN 注入特制的 802.1q 帧，从而跨越 VLAN 边界访问本应隔离的网络资源。该漏洞允许攻击者绕过 VLAN 隔离机制，实现未授权的跨 VLAN 通信，可能导致敏感信息泄露。攻击者无需认证即可利用此漏洞，影响范围广泛。"
published = "1999-09-01T04:00:00.000"
remediation = "在 Cisco Catalyst 2900 系列交换机的 trunk 端口上启用 802.1Q 原生 VLAN（native VLAN）隔离，将管理流量与用户 VLAN 分离，并为 trunk 链路配置明确的 allowed VLAN 列表（switchport trunk allowed vlan 仅放行必要 VLAN）。同时升级交换机 IOS 至修复该 802.1Q 标签伪造遍历问题的版本（如 12.0(5)WC 及以上），无法立即升级时关闭不必要的 DTP 自动协商（switchport mode trunk + switchport nonegotiate）以缓解未授权 VLAN 注入。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "Cisco Catalyst 2900 VLAN交换机 802.1q未授权VLAN遍历漏洞"
updated = "2026-06-16T21:49:46.940"

