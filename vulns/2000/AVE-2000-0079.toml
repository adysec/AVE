[basic]
description = "HP-UX 10.30 及 11.00 操作系统的路径 MTU 发现（PMTU discovery）机制存在设计缺陷，当接收到特定的小型数据包时，系统会生成大量响应流量，导致网络带宽被过度消耗。远程攻击者可利用该漏洞将目标主机作为流量放大反射器，实施分布式拒绝服务（DDoS）攻击，影响网络可用性。该漏洞无需认证即可利用，攻击门槛较低，对受影响系统所在网络环境构成严重威胁。"
published = "2000-01-24T05:00:00.000"
remediation = "建议立即安装 HP 针对此漏洞发布的安全补丁（HP Security Bulletin HPSBUX0001-114），或升级至已修复的 HP-UX 11.0 后续版本。如无法打补丁，可执行 ndd -set /dev/ip ip_send_source_quench 0 禁用源端抑制，并在边界防火墙上限制外部发往 HP-UX 主机的 ICMP 不可达消息速率，从源头阻断放大攻击流量。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "HP HP-UX Path MTU Discovery 拒绝服务漏洞"
updated = "2026-06-16T21:50:59.420"

