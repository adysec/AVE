[basic]
description = "Cmail 2.4.7 的 Web 管理界面对用户输入的 HTTP GET 请求参数缺乏长度校验，导致缓冲区溢出漏洞。未经身份认证的远程攻击者可通过向目标服务器发送超长特制 GET 请求触发溢出，进而执行任意系统命令并获取服务器完全控制权。该漏洞影响使用 Cmail 2.4.7 版本的所有邮件系统，CVSS 评分 10.0，危害等级严重。"
published = "2000-06-05T04:00:00.000"
remediation = "建议立即升级 Cmail 至 2.4.8 或更高版本（官方已发布修复版本），或直接禁用 Web 管理界面并限制 Web 管理端口（默认 80/443）仅允许受信任 IP 访问，作为临时缓解措施。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "Cmail 邮件服务器 Web 接口 缓冲区溢出远程代码执行漏洞"
updated = "2026-06-16T21:51:59.647"

