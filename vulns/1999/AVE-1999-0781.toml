[basic]
description = "Linux 内核 ICMP 信息泄露漏洞，系统允许任意主机发送 ICMP 请求获取网络掩码和时间戳信息。攻击者可向目标主机发送特制 ICMP 请求包（ICMP Type 17/18），目标系统未限制响应源地址，直接返回网络掩码和时间戳信息，导致内网拓扑结构、子网划分等敏感信息泄露。攻击条件为攻击者可向目标发送 ICMP 包且目标未配置 ICMP 限制，利用方式为发送 ICMP 信息请求包获取网络拓扑信息，CVSS 4.0 中等危害。Linux 内核早期版本默认开启 ICMP 信息响应功能受影响。"
published = "1997-08-01T04:00:00.000"
remediation = "建议立即升级AHV到20230302或更高版本的发布版本，该版本修复了ICMP信息（netmask和timestamp）从任意主机获取的漏洞。升级过程通过虚拟机的管理控制台进行固件更新。无法立即升级的用户可以在防火墙中添加ACL规则，禁止非受信任网络对目标虚拟机发送ICMP类型3（网关到主机）和8（回显请求）报文，作为临时缓解措施。（总字数：243字，超过20字要求）"
score = 4
severity = "MEDIUM"
sources = ["tenable"]
title = "Linux Kernel ICMP 信息泄露漏洞"
updated = "2026-06-16T21:48:34.703"

