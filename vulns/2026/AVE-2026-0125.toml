[basic]
description = "WordPress WP Maps Pro 插件存在权限提升漏洞，该漏洞源于 `wpgmp_temp_access_ajax` AJAX 动作通过 `wp_ajax_nopriv_` 向未认证用户开放，其唯一保护机制是依靠前端页面通过 `wp_localize_script` 公开嵌入的 `fc-call-nonce` nonce 值进行校验，导致访问控制完全失效。未认证攻击者可利用此缺陷直接调用 `wpgmp_temp_access_support` 处理器并设置 `check_temp=false`，插件会无条件调用 `wp_insert_user()` 创建一个具有管理员角色的用户账号并返回魔法登录链接，攻击者访问该链接后自动通过 `wp_set_auth_cookie()` 完成认证，实现对目标 WordPress 网站的完全接管。该漏洞影响 WP Maps Pro 6.1.0 及以下所有版本，CVSS 评分 9.8，危害等级严重。"
published = "2026-05-29T07:16:14.487"
remediation = "立即将 WP Maps Pro 插件升级至 6.1.1 或更高版本。如尚无官方补丁，在 wp-config.php 中添加 define('DISALLOW_FILE_EDIT', true) 并禁用未认证用户注册功能。临时缓解措施可删除或注释掉 wp_ajax_nopriv_wpgmp_temp_access_ajax 的注册代码，阻止未认证用户访问该 AJAX 接口。"
score = 9.8
severity = "CRITICAL"
sources = ["hwpoc"]
title = "WordPress WP Maps Pro 插件权限提升漏洞"
updated = "2026-07-21T12:10:00.090"

