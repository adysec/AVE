[basic]
description = "Oracle WebLogic Server 存在反序列化漏洞，未经身份认证的远程攻击者可通过 T3 协议向目标服务器 7001 端口发送精心构造的序列化 payload，触发 JNDI 注入实现远程代码执行。该漏洞可绕过部分官方补丁，影响 Oracle WebLogic Server 多个版本，CVSS 评分 9.8，危害等级严重。建议用户及时升级至最新安全版本。"
published = "20260617"
remediation = "建议立即安装 Oracle 2026 年 7 月关键补丁更新 (Critical Patch Update - July 2026)，将 WebLogic Server 升级至 12.2.1.4.0、14.1.1.0.0、14.1.2.0.0 或 15.1.1.0.0 的最新安全版本。如无法立即打补丁，可在 WebLogic 控制台中将域配置的 `T3Enabled` 设为 `false` 禁用 T3 协议，或在网络防火墙层面阻止对 7001 端口的 T3 协议入站流量作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "Oracle WebLogic Server 反序列化漏洞"
updated = "20260617"

