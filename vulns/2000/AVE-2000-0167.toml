[basic]
description = "AOL Instant Messenger（AIM）3.5 版本客户端存在输入验证漏洞，远程攻击者可通过向目标用户发送特制的畸形 ASCII 值消息，导致 AIM 客户端崩溃或停止响应，造成拒绝服务。该漏洞源于客户端对消息中异常 ASCII 值的处理逻辑缺陷，攻击者无需身份认证即可利用，影响所有运行 AIM 3.5 的系统。"
published = "2000-03-02T05:00:00.000"
remediation = "升级 AOL Instant Messenger 至 4.0 或更高版本，该版本已修复畸形 ASCII 消息导致的客户端崩溃问题。由于 AIM 服务已于 2017 年 12 月全面关闭，建议彻底停用该产品并迁移至其他即时通讯方案。如短期无法升级，可在网关或防火墙上禁用 AIM 协议的 OSCAR 端口（TCP 5190）作为临时缓解措施，阻止外部恶意消息触达客户端。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "AOL Instant Messenger 3.5 消息中畸形ASCII值拒绝服务漏洞"
updated = "2026-06-16T21:51:11.313"

