[basic]
description = "NCSA HTTPd 1.5c 版本在处理 HTTP 请求时存在缓冲区溢出漏洞，未经身份认证的远程攻击者可通过向目标 Web 服务器发送超长或特制的 HTTP 请求触发该漏洞，导致远程代码执行或拒绝服务。该漏洞影响 NCSA HTTPd 1.5c 及更早版本，CVSS 评分 10.0，危害等级严重，且无需认证即可利用。由于该软件已停止维护，建议用户迁移至 Apache httpd 等受支持的 Web 服务器。"
published = "1995-02-01T05:00:00.000"
remediation = "该漏洞影响已停止维护的 NCSA HTTPd 1.5c，无官方补丁。建议立即迁移至活跃维护的 Web 服务器（如 Apache HTTP Server 2.4.x 或 Nginx）。临时缓解措施：在边界防火墙上限制对 80/TCP 端口的访问来源，仅允许可信 IP 连接。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "NCSA HTTPD 缓冲区溢出漏洞"
updated = "2026-06-16T21:47:57.893"

