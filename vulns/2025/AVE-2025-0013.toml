[basic]
description = "WordPress Felan Framework 插件（由 RiceTheme 开发）1.1.3 及之前版本中存在反射型跨站脚本（XSS）漏洞。该漏洞源于程序对用户输入参数在生成 Web 页面时未进行充分的中和过滤，未经身份认证的远程攻击者可通过向目标用户发送特制 URL，诱使用户点击后导致恶意脚本在用户浏览器中执行，造成敏感信息泄露、会话劫持等危害。CVSS 评分 7.1，危害等级高，攻击复杂度低，无需用户特权即可利用。"
published = "2026-05-27T09:16:26.977"
remediation = "立即联系 RiceTheme 获取修复版本，或确认是否有 1.1.3 以上更新。如无法升级，部署 Web 应用防火墙（如 Wordfence、Patchstack）拦截反射型 XSS 攻击流量；同时在 WordPress 配置中添加 `Content-Security-Policy` 响应头限制脚本来源作为临时缓解措施。也可考虑暂时禁用 Felan Framework 插件直至官方补丁发布。"
score = 7.1
severity = "HIGH"
sources = ["hwpoc"]
title = "RiceTheme Felan Framework 反射型跨站脚本漏洞"
updated = "2026-06-17T08:49:42.513"

