[basic]
description = "DNS 协议存在反射放大攻击漏洞，远程攻击者通过伪造源地址向开放 DNS 解析服务器发送小型 UDP 查询请求，DNS 服务器将放大数十倍的响应数据发送至受害目标，导致其带宽耗尽、服务不可用。该漏洞影响所有采用 UDP 协议的 DNS 服务器，攻击者无需认证即可利用大量开放 DNS 递归解析器实施分布式拒绝服务攻击，长期以来被广泛用于大规模网络攻击。"
published = "1999-12-31T05:00:00.000"
remediation = "升级 DNS 服务软件至支持源地址验证及递归控制的最新版本（如 BIND 9+），配置 /etc/named.conf 将 allow-recursion 限定为仅内部授权客户端，启用 response-rate-limiting（RRL）限制每秒响应速率，对外部请求仅提供授权域解析。同时在网络边界实施 BCP 38（RFC 2827）源地址过滤，阻止伪造源 IP 的数据包出站。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "DNS 服务器 UDP 反射放大漏洞"
updated = "2026-06-16T21:50:18.833"

