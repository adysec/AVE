[basic]
title = "CrackLib 2.5 GECOS字段缓冲区溢出漏洞"
description = "CrackLib 2.5版本中存在缓冲区溢出漏洞，本地用户可通过向GECOS字段传入超长字符串触发缓冲区溢出，从而获取root权限。攻击者需要具有本地系统访问权限，利用该漏洞可完全控制受影响的系统。"
severity = "HIGH"
score = 7.2
sources = ["cve", "avd"]
published = "1997-12-14"
updated = "2026-06-16"
remediation = "升级CrackLib至2.7及以上版本，该漏洞已在后续版本中修复。同时建议限制本地用户对GECOS字段的输入长度，避免超长字符串触发缓冲区溢出。"
