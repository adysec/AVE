[basic]
description = 'Microsoft JET 数据库引擎（3.5/3.51/4.0 版本）存在"VBA Shell"漏洞，攻击者可利用数据库查询中嵌入的 VBA Shell 函数执行任意操作系统命令。该漏洞影响所有使用 Jet 引擎的 Windows 应用（如 Access、带 Jet 的网页/桌面程序）。攻击条件为：攻击者需能构造或诱导目标打开含恶意查询的数据库文件（如通过网页上传、邮件附件等）。利用方式为构造特制 SQL/查询语句调用 Shell 函数，从而在目标系统上以当前用户权限运行任意命令，可能导致系统被完全控制。'
published = "1999-08-20T04:00:00.000"
remediation = "安装 Microsoft 安全公告 MS99-030 发布的 Jet 数据库引擎更新补丁，Jet 3.5/3.51 对应 KB172733，Jet 4.0 对应 KB239114。通过 Microsoft Update 或手动下载补丁更新至修复版本，若暂无法打补丁，可将数据库查询用户的 VBA Shell 函数调用权限设为禁用以临时缓解风险。"
score = 7.2
severity = "HIGH"
sources = ["exploitdb"]
title = '{"_meta":{},"stopReason":"end_turn","usage":{"inputTokens":10824,"outputTokens":32,"totalTokens":10856}}'
