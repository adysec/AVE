[basic]
description = "Linux cfingerd（可配置 Finger 服务守护进程）存在远程权限提升漏洞，未经认证的远程攻击者可通过向目标系统 Finger 服务（默认端口 79）发送特制查询请求触发缓冲区溢出，成功利用可获取目标系统 root 最高权限，完全控制受影响主机。该漏洞影响多种 Linux 发行版中部署的 cfingerd 服务，CVSS v2 评分 10.0，危害等级严重，且利用无需任何认证信息，攻击门槛极低。"
published = "1999-01-01T05:00:00.000"
remediation = "立即升级 cfingerd 至 1.4.3 及以上版本以修复权限提升漏洞；如无法升级，在 inetd/xinetd 配置中禁用 finger 服务（注释掉 finger 行后重启 xinetd），并在防火墙层面阻止外部对 TCP 端口 79 的访问。由于 finger 协议已过时且存在多种安全隐患，建议彻底移除 cfingerd 软件包。（64字）"
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "Linux cfingerd 远程权限提升漏洞"
updated = "2026-06-16T21:47:59.250"

