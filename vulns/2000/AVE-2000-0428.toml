[basic]
description = "Microsoft SQL Server 7.0 的混合模式认证（Mixed Mode Authentication）功能存在敏感信息泄露漏洞。该数据库系统在日志文件中以明文形式存储系统管理员（sa）账户密码，任何具有本地系统访问权限的用户均可读取该日志文件并获取 sa 密码。攻击者利用该密码可登录 SQL Server 数据库并以最高权限执行任意 SQL 语句，甚至通过 xp_cmdshell 等扩展存储过程在服务器上执行系统命令，实现远程代码执行。该漏洞主要影响 SQL Server 7.0 版本，攻击者无需数据库认证即可通过本地文件系统访问获取高权限凭据，危害范围覆盖所有使用混合模式认证的 SQL Server 7.0 实例。Microsoft 已在后续 Service Pack 中修复此安全缺陷，建议用户升级至 SQL Server 7.0 SP3 或更高版本。"
published = "2000-05-30T04:00:00.000"
remediation = "立即安装 Microsoft SQL Server 7.0 Service Pack 2 或更高版本，该补丁已修复 sa 密码明文记录问题。如无法升级，建议将认证模式从 Mixed Mode 切换为 Windows 身份验证模式，并限制对 SQL Server 日志文件（ERRORLOG 等）的访问权限，仅允许管理员账户读取。"
score = 2.1
severity = "LOW"
sources = ["avd"]
title = "Microsoft SQL Server 7.0 明文密码存储漏洞"
updated = "2026-06-16T21:51:38.473"

