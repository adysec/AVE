[basic]
description = "BSD 系统 /proc 文件系统存在权限检查缺失漏洞，本地攻击者可通过修改 stderr 文件描述符，利用 /proc/pid/mem 接口直接读写目标进程内存空间，从而获取 root 权限。该漏洞影响 FreeBSD 3.4、NetBSD 1.4.1、OpenBSD 2.6 等版本，CVSS 评分 7.2，危害等级高。攻击者需拥有本地系统访问权限方可利用。"
published = "2000-02-16T05:00:00.000"
remediation = "升级到已修复此漏洞的 BSD 系统版本（FreeBSD 3.5+、NetBSD 1.5+、OpenBSD 2.7+）。如无法升级，可通过在 /etc/fstab 中移除 procfs 挂载或设置挂载选项为 nosuid 来禁用 /proc 文件系统，作为临时缓解措施。"
score = 7.2
severity = "HIGH"
sources = ["exploitdb"]
title = "FreeBSD/NetBSD/OpenBSD /proc 文件系统本地权限提升漏洞"
updated = "2026-06-16T21:50:59.290"

