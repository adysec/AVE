[basic]
description = "Telaen 是一款开源 Webmail 应用程序，其 redir.php 脚本中存在开放重定向漏洞。攻击者可构造特制 URL，诱使已登录用户点击后将其重定向至任意外部恶意网站，进而实施钓鱼攻击或窃取用户凭证。该漏洞影响 Telaen 1.3.1 之前的所有版本，攻击无需身份认证，仅需用户交互即可利用，CVSS 评分 6.1，危害等级中危。"
published = "2020-02-03T15:15:11.007"
remediation = "升级 Telaen 至 1.3.1 或更高版本，该版本已修复 redir.php 的重定向校验逻辑。如无法升级，可修改 redir.php 对 `url` 参数实施白名单验证，仅允许跳转到可信域名，或直接禁用该文件。"
score = 6.1
severity = "MEDIUM"
sources = ["nuclei"]
title = "Telaen 开放重定向漏洞"
updated = "2026-06-16T23:53:43.383"

