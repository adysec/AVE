[basic]
description = "IBM Network Station Manager 2.0 R1（NetStation）存在本地竞争条件漏洞，通过符号链接攻击（symlink attack）实现权限提升。本地攻击者可利用 NetStation 在处理临时文件时存在的竞态条件，诱导程序访问恶意构造的符号链接文件，从而以更高权限执行任意操作。该漏洞影响 IBM Network Station Manager 2.0 R1 版本，攻击复杂度较高，需要本地系统访问权限，一旦成功利用可导致机密性、完整性和可用性完全受损。"
published = "1999-12-27"
remediation = "IBM Network Station Manager 2.0 R1 已停止维护，官方不再提供补丁。建议升级至不受影响的版本（如 3.0 及以上），或将管理界面限制在受信任内网，通过防火墙/ACL 仅允许管理 IP 访问 TCP 端口 2301，并禁用不必要的远程管理功能以降低竞争条件被利用的风险。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "IBM Network Station Manager 2.0 R1 竞争条件漏洞"
updated = "1999-12-27"

