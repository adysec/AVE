[basic]
description = 'Samba 3.0.25 至 3.0.25c 版本的 Winbind nss_info 扩展（nsswitch/idmap_ad.c）中存在权限分配不当漏洞。当管理员将 "winbind nss info" 选项设置为 rfc2307 或 sfu 模式时，若 Active Directory 中用户的 RFC2307 或 Services for UNIX (SFU) 主组属性未定义（返回 NULL 值），idmap_ad.so 模块会错误地将所有本地用户赋予 gid 0（root 组）权限。本地攻击者利用此漏洞可获取目标系统的超级用户权限，实现权限提升。攻击前提是目标系统已配置为使用 Microsoft Active Directory 进行用户认证。'
published = "2007-09-14T01:17:00.000"
remediation = '升级 Samba 至 3.0.26 或更高版本，该版本已修复 idmap_ad.so 中主组分配逻辑。如无法立即升级，可采取以下临时缓解措施：(1) 在 Active Directory 中为所有域用户正确分配 Unix 主组属性（RFC2307/SFU primary group）；(2) 在 smb.conf 中移除或注释掉 "winbind nss info = rfc2307" 或 "winbind nss info = sfu" 配置项，改用默认值，重启 winbind 服务生效。'
score = 6.9
severity = "MEDIUM"
sources = ["tenable"]
title = "Samba Winbind nss_info 扩展本地权限提升漏洞"
updated = "2026-06-16T22:43:28.387"

