[basic]
description = "NSS库、GnuTLS、OpenSSL等加密库在X.509证书中支持已弃用的MD2哈希算法，由于MD2存在设计缺陷，远程攻击者可利用哈希碰撞漏洞在低于暴力破解的计算量下伪造证书签名，进而实施中间人攻击或身份伪造。该漏洞影响NSS 3.12.3之前版本（Firefox等产品）、GnuTLS 2.6.4/2.7.4之前版本、OpenSSL 0.9.8至0.9.8k版本，以及基于这些库的VMware ESX、vMA等产品。攻击条件为攻击者需投入大量但可行的计算资源生成MD2碰撞，攻击向量为网络远程利用，成功利用可导致证书伪造、通信劫持及数据完整性破坏，CVSS评分5.1（中危），厂商已通过更新加密库禁用MD2支持修复该漏洞。"
published = "2009-07-30T19:30:00.343"
remediation = "建议立即升级 VMware ESX 到 4.0 Update 2 或更高版本，升级 vMA 到 4.0 Update 2 或更高版本。同时升级底层 NSS 库到 3.12.3 或更高版本、GnuTLS 到 2.6.4/2.7.4 或更高版本、OpenSSL 到 0.9.8l 或更高版本。作为临时缓解措施，可在防火墙层面拦截使用 MD2 签名证书的 TLS 连接，并在证书信任存储中移除所有 MD2 签名的根证书。"
score = 5.1
severity = "MEDIUM"
sources = ["tenable"]
title = "VMware ESX和vMA NSS/nspr MD2哈希碰撞证书伪造漏洞"
updated = "2026-06-16T23:09:23.170"

