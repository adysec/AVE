[basic]
description = "MailStudio 2000 2.0 及更早版本中的 userreg.cgi CGI 程序未对用户输入进行有效过滤，远程攻击者可通过在请求参数中注入 shell 元字符（如管道符、分号等）构造特制 HTTP 请求，触发任意命令执行漏洞。成功利用后攻击者可完全控制目标服务器，执行任意系统命令。该漏洞无需身份认证即可远程触发，危害严重。"
published = "2000-06-09T04:00:00.000"
remediation = "该漏洞源于 userreg.cgi 未过滤 shell 元字符导致任意命令执行。3R Soft 已停止维护 MailStudio 2000，建议立即迁移至受支持的邮件服务器（如 Exchange 或 Postfix）。临时缓解措施：删除或禁用 userreg.cgi 脚本，并在 Web 服务器层配置输入过滤规则，拦截 ; | & ` $ 等危险字符传入 CGI 参数。"
score = 10
severity = "CRITICAL"
sources = ["exploitdb"]
title = "3R Soft MailStudio 2000 userreg.cgi 任意命令执行漏洞"
updated = "2026-06-16T21:51:55.630"

