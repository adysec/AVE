[basic]
description = "eftp FTP 服务器存在缓冲区溢出漏洞，远程未授权攻击者可向服务发送超长字符串导致缓冲区溢出，触发拒绝服务导致服务崩溃或拒绝服务。该漏洞影响 eftp FTP 服务器软件，攻击者无需身份认证即可远程发送恶意长字符串触发漏洞，导致服务进程崩溃拒绝服务，CVSS 评分 7.5（高危）。攻击者只需向目标 FTP 服务发送超长字符串即可触发缓冲区溢出导致拒绝服务，无需身份认证即可远程利用。建议升级到修复版本或限制 FTP 服务访问控制。"
published = "2000-11-14T05:00:00.000"
remediation = "建议升级 eftp 到 0.6.7 或更高版本，该版本已修复缓冲区溢出漏洞。若无法立即升级，可在防火墙层面限制 FTP 服务端口（默认 21 端口）仅允许受信 IP 访问，或暂时停用 eftp 服务直至完成升级。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "EFTP EFTP 缓冲区溢出拒绝服务漏洞"
updated = "2026-06-16T21:52:38.503"

