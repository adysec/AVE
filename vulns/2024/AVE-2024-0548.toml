[basic]
description = "Linux内核DRM MSM GEM子系统存在整数溢出漏洞。攻击者通过向目标系统提交特制的GEM命令控制`submit->cmd[i].size`和`submit->cmd[i].offset`等32位整数参数，在这些参数累加时可能触发整数溢出或绕溢bug。由于内核缺乏对这些用户可控参数的有效边界检查，攻击者可利用该漏洞在本地获取高级权限，最终执行任意代码。该漏洞影响所有使用Linux内核MSM GPU驱动的系统，攻击者需具备局部执行权限，漏洞利用难度中等，CVSS评估评分5.5，属于中危等级，已在内核安全更新中修复。"
published = "2025-02-27T03:15:10.477"
remediation = "建议升级 Linux 内核至包含补丁 https://patchwork.freedesktop.org/patch/624696/ 的版本（该补丁已合入主线内核）。Ubuntu 22.04 LTS 用户请升级至 linux-image-5.15.0-132-generic 或更新版本；Ubuntu 24.04 LTS 用户请升级至 linux-image-6.8.0-52-generic 或更新版本（参考 USN-7703-1）。如无法立即升级内核，可暂时禁用 MSM DRM 驱动（黑名单 msm 模块）作为临时缓解措施，但会导致高通 Adreno GPU 功能不可用。"
score = 5.5
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux 内核 DRM/MSM/GEM 整数溢出漏洞"
updated = "2026-06-17T08:07:27.397"

