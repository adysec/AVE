[basic]
description = 'SystemSoft SystemWizard 软件包在 HP Pavilion（Windows 98）及其他可能存在的平台和操作系统中安装了两个被标记为"对脚本安全"（safe for scripting）的 ActiveX 控件。由于这两个控件（Launch 控件与 RegObj 控件）被浏览器信任可用于脚本操作，未经验证的远程攻击者只需构造一个恶意网页并引用上述控件，即可在访问该页面的用户上下文中执行任意系统命令。攻击条件为受害者使用易受影响的浏览器访问攻击者控制的网页，无需身份认证或本地权限。该漏洞影响装有 SystemWizard 的 HP Pavilion 等 Windows 98 设备，攻击者可借此实现远程代码执行与系统控制权夺取。'
published = "1999-12-31T05:00:00.000"
remediation = '立即卸载或禁用 HP Pavilion 随机附带的 SystemSoft SystemWizard 组件中标记为"safe for scripting"的 Launch 和 RegObj 两个 ActiveX 控件（在 IE 中通过"管理加载项"禁用或设置 kill bit 注册表项 {对应 CLSID} 为 0x00000400），并将 Windows 98 升级至厂商后续修复版本或弃用该预装软件；临时缓解可在 IE 安全设置中将"对未标记为可安全脚本的 ActiveX 控件初始化和脚本运行"设为禁用。'
score = 7.5
severity = "HIGH"
sources = ["avd"]
