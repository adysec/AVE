[basic]
description = "Internet Explorer 4.0 及 4.01 版本存在跨帧安全漏洞（Cross Frame Navigate），远程攻击者可通过构造恶意网页，利用浏览器跨帧导航机制绕过同源策略限制，读取目标用户本地文件系统中的敏感信息。该漏洞影响 Windows 平台上的 IE 4.0/4.01 版本，攻击者需诱使用户访问恶意网站，无需身份认证即可实施攻击，CVSS 评分 2.6，危害等级低。"
published = "1998-09-04T04:00:00.000"
remediation = "立即升级 Internet Explorer 至 5.01 及以上版本，或改用 Microsoft Edge/Chrome/Firefox 等现代浏览器。IE 4.0 已停止支持且存在大量未修复漏洞，不应继续使用。如因兼容性必须使用旧版 IE，建议启用 Internet Explorer 增强安全配置并禁用 ActiveX 脚本执行。"
score = 2.6
severity = "LOW"
sources = ["epss"]
title = "Microsoft Internet Explorer 跨帧导航信息泄露漏洞"
updated = "2026-06-16T21:49:13.867"

