[basic]
description = 'Check Point Software Firewall-1 3.0 存在脚本标签过滤绕过漏洞。该防火墙未能正确过滤 HTML 中的 SCRIPT 标签，远程攻击者可通过在 SCRIPT 标签前额外添加一个 `<` 字符的方式绕过 "Strip Script Tags" 安全限制，导致恶意脚本内容通过防火墙的检测。该漏洞影响 Check Point Firewall-1 3.0 版本，攻击者无需认证即可利用，危害等级高。'
published = "2000-01-29T05:00:00.000"
remediation = "升级 Check Point Firewall-1 至 4.0 或更高版本，该版本已修复 SCRIPT 标签过滤绕过问题。如无法升级，在防火墙规则中启用 HTTP 协议检查并添加过滤规则，手动拦截包含 `<script` 或 `<SCRIPT` 标签的 HTTP 请求。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "Check Point Software Firewall-1 脚本标签过滤绕过漏洞"
updated = "2026-06-16T21:51:02.023"

