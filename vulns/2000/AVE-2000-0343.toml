[basic]
description = "Cayman 3220-H DSL 路由器存在 Ping of Death 拒绝服务漏洞。攻击者无需身份认证，仅需向目标设备发送超大型 ICMP echo（ping）请求数据包，即可导致路由器设备崩溃或重启，造成网络服务中断。该漏洞利用方式简单，攻击门槛低，影响所有使用该型号 DSL 路由器的网络环境。设备厂商未提供官方修复补丁，建议用户更换受支持的路由设备或在网络边界过滤超大 ICMP 数据包以缓解风险。"
published = "2000-05-23T04:00:00.000"
remediation = "升级 Cayman 3220-H DSL 路由器至最新可用固件版本。如设备已停产无官方补丁，应在网络边界防火墙或上游路由器上配置 ACL 规则，丢弃 ICMP 请求分片包或限制 ICMP 报文最大长度不超过 65535 字节，必要时直接禁用 ICMP echo 响应以缓解风险。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Cayman 3220-H DSL Router ICMP Packet 拒绝服务漏洞"
updated = "2026-06-16T21:51:40.560"

