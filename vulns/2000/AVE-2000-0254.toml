[basic]
description = "X Font Server (xfs) 存在输入验证缺陷，本地攻击者可通过向 xfs 的 Unix socket 发送特制的畸形数据，触发缓冲区溢出或服务崩溃，导致拒绝服务。该漏洞影响 RedHat Linux 6.x 及早期 Linux 发行版，需要本地用户权限才能利用，CVSS 评分 2.1，危害等级低。"
published = "2000-04-16"
remediation = "升级 xfs 软件包至修复版本（Red Hat Linux 6.x 用户安装 RHSA 更新或升级至 xfs 版本 1.3.1 以上），或禁用 xfs 服务（`chkconfig xfs off`；`service xfs stop`）。如无法升级，在 `/etc/X11/fs/config` 中限制 `no-listen = tcp` 仅允许本地 socket 访问，降低攻击面。"
score = 2.1
severity = "LOW"
sources = ["avd"]
title = "Linux X Font Server 缓冲区溢出拒绝服务漏洞"
updated = "2026-06-16"

