[basic]
description = "eterm 是 Debian GNU/Linux 系统上使用的终端模拟器，其 0.8.8 版本存在权限许可漏洞。该漏洞源于程序未正确限制文件访问权限，导致本地攻击者可通过符号链接攻击或特权文件操作等方式将权限提升至 root。攻击者需拥有本地系统账户，无需用户交互即可触发，成功利用后可完全控制受影响系统。"
published = "1999-02-18T05:00:00.000"
remediation = "立即升级 eterm 至 0.9.0 及以上版本，Debian 用户通过 apt-get install eterm 更新。该漏洞影响 eterm 0.8.8，因程序未正确处理权限导致本地用户可获取 root 权限。临时缓解措施包括限制非授权用户登录系统及移除 eterm 的 SUID 位：chmod u-s /usr/bin/eterm。"
score = 7.2
severity = "HIGH"
sources = ["cve"]
title = "Debian GNU/Linux eterm 权限提升漏洞"
updated = "2026-06-16T21:51:34.143"

