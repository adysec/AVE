[basic]
description = "Eastman Work Management 3.21 存在密码明文存储漏洞，该软件将用户密码以明文形式保存在 Windows 注册表的 COMMON 和 LOCATOR 键值中。本地攻击者可通过读取注册表获取明文密码，进而提升权限。该漏洞影响 Eastman Work Management 3.21 版本，CVSS 评分 4.6，危害等级中危。建议升级至修复版本或限制注册表访问权限。"
published = "1999-06-24T04:00:00.000"
remediation = "立即限制对注册表项 COMMON 和 LOCATOR 的访问权限，仅允许 SYSTEM 和管理员组读取，阻止普通用户查询这两项。同时审查所有使用 Eastman Work Management 3.21 的系统，迁移至受支持的最新版本或替代产品，因为该版本以明文存储密码且厂商已停止安全支持。"
score = 4.6
severity = "MEDIUM"
sources = ["cve"]
title = "Eastman Work Management 密码明文存储漏洞"
updated = "2026-06-16T21:50:30.620"

