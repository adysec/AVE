[basic]
description = "PHP 3.0 及 4.0 版本在错误日志记录功能中存在格式化字符串漏洞，远程攻击者可通过向 PHP 应用提交特制的包含格式化字符（如 %n、%s）的请求触发错误日志写入，由于程序未对用户输入的格式化字符串进行有效过滤，攻击者可以利用该漏洞在目标系统上执行任意命令。该漏洞影响 PHP 3.0.16 及 4.0.2 版本，CVSS 评分 10.0，危害等级严重。"
published = "2000-12-19T05:00:00.000"
remediation = "升级 PHP 至 3.0.17、4.0.3 或更高版本。Red Hat Linux 用户安装 RHSA-2000:088 或 RHSA-2000:095 更新包；FreeBSD 用户应用 FreeBSD-SA-00:75 补丁；Caldera 用户安装 CSSA-2000-037.0 更新。无法升级时在 php.ini 中设置 track_errors=Off 禁用错误跟踪，并在 error_log 中限制日志文件权限为 600 以降低利用风险。"
score = 10
severity = "CRITICAL"
sources = ["exploitdb"]
title = "PHP 3.0/4.0 错误日志格式化字符串远程代码执行漏洞"
updated = "2026-06-16T21:52:52.483"

