[basic]
description = "Linux 内核 MT76 无线驱动中的 mt7915 芯片驱动存在空指针解引用漏洞，当 mt7915_mac_fill_rx_vector 函数处理特定无线帧时未能正确检查指针有效性，在内存分配失败或异常条件下可导致空指针解引用，造成内核崩溃（拒绝服务）。攻击者通过发送特制的无线帧即可触发该漏洞，影响使用 MT7915 芯片的无线设备。"
published = "2025-02-26"
remediation = "升级 Linux 内核至 5.15.59、5.19.11 或更高版本（该漏洞已在 5.15 和 5.19 稳定分支中修复），或合入 commit 42bdaadbfbcc 对应的补丁。如无法立即升级内核，可通过 modprobe.blacklist=mt7915e 内核参数临时禁用 mt7915 驱动模块以缓解风险。"
score = 5
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux kernel mt76 mt7915 驱动空指针解引用漏洞"
updated = "2025-02-26"

