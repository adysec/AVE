[basic]
description = "Jgaa WarFTPd 1.70 版本在处理客户端连接时存在拒绝服务漏洞，远程攻击者可通过向目标 FTP 服务端口持续发起大量连接请求（连接洪水）耗尽服务器资源，导致服务无法正常响应合法用户请求而瘫痪。该漏洞影响运行 WarFTPd 1.70 的 Windows 主机，攻击者无需身份认证，只需具备网络可达性即可通过网络发送大量并发连接实施攻击，造成服务不可用。"
published = "1999-12-13T05:00:00.000"
remediation = "建议将 War FTP Daemon 升级到 1.82 或更高版本，或在防火墙及网关层面限制单 IP 最大并发连接数并启用连接速率阈值拦截，同时考虑迁移至当前维护状态良好的 FTP 服务如 vsftpd 或 ProFTPD 以彻底消除风险。"
score = 5
severity = "MEDIUM"
