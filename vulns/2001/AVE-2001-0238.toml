[basic]
description = "MP3Mystic 1.04b3 之前版本存在目录遍历漏洞，远程攻击者可通过在 URL 中包含 '..'（点点）序列绕过路径限制，下载服务器上的任意文件。该漏洞无需身份认证即可远程利用，攻击条件简单，仅需向目标服务器发送特制的 HTTP 请求即可读取系统敏感文件，导致信息泄露。受影响版本为 MP3Mystic 1.0.x 系列，官方已在 1.04b3 版本中修复。"
published = "2001-08-14T04:00:00.000"
remediation = "升级 MP3Mystic 至 1.04b3 或更高版本，该版本已修复目录遍历漏洞。如无法升级，在 Web 服务器或反向代理层配置规则，拦截包含 `../` 的 URL 请求路径，并限制 Web 进程对文件系统的读取权限，仅允许访问公开目录。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Jason Rahaim MP3Mystic 目录遍历漏洞"
updated = "2026-06-16T21:54:33.760"

