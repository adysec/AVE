[basic]
description = "Novell BorderManager 3.0 及 3.5 版本中 Telnet 服务存在拒绝服务漏洞，远程攻击者无需认证即可通过向端口 2000 发起 Telnet 连接并反复按回车键，导致系统代理服务崩溃或资源耗尽，造成服务不可用。该漏洞攻击门槛低，仅需基本的网络连接能力即可触发危害。Novell 官方尚未发布有效补丁，受影响系统面临持续性拒绝服务攻击风险。"
published = "2000-03-30T05:00:00.000"
remediation = "升级 Novell BorderManager 至 3.6 或更高版本，或在防火墙层面限制对 2000 端口的 telnet 访问，仅允许受信任 IP 连接。如产品已停止维护，建议迁移至受支持的替代产品并完全禁用 telnet 服务。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Novell BorderManager 3.0/3.5 Telnet连接拒绝服务漏洞"
updated = "2026-06-16T21:51:06.527"

