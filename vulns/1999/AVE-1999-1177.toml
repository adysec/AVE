[basic]
description = 'Lynx 2.x 版本存在源验证漏洞（CWE-346），该程序未能正确区分内部与外部 HTML 内容，导致本地攻击者可通过读取临时文件中存储的"安全"隐藏表单值，并构造特制的 LYNXOPTIONS: URL 来修改用户配置文件，进而执行任意命令。漏洞影响 Lynx 2.x 全系列版本，CVSS 评分 7.8，危害等级高。攻击者需要本地系统访问权限，利用难度较低。'
published = "1999-11-16T05:00:00.000"
remediation = "升级 Lynx 至 2.9.2 或更高版本，该版本已修复 LYNXOPTIONS: URL 处理中对内部与外部 HTML 来源的区分问题。同时建议配置 --enable-config-file 编译选项限制仅允许受信任的配置文件路径，并避免在协同环境下使用 lynx 浏览不可信本地文件。如无法升级，可移除 lynx 的 setuid 权限并限制用户对该二进制文件的访问。tmp"
score = 7.8
severity = "HIGH"
sources = ["avd"]
title = "Lynx 代码执行漏洞"
updated = "2026-06-16T21:50:41.687"

