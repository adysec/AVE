[basic]
description = "该漏洞存在于微软数据访问组件（MDAC）2.1中的远程数据服务（RDS）DataFactory组件中，该组件在IIS 3.x和4.x版本中暴露了不安全的调用方法。通过向目标系统发送特定的RDS请求，攻击者可以绕过权限验证，直接利用这些不安全的方法来执行任意系统命令。该漏洞影响包括Microsoft IIS 3.0/4.0、Microsoft Index Server 2.0和Microsoft Site Server Commerce Edition 3.0等服务，能够在完全未授权的情况下实现远程代码执行。攻击者只需向目标服务器发送精心构造的RDS数据包，即可接管目标主机控制权，危害等级极高。"
published = "1999-07-19T04:00:00.000"
remediation = "立即升级 MDAC 至 2.5 SP3 或更高版本（含 MDAC 2.6/2.7/2.8），或升级 IIS 至 5.0 及以上版本；若无法升级，请在 IIS 中禁用 RDS（删除 /msadc 虚拟目录、移除 msadcs.dll 注册表项、禁用 ADC/ADO/ADO MDAC 组件），并在防火墙层面封禁 TCP 80/443 端口对外暴露的 RDS 端点。立即应用微软安全公报 MS99-025 提供的补丁程序（MDAC 2.1 SP2 补丁 / IIS 4.0 补丁包）。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "Microsoft IIS MDAC RDS DataFactory 远程代码执行漏洞"
updated = "2026-06-16T21:49:31.110"

