[basic]
description = "Hotmail 邮件系统未对用户邮箱中的 JavaScript 代码进行有效过滤，远程攻击者可通过构造包含十六进制编码的 javascript: 协议（如 j&#x41;vascript）的恶意邮件，当收件人打开邮件时触发 JavaScript 代码执行，导致敏感信息泄露或会话劫持。该漏洞影响 Hotmail 邮件服务，利用方式简单，危害严重，CVSS 评分 10.0。"
published = "2000-01-10T05:00:00.000"
remediation = "Microsoft 已在 Hotmail 服务端更新邮件内容过滤引擎，对十六进制编码的 `javascript:` 协议字符串进行递归解码检测，阻止所有经过编码混淆的脚本协议执行。用户无需操作，确保浏览器启用默认安全设置即可。"
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "Microsoft Hotmail JavaScript代码过滤远程代码执行漏洞"
updated = "2026-06-16T21:50:57.650"

