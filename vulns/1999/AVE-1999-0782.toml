[basic]
description = "该漏洞源于系统对 IP 路由跟踪（traceroute）功能的访问控制不当，未限制可发起 traceroute 请求的源地址范围。未经身份认证的远程攻击者可从任意主机向目标系统发送 traceroute 数据包，无需凭据即可获取目标网络的路径信息和中间路由节点，从而暴露内部网络拓扑结构。该漏洞影响配置不当的操作系统及网络设备，攻击者仅需目标系统网络可达即可利用，通过标准 traceroute 工具即可完成探测，为后续针对性攻击提供网络情报支持。"
published = "1997-01-01T05:00:00.000"
remediation = "在受影响的路由器上禁用源路由功能，并通过访问控制列表（ACL）限制 ICMP traceroute 的访问来源。首先在全局配置模式下执行 no ip source-route 禁用 IP 源路由，然后在入站接口上应用 ACL 阻止未经授权的主机发送 traceroute 请求，仅允许受信任的管理网段发起。同时将设备升级至 Cisco 已修复此问题的 IOS 版本，或在防火墙层面阻断外部对 ICMP type 11（time exceeded）的流量，以进一步降低网络拓扑被外部探测的风险。"
score = 5
severity = "MEDIUM"
