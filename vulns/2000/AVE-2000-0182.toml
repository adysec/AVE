[basic]
description = "Oracle 8.1.5.x for Linux 安装程序在安装过程中会跟随符号链接，并以全局可写权限创建 orainstRoot.sh 脚本文件，导致本地用户可通过创建指向关键系统文件的符号链接，诱导安装程序覆盖关键文件从而实现本地权限提升。该漏洞影响 Oracle8i Standard Edition 8.1.5 for Linux 版本，攻击者需具备本地用户权限且能创建符号链接，利用方式为预先创建指向敏感文件（如 /etc/passwd 或 /etc/sudoers）的符号链接，待 Oracle 安装程序运行时跟随链接并以世界可写权限创建或覆盖目标文件，导致权限提升。CVSS 评分 6.2，属于本地权限提升漏洞，Oracle 已在后续版本中修复该符号链接跟随及权限设置缺陷。"
published = "2000-03-05T05:00:00.000"
remediation = "建议升级至 Oracle8i 8.1.6 或更高版本，该版本修复了安装程序跟随符号链接并创建全局可写 orainstRoot.sh 的问题。若无法立即升级，可在安装前手动创建 orainstRoot.sh 并设置权限为 755，或限制普通用户对 Oracle 安装目录的写入权限作为临时缓解措施。"
score = 6.2
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Oracle8i Standard Edition 本地权限提升漏洞"
updated = "2026-06-16T21:51:13.403"

