[basic]
description = 'Tesla（Elixir HTTP 客户端库）的 `Tesla.Multipart.add_content_type_param/2` 函数在将调用者提供的字符串追加到 multipart 的 `Content-Type` 标头时未对 CR（\r）和 LF（\n）字符进行任何校验。攻击者通过控制 charset、boundary 等 content-type 参数注入包含 `\r\n` 的恶意值，可导致 HTTP 标头行分裂，从而在出站请求中注入任意 HTTP 标头，进而可能引发请求走私攻击。该漏洞影响 tesla 0.8.0 至 1.18.2 版本，CVSS 评分 2.1，危害等级低。已在 tesla 1.18.3 版本中修复。'
published = "2026-06-02T20:16:38.557"
remediation = '立即将 elixir-tesla 升级至 1.18.3 或以上版本（`mix deps.update tesla`）。如无法升级，在调用 `Tesla.Multipart.add_content_type_param/2` 前对参数值进行校验，拒绝包含 `\r` 或 `\n` 字符的输入。'
score = 2.1
severity = "LOW"
sources = ["ghsa"]
title = "elixir-tesla tesla Multipart Content-Type 标头 CRLF 注入漏洞"
updated = "2026-07-22T19:10:00.120"

