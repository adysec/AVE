[basic]
description = "rexec（远程执行）服务是一种未加密的远程命令执行协议，运行在 TCP 512 端口，使用主机名和 .rhosts 文件进行基于主机的认证。攻击者可通过伪造信任主机 IP 地址或利用 .rhosts 配置缺陷绕过认证，在目标系统上以当前用户权限执行任意命令，实现权限提升。该服务默认不启用加密，明文传输密码，容易被中间人攻击窃听。该漏洞 CVSS 评分 10.0，危害等级严重，建议禁用 rexec 服务并改用 SSH。"
published = "1999-01-01T05:00:00.000"
remediation = "立即禁用 rexec 服务（通常为 /etc/inetd.conf 中注释 exec 行或 systemctl stop rexec），并使用 SSH（OpenSSH）替代所有远程执行需求。检查系统是否仍在运行 rexecd/in.rexecd 进程并予以停止卸载。"
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "Unix rexec 服务权限提升漏洞"
updated = "2026-06-16T21:48:44.510"

