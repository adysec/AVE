[basic]
description = "Microsoft Outlook、Exchange 及 Windows Messaging 等电子邮件客户端默认自动处理邮件中的已读回执和送达回执标签。远程攻击者可伪造包含回执请求的邮件，将回执目标地址指向大型邮件列表，触发大量自动响应邮件，导致目标邮件系统被洪水消息淹没，造成拒绝服务。"
published = "2000-02-29"
remediation = "安装 Microsoft 2000 年 3 月发布的安全更新 MS00-008，或在 Outlook 中取消勾选工具→选项→电子邮件选项→跟踪选项中的处理回执和送达回执选项，并在 Exchange 服务器上禁用自动回执响应功能。"
score = 5.0
severity = "MEDIUM"
sources = ["cve"]
title = "Microsoft Outlook、Exchange、Windows Messaging 电子邮件回执响应拒绝服务漏洞"
updated = "2026-06-16"

