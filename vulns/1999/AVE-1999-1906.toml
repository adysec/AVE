[basic]
description = 'Microsoft IIS 4.0 所集成的 Index Server 2.0 组件在注册表 AllowedPaths 项的 ContentIndex\Catalogs 子键中存储了被索引目录的物理路径信息，由于该注册表项权限设置不当，允许本地及远程用户读取其中内容，从而泄露正在被索引的目录物理路径。攻击者可通过远程访问目标系统的注册表或利用本地账户读取该键值，获取系统目录结构等敏感信息，为进一步攻击提供信息支撑。'
published = "1999-03-23T05:00:00.000"
remediation = '立即限制注册表项 `HKLM\System\CurrentControlSet\Control\ContentIndex\Catalogs` 的访问权限，仅允许 SYSTEM 和 Administrators 读取；如无需全文检索功能，建议直接卸载 Index Server 服务或禁用 IIS 中的索引功能。对于仍运行 Windows NT 4.0 / IIS 4.0 的环境，应升级至受支持的操作系统版本（如 Windows Server 2012+）以彻底消除此信息泄露风险。'
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "Microsoft Index Server 物理路径信息泄露漏洞"
updated = "2026-06-16T21:50:21.197"

