[basic]
description = "雄伟科技智慧食堂系统存在任意用户密码重置漏洞，攻击者通过向 /Account/ForgetPasswordJson 接口发送特制请求，可在未提供原密码的情况下直接重置任意用户密码，导致权限绕过。攻击者仅需知晓目标用户名即可完成操作，无需任何身份认证。该漏洞影响雄伟科技智慧食堂系统全版本，可导致攻击者接管管理员账户，进而控制整个食堂管理系统，造成数据泄露和业务中断。"
published = "0703"
remediation = "联系雄伟科技获取最新安全补丁，将智慧食堂系统（灵犀 CanteenOS）升级至修复版本；在 `/Account/ForgetPasswordJson` 接口中添加短信验证码或邮箱校验机制，确保密码重置前验证用户身份真实性；同步在服务器端增加接口频率限制（如每 IP 每分钟最多请求 5 次）并添加图形验证码或 Token 防重放机制，防止自动化批量重置攻击。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "雄伟科技智慧食堂系统任意用户密码重置漏洞"
updated = "0703"

