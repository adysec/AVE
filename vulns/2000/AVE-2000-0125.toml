[basic]
description = "True North Internet Anywhere Mail Server 3.1.3 的 POP3 服务存在拒绝服务漏洞。未经身份认证的远程攻击者可通过向目标服务器的 POP3 端口发送大量并发连接请求，耗尽服务器连接池资源，导致 POP3 服务进程崩溃或停止响应，无法正常处理合法用户的邮件请求。该漏洞影响 Internet Anywhere Mail Server 3.1.3 及更早版本，CVSS 评分 5.0，危害等级中等。建议升级至最新版本或限制并发连接数。"
published = "2000-02-10T05:00:00.000"
remediation = "升级到 Internet Anywhere Mail Server 3.1.3 以上安全版本（厂商已发布修复补丁）；在防火墙限制对 POP3 端口 110 和 SMTP 端口 25 的源 IP 并发连接数不超过 100；配置系统级 TCP 连接速率限制和超时断开规则；该产品已停止维护多年，建议迁移至持续更新的邮件服务器软件（如 Dovecot + Postfix）。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "True North Internet Anywhere Mail Server 3.1.3 POP3 Server 拒绝服务漏洞"
updated = "2026-06-16T21:51:04.987"

