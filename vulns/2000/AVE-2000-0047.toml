From ExploitDB:
- Title: Ipswitch IMail 5.0.8/6.0/6.1 - IMonitor 'status.cgi' Denial of Service
- Platform: Windows
- Date: 2000-01-05
The vulnerability works by repeatedly calling the IMail Monitor's status.cgi script, which causes the web server to crash with an invalid memory access error. I'm fixing the TOML file to correct the description field, which is currently just an empty string, and adjusting the publication date format to use the standard YYYY-MM-DD format without the time component.
