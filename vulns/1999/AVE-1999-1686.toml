[basic]
description = 'guestbook.pl 是 Matt Wright 开发的 Perl CGI 留言板程序。该程序在过滤用户提交的服务器端包含（SSI）指令时，仅通过移除 "<!--" 与 "-->" 分隔符之间的内容来净化输入，过滤逻辑存在缺陷。当 guestbook.pl 运行于 Apache 1.3.9 及可能其他版本时，由于 Apache 允许使用除 "-->" 之外的其他闭合序列，远程攻击者可在留言中插入特制的 SSI 指令绕过过滤，从而在目标服务器上执行任意命令。该漏洞影响使用受影响版本 guestbook.pl 并部署于存在缺陷 Apache 版本的 Web 站点，攻击条件为攻击者无需认证即可向留言板提交内容，利用方式是通过构造绕过注释闭合规则的恶意 SSI 语句实现服务端命令执行。'
published = "1999-09-13T04:00:00.000"
remediation = "立即将 guestbook.pl 升级至 Matt Wright 官方发布的修复版本（建议 2.3.2 或更高版本），该版本已修复 SSI 过滤逻辑，可正确识别并移除所有 SSI 命令（包括非标准闭合序列）。如无法立即升级，应在 Apache 配置中对 guestbook.pl 所在目录禁用服务器端包含功能，添加 `Options -Includes` 指令阻止 SSI 解析。作为临时缓解措施，可在 guestbook.pl 脚本入口处增加输入过滤，正则匹配并删除所有包含 `#exec`、`#include`、`#config` 等 SSI 指令的内容，防止用户输入被注入执行。长期建议替换为其他维护状态活跃的留言板程序。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "Matt Wright Guestbook.pl 服务端包含（SSI）远程命令执行漏洞"
updated = "2026-06-16T21:49:36.507"

