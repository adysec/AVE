[basic]
description = "Windows NT 在启用 SYSKEY 功能后，对 SAM 数据库中的账户密码哈希进行加密时，错误地重复使用了用于加密的密钥流（keystream）。由于流密码的特性，密钥流的重复使用会导致密文与明文之间的异或关系暴露，攻击者在能够获取到 SAM 加密数据（如通过备份文件、注册表导出或物理访问）的前提下，可利用已知的明文与对应密文推导出密钥流，进而对其它账户的密码哈希进行解密与破解，从而绕过系统身份认证、获取本地账户权限。该漏洞影响启用 SYSKEY 的 Windows NT 系统，攻击条件为攻击者需先获得对 SAM 加密数据的访问能力。"
published = "1999-12-16T05:00:00.000"
remediation = '安装 Microsoft 1999 年 12 月安全公告 MS99-056 补丁程序（KB248183），该补丁修复了 SYSKEY 加密 SAM 密码哈希时重复使用密钥流的漏洞。受影响版本包括 Windows NT Workstation 4.0、Server 4.0、Server 4.0 Enterprise Edition 及 Terminal Server Edition，x86 与 Alpha 架构均需下载对应补丁进行安装；Terminal Server Edition 用户可升级至 Service Pack 6 一并修复此漏洞。同时建议运行 syskey 命令将加密密钥选项设置为"在启动时由用户输入密码"（选项 2）或"仅在软盘上存储启动密钥"（选项 3），防止密钥文件被恶意读取。如无法立即安装补丁，应通过物理访问控制限制未经授权的本地用户接触系统，并定期更改所有用户密码以降低密钥流复用带来的密码破解风险。'
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Microsoft Windows NT SYSKEY密钥流重用导致密码哈希泄露漏洞"
updated = "2026-06-16T21:49:28.960"

