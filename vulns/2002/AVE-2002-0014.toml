[basic]
description = "OpenSSL 0.9.6d 及更早版本、0.9.7-beta2 及更早版本的 ASN.1 库存在拒绝服务漏洞，远程攻击者可通过向目标系统发送特制的 ASN.1 编码数据触发该漏洞，导致 OpenSSL 服务崩溃。攻击无需认证即可执行，影响使用了上述版本 OpenSSL 的各类服务器和应用。"
published = "2002-08-12T04:00:00.000"
remediation = "升级 OpenSSL 至 0.9.6e 及以上版本或 0.9.7-beta3 及以上版本，该漏洞在 ASN.1 解析库中修复了畸形编码导致的拒绝服务问题。如无法升级，可在网络边界限制对 OpenSSL 服务的访问或部署 IPS 防护畸形 SSL 报文。"
score = 5
severity = "MEDIUM"
sources = ["osv"]
title = "OpenSSL ASN.1 Library 拒绝服务漏洞"
updated = "2026-06-16T21:57:53.240"

