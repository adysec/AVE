[basic]
description = "IRIX 操作系统 CDROM 可靠性检测程序（cdrom）存在缓冲区溢出漏洞。由于程序在处理 CDROM 设备检测数据时未对输入长度进行充分校验，本地攻击者可通过向该程序提交特制的超长输入数据触发栈缓冲区溢出，从而覆盖函数返回地址或关键数据结构。成功利用该漏洞可导致权限提升，攻击者将获得 root 权限，进而完全控制目标系统。该漏洞影响 IRIX 多个版本，攻击者需具备本地系统访问权限方可利用此漏洞。"
published = "1998-03-01T05:00:00.000"
remediation = "立即安装 SGI 安全公告 19980301-01-PX 中提供的补丁程序，该补丁修复了 cdrom 程序中的缓冲区溢出漏洞。由于 SGI IRIX 已停止维护，建议将系统迁移至受支持的操作系统（如 Linux）以彻底消除风险。如无法立即迁移，可通过限制本地用户对 cdrom 程序的执行权限（chmod 750 /usr/sbin/cdrom）作为临时缓解措施。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "SGI IRIX cdrom 本地缓冲区溢出漏洞"
updated = "2026-06-16T21:50:05.070"

