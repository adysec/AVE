[basic]
description = "Diffie-Hellman 密钥交换协议存在拒绝服务漏洞，远程攻击者（客户端）可向服务器发送非公钥的任意数值，触发服务器端昂贵的 DHE 模幂运算，导致服务器 CPU 资源被大量消耗，造成拒绝服务。攻击者仅需极少的客户端计算资源和网络带宽即可发起攻击，且可要求服务器使用其支持的最大密钥长度以放大攻击效果。该漏洞影响所有支持 DHE 密码套件的 TLS 服务器，CVSS 评分 7.5，危害等级高。"
published = "2021-11-11T19:15:07.380"
remediation = "建议在服务器端禁用 DHE 密码套件，仅启用 ECDHE 密钥交换；若必须支持 DHE，将 Diffie-Hellman 参数长度限制为 1024 位以下，并配置每连接 DH 计算超时（如 5 秒）；在 nginx 中设置 ssl_ciphers 'EECDH+AESGCM:EDH+AESGCM' 并移除 DHE 套件；Apache 中配置 SSLOpenSSLConfCmd DHParameters 并使用小参数文件；同时部署 TLS 1.3（仅支持 ECDHE），彻底消除 DHE 协商路径。"
score = 7.5
severity = "HIGH"
sources = ["tenable"]
title = "Diffie-Hellman 密钥协商协议 D(HE)ater 拒绝服务漏洞"
updated = "2026-06-16T22:00:27.427"

