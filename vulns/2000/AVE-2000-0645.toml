[basic]
description = "Cmail 2.4.7 Web 管理界面存在缓冲区溢出漏洞，远程攻击者无需身份认证即可向运行在 8002 端口的用户对话框发送超长用户名，触发缓冲区溢出导致服务拒绝。该漏洞影响 Cmail 2.4.7 版本的 Web 管理接口，攻击者只需网络访问权限即可发起攻击，无需任何认证凭据，利用方式为向用户登录对话框发送超长用户名字符串触发缓冲区溢出导致服务崩溃拒绝服务，CVSS 评分 5.0（AV:N/AC:L/Au:N/C:N/I:N/A:P），属于网络可访问、低复杂度、无需认证的可用性部分影响漏洞。"
published = "2000-06-05T04:00:00.000"
remediation = "立即升级 cmail 到最新维护版本或使用支持安全补丁的分支，因为原始 2.4.7 版本存在缓冲区溢出漏洞。防火墙配置中添加端口 8002 入站规则限制访问，仅允许可信 IP 连接，并限制用户名长度到合理范围，防止非法大用户名溢出攻击。同时，应在服务器上部署 IDS/IPS 系统，检测对端口 8002 的异常流量并及时阻断。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "cmail 2.4.7 缓冲区溢出拒绝服务漏洞"
updated = "2026-06-16T21:51:59.517"

