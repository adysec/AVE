[basic]
description = "Atrium Mercur Mail Server 3.2 存在目录遍历漏洞，攻击者可利用路径遍历技术（../）绕过目录限制，访问其他用户的电子邮件文件，或在邮件服务器系统中创建任意恶意文件。该漏洞影响所有版本 Atrium Mercur Mail Server 3.2，允许恶意本地用户窃取电子邮件隐私并植入恶意代码。漏洞原理源于对用户输入的文件路径验证不足，导致未授权的文件系统访问。CVSS 评分为 7.5（高级别严重程度），需本地访问权限即可利用，但潜在风险包括敏感数据泄露和系统完全失控。攻击者仅需具备基本的路径遍历技术即可轻易执行攻击，通过利用标准访问权限即可威胁邮件服务器的安全完整性。"
published = "2000-04-21T04:00:00.000"
remediation = "升级至 Mercur Mail Server 3.3 或更高版本，该版本已修复目录遍历缺陷。由于此产品已停止维护，建议迁移至 Active Directory 支持的邮件服务器。作为临时缓解措施，在 NTFS 层面限制普通用户对邮件存储目录的读取权限，并禁用 Web 邮件接口的路径回溯功能。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "Atrium Mercur Mail Server 目录遍历漏洞"
updated = "2026-06-16T21:51:27.977"

