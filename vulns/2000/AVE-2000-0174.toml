[basic]
description = "Windows NT 任务计划程序存在权限提升漏洞，当交互用户登录系统时，计划任务会使用当前用户的驱动器映射，本地攻击者可通过在原始批处理文件位置放置特洛伊木马批处理文件来替换原有文件，从而以更高权限执行恶意代码。该漏洞影响 Windows NT 系统，需本地用户登录且具备文件替换权限，CVSS 评分 4.6，危害等级中危。"
published = "2000-02-14T05:00:00.000"
remediation = "升级至 Windows 2000 或更高版本操作系统，Windows NT 4.0 已停止支持且不再提供安全更新。如无法升级，在任务计划程序中禁用交互式任务，避免计划任务使用当前登录用户的驱动器映射。限制本地用户对批处理文件所在目录的写入权限，防止替换为木马文件。"
score = 4.6
severity = "MEDIUM"
sources = ["cve"]
title = "Microsoft Windows NT 计划任务程序本地权限提升漏洞"
updated = "2026-06-16T21:51:12.237"

