[basic]
description = "Internet Explorer 4.01 存在任意文件读取漏洞，远程攻击者可通过在文件上传控件中粘贴文件名的方式，利用不可信脚本粘贴功能读取目标系统上的任意文件。该漏洞影响 Internet Explorer 4.01 版本，攻击者无需身份认证即可实施攻击，可能导致敏感信息泄露。由于该漏洞利用条件简单，仅需诱导用户访问恶意网页即可触发，具有较大的实际威胁。Microsoft 已在后续版本中修复此问题。"
published = "1998-10-01T04:00:00.000"
remediation = "升级到 Internet Explorer 5.0 或更高版本，该漏洞已在后续版本中修复。对于仍使用 IE 4.01 的遗留系统，建议禁用 Active Scripting 功能，在 Internet 选项 → 安全 → 自定义级别中将「脚本」设置为禁用，或迁移至现代浏览器（如 Edge/Chrome）以彻底消除风险。"
score = 2.6
severity = "LOW"
sources = ["epss"]
title = "Microsoft Internet Explorer 任意文件读取漏洞"
updated = "2026-06-16T21:49:13.733"

