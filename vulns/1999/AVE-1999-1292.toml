[basic]
description = "Ultrix 4.1 和 4.2 系统中的 LAT/Telnet 网关程序 lattelnet 存在特权提升漏洞。未经身份认证的远程攻击者可通过向目标系统发送特制的网络请求或命令，利用该网关在处理 LAT 与 Telnet 协议转换过程中的安全缺陷，在受影响的 Ultrix 系统上获取 root 权限，进而完全控制服务器。该漏洞影响所有运行 Ultrix 4.1 和 4.2 版本的平台，攻击无需任何凭据且利用条件简单，CVSS 评分为 10.0，危害等级为严重。CERT/CC 已发布安全公告 CA-1991-11 对此漏洞进行预警并披露修复方案。"
published = "1991-12-31T05:00:00.000"
remediation = "升级 Digital Ultrix 至 4.3 或后续已修复版本（官方已移除 lattelnet 缺陷代码）；如暂无法升级，应立即在 inetd.conf 中禁用 lattelnet 服务并重启 inetd，同时用防火墙限制仅可信内网主机访问 23 端口作为临时缓解。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "Digital Equipment Corporation Ultrix LAT/Telnet 网关(lattelnet) 本地权限提升漏洞"
updated = "2026-06-16T21:49:33.827"

