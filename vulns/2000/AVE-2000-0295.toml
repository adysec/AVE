[basic]
description = "Microsoft IIS 4.0 及 5.0 版本中，当安装了 IISADMPWD 虚拟目录时，inetinfo.exe 程序对畸形的 HTR 请求存在输入验证缺陷。远程攻击者无需身份认证即可向目标服务器发送特制的未分隔（Undelimited）HTR 请求，触发 inetinfo.exe 进程崩溃，导致 IIS 服务拒绝服务。该漏洞影响 Windows NT/2000 平台上的 IIS 4.0 和 5.0 版本，CVSS 评分 5.0，危害等级中危。微软已发布安全公告 MS00-028 修复此漏洞。"
published = "2000-05-10T04:00:00.000"
remediation = "安装 Microsoft 安全更新 MS00-031 补丁包，或升级至 Windows 2000 Service Pack 1 及以上版本。若无法升级，可在 IIS 管理器中删除 IISADMPWD 虚拟目录映射，或禁用 .htr 脚本映射以缓解风险。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Microsoft IIS 4.0/5.0 HTR请求拒绝服务漏洞"
updated = "2026-06-16T21:51:26.273"

