[basic]
description = "cPanel & WHM 登录流程中存在认证绕过漏洞（CWE-306），未经身份认证的远程攻击者可通过向管理接口发送特制请求绕过登录验证机制，直接获取控制面板的完全访问权限，进而可执行任意配置修改、创建新账户、执行恶意代码等操作。该漏洞影响 cPanel & WHM 11.40 至 11.136.0.5 之间的多个版本，CVSS 评分 9.8，危害等级严重。该漏洞已被列入 CISA 已知被利用漏洞目录并在野外大规模活跃利用，攻击者利用公开的 PoC 工具即可快速扫描并入侵未修复的服务器。cPanel 官方已在 2026 年 4 月发布于各版本的修复更新中修复此漏洞。"
published = "nday"
remediation = "升级 cPanel & WHM 至 11.126.0 或更高版本；强制所有管理接口仅通过 HTTPS 访问；在防火墙层面将 /login/ 及 WHM 管理端口（2086/2087）限制为仅内网可信 IP 可访问；启用双因素认证（2FA）；定期审计异常登录日志，及时发现暴力破解或绕过行为。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "cPanel WHM 认证绕过漏洞"
updated = "nday"

