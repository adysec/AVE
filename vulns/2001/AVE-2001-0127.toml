[basic]
description = "Joe 文本编辑器 2.8 版本在启动时会在当前工作目录（CWD）中搜索并加载 .joerc 配置文件，存在本地权限提升漏洞。本地攻击者可将特制的恶意 .joerc 文件放置于目标用户可能执行 joe 的目录中，当其他用户在该目录下启动 joe 编辑器时，恶意配置文件中的任意命令将被执行，导致攻击者获取目标用户的权限。该漏洞影响 Joe's Own Editor 2.8 及可能更早版本，攻击前提是攻击者具有本地文件写入权限并能诱导受害者进入特定目录执行 joe。"
published = "2001-05-03T04:00:00.000"
remediation = "升级 Joe 文本编辑器至 2.8-15.3 或更高版本（Debian 2.2 对应 DSA-041），或直接安装最新版 joe（≥4.0）。新版本已将 .joerc 配置文件搜索路径限定为用户主目录（~/.joerc），不再搜索当前工作目录。如无法升级，避免在不受信任的目录中执行 joe 命令，并定期检查目录中是否存在恶意 .joerc 文件。"
score = 4.6
severity = "MEDIUM"
sources = ["redhat"]
title = "Joe Text Editor .joerc 本地任意命令执行漏洞"
updated = "2026-06-16T21:54:02.157"

