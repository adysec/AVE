[basic]
description = "Foundry Networks 公司生产的 ServerIron 系列交换机存在 TCP/IP 序列号可预测漏洞。由于设备生成的 TCP 初始序列号缺乏足够随机性，远程攻击者可预测并伪造 TCP 连接数据包，实现会话劫持或欺骗攻击。该漏洞影响 ServerIron 系列交换机，CVSS 评分 7.5，危害等级高。攻击者无需认证即可通过网络远程利用，可能导致网络流量被拦截、篡改或敏感信息泄露。"
published = "2000-02-28T05:00:00.000"
remediation = "建议升级 ServerIron 交换机固件至启用了 RFC 1948 随机初始序列号(ISN)生成算法的最新版本。由于 Foundry Networks 已被 Brocade 收购（后并入 Broadcom），请登录 Broadcom/Brocade 支持门户检查对应型号是否有安全固件更新。如设备已停止维护无法升级，可在边界防火墙上启用 TCP 序列号随机化功能（如 Cisco ASA 的 tcp-randomize-sequence-number），或部署 IPS 设备对 TCP 会话进行完整性校验，并严格限制网络设备管理接口仅允许可信管理网段访问。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "Foundry Networks ServerIron 交换机可预测 TCP 序列号漏洞"
updated = "2026-06-16T21:51:09.800"

