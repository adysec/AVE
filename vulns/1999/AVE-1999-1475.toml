[basic]
description = "FreeBSD 2.2 及更早版本中的手册页阅读器（man）存在权限提升漏洞。man 程序在处理用户输入的命令序列时未进行充分过滤与校验，本地用户可通过精心构造的命令序列绕过权限限制，获取 root 或更高权限。该漏洞源于 man 对参数处理不当，本地攻击者需拥有系统普通用户访问权限即可利用，影响 FreeBSD 2.2 及之前版本。"
published = "1996-05-23"
remediation = "升级 FreeBSD 至 2.2.5 或更高版本，该漏洞已在后续版本中修复。如无法升级，可临时移除 man 程序的 setuid 权限位（chmod u-s /usr/bin/man）以消除本地提权路径，但会牺牲普通用户的 man 使用体验。在防火墙层面限制本地终端访问也可作为辅助缓解措施。"
score = 4.6
severity = "MEDIUM"
sources = ["cve"]
title = "FreeBSD man 本地权限提升漏洞"
updated = "2026-06-16"

