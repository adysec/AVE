[basic]
description = "SuSE Linux 6.0 中的 xtvscreen 程序存在任意文件写入漏洞。本地攻击者可通过符号链接攻击方式，在目标系统上创建指向 pic000.pnm 文件的符号链接，当 xtvscreen 程序运行时将覆盖链接指向的任意文件，导致系统文件被破坏或敏感数据被篡改。该漏洞利用条件为攻击者拥有本地用户权限，危害等级较低，CVSS 评分 2.1。"
published = "1999-02-18T05:00:00.000"
remediation = "立即升级 SuSE Linux 至 7.0 及以上版本，该版本已修复 xtvscreen 的符号链接竞争条件问题。如无法升级，可移除 xtvscreen 的 setuid 位（chmod u-s /usr/bin/xtvscreen）或直接删除该程序以消除攻击面。"
score = 2.1
severity = "LOW"
sources = ["cve"]
title = "SuSE Linux xtvscreen 符号链接攻击致任意文件写入漏洞"
updated = "2026-06-16T21:50:33.817"

