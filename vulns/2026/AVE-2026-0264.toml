[basic]
description = "uutils coreutils 中的 mknod 命令存在 SELinux 上下文设置缺陷：在创建设备节点后才设置 SELinux 上下文（而非 GNU 实现在创建前通过 setfscreatecon 原子化标记），当设置 SELinux 上下文失败时，清理函数错误地使用 remove_dir 删除设备节点或 FIFO 文件（实际无法删除），导致标记错误的节点残留。在 SELinux 强制模式下，攻击者可利用此缺陷创建上下文错误的设备节点，绕过强制访问控制策略，造成权限提升或系统安全策略规避。该漏洞影响 uutils coreutils 相关版本。"
published = "2026-04-23"
remediation = "立即升级 uutils coreutils 至 0.6.0 或更高版本，该版本已合入修复 PR #10582，在 mknod 前通过 setfscreatecon 原子化设置 SELinux 上下文。如无法立即升级，可通过 SELinux 策略限制 mknod 命令的执行权限，或避免在 SELinux enforcing 模式下使用 mknod 创建设备节点作为临时缓解措施。"
score = 3.5
severity = "LOW"
sources = ["ghsa"]
title = "uutils coreutils mknod 命令 SELinux 安全上下文标签漏洞"
updated = "2026-04-23"

