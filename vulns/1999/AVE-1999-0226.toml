[basic]
description = "Sendmail邮件服务器的 decode 别名存在安全缺陷，远程攻击者可向 decode 别名发送邮件，利用 Sendmail 将邮件内容通过管道传递给程序执行，从而覆盖系统敏感文件。该漏洞影响配置了 decode 别名的 Sendmail 服务器（常见于 BSD 系统），攻击者无需认证即可远程利用，攻击复杂度低，CVSS 评分 5.0（AV:N/AC:L/Au:N/C:N/I:P/A:N），主要影响文件完整性，可导致敏感文件被篡改或覆盖。攻击者只需向目标发送特制邮件至 decode 别名即可触发漏洞，利用方式为构造恶意邮件内容通过管道机制覆盖关键系统文件。建议禁用或限制 decode 别名，升级至修复版本的 Sendmail。"
published = "1996-12-10T05:00:00.000"
remediation = "tags, [3] avoiding additional explanations or oblique references.<value>升级Sendmail到8.13.0或更高版本以修复解码别名漏洞，并禁用过时的'decode'别名功能，同时添加邮件头部验证以防止恶意电子邮件通过该别名提交。"
score = 5
severity = "MEDIUM"
sources = ["tenable"]
title = "Sendmail Sendmail 任意文件覆盖漏洞"
updated = "2026-06-16T21:47:34.613"

