[basic]
description = "Visible Systems Razor 4.1 配置管理工具使用弱加密算法（仅对密码字节进行循环右移2位）存储密码文件，本地攻击者可利用该弱点解密密码文件，从而获取提升后的系统权限。此漏洞需本地访问权限，攻击复杂度较低。"
published = "2000-07-05"
remediation = "Razor 厂商官方声明（2007年）：在维护期内的用户可免费升级至使用更强加密算法的新版本；Razor 4.1 及以上版本可切换为本地操作系统认证替代 Razor 内置认证方式；通过文件系统权限（如 chmod 600）限制密码文件仅允许管理员读取；考虑迁移至其他仍在维护的配置管理工具。"
score = 4.6
severity = "MEDIUM"
sources = ["cve"]
title = "Visible Systems Razor 密码文件弱加密漏洞"
updated = "2026-06-16"

