[basic]
description = "McMurtrey/Whitaker & Associates 开发的 Cart32 购物车系统 2.6 及 3.0 版本中存在硬编码后门密码漏洞。远程攻击者无需身份认证即可利用该后门密码直接登录系统后台管理界面，进而执行任意命令，完全控制目标服务器。该漏洞影响 Cart32 3.0 及更早版本，攻击复杂度低，危害严重。厂商至今未发布官方补丁，建议用户升级或更换替代产品。"
published = "2000-04-27T04:00:00.000"
remediation = "立即升级 Cart32 至 3.0 版本以上（厂商已修复后门密码漏洞），或停用 Cart32 管理后台的远程访问功能。若暂时无法升级，请在 Web 服务器防火墙层面禁止对 Cart32 管理后台（通常为 /cart32/admin/ 路径）的外部访问，仅允许内网受信 IP 访问。同时修改默认管理员账号密码，启用强密码策略并启用 HTTPS 加密传输。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "McMurtrey Whitaker & Associates Cart32 后门密码漏洞"
updated = "2026-06-16T21:51:42.837"

