[basic]
description = "Bitrix Site Manager 6.5 的 redirect.php 中存在开放重定向漏洞，远程攻击者可通过向 goto 参数传入恶意 URL，诱骗用户访问钓鱼网站或恶意站点。该漏洞属于 CWE-601 类型，无需身份认证即可利用，攻击者可通过社会工程手段诱导用户点击特制链接实现跳转劫持。CVSS 评分 6.1，危害等级中危，影响使用 Bitrix Site Manager 6.5 的所有 Web 应用。"
published = "2008-05-02T17:05:00.000"
remediation = "升级至 Bitrix Site Manager 6.5.2 及以上版本，该漏洞已在后续版本中修复。如无法升级，修改 redirect.php 对 goto 参数做白名单校验，仅允许跳转到本站域名或预定义的合法外部 URL，拒绝除 http(s) 外的协议并过滤空协议链接；同时可在 web 服务器层（如 Apache mod_rewrite 或 Nginx）限制 redirect.php 仅接收本站 Referer 来源的请求作为临时缓解措施。"
score = 6.1
severity = "MEDIUM"
sources = ["nuclei"]
title = "Bitrix Site Manager 开放重定向漏洞"
updated = "2026-06-16T22:53:00.587"

