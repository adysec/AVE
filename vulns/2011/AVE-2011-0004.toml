[basic]
description = "vsftpd 2.3.3 之前版本的 ls.c 文件中的 vsf_filename_passes_filter 函数存在拒绝服务漏洞。经过身份认证的远程攻击者可在多个 FTP 会话中通过 STAT 命令发送精心构造的 glob 通配符表达式（如复杂的嵌套匹配模式）触发该漏洞，导致服务器 CPU 资源被大量消耗并耗尽进程槽位，最终造成服务拒绝。该漏洞属于资源不受控制的消耗（CWE-400）类型，攻击条件要求攻击者拥有有效的 FTP 登录凭证，CVSS 评分 4.0，危害等级中等。此漏洞与 CVE-2010-2632 为不同的缺陷。"
published = "2011-03-02T20:00:01.770"
remediation = "建议立即升级 vsftpd 到 2.3.3 或更高版本（如 3.0.3 等稳定版），以修复 vsf_filename_passes_filter 函数中的 glob 表达式拒绝服务漏洞。若暂时无法升级，可在 FTP 服务器配置中限制单用户最大并发会话数（如 max_per_ip=2、max_clients=50），并在防火墙层面限制单 IP 并发 FTP 连接数，缓解 CPU 耗尽与进程槽耗尽风险。建议同时监控 FTP 服务进程数与 CPU 占用，异常时自动重启服务或封禁异常 IP。"
score = 4
severity = "MEDIUM"
sources = ["nuclei"]
