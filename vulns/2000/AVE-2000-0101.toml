[basic]
description = 'Check Point Software Firewall-1 3.0 存在脚本标签过滤绕过漏洞。由于防火墙未能正确过滤 SCRIPT 标签，远程攻击者可通过在 SCRIPT 标签前额外添加一个 `<` 字符来绕过系统的"Strip Script Tags"（剥离脚本标签）安全限制，导致恶意脚本内容得以通过防火墙过滤。该漏洞影响 Check Point Firewall-1 3.0 版本，CVSS 评分 7.5，危害等级高危，攻击者无需身份认证即可实施攻击。'
published = "2000-01-29T05:00:00.000"
remediation = "升级 Check Point Firewall-1 至 4.0 及以上版本，该版本已修复 Script Tag 检查绕过漏洞。如无法升级，可在应用层规则中启用 HTTP 协议检测并添加脚本标签过滤规则，严格限制 script 标签的嵌套与转义形式。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "Check Point Firewall-1 脚本标签检查绕过漏洞"
updated = "2026-06-16T21:51:02.023"

