[basic]
description = "WU-FTPD 及相关 FTP 服务器（如 beroftpd）在处理 MAPPING_CHDIR 命令时存在缓冲区溢出漏洞。未经身份认证的远程攻击者可通过向目标 FTP 服务发送特制的 MAPPING_CHDIR 请求触发溢出，从而获取目标系统的 root 权限。该漏洞影响基于 WU-FTPD 代码衍生的大量 FTP 服务器实现，攻击者无需有效凭据即可利用，危害极为严重。攻击者需能够通过网络访问目标主机的 FTP 服务端口，并构造包含超长路径或数据的 MAPPING_CHDIR 请求即可完成利用。CVSS 评分 10.0，危害等级为严重，建议立即升级至修复版本或停用受影响服务。"
published = "1999-08-22T04:00:00.000"
remediation = '立即升级 WU-FTPD 或 beroFTPD 至官方已修复 MAPPING_CHDIR 缓冲区溢出漏洞的安全版本，或临时在 ftpaccess 配置文件中通过 "MAPPING_CHDIR off" 禁用该功能并限制匿名用户访问权限。如无法立即升级，建议在防火墙层阻断外部对 21 端口的直接访问，并逐步迁移至 vsftpd 或 proftpd 等仍在积极维护的 FTP 服务。'
score = 10
severity = "CRITICAL"
sources = ["avd"]
