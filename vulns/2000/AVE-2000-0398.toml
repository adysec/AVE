[basic]
description = "Allaire ColdFusion ClusterCATS 在生成 HTML 重定向响应时，会将过时的查询字符串参数附加到目标 URL 中。攻击者可通过诱导用户访问特制链接触发该重定向行为，导致 URL 中携带的会话令牌、认证凭据等敏感信息被泄漏给重定向目标站点。该漏洞攻击复杂度较高，需依赖用户交互触发。"
published = "2000-05-08"
remediation = "升级 Allaire ClusterCATS 至厂商安全公告 ASB00-12（补丁 ID 15697）对应修复版本，该补丁已修复 HTML 重定向时泄露敏感查询参数的问题。由于 Allaire 已被收购且该产品已停止维护，建议迁移至 Adobe ColdFusion 最新受支持版本，并在反向代理层过滤 URL 中的可疑查询字符串参数作为临时缓解措施。"
score = 2.6
severity = "LOW"
sources = ["cve"]
title = "Allaire ColdFusion ClusterCATS URL重定向信息泄露漏洞"
updated = "2026-06-16"

