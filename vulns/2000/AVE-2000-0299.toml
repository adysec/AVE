[basic]
description = "Microsoft Windows 95/98 系统中的 NetBIOS 协议实现存在拒绝服务漏洞。远程攻击者无需身份认证，通过向目标系统发送特制的包含空源名称（NULL Source Name）的 NetBIOS 会话请求数据包，可导致目标系统 NetBIOS 服务崩溃或停止响应，造成拒绝服务。该漏洞影响 Windows 95 和 Windows 98 操作系统，CVSS 评分 5.0，危害等级中危。由于系统无法正确处理畸形数据包，攻击者只需构造特定网络请求即可触发，利用难度较低。"
published = "2000-05-02T04:00:00.000"
remediation = "该漏洞影响已停止支持的 Windows 95/98 系统，微软未发布官方补丁。建议升级至仍受支持的 Windows 10/11 版本；若无法升级，应在防火墙层面阻断入站 NetBIOS 流量（UDP 137-139、TCP 137-139 及 445 端口），同时在 TCP/IP 高级设置中禁用 NetBIOS over TCP/IP 以缓解风险。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Microsoft Windows 95/98 NetBIOS 拒绝服务漏洞"
updated = "2026-06-16T21:51:31.690"

