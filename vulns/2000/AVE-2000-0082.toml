[basic]
description = "Microsoft Index Server 2.0 存在信息泄露漏洞。当远程攻击者向目标 Web 服务器发送一个不存在的 Internet Data Query 文件（.idq 或 .ida）请求时，服务器返回的错误消息中会泄露 Web 目录在服务器上的真实物理路径。该漏洞源于索引服务器在处理文件请求时未对错误消息中的路径信息进行过滤，攻击者无需任何认证即可利用此漏洞获取服务器文件系统结构信息，为后续攻击提供侦察支撑。该漏洞不影响 Windows 2000 的 Indexing Services，除非管理员明确启动了该服务。Microsoft 已在安全公告 MS00-006 中发布补丁修复此漏洞。"
published = "2000-01-26T05:00:00.000"
remediation = "安装 Microsoft 安全公告 MS00-006 对应补丁（KB251170/KB252463）。如无需索引服务，建议在服务管理器中禁用 Index Server 服务并删除 IIS 中 .idq/.htw 脚本映射；同时配置 IIS 自定义错误页返回通用提示而非详细路径信息，防止路径泄漏。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Microsoft Index Server 信息泄漏漏洞"
updated = "2026-06-16T21:50:59.800"

