[basic]
description = "AIX 3.2.x 及 4.x 版本的文件系统存在权限验证漏洞，本地攻击者可通过向本地或远程挂载的 AIX 文件系统发送特制请求，获取对文件的写入权限，进而实现权限提升或数据篡改。该漏洞影响 AIX 3.2.x 和 4.x 系列版本，CVSS 评分 5.0，危害等级中危。IBM 已在后续安全更新中修复此漏洞。"
published = "2000-05-24T04:00:00.000"
remediation = "建议升级到 AIX 7.2 TL5 SP2 或更高版本以彻底修复，该漏洞在后续版本中已被修复。如无法升级，可应用 IBM APAR IY08321 补丁。临时缓解措施包括：对 NFS 挂载的文件系统使用 `mount -o nosuid,ro` 选项，限制本地文件系统世界可写权限（`chmod o-w`），并通过 `smitty chfilesys` 调整文件系统挂载选项。同时，建议审计 `/etc/exports` 配置，确保只向可信主机开放 NFS 共享。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "IBM AIX 本地文件系统写入权限漏洞"
updated = "2026-06-16T21:51:44.430"

