[info]
author = "AVE"
description = "Microsoft Internet Explorer 8 CGenericElement 对象释放后重用（Use-After-Free）漏洞验证。通过 HTTP 服务托管恶意 HTML 页面，利用 offsetParent 属性修改 CTreeNode 渲染状态后通过 innerHTML 释放子元素，触发已释放内存对象访问。检测目标 User-Agent 是否为 IE8 及是否可访问托管页面。"
id = "POC-AVE-2013-0111"
name = "CVE-2013-1347 PoC"
severity = "high"
tags = ["ave-2013-0111"]
vuln_id = [
    "CVE-2013-1347",
    "AVE-2013-0111",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "MSIE 8",
    "Trident",
]
