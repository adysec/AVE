[basic]
description = "多个 OEM 品牌防火墙产品存在前台远程命令执行漏洞，攻击者无需身份认证即可通过防火墙的 Web 管理界面向前台接口发送特制请求，利用后端命令拼接缺陷在目标设备上执行任意系统命令。该漏洞影响采用相同底层架构的多个 OEM 厂商防火墙设备，攻击者可借此完全控制设备、篡改安全策略或作为内网跳板，危害等级高。"
published = "2023-08-08"
remediation = "建议立即联系设备厂商获取对应防火墙固件安全更新并升级到修复版本。若无法立即升级，可在防火墙上配置管理接口访问白名单，仅允许受信任 IP 访问前台管理页面，关闭不必要的远程管理端口（如 8080/8443），并部署 WAF 规则拦截命令注入类恶意载荷。"
score = 8.1
severity = "HIGH"
sources = ["hwpoc"]
title = "多个 OEM 厂商防火墙前台远程命令执行漏洞"
updated = "2023-08-08"

