[basic]
title = "Zeus Web Server 空字节截断致 CGI 源码泄露漏洞"
description = "Zeus Web Server 3.x 在处理 CGI 请求时存在空字节截断漏洞。由于服务器底层使用 C 语言字符串处理函数（如 strlen、strcpy），这些函数以空字节（\\x00）为字符串终止符。远程攻击者通过在 CGI 脚本 URL 末尾追加 %00 编码的空字节（如 /script.cgi%00），可绕过服务器对 CGI 脚本的执行逻辑，直接读取脚本的原始源代码。该漏洞仅影响启用了 allow CGIs anywhere 选项的配置，位于 cgi-bin 目录下的脚本不受影响。攻击者可利用此漏洞获取数据库凭据、业务逻辑等敏感信息。%00 还可替换为 %G0、%W0、%EW、%FG、%UW、%VG 等变体达到相同效果。"
severity = "MEDIUM"
score = 5.0
