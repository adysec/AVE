[basic]
description = "vqSoft vqServer for Windows 1.9.9 存在目录遍历漏洞。远程攻击者无需身份认证，通过在 URL 中构造特殊格式的 `/........../` 路径遍历序列，可绕过服务端路径限制，读取服务器上的任意文件，造成敏感信息泄露。该漏洞是经典 `../` 目录遍历攻击的变种。CVSS 评分 5.0，危害等级中危。"
published = "2000-03-21T05:00:00.000"
remediation = "升级 vqServer 至 2.0 及以上版本，新版本已修复路径遍历校验；如厂商已停止支持无法升级，建议在反向代理或 WAF 层拦截包含 `/..//` 和多重 `../` 序列的 URL 请求，并将 Web 服务以低权限账户运行，限制目录读取范围至站点根目录。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "vqSoft vqServer for Windows 目录遍历漏洞"
updated = "2026-06-16T21:51:17.947"

