[basic]
description = "Microsoft IIS 4.0 的 SMTP 服务 Pickup 目录存在拒绝服务漏洞。本地攻击者可在 Pickup 目录中创建文件名超长且扩展名为 .txt.eml 的邮件文件，导致 IIS 的 Inetinfo.exe 进程在处理该文件时异常崩溃，造成拒绝服务。该漏洞影响 Windows NT 4.0 上的 IIS 4.0 版本，攻击者需拥有本地访问权限，CVSS 评分 2.1，危害等级低。"
published = "2000-02-15T05:00:00.000"
remediation = '升级至 Windows 2000 及以上版本自带的 IIS 5.0 或更高版本，该漏洞已在后续版本中修复。如无法升级，限制本地用户对 `Inetpub\mailroot\Pickup` 目录的写入权限，仅允许受信任的管理员账户访问。同时监控该目录下异常 `.txt.eml` 文件的创建行为。'
score = 2.1
severity = "LOW"
sources = ["cve"]
title = "Microsoft IIS 4.0 Pickup 目录拒绝服务漏洞"
updated = "2026-06-16T21:51:08.410"

