[info]
author = "ave"
description = "验证了Linux内核ILA网络钩子序列化漏洞，检查race条件可能导致的use-after-free。通过并发访问ila_add_mapping可能触发KASAN检测。"
id = "POC-AVE-2024-0625"
name = "CVE-2024-57900 PoC"
severity = "high"
tags = ["ave-2024-0625"]
vuln_id = [
    "CVE-2024-57900",
    "AVE-2024-0625",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/proc"
protocol = "http"

[poc.requests.headers]
User-Agent = "AVE/1.0"

[[poc.requests.matchers]]
expect = true
part = "response"
status = [200]
type = "status"
