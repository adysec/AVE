[basic]
description = "Gnomelib 是 SuSE Linux 6.3/6.4 系统中 GNOME 桌面环境的库组件，其存在本地缓冲区溢出漏洞。本地攻击者可通过向 DISPLAY 环境变量传递超长字符串触发缓冲区溢出，从而以当前用户权限执行任意命令。该漏洞影响 SuSE Linux 6.3 及 6.4 版本，CVSS 评分 7.2，危害等级高。攻击者需拥有本地系统访问权限方可利用。"
published = "2000-04-29T04:00:00.000"
remediation = "该漏洞影响已停止维护的 SuSE Linux 6.3/6.4，官方未发布单独补丁。建议立即升级到受支持的 SUSE Linux Enterprise 或 openSUSE 发行版。如无法升级，作为临时缓解措施，可在 shell 启动脚本中过滤或清空 DISPLAY 环境变量，并严格限制系统本地用户的可信访问范围，禁止非授权用户登录控制台。"
score = 7.2
severity = "HIGH"
sources = ["exploitdb"]
title = "SuSE Linux Gnomelib 本地缓冲区溢出漏洞"
updated = "2026-06-16T21:51:30.770"

