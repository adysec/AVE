[basic]
description = "Microsoft TCP/IP Printing Services（Unix 打印服务）存在拒绝服务漏洞。远程攻击者可通过向运行该服务的 Windows NT 4.0/2000 系统发送特制的畸形 TCP/IP 打印请求，导致目标系统服务崩溃或停止响应。该漏洞无需身份认证即可触发，攻击门槛较低，但仅影响开启 Unix 打印服务的旧版 Windows 系统。"
published = "2000-03-30T05:00:00.000"
remediation = "立即安装 Microsoft 安全公告 MS00-021 提供的更新补丁（Windows NT 4.0 下载 KB257870，Windows 2000 下载对应补丁）。如业务不需要远程打印功能，可通过服务管理器停止并禁用 TCP/IP Printing Service (LPDSVC)，或通过防火墙阻止 TCP 515 端口入站流量作为临时缓解措施。"
score = 2.1
severity = "LOW"
sources = ["epss"]
title = "Microsoft Windows NT 4.0/2000 TCP/IP Printing Service 拒绝服务漏洞"
updated = "2026-06-16T21:51:16.883"

