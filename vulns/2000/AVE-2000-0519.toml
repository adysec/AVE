[basic]
description = "AIX cdmount 命令存在命令注入漏洞，本地攻击者可通过向 cdmount 命令传递精心构造的 Shell 元字符（如分号、反引号等），注入并以 root 权限执行任意 Shell 命令，从而实现本地权限提升至 root。该漏洞影响 IBM AIX 操作系统的 cdmount 命令，攻击条件为攻击者已拥有本地低权限账户访问权限且能调用 cdmount 命令，利用方式为在命令参数中注入 Shell 元字符执行任意代码，CVSS 评分 7.2（高危），影响机密性、完整性和可用性均为完全影响。IBM 已发布补丁修复该漏洞。"
published = "2000-06-20T04:00:00.000"
remediation = "升级 AIX 至 5.1 TL06 SP4 或更高版本，并安装 IBM 发布的 IY13244 补丁修复 cdmount 命令注入漏洞。若无法立即升级，请使用 chmod 4750 限制 cdmount 仅允许可信用户执行，并配置 /etc/security/user 中的 shell=/bin/false 限制受影响账户的 shell 访问权限作为临时缓解措施。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "IBM AIX cdmount 本地特权提升漏洞"
updated = "2026-06-16T21:51:47.697"

