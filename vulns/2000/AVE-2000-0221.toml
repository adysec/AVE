[basic]
description = "AnalogX SimpleServer:WWW 1.0.3 HTTP 服务器存在拒绝服务漏洞。远程攻击者可通过向 /cgi-bin 路径发送特制的短 GET 请求，触发服务器处理异常导致服务崩溃。该漏洞影响 AnalogX SimpleServer:WWW 1.0.3 版本，攻击无需身份认证，危害等级中等。受影响用户应升级至最新版本以修复此漏洞。"
published = "2000-03-25T05:00:00.000"
remediation = "升级到 AnalogX SimpleServer:WWW 1.1 或更高版本。该产品已停止维护，建议迁移至活跃维护的 Web 服务器（如 Apache/Nginx）。若无法升级，在防火墙或反向代理层过滤对 /cgi-bin 的异常短请求，并仅允许可信 IP 访问服务器 80 端口。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "AnalogX SimpleServer:WWW 拒绝服务漏洞"
updated = "2026-06-16T21:51:18.377"

