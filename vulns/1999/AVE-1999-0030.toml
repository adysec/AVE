[basic]
description = "ISC BIND（Berkeley Internet Name Domain）4.9 及 8.x 版本存在反向查询缓冲区溢出漏洞。远程攻击者无需认证即可向目标 DNS 服务器发送特制的反向查询请求，触发缓冲区溢出，导致拒绝服务或任意代码执行。该漏洞影响运行 BIND 4.9 及 8.x 的多种操作系统平台，CVSS 评分 10.0，危害等级严重。厂商建议立即升级至不受影响的版本。"
published = "1998-04-08T04:00:00.000"
remediation = "立即升级 BIND 至 8.2 或更高版本，或在条件允许时迁移至 BIND 9 系列（如 9.3.0+），因为 8.2 已修复逆查询缓冲区溢出漏洞。如无法立即升级，可在 named.conf 中禁用 `inverse-query` 选项以临时缓解风险。"
score = 10
severity = "CRITICAL"
sources = ["exploitdb"]
title = "ISC BIND 反向查询远程缓冲区溢出漏洞"
updated = "2026-06-16T21:47:20.137"

