[basic]
description = 'ICQ 99a 的 Web 服务器组件（build 1701）在启用 "Active Homepage" 功能时存在信息泄露漏洞。远程攻击者可通过向目标服务器发送特制的文件访问请求，根据服务器返回的差异响应（文件存在时返回 "404 Forbidden"，文件不存在时返回 "404 not found"）来枚举服务器上的文件是否存在。该漏洞影响 ICQ 99a 版本，CVSS 评分 5.0，危害等级中等，攻击者无需认证即可利用此漏洞探测服务器敏感文件路径，为进一步攻击收集信息。'
published = "1999-05-01T04:00:00.000"
remediation = '升级 ICQ 至 2000 及以上版本，该漏洞已在后续版本修复。如无法升级，在 ICQ 设置中关闭"Active Homepage"（活动主页）功能以消除信息泄露风险。鉴于 ICQ 服务已于 2024 年 6 月 26 日正式停止运营，建议彻底停用 ICQ 并迁移至其他即时通讯软件。'
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "ICQ ICQ 99a Web 服务器信息泄露漏洞"
updated = "2026-06-16T21:50:23.923"

