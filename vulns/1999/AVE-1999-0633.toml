[basic]
description = "Symantec Mail-Gear 1.0 Web 管理界面存在目录遍历漏洞。远程攻击者无需身份认证即可通过向目标发送包含 `../` 序列的特制 HTTP 请求，突破路径限制读取服务器上的任意文件，如配置文件、密码文件等敏感信息。该漏洞源于 Web 服务器未对用户请求的文件路径进行充分过滤，导致攻击者可利用路径回溯符遍历目录结构。CVSS 评分 5.0，危害等级中危。"
published = "1999-11-29T05:00:00.000"
remediation = "建议立即升级至 Symantec Mail-Gear 后续修复版本或迁移至现代邮件安全网关产品。若无法立即升级，请立即禁用 Mail-Gear Web 管理界面或在防火墙/反向代理层面限制仅允许受信 IP 访问 Web 管理端口，并在 Web 服务器层面配置目录遍历防护规则（如禁止 ../ 路径遍历）。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Symantec Mail-Gear 1.0 目录遍历漏洞"
updated = "2026-06-16T21:49:10.313"

