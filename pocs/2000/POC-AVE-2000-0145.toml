[info]
author = "ave"
description = "检测FreeBSD系统上asmon和ascpu程序是否存在且为setgid kmem，验证本地权限提升漏洞（CVE-2000-0163）。攻击者通过-e选项传入恶意参数，可导致以kmem组权限执行任意命令。"
id = "POC-AVE-2000-0145"
name = "FreeBSD asmon/ascpu Local Privilege Escalation PoC"
severity = "medium"
tags = ["ave-2000-0145"]
vuln_id = [
    "CVE-2000-0163",
    "AVE-2000-0145",
]

[poc]
logic = "any"

[[poc.requests]]
path = "/usr/X11R6/bin/asmon"
protocol = "file"

[[poc.requests.matchers]]
expect = true
part = "body"
regex = ".+"
type = "regex"

[[poc.requests]]
path = "/usr/X11R6/bin/ascpu"
protocol = "file"

[[poc.requests.matchers]]
expect = true
part = "body"
regex = ".+"
type = "regex"
