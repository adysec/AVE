[basic]
description = "Grafana 存在跨站脚本漏洞，由于客户端路径遍历与开放重定向组合不当导致。攻击者无需编辑器权限，可通过特制 URL 将用户重定向至托管恶意前端插件的网站，从而在受害者浏览器中执行任意 JavaScript 代码。若已安装 Grafana Image Renderer 插件，还可利用开放重定向实现完全读取型服务端请求伪造。默认 Content-Security-Policy 的 connect-src 指令可阻止该 XSS 攻击。该漏洞影响多个 Grafana 版本，CVSS 评分 7.6，危害等级高。"
published = "2025-05-22T08:15:52.720"
remediation = "立即升级 Grafana 至 v10.4.18+security-01、v11.2.9+security-01、v11.3.6+security-01、v11.4.4+security-01、v11.5.4+security-01、v11.6.1+security-01 或 v12.0.0+security-01 及以上版本。如无法立即升级，可禁用匿名访问并在反向代理层限制对 /public/ 路径的路径遍历请求，同时确保 Content-Security-Policy 中 connect-src 指令生效以阻止 XSS 利用。若未使用 Grafana Image Renderer 插件，建议卸载以降低 SSRF 风险。"
score = 7.6
severity = "HIGH"
sources = ["hwpoc"]
title = "Grafana 跨站脚本漏洞"
updated = "2026-06-17T09:32:33.100"

