[basic]
description = "Compaq Insight Manager agent 中的 Compaq Integration Maintenance Utility 组件存在安全策略绕过漏洞。该工具可修改 Windows NT 系统的登录法律声明标题（LegalNoticeCaption）和文本（LegalNoticeText），攻击者利用此功能可篡改或移除系统登录前的法律提示信息，导致组织的安全策略无法正常执行。该漏洞影响 SmartStart 4.50 之前版本的 Compaq Insight Manager agent，攻击者需具备本地系统访问权限，CVSS 评分 4.6，危害等级中危。"
published = "1999-09-02T04:00:00.000"
remediation = '升级 Compaq Insight Manager agent 至 SmartStart 4.50 及以上版本，该版本修复了 Integration Maintenance Utility 可被用于修改 Windows NT 登录法律声明的问题。如无法升级，可通过组策略编辑器（gpedit.msc）锁定登录公告文字和标题的注册表项（HKEY_LOCAL_MACHINE\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Winlogon 下的 LegalNoticeCaption 和 LegalNoticeText），限制其写入权限为 SYSTEM 账户。'
score = 4.6
severity = "MEDIUM"
sources = ["avd"]
title = "Compaq Insight Manager agent Integration Maintenance Utility 安全策略绕过漏洞"
updated = "2026-06-16T21:50:15.973"

