[basic]
description = "Novell BorderManager 3.6及更早版本存在拒绝服务漏洞，远程攻击者无需身份认证即可通过向目标系统的353端口发送大量TCP SYN数据包（SYN Flood攻击），耗尽服务器连接资源，导致服务无法响应正常请求。该漏洞影响Novell BorderManager Enterprise Edition 3.5及3.6版本，CVSS评分5.0，危害等级中等。厂商已发布安全更新修复此漏洞。"
published = "2001-07-02T04:00:00.000"
remediation = "建议立即升级 Novell BorderManager 至 3.6 以上版本（Novell 已发布 TID#2959062 补丁）。由于该产品已停止技术支持，更推荐在防火墙上配置规则，阻止外部对 TCP 353 端口的访问，仅允许可信 IP 连接。如条件允许，建议迁移至受支持的替代产品以彻底消除风险。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Novell BorderManager TCP SYN Flood 拒绝服务漏洞"
updated = "2026-06-16T21:54:23.870"

