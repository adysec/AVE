[basic]
description = "KDE 桌面环境中的 kppp 拨号网络工具存在缓冲区溢出漏洞。本地攻击者可通过向 -c（账户名）命令行参数传递超长字符串，触发栈缓冲区溢出，从而获取 root 权限。该漏洞源于程序未对用户输入的命令行参数长度进行充分校验，导致攻击者能够覆盖返回地址并执行任意代码。攻击者需要拥有本地系统访问权限，无需额外认证即可利用。"
published = "1998-04-29"
remediation = "升级到 KDE 1.1 或更高版本。该漏洞已在 KDE 1.1 版本中修复，建议用户升级至包含补丁的最新版本。对于已停止维护的旧系统，建议迁移至受支持的 KDE 版本。"
score = 7.2
severity = "HIGH"
sources = ["cve"]
title = "KDE kppp 本地缓冲区溢出漏洞"
updated = "2024-11-20"

