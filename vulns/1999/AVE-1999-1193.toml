[basic]
description = "SCO OpenServer 5.0.0 至 5.0.5 版本中的 sar 命令存在缓冲区溢出漏洞，本地攻击者可通过向 -f 参数传递超长字符串触发该漏洞，成功利用后可获取目标系统的 root 权限。该漏洞危害等级高（CVSS 7.2），需本地账户登录后方可利用，影响范围涵盖 SCO OpenServer 5.x 系列版本。"
published = "1999-11-04T05:00:00.000"
remediation = "升级至 SCO OpenServer 5.0.6 或更高版本，该版本已修复 sar 缓冲区溢出问题。如无法升级，立即移除 sar 二进制文件的 setuid root 权限：chmod u-s /usr/bin/sar，限制可登录用户仅限受信任管理员，并审计 /var/adm/sulog 中可疑的 su 提权行为。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "SCO OpenServer sar 本地缓冲区溢出漏洞"
updated = "2026-06-16T21:50:44.623"

