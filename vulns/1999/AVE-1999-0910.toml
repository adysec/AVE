[basic]
description = "该漏洞编号已被 NVD 驳回，原描述为目标系统上运行了 NIS（Network Information System）组件服务。NIS 协议在设计上缺乏加密和认证机制，通过网络在局域网内传输用户账户数据（包括密码哈希）时，处于同一网段的攻击者可进行网络嗅探，捕获 NIS 映射数据后实施离线破解，进而获取系统访问权限。该问题属于安全配置核查范畴，并非传统代码层面的安全漏洞，广泛影响启用 NIS 服务的 Unix/Linux 系统。"
published = "1999-01-01T05:00:00.000"
remediation = "如业务无需 NIS 服务，应停止 ypserv/ypbind 服务并设置开机不自启：systemctl disable --now ypserv ypbind。如确需使用 NIS，应在 /var/yp/securenets 中限定仅允许受信任子网访问，并避免与互联网直连。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "NIS 相关服务运行配置问题"
updated = "2023-11-07T01:54:59.480"

