[basic]
description = "Mac OS 9 系统在处理畸形 ICMP 数据包时存在放大攻击漏洞。远程攻击者向目标 Mac 系统发送少量伪造数据包，系统会生成大量 ICMP 响应报文，导致流量被放大，可被利用于 DDoS 分布式拒绝服务攻击中放大攻击流量。该漏洞影响 Mac OS 9 系列版本，CVSS 评分 5.0，危害等级中危。"
published = "1999-12-28T05:00:00.000"
remediation = "立即升级到受支持的 macOS 版本（如 macOS 10.15 及以上），MacOS 9 已停止支持且无安全补丁。如无法升级，可在网络边界防火墙或路由器上限制入站 ICMP 数据包速率，并过滤源地址为非本网的 ICMP 请求，防止系统被用作 DDoS 放大反射点。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Apple MacOS 9 ICMP 放大攻击漏洞"
updated = "2026-06-16T21:50:52.757"

