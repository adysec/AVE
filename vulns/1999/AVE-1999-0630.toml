[basic]
description = "远程攻击者通过发送包含大量邮件头部的消息，可导致 Sendmail 8.8.x 和 8.9.2 版本发生拒绝服务。该漏洞利用简单，无需认证即可远程触发，大量邮件头部会耗尽服务器处理资源，影响邮件服务的正常可用性。"
published = "1999-01-01"
remediation = "升级至 Sendmail 8.9.3 或更高版本；若无法升级，对 8.9.2 版本应用官方补丁，在 site.config.m4 中添加 `APPENDDEF(confENVDEF, -D_FFR_MAX_HEADER_LINES=1)` 后重新编译，并在 sendmail.cf 中设置 `O MaxHeaderLines=1000/990` 限制邮件头部行数和单行长度，防止大量头部导致的拒绝服务。"
score = 5.0
severity = "MEDIUM"
sources = ["cve"]
title = "Eric Allman Sendmail 8.8/8.9.2 拒绝服务漏洞"
updated = "2026-06-16"

