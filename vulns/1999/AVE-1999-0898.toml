[basic]
description = "ARCserve NT 代理程序在密码传输时使用脆弱的 XOR 加密算法，导致认证过程中的密码极易被破解。远程攻击者可通过嗅探端口 6050 上的认证请求数据包，捕获经过简单 XOR 运算加密的密码密文，并通过逆向运算还原出明文密码。该漏洞影响所有使用 ARCserve NT 备份代理的系统，攻击者无需身份认证即可在网络层面被动监听流量获取管理员凭据，进而完全控制备份服务器及受管节点。由于 XOR 加密缺乏密钥管理且算法可逆，属于设计层面的根本性缺陷，CVSS 评分 10.0，危害等级极其严重。"
published = "1999-02-21T05:00:00.000"
remediation = "升级到 Computer Associates ARCserve Backup 6.61 或更高版本，该版本已修复代理密码传输使用弱 XOR 加密的问题。若无法立即升级，可在防火墙或边界设备上封禁 TCP 6050 端口，禁止来自不可信网络的连接，避免攻击者嗅探认证请求解密密码；同时限制仅允许受信任管理主机访问 ARCserve 代理服务。"
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "CA ARCserve NT 密码弱加密漏洞"
updated = "2026-06-16T21:49:35.950"

