[basic]
description = "北京网康 NS-ASG 安全网关 6.3 版本存在信息泄露漏洞，源于 /admin/test_status.php 接口未实施有效的访问控制（CWE-425 直接请求），攻击者无需任何认证即可通过直接构造并发送 HTTP 请求访问该接口，导致设备敏感配置信息被泄露。该漏洞利用方法已公开披露，技术门槛较低，CVSS 评分 4.3，危害等级中危。厂商已联系但未回应修复方案，建议部署访问控制策略进行缓解。"
published = "2023-07-20T19:15:10.923"
remediation = "由于厂商未提供官方补丁，建议通过 Web 服务器或 WAF 配置访问控制规则，禁止未授权访问 `/admin/test_status.php` 路径；同时修改该文件添加会话认证校验，仅允许已登录管理员访问；如无法修改代码，可在 Nginx/Apache 层面通过 Location 或 Rewrite 规则限制内网 IP 或特定 User-Agent 访问该路径作为临时缓解措施。"
score = 4.3
severity = "MEDIUM"
sources = ["hwpoc"]
title = "网康 NS-ASG 安全网关信息泄露漏洞"
