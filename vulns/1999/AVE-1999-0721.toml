[basic]
description = "BMC Patrol Agent 3.2.5 存在安全漏洞，远程攻击者可通过向 UDP 端口发送大量洪水数据包，导致 Patrol 服务耗尽系统资源而崩溃，造成拒绝服务。该漏洞无需认证即可远程利用，攻击复杂度低。"
published = "1999-04-01"
remediation = "BMC 官方已停止支持 Patrol Agent 3.2.5 版本，建议升级到不受影响的最新版本；如无法升级，应在防火墙层面限制对 UDP 端口的非必要访问，仅允许可信来源 IP 连接。"
score = 5.0
