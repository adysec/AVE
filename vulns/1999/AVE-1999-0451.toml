[basic]
description = "Info2www 是一个用于将 GNU Info 文档转换为 HTML 格式的 CGI 脚本程序。该脚本对用户输入的参数缺乏充分的过滤与验证，远程攻击者可通过向 info2www CGI 脚本发送特制请求，利用输入处理缺陷实现任意文件读取或远程命令执行。该漏洞影响 Info2www 1.0 及 1.1 版本，CVSS 评分 7.5，危害等级高危。"
published = "1998-03-01T05:00:00.000"
remediation = "立即从 Web 服务器移除 info2www CGI 脚本目录（通常位于 /cgi-bin/info2www），或删除 info2www 文件。如仍需此类功能，改用维护中的替代方案（如 Pinfo）。通过 Web 服务器配置限制 CGI 目录执行权限，确保仅授权用户可执行，并在 WAF 层过滤包含特殊字符（如 |、;、`、$()）的 CGI 请求参数。"
score = 7.5
severity = "HIGH"
sources = ["exploitdb"]
title = "Info2www CGI 输入处理远程命令执行漏洞"
updated = "2026-06-16T21:48:02.100"

