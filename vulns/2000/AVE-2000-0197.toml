[basic]
description = "wmcdplay 是 WindowMaker 桌面环境下的 CD 播放器程序，其 1.0 beta1-2 版本中存在缓冲区溢出漏洞。本地攻击者可向该程序提交超长参数触发栈缓冲区溢出，从而覆盖进程内存空间，最终获取 root 权限。攻击需要目标系统已安装受影响版本并具备本地 Shell 访问权限，利用条件较为简单。"
published = "2000-03-10T05:00:00.000"
remediation = "立即卸载 wmcdplay 软件包（如 yum remove wmcdplay 或 apt-get remove wmcdplay），或使用 chmod u-s /usr/bin/wmcdplay 移除二进制文件的 setuid 位，阻止普通用户以 root 权限执行该程序。若需保留 CD 播放功能，可改用其他维护中的替代软件（如 VLC 或 xmms）并限制仅授权用户可执行。"
score = 7.2
severity = "HIGH"
sources = ["epss"]
title = "WindowMaker wmcdplay 1.0 beta1-2 本地缓冲区溢出漏洞"
updated = "2026-06-16T21:51:15.650"

