[basic]
description = "Microsoft Personal Web Server（PWS）存在目录遍历漏洞，远程攻击者可通过向目标服务器发送包含多个点号（....）的特殊URL请求，利用路径遍历技术绕过访问限制，读取Web服务器文件系统上的任意文件。该漏洞直接影响运行PWS的Windows系统，攻击者无需身份认证即可利用，可能导致敏感信息泄露。微软已在MS99-010安全公告中提供修复补丁。"
published = "1999-03-26T05:00:00.000"
remediation = "建议立即卸载 Microsoft Personal Web Server (PWS)，迁移至受支持的 IIS 或 Web 服务器。临时缓解措施：在受影响系统上禁用 Web 发布服务，并在防火墙/网络边界阻止入站 TCP 端口 80 访问。该漏洞已无官方安全补丁可用，彻底移除 PWS 是唯一安全的方案。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Microsoft FrontPage Personal Web Server 远程目录遍历漏洞"
updated = "2026-06-16T21:51:06.647"

