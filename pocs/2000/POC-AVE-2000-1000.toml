[info]
author = "ave"
description = "CVE-2000-0376 i-drive Filo HTTP代理服务器缓冲区溢出漏洞检测，通过发送超长GET请求触发缓冲区溢出，远程攻击者可执行任意命令"
id = "POC-AVE-2000-1000"
name = "CVE-2000-0376 PoC"
severity = "critical"
tags = [
    "cve-2000-0376",
    "ave-2000-1000",
]
vuln_id = [
    "CVE-2000-0376",
    "AVE-2000-1000",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/{{randstr}}"
protocol = "http"

[[poc.requests.matchers]]
expect = true
status = [200]
type = "status"
