[basic]
description = "Solaris 操作系统中 cancel 命令存在缓冲区溢出漏洞，该漏洞存在于 Solaris 7.0 及 Solaris 2.6 (i386) 版本中。本地攻击者可通过向 cancel 命令发送特制的输入数据触发缓冲区溢出，成功利用该漏洞可获得 root 权限。由于攻击者需要本地系统访问权限，该漏洞的利用门槛较低，危害等级为高危（CVSS 7.2）。受影响的系统包括 Solaris 7.0 及更早版本。"
published = "1999-03-05T05:00:00.000"
remediation = "安装 Sun 官方补丁 105401-01 (x86) 或 105400-01 (SPARC)，或升级至 Solaris 8 及以上版本。临时缓解措施：移除 cancel 命令的 setuid root 权限 (chmod 755 /usr/bin/cancel)，或限制受信用户访问该命令。"
score = 7.2
severity = "HIGH"
sources = ["exploitdb"]
title = "Sun Solaris cancel 命令本地缓冲区溢出权限提升漏洞"
updated = "2026-06-16T21:48:20.253"

