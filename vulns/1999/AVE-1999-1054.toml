[basic]
description = "Delegate proxy 5.9.3 及更早版本在 DGROOT 目录中创建文件和目录时设置了全局可写权限，导致本地攻击者可以修改或删除这些文件，可能造成权限提升或拒绝服务。攻击者需要具有本地系统访问权限。"
published = "1999-07-21"
remediation = "升级至 Delegate 5.9.4 或更高版本，该版本已修复文件/目录权限问题。如无法升级，在启动脚本中设置 umask 022 限制新建文件权限，并将 DGROOT 指向非 /tmp 的安全目录（如 /var/delegate），然后以 root 身份执行 chmod -R g-w,o-w $DGROOT 修正已有目录的权限。"
score = 5.0
severity = "MEDIUM"
sources = ["cve"]
title = "Delegate proxy 权限许可漏洞"
updated = "2026-07-20"

