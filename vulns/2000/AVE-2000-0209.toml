[basic]
description = "Hotmail 邮箱服务未能正确过滤用户邮件中的 JavaScript 代码，远程攻击者可通过在邮件正文中使用十六进制编码（如 `j&#x41;vascript`）绕过安全过滤机制，在收件人打开邮件时自动执行恶意脚本。该漏洞属于跨站脚本攻击（XSS）类型，攻击者可借此窃取用户会话 Cookie、伪造身份或执行任意操作，影响当时所有 Hotmail Web 邮箱用户。微软已于 2000 年初发布修复方案，建议用户禁用邮件中的脚本执行功能或升级至修补版本。"
published = "2000-01-10T05:00:00.000"
remediation = "建议立即升级 Hotmail 邮件系统至经过安全更新的版本，在服务端对用户邮件内容进行严格的 HTML/JavaScript 过滤，特别对十六进制编码的 javascript: 协议进行转义处理，同时启用 Content Security Policy 头防止脚本执行。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "Microsoft Hotmail JavaScript 过滤绕过远程代码执行漏洞"
updated = "2026-06-16T21:50:57.650"

