[basic]
description = "Joomla! 的 Pro Desk Support Center (com_pro_desk) 组件 1.0 及 1.2 版本存在目录遍历漏洞。远程攻击者可通过向 index.php 的 include_file 参数传递包含 `..` 序列的恶意路径，绕过访问限制读取服务器上的任意文件，导致敏感信息泄露。该漏洞无需身份认证即可远程利用，攻击门槛低。建议升级至官方修复版本或移除受影响组件。"
published = "2009-02-20T21:30:01.517"
remediation = "立即卸载 Pro Desk Support Center (com_pro_desk) 组件 1.0/1.2 版本，该组件已停止维护，无安全更新可用。若业务依赖，请升级至已修复目录遍历漏洞的 ProDesk 1.5 及以上版本，并在服务端配置禁用 `include_file` 参数的路径回溯（`../`）输入。同时启用 Web 应用防火墙（WAF）规则，拦截路径遍历关键词如 `..%2f` 和 `../../`。"
score = 5
severity = "MEDIUM"
sources = ["nuclei"]
title = "Joomla! Pro Desk Support Center 本地文件包含漏洞"
updated = "2026-06-16T23:01:50.537"

