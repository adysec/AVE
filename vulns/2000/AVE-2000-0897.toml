[basic]
description = "HP OpenView Network Node Manager (NNM) 6.1 版本存在密码加密缺陷，该漏洞源于对敏感凭据的加密处理不当，导致本地攻击者可通过访问系统文件或日志获取加密后的密码信息，进而可能破解或绕过认证机制。攻击者需具备本地系统访问权限，利用难度较低，可对系统完整性造成部分影响。"
published = "2000-10-20T04:00:00.000"
remediation = "建议立即升级至 HP OpenView NNM 7.01 或更高版本，该版本已修复密码明文存储问题。如无法升级，应限制对 NNM 配置文件（如 $OV_CONF/ov.conf 及相关密码文件）的本地访问权限，仅允许管理员账户读取，并启用操作系统级文件审计日志监控异常访问。同时避免在多用户共享系统上部署 NNM 6.1。"
score = 2.1
severity = "LOW"
sources = ["cve"]
title = "HP OpenView Network Node Manager 密码加密漏洞"
updated = "2026-06-16T21:52:24.693"

