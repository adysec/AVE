[basic]
description = "迪博行政管理系统 export_handle.jsp 接口存在任意文件读取漏洞，由于未对用户传入的文件路径参数进行有效过滤和校验，攻击者可通过构造特制的请求读取服务器上的任意文件，如配置文件、数据库连接信息等敏感数据。该漏洞影响迪博行政管理系统的多个版本，攻击者无需身份认证即可远程利用，危害较大。建议厂商及时修复该接口的访问权限控制与路径过滤逻辑。"
published = "0722"
remediation = '建议立即更新迪博行政管理系统到最新安全补丁版本，并修复 export_handle.jsp 文件参数验证漏洞；修改配置文件禁用不安全的目录遍历功能；在WEB应用防火墙中添加规则过滤包含 "../" 或类似路径遍历字符的请求作为临时缓解措施。相关补丁信息请访问厂商官方网站获取最新版软件包并按照安装指南完成部署。'
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "迪博行政管理系统任意文件读取漏洞"
updated = "0722"

