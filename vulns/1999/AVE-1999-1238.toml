[basic]
description = "SGI IRIX 6.x 及更早版本中的 Korn Shell (ksh) suid_exec 程序存在缓冲区溢出漏洞。该程序以 SUID 权限运行，本地攻击者可通过向 suid_exec 传递特制参数触发缓冲区溢出，从而获得 root 权限。该漏洞影响 IRIX 6.x 及更早版本，CVSS 评分 7.2，危害等级高。攻击者需拥有本地系统访问权限，无需身份认证即可利用。"
published = "1998-04-08T04:00:00.000"
remediation = "立即安装 SGI 安全公告 19980405-01-I 中提供的补丁，或升级到 IRIX 6.5 及以上版本。临时缓解措施可移除 suid_exec 程序的 setuid 位（chmod u-s /usr/bin/suid_exec），限制本地用户执行该程序。由于 SGI IRIX 已停止维护，建议迁移至受支持的操作系统。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "SGI IRIX suid_exec 本地权限提升漏洞"
updated = "2026-06-16T21:49:45.003"

