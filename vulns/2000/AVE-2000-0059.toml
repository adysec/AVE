[basic]
description = "Visual Casel（Vcasel）存在文件名信任漏洞，由于程序未能正确验证用户执行文件时的路径，本地攻击者可通过使用相对路径名指定一个具有合法名称的替代文件，从而绕过安全限制执行未授权操作，可能导致权限提升。该漏洞影响 Vcasel 相关版本，攻击者需具有本地系统访问权限，CVSS 评分 4.6，危害等级中危。"
published = "2000-01-17T05:00:00.000"
remediation = 'VCasel 3.0 厂商已停止维护，无官方补丁。建议立即停用 VCasel，迁移至 Windows 组策略或 Intune MDM 等现代方案替代。若无法立即停用，管理员须在 VCasel 策略中为所有允许执行的程序配置完整绝对路径（如 C:\Windows\System32\write.exe 而非 write.exe），同时限制用户对本地及网络驱动器目录的写入权限，并部署文件完整性监控（如 Windows Defender 应用程序控制）检测异常重命名可执行文件。'
score = 4.6
severity = "MEDIUM"
sources = ["avd"]
title = "Visual Casel Vcasel 本地文件信任漏洞"
updated = "2026-06-16T21:50:56.550"

