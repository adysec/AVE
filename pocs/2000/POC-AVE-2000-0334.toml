[info]
author = "ave"
description = "验证 Solaris 系统中 netpr 程序是否存在本地缓冲区溢出漏洞，通过检查 netpr 二进制文件的存在及 SUID 权限状态判断漏洞是否可被利用。"
id = "POC-AVE-2000-0334"
name = "Sun Solaris netpr 本地缓冲区溢出漏洞 PoC"
severity = "high"
tags = ["ave-2000-0334"]
vuln_id = [
    "CVE-2000-0407",
    "AVE-2000-0334",
]

[poc]
logic = "all"

[[poc.requests]]
path = "/usr/bin/netpr"
protocol = "file"

[[poc.requests.matchers]]
expect = true
part = "body"
regex = ".+"
type = "regex"
