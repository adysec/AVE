[basic]
description = "OpenBSD 内核中存在一个信息泄露漏洞，由于内核在处理 IPsec（互联网协议安全）数据包时存在缺陷，导致某些情况下 IPsec 数据包可能以未加密的明文形式发送。攻击者可以利用此漏洞通过网络远程窃听敏感通信内容，获取本应受 IPsec 保护的机密信息。该漏洞影响 OpenBSD 系统的机密性，攻击条件为能够拦截网络流量。"
published = "1999-08-06"
remediation = "升级 OpenBSD 系统到包含该漏洞修复的版本，或应用厂商发布的相关安全补丁。同时建议检查 IPsec 配置确保加密策略正确生效，并监控网络流量中是否存在未加密的 IPsec 数据包。"
score = 5.0
severity = "MEDIUM"
sources = ["cve"]
title = "OpenBSD 内核信息泄露导致 IPsec 数据包未加密发送漏洞"
updated = "2024-11-20"

