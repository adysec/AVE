[basic]
description = "BEA WebLogic 3.1.8 至 4.5.1 版本默认配置存在大小写处理不当漏洞（CWE-178）。攻击者只需将 JSP 文件扩展名改为大写（如将 .jsp 改为 .JSP）发送请求，Web 服务器便不会编译执行该文件，而是直接以文本形式返回其源代码，导致 JSP 应用中包含的数据库连接信息、业务逻辑、认证凭证等敏感信息泄露。该攻击无需身份认证，远程即可实施，利用难度低。"
published = "2000-06-08T04:00:00.000"
remediation = "立即升级至 BEA WebLogic 5.1.0 或更高版本，该版本修复了 JSP 扩展名大小写处理漏洞。如无法升级，可在 Web 服务器层配置 URL 重写规则，将所有 .JSP、.Jsp 等变体统一重定向为小写 .jsp，防止绕过访问控制直接读取源码。同时限制对 Web 应用目录的目录列表权限，避免攻击者枚举文件。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "BEA WebLogic JSP 源代码泄露漏洞"
updated = "2026-06-16T21:51:51.860"

