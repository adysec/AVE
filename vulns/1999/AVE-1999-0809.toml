[basic]
description = "Red Hat Linux 系统中自带的 pump DHCP 客户端程序存在安全漏洞，该程序在默认或某些特定配置下会以 root 权限运行并处理来自 DHCP 服务器的网络响应。攻击者可构造恶意的 DHCP 服务器或伪造 DHCP 响应包，利用 pump 在处理响应数据时的缺陷（如缓冲区操作或命令执行问题）在客户端系统上执行任意代码，从而获得目标主机的 root 用户访问权限。该漏洞影响使用 pump 作为 DHCP 客户端且以特权身份运行的 Red Hat Linux 系统，远程攻击者无需本地账户即可在局域网内或经由恶意 DHCP 服务发起攻击，危害等级极高（CVSS 评分 10.0），可导致系统被完全控制。"
published = "1999-08-11T04:00:00.000"
remediation = "立即升级 pump 软件包至 0.7.3 及以上版本（Red Hat 安全公告 RHSA-1999-027），或从 Red Hat Network 获取更新。如无法升级，建议禁用 DHCP 自动获取功能，改用静态 IP 配置，或替换 pump 为 ISC dhclient 作为替代 DHCP 客户端。"
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "Red Hat pump DHCP 客户端远程代码执行漏洞"
updated = "2026-06-16T21:49:06.780"

