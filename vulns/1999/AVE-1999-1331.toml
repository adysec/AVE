[basic]
description = "BSD Telnet 客户端在实现加密与 Kerberos 4 身份认证功能时存在设计缺陷，远程攻击者可通过网络嗅探方式捕获客户端与服务器之间的通信流量，进而解密会话内容，导致敏感信息泄露。该漏洞影响使用加密和 Kerberos 4 认证的 BSD Telnet 客户端，攻击者只需处于同一网络路径即可实施嗅探攻击，无需身份认证。CVSS 评分 5.0，危害等级中危。"
published = "1995-03-03T05:00:00.000"
remediation = "停止使用 Telnet 协议，改用 SSH (OpenSSH) 进行远程登录管理。如必须使用 Telnet，升级到已修复此漏洞的 BSD Telnet 版本，并禁用 Kerberos 4 认证（改用 Kerberos 5 或 GSSAPI）。在网络层面，通过防火墙限制 Telnet (23/TCP) 的访问来源，仅允许受信任的管理网段连接。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "BSD Telnet 客户端加密会话信息泄露漏洞"
updated = "2026-06-16T21:49:43.067"

