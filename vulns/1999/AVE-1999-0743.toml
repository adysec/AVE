[basic]
description = "Canna 日文输入系统的 canuum 程序存在本地缓冲区溢出漏洞。攻击者可通过 -k、-c 和 -n 选项传入超长参数触发溢出，由于 canuum 以 SUID root 权限安装，本地低权限用户可利用此漏洞获得 root 权限，完全控制系统。"
published = "1999-11-02"
remediation = "临时缓解措施：移除 canuum 的 SUID 权限，执行 chmod u-s /usr/jp/canna/bin/canuum。长期修复：升级 Canna 输入系统至修复该缓冲区溢出的版本，或重新编译安装最新稳定版。"
score = 7.2
severity = "HIGH"
sources = [
    "cve",
    "avd",
    "exploitdb",
]
title = "Canna canuum 程序本地缓冲区溢出漏洞"
