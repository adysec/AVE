[basic]
description = "Cyrus SASL 库 common.c 文件中的默认日志回调函数 _sasl_syslog 存在格式字符串漏洞。远程攻击者可通过向目标系统发送特制的日志数据包利用该漏洞执行任意命令。该漏洞影响广泛的 Cyrus SASL 库用户，攻击者无需身份验证即可远程触发，威胁等级极高。Cyrus SASL 已发布安全更新修复此漏洞。"
published = "2001-12-21T05:00:00.000"
remediation = "升级 Cyrus SASL 库至 2.1.8 或更高版本（修复了 _sasl_syslog 中的格式化字符串漏洞），或升级到厂商提供的修复版本（如 Cyrus SASL 2.1.10+）。若无法立即升级，可通过配置 syslog 禁用 SASL 认证日志记录功能作为临时缓解措施，或在防火墙层面限制 SASL 服务的网络访问权限。"
score = 7.5
severity = "HIGH"
sources = ["redhat"]
title = "Cyrus SASL 格式字符串远程代码执行漏洞"
updated = "2026-06-16T21:55:08.197"

