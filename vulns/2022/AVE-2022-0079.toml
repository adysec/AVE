[basic]
description = "Linux 内核 BPF 验证器在处理 ARG_CONST_ALLOC_SIZE_OR_ZERO 类型参数时，未正确传播精度标记（precision markers），导致验证器在状态等价检查（states_equal）中错误地将不同标量视为等价，从而绕过内存边界检查。具有 CAP_BPF 权限的攻击者可通过加载特制 BPF 程序触发越界内存访问（CWE-125），可能导致信息泄露或权限提升。该漏洞影响未应用修复的 Linux 内核版本，CVSS 评分 7.1，危害等级高。"
published = "2025-06-18T11:15:23.347"
remediation = "立即将 Linux 内核升级至 5.15.209、5.19.8 或 6.0 及以上版本。对应稳定分支已包含修复补丁（commit 2459615a8d7f、2fc31465c537、987b4c465ba2）。如无法立即升级内核，可限制 CAP_BPF 权限仅授予受信任进程，作为临时缓解措施。"
score = 7.1
severity = "HIGH"
sources = ["msrc"]
title = "Linux Kernel BPF 越界读取漏洞"
updated = "2026-06-17T05:19:37.817"

