[basic]
description = "IBM AIX eNetwork Firewall 的 fwluser 脚本在创建临时文件时使用了可预测的文件名路径，未采用安全的随机命名机制，导致本地攻击者可通过预创建符号链接的方式，诱使脚本以 root 或特权用户身份向任意文件写入内容，进而可能造成本地权限提升或破坏系统文件。该漏洞攻击条件为攻击者需具备本地普通用户权限并能够预测或抢占临时文件路径。"
published = "1999-05-25T04:00:00.000"
remediation = "升级 IBM AIX eNetwork Firewall 至包含修复的版本，或向 IBM 申请对应 APAR 补丁；临时缓解可将 fwluser 脚本中创建临时文件的逻辑改为使用 mktemp 生成随机路径并以 600 权限限定属主访问，避免可预测的临时文件路径被符号链接劫持。"
score = 2.1
severity = "LOW"
sources = ["avd"]
title = "IBM AIX eNetwork Firewall 不安全临时文件创建漏洞"
updated = "2026-07-16T00:00:00Z"

