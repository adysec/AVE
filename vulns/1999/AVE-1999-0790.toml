[basic]
description = "路由器或防火墙未能正确过滤外部数据包，允许声称源地址为内网地址的外部数据包通过，构成 IP 源地址欺骗漏洞。攻击者可通过伪造内网 IP 地址绕过访问控制列表（ACL）和防火墙规则，从外网向内网发起攻击，导致未授权访问、信息泄露或进一步渗透。该漏洞影响大量未启用反向路径转发（RPF）或未严格配置入站过滤的网络设备，CVSS 评分 7.5，危害等级高。修复措施包括在边界设备上启用入站源地址验证和反向路径转发检查。"
published = "1999-01-01T05:00:00.000"
remediation = "升级路由器/防火墙设备固件到最新稳定版，若当前固件版本低于 8.0.0；启用单播反向路径转发 (uRPF) 功能；配置防火墙访问控制列表，禁止外部接口接收任何声称来自内部网段的流量；检查并修正路由器的动态路由协议配置，禁用不必要的路由通告。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
