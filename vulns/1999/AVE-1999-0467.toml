[basic]
description = 'Microsoft Windows NT 4.0 及其 SP1 至 SP5 版本的远程访问服务（RAS）与路由和远程访问服务（RRAS）客户端存在密码缓存缺陷。当用户通过拨号网络连接进行登录时，系统会在用户并未勾选"保存密码"选项的情况下，仍将用户的登录密码缓存在本地。这意味着任何能够访问该主机的本地用户，都可能在未经授权的情况下读取到此前连接所用凭据，进而导致敏感账户信息的泄露。该漏洞影响范围涵盖上述所有受影响的 Windows NT 4.0 系统版本，攻击条件为攻击者需具备对目标主机的本地访问权限，利用方式则是直接读取系统缓存中已存储的明文或可逆密码数据。'
published = "1999-05-27T04:00:00.000"
remediation = '安装 Microsoft 于 1999 年 5 月发布的安全更新 MS99-017 补丁，该补丁修复了 RAS/RRAS 客户端无论是否勾选"保存密码"选项都会缓存凭据的问题。补丁适用于 Windows NT 4.0 Workstation、Server 及 Enterprise Edition。如无法安装补丁，可启用 SYSKEY 功能（Windows NT 4.0 SP4 及以上）对注册表中存储的密码数据进行强加密作为临时缓解措施。'
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Microsoft Windows NT RAS 拨号网络密码缓存漏洞"
updated = "2026-06-16T21:48:59.367"

