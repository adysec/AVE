[basic]
description = "LeafChat 1.7 IRC 客户端存在拒绝服务漏洞，远程 IRC 服务器可通过快速发送大量错误消息导致客户端崩溃。攻击者只需在 IRC 服务器端连续发送错误信息即可触发该漏洞，无需用户交互，影响 LeafChat 1.7 版本。"
published = "2000-06-25T04:00:00.000"
remediation = "LeafChat 1.7 已停止维护，官方不再发布安全更新。建议升级至 LeafChat 2.0 及以上版本（该版本改进了错误消息处理机制），或改用其他仍在维护的 IRC 客户端（如 mIRC、HexChat）。如无法升级，可在 IRC 客户端设置中限制单次连接接收的错误消息数量，或避免连接不可信的 IRC 服务器。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "LeafDigital LeafChat 1.7 拒绝服务漏洞"
updated = "2026-06-16T21:52:05.243"

