[basic]
description = "` tags.<value>Unix 系统 `/etc/hosts.equiv` 文件错误配置导致不受限制的远程信任关系漏洞。当系统管理员在该文件中写入通配符 `+` 时，系统会信任所有远程主机，允许任何远程用户无需密码或凭据即可通过 rsh、rlogin、rcp 等不安全的 r-命令服务以本地同名用户身份登录目标系统。该漏洞影响所有使用 r-命令套件及 `/etc/hosts.equiv`/`.rhosts` 信任机制的 Unix/Linux 系统（包括 AIX、Solaris、HP-UX、BSD 及各类 Linux 发行版）。攻击者只需从任意远程主机发起连接即可直接登录并获取系统完全控制权，CVSS v2 评分为 10.0（严重等级），向量为 AV:N/AC:L/Au:N/C:C/I:C/A:C。修复方法为删除 `/etc/hosts.equiv` 中的 `+` 行，仅保留明确信任的主机名或 IP，禁用 r-命令服务，并以 SSH 替代不安全的 r-命令。"
published = "1999-01-01T05:00:00.000"
remediation = "立即检查并编辑 /etc/hosts.equiv 与每个用户的 ~/.rhosts 文件，删除其中单独的「+」符号及「+ +」这类允许任意主机任意用户登录的条目，仅保留受信任的特定主机名与用户名；若无需 rsh/rlogin/rexec 等基于信任的服务，应停用 inetd/xinetd 中对应的 r-services 或直接卸载相关软件包，并以 ssh 替代；同时在边界防火墙封锁 512/513/514 端口作为缓解措施。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "Unix /etc/hosts.equiv 远程信任关系权限提升漏洞"
updated = "2026-06-16T21:48:33.550"

