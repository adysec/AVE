[basic]
description = "Microsoft IIS 4.0 的 ExAir 示例站点中存在拒绝服务漏洞。远程攻击者无需身份认证，通过直接向 advsearch.asp、query.asp 或 search.asp 脚本发送特制请求，即可触发 CPU 资源耗尽，导致目标系统拒绝服务。该漏洞影响运行 IIS 4.0 的 Windows NT 4.0 系统，攻击条件低，危害等级高。"
published = "1999-01-26T05:00:00.000"
remediation = '升级到 Windows 2000 及以上版本自带的 IIS 5.0 或更高版本，或直接移除 IIS 4 默认安装的 ExAir 示例站点目录（通常位于 C:\InetPub\iissamples\exair），删除 advsearch.asp、query.asp、search.asp 等脚本文件。如无法升级，可在 IIS 管理器中禁用该示例站点的匿名访问权限作为临时缓解措施。'
score = 7.8
severity = "HIGH"
sources = ["epss"]
title = "Microsoft IIS 4 拒绝服务漏洞"
updated = "2026-06-16T21:48:25.213"

