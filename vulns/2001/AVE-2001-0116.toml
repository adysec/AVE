[basic]
description = "Sudo 1.5及1.6版本（低于1.6.3p6）中存在堆缓冲区溢出漏洞，本地用户通过向sudo程序发送特制的输入数据可触发堆损坏，导致缓冲区溢出，从而获取root权限。该漏洞影响所有使用受影响版本sudo的Unix/Linux系统，攻击者只需拥有本地普通用户权限即可利用，无需认证，危害严重。利用方式通常涉及构造恶意环境变量或参数触发堆溢出，实现权限提升。"
published = "2001-05-03T04:00:00.000"
remediation = "立即升级 sudo 至 1.6.3p6 或更高版本，该版本已修复堆缓冲区溢出漏洞。如无法升级，可限制 sudo 使用权限，仅允许受信任用户执行，并监控 /var/log/sudo.log 中的异常提权行为。"
score = 7.2
severity = "HIGH"
sources = ["redhat"]
title = "Sudo 缓冲区溢出本地权限提升漏洞"
updated = "2026-06-16T21:54:01.053"

