[basic]
description = "SuSE Linux 6.0 中的 xtvscreen 组件存在任意文件写入漏洞，由于程序在处理 pic000.pnm 临时文件时未进行安全的符号链接检查，本地攻击者可通过创建恶意的符号链接指向系统任意文件，诱使 xtvscreen 将内容写入目标文件，从而覆盖系统关键文件或用户数据。该漏洞需要本地攻击权限，攻击复杂度低，影响 SuSE Linux 6.0 版本，CVSS 评分 2.1，危害等级低。"
published = "1999-02-18T05:00:00.000"
remediation = "升级 SuSE Linux 至 6.1 及以上版本，该漏洞已在后续版本中修复。如无法升级，可删除 xtvscreen 的 setuid 权限（chmod -s /usr/bin/xtvscreen），或限制普通用户对 /tmp 目录的写权限以阻止符号链接攻击。同时建议使用 mktemp 等安全临时文件创建方式替代硬编码的 pic000.pnm 路径。"
score = 2.1
severity = "LOW"
sources = ["avd"]
title = "SuSE Linux xtvscreen 符号链接攻击漏洞"
updated = "2026-06-16T21:50:33.817"

