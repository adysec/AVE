[basic]
description = "Netscape Navigator 4.06 及更早版本在处理 JavaScript 时存在缓存文件信息泄露漏洞（CVE-1999-0790）。攻击者在网页中嵌入恶意 JavaScript 脚本，当用户访问该页面后，浏览器会在本地磁盘缓存中保存相关文件，攻击者可通过诱导用户访问特定页面读取浏览器缓存目录中的文件内容，从而获取用户本地敏感信息。该漏洞利用需要用户访问恶意网页且目标浏览器未禁用 JavaScript，属于本地缓存文件越权访问类问题，影响早期 Netscape 浏览器的用户隐私安全。"
published = "2000-04-01T05:00:00.000"
remediation = "升级到 Netscape Navigator 4.07 或更高版本（官方在 4.07 中修复了此缓存泄露问题）；如无法升级，请在浏览器中选择「编辑 -> 首选项 -> 高级 -> 脚本与插件」，取消勾选「启用 JavaScript」以禁用脚本功能作为临时缓解；同时可定期清理浏览器磁盘缓存目录，避免敏感文件残留。"
score = 2.6
severity = "LOW"
sources = ["epss"]
title = "Netscape Navigator 浏览器 JavaScript 缓存文件信息泄露漏洞"
updated = "2026-07-18T00:00:00Z"

