[basic]
description = "Debian Linux 2.1/2.2 系统中自带的 IRC 客户端 epic 及 epic4 存在输入验证缺陷，当向客户端发送超长字符串时，会触发缓冲区溢出导致客户端崩溃，造成拒绝服务。攻击者可通过 IRC 协议远程发送特制长字符串触发该漏洞，无需身份认证，攻击复杂度低。"
published = "1999-08-26"
remediation = "升级到已修复该漏洞的 epic/epic4 版本，或使用其他更安全的 IRC 客户端替代。Debian 官方在后续版本中已修复此输入长度校验缺陷。"
score = 5.0
severity = "MEDIUM"
sources = [
    "cve",
    "epss",
]
title = "Debian Linux IRC客户端epic/epic4长字符串拒绝服务漏洞"
