[basic]
description = "Novell BorderManager 的 ClientTrust 程序存在认证请求来源验证缺陷，远程攻击者无需身份认证即可通过捕获并重放受害者主机 3024 端口的认证请求与响应数据包，冒充合法用户身份获取系统未授权访问权限。该漏洞影响 Novell BorderManager 多版本，CVSS 评分 7.5，危害等级高危，利用方式简单且远程可达。"
published = "2000-07-07T04:00:00.000"
remediation = "立即安装 Novell 官方针对 BorderManager ClientTrust 认证验证漏洞发布的安全补丁（参考 Novell 安全公告及 SecurityFocus BID 1440）。由于 Novell BorderManager 已停止维护多年，建议规划迁移至受支持的替代方案（如 OES 或第三方网关产品）；在无法升级的环境下，在防火墙上限制对 TCP/UDP 3024 端口的访问，仅允许可信源 IP，作为临时缓解措施。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "Novell BorderManager ClientTrust 身份验证绕过漏洞"
updated = "2026-06-16T21:52:11.513"

