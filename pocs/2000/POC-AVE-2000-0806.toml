[info]
author = "AVE"
description = "检测目标 IIS 服务器上是否存在易受攻击的 dvwssr.dll 组件。该 DLL 位于 /_vti_bin/_vti_aut/dvwssr.dll，存在缓冲区溢出漏洞，可导致远程代码执行或拒绝服务。通过发送 HTTP 请求验证该 DLL 是否存在。"
id = "POC-AVE-2000-0806"
name = "Microsoft Visual Interdev 1.0 dvwssr.dll 缓冲区溢出漏洞 PoC"
severity = "high"
tags = ["ave-2000-0806"]
vuln_id = [
    "CVE-2000-0260",
    "AVE-2000-0806",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/_vti_bin/_vti_aut/dvwssr.dll"
protocol = "http"

[[poc.requests.matchers]]
expect = true
status = [200]
type = "status"
