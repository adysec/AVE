[basic]
description = "Novell NetWare 自带的远程 Web 管理工具（Remote Web Administration Utility）存在缓冲区溢出漏洞。攻击者无需身份验证，即可向该服务发送超长的畸形 URL 请求，触发缓冲区溢出，造成远程拒绝服务或在目标服务器上执行任意命令。该漏洞利用门槛低、危害较大，CVSS v2 基础评分为 7.5（高危），影响运行 NetWare 远程管理服务的服务器。"
published = "2000-04-19"
remediation = "升级 Novell NetWare 至官方发布修复该漏洞的版本（NetWare 5.1 Service Pack 或后续补丁），或应用 Novell 针对此漏洞提供的安全补丁；如暂无法升级，应通过网络访问控制限制远程 Web 管理服务端口（TCP 8008）仅允许受信任的管理网段访问，并关闭不必要的远程 Web 管理功能以降低暴露面。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "Novell NetWare 远程 Web 管理工具缓冲区溢出漏洞"
updated = "2026-06-16"

