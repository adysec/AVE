[basic]
description = "glibc 2.1.3 及更早版本中的 DNS 解析器（resolver）使用可预测的事务 ID（TXID）生成算法，本地攻击者可通过向目标系统发送特制的伪造 DNS 响应报文，在无需认证的情况下实施 DNS 缓存投毒攻击，劫持域名解析结果。该漏洞影响使用 glibc 2.1.3 的 Linux 系统，攻击者利用此漏洞可诱导用户访问恶意站点或截获敏感信息，危害等级高。"
published = "2000-05-03T04:00:00.000"
remediation = "升级 glibc 至 2.1.4 或更高版本（glibc 2.2 起默认启用随机化 DNS 事务 ID）。对于无法升级的历史系统，可部署本地缓存 DNS 解析器如 dnsmasq 代为发起查询以缓解预测风险。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "GNU glibc 域名解析器可预测ID导致DNS查询结果欺骗漏洞"
updated = "2026-06-16T21:51:30.143"

