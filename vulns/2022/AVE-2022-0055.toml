[basic]
description = "Linux 内核 Btrfs 文件系统存在死锁漏洞，当多个直接 I/O 写入任务同时操作同一文件范围且空闲数据空间不足时，由于文件范围锁定与异步数据回收任务之间的循环等待，导致系统死锁。本地攻击者可利用该漏洞触发拒绝服务。该漏洞影响 Linux 内核 Btrfs 文件系统，CVSS 评分 5.5，危害等级中等。"
published = "2025-02-26T07:01:30.590"
remediation = "升级 Linux 内核至 5.18.3 及以上版本，该版本已合入 btrfs 并发 direct IO 写入死锁的修复补丁。若无法立即升级内核，可应用补丁 commit f5585f4f0ef5b17026bbd60fbff6fcc91b99d5bf（主线）或 cfae6f765b3c40882ee90dae8fbf9325c8de9c35（稳定分支）到对应内核源码后重新编译。临时缓解措施包括限制不可信用户的本地登录权限、避免在 btrfs 文件系统剩余空间不足时执行并发 direct IO 写入操作，以及监控内核 hung task 超时日志。"
score = 5.5
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux Kernel btrfs 并发直接 I/O 写入死锁漏洞"
updated = "2026-06-17T05:18:24.597"

