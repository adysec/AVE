[basic]
description = "Linux 内核 Intel ice（Ethernet Connection）网卡驱动的加速接收流引导（aRFS）功能中存在释放后使用漏洞（CWE-416）。由于 free_irq_cpu_rmap() 函数在 (devm_)free_irq() 释放中断描述符之后才被调用，导致驱动在设备重置过程中操作已释放的内存对象，触发内核 KASAN 检测到释放后读取。本地攻击者可利用该漏洞导致系统崩溃或实现权限提升。该漏洞影响 Linux 内核 5.8 至 5.17.3 版本，CVSS 评分 7.8，危害等级高危。Linux 内核社区已在 5.17.4 及后续稳定版本中修复此问题。"
published = "2025-02-26"
remediation = "建议将 Linux 内核升级至包含以下任意一个修复提交的版本：主线内核 ≥ 5.18，或 5.17.x 升级至 5.17.4 及以上，5.15.x 升级至 5.15.184 及以上，5.10.x 升级至 5.10.238 及以上。Debian 11 用户应安装包含该补丁的内核更新。修复提交包括：ba2f6ec28733、618df75f2e30、d08d2fb6d99d、d7442f512b71。如无法立即升级，可在 /etc/modprobe.d/ 中添加 blacklist ice 禁用 ice 网卡驱动作为临时缓解措施，但将导致该网卡不可用。"
score = 7.8
severity = "HIGH"
sources = ["cve"]
title = "Linux kernel ice 驱动 aRFS 释放后使用漏洞"
updated = "2026-06-17"

