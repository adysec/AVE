[basic]
description = "Microsoft Excel 97 及 2000 版本中存在代码执行漏洞，攻击者可利用 Register.ID 函数指定恶意的 .dll 文件，从而在用户打开特制 Excel 文件时执行任意命令。该漏洞源于 Excel 对 Register.ID 函数参数缺乏充分校验，允许加载外部动态链接库。攻击者需诱使用户打开包含恶意构造的 Excel 文档以触发漏洞。CVSS 评分 4.6，影响 Excel 97 及 2000 版本。"
published = "2000-07-26T04:00:00.000"
remediation = "立即安装 Microsoft 安全公告 MS00-051 提供的补丁：Excel 2000 用户安装 KB269252 更新，Excel 97 用户安装 KB269263 更新，该补丁禁用 REGISTER.ID 函数对任意 DLL 的调用。由于 Excel 97/2000 已停止支持，建议升级至受支持的 Microsoft Office 版本（如 Office 2016/2019/365）以获取持续安全更新。"
score = 4.6
severity = "MEDIUM"
sources = ["cve"]
title = "Microsoft Excel 97/2000 Register.ID 函数任意代码执行漏洞"
updated = "2026-06-16T21:52:09.710"

