[basic]
description = "Oracle Fusion Middleware 10.1.3.5 中的 Oracle WebCenter Forms Recognition 组件存在未指定安全漏洞，远程攻击者无需身份认证即可通过网络利用未知向量攻击该组件，导致机密性、完整性和可用性完全丧失。该漏洞 CVSS 评分 9.8，危害等级严重，攻击复杂度低且无需用户交互，影响范围广泛。Oracle 已在 2012 年关键补丁更新中修复此漏洞。"
published = "2012-05-03T22:55:02.967"
remediation = "立即登录 My Oracle Support 下载并安装 Oracle Fusion Middleware 10.1.3.5 的 April 2012 Critical Patch Update（CPUApr2012，参考 My Oracle Support Note 1406574.1）。如无法立即打补丁，建议在 Web 应用防火墙或网络层面限制对 WebCenter Forms Recognition Designer 组件的 HTTP 访问，仅允许受信 IP 来源访问，作为临时缓解措施。"
score = 9.8
severity = "CRITICAL"
sources = ["kev"]
title = "Oracle Fusion Middleware WebCenter Forms Recognition 远程代码执行漏洞"
updated = "2026-06-16T23:40:08.810"

