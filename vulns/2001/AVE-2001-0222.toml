[basic]
description = 'T. Hauck Jana Server 1.46 及更早版本存在目录遍历漏洞。远程攻击者无需身份认证即可通过向 Web 服务器发送经过十六进制编码的 ".."（即 %2e%2e）序列的恶意 HTTP 请求，绕过路径限制，读取服务器文件系统上的任意文件。该漏洞影响 Jana Server 1.46 及之前版本，CVSS 评分 5.0，危害等级中危。攻击者利用此漏洞可获取系统敏感信息，为后续攻击提供铺垫。目前已有公开的 PoC 利用代码。'
published = "2001-08-14T04:00:00.000"
remediation = "立即升级 T. Hauck Jana Server 至 1.46 以上版本，该版本已修复 URL 编码的目录遍历问题。如无法升级，在反向代理或 WAF 层添加规则，对请求路径中的 `%2e%2e`、`%2e/` 等编码后的路径穿越序列进行解码拦截。若产品已停止维护，建议迁移至 Apache 或 Nginx 等活跃维护的 Web 服务器。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "T. Hauck Jana Server 目录遍历漏洞"
updated = "2026-06-16T21:54:31.777"

