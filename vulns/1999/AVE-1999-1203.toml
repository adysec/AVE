[basic]
description = "SunOS 4.1.x 系统中用于 xnews 的 loadmodule 程序存在环境变量过滤不严漏洞，由于未对环境变量进行正确过滤，本地攻击者可通过精心构造特定的环境变量触发该漏洞，从而获取 root 权限。该漏洞影响 SunOS 4.1.x 系列版本，CVSS 评分 7.2，危害等级高。"
published = "1999-12-31T05:00:00.000"
remediation = "安装 CERT Advisory CA-1995-12 和 CIAC Bulletin G-02 中引用的 Sun 官方补丁程序。对于仍运行 SunOS 4.1.x 的系统，由于该版本已停止技术支持多年，建议尽快迁移至受支持的 Solaris 10/11 或更新版本。临时缓解措施包括：移除 xnews/loadmodule 的 setuid root 权限（chmod u-s /usr/bin/xnews），并严格限制本地用户的登录访问范围，仅允许受信用户操作。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "Sun SunOS 4.1.x loadmodule 本地权限提升漏洞"
updated = "2026-06-16T21:50:46.653"

