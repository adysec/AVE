[basic]
description = "Orange Software Orange Web Server 2.1 基于 GoAhead Web 服务器开发，在处理不包含 HTTP 版本号的 HTTP GET 请求时存在输入验证缺陷。远程未认证攻击者可发送畸形的 HTTP GET 请求（缺少 HTTP/1.0 或 HTTP/1.1 版本标识），导致服务器进程崩溃或陷入死循环，造成拒绝服务攻击。该漏洞影响 Orange Web Server 2.1 版本，攻击者无需认证即可远程发起攻击，攻击复杂度低，仅影响服务可用性（CVSS 5.0，AV:N/AC:L/Au:N/C:N/I:N/A:P）。攻击者只需向目标服务器发送精心构造的不含 HTTP 版本的 GET 请求即可触发拒绝服务，导致 Web 服务停止响应合法请求。ExploitDB (EDB-20655) 等公开渠道已披露 PoC 代码，攻击者可直接利用现成脚本发起攻击。建议升级至修复版本或迁移至受支持的 Web 服务器软件。"
published = "2001-08-06T04:00:00.000"
remediation = '建议立即升级 Orange Web Server 至 2.1 以上版本（建议升级至最新版本），或升级底层 GoAhead Web Server 至已修复该漏洞的版本（GoAhead 2.1.8 或更高版本已修复此 HTTP 版本缺失导致的 DoS 问题）。如无法立即升级，可在前端部署 WAF 或负载均衡器，配置规则拦截缺少 HTTP 版本号的 HTTP GET 请求（如 "GET /path" 而非 "GET /path HTTP/1.0"），或在防火墙层面拦截不符合 RFC 2616 规范的 HTTP 请求行作为临时缓解措施。建议尽快联系厂商获取官方补丁包并尽快部署。'
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Orange Software Orange Web Server 2.1 拒绝服务漏洞"
updated = "2026-06-16T21:54:41.420"

