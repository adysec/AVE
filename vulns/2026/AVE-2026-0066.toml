[basic]
description = "Splunk Enterprise 的 PostgreSQL sidecar 服务端点存在缺少认证漏洞（CWE-306），未经身份认证的远程攻击者可通过主 Splunk Web 应用（端口 8000）的代理路由，直接访问并调用 PostgreSQL sidecar 服务的备份/恢复接口。攻击者利用 /backup 端点将恶意 PostgreSQL 数据库的 pg_dump 内容写入目标文件系统，再通过 /restore 端点加载该 dump 并在恢复过程中触发包含 lo_export 函数的恶意 SQL，实现任意文件写入。最终可覆盖 Splunk 可执行 Python 脚本（如 ssg_enable_modular_input.py）获得远程代码执行权限。该漏洞影响 Splunk Enterprise 10.2.4 以下及 10.0.7 以下版本，CVSS 评分 9.8，危害等级严重，已出现在 CISA KEV 目录中并在野外被积极利用。Splunk 官方已在安全公告 SVD-2026-0603 中发布修复版本，建议升级至 10.2.4 或 10.0.7 以上版本。"
published = "2026-06-10T18:16:40.760"
remediation = "立即升级 Splunk Enterprise 至 10.2.4 或 10.0.7 及以上版本，该修复已在内核层面为 PostgreSQL sidecar 服务端点添加认证校验。如无法立即升级，可停止并禁用 PostgreSQL sidecar 服务以阻断攻击路径：在 Splunk 安装目录下执行 `./splunk disable app SplunkAppForPostgreSQL` 并重启实例。"
score = 9.8
severity = "CRITICAL"
sources = ["hwpoc"]
title = "Splunk Enterprise PostgreSQL sidecar 服务端点未授权访问漏洞"
updated = "2026-06-19T06:17:01.950"

