[basic]
title = "Microsoft IIS 4.0 HTR/IDC/STM 文件请求缓冲区溢出漏洞"
description = "Microsoft IIS 4.0 在处理 .HTR、.IDC 和 .STM 文件请求时，其过滤器 DLL 存在未检查的缓冲区溢出漏洞。远程攻击者可通过发送特制的畸形请求触发缓冲区溢出，导致 IIS 服务崩溃（拒绝服务），在特定条件下还可实现任意代码执行。攻击无需认证，可远程发起。"
severity = "HIGH"
score = 7.5
sources = ["cve", "ms"]
published = "1999-06-16"
updated = "2026-06-16"
remediation = "安装 Microsoft 安全公告 MS99-019 提供的补丁，或禁用不需要的 .HTR、.IDC、.STM 脚本映射。受影响版本为 IIS 4.0。"
