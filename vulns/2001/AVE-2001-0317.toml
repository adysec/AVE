[basic]
description = "OpenSSH 2.9.9 之前版本存在安全绕过漏洞。该漏洞源于 sftp-server 在使用受限密钥对（restricted keypairs）时，未能正确执行 authorized_keys2 文件中配置的 command= 命令限制策略。经过身份认证的远程攻击者可通过 sftp 命令绕过这些预设的命令执行约束，从而在目标系统上执行未授权操作。攻击条件为攻击者需拥有有效的 SSH 认证凭据（如已泄露的私钥），并连接启用了 authorized_keys2 命令限制的 OpenSSH 服务。此漏洞影响所有使用 OpenSSH 2.9.9 之前版本且配置了密钥命令限制的系统，可能导致权限提升和未授权命令执行。建议立即升级至 OpenSSH 2.9.9 或更高版本以修复此安全缺陷。"
published = "2001-12-06T05:00:00.000"
remediation = "升级 OpenSSH 至 2.9.9 或更高版本（当前主流版本为 9.x，建议至少升级至 OpenSSH 8.0p1 以上）。若系统为 RHEL/CentOS，可通过 `yum update openssh-server` 或 `dnf update openssh-server` 完成升级；Debian/Ubuntu 系统执行 `apt-get update && apt-get install openssh-server`。若暂时无法升级，可在 sshd_config 中禁用 sftp 子系统（注释掉 `Subsystem sftp /usr/libexec/openssh/sftp-server`），或改用 chroot 沙箱模式运行 sftp 并限制用户可执行的命令。"
score = 7.5
severity = "HIGH"
sources = ["redhat"]
title = "OpenSSH sftp-server 受限命令绕过漏洞"
updated = "2026-06-16T21:55:00.433"

