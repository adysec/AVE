[info]
author = "AVE"
description = "检测 OmniHTTPd 1.1/2.4 Pro 的 CGI 程序 imagemap.exe 是否存在缓冲区溢出漏洞，通过发送超长字符串触发溢出"
id = "POC-AVE-1999-1409"
name = "CVE-1999-0951 PoC"
severity = "critical"
tags = ["cve-1999-0951"]
vuln_id = [
    "CVE-1999-0951",
    "AVE-1999-1409",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/cgi-bin/imagemap.exe"
protocol = "http"

[poc.requests.headers]
User-Agent = "AVE/1.0"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "HTTP/1.1 200",
    "Content-Type",
]
