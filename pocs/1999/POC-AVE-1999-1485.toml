[info]
author = "AVE"
description = "dbadmin CGI 1.0.1 缓冲区溢出漏洞检测。通过向 dbadmin CGI 程序发送超长参数触发栈溢出，导致远程代码执行。"
id = "POC-AVE-1999-1485"
name = "CVE-1999-1381 PoC"
severity = "high"
tags = ["cve-1999-1381"]
vuln_id = [
    "CVE-1999-1381",
    "AVE-1999-1485",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/cgi-bin/dbadmin"
protocol = "http"

[poc.requests.body]
content = ""
type = "raw"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["500"]
