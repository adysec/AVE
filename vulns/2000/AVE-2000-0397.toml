[basic]
description = "RealNetworks RealServer 7.0、7.0.1 及 8.0 Beta 版本的 viewsource 目录存在拒绝服务漏洞。远程攻击者无需身份认证，通过向目标服务器发送特制的畸形请求访问 viewsource 目录下的页面，即可触发该漏洞，导致 RealServer 服务崩溃或停止响应，造成拒绝服务。该漏洞影响 RealNetworks RealServer 7.x 系列版本，CVSS 评分 7.8，危害等级高。厂商已发布安全更新修复此漏洞。"
published = "2000-06-01"
remediation = "升级 RealNetworks RealServer 至 8.0 正式版或更高版本，该漏洞在正式版中已修复。如无法升级，可在 Web 服务器或反向代理层限制对 /viewsource/ 目录的访问，或禁用该目录的请求处理。同时建议在防火墙层面限制对 RealServer 管理端口（默认 7070/9090）的访问来源。"
score = 7.8
severity = "HIGH"
sources = ["cve"]
title = "RealNetworks RealServer 视图源目录拒绝服务漏洞"
updated = "2026-06-16"

