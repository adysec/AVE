[basic]
description = "Linux 内核 pinmux 子系统中存在竞争条件漏洞，当两个进程同时对同一 GPIO 引脚调用 pinctrl_select_state() 时，由于对 desc->mux_owner 的访问缺乏互斥保护，一个进程更新 desc->mux_usecount 后尚未设置 mux_owner，另一进程检测到 usecount 非零后访问空指针 mux_owner 进行 strcmp 比较，导致空指针解引用引发内核崩溃。本地攻击者可通过低权限账户并发触发该条件造成拒绝服务。该漏洞影响 Linux 内核多个版本，CVSS 评分 5.5，危害等级中等。Linux 内核社区已通过引入互斥锁序列化 mux 相关设置访问修复此问题。"
published = "2025-01-11T13:15:21.830"
remediation = "建议将 Linux 内核升级至 6.6.66、6.12.5 或 6.13 及以上版本，该漏洞已通过提交 2da32aed4a97 修复。Ubuntu 24.04 LTS 用户可安装 linux-image-6.11.0-1011-lowlatency（USN-7381-1）或 linux-image-6.8.0-1028-gcp（USN-7450-1）并重启系统。如无法立即升级，可限制本地用户对 GPIO/pinctrl 设备的访问作为临时缓解。"
score = 5.5
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux Kernel pinmux 竞争条件空指针解引用漏洞"
updated = "2026-06-17T07:56:37.030"

