[basic]
description = "SEDUM HTTP Server 2.0 存在目录遍历漏洞，远程攻击者无需身份认证即可向目标服务器发送包含 `../`（点点斜杠）序列的特制 HTTP GET 请求，突破 Web 根目录限制，读取服务器上的任意文件，如 `/etc/passwd` 等敏感配置文件。该漏洞影响 SEDUM HTTP Server 2.0 版本，CVSS 评分 5.0，危害等级中等。建议升级至最新版本或部署 Web 应用防火墙进行防护。"
published = "2001-05-03T04:00:00.000"
remediation = "SEDUM HTTP Server 2.0 官方未发布修复该目录遍历漏洞的补丁（CERT/CC 确认无已知解决方案），且该软件已长期停止维护。建议立即迁移至活跃维护的 Web 服务器（如 Apache HTTP Server 或 Nginx）。若无法立即迁移，可在反向代理或 WAF 层面过滤包含 ../ 路径遍历序列的 HTTP GET 请求，并配置服务器仅监听内网接口作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Guido Frassetto SEDUM HTTP Server 2.0 目录遍历漏洞"
updated = "2026-06-16T21:53:52.067"

