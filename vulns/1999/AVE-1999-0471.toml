[basic]
description = "Allaire ColdFusion Server 4.0.1 及更早版本自带的 CFCRYPT.EXE 工具使用强度极弱的加密算法对 CFML 模板源码进行加密保护，攻击者可在本地或获取加密文件后，利用已公开的逆向算法将其解密，从而泄露应用程序的源代码、数据库凭据与业务逻辑。该漏洞的攻击前提是攻击者需能够访问经加密的 CFM 模板文件或安装目录，属于本地信息泄露类问题，不会直接导致远程代码执行，因此危害等级较低。"
published = "2001-03-12T05:00:00.000"
remediation = "升级至受官方支持的 ColdFusion 版本（如 ColdFusion 2023 或 2021），彻底弃用已停止维护的 ColdFusion 4.0.1；将 CFML 源码从弱加密保护改为由操作系统文件访问控制列表（ACL）限制读取，并避免在源码中硬编码数据库凭据，改用加密配置文件或环境变量存储敏感信息。"
score = 2.1
severity = "LOW"
sources = ["exploitdb"]
title = "Allaire ColdFusion Server 弱加密导致 CFML 模板可被解密漏洞"
updated = "2026-07-17T00:00:00Z"

