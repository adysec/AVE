[basic]
description = "Cart32 是一款购物车管理软件，其 2.6 及 3.0 版本中存在硬编码后门密码漏洞。远程攻击者无需身份认证即可利用该内置后门密码直接登录系统后台管理界面，进而执行任意系统命令，完全控制目标服务器。该漏洞利用复杂度低，攻击者只需通过网络访问即可触发，影响范围广泛。"
published = "2000-04-27T04:00:00.000"
remediation = "立即升级 Cart32 至 3.0a 及以上版本，该版本已移除默认后门管理员密码。若厂商已停止维护，建议迁移至其他受支持的购物车系统（如 Magento、WooCommerce），并在迁移前通过防火墙限制对 Cart32 管理端口的访问（默认端口 1001/tcp）。"
score = 7.5
severity = "HIGH"
sources = ["exploitdb"]
title = "McMurtrey Whitaker & Associates Cart32 后门密码远程代码执行漏洞"
updated = "2026-06-16T21:51:42.837"

