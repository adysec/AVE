[basic]
description = "爱数AnyShare智能内容管理平台存在远程命令执行漏洞，攻击者可通过向 `/api/ServiceAgent/start_service` 接口发送特制POST请求，在JSON参数中注入系统命令（如使用反引号包裹恶意命令），导致服务器端执行任意系统命令。该漏洞影响爱数AnyShare全系列版本，攻击者无需身份认证即可利用，可完全控制目标服务器，造成数据泄露、勒索植入等严重危害。厂商已发布安全更新，建议用户立即升级至最新版本。"
published = "0701"
remediation = "建议立即联系爱数技术支持获取 AnyShare 最新安全版本进行升级；如无法立即升级，可在反向代理或 WAF 层面添加规则拦截对 POST /api/ServiceAgent/start_service 路径的外部访问请求，同时将 AnyShare 服务管理接口通过防火墙限制仅允许内网可信 IP 访问，避免直接暴露在公网环境中。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "爱数 AnyShare 远程命令执行漏洞"
updated = "0701"

