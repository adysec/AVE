[basic]
description = "Motorola CableRouter 的 Telnet 服务器存在内存泄漏漏洞，远程攻击者通过发送大量 Telnet 连接请求，可耗尽设备内存资源，导致路由器服务崩溃或无法响应正常请求，造成拒绝服务。攻击无需认证，仅需网络可达即可触发。"
published = "1998-05-10"
remediation = "该产品已停止维护，建议限制 Telnet 服务的访问来源 IP，或禁用 Telnet 改用 SSH 管理，并在网络边界部署访问控制策略阻止非授权 Telnet 流量。"
score = 10.0
severity = "CRITICAL"
sources = ["cve"]
title = "Motorola CableRouter Telnet 连接内存泄漏拒绝服务漏洞"
