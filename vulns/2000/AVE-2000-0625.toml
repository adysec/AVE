[basic]
description = "GLIBC 库的 locale 子系统中存在格式化字符串漏洞，gettext、catopen 等函数在处理用户可控的 locale 环境变量时未正确过滤格式化字符串参数，导致本地攻击者可通过构造恶意格式化字符串注入任意代码并以提升权限执行。该漏洞影响使用受影响 GLIBC 版本的各类 Unix/Linux 系统，攻击者仅需本地访问权限并能控制 LC_ALL、LANG 等环境变量即可触发漏洞，利用方式为通过格式化字符串漏洞覆盖内存关键地址实现任意代码执行并提升至 root 权限，CVSS 评分 10.0，影响严重。"
published = "2000-11-14T05:00:00.000"
remediation = "升级 GLIBC 到 2.1.4 或更高版本（如 glibc-2.1.4-2 或更高版本）。若无法立即升级，可通过限制本地用户访问权限、移除不必要的 setuid 程序、设置环境变量 LC_ALL=C 禁用 locale 支持作为临时缓解措施。建议通过发行版官方渠道（如 Red Hat RHSA-2000:075、Debian DSA-069）获取对应版本的 glibc 更新包并立即安装。"
score = 10
severity = "CRITICAL"
sources = ["cve"]
title = "GNU GLIBC 格式化字符串本地权限提升漏洞"
updated = "2026-06-16T21:52:35.100"

