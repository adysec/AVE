[basic]
description = "IBM AIX eNetwork Firewall 3.2 与 3.3 版本中的 fwluser 脚本在创建临时文件时未采取安全的文件创建方式，存在不安全临时文件创建漏洞。本地已登录的普通用户可利用符号链接（symlink）攻击手段，在脚本写入临时文件的过程中将链接指向任意系统文件，从而以脚本运行权限覆盖或写入目标文件内容。该漏洞影响运行上述版本防火墙软件的 AIX 系统，攻击条件为攻击者需具备本地账户并能在脚本执行期间实施符号链接替换，利用方式相对简单，CVSS 基础评分 2.1，危害等级较低，但可能导致本地文件被篡改或权限提升。"
published = "1999-05-25T04:00:00.000"
remediation = "建议升级至 IBM AIX eNetwork Firewall 3.4 或更高版本（已修复该临时文件竞争条件）。若无法升级，请为 /tmp 目录启用粘滞位（chmod +t /tmp），并限制 fwluser 脚本的写入权限（chmod 755 /usr/lpp/fw/bin/fwluser），同时在防火墙层面禁止非受信本地用户登录。"
score = 2.1
severity = "LOW"
sources = ["exploitdb"]
title = "IBM AIX eNetwork Firewall 不安全临时文件创建漏洞"
updated = "2026-06-16T21:49:05.407"

