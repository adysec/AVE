[basic]
description = "Serv-U FTP 服务器 2.5d 及更早版本的默认配置存在路径泄漏漏洞，远程攻击者无需身份认证即可通过请求不存在的目录或文件 URL，从错误响应中获取服务器真实路径信息。该漏洞可被用于信息收集辅助进一步攻击，影响范围包括 Serv-U 2.5d 及之前版本，CVSS 评分 5.0，危害等级中危。"
published = "2000-02-29T05:00:00.000"
remediation = "升级 Serv-U FTP 服务器至 2.5e 或更高版本，该版本修复了路径泄露问题。如无法立即升级，可在 Serv-U 配置中将默认错误响应从详细模式改为通用模式，避免返回完整路径信息。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Serv-U FTP 服务器路径泄漏漏洞"
updated = "2026-06-16T21:51:09.550"

