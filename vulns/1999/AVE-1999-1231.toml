[basic]
title = "BNBForm 任意文件读取漏洞"
description = "BNBForm 是一款基于 CGI 的表单处理程序，其 automessage 隐藏表单变量存在设计缺陷。远程攻击者无需认证即可通过向该变量传递恶意路径参数，读取服务器上的任意文件，导致敏感信息泄露。攻击者可以获取系统配置文件、数据库凭证等关键数据。"
