[info]
author = "AVE"
description = "BlackBoard CourseInfo 4.0 未授权访问权限提升漏洞验证。通过直接访问 user_update_passwd.pl 和 user_update_admin.pl 等 CGI 程序，无需身份认证即可修改数据库信息。发送 GET 请求至目标 CGI 路径，若返回 200 状态码且包含 CGI 输出特征，则确认存在未授权访问。"
id = "POC-AVE-2000-0757"
name = "CVE-2000-0627 PoC"
severity = "high"
tags = ["ave-2000-0757"]
vuln_id = [
    "CVE-2000-0627",
    "AVE-2000-0757",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/user_update_passwd.pl"
protocol = "http"

[[poc.requests.matchers]]
expect = true
status = [200]
type = "status"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/user_update_admin.pl"
protocol = "http"

[[poc.requests.matchers]]
expect = true
status = [200]
type = "status"
