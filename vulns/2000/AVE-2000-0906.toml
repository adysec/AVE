[basic]
description = "Pine 邮件客户端 4.21 之前版本在处理 URL 时未正确过滤 shell 元字符（如 `|`、`;`、`$()` 等），远程攻击者可构造特制恶意 URL 并诱导用户点击，触发命令注入漏洞，在目标系统上以用户权限执行任意命令。该漏洞影响所有使用 Pine 4.21 之前版本的系统，CVSS 评分 10.0，危害等级严重。用户需升级至 4.21 或更高版本以修复此漏洞。"
published = "1999-11-18T05:00:00.000"
remediation = "请升级 Pine 至 4.21 或更高版本，该版本已修复 URL 中 shell 元字符过滤不严的问题。无法升级时，建议禁用 Pine 对 URL 的自动解析功能，或限制用户使用受影响的 Pine 版本访问不可信链接。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "University of Washington Pine 命令注入漏洞"
updated = "2026-06-16T21:51:32.313"

