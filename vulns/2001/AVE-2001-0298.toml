[basic]
description = "Red Hat Linux 7.1 在安装过程中创建的交换文件（swap file）被设置了不安全的文件权限，导致任何本地用户均可直接读取该交换文件内容。攻击者需首先获得对目标系统的本地访问权限，随后可通过分析交换文件提取敏感信息（如用户密码），进而实现权限提升或横向渗透。该漏洞影响 Red Hat Linux 7.1 操作系统，CVSS v2 评分为 4.6，属于中等危害等级的信息泄露漏洞。"
published = "2001-08-14T04:00:00.000"
remediation = "立即应用 Red Hat 安全公告 RHSA-2001-058 发布的更新包以修正 swap 文件权限。临时缓解措施：对所有 swap 文件执行 chmod 600 仅允许 root 读写，或在 /etc/fstab 中禁用非必要的 swap 分区挂载。"
score = 4.6
severity = "MEDIUM"
sources = ["redhat"]
title = "Red Hat Linux swap 文件权限不当敏感信息泄露漏洞"
updated = "2026-06-16T21:54:40.517"

