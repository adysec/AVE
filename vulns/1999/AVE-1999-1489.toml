[basic]
description = "SunOS 4.1.x 系统中 passwd 命令存在符号链接漏洞，本地攻击者可通过 -F 命令行参数结合符号链接攻击，以 root 权限覆盖系统任意文件。该漏洞源于 passwd 在处理 -F 参数时未充分验证文件路径，使低权限用户可将 /etc/passwd 等关键文件替换为恶意内容，进而实现权限提升或系统破坏。攻击者需拥有本地账户权限，利用难度较低，影响 SunOS 4.1.x 全版本。"
published = "1994-05-13T04:00:00.000"
remediation = "SunOS 4.1.x 已停止维护，官方不再提供安全更新。建议立即升级至受支持的 Solaris 10/11 操作系统。如无法升级，应严格限制本地用户登录权限，移除不可信用户的 shell 访问，并通过 auditd 监控 /etc/passwd 等关键文件的异常修改，同时避免将 passwd 命令授予非受信用户使用 -F 参数。"
score = 6.2
severity = "MEDIUM"
sources = ["avd"]
title = "Sun SunOS 4.1.x passwd 任意文件写入漏洞"
updated = "2026-06-16T21:50:19.997"

