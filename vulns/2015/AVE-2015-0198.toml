[basic]
description = "Microsoft Windows Mount Manager 存在本地权限提升漏洞，根因是 Mount Manager 对符号链接处理不当。攻击者需具备物理接触权限，通过插入精心制作的恶意 USB 设备（包含恶意符号链接），诱导 Mount Manager 错误处理符号链接，从而以提升后的权限在目标系统上执行任意代码。该漏洞影响 Windows Vista SP2、Windows Server 2008 SP2/R2 SP1、Windows 7 SP1、Windows 8/8.1、Windows Server 2012/R2、Windows RT/8.1 及 Windows 10 等多个版本，CVSS 3.1 评分 6.6（中等），攻击向量为物理接触，攻击复杂度低，需低权限且无需用户交互，机密性/完整性/可用性影响均为高。Microsoft 已在 2015 年 8 月安全更新中修复此漏洞。攻击者需物理接触目标设备并插入恶意 USB 设备才能利用，属于物理接触型本地提权漏洞。"
published = "2015-08-15T00:59:01.467"
remediation = "建议将受影响的软件升级到厂商发布的最新安全版本，或根据官方安全公告应用相应的安全补丁。如暂无补丁，建议采取临时缓解措施限制攻击面。"
score = 6.6
severity = "MEDIUM"
sources = ["kev"]
title = "Microsoft Windows Mount Manager本地权限提升漏洞"
