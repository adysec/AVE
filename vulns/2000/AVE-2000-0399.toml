[basic]
description = "XFree86 X11R6 3.3.3/4.0 及衍生终端模拟器（xterm、Eterm、rxvt、PuTTY 0.48 等）存在转义序列处理缺陷，远程攻击者可向受害者终端发送特制的窗口大小调整转义序列，强制终端窗口反复调整大小导致资源耗尽，最终导致拒绝服务。该漏洞影响运行受影响 X11R6 版本的 Linux/Unix 系统，CVSS 5.0（AV:N/AC:L/Au:N/C:N/I:N/A:P），攻击者只需向受害终端发送特制转义字符即可触发，无需认证即可远程导致终端程序崩溃或系统资源耗尽。ExploitDB 已有公开 PoC（Eterm 0.8.10 / rxvt 2.6.1 / PuTTY 0.48 / X11R6 3.3.3/4.0），GNOME VTE 后续也出现类似变体 CVE-2024-37535。厂商未提供官方补丁，建议升级至修复版本的终端模拟器或禁用不受信的终端输入。"
published = "2000-06-01T04:00:00.000"
remediation = "建议升级 XFree86 至 4.0.1 及以上版本，或升级 xterm 至 3.1.6G 以上、rxvt 至 2.7.10 以上、Eterm 至 0.9.0 以上版本。缓解措施：在终端配置中禁用窗口大小调整转义序列（如 xterm 的 allowWindowOps 资源设为 false），或在防火墙层面限制非受信终端连接访问。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "XFree86 X11R6 转义序列拒绝服务漏洞"
updated = "2026-06-16T21:51:48.990"

