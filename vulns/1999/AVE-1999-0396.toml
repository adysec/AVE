[basic]
description = "Solaris 2.5.1 操作系统的 automountd 自动挂载守护进程存在命令注入漏洞，由于未对用户输入的 shell 元字符进行有效过滤，本地或远程攻击者可通过向 automountd 传递特制参数触发该漏洞，以 root 权限执行任意命令，实现权限提升。该漏洞影响 Sun Solaris 2.5.1 版本，CVSS 评分 10.0，危害等级严重，已有公开利用代码。"
published = "1997-11-26T05:00:00.000"
remediation = "立即安装 Sun 补丁 104654（SPARC 架构）/ 104655（x86 架构）修复 Solaris 2.5.1 automountd 漏洞，同时参考 CERT 公告 CA-99-05 更新 rpc.statd 相关组件。如无法打补丁，在 /etc/init.d/autofs 中禁用 automount 服务并关闭 RPC 端口 111（TCP/UDP），或在防火墙层面拦截对 rpc.statd 和 automountd 的外部 RPC 请求。考虑到该操作系统版本已停止维护，建议升级到 Solaris 10 及以上受支持版本以彻底修复。"
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "Sun Solaris 2.5.1 automount 本地权限提升漏洞"
updated = "2026-06-16T21:47:55.103"

