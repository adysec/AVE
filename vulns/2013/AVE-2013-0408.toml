[basic]
description = "Microsoft GDI+ 组件在处理特制 TIFF 图像文件时存在整数溢出漏洞，远程攻击者可通过诱导用户打开包含恶意 TIFF 图像的 Word 文档或其他 Office 文件触发该漏洞，导致远程代码执行。该漏洞影响 Windows Vista SP2、Windows Server 2008 SP2、Office 2003/2007/2010 及 Lync 2010/2013 等多个 Microsoft 产品，已在 2013 年 10 月至 11 月期间被野外利用。攻击者无需身份认证，仅需用户交互（如打开文档或预览邮件）即可完成利用，CVSS 评分 7.8，危害等级高。"
published = "2013-11-06T15:55:05.860"
remediation = '立即安装 Microsoft 安全公告 MS13-096 (KB2908005) 提供的更新：Windows Vista/Server 2008 安装 KB2901674，Office 2003 安装 KB2850047，Office 2007 安装 KB2817641，Office 2010 安装 KB2817670，Lync 2010 安装 KB2899397，Lync 2013 安装 KB2850057。如无法立即打补丁，可通过注册表将 `HKEY_LOCAL_MACHINE\SOFTWARE\Microsoft\Gdiplus` 下的 `DisableTIFFCodec` DWORD 值设为 1 以禁用 TIFF 编解码器，阻止通过特制 TIFF 图片触发的攻击。'
score = 7.8
severity = "HIGH"
sources = ["kev"]
title = "Microsoft Office GDI+ TIFF图像处理远程代码执行漏洞"
updated = "2026-06-16T23:55:59.867"

