[basic]
description = "Chyrp 2.1 及更早版本（含 2.0）在默认 URI 的请求处理中存在目录遍历（CWE-22）漏洞。远程攻击者无需身份认证，只需在请求默认 URI 时于 action 参数中构造并传入经 URL 编码的 `..%2F`（即编码后的点点斜杠）序列，即可突破程序预期的路径限制，使应用程序包含并执行服务器上的任意本地文件。该漏洞属于典型的本地文件包含（LFI）类问题，攻击者借此可读取到本不应暴露的敏感文件（如配置文件、源码等），进而可能获取系统凭据或进一步推进攻击。其触发条件简单，仅需向目标站点发送特制的 HTTP 请求即可，CVSS 评分 6.8，危害等级为中高危，主要影响部署了相关版本 Chyrp 博客系统的 Web 服务器。"
published = "2011-07-19T20:55:01.257"
remediation = "升级 Chyrp 到官方修复版本（2.1 之后的 2.x 版本，建议查阅项目仓库获取含路径遍历修复的提交）；若无法立即升级，可在 Web 服务器（如 Apache/Nginx）配置中拦截向默认 URI 传入含 ..%2F 编码序列的 action 参数请求，并限制 PHP 仅可包含白名单目录内文件作为临时缓解措施。"
score = 6.8
severity = "MEDIUM"
sources = ["nuclei"]
title = "Chyrp Chyrp 2.0/2.1 路径遍历漏洞"
updated = "2026-06-16T23:31:54.793"

