[basic]
description = 'CVE-1999-0633 已被官方驳回（REJECT），原候选编号指向"HTTP/WWW 服务正在运行"这一配置检测项。该条目涉及的是系统上 HTTP 服务端口的开放状态识别，并非安全漏洞，不具备攻击条件和利用方式，不产生 CVSS 评分。此类配置检查更适合归入通用配置枚举（CCE）体系，而非 CVE 漏洞编号体系。'
published = "1999-01-01T05:00:00.000"
remediation = "若 HTTP 服务非业务必需，应在系统服务管理器中禁用 httpd/nginx/IIS 等相关服务并配置防火墙阻止 80/443 端口入站流量；若为业务必要，应确保移除默认页面、禁用目录列表、限制访问来源 IP、启用 TLS 并定期更新 Web 服务器至最新稳定版本。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "HTTP/WWW 服务运行配置检查项（非漏洞）"
updated = "2023-11-07T01:54:59.750"

