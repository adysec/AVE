[basic]
description = "Adobe Flash Player 11.3.300.271之前版本（Windows/Mac）及11.2.202.238之前版本（Linux）中存在未明漏洞，远程攻击者可通过诱导用户打开包含特制SWF内容的Word文档触发该漏洞，导致任意代码执行或拒绝服务。该漏洞源于字体解析过程中的输入验证缺陷，攻击者利用精心构造的SWF文件可完全控制受影响系统。该漏洞已在2012年8月被野外利用，影响范围广泛，CVSS评分7.8，危害等级高。Adobe官方已发布安全更新修复此漏洞。"
published = "2012-08-15T10:31:40.677"
remediation = "建议立即升级 Adobe Flash Player 至 11.3.300.271（Windows/Mac）或 11.2.202.238（Linux）及以上版本。由于 Adobe 已于 2020 年 12 月 31 日正式停止 Flash Player 支持并发布终止生命公告，根本性解决方案是彻底卸载 Flash Player，在浏览器中禁用 Flash 插件，并移除所有依赖 Flash 的应用程序。临时缓解措施包括：在组策略中禁用 Flash 执行权限，使用企业级白名单软件阻止 SWF 文件运行，以及通过杀毒软件启用针对 CVE-2012-1535 的入侵检测规则。"
score = 7.8
severity = "HIGH"
sources = ["kev"]
title = "Adobe Flash Player 字体解析远程代码执行漏洞"
updated = "2026-06-16T23:39:42.360"

