[basic]
description = "FORE PowerHub 5.0.0 及更早版本存在拒绝服务漏洞。远程攻击者无需身份认证，可通过发送 TCP SYN 扫描并结合 TCP/IP 协议栈指纹识别数据包（如使用 nmap 工具）向目标设备发起攻击，导致设备服务挂起或崩溃。该漏洞影响 FORE PowerHub 5.0.1 之前的所有版本，攻击者只需具备网络访问能力即可触发，利用门槛较低。"
published = "2005-01-05T05:00:00.000"
remediation = "升级 FORE PowerHub 至 5.0.1 或更高版本。如无法升级，在边界防火墙上配置 SYN 速率限制（如 iptables 的 --limit 1/s）并启用 SYN Cookies 防御，同时阻止来自不可信源的非完成 TCP 握手探测流量以缓解风险。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Fore PowerHub 5.0.0 Printing 拒绝服务漏洞"
updated = "2026-06-16T21:50:18.090"

