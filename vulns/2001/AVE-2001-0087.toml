[basic]
description = "ROADS 2.3 的 search.pl 脚本存在任意文件读取漏洞，远程攻击者可通过向 form 参数传入目标文件名并以空字节（null byte）结尾的方式，绕过路径限制读取服务器上的任意文件，导致敏感信息泄露。该漏洞影响 ROADS 2.3 版本，攻击无需身份认证，危害等级中等。"
published = "2001-06-02T04:00:00.000"
remediation = "立即升级 ROADS 至 2.3 以上版本，或应用官方发布的搜索脚本补丁（补丁名 ROADS-2.3.patch），对 search.pl 中 form 参数进行输入过滤和长度校验，拒绝包含空字节（%00）的请求。如无法升级，在 Web 服务器（如 Apache）层面配置 rewrite 规则，拦截对 /ROADS/cgi-bin/search.pl 的请求，或限制 CGI 目录的执行权限。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Martin Hamilton ROADS 2.3 任意文件读取漏洞"
updated = "2026-06-16T21:53:53.877"

