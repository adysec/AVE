[basic]
description = "IRIX 与 OpenLinux 系统中 routed 路由守护进程的 traceon 调试功能存在文件追加漏洞。远程攻击者可通过向目标系统的 routed 服务发送特制的 traceon 请求，将任意数据追加到系统文件中，导致日志文件被破坏或系统关键配置文件被篡改，进而实现权限提升或拒绝服务。该漏洞影响 SGI IRIX 3/4/5/6 及 OpenLinux 1.0/1.1 版本。"
published = "1998-10-26T05:00:00.000"
remediation = "立即应用 SGI 安全公告 19981004-01-PX 提供的补丁，升级 routed 组件至最新版本。如无法打补丁，应禁用 routed 服务（`/etc/init.d/routed stop`）或在路由器/主机防火墙上过滤 UDP 端口 520 以阻断外部路由协议流量。"
score = 6.4
severity = "MEDIUM"
sources = ["avd"]
title = "SGI IRIX 与 Caldera OpenLinux routed 文件追加漏洞"
updated = "2026-06-16T21:47:55.790"

