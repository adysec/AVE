[basic]
description = "Progressive Networks Real Video 服务器（pnserver）存在远程拒绝服务漏洞。远程攻击者无需身份认证即可向目标服务器发送特制请求，导致服务进程崩溃，无法正常处理用户请求。该漏洞影响早期版本的 Real Video 流媒体服务，攻击条件简单，危害等级中等。"
published = "1998-01-15T05:00:00.000"
remediation = "升级 Progressive Networks Real Video Server 至最新版本，或应用厂商发布的补丁程序。若无法升级，在防火墙规则中限制对 Real Video Server 端口的访问，仅允许可信来源连接，以降低远程攻击风险。"
score = 5
