[basic]
description = "Hughes Technologies 开发的 Mini SQL (mSQL) 2.0.11 版本中的 w3-msql CGI 程序存在缓冲区溢出漏洞。远程攻击者可通过向该 CGI 程序发送特制请求触发缓冲区溢出，从而在目标系统上执行任意命令。该漏洞 CVSS 评分 10.0，危害等级严重，攻击者无需认证即可远程利用，影响部署了 mSQL 2.0.11 的 Web 服务器。"
published = "1999-12-27T05:00:00.000"
remediation = "升级 mSQL 至 2.0.12 及以上版本，该版本已修复 w3-msql 缓冲区溢出问题。如无法升级，立即移除或禁用 w3-msql CGI 程序，或通过 Web 服务器（如 Apache）配置访问控制，仅允许可信 IP 访问该 CGI 端点。建议迁移至仍在维护的数据库系统（如 MariaDB 或 PostgreSQL）。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "Hughes Technologies Mini SQL (mSQL) w3-msql 远程缓冲区溢出漏洞"
updated = "2026-06-16T21:50:49.253"

