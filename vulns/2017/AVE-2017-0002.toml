[basic]
description = 'libxml2 的 valid.c 文件中 xmlSnprintfElements 函数存在栈缓冲区溢出漏洞。当对不可信文档或外部 DTD 进行 DTD 验证时，攻击者可通过构造特制的 XML 文件触发该漏洞。漏洞成因在于函数在拼接元素内容定义到缓冲区时，未使用更新后的缓冲区长度进行边界检查，导致可越界写入约"size"字节数据。该漏洞可导致使用 libxml2 库的程序（如 PHP）崩溃，CVSS 评分 7.5，危害等级高。受影响版本包括 libxml2 2.9.4 及之前版本。'
published = "2017-05-18T06:29:00.403"
remediation = "升级 libxml2 至 2.9.5 及以上版本。各发行版用户可通过包管理器更新（如 apt upgrade libxml2、yum update libxml2）。PHP 用户需同时升级 php-xml 扩展并重启 Web 服务。如无法立即升级，作为临时缓解措施，可避免对不可信文档执行 DTD 验证，或设置 LIBXML_DTDLOAD 与 LIBXML_DTDATTR 解析选项为 0 以禁用外部 DTD 加载。"
score = 7.5
severity = "HIGH"
sources = ["msrc"]
title = "libxml2 xmlSnprintfElements 堆栈缓冲区溢出漏洞"
updated = "2026-06-17T01:27:23.397"

