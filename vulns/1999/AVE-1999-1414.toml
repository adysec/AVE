[basic]
description = "rpc.mountd（NFS 挂载守护进程）在处理挂载请求时，会根据被请求导出目录下的文件或目录是否存在而返回不同的错误信息。攻击者可通过向 rpc.mountd 发送针对特定文件或目录的挂载请求，依据返回差异判断目标系统上文件或目录是否存在，从而实现对服务器文件系统的信息探测。该漏洞本身不导致任意文件读取或代码执行，但可被用于辅助后续攻击、枚举敏感文件路径。攻击条件为攻击者需能与目标主机的 RPC 端口（通常为 111 及 NFS 相关端口）进行网络连通。"
published = "1997-08-24"
remediation = "对于运行受影响版本 NFS 工具包的 Linux 系统，建议将 nfs-utils 升级至厂商已修复该漏洞的最新版本，较新的发行版中 rpc.mountd 已统一文件不存在的错误返回信息，不再泄露文件是否存在。如当前系统无需提供 NFS 导出服务，可直接禁用 rpc.mountd 守护进程并在防火墙中封锁 TCP 和 UDP 2049 端口及 RPC 端口映射器（端口 111），以彻底消除攻击面。对于 Ultrix 等旧版系统，建议联系厂商获取补丁或迁移至受支持的现代操作系统版本。"
score = 5.0
severity = "MEDIUM"
sources = ["avd"]
title = "Linux/Ultrix NFS rpc.mountd 文件存在性信息泄露漏洞"
updated = "2026-06-16"

