[basic]
description = "Dansie 购物车应用 cart.pl 未对用户提交的表单字段进行服务端校验，远程攻击者可通过修改隐藏表单字段（hidden form fields）的值来篡改购物车中的商品价格、数量等敏感购买信息，从而实现低价或零成本购买商品。该漏洞影响 Dansie 购物车应用早期版本，攻击者无需身份认证即可利用，危害等级严重。建议升级至最新版本或对服务端输入进行严格校验。"
published = "2000-04-11T04:00:00.000"
remediation = "该漏洞源于 cart.pl 直接信任客户端提交的隐藏表单字段（如商品价格、数量），导致攻击者可篡改订单数据。官方已停止维护，建议立即迁移至支持服务端校验的现代电商平台（如 WooCommerce、Magento），并确保所有价格计算在服务端完成，禁止依赖隐藏字段传递敏感数据。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "Dansie cart.pl 隐藏表单字段购买信息篡改漏洞"
updated = "2026-06-16T21:51:19.690"

