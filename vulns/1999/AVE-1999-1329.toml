[basic]
description = "Red Hat Linux 5.1及更早版本中的SysVInit组件存在缓冲区溢出漏洞，本地攻击者可利用此漏洞通过精心构造的输入触发缓冲区溢出，从而获取系统最高权限（root）。该漏洞源于SysVInit在处理特定参数时未正确验证输入长度，导致栈缓冲区溢出。攻击者需要本地系统访问权限，无需身份验证即可完全控制受影响的系统。"
published = "1999-12-31"
remediation = "升级Red Hat Linux系统中的SysVInit软件包至修复版本，或应用Red Hat官方提供的安全补丁。对于Red Hat Linux 5.1及更早版本，建议升级到包含修复的SysVInit版本，或升级操作系统到已修复此漏洞的较新版本。"
score = 7.2
severity = "HIGH"
sources = ["cve"]
title = "Red Hat Linux SysVInit 缓冲区溢出漏洞"
updated = "2026-06-16"

