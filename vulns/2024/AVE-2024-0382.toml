[basic]
description = "契约锁电子签章平台存在路径遍历与 SpEL 表达式注入漏洞，攻击者可通过 /contract/ukeysign/.%2e/.%2e/template/param/edits 路径绕过认证，向 expression 参数注入恶意 SpEL 表达式，实现未经身份认证的远程代码执行。该漏洞允许攻击者以应用权限在服务器上执行任意系统命令，完全控制目标服务器，危害严重。"
published = "2024-08-13"
remediation = "升级契约锁电子签章平台至官方最新版本，该版本已修复 /contract/ukeysign/ 路径的目录遍历漏洞并限制 SpEL 表达式注入。临时缓解措施：在 WAF/反向代理层添加规则，拦截包含 .%2e 或 ../ 的 URI 请求，并严格校验 /template/param/edits 接口的 expression 参数。"
score = 8.6
severity = "HIGH"
sources = ["hwpoc"]
title = "契约锁 电子签章平台 /param/edits 远程代码执行漏洞"
updated = "2024-08-13"

