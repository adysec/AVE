[basic]
description = "Internet Explorer 4.01 及 5 版本中捆绑的 Registration Wizard ActiveX 控件（regwizc.dll）存在缓冲区溢出漏洞。远程攻击者可通过构造恶意网页，诱使用户访问后触发该漏洞，导致任意代码执行。该漏洞影响安装了相关 IE 版本的 Windows 系统，CVSS 评分 5.1，危害等级中危。"
published = "1999-09-24T04:00:00.000"
remediation = "在注册表中为 regwizc.dll 的 CLSID 设置 kill bit 以禁用该 ActiveX 控件：将以下 CLSID 的 Compatibility Flags DWORD 值设为 0x400（需确认具体 CLSID 后操作）。升级到更高版本的 Internet Explorer（如 IE 8 或更高版本），或迁移至基于 Chromium 的现代浏览器（如 Edge/Chrome）。如仍需使用旧版 IE 内核，建议通过组策略禁用所有非必要 ActiveX 控件作为缓解措施。"
score = 5.1
severity = "MEDIUM"
sources = ["epss"]
title = "Microsoft Internet Explorer Registration Wizard ActiveX 缓冲区溢出远程代码执行漏洞"
updated = "2026-06-16T21:50:45.670"

