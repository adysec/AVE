[basic]
description = "联想 FileZ（联想网盘）客户端存在 XML 外部实体（XXE）解析不当漏洞（CWE-611）。本地低权限用户若访问攻击者构造的恶意 URL，客户端在解析相关 XML 时可能被诱导读取系统任意文件，造成敏感信息泄露。攻击需本地条件并依赖用户交互（访问特制链接），不影响完整性与可用性。受影响版本为 FileZ Client 11.0.0.10 之前，CVSS 约 5.0–5.1（中危）。"
published = "2025-04-25T16:15:26.180"
remediation = "立即将联想网盘 FileZ 客户端升级至 11.0.0.10 或更高版本以修复不当 XML 解析（XXE）问题。升级前请从官方渠道下载安装包并关闭正在运行的 FileZ 客户端。若暂时无法升级，应避免打开未知或不可信链接，限制低权限本地用户访问 FileZ，并在企业环境中通过应用管控禁止运行受影响旧版本客户端作为临时缓解。"
score = 5.1
severity = "MEDIUM"
sources = ["hwpoc"]
title = "联想 FileZ 客户端不当XML解析任意文件读取漏洞"
updated = "2026-06-17T09:06:14.800"

