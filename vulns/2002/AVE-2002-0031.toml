[basic]
description = "FAM（File Alteration Monitor）2.6.8及更早版本中存在文件列表泄露漏洞。由于对根目录所属文件的访问控制检查不充分，本地低权限攻击者可利用该漏洞列出本应仅限 root 用户或 root 组访问的敏感文件名称，导致系统敏感信息泄露。该漏洞影响 SGI IRIX 6.5.x 等操作系统平台，CVSS 评分 2.1，危害等级低，攻击前提为拥有本地系统访问权限。"
published = "2002-09-05T04:00:00.000"
remediation = "将 FAM 升级至 2.7.0 或更高版本（此版本修复了根目录文件列表泄露问题）。对于已停止维护的旧系统，建议替换为 Gamin 作为 FAM 替代方案，或通过 xinetd 限制 FAM 服务的访问来源（仅允许本机回环地址连接），同时在 /etc/fam.conf 中将 `allow_all` 设为 `false` 以禁止非特权用户查询受限目录。若无法升级，可将敏感目录从 FAM 监控范围中排除。"
score = 2.1
severity = "LOW"
sources = ["osv"]
title = "SGI IRIX FAM 任意根目录文件列表漏洞"
updated = "2026-06-16T21:58:18.583"

