[basic]
description = "Microsys CyberPatrol 4.0 4.003及4.005版本在注册过程中使用弱编码（简单编码转换）加密信用卡号，而其余注册信息则以明文方式传输，未采用任何加密保护。攻击者可通过嗅探网络流量捕获这些敏感信息，导致用户信用卡号和个人隐私数据泄露。该漏洞影响 CyberPatrol 4.0系列版本，CVSS评分5.0，危害等级中危。"
published = "2001-01-09T05:00:00.000"
remediation = "Microsys CyberPatrol 已停止维护且厂商不再提供更新补丁，建议立即停止使用该版本，迁移至其他受支持的网页内容过滤软件。如无法替换，应在网络层面强制所有注册流量通过 VPN 或 TLS 加密隧道传输，避免敏感信息在网络上明文传输。同时禁止在不受信网络中执行软件注册操作。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Microsys CyberPatrol 注册信息弱加密敏感数据泄露漏洞"
updated = "2026-06-16T21:53:18.767"

