[basic]
description = "Microsoft Active Movie ActiveX 控件在 Internet Explorer 5 中存在输入验证不当漏洞，未对可下载文件类型进行有效限制。远程攻击者可通过电子邮件或新闻组帖子中嵌入特制的编码内容，诱使用户访问恶意页面，从而在用户系统上下载任意类型文件。该漏洞影响使用 Internet Explorer 5 浏览器的 Microsoft Windows 系统，CVSS 评分 7.5，危害等级高。用户可升级浏览器或禁用相关 ActiveX 控件进行防护。"
published = "2000-05-13T04:00:00.000"
remediation = '建议立即安装 Microsoft 2000 年 6 月发布的 Internet Explorer 安全更新（MS00-027），升级至 IE 5.01 或更高版本。如无法升级，可通过注册表设置 Active Movie Control 的 Kill Bit（CLSID: 05589FA0-C356-11CE-BF01-00AA0055595A），在 HKEY_LOCAL_MACHINE\SOFTWARE\Microsoft\Internet Explorer\ActiveX Compatibility 下新建 Compatibility Flags 为 0x400 以禁用该控件。同时将 Internet 区域 ActiveX 安全级别设为"高"并禁用"对未标记为安全的 ActiveX 控件进行初始化和脚本化"。'
score = 7.5
severity = "HIGH"
sources = ["exploitdb"]
title = "Microsoft Active Movie ActiveX 控件任意文件下载漏洞"
updated = "2026-06-16T21:51:38.210"

