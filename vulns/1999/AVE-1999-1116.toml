[basic]
description = "BMC Software Patrol 的 SNMP Agent 组件（3.2.07 之前版本）存在文件权限漏洞，本地用户可通过向 snmpmagt 程序传入目标文件路径作为第二个参数，以 root 权限创建任意全局可写文件，从而获得对系统敏感文件的写入权限，可能导致权限提升或系统被进一步利用。攻击者需要具备本地访问权限。"
published = "1999-07-13T04:00:00.000"
remediation = "升级 BMC PATROL SNMP Agent 至 3.2.07 或更高版本，限制 snmpmagt 程序的 SUID 权限，仅授权管理员可执行，并监控 /var/spool 等目录下异常文件创建行为。"
score = 7.2
severity = "HIGH"
sources = ["epss"]
title = "BMC Patrol SNMP Agent 本地文件创建权限提升漏洞"
updated = "2026-06-16T21:50:29.277"

