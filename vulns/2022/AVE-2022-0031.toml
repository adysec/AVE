[basic]
description = "Linux 内核的 Ceph 文件系统存在死锁漏洞，当客户端以 wsync 模式挂载后，创建 O_RDWR 文件时 inline_version 被错误初始化为 1，随后立即进行缓冲写入操作时，客户端已持有 Fwb  caps 锁并等待 getattr(Fsr) 请求完成，而 MDS 节点间因文件锁状态转换需要回收 Fxwb caps，形成循环等待导致死锁。本地攻击者可通过构造特定的文件操作序列触发此漏洞，造成系统拒绝服务。该漏洞影响 Linux 内核 Ceph 文件系统模块，CVSS 评分 5.5，危害等级中等。"
published = "2025-02-26T07:01:06.433"
remediation = "将 Linux 内核升级至 5.18.4 或更高版本（5.19+ 已包含主线修复），或向后移植补丁 commit 825978fd6a0defc3c29d8a38b6cea76a0938d21e（稳定分支）与 292b7a7275ce（主线分支）。作为临时缓解措施，避免使用 wsync 挂载选项挂载 CephFS，并在创建 O_RDWR 文件后避免立即执行缓冲区写入操作，减少触发死锁的条件。"
score = 5.5
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux kernel Ceph 文件系统死锁漏洞"
updated = "2026-06-17T05:17:37.933"

