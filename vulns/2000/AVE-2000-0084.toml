[basic]
description = "Microsoft Systems Management Server（SMS）2.0 的远程控制（Remote Control）组件在安装时设置了不安全的文件系统权限，相关程序文件（如可执行文件、动态链接库或配置文件）的访问控制列表允许普通本地用户进行写入或修改。由于权限配置过于宽松，已登录的本地低权限用户可以通过修改、替换或植入恶意版本的远程控制程序，在系统启动时以更高权限（如 SYSTEM 或管理员）执行任意代码，从而实现本地权限提升。该漏洞影响运行 SMS 2.0 远程控制代理的 Windows 主机，攻击前提是攻击者已经拥有目标系统的本地普通用户账户访问权限，无需远程网络访问即可完成利用。"
published = "1999-12-29T05:00:00.000"
remediation = '立即为 Microsoft Systems Management Server 2.0 远程控制程序目录（默认位于 %ProgramFiles%\SMS\bin）及其可执行文件设置仅 Administrators 与 SYSTEM 拥有「完全控制」、普通用户仅「读取与执行」的 NTFS 权限，移除 Everyone 组的写权限；同时安装微软安全补丁（SMS 2.0 Service Pack 2 及以上版本）以修正默认安装权限。若暂不升级，可通过组策略限制普通用户对 SMS 安装路径的访问，并定期审计关键可执行文件完整性作为临时缓解。'
score = 7.2
severity = "HIGH"
sources = ["cve"]
