[basic]
description = "东胜物流软件 WmsZXFeeGridSource.aspx 页面存在 SQL 注入漏洞，攻击者无需身份认证即可通过构造恶意的 HTTP 请求参数注入恶意 SQL 语句，进而窃取数据库中的敏感信息（如用户账号、订单数据等），甚至可写入 webshell 获取服务器控制权。该漏洞影响东胜物流软件全版本，攻击门槛低，危害严重。"
published = "0712"
remediation = "立即联系东胜物流软件厂商获取并安装已修复该接口SQL注入的安全补丁/升级包，将系统升级至厂商提供的最新安全版本后重启相关Web服务。在完成升级前，通过防火墙、反向代理或IIS/站点配置禁止外网直接访问WmsZXFeeGridSource.aspx，仅允许内网可信IP访问；对相关查询参数强制鉴权与白名单校验，并在WAF上启用SQL注入拦截规则。同时核查数据库账号权限，撤销Web业务账号的高危写权限，避免注入后提权落库。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "东胜物流 东胜物流软件WmsZXFeeGridSource.aspx SQL注入漏洞"
updated = "0712"

