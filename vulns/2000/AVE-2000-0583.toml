[basic]
description = "RobTex Viking Server 1.0.6 Build 355 及之前版本存在缓冲区溢出漏洞，远程攻击者可通过向目标服务器发送超长的 HTTP GET 请求或超长的 Unless-Modified-Since、If-Range、If-Modified-Since 头部触发该漏洞，导致服务端拒绝服务或执行任意命令。该漏洞影响 RobTex Viking Server 1.06-370 之前所有版本，CVSS 评分 7.5，危害等级高危。"
published = "2000-10-20T04:00:00.000"
remediation = "升级 RobTex Viking Server 至 1.06-377 及以上版本（1.06-370 仍可能受影响），该版本修复了 HTTP GET 请求及相关超长头部导致的缓冲区溢出。由于该产品已停止维护，建议迁移至其他仍在活跃更新的 Web 服务器软件（如 Apache HTTP Server 或 Nginx），并在迁移前通过防火墙或 WAF 限制对 80/443 端口的访问，过滤超长请求头部作为临时缓解措施。"
score = 7.5
severity = "HIGH"
sources = ["exploitdb"]
title = "RobTex Viking Server 缓冲区溢出漏洞"
updated = "2026-06-16T21:52:27.317"

