[info]
author = "AVE"
description = "检测目标页面是否包含 Microsoft Internet Explorer 5.0/5.01 的 external.NavigateAndFind() 跨帧安全策略绕过漏洞利用代码。通过 HTTP GET 请求获取目标页面内容，检查响应体中是否出现 external.NavigateAndFind 函数调用，若存在则表明该页面可能包含针对此漏洞的利用代码。"
id = "POC-AVE-2000-0026"
name = "Microsoft Internet Explorer external.NavigateAndFind 跨帧安全策略绕过 PoC"
severity = "low"
tags = [
    "cve-2000-0028",
    "ie-xss",
    "cross-frame",
]
vuln_id = [
    "CVE-2000-0028",
    "AVE-2000-0026",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["NavigateAndFind"]

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/poc-navigateandfind.html"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["NavigateAndFind"]
