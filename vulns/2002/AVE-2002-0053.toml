[basic]
description = "Heimdal 0.5 之前版本的 kadmind 和 kdc 服务中存在多处缓冲区溢出漏洞，远程攻击者无需身份认证即可通过网络向目标服务发送特制的畸形请求触发缓冲区溢出，进而覆盖内存中的关键数据，最终获得目标系统的 root 权限。该漏洞影响所有运行 Heimdal 0.5 之前版本的系统，CVSS 评分 10.0，危害等级严重。"
published = "2002-10-28T05:00:00.000"
remediation = "立即将 Heimdal 升级至 0.5 或更高版本。SuSE Linux 用户可通过 rpm -Fhv 安装对应发行版更新包（如 SuSE-8.0 的 heimdal-0.4e-191.i386.rpm），安装后执行 /etc/rc.d/kdc restart 重启服务。Gentoo 用户执行 emerge sync && emerge heimdal。Debian 用户参考 DSA-178 安装更新。如无法立即升级，可在防火墙层面限制对 kadmind（默认端口 464）和 kdc（默认端口 88）的远程访问作为临时缓解措施。"
score = 10
severity = "CRITICAL"
sources = ["osv"]
title = "Heimdal kadmind 和 kdc 服务器缓冲区溢出漏洞"
updated = "2026-06-16T21:58:57.947"

