[basic]
description = "用友畅捷通T+系统的FileUploadHandler.ashx接口存在任意文件上传漏洞。攻击者可向/tplus/SM/SetupAccount/FileUploadHandler.ashx/;/login路径发送构造的multipart/form-data请求，在未充分校验文件类型与路径的情况下将恶意脚本文件上传至服务器。上传成功后可通过访问上传目录中的文件获取远程代码执行能力，进而控制主机、窃取业务数据或进行横向渗透。"
published = "2024-08-13"
remediation = "立即通过WAF或反向代理拦截对/tplus/SM/SetupAccount/FileUploadHandler.ashx路径的未授权上传请求，并限制该接口仅允许可信内网访问；在应用侧对上传文件实施严格类型白名单与内容检测，禁止asp/aspx/ashx等可执行脚本；联系用友或畅捷通官方获取并安装针对T+该上传接口的安全补丁，升级至已修复版本。"
score = 9.8
severity = "CRITICAL"
sources = ["hwpoc"]
title = "用友畅捷通T+ FileUploadHandler 任意文件上传漏洞"
updated = "2026-07-20"

