[basic]
description = "Node.js 生态中的 st 静态文件服务模块在 0.2.5 版本之前存在目录遍历漏洞（CWE-22）。远程攻击者无需身份认证，通过在请求路径中构造 %2e%2e（URL 编码的 ..）序列绕过路径限制，可读取目标服务器上的任意文件，导致敏感信息泄露（如配置文件、源代码等）。该漏洞影响所有使用受影响版本 st 模块的 Node.js 应用，CVSS 评分 7.5，危害等级高。"
published = "2017-10-23T18:29:00.617"
remediation = "立即将 `st` 模块升级至 0.2.5 或以上版本（`npm install st@0.2.5`），该版本已修复路径遍历问题。如无法升级，可在应用层对请求路径中的 `%2e%2e`、`..` 等目录穿越序列进行过滤拦截。"
score = 7.5
severity = "HIGH"
sources = ["nuclei"]
title = "Node.js st 模块目录遍历漏洞"
updated = "2026-06-17T00:08:49.977"

