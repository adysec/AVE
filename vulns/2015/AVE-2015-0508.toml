[basic]
description = "Mozilla Firefox PDF查看器（pdf.js）存在同源策略绕过漏洞，攻击者可通过精心构造的JavaScript代码结合原生setter，绕过同源策略限制，读取任意本地文件或提升权限。该漏洞影响Firefox 39.0.3之前版本、Firefox ESR 38.1.1之前版本及Firefox OS 2.2之前版本，CVSS评分8.8（高危）。攻击者诱导用户访问恶意网页即可触发（需用户交互），2015年8月已在野利用，Mozilla已于2015年8月发布安全更新修复。"
published = "2015-08-08T00:59:04.597"
remediation = "建议将 Firefox 升级至 39.0.3 或更高版本，Firefox ESR 升级至 38.1.1。如暂无法升级，可在 about:config 中设置 pdfjs.disabled 为 true 以禁用内置 PDF 查看器，或通过 about:preferences#applications 将 PDF 文件关联到外部程序打开，从而阻断攻击向量。事后应检查 .ssh/、.bash_history、FTP 客户端配置文件是否曾被异常访问，并更改相关密码。"
score = 8.8
severity = "HIGH"
sources = ["kev"]
title = "Mozilla Firefox PDF Viewer 同源策略绕过信息泄露漏洞"
updated = "2026-06-17T00:27:24.177"

