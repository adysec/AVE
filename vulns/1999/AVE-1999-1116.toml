[basic]
description = "BMC Software Patrol SNMP Agent 3.2.07 之前版本存在权限提升漏洞，本地攻击者可通过向 snmpmagt 程序传递目标文件路径作为第二个参数，以 root 权限创建任意全局可写文件。攻击者利用此漏洞可覆盖系统关键文件或植入恶意脚本，从而获取完全控制权。该漏洞影响 Patrol 3.2.07 之前所有版本，需本地访问权限，CVSS 评分 7.2，危害等级高。"
published = "1999-07-13T04:00:00.000"
remediation = "升级 BMC PATROL SNMP Agent 至 3.2.07 或更高版本，该版本修复了 snmpmagt 程序未正确校验文件路径参数的问题。如无法升级，限制本地用户对 snmpmagt 程序的执行权限，仅允许受信任的管理员账户使用。"
score = 7.2
severity = "HIGH"
sources = ["cve"]
title = "BMC Patrol SNMP Agent 本地文件创建权限提升漏洞"
updated = "2026-06-16T21:50:29.277"

