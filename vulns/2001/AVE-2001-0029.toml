[basic]
description = "Solaris 操作系统中的 patchadd 工具存在竞争条件漏洞，攻击者可在目标系统上拥有本地账户权限的情况下，利用符号链接攻击（symlink attack）在 patchadd 执行过程中劫持临时文件，从而导致任意文件覆写。该漏洞影响 Solaris 2.5.1/2.6/7.0/8 等多个版本，CVSS 评分 6.2，危害等级中等。攻击者通过预测或等待 patchadd 创建临时文件的时间窗口，将符号链接指向系统关键文件，实现提权或破坏系统完整性。"
published = "2001-02-12T05:00:00.000"
remediation = "升级到 Solaris 9 或更高版本，该问题已在后续版本中修复。对于仍运行 Solaris 8 的系统，安装 Sun 官方补丁编号 108434 或更高版本。限制普通用户对 /usr/bin/patchadd 的执行权限，仅允许 root 用户执行系统补丁操作。使用 Solaris 的 RBAC（基于角色的访问控制）严格管理补丁工具的调用权限。"
score = 6.2
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Sun Solaris patchadd 竞争条件漏洞"
updated = "2026-06-16T21:53:34.720"

