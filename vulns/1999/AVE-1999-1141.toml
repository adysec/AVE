[basic]
description = "Etype Eserv 2.50 Web服务器存在目录遍历漏洞，远程攻击者可通过在URL中包含`../`序列绕过路径限制，读取文件系统中的任意文件。该漏洞影响Eserv 2.50版本，攻击者无需身份认证即可利用，可能导致敏感信息泄露。由于该漏洞利用方式简单且影响范围明确，建议用户升级至最新版本或限制Web服务的文件访问权限。"
published = "1999-11-04"
remediation = "Etype Eserv 2.50已停止维护，建议立即迁移至主流Web服务器（如Apache/Nginx）替代。若无法迁移，应在Web服务器或反向代理层配置URL过滤规则，拦截包含`../`或`..%2f`的请求路径，同时确保Web根目录外的文件系统权限最小化。"
score = 5.0
severity = "MEDIUM"
sources = ["cve"]
title = "Etype Eserv 2.50 Web服务器目录遍历漏洞"
updated = "2026-06-16"

