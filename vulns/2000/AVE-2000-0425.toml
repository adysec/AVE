[basic]
description = "Concatus IMate Web Mail Server 2.5 的 SMTP 服务在处理 HELO 命令时存在缓冲区溢出漏洞，远程攻击者无需身份认证即可通过向目标发送超长 HELO 命令触发该漏洞，导致服务进程崩溃，造成拒绝服务。该漏洞影响 IMate Webmail Server 2.5 版本，可被远程利用，CVSS 评分 5.0，危害等级中危。"
published = "2000-06-01T04:00:00.000"
remediation = "Concatus IMate Web Mail Server 2.5 已停止维护，无官方补丁。建议立即迁移至仍受支持的邮件服务器（如 Postfix、Exim），并在迁移前于防火墙或 IPS 层面过滤包含超长 HELO 命令的 SMTP 流量，同时限制 SMTP 端口（25/TCP）仅对可信来源开放以降低暴露面。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Concatus IMate Web Mail Server 缓冲区溢出漏洞"
updated = "2026-06-16T21:51:53.020"

