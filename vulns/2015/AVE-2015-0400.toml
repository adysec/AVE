[basic]
description = "微软 Office 2007 SP3、2010 SP2、2013 SP1 和 2013 RT SP1 等版本在处理 EPS 文件时存在解析漏洞。攻击者可通过精心构造的畸形 EPS 文件，利用 Office 组件的弱点触发内存 corruption 并执行任意代码。该漏洞属于本地权限提升类型，攻击者无需权限即可触发，但需要用户交互（如打开恶意 EPS 文件）。受影响版本涵盖了多个 Microsoft Office 产品，攻击者可借此获取系统控制权。漏洞成因源于 EPS 文件解析过程中对输入数据的安全验证不足，导致代码执行控制权被恶意文件接管。此类漏洞的利用通常通过构建包含恶意 shellcode 的 EPS 文件，借助 Office 组件的自动加载机制达到远程代码执行的效果。"
published = "2015-09-09T00:59:52.190"
remediation = "建议立即安装 Microsoft 2015 年 9 月安全更新 MS15-099 (KB3085502、KB3085503、KB3085516、KB3085565)，分别对应 Office 2007 SP3、2010 SP2、2013 SP1、2013 RT SP1 修补版本。通过 Windows Update 自动更新或手动下载安装对应 KB 补丁包。无法立即打补丁时，可在组策略中禁用 EPS 文件格式解析（User Configuration > Administrative Templates > Microsoft Office 2010/2013 > Word Options > Advanced > Disable EPS picture format），或在信任中心禁用 EPS 文件打开预览，并部署 EMET 5.5 启用 EAF/SEHOP 缓解措施作为临时缓解。"
score = 7.8
severity = "HIGH"
sources = ["kev"]
title = "微软 Office EPS 文件漏洞畸形"
updated = "2026-06-17T00:24:16.650"

