[basic]
description = "Foundry Networks 公司 ServerIron 系列交换机存在 TCP/IP 序列号可预测漏洞。由于设备在生成 TCP 初始序列号时使用了可预测的算法或固定模式，远程攻击者无需认证即可通过分析网络流量推断出序列号，进而伪造 TCP 会话数据包实施会话劫持或欺骗攻击。该漏洞可导致攻击者冒充可信主机与目标设备建立连接，绕过访问控制策略，获取敏感信息或执行未授权操作。受影响设备为 ServerIron 系列交换机，攻击者需处于同一网络路径上才能实施有效攻击。"
published = "2000-02-28T05:00:00.000"
remediation = "升级 ServerIron 交换机固件至厂商修复版本，启用 TCP 序列号随机化功能。如无法升级，建议在网络边界部署 IPS/IDS 设备检测会话劫持行为，并对关键管理会话启用 IPsec 或 SSH 加密传输以防止欺骗攻击。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "Foundry Networks ServerIron TCP 序列号预测漏洞"
updated = "2026-06-16T21:51:09.800"

