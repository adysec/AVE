[basic]
description = "Microsoft Internet Explorer 5.01 的 WebBrowser 控件中 IFRAME 处理 NavigateComplete2 事件时存在跨框架安全策略绕过漏洞。远程攻击者可诱导用户访问精心构造的恶意网页，利用 IFRAME 的 NavigateComplete2 事件绕过跨框架安全策略，读取其他框架或窗口的敏感内容，导致信息泄露。该漏洞影响 Internet Explorer 5.01，攻击向量为网络，攻击复杂度高，无需身份认证但需要用户交互，仅造成部分机密性影响（CVSS 2.6，低危）。攻击者需构建包含恶意 IFRAME 的页面，诱使用户访问并触发 NavigateComplete2 事件以绕过同源策略限制。Microsoft 已发布安全更新修复此漏洞，建议用户升级至 IE 5.01 SP1 或更高版本。"
published = "2000-06-06T04:00:00.000"
remediation = "建议立即安装 Microsoft Internet Explorer 安全更新（Security Bulletin MS00-033 或 MS00-055 综合补丁），或将浏览器升级至 Internet Explorer 5.01 Service Pack 1 或 Internet Explorer 5.5。如无法立即升级，可在 Internet 选项的安全区域设置中禁用未信任站点的 Active Scripting，并避免在受保护模式下运行来自不可信域的 IFRAME 内容作为临时缓解措施。鉴于 Internet Explorer 已停止支持，建议全面迁移至 Microsoft Edge 等现代浏览器。"
score = 2.6
severity = "LOW"
sources = ["epss"]
title = "Microsoft Internet Explorer 5.01 跨框架安全策略绕过漏洞"
updated = "2026-06-16T21:51:52.427"

