[basic]
description = "Exim 邮件服务器 1.6.2 和 1.6.51 版本存在缓冲区溢出漏洞，本地攻击者可通过在 .forward 文件中构造过长的 :include: 选项触发溢出，从而提升权限至 root。该漏洞影响 Exim 特定版本，CVSS 评分 7.2，属高危本地提权漏洞，攻击需具备本地账户访问权限，利用方式为精心构造恶意 .forward 文件触发栈溢出执行任意代码。"
published = "1997-07-22T04:00:00.000"
remediation = "升级 Exim 至 2.0.0 或更高版本，该版本已修复 :include: 选项的缓冲区边界检查。如无法升级，在 /etc/exim/exim.conf 中禁用 .forward 文件处理（设置 allow_forward = false），并限制本地用户对 .forward 文件的写入权限（chmod 644）。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "Exim Buffer 1.6.2/1.6.51 缓冲区溢出（本地权限提升）漏洞"
updated = "2026-06-16T21:49:26.097"

