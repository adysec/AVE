[basic]
description = "IBMTivoli OPC Tracker Agent 2.1 版本因以不安全的权限（任意用户可读/可写）创建文件、目录及 IPC 消息队列，导致本地攻击者可修改或删除关键文件与 IPC 资源，从而破坏系统正常运行并可能提升权限。该漏洞影响 IBM/Tivoli OPC Tracker Agent 2.1 版本，CVSS 评分 7.2，危害等级高，需通过限制本地访问权限进行防范。"
published = "1998-10-02T04:00:00.000"
remediation = "升级至 IBM Tivoli Monitoring 6.x 或更高版本，新版本对文件、目录和 IPC 消息队列采用严格的默认权限控制（0640/0750）。如无法升级，在 OPC Tracker Agent 启动脚本中添加 umask 027，确保新建文件不为全局可读写；同时定期执行 `chmod -R o-rwx $OPC_HOME` 修正现有目录及 IPC 队列权限，防止本地非授权用户读取或篡改文件。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "IBM Tivoli OPC Tracker Agent 多漏洞权限提升漏洞"
updated = "2026-06-16T21:50:21.967"

