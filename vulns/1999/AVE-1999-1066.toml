[basic]
description = "Xlink Technology Omni-NFS/X Enterprise 6.1 中的 NFS 守护进程 nfsd.exe 存在资源耗尽型拒绝服务漏洞。远程攻击者可通过向 111 端口发送设置了 URG（紧急）标志的特定 TCP 数据包，导致 nfsd.exe 消耗大量系统资源，最终使 NFS 服务不可用。该漏洞影响 Omni-NFS/X Enterprise 6.1 版本，CVSS 评分 5.0，危害等级中等。攻击者无需认证即可触发，但需网络可达目标主机。"
published = "1999-10-06T04:00:00.000"
remediation = "该产品（Xlink Technology Omni-NFS/X Enterprise 6.1）已停止维护，厂商不再提供安全更新。建议立即迁移至受支持的 NFS 服务器方案（如 Windows Server 原生 NFS 服务或第三方活跃维护的 NFS 软件）。临时缓解措施：在边界防火墙上限制对 TCP/UDP 111 端口的访问，仅允许可信 IP 连接，并禁用 NFS 服务的 URG 标志包处理。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Xlink Technology Omni-NFS/X Enterprise 6.1 NFS 守护进程 nfsd.exe 拒绝服务漏洞"
updated = "2026-06-16T21:50:15.080"

