[basic]
description = "W3.org Anaya Web 开发服务器中的 sendtemp.pl 脚本存在目录遍历漏洞，远程攻击者可通过在 templ 参数中构造 `../` 序列绕过路径限制，读取服务器上任意文件，包括配置文件、密码文件等敏感信息。该漏洞无需身份认证即可利用，攻击复杂度低，影响使用该 Web 服务器的系统。"
published = "2001-05-03T04:00:00.000"
remediation = "立即将 sendtemp.pl 中对 templ 参数的用户输入做严格路径规范化，过滤 `../` 及空字节编码绕过。如 W3.org Anaya 服务端已无官方补丁，应迁移至现代受支持的 Web 服务器（如 Apache/Nginx），停止使用已废弃的 Anaya 开发服务器。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "W3.org Anaya Web 开发服务器目录遍历漏洞"
updated = "2026-06-16T21:54:00.280"

