[basic]
description = 'Sun Solaris x86 2.4/2.5/2.5.1 的 nlps_server 组件存在缓冲区溢出漏洞，远程攻击者可通过向 TCP 2766 端口（System V listener）发送以 "NLPS:002:002:" 开头超长字符串触发该漏洞，导致以 root 权限执行任意代码。该漏洞影响 Solaris x86 多个版本，CVSS 评分 9.8，危害等级严重，无需身份认证即可远程利用。'
published = "1999-12-31T05:00:00.000"
remediation = "升级 Solaris 至 2.6 及以上版本以彻底修复 nlps_server 缓冲区溢出漏洞；如无法升级，立即停止 nlps_server 服务（/etc/init.d/nlps stop）并从 inetd.conf 中注释掉相关行，同时在防火墙层面阻断 TCP 端口 2766 的入站流量作为临时缓解措施。"
score = 9.8
severity = "CRITICAL"
sources = ["exploitdb"]
title = "Sun Solaris x86 nlps_server 缓冲区溢出漏洞"
updated = "2026-06-16T21:50:46.927"

