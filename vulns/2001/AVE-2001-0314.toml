[basic]
description = 'CVE-2001-0711 是一个影响支持ATM（异步传输模式）功能的 Cisco IOS 11.x 和 12.0 版本的拒绝服务漏洞。该漏洞源于ILMI（临时本地管理接口）模块中使用了一个未在文档中公开的SNMP社区字符串，且该字符串默认值通常为公开可猜的弱口令（如"public"）。未经身份认证的远程攻击者只要能够访问目标设备的ATM网络接口，即可利用该默认社区字符串向设备发送大量或畸形的SNMP请求，导致设备的SNMP服务进程异常终止或系统崩溃重启，从而造成拒绝服务（DoS）攻击，中断网络通信。该漏洞影响所有在启用ATM功能时未修改默认ILMI社区字符串的 Cisco IOS 11.x 和 12.0 版本设备。'
published = "2001-08-31T04:00:00.000"
remediation = "建议立即将 Cisco IOS 升级至 12.0(3)T 及以上版本，该版本已修复 ILMI 社区字符串默认读写权限问题。如无法立即升级，应在全局配置模式下通过 `no snmp-server community ilmi` 命令禁用默认 ILMI 社区字符串，并通过 ACL 限制 SNMP 访问来源（如 `access-list 1 permit <管理网段>` 配合 `snmp-server community <强密码> RO 1`）。对于 ATM 接口，建议在接口配置模式下使用 `no atm ilmi-keepalive` 关闭 ILMI 心跳，或通过 `snmp-server view <viewname> system included` 限制 SNMP 可访问的 MIB 对象范围，防止攻击者修改系统名称、位置及联系人等配置信息。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "思科 IOS ILMI SNMP 未文档化社区字符串拒绝服务漏洞"
updated = "2026-06-16T21:54:48.980"

