[basic]
description = "Bugzilla 的 process_bug.cgi 脚本未对用户输入进行有效过滤，远程攻击者可通过在参数中注入 shell 元字符（如分号、管道符等）执行任意操作系统命令。该漏洞影响 Bugzilla 2.10.x 及更早版本，攻击者无需身份认证即可利用，危害等级高（CVSS 7.5），可能导致服务器被完全控制。"
published = "2000-05-11T04:00:00.000"
remediation = "升级 Bugzilla 至 2.17.4 或更高版本，该版本已修复 process_bug.cgi 对 shell 元字符的过滤缺陷。如无法升级，在 Web 服务器层（如 Apache mod_rewrite）限制对 process_bug.cgi 的访问，仅允许可信 IP 调用，并对所有用户输入执行严格的元字符转义。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "Mozilla Bugzilla 远程命令执行漏洞"
updated = "2026-06-16T21:51:41.833"

