[basic]
description = "HIS Auktion 1.62 存在目录遍历漏洞，远程攻击者通过在 menue 参数中注入 ../ 序列可读取服务器上的任意文件，结合 shell 元字符可能进一步执行任意命令。该漏洞无需身份认证即可利用，影响所有运行 HIS Auktion 1.62 的 Web 服务器，CVSS 评分 7.5，危害等级高。建议升级至最新版本或对用户输入进行严格过滤。"
published = "2001-06-02T04:00:00.000"
remediation = "HIS Auktion 1.62 已停止维护，无官方补丁。建议立即迁移至仍在维护的电子商务/拍卖系统（如 Magento、WooCommerce 等）替代此过期软件。若必须继续使用，可在 Web 服务器层（Apache mod_rewrite 或 Nginx）添加规则拦截 menue 参数中的 ../ 及 shell 元字符（; | ` 等），并对用户输入做严格的路径白名单校验，同时将 Web 应用以最小权限运行并限制文件系统访问范围。"
score = 7.5
severity = "HIGH"
sources = ["exploitdb"]
title = "HIS Auktion 1.62 目录遍历漏洞"
updated = "2026-06-16T21:53:53.547"

