[basic]
description = "SSH 协议 1 和 2（即 SSH-2）在 OpenSSH 及其他软件包实现中存在多个安全弱点，远程攻击者可通过网络嗅探方式获取以下敏感信息：用户名和密码长度或长度范围，从而大幅简化暴力破解密码的攻击难度；当前会话是否正在使用 RSA 或 DSA 认证方式；RSA 认证方式下已配置的 authorized_keys 密钥数量；以及经加密的 shell 命令长度数据。这些信息泄露会严重削弱 SSH 身份验证的安全性，使攻击者能够更有针对性地实施后续口令猜测或密码暴力破解攻击。该漏洞影响 OpenSSH 及多种实现了 SSH 协议 1 和 2 的软件产品， exploiting 条件为攻击者能够监听目标服务器与客户端之间的网络流量，CVSS 评分 7.5，危害等级高。"
published = "2001-08-22T04:00:00.000"
remediation = "将 OpenSSH 升级至 2.9.9 或更高版本（3.0.2 及以上版本已默认禁用 SSH 协议 1），并修改 sshd_config 配置文件，将 Protocol 设置为 2 以强制仅使用 SSH 协议 2，重启 sshd 服务使配置生效。如使用 Red Hat Enterprise Linux，请安装 Red Hat 安全更新 RHSA-2001-033 以获取已修复的 openssh 软件包。若暂时无法升级，通过防火墙或 iptables 对 SSH 端口（22/tcp）启用 IP 白名单限制，仅允许可信来源访问，以减少中间人嗅听的风险。"
score = 7.5
severity = "HIGH"
sources = ["redhat"]
title = "OpenSSH SSH协议远程信息泄露漏洞"
updated = "2026-06-16T21:54:33.523"

