[basic]
description = "ASP.NET Core Negotiate 认证组件中存在认证算法实现缺陷漏洞（CWE-303），由于 Microsoft.AspNetCore.Authentication.Negotiate 包对身份验证算法的实现不正确，已获得授权的攻击者可通过网络向目标 ASP.NET Core 应用发送特制的认证请求，利用 Negotiate 认证与 LDAP 角色查询组合场景下的逻辑缺陷，将自身权限提升至管理员级别。该漏洞影响 .NET 8/9/10 及对应的 Visual Studio 产品，仅在使用 Negotiate 认证且通过 LDAP 检索角色信息时受影响。CVSS 评分 8.8，危害等级高。Microsoft 已在 2026 年 7 月安全更新中发布修复版本。"
published = "2026-07-14T19:17:08.303"
remediation = "将 Microsoft.AspNetCore.Authentication.Negotiate 包升级至 .NET 8.0.29 / .NET 9.0.18 / .NET 10.0.10 及以上版本；通过 `dotnet --info` 确认当前版本，在项目文件中更新 PackageReference 版本号后重新生成部署。如无法立即升级，可临时禁用 Negotiate 认证方式或避免使用 LDAP 检索角色信息作为缓解措施。"
score = 8.8
severity = "HIGH"
sources = ["ghsa"]
title = "Microsoft ASP.NET Core Negotiate 认证特权提升漏洞"
updated = "2026-07-22T17:33:12.873"

