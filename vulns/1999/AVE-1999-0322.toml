[basic]
description = "OpenBSD 内核存在资源泄漏漏洞，该漏洞导致 IPsec 安全协议的加密机制失效，使得本应加密传输的 IPsec 数据包能够以明文形式未经加密直接发送。攻击者可利用此漏洞绕过 IPsec 提供的数据传输加密保护，截获或监听本应受保护的网络通信内容，造成敏感信息泄露。该漏洞影响运行 OpenBSD 系统且启用 IPsec 功能的设备，攻击条件为攻击者需位于网络传输路径上以截获未加密的数据包。OpenBSD 已在后续版本中修复此内核泄漏问题，建议用户及时升级系统版本。"
published = "1999-08-06T04:00:00.000"
remediation = "升级至 OpenBSD 2.6 及以上版本，该版本修复了内核中 IPsec 处理流程的内存泄漏问题，确保所有 IPsec 数据包均被正确加密后发送。若无法升级，可临时禁用 IPsec 功能或使用 pf 防火墙限制相关流量。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "OpenBSD 内核 IPsec 数据包未加密发送漏洞"
updated = "2026-06-16T21:48:55.840"

