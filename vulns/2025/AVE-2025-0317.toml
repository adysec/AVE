[basic]
description = "用友 NC 系统 getFormltem 接口的 doPost 方法存在 SQL 注入漏洞，由于未对用户输入参数进行充分过滤和转义，远程攻击者可在未授权情况下发送特制的 HTTP POST 请求，注入恶意 SQL 语句实现对后台数据库的查询、修改或删除，导致敏感数据泄露或服务器被控。该漏洞影响用友 NC 多个版本。"
published = "2025-07-09"
remediation = "升级用友 NC 至官方发布的最新安全补丁版本，NC6.5 及以上系列请更新至 2025 年安全补丁包。若无法立即升级，在 Web 应用防火墙或反向代理层配置规则拦截对 /service/~iufo/nc.bs.pf.xx.getFormltem 路径的 POST 请求，对请求参数中包含 SQL 关键字（如 SELECT、UNION、DROP 等）的流量进行拦截，并限制该接口仅允许可信内网 IP 地址访问。"
score = 5.0
severity = "MEDIUM"
sources = ["hwpoc"]
title = "用友NC getFormltem doPost SQL注入漏洞"
updated = "2025-07-09"

