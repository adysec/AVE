[basic]
description = "Sudo 1.9.17p1 之前版本存在授权机制缺陷，当 sudoers 配置文件中指定的主机既非当前主机也非 ALL 时，被授权的用户可在非预期主机上执行命令，导致越权访问。攻击者利用此漏洞可绕过主机级别的访问控制限制，在未授权的主机上以提权用户身份执行任意命令。该漏洞影响所有使用受影响版本 sudo 的 Linux/Unix 系统，CVSS 评分 2.8，危害等级低。建议升级至 sudo 1.9.17p1 或更高版本修复。"
published = "2025-06-30T21:15:30.080"
remediation = "立即升级 sudo 至 1.9.17p1 或更高版本（各发行版已发布更新：Ubuntu USN-7604-1、Debian DSA、Gentoo）。同时检查 /etc/sudoers 及 /etc/sudoers.d/ 下所有规则，避免使用非当前主机且非 ALL 的 Host_List 条目，确保主机限制精确匹配。"
score = 2.8
severity = "LOW"
sources = ["hwpoc"]
title = "Sudo 1.9.17p1 之前版本 host 选项本地提权漏洞"
updated = "2026-07-14T13:17:33.347"

