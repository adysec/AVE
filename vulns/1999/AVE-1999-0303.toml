[basic]
description = "Oracle 8.x 在 Unix 平台上的 Intelligent Agent（智能代理）中包含一个名为 oratclsh 的 Tcl 解释器，该解释器被设置了 SUID root 权限。由于程序在安装时赋予了过高的特权且未做权限降减处理，本地已登录的低权限用户可直接调用 oratclsh 并在其中执行任意 Tcl 命令，这些命令将以 root 身份运行，从而实现本地权限提升。该漏洞影响运行于 Unix 系统的 Oracle 8.x 数据库智能代理组件，攻击条件为攻击者需具备目标主机的本地登录权限（无需远程网络访问），利用方式即运行 oratclsh 后输入或加载恶意 Tcl 脚本以获取 root 级控制权。"
published = "1999-04-29T04:00:00.000"
remediation = "将 Oracle 8.x 智能代理 for Unix 中的 oratclsh 解释器文件去除 setuid root 权限（执行 chmod u-s oratclsh），并升级到 Oracle 官方发布的修复版本（Oracle 8.1.5 及以上补丁集）。在无法立即升级时，应限制该二进制文件仅 root 可访问（chmod 700 oratclsh），并审查 $ORACLE_HOME 目录下所有 setuid 程序权限，避免本地用户借其以 root 身份执行 Tcl 命令。"
score = 4.6
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Oracle 8.x Intelligent Agent oratclsh 本地权限提升漏洞"
updated = "2026-06-16T21:48:53.820"

