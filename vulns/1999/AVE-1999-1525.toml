[basic]
description = 'Internet Explorer 3 浏览器在记录用户访问历史时，将 URL 信息存入 Temporary Internet Files 和 History 文件夹的 DAT 文件中。当用户选择"清除历史记录"选项后，这些 DAT 文件并未被实际删除，且由于浏览器的定制化显示机制，用户通过资源管理器浏览这些文件夹时无法看到 DAT 文件。本地攻击者可利用此缺陷获取用户完整的浏览记录，导致敏感信息泄露。CVSS 评分 2.1，危害等级低。'
published = "1997-08-05T04:00:00.000"
remediation = "建议升级至 Internet Explorer 4.0 或更高版本，该版本已修复历史记录清理不彻底的问题。如无法升级，可手动删除 Temporary Internet Files 和 History 文件夹中的 DAT 文件（如 index.dat），或使用第三方清理工具（如 CCleaner）定期清除浏览记录作为临时缓解措施。"
score = 2.1
severity = "LOW"
sources = ["epss"]
title = "Microsoft Internet Explorer URL历史记录信息泄露漏洞"
updated = "2026-06-16T21:50:27.480"

