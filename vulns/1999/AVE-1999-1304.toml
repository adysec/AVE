[basic]
description = "RealNetworks RealServer 的 pnserver 组件（默认监听 7070 端口）在处理客户端发送的特制短格式请求时，由于对输入数据长度与格式校验不足，会触发解析异常导致服务进程崩溃。攻击者在无需认证的情况下，只需向目标端口发送畸形数据包即可使 pnserver 停止响应，造成拒绝服务，影响正常流媒体服务的可用性。该漏洞于 1998 年被公开披露，影响当时广泛部署的 RealServer 早期版本。"
published = "1998-01-15T05:00:00.000"
remediation = "升级到 RealNetworks 官方已修复该问题的 RealServer 后续版本，或安装厂商发布的安全补丁。若无法立即升级，可在防火墙或边界设备上通过 ACL 限制对 7070 端口的入站访问，仅允许可信来源连接；同时在入侵检测系统上部署规则，监控并拦截向端口 7070 发送短格式畸形请求的行为，作为临时缓解措施。"
score = 7.8
severity = "HIGH"
sources = ["avd"]
title = "RealNetworks RealServer pnserver 畸形请求拒绝服务漏洞"
updated = "2026-06-16T21:49:35.440"

