[basic]
description = "SGI IRIX 操作系统自带的 Performer API Search Tool（performer_tools）组件中的 pfdispaly.cgi 脚本存在目录遍历漏洞。远程攻击者无需身份认证，通过向该脚本发送包含 `../` 等路径遍历序列的特制 HTTP 请求，即可突破路径限制，读取服务器上任意文件（如 `/etc/passwd` 等敏感配置信息）。该漏洞影响 SGI IRIX 系统上安装了 performer_tools 组件的版本，CVSS 评分 5.0，危害等级中等。"
published = "1998-04-03T05:00:00.000"
remediation = "立即安装 SGI 安全公告 19980401-01-P 提供的补丁，升级 performer_tools 至修复版本。如无法打补丁，在 Web 服务器配置中限制对 pfdispaly.cgi 的访问，仅允许受信任 IP 范围请求该 CGI 程序。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "SGI IRIX Performer API Search Tool pfdispaly.cgi 目录遍历任意文件读取漏洞"
updated = "2026-06-16T21:48:02.600"

