[basic]
description = "SCO UnixWare 7.0.x 及 2.1.3 系统中 Netscape FastTrack Server 2.x、Enterprise Server 2.0 和 Proxy Server 2.5 的安装文件权限设置不当，导致本地攻击者可通过访问权限过高的敏感文件或目录获取 root 权限。该漏洞源于软件安装过程中未正确限制文件访问权限，攻击者无需认证即可利用此缺陷实现权限提升，CVSS 评分 10.0，危害等级严重。建议升级至修复版本或手动修正文件权限。"
published = "2001-03-12T05:00:00.000"
remediation = "升级至 Netscape FastTrack Server 3.0 及以上版本。对无法升级的系统，立即修复文件权限：以 root 执行 `chmod 755 /opt/netsuite/suitespot/bin` 及 `chmod 644 /opt/netsuite/suitespot/*.conf`，移除不必要的 setuid 二进制文件，并将敏感目录属主改为 `nobody`。在 /etc/inetd.conf 中禁用不必要的 Netscape 服务端口作为临时缓解。"
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "SCO UnixWare Netscape 服务器权限提升漏洞"
updated = "2026-06-16T21:51:26.753"

