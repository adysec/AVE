[basic]
description = "Red Hat Linux 6.1 系统中的可插拔认证模块（PAM）存在账户锁定缺陷，未能正确限制对已禁用的 NIS（网络信息服务）账户的访问权限。本地攻击者可利用此漏洞，通过仍然有效的认证凭据以已禁用账户身份登录系统，绕过账户禁用策略，获取非授权的系统访问权限。CVSS 评分 4.6，危害等级中危。"
published = "1999-10-13T04:00:00.000"
remediation = "升级 Red Hat Linux 至 6.2 或更高版本，或安装 Red Hat 官方发布的 PAM 安全更新补丁。如无法升级，可在 /etc/pam.d/ 配置文件中为涉及 NIS 认证的服务添加 account 模块的 required 锁定规则，确保 pam_unix_acct 在 pam_nis 之前执行账户状态检查，防止已禁用的 NIS 账户绕过认证。"
score = 4.6
severity = "MEDIUM"
sources = ["redhat"]
title = "Red Hat Linux PAM NIS 禁用账户访问控制漏洞"
updated = "2026-06-16T21:51:32.820"

