[basic]
description = "CamShot WebCam 2.6 Trial 存在远程缓冲区溢出漏洞，攻击者可通过向目标服务发送特制的超长 Authorization 头触发缓冲区溢出，从而在远程服务器上执行任意命令。该漏洞无需身份认证即可利用，CVSS 评分 7.5，危害等级高，影响 CamShot WebCam Trial 2.6 版本。"
published = "2000-11-14T05:00:00.000"
remediation = "建议立即停止使用 CamShot WebCam Trial 2.6，CamShot 厂商早已停止对该产品的支持且无安全更新可用。永久修复方案为迁移至仍在维护的现代网络摄像头服务软件。临时缓解措施：在反向代理或 Web 应用防火墙上限制 HTTP Authorization 请求头长度不超过 1024 字节，并对请求头实施严格的输入长度校验，防止恶意超长头部触发缓冲区溢出。"
score = 7.5
severity = "HIGH"
sources = ["exploitdb"]
title = "CamShot WebCam 2.6 远程缓冲区溢出漏洞"
updated = "2026-06-16T21:52:34.097"

