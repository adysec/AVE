[basic]
description = "哪吒面板存在路径穿越漏洞，攻击者可通过构造特殊的路径请求读取服务器上的 JWT 密钥文件，进而伪造合法令牌实现未授权接管面板管理权限。该漏洞影响哪吒面板 v2.0.13 之前的所有版本，攻击者只需网络可达目标面板即可远程利用，无需任何认证。建议立即升级至 v2.0.13 及以上版本修复。"
published = "nday"
remediation = "立即升级至哪吒面板 v2.0.13 或以上版本，该版本修复了路径穿越漏洞。升级后需重新生成 JWT 密钥并重启面板服务，确保旧的已泄露密钥失效。如无法立即升级，可在反向代理层添加路径规范化规则，阻止包含 ../ 等目录穿越特征的请求访问面板管理接口。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "NeZha 哪吒面板路径穿越漏洞"
updated = "nday"

