[basic]
description = "FreeBSD 实现的 T/TCP（事务型 TCP 扩展）存在源地址欺骗缺陷。T/TCP 通过 TAO 机制缓存对端连接状态以加速事务连接，但在建立连接时未对源 IP 地址进行充分验证，远程攻击者可通过伪造此前通信过的合法主机 IP 地址，冒充可信对端跳过正常三次握手直接建立连接。该漏洞影响启用 T/TCP 扩展的 FreeBSD 系统网络服务，攻击者可借此绕过身份认证与连接校验，发起未授权连接、数据注入或会话欺骗等攻击，造成信息泄露或数据被篡改。攻击仅需网络可达且目标启用 T/TCP，无需身份认证，利用门槛较低，CVSS 2.0 评分 7.5。"
published = "1998-05-01T04:00:00.000"
remediation = '建议升级 FreeBSD 至已禁用 T/TCP 扩展的版本（如 3.3-RELEASE 及以上），或通过在内核配置中设置 `options TCP_NO_TTCP` 并重新编译内核来关闭 T/TCP 功能；运行时可在 `/etc/rc.conf` 中添加 `tcp_extensions="NO"` 并重启网络服务。如暂无法升级，可在边界防火墙和路由器上过滤伪造源 IP 的 T/TCP 流量作为临时缓解措施。'
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "FreeBSD T/TCP 事务扩展模块欺骗攻击漏洞"
updated = "2026-06-16T21:49:04.550"

