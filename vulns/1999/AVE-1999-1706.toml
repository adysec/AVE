[basic]
description = "Internet Explorer 4 在处理 URL 中的 32 位无点 IP 地址时存在解析逻辑缺陷，将点分十进制格式以外的纯数字 IP 地址误识别为主机名而非 IP 地址，导致浏览器错误地应用本地 Intranet 区域安全策略。远程攻击者可构造包含无点 IP 地址的恶意 URL，诱使用户访问后绕过正常的安全区隔离，从而执行未授权操作。该漏洞影响 Internet Explorer 4 及早期版本，增大了内网环境下的攻击面。"
published = "1999-12-31T05:00:00.000"
remediation = "升级到 Internet Explorer 5.0 或更高版本，或改用现代浏览器（如 Edge/Chrome/Firefox）。IE 4 已停止支持且不再接收安全更新，应彻底停止使用。无法升级时可配置代理服务器过滤包含纯数字 IP 的 URL 请求作为临时缓解措施。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "Microsoft Internet Explorer 无点IP地址安全区域绕过漏洞"
updated = "2026-06-16T21:49:41.647"

