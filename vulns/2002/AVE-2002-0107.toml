[basic]
description = "Farm9 Cryptcat 是一款支持加密的网络工具，当其以服务器模式配合 `-e` 参数启动时存在设计缺陷，未能按预期启用加密功能。这导致客户端与服务器之间的通信实际以明文传输，违背了加密配置的安全意图。攻击者可通过网络嗅探方式窃听通信链路，获取传输中的敏感信息（如口令、会话令牌等）。攻击条件简单，只需攻击者能够访问通信链路即可实施，无需认证，属中等危害等级的信息泄露漏洞。"
published = "2002-12-31T05:00:00.000"
remediation = "建议立即停止使用 cryptcat 服务端模式的 -e 加密选项，改用 SSH、stunnel 或 TLS 隧道等成熟加密工具替代。如必须使用 cryptcat，请升级至社区维护版本（如 cryptcat 1.10+）或改用 netcat 配合 OpenSSL 实现加密通信。若无法替换，请在网络层面部署 IPsec/VPN 隔离通信链路，禁止明文端口直接暴露公网。建议升级至 cryptcat 1.10 版本或使用 netcat-openbsd 配合 stunnel 实现加密传输，并在防火墙层面限制仅允许加密隧道端口通信。"
score = 5
severity = "MEDIUM"
sources = ["osv"]
title = "Farm9 Cryptcat 加密连接绕过漏洞"
updated = "2026-06-16T21:59:43.700"

