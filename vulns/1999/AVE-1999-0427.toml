[basic]
description = "部分 Linux 系统（如 Slackware）的 POP3 邮件服务存在认证绕过漏洞，当系统启用影子密码（shadow passwords）时，POP3 守护进程未能正确验证用户凭证，远程攻击者无需有效账号即可通过 POP3 协议访问目标系统上的邮件文件，导致敏感信息泄露。攻击复杂度低，危害较大。受影响系统包括使用 shadow passwords 机制的早期 Linux 发行版本。"
published = "1995-03-01T05:00:00.000"
remediation = "升级 Slackware Linux 的 POP3 守护进程 (如 popper) 到已修复版本，或禁用 POP3 服务改用 IMAP+SSL。确保 /etc/shadow 文件权限为 400 且仅 root 可读，避免使用未加密的 POP3 协议传输密码。如系统已不再维护，建议迁移至受支持的 Linux 发行版。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "Slackware Linux POP3 邮件文件未授权访问漏洞"
updated = "2026-06-16T21:47:59.133"

