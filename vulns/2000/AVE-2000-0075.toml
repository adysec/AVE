[basic]
description = "VMware Workstation 1.1.2 存在符号链接攻击漏洞，本地攻击者可通过创建恶意的符号链接文件诱导系统错误操作，导致目标服务崩溃或资源耗尽，造成拒绝服务。该漏洞影响 VMware Workstation 1.1.2 版本，CVSS 评分 3.6，危害等级低，攻击者需要本地系统访问权限方可利用。"
published = "2000-01-17T05:00:00.000"
remediation = "建议升级至 VMware 2.0 或更高版本，该版本修复了本地符号链接攻击导致的拒绝服务问题。如无法升级，通过修改 /tmp 目录权限为 1777（chmod 1777 /tmp）并限制不可信用户的本地访问权限可缓解风险。同时在 VMware 配置文件中禁用默认共享目录功能。"
score = 3.6
severity = "LOW"
sources = ["avd"]
title = "VMWare 1.1.2 本地符号链接攻击拒绝服务漏洞"
updated = "2026-06-16T21:50:58.780"

