[basic]
description = "Technote 的 print.cgi 脚本存在目录遍历漏洞，远程攻击者可通过向 board 参数传入 `../` 等路径穿越序列，绕过访问限制读取服务器上的任意文件。攻击无需身份认证，仅需向目标 Web 服务发送特制 HTTP 请求即可触发。该漏洞可导致敏感信息泄露，影响运行 Technote 2000/2001 版本的系统。"
published = "2001-02-12T05:00:00.000"
remediation = "建议立即升级 Technote 至官方最新版本，或完全移除 print.cgi 脚本。作为临时缓解措施，可在 Web 服务器层（如 Apache 的 mod_rewrite）拦截包含 `..` 路径遍历特征的请求，或限制对 print.cgi 的访问来源 IP。如该软件已停止维护，建议迁移至更安全的替代方案。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Technote 2000/2001 print.cgi 目录遍历漏洞"
updated = "2026-06-16T21:53:36.450"

