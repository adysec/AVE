[basic]
description = "TYPSoft FTP Server 0.78 及更早版本存在缓冲区溢出漏洞。远程攻击者无需身份认证，可通过向 FTP 服务发送超长的 USER、PASS 或 CWD 命令触发缓冲区溢出，导致服务进程崩溃进而引发拒绝服务，在特定条件下可实现任意代码执行。该漏洞 CVSS 评分 10.0，危害等级严重，影响所有 0.78 及之前版本的 TYPSoft FTP Server。"
published = "2000-12-11T05:00:00.000"
remediation = "升级 TYPSoft FTP Server 至 0.78 以上版本。由于该软件已停止维护，建议迁移至 FileZilla Server 或 vsftpd 等活跃维护的 FTP 服务端。无法替换时，可在防火墙配置规则限制对 FTP 端口的访问来源 IP，并在网关层对 USER/PASS/CWD 命令长度进行限制作为临时缓解。"
score = 10
severity = "CRITICAL"
sources = ["exploitdb"]
title = "TYPSoft FTP Server 远程拒绝服务漏洞"
updated = "2026-06-16T21:53:01.053"

