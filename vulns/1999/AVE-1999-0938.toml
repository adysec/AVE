[basic]
description = "Microsoft NetMeeting 2.1 存在信息泄露漏洞。当聊天框为空时，攻击者可通过向目标用户发送特制的 CTRL-C 组合键消息，触发客户端读取并返回对方剪贴板中的内容，导致敏感信息被未授权获取。该漏洞影响 NetMeeting 2.1 版本，攻击者只需与目标建立 NetMeeting 会话即可利用，无需额外身份认证，CVSS 评分 6.4，危害等级中危。"
published = "1999-05-04T04:00:00.000"
remediation = '建议立即卸载 Microsoft NetMeeting 组件，通过控制面板"添加/删除 Windows 组件"移除 NetMeeting。微软已停止支持该产品，不再提供安全更新。如无法卸载，应在防火墙层面限制 TCP 端口 1720 及动态 RTP 端口，仅允许受信网络内的 NetMeeting 通信，并禁止在聊天窗口中使用 Ctrl+C 快捷键作为临时缓解措施。'
score = 6.4
severity = "MEDIUM"
sources = ["avd"]
title = "Microsoft NetMeeting 剪贴板信息泄露漏洞"
updated = "2026-06-16T21:49:42.933"

