[basic]
description = "Unix 系统 locale（本地化）子系统的部分函数（如 gettext、catopen）未能正确过滤用户注入的格式化字符串，本地攻击者可通过设置特定的环境变量向受影响函数传递恶意格式化字符串，触发格式化字符串漏洞，导致攻击者能够以目标进程权限执行任意命令，实现本地权限提升。该漏洞影响多种 Unix 及 Linux 发行版中使用的 glibc 库，危害严重。"
published = "2000-11-14T05:00:00.000"
remediation = "升级 glibc 至 2.2 及以上版本（2.1.92 已修复），该漏洞在格式化字符串实现中增加了 %n 限制和对用户可控格式字符串的过滤。如无法升级，可通过移除本地用户对 LC_*、LANG 等环境变量的写入权限，或限制不可信用户本地登录作为临时缓解措施。"
score = 10
severity = "CRITICAL"
sources = ["exploitdb"]
title = "GNU glibc locale 格式化字符串本地权限提升漏洞"
updated = "2026-06-16T21:52:35.100"

