[basic]
description = "IRIX 6.x 及更早版本中 Korn Shell（ksh）的 suid_exec 程序存在缓冲区溢出漏洞。该 SUID 程序以 root 权限运行，本地攻击者可通过构造超长输入参数触发缓冲区溢出，进而获取系统 root 权限。该漏洞影响 SGI IRIX 6.4 及更早版本系统，CVSS 评分 7.2。攻击者需要拥有目标系统的本地 shell 访问权限才能利用此漏洞实现本地提权。"
published = "1998-04-08T04:00:00.000"
remediation = "应用 SGI 安全公告 19980405-01-I 提供的补丁，将 IRIX 系统升级至修复该漏洞的版本；如暂时无法打补丁，可通过执行 chmod -s /usr/bin/suid_exec 移除 suid_exec 程序的 SUID 权限位作为临时缓解措施，限制本地用户以 root 身份执行该程序。"
score = 7.2
severity = "HIGH"
sources = ["exploitdb"]
title = "SGI IRIX Korn Shell suid_exec 缓冲区溢出本地权限提升漏洞"
updated = "2026-06-16T21:49:45.003"

