[basic]
description = "NetWin DMail 2.7/2.8 的 DSMTP 组件在处理 ETRN 命令时存在缓冲区溢出漏洞，远程攻击者无需身份认证即可通过向 SMTP 服务发送超长 ETRN 请求触发该漏洞，导致目标系统执行任意代码。该漏洞影响 NetWin DMail 2.7q 及 2.8 版本，CVSS 评分 10.0，危害等级严重，攻击者可完全控制受影响系统。"
published = "2000-06-01T04:00:00.000"
remediation = "立即升级至 NetWin DMail 2.7r（正式版）或 2.8k（测试版），下载地址 https://netwinsite.com/dmail/download.htm。如无法升级，可在防火墙或 iptables 层面限制对 TCP 25 端口的 ETRN 命令访问，仅允许受信任 IP 连接 SMTP 服务。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "NetWin DMail DSMTP ETRN 缓冲区溢出漏洞"
updated = "2026-06-16T21:51:50.777"

