[basic]
description = "Linux 内核 blk-mq 块设备多队列子系统中存在内存泄漏漏洞（CWE-401）。该漏洞源于 blk_mq_init_allocated_queue 函数在初始化硬件队列失败时，异常路径提前将 q->mq_ops 置空，导致 blk_release_queue 无法正确释放已分配的 hctx 结构体，从而造成内核内存泄漏。本地攻击者可通过加载恶意块设备驱动模块（如 null_blk）触发此漏洞，持续利用可能导致系统内存资源耗尽，引发拒绝服务。CVSS 评分 5.5，危害等级中等。该漏洞影响 Linux 内核主线版本，建议更新至包含补丁的内核版本。"
published = "2025-05-01T15:16:15.167"
remediation = "升级 Linux 内核至修复版本（如 5.15.x / 6.1.x 系列中已合入此补丁的最新长期支持版本），或从 kernel.org 更新至包含 commit 补丁「blk-mq: call blk_release_queue in exception path」的内核。如无法立即升级，建议在受影响的系统上卸载 null_blk 模块（modprobe -r null_blk）并禁用自动加载，以消除 kmemleak 触发路径。"
score = 5.5
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux 内核 blk-mq 内存泄漏漏洞"
updated = "2026-06-17T05:19:27.923"

