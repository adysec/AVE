[basic]
description = "Fujitsu Chocoa IRC 客户端 1.0 beta7R 版本存在缓冲区溢出漏洞，源于程序在处理 IRC 频道主题（TOPIC）消息时，未对服务器返回的主题字符串长度进行充分校验，导致超长数据覆盖相邻内存区域。攻击者通过控制 IRC 服务器或在用户加入频道时发送构造的超长主题内容，可触发缓冲区溢出，进而可能实现远程代码执行或导致客户端崩溃。该漏洞影响运行 Fujitsu Chocoa 1.0 beta7R 的所有 Windows 用户，CVSS 评分 5.1，危害等级中等。用户应升级至更新版本以修复此漏洞。"
published = "1999-08-01T04:00:00.000"
remediation = "建议停止使用 Fujitsu Chocoa 1.0 beta7R，该版本已不再维护且无官方补丁，应迁移至目前仍在维护的 IRC 客户端（如 HexChat、irssi 或 WeeChat）以彻底消除此缓冲区溢出风险。临时缓解措施：不要加入包含超长或不可信 channel topic 的 IRC 频道，并在防火墙中限制客户端对外连接至仅信任的 IRC 服务器地址。"
score = 5.1
severity = "MEDIUM"
sources = ["epss"]
title = "Fujitsu Chocoa 1.0 beta7 IRC 客户端 Topic 字段远程缓冲区溢出漏洞"
updated = "2026-06-16T21:48:48.990"

