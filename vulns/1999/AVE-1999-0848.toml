[basic]
description = "Windows NT 系统的 HKEY_CLASSES_ROOT 注册表项存在权限配置不当漏洞，系统关键权限设置不合理，授予了非授权用户过高的访问级别。本地攻击者可利用该缺陷修改系统文件关联或执行配置篡改，进而实现权限提升。该漏洞影响 Windows NT 全系列版本，CVSS 评分 10.0，危害等级严重。"
published = "1999-01-01T05:00:00.000"
remediation = "使用 regedt32 修改 HKEY_CLASSES_ROOT 权限，将 Everyone 组的权限从「完全控制」降为「读取」，移除不必要的用户和组。安装 Windows NT 4.0 Service Pack 6a 及后续安全更新以限制关键注册表项的默认访问权限。"
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "Microsoft Windows NT 注册表权限配置不当漏洞"
updated = "2026-06-16T21:48:40.473"

