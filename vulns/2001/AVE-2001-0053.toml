[basic]
description = "ProFTPd 1.2.0rc2 存在内存泄漏漏洞，由于程序在处理 USER 命令时未能正确释放已分配的内存资源，远程攻击者可通过连续发送大量 USER 命令导致目标服务器内存耗尽，造成拒绝服务。若服务器安装配置不当，SIZE 命令也可能触发该问题。该漏洞影响 ProFTPd 1.2.0rc2 版本，CVSS 评分 5.0，属于中危漏洞。"
published = "2001-03-12"
remediation = "升级 ProFTPd 至 1.2.0 rc3 或更高正式版本，该内存泄漏问题已在后续版本中修复。如无法升级，可在配置文件中限制单 IP 并发连接数（MaxClientsPerHost）并启用速率限制（RateEngine）以降低攻击影响。"
score = 5.0
severity = "MEDIUM"
sources = [
    "exploitdb",
    "cve",
]
title = "ProFTPD 1.2.0rc2 内存泄漏拒绝服务漏洞"
updated = "2026-07-22"

