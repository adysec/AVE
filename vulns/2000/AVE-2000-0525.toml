[basic]
description = "Roxen WebServer 2.0.69 之前版本存在空字节注入漏洞，远程攻击者通过在 URL 中插入空字符（%00）可绕过访问限制，导致目录列表泄露和源代码读取。该漏洞利用方式简单，无需身份认证，仅需向目标服务器发送特制 HTTP 请求即可触发，影响运行 Roxen WebServer 2.0.x 的系统，CVSS 评分 5.0，危害等级中危。"
published = "2000-07-21T04:00:00.000"
remediation = "立即升级 Roxen WebServer 至 2.0.69 或更高版本，该版本已修复空字节截断导致的路径校验绕过问题。如无法立即升级，可在 Web 服务器前端反向代理或 WAF 层过滤 URL 中的空字节（%00），阻止恶意请求到达后端。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Roxen WebServer 2.0.x '%00' 空字符请求文件/目录泄露漏洞"
updated = "2026-06-16T21:52:14.087"

