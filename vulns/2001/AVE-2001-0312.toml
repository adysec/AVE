[basic]
description = "Maxum Rumpus FTP Server 1.3.x 及 2.0.3 开发版及更早版本存在栈溢出拒绝服务漏洞。攻击者可通过发送包含大量子目录参数的 MKD/MKDIR 命令触发栈缓冲区溢出，导致 FTP 服务进程崩溃拒绝服务。该漏洞属于本地/相邻网络攻击（AV:L），攻击复杂度低（AC:L），无需认证（Au:N），仅影响可用性（A:P），CVSS 2.1 评为低危。影响范围为运行受影响版本 Rumpus FTP Server 的服务器，攻击者需具备本地或相邻网络访问权限且拥有创建目录权限即可利用。建议升级至 2.0.4 或更高版本修复。"
published = "2001-09-20T04:00:00.000"
remediation = "建议立即升级 Maxum Rumpus FTP Server 至 2.0.4 或更高版本（官网 maxum.com 提供更新）。如无法立即升级，可在防火墙层面限制 FTP 服务仅对受信 IP 开放，并禁用匿名 mkdir 权限作为临时缓解措施。建议同时监控 FTP 日志中异常 mkdir 请求，及时阻断异常 IP。"
score = 2.1
severity = "LOW"
sources = ["exploitdb"]
title = "Maximum Rumpus FTP Server 堆栈溢出拒绝服务漏洞"
updated = "2026-06-16T21:54:48.430"

