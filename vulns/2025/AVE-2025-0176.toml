[basic]
description = "天锐绿盾审批系统存在信息泄露漏洞，攻击者可通过路径遍历方式访问 `/trwfe/service/../ws/identity/user/sysadmin` 接口，绕过权限控制获取 sysadmin 管理员用户身份信息。该漏洞无需认证即可远程利用，攻击者可据此进一步探测系统内部结构或实施横向移动，危害较大。建议厂商及时修复路径遍历和未授权访问问题，限制敏感接口的访问权限。"
published = "0729"
remediation = "在 Web 服务器或应用网关层面配置访问控制规则，禁止未经认证访问 `/trwfe/service/ws/identity/user/` 路径下的所有接口；同时修复路径遍历漏洞，过滤 URL 中的 `../` 序列，并对 `/ws/identity/user/sysadmin` 等敏感接口强制要求身份认证鉴权。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "天锐绿盾审批系统 sysadmin 信息泄露漏洞"
updated = "0729"

