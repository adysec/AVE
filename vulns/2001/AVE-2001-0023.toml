[basic]
description = "WatchGuard SOHO FireWall 2.2.1 及更早版本存在拒绝服务漏洞，远程攻击者无需身份认证即可通过向目标设备发送大量 HTTP GET 请求导致防火墙服务崩溃或响应中断。该漏洞影响 WatchGuard SOHO 系列防火墙设备，攻击条件简单，无需特殊权限，攻击者可借此造成目标网络防护失效，属于中等危害漏洞。目前尚无官方补丁，建议升级到更高版本。"
published = "2001-02-16T05:00:00.000"
remediation = "升级 WatchGuard SOHO Firewall 至 2.2.1 以上版本，该漏洞已在后续版本修复。如无法升级，可在防火墙上配置请求速率限制规则，对单一源 IP 的 HTTP GET 请求进行限速（如每秒不超过 100 个请求），同时在网络边界部署入侵检测系统拦截异常流量。由于该产品已停止维护，建议迁移至受支持的替代产品。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "WatchGuard SOHO Firewall 拒绝服务漏洞"
updated = "2026-06-16T21:53:33.570"

