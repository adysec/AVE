[basic]
description = "Ipswitch IMail 6.04 及更早版本的 Web 服务器存在目录遍历漏洞，远程攻击者可通过在 URL 中构造 `../`（点点斜杠）序列绕过路径限制，实现对服务器上任意文件的读取和删除操作。该漏洞源于程序未对用户提交的文件路径进行充分的规范化过滤，攻击者无需身份认证即可利用，影响邮件服务器数据机密性和完整性。Exploit-DB 已公开该漏洞的利用代码。"
published = "2000-10-20T04:00:00.000"
remediation = "立即升级 Ipswitch IMail 至 6.05 或更高版本，该版本已修复 Web 服务器对 `../` 路径序列的过滤缺陷。如无法升级，在 Web 服务器配置中禁用目录遍历功能，限制 Web 服务仅访问特定目录，并部署 Web 应用防火墙（WAF）拦截包含 `..` 的 URL 请求作为临时缓解措施。"
score = 6.4
severity = "MEDIUM"
sources = ["cve"]
title = "Ipswitch IMail 目录遍历漏洞"
updated = "2026-06-16T21:52:27.943"

