[basic]
description = "Lucent Ascend MAX 和 Pipeline 路由器中的 Discard 服务存在拒绝服务漏洞。远程攻击者可向目标路由器的 Discard 端口（UDP 9）发送特制的畸形数据包，导致该服务崩溃或路由器进入不可用状态。该漏洞影响 Ascend MAX 5.0、Pipeline 6.0 以及 TNT 1.0/2.0 等版本，Java Configurator 工具使用的 Discard 服务成为攻击入口。攻击者无需认证即可发动攻击，造成网络服务中断，CVSS 评分 5.0，危害等级中等。"
published = "1998-03-16T05:00:00.000"
remediation = "升级 Ascend 路由器固件至最新版本（MAX 系列升级至 5.0Ap8 以上，Pipeline 系列升级至 6.0 以上）；在路由器 ACL 中禁用 discard 端口（UDP/TCP 端口 9）的外部访问；在网络边界防火墙配置规则阻止目的端口 9 的入站流量。鉴于该产品已停止支持，建议将仍在服役的老旧设备替换为受支持的现代路由器。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Lucent Ascend MAX/Pipeline Router 拒绝服务漏洞"
updated = "2026-06-16T21:47:29.030"

