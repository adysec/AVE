[basic]
description = "Lotus Notes Domino Web 服务器的 CGI-BIN 目录存在匿名访问权限绕过漏洞。由于服务器未能正确配置对 cgi-bin 目录的访问控制，未经身份认证的远程攻击者可直接通过 HTTP 请求访问并执行该目录下的 CGI 脚本，可能导致敏感信息泄露或执行未授权操作。该漏洞影响多个版本的 Lotus Domino HTTP 服务器，CVSS 评分 5.0，危害等级中危。"
published = "1999-12-21T05:00:00.000"
remediation = '升级至 Lotus Domino R5 及以上版本以启用 HTTP 端口安全机制，正确限制 cgi-bin 目录的匿名访问。如无法升级，在服务器文档中将 "CGI URL 路径" 从 `/cgi-bin` 改为其他路径（如 `/scripts/cgi-bin`），并在 DOMCFG.NSF 中为每个合法 CGI 脚本单独创建 URL 重定向文档。若不使用 CGI，可将整个 `/cgi-bin` 路径在 DOMCFG.NSF 中重定向到其他 URL。'
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Lotus Domino HTTP服务器CGI目录匿名访问漏洞"
updated = "2026-06-16T21:50:50.480"

