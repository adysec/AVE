[basic]
description = "Atrus Trivalie Productions 出品的 Simple Network Time Sync 1.0 中的守护进程存在缓冲区溢出漏洞，远程攻击者无需认证即可向目标发送特制的超长字符串，触发守护进程缓冲区溢出，可导致服务拒绝响应，甚至以守护进程权限执行任意代码。该漏洞影响 Simple Network Time Sync 1.0 版本，CVSS 评分 10.0，危害等级严重。"
published = "2000-06-01T04:00:00.000"
remediation = "该软件（Atrus Trivalie Productions Simple Network Time Sync 1.0）已停止维护，厂商不再提供安全更新。建议立即卸载 SMTS 守护程序，改用现代且持续维护的 NTP 实现（如 chrony 或 ntpd）。如无法立即替换，应在防火墙层面限制仅受信任主机可访问 SMTS 服务端口，并对输入字符串长度进行严格校验以缓解缓冲区溢出风险。"
score = 10
severity = "CRITICAL"
sources = ["cve"]
title = "Atrus Trivalie Productions Simple Network Time Sync 守护程序缓冲区溢出漏洞"
updated = "2026-06-16T21:51:51.177"

