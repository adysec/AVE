[basic]
description = "Linux 内核 f2fs 文件系统在收缩 extent tree（读取范围树）时，使用读写锁（rwlock）保护核心结构数据。当 extent tree 中存在大量 extent node 时，收缩过程会长时间持有该读写锁，导致内核挂起（kernel hang），形成拒绝服务（DoS）漏洞。本地攻击者可通过触发 f2fs 文件系统大量 extent node 的创建与收缩操作来利用此漏洞。该漏洞影响 Linux 内核各版本，CVSS 评分 7.1，危害等级高。"
published = "2025-01-11T13:15:21.083"
remediation = "升级 Linux 内核至 6.6.66、6.12.5 或 6.13 及以上版本，其中已合入批量收缩 extent 节点读写锁持有时间的修复补丁。如无法立即升级，可通过内核参数 `mitigations=auto` 启用内核默认缓解机制，并避免在 f2fs 文件系统上执行大量文件删除/截断操作以减少 extent 树收缩触发频率。"
score = 7.1
severity = "HIGH"
sources = ["msrc"]
title = "Linux Kernel f2fs 读取范围节点批量缩小拒绝服务漏洞"
updated = "2026-06-17T07:48:28.920"

