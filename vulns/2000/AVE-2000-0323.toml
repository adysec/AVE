[basic]
description = "KDE 桌面环境中的 kscd（CD 音频播放器）程序存在权限提升漏洞。当执行用户 SHELL 环境变量中指定的程序时，kscd 未正确丢弃其特权权限，导致本地攻击者可通过设置恶意 SHELL 环境变量，诱使 kscd 以高权限执行任意程序，从而获取提升后的系统访问权限。该漏洞影响 KDE 1.1 至 2.0 版本，CVSS 评分 7.2，危害等级高。"
published = "2000-05-16T04:00:00.000"
remediation = "升级 KDE 至 2.1 或更高版本，该漏洞已在后续版本中修复。临时缓解措施：移除 kscd 程序的 setuid 权限位（chmod u-s /opt/kde/bin/kscd），或清除 SHELL 环境变量后运行 kscd。SuSE Linux 用户可参考 SuSE Security Announce 50 安装对应补丁包。"
score = 7.2
severity = "HIGH"
sources = ["epss"]
title = "KDE kscd SHELL 环境变量本地权限提升漏洞"
updated = "2026-06-16T21:51:37.347"

