[basic]
description = "开源路由器、防火墙及其他网络设备上存在账户使用默认密码、空密码或未设置密码的安全漏洞。攻击者若能够通过网络连接到这些设备，即可直接利用这些弱口令或空口令登录系统，无需身份验证即可获得设备管理权限。该漏洞影响各类开源路由器及防火墙设备，CVSS 评分为 4.6，危害等级为中等。攻击者成功利用后可能导致设备配置被篡改、网络流量被劫持或设备被用于发起进一步攻击，建议管理员为所有账户设置强密码并定期更换。"
published = "1998-06-01T04:00:00.000"
remediation = "登录路由器或防火墙管理界面，修改所有默认/空/弱密码为符合复杂度要求的高强度密码，禁用或删除不必要的默认账户，并启用账户锁定策略以防范暴力破解。如设备已停止更新，建议升级至厂商支持的最新固件版本，或在管理接口前部署访问控制列表(ACL)限制仅可信网络可达。"
score = 4.6
severity = "MEDIUM"
sources = ["epss"]
title = "开源路由器 默认口令 本地安全漏洞"
updated = "2026-06-16T21:48:32.663"

