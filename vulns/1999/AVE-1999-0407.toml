[basic]
description = "Cat Soft Serv-U FTP Server 2.5 存在缓冲区溢出漏洞，远程认证攻击者可通过向 FTP 服务器发送超长的 CWD（切换目录）或 LS（列表）命令触发该漏洞，导致服务器进程崩溃，造成拒绝服务。该漏洞利用方式简单，只需认证后构造特制命令字符串即可实施攻击，影响运行 Serv-U 2.5 版本的服务器系统。厂商至今未发布官方补丁，建议升级至更高版本。"
published = "1997-07-01T04:00:00.000"
remediation = "升级至 Serv-U FTP Server 2.5a 或更高版本即可修复此漏洞；现代用户应升级到当前最新版本（15.x 系列）。如无法升级，可在 FTP 服务器上限制用户目录长度并对 CWD/LS 命令参数做长度校验（不超过 256 字符），同时禁用匿名写权限作为临时缓解措施。"
score = 7.8
severity = "HIGH"
sources = ["avd"]
title = "Cat Soft Serv-U FTP Server 2.5 缓冲区溢出漏洞"
updated = "2026-06-16T21:47:56.290"

