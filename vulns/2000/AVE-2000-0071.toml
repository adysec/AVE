[basic]
description = "Netopia Timbuktu Pro 在用户认证过程中以明文方式传输用户名和口令，攻击者通过在网络链路上进行嗅探即可被动捕获这些敏感凭据信息。该漏洞允许同一网络段上的未授权攻击者获取合法用户的登录凭证，进而远程登录目标系统执行任意操作。该漏洞影响 Netopia Timbuktu Pro 系列版本，危害等级中危，需升级至修复版本或启用加密通信机制。"
published = "2000-01-18T05:00:00.000"
remediation = "升级 Netopia Timbuktu Pro 至支持加密认证的版本（Timbuktu Pro 6.0 及以上版本已修复此问题）；如无法升级，应将所有 Timbuktu 通信流量强制通过 VPN 或 SSH 隧道传输以防止中间人嗅探；对于已停止支持的旧版本，建议迁移至支持全流量加密的现代远程管理方案（如 SSH/RDP/TeamViewer 等），同时可设置防火墙规则限制 Timbuktu 端口的访问来源。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Netopia Timbuktu Pro 明文传送用户凭证漏洞"
updated = "2026-06-16T21:50:58.273"

