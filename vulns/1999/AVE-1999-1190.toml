[basic]
description = "Seapine Software TestTrack 服务器存在拒绝服务漏洞，远程攻击者可通过连接端口 99 后立即断开连接而不发送任何数据，导致 TestTrackWeb.exe 和 ttcgi.exe 进程 CPU 占用率持续升高，造成服务不可用。该漏洞无需身份认证即可远程触发，攻击难度低，影响 TestTrack 服务器的正常运行业务。"
published = "1999-03-08T05:00:00.000"
remediation = "Seapine 官方于 1999 年 3 月 23 日发布修复，升级至 TestTrack Workgroup 1.8 及以上版本即可消除此漏洞。该产品已于 2002 年停维，建议迁移至 TestTrack Pro 或同等替代产品。临时缓解措施：在网络防火墙上阻止对端口 99 (TCP) 的入站访问，仅允许可信来源连接。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Seapine TestTrack 拒绝服务漏洞"
updated = "2026-06-16T21:50:43.967"

