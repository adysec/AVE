[basic]
description = "Linux 内核 TCP 协议栈的 tcp_conn_request() 函数中存在内存泄漏漏洞。当 inet_csk_reqsk_queue_hash_add() 返回 false 时，函数直接返回而未释放 af_ops->route_req 所分配的路由目标（dst）内存，导致内核内存持续泄漏。具有本地低权限的攻击者可利用该漏洞，通过发送大量特制的 TCP 连接请求触发此内存泄漏路径，长期运行将耗尽系统内存资源，导致拒绝服务（DoS）。该漏洞影响所有使用受影响 Linux 内核版本的系统，CVSS 评分 5.5，危害等级中危。"
published = "2025-01-15T13:15:12.130"
remediation = "立即更新 Linux 内核至包含提交 `dst_release()` 修复的版本（主线内核 ≥ 6.12 或对应发行版已合入该补丁的内核版本）。Ubuntu 用户请安装 USN-7381-1 或 USN-7459-1 安全更新，运行 `sudo apt update && sudo apt upgrade linux-image-*` 并重启系统。RHEL/CentOS 用户请升级至 kernel-5.14.0-503.el9 及以上版本。临时缓解措施：限制本地用户对系统的交互式访问权限，降低攻击面。"
score = 5.5
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux Linux 内核 TCP 连接请求内存泄漏漏洞"
updated = "2026-06-17T08:14:05.833"

