[info]
author = "AVE"
description = "Mobius DocumentDirect for the Internet 1.2 Web授权表单缓冲区溢出漏洞验证，通过向username字段提交超长字符串触发缓冲区溢出，导致拒绝服务或远程代码执行"
id = "POC-AVE-2000-1683"
name = "CVE-2000-0827 PoC"
severity = "critical"
tags = ["cve-2000-0827"]
vuln_id = [
    "CVE-2000-0827",
    "AVE-2000-1683",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/cgi-bin/authorize"
protocol = "http"

[poc.requests.body]
content = ""
type = "raw"

[poc.requests.headers]
User-Agent = "AVE/1.0"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "200",
    "302",
]
