[basic]
description = "GNOME gdm、KDE kdm 及 wdm 的 XDMCP 解析代码中存在缓冲区溢出漏洞，远程攻击者可通过向目标系统发送特制的超长 FORWARD_QUERY 请求触发该漏洞，导致任意命令执行或拒绝服务。该漏洞影响 GNOME gdm 1.0.x/2.0.x BETA/2.2.0、KDE kdm 及 wdm 等显示管理器。"
published = "2000-05-24"
remediation = "升级 GNOME gdm 至 2.0.0 或更高版本（2.0.x BETA 及更早版本均受影响），升级 KDE kdm 和 wdm 至各厂商提供的修复版本。Caldera OpenLinux 用户可应用 CSSA-2000-013.0 补丁，SuSE Linux 用户可参考 SuSE Security Announce 49。如无需远程 X11 登录，建议禁用 XDMCP 服务以降低风险。"
score = 10.0
severity = "CRITICAL"
sources = [
    "cve",
    "exploitdb",
]
title = "GNOME gdm KDE kdm wdm XDMCP 远程代码执行漏洞"
updated = "2026-06-16"

