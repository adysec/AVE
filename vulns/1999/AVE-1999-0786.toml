[basic]
description = "Solaris 动态链接器在处理 LD_PROFILE 环境变量时未对文件路径进行充分校验，本地攻击者可通过符号链接攻击，诱使动态链接器在特权上下文中向任意路径写入文件，从而实现本地权限提升或破坏系统文件完整性。攻击者需拥有本地系统账户，攻击复杂度低，成功后可能导致敏感信息泄露、数据篡改或拒绝服务。"
published = "1999-09-22"
remediation = "升级至 Oracle Solaris 11 或更高受支持版本，该漏洞在后续 Solaris 动态链接器实现中已被修复。对于仍运行 Solaris 2.x 的系统，建议迁移至现代受支持版本并应用所有可用安全补丁，同时限制普通用户对 LD_PROFILE 等敏感环境变量的使用。"
score = 4.6
severity = "MEDIUM"
sources = ["cve"]
title = "Sun Solaris 动态链接器 LD_PROFILE 本地提权与任意文件创建漏洞"
updated = "2026-06-16"

