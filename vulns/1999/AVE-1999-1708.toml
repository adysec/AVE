[basic]
description = 'Internet Explorer 4.01 及更早版本中存在缓冲区溢出漏洞，远程攻击者可通过向用户发送包含超长 "mk:" 协议 URL 的特制链接，诱使用户点击后触发缓冲区溢出，导致任意命令执行。该漏洞影响 Windows 平台上所有 IE 4.01 及之前版本，攻击者无需身份认证即可远程利用，CVSS 评分 7.5，危害等级高。微软已发布安全公告并提供修复措施。'
published = "1999-12-31T05:00:00.000"
remediation = '立即升级 Internet Explorer 至 5.0 或更高版本，该漏洞在 IE 5.0 中已修复。对于仍使用 IE 4.01 及更早版本的系统，建议升级至 Windows 2000 或更高版本操作系统，其捆绑的 IE 5.01 及以上版本不受此漏洞影响。如无法升级，可在注册表中禁用 mk: 协议处理程序，将 HKEY_CLASSES_ROOT\mk\Shell\Open\Command 的默认值清空作为临时缓解措施。'
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "Microsoft Internet Explorer MK协议缓冲区溢出远程代码执行漏洞"
updated = "2026-06-16T21:49:42.553"

