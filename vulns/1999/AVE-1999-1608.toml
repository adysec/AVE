[basic]
description = "Microsoft Internet Explorer 5 的 DirectShow 筛选器组件 MSDXM.OCX 中存在缓冲区溢出漏洞。远程攻击者可通过向用户发送特制的 vnd.ms.radio 协议链接，诱使用户点击后触发缓冲区溢出，导致任意代码执行。该漏洞影响 Internet Explorer 5 及早期版本，攻击者无需身份认证即可利用，危害等级高。"
published = "1999-12-06T05:00:00.000"
remediation = "升级到 Internet Explorer 5.01 Service Pack 2 或更高版本，该漏洞已在 IE 5.01 SP2 及后续版本中修复。如无法升级，可在命令行运行 `regsvr32 /u msdxm.ocx` 注销 DirectShow 滤镜控件作为临时缓解措施。鉴于 IE 5 已停止支持，建议升级至现代浏览器（如 Edge/Chrome/Firefox）以彻底消除风险。"
score = 7.5
severity = "HIGH"
sources = ["exploitdb"]
title = "Microsoft Internet Explorer 5 DirectShow 筛选器远程代码执行漏洞"
updated = "2026-06-16T21:49:28.330"

