[basic]
description = "IceWarp Mail Server 11.2 之前版本存在多处路径遍历漏洞。远程攻击者无需身份认证即可通过向 webmail/client/skins/default/css/css.php 页面的 file 参数传入 `..`（点点）序列，或向 webmail/old/calendar/minimizer/index.php 页面的 script 或 style 参数传入 `.../.`（点点点斜杠点）序列，绕过目录限制读取服务器上的任意文件。该漏洞可导致敏感信息泄露，包括配置文件、数据库凭证等，CVSS 评分 7.5，危害等级高。官方已在 11.2 版本中修复此漏洞。"
published = "2018-05-08T20:29:00.250"
remediation = "升级 IceWarp Mail Server 至 11.2 或更高版本以修复路径遍历漏洞。如无法立即升级，在 Web 服务器层面对 `/webmail/client/skins/default/css/css.php` 和 `/webmail/old/calendar/minimizer/index.php` 路径的 `file`、`script`、`style` 参数进行输入过滤，禁止包含 `../` 及 `.../` 等目录跳转序列。"
score = 7.5
severity = "HIGH"
sources = ["nuclei"]
title = "IceWarp Mail Server 路径遍历漏洞"
updated = "2026-06-17T00:22:32.523"

