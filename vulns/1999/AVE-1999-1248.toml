[basic]
description = "Elm 2.4 及更早版本（含 2.3）邮件客户端存在本地缓冲区溢出漏洞。程序在处理 TERM 环境变量时未对输入长度进行充分校验，本地攻击者可通过设置一个超长的 TERM 环境变量值，触发缓冲区溢出，进而可能劫持程序执行流并获取更高权限。该漏洞仅需本地登录访问权限即可利用，无需网络连接或身份认证。成功利用后，攻击者可获得与 Elm 进程相同用户级别的权限提升，从而在目标系统上执行任意操作。此漏洞影响 Unix/Linux 系统上运行 Elm 2.4 及更早版本的邮件客户端，CVSS v2 评分为 4.6（中危），攻击复杂度低，受影响范围广泛。建议用户将 Elm 升级至修复此漏洞的安全版本，或避免以特权用户身份运行 Elm。"
published = "1997-05-13T04:00:00.000"
remediation = "建议立即将 Elm 升级至 2.5 或更高版本（该版本已修复 TERM 变量溢出），可从官方 ftp://ftp.sequence.com/pub/elm/ 或发行版软件源获取。如暂无法升级，可卸载 Elm 或改用 mutt/pine 等替代客户端；临时缓解措施为限制普通用户 shell 访问权限，并在启动脚本中对 TERM 变量长度做校验（如 export TERM=${TERM:0:20}），避免超长值触发溢出。"
score = 4.6
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Elm 邮件客户端 TERM 环境变量本地缓冲区溢出漏洞"
updated = "2026-06-16T21:49:53.890"

