[basic]
description = "Brian Stanback 开发的 bslist.cgi 邮件列表脚本存在命令注入漏洞。该 CGI 程序在处理用户提交的电子邮件地址参数时，未对 shell 元字符（如分号、管道符、反引号等）进行有效过滤或转义，导致远程攻击者可通过向目标服务器发送特制的 HTTP 请求，在 email 字段中注入恶意系统命令，从而在服务器端以 Web 服务进程权限执行任意命令。该漏洞影响 bslist.cgi 1.0 版本，CVSS 评分 10.0，危害等级严重，攻击者无需任何身份认证即可利用。"
published = "2001-02-12T05:00:00.000"
remediation = "立即停止使用 bslist.cgi 1.0 或更高版本，该脚本已无官方维护；如业务必需，应彻底删除或禁用该 CGI 脚本，改用现代邮件列表软件（如 Mailman 3、Sympa）。临时缓解措施可在 Web 服务器配置中对 email 参数添加输入过滤规则，拦截 shell 元字符（; | ` $ 等）。"
score = 10
severity = "CRITICAL"
sources = ["exploitdb"]
title = "Brian Stanback bslist.cgi 远程命令执行漏洞"
updated = "2026-06-16T21:53:39.317"

