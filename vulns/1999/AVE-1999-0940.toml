[basic]
description = "Cisco PIX Private Link 4.1.6 及更早版本在处理配置文件中的特定命令时存在安全缺陷，导致 DES 加密密钥的有效长度从标准的 56 位被降低至 48 位。攻击者可通过暴力枚举攻击显著降低破解密钥所需的计算复杂度，进而解密受保护的通信链路。该漏洞影响使用 Cisco PIX Private Link 功能的所有早期版本设备，攻击者只需获取配置文件访问权限即可利用此弱点实施攻击，无需用户交互。"
published = "1999-12-31T05:00:00.000"
remediation = "升级 Cisco PIX 防火墙软件至 4.1.7 或更高版本，该版本已修复 DES 密钥长度截断问题。如无法升级，应在配置中禁用 Private Link 的 DES 加密，改用 3DES 或 AES 等更强加密算法替代，并限制对配置文件的物理访问权限。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "Cisco PIX Private Link 配置文件 DES 密钥强度漏洞"
updated = "2026-06-16T21:49:43.327"

