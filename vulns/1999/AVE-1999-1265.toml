[basic]
title = "IBM AIX 与 HP-UX 本地 socket 拒绝服务漏洞"
description = "该漏洞存在于 IBM AIX 4.1.4 以及 HP-UX 10.01 和 9.05 版本中。本地用户可通过 socket 连接到 localhost 上的某个端口，随后调用 shutdown 清除该 socket，再使用同一个 socket 连接到 localhost 上的另一个端口，从而触发操作系统内核异常导致系统崩溃（拒绝服务）。攻击者需拥有本地账户权限，利用条件较低，成功利用后会造成系统不可用，但不会泄露信息或破坏数据完整性。"
severity = "LOW"
score = 2.1
sources = ["cve", "exploitdb"]
published = "1997-03-05T05:00:00.000"
updated = "2026-06-16T21:50:22.600"
remediation = "IBM AIX 用户应安装 APAR IX76025 或升级至 AIX 4.1.5 及以上版本以修复 connect() 系统调用处理缺陷。HP-UX 10.01 和 9.05 用户应安装对应的安全补丁包或升级至 HP-UX 10.20 及以上版本。作为临时缓解措施，可限制普通用户对关键服务的本地 socket 访问权限，并通过审计系统监控本机 socket 端口的异常 connect/shutdown 调用行为。"
