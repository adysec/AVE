[basic]
description = "Microsoft SharePoint 存在远程代码执行漏洞，漏洞编号 CNVD-2026-26519。攻击者可通过向 SharePoint 服务器发送特制的请求包，利用该漏洞在目标服务器上以应用程序池权限执行任意代码，无需身份认证即可完成攻击。该漏洞影响 Microsoft SharePoint 多个受支持版本，可能导致服务器被完全控制、敏感数据泄露等严重后果。建议用户及时关注官方安全更新并进行修复。"
published = "20260713"
remediation = "标签之间。用户只要标签内的内容作为字段值。<value>立即安装 Microsoft 2026 年 7 月安全更新 (KB5002586)，该补丁专门修复了 SharePoint Server 2019 和 SharePoint Server Subscription Edition 中的远程代码执行漏洞 (CNVD-2026-26519)。可通过 Windows Update、Microsoft Update、WSUS 或从 Microsoft Update Catalog 手动下载并安装。如无法立即打补丁，应暂时限制对受影响 SharePoint 站点的外部网络访问，并确保 SharePoint 应用程序池账户遵循最小权限原则。建议后续将 SharePoint Server 升级到最新受支持版本。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "Microsoft SharePoint 远程代码执行漏洞"
updated = "20260713"

