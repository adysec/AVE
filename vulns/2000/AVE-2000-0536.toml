[basic]
description = "BEA WebLogic 5.1.x 服务器中的 JSPServlet 存在访问权限控制不当漏洞，远程攻击者无需任何身份认证即可通过直接调用该 Servlet 访问任意源码文件，导致 Java JSP 代码被远程编译并执行，从而实现对服务器的完全控制。该漏洞影响 BEA WebLogic 5.1.x 系列版本，CVSS 评分高达 10.0，危害等级严重。建议升级至不受影响的版本或限制对 JSPServlet 的访问。"
published = "2000-10-20T04:00:00.000"
remediation = "建议升级至 BEA WebLogic 6.0 及以上版本，该漏洞已在后续版本修复。若无法升级，应在 Web 服务器或防火墙层限制对 JSPServlet 的访问，仅允许受信任来源调用 `/servlet/*` 路径，并在 `web.xml` 中添加安全约束禁止直接访问 JSP 源文件。"
score = 10
severity = "CRITICAL"
sources = ["exploitdb"]
title = "BEA WebLogic JSP 代码编译执行漏洞"
updated = "2026-06-16T21:52:15.797"

