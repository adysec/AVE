[basic]
description = "DEC OpenVMS 操作系统的 Monitor 实用程序（SYS$SHARE:SPISHR.EXE）存在权限提升漏洞。本地攻击者可利用该程序的安全缺陷，通过执行精心构造的操作获得超越自身权限的系统级访问能力，进而完全控制受影响系统。该漏洞影响 VMS 5.0 至 5.4-2 版本，需要攻击者具有本地系统访问权限方可利用。"
published = "1992-11-17T05:00:00.000"
remediation = "升级 OpenVMS 至 5.4-3 或更高版本以修复 Monitor 工具（SYS$SHARE:SPISHR.EXE）的权限提升漏洞。如无法立即升级，应移除该文件的 SUID 权限，并限制其仅允许系统管理员组执行，作为临时缓解措施。"
score = 7.2
severity = "HIGH"
sources = ["epss"]
title = "DEC OpenVMS Monitor 工具本地权限提升漏洞"
updated = "2026-06-16T21:50:20.887"

