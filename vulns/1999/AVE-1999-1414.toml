[basic]
description = "Linux、Ultrix 等操作系统的 rpc.mountd 组件存在信息泄露漏洞。远程攻击者无需身份认证即可通过 mount 请求探测目标服务器上的文件是否存在，因为当文件存在或不存在时，rpc.mountd 返回的错误信息存在差异。攻击者可利用此差异逐一遍历文件路径，从而收集系统敏感文件信息，为后续攻击提供情报支持。"
published = "1997-08-24T04:00:00.000"
remediation = "升级 nfs-utils（rpc.mountd）至最新版本，或应用相关补丁消除基于错误信息的路径枚举风险。配置 /etc/exports 使用 `root_squash` 等安全选项并限制可访问网段，同时通过 TCP Wrappers（/etc/hosts.allow）或 iptables 仅允许受信任主机访问 111/RPC 端口。如无需 NFS 服务，建议禁用 rpc.mountd 并删除 NFS 相关服务启动项。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Linux rpc.mountd 文件存在性信息泄露漏洞"
updated = "2026-06-16T21:49:59.137"

