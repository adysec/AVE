[basic]
description = "Thomas Boutell开发的CGIC CGI库1.05及之前版本存在缓冲区溢出漏洞，远程攻击者可通过向CGI程序发送特制输入触发溢出，可能导致敏感信息泄露或服务异常。攻击无需认证，攻击复杂度低。"
published = "1999-01-10"
remediation = "升级cgic库至1.05之后的版本（如2.x系列），避免使用存在缓冲区溢出漏洞的旧版本。审查并修复所有基于cgic库开发的CGI程序中的输入边界检查逻辑。"
score = 5.0
severity = "MEDIUM"
sources = ["cve"]
title = "Thomas Boutell cgic库缓冲区溢出漏洞"
