[basic]
description = "Linux 内核 HID 子系统 uclogic 驱动中存在释放后使用（Use-After-Free）漏洞。该漏洞源于驱动在执行 devm 分配 input_dev 名称时错误地引用了 input 设备而非 HID 设备，当 input_dev 被注销并触发依赖该名称的 uevent 事件时，名称已被 devres 管理机制提前释放。本地攻击者可利用此漏洞造成系统崩溃或实现权限提升。CVSS 评分 7.8，危害等级高。"
published = "2025-12-30T13:16:08.867"
remediation = "建议立即将 Linux 内核升级至 5.10.249、5.15.199、6.1.53、6.4.16 或 6.5.3 及以上版本（各长期支持分支对应修复版本）。如无法升级内核，可应用补丁 commit f78bb490b16ec 等 6 个稳定分支修复提交，或通过发行版安全更新渠道安装补丁。该漏洞需本地低权限访问触发，可通过限制本地用户登录和启用 SELinux/AppArmor 缓解风险。"
score = 7.8
severity = "HIGH"
sources = ["msrc"]
title = "Linux Kernel HID uclogic 驱动释放后使用漏洞"
updated = "2026-06-17T06:47:00.993"

