[basic]
description = "KDE 的 libmediatool 媒体工具库存在符号链接攻击漏洞，本地攻击者可通过在目标系统上创建恶意的符号链接文件，诱使使用该库的应用程序在处理文件时错误地跟随符号链接，从而在系统任意路径创建文件或覆盖已有文件。该漏洞影响 KDE 相关版本，攻击者需具备本地用户权限，CVSS 评分 1.2，危害等级低。"
published = "1999-03-01T05:00:00.000"
remediation = "升级至 KDE 2.0 及以上版本，该版本已修复 libmediatool 在处理临时文件时的竞态条件问题。如无法升级，可限制本地用户对共享临时目录的写入权限，并使用 `chmod 1777 /tmp` 确保粘滞位正确设置以防止符号链接攻击。"
score = 1.2
severity = "LOW"
sources = ["cve"]
title = "KDE libmediatool 符号链接攻击本地文件创建漏洞"
updated = "2026-06-16T21:51:34.640"

