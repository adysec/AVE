[basic]
description = "Microsoft Internet Explorer 4.x/5 及 Outlook 系列产品中的 Active Setup Control ActiveX 控件存在远程代码执行漏洞。远程攻击者可通过向目标用户发送包含恶意 CAB 文件附件及嵌入脚本的特制 HTML 邮件来触发该漏洞。当用户使用受影响版本浏览器或邮件客户端打开该邮件时，ActiveX 控件会处理恶意 CAB 文件，导致任意代码执行。该漏洞攻击复杂度较高，需用户交互配合，影响大量早期 Windows 系统上的 IE 及 Outlook 用户。"
published = "1999-11-11T05:00:00.000"
remediation = "立即升级到 Internet Explorer 6 或更高版本，并安装 Microsoft 安全公告 MS99-048 对应补丁。在 Outlook Express 中，将安全区域设置为「受限站点」并禁用 ActiveX 控件和脚本执行。对于 Outlook 2000，安装 Outlook Email Security Update 以阻止 HTML 邮件中 ActiveX 控件的自动执行。如无法升级，可在注册表中将 CLSID {7790769C-0471-11D2-AF11-00AA00A01F02} 的 Kill Bit 设置为 1 以禁用该 ActiveX 控件。"
score = 5.1
severity = "MEDIUM"
sources = ["avd"]
title = "Microsoft Internet Explorer 及 Outlook ActiveX CAB 文件远程执行漏洞"
updated = "2026-06-16T21:51:29.370"

