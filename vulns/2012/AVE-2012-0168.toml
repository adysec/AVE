[basic]
description = "Microsoft XML Core Services（MSXML）3.0、4.0、5.0 和 6.0 版本中存在未初始化内存访问漏洞。当 MSXML 解析特制 XML 内容时，由于未正确初始化内存对象，攻击者可通过构造恶意网站诱导用户访问，触发内存破坏，从而实现远程代码执行或拒绝服务攻击。该漏洞无需身份认证，但需要用户交互（如点击链接或浏览网页），CVSS 评分 8.8，危害等级高。Microsoft 已在 MS12-043 安全公告中发布补丁修复此漏洞。"
published = "2012-06-13T04:46:46.190"
remediation = "安装 Microsoft 安全公告 MS12-043 提供的更新，该更新修复了 MSXML 3.0/4.0/5.0/6.0 中的未初始化内存访问漏洞。可通过 Windows Update 自动更新，或手动下载 KB2721691（MSXML 3.0）、KB2721693（MSXML 4.0）、KB2721692（MSXML 5.0）、KB2721694（MSXML 6.0）对应版本补丁。临时缓解措施：将 Internet 安全区域设置为高以禁用 ActiveX 控件，或配置 IE 在运行 ActiveX 控件前提示。"
score = 8.8
severity = "HIGH"
sources = ["kev"]
title = "Microsoft XML Core Services 未初始化内存远程代码执行漏洞"
updated = "2026-06-16T23:40:29.923"

