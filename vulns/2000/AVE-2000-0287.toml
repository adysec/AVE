[basic]
description = "Allaire Forums 2.0.5 存在安全绕过漏洞，远程攻击者可通过向 rightAccessAllForums 或 rightModerateAllForums 变量提交特制请求，绕过安全会议（secure conferences）的访问限制，获取未授权的论坛管理权限。该漏洞影响 Allaire Forums 2.0.5 版本，CVSS 评分 6.4，危害等级中危。厂商已发布修复建议，建议用户升级至最新版本。"
published = "2000-04-03T04:00:00.000"
remediation = "请升级 Allaire Forums 至 2.0.6 或更高版本（已安装 ASB00-08 安全公告对应补丁）。在升级前，临时缓解措施为：在 Web 服务器或反向代理层限制对 Forums 管理接口的访问，移除或严格校验 rightAccessAllForums 和 rightModerateAllForums 变量的输入。由于该产品已停止维护数十年，建议考虑迁移至仍在安全更新的替代论坛系统。"
score = 6.4
severity = "MEDIUM"
sources = ["avd"]
title = "Allaire Forums 访问限制绕过漏洞"
updated = "2026-06-16T21:51:25.410"

