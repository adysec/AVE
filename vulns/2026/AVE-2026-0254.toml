[basic]
description = "Gitea 个人访问令牌（PAT）在仓库 RSS/Atom Feed 端点存在权限范围绕过漏洞。当用户使用受限作用域（如 `read:issue`）的令牌访问 RSS/Atom Feed 接口时，可以读取该用户有权访问的任意私有仓库的提交记录，包括提交 SHA、完整提交信息（可能包含密钥等敏感内容）以及提交者姓名和邮箱。而在 `/raw`、`/media`、`/archive` 及内容 API 等端点，相同令牌会被正确拒绝（403）。该漏洞影响 Gitea 1.26.2 及之前版本，CVSS 评分 4.3，危害等级中危。攻击者只需持有任意受限作用域的有效令牌即可利用，无需特殊权限。"
published = "2026-07-03T21:16:58.937"
remediation = "立即将 Gitea 升级至 v1.26.3 或更高版本（官方强烈建议直接升级至 v1.26.4），该版本在 RSS/Atom feed 端点强制实施了 API 令牌作用域检查。如无法立即升级，可临时禁用 RSS/Atom feed 功能，或在反向代理层对 `/api/v1/repos/*/feed` 路径添加访问控制，仅允许拥有 repository 作用域的令牌访问。"
score = 4.3
severity = "MEDIUM"
sources = ["ghsa"]
title = "Gitea 仓库 RSS/Atom Feed 接口访问令牌作用域绕过漏洞"
updated = "2026-07-07T18:16:37.887"

