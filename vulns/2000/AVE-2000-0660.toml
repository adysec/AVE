[basic]
description = "Linux man 软件包中的 makewhatis 工具存在不安全临时文件处理漏洞。本地攻击者可通过创建符号链接攻击（symlink attack），在 makewhatis 运行时将其临时文件指向目标系统文件，从而覆盖任意系统文件。该漏洞影响 Linux man 软件包多个版本，攻击者需要拥有本地账号权限，利用条件为诱使 makewhatis 执行并利用 /tmp 目录下的符号链接指向敏感文件，可实现本地提权或破坏系统文件完整性。"
published = "2000-07-03T04:00:00.000"
remediation = "升级 Linux man 软件包到 1.5i 或更新版本，该版本已改用 mkstemp() 安全创建临时文件，避免可预测路径。如系统使用 man-db（替代 man），确保升级到最新版本即可，man-db 默认使用安全的临时文件机制。无法升级时，确保 /tmp 目录设置了粘滞位 (Sticky Bit)，限制普通用户对临时目录的写删除权限作为临时缓解。"
score = 7.2
severity = "HIGH"
sources = ["redhat"]
title = "Linux man 软件包 makewhatis 本地符号链接文件覆盖漏洞"
updated = "2026-06-16T21:52:00.680"

