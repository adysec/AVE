[basic]
description = "Info2www 1.0 及 1.1 版本的 CGI 脚本存在输入处理不当漏洞。远程攻击者可向目标服务器发送特制的 HTTP 请求，利用脚本未对用户输入进行充分过滤和验证的安全缺陷，实现任意远程文件读取或远程命令执行。该漏洞属于典型的 CGI 脚本注入类问题，攻击者无需认证即可利用，严重影响服务器数据安全与系统完整性。"
published = "1998-03-01T05:00:00.000"
remediation = "立即移除服务器上的 info2www CGI 脚本，该脚本已停止维护且无安全补丁可用。如仍需类似功能，改用经过安全审计的现代替代方案，并在 Web 服务器层面限制 CGI 脚本执行权限，禁用对未认证用户的 CGI 访问。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "Info2www CGI 远程文件访问和命令执行漏洞"
updated = "2026-06-16T21:48:02.100"

