[basic]
description = "ITHouse Mail Server 1.04 存在缓冲区溢出漏洞，远程攻击者可通过向 SMTP 服务发送超长的 RCPT TO 邮件命令触发该漏洞，导致任意代码执行。由于程序在处理邮件命令时未对输入长度进行有效校验，攻击者无需身份认证即可利用，CVSS 评分 10.0，危害等级严重。受影响的 ITHouse Mail Server 1.04 版本已停止维护，建议用户迁移至其他受支持的邮件服务器软件。"
published = "2000-05-30T04:00:00.000"
remediation = "ITHouse mail server 已停止维护，无官方补丁可用。建议立即迁移至其他受支持的邮件服务器软件（如 Postfix、Exim、Microsoft Exchange 等）。如无法立即迁移，可在网络边界防火墙或入侵检测系统中添加规则，拦截包含超长 RCPT TO 命令的 SMTP 请求（正常 RCPT TO 地址长度通常不超过 320 字符），作为临时缓解措施。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "ITHouse Mail Server 缓冲区溢出远程代码执行漏洞"
updated = "2026-06-16T21:51:50.513"

