[basic]
description = "L-Soft LISTSERV 1.8 的 Web Archives 组件存在缓冲区溢出漏洞，远程攻击者可通过向目标服务器发送特制的 HTTP 请求触发该漏洞，导致任意代码执行。该漏洞影响 L-Soft LISTSERV 1.8 版本，CVSS 评分 10.0，危害等级严重。攻击者无需身份认证即可远程利用，成功利用后可完全控制目标系统，获取敏感信息或植入恶意程序。Exploit-DB 上已有公开利用代码。"
published = "2000-05-03T04:00:00.000"
remediation = "立即升级 L-Soft LISTSERV 至 1.8e 或更高版本（当前最新为 17.5），该漏洞在后续版本中已修复。如无法升级，可删除或禁用 Web Archives 组件（wa.exe），或通过 Web 服务器（IIS/Apache）配置访问控制，限制对 wa.exe 的访问来源 IP。同时建议在防火墙层面限制对 LISTSERV Web 服务端口（通常 80/443）的公开访问。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "L-Soft LISTSERV 1.8 Web Archives 缓冲区溢出漏洞"
updated = "2026-06-16T21:51:42.320"

