[basic]
description = "FreeBSD 系统中的 Seyon（Muhammad M. Saggaf 开发的终端通信程序，版本 2.14b 及更早版本）在调用 xterm 和 seyon-emu 命令时使用了相对路径搜索机制，未对 PATH 环境变量进行安全校验。本地攻击者可构造恶意的 PATH 变量，将包含同名恶意可执行文件的目录注入到搜索路径前端，诱使 Seyon 程序执行攻击者控制的恶意程序，从而实现本地权限提升。该漏洞仅需本地访问权限即可利用，条件为用户具有修改 PATH 环境变量的能力，影响所有安装了该版本 Seyon 的 FreeBSD 系统。厂商未提供官方补丁，建议卸载或升级至不受影响的版本。"
published = "1999-12-01T05:00:00.000"
remediation = "立即卸载或禁用 seyon 程序（该软件已长期停止维护），并使用现代替代工具如 minicom 或 cu 代替串口通信功能。若必须保留 seyon，在启动前应确保 PATH 环境变量仅包含受信任的系统目录（如 /bin、/usr/bin），并使用 chflags 或文件权限限制 seyon 二进制文件的 SUID/SGID 位，防止其以提升权限运行 xterm 或 seyon-emu。"
score = 4.6
severity = "MEDIUM"
sources = ["avd"]
title = "FreeBSD Seyon 本地权限提升漏洞"
updated = "2026-06-16T21:49:07.583"

