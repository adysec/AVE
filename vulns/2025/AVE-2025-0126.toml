[basic]
description = "泛微 E-Cology 9 的 FileDownloadLocation 组件中存在身份认证绕过漏洞，未经身份认证的攻击者可利用该漏洞绕过登录验证，进而通过 mrfuuid 参数注入恶意 SQL 语句，结合 WAITFOR DELAY 延时函数可实现时间盲注，最终窃取数据库敏感信息。该漏洞影响泛微 E-Cology 9 版本，攻击者无需任何权限即可远程利用。"
published = "0703"
remediation = "建议升级泛微E-Cology9至2025年4月之后的安全补丁版本（如v10.58.1及以上），该版本已修复FileDownloadLocation接口的身份认证绕过与SQL注入问题。如无法立即升级，可在WAF/IPS层面添加规则拦截对/weaver/FileDownloadLocation/login/LoginSSO路径的异常请求，并限制该接口仅允许内网IP访问作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "泛微 E-Cology9 FileDownloadLocation 身份认证绕过导致SQL注入漏洞"
updated = "0703"

