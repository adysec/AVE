[basic]
description = "True North Software Internet Anywhere Mail Server 3.1.3 的 POP3 邮件服务存在拒绝服务漏洞。该服务的 RETR 命令在处理参数时缺乏有效性校验，本地已认证用户可向服务发送精心构造的畸形 RETR 命令，触发程序异常并导致邮件服务崩溃或挂起。攻击条件为攻击者需拥有本地 POP3 账户访问权限并通过正常认证登录，利用方式即发送畸形 RETR 请求使服务不可用，影响该版本邮件服务器的正常邮件收发功能。"
published = "1999-12-03T05:00:00.000"
remediation = "建议将 True North Software Internet Anywhere Mail Server 3.1.3 迁移至仍在维护的替代邮件服务器产品（如 hMailServer、Microsoft Exchange 等），因为原厂商 True North Software 未针对此 RETR 命令格式处理缺陷发布正式补丁。如短期内无法替换，请在防火墙或访问控制设备中限制 POP3 服务（端口 110/995）仅对可信 IP 开放，并监控服务器日志中的异常连接请求，以降低被恶意利用的风险。"
score = 2.1
severity = "LOW"
sources = ["cve"]
title = "True North Software Internet Anywhere Mail Server RETR 命令拒绝服务漏洞"
updated = "2026-06-16T21:51:04.870"

