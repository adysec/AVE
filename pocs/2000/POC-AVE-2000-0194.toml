[info]
author = "ave"
description = "检测目标主机是否为受 CVE-2000-0219 影响的 Red Hat Linux 6.0 系统，通过模拟单用户模式认证绕过过程验证本地权限提升漏洞存在性。利用 ExploitDB 公开漏洞利用工具检测系统是否允许在密码提示界面按下 Ctrl+C 即可绕过 root 认证。"
id = "POC-AVE-2000-0194"
name = "CVE-2000-0219 Red Hat Linux 6.0 单用户模式认证绕过 PoC"
severity = "high"
tags = ["ave-2000-0194"]
vuln_id = [
    "CVE-2000-0219",
    "AVE-2000-0194",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/exploits/19763"
protocol = "http"

[poc.requests.headers]
User-Agent = "AVE/1.0"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["Red Hat Linux 6.0"]

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["Single User Mode Authentication"]
