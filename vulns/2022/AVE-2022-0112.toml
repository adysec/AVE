[basic]
description = "Linux 内核 iomap 子系统的回写（writeback）错误记录机制中存在内存损坏漏洞。当文件系统（如 XFS）在回写过程中发生 I/O 错误时，`iomap_do_writepage` 函数调用 `__filemap_set_wb_err` 和 `errseq_set` 处理错误记录，但由于对页缓存状态判断不充分，可导致空指针解引用和越界写入（CWE-787）。本地攻击者可通过特制的文件系统操作触发该漏洞，造成系统崩溃（拒绝服务）或潜在的权限提升。CVSS 评分 7.8，危害等级高，影响使用 iomap 框架的 Linux 内核版本。"
published = "2025-09-18T16:15:43.760"
remediation = "立即升级 Linux 内核至 6.1 或更高版本（该漏洞在 6.0 开发周期中修复，6.1 LTS 已包含补丁）。对于无法升级内核的系统，可应用 cherry-pick 提交 `3004c9f1de88`（iomap: fix memory corruption when recording errors during writeback）重新编译内核。临时缓解措施：避免在压力场景下使用 XFS 等 iomap 文件系统执行大量并发回写操作，减少触发概率。"
score = 7.8
severity = "HIGH"
sources = ["msrc"]
title = "Linux Kernel iomap 回写错误记录过程内存损坏漏洞"
updated = "2026-06-17T05:23:28.460"

