[basic]
description = '这是一个针对 Linux xloadimage 4.1 工具的缓冲区溢出漏洞。该工具在处理 FACES 格式图像时，未能正确限制姓名字段的长度，攻击者可通过构造包含过长"Firstname"或"Lastname"字段的恶意图像触发缓冲区溢出。由于xloadimage程序运行于系统权限，该漏洞允许远程未授权攻击者在目标系统上执行任意代码。攻击者无需任何权限即可通过网络发送精心构造的图像文件实现远程代码执行。目前已知影响 Linux 系统中安装了 xloadimage 4.1 版本（同时包含 xli 1.16 和 xli 1.17）的系统。攻击条件相对简单，只要目标系统能接收并处理 FACES 格式图像即可触发漏洞。攻击者可利用此漏洞获取系统控制权，窃取敏感数据，部署恶意程序，或进一步攻击内部网络。漏洞 CVSS 评分 7.5，表明其威胁等级为中高。由于图像格式漏洞普遍难以检测，且攻击者可完全远程实施，黑客常用此漏洞进行入侵。基于上述技术细节，建议立即更新 xloadimage 到最新版本或卸载该程序以降低风险。相关补丁通常可在 Linux 发行版的软件仓库中获取，该工具已经过时，建议用户谨慎使用，避免因使用过时软件导致安全风险。（约93字）'
published = "2001-10-18T04:00:00.000"
remediation = "建议立即升级 xloadimage 至 4.1 以上修复版本（如 Gentoo GLSA-200503-05 提供的版本），或升级 xli 至 1.17 以上版本。Debian 用户请安装 DSA-069 安全更新，FreeBSD 用户升级至 FreeBSD-2005-0167 修复版本。若暂时无法升级，建议卸载 xloadimage/xli 或限制其处理不可信的 FACES 格式图像文件，配置防火墙限制非必要的图像处理服务访问。"
score = 7.5
severity = "HIGH"
sources = ["redhat"]
title = "xloadimage xloadimage 4.1 缓冲区溢出漏洞"
updated = "2026-06-16T21:54:56.080"

