[basic]
description = 'Joomla! 的 PicSell（com_picsell）组件 1.0 版本存在目录遍历漏洞（CWE-22）。该组件在处理 index.php 的 prevsell dwnfree 动作时，未对 dflink 参数进行充分的路径过滤与校验，攻击者可构造包含 "../"（点-点-斜杠）序列的恶意参数值，突破 Web 根目录限制，实现任意文件读取。未经身份认证的远程攻击者只需向目标站点发送特制的 HTTP 请求即可触发该漏洞，从而读取服务器上的敏感文件（如配置文件、源码、口令文件等），可能导致信息泄露乃至进一步渗透。受影响范围为安装了 PicSell 1.0 组件且未打补丁的 Joomla! 站点。'
published = "2010-09-03T18:00:02.577"
remediation = "建议立即升级 Joomla! 至 1.5.22 或更高版本，并卸载或禁用 PicSell (com_picsell) 1.0 组件；若无法升级，请在 Web 应用防火墙配置规则拦截包含 ../ 的 dflink 参数请求，并限制 Web 服务器进程对敏感目录的读取权限。"
score = 5
severity = "MEDIUM"
sources = ["nuclei"]
title = "Joomla! PicSell 组件 目录遍历任意文件读取漏洞"
updated = "2026-06-16T23:22:22.070"

