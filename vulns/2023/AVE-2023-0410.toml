[basic]
description = "该漏洞编号已被 CVE 编号机构（CNA）撤销，不构成有效的安全漏洞。原条目涉及 Linux 内核 AF_UNIX 套接字中 unix_stream_sendpage() 函数的空指针解引用问题，但经评估后判定不属于安全范畴或为重复编号，无实际风险影响，无需采取修复措施。"
published = "2025-12-24T13:16:10.053"
remediation = "升级 Linux 内核至包含 commit c080cee93030 的版本（如 6.1.47+、6.5+），或直接升级到内核 6.5 及以上版本（该问题在 6.5+ 中因 sendpage() 重构已不复存在）。如无法立即升级，可在系统层面禁用 AF_UNIX 套接字传递文件描述符的功能作为临时缓解，但可能影响正常进程间通信。"
score = 5
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux Kernel AF_UNIX 空指针解引用漏洞"
updated = "2025-12-29T16:15:40.430"

