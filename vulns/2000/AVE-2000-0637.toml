[basic]
description = "GNOME esound（Enlightened Sound Daemon）0.2.19 及更早版本在创建 Unix 域套接字时存在竞争条件漏洞（CWE-362）。该漏洞源于程序在建立套接字过程中未正确处理符号链接，本地攻击者可利用该竞争窗口，通过创建指向目标文件或目录的符号链接进行符号链接攻击（symlink attack），从而在套接字创建时覆盖或修改任意文件和目录的权限。攻击成功后，本地用户可获得额外特权，实现权限提升。该漏洞仅影响本地环境（AV:L），攻击复杂度较高（AC:H），无需身份认证（Au:N），但一旦利用成功，将对机密性、完整性和可用性造成完全影响（C:C/I:C/A:C）。受影响系统包括使用 esound 0.2.19 及更早版本的 Linux/Unix 平台，CVSS 评分为 6.2。攻击者需具备本地访问权限，通过构造恶意符号链接并触发 esound 创建套接字的操作来触发漏洞。建议升级至修复版本或禁用不必要的 esound 服务以消除风险。"
published = "2000-11-14T05:00:00.000"
remediation = "升级 esound 至 0.2.20 或更高版本，该版本已将 Unix domain socket 目录从全局可写的 `/tmp/.esd` 移至用户主目录 `~/.esd`，并移除了 socket 及目录的 world-write 权限。若无法升级，可手动应用官方补丁：修改 `esd.h` 中 `ESD_UNIX_SOCKET_DIR` 宏为动态获取用户 home 目录的函数，修改 `esd.c` 中 `mkdir` 和 `chmod` 调用移除 `S_IWOTH`（other write）权限位，同时删除 `/tmp/.esd` 目录并设置 sticky bit（`chmod 1755 /tmp/.esd`）作为临时缓解措施，防止其他用户在该目录下创建符号链接。"
score = 6.2
severity = "MEDIUM"
sources = ["cve"]
title = "GNOME esound Unix Domain Socket 竞争条件权限提升漏洞"
updated = "2026-06-16T21:52:37.687"

