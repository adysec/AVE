[basic]
description = "Novell NetWare 4.1 及 4.11（含 SP5B 补丁）在安装 NDS（Novell Directory Services）5.99 版本时，默认赋予未认证客户端对整个目录树的读取（Read）权限。远程攻击者在无需身份认证的情况下，即可利用系统自带的 CX.EXE 与 NLIST.EXE 等工具连接目标目录树，枚举并读取其中的用户、用户组及其他可读对象等敏感信息。该漏洞影响所有部署了 NDS 5.99 的 Novell NetWare 4.1/4.11 服务器，攻击者仅需网络可达目标服务端口并能运行上述客户端工具即可实施信息泄露，CVSS 评分 7.5，危害等级为高。"
published = "1998-09-18T04:00:00.000"
remediation = "建议升级至 Novell NetWare 5.0 或更高版本（已停止支持），或应用 Novell 发布的 NDS 修补程序（如 NW411SP6A.EXE 及后续补丁）。若无法升级，建议通过防火墙限制 524/TCP 端口仅允许受信任管理网段访问，禁用 CX.EXE 和 NLIST.EXE 客户端工具的网络访问权限，并配置 NDS ACL 移除 [Public] 对树对象的 [Read] 权限，仅授权管理员账户访问敏感对象属性。建议尽快迁移至现代目录服务（如 Microsoft Active Directory 或 OpenLDAP）。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
