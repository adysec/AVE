[basic]
description = 'Windows NT 4.0 SP4 及更早版本存在本地权限提升漏洞。本地用户可通过在 \?? 对象文件夹中使用不同大小写字母修改符号链接表，将链接指向不同的设备对象，从而获取更高系统权限。该漏洞需攻击者拥有本地访问权限，影响范围包括 Windows NT 4.0 全系版本，CVSS 评分 4.6，危害等级中危。由于相关系统已停止支持，建议升级至受支持的 Windows 版本。'
published = "1999-12-31T05:00:00.000"
remediation = '升级至 Windows NT 4.0 SP5 或更高版本，该漏洞已在 SP5 中修复。对于已停止支持的旧系统，应尽快迁移至受支持的 Windows Server 版本（如 Windows Server 2019/2022），并限制本地用户对 \?? 对象目录的写入权限作为临时缓解措施。'
score = 4.6
severity = "MEDIUM"
sources = ["cve"]
title = "Microsoft Windows NT 4.0 本地权限提升漏洞"
updated = "2026-06-16T21:50:10.980"

