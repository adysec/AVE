[basic]
description = "TenFour TFS Gateway 4.0 在非默认配置下存在拒绝服务漏洞。远程攻击者可通过发送包含错误发件人和收件人地址的消息触发该漏洞，导致网关每隔 10 秒持续尝试退回该消息，从而耗尽系统资源造成服务不可用。该漏洞利用门槛较低，仅需能够向目标网关发送消息即可触发，属于典型的应用层逻辑缺陷。"
published = "1999-08-31T04:00:00.000"
remediation = "该漏洞源于非默认配置选项启用后的异常行为，建议将 TFS Gateway 恢复为出厂默认配置，关闭消息回退重试功能；或升级到厂商修补后的最新版本。如无法升级，可在网关或上游防火墙处限制不受信任来源的 SMTP 连接，并对发往无效地址的出站消息数量实施速率限制，防止因反复回退重试耗尽系统资源。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "TenFour TFS Gateway 4.0 邮件地址处理拒绝服务漏洞"
updated = "2026-06-16T21:50:36.357"

