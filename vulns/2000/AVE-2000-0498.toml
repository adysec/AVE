[basic]
description = "WFTPD 及 WFTPD Pro 2.41 版本中的 FTP 服务存在拒绝服务漏洞。远程攻击者在未登录认证的情况下，可直接向目标服务器发送特制的 MLST 命令，导致服务器进程崩溃，造成 FTP 服务不可用。该漏洞攻击门槛低，无需任何认证即可触发，影响 WFTPD 2.34、2.40、2.4.1 及 2.4.1 RC11 等多个版本。"
published = "2000-07-21"
remediation = "升级 WFTPD 至 2.4.2 或更高版本，该版本已修复未登录状态下 MLST 命令导致服务崩溃的问题。由于该软件年代久远厂商可能已停止维护，如无法升级，应在网络防火墙层面限制对 FTP 端口（默认 21）的访问来源，仅允许可信 IP 连接，并部署入侵检测规则拦截未认证的 MLST 命令。"
score = 5.0
severity = "MEDIUM"
sources = [
    "cve",
    "exploitdb",
]
title = "Texas Imperial Software WFTPD MLST 命令远程拒绝服务漏洞"
updated = "2026-06-16"

