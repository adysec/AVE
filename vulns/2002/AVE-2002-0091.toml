[basic]
description = "dhcpcd DHCP 客户端守护进程 1.3.22 及更早版本中存在 shell 元字符注入漏洞。本地攻击者可通过向 dhcpd 的 .info 脚本中注入特制的 shell 元字符，这些字符随后被传递至 .exe 脚本执行，从而以 dhcpcd 进程权限执行任意代码。该漏洞影响 dhcpcd 1.3.22 及之前版本，攻击者需具备本地访问权限，无需身份认证即可利用，CVSS 评分 7.2，危害等级高。"
published = "2003-01-17T05:00:00.000"
remediation = "升级 dhcpcd 至 1.3.17pl2-8.1 或更高版本（Debian 已发布 DSA-219 安全更新），可从 security.debian.org 获取更新包。如无法升级，建议移除 dhcpcd 的 setuid 权限或限制本地用户对 dhcpcd 脚本目录的写入权限作为临时缓解措施。"
score = 7.2
severity = "HIGH"
sources = ["osv"]
title = "dhcpcd DHCP 客户端守护进程本地代码执行漏洞"
updated = "2026-06-16T21:59:15.940"

