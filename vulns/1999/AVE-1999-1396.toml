[basic]
description = "NetXRay 2.6 版本的 Web 管理工具中存在缓冲区溢出漏洞，远程攻击者可通过向目标服务器发送特制的超长 HTTP 请求触发该漏洞，导致目标服务崩溃引发拒绝服务，在特定条件下还可能执行任意命令。该漏洞影响 NetXRay 2.6 及早期版本，CVSS 评分 7.5，危害等级高，建议用户尽快升级至不受影响版本。"
published = "1998-02-18T05:00:00.000"
remediation = "NetXRay 2.6 产品已停止维护，无官方补丁可用。建议立即迁移至现代网络分析工具（如 Wireshark 或 Sniffer 替代品）。若无法迁移，应在防火墙层面限制对 web-admin 工具的访问，仅允许受信任管理 IP 连接，并启用主机防火墙阻止外部对 web-admin 端口的未经授权访问。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "NetXRay Web-Admin 工具缓冲区溢出漏洞"
updated = "2026-06-16T21:49:56.880"

