[basic]
description = "悟空CRM 的 /queryUserList 接口存在认证缺陷，未经身份验证的远程攻击者可直接构造 HTTP GET 请求访问该接口，绕过登录验证机制获取系统中所有用户的账号、角色等敏感信息。该接口未对请求来源进行身份校验，导致攻击者可未授权访问用户数据，危害系统数据安全。"
published = "20260501"
remediation = "立即在 application/ 目录下找到对应的控制器方法，在 queryUserList 入口处增加身份验证检查（如 session/auth_key 校验），确保未登录用户无法访问该接口。同时可在 Nginx/Apache 层面添加规则，限制 /queryUserList 路径仅允许已认证 IP 访问，或通过 WAF 拦截对该路径的未授权请求。建议升级到悟空CRM 最新版本或联系厂商获取安全补丁。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "悟空CRM queryUserList 接口登录绕过漏洞"
updated = "20260501"

