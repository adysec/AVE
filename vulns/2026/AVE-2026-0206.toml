[basic]
description = "LVS 精益价值管理系统的 webser.asmx 接口存在 SQL 注入漏洞，攻击者可通过向 param 参数传入恶意 SQL 语句绕过输入验证，直接操作后端数据库。该漏洞允许未经身份认证的远程攻击者窃取、篡改或删除数据库中的敏感数据，甚至可能通过数据库提权获取服务器控制权。影响范围覆盖使用该系统的所有版本，攻击条件仅需目标系统暴露 webser.asmx 接口且 param 参数未做参数化处理。利用方式为构造包含 SQL 注入载荷的 HTTP 请求发送至该接口，建议厂商尽快发布补丁采用预编译语句修复，并配合 WAF 防护和网络访问控制降低风险。"
published = "nday"
remediation = "升级 LVS 精益价值管理系统至最新安全版本；对 webser.asmx 中 param 参数实施参数化查询或预编译处理，彻底阻断 SQL 注入；在 Web 服务器或防火墙上限制 webser.asmx 接口仅允许内网 IP 访问；部署 WAF 规则拦截针对该接口的 SQL 注入特征载荷。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "LVS 精益价值管理系统 webser.asmx SQL注入漏洞"
updated = "nday"

