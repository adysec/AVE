[basic]
description = "Concatus IMate Web Mail Server 2.5 存在远程缓冲区溢出漏洞。攻击者通过向目标 SMTP 服务发送超长 HELO 命令，可触发栈缓冲区溢出，导致服务进程崩溃拒绝服务或可能执行任意代码。受影响版本为 IMate Web Mail Server 2.5 及更早版本，CVSS 评分 5.0，危害等级中危。"
published = "2000-06-01T04:00:00.000"
remediation = "该漏洞影响 Concatus IMate Web Mail Server 2.5，厂商已停止维护且无安全更新。建议立即迁移至受支持的邮件服务器（如 Postfix、Dovecot 等），并在防火墙层面限制 SMTP 端口的访问来源 IP，仅允许可信网段连接。如无法迁移，可部署 IPS/IDS 规则拦截超长 HELO 命令作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Concatus IMate Web Mail Server 远程缓冲区溢出漏洞"
updated = "2026-06-16T21:51:53.020"

