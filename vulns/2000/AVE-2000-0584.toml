[basic]
description = "此漏洞存在于 Netscape 4.73 及更早版本中，浏览器在用户曾经接受过某个网站证书后无法正确警告用户后续访问其他网站时出现的无效证书。这导致攻击者可通过篡改目标网站的 DNS 信息，冒充该合法网站向用户提供虚假服务，诱使用户输入敏感信息或执行恶意操作。该漏洞影响 Netscape 4.73 及更早版本用户，攻击者无需任何权限即可远程实施，属于典型的中等危害安全漏洞。"
published = "2000-05-26T04:00:00.000"
remediation = '建议立即升级 Netscape Communicator 到 4.74 或更高版本（如 Netscape 6.0 及以上），或迁移至现代浏览器（如 Firefox、Chrome 等现代浏览器）。若无法立即升级，请在浏览器设置中启用"警告证书不匹配"选项，并在 DNS 服务器启用 DNSSEC 验证以防止 DNS 劫持导致的证书欺骗攻击。'
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Netscape Netscape 4.73 证书欺骗漏洞"
updated = "2026-06-16T21:51:54.310"

