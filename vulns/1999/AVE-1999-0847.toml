[basic]
description = "Symantec Norton AntiVirus 在处理特定构造的恶意文件时，由于对输入数据长度校验不足，存在堆/栈缓冲区溢出缺陷。攻击者可诱导用户打开特制文件，触发溢出并执行任意代码，导致系统被控制或服务崩溃。攻击需用户交互打开恶意文件方可利用。"
published = "1999-12-31"
remediation = "升级到 Symantec Norton AntiVirus 5.0 或更新版本，并避免打开来源不明的文件，及时应用厂商发布的安全更新。"
score = 5.0
