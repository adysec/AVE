[basic]
description = "tags.<value>nph-publish 1.2 之前版本存在目录遍历漏洞，远程攻击者可通过在上传操作的路径名中使用“..”（点点）目录遍历序列，覆盖服务器上的任意文件。该漏洞源于 nph-publish 脚本对上传文件路径缺乏有效过滤，攻击者可构造包含目录遍历序列的恶意路径，实现任意文件覆盖写入。攻击者无需身份认证即可远程利用，可能导致关键系统文件被覆盖、Webshell 植入或服务拒绝。受影响版本为 nph-publish 1.2 之前版本，建议升级至 1.2 或更高版本修复。"
published = "1999-12-31T05:00:00.000"
remediation = '建议立即升级 nph-publish 到 1.2 版本或更高版本，修复目录遍历漏洞。若无法立即升级，可在 Web 服务器配置中限制 nph-publish 脚本的上传目录权限，禁止上传目录的父目录写入权限，或在 Web 应用防火墙配置路径遍历防护规则拦截包含 ".." 的上传路径请求。建议同时检查服务器文件系统是否已被写入恶意文件。'
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "nph-publish 目录遍历任意文件写入漏洞"
updated = "2026-06-16T21:49:52.990"

