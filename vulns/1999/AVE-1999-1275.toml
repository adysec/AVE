[basic]
description = "Linux 内核 2.0.34 及早期版本存在权限校验缺陷，未能正确限制普通用户向任意进程发送 SIGIO 信号。本地攻击者无需特殊权限即可向未捕获该信号的进程发送 SIGIO，导致目标进程异常终止或功能失效，从而造成拒绝服务。该漏洞影响 Linux Kernel 2.0 和 2.1 系列版本，攻击条件要求攻击者拥有目标系统的本地访问权限，利用方式简单直接，仅需通过系统调用发送信号即可完成攻击，无需复杂构造或 elevated 权限。"
published = "1998-06-30T04:00:00.000"
remediation = "升级 Linux 内核至 2.0.35 或 2.2.x 及以上版本以修复 SIGIO 信号校验缺陷。若无法立即升级，可通过配置内核限制普通用户向非自身进程发送信号的权限，并在系统层面以非 root 用户运行受影响服务，降低本地拒绝服务风险。"
score = 2.1
severity = "LOW"
sources = ["exploitdb"]
title = "Linux Kernel SIGIO 信号本地拒绝服务漏洞"
updated = "2026-06-16T21:50:26.860"

