[basic]
description = "NLS（自然语言服务）存在缓冲区溢出漏洞，远程攻击者可通过向目标系统发送特制请求触发该漏洞，导致任意代码执行或以目标进程权限执行恶意操作。该漏洞影响 UNICOS 9、AIX 4.2、RedHat 4、IRIX 6、Slackware 3 等多个 Unix 系统及 libc 5.2.18 版本，CVSS 评分 7.5，危害等级高危。受影响系统须升级至厂商修复版本或应用相关补丁。"
published = "1997-02-13T05:00:00.000"
remediation = "升级各操作系统至已修复版本：Red Hat 升级至 5.0+；AIX 安装 APAR IX73245 补丁；IRIX 升级至 6.3+；Slackware 升级至 3.2+；libc 升级至 5.2.19+。这些系统均已 EOL，建议迁移至现代受支持的操作系统版本。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "多款Unix系统 libc NLS组件缓冲区溢出漏洞"
updated = "2026-06-16T21:47:26.153"

