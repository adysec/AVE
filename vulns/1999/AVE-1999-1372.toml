[basic]
description = "SCO UNIX 4.0 及之前版本的 passwd 命令存在安全漏洞，本地攻击者可通过特定操作破坏 passwd 文件或相关认证机制，导致系统无法正常验证用户身份，进而阻止所有用户（包括合法用户）登录系统，造成拒绝服务。该漏洞利用门槛较低，具有本地访问权限的攻击者即可实施攻击。受影响版本包括 SCO UNIX 4.0 及更早版本。"
published = "1993-05-24T04:00:00.000"
remediation = "SCO 已针对此漏洞发布补丁，建议升级至 SCO UNIX 4.2 或更高版本。对于已停止技术支持的老旧系统，应迁移至受支持的现代操作系统（如 Linux 或 BSD），并确保 passwd 及相关认证组件为最新版本。临时缓解措施可限制不可信用户对系统的本地访问权限。"
score = 6.4
severity = "MEDIUM"
sources = ["epss"]
title = "SCO Unix 4.0 passwd 拒绝服务漏洞"
updated = "2026-06-16T21:49:51.167"

