[basic]
description = "Joomla! 的 AddressBook 组件（com_addressbook）1.5.0 版本存在目录遍历漏洞。远程攻击者可通过向 index.php 文件的 controller 参数传入 `..` 路径序列，绕过访问限制读取服务器上的任意文件，导致敏感信息泄露。该漏洞无需身份认证即可利用，攻击复杂度低。受影响的组件广泛应用于各类 Joomla! 站点，危害等级高，CVSS 评分 7.5。"
published = "2010-04-19T19:30:00.790"
remediation = "立即卸载 com_addressbook 组件，该组件 1.5.0 及更早版本已多年无人维护且无安全补丁。在 wp-content/plugins/ 或 components/ 目录下检查并删除相关文件。如业务依赖该功能，建议使用受支持的替代插件或自行在入口文件中对 controller 参数进行严格过滤，拒绝包含 `../` 等目录遍历字符的输入。"
score = 7.5
severity = "HIGH"
sources = ["nuclei"]
title = "Joomla AddressBook 组件 1.5.0 本地文件包含漏洞"
updated = "2026-06-16T23:18:27.510"

