[basic]
description = "Linux 内核 arm64 架构的 ptrace 子系统中，`tagged_addr_ctrl_set()` 函数在处理 `NT_ARM_TAGGED_ADDR_CTRL` 寄存器集时未初始化临时变量 `ctrl`，当通过 `SETREGSET` 以零长度调用时，函数会使用栈上未初始化的值，导致最多 64 位内核栈内存信息泄露。该漏洞为本地漏洞，攻击者需具备低权限访问，通过构造特制的 ptrace 调用即可触发。由于 `set_tagged_addr_ctrl()` 仅接受 bits[63:4] 为零的值，泄露利用受限且写入机制不可用，但可能造成系统不稳定或敏感信息泄露。CVSS 评分 6.1，危害等级中危。"
published = "2025-01-11T15:15:07.680"
remediation = "立即升级 Linux 内核至 6.13 及以上版本，或更新至以下已包含补丁的稳定版：5.10.231、5.15.174、6.1.120、6.6.66、6.12.5。各发行版用户请安装对应安全更新（如 Debian 用户参考 DLA-4075，Ubuntu 用户参考 USN-7381-1/USN-7450-1）。如无法立即升级，可通过禁用 ptrace 系统调用或限制非特权用户对 SETREGSET 的访问作为临时缓解措施。"
score = 6.1
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux Kernel arm64 ptrace 未初始化变量导致内核栈信息泄露漏洞"
updated = "2026-06-17T08:14:07.273"

