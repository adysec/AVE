[basic]
description = "安恒 AiLPHA 大数据安全分析平台存在任意用户登录漏洞（认证绕过），由于会话验证机制存在缺陷，未经授权的远程攻击者可通过构造特殊请求绕过身份认证，直接登录系统后台获取管理员权限，进而窃取敏感数据或植入恶意后门。该漏洞影响 AiLPHA 多版本，危害严重。"
published = "0718"
remediation = "建议联系安恒技术支持获取 AiLPHA 最新安全补丁进行升级，彻底修复认证绕过缺陷。临时缓解措施包括：将 AiLPHA 管理后台限网段访问（仅允许运维 IP），并开启平台的双因素认证功能。同时在 Web 前置防火墙配置严格的会话校验规则，阻断未授权访问请求。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "安恒 AiLPHA 任意用户登录漏洞"
