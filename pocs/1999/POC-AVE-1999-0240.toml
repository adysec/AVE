[info]
author = "ave"
description = "Metamail 2.8 remote command execution via malformed MIME attachment interpreted as filename"
id = "POC-AVE-1999-0240"
name = "CVE-1999-0683 PoC"
severity = "medium"
tags = ["cve-1999-0683"]
vuln_id = [
    "CVE-1999-0683",
    "AVE-1999-0240",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/cgi-bin/metamail.cgi"
protocol = "http"

[poc.requests.body]
content = ""
type = "raw"

[poc.requests.headers]
User-Agent = "AVE/1.0"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "metamail",
    "Metamail",
]
