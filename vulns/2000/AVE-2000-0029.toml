[basic]
description = "Red Hat Linux 的 initscripts 软件包存在符号链接竞争条件漏洞，本地普通用户可通过在 /tmp 等可预测路径中预先创建恶意符号链接，诱使以 root 权限执行的初始化脚本在写入文件时误操作，从而覆盖系统文件或获取 root 权限。该漏洞影响 Red Hat Linux 多个版本，攻击者需拥有本地用户账户方可利用，CVSS 评分 6.2，危害等级中危。"
published = "2000-10-20T04:00:00.000"
remediation = "将 Red Hat Linux 中的 initscripts 软件包升级至 5.00-1 及以上版本，该版本在 /tmp 临时文件处理中使用了安全的 mktemp 机制，避免使用可预测路径名，从而消除符号链接攻击面。如无法升级，可限制本地用户对 /tmp 目录的写入权限作为临时缓解。"
score = 6.2
severity = "MEDIUM"
sources = ["avd"]
title = "Red Hat Linux initscripts 本地权限提升漏洞"
updated = "2026-06-16T21:50:51.573"

