[basic]
description = "Windows NT 4.0 Resource Kit 中包含的 telnet 工具存在拒绝服务漏洞。远程攻击者无需身份认证，只需向目标系统的 telnet 服务发起连接后立即关闭该连接，即可导致 telnet 服务进程崩溃或资源耗尽，造成目标系统无法正常提供 telnet 服务。该漏洞影响 Microsoft Windows NT 4.0 系统，攻击复杂度低，利用方式简单，无需任何前置权限。"
published = "1999-01-01T05:00:00.000"
remediation = "立即卸载 Windows NT 4.0 Resource Kit 中的 telnet.exe 工具，或将其重命名/移出系统路径以阻止调用。对于仍须使用 telnet 服务的环境，在防火墙层面限制仅信任 IP 可访问 23 端口，并升级到受支持的 Windows Server 版本（如 Windows Server 2019/2022）以彻底规避该问题。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "Microsoft Windows NT 4.0 Resource Kit Telnet 拒绝服务漏洞"
updated = "2026-06-16T21:48:04.357"

