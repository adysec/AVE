[basic]
description = "Microsoft FrontPage 2000 Server Extensions 1.1 的 shtml.exe 组件存在信息泄露漏洞。远程攻击者可通过向服务器发送包含标准 DOS 设备名称（如 CON、NUL、AUX 等）的畸形 URL 请求，触发 shtml.exe 处理异常，从而获取服务器组件的物理路径信息。该漏洞可被利用于进一步探测目标系统结构，为后续攻击提供信息支撑。攻击无需身份认证，仅需向目标服务器发送特制 HTTP 请求即可触发。"
published = "2000-10-20T04:00:00.000"
remediation = "建议升级至 Microsoft FrontPage 2000 Server Extensions 1.2 或更高版本，该版本已修复 shtml.exe 路径泄露问题。如无法升级，可在 IIS 中移除 shtml.exe 的脚本映射执行权限，或通过 URLScan 工具拦截包含 DOS 设备名（如 CON、NUL、AUX）的请求作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Microsoft FrontPage 2000 Server Extensions shtml.exe 物理路径泄露漏洞"
updated = "2026-06-16T21:52:19.130"

