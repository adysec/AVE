title = "Linux 内核 远程访问服务 缺少法定警示横幅信息漏洞"
description = "该系统在向远程用户（如通过 SSH、Telnet 或 FTP 等方式访问）提供登录或连接界面时，未能展示适当的法律声明、警告或授权使用提示信息。攻击者在未经授权的情况下连接目标系统时，因缺少"未经授权禁止访问"等法定警示横幅，降低了其法律风险感知，增加了系统被非法入侵的可能性，并可能导致组织在合规审计（如 CIS 基准、NIST、FISMA）中不符合安全配置要求。该问题属于配置类弱点，影响所有提供远程访问服务且未配置登录横幅的 Linux 及其他类 Unix 系统。"
severity = "CRITICAL"
score = 10.0
sources = ["cve"]
published = "2000-06-01"
updated = "2026-06-16"
remediation = "配置系统登录前/登录后的法定警示横幅，具体操作：1) 编辑 /etc/issue 与 /etc/issue.net 添加"Authorized users only. All activity may be monitored"等法定警告；2) 在 SSH 服务端配置 /etc/ssh/sshd_config 的 Banner /etc/issue.net 并重启 sshd；3) 为 Telnet/FTP 等inetd 服务配置 /etc/motd 登录后横幅；4) 参照 CIS Benchmark 登录横幅基线进行合规加固，确保所有远程访问入口均展示法律声明。"
