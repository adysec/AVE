[basic]
description = "Computalynx CMail 2.3 SP2/2.4 版本的SMTP服务器存在缓冲区溢出漏洞，攻击者可向服务器发送定制的邮件命令数据包，超量写入MAIL FROM命令缓冲区，越界覆盖函数返回地址，从而实现对服务器的远程代码执行控制。该漏洞影响Computalynx CMail 2.3 SP2和2.4版本的用户，可远程无需认证即可攻击服务器，CVSS评分10.0，危害等级为严重，攻击者可完全接管目标邮件系统。"
published = "1999-09-12T04:00:00.000"
remediation = "立即升级到 Computalynx CMail 的最新官方版本以修复 SMTP 缓冲区溢出漏洞，或在无法更新时通过防火墙封锁端口 25/110 并限制 MAIL FROM 命令长度为 512 字节以下作为临时缓解措施。"
score = 10
severity = "CRITICAL"
sources = ["cve"]
title = "计算凌思源 CMail 2.3 SP2/2.4 SMTP 服务器缓冲区溢出漏洞导致远程代码执行"
updated = "2026-06-16T21:50:37.103"

