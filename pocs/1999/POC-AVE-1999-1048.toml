[info]
author = "ave"
description = "检测目标系统上 gzexe 脚本是否存在。GNU gzip 的 gzexe 脚本 (CVE-1999-1332) 在创建临时文件时使用可预测的文件名，可能被本地攻击者利用符号链接攻击获取目标用户权限。"
id = "POC-AVE-1999-1048"
name = "GNU gzip gzexe 不安全临时文件创建漏洞 PoC"
severity = "low"
tags = ["ave-1999-1048"]
vuln_id = [
    "CVE-1999-1332",
    "AVE-1999-1048",
]

[poc]
logic = "any"

[[poc.requests]]
path = "/usr/bin/gzexe"
protocol = "file"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["#!/bin/sh"]

[[poc.requests]]
path = "/bin/gzexe"
protocol = "file"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["#!/bin/sh"]
