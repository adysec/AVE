[basic]
description = "Cisco Secure PIX Firewall 2.7/3.x/4.x/5 版本存在 TCP RST 伪造包识别缺陷，远程攻击者可通过向防火墙发送伪造的 TCP 重置（RST）数据包，强制防火墙关闭合法连接，导致拒绝服务。该漏洞利用方式简单，无需认证即可实施，影响使用上述版本 PIX 防火墙的网络环境，CVSS 评分 5.0，危害等级中等。"
published = "2000-03-20T05:00:00.000"
remediation = "升级至 Cisco PIX OS 版本 5.2(1) 或更高版本（如 6.x 系列），该版本通过 TCP 序列号验证机制防止伪造 RST 攻击。若无法升级，可在入口 ACL 中限制源 IP 并启用 TCP 拦截 (tcp intercept) 功能降低攻击成功率。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Cisco Secure PIX Firewall TCP RST 伪造数据包拒绝服务漏洞"
updated = "2026-06-16T21:52:06.677"

