[info]
author = "ave"
description = "检测目标系统是否安装了受 CVE-1999-0989 影响的 MSDXM.OCX 控件，通过触发 vnd.ms.radio 协议处理程序验证漏洞组件是否存在。"
id = "POC-AVE-1999-1608"
name = "CVE-1999-0989 PoC"
severity = "high"
tags = ["ave-1999-1608"]
vuln_id = [
    "CVE-1999-0989",
    "AVE-1999-1608",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/poc-cve-1999-0989.html"
protocol = "http"

[poc.requests.body]
content = ""
type = "raw"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "vnd.ms.radio",
    "MSDXM.OCX",
    "buffer overflow",
]
