[info]
author = "AVE"
description = "检测 ISC INN inndstart 的 inn.conf 配置文件是否被非 root 用户可写，该漏洞允许本地用户通过构造 pathrun 参数以 root 权限执行任意程序"
id = "POC-AVE-1999-0514"
name = "ISC INN inndstart 本地权限提升漏洞检测"
severity = "high"
tags = [
    "cve-1999-0785",
    "inn",
    "privilege-escalation",
    "local",
]
vuln_id = [
    "CVE-1999-0785",
    "AVE-1999-0514",
]

[poc]
logic = "any"

[[poc.requests]]
path = "/etc/news/inn.conf"
protocol = "file"

[[poc.requests.matchers]]
expect = true
part = "body"
regex = ".+"
type = "regex"

[[poc.requests]]
path = "/etc/inn.conf"
protocol = "file"

[[poc.requests.matchers]]
expect = true
part = "body"
regex = ".+"
type = "regex"
