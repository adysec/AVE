[basic]
description = "3Com 和 Ascend 路由器在处理 TCP 选项时存在拒绝服务漏洞。远程攻击者无需认证即可向目标路由器发送包含零长度 TCP 选项的恶意数据包，触发路由器 TCP 协议栈处理异常，导致路由器崩溃并重启，造成正常的网络服务中断。该漏洞影响 3Com 及 Ascend 系列路由器产品，CVSS 评分 5.0，危害等级中危。"
published = "1997-12-01T05:00:00.000"
remediation = "将 Ascend 路由器固件升级至 R 4.5 Ci12 之后版本，3Com 路由器升级至官方发布修补的最新固件版本；在网络边界防火墙上配置 ACL 规则，丢弃包含零长度 TCP 选项（Option Length=0）的异常报文；鉴于该产品早已停止支持，建议更换为仍在维护周期内的现代路由器设备作为根本解决方案。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Ascend及3Com路由器TCP零长度选项拒绝服务漏洞"
updated = "2026-06-16T21:47:52.973"

