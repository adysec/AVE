[basic]
description = "Linux 内核 amdgpu 显卡驱动中存在资源未释放漏洞（CWE-772），当用户卸载 amdgpu 驱动模块时，PSP（平台安全处理器）分配的 BO（缓冲对象）未被正确释放，导致调用 amddrm_buddy_fini 时触发内核 calltrace 警告。本地攻击者可通过加载后卸载 amdgpu 驱动触发该漏洞，造成内核内存泄漏和系统稳定性问题。该漏洞影响使用 amdgpu 驱动的 Linux 系统，CVSS 评分 5.5，危害等级中等。官方已通过将 psp_free_shared_bufs 移至 psp_sw_fini 修复。"
published = "2025-09-15T14:15:37.753"
remediation = '升级 Linux 内核至 6.6.0 及以上版本，或合入补丁 commit 9b3c5c9b8b4e（"drm/amdgpu: fix calltrace warning in amddrm_buddy_fini"）。如无法升级内核，可避免在运行时卸载 amdgpu 驱动模块（rmmod amdgpu）以触发该内存释放路径，直到完成内核更新。'
score = 5.5
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux Kernel AMDGPU 驱动资源释放不当漏洞"
updated = "2026-06-17T06:44:23.847"

