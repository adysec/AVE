[basic]
description = "Red Hat Linux 4.2 中的 netcfg 2.16-1 存在安全配置缺陷，当特定选项被设置后，系统重启时以太网接口的访问权限控制不当，导致本地普通用户能够控制并关闭网络接口，进而引发拒绝服务攻击。该漏洞影响 Red Hat Linux 4.2 系统，CVSS 评分 2.1，危害等级低，攻击者需具有本地系统访问权限方可利用。"
published = "1999-12-31T05:00:00.000"
remediation = "升级至 Red Hat Linux 更新版本或迁移至现代 RHEL 发行版（如 RHEL 7/8/9），该漏洞在后续版本中已修复。如无法升级，可移除 netcfg 软件包（rpm -e netcfg）或限制 /etc/sysconfig/network-scripts/ 目录权限为仅 root 可写（chmod 700 /etc/sysconfig/network-scripts），防止普通用户重启时控制网络接口。"
score = 2.1
severity = "LOW"
sources = ["avd"]
title = "Red Hat Linux netcfg 本地拒绝服务漏洞"
updated = "2026-06-16T21:50:12.733"

