[basic]
description = "Debian Internet Message (IM) 141-18 及更早版本在创建临时文件和目录时使用了可预测的名称，本地攻击者可通过预测临时文件路径，利用 impwagent 组件创建的临时目录获取未授权的目录权限，或通过 immknmz 组件覆盖和创建任意文件，导致权限提升或敏感信息泄露。该漏洞攻击复杂度低，但需要本地访问权限，影响 Debian 系统上运行的 Internet Message 服务。"
published = "2003-01-17T05:00:00.000"
remediation = "升级 Internet Message (IM) 软件包至修复版本：Debian 用户升级至 im-141-18.1 或更高版本（参考 DSA-202），Red Hat Linux 用户通过 up2date 安装 RHSA-2003:038 提供的更新包。如无法立即升级，限制本地不可信用户登录系统，并避免在多用户环境下使用 impwagent 和 immknmz 工具。"
score = 2.1
severity = "LOW"
sources = ["osv"]
title = "Debian Internet Message 以不安全方式创建临时文件漏洞"
updated = "2026-06-16T21:59:14.957"

