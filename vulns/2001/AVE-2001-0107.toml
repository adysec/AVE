[basic]
description = "xloadimage 4.1（又称 xli 1.16 和 1.17）是 Linux 平台上常用的图像查看工具。该工具在处理 FACES 格式图像文件时存在缓冲区溢出漏洞，当图像文件中包含过长的 Firstname 或 Lastname 字段时，会触发栈缓冲区溢出。未经身份认证的远程攻击者可通过网络发送特制的 FACES 格式图像文件诱使目标用户打开，当用户使用受影响版本的 xloadimage 查看该图像时，攻击者即可在目标系统上执行任意代码，进而完全控制该 Linux 系统。"
published = "2001-10-18T04:00:00.000"
remediation = 'xloadimage 4.1 及同版本的 xli（1.16 和 1.17）均受此缓冲区溢出漏洞影响，应立即升级至修复版本：Gentoo 用户执行 emerge --ask --oneshot --verbose ">=media-gfx/xloadimage-4.1-r2" 和 emerge --ask --oneshot --verbose ">=media-gfx/xli-1.17.0-r1"；Debian 用户根据 DSA-069 和 DSA-695 使用 apt-get upgrade 更新 xloadimage 或 xli 软件包；Red Hat 用户安装 RHSA-2001-088 安全补丁。如暂无法升级，可临时禁用或卸载 xloadimage/xli 工具，避免向受信来源之外打开 FACES 格式图像文件，以缓解远程任意代码执行风险。'
score = 7.5
severity = "HIGH"
sources = ["exploitdb"]
title = "xloadimage xloadimage 远程缓冲区溢出漏洞"
updated = "2026-06-16T21:54:56.080"

