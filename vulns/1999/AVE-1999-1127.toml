[basic]
description = "Sun HotSpot Performance Engine VM 存在拒绝服务漏洞。远程攻击者可通过向运行 HotSpot 的服务器发送包含 `[` 字符的特制 URL，触发虚拟机引擎解析异常，导致 HotSpot 服务崩溃或停止响应，进而造成拒绝服务。该漏洞影响安装了 Sun Java HotSpot 的 Microsoft IIS 4.0 服务器，攻击者无需认证即可远程利用，CVSS 评分 5.0，危害等级中等。"
published = "1999-07-06T04:00:00.000"
remediation = "将 Microsoft IIS 升级至 5.0 及以上版本，并移除或升级 Sun Java HotSpot Performance Engine VM。如无法全面升级，通过 IIS URLScan 工具或请求筛选模块拦截包含 `[` 字符的恶意请求。建议同步迁移至现代 Java 运行时环境（如 OpenJDK 17+）以避免类似问题。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Sun Java HotSpot Performance Engine VM 拒绝服务漏洞"
updated = "2026-06-16T21:50:31.667"

