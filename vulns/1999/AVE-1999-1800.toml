[basic]
description = "IIS 4.0 的域名解析模块存在访问限制绕过漏洞。当攻击者的 IP 地址无法正常反向解析到 DNS 域名时，IIS 服务器未能对初始会话请求施加正确的访问限制检查，导致攻击者可绕过基于域名或 IP 地址的访问控制策略，获取非授权资源的访问权限。该漏洞影响 Microsoft IIS 4.0 版本，CVSS 评分 7.5，危害等级高，攻击者无需认证即可远程利用，从而降低服务器安全性。"
published = "1999-12-31T05:00:00.000"
remediation = '立即将 IIS 4.0 升级至 Windows 2000 自带的 IIS 5.0 或更高版本（IIS 6.0+），该漏洞已在后续版本中修复。若无法升级，请在 IIS 管理器中禁用"域名解析"功能，或限制匿名用户访问策略，仅允许已解析的 IP 地址建立会话。另外建议在网络层配置反向 DNS 校验，拒绝未通过域名解析的请求。'
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "Microsoft IIS 域名解析访问限制漏洞"
updated = "2026-06-16T21:50:00.120"

