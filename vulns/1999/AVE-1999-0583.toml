[basic]
description = "FTP 协议 PASV 被动模式存在设计缺陷，远程攻击者可利用竞争条件在合法客户端之前连接至服务器为该客户端开放的临时数据端口，导致未经授权的数据访问和敏感信息窃取。若攻击者抢先占用该数据端口，还可导致合法客户端无法完成数据传输，造成拒绝服务。该漏洞影响多种 FTP 服务器实现，攻击者无需认证即可远程利用，CVSS 评分 6.4，危害等级中危。"
published = "1999-02-01T05:00:00.000"
remediation = "升级至支持 PASV 地址绑定检查的 FTP 服务器（如 vsftpd 3.0+、ProFTPD 1.3.5+），配置数据端口仅接受与控制连接相同 IP 的连接请求。启用 FTPS（FTP over TLS/SSL，RFC 2228）加密数据通道防止窃听；条件允许时切换到 SFTP/SCP。在服务器上限制 PASV 端口范围为固定区间，并通过防火墙仅允许预期客户端 IP 访问该端口段作为临时缓解。"
score = 6.4
severity = "MEDIUM"
sources = ["epss"]
title = "多厂商 FTP 服务器 PASV 模式拒绝服务与未授权数据访问漏洞"
updated = "2026-06-16T21:48:12.610"

