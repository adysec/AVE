[basic]
description = "NTMail 5.x 邮件服务软件存在安全绕过漏洞，攻击者可通过将网络请求重定向至 NTMail 的 Web 配置服务器，从而绕过其代理访问限制规则。该漏洞允许未经授权的网络用户在未经过身份认证的情况下绕过代理策略控制，获取对受保护资源的访问权限，影响运行 NTMail 5.x 的 Windows 2000 系统。"
published = "2000-05-11T04:00:00.000"
remediation = "升级 NTMail 至 5.x 以上已修复此漏洞的版本，或禁用 NTMail Web 配置服务器的外部网络访问。在防火墙层面限制对 NTMail Web 配置端口（通常为 8000/TCP）的访问，仅允许受信任的管理 IP 连接。如无法升级，可在 NTMail 配置中关闭 Web 管理接口的远程访问功能。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "NTMail 5.x 代理限制绕过漏洞"
updated = "2026-06-16T21:51:40.200"

