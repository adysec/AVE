[basic]
description = "Gitea 1.26.2 版本中存在组织标签访问控制缺陷漏洞，由于未正确对私有组织的标签读取端点实施可见性限制，导致未经授权的用户可通过 Organization Labels API 获取私有组织的标签元数据，造成敏感信息泄露。该漏洞影响 Gitea 1.26.2 及之前版本，CVSS 评分 7.5，危害等级高。攻击者无需认证即可利用此漏洞获取本应仅限组织成员访问的标签信息，但无法对标签进行修改操作。"
published = "2026-07-03T21:16:57.503"
remediation = "立即将 Gitea 升级至 v1.26.4 或更高版本（官方强烈建议跳过 v1.26.3 直接升级到 v1.26.4，因 v1.26.3 存在仓库代码页加载回归问题）。该漏洞已在 PR #38151 中修复，升级后系统会在组织标签读取端点强制校验组织可见性，非成员用户无法再通过 Organization Labels API 获取私有组织标签数据。如无法立即升级，可暂时移除非成员对 Organization Labels API 的访问权限作为临时缓解措施。"
score = 7.5
severity = "HIGH"
sources = ["ghsa"]
title = "Gitea Gitea 私人组织标签未授权访问漏洞"
updated = "2026-07-07T18:16:36.270"

