[basic]
description = "Fujitsu Chocoa IRC 客户端在处理 IRC 频道主题（Topic）时存在缓冲区溢出漏洞。远程攻击者可通过向运行该客户端的用户发送特制的畸形频道主题数据，触发缓冲区溢出，导致客户端崩溃或可能执行任意代码。该漏洞影响 Fujitsu Chocoa 1.0 beta7R 版本，CVSS 评分 5.1，危害等级中危。"
published = "1999-08-01T04:00:00.000"
remediation = "Fujitsu Chocoa 1.0 beta7R 已停止维护，官方未发布修复版本。建议立即停止使用该客户端，迁移至仍在维护的 IRC 客户端（如 mIRC、HexChat、Irssi）。作为临时缓解措施，可在 IRC 服务器端或客户端配置中过滤/禁用自动解析频道主题，避免触发缓冲区溢出。"
score = 5.1
severity = "MEDIUM"
sources = ["avd"]
title = "Fujitsu Chocoa IRC 客户端 Topic 缓冲区溢出漏洞"
updated = "2026-06-16T21:48:48.990"

