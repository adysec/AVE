[basic]
description = "泛微OA E-Office 的 OfficeServer.php 存在任意文件上传漏洞，未经身份认证的远程攻击者可通过构造特制 HTTP 请求向服务器上传恶意 WebShell 文件，从而获取服务器控制权。该漏洞影响泛微 E-Office 多个版本，危害严重，攻击者无需任何权限即可利用，可能导致企业内网被渗透、敏感数据泄露等严重后果。"
published = "08.11"
remediation = "立即联系泛微官方获取 E-Office 最新安全补丁包进行升级，或升级至不受影响的版本；在 ngnix/apache 层配置 OfficeServer.php 的访问白名单，仅允许内部 trusted IP 访问；部署 WAF 规则拦截上传目录下的 PHP/JSP/ASPX 等可执行脚本文件访问；在服务器层面禁止上传目录的执行权限（取消 +x）；定期检查 attachment/ 目录下是否存在可疑 webshell 文件。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "泛微OA E-Office OfficeServer.php 任意文件上传漏洞"
updated = "08.11"

