[basic]
description = "W3C HTTP服务器存在路径泄露漏洞，攻击者无需身份验证即可远程向服务器发送请求访问不存在的URL，从而获取服务器真实目录结构或命令路径。该漏洞影响W3C HTTP服务器的用户。攻击者利用该漏洞可以收集服务器内部文件布局，为后续攻击提供指引。此漏洞的CVSS评分7.5，危害等级为高。该漏洞在早期版本中存在，但具体补丁信息尚需查询。"
published = "2000-01-18T05:00:00.000"
remediation = "建议升级到 W3C httpd 3.0A 及以上已修复版本；若无法升级，可在 httpd.conf 中关闭详细错误信息输出、配置 ErrorDocument 自定义错误页面避免泄露路径，并在前端反向代理或防火墙过滤对不存在路径的探查请求作为临时缓解。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "W3C CERN httpd 路径泄露漏洞"
updated = "2026-06-16T21:50:57.407"

