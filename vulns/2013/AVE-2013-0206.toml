[basic]
description = "Oracle Java SE 7 Update 17及更早版本中的Java运行时环境（JRE）HotSpot组件存在类型混淆漏洞。远程攻击者可通过诱使用户访问恶意网页，触发Java Applet中的反射类型混淆漏洞，利用MethodHandles方法绕过Java安全沙箱的权限检查机制，通过反射修改任意public final字段（如整型和双精度浮点型字段），最终禁用Security Manager安全管理器，实现完全沙箱逃逸。该漏洞影响Oracle Java SE 7及OpenJDK 7，攻击复杂度较高，需要用户交互（访问恶意页面），但成功利用后可完全控制目标系统。该漏洞已被CISA列入已知被利用漏洞目录（KEV），且已有公开的Metasploit利用模块。"
published = "2013-04-17T18:55:07.087"
remediation = "升级 Oracle Java SE 至 7 Update 21 及以上版本，或安装 Oracle 2013 年 4 月关键补丁更新 (CPU)。对于无法立即升级的环境，建议在浏览器中禁用 Java Applet 或卸载 Java 运行时环境 (JRE) 以消除攻击面。OpenJDK 7 用户应更新至包含安全修复的最新版本。"
score = 3.7
severity = "LOW"
sources = ["kev"]
title = "Oracle Java SE HotSpot 类型混淆权限绕过漏洞"
updated = "2026-06-16T23:53:20.027"

