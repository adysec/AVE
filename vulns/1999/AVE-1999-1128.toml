[basic]
description = "Squid Web Proxy 2.2.STABLE5 及更早版本在使用外部认证机制时存在访问控制绕过漏洞。攻击者可在用户/密码对中插入换行符，绕过 Squid 的访问控制列表（ACL）检查，从而未经授权访问受保护的代理服务。该漏洞影响 Squid 1.0/1.1/2.1 等多个版本，CVSS 评分 5.0，危害等级中危。建议升级至 Squid 2.2.STABLE6 或更高版本以修复此漏洞。"
published = "1999-12-31T05:00:00.000"
remediation = '升级 Squid 至 2.2.STABLE6 或更高版本，该版本修复了外部认证时换行符绕过访问控制的问题。如无法升级，在外部认证脚本中对用户名和密码做换行符过滤（如 strip \r\n）作为临时缓解措施。'
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Squid Web Proxy 身份验证绕过漏洞"
updated = "2026-06-16T21:50:32.043"

