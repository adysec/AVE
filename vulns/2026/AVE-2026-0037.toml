[basic]
description = "绿盟 SAS 安全审计系统存在任意文件读取漏洞，攻击者可在未授权情况下通过构造特制的 HTTP 请求，利用路径遍历等方式读取服务器上的任意文件（如配置文件、系统文件等），导致敏感信息泄露。该漏洞攻击复杂度低，无需用户认证及交互，危害较大。建议用户升级至最新版本或联系厂商获取补丁。"
published = "08.10"
remediation = '立即联系绿盟科技技术支持（400-818-6868）获取 SAS 安全审计系统安全加固补丁，升级至修复该漏洞的官方最新版本。临时缓解措施：在 WAF 或反向代理层对文件读取相关接口的参数进行路径遍历关键词过滤，拦截 `../`、`..\`、`%2e%2e/` 等序列；同时在防火墙限制对 SAS 系统 Web 管理端口（默认 443/TCP）的访问来源 IP，仅允许运维管理网段访问。'
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "绿盟 SAS安全审计系统 任意文件读取漏洞"
updated = "08.10"

