[basic]
description = "Adobe Flash Player 存在内存损坏漏洞（CWE-787 越界写入），攻击者可通过未指定的攻击向量触发内存损坏，导致远程任意代码执行或拒绝服务。该漏洞影响 Windows 和 OS X 上 13.0.0.281 之前版本、14.x 至 17.x 中 17.0.0.169 之前版本，以及 Linux 上 11.2.202.457 之前版本。CVSS 3.1 评分 9.8（严重），攻击向量为网络、攻击复杂度低、无需权限、无需用户交互。2015 年 4 月已发现在野利用，攻击者可诱导用户访问恶意网页或打开恶意文件触发漏洞，获取系统控制权或导致浏览器崩溃拒绝服务。Adobe 已发布安全更新修复此漏洞，CISA 已将其列入已知被利用漏洞目录。"
published = "2015-04-14T22:59:21.323"
remediation = "立即卸载 Adobe Flash Player（已于 2020 年 12 月 31 日停止支持），Windows 用户可通过“控制面板 → 程序和功能 → 卸载 Adobe Flash Player”或运行 Adobe 官方卸载工具（https://fpdownload.macromedia.com/get/flashplayer/current/uninstall_flash_player.exe）彻底移除；Linux 用户执行 `sudo apt remove flashplugin-installer` 或 `sudo yum remove flash-plugin` 卸载；浏览器端彻底禁用 Flash 插件（Chrome/Edge/Firefox 均已默认禁用）。如因遗留业务必须暂时保留，请升级至最后版本：Windows/macOS 升级至 32.0.0.465（最终版），Linux 升级至 11.2.202.635，并配置浏览器点击播放策略、禁用自动播放、部署网络层拦截 Flash 内容作为临时缓解，但必须制定淘汰计划彻底移除。"
score = 9.8
severity = "CRITICAL"
sources = ["kev"]
title = "Adobe 产品 Flash Player 内存损坏漏洞"
updated = "2026-06-17T00:25:10.877"

