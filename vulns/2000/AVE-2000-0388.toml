[basic]
description = "Caldera 操作系统 dump 套件中的 rmt 命令存在权限管理缺陷，本地普通用户可通过利用 rmt 命令在处理文件时对 setuid 权限的继承问题，以 root 身份执行任意操作，从而实现本地权限提升。该漏洞影响 Caldera OpenLinux 等系统，攻击者需拥有本地 shell 访问权限，利用难度较低，CVSS 评分 7.2，危害等级为高危。"
published = "2000-07-12T04:00:00.000"
remediation = "立即升级 dump 软件包至 0.4b4 以上版本，或从 Caldera 官方安全公告 CSSA-1999-014 获取补丁修复 rmt 命令的权限提升漏洞。如无法升级，移除 rmt 的 setuid 位（chmod u-s /sbin/rmt）作为临时缓解措施。"
score = 7.2
severity = "HIGH"
sources = ["cve"]
title = "Caldera dump 组件 rmt 命令本地权限提升漏洞"
updated = "2026-06-16T21:51:34.767"

