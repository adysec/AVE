[basic]
description = "Solaris 7.0 系统中的 kcms_configure 工具存在基于栈的缓冲区溢出漏洞。本地攻击者可通过设置超长的 NETPATH 环境变量，在调用 kcms_configure 时触发缓冲区溢出，从而覆盖进程内存空间中的关键数据，实现权限提升并获取 root 权限。该漏洞利用条件简单，仅需本地 Shell 访问权限即可触发，影响 Solaris 7.0 系统。"
published = "1999-11-20T05:00:00.000"
remediation = "Solaris 7.0（SunOS 5.7）已停止官方支持多年，建议立即升级至受支持的 Oracle Solaris 11.4 版本以获得完整安全补丁。若短期内无法升级操作系统，应立即执行以下缓解措施：使用 chmod 命令移除 kcms_configure 二进制文件的 SUID/SGID 位（chmod u-s /usr/lib/kcs/kcms_configure），并限制该文件的访问权限至仅 root 用户可读写执行（chmod 700 /usr/lib/kcs/kcms_configure）。同时在系统层面设置 NETPATH 环境变量的最大长度限制，防止通过超长环境变量触发缓冲区溢出。建议在防火墙层面禁止非授权用户对相关配置工具的访问，并定期审计系统中 /usr/lib/kcs 目录下所有二进制文件的权限设置。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "Sun Solaris kcms_configure 本地缓冲区溢出提权漏洞"
updated = "2026-06-16T21:49:07.333"

