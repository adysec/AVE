[basic]
description = "nweb2fax 0.2.7 及更早版本中存在多处目录遍历漏洞，远程攻击者无需身份认证即可通过在 comm.php 的 id 参数或 viewrq.php 的 var_filename 参数中构造 `../` 序列进行路径遍历，从而读取服务器上的任意文件。该漏洞利用难度低、危害中等，可能泄露系统敏感配置与用户数据。"
published = "2009-04-08T10:30:00.280"
remediation = "nweb2fax 已于 2008 年停止维护，官方未发布修复版本。建议迁移至其他维护中的传真解决方案（如 HylaFAX+ AvantFAX 组合）；若无法替换，需在 Web 服务器（Apache/Nginx）层面对 comm.php 和 viewrq.php 的 id、var_filename 参数添加路径遍历过滤规则，禁止包含 ../ 及空字节序列，同时禁用 exec() 等危险 PHP 函数。"
score = 5
severity = "MEDIUM"
sources = ["nuclei"]
title = "nweb2fax 0.2.7 目录遍历漏洞"
updated = "2026-06-16T23:02:44.093"

