[basic]
description = "UltraBoard 1.6 中的 UltraBoard.pl 及 UltraBoard.cgi CGI 脚本存在目录遍历漏洞。远程攻击者可通过向脚本传入包含 `../` 序列且以空字符结尾的路径名参数，绕过路径过滤限制，实现任意文件读取。该漏洞无需身份认证即可利用，可读取目标服务器上的敏感配置文件或系统文件，危害较大。受影响版本为 UltraBoard 1.6，建议升级至最新版本或部署 Web 应用防火墙进行防护。"
published = "2000-05-03T04:00:00.000"
remediation = "立即停用 UltraBoard 1.6 并将论坛迁移至活跃维护的替代产品（如 phpBB、Discourse）。如无法立即迁移，在 Web 服务器层面配置 URL 重写规则拦截包含 `../` 及 null 字节的请求，并移除 UltraBoard.pl/UltraBoard.cgi 的 SUID 权限以降低影响范围。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "UltraScripts UltraBoard 1.6 目录遍历漏洞"
updated = "2026-06-16T21:51:29.747"

