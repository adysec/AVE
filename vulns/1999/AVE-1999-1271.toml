[basic]
description = "HP JetAdmin 1.0.9 Rev. D 针对临时文件日志的符号链接保护机制存在严重缺陷。该漏洞允许本地攻击者通过精心构造的符号链接，绕过访问控制机制，直接修改目标系统上的任意文件权限。在 HP JetAdmin D.01.09 运行于 Solaris 操作系统环境中时，/tmp/jetadmin.log 文件尤其容易受到此类攻击。攻击者无需远程网络访问权限，只需本地权限即可执行权限提升操作，完成对系统关键文件的权限篡改。该漏洞影响范围限于 HP JetAdmin D.01.09 在 Solaris 系统上的部署，CVSS 评分显示该漏洞危害等级为中高危。相关厂商已发布安全补丁，建议尽快升级到最新版本以修复此安全缺陷。"
published = "1998-07-15T04:00:00.000"
remediation = "建议将 HP JetAdmin 升级至修复该符号链接问题的后续版本（D.01.10 或更高），并联系 HP 获取官方补丁。临时缓解措施：以 root 身份删除 /tmp/jetadmin.log 并创建不可写目录或定期清理，限制普通用户对 /tmp 的写权限，或将 JetAdmin 运行账户降权至非特权用户，避免其具备修改其他文件权限的能力。"
score = 7.2
severity = "HIGH"
sources = ["exploitdb"]
title = "HP JetAdmin 符号链接漏洞"
updated = "2026-06-16T21:50:25.853"

