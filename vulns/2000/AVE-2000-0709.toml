[basic]
description = "Red Hat Linux 6.2 的 Piranha 软件包中，Linux 虚拟服务器（LVS）的 Web 管理界面（GUI）存在一个硬编码的后门密码。该界面默认监听于特定端口并允许通过口令认证的远程用户执行系统命令。未经授权的远程攻击者在获知该后门密码后，可直接通过网络访问 Web GUI 并绕过正常身份验证，进而以服务运行权限在目标主机上执行任意命令，完全控制服务器。该漏洞影响安装了 Piranha 包且启用 LVS Web 管理功能的 Red Hat 6.2 系统，利用条件仅需网络可达目标端口并掌握后门口令，危害极大。"
published = "2000-04-24T04:00:00.000"
remediation = "建议立即升级至 Red Hat Linux 6.2 后续修复版本或应用官方安全补丁（RHSA-2000:047）。若无法立即升级，请修改 Piranha Web GUI 默认账户密码（用户名 piranha，默认密码 q），并在防火墙层面限制 3636 端口仅允许受信 IP 访问。建议停用不必要的 LVS Web 管理界面服务以彻底消除攻击面。"
score = 10
severity = "CRITICAL"
sources = ["exploitdb"]
