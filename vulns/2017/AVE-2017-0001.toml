[basic]
description = "Perl 的 Storable 模块 3.05 之前版本中存在栈溢出漏洞，位于 retrieve_hook 函数处理类名长度时。该函数将类名长度存储为有符号整数，但在读取操作中将其作为无符号整数处理，导致攻击者可通过构造特制的序列化数据触发栈溢出。该漏洞 CVSS 评分 10.0，危害等级严重，影响所有使用受影响 Storable 模块的 Perl 应用，攻击者无需身份认证即可利用。"
published = "2026-04-21T16:16:18.077"
remediation = "立即升级 Perl Storable 模块至 3.05 或以上版本，可通过 CPAN 执行 `cpan -i Storable` 更新。如无法立即升级，避免使用 Storable 反序列化不可信来源数据，并限制应用程序对不受信任二进制数据的解包操作。补丁已合入 Perl 5 主干分支，提交 ID 为 a258c17c6937f79529c8319a829310e09cdbd216。"
score = 10
severity = "CRITICAL"
sources = ["msrc"]
title = "Perl Storable 模块堆栈溢出漏洞"
updated = "2026-06-17T01:15:27.847"

