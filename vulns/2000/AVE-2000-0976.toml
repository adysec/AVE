[basic]
description = "Microsoft Windows NT 4.0 的 IIS 4.0 服务中 INETINFO.EXE 进程存在拒绝服务漏洞，远程未经身份验证的攻击者可通过发送一系列畸形的 URL 请求，导致 INETINFO.EXE 进程崩溃或停止响应，从而造成 IIS 服务拒绝服务。该漏洞影响运行 IIS 4.0 的 Windows NT 4.0 系统，CVSS 评分 5.0（中危），攻击向量为网络，攻击复杂度低，无需身份认证，仅影响可用性。攻击者无需身份认证即可通过网络发送畸形 URL 请求触发漏洞，导致 IIS 服务拒绝服务。"
published = "2000-11-14T05:00:00.000"
remediation = "建议立即升级到 Windows 2000 Server 及 IIS 5.0 以上版本，或安装 Microsoft 安全公告 MS00-078 (KB273843) 修补补丁。若无法立即升级，可在防火墙层面拦截针对 IIS 的异常 URL 请求，或在 IIS 管理器中禁用不必要的 ISAPI 扩展映射作为临时缓解措施。如仍运行 Windows NT 4.0，强烈建议制定迁移计划尽快迁移至受支持的操作系统版本。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Microsoft IIS 4.0 拒绝服务漏洞"
updated = "2026-06-16T21:52:36.887"

