[basic]
description = "Sun Java Web Server 1.1 Beta 存在源代码泄露漏洞，远程攻击者无需认证即可通过直接访问 .jhtml 文件获取服务器端 CGI 程序的原始源代码。该漏洞源于服务器未正确配置对 .jhtml 扩展名文件的处理方式，导致敏感信息（如数据库连接凭证、业务逻辑等）泄露，为后续攻击提供便利。影响 Sun Java Web Server 1.1 Beta 版本。"
published = "1999-01-01T05:00:00.000"
remediation = "立即升级至 Sun Java Web Server 1.1 正式版或更高版本，该问题已在后续版本中修复。由于 Sun Java Web Server 已停止维护，建议迁移至现代 Java 应用服务器（如 Apache Tomcat 或 Eclipse Jetty），并禁用目录列表功能，避免直接访问 .jhtml 源码。作为临时措施，可在 Web 服务器层面配置访问控制规则，限制对 .jhtml 文件的直接请求。"
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "Sun Java Web Server 源文件泄露漏洞"
