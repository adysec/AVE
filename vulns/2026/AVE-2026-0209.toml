[basic]
description = "Citrix NetScaler 存在任意文件读取漏洞，未经身份认证的远程攻击者可发送特制的 HTTP 请求，利用该漏洞读取目标系统上的敏感文件（如配置文件、密钥等），导致敏感信息泄露。该漏洞影响 Citrix NetScaler 14.1 及 13.1 系列版本，CVSS 评分高危。厂商已在 14.1-72.61+ 及 13.1-63.18+ 版本中修复此漏洞，建议用户及时升级。"
published = "nday"
remediation = "建议立即升级 Citrix NetScaler / ADC 至 14.1-72.61 及以上版本或 13.1-63.18 及以上版本，以修复任意文件读取漏洞。如无法立即升级，可在网关/负载均衡层面限制对敏感路径的访问并启用 WAF 规则进行临时缓解。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "Citrix NetScaler 任意文件读取漏洞"
