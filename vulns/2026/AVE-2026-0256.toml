[basic]
description = "EGroupware 存在远程代码执行漏洞，源于不正确的授权检查机制（CWE-285），结合文件写入原语和任意文件读取漏洞，使得经过身份认证的攻击者能够在服务器上执行任意命令。若系统启用了用户自助注册功能，则攻击者可在无需预先认证的情况下利用该漏洞，实现完全的系统控制。该漏洞影响 EGroupware 多个版本，CVSS 评分 8.7，危害等级高危。厂商已在 26.2.20260224 及 23.1.20260224 版本中修复此漏洞。"
published = "2026-07-20T16:16:57.680"
remediation = "立即将 EGroupware 升级到 26.2.20260224（26.x 分支）或 23.1.20260224（23.x 分支）及以上版本。如无法立即升级，可在管理后台关闭用户自助注册功能（user self-registration），并在 Web 服务器层面限制对 index.php 中 importexport_export_ui.download 及 SmallParT 相关端点的非授权访问作为临时缓解。"
score = 8.7
severity = "HIGH"
sources = ["ghsa"]
title = "EGroupware 远程代码执行漏洞"
updated = "2026-07-21T16:17:07.783"

