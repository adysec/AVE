[basic]
description = "EMURL 2.0 是基于 Web 的电子邮件账户管理软件，其会话 URL 中编码了可预测的用户标识符，导致远程攻击者无需身份认证即可通过构造或猜测 URL 直接访问其他用户的电子邮件账户。该漏洞影响 Seattle Lab Software Emurl 2.0 版本，攻击者仅需知道目标用户的会话 URL 模式即可实施攻击，危害等级中等，建议升级至更高版本或采用随机化会话标识机制。"
published = "2000-05-15T04:00:00.000"
remediation = "EMURL 2.0 使用可预测的会话标识符，攻击者可构造 URL 直接访问其他用户邮箱。建议立即升级到最新版本（如 EMURL 3.0 或更高），该版本改进了会话 ID 生成机制；若厂商已停止支持，应迁移至其他活跃维护的 Web 邮件系统（如 Roundcube、SquirrelMail 等），并在迁移前通过反向代理或 Web 应用程序防火墙对会话 Cookie 实施额外的加密与验证措施。如无法立即升级，可在 Web 服务器层禁用 URL 会话标识符传递方式，强制使用 Cookie 传递会话信息，并配置 URL 重写规则屏蔽包含可疑会话 ID 模式的请求。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Seattle Lab Software EMURL 会话标识符可预测漏洞"
updated = "2026-06-16T21:51:37.840"

