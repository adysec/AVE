[basic]
description = "GNU tar 1.13.19 及之前版本（1.13.25 之前）存在任意文件写入漏洞。由于安全补丁修改了 tar 的符号链接检查逻辑，导致安全检查被有效禁用，远程攻击者可通过构造恶意的 tar 归档文件，利用符号链接攻击在解压时覆盖目标系统上的任意文件。该漏洞影响 GNU tar 1.13.19 至 1.13.24 版本，攻击者无需身份认证即可远程触发，危害等级中危。"
published = "2002-10-28T05:00:00.000"
remediation = "升级 GNU tar 至 1.13.25 或更高版本，该版本重新启用了被禁用的符号链接安全检查。对于 Red Hat 系发行版，安装 RHSA-2002:138 提供的更新包。如无法立即升级，可在解压前手动检查 tar 包中是否包含符号链接文件，避免以 root 权限解压不可信的 tar 包。"
score = 5
severity = "MEDIUM"
sources = ["osv"]
title = "GNU tar 符号链接攻击任意文件写入漏洞"
updated = "2026-06-16T21:58:56.860"

