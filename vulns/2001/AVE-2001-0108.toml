[basic]
description = "Marconi ASX-1000 系列交换机存在拒绝服务漏洞，远程攻击者可通过向目标设备的 telnet 和 Web 管理接口发送设置了 SYN-FIN 标志位及更多分片属性的畸形数据包，导致管理服务崩溃或无法响应，造成管理功能不可用。该漏洞影响运行 Forethought 6.2 版本的 ASX-1000 交换机，无需认证即可远程触发，CVSS 评分 5.0，危害等级中等。"
published = "2001-05-03T04:00:00.000"
remediation = "升级 Marconi Forethought 操作系统至最新版本（若仍受厂商支持）；在网络边界防火墙配置规则，丢弃含有 SYN-FIN 和 More Fragments 标记的异常数据包；限制仅受信 IP 地址可访问设备的 Telnet（23/TCP）和 Web 管理（80/TCP）接口；如不必要，建议关闭 Telnet 和 Web 管理服务，仅通过串行控制台或 SSH 进行管理操作。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Marconi ASX-1000 交换机 Telnet 和 Web 管理接口拒绝服务漏洞"
updated = "2026-06-16T21:54:00.060"

