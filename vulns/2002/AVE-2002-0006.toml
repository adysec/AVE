[basic]
description = "OpenSSH 的 sshd 组件在挑战响应认证（ChallengeResponseAuthentication）过程中存在整数溢出漏洞（CWE-190），当使用 SKEY 或 BSD_AUTH 认证方式时，远程攻击者无需身份认证即可通过特制的认证请求触发整数溢出，导致缓冲区溢出，最终实现任意代码执行。该漏洞影响 OpenSSH 2.9.9 至 3.3 版本，CVSS 评分 9.8，危害等级严重。"
published = "2002-07-03T04:00:00.000"
remediation = "升级 OpenSSH 至 3.4 或更高版本以修复整数溢出漏洞。如无法立即升级，在 sshd_config 中启用 UsePrivilegeSeparation yes 并禁用 ChallengeResponseAuthentication 与 SKEY/BSD_AUTH 认证方式作为临时缓解措施。"
score = 9.8
severity = "CRITICAL"
sources = ["osv"]
title = "OpenBSD OpenSSH 整数溢出远程代码执行漏洞"
updated = "2026-06-16T21:57:50.390"

