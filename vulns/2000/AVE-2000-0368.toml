[basic]
description = "Red Hat Linux 6.1 中 ORBit 和 esound 组件在生成认证密钥时使用了弱随机数，导致本地攻击者可通过暴力枚举或预测方式猜测认证密钥，从而绕过身份验证机制获取未授权访问权限。该漏洞影响 Red Hat Linux 6.1 系统，攻击者需具备本地用户权限，成功利用后可获取系统敏感信息或执行未授权操作。"
published = "1999-12-03T05:00:00.000"
remediation = "升级 Red Hat Linux 至 6.2 或更高版本，该版本修复了 ORBit 和 esound 随机数生成强度不足的问题。由于 Red Hat Linux 6.1 已停止维护，建议迁移至受支持的 Red Hat Enterprise Linux 发行版，并确保系统安全补丁保持最新。如无法升级，可限制本地用户对 esound 服务的访问权限，通过配置文件 /etc/esd.conf 设置仅允许受信任用户连接。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "Red Hat Linux ORBit 和 esound 弱认证漏洞"
updated = "2026-06-16T21:51:32.937"

