[basic]
description = "Netscape Enterprise Server 在处理畸形 URL 时存在输入验证缺陷，远程攻击者无需身份认证即可向目标服务器发送特制请求，导致服务拒绝响应（DoS）或执行任意命令。该漏洞影响 NetWare 5.1 系统上运行的 Netscape Enterprise Server，CVSS 评分 7.5，危害等级高。目前官方已发布安全更新修复此问题。"
published = "2000-06-26T04:00:00.000"
remediation = "升级 Netscape Enterprise Server 至最新补丁版本（当时已发布修复版本），或升级至更高版本服务器软件。在 NetWare 5.1 上配置输入验证规则，过滤包含畸形字符的 URL 请求。鉴于该产品已停止维护，建议将 NetWare 5.1 系统迁移至受支持的操作平台，或对暴露的服务器实施网络隔离和访问控制列表限制。若无法立即升级，可在 Web 服务器前端部署反向代理或 WAF 过滤恶意 URL 请求。（注：该漏洞于 2000 年修复，厂商已停止支持，强烈建议迁移至现代平台。）"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "Netscape Enterprise Server 远程代码执行漏洞"
updated = "2026-06-16T21:52:05.120"

