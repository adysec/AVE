[basic]
description = 'Ipswitch WS_FTP 组件（含 IMail 5.0 及 WS_FTP Server 1.0.1/1.0.2）存在本地提权漏洞。本地低权限用户可通过修改注册表中 "flags" 键值为 1920 的方式获取额外权限，进而篡改或新增邮件账户，达到提升系统权限的目的。该漏洞影响运行上述版本的系统，攻击者需先获得对目标机器的本地访问权限后方可利用，利用方式简单但可能导致邮件服务被非法接管或数据泄露。'
published = "1999-02-02T05:00:00.000"
remediation = '立即将 Ipswitch IMail 升级至 6.0 及以上版本，并将 WS_FTP Server 升级至 1.0.3 及以上版本；升级前应为普通用户配置最小权限，禁止写入 HKLM\Software\Ipswitch 注册表项，仅允许管理员修改 "flags" 键值，防止本地用户篡改注册表实现提权。'
score = 4.6
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Ipswitch IMail 和 WS_FTP Server 本地权限提升漏洞"
updated = "2026-06-16T21:49:52.283"

