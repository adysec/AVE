[basic]
description = "Podman 和 Buildah 容器引擎在并行构建容器镜像时存在竞争条件漏洞，当使用 `--jobs=2` 参数构建恶意 Containerfile 时，攻击者可利用时间窗口绕过容器隔离机制实现容器逃逸，枚举主机文件系统中的文件和目录信息。该漏洞影响 Podman 及 Buildah 多个版本，CVSS 评分 8.6，危害等级高。即使启用 SELinux 也无法完全阻止文件信息泄露，建议升级至最新版本修复。"
published = "2025-01-22T05:15:08.903"
remediation = "将 buildah 升级至 1.33.12、1.35.5、1.37.6 或 1.38.1 及以上版本（各分支修复版本）。Red Hat 用户请安装 RHSA-2025:0830 及后续相关 errata 更新。如无法立即升级，临时缓解措施包括：避免对不可信的 Containerfile 使用 --jobs=2 及以上并行构建参数，并启用 SELinux  enforcing 模式（虽不能完全阻止枚举，但可降低容器逃逸影响）。"
score = 8.6
severity = "HIGH"
sources = ["msrc"]
title = "Podman 和 Buildah 容器构建竞争条件容器突破漏洞"
updated = "2026-06-29T21:16:29.563"

