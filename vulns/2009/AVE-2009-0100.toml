[basic]
description = "Microsoft Office Excel 在处理特制电子表格文件中的 FEATHEADER 记录时存在内存损坏漏洞，由于对 cbHdrData 大小元素的验证不足导致指针偏移错误，远程攻击者可通过诱使用户打开恶意构造的 .xls 文件触发该漏洞，成功利用可在目标系统上执行任意代码。该漏洞影响 Excel 2002/2003/2007、Office 2004/2008 for Mac、Excel Viewer 及 Office 兼容包等多个版本，Microsoft 已在 MS09-067 安全公告中发布补丁修复。"
published = "2009-11-11T19:30:00.530"
remediation = "安装 Microsoft 安全公告 MS09-067 提供的更新 (KB973965)，升级至不受影响的 Office 版本；如无法立即打补丁，建议禁用 Excel 打开来自不可信来源的 .xls 文件，并使用 Microsoft 基线安全分析器 (MBSA) 检测缺失补丁。"
score = 7.8
severity = "HIGH"
sources = ["kev"]
title = "Microsoft Office Excel FEATHEADER 记录内存破坏远程代码执行漏洞"
updated = "2026-06-16T23:11:00.237"

