[basic]
description = "XFree86 3.3.x 版本的 Xlib 库中存在缓冲区溢出漏洞。本地攻击者可通过设置超长的 DISPLAY 环境变量或在命令行中传递特制的 -display 参数，导致缓冲区溢出。成功利用此漏洞的攻击者可获取目标系统的 root 权限，执行任意命令。该漏洞影响 XFree86 3.3.5 及 3.3.6 版本，需本地访问权限进行利用。"
published = "2000-12-19"
remediation = "升级至 XFree86 4.0 及以上版本，已修复 xlib 对 DISPLAY 变量的缓冲区边界检查缺陷。对于仍使用 3.3.x 的系统，可应用 SGI 安全公告 20020502-01-I 中的补丁程序。因 XFree86 已停止维护，建议迁移至 X.Org Server 作为替代方案。"
score = 4.6
severity = "MEDIUM"
sources = [
    "cve",
    "exploitdb",
]
title = "XFree86 Xlib Display 缓冲区溢出漏洞"
updated = "2000-10-12"

