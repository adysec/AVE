[basic]
description = "SuSE Linux 6.x 的 aaa_base 组件及早期版本中的 cron.daily 存在文件名处理缺陷，本地攻击者可创建包含空格的恶意文件名存放于 /tmp 目录，当 aaa_base 清理过期临时文件时，将空格错误解析为文件分隔符，导致可删除系统任意文件。该漏洞影响 SuSE Linux 6.3 及更早版本，CVSS 评分 2.1，需本地用户权限，危害等级低。"
published = "2000-05-02T04:00:00.000"
remediation = "升级至 SuSE Linux 7.0 或更高版本，该漏洞已在后续版本中修复。如无法升级，可修改 aaa_base 脚本，在处理 /tmp 目录过期文件时对文件名添加引号包裹以防止空格被错误解析，同时限制 aaa_base 的执行权限为 root 用户。"
score = 2.1
severity = "LOW"
sources = ["cve"]
title = "SuSE Linux aaa_base 任意文件删除漏洞"
updated = "2026-06-16T21:51:24.927"

