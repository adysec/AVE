[basic]
title = "BMC Patrol 代理权限访问控制漏洞（帧伪造）"
description = "BMC Patrol 系统的远程代理（agent）在接收管理端通信数据时缺乏严格的源身份验证机制。未经身份认证的远程攻击者可通过伪造（spoofing）特制数据帧的方式，伪装为合法管理端与目标 agent 建立通信连接，从而绕过正常的访问控制流程并获取未授权的 agent 访问权限。该漏洞可利用条件极低（无需认证、攻击复杂度低、可远程触发），一旦成功利用将导致受影响主机完整性、机密性与可用性全面受损，攻击者可读取或修改监控配置、中断监控流程。CVSS v2 评分高达 10.0，危害等级为最高危，影响运行 BMC Patrol 代理的基础设施主机。"
severity = "CRITICAL"
score = 10.0
sources = ["cve", "avd"]
published = "1999-04-09"
updated = "2026-06-16"
remediation = "由于该漏洞年代较早，建议升级至 BMC 发布的修复版本（参考 BMC 官方安全公告）。如无法立即升级，应在网络边界防火墙或路由器上配置访问控制列表（ACL），仅允许受信任的管理主机 IP 连接至 Patrol agent 监听端口；同时启用主机级访问控制，限制 agent 仅接受来自可信管理服务器的连接请求，阻断远程攻击者的伪造帧连接尝试。"
