[basic]
description = "Microsoft Internet Explorer存在未明特权提升漏洞（CVE-2014-4123），该漏洞源于浏览器在处理恶意网站特制代码时，未对边界进行严格验证，导致堆内存溢出攻击。攻击者无需身份验证即可远程触发漏洞，通过精心构造的JavaScript或HTML代码，在IE进程上下文中执行任意代码，从而突破安全沙盒限制。在此基础上，攻击者进一步利用漏洞实现进程内存控制，成功劫持执行流，在普通用户权限下提升至系统权限（如LocalSystem），完全控制受影响的Windows系统。该漏洞影响广泛，涵盖IE 9、10及11等多个版本，以及包含IE的Microsoft Windows Server系统。攻击者可借此获取系统完整控制权，窃取敏感数据、安装后门程序或进一步横向移动。2020年9月微软发布MS20-1011安全更新，修复了这一历史遗留漏洞，建议所有用户及时更新补丁以消除安全风险。"
published = "2014-10-15"
remediation = '建议立即安装 Microsoft 发布的 MS14-037 安全更新（KB2975684），升级 Internet Explorer 至 11.0.15 或更高版本（IE 9/10/11 均有对应补丁）。如无法立即打补丁，可在组策略中禁用 IE 的"允许网站提示安装软件"和"允许未签名的 ActiveX 控件"选项，或启用增强保护模式（IE 10+），同时在防火墙层面限制非受信站点的 ActiveX 控件下载作为临时缓解措施。'
score = 5
severity = "MEDIUM"
sources = ["kev"]
title = "Microsoft Internet Explorer 特权提升漏洞"
updated = "2014-10-15"

