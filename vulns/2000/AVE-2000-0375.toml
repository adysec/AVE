[basic]
description = "XFree86 X11R6 3.3.5/3.3.6/4.0 版本的 X 服务器在处理发送到 6000 端口的 TCP 数据包时，未正确验证数据包中的计数器字段值。远程攻击者可构造包含负数计数器值的畸形 TCP 数据包发送至目标系统的 6000 端口（X11 服务默认端口），触发整数溢出或逻辑错误导致 X 服务器崩溃，造成拒绝服务攻击。该漏洞影响 XFree86 3.3.x 及 4.0 版本，CVSS 评分 5.0（AV:N/AC:L/Au:N/C:N/I:N/A:P），攻击无需认证、网络可远程发起，仅影响可用性。攻击者无需认证即可远程发起攻击，利用方式为向目标主机 6000 端口发送精心构造的恶意 TCP 数据包导致 X 服务崩溃拒绝服务。ExploitDB 已公开 PoC（EDB-19950）。"
published = "2000-05-18T04:00:00.000"
remediation = "升级XFree86 X11r6至CVE-2000-0453官方补丁版本（如3.3.8或更高版本），修补TCP数据包处理中的负数计数器漏洞。如无法立即打补丁，可在防火墙上禁用或限制访问端口6000（X11服务端口），临时缓解服务崩溃风险。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "XFree86 X11r6 TCP包拒绝服务漏洞"
updated = "2026-06-16T21:51:46.020"

