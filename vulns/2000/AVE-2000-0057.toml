[basic]
description = "Windows NT 4.0 的 NtImpersonateClientOfPort 本地过程调用（LPC）存在权限提升漏洞，漏洞源于 LPC 端口请求伪造（Spoofed LPC Port Request）。本地攻击者可通过向目标系统发送特制的 LPC 端口请求，利用该漏洞冒充客户端在服务端进程中执行操作，从而获得系统级权限。该漏洞影响 Windows NT 4.0 系统，CVSS 评分 7.2，危害等级高。微软已发布安全更新修复此漏洞。"
published = "2000-01-12T05:00:00.000"
remediation = "立即安装 Microsoft 安全公告 MS00-003 提供的补丁程序。Windows NT 4.0 Workstation/Server/Enterprise Edition 用户请从 Microsoft Download Center 下载并安装对应补丁（Intel 版或 Alpha 版）；Windows NT 4.0 Server Terminal Server Edition 用户请升级至 Service Pack 6。如无法立即打补丁，建议限制用户交互式登录权限，仅允许受信任用户从键盘登录服务器以降低风险。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "Microsoft Windows NT 4.0 LPC 端口请求欺骗权限提升漏洞"
updated = "2026-06-16T21:50:56.313"

