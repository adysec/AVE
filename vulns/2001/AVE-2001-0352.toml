[basic]
description = "OpenLDAP 的 slapd 守护进程在处理 LDAP 协议请求时，对 Basic Encoding Rules (BER) 格式数据的长度字段验证存在缺陷。未经身份认证的远程攻击者可通过网络向目标 slapd 服务发送包含无效 BER 长度字段的特制数据包，触发服务崩溃。该漏洞影响 OpenLDAP 1.x 版本 1.2.12 之前以及 2.x 版本 2.0.8 之前的所有版本，导致目录服务拒绝服务。攻击者只需能够访问 slapd 监听的网络端口即可发起利用，无需任何用户凭证或交互，成功利用后将使 slapd 进程异常终止，造成目录服务不可用。"
published = "2001-07-16T04:00:00.000"
remediation = "将 OpenLDAP 升级至 2.0.8（2.x 分支）或 1.2.12（1.x 分支），并应用官方发布的安全补丁。如暂无法升级，可在防火墙层限制对 slapd 端口（默认为 389/tcp 和 636/tcp）的外部访问，仅允许可信来源连接，以缓解拒绝服务风险。"
score = 5
severity = "MEDIUM"
sources = ["redhat"]
title = "OpenLDAP slapd 基础编码规则拒绝服务漏洞"
updated = "2026-06-16T21:55:20.553"

