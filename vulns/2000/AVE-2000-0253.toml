[basic]
description = "华盛顿大学（University of Washington）IMAP 服务程序 imapd 4.7 版本存在缓冲区溢出漏洞。拥有合法账户的用户可通过精心构造超长参数，向目标服务器的 LIST 等 IMAP 命令发送超出预期长度的数据，触发栈缓冲区溢出。攻击者在通过身份验证后，可覆盖返回地址并执行任意命令，从而获取目标系统的用户级权限。该漏洞影响运行 UoW imapd 4.7 的邮件服务器，远程已认证用户即可利用，无需物理接触目标主机。"
published = "2000-04-16T04:00:00.000"
remediation = "建议立即升级至 Washington University IMAP 服务器 2000.287 之后的修复版本（如 2001.315 或更高版本），或迁移至 Dovecot、Courier 等现代 IMAP 服务器。如无法立即升级，请在防火墙层面限制 TCP 143/993 端口仅允许受信任 IP 访问，并禁用非必要的 IMAP 账户，禁用 LIST 等高风险命令作为临时缓解措施。"
score = 7.5
severity = "HIGH"
sources = ["exploitdb"]
title = "华盛顿大学 UW IMAPd 远程缓冲区溢出漏洞"
updated = "2026-06-16T21:51:23.750"

