[basic]
description = "stunnel 3.8 及更早版本中存在格式化字符串漏洞。stunnel 是一款 SSL 加密隧道代理，用于将非加密的网络流量封装在 SSL 通道中。该漏洞存在于 stunnel 处理 ident 协议用户名的方式中，当 stunnel 接收到特制的 ident 用户名时，会将其作为格式化字符串参数传递给 printf 类函数，导致攻击者可以通过精心构造的 ident 用户名触发格式化字符串漏洞，从而执行任意代码。攻击者无需身份认证即可远程利用，且利用复杂度较低，可完全控制目标系统。受影响的版本包括 stunnel 3.8 及所有更早版本。"
published = "2001-02-12T05:00:00.000"
remediation = "立即升级 stunnel 至 3.9 或更高版本，该版本已修复 ident 用户名格式化字符串漏洞。如无法升级，可在 stunnel 配置中禁用 ident 协议支持（设置 ident = no），并在网络层面限制对 stunnel 端口的访问来源 IP。"
score = 10
severity = "CRITICAL"
sources = ["redhat"]
title = "stunnel stunnel 格式化字符串远程代码执行漏洞"
updated = "2026-06-16T21:53:34.827"

