[basic]
description = "Cisco Secure PIX 防火墙 5.2(2) 及更早版本中的邮件防护（mailguard）功能未能正确限制对 SMTP 命令的访问权限，远程攻击者可通过先发送 DATA 命令再发送受限命令的方式绕过内容过滤策略，从而执行本应被禁止的 SMTP 命令。该漏洞影响运行 4.x/5.x 系列的 Cisco PIX 防火墙设备，攻击者无需认证即可利用，CVSS 评分 7.5，危害等级高。Cisco 已发布安全公告建议用户升级至不受影响版本。"
published = "2000-12-11T05:00:00.000"
remediation = "升级 Cisco PIX 防火墙至 5.2(3) 或更高版本，该版本已修复 mailguard 功能对 SMTP 命令的访问控制问题。如无法升级，可在访问控制列表 (ACL) 中限制外部发往内部 SMTP 服务器的流量，仅允许必要的 SMTP 命令通过，并禁用 DATA 命令前的未授权命令执行。同时建议替换为 Cisco ASA 系列设备以获得持续安全支持。"
score = 7.5
severity = "HIGH"
sources = ["exploitdb"]
title = "Cisco Secure PIX Firewall SMTP内容过滤绕过漏洞"
updated = "2026-06-16T21:52:59.423"

