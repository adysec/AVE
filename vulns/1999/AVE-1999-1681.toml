[basic]
description = "Infoseek Ultraseek 搜索引擎（2.1/3.1 for NT 版本）存在缓冲区溢出漏洞，其 CGI 程序在处理 HTTP GET 请求时未对参数长度进行边界检查。未经身份认证的远程攻击者只需向目标服务器发送包含超长参数的特制 GET 请求，即可覆盖栈内存并远程执行任意命令。该漏洞影响运行于 Windows NT 平台的 Ultraseek 2.1 与 3.1 版本，攻击条件简单、无需用户交互，可导致服务器被远程控制，危害较大。"
published = "1999-12-15T05:00:00.000"
remediation = "建议立即将 Infoseek Ultraseek 升级至厂家发布的修复版本（UltraSeek Server 3.2 及以后版本），彻底消除 GET 请求缓冲区溢出隐患。若暂无法升级，应在 Web 服务器或前端防火墙处限制对 Ultraseek 搜索接口的 GET 请求长度（例如单请求 URL 不超过 1024 字节），并仅允许受信任网段访问该服务，作为临时缓解措施。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
