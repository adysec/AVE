[basic]
description = "KDE beta 3 的屏幕保护程序在写入 `.kss.pid` 进程 ID 文件时存在不安全临时文件处理漏洞，属于典型的符号链接（symlink）攻击。本地攻击者可通过在目标文件所在目录预创建指向系统任意文件的符号链接，诱使屏幕保护程序覆写该文件，导致任意文件写入。该漏洞影响 KDE beta 3 版本，CVSS 评分 2.1，危害等级低。"
published = "1998-02-06T05:00:00.000"
remediation = "升级 KDE 至 1.0 及以上正式版本，该漏洞在 KDE 正式版中已修复。如无法升级，可限制不可信用户本地登录，或删除屏保程序的 setuid 权限位作为临时缓解措施。系统管理员应确保 /tmp 目录使用 nosuid、noexec 挂载选项，降低本地提权风险。"
score = 2.1
severity = "LOW"
sources = ["avd"]
title = "KDE Beta 3 屏幕保护程序任意文件写入漏洞"
updated = "2026-06-16T21:50:04.707"

