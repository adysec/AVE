[basic]
description = "SCO UnixWare 7.0.x 及 2.1.3 系统中 Netscape FastTrack Server 2.x、Enterprise Server 2.0 和 Proxy Server 2.5 存在不安全的文件权限设置漏洞。由于相关服务程序的文件权限配置不当，本地攻击者可利用该漏洞读取或修改敏感系统文件，从而获取 root 权限。该漏洞影响范围广泛，攻击者只需拥有本地访问权限即可利用，无需用户交互，危害等级严重，CVSS 评分 10.0。"
published = "2001-03-12T05:00:00.000"
remediation = "立即从 SCO 安全公告 SB-99.08a 获取并安装修补程序，修正 FastTrack Server/Enterprise Server/Proxy Server 相关二进制文件及目录的权限设置。如无法安装补丁，手动执行 `chmod 755` 收紧受影响文件权限，移除不必要的 setuid/setgid 权限位。由于 SCO UnixWare 及 Netscape 服务器产品均已停止维护，建议迁移至现代受支持的操作系统和 Web 服务器产品以确保长期安全。"
score = 10
severity = "CRITICAL"
sources = ["cve"]
title = "SCO UnixWare Netscape FastTrack服务端 权限提升漏洞"
updated = "2026-06-16T21:51:26.753"

