[basic]
description = "Mandrake Linux 6.1 至 7.1 版本中，Apache 的 mod_perl 模块默认配置将 /perl/ 目录设置为可浏览，导致远程攻击者可直接列出该目录内容，造成信息泄露。该漏洞源于 mod_perl 默认配置未限制目录浏览权限，攻击者无需认证即可通过 HTTP 请求访问 /perl/ 目录获取敏感文件列表。影响 Mandrake Linux 6.1、7.0、7.1 版本，CVSS 评分 5.0（中危），攻击向量为网络、低复杂度、无需认证，仅影响机密性。攻击者可直接通过浏览器或工具访问 /perl/ 目录获取文件列表，可能泄露敏感脚本源码或配置信息。Mandrake 已发布补丁修复该配置缺陷。"
published = "2000-11-14T05:00:00.000"
remediation = "升级到至少包含安全修复的 Mandrake Linux 7.2 或更高版本，并编辑/mod_perl/conf文件或 Apache httpd.conf，添加`Options -Indexes`配置以禁用/perl/目录的目录浏览功能。如无法立即升级，可在Apache配置文件中添加`AllowOverride All`并指定`<Directory /perl>`路径，限制访问权限到特定IP地址。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Mandrake Linux mod_perl /perl 目录浏览漏洞"
updated = "2026-06-16T21:52:40.130"

