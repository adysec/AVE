[basic]
description = "Microsoft Windows 中 icardie.dll 的 InformationCardSigninHelper Class ActiveX 控件存在越界写入漏洞。远程攻击者可诱导用户通过 Internet Explorer 访问特制网页触发该漏洞，成功利用可在目标系统上执行任意代码或造成拒绝服务。该漏洞已在 2013 年 11 月被野外利用，影响 Windows XP SP2/SP3、Windows Server 2003 SP2、Windows Vista SP2、Windows Server 2008 SP2/R2 SP1、Windows 7 SP1、Windows 8/8.1、Windows Server 2012 Gold/R2 及 Windows RT Gold/8.1 等多个版本。攻击无需身份认证但需用户交互（点击链接），CVSS 评分 8.8，危害等级高危。Microsoft 已于 MS13-090 安全公告中发布修复补丁。"
published = "2013-11-12T14:35:11.713"
remediation = '立即安装 Microsoft 安全公告 MS13-090 对应更新（KB2909921），该补丁修复了 icardie.dll 中 InformationCardSigninHelper ActiveX 控件的越界写入漏洞。如无法安装补丁，可通过注册表禁用该控件：regsvr32 /u %SystemRoot%\System32\icardie.dll，或设置 Internet Explorer 增强安全配置（ESC）阻止 ActiveX 自动运行。同时建议升级至不再受支持的 Windows/IE 版本（如 Windows 10 + IE11 以上），以规避该过时控件的风险。'
score = 8.8
severity = "HIGH"
sources = ["kev"]
title = "Microsoft Internet Explorer InformationCardSigninHelper ActiveX 远程代码执行漏洞"
updated = "2026-06-16T23:56:01.110"

