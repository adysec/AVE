[basic]
description = "Eicon Networks DIVA LAN ISDN Modem 1.0/2.0 的 HTTP 服务中 login.htm 页面存在输入验证缺陷，远程攻击者无需认证即可向该页面发送超长密码参数，触发缓冲区溢出导致设备死机或重启，造成拒绝服务。该漏洞影响 Eicon DIVA LAN ISDN Modem 1.0/2.0 版本，CVSS 评分 7.5，危害等级高。"
published = "1999-11-07T05:00:00.000"
remediation = "Eicon Networks 已停止支持 DIVA ISDN Modem 系列产品，建议将设备隔离或更换为受支持的替代产品。临时缓解措施：在防火墙上限制对设备 HTTP 管理端口（TCP 80）的访问，仅允许受信任的内部管理 IP 连接，并禁止外部网络访问该端口。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "Eicon Networks DIVA ISDN Modem login.htm 远程拒绝服务漏洞"
updated = "2026-06-16T21:50:38.767"

