[basic]
description = "Git 源代码管理工具在通过 sideband 通道传输远程 Git 进程的提示或错误消息时，未对消息内容进行过滤处理，直接将其传递到终端标准错误输出。由于现代终端支持 ANSI 转义序列，恶意攻击者可在克隆、拉取或推送操作中注入特制的 ANSI 转义序列，从而隐藏或篡改显示信息，诱导用户执行非受信脚本。该漏洞影响所有使用 Git 与不受信源进行交互的场景，CVSS 评分 7.5，危害等级高。建议用户尽快升级至修复版本，无法升级时应避免从非受信源执行递归克隆操作。"
published = "2025-01-15T18:15:24.130"
remediation = "升级 Git 至包含补丁的版本（Git for Windows v2.47.1(2) 已修复此问题，上游 Linux/macOS 版本补丁正在邮件列表讨论中，请关注 Git 官方发布）。在补丁可用前，避免执行 `git clone --recursive` 从不可信源克隆仓库，并避免在终端中直接查看来自不可信远程仓库的 stderr 输出。"
score = 7.5
severity = "HIGH"
sources = ["msrc"]
title = "Git Git 边带信道ANSI转义序列注入漏洞"
updated = "2026-06-17T08:06:47.217"

