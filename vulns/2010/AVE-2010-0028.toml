[basic]
description = "Joomla! 的 JOOFORGE Jutebox 组件（com_jukebox）1.0 及 1.7 版本中存在目录遍历漏洞（CWE-22）。远程攻击者无需身份认证，通过向 index.php 传入包含 `../` 序列的恶意 controller 参数，即可绕过路径限制读取服务器上任意文件，导致数据库配置、系统账户等敏感信息泄露。该漏洞攻击复杂度低，危害较大。"
published = "2010-04-12T18:30:00.977"
remediation = "立即卸载 com_jukebox 组件，或升级至厂商已修复的最新版本。如无法升级，在 Joomla! 后台禁用该组件并在 .htaccess 中添加规则过滤 `controller` 参数中的 `../` 目录遍历序列。同时确保 `php.ini` 中 `allow_url_fopen` 和 `allow_url_include` 均设为 Off 以防文件包含被进一步利用。"
score = 5
severity = "MEDIUM"
sources = ["nuclei"]
title = "Joomla! JOOFORGE Jukebox 组件目录遍历任意文件读取漏洞"
updated = "2026-06-16T23:18:11.417"

