[basic]
description = "Opera 3.2.1 浏览器存在 URI 解析拒绝服务漏洞。远程攻击者可通过向用户发送包含畸形 HTTP 标签（如 `http:///` 格式，含多余斜杠）的特制 URL，当用户点击该链接时，浏览器解析异常导致程序崩溃。该漏洞影响 Opera 3.2.1 版本，攻击者无需身份认证即可利用，属于低复杂度攻击，但仅造成拒绝服务，无法实现代码执行。"
published = "1998-08-14T04:00:00.000"
remediation = "升级 Opera 浏览器至 3.3 或更高版本。该漏洞在后续版本中已修复，程序会正确解析含多余斜杠的 URL。如无法升级，建议换用现代浏览器（如 Firefox、Chrome）替代过时版本。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Opera Opera Web Browser 拒绝服务漏洞"
updated = "2026-06-16T21:50:06.420"

