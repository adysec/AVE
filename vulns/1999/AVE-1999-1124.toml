[basic]
description = "ProFTPd 1.2 在编译启用 mod_sqlpw 模块时，会将用户密码明文记录到系统 wtmp 日志文件中，导致本地攻击者可通过读取 wtmp 文件（例如使用 last 命令）获取其他用户的密码，进而提升权限。该漏洞影响 ProFTPd 1.2 版本，攻击者需具备本地系统访问权限，利用难度较低，危害中等。"
published = "1999-11-19T05:00:00.000"
remediation = "升级 ProFTPD 至 1.2.1 或更新版本，该版本已修复 mod_sqlpw 将密码写入 wtmp 日志的问题。如无法升级，可临时禁用 mod_sqlpw 模块（注释或移除 mod_sqlpw.c 编译）并改用系统 PAM 认证，同时限制 wtmp 日志文件的读取权限（chmod 640 /var/log/wtmp），防止普通用户通过 last 命令读取密码。"
score = 4.6
severity = "MEDIUM"
sources = ["epss"]
title = "ProFTPD mod_sqlpw 模块密码记录信息泄露漏洞"
updated = "2026-06-16T21:50:31.283"

