[basic]
description = "Internet Explorer 4/5/5.5 及 5.0.1 版本中 external.NavigateAndFind() 函数存在跨框架安全策略绕过漏洞。远程攻击者可通过构造恶意网页，利用该函数绕过跨框架安全限制，读取目标系统上的本地文件。攻击者需诱使用户访问恶意网页以触发漏洞，CVSS 评分 2.6，危害等级低。"
published = "1999-12-23T05:00:00.000"
remediation = '立即升级至 Internet Explorer 5.5 Service Pack 2 或更高版本，该漏洞在 IE 6 中已修复。如无法升级，可在浏览器安全设置中将"跨帧访问其他域"设为禁用，或在受影响的区域启用"保护模式"（IE 增强安全配置环境下）。建议同时禁用 Internet Explorer 的 Active Scripting 功能作为临时缓解措施。'
score = 2.6
severity = "LOW"
sources = ["epss"]
title = "Microsoft Internet Explorer 跨框架安全策略绕过漏洞"
updated = "2026-06-16T21:50:51.210"

