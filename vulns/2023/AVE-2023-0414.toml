[basic]
description = "Wireshark 的 NetScreen 文件解析器存在经典缓冲区溢出漏洞（CWE-120），攻击者可通过向受害者发送特制的捕获文件触发该漏洞，导致解析器崩溃从而造成拒绝服务。该漏洞影响 Wireshark 4.0.0 至 4.0.10 以及 3.6.0 至 3.6.18 版本，CVSS 评分 7.8，危害等级高。用户只需在 Wireshark 中打开恶意构造的捕获文件即可触发，无需额外权限。"
published = "2024-03-26T08:15:35.867"
remediation = "升级 Wireshark 至 4.0.11 及以上版本，或 3.6.19 及以上版本。如无法立即升级，可在「分析→已启用的协议」中禁用 NetScreen 协议解析器作为临时缓解措施，避免解析恶意构造的捕获文件。"
score = 7.8
severity = "HIGH"
sources = ["msrc"]
title = "Wireshark NetScreen文件解析器缓冲区溢出漏洞"
updated = "2026-06-17T06:50:14.303"

