[basic]
description = "华为多款防火墙产品存在目录遍历漏洞，未经授权的远程攻击者可通过向受影响设备发送特制的 HTTP 请求，利用路径遍历（如 ../）绕过目录访问限制，读取服务器上的任意敏感文件（包括配置文件、系统文件等）。该漏洞攻击复杂度低，无需身份认证，可导致设备配置泄露与内网信息暴露，对系统机密性造成严重影响。受影响的设备包括华为多款防火墙系列产品。"
