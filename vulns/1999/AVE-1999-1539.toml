[basic]
description = "Hewlett Packard Apollo Domain OS 的 crp 组件存在权限提升漏洞，远程攻击者无需身份认证即可通过调用不安全的系统调用 `pad_$dm_cmd` 和 `pad_$def_pfk()` 触发该漏洞，成功利用可获得目标系统的 root 最高权限。该漏洞影响 SR10 至 SR10.3 版本，CVSS 评分 10.0，危害等级严重。由于该操作系统已停止维护，官方未发布补丁，建议用户迁移至受支持的操作系统。"
published = "1991-12-18T05:00:00.000"
remediation = "Hewlett Packard Apollo Domain OS SR10~SR10.3 已于 1990 年代末停止支持，HP 不再提供安全补丁。建议立即将受影响系统迁移至受支持的操作系统（如 HP-UX 或现代 Linux 发行版）；若无法迁移，须将运行 Apollo Domain OS 的系统从网络中彻底隔离，严格限制远程访问，并在防火墙层面阻止对 crp 相关服务端口的非授权连接，同时禁用 pad_$dm_cmd 和 pad_$def_pfk() 两个不安全的系统调用接口。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "惠普 Apollo Domain OS crp 权限提升漏洞"
updated = "2026-06-16T21:50:33.560"

