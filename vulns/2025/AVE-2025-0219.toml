[basic]
description = "用友 NC 的 getFormItem 接口存在 SQL 注入漏洞，攻击者可通过向 /portal/pt/servlet/getFormItem/doPost 路径发送精心构造的 POST 请求，在 pageId、clazz、proDefPk 等参数中注入恶意 SQL 语句，进而绕过认证窃取数据库敏感信息或获取系统控制权。该漏洞影响用友 NC 多个版本，攻击复杂度低，无需身份认证即可远程利用，危害严重。"
published = "0709"
remediation = "立即升级用友NC至最新安全补丁版本（如NC6.5/NC Cloud 1909及以上），或联系用友官方获取getFormItem接口的安全修复包。临时缓解措施：在WAF/IPS中配置规则拦截对/portal/pt/servlet/getFormItem/doPost的POST请求，并对pageId、clazz、proDefPk参数进行SQL注入关键字过滤。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "用友NC getFormItem接口SQL注入漏洞"
updated = "0709"

