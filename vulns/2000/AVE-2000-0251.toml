[basic]
description = "RealNetworks RealPlayer 6.x 和 7.x 版本在处理 Location URL 参数时存在缓冲区溢出漏洞。远程攻击者可通过向用户发送包含超长 Location 字段的特制媒体链接，当用户点击该链接后触发缓冲区溢出，导致 RealPlayer 进程崩溃，造成拒绝服务。此漏洞无需身份认证即可利用，攻击复杂度较低，但仅影响 RealPlayer 媒体播放器客户端，无法实现远程代码执行。用户升级至最新版本或避免点击来历不明的媒体链接可有效防范此漏洞。"
published = "2000-04-03T04:00:00.000"
remediation = '升级至 RealNetworks RealPlayer 8 或更高版本，该版本已修复 Location 字段缓冲区溢出漏洞。如无法升级，可在浏览器中禁用 RealPlayer 插件或将其设置为"点击激活"，避免自动解析恶意 .ram/.rpm 链接。同时建议在网络边界过滤超长 URL 请求作为纵深防御。'
score = 2.6
severity = "LOW"
sources = ["epss"]
title = "RealNetworks RealPlayer 6/7 远程缓冲区溢出漏洞"
updated = "2026-06-16T21:51:23.237"

