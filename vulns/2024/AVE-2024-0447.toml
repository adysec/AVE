[basic]
description = "织梦内容管理系统（DeDecms）后台接口文件 /dede/sys_verifies.php 在处理 view 操作时未对 filename 参数进行严格的路径过滤与校验，导致存在任意文件读取漏洞。攻击者无需身份认证即可通过构造包含目录穿越序列（如 ../../../../）的 filename 参数，读取目标服务器上的任意文件，例如系统口令文件 /etc/passwd 或源码配置文件等敏感信息。该漏洞影响使用存在缺陷版本 DeDecms 且暴露后台接口的系统，攻击条件仅需网络可访问目标站点后台路径，利用方式是通过发送特制 HTTP 请求访问 sys_verifies.php?action=view&filename=../../../../../etc/passwd 实现越权文件读取，可能造成敏感信息泄露，进而被用于进一步渗透。"
published = "0819"
remediation = "建议立即升级织梦DedeCMS至最新版本（V5.7 SP2及以上正式版），官方已在最新版本中修复了sys_verifies.php的任意文件读取漏洞。如暂时无法升级，可通过删除或重命名/dede/sys_verifies.php文件，或在Web服务器配置中禁止访问/dede/sys_verifies.php文件作为临时缓解措施，同时建议配置WAF规则拦截包含../等路径遍历字符的请求。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
