[basic]
description = "Netscape Communicator 4.73 及更早版本在导入新证书时未对 /tmp 目录下的临时文件做安全校验，会直接跟随符号链接进行写入操作。本地已登录的用户可在导入证书前于 /tmp 下预先创建指向任意文件的符号链接，当目标用户执行证书导入时，程序会跟随该链接覆盖用户所拥有的文件，造成本地文件被篡改或权限提升。该漏洞影响 Netscape Communicator 4.5、4.51、4.6、4.61、4.7、4.72、4.73 等版本，攻击需具备本地系统访问权限并诱导受害者导入证书，CVSS 评分为 3.7，危害等级较低。"
published = "2000-05-10T04:00:00.000"
remediation = "升级到 Netscape 4.74 或更高版本，或迁移至 Mozilla Firefox 等仍在支持的现代浏览器。作为临时缓解措施，设置 TMPDIR 环境变量指向用户私有的临时目录（如 ~/tmp），避免使用共享的 /tmp 目录；同时确保 /tmp 目录未设置粘滞位时限制其他用户的写入权限，降低符号链接攻击面。"
score = 3.7
severity = "LOW"
sources = ["cve"]
title = "Netscape Communicator 证书导入符号链接漏洞"
updated = "2026-06-16T21:51:39.343"

