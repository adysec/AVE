[basic]
description = "Solaris 系统的 netpr 程序存在缓冲区溢出漏洞，本地攻击者可通过向 -p 选项传递超长参数触发缓冲区溢出，从而以 root 权限执行任意命令。该漏洞影响 Solaris 2.6、7.0 及 8.0 版本，CVSS 评分 7.2，危害等级高。攻击者需拥有本地系统访问权限方可利用。"
published = "2000-05-12T04:00:00.000"
remediation = "安装 Sun 针对 Solaris 2.6/7.0/8 的 netpr 补丁（补丁 ID: 106541-xx 及后续版本），或升级到 Solaris 9 及以上版本。如无法打补丁，可通过 chmod 移除 netpr 的 setuid 位（chmod 555 /usr/bin/netpr）作为临时缓解措施，限制本地非授权用户触发缓冲区溢出。"
score = 7.2
severity = "HIGH"
sources = ["epss"]
title = "Sun Solaris netpr 本地缓冲区溢出漏洞"
updated = "2026-06-16T21:51:39.103"

