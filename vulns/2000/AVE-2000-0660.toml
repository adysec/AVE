[basic]
description = "Linux man 软件包中的 makewhatis 工具在处理临时文件时存在不安全操作漏洞。本地攻击者可通过在 /tmp 目录下创建符号链接进行 symlink 攻击，当 root 用户运行 makewhatis 时，会以 root 权限覆盖攻击者指定的任意文件，从而实现本地权限提升。该漏洞影响多个供应商的 Linux 发行版，需拥有本地访问权限方可利用。"
published = "2000-07-03T04:00:00.000"
remediation = "立即将 Linux man 包升级至已修复版本。Red Hat 用户安装 RHSA-2000:041 提供的 man-1.5i2-2 或更新版本；Caldera OpenLinux 用户安装 CSSA-2000-021 补丁；Mandrake 用户安装 MDKSA-2000:015 补丁。修复将临时文件创建方式改为安全的 mktemp/mkstemp 机制，避免使用可预测路径。现代系统应使用 man-db 的 mandb 替代已废弃的 makewhatis。"
score = 7.2
severity = "HIGH"
sources = ["cve"]
title = "GNU Linux man 软件包 makewhatis 不安全临时文件本地权限提升漏洞"
updated = "2026-06-16T21:52:00.680"

