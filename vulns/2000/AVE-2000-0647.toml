[basic]
description = "LPPlus 3.2.2 及 3.3 版本中的 dccscan 程序被设置了 setuid 权限，但在执行打印操作时未正确校验调用用户的文件访问权限，导致本地攻击者可利用该缺陷打印系统中任意文件（包括敏感文件）。此漏洞需本地访问权限，攻击复杂度低，CVSS 评分 2.1，危害等级低。"
published = "2000-11-14T05:00:00.000"
remediation = "建议升级至 LPPlus 3.4 或更高版本，该版本已修复 dccscan 的权限检查缺陷。临时缓解措施可移除 dccscan 程序的 setuid 位（chmod u-s /usr/bin/dccscan），限制普通用户通过该程序读取任意文件的能力。"
score = 2.1
severity = "LOW"
sources = ["exploitdb"]
title = "LPPlus dccscan 任意文件打印漏洞"
updated = "2026-06-16T21:52:39.873"

