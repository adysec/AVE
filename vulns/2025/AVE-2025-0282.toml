[basic]
description = "扁鹊医疗（BianQue Medical）急救APP Web服务接口 `/AppService/BQMedical/WebServiceForFirstaidApp.asmx/GetLyfsByParams` 存在 SQL 注入漏洞。攻击者可通过 POST 请求向 `strOpid` 参数注入恶意 SQL 语句，无需身份认证即可获取数据库敏感信息，可能导致患者医疗数据泄露。"
published = "0703"
remediation = "立即升级扁鹊医疗到最新安全版本（≥2024.4），并将所有 GETLyfsByParams 接口强制使用参数化查询，防止 SQL 注入；同时在 WAF 中启用 SQL 注入防护规则，并限制数据库连接用户仅拥有最低必要权限。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "扁鹊医疗 WebServiceForFirstaidApp 接口 SQL 注入漏洞"
updated = "0703"

