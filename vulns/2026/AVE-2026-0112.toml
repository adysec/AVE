[basic]
description = "Gitea act_runner 的 Docker 后端（受影响版本至 act 0.262.0）在处理工作流容器配置时存在权限管理缺陷，仅强制关闭容器 Privileged 标志，但未过滤 --pid=host、--cap-add 等危险选项。能够在 Docker 后端 runner 上运行工作流的攻击者可利用此问题创建拥有宿主机命名空间和广泛能力的容器，在特权模式被禁用的情况下仍实现容器逃逸并获得宿主机 root 权限。CVSS 评分 9.4，危害等级严重。"
published = "2026-06-28T02:16:32.420"
remediation = "立即升级 act_runner 至 0.263.0 或更高版本，该版本修复了容器选项合并时未强制禁用高危 HostConfig 参数的问题。临时缓解措施：在 act_runner 配置中禁止使用 --pid=host、--cap-add、--security-opt 等高危容器选项；为 runner 添加 seccomp 策略限制容器逃逸相关系统调用；仅运行可信工作流，不向不可信用户开放 act_runner 执行权限。"
score = 9.4
severity = "CRITICAL"
sources = ["hwpoc"]
title = "Gitea act_runner 容器逃逸漏洞"
updated = "2026-06-30T15:17:00.077"

