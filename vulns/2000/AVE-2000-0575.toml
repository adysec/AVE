[basic]
description = "PHP-Nuke 1.0 及 2.5 版本中 admin.php3 管理脚本存在身份验证绕过漏洞。由于该脚本在处理管理员登录请求时未能正确验证密码参数，远程攻击者无需提供有效的管理员用户名（aid）或密码（pwd）参数，仅通过直接访问特定的管理员 URL 即可绕过身份认证机制，获得网站后台管理权限。利用该漏洞，攻击者可完全控制目标网站，执行任意管理操作，包括修改网站内容、上传恶意文件等。攻击条件简单，无需任何前置权限，危害严重。"
published = "2000-10-20T04:00:00.000"
remediation = "PHP-Nuke 1.0/2.5 已停止维护且不再发布安全更新，建议立即迁移至受支持的 CMS 平台（如 WordPress、Joomla）。临时缓解措施：在 admin.php3 开头添加会话认证检查，确保未登录用户直接访问时返回 403；或通过 Web 服务器配置（如 .htaccess 或 Nginx location 规则）限制 admin.php3 仅允许特定 IP 访问。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "PHP-Nuke PHP-Nuke 管理员身份验证绕过漏洞"
updated = "2026-06-16T21:52:23.560"

