[basic]
description = "Microsoft Site Server 3.0 的 Direct Mailer 功能存在敏感信息泄露漏洞，该功能将用户域名和密码以纯文本形式保存在 TMLBQueue 网络共享中，且该共享默认权限设置不安全，允许远程攻击者通过网络共享读取明文凭据，进而获取系统权限。攻击者无需身份认证即可利用此漏洞，影响范围广泛。"
published = "1999-12-31T05:00:00.000"
remediation = "Microsoft Site Server 3.0 已停止支持，建议立即迁移至受支持的邮件服务解决方案。如暂时无法迁移，应严格限制 TMLBQueue 网络共享的访问权限，仅允许授权管理 IP 访问，并启用共享加密或改用安全认证协议（如 NTLMv2）替代明文密码传输。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "Microsoft Site Server 3.0 Direct Mailer 密码明文存储漏洞"
updated = "2026-06-16T21:50:01.790"

