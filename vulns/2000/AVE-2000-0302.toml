[basic]
description = "Windows 2000 域控制器存在 Mixed Object Access 漏洞。Active Directory 支持基于属性的访问控制，但在特定组合操作场景下，已认证的攻击者可修改其本无权限修改的对象属性。攻击者需拥有域内有效凭据并具备网络访问权限。该漏洞仅影响作为域控制器使用的 Windows 2000 Server 和 Advanced Server，CVSS 评分 2.1，危害等级低。成功利用可导致目录信息被篡改。"
published = "2000-04-20"
remediation = "安装 Microsoft 安全公告 MS00-026 提供的安全更新补丁，下载地址为 https://www.microsoft.com/download/details.aspx?FamilyId=7237F230-A28B-447B-9034-6654DD7CD05E。同时在域控制器上配置 Active Directory 对象 ACL 权限，限制非管理员用户的写入权限。对于仍在使用 Windows 2000 的环境，建议升级至受支持的 Windows Server 版本以获取持续安全更新。"
score = 2.1
severity = "LOW"
sources = ["cve"]
title = "Microsoft Windows 2000 Active Directory 未受保护属性信息篡改漏洞"
updated = "2000-04-20"

