[basic]
description = "JavaScript 同源策略绕过漏洞存在于 Internet Explorer 3.x/4.x 及 Netscape 2.x/3.x/4.x 等早期浏览器中。远程攻击者可通过在恶意网页中植入特制 JavaScript 代码，监控用户跨站点的网页浏览活动，窃取用户的浏览历史与访问行为等敏感信息。该漏洞由贝尔实验室发现并报告，CVSS 评分 2.6，危害等级低，但由于浏览器版本较早且已停止支持，实际利用价值有限。"
published = "1997-07-08T04:00:00.000"
remediation = "立即停止使用 Internet Explorer 3.x/4.x 及 Netscape 2.x/3.x/4.x，升级到受支持的主流浏览器（如 Chrome、Edge、Firefox 最新版本），这些浏览器已不存在该跨域脚本监控漏洞。对于无法升级浏览器的老旧系统，建议在终端安装脚本拦截插件（如 NoScript）并禁用 JavaScript 执行作为临时缓解。"
score = 2.6
severity = "LOW"
sources = ["epss"]
title = "Microsoft Internet Explorer JavaScript 信息泄露漏洞"
updated = "2026-06-16T21:47:23.630"

