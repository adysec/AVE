[basic]
description = "Slackware Linux 3.1 默认安装的 XFree86 SuperProbe 可执行程序默认设置了 setuid root 权限，其 TestChip() 函数在处理长参数时存在 strcpy 缓冲区溢出漏洞。本地攻击者可通过向 -nopr 参数传递超长字符串触发栈溢出，覆盖关键寄存器并执行任意 shellcode，从而完全控制系统并获取 root 用户权限。攻击条件为：本地账户访问权限且 SuperProbe 设置了 setuid root 位。"
published = "1997-03-04T05:00:00.000"
remediation = "升级 Slackware Linux 到 7.0 或更高版本以获取修复版 XFree86 SuperProbe，并且立即通过执行 chmod u-s /usr/X11/bin/SuperProbe 移除其 setuid 权限。作为临时缓解措施，可以进一步限制普通用户的执行权限。"
score = 7.2
severity = "HIGH"
sources = [
    "cve",
    "exploitdb",
]
title = "Slackware Linux 3.1 SuperProbe 缓冲区溢出本地提权漏洞"
updated = "2026-06-16T21:50:33.060"

