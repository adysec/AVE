[basic]
description = "EasyCart 购物车应用存在不安全隐藏表单字段漏洞，远程攻击者可通过修改表单中隐藏字段的值来篡改订单金额、商品数量等敏感购买信息，以低于正常价格甚至零成本完成交易。该漏洞源于服务端未对客户端提交的隐藏字段数据进行充分校验，影响使用 EasyCart 的在线购物网站。攻击者无需身份认证，仅通过浏览器即可利用此漏洞。"
published = "2000-02-01T05:00:00.000"
remediation = "1. 立即升级 EasyCart 至官方发布的最新安全版本（如有）；2. 若已停止维护，须彻底移除 Hidden Form Fields 传递价格/金额的逻辑，改为服务端 Session 或数据库存储真实价格；3. 对所有提交的订单数据在服务端执行金额校验，禁止直接信任客户端传入的价格、数量等参数。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "EasyCart 购物车应用隐藏表单字段敏感信息篡改漏洞"
updated = "2026-06-16T21:51:00.797"

