[basic]
description = "NetworkICE ICEcap 2.0.23 及更早版本中存在调试功能默认开启的安全缺陷，该功能允许未经身份认证的远程攻击者绕过脆弱的认证机制，向目标系统发送未加密的事件数据。攻击者无需任何权限即可通过网络远程利用此漏洞，利用难度较低。成功利用后，攻击者可篡改或注入虚假事件信息，影响系统日志的完整性和可靠性，但不会直接导致数据机密性泄露或系统可用性受损。"
published = "2000-05-17T04:00:00.000"
remediation = "立即禁用 ICEcap Manager 的调试功能（debugging feature），修改所有默认用户名和密码为强密码。在防火墙上限制仅允许可信 IP 访问 ICEcap 管理端口（默认 5000/tcp）。由于该产品已停止维护，建议迁移至受支持的替代方案（如 Microsoft System Center Operations Manager 或 SolarWinds 等现代网络监控平台）。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Internet Security Systems NetworkICE ICEcap 默认用户名和密码漏洞"
updated = "2026-06-16T21:51:32.053"

