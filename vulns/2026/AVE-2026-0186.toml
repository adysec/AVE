[basic]
description = "索贝融合媒体内容管理平台 ImageController 存在任意文件上传漏洞，攻击者可通过 uploadimg 接口绕过文件类型校验上传恶意文件，或利用 urlUpload 接口的 file:// 协议读取服务器敏感文件。成功利用此漏洞可上传 WebShell 至 JSP 目录，从而获取服务器控制权。该漏洞影响索贝融合媒体内容管理平台多个版本，攻击者需具备网络访问权限，危害等级高。"
published = "nday"
remediation = "升级至索贝融合媒体内容管理平台官方安全补丁版本；对 uploadimg 接口添加文件类型白名单校验；对 urlUpload 接口限制仅允许 http/https 协议；禁止 JSP 目录写入可执行文件；限制 ImageController 接口仅允许内网管理 IP 访问。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "索贝 融合媒体内容管理平台 ImageController 任意文件上传漏洞"
