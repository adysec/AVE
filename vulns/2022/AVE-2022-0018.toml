[basic]
description = "Linux 内核 DRM 子系统中 Spreadtrum 显示驱动的 sprd_drm_shutdown 函数存在空指针解引用漏洞。当驱动初始化失败或设备绑定异常时，dev_get_drvdata 返回空指针，而 drm_warn 宏会直接解引用该空指针进行日志记录，导致内核崩溃。此漏洞影响 Spreadtrum 平台设备，需要本地权限触发 shutdown 流程，可造成拒绝服务。CVSS 评分 5.5，危害等级中危。"
published = "2025-02-26T07:00:49.837"
remediation = "将 Linux 内核升级至 5.17.3 或更高版本（如 5.18+），该漏洞已在提交 c3acc8db1bc2（5.17.x 稳定版）中修复。如无法立即升级，可通过 modprobe 黑名单禁用 sprd_drm 模块：echo 'blacklist sprd_drm' > /etc/modprobe.d/disable-sprd-drm.conf 作为临时缓解措施。"
score = 5.5
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux 内核 drm/sprd 空指针解引用漏洞"
updated = "2026-06-17T05:17:09.200"

