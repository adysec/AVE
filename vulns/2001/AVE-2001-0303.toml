[basic]
description = "Cerberus FTP Server 1.5 及更早版本存在缓冲区溢出漏洞。未经身份认证的远程攻击者可通过 FTP 协议向目标服务器发送超长的用户名、密码或 PASV 命令触发该漏洞，导致缓冲区溢出，可能引发拒绝服务甚至远程代码执行。该漏洞影响 Cerberus FTP Server 1.x 系列早期版本，CVSS 评分 7.5，攻击向量为网络，攻击复杂度低，无需任何身份验证即可远程利用。"
published = "2001-09-20T04:00:00.000"
remediation = "建议将 Cerberus FTP Server 升级至厂商最新发布的 2026.x 版本（当前稳定版为 2026.2.2），该版本已修复历史上包括 CVE-2001-0702 在内的所有已知缓冲区溢出漏洞。若运行环境受限于旧版系统无法立即升级，应在边界防火墙或主机防火墙中仅允许可信 IP 段访问 21/TCP 端口，并临时禁用匿名登录；同时在入侵检测系统（IDS）中部署规则，对 FTP 用户名、密码及 PASV 命令携带超过 300 字节超长字符串的连接会话进行拦截告警。"
score = 7.5
severity = "HIGH"
sources = ["exploitdb"]
title = "Cerberus FTP Server 1.x 缓冲区溢出拒绝服务漏洞"
updated = "2026-06-16T21:54:47.977"

