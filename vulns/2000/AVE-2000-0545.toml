[basic]
description = "Cisco TACACS+ 服务器的 tac_plus 守护进程存在缓冲区溢出漏洞，远程攻击者可通过向目标系统发送特制的、包含超长长度字段的畸形数据包触发该漏洞，导致缓冲区溢出进而使 tac_plus 进程崩溃，造成拒绝服务。该漏洞影响 Cisco TACACS+ 协议的 tac_plus 服务端软件，攻击者无需身份认证即可远程利用，但 CVSS 评分为 5.0，危害等级中等。"
published = "2000-05-30T04:00:00.000"
remediation = "立即将 Cisco TACACS+ (tac_plus) 服务器升级至修复该漏洞的版本（Cisco 已于 2000 年 5 月发布补丁），确保对接收报文中的 length 字段进行正确的边界检查。如无法升级，可在网络边界防火墙配置 ACL，仅允许可信 IP 访问 TCP 端口 49（TACACS+），并限制外部源发送畸形报文。同时建议对 tac_plus 进程实施最小权限运行，以降低被利用后的影响。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Cisco TACACS+ 缓冲区溢出拒绝服务漏洞"
updated = "2026-06-16T21:51:50.270"

