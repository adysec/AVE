[basic]
description = "基于 BSD 4.4 的多个操作系统（包括 BSDI BSD/OS 4.0、FreeBSD 3.2、NetBSD 1.4 x86 以及 OpenBSD 2.5）在运行于安全级别 1（securelevel 1）时存在 UFS 文件系统保护机制缺陷。系统本应通过 immutable（不可修改）与 append-only（仅追加）标志防止文件被篡改，但拥有 root 权限的本地攻击者可以先卸载目标文件系统，再借助 fsdb 等底层文件系统编辑器直接通过块设备访问并修改磁盘上的文件元数据，从而清除上述保护标志。该漏洞影响所有运行在安全级别 1 的上述 BSD 衍生系统，攻击条件为攻击者需具备本地 root 权限且能卸载文件系统，利用方式是通过设备节点直接编辑文件系统绕过内核级保护，可导致关键系统文件被篡改，危害系统完整性与安全性。"
published = "1999-07-02T04:00:00.000"
remediation = "立即将受影响的 BSD 系统升级至已修复该漏洞的版本：BSDI BSD/OS 升级至 4.1 或更高版本，FreeBSD 升级至 3.2-STABLE 或更高版本，NetBSD 升级至 1.4.1 或更高版本，OpenBSD 升级至 2.6 或更高版本。临时缓解措施：将 UFS secure level 从 1 提升至 2，安全级别 2 会禁止 root 清除文件的 immutable 和 append-only 标志，即使通过卸载文件系统并使用 fsdb 等工具直接修改设备也无法绕过。如暂无法立即升级，应通过 sysctl 或内核启动参数将 kern.securelevel 设为 2，并严格限制物理控制台和 root 账户访问权限，防止未授权人员接触单用户模式。"
score = 2.1
severity = "LOW"
sources = ["exploitdb"]
title = "BSD/OS FreeBSD NetBSD OpenBSD UFS Secure Level 1 安全绕过漏洞"
updated = "2026-06-16T21:50:20.763"

