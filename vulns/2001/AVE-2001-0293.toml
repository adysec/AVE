[basic]
description = 'TransSoft Broker FTP Server 3.0/4.0/4.7/5.x（最高至5.9.5.0版本）的CWD（Change Working Directory）命令处理模块存在缓冲区溢出漏洞。该漏洞的原理是FTP服务器在解析CWD或CD命令参数时未对输入进行充分验证，当接收到包含无效". ."（点-空格-点）序列的目录路径参数时，会导致缓冲区溢出并触发TSFTPSRV服务进程的访问违规，从而使FTP服务崩溃并中断运行。该漏洞影响所有运行受影响版本Broker FTP Server的Windows系统，覆盖3.0至5.9.5.0之间的所有版本。攻击条件为攻击者能够在网络层面访问目标FTP服务的21端口，且无需任何身份验证凭据即可发起攻击。利用方式为远程攻击者通过FTP客户端连接到目标服务器后，重复发送参数为". ."的CWD或CD命令，持续触发缓冲区溢出，最终导致FTP服务进程崩溃停止响应，必须手动重启服务才能恢复，从而造成拒绝服务攻击。该漏洞的相关利用代码已在2001年6月通过Bugtraq邮件列表公开，安全研究人员认为缓冲区溢出存在被进一步利用以获取服务器控制权的潜在可能性。TransSoft已发布更新版本修复此问题，管理员应及时升级至安全版本。'
published = "2001-09-20T04:00:00.000"
remediation = "立即升级 TransSoft Broker FTP Server 至修正了 CWD 缓冲区溢出的修复版本。如无法短期完成升级，应在防火墙中限制 FTP 服务（TCP 21 端口）仅对可信来源开放，关闭匿名登录功能，并在 FTP 服务层面限制单 IP 的连接频率与异常 CWD 命令请求，以防止服务崩溃。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "TransSoft Broker FTP Server 拒绝服务漏洞"
updated = "2026-06-16T21:54:46.400"

