[basic]
description = "CGI City 出品的 CC Whois 1.0 程序中的 whois.cgi 脚本存在命令注入漏洞。该脚本在处理用户提交的域名查询参数时，未对输入内容进行安全过滤与转义，直接将用户输入拼接到系统 shell 命令中执行。远程攻击者无需身份认证，即可在域名查询入口处插入 shell 元字符（如分号、管道符、反引号等），从而注入并执行任意操作系统命令。该漏洞影响运行 CC Whois 1.0 的 Web 服务器，攻击条件仅为目标系统对外开放了存在缺陷的 whois.cgi 接口且可被网络访问，利用方式是通过构造包含元字符的恶意域名参数发起 HTTP 请求即可实现远程命令执行，危害等级较高。"
published = "1999-11-09T05:00:00.000"
remediation = "立即更新到 CGI City CC Whois 1.0 的安全补丁版本，建议使用 1.1 或更高版本进行升级，并修改 whois.cgi 配置文件，限制 domain 参数的输入长度，禁止使用特殊字符并进行严格的输入验证；同时建议在 Web 服务器上启用 WAF，过滤 shell 元字符输入，并限制 CGI 脚本的权限，设置为只读模式以降低攻击风险。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
