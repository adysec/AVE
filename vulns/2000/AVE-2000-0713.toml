[basic]
description = "MailFile 1.10 的 mailfile.cgi CGI 程序存在任意文件读取漏洞。远程攻击者可通过向该脚本发送特制的 POST 请求，在 filename 参数中指定目标服务器上的任意文件路径，并在 email 参数中指定接收邮箱，服务器将该文件内容通过邮件发送至攻击者指定的邮箱地址，导致敏感信息泄露。该漏洞影响 Oatmeal Studios MailFile 1.10 版本，危害等级中等，攻击无需认证，利用难度较低。"
published = "2000-12-19T05:00:00.000"
remediation = "MailFile 1.10 厂商已停止维护且无安全补丁，建议立即从服务器删除 mailfile.cgi 脚本或移除整个 MailFile 应用。如不能立即删除，应在 Apache/Nginx 配置中禁止对该脚本的访问（如 deny all），或限制 filename 参数不允许包含 ../ 等路径遍历字符。最彻底的缓解措施是将前端 Web 服务器升级为现代替代方案（如使用安全的多文件上传组件），并确保废弃 CGI 脚本不再部署到生产环境。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Oatmeal Studios Mail File 1.10 mailfile.cgi 任意文件读取漏洞"
updated = "2026-06-16T21:52:53.800"

