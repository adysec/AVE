[basic]
description = 'Windows NT 4.0 SP4 及更早版本中存在权限提升漏洞，本地攻击者可通过在 \?? 对象文件夹中利用大小写不同的字符修改符号链接表，将其指向不同的设备，从而获取系统高级权限。该漏洞影响 Windows NT 4.0 系列操作系统，需本地访问权限，CVSS 评分 4.6，危害等级中危。'
published = "1999-12-31T05:00:00.000"
remediation = "升级至 Windows NT 4.0 SP5 及以上版本可修复此漏洞。对于已停止支持的旧系统，建议迁移至受支持的 Windows Server 版本，并限制普通用户本地登录权限以降低攻击面。"
score = 4.6
severity = "MEDIUM"
sources = ["avd"]
title = "Microsoft Windows NT 4.0 权限提升漏洞"
updated = "2026-06-16T21:50:10.980"

