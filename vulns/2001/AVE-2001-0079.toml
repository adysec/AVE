[basic]
description = "Picserver 1.0 Web 服务器存在目录遍历漏洞，远程攻击者无需任何身份认证，通过向目标服务器发送包含 `../` 序列的精心构造的 HTTP GET 请求，即可绕过路径限制读取服务器上的任意文件，导致敏感信息泄露。该漏洞影响 Picserver 1.0 版本，CVSS 评分 5.0，危害等级中危。"
published = "2001-05-03T04:00:00.000"
remediation = 'Picserver 产品已停止维护且无官方补丁。建议立即停止使用 Picserver 并迁移至 Apache、Nginx 等受支持的 Web 服务器。临时缓解措施可在反向代理或 WAF 层面过滤包含 "../" 的 URL 请求路径。'
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Informs Picserver 目录遍历漏洞"
updated = "2026-06-16T21:53:52.420"

