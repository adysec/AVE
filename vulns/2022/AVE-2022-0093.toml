[basic]
description = "Linux 内核 BPF 子系统在处理 ARRAY 类型 map 元素访问时存在整数溢出漏洞。当 BPF 数组 map 大小超过 4GB 时，由于 index 和 elem_size 均为 u32 类型，元素指针计算会产生 32 位整数溢出，导致内核内存访问越界。本地攻击者可通过构造特制的 BPF 程序触发此漏洞，可能造成信息泄露或系统崩溃。该漏洞影响 Linux 内核多个版本，CVSS 评分 5.5，危害等级中危。Linux 社区已通过强制 64 位乘法运算来修复此问题。"
published = "2025-06-18T11:15:47.010"
remediation = "将 Linux 内核升级至 5.18.18、5.19.2 及以上版本，或 cherry-pick 补丁 87ac0d600943 至内核源码树。如无法升级内核，可通过 BPF 程序限制避免创建超过 4GB 的 ARRAY map，以降低触发整数溢出的风险。"
score = 5.5
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux Kernel BPF 32位整数溢出漏洞"
updated = "2026-06-17T05:22:53.823"

