[info]
author = "ave"
description = "检测 Ascend CascadeView/UX 1.0 的 TFTP 服务器是否受符号链接漏洞影响。tftpd 在写日志 /tmp/tftpd_xfer_status.log 时跟随符号链接，本地攻击者可创建指向 /etc/shadow 或 /.rhosts 的符号链接并通过 TFTP 上传触发，实现权限提升。"
id = "POC-AVE-2000-0014"
name = "Ascend CascadeView/UX TFTP 符号链接本地提权 PoC"
severity = "medium"
tags = ["ave-2000-0014"]
vuln_id = [
    "CVE-2000-0015",
    "AVE-2000-0014",
]

[poc]
logic = "any"

[[poc.requests]]
path = "/etc/services"
protocol = "file"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["tftp"]
