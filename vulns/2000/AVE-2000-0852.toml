[basic]
description = "BEA WebLogic 5.1.x 版本中的 SSIServlet 存在源代码泄露漏洞，远程攻击者无需认证即可通过在 URL 中插入 `/*.shtml/` 路径后缀来触发该漏洞，导致服务端解析后的页面源码（如 JSP 文件）被直接读取泄露。该漏洞可造成敏感业务逻辑与数据库凭据等关键信息暴露，攻击者利用难度较低，仅需构造特制 HTTP 请求即可实现利用。"
published = "2000-10-20T04:00:00.000"
remediation = "升级 BEA WebLogic 至 5.1.x 的安全修补版本（如 Service Pack 2 及以上），或禁用 SSIServlet 映射（从 web.xml 中移除 *.shtml 的 Servlet 映射）。如无法升级，可在反向代理或防火墙层拦截包含 `/*.shtml/` 的请求路径作为临时缓解。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "BEA WebLogic SSIServlet 源代码读取漏洞"
updated = "2026-06-16T21:52:15.643"

