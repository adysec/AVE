[basic]
description = "系统网卡工作于混杂模式（Promiscuous Mode）时，会接收并处理所有经过的网络数据包而不加过滤，使得攻击者能够借助 tcpdump、Wireshark 等嗅探工具窃听网络流量，从中提取明文传输的敏感信息（如账号密码、通信内容等）。该漏洞通常需要攻击者已获得目标系统的本地访问权限或物理接入同一广播域网络方可利用，属于信息泄露类威胁。"
published = "1999-01-01T05:00:00.000"
remediation = "检查所有网络接口，使用 `ifconfig -a` (Linux) 或 `Get-NetAdapterAdvancedProperty` (Windows) 确认无接口处于混杂模式。将网络环境从共享式集线器升级为交换机，并启用端口安全功能。部署网络流量加密 (如 TLS/IPsec)，防止嗅探窃听。配置 IDS 监控异常大量 promiscuous 模式网卡。对服务器禁用不必要的网络嗅探工具和驱动。"
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "多款操作系统网络接口混杂模式数据包嗅探信息泄露漏洞"
updated = "2026-06-16T21:48:35.503"

