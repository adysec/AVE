[basic]
description = "Check Point Firewall-1 存在拒绝服务漏洞。该防火墙对以 ACK 等非 SYN 数据包开始的连接设置了过长的超时时间，远程攻击者可通过向无法响应的目标系统发送大量此类连接请求，耗尽防火墙会话表资源，导致无法处理正常连接请求。该漏洞影响 Firewall-1 3.0 及 4.0 版本，CVSS 评分 2.1，危害等级低。"
published = "1999-07-29T04:00:00.000"
remediation = "升级 Check Point Firewall-1 至 4.1 及以上版本，该版本修复了非 SYN 包长超时问题，引入了正确的 TCP 状态跟踪机制。如无法升级，可在防火墙上手动调低非 SYN 连接的超时阈值，并限制单源 IP 的并发连接数，同时部署 ingress 过滤以阻断伪造源地址的攻击流量。"
score = 2.1
severity = "LOW"
sources = ["cve"]
title = "Check Point Firewall-1 非SYN连接超时拒绝服务漏洞"
updated = "2026-06-16T21:49:01.327"

