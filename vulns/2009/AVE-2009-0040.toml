[basic]
description = "Adobe Flash Player 与 Adobe AIR 存在数据注入漏洞（CWE-94），攻击者可通过未公开的特定向量向播放器/运行时注入恶意数据，触发任意代码执行。受影响版本为 Adobe Flash Player 10.0.42.34 之前及 Adobe AIR 1.5.3 之前。攻击条件为用户访问或打开由攻击者构造的恶意 Flash/AIR 内容（网络侧，需用户交互）。成功利用可导致远程代码执行，完全危害机密性、完整性与可用性，CVSS 评分为 9.3，危害等级严重。"
published = "2009-12-10T19:30:00.483"
remediation = "将 Adobe Flash Player 升级至 10.0.42.34 或更高版本，将 Adobe AIR 升级至 1.5.3 或更高版本；可通过 Adobe 官方安装包或系统更新完成。临时缓解可卸载未使用的 Flash Player/AIR 组件，并在浏览器中禁用 Flash 插件、限制访问不可信 SWF 内容。"
score = 9.3
severity = "CRITICAL"
sources = ["tenable"]
title = "Adobe Flash Player 和 Adobe AIR 数据注入远程代码执行漏洞"
updated = "2026-06-16T23:12:21.873"

