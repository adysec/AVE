[basic]
description = "HP OpenView Network Node Manager (NNM) 6.1 及 IBM Tivoli NetView 5.x/6.x 中的 ovactiond 组件在处理特定 SNMP 陷阱消息时，未对用户输入中的 shell 元字符进行有效过滤，存在命令注入漏洞。远程攻击者无需身份认证即可通过网络向目标系统发送特制的 SNMP 陷阱消息，利用 shell 元字符执行任意系统命令，从而完全控制受影响的服务器。该漏洞 CVSS 评分 10.0，危害等级为严重，影响范围广泛。目前已有公开的利用代码，攻击门槛较低。"
published = "2001-09-20T04:00:00.000"
remediation = "建议立即升级 HP OpenView NNM 至 6.1 以上补丁版本，或升级 Tivoli NetView 至 7.x 版本。如无法升级，可停止 ovactiond 服务（`kill -9 <PID>` 或从启动脚本中移除），并在防火墙上限制 SNMP 161/162 端口仅允许可信源 IP 访问，同时过滤 SNMP trap 消息中的 shell 元字符。"
score = 10
severity = "CRITICAL"
sources = ["exploitdb"]
title = "HP OpenView Network Node Manager OVActionD SNMPNotify 远程命令执行漏洞"
updated = "2026-06-16T21:54:31.043"

