[basic]
description = 'Gene6 G6 FTP Server 2.0（又名 BPFTP Server 2.10）存在文件属性泄露漏洞。当未启用"显示相对路径"选项时，远程攻击者可通过 FTP 协议的 SIZE 和 MDTM 命令探测 Web 根目录之外的文件属性，从而获取服务器上敏感文件的存在性、大小及修改时间等信息。该漏洞影响版本 2.0，CVSS 评分 7.5，危害等级高，攻击者无需身份认证即可利用。'
published = "2001-06-18T04:00:00.000"
remediation = '升级 Gene6 G6 FTP Server 至 2.0 以上版本（如已停产则迁移至其他维护中的 FTP 服务器软件）；在服务器配置中启用 "show relative paths" 选项，阻止 SIZE 和 MDTM 命令返回 Web 根目录外的文件路径信息；同时在防火墙层面限制对 FTP 端口（21/TCP）的访问来源，仅允许受信 IP 连接。'
score = 7.5
severity = "HIGH"
sources = ["exploitdb"]
title = "Gene6 G6 FTP Server 文件存在性泄露漏洞"
updated = "2026-06-16T21:53:59.273"

