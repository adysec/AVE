[basic]
description = "奇安信网神 SecSSL3600 安全接入网关系统存在任意密码修改漏洞，其根源在于 changepass.php 密码修改接口未对用户身份和会话进行有效校验。未经身份认证的远程攻击者可通过伪造 Cookie 中的 admin_id、gw_user_ticket 及 last_step_param 参数，构造特制的 POST 请求（POST /changepass.php?type=2）直接重置任意用户（包括管理员）的登录密码，无需提供原始密码。成功利用后攻击者可接管管理员账户，进而完全控制网关系统，获取内网访问权限，造成敏感信息泄露和进一步横向渗透。该漏洞影响面广、危害严重，利用门槛低，无需任何前置权限即可触发。"
published = "0723"
remediation = "立即将网神SecSSL3600安全接入网关系统升级至奇安信发布的最新修复版本（联系厂商获取对应补丁固件）。如暂时无法升级，可在网关前置防火墙或WAF上限制/changepass.php接口的访问来源，并强制管理员重新登录使gw_user_ticket会话令牌失效，同时重置所有管理员账户密码。"
