[basic]
description = "AIX、Solaris 及 Windows 等操作系统的 gethostbyname() 库函数存在缓冲区溢出漏洞。远程攻击者可通过向目标系统发送特制的恶意 DNS 主机名解析请求，触发栈缓冲区溢出，进而覆盖返回地址，实现任意代码执行并以 root 权限完全控制目标系统。该漏洞影响 AIX 3.x/4.x、SunOS 5、Windows 95/98/2000/NT 4.0 等多个版本，CVSS 评分为 10.0，危害等级严重。无需用户交互即可远程利用，攻击复杂度低。"
published = "1996-12-10T05:00:00.000"
remediation = "针对 AIX 3.x/4.x，立即升级至 IBM 仍支持的 AIX 7.3 并安装最新 APAR 补丁（如 IY16380）；Windows 95/98/NT 4.0/2000 已终止支持，必须迁移至 Windows 10/11 或 Windows Server 2022 并安装最新安全更新；SunOS 5/Solaris 应升级至 Solaris 11.4 并应用内核补丁 105356-xx。临时缓解措施：在 DNS 解析器配置中使用安全解析库，限制 DNS 服务器为受信内部 DNS，并在系统层面启用 ASLR 和栈不可执行保护。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "IBM AIX/Microsoft Windows/SunOS gethostbyname 缓冲区溢出漏洞"
updated = "2026-06-16T21:47:35.340"

