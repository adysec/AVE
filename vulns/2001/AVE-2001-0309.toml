[basic]
description = '1C: Arcadia Internet Store 1.0 存在目录遍历漏洞。当攻击者向 Web 服务器发送包含 "dot dot" 序列的模板参数 URL 时，应用程序的 tradecli.dll 文件未能正确验证用户输入，导致攻击者能够访问 Web 服务器上的任意文件。这种漏洞影响 Arcadia Internet Store 1.0 版本，是一个经典的 Web 应用安全缺陷。攻击者无需身份验证即可远程执行攻击，通过精心构造的 URL 访问敏感文件，如系统配置文件、数据库连接字符串甚至是操作系统密码表等，威胁到整个服务器的安全。由于该漏洞仅影响信息的机密性，没有直接影响信息的完整性和可用性，因此 CVSS 评分仅为 5.0，反映出其属于低危信息泄露类漏洞，已经成为 Web 安全中的常见问题，该问题一直持续到如今都未能完全得到有效解决。(54字)'
published = "2001-09-20T04:00:00.000"
remediation = '建议升级至 1C: Arcadia Internet Store 2.0 或更高版本（厂商已停止 1.0 版本支持）。若无法升级，建议在 Web 服务器层面配置 WAF 规则拦截包含 `../`、`..\\` 等目录遍历序列的请求，同时限制 Web 服务器进程对敏感目录的读取权限，并在防火墙层面限制对 tradecli.dll 接口的访问来源 IP。'
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "1C Arcadia Internet Store 1.0 任意文件泄露漏洞"
updated = "2026-06-16T21:54:48.327"

