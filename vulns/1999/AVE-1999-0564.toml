[basic]
description = "Microsoft Windows 95 和 Windows NT 4.0 的 TCP/IP 协议栈在处理畸形 ICMP 分片数据包时存在缺陷，攻击者可通过向目标系统发送大量特制的 Jolt ICMP 分片数据包，导致系统 CPU 占用率达到 100% 并完全停止响应，造成拒绝服务。该漏洞无需身份认证即可远程触发，攻击成本低，影响所有安装了 TCP/IP 协议的 Windows 95 及 Windows NT 4.0 系统。"
published = "1997-01-01T05:00:00.000"
remediation = "对于 Windows NT 4.0，安装 Service Pack 4 或后续版本以修复 ICMP 分片包处理逻辑；对于 Windows 95，安装微软提供的 Jolt 专用补丁。如果无法升级系统，在网络边界防火墙或路由器上配置禁止 ICMP 分片包进入内部网络，或直接丢弃所有 ICMP 报文作为临时缓解措施。鉴于这两个系统均已停止支持，强烈建议升级至受支持的 Windows 版本（如 Windows 10/11）。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Microsoft Windows 95/NT 4.0 ICMP Jolt 拒绝服务漏洞"
updated = "2026-06-16T21:48:11.867"

