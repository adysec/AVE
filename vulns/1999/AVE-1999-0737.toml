[basic]
description = "mutt 邮件客户端在处理特制的 MIME 消息时存在缓冲区溢出漏洞。远程攻击者可通过向目标用户发送包含恶意构造的 MIME 附件的电子邮件，触发缓冲区溢出，从而在受害者系统上执行任意代码。该漏洞影响多个版本的 mutt 邮件客户端，攻击者无需身份认证即可利用，危害等级高。"
published = "1999-09-27T04:00:00.000"
remediation = "立即将 mutt 升级到 0.95.7 及以上修复版本（1999 年官方补丁修复了 MIME 解析中的缓冲区溢出）。若暂时无法升级，可在邮件客户端配置中禁用自动执行外部 MIME 处理器、关闭 HTML/附件自动渲染，并改用 less 等安全查看器预览邮件以缓解风险。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "Mutt 邮件客户端 缓冲区溢出代码执行漏洞"
updated = "2026-06-16T21:49:22.293"

