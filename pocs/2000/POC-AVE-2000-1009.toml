[info]
author = "ave"
description = "通过向 Rockliffe MailSite Management Agent 的 wconsole.dll 发送超长 query_string 参数的 HTTP GET 请求触发缓冲区溢出。安全检测方式：探测 wconsole.dll 是否存在并检查 MailSite 特征响应，确认目标运行受影响组件。"
id = "POC-AVE-2000-1009"
name = "Rockliffe MailSite Management Agent wconsole.dll Buffer Overflow PoC"
severity = "critical"
tags = ["ave-2000-1009"]
vuln_id = [
    "CVE-2000-0398",
    "AVE-2000-1009",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/cgi-bin/wconsole.dll"
protocol = "http"

[poc.requests.body]
content = ""
type = "raw"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "MailSite",
    "wconsole",
    "Rockliffe",
    "Management Agent",
]

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/wconsole.dll"
protocol = "http"

[poc.requests.body]
content = ""
type = "raw"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "MailSite",
    "wconsole",
    "Rockliffe",
    "Management Agent",
]

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/mailsite/wconsole.dll"
protocol = "http"

[poc.requests.body]
content = ""
type = "raw"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "MailSite",
    "wconsole",
    "Rockliffe",
    "Management Agent",
]
