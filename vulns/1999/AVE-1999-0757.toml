[basic]
description = "OmniHTTPD 的 visadmin.exe 组件存在拒绝服务漏洞，其 URL 解析逻辑未对畸形请求做充分校验。远程未认证攻击者可向运行 OmniHTTPD 1.1 或 2.0 版本的服务发送特制的畸形 URL，触发程序反复创建大量临时文件，耗尽目标系统磁盘与处理资源，导致服务不可用。该漏洞影响 Omnicron OmniHTTPD 1.1 及 2.0 版本，攻击无需身份认证且可通过网络远程发起，利用方式简单，仅需构造异常 URL 即可造成拒绝服务。"
published = "1999-06-05T04:00:00.000"
remediation = "升级 OmniHTTPD 到最新稳定版本（当前版本 2.0/3.0），并删除已过时的 visadmin.exe 文件或通过禁用 '/visadmin' 路径来限制访问。如无法升级，可限制访问频率、部署URL白名单或预先分配临时文件配额以阻止 DoS 攻击。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Omnicron OmniHTTPD visadmin.exe 拒绝服务漏洞"
updated = "2026-06-16T21:49:25.977"

