[basic]
description = 'Ray Chan WWW Authorization Gateway 0.1 版本的 CGI 认证网关程序在处理用户请求时，未对传入的 "user" 参数进行充分的输入过滤与转义。远程攻击者可在该参数中注入 shell 元字符（如分号、管道符、反引号等），从而绕过认证逻辑并在目标服务器上以 CGI 进程权限执行任意系统命令。该漏洞影响运行 0.1 版本 WWW Authorization Gateway 的 Web 服务器，攻击者仅需能访问该 CGI 接口并通过 HTTP 请求提交特制参数即可发起攻击，无需身份认证，可导致服务器被远程控制、数据泄露或服务中断，危害程度较高。'
published = "1998-07-08T04:00:00.000"
remediation = "立即停止部署并移除存在漏洞的 WWW Authorization Gateway 0.1 CGI 程序（删除对应 .cgi 文件），改用 Apache mod_auth 或 Nginx auth_basic 等成熟认证模块替代；若必须短期保留，应在 CGI 脚本中对 user 参数做严格的字母数字白名单过滤并 stripping 所有 shell 元字符（如 ; & | $ ` 等），同时在 Web 服务器层用 mod_security 规则拦截含特殊字符的请求作为缓解。"
score = 7.5
severity = "HIGH"
sources = ["exploitdb"]
