[info]
author = "AVE"
description = "Mozilla Firefox/Thunderbird onreadystatechange事件处理释放后使用远程代码执行漏洞PoC，通过构造包含恶意iframe的HTML页面触发DocumentViewerImpl对象的UAF"
id = "POC-AVE-2013-0198"
name = "CVE-2013-1690 PoC"
severity = "high"
tags = ["cve-2013-1690"]
vuln_id = [
    "CVE-2013-1690",
    "AVE-2013-0198",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["onreadystatechange"]
