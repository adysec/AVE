[basic]
description = 'RaidenFTPD Server 2.1 build 952 之前版本存在目录遍历漏洞。远程攻击者可通过向 FTP 服务发送特制的包含多个点号（如 CWD 命令中的 "...."、NLST 命令中的 ".." 或 "..."）的路径遍历请求，绕过 FTP 根目录限制，访问服务器文件系统上的任意文件。该漏洞仅影响机密性，攻击者无需身份认证即可利用，CVSS 评分 5.0，危害等级中危。'
published = "2001-06-27T04:00:00.000"
remediation = "升级 RaidenFTPd 至 build 952 或更高版本，该版本修复了 CWD/NLST 命令中的目录遍历缺陷。如无法升级，在 FTP 服务器配置中限制用户目录访问权限，禁用匿名用户写入权限，并在防火墙或 WAF 层过滤包含连续点号（如 `..`、`....`）的 FTP 命令路径参数。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "RaidenFTPD Server 2.1 目录遍历漏洞"
updated = "2026-06-16T21:54:24.443"

