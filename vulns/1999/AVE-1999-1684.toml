[basic]
description = "Linux 内核 2.2.10 及更早版本中的 IPChains 防火墙组件在处理 IP 分片数据包时存在分片重组缺陷，在检查包头前未正确重组 IP 分片，远程攻击者可通过向目标系统发送多个偏移量为 0 的精心构造的 IP 分片，绕过防火墙过滤规则实现对内部网络的未授权访问。该漏洞影响 Linux 2.2.10 及之前版本内核，CVSS 评分 7.5，危害等级高。"
published = "1999-07-27T04:00:00.000"
remediation = "升级至 Linux 内核 2.2.11 及以上版本（该版本已修复 IP 分片重组检查问题），或迁移至 2.4.x/2.6.x 等后续长期支持内核系列。若无法升级内核，可在防火墙规则中添加 `-f` 参数丢弃分片包作为临时缓解：`iptables -A INPUT -f -j DROP`。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "Linux Kernel IPChains IP 分片绕过安全漏洞"
updated = "2026-06-16T21:49:31.960"

