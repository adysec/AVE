[basic]
description = 'WFTPD及WFTPD Pro 2.41 RC12版本存在信息泄露漏洞，远程攻击者无需身份认证即可向服务器发送"%C"命令触发错误响应，服务器会在错误信息中泄露其完整绝对路径。该漏洞影响运行上述版本FTP服务的Windows系统，攻击者获取路径信息后可进一步辅助定位配置文件、脚本位置及其他敏感目录，为后续渗透攻击提供有利条件，危害等级中等。'
published = "2000-11-14T05:00:00.000"
remediation = '升级到 WFTPD Pro 2.41 RC13 或更高版本以修复路径泄露漏洞，新版本已移除 "%C" 命令的路径回显。如无法立即升级，可临时禁用 "%C" 命令的响应或在防火墙层限制对 FTP 服务的匿名访问，仅允许可信 IP 连接。同时建议将 FTP 服务器安装在非系统盘符目录，并确保安装路径不包含敏感信息，以降低路径泄露带来的安全风险。'
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Texas Imperial Software WFTPD和WFTPD Pro 2.41 RC12 全路径名泄露漏洞"
updated = "2026-06-16T21:52:39.233"

