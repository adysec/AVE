[basic]
description = "Windows NT 系统中存在默认、空值、空白或缺失密码的本地用户或管理员账户漏洞，攻击者可通过枚举或暴力破解等方式利用空密码或默认密码直接登录目标系统，获取系统控制权限。该漏洞影响 Windows NT 系列操作系统，CVSS 评分 7.5，危害等级高。攻击者可借助 Metasploit 等工具框架中的认证用户代码执行模块实施远程利用，无需额外认证绕过。"
published = "1997-01-01T05:00:00.000"
remediation = "为所有 Windows NT 本地用户和管理员账户设置复杂密码（至少 8 位，含大小写字母、数字和特殊字符）。启用本地安全策略中的密码复杂度要求和账户锁定阈值（如 5 次失败即锁定 30 分钟）。通过组策略禁用 Guest 账户，并定期审计所有本地账户密码状态。对于 Windows Server，可在安全模板中启用密码必须满足复杂性要求策略。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "Microsoft Windows NT 本地用户账户默认空密码权限提升漏洞"
updated = "2026-06-16T21:48:32.193"

