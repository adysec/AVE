[basic]
description = "VLC Media Player 0.8.6f 之前的版本存在 Cinepak 视频解码器内存越界访问漏洞。攻击者可构造包含异常数据的恶意 Cinepak 格式视频文件，当用户使用 VLC 播放该文件时，解码器在处理过程中会触发数组越界访问，导致内存破坏，进而引发程序崩溃或拒绝服务。该漏洞无需认证即可触发，攻击者可通过网页投递或文件共享方式向目标用户发送恶意文件。受影响版本包括 Linux、Windows 和 Mac 平台上的 VLC Media Player，用户应升级至 0.8.6f 或更高版本以修复该漏洞。"
published = "2008-04-25T06:05:00.000"
remediation = "将 VLC Media Player 升级至 0.8.6f 或更高版本。可通过 VLC 官网 https://www.videolan.org/vlc/ 下载最新稳定版进行覆盖安装。若使用 Linux 发行版，可执行 sudo apt-get upgrade vlc（Debian/Ubuntu）或 sudo yum update vlc（RHEL/CentOS）完成升级。对于无法立即升级的环境，建议避免打开来源不明的 .avi/.cpk 等可能包含 Cinepak 编码的视频文件作为临时缓解措施。"
score = 6.8
severity = "MEDIUM"
sources = ["tenable"]
title = "VLC Media Player Cinepak 解码器越界访问内存破坏拒绝服务漏洞"
updated = "2026-06-16T22:52:27.277"

