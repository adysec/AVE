[basic]
description = "BIND 8.2 的域名服务器程序在处理 DNS 的 NXT（Next Domain）资源记录时存在缓冲区溢出缺陷。远程攻击者无需身份认证，只需向运行 BIND 8.2 的 DNS 服务器发送特制的、包含恶意 NXT 记录的 DNS 查询或响应报文，即可触发缓冲区溢出，可能造成服务崩溃（拒绝服务），在特定条件下甚至可能实现远程代码执行。该漏洞主要影响使用 BIND 8.2 的 Solaris 等 UNIX 类系统的 DNS 服务器，攻击条件为能够向目标 DNS 服务发起网络请求，利用方式是通过构造异常的 NXT 记录载荷进行远程溢出攻击。"
published = "1999-11-10T05:00:00.000"
remediation = "建议将受影响系统上的 BIND 8.2 升级至 8.2.2-P7 或更高补丁版本，或直接迁移至 BIND 9 及以上版本。Solaris 7 用户应安装 Sun 官方安全补丁或升级至 Solaris 8/9/10。若暂时无法立即升级，可在 named.conf 中通过禁止处理 NXT 记录查询作为临时缓解措施，并限制外部对 DNS 服务器的访问。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
