[basic]
description = "L0pht AntiSniff（也称 Stake AntiSniff）1.0.1 版本及 Researchers 1.0 存在缓冲区溢出漏洞。远程攻击者无需身份认证即可向目标系统发送特制的 DNS 响应数据包，触发栈缓冲区溢出，进而覆盖返回地址或函数指针，导致任意代码执行。成功利用后可完全控制受影响系统，获取最高权限。由于 AntiSniff 作为网络嗅探与安全检测工具常运行在特权模式下，该漏洞危害严重，CVSS 评分 10.0。"
published = "2000-05-16T04:00:00.000"
remediation = "L0pht AntiSniff 1.0.1 及更早版本存在此漏洞，厂商 @stake 已被收购且产品已停止维护。建议立即停止使用该产品，改用替代方案（如 Wireshark 等现代网络分析工具）。作为临时缓解措施，在网络边界防火墙上过滤入站 DNS 响应包，并对内网 DNS 流量启用深度包检测，限制非标准 DNS 响应类型的通过。"
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "L0pht AntiSniff DNS响应包缓冲区溢出远程代码执行漏洞"
updated = "2026-06-16T21:51:38.847"

