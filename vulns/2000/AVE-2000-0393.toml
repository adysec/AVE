[basic]
description = "Allegro RomPager 2.10 HTTP 服务器存在拒绝服务漏洞，远程攻击者可通过向目标设备发送特制的畸形认证请求（malformed authentication request）触发该漏洞，导致服务崩溃或无法响应正常请求。该漏洞影响运行 Allegro RomPager 2.10 的嵌入式设备（如路由器、调制解调器等），攻击者无需身份认证即可从远程发起攻击，CVSS 评分 7.5，危害等级高。目前已存在公开的 PoC 利用代码（ExploitDB ID: 10237），可被用于实施拒绝服务攻击。"
published = "2000-06-01T04:00:00.000"
remediation = "升级 Allegro RomPager 至 2.10 以上版本，或联系设备厂商获取固件更新。如无法升级，在边界防火墙上限制对受影响设备 HTTP 端口的访问来源，仅允许可信 IP 访问管理界面，并禁用不必要的远程管理功能。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "Allegro RomPager 2.10 拒绝服务漏洞"
updated = "2026-06-16T21:51:48.193"

