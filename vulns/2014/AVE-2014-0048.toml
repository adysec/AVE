[basic]
description = "Netsweeper 4.0.3 及 4.0.4 版本的 remotereporter/load_logfiles.php 文件中存在跨站脚本（XSS）漏洞。远程攻击者无需身份认证即可通过向 url 参数注入恶意的 Web 脚本或 HTML 代码，当管理员或其他用户访问被攻击的链接时，注入的脚本将在浏览器中执行，导致敏感信息泄露、会话劫持或钓鱼攻击。该漏洞攻击复杂度低，但需要用户交互触发。"
published = "2020-02-19T20:15:13.113"
remediation = "升级 Netsweeper 至 4.0.5 或更高版本，该版本已修复 remotereporter/load_logfiles.php 中 url 参数未正确转义的问题。如无法立即升级，可在 Web 服务器（如 Apache/Nginx）配置中对 /remotereporter/ 路径添加访问控制，仅允许受信 IP 访问，或通过 WAF 规则拦截包含可疑 script/onerror 等 XSS 载荷的 url 参数请求。"
score = 6.1
severity = "MEDIUM"
sources = ["nuclei"]
title = "Netsweeper Netsweeper 跨站脚本漏洞"
updated = "2026-06-17T00:18:38.130"

