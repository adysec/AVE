[info]
author = "AVE"
description = "HP-UX 11.00 crontab -e symlink local file read via crontab -e"
id = "POC-AVE-2000-0703"
name = "CVE-2000-0972 PoC"
severity = "medium"
tags = ["cve-2000-0972"]
vuln_id = [
    "CVE-2000-0972",
    "AVE-2000-0703",
]

[poc]
logic = "any"

[[poc.requests]]
path = "/etc/passwd"
protocol = "file"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["root:"]
