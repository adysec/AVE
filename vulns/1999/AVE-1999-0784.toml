[basic]
description = "htdig 是一款 Web 搜索索引工具，其在处理文件名时未正确过滤 shell 元字符（如反引号、$() 等），远程攻击者可通过构造包含恶意 shell 元字符的文件名，诱使服务器执行任意系统命令，导致信息泄露或系统控制权被接管。攻击无需身份认证，通过网络即可触发。"
published = "1999-12-09"
remediation = "升级 htdig 至不受影响的版本，或对用户输入的文件名进行严格过滤，移除 shell 元字符（; | & ` $ () {} [] < > ! # 等），避免将文件名直接传递给 shell 执行。"
score = 7.5
severity = "HIGH"
sources = [
    "cve",
    "epss",
]
title = "htdig 搜索工具 命令执行漏洞"
updated = "2024-11-20"

