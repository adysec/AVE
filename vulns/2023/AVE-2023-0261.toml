[basic]
description = "锐捷网络 EWEB 网管系统（含 NBR/EG 系列设备内置的睿易/EWEB 网管组件）存在未授权访问及权限绕过漏洞。攻击者无需有效凭证，通过构造特定请求访问 /cgi-bin/luci/api/auth、/ddi/server/login.php、/flow_control_pi/ 等管理接口，可绕过身份认证获取管理权限、读取敏感配置信息，进而执行任意命令或植入后门。该漏洞利用条件低，通常仅需设备 Web 管理端口对攻击者可达即可触发，公网暴露的设备风险尤为突出，可能导致设备被完全控制、内网横向渗透及敏感数据泄露。"
published = "2023-08-09"
remediation = "立即登录锐捷官方软件下载中心（www.ruijie.com.cn/fw/rjxz/）或睿易服务通道，下载并将受影响设备（含 NBR/EG/EWEB 网管相关型号）升级至厂商当前最新稳定固件版本并重启生效，升级前务必备份配置。如暂无法升级，应在防火墙上仅允许可信运维网段访问 EWEB 管理端口（常见 80/443），禁止公网及非必要内网访问 /cgi-bin/luci/api/auth、/ddi/server/login.php、/flow_control_pi/ 等管理接口；同时修改默认管理员口令、关闭不必要的远程 Web 管理与外网映射，并排查设备是否存在异常进程、webshell 或不明定时任务。"
score = 5.0
severity = "MEDIUM"
sources = ["hwpoc"]
title = "锐捷网络 EWEB 网管系统 未授权访问漏洞"
updated = "2023-08-09"

