[basic]
description = "WU-FTPD 在启用 FTP 转换功能（如 tar、uncompress 等）时存在命令注入漏洞。攻击者可通过上传特制文件名，该文件名被 FTP 服务器作为转换程序的参数传递并执行，从而导致远程命令执行。该漏洞影响 WU-FTPD 2.4.2、2.5.0、2.6.0、2.6.1、2.6.2 版本，攻击条件为攻击者需拥有可写目录的 FTP 访问权限且服务器启用转换功能。"
published = "1999-12-20"
remediation = "升级到已修复的 wu-ftpd 2.6.3 或更高版本；若无法升级，请在配置文件（ftpaccess）中禁用 FTP 转换功能（将 compress 与 tar 相关转换指令移除或注释），并限制仅可信用户可写入 FTP 目录，同时使用防火墙限制 FTP 服务访问来源。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "密西根大学 wu-ftpd FTP 转换功能命令注入漏洞"
updated = "2026-07-18"

