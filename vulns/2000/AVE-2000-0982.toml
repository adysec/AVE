[basic]
description = "Interbase 6 SuperServer for Linux 在处理包含 0 字节的数据库查询时存在输入验证缺陷，本地攻击者可通过发送包含空字节的恶意查询语句触发服务异常终止，导致数据库服务拒绝服务。该漏洞影响 Interbase 6 SuperServer Linux 版本，攻击向量为本地访问（AV:L），攻击复杂度低（AC:L），无需身份认证（Au:N），仅影响可用性（A:P），CVSS 评分 2.1 属低危级别。攻击者需具备本地数据库访问权限，通过构造包含空字节的 SQL 查询即可触发拒绝服务，导致数据库服务崩溃不可用。"
published = "2000-11-14T05:00:00.000"
remediation = "建议升级 InterBase 到 6.0.1 或更高版本（如 Firebird 1.0 及以上版本），该版本已修复 SuperServer 在处理空字节查询时的拒绝服务漏洞。若无法立即升级，可通过防火墙限制仅允许受信任 IP 访问 3050/tcp 端口，或在防火墙层面过滤包含异常空字节的异常查询包作为临时缓解措施。"
score = 2.1
severity = "LOW"
sources = ["cve"]
title = "Borland Interbase 6 SuperServer 拒绝服务漏洞"
updated = "2026-06-16T21:52:37.977"

