[basic]
description = "SmartMax MailMax 1.0 的 SMTP 服务组件存在缓冲区溢出漏洞，远程攻击者可通过向 25 端口发送特制的超长 SMTP 命令触发该漏洞，导致目标系统拒绝服务或执行任意代码。该漏洞影响 Windows 平台下的 MailMax 1.0 版本，无需身份认证即可利用，危害等级高。厂商未提供官方补丁，建议停止使用该软件或通过防火墙限制 SMTP 端口的访问。"
published = "1999-02-14T05:00:00.000"
remediation = "升级 SmartMax MailMax 至 2.0 或更高版本。该产品已停止维护，建议迁移至受支持的邮件服务器软件，并在防火墙中限制 SMTP 端口（25/TCP）仅允许可信来源访问作为临时缓解措施。"
score = 7.5
severity = "HIGH"
sources = ["exploitdb"]
title = "SmartMax MailMax 1.0 SMTP 缓冲区溢出漏洞"
updated = "2026-06-16T21:48:19.490"

