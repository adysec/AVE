[basic]
description = "SCO UnixWare 7.1 及 7.1.1 版本的 EELS（Enterprise Event Logging System）存在安全漏洞，远程攻击者无需身份认证即可利用该漏洞向目标系统发送特制的请求，最终导致 EELS 服务崩溃，造成拒绝服务。该漏洞影响 UnixWare 7.1.x 系列版本，攻击者可从远端直接触发，无需本地访问权限，威胁系统可用性。"
published = "2000-03-10T05:00:00.000"
remediation = "立即从 SCO 安全公告 SB-00.08a（ftp://ftp.sco.com/SSE/security_bulletins/SB-00.08a）获取并安装 EELS 系统补丁，升级至修复版本。若无法打补丁，在边界防火墙阻断对 UnixWare 主机 EELS 服务端口（默认为 6789/TCP）的未授权访问，仅允许可信 IP 连接。SCO UnixWare 7.1.x 已停止安全维护，建议尽快迁移至仍在安全更新期内的操作系统。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "SCO UnixWare 7.1/7.1.1 EELS 拒绝服务漏洞"
updated = "2026-06-16T21:51:09.170"

