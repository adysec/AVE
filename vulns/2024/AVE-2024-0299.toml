[basic]
description = "Totolink N200RE路由器固件版本9.3.5u.6139_B20201216中/cgi-bin/cstecgi.cgi的setTracerouteCfg函数存在OS命令注入漏洞。攻击者无需身份验证即可远程发送特制请求，通过command参数注入任意系统命令，导致设备被完全控制。该漏洞利用代码已公开。"
published = "2024-01-08"
remediation = "厂商Totolink未发布官方补丁。建议用户将受影响的N200RE路由器更换为其他受支持型号，或禁用远程管理功能，并在网络边界设置访问控制规则限制对/cgi-bin/cstecgi.cgi的访问。"
score = 9.8
severity = "CRITICAL"
sources = ["cve"]
title = "Totolink N200RE setTracerouteCfg OS命令注入漏洞"
updated = "2026-06-17"

