[basic]
description = "Computer Associates eTrust Intrusion Detection 系统（原名 SessionWall-3）1.4.1.13 版本存在弱加密漏洞。该系统使用 XOR 异或算法对注册表中存储的管理员密码进行加密，加密强度极低。拥有本地访问权限的攻击者可轻松从注册表中提取加密后的密码，并通过逆向 XOR 算法快速还原出明文密码，进而获取系统管理员权限，对系统安全构成严重威胁。"
published = "2000-06-07T04:00:00.000"
remediation = '建议升级 CA eTrust Intrusion Detection 至最新受支持版本。如已停止支持，应迁移至其他受支持的入侵检测产品；同时限制本地用户对注册表中 `HKLM\SOFTWARE\ComputerAssociates\eTrust\IntrusionDetection` 的读取权限，并使用 NTFS 权限和 BitLocker 保护存储敏感信息的系统。'
score = 2.1
severity = "LOW"
sources = ["cve"]
title = "Computer Associates eTrust Intrusion Detection 管理密码弱加密漏洞"
updated = "2026-06-16T21:51:59.910"

