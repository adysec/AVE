[basic]
description = "捷利通 JieLink+ 智能终端操作平台 DeletelpPool 接口存在 SQL 注入漏洞，攻击者无需身份认证即可通过构造特制的 SQL 语句注入后台数据库，导致数据库敏感信息泄露、数据篡改甚至获取服务器权限。该漏洞影响 JieLink+ 智能终端操作平台多个版本，危害严重。"
published = "0718"
remediation = "厂商（捷顺/安徽德顺智能科技）尚未发布官方补丁，建议联系厂商获取最新固件版本。在官方修复前，在 Web 应用防火墙（WAF）中配置针对 DeletelpPool 接口的 SQL 注入拦截规则，对输入参数进行严格过滤；同时将数据库账户权限降为最低，仅允许执行必要操作；若业务允许，临时关闭该接口的外部访问。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "JieLink 智能终端操作平台 DeletelpPool SQL注入漏洞"
updated = "0718"

