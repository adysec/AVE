[basic]
description = "Qbik WinGate Telnet 代理服务存在拒绝服务漏洞。远程攻击者通过向目标系统的 Telnet 代理端口发起大量本地主机连接请求，可耗尽代理服务资源导致服务崩溃，无法正常处理后续合法连接。该漏洞影响 Qbik WinGate 的 Telnet 代理模块，攻击者无需身份认证即可远程触发，风险等级中等。"
published = "1998-02-21T05:00:00.000"
remediation = "建议升级 WinGate 至 4.0 及以上版本，该漏洞已在后续迭代中修复。如无法升级，可在 WinGate 网关属性中禁用 telnet 代理服务（取消 Telnet Proxy 复选框），或在防火墙上限制对 telnet 代理端口（默认 23）的入站连接数量，仅允许可信 IP 访问。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Qbik WinGate Telnet Proxy 拒绝服务漏洞"
updated = "2026-06-16T21:48:04.970"

