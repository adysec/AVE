[basic]
description = "Brian Stanback 开发的 bsguest.cgi 留言簿脚本（版本 1.0）存在远程命令执行漏洞，攻击者可在电子邮件地址字段中注入 shell 元字符（如 `;`、`|`、`` ` `` 等），导致服务器执行任意系统命令，从而完全控制目标主机。该漏洞触发无需身份认证，仅需向服务器发送特制 HTTP 请求即可利用，且利用门槛极低（已知公开的漏洞利用代码存在于 ExploitDB）。由于 CGI 脚本对用户输入未作任何过滤直接传递给 shell，受该脚本影响的任何 Web 服务器均面临被完全攻陷的风险。"
published = "2001-02-12T05:00:00.000"
remediation = '立即删除或替换 bsguest.cgi 脚本，该软件已停止维护，建议改用现代且受支持的留言板程序。若暂不能移除，须对 email 字段做严格输入过滤，禁止 `;|&\`$()` 等 shell 元字符传入，并在 Web 服务器层面限制该脚本的访问来源 IP。'
score = 10
severity = "CRITICAL"
sources = ["exploitdb"]
title = "Brian Stanback bsguest.cgi 远程命令执行漏洞"
updated = "2026-06-16T21:53:39.200"

