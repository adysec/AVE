[basic]
description = "mutt 邮件客户端在处理特制 MIME 消息时存在缓冲区溢出漏洞，远程攻击者可通过向目标用户发送恶意构造的邮件触发该漏洞，导致任意代码执行。该漏洞影响 mutt 邮件客户端多个版本，攻击者无需身份认证即可利用，危害等级高。建议用户升级至最新版本以修复此漏洞。"
published = "1999-09-27T04:00:00.000"
remediation = "立即升级 mutt 邮件客户端至 1.0 及以上版本，该漏洞在 mutt 1.0 正式版中已修复。如无法升级，可在邮件服务器或客户端防火墙层面过滤畸形 MIME 邮件作为临时缓解措施。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "Mutt mutt 邮件客户端缓冲区溢出远程代码执行漏洞"
