[basic]
description = "Matt Wright 开发的 FormMail CGI 脚本 1.6/1.7/1.8 版本存在环境变量泄露漏洞。远程攻击者可通过向 env_report 参数提交恶意请求，导致服务器环境变量（如路径信息、系统配置等敏感数据）被泄露。攻击者无需身份认证即可利用该漏洞，有助于后续深入攻击。该漏洞影响广泛使用 FormMail 的 Web 服务器。"
published = "2000-05-10T04:00:00.000"
remediation = "立即停止使用 Matt Wright 的 FormMail 1.6/1.7/1.8 版本，该脚本已停止维护且存在多个已知漏洞。建议迁移至社区维护的 FormMail 分支（如 GitHub 上的 fordnox/FormMail-Clone）或使用现代替代方案（如 CGI::FormMail）。如无法立即替换，可编辑 FormMail 源码，删除或注释掉处理 env_report 参数的相关代码段，并在 Web 服务器（Apache/Nginx）层面限制对 FormMail CGI 脚本的访问来源。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Matt Wright FormMail CGI 环境变量泄露漏洞"
updated = "2026-06-16T21:51:39.580"

