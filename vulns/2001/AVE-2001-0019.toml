[basic]
description = "MetaProducts Offline Explorer 1.4 Service Release 2 之前版本存在文件系统泄露漏洞。远程攻击者通过在请求 URL 中指定盘符（如 C:）即可绕过访问限制，读取目标系统上的任意文件，导致敏感信息泄露。该漏洞无需身份认证即可远程利用，攻击门槛低，危害中等。受影响版本为 Offline Explorer 1.4 及更早版本。"
published = "2001-02-16T05:00:00.000"
remediation = "升级到 Offline Explorer 1.4 Service Release 2 或更高版本，该版本修复了 URL 中直接解析盘符路径的问题。如无法升级，建议在应用前端或反向代理层过滤包含盘符（如 C:、D:）的 URL 请求作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "MetaProducts Offline Explorer 文件系统泄露漏洞"
updated = "2026-06-16T21:53:32.243"

