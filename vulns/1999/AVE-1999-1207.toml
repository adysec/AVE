[basic]
description = 'wwwcount（Count.cgi）2.3 版本存在目录遍历漏洞，其 CGI 程序在处理 image 参数时未对用户输入进行充分过滤与校验，攻击者可构造包含".."路径回溯序列的恶意请求读取服务器上任意位置的 GIF 文件。该漏洞影响部署了 Muhammad A. Muquit 所编写 wwwcount 2.3 组件的 Web 服务器，远程未授权攻击者仅需向 Count.cgi 发送特制 URL 即可利用，无需身份认证或特殊权限，属于信息泄露类安全问题。'
published = "1999-12-31T05:00:00.000"
remediation = '建议将 wwwcount (Count.cgi) 升级至 2.3 以外的版本（该漏洞仅影响 2.3 版本，更早版本不受此问题影响），或直接替换为其他 maintained 的网站访问计数器程序。如短期内无法升级，可在 Web 服务器层面对 Count.cgi 的 image 参数进行输入过滤，去除 ".." 及绝对路径字符，或在 CGI 执行目录中限制 Count.cgi 的读取权限，阻止其访问文档根目录以外的文件。'
score = 3.5
severity = "LOW"
sources = ["cve"]
title = "Muhammad A. Muquit wwwcount 目录遍历漏洞"
updated = "2026-06-16T21:50:47.250"

