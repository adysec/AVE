[basic]
description = "Wireshark 4.0.0 至 4.0.10 版本的 SSH 协议解析器存在越界读取漏洞（CWE-125）。攻击者可通过向网络中注入特制数据包或诱导用户打开恶意构造的捕获文件触发该漏洞，导致 SSH 解析器崩溃，造成拒绝服务。该漏洞影响使用受影响版本 Wireshark 的所有平台，CVSS 评分 6.3，危害等级中危。用户应升级至 Wireshark 4.0.11 或更高版本修复此问题。"
published = "2023-11-16T12:15:07.240"
remediation = "立即升级 Wireshark 至 4.0.11 或更高版本（3.6.x 用户升级至 3.6.19+），该漏洞在 SSH 解析器中存在越界读取，攻击者可通过注入恶意数据包或诱导打开特制抓包文件触发崩溃。Debian 用户可参考 DSA-5559、Gentoo 用户参考 GLSA 202402-09 安装对应安全更新。如无法立即升级，避免在 Wireshark 中打开来源不可信的 pcap 文件作为临时缓解。"
score = 6.3
severity = "MEDIUM"
sources = ["msrc"]
title = "Wireshark SSH 解析器越界读取漏洞"
updated = "2026-06-17T06:50:14.093"

