[basic]
description = "Sambar Server 4.2 Beta 7 的 CGI 目录下默认包含 ECHO.BAT 和 HELLO.BAT 两个批处理文件，由于未对用户输入进行有效过滤，远程攻击者可通过向这些 CGI 脚本提交包含 Shell 元字符（如管道符、重定向符等）的特制请求，在服务器端执行任意系统命令。该漏洞影响 Sambar Server 4.2 Beta 7 版本，攻击者无需身份认证即可利用，可能导致服务器敏感信息泄露或完全受控。"
published = "2000-02-23T05:00:00.000"
remediation = "删除 Sambar Server CGI 目录下的 ECHO.BAT 和 HELLO.BAT 文件，并禁止在 CGI 参数中使用 shell 元字符（如 `|`、`&`、`;`）。建议升级到 4.2 正式版或更高版本（如 5.0+），并在 IIS 反向代理或网络防火墙上限制对 CGI 目录的访问作为临时缓解。若无法升级，考虑迁移至维护中的 Web 服务器（如 Apache、Nginx）以彻底规避风险。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Sambar Server 4.2 Beta 7 CGI 远程命令执行漏洞"
updated = "2026-06-16T21:51:14.327"

