[basic]
description = "Apple Mac OS 8 至 8.6 版本在用户账户管理中使用弱加密算法（如简单 XOR 或可逆编码）对 Users & Groups Data File 中存储的密码进行保护。本地攻击者可通过直接读取该数据文件并逆向弱加密算法，快速还原明文密码，进而提升权限或接管目标账户。该漏洞影响 Mac OS 8/8.6 系统，CVSS 评分 4.6，危害等级中危。由于无需特殊工具即可破解密码，对多用户环境构成实质威胁。"
published = "1999-07-10T04:00:00.000"
remediation = "建议升级至 Mac OS X 10.0 及以上版本，新系统使用基于 SHA-1 的更强密码哈希算法替代旧版弱加密。如无法升级，可启用第三方加密工具（如 FileVault）对用户数据文件进行额外加密保护，并限制本地物理访问权限。"
score = 4.6
severity = "MEDIUM"
sources = ["epss"]
title = "Apple Mac OS 8 弱密码加密漏洞"
updated = "2026-06-16T21:50:40.950"

