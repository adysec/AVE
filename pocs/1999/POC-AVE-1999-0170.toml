[info]
author = "AVE"
description = "检测 phf CGI 远程命令执行漏洞（CVE-1999-0069）"
id = "POC-AVE-1999-0170"
name = "CVE-1999-0069 PoC"
severity = "high"
tags = [
    "cve-1999-0069",
    "ave-1999-0170",
]
vuln_id = [
    "CVE-1999-0069",
    "AVE-1999-0170",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/cgi-bin/phf"
protocol = "http"

[poc.requests.body]
content = ""
type = "raw"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["phf"]
