[basic]
description = "Apache 1.3.20 split-logfile 组件在 HTTP 请求的 Host 头字段处理中存在安全漏洞，攻击者可通过在 Host 头中包含 '/'（斜杠）字符绕过文件扩展名验证，向目标系统运行的所有以 .log 结尾的日志文件中写入任意内容，破坏日志文件的完整性和机密性。该漏洞影响所有运行 Apache 1.3.20 版本的服务，攻击者无需身份验证即可远程触发，仅需发送包含恶意 Host 头字段的 HTTP 请求即可利用此漏洞写入恶意数据，可能导致文件权限异常、敏感信息泄露或其他安全威胁，对系统日志审计造成严重破坏。"
published = "2001-10-30T05:00:00.000"
remediation = '立即升级 Apache HTTP Server 至 1.3.21 或更高版本（如 2.0.x 分支），该版本修复了 split-logfile 中的 Host 头斜杠路径遍历漏洞；若无法立即升级，可在前端反向代理（如 Nginx/Apache mod_proxy）层面拦截包含斜杠的 Host 头（如 `Host: example.com/..`），或在 Apache 配置中启用 `UseCanonicalName On` 并限制 `Host` 头格式，同时限制 split-logfile 脚本的写入权限至专用日志目录。建议优先升级至 Apache 2.4.x 长期支持版本。建议升级到 Apache 2.4.58 或更高版本。若暂时无法升级，可在 Web 应用防火墙（WAF）层面拦截包含斜杠的 Host 头请求，或在 Apache 配置中添加 `SetEnvIf Host "^[^/]*$" valid_host` 并配合 `Deny from env=!valid_host` 限制非法 Host 头，同时限制 split-logfile 脚本写入权限至指定日志目录。'
score = 5
severity = "MEDIUM"
sources = ["redhat"]
title = "Apache HTTP Server 任意文件写入漏洞"
updated = "2026-06-16T21:54:51.077"

