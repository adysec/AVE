[basic]
description = "RealNetworks RealPlayer 6.x 和 7.x 版本在处理 Location URL 时存在缓冲区溢出漏洞。当用户打开包含超长 Location URL 的网页或媒体链接时，RealPlayer 由于未对 URL 长度进行有效边界检查，导致缓冲区溢出。远程攻击者可通过诱使用户点击恶意链接的方式触发该漏洞，造成 RealPlayer 应用程序崩溃，最终导致拒绝服务。该漏洞无需身份认证即可利用，但需要用户交互才能触发。"
published = "2000-04-03T04:00:00.000"
remediation = "建议升级至 RealPlayer 8 或更高版本，或卸载 RealPlayer 6/7 并改用其他播放器。临时缓解措施：禁止打开不可信的 .ram/.rpm 流媒体链接，防火墙层面拦截异常长 URL 请求。"
score = 2.6
severity = "LOW"
sources = ["exploitdb"]
title = "RealNetworks RealPlayer 6/7 Location 缓冲区溢出拒绝服务漏洞"
updated = "2026-06-16T21:51:23.237"

