[basic]
description = "Tornado Python Web 框架的 `set_status` 方法与 `HTTPError` 类在处理 `reason` 参数时存在输入验证缺陷。当应用程序将不可信数据作为 `reason` 参数传递时，该参数未经过转义处理即被直接写入 HTTP 响应头或默认错误页面的 HTML 中，攻击者可利用此漏洞实现 HTTP 响应头注入或跨站脚本攻击（XSS）。该漏洞影响 Tornado 6.5.2 及之前版本，CVSS 评分 5.4（中危），厂商已发布 6.5.3 版本修复此问题。"
published = "2025-12-12T06:15:41.213"
remediation = "建议立即将 Tornado 升级至 6.5.3 或更高版本，该版本已对 `reason` 参数进行转义处理，防止未转义数据被注入 HTTP 响应头或默认错误页面导致 XSS 攻击。如无法升级，应避免将任何不可信用户输入直接传入 `RequestHandler.set_status()` 或 `tornado.web.HTTPError` 的 `reason` 参数，或对输入进行严格的 HTML 实体编码和换行符过滤。"
score = 5.4
severity = "MEDIUM"
sources = ["ghsa"]
title = "Tornado HTTP 响应标头注入与跨站脚本漏洞"
updated = "2026-06-17T09:58:02.230"

