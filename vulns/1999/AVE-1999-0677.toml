[basic]
description = 'Alibaba 2.0 Web 服务器内建的多个 CGI 程序（如 post32.exe、get16.exe 等）对用户输入缺乏充分的过滤处理，攻击者可以通过构造包含管道符（"|"）的畸形 URL 请求，将任意 shell 命令注入到服务器执行。成功利用后，远程攻击者可以在服务器上执行任意操作系统命令，导致文件被读取、覆盖、创建或删除，从而完全控制服务器文件系统。该漏洞影响运行在 Windows 95/98/NT 平台上的 Alibaba Web 服务器，攻击者只需向目标服务器发送特制的 HTTP GET 请求即可触发，无需身份认证。'
published = "1999-11-03T05:00:00.000"
remediation = '由于 Alibaba 2.0 Web 服务器早已停止维护且不存在官方补丁，建议立即停用该服务器并迁移至受持续维护的现代 Web 服务器（如 Nginx 或 Apache 最新稳定版）。若短期内无法替换，应在网络边界部署 WAF 或反向代理，严格过滤 URL 中包含管道符（"|"）及 shell 元字符的畸形请求，并移除或禁用 post32.exe、get16.exe 等存在缺陷的 CGI 脚本以阻断利用路径。'
score = 3.6
severity = "LOW"
sources = ["exploitdb"]
title = "Computer Software Manufaktur Alibaba 2.0 Web 服务器 CGI 命令执行漏洞"
updated = "2026-06-16T21:49:15.570"

