[basic]
description = "Nachuatec D435 与 D445 打印机在处理 ICMP 重定向消息时存在安全缺陷，远程攻击者可向目标设备发送大量特制的 ICMP 重定向报文，触发消息风暴，耗尽设备处理资源，导致打印机服务中断或拒绝服务。该漏洞无需身份认证即可利用，影响设备正常打印功能，需通过固件更新或禁用 ICMP 重定向功能进行缓解。"
published = "2000-10-14T04:00:00.000"
remediation = "由于 Nachuatec D435/D445 打印机已停产且厂商不再提供固件更新，建议在网络边界防火墙或路由器上配置 ACL 丢弃入站的 ICMP 重定向报文（类型 5），阻止攻击者从外部发送 ICMP 重定向风暴。同时将打印机隔离至独立 VLAN，限制其与不可信网络的通信。长期解决方案是升级至受支持的打印机型号。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Nachuatec D435/D445 打印机 ICMP 重定向消息风暴拒绝服务漏洞"
updated = "2026-06-16T21:50:43.477"

