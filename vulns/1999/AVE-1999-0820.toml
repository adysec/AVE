[basic]
description = "Unix 系统关键文件或目录权限设置不当，未经授权的远程攻击者可利用此漏洞访问或修改系统关键资源，导致系统完整性、安全性及稳定性受损。该漏洞影响 Linux/Unix 等系统版本，CVSS 评分 10.0，危害等级极高。厂商已在安全更新中修复此权限问题。"
published = "1999-01-01T05:00:00.000"
remediation = "使用 chmod/chown 修正关键系统文件权限为 755/644，确保关键目录归属 root 且权限不宽松，升级内核至 2.2.14 以上版本启用 exec-shield 保护，无法升级时临时限制 su/sudo 权限并审计关键文件权限配置。"
score = 10.0
severity = "CRITICAL"
sources = [
    "cve",
    "epss",
]
title = "Unix 关键系统文件/目录权限配置不当漏洞"
updated = "2026-06-16T21:48:38.350"

