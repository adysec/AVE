[basic]
description = "CUPS（Common Unix Printing System）1.0.4 及更早版本中存在请求文件删除不当的安全漏洞，远程攻击者无需认证即可利用该漏洞向目标系统发送特制打印请求，导致系统拒绝服务。该漏洞影响运行 CUPS 1.0.4 及之前版本的 Unix/Linux 系统，攻击者通过构造恶意打印任务可耗尽系统资源或导致 CUPS 守护进程崩溃，CVSS v2.0 评分 5.0，危害等级中等。Easy Software Products 已在 CUPS 1.0.5 版本中发布补丁修复此漏洞。"
published = "2000-06-16"
remediation = "升级 CUPS 至 1.0.5 或更高版本，此版本已修复请求文件未正确清理导致远程拒绝服务的缺陷。补丁可从 ftp://ftp.easysw.com/pub/cups/1.0.5/cups-DoS.patch 获取。如无法升级，可限制未经授权的远程 IP 对 CUPS 服务（默认端口 631）的访问作为临时缓解。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Easy Software Products CUPS 拒绝服务漏洞"
updated = "2000-06-16"

