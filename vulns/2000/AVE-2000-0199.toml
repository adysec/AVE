[basic]
description = "SCO UnixWare 7.x 系统中 ARCserve 代理存在本地符号链接漏洞，攻击者可在 /tmp 目录创建恶意符号链接，诱导 ARCserve 进程以 root 权限写入关键文件，从而实现本地提权。该漏洞影响 SCO UnixWare 7.1 及 7.1.1 版本，需本地账户访问权限才可利用，CVSS 评分 1.2，属低危本地提权漏洞。"
published = "2000-02-15T05:00:00.000"
remediation = "建议升级 SCO UnixWare 到 7.1.3 或更高版本并应用 ARCserve 补丁补丁包（如 ARCserve 6.61 SP2 或更高版本），或在 /tmp 目录设置粘滞位（chmod +t /tmp）限制符号链接创建，同时限制普通用户对 /tmp 的写入权限作为临时缓解措施"
score = 1.2
severity = "LOW"
sources = ["exploitdb"]
