[basic]
description = "BNC 是一款流行的 IRC 代理/网关软件（Bounce），其多个版本（2.2.4、2.4.6、2.4.8）在处理 IRC 协议相关输入时存在缓冲区溢出漏洞。由于程序未对用户可控的输入数据进行充分的长度校验与边界检查，远程攻击者可在未认证的情况下向目标 BNC 代理服务发送特制构造的超长数据或恶意 IRC 命令，从而触发缓冲区溢出。成功利用该漏洞可使攻击者覆盖内存中的关键数据并执行任意代码，进而在运行 BNC 服务的系统上提升自身权限、完全控制该代理进程。攻击条件为攻击者能够网络访问目标 BNC 代理监听的端口，且该服务正运行上述受影响的漏洞版本。此漏洞影响使用 BNC 2.2.4、2.4.6 及 2.4.8 版本的 IRC 代理服务器，危害等级较高，建议及时升级至已修复的安全版本。"
published = "1998-12-26T05:00:00.000"
remediation = "建议立即升级 BNC IRC 代理至官方修复版本（2.4.9 及以上，或 2.2.x 系列最新补丁版），从 https://bnc.sourceforge.net 获取源码重新编译安装。如无法立即升级，可在防火墙/iptables 上仅允许受信任的 IP 访问 BNC 监听端口（默认 6668），并停止不必要暴露的 BNC 服务实例，以此降低被远程溢出提权的风险。"
score = 7.5
severity = "HIGH"
sources = ["exploitdb"]
