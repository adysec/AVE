<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="AVE PoC/EXP 详情 - 查看 PoC 或 EXP 的完整请求与匹配规则" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛡️</text></svg>" />
    <title>AVE PoC/EXP 详情</title>
    <link rel="stylesheet" href="assets/styles.css" />
  </head>
  <body>
    <header class="hero">
      <div class="hero-inner">
        <div class="hero-top">
          <a href="javascript:history.back()" class="back-link">← 返回</a>
          <h1>PoC/EXP 详情</h1>
        </div>
        <p id="detail-subtitle">正在加载 ...</p>
      </div>
    </header>

    <main class="layout detail-layout">
      <section class="panel detail-panel">
        <div id="status" class="status">初始化中...</div>

        <article class="detail-card" id="detail-card" style="display:none;">

          <!-- ═══ 头部 ═══ -->
          <div class="detail-header">
            <div class="detail-id-row">
              <strong class="detail-ave" id="a-id">-</strong>
              <span class="severity" id="a-sev">UNKNOWN</span>
              <span class="asset-type-badge" id="a-type-badge">PoC</span>
            </div>
            <div class="detail-header-actions">
              <a class="detail-link" id="a-raw" target="_blank" rel="noopener noreferrer">📄 原始 TOML</a>
              <a class="detail-link" id="a-github" target="_blank" rel="noopener noreferrer">📂 GitHub</a>
            </div>
          </div>

          <h2 class="detail-title" id="a-name"></h2>
          <p class="detail-desc" id="a-desc"></p>

          <!-- ═══ 元信息网格 ═══ -->
          <div class="detail-grid">
            <div class="detail-grid-item">
              <span class="grid-label">作者</span>
              <span class="grid-value" id="a-author">-</span>
            </div>
            <div class="detail-grid-item">
              <span class="grid-label">标签</span>
              <span class="grid-value" id="a-tags">-</span>
            </div>
            <div class="detail-grid-item">
              <span class="grid-label">逻辑</span>
              <span class="grid-value" id="a-logic">-</span>
            </div>
            <div class="detail-grid-item">
              <span class="grid-label">关联漏洞</span>
              <span class="grid-value" id="a-vuln-id">-</span>
            </div>
          </div>

          <!-- ═══ 请求列表 ═══ -->
          <section class="detail-block" id="a-requests-section">
            <h4>📡 请求列表</h4>
            <div id="a-requests" class="requests-list"></div>
          </section>

        </article>
      </section>
    </main>

    <footer class="site-footer">
      <div class="footer-inner">
        <p class="footer-brand"><a href="https://github.com/adysec/AVE" target="_blank" rel="noopener noreferrer">AVE</a> 公开漏洞库</p>
        <p class="footer-desc">AdySec Vulnerability Exposures — 多源聚合漏洞知识库</p>
      </div>
    </footer>

    <script src="assets/asset.js"></script>
  </body>
</html>
