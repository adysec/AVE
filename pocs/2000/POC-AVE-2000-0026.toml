[info]
author = "ave"
description = "Internet Explorer 5.0/5.01 external.NavigateAndFind() 跨框架安全策略绕过验证。通过构造包含 javascript: URL 的恶意网页，可绕过跨框架安全限制读取本地文件内容。"
id = "POC-AVE-2000-0026"
name = "Microsoft Internet Explorer external.NavigateAndFind() Cross-Frame PoC"
severity = "medium"
tags = ["cve-2000-0028"]
vuln_id = [
    "CVE-2000-0028",
    "AVE-2000-0026",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/"
protocol = "http"

[poc.requests.body]
content = ""
type = "raw"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["external.NavigateAndFind"]
