[basic]
description = "International Components for Unicode (ICU) 3.8.1 及更早版本中的 libicu 库 regexcmp.cpp 文件 doInterval 函数存在堆缓冲区溢出漏洞。攻击者可通过构造特制正则表达式向回溯栈写入大量数据，触发堆溢出导致拒绝服务（内存耗尽）并可能造成未指定的其他影响（如远程代码执行）。该漏洞影响使用 ICU 库的广泛应用程序，包括 OpenOffice、OpenSUSE、Red Hat、Debian、Ubuntu、Gentoo 等众多 Linux 发行版及相关软件产品。攻击者无需身份认证即可通过恶意正则表达式远程触发漏洞，CVSS 评分 9.3（严重级别），CVE-2007-4771 / AVE-2007-0017。"
published = "2008-01-29T00:00:00.000"
remediation = "立即升级国际组件库 ICU 到 58.2 或更高版本，如果使用 Ubuntu/Debian 可执行 `apt-get install libicu58`，使用 RedHat/CentOS 可执行 `yum update icu`，并确保所有 OpenOffice/LibreOffice 产品版本 ≥ 3.7.0，以修复 regexcmp.cpp 中的堆缓冲区溢出漏洞。"
score = 9.3
severity = "CRITICAL"
sources = ["tenable"]
title = "OpenOffice/ICU 国际化组件缓冲区溢出拒绝服务漏洞"
updated = "2026-06-16T22:44:45.667"

