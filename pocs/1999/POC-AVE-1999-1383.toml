[info]
author = "ave"
description = "Pine 3.94 及更早版本在收到新邮件时创建锁文件，未进行严格校验。本地攻击者可在目标锁文件路径预先创建指向敏感文件的符号链接，利用 symlink race 覆盖系统文件以提升权限。本 PoC 检查本地是否存在受影响版本的 Pine 及其锁文件目录的写权限，验证符号链接攻击条件是否成立。"
id = "POC-AVE-1999-1383"
name = "CVE-1999-1187 Pine 符号链接锁文件权限提升 PoC"
severity = "medium"
tags = ["ave-1999-1383"]
vuln_id = [
    "CVE-1999-1187",
    "AVE-1999-1383",
]

[poc]
logic = "all"

[[poc.requests]]
path = "/etc/passwd"
protocol = "file"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["root:"]
