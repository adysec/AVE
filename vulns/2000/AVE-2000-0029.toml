[basic]
description = "Red Hat Linux 的 initscripts 初始化脚本包中存在符号链接攻击漏洞。本地攻击者可通过创建恶意的符号链接文件，诱使 initscripts 在处理临时文件时以 root 权限执行任意文件操作，从而将自身权限提升至 root。该漏洞影响 Red Hat Linux 多个版本，攻击者需拥有本地系统访问权限，CVSS 评分 6.2，危害等级中危。"
published = "2000-10-20T04:00:00.000"
remediation = "立即升级 initscripts 软件包至 5.00-1 或更高版本（Red Hat Linux 6.x 对应 RHSA-2000:001 安全公告）。脚本中应使用 mktemp 创建临时文件而非固定路径，避免 /tmp 目录下的符号链接劫持。如无法升级，移除 initscripts 中写入 /tmp 的可疑临时文件操作作为临时缓解。"
score = 6.2
severity = "MEDIUM"
sources = ["redhat"]
title = "Red Hat Linux initscripts 本地权限提升漏洞"
updated = "2026-06-16T21:50:51.573"

