[basic]
description = "计算机 Associates ARCserve NT 的代理服务在端口 6050 上使用简单的异或（XOR）弱加密方式处理认证口令，而非安全的加密算法。由于加密强度极低，处于网络位置的远程攻击者可嗅探捕获客户端发往代理的认证请求数据包，进而通过异或运算逆向还原出明文密码。该漏洞影响运行 ARCserve NT 及其代理组件的相关 Windows 系统，攻击者无需身份认证，只需能够与目标主机的 TCP 6050 端口进行网络嗅探与交互即可利用，成功后可获取代理访问权限，进而可能进一步控制备份服务及所在主机，危害等级达到严重（CVSS 10.0）。"
published = "1999-02-21T05:00:00.000"
remediation = "建议升级至 ARCserve 官方修复版本（如 ARCserveIT 6.61 或更高版本），采用强加密算法替代弱 XOR 密码加密机制。若无法立即升级，应通过防火墙限制对 6050 端口的访问，仅允许可信主机连接，并在受信任的隔离网络段内部署备份代理，避免明文认证请求在网络中被嗅探破解。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "Computer Associates ARCserve NT 弱加密密码嗅探漏洞"
updated = "2026-06-16T21:49:35.950"

