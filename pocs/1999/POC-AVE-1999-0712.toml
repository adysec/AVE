[exploit]
exp_urls = []
poc_urls = ["https://www.exploit-db.com/exploits/19505"]

[info]
author = "ave"
description = "验证 FreeBSD VFS 缓存耗尽拒绝服务漏洞（CVE-1999-0912）。该漏洞存在于 FreeBSD 3.0/3.1/3.2 的 VFS 缓存机制中，本地用户可通过创建大量文件和硬链接耗尽内核有线内存，导致系统拒绝服务。参考 ExploitDB-19505 的 C 代码可在本地复现该漏洞。"
id = "POC-AVE-1999-0712"
name = "FreeBSD vfs_cache 拒绝服务漏洞 PoC"
severity = "low"
tags = ["ave-1999-0712"]
vuln_id = [
    "CVE-1999-0912",
    "AVE-1999-0712",
]

[poc]
logic = "all"

[[poc.requests]]
path = "/etc/passwd"
protocol = "file"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["root:"]
