[basic]
description = "GSSFTP FTP 代理在 Kerberos 5 1.1.x 版本中存在访问控制漏洞。该漏洞源于 FTP 代理未能严格限制对特定 FTP 命令的访问权限。远程攻击者可通过向目标服务器发送恶意的 FTP 命令触发漏洞，导致系统拒绝服务并执行未经授权的操作。此外，本地用户亦可利用此漏洞获取系统管理员权限。此漏洞影响 Kerberos 5 1.1.x 及更高版本，CVSS 评分 10.0，安全等级极高。攻击者无需认证即可利用该漏洞，且攻击复杂度极低，全方位影响了系统的保密性、完整性和可用性，构成严重的安全威胁。"
published = "2000-06-14T04:00:00.000"
remediation = "升级 Kerberos 5 到 1.2 或更高版本（已修复 GSSFTP FTP 守护进程权限检查漏洞），或升级至厂商提供的最新修补版本（如 MIT Kerberos 1.2.1+、Heimdal 0.4+）。若无法立即升级，可暂时禁用 GSSFTP 服务（注释掉 /etc/inetd.conf 中的 gssftp 行并重启 inetd），或在防火墙层面限制 FTP 端口（21/TCP）仅允许可信 IP 访问，并限制本地用户 FTP 登录权限防止本地提权。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "MIT Kerberos 5 GSSFTP FTP守护进程 拒绝服务与本地权限提升漏洞"
updated = "2026-06-16T21:51:53.917"

