[basic]
description = "Internet Explorer 在加载文档窗口时存在安全区域设置延迟漏洞。当用户预览或加载包含恶意 JavaScript 的网页时，IE 在文档完全加载前不会应用正确的安全区域策略，导致远程攻击者可在低权限安全区域中执行跨域脚本代码。该漏洞影响 IE 4.0 至 5.5 版本，攻击者可通过诱使用户访问恶意页面或预览 HTML 邮件来触发，造成信息泄露或权限提升。"
published = "2000-01-07T05:00:00.000"
remediation = "立即升级 Internet Explorer 至 6.0 SP1 或更高版本（IE 6 SP1 修复了安全区域设置延迟问题），或在组策略中将 Internet 区域安全级别设置为「高」并禁用活动脚本执行。如操作系统允许，建议迁移至 Microsoft Edge 或 Chrome 等现代浏览器，从根本上避免 IE 内核安全区域机制缺陷。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "Microsoft Internet Explorer 安全区域绕过漏洞"
updated = "2026-06-16T21:50:55.253"

