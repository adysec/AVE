[basic]
description = "Microsoft Internet Explorer 6至8版本中存在释放后重用漏洞，位于mshtml!CDwnBindInfo对象处理过程中。当浏览器未能正确管理已分配或已删除对象的生命周期时，远程攻击者可通过构造特制网页诱导用户访问，触发对已释放内存的访问，从而在目标系统上以当前用户权限执行任意代码。该漏洞在2012年12月已被野外利用，影响Windows全系平台，CVSS评分8.8，危害等级高。Microsoft已发布安全更新修复此漏洞。"
published = "2012-12-30T18:55:01.477"
remediation = "安装微软 2013 年 1 月安全更新 MS13-008 (KB2799329)，该补丁修复了 IE 6/7/8 中 CDwnBindInfo 对象的释放后重用问题。如无法立即打补丁，可配置 IE 安全区域为高等级并禁用 ActiveX 控件和活动脚本作为临时缓解措施。"
score = 8.8
severity = "HIGH"
sources = ["kev"]
title = "Microsoft Internet Explorer mshtml!CDwnBindInfo 释放后重用远程代码执行漏洞"
updated = "2026-06-16T23:45:43.277"

