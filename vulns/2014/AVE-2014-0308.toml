[basic]
description = 'Microsoft Windows OLE Object Packager (packager.dll) 存在输入验证漏洞，攻击者可构造恶意 OLE 对象嵌入 Office 文档，诱导用户打开文档触发漏洞，导致远程代码执行。该漏洞影响 Windows Vista SP2 至 Windows 8.1/Server 2012 R2 等版本，CVSS 3.1 评分 7.8 (HIGH)，攻击向量为本地，需用户交互 (打开恶意文档)，成功利用可导致高机密性/完整性/可用性影响。2014 年 6-10 月 "Sandworm" APT 攻击活动中曾被实战利用，Microsoft 于 2014 年 10 月补丁日发布补丁修复 (MS14-060)。'
published = "2014-10-15T10:55:07.817"
remediation = '安装最新的Microsoft安全更新，特别是2021~2023年发布的针对Windows OLE远程代码执行漏洞的安全补丁（KB编号如4058203、4469321、4514484），对于Windows Vista SP2及更高版本及时应用SP1/SP2升级包；立即关闭Office文档的自动内容加载功能，或在Windows Update中禁用不安全的OLE Packager服务；如需临时缓解措施可封禁来自互联网的OLE（packager.dll）对象调用，并启用Windows Defender Attack Surface Reduction规则"Block Office applications from creating child processes"来阻止利用链。'
score = 7.8
severity = "HIGH"
sources = ["kev"]
title = "Microsoft Windows OLE 远程代码执行漏洞"
updated = "2026-06-17T00:09:27.550"

