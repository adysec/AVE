[basic]
description = "Endymion MailMan 邮件系统在处理用户邮件及相关文件时使用了不安全的默认权限配置，导致本地系统上的任意用户均可读取其他用户的电子邮件内容，或篡改、修改受影响的文件。该漏洞影响运行 Endymion MailMan 的系统，攻击者只需拥有目标主机的本地访问权限（如普通低权限账户）即可利用，无需远程网络访问或身份认证。利用方式较为简单，本地用户直接访问 MailMan 创建的邮件或数据文件即可越权读取或修改，可能造成敏感信息泄露及数据完整性破坏。建议管理员检查并收紧相关文件与目录的权限设置。"
published = "1999-12-02T05:00:00.000"
remediation = "立即检查并收紧 Endymion MailMan 安装目录（如 /usr/local/mailman/）及其子目录（尤其存放邮件的 spool 目录和配置文件）的权限，确保仅 mailman 运行用户具有读写权限，移除其他本地用户的写权限。将 MailMan 以专用低权限系统账户（如 mailman）运行，而非 root 或共享账户。如不再使用该软件，建议彻底卸载并迁移至受支持的邮件系统（如 Postfix + Dovecot）。"
score = 3.6
severity = "LOW"
sources = ["avd"]
title = "Endymion MailMan 默认权限配置不当漏洞"
updated = "2026-06-16T21:49:11.300"

