[basic]
description = "Debian 发行版中 nvi 软件包所带的 nviboot 启动脚本存在安全缺陷，该脚本用于在系统启动时恢复 vi 编辑器中意外中断的会话。由于脚本对 vi.recover 目录中的恢复条目缺乏充分的合法性校验，本地已登录的普通用户可通过构造恶意或格式错误的恢复条目，诱使 nviboot 在系统启动或恢复过程中错误地删除根目录（/）下的文件。该漏洞属于本地权限提升/文件破坏类问题，影响范围限于安装了存在缺陷版本 nvi 软件包的 Debian 及其衍生 Linux 系统，攻击前提是攻击者需具备本地账户并能够写入 vi.recover 相关条目。成功利用后可导致系统关键文件被误删，进而引发拒绝服务或系统不稳定，CVSS 基础评分约为 2.1，危害等级较低。"
published = "1999-12-30T05:00:00.000"
remediation = "升级 Debian nvi 软件包至当前已修复版本（bullseye/bookworm 系列为 1.81.6 以上），执行 apt upgrade nvi 安装最新补丁。如无法立即升级，可通过 chmod 700 /var/lib/vi.recover 限制恢复目录权限，或禁用 nviboot 启动脚本来消除 vi.recover 恶意文件触发本地文件删除的风险。"
score = 2.1
severity = "LOW"
sources = ["cve"]
title = "Debian nvi 本地任意文件删除漏洞"
updated = "2026-06-16T21:50:57.030"

