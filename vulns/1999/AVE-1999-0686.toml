[basic]
description = "SGI IRIX 6.5.4 中的 midikeys 程序存在本地权限提升漏洞，该程序以 root 权限运行且允许本地用户通过文本编辑器修改任意文件。本地攻击者可利用该缺陷修改系统关键配置文件（如 /etc/passwd 或 sudoers 文件），从而提升权限至 root。该漏洞影响 SGI IRIX 6.5.4 版本，CVSS 评分 10.0（严重），攻击条件为本地用户账户访问权限，利用方式为通过 midikeys 程序调用文本编辑器修改关键系统文件实现提权。SGI 已发布补丁修复此漏洞。"
published = "1999-05-19T04:00:00.000"
remediation = "建议立即移除 midikeys 程序的 setuid root 权限：`chmod u-s /usr/sbin/midikeys`，或升级到 SGI IRIX 6.5.5 及以上版本。如无法升级，可通过删除 midikeys 可执行权限 `chmod 000 /usr/sbin/midikeys` 作为临时缓解措施。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
