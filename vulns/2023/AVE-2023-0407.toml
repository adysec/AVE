[basic]
description = "Wireshark 4.0.0 至 4.0.8 及 3.6.0 至 3.6.16 版本的 RTPS 解析器存在内存分配大小值过大漏洞（CWE-789），同时存在资源无限制分配问题（CWE-770）。攻击者可通过向目标系统注入特制的网络数据包或提供恶意的捕获文件触发该漏洞，导致 RTPS 解析器发生内存泄漏，进而造成拒绝服务。该漏洞 CVSS 评分 5.3，危害等级中危，影响范围较广，建议用户升级至 Wireshark 4.0.9 或 3.6.17 及以上版本修复。"
published = "2023-10-04T17:15:10.437"
remediation = "升级至 Wireshark 4.0.9 及以上版本，或 3.6.17 及以上版本，该漏洞已在官方发布中修复。如无法立即升级，可在分析设置中禁用 RTPS 协议解析器作为临时缓解措施，避免打开来源不可信的抓包文件。"
score = 5.3
severity = "MEDIUM"
sources = ["msrc"]
title = "Wireshark RTPS 解析器内存泄漏拒绝服务漏洞"
updated = "2026-06-17T06:48:26.907"

