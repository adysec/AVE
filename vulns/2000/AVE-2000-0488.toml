[basic]
description = "WebShield SMTP 4.5.44 的远程管理服务存在缓冲区溢出漏洞，未经认证的远程攻击者可通过向该服务发送超长配置参数触发缓冲区溢出，导致任意命令执行。攻击者无需任何身份认证即可远程利用，可能完全控制受影响服务器，危害严重。建议用户立即升级至修复版本或限制对管理服务的网络访问。"
published = "2000-05-01T04:00:00.000"
remediation = "建议将 WebShield SMTP 升级至 4.5.44 之后的补丁版本（如 4.5.45 或厂商当时发布的安全更新）。鉴于该产品已停止维护，应迁移至 McAfee Email Gateway 或同等功能的现代邮件安全网关。临时缓解措施：在防火墙上限制远程管理服务仅允许受信任管理 IP 地址访问，防止外部攻击者直接触达该服务端口。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "Network Associates WebShield SMTP 远程管理服务缓冲区溢出漏洞"
updated = "2026-06-16T21:51:45.190"

