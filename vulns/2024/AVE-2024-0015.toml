[basic]
description = "aiohttp 是一个基于 asyncio 的 Python 异步 HTTP 客户端/服务器框架。当以 Web 服务器模式运行并配置静态路由时，若将 `follow_symlinks` 选项设置为 True，系统未对读取文件是否位于静态根目录内进行校验，导致攻击者可通过向目标发送包含 `../` 路径遍历序列的恶意 HTTP 请求（如 `GET /static/../../../../../../etc/passwd`）绕过目录限制，实现任意文件读取。该漏洞影响 aiohttpp < 3.9.2 版本，CVSS 评分 5.9，危害等级中危。建议升级至 3.9.2 或更高版本，或禁用 follow_symlinks 并配置反向代理以缓解风险。"
published = "2024-01-29T23:15:08.563"
remediation = "升级 aiohttp 至 3.9.2 或更高版本；如无法升级，在配置静态路由时将 `follow_symlinks` 设为 `False`，并在前端部署反向代理（如 Nginx）拦截包含 `../` 的路径请求作为临时缓解措施。"
score = 5.9
severity = "MEDIUM"
sources = ["hwpoc"]
title = "Python aiohttp 目录遍历漏洞"
updated = "2026-06-17T07:12:37.090"

