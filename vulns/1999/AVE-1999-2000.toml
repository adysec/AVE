[basic]
description = "XCmail 0.99.6 版本在启用 autoquote 功能时存在缓冲区溢出漏洞，远程攻击者可向目标系统发送包含超长主题（subject）字段的特制邮件，触发缓冲区溢出，进而执行任意命令。该漏洞 CVSS 评分高达 10.0，危害等级严重，攻击者无需身份认证即可远程利用，对受影响系统的机密性、完整性和可用性构成完全威胁。"
published = "1999-05-01T04:00:00.000"
remediation = "升级到 XCmail 0.99.7 及以上版本（开发版已修复此问题）。若无法升级，建议关闭 autoquote 自动引用功能，或在邮件网关层面过滤超长 Subject 主题行作为临时缓解措施。"
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "Xcmail 0.99.6 缓冲区溢出漏洞"
updated = "2026-06-16T21:50:42.237"

