[basic]
description = "Mirabilis ICQ 2000.0 A 版本的 Webmail 客户端在用户登录过程中会创建全局可读的临时文件，且登录完成后未及时删除该文件，导致本地攻击者可读取临时文件中保存的敏感信息（如邮件内容等）。该漏洞需攻击者具有本地系统访问权限，危害等级中危，CVSS 评分 5.5。"
published = "2000-06-06T04:00:00.000"
remediation = '升级 Mirabilis ICQ 至 2000.0 B 或更高版本，该版本修复了临时文件权限问题。如无法升级，手动设置 ICQ 临时文件目录（通常位于 `C:\Program Files\ICQ\` 下）的权限为仅当前用户可读写，并在每次登录后手动删除临时文件。建议迁移至现代即时通讯软件以彻底规避风险。'
score = 5.5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Mirabilis ICQ 2000.0 A 临时文件信息泄露漏洞"
updated = "2026-06-16T21:51:58.990"

