[basic]
description = "ircII 4.4及之前版本的IRC客户端在处理DCC Chat协议时存在缓冲区溢出漏洞。远程攻击者可以通过向目标用户发送特制的DCC Chat请求，触发缓冲区溢出，从而在受害者系统上执行任意代码。攻击者需要诱使用户接受DCC Chat连接，攻击条件相对较高，但成功利用可完全控制受影响系统。"
published = "2000-03-10"
remediation = "升级到修复此漏洞的 ircII 版本，Red Hat Linux 用户可参考 RHSA-2000-008 安全公告更新 ircII 软件包，其他发行版用户应联系厂商获取补丁。"
score = 5.1
severity = "MEDIUM"
sources = ["cve"]
title = "ircII 4.4 IRC客户端DCC Chat远程缓冲区溢出漏洞"
updated = "2000-03-10"

