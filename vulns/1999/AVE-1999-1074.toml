[basic]
description = 'Netscape Communicator 4.04 至 4.7 版本在多种 UNIX 操作系统中存在跨站脚本漏洞。漏洞原理是浏览器将特定字节编码 0x8b 自动转换为 "<" 符号、0x9b 转换为 ">" 符号，导致 CGI 程序中未过滤的这些字符可被攻击者利用来注入恶意 HTML 和脚本代码。攻击者通过构造特制 URL 或恶意页面诱导用户访问，从而在其他客户端浏览器上下文中执行任意脚本，实现跨站脚本攻击。该漏洞影响所有使用受影响版本的 Netscape Communicator 的 UNIX 系统用户。'
published = "1999-10-05T04:00:00.000"
remediation = "升级到不受影响的 Netscape 版本（高于 4.7）或改用现代浏览器（如 Firefox）。在服务端 CGI 程序中对用户输入进行字符过滤和 HTML 实体编码，将 0x8b/0x9b 等特殊字节转换为安全格式，防止跨站脚本攻击。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "Netscape Communicator 跨站脚本漏洞"
updated = "2026-06-16T21:50:16.097"

