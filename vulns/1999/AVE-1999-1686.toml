[basic]
description = 'Matt Wright Guestbook.pl 2.3.1 存在服务器端包含（SSI）注入漏洞。该程序在过滤用户插入的 SSI 指令时，仅移除 "<!--" 与 "-->" 分隔符之间的内容，但 Apache 1.3.9 及部分其他版本允许使用除 "-->" 之外的其他闭合序列，导致过滤机制可被绕过。远程攻击者可通过在留言内容中构造特制的 SSI 语句绕过过滤，在目标服务器上执行任意系统命令。该漏洞影响运行于 Apache 1.3.9 及兼容版本上的 Guestbook.pl 2.3.1，CVSS 评分 7.5，危害等级高。'
published = "1999-09-13T04:00:00.000"
remediation = "立即升级 Guestbook.pl 至官方最新版本（或改用其他受支持的留言本程序），该版本已正确过滤 SSI 指令而非仅移除 `<!--` 与 `-->` 之间的内容。在 Apache 配置中将 `Options Includes` 改为 `Options IncludesNOEXEC`，禁用 `#exec cmd` 命令执行功能。如无需 SSI 功能，直接移除 `Options +Includes` 指令彻底关闭服务端包含解析。同时将 Apache HTTP Server 从 1.3.9 升级至 2.4.x 系列最新稳定版，新版本对 SSI 结束符解析更严格，可有效防止此类绕过攻击。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "Matt Wright Guestbook.pl 2.3.1 服务端包含命令执行漏洞"
