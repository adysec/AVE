[basic]
description = "Sun Flex License Manager（FlexLM）中的 lit 程序在处理文件时未对符号链接进行安全检查，会直接跟随符号链接进行操作。本地已登录用户可以创建指向任意系统文件的符号链接，诱使 lit 程序以该程序权限写入或覆盖目标文件，从而修改本无权访问的任意文件内容。该漏洞影响运行 Sun Workshop 5.0 等使用 FlexLM 授权管理组件的 Solaris 系统，攻击前提是攻击者需在目标主机拥有本地账户及执行 lit 程序的权限，属于本地权限提升类漏洞，CVSS 评分较低（约 1.2），危害等级低。"
published = "2000-02-21"
remediation = "立即停用或卸载 Sun Workshop 5.0 中的 FlexLM 组件；将 lit 可执行文件去除 setuid 位（chmod u-s /path/to/lit）并限制普通用户对其执行权限；确保 /tmp 等临时目录设置 sticky bit（chmod 1777 /tmp）且仅 root 可写敏感目标文件。若业务仍需许可证服务，迁移到已修复的后续 FlexNet Publisher 或 Oracle Solaris Studio 授权方案，并禁止本地非特权用户在 lit 工作目录创建符号链接；无法升级时，将 lit 从默认 PATH 移除并配合严格本地账户与文件 ACL 作为临时缓解。"
score = 1.2
severity = "LOW"
sources = [
    "exploitdb",
    "cve",
]
title = "Sun FlexLM lit 符号链接本地文件覆盖漏洞"
updated = "2026-07-19"

