[basic]
description = "QNX 4.25 操作系统由 QSSL 提供的 crypt 口令加密函数存在弱加密缺陷，其生成的口令哈希容易被离线暴力破解。本地已认证用户可通过获取 /etc/passwd 或 shadow 中的弱哈希并离线破解，从而提升权限获取更高权限账户访问权，危害系统安全。"
published = "2000-04-14"
remediation = "升级到 QNX 4.25 后续补丁版本以使用修正后的强口令加密实现，或替换弱 crypt 为强哈希机制。临时缓解措施：收紧 /etc/passwd 与 shadow 文件权限为 root 只读，并限制对本地账户的访问权限，避免在 QNX 系统中存放高权限账户口令。"
score = 7.2
severity = "HIGH"
sources = ["cve"]
title = "QSSL QNX 4.25 crypt 弱加密本地权限提升漏洞"
updated = "2026-07-19"

