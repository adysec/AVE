[basic]
description = "DNSTools 软件中的 CGI 应用程序存在输入验证漏洞，由于未对用户提交的参数进行有效过滤，远程攻击者可通过向 CGI 脚本提交包含 shell 元字符（如分号、管道符等）的特制请求，在目标服务器上以 Web 服务进程权限执行任意系统命令。该漏洞影响 DNSTools 1.0.8 及 1.10 版本，CVSS 评分 10.0，危害等级严重。攻击者无需身份认证即可远程利用，造成服务器完全受控。"
published = "2000-03-02"
remediation = "升级 DNSTools 至 1.0.10 或更高版本；如厂商已停止维护，立即移除 DNSTools CGI 脚本或禁用 Web 服务器对该目录的 CGI 执行权限，并在应用层严格过滤 shell 元字符（如 ; | & $ 等）输入。"
score = 10.0
severity = "CRITICAL"
sources = [
    "cve",
    "epss",
]
title = "DNSTools Software DNSTools CGI 远程命令执行漏洞"
updated = "2026-06-16"

