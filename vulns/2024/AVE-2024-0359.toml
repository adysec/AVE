[basic]
description = "南京星源图科技 SparkShop 商城系统存在任意文件上传漏洞，攻击者可通过 POST 请求向 /api/Common/uploadFile 接口上传恶意 PHP 文件，无需身份认证即可获取服务器远程代码执行权限，进而完全控制目标服务器。"
published = "2024-04-01"
remediation = "建议升级 SparkShop 至最新版本，在 uploadFile 接口增加文件类型白名单校验，限制仅允许上传图片等安全格式文件，并配置 Web 目录禁止执行 PHP 脚本。"
