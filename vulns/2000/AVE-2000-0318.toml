[basic]
description = "Intel NetStructure 7110 和 7180 设备存在未记录的后门账户漏洞（servnow、root、wizard），其密码可通过设备的 MAC 地址推算得出。远程攻击者无需身份认证即可通过网络访问目标设备，利用 MAC 地址推导出后门账户密码，从而获取设备的 root 权限，完全控制受影响设备。该漏洞 CVSS 评分 10.0，危害等级严重。"
published = "2000-05-08T04:00:00.000"
remediation = "立即通过 Web 管理界面或串口登录设备，修改 servnow、root、wizard 三个内置账户的默认密码为强随机密码；如不需远程管理，在防火墙上限制仅可信 IP 能访问设备的管理端口（默认 80/TCP、23/TCP）；若业务允许，可直接禁用 servnow 和 wizard 这两个非必要账户。"
score = 10
severity = "CRITICAL"
sources = ["exploitdb"]
title = "Intel NetStructure 7110/7180 未记录密码漏洞"
updated = "2026-06-16T21:51:36.250"

