[basic]
description = "华盛顿大学实现的 IMAP 和 POP 服务器存在缓冲区溢出漏洞。未经身份认证的远程攻击者可通过向目标系统发送特制的 IMAP/POP 协议请求触发该漏洞，导致缓冲区溢出，进而实现远程代码执行或任意文件读取。该漏洞影响运行 imapd 服务的 Linux 系统，CVSS 评分 10.0，危害等级严重。厂商已在后续版本中修复此漏洞。"
published = "1997-04-07T04:00:00.000"
remediation = "升级 UW IMAP 至 4.1 或更高版本（如 imap-2001a 及以上）可彻底修复此缓冲区溢出漏洞。由于该软件已停止维护，建议迁移至持续更新的 Dovecot（推荐 2.3.x 以上）或 Cyrus IMAP 替代。如无法立即更换，应在防火墙层面限制 IMAP (143/tcp) 和 POP3 (110/tcp) 端口仅对可信内网 IP 开放，同时启用 TCP Wrappers 进行访问控制。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "华盛顿大学 IMAP/POP 服务器远程缓冲区溢出漏洞"
updated = "2026-06-16T21:47:26.303"

