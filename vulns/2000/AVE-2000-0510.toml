[basic]
description = "Netscape Communicator 4.73 及更早版本在处理 JPEG 图像注释字段时存在堆溢出漏洞。攻击者可通过构造包含非法长度字段（值为 1）的 JPEG 注释内容的恶意图片，诱使用户访问包含该图片的网页或邮件，触发堆内存破坏，导致拒绝服务或执行任意命令。该漏洞影响 Netscape Communicator 4.x 全系列版本，危害等级中等，攻击复杂度较低。"
published = "2000-07-25T04:00:00.000"
remediation = "升级至 Netscape Communicator 4.74 及以上版本即可修复此漏洞。由于 Netscape Communicator 系列已停止维护且存在大量未修复漏洞，强烈建议彻底停止使用该软件，迁移至 Mozilla Firefox、Google Chrome 等现代浏览器以避免后续安全风险。"
score = 5
severity = "MEDIUM"
sources = ["redhat"]
title = "Netscape Communicator JPEG 注释堆溢出漏洞"
updated = "2026-06-16T21:52:12.003"

