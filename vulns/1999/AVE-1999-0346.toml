[basic]
description = "VMware Workstation 1.0.1 for Linux 版本中存在本地缓冲区溢出漏洞。由于 VMware 二进制程序以 setuid root 权限安装且未对 HOME 环境变量长度做充分边界检查，本地攻击者可通过设置超长的 HOME 环境变量触发栈缓冲区溢出，覆盖函数返回地址并执行任意代码，从而获取 root 权限。该漏洞攻击复杂度低，无需特殊权限，CVSS v2 评分 7.2，危害等级高。已有公开的漏洞利用代码（EDB-19371）可实现完全控制目标系统。"
published = "1999-06-26T04:00:00.000"
remediation = "立即升级 VMware 至最新版本（VMware Workstation Pro 17.x 或 VMware Player 17.x），旧版本 VMware 1.0.1 已停止支持且存在缓冲区溢出漏洞。若暂时无法升级，应限制 HOME 环境变量长度不超过 4096 字节，并通过文件系统权限（chmod 700）限制 VMware 二进制文件仅允许授权用户执行。"
score = 7.2
severity = "HIGH"
sources = ["epss"]
title = "VMware 1.0.1 Linux 缓冲区溢出漏洞"
updated = "2026-06-16T21:48:56.623"

