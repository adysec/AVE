[basic]
description = "Trend Micro InterScan VirusWall 的 SMTP 邮件扫描组件存在安全绕过漏洞。该组件在处理带有畸形附件（malformed attachments）的电子邮件时，未能正确解析并扫描邮件内容，导致恶意附件可绕过病毒检测引擎直接投递至收件人。影响范围为部署了 InterScan VirusWall SMTP 扫描功能的产品版本。攻击条件为：远程攻击者只需向受保护邮件域发送一封包含特制畸形附件的 SMTP 邮件，无需身份认证或本地访问权限。利用方式上，攻击者可构造附件边界、编码或结构异常的邮件，使扫描器解析失败或跳过检测，从而将包含病毒、木马或其他恶意载荷的邮件成功绕过防护网关。"
published = "1999-12-27T05:00:00.000"
remediation = "立即升级 Trend Micro InterScan VirusWall 至最新补丁版本，或安装 Trend Micro 官方发布的 MIME 解析修复补丁。升级后配置 SMTP 扫描器启用严格 MIME 头部验证模式，对包含畸形 Content-Type、边界字符串不匹配或编码异常的邮件附件进行拦截并拒绝投递。临时缓解措施：在邮件网关层面增加对畸形 MIME 结构邮件的深度包检测规则，禁止接收 Content-Transfer-Encoding 与实际情况不符的附件，同时启用邮件内容过滤策略对压缩包及可执行文件附件强制解压扫描。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "趋势科技 InterScan VirusWall SMTP 邮件扫描绕过漏洞"
updated = "2026-06-16T21:50:51.807"

