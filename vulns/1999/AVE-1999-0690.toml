[basic]
description = "Linux Kernel 2.0 版本 TCP 端口存在拒绝服务漏洞。本地攻击者可通过向系统非特权端口发送特定序列的 TCP 连接请求，导致目标系统上所有非特权端口无法被任何服务监听，造成拒绝服务。该漏洞影响 Linux Kernel 2.0.36 及之前版本，攻击者需具备本地用户权限，CVSS 评分 2.1，危害等级低。"
published = "1999-01-19T05:00:00.000"
remediation = "升级 Linux 内核至 2.2.x 或更高版本，该漏洞已在 2.2 系列内核中修复。如无法升级内核，可通过 iptables 限制非特权端口的入站连接请求速率作为临时缓解措施。"
score = 2.1
severity = "LOW"
sources = ["exploitdb"]
title = "Linux Kernel 2.0 TCP 端口拒绝服务漏洞"
updated = "2026-06-16T21:48:25.460"

