[basic]
description = "WordPress mypixs 插件 v0.3 存在本地文件包含漏洞，未经身份认证的远程攻击者可通过构造特制的 HTTP 请求，利用插件对文件路径过滤不严的缺陷，读取服务器上的任意文件（如 /etc/passwd、wp-config.php 等敏感文件），导致敏感信息泄露。该漏洞攻击复杂度低，无需用户交互，CVSS 评分 7.5，危害等级高。建议升级插件或禁用该插件以修复漏洞。"
published = "2016-10-06T14:59:13.537"
remediation = "立即卸载并删除 mypixs 插件（该插件已于 2007 年关闭下架，不再维护且无安全更新）。如暂时无法删除，可在 .htaccess 中添加 RewriteRule ^wp-content/plugins/mypixs/ - [F,L] 阻止对插件目录的全部访问，或将 wp-content/plugins/mypixs/ 目录重命名以禁用插件功能。"
score = 7.5
severity = "HIGH"
sources = ["nuclei"]
title = "WordPress mypixs插件本地文件包含漏洞"
updated = "2026-06-17T00:21:16.303"

