[basic]
description = "金蝶云星空企业资源管理系统的 InOutDataService 接口中的 GetmportOutData.common.kdsvc 存在远程代码执行漏洞。未经身份认证的远程攻击者可向目标系统发送特制的 HTTP 请求，利用该接口的反序列化缺陷在服务器端执行任意代码，从而完全控制目标系统。该漏洞影响金蝶云星空多个版本，危害严重。"
published = "0718"
remediation = "立即升级金蝶云星空至官方发布的最新安全补丁版本（V8.x 及以上），或联系金蝶获取该漏洞针对性热修复包。临时措施：在应用服务器前端 WAF/IPS 添加规则，拦截对 /InOutDataService/GetmportOutData.common.kdsvc 路径的异常 POST 请求；同时通过防火墙限制该服务仅允许受信 IP 访问。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "金蝶云星空 InOutDataService.GetmportOutData 远程代码执行漏洞"
