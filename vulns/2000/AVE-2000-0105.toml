[basic]
description = "Allaire Spectra 1.0 的 Remote Access Service 组件中 invoke.cfm 模板存在安全绕过漏洞。远程攻击者可通过向该模板发送包含 bAuthenticated 参数的 HTTP 请求绕过身份认证机制，从而未授权访问受限资源。该漏洞影响 Spectra 1.0 版本，CVSS 评分 7.5，危害等级高危。厂商已发布相关安全公告，建议用户升级至最新版本或采取相应访问控制措施。"
published = "2000-01-01T05:00:00.000"
remediation = "升级至 Allaire Spectra 更高版本（如有），或迁移至受支持的替代产品。临时缓解措施：在 Web 服务器层对 /spectra/RemoteAccessService/invoke.cfm 路径添加访问控制，仅允许授权 IP 访问；同时修改应用代码，强制校验 bAuthenticated 参数来源，拒绝接受客户端提交的该参数作为认证凭据。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "Allaire Spectra 1.0 远程访问服务认证绕过漏洞"
updated = "2026-06-16T21:51:02.523"

