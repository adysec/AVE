[basic]
description = "Windows NT 4.0 的简单网络管理协议（SNMP）代理程序 snmp.exe 存在内存泄漏漏洞。远程攻击者无需身份认证，只需向目标系统发送大量包含无法正常解码的对象标识符（OID）的 SNMP 数据包，即可导致代理进程内存不断消耗直至耗尽，最终引发拒绝服务。该漏洞影响未安装 Service Pack 4 以上更新的 Windows NT 4.0 系统，攻击门槛低，仅需构造特定 SNMP 请求即可触发。"
published = "1997-12-23T05:00:00.000"
remediation = "安装 Windows NT 4.0 Service Pack 4 或更高版本，该服务包已修复 snmp.exe 在处理无法解码的 OID 时的内存泄漏问题。如无法升级，可在防火墙层面限制对 SNMP 端口（UDP 161）的访问，仅允许受信源 IP 连接；若业务不需要 SNMP 服务，可直接禁用该服务以消除风险。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Microsoft Windows NT 4.0 SNMP Agent 内存泄漏拒绝服务漏洞"
updated = "2026-06-16T21:50:46.050"

