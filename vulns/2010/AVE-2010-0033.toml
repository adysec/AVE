[basic]
description = "Joomla! 的 JProject Manager 组件（com_jprojectmanager）1.0 版本存在目录遍历漏洞。远程攻击者可通过向 index.php 的 controller 参数传递包含 `../` 序列的特制请求，绕过路径限制读取服务器上的任意文件，可能导致敏感信息泄露。该漏洞源于组件对用户输入路径过滤不严，无需身份认证即可利用，影响所有使用该组件的 Joomla! 站点。"
published = "2010-04-19T19:30:00.710"
remediation = '该组件已停止维护且无官方补丁，建议立即在 Joomla 后台卸载并移除 com_jprojectmanager 组件，或删除服务器上对应目录。如业务必须使用，可在 .htaccess 中添加规则过滤 controller 参数中的 "../" 路径遍历字符，或修改组件源码对 controller 参数做 basename 校验。'
score = 6.8
severity = "MEDIUM"
sources = ["nuclei"]
title = "Joomla! JProject Manager 本地文件包含漏洞"
updated = "2026-06-16T23:18:27.293"

