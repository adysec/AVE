[basic]
description = "AMD 部分处理器存在瞬态执行漏洞，该漏洞源于存储队列（Store Queue）中的瞬态调度程序攻击。本地攻击者可通过利用处理器的瞬态执行机制，推断先前存储操作中的数据，从而导致敏感特权信息泄露。该漏洞影响多款 AMD 处理器产品，需本地访问权限方可利用，CVSS 评分 5.6，危害等级中危。建议用户及时更新 AMD 提供的微码补丁以缓解风险。"
published = "2025-07-08T17:15:31.563"
remediation = "立即联系设备 OEM 厂商获取并安装针对受影响 AMD 处理器（Zen 3/4 架构）的最新 BIOS/固件更新，例如 MilanPI 1.0.0.G、GenoaPI 1.0.0.E、ComboAM5PI 1.2.0.3 等对应版本，同时安装操作系统厂商提供的安全更新以启用 VERW 指令缓存清除机制。使用 Xen 虚拟化平台的用户须同步应用 XSA-471 补丁集，在虚拟机上下文切换时执行缓存 scrubbing 操作。如无法立即更新，可考虑限制本地非特权用户的交互式访问作为临时缓解。"
score = 5.6
severity = "MEDIUM"
sources = ["msrc"]
title = "AMD 处理器存储队列瞬态调度攻击信息泄露漏洞"
updated = "2026-06-17T07:36:33.310"

