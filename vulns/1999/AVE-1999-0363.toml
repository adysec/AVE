[basic]
description = "Samba 1.9.19 存在远程缓冲区溢出漏洞，未经身份认证的攻击者可通过向 Samba 服务器发送精心构造的超长密码数据包，触发服务端缓冲区溢出，导致远程代码执行或以 Smb 服务权限执行任意指令。该漏洞影响 Samba 1.9.19 及更早版本，攻击者无需任何凭证即可利用，危害严重。"
published = "1997-09-30"
remediation = "升级 Samba 至 2.0.0 或更高版本，该漏洞已在 Samba 2.0.x 系列中得到修复。对于无法升级的旧系统，可通过在 smb.conf 中限制匿名连接并启用主机白名单（hosts allow）来降低暴露面，同时在防火墙层面限制 137-139 和 445 端口的入站访问。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = """Let me analyze the vulnerability CVE-1999-0182. The known information tells me: - 漏洞编号: CVE-1999-0182 - 原标题: Samba 1.9.19 - 长密码缓冲区溢出 - exploitdb: Samba 1.9.19 - 'Password' Remote Buffer Overflow So this is a Samba vulnerability, specifically a buffer overflow in the password handling of Samba 1.9.19. The format should be: 厂商 产品 漏洞类型 - 厂商: Samba 团队/Samba (Samba is the vendor/product name) - 产品: Samba - 漏洞类型: 长密码缓冲区溢出 → 远程缓冲区溢出漏洞 So the title should be: "Samba 长密码远程缓冲区溢出漏洞" Wait, let me reconsider. The format is "厂商 产品 漏洞类型". Looking at the example: "Microsoft Windows TCP/IP 远程代码执行漏洞" So it's "Vendor Product Vulnerability Type" For Samba: - The product is "Samba" - The vendor could be "Samba" team, but typically we just say "Samba 1.9.19" or "Samba" - Vulnerability type: "远程缓冲区溢出漏洞" (remote buffer overflow) Let me think about this more carefully. The example shows "Microsoft Windows TCP/IP 远程代码执行漏洞" - the vendor Microsoft, the product Windows TCP/IP, the vuln type is remote code execution. For CVE-1999-0182: - Vendor: Samba (or the Samba Team, but typically just "Samba") - Product: Samba 1.9.19 - Vulnerability type: 远程缓冲区溢出漏洞 (remote buffer overflow, specifically in password handling) So: "Samba Samba 1.9.19 远程缓冲区溢出漏洞" - but having "Samba" twice seems redundant. Actually looking at the example more carefully: "Microsoft Windows TCP/IP" - "Microsoft" is vendor, "Windows TCP/IP" is product. So it's not "Microsoft Windows Windows TCP/IP". For Samba, the product name could be "Samba" itself. So: "Samba Samba 远程缓冲区溢出漏洞" is awkward. Let me look at how similar vulnerabilities are titled. The exploitdb says "Samba 1.9.19 - 'Password' Remote Buffer Overflow". I think a good title would be: "Samba 1.9.19 长密码远程缓冲区溢出漏洞" This follows the pattern: vendor could be implicit when the product name is Samba itself. Or we could say "S"""
updated = "1997-09-30"

