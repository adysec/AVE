[basic]
description = "AWStats 6.95 之前版本中的 awredir.pl 脚本存在开放重定向漏洞（CWE-20：输入验证不当）。远程攻击者可通过特制请求，利用该漏洞将用户重定向至任意恶意网站，进而实施钓鱼攻击窃取敏感信息。攻击者无需身份认证即可发起攻击，但需诱使用户点击恶意链接，CVSS 评分 5.8，危害等级中。"
published = "2010-12-02"
remediation = "升级 AWStats 至 6.95 或更高版本以修复 awredir.pl 中的开放重定向漏洞。如无法升级，在 Web 服务器层面对 awredir.pl 脚本的访问添加 URL 白名单校验规则，限制重定向目标仅为受信任域名。同时检查 Web 日志中是否存在利用该漏洞的异常重定向请求。"
score = 5.8
severity = "MEDIUM"
sources = [
    "cve",
    "nuclei",
]
title = "AWStats awredir.pl 开放重定向漏洞"
updated = "2026-06-16"

