[basic]
description = 'SCO OpenServer 系统的 SNMPD 服务存在默认 SNMP 团体字符串可写漏洞。由于安装时未修改默认 SNMP 读写团体字符串（如 "public"、"private"），本地攻击者可通过 SNMP 协议直接修改目标主机的系统配置参数，包括网络设置、服务状态等。该漏洞影响 SCO OpenServer 系列操作系统，CVSS 评分 2.1，危害等级低，但可被用于进一步扩大攻击面。建议管理员修改默认 SNMP 团体字符串或禁用 SNMP 服务。'
published = "2000-02-08T05:00:00.000"
remediation = '修改 /etc/snmpd.conf 配置文件，将默认读写 community 字符串（如 "private"）改为复杂随机字符串，并设置 read-only community 仅用于监控。在 /etc/hosts.allow 和防火墙层面限制 SNMP（UDP 161/162）只允许受信管理 IP 访问。如业务不需要 SNMP 服务，建议直接禁用 snmpd 守护进程。'
score = 2.1
severity = "LOW"
sources = ["cve"]
title = "SCO OpenServer SNMPD 默认共享漏洞"
updated = "2026-06-16T21:51:05.877"

