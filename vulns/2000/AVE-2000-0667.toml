[basic]
description = "LPRng 3.6.24 及更早版本中的 use_syslog() 函数存在格式化字符串漏洞，远程攻击者可通过向打印服务发送特制的格式化字符串参数触发该漏洞，导致任意代码执行。该漏洞影响 LPRng 3.6.24 及之前版本，CVSS 评分 10.0，危害等级严重。攻击者无需身份认证即可远程利用，且已有公开的 Exploit-DB 利用代码，实际威胁极高。"
published = "2000-12-19T05:00:00.000"
remediation = "升级 LPRng 至 3.7.0 或更高版本，该版本修复了 use_syslog() 函数中的格式化字符串漏洞。Red Hat 用户应安装 RHSA-2000-065 提供的更新包，Caldera 用户安装 CSSA-2000-033.0 补丁，FreeBSD 用户应用 SA-00:56 安全公告中的补丁。如无法立即升级，可在 lpd.conf 中禁用日志记录功能作为临时缓解措施。"
score = 10
severity = "CRITICAL"
sources = ["redhat"]
title = "LPRng 3.6.24 use_syslog 函数格式字符串远程代码执行漏洞"
updated = "2026-06-16T21:52:45.720"

