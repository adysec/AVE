[basic]
description = 'Microsoft Internet Explorer 4.01 和 5.0 中多个 ActiveX 控件（包括 Image Edit、Image Annotation、Registration Wizard、Setupctl 等）被标记为"对脚本安全"，远程攻击者可通过构造恶意网页诱导用户访问，利用这些控件中的缓冲区溢出漏洞执行任意命令或创建修改文件。该漏洞影响 Windows 95/NT 4.0 等旧版系统上的 IE 浏览器，攻击无需任何身份认证，危害较大。'
published = "1999-09-10T04:00:00.000"
remediation = '立即安装 Microsoft 安全公告 MS99-037 提供的补丁，升级至 Internet Explorer 5.01 或更高版本。如无法升级，可在 IE 安全设置中将"ActiveX 控件和插件"相关选项全部禁用，并将 Internet 区域安全级别设为"高"。对于仍在运行 Windows 95/NT 4.0 的系统，建议升级至受支持的 Windows 版本并使用现代浏览器以减少攻击面。'
score = 5.1
severity = "MEDIUM"
sources = ["avd"]
title = "Microsoft Internet Explorer CodeBase/ActiveX Setupctl 远程命令执行漏洞"
updated = "2026-06-16T21:50:45.250"

