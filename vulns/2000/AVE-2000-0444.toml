[basic]
description = "Linux 系统 mailx 邮件命令（即 Mail）存在本地缓冲区溢出漏洞，由于程序未对 `-c`（抄送）参数长度进行充分校验，攻击者可通过向该参数传递超长字符串触发缓冲区溢出，覆盖内存中的返回地址，从而实现本地权限提升。该漏洞影响 BSD 及 Slackware 等 Linux 发行版中 mailx 8.1.1-10 版本，攻击者需拥有本地操作系统账号权限方可利用。"
published = "2000-08-08T04:00:00.000"
remediation = "升级 mailx 至 8.1.2 及以上版本，或替换为 Heirloom mailx / s-nail 等持续维护的邮件客户端。如无法升级，限制本地用户对 mailx 的 setuid 权限：`chmod 0755 /usr/bin/mailx` 移除 suid 位，防止本地提权利用。"
score = 4.6
severity = "MEDIUM"
sources = ["exploitdb"]
title = "mailx 本地缓冲区溢出漏洞"
updated = "2026-06-16T21:51:58.010"

