[basic]
description = "Palm Pilot HotSync Manager 3.0.4 在 Windows 98 系统中存在缓冲区溢出漏洞，当该管理器处于网络模式时，远程攻击者可通过向 14238 端口发送超长字符串触发该漏洞，导致目标系统拒绝服务，甚至可能执行任意命令。该漏洞影响 Palm Pilot HotSync Manager 3.0.4 版本，CVSS 评分 7.5，危害等级高。"
published = "1999-11-04T05:00:00.000"
remediation = "升级 HotSync Manager 至 3.0.4 之后的修复版本（3Com 已确认在下一版本中修复），或升级操作系统至 Windows 2000（经测试不受影响）。如无法升级，可将 HotSync Manager 切换为本地（串口/USB）模式而非网络模式，或在防火墙层面阻止外部对 TCP 端口 14238 的访问以缓解远程攻击风险。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "Palm Pilot HotSync Manager 远程拒绝服务漏洞"
updated = "2026-06-16T21:49:38.017"

