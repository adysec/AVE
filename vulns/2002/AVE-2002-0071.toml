[basic]
description = "Cyrus SASL 库 2.1.9 及更早版本中存在多个缓冲区溢出漏洞，攻击者可通过向目标系统发送过长的用户名、特殊 LDAP 认证字符或触发日志记录器中的一次未分配空终止符等途径远程利用此漏洞，导致系统拒绝服务并执行任意代码。该漏洞影响使用该 SASL 库的各种应用系统，攻击无需任何权限或用户交互即可实现，利用面极广，严重威胁系统安全稳定性和完整性，系统可被完全破坏。"
published = "2002-12-18T05:00:00.000"
remediation = "建议立即升级 Cyrus SASL 库至 2.1.10 或更高版本（如 2.1.28），可通过包管理器执行 `yum update cyrus-sasl` 或 `apt-get install cyrus-sasl2`。若无法立即升级，可临时禁用受影响的 SASL 认证机制（如 DIGEST-MD5、CRAM-MD5），或在网络层限制对 SASL 认证端口（如 25、143、993 端口）的访问来源。"
score = 9.8
severity = "CRITICAL"
sources = ["osv"]
title = "Cyrus SASL 库缓冲区溢出远程代码执行漏洞"
updated = "2026-06-16T21:59:08.827"

