[basic]
description = "BroadGun Software CamShot WebCam 2.5 的 HTTP 服务器组件存在缓冲区溢出漏洞，远程攻击者可通过向目标设备发送超长 GET 请求触发缓冲区溢出，进而执行任意命令。该漏洞影响 CamShot WebCam 2.5 版本，攻击者无需身份认证即可利用，CVSS 评分 7.5，危害等级高。厂商至今未发布官方补丁，建议用户停止使用该产品。"
published = "1999-12-30T05:00:00.000"
remediation = "由于 BroadGun Software 已停止维护 CamShot WebCam，建议立即停用该版本或隔离至独立网段；在防火墙上限制仅可信 IP 访问 80/8080 端口，并禁用不必要的 HTTP 服务；如果仍需使用摄像头功能，应迁移至受支持的现代替代方案。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "BroadGun Software CamShot WebCam HTTP 服务程序缓冲区溢出漏洞"
updated = "2026-06-16T21:50:53.007"

