[basic]
description = "Lotus Domino HTTP 服务器存在缓冲区溢出漏洞，远程攻击者可通过向目标服务器发送超长 URL 触发该漏洞，导致服务进程崩溃，造成拒绝服务。该漏洞影响 Lotus Domino HTTP 服务器组件，攻击者无需身份认证即可远程利用，CVSS 评分 5.0，危害等级中危。建议用户及时升级至修复版本以消除风险。"
published = "1999-12-21T05:00:00.000"
remediation = '升级 Lotus Domino HTTP 服务器至 5.0.1 或更高版本，该版本修复了长 URL 导致的缓冲区溢出问题。如无法升级，可在 Domino 服务器配置文档中设置 "HTTP 最大 URL 长度" 参数为 1024 字节以下，限制 URL 长度以缓解攻击。'
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Lotus Domino HTTP 服务器缓冲区溢出拒绝服务漏洞"
updated = "2026-06-16T21:50:50.597"

