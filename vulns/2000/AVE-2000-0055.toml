[basic]
description = "SCO Unixware 7.1 的 i2odialogd 守护进程存在远程缓冲区溢出漏洞，未经认证的攻击者可通过向该服务发送超长的用户名/密码认证字符串触发缓冲区溢出，从而在目标系统上以 root 权限执行任意代码。该漏洞危害严重，攻击者无需任何身份验证即可远程利用，影响所有运行 SCO Unixware 7.1 版本的服务器系统。"
published = "1999-12-21T05:00:00.000"
remediation = "建议立即升级至受支持的操作系统（如 Linux 或现代 Unix 变体），SCO UnixWare 7.1 已停止维护且无官方补丁。若无法升级，可停止 i2odialogd 服务（`/etc/init.d/i2odialog stop`）并从 inetd 配置中移除该服务条目，同时在防火墙层面限制对 5678 端口的访问。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "SCO Unixware 7.1 i2odialogd 远程缓冲区溢出漏洞"
updated = "2026-06-16T21:50:50.967"

