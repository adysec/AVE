[basic]
description = "SCO UnixWare 7.1 的 pkgtrans 工具存在符号链接攻击漏洞。本地攻击者可通过在临时目录中创建恶意符号链接，诱使 pkgtrans 在处理软件包时以提升的权限读取系统上的任意文件。该漏洞影响 UnixWare 7.1 版本，攻击者无需任何认证即可利用，CVSS v2.0 评分为 7.2，危害等级高。成功利用可导致敏感信息泄露，为后续攻击提供基础。"
published = "1999-12-04T05:00:00.000"
remediation = "限制 pkgtrans 命令仅授权管理员使用，移除其他用户的执行权限；对 /tmp 等共享目录设置粘滞位（sticky bit），防止符号链接劫持；监控可疑的符号链接创建行为；建议迁移至受支持的操作系统版本，因 SCO UnixWare 7.1 已停止安全更新。"
score = 7.2
severity = "HIGH"
sources = ["exploitdb"]
title = "SCO Unixware 7.1 pkginstall 本地缓冲区溢出漏洞"
updated = "2026-06-16T21:49:28.217"

