[basic]
description = "畅捷通T+ 存在 AjaxPro 反序列化命令执行漏洞，攻击者可通过向 /tplus/ajaxpro/Ufida.T.AA.FI.UIP.AccountAssociationEditListController.Ufida.T.AA.FI.UIP.ashx 接口发送特制请求触发反序列化操作，无需身份认证即可在目标服务器上执行任意系统命令。该漏洞影响畅捷通T+ 全版本，危害严重。攻击者可利用此漏洞获取服务器控制权，进行数据窃取、植入后门等操作。"
published = "0730"
remediation = "立即登录畅捷通官方服务社区下载安装最新安全补丁，将畅捷通T+升级至最新版本（建议≥V17.0，并安装对应版本的最新累积安全更新）。同时，在IIS管理器中配置URL授权规则，限制对/tplus/ajaxpro/目录的匿名访问，仅允许已认证的管理员IP访问。如暂时无法升级，可在Web应用防火墙(WAF)中添加规则，拦截对*.ashx?*的异常请求参数，作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "畅捷通 T+ AjaxPro 命令执行漏洞"
updated = "0730"

