[basic]
description = "IBM AIX 4.3.x 及更早版本中的 enq 命令存在本地缓冲区溢出漏洞。当 enq 命令处理过长的 -M 参数时，由于未对输入长度进行充分校验，导致栈缓冲区溢出，本地攻击者可利用该漏洞以 root 权限执行任意命令。攻击者需拥有本地系统访问权限，通过精心构造的 -M 参数触发溢出，从而完全控制目标系统。该漏洞 CVSS 评分 7.2，危害等级高。"
published = "2001-01-09T05:00:00.000"
remediation = "立即安装 IBM AIX APAR IY08143 或 IY08287 补丁包，可通过 IBM Fix Central 搜索对应 APAR 编号下载安装。对于仍在使用 AIX 4.3.x 的系统，建议升级至 IBM AIX 7.2 或 7.3 等受支持版本。临时缓解措施可移除 enq 命令的 setuid 权限（chmod u-s /usr/bin/enq），限制本地普通用户对该命令的执行权限。"
score = 7.2
severity = "HIGH"
sources = ["exploitdb"]
title = "IBM AIX enq 本地缓冲区溢出漏洞"
updated = "2026-06-16T21:53:11.570"

