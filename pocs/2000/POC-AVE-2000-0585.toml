[info]
author = "ave"
description = "通过发送超长 HTTP GET 请求触发 MediaHouse Statistics Server 5.02x 缓冲区溢出，验证目标是否存在该漏洞。安全检测方式为先获取服务器版本信息，若版本 ≤ 5.02 则判定存在漏洞。"
id = "POC-AVE-2000-0585"
name = "MediaHouse Statistics Server LiveStats 5.2 缓冲区溢出漏洞 PoC"
severity = "high"
tags = ["ave-2000-0585"]
vuln_id = [
    "CVE-2000-0776",
    "AVE-2000-0585",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["Statistics Server"]
