[basic]
description = "Symfony 框架 HttpKernel 组件中的 FragmentListener 在启用 ESI 或 SSI 支持时，未正确校验 _controller 属性是否已设置，导致远程攻击者可通过向 /_fragment 端点发送不含哈希值或包含无效哈希值的特制请求，绕过 URL 签名验证和安全规则限制，实现未授权访问内部路由。该漏洞影响 Symfony 2.3.19 至 2.3.28、2.4.9 至 2.4.10、2.5.4 至 2.5.11 及 2.6.0 至 2.6.7 版本，攻击者无需身份认证即可利用，CVSS 评分 4.3，危害等级中危。"
published = "2015-06-02T14:59:12.253"
remediation = "升级 Symfony 至 2.3.29、2.4.11、2.5.12 或 2.6.8 及以上版本，这些版本已修复 FragmentListener 未校验 _controller 属性的问题。如无法立即升级，可禁用 ESI/SSI 支持（设置 `fragments.path` 为不可访问路径），或在 Web 服务器层面对 `/_fragment` 路径添加 IP 白名单或认证访问控制。"
score = 4.3
severity = "MEDIUM"
sources = ["nuclei"]
title = "Symfony HttpKernel ESI未授权访问漏洞"
updated = "2026-06-17T00:26:41.657"

