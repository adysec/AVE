[basic]
description = '''libpng 的 png_check_keyword 函数（位于 pngwutil.c 中）在处理 PNG 图像的关键字（keyword）时，存在一种隐式类型转换漏洞。由于代码将字符常量 '\0' 错误地隐式转换为 NULL 指针，攻击者可通过构造包含特制关键字的恶意 PNG 文件，使该函数将任意内存位置的值设为 0，从而破坏内存数据的完整性。该漏洞影响 1.0.42 版本之前的 libpng 以及 1.2.x 系列 1.2.34 版本之前的 libpng 均受影响。攻击条件为攻击者能够诱使目标应用程序或服务使用受影响版本的 libpng 解析恶意 PNG 图像文件。攻击方式为攻击者构造一个包含特定 crafted 关键字的 PNG 图像，当目标系统使用漏洞版本的 libpng 加载该图像时，即可触发内存篡改，导致数据损坏或潜在的其他安全风险。'''
published = "2009-01-15T17:30:00.453"
remediation = "建议立即升级 libpng 至 1.0.42 或 1.2.34 及以上版本。Ubuntu 用户可执行 `apt-get update && apt-get install libpng12-0=1.2.27-2ubuntu2.1`（或更高版本）；Debian 用户升级至 libpng12-0 1.2.27-2etch1 或更高；RHEL/CentOS 用户通过 `yum update libpng` 升级至 1.2.10-7.1.el5_3 或更高；Gentoo 用户执行 `emerge -u '>=media-libs/libpng-1.2.34'`。若暂无法升级，建议在应用层禁止处理不可信 PNG 文件，并在防火墙/应用层限制 PNG 文件上传与解析，作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["tenable"]
title = "libpng 未初始化内存访问漏洞（png_check_keyword 函数处理关键词时可篡改任意内存）"
updated = "2026-06-16T23:01:12.240"

