[basic]
description = "Sun OpenWindows 中的 sdtcm_convert 日历转换工具存在缓冲区溢出漏洞。本地攻击者可向该程序发送特制的参数输入，触发栈缓冲区溢出，从而覆盖返回地址或函数指针，成功利用后可获取 root 权限。该漏洞影响 Sun Solaris 7.0 及更早版本，需本地系统访问权限，CVSS 评分 7.2，危害等级高。厂商尚未发布官方补丁。"
published = "1997-02-01T05:00:00.000"
remediation = "立即安装 Sun Security Bulletin #183 提供的补丁程序。对于仍运行的旧版 Solaris 系统，建议升级到受支持的 Solaris 版本或迁移至其他现代操作系统。如无法立即修补，可执行 chmod -s /usr/dt/bin/sdtcm_convert 移除该二进制文件的 setuid 权限，或限制仅授权用户可执行该程序作为临时缓解措施。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "Sun Solaris OpenWindows sdtcm_convert 本地缓冲区溢出漏洞"
updated = "2026-06-16T21:48:14.910"

