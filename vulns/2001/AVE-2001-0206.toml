[basic]
description = "GNU Privacy Guard (GnuPG) 1.0.5 及更早版本存在格式化字符串漏洞。当用户解密一个经过恶意构造的加密文件时，攻击者可在加密文件中存储包含格式化字符串占位符（如 %x、%n 等）的原始文件名，GnuPG 在处理该文件名时未进行正确的格式化参数校验，导致格式化字符串被解析执行。远程攻击者可通过诱导用户解密特制加密文件触发此漏洞，实现任意代码执行或权限提升，危害严重。受影响的版本包括 GnuPG 1.0.x 系列所有版本。"
published = "2001-08-14T04:00:00.000"
remediation = "立即升级 GnuPG 至 1.0.6 或更高版本（官方于 2001-05-29 发布修复版本）。各 Linux 发行版用户：Debian 运行 `apt-get update && apt-get upgrade gnupg`，Red Hat 运行 `up2date gnupg`，Mandrake 运行 `urpmi gnupg`。如无法升级，避免解密来自不可信来源的加密文件，并限制 gpg 以非 root 用户运行以降低提权影响。"
score = 7.5
severity = "HIGH"
sources = ["exploitdb"]
title = "GNU GnuPG 格式字符串漏洞"
updated = "2026-06-16T21:54:27.560"

