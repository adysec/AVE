[basic]
description = "佰鼎OA（重庆佰鼎科技有限公司开发的智能办公系统）存在未公开的安全漏洞，攻击者可利用该漏洞对目标系统实施攻击。该漏洞影响佰鼎OA V9及之前版本，攻击者无需高级权限即可触发，可能导致敏感信息泄露、系统被非法控制等严重后果。厂商已发布安全更新，建议用户及时升级至最新版本以修复该漏洞。"
published = "08.09"
remediation = "联系重庆佰鼎科技获取最新安全补丁，将佰鼎OA升级至V9及以上版本。如无法立即升级，在Web应用防火墙中限制对OA系统的访问来源IP，关闭非必要端口和接口，并启用登录验证码与失败锁定机制作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "佰鼎 佰鼎OA 系统未知安全漏洞"
