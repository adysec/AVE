[basic]
description = "MDBms 0.9 数据库服务在处理用户输入时存在缓冲区溢出漏洞，远程攻击者无需身份认证即可向目标系统的 TCP 2223/2224 端口发送超长字符串，触发缓冲区溢出，进而导致任意命令执行。该漏洞 CVSS 评分 7.5，危害等级高，且已有公开的 Exploit-DB 利用代码，攻击门槛低。"
published = "2000-05-24T04:00:00.000"
remediation = "立即停止使用 MDBMS 数据库服务，该软件已停止维护且所有版本（含最新版 .99b6）均存在此漏洞。具体操作：1) 在防火墙层面添加规则 `iptables -A INPUT -p tcp --dport 2223 -j DROP` 和 `iptables -A INPUT -p tcp --dport 2224 -j DROP` 阻断远程访问；2) 若业务必须使用，配置 hosts.allow/hosts.deny 仅允许特定内网 IP 连接；3) 修改 MDBMS 配置文件，将服务绑定到 127.0.0.1 禁止外网监听；4) 使用 Snort 规则 `alert tcp $EXTERNAL_NET any -> $HOME_NET 2223:2224` 检测攻击流量；5) 迁移至 PostgreSQL 或 MariaDB 等受支持数据库产品。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "Marty Bochane MDBms 数据库服务缓冲区溢出漏洞"
updated = "2026-06-16T21:51:45.073"

