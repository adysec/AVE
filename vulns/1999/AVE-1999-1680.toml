[basic]
description = "Windows NT 4.0 本地安全权威子系统（LSA）存在输入验证不当漏洞，未经身份认证的远程攻击者可通过向 LsaLookupSids 函数发送构造畸形的安全标识符（SID）请求参数，触发拒绝服务。该函数用于将 SID 解析为对应的账户名称，当接收异常格式的 SID 数据时，LSA 服务可能出现崩溃或无限循环，导致系统无法处理登录和访问控制请求。此漏洞影响 Windows NT 4.0 系统，攻击者无需事先获得任何凭据即可远程利用，成功利用后将导致目标系统服务中断或系统不稳定。该漏洞属于 Improper Input Validation（CWE-20）类型，CVSS 评分为 7.8，危害等级为高。"
published = "1999-12-16T05:00:00.000"
remediation = "安装 Microsoft 1999 年 12 月安全更新 MS99-057（KB248185），该补丁已包含于 MS99-056（Syskey Keystream Reuse 补丁包）中，亦可直接通过 Microsoft Download Center 获取独立补丁。受影响版本为 Windows NT Workstation 4.0、Windows NT Server 4.0、Enterprise Edition 及 Terminal Server Edition。如短期内无法立即安装补丁，可在防火墙层面禁用或过滤 NetBIOS 端口（137/139/445），阻断远程攻击者对 LSA 的恶意访问作为临时缓解措施，随后尽快安排补丁部署。"
score = 7.8
severity = "HIGH"
sources = ["avd"]
