[basic]
description = "Eric Allman Sendmail 8.10.0 之前版本中存在拒绝服务漏洞。远程攻击者可通过向目标 SMTP 服务器发送一系列 ETRN 命令后立即断开连接，而 Sendmail 在连接已终止后仍持续处理这些命令，导致服务器资源被大量消耗，最终造成拒绝服务。该漏洞无需身份认证即可远程触发，影响 Sendmail 8.10.0 之前的所有版本。"
published = "1999-12-22T05:00:00.000"
remediation = "升级 Sendmail 至 8.10.0 或更高版本，该版本已修复 ETRN 命令处理逻辑，在客户端断开连接后不再继续处理后续命令。如无法立即升级，可在 sendmail.cf 中禁用 ETRN 命令（注释掉 `O DaemonPortOptions` 中的 ETRN 相关配置），或在防火墙层面限制对 SMTP 端口（25/TCP）的未授权访问作为临时缓解。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Eric Allman Sendmail 8.10.0 ETRN 命令处理 拒绝服务漏洞"
updated = "2026-06-16T21:49:44.347"

