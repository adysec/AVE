[basic]
description = "Windows NT 操作系统默认启用 guest（来宾）账户，该账户无需密码即可通过网络登录系统。攻击者可利用该漏洞以 guest 身份远程登录目标系统，访问共享文件、打印机等网络资源，获取系统信息或进行进一步探测。此漏洞影响 Windows NT 4.0 及更早版本，CVSS 评分 4.6，危害等级中危。尽管 guest 账户权限受限，但不当配置可能导致信息泄露或作为攻击跳板。"
published = "1998-10-01T04:00:00.000"
remediation = "立即禁用 Windows NT/2000 系统中的 Guest 账户：通过「计算机管理」→「本地用户和组」→「用户」，右键单击 Guest 账户选择「属性」，勾选「账户已禁用」。若系统未安装安全策略管理工具，可使用命令行执行 `net user Guest /active:no` 禁用该账户。同时建议在本地安全策略中配置「账户：来宾账户状态」为「已禁用」，并确保来宾账户不属于任何具有敏感权限的用户组。"
score = 4.6
severity = "MEDIUM"
sources = ["epss"]
title = "Microsoft Windows NT 默认启用访客账户权限提升漏洞"
updated = "2026-06-16T21:48:36.500"

