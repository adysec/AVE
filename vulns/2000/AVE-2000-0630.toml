[basic]
description = "Kerberos 4 的 KDC（密钥分发中心）程序中存在缓冲区溢出漏洞，远程攻击者可通过向 process_v4 函数传递特制的 localrealm 变量触发该溢出，导致目标系统拒绝服务。该漏洞影响运行 Kerberos 4 服务的各类系统，攻击者无需身份认证即可远程利用，CVSS 评分 5.0，危害等级中危。"
published = "2000-06-09T04:00:00.000"
remediation = "Kerberos 4 已停止维护，建议立即升级到 Kerberos 5 (krb5-1.2.x 及以上版本)；若无法升级，在 KDC 配置中禁用 Kerberos 4 兼容模式（取消 v4_mode 或设置 master_kdc 仅监听 v5 端口），并在防火墙层面限制对 KDC 端口 88/750 的访问来源。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "MIT Kerberos 4 KDC 缓冲区溢出拒绝服务漏洞"
updated = "2026-06-16T21:51:58.287"

