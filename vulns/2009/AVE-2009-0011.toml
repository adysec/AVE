[basic]
description = "Joomla! 的 Agora 组件 3.0.0b 版存在目录遍历漏洞，远程攻击者无需身份认证即可通过 index.php 访问 avatars 页面，在 action 参数中注入目录遍历序列（如 ../），从而包含并执行服务器上的任意本地文件，可能导致敏感信息泄露或远程代码执行。CVSS 评分 6.8，危害等级中等，影响使用该组件的 Joomla! 网站。"
published = "2009-09-03T17:30:10.187"
remediation = "升级 Agora 组件至 3.0.0c 及以上版本（若厂商已停止维护则直接卸载 com_agora 组件）；临时缓解措施可在 Web 应用防火墙（WAF）层面对 index.php 中 action 参数添加目录遍历序列（如 ../）的过滤规则，或在 Joomla! 后台禁用该扩展模块。"
score = 6.8
severity = "MEDIUM"
sources = ["nuclei"]
title = "Joomla Agora 组件 3.0.0b 本地文件包含漏洞"
updated = "2026-06-16T23:10:48.597"

