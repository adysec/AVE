[basic]
description = "Lotus Notes 的 LDAP 服务（NLDAP）存在缓冲区溢出漏洞，远程攻击者无需身份认证即可通过向目标服务器发送特制的 ldap_search 请求触发该漏洞，导致服务进程崩溃，造成拒绝服务。该漏洞影响 Lotus Domino Server 及 Lotus Notes 相关版本，CVSS 评分 5.0，危害等级中危。攻击者可通过网络远程利用，攻击复杂度低，无需用户交互。"
published = "2001-03-12T05:00:00.000"
remediation = "升级 IBM Lotus Domino 至 R5.0.1 及以上版本，该版本已修复 NLDAP 服务中 ldap_search 请求的缓冲区溢出问题。如无法升级，可在防火墙或网络层面限制对 LDAP 端口（默认 389）的访问，仅允许受信任 IP 连接，以降低被远程利用的风险。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "IBM Lotus Notes LDAP 缓冲区溢出拒绝服务漏洞"
updated = "2026-06-16T21:48:56.097"

