[basic]
description = "诺顿杀毒软件 Exchange 版本 (NavExchange) 存在缓冲区溢出漏洞，攻击者可通过发送包含超长文件名的 .zip 压缩包触发缓冲区溢出，导致远程拒绝服务攻击。该漏洞影响 Symantec Norton Antivirus for Exchange 产品，攻击者无需身份认证即可远程发送恶意 .zip 文件触发漏洞，导致服务拒绝，CVSS 评分 5.0（中等危害），Symantec 已发布补丁修复此漏洞。"
published = "2000-06-14T04:00:00.000"
remediation = "立即升级到最新的 Norton Antivirus for Exchange 版本（7.x/8.x系列），并禁用自动解压功能。通过注册表设置禁用 .zip 文件自动预览，并配置邮件服务器以限制附件大小为 2MB 以内。同时，将防火墙策略调整为仅允许已知安全域名，同时部署缓冲区溢出保护插件，并启用系统日志记录以监控恶意 .zip 文件的尝试。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Norton Antivirus for Exchange 缓冲区溢出拒绝服务漏洞"
updated = "2026-06-16T21:51:49.120"

