[basic]
description = "Microsoft Silverlight 5.1.20913.0 之前版本在访问 Silverlight 元素时未能正确验证指针，存在输入验证漏洞。远程攻击者可通过诱导用户打开特制的 Silverlight 应用程序触发该漏洞，导致敏感信息泄露。该漏洞已被 CISA 列入已知被利用漏洞目录（KEV），影响范围广泛，攻击者无需身份认证即可利用，但需要用户交互配合。Microsoft 已发布安全更新修复此漏洞。"
published = "2013-10-09T14:53:25.230"
remediation = "升级 Microsoft Silverlight 至 5.1.20913.0 或更高版本。由于 Silverlight 已于 2021 年 10 月终止支持，建议彻底卸载 Silverlight 组件，并将依赖 Silverlight 的 Web 应用迁移至 HTML5 等现代技术。如因业务兼容性必须保留，可在浏览器中禁用 Silverlight 扩展，仅对受信任站点启用。"
score = 5.5
severity = "MEDIUM"
sources = ["kev"]
title = "Microsoft Silverlight 5 指针验证漏洞"
updated = "2026-06-16T23:55:58.700"

