[basic]
description = "Slackware Linux 3.4 的 pkgtool 工具在处理临时文件时存在不安全的符号链接竞争漏洞。本地攻击者可通过在临时文件创建前预置符号链接指向系统任意文件，利用 pkgtool 对临时文件的读写操作实现对任意文件的非法读取或篡改。此攻击需要本地用户权限，影响使用 pkgtool 的所有系统配置。"
published = "1998-04-06T04:00:00.000"
remediation = "升级到 Slackware Linux 4.0 及以上版本，该漏洞已在后续版本中修复。如无法升级，确保 pkgtool 使用安全的临时文件创建方式（如 mkstemp），避免在 /tmp 目录下使用可预测的文件名。作为临时缓解措施，可限制本地用户对 /tmp 的写入权限或使用 nosuid 挂载选项。"
score = 3.6
severity = "LOW"
sources = ["avd"]
title = "Slackware Linux 3.4 pkgtool 临时文件符号链接攻击漏洞"
updated = "2026-06-16T21:50:34.210"

