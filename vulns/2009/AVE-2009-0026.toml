[basic]
description = "Apple Mac OS X 10.4.11 及 10.5.8 之前版本的 ColorSync 组件存在堆缓冲区溢出漏洞，攻击者可通过诱导用户打开或查看包含嵌入式 ColorSync 配置文件的恶意构造图像文件，触发堆缓冲区溢出，导致应用程序崩溃拒绝服务或实现远程任意代码执行。该漏洞影响 Mac OS X 10.4.11、10.5.8 之前版本，以及 iTunes 9.2 之前版本、Safari 4.1/5.0 之前版本等使用 ColorSync 的应用程序。攻击向量为网络远程攻击，攻击复杂度中等（需用户交互打开恶意图片），无需身份认证，成功利用可导致完全的机密性、完整性和可用性破坏（CVSS 9.3，CVSS:AV:N/AC:M/Au:N/C:C/I:C/A:C）。Apple 已在 Mac OS X 10.5.8、iTunes 9.2、Safari 4.1/5.0 等版本中修复此漏洞，建议用户尽快升级至修复版本。漏洞类型属于 CWE-119 堆缓冲区溢出，属于经典的内存破坏类漏洞。"
published = "2009-08-06T16:30:00.267"
remediation = '建议立即升级至 Mac OS X 10.5.8 并安装 2009-003 安全更新（通过系统偏好设置 → 软件更新），或直接升级至 Mac OS X 10.6 Snow Leopard。同时需升级 Safari 至 4.1/5.0 以上版本，iTunes 升级至 9.2 以上版本。若无法立即升级，可暂时禁用 Safari 的图片自动加载功能（偏好设置 → 外观 → 取消勾选"显示图片"），并避免打开不可信的图片文件作为临时缓解措施。'
score = 9.3
severity = "CRITICAL"
sources = ["tenable"]
title = "Apple Mac OS X ColorSync 远程代码执行漏洞"
updated = "2026-06-16T23:07:55.893"

