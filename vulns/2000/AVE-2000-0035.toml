[basic]
description = "Majordomo 1.94.4及1.94.5版本的wrapper程序存在本地权限提升漏洞。本地攻击者可通过指定-C参数加载恶意配置文件，从而以Majordomo运行用户的权限执行任意命令，获取系统敏感信息或进一步提权。"
published = "1999-12-28"
remediation = "升级Majordomo至已修复版本，或应用Red Hat官方补丁RHSA-2000-005。限制本地用户对wrapper程序的访问权限，避免使用-C参数加载未授权的配置文件。"
score = 4.6
severity = "MEDIUM"
sources = [
    "cve",
    "exploitdb",
]
title = "Majordomo 1.94.4/1.94.5 wrapper 本地权限提升漏洞"
