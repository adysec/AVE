[basic]
description = "Big Brother 系统与网络监控软件中的 bbd 服务器存在远程命令执行漏洞。攻击者可通过向 bbd 服务发送特制请求，在无需认证的情况下触发该漏洞，在目标服务器上以 bbd 进程权限执行任意命令，进而完全控制受影响的系统。该漏洞影响 Big Brother 网络监控系统的多个版本，危害等级高，CVSS 评分 7.5。厂商已在后续版本中发布修复补丁。"
published = "2000-05-18T04:00:00.000"
remediation = "立即升级至 Xymon 4.3.30 或更高版本（Big Brother 已停止维护，Xymon 是其官方继任项目）。如无法迁移，应在防火墙层面限制对 bbd 服务端口（默认 1984/TCP）的访问，仅允许受信任的管理 IP 连接，并禁用 bbd 服务器上的命令执行功能。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "Big Brother System and Network Monitor bbd 远程代码执行漏洞"
updated = "2026-06-16T21:51:45.600"

