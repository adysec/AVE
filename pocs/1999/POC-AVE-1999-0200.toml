[info]
author = "ave"
description = "检测 ColdFusion Server 4.0 的 openfile.cfm 端点是否存在未授权访问，该端点允许远程攻击者上传、读取、删除和执行服务器上的任意文件。"
id = "POC-AVE-1999-0200"
name = "Allaire ColdFusion Server 4.0 任意文件上传与执行漏洞 PoC"
severity = "high"
tags = ["ave-1999-0200"]
vuln_id = [
    "CVE-1999-0477",
    "AVE-1999-0200",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/openfile.cfm"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "openfile",
    "ColdFusion",
    "Expression",
]

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/exprcalc.cfm"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "exprcalc",
    "ColdFusion",
    "Expression",
]
