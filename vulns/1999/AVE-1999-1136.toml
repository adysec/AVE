[basic]
description = "IPSwitch IMail Server 5.0 及 6.0 版本使用弱加密算法将电子邮件账户密码存储在注册表键值中，本地攻击者可通过读取注册表项解密获取明文密码，进而未授权访问目标邮件系统。该漏洞影响 IPSwitch IMail Server 多版本，CVSS 评分 7.2，危害等级高。厂商已发布更新版本修复此问题。"
published = "1999-12-21T05:00:00.000"
remediation = '升级至 Ipswitch IMail 7.0 及以上版本，该版本改用强加密算法保存邮箱账户密码。临时缓解措施：使用 regedit 或组策略，将注册表项 HKEY_LOCAL_MACHINE\SOFTWARE\Ipswitch\IMail 的权限设置为仅允许管理员读取，阻止普通本地用户访问密码数据。'
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "Ipswitch IMail Server 弱加密存储密码致本地信息泄露漏洞"
updated = "2026-06-16T21:50:34.077"

