[basic]
description = "Mailman 2.0beta3 及 2.0beta4 版本中的 wrapper 程序未正确过滤不受信任的格式化字符串，存在格式化字符串漏洞。本地攻击者可通过向 wrapper 程序传递特制的格式化字符串参数触发该漏洞，实现权限提升，获取系统更高权限。该漏洞影响 Linux 系统上运行的 Mailman 2.0beta3 与 2.0beta4 版本，CVSS 评分 4.6，危害等级中危。"
published = "2000-10-20T04:00:00.000"
remediation = "建议升级到 Mailman 2.0 正式版（GA）或更高版本，该漏洞在正式版中已修复。如无法升级，可移除 mailman wrapper 的 setuid 权限（`chmod u-s /usr/lib/mailman/mail/mailman`），仅保留 root 用户执行权限作为临时缓解措施，但这会影响部分邮件列表功能。"
score = 4.6
severity = "MEDIUM"
sources = ["cve"]
title = "GNU Mailman 格式字符串权限提升漏洞"
updated = "2026-06-16T21:52:17.943"

