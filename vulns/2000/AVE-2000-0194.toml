[basic]
description = "Red Hat Linux 6.0 单用户模式存在身份验证绕过漏洞。本地攻击者可在系统引导进入单用户模式时，在密码提示符处按下 Ctrl+C 中断认证流程，从而绕过 root 密码验证直接获取 root 权限。该漏洞源于单用户模式下未正确处理认证中断信号，攻击者需要物理访问或控制台访问目标系统才能利用，可能导致完全接管系统控制权。"
published = "2000-02-23T05:00:00.000"
remediation = "在 /etc/inittab 中将单用户模式启动行改为 `~~:S:wait:/sbin/sulogin` 以强制要求输入 root 密码；同时设置 BIOS 密码和 GRUB 密码，防止未授权物理访问修改引导参数。建议升级至受支持的 Red Hat Enterprise Linux 版本。此外，在 `/etc/sysconfig/init` 中设置 `SINGLE=/sbin/sulogin` 作为加固措施。"
score = 7.2
severity = "HIGH"
sources = ["epss"]
title = "Red Hat Linux 6.0 单用户模式身份验证绕过漏洞"
updated = "2026-06-16T21:51:15.137"

