[basic]
description = "Solaris 7.0 及 8 版本中的 Xsun X 服务器存在缓冲区溢出漏洞，本地用户可通过向 -dev 参数传递超长字符串触发该漏洞。由于程序未对输入长度进行有效边界检查，过长的参数内容溢出缓冲区后覆盖内存中的关键数据，使攻击者能够以 root 权限执行任意代码。该漏洞影响 Solaris 7.0 和 8 两个主要版本，需本地系统访问权限，危害等级高。"
published = "2000-04-24T04:00:00.000"
remediation = "立即安装 Sun 针对 Solaris 7 的 Xsun 补丁（补丁 ID: 107636-xx）或 Solaris 8 的 Xsun 补丁（补丁 ID: 108652-xx），可从 https://support.oracle.com 获取。临时缓解措施：移除 Xsun 的 setuid root 权限（chmod -s /usr/openwin/bin/Xsun），限制可登录系统的本地用户范围。"
score = 7.2
severity = "HIGH"
sources = ["cve"]
title = "Sun Solaris Xsun 缓冲区溢出漏洞"
updated = "2026-06-16T21:51:30.407"

