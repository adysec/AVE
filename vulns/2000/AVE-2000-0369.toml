[basic]
description = "Red Hat Linux 6.1 的 ORBit 组件和 gnome-session 会话管理器存在远程拒绝服务漏洞。远程攻击者无需身份认证即可向目标系统发送特制请求，触发 ORBit 或 gnome-session 进程崩溃，导致系统拒绝服务。该漏洞影响 Red Hat Linux 6.1 及可能受影响的早期版本，CVSS 评分 5.0，危害等级中等。目前官方已发布安全公告并提供补丁修复。"
published = "1999-12-03T05:00:00.000"
remediation = "安装 Red Hat 安全公告 RHSA-1999:058-01 提供的更新补丁，升级 ORBit 和 gnome-session 至修复版本。由于 Red Hat Linux 6.x 已停止安全维护，建议将系统升级至受支持的 Red Hat Enterprise Linux 版本。如无法升级，可在网络边界防火墙限制对受影响服务的远程访问作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["redhat"]
title = "Red Hat Linux 6.1 ORBit 和 gnome-session 远程拒绝服务漏洞"
updated = "2026-06-16T21:51:33.060"

