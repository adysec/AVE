[basic]
description = "惠普系统管理主页（System Management Homepage）是一款为服务器管理的IT管理员提供的综合工具，可预测、诊断和快速响应潜在或实际的系统故障。攻击者可通过SMH的可信URL漏洞利用RedirectUrl参数劫持受害者跳转到任意恶意网站，进而利用浏览器漏洞进一步攻击受害者操作系统并实现远程代码执行。"
