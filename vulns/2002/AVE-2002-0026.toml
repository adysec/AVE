[basic]
description = "GV 系列文档查看器（包括 gv 3.5.8 及更早版本、gvv 1.0.2 及更早版本、ggv 1.99.90 及更早版本、gnome-gv 以及 kdegraphics 中的 kghostview 2.2.2 及更早版本）在处理特制的 PDF 或 PostScript 文件时，由于 sscanf 函数调用存在缓冲区溢出漏洞，攻击者可构造恶意文档诱导用户打开，从而在目标系统上执行任意代码。该漏洞影响多个 Unix/Linux 发行版中的 GV 系列工具，CVSS 评分 4.6，危害等级中危。"
published = "2002-10-10T04:00:00.000"
remediation = "升级 gv 至 3.5.9 及以上版本，升级 KDE 至 3.0.4 及以上版本（kghostview 漏洞已修复），或为 KDE 2.2.2/3.0.3 应用官方安全补丁。各发行版用户应安装对应安全更新：Red Hat 安装 RHSA-2002:207/212/220，Debian 安装 DSA-176/179/182，Mandrake 安装 MDKSA-2002:069/071，Caldera OpenLinux 安装 CSSA-2002-053.0。临时缓解措施为不打开来源可疑的 PDF 和 PostScript 文件。"
score = 4.6
severity = "MEDIUM"
sources = ["osv"]
title = "GNU GV 及多种 PostScript/PDF 查看器 缓冲区溢出漏洞"
updated = "2026-06-16T21:58:13.880"

