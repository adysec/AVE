[basic]
description = "Lotus Domino 的 SMTP 邮件服务在处理特制的邮件消息时存在缺陷，攻击者可通过发送包含异常头部或超长内容的邮件触发服务异常，导致 SMTP 服务崩溃或挂起，从而造成邮件服务器拒绝服务。该漏洞无需身份认证，远程攻击者仅需向目标服务器发送恶意邮件即可利用，影响邮件系统的正常收发。"
published = "1999-09-01"
remediation = "升级到 Lotus Domino 5.0.2 或更高版本，或在 SMTP 任务前部署邮件过滤网关以拦截异常邮件。"
score = 5.0
severity = "MEDIUM"
sources = ["avd"]
title = "Lotus Domino SMTP 服务拒绝服务漏洞"
