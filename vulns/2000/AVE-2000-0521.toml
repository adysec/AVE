[basic]
description = "Linux 系统的 pam_console PAM 模块存在权限验证漏洞，当显示管理器（如 gdm 或 kdm）启用 XDMCP 协议时，任意用户可绕过正常认证获取系统控制台访问权限并重启系统。该漏洞影响 Conectiva 4.x/5.x 及 RedHat 6.x 等发行版，CVSS 评分 5.0，危害等级中等。攻击者无需高权限，仅需通过 XDMCP 服务即可远程触发该漏洞。"
published = "2000-07-27T04:00:00.000"
remediation = "立即升级 pam_console 至 Red Hat 官方 RHSA-2000-044 公告中提供的修补版本；如无法升级，在 gdm/kdm 配置中禁用 XDMCP（将 /etc/X11/gdm/gdm.conf 中 Enable=false），并在 /etc/security/console.apps/ 中移除不必要的控制台访问权限作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["redhat"]
title = "Linux pam_console PAM 模块权限提升漏洞"
updated = "2026-06-16T21:52:13.697"

