[basic]
description = "Red Hat Linux 6.1 中的 ORBit 组件和 esound 音频守护进程在生成认证密钥时使用了弱随机数，导致本地攻击者可通过暴力枚举或预测方式猜测认证密钥，从而绕过身份验证机制获取未授权访问权限。该漏洞影响 Red Hat Linux 6.1 系统，攻击者需拥有本地用户权限，CVSS 评分 7.5，危害等级高。建议升级至修复版本或限制本地用户对相关服务的访问。"
published = "1999-12-03T05:00:00.000"
remediation = "建议立即应用 Red Hat 安全公告 RHSA-1999:058-01 提供的补丁，升级 ORBit 和 esound 组件至修复版本，确保使用足够随机的认证密钥生成机制。如无法立即升级，可限制本地用户对系统的交互式访问权限，并监控 /var/log/messages 中的异常认证失败记录作为临时缓解措施。"
score = 7.5
severity = "HIGH"
sources = ["redhat"]
title = "Red Hat Linux 6.1 ORBit和esound弱认证漏洞"
updated = "2026-06-16T21:51:32.937"

