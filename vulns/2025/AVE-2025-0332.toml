[basic]
description = "Unibox 路由器管理后台的 `/tools/download_csv.php` 接口未对 `download_file` 参数进行充分的路径过滤与权限校验，远程攻击者无需身份认证即可通过目录遍历（Path Traversal）技术，构造 `../../../etc/passwd` 等恶意路径读取服务器任意文件，包括系统配置文件、密码文件及敏感业务数据，可导致核心信息泄露，严重威胁设备安全。攻击复杂度低，仅需目标系统开放 Web 管理端口即可利用。"
published = "0703"
remediation = "尽快将 Unibox 路由器固件升级至厂商发布的最新版本，修复 `/tools/download_csv.php` 中 `download_file` 参数未校验路径回溯的问题。如无法升级，在 Web 服务器或反向代理层添加规则，过滤 `../` 等目录遍历字符，并对可下载文件做白名单限制。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "Unibox 路由器任意文件读取漏洞"
updated = "0703"

