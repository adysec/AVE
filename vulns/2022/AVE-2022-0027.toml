[basic]
description = "Linux 内核 memstick/mspro_block 驱动在处理只读存储设备时存在引用泄漏漏洞（CWE-401）。驱动程序未使用 set_disk_ro 将只读状态正确传播到块设备层，而是在 ->open 函数中进行检查，导致在访问只读设备时引用计数泄漏，进而可能引发内核内存资源耗尽。本地攻击者可利用此漏洞造成系统拒绝服务。该漏洞影响 Linux 内核多个版本，CVSS 评分 5.5，危害等级中等。"
published = "2025-02-26T07:00:54.947"
remediation = '升级 Linux 内核至 5.10.110、5.15.33、5.16.19、5.17.2 及以上版本，或合入 commit 40f2c71b2f6a 补丁。如无法立即升级，可通过模块黑名单临时禁用 memstick 内核模块（执行 echo "blacklist memstick" >> /etc/modprobe.d/disable-memstick.conf 并重启）。'
score = 5.5
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux Kernel memstick/mspro_block 只读设备处理不当导致资源泄露漏洞"
updated = "2026-06-17T05:17:17.513"

