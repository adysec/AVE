[info]
author = "ave"
description = "检测 WWW Count 2.3 Count.cgi 命令注入漏洞"
id = "POC-AVE-1999-0595"
name = "CVE-1999-0363 CGI Command Injection Detection"
severity = "high"
tags = [
    "cve-1999-0363",
    "ave-1999-0595",
]
vuln_id = [
    "CVE-1999-0363",
    "AVE-1999-0595",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/cgi-bin/Count.cgi"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["count"]
