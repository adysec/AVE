[basic]
description = 'BeOS 操作系统（4.0/4.5/5.0 版本）的 TCP/IP 协议栈在解析 IP 数据包时存在缺陷，未对 IP 包头中的"总长度"字段进行合法性校验。远程攻击者无需身份认证，只需向目标主机发送一个总长度字段值小于 IP 头部实际长度的畸形 IP 数据包，即可触发协议栈处理异常，导致系统拒绝服务（崩溃或挂起）。该漏洞影响所有运行上述版本的 BeOS 系统，攻击条件仅需攻击者能与目标网络连通并构造发送特制报文，利用方式简单，可通过普通网络包构造工具实现。'
published = "2000-04-07T04:00:00.000"
remediation = "建议迁移至 Haiku OS（BeOS 开源继任者）或其他现代操作系统，BeOS 4.x/5.0 已停止维护无官方补丁。临时缓解可在边界防火墙配置规则丢弃 IP 总长度字段小于 IP 头部长度（<20 字节）的畸形包，或在边界防火墙启用 IP 头部长度校验功能拦截畸形包。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Be BeOS 4.0/4.5/5.0 IP 数据包长度字段拒绝服务漏洞"
updated = "2026-06-16T21:51:23.117"

