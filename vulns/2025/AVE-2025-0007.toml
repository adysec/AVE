[basic]
description = "Ivanti Connect Secure（22.7R2.5 之前版本）、Ivanti Policy Secure（22.7R1.2 之前版本）以及 Ivanti Neurons for ZTA 网关（22.7R2.3 之前版本）的 Web 组件存在栈缓冲区溢出漏洞（CWE-121/CWE-787）。未经身份认证的远程攻击者可向目标设备的受影响服务发送特制的恶意网络请求，触发栈上缓冲区溢出并覆盖返回地址，从而在目标系统上以系统权限执行任意代码，实现完全远程代码执行。该漏洞无需合法凭据、无需用户交互，攻击条件仅需网络可达目标设备的监听端口，危害等级为严重（CVSS 9.0），已被公开利用，影响大量部署上述网关的企业远程接入与零信任架构。"
published = "2025-01-08T23:15:09.763"
remediation = "立即将 Ivanti Connect Secure 升级至 22.7R2.5 或更高版本，Ivanti Policy Secure 升级至 22.7R1.2，Ivanti Neurons for ZTA gateways 升级至 22.7R2.3。若暂无法升级，须运行 Ivanti 外部完整性检查工具 (ICT) 进行威胁狩猎，发现异常立即断网并执行工厂重置，同时重置管理员密码、API 密钥及本地用户密码，在防火墙层面限制管理接口访问作为临时缓解措施。"
score = 9
severity = "CRITICAL"
sources = ["hwpoc"]
