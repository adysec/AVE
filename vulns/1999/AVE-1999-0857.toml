[basic]
description = "Disney Go Express Search 在用户系统上运行 HTTP 服务，存在访问控制缺陷，远程攻击者可直接连接该 HTTP 服务端口，无需身份认证即可读取和篡改用户的搜索历史记录及偏好设置。该漏洞影响安装了 Disney Go Express Search 组件的 Windows 系统，攻击者仅需能访问目标主机的 HTTP 服务端口即可实施攻击，通过构造 HTTP 请求即可获取或篡改用户搜索信息，CVSS 评分 2.6，属于低危漏洞，主要影响用户隐私数据的机密性和完整性。"
published = "1999-12-12T05:00:00.000"
remediation = '建议立即升级 Disney Go Express Search 到官方已修复该问题的版本（1999 年后发布的 2.0 及以上版本），安装后重启客户端。如无法立即升级，可在本机防火墙中禁止外部对本地 8080 端口（该客户端默认 HTTP 服务端口）的入站连接，或直接在客户端设置中关闭"本地搜索服务"功能以临时缓解风险。'
score = 2.6
severity = "LOW"
sources = ["avd"]
title = "迪士尼 Go Express Search 远程攻击漏洞"
updated = "2026-06-16T21:49:30.870"

