[basic]
description = "Red Hat net-tools 软件包中存在缓冲区溢出漏洞，攻击者可通过向受影响系统发送特制的网络请求触发该漏洞，导致内存破坏和拒绝服务，甚至可能执行任意代码。该漏洞影响 Red Hat Linux 等早期 Linux 发行版，CVSS 评分 7.5，危害等级高。建议用户升级至修复版本或应用厂商提供的补丁。"
published = "1999-06-24T04:00:00.000"
remediation = "立即升级 Red Hat Linux 系统中的 net-tools 软件包至 RHSA-1999:017-01 公告中指定的修复版本。对于仍在维护的 RHEL 版本，通过 `yum update net-tools` 安装最新版本；对于已停止支持的旧版系统，建议迁移至受支持的 RHEL 发行版或使用 iproute2 套件替代 net-tools 作为临时缓解措施。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "Red Hat net-tools 缓冲区溢出漏洞"
