[basic]
description = "Cisco Catalyst 3500 XL 系列交换机的 Web 配置接口存在未授权命令执行漏洞。当设备未设置 enable 密码时，远程攻击者无需任何认证即可通过构造包含 /exec/ 目录的特制 URL 直接访问交换机管理接口，从而在目标设备上以最高权限执行任意系统命令。该漏洞影响 Cisco Catalyst 3500 XL 系列交换机，CVSS 评分 10.0，危害等级严重。管理员应尽快设置 enable 密码或禁用 Web 管理接口以进行防范。"
published = "2000-12-19T05:00:00.000"
remediation = "立即为 Catalyst 3500 XL 交换机配置 enable 密码（全局配置模式下执行 `enable secret <密码>`），同时禁用不必要的 Web 管理界面（`no ip http server`），并将 IOS 升级至 Cisco 官方修复版本（如 12.0(5)WC2 及以上）。"
score = 10
severity = "CRITICAL"
sources = ["exploitdb"]
title = "Cisco Catalyst 3500 XL 任意命令执行漏洞"
updated = "2026-06-16T21:52:49.600"

