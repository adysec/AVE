[basic]
description = "3Com SuperStack II 集线器运行软件版本 2.10 中的管理信息库（MIB）存在信息泄露漏洞。该 MIB 包含一个对象标识符（.1.3.6.1.4.1.43.10.4.2），通过只读 community 字符串即可访问，但该对象会泄露完整的 community 字符串表，包括读写权限的 community 字符串。攻击者可在未授权情况下通过 SNMP 协议读取该 OID，获取高权限 community 字符串后进一步执行设备配置篡改、信息窃取等未授权操作，严重威胁网络设备安全。CVSS 评分 7.5，危害等级高。"
published = "1999-08-30T04:00:00.000"
remediation = "升级 3Com SuperStack II hub 固件至 2.10 以上版本，并在设备 ACL 中限制 SNMP 仅允许受信管理 IP 段访问，同时将 SNMP 读团体字串由默认的 public 改为复杂随机字符串，禁用不必要的 SNMP 服务或使用 SNMPv3 加密认证。如设备已停产，应替换为支持安全 SNMP 的现代设备。最终，建议加固方式是在网络边界防火墙封禁 UDP 161/162 端口的外部访问。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "3Com SuperStack II hub MIB信息泄露漏洞"
updated = "2026-06-16T21:50:36.093"

