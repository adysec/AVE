[basic]
description = 'IBM HTTP Server 1.3.x 及 WebSphere 3.52 的 Fast Response Cache Accelerator (FRCA) 组件中的 AfpaCache 模块存在内核泄漏漏洞。远程攻击者无需身份认证即可通过发送一系列特制的畸形 HTTP 请求，触发 "bad request" 错误，导致目标系统的内核资源持续泄漏，最终造成拒绝服务。该漏洞 CVSS 评分 5.0，危害等级中等，影响范围包括多个版本的 IBM HTTP Server 和 WebSphere 应用服务器。'
published = "2001-03-13T05:00:00.000"
remediation = "升级 IBM HTTP Server 至 1.3.19.1 或更高版本，该版本已修复 FRCA 模块中 AfpaCache 的内存泄漏缺陷。若暂时无法升级，可在配置文件中禁用 FRCA（Fast Response Cache Accelerator）模块以消除攻击面，具体操作为在 httpd.conf 中注释或移除与 FRCA/AfpaCache 相关的 LoadModule 和 CacheInit 指令。对于仍运行 Websphere 3.52 的环境，建议同步升级 Websphere Application Server 至受支持的版本（如 5.x 或更高），因为该版本同样受此漏洞影响。此外，可在前置防火墙层面过滤异常畸形 HTTP 请求，作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "IBM HTTP Server 1.3.x AfpaCache 拒绝服务漏洞"
updated = "2026-06-16T21:53:41.827"

