[basic]
description = "Lotus Domino HTTP Server 的 /cgi-bin 目录存在信息泄露漏洞。远程攻击者无需身份认证即可向目标服务器发送针对 /cgi-bin 下不存在脚本的 HTTP 请求，服务器在返回的 404 错误响应中会泄露 Web 根目录的绝对路径信息。攻击者可利用此漏洞进一步收集目标系统信息，为后续攻击（如定位配置文件、Web 应用漏洞利用）提供情报支持。该漏洞影响 Lotus Domino 早期版本，危害等级中等。"
published = "1999-12-01T05:00:00.000"
remediation = "升级至 Lotus Domino 4.6.1 或更高版本，该版本已修复 /cgi-bin 路径泄露问题。如无法升级，可在 Web 服务器配置中限制 /cgi-bin 目录访问权限，仅允许授权 IP 访问，同时配置自定义错误页面以防止返回真实路径信息。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Lotus Domino HTTP Server CGI 路径泄露漏洞"
updated = "2026-06-16T21:50:50.360"

