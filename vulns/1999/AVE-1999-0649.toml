[basic]
description = "ISC BIND 8.2.1 及之前版本在处理 DNS 查询时存在拒绝服务漏洞。其 named 服务在解析包含超长域名（超过 maxdname 限制）的数据包时，因对域名长度校验不当，会触发内部处理异常。未经过身份认证的远程攻击者只需向目标 DNS 服务器发送精心构造的畸形 DNS 请求，即可导致 named 进程崩溃或停止响应，使域名解析服务中断。该漏洞影响运行 ISC BIND 8.2.1 及以下版本且暴露在网络中的 DNS 服务器，攻击条件仅需网络可达目标 53 端口，无需任何权限，利用方式简单，常被用于分布式拒绝服务攻击。"
published = "1999-11-10T05:00:00.000"
remediation = "建议将 ISC BIND 升级至 8.2.2 或更高版本以修复 maxdname 处理缺陷导致的拒绝服务问题。如暂时无法升级，应通过防火墙或 ACL 限制仅允许可信主机访问 named 服务的 53 端口（TCP/UDP），并在 named.conf 中配置 allow-query/allow-recursion 收紧递归查询权限，同时关闭不必要的区域传送。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
