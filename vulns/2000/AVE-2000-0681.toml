[basic]
description = "David Harris Pegasus Mail 3.12 存在任意文件读取漏洞。远程攻击者可通过构造包含 mailto: 协议及 -F 参数的恶意 URL，诱导目标用户点击后利用邮件客户端转发功能读取系统任意文件，导致敏感信息泄露。该漏洞攻击复杂度低，无需身份认证，影响 Pegasus Mail 3.12 版本。"
published = "2000-12-19T05:00:00.000"
remediation = "建议立即升级至 Pegasus Mail 4.0 及以上版本，该版本已修复 mailto: 协议 -F 开关可被滥用转发任意文件的问题。如无法立即升级，可在操作系统中修改 mailto: 协议关联程序启动参数，移除 -F 命令行开关，或在邮件客户端中禁用 HTML 邮件自动激活 mailto: 链接的功能，同时教育用户勿点击邮件中的可疑链接。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "David Harris Pegasus Mail 3.12 任意文件读取漏洞"
updated = "2026-06-16T21:52:47.510"

