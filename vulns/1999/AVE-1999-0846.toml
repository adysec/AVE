[basic]
description = "Windows NT 系统中 HKEY_LOCAL_MACHINE 注册表键存在权限配置不当漏洞，该键存储操作系统核心安全与配置信息，但默认权限设置过于宽松，导致未授权用户可读取甚至修改其中的系统关键项。攻击者可利用不当权限访问或篡改 HKLM 下安全策略、服务配置等关键数据，造成敏感信息泄露、权限提升乃至系统完全受控。该漏洞影响全系 Windows NT 操作系统，CVSS v2 评分 10.0，危害等级严重。"
published = "1999-01-01T05:00:00.000"
remediation = "Windows NT 已停止支持，建议升级至 Windows Server 2019/2022 或更高版本。如无法升级，需手动收紧注册表权限：运行 regedt32，展开 HKEY_LOCAL_MACHINE，右键选择「权限」，移除 Everyone 组的完全控制权，仅保留 SYSTEM 和 Administrators 的读取权限，并应用强制 ACL 继承到所有子项。同时部署组策略限制本地注册表远程访问。作为临时缓解，限制对受影响主机的网络访问并启用注册表审计日志。"
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "Microsoft Windows NT 注册表键权限许可和访问控制漏洞"
updated = "2026-06-16T21:48:40.357"

