[basic]
description = "Shadow Op Software Dragon Server 1.0 和 2.0 版本的 Telnet 服务器存在拒绝服务漏洞。由于程序在处理客户端发送的用户名时缺乏充分的输入验证，远程攻击者无需身份认证即可通过向 Telnet 服务发送超长用户名的方式触发缓冲区溢出或异常，导致服务器进程崩溃或无法响应新的连接请求。该漏洞影响所有启用 Telnet 服务的 Dragon Server 实例，攻击者只需在具备网络可达性的前提下构造包含过长用户名的 Telnet 连接数据包即可实施攻击，造成服务中断。"
published = "2000-06-16T04:00:00.000"
remediation = "升级 Dragon Server Telnet 服务至不受该漏洞影响的版本；如厂商已停止维护，建议迁移至 OpenSSH 等主流远程服务并禁用 Dragon Telnet 服务。临时缓解措施可在防火墙或路由器层对 Telnet 服务（默认 TCP 23 端口）实施访问控制，仅允许可信 IP 地址连接，避免公开暴露于互联网，并监控异常的长用户名登录尝试。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Shadow Op Software Dragon Server Telnet 拒绝服务漏洞"
updated = "2026-06-16T21:51:49.493"

