[basic]
description = "Linux 平台 AT Computing atsar 软件包中的 atsadc 工具存在文件权限检查缺失漏洞。由于 atsadc 在写入输出文件时未正确验证文件权限，本地普通用户可通过符号链接攻击等方式利用该漏洞，将恶意数据写入系统敏感文件，从而提升权限至 root。该漏洞影响 atsar 1.4 及更早版本，CVSS 评分 7.2，危害等级高。攻击者需具备本地系统访问权限，无需交互即可触发。"
published = "2000-03-11T05:00:00.000"
remediation = "升级 atsar 包至 1.5 及以上版本，该版本已修复 atsadc 输出文件权限检查问题。如无法升级，建议移除 atsadc 的 setuid 位（chmod u-s /usr/sbin/atsadc），并确保输出目录仅 root 可写，同时考虑使用 sysstat 等替代工具进行系统性能监控。"
score = 7.2
severity = "HIGH"
sources = ["cve"]
title = "AT Computing atsar_linux 1.4 文件权限检查漏洞"
updated = "2026-06-16T21:51:08.920"

