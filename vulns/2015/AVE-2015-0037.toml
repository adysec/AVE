[basic]
description = "WordPress Aviary Image Editor Add-on For Gravity Forms 插件 3.0 beta 版本中的 includes/upload.php 存在任意文件上传漏洞。未经身份认证的远程攻击者可通过向该上传接口发送特制请求，上传包含恶意可执行扩展名的文件（如 PHP 脚本），随后通过直接访问 wp-content/uploads/gform_aviary 目录下的上传文件即可执行任意代码，完全控制目标网站服务器。该漏洞影响该插件的 3.0 beta 版本，CVSS 评分 9.8，危害等级严重。"
published = "2017-05-23T04:29:00.447"
remediation = "立即停用并删除 Aviary Image Editor Add-on For Gravity Forms 插件，该插件已从 WordPress 官方仓库下架且不再维护。检查 wp-content/uploads/gform_aviary/ 目录下是否存在可疑 PHP 文件，如有则删除。作为替代方案，可选用其他受支持的 WordPress 图片编辑插件（如 Classic Editor + 媒体库自带编辑功能）。"
score = 9.8
severity = "CRITICAL"
sources = ["nuclei"]
title = "WordPress Aviary Image Editor Add-on For Gravity Forms插件任意文件上传漏洞"
updated = "2026-06-17T00:27:18.610"

