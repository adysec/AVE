[basic]
description = "Infopop Ultimate Bulletin Board（UBB）论坛系统在主题隐藏（topic hidden）字段的处理中存在命令注入缺陷，未对用户输入做充分过滤。远程攻击者可在该字段中插入 shell 元字符（如分号、管道符等），使服务器将其作为系统命令的一部分执行，从而在未授权的情况下运行任意命令。该漏洞影响运行 UBB 的 Web 服务器，攻击者只需向论坛提交特制的请求即可触发，无需身份认证，危害等级为严重（CVSS 10.0）。"
published = "2000-02-11T05:00:00.000"
remediation = "升级到 Infopop Ultimate Bulletin Board 5.43 或更高版本（厂商已修复该字段的 shell 元字符过滤）。如无法立即升级，应临时关闭论坛发帖功能或在 Web 服务器层（如通过 mod_security 规则）拦截包含分号、反引号、管道符等 shell 元字符的 topic 隐藏字段提交请求作为缓解措施。"
score = 10
severity = "CRITICAL"
sources = ["cve"]
title = "Infopop Ultimate Bulletin Board 远程代码执行漏洞"
updated = "2026-06-16T21:51:05.100"

