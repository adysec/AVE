[basic]
description = "IIS 3.0 在安装 iis-fix 修补程序后仍存在路径解析缺陷，远程攻击者通过将 URL 中的点号（.）替换为 URL 编码形式（%2e）即可绕过补丁限制，导致 ASP 程序源代码被泄露。该漏洞影响 Microsoft IIS 3.0 版本，攻击者无需身份认证即可利用，获取的源代码可能包含数据库连接等敏感信息，进一步扩大危害面。"
published = "1997-01-01T05:00:00.000"
remediation = "建议立即将 IIS 升级至 4.0 或更高版本（该漏洞在 IIS 4.0 及后续版本中已修复）。如无法升级，在 IIS 管理器中禁用 ASP 扩展映射，并将网站目录的 NTFS 权限设置为禁止匿名用户读取 .asp 文件。同时确保已安装 Microsoft 发布的最新安全更新（Q269862 补丁）。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "Microsoft IIS 3.0 源代码泄露漏洞"
updated = "2026-06-16T21:48:00.503"

