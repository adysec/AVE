[basic]
description = "EGroupware 存在经认证的远程代码执行漏洞。攻击者以管理员身份登录后，可通过上传恶意的 eTemplate XML 文件（.xet）到 VFS 的 /etemplates 目录触发该漏洞。漏洞根因在于 Widget::expand_name() 方法将模板控件属性值直接传入 PHP eval() 函数执行，且仅对双引号进行了转义，未对反引号做任何过滤。在 PHP 中，eval() 字符串内的反引号会被当作 shell 命令执行，导致攻击者可从 Web 应用权限提升至服务器操作系统级任意命令执行。该漏洞影响 EGroupware 26.0 及更早版本，CVSS 评分 8.6，危害等级高。官方 Docker 部署因配置了 disable_functions 限制不受影响，但裸机、虚拟机或未加固的容器部署均存在风险。"
published = "2026-07-20T17:17:07.690"
remediation = "tags as required by the specification.<value>立即将 EGroupware 升级至 26.4.20260413（主版本线）或 23.1.20260601（旧版线）及以上版本，修复 Widget::expand_name() 中 eval() 反引号未转义问题。如无法升级，在 php.ini 中设置 disable_functions = shell_exec,exec,passthru,system,proc_open,popen 以阻断反引符执行系统命令；Docker 官方部署默认已含此加固配置，需确保未被移除或覆盖。同时严格限制管理员账号仅授予可信任人员。"
score = 8.6
severity = "HIGH"
sources = ["ghsa"]
title = "EGroupware eTemplate 认证远程代码执行漏洞"
updated = "2026-07-20T18:16:51.863"

