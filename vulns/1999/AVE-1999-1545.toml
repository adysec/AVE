[basic]
description = "SMI Sendmail 4.0 及更早版本（运行于 SunOS 4.0.3 及之前版本）存在安全漏洞，远程攻击者可利用 Sendmail 的配置缺陷未经授权访问系统 bin 用户权限。该漏洞源于 Sendmail 默认配置对用户身份验证不足，攻击者无需认证即可通过网络远程利用，获取系统 bin 用户级别的访问权限，进而可能读取敏感文件或执行受限操作。CVSS 评分 7.5，危害等级高。"
published = "1990-01-29T05:00:00.000"
remediation = "升级 Sendmail 至 4.1 或更高版本，或安装 Sun 官方补丁 100377-01/100378-01。如无法升级，在 /etc/mail/sendmail.cf 中限制入站连接来源 IP，并禁用 decode 别名等危险功能。现代系统应迁移至 Postfix 或 Exim 等维护中的 MTA。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "Sun SMI Sendmail 远程命令执行漏洞"
updated = "2026-06-16T21:50:35.230"

