[basic]
description = "Allaire Spectra 1.0 的远程访问服务 invoke.cfm 模板存在身份认证绕过漏洞。攻击者可通过向该模板提交 bAuthenticated 参数绕过认证检查，无需提供有效凭证即可直接访问受限资源。该漏洞攻击复杂度低，无需认证即可远程利用，CVSS 评分 7.5，可能导致敏感信息泄露、数据篡改等严重后果。"
published = "2000-01-01T05:00:00.000"
remediation = "升级 Allaire Spectra 至 1.0.1 或更高版本，该版本已修复 invoke.cfm 模板的认证绕过问题。临时缓解措施可在 Web 服务器（IIS/Apache）层面限制对 invoke.cfm 的访问，仅允许受信 IP 范围访问 Remote Access Service 管理路径。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "Allaire Spectra Remote Access Service 安全绕过漏洞"
updated = "2026-06-16T21:51:02.523"

