[basic]
description = "CUPS（Common Unix Printing System）1.04及更早版本中存在认证远程拒绝服务漏洞。远程攻击者无需身份认证，通过向CUPS服务发送包含不存在或没有shadow密码的用户名进行认证请求，即可触发该漏洞，导致服务崩溃或拒绝服务。该漏洞影响CUPS 1.04及之前版本，CVSS评分5.0，危害等级中危。"
published = "2000-06-21T04:00:00.000"
remediation = "升级 CUPS 至 1.0.5 及以上版本（官方已发布 cups-DoS.patch 补丁，适用于 1.0.4），或安装最新 CUPS 2.x 发行版。如无法升级，可在 iptables/firewalld 中限制对 CUPS 服务（默认端口 631）的远程访问，仅允许可信来源连接作为临时缓解。配置中禁用匿名打印访问也可降低风险。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Easy Software Products CUPS 用户认证拒绝服务漏洞"
updated = "2026-06-16T21:51:53.787"

