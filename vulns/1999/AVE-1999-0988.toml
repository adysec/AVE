[basic]
description = "Windows NT 4.0 的 tcpip.sys 在处理 ICMP Subnet Mask Address Request 数据包时存在缺陷，当多个 IP 地址绑定到同一网络接口时，远程攻击者可通过发送特制的 ICMP 子网掩码请求报文触发该漏洞，导致目标系统服务崩溃。该漏洞影响 Windows NT 4.0 SP4 之前版本，需目标配置多 IP 绑定环境，攻击者无需认证即可远程利用。"
published = "1999-12-31T05:00:00.000"
remediation = "建议安装 Windows NT 4.0 Service Pack 4 (SP4) 或更高版本，SP4 已修复了 tcpip.sys 对 ICMP Subnet Mask 请求处理不当导致的拒绝服务问题。临时缓解方案：在边界防火墙上过滤入站 ICMP 类型 17 代码 0（子网掩码请求）数据包。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Microsoft Windows NT 4.0 ICMP 子网掩码请求拒绝服务漏洞"
updated = "2026-06-16T21:49:50.523"

