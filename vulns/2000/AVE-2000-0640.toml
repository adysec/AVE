[basic]
description = 'IPFilter 防火墙 3.4.3 及更早版本中存在条件竞争漏洞，当系统配置了重叠的 "return-rst" 与 "keep state" 规则时，远程攻击者利用特定序列的数据包触发竞态条件，可绕过防火墙的访问控制策略。该漏洞导致本应被拦截的网络流量得以通过，降低了防火墙的安全防护能力。'
published = "2000-05-26T04:00:00.000"
remediation = '升级 IPFilter 至 3.4.4 或更高版本，避免在防火墙规则中同时配置重叠的 "return-rst" 和 "keep state" 规则，确保状态检测规则优先于 RST 响应规则执行，消除竞争条件窗口期。'
score = 2.6
severity = "LOW"
sources = ["cve"]
title = "IPFilter 防火墙竞争条件安全绕过漏洞"
updated = "2026-06-16T21:51:59.123"

