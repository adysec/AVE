[basic]
description = "WinSMTP 1.06f 及 2.X 版本存在缓冲区溢出漏洞，远程攻击者无需身份认证即可通过向 SMTP 服务发送超长的 USER 或 HELO 命令触发该漏洞，导致服务崩溃或拒绝服务。该漏洞影响 Jack De Winter 开发的 WinSMTP 邮件服务器软件，CVSS v2 评分 10.0，攻击复杂度低，可造成机密性、完整性和可用性的完全丧失。Exploit-DB 已公开该漏洞的利用代码（EDB-ID: 20221）。"
published = "2000-11-14T05:00:00.000"
remediation = "立即停止使用已停止维护的 WinSMTP 1.06f 及 2.x 版本，迁移至仍受支持的 SMTP 服务器软件（如 hMailServer、MailEnable 等）。若无法立即迁移，在防火墙层面限制仅允许可信 IP 访问 TCP 端口 25，并对 SMTP 服务实施输入长度限制以缓解缓冲区溢出风险。"
score = 10
severity = "CRITICAL"
sources = ["cve"]
title = "Jack De Winter WinSMTP 缓冲区溢出漏洞"
updated = "2026-06-16T21:52:33.727"

