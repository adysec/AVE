[basic]
description = "Unix 系统存在默认、空、空白或缺失密码的账户安全漏洞。攻击者可通过 SSH 服务利用空密码或默认密码直接登录目标系统，获取未授权访问权限，进而执行任意命令或控制整个系统。该漏洞影响大量 Unix/Linux 系统，CVSS 评分 7.5，危害等级高。修复措施包括为所有账户设置强密码、禁用空密码登录以及定期审计账户安全配置。"
published = "1998-03-01T05:00:00.000"
remediation = """为所有 Unix 系统账户设置强密码，删除或锁定无密码账户；在 /etc/pam.d/common-auth 中添加 `nullok` 禁用配置，阻止空密码登录；定期使用 `awk -F: '($2==""){print}' /etc/shadow` 审计空密码账户。"""
score = 7.5
severity = "HIGH"
sources = ["exploitdb"]
title = "Unix 系统账户默认空密码漏洞"
updated = "2026-06-16T21:48:31.960"

