[basic]
description = "Internet Explorer 4.01 及 5.0 在安全模型实现上存在缺陷，攻击者可在恶意网页中通过 IFRAME 元素调用 document.execCommand() 方法，绕过同源安全限制并读取访问者计算机上已知路径的本地文件内容。该漏洞不需要用户交互即可触发，攻击者仅需构造包含恶意 JavaScript 脚本和 IFRAME 的网页诱使用户访问，即可将本地文件内容回显至攻击者控制页面，但无法列出目录或修改文件。影响版本包括未打 Service Pack 2 的 IE 4.01 以及 IE 5.0。"
published = "1999-10-11"
remediation = '应用 Microsoft 安全公告 MS99-042 发布的补丁：IE 4.01 用户应升级至 Service Pack 2，IE 5.0 用户应安装该公告提供的修正补丁（1999 年 11 月 4 日修正版修复了 IE 5 的回归问题）。如无法立即打补丁，可在 Internet 选项的安全区域设置中启用"高"安全级别，禁用"对没有标记为安全的 ActiveX 控件进行初始化和脚本运行"，并限制网页对本地文件的跨域访问以缓解 IFRAME 文件读取风险。'
score = 4.3
severity = "MEDIUM"
sources = [
    "cve",
    "avd",
]
title = "Microsoft Internet Explorer IFRAME ExecCommand 信息泄露漏洞"
updated = "1999-11-04"

