[basic]
description = "mSQL（Mini SQL）2.0.1 及更早版本存在缓冲区溢出漏洞。远程攻击者可向目标服务的 1114 端口发送特制的畸型数据包，触发栈缓冲区溢出，进而覆盖返回地址，实现远程代码执行。该漏洞影响 mSQL 2.0.1 及之前所有版本，CVSS 评分 7.5，危害等级高危，无需认证即可远程利用。"
published = "1999-01-01T05:00:00.000"
remediation = "立即将 mSQL 升级至 v2.0.1 以上版本（如 2.0.2 或更高），该版本修复了 wprint 函数中的缓冲区溢出问题。由于 mSQL 已停止维护多年，强烈建议迁移至受支持的数据库产品，如 MariaDB 或 PostgreSQL。在无法迁移前，应通过在防火墙上限制对 mSQL 默认端口（1114/TCP）的访问来源，仅允许受信任的 IP 连接，作为临时缓解措施。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "Hughes Technologies mSQL 缓冲区溢出漏洞"
updated = "2026-06-16T21:48:03.350"

