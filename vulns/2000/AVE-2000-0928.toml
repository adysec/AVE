[basic]
description = "OpenSSH 2.3.0 之前版本的 SSH 客户端未正确禁用 X11 转发和代理转发功能，当用户使用 SSH 客户端连接到恶意的 SSH 服务器时，攻击者可通过精心构造的 SSH 服务器获取客户端 X11 显示的访问权限，从而窃听 X11 事件（如键盘输入），或获取 ssh-agent 的访问权限以窃取私钥。该漏洞影响所有运行 OpenSSH 2.3.0 之前版本的系统，攻击条件为用户主动连接至恶意 SSH 服务器，CVSS 评分 7.5，危害等级高。"
published = "2001-01-09T05:00:00.000"
remediation = "升级 OpenSSH 至 2.3.0 或更高版本。在客户端 ssh_config 中设置 ForwardX11 no 和 ForwardAgent no 禁用 X11 和代理转发；使用 ssh -x 选项连接以关闭 X11 转发。如无法升级，在 /etc/ssh/ssh_config 中全局禁用 ForwardX11Trusted 并限制 SSH 仅连接可信服务器。"
score = 7.5
severity = "HIGH"
sources = ["redhat"]
title = "OpenSSH SSH客户端 X11转发与agent转发安全限制绕过漏洞"
updated = "2026-06-16T21:53:18.290"

