[basic]
description = "Linux 2.2 内核中的 mknod 系统调用存在符号链接跟随漏洞，本地攻击者可通过创建特制符号链接诱导特权进程调用 mknod，从而覆盖任意系统文件或提升权限。该漏洞影响 Linux 2.2 系列内核，攻击者需具备本地用户权限，利用难度较低，CVSS 评分 4.6，危害等级中危。"
published = "1999-09-28T04:00:00.000"
remediation = "升级 Linux 内核至 2.2.14 及以上版本（推荐使用 2.4 或更高长期支持内核），此漏洞在后续版本中已被修复，mknod 系统调用在执行前会先检查目标是否为符号链接。若无法升级内核，可通过 LSM（Linux Security Module，如 SELinux）限制 mknod 系统调用的使用范围，仅允许特权进程执行设备节点创建操作。"
score = 4.6
severity = "MEDIUM"
sources = ["avd"]
title = "Linux kernel mknod 本地权限提升漏洞"
updated = "2026-06-16T21:50:15.463"

