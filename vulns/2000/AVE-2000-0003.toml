[basic]
description = "RealNetworks RealServer 5.0 的 ramgen 组件存在缓冲区溢出漏洞，远程攻击者无需身份认证即可通过向目标服务器发送特制的超长 ramgen 请求触发该漏洞，导致服务进程崩溃，造成拒绝服务。该漏洞影响 RealServer 5.0 版本，CVSS 评分 5.0，危害等级中等。厂商已发布安全更新修复此漏洞。"
published = "1999-12-23"
remediation = "升级 RealNetworks RealServer 至 5.0.1 或更高版本，该版本已修复 ramgen 组件对超长请求的处理逻辑。若产品已停止支持，建议迁移至替代流媒体服务器方案，并在网络边界配置 WAF 规则或反向代理，限制请求 URI 长度不超过 4096 字节以缓解攻击。"
score = 5.0
severity = "MEDIUM"
sources = [
    "cve",
    "exploitdb",
]
title = "RealNetworks RealServer 5.0 ramgen 拒绝服务漏洞"
updated = "2026-06-16"

