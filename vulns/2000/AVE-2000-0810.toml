[basic]
description = 'Unify eWave ServletExec 3.0C 存在 JSP 源代码泄露漏洞。远程攻击者可通过向目标服务器发送以特殊字符（如 ".", "+", "%20" 等）结尾的恶意 HTTP 请求，绕过服务器对 JSP 文件的访问限制，导致服务器返回 JSP 源代码而非执行后的结果。该漏洞可导致攻击者获取 Web 应用后端逻辑、数据库连接凭证等敏感信息，严重威胁应用安全。无需认证即可利用，攻击门槛低。'
published = "2001-01-09T05:00:00.000"
remediation = "建议升级 ServletExec 至 v3.0E 及以上版本，该漏洞已在后续版本中得到修复。如无法立即升级，可在前端 Web 服务器（如 Apache、IIS）配置 URL 过滤规则，拦截以 `.`、`+`、`%20` 结尾的 JSP 请求，或使用 URL 重写模块规范化请求路径，防止源文件泄露。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Unify eWave ServletExec 3 JSP 源代码泄露漏洞"
updated = "2026-06-16T21:53:10.633"

