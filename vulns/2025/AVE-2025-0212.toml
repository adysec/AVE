[basic]
description = "亿赛通 CDG 服务器系统的 WorkFlowAction 接口存在 SQL 注入漏洞。攻击者可在未经认证的情况下，通过向 /CDGServer3/3g/WorkFlowAction;Servicelogin 接口发送特制的 HTTP POST 请求，在 command 参数中注入恶意 SQL 语句，从而实现对后台数据库的任意查询与操作。该漏洞可导致敏感数据泄露、数据库内容篡改甚至服务器被控制，严重威胁系统安全。"
published = "0703"
remediation = "升级亿赛通 CDG 至最新版本（≥6.0.3.12），该版本已修复 WorkFlowAction 接口的 SQL 注入漏洞。临时缓解措施：在 WAF 或反向代理层配置规则，拦截对 /CDGServer3/3g/WorkFlowAction 路径的 POST 请求中包含 command、type 等参数的恶意 SQL 语句。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "亿赛通 CDGServer3 WorkFlowAction SQL注入漏洞"
updated = "0703"

