[basic]
description = "Microsoft Index Server 2.0 及 Windows 2000 Indexing Service 中的 WebHits ISAPI 过滤器存在目录遍历漏洞。远程攻击者无需身份认证即可通过向目标服务器发送特制的畸形命中高亮参数（Malformed Hit-Highlighting Argument）请求，绕过路径限制读取服务器上的任意文件。该漏洞 CVSS 评分 5.0，属于中等危害等级，可导致敏感信息泄露。受影响系统包括运行 Index Server 2.0 或 Indexing Service 的 Windows 2000 平台。"
published = "2000-01-26T05:00:00.000"
remediation = "该漏洞影响已停止支持的 Windows 2000 / Index Server 2.0，官方不再提供安全更新。建议立即升级到受支持的 Windows Server 版本（如 Windows Server 2019/2022），并移除 WebHits ISAPI 筛选器（webhits.dll）的 IIS 映射；若无法升级，在 IIS 管理器中删除 .htw 扩展名的脚本映射以缓解风险。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Microsoft Index Server 2.0 WebHits ISAPI 目录遍历漏洞"
updated = "2026-06-16T21:50:59.673"

