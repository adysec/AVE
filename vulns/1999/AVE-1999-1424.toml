[basic]
description = "HP-UX 10.20 系统自带的 movemail 程序存在不安全的文件权限配置，导致本地用户可利用该缺陷进行权限提升攻击。由于 movemail 以特权身份运行或权限设置不当，攻击者可在获得本地低权限访问后，通过直接执行或利用该程序执行恶意操作，从而获取系统更高级别的控制权限。该漏洞影响 HP-UX 10.20 版本，CVSS 评分 4.6，危害等级中危。"
published = "1997-01-06T05:00:00.000"
remediation = "建议立即应用 HP 安全公告 HPSBUX9701-047 提供的补丁程序。如无法安装补丁，可手动执行 `chmod 755 /usr/bin/movemail` 移除 movemail 二进制文件的 setuid/setgid 权限位，以消除本地用户利用不安全权限进行提权的风险。长期修复方案为升级至 HP-UX 11.x 或更高版本，这些版本已修复该安全问题。"
score = 4.6
severity = "MEDIUM"
sources = ["avd"]
title = "HP HP-UX movemail 本地权限提升漏洞"
updated = "2026-06-16T21:50:02.157"

