[basic]
description = "瑞友天翼应用虚拟化系统存在反序列化注入漏洞，攻击者可通过向 `/ConsoleExternalUploadApi.XGI` 接口发送特制的 POST 请求，利用参数注入触发反序列化操作，从而在目标服务器上执行任意代码并获取系统控制权。该漏洞无需身份认证即可远程利用，攻击门槛低，影响部署了瑞友天翼应用虚拟化系统的服务器，可导致服务器被完全控制、数据泄露等严重后果。"
published = "0812"
remediation = "立即联系瑞友官方获取最新安全补丁，升级瑞友天翼应用虚拟化系统至最新版本。如无法立即升级，可在 Web 应用防火墙（WAF）或反向代理层面添加规则，拦截对 /ConsoleExternalUploadApi.XGI 接口的异常 POST 请求，特别是过滤 key、initParams、sign 等参数中包含的反序列化攻击载荷。同时建议限制管理后台的访问 IP 白名单，避免将 ConsoleExternalUploadApi 接口暴露在公网。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "瑞友天翼应用虚拟化系统 反序列化远程代码执行漏洞"
updated = "0812"

