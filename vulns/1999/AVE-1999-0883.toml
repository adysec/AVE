[basic]
description = "赛门铁克 pcAnywhere 8.0 远程访问软件在 TCP 5631 端口的数据处理过程中存在拒绝服务缺陷。远程攻击者无需身份认证，只需向目标主机的 5631 端口发送大量特制数据，即可使目标系统 CPU 占用率飙升至饱和状态，导致服务无响应或系统性能严重下降。该漏洞影响运行 Symantec pcAnywhere 8.0 的 Windows 主机，攻击条件仅为网络可达目标端口，利用方式简单且可远程触发，属于典型的拒绝服务类漏洞。"
published = "1999-05-28T04:00:00.000"
remediation = "建议立即升级至 Symantec pcAnywhere 12.5 或更高版本（已停止支持），或迁移至 Symantec Endpoint Management 等受支持的远程管理解决方案。临时缓解措施：在防火墙层面封锁 TCP 5631 端口，禁止外部访问 pcAnywhere 服务端口。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Symantec pcAnywhere 8.0 拒绝服务漏洞"
updated = "2026-06-16T21:49:33.297"

