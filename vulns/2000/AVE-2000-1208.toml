[basic]
description = "HP OpenView Network Node Manager 6.1 版本存在代码执行漏洞，攻击者可通过向监听在端口2345 的 OVALARMSRV 报警服务发送特制数据包触发严重缓冲区溢出，实现远程代码执行。该漏洞无需任何身份验证即可利用，攻击者可直接在网络环境中实施攻击，完全掌控目标系统，窃取敏感数据，破坏系统完整性并导致核心服务瘫痪。该漏洞影响 HP OpenView Network Node Manager 6.1 版本。通过搜寻相关报道发现该漏洞已针对企业网络管理系统的广泛部署造成了严重威胁，需要用户尽快安装安全补丁。"
published = "2000-06-06T04:00:00.000"
remediation = "建议立即升级 HP OpenView Network Node Manager 至 6.2 或更高版本（HP 已发布补丁修复 Alarm 服务缓冲区溢出）。若暂无法升级，请在防火墙层面封禁 2345 端口（OVALARMSRV 端口），并限制仅允许受信管理 IP 访问该端口，作为临时缓解措施。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "HP OpenView Network Node Manager 6.1 缓冲区溢出代码执行漏洞"
updated = "2026-06-16T21:51:59.787"

