[basic]
description = "Linux 内核的 KVM 虚拟化子系统中，x86 内存管理单元（MMU）在处理嵌套页表（NPT）时存在缺陷。当 NX 巨页缓解机制启用时，KVM 会在影子页表项（SPTE）中设置 NX 位，但代码未将该位视为 NPT 的有效位，导致其被误判为保留位而触发内核 WARN 警告。本地攻击者可通过在虚拟机内触发特定内存操作序列（如使用 NX 巨页映射）引发宿主机内核崩溃，造成拒绝服务（DoS）。该漏洞影响使用 AMD SVM 虚拟化且启用 NX 巨页缓解的 Linux 内核版本，CVSS 评分 5.5，危害等级中危。"
published = "2025-06-18T11:15:53.410"
remediation = "升级 Linux 内核至修复版本（如 5.10.170+、5.15.95+、6.1.13+），其中已包含将 NX 位视为 NPT 有效 SPTE 位的补丁。如无法立即升级内核，可临时关闭 NX 巨页缓解（npt=0）或禁用 NPT 嵌套分页功能作为变通措施。"
score = 5.5
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux KVM x86 内存管理单元 NX 位处理拒绝服务漏洞"
updated = "2026-06-17T05:23:00.910"

