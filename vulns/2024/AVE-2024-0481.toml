[basic]
description = 'Python tarfile 模块在处理不受信任的 tar 归档文件时存在路径遍历漏洞。当使用 TarFile.extractall() 或 TarFile.extract() 方法并设置 filter 参数为 "data" 或 "tar" 时，攻击者可通过构造特制的 tar 文件绕过提取过滤器，修改提取目录之外文件的元数据（如最后修改时间）或文件权限（chmod）。该漏洞仅影响 Python 3.12 及以上版本，CVSS 评分 5.3，危害等级中危。建议用户升级至修复版本或避免使用 filter 参数处理不可信 tar 文件。'
published = "2025-06-03T13:15:20.183"
remediation = '立即将 Python 升级至 3.10.18、3.11.13、3.12.11、3.13.4 或 3.14.0b3 及以上版本，这些版本已修复 tarfile 模块中 filter="data" 和 filter="tar" 绕过提取过滤器的路径遍历问题。如无法升级，在调用 TarFile.extractall() 和 TarFile.extract() 时避免使用 filter="data" 或 filter="tar"，改用 filter="fully_trusted" 并手动校验路径是否在目标目录内，或使用 shutil.unpack_archive() 替代。对于 3.14+ 用户，注意默认 filter 已从"不过滤"变更为"data"，切勿依赖默认行为解压不可信 tar 包。'
score = 5.3
severity = "MEDIUM"
sources = ["msrc"]
title = "Python tarfile 模块提取过滤器绕过漏洞"
updated = "2026-06-17T07:00:20.273"

