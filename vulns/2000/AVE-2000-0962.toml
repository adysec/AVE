[basic]
description = "Fastream FTP++ 2.0 服务器存在缓冲区溢出漏洞，远程攻击者可通过向 FTP 服务发送超长用户名触发缓冲区溢出，导致服务崩溃拒绝服务，甚至可能执行任意代码。该漏洞源于程序未对用户输入长度进行有效边界检查，攻击者无需身份认证即可远程利用，影响系统完整性与机密性。"
published = "2000-11-14T05:00:00.000"
remediation = "立即停止使用 Fastream FTP++ 2.0，该产品已停止维护且厂商已不存在。建议迁移至其他活跃维护的 FTP 服务器软件（如 FileZilla Server 或 vsftpd）。如无法立即替换，可在网络防火墙或 IPS 设备上添加规则，对 FTP 登录用户名长度进行限制（建议不超过 64 字节），并限制该 FTP 服务的来源 IP 白名单。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "Fastream FTP++ 缓冲区溢出远程代码执行漏洞"
updated = "2026-06-16T21:52:33.477"

