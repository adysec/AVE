[basic]
description = 'Compaq（现HP）管理代理的Web组件存在路径遍历漏洞，远程攻击者可通过向目标系统的Web管理接口发送包含".."特殊字符的HTTP请求，绕过访问限制读取服务器上的任意文件。该漏洞影响Compaq Client Management Agents 3.70/4.0、Insight Management Agents 4.21 A至4.30 A、Server Management Agents 4.23等多个版本，攻击者无需认证即可利用，可能导致敏感信息泄露。'
published = "1999-05-26"
remediation = "立即停止使用已停止支持的 Compaq/HP Management Agents 及 Survey Utility 服务，在受影响服务器上卸载该软件并禁用相关 Web 端口（默认 2301）。如业务必须使用，应升级至 HP 后续支持的 Systems Insight Manager 版本，并在 Web 服务器配置中禁用目录遍历及父路径访问权限。"
score = 5.0
severity = "MEDIUM"
