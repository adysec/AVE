[basic]
description = "Windows NT 系统默认将当前工作目录（.）包含在 PATH 环境变量中，导致命令解析时先搜索当前目录再搜索系统目录。本地低权限用户可在任意目录中放置与常用系统命令同名的木马程序（例如 ftp.exe、net.exe），当管理员或高权限用户切换到该目录并执行对应命令时，木马程序将优先被加载执行，从而劫持权限并实现本地提权。攻击条件为攻击者具备本地登录权限且能在目标系统磁盘上创建文件，无需网络访问即可完成利用。"
published = "1997-07-25"
remediation = '编辑系统环境变量，将 PATH 中单独的 "." 条目彻底移除；确保 %SystemRoot% 及 %SystemRoot%\System32 等系统目录始终排在用户目录之前，系统命令执行时不再搜索当前工作目录；通过组策略限制普通用户写入系统关键目录的权限，并对本地登录账户实施最小权限原则。'
score = 4.6
severity = "MEDIUM"
sources = ["cve"]
title = "Microsoft Windows NT PATH 本地权限提升漏洞"
updated = "2026-06-16"

