[basic]
description = "CDE 桌面环境 dtaction 工具中的 AddSuLog 函数存在缓冲区溢出漏洞，本地攻击者可通过向该函数传递超长的用户名字符串参数触发缓冲区溢出，从而获取目标系统的 root 权限。该漏洞影响 DIGITAL UNIX 4.0、AIX 4.3.2、IRIX 6.5.14、Solaris 7.0 等多个 Unix 操作系统上的 CDE 2.1 版本，CVSS 评分为 7.2，危害等级高。攻击者需具有本地系统账号方能利用。"
published = "1999-09-13T04:00:00.000"
remediation = "对于 Solaris 7.0，安装 Sun Security Bulletin #192 提供的补丁；AIX 4.3.2 安装 IBM APAR IY07482 补丁；HP-UX 应用 HPSBUX9909-103 公告补丁；Digital UNIX 4.0 安装 Compaq SSRT0746U 补丁；IRIX 6.5.14 安装 SGI 19990901-01-P 补丁。临措：移除 dtaction 的 setuid 位，`chmod u-s /usr/dt/bin/dtaction`。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "多款 Unix 系统 CDE dtaction 缓冲区溢出漏洞"
updated = "2026-06-16T21:48:51.420"

