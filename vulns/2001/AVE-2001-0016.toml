[basic]
description = "ssldump 0.9 beta1 版本中存在格式字符串漏洞。远程攻击者可通过向受影响的 ssldump 服务发送包含恶意格式字符串说明符的特制 URL，利用该漏洞实现内存读取或写入操作，进而导致拒绝服务甚至获取 root 权限。该漏洞源于程序未对用户可控输入进行正确的格式化处理，允许攻击者在 printf 类函数中注入 %n、%s 等格式标记符，属于经典的格式串处理缺陷。"
published = "2001-02-16T05:00:00.000"
remediation = "升级 ssldump 至 0.9b2 或更高版本，0.9b2 已修复格式字符串漏洞。如无法升级，可编译安装 https://github.com/adulau/ssldump 提供的最新维护版本，或限制仅信任来源使用 ssldump 解析 TLS 流量。"
score = 10
severity = "CRITICAL"
sources = ["exploitdb"]
title = "ssldump 0.9b1 格式字符串漏洞"
updated = "2026-06-16T21:53:31.567"

