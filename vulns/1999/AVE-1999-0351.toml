[basic]
description = "WEBgais 1.0 是一款 CGI 程序，其未能正确过滤用户输入中的特殊字符，存在远程命令执行漏洞。未经身份认证的远程攻击者可通过向目标 Web 服务器发送特制的 HTTP 请求，在 URL 参数中注入 shell 元字符来执行任意系统命令，从而完全控制服务器。该漏洞影响 WEBgais 1.0 及可能更早版本，CVSS 评分 7.5，危害等级高危。"
published = "1997-07-10T04:00:00.000"
remediation = "立即停止使用 WEBgais 1.0，该软件已停止维护且无安全补丁。如必须使用，在 Web 服务器层面限制 CGI 目录访问权限，对用户输入参数做严格过滤，移除或注释掉存在命令执行的 CGI 脚本，同时以最小权限运行 Web 服务进程作为临时缓解措施。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "WEBgais 1.0 远程命令执行漏洞"
updated = "2026-06-16T21:47:45.797"

