[basic]
description = "Linux 内核 UFS（通用闪存存储）驱动中的 ufshcd_pltfrm_remove() 函数在移除平台设备时未正确释放 HBA（主机总线适配器）结构体，导致 scsi_host_dev_release() 无法被正常调用，从而引发内存泄漏。本地攻击者可通过反复加载卸载 UFS 驱动模块触发该漏洞，长期运行后可能导致系统内存资源耗尽，造成拒绝服务。该漏洞影响 Linux 内核各发行版本，需本地低权限访问，CVSS 评分 5.5，危害等级中危。"
published = "2025-01-11T15:15:07.560"
remediation = "建议将 Linux 内核升级至 6.12.5 或更高版本（包含提交 cd188519d246 和 897df60c16d5 的修复）。对于无法立即升级的系统，可应用补丁文件 drivers/ufs/host/ufshcd-pltfrm.c 中 ufshcd_pltfrm_remove() 函数的修复，确保在移除时调用 scsi_host_dev_release() 正确释放 HBA 内存。使用长期支持发行版（如 Ubuntu 24.04 LTS）的用户应安装 USN-7381-1 或 USN-7450-1 安全更新。"
score = 5.5
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux Kernel SCSI UFS 平台驱动内存泄漏漏洞"
updated = "2026-06-17T08:14:07.130"

