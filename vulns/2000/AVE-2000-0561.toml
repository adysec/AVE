[basic]
description = "GWScripts News Publisher 1.0 的 news.cgi 程序在向作者索引添加作者时未正确验证请求身份，导致远程攻击者可通过直接向 new.cgi 程序发送带有 addAuthor 参数的 HTTP 请求，并将 Referer 头设置为 news.cgi 来绕过认证，从而添加新作者。该漏洞影响 GWScripts News Publisher 1.0 版本，CVSS 评分 5.0，危害等级中危。攻击者无需身份认证即可利用此漏洞，通过构造特制 HTTP POST 请求实现未授权操作。"
published = "2000-10-20T04:00:00.000"
remediation = "升级 GWScripts News Publisher 至最新版本（如已停止维护，建议迁移至其他活跃维护的新闻发布系统）。临时缓解措施：在 Web 服务器（如 Apache/Nginx）中对 /new.cgi 路径添加 IP 白名单或 HTTP 基本认证，限制未授权访问。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "GWScripts News Publisher 未授权添加作者漏洞"
updated = "2026-06-16T21:52:20.387"

