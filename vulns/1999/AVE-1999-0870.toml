[basic]
description = "Windows NT 系统的 Winlogon 注册表项中存在名为 ShutdownWithoutLogon 的默认配置，该配置允许尚未登录系统的用户在登录界面直接执行关机操作。此配置缺陷属于本地物理安全策略不当，影响范围覆盖默认安装的 Windows NT 操作系统。攻击条件为攻击者需具备对目标主机的物理访问权限（如可直接操作键盘、鼠标或电源按钮），利用方式是在登录屏幕未认证状态下通过界面触发关机，从而绕过正常登录审计流程，造成服务中断与本地防护绕过，可能被用于规避日志记录或配合其他物理攻击。"
published = "1999-01-01T05:00:00.000"
remediation = '在 Windows NT 注册表编辑器中定位到 HKEY_LOCAL_MACHINE\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Winlogon，将 ShutdownWithoutLogon 键值从 1 修改为 0，重启后生效。此配置可禁止未登录用户通过物理访问关闭系统。'
score = 4.9
severity = "MEDIUM"
sources = ["epss"]
title = "微软 Windows NT 身份验证绕过漏洞"
updated = "2026-06-16T21:48:41.887"

