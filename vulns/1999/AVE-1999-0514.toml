[basic]
description = 'ISC INN (InterNetNews) 新闻服务器软件中的 inndstart 程序存在权限管理缺陷，由于未对 inn.conf 配置文件中的 "pathrun" 参数进行充分校验，本地攻击者可通过构造恶意的 pathrun 路径参数，使 inndstart 以 root 权限执行任意程序，从而实现本地权限提升。该漏洞影响 ISC INN 多个版本，CVSS 评分 7.2，危害等级高。建议升级至最新版本或严格限制 inn.conf 文件的写入权限。'
published = "1999-05-11T04:00:00.000"
remediation = "升级 ISC INN 至 2.2.2 或更高版本，该版本已修复 inndstart 对 pathrun 参数的不安全处理。如无法升级，确保 inn.conf 中 pathrun 指向受保护目录（如 /usr/local/news/bin），且该目录仅允许 root 用户写入，同时移除 inndstart 的 setuid root 权限作为临时缓解措施。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "ISC INN inndstart 本地权限提升漏洞"
updated = "2026-06-16T21:49:03.197"

