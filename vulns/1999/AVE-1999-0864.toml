[basic]
description = "Solaris 7.0 系统自带的 /usr/bin/mail 程序在处理 -m 命令行参数时存在缓冲区溢出缺陷。本地普通用户可构造超长的 -m 参数内容，覆盖栈上返回地址，从而在本地以特权（如 root）身份执行任意代码，实现本地权限提升。攻击者需具备本地登录或命令执行权限方可触发该漏洞。"
published = "1999-09-01"
remediation = "升级到 Solaris 7 已修复该问题的补丁版本（Sun 官方建议安装 Solaris 7 Maintenance Update 或对应内核补丁簇），或限制对 /usr/bin/mail 的 setuid 权限并避免以特权身份调用该命令。"
score = 7.2
severity = "HIGH"
sources = [
    "cve",
    "epss",
]
title = "Solaris 7.0 /usr/bin/mail -m 参数本地缓冲区溢出漏洞"
updated = "2026-07-19"

