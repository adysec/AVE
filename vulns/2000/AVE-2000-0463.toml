[basic]
description = "Check Point FireWall-1 4.0 及 4.1 版本的 SMTP 安全服务器代理存在拒绝服务漏洞，远程攻击者无需认证即可通过向目标系统发送包含二进制零等无效命令的数据流，从而导致 SMTP 代理资源耗尽，服务响应中断。该漏洞影响 Check Point FireWall-1 4.0 和 4.1 版本，攻击条件简单，危害等级中等，建议升级至更高版本。"
published = "2000-06-30T04:00:00.000"
remediation = "立即升级到 Check Point 官方已修复此漏洞的后续版本（FireWall-1 4.0/4.1 已停止支持，建议迁移至当前受支持的 Check Point 版本）。如无法升级，可在防火墙规则中限制 SMTP Security Server 代理的访问来源 IP，仅允许受信任的邮件服务器连接，并在网络层面过滤发往 SMTP 代理端口的异常数据包（如二进制零值）。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Check Point Firewall-1 SMTP Security Server Proxy 拒绝服务漏洞"
updated = "2026-06-16T21:52:02.813"

