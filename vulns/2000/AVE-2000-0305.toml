[basic]
description = "Linux cdwtools 093 及更早版本中存在缓冲区溢出漏洞。该工具集在处理特定输入时未正确验证缓冲区边界，本地攻击者可利用此漏洞通过精心构造的输入数据触发缓冲区溢出，从而覆盖内存中的关键数据，成功利用后可获得 root 权限。该漏洞影响 S.u.S.E. Linux 6.1/6.2 等系统，需本地用户权限触发，CVSS 评分 7.2，危害等级高。"
published = "1999-10-22T04:00:00.000"
remediation = "升级 cdwtools 至 093 以上版本，或直接移除 cwdtools 中 setuid 二进制文件的 suid 权限位（chmod u-s /usr/bin/cwdtool），作为临时缓解措施。如该工具非必需，建议直接卸载 cdwtools 软件包以消除攻击面。"
score = 7.2
severity = "HIGH"
sources = ["epss"]
title = "S.u.S.E. Linux cdwtools 本地缓冲区溢出权限提升漏洞"
updated = "2026-06-16T21:51:33.543"

