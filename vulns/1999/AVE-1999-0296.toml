[basic]
description = "HP Visualize Conference 的默认 FTP 配置存在授权缺失漏洞。该软件在 HP-UX 系统上运行时，其 FTP 服务默认允许会议中的任意参与者向其他与会者发送文件，而无需经过任何身份验证或授权检查。远程攻击者可在未授权的情况下，利用该默认配置向会议中的其他用户传输任意文件，导致敏感信息泄露或恶意文件分发。该漏洞影响 HP Visualize Conference 相关版本，CVSS 评分 7.5，危害等级高。"
published = "1999-07-01T04:00:00.000"
remediation = "立即应用 HP 安全公告 HPSBUX9906-099 提供的补丁，或升级 HP Visualize Conference 至修复版本。如无法升级，在 FTP 服务配置中禁用未经授权的文件传输功能，并在网络层面限制对 FTP 端口（默认 21）的访问，仅允许受信任的 IP 连接。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "HP Visualize Conference FTP 未授权文件传输漏洞"
updated = "2026-06-16T21:48:53.430"

