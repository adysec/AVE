[basic]
description = "Solaris 操作系统的 DMI（桌面管理接口）服务组件 dmispd 存在资源管理不当漏洞。本地攻击者可利用该服务的数据库功能，通过向 /var/dmi/db 目录中添加大量文件，耗尽系统磁盘空间，导致目标系统拒绝服务。该漏洞影响 Solaris 操作系统，攻击者需拥有本地系统访问权限，CVSS 评分 5.0，危害等级中等。"
published = "1999-12-22T05:00:00.000"
remediation = "建议安装 Sun 针对 Solaris 7 的 dmispd 补丁（补丁编号 106895-01 或更高版本），限制本地用户对 /var/dmi/db 目录的写入权限，或将 dmispd 服务的权限掩码设为更严格的值。如无需 DMI 功能，可停止 dmispd 服务（/etc/init.d/dmi stop）并删除该服务启动链接，以彻底消除风险。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Solaris DMI 服务本地拒绝服务漏洞"
updated = "2026-06-16T21:50:51.450"

