[basic]
description = "Microsoft Internet Explorer 4.0 和 5.0 版本中的 Preloader ActiveX 控件存在安全漏洞，远程攻击者可通过构造特制网页，利用该控件读取目标系统上的任意文件，导致敏感信息泄露。攻击条件为诱导用户访问恶意页面，无需用户交互即可触发文件读取操作。"
published = "1999-05-27"
remediation = "安装微软安全公告 MS99-018 提供的更新补丁，或升级 Internet Explorer 至更高版本。对于无法升级的系统，可通过设置 kill bit 禁用 Preloader ActiveX 控件来缓解风险。"
score = 5.1
severity = "MEDIUM"
sources = [
    "cve",
    "epss",
]
title = "Microsoft Internet Explorer Preloader ActiveX 控件任意文件读取漏洞"
