[basic]
description = "IC Radius 软件包中存在缓冲区溢出漏洞，远程攻击者可通过向 RADIUS 认证服务发送超长用户名字段的数据包触发该漏洞，导致认证服务进程崩溃，造成拒绝服务。该漏洞影响 IC Radius 早期版本，无需身份认证即可远程利用，攻击复杂度较低。建议用户升级至修复版本或限制对 RADIUS 服务的网络访问。"
published = "2000-04-24T04:00:00.000"
remediation = "立即将 icradius 升级至修补后的最新版本（如 1.1.5 或更高），或在 RADIUS 服务端源码中对 username 字段添加长度校验（限制不超过 64 字节），防止超长用户名触发缓冲区溢出。由于 icradius 已停止维护，建议迁移至 FreeRADIUS 等仍在积极更新的 RADIUS 实现，并同时在网络边界 ACL 中限制 RADIUS 服务（UDP 1812/1813 端口）的访问来源 IP。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "IC Radius 缓冲区溢出拒绝服务漏洞"
updated = "2026-06-16T21:51:28.350"

