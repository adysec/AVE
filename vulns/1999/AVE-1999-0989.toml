[basic]
description = "HP Series 800 S/X/V 类服务器的 Service Support Processor (SSP) Teststation 存在未授权访问漏洞。远程攻击者无需认证即可通过 SSP 测试站直接获取服务器控制台访问权限，从而完全控制受影响系统。该漏洞影响 HP 800 S/S/X/V 系列服务器，CVSS 评分 7.5，危害等级高。厂商已发布修复建议，建议用户禁用 SSP Teststation 或升级固件。"
published = "1999-11-24T05:00:00.000"
remediation = "立即安装 HP 安全公告 HPSBUX9911-105 中提供的补丁 PF_CSXV1007（可从 HP Electronic Support Center FTP 获取），将 SSP/Teststation 升级至 5.1.2 版本（V22x0 产品）或 1.1.2 版本（V2500 产品）。如无法立即打补丁，应在防火墙上限制对 SSP Teststation 端口的远程访问，仅允许受信任的管理 IP 连接。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "HP系列800 S/X/V类服务器SSP远程访问漏洞"
updated = "2026-06-16T21:49:51.297"

