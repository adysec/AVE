[basic]
description = "Cisco Resource Manager (CRM) 1.0 与 1.1 版本在运行过程中会创建具有全局可读权限（world-readable）的日志文件及临时文件，导致本地用户可读取到其中存储的敏感信息。由于文件权限配置不当，任何具有本地系统访问权限的用户均可直接读取这些文件，从而泄露用户标识（User ID）、明文密码以及 SNMP 团体字符串（community string）等凭据。该漏洞影响范围限于已安装上述版本 CRM 且存在本地账户的 Cisco 设备，攻击者无需特殊权限，仅需以普通本地用户身份访问文件系统即可利用，属于典型的信息泄露类本地漏洞。"
published = "1999-12-31T05:00:00.000"
remediation = "建议升级至 Cisco Resource Manager 1.2 或更高版本（已修复文件权限问题），或将现有 CRM 1.0/1.1 的日志与临时文件目录权限修改为 600（仅所有者可读写）。若无法升级，请限制本地账号访问权限，并迁移至 CiscoWorks 等受支持的网络管理平台。"
score = 1.2
severity = "LOW"
sources = ["avd"]
