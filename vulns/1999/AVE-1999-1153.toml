[basic]
description = "SunOS 系统的 NIS（网络信息服务）finger 服务存在拒绝服务漏洞。该服务的 finger 守护进程在处理客户端 finger 请求时，每收到一个请求便会向 NIS 服务发起查询。攻击者在未经过身份认证的情况下，可向目标主机连续发送大量 finger 请求，迫使系统产生海量 NIS 查询，从而大量消耗 CPU 与网络资源，最终导致目标系统服务不可用。该漏洞影响运行 SunOS 且启用 NIS 与 finger 服务的系统，本地网络可达的远程攻击者可利用此缺陷实施拒绝服务攻击。"
published = "1998-06-29T04:00:00.000"
remediation = "升级到 Sun Solaris 2.6 或更高版本并应用 Sun 安全补丁 105785-01 (SPARC) 或 105786-01 (x86)；或在 /etc/inetd.conf 中注释掉 finger 服务并重启 inetd 禁用 finger 服务；或使用 TCP Wrappers (/etc/hosts.allow/deny) 限制 finger 服务仅允许受信任 IP 访问；或在防火墙层面封锁 TCP 79 端口阻断 finger 请求。"
score = 2.6
severity = "LOW"
sources = ["epss"]
