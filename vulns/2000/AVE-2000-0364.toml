[basic]
description = "SuSE Linux 的 pbpg 1.x 软件包中的 pg 和 pb 工具存在任意文件读取漏洞。由于该工具未对输入路径进行充分过滤，本地攻击者可通过精心构造的参数触发漏洞，读取系统上的任意敏感文件（如 /etc/passwd、配置文件等），导致敏感信息泄露，可能为进一步提升权限铺平道路。CVSS 评分 7.5，危害等级高。"
published = "1999-08-21T04:00:00.000"
remediation = "升级 SuSE Linux 上的 pbpg 软件包至修复版本（>1.x），或通过 rpm 移除 pbpg 软件包（rpm -e pbpg），改用 less 或 more 作为分页查看工具。由于涉及系统已停止安全支持的古老版本，建议将整个操作系统迁移至受支持的 SUSE Linux Enterprise 或 openSUSE Leap/Tumbleweed 版本。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "SuSE Linux pbpg 任意文件读取漏洞"
updated = "2026-06-16T21:51:32.690"

