[basic]
description = "SGI IRIX 5.x/6.x 操作系统中的Objectserver守护进程存在权限验证漏洞，攻击者可向目标服务器发送特制请求，绕过身份验证在系统上创建任意用户账户。该漏洞影响SGI IRIX 5.x和6.x版本用户，攻击者无需任何权限即可远程利用此漏洞。攻击者可通过向Objectserver发送特定协议报文，利用该程序提供的服务功能，在目标系统中注册新用户账户，导致系统权限被滥用，安全控制机制失效。该漏洞危害等级极高，可能导致系统完全失控和安全架构破坏。"
published = "2000-03-27T05:00:00.000"
remediation = "建议立即升级 SGI IRIX 至 6.5.19 或更高版本，或应用 SGI 安全补丁 SGI-2000-0245 补丁补丁。若无法立即升级，建议在防火墙层面封锁对 objectserver 端口（通常为 32772/TCP）的外部访问，并禁用不必要的 objectserver 服务作为临时缓解措施。"
score = 10
severity = "CRITICAL"
sources = ["cve"]
title = "SGI IRIX objectserver 远程代码执行漏洞"
updated = "2026-06-16T21:51:18.650"

