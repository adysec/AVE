[basic]
description = "Linux Kernel 2.2.x 及 2.4 版本中 sysctl 系统调用存在输入验证缺陷，本地攻击者可通过向 sysctl 传递负数参数触发内存读取操作，导致越权访问内核内存区域，进而获取敏感信息或提升至 root 权限。该漏洞影响 Linux Kernel 2.2.x 全版本，CVSS 评分 4.6，危害等级中危。由于需要本地访问权限，攻击者需先获得普通用户权限后方可利用。"
published = "2001-05-03T04:00:00.000"
remediation = "升级到 Linux 内核 2.2.19+/2.4.1+ 版本，该漏洞已在后续内核版本中修复。如无法升级，可通过 grsecurity/PaX 等内核加固补丁限制本地用户调用 sysctl 系统调用，或使用 LSM（SELinux/AppArmor）限制普通用户对 /proc/sys 目录的访问权限以降低风险。"
score = 4.6
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Linux Kernel sysctl 本地内存读取漏洞"
updated = "2026-06-16T21:54:05.137"

