[basic]
description = "Solaris NIS+ 的缓存管理器 nis_cachemgr 存在安全设计缺陷，远程攻击者无需任何身份认证即可向目标系统的 NIS+ 缓存中注入恶意的 NIS+ 服务器信息。成功利用后，攻击者可篡改网络信息服务中的用户凭证及主机关键数据，导致受影响系统发生认证绕过、权限提升或服务拒绝。该漏洞影响 Solaris 2.3/2.4/2.5/2.5.1 等多个版本。"
published = "1997-10-01T04:00:00.000"
remediation = "该漏洞影响 Solaris 2.3–2.5.1（SunOS 5.3–5.5.1）的 NIS+ nis_cachemgr 组件，原补丁由 Sun Security Bulletin #155 提供。由于 Solaris 2.x 系列已停止技术支持，建议立即升级至 Oracle Solaris 11.4 并迁移至 LDAP 名称服务（参见 Oracle 文档 ID 1003296.1）；若无法升级，可停止 nis_cachemgr 服务（`/etc/init.d/nis.client stop`）并在 `/etc/nsswitch.conf` 中移除 NIS+ 作为认证源作为临时缓解。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "Sun Solaris NIS+ nis_cachemgr 安全绕过漏洞"
updated = "2026-06-16T21:48:06.247"

