[info]
author = "AVE"
description = "检测Oracle Java SE 7 Update 17及更早版本中HotSpot组件的类型混淆漏洞(CVE-2013-2423)。通过部署包含恶意Java Applet的网页，利用反射类型混淆绕过Security Manager权限检查，实现远程代码执行。"
id = "POC-AVE-2013-0206"
name = "Oracle Java SE HotSpot Reflection Type Confusion PoC"
severity = "high"
tags = [
    "cve-2013-2423",
    "java",
    "rce",
    "applet",
]
vuln_id = [
    "CVE-2013-2423",
    "AVE-2013-0206",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "Java",
    "Applet",
]
