[basic]
description = "Ceilidh 系统存在路径翻译功能漏洞，攻击者可通过提交包含特殊参数的请求，利用隐藏表单字段 `translated_path` 实现未授权的目录路径信息泄露。该漏洞源于系统未能对用户输入路径进行有效验证和过滤，导致攻击者得以获取 Ceilidh 目录的真实系统路径。这一信息泄露可能为攻击者提供进一步实施目录遍历或系统攻破所需的信息。漏洞影响广泛，适用于所有安装 Ceilidh 的互联网服务器，攻击者无需任何权限即可远程利用这一漏洞，极大拓展了攻击者的信息收集范围，为后续攻击奠定了基础。攻击者仅需发送包含恶意路径信息的 HTTP 请求，即可触发系统返回敏感的目录路径信息。Microsoft 和相关安全团队已证实该漏洞真实存在，并建议用户升级到最新安全补丁以修复这一问题。"
published = "2000-06-08T04:00:00.000"
remediation = "建议立即停用 Lilikoi Ceilidh 2.60 并迁移至现代 Web 会议系统（如 BigBlueButton、Jitsi Meet）。若必须继续使用，请在 Web 应用防火墙（WAF）层面拦截包含 translated_path 参数的请求，并在应用层对 hidden 表单字段实施严格输入验证与路径规范化过滤，防止路径遍历泄露服务器真实路径。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Lilikoi Ceilidh 2.60 目录路径泄露漏洞"
updated = "2026-06-16T21:51:59.260"

