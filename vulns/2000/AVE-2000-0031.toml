[basic]
description = 'Netscape Communicator 4.7 存在密码明文存储漏洞，当用户通过 IMAP 或 POP 协议收发邮件时，即使未勾选"记住密码"选项，程序仍会将用户密码以明文形式记录在 preferences.js 配置文件中。本地攻击者若能访问该文件，即可直接获取用户邮箱凭据，导致敏感信息泄露。该漏洞影响 Netscape 4.7 及可能的相关版本，危害等级中等，需通过升级或手动清理配置文件修复。'
published = "1999-12-22T05:00:00.000"
remediation = "升级 Netscape Communicator 至 4.7x 或更高版本，该版本修复了密码明文存储问题。如无法升级，使用后手动删除 preferences.js 文件中记录的密码字段，或改用 Thunderbird 等现代邮件客户端替代。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Netscape Communicator 密码明文存储漏洞"
updated = "2026-06-16T21:50:51.913"

