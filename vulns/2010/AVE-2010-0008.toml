[basic]
description = "Joomla! 的 JCollection 组件（com_jcollection）存在目录遍历漏洞，远程攻击者可通过向 index.php 的 controller 参数传递 `../` 序列，绕过路径限制读取服务器上任意敏感文件（如配置文件、数据库凭据等）。该漏洞影响 Joomla! 中使用 com_jcollection 组件的版本，攻击无需身份认证，利用难度低。建议用户升级至官方修复版本或卸载受影响组件。"
published = "2010-03-08T15:30:00.810"
remediation = "卸载 com_jcollection 组件或通过 Joomla 扩展管理器禁用该组件。如必须使用，在网站根目录 .htaccess 中添加规则阻止对 index.php 的 controller 参数传递目录遍历序列（如 `..%2f`），或部署 WAF 规则拦截路径遍历攻击载荷。升级 Joomla 核心至 2.5 以上版本也可降低风险。"
score = 5
severity = "MEDIUM"
sources = ["nuclei"]
title = "Joomla! JCollection 组件目录遍历漏洞"
updated = "2026-06-16T23:17:11.117"

