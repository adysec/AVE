[basic]
description = "PostgreSQL 6.3.2 及 6.5.3 版本中存在明文密码存储漏洞。PostgreSQL 将用户密码以明文形式存储在 pg_shadow 和 pg_pwd 系统表中，具有足够数据库权限的攻击者可直接读取这些表中的明文凭据，进而获取其他数据库的访问权限。该漏洞属于设计缺陷，攻击难度较低，危害中等，建议升级至不受影响的版本。"
published = "2001-08-31T04:00:00.000"
remediation = "升级 PostgreSQL 至 7.1 及以上版本，新版本默认使用 md5 加密存储密码。如无法升级，在 postgresql.conf 中设置 password_encryption = md5 并重启服务，同时为所有用户重新设置密码使其转换为加密存储。限制 pg_shadow 和 pg_pwd 文件的系统权限为仅 postgres 用户可读（chmod 600）。"
score = 4.6
severity = "MEDIUM"
sources = ["exploitdb"]
title = "PostgreSQL 明文密码存储漏洞"
updated = "2026-06-16T21:53:21.847"

