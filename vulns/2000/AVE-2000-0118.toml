Description: War FTPd 1.6x 版本在处理 MKD 和 CWD 命令时存在缓冲区溢出漏洞。由于对用户提交的超长路径名参数缺乏正确的边界检查，远程攻击者可通过向 FTP 服务器发送超长的 MKD 或 CWD 命令参数，触发缓冲区溢出，导致 FTP 服务进程崩溃，造成拒绝服务。该漏洞无需认证即可利用，攻击复杂度低。
Remediation: 升级 War FTPd 至 1.67-4 或更高版本（1.71-0 已确认不受影响），下载地址 http://war.jgaa.com/alert/。如无法立即升级，可在防火墙或应用层限制 FTP 命令长度，阻止超过 260 字节的 MKD/CWD 命令参数以缓解缓冲区溢出风险。
