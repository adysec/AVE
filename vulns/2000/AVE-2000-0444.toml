[basic]
description = "Linux 系统下的 mailx（Mail）邮件命令 8.1.1-10 版本中存在缓冲区溢出漏洞。由于程序在处理 `-c`（抄送）参数时未对用户输入长度进行有效边界检查，本地攻击者可通过向该参数传递超长字符串触发栈缓冲区溢出，覆盖返回地址后实现任意代码执行，从而提升至 root 权限。该漏洞影响 BSD 及 Slackware Linux 发行版，利用条件为拥有系统本地账户。"
published = "2000-08-08T04:00:00.000"
remediation = "升级到 mailx 12.0 以上版本，或使用更现代的邮件客户端如 Heirloom mailx 或 s-nail 替代。作为临时缓解措施，可限制本地用户执行 setuid mailx 的权限，或通过移除 mailx 的 setuid 位降低本地提权风险。对于 Slackware/BSD 系统，建议使用厂商提供的安全补丁重建 mailx 二进制文件。"
score = 4.6
severity = "MEDIUM"
sources = ["cve"]
title = "Linux mailx 缓冲区溢出漏洞"
updated = "2026-06-16T21:51:58.010"

