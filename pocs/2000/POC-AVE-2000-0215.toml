[info]
author = "ave"
description = "通过向 /publisher 发送 GET 请求检测 Netscape Enterprise Server Web Publishing 目录遍历漏洞。若服务器响应包含 Java applet 相关特征，则表明 Web Publishing 功能已启用，存在目录遍历风险。"
id = "POC-AVE-2000-0215"
name = "Netscape Enterprise Server Web Publishing 目录遍历 PoC"
severity = "medium"
tags = [
    "cve-2000-0237",
    "netscape",
    "directory-traversal",
]
vuln_id = [
    "CVE-2000-0237",
    "AVE-2000-0215",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/publisher"
protocol = "http"

[poc.requests.body]
content = ""
type = "raw"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "publisher",
    "applet",
    "Netscape",
]
