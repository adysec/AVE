[basic]
description = "OpenSSH 在启用 UseLogin 选项时未能正确放弃特权，导致本地用户可通过向 ssh 守护进程传递命令参数执行任意代码。该漏洞影响启用 UseLogin 选项的 OpenSSH 版本，CVSS 评分 10.0（严重级别），攻击向量为网络，攻击复杂度低，无需认证即可导致完全的机密性、完整性和可用性破坏。攻击者仅需本地账户权限，通过向 ssh 守护进程传递恶意命令参数即可实现任意代码执行，获取系统最高权限。OpenSSH 官方已发布补丁修复此漏洞，建议升级至修复版本或禁用 UseLogin 选项。"
published = "2000-06-08T04:00:00.000"
remediation = "建议立即升级 OpenSSH 至 2.3.0 或更高版本（该版本修复了 UseLogin 权限降低漏洞）。若无法立即升级，请在 sshd_config 中将 UseLogin 设置为 no 并重启 sshd 服务作为临时缓解措施；同时建议限制本地用户 SSH 登录权限，配置防火墙限制 SSH 端口仅允许信任 IP 访问。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "OpenSSH UseLogin 配置项命令执行漏洞"
updated = "2026-06-16T21:51:55.343"

