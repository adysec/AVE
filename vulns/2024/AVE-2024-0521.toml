[basic]
description = "GRUB2 的 UFS 文件系统解析器在处理符号链接名称时，未对输入的字符串长度进行有效性校验，导致堆内存越界写入漏洞。攻击者需要具备本地高权限，通过挂载特制的 UFS 文件系统触发该漏洞，可能破坏系统数据完整性并绕过 Secure Boot 安全启动保护机制。该漏洞影响所有使用 GRUB2 引导程序的 Linux 发行版，CVSS 评分 6.7，危害等级中等。建议用户及时更新 GRUB2 至修复版本。"
published = "2025-02-18T20:15:19.450"
remediation = "升级 GRUB2 至修复版本：Debian 用户升级至 2.06-3~deb11u7（bullseye）或 2.06-13+deb12u2（bookworm）；Ubuntu 用户安装对应安全更新；RHEL 用户安装 RHSA 更新。如无法立即升级，在 UEFI 安全启动环境中启用 Secure Boot 并确保 shim 已更新，限制本地攻击者加载恶意 grub 模块。补丁将 grub_ufs_lookup_symlink 中的 grub_strcpy 替换为 grub_strlcpy 以校验符号链接名长度，防止堆越界写入。"
score = 6.7
severity = "MEDIUM"
sources = ["msrc"]
title = "GNU GRUB2 UFS 文件系统堆越界写入漏洞"
updated = "2026-06-29T23:16:41.560"

