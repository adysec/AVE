Key details:
- Title: IBM AIX UUCP 默认配置本地权限提升漏洞
- Description: AIX 3.2 之前版本中 UUCP 的默认配置存在安全漏洞，本地用户可利用 UUCP 程序的默认权限设置不当，通过执行特制命令获取 root 权限。攻击者需要本地系统访问权限，无需身份认证即可利用此漏洞完全控制系统。
- Severity: HIGH (CVSS v2.0 7.2)
- Score: 7.2
- Published: 1992-03-19
- Remediation: 升级 AIX 系统至 3.2 或更高版本，或手动修改 UUCP 相关文件权限，限制非授权用户对 UUCP 程序的访问。
