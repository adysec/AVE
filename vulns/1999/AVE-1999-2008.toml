[basic]
description = "Adobe Acrobat Reader 4.0 的 ActiveX 控件 pdf.ocx（PDF.PdfCtrl.1）1.3.188 版本中存在缓冲区溢出漏洞。远程攻击者可构造恶意网页，通过调用 pdf.setview 方法向控件传递超长参数触发缓冲区溢出，从而导致任意代码执行。攻击者只需诱导用户使用 Internet Explorer 等浏览器访问特制网页即可触发漏洞，无需任何身份认证。该漏洞影响安装 Adobe Acrobat Reader 4.0 的所有 Windows 系统，可能导致攻击者在当前用户权限下执行任意命令、安装程序或窃取敏感信息。"
published = "1999-09-27T04:00:00.000"
remediation = "立即卸载 Adobe Acrobat Reader 4.0 及配套的 pdf.ocx ActiveX 控件，升级至 Adobe Acrobat Reader 5.0.5 及以上版本（该漏洞已在后续版本中修复）。如无法升级，可在 Internet Explorer 中禁用 ActiveX 控件或通过注册表撤销 pdf.ocx 的组件类别标识（CLSID）来阻止 ActiveX 调用。建议彻底迁移至现代 PDF 阅读器（如 Adobe Acrobat Reader DC 或开源替代方案）以规避过时 ActiveX 架构的安全风险。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "Adobe Acrobat ActiveX 控件缓冲区溢出漏洞"
updated = "2026-06-16T21:50:45.407"

