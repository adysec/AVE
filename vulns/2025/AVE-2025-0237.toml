[basic]
description = "Oracle 多款产品存在多个安全漏洞合集，涵盖数据库、中间件、应用服务器等核心组件。漏洞类型包括但不限于远程代码执行、权限提升、信息泄露、SQL 注入及拒绝服务等。未经身份认证的远程攻击者可通过网络向受影响组件发送特制请求触发漏洞，导致服务器完全沦陷、敏感数据窃取或业务中断。影响范围涉及 Oracle Database、WebLogic、Fusion Middleware、E-Business Suite 等广泛部署的企业级产品。攻击条件通常为目标服务暴露在网络可达范围内，部分漏洞需特定配置或默认安装。建议立即应用 Oracle Critical Patch Update (CPU) 补丁，并限制非必要的网络访问。"
published = "0717"
remediation = "建议立即安装 Oracle 最新季度关键补丁更新（Critical Patch Update），访问 oracle.com/security-alerts 下载对应产品版本的补丁。如无法确定受影响的具体组件，应对所有 Oracle 产品（数据库、WebLogic、中间件等）进行全局补丁更新。临时缓解措施包括：限制 Oracle 服务端口的网络访问范围、启用最小权限原则、关闭不必要的服务和端口。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "Oracle 多个安全漏洞"
updated = "0717"

