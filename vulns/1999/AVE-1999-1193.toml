[basic]
description = "SCO OpenServer 5.0.0 至 5.0.5 版本中的系统活动报告工具 sar 存在缓冲区溢出漏洞。由于该程序在处理命令行 `-f` 参数时未对输入长度进行边界校验，本地用户可通过构造超长 `-f` 参数触发栈缓冲区溢出，覆盖返回地址并控制程序执行流程，从而以 root 权限执行任意代码。该漏洞仅需本地低权限账户即可利用，危害限于受影响版本的本地提权场景，与 CVE-1999-1570 为不同漏洞。"
published = "1999-11-04T05:00:00.000"
remediation = "安装 SCO 于 1999 年 11 月 5 日发布的安全公告 SB-99.17 中的 System Security Enhancement (SSE) 补丁包 SSE037，该补丁包含用于 SCO OpenServer 5.0.0 至 5.0.5 的替换 sar 二进制文件，可从 ftp://ftp.sco.COM/SSE/sse037.tar.Z 下载。如无法立即安装补丁，应临时删除或限制普通用户对 /usr/bin/sar（SetUID root 权限）的执行权限，以缓解本地用户通过 -f 参数缓冲区溢出获取 root 权限的风险。后续建议升级至 OpenServer 5.0.5a 或更高版本。"
score = 7.2
severity = "HIGH"
sources = ["cve"]
title = '用户要求为 CVE-1999-1571 生成 [title] 字段，需要中文漏洞标题，格式：「厂商 产品 漏洞类型」，20-100 字。 已知信息： - 漏洞编号: CVE-1999-1571 - 原标题: openserver 缓冲区溢出漏洞 - NVD描述: Buffer overflow in sar for SCO OpenServer 5.0.0 through 5.0.5 may allow local users to gain root privileges via a long -f parameter, a different vulnerability than CVE-1999-1570. - CVSS: 7.2 - CWE: NVD-CWE-Other - [avd] openserver 缓冲区溢出漏洞 分析： - 厂商：SCO（Santa Cruz Operation） - 产品：OpenServer - 漏洞类型：缓冲区溢出（Buffer overflow） - 影响：本地用户可通过长 -f 参数获得 root 权限 中文标题应该包含厂商、产品、漏洞类型。根据示例"Microsoft Windows TCP/IP 远程代码执行漏洞"，格式是「厂商 产品 漏洞类型」。 可能的标题： - SCO OpenServer 缓冲区溢出漏洞 - SCO OpenServer sar 缓冲区溢出漏洞 - SCO OpenServer 本地缓冲区溢出漏洞 根据示例，简短明了即可："SCO OpenServer 缓冲区溢出漏洞" 或 "SCO OpenServer sar 缓冲区溢出漏洞" 由于描述中提到是 sar 命令的缓冲区溢出，可以更具体一些。但示例中也没有特别详细。让我保持简洁准确。 最终标题：SCO OpenServer 缓冲区溢出漏洞 等等，NVD 描述中提到 "Buffer overflow in sar for SCO OpenServer"，sar 是系统性能监控命令。所以更准确的标题可以是 "SCO OpenServer sar 缓冲区溢出漏洞" 或 "SCO OpenServer 本地缓冲区溢出漏洞"。 考虑到题目要求 20-100 字，"SCO OpenServer 缓冲区溢出漏洞" 是 12 字（含英文），可能有点短。但示例也是类似的长度。 让我再看要求："20-100 字"。中文里一个字通常指一个汉字，英文单词可能按一个或多个字算。但示例 "Microsoft Windows TCP/IP 远程代码执行漏洞" 看起来也没有 20 个中文字符。 让我数一下示例： Microsoft (1) Windows (2) TCP/IP (3-4?) 远程代码执行漏洞 (7) = 大约 11-12 个单位 "20-100 字" 可能是指包括英文在内的总字符数，或者就是指中文字符数。不过示例显然没有 20 个中文字符。 重新看要求："中文漏洞标题，格式：「厂商 产品 漏洞类型」。示例：Microsoft Windows TCP/IP 远程代码执行漏洞。使用中文，20-100 字。" 示例看起来不够 20 字，但也许他们不严格检查，或者英文算一个字？为了安全起见，我可以稍微扩展一下，包含一些关键影响信息。 比如："SCO OpenServer sar 本地缓冲区溢出漏洞" 或 "SCO OpenServer 系统监控工具缓冲区溢出漏洞" 但我觉得保持简洁更符合示例风格。"SCO OpenServer 缓冲区溢出漏洞" 就够了。如果一定要更长："SCO OpenServer 本地缓冲区溢出提权漏洞" — 这包含了影响（提权）。 让我检查一下：SCO OpenServer 本地缓冲区溢出提权漏洞 - SCO (1) OpenServer (2) 本地 (3) 缓冲区溢出 (4) 提权 (5) 漏洞 (6) = 6 个部分，但按中文字数算： S C O (3) O p e n S e r v e r (9) 本 地 (2) 缓 冲 区 溢 出 (5) 提 权 (2) 漏 洞 (2) = 23 个字符（含英文字母），如果按中文汉字算是 11 字。 我觉得这比较合理。但用户给的示例很简洁。让我再想想。 其实要求说"20-100 字"，示例 "Microsoft Windows TCP/IP 远程代码执行漏洞" 的中文字符是：远程代码执行漏洞 (7)，加上英文。总共长度也不到 20。 也许这里的"字"是指中文字符，示例只是示意格式，实际'
updated = "2026-06-16T21:50:44.623"

