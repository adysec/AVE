[basic]
description = "NetBSD 系统中的 mopd（维护操作协议加载器守护进程）存在缓冲区溢出漏洞，远程攻击者可通过向目标系统的 mopd 服务发送包含超长文件名的特制请求触发缓冲区溢出，从而以 root 权限执行任意代码。该漏洞影响多版本 NetBSD 及类 Unix 系统，攻击者无需身份认证即可利用，危害严重。建议受影响的系统立即升级或禁用 mopd 服务。"
published = "2000-10-20T04:00:00.000"
remediation = "立即升级 NetBSD 系统至包含 mopd 补丁的版本（process.c r1.8），或从 http://cvsweb.netbsd.org/bsdweb.cgi/basesrc/usr.sbin/mopd/mopd/process.c.diff?r1=1.7&r2=1.8 获取补丁手动编译；OpenBSD 用户应用 errata#mopd 补丁；Red Hat 用户安装 RHSA-2000-050 更新。如业务不需要 mopd 服务，建议直接禁用或移除 mopd 守护进程，并在防火墙上限制对 mopd 端口（UDP 68）的访问。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "NetBSD mopd 缓冲区溢出远程代码执行漏洞"
updated = "2026-06-16T21:52:24.187"

