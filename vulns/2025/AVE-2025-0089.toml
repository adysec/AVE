[basic]
description = "WebOne劳动力与考勤管理软件的 `/webForms/Download/DownloadFile.aspx` 接口存在任意文件读取漏洞，由于未对 `fileid` 参数进行充分的路径校验，未授权的远程攻击者可通过路径遍历（如 `../../web.config`）读取服务器任意文件，包括数据库配置、系统敏感信息等，可能导致服务器被进一步渗透。结合其他漏洞可造成更严重后果。"
published = "0709"
remediation = "限制 `fileid` 参数仅允许文件名而不接受路径（移除 `/../../` 等目录遍历字符），并对下载请求做白名单验证，仅允许访问 `Download` 目录下的预定义报表文件。建议联系 WebOne 厂商获取安全补丁，或通过 WAF/反向代理规则拦截包含 `../` 的请求路径作为临时缓解。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "WebOne 劳动力与考勤管理软件 任意文件读取漏洞"
updated = "0709"

