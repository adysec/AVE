[basic]
description = "HP OpenMail 邮件系统存在安全配置缺陷，由于对打印请求的访问控制权限设置不当，拥有本地访问权限的攻击者可通过发送恶意构造的打印请求绕过安全限制，在目标系统上以 OpenMail 服务进程权限执行任意系统命令。该漏洞影响 HP OpenMail 服务器，攻击者需具备本地用户权限，CVSS 评分 4.6，危害等级中危。"
published = "1998-04-01T05:00:00.000"
remediation = "限制 HP OpenMail 打印服务仅允许受信任用户提交打印请求，在 OpenMail 配置中禁用不必要的命令执行接口，并升级到厂商修复此问题的最新版本。同时在系统层面限制 OpenMail 运行账户的最小权限，防止恶意打印请求执行任意命令。"
score = 4.6
severity = "MEDIUM"
sources = ["avd"]
title = "HP OpenMail 任意命令执行漏洞"
updated = "2026-06-16T21:48:37.113"

