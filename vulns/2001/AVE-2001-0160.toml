[basic]
description = 'Caucho Resin 1.3b1 及之前版本存在 JavaBean 源代码泄露漏洞。远程攻击者无需认证，只需在 HTTP 请求的 WEB-INF 路径前插入 ".jsp"，即可绕过访问限制，读取服务器上 JavaBean 文件的源码，导致业务逻辑、数据库配置等敏感信息泄露。此类信息泄露可为进一步攻击（如注入、反序列化）提供铺垫。'
published = "2001-06-18T04:00:00.000"
remediation = "升级 Caucho Resin 至 1.3b2 或更高版本，该漏洞已在后续版本中修复。如无法升级，修改 resin.conf 中的 <web-app> 配置，添加对 /WEB-INF/ 路径的严格访问控制规则，禁止外部直接访问该目录。同时可在反向代理层（如 Nginx/Apache）配置规则，拦截包含 .jsp/WEB-INF 模式的请求作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Caucho Resin JavaBean 源代码泄露漏洞"
updated = "2026-06-16T21:54:14.087"

