[basic]
description = "Eclipse Jetty 在 9.2.9.v20150224 之前版本的异常处理代码中存在敏感信息泄露漏洞（JetLeak）。远程攻击者无需身份认证，通过向目标服务器发送包含非法字符的 HTTP 请求头，即可触发异常处理流程中的缓冲区错误，导致进程内存中的敏感数据（如会话令牌、密钥、其他用户请求数据等）被泄露。该漏洞影响所有使用受影响版本 Jetty 的 Web 应用服务器，CVSS 评分 7.5，危害等级高。攻击者可通过构造特制的 HTTP 请求头实现远程信息窃取，无需任何前置权限。"
published = "2016-10-07T14:59:00.193"
remediation = "升级 Eclipse Jetty 至 9.2.9.v20150224 或更高版本。如无法立即升级，可在反向代理或 WAF 层面过滤包含非法字符（如 0x0 等控制字符）的 HTTP 请求头，作为临时缓解措施。"
score = 7.5
severity = "HIGH"
sources = ["nuclei"]
title = "Eclipse Jetty 敏感信息泄露漏洞"
updated = "2026-06-17T00:23:33.857"

