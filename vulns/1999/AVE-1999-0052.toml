[basic]
description = "Cobalt RaQ 微型服务器存在信息泄露漏洞，当用户通过交互式 Shell 会话登录系统时，生成的会话历史文件（如 .bash_history）默认权限为世界可读，且位于 Web 服务器可访问的目录下。远程攻击者无需身份认证即可通过 Web 服务器直接读取这些文件，获取敏感信息（如命令历史、密码等），进而可能导致服务器被完全控制。该漏洞影响 Cobalt RaQ 系列微型服务器产品。"
published = "1999-02-25T05:00:00.000"
remediation = "修改 /etc/profile 或 /etc/bashrc 中的 umask 设置为 077，确保新建文件默认仅属主可读写。同时配置 Apache 的 &lt;FilesMatch&gt; 规则拒绝访问 .bash_history 等点号开头的隐藏文件，并清理已存在的历史文件权限为 600。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "Cobalt RaQ 微服务器 shell 历史记录文件信息泄露漏洞"
updated = "2026-06-16T21:48:19.997"

