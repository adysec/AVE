[basic]
description = "AVCON网络视频服务系统editusercommit.php接口存在未授权任意用户密码重置漏洞。攻击者无需任何身份认证即可通过POST请求直接修改系统中任意用户的密码，可导致管理员账号被接管，系统数据泄露和服务被控制，属于高危越权操作。"
published = "2024-01-01"
remediation = "在editusercommit.php中添加用户身份验证和CSRF Token校验机制，禁止未授权直接修改密码；配置Web服务器访问控制规则限制管理接口仅允许内部网络访问；联系AVCON厂商获取官方安全补丁并升级到最新版本。"
score = 5.0
severity = "MEDIUM"
sources = ["hwpoc"]
