[basic]
description = "Caldera Linux 中 smail 邮件传输代理的 rmail 命令在处理 `-D` 调试选项时未对 shell 元字符进行有效过滤，远程攻击者可利用该缺陷向目标发送特制邮件，传递恶意 shell 命令导致任意代码执行。该漏洞影响 Caldera OpenLinux 等版本，CVSS 评分 10.0，危害等级严重，厂商已发布补丁修复。"
published = "1999-01-29T05:00:00.000"
remediation = "立即停止使用 Caldera OpenLinux 自带的 smail 程序，升级至现代受支持的邮件传输代理（如 Postfix 或 Exim）。在 smail 配置中禁用 debug 选项（-D 参数），并通过防火墙限制对 smail 服务的远程访问。由于 Caldera OpenLinux 已停止维护，建议迁移至持续更新的 Linux 发行版。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "Caldera OpenLinux smail 远程代码执行漏洞"
updated = "2026-06-16T21:51:34.520"

