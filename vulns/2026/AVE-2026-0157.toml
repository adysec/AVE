[basic]
description = "九麒科技 BigAnt 即时通讯系统的 loginByToken 接口存在登录绕过漏洞，攻击者无需任何身份认证即可通过构造特制的 HTTP 请求直接以管理员身份登录系统。该漏洞源于 loginByToken 接口未对 token 参数进行有效性校验，导致传入任意字符串（如 admin）即可绕过登录验证。攻击者可利用该漏洞完全接管目标系统后台，获取通讯记录、组织结构等敏感信息，危害较大。"
published = "20260315"
remediation = "立即联系九麒科技获取 BigAnt 即时通讯系统最新安全更新，升级服务端至已修复 loginByToken 漏洞的版本。同时，在 Nginx 或反向代理层配置访问控制，限制 `/loginByToken` 接口仅允许可信内网 IP 段调用。若业务不需要 Token 免密登录功能，可在服务端配置文件中直接注释或移除该路由映射，并启用完整的身份认证流程（如密码+验证码或双因素认证）作为深度防御。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "九麒科技 BigAnt 即时通讯系统 登录绕过漏洞"
updated = "20260315"

