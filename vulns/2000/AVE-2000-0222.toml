[basic]
description = "微软 Hotmail 在渲染 HTML 邮件时对 IMG 标签的 LOWSRC、DYNSRC 等参数过滤不充分，攻击者可构造包含 JavaScript 代码的恶意 HTML 邮件，当受害者使用 Internet Explorer 打开邮件时脚本会在 Hotmail 域下执行。该跨站脚本漏洞可导致用户会话 cookie 被窃取、邮件被读取或转发，甚至以受害者身份执行操作。攻击条件为受害者使用 IE 浏览器查看包含特制 IMG 标签的 HTML 邮件，无需用户额外交互即可触发。"
published = "2000-01-04"
remediation = "升级至微软修复该过滤缺陷的 Hotmail 服务端版本；在邮件服务器端对 HTML 邮件的 IMG 标签 LOWSRC、DYNSRC 等参数进行 JavaScript 代码过滤，并部署邮件网关对入站邮件做内容安全检查，阻止包含脚本的 HTML 标签渲染；客户端在 IE 中禁用 HTML 邮件的脚本执行。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "微软 Hotmail HTML 邮件 IMG 标签 LOWSRC/DYNRC 参数跨站脚本漏洞"
updated = "2026-07-18"

