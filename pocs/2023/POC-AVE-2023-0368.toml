[info]
author = "AVE"
description = """cJSON 1.7.18之前版本中parse_string函数存在堆缓冲区越界读取漏洞，通过传入'{"1":1,'（无尾部换行符）调用cJSON_ParseWithLength可触发OOB read"""
id = "POC-AVE-2023-0368"
name = "CVE-2023-53154 PoC"
severity = "medium"
tags = [
    "cve-2023-53154",
    "ave-2023-0368",
]
vuln_id = [
    "CVE-2023-53154",
    "AVE-2023-0368",
]

[poc]
logic = "any"

[[poc.requests]]
path = "/tmp/ave-acp-workspace/cve-2023-53154-poc.json"
protocol = "file"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ['{"1":1,']
