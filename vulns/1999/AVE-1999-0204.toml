[basic]
description = "ToxSoft NextFTP 1.82 客户端存在缓冲区溢出漏洞，远程攻击者可通过向 FTP 服务器发送特制的 CWD（Change Working Directory）命令触发该漏洞，导致目标系统上的 NextFTP 客户端程序崩溃或执行任意代码。该漏洞影响 NextFTP 1.82 版本，攻击者需诱骗用户连接至恶意 FTP 服务器，利用难度中等。"
published = "1999-08-03T04:00:00.000"
remediation = "ToxSoft 已停止运营，官方未发布补丁。建议立即停止使用 NextFTP 1.82，迁移至仍受维护的 FTP 客户端（如 FileZilla、WinSCP）。如暂时无法替换，可通过网络防火墙或 IPS 规则拦截包含超长 CWD 命令的 FTP 请求，作为临时缓解措施。"
score = 5.1
severity = "MEDIUM"
sources = ["avd"]
title = "ToxSoft NextFTP 远程缓冲区溢出漏洞"
updated = "2026-06-16T21:48:48.857"

