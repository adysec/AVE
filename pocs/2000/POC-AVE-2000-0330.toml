[info]
author = "ave"
description = "Microsoft Internet Explorer 5 Active Movie ActiveX 控件（CLSID:05589FA1-C356-11CE-BF01-00AA0055595A）对 Filename 参数缺少类型校验，攻击者可在 HTML 中嵌入 OBJECT 标签并指定任意路径文件下载到目标系统 Windows Temp 目录，配合其他漏洞可执行任意代码。"
id = "POC-AVE-2000-0330"
name = "CVE-2000-0400 Microsoft Active Movie ActiveX Arbitrary File Download PoC"
severity = "high"
tags = ["ave-2000-0330"]
vuln_id = [
    "CVE-2000-0400",
    "AVE-2000-0330",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["05589FA1-C356-11CE-BF01-00AA0055595A"]
