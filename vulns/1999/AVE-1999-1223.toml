[basic]
description = "BNC IRC代理软件2.2.4/2.4.6/2.4.8版本中存在缓冲区溢出漏洞，远程攻击者可通过向代理服务发送特制的USER命令参数触发溢出，从而获取目标系统的控制权限。攻击无需身份认证，攻击者利用该漏洞可完全控制运行BNC代理的主机。"
published = "1998-12-26"
remediation = "升级BNC IRC代理至2.4.9及以上版本，或应用厂商发布的安全补丁。由于该漏洞年代久远且BNC项目已停止维护，建议迁移至其他受支持的IRC代理软件如ZNC或IRC Proxy，并确保系统整体安全更新。"
score = 7.5
severity = "HIGH"
