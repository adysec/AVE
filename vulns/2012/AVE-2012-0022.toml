[basic]
description = "ManageEngine Firewall Analyzer 7.2 及 8.0 版本存在跨站脚本（XSS）漏洞。远程攻击者可通过向 createAnomaly.do、mindex.do、index2.do、syslogViewer.do 等页面的 subTab、tab、url、port 参数注入恶意 Web 脚本或 HTML 代码，当管理员查看日志时脚本被执行，导致敏感信息窃取。该漏洞影响 ManageEngine Firewall Analyzer 全系列，CVSS 评分 4.3，危害等级中危。"
published = "2012-09-10T22:55:07.413"
remediation = "立即升级 ManageEngine Firewall Analyzer 至当前最新版本（12.8 或更高），该问题已在 7.2 之后的安全更新中修复。如无法升级，在 Web 服务器或反向代理层面配置输入校验规则，对 createAnomaly.do、mindex.do、index2.do、syslogViewer.do 等接口的 subTab、tab、url、port 参数进行严格过滤，拦截 HTML 标签和 JavaScript 关键字；同时在应用层对所有用户输入输出实施上下文相关的 HTML 编码转义，防止反射型 XSS 执行。"
score = 4.3
severity = "MEDIUM"
sources = ["nuclei"]
title = "ManageEngine Firewall Analyzer 跨站脚本与目录遍历漏洞"
updated = "2026-06-16T23:45:51.113"

