[basic]
description = "RedHat Linux 5 系统中的 DHCP 客户端脚本 ifdhcpc-done 存在符号链接漏洞。当 DHCP 客户端获取到 IP 地址时，该脚本会以不安全的方式向 /tmp/dhcplog 文件追加日志，攻击者可通过预先创建指向任意系统文件（如 /etc/passwd）的符号链接，导致日志内容被追加到目标文件中，进而实现本地权限提升或破坏系统文件完整性。该漏洞需攻击者拥有本地用户权限，且 DHCP 客户端被触发时方可利用。"
published = "1998-03-09T05:00:00.000"
remediation = "建议升级 Red Hat Linux 至 6.0 及以上版本，该版本已修复 dhcp 客户端脚本中 dhcplog 文件路径可被符号链接预测的问题。如无法升级，可修改 /etc/sysconfig/network-scripts/ifdhcpc-done 脚本，将日志写入使用 mktemp 创建的临时文件而非固定路径 /tmp/dhcplog，并确保脚本以非 root 权限运行以限制文件写入范围。"
score = 2.1
severity = "LOW"
sources = ["avd"]
title = "RedHat DHCP ifdhcpc-done 脚本符号链接漏洞"
updated = "2026-06-16T21:50:22.473"

