[basic]
description = "WinVerifyTrust 函数在处理 Windows Authenticode 签名验证时存在安全功能绕过漏洞。该漏洞源于系统对可移植可执行文件（PE）的数字签名验证不充分，攻击者可通过修改已签名的可执行文件，在保留原有有效签名的情况下向文件中注入恶意代码。攻击条件要求用户或应用程序运行攻击者特制的带签名 PE 文件，成功利用后可导致任意代码执行，攻击者能够安装程序、查看/更改/删除数据或创建具有完全用户权限的新账户。该漏洞影响所有 Windows 10/11 及 Windows Server 版本，Microsoft 未默认启用严格验证，需通过注册表 EnableCertPaddingCheck 键值手动开启修复。"
published = "2013-12-11T00:55:03.693"
remediation = '通过注册表启用证书填充检查（EnableCertPaddingCheck）缓解此漏洞：在 HKLM\Software\Microsoft\Cryptography\Wintrust\Config 下创建 DWORD 值 EnableCertPaddingCheck 并设为 1。该配置适用于 Windows 10/11 及 Windows Server 2016/2019/2022 等所有受支持版本，无需安装额外安全更新。设置后重启系统使配置生效。'
score = 5.5
severity = "MEDIUM"
sources = ["kev"]
title = "Microsoft Windows WinVerifyTrust 签名验证远程代码执行漏洞"
updated = "2026-06-16T23:55:59.243"

