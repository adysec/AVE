[basic]
description = "War FTP Daemon（WarFTP）1.70 及 1.67b2 版本中的宏（Macros）功能存在安全漏洞，本地或远程攻击者可通过向 FTP 服务器发送特制的宏命令，绕过访问限制实现任意文件读取或远程命令执行。该漏洞无需身份认证即可利用，影响范围广，CVSS 评分高达 10.0，危害等级严重。"
published = "2000-01-06T05:00:00.000"
remediation = "立即升级至 WarFTPD 1.75 及以上版本，该版本已修复宏注入漏洞。由于该软件已停止维护不再提供安全更新，建议迁移至 FileZilla Server 或 vsftpd 等仍在维护的 FTP 服务器软件。如无法立即迁移，可在防火墙层面限制 FTP 服务端口（默认 21）仅对可信 IP 开放，并禁用匿名登录和宏功能作为临时缓解措施。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "WarFTPD 代码执行与任意文件读取漏洞"
updated = "2026-06-16T21:50:53.137"

