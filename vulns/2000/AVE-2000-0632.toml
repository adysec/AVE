[basic]
description = "Kerberos 4 KDC 程序的 kerb_err_reply 函数在处理 e_msg 变量时存在缓冲区溢出漏洞，由于未对输入数据长度进行有效验证，远程攻击者可通过向目标 KDC 服务器发送特制的恶意认证请求数据包触发缓冲区溢出，导致 Kerberos 认证服务进程崩溃，造成拒绝服务。该漏洞影响运行 Kerberos 4 版本的系统，CVSS 评分 5.0，危害等级中等。修复方式包括升级到已修复版本或应用厂商提供的安全补丁。"
published = "2000-06-09"
remediation = "升级 MIT Kerberos 4 至 patch10 以上版本，或升级 MIT Kerberos 5 至 1.2 版本；KTH-krb4 用户升级至 0.10 及以上版本。具体修复为将 kerb_err_reply 函数中 strcat 替换为 strncat 以限制 e_msg 缓冲区写入长度，同时增加对请求包中各字段长度的边界检查。如无法升级，建议在 KDC 主机上通过防火墙限制对 750/751/752 端口的访问来源。"
score = 5.0
severity = "MEDIUM"
sources = [
    "cve",
    "mit",
]
title = "MIT Kerberos 4 KDC 缓冲区溢出拒绝服务漏洞"
updated = "2026-06-16"

