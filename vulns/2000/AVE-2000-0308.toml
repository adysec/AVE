[basic]
description = "Standard & Poor's ComStock 4.2.4 中的 mcsp（MultiCSP）客户端站点处理器系统在安装时预设了多个无密码或使用极易猜测的默认密码的账户。远程攻击者可利用这些弱口令登录系统，进而获取敏感金融数据甚至执行任意命令，导致系统完全失陷。该漏洞 CVSS 评分 10.0，危害等级严重，影响所有使用默认配置的 ComStock 系统。"
published = "2000-01-31T05:00:00.000"
remediation = "立即修改 MultiCSP 系统中所有内置账户的默认密码，为每个账户设置高强度复杂密码；删除不必要的默认账户；限制对 ComStock 服务的网络访问，仅允许受信任 IP 连接；如条件允许，升级到最新版本以获取安全修复。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "Standard & Poor's ComStock 4.2.4 默认口令导致远程命令执行漏洞"
updated = "2026-06-16T21:51:01.183"

