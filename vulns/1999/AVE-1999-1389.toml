[basic]
description = "Apache HTTP Server 1.3.1 及更早版本存在一个 MIME 头部处理缺陷，攻击者可向目标服务器发送大量具有相同名称的 MIME 头部，触发服务器资源耗尽漏洞，导致服务不可用。该漏洞影响广泛，可被未授权远程攻击者轻易触发，通过精心构造的 HTTP 请求即可利用此缺陷，严重威胁Web服务器的稳定运行。"
published = "1998-08-07T04:00:00.000"
remediation = "建议立即升级 Apache HTTP Server 至 1.3.2 或更高版本（建议升级至 2.4.x 最新稳定版）。临时缓解措施：在 httpd.conf 中设置 LimitRequestFields 100 限制请求头字段数量，设置 LimitRequestFieldSize 8190 限制单个字段大小，并配置 LimitRequestBody 限制请求体大小，重启 Apache 生效。"
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "Apache HTTP Server 1.3.1 MIME Header 拒绝服务漏洞"
updated = "2026-06-16T21:49:55.757"

