[basic]
description = "Finger 服务是早期 Unix/Linux 系统中用于查询远程用户信息的网络协议服务（TCP 79 端口）。Windows NT 及 Windows 2000 系统中若开启并运行了 Finger 服务，未经身份认证的远程攻击者可通过 Finger 协议向目标服务器发送查询请求，获取系统上有效的用户账号列表、用户状态及系统信息等敏感数据。该漏洞无需任何身份验证即可触发，攻击者可利用泄露的用户名信息进行后续暴力破解、社会工程学或定向攻击，从而进一步危害系统安全。受影响范围包括启用了 Finger 服务的 Windows NT 4.0、Windows 2000 Professional/Server 等版本。建议用户关闭系统中不必要的 Finger 服务，禁用 TCP 79 端口监听，以消除信息泄露风险。"
published = "1997-03-01T05:00:00.000"
remediation = "在 Windows NT 4.0 或 Windows 2000 系统中，打开服务管理器找到 Finger 服务，将启动类型设置为「已禁用」并停止该服务。同时，在防火墙中关闭 TCP 79 端口的入站连接，或在注册表中删除或禁用 Finger 服务相关项，以防止未经授权的远程用户查询系统账户信息。"
score = 5.0
severity = "MEDIUM"
sources = ["epss"]
title = "Microsoft Windows NT/2000 Finger 服务信息泄露漏洞"
updated = "2026-06-16T21:48:44.177"

