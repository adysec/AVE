[basic]
description = "Cat Soft Serv-U FTP Server 2.5/a/b 版本中存在缓冲区溢出漏洞，该漏洞位于 SHGetPathFromIDList 函数处理 .lnk 快捷方式文件的过程中。远程攻击者可通过向 FTP 服务器发送特制的 LIST 命令，传入畸形的 .lnk 文件路径触发缓冲区溢出，导致目标 FTP 服务进程崩溃，造成拒绝服务。该漏洞影响 Windows 95/98/2000/NT 4.0 平台上的 Serv-U FTP Server 2.5/a/b 版本，无需身份认证即可远程触发。"
published = "2000-02-04T05:00:00.000"
remediation = "升级到 Serv-U FTP Server 3.0 或更高版本。若无法升级，在防火墙中禁用主动 FTP 模式并限制 .lnk 文件上传的 MIME 类型检查作为临时缓解。"
score = 2.1
severity = "LOW"
sources = ["avd"]
title = "Cat Soft Serv-U FTP Server 畸形 .lnk 文件处理缓冲区溢出漏洞"
updated = "2026-06-16T21:51:03.660"

