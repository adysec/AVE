[basic]
description = "IIS 和 Site Server 中的 code.asp 示例文件存在任意文件读取漏洞。远程攻击者无需身份认证，只需向目标服务器发送特制的 HTTP 请求即可利用该示例文件的参数读取服务器上的任意文件，包括系统配置文件、源代码等敏感信息。该漏洞影响早期版本的 Microsoft IIS 和 Site Server，攻击门槛低，危害较大。官方推荐删除或禁用 code.asp 示例文件以修复此漏洞。"
published = "1999-05-07T04:00:00.000"
remediation = '删除 IIS 默认安装的示例文件 %SystemRoot%\Help\iis\htm\core\code.asp，或安装微软 1999 年发布的相关安全更新。临时的缓解措施是通过 IIS 管理器移除 "IIS Samples" 虚拟目录，并在 URLScan 中屏蔽对 .asp 示例文件的访问。'
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Microsoft IIS 任意文件读取漏洞"
updated = "2026-06-16T21:48:57.270"

