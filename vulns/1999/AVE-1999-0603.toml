[basic]
description = "NetBSD 系统的 netstat 命令存在本地内核内存泄露漏洞。由于 netstat 工具在处理网络统计信息时未能正确限制对内核内存区域的访问权限，本地攻击者可通过执行特制的 netstat 命令读取内核敏感数据，导致内核信息泄露。该漏洞影响早期 NetBSD 版本，攻击者需具有本地系统访问权限才能利用，CVSS 评分 2.1，危害等级低。"
published = "1999-02-09T05:00:00.000"
remediation = "升级 NetBSD 至 1.4.1 或更高版本，该漏洞已在 NetBSD 1.4.1 的安全补丁中修复。如无法升级，可通过 chmod 700 /usr/bin/netstat 限制 netstat 命令的执行权限，仅允许 root 用户使用，作为临时缓解措施。"
score = 2.1
severity = "LOW"
sources = ["avd"]
title = "NetBSD netstat 本地内核内存访问漏洞"
updated = "2026-06-16T21:48:14.657"

