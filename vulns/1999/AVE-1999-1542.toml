[basic]
description = "Quake 1.9 客户端存在缓冲区溢出漏洞，远程恶意服务器可通过向客户端发送超长的预缓存路径（precache paths）、服务器名称、服务器地址或 map 控制台命令参数触发该漏洞，导致任意代码执行。攻击者只需运行恶意游戏服务器即可利用此漏洞，无需用户交互。该漏洞影响 Quake 1.9 及更早版本，CVSS 评分 7.5，危害等级高。"
published = "1998-04-08T04:00:00.000"
remediation = "升级到 Quake 1.9 之后的补丁版本（如 QuakeWorld 2.30+），或安装官方社区发布的客户端安全补丁。若无法升级，建议仅连接信任服务器，禁用自动下载 precache 资源的功能，并通过防火墙限制客户端仅访问指定服务器 IP 范围。使用替代客户端如 QuakeSpasm 或 FitzQuake 亦可有效缓解。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "id Software Quake 缓冲区溢出代码执行漏洞"
updated = "2026-06-16T21:50:34.727"

