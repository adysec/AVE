[basic]
description = 'Majordomo 1.89/1.90 版本存在命令执行漏洞。远程攻击者可通过向邮件列表服务器发送特制的电子邮件，在 Reply-To 字段中注入恶意 "lists" 命令参数，从而在目标系统上以 Majordomo 进程权限执行任意命令。该漏洞影响 Majordomo 1.89 及 1.90 版本，CVSS 评分 7.5，危害等级高。目前官方已在后续版本中修复此问题。'
published = "1994-06-09T04:00:00.000"
remediation = "升级至 Majordomo 2.x 或最新稳定版本。如无法升级，编辑 Majordomo 源代码中 `Reply-To` 头处理逻辑，对 `lists` 等命令参数进行严格的输入过滤和 shell 元字符转义，禁止将未经验证的用户输入直接传递给 `system()` 或 `exec()` 调用。也可在 MTA 层面限制 Majordomo 可执行命令的白名单。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "Majordomo lists 命令执行漏洞"
updated = "2026-06-16T21:47:54.727"

