[basic]
description = "Linux系统内核日志守护进程klogd存在安全漏洞，该进程无法正确清理用户输入的格式字符串。当攻击者触发异常的内核消息时，可以利用此漏洞在本地提权，获得root权限。该漏洞影响多种Linux厂商的klogd服务，攻击者无需远程身份认证即可通过引发特定的内核消息来执行任意代码，严重威胁系统安全。"
published = "2000-11-14T05:00:00.000"
remediation = "建议立即升级 Linux 内核及 klogd 到修复版本：Red Hat 6.2/7.0 升级至 klogd-1.4.1-5 或更高版本，Debian 2.2 升级至 klogd_1.4.1-5.1 或更高，SuSE 6.4/7.0 升级至 klogd-1.4.1-31 或更高，Mandrake 7.1/7.2 升级至 klogd-1.4.1-2.1 或更高。临时缓解措施：限制 klogd 权限运行（使用 -u 参数指定非 root 用户），或在 /etc/syslog.conf 中限制内核日志权限，禁止普通用户触发内核消息生成。"
score = 7.2
severity = "HIGH"
sources = ["cve"]
title = "Linux klogd 格式化字符串本地提权漏洞"
updated = "2026-06-16T21:52:38.097"

