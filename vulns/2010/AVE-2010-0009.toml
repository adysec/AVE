[basic]
description = "Joomla! 的 GCalendar 组件（com_gcalendar）2.1.5 版本存在目录遍历漏洞，远程攻击者无需身份认证即可通过向 index.php 的 controller 参数提交包含 `..`（点点）的恶意路径，实现任意本地文件的包含与执行。该漏洞影响 Joomla! 中使用 com_gcalendar 组件的网站，CVSS 评分 7.5，危害等级高，攻击复杂度低且无需特权。"
published = "2010-03-16T19:00:00.727"
remediation = "立即卸载 Joomla! 的 GCalendar Suite 组件（com_gcalendar）2.1.5 及所有更早版本，该扩展已停止维护无补丁可用。如因业务需要暂时保留，可在 Joomla! 全局配置中启用「输入过滤」并将「过滤选项」设为「白名单」以拦截路径遍历 payload，或在 Web 服务器（Apache/Nginx）层面添加规则过滤 controller 参数中的 ../ 序列。建议改用仍在维护的日历扩展替代。"
score = 7.5
severity = "HIGH"
sources = ["nuclei"]
title = "Joomla! GCalendar 组件本地文件包含漏洞"
updated = "2026-06-16T23:17:14.237"

