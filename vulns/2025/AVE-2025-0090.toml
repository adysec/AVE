[basic]
description = "深大智能科技管控平台服务端 API.asmx 接口存在 SQL 注入漏洞，攻击者可在未经身份认证的情况下向目标系统发送特制的 HTTP 请求，通过构造恶意 SQL 语句注入后端数据库查询，导致数据库中的敏感信息（如用户凭证、业务数据等）被泄露、篡改或删除。该漏洞攻击门槛低，无需登录即可远程利用，危害性较高。"
published = "0723"
remediation = "对 API.asmx 中所有接收用户输入的参数实施参数化查询或预编译语句，禁止拼接 SQL 字符串；同时部署 Web 应用防火墙（WAF）拦截 SQL 注入攻击载荷；限制数据库连接账户权限为仅执行必要存储过程，避免使用高权限账户运行 Web 应用。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "深大智能科技 管控平台服务端API.asmx SQL注入漏洞"
updated = "0723"

