[basic]
description = "Kerberos 5 认证协议套件中的 ksu 工具存在缓冲区溢出漏洞，本地攻击者可通过向 ksu 程序发送特制的输入数据触发缓冲区溢出，从而覆盖内存中的关键数据，成功利用此漏洞可获得目标系统的 root 权限。该漏洞影响 Kerberos 5 的多个发行版本，攻击复杂度低，无需身份认证即可利用，危害等级高。建议用户及时升级到修复版本以消除风险。"
published = "2000-05-16T04:00:00.000"
remediation = "立即升级 MIT Kerberos 5 至 1.1.1 或更高版本，该版本已修复 ksu 缓冲区溢出漏洞。Red Hat 用户请安装 RHSA-2000-025 提供的更新包。如无法升级，可移除 ksu 的 setuid 权限作为临时缓解：chmod u-s /usr/kerberos/bin/ksu。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "MIT Kerberos 5 ksu 缓冲区溢出漏洞"
updated = "2026-06-16T21:51:37.220"

