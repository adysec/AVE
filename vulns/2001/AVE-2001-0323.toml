[basic]
description = "Cisco HSRP（热备路由协议）存在拒绝服务漏洞，源于 HSRP 协议未对数据包来源进行有效身份验证。本地攻击者可在同一广播域内伪造伪造的 HSRP 数据包，冒充活跃路由器发送优先级更高的 Hello 包，导致备份路由器频繁抢占主备状态，引发路由震荡并导致网络服务中断。该漏洞影响运行 HSRP 协议的 Cisco 路由器及三层交换机，攻击者需具备本地网络访问权限（同一二层网段），通过发送伪造优先级为 255 的 HSRP 数据包即可触发主备切换风暴，导致网络拓扑不稳定并造成拒绝服务。CVSS 评分 2.1（AV:L/AC:L/Au:N/C:N/I:N/A:P），属本地低危漏洞，Cisco 已发布补丁修复该漏洞。"
published = "2001-10-18T04:00:00.000"
remediation = "升级到支持 HSRP 认证的 Cisco IOS 版本，并配置强密码认证。配置独立型 HSRP 认证（type 7 或 type 0 明文方式），同时限制 HSRP 报文源 IP 验证。禁用本端已知危险的 HSRP 配置，如使用了不安全的认证或未启用的端口后监听。实施 HSRP 流量过滤，确保只能从信任网段发送 HSRP 报文，以防止中间人攻击。定期检查 IOS 软件补丁和安全公告，及时应用 Cisco 发布的 HSRP 安全更新。重新启动设备后验证 HSRP 状态，确保协议已正确配置和运行。"
score = 2.1
severity = "LOW"
sources = ["exploitdb"]
title = "思科 HSRP 拒绝服务漏洞"
