[basic]
description = "该漏洞存在于KDE 1.1及其派生版本（1.1.1/1.1.2/1.2）中的kdesud程序中，由于对DISPLAY环境变量的处理不当，导致发生缓冲区溢出。攻击者通过设置过长的DISPLAY环境变量，破坏程序正常堆栈结构，可能劫持控制权并执行任意代码。该漏洞仅需本地权限即可触发，但其影响非常严重，能够完全破坏目标系统的保密性、完整性和可用性，允许攻击者获得root权限并完全掌控受损主机。该漏洞影响各个Linux发行中安装了KDE桌面环境的系统，尤其是在使用较旧的KDE 1.x系列时风险更高。攻击者可通过编写恶意shell脚本或通过图形登录界面触发此漏洞，实现系统权限提升并完全控制目标主机。微软KDE团队已发布安全补丁，用户应及时升级至支持的安全版本以修复此漏洞。"
published = "2000-05-27T04:00:00.000"
remediation = "建议升级 KDE 至 2.0.1 或更高版本（该版本已修复 kdesud DISPLAY 环境变量缓冲区溢出漏洞），或升级至 KDE 2.1.1 及以上稳定版本。若无法立即升级，可通过限制 DISPLAY 环境变量长度（如 export DISPLAY=:0.0）或在不需要 kdesud 服务时卸载/禁用 kdesud 服务作为临时缓解措施。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "KDE kdesud DISPLAY环境变量缓冲区溢出漏洞"
updated = "2026-06-16T21:51:46.943"

