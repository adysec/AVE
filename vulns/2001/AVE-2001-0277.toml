[basic]
description = "该漏洞存在于KDE的kdesu组件中，核心问题在于kdesu在创建临时文件时未设置严格文件权限，导致临时文件对任意用户可读。该临时文件存储了用户名、密码等关键认证凭证。攻击者仅需本地访问目标系统，即可读取这些临时文件获取系统认证信息，进而实现权限提升攻击。该漏洞影响范围广泛，涵盖所有使用旧版kdesu组件的Linux系统，攻击门槛较低且成功率较高。攻击者通常通过编写简单脚本获取临时文件读取权限，提取其中的认证信息，利用这些凭证进行系统权限提升或进一步攻击。该漏洞反映了软件开发中临时文件权限处理不当的典型安全问题，已成为Linux权限提升攻击中常见的利用手段之一。该漏洞最早于2001年披露，影响当时主流Linux发行版中的KDE桌面环境组件。建议升级到Mandrake Linux MDKSA-2001:046或Red Hat RHSA-2001:059提供的安全补丁版本，或改用支持ACL权限管理的替代su方法，禁用kdesu临时文件认证方式。CVSS评分4.6，严重程度为中等。"
published = "2001-06-27T04:00:00.000"
remediation = "升级 kdesu 到 Mandrake Linux MDKSA-2001:046 或 Red Hat RHSA-2001:059 中提供的安全补丁版本，修复临时文件权限设置漏洞。如无法立即更新，建议切换到 ACL 权限管理的替代 su 方法，禁用 kdesu 临时文件认证或使用既有 root 密码直接 sudo 命令认证，并在使用过程中通过 `sudo -A` 避免临时文件泄露。"
score = 4.6
severity = "MEDIUM"
sources = ["redhat"]
title = "KDE kdesu 权限提升漏洞"
updated = "2026-06-16T21:54:24.987"

