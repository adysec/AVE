[basic]
description = "Cart32 等多款购物车应用存在隐藏表单字段篡改漏洞。远程攻击者可通过修改 Web 表单中隐藏的价格、数量等敏感字段值，以低于原价的金额完成订单交易，导致商家经济损失。该漏洞影响 Cart32 2.5a/3.0、QuickCommerce 2.5/3.0、Shop Express 1.0 及 StoreCreator 3.0 等版本，攻击无需身份认证，仅需构造特制 HTTP 请求即可利用。"
published = "2000-02-01T05:00:00.000"
remediation = "对 Cart32 等购物车应用，升级至最新版本（Cart32 3.5a 及以上），确保所有价格、数量等敏感字段在服务端进行二次校验，禁止仅依赖前端隐藏表单字段传递数据。如无法升级，应通过服务端会话（Session）存储价格等关键信息，而非通过 HTML 隐藏域提交。同时部署 Web 应用防火墙（WAF）规则，拦截对隐藏表单字段的篡改请求。"
score = 7.5
severity = "HIGH"
sources = ["exploitdb"]
title = "Cart32/QuickCommerce/Shop Express/StoreCreator 等多款购物车应用隐藏表单字段信息篡改漏洞"
updated = "2026-06-16T21:51:04.510"

