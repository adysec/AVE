[basic]
description = "Allaire Forums 2.0.4 的 GetFile.cfm 文件存在任意文件读取漏洞。其原理是该脚本在读取文件时未对用户传入的参数进行充分的路径校验与限制，导致未授权远程攻击者可通过构造恶意的请求参数，使服务器返回 Web 目录之外的任意文件内容。该漏洞影响运行 Allaire Forums 2.0.4 版本的产品，攻击条件为攻击者能够访问存在漏洞的 GetFile.cfm 接口并发送特制 HTTP 请求，无需身份认证或特殊权限。利用方式即通过向 GetFile.cfm 提交包含越权路径的参数，读取配置文件、源代码等敏感信息，造成信息泄露并可用于进一步攻击。"
published = "2001-03-12T05:00:00.000"
remediation = "建议升级到 Allaire（后并入 Macromedia/Adobe）发布的 Allaire Forums 2.0.5 或更高版本，该版本移除了 GetFile.cfm 中未授权文件读取缺陷。若暂时无法升级，可在 Web 服务器端移除或重命名 GetFile.cfm 文件，并配置应用服务器仅允许通过认证会话访问文件下载接口，同时在防火墙层面对 Forums 目录的敏感文件请求做访问限制作为临时缓解。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Allaire Forums 2.0.4 任意文件读取漏洞"
updated = "2026-06-16T21:49:05.037"

