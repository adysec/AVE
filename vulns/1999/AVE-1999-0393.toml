[basic]
description = 'Majordomo 1.89/1.90 版本邮件列表管理软件中存在远程命令执行漏洞。攻击者可通过向目标服务器发送特制的邮件请求，在 Reply-To 字段中注入恶意 "lists" 命令参数，由于程序未对用户输入进行有效过滤，导致命令被直接执行。该漏洞影响 Majordomo 1.89 及 1.90 版本，CVSS 评分 7.5，危害等级高。攻击者无需身份认证即可远程利用，获取服务器控制权限。'
published = "1994-06-09T04:00:00.000"
remediation = "升级至 Majordomo 1.91 或更高版本，该版本修复了通过 Reply-To 头注入恶意命令的问题。如无法升级，可在邮件服务器上配置过滤器，拒绝来自不可信来源的发往 Majordomo 地址的邮件中含特殊构造的 Reply-To 字段。由于 Majordomo 已停止维护，建议迁移至现代邮件列表管理软件（如 GNU Mailman 3）。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "Majordomo 远程命令执行漏洞"
updated = "2026-06-16T21:47:54.727"

