[basic]
description = "Atrium Software Cassandra NNTP Server 1.10 存在缓冲区溢出漏洞，远程攻击者可通过向 NNTP 服务发送超长登录名（login）触发缓冲区溢出，导致服务进程崩溃并造成拒绝服务。该漏洞无需身份认证即可远程利用，攻击难度较低，影响 Cassandra NNTP Server 1.10 版本。目前已存在公开的利用代码。"
published = "2000-05-01T04:00:00.000"
remediation = "建议立即升级到 Cassandra NNTP Server 最新版本，或联系厂商确认是否已提供安全补丁。如该产品已停止维护，应迁移至其他仍在维护的 NNTP 服务器（如 INN、Leafnode 等）。作为临时缓解措施，在防火墙或 TCP Wrappers 层面限制对 NNTP 端口（119/TCP）的访问来源 IP，仅允许信任网段连接。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Atrium Software Cassandra NNTP Server 1.10 登录缓冲区溢出漏洞"
