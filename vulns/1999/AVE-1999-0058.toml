[basic]
description = "Microsoft IIS 2.0/3.0/4.0 的 ISAPI 扩展处理机制存在漏洞，当服务器以 SYSTEM 权限运行并加载 ISAPI 扩展时，远程攻击者可向目标发送特制请求，利用 GetExtensionVersion() 处理流程中的缺陷以 SYSTEM 权限执行任意命令。攻击者无需身份认证即可远程触发，完全控制受影响服务器，危害严重。"
published = "1999-02-19T05:00:00.000"
remediation = "建议升级至 Windows 2000 附带的 IIS 5.0 或更高版本，避免以 SYSTEM 账户运行 IIS 并限制 ISAPI 扩展加载权限；如无法升级，可禁用不必要的 ISAPI 扩展并降低应用程序映射权限。该漏洞已在 1999 年通过 Microsoft 安全公告 MS99-013 修复。"
score = 7.5
severity = "HIGH"
sources = ["exploitdb"]
title = "Microsoft IIS 2.0/3.0/4.0 ISAPI GetExtensionVersion 远程代码执行漏洞"
updated = "2026-06-16T21:48:20.530"

