[basic]
description = "Windows NT 和 Windows 2000 系统中存在用户账户密码强度不足的漏洞，本地用户或管理员账户若设置了弱口令或默认密码，攻击者可通过暴力破解或字典攻击等方���获取系统访问权限。该漏洞影响 Windows NT 4.0 及 Windows 2000 等版本，允许已获得本地访问权限的攻击者提升权限或横向移动。建议使用强密码策略并启用账户锁定机制以降低风险。"
published = "1997-01-01T05:00:00.000"
remediation = "通过本地安全策略（secpol.msc）启用密码必须符合复杂性要求策略，设置密码长度最小值至少 8 个字符，密码最长使用期限不超过 90 天，并启用账户锁定阈值（5 次无效登录后锁定 30 分钟）。对于已停服的 Windows NT/2000 系统，建议迁移至受支持的 Windows Server 版本并部署 Active Directory 组策略统一实施密码策略。"
score = 7.2
severity = "HIGH"
sources = ["epss"]
title = "Microsoft Windows NT/2000 账户可猜测密码漏洞"
updated = "2026-06-16T21:48:32.083"

