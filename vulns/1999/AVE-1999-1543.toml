[basic]
description = "NFR 1.5/1.6 中的 nfrd 组件存在拒绝服务漏洞，远程攻击者无需身份认证即可向目标系统发送构造的 TCP 空首部（null header）及空数据（null data）字段的畸形数据包，导致 nfrd 进程崩溃，造成拒绝服务。该漏洞影响 Network Flight Recorder 1.5 及 1.6 版本，CVSS 评分 5.0，危害等级中危。目前厂商已不再维护该产品，建议升级至替代解决方案。"
published = "1998-04-08T04:00:00.000"
remediation = "升级 NFR 至 2.0 或更高版本以修复此漏洞。如厂商已停止支持无法升级，建议在边界防火墙上配置规则过滤畸形 TCP 报文（空头部/空数据字段），或限制对 nfrd 服务的网络访问权限。同时考虑迁移至替代性网络监控方案。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Network Flight Recorder NFR 1.5/1.6 TCP空数据包拒绝服务漏洞"
updated = "2026-06-16T21:50:34.853"

