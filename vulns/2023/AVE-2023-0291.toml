[basic]
description = "H3C GR-1200W 路由器存在敏感信息泄露漏洞，其管理端相关接口或页面未对敏感数据进行充分保护，导致未授权用户可在未经身份认证的情况下，通过构造访问请求直接获取路由器配置文件、账号密码、设备序列号等敏感信息。该漏洞影响 H3C GR-1200W 系列路由器，攻击者只需能够访问设备管理服务端口（通常为 LAN 侧或暴露的 Web 管理界面），即可远程发起请求窃取信息，进而可能被用于进一步渗透控制网络设备。"
published = "08.08"
remediation = "升级 H3C GR-1200W 路由器固件至新华三官方发布的最新版本（MinMIB 2.0 修复版），登录 Web 管理后台在「系统管理-软件升级」中上传固件完成升级；升级前在「安全管理-访问控制」中限制管理接口仅允许内网可信 IP 访问，并修改默认管理员口令，作为无法及时升级时的临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "H3C GR-1200W 路由器敏感信息泄露漏洞"
updated = "08.08"

