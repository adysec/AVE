published = "2025-06-26T10:15:24.703"
updated = "2026-06-17T06:58:00.843"
remediation = "立即升级 cloud-init 至 25.1.3 及以上版本（通过包管理器 apt upgrade cloud-init 或从 GitHub 拉取最新源码编译安装）。如无法立即升级，编辑 systemd 单元覆盖文件 /etc/systemd/system/cloud-init-hotplugd.socket.d/override.conf，添加 SocketMode=0640，然后执行 systemctl daemon-reload && systemctl restart cloud-init-hotplugd.socket。注意核查 /run/cloud-init/ 目录下 FIFO 文件权限，确保非 root 用户无法写入。"
