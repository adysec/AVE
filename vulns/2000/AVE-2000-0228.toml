[basic]
description = "Dansie Shopping Cart（一款基于Perl语言的早期电子商务购物车应用程序）中的cart.pl文件存在操作系统命令注入漏洞。远程攻击者无需身份认证即可通过向表单变量中注入shell元字符（如反引号`、分号;、管道符|等）触发该漏洞，导致在目标服务器上以Web进程权限执行任意系统命令。该漏洞影响Dansie Shopping Cart的多个版本，CVSS v2评分5.0，危害等级中等。"
published = "2000-04-11"
remediation = "立即升级到 Dansie 官方发布的最新补丁版本，或手动修改 cart.pl：在所有表单变量传递给 system()/open()/反引号等 shell 调用前，使用 Perl 的 quotemeta() 函数转义特殊字符（; | & ` $ () {} [] !），并启用 Perl taint 模式（#!/usr/bin/perl -T）。若厂商已不再维护，建议立即迁移至当前仍受支持的购物车系统（如 Magento、WooCommerce），避免在生产环境继续使用该遗留软件。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Dansie Shopping Cart 代码执行漏洞"
updated = "2000-04-11"

