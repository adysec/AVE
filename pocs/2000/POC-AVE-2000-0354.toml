[info]
author = "ave"
description = "通过向 calendar_admin.pl 的配置字段提交管道符包裹的系统命令，利用 Perl open() 函数未过滤 shell 元字符的缺陷执行任意命令。访问 /cgi-bin/calendar_admin.pl 并在配置字段填入 |id| 即可触发。"
id = "POC-AVE-2000-0354"
name = "Matt Kruse Calendar Script 2.2 Arbitrary Command Execution PoC"
severity = "high"
tags = ["ave-2000-0354"]
vuln_id = [
    "CVE-2000-0432",
    "AVE-2000-0354",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/cgi-bin/calendar_admin.pl"
protocol = "http"

[poc.requests.body]
content = ""
type = "raw"

[poc.requests.headers]
User-Agent = "AVE/1.0"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["calendar_admin"]
