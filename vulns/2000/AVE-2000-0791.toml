[basic]
description = 'Microsoft Enterprise Manager 的数据转换服务（DTS）包中的"已注册服务器对话"对话框存在密码泄露漏洞。本地用户可通过该对话框以明文方式获取数据库连接密码，导致敏感凭据泄露。攻击者需具有本地系统访问权限，利用该漏洞可进一步扩大数据库访问控制范围。该漏洞属于" DTS 密码"漏洞的变种，影响 Microsoft SQL Server 相关组件，CVSS 评分 4.6，危害等级中危。'
published = "2000-07-11T04:00:00.000"
remediation = "安装 Microsoft 安全公告 MS00-041 提供的 SQL Server 7.0 DTS 密码修补程序（下载地址：https://download.microsoft.com/download/sql70/DTSPWFix/7.0/WIN98/EN-US/DTSUIi.exe）；使用 Windows 身份验证替代 SQL Server 身份验证以存储 DTS 包密码；限制 MSDB 数据库的 Guest 访问权限，仅授予 DTS 包所有者编辑权限；遵循最小权限原则，不为 DTS 包使用系统管理员账户。"
score = 4.6
severity = "MEDIUM"
sources = ["cve"]
title = "Microsoft Enterprise Manager DTS 密码信息泄露漏洞"
updated = "2026-06-16T21:52:11.880"

