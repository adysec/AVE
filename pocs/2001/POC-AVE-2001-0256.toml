[info]
author = "ave"
description = "构造包含恶意JavaScript的GIF图片，当Netscape Communicator 4.77之前版本用户访问包含该图片的页面并查看图片信息时，JavaScript在about:协议上下文中执行，可窃取浏览历史等敏感信息"
id = "POC-AVE-2001-0256"
name = "Netscape Navigator GIF注释JavaScript执行漏洞 PoC"
severity = "high"
tags = ["ave-2001-0256"]
vuln_id = [
    "CVE-2001-0596",
    "AVE-2001-0256",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/poc.gif"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["GIF89a"]
