[basic]
description = "网件 WN604 无线接入点的 Web 管理界面中 downloadFile.php 脚本存在信息泄露漏洞，未对用户请求进行身份验证。远程攻击者无需认证即可通过向 /downloadFile.php?file=config 发送 GET 请求下载设备配置文件，导致无线配置、管理员凭据等敏感信息泄露。"
published = "2024-07-10"
remediation = "网件厂商未针对此漏洞发布官方补丁。建议通过防火墙规则或 Web 服务器配置限制对 downloadFile.php 的访问，仅允许受信任 IP 访问管理界面，同时禁用不必要的文件下载功能。"
