[basic]
description = "Nortel Networks Optivity NETarchitect 2.0 中的 bna_pass 程序存在不安全的环境变量调用漏洞。该程序在执行 rm 命令时直接依赖 PATH 环境变量来定位可执行文件路径，而非使用绝对路径。本地攻击者可通过修改 PATH 环境变量，将恶意程序放置在搜索路径中优先于系统 rm 程序被调用，从而以 bna_pass 程序的权限执行任意命令。该漏洞影响 Optivity NETarchitect 2.0 版本，CVSS 评分 7.2，危害等级高，攻击者需拥有本地系统访问权限。"
published = "1999-12-29T05:00:00.000"
remediation = "修改 bna_pass 程序源码，将调用 rm 命令处改为绝对路径 /bin/rm，避免依赖 PATH 环境变量查找可执行文件。如无法修改源码，可移除 bna_pass 的 setuid/setgid 权限位（chmod u-s /path/to/bna_pass），或限制仅受信任的管理员用户可执行该程序。鉴于该产品已停止维护，建议迁移至替代网络管理方案并隔离老旧系统。"
score = 7.2
severity = "HIGH"
sources = ["exploitdb"]
title = "Nortel Networks Optivity NETarchitect 本地权限提升漏洞"
updated = "2026-06-16T21:50:48.877"

