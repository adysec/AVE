[basic]
description = "Sun iPlanet Web Server Enterprise Edition 4.1 及更早版本的 Web Publisher 模块存在缓冲区溢出漏洞。远程未经身份认证的攻击者可通过发送包含超长 URI 的 GETPROPERTIES、GETATTRIBUTENAMES 或其他 WebDAV 方法请求，触发缓冲区溢出，导致服务拒绝并可能实现远程任意代码执行。该漏洞影响 iPlanet Web Server Enterprise Edition 4.1 及更早版本，攻击向量为网络远程、低攻击复杂度、无需认证，CVSS 评分 10.0（严重），可导致系统完全失陷。攻击者只需发送精心构造的超长 URI 请求即可触发漏洞，公开 Exploit 代码已存在（ExploitDB-20853 等）。"
published = "2001-10-18T04:00:00.000"
remediation = "建议立即使用 Oracle HTTP Server (OHS) 或 Apache 等受支持的Web服务器，完全迁移旧版iPlanet Web Server Enterprise Edition。请先联系Sun/Oracle获取最新的安全补丁包或支持服务协议。如果无法即时更换，建议立即关闭Web Publisher模块服务，并通过防火墙限制对服务的网络访问，同时将Web服务器的URI长度限制设置为不超过8KB，最大头部大小限制为4KB，以缓解缓冲区溢出风险。"
score = 10
severity = "CRITICAL"
sources = ["exploitdb"]
title = "iPlanet Web Server Enterprise Edition 4.1 Web Publisher 远程缓冲区溢出漏洞"
updated = "2026-06-16T21:54:52.870"

