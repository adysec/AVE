[basic]
description = "Microsoft Windows NT 4.0 的 Phone Dialer（dialer.exe）存在缓冲区溢出漏洞。攻击者可通过向 dialer.ini 配置文件写入特制的畸形拨号条目，在程序解析该条目时触发缓冲区溢出，导致任意代码执行。该漏洞影响 Windows NT 4.0 及所有 Service Pack 版本，攻击者需具备本地或远程写入 dialer.ini 文件的能力。成功利用后可获取目标系统控制权。"
published = "1999-07-29T04:00:00.000"
remediation = "升级至 Windows NT 4.0 Service Pack 6a (SP6a) 或安装 Microsoft 安全公告 MS99-037 提供的补丁。如无法升级，通过 NTFS 权限限制 dialer.ini 文件仅允许 Administrators 组写入，并移除 dialer.exe 的 Everyone 执行权限作为临时缓解措施。"
score = 6.2
severity = "MEDIUM"
sources = ["avd"]
title = "Microsoft Windows NT 4.0 Phone Dialer 缓冲区溢出漏洞"
updated = "2026-06-16T21:48:52.550"

