[basic]
description = "OSF Distributed Computing Environment (DCE) 安全守护进程 (secd) 在处理过长的 principal、group 或 organization 参数时存在栈缓冲区溢出漏洞。攻击者无需认证即可通过网络向 secd 服务发送特制长字符串，触发缓冲区溢出，导致 secd 进程崩溃，造成拒绝服务。该漏洞影响 IRIX 6.4 及更早版本。"
published = "1997-10-24"
remediation = "应用 SGI 安全公告 19980601-01-PX 提供的补丁，升级 IRIX 至修复版本；或禁用不必要的 DCE secd 服务以降低暴露面。"
score = 5.0
severity = "MEDIUM"
sources = [
    "cve",
    "avd",
]
title = "SGI IRIX OSF DCE secd 缓冲区溢出拒绝服务漏洞"
