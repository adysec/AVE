[basic]
description = "Sun SunOS 4.1 至 4.1.3 版本中存在权限许可漏洞，系统对 crash 等文件及目录设置了不安全的默认权限，导致本地普通用户可读取或修改敏感系统文件，进而将权限提升至 root 级别。攻击者需拥有本地系统访问权限，无法远程利用，但一旦获取低权限账号即可提权，对系统安全性造成严重威胁。"
published = "1993-02-03"
remediation = "升级 SunOS 至 4.1.4 或更高版本，该版本修复了 crash 等系统文件及目录的默认权限问题。临时缓解措施：手动将 /var/crash 等敏感目录权限修改为 700，限制仅 root 用户可访问，并检查系统内其他存在不安全默认权限的文件和目录。"
score = 7.2
severity = "HIGH"
sources = ["cve"]
title = "Sun SunOS 本地权限提升漏洞"
updated = "2026-06-16"

