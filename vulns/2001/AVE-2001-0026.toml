[basic]
description = "IBM DB2 Universal Database for Windows NT 6.1 及 7.1 版本存在 SQL 拒绝服务漏洞。攻击者可通过向数据库发送特制的畸形查询语句，触发该漏洞导致数据库服务崩溃或无法响应正常请求。该漏洞影响 IBM DB2 Universal Database for Windows NT 6.1 和 7.1 版本，CVSS 评分 2.1，危害等级低。攻击者在拥有数据库访问权限的情况下即可利用此漏洞发动拒绝服务攻击，无需高级权限。"
published = "2001-02-16T05:00:00.000"
remediation = "升级 IBM DB2 Universal Database 至 V8 或更高版本，该漏洞已在后续版本修复。若无法立即升级，在应用层实施 SQL 输入白名单校验，禁止非管理员用户传递未经参数化的原始查询语句，同时在数据库网关层面限制单个连接的查询超时与最大执行时间，缓解 DoS 风险。"
score = 2.1
severity = "LOW"
sources = ["exploitdb"]
title = "IBM DB2 Universal Database SQL 拒绝服务漏洞"
updated = "2026-06-16T21:53:33.917"

