[basic]
description = "HP-UX 系统的 Ignite-UX 在创建受信任系统的系统镜像时，未能正确保存 /etc/passwd 文件，导致镜像中账户密码字段被置为空值。本地或能访问该镜像的攻击者可借此以空白密码登录目标账户，从而非法提升自身权限至 root 或其他高权限用户。该漏洞影响使用 Ignite-UX 制作受信任系统镜像的 HP-UX 环境，攻击前提是攻击者能够访问包含空密码账户的镜像或已部署系统，利用方式是通过空密码认证获取本不应拥有的特权访问。"
published = "2000-02-17T05:00:00.000"
remediation = "建议应用 HP 发布的 Ignite-UX 补丁（PHCO 系列补丁，如 PHCO_20765 及后续版本），修复镜像创建时不保存 /etc/passwd 导致密码字段为空的问题。升级后需检查所有由受信任系统镜像部署的主机，确认 /etc/passwd 及 /tcb 影子密码文件中 root 及各账户的密码字段非空，对空密码账户立即重设强密码并启用受信任系统（trusted system）模式，同时限制对镜像文件的访问权限作为临时缓解措施。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "HP Ignite-UX 权限提升漏洞"
updated = "2026-06-16T21:51:07.393"

