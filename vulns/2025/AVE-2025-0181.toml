[basic]
description = "联想网盘存在任意文件上传漏洞，攻击者可通过构造特制的 POST 请求，在 `neid` 参数中利用路径遍历（`../../../../`）将恶意文件上传至服务器任意目录，从而远程执行任意代码。该漏洞无需身份认证即可利用，攻击者可上传 Webshell 完全控制目标服务器，危害严重。受影响版本需及时升级或限制上传接口访问权限。"
published = "0703"
remediation = '联系联想官方获取最新安全补丁，或升级联想网盘至已修复该漏洞的最新版本。临时缓解措施：在 Nginx/Tomcat 反向代理层对 `/write` 接口的 `hash` 参数进行路径穿越关键字（如 `../`、`..\\`）过滤；配置 Tomcat 的 `web.xml` 限制文件上传目录仅允许写入指定临时目录，且禁止执行目录的写入权限；部署 WAF 规则拦截包含路径遍历特征的上传请求。'
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "联想 联想网盘 任意文件上传漏洞"
updated = "0703"

