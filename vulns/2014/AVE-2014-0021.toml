[basic]
description = "WordPress Podcast Channels 插件 0.20 及更早版本中存在反射型跨站脚本(XSS)漏洞，漏洞位于 getid3/demos/demo.write.php 文件中，攻击者通过 Filename 参数注入恶意 Web 脚本或 HTML 代码。当管理员或用户访问特制链接时，恶意脚本将在受害者浏览器中执行，可能导致会话劫持、钓鱼攻击等危害。该漏洞无需身份认证即可利用，攻击复杂度低，影响所有使用受影响版本插件的 WordPress 站点。"
published = "2019-12-27T19:15:12.007"
remediation = "立即升级 Podcast Channels 插件至 0.28 或更高版本，该版本已弃用插件自带的 getID3 库，改用 WordPress 3.6+ 内置的 getID3 实现，消除了 demo.write.php 中 Filename 参数的 XSS 入口。如无法升级，可删除插件目录下的 getid3/demos/ 文件夹作为临时缓解措施。"
score = 6.1
severity = "MEDIUM"
sources = ["nuclei"]
title = "WordPress Podcast Channels 插件跨站脚本漏洞"
updated = "2026-06-17T00:10:12.793"

