[basic]
description = "SGI IRIX 6.2 及更早版本中的 addnetpr 工具（/usr/lib/netaddpr）存在本地权限提升漏洞。该程序在处理临时文件时未正确检查符号链接，本地攻击者可通过创建恶意符号链接指向任意系统文件，诱导程序以高权限覆写目标文件，从而修改关键系统配置或二进制文件，最终获取 root 权限。该漏洞影响 SGI IRIX 6.2 及之前版本，CVSS 评分 7.2，危害等级高。利用前提是攻击者拥有本地账户。，最终获取 root 权限。"
published = "1997-05-09T04:00:00.000"
remediation = "该漏洞存在于已停止维护的 SGI IRIX 6.2 及更早版本中，厂商已不再提供安全更新。建议立即升级至受支持的现代操作系统（如 Linux 或 BSD 系列），彻底弃用 SGI IRIX 系统。如无法立即迁移，应移除 /usr/lib/addnetpr 的 SUID 权限（chmod 0755 /usr/lib/addnetpr），并限制可执行该程序的用户组范围。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "SGI IRIX addnetpr 本地符号链接攻击漏洞"
updated = "2026-06-16T21:50:06.797"

