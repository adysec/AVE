[basic]
description = "Joomla! 的 Advertising 组件（版本 0.25）存在目录遍历漏洞，该漏洞源于对 controller 参数缺乏充分的过滤检查。远程攻击者可通过向 index.php 传递包含 `../` 等目录跳转序列的特制请求，实现任意文件读取，可能导致敏感信息泄露。该漏洞攻击复杂度较低，无需身份认证即可利用。CVSS 评分 6.8，危害等级中危。"
published = "2010-04-19T19:30:00.850"
remediation = "立即卸载 Joomla! 的 Advertising (com_advertising) 组件 0.25 版本，该组件已不再维护且存在目录遍历漏洞。作为替代方案，使用其他受支持的广告管理扩展。如无法卸载，在服务器层面限制 index.php 的 controller 参数仅允许白名单值，并禁用 .. 路径遍历。更新 Joomla! 核心至最新版本以启用内置安全机制。"
score = 6.8
severity = "MEDIUM"
sources = ["nuclei"]
title = "Joomla! Advertising 组件目录遍历漏洞"
updated = "2026-06-16T23:18:27.727"

