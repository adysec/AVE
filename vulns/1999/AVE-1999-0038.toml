[basic]
description = "Microsoft FrontPage Personal Web Server 1.0 及 4.0 存在目录遍历漏洞，远程攻击者可通过向目标服务器发送特制的非标准 URL 请求，突破路径限制访问服务器上的任意文件，导致敏感信息泄露。该漏洞影响运行 Personal Web Server 的 Windows 系统，攻击者无需身份认证即可实施利用。"
published = "1999-03-01T05:00:00.000"
remediation = "升级到 Microsoft Personal Web Server 更高版本，或改用 IIS 替代 FrontPage PWS 根除风险。如无法升级，在 IIS 管理器中禁用非标准 URL 解析，并部署 URLScan 安全工具过滤 `../../` 等目录遍历字符，同时限制 WEB 目录执行权限为纯脚本。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Microsoft FrontPage Personal Web Server 目录遍历漏洞"
updated = "2026-06-16T21:48:17.143"

