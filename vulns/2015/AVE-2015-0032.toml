[basic]
description = "WordPress 的 NewStatPress 插件 0.9.9 之前版本中的 includes/nsp_search.php 文件存在跨站脚本（XSS）漏洞。经过身份认证的远程攻击者可通过向 wp-admin/admin.php 页面的 nsp_search 功能提交特制的 where1 参数，注入恶意 Web 脚本或 HTML 代码，当管理员或其他用户访问受影响页面时脚本被执行，导致敏感信息泄露或会话劫持。该漏洞影响 NewStatPress 0.9.8 及更早版本，CVSS 评分 3.5，危害等级低，利用需用户认证且需用户交互。"
published = "2015-05-27T18:59:04.163"
remediation = "The user wants me to generate a remediation field for CVE-2015-4063. This is a WordPress plugin (NewStatPress) XSS vulnerability. The fix is to upgrade to version 0.9.9 or later. Let me provide a specific, actionable remediation in Chinese.<value>立即将 NewStatPress 插件升级至 0.9.9 或更高版本（WordPress 后台 → 插件 → 安装插件 → 搜索 NewStatPress → 更新）。如无法升级，在 wp-admin/admin.php 的 nsp_search 页面中对 where1 参数进行 HTML 实体编码过滤，或在 WordPress 函数库中添加 add_filter('nsp_search_where1', 'esc_html') 临时缓解。同时限制可信用户对管理后台的访问权限。"
score = 3.5
severity = "LOW"
sources = ["nuclei"]
title = "WordPress NewStatPress 插件跨站脚本漏洞"
updated = "2026-06-17T00:26:42.727"

