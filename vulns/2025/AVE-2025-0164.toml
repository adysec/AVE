[basic]
description = "孚盟云 GetImage.aspx 页面存在 SQL 注入漏洞，由于未对用户输入进行有效的参数化处理，攻击者可通过构造恶意 SQL 语句利用该接口，实现对后台数据库的任意数据查询、篡改甚至获取系统权限。该漏洞攻击门槛低，无需认证即可远程利用，影响使用孚盟云系统的企业用户。建议厂商及时进行参数过滤与安全加固。"
published = "0718"
remediation = "对 GetImage.aspx 中的 imageId 等参数改用参数化查询或预编译 SQL 语句，禁止直接拼接用户输入；校验所有传入参数的类型和格式，拒绝非预期字符；同时在 WAF 中添加针对该路径的 SQL 注入特征拦截规则，并复查系统内其他 aspx 页面是否存在同类注入问题。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "孚盟云 GetImage.aspx SQL注入漏洞"
updated = "0718"

