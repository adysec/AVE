[basic]
description = "NetWare NFS 在 mode 1 和 mode 2 中实现 Unix 文件“只读”标志时存在权限许可漏洞。当用户将文件标记为“只读”时，系统会将文件所有者改为 root。本地攻击者可利用此机制，先创建一个 setuid 程序，然后将其设置为“只读”，NetWare NFS 便会将该程序转换为 root 所有的 setuid 程序，从而使攻击者获得 root 权限。该漏洞影响 Unix 平台上的 NetWare NFS 服务，攻击者需要本地访问权限，利用难度较低，危害严重。"
published = "1999-12-31T05:00:00.000"
remediation = '升级到不再使用将 "Read Only" 标记转换为 root 所有权的 NFS 模式的 NetWare 版本，或禁用 mode 1/2 的 NFS 导出；在受影响系统上限制本地用户对 setuid 文件的创建权限，监控并审计异常的文件所有权变更。'
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "NetWare NFS 本地权限提升漏洞"
updated = "2026-06-16T21:50:19.213"

