[basic]
description = "Free Online Dictionary of Computing（FOLDOC）1.0 的 template.cgi 脚本存在命令注入漏洞，远程攻击者可通过向 template.cgi 参数传递 shell 元字符（如反引号、管道符等）实现任意文件读取和命令执行。攻击无需身份认证，利用难度低，可导致敏感信息泄露及服务器被完全控制。该漏洞影响 FOLDOC 1.0 版本，CVSS 评分 7.5，危害等级高。目前已有公开的 ExploitDB 利用代码。"
published = "2001-06-27T04:00:00.000"
remediation = "立即删除或禁用 FOLDOC 中的 template.cgi 脚本，或限制其仅允许本地访问。如必须使用，在 CGI 脚本中对用户输入进行严格过滤，使用 escapeshellarg() 或类似函数转义 shell 元字符（如 `;` `|` `&` `$` `` ` ``），并配置 Web 服务器（如 Apache）通过 mod_rewrite 拒绝包含特殊字符的请求。由于该软件已停止维护，建议迁移至替代方案。"
score = 7.5
severity = "HIGH"
sources = ["exploitdb"]
title = "FOLDOC Free Online Dictionary of Computing 1.0 命令注入漏洞"
updated = "2026-06-16T21:54:21.053"

