[info]
author = "ave"
description = "NCSA HTTPd 1.x 存在远程缓冲区溢出漏洞（CVE-1999-0267），远程攻击者可通过超长 GET 请求触发缓冲区溢出导致远程命令执行。本 PoC 通过检测 HTTP 响应 Server 头中的 NCSA 标识判断目标是否运行存在漏洞的服务。"
id = "POC-AVE-1999-0452"
name = "NCSA HTTPd 远程缓冲区溢出漏洞 PoC"
severity = "high"
tags = ["ave-1999-0452"]
vuln_id = [
    "CVE-1999-0267",
    "AVE-1999-0452",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "header"
type = "word"
words = ["NCSA"]
