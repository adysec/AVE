[basic]
description = "tags.<value>Joomla! 的 Image Browser（com_imagebrowser）组件 0.1.5 rc2 版本存在目录遍历漏洞，远程攻击者无需身份认证即可通过在 index.php 的 folder 参数中插入 `../` 路径遍历序列，实现包含并执行服务器上的任意本地文件。该漏洞影响运行 Joomla! 并安装该组件的系统，CVSS 评分 9.0，危害等级高，攻击者可利用此漏洞读取敏感信息或在特定条件下执行任意代码。"
published = "2008-10-22T10:30:01.240"
remediation = '''立即在 Joomla! 后台卸载并删除 com_imagebrowser 0.1.5 rc2 组件（该组件已停止维护，官方未发布安全补丁）。若必须保留，在网站根目录 .htaccess 中添加 RewriteCond %{QUERY_STRING} folder=\.\.(/) [NC] 并 RewriteRule 返回 403 阻断目录遍历攻击；同时在 PHP 层对 $_GET['folder'] 做白名单校验，拒绝包含 .. 或 / 开头的路径输入。'''
score = 9
severity = "CRITICAL"
sources = ["nuclei"]
title = "Joomla! Image Browser 目录遍历漏洞"
updated = "2026-06-16T22:58:16.643"

