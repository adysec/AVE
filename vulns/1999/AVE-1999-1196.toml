[basic]
description = "Microsoft Internet Explorer 4.01 与 5.0 中内置的 Registration Wizard ActiveX 控件（regwizc.dll，版本 3.0.0.0，公开方法 InvokeRegWizard）存在缓冲区溢出漏洞。该控件在处理远程传入的参数时未对输入长度进行边界校验，攻击者在网页或 HTML 邮件中构造恶意页面，诱导用户访问即可触发溢出，进而覆盖栈上返回地址并执行任意命令。影响范围涵盖 IE 4.01 及 5.0 浏览器用户，利用前提是被害者需使用 IE 并打开攻击者控制的页面，属于需要用户交互的远程代码执行漏洞。"
published = "1999-09-24T04:00:00.000"
remediation = "升级 Internet Explorer 至 5.01 Service Pack 2 或更高版本（包含在 Windows 2000 SP2 及后续补丁中）。如无法立即升级，可在 Internet Explorer 的「工具→Internet 选项→安全」中将 Internet 区域的安全级别设为「高」，并禁用对 regwizc.dll（Registration Wizard ActiveX 控件）的 ActiveX 运行与脚本权限，或在组策略中限制该控件的实例化作为临时缓解措施。"
score = 5.1
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Microsoft Internet Explorer 4.1/5 Registration Wizard ActiveX 控件缓冲区溢出代码执行漏洞"
updated = "2026-06-16T21:50:45.670"

