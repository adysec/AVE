[basic]
description = "Pacific Software 的 Carello 购物车软件 1.2.1 版本中存在文件复制漏洞。远程攻击者无需身份认证即可通过向服务器上的 add.exe 程序发送特制请求，利用该程序的文件复制功能将服务器上的任意文件（如 .ASP 等 Web 脚本文件）复制到可公开访问的目录，从而读取目标文件的源代码。该漏洞可导致网站敏感信息泄露，攻击者可通过分析源代码进一步发现其他安全缺陷。Exploit-DB 上已有公开利用代码。"
published = "2000-05-24T04:00:00.000"
remediation = "立即删除或重命名服务器上 `/scripts/Carello/add.exe` 文件，或通过 Web 服务器（如 IIS）配置 URL 访问控制，禁止匿名用户访问 `/scripts/Carello/` 目录。同时确保 IIS 匿名 Internet 账户对 Web 目录无写入权限，防止文件复制操作。由于 Pacific Software Carello 1.2.1 已停止维护，建议迁移至仍在安全更新的购物车系统。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Pacific Software Carello 1.2.1 文件复制与源代码披露漏洞"
updated = "2026-06-16T21:51:37.720"

