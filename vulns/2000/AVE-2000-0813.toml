[basic]
description = "IBM AIX 4.3 及之前版本的 `/usr/lib/lpd/digest` 命令存在缓冲区溢出漏洞，本地攻击者可利用该漏洞通过向 digest 命令提交特制的输入数据触发缓冲区溢出，从而以 root 权限执行任意代码。由于 digest 命令默认以高权限运行，攻击者成功利用后可完全控制受影响的系统。"
published = "2001-01-09T05:00:00.000"
remediation = "立即安装 IBM AIX APAR IY08143 或 IY08287 补丁，可通过 IBM Fix Central 获取并应用对应更新。如无法打补丁，可执行 `chmod 0 /usr/lib/lpd/digest` 移除 digest 命令的 setuid 权限位，或通过 `chmod u-s /usr/lib/lpd/digest` 去除 setuid 位以缓解本地提权风险。"
score = 7.2
severity = "HIGH"
sources = ["exploitdb"]
title = "IBM AIX 4.3 digest 本地缓冲区溢出漏洞"
updated = "2026-06-16T21:53:11.420"

