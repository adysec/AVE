[basic]
description = "Debian GNU/Linux 2.1 发行版中 Apache httpd 的默认配置文件将 ServerRoot 指令设置为 /usr/doc 目录，而非更安全的隔离目录。由于该目录通常包含整个服务器及软件包的文档文件，且 httpd 进程对该路径拥有读取权限，远程未认证攻击者可直接通过构造针对 /usr/doc 路径下的 HTTP 请求，读取服务器上任意文档文件的内容，造成信息泄露。该漏洞影响默认安装 Debian 2.1 并启用 Apache、且未修改 ServerRoot 配置的目标系统；攻击条件仅需攻击者能通过网络访问目标 Web 服务，无需身份认证或特殊权限，利用方式即发送普通 HTTP 请求访问 /usr/doc 下的文档资源。"
published = "1999-01-17T05:00:00.000"
remediation = "建议升级 Apache 至 Debian 官方修复版本，并手动修改 httpd.conf 中的 ServerRoot 指令，将其从默认的 /usr/doc 改为独立的专用目录（如 /var/www），避免暴露服务器文档目录。同时通过 Directory 指令限制目录访问权限，禁止匿名用户读取文档文件，并移除或迁移 /usr/doc 下的敏感文档。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Debian Apache HTTP Server 信息泄露漏洞"
updated = "2026-06-16T21:48:49.777"

