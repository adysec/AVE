[basic]
description = "用友U8 Cloud产品的linkntb.jsp页面存在SQL注入漏洞。攻击者可通过向`/yer/html/nodes/linkntb/linkntb.jsp`发送包含恶意构造参数的GET请求，在`billId`参数中插入Oracle特定SQL payload（如利用`UTL_INADDR.GET_HOST_ADDRESS`与条件判断语句），无需身份验证即可触发数据库执行恶意查询。成功利用该漏洞的攻击者可绕过应用安全校验，获取数据库敏感信息、篡改数据或进一步控制服务器。该漏洞影响部署用友U8 Cloud系统的企业用户，攻击条件为攻击者能够访问目标系统的Web服务端口。建议尽快升级到官方安全版本并加强数据库访问权限控制。"
published = "0731"
remediation = "建议升级用友U8 Cloud至官方最新安全版本（如V3.6或更高），或联系用友获取针对linkntb.jsp接口SQL注入漏洞的专项补丁。临时缓解措施可在WAF/IPS中配置规则过滤/yer/html/nodes/linkntb/linkntb.jsp路径的恶意SQL注入参数，或限制该接口的访问IP白名单。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "用友 U8 Cloud linkntb SQL注入漏洞"
updated = "0731"

