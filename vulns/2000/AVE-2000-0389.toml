[basic]
description = "Linux splitvt 1.6.3 及更早版本中存在缓冲区溢出漏洞。splitvt 是一款用于将终端窗口分割为上下两部分的工具，其屏幕锁定功能在处理用户输入的密码时未正确验证长度，导致本地攻击者可通过向屏幕锁定功能提交超长密码触发缓冲区溢出，从而覆盖内存中的关键数据，成功利用此漏洞可获得 root 权限。该漏洞影响 splitvt 1.6.3 及之前所有版本，攻击者需拥有本地系统访问权限，无需身份认证即可利用，CVSS 评分 7.2，危害等级高。"
published = "2000-06-01T04:00:00.000"
remediation = "立即升级 splitvt 至 1.6.4 或更高版本，该版本已修复 screen locking 函数中的缓冲区溢出问题。如无法升级，可卸载 splitvt 并使用替代终端复用工具（如 screen 或 tmux）。对于仍在使用 splitvt 的遗留系统，限制本地非信任用户登录权限作为临时缓解措施。"
score = 7.2
severity = "HIGH"
sources = ["epss"]
title = "Sam Lantinga splitvt 本地缓冲区溢出漏洞"
updated = "2026-06-16T21:51:47.820"

