[basic]
description = "AMD IOMMU（输入输出内存管理单元）在主机缓冲区访问过程中对逆向映射表（RMP）的检查不足，已具备权限的攻击者配合被入侵的虚拟机监视器（hypervisor）可触发越界内存访问条件，绕过 RMP 安全校验，导致机密虚拟机数据完整性遭到破坏。该漏洞影响 AMD 多款处理器平台，CVSS 评分 5.6，危害等级中危。"
published = "2026-04-16T19:16:31.430"
remediation = "建议将 AMD EPYC 7003 系列处理器 SEV 固件升级至 1.37.23 及以上版本（或更新 Milan PI_1.0.0.H 及以上版本 BIOS），EPYC 9004/8004 系列升级至 SEV FW 1.37.31 及以上版本（或更新 GenoaPI_1.0.0.G 及以上版本 BIOS）。此漏洞修复需同步配合操作系统厂商提供的 SEV-SNP 安全补丁，且修复后须关闭并重新初始化 SNP 客户机以使缓解措施生效。"
score = 5.6
severity = "MEDIUM"
sources = ["msrc"]
title = "AMD IOMMU 写缓冲区漏洞"
updated = "2026-06-17T05:30:22.067"

