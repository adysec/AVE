[info]
author = "AVE"
description = "检测 IBM Net.Data db2www CGI 程序缓冲区溢出漏洞（CVE-2000-0677）。远程攻击者通过向 CGI 发送超长 PATH_INFO 环境变量可触发基于栈的缓冲区溢出，导致任意代码执行。无需认证，远程利用。"
id = "POC-AVE-2000-1408"
name = "IBM Net.Data db2www CGI Buffer Overflow Detection"
severity = "critical"
tags = ["ave-2000-1408"]
vuln_id = [
    "CVE-2000-0677",
    "AVE-2000-1408",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/cgi-"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "IBM",
    "Net.Data",
    "db2www",
]
