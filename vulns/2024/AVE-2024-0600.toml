[basic]
description = "Linux 内核 net/mlx5e 驱动在卸载 vport representor 时存在释放后使用漏洞。驱动卸载过程中，unregister_netdev 在 vport rep 卸载后调用，导致 mlx5e_rep_priv 已被释放，但代码仍尝试访问 rpriv->netdev 或遍历 rpriv->tc_ht，触发 UAF。攻击者需本地低权限访问，通过触发驱动卸载/重载流程利用 UAF 实现提权，影响搭载 Mellanox 网卡的 Linux 内核，CVSS 7.8 高危。Linux 内核已通过增加 loaded 标志检查修复该漏洞。"
published = "2025-01-15T13:15:11.713"
remediation = "建议立即升级 Linux 内核至 6.6.70、6.11.9、6.12.2 或更高版本（包含修复补丁 commit 8f8a5b3e8f7a）。Ubuntu 24.04 LTS 用户请执行 `sudo apt update && sudo apt install linux-image-generic` 安装 USN-7381-1/USN-7514-1 提供的内核更新（版本 ≥ 6.8.0-52.52 或 6.11.0-14.14）。如暂时无法重启内核，可通过 `echo 0 > /sys/module/mlx5_core/parameters/prof_sel` 禁用 mlx5e TC 规则卸载功能作为临时缓解，但需重启网卡驱动生效。建议优先通过发行版官方渠道（如 `apt upgrade linux-generic`、`yum update kernel`、`dnf update kernel`）应用官方内核补丁。"
score = 7.8
severity = "HIGH"
sources = ["msrc"]
title = "Linux Kernel mlx5e 驱动 使用后释放漏洞"
updated = "2026-06-17T08:14:03.957"

