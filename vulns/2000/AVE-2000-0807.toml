[basic]
description = 'Windows NT 和 Windows 2000 系统的 Shell 可执行文件 (Explorer.exe) 注册表项使用了相对路径名，本地攻击者可通过在 %Systemdrive% 目录下放置名为 Explorer.exe 的恶意木马文件，利用系统启动或调用 Shell 时优先搜索当前目录的特性，以当前用户权限执行任意代码，即"相对 Shell 路径"漏洞。该漏洞影响 Windows NT 4.0 及 Windows 2000 系统，需本地访问权限，CVSS 评分 4.6。'
published = "2000-07-25T04:00:00.000"
remediation = '立即安装微软 MS00-052 安全公告对应补丁（KB269049）：Windows NT 4.0 用户下载 Workstation/Server/Enterprise Edition 补丁，Terminal Server Edition 用户下载对应补丁；Windows 2000 用户下载 Professional/Server/Advanced Server 补丁。如无法安装补丁，临时缓解措施为：修改 %SystemDrive%\ 根目录（通常为 C:\）的 NTFS 权限，移除 Users 组的写入权限，仅保留 Administrators 和 SYSTEM 的写入权限，防止普通用户放置木马版本的 Explorer.exe。'
score = 4.6
severity = "MEDIUM"
sources = ["cve"]
title = "Microsoft Windows NT/2000 相对路径本地代码执行漏洞"
updated = "2026-06-16T21:52:13.030"

