[basic]
description = "青龙定时任务管理面板（QingLong）的 command/run 接口存在远程代码执行漏洞。攻击者利用该接口未对用户输入的参数进行充分过滤和校验，可构造恶意请求直接执行任意系统命令。攻击者无需认证即可利用该漏洞获取服务器控制权，执行任意命令，导致服务器被完全接管。该漏洞影响 v2.20.2 之前的所有版本，官方已在 v2.20.2 版本中修复此问题，建议用户立即升级。"
published = "nday"
remediation = "立即升级青龙面板至 v2.20.2 及以上版本，该版本修复了 command/run 接口的未授权访问与注入问题。如无法立即升级，可在 Nginx 反向代理层添加访问控制，限制管理面板仅内网可访问，或通过防火墙屏蔽对 /api/command/run 等敏感路径的外部访问。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "青龙定时任务管理面板 command/run 远程代码执行漏洞"
updated = "nday"

