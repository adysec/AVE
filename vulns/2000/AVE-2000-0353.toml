[basic]
description = "Cart32 3.0 存在敏感信息泄露漏洞，远程攻击者可通过在 URL 请求后附加 `/expdate` 路径，无需任何身份认证即可访问服务器调试信息，导致系统配置、用户数据等敏感内容暴露。该漏洞攻击复杂度低，无需特殊权限，仅需网络可达即可利用，影响 Cart32 3.0 版本。"
published = "2000-05-03T04:00:00.000"
remediation = "立即升级 Cart32 至 3.1 及以上版本，该版本已移除 /expdate 调试路径。如无法升级，在 Web 服务器（IIS/Apache）配置中禁止访问 /expdate 路径，或通过 URL 重写规则拦截此类请求。建议迁移至仍在维护的购物车系统，因 Cart32 已停止安全更新。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Cart32 3.0 expdate 敏感调试信息泄露漏洞"
updated = "2026-06-16T21:51:42.967"

