[basic]
description = "锐捷 EWEB 路由器 ipam.php 接口存在任意文件读取漏洞，攻击者可在未授权状态下通过构造特制的 HTTP 请求参数，读取服务器上的任意文件，如配置文件、敏感数据等。该漏洞影响多款锐捷 EWEB 系列路由器产品，攻击条件低，无需身份认证即可远程利用，可能导致敏感信息泄露，危害较大。目前官方尚未发布正式补丁。"
published = "2025-07-18"
remediation = "及时联系锐捷官方获取EWEB系统固件更新补丁，升级至修复该漏洞的最新版本；如暂无法升级，建议在网络边界配置访问控制策略，限制对ipam.php等敏感接口的未授权访问，同时关闭非必要的EWEB管理页面对外暴露。"
