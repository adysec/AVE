[basic]
description = "Zeus Web 服务器（Zeus Webserver）的管理接口在对管理员密码进行加密存储与传输时采用了强度极弱的加密算法，导致密码保护形同虚设。攻击者在能够访问该管理接口（通常监听于特定 TCP 端口）的网络条件下，可通过嗅探传输流量或离线破解加密后的凭据，还原出明文管理员密码，进而以管理员身份登录后台并执行任意配置操作，最终可能实现对服务器的远程根级（root）权限妥协。该漏洞影响使用弱加密管理接口的 Zeus Webserver 版本，攻击者无需已知其他漏洞，仅需网络可达管理端口并利用弱加密缺陷即可完成入侵。"
published = "1999-10-25"
remediation = "升级 Zeus Webserver 至修复管理接口弱口令加密问题的版本（建议联系厂商获取包含管理接口强加密的版本）。在无法立即升级时，限制管理接口（默认 9090 端口）仅允许受信任的内网 IP 访问，并通过防火墙或 ACL 关闭其对外暴露；同时修改所有管理员口令并使用强密码策略作为临时缓解措施。"
score = 5.0
severity = "MEDIUM"
sources = ["avd"]
title = "Zeus Webserver 管理接口弱口令加密凭据泄露漏洞"
updated = "2026-06-16"

