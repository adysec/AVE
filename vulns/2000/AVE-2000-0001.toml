[basic]
description = "Microsoft FrontPage Server Extensions 存在信息泄露漏洞，远程攻击者可通过向目标服务器 /_vti_bin/ 虚拟目录下的 shtml.dll 发送特制的 RPC POST 请求，导致服务器返回匿名账户名称信息。该漏洞使得攻击者能够获取目标系统有效用户名，为后续暴力破解或其他身份认证绕过攻击提供便利条件。影响 Microsoft FrontPage Server Extensions 相关版本，CVSS 评分 5.0，危害等级中等。"
published = "2000-02-02T05:00:00.000"
remediation = "安装 Microsoft 发布的 FrontPage Server Extensions 2000 安全更新 (MS00-015)，禁用匿名用户通过 RPC POST 请求访问 `_vti_bin/shtml.dll`；通过 IIS 管理控制台移除 `_vti_bin` 虚拟目录的匿名访问权限，或限制可访问该目录的 IP 地址范围。"
score = 5
severity = "MEDIUM"
sources = ["nuclei"]
title = "Microsoft FrontPage Server Extensions 信息泄露漏洞"
updated = "2026-06-16T21:51:01.787"

