[basic]
description = "Joomla! 的 Omilen Photo Gallery 组件（com_omphotogallery）Beta 0.5 版本存在目录遍历漏洞。远程攻击者可通过向 index.php 的 controller 参数传递包含目录遍历序列（如 ../）的特制请求，实现包含并执行服务器上的任意本地文件。该漏洞源于程序对用户输入的 controller 参数缺乏充分的路径过滤与安全检查，攻击者无需身份认证即可利用，可能导致敏感信息泄露或进一步代码执行。CVSS 评分 7.5，危害等级为高。"
published = "2009-12-04T19:30:00.547"
remediation = "立即卸载 Joomla! 的 Omilen Photo Gallery Beta 0.5 组件，该组件已停止维护且无修复版本。可在 Joomla! 后台扩展管理器中将其卸载，并替换为其他仍在维护的相册组件（如 Phoca Gallery 或 JoomGallery）。若暂时无法卸载，需在 Web 服务器层面（如 Apache .htaccess）添加规则，过滤 controller 参数中的目录遍历序列（如 ../ 和 %2e%2e/），阻止恶意请求访问 /index.php?option=com_omphotogallery。"
score = 7.5
severity = "HIGH"
sources = ["nuclei"]
title = "Joomla Omilen Photo Gallery 组件 0.5b 本地文件包含漏洞"
updated = "2026-06-16T23:13:14.093"

