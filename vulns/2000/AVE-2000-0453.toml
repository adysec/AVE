[basic]
description = "Windows 2000 的 SYSKEY 默认配置将系统启动密钥以明文形式存储在注册表中，本地攻击者可通过读取注册表获取该密钥，进而解密受 Encrypting File System (EFS) 保护的文件数据。该漏洞影响 Windows 2000 所有版本，CVSS 评分 7.2，危害等级高，利用条件为攻击者需具有本地系统访问权限。"
published = "2000-05-11T04:00:00.000"
remediation = '在 Windows 2000 上运行 syskey 命令，选择"启用系统密钥"并设置为"在启动时需要密码"或"在启动时需要软盘"模式，避免将启动密钥存储在注册表中。更彻底的方案是升级至 Windows Server 2003 或更高版本操作系统，新版本默认采用更安全的密钥存储机制。'
score = 7.2
severity = "HIGH"
sources = ["cve"]
title = "Microsoft Windows 2000 SYSKEY 默认系统密钥配置漏洞"
updated = "2026-06-16T21:51:41.713"

