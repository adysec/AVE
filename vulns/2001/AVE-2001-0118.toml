[basic]
description = "Atrium Software Mercur Mail Server 3.3 的 SMTP 组件在处理 EXPN 命令时存在缓冲区溢出漏洞，未经身份认证的远程攻击者可通过向目标服务器的 25 端口发送超长 EXPN 命令参数触发该漏洞，导致缓冲区溢出，最终可在服务器上以 LocalSystem 权限执行任意命令。该漏洞影响 Mercur Mail Server 3.30 及更早版本，攻击无需任何认证，危害严重。"
published = "2001-05-03"
remediation = "升级 Mercur Mail Server 至 3.30 以上版本，或安装厂商发布的安全补丁。由于该产品已停止维护，建议迁移至其他受支持的邮件服务器软件（如 Postfix、Exchange），并在迁移前于防火墙层面限制 SMTP 端口（25/TCP）仅允许可信 IP 访问作为临时缓解措施。"
score = 10.0
severity = "CRITICAL"
sources = [
    "cve",
    "exploitdb",
]
title = "Atrium Software Mercur Mail Server SMTP EXPN 命令缓冲区溢出漏洞"
updated = "2026-06-16"

