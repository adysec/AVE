[basic]
description = "Cisco IOS 系统的 AAA（认证、授权、审计）认证模块存在授权绕过漏洞，远程攻击者可在未获得合法凭据的情况下绕过认证机制，直接执行任意命令。该漏洞影响多款 Cisco 路由器及交换机设备，攻击者利用该漏洞可完全控制目标设备，CVSS 评分 7.5，危害等级高。目前建议用户升级至修复版本或配置严格的访问控制列表进行缓解。"
published = "1998-01-01T05:00:00.000"
remediation = "升级 Cisco IOS 至修复该漏洞的版本（如 11.x 及以上已打补丁版本），启用 `aaa new-model` 并配置 TACACS+ 或 RADIUS 服务器进行认证授权，避免仅依赖本地 enable 密码。在 `aaa authentication` 和 `aaa authorization` 命令中指定 `group tacacs+` 作为首选方法，禁止未认证用户通过 AAA 接口执行命令。如无法升级，在受控接口上配置 ACL 限制仅允许可信管理源 IP 访问设备。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "Cisco IOS AAA认证远程代码执行漏洞"
updated = "2026-06-16T21:48:05.380"

