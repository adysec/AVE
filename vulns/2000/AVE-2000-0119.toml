[basic]
description = "Microsoft Java Virtual Machine（JVM）中存在信息泄露漏洞。远程攻击者可通过向目标用户发送恶意 Java Applet，利用 getSystemResourceAsStream() 函数读取本地文件系统中的敏感文件。攻击者需知道文件名且文件必须位于 JVM 主目录或 CLASSPATH 环境变量指定路径中。该漏洞可导致系统敏感信息（如 AUTOEXEC.BAT 等配置文件）被未授权读取。"
published = "2000-01-31"
remediation = "微软已发布安全公告 MS00-005 提供补丁修复此漏洞。用户应通过 Windows Update 安装补丁，或升级到包含修复的最新版本 Internet Explorer（4.01 SP2 及以上版本）。对于无法安装补丁的系统，建议禁用 Java Applet 执行功能。"
score = 2.6
severity = "LOW"
sources = [
    "cve",
    "exploitdb",
]
title = "Microsoft Java Virtual Machine getSystemResourceAsStream 信息泄露漏洞"
