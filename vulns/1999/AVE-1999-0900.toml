[basic]
description = "Qualcomm Qpopper 3.0/3.0 b20 POP3 服务器的 AUTH 命令处理存在缓冲区溢出漏洞，远程未认证攻击者可发送超长的特制 AUTH 命令参数触发栈溢出，覆盖返回地址实现任意代码执行并获取 root 权限。该漏洞影响 Qpopper 3.0 及 3.0 b20 版本，CVSS 评分 10.0 严重级别，攻击者无需认证即可远程利用，ExploitDB 已公开利用代码。受影响系统需升级至修复版本或禁用易受攻击的 POP3 服务。"
published = "1999-11-30T05:00:00.000"
remediation = "建议立即升级 Qualcomm qpopper 到 3.0.1 版本或更高版本（如 4.0 版本），该版本已修复 AUTH 命令缓冲区溢出漏洞。若无法立即升级，可暂时禁用 POP3 服务或在防火墙层面限制 110 端口仅允许受信任 IP 访问作为临时缓解措施。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "Qualcomm qpopper 远程缓冲区溢出漏洞"
updated = "2026-06-16T21:49:07.833"

