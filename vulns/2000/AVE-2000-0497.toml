[basic]
description = "Lotus Domino Enterprise Server 5.0.1/5.0.2/5.0.3 及 Mail Server 相同版本的 ESMTP 服务存在缓冲区溢出漏洞。远程攻击者无需身份认证，通过向目标服务器的 25 端口发送超长 MAIL FROM 命令即可触发该漏洞，导致服务进程崩溃，造成拒绝服务。该漏洞影响 Lotus Domino 系列邮件服务器，CVSS 评分 5.0，危害等级中危。厂商已发布安全补丁，建议升级至更高版本。"
published = "2000-05-18T04:00:00.000"
remediation = "升级至 Lotus Domino 5.0.4 及以上版本，该版本已修复 ESMTP 服务的缓冲区溢出漏洞。如无法升级，请在 SMTP 服务配置中限制 MAIL FROM 命令的输入长度，或在网络层通过防火墙限制对 25/TCP 端口的非信任来源访问作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Lotus Domino Server 5.0.1 ESMTP 服务缓冲区溢出漏洞"
updated = "2026-06-16T21:51:45.880"

