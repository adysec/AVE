[basic]
description = "OpenTelemetry Java Instrumentation 的 RMI 组件存在反序列化漏洞（CWE-502），版本低于 2.26.1 时注册了自定义端点且未设置序列化过滤器，攻击者通过网络访问受监控 JVM 的 JMX/RMI 端口即可触发反序列化攻击，在 JDK 16 及更早版本上实现远程代码执行。利用需满足三个条件：Java Agent 方式附加于 JDK ≤16、JMX/RMI 端口显式配置且网络可达、classpath 中存在 gadget 链依赖库，攻击成功后可获取 JVM 进程权限执行任意代码。该漏洞 CVSS 评分 9.3，危害等级严重，影响所有使用 OpenTelemetry Java Agent < 2.26.1 的 JDK ≤16 环境。"
published = "2026-03-27T01:16:19.313"
remediation = "升级 OpenTelemetry Java Instrumentation 至 2.26.1 或更高版本。如使用 JDK 16 及以下版本且无法立即升级，可设置系统属性 `-Dotel.instrumentation.rmi.enabled=false` 禁用 RMI 集成作为临时缓解措施。JDK 17+ 默认不受影响，仍建议升级至最新版本。同时避免将 JMX/RMI 端口暴露在网络上。"
score = 9.3
severity = "CRITICAL"
sources = ["hwpoc"]
title = "OpenTelemetry Java Agent RMI 反序列化远程代码执行漏洞"
updated = "2026-07-15T02:20:14.967"

