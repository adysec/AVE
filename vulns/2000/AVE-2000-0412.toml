[basic]
description = "NetWin DMail 2.7/2.8 中的 DSMTP 组件存在缓冲区溢出漏洞，远程攻击者可通过向 SMTP 服务发送超长 ETRN 命令触发该漏洞，导致任意代码执行。该漏洞影响 NetWin DMail 2.7 及 2.8 版本，利用无需身份认证，攻击复杂度低，CVSS 评分 10.0，危害等级严重。"
published = "2000-06-01T04:00:00.000"
remediation = "立即升级 NetWin DMail 至 2.8 以上版本，该漏洞在后续版本中已修复。如无法升级，在防火墙或路由器层面过滤对 SMTP 端口（25/TCP）的外部访问，仅允许可信 IP 连接，以限制攻击来源。"
score = 10
severity = "CRITICAL"
sources = ["cve"]
title = "NetWin DMail DSMTP ETRN 请求缓冲区溢出漏洞"
updated = "2026-06-16T21:51:50.777"

