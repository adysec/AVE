[basic]
description = "Joomla! 的 eXtplorer 组件（com_extplorer）2.0.0 RC2 及更早版本中存在目录遍历漏洞。远程攻击者无需身份认证即可通过向 show_error 动作中的 dir 参数传递包含 ..（点点）的恶意路径，绕过访问限制读取服务器上的任意文件，导致敏感信息泄露。该漏洞利用复杂度低，影响大量使用该组件的 Joomla! 站点。"
published = "2008-10-28T02:03:38.003"
remediation = '立即卸载或禁用 com_extplorer 组件，该扩展已停止维护不再有安全更新。若必须使用，升级至已修复目录遍历漏洞的最新版本；在 .htaccess 中添加 `RewriteCond %{QUERY_STRING} (\.\./|%2e%2e%2f)` 过滤 `dir` 参数中的 `../` 序列；配置 Web 服务器禁止组件目录的对外访问。'
score = 5
severity = "MEDIUM"
sources = ["nuclei"]
title = "Joomla! eXtplorer 组件目录遍历漏洞"
updated = "2026-06-16T22:58:29.707"

