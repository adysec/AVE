[basic]
description = "Microsoft Internet Explorer 5.0 及 4.0.1 版本中存在信息泄露漏洞。远程攻击者可通过构造恶意网页，利用 IFRAME 元素调用 ExecCommand 方法，绕过同源策略限制，读取目标用户本地文件系统中的任意文件。攻击者只需诱使用户访问恶意网站即可触发，无需任何身份认证。该漏洞影响 Windows 平台上使用 IE 浏览器的用户，CVSS 评分 4.3，危害等级中危。"
published = "1999-10-01T04:00:00.000"
remediation = "升级到 Internet Explorer 6.0 或更高版本，该漏洞在后续版本中已修复。如无法升级，建议禁用 Active Scripting 功能，或将受影响的站点添加到受限站点区域以阻止 IFRAME 脚本执行。长期建议迁移至现代浏览器（如 Edge/Chrome/Firefox）以获取持续安全更新。"
score = 4.3
severity = "MEDIUM"
sources = ["epss"]
title = "Microsoft Internet Explorer IFRAME 信息泄露漏洞"
updated = "2026-06-16T21:49:14.617"

