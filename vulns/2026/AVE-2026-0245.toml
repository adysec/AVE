[basic]
description = 'fast-uri 是 Node.js 生态中广泛使用的 URL 解析库，其 2.3.1 至 4.1.0 版本存在主机混淆漏洞。该漏洞源于 fast-uri 未将反斜杠字符（U+005C）视为 authority 分隔符，而 Node.js 原生的 WHATWG URL 解析器（被 fetch、undici 及 http/https 客户端使用）会将特殊协议（http/https/ws/wss/ftp/file）中的反斜杠标准化为斜杠。攻击者可构造形如 `http://evil.com\@allowed.com` 的恶意 URL，使 fast-uri 解析出 `allowed.com` 作为目标主机，而 Node.js 实际请求 `evil.com`，从而绕过基于主机的白名单、黑名单、SSRF 过滤、重定向验证或出站代理路由策略，将请求劫持到云元数据端点、回环地址或内部网络主机。CVSS 评分 7.5，危害等级高。'
published = "2026-07-19T15:16:49.027"
remediation = "将 fast-uri 升级到 4.1.1, 3.1.4 或 2.4.3 及以上版本（根据当前使用的 major 版本选择对应分支），即可修复此主机混淆漏洞。由于无临时的缓解措施可用，应优先安排升级并重新测试依赖该库的 URL 校验逻辑。运行 `npm update fast-uri` 或修改 package.json 中 fast-uri 的版本号后执行 `npm install`。"
score = 7.5
severity = "HIGH"
sources = ["ghsa"]
title = "fast-uri 主机混淆漏洞（反斜杠权限定符解析差异导致 SSRF 绕过）"
updated = "2026-07-21T18:31:51.680"

