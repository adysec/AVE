[basic]
description = "Symantec Mail-Gear 1.0 Web界面服务器存在目录遍历漏洞，该漏洞允许未经身份验证的远程攻击者通过在文件路径参数中发送路径遍历序列（如..）来读取服务器上的任意文件。该漏洞影响Symantec Mail-Gear 1.0版本，在默认配置下，攻击者无需任何权限即可发起攻击。攻击者通过构造恶意请求访问系统敏感文件，如配置文件、密码文件、数据库文件等，导致敏感信息泄露，进而可能为进一步攻击提供信息支撑。该类型的漏洞普遍存在于未正确处理用户输入的文件访问功能中，攻击者可以利用路径遍历突破访问控制机制，读取本来无法访问的文件，严重威胁系统信息安全。"
published = "1999-11-29T05:00:00.000"
remediation = "建议立即升级至 Symantec Mail-Gear 的后续修复版本或替换为主流邮件安全网关产品；如暂无法升级，应在前置防火墙或反向代理上拦截包含 `../`、`..%2f`、`%2e%2e` 等目录遍历序列的 HTTP 请求，并限制该 Web 管理界面仅允许受信任内网 IP 访问，同时以非特权低权限系统账户运行该服务以缩小任意文件读取的影响范围。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Symantec Mail-Gear 目录遍历漏洞"
updated = "2026-06-16T21:49:10.313"

