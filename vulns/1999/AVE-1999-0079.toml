[basic]
description = "Linux 2.0.36 之前版本中 /dev/kmem（内核内存设备文件）的默认权限设置不当，导致本地攻击者可读取内核内存空间中的敏感数据，进而实现 IP 欺骗攻击。攻击者无需特殊权限即可利用此漏洞伪造任意源 IP 地址发送数据包，绕过基于 IP 的访问控制机制，对网络通信安全构成严重威胁。"
published = "1999-03-01T05:00:00.000"
remediation = "升级 Linux 内核至 2.0.36 或更高版本，修复 /dev/kmem 默认权限配置。作为临时缓解措施，可执行 `chmod 600 /dev/kmem` 限制访问权限，并在网络层面配置 TCP SYN Cookie 及严格反向路径过滤以降低 IP 欺骗攻击风险。"
score = 9.8
severity = "CRITICAL"
sources = ["epss"]
title = "Linux Kernel /dev/kmem 默认权限不当 IP 欺骗漏洞"
updated = "2026-06-16T21:48:22.267"

