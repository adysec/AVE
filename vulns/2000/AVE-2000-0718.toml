[basic]
description = 'Cisco IOS 12.0 至 12.1 版本中的 HTTP 服务器存在拒绝服务漏洞，已获得本地访问权限的用户通过向目标设备发送包含 "?/" 字符串的特制 URL 请求，可触发 HTTP 服务器崩溃并导致设备重载重启。该漏洞影响 Cisco IOS 12.0、12.1 及 12.1x 系列版本，CVSS 评分为 5.0，危害等级中危。建议用户升级至不受影响的 Cisco IOS 版本以修复此漏洞。'
published = "2000-12-19T05:00:00.000"
remediation = "升级 Cisco IOS 至 12.1(5)T 及更高版本，该漏洞已在后续版本中修复。如业务不需要，执行 `no ip http server` 全局命令禁用 HTTP 管理服务，或使用 `ip http access-class` 限制可访问 HTTP 服务的源 IP 地址范围。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Cisco IOS HTTP Server 拒绝服务漏洞"
updated = "2026-06-16T21:52:54.663"

