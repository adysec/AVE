[basic]
description = "Apache ActiveMQ的Java OpenWire协议 marshaller存在反序列化漏洞，远程攻击者可通过网络访问Java-based OpenWire代理或客户端，利用OpenWire协议中序列化类类型操纵机制，导致代理或客户端实例化类路径上的任意类，从而执行任意系统命令。该漏洞影响范围广，利用复杂度低，无需身份验证。"
published = "2023-10-27"
remediation = "升级Apache ActiveMQ至安全版本：5.15.16、5.16.7、5.17.6或5.18.3及以上版本，同时升级OpenWire Legacy Module至对应安全版本。受影响版本包括5.18.0-5.18.2、5.17.0-5.17.5、5.16.0-5.16.6以及5.15.16之前的所有版本。"
score = 9.8
severity = "CRITICAL"
sources = [
    "hwpoc",
    "cve",
]
title = "Apache ActiveMQ OpenWire协议反序列化远程代码执行漏洞"
updated = "2026-06-17"

