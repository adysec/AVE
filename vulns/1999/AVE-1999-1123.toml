[basic]
description = "Internet Explorer 3.02 及 4.0 版本存在页面重定向认证信息泄露漏洞。当用户访问恶意网站时，攻击者可通过 HTTP 重定向将浏览器跳转至第三方站点，IE 会自动将原始站点的身份认证信息（如 NTLM 凭据）发送给重定向目标服务器，导致用户敏感认证数据被窃取。攻击者无需身份认证即可利用此漏洞，影响运行 IE 3.02 和 4.0 的 Windows 系统。"
published = "1999-12-31T05:00:00.000"
remediation = "升级至 Internet Explorer 5.0 及以上版本即可修复该页面重定向认证泄露问题。当前建议使用 Edge 或 Chrome 等现代浏览器替代已停止支持的旧版 IE，彻底消除此类安全隐患。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Microsoft Internet Explorer 页面重定向认证信息泄露漏洞"
updated = "2026-06-16T21:50:31.017"

