[info]
author = "ave"
description = "验证目标 IE 环境中是否加载存在缓冲区溢出风险的 Registration Wizard ActiveX 控件（regwizc.dll，版本 3.0.0.0，公开方法 InvokeRegWizard）。通过在 HTML 页面中以 OBJECT 标签实例化该控件并尝试调用其 InvokeRegWizard 方法，检测控件是否可被加载及方法是否存在，作为漏洞存在的间接验证。该漏洞为需要用户交互的远程代码执行漏洞。"
id = "POC-AVE-1999-1196"
name = "CVE-1999-1578 Registration Wizard ActiveX 缓冲区溢出 PoC"
severity = "medium"
tags = ["ave-1999-1196"]
vuln_id = [
    "CVE-1999-1578",
    "AVE-1999-1196",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/cve-1999-1578.html"
protocol = "http"

[poc.requests.body]
content = ""
type = "raw"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "regwizc.dll",
    "InvokeRegWizard",
]

[[poc.requests]]
method = "POST"
path = "/{{BaseURL}}/activex_probe"
protocol = "http"

[poc.requests.body]
content = "clsid={C39B6B1C-9579-11D1-8B43-00A0C90312DD}&method=InvokeRegWizard"
type = "form"

[[poc.requests.matchers]]
expect = true
status = [200]
type = "status"
