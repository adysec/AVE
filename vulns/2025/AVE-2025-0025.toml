[basic]
description = "Microsoft Excel 2024 存在释放后使用（Use-After-Free，CWE-416）内存破坏漏洞。当用户打开攻击者精心构造的恶意 Excel 文档时，程序在处理特定对象时未能正确管理内存生命周期，导致已释放内存被再次访问，未经身份认证的远程攻击者借此可在受害者系统上执行任意代码。该漏洞影响 Microsoft Excel 2024 及相关 Office 套件版本，攻击需诱使用户打开特制文件，本地触发代码执行，CVSS 评分为 7.8（高危）。"
published = "2025-06-10T17:23:36.527"
remediation = "立即安装 Microsoft 官方发布的 CVE-2025-47165 安全更新补丁，可通过 Windows Update 自动获取或访问 Microsoft Update Catalog 手动下载安装。如暂时无法安装补丁，建议在受影响的 Office 应用中禁用宏执行，并启用受保护视图以降低攻击面。"
score = 7.8
severity = "HIGH"
sources = ["hwpoc"]
title = "Microsoft Excel 释放后使用远程代码执行漏洞"
updated = "2026-06-17T09:27:32.213"

