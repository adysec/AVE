[basic]
description = "cfingerd 是一款可配置的 finger 服务守护程序，在解析用户 GECOS 字段时未正确限制输入长度，导致存在栈缓冲区溢出漏洞。本地攻击者可设置超长 GECOS 字段触发溢出，覆盖返回地址执行任意代码，从而获取 root 权限并完全控制受影响系统。"
published = "1999-09-21"
remediation = "升级 cfingerd 至 1.4.3 或更高版本以修复缓冲区溢出问题；如非必要，建议直接禁用 cfingerd 服务或替换为更安全的 finger 守护程序。"
score = 7.2
severity = "HIGH"
sources = ["cve"]
title = "cfingerd GECOS 字段缓冲区溢出提权漏洞"
updated = "1999-09-21"

