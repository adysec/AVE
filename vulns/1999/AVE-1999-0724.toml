[basic]
description = "Allaire ColdFusion Server 4.0 的 Syntax Checker 组件存在拒绝服务漏洞。远程攻击者无需身份认证即可通过向目标服务器发送特制的恶意请求触发该漏洞，导致 Syntax Checker 进程崩溃或消耗大量系统资源，从而使 ColdFusion 服务无法正常响应合法用户请求。该漏洞影响 ColdFusion Server 4.0 版本，CVSS 评分 5.0，危害等级中等。厂商已发布安全更新修复此问题。"
published = "2001-03-12T05:00:00.000"
remediation = "建议升级至 ColdFusion 4.0.1 或更高版本，该漏洞已在后续版本中修复。如无法升级，可在 Web 服务器层面限制对 Syntax Checker 相关路径（如 /cfide/Administrator/）的访问，仅允许可信 IP 来源，或禁用不必要的 ColdFusion 管理功能以降低攻击面。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Allaire ColdFusion Server 4.0 Syntax Checker 拒绝服务漏洞"
updated = "2026-06-16T21:49:20.363"

