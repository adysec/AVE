[basic]
description = "3R Soft MailStudio 2000 2.0 及更早版本中的 mailview.cgi CGI 程序存在目录遍历漏洞，远程攻击者无需认证即可通过向目标发送包含 `../` 序列的特制 URL 请求读取服务器上的任意文件，泄露敏感信息。该漏洞源于程序未对用户输入的路径参数进行充分的过滤与校验，攻击门槛低，危害较大。"
published = "2000-06-09T04:00:00.000"
remediation = "该产品 3R Soft MailStudio 2000 已停止维护，官方未发布补丁。建议立即删除或禁用 mailview.cgi 脚本，同时在 Web 服务器（如 Apache/IIS）层面配置访问控制列表（ACL），限制 CGI 目录仅允许授权 IP 访问，并迁移至受支持的企业邮件系统替代方案。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "3R Soft MailStudio 2000 任意文件读取漏洞"
updated = "2026-06-16T21:51:55.467"

