[basic]
description = "Cat Soft 公司出品的 Serv-U FTP Server 2.5 版本在处理客户端发送的 SITE 命令时存在缓冲区溢出漏洞。未经身份认证的远程攻击者只需与目标 FTP 服务建立连接，并发送特制超长的 SITE 命令参数（如 SITE PASS 后附加过量数据），即可触发服务进程缓冲区溢出，导致 FTP 服务崩溃并拒绝服务。该漏洞影响运行 Serv-U FTP Server 2.5 的服务器，攻击条件简单、无需合法账号，远程即可发起，但仅造成可用性破坏而非代码执行，危害程度中等。"
published = "1999-12-01T05:00:00.000"
remediation = "建议升级到最新安全补丁版本（Serv-U FTP 15.x及更高版本），并严格限制FTP服务网络访问，仅开放必要端口。临时缓解措施包括更新服务补丁、配置防火墙禁用特定SITE命令，并限制远程用户权限。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Cat Soft Serv-U FTP Server 2.5a SITE PASS 缓冲区溢出拒绝服务漏洞"
updated = "2026-06-16T21:49:09.813"

