[basic]
description = "Linux 内核 AMDGPU 驱动中的 TTM BO 缓冲区管理存在缺陷，在 mode1 重置流程中从挂起到恢复时，TA 固件缓冲区被不必要地重新初始化，导致 bo pin_count 冗余增加。当用户卸载 amdgpu 驱动时触发内核警告（Call Trace），可能引发拒绝服务。该漏洞影响使用 AMD GPU 的 Linux 系统，需要本地权限且触发 mode1 重置后卸载驱动才能利用，CVSS 评分 5.5，危害等级中等。AMD 已在后续内核版本中修复此问题。"
published = "2025-05-02T16:15:26.420"
remediation = "建议将 Linux 内核升级至 6.3 及以上版本，或更新至 6.1.21（LTS 分支）、6.2.8（稳定分支）。如无法立即升级，可在加载 amdgpu 模块前通过内核启动参数 `modprobe.blacklist=amdgpu` 临时禁用 AMD GPU 驱动作为缓解措施。"
score = 5.5
severity = "MEDIUM"
sources = ["msrc"]
title = "AMD Linux Kernel drm/amdgpu PSP 固件缓冲区引用计数错误漏洞"
updated = "2026-06-17T06:44:14.733"

