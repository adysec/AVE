[basic]
description = "Joomla! 的 MMS Blog 组件 2.3.0 中存在目录遍历漏洞，该漏洞源于程序对 controller 参数过滤不严，远程攻击者可通过在参数中注入 ../ 序列构造恶意请求，绕过路径限制读取服务器上的任意敏感文件，如配置文件等。影响运行 Joomla! 且安装 MMS Blog 2.3.0 组件的网站，攻击者无需认证即可远程利用，导致敏感信息泄露。"
published = "2010-04-23T14:30:01.243"
remediation = "立即卸载或禁用 MMS Blog (com_mmsblog) 2.3.0 组件，该组件已长期无人维护且无官方补丁。同时检查服务器上是否仍存在 controller 参数传递，在 Web 应用防火墙 (WAF) 层添加规则拦截 `..` 目录遍历攻击载荷。建议迁移至其他仍在维护的 Joomla! 博客扩展。"
score = 5
severity = "MEDIUM"
sources = ["nuclei"]
title = "Joomla! MMS Blog 组件目录遍历漏洞"
updated = "2026-06-16T23:18:29.410"

