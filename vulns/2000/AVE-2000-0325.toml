[basic]
description = "Computalynx CProxy Server 3.3 SP2 存在缓冲区溢出漏洞，远程攻击者可通过向目标服务器发送超长 HTTP 请求触发缓冲区溢出，导致服务进程崩溃，造成拒绝服务。该漏洞影响 CProxy Server 3.3 SP2 版本，攻击者无需身份认证即可通过网络远程利用，危害等级中危。目前已公开 PoC 利用代码，可验证该漏洞的存在。"
published = "2000-05-16T04:00:00.000"
remediation = "建议立即升级 CProxy Server 至 3.3 SP2 以上版本（如厂商仍提供支持），或在网络边界防火墙中限制对 TCP 8080 端口的访问，仅允许可信 IP 段连接；同时部署入侵检测系统（IDS）规则检测超长 HTTP 请求（超过 247 字节的 GET 请求），拦截恶意载荷。由于该产品已停止维护，建议迁移至仍在安全更新周期内的替代代理服务器产品。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Computalynx CProxy Server 缓冲区溢出拒绝服务漏洞"
updated = "2026-06-16T21:51:37.593"

