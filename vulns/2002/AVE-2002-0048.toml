[basic]
description = "Fetchmail 6.0.0 及更早版本存在缓冲区溢出漏洞，远程攻击者无需认证即可利用该漏洞。漏洞存在于 readheaders 函数处理超长邮件头以及 parse_received 函数解析超长 Received 头时，未正确校验数据长度导致缓冲区溢出。攻击者可通过向目标邮件服务器发送特制的恶意邮件触发此漏洞，造成服务崩溃（拒绝服务）或执行任意代码。该漏洞影响所有 Fetchmail 6.0.0 及之前版本，CVSS 评分 7.5，危害等级高。"
published = "2002-10-11T04:00:00.000"
remediation = "升级 Fetchmail 至 6.1.0 或更高版本，该版本修复了 readheaders 和 parse_received 函数中的缓冲区溢出问题。如无法立即升级，可在邮件服务器端限制邮件头长度，或使用防火墙限制对 Fetchmail 服务的访问来源 IP。Red Hat 用户可安装 RHSA-2002:216 提供的更新包，Debian 用户可安装 DSA-171 提供的更新包。"
score = 7.5
severity = "HIGH"
sources = ["osv"]
title = "Fetchmail 缓冲区溢出远程代码执行漏洞"
updated = "2026-06-16T21:58:52.433"

