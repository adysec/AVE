[basic]
description = "Linux cdwtools 软件包 0.93 及更早版本存在不安全的临时文件处理漏洞，本地攻击者可通过在 /tmp 目录下创建符号链接或预测临时文件名，利用程序对临时文件的非安全操作实现特权提升，进而获取 root 权限。该漏洞影响使用该工具包的 Linux 系统，攻击者需拥有本地账号。"
published = "1999-10-22T04:00:00.000"
remediation = "立即将 cdwtools 升级至 0.94 或更高版本（该版本修复了 /tmp 目录下不安全的临时文件创建问题）。对于 SUSE Linux 系统，请安装 SUSE Security Announcement 25 提供的补丁包。若 cdwtools 已不再维护，建议迁移至替代工具（如 cdrkit/wodim）避免继续使用过时软件。作为临时缓解措施，严格限制本地非授信用户登录系统，并避免在 cdwtools 运行期间在 /tmp 目录下创建符号链接。"
score = 6.2
severity = "MEDIUM"
sources = ["cve"]
title = "Linux cdwtools 本地权限提升漏洞"
updated = "2026-06-16T21:51:33.670"

