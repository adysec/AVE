[basic]
description = "LakeWeb Filemail CGI 脚本对用户输入的 recipient 电子邮件地址字段未做任何过滤，直接拼接传递给后端 shell 命令执行。攻击者可构造包含分号、管道符等 shell 元字符的恶意邮件地址，在服务器上以 Web 服务器权限执行任意系统命令，进而获取敏感信息、植入后门或控制整台服务器。该漏洞无需身份验证，攻击者仅需发送特制 HTTP 请求即可远程触发。"
published = "1998-11-09"
remediation = "立即联系厂商获取已修复版本，或在 CGI 脚本中对 recipient 邮箱字段做严格的输入过滤，移除 `;` `|` `&` `` ` `` `$` `()` `{}` `[]` 等 shell 元字符，并对 `@` `.` 等合法字符做白名单校验；建议使用 Perl 的 `quotemeta()` 函数或安全 API 替代直接拼接 shell 命令。如产品已停止维护，建议替换为持续更新维护的邮件发送方案或禁用该 CGI 脚本。"
score = 7.5
severity = "HIGH"
sources = [
    "cve",
    "epss",
]
title = "LakeWeb Filemail CGI 远程命令执行漏洞"
updated = "2026-06-16"

