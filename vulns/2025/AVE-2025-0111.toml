[basic]
description = "Citrix NetScaler ADC 与 NetScaler Gateway 存在内存溢出漏洞（CWE-119），当设备被配置为网关（VPN 虚拟服务器、ICA 代理、CVPN、RDP 代理）或 AAA 虚拟服务器时，未经身份认证的远程攻击者可通过发送特制请求触发内存溢出，导致非预期控制流和拒绝服务，严重情况下可导致远程代码执行。CVSS 评分 9.2，危害等级严重，建议尽快安装官方安全更新。"
published = "2025-06-25T13:15:27.293"
remediation = "立即将 NetScaler ADC 和 NetScaler Gateway 升级至以下安全版本：14.1 升级到 14.1-47.46 及以上，13.1 升级到 13.1-59.19 及以上，13.1 FIPS/NDcPP 升级到 13.1-37.236 及以上。该漏洞已被 CISA 列入已知被利用漏洞目录（KEV），须在 2025 年 7 月 21 日前完成修复。如无法立即升级，可临时在防火墙上限制对 Gateway（VPN/ICA Proxy/CVPN/RDP Proxy）及 AAA 虚拟服务器的外部访问作为缓解措施。"
score = 9.2
severity = "CRITICAL"
sources = ["hwpoc"]
title = "Citrix NetScaler ADC 和 NetScaler Gateway 内存溢出远程代码执行漏洞"
updated = "2026-06-17T10:02:07.007"

