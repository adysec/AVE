[basic]
description = "Qmail 1.01 的 SMTP 服务在处理超长命令时存在拒绝服务漏洞。攻击者可通过向目标服务器发送特制的超长 SMTP 命令，触发服务端缓冲区处理异常，导致 Qmail 进程崩溃，从而使邮件服务不可用。该漏洞影响 Dan Bernstein 开发的 Qmail 1.01 版本，攻击条件简单，无需身份认证即可远程触发，利用门槛较低。"
published = "1997-07-01T04:00:00.000"
remediation = "立即将 Qmail 从 1.01 版本升级至 netqmail 1.06（当前最新稳定版），该版本已在 qmail-smtpd 中对 SMTP 命令行长度做了严格上限检查。如暂时无法升级，可通过系统 ulimit 对 qmail-smtpd 进程设置内存限制（如 limit memorylocked 64M）作为临时缓解；同时在防火墙或 TCP Wrappers 层面限制 SMTP 端口的来源 IP 范围以减少暴露面。对于仍在运行旧版 qmail 的系统，建议迁移至持续维护的 netqmail 项目（netqmail.org）或替换为 Postfix 等现代 MTA。"
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "Dan Bernstein Qmail 1.01 SMTP 长命令拒绝服务漏洞"
updated = "2026-06-16T21:48:00.120"

