[basic]
description = "Adobe ColdFusion 9.0、9.0.1、9.0.2 及 10 版本在未配置管理员密码时存在受限目录访问漏洞。远程攻击者无需身份认证即可通过未公开的向量绕过目录访问限制，读取服务器上的敏感文件，导致信息泄露。该漏洞已在 2013 年 1 月被野外利用，影响范围广泛。建议用户立即配置管理员密码或升级至修复版本。"
published = "2013-01-09T01:55:03.553"
remediation = "立即升级 Adobe ColdFusion 至官方修复版本：CF9 升级至 9.0.2 并安装 APSB13-03 安全更新，CF10 升级至 Update 2 或更高版本。同时务必在 ColdFusion Administrator 中设置管理员密码，禁止空密码部署。如无法立即升级，可在 Web 服务器（IIS/Apache）层面配置访问控制规则，限制对 /CFIDE/ 等敏感目录的远程访问。"
score = 7.5
severity = "HIGH"
sources = ["kev"]
title = "Adobe ColdFusion 受限目录访问漏洞"
updated = "2026-06-16T23:49:47.607"

