[basic]
description = "Tektronix PhaserLink 打印机 Web 服务器存在未授权访问漏洞，远程攻击者无需任何身份认证，直接访问 ncl_items.html、ncl_subjects.html 等未公开的 URL 即可获取管理员密码，从而完全控制打印机设备。该漏洞影响 Phaser 740/750/750DP/840/930 等多款网络打印机，CVSS 评分 10.0，危害等级严重。攻击者可利用获取的管理员权限修改打印机配置、泄露敏感文档或作为内网跳板进行进一步渗透。"
published = "1999-11-16T05:00:00.000"
remediation = "该打印机已停止技术支持且无官方补丁，建议立即禁用 PhaserLink Web 服务（通过打印机面板菜单或 Telnet 关闭 HTTP 端口），或在网络防火墙上限制仅允许受信任管理 IP 访问打印机 9100/80 端口，并将打印机置于独立管理 VLAN 中避免暴露于公网。"
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "Tektronix PhaserLink网络打印机 Web服务器 管理员密码泄露漏洞"
updated = "2026-06-16T21:50:35.480"

