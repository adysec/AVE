[basic]
description = "GNU Emacs 20 的 make-temp-name Lisp 函数在创建临时文件时使用可预测的文件名，导致攻击者能够提前创建符号链接指向这些临时文件。当 Emacs 进程向这些可预测名称的临时文件写入敏感数据时，实际上会写入攻击者控制的符号链接目标，从而实现本地信息窃听。该漏洞影响 Emacs 20 版本，攻击者需具备在目标系统上创建符号链接的本地权限，成功利用后可导致敏感会话数据、密码或其他机密信息被非法获取。"
published = "2000-04-18T04:00:00.000"
remediation = "建议升级至 GNU Emacs 20.7 或更高版本（如 Emacs 21.1+），修复 make-temp-name 可预测临时文件名漏洞。若暂时无法升级，请设置 TMPDIR 环境变量指向权限 700 的私有目录（如 ~/.tmp），并设置 umask 077 限制临时文件权限，防止符号链接攻击。同时避免在多用户可写目录（如 /tmp）中使用 make-temp-name 创建敏感临时文件。"
score = 3.6
severity = "LOW"
sources = ["cve"]
title = "GNU Emacs 临时文件可预测符号链接攻击漏洞"
updated = "2026-06-16T21:51:22.010"

