[basic]
description = "Netscape Enterprise Server 3.5.1及3.6版本中搜索引擎的默认配置存在信息泄露漏洞。远程攻击者无需认证即可通过构造特制的搜索请求，利用HTML-tocrec-demo1.pat模式文件读取服务器上JHTML文件的源代码，导致敏感信息（如数据库连接参数、业务逻辑配置等）泄露。该漏洞影响Netscape Enterprise Server多个版本，攻击复杂度较低。"
published = "1999-07-30T04:00:00.000"
remediation = "Netscape Enterprise Server 已停止维护且不再提供安全更新。建议立即迁移至受支持的 Web 服务器（如 Apache HTTP Server、Nginx 或 IIS）。作为临时缓解措施，可删除或重命名默认搜索配置中的 HTML-tocrec-demo1.pat 模式文件，并限制对搜索功能的访问权限。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Netscape Enterprise Server JHTML 文件源码泄露漏洞"
updated = "2026-06-16T21:49:47.070"

