[basic]
description = "大华 ICC 智能指挥中心存在远程代码执行漏洞。攻击者可通过向 `/evo-runs/v1.0/push` 接口发送特制的 POST 请求，利用 `agent.ossm.mapping.config` 方法中的 `shellPath` 参数注入系统命令，导致目标服务器执行任意命令。该漏洞攻击复杂度低，无需身份认证即可利用，可导致服务器被完全控制，危害严重。影响大华 ICC 系统相关版本。"
published = "0715"
remediation = "建议立即升级大华 ICC（Integrated Command Center）至官方最新版本，该漏洞在 v1.0.5 及之后版本中已修复。如无法立即升级，应在防火墙/WAF 层面限制 `/evo-runs/v1.0/push` 接口的访问来源，仅允许受信任管理 IP 访问，并对 `shellPath`、`filePath` 等参数实施严格的输入校验，禁止包含 shell 元字符（如 `;`、`|`、`$()`、反引号等）。同时建议将大华 ICC 部署于独立管理网段，避免暴露在公网。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "大华 ICC 远程代码执行漏洞"
updated = "0715"

