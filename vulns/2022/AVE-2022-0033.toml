[basic]
description = "Linux 内核 USB DWC3 驱动的主机模式存在资源管理缺陷，在设置 ACPI companion 时会意外替换父设备 dwc3 的 fwnode->secondary 指针，导致资源泄漏等潜在副作用。本地攻击者可利用已获得的最低权限触发该漏洞，影响系统稳定性。CVSS 评分 5.5，危害等级中。Linux 主线内核已在提交中移除此操作修复此问题。"
published = "2025-02-26T07:01:07.413"
remediation = "升级 Linux 内核至 5.17.15、5.18.4 或更新版本（5.19+）。各长期支持发行版请安装对应的稳定内核更新包，例如 Ubuntu 通过 apt upgrade 更新 linux-image 包，RHEL/CentOS 通过 yum update kernel 获取修复。该漏洞由 dwc3 主机驱动中错误设置 ACPI companion 导致 fwnode 指针意外覆盖，可能引发资源泄漏，无法通过配置缓解，必须更新内核修复。"
score = 5.5
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux USB DWC3 主机 ACPI 伴生对象设置不当导致资源泄漏漏洞"
updated = "2026-06-17T05:17:39.940"

