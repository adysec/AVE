[basic]
description = "D-Link DSL-2760U 网关（Rev. E1）固件中存在多处跨站脚本（XSS）漏洞。由于 sntpcfg.cgi、ddnsmngr.cmd、todmngr.tod、urlfilter.cmd、scprttrg.cmd、scoutflt.cmd、portmapcfg.cmd、snmpconfig.cgi、scinflt.cmd、prmngr.cmd、ippcfg.cmd、samba.cgi、wlcfg.wl 等多个 CGI 脚本对用户输入参数（如 ntpServer1、username、wlSsid 等 16 个参数）缺乏充分的过滤与转义，远程认证用户可通过向这些参数注入恶意脚本代码，在受害者浏览器中执行任意 HTML 或 JavaScript，导致敏感信息泄露或会话劫持。攻击者需拥有路由器管理面板的合法凭据，并诱使管理员访问特制链接。该漏洞影响 D-Link DSL-2760U Rev. E1 版本，CVSS 评分 5.4，危害等级中危。"
published = "2013-11-19T04:50:12.063"
remediation = "将 DSL-2760U 固件升级至 v1.12 或更高版本。登录设备 Web 管理界面，进入 Maintanence → System → Upgrade Firmware 上传固件更新。如设备已停止支持无法获取官方固件，建议禁用远程管理功能（默认关闭），限制管理界面仅内网访问，并避免在已登录管理会话的情况下点击不明链接。"
score = 5.4
severity = "MEDIUM"
sources = ["kev"]
title = "D-Link DSL-2760U 网关多参数跨站点脚本漏洞"
updated = "2026-06-16T23:58:32.217"

