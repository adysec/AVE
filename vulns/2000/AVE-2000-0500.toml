[basic]
description = 'Internet Explorer 4.x 和 5.x 中的 Microsoft Active Setup ActiveX 组件存在安全验证缺陷，未能正确校验软件发布者的真实身份。远程攻击者可构造恶意网页，通过伪造软件制造商为 "Microsoft" 的方式，诱使受害者访问后在不弹出安全确认提示的情况下静默安装任意软件组件。利用该漏洞无需用户明确授权，攻击条件仅需目标用户使用受影响版本的 IE 浏览器并打开攻击者控制的页面，可能导致恶意代码在用户系统上被安装和执行，进而危害系统安全。CVSS 评分 7.6，危害等级高。'
published = "2000-02-21T05:00:00.000"
remediation = "升级到 Internet Explorer 5.01 Service Pack 1 或更高版本以修复该 Active Setup ActiveX 组件缺陷。如无法立即升级，可在 Internet Explorer 的「安全设置」中将 ActiveX 控件和插件设为「禁用」或「提示」，并在组策略中禁用未签名 ActiveX 安装，同时限制可信站点区域以阻止远程静默安装软件组件。"
score = 7.6
severity = "HIGH"
sources = ["cve"]
title = "Microsoft Internet Explorer ActiveX Active Setup 未授权软件安装漏洞"
updated = "2026-06-16T21:51:07.510"

