[basic]
description = "Wu-FTPD 2.6.0 及更早版本中的 lreply 函数存在格式化字符串漏洞，未经验证的远程攻击者可通过 SITE EXEC 命令向目标系统发送精心构造的格式化字符串，触发栈覆盖写入，从而执行任意代码。该漏洞影响广泛部署的 WU-FTPD 服务，CVSS 评分 10.0，危害等级严重。"
published = "2000-07-07T04:00:00.000"
remediation = "将 wu-ftpd 升级至 2.6.1 或更高版本以修复 lreply 函数的格式化字符串漏洞。若无法升级，在 ftpaccess 配置文件中禁用 SITE EXEC 命令以临时缓解风险。"
score = 10
severity = "CRITICAL"
sources = ["cve"]
title = "WU-FTPD wu-ftpd 远程格式字符串漏洞"
updated = "2026-06-16T21:52:01.597"

