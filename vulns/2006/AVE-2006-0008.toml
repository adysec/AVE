[basic]
description = "Apache Struts 1.2.9 之前版本中的 ActionForm 组件与 BeanUtils 1.7 结合使用时存在暴露危险方法的漏洞。远程攻击者可通过构造恶意的 multipart/form-data 编码表单，利用参数名引用 getMultipartRequestHandler 公共方法，进而访问 CommonsMultipartRequestHandler 实现及 BeanUtils 内部的未授权元素，导致目标应用拒绝服务。该漏洞影响 Apache Struts 1.2.7 和 1.2.8 版本，CVSS 评分 7.5，危害等级高，无需认证即可远程触发。"
published = "2006-03-30T22:02:00.000"
remediation = "升级 Apache Struts 至 1.2.9 或更高版本，该版本修复了 ActionForm 中 multipart/form-data 编码表单的拒绝服务问题。如无法立即升级，可限制外部用户提交 multipart 表单数据，或使用 Web 应用防火墙（WAF）过滤含异常参数名的 multipart 请求作为临时缓解措施。"
score = 7.5
severity = "HIGH"
sources = ["kev"]
title = "Apache Struts ActionForm 拒绝服务漏洞"
updated = "2026-06-16T22:23:10.577"

