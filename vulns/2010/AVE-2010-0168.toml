[basic]
description = "Adobe Reader 和 Acrobat 在解析 PDF 文件时，其捆绑的 LibTIFF 库存在整数溢出漏洞。攻击者可构造特制的 PDF 文档，诱使用户打开后触发整数溢出，导致应用程序崩溃或执行任意代码。该漏洞影响 Adobe Reader 及 Acrobat 8.2.1 之前版本和 9.3.1 之前版本，CVSS 评分 7.8，危害等级高。Adobe 已发布安全更新修复此漏洞。"
published = "2010-02-22T13:00:02.127"
remediation = "升级 Adobe Reader/Acrobat 至 8.2.1 或 9.3.1 及以上版本，此漏洞在 Adobe 安全公告 APSB10-07 中修复。对于无法升级的环境，可禁用浏览器 PDF 插件、设置 PDF 阅读器为受限模式或使用组策略禁用 JavaScript 执行作为临时缓解。"
score = 7.8
severity = "HIGH"
sources = ["kev"]
title = "Adobe Acrobat 与 Reader LibTIFF 整数溢出远程代码执行漏洞"
updated = "2026-06-16T23:15:40.397"

