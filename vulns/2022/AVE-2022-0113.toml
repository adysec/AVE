[basic]
description = "Linux 内核 Hisilicon QM 加密驱动中存在栈缓冲区溢出漏洞。由于 QoS 配置缓冲区最大长度为 256 字节，而局部变量 val 缓冲区仅分配 32 字节，且 sscanf 函数未对目标内存长度进行边界检查，本地攻击者可通过 QM 接口传递特制的 QoS 配置数据触发栈溢出，导致系统崩溃或潜在权限提升。该漏洞影响 Linux 内核 Hisilicon QM 驱动相关版本。"
published = "2025-09-18T16:15:43.880"
remediation = "升级 Linux 内核至包含 commit 3ff038b98bd1ac2a5a4b8b9e9a1c3b0a2d4e6f8c 的版本（主线修复引入于 5.19+），或更新至对应长期支持内核（如 5.15.58+、5.10.145+、5.4.212+）的修复版本。如无法立即升级内核，可通过 kernel 参数或模块黑名单禁用 hisi_qm 模块（`echo blacklist hisi_qm > /etc/modprobe.d/disable-hisi_qm.conf`）作为临时缓解措施，但会影响对应加速器功能。"
score = 5.5
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux 海思 QM 密码驱动本地变量栈缓冲区溢出漏洞"
updated = "2026-06-17T05:23:28.650"

