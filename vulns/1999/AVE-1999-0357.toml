[basic]
description = "Microsoft IIS 及 Site Server 附带的 codebrws.asp 示例文件存在访问控制缺失漏洞，远程攻击者无需任何身份认证即可通过直接向该示例文件发送特制 HTTP 请求，利用其对文件路径参数缺乏充分校验的缺陷，读取服务器上任意文件的内容，导致敏感信息泄露。该漏洞攻击复杂度低，仅影响系统机密性，CVSS v2 评分 5.0，中危等级。Microsoft 已发布安全公告 MS99-013，建议删除或限制对示例文件的访问以完成修复。"
published = "1999-05-07T04:00:00.000"
remediation = "删除 IIS 服务器中 `/IISExamples` 及 `/IISSamples` 目录下的 `codebrws.asp` 等示例文件，或直接卸载 IIS 示例组件。对于无法删除文件的场景，可在 IIS 管理器中限制 `.asp` 脚本映射或通过 NTFS 权限拒绝对示例目录的读取访问。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Microsoft Internet Information Server 任意文件读取漏洞"
updated = "2026-06-16T21:48:57.393"

