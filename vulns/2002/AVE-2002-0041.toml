[basic]
description = 'BIND 4 及 BIND 8.2.x 的存根解析器库，以及 glibc 2.2.5 及更早版本、libc 和 libresolv 等其他库，在处理 DNS 响应时使用了最大缓冲区大小而非实际数据大小，导致存根解析器读取超出实际边界（即"读取缓冲区溢出"）。远程攻击者无需身份认证即可通过向目标发送特制的 DNS 响应触发此漏洞，造成目标服务或系统崩溃（拒绝服务）。该漏洞影响范围广泛，涉及众多 Unix/Linux 系统中使用的 DNS 解析库。'
published = "2002-10-11T04:00:00.000"
remediation = "升级 glibc 至 2.2.5 以上版本（如 2.3.x 系列），或安装对应发行版安全更新：Red Hat 请安装 RHSA-2002:197 / RHSA-2002:258 / RHSA-2003:022 提供的 glibc 更新；NetBSD 请应用 SA2002-015 补丁；Mandrake 请安装 MDKSA-2004:009 更新。如使用 BIND 4/8，建议升级至 BIND 9 系列。"
score = 5
severity = "MEDIUM"
sources = ["osv"]
title = "ISC BIND 及 glibc DNS 解析器库读取缓冲区溢出拒绝服务漏洞"
updated = "2026-06-16T21:58:48.547"

