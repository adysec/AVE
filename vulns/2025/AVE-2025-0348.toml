[basic]
description = "汉王e脸通综合管理平台 uploadMeetingFile.do 接口存在任意文件上传漏洞，未经身份认证的远程攻击者可通过向该接口上传特制恶意文件，绕过文件类型过滤限制，将 Webshell 或恶意脚本上传至服务器，从而获取服务器控制权限，实现远程代码执行。该漏洞影响汉王e脸通综合管理平台相关版本，危害严重，建议用户尽快联系厂商获取修复方案。"
published = "0721"
remediation = "建议升级汉王e脸通综合管理平台至最新版本，或在应用服务器层面限制 uploadMeetingFile.do 接口的访问权限，仅允许可信 IP 访问；同时配置严格的文件类型白名单校验（仅允许图片/文档类扩展名），并禁用上传目录的脚本执行权限。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "汉王 e脸通综合管理平台 uploadMeetingFile.do 任意文件上传漏洞"
updated = "0721"

