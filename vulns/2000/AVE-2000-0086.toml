[basic]
description = "SalesCart 是一款电子商务购物车应用程序，其商品交易处理过程中存在设计缺陷，远程攻击者可通过修改网页表单中的隐藏字段（hidden form fields）来篡改敏感购买信息，如商品价格、数量或订单金额等。该漏洞无需身份认证即可利用，攻击者只需拦截并修改表单提交数据即可实现低价购买或非法获取商品，对电子商务系统的交易完整性构成严重威胁。"
published = "2000-02-01T05:00:00.000"
remediation = "对提交的所有表单数据在服务端进行严格校验，禁止信任 hidden 隐藏字段的值（如价格、数量等敏感信息），应在服务端 session 中维护购物车数据，而非通过客户端表单传递关键业务参数；如使用 SalesCart 旧版本，建议迁移至当前仍受支持的购物车系统。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "SalesCart 购物车应用隐藏表单字段信息篡改漏洞"
updated = "2026-06-16T21:51:00.290"

