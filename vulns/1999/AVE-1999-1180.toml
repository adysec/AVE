[basic]
description = "Ipswitch IMail 5.0 及更早版本内置的 IMAP 服务器（imapd）在登录处理函数中存在缓冲区溢出缺陷。远程攻击者在未经过身份认证的情况下，向目标服务器的 IMAP 服务（默认端口 143）发送超长的用户名或超长的密码，即可触发该溢出，导致服务崩溃造成拒绝服务，在特定条件下还可能进一步执行任意代码。受影响的为运行 IMail 5.0 及之前版本的邮件服务器，攻击仅需网络可达目标 IMAP 端口并构造恶意登录请求即可完成，无需本地权限或用户交互。"
published = "2005-05-02T04:00:00.000"
remediation = "建议立即升级到 MDaemon Email Server 最新版本（原 Ipswitch IMail 已停止支持），或应用 eEye 发布的补丁修复 IMAP 服务登录函数的缓冲区溢出漏洞。如无法立即升级，应在防火墙或路由器层面限制 143 端口的访问来源，仅允许可信网络访问 IMAP 服务，并加强 IMAP 登录失败监控，防止攻击者利用过长的用户名或密码触发缓冲区溢出导致服务中断或远程代码执行。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Ipswitch IMail imapd 登录功能缓冲区溢出拒绝服务漏洞"
updated = "2026-06-16T21:50:42.733"

