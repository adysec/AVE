[basic]
description = "Linux 内核 MPTCP（多路径 TCP）协议实现在计算 TCP 选项长度时存在逻辑缺陷，ADD_ADDR 选项与 DSS 选项未正确互斥，导致 TCP 选项溢出，进而引发 `skb_shared_info` 的 `nr_frags` 字段损坏。本地低权限攻击者可通过构造特制的 MPTCP 数据包触发空指针解引用，导致内核崩溃，造成拒绝服务。该漏洞影响 Linux 内核 6.13-rc3 及之前版本，CVSS 评分 5.5，危害等级中等。"
published = "2025-01-15T13:15:12.510"
remediation = '立即将 Linux 内核升级至以下已修复版本：主线 6.13 及以上、6.12.9、6.6.70、6.1.124 或 5.15.177。对于 Ubuntu 系统，安装 USN-7381-1 或 USN-7459-1 提供的更新内核包；Debian 用户参考 DLA-4071-1 公告更新。如无法立即升级，可通过禁用 MPTCP 内核模块（`echo "blacklist mptcp" > /etc/modprobe.d/disable-mptcp.conf && update-initramfs -u`）作为临时缓解措施。'
score = 5.5
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux Kernel MPTCP 空指针解引用漏洞"
updated = "2026-06-17T08:14:08.337"

