[basic]
description = "华为 AnyOffice 部分版本存在安全漏洞，攻击者可利用该漏洞对目标系统实施攻击。AnyOffice 作为企业移动办公解决方案，其部分版本在处理特定请求时存在缺陷，可能导致信息泄露或未授权访问。攻击者可在特定条件下利用该漏洞影响企业办公环境的机密性与完整性，进而威胁内部数据安全。建议用户及时关注华为官方安全公告并升级至修复版本。"
published = "2023-08-09"
remediation = "立即将华为 AnyOffice 升级至华为官方发布的最新稳定版本，停止使用受影响的旧版本。在补丁部署前，通过防火墙仅开放 AnyOffice 业务所需端口，限制可接入终端的 IP 范围，禁止非授权网段访问，并开启访问日志审计以监控异常连接行为。"
score = 5.5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "华为 AnyOffice 特定版本安全漏洞"
updated = "2023-08-09"

