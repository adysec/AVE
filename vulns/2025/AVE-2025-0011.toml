[basic]
description = "联想网盘FileZ客户端存在跨站脚本漏洞。该漏洞源于应用程序未对用户访问的链接进行充分的安全验证与内容过滤，攻击者可构造包含恶意脚本的特制URL。当本地用户访问该恶意链接时，恶意代码将在客户端上下文中执行，可能导致用户数据泄露或远程代码执行。漏洞利用需用户主动点击攻击者提供的链接，成功利用后可进一步获取系统权限。"
published = "2025-04-25T16:15:26.020"
remediation = "立即将联想 FileZ 客户端升级至联想官方发布的修复版本（请通过 FileZ 客户端内置更新或联想官网下载最新版）。在无法立即升级时，应避免点击来源不明的链接，并在企业网络出口处启用 Web 过滤与 XSS 防护策略作为临时缓解措施。"
score = 5.1
severity = "MEDIUM"
