[basic]
description = "Slmail 邮件服务器 3.0.2421 及 2.5 版本的 POP3 服务存在拒绝服务漏洞。远程攻击者可通过向 POP3 端口发送特制数据包，导致服务进程崩溃或停止响应，影响邮件系统的正常收发功能。该漏洞无需认证即可利用，攻击难度较低，CVSS 评分 5.0，危害等级中危，建议用户升级至最新版本以修复此漏洞。"
published = "1997-10-01T04:00:00.000"
remediation = "升级 Slmail 至 3.0.2421 之后的安全版本（如 3.0.2422 或更高），该漏洞已在后续版本中修复。如无法升级，建议在防火墙上限制对 POP3 端口（110/TCP）的访问，仅允许受信任的邮件客户端 IP 地址连接，以降低被远程攻击的风险。同时可考虑迁移至仍受支持的邮件服务器软件（如 Dovecot、Cyrus IMAP）。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Slmail POP3 拒绝服务漏洞"
updated = "2026-06-16T21:48:02.843"

