[basic]
description = "SyGate Remote Management 管理服务存在访问控制缺陷，未对管理端口进行适当身份验证限制，远程攻击者无需认证即可直接访问该管理服务，向目标系统发送特制请求可导致拒绝服务或获取网络流量统计等敏感信息。该漏洞影响 SyGate 多个版本，攻击者需能网络可达目标主机，危害等级高，建议及时升级或配置访问控制策略。"
published = "2000-01-27T05:00:00.000"
remediation = "升级 SyGate 至 4.0 以上版本，或在防火墙规则中限制仅允许受信任 IP 访问管理端口（默认 7323/TCP）。如无需远程管理功能，建议直接禁用 Remote Management 服务以消除攻击面。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "Sybergen SyGate 远程管理服务拒绝服务漏洞"
updated = "2026-06-16T21:51:01.660"

