[basic]
description = "Microsoft FrontPage 默认将用户提交的表单结果存储在 `/_private/form_results.txt` 文件中，该文件位于网站根目录下且权限设置为世界可读，导致任何知晓该路径的远程攻击者均可直接通过浏览器访问此文件，从而窃取其他用户提交的敏感信息（如密码、信用卡号、个人隐私数据等）。此漏洞影响 Microsoft FrontPage 及使用其默认配置的 Web 服务器，属于信息泄露类安全风险，攻击者无需身份认证即可利用。"
published = "1999-08-24T04:00:00.000"
remediation = "将 FrontPage 表单结果保存路径从默认的 `/_private/` 目录修改为非 Web 可访问的服务器本地路径；同时通过 Web 服务器配置（如 IIS 或 Apache）对 `/_private/` 目录添加访问控制规则，禁止外部直接访问。建议升级到 FrontPage 2002 或更高版本，或迁移至 SharePoint 等现代协作平台以彻底规避此问题。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Microsoft FrontPage 表单结果信息泄露漏洞"
updated = "2026-06-16T21:49:36.350"

