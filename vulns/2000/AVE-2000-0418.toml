[basic]
description = "Microsoft Windows Media Services 4.0/4.1 中的 Windows Media Encoder 组件存在输入验证缺陷，远程攻击者可通过向目标系统发送特制的畸形请求，导致 Windows Media 编码器服务崩溃或停止响应。该漏洞无需身份认证即可利用，影响 Windows Media Services 4.0 及 4.1 版本，CVSS 评分 5.0，危害等级中等。Microsoft 已在 MS00-038 安全公告中发布补丁修复此漏洞。"
published = "2000-05-30T04:00:00.000"
remediation = "安装 Microsoft 安全公告 MS00-038 提供的补丁，或升级至 Windows Media Services 更高版本。对于已停止支持的旧版系统，在防火墙上限制对 Windows Media Encoder 服务端口（默认 8080/TCP）的访问，仅允许受信任 IP 连接，并考虑迁移至受支持的 Windows Server 版本。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Microsoft Windows Media Encoder 畸形请求拒绝服务漏洞"
updated = "2026-06-16T21:51:51.460"

