[basic]
description = "Multisoft FlagShip 4.4 中的 FSserial、FlagShip_c 和 FlagShip_p 程序安装时被设置为全局可写权限，导致本地攻击者可将这些程序替换为特洛伊木马，从而实现权限提升或执行恶意代码。该漏洞需要攻击者拥有本地系统访问权限，影响 FlagShip 4.4 版本，CVSS 评分 6.2，危害等级中危。建议限制文件权限或升级到不受影响的版本。"
published = "2000-10-20T04:00:00.000"
remediation = "立即检查并修正 FlagShip 安装目录中 FSserial、FlagShip_c、FlagShip_p 三个文件的权限，使用 chmod 755 或 chmod 750 移除全局可写权限（如 chmod 755 /usr/local/flag ship/FlagShip_c）。同时校验文件完整性（对比原始 MD5/SHA1 校验和），若发现被篡改应从官方源重新安装。如有多用户共享系统，建议限制可登录用户范围或使用文件完整性监控工具定期扫描该目录。若厂商后续发布新版本，应升级至不再存在此权限问题的最新版本。"
score = 6.2
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Multisoft FlagShip 4.4 安装文件权限漏洞"
updated = "2026-06-16T21:52:20.517"

