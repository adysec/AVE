[basic]
description = 'Linux fetchmail 5.8.6 之前版本存在缓冲区溢出漏洞，远程攻击者可通过向目标邮件服务器发送一个包含超长 "To:" 字段的特制电子邮件头触发该漏洞，导致缓冲区溢出，从而在受影响系统上执行任意代码。该漏洞影响 fetchmail 全系早期版本，CVSS 评分 7.5，危害等级高。攻击者无需身份认证即可远程利用，攻击复杂度低，可能造成敏感信息泄露、系统完整性破坏及服务可用性下降。'
published = "2001-12-06T05:00:00.000"
remediation = "立即升级 fetchmail 至 5.8.6 或更高版本。若无法升级，可配置邮件过滤规则拦截含有超长 To: 字段的邮件头，或在边界邮件网关层限制邮件头字段长度不超过 4096 字节。对于使用 fetchmail 转发的内部网络，可暂时改用其他邮件转发代理（如 getmail）替代。"
score = 7.5
severity = "HIGH"
sources = ["redhat"]
title = "Linux fetchmail 缓冲区溢出远程代码执行漏洞"
updated = "2026-06-16T21:55:00.947"

