[basic]
description = "SunOS 4.1.1 至 4.1.3c 版本及 Open Windows 3.0 系统中，loadmodule 和 modload 程序在设置 setuid/setgid 权限时存在不安全的环境变量处理漏洞。本地攻击者可通过精心构造特定的环境变量，利用这些程序的特权提升漏洞获取 root 权限。该漏洞影响 SunOS 系列操作系统，无需用户交互即可被本地利用，CVSS 评分 10.0，危害等级严重。"
published = "1999-12-31T05:00:00.000"
remediation = "升级到 SunOS 4.1.4 及以上版本，或迁移至 Solaris 2.x (SunOS 5.x) 系列。如无法升级，移除 loadmodule 和 modload 的 setuid/setgid 权限：`chmod u-s /usr/bin/loadmodule` 和 `chmod g-s /usr/bin/modload`。同时检查并清除环境变量中的恶意 PATH/IFS 设置作为临时缓解。"
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "Sun SunOS loadmodule 本地权限提升漏洞"
updated = "2026-06-16T21:50:46.420"

