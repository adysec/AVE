[basic]
description = "Knox Software Arkeia 4.0 备份产品中的 nlservd 和 rnavc 组件存在缓冲区溢出漏洞，本地攻击者可通过向 HOME 环境变量传入超长字符串触发该漏洞，导致缓冲区溢出并获得 root 权限。该漏洞影响 Arkeia 4.0 及更早版本，攻击者需具有本地系统访问权限方可利用，成功利用后可直接获得系统最高控制权，造成严重的本地权限提升危害。"
published = "1999-09-23T04:00:00.000"
remediation = "立即升级至 Knox Arkeia 4.0 以上已修复版本，或迁移至 Arkeia 后续维护版本（如 Arkeia 5.0+）。如无法升级，作为临时缓解措施，移除 /usr/knox/bin/nlservd 和 /usr/knox/bin/rnavc 的 SUID 权限：chmod u-s /usr/knox/bin/nlservd /usr/knox/bin/rnavc。若不再使用该备份软件，建议彻底卸载 Knox Arkeia 软件包。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "Knox Software Arkeia 本地缓冲区溢出漏洞"
updated = "2026-06-16T21:50:38.923"

