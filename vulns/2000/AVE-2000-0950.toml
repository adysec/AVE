[basic]
description = "HP-UX 11.00 系统中的 bdf 程序存在缓冲区溢出漏洞，本地攻击者可通过向 -t 选项传递超长参数触发该漏洞，成功利用后可获取 root 权限，实现权限提升。该漏洞影响 HP-UX 11.00 版本，攻击者需拥有本地系统访问权限，无需身份认证即可利用，危害等级高。"
published = "2000-10-20T04:00:00.000"
remediation = "立即安装 HP 官方安全补丁 HPSBUX0007-066（对应 HP-UX 11.00 的 bdf 缓冲区溢出修复）。如无法打补丁，可临时移除 bdf 程序的 setuid root 权限：`chmod 755 /usr/bin/bdf`，或通过文件权限控制仅允许受信任用户执行 bdf 命令。鉴于 HP-UX 11.00 已停止维护，建议升级到受支持的 HP-UX 版本（如 11i v3）以获得持续安全更新。"
score = 7.2
severity = "HIGH"
sources = ["cve"]
title = "HP HP-UX bdf 缓冲区溢出漏洞"
updated = "2026-06-16T21:52:30.567"

