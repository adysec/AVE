[basic]
description = "Microsoft IIS 5.0 的 WebDAV 组件在处理畸形的 HTTP 请求时存在拒绝服务漏洞。远程攻击者无需身份认证，通过向目标服务器的 WebDAV 功能发送一系列特制的畸形请求，可导致 IIS 服务进程消耗大量系统资源直至崩溃，造成正常 Web 服务中断。该漏洞仅影响运行 IIS 5.0 的 Windows 2000 系统，攻击复杂度较低。"
published = "2001-06-02T04:00:00.000"
remediation = "安装 Microsoft 安全公告 MS01-016 提供的补丁 (Q301625)，禁用不需要的 WebDAV 扩展。由于 IIS 5.0 早已终止支持，建议升级至受支持的 IIS 版本（如 IIS 10.0），并在防火墙层面过滤对 WebDAV 端口的异常请求作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Microsoft IIS 5.0 WebDAV 拒绝服务漏洞"
updated = "2026-06-16T21:53:46.133"

