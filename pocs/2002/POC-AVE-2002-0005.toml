[info]
author = "ave"
description = "检测 Apache HTTP Server 分块编码（Chunked Encoding）整数溢出漏洞。Apache 1.3.x 至 1.3.24 及 2.0.x 至 2.0.36 版本在处理分块编码请求时存在整数溢出缺陷，远程攻击者可利用此漏洞造成拒绝服务或执行任意代码。"
id = "POC-AVE-2002-0005"
name = "Apache HTTP Server Chunked Encoding Remote Code Execution PoC"
severity = "high"
tags = [
    "cve-2002-0392",
    "apache",
    "chunked-encoding",
    "rce",
]
vuln_id = [
    "CVE-2002-0392",
    "AVE-2002-0005",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "header"
type = "word"
words = [
    "Apache/1.3",
    "Apache/2.0",
]
