[basic]
description = "Symantec pcAnywhere 8.0 存在拒绝服务漏洞，远程攻击者可通过向目标系统的 5631 端口发送大量数据，导致 CPU 占用率急剧升高，造成服务不可用。该漏洞无需身份认证即可触发，攻击门槛低，影响 pcAnywhere 8.0 版本，危害等级中等。"
published = "1999-05-28T04:00:00.000"
remediation = "升级到 Symantec pcAnywhere 8.0 以上版本，该漏洞已在后续版本中修复。如无法升级，可在防火墙层面限制对 5631 端口的访问，仅允许可信 IP 连接，以降低攻击面。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "赛门铁克 pcAnywhere 8.0 拒绝服务漏洞"
