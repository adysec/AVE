[basic]
description = "Linux 内核 rtw89 无线网卡驱动的 CFO（载波频率偏移）解析函数存在数组越界访问漏洞。硬件可上报非法的 mac_id（如索引 188），而 `rtw89_phy_cfo_parse` 函数在访问固定大小为 64 的数组前未进行边界校验，导致越界内存读写。本地攻击者可通过连接恶意 Wi-Fi 设备发送特制无线数据包触发此漏洞，造成内核崩溃或内存信息泄露，CVSS 评分 7.8，危害等级高。Linux 社区已通过添加 mac_id 边界检查修复此问题。"
published = "2025-02-26T07:01:23.333"
remediation = "建议升级 Linux 内核至 5.17.14、5.18.3 或更高版本，其中已为 rtw89 驱动的 CFO 处理逻辑添加 mac_id 边界检查。如无法立即升级内核，可通过黑名单禁用 rtw89_pci 内核模块（echo 'blacklist rtw89_pci' > /etc/modprobe.d/rtw89-blacklist.conf）作为临时缓解措施。"
score = 7.8
severity = "HIGH"
sources = ["msrc"]
title = "Linux rtw89 无线驱动 CFO 处理数组越界访问漏洞"
updated = "2026-06-17T05:18:08.930"

