[basic]
description = "vixie-cron（Paul Vixie 开发的 cron 实现）在处理 crontab 编译时存在不安全的临时文件创建漏洞。由于 crontab 使用可预测的文件名创建临时文件，且未能正确校验文件所有权，拥有 crontab spool 目录写入权限的本地攻击者可通过创建全局可写的临时文件，在受害者使用 crontab -e 编辑时篡改文件内容，从而执行任意命令实现权限提升。该漏洞影响 vixie-cron 各版本，CVSS 评分 3.7，危害等级低。"
published = "2001-01-09T05:00:00.000"
remediation = "升级 vixie-cron 至 3.0pl1-54 及以上版本，该修复改用 mkstemp() 创建临时文件并校验文件所有者身份。如系统使用 cronie，升级至 4.2 及以上版本。限制 /var/spool/cron 目录的写入权限，仅授权用户可写。作为临时缓解措施，监控 /tmp 目录下 crontab.* 临时文件的异常创建行为。"
score = 3.7
severity = "LOW"
sources = ["exploitdb"]
title = "Paul Vixie vixie-cron 本地权限提升漏洞"
updated = "2026-06-16T21:53:08.263"

