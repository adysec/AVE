[info]
author = "ave"
description = "检测 CVSWeb 1.80 中 cvsweb.cgi 脚本是否存在因不安全的 Perl open 函数调用导致的远程命令执行漏洞（CVE-2000-0670），通过 HTTP 请求验证脚本可访问性"
id = "POC-AVE-2000-0524"
name = "CVSWeb 1.80 cvsweb.cgi 远程命令执行漏洞 PoC"
severity = "high"
tags = ["ave-2000-0524"]
vuln_id = [
    "CVE-2000-0670",
    "AVE-2000-0524",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/cvsweb.cgi"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "cvsweb",
    "CVSWeb",
    "cvsweb.cgi",
]
