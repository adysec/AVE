[basic]
title = "WebStore 1.0 购物车 CGI 程序信息泄露漏洞"
description = "WebStore 1.0 购物车 CGI 程序 web_store.cgi 存在不正确的配置，可能导致私有信息被未授权用户获取。攻击者可以通过网络远程访问该 CGI 程序，利用配置缺陷读取敏感数据，造成信息泄露。该漏洞影响使用 WebStore 1.0 的在线商店系统，无需身份验证即可触发，攻击条件简单，影响面较广。"
severity = "MEDIUM"
score = 5.0
sources = ["cve", "nvd"]
published = "1999-04-20"
updated = "1999-04-20"
remediation = "检查 WebStore 1.0 的 web_store.cgi 配置文件，确保 CGI 程序运行权限最小化，限制对敏感目录的访问。建议升级到经过安全配置审核的更高版本购物车系统，或在 Web 服务器层面配置访问控制规则，禁止未授权用户直接执行该 CGI 脚本。"
[references]
