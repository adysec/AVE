[basic]
description = "Microsoft SQL Server 7.0 及 Microsoft Data Engine (MSDE) 1.0 存在权限提升漏洞，远程攻击者可通过向目标数据库发送特制的 SELECT 语句，利用 SQL 查询解析过程中的缺陷获取系统高级权限。该漏洞无需身份认证即可触发，攻击者成功利用后可执行任意代码、篡改数据或控制受影响系统。CVSS 评分 7.5，危害等级高。"
published = "2000-03-08T05:00:00.000"
remediation = "立即安装 Microsoft 安全公告 MS00-035 对应的 SQL Server 7.0 Service Pack 2 更新，或升级到更高版本。MSDE 1.0 用户应升级至 MSDE 2000 及以上受支持版本。由于 SQL Server 7.0 和 MSDE 1.0 已停止支持，建议迁移至当前受支持的 SQL Server 版本（如 SQL Server 2019/2022）。临时缓解措施：在防火墙层面限制对 TCP 1433 端口的访问，仅允许受信任 IP 连接。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "Microsoft SQL Server 7.0 及 MSDE 1.0 权限提升漏洞"
updated = "2026-06-16T21:51:12.873"

