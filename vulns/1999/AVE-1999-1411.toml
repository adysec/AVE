[basic]
description = "Majordomo 1.94.3 及更早版本存在远程命令执行漏洞。当邮件列表配置文件中使用了 advertise 或 noadvertise 指令时，未经过身份认证的远程攻击者可通过在邮件的 Reply-To（回复地址）头部中嵌入 Shell 元字符（如分号、管道符等）突破程序的安全过滤。目标系统将 Reply-To 头部内容传递给底层 Shell 处理时会执行攻击者注入的任意命令，从而实现远程代码执行。该漏洞影响所有使用存在缺陷版本 Majordomo 且配置了 advertise/noadvertise 指令的邮件列表服务器，攻击条件仅需向列表发送一封构造了恶意 Reply-To 头部的邮件，利用门槛较低，危害较大。"
published = "1997-08-24T04:00:00.000Z"
remediation = "升级 Majordomo 到 1.94.4 或更高版本，新版本对 Reply-To 头部中的 Shell 元字符进行了过滤处理，可消除此漏洞。如暂时无法升级，应在配置文件中移除或注释掉 advertise 和 noadvertise 指令，避免漏洞被触发。同时建议审查现有邮件列表配置，确认没有暴露于恶意构造的 Reply-To 头部攻击。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "Majordomo 远程命令执行漏洞"
updated = "2026-06-16T21:49:58.500Z"

