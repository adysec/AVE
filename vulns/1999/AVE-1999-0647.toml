[basic]
description = "ISC BIND 8.2/8.2.1 中存在一个文件描述符耗尽漏洞。BIND 服务在处理网络请求时使用系统文件描述符作为资源，fdmax 表示最大允许的描述符数量。当攻击者向 BIND 服务发送大量网络连接或查询请求，导致消耗超过 fdmax 的文件描述符限制时，BIND named 服务将无法继续正常处理新的请求，从而导致服务瘫痪、DNS 解析失败等拒绝服务问题。该漏洞影响 Windows、Linux 等系统运行 BIND 服务的用户。"
published = "1999-11-10T05:00:00.000"
remediation = "升级 ISC BIND 至 8.2.2 或更高版本，该版本修复了 fdmax 文件描述符耗尽导致的拒绝服务问题。鉴于 BIND 8 系列已停止维护，建议迁移至 BIND 9.x 最新稳定版。如无法立即升级，可在系统层面通过 ulimit 限制 named 进程最大文件描述符数量作为临时缓解。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "ISC BIND 8.2/8.2.1 named fdmax 文件描述符耗尽拒绝服务漏洞"
updated = "2026-06-16T21:49:11.040"

