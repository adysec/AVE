[info]
author = "ave"
description = "检测目标服务器是否暴露了 Microsoft Data Access Components (MDAC) 远程数据服务 (RDS) DataFactory 组件的不安全方法接口。该漏洞影响运行 IIS 3.x/4.x 及 MDAC 2.1 的 Windows 系统，未经身份认证的远程攻击者可通过构造恶意 HTTP 请求调用 RDS 危险方法，以系统权限执行任意命令。"
id = "POC-AVE-1999-1683"
name = "Microsoft MDAC RDS Remote Command Execution PoC"
severity = "critical"
tags = ["ave-1999-1683"]
vuln_id = [
    "CVE-1999-1011",
    "AVE-1999-1683",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/msadc/msadcs.dll"
protocol = "http"

[[poc.requests.matchers]]
expect = true
status = [200]
type = "status"
