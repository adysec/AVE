[basic]
description = "用友 BIP 远程代码执行漏洞，源于系统对用户输入的反序列化数据缺乏严格的过滤与校验机制。未经身份认证的远程攻击者可通过向目标服务的特定接口发送精心构造的序列化载荷触发反序列化操作，从而在服务器端执行任意代码，实现完全控制目标系统。该漏洞影响多版本用友 BIP 产品，CVSS 评分 9.8，危害等级严重。建议用户尽快安装厂商发布的安全补丁。"
published = "0701"
remediation = "建议立即将用友BIP升级至官方最新安全版本（V3.5及以上），具体补丁包请联系用友技术支持获取。如无法立即升级，可在WAF/防火墙层面配置规则拦截对 /service/~iufo/、/servlet/~iufo/ 等敏感路径的未授权访问，并限制管理后台仅允许内网IP访问作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "用友 BIP 远程代码执行漏洞"
updated = "0701"

