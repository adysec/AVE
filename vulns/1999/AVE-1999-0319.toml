[basic]
description = "Gnumeric 电子表格软件中的 Guile 插件存在代码执行漏洞。攻击者可通过诱使用户打开特制的恶意电子表格文件，利用 Guile 脚本扩展功能执行任意命令。该漏洞影响 Gnumeric 的早期版本，攻击者需要本地访问权限或诱导用户下载并打开恶意文件，CVSS v2.0 评分为 4.6，可导致机密性、完整性和可用性部分受损。"
published = "1999-08-05T04:00:00.000"
remediation = "升级 Gnumeric 至 1.2.x 以上版本，该漏洞在后续版本中已修复 Guile 插件对 Scheme 代码的沙箱逃逸问题。如无法升级，可移除或禁用 gnumeric-guile 插件包（如 Debian/Ubuntu 中执行 apt-get remove gnumeric-guile），或限制 Guile 插件仅加载受信任的 Scheme 脚本。"
score = 4.6
severity = "MEDIUM"
sources = ["avd"]
title = "Gnumeric Guile 插件代码执行漏洞"
updated = "2026-06-16T21:48:54.830"

