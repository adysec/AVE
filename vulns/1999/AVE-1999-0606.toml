[basic]
description = "Hughes Technologies 开发的 Mini SQL (mSQL) 2.0 及 2.0.10 版本中，w3-msql CGI 脚本存在目录遍历漏洞。远程攻击者无需身份认证即可通过特制 HTTP 请求利用该脚本读取服务器上受限制目录中的任意文件，导致敏感信息泄露。该漏洞影响 mSQL 2.0 系列版本，CVSS 评分 7.5，危害等级高。"
published = "1999-08-17T04:00:00.000"
remediation = "立即升级到 mSQL 3.x 或更高版本，该版本已移除存在漏洞的 w3-msql CGI 脚本。如无法升级，在 Web 服务器配置中删除或禁用 w3-msql 脚本，并通过 .htaccess 或 Nginx/Apache 访问控制规则限制对 /cgi-bin/ 目录的访问，仅允许授权 IP 调用。作为长期方案，建议迁移至 MySQL/MariaDB 等仍在维护的数据库产品。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "Hughes Technologies Mini SQL w3-msql CGI 信息泄露漏洞"
updated = "2026-06-16T21:48:59.113"

