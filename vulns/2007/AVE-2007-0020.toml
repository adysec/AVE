[basic]
description = "OpenOffice.org 2.4 及之前版本在处理 EMF 文件时存在整数溢出漏洞，攻击者可构造包含恶意 EMR_STRETCHBLT 记录的 EMF 文件，诱导用户打开时触发堆缓冲区溢出，导致拒绝服务（程序崩溃）甚至远程执行任意代码。该漏洞影响 OpenOffice.org 2.4 之前所有版本，攻击者需诱导受害者打开恶意 EMF 文件，攻击向量为网络传播，攻击复杂度中等，无需认证即可利用，CVSS 评分 6.8（中危），影响机密性、完整性和可用性。OpenOffice.org 2.4 版本已修复此漏洞，建议用户升级至 2.4 或更高版本。"
published = "2008-04-17T19:05:00.000"
remediation = "建议立即升级 OpenOffice.org 至 2.4 版本或更高版本（如 Apache OpenOffice 4.x 或 LibreOffice 7.x）。临时缓解措施：禁止打开不可信来源的 EMF 文件，并在邮件网关/文件服务器层面拦截 .emf 附件；或卸载不再使用的 OpenOffice 组件以减少攻击面。"
score = 6.8
severity = "MEDIUM"
sources = ["tenable"]
title = "OpenOffice.org EMF 文件整数溢出堆缓冲区溢出漏洞"
updated = "2026-06-16T22:46:45.063"

