[basic]
description = "Apache HTTP Server 1.3.12 及更早版本中的 mod_rewrite 模块存在任意文件读取漏洞。当管理员配置了 RewriteRule 指令且重写目标文件名中包含正则表达式特殊字符时，远程攻击者可通过构造特制的 HTTP 请求，利用正则表达式回溯匹配机制绕过路径限制，读取服务器上的任意文件（如 /etc/passwd、配置文件等），导致敏感信息泄露。攻击无需身份认证，仅需目标服务器启用了 mod_rewrite 功能并配置了特定的重写规则即可触发。该漏洞影响范围广泛，危害等级中危，CVSS 评分 5.0。"
published = "2000-12-19T05:00:00.000"
remediation = "升级 Apache HTTP Server 至 1.3.14 或更高版本（1.3.13 已修复此漏洞）。如无法升级，在 httpd.conf 中禁用 mod_rewrite 模块（注释或删除 LoadModule rewrite_module 行），并审查所有 RewriteRule 指令避免将用户输入直接拼接到文件路径中。对于仍运行 Apache 1.3.x 的遗留系统，建议迁移至 Apache 2.4.x 系列以获得持续安全支持。"
score = 5
severity = "MEDIUM"
sources = ["redhat"]
title = "Apache HTTP Server mod_rewrite 任意文件读取漏洞"
updated = "2026-06-16T21:52:45.083"

