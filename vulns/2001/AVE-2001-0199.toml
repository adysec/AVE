[basic]
description = "Oracle 8i 的透明网络底层（TNS）监听器存在缓冲区溢出漏洞，远程攻击者无需身份认证即可通过向 STATUS、PING、SERVICES、TRC_FILE、SAVE_CONFIG 或 RELOAD 等命令发送超长参数触发缓冲区溢出，从而获取目标系统的完全控制权限。该漏洞影响 Oracle 8i 8.1.7 及更早版本，CVSS 评分 10.0，危害等级严重。Metasploit 框架已集成该漏洞的利用模块，攻击者可轻易实现远程代码执行。"
published = "2001-07-21T04:00:00.000"
remediation = "升级 Oracle 8i 至 9.0.1 及以上版本，或安装 Oracle 2001 年第 2 季度关键补丁集。在 listener.ora 中设置 ADMIN_RESTRICTIONS_LISTENER=ON 并配置监听器密码，限制 TNS Listener 仅接受受信任 IP 的连接，在防火墙上封禁 1521 端口的非授权访问。"
score = 10
severity = "CRITICAL"
sources = ["exploitdb"]
title = "Oracle 8i TNS Listener 缓冲区溢出漏洞"
updated = "2026-06-16T21:54:25.310"

