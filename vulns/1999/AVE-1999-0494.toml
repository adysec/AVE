[basic]
description = "ypbind 是 NIS（网络信息服务）的绑定守护进程，当启用 -ypset 或 -ypsetme 选项时，未经认证的远程攻击者可通过目录遍历攻击（..）向目标系统写入或覆盖任意文件。该漏洞允许攻击者利用 ypbind 缺乏输入验证的缺陷，导致系统文件被恶意覆盖，影响 SunOS 及 Linux Slackware 等系统。CVSS 评分 7.5，危害等级高。"
published = "1997-02-05T05:00:00.000"
remediation = "禁用 ypbind 的 -ypset 和 -ypsetme 选项，编辑 /etc/init.d/ypbind 或相关启动脚本，移除这两个参数后重启 ypbind 服务（/etc/init.d/ypbind restart）；同时升级至 SunOS 或 Slackware 的 NIS 修补版本，并在防火墙限制对 ypbind 端口的非授权访问。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "SunOS ypbind 路径遍历漏洞"
updated = "2026-06-16T21:48:05.990"

