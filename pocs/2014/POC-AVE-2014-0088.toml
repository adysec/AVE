[info]
author = "AVE"
description = "通过HTTP服务部署恶意HTML页面，利用CMarkup对象的释放后使用漏洞。页面包含JavaScript代码，通过onpropertychange事件触发outerHTML赋值导致UAF，验证IE 10浏览器是否存在CVE-2014-0322漏洞。"
id = "POC-AVE-2014-0088"
name = "Microsoft Internet Explorer 10 CMarkup Use-After-Free PoC"
severity = "high"
tags = ["ave-2014-0088"]
vuln_id = [
    "CVE-2014-0322",
    "AVE-2014-0088",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "MS14-012",
    "CMarkup Use-After-Free",
    "onpropertychange",
]
