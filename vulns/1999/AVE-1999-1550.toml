[basic]
description = "Microsoft IIS 3.0 及 4.0 版本 FTP 服务器存在缓冲区溢出漏洞，攻击者可通过向目标 FTP 服务发送超长 NLST（ls）命令触发该漏洞，导致 FTP 服务进程崩溃并造成拒绝服务。此漏洞可由本地用户利用，特定条件下远程攻击者也可触发。受影响版本包括 Microsoft IIS 3.0 和 4.0，建议升级至更高版本或限制 FTP 服务访问权限。"
published = "1999-01-24T05:00:00.000"
remediation = "立即升级至 Windows 2000 以上版本附带的 IIS 5.0 或更高版本，该漏洞已在后续版本中修复。如无法升级，可在 IIS 管理器中禁用 FTP 服务，改用其他受支持的 FTP 服务器软件作为替代方案。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Microsoft IIS 3.0/4.0 FTP NLST 命令拒绝服务漏洞"
updated = "2026-06-16T21:50:41.087"

