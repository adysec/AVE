[basic]
description = "Red Hat Linux 5.1 中的 xosview 1.5.1 存在缓冲区溢出漏洞，本地攻击者可通过设置过长的 HOME 环境变量触发缓冲区溢出，进而提升权限获取 root 权限。该漏洞影响 Red Hat Linux 5.1 系统中预装的 xosview 1.5.1 版本，CVSS 评分 7.2（高危），属于本地权限提升漏洞。攻击者需具备本地系统访问权限，通过设置超长 HOME 环境变量并执行 xosview 程序触发缓冲区溢出，进而执行任意代码获取 root 权限。Red Hat 已发布补丁修复该漏洞，建议升级至修复版本或卸载受影响组件。"
published = "1998-05-28T04:00:00.000"
remediation = "建议升级 xosview 至 1.6.0 或更高版本（已修复 HOME 环境变量缓冲区溢出），或升级 Red Hat Linux 至 6.0 及以上版本。临时缓解措施：移除 xosview 的 setuid root 权限（chmod u-s /usr/bin/xosview），或在用户登录脚本中限制 HOME 环境变量长度（export HOME=$(echo $HOME | cut -c1-256)）。"
score = 7.2
severity = "HIGH"
sources = ["exploitdb"]
title = "红帽 Linux 5.1 xosview HOME 环境变量缓冲区溢出本地权限提升漏洞"
updated = "2026-06-16T21:50:33.180"

