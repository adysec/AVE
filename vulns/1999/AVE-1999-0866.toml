[basic]
description = "Microsoft Internet Explorer 5 及 FrontPage Express、Outlook Express 5、Eudora 等软件所使用的 HTML Form Control 组件存在拒绝服务漏洞。远程攻击者可通过构造包含超大表单输入字段（如表格单元格中的大量文本框）的恶意网页或 HTML 邮件，诱使用户访问后导致目标系统 CPU 占用率高达 100%，造成拒绝服务。该漏洞利用方式简单，无需认证即可触发，影响范围广泛。"
published = "1999-08-27T04:00:00.000"
remediation = "升级至 Internet Explorer 5.01 或更高版本可修复此漏洞。对于仍使用旧版 IE 的环境，建议禁用 Active Scripting 及在 Outlook Express 中阻止 HTML 邮件加载表单控件。现网用户应迁移至受支持的现代浏览器（如 Edge、Chrome）以免受此及其他已知漏洞影响。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Microsoft Internet Explorer HTML Form Control 拒绝服务漏洞"
updated = "2026-06-16T21:49:31.717"

