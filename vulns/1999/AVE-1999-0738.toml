[basic]
title = "UnixWare dos7utils STATICMERGE 环境变量本地权限提升漏洞"
description = "UnixWare 操作系统的 dos7utils 工具集存在本地权限提升漏洞。该漏洞源于 dos7utils 在处理 STATICMERGE 环境变量时，会按照该变量指定的路径搜索并执行脚本文件，且未对执行权限进行有效限制。拥有本地低权限账户的攻击者可利用此漏洞，通过设置 STATICMERGE 环境变量指向恶意脚本，在 dos7utils 执行时触发该脚本，从而获取系统 root 最高权限。该漏洞影响 UnixWare 操作系统中包含 dos7utils 的版本，CVSS v2.0 评分为 7.2，危害等级为高危。攻击者需具备对目标系统的本地访问权限才能成功利用此漏洞完成权限提升。"
severity = "HIGH"
score = 7.2
sources = ["cve"]
published = "1999-10-04"
updated = "2026-06-16"
remediation = "升级 UnixWare 系统至厂商提供的最新补丁版本，或移除 dos7utils 工具集上不必要的 setuid 权限。如系统已停止维护，建议限制本地用户对 dos7utils 二进制文件的执行权限（如 chmod 750），仅允许受信任的管理员用户使用，并考虑迁移至受支持的操作系统平台。"
