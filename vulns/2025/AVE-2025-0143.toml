[basic]
description = "用友 NC-Cloud 的 IBapIOService 接口存在 SQL 注入漏洞，该接口为 SOAP Web 服务，未对用户输入的 XML 参数进行有效的过滤与转义。未授权的远程攻击者可通过向 /uapws/service/nc.itf.bap.service.IBapIOService 发送特制的 SOAP 请求包，拼接恶意 SQL 语句注入后端数据库，导致数据库中的敏感数据泄露，包括用户凭证、业务数据等，严重情况下可进一步获取服务器控制权限。"
published = "0705"
remediation = "立即升级用友NC-Cloud至最新安全版本，或联系用友获取针对IBapIOService接口SQL注入漏洞的专项补丁。临时缓解措施：在WAF/IPS中配置规则拦截对`/uapws/service/nc.itf.bap.service.IBapIOService`路径的SOAP请求中包含SQL关键字（如UNION、SELECT、DROP等）的恶意载荷，并限制该接口的访问来源IP白名单。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "用友 NC-Cloud IBapIOService SQL注入漏洞"
updated = "0705"

