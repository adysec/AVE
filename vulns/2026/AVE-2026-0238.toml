[basic]
description = "body-parser 在处理请求体大小时存在安全缺陷，当应用程序配置了无效的 `limit` 参数值（如无法解析的字符串或 `NaN`）时，`bytes.parse()` 函数会返回 `null` 而非抛出错误，导致请求体大小限制被静默绕过。攻击者可利用此缺陷发送超大型请求体，耗尽服务器内存与 CPU 资源，造成拒绝服务。该漏洞影响 body-parser 1.x 系列低于 1.20.6 及 2.x 系列低于 2.3.0 的版本。已在 1.20.6 和 2.3.0 版本中修复。"
published = "2026-07-09T11:16:24.670"
remediation = "升级 body-parser 至 1.20.6 或 2.3.0 及以上版本，这些版本会在传入无效 limit 值时抛出明确错误而非静默跳过校验。如无法升级，在传入 limit 值前进行校验，确保其可被正确解析为有效数字，拒绝 null 或非有限数值。"
score = 3.7
severity = "LOW"
sources = ["ghsa"]
title = "body-parser 无效limit值绕过请求体大小限制导致拒绝服务漏洞"
updated = "2026-07-10T02:45:02.800"

