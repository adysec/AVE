[basic]
description = "Pine 4.21 及更早版本的自动邮件检查组件中存在缓冲区溢出漏洞。远程攻击者可通过向目标用户发送一封包含超长 From 头部的恶意邮件，在邮件客户端自动检查新邮件时触发缓冲区溢出，从而在目标系统上执行任意命令。攻击者无需身份认证，只需诱使用户接收邮件即可完成利用。该漏洞影响所有使用 Pine 4.21 及之前版本的系统，CVSS 评分 7.5，危害等级高。目前已有公开的利用代码。"
published = "2000-12-19T05:00:00.000"
remediation = "升级 Pine 邮件客户端至 4.30 或更高版本（该版本已修复 From 头字段缓冲区溢出漏洞）。FreeBSD 用户应安装 FreeBSD-SA-00:59 安全补丁；Red Hat Linux 用户应应用 RHSA-2000-102 更新；Mandrake Linux 用户应安装 MDKSA-2000-073 更新。由于 Pine 已停止维护，建议迁移至 Alpine（Pine 的社区维护替代品）以获得持续安全支持。"
score = 7.5
severity = "HIGH"
sources = ["redhat"]
title = "University of Washington Pine 邮件自动检查组件远程缓冲区溢出漏洞"
updated = "2026-06-16T21:52:44.540"

