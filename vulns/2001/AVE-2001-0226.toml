[basic]
description = "PHP Apache 模块 4.0.4 及更早版本存在安全绕过漏洞，远程攻击者可通过向未受限制的页面发送特制的畸形 HTTP 请求，导致 PHP 错误地将该请求的访问控制策略应用到后续请求的页面上，从而绕过 .htaccess 文件设置的身份验证和访问限制。该漏洞影响使用 mod_php 的 Apache Web 服务器，攻击者无需身份认证即可利用，可能导致未授权访问受保护的资源或敏感信息泄露。"
published = "2001-03-12T05:00:00.000"
remediation = "升级 PHP Apache 模块至 4.0.5 或更高版本。Debian 用户应安装 DSA-020 提供的 php3 更新包；Red Hat 用户安装 RHSA-2000:136 提供的更新；Mandrake 用户安装 MDKSA-2001:013 更新。如无法升级，可在 Apache 配置中禁用 PHP 的 .htaccess 重载功能（AllowOverride None）作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["redhat"]
title = "PHP Apache 模块 .htaccess 安全绕过漏洞"
updated = "2026-06-16T21:53:40.240"

