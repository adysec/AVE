[basic]
description = "ISC BIND 9 的 DNS-over-HTTPS（DoH）实现存在资源耗尽漏洞。攻击者可通过向目标 DNS 解析器发送大量特制的有效或无效 HTTP/2 流量，耗尽服务器 CPU 和内存资源，导致拒绝服务。该漏洞影响 BIND 9.18.0 至 9.18.32、9.20.0 至 9.20.4、9.21.0 至 9.21.3 及对应 S1 版本，CVSS 评分 7.5，危害等级高。建议升级至修复版本。"
published = "2025-01-29T22:15:28.800"
remediation = "将 BIND 9 升级至修复版本：9.18.x 系列升级至 9.18.33，9.20.x 系列升级至 9.20.5，9.21.x 系列升级至 9.21.4；BIND 9 支持预览版 (SPE) 升级至 9.18.33-S1。如业务中未使用 DNS-over-HTTPS (DoH) 功能，可在 named.conf 中移除或注释掉 DoH 监听器配置作为临时缓解措施。"
score = 7.5
severity = "HIGH"
sources = ["msrc"]
title = "ISC BIND 9 DNS-over-HTTPS 资源耗尽漏洞"
updated = "2026-06-17T07:00:18.683"

