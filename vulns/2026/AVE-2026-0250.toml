[basic]
description = "Gitea 存在信息泄露漏洞。当上游仓库从公开仓库变更为私有仓库后，之前创建的 fork 仓库通过 `POST /api/v1/repos/{owner}/{repo}/merge-upstream` 接口仍能继续同步上游仓库在私有期间提交的代码，导致本应受限的私有数据通过 fork 仓库泄露给未经授权的用户。攻击者只需在仓库公开时创建 fork，待其变为私有后执行同步操作即可获取私有代码。该漏洞影响 Gitea 1.26.2 及之前版本，CVSS 评分 7.5，危害等级高。建议升级至修复版本。"
published = "2026-07-03T21:16:57.280"
remediation = "建议立即将 Gitea 升级至 v1.26.4 或更高版本（v1.26.3 已包含修复，但官方强烈建议直接升级到 v1.26.4），升级后在父仓库改为私有时会自动阻断 fork 的 merge-upstream 同步请求。如无法立即升级，可临时在反向代理层屏蔽 POST /api/v1/repos/{owner}/{repo}/merge-upstream 接口，或手动检查并删除不应继续拥有访问权限的 fork 仓库。"
score = 7.5
severity = "HIGH"
sources = ["ghsa"]
title = "Gitea 仓库分叉同步信息泄露漏洞"
updated = "2026-07-07T18:16:35.970"

