[basic]
description = "IBM AIX 4.3.2 操作系统 ftpd 服务所依赖的 libc 库在处理用户输入时存在缓冲区溢出漏洞，根源在于未进行有效的边界长度检查，导致超长输入可覆盖栈内存。未经身份认证的远程攻击者可通过向目标 FTP 服务发送特制的超长参数触发溢出，破坏程序执行流程进而执行任意代码或造成拒绝服务。攻击者只需能够访问目标 TCP 21 端口即可发起攻击，无需有效凭证，危害等级为严重。"
published = "1999-09-28"
remediation = "升级 IBM AIX 至 4.3.3 或后续已修复版本，并向 IBM 申请安装针对该 ftpd/libc 缓冲区溢出的官方 APAR 补丁（如 IY01919 等系列）。若暂无法升级，可在 /etc/inetd.conf 中注释 ftp 行后执行 refresh -s inetd 临时禁用 ftpd 服务，或通过防火墙限制仅允许可信 IP 访问 TCP 21 端口作为缓解措施。"
score = 10.0
severity = "CRITICAL"
sources = ["epss"]
title = "IBM AIX ftpd libc 缓冲区溢出远程代码执行漏洞"
updated = "2026-07-18"

