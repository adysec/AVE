[basic]
description = "tcpdump、Ethereal（现 Wireshark）等网络抓包工具在解析 DNS 数据包时存在无限循环漏洞。远程攻击者可构造特制的 DNS 报文，其中压缩指针的跳转偏移量指向自身，导致解析器在解压缩过程中陷入死循环，造成拒绝服务。攻击者无需认证即可通过网络发送单个恶意 DNS 数据包触发该漏洞，影响 tcpdump 3.4/3.5 及 Ethereal 0.8.4/0.8.5/0.8.6 等版本。"
published = "1999-05-31T04:00:00.000"
remediation = "升级 tcpdump 至 3.5.2 或更高版本，升级 Ethereal（现 Wireshark）至 0.8.7 或更高版本。如无法升级，可在抓包时使用过滤规则 `not dns` 临时规避，或在 DNS 解析器入口对畸形 DNS 报文进行校验拦截，避免进入解压缩循环。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "tcpdump Ethereal DNS解码器无限循环拒绝服务漏洞"
updated = "2026-06-16T21:51:29.867"

