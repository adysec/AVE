[basic]
description = "KDE 桌面环境的 kscd（CD 播放器）程序在处理用户 SHELL 环境变量时存在权限提升漏洞。当用户通过 SHELL 环境变量指定替代程序时，kscd 未正确丢弃其特权权限，导致以提升后的权限执行用户指定的任意程序。攻击者可在本地利用该漏洞，通过设置恶意的 SHELL 环境变量并诱导 kscd 执行，从而获取目标系统的完全控制权限（包括读取、修改、删除任意文件及执行任意命令）。该漏洞影响 KDE 1.1、1.1.1、1.2 及 2.0 版本，CVSS 评分 7.2，危害等级高。"
published = "2000-05-16T04:00:00.000"
remediation = "升级 KDE 至 2.0 以上版本，或安装对应发行版提供的 kscd 安全补丁。如无法升级，可移除 kscd 的 setuid 位（chmod u-s /opt/kde/bin/kscd），或限制 kscd 仅允许受信任用户执行，同时在启动 kscd 前手动清除 SHELL 环境变量中的恶意路径作为临时缓解措施。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "KDE kscd 本地权限提升漏洞"
updated = "2026-06-16T21:51:37.347"

