[basic]
description = 'Cheyenne InocuLAN Anti-Virus Server 4.0 在安装 Service Pack 2 之前创建的更新目录设置了"Everyone 完全控制"权限，导致本地攻击者可利用该漏洞将恶意 DLL 文件放置到更新目录中，当杀毒软件执行自动更新时即会加载该恶意 DLL，从而实现以系统权限执行任意代码。该漏洞影响 Inoculan 4.0 版本，CVSS 评分 7.2，危害等级高。'
published = "1998-06-11T04:00:00.000"
remediation = "立即升级至 Cheyenne InocuLAN 4.0 Service Pack 2 或更高版本，该版本已修复更新目录默认权限问题。若暂时无法升级，手动修改更新目录（通常位于安装目录下的 Update 子目录）权限，移除 Everyone 组的完全控制权限，仅保留 SYSTEM 和管理员写入权限，同时限制服务器本地登录的普通用户范围，防止非授权用户篡改更新文件植入恶意 DLL。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "Cheyenne InocuLAN Windows NT 本地权限提升漏洞"
updated = "2026-06-16T21:50:42.477"

