[basic]
description = "OpenSSL 0.9.6 之前版本中 crypto/rsa/rsa_gen.c 文件存在 RSA 密钥生成缺陷，在处理超出表达式大小的 C 语言位位移操作时出现错误，导致在 64 位 HP-UX 平台上生成的 RSA 密钥强度不足。远程攻击者可利用此漏洞破解加密保护机制，获取敏感信息。该漏洞影响 OpenSSL 0.9.5 及更早版本，CVSS 评分 7.5，危害等级高。"
published = "2016-05-05T01:59:00.137"
remediation = "升级 OpenSSL 至 0.9.6 或更高版本，该版本修复了 RSA 密钥生成过程中 C 语言位运算溢出的问题。如无法升级，建议在 HP-UX 平台上使用 32 位模式编译 OpenSSL 作为临时缓解措施。"
score = 7.5
severity = "HIGH"
sources = ["osv"]
title = "OpenSSL RSA 密钥生成存在加密保护机制绕过漏洞"
updated = "2026-06-16T21:53:27.853"

