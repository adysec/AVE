[basic]
description = "APC UPS 守护进程 apcupsd 存在本地拒绝服务漏洞。该程序将其进程 ID 写入一个全局可写的 PID 文件（apcupsd.pid），本地攻击者可通过修改该文件内容指定任意目标进程 ID，导致 apcupsd 进程终止时向该 PID 发送信号，进而造成系统其他进程被错误终止。该漏洞需本地访问权限，CVSS 评分 2.1，危害等级低。"
published = "2001-02-16T05:00:00.000"
remediation = "升级 apcupsd 至 3.7.3 或更高版本，该版本已限制 PID 文件权限为仅 root 可写。如无法升级，手动执行 `chmod 644 /var/run/apcupsd.pid` 并修改启动脚本在 `start` 段添加 `umask 022`；同时创建专用系统账号（如 `apcupsd`）运行该守护进程，避免以 root 权限运行。"
score = 2.1
severity = "LOW"
sources = ["exploitdb"]
title = "APC apcupsd 本地拒绝服务漏洞"
updated = "2026-06-16T21:53:32.480"

