[basic]
description = "WindowMaker 桌面环境 0.52 至 0.60.0 版本中存在多处缓冲区溢出漏洞。攻击者通过执行 WindowMaker 时传入超长的程序名称（argv[0]）参数，可触发缓冲区溢出，导致拒绝服务甚至可能执行任意代码。该漏洞影响面较广，利用方式简单，CVSS 评分 10.0，危害等级严重。"
published = "1999-08-22T04:00:00.000"
remediation = "升级 Window Maker 至 0.61.0 及以上版本（当前最新稳定版为 0.96.0），该版本修复了 wdefaults.c 中 strcpy 未做边界检查导致的缓冲区溢出问题。可通过系统包管理器（apt install wmaker / dnf install wmaker）直接更新。如无法升级，可在启动脚本中限制 argv[0] 长度不超过 249 字符作为临时缓解。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "WindowMaker 缓冲区溢出远程代码执行漏洞"
updated = "2026-06-16T21:49:37.880"

