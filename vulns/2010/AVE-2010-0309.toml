[basic]
description = "Microsoft PowerPoint 2002 SP3 及 2003 SP3 版本在解析特制 PowerPoint 95 文档时存在缓冲区溢出漏洞，远程攻击者可通过诱使用户打开恶意构造的 PPT 文件触发该漏洞，导致任意代码执行。该漏洞影响广泛使用的旧版 Office 组件，CVSS 评分 7.8，危害等级高。目前微软已发布安全更新修复此漏洞，建议用户及时升级。"
published = "2010-11-10T03:00:01.850"
remediation = "立即安装 Microsoft 安全公告 MS10-088 (KB2293386) 提供的更新：PowerPoint 2002 SP3 安装 KB2413272，PowerPoint 2003 SP3 安装 KB2413304，PowerPoint Viewer 2007 SP2 安装 KB2413381。如无法打补丁，可通过 cacls/icacls 命令限制对 pp7x32.dll 的访问权限阻止解析 PowerPoint 95 文件，或启用 Microsoft Office File Block 策略禁止打开旧版二进制格式文件作为临时缓解。"
score = 7.8
severity = "HIGH"
sources = ["kev"]
title = "Microsoft PowerPoint 缓冲区溢出远程代码执行漏洞"
updated = "2026-06-16T23:21:00.513"

