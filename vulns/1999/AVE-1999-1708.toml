[basic]
description = 'Internet Explorer 4.01 及更早版本中存在缓冲区溢出漏洞，远程攻击者可通过向目标用户发送包含特制长 URL 的链接，利用 "mk:" 协议触发缓冲区溢出，从而在用户浏览器中执行任意命令。该漏洞影响 Windows 平台上的 Internet Explorer 4.01 及更早版本，攻击者需诱导用户点击恶意链接，无需其他认证条件，危害等级高。'
published = "1999-12-31T05:00:00.000"
remediation = '立即安装 Microsoft 安全公告中提供的修补程序（KB 文章 Q176697），该补丁修复了 Internet Explorer 中 mk: 协议处理程序的长 URL 缓冲区溢出问题。鉴于 IE 4.01 及更早版本已停止技术支持，建议升级到受支持的 Microsoft Edge 浏览器；如无法升级，可通过注册表禁用 mk: 协议处理器，在 HKEY_CLASSES_ROOT\mk\shell\open\command 中将默认值清空作为临时缓解。'
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "Microsoft Internet Explorer 缓冲区溢出远程代码执行漏洞"
updated = "2026-06-16T21:49:42.553"

