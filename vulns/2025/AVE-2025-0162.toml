[basic]
description = "装盟科技家装ERP管理系统的 WeChatAPI_ERPMobile.ashx 接口存在 SQL 注入漏洞，由于未对用户传入参数进行充分的过滤与转义处理，攻击者可通过构造恶意的 SQL 语句注入到后端数据库中，实现绕过认证、窃取敏感数据或执行任意 SQL 命令。该漏洞攻击难度低，无需身份认证即可远程利用，对系统的机密性与完整性构成严重威胁。"
published = "0703"
remediation = "立即对 WeChatAPI_ERPMobile.ashx 接口的 userCode 参数实施严格输入校验，过滤 SQL 特殊字符；改用参数化查询或预编译语句替代拼接 SQL，避免将用户输入直接拼入查询语句。如无法修改代码，部署 WAF 规则拦截常见 SQL 注入载荷（如 UNION/SLEEP/OR 1=1），并将该 API 的访问来源限制为微信小程序服务器 IP 白名单。建议联系厂商获取修复版本或自行修复后升级。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "装盟科技 家装ERP管理系统 WeChatAPI_ERPMobile.ashx SQL注入漏洞"
updated = "0703"

