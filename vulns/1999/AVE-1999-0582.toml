[basic]
description = "FreeBSD 系统中的 Seyon 终端仿真程序（版本 2.14b 及之前）存在权限提升漏洞。该程序在运行时通过 PATH 环境变量查找并调用 xterm 与 seyon-emu 等外部命令，但未使用绝对路径，而是依赖相对搜索。本地已登录的普通用户可通过修改自身 PATH 变量，将恶意构造的同名可执行文件置于搜索路径前列，使 Seyon 在后续调用时执行该恶意程序，从而继承 Seyon 的运行权限并提升至更高权限（如 root）。该漏洞影响运行受影响版本 Seyon 的 FreeBSD 系统，攻击条件为本地用户访问权限及对 PATH 变量的可控修改能力，利用方式即构造恶意 xterm/seyon-emu 程序并劫持 PATH 完成提权。"
published = "1999-12-01T05:00:00.000"
remediation = "升级 FreeBSD 中的 seyon 至修复版本 2.14c 或随系统 ports 同步的最新版（pkg upgrade seyon 或重新编译 ports/comms/seyon）。如无法立即升级，应将 seyon 及其辅助程序 xterm、seyon-emu 安装到固定绝对路径，并以 root 运行 setuid 脚本时清理并设置受限 PATH（如 /bin:/usr/bin），同时移除 seyon 的 setuid 位（chmod u-s $(which seyon)）作为临时缓解措施。"
score = 4.6
severity = "MEDIUM"
sources = ["exploitdb"]
title = "FreeBSD seyon 权限提升漏洞"
updated = "2026-06-16T21:49:07.583"

