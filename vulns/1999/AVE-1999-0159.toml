[basic]
description = "Internet Explorer 中的 DHTML Edit ActiveX 控件存在任意文件读取漏洞。远程攻击者可通过构造恶意网页，诱使用户在 IE 浏览器中访问，利用该 ActiveX 控件的跨帧访问特性读取目标系统上的任意文件内容。该漏洞影响 Internet Explorer 4 和 5 版本，攻击者无需身份认证即可实施攻击，危害用户隐私安全。"
published = "1999-05-01T04:00:00.000"
remediation = '升级到 Internet Explorer 6 或更高版本，该漏洞已在 IE 5.5 SP2 及后续版本中修复。如无法升级，可通过注册表设置 Kill Bit 禁用 DHTML Edit ActiveX 控件（CLSID: {2D360201-FFF5-11D1-8D03-00A0C959BC0A}），在 HKEY_LOCAL_MACHINE\SOFTWARE\Microsoft\Internet Explorer\ActiveX Compatibility 下创建对应 CLSID 项并将 Compatibility Flags 设为 0x400。建议迁移至现代浏览器（如 Edge/Chrome/Firefox）以彻底规避风险。'
score = 2.6
severity = "LOW"
sources = ["epss"]
title = "Microsoft Internet Explorer DHTML Edit ActiveX 任意文件读取漏洞"
updated = "2026-06-16T21:48:30.130"

