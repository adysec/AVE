[basic]
description = "Check Point Firewall-1 4.0/4.1 的 SMTP Security Server 代理在处理无效命令流（如二进制零流）时存在资源耗尽漏洞，远程未认证攻击者可通过向 SMTP 代理端口发送持续的无效命令流触发资源耗尽，导致防火墙 SMTP 代理服务拒绝服务。该漏洞影响 Check Point Firewall-1 4.0 和 4.1 版本，CVSS 5.0 分（AV:N/AC:L/Au:N/C:N/I:N/A:P），攻击向量为网络，攻击复杂度低，无需认证，仅影响可用性。攻击者可通过发送持续的二进制零或其他无效 SMTP 命令流耗尽代理资源，导致合法邮件服务中断。Check Point 已发布补丁修复该漏洞，建议升级至修复版本。"
published = "2000-06-30T04:00:00.000"
remediation = "建议立即升级 Check Point FireWall-1 至 4.1 SP2 或更高版本（含 Hotfix HFA-01），或升级至 NG 版本。若无法立即升级，可在防火墙策略中禁用 SMTP Security Server 代理功能，或在边界防火墙配置 ACL 限制仅允许受信 SMTP 服务器访问 25 端口，同时在 SMTP 代理前部署流量清洗设备限制异常命令流量。建议参考 Check Point 官方安全公告 SK31241 获取对应版本热修复包。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Check Point Firewall-1 4.0/4.1 服务拒绝漏洞"
updated = "2026-06-16T21:52:02.813"

