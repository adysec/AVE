[basic]
description = "Windows NT 4.0 Winpopup 服务存在拒绝服务漏洞，远程攻击者可通过向目标系统发送包含超长用户名的消息触发该漏洞，导致 Winpopup 服务崩溃或系统资源耗尽，无法正常处理消息请求。该漏洞影响 Windows NT 4.0 系统，无需身份认证即可远程利用，攻击复杂度低。微软当时尚未发布官方补丁，建议禁用 Winpopup 服务缓解风险。"
published = "1997-04-01T05:00:00.000"
remediation = "升级至受支持的 Windows 版本（如 Windows Server 2019/2022），NT 4.0 已停止支持。临时缓解措施：在服务管理器中禁用 Messenger（信使服务）服务，并在防火墙上阻止 UDP 137-138、TCP 139 和 445 端口的入站 NetBIOS 流量。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Microsoft Windows NT 4.0 Winpopup 拒绝服务漏洞"
updated = "2026-06-16T21:48:05.240"

