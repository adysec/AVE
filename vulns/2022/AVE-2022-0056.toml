[basic]
description = "Linux 内核 BPF 子系统中存在逻辑缺陷，当启用 JIT 随机化（blinding）功能且 BPF 程序中包含指向子程序的指针时，JIT 编译过程未正确识别 ld_imm64 这类特殊指令（其操作数非用户可控常量），导致对它们进行了不必要的随机化处理。此问题在首次 JIT 阶段触发后，使得后续 JIT 子程序阶段无法正确调整这些指令的地址引用，从而在内核态引发页面错误导致系统崩溃。本地攻击者可通过加载特制的 BPF 程序触发此漏洞，造成拒绝服务。"
published = "2025-02-26T07:01:31.040"
remediation = "建议将 Linux 内核升级至 5.17.13（5.17.x 分支）、5.18.2（5.18.x 分支）或 5.19 及以上版本，内核中已合入对应修复补丁（commit 4b6313cf99b0、a029b02b47dd、d106a3e96fca）。如无法立即升级，可关闭 BPF JIT 盲化功能作为临时缓解措施：将 `/proc/sys/net/core/bpf_jit_enable` 设为 0 并设置 `bpf_jit_harden=0`，但会导致 eBPF 性能下降。"
score = 5.5
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux Kernel BPF JIT盲化与子程序指针组合拒绝服务漏洞"
updated = "2026-06-17T05:18:25.827"

