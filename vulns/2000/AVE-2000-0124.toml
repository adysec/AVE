[basic]
description = "True North Software Internet Anywhere Mail Server 3.1.3 的 POP3 服务在处理畸形的 RETR 命令时存在缺陷，认证后的本地攻击者可通过向邮件服务器发送特制的 RETR 请求导致服务崩溃，造成拒绝服务。该漏洞利用条件要求攻击者拥有有效认证凭据，影响仅限于邮件服务的可用性，不会导致数据泄露或远程代码执行。"
published = "1999-12-03"
remediation = "该产品已停止维护多年且无官方补丁。建议在 POP3 服务入口（如防火墙或 xinetd）中对 RETR 命令参数做长度与格式校验以拦截畸形请求，同时严格限制本地用户对邮件服务器的访问权限，并考虑迁移至仍在维护的邮件服务器软件（如 Dovecot）。"
score = 2.1
severity = "LOW"
sources = [
    "cve",
    "avd",
]
title = "True North Software Internet Anywhere Mail Server 3.1.3 拒绝服务漏洞"
updated = "2024-11-20"

