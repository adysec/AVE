[basic]
description = "AVM KEN! 是一款用于管理调制解调器的嵌入式 Web 服务器，其存在路径遍历漏洞。未经身份认证的远程攻击者可通过向目标发送包含 `..` 序列的特制 HTTP 请求，绕过目录访问限制读取服务器上的任意文件，可能导致敏感信息泄露。该漏洞利用方式简单，无需认证即可远程触发。"
published = "2000-04-12T04:00:00.000"
remediation = "AVM KEN! 服务器已停止维护多年，建议立即迁移至 Apache、Nginx 等现代 Web 服务器替代。如无法迁移，可配置反向代理或 WAF 过滤 `../` 目录遍历请求，并严格限制 Web 服务进程的文件系统访问权限，避免以高权限用户运行。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "AVM KEN! Web Server 目录遍历漏洞"
updated = "2026-06-16T21:51:20.763"

