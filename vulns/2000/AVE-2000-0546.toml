[basic]
description = "Sun AnswerBook2 的 dwhttpd Web 服务器管理接口未能对后台 CGI 脚本的请求进行有效身份验证，远程攻击者无需认证即可直接调用 admin CGI 脚本，在目标系统上添加用户账户，获取管理接口的未授权访问权限。该漏洞影响 Solaris 系统上的 AnswerBook2 1.4.2/1.4.3/1.4.4 版本，CVSS 评分 7.5，危害等级高危。"
published = "2000-10-20T04:00:00.000"
remediation = "升级 AnswerBook2 至 v1.4.2 或更高版本，并安装 Sun 安全补丁 110011-02（SPARC）或 110012-02（x86）。如无法立即打补丁，可在防火墙或主机层面限制对 dwhttpd 服务端口（默认 8888）的访问，仅允许可信 IP 连接，并移除或限制 /cgi-bin/admin/admin CGI 脚本的执行权限。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "Sun Solaris AnswerBook2 dwhttpd 未授权访问漏洞"
updated = "2026-06-16T21:52:17.310"

