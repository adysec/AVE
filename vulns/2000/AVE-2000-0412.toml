[basic]
description = "NetWin DMail 2.7/2.8 中的 DSMTP 组件在处理 ETRN 命令时存在缓冲区溢出漏洞，未经身份认证的远程攻击者可通过向目标 SMTP 服务发送超长 ETRN 请求触发缓冲区溢出，导致任意代码执行。该漏洞影响 NetWin DMail 2.7 及 2.8 版本，CVSS 评分 10.0，危害等级严重，无需用户交互即可远程利用。"
published = "2000-06-01T04:00:00.000"
remediation = "升级至 NetWin DMail 2.8b 或更高版本以修复 ETRN 缓冲区溢出漏洞。如无法立即升级，在 SMTP 配置中设置 NoETRN=true 禁用 ETRN 命令，并在防火墙层面限制 25/TCP 端口仅允许可信来源 IP 访问，同时部署入侵检测规则拦截超长 ETRN 请求（长度超过 512 字节）。"
score = 10
severity = "CRITICAL"
sources = ["exploitdb"]
title = "NetWin DMail DSMTP 缓冲区溢出漏洞"
updated = "2026-06-16T21:51:50.777"

