[basic]
description = "Novell NetWare 3.x 及早期版本存在本地权限提升漏洞。本地攻击者可通过伪造数据包（packet spoofing）方式利用该漏洞，获取目标系统更高权限。该漏洞影响 Novell NetWare 3.x 及更早版本，攻击者需具备本地访问权限方可利用，CVSS 评分 4.6，危害等级中危。建议用户升级至不受影响的版本以修复此漏洞。"
published = "1999-12-31T05:00:00.000"
remediation = "升级至 NetWare 4.x 或更高版本，该版本引入 NCP 分组签名机制。如在 3.x 环境无法升级，可在 AUTOEXEC.NCF 中设置 `SET NCP PACKET SIGNATURE OPTION = 3`，强制要求所有 NCP 请求进行数字签名，防止伪造 NCP 分组实施权限提升。同时建议在交换机上启用端口安全（Port Security）和 DHCP Snooping，限制局域网内的 ARP 欺骗与分组注入。"
score = 4.6
severity = "MEDIUM"
sources = ["cve"]
title = "Novell NetWare 本地权限提升漏洞"
updated = "2026-06-16T21:50:11.360"

