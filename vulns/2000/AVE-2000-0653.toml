[basic]
description = "Small HTTP Server 2.03 及更早版本存在拒绝服务漏洞，远程攻击者通过反复请求一个不含 index.html 文件的目录 URL，可导致目标服务器内存不断消耗且无法释放，最终耗尽系统资源造成服务中断。攻击无需认证，利用难度低，CVSS 评分 5.0，危害等级中等。"
published = "2001-01-09T05:00:00.000"
remediation = "立即升级 Small HTTP Server 至 2.03 以上版本（厂商已在 2.03 修复该问题）；如项目已停止维护无法升级，应迁移至其他活跃维护的 Web 服务器（如 Apache/Nginx/lighttpd）。临时缓解措施：在服务器配置中为所有无 index.html 的目录设置默认返回页面（如 DirectoryIndex index.html），并在防火墙层面限制可信 IP 访问。此外，应避免使用该服务器处理 SSI（Server-Side Includes）功能，防止通过 SSI 空标签触发崩溃。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Max Feoktistov Small HTTP Server 目录请求内存泄漏拒绝服务漏洞"
updated = "2026-06-16T21:52:42.860"

