[basic]
description = "Corel Linux OS 1.0 的 get_it 程序存在 PATH 环境变量操纵漏洞，本地用户可通过设置恶意的 PATH 环境变量，使 get_it 在执行 cp 程序时加载攻击者控制的恶意二进制文件，从而获取 root 权限。该漏洞影响 Corel Linux OS 1.0 版本，需要本地系统访问权限，CVSS 评分 7.2，危害等级高。"
published = "2000-01-12T05:00:00.000"
remediation = "Corel Linux OS 1.0 已停止维护，建议立即升级至受支持的 Linux 发行版（如 Ubuntu LTS 或 Debian 稳定版）。如无法升级，修改 get_it 程序源码，将 cp 等外部命令调用路径改为绝对路径（如 /bin/cp），并限制普通用户对 get_it 的执行权限。同时移除 setuid 位：chmod u-s /usr/bin/get_it。"
score = 7.2
severity = "HIGH"
sources = ["cve"]
title = "Corel Linux OS 1.0 get_it 本地权限提升漏洞"
updated = "2026-06-16T21:50:53.630"

