[basic]
description = "BSD 系统中 lpr 打印服务组件存在任意文件写入漏洞，本地攻击者可通过符号链接（symlink）攻击方式，在多次调用 lpr 命令（约 1000 次）后触发竞争条件，导致以 lp 权限创建或覆盖系统任意文件。该漏洞影响 SunOS 4.1.1、BSD 4.3、A/UX 2.0.1 及其他基于 BSD 的操作系统，CVSS 评分 2.1，危害等级低。攻击者需拥有本地系统访问权限。"
published = "1999-12-31T05:00:00.000"
remediation = "建议升级至现代 BSD 发行版（FreeBSD 4.0+/OpenBSD 2.0+）或改用 CUPS 替代 lpr 打印系统。如因兼容性无法升级，可通过移除 lpr 的 setuid 权限作为临时缓解：`chmod u-s /usr/bin/lpr`，但会限制普通用户使用打印功能。"
score = 2.1
severity = "LOW"
sources = ["cve"]
title = "BSD lpr 本地任意文件写入漏洞"
updated = "2026-06-16T21:49:43.580"

