[basic]
description = "Standard & Poor's ComStock 4.2.4 的 MultiCSP 系统存在默认口令漏洞，系统中预置了多个无密码或使用弱口令的账户，远程攻击者可通过这些默认凭证登录系统，进而执行任意命令，完全控制目标主机。该漏洞影响 ComStock 4.2.4 版本，CVSS 评分 10.0，危害等级严重。"
published = "2000-01-31T05:00:00.000"
remediation = "立即删除或禁用 MultiCSP 系统中所有默认账户（如不具有密码或密码过于简单的账户），强制为每个账户设置强密码（至少 12 位含大小写字母、数字和特殊字符）。如业务允许，建议升级至 ComStock 最新版本或更换为受支持的替代产品。同时限制 mcsp 服务的网络访问范围，仅允许受信任 IP 连接，并在防火墙层面过滤 8080 等相关端口作为临时缓解措施。"
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "Standard & Poors ComStock MultiCSP 默认口令远程命令执行漏洞"
updated = "2026-06-16T21:51:01.183"

