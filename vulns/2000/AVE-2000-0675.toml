[basic]
description = "SGI MIPSPro 编译器（C、C++、F77 及 F90）在编译过程中会在 /tmp 目录下生成临时文件，由于文件名可被预测，本地攻击者可利用此缺陷在目标用户编译时向临时文件中注入恶意代码，从而实现权限提升或代码执行。该漏洞影响 SGI IRIX 系统上的 MIPSPro 编译器，CVSS 评分 3.7，危害等级低。"
published = "2000-06-21T04:00:00.000"
remediation = "建议升级 SGI MIPSPro Compiler 至 7.30 及以上版本，该版本已修复临时文件可预测问题。如无法升级，可通过设置环境变量 TMPDIR 将临时文件重定向到权限受限的专用目录，并确保编译目录的 umask 设置为 077 以防止其他用户读取或篡改临时文件。"
score = 3.7
severity = "LOW"
sources = ["cve"]
title = "SGI MIPSPro Compiler 临时文件可预测漏洞"
updated = "2026-06-16T21:52:02.313"

