[basic]
description = "Microsoft Java 虚拟机（JVM）存在安全沙箱逃逸漏洞，恶意 Java Applet 小程序可利用该漏洞绕过 JVM 的安全沙箱限制，在目标系统上执行任意命令。攻击者只需诱导用户访问包含恶意 Applet 的网页即可触发攻击，无需任何身份认证。该漏洞影响 Microsoft 实现的 Java 虚拟机，危害等级严重，CVSS 评分 9.3。微软已发布安全更新修复此漏洞，建议用户禁用 Java Applet 支持或安装相应补丁。"
published = "1999-10-21T04:00:00.000"
remediation = '立即卸载 Microsoft Java Virtual Machine（通过"添加/删除程序"或运行 `msiexec /x {08B20019-0A8E-11D3-BF9F-00C04F8EFB7C}`），改用 Oracle Java 或 OpenJDK 最新版本。在 IIS 中禁用 Java 支持，移除 class 文件 MIME 映射。在防火墙和代理层面拦截 .class 文件下载。对于必须使用 Microsoft JVM 的遗留系统，安装 MS00-075 安全更新 (Q318203)。'
score = 9.3
severity = "CRITICAL"
sources = ["avd"]
title = "Microsoft Java Virtual Machine 沙箱逃逸远程代码执行漏洞"
updated = "2026-06-16T21:49:00.830"

