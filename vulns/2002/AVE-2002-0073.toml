[basic]
description = "tcpdump 3.6.x 版本（3.7 之前）的 BGP 协议解析例程中存在数据复制缺陷，远程攻击者可通过向目标系统发送特制的 BGP 协议报文触发该漏洞，导致 tcpdump 进程崩溃，造成拒绝服务。该漏洞影响 tcpdump 3.6 至 3.6.2.2.2 版本，攻击者无需认证即可远程触发，CVSS 评分 7.5，危害等级高。厂商已在 tcpdump 3.7 版本中修复此漏洞。"
published = "2002-12-23T05:00:00.000"
remediation = "升级 tcpdump 至 3.7 或更高版本，该版本修复了 BGP 解析器中的数据复制缺陷。各 Linux 发行版用户应通过包管理器更新：Debian/Ubuntu 执行 `apt-get update && apt-get upgrade tcpdump`，Red Hat/CentOS 执行 `yum update tcpdump`。如无法升级，可在边界防火墙上过滤 TCP 端口 179 (BGP) 的入站流量作为临时缓解措施。"
score = 7.5
severity = "HIGH"
sources = ["osv"]
title = "LBL tcpdump BGP 解析器拒绝服务漏洞"
updated = "2026-06-16T21:59:09.227"

