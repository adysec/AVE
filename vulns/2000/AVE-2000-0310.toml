[basic]
description = "Windows NT 4.0 远程注册表服务存在拒绝服务漏洞，本地认证用户可通过向远程注册表服务器发送特制的畸形请求，导致 winlogon 进程崩溃，造成系统拒绝服务。该漏洞影响 Windows NT 4.0 系统，CVSS 评分 5.0，危害等级中危。攻击者需具备本地认证权限，利用难度较低，已有公开的 PoC 利用代码（MS00-040）。Microsoft 已发布安全公告并提供相应补丁修复此漏洞。"
published = "2000-06-08T04:00:00.000"
remediation = "立即安装 Microsoft 安全公告 MS00-040 提供的热修复补丁 Q264684，下载地址为 https://www.microsoft.com/download/details.aspx?FamilyId=292D70D6-9948-48AD-A3FE-435642D3A0A9。如无法安装补丁，可通过修改注册表 Winreg 键的 AllowedPaths 值，禁止所有已验证用户远程访问任何注册表项作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Microsoft Windows NT 4.0 远程注册表服务拒绝服务漏洞"
updated = "2026-06-16T21:51:35.390"

