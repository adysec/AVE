[basic]
description = "OpenSSH 2.3.1 至 3.3 版本的 sshd 存在缓冲区溢出漏洞。当使用 PAM 模块的交互式键盘认证（PAMAuthenticationViaKbdInt）时，远程攻击者通过在挑战-响应认证过程中发送大量响应数据触发缓冲区溢出，从而可以任意代码执行。该漏洞影响 OpenBSD 及使用了相应 PAM 配置的 Linux 系统，CVSS 评分 10.0，危害等级严重。"
published = "2002-07-03T04:00:00.000"
remediation = "立即升级 OpenSSH 至 3.4 及以上版本（3.3 及之前版本均受影响）。若无法立即升级，可在 sshd_config 中将 ChallengeResponseAuthentication 设为 no 禁用挑战-响应认证，或禁用 PAMAuthenticationViaKbdInt 交互键盘认证模块以缓解风险。"
score = 10
severity = "CRITICAL"
sources = ["osv"]
title = "OpenSSH sshd 挑战响应认证缓冲区溢出远程代码执行漏洞"
updated = "2026-06-16T21:57:50.567"

