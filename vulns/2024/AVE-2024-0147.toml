[basic]
description = "Coremail 邮件系统存在缓冲区溢出漏洞，源于系统在处理特制请求时未对输入数据长度进行严格校验，导致内存缓冲区越界写入。未经身份认证的远程攻击者可通过向目标邮件服务器发送精心构造的恶意数据包触发溢出，进而在服务器上执行任意代码（RCE），最终获取系统控制权。该漏洞影响使用 Coremail 论客邮件系统的相关版本，攻击者无需用户交互即可远程利用，危害等级严重。建议受影响用户及时联系厂商获取安全补丁并升级至最新版本。"
published = "0724"
remediation = "建议立即将Coremail邮件系统升级至最新安全版本（XT6或更高版本），或联系官方技术支持获取溢出漏洞专用补丁。如暂无法升级，可在防火墙或WAF层面限制外部对邮件系统SMTP/POP3/IMAP/WebMail端口的访问，仅允许可信IP段连接，并禁用不必要的邮件协议扩展功能。同时建议启用系统日志审计，监控异常进程创建和网络连接行为，发现可疑活动立即隔离受影响主机并重置管理员密码。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "论客 Coremail 邮件系统缓冲区溢出远程代码执行漏洞"
updated = "0724"

