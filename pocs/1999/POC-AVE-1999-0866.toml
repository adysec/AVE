[info]
author = "ave"
description = "Microsoft Internet Explorer 5 HTML Form Control 拒绝服务漏洞验证。构造包含大量表单输入控件的HTML页面，当IE5用户访问时触发布局引擎死循环导致CPU占用率100%。"
id = "POC-AVE-1999-0866"
name = "Microsoft Internet Explorer HTML Form Control DoS PoC"
severity = "medium"
tags = ["ave-1999-0866"]
vuln_id = [
    "CVE-1999-1016",
    "AVE-1999-0866",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/CVE-1999-1016.html"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["<input"]
