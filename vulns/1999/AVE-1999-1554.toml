[basic]
description = "NcFTPd FTP Server 2.4.1 之前版本中存在 off-by-one（差一错误）漏洞，远程攻击者可通过向目标服务器发送超长 PORT 命令参数触发该漏洞，导致服务进程崩溃从而引发拒绝服务。该漏洞源于对 PORT 命令参数长度边界检查不足，攻击复杂度低，无需任何身份认证即可远程利用，影响该 FTP 服务器的广泛部署版本。"
published = "1999-01-01T05:00:00.000"
remediation = "立即升级 NcFTPd FTP Server 至 2.4.1 或更高版本，该版本已修复 PORT 命令处理中的 off-by-one 缺陷。如无法立即升级，可在防火墙或 TCP Wrappers 中限制对 FTP 服务（默认端口 21）的访问来源 IP，仅允许可信网络连接。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "NcFTPd NcFTPd FTP Server 2.4.0 PORT命令远程拒绝服务漏洞"
updated = "2026-06-16T21:50:44.103"

