[basic]
description = "Sambar Web Server 4.2.1 存在缓冲区溢出漏洞。远程攻击者无需身份认证，通过向目标服务器发送特制的超长 HTTP GET 请求即可触发该漏洞，导致服务器崩溃拒绝服务，甚至可能造成远程代码执行。该漏洞原理为服务器在处理畸形输入时未正确检查边界条件，导致内存损坏。"
published = "1999-10-04T04:00:00.000"
remediation = "Sambar Web Server 已停止维护多年，不存在官方补丁。建议立即停止使用 Sambar 4.2.1 及更低版本，迁移至活跃维护的 Web 服务器（如 Apache httpd 或 Nginx）。若暂时无法迁移，可在 Web 服务器前端部署反向代理并配置 WAF 规则过滤超长 GET 请求以缓解风险。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "Sambar Web Server 4.2.1 远程代码执行漏洞"
updated = "2026-06-16T21:50:37.367"

