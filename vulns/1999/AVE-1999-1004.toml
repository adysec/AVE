[basic]
description = "Netscape Navigator/Communicator 4.7 在处理 URL 时存在缓冲区溢出漏洞，当 URL 中 ? 后的参数长度超过缓冲区边界时，会触发栈溢出。远程攻击者可构造包含超长参数的恶意 URL（指向 .asp、.cgi、.html 或 .pl 文件），诱使用户访问后导致浏览器崩溃拒绝服务，甚至可能执行任意代码。该漏洞影响 Windows 95/98 平台上的 Netscape 4.7 版本，CVSS 评分 7.5，危害等级高。"
published = "1999-11-24"
remediation = "升级 Netscape Navigator/Communicator 至 4.73 及以上版本，该版本修复了长 URL 参数导致的缓冲区溢出问题。如无法升级，建议在 Web 服务器端过滤超长 URL 请求参数，限制 ? 后参数长度不超过 1024 字节。鉴于该浏览器已停止维护，强烈建议迁移至现代浏览器。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "Netscape Navigator/Communicator 缓冲区溢出远程代码执行漏洞"
updated = "2026-06-16"

