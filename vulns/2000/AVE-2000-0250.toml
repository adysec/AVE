[basic]
description = "GNU Emacs 20 版本中存在本地窃听漏洞。其 read-passwd 等 Lisp 函数未能正确清除最近输入按键的历史记录，导致本地攻击者可通过访问按键历史记录读取用户输入的未加密密码。该漏洞影响 GNU Emacs 20 版本，攻击者需具备本地系统访问权限，可通过查看按键历史记录窃取用户输入的明文密码。CVSS 评分 4.6，属于中等危害等级。"
published = "2000-04-18T04:00:00.000"
remediation = "建议升级至 GNU Emacs 21.1 或更高版本，该版本已修复 read-passwd 等 Lisp 函数不清除按键历史的缺陷。若无法立即升级，可禁用密码回显历史记录功能或限制本地用户访问权限作为临时缓解措施。"
score = 4.6
severity = "MEDIUM"
sources = ["cve"]
title = "GNU Emacs 本地密码信息泄露漏洞"
updated = "2026-06-16T21:51:22.133"

