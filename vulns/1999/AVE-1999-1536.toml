[basic]
description = "UNIX 系统中 rdist 工具在调用 sendmail 时使用 popen 函数执行命令，本地攻击者可通过修改 IFS（内部字段分隔符）环境变量操纵命令执行路径，从而以 root 权限执行任意代码。该漏洞影响多种 UNIX 变体系统，攻击者需拥有本地 shell 访问权限，无需认证即可利用，CVSS 评分 6.2，危害等级中危。"
published = "1991-10-22T04:00:00.000"
remediation = '''
建议使用绝对路径调用外部命令，如 `/usr/sbin/sendmail` 而非 `sendmail`；在执行 `popen` 前设置安全的环境变量（如 `IFS=' \t\n'`、指定绝对 `PATH`）。同时应用各 UNIX 厂商发布的相应安全补丁，升级包含此修复的 rdist 版本。
'''
score = 6.2
severity = "MEDIUM"
sources = ["avd"]
title = "多款 UNIX 系统 rdist IFS 环境变量本地提权漏洞"
updated = "2026-06-16T21:50:30.270"

