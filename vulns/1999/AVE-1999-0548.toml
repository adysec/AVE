[basic]
description = "NetMeeting 组件存在缓冲区溢出漏洞，远程攻击者可通过向目标系统发送特制的请求或数据包触发该漏洞，成功利用后可导致目标程序拒绝服务或在目标系统上执行任意命令。攻击者无需身份认证即可远程利用，影响多个 Windows 版本中的 NetMeeting 应用。"
published = "1998-12-01T05:00:00.000"
remediation = '立即升级至 NetMeeting 2.1 及以上版本，微软已在 KB Q184346 中发布修复补丁。NetMeeting 已停止支持，强烈建议通过 "控制面板 → 程序和功能 → 打开或关闭 Windows 功能" 彻底卸载 NetMeeting。如业务必须使用，在防火墙上限制对 H.323 端口（TCP 1720/1503/1731）的访问作为临时缓解。'
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "Microsoft NetMeeting 缓冲区溢出漏洞"
