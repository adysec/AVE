[basic]
description = "FRRouting（FRR）在处理 RTR（RPKI-to-Router）协议更新时存在资源管理不当漏洞（CWE-404）。当单次 RTR 更新数据总量超过操作系统默认套接字缓冲区大小（通常为 4KB）时，FRR 会触发对所有路由的重新验证。攻击者可通过在更新间隔内（通常为 30 分钟）发送超过该阈值的 ROA 更新，迫使目标 FRR 路由器持续重新解析 RIB（路由信息库），导致路由处理性能严重下降。对于维护大型全量路由表的路由器，单次重新验证可能超过 30 分钟，攻击者可利用持续签发/撤销大量 ROA 的方式影响全球所有使用 RPKI 的 FRR 实例的路由处理能力，同时导致 BMP（BGP 监控协议）流量激增。该漏洞影响 FRR 6.0 至 10.3 版本，CVSS 评分 7.5，危害等级高。修复版本为 10.0.3、10.1.2、10.2.1 及 10.3 以上。"
published = "2025-01-06T23:15:07.637"
remediation = "升级 FRRouting 至 10.0.3、10.1.2、10.2.1 或 10.3 及以上版本。补丁提交见 https://github.com/FRRouting/frr/pull/17586。如无法立即升级，可通过 `sysctl -w net.core.rmem_default=65536` 临时增大 RTR 套接字接收缓冲区大小（默认 4KB），降低因缓冲区满触发全量路由重校验的频率，但此缓解措施不能完全消除风险。"
score = 7.5
severity = "HIGH"
sources = ["msrc"]
title = "FRRouting FRR 拒绝服务漏洞"
updated = "2026-06-17T08:11:13.833"

