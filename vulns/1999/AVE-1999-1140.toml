[basic]
description = "True North Internet Anywhere Mail Server 2.3.1 的 POP3 服务存在拒绝服务漏洞，远程攻击者无需身份认证即可通过向 POP3 端口发送特制的 LIST、TOP 或 UIDL 命令（以字母作为参数）触发该漏洞，导致服务器进程崩溃，影响邮件服务的正常可用性。该漏洞 CVSS 评分 5.0，危害等级中危。"
published = "1999-10-01T04:00:00.000"
remediation = "由于 True North Internet Anywhere Mail Server 已停止维护且无官方补丁，建议立即升级至仍在安全支持周期内的邮件服务器（如 Dovecot、Exchange Server 等）。若无法立即迁移，可在防火墙层面限制仅允许信任 IP 访问 TCP 端口 110（POP3），并配置入侵检测规则拦截包含异常参数的 LIST/TOP/UIDL 请求，作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "True North Internet Anywhere Mail Server POP3 拒绝服务漏洞"
updated = "2026-06-16T21:50:34.463"

