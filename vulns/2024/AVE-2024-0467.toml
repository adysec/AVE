[basic]
description = "compose-go 库在解析包含递归循环的 Compose 文件时存在平台资源过度消耗漏洞（CWE-20 输入验证不当），由于未对 YAML 结构的递归深度进行有效限制，导致解析过程中 CPU 和内存被大量占用。经授权的攻击者可通过发送包含递归引用的恶意 YAML 载荷触发此漏洞，造成服务拒绝。该漏洞影响 compose-go v2.1.0 至 v2.4.0 及 Docker Compose v2.27.0 至 v2.29.7 版本，CVSS 评分 5.9，危害等级中危。"
published = "2025-01-21"
remediation = "将 compose-go 库升级至 v2.4.1 或更高版本。如使用 Docker Compose，应升级至 v2.30.0 及以上版本。该漏洞无已知临时缓解措施，仅可通过升级修复。"
score = 5.9
severity = "MEDIUM"
sources = [
    "cve",
    "ghsa",
]
title = "Docker Compose compose-go 库解析 YAML 时资源消耗漏洞"
updated = "2026-07-22"

