[basic]
description = "Microsoft Internet Explorer 4.0.1 与 5.0 版本存在本地文件信息泄露漏洞。该漏洞源于浏览器在处理 IFRAME 元素时，对 ExecCommand 方法的调用缺乏充分的安全限制与同源校验。远程攻击者可通过诱导用户访问特制的恶意网页，在页面中嵌入 IFRAME 并调用 ExecCommand 方法，从而绕过浏览器的安全沙箱机制，读取受害者本地文件系统上的敏感文件内容。该漏洞影响运行上述版本 IE 的 Windows 系统用户，攻击需用户使用漏洞版本浏览器访问攻击者控制的网页方可触发，CVSS 评分为 4.3，危害等级中等，主要造成本地文件内容泄露。"
published = "1999-10-01T04:00:00.000"
remediation = "立即为受影响的 Internet Explorer 4.01 安装 Service Pack 2（SP2），或为 Internet Explorer 5 下载并安装 MS99-042 安全补丁，补丁可从 Windows Update 或 Microsoft 下载中心获取。如暂无法打补丁，可在 IE 的「安全」→「自定义级别」中禁用「活动脚本」和「Java 小程序脚本」作为临时缓解措施。此外，避免访问不可信的网站，并考虑升级到更高版本或使用其他受支持的现代浏览器。"
score = 4.3
severity = "MEDIUM"
sources = ["exploitdb"]
