[basic]
description = "金和OA系统的AddTask模块存在XML外部实体注入（XXE）漏洞。由于系统在处理XML数据时未对外部实体进行安全过滤，远程攻击者可通过构造包含恶意外部实体的特制XML请求包，利用该漏洞读取服务器敏感文件、发起服务端请求伪造（SSRF）攻击，甚至可能造成远程代码执行。攻击无需身份认证，利用难度较低，危害较大。"
published = "0710"
remediation = '建议将金和OA升级至官方发布的最新安全版本（如 v8.0 以上补丁包），或联系厂商获取 AddTask 接口的 XXE 修复补丁。如无法立即升级，修改 XML 解析配置：在 DocumentBuilderFactory 中设置 setFeature("http://apache.org/xml/features/disallow-doctype-decl", true) 禁用 DTD，同时设置 setFeature("http://xml.org/sax/features/external-general-entities", false) 禁用外部实体解析。临时缓解措施可在 WAF/反向代理层对 /AddTask 接口的 POST 请求体匹配拦截 <!DOCTYPE 和 <!ENTITY 关键字。'
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "金和OA AddTask XML外部实体注入漏洞"
updated = "0710"

