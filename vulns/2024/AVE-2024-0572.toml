[basic]
description = "Linux 内核 powerpc/pSeries 架构的 VAS（虚拟加速器交换板）子系统中存在释放后使用（Use-After-Free）漏洞。当用户进程通过 mmap 映射 paste 地址时，VMA 地址被保存在 VAS 窗口结构体中，用于在系统迁移时取消映射。然而，当进程调用 munmap() 解除映射后，VAS 窗口中的 VMA 地址并未同步更新，仍指向已释放的内存区域。在后续分区迁移操作中，reconfig_close_windows 函数访问该悬空指针，触发 slab-use-after-free，可能导致内核内存损坏。本地低权限攻击者可利用此漏洞造成系统崩溃或潜在的信息泄露。该漏洞影响 Linux 内核 powerpc pSeries 平台，CVSS 评分 7.8，危害等级高。"
published = "2025-01-06T17:15:42.800"
remediation = "立即升级 Linux 内核至以下安全版本：6.1.123、6.6.69、6.12.8 或 6.13 及以上。对应补丁提交为 05aa156e156e、6d9cd2710545、8b2282b50845、b7f60ffdfd96。Ubuntu 24.04 LTS 用户可通过 `apt update && apt install linux-image-6.11.0-1011-lowlatency` 安装 USN-7381-1 更新。Debian 用户参考 DLA-4071-1。如无法立即升级，可临时禁用 VAS 功能（`modprobe.blacklist=vas`）或避免在受影响系统上执行 LPAR 迁移操作作为缓解。"
score = 7.8
severity = "HIGH"
sources = ["msrc"]
title = "Linux Kernel powerpc/pseries VAS 释放后使用漏洞"
updated = "2026-06-17T08:12:56.283"

