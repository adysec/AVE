[basic]
description = "WindowMaker桌面环境的wmcdplay CD播放器程序存在缓冲区溢出漏洞。攻击者可通过向程序传递超长参数触发缓冲区溢出，导致内存损坏，成功利用此漏洞的本地攻击者可以获得root权限。该漏洞影响wmcdplay 1.0 beta1和beta2版本。"
published = "2000-03-10"
remediation = "建议升级到不受影响的wmcdplay版本，或移除wmcdplay程序的setuid权限位以防止本地提权攻击。"
