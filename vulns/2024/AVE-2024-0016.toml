[basic]
description = "JumpServer 是一款开源堡垒机及运维安全审计系统，其 Ansible 模块存在输入验证绕过漏洞（CWE-94）。攻击者可在后台通过构造特制的 Ansible Playbook 模板，利用 Jinja2 模板注入执行任意代码，从而在 Celery 容器中实现远程代码执行。由于 Celery 容器以 root 权限运行且可访问数据库，攻击者可窃取所有受管主机的敏感信息或篡改数据库数据。该漏洞影响 JumpServer 3.0.0 至 3.10.6 版本，CVSS 评分 9.9，危害等级严重。官方已在 v3.10.7 版本中修复此漏洞。"
published = "2024-03-29T15:15:11.963"
remediation = "升级 JumpServer 至 v3.10.7 或更高版本；若无法立即升级，可在后台临时禁用 Ansible 模块相关功能并限制可访问后台管理界面的来源 IP，避免未授权用户进入后台构造恶意 Playbook 模板。"
score = 9.9
severity = "CRITICAL"
sources = ["hwpoc"]
title = "JumpServer后台管理功能Ansible远程代码执行漏洞"
updated = "2026-06-17T07:22:37.080"

