[basic]
description = "SalesLogix Eviewer 中的 slxweb.dll 管理程序未对用户进行身份认证，远程攻击者只需直接访问该组件的 URL 即可触发拒绝服务。该漏洞利用条件极低，攻击者无需任何凭据，在网络上能够访问目标服务器的 slxweb.dll 路径即可发起攻击，导致 Eviewer 服务中断或系统资源耗尽，影响正常的业务访问与客户管理功能。"
published = "2000-08-03"
remediation = "将 SalesLogix Eviewer 升级至厂商发布的修复版本，并在 IIS 中为 slxweb.dll 所在路径启用 Windows 身份认证或禁用匿名访问。建议通过 IIS IP 地址限制仅允许可信内部网络访问该管理接口，同时在防火墙规则中限制对 slxweb.dll 端口的入站连接，以阻止外部未授权请求。长期应将 SalesLogix 迁移至 Sage CRM 等受持续安全支持的版本。"
score = 5.0
severity = "MEDIUM"
sources = [
    "nvd",
    "exploitdb",
]
title = "SalesLogix Eviewer slxweb.dll 未认证拒绝服务漏洞"
updated = "2000-08-03"

