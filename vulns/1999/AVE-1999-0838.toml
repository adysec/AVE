[basic]
description = "Windows NT 与 Windows 2000 系统默认将 .reg 文件与注册表编辑器（regedit）关联，攻击者可构造包含恶意键值的 .reg 特洛伊木马文件，诱骗本地已登录用户双击执行，从而在用户权限下将恶意数据写入系统注册表，造成配置篡改、权限提升或持久化后门。该漏洞影响所有启用此默认关联的 Windows NT 及 Windows 2000 系统，攻击需本地用户主动打开恶意文件，属本地社会工程类风险。"
published = "1997-01-01T05:00:00.000"
remediation = "建议将 Windows NT/2000 升级至受支持的 Windows 版本（如 Windows 10/11 或 Windows Server 2019/2022）。如无法立即升级，可通过修改文件关联将 .reg 文件默认打开方式从 regedit.exe 更改为记事本（notepad.exe），或通过组策略和注册表禁用 .reg 文件执行，并提醒用户不要打开来历不明的 .reg 文件。"
score = 9.3
severity = "CRITICAL"
sources = ["epss"]
title = "Microsoft Windows NT 2000 .reg 文件关联注册表木马注入漏洞"
updated = "2026-06-16T21:48:39.637"

