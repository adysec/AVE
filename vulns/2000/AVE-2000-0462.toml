[basic]
description = "Windows 2000 Telnet 服务器存在拒绝服务漏洞。远程攻击者无需身份认证即可向目标服务器的 Telnet 端口（默认 23）发送持续不断的二进制零数据流，导致 Telnet Server 服务进程崩溃，无法继续提供正常的 Telnet 远程登录服务，需要管理员手动重启服务方可恢复。该漏洞影响 Microsoft Windows 2000 系统，CVSS 评分 5.0，危害等级中等，利用复杂度较低。"
published = "2000-06-30T04:00:00.000"
remediation = "Windows 2000 已停止支持，官方不再提供安全更新。建议立即禁用 Telnet 服务（services.msc → Telnet → 停止并禁用启动类型），并在防火墙层面阻止 TCP 23 端口入站连接。如业务需要远程管理，应改用 SSH 协议替代 Telnet。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Microsoft Windows 2000 Telnet Server 拒绝服务漏洞"
updated = "2026-06-16T21:52:02.687"

