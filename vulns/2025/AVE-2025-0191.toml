[basic]
description = "Microsoft Exchange Server 存在 ProxyShell 绕过反序列化漏洞（ProxyShell Bypass Deserialization RCE）。未经认证的远程攻击者可通过向 Exchange 服务器发送特制的 HTTP 请求，绕过已有身份验证机制触发不安全反序列化，从而在目标系统上以 SYSTEM 权限执行任意代码。该漏洞影响多个 Exchange 版本，危害极大，需尽快安装官方安全更新。"
published = "0702"
remediation = "立即安装 Microsoft 2021 年 7 月安全更新：Exchange 2013 CU23 升级至 15.00.1497.015，Exchange 2016 CU19 升级至 15.01.2176.012、CU20 升级至 15.01.2242.008，Exchange 2019 CU8 升级至 15.02.0792.013、CU9 升级至 15.02.0858.010。如无法立即打补丁，可在 IIS 管理器中将 Autodiscover 虚拟目录的 URL 重写规则限制为仅允许内部 IP 访问，并禁用未使用的 Exchange 后端服务以缩小攻击面。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "Microsoft Exchange ProxyShell 绕过反序列化远程代码执行漏洞"
updated = "0702"

