[basic]
description = "Sun Solaris 2.5.1 Telnet 服务存在控制字符处理缺陷，远程攻击者无需认证即可通过向目标系统的 telnet 端口发送 ^D（Ctrl+D）控制字符，导致 telnet 守护进程崩溃或进入异常状态，从而造成拒绝服务。该漏洞影响 Sun Solaris 2.5.1 操作系统，攻击利用难度低，无需特殊权限即可触发，属于典型的拒绝服务漏洞。"
published = "1998-01-01T05:00:00.000"
remediation = "升级至 Oracle Solaris 11 或更高版本，并停止使用 telnet 服务；在 inetd.conf 中注释 telnet 行（或执行 svcadm disable telnet），改用 SSH 作为远程管理协议。若必须运行旧版系统，限制 telnet 服务的源 IP 访问并部署入侵检测规则监控异常 ^D 字符序列。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Sun Solaris 2.5.1 Telnet 控制字符拒绝服务漏洞"
updated = "2026-06-16T21:48:02.973"

