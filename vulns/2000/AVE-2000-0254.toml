[basic]
description = "X Window 系统的字体服务器 xfs 存在输入验证缺陷，本地用户可向 xfs 服务器发送畸形（格式错误的）输入数据，触发服务异常并导致拒绝服务，使依赖该字体服务的图形界面无法正常工作。该漏洞影响运行 xfs 的 Linux 系统（如 RedHat Linux 6.x 等）。攻击条件为攻击者需具备本地系统访问权限，通过构造特制请求发送至 xfs 服务端口即可利用，造成目标系统字体服务崩溃。"
published = "2000-04-16T04:00:00.000"
remediation = "升级至 RedHat Linux 6.x 的 xfs 相关补丁 rpm 包（如 XFree86-xfs-3.3.6-11 及以上），并通过 chkconfig 或 ntsysv 关闭 xfs 字体服务（执行 `chkconfig xfs off` 并停止服务）；在无法立即打补丁时，通过防火墙限制仅本地回环访问 7100 端口，禁止远程主机向 xfs 发送畸形输入。"
score = 2.1
severity = "LOW"
sources = ["cve"]
