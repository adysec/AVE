[basic]
description = "BlackICE 高 UDP 阻塞延迟漏洞是 Internet Security Systems 公司 BlackICE 安全软件中的一个安全漏洞。该软件在安全设置为“Nervous”或更低级别时，无法正确过滤 Back Orifice 恶意流量。当攻击者向目标系统发送特制的数据包时，软件会延迟或完全忽略这些威胁，导致恶意连接建立。受影响的产品包括 BlackIce Defender 2.1 及更早版本，以及 BlackIce Pro 2.0.23 及更早版本。攻击者无需任何身份验证即可远程触发此漏洞，通过控制恶意流量绕过安全过滤系统，窃取敏感数据和控制权。该漏洞影响范围较广，因为 BlackICE 是企业网络安全的重要组成部分，许多组织当时都在使用该软件进行网络防护。该漏洞的 CVSS 评分为 7.5，威胁等级为中高。攻击条件包括目标系统安装了受影响版本的 BlackICE 安全软件、安全设置处于 Nervous 或更低级别，且 attacker 可以向目标发送恶意 UDP 数据包。利用方式包括发送特制的数据包绕过安全过滤，或利用软件延迟响应的机制建立恶意连接。漏洞成因在于 Back Orifice 的特定数据包格式被误认为是合法网络流量，导致安全软件未能将其阻断，从而为攻击者提供了入侵网络系统的机会。微软已在 2000 年 9 月的安全更新中修复了此漏洞，建议所有用户立即更新到最新版本以获取保护。"
published = "2000-06-22T04:00:00.000"
remediation = "立即升级到 BlackIce 4.x 及以上版本，应用 2003 年 3 月安全更新包；将安全设置为“高”或“严格”，禁用脆弱的“Nervous”设置；如无法立即更新，可通过防火墙策略禁用出站 UDP 端口 1024-65535 流量，并启用入站 Back Orifice 识别规则。”"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "ISS BlackICE Defender UDP阻塞延迟漏洞"
updated = "2026-06-16T21:52:00.177"

