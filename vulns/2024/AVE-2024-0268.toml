[basic]
description = "JeecgBoot（积木报表）是一款基于代码生成器的低代码开发平台，其某些API接口存在SQL注入漏洞。攻击者可通过构造恶意请求参数，在未授权的情况下向后台数据库注入恶意SQL语句，导致数据泄露、篡改或删除，严重威胁系统安全。"
published = "2024-06-15"
remediation = "升级JeecgBoot至最新版本，对用户输入参数进行严格过滤和参数化查询处理，禁用不必要的动态SQL拼接功能，并部署Web应用防火墙进行深度防御。"
score = 5.5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "积木报表 JeecgBoot SQL注入漏洞"
updated = "2024-07-18"

