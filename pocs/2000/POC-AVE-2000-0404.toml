[info]
author = "ave"
description = "发送 HTTP GET 请求至 FileMaker Pro 5 Web Companion 服务，检测 XML 发布接口是否可被未经授权的访问绕过字段级安全限制。若服务返回包含 FMPXMLRESULT 或 fmresultset 标识的 XML 数据，说明 XML 发布接口暴露且可能被利用绕过数据库字段级权限控制。"
id = "POC-AVE-2000-0404"
name = "FileMaker Pro 5 Web Companion 安全绕过 PoC"
severity = "medium"
tags = ["ave-2000-0404"]
vuln_id = [
    "CVE-2000-0385",
    "AVE-2000-0404",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/FMPro"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "FMPXMLRESULT",
    "fmresultset",
    "FileMaker Web Companion",
]
