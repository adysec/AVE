[basic]
description = "Tridia DoubleVision 3.07.00 的 dvtermtype 组件存在缓冲区溢出漏洞，本地攻击者可通过向终端类型参数传入超长字符串触发该漏洞，导致攻击者获取目标系统的 root 权限。该漏洞影响 Tridia DoubleVision 3.07.00 及更早版本，CVSS 评分 7.2，危害等级高。攻击者需拥有本地系统访问权限，利用难度较低。"
published = "2000-11-14T05:00:00.000"
remediation = "移除 dvtermtype 程序的 setuid 权限位（执行 chmod u-s /usr/bin/dvtermtype），防止本地用户利用缓冲区溢出提升至 root 权限。如 Tridia 发布了新版 DoubleVision，请升级至不受影响版本。同时可通过限制可执行文件的属组访问作为临时缓解措施。"
score = 7.2
severity = "HIGH"
sources = ["exploitdb"]
title = "Tridia DoubleVision 本地权限提升漏洞"
updated = "2026-06-16T21:52:37.840"

