[basic]
description = "MIT Kerberos 4.0/5.1.0/5.1.1 系统中存在 set_tgtkey 函数的缓冲区溢出漏洞。攻击者可通过向 Kerberos 密钥分发中心 (KDC) 发送特制的 IPv6 数据包，利用未初始化的 lastrealm 变量触发缓冲区溢出，导致远程代码执行或拒绝服务。该漏洞影响 Windows 和 Linux 系统中运行的 MIT Kerberos 认证服务，攻击者无需身份验证即可远程利用，CVSS 评分 5.0。漏洞源于复制时未检查输入长度，攻击者可通过构造超过缓冲区大小的数据包篡改内存，破坏认证服务并可能执行任意代码。此类攻击可导致 Kerberos 密钥分发中心崩溃、认证服务中断或被攻击者完全控制。"
published = "2000-06-09T04:00:00.000"
remediation = "tags.<value>请立即升级到 MIT Kerberos 5.3.0 或更高版本，这是最完整的修复方案。如需使用旧版可行，至少要应用 2003 年发布的 krb5-1.3.4 或 2009 年发布的 krb5-1.6 安全补丁，并修改 krb.conf 文件中将 max_life 设为 10h，short_circuit 不使用 TGT 解析服务，这可以避免利用 lastrealm 变量的拒绝服务问题"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "MIT Kerberos 4/5 缓冲区溢出拒绝服务漏洞"
updated = "2026-06-16T21:51:58.157"

