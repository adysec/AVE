[basic]
description = "iPlanet iCal 2.1 Patch 2 在安装过程中将多个文件及脚本设置为全局可写权限，存在不安全的权限配置漏洞。获得本地系统访问权限的攻击者可通过将 iplncal.sh 程序替换为特洛伊木马，从而修改 iCal 服务配置并在目标系统上以服务权限执行任意命令。该漏洞影响 iPlanet iCal 2.1 Patch 2 版本，CVSS 评分 7.2，危害等级高危。"
published = "2000-12-11T05:00:00.000"
remediation = '建议立即执行 `chmod 755 $ICAL_HOME/iplncal.sh` 并将 iCal 安装目录下所有关键脚本和配置文件的属主改为 root，移除全局可写权限（`find $ICAL_HOME -type f -exec chmod 755 {} \;`）。同时应升级到 iPlanet iCal 的最新受支持版本，或迁移至仍在维护的日历服务，避免继续使用已停止安全支持的旧版本。'
score = 7.2
severity = "HIGH"
sources = ["exploitdb"]
title = "Netscape iCal 2.1 Patch2 本地权限提升漏洞"
updated = "2026-06-16T21:53:05.613"

