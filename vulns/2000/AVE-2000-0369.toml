[basic]
description = "Red Hat Linux 6.1 的 ORBit CORBA 组件与 gnome-session 会话管理器中存在远程拒绝服务漏洞。未经身份认证的远程攻击者可利用 CORBA 通信接口或会话管理协议，向目标系统发送精心构造的网络请求，触发程序异常崩溃，导致系统服务不可用。该漏洞攻击复杂度低，无需认证即可远程利用，主要影响系统可用性。Red Hat 已发布安全公告 RHSA-1999:058-01 提供修复补丁。"
published = "1999-12-03T05:00:00.000"
remediation = "升级至 Red Hat Linux 6.2 或更高版本，或安装 RHSA-1999:058-01 提供的 ORBit 和 gnome-session 安全更新。如无法升级，在防火墙层面限制对 111/TCP（ORBit 默认端口）的访问，并对 gnome-session 服务配置 hosts.allow/hosts.deny 白名单以限制远程来源。该产品已停止维护，强烈建议迁移至受支持的 Red Hat Enterprise Linux 版本。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "RedHat Linux 6.1 ORBit gnome-session 远程拒绝服务漏洞"
updated = "2026-06-16T21:51:33.060"

