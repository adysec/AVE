[basic]
description = "Linux KVM 虚拟化子系统的 VMX 模块存在初始化顺序缺陷，在完成所有必要初始化之前便将 /dev/kvm 暴露给用户空间。本地具有 /dev/kvm 访问权限的攻击者可在初始化未完成时通过 ioctl 系统调用创建虚拟机，触发 per-CPU loaded_vmcss_on_cpu 链表的空指针解引用，导致内核崩溃引发拒绝服务。该漏洞影响 Linux 内核，CVSS 评分 5.5，危害等级中危。"
published = "2025-05-02T16:15:22.070"
remediation = "更新 Linux 内核至 6.0 及以上版本，或合入官方修复补丁（commit: kvm_init() 后移至所有 VMX 初始化完成之后）。如无法升级内核，可临时卸载 kvm_intel 模块（modprobe -r kvm_intel）并禁止自动加载，禁用 KVM 虚拟化功能作为缓解措施。"
score = 5.5
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux Kernel KVM VMX 空指针解引用漏洞"
updated = "2026-06-17T05:19:34.057"

