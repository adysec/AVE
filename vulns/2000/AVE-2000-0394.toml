[basic]
description = "Solaris 8及更早版本的 ufsrestore 工具中存在缓冲区溢出漏洞。本地攻击者可通过对 ufsrestore 命令传递超长路径名参数触发栈溢出，导致攻击者以 root 权限执行任意代码，实现本地权限提升。该漏洞影响 Solaris 2.5/2.6/7.0/8 等多个版本。"
published = "2000-06-14T04:00:00.000"
remediation = "升级至 Solaris 9 或更高版本，或在受影响系统中移除 ufsrestore 的 setuid 权限：`chmod -s /usr/lib/ufsrestore`。如业务不需要，可直接卸载 ufsrestore 软件包。仅允许受信管理员执行还原操作，通过 RBAC 限制对 raw 设备的访问。"
score = 7.2
severity = "HIGH"
sources = ["cve"]
title = "Sun Solaris ufsrestore 本地缓冲区溢出漏洞"
updated = "2026-06-16T21:51:48.330"

