[basic]
description = "Common Unix Printing System (CUPS) 1.1.14 至 1.1.17 版本中存在条件竞争漏洞。具有 lp 打印机服务权限的本地攻击者可通过文件条件竞争攻击，在 CUPS 处理打印任务的过程中利用时间窗口差，将任意系统文件覆盖或创建为新文件，从而提升权限或破坏系统完整性。该漏洞攻击复杂度较高，需要本地访问权限，但成功利用后可实现完全机密性、完整性和可用性破坏。"
published = "2002-12-26T05:00:00.000"
remediation = "升级 CUPS 至 1.1.18 或更高版本。各发行版对应：Debian 安装 cupsys 更新包（DSA-232），Red Hat 应用 RHSA-2002:295 更新，SuSE 安装 2003_002 安全补丁，Mandrake 应用 MDKSA-2003:001。如无法升级，移除 lp 用户组中非必要用户的 lp 权限以降低风险。"
score = 6.2
severity = "MEDIUM"
sources = ["osv"]
title = "CUPS 本地竞争条件漏洞导致任意文件写入"
updated = "2026-06-16T21:59:11.180"

