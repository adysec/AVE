[basic]
description = "StarTech 的 POP3 代理服务与 Telnet 服务在处理身份认证阶段的 USER 命令时，未对用户名长度进行边界校验，存在拒绝服务漏洞。远程攻击者只需能够网络访问目标主机的对应服务端口（POP3 110 或 Telnet 23），无需身份认证，即可发送超长的 USER 命令，触发服务进程异常崩溃或挂起，使目标服务不可用。该漏洞影响运行存在缺陷版本的 StarTech POP3 代理及 Telnet 服务的系统，利用方式简单，属于典型的远程非认证拒绝服务类安全问题。"
published = "1998-07-03T04:00:00.000"
remediation = "建议升级 StarTech POP3 Proxy Server 和 Telnet Server 至最新修补版本，或在防火墙层面封禁 POP3 (110端口) 和 Telnet (23端口) 的外部访问，禁用不必要的认证服务作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "StarTech POP3 代理服务器 Telnet 服务器 认证长用户名拒绝服务漏洞"
updated = "2026-06-16T21:49:56.200"

