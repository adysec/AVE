[info]
author = "AVE"
description = "检测CVE-2000-0655：Netscape Communicator 4.x JPEG注释堆溢出客户端漏洞。通过HTTP服务ExploitDB 20098特制JPEG图片，当目标使用Netscape 4.x浏览器访问时，JPEG注释长度字段处理缺陷（length=1导致分配0字节缓冲区）触发堆覆盖，造成浏览器崩溃或任意代码执行。需受害者使用受影响浏览器访问包含此图片的页面。PoC来源：Solar Designer/ExploitDB"
id = "POC-AVE-2000-0510"
name = "Netscape Communicator JPEG Comment Heap Overflow PoC"
severity = "medium"
tags = ["cve-2000-0655"]
vuln_id = [
    "CVE-2000-0655",
    "AVE-2000-0510",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/20098.jpg"
protocol = "http"

[[poc.requests.matchers]]
expect = true
status = [200]
type = "status"
