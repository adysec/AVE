[basic]
description = "东胜物流软件 FileExport.aspx 接口存在任意文件读取漏洞，攻击者可在未授权的情况下通过构造特制的文件路径参数，利用路径遍历技术读取服务器上的任意文件，包括配置文件、数据库连接信息等敏感数据。该漏洞影响东胜物流软件多个版本，攻击者只需网络可达即可利用，危害较大。"
published = "2025-07-22"
remediation = "联系东胜软件厂商获取最新安全补丁，升级至修复该漏洞的版本。如无法立即升级，在 Web 服务器（IIS）中对 FileExport.aspx 页面添加 IP 白名单访问控制，仅允许可信内网 IP 访问；同时在代码层对传入的文件路径参数进行严格校验，禁止包含 ../ 等路径遍历字符，并将可读取路径限制在指定上传目录内。"
score = 5.0
severity = "MEDIUM"
sources = ["hwpoc"]
title = "东胜物流软件 FileExport.aspx 任意文件读取漏洞"
updated = "2025-07-22"

