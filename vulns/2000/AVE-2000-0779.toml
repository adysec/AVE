[basic]
description = 'Microsoft SQL Server 7.0/2000 及 Microsoft 数据引擎 (MSDE) 1.0/2000 中的 xp_displayparamstmt 扩展存储过程函数存在缓冲区溢出漏洞。当调用 SQL Server 扩展存储过程 API 中的 srv_paraminfo 函数时，该函数未能正确限制缓冲区长度，导致攻击者可通过向受影响系统发送特制的参数触发缓冲区溢出，进而造成拒绝服务或执行任意命令。攻击者只需具备数据库访问权限即可利用此漏洞，无需高级权限。该漏洞又名"扩展存储过程参数解析"漏洞。'
published = "2001-01-09T05:00:00.000"
remediation = "安装 Microsoft 安全公告 MS00-092 对应补丁：SQL Server 7.0 用户升级至 Service Pack 3（含补丁），SQL Server 2000 用户升级至 Service Pack 1（含补丁），MSDE 1.0/2000 用户安装对应补丁包。建议将 SQL Server 服务账号配置为最低权限普通用户账号，避免使用管理员权限运行。检查所有第三方扩展存储过程（XP）对 srv_paraminfo() 的调用，确保调用前已分配足够大小的缓冲区。"
score = 4.6
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Microsoft SQL Server 7.0/2000 xp_displayparamstmt 缓冲区溢出漏洞"
updated = "2026-06-16T21:53:06.653"

