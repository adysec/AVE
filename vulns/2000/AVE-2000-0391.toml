[basic]
description = "HP-UX 10.20 及 11.0 系统中的 man 命令存在符号链接（symlink）竞争条件漏洞。本地攻击者可通过在 /tmp 目录下创建恶意符号链接，诱使 man 命令以 root 权限向攻击者指定的任意文件写入数据，从而实现本地权限提升或文件覆盖。该漏洞影响 HP-UX 10.20 和 11.0 版本，CVSS 评分 4.6，危害等级中危。攻击者需拥有本地系统访问权限方可利用。"
published = "2000-06-02T04:00:00.000"
remediation = "建议安装 HP 官方安全补丁 PHCO_18120 (10.20) 或 PHCO_18121 (11.00)。临时缓解措施：设置环境变量 TMPDIR 指向用户私有的临时目录（如 $HOME/tmp），或限制本地非授信用户登录系统。"
score = 4.6
severity = "MEDIUM"
sources = ["cve"]
title = "HP-UX man 命令符号链接漏洞"
updated = "2026-06-16T21:51:47.947"

