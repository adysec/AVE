[basic]
description = "WWW 站点的 cgi-bin 目录下错误地部署了 Perl、sh、csh 等脚本解释器程序，而非普通 CGI 脚本。远程攻击者可通过 HTTP 请求直接访问并执行这些解释器，向其传递特制参数从而在目标 Web 服务器上执行任意命令。该漏洞影响所有将 shell 解释器置于 Web 可访问 cgi-bin 目录的站点，攻击条件仅为攻击者能向目标站点发起 HTTP 请求，无需身份认证，可导致服务器被完全控制、数据泄露或沦为跳板，危害等级极严重。"
published = "1996-05-29T04:00:00.000"
remediation = "立即从 Web 服务器 cgi-bin 目录中删除或移走 perl、sh、csh 等 shell 解释器脚本（如 perl、test-cgi 等），禁止将任何解释器置于可执行 CGI 路径下；在 Apache 等服务器配置中关闭不必要的 CGI 执行权限（如注释 ScriptAlias 或设置 Options -ExecCGI），并将 CGI 程序严格限制在受信任目录并仅保留必要的编译后二进制；同时升级 Web 服务器到已修复该默认配置的安全版本（如 Apache 1.3.27+/IIS 4.0 SP6a+），并以低权限专用账户运行 web 服务以减小危害。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
