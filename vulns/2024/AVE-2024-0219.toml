[basic]
description = "好视通（HSOT）视频会议系统存在任意文件读取漏洞，其 register 模块的 toDownload.do 接口未对用户传入的 fileName 参数进行充分校验与路径遍历防护，攻击者在无需身份认证的情况下，可通过构造包含 ../../ 序列的恶意请求读取服务器上的任意文件。该漏洞影响部署了好视通视频会议系统的相关版本，攻击条件为攻击者能够网络访问目标系统的 Web 服务端口（通常为 80/443）。利用方式为发送特制 GET 请求至 /register/toDownload.do?fileName=../../../../../../../../../../../../../../windows/win.ini，成功时响应内容会泄露目标系统敏感文件（如 Windows 的 win.ini），可能导致配置文件、用户凭证等敏感信息外泄，危害系统安全。"
published = "0726"
remediation = '立即联系好视通厂商获取并安装修复了该路径穿越漏洞（/register/toDownload.do 未对 fileName 参数做校验）的最新版本补丁。如无法立即升级，可在 Web 应用防火墙（WAF）上拦截包含 "../" 的 fileName 参数请求，并通过反向代理限制外部对 /register/toDownload.do 接口的访问；同时临时移除或重命名该下载接口，将会议系统部署在隔离内网，仅允许授权 IP 访问，并对服务器敏感文件（如 /etc/passwd、win.ini）设置严格的目录权限。'
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "好视通 视频会议系统 任意文件读取漏洞"
updated = "0726"

