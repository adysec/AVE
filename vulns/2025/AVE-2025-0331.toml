[basic]
description = "索贝内容管理系统（Sobey CMS）的 /search/full-search 接口存在信息泄露漏洞，未授权访问的远程攻击者可直接访问该接口获取系统内部敏感信息，包括用户数据、配置信息等。该漏洞利用方式简单，无需身份认证，攻击者通过构造特定 HTTP 请求即可触发，影响范围广泛，可能导致进一步的内网渗透攻击。建议相关用户尽快实施访问控制措施。"
published = "0730"
remediation = "立即对索贝内容管理系统的 /search/full-search 接口实施访问控制，通过 Web 服务器（如 Nginx/Apache）配置 IP 白名单或身份认证，限制仅授权用户可访问搜索功能。联系索贝官方技术支持（support@sobey.com）获取最新安全补丁版本，升级至修复了信息泄露漏洞的版本。临时缓解措施：在应用层对该接口添加输入过滤和输出脱敏，确保搜索结果不返回系统路径、配置信息或敏感数据；同时部署 WAF 规则拦截异常搜索请求（如包含 ../ 等目录遍历字符），并开启详细访问日志监控该接口调用情况。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "索贝内容管理系统 /search/full-search 信息泄露漏洞"
updated = "0730"

