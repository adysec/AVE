[basic]
description = "W3C XML 签名语法和处理 (XMLDsig) 规范设计缺陷，在 Oracle Application Server、BEA WebLogic、Mono 2.4.2.2 前版本、XML Security Library 1.2.12 前版本、IBM WebSphere 6.0-7.0、Sun JDK/JRE Update 14 及之前版本、Microsoft .NET Framework 3.0-4.0 等广泛产品中均未强制要求 HMAC 截断长度最小值。攻击者无需认证即可远程发送构造的 XML 签名请求，通过指定极短的 HMACOutputLength 参数（仅几比特）伪造 HMAC 签名，绕过身份验证并篡改数据完整性，CVSS 评分 5.0（中等危害）。"
published = "2009-07-14T23:30:00.187"
remediation = "建议立即升级受影响组件到修复版本：Mono 升级至 2.4.2.2 或更高版本；XML Security Library (xmlsec) 升级至 1.2.12 或更高版本；OpenOffice 升级至 3.2 或更高版本；Oracle Application Server 升级至 10.1.2.3/10.1.3.4/10.1.4.3IM 修补版本；WebLogic Server 升级至 10.3/10.0 MP1/9.2 MP3/9.1/9.0/8.1 SP6 对应补丁版本；IBM WebSphere Application Server 升级至 6.0.2.33/6.1.0.23/7.0.0.1 修补版本；Sun JDK/JRE 升级至 Update 15 或更高版本；Microsoft .NET Framework 3.0 SP2/3.5/4.0 安装微软官方安全补丁 (MS09-035)。缓解措施：在应用层配置强制要求 HMAC 截断长度不低于 80 位（HMAC-SHA1 建议 ≥128 位），拒绝接受截断长度过小的签名。若无法立即升级，可在 XML 签名验证层添加最小 HMACOutputLength 校验逻辑作为临时缓解。"
score = 5
severity = "MEDIUM"
sources = ["tenable"]
title = "Mono XML签名HMAC截断认证绕过漏洞"
updated = "2026-06-16T23:04:31.033"

