[basic]
description = "Cisco IOS 11.3 至 12.2 版本的 HTTP 配置服务器存在认证绕过漏洞。当设备启用本地授权（local authorization）时，远程攻击者无需有效凭据，只需在 URL 中指定高访问级别参数即可绕过身份验证机制，直接获取设备的完全管理权限。攻击者可利用该漏洞执行任意命令，完全控制目标路由器或交换机，导致网络基础设施被接管。该漏洞利用方式简单，仅需向目标设备的 HTTP 管理接口发送特制请求即可触发，危害极大。"
published = "2001-07-21T04:00:00.000"
remediation = "升级 Cisco IOS 至 12.2(4) 或更高版本，或禁用 HTTP 服务器（使用 `no ip http server` 命令），改用 HTTPS 并配置 AAA 认证。如必须使用 HTTP，在接口 ACL 中限制仅允许受信管理 IP 访问 80 端口。"
score = 9.3
severity = "CRITICAL"
sources = ["exploitdb"]
title = "Cisco IOS HTTP配置任意管理访问漏洞"
updated = "2026-06-16T21:54:29.157"

