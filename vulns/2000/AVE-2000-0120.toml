[basic]
description = "Check It Out 购物车应用存在不安全隐藏表单字段漏洞，远程攻击者无需身份认证即可直接修改 HTML 表单中的隐藏字段值（如商品价格、数量等敏感购买信息），导致任意修改订单金额或欺诈交易。该漏洞影响 Check It Out 购物车系统，利用方式简单，仅需向目标服务器发送经篡改的 HTTP 请求即可实施攻击，CVSS 评分 7.5，危害等级高。"
published = "2000-02-01T05:00:00.000"
remediation = "对订单金额、商品价格等敏感数据应在服务器端重新计算并校验，禁止信任来自隐藏表单字段的客户端输入。同时对所有提交数据进行完整性校验（如 HMAC 签名），防止中间人篡改。如厂商已停止维护，建议迁移至支持服务端验证的购物车系统（如 Magento、WooCommerce）。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "Check It Out 购物车隐藏表单域敏感信息修改漏洞"
updated = "2026-06-16T21:51:04.273"

