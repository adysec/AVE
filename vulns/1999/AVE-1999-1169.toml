[basic]
description = "Motorola CableRouter 宽带路由器在端口 1024 上开放了未授权的管理与配置服务，任何能够访问该端口的远程用户均可直接连接并对路由器进行配置操作，无需身份认证。攻击者可利用此缺陷远程查看或修改路由器配置，甚至更改网络设置、获取管理员权限，进而控制内网流量或造成网络中断。该漏洞影响运行相关固件的 Motorola CableRouter 设备，攻击条件为攻击者能与目标设备 1024 端口建立网络连通。利用方式简单，仅需向该端口发起连接并使用其配置协议即可完成未授权操作，CVSS 评分高达 10.0，危害等级严重。"
published = "1998-05-10T04:00:00.000"
remediation = "建议立即升级 Motorola CableRouter 固件至最新版本（如官方仍提供补丁），或在防火墙层面封禁 TCP 端口 1024 的所有外部访问。若无法升级固件，请在路由器管理界面禁用远程管理功能，并将管理界面访问限制为仅信任的内网 IP 地址段访问。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "摩托罗拉 CableRouter 端口 1024 远程未授权配置访问漏洞"
updated = "2026-06-16T21:49:07.060"

