[basic]
description = "Livingston Portmaster系列路由器运行的ComOS操作系统在建立TCP连接时使用相同的初始序列号（ISN），导致攻击者能够预测TCP序列号，从而实施会话劫持和欺骗攻击，获取未授权的网络访问权限。"
published = "1998-06-30"
remediation = "升级ComOS到修复ISN随机化缺陷的最新版本，或部署防火墙规则限制对路由器管理端口的未授权访问，并启用TCP序列号随机化功能。"
score = 7.5
severity = "HIGH"
sources = [
    "cve",
    "avd",
]
title = "Livingston Portmaster路由器ComOS TCP初始序列号可预测漏洞"
updated = "2026-06-16"

