[basic]
description = "BSD libutil 库中的 pw_error 函数存在格式化字符串漏洞，本地攻击者可通过在 chpass 或 passwd 等命令中提交特制的畸形密码字符串触发该漏洞，导致以 root 权限执行任意代码。该漏洞影响多个 BSD 系统版本，CVSS 评分 7.2，危害等级高。攻击者需具备本地系统访问权限，利用难度较低。"
published = "2000-12-19T05:00:00.000"
remediation = "安装对应 BSD 发行版的安全补丁：OpenBSD 2.7 用户需应用 pw_error 格式字符串漏洞补丁或升级至 2.8 及以上版本；FreeBSD 用户安装 FreeBSD-SA-00:58 补丁；NetBSD 用户安装 NetBSD-SA2000-015 补丁。临时缓解措施：移除 chpass、passwd 等调用 pw_error 函数的 setuid 位（chmod u-s /usr/bin/chpass /usr/bin/passwd），但此操作将影响普通用户修改密码的正常功能。根本修复方案是在 libutil 库的 pw_error 函数中，将所有直接传递用户可控字符串给 printf 风格格式化输出的调用（如 syslog、vwarn）改为使用 %s 格式化占位符，防止格式字符串注入。"
score = 7.2
severity = "HIGH"
sources = ["exploitdb"]
title = "BSD libutil 库 pw_error 函数本地格式化字符串权限提升漏洞"
updated = "2026-06-16T21:52:55.813"

