[basic]
description = "Netsweeper Client Filter Admin 门户存在认证绕过漏洞（CWE-287），远程攻击者无需任何凭证，通过向默认 URL 发送特制的 showdeny 动作请求即可绕过身份验证，进而创建任意过滤规则配置文件，完全控制内容过滤策略。该漏洞影响 Netsweeper 3.1.10 之前版本、4.0.x 系列至 4.0.9 之前版本及 4.1.x 系列至 4.1.2 之前版本，CVSS 评分 9.8，危害等级严重。厂商已在后续版本中修复此漏洞。"
published = "2017-09-19T15:29:00.460"
remediation = "升级 Netsweeper 至 3.1.10、4.0.9 或 4.1.2 及以上版本。如无法立即升级，在 Web 服务器（如 Apache/Nginx）或 WAF 层面添加规则，拦截对 `/webadmin/client-filter-admin/` 路径的 `showdeny` 动作请求，并限制管理后台仅允许可信 IP 访问。"
score = 9.8
severity = "CRITICAL"
sources = ["nuclei"]
title = "Netsweeper Web Filter 认证绕过漏洞"
updated = "2026-06-17T00:18:39.343"

