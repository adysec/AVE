[basic]
description = "ColdFusion Server 4.0 中的示例可运行代码片段存在安全漏洞，远程攻击者无需身份认证即可利用这些示例文件读取服务器上的任意文件、发起拒绝服务攻击，或将服务器作为 HTTP 代理转发请求。该漏洞影响 Adobe ColdFusion Server 4.0 版本，CVSS 评分 7.5，危害等级高。建议删除生产环境中的示例代码目录或升级至不受影响的版本。"
published = "2001-03-12T05:00:00.000"
remediation = "升级 ColdFusion Server 至 4.0.1 或更高版本，该版本已修复可执行代码片段泄露问题。同时限制对 /cfide/ 目录的访问，在 Web 服务器层（如 IIS、Apache）配置访问控制规则，禁止外部直接访问示例脚本目录。当前建议迁移至 Adobe ColdFusion 2023 或 2021 长期支持版本，并持续安装官方安全更新。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "Allaire ColdFusion Server 4.0 示例代码远程文件读取与拒绝服务漏洞"
updated = "2026-06-16T21:49:20.250"

