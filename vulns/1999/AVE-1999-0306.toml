[basic]
description = "SGI IRIX（UNICOS）系统中 Array Services 守护进程（arrayd）的默认配置禁用了身份认证机制。未经身份验证的远程攻击者可以连接到目标系统的 arrayd 服务，利用该认证缺陷获取系统 root 权限，从而完全控制受影响的主机。该漏洞影响运行 Array Services 的 SGI IRIX/UNICOS 系统，攻击者无需任何凭据即可在远程执行特权操作，危害等级严重，CVSS 评分为 10.0。SGI 已在 1999 年 7 月的安全公告中发布修复补丁，建议管理员立即升级 arrayd 并启用身份认证配置。"
published = "1999-07-19T04:00:00.000"
remediation = "建议将 Array Services daemon (arrayd) 的认证机制配置为 AUTHENTICATION NOREMOTE 或启用 PRIVATE_NETWORK 认证，编辑 /usr/lib/array/arrayd.auth 配置文件启用身份验证，禁止默认无认证配置。同时升级 SGI IRIX/UNICOS 至厂商提供的修复版本，并通过防火墙限制 arrayd 服务端口（默认 5434/tcp）仅对可信主机开放。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "Silicon Graphics IRIX Array Services daemon 认证绕过远程权限提升漏洞"
updated = "2026-06-16T21:48:51.550"

