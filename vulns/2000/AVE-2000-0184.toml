[basic]
description = "Lynx 2.x 浏览器存在缓冲区溢出漏洞，远程攻击者可通过构造包含超长 URL 的恶意网页，诱使用户访问后触发缓冲区溢出，导致 Lynx 崩溃，并可能利用该漏洞在目标系统上执行任意命令。攻击条件为受害者使用 Lynx 浏览器访问攻击者控制的恶意页面。"
published = "2000-02-27"
remediation = "升级 Lynx 浏览器至 2.8.5 或更高版本，避免访问不可信来源的超长 URL 链接，或使用其他更安全的浏览器替代。"
score = 7.6
severity = "HIGH"
sources = ["cve"]
title = "Lynx 浏览器缓冲区溢出漏洞"
