[basic]
description = "LBNL traceroute 1.4a5 及更早版本的 savestr 函数中存在堆溢出漏洞。本地攻击者可通过向 traceroute 程序的 -g 选项传递特制的参数触发堆缓冲区溢出，从而覆盖内存中的关键数据，导致任意代码执行。该漏洞影响 LBNL traceroute 1.4a5 及之前版本，CVSS 评分 7.2，危害等级高。攻击者需拥有本地系统访问权限，无需身份认证即可利用，可完全控制受影响的系统。"
published = "2000-12-19T05:00:00.000"
remediation = "建议升级 LBNL traceroute 至 1.4a5 之后的版本，或安装各发行版提供的安全更新：Debian 用户安装 traceroute 更新包，Red Hat 用户应用 RHSA-2000-078 补丁，Caldera 用户安装 CSSA-2000-034 更新。如无法升级，可移除 traceroute 的 SUID 位（chmod u-s /usr/sbin/traceroute）作为临时缓解措施。"
score = 7.2
severity = "HIGH"
sources = ["redhat"]
title = "LBNL Traceroute 堆溢出本地权限提升漏洞"
updated = "2026-06-16T21:52:50.113"

