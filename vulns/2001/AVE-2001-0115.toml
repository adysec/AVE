[basic]
description = "BadBlue Personal Edition 1.02.07 的 ext.dll 组件存在缓冲区溢出漏洞，远程攻击者可通过向目标 Web 服务器发送特制的超长 HTTP GET 请求触发该漏洞，导致服务崩溃引发拒绝服务，在特定条件下可能造成远程代码执行。该漏洞影响 BadBlue 1.02.07 Personal Edition 版本，CVSS 评分 10.0，危害等级严重。"
published = "2001-05-03T04:00:00.000"
remediation = "升级 BadBlue 至 1.02.8 或更高版本（厂商已在该版本中修复 ext.dll 缓冲区溢出问题）；如无法升级，在 Web 服务器前端防火墙或反向代理中拦截对 /ext.dll 路径的 HTTP GET 请求，限制超长 URI 的传入。该产品已停止维护，建议迁移至活跃维护的 Web 服务器软件。"
score = 10
severity = "CRITICAL"
sources = ["exploitdb"]
title = "Working Resources BadBlue 1.02.07 缓冲区溢出远程代码执行漏洞"
updated = "2026-06-16T21:54:00.830"

