[basic]
description = "Cactus Software Shell Lock 的 shell-lock 组件在处理临时文件时存在不安全的符号链接跟随漏洞。本地攻击者可通过在目标系统上创建恶意符号链接，诱使 shell-lock 在解码受保护的 shell 脚本文件时，将内容写入或读取攻击者指定的任意文件，从而在脚本执行前窃取或篡改其中的敏感信息。该漏洞需要攻击者拥有本地系统访问权限，CVSS 评分 7.2，危害等级高危。"
published = "1999-10-04T04:00:00.000"
remediation = "该产品已停止维护且无官方补丁。建议立即停止使用 Cactus Software Shell Lock，改用支持安全临时文件处理的替代工具（如 shc 或加密编译方案）。如必须继续使用，应在受控目录执行 shell-lock，并定期清理 /tmp 下可疑符号链接文件。此外，可配置系统级 umask 077 并启用 tmpfiles.d 定时清理机制作为临时缓解。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "Cactus Software Shell Lock 本地临时文件符号链接漏洞"
updated = "2026-06-16T21:50:40.697"

