[basic]
description = "GNU gzip 工具包中的 gzexe 脚本在处理临时文件时存在符号链接漏洞。本地攻击者可通过在临时文件创建前建立指向其他用户文件的符号链接，诱导 gzexe 以当前用户权限覆写目标文件，导致受影响系统上的非特权用户可破坏其他用户的数据完整性。该漏洞影响 Red Hat Linux 5.0 及更早版本，CVSS 评分 2.1，危害等级低，需拥有本地系统访问权限方可利用。"
published = "1999-12-31T05:00:00.000"
remediation = "升级 gzip 包至修复版本：Red Hat Linux 用户安装 RH 5.0 errata 中提供的 gzip 更新包；Debian 用户应用 DSA-308 安全更新。如无法升级，避免使用 gzexe 命令处理不可信文件，或限制本地用户对 /tmp 目录的写权限作为临时缓解措施。"
score = 2.1
severity = "LOW"
sources = ["avd"]
title = "GNU gzip gzexe 临时文件符号链接漏洞"
updated = "2026-06-16T21:50:12.877"

