[basic]
description = "Intel Shiva Access Manager 5.0 在配置使用 LDAP 目录存储认证信息时，将 LDAP 根 DN 名称及密码以明文形式写入系统文件，且该文件权限设置为全局可读。本地攻击者可通过读取该文件获取 LDAP 管理员凭据，进而控制 LDAP 服务器，导致敏感信息泄露。该漏洞影响 Solaris 平台上的 Shiva Access Manager 5.0.0 版本，CVSS 评分 7.2，危害等级高。"
published = "2000-06-06T04:00:00.000"
remediation = "升级 Shiva Access Manager 至 5.0.1 及以上版本。如无法升级，立即执行 chmod 600 限制配置文件的全局可读权限，并将 LDAP 根 DN 密码移至加密存储或使用 Solaris 安全策略守护进程管理凭据。"
score = 7.2
severity = "HIGH"
sources = ["cve"]
title = "Intel Shiva Access Manager 5.0 LDAP 明文密码信息泄露漏洞"
updated = "2026-06-16T21:51:54.187"

