[basic]
description = "ETL Delegate 代理应用 5.9.x 及 6.0.x 版本存在远程缓冲区溢出漏洞。攻击者可通过向目标代理服务发送特制请求触发缓冲区溢出，导致远程代码执行。该漏洞影响 Delegate 代理软件，CVSS 评分 7.5，危害等级高危。由于 Delegate 作为应用层代理处理网络数据，无需身份认证即可远程触发，攻击者可利用该漏洞完全控制目标系统。"
published = "1999-11-13T05:00:00.000"
remediation = "建议升级至 Delegate 7.0 及以上版本，该版本修复了代理组件中的多个缓冲区溢出漏洞。如无法升级，可在防火墙层面限制仅允许可信 IP 访问 Delegate 服务端口（默认 8080），并禁用不必要的代理协议功能作为临时缓解措施。"
score = 7.5
severity = "HIGH"
sources = ["exploitdb"]
title = "ETL Delegate 远程缓冲区溢出漏洞"
updated = "2026-06-16T21:51:08.143"

