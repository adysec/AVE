[basic]
description = "MediaHouse Software Statistics Server 4.28 和 5.1 版本中存在缓冲区溢出漏洞，远程攻击者可通过向 Server ID 字段发送特制数据触发缓冲区溢出，进而导致拒绝服务或远程执行任意命令。攻击无需身份认证，仅需网络访问即可利用。"
published = "1999-09-30"
remediation = "该产品已停止维护，建议立即停用 MediaHouse Statistics Server，迁移至受支持的替代统计服务软件。如无法立即替换，应在防火墙层面限制对该服务端口的网络访问，仅允许可信 IP 连接。"
score = 5.0
severity = "MEDIUM"
