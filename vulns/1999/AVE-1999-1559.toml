[basic]
description = "IBM AIX 3.2.5 及更早版本中，当 XDM 环境下运行 dpsexec（DPS Server）时，存在权限检查不严的安全漏洞。本地攻击者可利用该程序未正确校验权限的缺陷，通过构造特制请求覆盖系统任意文件，进而实现权限提升。该漏洞影响 AIX 3.x 系列操作系统，CVSS 评分 7.2，危害等级高。攻击者需具备本地系统访问权限，无需远程网络连接即可触发。"
published = "1994-07-20T04:00:00.000"
remediation = "升级 IBM AIX 至 4.0 或更高版本。如无法升级，立即移除 dpsexec 可执行文件的 setuid 位（chmod u-s /usr/bin/dpsexec），并将 XDM 的未授权用户执行权限收窄至仅允许受信用户组访问，同时监控本地用户对 dpsexec 的调用日志。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "IBM AIX dpsexec 任意文件写入漏洞"
updated = "2026-06-16T21:50:42.100"

