[basic]
description = "PHP 3 和 4 版本的文件上传功能存在任意文件读取漏洞，远程攻击者可通过构造隐藏表单字段，使其名称与 PHP 内部脚本变量名匹配，从而绕过访问控制读取服务器任意文件。该漏洞影响 PHP 3.x 和 4.x 版本，CVSS 评分 5.0（中等危害），攻击向量为网络，攻击复杂度低，无需身份认证，仅影响机密性。攻击者可通过构造包含特定变量名的表单提交，利用 PHP 处理文件上传时对内部变量处理不当的缺陷，读取服务器上任意可读文件内容，导致敏感信息泄露。PHP 官方已在后续版本中修复此漏洞，建议升级至修复版本。"
published = "2000-11-14T05:00:00.000"
remediation = "立即升级 PHP 至 8.3 或更高版本（PHP 3/4 已停止维护 20 余年），或至少升级至 PHP 4.0.3 及以上修复版本；若无法升级，在 php.ini 中设置 file_uploads = Off 禁用文件上传功能，并设置 register_globals = Off 关闭全局变量注册作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "PHP PHP 3/4 任意文件读取漏洞"
updated = "2026-06-16T21:52:37.143"

