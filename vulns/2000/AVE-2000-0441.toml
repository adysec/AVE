[basic]
description = "Linux gpm 程序在处理 /dev/gpmctl 设备时存在缺陷，本地攻击者可通过向该设备发送大量 STREAM 套接字连接导致系统拒绝服务。该漏洞影响 OpenLinux 2.3/2.4、RedHat 6.0/6.1 及 SCO eServer 2.3 等版本，CVSS 评分 2.1，危害等级低。攻击者需拥有本地用户权限，通过资源耗尽方式使 gpm 服务崩溃。"
published = "1999-11-23T05:00:00.000"
remediation = "升级 gpm 至 1.19.3 或更高版本；如无法升级，通过 chmod 600 /dev/gpmctl 限制本地非 root 用户对该设备的访问权限，或在不需要鼠标终端支持的场景下直接卸载 gpm 软件包以消除攻击面。"
score = 2.1
severity = "LOW"
sources = ["exploitdb"]
title = "Linux gpm 本地拒绝服务漏洞"
updated = "2026-06-16T21:51:56.170"

