[basic]
description = "QMS CrownNet Unix Utilities for 2060 存在严重身份认证绕过漏洞，系统默认允许 root 用户无需密码即可直接登录，攻击者可通过 telnet 或 rlogin 等远程访问服务利用该漏洞获取目标系统的超级用户权限。该漏洞影响 QMS CrownNet 2060 系列设备，CVSS 评分 10.0，危害等级严重，攻击复杂度低且无需认证，可导致设备完全受控。"
published = "1999-08-19T04:00:00.000"
remediation = "建议立即升级 QMS CrownNet Unix Utilities 至修复版本（需联系 QMS 获取补丁），或在 /etc/securetty 中禁止 root 远程登录，同时配置 PAM 认证强制要求密码验证。若设备已停止维护，请部署网络隔离并限制 515 端口仅允许受信 IP 访问。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "QMS CrownNet Unix 认证绕过漏洞"
updated = "2026-06-16T21:48:57.630"

