[basic]
description = "Windows NT 注册表审核策略存在缺陷，系统未能对安全关键注册表键的访问和修改操作记录成功或失败事件日志。本地攻击者可通过修改注册表敏感项绕过安全审计，实施权限提升或系统配置篡改等攻击，且相关操作不会被系统日志记录。该漏洞影响 Windows NT 系列操作系统，CVSS 评分 4.6，危害等级中危。"
published = "1999-01-01T05:00:00.000"
remediation = '通过注册表编辑器 (regedt32.exe) 对安全关键注册表项（如 HKLM\SAM、HKLM\SECURITY、HKLM\Software\Microsoft\Windows NT\CurrentVersion）启用审核，设置 "审核策略" 中的 "审核对象访问" 为 "成功和失败"。同时使用 Windows NT 资源包中的 auditpol.exe 工具确认审核策略已生效。Windows NT 已停止支持，建议升级至 Windows Server 2008/2012/2019/2022 等受支持版本以获得完整安全审计能力。'
score = 4.6
severity = "MEDIUM"
sources = ["avd"]
title = "Microsoft Windows NT 注册表审核策略日志遗漏漏洞"
updated = "2026-06-16T21:48:40.117"

