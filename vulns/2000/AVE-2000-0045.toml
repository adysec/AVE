[basic]
description = "Red Hat usermode 软件包中的 userhelper 程序存在路径遍历漏洞。本地攻击者可通过在 PAM 认证过程中利用 `..`（点点）目录跳转技术绕过路径限制，导致获取 root 权限。该漏洞影响 Mandrake 6.x、RedHat 6.x、Turbolinux 3.5 b2/4.x/6.0.2 等多个 Linux 发行版，CVSS 评分 7.2，危害等级高。攻击者需拥有本地系统访问权限方可利用。"
published = "2000-01-04T05:00:00.000"
remediation = "升级 usermode 软件包至 1.11 或更高版本，该版本修复了 userhelper 对 PAM 配置路径的 .. 目录穿越检查。如无法升级，移除 userhelper 的 setuid 位（chmod u-s /usr/sbin/userhelper）作为临时缓解措施。"
score = 7.2
severity = "HIGH"
sources = ["exploitdb"]
title = "RedHat/Mandrake/Turbolinux userhelper PAM 路径遍历本地权限提升漏洞"
updated = "2026-06-16T21:50:54.140"

