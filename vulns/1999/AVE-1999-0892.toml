[basic]
description = "Windows NT 和 Windows 2000 系统默认安装的 finger 服务存在信息泄露漏洞。finger 协议设计上未对请求来源进行任何认证或限制，允许网络上的任何攻击者向目标主机的 finger 服务（默认端口 79）发送查询请求，从而获取系统上有效的用户名列表及其他用户账户信息。攻击者可利用收集到的有效用户名进行后续的口令猜测、暴力破解或社会工程学攻击，进一步威胁系统安全。该漏洞影响 Windows NT 4.0 及 Windows 2000 等版本。"
published = "1997-03-01T05:00:00.000"
remediation = '停止 Finger 服务（运行 services.msc，找到 "Finger Service" 设置为禁用），并在防火墙层面屏蔽 TCP 端口 79 以阻止外部访问。如需使用 finger 功能，应升级到不再内置该服务的 Windows XP 或更高版本。'
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Microsoft Windows NT/2000 Finger 服务信息泄露漏洞"
updated = "2026-06-16T21:48:44.177"

