[basic]
description = "Windows NT 系统的 HKEY_CLASSES_ROOT 注册表根键被配置了不恰当的、涉及系统关键的访问权限。该注册表项存放着文件类型关联、COM 组件及 OLE 对象等关键系统配置，正常应仅允许管理员修改。由于权限设置过于宽松，本地已登录的普通用户或低权限用户可对该项及其子项进行写入、修改甚至删除操作。攻击者在具备本地登录权限的条件下，可通过 regedit 等工具或调用注册表 API 篡改关联的程序路径或 COM 对象，进而实现权限提升、持久化驻留或破坏系统稳定性，影响所有受此错误权限配置影响的 Windows NT 系统。"
published = "1999-01-01T05:00:00.000"
remediation = '重置 HKEY_CLASSES_ROOT 注册表项的访问控制列表为默认权限：仅 Administrators 组和 SYSTEM 账户拥有完全控制权限，Users 组和 Everyone 仅保留读取权限。可使用 regini.exe 工具通过注册表配置文件批量修复，命令为：regini fix_hkcr_perms.txt，其中配置文件内容为 \HKEY_CLASSES_ROOT 1 [administrators 全控] [system 全控] [users 读取] [everyone 读取]。若无法立即修复，可将注册表项权限导出备份后通过 regedit 手动修改，并在防火墙和组策略中限制对注册表的远程访问。建议升级到受支持的 Windows 版本以彻底消除此漏洞。'
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "微软 Windows NT 注册表 HKEY_CLASSES_ROOT 权限配置不当漏洞"
updated = "2026-06-16T21:48:40.473"

