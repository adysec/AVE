[basic]
description = "Pine 4.x 邮件客户端存在远程代码执行漏洞，攻击者可通过构造恶意 Web 服务器上的 index.html 文件，诱导目标用户使用 Pine 内置的 lynx 浏览器访问该文件，从而以 uudecode 方式下载并执行恶意代码，导致系统被完全控制。该漏洞影响 Pine 4.x 系列版本，CVSS 评分 10.0，危害等级严重。"
published = "1999-06-28T04:00:00.000"
remediation = "升级 Pine 至 4.21 或更高版本，该版本已修复通过 index.html 自动调用 lynx 下载并执行恶意文件的缺陷。若无法升级，建议禁用 Pine 对 HTML 邮件或附件的自动处理功能，且不要使用 Pine 打开来自不可信来源的 HTML 附件。长期缓解措施建议迁移至 Alpine（Pine 的现代维护分支）。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "华盛顿大学 Pine 远程代码执行漏洞"
updated = "2026-06-16T21:51:32.433"

