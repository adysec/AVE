[basic]
description = "Symantec pcAnywhere 9.x 默认使用弱加密算法对网络通信进行加密，远程攻击者无需认证即可通过嗅探网络流量捕获加密数据包，并利用弱加密的缺陷解密数据包内容，从而窃取 pcAnywhere 或 NT 域账户的明文凭据。该漏洞影响 pcAnywhere 9.0 及 9.x 系列版本，CVSS 评分 10.0，危害等级严重，攻击者获取凭据后可进一步控制目标系统。"
published = "2000-04-06T04:00:00.000"
remediation = "升级到 Symantec pcAnywhere 12.5 或更高版本，启用强制 256 位 AES 加密。如无法升级，在连接设置中禁用默认弱加密并启用 SSL 加密。同时在防火墙层面限制仅允许受信 IP 访问 5631/TCP 和 5632/UDP 端口。"
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "Symantec pcAnywhere 弱加密漏洞"
updated = "2026-06-16T21:51:25.770"

