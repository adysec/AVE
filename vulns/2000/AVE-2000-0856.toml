[basic]
description = "Caldera Linux 系统中的 smail 邮件程序存在 debug 选项命令注入漏洞，远程攻击者可通过向 rmail 命令的 -D 参数传递包含 shell 元字符的特制字符串，在目标系统上以 smail 进程权限执行任意命令。该漏洞影响 Caldera OpenLinux 等版本，CVSS 评分 10.0，危害等级严重。攻击者无需身份认证即可远程利用，且无需用户交互，完全控制受影响系统。"
published = "1999-01-29T05:00:00.000"
remediation = "立即升级 smail 至 3.2 以上版本，该版本已修复 -D 选项的 shell 元字符注入漏洞。如无法升级，在 smail 配置中禁用 debug 模式（设置 debug_options=no），并在 rmail 命令调用前对 -D 参数进行严格过滤，移除 `;&|` 等 shell 特殊字符。长期建议迁移至 Postfix 或 Exim 等现代 MTA。"
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "Caldera Linux smail 远程代码执行漏洞"
updated = "2026-06-16T21:51:34.520"

