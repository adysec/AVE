[basic]
description = "ntop 是一款网络流量监控工具，其 Web 模式存在缓冲区溢出漏洞。远程攻击者无需身份认证即可向运行 ntop 1.2 a7‑9 及 1.3.1 版本的目标服务器发送特制的 HTTP 请求，触发缓冲区溢出，进而导致任意命令执行。该漏洞危害严重，可导致服务器被完全控制。"
published = "2000-10-20T04:00:00.000"
remediation = "立即升级 ntop 至 1.3.1 以上版本，该版本修复了 Web 模式下的缓冲区溢出漏洞。FreeBSD 用户应安装 FreeBSD-SA-00:36 安全公告中的补丁，Debian 用户应更新至 2000-08-30 安全公告中提供的修复版本。如无法升级，建议在防火墙层面限制对 ntop Web 端口的访问，仅允许可信 IP 连接。"
score = 10
severity = "CRITICAL"
sources = ["exploitdb"]
title = "Luca Deri ntop 远程缓冲区溢出漏洞"
updated = "2026-06-16T21:52:18.627"

