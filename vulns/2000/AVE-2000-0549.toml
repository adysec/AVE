[basic]
description = "Minicom 1.82.1 及更早版本存在符号链接攻击漏洞。minicom 在处理 Capture（捕获）文件功能时，未对文件路径进行充分验证，本地攻击者可通过预先创建符号链接指向目标系统文件，诱使以 uucp 用户权限运行的 minicom 进程向任意文件写入数据。攻击者利用此漏洞可在受影响系统上创建或覆盖任意文件，进而实现本地权限提升或破坏系统完整性。该漏洞攻击复杂度较低，但需要攻击者拥有本地访问权限。"
published = "2000-10-20"
remediation = "升级 Minicom 至 1.83.1 或更高版本，该版本修复了 capture 文件功能中的符号链接问题。如无法升级，应避免在多用户环境中使用 minicom 的 -C 参数指定捕获文件，或限制 uucp 组的文件写入权限。"
score = 5.0
severity = "MEDIUM"
sources = ["cve"]
title = "Minicom 捕获文件符号链接攻击本地提权漏洞"
updated = "2026-06-16"

