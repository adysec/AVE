[basic]
description = "Linux 内核 BPF（Berkeley Packet Filter）子系统中存在程序递归调用漏洞。当 BPF 程序作为原始跟踪点附加到 contention_begin 跟踪点时，程序内部调用 bpf_trace_printk 辅助函数会再次触发同一跟踪点，导致无限递归，进而引发内核警告、锁竞争加剧及栈溢出风险。本地攻击者需具备 BPF 程序加载权限（通常需 root 权限）来触发该漏洞，可导致系统拒绝服务。Linux 内核社区已通过引入 BPF 程序 active 字段标志位，在程序已运行时跳过执行以避免递归，从而修复此漏洞。"
published = "2025-05-01T15:15:59.170"
remediation = '建议立即将 Linux 内核升级至 6.1 及以上版本（该漏洞在 6.1-rc1 中修复，commit 为内核 BPF 子系统的 "Prevent bpf program recursion for raw tracepoint probes" 补丁），或向后移植该补丁到所使用的 LTS 内核分支。如无法立即升级，应避免将调用 bpf_trace_printk 等可能触发锁机制的 BPF 程序附加到 contention_begin 等原始跟踪探针上，作为临时缓解措施。'
score = 5.5
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux 内核 BPF 原始追踪探针程序递归拒绝服务漏洞"
updated = "2026-06-17T05:19:05.513"

