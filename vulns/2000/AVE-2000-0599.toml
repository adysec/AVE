[basic]
description = "Network Associates Net Tools PKI Server 存在访问控制绕过漏洞。当 XUDA 模板文件中未为其他资源文件使用绝对路径名时，服务器无法正确限制远程访问权限，导致未经认证的攻击者可通过网络远程发送特制请求绕过访问控制机制，实现对服务器上受保护资源的未授权访问或篡改。该漏洞影响 Net Tools PKI 系列产品，CVSS 评分 5.0，危害等级中危。厂商 TIS 已发布安全热修复补丁，建议用户升级至修复版本。"
published = "2000-06-19T04:00:00.000"
remediation = "立即从 TIS 官方 FTP 下载并安装 Net Tools PKI Server 热修复补丁 (hotfix.txt)，该补丁修复了 XUDA 模板文件未使用绝对路径名导致的访问控制缺陷。同时，手动检查所有 XUDA 模板文件，确保其中引用的路径均使用绝对路径而非相对路径，防止远程攻击者通过路径遍历绕过访问限制。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Net Tools PKI服务器访问控制漏洞"
updated = "2026-06-16T21:51:55.743"

