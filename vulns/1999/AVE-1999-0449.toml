[basic]
description = "Novell NetWare 3.12 操作系统存在输入验证漏洞（CWE-20），未经身份认证的远程攻击者可通过向目标系统发送特制的 ICMP 重定向报文触发该漏洞，导致目标主机崩溃或死锁，造成拒绝服务。该漏洞影响 Novell NetWare 3.12 版本，CVSS 评分 5.0，危害等级中等。建议用户升级至最新版本或安装相应安全补丁以修复此漏洞。"
published = "1997-01-01T05:00:00.000"
remediation = "安装 Novell 官方针对 ICMP 重定向处理的补丁程序（如 NetWare 3.12 补丁包 PTF312），或在边界路由器/防火墙上配置 ACL 策略过滤入站 ICMP 重定向报文（type 5），禁用不必要的 ICMP 重定向功能。对于仍运行 NetWare 3.12 的环境，建议升级至受支持版本的 Novell Open Enterprise Server 或迁移至现代服务器操作系统以彻底修复。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Novell NetWare 3.12 ICMP Redirect Message 拒绝服务漏洞"
updated = "2026-06-16T21:48:01.977"

