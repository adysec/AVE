[basic]
description = "SGI IRIX 操作系统中的 InPerson 图形会议软件包含一个危险的信任漏洞。其组件 inpview 在查找并执行 ttsession 程序时，信任 PATH 环境变量而非使用绝对路径。本地攻击者可通过修改 PATH 环境变量指向恶意构造的特洛伊木马程序，当具有特权身份的进程调用 inpview 时即会加载恶意程序，从而获得 root 权限。该漏洞影响 IRIX 5.3 至 6.5.10 版本，CVSS 评分 7.2，危害等级高。"
published = "1997-05-07T04:00:00.000"
remediation = "升级 SGI IRIX 至 6.5.11 或更高版本，该版本已修复 inpview 对 PATH 环境变量的不安全信任。如无法升级，移除 inpview 的 setuid 权限（chmod u-s /usr/sbin/inpview），并确保 ttsession 仅位于受保护的系统目录（如 /usr/bin）且不可被普通用户写入。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "SGI IRIX InPerson inpview 本地权限提升漏洞"
updated = "2026-06-16T21:50:29.400"

