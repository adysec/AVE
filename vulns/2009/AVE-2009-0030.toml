[basic]
description = "Samba SMB 文件共享服务在解析用户主目录路径时存在路径解析错误处理缺陷，当 /etc/passwd 中用户配置为空主目录时，Samba 未能正确处理路径解析错误，导致远程已认证用户可绕过预期的共享访问限制，访问、创建或修改文件系统根目录下的文件。该漏洞影响 Samba 3.0.12-3.0.36、3.2.x（<3.2.15）、3.3.x（<3.3.8）、3.4.x（<3.4.2）版本，波及启用 Windows 文件共享的 Apple Mac OS X 10.5.8、Fedora 11 等操作系统。攻击条件为：攻击者需拥有有效 SMB 认证凭据，且目标系统存在配置错误的空主目录用户账户。攻击者可通过建立认证 SMB 会话并连接该用户的主目录共享，利用路径解析缺陷逃逸至文件系统根目录，实现越权文件读写。CVSS 6.0（中等），攻击向量网络、攻击复杂度中等、需认证、机密性/完整性/可用性部分影响。Samba 官方已在 3.0.37、3.2.15、3.3.8、3.4.2 版本修复该路径解析逻辑缺陷。"
published = "2009-09-14T16:30:00.453"
remediation = "立即升级 Samba 到安全版本：Red Hat Enterprise Linux 用户升级到 Samba 4.17 或更高版本；Debian/Ubuntu 用户升级到 Samba 4.15 或更高版本；在/etc/samba/smb.conf 中禁用 unsafe paths 和 malicious client操作；删除或重新配置'/etc/passwd' 中 home 目录为空的用户账户；在防火墙上限制 SMB 服务仅监听特定 IP 地址；使用现代认证机制（如 krb5）替代传统认证方式。"
score = 6
severity = "MEDIUM"
sources = ["tenable"]
title = "Apple Mac OS X SMB 共享权限绕过漏洞"
updated = "2026-06-16T23:10:16.370"

