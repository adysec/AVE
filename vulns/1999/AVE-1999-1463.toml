[basic]
description = "Linux 系统 rcp 命令存在文件权限处理漏洞。当用户 UID 为 65535（即 nobody 用户）时，系统调用 chown 将该值解释为 -1 导致文件所有权修改失败，从而使低权限的 nobody 用户能够覆写任意系统文件。攻击者只需获取 nobody 账户权限即可利用此漏洞，影响 Red Hat 4.0 等早期 Linux 发行版，可导致系统文件被恶意篡改，危害严重。"
published = "1997-02-03T05:00:00.000"
remediation = "立即停止使用 rcp 命令，改用 scp 或 rsync 替代。将系统升级至 Red Hat 5.0 及以上版本，修复 UID 65535 被错误解析为 -1 的内核缺陷。如无法升级，移除 rcp 的 setuid 权限：chmod -s /usr/bin/rcp，并限制可执行 rcp 的用户组。"
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "Linux rcp 任意文件写入漏洞"
updated = "2026-06-16T21:50:08.643"

