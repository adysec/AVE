[basic]
description = "ProFTPD 1.3.5 的 mod_copy 模块存在未授权任意文件读写漏洞。该模块提供的 SITE CPFR 和 SITE CPTO 命令未对用户身份进行有效验证，导致未经认证的远程攻击者可通过 FTP 协议直接向目标服务器发送特制的 SITE CPFR 和 SITE CPTO 命令，实现任意文件复制操作。攻击者可将恶意文件（如 Web Shell、SSH 公钥）写入目标服务器任意目录，或读取敏感配置文件，进而获取服务器完全控制权。该漏洞影响所有运行 ProFTPD 1.3.5 且启用了 mod_copy 模块的服务器，CVSS 评分 10.0，危害等级为严重。"
published = "2015-05-18T15:59:10.743"
remediation = "立即升级 ProFTPD 至 1.3.5a 及以上版本，该漏洞已在后续版本中修复。如无法立即升级，可在配置文件中移除或注释 `LoadModule mod_copy.c` 行以禁用 mod_copy 模块，并在防火墙限制对 FTP 服务（默认端口 21）的访问来源 IP。"
score = 10
severity = "CRITICAL"
sources = ["nuclei"]
title = "ProFTPd ProFTPD mod_copy 远程命令执行漏洞"
updated = "2026-06-17T00:25:42.347"

