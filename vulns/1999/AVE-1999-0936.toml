[basic]
description = "Internet Explorer 4.01 SP1 及更早版本中的 JScript 脚本引擎的 Window.External 函数存在缓冲区溢出漏洞。远程攻击者可通过诱导用户访问恶意网页触发该漏洞，导致任意命令执行。该漏洞影响早期 Windows 系统上的 IE 浏览器，攻击者无需身份认证即可利用，危害较大。建议用户升级至更高版本的 IE 浏览器以修复此漏洞。"
published = "1999-12-31T05:00:00.000"
remediation = "升级到 Internet Explorer 5.0 或更高版本即可消除此漏洞。如无法升级浏览器，可在 Internet 选项→安全→自定义级别中将「活动脚本」禁用作为临时缓解方案；建议停止使用 IE 内核浏览器，改用 Edge 或 Chrome 等现代浏览器以避免遗留漏洞风险。"
score = 5.1
severity = "MEDIUM"
sources = ["epss"]
title = "Microsoft Internet Explorer JScript 脚本引擎缓冲区溢出远程代码执行漏洞"
updated = "2026-06-16T21:49:42.420"

