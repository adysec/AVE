[basic]
description = "tags.<value>WU-FTPD 的 FTP Conversion 功能存在命令注入漏洞。当该功能启用时，攻击者可通过上传包含恶意构造文件名的文件，使文件名被解释为转换程序（如 tar 或 uncompress）的参数，从而在服务器上执行任意操作系统命令。该漏洞影响 WU-FTPD 2.4.2、2.5.0、2.6.0、2.6.1 和 2.6.2 等版本。攻击者需要具有 FTP 匿名或合法账户登录权限，且目标服务器启用了 FTP Conversion 选项，方可利用此漏洞获取服务器权限或进行进一步渗透。"
published = "1999-12-20T05:00:00.000"
remediation = "立即升级 WU-FTPD 至 2.6.2 或更高版本以修复 FTP Conversion 命令注入漏洞，或编辑 wu-ftpd.conf 配置文件注释掉所有 conversion 相关配置项（如 tar、uncompress 等外部转换程序）以禁用该功能。若当前 Linux 发行版提供安全更新包，建议通过包管理器安装对应补丁。作为临时缓解措施，可在防火墙层限制 FTP 服务访问权限，仅允许可信 IP 连接。长期建议迁移至纯 FTP 服务器（如 Pure-FTPd）替代方案。"
score = 7.5
severity = "HIGH"
sources = ["exploitdb"]
