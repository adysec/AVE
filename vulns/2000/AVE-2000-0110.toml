[basic]
description = 'Microsoft FrontPage 中的 htimage.exe 组件存在路径泄露漏洞，远程攻击者无需认证即可通过向目标服务器发送特制 HTTP 请求直接访问该组件，导致服务器物理路径（如 C:\inetpub\wwwroot\）在错误响应中泄露。该漏洞可为后续攻击（如 LFI、信息收集）提供敏感信息，影响所有部署了 FrontPage Server Extensions 的 IIS Web 服务器。修复措施包括删除或限制 htimage.exe 的访问权限，或安装官方安全更新。'
published = "2000-02-03"
remediation = "升级到 FrontPage 2000 Server Extensions 或更高版本（已修复此问题）；如无法升级，可删除或重命名 `_vti_bin` 目录下的 `htimage.exe` 文件，或在 IIS 中配置 URLScan 规则拦截对 `htimage.exe` 的请求。鉴于 FrontPage Server Extensions 已长期停止技术支持，建议彻底卸载并迁移至现代 Web 发布平台。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Microsoft FrontPage htimage.exe 路径泄露漏洞"
updated = "2000-02-03"

