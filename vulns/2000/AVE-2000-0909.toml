[basic]
description = "thttpd（Trivial HTTP Server）在处理 HTTP 请求头时存在缓冲区溢出漏洞，远程攻击者可通过向目标服务器发送特制的超长 If-Modified-Since 请求头触发该漏洞，导致缓冲区溢出，进而造成服务拒绝或任意代码执行。该漏洞影响 thttpd 2.21 及之前版本，CVSS 评分 10.0，危害等级严重。建议用户升级至最新版本以修复此漏洞。"
published = "2000-10-20T04:00:00.000"
remediation = "升级 thttpd 至 2.21 或更高版本，该版本修复了 If-Modified-Since 头部的缓冲区溢出问题。如无法升级，可在 Web 服务器前端部署反向代理（如 Nginx）过滤超长请求头部，或在防火墙规则中限制对 thttpd 服务的访问来源 IP。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "thttpd 缓冲区溢出远程代码执行漏洞"
updated = "2026-06-16T21:51:33.177"

