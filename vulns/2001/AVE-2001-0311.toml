[basic]
description = "Linux xinetd 2.1.8.9pre11-1 及更早版本的 svc_logprint 函数存在缓冲区溢出漏洞，未经身份认证的远程攻击者可通过发送超长的 ident 响应字符串触发缓冲区溢出，进而在目标系统上以 xinetd 服务权限执行任意代码。该漏洞影响 Linux 系统上运行的 xinetd 2.1.8.9pre11-1 及更早版本，CVSS 评分 7.5（AV:N/AC:L/Au:N/C:P/I:P/A:P），属于高危远程代码执行漏洞。攻击者无需认证即可远程发起攻击，通过构造超长 ident 响应覆盖栈缓冲区并劫持程序控制流，从而在目标系统上执行任意 shellcode。Debian 等发行版已在 DSA-063 安全公告中发布补丁修复此漏洞，建议升级至修复版本或禁用不必要的 ident 服务。"
published = "2001-10-18T04:00:00.000"
remediation = "升级到包含安全修复的 xinetd 版本（如 Red Hat 8.0+、Debian 3.0+、或 SuSE 版本 8.0+），并在 /etc/xinetd.conf 中禁用不必要的 ident 服务；如无法立即打补丁，可在防火墙层面限制对 xinetd 端口的访问流量，并限制 ident 请求的最大长度为 1024 字节以下作为临时缓解措施。"
score = 7.5
severity = "HIGH"
sources = ["redhat"]
title = "Xinetd 缓冲区溢出漏洞"
updated = "2026-06-16T21:54:54.720"

