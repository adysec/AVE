[basic]
description = "HP-UX 9.01 及 9.0 版本中的 subnetconfig 组件存在权限提升漏洞。本地攻击者在已获取系统普通账户访问权限的条件下，可通过利用 subnetconfig 对输入参数处理不当的缺陷，以 root 权限执行任意命令，从而实现本地提权。该漏洞无法远程利用，仅限本地攻击，攻击者需具有系统本地账户方可利用。"
published = "1994-02-07T05:00:00.000"
remediation = "升级 HP-UX 至 10.x 或更新的受支持版本，或移除 `subnetconfig` 的 setuid 权限位：`chmod u-s /usr/sbin/subnetconfig`。限制不可信用户的本地登录权限，并审核 `/etc/passwd` 中可登录用户列表。"
score = 4.6
severity = "MEDIUM"
sources = ["avd"]
title = "HP HP-UX subnetconfig 本地权限提升漏洞"
updated = "2026-06-16T21:50:01.277"

