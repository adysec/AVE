[basic]
description = "WordPress Integrator 模块 1.32 版本的 wp-integrator.php 文件存在反射型跨站脚本漏洞，远程攻击者无需身份认证即可通过向 wp-login.php 页面传递特制的 redirect_to 参数注入任意 Web 脚本或 HTML 代码，当管理员或其他用户访问恶意构造的 URL 时脚本将在浏览器中执行。该漏洞影响使用 WordPress Integrator 1.32 插件的 WordPress 站点，CVSS 评分 4.3，危害等级中危。建议升级至最新版本或禁用该插件以降低风险。"
published = "2012-11-17T21:55:06.063"
remediation = "升级 WordPress Integrator 模块至 1.33 或更高版本，该版本已修复 redirect_to 参数的输入过滤。如无法升级，在 wp-integrator.php 中对 redirect_to 参数添加 htmlspecialchars() 转义处理，或通过 .htaccess 规则拦截包含可疑脚本字符的 redirect_to 请求。"
score = 4.3
severity = "MEDIUM"
sources = ["nuclei"]
title = "WordPress Integrator 插件跨站脚本漏洞"
updated = "2026-06-16T23:47:34.610"

