[basic]
description = "dansie 购物车应用程序的 cart.pl 脚本在处理订单提交时，未对 HTTP 请求中的隐藏表单字段进行服务端校验，远程攻击者可在提交订单时通过修改隐藏字段（如商品单价、数量、收货地址等购买信息）来篡改交易数据。该漏洞影响所有使用 cart.pl 搭建的在线商店，攻击者无需身份认证，只需构造包含伪造隐藏字段的表单请求即可利用，可导致商品价格被恶意降低或订单信息被篡改，造成商家经济损失与数据完整性破坏。"
published = "2000-04-11"
remediation = "该漏洞源于 cart.pl 信任客户端提交的隐藏表单字段。修复方法：1）升级到 Dansie Shopping Cart 的修复版本（1.1 及以上，发布于 2000 年 4 月），可从厂商站点 http://www.dansie.net 获取；2）临时措施：修改 cart.pl 源码，强制在服务端以会话中保存的价格和商品信息重新计算订单总额，忽略客户端提交的隐藏字段；3）对单价、数量等关键字段增加服务端校验与范围检查；4）如无法升级，建议停用 cart.pl 并迁移至受维护的现代购物车系统。"
score = 10
severity = "CRITICAL"
sources = ["cve"]
title = "Dansie Shopping Cart 购物车 cart.pl 隐藏表单字段篡改漏洞"
updated = "2026-07-19"

