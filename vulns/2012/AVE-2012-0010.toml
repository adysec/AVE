[basic]
description = "WordPress 的 All-in-One Event Calendar 插件 1.4 及 1.5 版本中存在多处反射型跨站脚本漏洞。由于多个参数（包括 title、args、before_title、after_title、button_value 及 msg）在输出前未进行充分的过滤与转义处理，远程攻击者可通过构造特制的 URL 诱使用户点击，从而在用户浏览器中执行任意 HTML 或 JavaScript 代码。该漏洞影响使用该插件的 WordPress 站点，CVSS 评分 4.3，危害等级中危。"
published = "2012-08-14T21:55:00.923"
remediation = "升级 All-in-One Event Calendar 插件至 1.6 及以上版本，该版本已修复了对 title、msg、args、button_value 等参数的输入过滤缺陷。如无法升级，可在 WordPress 后台停用该插件，并通过 Web 应用防火墙（WAF）对查询参数中 <script> 等关键字进行拦截作为临时缓解。"
score = 4.3
severity = "MEDIUM"
sources = ["nuclei"]
title = "Timely All-in-One Event Calendar 跨站脚本漏洞"
updated = "2026-06-16T23:40:23.640"

