[basic]
description = "cfingerd 是一款可配置的 finger 服务守护进程，其在处理通配符搜索请求时存在信息泄露漏洞。远程攻击者无需认证即可向目标主机发送 `**@target` 格式的特殊查询请求，cfingerd 会返回系统中所有已登录用户的用户名及详细信息，造成敏感信息泄露。攻击者可利用收集到的用户信息进行后续针对性攻击，如密码爆破或社会工程学攻击。该漏洞影响多个版本的 cfingerd 服务程序。"
published = "1997-05-23T04:00:00.000"
remediation = '立即将 cfingerd 升级至 1.4.0 或更高版本以禁用搜索功能；若无法升级，在 cfingerd 配置文件中关闭 SEARCH 特性或限制可查询用户列表；在 /etc/hosts.deny 中添加 "in.fingerd: ALL" 限制端口 79 访问；如无需 finger 服务，直接卸载 cfingerd 并关闭该服务。'
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "cfingerd 用户信息泄露漏洞"
updated = "2026-06-16T21:48:01.240"

