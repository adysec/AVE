[basic]
description = "FuseWare FuseMail 2.7 的 POP3 邮件服务存在缓冲区溢出漏洞，攻击者通过向 POP3 服务发送超长的 USER 或 PASS 命令，可触发栈缓冲区溢出。该漏洞无需身份认证即可利用，远程攻击者能够覆盖返回地址，执行任意代码，从而完全控制受影响的邮件服务器。该漏洞影响 FuseMail 2.7 版本，CVSS 评分 10.0，危害等级为严重。由于该软件已停止维护，官方未提供修复补丁，建议用户迁移到其他受支持的邮件服务器软件。"
published = "1999-09-13T04:00:00.000"
remediation = "FuseMail 2.7 已于 2000 年代初停止维护，厂商不再提供安全更新或补丁。应立即停用 FuseMail 并迁移至受支持的邮件服务器软件（如 Postfix、Exim 或 Microsoft Exchange）。如短期内无法迁移，须将 POP 服务（端口 110）限制为仅内网访问，在防火墙上阻断外部对 POP 端口的连接，并禁用或删除不必要的用户账户以降低攻击面。建议优先迁移至支持 TLS 加密的现代邮件方案，避免使用明文 POP 协议。"
score = 10
severity = "CRITICAL"
sources = ["exploitdb"]
title = "FuseWare FuseMail 2.7 POP 服务缓冲区溢出漏洞"
updated = "2026-06-16T21:48:59.867"

