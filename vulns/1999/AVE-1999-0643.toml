[basic]
description = "SCO Unixware 2.1、7.0、7.0.1、7.1 及 7.1.1 系统中的 su 程序存在缓冲区溢出漏洞。该程序在处理用户输入的用户名时未对长度进行边界校验，本地已登录的普通用户可向 su 传入超长用户名触发溢出，覆盖栈上返回地址并执行任意代码，从而提升权限获取 root 访问权。攻击需本地登录权限，影响上述多版本 Unixware 系统。"
published = "1999-11-25T05:00:00.000"
remediation = "建议立即安装 SCO 官方发布的 UnixWare 安全补丁 rsco-1999.1 或升级至 UnixWare 7.1.2 及以上版本。如暂时无法升级，可临时移除 su 程序的 setuid root 权限（chmod u-s /bin/su）并改用 sudo 进行权限提升，同时限制普通用户本地登录以缓解风险。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
