[basic]
description = "IkonBoard 2.1.7b 及更早版本的 help.cgi 脚本存在目录遍历漏洞。远程攻击者无需身份认证，通过在 helpon 参数中注入 ../ 路径穿越序列及 %00 空字节截断，可绕过脚本附加 .dat 后缀的限制，读取服务器上任意文件，导致敏感信息泄露（如 /etc/passwd 及用户密码文件）。"
published = "2001-06-27"
remediation = "IkonBoard 2.1.7b 及更早版本的 help.cgi 脚本未过滤 helpon 参数中的 ../ 路径遍历序列与 %00 空字节。修复方法：编辑 help.cgi，在接收 helpon 参数后过滤掉 ../ 与 %00 等危险字符，并校验最终路径是否在允许访问的目录范围内；同时升级至 IkonBoard 最新版本或迁移至仍受支持的现代论坛系统。"
score = 5.0
severity = "MEDIUM"
sources = [
    "cve",
    "exploitdb",
]
title = "IkonBoard 2.1.7b help.cgi 目录遍历漏洞"
updated = "2006-06-16"

