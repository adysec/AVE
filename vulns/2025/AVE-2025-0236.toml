[basic]
description = "唯徳知识产权管理系统 /wxInterface/Case.ashx/WSDownloadPDF 接口存在路径遍历漏洞，由于未对 file 和 app_no 参数进行有效过滤，攻击者可在未授权的情况下通过构造包含 ../../ 的 app_no 参数实现目录穿越，结合 file 参数读取服务器任意文件（如 web.config）。该漏洞可导致数据库配置、系统账号等敏感信息泄露，攻击门槛低，影响范围广泛，危害较大。"
published = "2025-07-07"
remediation = "严格过滤 app_no 和 file 参数，禁止包含 ../ 等路径遍历字符；采用白名单机制，仅允许读取指定目录下的 PDF 文件；建议联系厂商获取最新安全补丁或升级至修复版本。临时缓解措施可通过 WAF 规则拦截包含路径遍历特征的请求。"
score = 5.0
severity = "MEDIUM"
sources = ["hwpoc"]
title = "唯徳知识产权管理系统任意文件读取漏洞"
updated = "2025-07-07"

