[basic]
title = "nmh mhshow 缓冲区溢出远程代码执行漏洞"
description = "Linux nmh 邮件处理套件中的 mhshow 组件存在缓冲区溢出漏洞，远程攻击者可通过向目标用户发送包含恶意构造 MIME 头的电子邮件消息触发该漏洞，在处理畸形邮件头时导致缓冲区溢出，从而在目标系统上执行任意代码。该漏洞影响多个 Linux 发行版中的 nmh 软件包，CVSS 评分 7.5，危害等级高。"
severity = "HIGH"
score = 7.5
sources = ["cve"]
published = "2000-02-28"
updated = "2000-02-28"
remediation = "升级 nmh 软件包至修复版本。Red Hat Linux 用户应安装 RHSA-2000:006 提供的更新包 nmh-0.27-3 或更新版本，可通过 Red Hat 官方渠道获取。Debian 及其他发行版用户应升级至各自发行版提供的修复版本。如无法立即升级，建议禁用邮件客户端对 MIME 头的自动处理功能作为临时缓解措施。"
