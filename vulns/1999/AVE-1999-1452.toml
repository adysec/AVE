[basic]
description = "NukeNabber 存在拒绝服务漏洞，远程攻击者可通过向该软件的 1080 端口建立连接但不发送任何数据，触发 report.exe 程序执行并导致目标主机 CPU 占用率升至 100%，造成系统拒绝服务。该漏洞攻击条件简单，无需认证即可利用，影响范围包括 NukeNabber 相关版本。"
published = "1998-11-05T05:00:00.000"
remediation = "NukeNabber 软件已停止维护且不再更新，建议立即卸载或停止使用该软件。如业务必须使用，可在防火墙层面限制仅允许可信 IP 访问 TCP 1080 端口，并配置入侵检测规则监控对该端口的异常空连接行为，作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Puppets Place NukeNabber 拒绝服务漏洞"
