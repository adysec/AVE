[basic]
description = "Mirabilis ICQ 98a 1.30 及可能其他版本存在文件名显示截断漏洞。远程攻击者可向用户发送包含大量空格的长文件名可执行文件，由于客户端仅显示文件名开头部分，.exe 扩展名被隐藏，导致用户误判文件类型而主动打开，从而执行恶意代码。该漏洞利用社会工程学手法，需要用户交互配合，CVSS 评分 5.1，危害等级中危。"
published = "1999-01-01"
remediation = "升级到 ICQ 99b 或更高版本（如 ICQ 2000b），这些版本已修复长文件名截断显示问题，确保完整显示文件扩展名。如无法升级，在接收文件时注意检查文件实际扩展名，对超长文件名保持警惕，不要打开来历不明的可执行文件。"
score = 5.1
severity = "MEDIUM"
sources = ["cve"]
title = "Mirabilis ICQ 98a 长文件名扩展名隐藏漏洞"
updated = "2026-07-20"

