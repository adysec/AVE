[basic]
description = "Samba mount.cifs 在以 setuid root 权限安装时，未正确强制执行权限检查，导致本地用户可通过指定凭证文件路径并使用 --verbose 或 -v 选项读取该文件首行内容，从而窃取认证凭证密码。该漏洞影响 Samba 3.0 至 3.0.36、3.2 至 3.2.14、3.3 至 3.3.7 及 3.4 至 3.4.1 版本，攻击条件为本地用户且 mount.cifs 以 setuid root 运行，攻击者可利用 --verbose 参数泄露凭证文件首行敏感信息，CVSS 评分 1.9（低危），属于权限控制不当（CWE-732）类型漏洞。"
published = "2009-10-07T18:30:00.920"
remediation = "建议升级 Samba 至 3.0.37、3.2.15、3.3.8 或 3.4.2 及以上版本；若暂时无法升级，请执行 `chmod u-s /sbin/mount.cifs` 移除 mount.cifs 的 setuid root 权限，或在 /etc/fstab 中配置 credentials 文件权限为 600 仅 root 可读，防止普通用户通过 --verbose 读取凭证文件第一行获取密码。"
score = 1.9
severity = "LOW"
sources = ["tenable"]
title = "Samba mount.cifs 信息泄露漏洞"
updated = "2026-06-16T23:10:33.480"

