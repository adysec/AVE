[basic]
description = "RightFax Web客户端存在可预见会话编号漏洞，远程攻击者可通过预测或枚举会话编号直接劫持其他用户的已认证会话，无需获取用户凭证即可访问系统。该漏洞影响RightFax Web客户端，CVSS评分7.5，危害等级高危。建议升级至修复版本或实施会话随机化机制。"
published = "2000-01-29T05:00:00.000"
remediation = "升级 RightFax 至厂商已修复该问题的版本（如 RightFax 9.4 或更高版本），启用 Web 客户端安全会话模式，在服务器配置中将会话 ID 生成算法改为随机数而非顺序递增。如无法升级，在 Web 服务器前端部署反向代理并配置会话劫持防护规则，同时启用 HTTPS 加密传输防止会话 ID 被嗅探。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "RightFax Web客户端会话劫持漏洞"
updated = "2026-06-16T21:51:01.420"

