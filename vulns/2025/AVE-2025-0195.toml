[basic]
description = "汉王e脸通综合管理平台存在任意文件上传漏洞，攻击者通过路径遍历绕过（`..%3B`）访问 `uploadBlackListFile.do` 接口，未对上传文件类型进行有效校验，可上传包含恶意代码的 JSP 文件至服务器。攻击者无需认证即可远程利用该漏洞，上传 webshell 后获取服务器控制权，执行任意系统命令，导致服务器被完全接管。该漏洞影响汉王e脸通综合管理平台全版本，危害严重。"
published = "0725"
remediation = "建议升级汉王e脸通综合管理平台至官方最新版本，修复路径遍历及文件上传校验缺陷。同时配置上传目录禁止执行脚本权限，严格校验文件后缀类型（仅允许图片/文档等安全格式），过滤请求路径中的 `../` 及 `%3B` 等危险字符，并对上传接口实施身份认证与权限控制。如无法立即升级，应在 WAF 层面拦截包含 `uploadBlackListFile.do` 及路径遍历特征的请求。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "汉王e脸通综合管理平台任意文件上传漏洞"
updated = "0725"

