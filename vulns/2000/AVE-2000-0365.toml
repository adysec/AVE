[basic]
description = "HP Web JetAdmin 6.0 存在拒绝服务漏洞，远程攻击者可通过向 8000 端口发送特制的畸形 URL 请求，导致目标服务崩溃或无法正常响应打印请求。该漏洞影响 HP Web JetAdmin 6.0 版本，攻击者无需身份认证即可发起攻击，CVSS 评分 5.0，危害等级中等。"
published = "2000-05-24T04:00:00.000"
remediation = "升级 HP Web JetAdmin 至 7.0 或更高版本，该版本已修复畸形 URL 导致的拒绝服务问题。如无法升级，在防火墙层面限制对端口 8000 的访问，仅允许受信任的管理 IP 地址连接，并配置 Web 服务器过滤异常 URL 请求作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "HP Web JetAdmin 6.0 拒绝服务漏洞"
updated = "2026-06-16T21:51:44.803"

