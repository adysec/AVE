[basic]
description = "Microsoft Word 在处理特制 RTF 文件时，对 'listoverridecount' 字段的解析存在内存破坏漏洞。攻击者可构造恶意 RTF 文档并通过邮件或网页等方式诱使用户打开，成功利用后可获取与当前用户相同的系统权限执行任意代码。该漏洞影响 Microsoft Word 2003 SP3、2007 SP2/SP3、2010 SP1、Word Viewer、Office 兼容包 SP2/SP3 及 Office Web Apps 2010 SP1，CVSS 评分 7.8，危害等级高。Microsoft 已在 2012 年 12 月安全更新中修复此漏洞。"
published = "2012-12-12T00:55:01.060"
remediation = "立即安装 Microsoft 安全公告 MS12-079 提供的安全更新：Word 2003 安装 KB2760497，Word 2007 安装 KB2760421，Word 2010 安装 KB2760410，Office 兼容包安装 KB2760416，Word Viewer 安装 KB2760498。可通过 Windows Update 自动更新或从 Microsoft 下载中心手动获取。如无法立即打补丁，可配置 Office 文件阻止策略禁止打开 RTF 文件，或设置 Outlook 以纯文本方式阅读邮件作为临时缓解措施。"
score = 7.8
severity = "HIGH"
sources = ["kev"]
title = "Microsoft Word RTF解析远程代码执行漏洞"
updated = "2026-06-16T23:41:39.477"

