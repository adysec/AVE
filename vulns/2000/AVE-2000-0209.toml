[basic]
description = "微软 Hotmail 邮件服务在 2000 年初的版本中，对 HTML 邮件内嵌链接的过滤机制存在缺陷，未能正确拦截 javascript: 协议的 URL。攻击者可将包含 javascript: 伪协议的恶意链接嵌入发送给受害者的邮件中，当受害者点击该链接时，浏览器会在 Hotmail 的会话上下文中执行攻击者构造的脚本。该漏洞影响所有使用当时版本 Hotmail 服务的用户，攻击条件仅需受害者打开并点击恶意邮件中的链接，即可窃取用户 Cookie、会话凭证或冒充用户执行操作，构成典型的跨站脚本（XSS）攻击。"
published = "2000-01-10"
remediation = "升级到微软已修复该问题的 Hotmail/Outlook 服务版本，并在邮件网关层对所有入站 HTML 邮件的链接协议进行白名单校验，禁止 javascript:、vbscript: 等危险伪协议，同时启用内容安全策略（CSP）限制脚本执行来源。"
score = 10
severity = "CRITICAL"
sources = ["cve"]
title = "微软 Hotmail javascript: 协议跨站脚本漏洞"
updated = "2026-07-18"

