[basic]
description = "rpcbind（端口映射服务）存在认证缺陷漏洞，远程攻击者可通过伪造源地址向目标系统的 rpcbind 服务发送恶意请求，从而插入或删除 RPC 服务注册条目，破坏服务映射表或劫持 RPC 服务通信。该漏洞影响 Linux、IRIX 及 Wietse Venema 实现的 rpcbind 等多个版本，攻击者无需身份认证即可远程利用，CVSS 评分 10.0，危害等级严重。"
published = "1999-01-28"
remediation = "升级 rpcbind 至已修复版本以解决源地址欺骗漏洞。在防火墙层面限制对 UDP/TCP 111 端口的访问，仅允许可信来源 IP 连接。配置 TCP Wrappers（/etc/hosts.allow 和 /etc/hosts.deny）限制 rpcbind 的访问来源。如非必要，可在服务配置中禁用 rpcbind 服务。"
score = 10.0
severity = "CRITICAL"
sources = ["cve"]
title = "Linux rpcbind 远程源地址欺骗漏洞"
updated = "2026-06-16"

