[basic]
description = "RSA ACE/Server 4.1及之前版本存在拒绝服务漏洞。远程攻击者可通过向该服务器的认证请求端口发送大量UDP数据包，造成服务器处理队列溢出，导致服务崩溃无法响应合法认证请求。该漏洞利用方式简单，无需认证即可远程触发，影响使用了RSA ACE/Server进行双因素认证的所有系统。"
published = "2000-06-08T04:00:00.000"
remediation = "建议从 RSA (Security Dynamics) 官方渠道获取并安装针对此漏洞的专用补丁，升级 ACE/Server 至 4.1 以上安全版本。在网络边界防火墙配置访问控制策略，仅允许受信客户端访问认证端口（默认 5500/UDP），限制外部任意源的 UDP 洪水流量。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "RSA ACE Server 认证UDP数据包泛洪拒绝服务漏洞"
updated = "2026-06-16T21:51:54.970"

