[basic]
description = "Belkin N150 F9K1009 v1 路由器固件 1.00.08 之前版本中的 webproc CGI 模块存在绝对路径遍历漏洞。远程攻击者可通过向 getpage 参数提交完整路径名，绕过访问限制读取设备上的任意文件，包括敏感配置信息。该漏洞无需身份认证即可利用，攻击复杂度低，CVSS 评分 7.8，危害等级高。厂商已发布固件更新修复此漏洞。"
published = "2014-06-19T10:50:04.583"
remediation = "升级 Belkin N150 F9K1009 v1 路由器固件至 1.00.08 或更高版本。在官方固件不可获取时，禁用路由器的远程管理功能（WAN 侧管理），并将管理页面限定为仅内网 IP 访问，同时限制对 /cgi-bin/webproc 路径的外部访问。"
score = 7.8
severity = "HIGH"
sources = ["nuclei"]
title = "Belkin N150 路由器目录遍历漏洞"
updated = "2026-06-17T00:07:24.427"

