[basic]
description = "IBM InfoSphere BigInsights 2.1.0.3 之前版本中存在路径遍历漏洞（CWE-22）。远程认证用户可通过向未指定的 API 调用传递特制参数，绕过预期的文件和目录访问限制，进而读取服务器上的敏感文件或访问不受信任的数据与代码。攻击者需拥有有效用户凭证，利用难度较低，CVSS 评分 6.5，影响数据的机密性。IBM 已在 BigInsights 2.1.0.3 版本中修复此漏洞。"
published = "2014-07-07T11:01:28.383"
remediation = "升级 IBM InfoSphere BigInsights 至 2.1.0.3 或更高版本，该版本已修复 API 参数校验缺陷，防止通过构造特殊参数绕过文件与目录访问限制。如无法立即升级，可在反向代理层对 /api/ 路径下的请求实施严格的输入白名单过滤，限制非必要的 API 调用参数类型与长度，并审计所有已认证用户的 API 访问日志以发现异常行为。"
score = 6.5
severity = "MEDIUM"
sources = ["kev"]
title = "IBM InfoSphere BigInsights 路径遍历漏洞"
updated = "2026-06-16T23:56:08.523"

