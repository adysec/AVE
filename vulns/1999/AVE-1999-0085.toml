[basic]
description = "OpenSSL 和 SSLeay 库存在会话重用漏洞，远程攻击者可利用已建立的 SSL 会话绕过访问控制机制，获取未授权访问权限。该漏洞源于 SSL/TLS 会话管理实现缺陷，攻击者在同一 SSL 会话中未经重新认证即可冒充合法用户，导致会话固定与身份欺骗攻击。影响早期版本的 OpenSSL 和 SSLeay 库，CVSS 评分 7.5，危害等级高。通过禁用 SSL 会话重用或更新至修复版本可缓解风险。"
published = "1999-03-22T05:00:00.000"
remediation = "升级 OpenSSL 至 0.9.2b 及以上版本，该版本已修复 SSL 会话重用绕过访问控制的缺陷。当前所有维护中的 OpenSSL 版本（1.x、3.x 系列）均不受此问题影响。若仍使用已停止维护的 SSLeay 库，应迁移至 OpenSSL 最新稳定版。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "OpenSSL SSL 会话重用与访问控制绕过漏洞"
updated = "2026-06-16T21:48:22.500"

