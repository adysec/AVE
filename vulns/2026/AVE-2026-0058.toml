[basic]
description = "Gardyn IoT Hub 设备中存在硬编码的 iothubowner 高权限密钥（CWE-798），未经身份认证的远程攻击者通过获取该密钥即可调用 Azure IoT Hub Registry Manager 函数，获取所有 Gardyn Home Kit 和 Studio 设备的连接信息，进而对指定设备执行任意命令，并可利用该设备作为跳板攻击用户内网中的其他设备。CVSS 评分 9.5，危害等级严重。厂商尚未发布官方修复补丁，建议用户立即更换默认密钥并限制 IoT Hub 访问权限。"
published = "2026-07-03T00:16:52.270"
remediation = "立即将 Gardyn Home/Studio 固件升级至 master.627 或更高版本，Gardyn Cloud API 升级至 2.12.2026 或更高，移动 App 升级至 2.11.0 或更高。确保设备持续联网以便自动接收安全更新；在 App 的 Settings → Advanced 中确认固件版本号为 627 及以上。若设备曾离线，重新联网后保持在线直至更新完成。厂商已轮换被泄露的 iothubowner 密钥并部署额外监控措施，用户无需自行配置。"
score = 9.5
severity = "CRITICAL"
sources = ["hwpoc"]
title = "Gardyn IoT Hub 硬编码凭据致未授权远程代码执行漏洞"
updated = "2026-07-06T19:42:32.890"

