[info]
author = "ave"
description = "验证Netscape Communicator 4.x系列EMBED标签pluginspage选项缓冲区溢出漏洞。通过HTTP服务返回包含超长pluginspage属性的EMBED标签HTML页面，诱使用户访问后触发缓冲区溢出。"
id = "POC-AVE-1999-0244"
name = "Netscape Communicator EMBED 标签缓冲区溢出漏洞 PoC"
severity = "medium"
tags = ["ave-1999-0244"]
vuln_id = [
    "CVE-1999-0685",
    "AVE-1999-0244",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["EMBED"]
