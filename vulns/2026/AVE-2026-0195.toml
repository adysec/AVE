[basic]
description = "Tenda F453 路由器 /goform/webtypelibrary 接口存在栈溢出漏洞，远程攻击者可通过向目标设备发送特制的 HTTP 请求触发该漏洞，导致缓冲区溢出，进而实现远程代码执行或拒绝服务。该漏洞影响 Tenda F453 路由器固件版本，攻击者无需认证即可利用，危害等级高。建议用户及时更新固件或限制管理接口访问。"
published = "20260501"
remediation = "建议立即登录腾达官网下载 F453 最新固件并升级；如厂商已停止维护，请在路由器管理界面关闭远程管理功能，并将管理端口仅绑定到内网 LAN 侧，同时在防火墙规则中限制对 80/443 端口的公网访问，或考虑更换仍在安全支持期内的路由器设备。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "Tenda F453 路由器 /goform/webtypelibrary 栈溢出漏洞"
updated = "20260501"

