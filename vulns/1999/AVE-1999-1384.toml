[basic]
description = "该漏洞存在于 MySQL 3.21 版本的 mysqld 组件中，由于服务进程在创建日志文件时将其权限设置为世界可读（world-readable），导致本地用户可直接读取这些日志文件。日志中记录了对用户数据库执行的操作，其中包含以明文或可逆形式存储的密码信息，本地攻击者利用该缺陷即可获取系统中其他用户的认证凭据，进而实施权限提升或横向移动。攻击前提是攻击者已具备目标主机的本地访问权限，危害集中于多用户共享的 MySQL 服务器环境。"
published = "1998-12-27"
remediation = "升级到 MySQL 3.23.0 或更高版本，该版本已修复日志文件权限设置不当的问题。在无法立即升级时，作为临时缓解措施，可手动将日志文件权限修改为仅属主可读写，例如执行 chmod 640 /path/to/mysql.log 并确认其属主为运行 mysqld 的用户，同时避免以危险权限重新生成日志。"
score = 4.6
severity = "MEDIUM"
sources = ["cve"]
title = "MySQL 3.21 mysqld 日志文件权限配置不当信息泄露漏洞"
updated = "2026-07-19"

