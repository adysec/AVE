[basic]
description = "Alt-N MDaemon 2.8.5.0 POP 服务器的 UIDL 命令处理存在竞争条件漏洞，本地攻击者可通过发送 UIDL 命令后迅速断开连接触发竞争条件，导致 POP 服务崩溃并造成拒绝服务。该漏洞影响 Alt-N MDaemon 2.8.5.0 版本的 POP3 服务组件，攻击者需具备本地访问权限并能连接到 POP 服务端口，通过精心构造的时序攻击触发竞争条件导致服务拒绝服务。CVSS 评分 2.6（低危），攻击向量为网络，攻击复杂度高，无需认证，仅影响可用性。Alt-N 已在后续版本中修复此竞争条件漏洞，建议升级至修复版本。"
published = "2000-06-16T04:00:00.000"
remediation = "建议升级 MDaemon 至 2.8.5.0 之后的任意版本（建议升级至最新稳定版），该竞争条件漏洞已在后续版本中修复。若暂时无法升级，可在防火墙层面限制 POP 服务（默认端口 110）仅允许受信任 IP 访问，或暂时禁用 POP 服务作为临时缓解措施。"
score = 2.6
severity = "LOW"
sources = ["epss"]
title = "Alt-N MDaemon POP 服务器竞争条件拒绝服务漏洞"
updated = "2026-06-16T21:51:52.157"

