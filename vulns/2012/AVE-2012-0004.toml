[basic]
description = "WordPress 的 YouSayToo auto-publishing 插件 1.0 版本中存在跨站脚本（XSS）漏洞，位于 yousaytoo.php 文件的 submit 参数。远程攻击者可通过向该参数注入恶意 Web 脚本或 HTML 代码，当管理员或其他用户访问受影响的页面时，恶意脚本将在浏览器中执行，导致敏感信息泄露或会话劫持。该漏洞影响 YouSayToo auto-publishing 1.0 版本，CVSS 评分 4.3，危害等级中危。建议升级插件或对用户输入进行严格过滤。"
published = "2012-01-20"
remediation = "YouSayToo auto-publishing 插件自 2012 年起已停止维护，厂商未发布安全补丁。建议立即停用并删除该插件，替换为其他活跃维护的 WordPress 自动发布插件。如无法替换，需在服务器端对 yousaytoo.php 的 submit 参数进行严格的输入过滤和输出编码。"
score = 4.3
severity = "MEDIUM"
sources = [
    "cve",
    "nuclei",
]
title = "WordPress YouSayToo auto-publishing 插件跨站脚本漏洞"
updated = "2026-06-16"

