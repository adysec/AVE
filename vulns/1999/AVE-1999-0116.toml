[basic]
description = "rlogin 程序在处理 TERM 环境变量时存在缓冲区溢出漏洞，本地攻击者可向该环境变量传入超长字符串触发缓冲区溢出，从而获取目标系统的 root 权限。该漏洞影响 BSD/OS、DG/UX、Debian、Digital UNIX、FreeBSD、HP-UX、IBM AIX、NetBSD、NeXTstep、SGI IRIX、SunOS 等多种 Unix 操作系统，CVSS 评分 10.0，危害等级严重。"
published = "1997-02-06T05:00:00.000"
remediation = "针对各受影响系统版本，建议立即升级至修复版本（如 FreeBSD 2.2 及以上、HP-UX 11.00 及以上、IBM AIX 4.2 及以上）；如无法升级，可移除 rlogin 的 setuid 权限（chmod u-s /usr/bin/rlogin）或禁用 rlogin 服务（注释 inetd.conf 中 login 行并重启 inetd），改用 SSH 替代 rlogin 进行远程登录。"
score = 10
severity = "CRITICAL"
sources = ["exploitdb"]
title = "多款Unix系统 rlogin TERM环境变量缓冲区溢出本地权限提升漏洞"
updated = "2026-06-16T21:47:26.963"

