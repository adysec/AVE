[info]
author = "ave"
description = "验证 Microsoft Internet Explorer 5.01 WebBrowser 控件跨框架安全策略绕过漏洞。恶意 HTML 页面利用 NavigateComplete2 事件回调，在 IFRAME 加载完成后读取跨域框架内容，确认同源策略绕过缺陷。需在 IE 5.01 浏览器中打开此页面进行验证。"
id = "POC-AVE-2000-0567"
name = "CVE-2000-0503 PoC"
severity = "low"
tags = [
    "cve-2000-0503",
    "cross-frame",
    "ie",
]
vuln_id = [
    "CVE-2000-0503",
    "AVE-2000-0567",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/cve-2000-0503.html"
protocol = "http"

[poc.requests.body]
content = ""
type = "raw"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "CVE-2000-0503",
    "NavigateComplete2",
]
