[basic]
description = "HP-UX 9.05 及之前版本的 CORE-DIAG 文件集中的 HP message catalog 存在权限管理缺陷，本地攻击者可通过利用该组件对消息目录文件的不当权限配置，获取超出自身授权范围的系统权限，实现本地权限提升。该漏洞影响 HP-UX 9.05 及更早版本，CVSS 评分 4.6，攻击者需具备本地访问权限，无需身份认证即可利用。"
published = "1994-09-21T04:00:00.000"
remediation = "升级 HP-UX 至 10.0 或更高版本，该漏洞已在后续版本中修复。如无法升级，以 root 身份执行 `swmodify -x fileset_only=false CORE-DIAG` 移除该 fileset，或通过 `chmod 700 /usr/sbin/diag/` 限制 CORE-DIAG 目录仅 root 可访问以降低本地非授权用户利用风险。"
score = 4.6
severity = "MEDIUM"
sources = ["avd"]
title = "HP HP-UX CORE-DIAG Fileset 本地权限提升漏洞"
updated = "2026-06-16T21:50:00.780"

