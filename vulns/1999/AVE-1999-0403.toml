[basic]
description = "Linux Kernel 2.6.20.1 版本的 inetd 超级服务守护进程存在拒绝服务漏洞，远程攻击者可向目标主机发送特制的 SYN 和 RST 数据包，导致 inetd 服务异常终止或资源耗尽，无法正常响应合法连接请求。该漏洞影响运行 inetd 服务的 Linux 系统，攻击者无需认证即可实施攻击，且无需目标系统上存在特定监听服务。利用方式简单，通过发送大量伪造的 TCP SYN/RST 包即可触发，属于典型的网络层拒绝服务攻击。"
published = "1997-11-01T05:00:00.000"
remediation = "建议将 legacy inetd 替换为 xinetd，并在配置中设置 per_source = 5、cps = 25 30、max_load = 3 以限制并发连接和速率。或者迁移至 systemd socket 激活机制，利用内核 SYN cookies（sysctl -w net.ipv4.tcp_syncookies=1）和 iptables/nftables 限制入站 SYN 包速率（如 iptables -A INPUT -p tcp --syn -m limit --limit 10/s -j ACCEPT）。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Linux Kernel inetd SYN/RST Packet 拒绝服务漏洞"
updated = "2026-06-16T21:47:55.917"

