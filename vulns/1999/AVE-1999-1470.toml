[basic]
description = "HP-UX 10.20 系统中某些程序未能正确处理超过 60000 的大用户 ID（UID）或组 ID（GID），存在本地权限提升漏洞。本地攻击者可通过创建特制的大 UID/GID 账户，利用该缺陷绕过权限检查机制，从而获取更高系统权限。该漏洞影响 HP-UX 10.20 版本，攻击者需拥有本地账户才能利用，CVSS 评分 4.6，危害等级中危。"
published = "1997-07-31T04:00:00.000"
remediation = "升级 HP-UX 系统至 11.0 或更高版本，该问题已在后续版本中修复。如无法升级，请安装 HP 针对此漏洞发布的安全补丁（如 PHKL_19036 等补丁包），并在 /etc/default/security 中限制 UID/GID 最大值为 60000 以内，同时审查拥有超大 UID 的本地用户账户权限。"
score = 4.6
severity = "MEDIUM"
sources = ["avd"]
title = "HP HP-UX 本地权限提升漏洞"
updated = "2026-06-16T21:50:09.887"

