[basic]
description = "Adobe Reader 和 Acrobat 在处理特制 PDF 文档时存在内存破坏漏洞，攻击者可通过构造恶意的 PDF 文件并诱使用户打开，触发内存越界写入，从而在目标系统上执行任意代码或导致拒绝服务。该漏洞在 2013 年 2 月已被野外利用，影响 Adobe Reader 和 Acrobat 9.5.4 之前版本、10.1.6 之前版本及 11.0.02 之前版本，CVSS 评分 7.8，危害等级高。用户仅需打开恶意 PDF 文件即可被远程攻击，无需额外交互条件。"
published = "2013-02-14T01:55:02.023"
remediation = "升级 Adobe Reader/Acrobat 至 9.5.4、10.1.6 或 11.0.02 及以上版本。在组策略中禁用 PDF 浏览器内嵌插件，设置 Adobe Reader 为「受保护的视图」模式，并启用增强安全设置阻止自动执行 JavaScript。对于无法立即升级的系统，建议使用替代 PDF 阅读器或通过应用白名单机制限制 Acrobat 进程启动。"
score = 7.8
severity = "HIGH"
sources = ["kev"]
title = "Adobe Acrobat/Reader 远程代码执行漏洞"
updated = "2026-06-16T23:49:49.060"

