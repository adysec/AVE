[basic]
description = "HP-UX 的 r-cmnds 远程命令套件（包括 remshd、rexecd、rlogind、rlogin、remsh、rcp、rexec、rdist 等 8 个组件）存在多个未公开的安全漏洞。攻击者可利用这些漏洞提升权限或非法访问系统文件，影响 HP-UX 10.00 至 11.00 版本。由于漏洞细节未公开且 CVSS 评分为 10.0（严重），实际利用风险极高，建议立即升级或禁用相关 r-command 服务。"
published = "1999-12-28T05:00:00.000"
remediation = "升级至不受影响版本或安装对应累积补丁：HP-UX 10.00/10.01/10.10 安装 PHNE_13618，10.20/10.30 安装 PHNE_13619，11.00 安装 PHNE_16091。同时禁用 r-commands 相关服务（remshd、rexecd、rlogind、rdist），改用 SSH 进行远程管理；在防火墙上限制 513/tcp（rlogin）、514/tcp（rsh）、514/udp（rdist）端口的入站访问作为临时缓解措施。"
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "HP HP-UX r-cmnds 远程命令服务多重权限提升漏洞"
updated = "2026-06-16T21:50:44.957"

