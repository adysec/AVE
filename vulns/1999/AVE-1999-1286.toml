But the error only mentions remediation. Let me fix that.
For the remediation, since SGI IRIX is EOL and discontinued:
- Remove setuid bit from colorview binary: `chmod u-s /usr/sbin/colorview`
- Restrict access to authorized users only
- Migrate to a supported operating system as IRIX is no longer maintained
