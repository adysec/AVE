[basic]
description = "万户OA（万和OA）自定义文档管理模块中的 name_judge.jsp 接口存在 SQL 注入漏洞。攻击者无需身份认证即可通过 POST 请求向目标系统发送特制的 formType 参数，利用 Oracle 数据库的 DBMS_PIPE.RECEIVE_MESSAGE 函数构造时间盲注语句，可逐字符拖取数据库中敏感信息（如管理员凭证、业务数据等）。该漏洞对部署了万户OA的政府及企事业单位构成严重数据安全威胁。"
published = "0730"
remediation = "升级万户OA至官方最新版本，或联系厂商获取 name_judge.jsp 的 SQL 注入补丁。临时缓解措施：在 WAF 或反向代理层对 /defaultroot/modules/govoffice/custom_documentmanager/name_judge.jsp 的 formType、govFormName、formId 参数添加 SQL 注入过滤规则，限制该路径仅允许内网 IP 访问。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "万户 OA name_judge.jsp SQL注入漏洞"
updated = "0730"

