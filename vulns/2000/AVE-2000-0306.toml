[basic]
description = "Red Hat Linux 在安装过程中默认使用 DES 加密算法配合 crypt() 函数对初始用户密码进行哈希处理，而非采用安全性更高的 MD5 算法。DES 算法密钥空间有限（56 位），易于被暴力破解或彩虹表攻击，攻击者在获取到 /etc/shadow 文件中的密码哈希后，可利用 DES 较弱的加密强度在较短时间内破解用户密码。该漏洞影响 Red Hat Linux 多个版本，属于加密算法强度不足导致的敏感信息泄露风险。"
published = "2000-01-21T05:00:00.000"
remediation = "修改 /etc/login.defs 配置文件，将 ENCRYPT_METHOD 设为 MD5 或 SHA512（推荐 SHA512），并运行 authconfig --passalgo=sha512 --update 命令切换系统密码加密算法。同时使用 pwconv 命令重新加密现有用户口令。升级至 Red Hat Linux 6.2 及以上版本可获得 md5 密码支持。"
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "Red Hat Linux 初始密码使用 DES 弱加密算法漏洞"
updated = "2026-06-16T21:50:59.167"

