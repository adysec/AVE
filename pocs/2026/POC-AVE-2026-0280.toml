[info]
author = "AVE"
description = "检测 Decidim 验证管理页面是否暴露可重用的 Active Storage 签名链接，无需认证即可下载身份验证文档"
id = "POC-AVE-2026-0280"
name = "CVE-2026-45378 PoC"
severity = "high"
tags = ["cve-2026-45378"]
vuln_id = [
    "CVE-2026-45378",
    "AVE-2026-0280",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/admin/id_documents"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["rails/active_storage/disk/"]
