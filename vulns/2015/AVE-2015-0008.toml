[basic]
description = "vsftpd 3.0.2 及更早版本中存在未明安全漏洞，与 deny_file 配置项的解析逻辑缺陷有关。远程攻击者无需认证即可通过网络发送特制请求，绕过 deny_file 设置的文件访问限制规则，获取本应被禁止访问的文件。该漏洞影响所有使用 vsftpd 3.0.2 及之前版本的系统，CVSS 评分 5.0，危害等级中危。各 Linux 发行版已发布补丁修复此问题，建议用户升级至修复版本。"
published = "2015-01-28T11:59:08.417"
remediation = "升级 vsftpd 至 3.0.3 及以上版本。Debian/Ubuntu 用户执行 `apt-get update && apt-get install vsftpd`，Red Hat/CentOS 用户参考对应发行版补丁。如无法升级，在 vsftpd.conf 中确保 `deny_file` 规则同时覆盖 `/./` 路径变体，例如 `deny_file=/*` 改为 `deny_file={/*,/./*}`，并重启 vsftpd 服务。"
score = 5
severity = "MEDIUM"
sources = ["nuclei"]
title = "vsftpd vsftpd 访问限制绕过漏洞"
updated = "2026-06-17T00:22:23.320"

