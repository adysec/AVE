[basic]
description = "OpenSSH 1.2.x 版本的 scp 组件存在目录遍历漏洞，当客户端连接至恶意的 scp 服务器时，攻击者可通过构造包含 `..`（点点）的路径名响应客户端请求，绕过目标系统的路径限制，从而在客户端主机上覆盖任意文件。该漏洞影响 OpenSSH 1.2.x 系列版本，攻击者须搭建恶意 scp 服务器并诱导用户使用 scp 命令连接，利用难度较低，可导致系统文件被覆写或代码执行。"
published = "2000-12-19T05:00:00.000"
remediation = "立即升级 OpenSSH 至 2.1 或更高版本，该漏洞已在后续版本中修复。若无法升级，可在客户端限制 scp 仅连接可信服务器，避免使用 scp 从不可信源下载文件，并考虑使用 sftp 替代 scp 进行文件传输以降低风险。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "OpenSSH scp 目录遍历漏洞"
updated = "2026-06-16T21:52:55.680"

