[basic]
description = "Outlook Express 5 for Macintosh 在处理 HTML 格式邮件时存在安全缺陷，程序会自动下载邮件中嵌入的附件而不会向用户弹出安全提示或征求确认，导致用户可能在不知情的情况下将恶意文件下载到本地系统。攻击者可通过向目标用户发送特制的 HTML 邮件，利用该漏洞在不经用户同意的情况下植入任意文件，进一步结合其他漏洞可实现对目标系统的控制。该漏洞影响 Outlook Express 5 for Macintosh 版本，CVSS 评分 5.0，危害等级中等，需用户升级至更高版本或使用其他邮件客户端进行防范。"
published = "1999-12-22"
remediation = "安装 Microsoft 安全公告 MS99-060（KB249082）提供的官方补丁，该补丁修复了 Outlook Express 5 for Macintosh 在接收 HTML 邮件时自动下载附件而不提示用户的安全缺陷。由于该产品已停止技术支持，建议迁移至受支持的邮件客户端或升级到更高版本的操作系统附带的邮件程序。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Microsoft Outlook Express 5 for Macintosh HTML 邮件附件自动下载漏洞"
updated = "2026-07-21"

