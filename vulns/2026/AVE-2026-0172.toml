[basic]
description = "Apache Struts S2-069（CVE-2025-68493）是 XWork 组件中的 XML 外部实体注入漏洞。由于 XWork 组件在解析 XML 配置时未对 XML 外部实体进行安全校验，攻击者可构造特制 XML 请求数据触发 XXE 注入，导致敏感数据泄露、服务端请求伪造（SSRF）或拒绝服务（DoS）。该漏洞影响 Apache Struts 2.0.0 至 2.3.37、2.5.0 至 2.5.33、6.0.0 至 6.1.0 版本，远程未经身份认证的攻击者可利用此漏洞进行攻击。建议升级至 Struts 6.1.1 或更高版本修复。"
published = "nday"
remediation = "立即升级 Apache Struts 至 6.1.1 及以上版本（2.x 分支升级至 2.5.28+），该版本修复了 XML 解析器中外部实体的处理逻辑。临时缓解措施可在 XML 解析配置中禁用 DTD（Document Type Definition）和外部实体扩展，设置 `XMLInputFactory.setProperty(XMLInputFactory.IS_SUPPORTING_EXTERNAL_ENTITIES, false)` 及 `XMLInputFactory.SUPPORT_DTD` 为 false。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "Apache Struts XML 外部实体注入漏洞"
updated = "nday"

