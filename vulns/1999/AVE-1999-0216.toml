[basic]
description = "BSD 系统 profil(2) 系统调用存在安全缺陷，本地攻击者可通过 profile 与 execve 的组合调用，在程序执行过程中修改其内部数据空间，进而导致进程行为异常或权限提升。此漏洞影响 NetBSD 1.4、OpenBSD 2.5 及 Solaris 7.0 等多个 Unix 类操作系统，攻击者需具备本地用户账户权限才能利用。"
published = "1999-08-09T04:00:00.000"
remediation = "NetBSD 用户应升级至 1.4.1 及以上版本，OpenBSD 用户应升级至 2.6 及以上版本，Solaris 用户应安装对应操作系统补丁包或升级至 Solaris 8/9，以修复 profil(2) 系统调用中关于 profiling 与 execve 的内部数据空间修改问题。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "BSD 系列操作系统 profil 系统调用本地权限提升漏洞"
updated = "2026-06-16T21:48:49.237"

