[basic]
description = "Windows NT 4.0 本地安全机构子系统（LSA）中的 LsaLookupSids 函数存在输入验证漏洞。远程攻击者可向目标系统发送特制的畸形安全标识符（SID）请求参数，触发该函数处理异常，导致 LSASS 进程崩溃，造成系统拒绝服务。该漏洞影响 Windows NT 4.0 系统，无需身份认证即可远程利用，CVSS 评分 7.8，危害等级高。"
published = "1999-12-16T05:00:00.000"
remediation = "立即升级至 Windows 2000 或更高版本操作系统（Windows NT 4.0 已于 2004 年终止支持，不再发布安全更新）。如暂时无法升级，可安装 MS00-006 安全公告中提供的补丁（KB249281），并在防火墙层面限制对 139/TCP 和 445/TCP 端口的未授权访问，同时禁用不需要的 LSASS 匿名 RPC 调用以降低攻击面。"
score = 7.8
severity = "HIGH"
sources = ["cve"]
title = "Microsoft Windows NT 4.0 LSA 拒绝服务漏洞"
updated = "2026-06-16T21:49:29.080"

