[basic]
description = "Progress Webspeed 配置程序未正确禁用对 WSMadmin 管理工具的访问权限，远程攻击者可通过 wsisa.dll 利用该配置缺陷，无需身份认证即可获取系统管理权限。该漏洞影响 Progress Webspeed 相关版本，CVSS 评分 7.5，危害等级高，攻击者可借此完全控制目标 Web 服务及应用系统。"
published = "2000-02-03T05:00:00.000"
remediation = "立即升级 Progress Webspeed 至 KB 19412 补丁对应版本，或限制通过 Web 服务器配置禁止对 wsisa.dll 及 WSMadmin 管理接口的远程访问，仅允许受信任 IP 段访问该管理路径，并确保 Webspeed 配置程序正确禁用 WSMadmin 实用工具的未授权访问权限。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "Progress WebSpeed WSMadmin 远程权限提升漏洞"
updated = "2026-06-16T21:51:03.400"

