[basic]
description = "Windows 2000 的 SYSKEY 默认配置将系统启动密钥存储在注册表中，本地攻击者可通过读取注册表获取该密钥，进而解密受 Encrypted File System（EFS）保护的数据。该漏洞影响 Windows 2000 所有版本，攻击者需拥有本地登录权限，无需额外认证即可利用。CVSS v2.0 评分 7.2，危害等级高，可导致敏感信息完全泄露。"
published = "2000-05-11"
remediation = "使用 Windows 2000 自带的 Syskey 工具（运行 syskey.exe），在「启动密钥」选项中选择「密码启动」而非「系统产生的密码（在注册表中存储启动密钥）」，设置强密码作为系统启动密钥。如使用软盘存储密钥，选择「软盘启动」并将密钥保存至软盘。此操作可防止本地攻击者从注册表提取启动密钥解密 EFS 加密数据。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Microsoft Windows 2000 默认系统密钥配置漏洞"
updated = "2000-05-11"

