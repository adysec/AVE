[basic]
description = "Microsoft IIS 在处理 ASP 页面中的 VBScript 脚本时，未对用户提供的正则表达式进行充分校验，导致本地攻击者可通过构造特殊的非法正则表达式触发服务崩溃。该漏洞影响 IIS 服务器，攻击者需拥有本地访问权限，利用方式简单，可导致 IIS 服务拒绝服务，影响网站正常访问。CVSS 评分 5.0，危害等级中等。"
published = "2000-01-21T05:00:00.000"
remediation = "建议安装 Microsoft 安全公告 MS00-008 对应的补丁（Q246018），或升级至 Windows 2000 Service Pack 1 及以上版本。如暂无法打补丁，可在 IIS 管理控制台中将 ASP 脚本超时时间由默认 90 秒下调至 30 秒，并在「应用程序配置-调试」中关闭「启用 ASP 服务器端脚本调试」，以降低恶意正则导致的资源耗尽风险。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Microsoft IIS ASP Visual Basic Script 拒绝服务漏洞"
updated = "2026-06-16T21:51:01.897"

