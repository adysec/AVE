[basic]
description = "Microsoft IIS 4.0 和 5.0 的 ISM.DLL 组件存在文件内容泄露漏洞。远程攻击者可通过向目标服务器发送包含大量编码空格（%20）并以 .htr 扩展名结尾的特制文件请求，绕过正常访问控制，读取服务器上的任意文件内容（如源代码、配置文件等）。该漏洞影响运行 IIS 4.0 和 5.0 的 Windows 系统，无需身份认证即可利用，CVSS 评分 7.5，危害等级高。"
published = "2000-05-11T04:00:00.000"
remediation = "立即删除 IIS 中 .htr 扩展名的脚本映射（ISM.DLL），或安装 Microsoft 安全公告 MS00-031 对应补丁。如无法立即操作，在 URLScan/ISAPI 筛选器层面拦截含大量 %20 编码空格及 .htr 后缀的请求作为临时缓解措施。同时建议升级至更高版本 IIS 或迁移至 Windows Server 2003 及以上版本。"
score = 7.5
severity = "HIGH"
sources = ["exploitdb"]
title = "Microsoft IIS 4.0/5.0 .HTR 文件名请求文件读取漏洞"
updated = "2026-06-16T21:51:46.553"

