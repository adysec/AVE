[basic]
description = "OpenClaw（又称 clawdbot/Moltbot）在 2026.1.29 之前版本中存在认证令牌窃取漏洞。该软件从查询字符串中获取 gatewayUrl 参数后，自动发起 WebSocket 连接并发送认证令牌，未经过用户确认或弹窗提示。远程攻击者可构造恶意链接诱使已认证用户访问，从而窃取其认证令牌，进而获取 OpenClaw Control UI 的控制权限，可能导致远程代码执行。该漏洞 CVSS 评分 8.8，危害等级高，影响所有低于 2026.1.29 的版本。"
published = "2026-02-01T23:15:49.717"
remediation = "升级 OpenClaw 至 2026.1.29 或更高版本（包含 GHSA-g8p2-7wf7-98mq 修复）。在反向代理层配置规则拦截含 `gatewayUrl` 的查询参数，部署 WAF 规则阻断恶意请求。限制 OpenClaw 仅监听 127.0.0.1，通过 SSH 隧道或 VPN 远程访问。禁用 WebSocket 自动令牌发送，为 Control UI 操作添加用户确认弹窗。定期轮换认证令牌。"
score = 8.8
severity = "HIGH"
sources = ["hwpoc"]
title = "OpenClaw gatewayUrl 认证令牌窃取远程代码执行漏洞"
updated = "2026-06-17T10:24:22.340"

