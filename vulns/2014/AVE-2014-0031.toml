[basic]
description = "WordPress 的 EasyCart（wp-easycart）购物车插件 2.0.6 之前版本中存在信息泄露漏洞。该插件在 inc/admin/phpinfo.php 文件中直接调用了 phpinfo() 函数，且未对访问权限进行任何校验。远程攻击者无需身份认证，只需向目标站点发送针对该路径的 HTTP 请求，即可获取服务器 PHP 配置信息，包括数据库连接参数、网站绝对路径、系统环境变量等敏感数据。攻击者可利用泄露的信息进一步扩大攻击面，实施更深层次的渗透攻击。"
published = "2014-07-11T20:55:03.500"
remediation = "立即将 WordPress 插件 EasyCart (wp-easycart) 升级至 2.0.6 或更高版本。如无法立即升级，可删除或重命名 inc/admin/phpinfo.php 文件，或在 Web 服务器（如 .htaccess）中添加 Deny from all 规则阻止外部直接访问该路径。"
score = 5
severity = "MEDIUM"
sources = ["nuclei"]
title = "WordPress EasyCart插件信息泄露漏洞"
updated = "2026-06-17T00:10:48.767"

