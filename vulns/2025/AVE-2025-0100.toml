[basic]
description = "Microsoft SharePoint Server 本地部署版本中的 ToolShell 组件存在反序列化漏洞（CWE-502），未经身份认证的攻击者可通过网络向目标系统发送特制的恶意请求触发该漏洞，成功利用可在目标服务器上远程执行任意代码。该漏洞 CVSS 评分 9.8，危害严重，且已有公开的利用代码在野传播。Microsoft 建议用户在官方安全更新发布前立即启用缓解措施以防止被利用。"
published = "2025-07-20T01:15:30.777"
remediation = "Microsoft 尚未发布针对 CVE-2025-53770 的正式安全更新，作为临时缓解措施：1）在 SharePoint 管理中心启用 AMSI（反恶意软件扫描接口）集成，并在所有 SharePoint 服务器上部署 Microsoft Defender 防病毒和 EDR 方案；2）使用 PowerShell 执行 Set-SPMachineKey 和 Update-SPMachineKey 轮换 ASP.NET 计算机密钥，然后运行 iisreset.exe 重启 IIS；3）无法启用 AMSI 时应立即将面向公网的 SharePoint 服务器断网隔离；4）审查 IIS 日志中是否存在 Referer 为 /_layouts/SignOut.aspx 且 POST 至 /_layouts/15/ToolPane.aspx 的可疑请求。"
score = 9.8
severity = "CRITICAL"
sources = ["hwpoc"]
title = "Microsoft SharePoint Server 远程代码执行漏洞"
updated = "2026-06-17T09:38:51.660"

