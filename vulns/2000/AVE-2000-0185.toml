[basic]
description = "Sun Flex License Manager 中的 lit 程序存在符号链接漏洞，本地用户可通过在临时文件目录中创建恶意符号链接，诱使 lit 程序以更高权限写入任意文件，实现本地提权。该漏洞影响 Sun Workshop 5.0 等使用 Sun FlexLM 的产品，CVSS 评分 1.2，危害等级低。建议限制 lit 程序的执行权限或升级到不受影响的版本。"
published = "2000-02-21T05:00:00.000"
remediation = "立即移除 lit 程序的 setuid/setgid 权限位：`chmod u-s /path/to/lit` 及 `chmod g-s /path/to/lit`，防止本地用户通过符号链接提升权限修改任意文件。限制 lit 可执行文件的执行权限仅对授权管理员开放。由于 Sun Microsystems 已停止运营且产品生命周期终结，官方不再提供安全更新，建议迁移至替代授权管理方案。"
score = 1.2
severity = "LOW"
sources = ["avd"]
title = "Sun Flex License Manager 符号链接漏洞"
updated = "2026-06-16T21:51:13.927"

