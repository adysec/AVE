[basic]
description = "OpenSSH 1.2.x 的 scp 组件存在目录遍历漏洞，恶意的远程 scp 服务器可通过在文件名中包含 ..（点点）路径分隔符，向客户端文件系统任意位置写入文件，覆盖已有文件。攻击者需诱骗客户端连接至恶意 scp 服务器，从而在内网或用户环境中实现任意文件覆盖，可能导致权限提升或服务异常。此漏洞影响 OpenSSH 1.2 系列版本，CVSS 评分 5.0，危害等级中危。"
published = "2000-12-19T05:00:00.000"
remediation = "升级至 OpenSSH 2.3.0 及以上版本（或最新 OpenSSH 版本），该版本已修复 scp 路径遍历问题。如无法升级，请禁用 scp 命令（sshd_config 中注释掉 subsystem-sftp 并移除 scp 二进制），改用 sftp 进行安全文件传输。此外，在客户端避免使用 `-o StrictHostKeyChecking=no` 连接不可信服务端。"
score = 5
severity = "MEDIUM"
sources = ["osv"]
title = "OpenSSH scp 目录遍历任意文件覆盖漏洞"
updated = "2026-06-16T21:52:55.680"

