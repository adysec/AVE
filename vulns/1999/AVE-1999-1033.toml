[basic]
description = "Windows 3.51 系统中的 Office 快捷工具栏（OSB）在启用时会默认开启备份和恢复权限。通过 OSB 启动的程序（如文件管理器）会继承这些高权限设置，导致本地用户可以读取原本无权限访问的文件夹，造成敏感信息泄露。攻击者需要本地访问系统才能利用此漏洞。"
published = "1999-12-31"
remediation = "Microsoft 已发布 KB 文章 Q146604 说明此问题。建议用户升级到 Windows NT 4.0 或更高版本操作系统，或避免通过 Office 快捷工具栏启动文件管理器等程序，手动限制备份和恢复权限的继承范围。"
score = 2.1
severity = "LOW"
sources = ["cve"]
title = "Microsoft Windows Office Shortcut Bar 权限继承漏洞"
updated = "2026-06-16T21:50:07.887"

