[basic]
description = "Pragma Systems InterAccess TelnetD Server 4.0 存在拒绝服务漏洞，远程攻击者可向目标 TelnetD 服务发送特制的畸形终端客户端配置信息，导致服务进程崩溃，无法正常处理后续连接请求。该漏洞利用难度较低，无需身份认证即可触发，影响运行了 InterAccess TelnetD Server 4.0 版本的服务器系统。"
published = "2000-02-24T05:00:00.000"
remediation = "升级 Pragma InterAccess TelnetD Server 至 4.0 以上版本以修复此漏洞；如厂商已停止支持该产品，建议迁移至现代 Telnet/SSH 服务器（如 OpenSSH）。在无法立即升级或迁移的情况下，通过防火墙（如 iptables）限制仅允许可信 IP 访问 Telnet 端口（23/TCP），并使用 TCP Wrappers（hosts.allow/hosts.deny）进行访问控制拦截恶意连接请求，以降低远程拒绝服务攻击风险。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Pragma Systems InterAccess TelnetD Server 4.0 拒绝服务漏洞"
updated = "2026-06-16T21:51:14.190"

