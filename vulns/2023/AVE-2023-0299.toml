[basic]
description = "汉得SRM系统存在登录绕过漏洞，其tomcat.jsp页面在身份认证逻辑上存在缺陷，未对关键会话状态与用户凭证进行严格校验。未经身份认证的远程攻击者可通过构造特制的请求直接访问tomcat.jsp，绕过正常的登录认证流程，以管理员或合法用户身份未授权进入系统后台。该漏洞影响使用存在缺陷版本汉得SRM系统的相关企业用户，攻击仅需网络可达目标系统且能访问tomcat.jsp接口即可发起，无需任何有效凭据，利用门槛低、危害较大，可能导致敏感业务数据泄露与系统被非法控制。"
published = "08.10"
remediation = "建议立即升级汉得SRM至最新版本（建议升级至V10.0及以上版本），并及时修补tomcat.jsp登录绕过漏洞。如暂时无法升级，建议在Web应用防火墙配置规则拦截对/tomcat.jsp的直接访问，或在Web服务器层面配置访问控制限制该路径访问，同时加强登录认证机制，启用多因子认证作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "汉得 SRM tomcat.jsp 登录绕过漏洞"
updated = "08.10"

