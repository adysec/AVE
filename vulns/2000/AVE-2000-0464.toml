[basic]
description = "Canna 3.5 beta2 存在远程缓冲区溢出漏洞。Canna 是 Linux 系统上常用的日文输入法，其输入系统在处理 SR_INIT 命令时未对用户名或组名参数进行合理边界检查，导致缓冲区溢出。远程攻击者可通过向运行 Canna 服务的系统发送特制的 SR_INIT 请求包，触发缓冲区溢出并执行任意代码。该漏洞 CVSS 评分为 10.0，危害等级严重，影响 Canna 3.5 beta2 及之前版本。"
published = "2000-07-02T04:00:00.000"
remediation = "立即升级 Canna 至 3.2.2 或更高版本。FreeBSD 用户可通过更新 ports tree 后重新编译安装 ja-Canna port，或从 ftp://ftp.FreeBSD.org/pub/FreeBSD/ports/ 下载更新后的 package 替换旧版本。临时缓解措施：删除 Canna 包（如非必需）；使用 ipfw/ipf 限制远程访问 Canna 服务端口；在 /etc/hosts.canna 中配置白名单，仅允许受信主机连接。"
score = 10
severity = "CRITICAL"
sources = ["exploitdb"]
title = "Canna Canna 远程缓冲区溢出漏洞"
updated = "2026-06-16T21:52:03.060"

