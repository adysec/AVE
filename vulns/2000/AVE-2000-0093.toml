[basic]
description = "Intellivend 在线购物车应用程序存在安全漏洞，远程攻击者可通过修改 HTML 隐藏表单字段来篡改价格、数量等敏感购买信息。由于应用程序在服务端未对客户端提交的参数进行重新校验，攻击者可以通过浏览器代理工具拦截并修改表单中的隐藏字段值，将商品价格修改为极低数值或更改购买数量，从而以远低于正常价格的价格完成购买交易。此漏洞不需要任何认证即可利用，任何网络可达的攻击者均可发起攻击，导致商家遭受经济损失。"
published = "2000-02-01"
remediation = "由于 Intellivend 官方未发布正式补丁，根本修复措施为：将所有价格、数量等敏感购买信息从 HTML 隐藏表单字段移至服务端会话（Session）中存储，在服务端对每次购买请求中的价格和数量进行重新计算与校验，不得信任客户端提交的隐藏字段值。购物车应使用服务端生成的唯一标识符关联商品条目，而非依赖客户端传入的商品 ID 或价格参数。建议部署 WAF 规则对包含价格、金额参数的请求进行异常检测与拦截。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "Intellivend 在线购物车隐藏表单字段敏感信息篡改漏洞"
updated = "2026-06-16"

