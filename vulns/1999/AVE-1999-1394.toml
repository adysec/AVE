[basic]
description = 'Check Point Firewall-1 防火墙在解析用户自定义对象时，无法正确处理 Mail、auth、time 等受限关键字。当管理员在对象定义中误用这些关键字时，防火墙会错误生成默认"ANY"地址的规则，导致访问范围超出管理员预期，使本应受限的网络访问被扩大，攻击者可借此访问更多受保护的内部系统。该漏洞影响使用用户自定义对象且依赖关键字配置访问规则的 Firewall-1 部署环境，攻击条件为攻击者处于被错误放宽的规则所覆盖的网络路径中，利用方式是通过触发含受限关键字的错误规则实现越权访问。'
published = "1998-05-11T04:00:00.000"
remediation = '建议将 Check Point Firewall-1 升级至厂商已修复的版本，避免在用户定义对象名称中使用 Mail、auth、time 等受限关键字。若必须使用，请手动检查生成的规则库，将默认的 "ANY" 地址替换为明确指定的主机或网段，并逐条审核访问控制规则，确保未意外放行超出预期的系统访问权限。'
score = 7.5
severity = "HIGH"
sources = ["avd"]
