[basic]
description = "Webmin 0.5 之前版本存在登录认证缺陷，未对针对有效用户名的密码尝试次数进行限制。远程攻击者可利用此漏洞对已知用户名实施暴力破解攻击，通过大量尝试弱口令或字典密码获取系统管理员权限。该漏洞影响 Webmin 早期版本，攻击无需任何前置条件，且可远程触发，危害较大。"
published = "1999-12-31T05:00:00.000"
remediation = "升级 Webmin 至 0.5 或更高版本，该版本已限制同一用户名下的无效密码尝试次数。作为临时缓解措施，可配置 fail2ban 规则对 Webmin 登录接口进行频率限制，或通过防火墙限制可访问 Webmin 管理端口的来源 IP 范围。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "Webmin 暴力破解权限提升漏洞"
updated = "2026-06-16T21:49:40.017"

