[basic]
description = "tags.<value>Samba smbd 服务在处理 oplock break 通知回复数据包时存在无限循环漏洞。远程已认证攻击者可通过发送特制的 SMB 请求触发该漏洞，导致 smbd 进程进入 100% CPU 占用的死循环，造成拒绝服务。受影响版本包括 Samba 3.0 早于 3.0.37、3.2 早于 3.2.15、3.3 早于 3.3.8 及 3.4 早于 3.4.2。攻击者需先通过 SMB 身份认证，随后发送未预期的 oplock break 通知回复数据包即可使服务端无限循环处理，直至管理员手动重启 smbd 进程，导致合法用户无法正常访问共享资源。"
published = "2009-10-07T18:30:00.860"
remediation = "将 Samba 升级至安全版本：3.0.37、3.2.15、3.3.8 或 3.4.2 及以上，具体取决于当前使用的分支。如暂无法升级，可在 smb.conf 中设置 `map to guest = Never` 并限制匿名/低权限用户连接，或在防火墙层面限制 SMB 服务的远程访问来源，仅允许受信任的 IP 段连接 139/445 端口以降低被利用风险。"
score = 4
severity = "MEDIUM"
sources = ["tenable"]
title = "Samba smbd 远程拒绝服务漏洞"
updated = "2026-06-16T23:10:28.540"

