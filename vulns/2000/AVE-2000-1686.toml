[basic]
description = "pam_smb 和 pam_ntdom 可插拔认证模块 (PAM) 存在缓冲区溢出漏洞，远程攻击者可通过使用过长的用户名进行登录尝试触发缓冲区溢出，进而在目标系统上执行任意代码。该漏洞影响使用 pam_smb 或 pam_ntdom PAM 模块进行认证的 Linux/Unix 系统，CVSS 评分 10.0 (CVSS:3.0/AV:N/AC:L/PR:N/UI:N/S:U/C:H/I:H/A:H)，属于严重级别漏洞。攻击者无需身份认证即可远程发起攻击，仅需向认证服务发送超长用户名即可触发缓冲区溢出并执行任意代码，完全攻陷目标系统的机密性、完整性和可用性。建议升级至修复版本的 PAM 模块或禁用受影响的认证模块。"
published = "2000-11-14T05:00:00.000"
remediation = "建议立即升级 pam_smb 至 0.99.6.2 版本或更高版本（如 pam_smb 1.1.7+），或升级 pam_ntdom 至最新版本。若无法立即升级，可在 PAM 配置文件 /etc/pam.d/login 等中注释掉 pam_smb.so 和 pam_ntdom.so 模块行以禁用该模块，或在 /etc/pam.d/ 相关配置中限制用户名最大长度（如使用 pam_succeed_if.so user_len < 256 限制用户名长度）。同时建议在防火墙层面限制不必要的远程登录服务（如 SSH、Telnet）访问来源 IP。"
score = 10
severity = "CRITICAL"
sources = ["cve"]
title = "Linux PAM 认证模块 缓冲区溢出代码执行漏洞"
updated = "2026-06-16T21:52:34.967"

