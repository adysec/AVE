remediation = '立即升级至 Internet Explorer 6.0 或更高版本，该漏洞已在 IE 6.0 及后续版本中修复。由于 IE 4.0/5.x 已停止安全支持，建议迁移至 Microsoft Edge 或 Chrome 等现代浏览器，并启用安全区域锁定策略，禁止跨域访问本地文件。同时可在组策略中将 Internet 区域安全级别设为"高"，禁用"允许跨域访问"选项。'
