[basic]
description = "PassWD 1.2 使用弱加密（简单编码）机制存储用户密码，攻击者在获取密码文件读取权限后，可轻易解码还原明文密码，导致用户凭证泄露。该漏洞影响 PassWD 1.2 版本，攻击条件是攻击者能够访问本地或远程的密码存储文件，利用难度较低。"
published = "2000-06-04T04:00:00.000"
remediation = "立即停止使用 PassWD 1.2，升级到支持强加密（如 bcrypt/Argon2）的密码管理工具（如 KeePass、Bitwarden）。如无法更换软件，对存储密码的文件目录设置严格访问控制（chmod 600），并启用文件系统加密（如 LUKS、BitLocker）作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "PassWD 1.2 密码存储弱加密漏洞"
updated = "2026-06-16T21:51:51.047"

