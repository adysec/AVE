[basic]
description = 'CGIForum 1.0 的 cgiforum.pl 脚本中存在目录遍历漏洞，远程攻击者可通过向 "thesection" 参数提交包含 `..`（点点）序列的特制请求，突破路径限制读取服务器上的任意文件。该漏洞影响 CGIForum 1.0 版本，无需身份认证即可利用，可能导致敏感信息泄露。攻击者只需构造简单的 HTTP 请求即可触发该漏洞，利用难度较低。'
published = "2001-01-09T05:00:00.000"
remediation = "升级 CGIForum 至已修复目录遍历漏洞的最新版本；如无官方更新，手动修改 cgiforum.pl，在解析 thesection 参数前过滤 `..` 和 `/` 等路径穿越字符，改用 `File::Basename` 模块规范化路径。同时可在 Web 服务器（Apache/Nginx）层面配置重写规则，拦截包含 `../` 或 `%2e%2e` 的 thesection 请求参数作为临时缓解。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Markus Triska CGIForum 1.0 目录遍历漏洞"
updated = "2026-06-16T21:53:18.540"

