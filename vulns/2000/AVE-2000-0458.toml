[basic]
description = "wu-ftpd 2.6.0 及更早版本的 lreply 函数在处理 SITE EXEC 命令时未正确过滤用户提供的格式字符串，导致远程攻击者可在无需身份认证的情况下，通过发送包含特制格式字符串的恶意 FTP 命令触发栈覆盖，进而在目标系统上执行任意操作系统命令。该漏洞影响包括 WU-FTPD 2.4.2/2.5.0/2.6.0 及 BeroFTPD 1.3.4(1) 在内的多版本 FTP 服务器软件，只要目标开放 FTP 服务且攻击者能够建立网络连接即可被利用，可造成完全的系统沦陷与数据泄露。攻击复杂度低且无需交互，CVSS 评分为 10.0，危害等级为严重。"
published = "2000-07-07T04:00:00.000"
remediation = "tags.<value>建议立即将 wu-ftpd 升级至 2.6.1 或更高版本，该版本已修复 lreply 函数的格式字符串漏洞。临时缓解措施：在 ftpaccess 配置文件中注释掉 SITE EXEC 命令（将 SITE EXEC 所在行前加 #），或禁用匿名 FTP 访问。同时建议在防火墙层面限制 21 端口的外部访问，仅允许可信 IP 连接。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "wu-ftpd FTP服务器 格式字符串漏洞"
updated = "2026-06-16T21:52:01.597"

