[basic]
description = "Linux 内核 Cavium 硬件随机数生成器（hwrng）驱动中存在空指针解引用漏洞，具体位于 drivers/char/hw_random/cavium-rng-vf.c 文件的第 182 行，函数在处理 pdev 指针时未进行有效性检查直接解引用。本地攻击者可通过特定操作触发该漏洞，导致系统崩溃引发拒绝服务。该漏洞影响 Linux 内核相关版本，CVSS 评分 5.5，危害等级中等。"
published = "2025-02-26T07:00:54.850"
remediation = "立即升级 Linux 内核至 5.17.2 及以上版本，或更新至包含提交 e6205ad58a7a（主线）或 e47b12f94151（稳定分支）的对应内核发行版：5.10.110+、5.15.33+ 或 5.16.19+。如无法立即升级，可执行 modprobe -r cavium-rng-vf 临时卸载该硬件随机数生成器驱动模块以规避风险。"
score = 5.5
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux Kernel Cavium 硬件随机数生成器驱动空指针解引用漏洞"
updated = "2026-06-17T05:17:17.320"

