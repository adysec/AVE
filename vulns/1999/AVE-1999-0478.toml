[basic]
description = 'Netscape Communicator 浏览器在处理 HTML 页面时存在信息泄露漏洞。当页面的 TITLE 标签中嵌入 JavaScript 代码时，远程攻击者可利用浏览器的 "about:" 协议访问浏览器内部敏感信息（如历史记录、书签或配置数据）。该漏洞影响 Netscape Communicator 的多个早期版本，攻击条件为用户访问攻击者控制的恶意网页。攻击者通过构造包含特定 JavaScript 的 HTML 页面，诱导用户点击访问，即可在无需身份认证的情况下窃取浏览器信息，造成隐私泄露。'
published = "1999-05-24T04:00:00.000"
remediation = "升级 Netscape Communicator 至 4.51 或更高版本（该版本已修复通过“about”协议读取浏览器信息的问题）。若无法立即升级，可在浏览器配置中禁用 JavaScript 执行（编辑 prefs.js 设置 javascript.enabled=false）或通过网络代理/防火墙规则拦截含有 about: 协议的异常请求，作为临时缓解措施。"
score = 2.6
severity = "LOW"
sources = ["epss"]
title = "Netscape Communicator about 协议信息泄露漏洞"
updated = "2026-06-16T21:49:00.337"

