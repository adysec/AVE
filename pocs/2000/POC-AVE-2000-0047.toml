[info]
author = "AVE"
description = "检测 Ipswitch IMail IMONITOR 服务 status.cgi 脚本是否可访问。该 CGI 脚本运行于 8181 端口，用于显示服务运行状态，多次并发请求可导致 Dr. Watson 'Invalid Memory Address' 错误造成拒绝服务。"
id = "POC-AVE-2000-0047"
name = "Ipswitch IMail IMonitor status.cgi 拒绝服务漏洞 PoC"
severity = "medium"
tags = ["ave-2000-0047"]
vuln_id = [
    "CVE-2000-0056",
    "AVE-2000-0047",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/status.cgi"
protocol = "http"

[[poc.requests.matchers]]
expect = true
status = [200]
type = "status"
