[basic]
description = "Slackware Linux 3.2 至 3.5 版本的 login 程序在 /etc/group 文件缺失时未正确检查错误状态，导致无法正常降低用户权限。本地攻击者只需登录服务器即可获得 root 权限，实现本地权限提升。该漏洞利用条件简单，无需额外工具或认证，影响所有运行受影响版本的 Slackware 系统。"
published = "1998-07-13T04:00:00.000"
remediation = "升级至 Slackware 3.6 及以上版本以彻底修复该漏洞（3.6 已修复登录时 /etc/group 缺失不降权的问题）。如暂时无法升级，手动创建 /etc/group 文件并填入必要组条目（如 root:x:0:root、bin:x:1:root,bin,daemon），确保文件存在且权限为 644，作为临时缓解措施防范本地提权。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "Slackware Linux /etc/group 本地权限提升漏洞"
updated = "2026-06-16T21:50:25.980"

