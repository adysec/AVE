[basic]
description = "Cisco Unified Communications Manager 的 Tomcat 管理 Web 界面存在目录遍历漏洞（CWE-22）。已认证的远程攻击者可通过向受影响接口发送特制的目录遍历序列（如 ../），绕过路径限制读取服务器上的任意文件，导致敏感信息泄露。该漏洞影响 Cisco Unified Communications Manager 7.x/8.x/9.x 版本，CVSS 评分 4.0，危害等级中危。Cisco 已发布安全公告（Bug ID CSCui78815）修复此漏洞。"
published = "2013-10-11T03:54:53.800"
remediation = "升级 Cisco Unified Communications Manager 至 9.1.2、10.5.2 或 11.5.x 及以上版本。如无法立即升级，可在 Tomcat 管理界面所在路径通过访问控制列表（ACL）限制可信 IP 访问，并禁用不必要的目录遍历敏感接口 /ccmadmin/bulkvivewfilecontents.do。"
score = 4
severity = "MEDIUM"
sources = ["nuclei"]
title = "Cisco Unified Communications Manager 目录遍历漏洞"
updated = "2026-06-16T23:58:57.840"

