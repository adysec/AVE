[basic]
description = "FileMaker Pro 5 Web Companion 组件存在安全绕过漏洞，远程攻击者无需身份认证即可通过 XML 发布功能或电子邮件功能绕过字段级数据库安全限制，实现对数据库字段的未授权修改。该漏洞影响 FileMaker Pro 5 版本，攻击者只需通过网络发送特制请求即可利用，无需复杂攻击条件，可能导致敏感数据被篡改。厂商已发布安全更新修复此漏洞。"
published = "2000-05-02T04:00:00.000"
remediation = "升级至 FileMaker Pro 5.5 或更高版本，该漏洞已在后续版本中修复。如无法升级，可在 Web Companion 配置中禁用 XML 发布和电子邮件功能，并在防火墙层面限制对 Web Companion 端口（默认 80）的访问，仅允许可信 IP 连接。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "FileMaker Pro Web Companion 安全绕过漏洞"
updated = "2026-06-16T21:51:36.373"

