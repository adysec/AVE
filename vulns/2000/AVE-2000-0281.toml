[basic]
description = "StarOffice 5.1 存在缓冲区溢出漏洞，攻击者可通过在文档中嵌入超长URL触发缓冲区溢出，导致应用程序崩溃并造成拒绝服务。该漏洞影响 StarOffice 5.1 版本，攻击条件为诱使用户打开包含恶意URL的特制文档，无法远程直接利用。建议用户避免打开来源不明的文档或升级到更高版本以规避风险。"
published = "2000-04-16T04:00:00.000"
remediation = "建议升级至 StarOffice 5.2 或更高版本，该版本已修复此缓冲区溢出漏洞。由于 StarOffice 已停止维护，建议迁移至 Apache OpenOffice 或 LibreOffice 等持续更新的办公套件。临时缓解措施：避免打开来源不明的文档，尤其是包含超长 URL 链接的文档。"
score = 4.6
severity = "MEDIUM"
sources = ["avd"]
title = "StarDivision StarOffice 5.1 缓冲区溢出拒绝服务漏洞"
updated = "2026-06-16T21:51:24.650"

