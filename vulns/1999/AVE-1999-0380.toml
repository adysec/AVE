[basic]
description = '部分 Unix 系统的 finger 服务（端口 79）在处理对用户 "0" 或不存在用户的查询时存在信息泄露漏洞。攻击者无需认证即可通过远程发送 finger 请求枚举目标系统上的有效用户账户名，从而为进一步的密码猜测、社会工程学等定向攻击提供铺垫。该漏洞源于 finger 协议本身缺乏访问控制机制，运行 finger 服务的所有系统均受影响。'
published = "1999-01-01T05:00:00.000"
remediation = "建议立即禁用或卸载 finger 服务（如 Linux 下执行 `systemctl stop finger && systemctl mask finger`，或删除 /etc/xinetd.d/finger 配置并重启 xinetd），同时在防火墙层面阻止外部对 TCP 端口 79 的访问。若因兼容性无法完全禁用，应配置 fingerd 限制为仅允许本地查询且不显示用户详细信息。"
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "多个厂商 Finger 服务信息泄露漏洞"
updated = "2026-06-16T21:47:53.497"

