[basic]
description = "这是 IIS 和其他服务器中 SSL ISAPI 过滤器的一个 Race 漏洞，由于在特定时间窗口内访问共享资源的异步特性，导致过滤器处理中的状态和数据可能在未经正确处理的情况下被篡改或泄露，攻击者通过控制请求和响应时序，得以在特定时间点捕获过滤器缓冲区中的 SSL 数据内容，进而获得明文的凭证或会话信息。该漏洞影响 Windows Server IIS、Apache 和 Nginx 等服务器上集成了 SSL ISAPI 扩展的功能，攻击者无需身份验证，只要以特定时间间隔向服务器发送特定模式的 SSL 封装请求，就能造成 DLL 内存区域同步错误，直接导致明文缓存数据被干扰或泄露，危害范围涵盖所有未打相关补丁的互联网服务器，攻击者需要持续控制目标和可控测距发动精确的注入和通信机制，攻击机制复杂，但一旦成功将造成极大的隐私和安全风险。"
published = "1999-08-11T04:00:00.000"
remediation = "建议升级至 IIS 7.0 或更高版本（已重写 SSL 处理架构），或应用微软安全公告 MS99-025 发布的补丁程序。若必须保留旧版 IIS，可在 ISAPI 筛选器配置中禁用 SSL 筛选器（inetmgr→网站属性→ISAPI 筛选器→移除 sslfltr.dll），并强制启用 TLS 1.2 以上协议禁用 SSLv2/SSLv3 作为缓解措施。"
score = 2.6
severity = "LOW"
sources = ["avd"]
title = "Microsoft IIS SSL ISAPI 筛选器 竞争条件 信息泄露漏洞"
updated = "2026-06-16T21:49:12.627"

