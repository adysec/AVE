[basic]
description = "迈普多业务融合网关的Web管理界面存在配置缺陷，导致/.htpasswd/路径下的认证凭据文件可直接被未授权访问。攻击者通过访问该路径可获取Web管理后台的加密用户名和密码哈希值，进而尝试破解凭证登录设备管理界面，获取设备控制权限，可能导致网络被入侵和敏感信息泄露。"
published = "2024-06-01"
remediation = '配置Web服务器（如Apache/Nginx）拒绝访问.htpasswd文件，在配置中添加<Files ~ "^\.ht"> Require all denied </Files>规则；将.htpasswd文件移出Web根目录至系统安全目录；限制管理页面仅允许可信IP访问；升级设备固件至最新安全版本。'
score = 5.0
severity = "MEDIUM"
sources = ["hwpoc"]
title = "迈普 多业务融合网关 .htpasswd 文件信息泄露漏洞"
updated = "2026-07-21"

