[basic]
description = "SCO OpenServer 5.0 至 5.0.6 版本中的 recon 工具存在缓冲区溢出漏洞，本地攻击者可通过向该程序的第一命令行参数传递超长字符串触发缓冲区溢出，从而覆盖进程内存空间并执行任意代码，最终获取 root 权限。该漏洞影响 SCO OpenServer 5.0 全系列版本，攻击者需拥有本地系统访问权限，无需身份认证即可利用，CVSS 评分 7.2，危害等级高。目前已有公开的 ExploitDB 利用代码，建议用户升级至最新版本或应用厂商补丁。"
published = "2001-08-22T04:00:00.000"
remediation = "建议立即迁移至受支持的操作系统（如 Linux 或现代 UNIX 衍生版），因 SCO OpenServer 已于 2013 年停止支持，官方不再提供安全补丁。作为临时缓解措施，可移除 /usr/bin/recon 的 setuid 权限（执行 chmod u-s /usr/bin/recon），并将 recon 程序仅授权给受信任的管理员用户执行，限制普通本地用户的访问权限。"
score = 7.2
severity = "HIGH"
sources = ["exploitdb"]
title = "SCO OpenServer recon 缓冲区溢出漏洞"
updated = "2026-06-16T21:54:34.093"

