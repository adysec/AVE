[basic]
description = "SCO OpenServer 5.0.6 的 lpshut 工具存在缓冲区溢出漏洞，本地攻击者可通过向 lpshut 传递超长的第一个参数触发缓冲区溢出，从而获取额外的系统权限。该漏洞影响 SCO OpenServer 5.0.6 版本，攻击者需要拥有本地访问权限，利用难度较低，成功利用后可实现权限提升，对系统机密性、完整性和可用性均造成部分影响。"
published = "2001-08-22T04:00:00.000"
remediation = "建议升级到 SCO OpenServer 5.0.7 或安装 SCO 官方安全补丁（参见 SCO 安全公告 CSSA-2001-SCO.8）。如无法升级，可移除 lpshut 的 setuid 位（chmod u-s /usr/bin/lpshut），限制仅授权管理员可执行，并通过文件系统权限阻止非信任用户访问该二进制文件。"
score = 4.6
severity = "MEDIUM"
sources = ["exploitdb"]
title = "SCO OpenServer 5.0.6 lpshut 缓冲区溢出漏洞"
updated = "2026-06-16T21:54:33.873"

