[basic]
description = "Microsoft Office 及 Word Viewer 存在内存损坏漏洞（CWE-787），影响 Microsoft Office 2007 SP3、Office 2010 SP2、Office 2013 SP1 及 Word Viewer 等版本。攻击者可通过构造包含恶意内容的特制 Office 文档（如 Word 文档），诱使用户打开该文档来触发漏洞。当程序未能正确处理文档中的畸形数据时，会引发越界写入（Out-of-bounds Write），导致内存损坏。攻击者可利用此漏洞在受影响系统上执行任意代码，获取与当前用户相同的权限。该漏洞无需身份认证，但需要用户主动打开恶意文件（如通过邮件附件、网页下载等方式分发），成功利用后可完全控制受害者系统。Microsoft 已于 2015 年 8 月安全更新中修复此漏洞，该漏洞已被 CISA 纳入已知被利用漏洞目录。"
published = "2015-08-15T00:59:00.110"
remediation = "立即安装 Microsoft 安全公告 MS15-081 (KB3080790) 对应的补丁：Office 2007 SP3 安装 KB2687409，Office 2010 SP2 安装 KB2965310，Office 2013 SP1 安装 KB3039734。可通过 Windows Update 自动更新或从 Microsoft Update Catalog 手动下载。Word Viewer 已停止支持，建议卸载并迁移至 Microsoft 365 或受支持的 Office 版本。若无法立即打补丁，应启用 Office 文件阻止规则禁止打开来源不明的文档，并部署终端防护软件拦截恶意文件。"
score = 7.8
severity = "HIGH"
sources = ["kev"]
title = "Microsoft Office/Word Viewer 远程代码执行漏洞"
updated = "2026-06-17T00:22:45.180"

