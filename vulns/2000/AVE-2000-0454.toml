[basic]
description = "Bugzilla 的 process_bug.cgi 脚本存在命令注入漏洞，远程攻击者可通过向该脚本提交包含 shell 元字符（如反引号、管道符等）的特制请求，在目标服务器上以 Web 服务进程权限执行任意系统命令。该漏洞影响 Bugzilla 早期版本，攻击者无需身份认证即可利用，可能导致服务器被完全控制、数据泄露或进一步内网渗透。利用方式简单，仅需构造恶意 HTTP 请求即可触发。"
published = "2000-05-11T04:00:00.000"
remediation = "升级 Bugzilla 至 2.12 或更高版本。具体操作：从 https://www.bugzilla.org/download/ 下载 2.12 及以上版本，备份现有数据库和配置文件后执行升级脚本。如无法立即升级，可在 Web 服务器层面对 process_bug.cgi 实施访问控制，限制仅授权 IP 可访问，并禁用 CGI 对 shell 元字符的传递。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "Bugzilla process_bug.cgi 远程代码执行漏洞"
updated = "2026-06-16T21:51:41.833"

