[basic]
description = "多个 Cisco 统一通信产品存在目录遍历漏洞（CVE-2011-3315，CNVD-2011-4503），影响 Cisco Unified Communications Manager (CUCM) 5.x、6.x（6.1(5)SU2 前）、7.x（7.1(5b)SU2 前）、8.x（8.0(3) 前），以及 Cisco Unified Contact Center Express (UCCX) 与 Unified IP IVR 多个版本（6.0(1)SR1ES8 前、7.0(x)（7.0(2)ES1 前）、8.0(x) 至 8.0(2)SU3、8.5(x)（8.5(1)SU2 前））。攻击者可通过构造包含目录遍历序列（如 `../`）的恶意 URL 请求，利用 `file` 参数处理缺陷，未经身份认证即可遍历目录读取服务器上任意文件（如配置文件、日志、敏感凭证等），CVSS 评分 7.8（高危），CWE-22 目录遍历。攻击条件为攻击者可网络访问目标 Web 管理接口，无需认证。利用方式为发送包含 `../` 序列的 HTTP 请求读取敏感文件。Cisco 已发布补丁修复（CSCth09343、CSCts44049）。"
published = "2011-10-27T21:55:00.823"
remediation = "建议将 Cisco Unified Communications Manager (CUCM) 升级至 6.1(5)SU2、7.1(5b)SU2 或 8.0(3) 及以上版本；将 Cisco Unified Contact Center Express (UCCX) 与 Unified IP-IVR 升级至 6.0(1)SR1ES8、7.0(2)ES1、8.0(2)SU3 或 8.5(1)SU2 及以上版本。如暂时无法升级，应在边界防火墙或反向代理上限制对 CUCM/UCCX Web 管理接口的源 IP 访问并禁用不必要的 HTTP 目录访问，以缓解任意文件读取风险。"
score = 7.8
severity = "HIGH"
sources = ["nuclei"]
title = "Cisco Unified Communications Manager 及 Unified Contact Center Express 目录遍历漏洞"
updated = "2026-06-16T23:33:04.147"

