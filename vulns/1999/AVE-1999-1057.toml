[basic]
description = "Linux 内核 2.3.18 之前版本及 2.2.13pre15 之前版本中，启用了 SLIP 和 PPP 选项时存在数据伪造漏洞。本地低权限用户可通过向 tty 设备发送 TIOCSETD 选项来伪造 IP 数据包，实现网络身份冒用或数据欺骗，破坏网络层通信完整性。该漏洞影响早期 Linux 内核发行版。"
published = "1999-10-22T04:00:00.000"
remediation = "升级 Linux 内核至 2.2.13pre15 及以上版本（2.2.x 系列）或 2.3.18 及以上版本（2.3.x 系列），新版本已禁用未授权用户通过 TIOCSETD 选项操作 tty 设备，防止本地用户伪造 IP 数据包。"
score = 4.6
severity = "MEDIUM"
sources = ["avd"]
title = "Linux Kernel SLIP/PPP 本地IP数据包伪造漏洞"
updated = "2026-06-16T21:50:14.073"

