[basic]
description = "Sapio WebReflex 1.55 HTTPd 存在缓冲区溢出漏洞，远程攻击者可通过向目标服务器发送特制的超长 HTTP GET 请求触发该漏洞，导致服务崩溃拒绝服务，在特定条件下可能实现远程命令执行。该漏洞利用难度较低，无需认证即可远程触发，影响使用 WebReflex 1.55 版本的 Web 服务。"
published = "2001-05-03T04:00:00.000"
remediation = "升级到 WebReflex 1.56 或更高版本（若厂商已停止维护，则建议迁移至 Apache/Nginx 等现代 Web 服务器）。临时缓解措施：在反向代理或防火墙上限制 HTTP GET 请求 URI 长度不超过 4096 字节，过滤超长请求。同时限制源 IP 访问 WebReflex 管理端口以缩小攻击面。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Sapio WebReflex 1.55 HTTPd 缓冲区溢出漏洞"
updated = "2026-06-16T21:54:03.153"

