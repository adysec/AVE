[basic]
description = "NullSoft Winamp 2.10 播放器在处理 .pls 播放列表文件时存在缓冲区溢出漏洞，远程攻击者可向受害者发送特制的包含超长条目的 .pls 文件，当用户使用 Winamp 打开该恶意文件时触发缓冲区溢出，导致攻击者能够在目标系统上执行任意命令。该漏洞影响 Winamp 2.10 及更早版本，CVSS 评分 7.2，危害等级高。"
published = "2000-01-04T05:00:00.000"
remediation = "升级 Winamp 至 2.11 或更高版本，该漏洞在 2.11 中已修复。如无法升级，避免打开来源不明的 .pls 播放列表文件，并可在文件关联设置中取消 .pls 后缀与 Winamp 的自动关联作为临时缓解措施。当前最新 Winamp 5.x 版本不受此漏洞影响。"
score = 7.2
severity = "HIGH"
sources = ["exploitdb"]
title = "NullSoft Winamp 2.10 播放列表文件缓冲区溢出漏洞"
updated = "2026-06-16T21:50:53.757"

