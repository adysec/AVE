[basic]
description = "Sudo 1.9.17p1 之前版本存在安全配置缺陷，本地攻击者可通过 --chroot 选项结合用户控制的 /etc/nsswitch.conf 文件，在 chroot 环境中触发 NSS（名称服务切换）库机制加载恶意共享对象，从而获得 root 权限。该漏洞影响 Linux 系统上的 Sudo 程序，攻击者需具备本地用户权限即可利用，CVSS 评分 9.3，危害等级严重。Sudo 官方已在 1.9.17p1 版本中修复此漏洞。"
published = "2025-06-30T21:15:30.257"
remediation = "升级 sudo 至 1.9.17p1 及以上版本。对于无法立即升级的系统，可限制用户使用 `sudo --chroot` 选项的权限，通过 `/etc/sudoers` 移除或注释掉不必要的 chroot 规则，或使用 `!chroot` 禁用该功能。如无需 chroot 功能，可卸载 sudo 并改用 doas 作为替代。"
score = 9.3
severity = "CRITICAL"
sources = ["hwpoc"]
title = "Sudo chroot 本地权限提升漏洞"
updated = "2026-06-17T09:12:02.147"

