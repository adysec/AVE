[basic]
description = "PALS Library System WebPALS 1.0 的 pals-cgi 程序存在目录遍历漏洞，远程攻击者可通过向 documentName 参数传递 `..`（点点）序列绕过路径限制，读取服务器上的任意文件。该漏洞无需身份认证，攻击者可通过 HTTP 请求直接利用，可能导致敏感配置文件和系统文件泄露。"
published = "2001-06-02T04:00:00.000"
remediation = "对 pals-cgi 程序的 documentName 参数进行严格的输入校验，拒绝包含 ../ 等目录遍历序列的请求；升级 PALS Library System 至官方修复版本；如厂商已不再维护，建议迁移至其他受支持的图书馆管理系统，并在 Web 服务器层添加规则阻断包含路径遍历特征的 CGI 请求。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "PALS Library System WebPALS 1.0 目录遍历任意文件读取漏洞"
updated = "2026-06-16T21:53:54.110"

