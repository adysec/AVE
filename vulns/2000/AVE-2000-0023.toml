[basic]
description = "Microsoft IIS 在处理 URL 规范化时存在安全绕过漏洞，远程攻击者可通过在 URL 中插入特殊转义字符（如 `%` 编码序列）绕过第三方软件和 IIS 自身的访问控制限制，非法访问受限资源。该漏洞影响 IIS 4.0 及早期版本，攻击者无需认证即可利用，CVSS 评分 6.4，危害等级中等。Microsoft 已发布安全公告并建议用户安装相应补丁进行修复。"
published = "1999-12-21T05:00:00.000"
remediation = "安装 Microsoft 安全公告 MS00-023 提供的补丁，升级 IIS 至最新版本。在 IIS 管理器中禁用 URL 中的转义字符解析功能，并在 Web 服务器上配置 URLScan 工具拦截恶意 URL 请求。同时限制第三方软件对 IIS 的访问权限，实施最小权限原则。"
score = 6.4
severity = "MEDIUM"
sources = ["avd"]
title = "Microsoft Internet Information Server URL解析安全绕过漏洞"
updated = "2026-06-16T21:50:50.710"

