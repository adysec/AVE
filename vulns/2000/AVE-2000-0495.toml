[basic]
description = "Texas Imperial Software 开发的 WFTPD 及 WFTPD Pro 2.41 版本存在拒绝服务漏洞。远程攻击者可在 LIST 命令执行过程中同时发送 STAT 命令，导致 FTP 服务进程崩溃或停止响应，造成拒绝服务。该漏洞无需身份认证即可触发，攻击条件简单，影响 WFTPD 2.34、2.40、2.4.1 及 2.4.1 RC11 等多个版本。"
published = "2000-07-21T04:00:00.000"
remediation = "升级 WFTPD / WFTPD Pro 至 2.41 RC12 或更高版本。如无法升级，在防火墙或 TCP Wrappers 层面限制 FTP 服务仅允许可信 IP 访问，并禁用匿名用户执行 STAT/LIST 命令的权限。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Texas Imperial Software WFTPD STAT/LIST 命令处理拒绝服务漏洞"
updated = "2026-06-16T21:52:10.607"

