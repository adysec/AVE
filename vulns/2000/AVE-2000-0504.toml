[basic]
description = "NetBSD 内核存在 CPU 资源未释放漏洞，本地攻击者可通过反复执行某些不会主动让出 CPU 的系统调用来耗尽处理器资源，导致系统拒绝服务。该漏洞影响 NetBSD 1.4.2 及更早版本，攻击者需具有本地用户权限，利用难度低但影响范围有限，属于本地低权限拒绝服务漏洞。"
published = "2000-05-28T04:00:00.000"
remediation = "升级 NetBSD 内核至 1.4.2 以上版本（当前版 20000420 后已修复），或从 ftp://ftp.NetBSD.org/pub/NetBSD/misc/security/patches/20000527-yield 下载补丁，以 patch(1) 打入内核源码树后重新编译安装并重启。临时缓解措施可禁用 ktrace 功能并限制不可信用户的本地登录权限。"
score = 2.1
severity = "LOW"
sources = ["cve"]
title = "NetBSD 内核 CPU 资源耗尽拒绝服务漏洞"
updated = "2026-06-16T21:51:46.423"

