[basic]
description = "INN（InterNetNews）新闻服务器中的 inndstart 程序存在权限提升漏洞，本地攻击者可通过设置 INNCONF 环境变量指定恶意配置文件，从而以提升后的权限执行任意操作。该漏洞影响早期版本的 INN 新闻服务器软件，攻击者需具备本地系统访问权限，利用方式简单，可导致系统完全受控。建议升级至最新版本以修复此漏洞。"
published = "1999-05-11T04:00:00.000"
remediation = "升级 INN 至 2.2 及以上版本，该漏洞已在后续版本中修复。无法升级时，移除 inndstart 的 SUID 位（chmod u-s /usr/bin/inndstart），或限制用户对 INNCONF 环境变量的设置权限，避免低权限用户通过该变量加载恶意配置文件提升权限。"
score = 10
severity = "CRITICAL"
sources = ["cve"]
title = "ISC INN inndstart 本地权限提升漏洞"
updated = "2026-06-16T21:48:59.240"

