[basic]
description = "QuakeWorld 2.10 存在缓冲区溢出漏洞，远程攻击者可通过向目标服务器发送超长的初始连接数据包触发该漏洞，导致服务崩溃（拒绝服务），在特定条件下可能实现任意代码执行。该漏洞影响 QuakeWorld 2.10 及更早版本，攻击无需身份认证，危害等级高。"
published = "1998-04-07"
remediation = "QuakeWorld 2.10 已停止维护，建议升级至社区维护的现代版本（如 ezQuake、FTE QuakeWorld），这些版本已修复该缓冲区溢出漏洞；临时缓解措施可在防火墙限制对 UDP 27500 端口的入站访问，仅允许可信 IP 连接。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "id Software QuakeWorld 缓冲区溢出漏洞"
updated = "2026-06-16"

