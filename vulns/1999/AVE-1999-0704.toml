[basic]
description = "Axent Raptor Firewall 6.0 的 IP 协议栈在处理包含畸形零长度 IP 选项字段的 IP 数据包时存在缺陷，远程攻击者无需身份认证即可构造并发送特制 IP 数据包触发该漏洞，导致防火墙服务崩溃或停止响应，无法正常执行访问控制与流量过滤功能，造成拒绝服务。该漏洞影响运行 Axent Raptor Firewall 6.0 版本的系统，攻击者只要能通过网络访问防火墙，即可发送含有畸形零长度 IP 选项字段的数据包发起攻击，利用门槛低、无需交互。"
published = "1999-10-21T04:00:00.000"
remediation = "Axent Raptor Firewall 6.0 已停止技术支持，建议立即升级至仍在维护的现代防火墙产品（如 Symantec 或其他厂商的下一代防火墙），并在升级前在网络边界配置 ACL 规则过滤含有畸形 IP 选项的数据包作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Axent Raptor Firewall 6.0 拒绝服务漏洞"
updated = "2026-06-16T21:49:18.040"

