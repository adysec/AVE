[basic]
description = "该漏洞存在于 Windows 95、98 及 NT 4.0 的 Windows 帮助（.hlp）与内容（.cnt）文件处理机制中。当用户打开特制的帮助文件时，操作系统会依据 .cnt 文件中的配置执行关联的命令或程序，攻击者可构造恶意的帮助与内容文件，诱导本地用户打开后在目标系统上以当前用户权限执行任意命令。攻击需满足两个条件：一是攻击者能够将恶意 .hlp/.cnt 文件放置到本地用户可访问的位置（如共享目录或用户目录），二是受害者在本地交互式会话中打开了该帮助文件。此问题属于本地执行类漏洞，主要影响多用户环境下的权限隔离与本地安全。"
published = "1999-12-10T05:00:00.000"
remediation = "立即安装 Microsoft 于 1999 年 12 月发布的安全补丁：Windows NT 4.0 升级至 Service Pack 6a 或安装对应安全汇总补丁，Windows 95/98 安装对应安全更新。临时缓解措施：限制普通用户对 Program Files 目录、Windows 帮助目录及共享目录中 .cnt 文件的写入权限，并禁止用户自行放置或编辑 .hlp/.cnt 帮助文件，降低本地命令执行风险。"
score = 4.6
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Microsoft Windows 95/98/NT 4.0 帮助文件本地命令执行漏洞"
