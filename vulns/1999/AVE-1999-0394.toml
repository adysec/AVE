[basic]
description = "HP-UX 10/11、IRIX 3/4/5/6、Solaris 8/9/10 及 SunOS 4.1 等多个 UNIX 系统中的 NIS（网络信息服务）组件 rpc.ypupdated 服务存在远程命令执行漏洞。未经身份认证的攻击者可通过向目标系统的 RPC 服务发送特制请求，利用 ypupdated 服务在处理更新操作时未对用户输入进行充分过滤的缺陷，在远程系统上以 root 权限执行任意命令，完全控制目标主机。CVSS 评分 10.0，危害等级严重。"
published = "1995-12-12T05:00:00.000"
remediation = "立即停止并禁用 rpc.ypupdated 服务（`/etc/init.d/nis stop; chkconfig nis off`），在防火墙层面阻止对 RPC 端口 111 和 ypupdated 动态端口的访问。对仍需要使用 NIS 的环境，迁移至基于 Kerberos 认证的 LDAP 或 FreeIPA，并限制 NIS 域仅对受信网段开放。若系统已达生命周期，建议升级至受支持的操作系统版本。"
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "多厂商 NIS rpc.ypupdated 远程命令执行漏洞"
updated = "2026-06-16T21:47:54.850"

