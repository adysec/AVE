[basic]
description = "IBM AIX 4.3 操作系统自带的 nslookup 工具存在缓冲区溢出漏洞。该漏洞源于 nslookup 在解析和处理用户传入的 hostname 命令行参数时，未对输入长度进行边界校验，导致超长字符串会溢出预设缓冲区。本地已登录的普通用户可通过在命令行向 nslookup 传入超长 hostname 参数触发该溢出，从而覆盖相邻内存并劫持程序执行流，最终以当前用户权限执行任意代码。该漏洞影响运行 AIX 4.3 版本的系统，攻击条件为攻击者在目标主机拥有本地登录或命令执行权限，无需远程网络访问即可利用。"
published = "1999-09-30T04:00:00.000"
remediation = "升级到已修复该漏洞的 AIX 4.3.3 后续补丁级别或 AIX 5L 版本；如暂无法升级，应限制普通用户对 nslookup 的执行权限（如移除 setuid 位、通过 sudo 限定授权用户），并避免以特权用户身份传入不可信的长 hostname 参数作为临时缓解措施。"
score = 7.2
severity = "HIGH"
sources = ["cve"]
