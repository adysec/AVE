[basic]
description = "PHP 3.0.13 的 safe_mode 功能在调用 popen 执行命令时未能正确过滤 shell 元字符，远程攻击者可通过向使用 popen 函数且开启 safe_mode 的 PHP 应用程序提交特制输入，注入恶意 shell 命令并执行，导致远程代码执行。该漏洞影响 PHP 3.0.13 版本，CVSS 评分高达 10.0，危害等级严重。目前官方已停止维护该版本，建议升级至修复版本或关闭 safe_mode 并采用其他安全措施。"
published = "2000-01-04T05:00:00.000"
remediation = "升级 PHP 至 3.0.14 或更高版本，该版本修复了 popen() 函数在 safe_mode 开启时未正确过滤 shell 元字符的问题。如无法升级，应禁用 popen()、exec()、system() 等命令执行函数，并对所有用户输入进行严格的 escapeshellarg() 过滤，避免直接传入 shell 环境。长期方案应迁移至受支持的 PHP 版本（如 8.x），并停用已废弃的 safe_mode 机制，改用正规权限控制方案。"
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "PHP PHP 3.0.13 Safe Mode 绕过漏洞"
updated = "2026-06-16T21:50:55.000"

