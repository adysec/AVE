[basic]
title = "Microsoft Internet Explorer 跨帧安全策略绕过漏洞"
description = "Internet Explorer 5.0 及 5.01 版本中存在跨框架安全策略绕过漏洞。远程攻击者可通过构造恶意网页，利用 external.NavigateAndFind() 函数绕过同源策略限制，读取目标用户本地文件系统中的任意文件。攻击者需诱使用户访问恶意页面即可触发，无需额外认证。该漏洞影响 IE 4/5/5.5/5.0.1 等多个版本，CVSS 评分 2.6，危害等级低。"
severity = "LOW"
score = 2.6
sources = ["cve"]
published = "1999-12-23"
updated = "2026-06-16"
remediation = "停止使用受影响的 Internet Explorer 4/5/5.5/5.0.1 等版本，升级到更高版本或改用当前受支持的现代浏览器。临时缓解可在 Internet 选项的安全自定义级别中禁用“活动脚本”，并避免打开不可信网页或 HTML 邮件，以降低跨帧脚本读取本地文件的风险。"
