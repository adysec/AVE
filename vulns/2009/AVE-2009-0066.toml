[basic]
description = "Adobe Reader 和 Acrobat 的 Collab 对象 getIcon 方法存在栈缓冲区溢出漏洞，攻击者可通过构造特制参数诱导用户打开恶意 PDF 文件触发该漏洞，导致远程代码执行。该漏洞影响 Adobe Reader/Acrobat 7.1.1 之前、8.1.3 之前及 9.1 之前的版本，CVSS 评分 8.8，危害等级高危。用户需升级至最新版本修复。"
published = "2009-03-19T10:30:00.420"
remediation = "Adobe 已于 2009 年发布安全更新修复此漏洞，请立即升级 Adobe Reader 及 Acrobat 至 9.1 及以上版本（或 8.1.3/7.1.1 及以上版本）。若无法升级，建议在浏览器中禁用 Adobe Reader 插件（关闭 PDF 预览），并使用其他 PDF 阅读器打开可疑文档作为临时缓解措施。"
score = 8.8
severity = "HIGH"
sources = ["kev"]
title = "Adobe Acrobat Reader 堆栈缓冲区溢出漏洞"
updated = "2026-06-16T23:06:07.490"

