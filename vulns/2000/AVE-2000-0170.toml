[basic]
description = "Corel Linux 1.0 系统中 Dosemu（DOS 模拟器）的默认配置存在权限配置不当漏洞。本地攻击者可利用 Dosemu 分发配置中的缺陷，执行 system.com 程序，从而获取系统特权权限。该漏洞允许低权限用户在未授权情况下提升至 root 权限，影响 Corel Linux 1.0 版本，CVSS 评分 7.2，危害等级高。建议用户修改 Dosemu 配置文件或升级至修复版本。"
published = "2000-03-02T05:00:00.000"
remediation = "Corel Linux 已于 2000 年停止维护，建议立即迁移至受支持的 Linux 发行版（如 Ubuntu LTS 或 Debian）。作为临时缓解措施，可通过移除 dosemu 软件包（`apt-get remove dosemu`）或限制 dosemu 可执行文件的用户组权限（`chmod 750 /usr/bin/dosemu`）来阻止本地非授权用户利用 system.com 提权。"
score = 7.2
severity = "HIGH"
sources = ["cve"]
title = "Corel Linux Dosemu 本地权限提升漏洞"
updated = "2026-06-16T21:51:11.730"

