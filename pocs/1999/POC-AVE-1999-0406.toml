[info]
author = "ave"
description = "Squid 代理服务器的 cachemgr.cgi 管理脚本默认安装至公开 CGI 目录且无认证，远程攻击者可通过发送 HTTP GET 请求构造 host 和 port 参数将其作为跳板代理，实现对内网其他主机的端口扫描。PoC 验证能否通过 cachemgr.cgi 访问指定目标地址。"
id = "POC-AVE-1999-0406"
name = "Squid cachemgr.cgi 未授权连接 PoC"
severity = "high"
tags = ["ave-1999-0406"]
vuln_id = [
    "CVE-1999-0710",
    "AVE-1999-0406",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/cgi-bin/cachemgr.cgi"
protocol = "http"

[poc.requests.body]
content = ""
type = "raw"

[poc.requests.headers]
User-Agent = "Mozilla/4.0"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "Cache Manager",
    "cachemgr",
    "Enter hostname and port",
]
