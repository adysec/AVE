[basic]
description = "Ollama for Windows 的自动更新机制存在下载包完整性验证缺失漏洞（CWE-494），其 Windows 平台的更新验证函数始终返回成功状态，导致无论数字签名是否有效，下载的更新程序均会被执行。攻击者可通过中间人攻击或劫持更新通道替换为恶意程序，利用 Ollama 静默自动更新机制在用户无感知情况下安装任意代码。该漏洞影响 Ollama for Windows 0.12.10 至 0.17.5 版本，CVSS 评分 7.7，危害等级高。厂商截至披露时未发布官方修复版本。"
published = "2026-04-29T12:16:18.917"
remediation = '截至漏洞披露，Ollama 官方未发布修复版本。立即将 Ollama for Windows 降级或替换为可手动校验更新的版本；在防火墙/代理层面拦截 `update.ollama.ai` 域名及 `%APPDATA%\Ollama\update` 目录的出站请求，彻底阻断自动更新通道；使用 Windows AppLocker 或软件限制策略锁定 `ollama.exe` 仅允许执行受信任路径下的已签名二进制；删除 `%APPDATA%\Ollama\update` 目录中所有非手动确认的 `.exe` 文件并移除该目录的写入权限；在系统计划任务和启动项中排查并清除由恶意更新添加的持久化条目。'
score = 7.7
severity = "HIGH"
sources = ["hwpoc"]
title = "Ollama Ollama for Windows 更新签名缺失远程代码执行漏洞"
updated = "2026-06-17T10:47:34.423"

