[basic]
description = "Linux 内核的 tracing 子系统中的 tracing_cpumask_write 函数存在输入验证缺陷，当用户写入一个过大的 count 值时，会触发 bitmap_parse_user 中的告警（WARNING），导致内核崩溃。本地低权限攻击者可通过向 /sys/kernel/tracing/tracing_cpumask 写入特制的大数值触发该漏洞，造成系统拒绝服务。该漏洞影响 Linux 主线内核，CVSS 评分 5.5，危害等级中等。"
published = "2025-01-06T17:15:42.150"
remediation = "立即将 Linux 内核升级至以下修复版本：5.10.233、5.15.176、6.1.123、6.6.69、6.12.8 或 6.13 及以上版本。对应发行版用户请安装各自厂商提供的更新包（如 Debian 用户通过 `apt update && apt upgrade` 安装 DLA-4075 更新，Ubuntu 用户安装 USN-7381-1 更新）。如无法立即升级，可通过 `echo 0 > /proc/sys/kernel/tracing_cpumask` 禁用 tracing_cpumask 写入功能作为临时缓解措施。"
score = 5.5
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux Kernel tracing 模块输入验证不当导致拒绝服务漏洞"
updated = "2026-06-17T08:12:56.020"

