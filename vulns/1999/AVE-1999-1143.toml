[basic]
description = "3Com SuperStack II hub 运行软件版本 2.10 的管理信息库（MIB）中存在信息泄露漏洞。该 MIB 对象标识符 .1.3.6.1.4.1.43.10.4.2 在只读 community string 权限下即可访问，但却会列出完整的 community string 表格，导致远程攻击者可通过 SNMP 协议获取敏感配置信息，进而利用泄露的 community string 对设备执行未授权管理操作。CVSS 评分 7.5，危害等级高。"
published = "1999-08-30T04:00:00.000"
remediation = "立即升级 3Com SuperStack II hub 固件至最新版本（如支持）；限制 SNMP 访问来源 IP，仅允许可信管理主机访问 UDP 161/162 端口；修改默认 SNMP read-only/read-write community strings 为强密码字符串；若网络管理不需要 SNMP 协议，则在设备上禁用 SNMP 服务；在网络边界防火墙封禁来源不明的 SNMP 请求（UDP 161），防止外部攻击者利用 MIB 泄露 community 表。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "3Com SuperStack II hub Management Information Base 信息泄露漏洞"
updated = "2026-06-16T21:50:36.093"

