[basic]
description = "Linux 2.0.x及2.1.x内核中，AMD K6处理器存在一个bug，本地用户通过执行特定的指令序列（可能涉及访问段外地址）可导致系统崩溃，造成拒绝服务。该漏洞利用条件低，本地用户无需特殊权限即可触发，影响系统可用性。"
published = "1998-06-22"
remediation = "升级Linux内核至2.0.40及以上版本或2.1.133及以上版本，该漏洞已在后续内核版本中修复。"
