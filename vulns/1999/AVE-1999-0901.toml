[basic]
description = "Matt Wright FormHandler.cgi 脚本存在目录遍历漏洞，远程攻击者无需身份验证即可通过构造包含 ..（点号）的 reply_message_attach 附件参数，或通过将文件名指定为模板的方式，读取服务器上的任意文件内容。该漏洞影响部署了 FormHandler.cgi 2.0 版本的 Web 服务器，攻击者可利用此漏洞获取敏感配置文件、密码文件等系统文件，造成信息泄露。"
published = "1999-11-12T05:00:00.000"
remediation = '立即升级 Matt Wright FormHandler.cgi 至官方修复版本（如 3.0 及以上），并删除 Web 目录下旧版脚本。在脚本中配置 allowed_path 白名单仅允许访问附件目录，禁止 reply_message_attach 与模板参数包含 "../" 或绝对路径。作为临时缓解，可在 Web 服务器（如 Apache）通过 .htaccess 禁用该 CGI 的附件参数提交，或限制 cgi-bin 目录的文件读取权限为仅脚本执行。'
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Matt Wright FormHandler.cgi 远程目录遍历漏洞"
updated = "2026-06-16T21:49:36.070"

