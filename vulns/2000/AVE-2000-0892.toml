[basic]
description = "SuSE Linux 及其他使用 linuxnfs/knfsd 包的系统中，rpc.kstatd 服务存在字符串格式化解析漏洞。由于程序在处理用户输入时未正确验证格式化字符串，未经身份认证的远程攻击者可通过发送精心构造的恶意 RPC 请求，触发格式化字符串漏洞实现任意代码执行，从而获取系统 root 权限。该漏洞影响 SuSE Linux 及所有部署了受影响版本 knfsd/nfs-utils 的 Linux 发行版，CVSS 评分 10.0（AV:N/AC:L/Au:N/C:C/I:C/A:C），属于最高危级别。攻击者无需本地访问权限即可远程利用，危害极大。建议尽快升级至修复版本的 nfs-utils 或 knfsd 包，并限制 rpc 服务的网络暴露面。"
published = "2000-10-20T04:00:00.000"
remediation = "根据 SuSE Security Announcement #58（2000年10月），建议立即升级 SuSE Linux 的 linuxnfs 或 knfsd 软件包至 SuSE 官方发布的安全补丁版本，可通过 SuSE 的 YaST 在线更新工具或 FTP 镜像站点获取修复后的 nfs-utils 和 knfsd 相关 RPM 包。如暂无法立即打补丁，应在防火墙或 iptables 规则中限制对 rpc.kstatd 服务端口（端口 111 及 NFS 相关端口）的访问，仅允许受信任网络的主机访问。同时建议在禁用的服务列表中将 nfs 和 statd 相关启动脚本设为不自动启动，以减少攻击面。"
score = 10
severity = "CRITICAL"
sources = ["cve"]
title = "SuSE Linux linuxnfs/knfsd rpc.kstatd 远程权限提升漏洞"
updated = "2026-06-16T21:52:30.447"

