[basic]
description = "Allaire Forums 2.0.5 存在安全绕过漏洞，远程攻击者无需认证即可通过构造 rightAccessAllForums 或 rightModerateAllForums 变量参数，绕过论坛中受保护讨论区的访问控制权限，非法访问或操作本应受限的会议内容。该漏洞影响 Allaire Forums 2.0.5 及更早版本，CVSS 评分 6.4，危害等级中危，建议升级至最新版本。"
published = "2000-04-03T04:00:00.000"
remediation = "升级至 Allaire Forums 2.0.6 或更高版本可修复此漏洞；如果产品已无法获取更新，建议在 Web 服务器层面对 /forums/ 路径实施 IP 白名单访问控制，并禁止外部用户通过 URL 参数直接传递 rightAccessAllForums 或 rightModerateAllForums 变量。鉴于 Allaire 已被收购且产品已停止维护，长远方案应迁移至当前仍受支持的论坛系统。"
score = 6.4
severity = "MEDIUM"
sources = ["epss"]
title = "Allaire Forums 安全绕过漏洞"
updated = "2026-06-16T21:51:25.410"

