[basic]
description = "Z Object Publishing Environment (Zope) 的 DTML（文档模板标记语言）实现存在权限绕过漏洞，远程攻击者无需身份认证即可构造特制的 DTML 标签，调用受保护的方法执行未授权操作，包括读取或修改服务器上的敏感文件。该漏洞影响 Zope 2.1.1 及更早版本，攻击者仅需能访问 Zope 管理端口的网络连接即可发起攻击，危害等级严重。"
published = "2000-01-04"
remediation = "升级到 Zope 2.1.2 或更高版本；临时缓解可在 Zope 访问控制配置中限制 DTML 方法的调用权限，禁止匿名用户访问敏感 DTML 文档，并对管理端口设置网络访问控制。"
score = 10.0
severity = "CRITICAL"
sources = ["cve"]
title = "Zope DTML 文档模板未授权操作权限绕过漏洞"
updated = "2026-07-18"

