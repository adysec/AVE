[basic]
description = "Linux 内核 AMD GPU 显示驱动（drm/amd/display）中存在数组索引越界漏洞，由于未对数组下标进行有效边界检查，攻击者可利用特制的显示操作触发越界写入，导致内存损坏。本地低权限攻击者可通过加载恶意显示配置或触发特定显示路径利用此漏洞，实现权限提升至内核态，进而完全控制系统。该漏洞影响所有使用 AMD 显卡驱动且未更新补丁的 Linux 内核版本，CVSS 评分 7.8，危害等级高。"
published = "2025-01-08T18:15:19.357"
remediation = "立即将 Linux 内核升级至 6.12.5 或更高版本（6.13+），对应补丁 commit 为 dff526dc3e27f5484f5ba11471b9fbbe681467f2 和 2c437d9a0b496168e1a1defd17b531f0a526dbe9。Ubuntu 24.04 LTS 用户请安装 USN-7381-1 安全更新。如无法立即升级，可通过内核模块黑名单禁用 amdgpu 驱动模块（/etc/modprobe.d/blacklist-amdgpu.conf 中添加 blacklist amdgpu）作为临时缓解措施。"
score = 7.8
severity = "HIGH"
sources = ["msrc"]
title = "Linux kernel AMD Display 数组越界内存损坏漏洞"
updated = "2026-06-17T08:12:59.213"

