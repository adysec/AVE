[basic]
description = "ISC DHCP 服务器（dhcpd）1.0 和 2.0 版本存在多处缓冲区溢出漏洞。远程攻击者可通过向目标 DHCP 服务器发送包含超长选项字段的恶意数据包，触发缓冲区溢出，导致服务进程崩溃，造成拒绝服务，甚至可能利用该漏洞执行任意代码。该漏洞影响大量使用 ISC DHCP 服务的网络环境，攻击条件简单，危害严重。"
published = "1999-12-31T05:00:00.000"
remediation = "建议立即升级 ISC DHCP 至 3.0 或更高版本，该版本已修复 dhcpd 1.0/2.0 中的缓冲区溢出漏洞。如无法立即升级，可在边界防火墙上限制对 DHCP 服务器 UDP 67/68 端口的访问，仅允许受信任的子网段通信作为临时缓解措施。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "ISC DHCP 远程缓冲区溢出漏洞"
updated = "2026-06-16T21:49:05.993"

