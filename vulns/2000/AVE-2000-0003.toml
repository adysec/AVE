[basic]
description = "RealNetworks RealServer 5.0 的 ramgen 组件存在缓冲区溢出漏洞。远程攻击者通过向目标服务器发送超长的 ramgen 请求，可触发该漏洞导致服务崩溃，造成拒绝服务。该漏洞影响 RealServer 5.0 版本，CVSS 评分 5.0，危害等级中等。攻击无需身份认证，条件简单，仅需向目标发送恶意构造的 HTTP 请求即可触发。"
published = "1999-12-23T05:00:00.000"
remediation = "建议立即升级至 RealNetworks RealServer 8.0 或更高版本，该版本已修复 ramgen 长请求导致的拒绝服务漏洞。如无法升级，可在反向代理层对 `/ramgen` 路径的 GET 请求参数长度做限制（建议不超过 1024 字节），并配置防火墙仅允许可信 IP 访问 RealServer 服务端口（554/7070/8080），以降低攻击面。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "RealNetworks RealServer 5.0 ramgen 拒绝服务漏洞"
updated = "2026-06-16T21:50:47.890"

