[basic]
description = "gnapster 和 knapster Napster 客户端未正确限制仅允许访问 MP3 文件，存在路径遍历漏洞。远程攻击者可通过向客户端指定任意文件的完整路径名，读取目标系统上的任意文件，导致敏感信息泄露。该漏洞影响 Knapster 0.9 及 1.3.8 版本，CVSS 评分 7.5，危害等级高。攻击者无需身份认证即可利用，且已有公开的利用代码。"
published = "1999-05-01T04:00:00.000"
remediation = "立即升级 gnapster/knapster 至已修复该漏洞的版本（参考 FreeBSD-SA-00:18 安全公告），或在客户端防火墙中限制 Napster 客户端仅允许访问 MP3 目录的出站连接。如无法升级，建议停止使用该客户端并改用其他支持文件访问控制的 Napster 兼容客户端。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "John Donoghue Knapster 客户端任意文件读取漏洞"
updated = "2026-06-16T21:51:39.690"

