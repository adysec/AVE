[basic]
description = "BSD 系列操作系统自带的 ftpd 服务在 replydirname 函数中存在单字节缓冲区溢出漏洞。远程攻击者可通过向目标 FTP 服务器发送特制的目录路径请求触发该漏洞，导致单字节越界写入，进而造成内存损坏和任意代码执行，最终可获取目标系统的 root 权限。该漏洞影响 BSD ftpd 0.3.2 及 OpenBSD ftpd 2.6/2.7 等多个版本，CVSS 评分 10.0，危害等级严重。"
published = "2001-02-12T05:00:00.000"
remediation = "对于 OpenBSD 系统，立即升级至 OpenBSD 2.8 及以上版本，该漏洞已在 OpenBSD 2.8 发布时通过修补 ftpd 的 replydirname 函数边界检查逻辑修复。对于其他 BSD 变种运行的 ftpd 0.3.2，升级至 BSD ftpd 0.3.3 或更高版本；如无法升级，在 inetd.conf 中注释 ftp 行并重启 inetd 以禁用 FTP 服务作为临时缓解。"
score = 10
severity = "CRITICAL"
sources = ["exploitdb"]
title = "BSD ftpd 单字节缓冲区溢出漏洞"
updated = "2026-06-16T21:53:34.030"

