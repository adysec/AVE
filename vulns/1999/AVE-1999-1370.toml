[basic]
description = "HP-UX ftpd/kftpd 权限许可和访问控制漏洞"
published = "1997-02-02T05:00:00.000"
remediation = "HP-UX 10.x 和 9.x 已停止安全支持，建议立即升级到受支持的 HP-UX 11i v3 或更高版本。如无法升级，应禁用 ftpd/kftpd 服务（执行 /sbin/init.d/ftpd stop 及 chkconfig ftpd off），改用安全的替代方案如 OpenSSH SFTP 或 HP-UX 的 HP-UX Secure Shell 进行文件传输。同时限制对 ftp 端口的网络访问，在防火墙上仅允许受信任 IP 连接 TCP 21 端口。"
