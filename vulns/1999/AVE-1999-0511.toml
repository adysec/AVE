[basic]
description = "HP-UX 操作系统的 xlock 屏幕锁定程序存在缓冲区溢出漏洞。本地攻击者通过向 xlock 程序提交特制输入触发缓冲区溢出，能够覆盖内存中的关键数据结构，从而获得 root 权限。该漏洞影响 HP-UX 10.34 等多个 UNIX 衍生系统（包括 BSD/OS、DG/UX、Debian、AIX、IRIX、Solaris 等），攻击者需要具备本地系统访问权限才能利用，成功利用后可完全控制目标系统。"
published = "1997-11-04"
remediation = "升级 xlock 至 xlockmore 4.00 及以上版本以修复缓冲区溢出漏洞；或替换为 xscreensaver/gnome-screensaver 等现代屏幕锁定工具。临时缓解措施可移除 xlock 二进制文件的 setuid root 权限位以阻止本地提权攻击。"
score = 7.2
severity = "HIGH"
sources = [
    "cve",
    "avd",
]
title = "HP-UX xlock 本地缓冲区溢出漏洞"
updated = "2026-06-16"

