[basic]
description = "DEC OpenVMS 操作系统的 Monitor 实用程序（SYS$SHARE:SPISHR.EXE）存在权限提升漏洞。本地攻击者可通过向该程序发送特制请求，利用其不充分的权限检查机制获取系统级特权。该漏洞影响 VMS 5.0 至 5.4-2 版本，攻击者需拥有本地系统访问权限方可利用，CVSS 评分 7.2，危害等级高。厂商已发布安全更新修复此漏洞。"
published = "1992-11-17T05:00:00.000"
remediation = "升级 OpenVMS 至 5.5 或更高版本，该漏洞已在后续版本中修复。如无法升级，可限制本地用户对 SYS$SHARE:SPISHR.EXE 的访问权限，仅允许授权管理员执行 Monitor 工具。同时，在系统安全策略中为 MONITOR 特权设置严格的 ACL，阻止非授权用户调用该工具。建议启用 OpenVMS 审核日志 (AUDIT) 监控对 SPISHR.EXE 的异常调用行为。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "DEC OpenVMS Monitor 权限提升漏洞"
updated = "2026-06-16T21:50:20.887"

