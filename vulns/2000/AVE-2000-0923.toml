[basic]
description = 'Tumbleweed Messaging Management System (MMS) 4.6 及更早版本（原 Worldtalk Worldsecure）安装时默认创建名为 "sa" 的管理员账户且无密码保护。未经身份认证的远程攻击者可直接使用该默认账户无密码登录系统，获得完整管理权限，进而完全控制消息管理系统、窃取敏感邮件数据、篡改配置或发起进一步横向攻击。该漏洞影响 Tumbleweed MMS 4.6 及更早版本，CVSS 评分 7.5（AV:N/AC:L/Au:N/C:P/I:P/A:P），属高危漏洞。攻击者无需任何认证凭证，仅通过网络访问管理接口即可利用默认空密码账户直接登录，攻击条件极低、危害严重。建议立即修改默认账户密码、禁用或删除默认账户，并升级至修复版本。'
published = "2000-10-20T04:00:00.000"
remediation = """立即修改 Tumbleweed MMS 默认账户 "sa" 的空密码，设置符合复杂度要求的强密码（≥12位含大小写数字特殊字符）。升级至 Tumbleweed MMS 4.7 或更高版本（Axway 现已接管产品线）。若无法升级，请在数据库层面执行 ALTER USER sa IDENTIFIED BY '新强密码'，并配置账户锁定策略：登录失败 5 次锁定 30 分钟。同时在防火墙限制 MMS 管理端口（默认 8443/TCP）仅允许受信任 IP 访问。"""
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "Tumbleweed Messaging Management System 默认账户漏洞"
updated = "2026-06-16T21:52:26.950"

