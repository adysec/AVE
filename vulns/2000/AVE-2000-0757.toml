[basic]
description = "BlackBoard CourseInfo 4.0 存在权限验证缺陷，本地攻击者可通过直接调用 user_update_passwd.pl 和 user_update_admin.pl 等 CGI 程序绕过身份认证，未经授权修改 CourseInfo 数据库信息并提升系统权限。该漏洞源于服务端对 CGI 接口的访问控制缺失，攻击者无需复杂前置条件即可实施利用，CVSS 评分 7.5，危害等级高危。"
published = "2000-07-18T04:00:00.000"
remediation = "升级至 BlackBoard CourseInfo 4.0 以上已修复认证缺陷的版本。如无法升级，在 Web 服务器（Apache/IIS）层面配置访问控制列表（ACL），限制对 /cgi-bin/ 目录下 user_update_passwd.pl 和 user_update_admin.pl 等 CGI 脚本的访问，仅允许管理员 IP 地址调用。同时移除或禁用不需要的 CGI 脚本，避免未经授权的直接调用导致数据库信息泄露与权限提升。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "BlackBoard CourseInfo 未授权访问权限提升漏洞"
updated = "2026-06-16T21:52:08.453"

