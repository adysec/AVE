[basic]
description = "Datadog .NET Tracer 在实现 W3C Baggage 传播协议时，解析传入的 Baggage HTTP 头部未对提取路径实施条目数量（DD_TRACE_BAGGAGE_MAX_ITEMS，默认 64）或字节大小（DD_TRACE_BAGGAGE_MAX_BYTES，默认 8192）限制。远程未认证攻击者可构造包含大量逗号分隔键值对或单个超大值的 Baggage 头部发送至目标服务，导致追踪器为每个请求分配大量哈希表条目，引发无限制的 CPU 和内存消耗，造成拒绝服务。该漏洞影响启用了 Baggage 传播样式（默认启用）的所有互联网暴露的 .NET 应用服务，CVSS 评分 7.5，危害等级高。Datadog 已在 dd-trace-dotnet 3.43.0 版本中修复此问题。"
published = "2026-07-17T18:17:16.840"
remediation = "立即升级 dd-trace-dotnet 至 3.43.0 或更高版本。如无法立即升级，从 DD_TRACE_PROPAGATION_STYLE（或 DD_TRACE_PROPAGATION_STYLE_EXTRACT）中移除 baggage 以禁用 baggage 提取；同时在上游代理或 Web 服务器（如 Nginx large_client_header_buffers、Apache LimitRequestFieldSize）限制 HTTP 请求头最大大小。"
score = 7.5
severity = "HIGH"
sources = ["ghsa"]
title = "DataDog dd-trace-dotnet W3C baggage 头部解析不当导致拒绝服务漏洞"
updated = "2026-07-17T20:17:24.220"

