[basic]
description = "FileMaker Pro 附带的购物车示例程序在处理订单时信任客户端提交的隐藏表单字段，攻击者可通过修改这些字段（如订单金额、商品数量、收货地址等）远程篡改敏感的购买信息。该漏洞无需身份认证即可通过网络远程利用，破坏交易数据的完整性与机密性，可能导致商家经济损失或用户隐私泄露。"
published = "2000-02-01"
remediation = "升级到 FileMaker Pro 5.0v3 或更高版本，并替换官方购物车示例程序为企业定制版本。在服务端对订单金额、数量等关键字段进行二次校验与重算，不信任客户端提交的值。移除所有隐藏表单字段，采用会话机制在服务端保存购物车状态，并启用 HTTPS 加密传输防止中间人篡改。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "FileMaker 购物车应用 隐藏表单字段 购买信息篡改漏洞"
updated = "2026-07-18"

