[basic]
description = "Solaris Solstice AdminSuite (AdminSuite) 2.1 版本在安装过程中错误地设置了 NIS 映射源文件的写权限，导致本地攻击者可通过修改 /etc/passwd 文件添加或变更用户账户信息，进而实现权限提升。该漏洞影响 Solaris 系统，攻击者需拥有本地访问权限，利用门槛较低。CVSS 评分 6.2，危害等级为中等。"
published = "1997-11-10T05:00:00.000"
remediation = "升级 Solaris Solstice AdminSuite 至 2.1 以上已修复版本，或手动修正 NIS 映射源文件权限为 600（仅 root 可读写），同时限制本地非授权用户登录系统，并定期审计 /etc/passwd 文件完整性。"
score = 6.2
severity = "MEDIUM"
sources = ["avd"]
title = "Solaris Solstice AdminSuite 文件权限配置不当导致本地权限提升漏洞"
updated = "2026-06-16T21:50:24.830"

