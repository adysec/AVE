[basic]
description = "Microsoft IIS 3.0/4.0 及 Index Server 2.0 中的示例 Internet Data Query (IDQ) 脚本存在目录遍历漏洞。远程攻击者可通过向目标服务器发送包含 `..`（点点）序列的特制 HTTP 请求，绕过路径限制读取服务器上的任意文件，导致敏感信息泄露。该漏洞影响运行 Microsoft IIS 3.0/4.0 及 Index Server 2.0 的 Windows 系统，CVSS 评分 5.0，危害等级中等。Microsoft 已在安全公告 MS00-006 中发布修复补丁。"
published = "2000-01-26"
remediation = "建议立即安装 Microsoft 安全公告 MS00-006 提供的补丁（Index Server 2.0 Intel 版下载地址见公告），或升级至 Windows 2000 及以上版本。如无法升级，可删除 IIS 中示例 IDQ 脚本文件（默认位于 /scripts/samples 目录），并禁用 .idq/.ida ISAPI 映射扩展。"
score = 5.0
severity = "MEDIUM"
sources = ["cve"]
title = "Microsoft IIS 3.0/4.0 目录遍历漏洞"
updated = "2026-06-16"

