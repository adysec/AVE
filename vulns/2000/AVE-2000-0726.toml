[basic]
description = "NetWin DMailWeb 和 CWMail 2.6i 及更早版本中存在输入验证缺陷，远程攻击者可通过向 POP 服务发送超长的 `pophost` 参数，导致服务崩溃或拒绝服务。该漏洞源于对用户输入长度缺乏有效限制，攻击者无需认证即可利用，影响邮件服务的正常可用性。建议升级至最新版本以修复此问题。"
published = "2000-06-21T04:00:00.000"
remediation = "将 NetWin dMailWeb/cwMail 升级至 2.6j 或更高版本，该版本已在 POP 参数处理中加入了长度校验，防止超长参数导致服务崩溃。如无法升级，可在防火墙或 TCP Wrappers 层面限制只允许可信 IP 访问 POP 端口（默认 110），并通过反向代理对 POP 参数长度做前置截断校验作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Netwin DMailWeb/CWMail POP 拒绝服务漏洞"
updated = "2026-06-16T21:52:06.090"

