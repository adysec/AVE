[basic]
description = "Linux 内核 NFS 服务器（NFSD）在处理并发 nfsd4_open 请求时存在 nfs4_openowner 内存泄漏漏洞。当客户端执行强制卸载（umount -f）操作时，会终止所有正在进行的 RPC 任务，导致客户端可能同时发送两个 RPC 任务到 NFS 服务器处理同一文件的打开请求。由于 NFSD 可并发运行多个实例，两个 nfsd 线程同时处理同一文件的打开操作时会触发竞态条件：一个线程分配或查找 nfs4_openowner 后，另一个线程发现该 owner 未标记为 NFS4_OO_CONFIRMED 而将其释放并从客户端链表中删除，但第一个线程继续使用已释放的 owner 关联 stateid 和 nfsd_file，导致 nfs4_openowner、stateid、nfsd_file 及 nfsd_file_mark 等多重对象泄漏。大量内存泄漏最终在关闭 NFSD 线程时触发内核 slab 内存池警告，造成拒绝服务。该漏洞需本地低权限用户触发，CVSS 评分 5.5。"
published = "2025-01-08T18:15:18.793"
remediation = "立即升级 Linux 内核至以下安全版本：5.4.287、5.10.231、5.15.174、6.1.120、6.6.64 或 6.12.4 及以上。对于无法立即升级的系统，可限制本地用户执行强制卸载（umount -f）操作，并避免在 NFS 服务端并发处理大量打开请求，以降低内存泄漏风险。"
score = 5.5
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux Kernel nfsd 并发打开操作导致内存泄漏漏洞"
updated = "2026-06-17T08:12:58.457"

