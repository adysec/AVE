[basic]
description = "Linux 内核 netfilter 子系统的 nft_socket 模块中存在一处可被利用的 WARN_ON_ONCE 断言触发漏洞。由于 cgroup 最大深度默认值为 INT_MAX，且内核未对用户空间设置的 cgroup 深度进行合理限制，具有本地低权限的攻击者可通过创建深度过大的 cgroup 层级，触发 nft_socket 模块中的 WARN_ON_ONCE 宏，导致内核产生告警信息并可能引发拒绝服务（DoS）。该漏洞影响使用 netfilter nft_socket 功能的 Linux 内核版本，CVSS 评分 5.5，危害等级中危。"
published = "2025-01-08T18:15:19.247"
remediation = "升级 Linux 内核至 6.1.120、6.6.66、6.12.5 或更高版本，对应补丁已合入主线及稳定分支。Ubuntu 24.04 LTS 用户可通过 `apt update && apt upgrade` 安装 USN-7450-1 更新。Debian 用户参考 DLA-4041-1 公告更新内核。如无法立即升级，可通过内核启动参数 `cgroup_no_v1=all` 限制 cgroup 层级深度作为临时缓解。"
score = 5.5
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux Kernel netfilter nft_socket 拒绝服务漏洞"
updated = "2026-06-17T08:12:59.037"

