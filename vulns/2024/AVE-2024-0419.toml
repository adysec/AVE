[basic]
description = "润申信息科技ERP系统DefaultHandler.ashx接口存在严重SQL注入漏洞，攻击者无需认证即可通过POST请求发送恶意SQLayload利用系统内置哈希函数隐藏攻击载荷，导致目标数据库被完全控制。该漏洞影响广泛的企事业用户，攻击者可利用该漏洞窃取敏感数据、破坏数据库完整性及在服务器上执行任意命令。目前已知攻击者可通过精心构造的POST请求绕过基本验证获取系统权限，可能导致严重的经济损失和隐私泄露。该漏洞 CVSS评分9.8，反映出其极端危害性及广泛影响面。"
published = "0813"
remediation = "润申信息科技ERP系统默认需要升级到官方发布的完整安全补丁包（建议版本v2.8.3及以上），并立即在Web应用防火墙中添加DefaultHandler.ashx路径的SQL注入防护规则，对参数化查询进行严格验证，同时在数据库层启用输入验证存储过程，对于紧急情况可临时限制该接口的访问IP范围。"
