[basic]
description = "IBM Lotus Domino 的 HTTP 服务器在处理 /cgi-bin/ 目录下的 CGI 请求时存在信息泄露漏洞。当远程攻击者向服务器请求一个并不存在的 CGI 脚本（如 /cgi-bin/nonexistent）时，服务器会在返回的错误响应中泄露该脚本在服务器文件系统中的真实绝对路径。该漏洞影响运行 Lotus Domino Web 服务器且启用 CGI 功能的版本，攻击条件为攻击者仅需能够与目标服务器的 HTTP 服务建立网络连接并发送特制请求，无需身份认证。利用方式简单，攻击者可通过构造对不存在 CGI 脚本的 HTTP 请求，从服务器返回的错误信息中直接获取服务器目录结构等敏感路径信息，进而为后续攻击提供有价值的情报。"
published = "1999-12-01T05:00:00.000"
remediation = "建议将 Lotus Domino/Notes 升级至 5.0.3 或 R5.0.3 及以上版本，该版本已修复 CGI 路径泄露问题。如无法立即升级，可在 Domino 目录管理中禁用或移除 /cgi-bin/ 目录映射，将 HTTP 服务器未找到脚本的错误响应改为返回通用 404 页面，避免泄露服务器端真实物理路径，并限制公网对 Web 服务器的直接访问。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
