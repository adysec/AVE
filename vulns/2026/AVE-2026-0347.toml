[basic]
description = "dd-trace-js（Datadog APM Node.js 客户端）在解析 W3C baggage 传播头时未对提取路径实施条目数（默认 64）和字节大小（默认 8192）限制。远程未认证攻击者可发送包含大量逗号分隔键值对或单个超大值的 baggage 请求头，导致服务端为每个请求分配哈希表条目，造成 CPU 和内存资源无限消耗，从而引发拒绝服务。该漏洞影响所有启用 baggage 传播的 HTTP 服务，CVSS 评分 7.5，危害等级高。官方已在 5.100.0 版本中修复。"
published = "2026-07-17T21:17:07.200"
remediation = "升级 dd-trace-js 至 5.100.0 或更高版本。如无法立即升级，从 DD_TRACE_PROPAGATION_STYLE 中移除 baggage 以禁用其提取，或在反向代理层限制 HTTP 请求头大小（如 Nginx 设置 large_client_header_buffers、Apache 设置 LimitRequestFieldSize、Envoy 设置 max_request_headers_kb）。"
score = 7.5
severity = "HIGH"
sources = ["ghsa"]
title = "DataDog dd-trace-js W3C Baggage 标头解析不当导致拒绝服务漏洞"
updated = "2026-07-21T04:16:50.977"

