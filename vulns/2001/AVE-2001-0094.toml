[basic]
description = "mICQ 0.4.6 及更早版本中的客户端存在缓冲区溢出漏洞，远程攻击者可通过向目标发送特制的超长 Description 字段消息，触发缓冲区溢出，导致目标程序崩溃引发拒绝服务，在特定条件下还可执行任意代码。该漏洞影响 mICQ 0.4.6 及之前版本，无需身份认证即可远程触发，攻击门槛较低，CVSS 评分 10.0，危害等级严重。"
published = "2001-03-26T05:00:00.000"
remediation = "立即将 mICQ 客户端升级至 0.4.7 或更高版本。FreeBSD 用户请参考 SA-01:14 更新 ports 中的 micq 包；Debian 用户请应用 DSA-012 安全更新；Red Hat 用户请安装 RHSA-2001:005 提供的更新包。无法立即升级时，可在防火墙层面限制对 mICQ 服务端口的非信任来源访问以作临时缓解。"
score = 10
severity = "CRITICAL"
sources = ["exploitdb"]
title = "mICQ 远程缓冲区溢出漏洞"
updated = "2026-06-16T21:53:55.893"

