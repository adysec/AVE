[basic]
description = "Majordomo 邮件列表管理软件 1.94.4 及 1.94.5 版本中的 wrapper 组件存在权限提升漏洞。本地攻击者可通过向 Majordomo 的 wrapper 程序传递 -C 参数指定替代配置文件，从而以提升的权限执行操作。该漏洞允许已拥有本地访问权限的攻击者获取系统更高权限，影响系统的机密性和完整性。CVSS 评分 4.6，危害等级中危。"
published = "1999-12-28T05:00:00.000"
remediation = "升级 Majordomo 至 1.94.6 或更高版本，该版本修复了 wrapper 对 -C 参数的处理逻辑。如无法升级，移除 wrapper 的 setuid 权限或限制可执行 -C 参数的用户范围作为临时缓解措施。"
score = 4.6
severity = "MEDIUM"
sources = ["cve"]
title = "Majordomo 1.94.4/1.94.5 本地权限提升漏洞"
updated = "2026-06-16T21:50:52.263"

