[basic]
description = "SCO OpenServer 5.0.5 及更早版本、SCO UnixWare 7.0.1 及更早版本中的 rlogin 守护进程 rshd 及 scheme 服务存在权限提升漏洞。远程攻击者无需身份认证即可利用该漏洞，通过向目标系统发送特制请求，获取系统高级权限。该漏洞影响范围广泛，攻击复杂度较低，危害等级高，CVSS 评分 7.5。"
published = "1999-01-27T05:00:00.000"
remediation = "安装 SCO 安全公告 SB-99.03b/SB-99.06b 对应的补丁包或 SSE020 增强包，升级至 OpenServer 5.0.6 及以上版本或 UnixWare 7.0.2 及以上版本。如无法升级，建议禁用 rshd/rlogin 服务并改用 SSH 替代，同时在网络边界防火墙阻止对 rsh 端口（513/tcp、514/tcp）的入站访问作为临时缓解措施。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "SCO UNIX OpenServer 和 UnixWare rlogin 远程权限提升漏洞"
updated = "2026-06-16T21:50:27.977"

