[basic]
description = "SGI Omron WorldView Wnn 4.2 及 WorldView 6.5 的亚洲语言服务器组件存在远程缓冲区溢出漏洞。远程攻击者可通过向目标系统发送特制的 JS_OPEN、JS_MKDIR 或 JS_FILE_INFO 命令，触发缓冲区溢出，从而在受影响系统上执行任意命令。该漏洞 CVSS 评分为 10.0，危害等级严重，攻击者无需身份认证即可远程利用。"
published = "2000-10-20T04:00:00.000"
remediation = "立即安装 SGI 安全公告 20000803-01-A 提供的补丁，或升级 FreeWnn 至 1.1.1 及以上版本。对于仍在使用 Omron WorldView 6.5 或 Wnn4 4.2.x 的系统，由于厂商已停止支持，建议迁移至现代输入法框架（如 IBus 或 Fcitx），并在网络边界防火墙阻断 Wnn 服务端口（默认 22273/TCP）以限制外部访问。"
score = 10
severity = "CRITICAL"
sources = ["cve"]
title = "SGI Omron WorldView Wnn 亚洲语言服务器远程缓冲区溢出漏洞"
updated = "2026-06-16T21:52:18.367"

