[basic]
description = "RedHat Linux 6.0/6.1/6.2 系统中 pam_console PAM 模块在用户登录时会对设备文件执行 chown 操作，但退出登录后相关设备的文件描述符仍保持打开状态，导致该用户在后续其他用户登录时可嗅探这些设备的输入输出活动。该漏洞危害等级高，CVSS 评分 7.2，攻击者需拥有本地登录权限，利用难度较低，可导致敏感信息泄露。建议升级至受支持版本或禁用 pam_console 模块。"
published = "2000-05-03T04:00:00.000"
remediation = "升级 Red Hat Linux 至 7.0 或更高版本，其中已修复 pam_console 模块在用户注销后未关闭设备文件描述符的问题。如无法升级系统，可修改 /etc/pam.d/ 下相关配置文件，移除 pam_console.so 模块的调用，或限制可登录控制台的用户组仅包含受信任管理员。"
score = 7.2
severity = "HIGH"
sources = ["exploitdb"]
title = "RedHat Linux pam_console 模块登录设备文件描述符泄露漏洞"
updated = "2026-06-16T21:51:35.513"

