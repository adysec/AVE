[basic]
description = 'SmartWin CyberOffice Shopping Cart 2.0（又称 CyberShop）存在价格修改漏洞。远程攻击者可通过修改 HTML 表单中的隐藏字段 "Price" 变量值，以任意价格提交订单完成购买，导致商家遭受经济损失。该漏洞源于服务端未对客户端提交的价格数据进行有效性校验与签名，攻击者使用浏览器开发者工具或代理工具即可篡改价格参数，无需任何身份认证即可实施攻击。'
published = "2000-12-19T05:00:00.000"
remediation = "对 SmartWin CyberOffice Shopping Cart 2.0，所有价格字段必须在服务端进行二次校验，禁止信任客户端提交的 Hidden 表单变量值。建议升级到已修复该问题的官方最新版本，如产品已停止维护，则替换为仍受支持的购物车系统（如 WooCommerce 或 Magento），并在迁移前通过 Web 应用防火墙（WAF）规则拦截对价格字段的篡改请求。"
score = 7.5
severity = "HIGH"
sources = ["exploitdb"]
title = "Smartwin Technology CyberOffice Shopping Cart 2.0 商品价格修改漏洞"
updated = "2026-06-16T21:52:46.943"

