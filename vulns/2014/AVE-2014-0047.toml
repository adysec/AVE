[basic]
description = "Netsweeper 内容过滤系统存在多个跨站脚本（XSS）漏洞，版本 3.1.10 之前、4.0.x 至 4.0.9 之前以及 4.1.x 至 4.1.2 之前的版本均受影响。远程攻击者无需身份认证即可通过构造特制的参数，分别向 remotereporter/load_logfiles.php 的 server 参数、webadmin/policy/category_table_ajax.php 的 customctid 参数、webadmin/alert/alert.php 的 urllist 参数、webadmin/ajaxfilemanager/ajax_get_file_listing.php 的 QUERY_STRING 以及 webadmin/policy/policy_table_ajax.php/ 的 PATH_INFO 注入任意 Web 脚本或 HTML 代码。当管理员或用户访问被注入恶意脚本的页面时，攻击者可窃取会话 Cookie、劫持管理会话或执行其他恶意操作。该漏洞 CVSS 评分 6.1，危害等级中危，攻击复杂度低，但需要用户交互（点击链接）才能触发。"
published = "2020-02-19T20:15:13.017"
remediation = "升级 Netsweeper 至 3.1.10、4.0.9 或 4.1.2 及以上版本。如无法立即升级，在 Web 应用防火墙 (WAF) 层面添加规则，对 `server`、`customctid`、`urllist`、`QUERY_STRING`、`PATH_INFO` 等参数进行输入过滤和输出编码，并启用 Content-Security-Policy 头作为临时缓解措施。"
score = 6.1
severity = "MEDIUM"
sources = ["nuclei"]
title = "Netsweeper Netsweeper 跨站脚本漏洞"
updated = "2026-06-17T00:18:38.020"

