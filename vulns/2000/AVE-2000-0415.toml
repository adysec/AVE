[basic]
description = "PassWD 1.2 使用弱加密算法（简单的编码转换方式）存储用户密码，攻击者若能读取密码文件，可轻易解密获得明文密码，导致用户凭据泄露。该漏洞影响所有 PassWD 1.2 版本。"
published = "2000-06-04"
remediation = "停止使用 PassWD 1.2 的弱加密存储方式，改用 bcrypt、scrypt 或 Argon2 等强哈希算法存储密码，或迁移至其他支持强加密的密码管理工具。"
score = 5.0
severity = "MEDIUM"
sources = ["cve"]
title = "PassWD 1.2 弱加密存储密码漏洞"
updated = "2000-06-04"

