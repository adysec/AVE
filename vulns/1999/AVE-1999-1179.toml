[basic]
description = "Ipswitch IMail 5.0及6.0版本的Web服务组件存在缓冲区溢出漏洞。远程攻击者可通过向目标系统发送超长URL触发缓冲区溢出，导致服务崩溃拒绝服务，在特定条件下可能实现任意代码执行。该漏洞利用方式简单，无需身份认证，影响运行Ipswitch IMail的邮件服务器系统。厂商已提供安全更新建议升级至高版本。"
published = "1999-03-02T05:00:00.000"
remediation = "将 Ipswitch IMail 升级至 6.1 或更高版本，该版本修复了 Web 服务 (端口 8383) 中处理长 URL 时的缓冲区溢出问题。如无法升级，可在防火墙上限制对 8383 端口的访问，仅允许可信 IP 连接，作为临时缓解措施。由于该产品已停止维护，建议迁移至受支持的邮件服务器（如 Exchange 或 MOVEit）。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Ipswitch IMail Web服务缓冲区溢出漏洞"
updated = "2026-06-16T21:50:41.970"

