[basic]
description = "新炬网络智能运维管理平台 agent 组件存在未授权远程命令执行漏洞。由于 agent 服务未对访问来源进行有效身份验证，远程攻击者在未认证情况下可直接向 agent 发送恶意请求，触发系统命令执行，进而完全控制目标服务器。该漏洞影响新炬网络智能运维管理平台全版本，攻击复杂度低，无需用户交互，危害严重。"
published = "0710"
remediation = "立即联系新炬网络官方获取 agent 组件安全更新版本，升级至已修复未授权访问问题的最新版本；同时在 agent 服务端口（默认 8080/TCP 或其他自定义端口）的防火墙上添加白名单策略，仅允许运维管理平台服务器 IP 访问 agent 端口，禁止非授权来源的直连请求；如 agent 支持认证配置，开启 token 或证书双向认证机制，确保所有请求均需身份校验后方可执行命令。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "新炬网络智能运维管理平台 agent 未授权远程命令执行漏洞"
updated = "0710"

