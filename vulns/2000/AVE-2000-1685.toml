[basic]
description = "XMail POP3 服务器 0.59 版本前存在缓冲区溢出漏洞，攻击者可通过发送超长 APOP 命令触发栈溢出，实现远程任意代码执行。该漏洞影响 XMail POP3 服务器 0.59 之前版本，CVSS 评分 10.0（CVSS:AV:N/AC:L/Au:N/C:C/I:C/A:C），属严重级远程代码执行漏洞。攻击者无需身份认证，仅需向目标 POP3 服务发送精心构造的超长 APOP 命令即可触发缓冲区溢出，劫持程序控制流执行任意 shellcode，完全控制目标服务器。建议升级至 XMail 0.59 或更高版本修复该漏洞。"
published = "2000-11-14T05:00:00.000"
remediation = "建议立即升级 XMail POP3 服务器到 0.59 或更高版本，官方已在 0.59 版本修复该 APOP 缓冲区溢出漏洞。若无法立即升级，可在防火墙层面限制 POP3 服务（端口 110）仅允许受信任 IP 访问，或在 XMail 配置中禁用 APOP 认证功能作为临时缓解措施。建议同时监控 POP3 服务异常连接日志，及时发现异常 APOP 命令尝试。"
score = 10
severity = "CRITICAL"
sources = ["cve"]
title = "XMail XMail POP3 Server 缓冲区溢出代码执行漏洞"
updated = "2026-06-16T21:52:34.717"

