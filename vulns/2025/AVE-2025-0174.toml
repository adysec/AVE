[basic]
description = "用友网络管理中心（NMC）服务存在严重的任意文件上传漏洞，攻击者可通过向该服务发送精心构造的HTTP请求上传恶意文件，并结合文件包含或命令执行等二次漏洞实现远程代码执行。该漏洞影响用友旗下多款网络管理中心软件，受害主机涵盖大量企事业单位。攻击者无需身份验证即可触发漏洞，只要目标系统开放了NMC服务即可利用。该漏洞可导致企业核心数据泄露、系统瘫痪及关键业务中断，危害严重。"
published = "2025-07-23"
remediation = "联系用友官方获取安全修复补丁并升级NMC服务至最新版本；在升级前使用Web应用防火墙（WAF）拦截对文件上传接口的恶意请求，限制NMC服务仅对可信内网IP开放，关闭不必要的文件写入目录执行权限以缓解风险。"
score = 5.0
severity = "MEDIUM"
sources = ["hwpoc"]
title = "用友NMC服务任意文件上传漏洞"
updated = "2025-07-23"

