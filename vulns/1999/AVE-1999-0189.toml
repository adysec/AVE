[basic]
description = "Linux Kernel 2.2 及多个操作系统实现中存在 TCP 初始序列号可预测漏洞。远程攻击者无需身份认证即可通过分析 TCP 连接模式预测序列号，进而伪造 TCP 数据包实施会话劫持或连接欺骗攻击。该漏洞影响大量使用弱随机数生成器生成 TCP ISN 的系统，攻击者可在同一网络路径上成功实施中间人攻击或伪造信任关系。"
published = "1995-01-01T05:00:00.000"
remediation = "升级 Linux 内核至 2.2.20 及以上版本（该版本合入了 TCP 序列号随机化补丁），或升级至 2.4.x/2.6.x 等现代内核分支。如无法升级内核，可通过 sysctl 设置 net.ipv4.tcp_seq_randomization=1（若内核支持）启用序列号随机化，或在网络边界部署 IPsec 加密传输层以消除 TCP 伪造攻击面。"
score = 5
severity = "MEDIUM"
sources = ["redhat"]
title = "Linux Kernel 2.2 TCP 初始序列号可预测漏洞"
updated = "2026-06-16T21:47:31.603"

