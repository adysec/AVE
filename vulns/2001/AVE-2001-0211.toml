[basic]
description = "Microsoft Outlook 2002 及更早版本中的 Outlook View ActiveX 控件存在远程代码执行漏洞。远程攻击者可通过向目标用户发送特制的恶意 HTML 电子邮件或诱导用户访问包含恶意代码的网页来触发该漏洞，在用户打开邮件或预览邮件内容时自动执行任意命令。该漏洞影响 Outlook 98/2000/2002 等多个版本，CVSS 评分 10.0，危害等级严重。攻击无需身份认证且复杂度低，可完全控制受影响的系统。"
published = "2001-08-14T04:00:00.000"
remediation = "立即安装 Microsoft 2001 年 8 月发布的 Outlook 安全更新 (MS01-038)，该更新为 Outlook 2002 及更早版本添加了 Email Security Update，限制 ActiveX 控件在电子邮件中的自动执行。如无法安装补丁，可配置 Outlook 安全设置将「在 HTML 邮件中运行 ActiveX 控件」选项禁用，或使用 Outlook 2003 及以上版本替代。同时建议在邮件网关层面过滤包含 ActiveX 控件的 HTML 邮件。"
score = 10
severity = "CRITICAL"
sources = ["exploitdb"]
title = "Microsoft Outlook ActiveX 控件远程代码执行漏洞"
updated = "2026-06-16T21:54:29.353"

