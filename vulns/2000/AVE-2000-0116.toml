[basic]
description = "Cat Soft Serv-U FTP Server 2.5/a/b 版本中存在缓冲区溢出漏洞，位于 SHGetPathFromIDList 函数处理 .lnk 文件时。远程攻击者无需身份认证，只需向目标 FTP 服务器发送包含畸形 .lnk 文件的 LIST 命令，即可触发缓冲区溢出，导致服务崩溃，造成拒绝服务。该漏洞影响 Windows 95/98/2000/NT 4.0 平台上的 Serv-U FTP Server 2.5/a/b 版本，CVSS 评分 2.1，危害等级低。"
published = "2000-02-04T05:00:00.000"
remediation = "升级 Serv-U FTP Server 至 2.5c 或更高版本，该漏洞已在后续版本中修复。如无法升级，建议在防火墙层面限制对 FTP 服务的匿名访问，并禁用对 .lnk 文件的 LIST 命令处理作为临时缓解措施。"
score = 2.1
severity = "LOW"
sources = ["exploitdb"]
title = "Cat Soft Serv-U FTP Server 缓冲区溢出漏洞"
updated = "2026-06-16T21:51:03.660"

