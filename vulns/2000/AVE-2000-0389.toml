[basic]
description = "Linux splitvt 1.6.3 及更早版本中存在缓冲区溢出漏洞。当用户执行屏幕锁定功能时，程序未对密码输入长度进行充分检查，过长的密码字符串可触发栈缓冲区溢出。本地攻击者可通过构造超长密码字符串，利用该溢出覆盖返回地址，成功利用后可获取 root 权限。该漏洞影响 Linux 系统下 splitvt 1.6.3 及之前的所有版本，CVSS 评分 7.2，危害等级高。目前官方已发布新版本修复此问题。"
published = "2000-06-01T04:00:00.000"
remediation = "立即升级 splitvt 至 1.6.4 及以上版本（最新稳定版为 1.6.6），该版本在 lock.c 中增加了密码输入长度检查（通过 cnt 变量限制写入不超过 BUFSIZ-1 字节），防止超长密码溢出栈缓冲区。若无法升级，可临时移除 splitvt 的 setuid root 权限：chmod u-s /usr/bin/splitvt，此缓解措施将阻止普通用户利用该漏洞提权，但屏蔽锁定功能的部分行为。"
score = 7.2
severity = "HIGH"
sources = ["cve"]
title = "Sam Lantinga splitvt 本地缓冲区溢出漏洞"
updated = "2026-06-16T21:51:47.820"

