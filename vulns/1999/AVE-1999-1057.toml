[basic]
description = "Linux 2.3.18 之前版本及 2.2.13pre15 之前版本的内核中，当启用 SLIP 和 PPP 选项时存在 IP 数据包伪造漏洞。本地低权限用户可通过向 tty 设备发送 TIOCSETD ioctl 选项，将终端线路设置为 SLIP 模式，从而绕过内核的源地址校验机制伪造任意 IP 数据包。攻击者利用此漏洞可冒充其他主机发送伪造的网络流量，实施 IP 欺骗攻击，导致中间人攻击或拒绝服务等后果。该漏洞影响启用了 SLIP/PPP 模块的 Linux 系统，攻击者需具备本地 shell 访问权限。"
published = "1999-10-22"
remediation = "升级 Linux 内核至 2.3.18 及以上版本，或 2.2.13 正式版及以上版本，即可修复此漏洞。如无法升级内核，可卸载或禁用 SLIP 和 PPP 内核模块（modprobe -r slip ppp），并限制普通用户对 tty 设备 TIOCSETD ioctl 的访问权限作为临时缓解措施。"
score = 4.6
severity = "MEDIUM"
sources = ["cve"]
title = "Linux 内核 SLIP/PPP IP 数据包伪造漏洞"
updated = "2026-06-16"

