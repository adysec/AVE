[basic]
description = "glibc 2.1.3 中的 DNS 解析器（resolver）使用可预测的查询事务 ID，导致本地攻击者能够向目标系统发送精心构造的虚假 DNS 响应，实施 DNS 缓存投毒攻击，劫持域名解析结果。该漏洞影响使用 glibc 2.1.3 的 Linux 系统，攻击者只需具备本地网络访问能力即可利用，导致用户被重定向至恶意站点。CVSS 评分 7.5，危害等级高。"
published = "2000-05-03T04:00:00.000"
remediation = "升级 glibc 至 2.1.4 及以上版本（该版本起 DNS 查询 ID 改为随机生成），或升级至 Linux 发行版厂商提供的对应安全更新版本（如 Red Hat 2000 年安全公告 RHSA-2000:019）。临时缓解措施：在本地部署 DNSSEC 验证的 DNS 缓存服务器，并启用 DNS 源端口随机化。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "GNU glibc 域名解析器 DNS 查询结果欺骗漏洞"
updated = "2026-06-16T21:51:30.143"

