[basic]
description = "Hylafax 4.0 pl2 的 Faxsurvey CGI 脚本存在远程命令执行漏洞。攻击者无需身份认证即可通过向查询字符串提交包含 shell 元字符（如管道符、分号等）的特制 HTTP 请求，使服务器在解析时执行任意系统命令。该漏洞影响 Linux 平台上的 Hylafax 4.0 pl2 版本，CVSS 评分 7.5，危害等级高危。"
published = "1998-08-04T04:00:00.000"
remediation = "升级 Hylafax 至 4.1 及以上版本，或删除 faxsurvey CGI 脚本（通常位于 cgi-bin 目录），并在 Web 服务器层面限制对 CGI 目录的访问权限，仅允许可信 IP 访问。如 faxsurvey 功能非必需，建议彻底移除该脚本。对用户输入中的 shell 元字符（如 `;`、`|`、`&` 等）进行严格过滤。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "Hylafax Faxsurvey CGI 远程命令执行漏洞"
updated = "2026-06-16T21:48:01.590"

