[info]
author = "AVE"
description = "检测 Microsoft Internet Explorer 6至9版本中 mshtml.dll 的 CMshtmlEd::Exec 函数释放后使用漏洞。通过构造特制 HTML 页面调用 execCommand 触发对象释放后再次引用，导致远程代码执行。"
id = "POC-AVE-2012-0222"
name = "Microsoft Internet Explorer execCommand Use-After-Free PoC"
severity = "high"
tags = ["ave-2012-0222"]
vuln_id = [
    "CVE-2012-4969",
    "AVE-2012-0222",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "header"
type = "word"
words = [
    "MSIE 6",
    "MSIE 7",
    "MSIE 8",
    "MSIE 9",
]
