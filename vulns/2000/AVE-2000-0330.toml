[basic]
description = "Microsoft Internet Explorer 5 中的 Active Movie ActiveX 控件存在输入验证不足漏洞，未对可下载文件类型进行合理限制。远程攻击者可将任意类型文件编码嵌入电子邮件或新闻组帖子中发送给目标用户，当用户使用 IE 浏览器访问恶意构造的内容时，攻击者即可在用户系统上下载并执行恶意文件。该漏洞影响 Windows 98/NT 4.0/2000 等平台，CVSS 评分 7.5，危害等级高。"
published = "2000-05-13T04:00:00.000"
remediation = '升级至现代浏览器（如 Microsoft Edge、Chrome）及受支持的操作系统，彻底消除旧版 IE/ActiveX 攻击面。对于必须保留遗留系统的环境，在注册表中为 ActiveMovie Control 控件设置 kill bit，定位到 HKEY_LOCAL_MACHINE\SOFTWARE\Microsoft\Internet Explorer\ActiveX Compatibility\{05589FA0-C356-11CE-BF01-00AA0055595A}，将 Compatibility Flags DWORD 值设为 0x400 以禁用该控件；同时将 Outlook 默认安全区域设为受限站点，禁止 ActiveX 控件通过邮件触发下载。'
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "Microsoft Internet Explorer 5 Active Movie ActiveX 控件文件类型限制不足漏洞"
updated = "2026-06-16T21:51:38.210"

