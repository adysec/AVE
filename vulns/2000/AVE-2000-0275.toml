[basic]
description = "UltraBoard 1.6 的 UltraBoard.pl 及 UltraBoard.cgi 脚本存在目录遍历漏洞，远程攻击者可通过在路径参数中插入 '../' 序列并以空字符结尾的方式绕过访问限制，读取服务器上的任意敏感文件（如 /etc/passwd）。该漏洞无需身份认证即可利用，CVSS 评分 5.0，危害等级中等，影响使用 UltraBoard 1.6 的 Web 应用。"
published = "2000-05-03"
remediation = "该漏洞影响现已停止维护的 UltraBoard 1.6，厂商 UltraScripts 已不存在，无官方补丁。建议立即升级至 UltraBoard 1.7 或更高版本（若可获得）；如无法升级，编辑 UltraBoard.pl 和 UltraBoard.cgi 脚本，对文件路径参数过滤 '../' 及空字节 '%00'，禁止包含连续 '..' 的输入；同时移除 CGI 目录的脚本执行权限或通过 Web 服务器 ACL 限制访问。长远建议迁移至仍在维护的论坛系统。"
score = 5.0
severity = "MEDIUM"
sources = [
    "cve",
    "exploitdb",
]
title = "UltraScripts UltraBoard 1.6 目录遍历漏洞"
updated = "2026-06-16"

