[basic]
description = "Nortel Contivity HTTP 服务器中的 cgiproc CGI 脚本存在任意文件读取漏洞，远程攻击者无需身份认证即可通过向该脚本传递包含目标文件名的参数，读取服务器上的任意文件。该漏洞源于 CGI 脚本未对用户输入的文件名参数进行充分过滤，攻击者可以利用路径遍历等技术读取系统敏感文件，导致服务器配置、账户信息等机密数据泄露。攻击复杂度低，危害较为严重。"
published = "2000-01-17"
remediation = "该漏洞影响 Nortel Contivity HTTP Server 的 cgiproc CGI 脚本，Nortel 已于 2009 年破产，产品已停止维护，无官方补丁可用。建议立即停用 Nortel Contivity 设备并迁移至受支持的 VPN 替代方案；若无法立即替换，应在防火墙层面禁用对 cgiproc 脚本的公网访问，限制源 IP 白名单，并移除或重命名服务器上的 cgiproc CGI 脚本文件以阻断攻击路径。"
score = 5.0
severity = "MEDIUM"
sources = ["cve"]
title = "Nortel Contivity HTTP Server CGI 任意文件读取漏洞"
updated = "2026-06-16"

