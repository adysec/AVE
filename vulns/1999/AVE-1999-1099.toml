[basic]
description = "IBM AIX 4.2.1 及之前版本中的 snap 命令存在不安全的临时文件创建漏洞。snap 命令在执行时会在 /tmp 目录下创建 ibmsupt 目录，该目录权限设置为世界可读，且执行 snap -a 时不会清理该目录中的旧文件。本地攻击者可利用此漏洞，通过在 root 用户执行 snap -a 之前预先创建 /tmp/ibmsupt/general/passwd 符号链接或文件，诱使 snap 命令将系统 shadow 密码文件写入攻击者可控的位置，从而导致敏感信息泄露。该漏洞影响 AIX 4.2.1 及更早版本，CVSS 评分 10.0，危害等级严重。"
published = "1999-02-17T05:00:00.000"
remediation = "立即升级到AIX 4.3.2或更高版本，移除/tmp/ibmsupt目录并重新建立，设置权限为600，删除任何恶意创建的passwd文件；如无法立即升级，可在命令执行前临时删除/tmp/ibmsupt目录并创建安全的权限目录为940。"
score = 10
severity = "CRITICAL"
sources = ["exploitdb"]
