[basic]
description = "OpenSSH 3.2.2 的 sshd 组件在使用 YP（NIS）和 netgroup 机制时存在认证实现缺陷。当系统配置了基于 YP 的 netgroup 访问控制时，在某些特定条件下，远程攻击者能够使用其他用户的密码通过身份验证并成功登录目标系统，导致认证绕过。该漏洞影响 OpenSSH 3.2.2 版本，CVSS 评分 7.5，危害等级高，攻击者无需事先认证即可利用此漏洞获取系统非授权访问。"
published = "2002-08-12T04:00:00.000"
remediation = "升级 OpenSSH 至 3.3 及以上版本，该漏洞在 OpenSSH 3.3 中已修复。如无法升级，可禁用 YP/NIS netgroups 认证方式，在 `/etc/ssh/sshd_config` 中设置 `UsePAM yes` 并移除 NIS netgroup 相关配置作为临时缓解措施。"
score = 7.5
severity = "HIGH"
sources = ["osv"]
title = "OpenBSD OpenSSH 身份验证绕过漏洞"
updated = "2026-06-16T21:58:05.520"

