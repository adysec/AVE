[basic]
description = ".NET XML 加密实现（System.Security.Cryptography.Xml）中存在安全功能绕过漏洞，源于对加密签名的验证不充分（CWE-347）。未经授权的远程攻击者可在无需身份认证和用户交互的情况下，通过网络向受影响系统发送特制的 XML 加密数据，绕过加密保护机制并访问被加密的敏感信息，进而导致机密性、完整性和可用性受损。该漏洞影响 .NET 8.0（≤8.0.28）、.NET 9.0（≤9.0.17）及 .NET 10.0（≤10.0.9）版本中 System.Security.Cryptography.Xml 包，CVSS 评分 8.1，危害等级高。Microsoft 已发布 NuGet 包更新修复此漏洞。"
published = "2026-07-14T19:17:08.830"
remediation = "将 System.Security.Cryptography.Xml NuGet 包升级至修复版本：.NET 8.0 升级至 8.0.29，.NET 9.0 升级至 9.0.18，.NET 10.0 升级至 10.0.10。可通过 `dotnet add package System.Security.Cryptography.Xml` 命令或 Visual Studio NuGet 包管理器更新，更新后重新编译部署应用。"
score = 8.1
severity = "HIGH"
sources = ["ghsa"]
title = "Microsoft .NET XML 加密安全功能绕过漏洞"
updated = "2026-07-22T16:17:25.170"

