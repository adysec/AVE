[basic]
description = "HylaFAX 传真服务器组件 faxgetty 在处理 TSI（Transmitting Subscriber Identification）数据元素时存在格式化字符串漏洞。远程攻击者无需身份认证即可向目标系统发送特制的 TSI 数据，触发格式化字符串处理缺陷，导致 faxgetty 进程崩溃，造成拒绝服务。该漏洞影响 HylaFAX 4.1.3 之前的所有版本，CVSS 评分 5.0，危害等级中危。建议用户升级至 HylaFAX 4.1.3 或更高版本以修复此漏洞。"
published = "2002-10-04T04:00:00.000"
remediation = "升级 HylaFAX 至 4.1.3 或更高版本。该版本已修复 faxgetty 组件处理 TSI 数据元素时的格式化字符串漏洞。如无法立即升级，可在 /etc/inetd.conf 中注释 faxgetty 服务行并重启 inetd 以临时禁用传真接收功能；或在防火墙层面限制对 faxgetty 服务端口（通常为 4559/tcp）的访问。"
score = 5
severity = "MEDIUM"
sources = ["osv"]
title = "HylaFAX faxgetty 格式化字符串拒绝服务漏洞"
updated = "2026-06-16T21:58:37.927"

