[info]
author = "AVE"
description = "检测 Adobe ColdFusion 未配置密码时受限目录可被未授权访问"
id = "POC-AVE-2013-0066"
name = "CVE-2013-0629 PoC"
severity = "high"
tags = ["ave-2013-0066"]
vuln_id = [
    "CVE-2013-0629",
    "AVE-2013-0066",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/CFIDE/administrator/"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "ColdFusion Administrator Login",
    "CFIDE",
    "Administrator",
]

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/CFIDE/administrator/index.cfm"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "ColdFusion",
    "Administrator",
]
