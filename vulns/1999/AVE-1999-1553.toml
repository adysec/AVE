[basic]
description = "Digital OpenVMS 7.1 及更早版本中的 loginout 组件存在认证绕过漏洞。当启用外部认证机制时，攻击者可利用该漏洞绕过正常登录验证流程，未经授权获取系统访问权限。该漏洞影响 OpenVMS 多个版本，可能导致敏感信息泄露或系统被非法控制，CVSS 评分 7.5，危害等级高。"
published = "1998-07-16T04:00:00.000"
remediation = "立即升级至 OpenVMS 7.1-2 或更高版本（Compaq 已通过 DEC 补丁包修复该缺陷）。若无法升级，可禁用外部认证功能（EXTAUTH），在 SYSGEN 中将相关参数置 0 或移除 AUTH_EXTERNAL 授权项；同时通过防火墙限制对 LOGINOUT 端口的网络访问，仅允许受信 IP 连接。对于仍在运行的老旧系统，建议迁移至 VSI 当前支持的 OpenVMS 8.4/9.x 版本以获得持续安全补丁支持。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "Digital OpenVMS loginout 权限提升漏洞"
updated = "2026-06-16T21:50:42.860"

