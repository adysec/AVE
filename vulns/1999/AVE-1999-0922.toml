[basic]
description = 'MacOS 9 的空闲锁定功能存在安全绕过漏洞。本地攻击者可通过以下步骤绕过已锁定会话的密码保护：在锁定状态下选择"注销"选项，当系统弹出应用程序确认对话框时选择"取消"按钮，即可直接返回被锁定的会话界面，从而获取未授权访问权限。该漏洞影响 MacOS 9 系统，攻击者需具备本地访问权限，CVSS 评分 4.6，危害等级中危。'
published = "1999-10-26T04:00:00.000"
remediation = "Mac OS 9 已停止技术支持，Apple 未发布官方补丁。建议禁用系统内置空闲锁定功能，改用第三方屏幕锁定软件（如 MacBouncer Plus）替代；同时加强物理访问控制，限制本地用户接触终端，并考虑升级到受支持的 macOS 版本以获取完整安全功能。"
score = 4.6
severity = "MEDIUM"
sources = ["avd"]
title = "Apple MacOS 9 空闲锁定安全绕过漏洞"
updated = "2026-06-16T21:49:40.277"

