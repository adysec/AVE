[basic]
description = "IBM AIX 操作系统存在缓冲区溢出漏洞，本地攻击者可通过向受影响系统发送超长数据触发缓冲区溢出，导致系统崩溃或获取 root 权限。该漏洞影响 IBM AIX 3.2/4.1、SCO Unixware 7.1.1、SGI IRIX 5.3 及 Sun Solaris 2.5.1 等多个 Unix 系统，属于本地权限提升类漏洞。"
published = "1997-12-05"
remediation = "针对 IBM AIX 3.2/4.1：安装 APAR IX69054 或更新到更高版本，同时停止 rpc.statd 和 rpc.lockd 服务（`/usr/sbin/rpc.statd -d`）。针对 Sun Solaris 2.5.1：安装 Sun 安全补丁 103672 或禁用 statd 服务（注释 `/etc/rc2.d/S73nfs.client` 中相关行）。针对 SGI IRIX 5.3：应用 IRIX 安全补丁 2172。通用缓解措施：在防火墙上封锁对 111 (portmapper) 和 2049 (NFS) 端口的访问，或使用 TCP Wrappers 限制 statd 仅允许受信主机访问。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "IBM AIX 缓冲区溢出漏洞"
updated = "1997-12-05"

