[basic]
description = "Netscape Enterprise Server 3.x 及 4.x 存在信息泄露漏洞。远程攻击者可通过向目标服务器发送特制的 PageServices 查询请求，在无需任何身份认证的情况下获取服务器上的文件列表信息，导致敏感目录结构与文件路径暴露。攻击者可利用泄露的信息进一步探测系统内部结构或实施定向攻击。该漏洞利用难度低，影响范围广。"
published = "1998-08-01T04:00:00.000"
remediation = "建议升级 Netscape Enterprise Server 至 4.1 以上版本，或在服务器配置中禁用 PageServices CGI 功能（删除或重命名相关脚本文件），并配置 Web 服务器访问控制列表限制敏感路径的访问。如已迁移至 iPlanet/Oracle 分支，请升级到对应产品的最新安全版本。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Netscape Enterprise Server PageServices 信息泄露漏洞"
updated = "2026-06-16T21:48:02.477"

