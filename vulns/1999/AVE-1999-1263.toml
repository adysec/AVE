[basic]
description = "SGI IRIX 6.2 操作系统中的 SpaceWare 7.3 v1.0 套件所包含的 spaceball 程序存在环境变量注入漏洞。由于该程序未对 HOSTNAME 环境变量进行安全过滤，本地攻击者可通过在 HOSTNAME 变量中嵌入恶意命令，当 spaceball 程序执行时触发命令执行，从而获取 root 权限。该漏洞影响 IRIX 6.2 系统，CVSS 评分 7.2，危害等级高，攻击者需拥有本地访问权限。"
published = "1997-08-20T04:00:00.000"
remediation = '在 `$SWDIR/spaceball.sh` 脚本的 "Utilities" 段中添加 `HOSTNAME=/usr/bsd/hostname`，硬编码 HOSTNAME 变量为安全值，阻止环境变量注入。如不依赖 SpaceBall 设备，直接删除 `/usr/local/SpaceWare/spaceball` 二进制文件。IRIX 6.2 已停止技术支持，建议迁移至受支持的操作系统版本。'
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "SGI IRIX 6.2 SpaceWare 本地权限提升漏洞"
updated = "2026-06-16T21:50:21.450"

