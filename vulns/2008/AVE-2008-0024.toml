[basic]
description = "Apple QuickTime 7.4.5 之前版本的数据引用原子（data reference atom）处理模块存在缓冲区溢出漏洞（CWE-119）。未经身份认证的远程攻击者可构造特制的电影文件，诱使用户使用 QuickTime 打开查看，当受害者打开恶意电影文件时触发缓冲区溢出，从而导致应用程序崩溃或在目标系统上执行任意代码。该漏洞影响 Windows、Mac 等多平台的 QuickTime 播放器用户，攻击无需事先获取账户凭据，攻击复杂度中等，用户只需正常打开一个恶意媒体文件即可被攻击。Apple 已在 QuickTime 7.4.5 版本修复此漏洞。"
published = "2008-04-04T17:44:00.000"
remediation = "立即升级 Apple QuickTime 至 7.4.5 或更高版本。若无法立即升级，可通过控制面板卸载 QuickTime 或禁用浏览器中的 QuickTime  ActiveX 控件作为临时缓解措施，并避免打开来源不可信的 .mov 或 .mp4 文件。"
score = 6.8
severity = "MEDIUM"
sources = ["tenable"]
title = "Apple QuickTime 缓冲区溢出远程代码执行漏洞"
updated = "2026-06-16T22:50:48.630"

