[basic]
description = "Windows NT 文件审核策略存在安全缺陷，系统未对安全关键文件或目录的访问操作记录审计日志，无论访问成功或失败均不生成任何事件记录。未经身份认证的远程或本地攻击者可利用该漏洞访问、篡改敏感系统文件而不留下任何审计痕迹，导致安全事件无法被检测和追溯。该漏洞影响 Windows NT 系统，攻击者只需具备对目标系统文件的基本访问权限即可触发，CVSS 评分 7.5，危害等级高。"
published = "1997-01-01T05:00:00.000"
remediation = '在 Windows NT 本地安全策略（Local Security Policy）中启用"审核对象访问"（Audit object access），审核成功和失败事件；在 %SystemRoot%、%SystemRoot%\System32 等安全关键目录上配置 SACL 系统访问控制列表，确保对关键文件和目录的所有访问均被记录到安全日志中；定期检查事件查看器安全日志以监控异常访问。由于 Windows NT 已结束生命周期，建议迁移到受支持的 Windows Server 版本（如 Windows Server 2022）以获得持续安全更新。'
score = 7.5
severity = "HIGH"
sources = ["epss"]
