[basic]
description = "OSClass 3.4.2 之前版本的后台管理页面 oc-admin/index.php 存在目录遍历漏洞。远程攻击者无需身份认证即可通过向 render 动作的 file 参数传入包含 `..`（点点）的路径序列，绕过路径限制读取服务器上的任意文件，导致敏感信息泄露。该漏洞源于程序未对用户输入的 file 参数进行充分的路径过滤与校验，攻击者利用该漏洞可获取系统配置文件、数据库凭证等敏感数据。"
published = "2014-10-20T14:55:06.827"
remediation = "立即将 OSClass 升级至 3.4.2 或更高版本，该版本已修复 oc-admin/index.php 中 file 参数的目录遍历问题。如无法立即升级，可在 Web 服务器（如 Apache/Nginx）层面配置访问规则，阻止对 oc-admin/index.php 的 file 参数包含 ../ 路径的请求，并限制 oc-admin 目录的访问来源 IP。"
score = 5
severity = "MEDIUM"
sources = ["nuclei"]
title = "OSClass index.php 本地文件包含漏洞"
updated = "2026-06-17T00:12:53.043"

