[basic]
description = 'wu-ftpd 与 ProFTPD 中的 realpath 函数存在缓冲区溢出漏洞，未经身份认证的远程攻击者可通过向目标 FTP 服务器发送特制的路径请求触发该漏洞，导致缓冲区溢出，进而实现远程 root 权限获取。该漏洞影响 wu-ftpd 2.4.2、ProFTPD 1.2 pre1 及 SCO Open Server 5.0.5 等版本，CVSS 评分 10.0，危害等级严重，被称为 "palmetto" 漏洞。'
published = "1999-02-09T05:00:00.000"
remediation = "wu-ftpd 2.4.2 及 ProFTPD 1.2 pre1 的 realpath 函数存在缓冲区溢出，攻击者可远程获取 root 权限。建议立即升级 wu-ftpd 至 2.6.2 或迁移至 vsftpd；ProFTPD 升级至 1.2.0rc2 及以上版本。如无法升级，在 inetd.conf 中注释 ftp 行以禁用服务，或通过 iptables 限制 21 端口仅允许可信源 IP 访问作为临时缓解。"
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "Wu-FTPd ProFTPD FTP 服务远程缓冲区溢出漏洞"
updated = "2026-06-16T21:48:14.780"

