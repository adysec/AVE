[basic]
description = "Adobe Flash Player 的 Firefox 沙箱模块存在权限管理不当漏洞，远程攻击者可通过诱导用户访问恶意网页或打开特制的 SWF 文件触发该漏洞，导致绕过沙箱限制并执行任意代码。该漏洞影响 Windows 和 Mac OS X 平台 Flash Player 11.6.602.171 之前版本及 Linux 平台 11.2.202.273 之前版本，已在 2013 年 2 月被检测到在野利用，CVSS 评分 8.8，危害等级高。Adobe 已发布安全更新修复此漏洞。"
published = "2013-02-27T00:55:01.017"
remediation = "立即升级 Adobe Flash Player 至 Windows/Mac 平台 11.6.602.171 或 Linux 平台 11.2.202.273 及以上版本。鉴于 Adobe 已于 2020 年底停止 Flash Player 支持并发布停用通知，建议彻底卸载 Flash Player，移除所有浏览器插件及 ActiveX 控件，并在浏览器中禁用 Flash 功能，从根本上消除攻击面。"
score = 8.8
severity = "HIGH"
sources = ["kev"]
title = "Adobe Flash Player 沙箱权限提升远程代码执行漏洞"
updated = "2026-06-16T23:49:49.607"

