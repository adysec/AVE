[basic]
description = "微软 IIS 4.0/5.0 的 ISM.DLL 模块存在文件名处理漏洞，攻击者可通过向服务器发送包含大量编码空格（%20）的文件名请求并以 .htr 扩展名结尾，利用服务器错误解析触发文件碎片读取，导致读取目标系统中的任意文件。该漏洞影响 Windows 平台上的 IIS 4.0 和 5.0 服务，支持远程非认证攻击，存在较低的利用难度，可直接导致系统文件泄露，甚至为进一步攻击提供信息支持。微软已发布安全补丁修复此问题。"
published = "2000-05-11T04:00:00.000"
remediation = "升级到Microsoft IIS 6.0或更高版本，应用安全补丁并关闭.htr文件扩展处理。修改IIS元数据库配置，禁用向文件请求附加.htr扩展名的验证功能，并确保已安装最新的安全性更新。如无法立即升级，可通过防火墙规则阻止对.htr扩展名的请求流量作为临时缓解措施。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "Microsoft IIS 4.0/5.0 .HTR 文件片段读取漏洞"
updated = "2026-06-16T21:51:46.553"

