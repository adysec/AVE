[basic]
description = "vqSoft vqServer for Windows 1.9.9 版本在处理 HTTP 请求中的 URL 路径时存在目录遍历漏洞。攻击者可在请求路径中插入大量连续的点号（如 /./）来绕过服务器的路径合法性校验，这是经典「../」路径遍历攻击的一种变体。由于服务端未对规范化后的路径进行充分限制，攻击者能够跳出 Web 根目录读取服务器上的任意文件，包括系统配置文件、敏感数据与应用源码等。该漏洞可被远程未授权利用，只需向目标服务发送特制 HTTP 请求即可触发，无需认证或特殊权限。"
published = "2000-03-21"
remediation = '升级到 vqSoft 官方发布的修复版本，移除 URL 路径处理中对多重连续点号遍历序列的解析缺陷。若无法立即升级，应在服务器前端部署反向代理或防火墙规则，过滤请求 URL 中的「../」「..\」及「/./」等路径遍历字符，并将服务仅允许访问 Web 根目录下的静态资源以缓解任意文件读取风险。'
score = 5.0
severity = "MEDIUM"
sources = ["cve"]
title = "vqSoft vqServer 目录遍历任意文件读取漏洞"
updated = "2026-07-19"

