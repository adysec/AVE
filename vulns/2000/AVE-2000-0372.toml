[basic]
description = "wvdial 1.4 及更早版本中的 PPP wvdial.lxdialog 脚本在创建 .config 配置文件时，未正确设置文件权限，导致该文件被创建为全局可读（world readable）。本地攻击者只要属于 dialout 用户组，即可读取该配置文件中的登录凭据和密码信息，进而获得未授权的系统访问权限。该漏洞影响 wvdial 1.4 及之前版本，CVSS 评分 2.1，危害等级低，攻击前提是攻击者需拥有本地系统访问权限并属于 dialout 组。"
published = "1999-12-14T05:00:00.000"
remediation = "升级 wvdial 至 1.5 或更高版本，该版本已修复 .config 文件权限问题。如无法升级，手动执行 chmod 600 ~/.wvdial.conf 将配置文件权限改为仅所有者可读写，并确保 dialout 组中无不可信用户。同时检查系统内是否存在其他世界可读的拨号配置文件并修正其权限。"
score = 2.1
severity = "LOW"
sources = ["avd"]
title = "Wvdial PPP wvdial.lxdialog 脚本权限许可和访问验证漏洞"
updated = "2026-06-16T21:51:33.420"

