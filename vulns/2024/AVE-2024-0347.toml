[basic]
title = "用友时空KSOA系统PrintZPFB.jsp接口SQL注入漏洞"
description = "用友时空KSOA系统/ kp/PrintZPFB.jsp接口存在SQL注入漏洞，zpfbbh参数未进行有效的输入过滤与转义处理。攻击者无需身份认证即可通过构造恶意GET请求，在zpfbbh参数中拼接UNION SELECT等SQL语句，从而获取数据库名称、表结构、用户凭证等敏感信息。该漏洞利用门槛低，仅需发送特制HTTP请求即可触发，对使用该系统的企事业单位数据安全构成严重威胁。"
severity = "MEDIUM"
score = 5.0
sources = ["hwpoc"]
published = "2024-03-31"
updated = "2024-03-31"
remediation = "对PrintZPFB.jsp接口的zpfbbh参数实施严格的输入校验，过滤单引号、UNION、SELECT等SQL关键字；改用预编译SQL语句或参数化查询替代字符串拼接；部署WAF规则拦截含SQL注入特征的恶意请求；联系用友官方获取KSOA系统最新安全补丁并及时升级。"
