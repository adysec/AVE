[basic]
description = "Microsoft IIS 4.0 和 5.0 的 IISADMPWD 虚拟目录组件中存在输入验证缺陷，远程攻击者可通过向 inetinfo.exe 发送特制的畸形 HTR 请求（Undelimited .HTR Request），触发解析器异常而导致目标系统拒绝服务。该漏洞影响安装了 IISADMPWD 虚拟目录的 IIS 服务器，无需身份认证即可远程利用，危害等级中等。"
published = "2000-05-10T04:00:00.000"
remediation = "安装 Microsoft 安全公告 MS00-028 对应补丁，或删除 IISADMPWD 虚拟目录并移除 .htr 脚本映射。如无法打补丁，建议在 IIS 管理器中删除 .htr 应用程序映射，或升级至更高版本 IIS（6.0+）以彻底规避此漏洞。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Microsoft IIS 4.0/5.0 HTR 请求拒绝服务漏洞"
updated = "2026-06-16T21:51:26.273"

