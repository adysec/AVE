[basic]
description = "Debian 2.0 系统中 super 软件包 3.11.6 及之前版本的 syslog 日志工具存在缓冲区溢出漏洞。该漏洞位于 error.c 文件的 Error() 函数中，buf[MAXPRINT] 缓冲区缺乏边界检查。本地用户可通过发送特制日志消息触发缓冲区溢出，从而获取 root 权限。攻击者需要系统本地访问权限且 super 需启用 SYSLOG 编译选项。"
published = "1999-02-26"
remediation = "升级 super 软件包至 3.12 或更高版本以修复缓冲区溢出。由于 Debian 2.0 已停止安全支持超过 20 年，建议迁移至受支持的 Debian 版本。临时缓解措施：执行 chmod u-s /usr/bin/super 移除 setuid 位，限制不可信用户的本地登录权限。"
score = 7.2
severity = "HIGH"
sources = [
    "cve",
    "exploitdb",
]
title = "Debian 2.0 Super Syslog 缓冲区溢出漏洞"
updated = "2026-07-16"

