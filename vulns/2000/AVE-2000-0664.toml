[basic]
description = "Pine 邮件客户端 4.21 及更早版本的自动邮件检查组件中存在缓冲区溢出漏洞。远程攻击者可通过向目标用户发送一封包含超长 From 头的恶意邮件，在邮件客户端自动检查邮件时触发该漏洞，导致缓冲区溢出，进而可在目标系统上执行任意命令。该漏洞影响 UoW Pine 4.0.4、4.10 及 4.21 版本，CVSS 评分 7.5，危害等级高。攻击者无需任何身份认证即可远程利用，且无需用户交互即可触发，具有较高的实际威胁性。"
published = "2000-12-19T05:00:00.000"
remediation = "将 Pine 升级至 4.30 及以上版本（官方已修复），或迁移至其继承者 Alpine（完全重写的邮件客户端，无此缓冲区溢出漏洞）。作为临时缓解措施，可在邮件服务器或 MTA 层面过滤包含超长 From: 头的入站邮件。由于 Pine 已停止维护，强烈建议迁移到 Alpine 或使用其他活跃维护的邮件客户端（如 Mutt）。"
score = 7.5
severity = "HIGH"
sources = ["exploitdb"]
title = "UoW Pine 远程缓冲区溢出漏洞"
updated = "2026-06-16T21:52:44.540"

