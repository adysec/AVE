description = "华易企业管理云平台 `/home/zy` 接口存在 SQL 注入漏洞，攻击者无需身份认证即可通过构造恶意 SQL 语句注入数据库查询，可导致敏感数据泄露、数据库内容篡改甚至服务器被接管。该漏洞影响华易企业管理云平台全版本，攻击复杂度低，危害严重。建议厂商尽快修复，用户升级至安全版本或部署 WAF 防护。"
published = "0703"
remediation = "厂商已修复 SQL 注入漏洞，请立即升级华易企业管理云平台至最新版本；对 /home/zy 接口的入参做严格过滤与参数化查询处理，禁止拼接 SQL 语句；部署 WAF 拦截含 SQL 关键字的请求作为临时缓解措施。"
