[info]
author = "AVE"
description = "Internet Explorer 5.0 Microsoft Scriptlet Component 任意文件读取漏洞验证。通过构造恶意网页，利用 Scriptlet Component (scrobj.dll) 读取客户端本地文件。"
id = "POC-AVE-1999-0132"
name = "CVE-1999-0468 PoC"
severity = "high"
tags = [
    "cve-1999-0468",
    "ie",
    "scrobj",
    "file-read",
]
vuln_id = [
    "CVE-1999-0468",
    "AVE-1999-0132",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["06290BD5-48AA-11D2-8432-006008C3FBFC"]
