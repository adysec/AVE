[basic]
description = "UnixWare 操作系统的 pis 和 mkpis 命令存在权限提升漏洞，本地攻击者可通过符号链接（symlink）攻击方式，在程序处理临时文件时诱导其以高权限覆盖或读取任意文件，从而获取 root 权限。该漏洞影响 UnixWare 多个版本，CVSS 评分 4.6，危害等级中等。攻击者需拥有本地系统访问权限方可利用。"
published = "1999-12-27T05:00:00.000"
remediation = "建议立即升级 UnixWare 至针对此漏洞的补丁版本（7.1.1 及以上安全更新），或从 SCO 官方 ftp 获取 pis/mkpis 补丁。临时缓解措施：移除 pis 与 mkpis 命令的 setuid 权限位（chmod u-s /usr/bin/pis /usr/bin/mkpis），阻止本地普通用户以更高权限执行。"
score = 4.6
severity = "MEDIUM"
sources = ["avd"]
title = "UnixWare pis/mkpis 命令符号链接本地权限提升漏洞"
updated = "2026-06-16T21:50:51.333"

