[basic]
description = "gFTP FTP 客户端 1.13 及 2.0.0 之前版本存在密码明文记录漏洞。程序在登录日志窗口或日志文件中以明文形式保存 FTP 账户密码，本地攻击者可通过读取日志文件或查看屏幕输出获取敏感凭据，进而接管 FTP 服务器。该漏洞源于开发者未对密码进行脱敏处理，影响范围广且利用简单，CVSS 评分 4.6，危害等级中危。"
published = "1999-09-05T04:00:00.000"
remediation = "升级到 gFTP 2.0.0 或更高版本，该版本已修复密码明文记录问题，密码不再显示在日志窗口和日志文件中。同时应检查并删除旧版本遗留的日志文件（通常位于 ~/.gftp/ 或临时目录下），避免其中残留的明文密码被本地低权限用户获取。如无法立即升级，可使用 `strace` 或类似工具确认当前 gFTP 行为，并避免在共享或多用户系统上使用低于 2.0.0 的版本。"
score = 4.6
severity = "MEDIUM"
sources = ["avd"]
title = "gFTP FTP客户端明文密码记录漏洞"
updated = "2026-06-16T21:50:43.360"

