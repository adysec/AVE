[basic]
description = "Eicon Networks DIVA LAN ISDN Modem 1.0/2.0 的 HTTP 管理服务中 login.htm 页面存在输入验证缺陷，远程攻击者无需认证即可通过向该页面提交超长密码参数触发缓冲区溢出，导致设备服务崩溃挂起，造成拒绝服务。该漏洞影响 DIVA LAN ISDN Modem 1.0 至 2.0 版本，CVSS 评分 7.5，危害等级高。"
published = "1999-11-07T05:00:00.000"
remediation = "建议升级 Eicon Networks DIVA ISDN Modem 固件至最新版本（如已停止支持则更换为受支持的设备），并在防火墙层面限制对 login.htm 页面（TCP 80 端口）的远程访问，仅允许受信任的内部 IP 地址访问管理界面，同时设置强密码策略防止暴力破解。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "Eicon Networks DIVA LAN ISDN Modem 登录页面密码参数远程拒绝服务漏洞"
updated = "2026-06-16T21:50:38.767"

