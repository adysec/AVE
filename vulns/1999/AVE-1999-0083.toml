[basic]
description = "SGI IRIX 操作系统的 eject 命令存在缓冲区溢出漏洞，由于未对用户输入长度进行充分校验，本地攻击者可通过向 eject 命令传递超长参数触发缓冲区溢出，成功利用此漏洞可获得 root 权限。该漏洞影响 SGI IRIX 6.2 及可能更早版本，需要本地系统访问权限，CWE 分类为缓冲区溢出（CWE-119）。"
published = "1997-07-16T04:00:00.000"
remediation = "移除 /usr/sbin/eject 的 setuid root 权限（chmod u-s /usr/sbin/eject），防止普通用户通过该漏洞提权至 root。同时限制本地登录用户范围，仅允许受信任用户访问系统。由于 SGI IRIX 已于 2013 年终止支持且无官方安全更新，长期建议迁移至受支持的操作系统。"
score = 7.2
severity = "HIGH"
sources = ["epss"]
title = "SGI IRIX eject 命令缓冲区溢出权限提升漏洞"
updated = "2026-06-16T21:47:22.983"

