[basic]
description = "Sniffit 0.3.x 的日志记录选项 (-L) 中存在缓冲区溢出漏洞，远程攻击者可通过向目标 Sniffit 服务发送特制的超长 MAIL FROM 邮件头触发该漏洞，导致任意代码执行。该漏洞影响 Sniffit 0.3.6 及 0.3.7 Beta 版本，CVSS 评分 10.0，危害等级严重。攻击者无需身份认证即可远程利用，需目标开启 -L 日志记录选项。"
published = "2000-05-02T04:00:00.000"
remediation = "建议立即升级 Sniffit 至 0.3.7 Beta 之后的安全版本，或彻底停用已停止维护的 Sniffit，改用 tcpdump 或 Wireshark 等活跃维护的替代工具。若暂时无法替换，避免使用 `-L` 日志选项处理来自不可信来源的邮件数据，并限制 Sniffit 的运行用户权限为最低级别（如非 root 专用账户），以降低缓冲区溢出被利用的风险。"
score = 10
severity = "CRITICAL"
sources = ["cve"]
title = "Brecht Claerhout Sniffit 邮件日志记录缓冲区溢出漏洞"
updated = "2026-06-16T21:51:31.160"

