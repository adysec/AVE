[basic]
description = "Cisco Cache Engine 的 Web 管理界面存在信息泄露漏洞。远程攻击者无需身份认证即可直接访问性能统计页面，获取系统运行状态、网络流量、缓存命中率及客户端连接等敏感信息。该漏洞影响 Cisco Cache Engine 系列设备，攻击者可利用泄露的数据分析网络拓扑与流量模式，为后续攻击收集情报，需通过访问控制限制管理接口的访问范围。"
published = "1999-12-16T05:00:00.000"
remediation = "在 Cache Engine 上配置访问控制列表 (ACL)，仅允许特定管理 IP 访问 Web 管理界面（如 `access-list 10 permit 192.168.0.0 0.0.0.255` 后在 HTTP 配置中引用）。建议将管理口绑定到独立 management VLAN，避免与业务网络互通。如无需远程 Web 管理，在 CLI 下执行 `no ip http server` 关闭 HTTP 服务。由于 Cisco Cache Engine 已全面停产停服，建议迁移至 Cisco WAAS 或等效替代产品以获得持续安全支持。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Cisco Cache Engine Web管理界面信息泄露漏洞"
updated = "2026-06-16T21:49:29.750"

