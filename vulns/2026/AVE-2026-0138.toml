[basic]
description = "青龙定时任务管理面板（Qinglong）的 dependencies 依赖管理功能存在远程代码执行漏洞。由于对依赖包名称的输入校验不严，攻击者可在未授权的情况下构造包含恶意命令的依赖请求，触发命令注入，导致在目标服务器上执行任意代码，进而完全控制服务器。该漏洞影响青龙 v2.20.2 之前的所有版本。官方已发布 v2.20.2 版本修复此漏洞，建议用户及时升级。"
published = "nday"
remediation = "立即升级青龙面板至 v2.20.2 及以上版本（当前最新 v2.21.0），可通过 `docker pull whyour/qinglong:latest` 拉取最新镜像重启容器完成更新。若无法升级，在 nginx 反向代理层限制 `/api/dependencies` 接口的访问来源 IP。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "青龙 青龙定时任务管理面板 远程代码执行漏洞"
updated = "nday"

