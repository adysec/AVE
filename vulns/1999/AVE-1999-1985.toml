[basic]
description = "IBM HomePagePrint 1.0.7 for Windows98J 存在缓冲区溢出漏洞。远程攻击者可通过构造包含超长 IMG_SRC HTML 标签的恶意网页，诱使用户访问后触发缓冲区溢出，导致任意代码执行。该漏洞影响 IBM HomePagePrint 1.0.7 版本，CVSS 评分 7.5，危害等级高。攻击者无需身份认证，仅需用户通过浏览器访问恶意页面即可触发，属于典型的远程缓冲区溢出漏洞。"
published = "1999-11-02T05:00:00.000"
remediation = "该漏洞存在于已停止维护的 IBM HomePagePrint 1.0.7（Windows 98J），官方未发布补丁。彻底修复措施为卸载该软件并停止使用；如无法卸载，可在浏览器中禁用 ActiveX 控件并将该站点加入受限区域，阻止恶意 HTML 中的 IMG_SRC 长标签触发缓冲区溢出。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "IBM HomePagePrint 1.0.7 远程缓冲区溢出漏洞"
updated = "2026-06-16T21:50:38.487"

