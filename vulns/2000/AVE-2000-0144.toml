[basic]
description = "Microsoft Internet Explorer 4.x及5.x版本附带的Microsoft Java虚拟机(VM)存在安全漏洞。远程攻击者可在恶意网站上托管特制的Java小程序(applet)，诱使用户访问后突破Java沙箱安全限制，未经授权读取目标计算机上的任意文件。攻击者需提前知晓目标文件的完整路径和文件名。该漏洞CVSS评分5.1，危害等级中危，影响Windows 95/98/NT/2000平台。"
published = "2000-02-18T05:00:00.000"
remediation = "该漏洞影响已停止支持的 Microsoft Java Virtual Machine（Internet Explorer 4.x/5.x 内置），微软已不再提供补丁分发。建议立即卸载 Microsoft VM，改用现代浏览器（如 Edge/Chrome/Firefox）；在 Internet Explorer 中禁用 Java 小程序支持（Internet 选项 → 安全 → 自定义级别 → 禁用 Java 小程序）；如仍使用旧版 IE，可安装 Microsoft .NET Framework 替代方案并移除旧版 MSJVM（使用 msjavxps.exe 或通过 添加/删除程序 卸载）。"
score = 5.1
severity = "MEDIUM"
sources = ["epss"]
title = "Microsoft Internet Explorer Java VM 沙箱逃逸文件任意读取漏洞"
updated = "2026-06-16T21:51:07.757"

