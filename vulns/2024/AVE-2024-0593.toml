[basic]
description = "Das U-Boot 的 squashfs 文件系统解析函数 sqfs_resolve_symlink 中存在整数溢出漏洞（CWE-190）。当攻击者构造一个 inode 大小为 0xffffffff 的恶意 squashfs 镜像时，整数溢出导致 malloc(0) 分配零字节内存，进而引发内存越界写入，可能造成代码执行。该漏洞影响 Das U-Boot 2025.01-rc1 之前的所有版本，需物理接触或已获得系统访问权限的攻击者挂载特制 squashfs 文件系统触发，CVSS 评分 7.1，危害等级高。"
published = "2025-02-18T23:15:09.620"
remediation = "立即将 Das U-Boot 升级至 v2025.01-rc1 及以上版本（上游修复 commit: 233945eba63e）。Debian 用户：Bullseye 升级至 2021.01+dfsg-5+deb11u3，Bookworm 升级至 2023.01+dfsg-2+deb12u3，Trixie/Sid 升级至 2025.01-3 及以上。如无法升级，避免加载或挂载来源不可信的 squashfs 镜像文件。"
score = 7.1
severity = "HIGH"
sources = ["msrc"]
title = "Das U-Boot SquashFS 整数溢出漏洞"
updated = "2026-06-17T08:13:27.937"

