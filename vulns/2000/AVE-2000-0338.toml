[basic]
description = "Netscape Communicator 4.73及更早版本在导入新证书时存在符号链接跟随漏洞。当用户导入证书时，程序会跟随/tmp目录下的符号链接，导致本地攻击者可以利用此漏洞覆盖目标用户的任意文件，造成信息泄露或系统破坏。攻击者需要本地访问权限，利用难度较高。"
published = "2000-05-10"
remediation = "升级到Netscape Communicator 4.73以上版本，或限制本地用户对/tmp目录的写权限，避免符号链接攻击。"
score = 5.0
severity = "MEDIUM"
sources = [
    "cve",
    "exploitdb",
]
title = "Netscape Communicator 证书导入符号链接漏洞"
updated = "2026-06-16"

