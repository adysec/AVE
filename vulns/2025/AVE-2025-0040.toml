[basic]
description = 'Zyxel DX3300-T0 固件版本 5.50(ABVY.6.3)C0 及之前版本存在操作系统命令注入漏洞，经过认证的攻击者可通过向 CGI 程序的 "priv" 参数注入恶意操作系统命令，在目标设备上以 root 权限执行任意命令。该漏洞允许攻击者完全控制受影响设备，危害等级高（CVSS 8.8），建议用户立即升级至修复版本。'
published = "2025-11-18T02:15:45.410"
remediation = "立即将 Zyxel DX3300-T0 固件升级至 5.50(ABVY.6.4)C0 或更高版本（联系 Zyxel 技术支持获取固件文件）。如无法立即升级，确保设备 WAN 访问保持默认关闭状态，并设置强密码且定期更换，防止攻击者通过认证后利用 priv 参数注入操作系统命令。"
score = 8.8
severity = "HIGH"
sources = ["hwpoc"]
title = "Zyxel DX3300-T0 操作系统命令注入漏洞"
updated = "2026-06-17T10:07:27.083"

