[basic]
description = "Frontpage Server Extensions 存在信息泄露漏洞。未经身份认证的远程攻击者可通过向目标服务器 `/_vti_bin/` 虚拟目录下的 `shtml.dll` 发送特制的 RPC POST 请求，利用该漏洞获取服务器上匿名账户的名称。该漏洞影响运行 Microsoft FrontPage Server Extensions 的 IIS 服务器，攻击者无需任何凭据即可在远程发起探测，造成敏感账户信息泄露，为后续攻击提供有利信息。Microsoft 已在后续安全更新中修复此漏洞。"
published = "2000-02-02T05:00:00.000"
remediation = "升级 Microsoft FrontPage Server Extensions 至包含该漏洞修复的 FrontPage 2000 Server Extensions 更新版本（如 Windows 2000 SP1 及以上随附版本），或通过 Windows Update 安装对应安全补丁。临时缓解措施：在 IIS 中移除或限制对 /_vti_bin/ 虚拟目录（尤其是 shtml.dll）的匿名 RPC POST 访问权限，并配置 IP 限制或关闭不必要的 FrontPage 扩展功能。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Microsoft Frontpage Server Extensions 匿名账户名称泄露漏洞"
updated = "2026-06-16T21:51:01.787"

