[basic]
description = "glFTPd 1.17.2 版本包含一个默认的 glftpd 用户账户，该账户使用默认密码且 UID 为 0（超级用户权限）。远程攻击者可利用该默认账户直接登录目标 FTP 服务器，获得系统最高权限，进而执行任意命令、上传恶意文件或窃取敏感数据。该漏洞危害严重，无需任何身份认证即可触发。"
published = "1999-12-23T05:00:00.000"
remediation = "立即删除或禁用 glFTPd 中的默认 glftpd 账户，或修改其默认密码为强密码；同时升级到 glFTPd 最新版本（如 2.x 系列），避免使用 UID 0 的默认管理账户；在 ftpusers 文件中限制该账户的登录权限，并禁用匿名匿名访问作为临时缓解措施。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "glFTPd 1.17.2 默认账户远程代码执行漏洞"
updated = "2026-06-16T21:50:52.390"

