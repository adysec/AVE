[basic]
description = "mgetty 软件包中的 faxrunq 和 faxrunqd 组件存在符号链接攻击漏洞。本地攻击者可通过在 /var/spool/fax/outgoing/ 目录下创建指向目标文件的符号链接 .last_run，诱使 faxrunq 以特权进程身份操作该链接，从而实现对目标文件的任意创建或修改。该漏洞影响 mgetty 1.1.19 至 1.22.8 版本，CVSS 评分 2.1，危害等级低，利用前提为攻击者拥有本地访问权限。"
published = "2000-10-20T04:00:00.000"
remediation = "升级 mgetty 至 1.1.22 或更高版本，该版本已修复 faxrunq/faxrunqd 对 /var/spool/fax/outgoing/.last_run 的符号链接竞争条件问题。如无法升级，可移除 faxrunq 和 faxrunqd 的 setuid 位（chmod u-s /usr/bin/faxrunq /usr/bin/faxrunqd）作为临时缓解措施。"
score = 2.1
severity = "LOW"
sources = ["redhat"]
title = """The user wants me to generate a Chinese title for CVE-2000-0691 in the format "厂商 产品 漏洞类型". From the known information: - Vendor: Gert Doering (or could be "Gert Doering mgetty") - Product: mgetty (specifically faxrunq and faxrunqd components) - Vulnerability type: Symbolic link traversal / symlink attack The vulnerability is about mgetty's faxrunq and faxrunqd allowing local users to create or modify arbitrary files via a symlink attack. A good Chinese title would be: "Gert Doering mgetty 符号链接遍历漏洞" or "Gert Doering mgetty 本地符号链接攻击漏洞" Let me think about the best format. The example is "Microsoft Windows TCP/IP 远程代码执行漏洞". So: - Vendor: Gert Doering - Product: mgetty (faxrunq/faxrunqd) - Vuln type: 符号链接遍历漏洞 / 符号链接攻击漏洞 / 本地文件创建或修改漏洞 The vulnerability is about symlink attack leading to arbitrary file creation/modification. So it should be something like "符号链接漏洞" or "符号链接遍历漏洞". I'll go with: Gert Doering mgetty 符号链接遍历漏洞<value"""
updated = "2026-06-16T21:52:16.667"

