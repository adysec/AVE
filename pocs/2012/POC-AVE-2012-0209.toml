[info]
author = "ave"
description = "通过构造特制HTML页面触发IE 6-8中mshtml!CDwnBindInfo释放后重用漏洞，验证目标是否存在CVE-2012-4792。当用户访问恶意页面时，CButton对象被释放后CDoc中Default Element指针未更新，导致后续CElement::FindDefaultElem访问已释放内存，可导致远程代码执行。"
id = "POC-AVE-2012-0209"
name = "Microsoft Internet Explorer CDwnBindInfo Use-After-Free PoC"
severity = "high"
tags = ["ave-2012-0209"]
vuln_id = [
    "CVE-2012-4792",
    "AVE-2012-0209",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "header"
type = "word"
words = [
    "MSIE 6.0",
    "MSIE 7.0",
    "MSIE 8.0",
]
