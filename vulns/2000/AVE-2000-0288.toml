[basic]
description = "Zone Labs ZoneAlarm 2.1.10 及更早版本的个人防火墙产品未对源端口为 67（BOOTP/DHCP 服务端口）的 UDP 数据包进行过滤，导致远程攻击者可通过发送源端口为 67 的特制 UDP 数据包绕过防火墙规则，直接与目标系统上受保护的服务进行通信。该漏洞攻击复杂度低，无需认证，影响 ZoneAlarm 2.1.10 及之前版本，CVSS 评分 7.5，危害等级高危。厂商已于后续版本中修复此问题。"
published = "2000-04-24T04:00:00.000"
remediation = "升级 ZoneAlarm 至 2.1.11 或更高版本，该版本已修复 UDP 源端口 67（DHCP）绕过防火墙规则的问题。如无法升级，可配置防火墙规则禁止外部 UDP 源端口 67 的入站流量，或禁用 DHCP 客户端服务作为临时缓解措施。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "Zone Labs ZoneAlarm 个人防火墙 UDP 源端口 67 过滤绕过漏洞"
updated = "2026-06-16T21:51:30.653"

