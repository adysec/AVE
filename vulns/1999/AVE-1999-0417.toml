[basic]
description = "NCSA HTTPd Web 服务器 1.5c 版本中存在缓冲区溢出漏洞，远程攻击者可通过向目标服务器发送超长或特制的 HTTP 请求触发该漏洞，导致远程代码执行或服务进程崩溃。该漏洞影响 NCSA HTTPd 1.5c 版本，CVSS 评分 10.0，危害等级严重。由于 NCSA HTTPd 已停止维护，建议迁移至其他 Web 服务器软件。"
published = "1995-02-01T05:00:00.000"
remediation = "NCSA HTTPd 项目已停止维护多年，建议立即迁移至 Apache HTTP Server 或 Nginx 等仍在积极维护的 Web 服务器软件。临时缓解措施可在防火墙或网络层面对不受信来源的 HTTP 端口（默认 80）进行访问控制，但无法彻底消除漏洞风险。"
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "NCSA HTTPd 远程缓冲区溢出漏洞"
