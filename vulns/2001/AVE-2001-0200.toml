[basic]
description = "Microsoft Index Server 2.0 和 Indexing Service 2000 中的 ISAPI 扩展（idq.dll）存在缓冲区溢出漏洞，在 IIS 6.0 及更早版本中尤为严重。该漏洞源于在处理 Internet Data Administration (.ida) 和 Internet Data Query (.idq) 文件时，系统未能对用户输入的长度进行有效校验，导致攻击者可通过向目标系统发送特制的数据包触发缓冲区溢出，致使恶意代码在目标系统中执行。该漏洞影响 Windows 2000 及更早版本的 Microsoft IIS 服务，攻击者无需任何身份验证即可远程利用此漏洞， CVSS 评分高达 10.0（CVSS 向量：AV:N/AC:L/Au:N/C:C/I:C/A:C），表明其对系统保密性、完整性和可用性的极度严重影响。攻击者可通过构造精心-crafted 的 .idq 文件实现远程代码执行或获取系统控制权。微软已发布安全更新修补了该漏洞，用户应及时应用补丁以确保系统安全。"
published = "2001-07-21T04:00:00.000"
remediation = "建议立即安装 Microsoft 安全更新 Q300972（MS01-033），该补丁修复了 idq.dll 在 Index Server 2.0 及 Indexing Service 中处理 .ida 和 .idq 请求时存在的缓冲区溢出漏洞。受影响系统包括 Windows NT 4.0 IIS 4.0 与 Windows 2000 IIS 5.0，补丁已包含在 Windows 2000 Service Pack 3 及后续版本中，也可通过 Microsoft Update 或 Windows Update 自动获取。如暂时无法安装补丁，可先在 IIS 管理控制台中删除 .idq 和 .ida 文件的脚本映射作为临时缓解措施，但需注意该映射在系统组件变更时可能自动恢复，因此建议尽快应用补丁。"
score = 10
severity = "CRITICAL"
sources = ["exploitdb"]
title = "Microsoft IIS Index Server ISAPI 扩展缓冲区溢出漏洞"
updated = "2026-06-16T21:54:25.420"

