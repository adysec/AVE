[basic]
description = "Windows NT 4.0 的命名管道 RPC 连接关闭机制存在缺陷，远程攻击者可通过发送包含畸形数据的连接请求，导致系统无法正常关闭无效的命名管道 RPC 连接，从而引发资源耗尽型拒绝服务。该漏洞影响 Windows NT 4.0 系统，攻击者无需身份认证即可利用，CVSS 评分 7.5，危害等级高。微软已发布安全更新修复此漏洞。"
published = "1999-12-31T05:00:00.000"
remediation = "安装 Microsoft 安全公告 MS98-017 提供的补丁程序（KB195733）。由于 Windows NT 4.0 已停止支持，建议升级至 Windows Server 2012 或更高版本。临时缓解措施：在防火墙层面阻止对 RPC 服务（TCP/UDP 135 端口）的匿名外部访问，并限制命名管道连接来源。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "Microsoft Windows NT 4.0 命名管道 RPC 拒绝服务漏洞"
updated = "2026-06-16T21:49:46.667"

