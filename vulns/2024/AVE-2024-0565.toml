[basic]
description = '''Perl 编程语言中的 `tr`（音译）运算符在处理左侧非 ASCII 字节时存在堆缓冲区溢出漏洞。当 `tr` 运算符的左操作数包含非 ASCII 字节时，`S_do_trans_invmap` 函数中的目标指针 `d` 会发生越界写入，导致堆内存损坏。攻击者可通过构造特制的 Perl 脚本（如 `perl -e '$_ = "\x{FF}" x 1000000; tr/\xFF/\x{100}/;'`）触发该漏洞，在缺乏足够内存安全防护的平台上可能导致拒绝服务或远程代码执行。该漏洞影响 Perl 5.34、5.36、5.38、5.40 及 5.33.1 至 5.41.10 的开发版本，CVSS 评分 8.4，危害等级高。利用该漏洞需要本地执行恶意 Perl 脚本的能力，无需特殊权限或用户交互。'''
published = "2025-04-13T14:15:14.527"
remediation = "升级 Perl 至修复版本：5.40.x 用户升级到 5.40.2，5.38.x 用户升级到 5.38.4，5.34.x 和 5.36.x 用户升级到对应发行版的最新安全补丁版本。如无法立即升级，可应用上游 commit 87f42aa0e0096e9a346c9672aa3a0bd3bef8c1dd 的补丁（https://github.com/Perl/perl5/commit/87f42aa0e0096e9a346c9672aa3a0bd3bef8c1dd.patch）手动修补源码后重新编译。Linux 发行版用户应通过系统包管理器安装安全更新（如 apt upgrade perl / yum update perl）。临时缓解措施：避免在 `tr` 运算符左侧使用非 ASCII 字节序列处理不可信输入。"
score = 8.4
severity = "HIGH"
sources = ["msrc"]
title = "Perl Perl tr运算符堆缓冲区溢出漏洞"
updated = "2026-06-17T08:12:08.977"

