[basic]
description = "adawolfa/isdoc 在读取 ISDOCX（ZIP）档案和嵌有 ISDOC 文档的 PDF 文件时，未对解压后数据大小进行校验，存在解压炸弹漏洞（CWE-400/CWE-409）。攻击者可构造特制的恶意文件，通过 getFromName() 解压 ISDOC 文档或 saveTo() 复制附件时，将极小文件膨胀至数 GB，导致内存或磁盘耗尽造成拒绝服务。该漏洞不影响机密性和完整性，仅影响可用性，需要用户打开恶意文件才能触发。"
published = "2026-07-15"
remediation = "升级至 1.4.3、1.5.1、1.6.1 或 2.0.0 及以上版本。修复版本在解压前通过 statName() 读取 ZIP 中央目录中未压缩大小，对 ISDOC 文档限制 256KB、附件限制 32MB、PDF 内嵌文件限制 256MB，超出即抛出 ReaderException::zipEntryTooLarge() 等异常并中止。1.0–1.3 系列因生命周期终止不受支持，须升级到维护版本。临时措施：限制仅解析受信任来源的文件。"
score = 6.5
severity = "MEDIUM"
sources = ["ghsa"]
title = "adawolfa isdoc 未受控资源消耗漏洞（解压炸弹）"
updated = "2026-07-15"

