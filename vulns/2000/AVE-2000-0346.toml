[basic]
description = "L-Soft LISTSERV 1.8 Web Archives 组件存在缓冲区溢出漏洞，未经身份认证的远程攻击者可通过向 Web Archives 组件发送特制请求触发缓冲区溢出，进而在目标系统上执行任意命令。该漏洞影响 L-Soft LISTSERV 1.8 版本，CVSS 评分 10.0（严重），攻击向量为网络、攻击复杂度低、无需认证、机密性/完整性/可用性影响均为完全。攻击者可通过构造恶意 HTTP 请求触发缓冲区溢出，实现远程代码执行，完全控制目标服务器。ExploitDB 已公开相关利用代码（EDB-19893）。"
published = "2000-05-03T04:00:00.000"
remediation = "立即升级 L-Soft Listserv 至 1.8d 或更高版本（官方已在 2000 年 5 月发布修复补丁）。若无法立即升级，请在 Web 服务器或防火墙层面禁用 Listserv Web Archives 组件（通常为 /archives/ 或 /wa/ 路径），或在防火墙层面限制对 Listserv Web 管理端口（默认 80/443）的访问仅限可信管理 IP。同时建议在 Web 应用防火墙（WAF）层面部署针对缓冲区溢出特征的防护规则，并限制 Listserv 服务进程权限以最小权限运行。立即升级至官方最新版本为最彻底修复方案。"
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "L-Soft LISTSERV 1.8 Web Archives 缓冲区溢出漏洞"
updated = "2026-06-16T21:51:42.320"

