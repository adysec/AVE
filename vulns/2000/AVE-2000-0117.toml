[basic]
description = "SCO UnixWare 中的 scohelp 程序存在缓冲区溢出漏洞，远程攻击者可通过发送特制的恶意请求触发缓冲区溢出，从而在目标系统上以 scohelp 进程权限执行任意命令。该漏洞影响 SCO UnixWare 7.x 等版本，CVSS 评分 7.2（高危），攻击者无需认证即可远程利用，通过发送超长参数导致栈缓冲区溢出劫持控制流，进而执行任意 Shell 命令获取系统控制权。SCO 已发布补丁修复该漏洞，建议尽快升级至修复版本或禁用 scohelp 服务。"
published = "2000-01-27T05:00:00.000"
remediation = "立即应用 SCO UnixWare 7.1.4 或更高版本的安全补丁包 (SP4+)，其中修复了 scohelp 程序的缓冲区溢出问题，或启用内核地址空间布局随机化 (KASLR) 和数据执行保护 (DEP) 以缓解该漏洞。如无法立即更新，建议在 /etc/services 文件中删除或重命名 scohelp 服务以禁用该程序。"
score = 7.2
severity = "HIGH"
sources = ["cve"]
