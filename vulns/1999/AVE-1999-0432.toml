[basic]
description = "INN (InterNetNews) 新闻组服务器软件的 nnrpd 组件在处理用户请求时存在缓冲区溢出漏洞。远程攻击者无需身份认证即可向目标系统发送特制新闻组请求触发该漏洞，成功利用可导致任意代码执行。该漏洞影响 INN 1.6 及之前版本，CVSS 评分 7.5，危害等级高。"
published = "1997-07-21T04:00:00.000"
remediation = "建议升级 INN（InterNetNews）至 2.0 或更高版本（当前最新为 2.7.x），该漏洞在 nnrpd 的输入长度检查中修复，INN 2.0 起已彻底解决此溢出问题。如无法升级，可在防火墙中限制对 NNTP 端口（119/tcp）的访问作为临时缓解措施。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "INN nnrpd 缓冲区溢出远程代码执行漏洞"
updated = "2026-06-16T21:47:59.740"

