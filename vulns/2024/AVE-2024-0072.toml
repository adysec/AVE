[basic]
description = "tags.<value>亿华考勤管理系统unloadfile.ashx接口存在任意文件上传漏洞，未经身份认证的远程攻击者可通过构造multipart/form-data格式的POST请求，向该接口上传恶意文件，进而获取Web服务器权限并实现远程代码执行。该漏洞影响部署亿华考勤管理系统的机构，攻击者无需登录即可通过向/handle/unloadfile.ashx发送特制上传请求完成利用。CVSS评分9.8，危害等级严重。"
published = "0807"
remediation = "升级亿华考勤管理系统至最新安全版本，在 web.config 中限制 unloadfile.ashx 仅允许已验证用户访问，并在上传目录配置禁止执行脚本权限（取消 Script 和 Execute 权限），同时在上传服务端校验文件类型（白名单：仅允许 jpg/png/pdf/doc 等办公格式）和文件内容 MIME 类型。"
score = 5
