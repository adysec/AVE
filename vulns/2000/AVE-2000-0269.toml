[basic]
description = "Symantec pcAnywhere 8.x 及 9.0 版本存在拒绝服务漏洞。攻击者可通过向目标主机的 pcAnywhere 服务端口发送 TCP SYN 扫描数据包（例如使用 nmap 工具），触发服务异常并导致拒绝服务。该漏洞影响 Symantec pcAnywhere 8.0.1、8.0.2、9.0 及 9.2 版本，远程攻击者无需身份认证即可利用。建议用户升级至安全版本并配置防火墙限制不必要的端口访问。"
published = "2000-04-25T04:00:00.000"
remediation = "建议立即将 Symantec pcAnywhere 升级至 9.2 之后的修复版本（如 10.0 及以上），并在防火墙或边界路由器上配置规则仅允许受信任 IP 访问 pcAnywhere 服务端口（默认 TCP 5631/5632），同时使用主机入侵检测系统屏蔽外部 TCP SYN 全端口扫描作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "赛门铁克 pcAnywhere 端口扫描拒绝服务漏洞"
updated = "2026-06-16T21:51:28.727"

