[basic]
description = "WU-FTPD 2.4.2/2.5.0/2.6.0/2.6.1/2.6.2 版本中启用 FTP 转换功能时存在命令注入漏洞。攻击者通过上传或请求包含精心构造参数的文件名（如包含 shell 元字符或命令参数的文件名），利用转换程序（如 tar、uncompress 等）将文件名作为命令参数解释执行，从而在服务器上执行任意命令。该漏洞影响启用了 FTP conversion 功能的 WU-FTPD 服务器，CVSS 评分 7.5（高危），攻击者需具备 FTP 访问权限且服务器启用了文件转换功能才可利用。"
published = "1999-12-20T05:00:00.000"
remediation = '升级到 WU-FTPD 2.6.2 或更高版本，该版本已在 ftpconversions 配置中为 tar 命令添加 "--" 参数，阻止以"-"开头的畸形文件名被解释为命令选项。如无法升级，应在 ftpaccess 配置文件中禁用 FTP conversion 功能，或迁移至 ProFTPD、vsftpd 等仍在积极维护的 FTP 服务器以消除风险。'
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "Washington University WU-FTPD FTP服务器 FTP转换命令执行漏洞"
updated = "2026-06-16T21:49:29.343"

