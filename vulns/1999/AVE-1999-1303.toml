[basic]
description = 'Cheyenne InocuLAN Anti-Virus Server 4.0 Service Pack 2 之前版本在 Windows NT 4.0 上创建更新目录时错误地设置了 "EVERYONE FULL CONTROL" 权限，导致本地用户可向该目录写入恶意 DLL 文件。当杀毒软件执行自动更新功能时，会加载并执行该恶意 DLL，从而实现本地权限提升。该漏洞影响运行 InocuLAN 4.0 SP2 前版本的 Windows NT 4.0 系统，攻击者需具备本地登录权限，利用杀毒更新机制植入木马 DLL 实现代码执行与权限提升，CVSS 评分 7.2（高危）。'
published = "1998-06-11T04:00:00.000"
remediation = '升级到 Cheyenne InocuLAN 4.0 Service Pack 2 或更高版本以修复更新目录权限配置。若无法立即升级，请以管理员身份手动将 InocuLAN 更新目录的 NTFS 权限从"Everyone 完全控制"调整为仅 Administrators 与 InocuLAN 服务账户具备读写权限，并定期核查该目录文件完整性作为临时缓解措施。'
score = 7.2
severity = "HIGH"
sources = ["exploitdb"]
title = "Cheyenne InocuLAN Anti-Virus Server 本地权限提升漏洞"
updated = "2026-06-16T21:50:42.477"

