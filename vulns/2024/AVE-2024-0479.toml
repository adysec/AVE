[basic]
description = "GnuTLS 依赖 libtasn1 处理 ASN.1 数据。由于 libtasn1 中 DER 解码算法存在复杂度缺陷，解析包含大量 subject alternative name 或 name constraint 字段的特制 X.509 证书时 CPU 消耗急剧上升。远程攻击者可发送恶意证书使 GnuTLS 服务 CPU 占用达 100%，导致响应缓慢或完全不可用，构成拒绝服务（DoS）风险。CVSS 3.1 评分 5.3，中危。"
published = "2025-02-10"
remediation = "将 GnuTLS 升级至 3.8.8 或更高版本（3.8.0~3.8.7 均受影响，3.8.9 及以上不受影响）。RHEL 8 用户安装 RHSA-2025:4051 提供的 gnutls-3.6.16-8.el8_10.3 或更新版本；RHEL 9 用户安装 RHSA-2025:7076 提供的 gnutls-3.8.3-6.el9 或更新版本；RHEL 7 用户参考 RHSA-2025:17361。Debian 用户参考 DLA-4075-1。Siemens 设备用户关注 SSA-082556 和 SSA-202008。临时措施：在网络边界部署 TLS 拦截代理，限制单个证书中 SAN 及 name constraint 字段数量。"
score = 5.3
severity = "MEDIUM"
sources = [
    "cve",
    "nvd",
]
title = "GnuTLS libtasn1 DER解码远程拒绝服务漏洞"
updated = "2026-06-17"

