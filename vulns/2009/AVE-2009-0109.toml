[basic]
description = "Adobe BlazeDS 3.2 及更早版本存在 XML 外部实体注入（XXE）和 XML 注入漏洞。远程攻击者可通过向目标服务器发送特制的 XML 请求，注入恶意外部实体引用或标签，从而读取服务器上的任意文件或获取敏感信息。该漏洞影响 Adobe LiveCycle 8.0.1/8.2.1/9.0、LiveCycle Data Services 2.5.1/2.6.1/3.0、Flex Data Services 2.0.1 及 ColdFusion 7.0.2/8.0/8.0.1/9.0 等多个产品版本，CVSS 评分 6.5，危害等级中危。攻击无需认证，仅需向目标发送恶意构造的 XML 数据即可触发。"
published = "2010-02-15T18:30:00.407"
remediation = "将 BlazeDS 升级至 3.2.1 及以上版本，将 ColdFusion 升级至 9.0.1 及以上版本并安装最新安全修补程序，将 LiveCycle 升级至 9.0.0.2 及以上版本。如无法升级，在防火墙或反向代理层面限制对 /flex2gateway/、/messagebroker/、/blazeds/ 等 AMF 端点的外部访问，并禁用 XML 外部实体解析功能。"
score = 6.5
severity = "MEDIUM"
sources = ["kev"]
title = "Adobe BlazeDS/LiveCycle/ColdFusion XML外部实体注入漏洞"
updated = "2026-06-16T23:12:42.810"

