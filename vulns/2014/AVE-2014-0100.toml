[basic]
description = "Adobe Flash Player 存在整数下溢漏洞（CWE-191），远程攻击者可通过构造特制的恶意内容诱使用户访问，触发内存破坏导致任意代码执行。该漏洞影响 Windows 和 Mac OS X 平台 11.7.700.261 之前版本及 11.8.x 至 12.0.x 系列中 12.0.0.44 之前版本，以及 Linux 平台 11.2.202.336 之前版本。攻击者无需身份认证即可远程利用，CVSS 评分 9.8，危害等级严重。目前已存在 Metasploit 利用模块，用户须尽快升级至修复版本。"
published = "2014-02-05T05:15:29.897"
remediation = "立即升级至 Adobe Flash Player 11.7.700.261 / 12.0.0.44（Windows/Mac）或 11.2.202.336（Linux）及以上版本。由于 Flash Player 已官方终止支持，建议在完成紧急升级后彻底卸载 Flash Player，并在浏览器中禁用 Flash 插件，同时部署 Web 应用防火墙（WAF）拦截攻击载荷作为临时缓解措施。"
score = 9.8
severity = "CRITICAL"
sources = ["kev"]
title = "Adobe Flash Player 整数下溢远程代码执行漏洞"
updated = "2026-06-17T00:03:09.170"

