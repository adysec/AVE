[info]
author = "ave"
description = "检测 XFree86 startx 命令的符号链接竞争漏洞，通过检查本地文件系统中 X11 临时文件路径的可预测性来验证漏洞是否存在"
id = "POC-AVE-1999-0098"
name = "XFree86 startx Symlink Race Condition PoC"
severity = "medium"
tags = ["ave-1999-0098"]
vuln_id = [
    "CVE-1999-0433",
    "AVE-1999-0098",
]

[poc]
logic = "all"

[[poc.requests]]
path = "/tmp/.X11-unix"
protocol = "file"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [".X11-unix"]
