- CVE-2010-2861: Adobe ColdFusion 9.0.1 and earlier, multiple directory traversal vulnerabilities in the administrator console
- CVSS 3.1: 9.8 CRITICAL- CVSS 2.0: 7.5 HIGH
- CWE-22
- Published: 08/11/2010
- Vendor advisory: http://www.adobe.com/support/security/bulletins/apsb10-18.html
- Exploit: http://www.gnucitizen.org/blog/coldfusion-directory-traversal-faq-cve-2010-2861/
- CISA KEV listed- Multiple affected paths through the locale parameter in CFIDE/administrator/
- Remediation: apply vendor updatesI'm noting the critical severity rating of 9.8 and the various reference links including the GNU Citizen advisory, though some have broken links. The directory traversal allows attackers to read arbitrary files through locale parameter manipulation, and I'm ready to reconstruct the TOML with this corrected data.[id]
