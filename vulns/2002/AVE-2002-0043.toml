[basic]
description = "Apache 2.0.42 存在信息泄漏漏洞，当服务器目录同时启用 WebDAV 和 CGI 功能时，远程攻击者可通过向该目录发送特制的 POST 请求，绕过访问控制限制，直接获取 CGI 脚本的源代码而非执行结果。该漏洞导致敏感业务逻辑、数据库凭证等源码信息泄露，攻击面取决于服务器上 CGI 脚本的部署情况，无需身份认证即可远程利用。CVSS 评分 5.0，危害等级中危。"
published = "2002-10-11T04:00:00.000"
remediation = "立即将 Apache HTTP Server 升级至 2.0.43 或更高版本（该漏洞仅影响 2.0.42）。由于 Apache 2.0 系列已于 2013 年停止维护，建议升级至当前受支持的 2.4.x 版本。如无法升级，可在配置中禁用 WebDAV 模块（注释或移除 `mod_dav` 加载指令），或确保启用 CGI 的目录不启用 WebDAV。"
score = 5
severity = "MEDIUM"
sources = ["osv"]
title = "Apache HTTP Server 2.0.42 CGI 源代码信息泄露漏洞"
updated = "2026-06-16T21:58:49.867"

