[basic]
description = 'Microsoft SQL Server 7.0/2000 及 SQL Server Desktop Engine (MSDE) 中的 xp_peekqueue 扩展存储过程存在缓冲区溢出漏洞。该函数调用 srv_paraminfo API 时未正确限制参数长度，允许攻击者通过向 SQL Server 发送特制的数据库查询请求触发缓冲区溢出，可导致服务崩溃或执行任意命令，即"扩展存储过程参数解析"漏洞。攻击者需要对目标数据库具备一定访问权限才能实施利用。'
published = "2001-01-09T05:00:00.000"
remediation = "建议升级到 Microsoft SQL Server 2000 Service Pack 1 (SP1) 或更高版本，该补丁修复了 xp_peekqueue 函数中的缓冲区溢出问题。如无法立即升级，可通过执行 `EXEC sp_dropextendedproc 'xp_peekqueue'` 删除该扩展存储过程，或使用 `DENY EXECUTE ON xp_peekqueue TO PUBLIC` 回收公开执行权限以临时缓解风险。"
score = 4.6
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Microsoft SQL Server 2000 扩展存储过程 xp_peekqueue 缓冲区溢出漏洞"
updated = "2026-06-16T21:53:07.090"

