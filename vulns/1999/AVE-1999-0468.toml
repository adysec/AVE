[basic]
description = "Microsoft IIS 2.0 及 3.0 版本在处理超长 URL 请求时存在缺陷，未对 URL 长度进行有效限制和检查，导致缓冲区异常。远程攻击者无需身份认证，仅需向目标 IIS 服务器发送一个超长 URL 的 HTTP 请求，即可使 IIS 服务进程崩溃，无法正常响应后续合法请求，造成拒绝服务。该漏洞利用方式简单，影响运行 IIS 2.0 和 3.0 版本的 Windows NT 系统。"
published = "1997-06-01"
remediation = "升级到 Microsoft IIS 4.0 及以上版本，或安装 Windows NT 4.0 Service Pack 6a 及后续安全更新。如无法升级，可在 IIS 管理器中限制 URL 最大长度或使用 URLScan 工具过滤超长请求。"
score = 5.0
severity = "MEDIUM"
sources = ["cve"]
title = "Microsoft IIS 2.0/3.0 长URL拒绝服务漏洞"
updated = "2026-06-16"

