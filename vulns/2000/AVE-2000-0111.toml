[basic]
description = "Allaire ColdFusion Server 4.0 及 4.0.1 版本中的 CFCACHE 标签在处理页面缓存时，将临时缓存文件存放于 Web 文档根目录下，导致远程攻击者无需身份认证即可通过直接访问这些缓存文件路径，获取包含数据库连接信息、文件路径、配置参数等敏感系统信息。该漏洞影响 ColdFusion Server 4.0/4.0.1 版本，CVSS 评分 7.5，危害等级高，攻击复杂度低，且无需用户交互。"
published = "2000-01-04T05:00:00.000"
remediation = "升级至 ColdFusion 4.5 或更高版本以修复 CFCACHE 标签缓存文件泄露问题。如无法升级，在 Web 服务器（IIS/Apache）配置中禁止访问 /CFCACHE/* 路径，或将缓存目录移至 Web 根目录之外。"
score = 7.5
severity = "HIGH"
sources = ["exploitdb"]
title = "Allaire ColdFusion Server CFCACHE 信息泄露漏洞"
updated = "2026-06-16T21:50:54.753"

