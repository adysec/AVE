[basic]
description = "Solaris 7 的 lpset 命令在处理 -r 选项时存在缓冲区溢出漏洞。当 -r 选项接收过长的参数时，会触发栈缓冲区溢出，本地攻击者可利用此漏洞执行任意代码并提升至 root 权限。该漏洞影响 Solaris 2.6 和 7.0 版本，攻击者需要具备本地系统访问权限才能发起利用。攻击者通过构造超长字符串作为 lpset -r 的参数传入，覆盖栈上返回地址实现权限提升，从而完全控制目标系统。"
published = "2000-04-24T04:00:00.000"
remediation = "升级到 Solaris 2.6 的 SunOS 5.6 补丁簇 105332 或 Solaris 7 的 107115 修订版本以修复 lpset 缓冲区溢出。如暂无法打补丁，可移除 lpset 的 setuid root 权限（chmod u-s /usr/bin/lpset）或限制普通用户访问，作为临时缓解措施。"
score = 7.2
severity = "HIGH"
sources = ["exploitdb"]
