[basic]
description = "Maildata 邮件网关存在命令注入漏洞（0day），攻击者可在文件上传或参数处理的输入点中嵌入经过 base64 编码与 IFS 分隔符混淆的恶意载荷，绕过输入过滤后由系统执行。该漏洞允许未经身份认证的远程攻击者在目标服务器上执行任意系统命令，进而实现远程代码执行，获得服务器控制权。攻击者无需用户交互，利用难度较低，危害严重。目前官方尚未发布正式安全补丁。"
published = "0709"
remediation = "立即联系 Maildata 官方获取最新安全补丁或升级到修复此漏洞的最新版本。如暂无补丁，在邮件网关前端部署 WAF/IPS 规则，对附件文件名中的特殊字符（如 $、`、|、;、${IFS}、base64 等）进行严格过滤和拦截；同时限制邮件网关对外部出站连接（如 nc、bash 反弹 shell 常用端口 587/443/80）的访问权限，在网络层面阻断反弹 shell 通道。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "Maildata 邮件网关 远程代码执行漏洞"
updated = "0709"

