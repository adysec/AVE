[basic]
description = "BeOS 5.0 操作系统 TCP 协议栈在处理分片 TCP 数据包时存在缺陷，远程攻击者无需身份认证即可通过网络向目标系统发送特制的分片 TCP 报文，触发协议栈处理异常，导致系统拒绝服务。该漏洞影响 BeOS 5.0 版本，CVSS 评分 5.0，危害等级中等。Exploit-DB 已公开 PoC 利用代码（EDB-ID: 19938），攻击者可直接复现该拒绝服务攻击。"
published = "2000-05-18T04:00:00.000"
remediation = "BeOS 5.0 已停止维护，官方未发布补丁。建议升级至受支持的操作系统（如 Haiku OS）以彻底修复；临时缓解措施可在网络边界防火墙配置规则丢弃异常 TCP 分片包，或限制受影响主机的网络暴露面。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Be BeOS 5.0 TCP分片 拒绝服务漏洞"
updated = "2026-06-16T21:51:47.320"

