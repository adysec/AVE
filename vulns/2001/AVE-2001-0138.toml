[basic]
description = "Bajie WebServer 0.78及0.90版本中的UploadServlet存在远程命令执行漏洞。攻击者可通过调用该servlet上传恶意程序文件，然后利用路径遍历（..）方式访问已上传的文件，从而在服务器上执行任意命令。该漏洞源于对文件上传后的路径访问控制不足，允许攻击者绕过限制访问上传目录之外的文件。攻击者无需身份认证即可远程利用，可完全控制受影响服务器。CVSS评分7.5，危害等级高。"
published = "2001-05-03T04:00:00.000"
remediation = "升级至 Bajie HTTP JServer 0.80 或更高版本。如无法升级，应立即禁用 UploadServlet 或限制其仅允许特定来源 IP 访问；同时配置 Web 服务器对上传目录禁止脚本执行权限，并实施严格的输入验证防止路径遍历攻击。作为更深层缓解，建议在反向代理层面拦截对 /servlet/UploadServlet 的请求。"
score = 7.5
severity = "HIGH"
sources = ["exploitdb"]
title = "Bajie HTTP JServer 远程命令执行漏洞"
updated = "2026-06-16T21:54:04.273"

