[info]
author = "ave"
description = "检测目标 Zope 服务器版本是否低于 2.1.7，通过 HTTP Server 响应头判断是否存在 DocumentTemplate 包未授权修改漏洞（CVE-2000-0483）"
id = "POC-AVE-2000-0540"
name = "Zope DocumentTemplate 未授权修改漏洞 PoC"
severity = "high"
tags = ["ave-2000-0540"]
vuln_id = [
    "CVE-2000-0483",
    "AVE-2000-0540",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "header"
type = "word"
words = [
    "Zope 2.0.",
    "Zope 2.1.0",
    "Zope 2.1.1",
    "Zope 2.1.2",
    "Zope 2.1.3",
    "Zope 2.1.4",
    "Zope 2.1.5",
    "Zope 2.1.6",
]
