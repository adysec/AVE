[basic]
description = "Veeam Service Provider Console 存在参数处理不当漏洞（CWE-233），未经身份认证的远程攻击者可通过向 VSPC Web 端口（默认 12800）发送特制请求触发该漏洞，导致远程代码执行。该漏洞影响 Veeam Service Provider Console 9.2.1.33875 之前版本，CVSS 评分 9.4，危害等级严重。厂商已发布 KB4853 安全更新，建议立即升级至 9.2.1.33875 或更新版本，同时禁用 Alarm Script Execution 功能并限制管理端口访问。"
published = "2026-05-28T05:16:35.970"
remediation = "立即升级 Veeam Service Provider Console 至 9.2.1.33875 及以上版本（对应 KB4853）；在 VSPC 管理界面中禁用 Alarm Script Execution 功能；在防火墙上限制 VSPC Web 端口（12800）仅允许内部管理网段访问，禁止暴露于公网。"
score = 9.4
severity = "CRITICAL"
sources = ["hwpoc"]
title = "Veeam Service Provider Console 远程代码执行漏洞"
updated = "2026-06-17T10:36:43.867"

