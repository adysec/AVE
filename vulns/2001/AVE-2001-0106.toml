[basic]
description = "Windows 平台 PGP 5.x、6.x 及 7.0.3 及更早版本中的 ASCII Armor 解析器存在任意文件创建漏洞。攻击者可通过向目标用户发送特制的恶意 ASCII 装甲格式文件，当用户使用受影响版本 PGP 处理该文件时，解析器未能正确校验文件路径，导致可在任意目录创建文件。该漏洞 CVSS 评分仅 2.1，危害等级低，攻击复杂度高，需用户交互触发。"
published = "2001-06-18T04:00:00.000"
remediation = "立即升级到 PGP 7.0.4 或更高版本以修复 ASCII Armor 解析器路径遍历缺陷。PGP Desktop 产品线已停止维护，建议迁移至 GnuPG 等活跃维护的 OpenPGP 实现，避免使用不受支持的旧版本。如暂时无法升级，应在使用前严格校验 .sig 等 ASCII Armor 格式签名文件的来源可信度，不打开来源不明的签名文件。"
score = 2.1
severity = "LOW"
sources = ["exploitdb"]
title = "PGP 5.x/6.x/7.0 ASCII Armor 解析器任意文件创建漏洞"
updated = "2026-06-16T21:53:59.490"

