[basic]
description = "Stellar-X 的 msntauth 认证模块中的 allowuser 函数存在格式化字符串漏洞，远程攻击者无需身份认证即可通过在用户名参数中注入特制的格式化字符串，该字符串在传递给 syslog 调用时未得到正确处理，导致攻击者可以执行任意代码。该漏洞影响 Squid 2.4.STABLE6 及更早版本中集成的 msntauth 模块，CVSS 评分 7.5，危害等级高。"
published = "2002-10-04T04:00:00.000"
remediation = "升级 Squid 至 2.4.STABLE7 及以上版本，该版本已修复 msntauth 模块 allowuser 函数中 syslog 调用的格式化字符串漏洞。无法立即升级时，可禁用 msntauth 认证模块，改用其他认证方式（如基本认证）作为临时缓解措施，同时限制仅受信任用户访问代理服务。"
score = 7.5
severity = "HIGH"
sources = ["osv"]
title = "Stellar-X msntauth 认证模块格式化字符串远程代码执行漏洞"
updated = "2026-06-16T21:58:23.067"

