[basic]
description = "汉王e脸通综合管理平台 getFirstEmp.do 接口存在 SQL 注入漏洞，攻击者可在未经身份认证的情况下向该接口发送特制的恶意请求参数，通过注入恶意的 SQL 语句绕过数据库安全限制，进而窃取或篡改后台敏感数据。该漏洞影响汉王e脸通综合管理平台全版本，攻击者仅需网络访问即可利用，无需任何权限，危害等级高。"
published = "2025-01-01"
remediation = "建议在 getFirstEmp.do 对应 DAO 层将参数拼接的 SQL 改为 PreparedStatement 预编译绑定传参，严格过滤 employee 相关查询参数，禁止拼接用户输入到 SQL 语句。联系汉王厂商获取 e脸通综合管理平台安全补丁，或升级至修复版本。临时措施可在 WAF/反向代理侧配置规则，拦截 getFirstEmp.do 接口参数中包含单引号、UNION、AND、OR 等 SQL 注入特征字符的请求。"
score = 6.5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "汉王 e脸通综合管理平台 SQL注入漏洞"
updated = "2025-07-20"

