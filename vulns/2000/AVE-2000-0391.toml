[basic]
description = "该漏洞存在于 HP-UX 10.20 和 11.0 操作系统中，其 `man` 命令在处理临时文件时存在符号链接攻击漏洞。本地攻击者可在 /tmp 等可写目录下创建恶意符号链接指向敏感系统文件，当 `man` 命令卸载帮助手册文件时会意外写入数据到攻击者控制的目标文件，导致任意文件被覆盖或破坏。攻击者无需认证即可利用此漏洞，仅需拥有本地访问权限及对 /tmp 目录的写入权限，即可实现对系统关键文件的篡改，威胁系统的完整性和可用性，机密性影响较小。该漏洞属于经典的 Unix 符号链接竞争条件漏洞，反映了早期 Unix 系统在临时文件处理上的安全设计缺陷，攻击者通过精心构造的符号链接实现权限提升或系统破坏。建议用户及时应用 HP 官方发布的安全补丁，并加强 /tmp 目录的权限控制，禁止普通用户创建硬链接和符号链接。"
published = "2000-06-02T04:00:00.000"
remediation = "建议修补HP-UX系统安全漏洞，立即应用HP-UX安全更新补丁以修复man命令的缺陷；同时加强/tmp目录的安全控制，禁止普通用户在/tmp中创建硬链接和符号链接，并定期清理/tmp目录中的可疑链接文件。"
score = 4.6
severity = "MEDIUM"
sources = ["avd"]
title = "惠普 HP-UX 10.20/11.0 man 符号链接攻击漏洞"
updated = "2026-06-16T21:51:47.947"

