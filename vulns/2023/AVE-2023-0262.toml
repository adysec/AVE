[basic]
description = "极限OA办公自动化系统存在文件包含漏洞，攻击者可通过构造包含路径遍历字符（如../）的恶意请求，利用系统未对用户输入进行充分校验的缺陷，读取服务器敏感文件或执行任意代码，导致信息泄露、服务器被控等严重后果。"
published = "2023-08-08"
remediation = "联系极限OA厂商获取最新安全补丁并升级至修复版本；在升级前部署Web应用防火墙（WAF）拦截包含../等路径遍历特征的请求；严格限制Web服务器对敏感目录的文件读取权限；关闭不必要的文件包含功能作为临时缓解措施。"
score = 5.0
severity = "MEDIUM"
