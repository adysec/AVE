[basic]
description = "孚盟云系统的 tfrmproject 组件存在任意文件读取漏洞，由于对用户输入的文件路径过滤不严，未经身份认证的远程攻击者可通过向目标系统发送特制的 HTTP 请求，在路径中拼接 `../` 等目录遍历序列绕过限制，读取服务器上的任意敏感文件（如 WEB-INF/web.xml 配置文件、数据库连接信息等），导致关键信息泄露。该漏洞攻击复杂度低，无需任何权限即可利用，影响部署了相关组件的所有孚盟云系统版本。"
published = "20260415"
remediation = "厂商应立即升级孚盟云至官方修复版本（如尚无补丁，请联系厂商获取）；开发侧修复方式为对 tfrmproject 接口的请求路径参数进行规范化校验，禁止包含 ../ 或 ..%2f 等目录遍历序列，并限制只能访问指定目录下的文件。临时缓解措施：在反向代理或 WAF 上添加规则，拦截包含 WEB-INF、META-INF、..%2f 等敏感路径的请求。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "孚盟云 tfrmproject 任意文件读取漏洞"
updated = "20260415"

