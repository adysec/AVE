[basic]
description = "DECnet/OSI for OpenVMS 5.8 之前版本存在安全漏洞，本地攻击者可通过向系统发送特制的 DECnet 协议请求触发该漏洞，导致权限提升或拒绝服务。该漏洞影响 DEC Alpha AXP 及 VAX/VMS 系统上的 OpenVMS 操作系统，CVSS 评分 4.6，危害等级中危。由于漏洞利用需要本地访问权限，攻击者需先获得系统普通用户权限方可实施攻击。"
published = "1999-12-31"
remediation = "升级 DECnet/OSI for OpenVMS 至 5.8 或更高版本以修复此漏洞。如无法升级，建议限制本地用户对 DECnet 网络服务的交互式登录权限，并禁用不必要的 DECnet 代理账户，通过系统授权数据库 (SYSUAF) 收紧本地用户权限。"
score = 4.6
severity = "MEDIUM"
sources = ["cve"]
title = "DEC DECnet/OSI for OpenVMS 本地权限提升漏洞"
updated = "2026-06-16"

