[basic]
description = "Eudora 及 Eudora Light 邮件客户端 3.05 之前版本存在输入验证缺陷，远程攻击者可通过发送包含特殊日期字段的恶意邮件导致客户端崩溃及用户邮箱数据损坏。当邮件日期设置为 1970 年之前的日期时触发除零错误，或设置为当前日期 100 年后的日期时引发段错误。攻击者无需认证即可利用，影响邮件系统的可用性和数据完整性。"
published = "1998-07-29"
remediation = "升级至 Eudora/Eudora Light 3.05 或更高版本即可修复，该版本已修正日期解析逻辑以避免除零错误和段错误。如无法升级，考虑更换为仍受支持的邮件客户端软件。"
score = 5.0
severity = "MEDIUM"
sources = ["cve"]
title = "Qualcomm Eudora 及 Eudora Light 邮件客户端拒绝服务漏洞"
updated = "2026-06-16"

