[basic]
description = "Samba 3.0.0 至 3.0.25rc3 版本的 smbd 进程在处理 NDR 解析时存在多个基于堆的缓冲区溢出漏洞。远程攻击者可通过向目标 Samba 服务器发送特制的 MS-RPC 请求（涉及 DFSEnum、RFNPCNEX、LsarAddPrivilegesToAccount、NetSetFileSecurity 或 LsarLookupSids/LsarLookupSids2 等函数）触发堆溢出，导致拒绝服务或远程代码执行。该漏洞无需身份认证即可利用，CVSS 评分 10.0，危害等级严重。Metasploit 框架已发布针对 Solaris 平台 lsa_io_trans_names 函数的利用模块。"
published = "2007-05-14T21:19:00.000"
remediation = "立即升级 Samba 至 3.0.25 或更高版本（该版本已修复 CVE-2007-2446）。如无法立即升级，可在防火墙层面限制对 139/TCP 和 445/TCP 端口的访问，仅允许受信任网络段连接 smbd 服务，并禁用不必要的 SMB 协议版本以降低攻击面。"
score = 10
severity = "CRITICAL"
sources = ["tenable"]
title = "Samba smbd NDR解析堆缓冲区溢出远程代码执行漏洞"
updated = "2026-06-16T22:39:36.617"

