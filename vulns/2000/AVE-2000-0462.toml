[basic]
description = "Microsoft Windows 2000 Telnet Server 存在拒绝服务漏洞，远程攻击者无需身份认证即可通过向目标服务器发送连续的二进制零字节数据流，导致 Telnet 服务进程崩溃，造成拒绝服务。该漏洞影响 Windows 2000 系统，攻击条件简单，仅需网络可达即可触发，危害等级中等。目前厂商已发布安全公告，建议用户升级至受影响版本以上的操作系统。CVSS 评分为 5.0。"
published = "2000-06-30T04:00:00.000"
remediation = "安装 Microsoft 为 Windows 2000 发布的 Telnet 安全更新补丁 (MS00-047)，或升级至 Windows 2000 Service Pack 1 及以上版本。若无法安装补丁，可在服务管理器中停止并禁用 Telnet 服务 (tlntsvr) 作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Microsoft Windows 2000 Telnet Server 拒绝服务漏洞"
updated = "2026-06-16T21:52:02.687"

