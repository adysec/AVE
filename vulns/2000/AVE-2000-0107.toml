[basic]
description = "Windows NT 4.0 和 Windows 2000 的回收站工具存在权限管理缺陷，本地攻击者可在回收站目录（Recycler）下创建包含受害者安全标识符（SID）的子目录，从而读取或修改其他用户的文件。该漏洞源于回收站对目录权限的验证不充分，攻击者需具有本地系统访问权限，利用难度较低。CVSS 评分 3.6，危害等级低，但可能导致敏感信息泄露或文件篡改。"
published = "2000-02-01T05:00:00.000"
remediation = "根据微软安全公告 MS00-007，该漏洞影响 Windows NT 4.0（Workstation/Server/Enterprise Edition）的 NTFS 分区。建议立即安装微软提供的补丁（KB248399），下载地址：https://www.microsoft.com/download/details.aspx?displaylang=en&FamilyID=02DAD2FB-32DE-4003-82CD-BB1831D04898。该补丁修复了回收站在首次使用前被恶意用户预创建文件夹并篡改权限的问题。如无法立即安装补丁，可临时将受影响卷转换为 FAT 文件系统（但 FAT 不提供每用户数据隔离），或确保所有用户首次删除文件前回收站文件夹已由合法用户创建。"
score = 3.6
severity = "LOW"
sources = ["exploitdb"]
title = "Microsoft Windows NT 4.0 和 Windows 2000 回收站本地文件访问权限漏洞"
updated = "2026-06-16T21:51:02.643"

