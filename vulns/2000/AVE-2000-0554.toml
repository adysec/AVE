[basic]
description = "ntop 1.2 a7-9 版本的 Web 管理界面存在目录遍历漏洞。远程攻击者无需身份认证即可通过向 Web 服务发送包含 `../` 序列的特制 HTTP 请求，绕过路径限制读取服务器上的任意文件，如系统配置文件或敏感数据。该漏洞利用难度低，影响运行 ntop Web 模式的所有系统。"
published = "2000-10-20T04:00:00.000"
remediation = '升级 ntop 至 2.0 或更高版本，该版本已修复目录遍历漏洞。如无法升级，在 Web 服务器（如 Apache）层面配置 URL 重写规则，阻止包含 ".." 的请求路径，并限制 ntop Web 服务仅监听本地回环地址 (127.0.0.1)。'
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Luca Deri ntop 目录遍历漏洞"
updated = "2026-06-16T21:52:18.493"

