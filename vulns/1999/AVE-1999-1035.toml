[basic]
description = "Novell UnixWare 1.1 的 urestore 工具存在权限许可漏洞，本地攻击者可利用该工具在处理恢复操作时未正确限制特权执行路径的缺陷，通过精心构造的恢复数据或参数触发权限提升，从而获得 root 权限。该漏洞影响 Novell UnixWare 1.1 版本，需本地访问权限，危害等级高危。"
published = "1999-12-31T05:00:00.000"
remediation = "从 Novell 官方渠道获取并安装针对 UnixWare 1.1 urestore 漏洞的安全补丁（参见 CIAC Bulletin F-06）。如无法安装补丁，可执行 `chmod u-s /usr/bin/urestore` 移除该命令的 setuid 权限位，作为临时缓解措施。建议升级至受支持的 Unix 或 Linux 发行版，从根本上规避该产品已停止安全更新的风险。"
score = 7.2
severity = "HIGH"
sources = ["cve"]
title = "Novell UnixWare urestore 本地权限提升漏洞"
updated = "2026-06-16T21:50:09.703"

