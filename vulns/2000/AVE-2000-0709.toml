[basic]
description = "Red Hat Linux 6.2 的 Piranha 虚拟服务器管理包中的 Web 图形化管理界面存在内置后门密码漏洞。攻击者无需身份认证即可通过网络远程访问该管理界面，利用预设的默认账号和密码登录系统，从而获得对目标服务器的完全控制权限，执行任意命令。该漏洞影响 Red Hat Linux 6.2 及包含 Piranha 包的版本，CVSS v2 评分 10.0，危害等级严重。厂商已发布安全公告并提供修补措施。"
published = "2000-04-24T04:00:00.000"
remediation = "立即升级 piranha 软件包至 0.4.13-1 及以上版本（对应 Red Hat 安全公告 RHSA-2000:015），移除 web GUI 中的后门账户和默认密码。如无法升级，应在防火墙上限制对 9090/TCP 端口的访问，仅允许受信任的管理 IP 连接 Piranha Web 管理界面。"
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "Red Hat Linux Piranha 默认账户和密码后门漏洞"
updated = "2026-06-16T21:51:19.057"

