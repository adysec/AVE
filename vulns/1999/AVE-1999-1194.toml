[basic]
description = 'Microsoft Internet Explorer 4.01 及 5.0 中捆绑的多个 Kodak/Wang ActiveX 控件（包括图像编辑、注释、扫描、缩略图管理等组件）被错误标记为"Safe for Scripting"，同时 Registration Wizard（regwizc.dll）和 Setupctl（setupctl.dll）等控件存在缓冲区溢出漏洞。远程攻击者可构造恶意网页，在无需用户交互的情况下触发漏洞，导致任意文件创建、修改或远程代码执行。该漏洞影响 Windows 95/NT 4.0 等系统上的 IE 4.01/5.0 版本，CVSS 评分 5.1，危害等级中危。'
published = "1999-09-10T04:00:00.000"
remediation = "升级到 Internet Explorer 5.01 Service Pack 2 或更高版本，该版本已移除不安全 ActiveX 控件的 Safe for Scripting 标记。如无法升级，在 Internet 安全区域将 ActiveX 控件设为禁用或提示状态，或使用组策略禁用 regwizc.dll、setupctl.dll 等控件。对于 Windows 95/NT 4.0，建议升级至受支持的操作系统版本（如 Windows 10/11），并安装最新 IE 安全累积更新。"
score = 5.1
severity = "MEDIUM"
sources = ["epss"]
title = "Microsoft Internet Explorer ActiveX 控件远程代码执行漏洞"
updated = "2026-06-16T21:50:45.250"

