[basic]
description = 'Netscape Communicator 4.7 客户端存在密码存储安全漏洞。当用户通过 IMAP 或 POP 协议进行邮件会话时，即使未启用"记住密码"功能，程序仍会将用户邮箱密码以明文形式记录在 preferences.js 配置文件中。本地攻击者可通过读取该配置文件获取用户邮箱登录凭据，导致敏感信息泄露。该漏洞影响 Netscape Communicator 4.7 版本，CVSS 评分 5.0，危害等级中危。'
published = "1999-12-22T05:00:00.000"
remediation = "升级到 Netscape 4.73 及以上版本，或改用受支持的现代浏览器（如 Firefox）。如需继续使用 Netscape，每次结束 IMAP/POP 会话后手动删除 profiles 目录下的 preferences.js 文件中保存的密码行，并取消勾选「Remember Password」选项。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Netscape Communicator 密码明文存储漏洞"
updated = "2026-06-16T21:50:51.913"

