[basic]
description = "UnixWare 操作系统的 rtpm 程序存在缓冲区溢出漏洞，本地攻击者可通过向该程序传递超长的环境变量触发缓冲区溢出，导致攻击者获取目标系统的 root 权限。该漏洞影响 UnixWare 多个版本，危害等级严重，攻击者需要具备本地访问权限方能利用。厂商建议及时安装安全补丁以修复此漏洞。"
published = "1999-12-30T05:00:00.000"
remediation = "立即安装 SCO 于 2000 年 1 月发布的 rtpm 安全补丁（参见 SCO 安全公告 ftp://ftp.sco.com/pub/security/）。若系统已无法获取官方补丁（UnixWare 已停止支持），可执行 chmod 700 /usr/bin/rtpm 移除 rtpm 的 setuid 位以消除本地提权路径，并迁移至受支持的操作系统以获得持续安全更新。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "SCO UnixWare rtpm 本地缓冲区溢出权限提升漏洞"
updated = "2026-06-16T21:50:48.120"

