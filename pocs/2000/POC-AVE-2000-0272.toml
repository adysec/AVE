[info]
author = "ave"
description = "检测 Microsoft Internet Explorer 4.x/5 及 Outlook 系列产品中 Active Setup Control ActiveX 控件处理恶意 CAB 文件的漏洞。通过构造包含 ActiveX 对象引用的 HTML 页面，检测目标浏览器是否加载并执行了 CAB 文件中的可执行代码。"
id = "POC-AVE-2000-0272"
name = "Microsoft IE/Outlook ActiveX CAB File Execution PoC"
severity = "medium"
tags = ["ave-2000-0272"]
vuln_id = [
    "CVE-2000-0329",
    "AVE-2000-0272",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "header"
type = "word"
words = [
    "MSIE 4.",
    "MSIE 5.",
    "Outlook Express 4",
    "Outlook Express 5",
]
