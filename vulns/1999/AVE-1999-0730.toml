[basic]
description = 'MediaHouse Statistics Server 4.28/5.1 版本的 "Server ID" 参数处理存在缓冲区溢出漏洞，远程攻击者可通过向服务器发送精心构造的超长 Server ID 参数触发缓冲区溢出，进而在目标系统上以服务进程权限执行任意命令。该漏洞影响 MediaHouse Statistics Server 4.28 和 5.1 版本，CVSS 评分 5.0（中危），攻击者无需身份认证即可远程利用，通过发送超长字符串覆盖栈缓冲区并劫持程序控制流实现任意代码执行。官方已发布补丁修复该漏洞，建议升级至修复版本。'
published = "1999-09-30T04:00:00.000"
remediation = "建议立即停止使用 MediaHouse Statistics Server 4.28/5.1 并迁移至现代统计分析平台（如 Matomo、Google Analytics 等）。若无法立即迁移，请在边界防火墙禁止外部访问 Statistics Server 服务端口（默认 80/443），仅允许可信内网 IP 访问，并在应用层禁用 Server ID 功能模块作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "MediaHouse Software Statistics Server 缓冲区溢出漏洞"
updated = "2026-06-16T21:49:21.207"

