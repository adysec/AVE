[basic]
description = "Microsoft IIS 4.0 和 5.0 的 shtml.dll 组件在处理错误消息时未对用户输入进行正确转义，存在跨站脚本（XSS）漏洞。远程攻击者可将恶意脚本嵌入指向受信任站点的链接中，当用户访问该链接时，IIS 返回的错误消息未对脚本进行引号转义处理，导致脚本在用户浏览器中以受信任站点的上下文执行，从而窃取 Cookie、会话令牌或执行其他恶意操作。攻击者需诱使用户点击特制链接，无需身份认证即可利用。"
published = "2000-10-20T04:00:00.000"
remediation = "立即安装 Microsoft 安全公告 MS00-060 提供的修补程序（IIS 4.0 对应 KB260347，IIS 5.0 对应 KB275657）。如无法安装补丁，部署 URLScan 工具过滤恶意 HTML 标签，并在应用层对所有用户输入执行 HTML 编码。鉴于 IIS 4.0/5.0 已停止支持，建议升级至 IIS 7.0 及以上版本。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "Microsoft IIS 4.0/5.0 跨站脚本攻击漏洞"
updated = "2026-06-16T21:52:23.690"

