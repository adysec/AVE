[info]
author = "ave"
description = "验证 Solaris 2.4-2.6 系统存在电源管理漏洞：在系统恢复过程中，攻击者可在屏幕锁定生效前绕过验证并输入键盘字符。此 PoC 利用预先获取的 ExploitDB 公开利用程序验证漏洞的存在性。"
id = "POC-AVE-1999-1270"
name = "Sun Solaris 2.6 电源管理锁定绕过 PoC"
severity = "high"
tags = ["ave-1999-1270"]
vuln_id = [
    "CVE-1999-1432",
    "AVE-1999-1270",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/path/to/power_management_script"
protocol = "http"

[poc.requests.headers]
User-Agent = "AVE-POC/1.0"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["Solaris local Exploit"]
