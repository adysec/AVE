[basic]
description = "Cactus Software Shell Lock 是一款用于保护 Perl 脚本源代码的商业软件，但其使用的加密机制仅为简单的编码变换（弱加密），而非真正的加密算法。攻击者无需特殊权限，即可通过分析其编码逻辑轻易解码被保护的脚本，从而获取原始的源代码内容。该漏洞暴露出软件在代码保护设计上的严重缺陷，CVSS 评分 2.1，危害等级低，但会导致商业软件的核心知识产权保护失效。"
published = "1999-10-04T04:00:00.000"
remediation = "立即停止使用 Cactus Software Shell Lock，改用现代 shell 脚本加密工具（如 shc 配合 AES-256加密，或使用二进制编译工具打包）。该产品已停止维护且加密算法为简单编码，任何受此保护的脚本源码均应视为已泄露，需重置其中包含的凭据与密钥。"
score = 2.1
severity = "LOW"
sources = ["avd"]
title = """Let me analyze the information: - Vendor: Cactus Software - Product: Shell Lock - Vulnerability type: Weak encryption (trivial encoding) that allows attackers to easily decrypt and obtain source code - This is about source code disclosure due to weak encryption So the title should follow the format: "厂商 产品 漏洞类型" Cactus Software Shell Lock 弱加密导致源代码泄露漏洞 Let me think about this more carefully: - 厂商: Cactus Software（仙人掌软件） - 产品: Shell Lock - 漏洞类型: 弱加密导致源代码泄露漏洞 (weak encryption leading to source code disclosure) "cactus software" could be translated as "仙人掌软件" or kept as "Cactus Software". In Chinese vulnerability databases, foreign vendor names are often kept in English or mixed. Let me use a more standard Chinese format. "Cactus Software Shell Lock 弱加密导致源代码泄露漏洞" - this is good, but let me check the format more carefully. The example is "Microsoft Windows TCP/IP 远程代码执行漏洞" - so it's "Vendor Product Vulnerability Type" Cactus Software Shell Lock 弱加密导致源代码泄露漏洞 This seems reasonable. The vulnerability is about weak encryption (trivial encoding) that allows attackers to easily decrypt and obtain source code, which is essentially a source"""
updated = "2026-06-16T21:50:40.570"

