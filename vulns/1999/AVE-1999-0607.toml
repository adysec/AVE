[basic]
description = "Sun Solaris 7.0 系统中 OpenWindows 环境下的 sdtcm_convert 日历转换工具存在栈缓冲区溢出漏洞。攻击者通过向该 setuid 程序传递特制的命令行参数，可触发缓冲区溢出，覆盖返回地址，从而以 root 权限执行任意代码。该漏洞需要本地访问权限，无需用户交互即可利用。"
published = "1997-02-01"
remediation = "应用 Sun 安全公告 #183 提供的补丁，或升级到已修复该漏洞的 Solaris 版本。由于 Solaris 7.0 已停止支持，建议迁移到受支持的 Solaris 版本或替代操作系统。"
score = 7.2
severity = "HIGH"
sources = [
    "cve",
    "exploitdb",
]
title = "Sun Solaris 7.0 sdtcm_convert 本地缓冲区溢出权限提升漏洞"
