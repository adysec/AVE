[basic]
description = "MySQL 3.22 版本存在身份认证绕过漏洞，远程攻击者可通过向 MySQL 服务发送特制的短校验字符串（short check string），绕过密码认证机制，未经授权访问目标数据库。该漏洞源于 MySQL 对认证校验字符串的处理缺陷，攻击者无需任何凭证即可利用，影响 MySQL 3.22 及可能的相关版本，CVSS 评分 7.5，危害等级高。"
published = "2000-02-08T05:00:00.000"
remediation = "升级 MySQL 至 3.23 及以上版本，该漏洞已在 3.23 中修复。由于 MySQL 3.22 已停止维护，建议迁移至受支持的 MySQL 8.0+ 或 MariaDB 10.x 版本，并启用密码认证插件（如 mysql_native_password 或 caching_sha2_password）增强认证安全性。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "MySQL 安全绕过漏洞"
updated = "2026-06-16T21:51:06.007"

