[basic]
description = "Microsoft Windows 95/98 的 NetBIOS 协议实现存在空源名称处理缺陷，远程攻击者无需身份认证即可向目标系统发送特制的 NetBIOS 会话请求数据包（其中源名称为空），导致目标系统网络服务崩溃或停止响应，造成拒绝服务。该漏洞影响 Windows 95 和 Windows 98 系统，攻击条件简单，仅需网络可达即可触发。"
published = "2000-05-02T04:00:00.000"
remediation = "该漏洞影响已停止支持的 Windows 95/98 系统，微软不再提供安全更新。建议升级至 Windows 10 及以上版本；如无法升级，可在防火墙层面阻止 137-139、445 端口的入站 NetBIOS 流量，或在网络适配器属性中禁用 NetBIOS over TCP/IP 作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Microsoft Windows 95/98 NetBIOS NULL Source Name 拒绝服务漏洞"
updated = "2026-06-16T21:51:31.690"

