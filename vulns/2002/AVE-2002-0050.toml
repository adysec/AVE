[basic]
description = "Balabit Syslog-NG 1.4.x 1.4.15 之前版本和 1.5.x 1.5.20 之前版本在使用模板文件名或输出时，宏展开过程中遇到常量字符时未正确跟踪缓冲区大小，导致缓冲区溢出漏洞（CWE-119）。远程未认证攻击者可通过发送特制的 syslog 消息触发宏展开时的缓冲区溢出，导致拒绝服务甚至远程代码执行。影响版本包括 Balabit Syslog-NG 1.4.x 1.4.15 之前版本及 1.5.x 1.5.20 之前版本，CVSS 7.5（AV:N/AC:L/Au:N/C:P/I:P/A:P），攻击向量为网络远程利用，无需认证，攻击复杂度低，影响机密性、完整性和可用性。Balabit 已在 1.4.15 和 1.5.20 版本中修复该漏洞，建议升级至修复版本。Debian DSA-175 等发行版也发布了相应安全更新。"
published = "2002-10-28T05:00:00.000"
remediation = "将 syslog-ng 升级至 1.4.15（1.4.x 系列）或 1.5.20（1.5.x 系列）及以上版本。Debian 用户可通过 apt-get install syslog-ng 更新至 DSA-175 修复版本。如无法立即升级，可在 syslog-ng.conf 中禁用模板文件名（template filenames）和模板输出（template output）功能，避免使用宏展开（macro expansion）作为临时缓解措施。"
score = 7.5
severity = "HIGH"
sources = ["osv"]
title = "Balabit Syslog-NG 缓冲区溢出远程代码执行漏洞"
updated = "2026-06-16T21:58:55.507"

