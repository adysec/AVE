[basic]
description = 'Microsoft Internet Explorer 4/5 中的 Eyedog ActiveX 控件被错误标记为"安全可脚本化"，导致远程攻击者可通过网页诱导用户访问，利用该控件执行任意系统命令。漏洞影响 IE 4.0、5.0 及集成该浏览器的 Windows 95/98/NT 系统，攻击者无需认证即可在用户权限下运行代码。Bubbleboy 蠕虫即利用此漏洞通过 HTML 邮件自动传播，无需用户点击附件。该漏洞源于 ActiveX 安全模型缺陷，微软后续通过安全补丁修复并改进了 ActiveX 签名验证机制。'
published = "1999-09-01T04:00:00.000"
remediation = "建议立即升级至 Internet Explorer 6 或更高版本，或安装 Microsoft 安全更新 MS99-037 为 Eyedog ActiveX 控件设置 killbit 以禁用该控件。在 IE 中将 Internet 区域的安全级别设为「高」并禁用「对标记为可安全执行脚本的 ActiveX 控件执行脚本」选项，可临时缓解风险。"
score = 4
severity = "MEDIUM"
sources = ["epss"]
title = "微软 Internet Explorer 4/5 ActiveX 'Eyedog' 控件安全标记错误导致远程代码执行漏洞"
updated = "2026-06-16T21:48:48.617"

