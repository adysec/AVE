[basic]
title = "Microsoft Internet Explorer 5 Windows NT 任务计划程序权限提升漏洞"
description = "Windows NT 4.0 系统上随 Internet Explorer 5 安装的离线浏览包中包含任务计划程序（Task Scheduler），该程序在任务被调度后允许用户修改任务文件内容。由于任务计划程序仅验证任务所有者身份而不对任务文件进行数字签名，本地普通用户若对管理员拥有的文件具有修改权限，即可将其篡改为有效的 AT 作业并放入指定目录执行，从而绕过权限控制机制以 SYSTEM 上下文运行任意代码，实现本地权限提升。该漏洞影响安装了 IE 5 离线浏览包的 Windows NT 4.0 系统，CVSS v2 评分为 7.2，属于高危漏洞。"
severity = "HIGH"
score = 7.2
sources = ["cve", "avd"]
published = "1999-11-29"
updated = "1999-11-29"
remediation = "将 Internet Explorer 升级至 5.01 或更高版本，该版本在创建 AT 作业时进行数字签名并在执行时验证签名，从根本上消除此漏洞；同时限制普通用户对任务计划程序作业目录的写入权限，并遵循最小权限原则以普通用户账户运行浏览器。"
