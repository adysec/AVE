[basic]
description = "Microsoft Windows NT 4.0 中的 WINS（Windows Internet 名称服务）组件存在安全漏洞，远程攻击者可通过 SNMP（简单网络管理协议）向目标 WINS 服务器发送特制的管理请求，删除 WINS 数据库中的所有记录，导致网络名称解析服务完全瘫痪。该攻击无需身份认证即可实施，影响运行 Windows NT 4.0 并启用 WINS 服务的系统，CVSS 评分 5.0，危害等级中危。建议禁用不必要的 SNMP 服务或限制 SNMP 访问来源。"
published = "1997-10-01T04:00:00.000"
remediation = "立即停止在 Windows NT 4.0 WINS 服务器上使用 SNMP 服务，或升级至受支持的 Windows Server 版本（如 2008+）；如无法升级，在防火墙层面限制 SNMP（UDP 161/162）仅允许可信管理站访问，并修改 SNMP 团体字符串为强密码。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Microsoft Windows WINS 拒绝服务漏洞"
updated = "2026-06-16T21:48:05.503"

