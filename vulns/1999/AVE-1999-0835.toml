[basic]
description = "Windows NT 操作系统未启用密码过滤器实用程序（如 PASSFILT.DLL），导致系统未对账户密码的强度与复杂度进行强制校验。该漏洞影响所有未配置密码过滤器的 Windows NT 域控制器与成员服务器，攻击条件为本地或远程获得账户创建/修改权限的攻击者。利用方式为攻击者可为账户设置弱口令、空口令或字典易猜密码，从而绕过密码策略并提升暴力破解与未授权登录的成功率，严重威胁系统身份安全。"
published = "1999-01-01T05:00:00.000"
remediation = '为 Windows NT 安装并启用密码过滤实用程序（如微软 PASSFILT.DLL），将其配置到系统密码策略中强制复杂密码；通过「管理工具→域用户管理器→策略→密码策略」勾选"密码必须符合复杂性要求"并应用。同时启用账户锁定策略，限制口令尝试次数，并以最小权限原则限制可修改账户策略的用户，作为缓解措施。'
score = 10
severity = "CRITICAL"
sources = ["epss"]
