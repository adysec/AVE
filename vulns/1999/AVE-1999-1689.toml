[basic]
description = "WindowMaker 窗口管理器 0.52 至 0.60.0 版本存在多处缓冲区溢出漏洞。攻击者可通过向目标系统提交超长程序名（argv[0]）参数触发缓冲区溢出，导致拒绝服务，甚至可能执行任意代码。该漏洞影响所有使用受影响版本 WindowMaker 的 Linux/Unix 系统，CVSS 评分 10.0，危害等级严重。目前官方已发布修复版本，建议用户升级至 0.61.0 或更高版本。"
published = "1999-08-22T04:00:00.000"
remediation = "立即升级 WindowMaker 至 0.96.0 或更高版本，该漏洞已在后续版本中修复。如无法升级，可在启动脚本中校验 argv[0] 长度，限制程序名不超过 256 字节作为临时缓解措施。"
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "WindowMaker 缓冲区溢出远程代码执行漏洞"
updated = "2026-06-16T21:49:37.880"

