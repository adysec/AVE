[basic]
description = "Allaire Spectra 1.0 Webtop 存在访问控制缺陷漏洞，经过身份认证的攻击者可通过在浏览器地址栏中直接输入其他 Webtop 分区的显式 URL，绕过应用内置的导航权限限制，越权访问本无权限查看的敏感功能模块和页面内容。该漏洞源于服务端对用户会话权限的校验不充分，仅依赖前端界面隐藏进行访问控制。攻击者只需拥有普通用户账号即可利用，无需特殊工具。"
published = "2000-01-04T05:00:00.000"
remediation = "立即安装 Allaire 官方针对 Spectra 1.0 的安全补丁（公告 ID: ASB00-001），该补丁修复了 URL 直接访问绕过权限检查的问题。如无法安装补丁，可通过 Web 服务器（如 IIS）的 URL 重写规则限制对 Webtop 各分节的直接路径访问，仅允许通过主入口页面导航。由于该产品已停止维护，建议迁移至受支持的替代方案。"
score = 4.6
severity = "MEDIUM"
sources = ["avd"]
title = "Allaire Spectra Webtop 授权绕过漏洞"
updated = "2026-06-16T21:50:53.890"

