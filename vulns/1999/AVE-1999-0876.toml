[basic]
description = "网络入侵检测系统（IDS）在处理乱序数据包时存在缺陷，无法正确重组和检测经过分片或乱序传输的攻击流量。远程攻击者可通过将恶意负载分散到多个乱序数据包中绕过 IDS 的检测规则，从而逃避安全监控。该漏洞影响多款主流网络入侵检测系统，可被用于隐藏端口扫描、漏洞利用等恶意行为，降低网络防御体系的有效性。"
published = "1999-01-01T05:00:00.000"
remediation = "配置IDS启用完整的TCP流重组（stream reassembly）功能，确保对乱序IP分片和TCP乱序报文进行正确重组后再执行规则匹配。同时启用分片超时与重组缓冲区限制，防止分片洪水绕过检测。建议使用支持应用层协议解析的现代IDS/IPS（如Snort/Suricata）并开启`stream5`或`stream`预处理模块。"
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "网络入侵检测系统（IDS）数据包乱序处理绕过检测漏洞"
updated = "2026-06-16T21:48:42.500"

