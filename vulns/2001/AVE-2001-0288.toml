[basic]
description = "Zope 是一个流行的开源 Web 应用服务器。Digital Creations Zope 2.3.2 及更早版本中存在一个严重的权限提升漏洞。攻击者无需任何权限验证，即可通过修改 ZClass 权限映射来篡改对象的权限设定，并滥用对对象和方法的访问控制。这意味着攻击者可以绕过正常的身份验证机制，提升自身权限，获得对 Zope 应用的更高级别访问控制。漏洞影响 Digital Creations 推出的 Zope 2.3.2 及之前的所有版本。攻击者可以在本地环境下执行任意代码，从而完全控制 Web 应用服务器。成功利用该漏洞后，攻击者能够读取、修改或删除所有资源，破坏系统的完整性和机密性。漏洞的 CVSS 评分为 4.6，攻击复杂性低，且无需任何权限即可利用。Microsoft Azor 等安全团队已发布安全通告，建议所有使用 Zope 的组织立即升级到最新版本，或采取强制权限控制措施。漏洞最初于 2001 年 8 月披露，目前已被确认修复。"
published = "2001-08-14T04:00:00.000"
remediation = "建议立即升级 Zope 至 2.3.3 或更高版本（官方已在 2.3.3 修复 ZClass 权限映射漏洞）。若无法立即升级，可临时限制本地用户对 ZClass 权限映射的修改权限，或在 Zope 实例前部署反向代理限制本地管理接口访问。建议参考 Debian DSA-055 安全公告应用官方补丁包。升级后需重启 Zope 服务并验证 ZClass 权限映射功能恢复正常。"
score = 4.6
severity = "MEDIUM"
sources = ["redhat"]
title = "Digital Creations Zope ZClass 权限映射修改导致本地权限提升漏洞"
updated = "2026-06-16T21:54:32.943"

