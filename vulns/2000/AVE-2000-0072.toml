[basic]
description = "Netscape Communicator 的 Mail Notification (nsnotify) 工具在处理 IMAP 邮件连接时存在安全绕过漏洞。即使管理员已在浏览器设置中指定使用 SSL 加密连接，该工具仍会以明文方式建立 IMAP 会话，导致用户在登录邮箱时的用户名和密码在网络传输过程中被未加密暴露。攻击者通过在网络链路中进行嗅探即可截获这些凭据信息，从而获取受害者的邮件访问权限。该漏洞影响 Netscape Communicator 系列浏览器及邮件客户端。"
published = "2000-01-12T05:00:00.000"
remediation = "升级 Netscape Communicator 至 4.72 以上版本，该版本修复了 nsnotify 忽略 SSL 首选项的问题。如无法升级，可在客户端与 IMAP 服务器之间部署 Stunnel 建立 TLS 加密隧道，强制所有 IMAP 流量加密传输。同时建议迁移至持续维护的邮件客户端（如 Thunderbird），避免使用已停止支持的软件收发敏感邮件。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Netscape Communicator 邮件通知 IMAP SSL 绕过漏洞"
updated = "2026-06-16T21:50:58.403"

