[basic]
description = "Pine 4.x 邮件客户端在处理 HTML 格式邮件时存在远程代码执行漏洞。当用户打开恶意构造的 index.html 文件时，Pine 会调用 lynx 从攻击者控制的 Web 服务器获取 uudecoded 编码的恶意文件，并在本地执行该文件，从而导致攻击者可在目标系统上执行任意命令。攻击者只需诱使用户查看特制邮件即可触发，无需其他认证条件。"
published = "1999-06-28T04:00:00.000"
remediation = "升级至 Pine 4.21 或更高版本，该版本修复了调用 lynx 处理 HTML 时执行外部文件的缺陷。考虑到 Pine 已停止维护，建议迁移至其继承者 Alpine（可在 alpineapp.email 获取），该客户端不再支持自动通过 lynx 执行 uudecode 文件的功能。临时缓解措施可在 Pine 配置中设置 `url-viewers` 禁用 lynx 作为默认 URL 处理器，或修改 `html-list` 配置关闭自动 HTML 渲染。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "University of Washington Pine 远程代码执行漏洞"
updated = "2026-06-16T21:51:32.433"

