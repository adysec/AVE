[basic]
description = 'Microsoft Office 2000 的 UA ActiveX 控件被错误标记为"可安全执行脚本"，远程攻击者可通过诱导用户访问恶意网页或 Office 文档，利用 Office 帮助系统中的"Show Me"功能执行任意脚本操作，导致敏感信息泄露或系统被非授权控制。该漏洞影响 Microsoft Office 2000 版本，攻击者无需身份认证即可利用，危害等级高。'
published = "2000-05-11T04:00:00.000"
remediation = "建议立即升级到受支持的 Office 版本（如 Office 2000 SR-1 及以上），或在注册表中为 CLSID {00020430-0000-0000-C000-000000000046} 设置 Kill Bit 以禁用该 ActiveX 控件。临时缓解措施可将 Internet 安全区域设置为高，禁用 ActiveX 脚本执行。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "Microsoft Office 2000 UA ActiveX 控件安全限制绕过漏洞"
updated = "2026-06-16T21:51:41.587"

