[basic]
description = "VvvebJs 是一款基于 JavaScript 的开源页面编辑器组件，广泛用于前端可视化建站。该漏洞源于其文件上传功能未对用户提交的文件类型、扩展名及内容进行充分的校验与过滤，攻击者可在未授权或低权限状态下，将包含恶意代码的脚本文件（如 PHP/JS）上传至服务器可解析的目录下。一旦上传成功，攻击者即可通过直接访问该文件在目标服务器上执行任意代码，从而完全控制受影响主机，造成远程代码执行（RCE）。攻击条件为存在暴露的文件上传接口且目标部署环境允许上传文件被解析执行。"
published = "2024-03-22T04:15:11.663"
remediation = "升级 VvvebJs 至修复版本（官方已在 commit c6422cfd4d835c2fa6d512645e30015f24538ef0 中修复），并在上传接口增加白名单扩展名校验、文件内容类型检测与目录执行权限隔离。"
score = 8.8
severity = "HIGH"
sources = ["hwpoc"]
title = "VvvebJs 页面编辑器 任意文件上传远程代码执行漏洞"
updated = "2026-07-17T00:00:00Z"

