[basic]
description = "TalentSoft Web+ 4.x 购物车应用中的 webpsvr 守护进程存在目录遍历漏洞。远程攻击者可通过向 webplus CGI 程序发送包含 `..`（点点）序列的特制请求，突破路径限制，读取服务器上的任意文件。该漏洞无需身份认证即可远程利用，可能导致敏感信息泄露，CVSS 评分 5.0，危害等级中等。"
published = "2000-04-12T04:00:00.000"
remediation = '升级 TalentSoft Web+ 至 4.5 以上版本，该版本修复了 webpsvr 守护进程对路径序列过滤不严的问题。如无法升级，在 Web 服务器或反向代理层过滤包含 ".." 的 URL 请求，并限制 webplus CGI 程序的访问权限。考虑到该产品已停止维护，建议迁移至其它受支持的购物车系统。'
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "TalentSoft Web+ 目录遍历漏洞"
updated = "2026-06-16T21:51:23.500"

