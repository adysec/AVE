[basic]
description = "IRC 服务器守护进程（ircd）存在缓冲区溢出漏洞，远程攻击者无需身份认证即可向目标服务器发送特制的超长数据包触发缓冲区溢出，导致任意命令执行。攻击者可利用此漏洞完全控制目标服务器，影响范围广泛，CVSS 评分 10.0，危害等级严重。"
published = "1999-01-01T05:00:00.000"
remediation = "升级 ircd 至 2.10.3 或更高版本以修复缓冲区溢出漏洞。如无法升级，可在 ircd.conf 中加强输入长度校验与连接限制；建议迁移至现代维护的 IRC 服务端软件（如 UnrealIRCd、InspIRCd）。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "IRC ircd 缓冲区溢出远程代码执行漏洞"
updated = "2026-06-16T21:48:00.750"

