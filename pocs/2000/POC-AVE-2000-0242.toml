[info]
author = "ave"
description = "检测系统是否加载 trustees 内核补丁模块，该补丁在处理超长路径名时存在拒绝服务漏洞。通过检查 /proc/modules 中是否加载 trustees 模块来辅助判断系统是否受影响。"
id = "POC-AVE-2000-0242"
name = "Bray Systems Linux Trustees 长路径名 DoS 漏洞检测"
severity = "low"
tags = ["ave-2000-0242"]
vuln_id = [
    "CVE-2000-0274",
    "AVE-2000-0242",
]

[poc]
logic = "all"

[[poc.requests]]
path = "/proc/modules"
protocol = "file"

[[poc.requests.matchers]]
expect = false
part = "body"
type = "word"
words = ["trustees"]
