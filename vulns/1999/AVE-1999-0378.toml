[basic]
description = "WEBgais 1.0 的 websendmail 组件存在远程命令执行漏洞，攻击者可通过向 receiver 参数（$VAR_receiver 变量）传递特制 payload，无需身份认证即可远程访问任意文件或执行任意系统命令。该漏洞利用复杂度低，攻击者仅需构造恶意 HTTP 请求即可触发，影响 WEBgais 1.0 版本。"
published = "1997-07-08T04:00:00.000"
remediation = "Webgais 1.0 已停止维护，建议立即迁移至现代 Web 邮件网关方案。临时缓解措施：(1) 删除或禁用 websendmail CGI 脚本，或通过 Web 服务器配置限制其访问权限；(2) 如必须使用，在脚本入口处对 $VAR_receiver 参数进行严格过滤，禁止包含 `|`、`;`、`` ` ``、`$()` 等 shell 元字符；(3) 以最小权限运行 Web 服务器进程，避免命令执行可导致系统级入侵。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "WEBgais websendmail 远程命令执行漏洞"
updated = "2026-06-16T21:47:53.363"

