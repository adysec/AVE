[basic]
description = "Caldera OpenLinux 2.3 系统中的 IDENT 服务（identd）在处理每个 IDENT 请求时会创建多个线程，远程攻击者无需认证即可发送大量 IDENT 请求，消耗服务器系统资源，导致 identd 服务崩溃或系统拒绝服务。该漏洞影响系统可用性，攻击条件简单，只需网络可达即可触发。"
published = "1999-10-08"
remediation = "禁用 identd 服务（编辑 /etc/inetd.conf 注释 ident 行并重启 inetd），或安装 Caldera 官方安全公告 CSSA-1999-029.1 提供的补丁升级修复版本。"
score = 5.0
severity = "MEDIUM"
sources = [
    "cve",
    "epss",
]
title = "Caldera OpenLinux 2.3 Ident 守护进程拒绝服务漏洞"
updated = "2026-06-16"

