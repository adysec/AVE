[basic]
description = "WebShield SMTP Management Tool 4.5.44 版本存在访问控制缺陷，当客户端 IP 地址无法解析为主机名时，管理端口未正确限制访问权限，导致远程攻击者可通过发送 GET_CONFIG 命令直接访问并修改 SMTP 服务器配置。攻击者无需身份认证即可利用该漏洞，可能导致邮件服务配置被篡改、敏感信息泄露或服务异常。该漏洞影响 Network Associates WebShield SMTP 管理工具，CVSS 评分 5.0，危害等级中危。"
published = "2000-05-01T04:00:00.000"
remediation = "立即将 WebShield SMTP 管理工具升级至 4.5.44 以上版本（如厂商已停止支持，建议迁移至 McAfee Email Gateway 等替代产品）。在防火墙层面严格限制管理端口（默认 TCP 1858）仅允许受信任管理 IP 访问，并确保反向 DNS 解析服务正常运行，避免因解析失败绕过访问控制。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Network Associates WebShield SMTP Management Tool 配置信息泄露漏洞"
updated = "2026-06-16T21:51:45.323"

