[info]
author = "ave"
description = "访问 nph-test-cgi 脚本，验证是否存在 CGI 参数未引用的信息泄露漏洞"
id = "POC-AVE-1999-0113"
name = "Apache NCSA HTTPd Netscape Server nph-test-cgi 信息泄露漏洞 PoC"
severity = "high"
tags = ["ave-1999-0113"]
vuln_id = [
    "CVE-1999-0045",
    "AVE-1999-0113",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/cgi-bin/nph-test-cgi"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "SERVER_SOFTWARE",
    "HTTP_ACCEPT",
    "nph-test-cgi",
]
