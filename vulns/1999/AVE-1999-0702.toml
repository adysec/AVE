[basic]
description = "IBM AIX 操作系统的数据包过滤模块（Packet Filtering Module）中的 genfilt 命令存在访问控制逻辑缺陷。该漏洞源于 genfilt 在处理目标端口大于 32767 的过滤规则时，无法正确识别并过滤发往此类高位端口的网络流量，导致本应被拒绝的报文绕过防火墙规则成功抵达目标服务。影响范围为运行存在缺陷版本 AIX 且启用了基于 genfilt 的数据包过滤功能的主机。攻击条件为攻击者需能够向目标系统发送网络数据包，且目标系统配置了针对高位端口（>32767）的拒绝/限制规则。利用方式是通过向目标主机的高位端口（如 32768 及以上）发送特制流量，由于过滤失效，攻击者可以绕过预期的访问控制策略，进而探测或访问本应被屏蔽的本地服务，可能造成未授权访问与信息泄露。"
published = "1999-10-26T04:00:00.000"
remediation = "建议立即将 IBM AIX 系统升级至已修复该缺陷的补丁版本（IBM 官方针对 genfilt 数据包过滤模块发布的 APAR 补丁，如 4.3.3 及以上已修正版本），并通过 installp 安装对应维护包。若无法立即升级，可在 Packet Filtering Module 中绕过 genfilt 改用 ipfilter 或防火墙规则，并临时在边界防火墙显式拒绝目标端口大于 32767 的入站流量作为缓解措施。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
