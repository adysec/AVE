[basic]
title = "vqSoft vqServer 权限提升漏洞"
description = "该漏洞源于 vqSoft vqServer 软件在配置文件 server.cfg 中明文存储管理员密码等敏感信息。由于配置权限设置不当，攻击者可直接读取包含密码的配置文件，利用这些凭据进行认证并提升系统权限。这种权限提升攻击无需复杂的技术，只需要攻击者能够访问服务器的配置文件即可执行。因此，任何部署了受影响版本 vqServer 的系统都面临着账户被篡改和系统被完全控制的风险，严重威胁了系统的完整性和机密性。"
