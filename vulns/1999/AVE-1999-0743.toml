[basic]
description = "Canna 输入法系统的 canuum 程序存在缓冲区溢出漏洞。该程序在安装时默认以 root 权限 setuid 运行，本地普通用户可通过构造超长的命令行参数或环境变量，使程序向固定大小的缓冲区写入超出其容量的数据，覆盖返回地址并执行任意指令，从而提升权限至 root。该漏洞仅影响本地已拥有普通用户账户、能够执行 canuum 程序的攻击者，受影响的系统主要为 Turbolinux 3.5 Beta 2 等使用 Canna 输入法且 canuum 设置了 setuid root 的发行版。利用方式无需远程网络访问，仅需本地登录后运行特制参数的 canuum 即可完成权限提升。"
published = "1999-11-02T05:00:00.000"
remediation = "建议立即升级 Turbolinux 至已修复该问题的后续版本（Canna 输入系统 3.5 之后版本），并卸载或移除 setuid root 的 canuum 程序（执行 chmod u-s /usr/bin/canuum 去除其 SUID 位）。如暂时无法升级，可通过移除 canuum 的 setuid 权限或将普通用户移出 Canna 用户组作为临时缓解措施，避免本地用户利用该漏洞提权至 root。"
score = 7.2
severity = "HIGH"
sources = ["exploitdb"]
