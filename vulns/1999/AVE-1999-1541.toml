[basic]
description = "AIX 4.3 操作系统的 digest 命令存在权限验证缺陷，属于 printq 用户组的本地攻击者可通过创建或修改系统任意文件来提升至 root 权限。漏洞根源在于 digest 命令在执行文件操作时未对调用者的权限进行充分校验，导致低权限用户能够越权操作系统关键文件。攻击条件要求较低，只需拥有 printq 组账户即可触发，成功利用后可实现完全控制目标系统。该漏洞 CVSS 评分为 7.2，危害等级高。"
published = "1998-01-21T05:00:00.000"
remediation = "立即安装 IBM 针对 AIX 4.3 的 APAR 补丁（文档 ID: 41D8B61D1E1C4FAB852567C9002C546C），或升级至 AIX 5.1 及以上版本。如无法立即打补丁，可移除 digest 命令的 setuid root 权限位（chmod u-s /usr/bin/digest），并限制 printq 组用户对 digest 命令的执行权限作为临时缓解措施。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "IBM AIX digest 命令本地权限提升漏洞"
updated = "2026-06-16T21:50:32.800"

