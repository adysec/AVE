[basic]
description = "WebOne 劳动力与考勤管理套件 DownloadFile.aspx 页面存在任意文件读取漏洞，由于未对 fileid 参数进行有效的路径过滤与权限校验，未经认证的远程攻击者可通过路径遍历（如传入 `../../web.config`）读取服务器任意文件，导致敏感配置信息与数据泄露，危害较大。该漏洞无需登录即可远程利用。"
published = "0703"
remediation = '对 DownloadFile.aspx 中的 fileid 参数进行严格的路径合法性校验，禁止包含 "../" 等目录遍历字符，限制只能访问指定下载目录内的文件。建议升级到官方修复版本，或在 Web 服务器（IIS）层面配置 URL 重写规则拦截包含 "../" 的请求作为临时缓解措施。'
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "WebOne 劳动力与考勤管理套件任意文件读取漏洞"
updated = "0703"

