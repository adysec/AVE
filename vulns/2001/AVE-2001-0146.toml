[basic]
description = 'Microsoft IIS 5.0 及更早版本存在 CGI 文件名双解码目录遍历漏洞。攻击者将 ".." 和 "\" 等路径遍历字符进行双重 URL 编码发送给目标服务器，可绕过安全检查实现目录跳转并以 IUSR_machinename 账户权限执行任意命令。该漏洞影响 IIS 5.0 及更早版本，远程攻击者无需身份认证即可利用，CVSS 评分 7.5，危害等级高。Microsoft 已在 MS01-026 安全公告中发布修复补丁。'
published = "2001-06-27T04:00:00.000"
remediation = "立即安装 Microsoft 2001 年 6 月安全公告 MS01-026 提供的补丁（可通过 Windows Update 获取），该补丁修复了 IIS 对 CGI 文件名的二次解码缺陷。如无法安装补丁，可在 IIS 管理器中删除不必要的脚本映射（如 .ida、.idq、.printer 等），并限制匿名用户对可执行目录的写入权限作为临时缓解措施。"
score = 7.5
severity = "HIGH"
sources = ["exploitdb"]
title = "Microsoft IIS CGI 文件名双解码远程代码执行漏洞"
updated = "2026-06-16T21:54:07.060"

