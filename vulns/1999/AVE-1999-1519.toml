[basic]
description = "Socks 5（socks5）1.0r5 版本中 libsocks5 库存在缓冲区溢出漏洞，本地攻击者可通过向 socks5 服务传递超长的环境变量触发该漏洞，导致缓冲区溢出，进而实现权限提升，获得更高系统权限。该漏洞影响 Socks 5 1.0r5 及更早版本，CVSS 评分 7.2，危害等级高，攻击者需拥有本地系统访问权限才能利用。"
published = "1998-07-10T04:00:00.000"
remediation = "升级 Socks 5 至 1.0r6 及以上版本，该版本已修复 libsocks5 库中环境变量长度检查缺失导致的缓冲区溢出问题。若无法升级，可在启动服务前对 TMPDIR、LOGNAME 等环境变量做长度校验和过滤以缓解风险。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "Socks 5 libsocks5 缓冲区溢出权限提升漏洞"
updated = "2026-06-16T21:50:26.110"

