[basic]
description = "Red Hat Linux 6.2 中 dump 工具（0.4b15 版本）存在本地权限提升漏洞。dump 程序盲目信任 RSH 环境变量所指定的路径，本地攻击者可通过将 RSH 环境变量修改为指向恶意木马程序，使 dump 以 root 权限执行该木马，从而获得 root 权限。该漏洞需要本地访问权限，危害等级为高危。"
published = "2000-12-11T05:00:00.000"
remediation = "升级 dump 工具至 0.4b16 或更高版本，该版本不再信任 RSH 环境变量路径。对于 Red Hat Linux 6.2 系统，建议升级至 Red Hat Enterprise Linux 3 或更高版本（已内置修复）。临时缓解措施可在运行 dump 前执行 `unset RSH` 清除环境变量，或通过 `export RSH=/bin/true` 覆盖为安全路径。"
score = 7.2
severity = "HIGH"
sources = ["exploitdb"]
title = "Red Hat dump 本地权限提升漏洞"
updated = "2026-06-16T21:52:57.790"

