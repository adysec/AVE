[basic]
description = "ColdFusion 中的 HTTP Client 应用程序存在安全绕过漏洞，远程攻击者可通过向 mainframeset.cfm 应用提供目标页面，利用服务器端请求伪造方式绕过对其他端口 Web 页面的访问限制。由于服务器会代为请求该页面，使请求看似来自本地主机，从而绕过基于 IP 或端口的访问控制策略。该漏洞影响 ColdFusion 相关版本，CVSS 评分 7.5，危害等级高，攻击者无需认证即可利用。"
published = "1999-12-31T05:00:00.000"
remediation = "立即删除或限制访问 ColdFusion 安装目录下的 /cfdocs/ 示例目录（包含 httpclient/mainframeset.cfm），防止攻击者利用其代理功能绕过 localhost 访问控制。同时升级 ColdFusion 至官方发布的最新安全版本，并在应用层对内部服务（如管理端口）实施独立认证，不依赖来源 IP 校验。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "Adobe ColdFusion 安全绕过漏洞"
updated = "2026-06-16T21:49:46.283"

