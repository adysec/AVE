[basic]
description = "tags as requested.<value>该漏洞源于 Apple QuickTime 在解析 MP4A 格式电影文件中的 Channel Compositor（chan）原子时存在堆缓冲区溢出缺陷。未经身份认证的远程攻击者可构造包含畸形 chan 原子的特制 MP4A 电影文件，诱使目标用户使用 QuickTime 7.4.5 之前版本打开，从而触发缓冲区溢出并在目标系统上执行任意代码。该漏洞影响安装 QuickTime 7.4.5 之前版本的 Windows 及 Mac OS X 系统，CVSS 评分为 6.8，利用条件要求用户交互（打开恶意文件），成功利用可导致攻击者获得与当前用户相同的权限并执行任意操作。Apple 已在 QuickTime 7.4.5 中修复此漏洞。"
published = "2008-04-04T17:44:00.000"
remediation = "Apple 已发布 QuickTime 7.4.5 修复此漏洞，请将 Windows 和 Mac 系统上的 QuickTime 播放器升级至 7.4.5 或更高版本。如当前版本低于 7.4.5，建议立即从 Apple 官网下载升级包进行安装。若短期内无法升级，可暂时卸载 QuickTime 或限制浏览器自动打开在线电影文件，并避免打开来历不明的 .mp4 或电影文件作为临时缓解措施。"
score = 6.8
severity = "MEDIUM"
sources = ["tenable"]
title = "Apple QuickTime 堆缓冲区溢出远程代码执行漏洞"
updated = "2026-06-16T22:50:49.033"

