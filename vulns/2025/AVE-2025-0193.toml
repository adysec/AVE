[basic]
description = "用友NC的`/portal/pt/oacoSchedulerEvents/listUserSharingEvents`接口中`agent`参数未进行安全过滤直接拼入SQL语句，导致存在SQL注入漏洞。攻击者可在未授权情况下通过构造恶意参数并利用Oracle数据库的`UTL_INADDR.GET_HOST_ADDRESS`函数实现报错注入，从而窃取数据库中的敏感数据（如管理员密码、业务数据等）。该漏洞影响用友NC多个版本，危害较大。"
published = "2025-07-05"
remediation = "升级用友NC至最新安全补丁版本（如NC6.5 Patch 202503或更高），或在WAF/IPS中配置规则拦截对`/portal/pt/oacoSchedulerEvents/listUserSharingEvents`接口的SQL注入特征请求，对`agent`参数进行严格输入过滤与转义处理。"
score = 7.5
severity = "HIGH"
sources = ["hwpoc"]
title = "用友NC listUserSharingEvents SQL注入漏洞"
updated = "2025-07-05"

