[info]
author = "ave"
description = "验证 Microsoft Internet Explorer ASLR 绕过漏洞是否存在，通过构造包含特制内容的网页触发"
id = "POC-AVE-2015-0055"
name = "CVE-2015-0071 PoC"
severity = "medium"
tags = ["ave-2015-0055"]
vuln_id = [
    "CVE-2015-0071",
    "AVE-2015-0055",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/"
protocol = "http"

[poc.requests.headers]
User-Agent = "Mozilla/5.0 (MSIE 9.0; Windows NT 6.1; Trident/5.0)"

[[poc.requests.matchers]]
expect = false
part = "body"
type = "word"
words = [
    "Microsoft",
    "Internet Explorer",
]
