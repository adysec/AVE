[basic]
title = "Platinum Policy Compliance Manager 7.0 缓冲区溢出漏洞"
description = "Platinum Policy Compliance Manager (PCM) 7.0 的 Agent 组件 smaxagent.exe 在处理监听端口 1827 上接收的数据时存在缓冲区溢出漏洞。攻击者无需认证即可通过网络向目标端口发送超长字符串，触发缓冲区溢出，导致服务崩溃（拒绝服务）或执行任意代码。该漏洞影响运行于 Windows NT 4.0 平台上的 PCM Agent 服务。"
severity = "HIGH"
score = 7.5
sources = ["cve"]
published = "1998-12-04"
updated = "2026-06-16"
remediation = "Platinum 已于 1998 年 9 月确认该问题，但该产品已停止维护。建议用户升级到不受影响的版本，或对 PCM Agent 端口 1827 进行网络访问控制，仅允许受信客户端连接，并部署入侵检测规则监控对该端口的异常流量。"
