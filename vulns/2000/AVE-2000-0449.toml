[basic]
description = "NTMail 5.x 邮件服务器存在安全绕过漏洞，网络用户可通过将请求重定向至 NTMail 的 Web 管理配置服务器，绕过代理访问限制。攻击者无需身份认证即可利用此漏洞访问本应被禁止的网络资源或服务，导致系统访问控制失效。该漏洞影响 NTMail 5.x 版本，建议升级至已修复版本。"
published = "2000-05-11T04:00:00.000"
remediation = "立即升级到 NTMAIL 5.2 及更高版本，该版本修复了代理重定向漏洞；同时加强 IIS 服务器配置，禁用不必要的 Web 服务权限，避免 Web 配置服务暴露于公共网络；临时缓解措施为通过防火墙阻止对 Web 配置端口的直接访问。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Gordano NTMail 5.x 安全绕过漏洞"
updated = "2026-06-16T21:51:40.200"

