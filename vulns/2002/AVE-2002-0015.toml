ave_id = "AVE-2002-0015"
aliases = ["CVE-2002-0661"]
[basic]
title = "Apache 2.0 编码反斜杠目录遍历漏洞"
description = "Apache 2.0 至 2.0.39 版本在 Windows、OS2 及 Netware 平台上存在编码反斜杠目录遍历漏洞。远程攻击者可通过向目标服务器发送包含编码反斜杠（%5C）的 .. 目录跳转序列，绕过路径访问限制，实现任意文件读取与命令执行。该漏洞源于 Apache 对编码后的反斜杠字符处理不当，导致路径校验机制被绕过，CVSS 评分 7.5，危害等级高，影响多个操作系统平台上的 Apache 部署。"
severity = "HIGH"
score = 7.5
sources = ["osv"]
published = "2002-08-12T04:00:00.000"
updated = "2026-06-16T21:57:53.483"
remediation = "升级 Apache 至 2.0.40 或更高版本，该版本已修复反斜杠编码的目录遍历问题。如无法立即升级，在 httpd.conf 中禁用 AllowOverride 并限制对文件系统的访问路径，同时在反向代理前过滤包含反斜杠的 URL 请求。"
