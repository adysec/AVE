[basic]
description = "PostACI Webmail 系统 1.1.3 版本默认配置将 /includes/global.inc 配置文件放置在 Web 根目录下，远程攻击者无需身份认证即可通过直接发送 HTTP GET 请求访问该文件，从而泄露数据库用户名和密码等敏感信息。该漏洞 CVSS 评分 7.5，危害等级高，影响运行 Trlinux Postaci Webmail 1.1.3 的服务器。"
published = "2001-01-09T05:00:00.000"
remediation = '立即将 /includes/global.inc 配置文件移出 Web 根目录（如移到上一级目录），并修改 Web 服务器配置（Apache 添加 <FilesMatch "\.inc$"> Deny from all 规则）禁止直接访问 .inc 后缀文件。同时立即更改配置文件中已泄露的数据库用户名和密码。作为临时缓解措施，可在 Web 服务器或 WAF 层面添加规则，拒绝直接访问 /includes/ 路径下的请求。'
score = 7.5
severity = "HIGH"
sources = ["exploitdb"]
title = "Trlinux Postaci Webmail 敏感信息泄露漏洞"
updated = "2026-06-16T21:53:08.807"

