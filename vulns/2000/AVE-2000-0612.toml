[basic]
description = "Red Hat Linux 6.1 中的 tmpwatch 工具在处理目录清理时存在拒绝服务漏洞。tmpwatch 会为每个目录层级 fork 一个新的子进程，本地攻击者可在 /tmp 或 /var/tmp/ 目录下创建深度嵌套的目录结构，触发大量进程 fork 操作，耗尽系统进程资源，导致系统拒绝服务。该漏洞攻击复杂度低，但需要本地访问权限，CVSS 评分 2.1，危害等级低。"
published = "2000-11-14T05:00:00.000"
remediation = "建议立即应用 Red Hat 安全公告 RHSA-2000-080 提供的 tmpwatch 更新补丁，升级至修复版本。如无法立即打补丁，可采取以下缓解措施：避免使用 tmpwatch 的 --fuser 或 -s 选项；通过设置 /tmp 和 /var/tmp 目录的磁盘配额限制，防止本地用户创建过深目录层级；使用 ulimit 限制每个进程可打开的文件描述符数量，降低 fork 风暴对系统的影响。"
score = 2.1
severity = "LOW"
sources = ["cve"]
title = "Red Hat Linux tmpwatch 递归目录拒绝服务漏洞"
updated = "2026-06-16T21:52:33.230"

