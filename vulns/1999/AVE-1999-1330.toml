[basic]
description = "KDE 桌面环境中的 kscreensaver 屏幕保护程序（klock）存在缓冲区溢出漏洞。本地攻击者可通过设置超长的 HOME 环境变量，在触发屏幕锁定时导致缓冲区溢出，从而以 root 权限执行任意代码。该漏洞影响 KDE 早期版本，攻击者需具有本地系统访问权限，利用难度较低，可导致完全控制目标系统。"
published = "1998-05-16T04:00:00.000"
remediation = "立即移除 kscreensaver 和 klock 二进制文件的 setuid 权限：chmod u-s /opt/kde/bin/kscreensaver /opt/kde/bin/klock。建议升级至 KDE 2.0 或更高版本，该版本已修复 HOME 环境变量缓冲区溢出问题。如无法升级，可在系统级限制本地用户设置过长的 HOME 环境变量长度作为临时缓解措施。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "KDE kscreensaver 缓冲区溢出漏洞"
updated = "2026-06-16T21:49:42.810"

