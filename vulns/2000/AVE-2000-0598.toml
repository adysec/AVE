[basic]
description = "IRIX 6.x 系统中 xfs 文件系统的 truncate 函数存在权限检查缺失漏洞。本地攻击者可通过向 xfs 文件系统中的任意文件调用 truncate 操作，由于系统未正确验证用户权限，导致攻击者能够清空目标文件内容，造成数据丢失或服务异常。该漏洞影响 IRIX 6.2、6.3、6.4 版本，攻击者需拥有本地系统访问权限，无需特殊权限即可利用。"
published = "2000-10-20T04:00:00.000"
remediation = "SGI 已于 2006 年停止支持 IRIX，官方不再提供安全补丁。建议立即将受影响的 IRIX 6.2/6.3/6.4 系统升级至 IRIX 6.5（该版本已修复 truncate() 权限检查问题）；如无法升级，可通过 chmod 移除普通用户对 xfs 文件系统中敏感文件的写权限，并限制本地用户登录以降低攻击面。长期方案是迁移至受支持的 Linux 或 BSD 系统。"
score = 10
severity = "CRITICAL"
sources = ["cve"]
title = "SGI IRIX xfs truncate 权限检查漏洞"
updated = "2026-06-16T21:52:30.190"

