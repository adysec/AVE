[basic]
description = "Xdebug（PHP 调试扩展）2.5.5 及更早版本中存在未经身份认证的 OS 命令注入漏洞（CWE-78）。当启用远程调试功能时，Xdebug 在 9000 端口监听调试器协议命令且未实施任何身份验证机制，远程攻击者无需任何凭证即可向该接口发送特制的 eval 命令，执行任意 PHP 代码，进而调用 system()、passthru() 等系统级函数，在 Web 服务器用户权限下完全控制目标主机。该漏洞影响所有启用远程调试的 Xdebug 2.5.5 及更早版本，CVSS 评分 9.3，危害等级严重。"
published = "2025-07-23T14:15:31.763"
remediation = "立即升级 Xdebug 至 3.x 系列最新版本（当前最新为 3.5.3），或至少升级至 2.5.6 及以上版本。在生产环境中必须将 php.ini 中 `xdebug.remote_enable` 设为 `Off`，并确保 `xdebug.remote_connect_back` 为 `Off`。如确需远程调试功能，通过防火墙（iptables/ufw）限制端口 9000 仅允许受信 IP 访问，禁止对公网开放。"
score = 9.3
severity = "CRITICAL"
sources = ["nuclei"]
title = "Xdebug 远程调试 OS 命令注入漏洞"
updated = "2026-06-17T00:21:36.150"

