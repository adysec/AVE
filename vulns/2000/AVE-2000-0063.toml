[basic]
title = "HP HP-UX aserver 本地权限提升漏洞"
description = "HP-UX 10.x 和 11.x 系统中 aserver 程序存在本地权限提升漏洞。该程序在运行时会调用 ps 和 grep 命令，但未使用绝对路径，而是信任用户可控制的 PATH 环境变量。本地攻击者可通过修改 PATH 指向恶意程序，诱使 aserver 以更高权限执行恶意代码，从而获取 root 权限。该漏洞影响 HP-UX 10.x/11.x 系列操作系统，CVSS 评分 7.2，危害等级高。"
