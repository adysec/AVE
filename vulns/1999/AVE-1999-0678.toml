[basic]
description = "FTGate 2.1 邮件服务器 Web 管理界面存在目录遍历漏洞。远程攻击者无需身份认证，通过向目标发送包含 `../` 序列的特制 HTTP 请求即可绕过路径限制，读取服务器上任意文件，如配置文件、密码文件等敏感信息。该漏洞利用难度低，危害中等，CVSS 评分 5.0。"
published = "1999-11-04T05:00:00.000"
remediation = "立即升级 FTGate 至 2.1 以上版本（如 2.2 或更高），该版本已修复路径遍历漏洞。如厂商已停止支持该产品，建议迁移至其他受支持的邮件服务器软件（如 Exchange、Postfix 等）。临时缓解措施：在 Web 服务器或防火墙层面限制对 FTGate Web 管理接口的访问来源 IP，仅允许可信内网地址访问。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "FloosieTek FTGate 2.1 目录遍历漏洞"
updated = "2026-06-16T21:49:15.820"

