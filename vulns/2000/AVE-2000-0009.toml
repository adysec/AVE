[basic]
description = "FTPPro 软件将用户密码等敏感信息以明文形式存储于本地配置文件中，具有本地系统访问权限的攻击者可读取该文件获取明文凭据，进而获得未授权的系统或数据访问权限。该漏洞影响 FTPPro 软件，CVSS 评分仅 2.1，危害等级低，攻击前提是需要已获得本地系统访问权限。"
published = "1999-12-26"
remediation = "FTPPro 已停止维护且厂商不再提供安全更新，建议立即迁移至仍在维护的 FTP 服务器软件（如 FileZilla Server 或 vsftpd）。如短期内无法迁移，须通过文件系统 ACL 严格限制本地用户对 FTPPro 安装目录及配置文件的读取权限。"
score = 2.1
severity = "LOW"
sources = ["cve"]
title = "FTPPro 敏感信息明文存储泄露漏洞"
updated = "2026-06-16"

