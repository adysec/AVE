[basic]
description = 'Cart32 3.0 购物车软件存在管理信息泄露漏洞，远程未授权攻击者可通过在 URL 请求中追加 "/expdate" 路径，直接访问敏感的调试和管理调试信息。该漏洞源于 Cart32 3.0 未对特定调试端点进行访问控制，导致敏感管理信息泄露。攻击条件为远程网络访问、低攻击复杂度、无需身份认证，CVSS 评分 5.0（中危），影响机密性部分丧失，不影响完整性和可用性。攻击者可利用该漏洞获取系统调试信息，辅助进一步攻击。影响范围为 Cart32 3.0 版本购物车软件。'
published = "2000-05-03T04:00:00.000"
remediation = "建议立即升级至 Cart32 3.0 之后的最新版本（官方已停止维护 3.0 版本），或迁移至现代电商平台（如 Shopify、Magento、WooCommerce 等）。若暂时无法升级，请在 Web 服务器（IIS/Apache）层面配置 URL 重写规则，拦截所有包含 `/expdate` 路径的请求，并限制管理后台仅允许受信 IP 访问。建议同时在 WAF 层面添加规则拦截包含 `expdate` 路径的请求，并审计服务器日志排查是否已被利用泄露调试信息。建议尽快完成电商系统迁移，彻底淘汰不再维护的 Cart32 3.0 组件。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Cart32 Cart32 3.0 信息泄露漏洞"
updated = "2026-06-16T21:51:42.967"

