[basic]
description = "xlockmore 是一款 Unix/Linux 系统下的屏幕锁定程序，其 xlock 组件 4.16 及更早版本中存在缓冲区溢出漏洞。本地攻击者可通过向 -mode 选项传递超长字符串参数触发缓冲区溢出，导致内存中的敏感数据被泄露。该漏洞需要攻击者拥有本地系统访问权限，攻击复杂度低，但影响范围仅限拥有本地账户的用户。建议用户升级至最新版本以修复此漏洞。"
published = "2000-05-29T04:00:00.000"
remediation = "升级 xlockmore 至 4.17 或更高版本。如无法升级，限制本地用户对 xlock 程序的 SUID 执行权限，移除 SUID 位 (chmod u-s /usr/X11R6/bin/xlock) 并确保非授权用户无法传递 -mode 参数触发缓冲区溢出。"
score = 2.1
severity = "LOW"
sources = ["cve"]
title = "xlockmore xlock 缓冲区溢出漏洞"
updated = "2026-06-16T21:51:46.287"

