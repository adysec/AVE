[basic]
description = "Solaris 2.5.1 及之前版本中的 chkey 命令存在缓冲区溢出漏洞，本地用户通过向该命令传递超长命令行参数，可触发缓冲区溢出，从而获取 root 权限。攻击者无需任何系统权限即可利用此漏洞。"
published = "1997-05-19"
remediation = "应用 Sun 安全公告 144 中提供的补丁，升级 Solaris 系统至已修复版本，或限制 chkey 命令的 setuid 权限以降低风险。"
score = 7.2
severity = "HIGH"
sources = ["cve"]
title = "Sun Solaris chkey 命令缓冲区溢出漏洞"
updated = "2024-06-16"

