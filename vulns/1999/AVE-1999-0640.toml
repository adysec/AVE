[basic]
description = "Linux Kernel 2.2.0 及之前版本中，当用户对核心转储（core dump）文件执行 ldd 命令时，系统可能因内存处理异常而导致崩溃或强制重启。攻击者可通过诱导用户对特制核心文件执行 ldd 命令，造成本地拒绝服务，影响系统可用性。"
published = "1999-01-26"
remediation = "升级 Linux 内核至 2.2.1 或更高版本，避免对不可信的核心文件执行 ldd 命令。"
score = 5.0
severity = "MEDIUM"
