[basic]
description = "SGI InfoSearch 1.0 的 CGI 程序 infosrch.cgi 存在命令注入漏洞，由于程序未对用户输入的 fname 参数进行充分过滤，远程攻击者可通过在参数中注入 shell 元字符（如分号、管道符等）执行任意系统命令。该漏洞影响 SGI IRIX 6.5.x 及 InfoSearch 1.0 版本，攻击者无需身份认证即可利用，CVSS 评分 7.5，危害等级高。目前已存在公开的利用代码。"
published = "2000-03-01T05:00:00.000"
remediation = "立即删除或禁用 SGI InfoSearch 的 infosrch.cgi 脚本，或移除整个 InfoSearch CGI 目录。如业务必须保留，在 Web 服务器层面限制对该 CGI 的访问来源 IP，并过滤用户输入中的 shell 元字符（如 `;`、`|`、`&`、`$`、反引号等）。由于 SGI IRIX 6.5.x 已停止安全支持，建议迁移至受支持的操作系统。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "SGI InfoSearch CGI 远程命令执行漏洞"
updated = "2026-06-16T21:51:13.523"

