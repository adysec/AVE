[info]
author = "AVE"
description = "通过构造恶意网页，利用 DHTML Edit ActiveX 控件（CLSID:2D591201-5234-11D1-AF91-00AA00B16C65）的跨帧访问特性，将控件重定向至 file:// URL 读取本地文件内容，并通过 innerText 属性提取后上传至攻击者服务器。影响 Internet Explorer 4 和 5。"
id = "POC-AVE-1999-0159"
name = "Microsoft Internet Explorer 4/5 DHTML Edit ActiveX Control File Stealing PoC"
severity = "medium"
tags = [
    "cve-1999-0487",
    "activex",
    "ie",
    "file-theft",
]
vuln_id = [
    "CVE-1999-0487",
    "AVE-1999-0159",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["DHTML Edit"]
