[basic]
description = "Microsoft Windows 内核模式驱动程序 (win32k.sys) 存在内存损坏漏洞，本地攻击者可通过精心构造的应用程序触发内核内存损坏，从而提升权限至 SYSTEM 级别。该漏洞源于 Win32k 内核驱动程序在处理特定图形对象或窗口消息时未正确验证用户模式传入的指针或大小参数，导致内核内存越界读写。影响范围覆盖 Windows Vista SP2 至 Windows 10 初版及对应 Server 版本（含 Server 2008/2012/R2），CVSS 3.1 评分 8.2 (HIGH)，攻击向量为本地、低攻击复杂度、低权限、需用户交互、权限范围改变、机密性/完整性/可用性均高影响。攻击者需诱导用户运行恶意程序，通过精心构造的 GDI 对象或窗口消息触发内核池溢出或 Use-After-Free，实现任意内核代码执行提权。Microsoft 已于 2015 年 9 月补丁周二发布补丁修复（MS15-097），CISA 已将其列入已知被利用漏洞目录（KEV），GitHub 上已有多个公开 PoC/EXP 代码（含补丁对比分析与 x86 利用代码）。"
published = "2015-09-09T00:59:53.207"
remediation = "建议立即安装 Microsoft 2015 年 10 月安全更新，Windows 7 SP1/8/8.1/10 需更新到 KB3085577 或更高版本，通过 Windows Update 自动更新。如无法立即打补丁，可临时禁用未签名驱动程序加载功能并限制常规用户权限访问 win32k.sys 文件。"
score = 8.2
severity = "HIGH"
sources = ["kev"]
title = "Microsoft Windows 内核模式驱动程序 内存损坏权限提升漏洞"
updated = "2026-06-17T00:24:16.817"

