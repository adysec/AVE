[basic]
description = "IBM AIX 4.2 系统中的 /usr/sbin/lchangelv 工具存在本地缓冲区溢出漏洞，本地攻击者可利用该漏洞以 root 权限执行任意代码。攻击者需要通过本地账户登录系统，向 lchangelv 程序提交特制的超长参数触发缓冲区溢出，从而覆盖返回地址或函数指针劫持进程控制流。该漏洞影响 IBM AIX 4.2 版本，CVSS 评分 7.2，危害等级高，攻击前提是拥有本地 shell 访问权限。"
published = "1997-07-21T04:00:00.000"
remediation = "IBM AIX 4.2 用户应立即升级至 AIX 4.3.3 或更高版本，该漏洞已在后续版本中修复；或安装对应 APAR 补丁包。临时缓解措施：以 root 权限执行 `chmod 500 /usr/sbin/lchangelv` 移除 setuid 位，限制普通用户执行该程序。"
score = 7.2
severity = "HIGH"
sources = ["exploitdb"]
title = "IBM AIX lchangelv 本地缓冲区溢出漏洞"
updated = "2026-06-16T21:47:38.147"

