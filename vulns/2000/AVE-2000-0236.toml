[basic]
description = "Red Hat Linux 6.x 系统中的 X Font Server (xfs) 组件在处理畸形请求时存在缓冲区溢出漏洞，远程攻击者可通过向目标 xfs 服务发送特制的恶意请求触发该漏洞，导致 xfs 服务进程崩溃进而引发拒绝服务。该漏洞影响 Red Hat Linux 6.x 系列版本，CVSS 评分 2.1，危害等级低。"
published = "2000-04-16T04:00:00.000"
remediation = "升级 Red Hat Linux 至 7.x 或更高版本，或安装 Red Hat 官方提供的 xfs 补丁包。如无法升级，可停止 xfs 服务（`service xfs stop && chkconfig xfs off`）并在防火墙中禁用 TCP 端口 7100 以阻断外部访问。对于仍在使用 RHEL 6 的系统，建议迁移至受支持的 RHEL 7/8/9 版本。"
score = 2.1
severity = "LOW"
sources = ["avd"]
title = "Red Hat Linux 6.x X Font Server 缓冲区溢出漏洞"
updated = "2026-06-16T21:51:21.020"

