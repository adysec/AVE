[basic]
description = "Windows NT 4.0 SP2 的 SMB 挂载功能存在输入验证缺陷，远程攻击者可通过发送特制的畸形数据包或利用特定 Linux 环境下编译的 smbmount 命令与目标系统交互，触发 SMB 服务进程崩溃，导致拒绝服务。该漏洞影响 Windows NT 4.0 SP2 版本，攻击者无需身份认证即可利用，但无法用于远程代码执行或权限提升。"
published = "1997-04-02T05:00:00.000"
remediation = "升级 Windows NT 4.0 至 SP3 或更高版本以修复 SMB 协议处理中的拒绝服务漏洞。该操作系统已停止支持，建议升级至 Windows Server 2003 或更高版本以获得持续安全更新。如无法升级，可在防火墙层面阻止外部对 445/TCP (SMB) 端口的访问作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Microsoft Windows 4.0 SMB Mount 拒绝服务漏洞"
updated = "2026-06-16T21:50:19.873"

