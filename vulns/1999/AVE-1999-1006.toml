[basic]
description = "Netscape Enterprise Server 与 Netscape FastTrack Server 在处理 HTTP 基本认证（Basic Authentication）请求时存在缓冲区溢出漏洞。由于服务端未对认证凭据的长度进行充分边界校验，远程攻击者可通过向目标 Web 服务器发送特制的超长 HTTP Basic Authentication 请求，触发缓冲区溢出，从而覆盖内存关键数据并以更高权限（如服务器进程权限）执行任意代码或命令。该漏洞影响上述两款 Netscape 服务器产品的相关版本，攻击无需身份认证，仅需网络可达目标服务端口即可发起，危害等级极高（CVSS 评分 10.0）。"
published = "1999-12-01"
remediation = "升级到已修复该问题的 Netscape Enterprise Server 3.6 SP2 及以上版本或 Netscape FastTrack Server 相应补丁版本；若无法升级，应在前端反向代理或防火墙处限制并过滤超长 HTTP Basic Authentication 请求头，或停止在互联网暴露受影响的 Netscape 服务器并迁移至受支持的现代 Web 服务器。"
score = 10.0
severity = "CRITICAL"
sources = ["epss"]
title = "Netscape Enterprise Server 与 FastTrack Server HTTP 基础认证 缓冲区溢出权限提升漏洞"
updated = "2026-07-18"

