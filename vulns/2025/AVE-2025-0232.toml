[basic]
description = "该漏洞存在于金和OA的 IsHaveFTask.aspx 页面中，由于未对用户提交的 XML 数据进行充分过滤，导致可被利用进行 XML 外部实体注入（XXE）。远程攻击者无需身份认证，向目标接口发送特制 XML 请求包即可读取服务器任意文件，或借助外部实体发起 SSRF 攻击探测内网服务，造成敏感信息泄露与内网横向移动风险。"
published = "0715"
remediation = "升级金和OA至官方最新版本，同时在 web.config 中配置 XmlReaderSettings.ProhibitDtd = true 禁用 DTD 解析，并设置 XmlResolver 为 null 以阻止外部实体加载。如无法升级，可在 IIS 层面通过 URL 重写规则拦截对 IsHaveFTask.aspx 的异常 XML 请求作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "金和OA IsHaveFTask.aspx XXE注入漏洞"
updated = "0715"

