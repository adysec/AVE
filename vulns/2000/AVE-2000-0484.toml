[basic]
description = 'Microsoft IIS 4.0 及 5.0 存在源代码片段泄露漏洞，远程攻击者通过在 URL 后附加 `+.htr` 后缀即可触发该漏洞，导致服务器返回 ASP 等脚本文件的源代码片段而非执行结果。该漏洞属于 ".HTR 文件片段读取" 变种，攻击者无需身份认证即可利用，可能导致敏感信息泄露，如数据库连接字符串、业务逻辑等。受影响版本包括 Windows NT 4.0 上的 IIS 4.0 及 Windows 2000 上的 IIS 5.0。'
published = "2000-07-17T04:00:00.000"
remediation = "tags.<value>立即删除 IIS 中 .HTR 脚本映射（IIS 管理器 → Web 站点属性 → 主目录 → 配置 → 删除 .htr 映射）；如确需保留 HTR 功能，安装 MS00-044（后被 MS01-004 取代）安全补丁，同时限制 /scripts/iisadmin 目录仅允许 Administrators 访问。由于 IIS 4.0/5.0 已停止支持，建议升级至受支持的 Windows Server 及 IIS 版本。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Microsoft IIS 4.0/5.0 源代码片段泄露漏洞"
updated = "2026-06-16T21:52:08.837"

