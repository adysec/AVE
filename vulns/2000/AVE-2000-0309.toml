[basic]
description = "WWWThreads 5.0 存在 SQL 注入漏洞，程序未对传递给 SQL 查询的数值数据或表名进行有效过滤，远程攻击者可通过向论坛提交特制的恶意参数触发该漏洞，实现权限提升并执行任意 SQL 命令。该漏洞影响 Wired Community Software WWWThreads 5.0 版本，CVSS 评分 7.5，危害等级高。"
published = "2000-02-03T05:00:00.000"
remediation = '升级 WWWThreads 至 5.1 或更高版本。如无法升级，在 Perl 代码中对所有数字参数使用严格的数字正则校验（/^\d+$/），对表名使用 $dbh->quote_identifier() 引用，并将 SQL 查询改为 DBI 占位符方式执行。同时启用 Perl 的 taint 模式（-T）增加输入安全防护。鉴于该软件早已停止维护，建议迁移至其他仍在支持的论坛系统。'
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "Wired Community Software WWWThreads 5.0 SQL注入漏洞"
updated = "2026-06-16T21:51:03.143"

