[basic]
description = "Novell GroupWise 5.5 Enhancement Pack 的 Web Access 组件中 Java Server 存在拒绝服务漏洞。远程攻击者可通过向 servlet 发送超长 URI 请求，导致 Java Server 处理异常而崩溃，造成服务不可用。攻击无需身份认证，仅需构造特制 URL 即可触发。该漏洞影响 Novell GroupWise 5.5 Enhancement Pack 版本，CVSS 评分 5.0，危害等级中危。"
published = "2000-02-07"
remediation = "Novell GroupWise 5.5 Enhancement Pack 已停止维护，建议升级至 GroupWise 6.0 及以上受支持版本。若无法升级，可在反向代理或 Web 服务器层限制传入 URI 长度不超过 1024 字节，并配置访问控制规则仅允许可信 IP 访问 Java Servlet 接口，以降低被攻击风险。"
score = 5.0
severity = "MEDIUM"
sources = ["cve"]
title = "Novell GroupWise Web Access Enhancement Pack Java Server 拒绝服务漏洞"
updated = "2000-02-07"

