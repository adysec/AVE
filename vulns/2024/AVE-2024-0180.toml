[basic]
description = "方天云智慧平台系统的 Upload.ashx 接口存在任意文件上传漏洞。该接口未对用户上传的文件进行充分的类型校验与内容过滤，攻击者在无需身份认证的情况下，可通过构造包含恶意 ASPX WebShell 的 multipart/form-data 请求，将可执行脚本文件（如 qwe.aspx）上传至服务器 Web 目录。成功上传后，攻击者可访问该文件实现远程代码执行（RCE），进而完全控制服务器。该漏洞影响所有未修复的方天云智慧平台系统实例，危害等级较高，建议尽快升级或限制上传接口访问。"
published = "0801"
remediation = "建议立即升级方天云智慧平台系统至官方已修复该漏洞的最新版本（请联系厂商获取补丁包并替换部署）。如暂时无法升级，可在 Web 服务器（IIS）层面限制 Upload.ashx 接口仅允许可信内网 IP 访问，并配置请求过滤拒绝 .aspx/.asp/.jsp 等可执行脚本扩展名的上传，同时关闭不必要的匿名上传权限作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "方天 方天云智慧平台系统 Upload.ashx 任意文件上传漏洞"
updated = "0801"

