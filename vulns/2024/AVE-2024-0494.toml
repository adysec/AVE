[basic]
description = "containerd 容器运行时的 CRI 目录（`/var/lib/containerd`、`/run/containerd/io.containerd.grpc.v1.cri` 等）在创建时权限设置过宽（CWE-279），本地攻击者可利用该缺陷读取或修改容器运行时敏感文件，实现权限提升。该漏洞影响 containerd 0.1.0 至 1.7.28、2.0.0 至 2.0.6、2.1.0 至 2.1.4 及 2.2.0-beta.0 至 2.2.0-rc.1 版本，CVSS 评分 7.3，危害等级高。建议升级至 1.7.29、2.0.7、2.1.5 或 2.2.0 及以上版本修复。"
published = "2025-11-06T19:15:40.090"
remediation = "升级 containerd 至 v1.7.29、v2.0.7、v2.1.5 或 v2.2.0 及以上版本。如无法立即升级，可手动执行 `chmod 755 /var/lib/containerd /run/containerd/io.containerd.grpc.v1.cri /run/containerd/io.containerd.sandbox.controller.v1.shim` 移除组/其他用户权限，或启用 rootless 模式运行 containerd 作为临时缓解措施。"
score = 7.3
severity = "HIGH"
sources = ["msrc"]
title = "containerd CRI 目录本地权限提升漏洞"
updated = "2026-06-17T07:16:18.617"

