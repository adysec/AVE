[basic]
description = 'Unix 系统通过 /etc/hosts.equiv 与 ~/.rhosts 文件配置基于主机的信任关系，实现无密码远程登录。当该文件中被配置为不受限制的信任项（例如包含单独的"+"符号）时，系统将允许来自任意主机的任意用户以本地任意用户身份登录，从而绕过身份认证。攻击者在可访问目标主机网络的条件下，利用 rlogin、rsh 等基于 rhosts 的远程服务，无需提供凭据即可获得目标系统的同等权限，可能造成权限提升与未授权访问，影响范围涵盖所有启用此类信任配置的 Unix/Linux 系统。'
published = "1999-01-01T05:00:00.000"
remediation = "立即编辑 /etc/hosts.equiv 与每个用户的 ~/.rhosts，删除其中单独的「+」号及「+ +」等无限制信任条目，仅保留明确的主机名与用户名；停止并禁用 rsh、rlogin、rexec 等基于信任的 R 服务（如执行 chkconfig rsh off），改用 SSH 并配置基于密钥的认证；在主机防火墙限制 512/513/514 端口仅允许内网可信地址访问。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "Unix /etc/hosts.equiv 未授权主机信任关系提权漏洞"
updated = "2026-06-16T21:48:33.550"

