[basic]
description = "StarOffice 5.1 存在缓冲区溢出漏洞，攻击者可在文档中嵌入超长 URL，当用户打开精心构造的恶意文档时，会触发缓冲区溢出导致 StarOffice 程序崩溃，造成拒绝服务。该漏洞依赖用户交互触发，攻击者需通过社会工程学手段诱使用户打开特制文档，无法远程主动利用。影响 StarOffice 5.1 版本，CVSS 评分 4.6，危害等级中危。建议用户避免打开来源不明的文档以降低风险。"
published = "2000-04-16T04:00:00.000"
remediation = "升级到 StarOffice 5.2 或更高版本，该漏洞在后续版本中已修复。由于 StarOffice 已停止维护，建议迁移至开源的 LibreOffice 或 Apache OpenOffice 替代。同时避免打开来源不明的文档，防止嵌入恶意超长 URL 触发缓冲区溢出。"
score = 4.6
severity = "MEDIUM"
sources = ["cve"]
title = "StarDivision StarOffice 5.1 缓冲区溢出拒绝服务漏洞"
updated = "2026-06-16T21:51:24.650"

