[basic]
description = "Linux 内核文件映射子系统（filemap）中存在空指针解引用漏洞。当并发读取操作与缓存失效操作产生竞态条件时，folio 可能被替换为更高阶的 folio，导致在 filemap_get_read_batch() 函数的下一次循环迭代中出现兄弟条目（sibling entry），进而引发在持有 RCU 读锁期间的空指针解引用。本地攻击者可利用此漏洞触发系统崩溃，造成拒绝服务。该漏洞影响 Linux 内核多个版本，CVSS 评分 5.5，危害等级中等。"
published = "2025-02-26T07:01:44.640"
remediation = "将 Linux 内核升级至 5.18.8 或更高版本（5.18.x 用户升级至 5.18.8 即可；5.19 及以上版本已包含此修复）。对于 RHEL/CentOS 等发行版，请安装对应的内核安全更新。各长期支持 (LTS) 内核分支也已向后移植此修补（对应提交 cb995f4eeba9 / a66f131d30e5）。如无法立即更新内核，可通过 seccomp 或 AppArmor/SELinux 策略限制非信任进程对 mmap 的调用以降低风险，但升级内核是唯一彻底的修复方案。"
score = 5.5
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux Linux内核 filemap 空指针解引用漏洞"
updated = "2026-06-17T05:18:53.970"

