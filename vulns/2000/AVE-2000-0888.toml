[basic]
description = "Microsoft Virtual Machine（微软Java虚拟机）存在Java沙箱逃逸漏洞，远程攻击者可通过诱导用户访问包含非法类型转换操作的恶意Java applet页面，绕过Java沙箱安全机制执行任意系统命令。该漏洞影响多个Windows平台上安装的Microsoft VM版本，攻击者只需用户使用浏览器访问恶意网页即可触发，无需其他认证条件。漏洞成因是虚拟机在类型检查验证过程中未能正确处理非法类型转换，导致沙箱保护被绕过。CVSS评分7.6，危害等级高。"
published = "1999-10-21T04:00:00.000"
remediation = "根据微软安全公告 MS99-045，受影响的 Microsoft VM 版本包括 2000 系列（build < 2442）和 3000 系列（build < 3188）。当时官方修复方案为安装安全更新，将 VM 升级至 build 2442 或 3188 及以上版本。鉴于 Microsoft VM 已于 2009 年终止支持并停止分发，当前建议彻底卸载 Microsoft VM 组件，通过控制面板或 Microsoft Java Virtual Machine Removal Tool 移除；同时迁移至受支持的 Java 运行时（如 OpenJDK 11 或更高版本），并在浏览器中将 Java 插件安全级别设为最高或在 IE 中禁用 Java 小程序执行。"
score = 7.6
severity = "HIGH"
sources = ["epss"]
title = "Microsoft Virtual Machine Java 沙箱逃逸远程代码执行漏洞"
updated = "2026-06-16T21:51:29.123"

