[basic]
description = "Microsoft Internet Explorer 5.0 至 5.5 版本中存在文件读取漏洞。远程攻击者可构造特制 HTML 页面，利用 `<INPUT TYPE=FILE>` 表单元素强制客户端读取本地任意文件并提交至服务器。攻击者须诱使用户访问恶意网页，成功后可窃取目标系统上的敏感文件。该漏洞 CVSS 评分 2.6，危害等级低，影响 IE 5.0 至 5.5 版本。"
published = "2001-02-16T05:00:00.000"
remediation = "立即升级到 Internet Explorer 6 或更高版本，此漏洞在 IE6 中已修复。如无法升级，可在浏览器安全设置中将「将文件上载到服务器时包含本地目录路径」设为禁用，或通过组策略限制 ActiveX 控件和表单自动提交行为作为临时缓解措施。"
score = 2.6
severity = "LOW"
sources = ["exploitdb"]
title = "Microsoft Internet Explorer 5 远程文件读取漏洞"
updated = "2026-06-16T21:53:38.113"

