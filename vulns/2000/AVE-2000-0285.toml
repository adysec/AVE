[basic]
description = "CVS 1.10.7 版本在文件锁定机制中使用可预测的临时文件名，本地攻击者可通过在合法 CVS 用户创建锁目录之前预先创建同名目录，导致锁定操作失败，从而引发拒绝服务。该漏洞影响 CVS 1.10.7 及可能更早版本，攻击者需拥有本地系统访问权限，无需特殊权限即可利用，危害等级中等。"
published = "2000-04-23T04:00:00.000"
remediation = "升级 CVS 至 1.11 或更高版本，该版本已修复可预测临时文件名问题，使用随机化锁文件名称防止本地拒绝服务攻击。如无法升级，可限制本地用户对 CVS 仓库目录的访问权限，仅允许受信任用户执行 CVS 操作。"
score = 5.5
severity = "MEDIUM"
sources = ["avd"]
title = "Concurrent Versions Software CVS 可预测临时文件名本地拒绝服务漏洞"
updated = "2026-06-16T21:51:30.520"

