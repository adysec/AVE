[basic]
description = "HP Web JetAdmin 5.6 的 Web 界面服务器存在目录遍历漏洞，未经身份认证的远程攻击者可以通过 ..（点号点号）路径遍历攻击，向目标服务器发送包含特制目录跳转序列的 HTTP 请求，从而绕过访问控制读取服务器上的任意文件内容。该漏洞影响 HP JetAdmin 5.5.177 及 5.6 版本，攻击者无需任何凭据即可在远程执行读取操作，可能导致敏感配置文件、密码文件或商业数据泄露，CVSS 评分 7.5，危害等级高。"
published = "2000-05-24T04:00:00.000"
remediation = "升级 HP Web JetAdmin 至 7.x 或更高版本，或迁移至 HP 支持的生命周期管理工具（如 HP iLO）。若无法立即升级，应在防火墙层禁用 8000 端口的对外访问，仅允许受信管理网段访问；同时删除或重命名 JetAdmin Web 接口目录中不必要的 CGI 脚本，或在配置文件 `jetadmin.ini` 中禁用 Web 界面服务。临时缓解措施还包括在反向代理或主机层面对包含 `../` 的 URL 请求进行过滤拦截，防止目录遍历攻击。鉴于 HP Web JetAdmin 5.5.x/5.6 已长期停止安全更新，长期方案应逐步淘汰该产品并迁移至受支持的服务器远程管理方案。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "HP Web JetAdmin 目录遍历漏洞"
updated = "2026-06-16T21:51:44.673"

