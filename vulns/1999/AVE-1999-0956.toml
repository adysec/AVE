[basic]
description = "目标主机上运行了 Gopher 服务，该服务会在未经身份认证的情况下向任意远程访问者暴露目标系统的服务状态与网络信息，属于信息泄露类配置弱点。影响范围为所有默认或手动开启 Gopher（TCP 70 端口）服务的 Unix 类系统。攻击者只需具备网络可达性，即可通过连接该端口探测主机运行状态、确认服务指纹并扩大后续攻击面。虽然 Gopher 服务本身不直接导致代码执行，但其开放状态会降低系统隐蔽性，建议关闭不必要的 Gopher 服务以消除信息暴露风险。"
published = "1999-01-01T05:00:00.000"
remediation = "建议立即禁用 Gopher 服务（gopherd），在 /etc/inetd.conf 或 /etc/xinetd.d/gopher 中注释或移除相关配置行，重启 inetd/xinetd 服务使变更生效。如系统捆绑 Gopher 服务，建议升级到不再包含该服务的操作系统版本。同时应在网络边界防火墙封禁 TCP 端口 70（Gopher 默认端口），防止外部访问该服务。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
