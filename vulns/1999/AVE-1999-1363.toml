[basic]
description = "Livingston Portmaster 路由器上运行的 ComOS 操作系统在建立 TCP 连接时使用固定的初始序列号（ISN），导致攻击者无需通过正常的 TCP 三次握手即可预测并伪造序列号。远程攻击者可利用此漏洞构造伪造的 TCP 数据包实施会话劫持或 IP 欺骗攻击，绕过认证机制获取未授权访问。该漏洞影响运行 ComOS 的 Livingston Portmaster 系列路由器，CVSS 评分 7.5，危害等级高。厂商已不再维护该产品，建议升级至替代方案。"
published = "1998-06-30T04:00:00.000"
remediation = "升级 ComOS 固件至启用了随机 TCP 初始序列号（ISN）生成的版本（Livingston 已发布相关安全更新）。若无法升级，在网络边界启用 IPsec 加密或 TCP MD5 签名选项（RFC 2385）防止会话劫持与欺骗，同时在路由器 ACL 中限制仅允许可信 IP 访问 Telnet/SSH 管理端口（23/TCP）。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "Livingston Portmaster路由器 TCP初始序列号可预测漏洞"
updated = "2026-06-16T21:49:49.663"

