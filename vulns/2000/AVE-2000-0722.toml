[basic]
description = 'Oracle Internet Directory 2.0.6 中的 oidldapd 组件存在缓冲区溢出漏洞，本地攻击者可通过向该组件的 "connect" 命令行参数传递超长字符串触发缓冲区溢出，导致攻击者获取系统特权提升。该漏洞影响 Oracle 8.1.6 及关联组件，CVSS 评分 4.6，攻击者需具备本地系统访问权限，利用难度较低。目前官方尚未发布针对性补丁，建议限制本地用户对 oidldapd 组件的访问权限。'
published = "2000-12-19T05:00:00.000"
remediation = "升级 Oracle Internet Directory 至 Oracle 官方于 2000 年 12 月之后发布的补丁集版本（如 2.0.7 及以上）。对于当前仍在使用该组件的环境，建议直接迁移至最新受支持的 Oracle Internet Directory 版本（如 11g/12c 系列）。作为临时缓解措施，严格限制可执行 oidldapd 的本地用户范围，移除不必要的本地登录权限，并通过操作系统权限控制限制 oidldapd 二进制文件的执行权限仅为 root 或专用服务账户。"
score = 4.6
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Oracle Internet Directory oidldapd 本地缓冲区溢出漏洞"
updated = "2026-06-16T21:52:55.040"

