[basic]
description = "海康威视IVMS-8700综合安防系统存在XML外部实体注入（XXE）漏洞。系统XML解析器未正确禁用外部实体解析，攻击者可通过向相关接口发送包含恶意DTD的XML请求，利用外部实体读取服务器敏感文件、发起SSRF攻击探测内网，在特定条件下可进一步实现远程代码执行（RCE）。该漏洞无需身份验证即可远程利用，影响IVMS-8700系列综合安防管理平台。"
published = "2023-08-15"
remediation = "建议尽快联系海康威视官方获取并升级至 IVMS-8700 综合安防系统最新安全补丁版本，从根源修复 XML 解析器漏洞。临时缓解措施：在服务端禁用 XML 外部实体（DTD）解析，将 XML 解析器的 disallow-doctype-decl 特性设为 true、external-general-entities 与 external-parameter-entities 设为 false；同时通过防火墙/WAF 限制对相关 XML 接口的外部访问，过滤含 DOCTYPE、ENTITY、SYSTEM 关键字的恶意请求，避免系统直接暴露在公网。"
score = 5.0
severity = "MEDIUM"
sources = ["hwpoc"]
title = "海康威视IVMS-8700综合安防系统XML外部实体注入漏洞"
updated = "2023-08-15"

