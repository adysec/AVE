[basic]
description = "Opera 3.2.1 浏览器存在拒绝服务漏洞，远程攻击者可通过向用户发送包含畸形 http:// 标签（在协议标记中插入额外斜杠 /）的特制 URL 触发该漏洞，导致浏览器应用程序崩溃。该漏洞影响 Opera 3.2.1 版本，CVSS v2 评分 5.0，危害等级中等。攻击者无需身份认证，但需诱使用户点击恶意链接。"
published = "1998-08-14"
remediation = "升级至 Opera 3.5 及以上版本，该漏洞已在后续版本中修复。由于 Opera 3.2.1 已停止维护，建议用户升级到最新受支持版本或更换使用现代浏览器如 Firefox、Chrome 等以避免该安全问题。"
score = 5.0
severity = "MEDIUM"
sources = ["cve"]
title = "Opera Web Browser 畸形URL拒绝服务漏洞"
updated = "2026-06-16"

