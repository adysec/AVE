[info]
author = "ave"
description = "检测 Solaris 系统上 /usr/lib/lp/bin/netpr 程序是否存在，该程序存在缓冲区溢出漏洞，本地攻击者可通过 -p 选项传递超长参数触发溢出以提升权限"
id = "POC-AVE-2000-0334"
name = "CVE-2000-0407 PoC"
severity = "high"
tags = ["cve-2000-0407"]
vuln_id = [
    "CVE-2000-0407",
    "AVE-2000-0334",
]

[poc]
logic = "all"

[[poc.requests]]
path = "/usr/lib/lp/bin/netpr"
protocol = "file"

[[poc.requests.matchers]]
expect = true
part = "body"
regex = ".+"
type = "regex"
