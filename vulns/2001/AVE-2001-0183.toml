[basic]
description = "Baltimore Technologies WEBsweeper 4.0 代理服务器软件存在 HTTP 请求头长度限制缺失漏洞。远程攻击者无需身份认证即可通过向目标服务器发送包含超长 Referer 头的特制 HTTP 请求，导致服务器内存资源被大量消耗，最终引发拒绝服务（DoS）。该漏洞影响 WEBsweeper 4.0 版本，攻击条件简单，仅需网络可达即可实施。"
published = "2001-06-27T04:00:00.000"
remediation = "该产品（Baltimore Technologies WEBsweeper 4.0）已停止维护，无官方补丁。建议在 WEBsweeper 配置中限制 HTTP 请求头最大长度（如将 Referer 头限制在 8KB 以内），或在 WEBsweeper 前端部署反向代理/WAF 拦截超长请求头（如 nginx 的 large_client_header_buffers 设置为 8k），并尽快迁移至受支持的 Web 安全网关产品。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Baltimore Technologies WEBsweeper 4.0 HTTP 标头内存耗尽拒绝服务漏洞"
updated = "2026-06-16T21:54:20.947"

