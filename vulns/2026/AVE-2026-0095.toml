[basic]
description = "npm decompress 包在解压归档文件时存在路径穿越漏洞（CWE-22）。该漏洞源于三个方面：硬链接和符号链接条目未检查目标指向，导致可读取任意文件暴露到输出目录或劫持写入操作到目录之外；路径包含性检查仅使用简单字符串前缀比对，未对`../`等跨目录条目进行转义；文件权限模式未移除 setuid/setgid/sticky 位。攻击者可通过构造恶意归档文件，实现向目标目录之外任意位置读写文件。该漏洞影响 10.2.1 和 11.1.3 之前版本，CVSS 评分 9.1，危害等级严重，每周约 280 万次下载。"
published = "2026-07-14T21:17:05.447"
remediation = "将 `@xhmikosr/decompress` 升级至 10.2.1 或 11.1.3 及以上版本。升级后应对解压目录启用沙箱隔离机制，限制解压进程对输出目录外的文件系统访问权限。同时建议在解压前校验压缩包条目的路径合法性，拒绝包含绝对路径或上级目录引用的条目。"
score = 9.1
severity = "CRITICAL"
sources = ["hwpoc"]
title = "npm decompress 路径穿越漏洞"
updated = "2026-07-15T20:29:17.680"

