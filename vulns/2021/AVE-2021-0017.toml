[basic]
description = "Linux 内核的 AMD GPU 电源管理驱动（drm/amd/pm）中存在内存泄漏漏洞。函数 renoir_init_smc_tables() 为 gpu_metrics_table 分配了内存，但对应的清理函数 smu_v12_0_fini_smc_tables() 未能正确释放该内存，导致内存资源无法回收。本地攻击者可利用此漏洞通过反复加载和卸载驱动模块消耗系统内存，造成拒绝服务或信息泄露。该漏洞影响 Linux 内核中使用 AMD Renoir 及关联 GPU 架构的系统。"
published = "2025-02-26T06:37:07.557"
remediation = "建议升级 Linux 内核至包含 commit 4f9f7e5e 的版本（5.15+ / 5.10.82+ / 5.4.165+），该补丁在 smu_v12_0_fini_smc_tables() 中增加了 kfree() 释放 gpu_metrics_table 内存。如无法立即升级内核，可禁用 amdgpu 内核模块的 GPU 度量功能（amdgpu.gpu_metrics=0）作为临时缓解措施。"
score = 5.5
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux 内核 AMD GPU 电源管理模块内存泄漏漏洞"
updated = "2026-06-17T04:18:16.160"

