[basic]
description = "tags as requested.<value>ISC innd 2.x 版本存在缓冲区溢出漏洞。innd 是一个新闻传输 daemon 服务，处理新闻文章和广播。该漏洞源于 cancel 请求处理代码未对输入的 message ID 进行充分验证，当攻击者发送包含超长 message ID 的取消请求时，会导致缓冲区溢出，使控制流跳转到攻击者控制的代码地址。由于 innd 默认以 root 或高权限用户运行此服务，攻击者可通过网络远程触发此漏洞，获得完全控制权。攻击只需构造一个包含足够长度 malicious payload 的消息 ID 并发送 cancel 请求即可，攻击者无需身份验证即可利用此漏洞执行任意命令。"
published = "2000-02-06T05:00:00.000"
remediation = "建议立即升级 ISC INN (InterNetNews) 到 2.2.3 或更高版本（如 2.3.0+），该版本修复了 innd 2.2.2 中的 cancel 报文缓冲区溢出漏洞。若无法立即升级，建议在防火墙层面限制 NNTP 服务（默认端口 119）仅对可信 IP 开放，或在 innd.conf 中设置严格的 access/access.deny 访问控制列表限制 cancel 命令来源 IP。同时建议监控 NNTP 日志中的异常长 Message-ID 取消请求作为临时监测手段。"
score = 3.6
severity = "LOW"
sources = ["avd"]
title = "ISC innd 远程缓冲区溢出漏洞"
updated = "2026-06-16T21:51:48.463"

