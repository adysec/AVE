[basic]
description = "D-Link DIR-845L 路由器固件版本 v1.01KRb03 及之前版本的 bsc_sms_inbox.php 接口存在信息泄露漏洞。攻击者可通过向 /getcfg.php 接口发送包含命令注入载荷的 a 参数（如 %0A_POST_SERVICES=DEVICE.ACCOUNT%0AAUTHORIZED_GROUP=1），绕过授权验证直接读取设备账户等敏感配置信息。该漏洞无需身份认证即可远程利用，CVSS 评分 5.3（中危），影响设备配置机密性。"
published = "2024-05-06T15:15:23.703"
remediation = "D-Link 已宣布 DIR-845L 进入 EOL/EOS 阶段，不再提供固件更新。建议立即停用并更换为仍在支持周期内的路由器设备。如无法立即更换，作为临时缓解措施：在管理界面禁用远程管理（WAN 侧访问），将管理端口限制为仅内网可访问；修改默认管理员密码为强密码；在防火墙规则中限制对 /bsc_sms_inbox.php 和 /getcfg.php 等敏感路径的外部访问。"
score = 5.3
severity = "MEDIUM"
sources = ["hwpoc"]
