[basic]
description = "NeXT 1.0a 及 1.0 系统中存在权限提升漏洞。由于 npd 程序对打印机相关目录的权限设置不当，且目录可被公开访问，本地攻击者可利用 npd 程序结合目录的弱权限配置，通过向打印机目录写入恶意文件或执行特权操作，从而获取系统更高权限。该漏洞影响 NeXT 1.0a 和 1.0 版本，CVSS 评分 7.2，危害等级高。攻击者需拥有本地系统访问权限方可利用。"
published = "1990-10-03T04:00:00.000"
remediation = "升级 NeXTSTEP 到 3.0 及以上版本。如无法升级，手动收紧打印机相关目录权限：`chmod 755 /usr/lib/printers && chmod 755 /usr/spool/printers`，并通过 `chmod 700 /usr/etc/npd` 限制 npd 程序仅 root 可执行。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "NeXT NeXTSTEP 本地权限提升漏洞"
updated = "2026-06-16T21:50:20.377"

