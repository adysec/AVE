[basic]
description = "Microsoft Office 等产品中 MSCOMCTL.OCX 控件（Common Controls）的 ListView、TreeView 等 ActiveX 控件存在缓冲区溢出漏洞。远程攻击者可通过诱导用户打开特制的 Office 文档、RTF 文件或访问恶意网页触发该漏洞，导致内存损坏，从而实现远程代码执行。该漏洞影响 Office 2003/2007/2010、SQL Server 2000/2005/2008、Visual Basic 6.0 等多个产品，CVSS 评分 8.8，危害等级高。2012 年 4 月已被在野利用，微软在 MS12-027 安全公告中修复。"
published = "2012-04-10T21:55:01.687"
remediation = "安装 Microsoft 安全公告 MS12-027 对应更新：Office 2003 安装 KB2597112，Office 2007 安装 KB2597113，Office 2010 安装 KB2597114，SQL Server 安装对应版本补丁。临时缓解措施：在注册表中为 MSCOMCTL.OCX 控件设置 Kill Bit（CLSID: {BDD1F04B-858B-11D1-B16A-00C0F0283628}），阻止 ActiveX 在 IE 中运行。"
score = 8.8
severity = "HIGH"
sources = ["kev"]
title = "Microsoft Office MSCOMCTL ActiveX 远程代码执行漏洞"
updated = "2026-06-16T23:36:48.343"

