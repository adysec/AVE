[basic]
description = "SalesLogix eViewer 1.0 中的 slxweb.dll 管理程序存在认证缺失漏洞。远程攻击者无需任何身份验证即可直接访问该管理程序的 URL，触发服务崩溃，导致拒绝服务。该漏洞影响 SalesLogix eViewer 1.0 版本，CVSS 评分 5.0，危害等级中危。攻击者仅需知道目标 URL 路径即可发起攻击，利用门槛较低。"
published = "2000-08-03T04:00:00.000"
remediation = "该产品已停止官方支持，建议立即将 slxweb.dll 管理程序目录通过 Web 服务器访问控制列表限制为仅允许受信任 IP 段访问；如无须远程管理，在 IIS 中移除 slxweb.dll 的脚本映射或直接删除该 DLL 文件以消除攻击面。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "SalesLogix eViewer 1.0 slxweb.dll 拒绝服务漏洞"
updated = "2026-06-16T21:51:22.993"

