[basic]
description = "Microsoft Windows NT 4.0 SP5 之前版本的 SNMP 代理存在内存泄漏漏洞，远程未经身份认证的攻击者可向目标系统发送大量 SNMP 查询请求，导致 SNMP 代理进程内存持续耗尽，最终引发拒绝服务。该漏洞影响 Windows NT 4.0 SP5 之前的所有版本，攻击者无需身份认证即可远程发起攻击，仅需向目标发送大量 SNMP 查询请求即可耗尽系统内存资源导致服务拒绝，CVSS 评分 5.0，属中危拒绝服务漏洞。Microsoft 已在 Windows NT 4.0 SP5 中修复此漏洞，建议升级至 SP5 或更高版本。"
published = "1999-12-31T05:00:00.000"
remediation = "建议升级至 Windows NT 4.0 Service Pack 5 或更高版本以修复 SNMP Agent 内存泄漏漏洞。若无法立即升级，可通过服务管理器禁用 SNMP 服务（snmp.exe）或在防火墙层面阻断 UDP 161 端口作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Microsoft Windows NT 4.0 SNMP Agent 内存泄露拒绝服务漏洞"
updated = "2026-06-16T21:49:06.917"

