[basic]
description = "Solaris 2.6 系统中的 sdtcm_convert 工具在处理临时文件时未正确检查符号链接，本地攻击者可通过创建恶意符号链接诱使 sdtcm_convert 覆盖任意系统文件，导致权限提升或系统文件被破坏。攻击者需要拥有本地账号权限。"
published = "1999-08-09"
remediation = "应用 Sun 官方补丁或升级到 Solaris 7 及以上版本；如无法升级，移除 sdtcm_convert 的 setuid 位并使用 nosuid 挂载选项限制临时目录的符号链接攻击面。"
score = 4.6
severity = "MEDIUM"
sources = ["cve"]
title = "Sun Solaris 2.6 sdtcm_convert 符号链接攻击漏洞"
updated = "2026-06-16"

