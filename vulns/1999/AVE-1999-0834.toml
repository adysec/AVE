[basic]
description = "当Web服务器开启目录浏览功能且目录下不存在index.html等默认首页文件时，攻击者可直接访问目录URL获取完整文件列表。该漏洞影响所有开启目录索引功能的Web服务器，攻击者无需身份认证即可通过直接访问目录URL浏览文件列表，可能导致敏感文件、源代码、配置文件等敏感信息泄露。攻击者只需构造目录URL即可直接访问，无需特殊工具或复杂攻击手法。CVSS评分10.0，危害等级严重。"
published = "1999-01-01"
remediation = "在Apache中编辑httpd.conf或.htaccess，将Options Indexes改为Options -Indexes并重启服务；在Nginx中在location块添加autoindex off；在IIS中取消勾选目录浏览权限。同时确保每个目录存在index.html或index.php等默认首页文件。"
score = 10.0
severity = "CRITICAL"
sources = ["cve"]
title = "Web服务器目录浏览信息泄露漏洞"
updated = "1999-01-01"

