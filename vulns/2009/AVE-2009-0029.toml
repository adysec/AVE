[basic]
description = "该漏洞是由于Microsoft Active Template Library（ATL）组件在处理流式数据时未能正确限制OleLoadFromStream函数的使用而导致的严重漏洞，主要影响 Microsoft Visual Studio .NET 2003 SP1、Visual Studio 2005 SP1和2008 Gold及SP1版本，以及 Visual C++ 2005 SP1和2008 Gold及SP1版本，同时也波及 Windows 2000 SP4、XP SP2和SP3、Server 2003 SP2、Vista Gold、SP1和SP2以及 Server 2008 Gold和SP2 等多个版本。攻击者无需身份验证即可远程向目标系统发送一个包含恶意 ATL 组件或控件的HTML文档，利用该库中存在的处理漏洞，通过精心构造的数据流实现 OleLoadFromStream的调用，从而绕过安全策略并导致远程代码执行。受影响系统在执行恶意网页时极易受到攻击，一旦成功入侵攻击者可以获取完全控制权，该漏洞评估CVSS等级为8.8，威胁等级为高危，攻击者可完全控制受影响系统，对系统的机密性、完整性和可用性均构成严重威胁。微软曾经意识到这个严重漏洞的存在并将其定义为“ATL COM初始化漏洞”，是值得关注的安全事件，攻击者可以通过网络远程控制整台受影响电脑，带来极其严重的后果。"
published = "2009-07-29T17:30:01.233"
remediation = "立即安装 Microsoft 安全公告 MS09-055 提供的安全更新：Windows 2000 SP4 安装 KB969706、Windows XP SP2/SP3 安装 KB973904、Windows Server 2003 SP2 安装 KB973904、Windows Vista/SP1/SP2 安装 KB973904、Windows Server 2008/SP2 安装 KB973904；Visual Studio 2005 SP1 安装 KB973904、Visual Studio 2008 SP1 安装 KB973904、Visual C++ 2005/2008 运行时安装对应安全更新。临时缓解：在 IE 中禁用 ActiveX 控件或通过设置 Kill Bit 禁用易受影响的 ATL 控件（CLSID: {0002E55A-0000-0000-C000-000000000046} 等），并部署网络层 IPS 规则拦截包含恶意 OleLoadFromStream 调用的 HTML 文档流量。"
score = 8.8
severity = "HIGH"
sources = ["tenable"]
title = "Microsoft Visual Studio ATL COM 初始化远程代码执行漏洞"
updated = "2026-06-16T23:09:34.170"

