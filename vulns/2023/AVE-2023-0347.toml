[basic]
description = "MariaDB Server 在 `Item_direct_view_ref::derived_field_transformer_for_where` 函数中存在处理缺陷，当执行包含派生视图引用的特制 SQL 查询时，可触发服务进程崩溃。该漏洞影响 MariaDB Server 10.4 至 11.4 系列的多个版本，攻击者可通过向数据库服务器发送精心构造的查询语句导致拒绝服务。CVSS 评分 4.9，危害等级中等，建议用户升级至已修复版本。"
published = "2025-03-08T23:15:14.527"
remediation = "升级 MariaDB Server 至 10.5.29、10.6.22、10.11.12、11.4.6 或 11.8.2 及以上版本，即可修复该崩溃问题。如无法立即升级，可在会话中设置 `SET SESSION optimizer_switch='condition_pushdown_for_derived=off'` 临时禁用派生表条件下推优化作为缓解措施。"
score = 4.9
severity = "MEDIUM"
sources = ["msrc"]
title = "MariaDB Server 拒绝服务漏洞"
updated = "2026-06-17T06:44:01.340"

