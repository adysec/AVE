[basic]
description = "Microsoft Internet Explorer 8至10版本存在内存破坏漏洞，远程攻击者可通过诱导用户访问特制网站触发该漏洞，成功利用后可实现任意代码执行或拒绝服务。该漏洞源于IE对内存对象处理不当导致越界写入，攻击无需身份认证但需用户交互。Microsoft已在安全更新中修复此漏洞。"
published = "2013-07-10T03:46:10.527"
remediation = "立即安装 Microsoft 安全公告 MS13-055 提供的累积安全更新 2846071，该更新通过修改 Internet Explorer 处理内存中对象的方式修复此漏洞。Windows 用户可通过 Windows Update 自动获取更新，或从 Microsoft 下载中心手动下载安装。由于该漏洞已被 CISA KEV 收录且 Internet Explorer 已停止支持，建议仍在使用 IE 的组织尽快升级到基于 Chromium 的 Microsoft Edge 浏览器，并在过渡期间启用增强安全配置（ESC）限制 IE 访问不可信网站。"
score = 8.8
severity = "HIGH"
sources = ["kev"]
title = "Microsoft Internet Explorer 内存破坏漏洞"
updated = "2026-06-16T23:54:37.740"

