[basic]
description = '''Oracle Web Listener 4.0.x for NT 的 ows-bin 目录下存在批处理文件（Batch files），远程攻击者可通过向目标服务器发送包含特殊字符"'\?&'"的畸形 URL 绕过访问限制，利用该漏洞直接执行任意系统命令。该漏洞影响 Oracle Web Listener 4.0.x 版本，CVSS 评分 7.5，危害等级高，攻击者无需身份认证即可远程利用。'''
published = "2000-03-15T05:00:00.000"
remediation = "建议立即升级至 Oracle HTTP Server 或更高版本，彻底移除 ows-bin 目录下的批处理文件。如无法升级，应在 Web 服务器配置中限制对 /ows-bin/ 路径的访问，仅允许授权 IP 访问，并移除不必要的 .bat/.cmd 文件，同时禁用 URL 中的 '?&' 参数传递执行权限。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "Oracle Web Listener 4.0.x 远程命令执行漏洞"
updated = "2026-06-16T21:51:08.663"

