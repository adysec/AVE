[basic]
description = "Atrium Software Mercur WebView WebMail 1.0 存在缓冲区溢出漏洞。远程攻击者可通过向 WebMail 服务器发送包含超长 mail_user 参数的 GET 请求触发缓冲区溢出，导致服务崩溃，造成拒绝服务。该漏洞影响 WebView WebMail-Client 1.0 版本，攻击条件简单，无需身份认证即可远程利用。"
published = "2000-03-15T05:00:00.000"
remediation = "建议立即升级 Mercur WebView WebMail 至最新版本；若产品已停止维护，应迁移至仍在安全更新范围内的邮件 Web 客户端（如 Roundcube 或 SquirrelMail）。同时，在反向代理层（Nginx/Apache）配置规则，限制 `mail_user` GET 参数长度不超过 256 字符，过滤畸形请求。在 WAF 上添加规则拦截超长 `mail_user` 参数的攻击负载。临时缓解措施：将服务访问限制在可信 IP 段内，减少暴露面。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Atrium Software Mercur WebView WebMail 缓冲区溢出漏洞"
updated = "2026-06-16T21:51:17.810"

