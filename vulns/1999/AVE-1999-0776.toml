[basic]
description = "该漏洞源于系统关键的 NetBIOS/SMB 共享资源配置了不当的访问控制权限。攻击者可在无需身份认证的情况下，通过网络访问暴露的 SMB/NetBIOS 共享，读取或修改其中的敏感数据与系统资源。攻击条件为远程可达且共享权限过于宽松（如允许匿名或 Everyone 完全控制）。成功利用可导致敏感信息泄露与数据被篡改，影响系统机密性与完整性，CVSS v2 评分为 6.4（中危）。"
published = "1999-01-01"
remediation = "检查并收紧所有系统关键 NetBIOS/SMB 共享的访问控制列表，禁止匿名与 Everyone 的写或完全控制权限，仅授予必要用户最小权限；关闭不需要的共享与 guest 账户，限制或禁用不必要的 SMB 服务与 139/445 端口对外开放，并按组织策略定期审计共享权限配置。"
score = 6.4
severity = "MEDIUM"
sources = [
    "cve",
    "epss",
]
title = "系统关键 NetBIOS/SMB 共享访问控制不当漏洞"
updated = "2026-06-16"

