[basic]
description = "Microsoft IIS 4.0 存在输入验证不当漏洞，远程攻击者可通过向目标服务器发送大量包含畸形 HTTP 请求头的洪水式数据包，导致 IIS 服务进程消耗全部系统资源而崩溃，造成拒绝服务。该漏洞影响 IIS 4.0 及 Microsoft Commercial Internet System 2.0/2.5、Site Server Commerce Edition 3.0 等产品，攻击者无需认证即可远程触发，CVSS 评分 5.0，危害等级中危。"
published = "1999-08-11T04:00:00.000"
remediation = "tags.<value>升级到 Microsoft IIS 6.0 或更高版本，并安装最新的安全更新以修复 HTTP 请求头部引发的拒绝服务漏洞。可通过 IIS Manager 配置头部大小限制和请求过滤作为临时缓解措施。"
