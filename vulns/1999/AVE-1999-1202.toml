[basic]
description = "Microsoft Internet Explorer 3.x 至 4.01 版本存在子框架欺骗（Subframe Spoofing）漏洞。该漏洞源于浏览器在渲染网页框架时未能正确校验子框架所加载内容的来源与归属，导致远程攻击者可通过构造恶意网页，将任意恶意内容（如伪造的登录表单、虚假页面元素）插入到另一个可信网站的框架之中。影响范围涵盖使用上述版本 IE 浏览器的用户，攻击条件为受害者需使用存在漏洞的 IE 访问攻击者控制的恶意网页。利用方式为攻击者诱骗用户打开特制 HTML 页面，借助框架嵌套机制在合法站点框架内展示伪造内容，从而实施钓鱼欺骗或误导用户泄露敏感信息。"
published = "1998-12-01T05:00:00.000"
remediation = "访问微软官方安全公告 MS98-020 下载安全补丁，IE 3.x 和 4.0 用户须先升级至 Internet Explorer 4.01 并安装 Service Pack 1，再应用补丁程序以修复子框架欺骗漏洞。"
score = 2.6
severity = "LOW"
sources = ["exploitdb"]
title = "Microsoft Internet Explorer 子框架欺骗漏洞"
updated = "2026-06-16T21:49:13.603"

