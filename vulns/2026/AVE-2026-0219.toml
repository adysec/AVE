[basic]
description = "大华智能物联综合管理平台 ICC 的 /evo-runs/v1.0/ 及 /evo-apigw/admin/ 等接口存在远程代码执行漏洞，攻击者无需认证即可通过向受影响接口发送特制请求触发该漏洞，导致远程代码执行。该漏洞影响大华 ICC 系列产品，攻击者可利用该漏洞完全控制目标服务器，危害严重。建议联系厂商获取安全补丁或临时限制受影响接口仅允许内网管理 IP 访问。"
published = "2026-07-21"
remediation = "联系大华厂商获取官方安全补丁并升级至最新版本；临时缓解措施：在边界防火墙上限制 /evo-runs/v1.0/ 和 /evo-apigw/admin/ 接口仅允许内网管理 IP 访问，部署 WAF 拦截远程代码执行特征 payload，并启用 API 异常调用日志监控加强对 /evo-runs/ 和 /evo-apigw/ 路径的访问审计。"
score = 9.8
severity = "CRITICAL"
sources = ["hwpoc"]
title = "大华智能物联综合管理平台 ICC 多个接口远程代码执行漏洞"
updated = "2026-07-21"

