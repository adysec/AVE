[basic]
description = "IBM Scalable POWERparallel (SP) 2.0 系统的系统数据仓库（SDR）中的 sdrd 守护进程存在未授权文件读取漏洞。远程攻击者无需任何身份认证即可利用 sdrd 服务的权限缺陷，通过向目标发送特制请求读取系统上的任意文件，导致敏感信息泄露。该漏洞影响 IBM SP2 2.0 版本，CVSS 评分 5.0，危害等级中等，已在后续版本中修复。"
published = "1999-12-31T05:00:00.000"
remediation = "升级 IBM SP2 系统软件至不受影响的版本，在 IBM 发布官方补丁前，可在 /etc/hosts.allow 和 /etc/hosts.deny 中限制 sdrd 服务的访问来源，仅允许可信管理节点连接。如无需远程 SDR 访问功能，可在 inetd.conf 中注释 sdrd 服务行并重启 inetd 以彻底禁用该守护进程。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "IBM Scalable POWERparallel SP2 sdrd 远程文件读取漏洞"
updated = "2026-06-16T21:50:32.927"

