[basic]
description = "Red Hat Linux 5.1 系统中 xosview 1.5.1 存在缓冲区溢出漏洞。本地攻击者可通过设置超长的 HOME 环境变量触发 xosview 程序栈溢出，以 root 权限执行任意代码，实现本地权限提升。该漏洞影响 Red Hat Linux 5.1 系统，CVSS 评分 7.2，危害等级高，攻击者需拥有本地 shell 账户方可利用。"
published = "1998-05-28T04:00:00.000"
remediation = "升级 xosview 至 1.5.2 或更高版本，该版本修复了 HOME 环境变量缓冲区溢出问题。由于 Red Hat Linux 5.1 已停止维护，建议迁移至受支持的 RHEL/CentOS 7+ 或等效发行版。临时缓解措施可限制本地用户对 xosview 的 SUID 执行权限。"
score = 7.2
severity = "HIGH"
sources = ["epss"]
title = "Red Hat Linux xosview 本地缓冲区溢出权限提升漏洞"
updated = "2026-06-16T21:50:33.180"

