[basic]
description = "GNU Binutils 的 bfd/vms-alpha.c 文件中 parse_module 函数存在越界读取漏洞。攻击者可利用特制的二进制文件触发该漏洞，导致进程读取越界内存数据，可能造成信息泄露或拒绝服务。该漏洞影响 GNU Binutils 相关版本，CVSS 评分 6.3，危害等级中危。开发者已在后续版本中修复此问题，建议用户升级至安全版本。"
published = "2023-09-14T21:15:10.023"
remediation = "升级 GNU Binutils 至 2.40 及以上版本；Red Hat Enterprise Linux 用户可通过 `yum update binutils` 安装对应安全更新。NetApp 用户应参考 NTAP-20231103-0002 安装厂商补丁。临时缓解措施：避免使用存在漏洞的 binutils 版本处理不可信的 VMS Alpha 二进制文件。"
score = 6.3
severity = "MEDIUM"
sources = ["msrc"]
title = "GNU Binutils bfd/vms-alpha.c parse_module 函数越界读取漏洞"
updated = "2026-06-17T05:41:32.713"

