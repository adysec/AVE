[basic]
description = "SGI IRIX 操作系统 6.5 至 6.5.2 版本中的 nsd（网络服务守护进程）存在信息泄露漏洞。nsd 默认在 UDP 端口上导出一个虚拟文件系统，未经身份认证的远程攻击者可通过挂载该虚拟文件系统，读取目标系统上的任意文件，导致敏感信息泄露，同时可能引发拒绝服务。该漏洞影响 SGI IRIX 6.5、6.5.1 及 6.5.2 版本，CVSS 评分 6.4，危害等级中危。厂商已发布安全更新修复此问题。"
published = "1999-05-31T04:00:00.000"
remediation = "建议升级到 IRIX 6.5.3 或更高版本，该版本已修复 nsd 虚拟文件系统导出漏洞。如无法升级，可在 /etc/inetd.conf 中注释 nsd 服务行并重启 inetd，或在边界防火墙上阻断 nsd 使用的 UDP 端口的入站流量作为临时缓解措施。"
score = 6.4
severity = "MEDIUM"
sources = ["epss"]
title = "SGI IRIX nsd 远程信息泄露漏洞"
updated = "2026-06-16T21:50:32.550"

