[basic]
description = "SGI IRIX 操作系统 6.5 至 6.5.2 版本的 nsd（网络存储守护进程）存在信息泄露漏洞。该服务默认在 UDP 端口上导出一个虚拟文件系统，远程攻击者无需身份认证即可通过挂载该虚拟文件系统，越权读取目标系统上的任意文件，获取敏感信息，同时可能因大量请求导致拒绝服务。该漏洞可被远程利用，攻击复杂度低。"
published = "1999-05-31T04:00:00.000"
remediation = "立即升级 SGI IRIX 至 6.5.3 或更高版本，该版本已修复 nsd 虚拟文件系统远程挂载漏洞。如无法立即升级，在防火墙上限制对目标主机 UDP 1024-1029 端口的入站访问，并禁用 nsd 服务的远程 NFS 导出功能作为临时缓解措施。"
score = 6.4
severity = "MEDIUM"
sources = ["avd"]
title = "SGI IRIX nsd 虚拟文件系统导出远程信息泄露漏洞"
updated = "2026-06-16T21:50:32.550"

