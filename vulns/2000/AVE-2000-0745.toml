[basic]
description = "TopLayer AppSwitch 2500 在处理异常 ICMP 数据包时存在拒绝服务漏洞。远程攻击者无需身份认证即可向目标设备发送特制的畸形 ICMP 报文，导致设备网络服务崩溃或无法正常响应后续请求。该漏洞影响 TopLayer AppSwitch 2500 版本，CVSS 评分 5.0，危害等级中危。目前厂商尚未发布官方补丁，建议通过访问控制列表限制 ICMP 流量以降低风险。"
published = "2000-07-19T04:00:00.000"
remediation = "由于 TopLayer 已被 F5 收购且 AppSwitch 2500 已停止技术支持多年，厂商未提供官方安全补丁。可采取以下缓解措施：(1) 在网络边界防火墙和路由器上配置访问控制规则，丢弃或校验畸形 ICMP 数据包（如限制 ICMP 分片包、过滤非标准 ICMP 类型/代码）；(2) 将设备部署于防火墙后，仅允许必要的 ICMP 流量进入管理接口；(3) 建议尽快升级至现代应用交付控制器以彻底修复。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "TopLayer AppSwitch 2500 ICMP报文拒绝服务漏洞"
updated = "2026-06-16T21:52:07.427"

