[basic]
description = "SGI IRIX 操作系统自带的 Performer API Search Tool 中的 pfdispaly.cgi 脚本存在目录遍历漏洞，远程攻击者无需身份认证即可通过向 CGI 程序发送包含特殊路径序列（如 ../）的恶意 HTTP 请求，突破 Web 根目录限制，读取服务器上任意文件，包括 /etc/passwd 等敏感系统文件。该漏洞影响安装了 performer_tools 组件的 SGI IRIX 系统，CVSS 评分 5.0，危害等级中危。厂商已发布安全公告建议禁用相关 CGI 脚本。"
published = "1998-04-03T05:00:00.000"
remediation = "建议立即升级 SGI Performer API Search Tool 至最新补丁版本，或从 Web 服务器中移除 pfdispaly.cgi 脚本。如无法升级，可在 Web 服务器配置中限制对 pfdispaly.cgi 的访问（如禁用该 CGI 执行权限、限制访问来源 IP），并部署 Web 应用防火墙拦截目录遍历攻击载荷。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "SGI IRIX Performer API Search Tool 目录遍历漏洞"
updated = "2026-06-16T21:48:02.600"

