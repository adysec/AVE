[basic]
description = "Motorola CableRouter 的 Telnet 服务器存在内存泄漏漏洞。远程攻击者可通过向目标设备发送大量 Telnet 连接请求，消耗系统内存资源，导致设备服务响应缓慢或完全拒绝服务。该漏洞影响运行特定固件版本的 Motorola CableRouter 设备，攻击者无需身份认证即可发起攻击，利用难度较低。受影响的设备需通过厂商固件更新进行修复。"
published = "1998-05-10T04:00:00.000"
remediation = "升级 Motorola CableRouter 固件至最新版本；在路由器管理界面中限制 Telnet 服务的来源 IP 地址，仅允许受信任的管理网段访问；如无需远程管理，建议直接禁用 Telnet 服务，改用 SSH 进行安全远程管理；在网络边界防火墙配置规则，阻止对 Telnet 端口（23/TCP）的非授权访问。"
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "Motorola CableRouter Telnet Server 拒绝服务漏洞"
updated = "2026-06-16T21:49:19.777"

