[basic]
description = "SGI IRIX 6.4 系统中的 CGI 处理器程序存在命令注入漏洞，由于未对用户提交的 HTTP 请求参数进行充分过滤，远程攻击者可通过向 cgi-bin 目录下的 CGI 处理程序发送特制请求，在服务器端以 httpd 进程权限执行任意系统命令。该漏洞影响所有运行 SGI IRIX 6.4 操作系统的系统，攻击者无需身份认证即可远程利用，CVSS 评分 7.5，危害等级高。官方已发布安全补丁。"
published = "1997-09-01T04:00:00.000"
remediation = "立即禁用 IRIX 的 cgi-bin handler 功能：删除或重命名 /usr/sbin/cgi-bin 程序，并移除 inetd.conf 中相关 CGI 调用行后重启 inetd 服务。如业务必须使用，升级至 IRIX 6.5 及以上版本并安装 SGI 官方补丁（Patch 1397）。建议迁移至 Linux 等活跃维护的平台，因为 IRIX 已停止安全更新。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = 'Let me analyze the vulnerability: - CVE-1999-0148 - Product: SGI IRIX 6.4 - Vulnerability type: cgi-bin handler - arbitrary command execution (RCE) - This is a remote code execution vulnerability in the CGI handler of SGI IRIX The format should be: "厂商 产品 漏洞类型" (Vendor Product Vulnerability Type) So: "SGI IRIX 6.4 cgi-bin handler 远程命令执行漏洞" Let me think about the best Chinese title: - 厂商: SGI - 产品: IRIX 6.4 - 漏洞类型: 远程命令执行漏洞 (because the handler CGI program allows arbitrary command execution) So: "SGI IRIX 6.4 cgi-bin handler 远程命令执行漏洞" Actually, let me make it cleaner. The cgi-bin handler is a component, so the full title should combine them well. "SGI IRIX 6.4 CGI 处理程序远程命令执行漏洞" This follows the convention: vendor "SGI", product "IRIX 6.4 CGI 处理程序", vulnerability type "远程命令执行漏洞".<SGI IRIX 6.4 CGI 处理程序远程命令执行漏洞>'
