[basic]
description = "SCO UnixWare 2.1、7.0、7.0.1、7.1 及 7.1.1 系统中的 su 程序存在缓冲区溢出漏洞。该程序在处理用户名参数时未对输入长度进行边界校验，本地已登录的普通用户可通过向 su 命令传入超长用户名触发溢出，覆盖栈上返回地址，从而以 root 权限执行任意代码，实现本地提权。攻击需具备目标系统的本地普通用户访问权限，影响上述版本 SCO UnixWare 系统的 su 组件。"
published = "1999-11-25T05:00:00.000"
remediation = "建议立即安装 SCO 官方发布的 UnixWare 安全补丁 rsync/ptf 更新（如 UnixWare 7.1.1 的 ptf 包），或升级至已修复的 UnixWare 7.1.2 及以上版本。如暂无法打补丁，可临时移除 su 程序的 setuid-root 权限（chmod u-s /bin/su）并改用 sudo 进行权限提升，同时限制普通用户登录以缓解本地提权风险。"
score = 7.2
severity = "HIGH"
sources = ["exploitdb"]
