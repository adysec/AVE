[basic]
description = "东胜物流管理系统存在SQL注入漏洞，攻击者可通过向 `/TruckMng/MsWlDriver/GetDataList_Salary` 接口的 `strCwSTARTGID` 参数注入恶意SQL语句，绕过身份认证获取数据库敏感信息。该漏洞影响东胜物流管理系统相关版本，攻击条件低，无需认证即可利用，危害较大。建议厂商对用户输入进行参数化查询过滤。"
published = "0707"
remediation = "联系青岛东胜伟业软件有限公司获取最新安全补丁或升级版本，对 /TruckMng/MsWlDriver/GetDataList_Salary 接口的 condition 和 strCwSTARTGID 参数实施严格的输入过滤与参数化查询，阻止恶意 SQL 语句执行。临时缓解措施可在 WAF/反向代理层配置规则拦截包含 SQL 注入特征（如 UNION、SELECT、'、1=1 等）的请求。"
