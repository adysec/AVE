[basic]
description = "Microsoft Outlook 邮件客户端在处理 RTF（Rich Text Format）格式邮件时，会将发件人计算机的物理路径信息嵌入到 winmail.dat 附件中。远程攻击者可通过向目标用户发送特制的 RTF 格式邮件，当收件人打开该邮件时，winmail.dat 附件会泄露发件人本地的文件系统路径信息。该漏洞属于信息泄露类型，攻击者无需身份认证即可通过网络远程触发，可能导致攻击者获取目标系统的目录结构等敏感信息，为进一步攻击提供线索。"
published = "2000-10-20T04:00:00.000"
remediation = "升级 Microsoft Outlook 至 2000 年 8 月之后的安全更新版本，或安装 Office 2000 Service Release 1/1a (SR-1/SR-1a)。临时缓解措施：在邮件格式设置中将撰写模式改为纯文本而非 RTF 格式，避免 winmail.dat 附件泄露本地路径信息。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Microsoft Outlook 邮件客户端信息泄露漏洞"
updated = "2026-06-16T21:52:24.563"

