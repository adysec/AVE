[basic]
description = "Novell WebServer Examples Toolkit 2 中的 files.pl 脚本存在安全漏洞，远程攻击者可通过发送特制 HTTP 请求利用该脚本读取服务器上的任意文件，导致敏感信息泄露。攻击无需任何身份认证，且攻击复杂度较低，危害较大。"
published = "2002-01-15"
remediation = "建议升级到 Novell WebServer 的最新版本或移除不必要的示例脚本（如 files.pl），限制 Web 目录的访问权限，并配置 Web 服务器禁止执行不必要的 CGI 脚本。"
score = 5.0
severity = "MEDIUM"
