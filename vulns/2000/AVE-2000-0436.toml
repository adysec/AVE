title = "Netscape Communicator SSL 证书验证绕过漏洞"
description = "Netscape Communicator 4.73 之前版本及 Navigator 4.07 存在 SSL 证书验证缺陷，当用户访问恶意服务器时，程序未能正确校验 SSL 证书的有效性，导致攻击者可通过中间人攻击方式将用户从合法网站流量重定向至恶意服务器，从而窃取敏感信息。该漏洞利用条件简单，攻击者只需部署恶意服务器并诱导用户访问即可实施攻击，影响大量使用旧版 Netscape 浏览器的用户。"
severity = "LOW"
score = 3.5
sources = ["redhat", "nvd", "cert"]
published = "2000-05-10"
updated = "2026-06-16"
remediation = "升级 Netscape Communicator 到 4.73 或更高版本，或升级 Navigator 到 4.07 以上版本。如无法升级，建议禁用 SSL 功能或使用其他支持完整证书验证的浏览器替代。如果使用旧版浏览器，请手动验证服务器证书并检查证书警告。"
