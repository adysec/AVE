[basic]
description = "ISC innd 2.2.2 存在远程缓冲区溢出漏洞，远程攻击者可通过向目标新闻服务器发送包含超长消息 ID 的 cancel 请求触发该漏洞，导致任意命令执行。该漏洞影响运行 innd 2.x 版本的 InterNetNews 新闻服务器系统，攻击者无需身份认证即可远程利用，危害严重。受影响系统管理员应尽快升级至修复版本或应用补丁。"
published = "2000-02-06T05:00:00.000"
remediation = "立即升级 ISC innd 至 2.3 或更高版本，该版本已修复 cancel 请求中超长 Message-ID 导致的缓冲区溢出漏洞。Caldera OpenLinux 用户可安装 CSSA-2000-016.0 安全更新。如无法升级，可在 innd.conf 中限制远程 cancel 操作的来源 IP 或禁用远程 cancel 功能作为临时缓解措施。"
score = 3.6
severity = "LOW"
sources = ["epss"]
title = "ISC innd 远程缓冲区溢出漏洞"
updated = "2026-06-16T21:51:48.463"

