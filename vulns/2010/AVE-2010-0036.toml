[basic]
description = "Joomla! 的 Daily Horoscope 组件 1.5.0 版本存在目录遍历漏洞（CWE-22）。远程攻击者可通过向 index.php 的 controller 参数传递 `../` 序列，利用路径遍历读取服务器上的任意文件，如配置文件、敏感数据等。该漏洞无需身份认证，攻击条件简单，危害等级高，影响所有使用该组件的 Joomla! 站点。"
published = "2010-04-19T19:30:00.820"
remediation = "立即卸载或禁用 Daily Horoscope (com_horoscope) 1.5.0 组件，该组件已停止维护且无官方补丁。如业务必须使用，在 Web 服务器层面添加规则拦截 `controller` 参数中的 `../` 序列，或在 Joomla! 全局输入过滤中启用路径遍历字符清理作为临时缓解。"
score = 7.5
severity = "HIGH"
sources = ["nuclei"]
title = "Joomla! Daily Horoscope 组件 本地文件包含漏洞"
updated = "2026-06-16T23:18:27.617"

