[basic]
description = "Microsoft Windows NT 4.0 及 Windows 2000 系统的 NetBIOS 名称服务器（NBNS）协议未对通信数据包进行身份认证，远程攻击者可通过向目标系统发送伪造的 Name Conflict（名称冲突）或 Name Release（名称释放）数据报，导致目标系统 NetBIOS 名称服务崩溃或拒绝服务。该漏洞影响 Windows NT 4.0 及 Windows 2000 系统，CVSS 评分 5.0，危害等级中等。攻击者无需认证即可在局域网内实施攻击，利用门槛较低。"
published = "2000-07-27"
remediation = '安装微软 MS00-047 安全补丁（Windows 2000 补丁 KB269239，Windows NT 4.0 补丁见微软公告）；在注册表 HKEY_LOCAL_MACHINE\SYSTEM\CurrentControlSet\Services\NetBT\Parameters 下设置 NoNameReleaseOnDemand=1 拒绝名称释放请求；在防火墙阻断 UDP 137-138 和 TCP 139 端口外部访问；Windows 2000 中可使用 IPSec 策略对 137-139 端口通信进行身份认证，防止 NBNS 欺骗攻击。'
score = 5.0
severity = "MEDIUM"
sources = ["cve"]
title = "Microsoft Windows NT 4.0/2000 NetBIOS Name Server 拒绝服务漏洞"
updated = "2000-07-27"

