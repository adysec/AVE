[basic]
description = 'Solaris 7.0 的 useradd 命令在处理 "-e" 参数指定的账户过期日期时，未能正确解析特定日期格式，导致账户过期后仍允许用户登录。该漏洞影响 Solaris 7.0 系统，攻击者需拥有有效账户且账户已过期，通过设置特定日期格式绕过过期限制继续登录系统，CVSS 评分 4.6，属于中等严重程度的权限绕过漏洞。'
published = "1999-06-10T04:00:00.000"
remediation = "升级 Solaris 至 7.0 补丁 106327-01 或更高版本（Solaris 7 推荐补丁簇），或升级至 Solaris 8 及以上版本。若无法立即升级，可编辑 /etc/default/useradd 设置 INACTIVE=0 禁用账户过期功能，或通过 /etc/shadow 手动锁定过期账户（passwd -l 用户名）作为临时缓解措施。"
score = 4.6
severity = "MEDIUM"
sources = ["avd"]
title = "Oracle Solaris useradd 账户过期日期校验绕过漏洞"
updated = "2026-06-16T21:49:32.613"

