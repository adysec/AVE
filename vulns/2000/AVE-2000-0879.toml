[basic]
description = "xpdf PDF 查看器客户端 0.91 之前版本在处理 PDF 文档中嵌入的 URL 时，未对 URL 中的 shell 元字符进行正确过滤和转义，导致在调用系统浏览器打开 URL 时执行了恶意命令。攻击者可通过构造包含特殊字符的恶意 PDF 文件，诱使用户打开后触发命令执行。该漏洞影响 xpdf 0.91 之前所有版本，CVSS 评分 7.6，危害等级高。"
published = "2000-10-20T04:00:00.000"
remediation = "立即升级 xpdf 至 0.91 及以上版本，该版本修复了内嵌 URL 的 shell 元字符过滤问题。对于 Debian/Red Hat/Caldera 等发行版用户，请安装对应厂商提供的安全更新补丁。如无法立即升级，可通过禁用 xpdf 内嵌 URL 自动启动浏览器的功能（移除或注释相关配置项）作为临时缓解措施。"
score = 7.6
severity = "HIGH"
sources = ["redhat"]
title = 'Let me analyze the vulnerability: - CVE-2000-0727 - Product: xpdf PDF viewer (client) - Version: earlier than 0.91 - Issue: Does not properly launch a web browser for embedded URLs, allowing arbitrary command execution via shell metacharacters in URLs - Type: Code execution (命令执行) - AVD description: xpdf 代码执行漏洞 So the title should be: "xpdf PDF Viewer 远程代码执行漏洞" Let me verify: - 厂商: xpdf (or the project that makes xpdf) - 产品: PDF Viewer - 漏洞类型: 远程代码执行漏洞 Actually, looking more carefully, the vendor is "xpdf" (or the xpdf project). The product is "PDF Viewer" (xpdf). The vulnerability type is "代码执行漏洞" (code execution via shell metacharacters). Let me think about this more carefully: - Vendor: xpdf - Product: xpdf / PDF Viewer - Type: 远程代码执行漏洞 (remote code execution, since it involves embedded URLs and shell metacharacters) A good title would be: "xpdf PDF Viewer 远程代码执行漏洞" Wait, xpdf is both the vendor and product name. Let me keep it simple and accurate. "xpdf'
updated = "2026-06-16T21:52:21.320"

