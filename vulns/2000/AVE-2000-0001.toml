[basic]
description = "Microsoft FrontPage Server Extensions 中存在信息泄露漏洞，远程攻击者可通过向 `/_vti_bin/` 虚拟目录下的 `shtml.dll` 发送特制的 RPC POST 请求，获取服务器上匿名账户的名称。攻击者无需身份认证即可远程利用，获取的信息可用于进一步的社会工程学攻击或系统渗透。该漏洞影响运行 FrontPage Server Extensions 的多种 Windows 平台，CVSS 评分 5.0，危害等级中危。"
published = "2000-02-02T05:00:00.000"
remediation = "立即卸载 FrontPage Server Extensions（FPSE）组件，该产品已停止维护，继续使用存在信息泄露风险。如业务必须保留，在 IIS 管理器中删除 /_vti_bin/ 虚拟目录的匿名访问权限，仅允许经过身份验证的用户访问，并使用 URLScan 工具过滤对 shtml.dll 的 RPC POST 请求。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Microsoft FrontPage Server Extensions 匿名账户名称信息泄露漏洞"
updated = "2026-06-16T21:51:01.787"

