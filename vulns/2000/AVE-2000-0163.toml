[id]
ave_id = "AVE-2000-0163"
aliases = ["CVE-2000-0185"]
[basic]
title = "RealMedia RealServer 内部IP地址泄露漏洞"
description = "RealMedia RealServer 在处理网络请求时存在信息泄露漏洞，即使配置为隐藏真实IP地址，攻击者仍可通过特定请求获取RealServer的真实内部IP地址。该漏洞允许远程攻击者绕过网络拓扑隐藏机制，获取服务器真实位置信息，为进一步攻击提供侦察基础。攻击者无需认证即可利用此漏洞。"
severity = "MEDIUM"
score = 5.0
sources = ["cve"]
published = "2000-03-08"
updated = "2026-06-16"
remediation = "升级到 RealServer 最新版本，或配置防火墙规则限制对 RealServer 管理接口和流媒体端口的访问，避免直接暴露在公网。同时建议在网络层实施 NAT 和反向代理以隐藏内部网络拓扑。"
[references]
urls = ["http://archives.neohapsis.com/archives/bugtraq/2000-03/0069.html", "http://www.securityfocus.com/bid/1049"]
