[basic]
description = "Microsoft IIS 4.0 和 5.0 的 FTP 服务存在拒绝服务漏洞，MS00-060 安全补丁引入了一个错误，导致攻击者可通过向目标 IIS 服务器的 FTP 服务发送特制的畸形请求，触发服务进程崩溃或资源耗尽，造成拒绝服务。该漏洞影响运行 IIS 4.0 和 5.0 的 Windows 系统，攻击者无需身份认证即可远程利用，CVSS 评分 5.0，危害等级中等。Microsoft 已在 MS01-026 安全公告中发布修复更新。"
published = "2001-06-27T04:00:00.000"
remediation = "安装 Microsoft 安全公告 MS01-026 对应补丁（适用于 IIS 4.0/5.0），或升级至 Windows Server 2003 及以上版本。如无需 FTP 服务，可在 Internet 信息服务管理器中停止默认 FTP 站点并禁用该服务作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Microsoft IIS 4.0/5.0 FTP 拒绝服务漏洞"
updated = "2026-06-16T21:54:07.413"

