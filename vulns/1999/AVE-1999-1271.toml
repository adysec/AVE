[basic]
description = "HP JetAdmin D.01.09 for Solaris 存在符号链接漏洞。当程序以特权权限运行时，本地攻击者可通过在 /tmp/jetadmin.log 日志文件上创建符号链接，指向系统任意文件，从而在清理日志时覆盖或修改目标文件的权限，导致本地权限提升。该漏洞利用简单，无需身份认证即可发起攻击。"
published = "1998-07-15"
remediation = "修改 /opt/hpnp/admin/jetadmin 脚本，在创建日志文件前使用 test -h 检测符号链接防止跟随；或将日志目录改为非世界可写的安全路径（如 /var/log/hpnp/）；还可移除 jetadmin 脚本的 setuid/setgid 权限位，避免低权限用户利用该漏洞进行提权攻击。如无需使用 HP JetAdmin 服务，建议直接卸载该软件。"
score = 7.2
severity = "HIGH"
sources = ["cve"]
title = "HP JetAdmin 符号链接漏洞"
updated = "2026-06-16"

