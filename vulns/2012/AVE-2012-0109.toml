[basic]
description = "Microsoft Visual Basic for Applications (VBA) 的 VBE6.dll 组件存在不可信搜索路径漏洞（CWE-426）。当用户通过 Microsoft Office 2003 SP3、2007 SP2/SP3、2010 Gold/SP1 等受影响版本打开包含恶意 DLL 文件的目录中的 .docx 文档时，VBE6.dll 会优先从当前工作目录而非系统路径加载库文件。本地攻击者可将特制木马 DLL 放置在包含 Office 文档的目录中，诱使用户打开该文档即可触发 DLL 劫持，从而在用户权限上下文中执行任意代码。该漏洞在 2012 年 7 月已被野外利用，CVSS 评分 7.8，危害等级高。"
published = "2012-07-10T21:55:05.587"
remediation = "立即安装 Microsoft 安全公告 MS12-046 提供的更新：Office 2003 SP3 安装 KB2687626，Office 2007 SP2/SP3 安装 KB2596744，Office 2010/SP1 安装 KB2598243 和 KB2553447，VBA 运行时安装 KB2688865。可通过 Windows Update 自动获取或从 Microsoft 下载中心手动安装。临时缓解措施：禁用 WebClient 服务，在防火墙层面阻止 TCP 139/445 端口，或使用 KB2264107 工具禁用从远程网络共享加载库。"
score = 7.8
severity = "HIGH"
sources = ["kev"]
title = "Microsoft Visual Basic for Applications 不安全库加载权限提升漏洞"
updated = "2026-06-16T23:40:25.993"

