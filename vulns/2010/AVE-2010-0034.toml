[basic]
description = "Joomla! 的 Web TV 组件（com_webtv）1.0 版本存在目录遍历漏洞，由于程序对 index.php 中 controller 参数未做充分的路径过滤，远程攻击者可通过构造包含 ..（点点）的恶意路径序列绕过限制，读取服务器上的任意文件。该漏洞影响使用此组件的 Joomla! 网站，攻击无需身份认证，仅需发送特制 HTTP 请求即可触发，CVSS 评分 7.5，危害等级高，可能导致敏感信息泄露等严重后果。"
published = "2010-04-19T19:30:00.743"
remediation = '立即卸载 Joomla! 组件 com_webtv 1.0，该组件已停止维护且无官方补丁。如必须使用，在 index.php 入口文件添加 `$controller = basename($controller);` 过滤路径遍历，或在 .htaccess 中禁用 `controller` 参数的点号传值：`RewriteCond %{QUERY_STRING} controller=\.\./ [NC]` 并返回 403。'
score = 7.5
severity = "HIGH"
sources = ["nuclei"]
title = "Joomla! Web TV 组件本地文件包含漏洞"
updated = "2026-06-16T23:18:27.400"

