[basic]
description = "Apache Tomcat 3.1 存在路径泄露漏洞，当远程攻击者请求一个不存在的 URL 时，系统返回的错误消息中包含服务器物理路径信息。攻击者无需认证即可利用此漏洞获取敏感信息，为后续攻击提供基础。该漏洞影响运行在 Apache 服务器上的 Tomcat 3.1 版本，CVSS 评分 6.4，危害等级中危。"
published = "2000-10-20T04:00:00.000"
remediation = "建议升级至 Apache Tomcat 3.2 及以上版本，该版本已修复路径泄露问题。如无法升级，可在 web.xml 中配置自定义 404 错误页面，将 &lt;error-page&gt;&lt;error-code&gt;404&lt;/error-code&gt;&lt;location&gt;/custom-error.html&lt;/location&gt;&lt;/error-page&gt; 加入配置，防止物理路径在错误信息中泄露。同时关闭 Tomcat 的目录浏览功能（在 web.xml 中设置 listings 参数为 false）。"
score = 6.4
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Apache Tomcat 3.1 路径信息泄露漏洞"
updated = "2026-06-16T21:52:25.317"

