[basic]
description = "佳能多款激光打印机（imageCLASS MF654Cdw、MF650C系列、LBP630C系列等）的字体解析组件在处理特制 TrueType/XPS 字体时存在越界写入漏洞，网络相邻且未经认证的攻击者可通过向受影响设备发送精心构造的字体数据触发内存破坏，导致远程代码执行或设备完全无响应。由于打印机作为内网设备常驻运行且缺乏有效访问控制，攻击面较广。该漏洞源于固件对字体程序（fpgm）数据长度校验不当，导致缓冲区溢出。CVSS 评分为 9.8，危害等级严重，已在 Pwn2Own 大赛中公开演示，厂商已发布固件更新修复。"
published = "2026-01-16T00:16:27.933"
remediation = "立即将受影响设备固件升级至 v06.03 或更高版本。日本地区 Satera LBP670C/MF750C 系列、美国地区 Color imageCLASS LBP630C/MF650C 系列、欧洲地区 i-SENSYS LBP630C/MF650C 系列等所有型号均可通过 Canon 官方支持网站下载最新固件。同时，禁止将打印机直接暴露在公网，务必通过防火墙或路由器使用私有 IP 地址接入内部网络，并在防火墙上限制对打印机 9100/TCP（Raw IPP）、515/TCP（LPD）等端口的非授权访问作为临时缓解措施。"
score = 9.3
severity = "CRITICAL"
sources = ["zdi"]
title = "Canon 多款激光打印机 XPS字体fpgm数据处理缓冲区溢出远程代码执行漏洞"
updated = "2026-06-17T08:35:35.277"

