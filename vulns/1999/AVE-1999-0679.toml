[basic]
description = "Oracle 8i Intelligent Agent 中的 dbsnmp 组件存在本地权限提升漏洞。攻击者可通过设置 ORACLE_HOME 环境变量，使 dbsnmp 进程在查找 nmiconf.tcl 脚本时加载攻击者指定的恶意路径，从而获得系统更高权限。该漏洞影响 Oracle 8 和 8.1.5 版本，攻击者需要具备本地登录系统权限后才能利用此漏洞进行提权攻击，CVSS 评分为 4.6，危害等级为中等。"
published = "1999-08-16T04:00:00.000"
remediation = "建议将 Oracle 8.1.5 升级至 Oracle 8.1.7 或更高版本，以修复 Intelligent Agent 中 dbsnmp 因信任 ORACLE_HOME 环境变量导致的本地权限提升漏洞。如短期内无法升级，可临时修改 dbsnmp 脚本，将 nmiconf.tcl 的路径写死为绝对路径，避免通过环境变量查找；同时限制数据库服务器上的本地用户访问权限，仅授予必要的操作系统账户，减少本地攻击面。"
score = 4.6
severity = "MEDIUM"
sources = ["avd"]
