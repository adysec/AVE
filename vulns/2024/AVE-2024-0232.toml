[basic]
description = "Panabit Panalog 的 /Maintain/sprog_upstatus.php 接口存在 SQL 注入漏洞。攻击者可通过构造特制的 GET 请求，在 status 或 id 参数中注入恶意 SQL 语句，利用 updatexml 函数进行报错注入，从而获取数据库中的敏感信息。该漏洞无需身份认证即可远程利用，攻击成本低，危害较大。"
published = "2024-01-01"
remediation = "升级 Panabit Panalog 至最新版本，对 /Maintain/sprog_upstatus.php 接口的 status 和 id 参数进行严格的输入过滤和参数化查询处理，避免直接拼接 SQL 语句。"
score = 5.0
severity = "MEDIUM"
sources = ["hwpoc"]
title = "Panabit Panalog /Maintain/sprog_upstatus.php SQL注入漏洞"
updated = "2024-01-01"

