[basic]
description = "phpPgAdmin 4.2.1 及之前版本的 libraries/lib.inc.php 文件中存在目录遍历漏洞。当 PHP 环境的 register_globals 选项启用时，远程攻击者可通过向 index.php 的 _language 参数传递包含 ../ 的恶意路径，绕过目录限制读取服务器上的任意文件，导致数据库配置文件、系统凭证等敏感信息泄露。攻击无需认证，利用难度较低。"
published = "2008-12-16T19:07:31.843"
remediation = "升级 phpPgAdmin 至 4.2.1-1.1 及以上版本（Debian  unstable 对应 4.2.1-1.1，Debian Etch 对应 4.0.1-3.1etch1）。同时在 php.ini 中将 `register_globals` 设为 Off（PHP 5.3+ 已废弃该选项，PHP 5.4+ 已移除），并确保 `_language` 参数经过白名单校验，禁止包含 `../` 等路径遍历字符。如无法立即升级，可在 Web 服务器层面（如 Apache mod_rewrite）拦截包含 `_language=../` 的请求作为临时缓解。"
score = 4.3
severity = "MEDIUM"
sources = ["nuclei"]
title = "phpPgAdmin 4.2.1 `_language` 参数目录遍历漏洞"
updated = "2026-06-16T23:00:37.567"

