[basic]
description = "大华 ICC 集成指挥中心的 `/evo-runs/v1.0/receive` 接口存在远程代码执行漏洞。攻击者可通过向该接口发送特制的 JSON 数据包，利用 `agent.ossm.mapping.config` 方法中的参数注入恶意命令，从而在目标服务器上远程执行任意代码。该漏洞允许未经身份认证的攻击者完全控制受影响的大华 ICC 系统，可能导致敏感信息泄露、系统瘫痪或被用于后续攻击。建议用户联系厂商获取安全更新以修复此漏洞。"
published = "0711"
remediation = "建议立即将大华 ICC 升级至厂商发布的最新安全版本（v2024.12 及以上），该版本已修复 `/evo-runs/v1.0/receive` 接口的远程命令执行漏洞。如无法立即升级，可采取以下临时缓解措施：1）在防火墙或 WAF 上配置规则，拦截对 `/evo-runs/v1.0/receive` 路径的 POST 请求；2）将 ICC 管理端口限制为仅允许受信任管理 IP 访问，避免暴露在公网；3）禁用不必要的 agent.ossm.mapping.config 功能模块。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "大华 ICC /evo-runs/v1.0/receive 接口远程代码执行漏洞"
updated = "0711"

