[info]
author = "AVE"
description = "验证 Internet Explorer 4.x/5.x 的 Image Source Redirect 跨域文件读取漏洞。远程攻击者可通过构造恶意 HTML 页面，使用 img 标签的 src 属性指向 file:// 协议，诱导目标 IE 访问后绕过安全域限制读取客户端本地文件。"
id = "POC-AVE-2000-0140"
name = "CVE-2000-0156 PoC"
severity = "medium"
tags = ["cve-2000-0156"]
vuln_id = [
    "CVE-2000-0156",
    "AVE-2000-0140",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/poc.html"
protocol = "http"

[poc.requests.body]
content = ""
type = "raw"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "Image Source Redirect",
    "file:///c:/",
]
