[basic]
description = "xsoldier 0.96 程序存在本地缓冲区溢出漏洞，本地攻击者可通过向程序传递超长参数触发缓冲区溢出，从而获取 root 权限。该漏洞影响 RedHat 6.2 系统上运行的 xsoldier 0.96 版本，攻击者需拥有本地系统访问权限方可利用，成功利用后可完全控制目标系统。"
published = "2000-05-17T04:00:00.000"
remediation = "升级 xsoldier 至 0.96 以上版本，或从 Red Hat 官方渠道获取安全补丁。如无法升级，可移除 xsoldier 二进制文件的 setuid 权限位（chmod u-s /usr/bin/xsoldier）作为临时缓解措施，限制本地普通用户提权至 root 的攻击路径。"
score = 7.2
severity = "HIGH"
sources = ["exploitdb"]
title = "xsoldier 0.96 本地缓冲区溢出提权漏洞"
updated = "2026-06-16T21:49:30.753"

