[basic]
description = "Microsoft Network Monitor (Netmon) 的 HTTP 协议解析器存在缓冲区溢出漏洞，远程未经身份验证的攻击者可通过发送畸形 HTTP 数据包触发缓冲区溢出，进而在目标系统上以当前用户权限执行任意代码。该漏洞影响 Microsoft Network Monitor 相关版本，攻击向量为网络远程利用，无需身份验证，攻击复杂度低，CVSS 评分 7.5（HIGH），可导致系统机密性、完整性和可用性部分受损。Microsoft 已发布安全补丁修复该漏洞，建议用户尽快升级至修复版本。"
published = "2000-12-19T05:00:00.000"
remediation = "立即停用 Microsoft Network Monitor（Netmon），因为该工具已停止维护且存在安全漏洞。如果必须继续使用，请通过 Microsoft 官方安全更新确保已安装所有 2001 年后发布的 Netmon 更新补丁，并且仅在局域网内通过 IPsec 加密访问，避免互联网直接暴露。另外，建议将网络监控功能迁移到当前支持的 Wireshark 或 Microsoft Message Analyzer等现代工具，并彻底删除不再需要的 Netmon组件以彻底消除漏洞风险。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "微软 网络监视器 缓冲区溢出代码执行漏洞"
updated = "2026-06-16T21:52:32.303"

