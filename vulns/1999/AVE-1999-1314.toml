[basic]
description = "Classifieds.cgi 是 Greg Matthews 开发的 1.0 版本分类广告 CGI 脚本，存在命令注入漏洞。该程序在处理用户提交的 CGI 表单时，未对名为隐藏变量（hidden variable）的字段进行任何输入过滤与校验，导致远程攻击者可在该隐藏变量中直接嵌入任意系统命令。由于该脚本以目标 Web 服务器的权限运行，未认证攻击者只需构造特制的 HTTP 表单请求并发送至受影响站点，即可在服务器端执行任意命令，进而读取、篡改或删除文件，甚至完全控制服务器。其影响范围为部署了 Classifieds.cgi 1.0 的 Web 服务器，攻击条件仅需网络可达目标且能提交表单，无需身份认证，危害极大（CVSS 10.0）。"
published = "1999-12-15T05:00:00.000"
remediation = "建议立即移除或禁用 Greg Matthews Classifieds.cgi 1.0 脚本，或升级到修复版本（若官方有发布修复版）。临时缓解措施：在 Web 服务器配置中禁用 CGI 执行权限，或通过 Web 应用防火墙（WAF）拦截包含命令注入特征的隐藏变量参数，同时限制 CGI 脚本执行权限为最小权限用户。"
score = 10
severity = "CRITICAL"
sources = ["exploitdb"]
