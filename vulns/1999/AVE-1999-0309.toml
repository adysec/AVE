description = "Microsoft Internet Explorer 4.01 和 5.0 的导入/导出收藏夹功能（ImportExportFavorites 方法）存在代码注入漏洞。远程攻击者可通过诱导用户访问恶意网页，绕过该方法的文件类型和路径限制，在用户系统上写入可执行文件并执行任意命令。攻击者无需身份认证即可远程触发，用户仅需打开包含恶意内容的网页即可中招，导致系统完全失陷。CVSS v2.0 评分 10.0，属于严重级别。"
