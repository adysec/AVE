[basic]
description = "ITHouse Mail Server 1.04 存在缓冲区溢出漏洞，远程攻击者可通过向 SMTP 服务发送超长的 RCPT TO 命令触发栈溢出，导致任意代码执行。该漏洞影响 ITHouse Mail Server 1.04 版本，无需身份认证即可远程利用，CVSS 评分 10.0，危害等级严重。建议升级至最新版本或限制 SMTP 服务访问来源。"
published = "2000-05-30T04:00:00.000"
remediation = "ITHouse mail server 1.04 已停止维护且无安全更新，建议立即停止使用该邮件服务器，迁移至仍受支持的邮件服务器软件（如 Postfix、Exim、Microsoft Exchange 等）。在迁移完成前，可在网络边界防火墙配置规则，仅允许受信 IP 访问 SMTP 端口（25/TCP），并部署入侵防御系统（IPS）检测 SMTP 协议中过长 RCPT TO 命令的攻击特征以临时缓解风险。"
score = 10
severity = "CRITICAL"
sources = ["cve"]
title = "ITHouse Mail Server 缓冲区溢出远程代码执行漏洞"
updated = "2026-06-16T21:51:50.513"

