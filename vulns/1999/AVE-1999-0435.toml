[basic]
description = "Qmail 1.01 的 SMTP 组件在处理超长命令时存在拒绝服务漏洞。远程攻击者无需认证即可向目标服务器的 25 端口发送特制长 SMTP 命令，导致 qmail-smtpd 进程崩溃或异常终止，从而中断邮件服务。该漏洞影响 Dan Bernstein Qmail 1.01 版本，攻击复杂度低，且无需任何权限，可被用于阻断正常邮件收发功能。"
published = "1997-07-01T04:00:00.000"
remediation = "立即升级至 Qmail 1.03 或更高版本，或在编译时添加 qmail-smtpd.c 中对输入行长度（LINE_MAX）的显式检查。如不便升级，可在 SMTP 服务前端部署流量过滤规则，限制单行 SMTP 命令长度不超过 512 字节。长期建议迁移至 Netqmail 补丁集（netqmail 1.06）以获得持续维护。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "Dan Bernstein Qmail SMTP 命令处理拒绝服务漏洞"
updated = "2026-06-16T21:48:00.120"

