[basic]
description = "Microsoft Internet Explorer 5 存在安全区域设置延迟漏洞。当浏览器加载文档时，系统在文档完全加载完成前未能正确应用安全区域限制，导致远程攻击者可通过诱导用户访问恶意网页，在文档加载过程中以不同的安全上下文执行 JavaScript 脚本，从而绕过 IE 的安全区域隔离机制。该漏洞影响 Internet Explorer 4.0、4.0.1、5.0、5.0.1 及 5.5 Preview 版本，CVSS v2.0 评分为 10.0，可导致信息泄露、权限提升等严重后果。"
published = "2000-01-07T05:00:00.000"
remediation = "升级 Internet Explorer 至 6.0 及以上版本（IE 6.0 于 2001 年发布，已修复该时间窗口问题）。鉴于当前 IE 已停止支持，建议迁移至 Microsoft Edge 或基于 Chromium 的现代浏览器，同时在环境中禁用 IE 兼容模式及 ActiveX 以彻底规避风险。"
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "Microsoft Internet Explorer 安全区域设置延迟漏洞"
updated = "2026-06-16T21:50:55.253"

