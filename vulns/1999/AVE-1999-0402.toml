[basic]
description = "SGI IRIX 3/4/5/6 及 OpenLinux 1.0/1.1 系统中的 routed（路由守护进程）存在文件任意追加漏洞。攻击者可通过利用 routed 的 traceon 调试跟踪功能，将任意数据追加到系统文件中，可能导致敏感配置被覆盖、权限提升或系统被进一步控制。该漏洞影响 IRIX 及 OpenLinux 多个历史版本，CVSS 评分 6.4，危害等级中危。厂商未发布官方补丁，建议禁用 routed 服务或限制其访问权限。"
published = "1998-10-26T05:00:00.000"
remediation = "禁用 routed 守护进程（/etc/init.d/routed stop），或使用防火墙规则限制 UDP 端口 520 的入站流量，仅允许可信来源的 RIP 报文。对于 SGI IRIX，升级到包含 routed 补丁的最新维护版本；对于 OpenLinux，升级到 1.1 以上版本或使用兼容的 gated/quagga 替代 routed 服务。"
score = 6.4
severity = "MEDIUM"
sources = ["epss"]
title = "SGI IRIX 及 Caldera OpenLinux routed 守护进程文件追加漏洞"
updated = "2026-06-16T21:47:55.790"

