[basic]
description = "Microsoft Java 虚拟机（Microsoft JVM）存在沙箱逃逸漏洞。恶意 Java 小程序（applet）可利用该虚拟机的实现缺陷，绕过安全沙箱的限制，在用户浏览器加载该 applet 时于宿主机上执行任意系统命令。攻击者在网页中嵌入特制 applet 并诱导受害者访问即可触发，无需身份认证。该漏洞影响安装了 Microsoft JVM 的 Windows 系统（如 IE 浏览器环境），可导致远程代码执行，危害严重，CVSS 评分 9.3。"
published = "1999-10-21T04:00:00.000"
remediation = 'Microsoft Java Virtual Machine 已停止支持且不再提供更新，建议立即卸载 Microsoft VM 组件，迁移至受支持的 Java 运行时环境（如 Oracle Java 或 OpenJDK）。在浏览器中禁用 Java applet 执行功能，通过组策略或注册表禁止 Microsoft VM 的 javasrc.dll 加载。对于仍使用 Internet Explorer 的环境，在 Internet 选项→安全→自定义级别中将"Java 权限"设为"禁用"。'
score = 9.3
severity = "CRITICAL"
sources = ["epss"]
