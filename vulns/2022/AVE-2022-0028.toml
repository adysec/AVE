[basic]
description = "Linux 内核 DRM/DP 驱动的 drm_dp_get_adjust_request_post_cursor 函数中，link_status 数组长度不足（仅 6 字节），但在处理 Post Cursor2 寄存器调整请求时尝试访问越界下标（下标 10），导致越界读取（OOB Read）漏洞。本地攻击者可通过触发 DisplayPort 协商过程利用该漏洞读取内核内存敏感信息，影响使用 Linux 内核的各类系统。该漏洞由 -Warray-bounds 编译时发现，CVSS 评分 7.1，危害等级高。"
published = "2025-02-26T07:00:58.890"
remediation = "建议升级 Linux 内核至 5.17.2 及以上版本（5.17 稳定版已包含修复提交 aeaed9a9fe69）或 5.18 及以上版本（主线修复提交 a2151490cc6c），或 cherry-pick 上述提交到当前内核。该漏洞由 drm_dp_get_adjust_request_post_cursor 函数中 link_status 数组空间不足导致在处理 Post Cursor2 寄存器时发生越界读取，修复已移除该辅助函数并改用内联方式读取解码。如无法立即升级内核，可在 BIOS 层面禁用受影响硬件的 DisplayPort 输出作为临时缓解措施。"
score = 7.1
severity = "HIGH"
sources = ["msrc"]
title = "Linux 内核 DRM/DP 越界读取漏洞"
updated = "2026-06-17T05:17:25.153"

