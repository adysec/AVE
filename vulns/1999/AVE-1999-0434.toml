[basic]
description = "Windows NT 系统中的远程 Shell 服务 (RSHSVC) 存在未经身份认证即可利用的远程命令执行漏洞。攻击者可通过 RSH 协议直接连接目标主机的 514 端口，无需提供有效凭据即可在目标系统上以系统权限执行任意命令。该漏洞影响 Windows NT 4.0 及早期 Windows 2000 版本，由于服务默认监听且缺乏认证机制，在网络可达条件下极易被远程利用。"
published = "1997-01-01T05:00:00.000"
remediation = "立即安装 Windows NT 4.0 Service Pack 6a 或 Windows 2000 Service Pack 4，这两个 SP 已包含该漏洞的补丁。鉴于系统已停止支持，建议升级到 Windows Server 2012 及以上版本。临时缓解措施：禁用 RSHSVC 服务（`net stop rshsvc`），或在防火墙层面阻止入站 TCP 514 端口。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "Microsoft Windows NT RSHSVC 远程代码执行漏洞"
updated = "2026-06-16T21:47:59.987"

