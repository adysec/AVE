[basic]
description = "该漏洞存在于 Juergen Schoenwaelder 开发的 scotty 2.1.x 协议监测工具中，其 ntping 子功能在处理用户输入的主机名时存在缓冲区溢出漏洞。当攻击者向 ntping 提供异常长的主机名作为命令行参数时，程序分配的缓冲区将不足以存储输入数据，导致栈缓冲区溢出。攻击者可以利用这一溢出overwrite返回地址，栽入shellcode并执行任意代码，实现在目标主机上的本地权限提升和代码执行。该漏洞影响 scotty 2.1.0 及更早版本用户，攻击者无需身份验证，只需提供精心构造的长主机名即可触发漏洞。尽管 CVSS 评分显示其攻击复杂性较低，但一旦触发则会导致完全 compromise，安全影响等级为 HIGH 级别的严重问题。微软/项目维护者已发布安全补丁，建议用户升级到 scotty 2.1.1 及以上版本以修复此漏洞。"
published = "2001-10-18T04:00:00.000"
remediation = "建议升级 scotty 到 2.1.1 或更高版本（已修复 ntping 缓冲区溢出），或从源码重新编译并启用栈保护（-fstack-protector）。若无法升级，建议删除或限制 ntping 二进制文件执行权限（chmod 700 /usr/bin/ntping），仅允许 root 执行，并限制本地用户登录权限作为临时缓解。"
score = 7.2
severity = "HIGH"
sources = ["exploitdb"]
title = "Juergen Schoenwaelder scotty ntping 缓冲区溢出漏洞"
updated = "2026-06-16T21:54:54.847"

