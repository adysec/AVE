[basic]
description = "Microsoft IIS 4.0 和 5.0 的 FrontPage 服务器扩展组件中的 shtml.exe 程序存在信息泄露漏洞。远程攻击者通过请求不存在的 HTML、HTM、ASP 或 SHTML 文件，服务器返回的错误消息会泄露目标文件的完整物理路径。该漏洞可被攻击者用于收集系统信息，为进一步攻击提供基础，影响运行 IIS 4.0/5.0 的 Windows 服务器系统。"
published = "2000-05-06T04:00:00.000"
remediation = "安装 Microsoft Security Bulletin MS00-015 提供的安全更新，该补丁可消除 shtml.exe 在请求不存在的文件时泄露物理路径的问题。如无法安装补丁，可在 IIS 管理器中为 FrontPage 扩展站点配置自定义 404 错误页面，避免默认错误消息泄露服务器路径信息。对于仍在使用 IIS 4.0/5.0 的环境，建议升级到受支持的 IIS 版本（如 IIS 10.0）以获得完整安全支持。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Microsoft IIS FrontPage 服务器扩展路径信息泄露漏洞"
updated = "2026-06-16T21:51:39.827"

