[basic]
description = "OpenSSH 2.9 及更早版本存在安全绕过漏洞，当用户通过非 pty 方式执行命令时，系统不会启动可插拔认证模块（PAM）会话，导致 pam.d 中配置的资源限制（rlimits）被绕过。本地攻击者可利用此漏洞突破系统资源限制，实现资源耗尽或拒绝服务。该漏洞影响 OpenSSH 2.9 及之前版本，CVSS 评分 7.5，危害等级高。"
published = "2001-06-19T04:00:00.000"
remediation = "升级 OpenSSH 至 2.9.1 及以上版本（2001 年 7 月发布的 OpenSSH 2.9.1 已修复此问题）。现代系统应使用当前最新稳定版（OpenSSH 9.x 系列），以避免大量后续安全风险。如无法立即升级，可在 pam.d/sshd 中启用 mandatory 会话模块并要求所有登录 session 必须关联 pty。"
score = 7.5
severity = "HIGH"
sources = ["osv"]
title = "OpenSSH PAM 会话资源限制绕过漏洞"
updated = "2026-06-16T21:56:19.030"

