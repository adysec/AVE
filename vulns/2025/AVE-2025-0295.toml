[basic]
description = "用友畅捷通CRM系统的 newleadset.php 接口存在 SQL 注入漏洞。由于程序未对 `gblOrgID` 参数进行充分的过滤与转义，攻击者可通过 `DontCheckLogin=1` 参数绕过认证，直接向目标 URL `/lead/newleadset.php` 的 `gblOrgID` 参数注入恶意 SQL 语句（如利用 SLEEP 函数进行时间盲注），从而窃取数据库中敏感数据或获取系统控制权。该漏洞影响未及时修复的畅捷通CRM版本，危害严重。"
published = "0702"
remediation = "立即升级畅捷通CRM至官方最新版本（V13.0及以上），该版本已修复newleadset.php中gblOrgID参数的SQL注入问题。如无法升级，在Web应用防火墙（WAF）中添加规则拦截gblOrgID参数中的SQL关键字（AND、OR、SELECT、SLEEP等），并在应用层对gblOrgID参数进行严格的整型校验和参数化查询改造，同时移除DontCheckLogin=1参数绕过登录的逻辑。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "用友畅捷通CRM newleadset.php SQL注入漏洞"
updated = "0702"

