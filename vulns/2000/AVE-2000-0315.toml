[basic]
description = "Cisco IOS 系统 11.1 至 12.1 版本的 HTTP 服务存在输入验证不当漏洞。远程攻击者无需身份认证，通过向目标路由器或交换机发送包含特殊 `%%` 字符串的恶意 URL 请求，可导致 IOS HTTP 服务进程崩溃，造成拒绝服务。该漏洞影响 Cisco 大量路由器和交换机设备，CVSS 评分 7.1，危害等级高。Cisco 已发布安全公告建议禁用 HTTP 服务或升级至修复版本。"
published = "2000-04-26T04:00:00.000"
remediation = "升级 Cisco IOS 至 12.0.8 或更高版本以修复该漏洞。如无法立即升级，可通过全局配置模式下执行 `no ip http server` 命令禁用 HTTP 服务，改用 HTTPS 或控制台管理作为临时缓解措施。也可在入方向 ACL 中限制对 HTTP 服务端口（默认 TCP 80）的访问，仅允许可信管理 IP 段连接。"
score = 7.1
severity = "HIGH"
sources = ["epss"]
title = "Cisco IOS HTTP 拒绝服务漏洞"
updated = "2026-06-16T21:51:35.753"

