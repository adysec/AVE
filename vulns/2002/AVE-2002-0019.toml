[basic]
description = "Squid 2.4.STABLE6 之前版本的 FTP 代理功能存在安全绕过漏洞。由于代理服务器未对控制连接与数据连接的 IP 地址进行比对验证，远程攻击者可通过构造特制的 FTP 数据连接绕过防火墙规则，或伪造 FTP 服务器响应实施中间人攻击。该漏洞影响广泛部署的 Squid 代理服务器，CVSS 评分 7.5，危害等级高。"
published = "2002-07-26T04:00:00.000"
remediation = "升级 Squid 至 2.4.STABLE6 或更高版本，该版本已修复 FTP 代理未校验控制连接与数据连接 IP 地址一致性的问题。如无法升级，可在防火墙上限制 FTP 数据连接仅允许来自受信任的 FTP 服务器 IP 范围，或禁用 FTP 代理功能作为临时缓解措施。"
score = 7.5
severity = "HIGH"
sources = ["osv"]
title = "Squid FTP 代理安全绕过漏洞"
updated = "2026-06-16T21:57:59.823"

