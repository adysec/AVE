[basic]
description = "WWW URL 访问密码可被猜测或暴力破解，攻击者通过常见弱口令字典或自动化枚举工具即可获取受保护资源的未授权访问权限，受影响的 Web 应用可能因此泄露敏感数据、遭受未授权操作或完全被攻击者控制。该漏洞影响广泛，涉及使用 HTTP 基本认证或表单认证的多种 Web 服务。"
published = "1997-07-01"
remediation = "使用强密码策略（大小写字母、数字、特殊字符组合，长度不少于12位），部署账户锁定机制和多因素认证，避免使用默认凭据或常见弱口令。"
