[basic]
description = "Cisco 7xx 系列路由器 Telnet 服务存在拒绝服务漏洞，未经身份认证的远程攻击者可通过向目标路由器的 Telnet 端口（默认 23/TCP）建立 TCP 连接，触发路由器系统重新加载，导致设备暂时不可用。该漏洞影响 Cisco 7xx 系列路由器设备，CVSS 评分 5.0，危害等级中等。受影响的 Cisco 7xx 设备因无法正确处理 Telnet 端口上的 TCP 连接请求，导致设备崩溃重启，造成网络服务中断。"
published = "1999-03-11T05:00:00.000"
remediation = "建议升级 Cisco 7xx 系列路由器至最新固件版本（如 IOS 11.3(5) 或更高），并在路由器上配置访问控制列表（ACL）限制 Telnet 端口的源 IP 范围，仅允许受信任的管理主机连接。如业务允许，建议禁用 Telnet 服务，改用 SSH 进行远程管理。对于已停产的 7xx 系列设备，建议尽快迁移至受支持的 Cisco 路由器型号。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Cisco 700系列路由器 Telnet TCP连接拒绝服务漏洞"
updated = "2026-06-16T21:48:21.073"

