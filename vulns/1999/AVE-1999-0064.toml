[basic]
description = "Cisco 7xx 系列路由器 Telnet 服务存在拒绝服务漏洞，远程攻击者无需认证即可通过与路由器 Telnet 端口建立 TCP 连接，导致路由器系统重载或崩溃，造成正常网络服务中断。该漏洞影响 Cisco 7010、7020 等 7xx 系列路由器设备，攻击条件简单，只需知道目标路由器 IP 地址及 Telnet 端口即可发起攻击。"
published = "1999-03-11T05:00:00.000"
remediation = "升级 Cisco 700 系列路由器固件至修复版本，可通过 Cisco.com 下载相应维护版本更新。临时缓解措施：在路由器上配置 ACL 限制 Telnet（TCP 23）端口的访问来源，仅允许受信任的管理网段连接；如不需要远程管理，可直接在 line vty 下配置 access-class 或全局禁用 Telnet 服务，改用 SSH 或加密控制台管理。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Cisco 7xx系列路由器 Telnet TCP连接拒绝服务漏洞"
updated = "2026-06-16T21:48:21.073"

