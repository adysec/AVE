[basic]
description = "Great Circle Associates 开发的 Majordomo 邮件列表管理软件 1.94.4 版本中存在命令注入漏洞。resend 命令在处理用户输入时未正确过滤 shell 元字符，导致拥有本地访问权限的攻击者可通过构造包含特殊字符的恶意请求，以 Majordomo 进程权限执行任意系统命令，实现本地权限提升。该漏洞 CVSS 评分 4.6，危害等级中危，受影响系统需升级至修复版本或限制本地用户对 resend 命令的访问。"
published = "1999-12-28T05:00:00.000"
remediation = "建议立即升级 Majordomo 至 2.0 及以上版本，该版本已修复 resend 命令的 shell 元字符注入问题。如无法升级，需在 resend 脚本中对用户输入严格过滤 shell 元字符（;、`、$、|、& 等），并限制仅管理员可执行 resend 命令。对于 SCO Skunkware 用户，可访问 http://www.sco.com/skunkware 获取更新版本。"
score = 4.6
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Great Circle Associates Majordomo 1.94.4 本地权限提升漏洞"
updated = "2026-06-16T21:50:52.027"

