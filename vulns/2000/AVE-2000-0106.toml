[basic]
description = "War FTP 1.70 及 1.67b2 版本中的宏（Macros）功能存在安全漏洞，本地或远程攻击者可通过向 FTP 服务发送特制的宏命令，利用该功能绕过访问限制，实现任意文件读取或远程命令执行。该漏洞 CVSS 评分 10.0，危害等级严重，影响运行 War FTP 服务的系统。目前官方已发布修复版本，建议用户升级至最新版。"
published = "2000-01-06T05:00:00.000"
remediation = "建议立即升级到 War FTP Daemon 1.71 或更高版本，该版本已修复宏处理中的路径遍历与命令执行缺陷。如暂时无法升级，应禁用服务端宏功能，限制 FTP 用户对系统目录的访问权限，并通过防火墙限制仅可信 IP 访问 FTP 服务端口（默认 21）。"
score = 10
severity = "CRITICAL"
sources = ["cve"]
title = "WarFTP WarFTPd 远程代码执行与任意文件读取漏洞"
updated = "2026-06-16T21:50:53.137"

