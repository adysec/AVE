[basic]
description = "Zone Labs ZoneAlarm 2.1.10 及更早版本的个人防火墙存在安全规则绕过漏洞。该软件未对源端口为 67（DHCP/BOOTP 服务端口）的 UDP 数据包进行过滤，导致远程攻击者可通过发送特制的源端口为 67 的 UDP 数据包绕过防火墙规则，实现未授权访问。攻击者无需身份认证即可远程利用，影响防火墙的访问控制有效性。"
published = "2000-04-24T04:00:00.000"
remediation = "立即升级 ZoneAlarm 至 2.1.20 或更高版本，该版本已修复 UDP 源端口 67 绕过防火墙规则的问题。如无法升级，可在防火墙规则中手动添加一条阻止所有来自外部网络、源端口为 67 的 UDP 入站流量的规则作为临时缓解措施。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "Zone Labs ZoneAlarm 个人防火墙防火墙绕过漏洞"
updated = "2026-06-16T21:51:30.653"

