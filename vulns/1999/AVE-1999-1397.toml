[basic]
description = "SCO OpenServer 5.0 及 SCO Open Desktop/Open Server 3.0 的 scoterm 组件存在权限许可和访问控制漏洞，本地攻击者可利用 scoterm 组件的权限配置缺陷，通过特定操作提升权限获取 root 权限。该漏洞影响 SCO OpenServer 5.0 及 SCO Open Desktop/Open Server 3.0 版本，攻击者需具备本地访问权限，利用 scoterm 组件的权限配置缺陷实现本地提权，CVSS 评分 7.2，危害等级高危。"
published = "1997-11-20T05:00:00.000"
remediation = "建议升级 scoterm 至 SCO 官方发布的已修复版本，或应用厂商提供的安全补丁。若暂无法升级，应移除 scoterm 程序的 setuid root 权限（chmod u-s /usr/bin/X11/scoterm），或通过文件权限限制仅授权用户执行，以阻断本地用户借此提权至 root。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
