[basic]
description = "Win32 ICQ 98a 1.30 及可能其他版本在处理长文件名时存在显示截断漏洞，当文件名中包含大量空格时，文件扩展名（如 .exe）无法在客户端界面中完整显示。攻击者可通过向用户发送精心构造的长文件名可执行文件，利用该显示缺陷诱骗用户误判文件类型并执行，导致任意代码执行或其他恶意操作。该漏洞利用方式简单，依赖社会工程学手段，影响 Mirabilis ICQ 98a 用户。"
published = "1999-01-01T05:00:00.000"
remediation = '升级到 Mirabilis ICQ 99a 或更高版本，该系列版本已修复文件名长度截断问题。如无法升级，建议在 Windows 资源管理器中启用"显示已知文件类型的扩展名"功能，收到文件后先手动检查完整文件名及真实扩展名，不要直接从 ICQ 传输窗口点击"打开"按钮，避免误执行伪装的可执行文件。'
score = 5.1
severity = "MEDIUM"
sources = ["epss"]
title = "Mirabilis ICQ 98a 文件名扩展名隐藏漏洞"
updated = "2026-06-16T21:50:26.737"

