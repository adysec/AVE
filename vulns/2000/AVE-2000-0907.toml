[basic]
description = "Red Hat Linux 5.2 中的 Glint 工具存在不安全临时文件创建漏洞，本地攻击者可通过符号链接（symlink）攻击，在 Glint 运行时将恶意链接指向系统关键文件，从而覆盖任意文件内容，导致系统服务崩溃或拒绝服务。该漏洞利用条件为攻击者拥有本地账户权限，无需认证即可实施，CVSS 评分 7.2，危害等级高，影响系统完整性与可用性。"
published = "2000-12-19T05:00:00.000"
remediation = "升级 Red Hat Linux 至 6.0 及以上版本，或安装 Red Hat 官方提供的 glint 补丁包。临时缓解措施：移除 glint 的 setuid 位（chmod u-s /usr/bin/glint），并限制仅受信任用户可执行 glint。避免在多用户环境下使用 glint 管理 RPM 包。"
score = 7.2
severity = "HIGH"
sources = ["redhat"]
title = "Red Hat Linux Glint 符号链接攻击本地提权漏洞"
updated = "2026-06-16T21:52:48.080"

