[basic]
description = "Sambar Server 4.3 及 4.4 Beta 3 版本中的 search.dll ISAPI Search 功能存在目录遍历漏洞。远程攻击者无需身份认证即可通过向 query 参数传入恶意构造的目录路径，利用 Search CGI 组件读取服务器上的任意目录内容，导致敏感信息泄露。该漏洞 CVSS 评分 5.0，危害等级中危。ExploitDB 已公开 PoC 利用代码，攻击者可据此实施信息收集攻击。"
published = "2000-11-14T05:00:00.000"
remediation = "Sambar Server 已停止维护多年，官方不再发布安全更新。建议立即迁移至现代 Web 服务器（如 Apache HTTP Server、Nginx 或 IIS），并移除 search.dll ISAPI 扩展。如短期内无法迁移，可在 IIS 管理器中删除 search.dll 的脚本映射，或通过 URL 重写规则拦截对 /search.dll 的请求作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Sambar Server Search CGI 目录遍历漏洞"
updated = "2026-06-16T21:52:33.977"

