title = "PHP 3.0.13 safe_mode popen 远程命令执行漏洞"
description = "PHP 3.0.13 在启用 safe_mode 安全模式时，未能对 popen() 函数执行的系统命令中的 shell 元字符进行正确过滤。攻击者可通过构造包含分号、管道符等特殊字符的恶意命令参数，绕过 safe_mode 的 EscapeShellCmd() 安全限制，在目标服务器上执行任意系统命令。该漏洞影响 PHP 3.0.13 及更早版本，无需身份认证即可远程利用，CVSS 评分 10.0，危害等级为严重。"
