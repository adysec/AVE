[basic]
description = "金山 WPS 云服务存在未授权访问漏洞，远程攻击者无需身份认证即可访问 `/open/v6/api/etcd/operate` 接口获取 etcd 中的 AKSK 凭据，进而通过 kubelet 路由映射与 Kubernetes 集群内部 POD 通信，利用 `/open/wps/run/{namespace}/{podname}/node-exporter` 接口执行任意命令，实现远程代码执行。该漏洞可导致 WPS 云服务集群被完全控制，影响部署了 WPS 云服务的所有企业用户。"
published = "0717"
remediation = "立即在反向代理或 WAF 层限制 `/open/v6/api/etcd/` 路径的匿名访问，仅允许内网管理 IP 访问；对 `/open/wps/run/` 接口添加严格的身份认证与鉴权，并对 `cmd` 参数实施白名单过滤；升级 WPS 协作平台至官方发布的安全版本；检查 etcd 中存储的 AKSK 密钥并立即轮换；使用 Kubernetes NetworkPolicy 限制 etcd Pod 仅允许必要服务访问。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "金山 WPS 未授权访问远程代码执行漏洞"
updated = "0717"

