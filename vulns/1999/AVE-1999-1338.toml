[basic]
description = "SGI IRIX 6.3 及 6.4 版本的 Indigo Magic 系统管理子系统中的 runpriv 组件存在权限许可与访问控制漏洞。本地攻击者可通过利用该组件对特权操作的不当权限检查，以低权限用户身份执行本应需要 root 权限的操作，从而获取系统最高权限。该漏洞影响 SGI IRIX 6.3 和 6.4 版本，CVSS 评分 7.2，危害等级高。攻击者需拥有本地系统访问权限方可利用。"
published = "1997-05-03T04:00:00.000"
remediation = "立即应用 SGI 安全公告 19970503-01-PX 提供的补丁，或升级至 IRIX 6.5 及以上版本。如无法升级，可临时移除 runpriv 的 setuid 位（chmod u-s /usr/sysadmin/runpriv），并严格限制本地用户登录权限，仅允许受信任的管理员账户访问系统。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "SGI IRIX Indigo Magic系统管理员子系统本地权限提升漏洞"
updated = "2026-06-16T21:49:45.257"

