[basic]
description = "Kerberos 4 密钥分发中心（KDC）程序存在双重释放（double-free）内存错误，未经身份认证的远程攻击者可通过向目标 KDC 服务发送特制的数据包触发该漏洞，导致内存损坏并使 KDC 进程崩溃，从而造成拒绝服务。该漏洞影响 MIT Kerberos 4.0 以及 Kerberos 5 的多个早期版本（包括 5 1.0、5 1.1.1 和 5-1.1），攻击者无需任何凭据即可远程利用，CVSS 评分 5.0，危害等级中等。KDC 是 Kerberos 认证体系的核心组件，其崩溃将导致依赖 Kerberos 认证的所有客户端无法完成身份验证，影响整个域内服务的可用性。"
published = "2000-06-09T04:00:00.000"
remediation = "建议升级到 MIT Kerberos 5 最新稳定版本（1.20 或更高版本），该版本已修复 double-free 漏洞。如使用 Red Hat/CentOS，可通过 `yum update krb5-libs krb5-server` 更新；Debian/Ubuntu 系统执行 `apt-get upgrade krb5`。对于仍使用 Kerberos 4 的环境，应立即迁移到 Kerberos 5，因为 Kerberos 4 已于 2005 年被正式废弃且不再提供安全补丁。若无法立即升级，可在防火墙限制对 KDC 端口（88/TCP 和 88/UDP）的非授权访问，仅允许可信网段连接，作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "MIT Kerberos 4 KDC 双重释放拒绝服务漏洞"
updated = "2026-06-16T21:51:58.693"

