[basic]
description = "Apache Tomcat 3.0/3.1 中的 Snoop Servlet 存在信息泄露漏洞。远程攻击者可通过向目标服务器发送带有 `.snp` 扩展名的不存在 URL 请求，触发 Snoop Servlet 返回系统环境变量、系统属性、请求参数等敏感信息。该漏洞无需身份认证即可利用，攻击复杂度低，可能导致攻击者获取服务器内部配置信息，为进一步攻击提供情报。影响 Jakarta Tomcat 3.0 和 3.1 版本。"
published = "2000-10-20T04:00:00.000"
remediation = "升级到 Tomcat 4.0 及以上版本，该漏洞已在后续版本中修复。如无法升级，删除 `$CATALINA_HOME/conf/web.xml` 中 snoop servlet 的映射配置，或通过防火墙限制对 `*.snp` 路径的外部访问。"
score = 6.4
severity = "MEDIUM"
sources = ["cve"]
title = "Apache Tomcat Snoop Servlet 信息泄露漏洞"
updated = "2026-06-16T21:52:25.440"

