[basic]
description = "FreeBSD 2.2.1 及更早版本中的 Sysinstall 工具在配置匿名 FTP 服务时存在信息泄漏漏洞。当管理员通过 Sysinstall 设置匿名 FTP 时，系统会自动创建 ftp 用户且未设置密码，并将该用户的登录 shell 设置为 /bin/date，导致攻击者可利用此配置缺陷绕过身份认证获取系统资源访问权限。该漏洞影响 FreeBSD 2.2.1 及之前版本，CVSS 评分 7.5，危害等级高。建议升级至不受影响版本或手动修正 ftp 用户配置以降低风险。"
published = "1997-04-07T04:00:00.000"
remediation = "升级至 FreeBSD 2.2.1 以上版本，该漏洞已在后续版本中修复。如无法升级，手动删除无密码的 ftp 用户或将 ftp 用户的 shell 改为 /sbin/nologin，并为其设置强密码，同时限制匿名 FTP 的目录访问权限。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "FreeBSD Sysinstall 匿名FTP配置信息泄露漏洞"
updated = "2026-06-16T21:50:08.477"

