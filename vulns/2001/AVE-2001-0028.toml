[basic]
description = 'Cat Soft Serv-U FTP Server 2.5i之前的版本存在目录遍历漏洞。远程攻击者通过向CD命令附加"/..%20."等字符串，可绕过FTP根目录限制，利用路径穿越方式读取服务器上的任意文件。该漏洞属于典型的".."(点点)攻击变种，影响Serv-U FTP Server 2.4及2.5版本，攻击者无需身份认证即可利用，对系统机密性构成严重威胁。'
published = "2001-02-16"
remediation = "升级 Cat Soft Serv-U FTP Server 至 2.5i 或更高版本，该版本已修复目录遍历漏洞。鉴于该产品已停止维护，建议迁移至仍在维护的 FTP 服务器软件（如 vsftpd），并对 FTP 服务实施网络访问控制和最小权限原则。"
score = 5.0
severity = "MEDIUM"
sources = [
