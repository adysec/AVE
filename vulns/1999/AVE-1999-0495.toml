[basic]
description = "FreeBSD lpd 打印守护进程存在缓冲区溢出漏洞，远程攻击者可通过向目标系统发送超长 DNS 主机名触发该漏洞，导致缓冲区溢出，可能造成远程代码执行或服务崩溃。该漏洞影响 FreeBSD 系统，CVSS 评分 9.3，危害等级严重。"
published = "1997-03-05T05:00:00.000"
remediation = "建议立即升级 FreeBSD 至 2.2.5 及以上版本，该版本已修复 lpd 中 DNS 主机名长度检查不足导致的缓冲区溢出问题。若无法立即升级，编辑 /etc/inetd.conf 注释 printer 服务行后重启 inetd 以禁用 lpd 守护进程，同时在防火墙层面限制对 TCP 端口 515 的访问，仅允许受信任的打印客户端连接。"
score = 9.3
severity = "CRITICAL"
sources = ["avd"]
title = "FreeBSD lpd 缓冲区溢出漏洞"
updated = "2026-06-16T21:48:06.117"

