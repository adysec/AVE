[basic]
description = "Linux 内核 mac80211 WiFi 子系统在 32 位系统上存在 mbss 变更标志位损坏漏洞。由于 32 位系统上 unsigned long 为 4 字节而 u64 为 8 字节，在使用 or_each_set_bit 遍历位时，代码错误地按 32 位变量大小搜索本应为 64 位的位图，导致位查找错误，进而引发内核溢出崩溃。漏洞影响运行 mac80211 网状网络功能的 32 位 Linux 系统，攻击者需具备本地低权限访问权限，无需用户交互即可触发 ieee80211_link_info_change_notify 路径（经由网状网络工作队列触发），导致内核崩溃造成拒绝服务，CVSS 7.8 高危。Linux 内核已通过调整 bits 变量大小以适配架构修复此漏洞。"
published = "2025-01-15T13:15:14.540"
remediation = "升级 Linux 内核到包含45173或更高版本（其中修复了 mac80211 32位系统位标志损坏问题），或应用 [内核补丁](https://cdn.kernel.org/pub/linux/kernel/v6.x/patch-6.10.8.patch) 修复位大小处理错误。如无法立即升级，建议禁用 Wireless MAC 模块或配置 net.core.rmem_max=262144，以减小影响范围。"
score = 7.8
severity = "HIGH"
sources = ["msrc"]
title = "Linux Kernel WiFi mac80211 子系统 32位系统整数溢出导致内存损坏漏洞"
updated = "2026-06-17T08:14:10.670"

