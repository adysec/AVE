[basic]
description = "Novell Groupwise 的 Web 服务器组件 GWWEB.EXE 存在路径遍历漏洞，远程攻击者无需身份认证即可通过 HELP 参数提交特制的路径遍历请求，导致服务器返回文件系统路径信息，从而泄露 Web 服务器的真实安装目录路径。该漏洞可被用于后续攻击步骤的信息收集阶段，帮助攻击者进一步探测目标系统，扩大攻击面。受影响版本为 Novell Groupwise 5.5 及可能更早版本。"
published = "1999-12-19T05:00:00.000"
remediation = "升级 Novell GroupWise 至 6.0 及以上版本，该版本已修复 GWWEB.EXE 路径泄露问题。如无法升级，在 Web 服务器配置中移除或禁用 GWWEB.EXE 的 CGI 映射，并限制对 /cgi-bin/GW5/GWWEB.EXE 的访问权限以降低暴露风险。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Novell GroupWise Web服务器路径遍历漏洞"
updated = "2026-06-16T21:49:30.503"

