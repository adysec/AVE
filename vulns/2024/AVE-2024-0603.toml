[basic]
description = "Linux内核megaraid_sas驱动存在潜在死锁漏洞，源于reset_mutex与scan_mutex两个互斥锁存在循环锁依赖：CPU0持有reset_mutex等待scan_mutex，而CPU1持有scan_mutex等待reset_mutex，形成死锁导致系统挂起。该漏洞影响使用MegaRAID SAS控制器的Linux内核系统，CVSS 5.5（中危），攻击向量为本地，攻击复杂度低，需低权限，无需用户交互，可用性影响高。本地攻击者可通过触发并发SCSI操作（如设备重置与扫描同时进行）诱发相反顺序获取双锁，导致内核死锁拒绝服务。Linux内核已通过在获取scan_mutex前临时释放reset_mutex修复此死锁问题。"
published = "2025-01-11T13:15:30.790"
remediation = "建议立即升级 Linux 内核至包含修复的版本：Linux 6.12.5、6.11.11、6.6.63、6.1.120、5.15.179、5.10.234、5.4.291 或更高版本。Ubuntu 24.04 LTS 用户请安装 USN-7381-1 提供的内核更新（linux-image-6.8.0-52-generic 等），Ubuntu 20.04 LTS 用户请安装 USN-7459-1 更新，Debian 11 用户请应用 DLA-4075-1 更新。如无法立即升级内核，可暂时卸载 megaraid_sas 模块（modprobe -r megaraid_sas）或在启动参数中禁用该驱动（modprobe.blacklist=megaraid_sas）作为临时缓解措施。"
score = 5.5
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux 内核 MegaRAID SAS 死锁漏洞"
updated = "2026-06-17T08:14:04.617"

