[basic]
description = "Novell GroupWise 邮件系统的 Web 服务器组件 GWWEB.EXE 存在目录遍历漏洞。由于对 HELP 参数输入过滤不严，远程攻击者无需身份认证，可通过包含 `..`（点点）序列的特制 HTTP 请求绕过路径限制，读取服务器上任意 .htm 扩展名的文件，造成敏感信息泄露。该漏洞影响 GroupWise 5.2 及 5.5 版本，CVSS 评分 5.0，危害等级中等。"
published = "1999-12-19T05:00:00.000"
remediation = "升级 Novell GroupWise 至 5.5 Enhancement Pack 或更高版本，该漏洞已在后续版本中修复。临时缓解措施：在 Web 服务器（如 Apache 或 Netscape Enterprise Server）上通过 ACL 限制对 GWWEB.EXE 的访问，或删除该 CGI 文件。若无需 Web 邮件功能，建议禁用整个 CGI-BIN/GW5 目录。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Novell GroupWise GWWEB.EXE 目录遍历漏洞"
updated = "2026-06-16T21:49:30.380"

