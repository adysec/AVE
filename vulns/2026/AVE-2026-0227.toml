[basic]
description = "孚盟云系统存在SQL注入漏洞，攻击者可通过向受影响接口提交恶意构造的SQL查询语句，绕过参数化查询限制及WAF拦截规则，实现未授权访问数据库敏感信息。该漏洞可导致数据泄露、篡改甚至获取系统控制权。攻击者无需身份认证即可远程利用，危害较大。建议厂商尽快修复参数过滤机制并升级WAF规则。"
published = "nday"
remediation = "建议孚盟云用户升级至最新安全版本，修复参数拼接导致的 SQL 注入漏洞。开发者应对所有用户输入执行参数化查询或预编译语句，避免直接拼接 SQL 字符串。同时部署 WAF 规则拦截常见 SQL 注入载荷，并严格限制数据库账号权限。"
