[basic]
description = "FreeBSD 3.0至3.4版本中ports套件的Asmon和Ascpu工具存在本地权限提升漏洞。这两个工具是AfterStep窗口管理器的applet，因需要访问/dev/kmem而被设置为setgid kmem。本地攻击者可通过-e命令行选项传入恶意参数，诱使这些工具以kmem组权限执行任意命令，从而获得系统敏感信息访问权限。该漏洞影响FreeBSD 3.x系列多个版本，CVSS评分4.6，危害等级中危。由于需要本地访问权限，攻击条件相对受限，但一旦利用成功可提升至kmem组权限。"
published = "2000-02-21"
remediation = "升级至 FreeBSD 3.5 及以上版本，该漏洞已在后续版本中修复。如无法升级，可移除 asmon 和 ascpu 的 setgid 权限：chmod u-s /usr/local/bin/asmon /usr/local/bin/ascpu，并限制配置文件仅允许 root 用户写入。"
score = 4.6
severity = "MEDIUM"
sources = [
    "cve",
    "exploitdb",
]
title = "FreeBSD asmon/ascpu 本地权限提升漏洞"
updated = "2026-06-16"

