[basic]
description = "SGI IRIX 6.4 及更早版本中的 netprint 工具在调用 disable 程序时信任 PATH 环境变量，未使用绝对路径或进行路径校验。本地攻击者可修改 PATH 环境变量，将恶意程序置于优先搜索路径中，从而诱使 netprint 以提升的权限执行任意代码，实现本地权限提升。该漏洞影响 SGI IRIX 6.4 及之前版本，需本地访问权限，CVSS 评分 4.6。"
published = "1997-01-04T05:00:00.000"
remediation = "升级 SGI IRIX 至 6.5 或更高版本，该版本已修复 netprint 对 PATH 环境变量的信任问题。如无法升级，可移除 netprint 的 setuid 位（chmod u-s /usr/lib/netprint）并限制可执行用户组，同时确保 disable 程序路径使用绝对路径而非依赖 PATH 环境变量。"
score = 4.6
severity = "MEDIUM"
sources = ["epss"]
title = "SGI IRIX netprint 本地权限提升漏洞"
updated = "2026-06-16T21:49:45.770"

