[basic]
description = "Sun Solaris 7.0（含 SPARC 与 x86 平台）中 /usr/openwin/bin/kcms_configure 程序在处理 Kodak Color Management System（KCMS）配置文件参数时存在本地缓冲区溢出缺陷。该程序默认以 setuid root 权限安装，本地普通用户可通过构造超长的命令行参数或恶意 KCMS 配置文件触发溢出，覆盖返回地址并执行任意代码，从而将权限提升至 root。攻击条件为攻击者需拥有目标主机的本地登录权限，且目标系统未移除该程序的 setuid 位。"
published = "1999-11-20T05:00:00.000"
remediation = "建议升级到 Sun 官方发布的 Solaris 7 修补版本，安装对应补丁簇（SPARC 平台补丁 107794、x86 平台补丁 107797），或应用 Sun Alert 缺陷修复包。如暂无法打补丁，可临时移除 kcms_configure 的 setuid root 权限（执行 chmod u-s /usr/openwin/bin/kcms_configure），并限制普通用户对该 KCMS 配置文件目录的写入访问作为缓解措施。"
score = 7.2
severity = "HIGH"
sources = ["exploitdb"]
title = "Sun Solaris 7.0 kcms_configure 本地缓冲区溢出导致权限提升漏洞"
updated = "2026-07-17T00:00:00Z"

