[basic]
description = "Knox Software Arkeia 备份软件的 nlserverd 服务（4.0 与 4.1 版本）存在拒绝服务漏洞。该服务在处理远程客户端请求时未能正确校验输入，导致攻击者可通过向目标主机上 nlserverd 监听的端口发送特制的数据包触发异常，使服务崩溃或停止响应。未经身份认证的远程攻击者可利用此漏洞对运行受影响版本的 Arkeia 服务器发起远程拒绝服务攻击，导致合法备份与管理操作中断，影响系统可用性。利用方式简单，无需认证且无需本地访问权限，仅需网络可达即可发送恶意请求。"
published = "1999-09-26T04:00:00.000"
remediation = "建议升级 Knox Software Arkeia 至 4.2 及以上修复版本，或应用厂商针对 nlserverd 发布的安全补丁。如暂无法升级，可在防火墙或边界设备上过滤到达 5555 端口（nlserverd 服务端口）的非法/异常外部连接，仅允许受信任内部主机访问，以缓解远程拒绝服务风险。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
