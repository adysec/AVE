[basic]
description = "Squid Internet Object Cache 1.1.20 存在安全绕过漏洞，远程攻击者可通过在 URL 中使用十六进制转义序列进行编码，从而绕过访问控制列表（ACL）的限制。该漏洞允许未经认证的用户访问本应被 ACL 规则禁止的受限资源，危害等级为高危，影响使用 Squid 代理服务的网络环境。建议升级至更高版本以修复此缺陷。"
published = "1998-02-20T05:00:00.000"
remediation = "升级到 Squid 2.0 或更高版本，该版本在 ACL 检查前正确解码 URL 中的十六进制转义序列。如无法升级，可在 squid.conf 中配置 uri_whitespace strip 并设置 acl 规则对编码后的 URL 模式进行过滤作为临时缓解措施。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "Squid Squid Web Proxy 安全绕过漏洞"
updated = "2026-06-16T21:50:05.197"

