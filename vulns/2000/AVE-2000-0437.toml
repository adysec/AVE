[basic]
description = "3R Soft MailStudio 2000 2.0 及更早版本中的 mailview.cgi CGI 程序存在目录遍历漏洞，远程攻击者通过在 URL 参数中使用 ../ 序列绕过路径限制，可读取服务器上的任意文件，导致敏感信息泄露。该漏洞影响 MailStudio 2000 系列邮件服务系统，攻击条件低且利用方式简单。"
published = "2000-06-09T04:00:00.000"
remediation = "3R Soft 已停止维护 MailStudio 2000，建议立即将 mailview.cgi 迁移至支持的产品或移除该 CGI 组件。如仍需使用，须在 mailview.cgi 中增加输入校验，过滤 `../` 等目录遍历序列，并限制 CGI 进程的文件系统访问权限（如使用 chroot 或容器隔离）。同时配置 Web 服务器（如 Apache）的 `AllowOverride` 和 `Options -Indexes` 禁止任意文件访问。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "3R Soft MailStudio 2000 任意文件读取漏洞"
updated = "2026-06-16T21:51:55.467"

