[basic]
description = "FileMaker Pro 5 的 Web Companion 组件存在邮件中继漏洞，远程攻击者无需身份认证即可利用该组件发送匿名或伪造的电子邮件。攻击者可通过向 Web Companion 发送特制的 HTTP 请求，利用其默认配置下未对邮件发送功能进行访问限制的缺陷，将服务器作为垃圾邮件或钓鱼邮件的匿名中继节点。该漏洞影响 FileMaker Pro 5 及早期版本，CVSS 评分 7.5，危害等级高。厂商至今未发布官方补丁，建议用户禁用 Web Companion 的邮件功能或升级至更高版本。"
published = "2000-05-02T04:00:00.000"
remediation = "立即升级 FileMaker Pro 5 Web Companion 至官方修复版本（5.0v3 或更高），该版本限制了邮件中继功能，防止匿名邮件发送。如无法升级，在 Web Companion 配置中禁用 SMTP 中继功能，仅允许经过身份验证的用户发送邮件；同时在网络防火墙层面限制对 Web Companion 端口（默认 80/443）的出站 SMTP 连接，阻止未授权的外部邮件转发。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "FileMaker FileMaker Pro Web Companion 匿名邮件发送漏洞"
updated = "2026-06-16T21:51:36.493"

