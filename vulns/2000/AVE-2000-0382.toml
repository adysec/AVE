[basic]
description = "KDE 桌面环境中的 kdesud 工具在处理 DISPLAY 环境变量时存在缓冲区溢出漏洞。本地攻击者可通过向 DISPLAY 环境变量传入超长字符串触发缓冲区溢出，从而覆盖内存数据并获取目标系统的 root 权限。该漏洞影响 KDE 1.1/1.1.1/1.1.2/1.2 版本，CVSS 评分 7.2，危害等级高。建议用户升级至不受影响的版本以修复此漏洞。"
published = "2000-05-27T04:00:00.000"
remediation = "升级 KDE 至 2.0 及以上版本，或应用 KDE 安全补丁。如无法升级，限制 kdesud 的 setuid 权限并移除不信任用户的执行权限，同时在系统层面过滤 DISPLAY 环境变量长度。建议迁移至已修复此漏洞的 KDE 3.x 或更高版本。"
score = 7.2
severity = "HIGH"
sources = ["cve"]
title = "KDE kdesud 本地缓冲区溢出漏洞"
updated = "2026-06-16T21:51:46.943"

