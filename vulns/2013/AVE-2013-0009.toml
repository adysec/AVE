[basic]
description = "WordPress 的 Category Grid View Gallery 插件 2.3.1 版本中存在反射型跨站脚本漏洞，该漏洞位于 includes/CatGridPost.php 文件中，由于对 ID 参数缺乏有效的过滤与转义处理，攻击者可构造包含恶意脚本的特制 URL 并诱导已认证用户点击，在用户浏览器会话中执行任意 HTML 或 JavaScript 代码，导致敏感信息泄露或会话劫持。该漏洞影响该插件的所有早期版本。"
published = "2013-07-16T14:08:50.963"
remediation = "立即更新 WordPress 插件 Category Grid View Gallery 至最新版本（若厂商已停止维护则删除该插件），或手动在 includes/CatGridPost.php 中对 $_GET['ID'] 参数使用 WordPress 的 esc_html() 或 intval() 进行输入过滤。临时缓解措施可在 Web 应用防火墙（WAF）层面添加规则拦截包含恶意脚本的 ID 参数请求。"
score = 4.3
severity = "MEDIUM"
sources = ["nuclei"]
title = "WordPress Plugin Category Grid View Gallery 跨站脚本漏洞"
updated = "2026-06-16T23:56:39.457"

