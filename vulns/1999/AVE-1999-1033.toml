[basic]
description = "Windows 3.51 系统中的 Office Shortcut Bar (OSB) 存在权限许可和访问控制漏洞。OSB 启用了备份和还原权限，这些权限会被从快捷栏启动的程序（如文件管理器）继承，导致本地用户能够读取其本无权访问的文件夹。攻击者利用该漏洞可越权访问系统敏感文件，造成信息泄露。该漏洞影响 Windows 3.51 版本，CVSS 评分 2.1，危害等级低。"
published = "1999-12-31T05:00:00.000"
remediation = "升级到 Windows NT 4.0 或更高版本，该漏洞在后继版本中已修复。如无法升级，避免从 Office 快捷工具栏启动文件管理器等程序，改为直接运行，并收紧用户目录的 ACL 访问控制列表权限。作为临时缓解措施，可禁用 Office 快捷工具栏启动程序的功能。"
score = 2.1
severity = "LOW"
sources = ["avd"]
title = "Microsoft Windows Office Shortcut Bar 权限许可和访问控制漏洞"
updated = "2026-06-16T21:50:07.887"

