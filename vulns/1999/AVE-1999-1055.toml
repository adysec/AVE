[basic]
description = "Linux 2.2.10 及更早版本（使用 ipchains）以及 FreeBSD 3.2（使用 ipfw）的网络地址转换（NAT）功能存在拒绝服务漏洞。远程攻击者可通过向目标系统发送特制的 ping -R（记录路由）ICMP 数据包，触发内核在处理路由记录选项时出现异常，导致系统内核崩溃（kernel panic）。该漏洞攻击条件简单，无需认证即可远程触发，影响运行上述版本 Linux 及 FreeBSD 操作系统的网络设备。"
published = "1999-12-31T05:00:00.000"
remediation = "升级 Linux 内核至 2.2.11 及以上版本，或升级 FreeBSD 至 3.3 及以上版本。对于仍运行此类老旧系统的环境，建议迁移至受支持的现代版本（如 Linux 6.x 或 FreeBSD 13.x），并在防火墙层面过滤 ICMP 带记录路由选项（record route）的数据包作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Linux 和 FreeBSD NAT 记录路由请求拒绝服务漏洞"
updated = "2026-06-16T21:50:13.823"

