[basic]
description = "gnuserv 3.12 之前版本（随 XEmacs 分发）在处理 X Window 系统的 MIT-MAGIC-COOKIE 认证 cookie 时，未正确验证指定的长度字段，存在栈缓冲区溢出漏洞。远程攻击者可通过发送特制的超长 cookie 触发缓冲区溢出，从而在目标系统上执行任意命令；或利用短 cookie 长度绕过认证机制进行暴力破解。该漏洞影响所有使用受影响版本 gnuserv 的 XEmacs 用户，CVSS 评分 10.0，危害等级严重。"
published = "2001-05-03T04:00:00.000"
remediation = "立即升级 gnuserv 至 3.12 或更高版本。XEmacs 用户应安装对应发行版的安全补丁：Red Hat Linux 用户安装 RHSA-2001-010/RHSA-2001-011 更新，Mandrake Linux 用户安装 MDKSA-2001-019 更新。如无法升级，可在防火墙层面限制对 gnuserv 端口（默认 TCP 端口）的远程访问，仅允许可信来源连接。"
score = 10
severity = "CRITICAL"
sources = ["redhat"]
title = "XEmacs gnuserv 缓冲区溢出远程代码执行漏洞"
updated = "2026-06-16T21:53:51.010"

