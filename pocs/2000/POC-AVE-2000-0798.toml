[info]
author = "AVE"
description = "验证 Microsoft Windows 2000 Indexing Service 的 ixsso.query ActiveX 控件是否可被脚本实例化并执行文件查询。该 ActiveX 控件被错误标记为'对脚本安全'，远程攻击者可通过诱导用户访问恶意网页，利用客户端 JavaScript 创建 ActiveXObject('ixsso.query') 对象，设置查询目录为 System，执行文件搜索并返回文件路径、大小、作者等信息，导致敏感信息泄露。"
id = "POC-AVE-2000-0798"
name = "Microsoft Windows 2000 Indexing Service ixsso.query ActiveX File Verification PoC"
severity = "medium"
tags = [
    "cve-2000-1105",
    "activex",
    "indexing-service",
    "windows-2000",
]
vuln_id = [
    "CVE-2000-1105",
    "AVE-2000-0798",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/"
protocol = "http"

[poc.requests.body]
content = ""
type = "raw"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["ixsso.query"]
