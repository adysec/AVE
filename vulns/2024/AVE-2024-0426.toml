[basic]
description = "360新天擎终端安全管理系统存在身份认证与访问控制不足漏洞，其/runtime/admin_log_confcache接口未进行严格验证，导致攻击者无需认证即可直接访问管理员操作日志等敏感配置信息，泄露系统内部日志与配置，可能为进一步攻击或敏感信息收集提供情报。该漏洞影响部署了相关版本新天擎终端安全管理系统的服务器，攻击条件为攻击者能够网络访问目标系统的Web服务端口，利用方式较为简单，攻击者无需认证即可发送HTTP请求访问上述路径。"
published = "2024-07-25"
remediation = "立即升级360新天擎终端安全管理系统至V7.8及以上版本，并修复/admin_log_confcache路径认证漏洞，限制管理员权限访问，禁止网络暴露敏感日志配置。"
score = 5.5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "360新天擎终端安全管理系统信息泄露漏洞"
updated = "2024-07-25"

