[basic]
description = "Sun Netbeans Java IDE 内置的 HTTP 服务器在 Netbeans Developer 3.0 Beta 及 Forte Community Edition 1.0 Beta 版本中未正确限制 IP 地址访问权限，未能有效执行配置中指定的 IP 访问控制策略。远程攻击者无需认证即可绕过 IP 限制规则直接访问该服务器，可能导致敏感信息泄露或未授权操作。该漏洞 CVSS 评分 7.5，危害等级高。"
published = "1999-11-23T05:00:00.000"
remediation = '升级至 Apache NetBeans 最新稳定版（当前为 30），该版本已彻底移除存在安全缺陷的旧式内置 HTTP 服务器组件。如无法升级，可临时缓解：（1）在项目设置中将 HTTP Server 的 "Enable" 设为 False；（2）在全局设置中移除 HTTP Server 模块；（3）在防火墙/主机防火墙中禁止外部对端口 8082 的入站访问。'
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "Sun Netbeans Java IDE 内部 HTTP 服务器 IP 访问限制绕过漏洞"
updated = "2026-06-16T21:50:37.903"

