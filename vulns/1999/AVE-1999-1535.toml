[basic]
description = "BMC PATROL Agent 3.2.07 之前版本在处理临时文件时存在不安全的符号链接漏洞。本地用户可在共享临时目录中创建恶意符号链接，诱使以 root 权限运行的 PATROL Agent 向任意系统文件写入内容，从而实现本地权限提升，获取 root 控制权。该漏洞需要本地用户账户且利用难度较低，攻击者无需认证即可通过特制的符号链接操作实现提权。"
published = "1998-11-02T05:00:00.000"
remediation = "立即将 BMC PATROL Agent 升级至 3.2.07 或更高版本，该版本修复了临时文件创建时未验证文件所有权导致的符号链接竞争条件。如无法升级，建议以非 root 用户运行 Patrol Agent 服务，并在系统层面启用受保护模式（如将 `umask 077` 应用于 Agent 进程），同时使用 `sticky` 位目录存储临时文件以防止符号链接劫持。鉴于 BMC PATROL Agent 已属于生命周期极长的老旧产品，建议评估迁移至 BMC Helix 等现代监控平台以获得持续安全支持。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "BMC Patrol 本地符号链接权限提升漏洞"
updated = "2026-06-16T21:50:29.153"

