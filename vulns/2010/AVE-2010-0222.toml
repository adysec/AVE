[basic]
description = "Adobe Flash Player 9.0.277.0 之前版本及 10.x 系列 10.1.53.64 之前版本、Adobe AIR 2.0.2.12610 之前版本，以及 Windows/Mac OS X 平台上的 Adobe Reader 和 Acrobat 8.x 及 9.x 版本中存在无效指针引用漏洞。该漏洞源于 ActionScript Virtual Machine 2 (AVM2) 的 newfunction 指令在处理 authplay.dll 时对畸形 SWF 内容验证不足，导致内存破坏。远程攻击者可诱使用户打开特制的 SWF 文件或 PDF 文档触发此漏洞，实现任意代码执行或拒绝服务。该漏洞已在 2010 年 6 月被野外利用，CVSS 评分 7.8，危害等级高。"
published = "2010-06-08T18:30:10.007"
remediation = "升级 Adobe Flash Player 至 9.0.277.0 及以上版本（10.x 升级至 10.1.53.64 及以上），Adobe AIR 升级至 2.0.2.12610 及以上，Adobe Reader/Acrobat 8.x 升级至 8.2.3 及以上、9.x 升级至 9.3.3 及以上。如无法立即升级，可在浏览器中禁用 Flash 插件或使用 Chrome 内置沙箱版 Flash 降低风险。"
score = 7.8
severity = "HIGH"
sources = ["kev"]
title = "Adobe Flash Player 远程代码执行漏洞"
updated = "2026-06-16T23:18:02.793"

