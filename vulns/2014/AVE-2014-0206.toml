[basic]
description = "Cisco Adaptive Security Appliance (ASA) 软件的 WebVPN 登录页面存在跨站脚本（XSS）漏洞。远程攻击者无需身份认证即可向 WebVPN 登录页面的未指定参数注入恶意 Web 脚本或 HTML 代码，当管理员或用户访问特制的登录页面时，恶意脚本将在浏览器中执行，导致敏感信息泄露或会话劫持。该漏洞影响 Cisco ASA 8.4.7 及之前版本、9.1.4 及之前版本，Cisco 已发布安全公告（Bug ID CSCun19025）并提供修复版本。"
published = "2014-03-19T01:15:04.007"
remediation = "升级 Cisco ASA 软件至 8.4.8 及以上版本或 9.1.5 及以上版本，该漏洞已在后续版本中修复。如无法立即升级，可在 WebVPN 配置中启用 HTTP 严格传输安全（HSTS）并禁用未使用的 WebVPN 门户功能，同时在 ASA 上配置全局内容安全策略（CSP）以缓解 XSS 攻击风险。"
score = 6.1
severity = "MEDIUM"
sources = ["kev"]
title = "Cisco ASA WebVPN 登录页面跨站脚本漏洞"
updated = "2026-06-17T00:06:05.827"

