[basic]
description = "Squid 代理服务器在 Red Hat Linux 5.2/6.0 及其他发行版中默认将 cachemgr.cgi 脚本安装在公开可访问的 Web 目录下，导致未经身份认证的远程攻击者可利用该脚本作为跳板连接到内部或其他系统，造成信息泄露或进一步攻击。该漏洞影响 Squid 2.2 及更早版本，CVSS 评分 7.5，危害等级高。厂商已发布安全更新修复此问题。"
published = "1999-07-25T04:00:00.000"
remediation = "升级 Squid 至 2.3 及以上版本，或删除或限制 cachemgr.cgi 文件的 Web 访问权限，仅允许受信任 IP 访问该脚本。在 Apache/Nginx 中配置访问控制，添加 `allow from 127.0.0.1` 和 `deny from all` 规则。如不使用缓存管理功能，直接移除 cachemgr.cgi 文件。同时启用 Squid 的缓存管理器认证功能，设置 `acl manager proto cache_object` 和 `http_access deny manager` 规则。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "Squid cachemgr.cgi 未授权代理连接漏洞"
updated = "2026-06-16T21:48:53.680"

