[basic]
description = "i-drive Filo 软件的 HTTP 代理服务器存在缓冲区溢出漏洞，远程攻击者可通过向该代理发送超长的 HTTP GET 请求触发缓冲区溢出，从而在目标系统上执行任意命令。该漏洞影响 i-drive Filo 软件，攻击无需身份认证，攻击复杂度低，CVSS 评分 10.0，危害等级严重。厂商已发布相关安全更新修复此漏洞。"
published = "2000-06-07T04:00:00.000"
remediation = "i-drive Filo 软件已停止维护，建议立即替换为受支持的 HTTP 代理服务器（如 Squid、HAProxy）。在替换前，可在网络边界防火墙配置规则，限制对 Filo 代理服务的访问来源 IP，并部署 Web 应用防火墙（WAF）对超长 GET 请求进行拦截过滤，以降低被利用风险。"
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "i-drive Filo HTTP代理服务器缓冲区溢出远程代码执行漏洞"
updated = "2026-06-16T21:51:35.267"

