[basic]
description = 'Gauntlet Firewall 4.1/4.2/5.0、WebShield E-ppliance 100.0/300.0 及 SGI IRIX 6.5.x 系统中使用的 CyberPatrol 守护进程 "cyberdaemon" 存在远程缓冲区溢出漏洞。未经身份认证的远程攻击者可通过向目标系统发送特制的网络数据包触发该溢出，导致拒绝服务或执行任意操作系统命令。该漏洞利用门槛低，攻击者无需任何权限即可完全控制受影响设备。CVSS 评分为 10.0（严重），影响网络边界安全设备及 Unix 工作站。建议升级至厂商已修复的安全版本并限制相关服务的网络访问。'
published = "2000-05-18T04:00:00.000"
remediation = "1. 应用 Network Associates（NAI）官方安全补丁，将 Gauntlet Firewall 升级至 5.5 之后的安全版本并重启服务。2. 对于 WebShield E-appliance 100.0/300.0，同样应用 NAI 发布的对应补丁。3. 如无法立即打补丁，在防火墙配置中移除或禁用 CyberPatrol 过滤软件的 cyberdaemon 守护进程（该组件即使未授权也可被外部网络访问），并使用 Gauntlet 的 `adminchangeproducts` 命令禁止其随系统启动。4. 对于 SGI IRIX 6.5.2–6.5.5 系统，因已停止官方支持，建议通过防火墙 ACL 规则限制外部对 8999/tcp 端口的访问，或更换受支持的操作系统版本。5. 临时缓解措施：在网络边界防火墙阻断发往防火墙管理/过滤端口的未授权流量。"
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "Gauntlet Firewall 远程缓冲区溢出漏洞"
updated = "2026-06-16T21:51:43.900"

