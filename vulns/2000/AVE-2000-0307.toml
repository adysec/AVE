[basic]
description = "OpenBSD 2.6 存在权限控制缺陷，普通用户可修改系统网络接口的媒体配置参数（如速率、双工模式等），此操作本应仅限特权用户执行。攻击者利用该漏洞可篡改目标系统的网络接口配置，可能导致网络连接异常或拒绝服务。此漏洞影响所有硬件架构上的 OpenBSD 2.6 版本，CVSS 评分 4.6，危害等级中等。OpenBSD 官方已于 1999 年 11 月发布源代码补丁修复此问题。"
published = "2001-03-12"
remediation = "立即应用 OpenBSD 官方补丁 002_ifmedia.patch（执行 cd /usr/src && patch -p0 < 002_ifmedia.patch），然后重新编译内核；或直接升级到 OpenBSD 2.7 及以上版本。如在生产环境，建议升级到仍在维护的最新 OpenBSD 稳定版以获全面安全更新。"
score = 4.6
severity = "MEDIUM"
sources = ["cve"]
title = "OpenBSD 2.6 本地接口媒体配置漏洞"
updated = "2026-06-16T21:51:27.350"

