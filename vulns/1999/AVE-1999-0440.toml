[basic]
description = "IRCd（Internet Relay Chat Daemon，互联网中继聊天服务端）存在缓冲区溢出漏洞，远程攻击者无需认证即可向目标服务器发送特制的畸变数据包触发缓冲区溢出，导致攻击者在目标系统上以服务进程权限执行任意命令。该漏洞影响早期版本 IRC 服务器软件，利用方式简单且危害严重，可直接导致服务器被完全控制。"
published = "1999-01-01T05:00:00.000"
remediation = "升级 ircd 至最新版本（如 ircd-hybrid 8.2+、UnrealIRCd 6.0+），该类版本已修复此缓冲区溢出问题。若无法升级，建议停止使用已停止维护的旧版 ircd，改用活跃维护的 IRC 服务器软件，并在网络层面限制对 6667 端口的非信任来源访问。"
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "IRC ircd 远程缓冲区溢出漏洞"
updated = "2026-06-16T21:48:00.750"

