[basic]
description = "该漏洞存在于 Sendmail 8.10.0 至 8.11.5 以及 8.12.0 测试版的调试器中。当本地用户在命令行中以 -d 启动调试器时，传递给 'category' 参数的超大数值（被解释为负数）导致整数下溢或内存损坏，从而允许攻击者修改进程内存，最终可能导致攻击者获得更高的系统权限。此漏洞仅需本地访问权限即可触发，影响范围涵盖了上述所有版本的 Sendmail 软件，攻击者通过精心构造的命令行参数即可实现对目标系统的提权攻击。"
published = "2001-09-20T04:00:00.000"
