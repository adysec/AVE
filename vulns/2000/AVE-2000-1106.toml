[basic]
description = "InterScan VirusWall 3.32 及更早版本的 SMTP 网关在处理 uuencode 编码附件时存在缓冲区溢出漏洞。远程攻击者可构造包含超长文件名的 uuencode 附件邮件发送至目标 SMTP 服务，触发缓冲区溢出，进而导致拒绝服务或在系统上下文中执行任意代码。该漏洞影响 Trend Micro InterScan VirusWall 全系列早期版本，无需身份认证即可远程利用，危害严重。"
published = "2000-05-04T04:00:00.000"
remediation = "升级 InterScan VirusWall 至 3.32 以上版本以修复 SMTP 网关缓冲区溢出漏洞；在 SMTP 代理层配置规则限制附件文件名长度不超过 256 字节并过滤含超长文件名的 uuencode 编码邮件作为临时缓解措施。该产品已停止技术支持，建议迁移至 Trend Micro 当前支持的邮件安全网关产品。"
score = 10.0
severity = "CRITICAL"
sources = ["cve"]
title = "Trend Micro InterScan VirusWall SMTP 缓冲区溢出漏洞"
updated = "2026-06-16T21:51:42.710"

