[basic]
description = "WebWho+ 1.1 的 whois.cgi 程序存在命令注入漏洞，远程攻击者可通过向 TLD 参数中注入 shell 元字符（如分号、管道符等）执行任意系统命令。该漏洞影响 Tony Greenwood WebWho+ 1.1 版本，攻击者无需身份认证即可利用，CVSS 评分 10.0，危害等级严重。由于 CGI 程序未对用户输入进行有效过滤，导致攻击者可直接在目标服务器上执行恶意命令，获取系统控制权。"
published = "1999-12-26T05:00:00.000"
remediation = "立即停用 WebWho+ 1.1 的 whois.cgi 脚本，或彻底移除该 CGI 程序。由于该软件已停止维护且无安全补丁，建议迁移至其他受支持的 Whois 查询工具（如 jwhois 或 whois 命令行工具），并在 Web 服务器层面禁用 CGI 执行权限作为临时缓解措施。"
score = 10
severity = "CRITICAL"
sources = ["exploitdb"]
title = "Tony Greenwood WebWho+ 1.1 远程命令执行漏洞"
updated = "2026-06-16T21:50:49.007"

