[basic]
description = "Solution Scripts Home Free 1.0 的 search.cgi 脚本存在目录遍历漏洞，远程攻击者无需身份认证即可通过向 URL 参数中注入 `../` 序列绕过路径限制，读取服务器上的任意文件。该漏洞源于程序未对用户输入的路径参数进行充分过滤，导致攻击者可遍历目录结构，泄露敏感配置文件或系统信息。CVSS 评分 5.0，危害等级中危。"
published = "1999-01-03T05:00:00.000"
remediation = "该产品已停止维护，建议立即删除或禁用 search.cgi 脚本，或迁移至其他仍在维护的论坛/留言板系统。如必须继续使用，应在 Web 服务器（如 Apache）层面配置 URL 重写规则，过滤 `../` 等目录遍历字符，并限制脚本对文件系统的访问权限。同时建议升级至 PHP/Node.js 等现代语言编写的替代方案，避免使用已停止维护的 CGI 脚本。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "SolutionScripts Home Free 1.0 search.cgi 目录遍历漏洞"
updated = "2026-06-16T21:50:54.393"

