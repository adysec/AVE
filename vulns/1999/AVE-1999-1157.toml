[basic]
description = "Microsoft Site Server 3.0 Commerce Edition 的 AdSamples 示例目录存在配置缺陷，远程攻击者无需认证即可通过 HTTP 直接访问该目录下的 SITE.CSC 文件，该文件泄露了 SQL 数据库连接字符串等敏感信息。攻击者可利用泄露的凭据进一步渗透后端数据库，导致数据泄露。影响 Microsoft Site Server 3.0，CVSS 评分 5.0，危害等级中危。"
published = "1999-05-11T04:00:00.000"
remediation = "删除生产环境中的 AdSamples 示例目录及其所有子文件，或通过 IIS 管理器将该目录的匿名访问权限移除，仅允许管理员 IP 访问。同时确保 SITE.CSC 文件位于非 Web 可访问目录下，且数据库连接字符串使用加密存储而非明文配置。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Microsoft Site Server Commerce Edition 3.0 AdSamples 敏感信息泄露漏洞"
updated = "2026-06-16T21:50:36.980"

