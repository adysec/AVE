[basic]
description = "Apache 1.3.x HTTP Server for Windows 平台存在目录列表漏洞，远程攻击者可通过向目标服务器发送包含大量斜杠（/）字符的特制 URL 请求，绕过目录访问限制，导致服务器返回目录列表信息，泄露敏感文件路径和文件名。该漏洞影响 Apache 1.3.6/1.3.9/1.3.11/1.3.12/1.3.20 等版本，攻击无需认证，CVSS 评分 5.0，危害等级中危。官方已发布修复版本，建议升级至 Apache 1.3.22 或更高版本。"
published = "2000-05-31T04:00:00.000"
remediation = "立即升级至 Apache HTTP Server 1.3.14 或更高版本（官方于 2000-10-13 发布修复）。由于 Apache 1.3 系列已于 2010 年停止维护，建议迁移至当前受支持的 Apache 2.4 系列（最新稳定版）。如无法立即升级，可在 httpd.conf 中设置 `Options -Indexes` 禁止目录列表，并限制 `DirectoryIndex` 行为作为临时缓解。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Apache HTTP Server for Windows 目录列表泄露漏洞"
updated = "2026-06-16T21:51:52.680"

