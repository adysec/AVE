[basic]
description = "Siemens Reliant UNIX 5.4 系统中的 ppd 工具存在竞争条件漏洞。当 ppd 以 -T 选项运行时，会在 /tmp 目录下创建不安全的临时文件 ppd.trace，未对文件路径进行原子化检查。本地攻击者可通过预先创建符号链接指向目标系统文件，利用时间窗口诱导程序以特权身份覆写任意文件，导致系统文件完整性受损或权限提升。该漏洞攻击复杂度较低，但需本地访问权限。"
published = "2001-07-02T04:00:00.000"
remediation = "该漏洞影响已停止支持的 Siemens Reliant UNIX 5.4，厂商已不再提供安全更新。建议立即升级至受支持的操作系统（如现代 Linux 发行版）。临时缓解措施：移除 ppd 程序的 setuid/setgid 权限（`chmod u-s /usr/bin/ppd`），并限制仅受信用户可本地登录系统。"
score = 2.1
severity = "LOW"
sources = ["exploitdb"]
title = "Siemens Reliant UNIX ppd 竞争条件漏洞"
updated = "2026-06-16T21:54:12.370"

