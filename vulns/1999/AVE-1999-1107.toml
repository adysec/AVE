[basic]
description = "Microsoft IIS 4.0 及 Site Server 3.0 自带的 Winmsdp.exe 示例文件存在任意文件读取漏洞。远程攻击者无需身份认证即可通过向该文件发送特制请求，读取服务器上的任意文件内容，导致敏感信息泄露。攻击者可利用此漏洞获取系统配置文件、源代码等机密数据，为进一步渗透提供便利。"
published = "1999-12-31T05:00:00.000"
remediation = "删除 IIS 4.0 和 Site Server 3.0 服务器上的 Winmsdp.exe 样本文件（默认位于 /_samples/ 目录），并升级到受支持的 Windows Server 版本（如 Windows Server 2019 或更高）及对应 IIS 版本。如无法升级，在 Web 服务器上禁用 .exe 文件的脚本映射并移除 _samples 虚拟目录。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Microsoft IIS 及 Site Server Winmsdp.exe 任意文件读取漏洞"
updated = "2026-06-16T21:50:28.107"

