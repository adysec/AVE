[basic]
description = "Apache HTTP Server 1.2.5 及 1.3.1 版本在处理大量 MIME 头部时存在拒绝服务漏洞。远程攻击者无需认证，通过向目标服务器发送包含大量 MIME 头部的特制 HTTP 请求，可耗尽服务器资源致其崩溃，无法响应正常请求。该漏洞利用简单，攻击门槛低，受影响版本包括 Apache 1.2.5/1.3.1 及 UnityMail 2.0。"
published = "1999-09-03T04:00:00.000"
remediation = "升级至 Apache HTTP Server 1.3.2 或更高版本，该漏洞已在后续版本中修复。如无法立即升级，可在 httpd.conf 中通过 `LimitRequestFields` 指令限制请求头字段数量，减小 MIME 头泛滥导致拒绝服务的攻击面。"
score = 10
severity = "CRITICAL"
sources = ["cve"]
title = "Apache HTTP Server MIME Header 拒绝服务漏洞"
updated = "2026-06-16T21:49:20.597"

