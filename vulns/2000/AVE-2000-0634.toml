[basic]
description = "MIT Kerberos 4 的 KDC（密钥分发中心）程序存在拒绝服务漏洞。该程序在处理 AUTH_MSG_KDC_REQUEST 类型的认证请求时，未对请求数据进行正确的空字符终止检查，导致可接受未正确终止的畸形请求。远程攻击者无需身份认证，仅需向目标 KDC 服务发送特制的 AUTH_MSG_KDC_REQUEST 请求即可触发漏洞，使 KDC 进程异常终止或崩溃。由于 KDC 是 Kerberos 认证系统的核心组件，一旦服务中断将导致整个依赖 Kerberos 的网络认证体系瘫痪，影响范围包括使用 Kerberos 4 的所有客户端和服务端。该漏洞危害等级为中等（CVSS 5.0），主要影响网络可用性。"
published = "2000-06-09T04:00:00.000"
remediation = "升级 MIT Kerberos 到 krb5-1.2 或更高版本，该版本已包含对 KRB4 KDC 缓冲区溢出及空终止符检查缺陷的修复。若使用 krb5-1.0.x，需从 http://web.mit.edu/kerberos/www/advisories/index.html 下载 krb4kdc_10x_patch.txt 补丁并应用到 kdc/kerberos_v4.c；若使用 krb5-1.1.1，需应用 krb4kdc_111_patch.txt 补丁，同时更新 kfree.c 修复 double-free 问题。Red Hat 用户应安装 RHSA-2000:031 安全更新（up2date 或 rpm -Fvh）。对于仍在使用 KTH-krb4 的系统，务必升级至 0.10 或更高版本。临时缓解措施：在 KDC 主机防火墙规则中限制对 88 端口（UDP/TCP）的访问来源，仅允许可信的 Kerberos 客户端网段连接；同时在 kdc.conf 中设置 v4_mode = none 以禁用 Kerberos 4 兼容模式，消除攻击面。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "MIT Kerberos 4 KDC AUTH_MSG_KDC_REQUEST 空终止符检查缺失拒绝服务漏洞"
updated = "2026-06-16T21:51:58.560"

