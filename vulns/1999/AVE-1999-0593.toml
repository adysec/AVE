[basic]
description = "FreeBSD 3.3 系统中的 xmindpath 工具存在缓冲区溢出漏洞，本地攻击者可通过向该程序传递特制的 -f 参数触发缓冲区溢出，从而获取目标系统的高级权限。该漏洞影响 FreeBSD 3.3 版本，攻击者需要拥有本地系统访问权限才能利用，CVSS 评分 4.6，危害等级中危。目前已有公开的利用代码。"
published = "1999-12-01T05:00:00.000"
remediation = "升级 FreeBSD 系统到 3.3-STABLE 及以上版本或安装官方发布的安全补丁（如 1999 年 12 月的安全更新），将 xmindpath 二进制文件权限收紧并移除 setuid 位（chmod u-s /usr/bin/xmindpath），临时缓解可在无法立即升级时禁止普通用户执行该命令。"
score = 4.6
severity = "MEDIUM"
sources = ["avd"]
title = "FreeBSD xmindpath 缓冲区溢出漏洞"
updated = "2026-06-16T21:49:07.957"

