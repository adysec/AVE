[info]
author = "AVE"
description = "通过构造包含超大HTML表单字段（size/maxlength=99999999）的页面，导致IE5/Outlook Express 5等使用Microsoft HTML控件的应用程序CPU占用100%无响应"
id = "POC-AVE-1999-0866"
name = "CVE-1999-1016 PoC"
severity = "medium"
tags = ["cve-1999-1016"]
vuln_id = [
    "CVE-1999-1016",
    "AVE-1999-0866",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/ie5-dos.html"
protocol = "http"

[poc.requests.body]
content = ""
type = "raw"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["NeonBunny"]
