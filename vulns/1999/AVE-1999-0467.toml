[basic]
description = 'Microsoft Windows NT 4.0 的 RAS（远程访问服务）拨号网络功能存在凭据管理漏洞，即使用户未勾选"保存密码"选项，系统仍会将用户密码明文缓存在本地注册表或配置文件中。本地已登录攻击者可通过读取系统缓存获取其他用户的登录凭据，进而实现权限提升或横向移动。该漏洞影响 Windows NT 4.0 全系列版本（SP0 至 SP5），CVSS 评分 5.0，危害等级中等。'
published = "1999-05-27T04:00:00.000"
remediation = '升级到 Windows 2000 或更高版本操作系统，Windows NT 4.0 已停止支持且不再发布安全更新。如无法升级，通过注册表设置 HKLM\SYSTEM\CurrentControlSet\Services\RasMan\Parameters\DisableSavePassword 为 1 以禁用 RAS 密码缓存功能。'
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Microsoft Windows NT 4.0 RRAS 和 RAS 拨号网络密码缓存漏洞"
updated = "2026-06-16T21:48:59.367"

