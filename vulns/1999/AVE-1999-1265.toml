[basic]
description = "AIX 4.1.4 及 HP-UX 10.01/9.05 系统中 TCP/IP 协议栈的 socket 连接实现存在逻辑缺陷，本地用户可通过向 localhost 端口建立连接后调用 shutdown 清理 socket，随后再利用同一 socket 连接 localhost 的其他端口，导致目标系统内核崩溃拒绝服务。该漏洞攻击复杂度低，但需要本地访问权限，CVSS 评分 2.1，危害等级低。"
published = "1997-03-05"
remediation = "对于 IBM AIX 系统，升级至 AIX 4.3 或更高版本，或联系 IBM 获取对应 APAR 补丁修复 socket shutdown 后重用导致内核崩溃的问题。对于 HP-UX 系统，升级至 HP-UX 11.00 或更高版本。若无法升级，可通过限制本地用户登录或监控异常 connect-shutdown 序列行为作为临时缓解措施。"
score = 2.1
severity = "LOW"
sources = [
    "cve",
    "avd",
]
title = "IBM AIX / HP HP-UX 本地拒绝服务漏洞"
updated = "2026-06-16"

