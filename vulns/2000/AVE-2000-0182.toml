[basic]
description = "Oracle 8.1.5.x for Linux 在安装过程中会跟随符号链接创建 orainstRoot.sh 文件，且该文件被设置为全局可写权限。本地攻击者可利用此缺陷，通过预先创建符号链接指向目标文件，诱使安装程序将 orainstRoot.sh 写入具有可写权限的敏感位置，从而在 Oracle 安装完成后获取系统特权。该漏洞影响 Oracle8i Standard Edition 8.1.5 for Linux 版本，需要本地访问权限，危害等级中危。"
published = "2000-03-05T05:00:00.000"
remediation = "升级至 Oracle8i 8.1.6 及以上版本，该漏洞已在后续版本修复。如无法升级，安装完成后立即执行 `chmod 700 $ORACLE_HOME/orainstRoot.sh` 移除全局写权限，并删除 `/tmp` 下的临时安装文件；安装前使用 `chmod 0 /tmp` 临时限制 /tmp 目录写权限，防止安装过程中被符号链接攻击利用。"
score = 6.2
severity = "MEDIUM"
sources = ["epss"]
title = "Oracle Oracle8i 安装程序符号链接跟随本地权限提升漏洞"
updated = "2026-06-16T21:51:13.403"

