[basic]
description = "Check Point Firewall-1 4.0 及 4.1 版本在处理 IP 分片数据包时存在缺陷，远程攻击者无需身份认证即可向目标系统发送大量特制的畸形分片 IP 数据包，导致防火墙服务崩溃或资源耗尽，造成拒绝服务。该漏洞利用门槛低，攻击者仅需发送恶意构造的分片报文即可触发，影响运行 Check Point Firewall-1 4.0 和 4.1 版本的网络边界设备。"
published = "2000-06-06T04:00:00.000"
remediation = '升级 Check Point Firewall-1 至 4.1 Service Pack 3 及以上版本，该版本已修复畸形 IP 分片包导致的拒绝服务问题。如无法升级，可在防火墙策略中启用"分片包丢弃"选项，并配置入侵防御模块拦截异常分片流量作为临时缓解措施。'
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Check Point Firewall-1 畸形分片IP数据包拒绝服务漏洞"
updated = "2026-06-16T21:51:49.747"

