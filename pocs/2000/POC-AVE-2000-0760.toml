[info]
author = "ave"
description = "Apache::ASP 模块 1.93 及更早版本中自带的 /site/eg/source.asp 示例脚本存在任意文件写入漏洞。通过发送 GET 请求验证该脚本是否存在，若服务器返回 200 状态码则存在该脚本，可被攻击者利用向服务器写入任意文件，进而实现远程代码执行。"
id = "POC-AVE-2000-0760"
name = "Apache::ASP source.asp Example Script File Write Vulnerability PoC"
severity = "high"
tags = [
    "cve-2000-0628",
    "apache-asp",
    "file-write",
]
vuln_id = [
    "CVE-2000-0628",
    "AVE-2000-0760",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/site/eg/source.asp"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
status = [200]
type = "status"
