[basic]
description = "Solaris 操作系统中某些 setuid 程序由于对用户输入或环境变量处理不当，存在权限提升漏洞。本地已认证用户可借助特洛伊木马或不当的环境配置，使这些以 root 权限运行的程序执行其指定的命令，从而获取系统最高权限。攻击者需具备本地登录权限并能影响相关程序的执行环境方可利用该漏洞。"
published = "1999-09-01"
remediation = "应用 Sun 官方提供的相应补丁，或将存在问题的 setuid 程序移除 setuid 位，并限制普通用户对关键环境变量的修改以缓解风险。"
score = 5.0
severity = "MEDIUM"
sources = [
    "avd",
    "cve",
]
title = "Solaris 部分 setuid 程序权限提升漏洞"
