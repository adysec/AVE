[basic]
description = "Aptis Software TotalBill 3.0 的 sysgen 服务未实施任何身份认证机制，远程攻击者可直接连接该服务并指定要执行的系统命令，导致攻击者能够以 root 权限在目标服务器上执行任意命令。该漏洞影响 TotalBill 3.0 版本，攻击无需任何认证，利用复杂度低，可完全控制服务器系统，危害严重。"
published = "2000-10-20T04:00:00.000"
remediation = "立即在防火墙层面阻断对 TCP 端口 9998（sysgen 服务）的外部访问，仅允许受信任的管理 IP 连接。如业务不需要该服务，直接停用 sysgen 进程并从启动脚本中移除。由于 Aptis TotalBill 3.0 已停止维护，无法通过升级修复，建议迁移至替代计费系统。"
score = 10
severity = "CRITICAL"
sources = ["cve"]
title = "Aptis Software TotalBill 3.0 sysgen服务 远程命令执行漏洞"
updated = "2026-06-16T21:52:25.063"

