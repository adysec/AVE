[basic]
description = "Kerberos 4 (krb4) 认证协议在创建新的票据文件时存在符号链接攻击漏洞。本地攻击者可通过在系统临时目录中预先创建指向目标文件的符号链接，诱使 krb4 服务在写入新票据时覆盖任意文件，导致系统文件完整性受损。该漏洞攻击复杂度低，无需认证即可利用，影响范围包括使用 krb4 协议的系统。由于需要本地访问权限，实际危害相对有限。"
published = "2001-06-27T04:00:00.000"
remediation = "建议升级至 Kerberos 5 (krb5) 替代已停止维护的 krb4，krb5 已修复票据文件的符号链接竞争条件。如无法升级，确保 krb4 票据目录 `/tmp` 使用粘滞位 (chmod +t /tmp)，并限制本地非授权用户登录系统以降低攻击面。"
score = 2.1
severity = "LOW"
sources = ["redhat"]
title = "MIT Kerberos 4 符号链接攻击任意文件写入漏洞"
updated = "2026-06-16T21:54:16.250"

