[info]
author = "AVE"
description = "Symantec Norton Utilities 2.0 for Windows 95 中 TUNEOCX.OCX ActiveX 控件被错误标记为对脚本安全，远程攻击者可通过恶意网页调用控件的 run 方法执行任意命令。PoC 模拟攻击页面。"
id = "POC-AVE-1999-1484"
name = "Symantec Norton Utilities TUNEOCX.OCX ActiveX RCE PoC"
severity = "medium"
tags = [
    "cve-1999-1380",
    "activex",
    "norton-utilities",
]
vuln_id = [
    "CVE-1999-1380",
    "AVE-1999-1484",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["TUNEOCX"]
