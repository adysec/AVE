[basic]
description = "Visible Systems Razor 4.1 配置管理工具对密码文件使用弱加密算法，本地攻击者可读取并破解存储的密码哈希，从而获取系统提升权限。该漏洞属于本地攻击，攻击者需拥有系统本地访问权限，利用难度较低。受影响的版本包括 Razor 4.1 及更早版本，建议升级至修复版本或采取额外访问控制措施。"
published = "2000-07-05T04:00:00.000"
remediation = "升级 Razor 至 4.1 及以上版本，或联系厂商获取包含更强加密机制的最新版本。如无法升级，可在 Razor 配置中切换为本地操作系统认证方式替代 Razor 内置认证，并确保数据库文件的 OS 权限正确设置，仅允许授权管理员访问。"
score = 4.6
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Visible Systems Razor 4.1 密码文件弱加密漏洞"
updated = "2026-06-16T21:52:01.463"

