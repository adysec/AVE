[basic]
description = "Norton AntiVirus 5.00.01C 版本在 Novell NetWare 客户端环境下存在自动保护服务失效漏洞。当第一个用户从系统注销后，防毒软件的自动保护服务无法正常重新启动，导致后续用户登录后系统处于无防毒保护状态。攻击者利用此漏洞需具备本地登录权限，在用户注销后即可绕过防毒软件的实时监控，使系统暴露于恶意软件威胁之下。该漏洞影响 Norton AntiVirus 5.00.01C 及可能的相关版本，CVSS 评分 10.0，危害等级严重。"
published = "2000-10-20T04:00:00.000"
remediation = "立即将 Norton AntiVirus for Novell Netware 升级至 5.00.02 或更高版本，该版本已修复用户注销后自动保护服务无法重启的问题。如无法升级，可在系统登录脚本中添加 `navapstart` 命令强制重启自动保护服务，或在用户注销后手动重启 Norton Auto-Protect 服务。鉴于该产品已停止支持，建议迁移至 Symantec Endpoint Protection 14.3 以上版本或当前受支持的端点防护方案。"
score = 10
severity = "CRITICAL"
sources = ["cve"]
title = "Symantec Norton AntiVirus Novell客户端自动防护服务失效漏洞"
updated = "2026-06-16T21:52:29.560"

