[basic]
description = "Joomla! com_myblog 组件 3.0.329 版本的 index.php 存在目录遍历漏洞，远程未认证攻击者可通过 task 参数传入目录遍历序列（../）读取服务器任意文件。该漏洞源于对用户输入的 task 参数未进行路径规范化校验，攻击者可构造恶意路径遍历序列读取敏感系统文件（如 /etc/passwd、配置文件等），影响使用该组件的 Joomla! 站点，CVSS 评分 5.0（中危），属路径遍历类漏洞（CWE-22）。"
published = "2010-04-26"
remediation = "卸载存在目录遍历漏洞的 com_myblog 组件 3.0.329，替换为官方维护的安全替代组件；升级 Joomla! 至最新受支持版本；对 task 参数进行路径规范化校验，拒绝包含 '../' 或空字节编码的恶意输入。"
score = 5.0
severity = "MEDIUM"
sources = [
