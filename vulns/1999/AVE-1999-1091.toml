[basic]
description = "Matt Wright 开发的 download.cgi 1.0 版本存在路径遍历漏洞。远程攻击者可通过向 f 参数提交包含 `..` 的恶意请求，绕过路径限制读取服务器上的任意文件，导致敏感信息泄露。该漏洞无需认证即可利用，攻击复杂度低，影响广泛使用该 CGI 脚本的 Web 服务器。"
published = "1999-09-09T04:00:00.000"
remediation = '立即将 download.cgi 升级至 2.0 或更高版本（该版本已修复路径遍历问题），或彻底移除该脚本并替换为现代文件下载方案。如无法升级，须在脚本中对 `f` 参数进行输入过滤，拒绝包含 `../`、`..\` 或空字节的请求，并限制可访问目录范围。同时建议在 Web 服务器层面（如 Apache 的 `mod_rewrite`）拦截包含 `..` 的 URL 请求作为纵深防御。'
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Matt Wright download.cgi 任意文件读取漏洞"
updated = "2026-06-16T21:50:18.610"

