[basic]
description = "Microsoft Excel 97 及 2000 版本在处理外部文本文件中的 Excel 宏语言（XLM）宏时，未向用户发出安全警告，导致攻击者可通过诱导用户打开包含恶意 XLM 宏的文本文件触发宏病毒执行。该漏洞影响 Excel 97/2000 等版本，CVSS 评分 7.2，危害等级高。攻击者无需身份认证，利用社会工程学手段即可实现任意代码执行。"
published = "2000-04-03T04:00:00.000"
remediation = 'Excel 97 用户需先安装 Office 97 Service Release 2，再安装 MS00-022 专用补丁；Excel 2000 用户应安装 Office 2000 Service Release 1。由于该版本已停止支持，建议升级到受支持的 Office 版本（如 Office 2016 及以上），同时在 Excel 中启用宏安全级别为"禁用所有宏，并发出通知"，并禁止从外部文本文件自动加载执行 XLM 宏。'
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "Microsoft Excel 97/2000 XLM 文本宏自动执行漏洞"
updated = "2026-06-16T21:51:22.867"

