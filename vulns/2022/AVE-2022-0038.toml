[basic]
description = "Linux 内核的 MACsec 驱动中存在释放后使用（UAF）漏洞。创建 macsec 虚拟设备时未增加对 real_dev（底层物理设备）的引用计数，导致 real_dev 被提前释放后 macsec 设备仍可访问其内存，从而触发 UAF。本地攻击者可通过顺序创建和删除特制的 macsec 设备导致内核内存破坏，可能实现权限提升或系统崩溃。该漏洞影响 Linux 内核各版本，CVSS 评分 7.8，危害等级高。"
published = "2025-02-26T07:01:15.620"
remediation = "建议立即将 Linux 内核升级至 5.17.15、5.18.3 或 5.19 及以上版本。如无法升级内核，可手动应用补丁：在 drivers/net/macsec.c 的 macsec_dev_init() 中添加 dev_hold_track(real_dev)，在 macsec_free_netdev() 中添加 dev_put_track(real_dev)，确保 macsec 设备对 real_dev 持有引用计数，避免释放后使用。补丁参考 git.kernel.org 稳定树提交 196a888ca657、78933cbc143b、d130282179aa。"
score = 7.8
severity = "HIGH"
sources = ["msrc"]
title = "Linux Kernel macsec 释放后使用漏洞"
updated = "2026-06-17T05:17:54.840"

