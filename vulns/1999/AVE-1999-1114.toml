[basic]
description = "thttpd HTTP 服务器 2.03 及更早版本存在路径遍历漏洞，远程攻击者可通过向目标服务器发送包含多个连续斜杠（/）的 GET 请求，绕过路径限制读取服务器上的任意文件。该漏洞源于对 URL 路径中斜杠字符的处理缺陷，攻击者无需身份认证即可利用，可能导致敏感信息泄露。受影响版本包括 thttpd 2.03 及之前所有版本，CVSS 评分 5.0，危害等级中等。"
published = "1999-12-31T05:00:00.000"
remediation = "升级 thttpd 至 2.04 或更高版本（2.04 版本修复了文件名解析中的路径遍历漏洞）。如无法升级，可在 Web 服务器前端（如反向代理或 WAF）配置规则，拦截包含多个连续斜杠（如 //）的 GET 请求路径作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "thttpd HTTP服务器 任意文件读取漏洞"
updated = "2026-06-16T21:50:28.777"

