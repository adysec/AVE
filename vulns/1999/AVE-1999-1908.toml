[basic]
description = "Microsoft PowerPoint 95 和 97 版本存在安全漏洞，当用户通过 Internet Explorer 等浏览器打开特制的 PowerPoint 文档时，幻灯片放映功能可能被利用来自动执行嵌入的程序，而无需用户确认或交互。攻击者可利用此漏洞在目标系统上执行任意程序，影响范围包括使用上述版本 PowerPoint 及 IE 浏览器的用户。"
published = "1999-12-31"
remediation = "升级到 Microsoft Office 2000 或更高版本，这些版本改进了文档打开安全机制，在自动运行嵌入程序前会提示用户确认。在 Internet Explorer 中取消勾选「在浏览器中打开 Office 文档」选项，将 Office 文档打开方式设为下载后手动打开。同时将宏安全级别设为「高」，禁止未签名的自动执行行为。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "Microsoft PowerPoint 95/97 程序自动运行漏洞"
updated = "2026-06-16"

