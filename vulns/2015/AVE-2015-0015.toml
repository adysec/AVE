[basic]
description = "MAGMI（Magento Mass Importer）插件存在跨站脚本（XSS）漏洞，远程攻击者可通过向 `web/magmi.php` 的 `profile` 参数或 `web/magmi_import_run.php` 的 `QUERY_STRING` 注入恶意 Web 脚本或 HTML，在受害者浏览器会话中执行任意 JavaScript 代码，导致敏感信息泄露或会话劫持。攻击无需认证但需诱使用户访问特制链接，CVSS 4.3 中危。厂商至今未发布官方补丁，建议禁用该插件或限制访问权限。"
published = "2015-02-24T17:59:04.817"
remediation = "升级 Magento 至 Magento 2 系列（Magento 1 已于 2020 年 6 月停止安全支持），并使用 Magento 2 原生导入功能替代 MAGMI 插件。如无法立即迁移，删除或重命名 magmi/web/ 目录下的 magmi.php 和 magmi_import_run.php 文件，或通过 Web 服务器（Nginx/Apache）配置访问控制，仅允许白名单 IP 访问 /magmi/ 路径，并对所有输入参数做 HTML 实体编码过滤。"
score = 4.3
severity = "MEDIUM"
sources = ["nuclei"]
title = "Magento Server MAGMI 插件跨站脚本漏洞"
updated = "2026-06-17T00:23:32.403"

