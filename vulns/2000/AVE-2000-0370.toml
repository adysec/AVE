[basic]
description = "INN（InterNetNews）2.2.1 及更早版本存在缓冲区溢出漏洞，远程攻击者可通过向目标新闻服务器发送特制的恶意文章格式数据触发该漏洞，导致服务崩溃拒绝服务。该漏洞利用无需认证，攻击者仅需网络访问权限即可实施攻击，影响大量使用 INN 的邮件和新闻服务器系统，CVSS 评分 5.0，危害等级中危。"
published = "2000-10-20T04:00:00.000"
remediation = "升级 INN 至 2.2.2 或更高版本。Caldera OpenLinux 用户应安装 CSSA-1999-038 提供的更新包；SuSE Linux 用户应安装 suse_security_announce_34 对应的补丁包。如无法立即升级，可在 innd.conf 中限制可投递文章的客户端 IP 范围，或禁用远程新闻投递功能（nnrpd -r）作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "INN 2.2.1 及更早版本缓冲区溢出远程拒绝服务漏洞"
updated = "2026-06-16T21:51:33.303"

