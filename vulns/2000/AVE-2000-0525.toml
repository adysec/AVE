[basic]
description = "Roxen WebServer 2.0.69 之前版本存在访问控制绕过漏洞，远程攻击者通过在 URL 中插入空字节（%00）即可绕过服务器访问限制，遍历并列出任意目录内容，以及读取服务器端源代码文件（如 .asp、.cgi 等脚本源码）。该漏洞无需认证即可利用，攻击复杂度低，主要影响早期版本 Roxen WebServer 2.0.x 部署环境。"
published = "2000-07-21T04:00:00.000"
remediation = "立即将 Roxen WebServer 升级至 2.0.69 或更高版本，该版本修复了空字节注入漏洞。如无法升级，可在 Web 服务器前端部署反向代理（如 Nginx/Apache），过滤包含 `%00` 的 URL 请求作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Roxen WebServer 空字符注入信息泄露漏洞"
updated = "2026-06-16T21:52:14.087"

