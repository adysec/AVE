[basic]
description = 'Microsoft IIS 4.0 的 ISAPI .ASP 解析机制存在缓冲区溢出漏洞，远程攻击者可通过向服务器发送包含超长 "LANGUAGE" 参数的恶意脚本标签触发该漏洞，导致任意命令执行。该漏洞影响 IIS 4.0 版本，攻击者无需身份认证即可利用，但需要目标服务器启用了 ASP 解析功能。由于该漏洞年代较早，微软已发布安全更新修复。'
published = "2001-01-09T05:00:00.000"
remediation = "安装 Microsoft 为 IIS 4.0 发布的 ISAPI ASP LANGUAGE 缓冲区溢出安全修补程序（可从 Microsoft 支持获取 QFE 热修复），或升级至 IIS 5.0 及以上版本以彻底消除风险。临时缓解措施可部署 URLScan ISAPI 筛选器，在请求到达 ASP 引擎前拦截包含超长 LANGUAGE 参数（超过 256 字符）的恶意请求。"
score = 4.6
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Microsoft IIS 4.0 ISAPI 缓冲区溢出漏洞"
updated = "2026-06-16T21:53:15.453"

