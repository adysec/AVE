[basic]
description = "Joomla! 的 Cmi Marketplace 组件（com_cmimarketplace）0.1 版本中存在目录遍历漏洞，远程攻击者通过向 index.php 传递含有 `..`（点点）序列的 viewit 参数，可遍历服务器上任意目录，泄露敏感文件路径信息。该漏洞无需身份认证即可远程利用，危害等级中危。目前官方尚未发布补丁，建议禁用该组件或限制 viewit 参数输入。"
published = "2009-05-01T16:30:00.233"
remediation = '立即在 Joomla 后台卸载 com_cmimarketplace 组件（扩展管理→管理→查找并卸载）。若无法卸载，在网站根目录 .htaccess 中添加 RewriteRule ^index\.php.*viewit=.*\.\..* - [F,L] 拦截目录遍历请求；同时限制 index.php?option=com_cmimarketplace 仅允许可信管理 IP 访问。该组件已停止维护，建议迁移至仍在更新的替代组件。'
score = 5
severity = "MEDIUM"
sources = ["nuclei"]
title = "Joomla! Cmi Marketplace 目录遍历漏洞"
updated = "2026-06-16T23:07:23.623"

