[basic]
description = "AN-HTTPd 1.2b 默认携带的示例 CGI 脚本（test.bat、input.bat、input2.bat、envout.bat）未对用户输入进行有效过滤，远程攻击者可通过向这些脚本提交包含 shell 元字符（如管道符、分号等）的特制请求，在服务器上以 Web 服务进程权限执行任意系统命令。该漏洞影响 AN-HTTPd 1.2b 及可能更早版本，攻击无需认证，利用门槛低，可导致服务器被完全控制。"
published = "1999-11-02"
remediation = "立即将 AN-HTTPd 1.2b 替换为仍在维护的 Web 服务器（如 Nginx、Apache httpd 或 IIS）。在完成迁移前，立即删除或禁用 AN-HTTPd 安装目录下的示例 CGI 脚本文件（test.bat、input.bat、input2.bat、envout.bat），并在 Web 服务器配置中禁止对 .bat 文件的 CGI 执行权限。若业务临时无法迁移，应在网络层面限制仅允许受信 IP 访问该 Web 服务端口，阻断外部直接访问。"
score = 7.5
severity = "HIGH"
sources = [
    "avd",
    "cve",
]
title = "AN-HTTPd 示例CGI脚本命令注入漏洞"
updated = "2026-06-16"

