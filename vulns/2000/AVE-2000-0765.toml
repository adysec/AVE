[basic]
description = "Cisco Secure ACS for Windows NT 的 CSAdmin 模块存在缓冲区溢出漏洞，远程攻击者无需身份认证即可向目标服务器发送特制的大尺寸数据包，触发缓冲区溢出，导致拒绝服务甚至远程执行任意代码。该漏洞影响 CiscoSecure ACS Server 2.4(2) 及更早版本，对系统安全构成严重威胁。"
published = "2000-12-11T05:00:00.000"
remediation = "升级 CiscoSecure ACS Server 至 2.4(3) 或更高版本，Cisco 已发布修复补丁。若无法立即升级，应在防火墙或 ACL 中限制对 CSAdmin 模块管理端口（默认 TCP 2002）的访问，仅允许可信管理地址段连接，避免暴露于不可信网络。该产品已停止维护，建议尽早迁移至 Cisco Identity Services Engine (ISE) 替代方案。"
score = 10
severity = "CRITICAL"
sources = ["exploitdb"]
title = "Cisco Secure ACS for Windows NT 远程缓冲区溢出漏洞"
updated = "2026-06-16T21:53:03.690"

