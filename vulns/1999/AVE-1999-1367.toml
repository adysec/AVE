[basic]
description = "LakeWeb Filemail CGI 脚本存在命令注入漏洞，远程攻击者可通过在收件人电子邮件地址中插入 shell 元字符（如管道符、分号等）触发该漏洞，导致任意命令执行。该漏洞源于程序未对用户输入进行充分过滤，攻击者无需身份认证即可利用，影响使用该 CGI 脚本的 Web 服务器。CVSS 评分 7.5，危害等级高。"
published = "1998-11-09T05:00:00.000"
remediation = "立即停止使用 LakeWeb Filemail CGI 脚本，该产品已停止维护且厂商已不存在。如必须使用邮件发送功能，应替换为支持参数化 API 的现代邮件发送方案（如 PHPMailer、Python smtplib），并对用户输入的所有收件人地址进行严格过滤，禁止包含 `|`、`;`、`` ` ``、`$()` 等 shell 元字符。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "LakeWeb Filemail CGI 远程命令执行漏洞"
updated = "2026-06-16T21:49:50.153"

