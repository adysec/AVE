[basic]
description = "True North Software Internet Anywhere Mail Server 2.3.x 的 POP3 服务在处理用户名时存在缓冲区溢出漏洞，远程攻击者可通过发送超长用户名触发缓冲区溢出，导致拒绝服务或在目标系统上执行任意命令。该漏洞影响 Internet Anywhere Mail Server 2.3.x 版本，攻击者无需身份验证即可远程利用，CVSS 评分 5.0，属于中等严重度漏洞。攻击者只需向 POP3 服务发送畸形的超长用户名即可触发漏洞，可能导致服务崩溃或获得服务器权限。"
published = "1999-10-01T04:00:00.000"
remediation = "建议立即升级 True North Internet Anywhere Mail Server 至 2.3.1 或更高版本，或升级至 3.0 以上版本。若无法立即升级，请在防火墙层面限制 POP3 端口(110)仅允许可信 IP 访问，或暂时禁用 POP3 服务作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "True North Software Internet Anywhere Mail Server POP3 缓冲区溢出漏洞"
updated = "2026-06-16T21:50:49.750"

