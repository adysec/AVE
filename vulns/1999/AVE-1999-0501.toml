[basic]
description = "Sun Solaris 7.0 系统中的 lpset 命令在处理命令行参数时存在缓冲区溢出漏洞。由于程序未对用户输入的打印机名称等参数进行长度校验，本地攻击者可通过构造超长参数触发栈溢出，覆盖返回地址并执行任意代码，从而将普通用户权限提升至 root。该漏洞属于本地利用，攻击者可借助 setuid 位安装的 lpset 程序完成权限提升，影响运行 Solaris 7 且未打补丁的主机。"
published = "1999-05-11T04:00:00.000"
remediation = "升级到已修复该问题的 Solaris 补丁版本（建议安装 Sun 补丁簇 107115-xx 或更高版本，使用 patchadd 命令安装）。在无法立即打补丁前，可临时移除 /usr/bin/lpset 的 setuid 权限（执行 chmod u-s /usr/bin/lpset），并限制其仅由 lp 系统用户访问，以消除本地提权风险。"
score = 7.2
severity = "HIGH"
sources = ["exploitdb"]
title = "Sun Solaris 7.0 lpset 本地缓冲区溢出提权漏洞"
updated = "2026-07-17T00:00:00Z"

