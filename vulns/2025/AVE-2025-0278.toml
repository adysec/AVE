[basic]
description = "红帆 ioffice 办公管理系统的 NetCAUserLogin 接口存在 SQL 注入漏洞，攻击者可在用户登录认证过程中向相关参数注入恶意的 SQL 语句，绕过身份验证机制或窃取后端数据库中的敏感信息。该漏洞可被远程利用，无需高级权限，影响范围较广，危害等级高。"
published = "0702"
remediation = "升级红帆 ioffice 至官方最新版本，厂商已修复 NetCAUserLogin 接口的 SQL 注入漏洞。如无法升级，在应用层对 NetCAUserLogin 接口的输入参数实施参数化查询或预编译处理，严格过滤特殊字符，并配置 Web 应用防火墙（WAF）拦截 SQL 注入攻击载荷作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "红帆 ioffice NetCAUserLogin SQL注入漏洞"
updated = "0702"

