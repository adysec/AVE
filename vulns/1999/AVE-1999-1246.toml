[basic]
description = "Solaris 2.4/2.3 的 unix_scheme 模块及 Solaris 2.5.1/2.5 的 PAM（可插拔认证模块）存在缓冲区溢出漏洞。本地攻击者可通过向 passwd、yppasswd、nispasswd 等使用这些模块的程序发送特制输入触发缓冲区溢出，从而获取 root 权限。该漏洞影响 Solaris 2.3 至 2.5.1 版本，CVSS 评分 7.2，危害等级高。"
published = "1997-05-13T04:00:00.000"
remediation = "建议升级到 Solaris 2.5.1 并安装 Sun 安全补丁（如 2.4 应用补丁 103630-xx、2.5/2.5.1 应用补丁 103633-xx）。在无法立即打补丁时，可临时移除 /usr/bin/passwd、/usr/bin/yppasswd、/usr/bin/nispasswd 的 setuid root 权限（chmod u-s），并限制普通用户本地登录以缓解本地提权风险。"
score = 7.2
severity = "HIGH"
sources = ["exploitdb"]
title = "Sun 操作系统 passwd / yppasswd / nispasswd 本地权限提升漏洞"
updated = "2026-06-16T21:49:50.657"

