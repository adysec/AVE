[basic]
description = "Joomla! 的 JA Showcase (com_jashowcase) 组件存在目录遍历漏洞，远程攻击者无需身份认证即可通过向 index.php 的 jashowcase 动作中 controller 参数传递 `..`（点点）序列，绕过路径限制，读取服务器上任意敏感文件。该漏洞源于程序对用户输入的路径参数缺乏充分的过滤与校验，属于 CWE-22 路径遍历类漏洞，CVSS 评分 5.0，危害等级中危。受影响版本为 Joomla! 使用 com_jashowcase 组件的相关部署。"
published = "2010-03-08T15:30:00.777"
remediation = "该组件发布于 2010 年且已停止维护，不存在官方补丁。建议立即从 Joomla 后台卸载 com_jashowcase 组件，改用其他仍在维护的 Joomla 展示类扩展（如 RSMediaGallery）替代。如无法立即卸载，可在网站根目录 .htaccess 中添加 RewriteRule 拦截 controller 参数中包含 ../ 的请求，或通过 WAF 规则过滤 controller 参数中的目录遍历序列作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["nuclei"]
title = "Joomla! JA Showcase 组件目录遍历漏洞"
updated = "2026-06-16T23:17:11.003"

