[basic]
description = "Eudora 及 Eudora Light 3.05 之前版本在处理电子邮件日期字段时存在输入验证缺陷。远程攻击者可发送包含特定日期（如 1970 年之前的日期或当前日期 100 年后的日期）的恶意邮件，触发被零除错误或段错误，导致邮件客户端崩溃及用户邮箱数据损坏。利用条件简单，仅需构造特殊邮件发送给目标用户。该漏洞影响范围较广，CVSS 评分 5.0，危害等级中等。"
published = "1998-07-29T04:00:00.000"
remediation = "升级 Eudora 或 Eudora Light 至 3.05 及以上版本，该版本已修复日期解析导致的除零错误和段错误。如无法升级，建议在邮件服务器端过滤包含异常日期字段的邮件作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Qualcomm Eudora 及 Eudora Light 邮件客户端远程拒绝服务漏洞"
updated = "2026-06-16T21:50:27.730"

