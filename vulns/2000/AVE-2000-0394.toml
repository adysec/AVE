[basic]
description = "Solaris 操作系统中 ufsrestore 工具存在缓冲区溢出漏洞，本地攻击者可通过向 ufsrestore 传递超长路径名参数触发栈溢出，从而覆盖返回地址劫持程序执行流程，最终获取 root 权限。该漏洞影响 Solaris 2.5/2.6/7.0/8 等多个版本，CVSS 评分 7.2，危害等级高。利用该漏洞需要拥有本地系统访问权限，无需其他特殊条件。"
published = "2000-06-14T04:00:00.000"
remediation = "安装 Sun Security Bulletin #210 中针对对应 Solaris 版本的补丁包（Solaris 7: 107746-xx, Solaris 8: 108891-xx）。临时缓解措施可执行 `chmod 000 /usr/lib/fs/ufs/ufsrestore` 移除 ufsrestore 的 setuid root 特权位，仅允许管理员在需要恢复操作时临时恢复权限。"
score = 7.2
severity = "HIGH"
sources = ["exploitdb"]
title = "Sun Solaris ufsrestore 本地缓冲区溢出漏洞"
updated = "2026-06-16T21:51:48.330"

