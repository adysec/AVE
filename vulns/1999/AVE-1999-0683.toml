[basic]
description = "Microsoft IIS 4.0（Windows NT 4.0）存在日志绕过漏洞，远程攻击者可通过向目标 IIS 服务器发送特制的 HTTP 请求，利用该漏洞绕过 IIS 的日志记录功能，从而在未留下访问记录的情况下进行恶意操作。该漏洞影响运行 Windows NT 4.0 上的 IIS 4.0 版本，攻击者无需身份认证即可利用，危害等级中等。微软已在后续安全更新中修复此漏洞。"
published = "1999-01-01"
remediation = "升级至 Windows 2000 及以上版本自带的 IIS 5.0 或更高版本，或迁移至现代 Windows Server 系统使用 IIS 7+。如无法升级，安装 Microsoft 安全更新 MS99-013 修补日志绕过漏洞，并启用 IIS 日志记录中的扩展日志格式以增强审计能力。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Microsoft IIS 4 日志记录绕过漏洞"
updated = "1999-01-01"

