[basic]
description = "Linux 内核 rtw88 Realtek 无线网卡驱动的 USB 探测函数 rtw_usb_probe() 中存在内存泄漏漏洞。当在驱动初始化的特定路径触发错误时，ieee80211_alloc_hw() 分配的 hw 对象未能通过 goto 语句跳转至释放逻辑，导致内核内存泄漏。本地攻击者可通过插入特制 USB 设备触发该错误处理路径，反复利用可耗尽系统内存导致拒绝服务。该漏洞影响使用 Realtek rtw88 驱动的 Linux 系统，开发者已通过在错误路径中引入 goto 语句确保资源释放来修复此问题。"
published = "2025-10-01T12:15:47.570"
remediation = "建议将 Linux 内核升级至 6.3.4 或更高版本，该版本已合入修复提交 6cc92379b80a。如无法升级内核，可手动 cherry-pick 补丁提交 48181d285623 或 6cc92379b80a 至当前内核源码并重新编译 rtw88 模块。临时缓解措施可卸载 rtw88 内核模块（rmmod rtw88_usb）并禁用 Realtek USB 无线网卡的使用。"
score = 5.5
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux Kernel rtw88 驱动 usb probe 内存泄漏漏洞"
updated = "2026-06-17T06:45:23.677"

