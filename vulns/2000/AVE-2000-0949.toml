[basic]
description = "Gnome Lokkit 防火墙软件包 0.41 之前版本存在端口访问控制不当漏洞。该防火墙未能正确限制对部分端口的访问，即使用户未开放任何服务，攻击者仍可绕过防火墙规则直接访问受保护端口。未经身份认证的远程攻击者可利用此漏洞，通过网络发送特制请求绕过防火墙策略，导致机密性、完整性和可用性部分受损。攻击条件简单，无需认证即可远程触发。"
published = "2000-10-20T04:00:00.000"
remediation = "升级 gnome-lokkit 至 0.41 或更高版本，该版本已修复端口访问控制逻辑，确保未开放服务对应的端口被正确限制。如无法升级，可结合 iptables 手动配置防火墙规则，显式拒绝非必要端口的入站连接作为临时缓解措施。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "GNOME Lokkit 防火墙安全绕过漏洞"
updated = "2026-06-16T21:52:29.440"

