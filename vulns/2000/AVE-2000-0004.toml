[basic]
description = "ZBServer Pro 1.5 存在缓冲区溢出漏洞，远程攻击者可通过向目标 Web 服务发送超长 GET 请求触发该漏洞，导致缓冲区边界溢出，进而实现任意代码执行。该漏洞影响 ZBServer Pro 1.50 版本，CVSS 评分 10.0，危害等级严重。由于该漏洞已有公开利用代码，未打补丁的系统面临远程被完全控制的风险。"
published = "1999-12-22"
remediation = "立即升级 ZBServer Pro 至 1.5 以上版本，或迁移至受支持的替代产品（如 Apache/Nginx）。若无法升级，在防火墙/边界路由器上限制对 ZBServer 服务端口（默认 80）的访问来源 IP，仅允许可信网段连接。同时部署 WAF 规则过滤超长 GET 请求。"
score = 10.0
severity = "CRITICAL"
sources = [
    "cve",
    "epss",
]
title = "ZBServer Pro 1.5 远程缓冲区溢出漏洞"
updated = "2026-06-16"

