[basic]
description = "SGI IRIX 6.3 系统中的 df 命令存在缓冲区溢出漏洞，本地攻击者可通过向 df 命令传入特制的超长参数触发缓冲区溢出，覆盖返回地址后执行任意代码，从而获取 root 权限。该漏洞影响 SGI IRIX 6.3 版本，利用条件是攻击者需拥有本地系统访问权限，CVSS 评分 7.2，危害等级高。"
published = "1997-07-16T04:00:00.000"
remediation = "安装 SGI 提供的 IRIX 安全补丁 19970505-02-PX，升级到已修复的 IRIX 版本。如无法立即打补丁，可执行 `chmod u-s /usr/sbin/df` 移除 df 的 setuid 权限作为临时缓解措施，或使用 AUSCERT 提供的 overflow_wrapper 工具限制命令行参数长度（建议 MAXARGLEN=32）并记录异常调用。由于 SGI IRIX 已停止维护，建议迁移至受支持的现代操作系统。"
score = 7.2
severity = "HIGH"
sources = ["exploitdb"]
title = "SGI IRIX df 本地权限提升漏洞"
updated = "2026-06-16T21:47:22.730"

