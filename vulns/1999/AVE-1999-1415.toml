[basic]
description = '某些调制解调器未实现或配置了零秒的防护时间（Guard Time），导致攻击者可将 Hayes 命令集转义序列 "+++" 嵌入 ICMP 数据包、电子邮件主题、IRC 消息等网络流量中，远程触发调制解调器执行 ATH、ATH0 等任意 AT 命令。该漏洞影响多款未启用防护时间的调制解调器设备，CVSS 评分 7.5，危害等级高。受影响的设备默认不具备防护机制，数据流中的普通字符序列即可被误解析为命令转义序列，造成未授权的调制解调器操作。'
published = "1998-09-27T04:00:00.000"
remediation = "将调制解调器的 S12 寄存器（逃逸序列保护时间）设置为非零值，推荐设为 10（即 1 秒保护时间），通过 AT 指令 `ATS12=10` 写入并保存。该配置要求 `+++` 序列前后必须有至少 1 秒的空闲时间，可有效防止来自邮件正文、ICMP 报文等数据流中的误触发。如果调制解调器不支持 S12 配置，应升级固件或替换为支持保护间隔的型号。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "多厂商调制解调器 AT 命令远程代码执行漏洞"
updated = "2026-06-16T21:49:59.507"

