[basic]
description = "gnapster 和 knapster 是 Napster 网络的 P2P 客户端软件，其文件共享功能未对请求文件类型进行充分限制，仅默认允许 MP3 文件传输但未实际校验。远程攻击者可通过指定目标文件的绝对路径，绕过预期限制读取客户端系统上的任意文件（如密码文件、配置文件等），导致敏感信息泄露。该漏洞影响 John Donoghue Knapster 0.9 及 1.3.8 版本，CVSS 评分 7.5，危害等级高危。"
published = "1999-05-01T04:00:00.000"
remediation = "立即停止使用 Knapster 客户端，该软件已停止维护且不再有安全更新。建议卸载 Knapster 并改用其他受支持的 Napster 兼容客户端（如 Napster 官方客户端）。如无法立即卸载，可在防火墙或路由器层面阻止该程序对外部 Napster 服务器的 6699/TCP 连接作为临时缓解。"
score = 7.5
severity = "HIGH"
sources = ["exploitdb"]
title = "John Donoghue Knapster/gnapster 客户端任意文件读取漏洞"
updated = "2026-06-16T21:51:39.690"

