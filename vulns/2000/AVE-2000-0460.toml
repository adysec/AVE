[basic]
description = "Netscape Professional Services FTP Server 1.3.6 存在路径遍历漏洞，远程攻击者无需身份认证即可通过向 FTP 服务发送包含 `..`（点点）序列的特制请求，突破目录限制读取服务器上的任意文件。该漏洞利用难度低，攻击者可借此获取敏感配置文件或系统关键信息，导致信息泄露。CVSS 评分 10.0，危害等级严重。"
published = "2000-06-21T04:00:00.000"
remediation = '由于 Netscape 公司已终止运营，该 FTP Server 产品不再维护，建议立即迁移至其他受支持的 FTP 服务器（如 vsftpd、ProFTPD 或 FileZilla Server）。迁移前作为临时缓解措施，可在服务器配置文件中对用户输入路径进行严格过滤，拒绝包含 "../" 或 "..\" 等目录遍历序列的请求，并将 FTP 服务运行在低权限沙箱环境中以限制目录访问范围。'
score = 10
severity = "CRITICAL"
sources = ["cve"]
title = "Netscape Professional Services FTP Server 路径遍历漏洞"
updated = "2026-06-16T21:52:02.193"

