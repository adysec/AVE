[basic]
description = "Sun Solaris 2.5.1 的 rpc.statd 服务存在 RPC 调用转发漏洞，远程攻击者可通过 SM_MON 和 SM_NOTIFY 命令将伪造的 RPC 调用转发至本地操作系统，进而利用该机制触发 automountd 等其他组件的远程代码执行。该漏洞影响 Sun Solaris 2.5.1 版本，CVSS 评分 7.5，危害等级高，无需身份认证即可远程利用。"
published = "1999-06-07T04:00:00.000"
remediation = "升级 Solaris 至 2.6 及以上版本，该漏洞已在后续版本修复。如无法升级，可禁用 rpc.statd 服务（`/etc/init.d/rpc stop; rm /etc/rc3.d/S73nfs.client`），或在防火墙层面阻止外部对 RPC 端口 111/TCP、111/UDP 及 rpc.statd 动态端口的访问。同时建议限制 NFS 仅在内网可信网络使用。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "Sun Solaris rpc.statd RPC调用转发漏洞"
updated = "2026-06-16T21:48:30.887"

