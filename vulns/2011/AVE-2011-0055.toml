[basic]
description = "Android vold 卷管理守护进程在处理 PF_NETLINK 套接字消息时存在整数溢出漏洞，未对负索引进行有效边界检查，导致内存破坏。本地攻击者可通过向 vold 发送特制的 NETLINK 消息触发该漏洞，成功利用后可提升至 root 权限执行任意代码。该漏洞影响 Android 2.x 至 3.0 版本（2.3.4 之前），Gingerbreak 工具已公开其利用方法。"
published = "2011-06-09T10:36:27.680"
remediation = "升级 Android 系统至 2.3.4 或更高版本，该版本在 DirectVolume::handlePartitionAdded 方法中修复了符号整数检查缺陷，阻止了通过 PF_NETLINK 套接字发送负索引值触发内存破坏的本地提权攻击。如无法升级，可限制本地 shell 访问权限作为临时缓解措施。"
score = 7.8
severity = "HIGH"
sources = ["kev"]
title = "Open Handset Alliance Android vold 卷管理整数溢出权限提升漏洞"
updated = "2026-06-16T23:30:11.197"

