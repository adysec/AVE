[basic]
description = "Sun Microsystems Solaris 8 及 9 版本（以及部分早期版本）中的 /usr/ucb/ps 工具存在本地信息泄露漏洞。本地攻击者可通过向该工具传递 -e 选项，读取任意进程的环境变量及敏感信息（如临时密码、API 密钥等），导致敏感数据暴露。该漏洞利用条件简单，攻击者仅需拥有本地访问权限即可实施，CVSS 评分 2.1，危害等级低。"
published = "1999-12-31T05:00:00.000"
remediation = "建议将 Solaris 升级至 Sun 发布的相关内核及 ucb 工具补丁版本（Solaris 8 安装补丁 109327 系列、Solaris 9 安装 112874 系列后版本），或通过 SunSolve 下载对应 Recommended Patch Cluster 更新 /usr/ucb/ps。临时缓解措施：使用 chmod 750 /usr/ucb/ps 并对目录设置受限权限，仅允许 root 及受信任用户执行，同时用 /usr/bin/ps 替代该工具以避免环境信息泄露。"
score = 2.1
severity = "LOW"
sources = ["cve"]
title = "Sun Solaris 8/9 本地信息泄露漏洞"
updated = "2026-06-16T21:50:46.783"

