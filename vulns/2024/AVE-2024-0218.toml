[basic]
description = "微信公众平台-无限回调系统存在 SQL 注入漏洞，漏洞源于程序在处理 /user/ajax.php?act=siteadd 接口的 POST 请求时，未对用户提交的 siteUrl 等参数进行有效过滤和转义，攻击者可将恶意 SQL 语句拼接注入到后端数据库查询中。未经身份认证的远程攻击者通过构造特制的请求包即可触发该漏洞，从而窃取数据库敏感信息、绕过登录认证，甚至进一步获取服务器控制权限。该漏洞利用门槛低、危害较大，影响使用该无限回调系统的相关站点。建议对所有用户输入参数进行严格过滤，并采用参数化查询以修复此漏洞。"
published = "0726"
remediation = "建议立即升级至码云微信公众平台无限回调系统最新修复版本（建议联系厂商获取最新安全版本），修复 siteUrl 参数的 SQL 注入漏洞。临时缓解措施：在 WAF 层面拦截 siteUrl 参数中的 SQL 注入特征（如单引号、UNION、SELECT 等关键字），配置数据库账户最小权限原则（仅授予必要的增删改查权限，禁止 DROP/ALTER 等高危权限），启用 WAF 的 SQL 注入防护规则集，部署数据库审计监控异常查询。开发层面需修复代码使用参数化查询/预编译语句，对 siteUrl 参数实施严格的白名单校验（仅允许合法 URL 格式），禁止直接拼接 SQL 语句。"
score = 5
