[basic]
description = "Solaris 8 及更早版本中的 ufsrestore 工具存在缓冲区溢出漏洞，由于程序在处理超长路径名时未正确检查输入长度，导致栈缓冲区溢出。本地攻击者可通过向 ufsrestore 命令传递特制的长路径名参数触发该漏洞，成功利用可获得 root 权限，完全控制受影响系统。该漏洞影响 Solaris 2.5/2.6/7.0/8 版本，CVSS 评分 7.2，危害等级高。需系统本地访问权限，无需认证即可利用。"
published = "2000-06-14T04:00:00.000"
remediation = "立即安装 Sun Security Bulletin #210 中提供的对应补丁：Solaris 2.5/2.5.1 安装补丁 105721-xx，Solaris 2.6 安装补丁 105722-xx，Solaris 7 安装补丁 107256-xx，Solaris 8 安装补丁 108528-xx。如无法打补丁，可通过 chmod 700 /usr/lib/fs/ufs/ufsrestore 限制 ufsrestore 仅 root 可执行，或使用 RBAC 移除普通用户的 ufsrestore 执行权限作为临时缓解措施。"
score = 7.2
severity = "HIGH"
sources = ["epss"]
title = "Sun Solaris ufsrestore 本地缓冲区溢出漏洞"
updated = "2026-06-16T21:51:48.330"

