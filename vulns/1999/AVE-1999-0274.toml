[basic]
description = "Bluestone Sapphire Web 服务器存在会话劫持漏洞，其会话 ID 生成算法过于简单且可预测，攻击者无需身份认证即可通过枚举或猜测会话 ID 的方式劫持合法用户的会话，从而获取未授权访问权限。该漏洞影响 Bluestone Sapphire Web 服务器的多个版本，CVSS 评分 7.5，危害等级高，建议升级至修复版本或实施会话加固措施。"
published = "2000-04-11T04:00:00.000"
remediation = "升级 Bluestone Sapphire Web Server 至最新版本或迁移至受支持的 Web 服务器（如 Apache/Nginx）。在无法升级时，在应用层实施强随机 Session ID 生成机制，并启用 HTTPS 加密传输防止会话劫持。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "Bluestone Sapphire Web Server 会话劫持漏洞"
updated = "2026-06-16T21:48:52.427"

