[info]
author = "AVE"
description = "检测目标 IIS 服务器是否存在 ISAPI 扩展权限提升漏洞。通过向目标发送 HTTP 请求并检查响应头的 Server 字段，识别 Microsoft IIS 2.0/3.0/4.0 版本。若检测到受影响版本，则存在通过 ISAPI 扩展以 SYSTEM 权限执行任意代码的风险。"
id = "POC-AVE-1999-0058"
name = "Microsoft IIS ISAPI GetExtensionVersion 远程代码执行漏洞 PoC"
severity = "high"
tags = ["cve-1999-0412"]
vuln_id = [
    "CVE-1999-0412",
    "AVE-1999-0058",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "header"
type = "word"
words = [
    "Microsoft-IIS/2",
    "Microsoft-IIS/3",
    "Microsoft-IIS/4",
]
