[basic]
description = "AVTECH AVN801 DVR 存在安全绕过漏洞，攻击者可通过绕过管理员登录验证码(CAPTCHA)机制，在无需合法凭据的情况下直接访问设备管理后台。该漏洞源于登录模块对验证码的验证逻辑存在缺陷，允许远程攻击者通过网络请求实现对设备管理权限的未授权获取。CVSS 评分 9.8，危害等级严重。受影响设备多用于安防监控领域，一旦被利用可导致视频监控系统被完全控制、敏感视频数据泄露等严重后果。"
published = "2019-12-27T17:15:15.857"
remediation = "AVTECH 官方未针对此漏洞发布固件更新，该设备已停止支持。建议立即将设备从公网断开，仅在内网使用，并在防火墙层面限制对 80/554 端口的访问来源 IP。如业务允许，应更换为受支持的 DVR 设备，并禁用远程管理功能作为临时缓解措施。"
score = 9.8
severity = "CRITICAL"
sources = ["nuclei"]
title = "AVTECH AVN801 DVR 安全绕过漏洞"
updated = "2026-06-16T23:58:12.247"

