[basic]
description = "赛蓝企业管理系统EHR模块中EHR_Holidays/SubmitUploadify接口存在任意文件上传漏洞，由于对文件上传功能缺乏有效的文件类型验证和内容过滤，未经身份认证的远程攻击者可构造multipart/form-data POST请求向/EHRModule/EHR_Holidays/SubmitUploadify?FolderId=1&UserId=1接口上传恶意脚本文件（如WebShell），成功上传后可直接访问执行任意代码，实现远程代码执行(RCE)，攻击者无需认证即可发起攻击，危害等级严重。"
published = "0812"
remediation = "建议立即升级赛蓝企业管理系统至官方已修复的安全版本（联系厂商获取 2024 年后的补丁包），并在 Web 服务器层面对 /EHRModule/EHR_Holidays/SubmitUploadify 接口增加身份认证与文件类型白名单校验，禁止上传 .aspx/.jsp/.php 等可执行脚本文件；临时缓解措施可在反向代理或 WAF 处拦截该路径的非授权 multipart 上传请求，并将上传目录设置为不可执行脚本权限。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "赛蓝 企业管理系统 任意文件上传漏洞"
updated = "0812"

