[basic]
description = "FreeBSD 内核中的 mmap 内存映射函数存在安全漏洞，未能正确检查文件的不可修改（immutable）和仅追加（append-only）标志位。本地攻击者可通过 mmap 创建文件的可写内存映射，绕过操作系统的文件保护机制，直接修改本应受保护的只读或仅可追加文件的内容，导致权限提升和数据完整性破坏。该漏洞影响 FreeBSD 及 NetBSD 操作系统，CVSS v2 评分 10.0，危害等级严重。"
published = "1998-02-20T05:00:00.000"
remediation = "升级 FreeBSD 至 2.2.8 及以上版本，或应用内核补丁修改 vm_mmap.c 中 mmap 系统调用，使其在建立可写共享映射 (MAP_SHARED|PROT_WRITE) 时检查文件标志位，拒绝映射设置了 UF_IMMUTABLE/SF_IMMUTABLE/UF_APPEND/SF_APPEND 的文件。同时提升内核安全级别 (sysctl kern.securelevel) 至 1 以上以防止普通用户修改文件标志。"
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "FreeBSD mmap 函数安全特性绕过漏洞"
updated = "2026-06-16T21:48:09.107"

