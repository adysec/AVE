[basic]
description = "Novell BorderManager 3.0 及 3.5 存在 URL 过滤绕过安全漏洞，远程攻击者可通过在请求 URL 中对字符进行编码（如 URL 编码）的方式，绕过 BorderManager 的 URL 过滤规则访问被限制的 Web 资源。该漏洞允许攻击者规避企业安全策略，访问本应被阻止的恶意网站或受限内容，CVSS 评分 5.0，危害等级中危。厂商未发布官方补丁，建议升级至不受影响版本。"
published = "2000-07-05"
remediation = "升级 Novell BorderManager 至 3.0 SP1 或更高版本，该补丁已修复 URL 编码绕过问题。由于 BorderManager 3.x 已停止技术支持，建议迁移至替代方案（如 OpenText 后续产品或其他防火墙/代理解决方案），并在迁移前启用严格的 URL 过滤规则并对特殊编码字符进行双重校验。"
score = 5.0
severity = "MEDIUM"
sources = ["cve"]
title = "Novell BorderManager URL过滤安全绕过漏洞"
updated = "2026-06-16"

