[basic]
description = "Disney Go Express Search 存在信息泄露与未授权访问漏洞。该软件在用户系统上运行 HTTP 服务器，远程攻击者无需身份认证即可通过网络连接访问该服务，窃取或篡改用户的搜索信息。攻击者利用此漏洞可获取用户搜索记录等敏感数据，CVSS 评分 2.6，危害等级低。受影响用户需关闭该服务或采取防火墙规则限制外部访问。"
published = "1999-12-12T05:00:00.000"
remediation = '立即卸载 Disney Go Express Search 程序，该软件已停止维护且不再有安全更新。可通过 Windows 的"添加/删除程序"功能进行卸载。卸载后检查系统是否有残留的 HTTP 服务进程，确保端口未被非法占用。临时缓解措施可在防火墙中阻止该程序的所有入站连接。'
score = 2.6
severity = "LOW"
sources = ["cve"]
title = "Disney Go Express Search 远程信息访问与修改漏洞"
updated = "2026-06-16T21:49:30.870"

