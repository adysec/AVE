[basic]
description = "ActiveHelper LiveHelp Live Chat 插件（WordPress）中 server/offline.php 存在多个跨站脚本（XSS）漏洞，在 3.1.0 及更早版本中，远程攻击者无需身份认证即可通过 MESSAGE、EMAIL 或 NAME 参数注入任意 Web 脚本或 HTML，当管理员或其他用户访问受影响页面时脚本执行，导致敏感信息窃取、会话劫持等危害。"
published = "2014-07-01T14:55:05.017"
remediation = "立即停用并删除 ActiveHelper LiveHelp Live Chat 插件，该插件已于 2017 年关闭下架且不再接收安全更新。建议迁移至其他仍在维护的 WordPress 在线客服插件（如 WP Live Chat Support 或 Chaty）。如因业务依赖暂时无法删除，至少升级到 4.7.0 版本（已知最后版本），并在 Web 应用防火墙（WAF）层面添加针对 server/offline.php 中 MESSAGE、EMAIL、NAME 参数的输入过滤规则，拦截 <script> 等 HTML 标签。"
score = 4.3
severity = "MEDIUM"
sources = ["nuclei"]
title = "WordPress Plugin ActiveHelper LiveHelp Live Chat 跨站脚本漏洞"
updated = "2026-06-17T00:10:09.490"

