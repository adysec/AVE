[basic]
description = "ZBServer Pro 存在源代码泄露漏洞，远程攻击者无需认证，只需在请求 URL 末尾附加一个英文句点（.）即可绕过服务器对可执行文件的访问限制，直接读取 ASP、PHP 等脚本文件的源代码。该漏洞可能导致数据库连接凭证、业务逻辑等敏感信息泄露，为后续深入攻击提供便利。CVSS 评分 5.0，危害等级中等。"
published = "1999-12-01T05:00:00.000"
remediation = 'ZBServer 已停止维护且无官方补丁，建议立即迁移至 Apache 或 Nginx 等现代 Web 服务器。若无法立即替换，可在 Web 服务器前部署反向代理过滤包含 "/./" 的 URL 请求，并禁止 .exe/.bat 等可执行文件通过 HTTP 直接下载。'
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "ZBServer Pro 源码泄露漏洞"
updated = "2026-06-16T21:50:48.240"

