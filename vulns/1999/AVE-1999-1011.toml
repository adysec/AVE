[basic]
description = "Microsoft Windows NT 4.0 系统的 Netbt.sys（NetBIOS over TCP/IP 驱动）存在拒绝服务漏洞。该组件在处理 DNS 主机名解析结果时未对返回数据进行充分校验，当远程恶意 DNS 服务器针对主机名查询返回 0.0.0.0 这一异常 IP 地址时，Netbt.sys 会因解析逻辑缺陷触发系统崩溃（蓝屏）。攻击者需能够控制或劫持目标系统所使用的 DNS 服务器，使其返回特制的 0.0.0.0 响应，即可在无需身份认证的情况下远程诱导 Windows NT 4.0 主机崩溃重启，造成服务不可用。该漏洞影响所有运行 Windows NT 4.0 且依赖 NetBIOS over TCP/IP 解析的网络主机，攻击前提为目标主机向受攻击者操控的恶意 DNS 服务器发起主机名查询。"
published = "1999-12-31T05:00:00.000"
remediation = "建议立即为 Windows NT 4.0 安装微软官方安全补丁（升级至 Service Pack 4 及以上版本，该补丁已修复 Netbt.sys 解析 0.0.0.0 导致的崩溃问题）。若无法立即升级，应在网络边界防火墙限制仅允许使用受信任的内部 DNS 服务器，阻断来自不可信外部 DNS 服务器的响应，并禁用或限制 NetBIOS over TCP/IP 以临时缓解远程拒绝服务风险。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Microsoft Windows NT 4.0 Netbt.sys 拒绝服务漏洞"
updated = "2026-06-16T21:49:58.753"

