[basic]
description = "Sendmail 8.10.0 至 8.11.5 以及 8.12.0 beta 版本的调试功能存在输入验证错误。由于 tTflag() 函数使用有符号整数处理带 `-d` 开关的调试参数中的 category 部分，本地攻击者可提供过大的数值触发有符号整数溢出，使其被解释为负数，该值作为 trace vector 的索引可用于在进程内存范围内进行写入操作从而修改进程内存，并可能获取提升的权限。由于 `-d` 命令行参数在程序丢弃提升权限之前处理，攻击者无需身份认证即可利用此漏洞实现完整的系统沦陷，目前已有公开的利用代码。"
published = "2001-09-20T04:00:00.000"
remediation = "将 Sendmail 8.10.0 至 8.11.5 及 8.12.0 beta 升级至官方修复版本。如使用 8.11 分支，请升级到 Sendmail 8.11.6；如使用 8.12 分支，请升级到 Sendmail 8.12.1 或更高稳定版。可通过 ftp.sendmail.org 下载对应源码包重新编译安装，或使用系统包管理器（如 yum、apt、FreeBSD ports）更新 sendmail 软件包并重启服务。若暂时无法完成升级，可在 /etc/mail/sendmail.mc 中注释禁用 debugger (-d) 命令行选项的相关配置，重新生成 sendmail.cf 并重启服务，以此限制本地用户使用调试功能，作为临时缓解措施。"
score = 4.6
severity = "MEDIUM"
sources = ["redhat"]
title = "Sendmail debugger 命令行参数本地缓冲区溢出代码执行漏洞"
updated = "2026-06-16T21:54:41.970"

