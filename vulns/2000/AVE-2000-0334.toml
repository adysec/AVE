[basic]
description = "Solaris 系统中的 netpr 程序存在缓冲区溢出漏洞，本地攻击者可通过向 -p 选项提交超长参数触发该漏洞，导致缓冲区溢出并能够以 root 权限执行任意代码。该漏洞影响 Solaris 2.6、7.0 及 8.0 版本，攻击者需具有本地用户身份登录系统后方可利用此漏洞，成功利用后可完全控制受影响系统。"
published = "2000-05-12T04:00:00.000"
remediation = "安装 Sun 官方补丁 (Patch ID 106541-02 或更新版本) 修复 netpr 缓冲区溢出漏洞。如无法打补丁，可移除 netpr 程序的 setuid 权限作为临时缓解措施：`chmod u-s /usr/lib/print/netpr`。限制本地用户对受影响系统的交互式访问也可降低利用风险。"
score = 7.2
severity = "HIGH"
sources = ["exploitdb"]
title = "Sun Solaris netpr 本地缓冲区溢出漏洞"
updated = "2026-06-16T21:51:39.103"

