[basic]
description = "CrackLib 2.5版本中存在缓冲区溢出漏洞，本地用户可通过向GECOS字段传入超长字符串触发栈缓冲区溢出，导致内存损坏。攻击者利用此漏洞可执行任意代码并获取root权限，攻击前提是拥有本地系统访问权限。"
published = "1997-12-14"
remediation = "升级CrackLib至2.7及以上版本以修复缓冲区溢出问题。同时建议限制系统GECOS字段的输入长度，并对用户输入进行严格的长度校验和过滤。"
score = 7.2
severity = "HIGH"
sources = [
    "cve",
    "avd",
]
title = "CrackLib 2.5 GECOS字段缓冲区溢出漏洞"
