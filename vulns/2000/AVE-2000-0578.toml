[basic]
description = "CUPS（Common Unix Printing System）1.04及更早版本中存在请求文件未正确删除的安全缺陷，远程攻击者无需身份认证即可通过网络向目标系统的CUPS服务发送特制请求，导致系统无法正常处理后续打印任务，造成拒绝服务。该漏洞影响早期Linux发行版中集成的CUPS组件，攻击复杂度低，但仅影响服务可用性。CUPS开发团队已在后续版本中修复此问题。"
published = "2000-06-16T04:00:00.000"
remediation = "升级 CUPS 至 1.0.5 或更高版本，官方补丁位于 ftp://ftp.easysw.com/pub/cups/1.0.5/cups-DoS.patch。如无法升级，可在 CUPS 配置文件 /etc/cups/cupsd.conf 中限制远程访问，将 Listen 绑定到 127.0.0.1 仅允许本地打印请求。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Easy Software Products CUPS 拒绝服务漏洞"
updated = "2026-06-16T21:51:53.657"

