[info]
author = "ave"
description = "HAMcards Postcard CGI 1.0 未正确过滤收件人邮箱地址中的 shell 元字符，远程攻击者可通过注入分号、管道符等执行任意系统命令。PoC 通过发送包含 shell 元字符的请求验证 CGI 端点可达。"
id = "POC-AVE-1999-1366"
name = "HAMcards Postcard CGI 1.0 命令注入漏洞 PoC"
severity = "high"
tags = ["cve-1999-1153"]
vuln_id = [
    "CVE-1999-1153",
    "AVE-1999-1366",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/cgi-bin/postcard"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "postcard",
    "HAMcards",
    "Subject:",
    "From:",
]
