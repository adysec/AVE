[basic]
description = "Joomla! 的 Core Design Scriptegrator 插件 1.4.1 版本中存在目录遍历漏洞。该漏洞位于 plugins/system/cdscriptegrator/libraries/highslide/js/jsloader.php 文件中，远程攻击者无需身份认证即可通过 files[] 参数传入包含目录遍历序列（如 ../）的特制请求，实现任意文件读取。在特定配置下，该漏洞可被进一步利用为文件包含导致任意代码执行。此漏洞 CVSS 评分 7.5，危害等级高。"
published = "2010-02-27T00:30:00.883"
remediation = "立即升级 Core Design Scriptegrator 插件至最新版本（如已停止维护则彻底卸载该插件）。临时缓解措施：在 Web 服务器层面（如 .htaccess 或 Nginx 配置）对 plugins/system/cdscriptegrator/ 目录限制访问，并过滤 files[] 参数中的目录遍历序列（如 ../），仅允许白名单内的合法文件路径。"
score = 7.5
severity = "HIGH"
sources = ["nuclei"]
title = "Core Design Joomla! Scriptegrator 插件目录遍历漏洞"
updated = "2026-06-16T23:16:47.643"

