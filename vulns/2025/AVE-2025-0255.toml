[basic]
description = "深信服运维安全管理系统（堡垒机）/fort/portal_login 接口存在操作系统命令注入漏洞。攻击者可在登录请求中通过 loginUrl 参数注入恶意系统命令，利用反引号包裹命令实现远程代码执行，可导致服务器被完全控制，危害严重。"
published = "2025-01-01"
remediation = "厂商已发布安全更新，建议升级至最新版本；如无法升级，应在 Web 应用防火墙中配置规则拦截 loginUrl 参数中的 shell 元字符（如反引号、$、| 等），并对用户输入进行严格过滤。"
score = 7.5
severity = "HIGH"
sources = ["hwpoc"]
