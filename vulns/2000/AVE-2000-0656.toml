[basic]
description = "Mirabilis ICQ Web Front 服务的留言簿 CGI 程序存在缓冲区溢出漏洞，远程攻击者可通过发送包含超长 name 参数的 URL 请求触发拒绝服务。该漏洞影响 ICQ 2000a、99b 及更早版本，攻击者无需身份认证即可远程利用，导致服务崩溃或无响应，CVSS 评分 5.0（AV:N/AC:L/Au:N/C:N/I:N/A:P），属于可用性影响类漏洞。"
published = "2000-05-29T04:00:00.000"
remediation = "tags.<value>禁用过期的 ICQ Web Front 服务或升级到包含安全补丁的版本，建议安装 2000 年后的安全更新包，同时在 Web 服务器上启用 URL 参数长度限制并过滤恶意的长参数请求，以防止 CGI 程序被长参数消耗导致 DoS 攻击。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Mirabilis ICQ 2000.0a Guestbook 长URL拒绝服务漏洞"
