[basic]
description = "AMD 处理器 L1 数据队列（L1D Cache）中存在瞬态执行漏洞，属于瞬态调度程序攻击（Transient Scheduler Attack）。本地攻击者可通过利用处理器预测执行过程中的时序差异，在特权边界外推断 L1D 缓存中的敏感数据内容，导致信息泄露。该漏洞影响多款 AMD 处理器产品，CVSS 评分 5.6，危害等级中等。建议用户及时更新 AMD 提供的微码补丁以缓解此漏洞。"
published = "2025-07-08T17:15:31.723"
remediation = "建议更新 AMD 处理器微码（Microcode）至厂商提供的最新版本，可通过主板厂商提供的 BIOS/UEFI 固件更新安装。在 AMD 官方发布修复前，可启用操作系统级的内核页表隔离（KPTI）和分支预测清理（如 Linux 内核的 MITIGATION_L1D_FLUSH）缓解跨权限的 L1D 缓存侧信道泄露。"
score = 5.6
severity = "MEDIUM"
sources = ["msrc"]
title = "AMD 处理器 L1 数据队列瞬态执行信息泄露漏洞"
updated = "2026-06-17T07:36:34.060"

