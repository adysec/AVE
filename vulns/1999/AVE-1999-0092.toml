[basic]
description = "SGI IRIX 系统及其他类 Unix 操作系统（包括 BSD/OS、DG/UX、Debian、HP-UX、IBM AIX、Solaris）中 xlock 屏幕锁定程序存在缓冲区溢出漏洞。本地攻击者可利用该漏洞向 xlock 发送特制输入数据触发缓冲区溢出，从而获取 root 权限。该漏洞影响广泛的多款 Unix 操作系统，CVSS 评分 7.2，危害等级高。"
published = "1997-07-16T04:00:00.000"
remediation = "SGI IRIX 系统应立即升级 xlock 程序至厂商已修复版本（如 IRIX 6.4 对应安全补丁），其他受影响系统（BSD/OS 2.1、Debian 1.3、HP-UX 10.34、IBM AIX 4.2、Solaris 2.5.1 等）应从各自厂商获取 xlock 安全更新。若无法立即打补丁，作为临时缓解措施可移除 xlock 的 setuid root 权限位（执行 chmod u-s /usr/bin/X11/xlock），限制本地用户以提权方式运行 xlock 程序。"
score = 7.2
severity = "HIGH"
sources = ["epss"]
title = "SGI IRIX xlock 命令缓冲区溢出漏洞"
updated = "2026-06-16T21:47:23.497"

