[basic]
description = "Microsoft IIS 4.0 及 5.0 版本存在输入验证不当漏洞（CWE-20），远程攻击者可通过向目标服务器发送大量包含大量转义字符（百分号编码）的特制 URL 请求，导致 IIS 服务消耗过多系统资源而崩溃，造成拒绝服务。该漏洞无需身份认证即可远程利用，CVSS 评分 7.5，危害等级高，影响 Windows NT/2000 平台上的 IIS Web 服务器。"
published = "2000-04-12T04:00:00.000"
remediation = "安装 Microsoft 安全公告 MS00-023 对应补丁，或升级至 IIS 6.0 及以上版本。如无法升级，可在 IIS 管理器中限制 URL 请求长度和转义字符数量作为临时缓解措施。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = """Let me analyze this task. I need to generate a Chinese title for CVE-2000-0258 in the format "厂商 产品 漏洞类型" (Vendor Product Vulnerability Type). From the known information: - Vulnerability: CVE-2000-0258 - Product: Microsoft IIS 4.0/5.0 - Type: Denial of Service (拒绝服务) - The title should follow the pattern: "厂商 产品 漏洞类型" So: Microsoft IIS 4.0/5.0 拒绝服务漏洞 The sample given is: Microsoft Windows TCP/IP 远程代码执行漏洞 So following that pattern: Microsoft IIS 4.0/5.0 URL 拒绝服务漏洞 Wait, the original title from AVD already says "Microsoft IIS 4.0/5.0 URL 拒绝服务漏洞". Let me think about whether I should simplify it or keep it. The format asks for: "厂商 产品 漏洞类型". So "Microsoft IIS 4.0/5.0 拒绝服务漏洞" would work, but the original already has "URL" in the title to be more specific. Since CVSS score is 7.5 (HIGH) and it's a DoS, keeping it specific is good. Actually, looking at the sample more carefully: "Microsoft Windows TCP/IP 远程代码执行漏洞" - this is "Vendor Product VulnerabilityType Vulnerability". So the format is essentially "Vendor Product VulnerabilityType". For this: Microsoft IIS 4.0/5.0 拒绝服务漏洞 Or with the specific mechanism being URL-based: Microsoft IIS 4.0/5.0 URL 拒绝服务漏洞 I think the more specific one is better since it includes the attack vector (URL with escaped characters). Let me go with: Microsoft IIS 4.0/5.0 URL 拒绝服务漏洞 This is 20-100 characters, Chinese, follows the format."""
updated = "2026-06-16T21:51:20.377"

