[basic]
description = "Solaris 2.5.1 系统的 automountd 守护进程在处理挂载请求时未正确过滤 shell 元字符（如分号、管道符等），本地攻击者可通过构造特制的 mount 参数注入恶意命令并以 root 权限执行。该漏洞也影响通过 NIS/NFS 环境配置 automount 映射的系统，可能被远程利用。受影响版本为 Solaris 2.5.1 及早期版本，CVSS 评分 10.0，危害严重。"
published = "1997-11-26T05:00:00.000"
remediation = "升级 Solaris 系统至 2.6 及以上版本，或安装 Sun 官方补丁 105403-01/105404-01。如无法升级，建议禁用 automountd 服务（`/etc/init.d/autofs stop`），并在 /etc/auto_master 中移除敏感挂载项以缓解风险。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "Sun Solaris automountd 本地权限提升漏洞"
updated = "2026-06-16T21:47:55.103"

