[basic]
description = "NetWin dMailWeb 与 cwMail 2.6g 及更早版本存在身份认证绕过漏洞。远程攻击者通过在用户名参数中插入回车符（CR）绕过服务器的认证检查，从而未经授权利用该服务器作为邮件中继代理（mail relay）发送垃圾邮件。该漏洞影响 cwMail 和 dMailWeb 邮件服务器软件，攻击者无需任何身份凭证即可远程利用，CVSS 评分 5.0，危害等级中危。"
published = "2000-06-23T04:00:00.000"
remediation = '升级至 NetWin cwMail 2.6h 或更高版本，该版本修复了用户名中回车符导致的认证绕过问题。如无法升级，在邮件服务器上限制 SMTP 中继仅对经过认证的信任 IP 开放，并在应用层过滤用户名中的控制字符（\r\n）。若产品已停止维护，建议迁移至仍受支持的邮件服务器软件（如 Postfix、Exim）。'
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "NetWin dMailWeb 和 cwMail 身份验证绕过漏洞"
updated = "2026-06-16T21:52:06.333"

