[basic]
description = "Mozilla Firefox 3.5.x 至 3.5.14、3.6.x 至 3.6.11、Thunderbird 3.0.x 至 3.0.10 及 3.1.6 之前版本、SeaMonkey 2.x 至 2.0.10 之前版本中存在内存破坏漏洞。当 JavaScript 启用时，远程攻击者可通过构造特制网页，利用 nsCSSFrameConstructor::ContentAppended 与 appendChild 方法在交错调用时的索引跟踪错误，创建多个 frame 触发内存破坏，从而实现远程代码执行。该漏洞 CVSS 评分 9.8，危害等级严重，已于 2010 年 10 月被 Belmoo 恶意软件在野外利用。"
published = "2010-10-28T00:00:05.237"
remediation = "升级 Firefox 至 3.6.12 或 3.5.15 及以上版本，Thunderbird 升级至 3.1.6 或 3.0.10 及以上版本，SeaMonkey 升级至 2.0.10 及以上版本。如无法立即升级，可在浏览器中禁用 JavaScript（工具→选项→内容→取消勾选启用 JavaScript）作为临时缓解措施。"
score = 9.8
severity = "CRITICAL"
sources = ["kev"]
title = "Mozilla Firefox nsCSSFrameConstructor::ContentAppended 远程代码执行漏洞"
updated = "2026-06-16T23:23:28.500"

