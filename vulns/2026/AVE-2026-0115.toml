[basic]
description = "FatFs（ChaN FatFs）R0.16 及更早版本的 exFAT 文件系统同步逻辑中存在除零错误漏洞。当攻击者构建特制的 exFAT 镜像，使 BPB_NumClusEx 字段值为 0 时，在调用 sync_fs() 写同步操作过程中会触发除零异常，导致程序崩溃或拒绝服务（DoS）。该漏洞需物理接触设备或通过网络分发恶意更新介质触发，影响使用 FatFs 的嵌入式系统、IoT 设备及固件环境，CVSS 评分 4.6，危害等级中危。"
published = "2026-07-01T15:17:12.443"
remediation = "立即升级至 FatFs R0.16 或更高版本。R0.16 已包含部分挂载时的除数检查保护，可降低触发风险。对于无法升级的嵌入式系统，可在 sync_fs() 函数入口处增加 n_fatent <= 2 的提前返回检查，避免除零操作。同时，在挂载外部 exFAT 卷前校验 BPB_NumClusEx 字段，若为零则拒绝挂载该卷。上游 runZero 已在 GitHub 发布补丁示例（https://github.com/runZeroInc/vulns-2026-fatfs-chance），建议参考集成。"
score = 4.6
severity = "MEDIUM"
sources = ["hwpoc"]
title = "ChaN FatFs exFAT 除零错误漏洞"
updated = "2026-07-02T14:38:07.643"

