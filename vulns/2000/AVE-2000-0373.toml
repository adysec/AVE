[basic]
description = "Intel Express 8100 ISDN 路由器在处理 ICMP 数据包时存在拒绝服务漏洞。远程攻击者可通过向目标设备发送特制的超大或分片 ICMP 数据包，导致路由器 CPU 资源耗尽或系统崩溃，造成网络服务中断。攻击无需身份认证，仅需网络可达即可触发。该漏洞影响 Intel Express 8100 ISDN 路由器设备，CVSS 评分 5.0，危害等级中等。目前已有公开的利用代码，建议用户升级固件或配置访问控制列表（ACL）过滤异常 ICMP 数据包以缓解风险。"
published = "2000-05-19T04:00:00.000"
remediation = "该设备已停产且不再受 Intel 支持，建议立即将 Intel Express 8100 ISDN 路由器替换为支持安全更新的现代设备。如无法替换，可在上游防火墙配置规则丢弃超大 ICMP 数据包（iptables 规则：iptables -A INPUT -p icmp -m length --length 1480:65535 -j DROP），并限制 ICMP 分片包速率（iptables -A INPUT -p icmp -f -m limit --limit 10/s -j ACCEPT），同时禁用不必要的 ICMP 类型（如 ICMP timestamp、address mask 请求）以降低攻击面。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Intel Express 8100 ISDN 路由器 ICMP 数据包拒绝服务漏洞"
updated = "2026-06-16T21:51:45.740"

