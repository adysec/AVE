[basic]
description = "Linux 内核 BPF 子系统中存在内存泄漏漏洞。当通过 fentry 挂载 BPF 程序到内核函数失败时，已分配的 BPF trampoline 镜像未能正确释放，导致内核内存泄漏。本地低权限攻击者可通过加载特定 BPF 程序（如挂载到已释放的 trap_init 函数）触发该漏洞，通过检查 /proc/kallsyms 可发现残留的 trampoline 映像，最终可能导致敏感信息泄露。该漏洞影响 Linux 内核，CVSS 评分 5.5，危害等级中等。"
published = "2025-09-15T15:15:48.873"
remediation = "立即将 Linux 内核升级至以下安全版本：5.10 系列升级至 5.10.28+，5.11 系列升级至 5.11.11+，6.1 系列升级至 6.1.39+，6.3 系列升级至 6.3.13+，6.4 系列升级至 6.4.4+，或直接升级至 6.5 及以上版本。对应补丁 commit 为 f72c67d1a82d（主线）及 108598c39ee、20109ddd5be、6aa27775db6（稳定分支）。无法立即升级时可通过 Seccomp 限制 BPF 系统调用（如 prctl(PR_SET_NO_NEW_PRIVS, 1) 后禁用 bpf()）作为临时缓解，但建议优先应用内核补丁。"
score = 5.5
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux kernel BPF 内存泄漏漏洞"
updated = "2026-06-17T06:44:32.793"

