[basic]
description = "Kanji on Console (KON) 软件包中的 fld 程序存在缓冲区溢出漏洞，攻击者可通过向该程序提交包含超长 CHARSET_REGISTRY 或 CHARSET_ENCODING 设置的输入文件触发缓冲区溢出，导致内存破坏。本地攻击者利用此漏洞可获得 root 权限，完全控制目标系统。该漏洞影响 Mandrake 7.0/7.1 及 RedHat Linux 系统中 Kon2 0.3.9 及更早版本，CVSS 评分 7.2，危害等级高。"
published = "2000-06-21T04:00:00.000"
remediation = "建议卸载或升级 Kanji on Console (KON) 软件包。Mandrake 用户可通过 `urpme kon2` 移除该软件包，RedHat 用户使用 `rpm -e kon2` 卸载。若仍需日文终端功能，应升级至不受影响的现代替代方案（如基于 UTF-8 的终端模拟器）。作为临时缓解措施，可对 /usr/bin/fld 设置权限为 750 以限制非授权用户执行，或删除该二进制文件（`chmod 000 /usr/bin/fld`）。长期建议迁移至受支持的 Linux 发行版，Mandrake 7.x 和 RedHat 6.x 均已停止维护。"
score = 7.2
severity = "HIGH"
sources = ["cve"]
title = "Linux Kon2 fld 本地缓冲区溢出漏洞"
updated = "2026-06-16T21:52:05.970"

