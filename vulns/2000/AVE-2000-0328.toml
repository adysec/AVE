[basic]
description = "Seattle Lab Software Emurl 2.0 基于 Web 的电子邮件账户系统在用户会话 URL 中使用了可预测的标识符，远程攻击者无需身份认证即可通过枚举或猜测会话标识符直接访问其他用户的电子邮件账户，导致敏感邮件信息泄露。该漏洞影响 Emurl 2.0 版本，攻击者仅需知道目标用户的会话 URL 模式即可实施攻击，危害等级中等。"
published = "2000-05-15T04:00:00.000"
remediation = "该漏洞影响 Seattle Lab Software Emurl 2.0，该产品已于 2000 年代初停止维护，厂商不再发布安全更新。建议立即迁移至其他受支持的 Web 邮件系统（如 Roundcube、SquirrelMail 或企业级邮件系统）；在完成迁移前，可通过反向代理（如 Nginx/Apache）对外部请求强制校验额外会话令牌，或在 WAF 层添加规则拦截 URL 中可预测的 session ID 参数遍历行为。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Seattle Lab Software Emurl 2.0 可预测会话URL标识未授权访问漏洞"
updated = "2026-06-16T21:51:37.840"

