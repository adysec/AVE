[basic]
description = "DataEase 开源数据可视化分析平台存在 JWT 认证绕过漏洞，攻击者可伪造 JWT 令牌绕过身份验证机制，获得系统管理权限；结合 H2 数据库远程代码执行漏洞，攻击者在绕过认证后可通过 H2 数据库的 JDBC 连接或 Console 功能执行任意 Java 代码，实现远程命令执行，完全控制目标服务器。该漏洞影响 DataEase v2.10.10 之前版本，攻击者无需认证即可利用，危害严重。官方已发布 v2.10.10 版本修复此漏洞。"
published = "nday"
remediation = "立即升级 DataEase 至 v2.10.10 及以上版本以修复 JWT 认证绕过漏洞，同时禁用 H2 数据库的远程访问功能（修改配置文件将 spring.datasource.h2.console.enabled 设为 false），并在网络层面限制对 DataEase 服务端口的非授权访问以降低风险。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "DataEase JWT 认证绕过与 H2 数据库远程代码执行漏洞"
updated = "nday"

