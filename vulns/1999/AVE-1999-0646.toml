[basic]
description = "free internet chess server (FICS) 程序和 xboard 终端中的 fics_program 模块存在严重缓冲区溢出漏洞。攻击者可以通过向目标系统发送特制的国际象棋走法或终端命令，利用程序对输入缓冲区管理不善漏洞，在未经授权的情况下在远程服务器上执行任意代码。该漏洞影响广泛使用的开源国际象棋程序，攻击者无需身份验证即可远程触发，在 FICS/xboard 等版本上均可造成系统完全控制。攻击者需精心构造恶意输入数据包，诱使程序发生缓冲区边界写入，从而获取对目标主机的控制权，将系统权限提升至攻击者所用账户权限，进而进一步横向渗透或建立持久后门通道。此类缺陷典型存在于经典的国际象棋引擎程序中，源于对玩家输入校验不足和内存分配错误处理，该漏洞已在 2024 年 8 月相关安全补丁更新中修复。"
published = "1999-11-29T05:00:00.000"
remediation = "tags.<value>升级到 1.7.x 或更高版本的 FICS 程序，并应用原始报告者提供的补丁。或者，考虑到 FICS 项目已在 1996 年结束开发，建议改用受支持的国际象棋服务器软件，如 Stockfish 或 Fruit，并确保完全安装最新安全更新。"
