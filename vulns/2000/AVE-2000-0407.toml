[basic]
description = "FreeBSD 的 ports 套件中 golddig 游戏的 makelev 程序存在任意文件写入漏洞。本地攻击者利用该程序未对文件路径进行充分校验的缺陷，可将恶意数据写入系统任意文件，导致文件完整性破坏或权限提升。攻击者需具有本地系统访问权限，CVSS 评分 2.1，危害等级低。受影响的系统包括安装了 golddig 游戏的 FreeBSD 系统。"
published = "2000-05-09T04:00:00.000"
remediation = "升级 golddig 游戏到 4.0 或更新版本，或移除 makelev 程序的 setuid 权限位（chmod u-s /path/to/makelev）。如不再需要该游戏，建议直接卸载 golddig 软件包（pkg_delete golddig）。"
score = 2.1
severity = "LOW"
sources = ["cve"]
title = "FreeBSD golddig 任意文件写入漏洞"
updated = "2026-06-16T21:51:36.613"

