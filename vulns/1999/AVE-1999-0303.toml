[basic]
description = "Oracle 8.x Unix版智能代理中的oratclsh解释器存在权限提升漏洞。该解释器设置了SUID位，导致本地攻击者可以root用户身份执行任意Tcl命令，从而完全控制目标系统。攻击者需要拥有本地系统访问权限才能利用此漏洞，CVSS评分4.6，危害等级中危。"
published = "1999-04-29T04:00:00.000"
remediation = "立即从 Oracle Metalink（http://www.oracle.com/support/elec_sup）下载并运行 setuid_patch.sh 脚本，该脚本会移除 oratclsh 可执行文件并清除所有非必要 Oracle 二进制文件的 setuid 权限位。如无法获取补丁，可手动执行 `chmod -s $ORACLE_HOME/bin/oratclsh` 移除 setuid 位，或直接删除 oratclsh 文件。升级到 Oracle 8.0.6 或 8.1.6 及以上版本可彻底修复此问题。"
score = 4.6
severity = "MEDIUM"
sources = ["epss"]
title = "Oracle 8.x Intelligent Agent oratclsh 本地权限提升漏洞"
updated = "2026-06-16T21:48:53.820"

