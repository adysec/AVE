[basic]
description = "S.u.S.E Linux 5.2 系统中的 lpc 程序存在缓冲区溢出漏洞，本地攻击者可通过向 lpc 程序发送特制的输入数据触发缓冲区溢出，从而获取 root 权限。该漏洞影响 S.u.S.E Linux 5.2 版本，攻击者需要拥有本地系统访问权限才能利用，CVSS 评分 7.2，危害等级高。厂商已发布安全更新修复此漏洞。"
published = "1999-02-02"
remediation = "升级 SuSE Linux 至 5.3 及以上版本，该漏洞已在后续版本中修复。临时缓解措施：移除 lpc 程序的 setuid 权限位（chmod u-s /usr/sbin/lpc），限制本地普通用户执行该程序。如非必要，可停止并禁用 lpd 打印服务。"
score = 7.2
severity = "HIGH"
sources = [
    "cve",
    "exploitdb",
]
title = "SuSE Linux 5.2 lpc 本地缓冲区溢出权限提升漏洞"
updated = "2026-06-16"

