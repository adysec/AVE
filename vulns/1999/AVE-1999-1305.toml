[basic]
description = 'GNU Bash 在某个版本中存在缺陷，当使用包含 \w（当前工作目录）的 PS1 提示符变量时，若当前目录名称异常长（例如用户切换到一个超大目录名），bash 会错误地处理该目录名并在生成密码提示符时发生拒绝服务，导致 shell 挂起或消耗大量资源而无法正常响应。攻击者在共享或多用户环境中可构造超长目录名诱导受害者进入，从而使其交互式 shell 不可用。该漏洞影响本地交互场景，需受害者处于该异常目录下方可触发。'
published = "1998-09-05"
remediation = '升级 bash 至修复该缺陷的 2.0.1 及以上版本（Debian 用户执行 apt-get update && apt-get install bash）。临时缓解措施：在 /etc/profile 及用户配置中将 PS1 中的 \w 改为 \W 或直接移除 \w 选项，避免将超大目录名插入密码提示，并限制普通用户对公共目录的写权限。'
score = 4.6
severity = "MEDIUM"
sources = ["avd"]
title = "GNU Bash 提示符目录名处理拒绝服务漏洞"
updated = "2026-07-18"

