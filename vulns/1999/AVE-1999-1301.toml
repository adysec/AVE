[basic]
description = "Microsoft IIS 2/3 升级至 IIS 4 时，ism.dll 文件会意外遗留在 /scripts/iisadmin 目录中，该目录未限制仅本地访问，导致远程未授权攻击者可通过 Web 访问该路径获取敏感服务器信息，包括管理员密码。该漏洞影响运行 IIS 4 的 Windows NT 系统，攻击者无需认证即可远程利用，CVSS 评分 2.1，属低危但信息泄露风险严重。Microsoft 建议删除遗留的 ism.dll 文件或限制 /scripts/iisadmin 目录访问权限以修复。"
published = "1999-01-14T05:00:00.000"
remediation = "建议升级至 IIS 4.0 Service Pack 3 或更高版本（含 IIS 5.0/6.0），或手动删除 /scripts/iisadmin 目录下遗留的 ism.dll 文件。若无法立即升级，可在 IIS 管理器中为 /scripts/iisadmin 目录配置 IP 地址限制，仅允许本地回环地址访问，或在 NTFS 权限中移除 Everyone 组的读取权限，仅保留 Administrators 组完全控制权限。临时缓解措施：在防火墙层面封锁外部对 TCP 80/443 端口下 /scripts/iisadmin 路径的访问请求。"
score = 2.1
severity = "LOW"
sources = ["exploitdb"]
title = "Microsoft IIS 4（Windows NT）远程基于Web的行政管理功能存在安全漏洞，未授权用户可通过访问/scripts/iisadmin目录获取管理员密码等敏感服务器信息，导致机密数据泄露并可能引发进一步的系统控制风险。"
updated = "2026-06-16T21:50:40.317"

