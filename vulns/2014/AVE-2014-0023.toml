[basic]
description = "WordPress Shortcode Ninja 插件 1.4 及更早版本中的 preview-shortcode-external.php 文件存在反射型跨站脚本漏洞，该漏洞源于程序对 shortcode 参数过滤不严。未经身份认证的远程攻击者可通过诱使用户访问特制 URL，在用户浏览器中注入并执行任意 HTML 或 JavaScript 脚本，导致敏感信息泄露或会话劫持。攻击无需用户认证，但需用户交互。"
published = "2019-12-27T20:15:11.550"
remediation = "立即删除 Shortcode Ninja 插件（该插件已于 2010 年从 WordPress 官方仓库下架，不再维护，无安全更新可用），通过 WordPress 后台插件页面卸载并删除所有相关文件。同时安装替代的短代码管理插件（如 Shortcodes Ultimate），并启用 Web 应用防火墙规则拦截 XSS 攻击载荷作为纵深防御。"
score = 6.1
severity = "MEDIUM"
sources = ["nuclei"]
title = "WordPress Shortcode Ninja 插件跨站脚本漏洞"
updated = "2026-06-17T00:10:13.437"

