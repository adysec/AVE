[basic]
description = "WebCom datakommunikation Guestbook 0.1 的 CGI 程序 wguest.exe 和 rguest.exe 存在任意文件读取漏洞。远程攻击者可通过向 template 参数传入恶意路径（如使用目录遍历序列），绕过访问限制读取服务器上的任意文件，包括密码文件、配置文件等敏感信息。该漏洞影响 Guestbook 0.1 版本，攻击无需身份认证，危害等级中危。"
published = "1999-04-01"
remediation = "立即停止使用 WebCom Guestbook 0.1 及更早版本，该产品已停止维护且无安全更新。建议删除服务器上的 wguest.exe 和 rguest.exe CGI 脚本，改用现代受支持的留言板系统。如暂时无法移除，可在 Web 服务器配置中限制 CGI 脚本对文件系统的访问权限，并禁用 template 参数传递。"
score = 5.0
severity = "MEDIUM"
sources = ["cve"]
title = "WebCom datakommunikation Guestbook CGI 任意文件读取漏洞"
updated = "2026-06-16"

