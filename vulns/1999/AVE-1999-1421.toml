[basic]
description = "cddbd CD 数据库服务器存在缓冲区溢出漏洞，远程攻击者可通过向该服务发送特制的超长日志消息触发缓冲区溢出，导致任意代码执行。该漏洞影响 cddbd 服务器软件，攻击者无需身份认证即可远程利用，CVSS 评分 7.5，危害等级高。建议用户升级至最新版本或限制对 cddbd 服务的网络访问以降低风险。"
published = "1996-11-26T05:00:00.000"
remediation = "立即升级 cddbd 至 1.4.5 及以上版本。如无法升级，建议在防火墙层面限制 cddbd 服务端口（默认 888/TCP）的访问来源为受信任 IP，并对输入日志长度进行校验作为临时缓解措施。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "cddbd CD 数据库服务器缓冲区溢出远程代码执行漏洞"
