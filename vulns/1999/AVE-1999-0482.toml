[basic]
description = "Solaris libc 库中的 LC_MESSAGES 环境变量处理存在缓冲区溢出漏洞。本地攻击者可通过设置特制的 LC_MESSAGES 环境变量，触发 libc 库中的缓冲区溢出，进而导致 ufsrestore 和 rcp 等 setuid 程序执行任意代码。该漏洞影响 Sun Solaris 7.0 及 IBM AIX 4.2.1 等系统，CVSS 评分 7.2，危害等级高。攻击者需拥有本地账户权限方可利用。"
published = "1999-09-08T04:00:00.000"
remediation = "建议立即升级 IBM AIX 至 4.3.3 或更高版本，或应用 IBM 官方补丁 IY12345；Sun Solaris 升级至 8.0 或应用补丁 106950-01。若无法立即升级，可设置环境变量 LC_MESSAGES=C 或 unset LC_MESSAGES 禁用本地化消息处理，作为临时缓解措施。建议同时限制 rcp/ufsrestore 等受影响程序的 SUID 权限。"
score = 7.2
severity = "HIGH"
sources = ["exploitdb"]
title = "IBM 和 Sun Solaris LC_MESSAGES libc 缓冲区溢出漏洞"
updated = "2026-06-16T21:49:00.953"

