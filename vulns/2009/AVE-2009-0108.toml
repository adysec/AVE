ave_id = "AVE-2009-0108"
aliases = ["CVE-2009-3953"]
[basic]
title = "Adobe Reader 和 Acrobat U3D 实现远程代码执行漏洞"
description = "Adobe Reader 和 Acrobat 的 U3D 实现中存在越界写入漏洞（CWE-787），具体位于 CLODProgressiveMeshDeclaration 的数组边界处理逻辑中。攻击者可通过构造包含恶意 U3D 数据的 PDF 文件，诱使用户打开后触发数组越界写入，成功利用此漏洞可实现远程代码执行，完全控制受影响的系统。该漏洞影响 Adobe Reader 和 Acrobat 7.1.4 之前、8.2 之前及 9.3 之前的版本，已有 Metasploit 利用模块公开，并被 CISA 列入已知被利用漏洞目录。"
severity = "HIGH"
score = 8.8
sources = ["cve", "kev"]
published = "2010-01-13"
updated = "2026-06-16"
remediation = "升级 Adobe Reader/Acrobat 至 9.3（9.x 版本）、8.2（8.x 版本）或 7.1.4（7.x 版本）及以上版本，修复 U3D CLODProgressiveMeshDeclaration 数组越界漏洞。如无法升级，可在 PDF 阅读器中禁用 U3D 解析功能，或使用其他 PDF 阅读器打开可疑文档。"
