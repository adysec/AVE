[basic]
description = "KDE K-Mail 在处理临时用户目录时存在符号链接（symlink）竞争条件漏洞，具有本地访问权限的攻击者可通过在临时目录中创建恶意符号链接，当 K-Mail 以更高权限写入临时文件时，攻击者可因此劫持文件写入操作，覆盖或创建任意系统文件，从而实现本地权限提升。该漏洞影响 KDE 1.1/1.1.1、Caldera OpenLinux 1.3/2.2 及 RedHat Linux 6.0 等系统。"
published = "2000-01-04T05:00:00.000"
remediation = "升级 KDE 至 2.0 及以上版本，K-Mail 在新版中已修复不安全的临时文件创建方式。如无法升级，可将 umask 设为 077 并使用 `export TMPDIR=/tmp/kmail-$USER` 为每个用户分配独立临时目录，降低 symlink 攻击风险。"
score = 4.6
severity = "MEDIUM"
sources = ["avd"]
title = "KDE K-Mail 符号链接本地权限提升漏洞"
updated = "2026-06-16T21:48:56.883"

