[basic]
description = "NetBSD和OpenBSD系统的TCP服务器在处理select()和accept()系统调用时存在竞争条件漏洞。远程攻击者可以利用该竞争条件，在特定时间窗口内发送精心构造的网络请求，导致服务器进程进入死锁状态或崩溃，从而造成拒绝服务。攻击条件较为苛刻，需要精确的时间控制，攻击复杂度较高。"
published = "1999-02-17"
remediation = "OpenBSD用户应应用errata 002补丁或升级至OpenBSD 2.4及以上版本；NetBSD用户应升级至1999年2月8日之后的内核版本。如无法立即升级，可在防火墙层面限制对TCP服务的访问作为临时缓解措施。"
score = 2.6
severity = "LOW"
sources = ["cve"]
title = "NetBSD/OpenBSD TCP服务器 select/accept 竞争条件拒绝服务漏洞"
updated = "2026-06-16"

