[basic]
description = "thttpd HTTP 服务器 2.04-31 之前版本中存在缓冲区溢出漏洞。远程攻击者可通过向 `tdate_parse` 函数发送特制的超长日期字符串触发栈溢出，导致任意代码执行。攻击无需认证，利用难度较低，危害等级高，影响运行 thttpd 的各类服务器。"
published = "1999-11-16T05:00:00.000"
remediation = "升级 thttpd 至 2.04-31 或更高版本，该版本已修复 tdate_parse 函数在处理异常日期字符串时的缓冲区边界检查逻辑。如无法升级，可在反向代理层对 Date 请求头做长度限制（不超过 128 字节）作为临时缓解措施。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "thttpd HTTP Server 缓冲区溢出远程代码执行漏洞"
updated = "2026-06-16T21:50:28.903"

