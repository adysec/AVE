[basic]
description = "Linux 系统中 Kanji on Console (KON) 软件包的 kon 程序存在缓冲区溢出漏洞，本地用户可通过向 -StartupMessage 参数传递超长字符串触发缓冲区溢出，导致攻击者能够以 root 权限执行任意代码。该漏洞影响 Mandrake Linux 等发行版本，需要本地访问权限，CVSS 评分 7.2，危害等级高。"
published = "2000-06-21T04:00:00.000"
remediation = "升级 kon 程序包至已修复版本（如 Mandrake 官方更新中修复此问题的版本）。如无法升级，立即移除以 root 权限运行的 kon 二进制文件的 setuid 位（`chmod u-s /usr/bin/kon`），并限制仅授权用户可执行，防止本地普通用户触发缓冲区溢出提权。"
score = 7.2
severity = "HIGH"
sources = ["cve"]
title = "Linux KON kon 程序缓冲区溢出漏洞"
updated = "2026-06-16T21:52:05.847"

