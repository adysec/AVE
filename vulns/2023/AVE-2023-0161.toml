[basic]
description = "广联达OA存在任意文件上传漏洞，攻击者可在未授权情况下通过构造特制的HTTP请求，向服务器上传恶意文件（如WebShell），从而获取服务器控制权限。该漏洞影响广联达OA系统多个版本，攻击者无需身份认证即可远程利用，危害较大。建议用户及时更新至最新版本或部署WAF规则进行防护。"
published = "08.08"
remediation = "立即升级广联达OA至最新版本，在系统管理-安全配置中限制上传文件类型为白名单模式（仅允许jpg/png/pdf/doc），同时配置WAF规则拦截包含jsp/php/aspx后缀的上传请求，并设置上传目录禁止脚本执行权限。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "广联达 OA 任意文件上传漏洞"
updated = "08.08"

