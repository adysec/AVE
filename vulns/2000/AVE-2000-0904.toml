[basic]
description = "IBM OS/2 Warp 4.5 的 FTP 服务器存在缓冲区溢出漏洞，远程攻击者可通过向 FTP 登录过程提交超长用户名，触发缓冲区溢出，导致 FTP 服务进程崩溃，造成拒绝服务。该漏洞无需身份认证即可利用，攻击复杂度低，影响 OS/2 Warp 4.0/4.2/4.3/4.5 等多个版本。"
published = "2000-10-20T04:00:00.000"
remediation = "IBM 已发布针对 OS/2 Warp 4.5 FTP 服务器的补丁 IC27721，可从 IBM FTP 服务器下载安装（路径：ps/products/tcpip/fixes/v4.3os2/ic27721/README）。由于 OS/2 系统已停止官方支持，建议迁移至受支持的操作系统；如无法迁移，应在防火墙层面限制对 FTP 端口（21）的访问，仅允许可信 IP 连接。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "IBM OS2 Warp FTP Server 拒绝服务漏洞"
updated = "2026-06-16T21:52:25.567"

