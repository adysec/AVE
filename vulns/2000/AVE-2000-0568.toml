[basic]
description = "Windows 2000 系统的服务控制管理器（SCM）在创建命名管道时使用可预测的名称，使得具有控制台访问权限的本地攻击者能够通过创建恶意命名管道并诱导高权限服务连接，实现管道模拟攻击，从而获取管理员权限。该漏洞影响 Windows 2000 系统，CVSS 评分 4.6，危害等级中危。攻击者需已获得目标系统的本地登录权限方可利用。"
published = "2000-10-20T04:00:00.000"
remediation = "安装 Microsoft 安全公告 MS00-053 提供的补丁程序，或升级至 Windows XP 及以上版本。Windows 2000 已停止安全更新，建议尽快迁移至受支持的操作系统版本以彻底修复此漏洞。"
score = 4.6
severity = "MEDIUM"
sources = ["cve"]
title = "Microsoft Windows 2000 服务控制管理器命名管道权限提升漏洞"
updated = "2026-06-16T21:52:22.670"

