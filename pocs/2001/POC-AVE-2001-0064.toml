[info]
author = "ave"
description = "通过检查本地 glibc 共享库验证系统是否存在 RESOLV_HOST_CONF/HOSTALIASES/RES_OPTIONS 环境变量未清除漏洞（CVE-2001-0170）。glibc 2.1.9x 及更早版本在执行 setuid/setgid 程序时未清除上述环境变量，本地攻击者可设置 RESOLV_HOST_CONF 指向任意文件后执行 setuid 程序读取受限文件。结合 Resolv+ 库（EDB-317）可进一步实现本地命令执行。检测方法：确认系统 glibc 版本是否低于 2.2。"
id = "POC-AVE-2001-0064"
name = "glibc RESOLV_HOST_CONF 环境变量处理本地信息泄露漏洞 PoC"
severity = "low"
tags = ["ave-2001-0064"]
vuln_id = [
    "CVE-2001-0170",
    "AVE-2001-0064",
]

[poc]
logic = "all"

[[poc.requests]]
path = "/lib/libc.so.6"
protocol = "file"

[[poc.requests.matchers]]
expect = false
part = "body"
type = "word"
words = ["GLIBC_2.2"]
