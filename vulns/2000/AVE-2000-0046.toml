[basic]
description = "Solaris 操作系统中的 chkperm 命令存在缓冲区溢出漏洞，本地攻击者可通过向 -n 选项传递超长字符串触发该漏洞，导致缓冲区溢出进而覆盖内存中的关键数据，最终获取 root 权限。该漏洞影响 Solaris 系统，攻击者需拥有本地账户才能利用，危害等级高。"
published = "2000-01-06T05:00:00.000"
remediation = "安装 Sun 官方补丁 106327-01 (Solaris 2.6) 或 106725-01 (Solaris 7)。临时缓解措施：以 root 执行 `chmod 0555 /bin/chkperm` 移除 setuid 位，阻止非授权用户提权利用。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "Solaris chkperm 本地缓冲区溢出漏洞"
updated = "2026-06-16T21:50:54.510"

