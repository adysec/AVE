[basic]
description = "BSD mailx 8.1.1-10 邮件命令在 Linux 系统中存在缓冲区溢出漏洞，本地用户可通过向 mailx 命令传递过长的 -c（抄送）参数触发栈缓冲区溢出，导致栈溢出覆盖返回地址，从而实现本地权限提升。该漏洞影响运行 BSD mailx 8.1.1-10 版本的 Linux 系统（如 Slackware 等 BSD 衍生发行版），攻击者需具备本地登录权限，通过构造超长的 -c 参数字符串触发缓冲区溢出，覆盖返回地址执行任意 Shellcode，最终获得提升后的权限（通常为 root 或 mail 组权限）。CVSS 评分 4.6（本地/低复杂度/无需认证/部分机密性/完整性/可用性影响）。"
published = "2000-08-08T04:00:00.000"
remediation = "建议升级 mailx 至 8.1.2 或更高版本（如 mailx 12.4+），或切换至 heirloom-mailx / bsd-mailx 维护分支。若无法升级，可通过编译选项禁用 -c 参数（编译时定义 NO_CC），或在 /etc/mail.rc 中设置 askcc=off 禁用碳复制功能作为临时缓解；同时限制普通用户对 mail 命令的执行权限（chmod 750 /usr/bin/mail），仅允许 mail 组用户执行。"
score = 4.6
severity = "MEDIUM"
sources = ["epss"]
title = "BSD mailx 8.1.1-10 缓冲区溢出漏洞"
updated = "2026-06-16T21:51:58.010"

