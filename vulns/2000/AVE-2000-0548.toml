[basic]
description = "Windows 2000 的受保护存储（Protected Store）组件在加密算法选择上存在逻辑缺陷，当系统支持更强加密时仍默认使用 40 位加密而非 56 位 DES 加密，导致存储的敏感数据（如证书私钥、密码等）加密强度不足。本地攻击者可利用该漏洞通过暴力破解等方式更容易地获取受保护存储中的机密信息，降低系统安全性。该漏洞影响 Microsoft Windows 2000 所有版本。"
published = "2000-06-01T04:00:00.000"
remediation = "升级至 Windows 2000 Service Pack 1 或更高版本，该更新已修复 Protected Store 密钥长度选择逻辑，确保系统会根据可用 CSP 自动选择最强加密算法（56 位 DES）。由于 Windows 2000 已于 2010 年 7 月停止支持，强烈建议升级至 Windows Server 2019/2022 或 Windows 10/11 等受支持版本，从根本上消除此漏洞暴露面。在无法立即升级的环境下，可通过注册表禁用旧版 SSL/TLS 协议并限制本地交互式登录用户来降低风险。"
score = 3.6
severity = "LOW"
sources = ["cve"]
title = "Microsoft Windows 2000 Protected Store 默认40位加密漏洞"
updated = "2026-06-16T21:51:50.390"

