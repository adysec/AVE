[basic]
description = "CVE-1999-0605 涉及 Order Form 1.0 购物车 CGI 程序的不正确配置漏洞。该程序在部署时若未正确设置访问权限或参数校验，可能导致服务器将本应保密的订单信息（如客户姓名、联系方式、支付相关数据等）通过 Web 接口直接暴露给未经身份认证的远程攻击者。攻击者可利用浏览器或简单 HTTP 请求访问该程序对应的 CGI 路径，从而获取存储在系统中的私有商业信息，造成敏感数据泄露。该漏洞影响所有使用 Order Form 1.0 购物车 CGI 且配置不当的网站，无需特殊权限即可利用。"
published = "1999-04-01T05:00:00.000"
remediation = "将 Order Form 1.0 的订单数据存储目录移至 Web 服务器文档根目录之外，或通过 Web 服务器配置文件（如 Apache 的 `.htaccess` 或 Nginx 配置）禁止对订单目录的 Web 访问；同时将目录文件权限收紧为仅允许 Web 服务器用户读取（如设置为 640 或 600），删除已在文档树中暴露的订单文件，并通过搜索引擎站长平台提交删除请求以清除已收录的敏感数据。因 Order Form 1.0 已停止维护且存在设计缺陷，强烈建议迁移到经过安全审计的现代购物车程序，并对所有受影响客户进行数据泄露告知与信用卡监控。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Order Form 1.0 购物车 CGI 程序信息泄露漏洞"
updated = "2026-06-16T21:48:43.337"

