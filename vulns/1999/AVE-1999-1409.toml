[basic]
description = "Omnicron OmniHTTPd 1.1 及 2.4 Pro 版本的 CGI 程序 imagemap.exe 存在缓冲区溢出漏洞。远程攻击者可通过向目标 Web 服务器发送特制的 HTTP 请求触发该漏洞，导致缓冲区溢出，从而在服务器上以 Web 进程权限执行任意命令。该漏洞影响 OmniHTTPd 1.1 和 2.4 Pro 版本，CVSS 评分 10.0，危害等级严重，无需身份认证即可远程利用。"
published = "1999-10-22T04:00:00.000"
remediation = "OmniHTTPd 1.1/2.4 Pro 已停止维护且无官方补丁，建议立即停止使用该软件并迁移至受支持的 Web 服务器（如 Apache、Nginx、IIS）。如无法立即替换，应将服务器置于独立防火墙后，严格限制外部对 CGI 程序 imagemap.exe 的访问，并移除或重命名该 CGI 文件以阻断利用路径。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "Omnicron OmniHTTPd Pro 远程缓冲区溢出漏洞"
updated = "2026-06-16T21:49:23.620"

