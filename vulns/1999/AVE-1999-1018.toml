[basic]
description = "Microsoft Internet Explorer 5.0 在访问 FTP 服务器时会自动将用户名和密码记录在 URL 历史中，导致凭据信息以明文形式存储在本地 index.dat 文件中。本地攻击者可读取其他用户的浏览历史获取 FTP 凭据，或通过肩窥（shoulder surfing）方式在用户鼠标悬停链接时从状态栏窃取密码。该漏洞影响 IE 5 版本，属于信息泄露问题，CVSS 评分 4.6。"
published = "1999-08-25T04:00:00.000"
remediation = "升级到 Internet Explorer 6 或更高版本，IE5 已停止支持且不再接收安全更新。如无法升级浏览器，建议清除 IE 历史记录中的 FTP 密码（工具→Internet 选项→清除历史记录），并避免在公共场合使用 IE 访问 FTP 站点。长期缓解措施为迁移至现代浏览器（如 Edge/Chrome/Firefox）。"
score = 4.6
severity = "MEDIUM"
sources = ["epss"]
title = "Microsoft Internet Explorer 5 FTP 密码信息泄露漏洞"
updated = "2026-06-16T21:50:00.410"

