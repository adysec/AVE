[basic]
description = "Microsoft Rich Text Format（RTF）阅读器存在缓冲区溢出漏洞，其解析富文本格式时未对控制字的长度与内容进行充分边界校验。攻击者可构造包含畸形控制字的恶意 RTF 文档，当用户使用存在漏洞的软件打开该文档时，超长或异常的控制字数据会溢出缓冲区，导致程序崩溃并引发拒绝服务。该漏洞影响 Windows 95、Windows 98、Windows NT Server 4.0、Terminal Server 4.0、Workstation 4.0 及 Enterprise Server 4.0 等系统，攻击需诱使用户打开特制 RTF 文件，属于本地交互触发的拒绝服务类漏洞。"
published = "1999-11-17T05:00:00.000"
remediation = "受影响系统（Windows 95/98/NT 4.0）均已停止支持，建议升级至 Windows 10 或更高版本。若无法升级，请安装 Microsoft 安全公告 MS00-005 提供的补丁（KB249973），并在 Outlook 等邮件客户端中禁用预览窗格，避免自动解析 RTF 格式邮件。Windows 2000 及更高版本不受此漏洞影响。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Microsoft Windows 版本多款 RTF 缓冲区溢出漏洞"
updated = "2026-06-16T21:50:56.680"

