[info]
author = "ave"
description = "检测 Microsoft IIS 4.0 服务器，该版本 ISAPI ASP 解析器存在缓冲区溢出漏洞 (CVE-2000-1147)，攻击者可通过上传包含超长 LANGUAGE 参数的恶意 ASP 文件触发系统级任意代码执行"
id = "POC-AVE-2000-0824"
name = "Microsoft IIS 4.0 ISAPI Buffer Overflow PoC"
severity = "medium"
tags = ["ave-2000-0824"]
vuln_id = [
    "CVE-2000-1147",
    "AVE-2000-0824",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "header"
type = "word"
words = ["IIS/4.0"]
