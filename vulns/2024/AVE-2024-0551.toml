[basic]
description = "Elasticsearch 在处理 Well-Known Text（WKT）格式的字符串时存在堆栈溢出漏洞。当解析包含嵌套 GeometryCollection 对象的特制 WKT 字符串时，递归深度过大导致堆栈溢出，造成服务拒绝。该漏洞需要高权限才能利用，攻击者可通过向 Elasticsearch 发送构造的 WKT 查询触发此问题，影响 Elasticsearch 服务的可用性。Elasticsearch 官方已在后续版本中修复此漏洞。"
published = "2025-04-08T17:15:35.187"
remediation = "建议立即升级 Elasticsearch 至 7.17.24 或 8.15.1 及以上版本，官方已发布安全更新修复了 WKT 解析中嵌套 GeometryCollection 对象导致的栈溢出问题。如无法立即升级，可在应用层限制 WKT 输入字符串的递归深度，或通过反向代理/防火墙限制仅受信用户访问 Elasticsearch 的 HTTP API 端口（默认 9200），降低高权限攻击者触发漏洞的风险。"
score = 4.9
severity = "MEDIUM"
sources = ["msrc"]
title = "Elastic Elasticsearch 堆栈溢出漏洞"
updated = "2026-06-17T08:07:57.787"

