[basic]
description = "ISC BIND 8 的 TSIG（事务签名）处理代码存在缓冲区溢出漏洞，远程攻击者无需身份认证即可向目标 DNS 服务器发送特制的 TSIG 请求数据包触发栈溢出，导致拒绝服务或远程代码执行，获取 root 权限。该漏洞影响 BIND 8.2.x 系列版本，CVSS 评分 10.0，危害等级严重。目前已存在公开利用代码（ExploitDB ID: 280），建议立即升级至 BIND 9 或更高版本。"
published = "2001-02-12T05:00:00.000"
remediation = '立即升级 BIND 至 8.2.2-p7 或 9.1.0 以上版本，该漏洞已在 BIND 8.2.2-p3 及后续补丁中修复。如无法升级，可在 named.conf 中禁用 TSIG 事务签名（options { tkey-gssapi-credential ""; }），并在边界防火墙上限制 DNS 服务仅对可信源开放。'
score = 10
severity = "CRITICAL"
sources = ["redhat"]
title = "ISC BIND 8 TSIG 远程缓冲区溢出漏洞"
updated = "2026-06-16T21:53:29.060"

