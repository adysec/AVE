[basic]
description = "Microsoft IIS 4.0 存在内部 IP 地址泄露漏洞。当受基本身份验证保护且未定义 realm 域的网页收到 HTTP 1.0 请求时，服务器会在响应中泄露内部 IP 地址。远程攻击者可利用此漏洞获取目标服务器的内部网络信息，为进一步攻击收集情报。该漏洞影响 IIS 2.0/3.0/4.0/5.0/5.1 版本，CVSS 评分 2.6，危害等级低。建议升级至更高版本或安装厂商安全补丁进行修复。"
published = "2000-07-13T04:00:00.000"
remediation = "立即升级至受支持的 IIS 版本（如 Windows Server 2012 R2+ 的 IIS 8.5 或 Windows Server 2016+ 的 IIS 10.0），这些版本不受此漏洞影响。如无法升级，在 IIS 管理器中为基本身份验证配置明确的领域名称（realm）；安装 URLScan 工具并配置规则，拒绝缺少 Host 头的 HTTP 1.0 请求。在防火墙或反向代理层面过滤响应中泄露的内网 IP 地址作为临时缓解措施。"
score = 2.6
severity = "LOW"
sources = ["cve"]
title = "Microsoft IIS 内部IP地址泄露漏洞"
updated = "2026-06-16T21:52:11.267"

