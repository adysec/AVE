[basic]
description = "Microsoft Windows NT 4.0 的 WINS 服务在 SP4 之前版本中存在拒绝服务漏洞。远程攻击者无需身份认证即可向目标系统的 137 端口（NetBIOS 名称服务）发送特制的畸形 UDP 数据包，导致 WINS 服务进程异常终止，造成正常名称解析服务中断。利用方式包括发送大量随机 UDP 帧或精心构造的无效数据包，攻击门槛较低，可导致业务系统瘫痪。"
published = "1998-08-01T04:00:00.000"
remediation = "升级到 Windows NT 4.0 Service Pack 4 (SP4) 或更高版本。如无法升级，在防火墙或路由器上阻止外部 UDP 137 端口入站访问，禁用 WINS 服务的未授权网络访问作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Microsoft Windows NT 4.0 WINS 拒绝服务漏洞"
updated = "2026-06-16T21:48:04.717"

