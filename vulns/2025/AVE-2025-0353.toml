[basic]
description = "西门子 Simcenter Femap 在解析特制 IPT 文件时存在基于堆的缓冲区溢出漏洞（CWE-122），攻击者可通过向目标用户发送恶意构造的 IPT 文件触发内存损坏，导致在当前进程上下文中执行任意代码。该漏洞影响 Simcenter Femap 多个版本，CVSS 评分 7.3，危害等级高危。建议用户及时更新至厂商发布的安全版本。"
published = "2026-05-12T14:16:49.460"
remediation = "立即将 Siemens Simcenter Femap 升级至 V2512.0003 或更高版本，可从 Siemens 支持门户 (support.sw.siemens.com) 获取。如暂时无法升级，切勿打开来源不明的 IPT 文件，并遵循 Siemens Industrial Security 操作指南加强系统防护。"
score = 7.3
severity = "HIGH"
sources = ["zdi"]
title = "Siemens Simcenter Femap 基于堆的缓冲区溢出远程代码执行漏洞"
updated = "2026-06-17T08:32:45.497"

