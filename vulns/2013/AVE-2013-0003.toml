[basic]
description = "Apache Struts 2 的 DefaultActionMapper 存在输入验证漏洞，远程攻击者可通过在参数中使用 redirect: 或 redirectAction: 前缀构造恶意 URL，将用户重定向到任意外部网站，从而实施钓鱼攻击。该漏洞影响 Apache Struts 2.0.0 至 2.3.15 版本，攻击者无需身份认证即可利用，危害中等。建议升级至 Apache Struts 2.3.16 及以上版本修复此漏洞。"
published = "2013-07-20T03:37:30.717"
remediation = '升级 Apache Struts 至 2.3.15.1 或更高版本，该版本已修复 DefaultActionMapper 对 redirect:/redirectAction: 前缀的输入验证缺陷。如无法立即升级，可在 struts.xml 中禁用动态方法调用（<constant name="struts.enable.DynamicMethodInvocation" value="false" />）并限制 action: 前缀的使用。'
score = 5.8
severity = "MEDIUM"
sources = ["nuclei"]
title = "Apache Struts 2 开放重定向漏洞"
updated = "2026-06-16T23:53:01.037"

