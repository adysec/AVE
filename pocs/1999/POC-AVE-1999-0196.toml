[info]
author = "AVE"
description = "Microsoft Internet Explorer 4.0/5.0 中 Eyedog ActiveX 控件被错误标记为对脚本安全导致的远程代码执行漏洞。通过构造包含 clsid:06A7EC63-4E21-11D0-A112-00A0C90543AA 对象的恶意 HTML 页面，调用 MSInfoLoadFile 方法触发缓冲区溢出，可执行任意命令（Bubbleboy 蠕虫曾利用此漏洞）。"
id = "POC-AVE-1999-0196"
name = "CVE-1999-0669 PoC"
severity = "medium"
tags = [
    "cve-1999-0669",
    "activex",
    "ie",
    "rce",
    "bubbleboy",
]
vuln_id = [
    "CVE-1999-0669",
    "AVE-1999-0196",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/eyedog-poc.html"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["eyedog"]
