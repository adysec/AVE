[basic]
description = "汉王e脸通综合管理平台存在SQL注入漏洞，攻击者可通过向queryMeetingRoom.do接口提交恶意构造的SQL查询参数，绕过身份认证直接访问后端数据库，导致敏感信息泄露、数据篡改甚至服务器被控制。该漏洞影响汉王e脸通综合管理平台多个版本，远程攻击者在无需登录的情况下即可利用，危害较大。"
published = "0722"
remediation = "建议联系汉王科技获取e脸通综合管理平台最新安全补丁，对queryMeetingRoom.do接口的传入参数进行严格的类型校验和过滤，禁止拼接SQL语句，改用预编译参数化查询方式处理数据库操作。临时缓解措施可在Web应用防火墙(WAF)侧添加SQL注入规则拦截该URL的恶意请求，并限制该接口的访问IP白名单。"
score = 5
