[basic]
description = "WebSiteTool 购物车应用程序存在信息修改漏洞，远程攻击者可通过篡改网页中隐藏表单字段（hidden form fields）的值来修改敏感购买信息（如商品价格、数量、订单金额等），导致非授权篡改交易数据。该漏洞源于应用程序在服务端未对客户端提交的隐藏字段值进行校验，完全信任了浏览器端传入的数据。"
published = "2000-02-01"
remediation = "对 WebSiteTool 购物车应用，必须将所有价格、数量等敏感字段在服务端进行校验，禁止信任客户端提交的隐藏表单字段值。建议将会话状态（如购物车内容）存储在服务端 Session 中，而非以隐藏字段形式发回客户端。由于该产品已停止维护，强烈建议迁移至仍在安全更新周期内的购物车平台（如 Magento、WooCommerce 等），并对所有传入参数实施白名单校验。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "WebSiteTool购物车应用程序隐藏表单域信息修改漏洞"
updated = "2026-06-16"

