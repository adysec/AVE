[basic]
description = "Microsoft Java Virtual Machine 中存在信息泄露漏洞，远程攻击者可通过调用 getSystemResourceAsStream 函数读取目标系统上的任意文件，导致敏感信息泄露。该漏洞影响 Microsoft VM 2000 Series 及 3000 Series 版本，攻击者无需认证即可远程利用，危害等级低但影响范围较广。"
published = "2000-01-31T05:00:00.000"
remediation = "Microsoft Java Virtual Machine (MS JVM) 已于 2007 年终止支持，微软不再提供补丁分发。建议立即通过 Windows 控制面板卸载 Microsoft Java Virtual Machine，并迁移至 Oracle Java 或 OpenJDK 等受支持的 Java 运行时环境。如因遗留兼容需求暂时无法卸载，请在 Internet Explorer 安全设置中将 Java 小程序权限设为禁用，并限制不可信网站的访问。"
score = 2.6
severity = "LOW"
sources = ["epss"]
title = "Microsoft Java Virtual Machine 信息泄露漏洞"
updated = "2026-06-16T21:51:04.040"

