[basic]
description = "SGI IRIX 操作系统中的 InPerson 组件包含的 inpview 程序存在不安全的路径搜索漏洞。该程序在运行时会信任 PATH 环境变量来定位并执行 ttsession 程序，而未使用绝对路径。本地攻击者可通过修改 PATH 环境变量，将其指向特洛伊木马化的 ttsession 程序，从而在触发 inpview 执行时以 root 权限运行恶意代码，实现本地权限提升。该漏洞影响 IRIX 5.3 至 6.5.10 版本，CVSS 评分 7.2，危害等级高。"
published = "1997-05-07T04:00:00.000"
remediation = "立即安装 SGI 安全公告 20001101-01-I 中提供的补丁，升级 IRIX 至 6.5.11 或更高版本。如无法升级，可临时移除 inpview 的 setuid 位（chmod u-s /usr/sbin/inpview），或在使用 inpview 前通过显式设置 PATH 为系统默认路径（如 PATH=/bin:/usr/bin:/usr/sbin）来防止 Trojan horse 提权攻击。"
score = 7.2
severity = "HIGH"
sources = ["epss"]
title = "SGI IRIX InPerson inpview 本地权限提升漏洞"
updated = "2026-06-16T21:50:29.400"

