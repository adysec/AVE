[basic]
description = "latchset jose 库（版本 11 及之前）在处理 JWE 加密中的 PBES2 密钥管理时存在资源消耗漏洞。攻击者可构造包含超大 p2c（PBES2 Count）值的恶意 JWE 令牌，当服务端解析该令牌时，会因执行大量 PBES2 迭代计算而导致 CPU 耗尽，造成拒绝服务。该漏洞影响所有使用 latchset jose 库解析 JWE 令牌的应用，CVSS 评分 7.5，危害等级高。"
published = "2024-03-20T16:15:07.570"
remediation = "立即将 latchset jose 升级至 v13 及以上版本（v13 在 2025 年 4 月发布，通过限制 p2c 最大迭代次数为 32768 修复了该 DoS 漏洞）。若为 Fedora 发行版用户，可通过 `sudo dnf update jose` 安装对应包更新。临时缓解措施：在应用层对 JWE 解析时的 p2c 字段做上限校验，拒绝 p2c 大于 32768 的请求。"
score = 7.5
severity = "HIGH"
sources = ["msrc"]
title = "latchset jose 拒绝服务漏洞"
updated = "2026-06-17T06:40:20.057"

