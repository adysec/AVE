[info]
author = "AVE"
description = "检测目标服务器上是否存在 PDGSoft Shopping Cart 的 redirect.exe 或 changepw.exe 文件。这些 CGI 可执行文件存在缓冲区溢出漏洞（CVE-2000-0401），远程攻击者可通过超长查询字符串执行任意命令。该检测仅验证文件存在性，不触发漏洞。"
id = "POC-AVE-2000-0426"
name = "PDGSoft Shopping Cart redirect.exe/changepw.exe 存在性检测 PoC"
severity = "high"
tags = [
    "cve-2000-0401",
    "pdgsoft",
    "shopping-cart",
    "buffer-overflow",
]
vuln_id = [
    "CVE-2000-0401",
    "AVE-2000-0426",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/cgi-bin/changepw.exe"
protocol = "http"

[[poc.requests.matchers]]
expect = true
status = [200]
type = "status"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/cgi-bin/redirect.exe"
protocol = "http"

[[poc.requests.matchers]]
expect = true
status = [200]
type = "status"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/scripts/changepw.exe"
protocol = "http"

[[poc.requests.matchers]]
expect = true
status = [200]
type = "status"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/scripts/redirect.exe"
protocol = "http"

[[poc.requests.matchers]]
expect = true
status = [200]
type = "status"
