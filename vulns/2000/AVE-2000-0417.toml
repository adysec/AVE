[basic]
description = "Veritas Volume Manager 3.0.2/3.0.3/3.0.4 版本存在文件权限配置不当漏洞，安装程序创建了全局可写的 .server_pids 文件，本地攻击者可向该文件中写入任意命令，当 vmsa_server 脚本执行时这些命令将被自动运行，导致权限提升。该漏洞影响 Veritas Volume Manager 上述版本，CVSS 评分 7.2，危害等级高。厂商已发布安全更新修复此问题。"
published = "2000-06-16T04:00:00.000"
remediation = "建议立即升级 Veritas Volume Manager 至 3.1 或更高版本，该版本已修复 .server_pids 文件权限问题。如无法升级，可执行 `chmod 600 /var/run/.server_pids` 将文件权限改为仅 root 可读写，并移除该文件的 setuid/setgid 位，防止本地用户注入恶意命令获得 root 权限。"
score = 7.2
severity = "HIGH"
sources = ["cve"]
title = "Veritas Software Volume Manager 本地权限提升漏洞"
updated = "2026-06-16T21:51:51.310"

