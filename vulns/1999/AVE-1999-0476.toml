[basic]
description = "Windows NT 系统的 Web 服务器存在源代码泄露漏洞。远程攻击者通过在 URL 末尾添加一个空格字符，可绕过服务器对动态页面（如 ASP）的访问限制，从而读取活动页面的源代码。该漏洞允许攻击者获取数据库连接字符串、业务逻辑等敏感信息，为后续攻击提供信息基础，无需身份认证即可远程利用。"
published = "1999-01-01T05:00:00.000"
remediation = "安装 Windows NT 4.0 Service Pack 4 (SP4) 或更高版本，该更新已修复 IIS 对 URL 末尾空格的解析问题。如无法升级，可在 IIS 管理器中禁用不必要的脚本映射（如 .htr），或使用 URLScan 工具过滤包含空格的请求作为临时缓解措施。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "Microsoft Windows NT Web 服务器源代码泄露漏洞"
updated = "2026-06-16T21:48:04.477"

