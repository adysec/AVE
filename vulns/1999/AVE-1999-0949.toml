[basic]
description = "Sendmail 8.10.0 及之前版本在处理 SMTP ETRN 命令时存在缺陷，远程攻击者可发送一系列 ETRN 命令后主动断开连接，而 Sendmail 进程仍在后台继续处理这些命令，导致资源耗尽引发拒绝服务。该漏洞影响 Sendmail 8.10.0 之前版本（含 8.9.1/8.9.3 等），CVSS 评分 5.0（AV:N/AC:L/Au:N/C:N/I:N/A:P），攻击无需身份认证，仅需网络访问 SMTP 端口即可发起攻击，利用方式为发送多条 ETRN 命令后断开 TCP 连接，导致服务器持续消耗资源处理已断连的命令队列，最终服务不可用。Eric Allman 已在 Sendmail 8.10.0 版本中修复此漏洞，建议升级至 8.10.0 或更高版本。"
published = "1999-12-22T05:00:00.000"
remediation = '''
升级 Sendmail 至 8.10.0 或更高版本（如 8.15.2），或在 sendmail.mc 中添加 `FEATURE(\`no_etrn\')` 禁用 ETRN 命令，重新编译 sendmail.cf 后重启 sendmail 服务；若无法升级，可在防火墙层面限制 25 端口仅允许可信 IP 访问，或在 /etc/mail/access 中添加 `ETRN RELAY` 限制 ETRN 命令来源 IP。
'''
