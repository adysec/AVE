[basic]
description = "SCO UnixWare 7.0 至 7.1.1 版本的特权进程系统在程序初始化阶段存在安全缺陷。本地已登录的普通用户可利用 gdb 等调试器，在特权进程执行前于 _init 函数中插入断点陷阱，从而干预并控制特权进程的运行流程，最终提升权限至 root。该漏洞影响 SCO UnixWare 7.0、7.0.1、7.1 及 7.1.1 等版本，攻击前提是攻击者需具备本地登录权限，通过调试特权程序实现本地权限提升。"
published = "2000-04-11T04:00:00.000"
remediation = "建议升级到 SCO UnixWare 7.1.1 及以上已修复版本，并安装 SCO 官方发布的安全补丁（如 oss646、oss657 系列补丁包）。如暂无法升级，可移除或限制特权程序上的调试权限，使用 chmod 755 收紧 setuid 程序权限，并通过 /etc/limits 或内核参数禁止普通用户对特权进程使用 gdb 等调试器作为临时缓解措施。"
score = 7.2
severity = "HIGH"
sources = ["exploitdb"]
