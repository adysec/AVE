[basic]
description = "Microsoft Internet Explorer 5 存在 WPAD（Web 代理自动发现）欺骗漏洞。该漏洞源于 IE5 在通过 WPAD 协议自动发现代理配置时缺乏充分的来源验证，远程攻击者可搭建恶意的 WPAD 服务器，诱使受害者客户端从中获取伪造的代理自动配置文件，从而篡改 IE 客户端的代理设置。攻击成功后，攻击者可将受害者的网络流量重定向至由其控制的代理服务器，进而实施中间人攻击、窃取敏感信息或劫持会话。利用条件为攻击者需处于可影响目标 WPAD 解析的网络位置（如同一局域网或可控 DNS/DHCP 环境），CVSS 评分 5.0，危害等级中等。"
published = "1999-12-02T05:00:00.000"
remediation = "该漏洞影响已停止支持的 Internet Explorer 5，建议立即升级至现代浏览器（如 Edge/Chrome/Firefox）。如因兼容性必须使用旧版 IE，可通过组策略禁用 WPAD（计算机配置 → 管理模板 → Windows 组件 → Internet Explorer → 禁用自动检测设置），或在网络边界防火墙拦截 WPAD 的 DHCP 选项 252 及 DNS wpad 解析请求作为临时缓解。"
score = 5.0
severity = "MEDIUM"
sources = ["avd"]
title = "Microsoft Internet Explorer 5 WPAD远程代理配置欺骗漏洞"
updated = "2026-06-16T21:49:12.260"

