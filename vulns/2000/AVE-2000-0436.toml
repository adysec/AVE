[basic]
description = "Netscape Communicator 4.73 之前版本及 Navigator 4.07 存在 SSL 证书验证缺陷，未正确验证服务器 SSL 证书的有效性，导致远程攻击者可通过中间人攻击方式，将用户从合法网站的流量重定向至攻击者控制的恶意服务器，从而窃取敏感信息。该漏洞利用门槛较低，危害中等，影响大量早期 Netscape 浏览器用户。"
published = "2000-05-10T04:00:00.000"
remediation = "升级 Netscape Communicator 至 4.73 及以上版本，或 Navigator 至 4.07 及以上版本，以启用正确的 SSL 证书验证机制。如无法升级，建议在浏览器中禁用自动接受 SSL 证书选项，并手动检查证书颁发机构合法性作为临时缓解措施。"
score = 2.6
severity = "LOW"
sources = ["epss"]
title = "Netscape Navigator 和 Communicator SSL证书验证绕过漏洞"
updated = "2026-06-16T21:51:38.967"

