[basic]
description = "Symantec Norton AntiVirus for Exchange (NavExchange) 存在缓冲区溢出漏洞，远程攻击者可通过发送包含超长文件名的 .zip 压缩包触发漏洞，导致拒绝服务。该漏洞影响 Norton AntiVirus for Exchange 相关版本，攻击者无需身份认证即可远程利用，通过构造恶意压缩文件引发缓冲区溢出，使服务崩溃或无响应，CVSS 评分 5.0，属于中危拒绝服务漏洞。"
published = "2000-06-14T04:00:00.000"
remediation = "建议立即升级 Norton Antivirus for Exchange (NavExchange) 至 2000 年 6 月发布的修复版本（版本 6.0.3 或更高版本），可通过 Symantec 官方网站下载最新补丁包（Symantec Security Update 2000-06-14）。如无法立即升级，可在 Exchange 服务器防火墙层面暂时禁用 .zip 文件附件的接收，或在邮件网关层面配置附件过滤规则拦截包含超长文件名的 .zip 附件作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Symantec Norton Antivirus for Exchange 缓冲区溢出拒绝服务漏洞"
updated = "2026-06-16T21:51:49.120"

