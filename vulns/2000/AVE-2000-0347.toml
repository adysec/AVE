[basic]
description = "Linux Kernel 2.2.x 系列版本的 NFS 服务组件 knfsd 存在拒绝服务漏洞。远程攻击者无需身份认证即可通过向目标系统 NFS 服务发送恶意构造的负数值（negative size）请求，触发 knfsd 处理异常，导致服务崩溃或拒绝服务。该漏洞影响 Linux Kernel 2.1/2.2/2.3 系列版本。"
published = "2000-05-01T04:00:00.000"
remediation = "升级 Linux 内核至 2.2.16 或更高版本（该漏洞已在 2.2.16 中修复），或在 knfsd 配置中限制客户端来源，通过 iptables 限制对 NFS 端口（2049/TCP/UDP）的访问仅允许可信 IP 段。如无法升级内核，可在 /etc/exports 中使用 secure 选项并禁用匿名写入权限作为临时缓解。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Linux Kernel NFS Server knfsd 拒绝服务漏洞"
updated = "2026-06-16T21:51:31.287"

