[basic]
description = "Slackware Linux 7.0 的 login 程序在处理远程登录认证时存在信息泄露漏洞。当用户尝试通过远程方式登录时，若目标账户被锁定或根本不存在，login 程序会返回特定的加密错误信息，而有效账户在同样情况下则不会返回该错误。未经身份认证的远程攻击者可通过反复尝试不同的用户名并观察系统返回的报错差异，从而准确识别出目标系统上存在的有效用户名。该漏洞影响运行 Slackware Linux 7.0 且开放远程登录服务（如 telnet、rlogin）的系统，攻击条件为攻击者能够与目标主机的登录服务建立网络连接，利用方式是通过枚举用户名并比对系统响应差异进行用户枚举，进而为后续口令爆破或定向攻击收集有效账户信息。"
published = "1999-12-01T05:00:00.000"
remediation = "建议将 Slackware 7.0 系统升级至包含修复补丁的后续版本（如通过 slackware.com 获取 security/fixes 中的 login 更新包并运行 installpkg 安装），或手动重新编译安装 shadow/login 工具至已修复版本。作为临时缓解，可在 /etc/login.defs 中调整账户锁定与错误提示策略，并配合防火墙限制对 login 服务的远程访问，避免攻击者通过加密错误差异枚举有效账户。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
