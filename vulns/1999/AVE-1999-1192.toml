[basic]
description = "OpenServer 5.0.5 系统中的 sar 工具存在缓冲区溢出漏洞。本地攻击者可通过向 -o 参数传递超长字符串触发该漏洞，导致缓冲区溢出，从而覆盖进程内存空间，最终获取系统 root 权限。该漏洞影响 OpenServer 5.0.5 版本，攻击者须拥有本地操作系统账户方可利用，无需网络远程访问。"
published = "2002-05-01T04:00:00.000"
remediation = "建议安装 Caldera 安全公告 CSSA-2002-SCO.17 对应补丁，将 OpenServer 升级至修复版本。如无法立即打补丁，可执行 chmod u-s /usr/bin/sar 移除 sar 的 suid 权限，阻断本地普通用户通过该漏洞获取 root 提权的攻击路径。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "SCO OpenServer sar 本地缓冲区溢出漏洞"
updated = "2026-06-16T21:50:44.467"

