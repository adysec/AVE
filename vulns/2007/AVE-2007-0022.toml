[basic]
description = "VideoLAN VLC Media Player 0.8.6d 的 modules/demux/subtitle.c 模块存在栈缓冲区溢出漏洞，由于对 MicroDvd、SSA 和 Vplayer 格式字幕文件中的长字幕字符串缺乏长度校验，远程攻击者可构造包含超长字幕的恶意字幕文件，诱导用户在 VLC 中打开，触发栈缓冲区溢出实现任意代码执行。该漏洞影响 VLC 0.8.6d 及衍生版本（如 Kantaris 0.3.4），CVSS 7.5 分（AV:N/AC:L/Au:N/C:P/I:P/A:P），攻击向量为网络、攻击复杂度低、无需认证，可导致机密性、完整性、可用性均受损。攻击者需诱导受害者打开精心制作的字幕文件，利用方式为构造超长字幕字符串触发栈溢出实现远程代码执行。VideoLAN 已在后续版本中修复该漏洞，用户应升级至修复版本。ExploitDB 编号 5667 提供了公开 PoC。"
published = "2008-01-17T01:00:00.000"
remediation = "建议立即升级 VLC Media Player 至 0.8.6e 或更高版本（如 0.9.0、1.0.0 及以上版本），可从 VideoLAN 官网 (https://www.videolan.org/vlc/) 下载最新版本。若暂无法升级，建议禁止播放来源不明的 SSA/MicroDvd/Vplayer 字幕文件，或在播放前使用文本编辑器检查字幕文件长度，避免过长字幕触发缓冲区溢出。同时建议部署应用层防火墙或启用 DEP/ASLR 等缓解措施降低被利用风险。"
score = 7.5
severity = "HIGH"
sources = ["tenable"]
title = "VideoLAN VLC Media Player 栈缓冲区溢出漏洞"
updated = "2026-06-16T22:48:33.867"

