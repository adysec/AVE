[basic]
description = "某网络入侵检测系统（IDS）存在安全漏洞，其根本原因在于系统在处理网络数据包时未对数据包的校验和（checksum）进行验证。攻击者可利用此缺陷构造带有错误校验和的特制数据包，这类数据包会被目标主机的协议栈丢弃，但仍能被 IDS 接收并解析，从而造成 IDS 与真实主机对流量的理解不一致。未经身份认证的远程攻击者借此可绕过入侵检测机制，使恶意流量逃避监控，或注入伪造数据干扰检测结果，进而掩盖后续攻击行为。该漏洞无需任何认证凭证，仅需向受监控网络发送数据包即可触发，影响范围覆盖所有未做校验和验证的网络入侵检测系统，CVSS 评分为 10.0，危害等级严重。"
published = "1999-01-01T05:00:00.000"
remediation = "在网络入侵检测系统（IDS）的配置中启用并强制校验数据包 IP/TCP 校验和（checksum），丢弃校验和错误的伪造或篡改报文；升级到已修复该缺陷的 IDS 厂商版本（如 Snort 1.6 及以上、ISS RealSecure 最新补丁），并在边界部署状态化防火墙对异常分片与伪造流量进行过滤，作为临时缓解措施。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
