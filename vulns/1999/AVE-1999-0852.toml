[basic]
description = "Groupwise 企业级邮件系统 Web 服务器 GWWEB.EXE 存在路径遍历漏洞，攻击者可远程访问 HELP 参数获取服务器的内部路径结构，并读取位于 Web 根目录之外的 .htm 文件。该漏洞源于应用程序泄露绝对文件系统路径信息，缺乏对 HELP 异步的充分访问控制。攻击者可通过构造恶意请求枚举服务器目录结构，进而访问服务器之外的敏感文件。该漏洞已在 GroupWise 5.2 和 5.5 版本中被证实，影响范围涵盖该邮件系统的 Web 界面帮助功能。"
published = "1999-12-19T05:00:00.000"
remediation = '建议升级 Novell GroupWise 到已修复该路径遍历问题的官方版本（GroupWise 5.5 EP 及以上），并应用 Novell 发布的对应 Support Pack 补丁。如无法立即升级，可在 Web 服务器前端部署反向代理或 WAF 规则过滤 HELP 参数中的 "../"、绝对路径等遍历字符，并禁用或限制 GWWEB.EXE 对敏感目录的访问，仅开放必要虚拟路径作为临时缓解措施。'
score = 5.0
severity = "MEDIUM"
sources = ["epss"]
title = "Groupwise 企业级邮件系统 Web 服务器 GWWEB.EXE 路径遍历漏洞"
updated = "2026-06-16T21:49:30.503"

