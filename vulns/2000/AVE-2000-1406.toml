[basic]
description = "O'Reilly WebSite Professional Web 服务器 2.4 及更早版本存在缓冲区溢出漏洞，未经身份认证的远程攻击者可通过向目标系统发送超长的 GET 请求或 Referer 头部触发该漏洞，导致任意代码执行。该漏洞影响 WebSite Professional 2.4 及之前版本，CVSS 评分 10.0，危害等级严重，建议受影响的用户立即升级至安全版本。"
published = "2000-07-17"
remediation = "O'Reilly WebSite Professional 已停止维护，建议立即升级到 2.5 及以上版本（若仍可获得），或迁移至 Apache/Nginx 等活跃维护的 Web 服务器。临时缓解措施可在网络层或反向代理处过滤超长 GET 请求及 Referer 头。"
score = 10
severity = "CRITICAL"
sources = ["cve"]
title = "O'Reilly WebSite Professional 缓冲区溢出远程代码执行漏洞"
updated = "2000-07-17"

