[basic]
description = "Ubiquiti Networks AirOS 存在命令注入漏洞，攻击者可通过向 stainfo.cgi（显示 AP 信息页面）发送特制的 GET 请求，在 ifname 参数中注入 shell 元字符来执行任意系统命令，导致远程代码执行。未经认证的远程攻击者可借此完全控制受影响设备。该漏洞影响 Ubiquiti 多款 802.11 ISP 产品、AirMax ISP 产品及 AirSync 固件版本，CVSS 评分 9.8，危害等级严重。厂商已在 v4.0.1/v5.3.5/v5.4.5 版本中修复。"
published = "2019-06-11T21:29:00.350"
remediation = "将 802.11 ISP 产品升级至 v4.0.1 及以上版本，AirMax ISP 产品升级至 v5.3.5 及以上版本，AirSync 固件升级至 v5.4.5 及以上版本。如无法立即升级，可通过防火墙规则限制对 stainfo.cgi 的未授权外部访问作为临时缓解措施。"
score = 9.8
severity = "CRITICAL"
sources = ["kev"]
title = "Ubiquiti Networks AirOS 命令注入漏洞"
updated = "2026-06-16T23:26:34.420"

