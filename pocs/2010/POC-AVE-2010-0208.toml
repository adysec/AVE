[info]
author = "AVE"
description = "检测 Microsoft Internet Explorer 6/7 中 iepeers.dll 释放后使用漏洞。通过检查 User-Agent 识别易受攻击的 IE 版本，该漏洞允许远程攻击者通过特制网页执行任意代码。"
id = "POC-AVE-2010-0208"
name = "Microsoft Internet Explorer Peer Objects Use-After-Free PoC"
severity = "high"
tags = [
    "cve-2010-0806",
    "ie",
    "use-after-free",
    "ms10-018",
    "iepeers",
]
vuln_id = [
    "CVE-2010-0806",
    "AVE-2010-0208",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "header"
type = "word"
words = [
    "MSIE 6.0",
    "MSIE 7.0",
]
