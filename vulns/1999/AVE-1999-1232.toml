[basic]
description = "Solaris（含 2.5 x86 及 7.0 等版本）系统中运行的 aspppd 守护进程在创建临时通信文件时存在不安全临时文件处理缺陷，会以可预测的固定路径 /tmp/.asppp.fifo 创建 FIFO 管道且未做安全校验。本地已登录的普通用户可在该文件创建前预先放置指向系统关键文件（如 /etc/passwd 或具有 root 属主权限的文件）的符号链接，从而实施符号链接攻击。当 aspppd 以 root 权限运行时，会向该符号链接指向的目标文件写入内容，使本地攻击者能够篡改任意文件并借此提升权限至 root。该漏洞利用条件为攻击者需具备目标系统的本地用户访问权限且 aspppd 以特权身份运行，CVSS 评分 7.2，危害等级为高。"
published = "1996-12-20T05:00:00.000"
remediation = "升级 Solaris 系统至 7.0 以上已修复版本，或安装 Sun 官方补丁 106541-xx。临时缓解措施：在 /etc/init.d/aspppd 启动脚本中添加 umask 077 并删除 setuid 权限；如无需拨号服务，执行 /usr/bin/chmod 000 /usr/sbin/aspppd 禁用该程序；确保 /tmp 目录设置粘滞位 (chmod +t /tmp) 防止符号链接攻击。"
score = 7.2
severity = "HIGH"
sources = ["exploitdb"]
