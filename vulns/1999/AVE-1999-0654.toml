[basic]
description = "FreeBSD 3.3 系统自带的 gdc 程序存在缓冲区溢出漏洞。该程序在处理用户输入（如命令行参数或特定交互数据）时未对边界进行校验，导致攻击者可通过构造超长的恶意输入数据溢出缓冲区，进而覆盖返回地址并执行任意代码。该漏洞属于本地漏洞，影响范围为运行 FreeBSD 3.3 版本的系统的本地用户。攻击条件是攻击者需先获得目标系统的本地用户权限，随后运行经构造的 gdc 利用载荷即可提权至 root，从而完全控制受影响主机。"
published = "1999-12-01T05:00:00.000"
remediation = "立即将 FreeBSD 系统升级至 3.3-STABLE 及以上版本（通过 /usr/sbin/upgrade 或源码 make world 重新编译安装 gdc 所在的基础系统组件）。在无法立即升级的过渡期内，可用 chmod 555 /usr/bin/gdc 取消其 setuid 位，并以 root 执行 chflags schg /usr/bin/gdc 防止被篡改，从而消除本地提权风险。"
score = 7.2
severity = "HIGH"
sources = ["epss"]
title = "FreeBSD gdc 缓冲区溢出漏洞"
updated = "2026-06-16T21:49:11.897"

