[basic]
description = "百易云资产管理运营系统存在任意文件上传漏洞，攻击者可通过向 /comfileup.php 接口发送特制的 multipart/form-data 请求，绕过服务端文件类型校验，上传恶意 PHP 脚本至服务器。成功利用该漏洞可导致远程代码执行，完全控制目标服务器。该漏洞无需身份认证即可远程触发，攻击门槛低，危害严重。建议厂商及时修复文件上传逻辑，对上传文件类型进行严格校验。"
published = "0726"
remediation = "立即联系百易云官方获取最新安全补丁，升级至修复任意文件上传漏洞的版本。临时缓解措施：在 Web 服务器层面限制 `/comfileup.php` 的访问权限，仅允许可信 IP 访问；部署 WAF 规则拦截上传目录的可执行脚本访问请求；严格校验上传文件类型，禁止上传 PHP 等可执行脚本文件。"
