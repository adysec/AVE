[basic]
description = "AIX 4.3 系统中 nslookup 工具的 lex 例程存在缓冲区溢出漏洞，攻击者通过向 nslookup 输入超长字符串可触发缓冲区溢出，导致程序核心转储甚至执行任意代码。该漏洞影响 IBM AIX 4.3 版本，远程攻击者可在未授权情况下利用该漏洞实施攻击，CVSS 评分 7.5，危害等级高。"
published = "1998-07-06T04:00:00.000"
remediation = "安装 IBM APAR#IX79909 补丁以修复 AIX 4.3 nslookup lex 缓冲区溢出漏洞。AIX 4.3 已停止支持，建议升级至 AIX 7.2/7.3 等受支持版本。临时缓解措施：移除 nslookup 的 setuid 权限（chmod -s /usr/bin/nslookup），限制可执行 nslookup 的用户范围。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "IBM AIX nslookup 缓冲区溢出代码执行漏洞"
updated = "2026-06-16T21:50:45.107"

