[basic]
description = "Ascend 和 3com 路由器在处理 TCP 选项时存在拒绝服务漏洞，远程攻击者无需身份认证即可向目标设备发送包含零长度 TCP 选项（Zero Length TCP Option）的特制数据包，触发路由器协议栈在处理畸形 TCP 选项时出现异常，导致设备崩溃并强制重启，造成拒绝服务。该漏洞影响了 Ascend 系列及 3com 系列路由器产品，攻击者仅需构造并发送少量恶意数据包即可触发。"
published = "1997-12-01"
remediation = "该漏洞影响 Ascend R 4.5 Ci12 及早期版本以及部分 3com 系列路由器，相关产品均已停产且不再提供安全更新。建议立即升级至 Ascend（后并入 Lucent/阿尔卡特）后续不受影响的固件版本，或迁移至受支持的现代网络设备；无法升级时，在网络边界防火墙配置 ACL 过滤包含零长度 TCP 选项的异常报文，并禁用不必要的 TCP 扩展选项以降低攻击面。"
score = 5.0
severity = "MEDIUM"
sources = ["cve"]
title = "3Com Ascend 路由器 TCP 零长度选项拒绝服务漏洞"
updated = "2026-06-16"

