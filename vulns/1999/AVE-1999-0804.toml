[basic]
description = "Internet Explorer 或 Netscape Navigator 等 Web 浏览器的安全配置不当，允许执行 ActiveX、Java、JavaScript 等活动内容。攻击者可构造恶意网页诱导用户访问，触发恶意代码执行，影响未正确配置安全设置的 IE 或 Netscape 用户。攻击者仅需诱导受害者访问恶意页面即可触发代码执行，CVSS 评分 7.5，危害等级高危。"
published = "1998-04-01T05:00:00.000"
remediation = '禁用浏览器中的 ActiveX、Java Applet 和 JavaScript 执行权限，在 IE 安全选项中将"运行 ActiveX 控件和插件"设为"禁用"或"提示"， Netscape 中取消勾选"启用 Java"和"启用 JavaScript"，建议升级至现代浏览器（如 Chrome/Firefox/Edge 最新版）并启用站点隔离与脚本阻断扩展。'
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "Microsoft Internet Explorer 及 Netscape Navigator 活动内容执行漏洞"
updated = "2026-06-16T21:48:36.140"

