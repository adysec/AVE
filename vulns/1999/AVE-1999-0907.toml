[basic]
description = '该候选编号已被拒绝，原描述为"Telnet 服务正在运行"。Telnet 协议以明文传输所有数据（包括用户名和密码），未提供任何加密或认证机制，远程攻击者可通过网络嗅探拦截并窃取敏感凭据。此条目属于安全配置问题（不应启用不安全的 Telnet 服务）而非软件漏洞，因此被移入通用配置枚举（CCE）进行管理，建议使用 SSH 等安全替代方案。'
published = "1999-01-01T05:00:00.000"
remediation = "关闭 Telnet 服务（端口 23），改用 SSH（端口 22）进行远程管理。如因兼容性无法禁用，应在防火墙限制 Telnet 的源 IP 访问范围，仅允许受信任的管理网段连接，并启用加密通道（如 stunnel）封装 Telnet 流量。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "通用 Telnet 服务配置不当问题"
updated = "2023-11-07T01:54:59.450"

