[basic]
description = "海信智能公交企业管理系统 BusDefAssgnManagement.aspx 页面存在 SQL 注入漏洞。攻击者可在未授权情况下，通过向该页面传入特制的恶意 SQL 查询参数，绕过应用层安全过滤机制，直接操纵后台数据库执行任意 SQL 语句，导致敏感数据泄露、数据被篡改甚至获取服务器控制权。该漏洞影响海信智能公交企业管理系统的多个部署版本，危害较大。"
published = "0719"
remediation = "建议联系海信获取官方补丁或升级至最新版本；同时在代码层对 BusDefAssgnManagement.aspx 页面的传入参数进行严格类型校验与参数化查询改造，禁止拼接 SQL 语句；临时缓解措施可在 WAF 或 IIS 层面配置针对该类页面参数含 SQL 关键字（如 UNION、SELECT、OR 1=1）的拦截规则。"
score = 5
severity = "MEDIUM"
