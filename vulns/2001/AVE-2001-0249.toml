[basic]
description = "Alt-N MDaemon 3.5.6/5.0.7/6.x 版本的 IMAP 服务存在拒绝服务漏洞，本地用户可通过发送超长的 SELECT 或 EXAMINE 命令导致 IMAP 服务挂起，造成拒绝服务。该漏洞源于 IMAP 服务未正确验证命令参数长度，导致处理超长命令时服务挂起。影响 MDaemon 3.5.6、5.0.7 及 6.x 版本，CVSS 评分 2.1（本地访问、低复杂度、无需认证、部分可用性影响）。攻击者需具备本地账户权限，通过发送超长 IMAP 命令即可触发拒绝服务。ExploitDB (EDB-20696) 及多个 GitHub 仓库均有公开 PoC 验证代码。Alt-N Technologies 已在后续版本中修复此漏洞，建议升级至最新版本。"
published = "2001-08-22T04:00:00.000"
remediation = "建议立即升级 Alt-N MDaemon 至 6.0.7 或更高版本（官方已修复该 IMAP DoS 漏洞），下载地址：https://www.altn.com/Downloads/MDaemon/。若暂时无法升级，请在防火墙层面限制 IMAP 端口（143/993）仅允许受信任内网 IP 访问，并在本地策略中限制非管理员用户执行 IMAP 命令，同时监控 IMAP 服务进程是否因长 SELECT/EXAMINE 命令挂起，必要时重启 MDaemon IMAP 服务作为临时缓解。"
score = 2.1
severity = "LOW"
sources = ["exploitdb"]
title = "Alt-N MDaemon 拒绝服务漏洞"
updated = "2026-06-16T21:54:34.850"

