[basic]
description = "Check Point Firewall-1 3.0 和 4.0 版本存在内部地址信息泄漏漏洞。当防火墙处理网络连接时，未能正确过滤数据包中的私有 IP 地址信息，导致数据包中遗留了内部主机的真实 IP 地址。远程攻击者无需身份认证，可通过监听或捕获这些泄漏的数据包，获取受保护网络内部主机的真实 IP 地址，进而为后续针对内部网络的攻击提供信息支撑。该漏洞影响 Check Point Firewall-1 3.0 及 4.0 版本，CVSS 评分 5.0，属于中危漏洞。"
published = "2000-03-11T05:00:00.000"
remediation = "升级 Check Point Firewall-1 至 4.1 及以上版本，并在防火墙规则中启用 anti-spoofing（反欺骗）功能，对所有内部接口配置源地址验证，阻止私有 IP 地址段的数据包泄漏到外部网络。同时建议使用 Hide NAT 对外隐藏内部真实 IP。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Check Point Firewall-1 内部地址泄漏漏洞"
updated = "2026-06-16T21:51:10.150"

