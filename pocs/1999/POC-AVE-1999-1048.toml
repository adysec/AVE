[info]
author = "AVE"
description = "检测目标系统上是否存在易受符号链接攻击的 gzexe 脚本。通过检查 /usr/bin/gzexe 文件存在性及内容特征，判断系统是否运行受影响版本的 gzip 工具包。"
id = "POC-AVE-1999-1048"
name = "GNU gzip gzexe 临时文件符号链接漏洞 PoC"
severity = "low"
tags = ["ave-1999-1048"]
vuln_id = [
    "CVE-1999-1332",
    "AVE-1999-1048",
]

[poc]
logic = "all"

[[poc.requests]]
path = "/usr/bin/gzexe"
protocol = "file"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["#!/bin/sh"]
