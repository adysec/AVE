[basic]
description = "数字Unix 4.0F 系统中存在 kdebug 守护进程（kdebugd）漏洞，攻击者无需认证即可通过向目标系统发送包含完整文件路径的初始化数据包，绕过路径限制访问系统中的任意文件。该漏洞可读取敏感配置文件、日志记录和认证凭据等关键文件，影响范围涵盖数字Unix 4.0F 所有版本。攻击条件为网络可达、低攻击复杂度、无需认证，利用方法为构造恶意初始化数据包并指定目标文件路径。 CVSS 评分 6.4，等级为中危威胁，目前仍无官方补丁修复。只需发送一个包含特定格式初始化包的网络数据包即可触发漏洞，对系统安全构成严重威胁。漏洞影响数字Unix 4.0F系统的整个文件系统中所有文件的可读性，攻击者可利用此漏洞获取系统关键配置、审计日志和用户认证信息等隐私数据，可能进一步伪造凭据或利用信息进行二次攻击。该漏洞存在于数字Unix系统的内核级调试进程中，其管理网络连接和初始化参数的功能被攻击者滥用，导致其文件访问控制逻辑被绕过，实现了对系统文件系统的横向遍历和敏感信息的非法获取。"
published = "2000-11-14T05:00:00.000"
remediation = "在 Digital UNIX/Tru64 UNIX（受影响至 5.0）上编辑 /etc/inetd.conf，注释或删除 kdebugd 相关行以禁用该服务，保存后执行 kill -HUP $(cat /var/run/inetd.pid) 或重启 inetd 使配置生效；并升级至 Tru64 UNIX V5.1 及厂商初始补丁包以获得官方修复。"
score = 6.4
severity = "MEDIUM"
sources = ["cve"]
title = "Digital Digital Unix 4.0F kdebugd 任意文件读取漏洞"
updated = "2026-06-16T21:52:35.270"

