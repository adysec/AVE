[basic]
title = "Microsoft Windows NT 4.0/2000 TCP/IP 打印服务拒绝服务漏洞"
description = "Microsoft Windows NT 4.0 和 Windows 2000 的 TCP/IP Printing Services（即 Print Services for Unix）在处理特制的畸形打印请求时，会导致 TCPSVC.EXE 进程崩溃，进而造成打印服务中断，同时影响 DHCP 等其他依赖该进程的服务。攻击者无需高权限即可发起攻击，但该服务默认未安装。受影响系统包括 Windows NT 4.0 Workstation/Server/Enterprise/Terminal Server Edition 以及 Windows 2000 Professional/Server/Advanced Server。"
severity = "LOW"
score = 2.1
sources = ["cve", "microsoft"]
published = "2000-03-30"
updated = "2000-03-30"
remediation = "安装 Microsoft 安全公告 MS00-021 提供的官方补丁。Windows 2000 用户可从 Microsoft Download Center 获取补丁，Windows NT 4.0 用户需根据平台（Intel/Alpha）选择对应补丁。如非必要，建议禁用 TCP/IP Printing Services 服务以降低风险。"
