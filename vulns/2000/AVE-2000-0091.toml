[basic]
description = "EasyCart 购物车应用程序存在敏感信息修改漏洞，远程攻击者可通过修改隐藏表单字段（hidden form fields）中的参数值，绕过服务器的安全验证机制，直接篡改订单金额、商品价格等敏感交易信息。该漏洞源于应用程序对用户提交的隐藏字段缺乏有效的服务端校验，攻击者无需身份认证即可通过构造特制的 HTTP 请求实施攻击，影响使用 EasyCart 的在线购物系统，可能导致企业遭受经济损失。建议将隐藏字段移至服务端管理或对关键交易参数进行签名验证。"
published = "2000-02-01T05:00:00.000"
remediation = "迁移至服务端会话机制，所有订单关键数据（价格、数量、商品ID）必须在服务端验证而非依赖隐藏表单字段；在 form 提交时对隐藏字段值进行 HMAC 签名校验；若原 EasyCart 已停止维护，建议替换为支持现代安全机制的购物车系统。同时实施输入验证：对客户端提交的所有数值进行范围检查和服务器端重新计算。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "EasyCart 购物车应用隐藏表单域信息篡改漏洞"
updated = "2026-06-16T21:51:00.797"

