[info]
author = "ave"
description = "检测 Microsoft Internet Explorer 4.0/5.0 中 Eyedog ActiveX 控件被错误标记为可安全执行脚本的漏洞。远程攻击者可通过构造恶意网页诱导用户访问，利用该控件执行任意命令。"
id = "POC-AVE-1999-0196"
name = "Microsoft Internet Explorer 4/5 ActiveX Eyedog Remote Code Execution PoC"
severity = "medium"
tags = ["ave-1999-0196"]
vuln_id = [
    "CVE-1999-0669",
    "AVE-1999-0196",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["Eyedog"]
