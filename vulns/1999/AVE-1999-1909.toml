[basic]
description = "MSN Setup BBS 4.71.0.10 ActiveX 控件（setupbbs.ocx）存在缓冲区溢出漏洞。远程攻击者可通过向该控件的 vAddNewsServer 或 bIsNewsServerConfigured 方法传递特制参数触发缓冲区溢出，从而在用户浏览器上下文中执行任意命令。该漏洞影响 Microsoft MSN Messenger Service 1.0 及关联组件，攻击者可通过构造恶意网页诱导用户访问来实施攻击，CVSS 评分 7.5，危害等级高。"
published = "1999-09-24T04:00:00.000"
remediation = '卸载 MSN Messenger Service 1.0，升级至受支持的通信客户端如 Skype；若无法卸载，在注册表 `HKLM\SOFTWARE\Microsoft\Internet Explorer\ActiveX Compatibility\{F3E1BD5C-1EB9-4FBF-98A9-2A6D2590D3C8}` 下新建 `Compatibility Flags` DWORD 值为 `0x0400` 以启用 kill bit 禁用 `setupbbs.ocx` 控件，并删除 `C:\Windows\Downloaded Program Files\setupbbs.ocx` 文件。'
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "Microsoft MSN Messenger Setup BBS ActiveX 控件缓冲区溢出漏洞"
updated = "2026-06-16T21:50:32.423"

