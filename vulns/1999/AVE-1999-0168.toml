[basic]
description = "BMC Patrol 管理软件存在认证会话重放漏洞，远程攻击者无需身份认证即可通过网络捕获并重放有效的管理员认证数据包，从而获取管理员密码并完全控制受影响的 Patrol 管理控制台。该漏洞源于会话令牌缺乏时间戳或一次性使用机制，攻击者只需具备网络监听能力即可实施攻击，CVSS v2.0 评分为 10.0，危害等级严重。"
published = "1999-04-01T05:00:00.000"
remediation = "升级 BMC Patrol 至 3.2 及以上版本，该版本修复了认证会话中缺少随机数（nonce）机制的问题，可有效防止重放攻击。如无法升级，应在网络层面限制 Patrol Agent 管理端口（默认 3181/TCP）的访问来源，仅允许受信任管理 IP 连接，并启用 Patrol 的 SSL/TLS 加密通信功能。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "BMC Patrol 管理软件重放攻击漏洞"
updated = "2026-06-16T21:48:24.467"

