[basic]
description = "Shadow Op Software Dragon Server 1.0 和 2.0 版本 FTP 服务器存在拒绝服务漏洞。该漏洞源于服务器在处理用户认证请求时对 USER 命令的长度缺乏有效校验，未经身份认证的远程攻击者只需向目标 FTP 服务发送超长 USER 命令即可触发服务异常或崩溃，导致合法用户无法正常使用 FTP 服务。攻击者无需任何凭据即可在远程发起攻击，攻击条件简单且攻击成功率高。受影响版本包括 Dragon Server 1.0 及 2.0，可造成服务完全中断。厂商建议用户升级至安全版本或通过防火墙限制 FTP 访问来源以缓解风险。"
published = "2000-06-16T04:00:00.000"
remediation = "立即停止使用 Dragon Server 1.0/2.0，该软件已停止维护且存在未修复漏洞。迁移至受支持的 FTP 服务器（如 vsftpd 3.0.5+、ProFTPD 1.3.8+ 或 FileZilla Server），并验证新服务器对超长 USER 命令具有输入长度校验。如短期内无法替换，应在防火墙或 IDS 中部署规则拦截 FTP USER 命令超过 200 字符的连接，同时对 FTP 服务实施连接速率限制，每个源 IP 每分钟最多允许 5 次连接尝试，以降低拒绝服务攻击风险。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Shadow Op Software Dragon FTP Server 远程拒绝服务漏洞"
updated = "2026-06-16T21:51:49.370"

