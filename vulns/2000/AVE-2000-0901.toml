[basic]
description = "Microsoft Outlook 98/2000 在处理 vCard（.vcf）文件时未对超长或畸形字段进行正确验证，存在拒绝服务漏洞。远程攻击者可向目标用户发送特制的 vCard 邮件附件，当用户使用 Outlook 打开该附件时，畸形的 vCard 数据会导致 Outlook 应用程序崩溃或异常退出，造成拒绝服务。该漏洞无需身份认证即可远程触发，攻击条件简单，影响 Microsoft Outlook 98 及 2000 版本。"
published = "2000-10-20T04:00:00.000"
remediation = "建议升级到 Outlook 2000 Service Pack 3 或更高版本，该补丁已修复 vCard 解析中的缓冲区处理缺陷。如无法升级，可在 Outlook 中禁用自动预览 vCard 附件功能，并将安全区域设置为「受限站点」以防止自动加载 .vcf 文件。同时教育用户不要打开来自不可信来源的 vCard 附件。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Microsoft Outlook 98/2000 vCard 拒绝服务漏洞"
updated = "2026-06-16T21:52:24.937"

