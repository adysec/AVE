[basic]
description = "Computer Software Manufaktur 公司开发的 Alibaba 2.0 Web 服务器存在管道命令处理缺陷，远程攻击者无需身份认证即可通过向目标发送特制的 HTTP 请求触发该漏洞，导致服务器进程崩溃或拒绝服务。该漏洞影响 Alibaba 2.0 版本，攻击复杂度低，危害等级中危。"
published = "2000-07-18"
remediation = "建议立即停止使用已停止维护的 Computer Software Manufaktur Alibaba 2.0 Web 服务器，替换为 Apache HTTP Server 或 Nginx 等仍在积极维护的 Web 服务器。如暂时无法替换，应在防火墙或反向代理层面限制入站 HTTP 请求的 URI 长度（建议不超过 1024 字节），并配置入侵防御系统拦截异常超长 GET 请求。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Computer Software Manufaktur Alibaba 2.0 管道命令远程拒绝服务漏洞"
updated = "2000-07-18"

