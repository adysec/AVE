[basic]
description = "Red Hat Linux 2.1 系统中 abuse 游戏的控制台工具（abuse.console）使用相对路径调用 undrv 程序，本地攻击者可在 PATH 环境变量包含的目录中放置恶意 undrv 程序，当具有 SUID 权限的 abuse.console 被执行时，将以 root 权限加载并执行该木马程序，从而实现本地权限提升。该漏洞影响 Red Hat Linux 2.1 版本，CVSS 评分 7.2，危害等级高危。"
published = "1996-02-02T05:00:00.000"
remediation = "升级 Red Hat Linux 至 2.1 以上版本（如 Red Hat 6.0/7.0），该漏洞已在后续版本中修复。如无法升级，修改 abuse.console 源码，将 undrv 调用路径改为绝对路径（如 /usr/lib/undrv），并限制普通用户对 abuse.console 的执行权限（chmod 750）。"
score = 7.2
severity = "HIGH"
sources = ["epss"]
title = "Red Hat Linux abuse.console 本地权限提升漏洞"
updated = "2026-06-16T21:50:33.307"

