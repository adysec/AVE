[basic]
description = "该漏洞为 BSD 系系统中 lpr 命令处理 -C（classification）命令行选项时的缓冲区溢出漏洞。lpr 程序未对用户输入的 -C 参数长度进行充分校验，本地攻击者可构造超长字符串作为 -C 参数传入，触发栈缓冲区溢出，从而以 root 权限执行任意代码。该漏洞影响 BSD/OS 2.1、FreeBSD 2.1.5、NeXTstep 4.x、IRIX 6.4、SunOS 4.1.3/4.1.4 及基于 BSD 的 Linux 系统，CVSS v2 评分 7.2，危害等级高。"
published = "1996-08-01T04:00:00.000"
remediation = "DUPLICATE: CVE-1999-0335 is a duplicate of CVE-1999-0032. Refer to CVE-1999-0032 for the canonical vulnerability entry. No AVE entry generated."
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "多款 Unix 系统 lpr 缓冲区溢出漏洞"
