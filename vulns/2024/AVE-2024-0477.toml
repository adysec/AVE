[basic]
description = "Rsync 工具中存在路径遍历漏洞，当使用 `--safe-links` 选项时，客户端未能正确验证服务端返回的符号链接目标是否包含嵌套的符号链接，导致攻击者可通过构造恶意的符号链接链绕过安全限制，在目标系统上实现越界写入任意文件。该漏洞影响多个版本的 rsync，CVSS 评分 6.5，危害等级中危。"
published = "2025-01-14T18:15:25.643"
remediation = "立即将 rsync 升级至 3.4.0 或更高版本（官方于 2025 年 1 月 14 日发布修复）。RHEL 用户安装 RHSA-2025:2600/7050/8385 更新（rsync 3.1.3-21.el8_10 或 3.2.5-3.el9）；Debian 用户安装 2025 年 1 月 LTS 安全更新；如无法升级，避免使用 --safe-links 选项连接不可信 rsync 服务器，或禁用 rsync 客户端对不可信源的同步操作作为临时缓解。"
score = 6.5
severity = "MEDIUM"
sources = ["msrc"]
title = "Rsync rsync --safe-links 选项绕过路径遍历漏洞"
updated = "2026-06-30T00:16:48.817"

