[basic]
description = "Novell BorderManager 3.0 及 3.5 版本的 Telnet 连接功能存在拒绝服务漏洞。远程攻击者无需身份认证，只需通过 Telnet 连接至目标系统的 2000 端口并反复按下回车键，即可触发该漏洞，导致 BorderManager 服务停止响应或崩溃，造成拒绝服务。该漏洞影响 Novell BorderManager 3.0 和 3.5 版本，CVSS 评分 5.0，危害等级中等。目前官方已发布补丁修复此漏洞。"
published = "2000-03-30T05:00:00.000"
remediation = "建议升级到 Novell BorderManager 3.5 SP2 或更高版本，或在防火墙规则中限制仅允许可信 IP 访问 TCP 2000 端口。如无需 Telnet 代理服务，可在 BorderManager 管理控制台中禁用该服务以彻底消除风险。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Novell BorderManager 3.0/3.5 远程拒绝服务漏洞"
updated = "2026-06-16T21:51:06.527"

