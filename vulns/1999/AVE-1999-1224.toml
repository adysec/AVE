[basic]
description = "Exim 邮件传输代理在处理本地用户 .forward 文件中的 :include: 指令及别名/转发文件解析时存在缓冲区溢出缺陷。由于对用户可控的输入长度缺乏充分校验，本地攻击者可构造超长或特制的转发文件内容触发栈溢出，从而以 Exim 进程的权限（通常为 root）执行任意代码，实现本地权限提升。攻击者需具备本地账户或能控制被解析的转发/包含文件，利用成功后可完全控制受影响主机。"
published = "1997-07-22T04:00:00.000"
remediation = "立即将 Exim 升级至 1.90 及以上已修复版本（建议直接升级到最新稳定版 3.x 或 4.x 分支）。若无法立即升级，可临时在 exim 配置中禁用用户 .forward 文件的 :include: 功能或限制 lsearch/forwardfile 包含，并收紧对不可信用户的本地 shell 访问以降低被利用风险。"
score = 7.2
severity = "HIGH"
sources = ["exploitdb"]
title = "Exim 本地缓冲区溢出权限提升漏洞"
updated = "2026-06-16T21:49:26.097"

