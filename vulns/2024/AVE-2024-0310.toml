[basic]
description = "用友U8-Cloud的RegisterServlet接口存在SQL注入漏洞，攻击者可在未授权的情况下通过POST请求向usercode参数注入恶意SQL语句，利用SQL Server的报错注入函数获取数据库敏感信息，导致数据泄露。"
published = "2024-06-01"
remediation = "联系用友官方获取U8-Cloud安全补丁，升级至最新版本；或在应用服务器层面部署WAF规则，对RegisterServlet接口的usercode等参数进行SQL注入过滤；限制该接口的访问来源IP。"
score = 7.5
severity = "HIGH"
sources = ["hwpoc"]
title = "用友U8-Cloud RegisterServlet SQL注入漏洞"
