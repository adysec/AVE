[basic]
description = "iCal 2.1 Patch 2 中的 csstart 程序使用相对路径安装 libsocket 和 libnsl 库，本地攻击者可利用 icsuser 账户在当前或父目录放置特洛伊木马库，从而在程序执行时加载恶意库实现本地权限提升，获取 root 权限。该漏洞影响 Netscape iPlanet iCal 2.1 Patch 2 版本，CVSS 评分 10.0，危害等级严重。"
published = "2000-12-11T05:00:00.000"
remediation = "将 csstart 脚本中 libsocket 和 libnsl 的加载路径改为绝对路径（如 /usr/lib/libsocket.so），避免从当前目录或父目录加载。同时，在脚本执行前通过 export PATH 移除路径中的 . 和 ./，阻止相对路径劫持。最有效的方案是升级到 iCal 2.1 Patch 3 或更高版本，官方已修复该问题。"
score = 10
severity = "CRITICAL"
sources = ["exploitdb"]
title = "Netscape iCal 2.1 csstart 本地权限提升漏洞"
updated = "2026-06-16T21:53:05.833"

