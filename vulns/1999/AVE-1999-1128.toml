[basic]
description = "Squid 网络代理缓存软件在使用外部认证模块时，由于对用户输入的用户名/密码对中的换行符过滤不严，远程攻击者可通过在认证凭据中插入换行符绕过访问控制规则，获取未授权资源访问权限。该漏洞影响 Squid 2.2.STABLE5 及更早版本，危害等级中危，CVSS 评分 5.0。建议用户升级至更新版本或启用严格输入过滤措施。"
published = "1999-12-31T05:00:00.000"
remediation = "升级至 Squid 2.3 或更新版本即可修复此漏洞；如无法升级，可下载应用官方补丁 squid-2.2.stable5-newlines_in_auth.patch，在 decode 外部认证的用户名/密码后增加换行符过滤逻辑，防止换行符绕过访问控制。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Squid Web Proxy 身份验证绕过漏洞"
updated = "2026-06-16T21:50:32.043"

