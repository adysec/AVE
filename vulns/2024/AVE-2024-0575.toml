[basic]
description = "Linux 内核 DVB 前端驱动 dib3000mb 中的 dib3000_read_reg 函数存在未初始化值漏洞。函数中局部变量 rb[2] 作为 i2c_transfer() 的读取缓冲区使用，当 I2C 传输失败时该缓冲区内容未被清零，导致未定义数据被后续流程使用，可能造成敏感信息泄露或系统崩溃。本地攻击者需具备低权限并接入 DVB USB 设备触发该漏洞，CVSS 评分 5.5，危害等级中等。Linux 内核主线已通过清零 rb 缓冲区修复此问题。"
published = "2025-01-06T17:15:44.063"
remediation = "立即更新 Linux 内核至包含该补丁的版本：Ubuntu 24.04 LTS 升级至 linux-image-6.11.0-1011-lowlatency（USN-7381-1），Debian 11 升级至 linux-image 6.1.0-0.deb11.22-amd64（DLA-4075-1），其他发行版更新至主线内核 v6.13-rc6 以上版本。如无法立即更新，可禁用 DVB 相关硬件或卸载 dib3000mb 驱动模块（modprobe -r dib3000mb）作为临时缓解。"
score = 5.5
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux Kernel dib3000mb DVB前端驱动未初始化值漏洞"
updated = "2026-06-17T08:12:56.870"

