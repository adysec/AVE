[basic]
description = "Ethereal（Wireshark 前身）存在不安全的临时文件处理漏洞，本地攻击者可利用符号链接攻击，在目标系统上诱使 Ethereal 将捕获的数据包写入任意文件，覆盖系统敏感文件。该漏洞影响早期版本 Ethereal，攻击者须拥有本地账户权限方可利用，CVSS 评分 7.2，危害等级高。"
published = "1999-07-30T04:00:00.000"
remediation = "升级 Ethereal 至 0.10.13 及以上版本（或迁移至 Wireshark 1.0+），这些版本已修复符号链接跟随问题。临时缓解措施：避免以 root 权限运行数据包分析工具，并在保存捕获文件前使用 `umask 077` 限制文件权限，防止本地低权限用户通过符号链接覆盖敏感文件。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "Ethereal 数据包捕获文件符号链接攻击漏洞"
updated = "2026-06-16T21:49:59.377"

