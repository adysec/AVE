[basic]
description = "Microsoft Exchange Online 存在授权不当漏洞（CWE-863），已获得合法身份认证的攻击者可利用网络向 Exchange Online 服务发送特制请求，绕过权限检查机制实现权限提升，进而访问超出自身授权范围的敏感资源。该漏洞影响 Microsoft Exchange Online 服务，CVSS 评分 8.8，危害等级高危。Microsoft 已发布安全更新修复此漏洞。"
published = "2026-07-02T23:16:51.137"
remediation = "Microsoft 已于 2026 年 7 月安全更新中服务端修复此漏洞，Exchange Online 用户无需手动安装补丁。建议管理员登录 Microsoft 365 管理门户确认服务健康状态（Service Health Dashboard），确保组织已处于最新更新轨道（Current Channel）。作为纵深防御措施，可启用 Exchange 管理员审计日志（Set-AdminAuditLogConfig -UnifiedAuditLogIngestionEnabled $true）并监控异常权限提升行为，同时遵循最小权限原则审查服务主体（Service Principal）和应用权限分配。"
score = 8.8
severity = "HIGH"
sources = ["hwpoc"]
title = "Microsoft Exchange Online 权限提升漏洞"
updated = "2026-07-07T05:16:52.423"

