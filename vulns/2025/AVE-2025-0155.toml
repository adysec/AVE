[basic]
description = "朗新天霁 eHR 人力资源管理系统 `GetTrans.asmx` Web 服务接口存在 SQL 注入漏洞。由于该接口未对用户传入的参数进行充分的过滤和转义处理，攻击者可通过构造特制的 HTTP 请求向数据库注入恶意 SQL 语句，从而实现对数据库的越权查询、数据篡改甚至获取系统管理权限。该漏洞影响朗新天霁 eHR 多版本，攻击者无需身份认证即可远程利用，危害较大。"
published = "2025-07-18"
remediation = "联系朗新天霁官方获取最新安全补丁或升级至最新版本；在 GetTrans.asmx 接口代码层实施参数化查询或预编译语句，对所有输入参数进行严格过滤和转义，避免拼接 SQL 语句；部署 WAF 规则拦截 SQL 注入攻击特征 payload；限制 GetTrans.asmx 接口的对外暴露范围，仅允许可信 IP 地址访问，并启用 ASP.NET 请求验证机制。"
score = 7.5
severity = "HIGH"
sources = ["hwpoc"]
title = "朗新天霁 eHR GetTrans.asmx SQL注入漏洞"
updated = "2025-07-18"

