[basic]
description = "时空智友ERP系统的updater.uploadStudioFile接口存在文件上传漏洞，未经过滤验证即接受用户上传的文件。攻击者可构造特制POST请求，利用目录遍历技术将恶意JSP文件上传至服务端可访问目录，进而通过JSP脚本执行任意Java代码，实现远程代码执行（RCE）。该漏洞无需认证即可利用，攻击门槛低，危害严重，建议厂商立即修复。"
published = "0708"
remediation = "建议立即联系北京时空智友科技获取并升级到修复版本，官方已针对该漏洞发布安全更新。临时缓解措施包括：在Web应用防火墙或Nginx层添加规则，拦截对`/formservice?service=updater.uploadStudioFile`接口的未授权POST请求；对上传文件名严格过滤路径遍历字符（如`../`）；限制上传目录的脚本执行权限，禁止JSP文件在`/images/`等上传目录中被解析执行；同时为该接口添加身份认证和文件类型白名单校验，仅允许安全的文件类型上传。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "时空智友ERP系统 文件上传远程代码执行漏洞"
updated = "0708"

