[basic]
description = "汉王e脸通export ResourceByFilePath.do端存在参数过滤不足漏洞，经身份验证的远程攻击者可通过精心构造的文件路径参数访问服务器上的任意文件，导致敏感信息泄露。该漏洞影响汉王e脸通相关版本，攻击者可远程利用此漏洞读取配置文件、密码文件等敏感数据，甚至可能进一步获取系统权限。该漏洞原理源于对用户输入的文件路径参数未进行充分验证和过滤，导致攻击者能够突破访问控制。攻击条件包括目标系统开启该服务、网络可达以及攻击者具备对目标端口进行扫描和利用的能力。利用方式包括发送恶意HTTP请求到/vulnerable/endpoint并携带../等路径穿越特征，结合URL编码等技术绕过基本过滤，以实现对目标服务器文件的任意读取攻击。"
published = "0718"
remediation = "联系汉王厂商获取官方补丁，升级 e脸通系统至最新版本，或在 Web 服务器配置中限制 `/export/ResourceByFilePath.do` 接口的访问来源并对 `filePath` 参数做路径穿越过滤，同时通过 WAF 规则阻止 `../` 等目录遍历特征。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "汉王 汉王e脸通 export ResourceByFilePath.do 任意文件读取漏洞"
updated = "0718"

