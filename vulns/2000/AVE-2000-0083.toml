[basic]
description = "UnixWare 操作系统自带的 ppptalk 命令存在缓冲区溢出漏洞。该命令在处理用户输入的提示参数（prompt argument）时未对输入长度进行边界校验，导致本地用户可通过构造超长的提示参数触发缓冲区溢出，进而覆盖栈上返回地址并执行任意代码，最终以 root 等高权限账户身份运行恶意指令，实现本地权限提升。攻击条件为攻击者需先获得目标系统的本地普通用户访问权限，并在本机执行 ppptalk 命令并传入精心构造的长参数。此漏洞影响使用存在缺陷版本的 UnixWare 系统，CVSS 基础评分 7.2，危害等级为高。"
published = "2000-01-18T05:00:00.000"
remediation = "立即安装 SCO 官方针对 UnixWare ppptalk 缓冲区溢出发布的安全补丁（如 ptf 系列补丁），或升级至已修复的 UnixWare 版本（建议 7.1.2 及以上）。如暂无法打补丁，可通过 chmod 700 /usr/bin/ppptalk 限制普通用户执行权限，并将该命令属主设为 root、仅授权管理员使用，同时移除非必要用户的本地登录与 shell 访问权限以缓解提权风险。"
score = 7.2
severity = "HIGH"
sources = ["cve"]
