[info]
author = "ave"
description = "验证 Ollama 服务是否未授权暴露 /api/create 端点，该端点是 CVE-2026-7482 堆越界读取漏洞的攻击入口。攻击者可上传恶意 GGUF 文件触发越界读取，泄露环境变量、API 密钥等敏感信息。"
id = "POC-AVE-2026-0122"
name = "Ollama GGUF 堆越界读取漏洞 PoC"
severity = "high"
tags = ["ave-2026-0122"]
vuln_id = [
    "CVE-2026-7482",
    "AVE-2026-0122",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/api/create"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "status",
    "model",
]

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/api/version"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["version"]
