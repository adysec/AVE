[basic]
description = "OpenBSD 2.4 内核 IP 分片重组模块存在拒绝服务漏洞，远程攻击者无需身份认证即可向目标系统发送大量精心构造的 IP 分片数据包，触发分片重组缓冲区过度消耗，导致系统资源枯竭并引发拒绝服务。该漏洞影响 OpenBSD 2.4 版本，CVSS 评分 5.0，危害等级中危。"
published = "2001-03-12T05:00:00.000"
remediation = "立即升级至 OpenBSD 2.5 或更高版本，该漏洞已在后续版本修复。如无法升级，请依次应用 OpenBSD 2.4 errata 补丁：先安装 #006（ipq 竞态条件修复）和 #010（TCP 解码修复），再安装 #008（IP 分片重组修复），补丁可从 openbsd.org/errata24.html 获取。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "OpenBSD 2.4 IP分片重组拒绝服务漏洞"
updated = "2026-06-16T21:51:26.990"

