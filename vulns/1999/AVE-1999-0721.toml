[basic]
description = "BMC Patrol Agent 存在拒绝服务漏洞。远程攻击者无需认证即可向 Patrol Agent 的 UDP 端口（默认 3181）发送大量数据包，导致 Patrol Agent 服务因资源耗尽而崩溃或无法响应正常请求，造成拒绝服务。攻击复杂度低，且无需任何身份验证。"
published = "1999-04-01"
remediation = "BMC Patrol Agent 3.2.5 已停止维护，官方未发布补丁。建议在防火墙上限制对 Patrol Agent UDP 端口（默认 3181）的访问，仅允许可信管理源 IP；如非必要，可禁用 Patrol Agent 的 UDP 监听服务或卸载该组件。升级至 BMC Patrol 后续受支持版本（如 BMC Helix）以从根本上解决此问题。"
score = 5.0
severity = "MEDIUM"
sources = ["cve"]
title = "BMC Patrol UDP 端口洪水拒绝服务漏洞"
updated = "2026-06-16"

