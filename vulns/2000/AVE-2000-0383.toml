[basic]
description = "Cisco IOS 9.1及之后版本存在敏感信息泄露漏洞。具有登录提示符访问权限的攻击者可通过查看历史命令记录获取先前用户输入的命令片段，从而窃取可能包含密码、配置信息等敏感数据。该漏洞源于系统未正确清除命令历史缓冲区，攻击条件为需要本地访问权限，利用难度较低，可导致部分机密性损失。"
published = "2001-03-12T05:00:00.000"
remediation = "升级 Cisco IOS 至 12.0 及以上版本，该漏洞已在后续版本中修复。如无法升级，可在全局配置模式下使用 `no service password-recovery` 命令禁用密码恢复功能，并限制物理控制台访问权限，仅允许授权管理员通过 SSH 登录，同时配置 `exec-timeout` 自动注销空闲会话以防止历史命令泄露。"
score = 2.1
severity = "LOW"
sources = ["avd"]
title = "Cisco IOS 命令历史记录敏感信息泄露漏洞"
updated = "2026-06-16T21:51:34.267"

