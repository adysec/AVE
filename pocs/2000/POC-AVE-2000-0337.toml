[info]
author = "ave"
description = "发送DNS A记录查询至目标DNS解析器，检测其是否响应DNS请求，验证glibc 2.1.3中DNS解析器使用可预测事务ID漏洞的攻击面。若目标系统运行了基于glibc 2.1.3的DNS解析服务，攻击者可预测事务ID并伪造DNS响应实施缓存投毒。"
id = "POC-AVE-2000-0337"
name = "GNU glibc DNS解析器可预测事务ID检测PoC"
severity = "high"
tags = ["ave-2000-0337"]
vuln_id = [
    "CVE-2000-0335",
    "AVE-2000-0337",
]

[poc]
logic = "all"

[[poc.requests]]
dns_type = "A"
path = "{{Hostname}}"
protocol = "dns"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["A"]
