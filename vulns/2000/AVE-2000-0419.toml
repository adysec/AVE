[basic]
description = "BEA Systems WebLogic Express 默认配置存在源代码泄露漏洞，远程攻击者无需认证即可向目标服务器发送以 `/file/` 开头的特制 URL 请求，触发默认 Servlet 直接返回文件源代码而非执行结果，导致 JSP、Java 源文件及配置文件等敏感信息泄露。该漏洞影响 WebLogic Express 3.1.8、4.x 及 5.1.0 版本，攻击者可据此进一步挖掘应用逻辑缺陷或获取数据库连接凭证。"
published = "2000-06-21"
remediation = "立即升级至 BEA WebLogic 5.1.0 Service Pack 1 或更高版本；若无法升级，编辑 weblogic.properties 文件，将 weblogic.http.default.servlet 设置为 none，或移除 weblogic.http.initFileServlet 中对 /file/ 路径的映射。同时在 Web 服务器层面禁止对 /file/ 路径的直接访问。"
score = 5.0
severity = "MEDIUM"
sources = ["cve"]
title = "BEA WebLogic Express 源代码泄露漏洞"
updated = "2026-06-16T21:51:52.023"

