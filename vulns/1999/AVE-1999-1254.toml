[basic]
description = "Solaris 2.5.1 及更早版本（含 2.5.0）中的 chkey 命令存在缓冲区溢出漏洞，其未对命令行参数长度进行边界校验，导致用户输入的超长参数可覆盖栈上返回地址等关键内存。该漏洞属于本地漏洞，攻击条件为攻击者需先以普通用户身份登录目标系统并获得执行 chkey 命令的权限。利用方式是将精心构造的超长命令行参数传递给 chkey，触发缓冲区溢出并劫持程序执行流，从而以 root 权限执行任意代码，实现本地权限提升。"
published = "1997-05-19T04:00:00.000"
remediation = "建议升级至 Solaris 2.6 或更高版本，或安装 Sun 官方补丁 106950-01 (针对 Solaris 2.5.1) / 106951-01 (针对 Solaris 2.5.0)。若无法立即升级，可通过限制 chkey 命令执行权限 (chmod 700 /usr/bin/chkey) 并监控异常本地提权行为作为临时缓解措施。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
