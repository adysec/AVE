[basic]
description = "华天动力OA系统的/Base/BaseHandler.ashx接口存在文件上传漏洞，攻击者可通过type=uploadFileBase64参数并指定fileSupport=ashx，上传恶意的.ashx文件到服务器。由于系统未对上传文件类型进行充分校验，.ashx文件作为ASP.NET Web Handler可在服务端执行任意代码，导致服务器被完全控制。攻击者无需身份验证即可利用该漏洞，危害严重。"
published = "2025-06-01"
remediation = "限制BaseHandler.ashx接口的上传文件类型，禁止上传.ashx、.aspx等可执行脚本文件；配置IIS上传目录禁止执行权限；升级华天动力OA到最新安全版本或安装厂商提供的安全补丁；部署Web应用防火墙(WAF)拦截恶意文件上传请求。"
score = 7.5
severity = "HIGH"
sources = ["hwpoc"]
title = "华天动力OA系统BaseHandler文件上传漏洞"
updated = "2026-07-20"

