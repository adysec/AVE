[basic]
description = "AOL Instant Messenger (AIM) 的文件传输组件在处理文件发送时，未对本地文件路径进行过滤，导致远程接收方能够获取发送方文件的物理路径信息。攻击者可通过该漏洞收集系统目录结构信息，为进一步攻击提供线索。"
published = "2000-05-08"
remediation = "升级到 AOL Instant Messenger 4.x 以上版本，该漏洞已在后续版本中修复；或禁用文件传输功能以避免路径信息泄露。"
score = 5.0
severity = "MEDIUM"
sources = ["cve"]
title = "AOL Instant Messenger 文件传输路径泄露漏洞"
updated = "2000-05-08"

