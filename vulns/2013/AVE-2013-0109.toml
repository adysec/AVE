[basic]
description = "Microsoft Office 2003 SP3 及 Office 2011 for Mac 的 PNG 图片解析组件存在缓冲区溢出漏洞。当 Office 文档包含特制的 PNG 图像数据时，程序在内存分配过程中未能正确校验数据长度，导致缓冲区溢出。攻击者可利用此漏洞诱使用户打开恶意 Office 文档，从而在当前用户权限下执行任意代码，完全控制受影响系统。该漏洞无需身份认证，但需要用户交互触发。"
published = "2013-06-12T03:29:57.117"
remediation = "立即安装 Microsoft 安全公告 MS13-051 提供的更新：Office 2003 SP3 用户安装 KB2817421（下载地址 https://www.microsoft.com/download/details.aspx?familyid=1acd93fa-e6d6-44b1-86de-4fbb464d0e6c），Office for Mac 2011 用户升级至 14.3.5 版本（下载 KB2848689）。如无法立即打补丁，建议不要打开来源不明的 Office 文档，并启用 EMET（Enhanced Mitigation Experience Toolkit）缓解利用风险。"
score = 7.8
severity = "HIGH"
sources = ["kev"]
title = "Microsoft Office PNG 文件缓冲区溢出漏洞"
updated = "2026-06-16T23:51:13.833"

