[basic]
description = "SunOS 5.7 中的 rmmount 工具在挂载文件系统时未正确设置 nosuid 标志，与文档说明及先前版本行为不符。本地攻击者可通过物理访问插入包含 setuid 程序的软盘或 CD-ROM，运行 volcheck 触发自动挂载，从而获得 root 权限。"
published = "1999-01-01"
remediation = "升级到 SunOS 5.7 的补丁版本，或在 rmmount.conf 中为所有可移动介质指定 nosuid 选项，防止 setuid 程序从外部介质执行。"
score = 7.2
severity = "HIGH"
sources = [
    "cve",
    "avd",
]
title = "SunOS Solaris rmmount 特权提升漏洞"
updated = "2024-06-01"

