[basic]
description = "ident/identd 服务（RFC 1413）运行时会监听 113 端口，为任何 TCP 连接请求返回对应进程的拥有者用户名。未经授权的远程攻击者可利用该服务枚举系统上的用户账户信息，为后续暴力破解或针对性攻击提供侦察支持。虽然该服务本身不直接导致代码执行，但其暴露的用户信息会降低系统安全防护等级，属于信息泄露风险。建议在非必要情况下禁用该服务或通过防火墙限制对 113 端口的访问。"
published = "1999-01-01T05:00:00.000"
remediation = "建议立即停止 identd 服务并禁用其开机自启：在 Linux 系统中执行 `systemctl stop identd && systemctl disable identd`（或 `service identd stop && chkconfig identd off`）；在 Cisco IOS 上执行 `no service tcp-small-servers`。同时通过防火墙屏蔽 TCP 端口 113，阻止外部访问该服务。如无业务依赖，应彻底卸载 identd 软件包（如 `apt-get remove identd`）。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "通用 ident/identd 服务信息泄露漏洞"
updated = "2026-06-16T21:48:45.460"

