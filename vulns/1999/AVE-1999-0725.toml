[basic]
description = "UnityMail 2.0 邮件服务器在处理 MIME 头部时存在拒绝服务漏洞。远程攻击者无需身份认证即可向目标服务器发送大量特制的 MIME 头部数据包，导致服务器资源耗尽、响应缓慢甚至崩溃，无法正常处理邮件服务。该漏洞影响 Messagemedia UnityMail 2.0 版本，CVSS 评分 5.0，危害等级中危。建议升级至最新版本或限制 MIME 头部数量以缓解风险。"
published = "1999-09-03T04:00:00.000"
remediation = "该漏洞影响已停止维护的 Messagemedia UnityMail 2.0，厂商未发布官方补丁。建议立即将 UnityMail 升级至不受影响的最新版本，或迁移至其他受支持的邮件列表管理软件（如 Mailman、Sympa 等）。如无法替换，应将 UnityMail 管理 Web 界面限制在内网访问，并在网络边界防火墙处限制对管理端口的访问作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Messagemedia UnityMail 2.0 MIME Header 拒绝服务漏洞"
updated = "2026-06-16T21:49:20.490"

