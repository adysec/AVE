[basic]
description = "Linux 内核 2.2.x 和 2.4.x 版本的 sysctl 系统调用在处理负数参数时存在边界检查缺陷，本地攻击者可通过向 sysctl 传递负数参数越界读取内核内存，泄露敏感信息并可能进一步提权。该漏洞影响 Linux 2.2.x 和 2.4.x 系列内核，攻击者需具备本地用户权限并能调用 sysctl 系统调用，通过构造负数参数触发内核内存越界读取，获取内核内存中的敏感数据（如指针、凭据等），进而结合其他技术实现权限提升。CVSS 评分 4.6（本地攻击/低复杂度/无需认证/部分机密性/完整性/可用性影响）。"
published = "2001-05-03T04:00:00.000"
remediation = "升级到 Linux 内核 2.4.6 或更高版本，并应用安全补丁 RHSA-2001-013。修改 `/proc/sys` 目录下的系统调用参数验证逻辑，禁止 sysctl() 函数接受负值参数。实施临时缓解措施：限制本地用户权限，加强内核内存访问控制，并禁用不必要的 sysctl 服务以防止本地提权。"
score = 4.6
severity = "MEDIUM"
sources = ["redhat"]
title = "Linux 内核 sysctl() 内存读取漏洞 (CVE-2001-0316)"
updated = "2026-06-16T21:54:05.137"

