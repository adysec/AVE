[basic]
description = "RealMedia RealServer 存在内部 IP 地址泄露漏洞。该漏洞源于 RealServer 在处理特定请求时未正确过滤响应中的网络地址信息，导致即使服务器配置了私有 IP 地址或部署在 NAT/防火墙后方，远程攻击者仍可通过发送特制请求获取目标服务器的真实内网 IP 地址。攻击者利用此信息可进一步探测内网拓扑结构，为后续渗透攻击提供情报支持。该漏洞影响 RealServer 5.0 及 7.0 版本，CVSS 评分 5.0，危害等级中危。"
published = "2000-03-08T05:00:00.000"
remediation = '升级 RealServer 至 8.0 及以上版本，该漏洞已在后续版本中修复。如无法升级，可在 RealServer 管理控制台中将 "Admin Port" 绑定到内网地址，并在防火墙层面限制对 7070 端口的公网访问，仅允许可信 IP 连接。'
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "RealNetworks RealServer 内部 IP 地址泄露漏洞"
updated = "2026-06-16T21:51:10.650"

