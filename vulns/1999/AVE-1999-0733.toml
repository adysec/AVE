[basic]
description = "AOL Instant Messenger 3.5 存在拒绝服务漏洞，远程攻击者可通过向目标用户发送特制的超链接（hyperlink）消息，导致 AIM 客户端在处理该链接时崩溃或停止响应，造成拒绝服务。该漏洞利用方式简单，攻击者无需认证即可触发，影响所有使用 AIM 3.5 版本的用户。由于 AIM 客户端未能正确验证超链接输入，攻击者构造的畸形链接可触发程序异常，导致服务不可用。"
published = "1998-02-01"
remediation = "建议立即卸载 AOL Instant Messenger 3.5 客户端，该产品已于 2017 年 12 月 15 日停止服务，官方不再提供安全更新。在浏览器设置中移除 AIM 协议处理程序（aim://）的自动关联，防止恶意超链接自动触发客户端。作为替代方案，迁移至支持端到端加密的现代即时通讯软件（如 Signal、Telegram）。如因历史原因必须使用，建议在防火墙或网络代理层面拦截 aim:// 协议流量作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "AOL Instant Messenger 3.5 超链接拒绝服务漏洞"
updated = "1998-02-01"

