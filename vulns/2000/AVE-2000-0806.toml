[basic]
description = 'Microsoft Visual InterDev 1.0 中的 dvwssr.dll 动态链接库存在缓冲区溢出漏洞（亦称"Link View 服务端组件"漏洞）。该组件在处理用户请求时未对输入文件名的长度进行充分边界校验，攻击者在未身份认证的情况下，可通过向运行该组件的 IIS 服务器发送特制的超长文件名请求，溢出栈缓冲区，从而触发拒绝服务或执行任意命令。受影响范围包括安装了 FrontPage 98 Server Extensions 的 IIS 服务器及 Microsoft InterDev 1.0 环境，攻击仅需网络可达目标 Web 服务即可远程利用。'
published = "2000-04-14T04:00:00.000"
remediation = "建议立即升级 Microsoft Visual InterDev 至 1.0 SP1 或更高版本，并安装 Microsoft 2000 年 4 月发布的安全补丁（MS00-025）。同时升级 FrontPage 98 Server Extensions 到最新版本。如暂无法打补丁，可在 IIS 中临时移除或禁用 dvwssr.dll（Link View Server-Side Component）对应的 ISAPI 扩展映射，并限制对 /_vti_bin/ 目录的匿名访问作为缓解措施。"
score = 7.5
severity = "HIGH"
sources = ["exploitdb"]
title = '{"_meta":{},"stopReason":"end_turn","usage":{"inputTokens":10856,"outputTokens":24,"totalTokens":10880}}'
