[basic]
description = "Linux kernel 的 btrfs 文件系统在 btrfs_search_slot() 函数中缺少对 btrfs root 的空指针检查。当系统使用 rescue=ibadroots 挂载参数且 extent tree root 损坏时，extent tree 为 NULL，此时 scrub 操作尝试搜索 extent tree 获取 extent 信息时，btrfs_search_slot() 未校验目标 root 是否为空，导致空指针解引用，引发内核崩溃。该漏洞需要本地低权限用户触发特定条件利用，CVSS 评分 5.5，危害等级中危。Linux 内核主线已通过添加健全性检查修复此问题。"
published = "2025-01-08T18:15:18.213"
remediation = "立即升级 Linux 内核至以下安全版本：5.15.174、6.1.120、6.6.64、6.12.4 或 6.13 及以上版本。各发行版用户可通过包管理器更新内核（如 Ubuntu 运行 apt upgrade linux-image-generic，Debian 运行 apt upgrade linux-image）。如无法立即升级，避免使用 rescue=ibadroots 挂载选项挂载损坏的 btrfs 文件系统，并在生产环境中禁用 scrub 操作对不可信文件系统的扫描。"
score = 5.5
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux 内核 btrfs 文件系统空指针解引用漏洞"
updated = "2026-06-17T08:12:57.657"

