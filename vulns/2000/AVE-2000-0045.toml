[basic]
description = "Red Hat Linux usermode 软件包中的 userhelper 程序存在路径遍历漏洞，本地用户可利用 PAM 模块结合 ..（点点）目录跳转攻击绕过权限检查，从而获取 root 超级用户权限。该漏洞影响 Red Hat 6.x、Mandrake 6.x 及 Turbolinux 3.5 b2/4.x/6.0.2 等版本，CVSS 评分 7.2，危害等级高。攻击者需拥有本地系统访问权限，无需额外认证即可实施提权攻击。"
published = "2000-01-04T05:00:00.000"
remediation = "立即升级 usermode 软件包至 1.28 及以上版本（对应 Red Hat 安全公告 RHSA-2000-001），该修复禁止 userhelper 处理包含 .. 的 PAM 配置文件路径参数。如无法立即升级，可临时移除 /usr/sbin/userhelper 的 setuid 权限（chmod u-s /usr/sbin/userhelper），阻断普通用户以 root 权限执行 userhelper 的利用路径。"
score = 7.2
severity = "HIGH"
sources = ["redhat"]
title = "Red Hat userhelper PAM 路径遍历本地权限提升漏洞"
updated = "2026-06-16T21:50:54.140"

