[basic]
description = "Axis 700 Network Scanner 存在路径遍历安全绕过漏洞。设备未能正确限制管理员URL的访问权限，远程攻击者通过在URL中使用 `..`（点点）攻击可绕过密码认证机制，直接访问设备管理界面与敏感配置。该漏洞影响 Axis 700 Network Document Server 设备，CVSS 评分 7.5，危害等级高，可能导致设备配置泄露或遭受未授权操控。"
published = "2000-02-07T05:00:00.000"
remediation = "Axis 700 Network Scanner 已于 2000 年代初停产且不再提供任何固件更新，建议立即将该设备从网络中隔离，限制其管理接口仅允许受信任的管理 IP 通过防火墙 ACL 访问，并禁止暴露在公网。在 Web 服务器层面（如设备内置的 HTTP 服务），配置 URL 重写规则拒绝包含 ../ 或类似路径遍历特征的请求作为临时缓解。长期解决方案是替换为受支持的 Axis 网络扫描仪或同等安全级别更高的设备。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "Axis 700 Network Scanner 安全绕过漏洞"
updated = "2026-06-16T21:51:05.503"

