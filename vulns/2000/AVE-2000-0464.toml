[basic]
description = "Canna 日文输入系统（cannaserver）的 SR_INIT 命令在处理用户名或组名参数时存在栈缓冲区溢出漏洞。远程攻击者无需身份认证，即可通过向目标主机的 5680 端口发送携带超长用户名或组名的 SR_INIT 数据包触发溢出，覆盖栈上的返回地址并执行任意代码，从而获得与 cannaserver 进程相同权限的远程 shell。该漏洞影响 Canna 3.5 b2 及更早版本，广泛存在于搭载该软件的 Linux、FreeBSD 等 Unix 类操作系统中，CVSS v2 评分满分 10.0，危害等级为严重。修复方式为升级 Canna 至安全版本或限制 cannaserver 服务仅监听本地地址。"
published = "2000-07-02T04:00:00.000"
remediation = "升级 Canna 至 3.2.2 或更高版本以修复 SR_INIT 命令中的缓冲区溢出漏洞。FreeBSD 系统可升级 ports 集合并重新编译 Canna 端口，或下载 ja-Canna-3.2.2 软件包替换旧版本；Linux 及其他系统应替换为厂商发布的安全补丁版本。临时缓解措施：创建 /etc/hosts.canna 文件并写入仅允许访问 Canna 服务器的主机列表（如 localhost 和 unix），限制远程访问范围；或通过防火墙规则阻断对 Canna 服务端口 5680 的入站连接；亦可直接停用 cannaserver 服务以消除攻击面。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "Canna 输入系统远程缓冲区溢出漏洞"
updated = "2026-06-16T21:52:03.060"

