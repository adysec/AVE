[basic]
description = 'Netscape FastTrack Server 3.0.1 存在信息泄露漏洞，由于服务器对 HTTP 请求方法的大小写处理存在缺陷，远程攻击者使用小写的 "get" 请求替代标准大写的 "GET" 方法时，可绕过正常访问控制，导致服务器根目录及其文件列表被直接返回。该漏洞可能导致敏感文件路径、配置信息等系统关键数据泄露，攻击者无需认证即可利用，影响 Netscape FastTrack Server 3.0.1 版本，CVSS 评分 7.5，危害等级高危。'
published = "1998-01-01T05:00:00.000"
remediation = "立即升级至 Netscape FastTrack Server 4.0 或更高版本（后演变为 iPlanet Web Server），该版本已修复小写 get 命令导致的目录列表泄露问题。该产品已长期停止维护，建议迁移至 Apache HTTP Server 或 Nginx 等现代 Web 服务器。如无法立即迁移，可在反向代理或 WAF 层面配置规则拦截小写 HTTP 请求方法作为临时缓解措施。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "Netscape FastTrack Server 3.0.1 目录列表漏洞"
updated = "2026-06-16T21:47:58.770"

