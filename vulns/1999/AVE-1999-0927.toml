[basic]
description = "AIX 系统上的 rexd（远程执行守护进程）服务默认启用，该服务使用基于主机名/IP 地址的弱认证机制，未对用户身份进行加密验证。远程攻击者可通过伪造源地址或利用信任关系绕过认证，直接向目标系统发送执行命令请求，导致任意命令执行。该漏洞影响多个 AIX 版本，攻击者无需身份认证即可远程利用，危害严重。建议禁用 rexd 服务或配置严格访问控制列表。"
published = "1992-03-01T05:00:00.000"
remediation = "关闭并禁用 AIX 系统的 rexd 服务（执行 `stopsrc -s rexd` 并将 `/etc/inetd.conf` 中 rexd 行注释掉后重启 inetd），或在防火墙/TCP Wrapper 的 `/etc/hosts.allow`、`/etc/hosts.deny` 中限制仅可信主机可访问 512 端口，禁止将 rexd 暴露于不可信网络。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "AIX rexd 服务认证弱漏洞"
updated = "2026-06-16T21:48:45.213"

