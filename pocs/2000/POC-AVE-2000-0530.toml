[info]
author = "AVE"
description = "检测 Netscape Communicator 4.04-4.74 Java applet 安全沙箱绕过漏洞。通过托管包含恶意 Java applet 的 HTML 页面，验证浏览器是否允许 applet 通过 file:// 协议读取本地文件。"
id = "POC-AVE-2000-0530"
name = "Netscape Communicator Java Applet Arbitrary File Read PoC"
severity = "medium"
tags = ["ave-2000-0530"]
vuln_id = [
    "CVE-2000-0676",
    "AVE-2000-0530",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/poc.html"
protocol = "http"

[poc.requests.body]
content = ""
type = "raw"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["Brown Orifice"]
