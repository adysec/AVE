[basic]
description = "NIS 软件包中的 ypserv 服务（版本 2.5 之前）的 yp_db.c 文件中的 ypdb_open 函数存在内存泄漏漏洞。远程攻击者可通过向目标系统发送大量针对不存在映射表的请求，触发该函数的内存泄漏，导致系统内存资源被持续消耗，最终造成拒绝服务。该漏洞影响 NIS Package 3.9 及更早版本，攻击无需身份认证，网络可达即可触发。"
published = "2002-11-04T05:00:00.000"
remediation = "将 ypserv（NIS 服务器）升级至 2.5 或更高版本。Red Hat Advanced Server 2.1 用户安装 RHSA-2002:224 提供的更新包（rpm -Fvh *.rpm），Debian 用户安装 DSA-180 提供的更新包。如无法升级，在防火墙层面限制对 ypserv 端口（TCP/UDP 111 及 834-847）的访问，仅允许受信任的 NIS 客户端连接。"
score = 5
severity = "MEDIUM"
sources = ["osv"]
title = "Linux NIS ypserv 内存泄漏拒绝服务漏洞"
updated = "2026-06-16T21:58:58.737"

