[basic]
description = "tags as required.<value>SCO OpenServer 5.0 和 SCO UNIX 3.2v4 系统中的 mscreen 程序存在本地堆栈缓冲区溢出漏洞。攻击者可通过设置超长的 TERM 环境变量或在 .mscreenrc 配置文件中写入超长条目来触发该溢出，从而在本地获得 root 权限。该漏洞影响 SCO OpenServer 5.0.5 等版本，CVSS 评分 7.2，危害等级高。由于需要本地访问权限才能利用，攻击者需先获得系统的普通用户账户。"
published = "1998-08-27T04:00:00.000"
remediation = "建议升级至 SCO OpenServer 5.0.7 或更高版本（含官方补丁 SCO-1999.001），或迁移至受支持的现代操作系统。临时缓解：移除 /usr/bin/mscreen 的 setuid root 权限（chmod u-s /usr/bin/mscreen），限制 TERM 环境变量长度（export TERM=vt100），限制用户写入 ~/.mscreenrc 权限（chmod 644 ~/.mscreenrc）。"
score = 7.2
severity = "HIGH"
sources = ["epss"]
title = "SCO OpenServer 5.0.5 本地堆栈溢出漏洞"
updated = "2026-06-16T21:49:34.940"

