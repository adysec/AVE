[basic]
description = "OpenOffice.org 2.x（2.4.2之前的版本）在解析WMF（Windows Metafile）格式图像文件时存在堆缓冲区溢出漏洞。攻击者可构造包含恶意数据的WMF文件，当用户使用OpenOffice打开该文档时，由于程序未对WMF文件中的图像尺寸参数进行充分验证，导致堆内存被越界写入，进而可能执行任意代码。该漏洞影响Windows、Linux等多个平台上的OpenOffice.org 2.x早期版本，攻击者无需认证即可远程利用，危害等级为高危（CVSS 9.3）。用户需升级至OpenOffice.org 2.4.2或更高版本以修复此漏洞。"
published = "2008-10-30T20:00:00.873"
remediation = "立即升级 OpenOffice.org 到 2.4.2 或更高版本。Linux 用户可通过包管理器执行：Debian/Ubuntu 使用 sudo apt-get update && sudo apt-get install openoffice.org，Red Hat/CentOS 使用 sudo yum update openoffice.org。Windows 用户需从 Apache OpenOffice 官网（https://openoffice.org）下载 2.4.2+ 版本并覆盖安装。若暂时无法升级，应避免打开来源不明的 WMF 格式文件，可在文件管理器中右键查看文件扩展名进行识别。长期方案建议迁移至 LibreOffice（OpenOffice 的活跃分支），其最新版本已彻底修复此漏洞。"
score = 9.3
severity = "CRITICAL"
sources = ["tenable"]
title = "OpenOffice.org WMF文件处理堆缓冲区溢出代码执行漏洞"
updated = "2026-06-16T22:53:22.820"

