[basic]
description = "Check Point Firewall-1 存在安全绕过漏洞，远程攻击者可通过强制 FTP 服务器发送恶意数据包，使得防火墙将恶意数据包错误解析为对客户端 PASV 请求的有效 227 响应，从而绕过防火墙对 FTP 服务器的端口访问限制，实现未授权访问。该漏洞危害等级高，影响使用 Check Point Firewall-1 的网络安全部署。"
published = "2000-02-12T05:00:00.000"
remediation = "升级 Check Point Firewall-1 至 4.1 SP6 及以上版本，或迁移至 Check Point 后续主版本（NG/NGR7x 系列）；在防火墙策略中启用 FTP 协议安全检查的严格模式，限制 FTP 数据通道仅允许与初始控制通道同源地址建立连接，并禁用不安全的主动/被动 FTP 端口范围。如无法立即升级，可在防火墙上创建严格规则阻断非预期的出站高端口连接作为临时缓解。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "Check Point Firewall-1 FTP 端口限制安全绕过漏洞"
updated = "2026-06-16T21:51:06.277"

