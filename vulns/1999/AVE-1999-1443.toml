[basic]
description = "iPass RoamServer 3.1 在创建临时文件时未正确设置权限，导致生成的临时文件具有全局可写权限。本地攻击者可利用此漏洞读取或修改其他用户创建的临时文件中的敏感信息，可能导致信息泄露或权限提升。该漏洞影响 iPass RoamServer 3.1 版本，属于不安全的临时文件创建问题，攻击者需具有本地系统访问权限才能利用。"
published = "1997-12-29T05:00:00.000"
remediation = "升级 iPass RoamServer 至 3.1 以上版本，或迁移至 iPass 后续替代产品（已更名为 iPass Open Mobile）。如无法升级，修改 umask 设置确保临时文件创建时使用 0700 权限掩码，并定期清理 /tmp 目录下 RoamServer 遗留的临时文件。由于该产品已停止维护，建议迁移至现代远程接入解决方案（如 VPN 替代方案）。"
score = 6.4
severity = "MEDIUM"
sources = ["epss"]
title = "iPass RoamServer 不安全临时文件创建漏洞"
updated = "2026-06-16T21:50:05.317"

