[info]
author = "ave"
description = "该漏洞为本地符号链接攻击，ssh-agent 在创建 UNIX 域套接字文件时未校验路径是否为符号链接。本地攻击者预先在 agent 套接字目录放置指向敏感文件（如 ~/.rhosts）的符号链接，agent 启动时会跟随链接在目标位置创建/覆盖文件。本 PoC 通过 file 协议检查本地是否可借由该机制在符号链接指向位置创建文件，以验证目标环境是否受此本地漏洞影响。"
id = "POC-AVE-1999-0521"
name = "CVE-1999-0787 SSH 1.2.27 ssh-agent 符号链接本地验证 PoC"
severity = "low"
tags = ["ave-1999-0521"]
vuln_id = [
    "CVE-1999-0787",
    "AVE-1999-0521",
]

[poc]
logic = "all"

[[poc.requests]]
path = "/tmp/ssh-agent-symlink-test"
protocol = "file"

[[poc.requests.matchers]]
expect = false
part = "body"
type = "word"
words = [
    "root:",
    "ssh-agent",
]
