[basic]
description = 'ISC BIND 8.2 至 8.2.2-P6 版本的 named 服务中存在拒绝服务漏洞。远程攻击者无需身份认证即可向目标 DNS 服务器发送特制的压缩区域传输（ZXFR）请求，随后查询一个未缓存的权威记录，导致 named 服务崩溃或进入异常状态，造成拒绝服务。该漏洞影响运行 BIND 8.2 系列版本的 DNS 服务器，攻击者只需具备网络访问能力即可触发，无需任何权限。此漏洞也被称为 "zxfr bug"。'
published = "2000-12-19T05:00:00.000"
remediation = "升级 ISC BIND 至 8.2.2-P7 或更高版本（该漏洞在 8.2.2-P7 中修复），或迁移至 BIND 9.x 系列以获得长期支持。如无法立即升级，可在 DNS 服务器上限制 zone transfer 仅允许受信任的从服务器 IP 地址，并在防火墙上过滤入站的 ZXFR 请求。对于生产环境，建议直接迁移至 BIND 9.x，因 BIND 8 系列已停止维护。"
score = 5
severity = "MEDIUM"
sources = ["redhat"]
title = "ISC BIND 8.2 ZXFR 压缩区域传输请求拒绝服务漏洞"
updated = "2026-06-16T21:52:40.657"

