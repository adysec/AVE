[info]
author = "AVE"
description = "检测 elixir-tesla Tesla.Middleware.DecompressResponse 解压炸弹漏洞 - 通过发送 HTTP 请求并检查响应中是否存在多层 gzip 压缩内容，验证目标是否受解压无限制导致内存耗尽的影响"
id = "POC-AVE-2026-0295"
name = "CVE-2026-48594 PoC"
severity = "high"
tags = ["cve-2026-48594"]
vuln_id = [
    "CVE-2026-48594",
    "AVE-2026-0295",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["gzip"]
