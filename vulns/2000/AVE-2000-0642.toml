[basic]
description = "PhotoAlbum 0.9.9 的 explorer.php 页面存在目录遍历漏洞，远程攻击者无需任何认证即可通过向 URL 中传入 `../` 路径穿越序列，突破 Web 根目录限制，读取服务器上任意可读文件（如系统配置文件、数据库凭证等敏感信息）。该漏洞源于程序未对用户输入的路径参数进行充分过滤与验证，属于典型的路径遍历攻击。CVSS 评分 5.0，危害等级中等。"
published = "2000-11-14"
remediation = '建议立即将 PhotoAlbum 升级到 0.9.9 以上版本，或移除 explorer.php 文件。如无法升级，在 Web 服务器层面（Apache/Nginx）配置 URL 重写规则，拦截包含 `../` 或 `..\` 等目录遍历特征的请求；同时修改 PHP 代码，对 `$HTTP_GET_VARS` 中传入的路径参数进行 `realpath()` 校验，拒绝包含 `..` 的输入。作为临时缓解措施，可设置 Web 服务器禁用该脚本的访问权限。'
score = 5
severity = "MEDIUM"
sources = [
    "cve",
    "exploitdb",
]
title = "Nathan Purciful PhotoAlbum 0.9.9 目录遍历漏洞"
updated = "2026-06-16"

