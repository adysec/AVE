[basic]
description = "Joomla! 的 J!Research (com_jresearch) 组件中存在目录遍历漏洞，攻击者无需身份认证即可通过向 index.php 的 controller 参数传入 `../` 序列符，实现路径穿越，进而读取服务器上的任意敏感文件。该漏洞影响使用该组件的 Joomla! 站点，CVSS 评分 5.0，危害等级中危，可能导致配置文件、数据库凭据等敏感信息泄露。"
published = "2010-04-09T18:30:00.477"
remediation = "停用或卸载 Joomla! 的 com_jresearch 组件，该插件已停止维护无安全更新；如必须使用，在网站入口或 .htaccess 中对 `controller` 参数过滤 `../` 路径遍历字符，并限制 `index.php` 的传入参数仅允许白名单值。"
score = 5
severity = "MEDIUM"
sources = ["nuclei"]
title = "Joomla! J!Research (com_jresearch) 组件本地文件包含漏洞"
updated = "2026-06-16T23:18:10.057"

