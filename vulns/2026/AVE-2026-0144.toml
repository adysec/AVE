[basic]
description = "OpenClaw 存在权限绕过漏洞，其 chat.send 功能在消息投递过程中未能正确隔离路由继承范围，导致持有 operator.write 低权限凭据的攻击者可通过向继承外部路由的会话发送特制命令，绕过权限检查执行未授权操作。该漏洞影响 OpenClaw 相关版本，攻击者需具备 operator.write 权限但无需高权限账户，可利用此漏洞实现权限提升与横向移动，对系统机密性和完整性构成严重威胁。"
published = "20260529"
remediation = '立即升级 OpenClaw 至 v2026.3.7 或更高版本，该版本已修复 `chat.send` 路由继承范围绕过问题。升级后执行 `grep -r "sk-ant\|sk-" ~/.openclaw/openclaw.json` 确认凭据未泄露。在 `openclaw.json` 中设置 `"host": "127.0.0.1"` 将 Gateway 绑定仅本地，禁止将 18789/18790 端口暴露到公网。配置 SSH 隧道管理管理界面，移动端仅通过 Telegram 出站 long polling 交互。审核 `allowedUsers` 白名单，限制 operator.write 级别凭据的会话路由继承范围，在路由入口处添加显式授权校验，禁止 chat.send 跨路由边界投递命令。'
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "OpenClaw chat.send 继承路由范围绕过认证绕过漏洞"
updated = "20260529"

