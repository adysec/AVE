[basic]
description = "BitchX IRC 客户端在处理 /INVITE 命令时未正确过滤不可信格式字符串，远程攻击者可通过向目标用户发送包含特制格式化字符（如 %n、%s 等）的频道邀请消息触发格式化字符串漏洞，导致客户端崩溃或拒绝服务。该漏洞影响 BitchX 75p1、75p3 及 1.0c16 及更早版本，攻击者无需认证即可利用，危害等级中等。"
published = "2000-07-04T04:00:00.000"
remediation = "升级 BitchX IRC 客户端至 1.0c17 或更高版本，该版本已修复格式字符串处理缺陷。如无法升级，可在服务器端限制 /INVITE 命令中特殊格式化字符的传入，或使用其他 IRC 客户端（如 irssi、WeeChat）替代。临时缓解措施：在客户端防火墙规则中阻止不可信来源的 IRC 连接请求。"
score = 5
severity = "MEDIUM"
sources = ["redhat"]
title = "BitchX IRC Client INVITE 格式化字符串拒绝服务漏洞"
updated = "2026-06-16T21:52:04.317"

