[basic]
description = "天问物业ERP系统的VacantDiscountDownLoad接口存在任意文件读取漏洞，该漏洞源于系统未对用户传入的VacantDiscountFile参数进行充分的路径过滤与校验。攻击者无需身份认证即可通过目录遍历技术（如使用../）构造恶意请求，读取服务器上的任意文件（如web.config等敏感配置文件），导致系统数据库连接信息、密钥等敏感数据泄露。该漏洞影响天问物业ERP系统全版本，攻击复杂度低，危害较大。"
published = "0729"
remediation = '升级天问物业ERP至厂商发布的最新安全版本；如无官方补丁，在Web服务器或WAF层面添加规则，对`/HM/M_main/InformationManage/VacantDiscountDownLoad.aspx`路径的`VacantDiscountFile`参数进行路径穿越字符过滤（拦截`../`、`..\\`等序列），并限制该接口仅允许访问指定目录下的文件。同时建议在应用层对用户输入做白名单校验，仅允许合法文件名。'
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "天问物业ERP系统任意文件读取漏洞"
updated = "0729"

