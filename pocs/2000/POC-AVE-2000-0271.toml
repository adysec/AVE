[info]
author = "ave"
description = "检测服务器上是否存在恶意 shell.xls 文件，该文件利用 Microsoft JET 3.5/3.51/4.0 的 VBA Shell 漏洞，当 Office 95/97 用户打开该 Excel 文件时，嵌入的 VBA Shell 命令将在用户上下文中执行任意命令。"
id = "POC-AVE-2000-0271"
name = "Microsoft JET 数据库引擎 VBA Shell 命令执行漏洞 PoC"
severity = "high"
tags = [
    "cve-2000-0325",
    "jet",
    "vba-shell",
    "office",
]
vuln_id = [
    "CVE-2000-0325",
    "AVE-2000-0271",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/shell.xls"
protocol = "http"

[poc.requests.body]
content = ""
type = "raw"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["OLE2"]
