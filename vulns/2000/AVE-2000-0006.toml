[basic]
description = "ZBServer Pro 存在路径遍历漏洞，远程攻击者无需认证即可通过在 URL 中插入点号（.）来获取服务器上可执行文件的源代码，导致敏感信息泄露。该漏洞影响 ZBServer Pro 版本，攻击者可通过构造特制的 HTTP 请求读取任意可执行文件源码，为后续深入攻击提供信息支撑。"
published = "1999-12-01T05:00:00.000"
remediation = '立即升级到 ZBServer 最新版本。如已停止维护，建议迁移至 Apache HTTP Server 或 Nginx 等活跃维护的 Web 服务器。如无法立即更换，应在 Web 服务器前端配置反向代理或 WAF（如 ModSecurity），拦截含 "." 的可执行文件请求路径；同时在防火墙层面限制对 ZBServer 端口的访问来源 IP，仅允许可信网络访问，作为临时缓解措施。'
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "ZBServer Pro 源代码泄露漏洞"
updated = "2026-06-16T21:50:48.240"

