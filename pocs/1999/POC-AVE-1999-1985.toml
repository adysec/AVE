[info]
author = "AVE"
description = "通过构造包含超长 IMG_SRC 属性的 HTML 页面，验证 IBM HomePagePrint 1.0.7 是否存在缓冲区溢出漏洞。当用户使用该软件预览或打印恶意页面时，超长 IMG_SRC 标签触发栈溢出，导致任意代码执行。"
id = "POC-AVE-1999-1985"
name = "IBM HomePagePrint 1.0.7 远程缓冲区溢出漏洞 PoC"
severity = "high"
tags = [
    "cve-1999-1531",
    "buffer-overflow",
    "ibm",
]
vuln_id = [
    "CVE-1999-1531",
    "AVE-1999-1985",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/poc.html"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["IMG_SRC"]
