[basic]
description = 'NetBSD 1.4.2 及更早版本内核中某些系统调用未正确释放 CPU 时间片，本地用户可通过反复调用这些不释放 CPU 的系统调用（称为 "cpu-hog"），独占 CPU 资源导致系统拒绝服务。该漏洞影响 NetBSD 1.4.2 及更早版本，CVSS 评分 2.1（本地访问/低复杂度/无需认证/仅影响可用性），攻击者需具备本地账户权限，通过反复调用特定不释放 CPU 的系统调用独占处理器资源，导致系统无响应或崩溃，造成拒绝服务。'
published = "2000-05-28T04:00:00.000"
remediation = "升级 NetBSD 至 1.4.3 或更高版本（已修复该内核 CPU 占用漏洞）。若无法立即升级，可通过内核参数限制单进程 CPU 时间（如设置 kern.maxprocperuid 限制用户进程数），或使用资源限制（ulimit -t）限制单进程 CPU 时间作为临时缓解措施。"
score = 2.1
severity = "LOW"
sources = ["avd"]
title = "NetBSD项目组 NetBSD 1.4.2 CPU耗尽拒绝服务漏洞"
updated = "2026-06-16T21:51:46.423"

