[basic]
description = "Cisco Virtual Central Office 4000 (VCO/4K) 5.1.3 版本中存在弱加密存储漏洞，设备将用户名和密码以弱加密方式存储在 SNMP MIB 中。具有 SNMP 社区字符串（community string）访问权限的远程攻击者可获取加密后的凭据，并通过暴力破解或逆向分析还原明文密码，进而获得设备管理权限。该漏洞影响 VCO/4K 系列设备，CVSS 评分 7.5，危害等级高，建议立即升级至修复版本或限制 SNMP 访问。"
published = "2000-12-19T05:00:00.000"
remediation = "升级 Cisco VCO/4K 至 5.1.4 及以上版本（Cisco 已于 2000 年发布修复版本）。如无法升级，在 SNMP 配置中限制 community strings 仅对可信管理站可读，禁用 SNMP 写入权限，将默认 community strings 改为强随机字符串，并配置 ACL 限定来源 IP。该产品已停服多年，建议迁移至受支持的替代平台。"
score = 7.5
severity = "HIGH"
sources = ["exploitdb"]
title = "Cisco Virtual Central Office 4000 (VCO/4K) SNMP MIB 用户名密码弱加密漏洞"
updated = "2026-06-16T21:52:50.940"

