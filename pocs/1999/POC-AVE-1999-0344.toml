[info]
author = "ave"
description = "检测 Matt Wright FormMail CGI 脚本是否存在且可被跨站滥用为开放邮件中继。发送 GET 请求访问 FormMail.cgi，若服务器返回 CGI 表单内容或可被外部提交邮件参数，则确认漏洞存在。"
id = "POC-AVE-1999-0344"
name = "CVE-1999-0173 PoC"
severity = "medium"
tags = ["cve-1999-0173"]
vuln_id = [
    "CVE-1999-0173",
    "AVE-1999-0344",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/cgi-bin/FormMail.cgi"
protocol = "http"

[poc.requests.body]
content = ""
type = "raw"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "recipient",
    "FormMail",
    'action="/cgi-bin/FormMail',
]
