[basic]
description = "FTP 服务在配置为匿名访问时，若系统关键数据与目录的权限设置不当，将导致严重的安全风险。攻击条件为攻击者无需身份认证即可连接目标 FTP 服务器的匿名账户。其利用方式包括：根目录被设置为全局可写，攻击者可上传或覆盖文件；服务器可获取真实的系统密码文件（如 /etc/passwd），造成凭据泄露；甚至可执行命令（如 ls）被恶意覆盖，进而实现任意代码执行。该漏洞影响所有配置不当的匿名 FTP 服务，CVSS 评分达到 10.0，危害等级为严重，攻击者仅需网络可达目标 FTP 端口即可远程利用。"
published = "1999-01-01T05:00:00.000"
remediation = "严格限制匿名 FTP 目录权限，确保根目录及子目录不可被匿名用户写入；移除或加密 /etc/passwd 等敏感文件；禁止匿名用户覆盖 ls 等可执行命令；建议升级到支持 chroot 的 FTP 服务器（如 vsftpd、ProFTPD），将匿名用户限制在隔离目录内。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "FTP 匿名访问 系统权限安全漏洞"
updated = "2026-06-16T21:48:35.170"

