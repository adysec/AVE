[basic]
description = "Postfix SMTP 服务器在特定配置下（当 SMTP 错误导致会话终止时向邮政管理员发送邮件）存在漏洞。攻击者可通过生成大量 SMTP 错误，迫使 SMTP 会话日志过大增长，导致服务器内存耗尽，引发拒绝服务。该漏洞影响 Wietse Venema 的 Postfix 1999-09-06/1999-12-31/2000-02-28 版本，未经身份认证的远程攻击者可轻易触发。通过精心构造的 SMTP 消息序列，攻击者可以持续消耗服务器资源，使得邮件服务无法正常响应，最终导致系统瘫痪。"
published = "2001-11-11T05:00:00.000"
remediation = "升级 Postfix 至 20010228-pl07 或更高版本（如 2.0.0 及以上稳定版）。若暂时无法升级，请在 main.cf 中设置 `notify_classes = bounce, 2bounce, delay, policy, protocol, resource, software` 移除 `smtpd` 类以禁用 SMTP 错误向 postmaster 发送邮件；同时在 main.cf 设置 `smtpd_error_sleep_time = 1s`、`smtpd_soft_error_limit = 3`、`smtpd_hard_error_limit = 10` 限制错误次数，并配置防火墙限制 SMTP 端口（25/587）仅允许可信 IP 访问作为临时缓解。"
score = 5
severity = "MEDIUM"
sources = ["redhat"]
title = "Postfix SMTP服务器内存耗尽拒绝服务漏洞"
updated = "2026-06-16T21:55:10.560"

