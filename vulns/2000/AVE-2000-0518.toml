[basic]
description = "rpc.statd 是 NFS 文件共享服务中的状态监控守护进程，其日志记录功能在处理未净化的格式化字符串时存在远程格式串漏洞。未经认证的远程攻击者可通过向目标主机的 rpc.statd 服务发送特制 RPC 请求，利用格式字符串 %n/%x 等标记实现任意内存写入，最终以 root 权限执行任意代码。该漏洞影响 Conectiva 4.x/5.x、Debian 2.x、RedHat 6.x、S.u.S.E 6.x/7.0 及 Trustix 1.x 等多款 Linux 发行版的 nfs-utils 包，CVSS 评分 10.0，危害等级严重。"
published = "2000-07-16T04:00:00.000"
remediation = "立即升级 nfs-utils 到各发行版提供的修补版本：Red Hat 安装 RHSA-2000:043 对应更新，Debian 升级至 DSA-001 修复版，Caldera 更新至 CSSA-2000-025.0 指定版本。修复内容为在 rpc.statd 的 syslog 调用中使用 %s 格式符替代直接传递用户可控数据，消除格式字符串漏洞。如无法升级，可在防火墙屏蔽 rpc.statd 使用的端口（111/TCP/UDP、2049/TCP/UDP）作为临时缓解，或禁用 NFS 服务。"
score = 10
severity = "CRITICAL"
sources = ["cve"]
title = "Linux nfs-utils rpc.statd 远程格式字符串漏洞"
updated = "2026-06-16T21:52:13.413"

