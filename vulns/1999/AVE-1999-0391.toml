[basic]
description = "Sendmail 8.8.0 及 8.8.1 版本在处理特制 MIME 邮件头时存在缓冲区溢出漏洞。远程攻击者无需身份认证即可向目标邮件服务器发送构造的邮件数据包，触发栈缓冲区溢出，从而在服务器上以 root 权限执行任意代码。该漏洞影响广泛部署 Sendmail 的 Unix/Linux 系统，攻击复杂度低，CVSS 评分 10.0，危害等级严重。"
published = "1996-10-01T04:00:00.000"
remediation = "升级 Sendmail 至 8.8.2 或更新版本，该版本已修复 MIME 头处理中的缓冲区溢出问题。如无法立即升级，可在 sendmail.cf 中限制 MIME 消息大小（O MaxMessageSize=N），并禁用未使用的 MIME 解析插件以降低攻击面。"
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "Sendmail MIME 缓冲区溢出漏洞"
updated = "2026-06-16T21:47:54.607"

