[basic]
description = "汉王e脸通综合管理平台 firstPeopleOpen/getDoors.do 接口的 order 参数存在 SQL 注入漏洞，攻击者无需认证即可通过构造特制的 UPDATEXML 函数注入恶意 SQL 语句，导致数据库信息泄露或被篡改。该漏洞影响汉王e脸通综合管理平台多个版本，攻击者仅需向目标服务器发送精心构造的 HTTP GET 请求即可完成利用，危害较大。"
published = "0703"
remediation = "建议联系汉王官方获取e脸通综合管理平台最新安全补丁，升级至修复SQL注入漏洞的版本。如无法立即升级，应在Web应用防火墙(WAF)侧配置规则拦截`/manage/intercom/`路径下`getDoors.do`接口的`order`参数中`UPDATEXML`、`CONCAT`、`SELECT`等SQL函数关键字，并对所有用户输入参数实施严格的参数化查询过滤。同时限制`/manage/`管理端口的公网访问，仅允许内网IP或VPN接入。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "汉王e脸通综合管理平台 SQL注入漏洞"
updated = "0703"

