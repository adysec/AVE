[basic]
description = "OpenOffice.org 2.3.1 之前版本内嵌的 HSQLDB 数据库引擎（1.8.0.9 之前版本）存在代码执行漏洞，源于该引擎暴露了静态 Java 方法。攻击者可构造恶意数据库文档，诱导用户使用受影响版本的 OpenOffice 打开，即可在用户上下文中执行任意 Java 代码。该漏洞影响 OpenOffice.org 2.x 全系列（<2.3.1），CVSS 9.3 分（AV:N/AC:M/Au:N/C:C/I:C/A:C），属用户协助型远程代码执行，攻击需受害者主动打开恶意文档方可触发。"
published = "2007-12-06T02:46:00.000"
remediation = "建议立即升级至 OpenOffice.org 2.3.1 或更高版本（已修复 HSQLDB 至 1.8.0.9 版本）。若暂无法升级，请勿打开来历不明的 .odb 数据库文件，并可在工具-选项-OpenOffice.org Base-数据库中禁用内嵌 HSQLDB 引擎作为临时缓解措施。"
score = 9.3
severity = "CRITICAL"
sources = ["tenable"]
title = "OpenOffice.org OpenOffice.org 2 远程代码执行漏洞"
updated = "2026-06-16T22:44:21.823"

