[basic]
description = "Linux 内核 ASoC 子系统中联发科 MT8183 平台音频驱动在设备探测函数 `mt8183_da7219_max98357_dev_probe` 中存在引用计数泄漏漏洞。`of_parse_phandle()` 获取设备节点时会递增引用计数，但函数仅在正常路径中调用 `of_node_put()` 释放，错误路径未正确处理，导致内核对象引用计数泄漏。本地攻击者可利用此漏洞通过反复触发设备探测错误路径耗尽系统内存，造成拒绝服务（系统崩溃）。该漏洞影响 Linux 内核使用 ASoC MT8183 驱动的系统，CVSS 评分 5.5，危害等级中等。"
published = "2025-02-26T07:00:53.280"
remediation = "建议立即将 Linux 内核升级至 5.17.2 或更高版本（5.18+）。对于使用发行版内核的用户，请安装对应发行版提供的最新内核安全更新（如 Ubuntu 的 linux-image-generic、Debian 的 linux-image-amd64）。若无法升级内核，可手动 cherry-pick 提交 9b9f6227e8d0c7c46b6d9d7b8a5c4e0536049fcf 到受影响内核源码树中，重新编译部署。"
score = 5.5
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux Kernel ASoC mediatek 驱动引用计数泄漏漏洞"
updated = "2026-06-17T05:17:14.973"

