[basic]
description = "SquirrelMail 1.4.2 存在多个跨站脚本（XSS）漏洞，远程攻击者无需身份认证即可通过向 compose.php 等页面的 mailbox 参数等多个攻击向量注入恶意脚本代码。当其他用户访问特制链接时，恶意脚本将在用户浏览器中执行，导致攻击者可窃取用户认证信息或冒充用户执行任意操作。该漏洞影响 SquirrelMail 1.4.2 及之前版本，CVSS 评分 6.8，危害等级中危。建议升级至 SquirrelMail 1.4.3 或更高版本修复此漏洞。"
published = "2004-08-18T04:00:00.000"
remediation = "升级至 SquirrelMail 1.4.3a 或更高版本（1.4.2 及之前版本受影响）。Red Hat 用户可通过 RHSA-2004:240 更新至 1.4.3a，Debian 用户通过 DSA-535 更新，Gentoo 用户升级至 >=mail-client/squirrelmail-1.4.3_rc1。如无法升级，可在 php.ini 中关闭 register_globals 以降低攻击面。"
score = 6.8
severity = "MEDIUM"
sources = ["nuclei"]
title = "SquirrelMail 1.4.x 跨站脚本漏洞"
updated = "2026-06-16T22:05:48.060"

