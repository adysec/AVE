[basic]
description = 'Sendmail 8.10.x 版本中的 mail.local 组件未能正确识别标识邮件正文结束的 ".\n" 字符串，远程攻击者可通过发送一条长度为 2047 字符且以 ".\n" 结尾的特制邮件消息行，触发该解析缺陷，导致目标系统拒绝服务或邮箱数据损坏。该漏洞影响 Sendmail 8.9.3 及更早版本，攻击者无需身份认证即可远程利用，危害等级中危。'
published = "2000-04-23T04:00:00.000"
remediation = '建议将 Sendmail 升级至 8.11.0 或更高版本，该版本已修复 mail.local 中 fgets() 对超过 2047 字节消息行及结尾 .\n 分隔符的识别缺陷。如无法立即升级，可应用 Sendmail 官方针对 mail.local 的 RELENG_8_10 分支补丁，或在邮件服务器前端对输入消息长度进行限制作为临时缓解措施。'
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Eric Allman Sendmail mail.local 远程拒绝服务漏洞"
updated = "2026-06-16T21:51:28.097"

