[basic]
description = "SSH Communications Security 公司出品的 SSH 1.2.27 版本中，ssh-agent 认证代理在创建用于身份认证的 UNIX 域套接字文件时，未对路径进行符号链接检查。本地攻击者可在 agent 预期创建 socket 的目录下预先放置一个指向任意目标文件（如 ~/.rhosts 或系统关键配置文件）的符号链接。当 agent 启动并跟随该符号链接创建套接字文件时，会以当前用户权限在符号链接指向的位置创建或覆盖文件，从而篡改受保护文件内容，可能造成权限提升或账户被非法信任。该漏洞为本地利用型，攻击条件要求攻击者在目标主机上拥有普通用户账户并能控制文件系统布局，影响范围仅限于 SSH 1.2.27 版本，CVSS 基础评分为 2.1，危害程度较低。"
published = "1999-09-17T04:00:00.000"
remediation = "建议立即升级 SSH Communications Security SSH 至 1.2.28 或更高版本（该版本已修复认证代理跟随符号链接的问题）。如暂无法升级，可手动设置 SSH_AUTH_SOCK 指向仅当前用户可写的专用目录（如 ~/.ssh-agent），并以 chmod 700 限制该目录权限，禁止其他用户创建符号链接；同时避免在共享或不可信目录中运行 ssh-agent 以作临时缓解。"
score = 2.1
severity = "LOW"
sources = ["epss"]
title = "SSH Communications Security SSH 1.2.27 认证代理符号链接漏洞"
updated = "2026-06-16T21:49:03.440"

