[basic]
description = "WordPress WP-Planet 插件 0.1 及更早版本中的 rss.class/scripts/magpie_debug.php 文件存在反射型跨站脚本漏洞，远程攻击者可通过 url 参数向目标页面注入任意 Web 脚本或 HTML 代码。当管理员或用户访问特制的恶意链接时，注入的脚本将在浏览器中执行，可能导致敏感信息泄露、会话劫持或钓鱼攻击。攻击无需身份认证，但需要用户交互（点击链接），影响使用该插件的 WordPress 站点。"
published = "2019-12-27T17:15:16.077"
remediation = "WP-Planet 插件 0.1 及更早版本已停止维护，建议立即在 WordPress 后台禁用并彻底删除该插件。同时部署 WAF 规则拦截来访请求中访问 `/wp-content/plugins/wp-planet/rss.class/scripts/magpie_debug.php` 路径的 `url` 参数，作为临时缓解措施。"
score = 6.1
severity = "MEDIUM"
sources = ["nuclei"]
title = "WordPress WP-Planet 跨站脚本漏洞"
updated = "2026-06-17T00:10:17.797"

