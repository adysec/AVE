[basic]
description = "Adobe Flash Player 在处理特制 MP4 文件中的 cprt 标签时存在内存破坏漏洞（CWE-787 越界写入），远程攻击者可通过诱导用户访问恶意网页或打开包含恶意 Flash 内容的文件，触发内存越界写入，导致远程代码执行或拒绝服务。该漏洞影响 Windows、Mac OS X、Linux、Solaris 及 Android 平台上的 Flash Player 10.3.183.15 之前版本及 11.x 系列 11.1.102.62 之前版本，CVSS 评分 8.1，危害等级高。攻击者无需身份认证即可利用，已有 Metasploit 公开利用模块。"
published = "2012-02-16T19:55:01.130"
remediation = "升级 Adobe Flash Player 至 10.3.183.15 及以上版本（Windows/Mac/Linux/Solaris），或 11.1.102.62 及以上版本（11.x 系列）；Android 2.x/3.x 升级至 11.1.111.6 及以上，Android 4.x 升级至 11.1.115.6 及以上。由于 Adobe Flash Player 已于 2020 年底停止支持并停止发布安全更新，建议彻底卸载 Flash Player 并禁用浏览器中的 Flash 插件，改用 HTML5 替代方案以彻底消除风险。"
score = 8.1
severity = "HIGH"
sources = ["kev"]
title = "Adobe Flash Player 内存破坏远程代码执行漏洞"
updated = "2026-06-16T23:38:11.620"

