[basic]
description = "Linux 内核 2.2.x 版本存在 ICMP 数据包处理拒绝服务漏洞，攻击者可构造包含异常类型、代码及异常 IP 头长度的畸形 ICMP 数据包发送至目标系统，触发内核处理异常导致系统拒绝服务。该漏洞影响 Linux Kernel 2.2.x 系列内核，涉及 Debian Linux 2.1、RedHat Linux 6.0、SuSE Linux 6.1 等发行版，CVSS 评分 5.0（中危）。攻击者无需身份认证即可远程发送畸形 ICMP 包触发漏洞，导致目标系统内核崩溃或拒绝服务，攻击者可远程发送特制 ICMP 数据包实施拒绝服务攻击。"
published = "1999-06-01T04:00:00.000"
remediation = "建议立即将 Linux 内核升级至 2.2.11 或更高版本（各发行版同步更新：Debian 升级 kernel-image 2.2.11 以上、RedHat 6.0 安装内核 RPM 2.2.12-20、SuSE 6.1 应用对应内核补丁）。如无法立即升级，可在防火墙或边界路由器上配置过滤畸形 ICMP 包（丢弃含异常 type/code 及非法 IP 头长度的包），并使用 ipchains/iptables 限制 ICMP 入站流量作为临时缓解。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Linux Kernel ICMP 数据包拒绝服务漏洞"
updated = "2026-06-16T21:49:05.527"

