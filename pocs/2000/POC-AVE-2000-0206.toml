[info]
author = "ave"
description = "检测和利用A-V Tronics InetServ 3.0 WebMail系统的缓冲区溢出漏洞。通过发送超长的GET请求来触发内存溢出，从而实现远程代码执行。"
id = "POC-AVE-2000-0206"
name = "CVE-2000-0065 Buffer Overflow PoC"
severity = "critical"
tags = ["ave-2000-0206"]
vuln_id = ["AVE-2000-0206"]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/webmail.php"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["Welcome"]
