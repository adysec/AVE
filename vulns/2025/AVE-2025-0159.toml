[basic]
description = "汉王e脸通综合管理平台 queryAntisubmarineList.do 接口存在 SQL 注入漏洞，攻击者可在未经身份认证的情况下，通过构造特制的 GET 请求，在 order 参数中注入恶意 SQL 语句，利用 UPDATEXML 函数进行报错注入，从而窃取数据库中的敏感信息，包括管理员凭证、用户数据等。该漏洞影响汉王e脸通综合管理平台全版本，危害严重。"
published = "0715"
remediation = "升级汉王e脸通综合管理平台至最新版本，修复 queryAntisubmarineList.do 接口中 order 参数未过滤导致的 SQL 注入漏洞。如无法立即升级，部署 Web 应用防火墙（WAF）拦截含 UPDATEXML 等 SQL 函数的关键字请求，并对所有用户输入参数（如 order、recoToken）实施严格的参数化查询或白名单校验。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "汉王 e脸通综合管理平台 SQL注入漏洞"
