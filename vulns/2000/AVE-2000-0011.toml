[basic]
description = "WebWho+ 1.1 的 whois.cgi 程序存在命令注入漏洞，远程攻击者可通过向 TLD 参数提交包含 shell 元字符（如分号、管道符等）的特制请求，在服务器端执行任意系统命令。该漏洞影响 Tony Greenwood WebWho+ 1.1 版本，攻击者无需身份认证即可利用，CVSS 评分 10.0，危害等级严重。建议升级至最新版本或对用户输入进行严格过滤。"
published = "1999-12-26T05:00:00.000"
remediation = "建议立即升级 WebWho+ 至 1.1 以上修复版本，或删除 whois.cgi 脚本并替换为安全的 WHOIS 查询实现。临时缓解可在 Web 服务器层面配置输入过滤规则，拦截 TLD 参数中的 Shell 元字符（如 ; | & $ `），并限制 CGI 执行权限为最小化用户。"
score = 10
