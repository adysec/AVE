[basic]
description = "Hylafax 4.0.2 的 faxalter 组件存在缓冲区溢出漏洞，本地攻击者可通过向 -m 命令行参数提交超长字符串触发缓冲区溢出，成功利用后可获取目标系统的高权限。该漏洞影响 Hylafax 4.0.2 及之前版本，攻击者需拥有本地访问权限，无需网络远程交互，危害等级较高。"
published = "1999-11-04T05:00:00.000"
remediation = "升级 Hylafax 至 4.1 及以上版本，该漏洞已在后续版本中修复。如无法升级，移除 faxalter 的 setuid 位（chmod u-s /usr/bin/faxalter）以消除本地提权风险，或限制可执行 faxalter 的用户组范围。"
score = 7.2
severity = "HIGH"
sources = ["cve"]
title = "Hylafax Hylafax 4.0.2 faxalter 本地缓冲区溢出漏洞"
updated = "2026-06-16T21:50:13.947"

