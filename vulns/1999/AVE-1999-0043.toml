[basic]
description = "SmartMax MailMax 1.0 的 SMTP 服务组件存在缓冲区溢出漏洞。远程攻击者无需身份认证，通过向目标系统 SMTP 端口发送特制的超长请求即可触发缓冲区溢出，导致远程命令执行。该漏洞影响 Windows 平台下的 MailMax SMTP 服务器 1.0 版本，攻击复杂度低，危害等级高。"
published = "1999-02-14T05:00:00.000"
remediation = "SmartMax MailMax 1.0 已停止维护，官方不再提供安全补丁。建议立即升级或迁移至仍在积极维护的邮件服务器，如 hMailServer、MailEnable 或 Windows Server SMTP 服务。如无法立即迁移，应在防火墙层面限制仅允许受信任 IP 访问 SMTP 端口（TCP 25），并部署入侵检测系统监控异常 SMTP 流量。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "SmartMax MailMax SMTP 缓冲区溢出漏洞"
updated = "2026-06-16T21:48:19.490"

