[basic]
description = "SCO UnixWare 7.1 的 pkginstall 及相关 pkg 命令（如 pkginfo、pkgcat、pkgparam）在实现存在缓冲区溢出缺陷。当本地用户以超长参数或特制输入调用这些命令时，可能触发缓冲区溢出，进而读取系统中的任意文件（通过 dacread 权限机制），造成敏感信息泄露。该漏洞影响运行 UnixWare 7.1 的本地系统，攻击前提是攻击者需具备目标系统的本地登录权限，通过构造恶意输入调用相关 pkg 命令即可利用。"
published = "1999-12-02T05:00:00.000"
remediation = "建议升级到 SCO UnixWare 7.1.1 或更高版本并应用 SCO 发布的安全补丁（如 osr507 安全补丁包）。无法升级时，可移除 pkginstall、pkgcat、pkginfo、pkgparam 的 setuid 位（chmod -s /usr/sbin/pkginstall /usr/sbin/pkgcat /usr/bin/pkginfo /usr/bin/pkgparam），或通过文件系统 ACL 限制普通用户对这些二进制文件的执行权限，防止本地用户利用 dacread 权限读取任意文件。"
score = 3.6
severity = "LOW"
sources = ["epss"]
title = "SCO Unixware 7.1 pkg 命令缓冲区溢出导致本地用户可读取任意文件"
updated = "2026-06-16T21:49:08.580"

