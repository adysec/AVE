[basic]
description = "Microsoft Java Virtual Machine（JVM）的 getSystemResourceAsStream 方法存在信息泄露漏洞。远程攻击者可通过向目标系统发送特制的请求，利用该函数读取服务器上的任意文件内容，导致敏感信息泄露。该漏洞影响 Microsoft Virtual Machine 2000 系列及 3000 系列版本，攻击者无需认证即可利用，危害等级较低但可配合其他漏洞提升威胁。"
published = "2000-01-31T05:00:00.000"
remediation = '建议立即安装 Microsoft 针对此漏洞发布的安全更新（对应公告 MS00-011），该补丁限制了 getSystemResourceAsStream 的权限。长期缓解措施是卸载 Microsoft Java Virtual Machine（通过"添加/删除程序"或在注册表中禁用），改用 Oracle Java 或其他受支持的 Java 运行时环境，因为 MS JVM 已停止维护且存在多个已知安全缺陷。'
score = 2.6
severity = "LOW"
sources = ["avd"]
title = "Microsoft Java Virtual Machine getSystemResourceAsStream 信息泄露漏洞"
updated = "2026-06-16T21:51:04.040"

