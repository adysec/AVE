[basic]
description = "Apple 公司出品的 AppleShare IP Mail Server 5.0.3（运行于 MacOS 8.1 及更早版本）的 SMTP 服务在处理客户端命令时存在缓冲区溢出漏洞。该服务在解析 HELO 命令时未对输入长度做有效边界校验，当远程攻击者向目标邮件服务器发送超出预期长度的超长 HELO 命令参数时，会导致缓冲区溢出并使服务进程崩溃，从而引发拒绝服务（DoS）。攻击无需身份认证，只要攻击者可网络访问目标服务器的 SMTP 端口即可发起，影响范围为部署了上述版本 AppleShare Mail Server 的 MacOS 8.1 及更早系统。"
published = "1998-04-08T04:00:00.000"
remediation = "立即将 AppleShare IP Mail Server 升级至 Apple 后续发布的修复版本（建议升级到 Mac OS 9 配套的 AppleShare IP 6.x 或更新的 Mail Server 组件）。在无法立即升级的情况下，应在边界防火墙或邮件网关上限制仅允许可信内网 IP 访问 25 端口的 SMTP 服务，丢弃超长 HELO 命令请求，并部署入侵检测规则拦截异常长度的 SMTP 命令作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Apple AppleShare IP Mail Server 远程拒绝服务缓冲区溢出漏洞"
updated = "2026-06-16T21:49:31.597"

