[basic]
description = "Panda Security 3.0 存在访问控制绕过漏洞，其原理在于该软件在禁用注册表编辑功能后，未能对注册表的实际写入操作实施有效限制。本地攻击者无需绕过额外的身份认证机制，即可通过直接执行 .reg 注册表文件或采用其他替代方式修改注册表内容，从而绕过软件的安全防护策略并提升自身权限。该漏洞影响 Panda Security 3.0 版本，攻击者利用成功后可篡改系统关键配置、破坏安全软件的防护能力。CVSS 评分为 2.1，危害等级为低危，利用条件要求攻击者具备目标系统的本地访问权限。"
published = "2000-04-17T04:00:00.000"
remediation = "建议立即升级至 WatchGuard Endpoint Security 最新版本（现 Panda Security 已并入 WatchGuard）。若无法升级，请通过组策略禁用 .reg 文件关联（regedit /s 禁用），并通过组策略“阻止访问注册表编辑工具”加固注册表访问控制，同时部署应用程序控制策略禁止未签名可执行文件运行。建议尽快更换为现代终端防护产品以获得持续安全更新。"
score = 2.1
severity = "LOW"
sources = ["exploitdb"]
title = "Panda Security 3.0 注册表绕过权限提升漏洞"
updated = "2026-06-16T21:51:21.143"

