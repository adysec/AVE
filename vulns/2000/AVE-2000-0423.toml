[basic]
description = "Linux 内核 2.2.16 之前版本的 capabilities 功能存在权限管理缺陷，本地攻击者可通过设置 capabilities 阻止 setuid 程序正确丢弃特权，从而绕过系统权限隔离机制实现权限提升或导致拒绝服务。该漏洞影响 Linux 2.2.x 及 2.4.0-test1 内核版本，攻击者需拥有本地账户即可利用，危害等级严重。"
published = "2000-06-09T04:00:00.000"
remediation = "升级 Linux 内核至 2.2.16 或更高版本，该版本修复了 capabilities 机制中 setuid 程序无法正确降权的问题。如无法立即升级内核，可临时移除 sendmail 等 setuid 程序的 CAP_SETUID/CAP_NET_RAW 等 capabilities 以降低风险。"
score = 10
severity = "CRITICAL"
sources = ["exploitdb"]
title = "Linux Kernel setuid/setcap 本地权限提升漏洞"
updated = "2026-06-16T21:51:52.870"

