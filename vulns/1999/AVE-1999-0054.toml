[basic]
description = "S.u.S.E. Linux 5.2 系统中 gnuplot 程序存在本地缓冲区溢出漏洞，拥有本地访问权限的攻击者可通过向 gnuplot 发送特制的输入数据触发缓冲区溢出，从而以目标程序的权限执行任意代码，实现本地权限提升。该漏洞影响 S.u.S.E. Linux 5.2 版本，危害等级中等。"
published = "1999-03-04"
remediation = "升级 gnuplot 至 3.7.1 或更高版本以修复缓冲区溢出漏洞。对于仍在使用 S.u.S.E. Linux 5.2 的遗留系统，建议移除 gnuplot 的 SUID 位：`chmod u-s /usr/bin/gnuplot`，并限制非信任用户对 gnuplot 的本地访问权限。长期缓解措施为升级至受支持的 Linux 发行版。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "SuSE Linux gnuplot 本地溢出漏洞"
updated = "1999-03-04"

