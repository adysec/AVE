[basic]
description = 'CA InoculateIT Agent for Exchange Server 在处理缺少 SMTP "From" 头字段的邮件时，未能正确识别附件中的病毒特征，导致病毒扫描机制被绕过。远程攻击者只需构造不含 From 头的畸形 SMTP 邮件并附带病毒附件发送至目标 Exchange 服务器，即可绕过病毒检测，使恶意代码抵达用户邮箱。该漏洞影响 Computer Associates InoculateIT 4.53 版本，CVSS 评分 7.5，危害等级高，建议升级至修复版本。'
published = "2000-12-31T05:00:00.000"
remediation = "升级到 Broadcom 官方提供的最新受支持版本（如原 CA InoculateIT 已停止维护，建议迁移至 Broadcom 当前支持的端点安全产品）。在邮件网关层面配置 SMTP 头校验规则，拒绝并拦截缺失 From 字段的邮件。同时启用 Exchange Server 传输规则，对缺少发件人头的邮件进行隔离处理。"
score = 7.5
severity = "HIGH"
sources = ["exploitdb"]
title = "Computer Associates InoculateIT Exchange Server 代理病毒防护绕过漏洞"
updated = "2026-06-16T21:53:27.297"

