[basic]
description = "Koules 1.4 是一款运行于 Linux 平台、基于 Svgalib 图形库的太空射击游戏，其命令行参数处理存在缓冲区溢出漏洞。本地攻击者可通过向程序传递超长命令行参数触发缓冲区溢出，从而执行任意代码。该漏洞影响 Koules 1.4 及更早版本，CVSS 评分 7.2，危害等级高。由于需要本地访问权限，攻击者需先获取系统普通用户权限。"
published = "2001-01-09T05:00:00.000"
remediation = "建议升级到 Debian 等发行版提供的 koules 1.4-28 或更新版本（X11 编译版，已修复缓冲区溢出问题）。若使用旧版 svgalib 二进制，立即移除 koules 二进制文件的 setuid 权限：`chmod u-s /usr/games/koules`，或直接卸载该软件包（`apt remove koules`）。限制仅受信任用户可执行该二进制文件作为临时缓解措施。"
score = 7.2
severity = "HIGH"
sources = ["exploitdb"]
title = "Jan Hubicka Koules 1.4 Svgalib 本地缓冲区溢出漏洞"
updated = "2026-06-16T21:53:19.030"

