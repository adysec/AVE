[basic]
description = "Matt Kruse Calendar Script 2.2 中的 calender.pl 和 calendar_admin.pl 脚本存在命令注入漏洞，远程攻击者可通过在输入参数中注入 shell 元字符（如分号、管道符等）执行任意系统命令。攻击者无需身份认证即可通过网络远程利用，成功利用后可完全控制目标服务器，导致信息泄露、数据篡改或服务中断。该漏洞影响 Matt Kruse Calendar Script 2.2 版本，CVSS 评分 7.5，危害等级高。"
published = "2000-05-16T04:00:00.000"
remediation = "立即停用 Matt Kruse Calendar Script 2.2，该软件已停止维护且无安全更新。如必须使用日历功能，建议替换为其他受支持的日历 CGI 程序（如 WebCalendar 或基于 PHP 的替代方案）。临时缓解措施：在 Web 服务器配置中限制对 calender.pl 和 calender_admin.pl 的访问，仅允许受信任 IP 段访问，并在 WAF 层面过滤包含管道符 `|` 的请求参数。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "Matt Kruse Calendar Script 任意命令执行漏洞"
updated = "2026-06-16T21:51:43.250"

