[basic]
description = "1ArcServe Backup 和 Inoculan AV 客户端模块在安装至 Exchange 服务器时，会创建名为 exchverify.log 的日志文件，该文件以明文形式记录用户名和密码等敏感凭据信息。本地攻击者若能够访问服务器文件系统，即可通过读取该日志文件获取管理员或其他用户的凭据，进而导致敏感信息泄露。该漏洞影响早期版本的 Exchange 环境，危害等级中等，需通过手动清理日志文件或限制文件访问权限进行防范。"
published = "1998-11-12T05:00:00.000"
remediation = "删除 exchverify.log 日志文件，禁止在 Exchange 服务器上安装 1ArcServe Backup 及 Inoculan AV 客户端模块的旧版本，升级至不再以明文记录密码的最新版本，并限制日志文件目录的访问权限仅授予管理员。"
score = 4.6
severity = "MEDIUM"
sources = ["avd"]
title = "CA 1ArcServe Backup 及 Inoculan 防病毒 Exchange 客户端模块明文口令泄露漏洞"
updated = "2026-06-16T21:50:11.617"

