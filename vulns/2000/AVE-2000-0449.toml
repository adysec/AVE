[basic]
description = "NTMail 5.x 存在安全绕过漏洞，网络用户可通过将请求重定向至 NTMail 的 Web 配置服务器，绕过 NTMail 代理的访问限制。攻击者无需身份认证即可利用此漏洞，导致未授权访问内部网络资源。该漏洞影响 NTMail 5.x 版本，CVSS 评分 5.0，危害等级中等。建议升级至最新版本或配置严格的代理访问控制策略以缓解风险。"
published = "2000-05-11T04:00:00.000"
remediation = "升级 NTMail 至 Gordano 官方发布的修补版本（如 5.x 最新更新或迁移至 6.x/7.x 系列），修复 Web 配置服务器认证绕过问题。同时在防火墙层面限制仅允许受信管理 IP 访问 Web 配置管理端口（默认 TCP 25/110 以外的管理端口），禁用不必要的 Web 配置接口远程访问功能。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "NTMail 代理限制绕过漏洞"
updated = "2026-06-16T21:51:40.200"

