[info]
author = "ave"
description = "检测 OpenCost /serviceKey 端点是否存在未授权访问漏洞。无需身份认证即可访问该端点，远程攻击者可利用此端点覆盖 GCP 服务账号密钥文件，导致 Kubernetes 集群内凭据窃取与权限提升。"
id = "POC-AVE-2026-0268"
name = "OpenCost /serviceKey Endpoint Unauthorized Access PoC"
severity = "high"
tags = [
    "cve-2026-44300",
    "opencost",
    "unauthorized-access",
]
vuln_id = [
    "CVE-2026-44300",
    "AVE-2026-0268",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/serviceKey"
protocol = "http"

[[poc.requests.matchers]]
expect = true
status = [
    200,
    405,
    500,
]
type = "status"
