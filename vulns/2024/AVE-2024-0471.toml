[basic]
title = "Canonical cloud-init hotplugd 套接字权限设置不当漏洞"
description = "cloud-init 通过 25.1.2 版本中，systemd socket 单元 `cloud-init-hotplugd.socket` 默认 `SocketMode` 设置为 0666，导致该 socket 文件全局可写。本地低权限攻击者可向 "/run/cloud-init/hook-hotplug-cmd" FIFO 写入恶意数据，触发 hotplug-hook 命令，以 root 权限执行任意操作。该漏洞影响所有使用受影响版本 cloud-init 的 Linux 发行版，CVSS 评分 5.9，危害中等。建议立即将 SocketMode 修改为更严格的权限值。"
severity = "MEDIUM"
score = 5.9
