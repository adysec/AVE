[basic]
description = "SCO UnixWare 7.0.x 及 2.1.3 系统中 Netscape FastTrack Server 2.x、Enterprise Server 2.0 及 Proxy Server 2.5 的某些文件存在不安全的权限设置漏洞。本地攻击者可利用这些不安全的文件权限，读取或修改敏感文件，从而将普通权限提升至 root 级别，实现完全控制受影响系统的目的。"
published = "2001-03-12T05:00:00.000"
remediation = "SCO UnixWare 7.0.x 和 2.1.3 系统中 Netscape FastTrack Server 2.x/Enterprise Server 2.0/Proxy Server 2.5 相关文件权限设置不当，允许非授权用户获取 root 权限。修复措施：1）使用 `chmod 755` 收紧服务器目录 `/opt/netscape/suitespot/` 下关键二进制文件和配置文件的权限，确保仅 root 用户可写；2）使用 `ls -l` 检查并修正所有属主为非 root 的可执行文件；3）将受影响 Netscape 套件升级到厂商修复版本或迁移至 ActiveState 替代产品；4）如不再需要，建议卸载 Netscape 服务器套件并切换至 Apache httpd。由于 SCO UnixWare 已停止支持，强烈建议迁移至受支持的操作系统平台。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "SCO UnixWare Netscape FastTrack服务器 本地权限提升漏洞"
updated = "2026-06-16T21:51:26.753"

