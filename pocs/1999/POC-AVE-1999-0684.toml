[info]
author = "AVE"
description = "Internet Explorer 5 download behavior 组件存在同源绕过漏洞，攻击者可通过服务端HTTP重定向使客户端读取本地任意文件。PoC页面使用#default#download行为调用startDownload方法，通过重定向读取本地文件。"
id = "POC-AVE-1999-0684"
name = "CVE-1999-0891 PoC"
severity = "medium"
tags = [
    "cve-1999-0891",
    "ie5",
    "download-behavior",
]
vuln_id = [
    "CVE-1999-0891",
    "AVE-1999-0684",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/poc.html"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["startDownload"]
