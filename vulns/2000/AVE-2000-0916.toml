[basic]
description = "Internet Explorer 4.x 及 5.x 版本中存在框架域验证漏洞，浏览器窗口内框架的域验证函数未能正确校验来源，远程攻击者可通过构造包含恶意框架的网页，诱使用户访问后绕过同源策略限制，读取客户端本地文件。该漏洞攻击复杂度较高，需要用户交互配合，仅影响机密性，CVSS 评分 2.6，危害等级低。"
published = "2000-10-20T04:00:00.000"
remediation = '立即安装 Microsoft 安全公告 MS00-055 提供的补丁，该补丁适用于 Internet Explorer 4.x 和 5.x 版本。如无法安装补丁，可将不受信任站点的安全区域中"Active 脚本"设置为禁用，作为临时缓解措施。'
score = 2.6
severity = "LOW"
sources = ["cve"]
title = "Microsoft Internet Explorer 框架域验证绕过漏洞"
updated = "2026-06-16T21:52:26.447"

