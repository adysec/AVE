[basic]
description = "Windows 2000 服务控制管理器（SCM）在创建命名管道时使用了可预测的管道名称，导致存在命名管道可预测性漏洞。本地攻击者可通过控制台访问系统，利用该漏洞创建恶意命名管道欺骗 SCM 连接，从而成功获取管理员权限。该漏洞影响 Windows 2000 系列版本，CVSS 评分 4.6，危害等级中危。修补措施包括安装 Microsoft 发布的安全更新或限制本地控制台访问权限。"
published = "2000-10-20T04:00:00.000"
remediation = "此漏洞影响已停止支持的 Windows 2000，官方不再提供安全更新。建议立即升级至受支持的 Windows 版本（如 Windows 10/11 或 Windows Server 2019/2022）。如无法升级，可通过限制本地控制台访问权限、禁用不必要的命名管道服务来降低风险。"
score = 4.6
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Microsoft Windows 2000 服务控制管理器命名管道本地特权提升漏洞"
updated = "2026-06-16T21:52:22.670"

