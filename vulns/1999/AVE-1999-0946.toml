[basic]
description = "CVE-1999-0635 指目标系统启用了 TCP/UDP 7 号端口的回声（echo）服务。该服务会原样回显接收到的任意数据，属于多余且危险的网络服务。攻击者在无需身份认证的情况下，即可向该端口发送数据触发回显，进而可用于反射放大攻击或探测网络拓扑。其影响范围为所有默认开启 echo 服务的主机（如部分老旧 Unix/Linux 及 Windows 系统），增大了被拒绝服务攻击利用的风险。修复方式为禁用或关闭系统的 echo 服务。"
published = "1999-01-01T05:00:00.000"
remediation = "在 /etc/inetd.conf 或 xinetd.d/echo 配置文件中注释或删除 echo 服务（端口 7/tcp 和 7/udp）条目，执行 systemctl restart inetd 或 systemctl restart xinetd 使配置生效。若系统使用 systemd，可直接执行 systemctl disable --now echo.service 禁用并停止该服务。如无法立即禁用服务，可通过防火墙规则（iptables -A INPUT -p tcp --dport 7 -j DROP）封禁端口 7 的外部访问作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "通用网络系统 回声服务 未授权服务运行安全漏洞"
updated = "2026-06-16T21:48:45.917"

