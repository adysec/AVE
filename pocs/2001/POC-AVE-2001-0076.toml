[info]
author = "ave"
description = "通过构造恶意的EMBED标签，向HREF参数传入超长字符串触发QuickTime Player 4.1.2（日文版）Windows插件缓冲区溢出，导致任意代码执行。受害者使用受影响的浏览器访问特制HTML页面时触发。"
id = "POC-AVE-2001-0076"
name = "Apple QuickTime Player 4.1.2 Plugin Remote Buffer Overflow PoC"
severity = "high"
tags = ["ave-2001-0076"]
vuln_id = [
    "CVE-2001-0198",
    "AVE-2001-0076",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/poc.html"
protocol = "http"

[poc.requests.body]
content = ""
type = "raw"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["QuickTime"]
