[basic]
description = "CDomainFree 2.4 的 whois_raw.cgi CGI 脚本存在命令注入漏洞，远程攻击者可通过向 fqdn 参数中注入 shell 元字符（如分号、管道符等）执行任意系统命令。该漏洞无需身份认证即可利用，攻击者能够完全控制受影响服务器，获取敏感信息或植入后门。由于 CGI 脚本未对用户输入进行有效过滤，导致此安全缺陷。"
published = "1999-06-01T04:00:00.000"
remediation = "立即删除或禁用 whois_raw.cgi 脚本，并对所有 CGI 输入参数实施严格的特殊字符过滤（禁止 |;&$` 等 shell 元字符传入系统调用）。建议停止使用已停止维护的 CdomainFree 2.4，改用 actively maintained 的 whois 查询工具（如 jwhois 或 whois CLI）替代。"
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "Cdomain CDomainFree whois CGI 远程命令执行漏洞"
updated = "2026-06-16T21:49:37.747"

