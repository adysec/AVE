[basic]
description = "IMP 邮件系统在处理 MSWordView 文档转换时存在文件清理不当漏洞。本地攻击者可通过大量请求文档转换并在完成前中断请求，导致临时文件无法被正确删除，持续占用磁盘空间，最终造成系统拒绝服务。该漏洞影响 IMP 2.2 Pre12 及更早版本，攻击条件为需要本地访问权限，利用难度较低。"
published = "2000-04-22T04:00:00.000"
remediation = "升级 IMP 至 2.2 pre11 或更高版本（已修复 umask 权限问题）。如无法升级，在 imp/lib/mimetypes.lib 中修改临时文件存储路径，创建仅 web 进程可访问（权限 700）的专用目录替代 /tmp。针对拒绝服务问题，设置 cron 定时任务，定期清理超过 30 分钟的 IMP 临时文件（如 find /tmp -name 'imp.word.*' -mmin +30 -delete），并监控 /tmp 磁盘使用量。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Horde IMP MSWordView 文件清理不当拒绝服务漏洞"
updated = "2026-06-16T21:51:46.800"

