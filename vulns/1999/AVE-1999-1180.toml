[basic]
description = "Ipswitch IMail 5.0 及更早版本的 IMAP 服务（imapd）登录功能存在缓冲区溢出漏洞。远程攻击者无需身份认证即可通过向登录接口发送超长的用户名或密码参数触发该漏洞，导致目标服务崩溃引发拒绝服务，在特定条件下可能实现任意代码执行。该漏洞 CVSS 评分 5.0，危害等级中危。"
published = "2005-05-02T04:00:00.000"
remediation = "升级 Ipswitch IMail 至 5.0 以上版本（官方已在后续版本修复此问题）；如果当前版本已停止技术支持，建议迁移至 Serv-U 或其他仍在维护的邮件服务器软件。作为临时缓解措施，可在网络边界限制对 IMAP 端口（143/tcp）的访问，仅允许受信任 IP 连接。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Ipswitch IMail 5.0 IMAP 服务缓冲区溢出漏洞"
updated = "2026-06-16T21:50:42.733"

