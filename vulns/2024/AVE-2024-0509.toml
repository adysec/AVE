[basic]
description = "Linux 内核 i3c 子系统存在死锁漏洞，i3c_master_register() 函数在注册 i3c 设备时重复获取 i3cbus->lock 锁，导致递归加锁引发内核死锁。本地攻击者可利用此漏洞触发系统拒绝服务。该漏洞影响 Linux 内核多个版本，CVSS 评分 5.5，危害等级中等。开发者已通过直接使用 i3cdev->desc->info 替代重复调用 i3c_device_get_info() 的方式修复此问题。"
published = "2025-01-11T13:15:21.240"
remediation = "及时将 Linux 内核升级至以下已修复版本：5.4.287、5.10.231、5.15.174、6.1.120、6.6.66 或 6.12.5 及更高版本。补丁已合入主线及 LTS 分支，可通过 `git cherry-pick` 应用内核仓库中的 7 个对应提交。如无法升级内核，可禁用 CONFIG_I3C 内核选项，或在系统启动时通过内核参数 `i3c.disable=1` 关闭 i3c 驱动避免触发死锁。"
score = 5.5
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux Kernel i3c 递归锁导致死锁漏洞"
updated = "2026-06-17T07:50:26.150"

