[basic]
description = "EMURL 是一款基于 Web 的电子邮件账户管理软件，其 2.0 版本在用户会话 URL 中编码了可预测的标识符，导致远程攻击者无需身份认证即可通过构造特定 URL 直接访问其他用户的电子邮件账户。该漏洞影响 Seattle Lab Software Emurl 2.0 版本，攻击者只需知道或猜测 URL 中的标识符模式即可实施攻击，可能导致用户邮件数据泄露。CVSS 评分 5.0，危害等级中危。"
published = "2000-05-15T04:00:00.000"
remediation = "Seattle Lab Software 已停止维护 Emurl，建议立即迁移至现代支持的邮件 Web 客户端（如 Roundcube、SquirrelMail 等）。如无法立即替换，在反向代理层面添加随机化 session 标识的重写规则，强制启用额外身份验证（如 HTTP Basic Auth），并限制管理后台仅允许可信 IP 访问以降低风险。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Seattle Lab Software Emurl 2.0 电子邮件帐户访问漏洞"
updated = "2026-06-16T21:51:37.840"

