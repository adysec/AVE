[basic]
description = "泛微Ecology OA 前台存在任意 SQL 语句执行漏洞。攻击者无需身份认证即可通过前台接口提交特制的 SQL 查询参数，后端未对用户输入进行充分过滤和参数化处理，导致恶意 SQL 语句被直接拼接并执行。成功利用该漏洞可导致数据库敏感信息泄露、数据篡改甚至获取系统控制权。该漏洞影响泛微Ecology OA 多个版本，危害严重。"
published = "08.15"
remediation = "立即升级泛微Ecology OA至最新安全版本（≥10.x），官方已在后续版本中修复前台参数未过滤导致的SQL注入漏洞。如无法立即升级，部署WAF规则拦截含SQL关键字（union/select/sleep等）的请求，并限制OA系统数据库连接账户权限为最小必要（仅允许执行存储过程，禁用DROP/INSERT/UPDATE等高危操作）。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "泛微Ecology OA 前台任意SQL语句执行"
updated = "08.15"

