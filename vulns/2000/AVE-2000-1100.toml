[basic]
description = 'Microsoft Office 2000 中的 UA ActiveX 控件被错误标记为"对脚本安全"，远程攻击者可通过构造恶意网页，利用 Office 帮助系统中的"Show Me"功能调用该控件执行未授权操作，导致信息泄露、权限提升或任意代码执行。该漏洞影响 Microsoft Office 2000 所有版本，攻击者无需身份认证即可远程利用，危害严重。'
published = "2000-05-11T04:00:00.000"
remediation = "Microsoft Office 2000 用户授权控件 (UA Control) 漏洞导致攻击者可通过 Office 帮助中的“显示”功能执行未授权操作。建议立即安装 Microsoft Office 2000 服务包 3 (SP3) 或更高版本，该服务包修复了 UA 控件的安全验证机制。您也可以安装 Microsoft Office 2000 更新程序 (SP3)，以增强控件的安全性。无法立即安装补丁时，可禁用 Office 2000 中的“帮助”功能，或通过修改注册表禁用 UA 控件以缓解风险。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "Microsoft Office 2000 UA ActiveX控件 脚本安全漏洞"
updated = "2026-06-16T21:51:41.587"

