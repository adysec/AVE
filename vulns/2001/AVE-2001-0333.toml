[basic]
description = "Taylor UUCP 1.0.6 版本中的 uuxqt 组件存在参数处理缺陷，未正确过滤危险的长选项参数。本地攻击者可通过调用 uux 命令并指定 --config 选项指定替代配置文件，从而绕过权限控制实现本地权限提升。该漏洞影响 Taylor UUCP 1.0.6 版本，CVSS 评分 7.2（本地攻击、低复杂度、无需认证、完全机密性/完整性/可用性影响）。攻击者需具备本地系统访问权限并能执行 uux 命令，通过指定恶意配置文件实现权限提升。Debian 已发布 DSA-079 安全公告修复此漏洞，ExploitDB (EDB-21106) 及多个公开 PoC 证实该漏洞可被利用实现本地提权。"
published = "2001-12-21T05:00:00.000"
remediation = "建议升级 Taylor UUCP 至 1.06.1 及以上版本（Debian DSA-079 修复版本），或从 Debian 官方源安装修复版 uucp_1.06.1-1 以上版本。若无法立即升级，可暂时移除 uuxqt 的 SUID 位权限（chmod u-s /usr/bin/uuxqt）作为临时缓解措施，限制本地用户利用 --config 参数提权。"
score = 7.2
severity = "HIGH"
sources = ["redhat"]
title = "Taylor UUCP 本地权限提升漏洞"
updated = "2026-06-16T21:55:08.720"

