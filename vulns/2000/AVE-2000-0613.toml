[basic]
description = "FreeBSD Alpha 平台由于缺少 /dev/random 和 /dev/urandom 随机数设备，导致其上运行的 OpenSSL 0.9.4 及 OpenSSH 在密钥生成过程中无法获得足够的熵源，生成的加密密钥强度显著降低。攻击者可通过暴力破解或密码分析方式，以较低的计算成本还原私钥或会话密钥，从而窃听、解密或篡改受保护的网络通信。该漏洞影响 FreeBSD Alpha 架构上的 OpenSSL 0.9.4 及 OpenSSH，CVSS 评分 5.0，危害等级中等。"
published = "2000-06-12T04:00:00.000"
remediation = "确保Alpha系统存在/dev/random和/dev/urandom设备节点，执行`cd /dev && ./MAKEDEV random urandom`创建；升级OpenSSL至0.9.4以上版本，该版本已修复随机设备检查逻辑；安装熵收集守护进程（如rndcontrol）确保系统拥有足够随机熵源，避免因缺少硬件随机数设备而产生弱密钥。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "FreeBSD Alpha 平台 OpenSSL/OpenSSH 因缺少随机数设备导致弱密钥生成漏洞"
updated = "2026-06-16T21:51:56.717"

