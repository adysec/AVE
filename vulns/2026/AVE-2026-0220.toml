[basic]
description = "GeoServer WMS 服务 GetMap 接口存在 XML 外部实体注入漏洞（XXE），攻击者可通过向 WMS GetMap 请求中注入特制的 XML 外部实体，利用 XML 解析器对外部实体的处理机制读取服务器上的任意文件或发起服务端请求伪造攻击（SSRF）。该漏洞影响 GeoServer 2.26.2 之前的所有版本，成功利用可能导致敏感信息泄露或内网探测。厂商已发布 2.26.2 版本修复此漏洞，建议用户立即升级。"
published = "nday"
remediation = "建议将 GeoServer 升级至 2.26.2 或更高版本，该版本已修复 WMS GetMap 请求中 XML 外部实体注入问题。如无法立即升级，可在反向代理或 WAF 层面对 `/wms` 接口的 `GetMap` 请求中 XML 格式的 `viewParams` 参数进行过滤，禁止包含 `<!DOCTYPE` 或 `<!ENTITY` 的外部实体声明。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "GeoServer WMS GetMap XML 外部实体注入漏洞"
updated = "nday"

