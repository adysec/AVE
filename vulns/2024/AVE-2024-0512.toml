[basic]
description = "golang glog 日志库在创建日志文件时存在安全漏洞，当日志文件写入可被广泛写入的目录（默认配置）时，低权限攻击者可预测高权限进程的日志文件路径，并提前创建指向敏感文件的符号链接。当高权限进程运行时，会跟随该符号链接覆盖目标敏感文件，导致权限提升或敏感数据破坏。该漏洞 CVSS 评分 7.1，危害等级高，影响所有使用 glog 默认配置的 Go 应用。修复方式为在检测到日志文件已存在时程序退出（状态码 2），防止符号链接攻击。"
published = "2025-01-28T02:15:28.927"
remediation = "立即将 github.com/golang/glog 升级到 v1.2.4 及以上版本，该版本在检测到日志文件已存在时直接退出（退出码 2），防止符号链接劫持。如无法升级，应将日志输出目录改为非全局可写路径，并确保日志目录权限为 750 或更严格，仅允许运行进程的用户写入。"
score = 7.1
severity = "HIGH"
sources = ["msrc"]
title = "Golang glog 日志文件符号链接漏洞"
updated = "2026-06-17T07:54:03.643"

