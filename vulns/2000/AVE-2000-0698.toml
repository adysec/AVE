[basic]
description = "PHP 3.x 和 4.x 版本中存在格式化字符串注入漏洞，由于程序未能正确过滤用户输入的格式化字符串参数，攻击者可通过构造特制的 HTTP 请求触发 PHP 错误日志记录功能，将恶意格式化字符串写入错误日志。当错误日志被 PHP 自身的错误处理函数解析时，格式化字符串中的 %n 等特殊标记可被解释执行，导致攻击者能够覆写内存中的任意地址，最终实现远程代码执行。该漏洞影响 PHP 3.0.16 及 4.0.2 版本，攻击无需身份认证，CVSS 评分 10.0，危害等级严重。"
published = "2000-12-19T05:00:00.000"
remediation = "立即升级至 PHP 4.1.0 或更高版本（该版本修复了格式化字符串注入漏洞）。对于仍运行 PHP 3.x 的系统，必须升级至 PHP 4.1.0+；PHP 4.0.2 及更早版本均受影响。由于 PHP 3/4 已停止安全支持，建议迁移至 PHP 7.4+ 或 PHP 8.x 系列。临时缓解措施：在 php.ini 中设置 log_errors_max_len = 0 并关闭 display_errors，同时在应用层对所有用户输入进行格式化字符串转义。"
score = 10
severity = "CRITICAL"
sources = ["redhat"]
title = "PHP PHP 3.0/4.0 格式化字符串远程代码执行漏洞"
updated = "2026-06-16T21:52:52.483"

