[basic]
description = "Windows NT 系统未对可移动介质驱动器（如软盘驱动器、光盘驱动器）的访问权限进行适当限制，导致未经授权的本地用户可通过物理接触或网络共享途径读取受保护的可移动介质中的敏感数据。该漏洞影响 Windows NT 4.0 及更早版本，攻击者只需能够物理访问目标系统或通过网络访问共享的可移动介质即可利用，可能造成系统配置信息、密码文件或加密密钥等机密数据泄露。"
published = "1999-01-01T05:00:00.000"
remediation = '通过本地安全策略设置，为"计算机配置→Windows 设置→安全设置→本地策略→用户权利指派"中的"从可移动媒体访问"项限制为仅授权管理员；同时修改注册表 HKEY_LOCAL_MACHINE\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Winlogon 中的 AllocateCDRoms 和 AllocateFloppies 值为 1，限制非管理员用户访问可移动媒体驱动器。'
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "Microsoft Windows NT 可移动介质未授权访问漏洞"
updated = "2026-06-16T21:48:42.013"

