[basic]
description = "HP-UX 11.00 系统中的 newgrp 命令存在权限提升漏洞。newgrp 命令用于切换用户所属组，由于其对用户输入参数处理不当，本地攻击者可通过精心构造的参数调用 newgrp 命令，利用该漏洞获取超出自身权限的访问能力，实现本地权限提升。攻击者需拥有本地系统访问权限，攻击复杂度较低，成功利用后可获取受影响系统的部分机密性、完整性和可用性控制权。"
published = "2000-10-20T04:00:00.000"
remediation = "立即安装 HP 官方安全公告 HPSBUX0008-121 提供的补丁，可通过 HP IT Resource Center 搜索对应补丁编号获取。如无法安装补丁，执行 `chmod u-s /usr/bin/newgrp` 移除 setuid 位以阻断提权路径，注意此操作可能影响依赖 newgrp 切换组的脚本正常运行。"
score = 4.6
severity = "MEDIUM"
sources = ["cve"]
title = "HP HP-UX newgrp 命令本地权限提升漏洞"
updated = "2026-06-16T21:52:24.813"

