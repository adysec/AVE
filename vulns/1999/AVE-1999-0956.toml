[basic]
description = "Unix 系统中 Gopher 服务（默认端口 70）被启用时，未经身份认证的远程攻击者可利用该协议的文件检索功能探测系统目录结构、访问敏感文件，或结合其他服务漏洞实施进一步渗透攻击。该漏洞影响所有运行 Gopher 服务的 Unix 系统，攻击难度低且无需用户交互，严重威胁信息安全。建议关闭不使用的 Gopher 服务以减少攻击面。"
published = "1999-01-01T05:00:00.000"
remediation = "立即停止运行 Gopher 服务，并从服务管理器禁用开机自启。若业务无需使用 Gopher 协议，建议彻底卸载 gopherd 软件包；如有历史数据兼容需求，可在防火墙层面封禁 TCP 端口 70 作为临时缓解措施。"
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "Gopher 服务远程信息泄露漏洞"
updated = "2026-06-16T21:48:46.513"

