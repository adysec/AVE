[basic]
description = "Linux 内核 btrfs 文件系统在 dev_replace 设备替换功能中存在死锁漏洞（CWE-667）。当启用 RAID stripe-tree 功能并执行设备替换操作时，btrfs_map_block 函数会尝试重复获取同一个 dev_replace rwsem 读写信号量，导致任务在已持有该锁的情况下再次请求锁，触发 lockdep 检测到的递归锁定死锁。该漏洞影响启用了 RAID stripe-tree 特性的 Linux 内核 btrfs 文件系统，CVSS 3.1 评分 5.5（中等），攻击向量为本地（AV:L），攻击复杂度低（AC:L），需要低权限（PR:L），无需用户交互（UI:N），主要影响可用性（A:H）。本地攻击者可通过触发带有 RAID stripe-tree 的 btrfs 设备替换操作（如运行 fstests btrfs/011 测试），导致内核死锁引发拒绝服务。Linux 内核已通过修改 btrfs_map_block 避免在已持有 dev_replace rwsem 的任务中再次获取该锁来修复此死锁问题。"
published = "2025-01-11T13:15:22.933"
remediation = "建议立即升级 Linux 内核至 6.11.5、6.10.13、6.6.48、6.1.106 或 5.15.166 及以上版本（含修复提交 7a5c5b8b3b2f）。Ubuntu 24.04 LTS 用户请安装 USN-7381-1/USN-7450-1 安全更新（linux-image-6.8.0-49-generic 及以上）。如暂时无法升级内核，可临时避免在使用 RAID stripe-tree 特性的 btrfs 文件系统上执行设备替换操作，或在维护窗口卸载相关文件系统后再执行替换操作。"
score = 5.5
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux 内核 btrfs 文件系统死锁漏洞"
updated = "2026-06-17T07:58:56.987"

