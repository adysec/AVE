[basic]
description = "Microsoft Internet Information Services（IIS）及 Site Server 中的 code.asp 示例文件存在任意文件读取漏洞。远程未经身份认证的攻击者可利用该示例文件，通过构造特殊 HTTP 请求读取目标服务器上的任意文件内容，造成敏感信息泄露。该漏洞影响包含该示例文件的 IIS 及 Site Server 版本，攻击者无需登录凭据即可在未授权情况下访问服务器文件系统中的机密数据。该漏洞属于信息泄露类安全风险，攻击者可能借此获取配置文件、数据库凭证或其他敏感信息，为后续进一步攻击提供条件。Microsoft 建议管理员删除或限制该示例文件的访问权限以缓解风险。"
published = "1999-05-07T04:00:00.000"
remediation = '立即从 IIS 和 Site Server 的 Web 根目录（如 \inetpub\wwwroot 及 \Program Files\Microsoft Site Server）中删除 code.asp 等示例脚本文件；安装微软对应安全补丁（Windows NT 4.0 SP4 / IIS 4.0 累积更新），并将 Site Server 升级至已修正该问题的版本；在无法立即升级时，使用 IIS 的“执行权限”设为“无”来禁用脚本目录执行，并通过 URLScan 拒绝包含 ../ 的路径遍历请求作为临时缓解。'
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Microsoft IIS 任意文件读取漏洞"
updated = "2026-06-16T21:48:57.270"

