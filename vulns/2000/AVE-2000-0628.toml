[basic]
description = "IBM WebSphere Application Server 3.0.2 的 Server Plugin 组件存在缓冲区溢出漏洞，远程攻击者可通过向目标服务器发送特制的包含超长 Host 请求头的 HTTP 数据包触发该漏洞，导致缓冲区溢出，进而可能执行任意命令或造成拒绝服务。该漏洞无需身份认证即可远程利用，CVSS 评分 10.0，危害等级严重，影响 IBM WebSphere Application Server 3.0.2 版本。"
published = "2000-11-14T05:00:00.000"
remediation = "升级 IBM WebSphere Application Server 至 3.0.2.1 及以上版本，该漏洞已在后续补丁中修复。如无法升级，在反向代理或 Web 服务器层限制 Host 请求头长度不超过 1024 字节，并过滤异常字符作为临时缓解措施。"
score = 10
severity = "CRITICAL"
sources = ["exploitdb"]
title = "IBM WebSphere Application Server 插件缓冲区溢出远程代码执行漏洞"
updated = "2026-06-16T21:52:35.657"

