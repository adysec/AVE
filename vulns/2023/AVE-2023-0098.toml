[basic]
description = "H3C ER系列及GR系列企业路由器存在路径遍历漏洞（CVE-2023-5142），漏洞位于/userLogin.asp页面的配置文件处理模块中。未经身份认证的远程攻击者可通过发送特制HTTP请求，利用路径遍历序列（如/userLogin.asp/../actionpolicy_status/../model.cfg）绕过访问限制，读取设备配置文件，泄露网络配置、管理接口设置等敏感信息。该漏洞影响ER2100n、ER2200G2、ER3200G2、ER3260G2、ER5100G2、ER5200G2、ER6300G2及GR系列等多款企业级路由器，CVSS评分5.3，危害等级中危。目前漏洞利用方法已公开，建议用户及时更新固件至最新版本以防止信息泄露风险。"
published = "08.08"
remediation = "立即登录 H3C 官网下载并升级 ER5200G2 最新固件版本，升级前请先备份配置文件。在 Web 管理界面「安全管理→访问控制」中，将 HTTP/HTTPS 管理访问限制为仅内网特定IP段，并关闭 WAN 侧 Web 管理功能。同时修改默认管理员密码，禁用 Telnet 等不安全的远程管理协议，仅使用 SSH 进行远程维护。若无法立即升级，可在防火墙上配置 ACL 规则，禁止外网 IP 访问设备管理端口（默认 80/443）。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "H3C ER5200G2 信息泄露漏洞"
updated = "08.08"

