[basic]
description = "Zimbra Collaboration Suite (ZCS) 的管理控制台在处理包含大量逗号分隔路径段的 GET 请求时存在不当处理漏洞。未经身份认证的远程攻击者可向目标系统发送特制请求，触发冗余处理并生成膨胀的响应，导致目标系统资源被过度消耗，造成拒绝服务。该漏洞影响 ZCS 9.0.0 Patch 46 之前版本、10.0.15 之前版本及 10.1.9 之前版本，CVSS 评分 7.5，危害等级高危。"
published = "2025-07-09T17:15:31.297"
remediation = "升级 Zimbra Collaboration Suite 至 9.0.0 Patch 46、10.0.15 或 10.1.9 及以上版本。如无法立即升级，可在反向代理或 WAF 层面限制对 Admin Console 路径的 GET 请求长度，过滤包含过多逗号分隔路径段的请求以缓解资源消耗。"
score = 7.5
severity = "HIGH"
sources = ["hwpoc"]
title = "Zimbra Collaboration Suite 管理控制台远程拒绝服务漏洞"
updated = "2026-06-17T09:38:37.957"

