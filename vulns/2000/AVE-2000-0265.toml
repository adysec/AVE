[basic]
description = "Solaris 2.6 及 7.0 系统中的 lp 命令存在缓冲区溢出漏洞，当使用超长参数传递给 -d 选项时，可触发栈缓冲区溢出。本地攻击者通过构造特制的 -d 参数执行 lp 命令，能够覆盖返回地址，从而以 root 权限执行任意代码。该漏洞影响 Solaris 2.6 与 7.0 版本，需要本地用户身份才能利用，危害等级高危。"
published = "2000-04-24T04:00:00.000"
remediation = "安装 Sun 官方补丁 106235-01（Solaris 7）或 106236-01（Solaris 2.6），或升级至 Solaris 8 及以上版本。如无法升级，可移除 lp 命令的 setuid 权限：chmod 755 /usr/bin/lp，但会导致普通用户无法使用打印功能。"
score = 7.2
severity = "HIGH"
sources = ["cve"]
title = "Sun Solaris lp -d 选项本地缓冲区溢出漏洞"
updated = "2026-06-16T21:51:27.727"

