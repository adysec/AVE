[basic]
description = "TetriNet 守护进程 1.13.16 版本存在缓冲区溢出漏洞，远程攻击者可通过向目标系统的 31457 端口发送包含超长 DNS 主机名的连接请求触发该漏洞，导致缓冲区溢出，造成拒绝服务，在特定条件下可能执行任意命令。该漏洞影响使用 TetriNet 1.13.16 的游戏服务器，危害等级中等。"
published = "1999-02-17T05:00:00.000"
remediation = "立即升级 TetriNet daemon (Tetrix) 至 1.13.16 以上版本，或应用官方补丁将 main.h 中 UHOSTLEN 从 30 改为 256，并同步修改 main.c 和 net.c 中缓冲区定义以使用 UHOSTLEN 宏。如无法升级，可在防火墙层面限制对端口 31457 的访问，仅允许可信 IP 连接。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Tetrix TetriNet 守护进程缓冲区溢出漏洞"
updated = "2026-06-16T21:49:37.310"

