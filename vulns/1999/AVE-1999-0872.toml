[basic]
description = "Windows NT 日志文件的最大大小或保留期限配置不当，可能导致日志文件无限制增长耗尽磁盘空间，引发拒绝服务；或日志过早轮转覆盖，导致关键安全事件记录丢失，影响事后审计与取证分析。该漏洞影响 Windows NT 系统，CVSS 评分 10.0，危害等级严重。"
published = "1999-01-01T05:00:00.000"
remediation = "建议在 Windows NT 事件查看器中右键「事件日志」→「日志设置」，将日志最大大小根据磁盘容量设为 512MB 以上，回卷策略设为「按需要覆盖事件」而非「不要覆盖事件」。若仍使用旧版系统，应升级至 Windows Server 2003 及以上版本以获得完善的日志审计功能。作为临时缓解措施，可设置组策略定期归档并清理旧日志。"
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "Microsoft Windows NT 日志文件大小与保留期限配置不当漏洞"
updated = "2026-06-16T21:48:42.267"

