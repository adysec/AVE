[basic]
description = "Centrinity FirstClass Intranet Server 邮件处理系统存在缓冲区溢出漏洞，攻击者可向目标服务器发送包含超长邮件头（To: 字段）的电子邮件，触发邮箱服务程序的缓冲区溢出，导致服务进程崩溃或严重错误，引发拒绝服务攻击。该漏洞影响所有版本低于 6.1 的 FirstClass 邮件服务器（含 5.770 版本）。攻击者无需任何权限即可远程发起攻击，只要精心构造的恶意邮件即可轻易触发。漏洞源于邮件服务程序在处理异常长邮件头时，未进行充分的边界检查和内存保护措施。攻击者可反复发送恶意邮件，导致受害服务器邮件服务瘫痪，严重影响企业网络通信。该漏洞的 CVSS 评分为 5.0，危害等级为中度，对企业级 Intranet Server 构成了严重威胁。这类电子邮件 头 溢 出 类 型 遭 频 繁 遭 到 视 为 门 类 流 行 的 DOS 攻 击手 段，响 应 了 早 期I n t r a n e t 服 务 器 类 易 受 攻 击 的 状 态。 (83字)"
published = "2000-06-27T04:00:00.000"
remediation = "升级 Centrinity FirstClass Intranet Server 至 6.1 或更高版本。若无法立即升级，可在邮件网关或防火墙层面配置规则限制 To: 邮件头长度（建议 ≤256 字符），或暂时禁用不必要的邮件服务端口作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Centrinity FirstClass Intranet Server 邮件长头部拒绝服务漏洞"
updated = "2026-06-16T21:52:01.190"

