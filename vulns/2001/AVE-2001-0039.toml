[basic]
description = "Solaris 2.7 与 2.8 系统中的 catman 工具在处理临时文件时存在不安全的符号链接竞争漏洞，本地攻击者可通过创建恶意的 sman_PID 符号链接指向任意系统文件，当 catman 以高权限写入临时文件时即可覆盖目标文件内容，导致系统文件完整性遭破坏或权限提升。该漏洞利用条件为攻击者拥有本地账号并能预测临时文件名，CVSS 评分 1.2，危害等级低。"
published = "2001-02-12T05:00:00.000"
remediation = "建议安装 Sun 官方补丁 107018-10（Solaris 2.7）或 108500-10（Solaris 2.8），修复 catman 临时文件创建的不安全方式。如无法立即打补丁，可临时移除 catman 的 setuid 权限：`chmod 555 /usr/bin/catman`，并设置环境变量 TMPDIR 指向仅当前用户可写的临时目录作为缓解措施。"
score = 1.2
severity = "LOW"
sources = ["exploitdb"]
title = "Sun Solaris catman 本地不安全临时文件符号链接漏洞"
updated = "2026-06-16T21:53:38.760"

