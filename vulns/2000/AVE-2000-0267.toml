[basic]
description = "Red Hat Piranha 虚拟服务器套件中的 passwd.php3 CGI 脚本存在命令注入漏洞，本地攻击者可通过在输入参数中注入 shell 元字符（如分号、管道符等）绕过输入过滤，以 Web 服务器进程权限执行任意系统命令。该漏洞影响 Red Hat Piranha Virtual Server Package 相关版本，CVSS 评分 10.0，危害等级严重。攻击者需拥有本地访问权限即可利用，Metasploit 框架已集成对应利用模块。"
published = "2000-04-24T04:00:00.000"
remediation = '升级 Red Hat Piranha Virtual Server Package 至 0.4.13-1 及以上版本，该版本已对 passwd.php3 的输入参数进行转义处理，阻止 shell 元字符注入。如无法升级，建议移除或重命名 passwd.php3 脚本，或通过 Apache 配置 `<Files "passwd.php3"> Deny from all </Files>` 限制访问，并在 PHP 配置中启用 `safe_mode` 和禁用 `exec`/`system` 等危险函数。该产品已停止维护，建议迁移至现代负载均衡方案。'
score = 10
severity = "CRITICAL"
sources = ["cve"]
title = "Red Hat Piranha Virtual Server Package passwd.php3 任意命令执行漏洞"
updated = "2026-06-16T21:51:28.470"

