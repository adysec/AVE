[basic]
description = "ToolTalk 共享库处理 TT_SESSION 环境变量时存在缓冲区溢出漏洞。本地攻击者可向该环境变量传入超长字符串触发缓冲区溢出，覆盖进程内存空间，从而获取 root 权限。该漏洞影响 Digital UNIX 4.0、AIX 4.3.2、CDE 2.1、IRIX 6.5.14、Solaris 7.0 及 SunOS 4.1.4 等多个 Unix 系统，CVSS 评分 7.2，危害等级高。攻击者需具有本地账号方可利用，无需用户交互。"
published = "2000-03-02T05:00:00.000"
remediation = "建议安装各厂商当年发布的安全补丁：Sun Solaris 用户安装 Sun Security Bulletin #192 对应补丁(如 107256-xx)；IBM AIX 4.3.2 用户安装 APAR IY07617；HP-UX 用户应用 HPSBUX9909-103 补丁；SGI IRIX 6.5.14 用户安装 SGI 安全补丁；Compaq DIGITAL UNIX 4.0 用户安装对应安全修补包。如无法立即打补丁，可将 ToolTalk 相关二进制文件移除 setuid 权限作为临时缓解措施，或禁用 CDE 环境中的 ToolTalk 服务。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "多厂商 CDE ToolTalk 共享库 TT_SESSION 环境变量缓冲区溢出本地权限提升漏洞"
updated = "2026-06-16T21:48:51.690"

