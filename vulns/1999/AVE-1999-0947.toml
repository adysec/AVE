[basic]
description = "Windows 95 在启用 NetWare 网络的远程管理和文件共享功能时，当管理员远程登录系统会自动创建隐藏共享 C$，远程攻击者可通过映射网络驱动器的方式绕过身份验证，实现对目标系统任意文件的读取。该漏洞影响 Windows 95 操作系统，CVSS 评分 5.0，危害等级中等。由于该共享为系统自动创建且默认未设置访问控制，攻击者只需知道目标 IP 地址即可利用。"
published = "1999-12-31T05:00:00.000"
remediation = "禁用 NetWare 网络的远程管理和文件共享功能，或卸载相关组件。由于 Windows 95 已停止支持，建议升级至 Windows 10/11 等受支持的操作系统版本，并安装所有安全更新。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Microsoft Windows 95 远程管理共享任意文件读取漏洞"
updated = "2026-06-16T21:49:43.947"

