[basic]
description = "libjpeg-turbo 的 jdmrgext.c 文件中 h2v2_merged_upsample_internal() 函数存在基于堆的缓冲区溢出漏洞。该漏洞仅在 12 位数据精度下可被利用，此时样本数据类型范围超出有效样本范围。攻击者可通过构造包含越界 12 位样本的无损 JPEG 图像，诱使目标应用使用合并上采样方式解压该图像，触发段错误或缓冲区溢出，导致应用崩溃。影响所有使用受影响版本 libjpeg-turbo 的系统和应用。"
published = "2023-05-25T22:15:09.443"
remediation = "该漏洞仅影响 libjpeg-turbo 2.1.90（3.0 beta1），已在其 2.1.91（3.0 beta2）版本中修复。立即升级到 libjpeg-turbo 3.0.0 或更高版本。对于无法立即升级的环境，在调用 djpeg 解压 12 位无损 JPEG 图像时添加 `-nosmooth` 参数可禁用 merged upsampling 作为临时缓解措施。应用程序开发者也应在代码层面避免对 12 位精度图像使用 merged upsampling 处理路径。"
score = 6.5
severity = "MEDIUM"
sources = ["msrc"]
title = "libjpeg-turbo 堆缓冲区溢出漏洞"
updated = "2026-06-17T05:53:28.837"

