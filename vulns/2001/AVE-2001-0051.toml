[basic]
description = "eXtropia bbs_forum.cgi 1.0 存在目录遍历漏洞，远程攻击者可通过向 file 参数提交包含 `..`（点点）序列的特制请求，绕过路径限制读取目标服务器上的任意文件。该漏洞源于程序未对用户输入的文件路径进行充分过滤和校验，攻击者无需身份认证即可利用，可能导致敏感信息泄露。"
published = "2001-03-12T05:00:00.000"
remediation = "立即升级 eXtropia bbs_forum.cgi 至 1.0 以上已修复版本，或迁移至仍受支持的论坛系统（如 phpBB、Discourse）。如无法升级，在 Web 服务器层（Apache/Nginx）限制对 bbs_forum.cgi 的访问权限，仅允许可信 IP 调用，并启用 mod_security 规则拦截 `..` 目录遍历特征及 shell 命令注入载荷。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "eXtropia bbs_forum.cgi 目录遍历漏洞"
updated = "2026-06-16T21:53:41.967"

