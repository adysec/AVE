[basic]
description = "Microsoft IIS 及 Site Server 中的 codebrws.asp 示例文件存在安全漏洞，该文件原本用于展示代码浏览功能，但由于缺乏适当的访问控制和路径过滤，远程攻击者可通过构造恶意请求利用该文件读取服务器上的任意文件，包括系统敏感配置文件、用户凭据等。攻击者无需任何身份认证即可发起攻击，只需知道或猜测目标文件路径即可获取服务器上的敏感数据。该漏洞影响早期版本的 IIS 和 Site Server，建议删除或限制访问该示例文件，并及时升级到安全版本。"
published = "1999-05-07T04:00:00.000"
remediation = "立即删除或禁用 IIS/Site Server 中的 codebrws.asp 示例文件，安装微软安全公告 MS99-013 提供的补丁程序。由于 IIS 4.0 和 Site Server 3.0 已停止支持，强烈建议升级至现代版本 IIS 10（Windows Server 2016/2019/2022）。临时缓解措施：通过 IIS 管理器移除所有示例应用程序目录，配置 NTFS 权限限制 web 目录的匿名访问，并使用 Web 服务器防火墙规则阻止对 /codebrws.asp 路径的访问。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Microsoft Internet Information Server codebrws.asp 示例文件任意文件读取漏洞"
updated = "2026-06-16T21:48:57.393"

