[basic]
description = "Autonomy (原 Verity) Ultraseek 搜索引擎的 cs.html 页面存在开放重定向漏洞。远程攻击者可通过向 url 参数传入恶意构造的外部链接，诱使用户访问该参数的 URL，从而将用户重定向至任意第三方网站，配合钓鱼攻击窃取敏感信息。该漏洞影响 Autonomy Ultraseek 相关版本，CVSS 评分 5.8，危害等级中危。攻击可在未认证条件下远程发起，利用复杂度较低。"
published = "2009-01-29T19:30:00.377"
remediation = "联系 Autonomy 官方技术支持获取修复了 cs.html 开放重定向漏洞的 Ultraseek 更新版本；如无法及时升级，可在反向代理或 WAF 层面拦截包含 /cs.html?url= 路径的 HTTP 请求作为临时缓解措施，同时应对 url 参数传入的目标域名进行白名单校验。"
score = 5.8
severity = "MEDIUM"
sources = ["nuclei"]
title = "Autonomy Ultraseek cs.html 开放重定向漏洞"
updated = "2026-06-16T23:04:49.807"

