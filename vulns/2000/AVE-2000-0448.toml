[basic]
description = "Microsoft Outlook Express 4.x 在处理邮件或新闻组消息中的 JPG/BMP 图片附件时存在缓冲区溢出漏洞。当附件文件名过长时，Outlook Express 未能正确验证文件名长度，导致缓冲区溢出，造成程序崩溃。远程攻击者可通过向目标用户发送包含特制长文件名图片附件的邮件来触发此漏洞，导致拒绝服务。该漏洞影响 Outlook Express 4.x 版本，无需用户交互即可触发，危害等级中危。"
published = "2000-05-12T04:00:00.000"
remediation = "Outlook Express 4.x 已停止支持且不再有安全更新，建议立即升级到受支持的 Microsoft Outlook 版本（如 Outlook 2016/2019/2021 或 Microsoft 365 桌面版），或改用 Windows 10/11 内置的邮件应用。临时缓解措施：在邮件客户端中禁用 HTML 渲染，不预览/打开来自不可信发件人的邮件附件，并在邮件服务器层面过滤带有超长文件名的 .jpg/.bmp 附件。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Microsoft Outlook Express 缓冲区溢出拒绝服务漏洞"
updated = "2026-06-16T21:51:40.063"

