[info]
author = "ave"
description = "AVE-2011-0024 verification"
id = "POC-AVE-2011-0024"
name = "PoC for AVE-2011-0024"
severity = "medium"
tags = ["ave-2011-0024"]
vuln_id = ["AVE-2011-0024"]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/services/nonexistent"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "Notice:",
    "Warning:",
    "Undefined",
    "sites/all/modules",
]
