[info]
author = "AVE"
description = "检测Microsoft Internet Explorer 6至11中CDisplayPointer释放后使用漏洞。通过构造特制HTML页面触发onpropertychange事件处理程序中的UAF条件，验证目标是否存在该漏洞。"
id = "POC-AVE-2013-0400"
name = "CVE-2013-3897 PoC"
severity = "high"
tags = [
    "cve-2013-3897",
    "use-after-free",
    "ms13-080",
]
vuln_id = [
    "CVE-2013-3897",
    "AVE-2013-0400",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "header"
type = "word"
words = [
    "MSIE 8.0",
    "MSIE 9.0",
    "MSIE 7.0",
    "MSIE 6.0",
]
