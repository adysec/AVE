[basic]
description = "Apple OS X Admin Framework 的 XPC 实现存在权限提升漏洞（称为 Rootpipe），本地低权限攻击者可通过未指定的 XPC 向量绕过身份验证，直接获取管理员/Root 权限。该漏洞影响 OS X 10.10.3 之前的版本（含 10.7.5、10.8.2、10.9.5、10.10.2），CVSS 3.1 评分 7.8（HIGH），攻击向量为本地、低复杂度、低权限、无需用户交互。攻击者仅需本地普通用户权限，即可利用 XPC 机制绕过认证实现提权。Apple 已在 OS X 10.10.3 中修复，该漏洞已被列入 CISA 已知被利用漏洞目录。"
published = "2015-04-10T14:59:43.073"
remediation = "建议立即升级到 Apple OS X 10.10.3 或更高版本以获取完整修复。如无法立即更新，可临时禁用 Admin Framework 服务并限制本地用户权限。"
score = 7.8
severity = "HIGH"
sources = ["kev"]
title = "Apple OS X 权限提升漏洞"
updated = "2026-06-17T00:21:50.007"

