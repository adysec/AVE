[basic]
description = "Novell NetWare 4.11 及更早版本的事务跟踪系统（TTS）存在拒绝服务漏洞，远程攻击者可通过发送大量请求耗尽系统资源，导致服务不可用。该漏洞影响 NetWare 4.11 及更早版本，攻击者无需身份认证即可远程利用，通过持续发送大量事务请求使 TTS 服务过载崩溃，造成系统拒绝服务。CVSS 评分 5.0，属中危级别。"
published = "2001-03-12T05:00:00.000"
remediation = "建议立即升级至 Novell Open Enterprise Server (OES) 2015 SP1 或更高版本（基于 SUSE Linux Enterprise Server），或迁移至现代 Linux/Windows 平台。若必须继续使用 NetWare 4.11，请在防火墙层面封锁 TTS 服务端口（默认 524/TCP、4000-4095/TCP），并禁用 TTS 事务跟踪服务以彻底消除攻击面。Novell 已于 2010 年停止 NetWare 4.x 支持，无官方补丁可用，强烈建议尽快完成迁移。若必须维持旧系统运行，请部署网络层速率限制（如 iptables limit 模块限制单 IP 每秒连接数）缓解 DoS 攻击。建议制定 6 个月内完成迁移计划，期间部署网络层 DDoS 防护设备作为临时缓解。建议联系 Micro Focus（现归属 OpenText）确认是否有延长支持方案。由于 NetWare 4.11 早已停止安全更新，建议优先制定迁移计划而非依赖临时缓解。如无法立即迁移，请在网络边界部署 DDoS 缓解设备并限制 TTS 服务仅允许受信 IP 访问。由于漏洞 CVSS 5.0 属中等严重度，建议在 30 天内完成缓解措施部署，6 个月内完成平台迁移。请参考 Micro Focus 官方迁移指南《NetWare to OES Migration Guide》制定详细迁移计划。如需临时缓解，可在 NetWare 服务器控制台执行 `UNLOAD TTS` 卸载 TTS 模块，但会导致事务跟踪功能失效，需评估业务影响后实施。建议联系 Micro Focus 支持确认是否有针对 NetWare 4.11 的延长支持补丁包（Extended Support Patch）。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Novell NetWare Transaction Tracking System 拒绝服务漏洞"
updated = "2026-06-16T21:49:05.650"

