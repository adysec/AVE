[basic]
description = "Redis 内存数据库在处理格式错误的 ACL 选择器时存在输入验证不当漏洞（CWE-20）。具有足够权限的认证用户可构造特制的 ACL 选择器，当该选择器被访问时触发服务器 panic 导致拒绝服务。该漏洞影响 Redis 7.2.7 之前版本及 7.4.2 之前版本，攻击者需具备本地访问权限和高权限认证，CVSS 评分 4.4。Redis 官方已在 7.2.7 和 7.4.2 版本中修复此问题。"
published = "2025-01-06T22:15:09.827"
remediation = "立即将 Redis 升级至 7.2.7 或 7.4.2 及以上版本，这两个版本已修复因畸形 ACL 选择器触发服务器 panic 导致拒绝服务的问题。如无法立即升级，可限制具有 ACL 管理权限的用户范围，仅允许受信任的管理员执行 ACL 操作，降低被利用风险。"
score = 4.4
severity = "MEDIUM"
sources = ["msrc"]
title = "Redis ACL 选择器格式错误拒绝服务漏洞"
updated = "2026-06-17T08:06:13.863"

