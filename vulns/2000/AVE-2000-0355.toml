[basic]
description = 'MetaProducts Offline Explorer 1.2及更早版本存在目录遍历漏洞。远程攻击者可通过向目标系统发送包含".."（点点）序列的特制URL请求，利用该软件对文件路径过滤不严的缺陷，突破目录限制访问服务器上的任意文件。攻击者无需身份认证即可利用此漏洞读取敏感信息，如配置文件、系统文件等。该漏洞影响MetaProducts Offline Explorer 1.2及之前所有版本。'
published = "2000-05-19T04:00:00.000"
remediation = "建议立即升级 Offline Explorer 至 8.x 或更高版本（当前最新为 8.8），该漏洞已在后续版本中修复。如无法立即升级，可在防火墙层面限制对端口 800 的访问，仅允许受信任 IP 连接，作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "MetaProducts Offline Explorer 目录遍历漏洞"
updated = "2026-06-16T21:51:43.747"

