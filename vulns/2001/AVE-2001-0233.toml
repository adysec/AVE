[basic]
description = "APC Web/SNMP Management Card（型号 AP9606）固件 3.0 及更早版本的 Telnet 管理服务存在拒绝服务漏洞。该卡仅支持单个 Telnet 连接，远程攻击者无需认证即可通过反复发送失败的登录尝试，导致 Telnet 服务临时锁定，从而阻止合法管理员进行远程管理。该漏洞影响固件版本低于 310 的 APC AP9606 设备，CVSS 评分 5.0，危害等级中危。"
published = "2001-08-22T04:00:00.000"
remediation = "将 APC Web/SNMP Management Card 固件升级到 310 或更高版本（下载地址：ftp://ftp.apcftp.com/hardware/webcard/firmware/sy/v310/install.txt）。如无法立即升级，可在网络边界防火墙限制对设备 23 端口的访问，仅允许受信任管理 IP 连接，并配置较短的锁定超时时间以减少 DoS 影响窗口。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "APC Web/SNMP Management Card Telnet 管理拒绝服务漏洞"
updated = "2026-06-16T21:54:32.607"

