[basic]
description = "Macromedia Dreamweaver 使用弱加密算法存储 FTP 密码，本地攻击者可通过分析加密机制轻易解密其他用户的 FTP 凭据。该漏洞影响多个 Dreamweaver 版本，攻击者需具有本地系统访问权限，利用难度低。由于加密强度不足，存储的密码可被直接逆向还原，导致敏感凭据泄露。建议升级至修复版本或使用更安全的凭据存储方式。"
published = "1998-06-11T04:00:00.000"
remediation = "升级至 Macromedia Dreamweaver MX（6.0）及以上版本，这些版本已改用强加密算法保护 FTP 密码存储。如无法升级，建议不在 Dreamweaver 中保存 FTP 密码，每次手动输入；或改用 FileZilla、WinSCP 等支持加密存储密码的专业 FTP 客户端替代。"
score = 2.1
severity = "LOW"
sources = ["avd"]
title = "Macromedia Dreamweaver FTP密码弱加密信息泄露漏洞"
updated = "2026-06-16T21:50:04.950"

