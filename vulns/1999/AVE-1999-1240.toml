[basic]
description = "MajorCool mj_key_cache 程序存在本地符号链接攻击漏洞，本地攻击者可通过创建恶意符号链接诱导程序修改任意文件，导致权限提升或数据破坏。该漏洞要求攻击者具备本地系统访问权限，利用 mj_key_cache 处理缓存文件时未正确验证符号链接的缺陷，将目标文件重定向至敏感位置。CVSS 评分 2.1，属低危本地漏洞，影响 MajorCool 相关版本。"
published = "1997-06-18T04:00:00.000"
remediation = "立即停止使用 MajorCool 软件，因其已长期无人维护且无安全补丁。建议迁移至现代工单系统（如 osTicket、Zammad 或 RT）。如无法立即替换，可采取临时缓解措施：确保 mj_key_cache 程序不以 root 或高权限用户运行；将临时文件目录设置为仅程序自身可写的专用目录（如 /var/cache/majorcool），避免使用 /tmp 共享临时目录；启用文件系统防篡改机制（如 Linux 的 fs.protected_symlinks=1 内核参数）。"
score = 2.1
severity = "LOW"
