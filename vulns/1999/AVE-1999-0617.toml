[basic]
description = "Linux syslogd 在处理大量并发连接请求时存在拒绝服务漏洞。远程攻击者可通过向目标系统发送大量连接请求，耗尽 syslogd 的处理资源，导致系统日志服务崩溃或无法正常记录日志。该漏洞影响 Linux 内核早期版本，攻击者无需身份认证即可远程触发，利用难度较低。受影响的系统管理员应限制 syslogd 的连接数或升级至修复版本。"
published = "1999-11-19T05:00:00.000"
remediation = "升级 sysklogd 至 1.3.3 或更高版本以修复连接数限制问题；若使用遗留系统，在 iptables 中限制 syslog 端口（514/UDP）的传入连接速率，如 `iptables -A INPUT -p udp --dport 514 -m limit --limit 10/s -j ACCEPT`。长期方案建议迁移至 rsyslog 或 syslog-ng 等现代日志系统，或使用 systemd-journald 替代传统 syslogd。"
score = 5
severity = "MEDIUM"
sources = ["redhat"]
title = "Linux syslogd 拒绝服务漏洞"
updated = "2026-06-16T21:49:08.923"

