[basic]
description = "Microsoft Windows 95/98/NT 4.0 等系统自带的 Riched 组件在处理 RTF 格式文档时存在缓冲区溢出漏洞，攻击者可通过向用户发送包含特制控制字的恶意 .rtf 文件，诱使用户使用受影响系统打开后触发缓冲区溢出，导致系统服务崩溃或拒绝服务。该漏洞影响 Windows 95/98、Windows NT 4.0 及 Windows Terminal Server 4.0 等多个版本，用户需安装安全更新或避免打开来源不明的 RTF 文件。"
published = "1999-11-17T05:00:00.000"
remediation = "受影响系统均已终止支持且无官方补丁。建议升级到 Windows 10/11 或 Windows Server 2019/2022 等受支持版本；若无法升级，应在邮件客户端和应用中禁用 RTF 格式渲染，改用纯文本模式处理富文本内容，并限制用户打开来源不明的 .rtf 文件（如通过组策略启用附件管理器阻止 rtf 扩展名）。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Microsoft Windows RTF 解析器缓冲区溢出漏洞"
updated = "2026-06-16T21:50:56.680"

