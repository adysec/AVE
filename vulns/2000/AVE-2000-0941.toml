[basic]
description = "WatchGuard Firebox II 认证服务存在拒绝服务漏洞，远程攻击者无需身份认证即可向目标设备的 4100 端口发送特制的畸形 URL，触发认证服务处理异常，导致服务崩溃或无法响应正常请求。该漏洞影响 WatchGuard Firebox II 系列防火墙设备，攻击复杂度低，无需用户交互，可被用于中断企业网络安全防护服务。厂商已发布安全更新修复此漏洞。"
published = "2000-10-20T04:00:00.000"
remediation = "建议立即升级 WatchGuard Firebox II 固件至最新版本（厂商已针对此漏洞发布补丁）。如无法升级，可在防火墙上配置访问控制规则，限制仅允许可信 IP 地址访问 TCP 端口 4100（认证服务），或直接在内网边界阻断对该端口的非授权外部访问，以缓解远程拒绝服务攻击风险。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "WatchGuard Firebox II 认证服务拒绝服务漏洞"
updated = "2026-06-16T21:52:28.320"

