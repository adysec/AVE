[basic]
description = "SSH-1（SSHD-1）守护进程 1.2.30 及更早版本存在日志记录缺失漏洞。该守护程序未能记录重复的登录尝试行为，导致远程攻击者可通过暴力破解方式对 SSH 服务进行密码猜测攻击而不会被系统日志检测到。攻击者无需身份认证即可利用此漏洞，成功后可获取目标系统的未授权访问权限，进而完全控制受影响主机。该漏洞影响所有运行 SSH-1 1.2.30 及更早版本的系统，攻击条件低，仅需网络可达即可发起攻击。"
published = "2001-06-27T04:00:00.000"
remediation = "升级 SSH 服务端至 1.2.31 或更高版本，该版本已修复登录失败日志记录缺失问题。强烈建议弃用已过时的 SSH-1 协议，迁移至 OpenSSH 并仅启用 SSH-2 协议（在 sshd_config 中设置 Protocol 2），同时配置 fail2ban 等工具对多次认证失败来源 IP 进行自动封禁，以增强暴力破解攻击的检测与防御能力。"
score = 7.5
severity = "HIGH"
sources = ["exploitdb"]
title = "SSH 守护程序登录失败未记录日志漏洞"
updated = "2026-06-16T21:54:22.167"

