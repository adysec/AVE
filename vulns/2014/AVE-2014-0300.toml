[basic]
description = "Microsoft 日文输入法编辑器（IME）组件 IMJPDCT.EXE 存在沙箱绕过漏洞。攻击者可通过构造特制的 PDF 文档并诱导用户打开，利用该文档绕过系统的沙箱保护机制，从而在目标系统上以当前用户权限执行任意代码。该漏洞影响 Windows Server 2003 SP2、Windows Vista SP2、Windows Server 2008 SP2/R2 SP1、Windows 7 SP1 及 Office 2007 SP3 等版本，CVSS 评分 7.8，危害等级高。该漏洞已在 2014 年被野外利用，Microsoft 已发布安全更新修复。"
published = "2014-11-11T22:55:04.637"
remediation = "立即安装 Microsoft 安全公告 MS14-078 提供的更新：Windows 系统安装 KB2991963（通过 Windows Update 或 Microsoft 下载中心获取），Office 2007 日文 IME 用户安装 KB2889913。如无法立即打补丁，可安装 EMET 5.0 及以上版本，在 EMET GUI 中添加 IMJPDCT.EXE 进程并启用 ASR（攻击面减少）缓解机制，阻止加载 IMJP*.DIC 字典文件。"
score = 7.8
severity = "HIGH"
sources = ["kev"]
title = "Microsoft 日文输入法编辑器(IME) 权限提升漏洞"
updated = "2026-06-17T00:09:23.740"

