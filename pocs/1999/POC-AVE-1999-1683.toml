[info]
author = "AVE"
description = "检测 Microsoft MDAC RDS DataFactory 远程代码执行漏洞（CVE-1999-1011），通过 HTTP GET 请求 /msadc/msadcs.dll 端点，若响应 Content-Type 为 application/x-varg 则确认 RDS 组件存在且可被远程访问"
id = "POC-AVE-1999-1683"
name = "CVE-1999-1011 PoC"
severity = "critical"
tags = ["cve-1999-1011"]
vuln_id = [
    "CVE-1999-1011",
    "AVE-1999-1683",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/msadc/msadcs.dll"
protocol = "http"

[poc.requests.headers]
User-Agent = "AVE/1.0"

[[poc.requests.matchers]]
expect = true
part = "header"
type = "word"
words = ["application/x-varg"]
