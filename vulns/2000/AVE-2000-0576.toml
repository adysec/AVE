[basic]
description = "mopd（Maintenance Operations Protocol loader daemon，维护操作协议加载守护进程）存在格式化字符串漏洞，由于未正确过滤用户输入的格式化字符串，远程攻击者无需认证即可通过网络向目标系统发送特制的格式化字符串载荷，触发该漏洞后可在受影响系统上执行任意命令。该漏洞影响运行 mopd 服务的各类 Unix 系统，CVSS 评分 7.5，危害等级高，攻击复杂度低，且无需用户交互。"
published = "2000-10-20T04:00:00.000"
remediation = "建议立即升级 mopd 至已修复版本：OpenBSD 用户应用 errata 补丁（参考 www.openbsd.org/errata.html#mopd），NetBSD 用户更新 process.c 至 r1.8 版本，FreeBSD 用户安装 2000 年 8 月安全补丁，Red Hat Linux 用户安装 RHSA-2000-050 更新。如无法立即升级，可在 inetd 配置中注释 mopd 服务行并重启 inetd，或通过防火墙封禁 mopd 端口（默认 UDP 端口 350）作为临时缓解措施。"
score = 7.5
severity = "HIGH"
sources = ["redhat"]
title = "HP-UX mopd 格式化字符串远程代码执行漏洞"
updated = "2026-06-16T21:52:24.320"

