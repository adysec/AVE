[basic]
description = "Exim 3.22 及更早版本在特定配置下存在命令注入漏洞。当邮件系统配置将邮件地址重定向到管道处理时，Exim 未能正确验证邮件地址的本地部分，导致远程攻击者可通过构造包含 Shell 元字符（如反引号、分号、管道符等）的恶意邮件地址，实现任意命令执行。该漏洞影响 Exim 3.22 及更早版本，攻击者无需认证即可远程利用，CVSS 评分 7.5（高危），攻击向量为网络，攻击复杂度低，无需认证，可导致机密性、完整性、可用性部分受损。攻击者可通过发送特制邮件触发漏洞，在服务器上下文执行任意 Shell 命令，进而完全控制邮件服务器。建议升级至 Exim 3.23 或更高版本，或禁用管道重定向功能。"
published = "2001-12-19T05:00:00.000"
remediation = "建议立即升级 Exim 至 3.23 或更高版本（如 4.x 稳定版），该版本修复了管道地址本地部分验证缺陷。若暂时无法升级，请在 Exim 配置文件中禁用 pipe 传输（注释或删除 transport/pipe 配置段），或在路由器配置中禁止 address_pipe 选项，防止远程攻击者通过 shell 元字符注入任意命令。同时建议在邮件网关层面部署邮件内容过滤规则，拦截包含管道字符（|）的异常地址作为临时缓解措施。"
score = 7.5
severity = "HIGH"
sources = ["redhat"]
title = "Exim 邮件服务器 代码执行漏洞"
updated = "2026-06-16T21:55:09.967"

