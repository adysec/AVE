[basic]
description = "Apple QuickTime 7.4.5 之前版本存在栈缓冲区溢出漏洞，攻击者可通过诱导用户打开包含零大小 obji 原子的特制 VR 影片文件触发栈溢出，导致远程任意代码执行。该漏洞影响 QuickTime 7.4.5 之前所有版本，CVSS 评分 6.8（中等），攻击向量为网络，需用户交互打开恶意文件。攻击者构造畸形 VR 电影文件，利用 obji 原子大小为零触发栈缓冲区溢出，实现任意代码执行。Apple 已在 QuickTime 7.4.5 中修复此漏洞，用户应升级至 7.4.5 或更高版本。"
published = "2008-04-04T17:44:00.000"
remediation = "建议立即升级 Apple QuickTime 至 7.4.5 或更高版本（官方下载：https://support.apple.com/kb/DL837），或通过 Windows“程序和功能”彻底卸载 QuickTime for Windows（Apple 已停止对 Windows 版的安全更新，卸载为最彻底的缓解措施）。"
score = 6.8
severity = "MEDIUM"
sources = ["tenable"]
title = "Apple QuickTime 缓冲区溢出代码执行漏洞"
updated = "2026-06-16T22:50:49.547"

