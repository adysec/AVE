[basic]
description = "simplestmail.cgi 1.0 存在远程命令执行漏洞，由于程序未对用户提交的输入进行充分过滤和验证，远程攻击者可通过向 CGI 脚本发送特制请求参数触发漏洞，在目标服务器上以 Web 服务器权限执行任意系统命令。该漏洞影响 Leif M. Wright 开发的 simplestmail.cgi 1.0 版本，攻击者无需身份认证即可利用，可能导致服务器被完全控制或敏感信息泄露。"
published = "2001-02-12"
remediation = "立即删除或禁用 simplestmail.cgi 脚本，该脚本已停止维护且无安全更新。替代方案：使用主流邮件表单处理脚本（如 PHP mail 函数封装）替代，并在 Web 服务器层面对上传目录禁用执行权限，对用户输入做严格的参数过滤。可在 Apache 中通过 ModSecurity 规则阻止 cmd 等危险参数传递。如必须继续使用，在脚本入口处添加输入验证逻辑，过滤 shell 元字符（;、|、`、$ 等）。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Leif M. Wright simplestmail.cgi 1.0 远程命令执行漏洞"
updated = "2001-02-12"

