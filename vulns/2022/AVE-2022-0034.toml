[basic]
description = "Linux 内核的 F2FS（Flash-Friendly File System）文件系统在刷新节点页时存在无限循环漏洞。当底层存储设备持续返回 I/O 错误（EIO）时，f2fs_flush_node_pages 函数无法正确退出循环，导致内核陷入死循环，系统资源被耗尽，最终引发拒绝服务。本地攻击者可通过触发特定文件系统操作（如 xfstests generic/475 测试用例）利用此漏洞，造成系统无响应。该漏洞影响 Linux 内核使用 F2FS 文件系统的版本，CVSS 评分 5.5，危害等级中等。"
published = "2025-02-26T07:01:08.567"
remediation = "立即将 Linux 内核升级至 5.18.4 或更高版本（例如 5.19+），其中已合入修复 f2fs 节点页刷写无限循环的补丁（commit bd47ea5d776d）。如无法立即升级内核，可通过避免在不可靠存储设备（如频繁出现 EIO 错误的磁盘）上使用 f2fs 文件系统来降低触发风险，或在生产环境中禁用 f2fs 文件系统支持（从内核模块 blacklist 中移除 f2fs）作为临时缓解措施。"
score = 5.5
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux 内核 f2fs 节点页刷新无限循环拒绝服务漏洞"
updated = "2026-06-17T05:17:41.887"

