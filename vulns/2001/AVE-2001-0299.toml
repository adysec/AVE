[basic]
description = 'NetWin SurgeFTP 1.0b 至 1.1h 之间存在拒绝服务漏洞，远程攻击者无需身份认证即可通过发送特制的 "ls .." 命令触发目标 FTP 服务崩溃。该漏洞影响 SurgeFTP 1.0b、1.0c、1.0d、1.0e、1.0f、1.0g、1.0h 及 1.1g 等版本，攻击者只需建立 FTP 连接并发送目录列表命令即可导致服务器异常终止，造成服务中断。由于攻击通过网络发起且无需任何用户交互，任何可访问 SurgeFTP 服务的远程用户均可利用此漏洞实施拒绝服务攻击。攻击成功后将导致 FTP 进程崩溃或重启，影响正常文件传输业务。建议升级到 SurgeFTP 1.1h 或更高版本以修复此漏洞。'
published = "2001-09-20T04:00:00.000"
remediation = "标签中。<value>立即将 NetWin SurgeFTP 升级至 1.1h 或更高版本，此版本已修复通过 'ls ..' 命令引发崩溃的漏洞。如无法立即升级，建议通过防火墙或访问控制列表限制外部对 FTP 端口的访问，或在服务器端临时屏蔽 LIST 命令对父目录的请求作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Netwin SurgeFTP 拒绝服务漏洞"
updated = "2026-06-16T21:54:47.403"

