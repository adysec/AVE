[basic]
description = "tags.<value>BeOS 4.5 和 5.0 版本存在拒绝服务漏洞，本地用户可通过发送畸形的直接系统调用（利用中断 37）触发该漏洞，导致系统拒绝服务。该漏洞影响 BeOS 4.5 和 5.0 版本，攻击者需具备本地用户权限，通过发送畸形系统调用触发中断 37 导致系统拒绝服务。CVSS 评分 2.1，危害等级较低。"
published = "2000-04-10T04:00:00.000"
remediation = "建议升级至 BeOS 5.0.3 或迁移至 Haiku OS（BeOS 开源重写版）等现代操作系统。作为临时缓解，可限制本地用户权限，禁止非特权用户直接调用中断 37，或通过内核补丁禁用中断 37 处理程序。BeOS 官方已于 2001 年停止维护，建议迁移至受支持的现代操作系统。"
score = 2.1
severity = "LOW"
sources = ["exploitdb"]
title = "Be BeOS 4.5/5.0 无效系统调用拒绝服务漏洞"
updated = "2026-06-16T21:51:22.743"

