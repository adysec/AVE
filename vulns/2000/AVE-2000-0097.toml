[basic]
description = "SyGate 远程管理程序对其管理服务的访问权限控制存在缺陷，未能正确限制未授权访问。远程攻击者在无需身份认证的情况下，可向目标系统发送特制请求连接该管理服务，从而触发拒绝服务（DoS）导致服务不可用，或非法获取网络流量统计数据等敏感信息。该漏洞影响运行 SyGate 远程管理服务的系统，攻击条件为攻击者能够与目标的管理服务端口建立网络连接。利用方式是通过网络发送恶意请求，造成服务瘫痪或信息泄露。"
published = "2000-01-27T05:00:00.000"
remediation = "升级 SyGate 至官方发布的最新修复版本（4.0 及以上），并在 SyGate 远程管理服务中启用访问控制与强口令认证，仅允许受信任的管理 IP 访问管理端口（默认 TCP 1694）。如暂无法升级，可在边界防火墙或路由器上屏蔽该管理端口的外部连接，作为临时缓解措施。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "SyGate 远程管理服务 访问控制缺陷导致拒绝服务与信息泄露漏洞"
updated = "2026-06-16T21:51:01.660"

