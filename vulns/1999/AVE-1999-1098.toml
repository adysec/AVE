[basic]
description = 'The Economist 1999 屏幕保护程序在启用"密码保护"选项后存在安全绕过漏洞。具有物理访问权限的攻击者可在屏幕锁定状态下通过运行 Internet Explorer 绕过屏保密码保护，从而读取受保护的文件。该漏洞影响 The Economist 1999 屏幕保护程序版本，攻击者需具备本地物理访问条件，CVSS 评分 2.1，危害等级低。'
published = "1999-06-03T04:00:00.000"
remediation = "该屏幕保护程序已停止维护，建议立即卸载 The Economist 1999 Screen Saver，改用操作系统自带的屏幕锁定功能（Windows 按 Win+L 锁定）。如必须使用，可在组策略中禁用 Internet Explorer 在锁屏状态下的运行权限作为临时缓解措施。"
score = 2.1
severity = "LOW"
sources = ["cve"]
title = "经济学人 1999 屏幕保护程序 安全绕过漏洞"
updated = "2026-06-16T21:50:21.577"

