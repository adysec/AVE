[basic]
description = "db 库（Berkeley DB）1.85.4 版本中的 snprintf 函数存在缓冲区溢出漏洞，该函数未正确使用 size 参数限制输出长度，导致向固定缓冲区写入数据时可能发生溢出。本地攻击者可利用此漏洞提升权限或造成拒绝服务，影响系统的机密性、完整性和可用性。该漏洞影响使用该版本 db 库的 Linux 发行版，CVSS v2 评分 4.6，危害等级中危。"
published = "1999-12-31T05:00:00.000"
remediation = "升级 db library 至 2.0 及以上版本，该版本已修复 snprintf 忽略 size 参数导致的缓冲区溢出问题。如无法升级，在调用 snprintf 前手动检查缓冲区长度，确保目标缓冲区大小与传入的参数一致。限制使用 snprintf 处理不可信输入，避免传入过大或负值作为 size 参数。"
score = 4.6
severity = "MEDIUM"
sources = ["avd"]
title = "Berkeley DB snprintf 缓冲区溢出漏洞"
updated = "2026-06-16T21:50:12.600"

