aliases = ["CVE-1999-0898"]
[basic]
title = "Microsoft Windows NT 4.0 打印后台处理程序缓冲区溢出漏洞"
description = "Windows NT 4.0 打印后台处理程序（print spooler）存在缓冲区溢出漏洞，远程攻击者可通过向目标系统发送特制的后台打印请求触发缓冲区溢出，导致系统崩溃（拒绝服务）或获取系统级权限。该漏洞源于打印后台处理服务对用户提交的打印请求数据缺乏正确的边界检查，攻击者无需身份验证即可利用。"
severity = "HIGH"
score = 7.2
sources = ["cve"]
published = "1999-11-04"
updated = "2026-06-16"
remediation = "安装 Microsoft 安全公告 MS99-047 提供的补丁程序，禁用不必要的打印共享服务，限制对打印后台处理程序的网络访问权限。"
[references]
urls = ["https://docs.microsoft.com/en-us/security-updates/securitybulletins/1999/ms99-047", "http://support.microsoft.com/default.aspx?scid=kb%3B%5BLN%5D%3BQ243649", "http://www.securityfocus.com/bid/768"]
