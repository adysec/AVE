[basic]
description = "泛微 OA 集成中心 datasource 更新接口存在 JDBC 远程代码执行漏洞。攻击者通过向 `/api/integration/datasource/update/` 端点发送特制的 POST 请求，利用 JDBC 连接参数注入恶意类加载，可实现在目标服务器上执行任意代码。该漏洞无需认证即可利用，影响范围广，攻击者可直接获取服务器控制权限，危害严重。"
published = "0707"
remediation = "升级泛微 e-cology 至最新安全版本（V10.0 及以上），或安装官方发布的对应版本安全补丁包；在 nginx 或 WAF 层面配置访问策略，限制 `/api/integration/datasource/` 路径仅允许可信管理 IP 访问，并对 JDBC URL 参数进行严格校验防止恶意构造。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "泛微 数据源更新接口 JDBC 远程代码执行漏洞"
updated = "0707"

