[basic]
description = "Microsoft Windows 95/98/Me 的文件与打印共享服务存在密码验证绕过漏洞。该漏洞源于系统在验证共享级密码时仅比对密码的第一个字符，远程攻击者无需完整密码即可向目标共享资源发送单个字符的密码数据包绕过访问控制。攻击者可利用此漏洞非法访问目标系统上的共享文件与打印机资源。该漏洞影响 Windows 9x 系列操作系统，CVSS 评分 6.4，危害等级中等。"
published = "2000-12-19T05:00:00.000"
remediation = "Windows 9x/Me 已停止支持且无官方补丁，建议立即升级到 Windows 10/11 等受支持版本。无法升级的系统可在网络边界防火墙禁用 SMB 协议 (TCP 139/445) 并设置文件共享强密码（≥8 位混合字符）以降低风险。"
score = 6.4
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Microsoft Windows 95/98/Me 文件共享密码绕过漏洞"
updated = "2026-06-16T21:52:54.040"

