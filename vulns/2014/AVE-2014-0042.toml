[basic]
description = "Digital Zoom Studio (DZS) Video Gallery WordPress 插件中的 `deploy/designer/preview.php` 文件存在跨站脚本（XSS）漏洞。远程攻击者可通过向 `swfloc` 或 `designrand` 参数注入恶意 Web 脚本或 HTML 代码，当管理员访问特制链接时脚本将在浏览器中执行，可能导致敏感信息泄露或会话劫持。攻击无需身份认证但需诱导用户交互，CVSS 4.3 中危。该漏洞影响 DZS Video Gallery 插件所有版本，建议升级或禁用该插件。"
published = "2014-11-26T15:59:10.277"
remediation = "立即停用并删除 Digital Zoom Studio (DZS) Video Gallery WordPress 插件，该插件已长期未维护。如仍需使用，编辑 deploy/designer/preview.php 文件，对 swfloc 和 designrand 参数使用 esc_attr() 或 htmlspecialchars() 进行输出转义过滤，防止未清洗的用户输入直接渲染到页面。"
score = 4.3
severity = "MEDIUM"
sources = ["nuclei"]
title = "Digital Zoom Studio WordPress Video Gallery 跨站脚本攻击漏洞"
updated = "2026-06-17T00:17:45.380"

