[basic]
description = "神州视翰多媒体综合业务显示系统存在 SQL 注入漏洞，由于系统对用户输入参数过滤不严，未充分校验和转义特殊字符，远程攻击者可在无需任何权限的情况下通过构造特制的 HTTP 请求注入恶意 SQL 语句，进而获取后台数据库中的敏感信息（如管理员凭证、用户数据等），严重威胁系统数据安全。"
published = "20260713"
remediation = "联系北京神州视翰科技有限公司获取官方安全补丁；在应用层部署 WAF（Web 应用防火墙）拦截 SQL 注入攻击载荷；对所有用户输入参数进行严格的参数化查询处理，禁止拼接 SQL 语句；限制数据库连接账户权限为最小必要原则，关闭不必要的存储过程和扩展；将系统对外暴露的管理接口限制在内网或 VPN 环境中访问。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "神州视翰多媒体综合业务显示系统 SQL注入漏洞"
updated = "20260713"

