[basic]
description = "VariCAD 7.0 安装程序在安装过程中将程序文件设置为全局可写权限，导致本地攻击者可将正常程序替换为特洛伊木马程序。当其他用户（包括管理员）执行被替换的程序时，木马将以该用户权限运行，从而实现权限提升或系统控制。该漏洞利用条件为攻击者拥有本地访问权限，CVSS v2.0 评分 6.2，危害等级中危。"
published = "2000-10-20"
remediation = "立即检查 VariCAD 7.0 安装目录（通常为 /usr/local/variCAD/ 或 /opt/variCAD/）下所有文件的权限，使用 `chmod -R o-w` 移除其他用户的写权限，确保仅 root 或 VariCAD 运行用户可写。如厂商已发布更新版本，请升级至不受影响的版本；若无法升级，建议使用 `chmod 755` 设置目录权限，并定期审计文件完整性。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "VariCAD 文件覆盖漏洞"
updated = "2000-10-20"

