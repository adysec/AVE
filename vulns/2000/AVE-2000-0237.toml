[basic]
description = "Panda Security 3.0 存在权限提升漏洞，当注册表编辑功能被禁用时，本地用户仍可通过直接执行 .reg 注册表文件或利用其他注册表编辑方法绕过限制，修改注册表键值从而提升系统权限。该漏洞影响 Panda Security 3.0 版本，攻击者需具备本地访问权限并能执行 .reg 文件或调用注册表编辑工具，利用方式为直接双击运行 .reg 文件或调用 regedit /regedit32 等工具导入注册表文件实现权限提升，CVSS 评分 2.1 属低危本地提权漏洞。"
published = "2000-04-17T04:00:00.000"
remediation = "升级到 Panda Security 后续已修复版本（建议升级至 5.x 及以上），通过官方在线升级或安装最新补丁包关闭注册表绕过缺陷。在无法立即升级时，使用组策略禁止用户运行 .reg 文件（移除注册表编辑工具的关联），并以普通用户权限运行防病毒软件，限制其对系统注册表的写入权限作为临时缓解。"
score = 2.1
severity = "LOW"
sources = ["cve"]
