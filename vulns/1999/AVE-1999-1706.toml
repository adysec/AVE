[basic]
description = "Internet Explorer 4 在处理 URL 中的无点 IP 地址（32 位数字）时存在解析错误漏洞，将此类数字错误解析为主机名而非 IP 地址，导致浏览器对结果网页应用本地 Intranet 区域安全策略而非 Internet 区域策略。远程攻击者可通过构造包含无点 IP 地址的恶意 URL 诱导用户访问，绕过 IE 的 Internet 区域安全限制，在本地 Intranet 权限下执行未授权操作。该漏洞影响 Internet Explorer 4 版本，CVSS 评分 7.5，危害等级高。"
published = "1999-12-31T05:00:00.000"
remediation = "升级至 Internet Explorer 5 或更高版本，该问题已在后续版本中修复。若无法升级，手动将 dotless IP 格式的 URL（如 http://1234567890/）加入受限制站点列表，并启用最高安全级别以阻止此类绕过行为。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "Microsoft Internet Explorer 4 无点IP地址安全区域绕过漏洞"
updated = "2026-06-16T21:49:41.647"

