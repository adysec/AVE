[basic]
description = "cmseasy 是一款国产内容管理系统（CMS），该系统存在远程代码执行漏洞。攻击者可通过向易通 cms 管理系统发送精心构造的请求负载，利用系统对用户输入验证不足的缺陷，在服务器端执行任意代码。漏洞影响所有运行易通 cms 的组织和个人，攻击者无需身份验证即可远程触发。成功利用可导致攻击者在服务器上安装 webshell 后门、窃取用户数据库、执行系统命令、篡改网站内容，并进一步利用被入侵服务器作为跳板对内网实施横向渗透攻击，危害极大。"
published = "2023-08-09"
remediation = "立即升级易通 cmseasy 至官方最新版本，在后台关闭不必要的文件上传功能，严格限制上传目录的执行权限，设置 open_basedir 限制 PHP 文件访问范围，删除 upload 目录下的 PHP 解析权限，同时检查并移除可疑的 webshell 文件。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "易通 cmseasy 远程代码执行漏洞"
updated = "2023-08-09"

