[basic]
description = "Zone Labs ZoneAlarm 2.1.10 及更早版本的个人防火墙存在安全策略绕过漏洞。该防火墙未正确过滤源端口为 67（DHCP 服务端口）的 UDP 数据包，远程攻击者可利用此特性构造特制 UDP 报文绕过防火墙规则过滤，从而穿透防护进行后续网络攻击。该漏洞影响广泛使用的个人防火墙产品，攻击者无需身份认证即可远程触发，CVSS 评分 7.5，危害等级高。"
published = "2000-04-24T04:00:00.000"
remediation = "升级 ZoneAlarm 至 2.1.10 以上版本，该版本已修复 UDP 源端口 67 绕过防火墙规则的问题。如无法升级，可手动添加自定义规则，阻止所有来自 UDP 端口 67 的外部入站流量作为临时缓解措施。"
score = 7.5
severity = "HIGH"
sources = ["exploitdb"]
title = "Zone Labs ZoneAlarm 2.1 防火墙UDP 67端口数据包过滤绕过漏洞"
updated = "2026-06-16T21:51:30.653"

