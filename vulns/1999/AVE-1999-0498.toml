[basic]
description = "SunOS/Solaris 及 SGI IRIX 系统中的 ps(1) 命令存在缓冲区溢出漏洞，本地攻击者可通过向 ps 命令传递特制参数触发缓冲区溢出，从而以 root 权限执行任意代码。该漏洞影响 SunOS/Solaris 2.5.1 及 SGI IRIX 6.5.4 等版本，CVSS 评分 7.2，危害等级高。攻击者需具有本地系统访问权限方可利用此漏洞实现权限提升。"
published = "1997-08-01T04:00:00.000"
remediation = "Sun 于 1998 年发布补丁 105950-01 修复 Solaris 2.5.1 中 ps 命令缓冲区溢出漏洞，建议升级至 Solaris 2.6 及以上版本；SGI 建议升级至 IRIX 6.5.5 及以上版本，或应用相关安全补丁。对于已停止维护的系统，建议迁移至受支持的现代操作系统。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "Sun Solaris 及 SGI IRIX ps 命令缓冲区溢出漏洞"
updated = "2026-06-16T21:48:06.370"

