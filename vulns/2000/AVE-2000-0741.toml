[basic]
description = "HP TurboIMAGE 是 HP MPE/iX 系统上的数据库管理系统，其 DBUTIL 工具存在权限提升漏洞。本地攻击者可通过执行特制的 DBUTIL.PUB.SYS 命令获取额外系统权限，进而执行未授权操作。该漏洞源于 DBUTIL 对用户权限检查不充分，攻击者需拥有本地系统访问权限方可利用。"
published = "2000-06-26"
remediation = "安装 HP 安全公告 HPSBMP-2000-006 提供的补丁。如无法立即修补，建议移除 DBUTIL.PUB.SYS 的 setuid/setgid 权限，限制仅授权管理员可执行该程序，并启用本地登录审计日志以检测异常访问。"
score = 4.6
severity = "MEDIUM"
sources = ["cve"]
title = "HP TurboIMAGE DBUTIL 本地权限提升漏洞"
updated = "2026-06-16"

