[basic]
description = 'Node.js 权限模型（Permission Model）在处理以双反斜杠 `\\` 开头的路径时存在路径遍历漏洞。该模型错误地假设此类路径的前 4 个字符（即 `\\?\` 前缀）可被安全忽略，但实际并非总是如此，导致权限检查与真实文件访问路径不一致。攻击者可通过构造特制的 UNC 路径绕过权限模型的路径限制，实现对受限文件系统的越权访问。该漏洞影响 Node.js 22.x 及 20.x 等多个版本，CVSS 评分 3.6，危害等级低，但可被用于绕过安全沙箱机制。'
published = "2025-01-09T01:15:08.500"
remediation = '建议升级 Node.js 至 v20.15.1 或 v22.4.1 及以上版本（2024年7月安全更新），该漏洞仅影响 Windows 平台的权限模型。如无法立即升级，可暂时禁用实验性权限模型（移除 --experimental-permission-model 启动参数）作为临时缓解措施，或避免在权限模型下使用 UNC 路径（以 \\ 开头的路径）。'
score = 3.6
severity = "LOW"
sources = ["msrc"]
title = "Node.js Permission Model 路径遍历漏洞"
updated = "2026-06-17T07:38:14.667"

