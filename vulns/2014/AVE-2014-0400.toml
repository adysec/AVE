[basic]
description = "Apple iOS 8 之前版本及 Apple TV 7 之前版本的 IOHIDFamily 组件存在堆缓冲区溢出漏洞（CVE-787），攻击者可通过构造恶意的键映射属性应用程序触发该漏洞，在受害者交互的条件下实现本地权限提升，以内核权限执行任意代码。该漏洞影响 iOS 7.1.2 及更早版本、Apple TV 6.x 及更早版本，CVSS 3.1 评分 7.8（HIGH），攻击向量为本地攻击（AV:L），攻击复杂度低（AC:L），无需权限（PR:N）但需用户交互（UI:R），可导致机密性、完整性、可用性均受到高度影响（C:H/I:H/A:H）。攻击者需诱导用户安装并运行恶意应用，通过 IOKit 键盘驱动接口传递畸形键映射属性触发堆溢出，实现内核代码执行从而提权至 root 权限。该漏洞已被 Metasploit 框架收录（ExploitDB-35440），且列入 CISA 已知被利用漏洞目录，建议升级至 iOS 8 及以上版本或 Apple TV 7 及以上版本修复。"
published = "2014-09-18T10:55:09.827"
remediation = "建议立即升级 iOS 设备至 iOS 8.0 或更高版本，Apple TV 升级至 7.0 或更高版本。由于受影响设备（iOS 7.1.2 及更早版本）均已停止安全更新，建议尽快更换支持最新 iOS 版本的设备。临时缓解措施：避免安装来源不明的应用，启用设备锁屏密码，限制物理接触设备的机会。"
score = 7.8
severity = "HIGH"
sources = ["kev"]
title = "Apple iOS 8 及更早版本 / Apple TV 7 及更早版本 IOHIDFamily 堆缓冲区溢出漏洞 (CVE-2014-4404)"
updated = "2026-06-17T00:09:56.033"

