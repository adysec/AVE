[basic]
description = "Microsoft Windows 98/2000 的 Java 客户端存在拒绝服务漏洞，远程攻击者可通过诱导用户访问恶意网页，触发 Java Applet 打开大量 UDP Socket，耗尽系统可用 UDP 连接资源，导致目标主机无法建立新的 UDP 连接，严重时可能造成系统崩溃。该漏洞影响 Windows 98 及 Windows 2000 系统，CVSS 评分 2.6，危害等级低，攻击者需诱使用户执行恶意 Applet 方可利用。"
published = "2001-05-03T04:00:00.000"
remediation = "微软未针对此漏洞发布官方安全更新（Windows 98/2000 均已停止支持）。建议在 Internet Explorer 中禁用 Java Applet 执行（工具 → Internet 选项 → 安全 → 自定义级别 → 禁用 Java 小程序脚本），或在网络边界防火墙上限制单个源 IP 的并发 UDP 连接数（如 iptables 设置 connlimit 模块限制 UDP 连接不超过 10 个）。根本解决方案是升级到受支持的 Windows 版本（如 Windows 10/11），并安装最新安全更新。"
score = 2.6
severity = "LOW"
sources = ["exploitdb"]
title = "Microsoft Windows 98/2000 Java Applet UDP Socket 拒绝服务漏洞"
updated = "2026-06-16T21:54:06.033"

