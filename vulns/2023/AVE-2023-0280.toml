[basic]
description = "企业微信存在零日信息泄露漏洞，攻击者可利用该漏洞在无需身份认证的情况下访问敏感数据。该漏洞源于企业微信接口权限控制不当，导致未授权用户可通过特定接口获取企业内部信息，包括但不限于用户列表、组织架构、通讯录数据等。影响范围覆盖使用受影响版本企业微信的所有企业租户，攻击条件仅需目标企业微信服务可访问。利用方式为直接调用存在缺陷的API接口，无需复杂交互即可窃取敏感信息，严重威胁企业数据安全。"
published = "08.14"
remediation = "立即将企业微信客户端和管理后台升级至最新版本（通过官方应用商店或管理后台「关于企业微信」页面检查更新）。同时在管理后台启用「通讯录查看权限管理」，限制非必要成员的通讯录访问范围；开启「文件防泄漏」功能，对敏感文件传输进行监控和拦截；配置网络层HTTPS双向认证，防止中间人窃听；定期轮换应用的access_token密钥，避免长期使用同一凭证。"
score = 5
