[basic]
description = 'Bajie HTTP Web Server 0.30a 版本中自带的示例 Java Servlet "test" 存在绝对路径泄露漏洞。远程攻击者无需任何身份认证即可通过 HTTP 请求直接访问该 Servlet，服务器在响应中会返回 Web 文档根目录的绝对路径信息。该漏洞仅影响信息机密性，攻击者利用此泄露的路径信息可进一步探测服务器目录结构，为后续攻击提供侦察基础。目前厂商已停止维护该产品。'
published = "2000-10-20T04:00:00.000"
remediation = "删除 Bajie HTTP Web Server 0.30a 安装目录下的 sample/test servlet 文件，或升级到已修复此问题的最新版本。由于该产品已停止维护，建议迁移至 Apache HTTP Server 或 Nginx 等活跃维护的 Web 服务器，并遵循最小权限原则移除所有示例文件。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Bajie HTTP Web Server 绝对路径泄露漏洞"
updated = "2026-06-16T21:52:27.193"

