[basic]
description = "Oracle Fusion Middleware 的 Oracle Reports Developer 组件中存在未明漏洞，远程攻击者可通过向 reports/rwservlet/parsequery 接口发送特制请求，利用 PARSEQUERY 函数未正确过滤输入参数的问题，获取数据库连接凭证，导致机密性和完整性受损。该漏洞影响 Oracle Fusion Middleware 11.1.1.4、11.1.1.6 及 11.1.2.0 版本，CVSS 评分 6.4。攻击者可进一步结合 CVE-2012-3152 上传恶意 JSP 文件实现远程代码执行。"
published = "2012-10-16T23:55:03.870"
remediation = "立即安装 Oracle 2012 年 10 月关键补丁更新（CPU October 2012），通过 My Oracle Support 获取对应版本的补丁（参考 Note 1477727.1）。受影响版本包括 Oracle Fusion Middleware 11.1.1.4、11.1.1.6 和 11.1.2.0，应升级至包含该 CPU 修复的更高版本。如无法立即打补丁，可在 Web 服务器或防火墙层面限制对 `reports/rwservlet/parsequery` 接口的访问，仅允许受信 IP 调用 Reports Servlet，作为临时缓解措施。"
score = 6.4
severity = "MEDIUM"
sources = ["nuclei"]
title = "Oracle Fusion Middleware Oracle Reports Developer 远程信息泄露漏洞"
updated = "2026-06-16T23:42:40.880"

