[basic]
description = "这是一个针对 Ceph 分布式存储平台在 S3 对象复制功能中的逻辑缺陷。攻击者可以通过向 RGW 守护程序发送包含空 HTTP 标头的 `PUT` 请求来触发漏洞， specifically when the `x-amz-copy-source` 参数的值为空字符串。多个 Ceph 版本（最先在 19.2.3 版本中发现）都受到该漏洞的影响，因为它们在处理空标头时没有进行充分验证，导致 R保持进程崩溃并引发拒绝服务攻击。该漏洞影响了广泛部署的分布式存储系统，可能导致云计算、对象存储和大数据应用等使用 Ceph 的服务不可用。该漏洞为远程无状态攻击，无需任何权限或用户交互即可触发，易于被攻击者利用。识别和缓解的当务之急是加强对 S3 请求参数的输入验证和边界检查，并尽快部署最新的安全补丁以应对该漏洞带来的服务可用性威胁。"
published = "2025-11-12T19:15:34.867"
remediation = "立即升级 Ceph 至包含 commit `bef59f1` 的版本（≥19.2.3-0ubuntu1.25.10.3 或从 Ceph 主分支重新编译），该提交在 `RGWCopyObj::parse_copy_location()` 中增加了对空 `x-amz-copy-source` 头部的校验。Ubuntu 用户可通过 `apt update && apt upgrade ceph` 安装 USN-8045-1 提供的修复版本（25.10/24.04/22.04 已发布，20.04/18.04/16.04/14.04 需通过 Ubuntu Pro 获取）。如无法立即升级，可在反向代理或 WAF 层面拦截 `x-amz-copy-source` 值为空或仅含空白字符的 S3 PutObject 请求作为临时缓解措施。"
score = 7.5
severity = "HIGH"
sources = ["msrc"]
title = "Ceph RGW S3 对象复制空 HTTP 标头拒绝服务漏洞"
updated = "2026-06-17T07:57:52.860"

