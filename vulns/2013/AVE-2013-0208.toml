[basic]
description = "Oracle Java SE 和 OpenJDK 的 Java Runtime Environment (JRE) 组件中的 2D 子件存在安全漏洞，由于对图像通道验证不正确，远程攻击者可通过向目标系统发送特制的图像文件触发该漏洞，成功利用后可绕过 Java 沙箱保护机制实现任意代码执行。该漏洞影响 Java SE 7 Update 21 及更早版本、6 Update 45 及更早版本、5.0 Update 45 及更早版本以及 OpenJDK 7，CVSS 评分 9.8，危害等级严重。攻击者可通过诱导用户访问恶意网页或打开恶意文件触发漏洞，无需身份认证即可远程利用。Oracle 已在 2013 年 6 月关键补丁更新中修复此漏洞。"
published = "2013-06-18T22:55:02.807"
remediation = "立即升级 Oracle Java SE 至 7 Update 25 及以上版本、6 Update 51 及以上版本、5.0 Update 46 及以上版本，或升级 OpenJDK 7 至包含修复的最新版本。如无法升级，可在浏览器中禁用 Java Applet 插件，或通过控制面板卸载 Java SE 运行时环境中的旧版本以降低攻击面。"
score = 9.8
severity = "CRITICAL"
sources = ["kev"]
title = "Oracle Java SE 2D子件远程代码执行漏洞"
updated = "2026-06-16T23:53:30.330"

