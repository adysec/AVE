[basic]
description = "Internet Explorer 5.0/5.01/5.5 版本在解析包含 ActiveX OBJECT 标签的 HTML 文档时，未对其中引用的 Microsoft Access 数据库文件进行安全警告，导致远程攻击者可通过构造恶意网页诱使用户访问，从而以当前用户权限在目标系统上执行任意命令。该漏洞影响 Windows 98/NT/2000 系统上的 IE 5.x 系列浏览器，攻击者无需身份认证即可利用，属于中危远程代码执行漏洞。"
published = "2000-06-27T04:00:00.000"
remediation = "立即安装 Microsoft 安全公告 MS00-049（或 MS00-055 累积更新）提供的 IE Script 补丁，该补丁可移除 IE 中对 Access 文件进行 OBJECT 标签引用的漏洞。若无法安装补丁，可为 Microsoft Access 设置管理员密码以防止. mdb 文件被远程脚本自动调用执行。此外，建议在 Internet 区域禁用 Active Scripting 和 ActiveX 控件，或使用 Outlook 电子邮件安全更新将 HTML 邮件限制在受限站点区域。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "Microsoft Internet Explorer 远程代码执行漏洞"
updated = "2026-06-16T21:52:04.603"

