[basic]
description = "HP-UX 系统中的 rpc.pcnfsd 服务存在权限配置漏洞，远程攻击者无需身份认证即可通过修改打印机主假脱机目录的权限来获得系统 root 权限。该漏洞影响 HP-UX 操作系统，攻击者可利用该服务开放的 RPC 端口发送特制请求，从而完全控制受影响的系统。CVSS 评分 9.3，危害等级严重。"
published = "1999-02-10T05:00:00.000"
remediation = "建议立即安装 HP 针对 HPSBUX9902-091 公告发布的安全补丁，升级 rpc.pcnfsd 至修复版本。如打印机共享服务非必需，可停止并禁用 rpc.pcnfsd 服务（/etc/init.d/pcnfsd stop；chkconfig pcnfsd off），并通过 hosts.allow/hosts.deny 或防火墙限制仅信任主机可访问 rpc.pcnfsd（TCP/UDP 端口 1500），避免暴露在公网。"
score = 9.3
severity = "CRITICAL"
sources = ["avd"]
title = "HP HP-UX rpc.pcnfsd 远程代码执行漏洞"
updated = "2026-06-16T21:48:12.860"

