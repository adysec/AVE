[basic]
description = "Sun Solaris 7.0 的 procfs（进程文件系统）存在拒绝服务漏洞，本地攻击者可通过向 /proc 文件系统发送特制的请求或操作，触发系统内核崩溃或资源耗尽，导致目标系统不可用。该漏洞影响 Sun Solaris 7.0 版本，需本地用户身份才能利用，攻击复杂度较低。"
published = "1999-03-09"
remediation = "立即安装 Sun（现 Oracle）针对 Solaris 7 64-bit 系统发布的 procfs 补丁（Solaris 7 推荐补丁集 106541-xx，含 procfs 修复）。若无法升级系统，可将 /proc 文件系统挂载选项设置为 nosuid 并限制非 root 用户对 /proc 的访问权限，以缓解本地拒绝服务攻击。建议将已 EOL 的 Solaris 7 升级至受支持的 Oracle Solaris 11 或更新版本，从根本上解决此问题。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Sun Solaris 7.0 procfs 拒绝服务漏洞"
updated = "1999-03-09"

