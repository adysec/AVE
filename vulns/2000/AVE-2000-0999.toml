[basic]
description = "Caldera OpenLinux 及 Mandrake Linux 等发行版中 KDM（K Display Manager）的默认配置存在信息泄露漏洞。kdm 默认允许来自任意主机的 XDMCP 连接，远程攻击者无需任何认证即可通过 XDMCP 协议获取目标系统的敏感信息（如用户列表、显示会话状态等），或绕过额外的访问控制限制。该漏洞影响 Caldera OpenLinux 及 Mandrake Linux 等操作系统，CVSS v2 评分 10.0，危害等级高危。厂商已发布安全公告建议用户修改 kdm 配置文件限制 XDMCP 连接来源。"
published = "1999-08-22"
remediation = "修改 kdm 配置文件（通常位于 /etc/kde/kdm/kdmrc 或 /usr/share/config/kdm/kdmrc），将 EnableXDMCP 设为 false 以禁用 XDMCP 服务；如确需使用，在 XDMCPPort 中限制允许连接的来源 IP 范围，并在防火墙层面阻断 UDP 端口 177 的外部访问。"
score = 10.0
severity = "CRITICAL"
sources = ["cve"]
title = "Caldera Mandrake Linux kdm XDMCP 远程信息泄露漏洞"
updated = "2026-06-16"

