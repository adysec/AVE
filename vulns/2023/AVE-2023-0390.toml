[basic]
description = "Linux 内核 AMD GPU 驱动（drm/amdgpu）中的 MES（微引擎调度器）自检功能存在内存泄漏漏洞。由于 MES 队列关联的 fence 对象在 amdgpu_ring_fini 过程中未被正确释放，本地攻击者可通过反复触发 MES 自检操作消耗系统内存资源，导致内核内存耗尽引发拒绝服务。该漏洞影响 Linux 内核中使用 AMDGPU 驱动的系统，CVSS 评分 5.5，危害等级中等。"
published = "2025-09-18T14:15:39.510"
remediation = "升级 Linux 内核至已修复版本：6.1.47 及以上（6.1.x LTS 分支）、6.4.12 及以上（6.4.x 分支）或 6.5 及以上（主线分支）。可通过发行版包管理器更新内核包（如 Ubuntu 使用 `apt install linux-image-generic`，CentOS/RHEL 使用 `yum update kernel`）。若无法立即升级内核，可禁用 AMD GPU 的 MES 自测功能作为临时缓解，或在启动参数中添加 `amdgpu.ppfeaturemask=0` 禁用相关电源管理特性以规避触发路径。"
score = 5.5
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux kernel AMD GPU MES 内存泄漏漏洞"
updated = "2026-06-17T06:45:07.660"

