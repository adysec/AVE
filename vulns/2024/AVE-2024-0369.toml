[basic]
title = "用友 NC 任意文件读取漏洞"
description = "用友 NC（Yonyou NC）企业应用管理软件存在任意文件读取漏洞，攻击者可通过向 /portal/pt/xml/file/download 接口发送特制请求，在 filename 参数中注入路径穿越字符（如 ../），从而读取服务器上的任意文件，包括配置文件、敏感数据等，导致信息泄露。该漏洞无需身份认证即可远程利用，危害较大。"
severity = "MEDIUM"
score = 5.0
sources = ["hwpoc"]
published = "2024-07-26"
updated = "2024-07-26"
remediation = "建议立即升级用友NC至最新安全补丁版本（NC6.5及以上系列请安装2024年发布的任意文件读取漏洞专项补丁包），或联系用友官方获取修复补丁。临时缓解措施：在Nginx或WAF层面添加规则，对/portal/pt/xml/file/download路径的filename参数进行路径穿越字符（../、..\）过滤，并限制该接口仅允许内网IP访问。"
