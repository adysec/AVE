[basic]
description = "IBM Netfinity Remote Control（远程控制软件）1.0 存在权限提升漏洞。该软件的任务管理器以系统级权限运行，本地攻击者可通过任务管理器启动任意程序，从而获得管理员权限。攻击者只需拥有本地访问权限即可利用此漏洞，无需身份认证。该漏洞影响 IBM Remote Control Software 1.0 版本，CVSS 评分 7.2，危害等级高。"
published = "1999-05-25T04:00:00.000"
remediation = "立即升级 IBM Netfinity Remote Control 至最新版本或迁移至 IBM Director 系列管理工具。如无法升级，限制仅允许受信任管理员账户登录系统，并在本地安全策略中禁用进程管理器对非管理员的访问权限。同时建议使用防火墙限制远程管理端口的访问来源 IP。"
score = 7.2
severity = "HIGH"
sources = ["cve"]
title = "IBM Netfinity Remote Control 本地权限提升漏洞"
updated = "2026-06-16T21:50:23.410"

