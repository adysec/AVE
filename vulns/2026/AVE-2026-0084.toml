[basic]
description = "Linux 内核 net/sched 子系统中的 pedit（数据包编辑器）动作存在部分写时复制（COW）逻辑缺陷，tcf_pedit_act() 函数在循环前仅使用 tcfp_off_max_hint 计算一次 COW 范围，未考虑类型化键引入的运行时报头偏移，导致部分写区域未能正确触发 COW，进而造成页面缓存损坏。本地攻击者通过构造特制的 tc 规则并运行恶意程序，可利用此漏洞实现权限提升，获取 root 权限。该漏洞影响主流 Linux 内核版本，需升级至 ≥ v7.1-rc7 或应用对应补丁修复，CVSS 评分 7.8，危害等级高。"
published = "2026-06-16T08:16:23.993"
remediation = "立即升级 Linux 内核至 v7.1-rc7 或更高版本，各发行版用户请安装对应内核更新（如 Red Hat 系列可通过 RHSA-2026:27288 等 RHSA 公告更新）。也可手动应用补丁：`git cherry-pick 2bec122b9fb91507a758ab5e3e5c4fbe7cb3f61b`。临时缓解措施：通过 `capsh --drop=cap_net_admin` 限制非特权用户执行 tc 命令，并监控 su/sudo 等 setuid 二进制文件的异常修改行为。"
score = 7.8
severity = "HIGH"
sources = ["hwpoc"]
title = "Linux Linux Kernel net/sched pedit COW 污染缓存本地提权漏洞"
updated = "2026-07-15T02:22:15.200"

