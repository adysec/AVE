[basic]
description = "Filemaker 购物车应用程序存在设计缺陷，未对用户提交的隐藏表单字段进行有效的服务端校验。远程攻击者可通过拦截并修改表单中的隐藏字段（如商品价格、数量等敏感交易信息），绕过客户端限制提交恶意数据，进而以非正常价格完成购买。该漏洞影响 Filemaker 购物车组件，CVSS 评分 7.5，危害等级高，攻击无需认证且利用难度较低。"
published = "2000-02-01T05:00:00.000"
remediation = "修改应用程序逻辑，将所有交易关键数据（商品价格、数量、总价等）存储在服务端 Session 中，而非通过隐藏表单字段传输；对任何客户端提交的购买相关参数进行严格的服务端校验和重新计算，确保数据完整性。如使用 FileMaker 自带的 Web 发布模块，升级至最新版本并启用 SSL 加密通信。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "Filemaker 购物车应用信息修改漏洞"
updated = "2026-06-16T21:51:02.893"

