[basic]
description = "Nullsoft SHOUTcast 服务器将管理员密码以明文形式存储在配置文件 sc_serv.conf 中，本地攻击者可通过读取该配置文件获取管理员凭据，进而获得服务器管理权限。该漏洞影响 SHOUTcast 服务器软件，攻击者需具有本地文件系统访问权限才能利用，属于权限许可和访问控制缺陷，CVSS 评分 7.2，危害等级高。"
published = "1999-08-20T04:00:00.000"
remediation = "将 sc_serv.conf 配置文件权限设为仅运行 SHOUTcast 的服务账户可读写（如 chmod 600 并归运行用户所有），禁止其他本地用户访问；升级到 Nullsoft 发布的修复版本（1.9.8 及以上，使用加密或独立认证机制）；在暂无法升级时，将服务器进程以受限低权限专用账户运行，并通过防火墙限制 8000 管理端口仅允许可信 IP 访问，避免明文密码被本地其他用户读取。"
score = 7.2
severity = "HIGH"
sources = ["cve"]
title = "Nullsoft SHOUTcast服务器权限许可和访问控制漏洞"
updated = "2026-06-16T21:50:43.237"

