[info]
author = "AVE"
description = "检测 PowerScripts PlusMail CGI 程序是否因密码文件权限不当导致远程命令执行。通过访问 PlusMail CGI 脚本，检查是否存在密码文件泄露或命令执行迹象。"
id = "POC-AVE-2000-0208"
name = "PowerScripts PlusMail CGI 命令执行漏洞 PoC"
severity = "high"
tags = [
    "cve-2000-0074",
    "ave-2000-0208",
]
vuln_id = [
    "CVE-2000-0074",
    "AVE-2000-0208",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/cgi-bin/plusmail/plusmail.cgi"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "password",
    "unable to open",
    "permission denied",
    "500 Internal Server Error",
]
