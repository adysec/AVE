[basic]
description = "SunView（SunTools）的 selection_svc 组件存在安全漏洞，远程攻击者无需身份认证即可通过该服务读取目标系统上的任意文件。该漏洞影响 SunOS 4.1.1 及 Sun Solaris 10 等版本，利用方式简单，可导致敏感信息泄露，CVSS 评分 5.0，危害等级中等。"
published = "1990-08-14T04:00:00.000"
remediation = "建议立即停止并禁用 selection_svc 服务（/usr/bin/selection_svc），在 /etc/inetd.conf 中注释对应行后重启 inetd 进程。将系统升级到 Solaris 8 及以上受支持版本，或在防火墙层面限制对 SunView 服务端口（TCP 6112）的访问作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Sun SunView selection_svc 远程文件读取漏洞"
updated = "2026-06-16T21:47:54.977"

