[basic]
description = "HP Web JetAdmin 5.6 的 Web 管理界面存在目录遍历漏洞。远程攻击者无需身份认证即可通过向目标服务器发送包含 `../` 序列的特制 HTTP 请求，绕过路径限制读取服务器上的任意文件，如配置文件、密码文件等敏感信息。该漏洞影响 HP JetAdmin 5.5.177 及 5.6 版本，CVSS 评分 7.5，危害等级高。建议升级至不受影响版本或限制管理界面的网络访问。"
published = "2000-05-24T04:00:00.000"
remediation = "建议将 HP Web JetAdmin 升级至 6.0 及以上版本，该漏洞已在后续版本中修复目录遍历过滤机制。临时缓解措施可在防火墙层面限制对 8000 端口的 Web 管理界面访问，仅允许受信任的 IP 地址连接。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "HP Web JetAdmin 目录遍历漏洞"
updated = "2026-06-16T21:51:44.673"

