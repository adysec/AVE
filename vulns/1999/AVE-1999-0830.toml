[basic]
description = "思科（Cisco）Cache Engine 缓存引擎存在安全漏洞，攻击者能够向缓存引擎发送特制的请求，将缓存中已存储的合法 Web 内容替换为攻击者控制的恶意内容。该漏洞影响部署了 Cisco Cache Engine 并对用户 Web 访问进行内容缓存的网络环境，攻击者可借此实施内容篡改、钓鱼或投毒等中间人式攻击。利用该漏洞无需身份认证，攻击者只需能够与目标缓存引擎进行网络通信，即可注入伪造的缓存响应，使后续访问该内容的用户获取被篡改的数据。"
published = "1999-12-16T05:00:00.000"
remediation = "建议将 Cisco Cache Engine 升级至修复该漏洞的官方固件版本（具体版本号参见 Cisco 安全公告），并及时应用 Cisco 发布的相关软件更新。如暂无法升级，可在上游边界设备配置访问控制列表（ACL）仅允许受信任源站回源，禁止未经授权的外部主机向缓存引擎推送或替换内容，同时在缓存引擎上启用内容完整性校验与来源认证，限制管理接口仅对内部网络开放，作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "思科 缓存引擎 缓存内容替换漏洞"
updated = "2026-06-16T21:49:29.483"

