[basic]
description = "Ascend Multilink PPP for ISDN 拨号用户服务（版本 4.6 及更早）存在输入验证缺陷，远程攻击者可通过向目标系统发送伪造的端点标识符（Endpoint Identifier）数据包，触发服务处理异常，导致目标设备拒绝服务。该漏洞无需认证即可触发，攻击门槛较低，影响 Ascend 系列路由器和接入设备中启用 Multilink PPP 功能的 ISDN 拨号用户连接。"
published = "1999-02-12T05:00:00.000"
remediation = "升级 Ascend Multilink PPP 至 4.6 或更高版本，该版本修复了伪造端点标识符导致拒绝服务的问题。如产品已停止支持且无法升级，建议在网络边界部署入侵检测系统（IDS）过滤异常 PPP 端点标识符报文，并限制 ISDN 拨号用户的源地址验证。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Ascend Multilink PPP for ISDN 拒绝服务漏洞"
updated = "2026-06-16T21:49:56.330"

