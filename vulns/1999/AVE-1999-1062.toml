[basic]
description = "Auto_FTP 0.2 中的 Auto_FTP.pl 脚本使用 /tmp/ftp_tmp 作为共享目录，且该目录权限设置不安全，导致本地攻击者可通过向该目录放置任意文件的方式将其发送至远程服务器，同时还可查看正在传输中的文件内容，造成敏感信息泄露。该漏洞影响 Auto_FTP 0.2 版本，CVSS 评分 4.6，危害等级中危。建议升级至最新版本或修改目录权限以修复此漏洞。"
published = "1999-10-05T04:00:00.000"
remediation = "升级 Auto_FTP 至 0.3 或更高版本；如无法升级，手动修改 Auto_FTP.pl 脚本，将临时目录改为仅属主可读写（chmod 700），或改用其他受支持的 FTP 自动化工具。"
score = 4.6
severity = "MEDIUM"
sources = ["avd"]
title = "Auto_FTP Auto_FTP.pl 不安全共享目录本地权限漏洞"
updated = "2026-06-16T21:50:14.563"

