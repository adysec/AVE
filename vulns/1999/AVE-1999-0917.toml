[basic]
description = "Palm Pilot HotSync Manager 3.0.4 在 Windows 98 系统中存在缓冲区溢出漏洞。当 HotSync Manager 处于网络模式时，远程攻击者可通过向 14238/TCP 端口发送超长字符串，触发缓冲区溢出，导致服务拒绝响应，甚至可能执行任意命令。该漏洞影响 Palm Pilot HotSync Manager 3.0.4 版本，CVSS 评分 7.5，危害等级高。攻击无需任何身份认证，可在网络层直接发起。"
published = "1999-11-04T05:00:00.000"
remediation = "将 HotSync Manager 升级至 3.0.4 之后的安全版本；如无法升级，将同步模式从 network 切换为 local（USB/串口），避免暴露 14238/TCP 端口；在防火墙层面阻止对 14238 端口的外部访问；或迁移至不受影响的 Windows 2000 平台运行。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "Palm HotSync Manager 远程拒绝服务漏洞"
updated = "2026-06-16T21:49:38.017"

