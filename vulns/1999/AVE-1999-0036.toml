[basic]
description = "Super 3.11.6 及之前版本的 syslog 工具存在缓冲区溢出漏洞，本地攻击者可通过向 syslog 发送超长日志消息触发缓冲区溢出，覆盖内存中的关键数据，从而获取 root 权限。该漏洞影响 Debian 2.0 系统，攻击者需要拥有本地账户才能利用，危害等级高。"
published = "1999-02-26"
remediation = "升级 super 软件包至 3.12.0 或更高版本，该版本修复了 syslog 函数中的缓冲区溢出问题。对于仍运行 Debian 2.0 的系统，建议升级至受支持的 Debian 发行版，因为 Debian 2.0 已停止安全支持多年。如无法升级，限制本地用户对 super 程序的执行权限，仅允许受信任的管理员用户使用。"
score = 7.2
severity = "HIGH"
sources = ["cve"]
title = "Super Syslog 缓冲区溢出漏洞"
updated = "2026-06-16"

