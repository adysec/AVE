[basic]
description = "IBM HomePagePrint 1.0.7（Windows98J 版）存在缓冲区溢出漏洞。该软件在解析网页中 IMG 标签的 SRC 属性时未对输入长度进行边界校验，当恶意网站在 IMG_SRC 标签中嵌入超长字符串时会触发缓冲区溢出。攻击者只需在自身控制的网页中构造特制的 HTML 内容并诱导受害者（查看者）使用此软件浏览该页面，即可在受害者系统上执行任意代码。该漏洞影响安装并运行 IBM HomePagePrint 1.0.7 for Windows98J 的用户，攻击者无需身份认证，利用条件仅为诱使用户访问恶意网页，可实现远程代码执行，危害较大。"
published = "1999-11-02T05:00:00.000"
remediation = "建议立即卸载 IBM HomePagePrint 1.0.7 并升级至现代浏览器（如 Chrome/Edge/Firefox 最新版）及受支持的操作系统（Windows 10/11）。若必须保留该环境，请在防火墙层面禁止该程序访问互联网，并禁用浏览器中的 ActiveX/Active Scripting 功能作为临时缓解措施。"
score = 7.5
severity = "HIGH"
sources = ["exploitdb"]
title = "IBM 首页打印机 1.0 7 远程缓冲区溢出漏洞"
updated = "2026-06-16T21:50:38.487"

