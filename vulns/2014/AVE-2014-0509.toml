[basic]
description = "CVE-2014-8439是一个安全漏洞，影响相关产品的安全性。攻击者可能利用此漏洞执行任意代码或获取未授权访问。建议用户及时更新到最新版本以修复此问题。"
published = "2014-11-25T23:59:00.053"
remediation = "建议立即升级 Adobe Flash Player 至 13.0.0.258（13.x 分支）、15.0.0.239（14.x/15.x 分支）或 11.2.202.424（Linux 平台），并通过浏览器插件管理器或系统包管理器确认更新已生效；Adobe AIR 请升级至 15.0.0.293，Adobe AIR SDK & Compiler 请升级至 15.0.0.302。由于 Adobe Flash Player 已于 2020 年 12 月 31 日终止支持，若环境中仍存在该组件，建议彻底卸载并禁用或清理 Adobe AIR SDK/Compiler 系统，同时在浏览器中阻止 Flash 内容加载作为临时缓解措施。"
score = 8.8
severity = "HIGH"
