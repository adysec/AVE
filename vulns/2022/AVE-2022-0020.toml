[basic]
description = "Linux 内核 Mellanox Spectrum 系列网卡驱动（mlxsw）在处理设备固件上报的事件时，未对 CPU 端口（本地端口 0）进行有效隔离。CPU 端口虽然存在，但其部分字段未像普通本地端口那样完成初始化，访问这些未初始化字段会导致空指针解引用（CWE-476），触发内核崩溃。该漏洞需要本地攻击者具备访问受影响设备固件交互能力，影响使用 Mellanox Spectrum 系列交换机芯片的 Linux 系统。已在 commit 63b08b1f6834 及后续通用补丁中修复。"
published = "2025-02-26T07:00:50.680"
remediation = "立即将 Linux 内核升级至 5.17.3 或更高版本，或合入以下两个补丁提交：4cad27ba2e5a（主线）和 bcdfd615f83b（稳定分支）。如无法升级内核，在 Mellanox Spectrum 交换机上禁用固件事件中 CPU 端口（local port 0）的异常事件处理作为临时缓解。"
score = 5.5
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux kernel mlxsw spectrum 驱动空指针解引用漏洞"
updated = "2026-06-17T05:17:10.870"

