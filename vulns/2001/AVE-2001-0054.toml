[basic]
description = "Windows Media Player 7.0 存在任意 Java 小程序执行漏洞。远程攻击者可将恶意 Java 小程序封装在名为 skin.wmz 的皮肤文件中，然后通过 HTML 页面中 applet 标签的 codebase 参数引用该皮肤文件，诱使用户在 Internet Explorer 中访问恶意页面即可触发。成功利用该漏洞的攻击者可在客户端系统上以当前用户权限执行任意 Java 代码。该漏洞影响 Windows Media Player 7.0 及关联的 Internet Explorer 环境，CVSS 评分 5.1，危害等级中危。"
published = "2001-03-12T05:00:00.000"
remediation = "升级到 Windows Media Player 7.1 或更高版本（Windows Media Player for Windows XP 及以上版本不受影响），该漏洞已在 Windows Media Player 7.1 中修复。也可安装 Microsoft 安全公告 MS01-010 对应的补丁。同时建议在 Internet Explorer 中禁用 Java 小程序执行作为临时缓解措施。"
score = 5.1
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Microsoft Windows Media Player 7 皮肤文件远程代码执行漏洞"
updated = "2026-06-16T21:53:44.537"

