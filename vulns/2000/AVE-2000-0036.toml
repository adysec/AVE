[basic]
description = "AltaVista Search Intranet 2.0 b/2.3 版本中存在目录遍历漏洞。其 query.cgi CGI 程序未对用户输入的路径参数进行充分过滤，远程攻击者可通过在请求中插入 ../（点点斜杠）序列绕过目录限制，读取 Web 根目录之外的任意文件，如系统配置文件或敏感数据。该漏洞利用难度较低，无需认证即可触发，影响运行 AltaVista Search Intranet 2.0 b/2.3 的服务器。"
published = "1999-12-29T05:00:00.000"
remediation = "该产品已停止维护，无官方补丁。建议立即迁移至受支持的现代搜索引擎（如 Apache Solr 或 Elasticsearch），并停止使用 AltaVista Search Intranet。临时缓解措施：在 Web 服务器层配置访问控制，禁止外部访问 query.cgi 脚本，或移除该 CGI 文件。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "AltaVista Search Intranet 目录遍历漏洞"
updated = "2026-06-16T21:50:52.507"

