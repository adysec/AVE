[basic]
description = "Apache HTTP Server 1.2.5 及更早版本中的 mod_proxy 模块存在拒绝服务漏洞。远程攻击者可通过向代理模块发送特制的畸形 FTP 命令，触发 Apache 进程崩溃（dump core），导致服务不可用。该漏洞影响 Apache 1.2.5 及之前版本，攻击者无需认证即可远程利用，危害等级高危。建议升级至 1.3.0 或更高版本以修复此漏洞。"
published = "1999-12-31T05:00:00.000"
remediation = "升级至 Apache 1.3.0 及以上版本，该版本已修复 mod_proxy 处理畸形 FTP 命令时的段错误问题。如无法升级，可禁用 mod_proxy 模块（注释 LoadModule proxy_module 行）作为临时缓解措施。另外可配置防火墙限制对 80 端口的非正常 FTP 协议流量访问。"
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "Apache HTTP Server mod_proxy 拒绝服务漏洞"
updated = "2026-06-16T21:50:07.733"

