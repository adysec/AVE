[basic]
description = "Linux 内核 rtw89 无线网卡驱动在处理 RNR（Reduced Neighbor Report）时存在空指针解引用漏洞。函数 `ieee80211_probereq_get()` 在特定条件下可能返回 NULL，但调用方未检查其返回值便直接使用，导致空指针访问。本地低权限攻击者可利用此漏洞触发内核崩溃，造成系统拒绝服务。该漏洞影响使用 rtw89 驱动的 Realtek 无线网卡设备，CVSS 评分 5.5，危害等级中等。"
published = "2025-01-11T13:15:22.750"
remediation = "升级 Linux 内核至 6.6.66、6.12.5 或 6.13 及以上版本，包含提交 630d5d8f2bf6、7296e5611adb 或 1a0f54cb3fea 的补丁。各发行版用户可通过包管理器更新内核包（如 Ubuntu 运行 apt update && apt upgrade linux-image-generic），更新后重启系统生效。无法立即升级时，可卸载 rtw89 内核模块（modprobe -r rtw89_pci rtw89_core）禁用 Realtek WiFi 驱动作为临时缓解。"
score = 5.5
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux Kernel rtw89 无线驱动空指针解引用漏洞"
updated = "2026-06-17T07:58:56.577"

