[basic]
description = "Allmanage 网站管理软件的管理员密码以明文形式存储在服务器上的配置文件中，远程攻击者无需身份认证即可通过直接访问该文件路径获取管理员密码，进而完全控制网站后台管理系统。该漏洞影响 Allmanage 多版本，攻击者只需知道文件路径即可利用，危害等级高，可能导致网站数据泄露和服务器被接管。"
published = "2000-05-13T04:00:00.000"
remediation = "1. 升级 Allmanage 至官方修复版本（如有），或停用该软件；2. 将管理密码文件移至 Web 根目录外并设置 600 权限；3. 使用 .htaccess 对远程访问鉴权，限制管理后台 IP 白名单；4. 密码存储改为 bcrypt/argon2 等强哈希方案。漏洞极旧，强烈建议替换为有维护的替代产品。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "Allmanage 网站管理软件管理员密码明文泄露漏洞"
updated = "2026-06-16T21:51:43.500"

