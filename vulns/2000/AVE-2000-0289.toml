[basic]
description = "Windows 2000 无人值守预安装功能在启用 OEMPreinstall 选项时，会将 All Users 及 Default Users 目录设置为不安全的权限，导致本地攻击者可利用该配置缺陷访问或篡改其他用户的文件及设置。攻击者需具备本地登录权限，通过修改共享目录中的配置文件实现权限提升。该漏洞影响 Microsoft Windows 2000 系统。"
published = "2000-04-07"
remediation = "手动修复受影响的 All Users 和 Default Users 目录权限：设置为仅允许 Administrators 和 SYSTEM 完全控制，移除 Everyone 和 Users 组的写入权限。避免使用 OEMPreinstall 选项进行无人值守安装，改用 Sysprep 或通过安全模板应用正确的 NTFS 权限。"
score = 7.2
severity = "HIGH"
sources = ["cve"]
title = "Microsoft Windows 2000 无人值守预安装权限设置不当漏洞"
updated = "2026-06-16"

