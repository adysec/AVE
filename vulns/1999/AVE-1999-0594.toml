[basic]
description = "Ipswitch WS_FTP Server 1.0.1 及 1.0.2 版本存在远程拒绝服务漏洞。未经认证的远程攻击者可通过向 FTP 服务发送特制的 CWD（Change Working Directory）命令，导致服务器在处理该命令时发生异常而崩溃或停止响应，造成拒绝服务。该漏洞影响 WS_FTP Server 早期版本，攻击无需任何权限，利用方式简单，CVSS 评分 5.0，危害等级中等。"
published = "1999-02-02T05:00:00.000"
remediation = "升级到 WS_FTP Server 1.0.3 或更高版本，该版本已修复 CWD 命令导致的拒绝服务问题。若已无法获取官方补丁，建议在防火墙层面限制对 FTP 服务的访问来源 IP，或迁移至受支持的 FTP 服务器软件。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Ipswitch WS_FTP Server 拒绝服务漏洞"
updated = "2026-06-16T21:48:13.990"

