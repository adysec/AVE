[basic]
description = "该漏洞存在于 SMTP 服务器（如 Sendmail）中，远程攻击者可在同一连接中发送大量 RCPT TO 命令，耗尽服务器资源导致拒绝服务。攻击无需身份认证，仅需能连接目标 SMTP 端口（通常为 25/TCP）。影响运行 Sendmail 等 SMTP 软件的主机，CVSS 评分 6.4，危害等级中危。"
published = "1999-03-08"
remediation = "升级 Sendmail 至 8.9.0 或更高版本，该版本引入了连接限制机制。在 sendmail.cf 中设置 MaxRecipientsPerMessage=N（如 100）限制单次 SMTP 连接的 RCPT TO 数量。同时配置 access 文件拒绝来源异常的发件 IP，或在 MTA 层面启用 rate limiting 限制同一来源的并发连接数。"
score = 6.4
severity = "MEDIUM"
sources = ["cve"]
title = "Sendmail SMTP 服务拒绝服务漏洞"
updated = "2026-06-16"

