[basic]
description = "Windows NT 的 TCP/IP 协议栈在处理分片 IP 数据包时存在缺陷，远程攻击者无需身份认证即可向目标系统发送特制的分片 IP 报文，触发系统内核在处理畸形分片时发生异常，导致目标系统崩溃或停止响应正常网络请求，造成拒绝服务。该漏洞影响 Windows NT 4.0 及更早版本，CVSS 评分 10.0，危害等级严重。Microsoft 已发布安全补丁修复此漏洞。"
published = "1999-01-01T05:00:00.000"
remediation = "安装 Windows NT 4.0 Service Pack 3 或更高版本以修复 IP 分片重组逻辑缺陷。如无法升级至 SP3，可在网络边界防火墙配置规则丢弃分片 IP 数据包（如 iptables 规则 -f 标记），或将运行 Windows NT 4.0 的系统隔离于非信任网络之外，阻止外部攻击者发送特制分片报文触发 DoS。"
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "Microsoft Windows NT TCP/IP IP分片处理拒绝服务漏洞"
updated = "2026-06-16T21:47:57.173"

