[basic]
description = "FreeBSD 3.4/4.0/5.0 及 NetBSD 1.4.2 及更早版本的操作系统内核网络协议栈在处理 IP 时间戳选项时存在未对齐内存访问缺陷，远程攻击者无需认证即可向目标主机发送一个精心构造的包含未对齐 IP 时间戳选项的数据包，触发内核内存访问异常，导致目标系统崩溃或拒绝服务。该漏洞利用条件简单，攻击者仅需具备网络可达性即可实施攻击，影响范围涵盖多个 BSD 系操作系统版本。"
published = "2000-05-01T04:00:00.000"
remediation = "升级 NetBSD 至 1.4.2 以上版本，或下载安装官方补丁（20000507-ipopt142/141）修复 ip_input.c 和 ip.h 中 IP 选项处理的内存对齐与范围检查缺陷。如无法升级，可在边界防火墙上过滤包含异常 IP 时间戳选项的数据包作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "FreeBSD/NetBSD IP Timestamp 拒绝服务漏洞"
updated = "2026-06-16T21:51:44.310"

