[basic]
description = "回声服务（Echo Service）运行于 TCP/UDP 端口 7，该服务将接收到的任意数据原样返回给发送方。攻击者可利用此服务进行信息收集，探测目标系统存活状态；更严重的是，攻击者可伪造源地址利用 UDP 回声服务发起反射放大型拒绝服务攻击，大量响应数据包会涌向被伪造的目标地址，导致目标带宽或资源耗尽。该漏洞影响默认开启该服务的所有旧版本操作系统。修复建议为禁用回声服务或通过防火墙阻止外部对端口 7 的访问。"
published = "1999-01-01T05:00:00.000"
remediation = "立即禁用回声服务（echo service）：在 Unix/Linux 系统中注释 `/etc/inetd.conf` 中的 echo 行并重启 inetd，或执行 `systemctl disable echo-dgram echo-stream` 禁用 systemd socket；在 Windows 系统中通过服务管理器停止并禁用 Simple TCP/IP Services 或使用 `sc stop echo` 命令。同时在边界防火墙上封禁 UDP/TCP 7 端口以防止反射放大攻击。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "多种操作系统 Echo 服务运行反射放大拒绝服务漏洞"
updated = "2026-06-16T21:48:45.917"

