[basic]
description = "SunOS 系统中 Sendmail 5.59 至 5.65 版本存在本地提权漏洞。该漏洞源于程序在处理 -oR 参数时使用 popen 函数执行命令，未对参数进行安全过滤。本地攻击者可通过修改 IFS（内部字段分隔符）环境变量，向 -oR 选项传入精心构造的恶意参数，利用 popen 函数解析时产生的命令注入，从而以 root 权限执行任意命令，完全控制系统。"
published = "1995-08-23T04:00:00.000"
remediation = "将 SunOS 上的 sendmail 升级至 5.65 以上版本（如 8.x 系列），新版本已修复 popen() 调用时未正确清理 IFS 环境变量的问题。如无法升级，在 sendmail.cf 中禁用 -oR 选项的使用，并限制普通用户对 IFS 变量的修改权限。建议迁移至现代 MTA 替代方案（如 Postfix）。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "SunOS Sendmail -oR 参数本地特权提升漏洞"
updated = "2026-06-16T21:50:45.923"

