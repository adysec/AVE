[basic]
description = "Joomla! 的 Code-Garage NoticeBoard（com_noticeboard）组件 1.3 版本存在目录遍历漏洞，攻击者可通过对 index.php 中的 controller 参数传入 '..' 路径序列遍历访问控制权限，未经身份认证的远程用户可读取服务器上的任意文件（如配置文件、敏感源码）。"
published = "2010-05-03T13:51:53.247"
remediation = "升级 Joomla! 到 3.10.13 及以上版本或 4.x 系列，或移除已废弃的 NoticeBoard 组件。进一步的安全措施包括应用安全补丁、限制文件权限、禁用目录遍历功能。"
score = 5.0
severity = "MEDIUM"
sources = ["nuclei"]
title = "Joomla! Code-Garage NoticeBoard 1.3 本地文件包含漏洞"
updated = "2026-06-16T23:18:48.123"

