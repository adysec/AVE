[basic]
description = "SGI IRIX 6.x 操作系统 XFS 文件系统中的 truncate() 函数存在权限检查缺失漏洞，导致本地普通用户可对任意文件执行截断操作，清空文件内容，破坏系统关键文件。该漏洞影响 IRIX 6.2/6.3/6.4 版本，CVSS 评分 10.0，危害严重。攻击者需具备本地系统访问权限，通过调用 truncate() 函数对 XFS 文件系统中的目标文件操作即可触发，无需额外认证。"
published = "2000-10-20"
remediation = "SGI IRIX 6.x 已停止安全支持，建议将关键业务迁移至受支持的现代操作系统。对于无法立即迁移的系统，应严格限制本地用户登录权限，仅授权可信用户访问，并通过文件系统权限控制限制 xfs 敏感目录的可写权限作为临时缓解措施。"
score = 10.0
severity = "CRITICAL"
sources = [
    "cve",
    "exploitdb",
]
title = "SGI IRIX xfs truncate 函数权限检查漏洞"
updated = "2000-10-20"

