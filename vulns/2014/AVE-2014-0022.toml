[basic]
description = "Elasticsearch 1.2 之前版本的默认配置中启用了动态脚本功能，远程攻击者无需认证即可通过向 _search 接口发送特制的 source 参数来执行任意 MVEL 表达式与 Java 代码，造成远程代码执行漏洞。该漏洞影响 Elasticsearch 1.2 之前所有版本，CVSS 评分 8.1，危害等级高危。厂商建议用户将 Elasticsearch 部署在独立虚拟机中或升级至 1.2 及以上版本以修复该漏洞。"
published = "2014-07-28T19:55:04.490"
remediation = "升级 Elasticsearch 至 1.2 及以上版本，该版本默认禁用动态脚本（script.disable_dynamic: true）。如无法升级，在 elasticsearch.yml 中设置 script.disable_dynamic: true 或 script.groovy.sandbox.enabled: true，并确保 Elasticsearch 运行在独立虚拟机中，避免与业务系统共享 JVM 环境。"
score = 8.1
severity = "HIGH"
sources = ["nuclei"]
title = "Elasticsearch 远程代码执行漏洞"
updated = "2026-06-17T00:07:37.603"

