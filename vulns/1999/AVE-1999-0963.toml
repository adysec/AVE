[basic]
description = "Cisco Resource Manager (CRM) 1.1及更早版本在安装过程中创建的日志文件和临时文件权限设置不当，本地攻击者可利用不安全的文件权限读取swim_swd.log、swim_debug.log、dbi_debug.log以及DPR_开头的临时文件，从中获取用户名、密码和SNMP团体字符串等敏感配置信息，进而扩大攻击面实施进一步渗透。"
published = "1999-12-31"
remediation = "Cisco Resource Manager (CRM) 1.1及更早版本已停止维护，建议升级到受支持的Cisco网络管理产品；如无法升级，应严格限制本地用户对CRM安装目录及日志文件的读取权限，确保仅授权管理员可访问相关目录，并定期审计文件权限配置。"
score = 2.1
severity = "LOW"
sources = ["cve"]
title = "Cisco Resource Manager 文件权限设置不当致敏感信息泄露漏洞"
updated = "2026-06-16"

