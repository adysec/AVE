[basic]
description = "WU-FTPD 2.6.0 及更早版本的 lreply 函数存在格式化字符串漏洞，未能正确过滤不可信格式化字符串，远程攻击者可通过 SITE EXEC 命令向目标 FTP 服务器发送特制的格式化字符串载荷，触发栈覆盖写入，从而以 root 权限执行任意代码。该漏洞影响 WU-FTPD 2.6.0 及之前所有版本以及 BeroFTPD 1.3.4，CVSS 评分 10.0，危害等级严重。攻击无需身份认证，仅需目标开放 FTP 服务端口即可远程利用。"
published = "2000-07-07T04:00:00.000"
remediation = "升级 wu-ftpd 至 2.6.1 或更高版本以修复格式串漏洞；如无法升级，在 inetd.conf 中注释 wu-ftpd 行并重启 inetd 以禁用服务，或使用 tcp_wrappers 限制可访问 FTP 的源 IP 范围。"
score = 10
severity = "CRITICAL"
sources = ["exploitdb"]
title = "WU-FTPD wu-ftpd 远程格式化字符串漏洞"
updated = "2026-06-16T21:52:01.597"

