[basic]
description = "glFTPD FTP 服务端软件在处理 SITE ZIPCHK 命令时，未对用户输入中的元字符（metacharacters）进行有效过滤与转义，导致已通过认证的本地攻击者可通过向服务端发送包含特殊 shell 元字符的恶意请求，在服务端执行任意系统命令，从而获取超出预期的系统权限。该漏洞影响 glFTPD 相关版本，CVSS 评分 10.0，危害等级严重，需尽快升级或应用补丁修复。"
published = "1999-12-23T05:00:00.000"
remediation = '升级 glFTPD 至 1.24 或更高版本，该版本对 SITE ZIPCHK 等命令的输入进行了严格的元字符过滤。如无法升级，在 glftpd.conf 中添加 "deny-site-command ZIPCHK" 禁用该命令，并限制本地非信任用户对 FTP 服务的访问；同时建议迁移至维护更活跃的 vsftpd 或 ProFTPD 等替代方案。'
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "glFtpD 本地权限提升漏洞"
updated = "2026-06-16T21:50:52.640"

