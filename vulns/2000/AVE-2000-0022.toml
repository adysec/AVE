[basic]
description = "AnalogX SimpleServer:WWW 1.0.1 版本存在缓冲区溢出漏洞。远程攻击者无需身份认证即可向目标服务器发送超长 GET 请求触发缓冲区溢出，导致拒绝服务或在受影响系统上执行任意命令。该漏洞影响 AnalogX SimpleServer:WWW 1.0.1 版本，CVSS 评分 7.5，危害等级高，建议立即升级或限制访问。"
published = "1999-12-31T05:00:00.000"
remediation = "升级 AnalogX SimpleServer:WWW 至 1.0.2 及以上版本，该版本修复了 GET 请求缓冲区溢出漏洞。如产品已停止维护，建议迁移至 ActiveMQ 或 Apache Tomcat 等现代 Web 服务器，并在网络边界限制对该端口的访问。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "AnalogX SimpleServer:WWW HTTP服务器缓冲区溢出漏洞"
updated = "2026-06-16T21:50:49.127"

