[basic]
description = "Cisco Catalyst 系列局域网交换机（包括 Catalyst 2900/1200/5000 系列）的管理员模块软件存在拒绝服务漏洞。远程攻击者无需身份认证即可通过发送特制的网络数据包，强制目标交换机上的管理模块（Supervisor Module）重新加载，导致交换机暂时停止转发网络流量，造成拒绝服务。攻击者只需具备网络连通性即可利用此漏洞，无需任何权限。"
published = "1999-03-01T05:00:00.000"
remediation = "升级 Catalyst 5000 系列交换机 Supervisor 软件至 5.4(1) 或更新版本以修复远程触发 Supervisor 模块重载的拒绝服务漏洞。该系列产品已停止技术支持，建议迁移至当前仍受支持的 Cisco Catalyst 9000 系列交换机以获得持续安全更新。若暂时无法替换设备，可在网络入口 ACL 中限制对 Catalyst 交换机管理接口（SNMP/Telnet/HTTP）的访问来源 IP，仅允许受信任的管理网段连接。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Cisco Catalyst系列LAN交换机远程拒绝服务漏洞"
updated = "2026-06-16T21:48:22.743"

