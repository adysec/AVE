[basic]
description = "OPNsense GeoIP Alias Importer 功能存在任意文件写入漏洞，该功能在处理 `country_code` 字段时未进行路径过滤，攻击者可构造恶意的 GeoIP 数据库，通过包含 `../` 路径遍历序列的 country_code 实现以 Root 权限将文件写入任意位置。结合系统默认的 newsyslog 定时任务可进一步提升为 Root 权限任意代码执行。该漏洞需要 Firewall: Alias: Edit 权限，影响 OPNsense 系统，危害严重。"
published = "1day"
remediation = "立即升级 OPNsense 至最新版本（≥25.7.x），通过 System → Firmware → Updates 检查并安装安全更新。该漏洞已在 GeoIP Alias Importer 模块中添加路径遍历过滤，升级后 country_code 字段将自动过滤 ../ 及其编码变体。若暂时无法升级，可在 Firewall → Aliases → Import 中禁用 GeoIP 数据库自动导入功能，删除已导入的恶意 GeoIP 别名，避免使用不受信任的 GeoIP 数据源（如第三方提供的 mmdb 文件），并临时关闭 Firewall: Alias: Edit 权限以限制攻击面。同时建议定期审计 /var/db/aliases 目录下文件来源的可信度。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "OPNsense GeoIP Alias Importer 任意文件写入致 Root 远程代码执行漏洞"
updated = "1day"

