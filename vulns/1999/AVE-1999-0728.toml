[basic]
description = "SmartDesk WebSuite 2.1 存在缓冲区溢出漏洞，由于对过长 URL 参数处理不当，远程未授权攻击者可发送特制的超长 URL 请求触发栈缓冲区溢出，导致服务拒绝服务（DoS）。该漏洞影响 SmartDesk WebSuite 2.1 版本，CVSS 评分 5.0（中危），攻击无需身份认证，远程发送畸形 HTTP 请求即可触发拒绝服务，导致服务崩溃不可用。官方已停止维护，建议升级替代产品或限制异常长度 URL 访问。"
published = "1999-05-23T04:00:00.000"
remediation = "SmartDesk WebSuite 2.1 已停止维护，官方不再提供安全更新。建议立即升级到不受此漏洞影响的版本或迁移至其他受支持的 Web 服务器软件。临时缓解措施：在网络防火墙或 WAF 上限制对 SmartDesk 服务的 URL 长度不超过 1024 字节，并部署入侵检测规则拦截异常长 URL 请求。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "SmartDesk WebSuite 远程缓冲区溢出漏洞"
updated = "2026-06-16T21:49:20.837"

