[info]
author = "ave"
description = "向存在配置缺陷的 PDG Shopping Cart CGI 程序 shopper.cgi 发送 HTTP GET 请求，检测响应中是否包含购物车订单信息、用户账户资料等敏感数据，确认信息泄露漏洞存在。"
id = "POC-AVE-1999-0180"
name = "PDG Shopping Cart shopper.cgi 配置错误信息泄露 PoC"
severity = "medium"
tags = ["ave-1999-0180"]
vuln_id = [
    "CVE-1999-0608",
    "AVE-1999-0180",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/cgi-bin/shopper.cgi"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "order",
    "Order",
    "credit",
    "Credit",
    "shopper",
    "cart",
    "Cart",
    "customer",
    "Customer",
]

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/shopper.cgi"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "order",
    "Order",
    "credit",
    "Credit",
    "shopper",
    "cart",
    "Cart",
    "customer",
    "Customer",
]

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/shop/shopper.cgi"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "order",
    "Order",
    "credit",
    "Credit",
    "shopper",
    "cart",
    "Cart",
    "customer",
    "Customer",
]
