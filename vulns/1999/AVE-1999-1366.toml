[basic]
description = "HAMcards Postcard CGI 脚本 1.0 存在操作系统命令注入漏洞，远程攻击者无需身份认证即可通过向收件人邮箱地址参数中注入 shell 元字符执行任意系统命令，从而完全控制受影响服务器。该漏洞因程序未对用户输入进行有效过滤导致，任何部署了该 CGI 脚本的 Web 服务器均可能受到影响，CVSS 评分 7.5，危害等级高。"
published = "1998-11-09T05:00:00.000"
remediation = "立即从 Web 服务器中删除或禁用 HAMcards Postcard CGI 脚本（postcard.cgi），该脚本已停止维护且存在 shell 元字符注入漏洞。替代方案：使用 PHP 或 Python 等现代语言重写明信片功能，对收件人邮箱地址做严格白名单过滤（仅允许字母、数字、@、.、-、_），并确保 CGI 进程以最低系统权限运行。如无法立即移除，可在 Apache/Nginx 中限制该脚本仅允许受信任 IP 访问。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "HAMcards Postcard CGI 远程命令执行漏洞"
updated = "2026-06-16T21:49:50.030"

