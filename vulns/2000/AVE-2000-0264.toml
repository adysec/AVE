[basic]
description = "SCO OpenServer 系统中 calserver 组件存在远程栈缓冲区溢出漏洞。calserver 在处理用户输入时未对消息长度进行正确边界检查，未经身份认证的远程攻击者可通过向目标 calserver 服务发送特制的超长消息触发缓冲区溢出，覆盖进程返回地址，从而以 root 权限远程执行任意代码。该漏洞影响 SCO OpenServer 及 SCO UNIX 5 系列操作系统，CVSS v2.0 评分为 10.0，危害等级严重。已有公开的远程利用代码（ExploitDB），攻击者无需认证即可实施攻击，攻击门槛较低。"
published = "2001-03-12T05:00:00.000"
remediation = "立即在防火墙层面禁用 TCP 615 端口（calserver 服务端口），阻止外部对日历服务的访问。在 SCO OpenServer 服务器上停止并禁用 calserver 服务：执行 `/etc/calserver stop` 并注释 `/etc/inetd.conf` 中 calserver 相关行后重启 inetd。由于 SCO OpenServer 已终止支持，建议迁移至受支持的操作系统平台，避免继续在可达网络中使用该产品。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "SCO OpenServer calserver 远程缓冲区溢出漏洞"
updated = "2026-06-16T21:51:26.513"

