[basic]
description = "OpenBSD 2.4 内核网络协议栈中的 ipintr() 函数在处理 IP 碎片重组队列（ipq）时存在缺陷，远程攻击者可通过向目标系统发送特制的畸形 IP 数据包触发该漏洞，导致内核崩溃，造成拒绝服务。该漏洞影响 OpenBSD 2.4 版本，攻击者无需身份认证即可远程利用，但需要一定的网络条件。CVSS v2 评分为 2.6，危害等级低。"
published = "1999-02-19"
remediation = "立即升级到 OpenBSD 2.5 或更高版本。如无法升级，请为 OpenBSD 2.4 依次安装 maxqueue 补丁、tcp decoding 补丁和 ipintr 补丁（编号 006），补丁可从 ftp.openbsd.org/pub/OpenBSD/patches/2.4/common/ 获取。也可在边界防火墙上限制对受影响主机的 IP 分片流量作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "OpenBSD 2.4 ipintr 拒绝服务漏洞"
updated = "1999-02-19"

