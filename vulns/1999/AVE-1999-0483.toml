[basic]
description = "Vixie Cron 的 MAILTO 环境变量处理存在缓冲区溢出漏洞。本地攻击者可通过设置超长 MAILTO 环境变量触发缓冲区溢出，从而以 root 权限执行任意代码。该漏洞影响 RedHat Linux 4.2/5.2/6.0 及 S.u.S.E Linux 6.0/6.1 等版本，CVSS 评分 7.5，危害等级高。攻击者需拥有本地系统访问权限，利用难度较低，已有公开利用代码。"
published = "1999-08-25T04:00:00.000"
remediation = "升级至包含MAILTO安全修复的最新Vixie Cron版本（如cronie或fixcron 4.0及以上版本），通过/etc/cron.deny或MAILTO参数白名单机制限制危及环境变量的使用，同时在危急环境中临时禁用MAILTO功能以缓解风险"
score = 7.5
severity = "HIGH"
sources = ["exploitdb"]
title = "Red Hat Linux 缓冲区溢出漏洞"
updated = "2026-06-16T21:49:01.067"

