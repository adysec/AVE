[basic]
description = "Wazuh 4.4.0 至 4.9.0 版本中存在不安全反序列化漏洞（CWE-502）。攻击者通过 API 向 DistributedAPI 请求/响应注入恶意字典，利用 `as_wazuh_object` 函数在处理 `__unhandled_exc__` 时执行任意 Python 代码，导致远程代码执行。任何具备 API 访问权限的用户（包括被攻破的仪表盘、集群内 Wazuh 服务器，特定配置下甚至被攻破的 Agent）均可触发。CVSS 9.9，危害严重。厂商已在 4.9.1 版本中修复。"
published = "2025-02-10T20:15:42.540"
remediation = "立即升级 Wazuh 服务器至 v4.9.1 或更高版本，该版本在 `framework/wazuh/core/cluster/common.py` 中修复了 `as_wazuh_object` 反序列化函数对不可信输入的校验缺陷。在升级前，可在 Wazuh  dashboard 和集群节点间启用严格 API 访问控制（限制 `security/user/authenticate/run_as` 端点的来源 IP），并隔离受损 agent 避免其触发 DAPI 请求。"
score = 9.9
severity = "CRITICAL"
sources = ["hwpoc"]
title = "Wazuh Wazuh服务器反序列化远程代码执行漏洞"
updated = "2026-06-17T08:57:53.677"

