[basic]
description = "Selena Sol WebBanner 4.0 存在路径遍历漏洞，远程攻击者可通过向 WebBanner 脚本发送包含 `..`（点点）序列的特制请求，绕过路径限制读取服务器上的任意文件。该漏洞源于程序未对用户输入的文件路径进行充分过滤，导致攻击者可利用目录穿越技术访问 `/etc/passwd` 等敏感文件。此漏洞影响 WebBanner 4.0 版本，CVSS 评分 5.1，危害等级中危，攻击复杂度较低且无需身份认证。"
published = "2000-02-02T05:00:00.000"
remediation = "WebBanner 4.0 已停止维护，官方不再发布安全更新。建议立即将 WebBanner 替换为活跃维护的替代方案（如 Apache httpd），或手动过滤用户输入中的 `..` 路径穿越序列；若必须继续使用，在 Web 服务器反向代理层配置 URL 重写规则，拒绝包含 `../` 或 `..%2f` 的请求路径。"
score = 5.1
severity = "MEDIUM"
sources = ["cve"]
title = "Selena Sol WebBanner 目录遍历漏洞"
updated = "2026-06-16T21:51:48.070"

