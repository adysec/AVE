[basic]
description = "SCO UnixWare 7.0/7.0.1/7.1/7.1.1 系统中的 uidadmin 工具存在符号链接（symlink）攻击漏洞。本地低权限用户可通过创建指向敏感系统文件的符号链接，诱使以 root 权限运行的 uidadmin 进程写入该链接所指向的文件，从而修改任意系统文件并实现本地权限提升至 root。该漏洞影响 SCO UnixWare 7.x 多个版本，攻击者需具备本地登录权限方可利用成功。"
published = "1998-12-02T05:00:00.000"
remediation = "升级到 SCO UnixWare 7.1.1 并应用 SCO 官方安全补丁（ptf7619d 等），或通过 `pkgupdate` 安装对应安全补丁包。如暂无法升级，可用 `chmod 0750 /usr/sbin/uidadmin` 移除 setuid 位并限制仅 root 可执行，同时用 `chroot`/文件系统挂载 `nosuid` 作为临时缓解措施，并审计 `/etc/passwd`、`/etc/shadow` 等敏感文件权限防止被符号链接篡改。"
score = 10
severity = "CRITICAL"
sources = ["exploitdb"]
title = "SCO Unixware 7.0/7.1 uidadmin 本地权限提升漏洞"
updated = "2026-06-16T21:49:09.557"

