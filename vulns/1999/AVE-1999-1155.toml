[basic]
description = "Gene6 G6 FTP Server 2.0 在处理 FTP 登录过程的用户名与密码参数时，未对输入长度进行合理限制。远程攻击者可在未认证的情况下，向 FTP 服务发送超长的用户名或超长的密码请求，导致服务器端分配异常资源并耗尽系统资源，最终使 FTP 服务停止响应，造成拒绝服务。该漏洞无需身份认证，攻击条件仅是能够与目标 21 端口建立网络连接，利用门槛低、危害集中于服务可用性。"
published = "1999-11-17"
remediation = "建议升级到 Gene6 G6 FTP Server 后续修复版本；如无法立即升级，应在防火墙或边界设备上限制仅允许可信 IP 访问 21 端口，并在 FTP 服务配置中对用户名与密码长度设置上限、拒绝畸形超长请求，同时启用最大连接数与连接速率限制以缓解资源耗尽风险。"
score = 5.0
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Gene6 G6 FTP Server 2.0 超长用户名或密码导致资源耗尽拒绝服务漏洞"
updated = "2026-06-16"

