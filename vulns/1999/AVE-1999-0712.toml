[basic]
description = "FreeBSD 3.0、3.1 及 3.2 版本的虚拟文件系统名称缓存（vfs_cache）存在缺陷，本地已登录用户可通过在系统中大量打开文件，使 vfs_cache 缓存条目无限制增长，耗尽内核内存资源，最终导致系统拒绝服务（DoS）。该漏洞影响上述 FreeBSD 版本，攻击条件为攻击者需在目标主机上拥有本地普通用户权限，利用方式是通过编写脚本或程序持续打开大量文件触发缓存膨胀，造成系统性能严重下降或崩溃，CVSS 评分为 2.1，危害等级低。"
published = "1999-09-22T04:00:00.000"
remediation = "升级到 FreeBSD 3.3-RELEASE 或更高版本以修复 vfs_cache 缺陷；若无法立即升级，可通过重新编译内核并应用 FreeBSD 官方发布的 vfs_cache 源码补丁（sys/kern/vfs_cache.c），或限制普通用户可打开的文件数量（调低 kern.maxfilesperproc 并配置 login.conf 的 openfiles 上限）作为临时缓解措施。"
score = 2.1
severity = "LOW"
sources = ["exploitdb"]
title = "FreeBSD VFS 缓存拒绝服务漏洞"
updated = "2026-06-16T21:49:18.920"

