[basic]
description = "Linux 内核 ACPI 处理器空闲管理子系统中存在空指针解引用漏洞，由于 acpi_fetch_acpi_dev() 函数返回值未经验证直接传入 acpi_device_hid() 使用，导致 NULL 指针解引用，造成内核崩溃。本地攻击者可利用该漏洞发起拒绝服务攻击，影响使用 ACPI 的 Linux 系统。该漏洞需本地低权限访问，CVSS 评分 5.5，危害等级中等。"
published = "2025-09-15T15:15:44.827"
remediation = "升级 Linux 内核至修复版本：5.4.297、5.10.241、5.15.190、6.0.16、6.1.2 或更高版本（6.2 及以上不受影响）。该漏洞位于 drivers/acpi/processor_idle.c，acpi_fetch_acpi_dev() 返回值未经验证即传入 acpi_device_hid() 导致空指针解引用，需合入对应稳定分支的 backport 补丁。"
score = 5.5
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux Kernel ACPI Processor Idle 空指针解引用漏洞"
updated = "2026-06-17T05:23:14.580"

