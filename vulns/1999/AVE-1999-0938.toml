[basic]
description = "Microsoft NetMeeting 2.1 存在信息泄露漏洞，远程攻击者可通过在聊天窗口为空时发送 CTRL-C 组合键，读取另一客户端剪贴板中的敏感内容。该漏洞源于 NetMeeting 对剪贴板访问权限控制不足，导致攻击者可跨会话获取用户复制到剪贴板的密码、文件路径等私密信息，影响使用 NetMeeting 2.1 版本的 Windows 系统，CVSS 评分 6.4，危害等级中危。"
published = "1999-05-04T04:00:00.000"
remediation = "升级到 Microsoft NetMeeting 2.2 或更高版本，该漏洞已在 2.2 版中得到修复。如无法升级，在召开会议时避免使用聊天窗口，或在空白聊天框中按下 Ctrl-C 前先清空本地剪贴板。鉴于 NetMeeting 已被 Microsoft 正式停止支持并从 Windows 中移除，建议迁移至 Microsoft Teams 或 Skype for Business 等受支持的现代协作工具。"
score = 6.4
severity = "MEDIUM"
sources = ["epss"]
title = "Microsoft NetMeeting 剪贴板信息泄露漏洞"
updated = "2026-06-16T21:49:42.933"

