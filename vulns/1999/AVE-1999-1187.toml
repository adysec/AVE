[basic]
description = "FreeBSD 3.2 及可能其他版本的 NFS v3 客户端实现中存在拒绝服务漏洞。本地用户可通过创建大量进程并发访问 NFS v3 挂载目录，触发内核 panic 导致系统崩溃。攻击者需具备本地 shell 访问权限，无需特殊权限即可利用，但无法实现提权或代码执行。该漏洞影响 FreeBSD 3.2 及更早版本，属于本地拒绝服务类漏洞。"
published = "1999-09-02T04:00:00.000"
remediation = "建议升级 FreeBSD 至 3.3 或更高版本，该版本已修复大量 NFS 并发访问导致的 panic 问题。如无法升级，可通过限制本地用户的进程数上限（在 /etc/login.conf 中设置 maxproc）来降低触发概率，并避免将 NFS v3 共享挂载点暴露给不可信本地用户。"
score = 2.1
severity = "LOW"
sources = ["avd"]
title = "FreeBSD NFS v3 本地拒绝服务漏洞"
updated = "2026-06-16T21:50:43.607"

