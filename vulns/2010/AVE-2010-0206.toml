[basic]
description = "JBoss 中间件的 JMX-Console 管理控制台存在访问控制缺陷，仅对 GET 和 POST 方法实施了权限校验，攻击者可通过 PUT、DELETE 等其他 HTTP 方法绕过认证，直接访问 DeploymentFileRepository 的 GET 处理程序，进而上传并部署恶意 WAR 文件实现远程代码执行。该漏洞影响 JBoss EAP 4.2.0.CP09 之前及 4.3.0.CP08 之前的版本，CVSS 评分 5.3，危害等级中危。建议升级至修复版本或禁用 JMX-Console 对外暴露。"
published = "2010-04-28T22:30:00.447"
remediation = "升级 Red Hat JBoss EAP 至 4.2.0.CP09 或 4.3.0.CP08 及以上版本（对应 RHSA-2010-0376/0377/0378/0379）。临时缓解措施：在反向代理或防火墙层面限制对 /jmx-console/ 路径的访问，仅允许可信 IP 访问，或禁用 JMX-Console 的 HTTP 非 GET/POST 方法。"
score = 5.3
severity = "MEDIUM"
sources = ["kev"]
title = "Red Hat JBoss 企业应用平台 JMX-Console 权限绕过漏洞"
updated = "2026-06-16T23:16:45.067"

