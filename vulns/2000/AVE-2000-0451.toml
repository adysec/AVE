[basic]
description = "Sybergen Sygate 2.0/3.11 网络安全软件存在协议处理缺陷，攻击者可构造恶意 DNS UDP 报文发送至目标系统内部接口。该漏洞源于该软件对 DNS 协议报文合法性验证不足，当接收到包含特殊结构或超长数据的 UDP 包时，会导致核心网络处理模块出现严重资源耗尽或崩溃。受影响产品涵盖 Sygate 2.0 和 3.11 所有版本，攻击者无需身份验证即可远程触发，一旦成功利用，将导致系统网络服务完全不可用，用户无法正常访问网络资源，甚至可能引发服务长时间中断。该攻击过程相对简单，攻击者仅需编制包含畸形 DNS 标头和异常长度数据的 UDP 报文，并将其发送到 Sygate 监听的内部网络接口即可，系统会因缓冲区溢出或其他资源分配错误而出现宕机，攻击者无需执行任何代码，但能造成严重的服务毁坏后果。因此，该漏洞对基于 Sygate 进行网络防护的组织构成严重威胁。官方安全公告已详细记录这一问题，建议立即更新到最新版本或采取手动修复措施，以缓解该安全风险。相关漏洞报告于 2000 年 6 月发布，编号 CVE-2000-0569， CVSS 评分 5.0，反映其中等严重性，但实际影响可能因具体网络环境和 Sygate 配置而异。参考 ExploitDB 公开的攻击样本 20051 进一步证实了这一漏洞的可利用性。属 network_service 漏洞类型。"
published = "2000-06-30T04:00:00.000"
remediation = "建议立即升级 Sybergen Sygate 至 4.0 及以上版本（Symantec 收购后发布的版本），或在防火墙/路由器层面配置规则丢弃发往内部接口 UDP 53 端口的异常 DNS 数据包（如异常标志位、异常长度），并限制内部接口仅允许受信任 DNS 服务器 IP 访问 UDP 53 端口作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Sybergen Sygate DNS 数据包拒绝服务漏洞"
updated = "2026-06-16T21:52:01.067"

