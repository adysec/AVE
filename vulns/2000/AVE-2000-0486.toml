title = "HP JetDirect J3111A - 无效FTP命令导致打印机拒绝服务"
description = "该漏洞源于HP JetDirect打印机（G.08.20和H.08.20及更早版本）的FTP服务在处理恶意构建的FTP参数时存在缺陷。远程攻击者可构造非法FTP命令并发送至打印机执行，利用参数解析错误的漏洞触发服务崩溃或重启，导致打印机无法正常工作。这种攻击无需认证即可实现，对打印机网络可用性构成严重威胁。受影响设备在网络中普遍存在，尤其是在企业打印环境中，攻击者可远程发起 denial-of-service攻击，造成业务中断。"
