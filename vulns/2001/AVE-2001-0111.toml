[basic]
description = "ncompress 4.2.4 及更早版本的 comprexx 函数中存在栈缓冲区溢出漏洞。当该工具被用于跨越安全边界的场景（如 FTP 服务器处理文件名时），远程攻击者可通过提交超长文件名参数触发缓冲区溢出，导致任意代码执行。该漏洞影响广泛使用 ncompress 的 Unix/Linux 系统，CVSS 评分 7.5，危害等级高。建议升级至 4.2.4 以上版本或应用厂商补丁。"
published = "2004-12-23T05:00:00.000"
remediation = '升级 ncompress 至 4.2.4-r1 或更高版本。Gentoo 系统执行 `emerge ">=app-arch/ncompress-4.2.4-r1"`；Red Hat 系统安装 RHSA-2004-536 提供的更新包。如无法立即升级，可在服务层面限制调用 compress/uncompress 的守护进程（如 FTP 服务器）的输入参数长度作为临时缓解。'
score = 7.5
severity = "HIGH"
sources = ["osv"]
title = "ncompress 缓冲区溢出远程代码执行漏洞"
updated = "2026-06-16T21:56:13.530"

