[basic]
description = "XFree86 X11R6 的 Xserver 在处理 TCP 数据包时存在拒绝服务漏洞，远程攻击者可向目标系统端口 6000 发送特制的恶意 TCP 数据包，其中包含负计数器值，导致 Xserver 崩溃。该漏洞影响 XFree86 3.3.x 及 4.0 版本，攻击者无需身份认证即可触发，属于低复杂度攻击。"
published = "2000-05-18T04:00:00.000"
remediation = "升级 XFree86 至 4.0.1 或更高版本，或迁移至 X.Org Server（XFree86 已停止维护）。在防火墙层面限制 TCP 6000 端口的入站连接，仅允许受信任的本地网络访问。使用 SSH X11 转发替代直接 TCP 连接以降低暴露面。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "XFree86 X11R6 TCP 数据包拒绝服务漏洞"
updated = "2026-06-16T21:51:46.020"

