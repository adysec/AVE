[basic]
description = "xinetd 2.1.8.x 及更早版本（2.1.87 至 2.1.89_pre5）在基于主机名进行访问控制时存在访问控制绕过漏洞。当配置文件使用 `only_from` 等基于主机名的访问控制限制服务连接时，xinetd 依赖反向 DNS 解析来验证连接来源主机的身份。若发起连接的主机没有对应的反向 DNS 条目（PTR 记录），xinetd 无法正确完成主机名解析验证，导致访问控制限制被绕过，使得该主机可以不受限制地访问本应对其封禁的服务。该漏洞影响使用 xinetd 作为超级服务的 Linux/UNIX 系统，CVSS 评分 7.5，危害等级为高。攻击者可利用此缺陷从网络远程无认证地连接到受控服务，造成信息泄露、数据篡改或服务不可用等 partially 影响。Debian 于 2000 年 6 月 19 日发布安全公告确认此漏洞，synack.net 提供了补丁修复该逆向 DNS 验证逻辑缺陷。"
published = "2000-06-04T04:00:00.000"
remediation = "升级 xinetd 至 2.1.8.9pre6 或更高版本，该版本修复了 only_from 和 no_access 指令在主机名条件下对缺少反向 DNS 条目主机的访问控制缺陷。临时缓解措施：在 xinetd.conf 的 only_from/no_access 访问控制列表中使用 IP 地址而非主机名，或确保所有允许访问的主机均配置正确的反向 DNS（PTR）记录。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "xinetd 基于主机名的访问控制绕过漏洞"
updated = "2026-06-16T21:51:56.867"

