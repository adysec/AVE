[basic]
description = "金和 OA 系统的 jc6_ntko-upload 组件存在任意文件上传漏洞。攻击者可通过向 /jc6/ntkoUpload/ntko-upload!upload.action 路径发送特制的 multipart/form-data POST 请求，在 filename 参数中使用路径穿越序列（如 ../../../../）将恶意文件上传至 Web 可访问目录，进而上传 Webshell 实现远程代码执行。该漏洞影响部署金和 OA jc6 版本的服务器，攻击者无需身份认证即可利用。成功利用后可完全控制目标服务器，窃取敏感数据或进一步渗透内网。"
published = "0725"
remediation = "建议立即升级金和OA至最新版本（V6.1 SP1 及以上），或联系金和厂商获取针对 ntko-upload 接口的补丁包。临时缓解：在 WAF/网关层拦截含 `../` 路径遍历的 multipart 请求，禁用 `/jc6/ntkoUpload/` 目录的写入权限，限制上传文件类型仅允许图片/文档并二次校验 Content-Type。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "金和 金和OA jc6 ntko-upload 任意文件上传漏洞"
updated = "0725"

