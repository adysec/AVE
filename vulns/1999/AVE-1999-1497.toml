[basic]
description = "IBM Tivoli OPC Tracker Agent 1.0x/2.0x/3.0x 版本存在拒绝服务漏洞。远程攻击者可通过向 localtracker 客户端端口（5011）发送特制的畸形数据，导致系统资源耗尽，连接无法正常关闭，最终造成服务不可用。该漏洞无需身份认证即可远程触发，影响 IBM Tivoli OPC Tracker Agent 全系列版本。"
published = "1998-10-02T04:00:00.000"
remediation = "升级 IBM Tivoli OPC Tracker Agent 至不受影响的版本；如产品已停止支持，建议迁移至替代产品。同时在防火墙层面限制对 TCP 端口 5011 的访问，仅允许可信 IP 段连接，并启用主机防火墙或 TCP Wrappers 做访问控制，防止未授权远程攻击者发送畸形数据导致资源耗尽。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "IBM Tivoli OPC Tracker Agent 拒绝服务漏洞"
updated = "2026-06-16T21:50:22.097"

