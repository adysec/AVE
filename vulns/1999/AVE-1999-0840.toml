[basic]
description = "Windows NT 系统用户审计策略存在配置缺失漏洞，系统未对登录与注销、文件与对象访问、用户权限使用、用户与组管理、安全策略变更、系统重启与关机以及进程跟踪等关键安全事件记录成功或失败日志。该漏洞影响所有采用默认审计配置的 Windows NT 系统，攻击条件为系统审计策略未正确启用事件记录。攻击者可利用此漏洞进行未经授权的访问、权限提升或配置篡改等恶意操作，且所有行为均不会在安全日志中留下记录，导致安全管理员无法通过审计日志检测入侵事件、追溯攻击来源或进行事后取证分析，严重削弱了系统的安全监控与事件响应能力。"
published = "1997-01-01T05:00:00.000"
remediation = '在 Windows NT 中打开「用户管理器」→「策略」→「审核」，勾选"审核这些事件"并至少启用"登录及注销""文件及对象访问""用户权限的使用""用户及组管理""安全策略更改""重新启动、关机及系统"的成功与失败审核，运行 `auditpol /enable` 或重启使策略生效；对无法立即配置的域环境，通过域控制器组策略统一下发审核策略，并定期导出安全日志至集中日志服务器留存。'
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "Microsoft Windows NT 安全审计策略配置不当漏洞"
updated = "2026-06-16T21:48:39.760"

