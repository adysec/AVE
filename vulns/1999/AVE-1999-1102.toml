[basic]
description = "IBM Netfinity Remote Control（远程控制软件）1.0 版本存在权限提升漏洞。该软件内置的进程管理器以系统级（SYSTEM）权限运行，本地已登录的普通用户可在进程管理器中直接启动任意程序，由于所启动的程序会继承该管理器的系统级权限，普通用户借此能够执行本无权运行的操作，从而获取本地管理员权限。该漏洞影响运行 IBM Netfinity Remote Control 1.0 的本地系统，攻击条件为攻击者需具备目标主机的本地登录权限，利用方式为在软件进程管理器界面中启动恶意或任意程序以实现权限提升。"
published = "1999-05-25T04:00:00.000"
remediation = "建议立即卸载 IBM Netfinity Remote Control Software 1.0 或升级至 IBM Director 4.1 及以上版本（已修复该权限提升漏洞）。若无法卸载，请通过组策略限制普通用户访问进程管理器，并限制普通用户启动系统级进程的权限，同时在防火墙层面限制远程控制服务端口（默认 80/443）仅允许管理员 IP 访问作为临时缓解措施。"
score = 7.2
severity = "HIGH"
sources = ["exploitdb"]
title = "IBM 远程控制软件 1.0 代码执行及权限提升漏洞"
updated = "2026-06-16T21:50:23.410"

