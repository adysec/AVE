[info]
author = "ave"
description = "验证 Windows Media Player 7.0 WMP ActiveX 控件的 Frame Domain Verification 漏洞变种。通过嵌入 CLSID:6BF52A52-394A-11D3-B153-00C04F79FAA6 的 ActiveX 控件，设置 defaultFrame 参数并调用 launchURL 方法执行 javascript: URL，可绕过 IE 域限制读取本地文件或执行任意命令。"
id = "POC-AVE-2001-0056"
name = "Microsoft Windows Media Player 7.0 ActiveX Frame Domain Verification PoC"
severity = "high"
tags = ["ave-2001-0056"]
vuln_id = [
    "CVE-2001-0148",
    "AVE-2001-0056",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/wmp7-poc.html"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["6BF52A52-394A-11D3-B153-00C04F79FAA6"]
