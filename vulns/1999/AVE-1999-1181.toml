[basic]
description = "Xylan OmniSwitch 3.2.6 之前版本存在登录认证绕过漏洞。远程攻击者可通过在登录提示符处发送 CTRL-D 控制字符绕过身份验证，由于该设备仅支持单会话同时登录，此操作将导致其他合法用户被锁定无法访问交换机管理界面，造成拒绝服务。攻击无需认证即可远程触发，影响设备可用性。"
published = "1999-03-31T05:00:00.000"
remediation = "立即将 Xylan OmniSwitch 升级至 3.2.6 或更高版本，该版本修复了 CTRL-D 字符绕过登录提示的缺陷。如无法升级，可在网络层面配置 ACL，限制仅信任 IP 地址可访问交换机的管理端口（如 telnet/SSH 端口），防止未授权远程连接。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Xylan OmniSwitch 登录提示符拒绝服务漏洞"
updated = "2026-06-16T21:50:42.983"

