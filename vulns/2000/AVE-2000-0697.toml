[basic]
description = "Sun HotJava Browser 3.0 存在跨窗口 DOM 未授权访问漏洞。远程攻击者可通过在命名窗口中打开 javascript: URL，绕过同源策略限制，跨域访问目标网页的文档对象模型（DOM），进而窃取页面中的敏感信息如 Cookie、会话令牌及表单数据。攻击条件简单，仅需诱导用户访问恶意链接，无需身份认证。该漏洞影响 HotJava Browser 3.0 版本，危害等级中等。"
published = "2000-12-19T05:00:00.000"
remediation = "立即停止使用已停止维护的 Sun HotJava Browser 3.0，更换为现代主流浏览器（如 Firefox、Chrome）并保持自动更新。该浏览器已于 2000 年代停止支持，无安全补丁可用，继续使用将面临 DOM 访问、跨站脚本攻击等多重风险。作为临时缓解措施，可在浏览器设置中禁用 JavaScript 支持。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Sun HotJava Browser 3.0 任意DOM访问漏洞"
updated = "2026-06-16T21:52:51.370"

