[basic]
description = "Symantec pcAnywhere 9.x 版本在默认配置下采用了强度不足的弱加密算法对会话凭据进行保护，未能提供足够的安全保障。未经身份认证的远程攻击者在能够监听网络流量的条件下，可通过嗅探（sniff）目标与服务器之间的通信数据包，利用该弱加密机制还原并解密出 pcAnywhere 账户或 Windows NT 域账户的明文凭据。该漏洞影响使用默认加密方式的 pcAnywhere 9.0 等 9.x 系列产品，攻击前提是攻击者需处于可截获通信链路的网络位置（如同一局域网或中间人位置），通过被动抓包结合离线解密即可完成凭据窃取，进而可被用于进一步的未授权登录与横向移动。"
published = "2000-04-06T04:00:00.000"
remediation = "升级到 Symantec pcAnywhere 9.0.1 或更高版本，安装官方安全补丁以启用强加密算法。在 pcAnywhere 会话设置中选择 AES 或 3DES 加密替代默认弱加密。如暂无法升级，应通过 IPSec VPN 隧道封装远程连接，并在防火墙层限制 pcAnywhere 端口仅允许可信 IP 访问。"
score = 10
severity = "CRITICAL"
sources = ["exploitdb"]
title = "Symantec pcAnywhere 弱加密远程信息泄露漏洞"
updated = "2026-06-16T21:51:25.770"

