[basic]
description = "GNU fingerd 1.37 存在权限处理不当漏洞，程序在访问用户信息前未能正确放弃特权，导致本地攻击者可通过两种方式利用：一是在 .fingerrc 文件中放置恶意程序获取 root 权限；二是利用 .plan、.forward 或 .project 文件的符号链接读取系统任意文件。该漏洞影响 GNU fingerd 1.37 版本，CVSS 评分 7.2，危害等级高，需手动修复或禁用 finger 服务。"
published = "1999-07-21T04:00:00.000"
remediation = "建议立即升级 GNU fingerd 至 1.37 以上版本，该版本已修复权限提升漏洞。更推荐的方案是直接禁用 finger 服务（systemctl disable fingerd 或在 inetd/xinetd 配置中注释 finger 行），因为该服务在现代网络环境中已无必要且存在安全隐患。如必须使用，应限制 .plan/.forward/.project 等文件的写权限，禁止普通用户在这些文件中使用符号链接，并删除 .fingerrc 文件的可执行权限以防止恶意程序执行。"
score = 7.2
severity = "HIGH"
sources = ["cve"]
title = "GNU fingerd 任意文件读取漏洞"
updated = "2026-06-16T21:49:51.533"

