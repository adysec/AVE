[basic]
description = "Linux 内核 x86 架构 clear_user_rep_good() 函数存在异常处理注释位置错误漏洞。该函数将异常表条目指向寄存器移动指令而非实际的用户空间内存访问指令 `rep movsb`，导致用户空间访问触发异常时，异常处理程序无法在异常表中定位到对应条目，系统无法正常返回 -EFAULT，转而触发内核崩溃（kernel oops），可被本地攻击者利用构造拒绝服务攻击。该漏洞影响 Linux 内核 x86 架构多个版本，CVSS 评分 5.5，危害等级中等。"
published = "2025-10-07T16:15:47.517"
remediation = "升级 Linux 内核至包含 commit d2c95f9d6802 的版本（如 6.2+），或至少 cherry-pick 该提交及依赖的 e046fe5a36a9。对于无法升级内核的生产环境，可临时限制未授权用户对 ext4 等文件系统的预读操作（preadv2）以降低触发概率，但根本修复仍需内核补丁。"
score = 5.5
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux Kernel x86 clear_user_rep_good() 异常处理标注缺陷导致内核崩溃漏洞"
updated = "2026-06-17T06:45:46.813"

