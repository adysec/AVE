[info]
author = "AVE"
description = "检测 Debian GNU/Linux 2.1 上 Apache 的 /doc/ 别名是否暴露 /usr/doc 目录。如果返回 200 OK（非 404），说明 ServerRoot 被不安全地设置为 /usr/doc，存在信息泄露风险。"
id = "POC-AVE-1999-1016"
name = "CVE-1999-0678 Apache Debian /usr/doc 信息泄露"
severity = "medium"
tags = ["ave-1999-1016"]
vuln_id = [
    "CVE-1999-0678",
    "AVE-1999-1016",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/doc/"
protocol = "http"

[[poc.requests.matchers]]
expect = true
status = [200]
type = "status"
