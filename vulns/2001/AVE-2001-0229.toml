[basic]
description = "Drummond Miles A1Stats 1.0 及更早版本中存在目录遍历漏洞，远程攻击者可通过向 a1disp2.cgi、a1disp3.cgi 或 a1disp4.cgi 脚本发送包含 '..'（点点）序列的特制请求，利用路径遍历攻击读取服务器上的任意文件。该漏洞影响 A1Stats 1.6 之前的所有版本，攻击者无需认证即可远程利用，可能导致敏感信息泄露（如配置文件、系统文件等），CVSS 评分 7.5，危害等级高。官方已发布 1.6 版本修复此问题，建议用户升级至最新版本。"
published = "2001-08-14T04:00:00.000"
remediation = '升级 A1Stats 至 1.6 或更高版本，该版本已修复 a1disp2.cgi、a1disp3.cgi、a1disp4.cgi 中的目录遍历漏洞。如无法升级，在 Web 服务器层面对上述 CGI 脚本的输入参数进行过滤，禁止包含 "../" 等路径穿越字符，并限制 CGI 脚本对文件系统的访问权限。'
score = 7.5
severity = "HIGH"
sources = ["exploitdb"]
title = "Drummond Miles A1Stats 目录遍历漏洞"
updated = "2026-06-16T21:54:32.250"

