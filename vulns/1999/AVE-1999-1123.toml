[basic]
description = "Internet Explorer 3.02 及 4.0 版本存在页面重定向认证信息泄露漏洞。当用户访问一个恶意网站时，该网站可将浏览器重定向至攻击者控制的第三方站点，而浏览器会自动将用户在原站点的认证信息（如 NTLM 凭据）发送给重定向目标站点，导致敏感认证信息泄露。攻击者无需特殊权限，仅需诱导用户访问恶意链接即可利用该漏洞。此漏洞影响范围广泛，可导致用户账户凭据被窃取。"
published = "1999-12-31T05:00:00.000"
remediation = "立即升级 Internet Explorer 至 5.0 及以上版本，该漏洞已在 IE 5.0 中修复。对于无法升级的旧系统，可配置 IE 安全区域为「高」级别并禁用跨域访问自动传递凭据的选项。同时建议在代理服务器或网关层面过滤 HTTP Referer 头中的认证信息，防止重定向场景下凭据泄露。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Microsoft Internet Explorer 页面重定向认证信息泄露漏洞"
updated = "2026-06-16T21:50:31.017"

