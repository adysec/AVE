[basic]
description = "Linux 内核 AF_UNIX 套接字实现中的 unix_stream_sendpage() 函数存在空指针解引用漏洞。当对端文件描述符在套接字间循环传递时，垃圾回收机制在未加锁情况下释放 skb，而 unix_stream_sendpage() 同时无锁访问对端接收队列尾部的 skb，导致 use-after-free 和空指针解引用。本地攻击者可通过特制系统调用触发此竞态条件，导致内核崩溃拒绝服务。该漏洞影响 Linux 6.5 以下所有包含 unix_stream_sendpage 的内核版本。"
published = "2025-12-24"
remediation = "立即升级 Linux 内核至包含补丁 d39fc9b94dc0 的稳定版本（如 6.1.46+），或直接升级至 6.5 及以上版本（6.5+ 因 sendpage 重构已天然免疫此漏洞）。Debian/Ubuntu 运行 apt update && apt upgrade linux-image 后重启；RHEL/CentOS 运行 yum update kernel 后重启。如无法立即升级，可通过 seccomp 策略拦截 sendfile 系统调用中涉及 AF_UNIX 套接字的路径作为临时缓解。"
score = 5.5
severity = "MEDIUM"
sources = ["cve"]
title = "Linux Kernel af_unix 空指针解引用漏洞"
updated = "2025-12-29"

