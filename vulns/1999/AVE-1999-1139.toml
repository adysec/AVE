[basic]
description = "FreeBSD 2.2 系统中 NFS 文件系统存在链接跟随漏洞，本地攻击者可通过将设备特殊文件硬链接到 NFS 文件系统上的普通文件，导致目标系统在访问该链接时发生拒绝服务。该漏洞源于内核在处理跨文件系统硬链接时未正确验证设备文件类型，影响 FreeBSD 2.2 版本，CVSS 评分 5.5，危害等级中危。"
published = "1998-06-16"
remediation = "升级到 FreeBSD 3.0 或更高版本，该漏洞已在后续版本中修复。如无法升级，可在 /etc/exports 中使用 -maproot=root 选项限制 NFS 导出的设备文件访问，或通过 sysctl 设置 kern.sugid_coredump=0 并限制本地用户对设备节点的硬链接创建权限。"
score = 5.5
severity = "MEDIUM"
sources = [
    "cve",
    "avd",
]
title = "FreeBSD 2.2 NFS 设备文件链接拒绝服务漏洞"
updated = "2026-06-16"

