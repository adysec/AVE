[basic]
description = "Microsoft Outlook 97/98/2000 及 Outlook Express 4.0/5.0 的邮件头处理组件存在缓冲区溢出漏洞。远程攻击者可通过向目标用户发送包含超长 Date（GMT）字段的恶意邮件，触发缓冲区溢出，导致任意代码执行。攻击者成功利用该漏洞可完全控制受影响系统。该漏洞影响广泛使用的邮件客户端，CVSS 评分 5.0，危害等级中等。"
published = "2000-07-18T04:00:00.000"
remediation = "立即安装 Microsoft 安全公告 MS00-043 提供的补丁（KB267884），或将 Internet Explorer 升级至 5.01 Service Pack 1 或 5.5 版本（默认安装即包含修复后的 Outlook Express 5.5 及 Inetcomm.dll）。Outlook 用户可临时将邮件协议切换为纯 MAPI 模式（仅与 Exchange Server 配合使用）以降低风险，但建议仍安装补丁彻底修复。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Microsoft Outlook / Outlook Express 邮件头 Date 字段缓冲区溢出漏洞"
updated = "2026-06-16T21:52:00.813"

