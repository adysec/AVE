[basic]
description = "Red Hat Linux 6.0 与 6.1 中自带的 linuxconf 程序存在安全缺陷，其提供的 CGI 接口在处理请求时未对用户输入进行充分校验，攻击者可构造特定的 HTTP 请求访问 /lcfg 等路径，从而读取系统中的配置文件与敏感信息，导致信息泄露，攻击仅需向目标 Web 服务发送特制请求即可完成。"
published = "2000-02-22"
remediation = "升级 linuxconf 至官方修复版本（Red Hat 6.1 更新后可修复），或移除 Web 服务器中 linuxconf 的 CGI 脚本并禁用相关访问路径，限制 /lcfg 等敏感路径的外部访问。"
score = 5.0
severity = "MEDIUM"
sources = ["cve"]
title = "Red Hat Linux 6.0/6.1 Linuxconf 程序 CGI 信息泄露漏洞"
updated = "2000-02-22"

