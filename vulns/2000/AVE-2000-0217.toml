[basic]
description = "Atrium Software Mercur WebView WebMail 服务器（1.0 版本）在处理 HTTP GET 请求时，对 mail_user 参数未做长度校验，存在缓冲区溢出漏洞。未经身份认证的远程攻击者只需向目标服务器发送包含超长 mail_user 参数的特制 GET 请求，即可触发缓冲区溢出，导致服务崩溃并造成拒绝服务（DoS）。该漏洞影响运行 Mercur WebView WebMail-Client 1.0 的服务器，攻击条件仅需网络可达并能够发送 HTTP 请求，无需任何权限或用户交互，利用方式简单且可被远程自动化发起。"
published = "2000-03-15T05:00:00.000"
remediation = "升级到 Atrium Software 发布的 Mercur WebView 修复版本（1.0 之后的安全更新版本），彻底替换存在漏洞的 1.0 版本；若无法升级，应在 Web 服务器或边界防火墙前端对发往 Mercur 服务的 GET 请求中 mail_user 参数的长度进行限制（如截断超过 256 字节的输入），并通过反向代理过滤超长请求头作为临时缓解措施，同时将该服务仅对内网开放以减少暴露面。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Atrium Software Mercur WebView WebMail-Client 1.0 缓冲区溢出漏洞"
updated = "2026-06-16T21:51:17.810"

