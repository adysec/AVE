[basic]
description = "NetBSD 1.3.2 和 SGI IRIX 6.2 及更早版本的 at 计划任务工具存在安全漏洞。该工具在处理 -f 参数时，通过错误消息机制将包含用户提交文件的路径名及文件内容的异常信息以电子邮件形式发送给用户。攻击者可利用此漏洞提交任意文件，诱使系统生成包含敏感内容的文件路径和文件片段的错误消息，最终获取文件的实际内容。此漏洞影响 NetBSD 1.3.2 及更早版本以及 SGI IRIX 6.2 及更早版本。严重危害权限提升和信息泄漏，攻击者仅需在本地环境下即可实施攻击，利用方式直接通过向 at 命令提交目标文件并等待电子邮件回复来获取目标文件内容。"
published = "1998-07-03T04:00:00.000"
remediation = "升级 NetBSD 到 1.3.3 及以上版本，升级 SGI IRIX 到 6.5.2 及以上版本以修复 at 程序缺陷。临时缓解措施：限制普通用户对 at 命令的使用权限，通过 /etc/at.allow 仅允许授权用户，或移除 setuid 位（chmod u-s /usr/bin/at）并改用 atd 的访问控制，避免本地用户利用 -f 参数读取任意文件内容。"
score = 2.1
severity = "LOW"
sources = ["exploitdb"]
title = "NetBSD 和 SGI IRIX at 命令本地文件读取漏洞"
updated = "2026-06-16T21:50:22.727"

