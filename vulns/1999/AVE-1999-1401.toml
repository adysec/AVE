[basic]
description = "SunOS 4.0.3 和 4.0.3c 版本中的 in.rlogind 服务存在本地提权漏洞，本地攻击者可利用 .rlogind 服务中的缓冲区溢出或权限校验缺陷，通过构造恶意参数或环境变量获取 root 权限。该漏洞影响运行受影响 SunOS 版本的 Sun 工作站和服务器，攻击者需具备本地账户访问权限，通过本地登录或远程 rlogin 连接触发漏洞，成功利用可完全控制目标系统获取 root 权限，CVSS 评分 7.2，危害等级高危。Sun 公司已发布补丁修复此漏洞。"
published = "1991-03-27T05:00:00.000"
remediation = '建议升级至 SunOS 4.1.3 及以上版本并安装 Sun 官方安全补丁包（如 Patch 101945-02 for 4.1.3）。若无法升级，建议在 /etc/inetd.conf 中注释掉 rlogin/rsh 服务并重启 inetd 禁用 rlogind 服务，或在 /etc/hosts.deny 中添加 "in.rlogind: ALL" 限制访问，并配置防火墙阻断 513/514 端口作为临时缓解措施。建议尽快迁移至受支持的 Solaris 版本。'
score = 7.2
severity = "HIGH"
sources = ["avd"]
