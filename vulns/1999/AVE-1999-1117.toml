[basic]
description = "Big Brother 1.09b 及 1.09c 版本的 CGI History 模块（bb-hist.sh）存在远程文件泄露漏洞。攻击者无需身份认证即可通过向该脚本发送特制请求，读取目标服务器上的任意文件内容，导致敏感信息泄露。该漏洞影响 Big Brother 1.09b 和 1.09c 版本，CVSS 评分 5.0，危害等级中危。目前厂商已发布更新修复此漏洞。"
published = "1999-12-31T05:00:00.000"
remediation = "立即将 Big Brother 升级至 1.09d 或更高版本，该版本已修复 bb-hist.sh CGI 脚本中未正确限制文件读取路径的问题。如无法升级，可删除或禁用 CGI 目录下的 bb-hist.sh 脚本，并在 Web 服务器（如 Apache）配置中对 /cgi-bin/ 目录添加访问控制，仅允许授权 IP 访问。同时确保 CGI 脚本以低权限用户运行，限制其可读取的文件范围。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Big Brother bb-hist.sh CGI History 模块远程文件泄露漏洞"
updated = "2026-06-16T21:50:29.523"

