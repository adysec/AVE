[basic]
description = "Citrix NetScaler ADC 和 NetScaler Gateway 在配置为 SAML 身份提供商（IdP）时存在输入验证不足漏洞，导致内存越界读取（CWE-125）。远程攻击者可通过向 /saml/login 或 /wsfed/passive 端点发送特制 SAML 请求触发该漏洞，造成敏感信息泄露或潜在内存破坏。该漏洞影响 NS 14.1 及 13.1 系列版本，CVSS 评分 9.3，危害等级严重。厂商已在 NS 14.1-66.59+ 及 13.1-62.23+ 版本中修复。"
published = "2026-03-23T21:17:17.477"
remediation = "立即升级至 NetScaler 14.1-66.59 及以上版本，或 13.1-62.23 及以上版本（FIPS/NDcPP 环境需升级至 13.1-37.262+）。如无法立即升级，在 WAF 或防火墙上拦截 `/saml/login` 和 `/wsfed/passive` 路径的外部访问，并限制仅允许可信 IP 白名单访问 SAML IdP 端点。若业务允许，执行 `rm authentication samlIdPProfile` 命令禁用 SAML IdP 配置。"
score = 9.3
severity = "CRITICAL"
sources = ["hwpoc"]
title = "Citrix NetScaler ADC/Gateway SAML IDP 内存越界读取漏洞"
updated = "2026-06-17T10:42:58.157"

