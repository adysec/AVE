[basic]
description = "Netopia Timbuktu Pro 远程控制软件 2.0b650 及 5.2.1 版本的认证协议存在安全缺陷，远程攻击者无需身份认证即可通过向目标主机的 407 和 1417 端口发送大量连接请求，消耗服务器资源，导致目标系统服务响应缓慢甚至完全崩溃，形成拒绝服务条件。该漏洞影响 Netopia Timbuktu Pro 2.0b650 及 5.2.1 版本。"
published = "2000-02-11T05:00:00.000"
remediation = "建议升级 Timbuktu Pro 至 2.0b650 之后的版本，或在防火墙/主机层面限制对端口 407 和 1417 的访问，仅允许受信任 IP 连接。如产品已停止支持，建议迁移至其他受支持的远程控制软件以彻底消除风险。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Netopia Timbuktu Pro 认证拒绝服务漏洞"
updated = "2026-06-16T21:51:05.240"

