[basic]
description = "Soup Sieve（Beautiful Soup 4 的 CSS 选择器引擎）在解析大型逗号分隔选择器列表时存在内存耗尽漏洞。攻击者无需身份认证，仅需向 soupsieve.compile() 或 Beautiful Soup 的 .select()/.select_one() 方法提交特制的 CSS 选择器字符串（如 500KB 输入可触发约 244MB 堆内存分配，放大比达 488 倍），即可导致目标应用内存耗尽，引发拒绝服务。该漏洞影响 soupsieve < 2.8.4 版本，所有依赖 beautifulsoup4 且接受用户 CSS 选择器输入的 Python Web 应用均受影响。已在 soupsieve 2.8.4 版本中修复。"
published = "2026-07-14T21:17:01.877"
remediation = "立即将 soupsieve 升级至 2.8.4 或更高版本：`pip install --upgrade soupsieve`。如无法立即升级，在调用 `soupsieve.compile()` 或 Beautiful Soup 的 `.select()`/`.select_one()` 前，对用户输入的 CSS 选择器字符串进行长度和逗号数量限制（如限制不超过 1024 字符且逗号分隔项不超过 100 个），或使用输入白名单过滤。"
score = 7.5
severity = "HIGH"
sources = ["ghsa"]
title = "Soup Sieve CSS选择器解析器资源耗尽漏洞"
updated = "2026-07-15T20:22:12.343"

