[basic]
description = "Trend Micro OfficeScan 客户端存在拒绝服务漏洞，远程攻击者可通过向目标主机的 12345 端口发起 5 次 HTTP 连接，导致 CPU 利用率飙升至 100%，造成服务不可用。该漏洞影响 Trend Micro OfficeScan Corporate Edition 3.0/3.5/3.11/3.13 版本，攻击者无需认证即可远程触发，危害等级中等。官方已发布安全更新修复此问题。"
published = "2000-02-28T05:00:00.000"
remediation = "升级 Trend Micro OfficeScan 至 3.5 以上已修复版本，或在防火墙上限制仅允许受信任内网 IP 访问 TCP 12345 端口，防止外部攻击者通过并发连接触发 CPU 占用 100% 的拒绝服务。对于不再获得官方支持的版本，建议迁移至 OfficeScan XG 或 Apex One 等现代版本。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Trend Micro OfficeScan 拒绝服务漏洞"
updated = "2026-06-16T21:51:13.130"

