[basic]
description = "Savant Web Server 2.0 存在空字符拒绝服务漏洞。攻击者通过在请求 URL 中插入空字符（NULL），可导致 Web 服务器服务崩溃或停止响应，造成拒绝服务。该漏洞影响 Michael Lamont Savant Web Server 2.0 版本，攻击者无需认证即可远程触发，利用方式简单，危害中等。"
published = "1999-12-28T05:00:00.000"
remediation = "该漏洞影响 Savant Web Server 2.0，厂商已停止维护且无安全更新。建议立即迁移至受支持的 Web 服务器（如 Apache HTTP Server 或 Nginx）。若无法迁移，可在反向代理或 WAF 层面添加规则，拦截包含空字节（%00）的 URL 请求作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Savant Web Server 空字符拒绝服务漏洞"
updated = "2026-06-16T21:50:49.510"

