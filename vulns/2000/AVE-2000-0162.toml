[basic]
description = "Linux printtool 在创建打印机配置文件时未正确设置权限，所有配置文件被设为全局可读（world-readable），导致本地攻击者可直接读取配置文件中的打印机共享密码。该漏洞影响使用 printtool 的 Linux 系统，攻击者只需拥有本地系统访问权限即可利用，无需额外认证。成功利用后可获取打印机共享凭据并访问受保护的打印机资源。"
published = "2000-03-09T05:00:00.000"
remediation = "建议将打印机配置文件权限修改为仅 root 可读写（chmod 600 /etc/printcap 及 /var/spool/lpd 下相关配置文件），或升级到 CUPS 打印系统并限制 lpadmin 组仅包含可信用户。"
score = 2.1
severity = "LOW"
sources = ["avd"]
title = "Linux Printtool 打印机共享密码泄露漏洞"
updated = "2026-06-16T21:51:10.530"

