[basic]
description = "IBM WebSphere Application Server 3.0.2 Server Plugin 存在缓冲区溢出漏洞，远程未认证攻击者可通过发送超长的 Host 请求头触发缓冲区溢出，导致拒绝服务甚至远程任意代码执行。该漏洞影响 IBM WebSphere Application Server 3.0.2 版本的 Server Plugin 组件，CVSS 评分 10.0（CVSS:AV:N/AC:L/Au:N/C:C/I:C/A:C），属于严重级别漏洞。攻击者无需身份认证即可通过网络远程发送恶意构造的 HTTP 请求，利用超长 Host 头触发栈缓冲区溢出，进而执行任意代码或导致服务拒绝。ExploitDB 已公开拒绝服务利用代码（EDB-ID: 20229），多个公开漏洞库（如 ExploitDB、CVEProject/cvelistV5、GitHub Advisory Database 等）均收录该漏洞详情及 PoC 代码。IBM 已发布补丁修复该漏洞，建议受影响用户尽快升级至修复版本。"
published = "2000-11-14T05:00:00.000"
remediation = "升级到 IBM WebSphere Application Server 6.1 或更高版本以获取完整的缓冲区溢出修复程序。立即应用最新的安全补丁程序包 Fixes和APAR，实施服务器配置修改，限制HTTP Host头部最大长度为255个字符，并将Web服务器设置为拒绝超过此限制的请求头。若无法立即打补丁，可在WebSphere托管服务层配置防火墙规则，阻止包含超过阈值长度的Host标头的入站流量以作为临时缓解措施。"
score = 10
severity = "CRITICAL"
sources = ["cve"]
title = "IBM WebSphere Application Server 3.0.2 Server Plugin 缓冲区溢出远程代码执行漏洞"
updated = "2026-06-16T21:52:35.657"

