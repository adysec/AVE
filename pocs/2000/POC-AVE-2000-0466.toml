[info]
author = "ave"
description = "检测目标服务器是否存在 Cobalt RaQ 的 cgiwrap 脚本，该脚本在未打补丁的 RaQ2/RaQ3 上存在权限设置缺陷，允许攻击者绕过 cgiwrap 执行任意命令或修改文件"
id = "POC-AVE-2000-0466"
name = "Cobalt RaQ2/RaQ3 cgiwrap 权限绕过漏洞 PoC"
severity = "high"
tags = ["ave-2000-0466"]
vuln_id = [
    "CVE-2000-0431",
    "AVE-2000-0466",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/cgiwrap"
protocol = "http"

[poc.requests.body]
content = ""
type = "raw"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["cgiwrap"]

[[poc.requests.matchers]]
expect = true
part = "body"
status = [200]
type = "status"
