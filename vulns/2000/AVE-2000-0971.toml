[basic]
description = 'Netegrity SiteMinder 是一款企业级 Web 访问管理与单点登录产品。在 4.11 及之前的版本中，该产品存在认证绕过漏洞。未经身份认证的远程攻击者通过在请求 URL 末尾附加 "$/FILENAME.ext"（其中扩展名为 .ccc、.class 或 .jpg）的方式，可绕过 SiteMinder 的认证机制，直接访问受保护的 Web 资源。该漏洞影响所有运行受影响版本 SiteMinder 的服务器，攻击者无需任何凭据，且攻击复杂度较低，只要能够网络访问目标服务器即可发起攻击。成功利用后，攻击者可在未授权的情况下访问受 SiteMinder 保护的应用程序和敏感数据，严重危害企业信息安全和访问控制体系的完整性。'
published = "2000-11-14T05:00:00.000"
remediation = '将 Netegrity SiteMinder 升级至 4.11 或更高版本，以修复认证绕过漏洞。如暂无法升级，应在 Web 服务器或反向代理层添加 URL 过滤规则，拒绝包含 "$/" 路径以及 ".ccc"、".class"、".jpg" 等扩展名的请求，防止攻击者通过拼接特殊后缀绕过认证。'
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "Netegrity SiteMinder 身份认证绕过漏洞"
updated = "2026-06-16T21:52:35.890"

