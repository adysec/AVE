[basic]
description = "tcpdump 3.4a 版本的 ip_print 函数存在整数处理缺陷，远程攻击者可向目标系统发送特制的零长度头部数据包，触发 ip_print 过程进入无限循环，导致 tcpdump 进程崩溃并产生核心转储，造成拒绝服务。该漏洞影响 tcpdump 3.4 及 3.4a 版本，攻击者无需身份认证即可远程触发，CVSS 评分 7.5，危害等级高危。"
published = "2001-11-28T05:00:00.000"
remediation = "升级 tcpdump 至 3.5 及以上版本，该版本修复了 ip_print 函数在处理零长度头部数据包时的无限循环问题。如无法立即升级，可在网络边界部署入侵检测规则，过滤或丢弃 header length 为零的异常 IP 数据包，降低被攻击风险。"
score = 7.5
severity = "HIGH"
sources = ["exploitdb"]
title = "LBL tcpdump 3.4 IP打印过程拒绝服务漏洞"
updated = "2026-06-16T21:49:32.747"

