[info]
author = "AVE"
description = "检测目标 Allaire ColdFusion Server 4.0 及更早版本中 ExprCalc.cfm 表达式计算器页面是否存在，该页面可通过 OpenFilePath 参数实现路径遍历，导致任意文件读取、删除和上传。"
id = "POC-AVE-1999-0200"
name = "Allaire ColdFusion Server 4.0 Expression Evaluator Arbitrary File Access PoC"
severity = "high"
tags = [
    "ave-1999-0200",
    "cve-1999-0477",
    "coldfusion",
    "path-traversal",
]
vuln_id = [
    "CVE-1999-0477",
    "AVE-1999-0200",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/cfdocs/expeval/ExprCalc.cfm"
protocol = "http"

[[poc.requests.matchers]]
expect = true
status = [200]
type = "status"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/cfdocs/expeval/openfile.cfm"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "uploadfile",
    "DirPath",
    "deletefile",
]
