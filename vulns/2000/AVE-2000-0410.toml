[basic]
description = "Max Feoktistov 开发的 Small HTTP Server 3.06 版本存在内存损坏漏洞，远程攻击者无需身份认证即可通过向服务器发送特制的 HTTP 请求触发缓冲区溢出，导致结构化异常处理程序（SEH）被覆盖，最终造成服务崩溃拒绝服务（DoS）。该漏洞攻击复杂度低，无需用户交互，利用代码已公开，影响运行该版本 Small HTTP Server 的所有系统。"
published = "2000-06-15T04:00:00.000"
remediation = "建议立即停止使用 Max Feoktistov Small HTTP Server，该软件已停止维护且无官方补丁。迁移至仍在维护的 Web 服务器（如 Nginx、Apache httpd）。如无法立即替换，可在前置反向代理中配置 client_header_buffer_size 限制请求行长度不超过 8KB，或在 WAF/防火墙层面拦截 URI 长度超过 65535 字节的 HTTP GET 请求，以缓解缓冲区溢出导致的拒绝服务攻击。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Max Feoktistov Small HTTP server 缓冲区溢出漏洞"
updated = "2026-06-16T21:51:50.020"

