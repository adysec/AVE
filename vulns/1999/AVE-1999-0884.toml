[basic]
description = "SSH 服务器（sshd2）2.0.12 版本之前存在密码暴力破解漏洞，由于服务器在连接关闭前未达到最大尝试次数时未正确记录登录尝试，导致远程攻击者可在不留下审计日志的情况下无限次猜测密码。该漏洞影响 SSH 服务器（sshd2）2.0.12 之前的所有版本，CVSS 评分 7.5，危害等级高。攻击者只需建立 SSH 连接并在达到最大尝试次数前主动断开连接，即可绕过审计日志记录机制，实施无痕密码暴力破解攻击，严重威胁 SSH 服务认证安全。"
published = "1999-05-13T04:00:00.000"
remediation = "升级 SSH 服务到 2.0.12 或更高版本以修复登录日志记录漏洞；启用登录审计日志记录功能，确保所有密码认证尝试均完整记录；配置 SSH 服务为每个登录尝试生成唯一会话 ID，方便事后追溯分析；同时加强账户锁定策略，限制最大尝试次数，并配置 SSH 服务超时自动断开，避免攻击者通过提前断开连接逃避审计。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
