[basic]
description = "IIS 4.0 及 Site Server 3.0 存在虚拟目录命名漏洞。当虚拟目录名称包含 .com、.exe、.sh、.cgi、.dll 等扩展名时，远程攻击者可绕过 ASP 脚本执行机制，通过直接请求获取 ASP 文件的源代码，从而泄露数据库连接字符串、管理员密码等敏感信息。该漏洞无需身份认证即可远程利用，影响广泛部署的 IIS Web 服务器。"
published = "1999-12-21T05:00:00.000"
remediation = "升级到 IIS 5.0 或更高版本（如 Windows 2000 及以上系统自带的 IIS），该漏洞已在后续版本中修复。如无法升级，避免在虚拟目录名称中使用 .com、.exe、.sh、.cgi、.dll 等扩展名字符串，并限制对 ASP 文件的直接访问权限作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Microsoft IIS 和 Site Server 虚拟目录命名漏洞"
updated = "2026-06-16T21:50:50.833"

