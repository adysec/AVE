[basic]
description = 'Microsoft IIS 服务器存在拒绝服务漏洞，远程攻击者可通过向 IIS 发送包含 `..\..` 目录遍历序列的特制 URL 请求，无需任何身份认证即可触发服务进程崩溃或资源耗尽，导致目标网站无法正常提供服务。该漏洞影响 Windows NT 平台上的 IIS 服务，攻击复杂度低，但仅造成服务可用性损失，不影响数据完整性。'
published = "1999-05-12T04:00:00.000"
remediation = '升级 Windows NT 至 Windows 2000 及以上版本，或安装 IIS 4.0 Service Pack 6 (SP6) 及以上更新。在 IIS 管理器中禁用不必要的脚本映射（如 .bat/.cmd），并部署 URLScan 工具拦截包含 `..\` 的恶意请求路径作为临时缓解措施。'
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Microsoft Windows NT IIS 拒绝服务漏洞"
updated = "2026-06-16T21:47:57.530"

