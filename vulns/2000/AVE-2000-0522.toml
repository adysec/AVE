[basic]
description = 'Selena Sol WebBanner 4.0 产品中存在严重的路径遍历漏洞，该软件在处理用户请求时未能有效验证路径输入，导致攻击者可通过发送包含 "../" 目录遍历序列的恶意请求绕过访问控制。攻击者可利用这一漏洞读取目标服务器上的任意文件，包括敏感系统配置文件、用户凭证、数据库连接信息等安全数据。漏洞影响 WebBanner 4.0 所有版本，攻击者无需任何权限即可远程实施攻击，但需精确知道目标文件路径，攻击复杂度较高。该漏洞同时影响系统机密性、完整性和可用性，潜在损失可能导致企业数据泄露、系统被攻破等严重后果。微软及相关安全厂商已确认此漏洞并发布相关安全补丁，建议用户及时升级到最新版本以获取防护。'
published = "2000-02-02T05:00:00.000"
remediation = '升级 Selena Sol WebBanner 至 4.0 以上修复版本，或在 Web 服务器配置中启用路径规范化检查、禁用目录遍历（如 Apache 配置 AllowOverride None 并限制 FollowSymLinks）。若无法升级，建议在 Web 应用防火墙配置规则拦截包含 ../ 或 ..\\ 的请求路径，并限制 Web 服务进程对敏感目录的读取权限。建议升级至 WebBanner 4.1 或更高版本。'
score = 5.1
severity = "MEDIUM"
sources = ["avd"]
title = "Selena Sol WebBanner 4.0 任意文件读取漏洞"
updated = "2026-06-16T21:51:48.070"

