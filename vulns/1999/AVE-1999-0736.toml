[basic]
description = "Debian GNU/Linux 2.1 与 2.2 发行版所携带的 IRC 客户端程序 epic 及其后续版本 epic4 存在拒绝服务漏洞。该漏洞源于客户端在解析和处理来自 IRC 服务器或其他用户发送的超长字符串时，未对输入长度进行充分校验与边界限制，导致缓冲区溢出或内存耗尽。远程攻击者只需通过 IRC 网络向目标用户发送一条特制的长度异常的字符串消息，即可触发该客户端异常崩溃或停止响应，从而中断受害者的正常 IRC 会话。由于攻击无需身份认证且利用条件简单，任何使用上述受影响版本的连接到 IRC 网络的用户均可能成为攻击目标，影响范围涵盖当时使用 Debian 2.1/2.2 自带 epic/epic4 客户端的终端用户。"
published = "1999-08-26T04:00:00.000"
remediation = "建议将 Debian 2.1/2.2 系统上的 epic 或 epic4 IRC 客户端升级到修复了该长字符串解析缺陷的后续版本（Debian 2.2 后期通过 apt-get update && apt-get install epic4 获取补丁包）。若暂时无法升级，应避免连接不可信的 IRC 服务器，并在防火墙侧限制对外部 IRC 端口（6667 等）的出站连接作为临时缓解措施。"
