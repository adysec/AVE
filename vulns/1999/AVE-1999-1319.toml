[basic]
description = "Excite for Web Servers (EWS) 1.1 在安装过程中将认证配置文件 Architext.conf 设置为全局可写权限，导致本地攻击者可通过修改该配置文件绕过身份验证机制，从而非法获取 Excite 账户的访问权限。该漏洞源于不安全的文件权限设置，攻击者只需拥有本地系统访问权限即可利用，影响 EWS 1.1 版本，CVSS 评分 7.2，危害等级高。"
published = "1998-11-30T05:00:00.000"
remediation = "立即修改 Architext.conf 文件权限为 600（仅所有者可读写），执行 chmod 600 Architext.conf。同时升级到 EWS 1.2 或更高版本，或迁移至其他受支持的 Web 服务器软件。定期审计认证配置文件的权限设置，确保无过度宽松的访问控制。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "Excite for Web Servers 权限许可和访问控制漏洞"
updated = "2026-06-16T21:49:39.660"

