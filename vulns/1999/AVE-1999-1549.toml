[basic]
description = "Macromedia Shockwave 6.0 之前版本中的 GETNETTEXT 命令存在安全设计缺陷，恶意的 Web 站点管理员可通过在 Shockwave 影片中构造特制的 GETNETTEXT 命令调用，读取访问该页面的用户本地邮箱文件，并可能进一步访问用户内网中的 Web 服务器。该漏洞无需用户交互即可在后台触发，影响部署了受影响版本 Shockwave 插件的各类浏览器环境。"
published = "1997-03-14T05:00:00.000"
remediation = "升级 Macromedia Shockwave 至 6.0 及以上版本即可修复该漏洞。由于 Macromedia Shockwave 已于 2019 年 4 月正式停止支持并停止分发，建议彻底卸载 Shockwave 播放器，或迁移至现代 Web 技术（如 HTML5）替代 Shockwave 内容。作为临时缓解措施，可在浏览器中禁用 Shockwave 插件，阻止其自动加载。"
score = 5.1
severity = "MEDIUM"
sources = ["avd"]
title = "Macromedia Shockwave GETNETTEXT 本地文件泄露漏洞"
updated = "2026-06-16T21:50:37.650"

