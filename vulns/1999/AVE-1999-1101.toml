[basic]
description = "Apple Mac OS X 1.0 系统自带的 Apache HTTP Server 在处理 CGI 程序请求时存在资源管理缺陷。远程攻击者无需身份认证，通过向服务器上 CGI 程序发送大量 HTTP GET 请求洪流，可触发 Apache 生成大量进程直至系统资源耗尽，导致目标服务崩溃拒绝服务。该漏洞影响 Apple Mac OS X 1.0 及捆绑的 Apache HTTP Server，CVSS 评分 5.0，危害等级中危。"
published = "1999-06-03"
remediation = "升级至 Mac OS X 10.1 或更高版本，该问题已在后续版本中修复。如无法升级，可在 Apache 配置中限制 CGI 进程数（如设置 MaxClients 和 MaxRequestsPerChild 参数），或使用 mod_limitipconn 等模块限制单 IP 并发连接数，以缓解洪水攻击影响。当前建议升级至受支持的 macOS 版本并使用现代 Web 服务器。"
score = 5.0
severity = "MEDIUM"
sources = [
    "cve",
    "avd",
]
title = "Apple Mac OS X 1.0 Apache HTTP Server HTTP GET 请求拒绝服务漏洞"
updated = "2026-06-16"

