[basic]
description = "RightFax Web 客户端在会话管理中使用可预测的会话标识数字，而非随机不可猜测的令牌。远程攻击者可在未认证情况下，通过观察会话编号的生成规律预测其他用户的合法会话 ID，从而劫持已登录用户的会话并冒充其身份访问系统。该漏洞影响部署了 RightFax Web 客户端的产品，攻击者只需能访问目标 Web 服务并获取会话标识即可发起劫持，无需本地权限或用户交互，可被用于越权访问敏感传真数据及后台功能。"
published = "2000-01-29T05:00:00.000"
remediation = "建议升级到 RightFax 12.0 或更高版本，该版本修复了会话数字预测漏洞并实现了随机会话 ID 生成。如无法立即升级，可通过修改 web 客户端配置文件，禁用默认的 session.inc.php 文件并启用会话加盐和过期机制作为临时缓解措施。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
