[info]
author = "AVE"
description = "检测 Internet Explorer 5.0 窗口欺骗漏洞（%01 空字节地址栏截断），通过构造包含 %01@ 的 URL 验证浏览器是否显示伪造的地址栏信息"
id = "POC-AVE-1999-0133"
name = "CVE-1999-0469 PoC"
severity = "medium"
tags = ["cve-1999-0469"]
vuln_id = [
    "CVE-1999-0469",
    "AVE-1999-0133",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/poc.html"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["CVE-1999-0469"]
