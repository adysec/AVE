[basic]
description = "SunOS/Solaris 以及 SGI IRIX 6.5.4 系统的 ps(1) 命令存在缓冲区溢出漏洞。本地攻击者可通过向 ps 命令传递特制参数触发缓冲区溢出，从而覆盖内存中的数据，实现权限提升。成功利用该漏洞可导致攻击者获取 root 权限，完全控制系统。"
published = "1997-08-01T04:00:00.000"
remediation = "安装 Sun 补丁 105400-01（x86）或 105395-01（SPARC）修复 Solaris 2.5.1 的 ps 缓冲区溢出漏洞；SGI IRIX 6.5.4 应升级至 6.5.5 或更高版本。两款系统均已停止支持，建议迁移至现代操作系统。临时缓解措施可移除 ps 的 setuid 位：`chmod -s /usr/bin/ps`。"
score = 7.2
severity = "HIGH"
sources = ["epss"]
title = "Sun Solaris ps 命令缓冲区溢出漏洞"
updated = "2026-06-16T21:48:06.370"

