[basic]
description = "Man and Mice DNS PRO 5.7 存在拒绝服务漏洞，远程攻击者可通过向目标 DNS 服务发送大量并发连接请求，耗尽服务器连接资源池，导致 DNS 服务进程崩溃或无法响应正常查询请求。攻击无需认证，仅需网络可达即可实施，影响 DNS PRO 5.7 版。该漏洞 CVSS 评分 5.0，危害等级中危。"
published = "1999-12-20T05:00:00.000"
remediation = "联系 BlueCat Networks 将 Men & Mice DNS PRO 升级至当前支持的 Micetro 平台，新版本内置连接速率限制和抗 DDoS 防护。如无法升级，在 DNS 服务器前端部署防火墙或负载均衡设备，限制单 IP 每分钟最大连接数，并配置系统层面最大并发连接参数缓解大量连接导致的拒绝服务。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Man and Mice DNS PRO 5.7 远程拒绝服务漏洞"
updated = "2026-06-16T21:50:50.247"

