[basic]
description = "Solaris 7.0 操作系统的 /usr/bin/mail 命令存在本地缓冲区溢出漏洞。当用户向 mail 命令的 -m 参数传递超长字符串时，程序未对输入长度进行正确边界检查，导致栈缓冲区溢出。本地攻击者可利用该漏洞精心构造恶意载荷覆盖栈中返回地址，从而以 mail 命令的权限（通常为 root 或 mail 组权限）执行任意代码。该漏洞影响 Solaris 2.7 版本，攻击者需拥有本地系统账号方能利用，无需网络远程访问权限。"
published = "1999-09-13T04:00:00.000"
remediation = "安装 Sun 当时发布的补丁 106827-01（SPARC）/ 106828-01（x86），或升级至 Solaris 8 及以上版本。对于仍运行 Solaris 7 的遗留系统，可移除 /usr/bin/mail 的 setuid root 位（chmod u-s /usr/bin/mail）作为临时缓解，但会影响普通用户使用 mail 命令。现代系统建议迁移至受支持的 Solaris 11 或替代操作系统。"
score = 4.6
severity = "MEDIUM"
sources = ["cve"]
title = "Sun Solaris mail 命令本地缓冲区溢出漏洞"
updated = "2026-06-16T21:49:31.477"

