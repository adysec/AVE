[basic]
description = "通达 OA 系统 zwsp-wps2 组件存在任意文件上传漏洞，攻击者可通过构造恶意请求绕过文件类型校验，上传 WebShell 等恶意脚本文件，进而获取服务器控制权限。该漏洞影响通达 OA 多个版本，无需身份认证即可远程利用，攻击条件仅需目标系统暴露相关接口。成功利用可导致服务器被植入后门、敏感数据泄露及业务系统瘫痪，建议尽快升级至官方修复版本并加强访问控制。"
published = "2023-08-15"
remediation = "升级通达OA至最新版本，官方已在后续版本中修复zwsp-wps2模块的文件上传校验缺陷。如无法立即升级，可在Web服务器（Nginx/Apache）层面添加访问控制规则，限制对/zwsp-wps2/路径的访问仅允许可信IP，并配置上传目录禁止脚本执行权限。同时建议在OA系统配置中关闭不必要的WPS在线编辑功能以降低风险面。"
score = 5.0
severity = "MEDIUM"
sources = ["hwpoc"]
title = "通达 OA zwsp-wps2 任意文件上传漏洞"
updated = "2023-08-15"

