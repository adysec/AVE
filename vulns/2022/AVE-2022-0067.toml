[basic]
description = "Linux 内核 cpufreq 子系统的 CPPC（协作处理器性能控制）驱动中存在整数溢出漏洞。_CPC ACPI 对象中的字段为 32 位无符号整数，驱动在进行频率转换和性能计算时未将中间运算结果显式转换为 u64 类型，导致乘法运算可能发生整数回绕，产生错误的频率值并引发内核行为异常。本地低权限攻击者可通过构造特定的性能状态触发溢出，造成拒绝服务。该漏洞影响 Linux 内核 5.19 至 6.1.9 之前的版本及 6.2-rc 系列。"
published = "2025-03-27T17:15:39.850"
remediation = "升级 Linux 内核至修复版本：主线内核 ≥ v5.17-rc7，或长期支持分支中对应的修复版本（如 v5.15.101+、v5.10.164+、v5.4.231+）。无法立即升级时，可通过内核启动参数 `cpufreq.off=1` 临时禁用 cpufreq CPPC 驱动作为缓解措施，但会降低 CPU 频率调节能力。"
score = 5.5
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux 内核 cpufreq CPPC 整数溢出漏洞"
updated = "2026-06-17T05:19:02.597"

