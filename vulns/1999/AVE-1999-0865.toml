[basic]
description = "Windows NT 事件日志存在不恰当的访问权限配置漏洞，本地普通用户可能能够读取或清除安全事件日志记录。攻击者可利用此漏洞获取系统敏感信息，或在入侵后清理日志痕迹以规避检测。该漏洞影响 Windows NT 系列操作系统，CVSS 评分 10.0，危害等级严重。攻击者需拥有本地系统访问权限方可利用此漏洞。"
published = "1999-01-01T05:00:00.000"
remediation = '限制 %SystemRoot%\System32\config\ 目录下 AppEvent.evt、SecEvent.evt、SysEvent.evt 文件的访问权限，仅允许 SYSTEM 和 Administrators 组读取。升级至 Windows 2000 或更高版本以彻底修复权限配置问题。'
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "Microsoft Windows NT 事件日志权限配置不当漏洞"
updated = "2026-06-16T21:48:41.650"

