[basic]
description = "Sendmail 8.10.0 之前版本（如 8.9.1、8.9.3）的 SMTP 服务存在拒绝服务漏洞。其原理是：当远程攻击者向目标邮件服务器连续发送一系列 ETRN 命令（用于请求队列中邮件的转发/重试）后，在命令尚未处理完毕时即主动断开 TCP 连接，而 Sendmail 仍会在连接已终止的情况下继续处理这些队列命令，从而消耗服务器资源。该漏洞影响所有运行受影响版本 Sendmail 的 SMTP 服务器，攻击条件为攻击者能够与被害服务器的 25 端口建立网络连接并发送 SMTP 命令，无需身份认证。利用方式简单，攻击者通过脚本批量发送 ETRN 命令并断开连接即可导致服务资源耗尽，造成拒绝服务。"
published = "1999-12-22T05:00:00.000"
remediation = "升级 Sendmail 至 8.10.0 或更高版本以修复 ETRN 命令处理缺陷。若无法立即升级，可在 sendmail.cf 中限制或禁用 ETRN 命令（移除 ETRN 相关规则或仅对可信中继开放），并通过防火墙限制外网对 25 端口的 SMTP 连接作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
