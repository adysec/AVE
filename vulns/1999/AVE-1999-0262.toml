[basic]
description = "tags.<value>ToolTalk 共享库在处理 TT_SESSION 环境变量时存在缓冲区溢出漏洞。攻击者可通过精心构造该环境变量的内容，触发堆栈缓冲区溢出，进而实现本地权限提升。该漏洞影响多个 Unix 系统版本，包括 DIGITAL UNIX 4.0、AIX 4.3.2、CDE 2.1、IRIX 6.5.14、Solaris 7.0 及 SunOS 4.1.4。成功利用该漏洞后，本地低权限用户可获得 root 权限，完全控制系统。攻击条件为攻击者已拥有目标系统的本地访问权限。CVSS 评分为 7.2，危害等级为高。"
published = "2000-03-02T05:00:00.000"
remediation = "建议立即安装各厂商针对此漏洞发布的安全补丁：Solaris 应用 Sun 的 ToolTalk 补丁（如 105396 系列），IRIX 升级至 6.5.15 或应用 SGI 的补丁，AIX 安装 APAR 修复并升级至 4.3.3，DIGITAL UNIX 应用 OSF/1 补丁集。在无法立即打补丁前，可通过删除或限制 /usr/dt/lib/libtt* 共享库及 setuid 程序的写执行权限、对普通用户移除 CDE/ToolTalk 相关 setuid 二进制文件作为临时缓解措施。"
score = 7.2
severity = "HIGH"
sources = ["epss"]
title = "Digital UNIX、AIX、CDE、IRIX、Solaris、SunOS ToolTalk 共享库 TT_SESSION 环境变量本地缓冲区溢出漏洞"
updated = "2026-06-16T21:48:51.690"

