[basic]
description = 'Avirt Mail 4.0 及 4.2 版本存在缓冲区溢出漏洞，远程攻击者可通过向 SMTP 服务发送超长的 "MAIL FROM" 或 "RCPT TO" 命令触发该漏洞，导致服务崩溃拒绝服务，甚至可能执行任意代码。该漏洞 CVSS 评分 10.0，危害等级严重，无需身份认证即可远程利用。'
published = "2000-12-19T05:00:00.000"
remediation = "Avirt Mail 4.0/4.2 已停止维护，官方不再提供补丁。建议立即迁移至受支持的邮件服务器软件（如 Postfix、Exim），并在网络边界防火墙或 IPS 设备上添加规则，限制 SMTP (TCP 25) 端口的 `RCPT TO` 和 `MAIL FROM` 命令字段长度不超过 512 字节，对超长 SMTP 命令直接丢弃，作为临时缓解措施。"
score = 10
severity = "CRITICAL"
sources = ["exploitdb"]
title = "Avirt Mail 远程拒绝服务及任意命令执行漏洞"
updated = "2026-06-16T21:52:53.017"

