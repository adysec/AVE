[basic]
description = "Red Hat Linux 6.0 及更早版本中的 Linuxconf 工具未能正确禁用基于 PAM 的 shutdown 命令访问权限，导致本地用户可利用该缺陷直接执行 shutdown 命令，造成系统拒绝服务。该漏洞攻击条件低，本地用户无需特殊权限即可触发，影响 Red Hat Linux 6.0 及之前版本，CVSS 评分 2.1，危害等级低。"
published = "1999-06-30T04:00:00.000"
remediation = "升级到 Red Hat Linux 6.1 或更高版本，该版本已修复 Linuxconf 对 shutdown 命令的 PAM 访问控制问题。如无法升级，可手动编辑 /etc/pam.d/shutdown 配置文件，移除或注释掉不必要的认证规则，限制仅 root 用户可执行 shutdown 命令。作为临时缓解措施，可通过 chmod 700 /sbin/shutdown 限制 shutdown 二进制文件的执行权限。"
score = 2.1
severity = "LOW"
sources = ["cve"]
title = "Red Hat Linux Linuxconf 本地拒绝服务漏洞"
updated = "2026-06-16T21:50:14.943"

