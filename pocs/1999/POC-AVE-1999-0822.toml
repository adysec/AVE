[info]
author = "ave"
description = "检测 Microsoft IIS 服务器端包含（SSI）#exec 远程代码执行漏洞。通过 HTTP 响应头识别 IIS 服务，判断目标是否可能受 SSI #exec 未授权命令执行缺陷影响。"
id = "POC-AVE-1999-0822"
name = "CVE-1999-0561 PoC"
severity = "critical"
tags = [
    "cve-1999-0561",
    "iis",
    "ssi",
]
vuln_id = [
    "CVE-1999-0561",
    "AVE-1999-0822",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "header"
type = "word"
words = ["Microsoft-IIS"]
