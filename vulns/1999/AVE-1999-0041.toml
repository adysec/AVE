[basic]
description = "Windows 95和Windows 98系统中存在一个从Windows for Workgroups继承的遗留凭据缓存机制，该机制会在RAM中以明文形式缓存网络登录凭据。虽然该机制在Windows 95/98中已不再使用，但代码仍被保留。攻击者若拥有物理访问权限且系统自上次网络会话后未重启，可通过查询该缓存获取上一个网络用户的明文密码，导致敏感凭据泄露。"
published = "1999-11-29"
remediation = "微软已发布安全公告MS99-052修复此漏洞。Windows 95用户应安装KB168115更新补丁，Windows 98用户应安装对应安全更新。Windows 98第二版不受此漏洞影响。建议用户及时安装补丁并限制物理访问。"
score = 7.8
severity = "HIGH"
sources = [
    "cve",
    "ms",
]
title = "Microsoft Windows 95/98 遗留凭据缓存信息泄露漏洞"
updated = "1999-11-29"

