[basic]
description = "Linux 内核 ext4 文件系统存在死锁漏洞（CVE-2023-53149），源于 `ext4_writepages()` 函数在持有全局写页面锁（`sbi->s_writepages_rwsem`）时，因内存回收（fs_reclaim）触发递归调用再次申请同一锁，形成锁顺序冲突导致内核死锁。该漏洞影响 Linux 内核各发行版本，攻击者可通过构造特定文件 I/O 操作触发死锁条件，造成系统拒绝服务（DoS）。CVSS 评分 5.5，危害等级中等，建议更新至已修复版本。"
published = "2025-09-15T14:15:37.393"
remediation = "升级 Linux 内核至 6.1.9 及以上版本（或对应发行版如 Ubuntu 22.04 升级至 6.2.x 内核、RHEL 9 升级至 kernel-5.14.0-362 以上），该问题已在 commit 2e4ce60f7f4d 中修复。如无法立即升级，可通过内核启动参数 `ext4.no_writeback_recursion=1` 临时缓解，但建议优先内核更新。"
score = 5.5
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux Kernel ext4 文件系统页面回写拒绝服务漏洞"
updated = "2026-06-17T06:44:23.503"

