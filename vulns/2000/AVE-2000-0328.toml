[basic]
description = "EMURL 是一款基于 Web 的电子邮件帐户管理软件，其用户会话 URL 中编码了可预测的标识符，导致远程攻击者无需身份认证即可通过直接访问特制的 URL 来获取其他用户的电子邮件内容。该漏洞影响 Seattle Lab Software Emurl 2.0 版本，攻击者只需知道目标用户的会话 URL 模式即可实施攻击，可能导致用户邮件数据泄露。CVSS 评分 5.0，危害等级中等。"
published = "2000-05-15T04:00:00.000"
remediation = "Seattle Lab Software Emurl 2.0 已停止维护，建议立即迁移至受支持的现代 Web 邮件系统（如 Roundcube、SquirrelMail 等）。如无法立即迁移，可在 Web 服务器（IIS/Apache）层面为 /scripts/emurl/ 目录添加 IP 白名单访问控制或 HTTP 基本认证，限制对 RECMAN.dll 和 MAKEHTML_M.dll 的访问，防止未授权用户利用可预测的会话标识符访问他人邮件。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Seattle Lab Software Emurl 2.0 会话标识可预测漏洞"
updated = "2026-06-16T21:51:37.840"

