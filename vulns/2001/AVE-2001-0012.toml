[basic]
description = "Leif M. Wright 开发的 ad.cgi CGI 程序 1.0 版本存在命令注入漏洞，由于程序未对用户输入的 file 参数进行有效过滤，远程攻击者可通过构造包含 shell 元字符（如分号、管道符等）的恶意请求，在目标服务器上以 Web 服务器权限执行任意系统命令。该漏洞影响运行 ad.cgi 1.0 的 Web 服务器，CVSS 评分 10.0，危害等级严重。攻击者无需身份认证即可远程利用，可能导致服务器完全失陷。"
published = "2001-02-12T05:00:00.000"
remediation = "立即停止使用 ad.cgi 1.0 程序，该程序已不再维护。建议彻底删除 ad.cgi 脚本或替换为经过安全审计的替代方案。如必须继续使用，应在 CGI 程序中对 file 参数严格过滤 shell 元字符（如 ; ` | & $ 等），并对用户输入进行白名单校验。同时配置 Web 服务器以最小权限运行 CGI 进程。因该漏洞已公开超过 20 年且存在公开利用代码，强烈建议直接移除该脚本。"
score = 10
severity = "CRITICAL"
sources = ["exploitdb"]
title = "Leif M. Wright ad.cgi 1.0 任意命令执行漏洞"
updated = "2026-06-16T21:53:30.770"

