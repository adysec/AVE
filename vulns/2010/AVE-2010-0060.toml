[basic]
description = "Joomla! CMS 旗下 Ultimate Portfolio 1.0 组件存在目录遍历漏洞，攻击者可通过向 index.php 发起请求时在控制器参数中嵌入 '..' 路径穿越序列，绕过验证访问服务器上任意文件。该漏洞影响 Joomla! 用户，导致敏感信息泄露。漏洞因可读取文件而具备安全风险，CVSS 评分 5.0，等级中危。"
published = "2010-05-03T13:51:53.277"
remediation = '立即卸载或禁用 Joomla! Ultimate Portfolio 组件（com_ultimateportfolio）1.0 版本，该组件已停止维护无官方补丁。若必须保留，请在 index.php 中对 controller 参数实施严格白名单校验，仅允许字母数字下划线，拦截包含 ../ 或 ..\ 的请求。同时在 Web 应用防火墙（WAF）配置规则阻断路径遍历载荷，并限制 PHP open_basedir 目录防止跨目录读取敏感文件。'
score = 5
severity = "MEDIUM"
sources = ["nuclei"]
title = "Joomla! Ultimate Portfolio 组件 本地文件包含漏洞"
updated = "2026-06-16T23:18:48.237"

