[basic]
description = "Microsoft Virtual Machine（微软虚拟机）在 Internet Explorer 4.x 和 5.x 版本中存在安全绕过漏洞。远程攻击者可通过构造恶意网页或发送包含恶意 Java applet 的电子邮件，诱使用户访问或打开，从而利用 com.ms.activeX.ActiveXComponent 接口创建并操控 ActiveX 控件，绕过 IE 的安全策略限制，在目标系统上执行任意命令。该漏洞影响 Windows 平台的多个 IE 版本，攻击条件低，危害较大。"
published = "2000-12-11T05:00:00.000"
remediation = "建议立即安装 Microsoft 安全公告 MS00-075 提供的更新，禁用 Microsoft VM 中对 ActiveX 组件的支持。彻底修复方案为卸载 Microsoft VM（MSJVM）并迁移至标准 Java 运行时环境（如 Oracle JRE）。临时缓解措施：在 Internet Explorer 中，将安全区域中的「运行 ActiveX 控件和插件」设置为禁用，同时将 com.ms.activeX.ActiveXComponent 标记为 killbit 以避免被浏览器调用。"
score = 5.1
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Microsoft Virtual Machine ActiveX 组件任意程序执行漏洞"
updated = "2026-06-16T21:53:04.500"

