[basic]
description = "SunOS 4.1.x 系统中的 loadmodule 程序（被 xnews 等调用）在启动过程中未能正确清理（sanitize）其运行环境变量，导致本地用户可通过构造恶意的环境变量来操纵程序行为。由于 loadmodule 通常以较高权限运行，本地已登录的普通用户可利用该环境处理缺陷实现权限提升，获取 root 或其他特权账户的权限。该漏洞影响运行 SunOS 4.1.x 版本且使用 loadmodule 的相关系统，攻击前提是攻击者需具备本地系统访问权限，无需远程网络即可完成利用，属于本地权限提升类漏洞。"
published = "1999-12-31"
remediation = "升级到已修复该问题的 SunOS 补丁版本，或应用厂商针对 loadmodule 环境变量处理缺陷的安全补丁；在不便升级时，限制对 loadmodule 及 xnews 等调用程序的访问权限，避免不可信本地用户执行该程序。"
score = 7.2
severity = "HIGH"
sources = ["cve"]
title = "SunOS 4.1.x loadmodule 程序环境变量处理本地提权漏洞"
updated = "2026-06-16"

