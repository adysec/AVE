[basic]
description = "Helix GNOME Updater (helix-update) 0.5 及更早版本中存在条件竞争漏洞，本地普通用户可通过在 root 用户执行软件包安装操作前，预先创建 /tmp/helix-install 临时目录并放入恶意 RPM 软件包，利用该目录的权限继承机制诱导 helix-update 以 root 权限安装恶意包，从而实现任意 RPM 包的安装与提权。该漏洞影响 GNOME 桌面环境下使用 helix-update 的系统，攻击者须具备本地用户权限及对 /tmp 目录的写入能力，CVSS 评分 6.2，危害等级中等。"
published = "2000-10-20T04:00:00.000"
remediation = "升级 Helix GNOME Updater 至 0.5 以上版本，该漏洞已在后续版本中通过使用安全的临时目录创建方式（如 mktemp -d）修复。如无法升级，可限制 helix-update 命令的执行权限，仅允许 root 用户运行，并避免在多用户环境下使用该工具。同时建议手动删除 /tmp/helix-install 目录（如存在）并监控该路径的异常创建行为。"
score = 6.2
severity = "MEDIUM"
sources = ["cve"]
title = "Helix Gnome Updater helix-update 本地权限提升漏洞"
updated = "2026-06-16T21:52:20.643"

