[basic]
description = "Ipswitch Imail 6.0 邮件服务器存在拒绝服务漏洞。远程攻击者可通过发送大量包含超长 Host 头的连接请求，导致服务器线程崩溃，从而使邮件服务不可用。攻击无需身份认证，可远程触发。"
published = "2000-11-14"
remediation = "升级到 Ipswitch Imail 6.01 或更高版本；在防火墙或负载均衡器上限制同一源IP的连接速率；配置服务器连接超时参数以缓解大量连接攻击。"
score = 5.0
severity = "MEDIUM"
sources = ["cve"]
title = "Ipswitch Imail 6.0 长Host头导致拒绝服务漏洞"
updated = "2024-06-16"

