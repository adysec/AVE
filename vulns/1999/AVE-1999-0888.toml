[basic]
description = "Lynx WWW 浏览器在调用外部程序（如 telnet）处理特定协议时，未对用户通过 URL 传入的命令行参数做任何过滤，远程攻击者可构造恶意链接并诱导用户点击，导致在客户端执行任意命令，造成敏感信息泄露或系统控制权丧失。该漏洞影响 Lynx 浏览器全版本，CVSS 评分 10.0，危害等级严重。"
published = "1999-09-15T04:00:00.000"
remediation = "升级 Lynx 至 2.8.3 或更高版本（如当前最新稳定版 2.8.9rel.1），该版本已修复外部程序协议处理时的命令行参数注入问题。如无法立即升级，可在 Lynx 配置文件 (lynx.cfg) 中设置 EXTERNAL_PROTOCOL_HANDLER 禁用 telnet 等外部协议处理，或将 EXTERNAL 字段设为空以阻止 Lynx 调用外部程序，从而阻断攻击者通过恶意链接注入命令行参数的途径。"
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "Lynx WWW客户端 远程协议命令行参数注入漏洞"
updated = "2026-06-16T21:49:07.183"

