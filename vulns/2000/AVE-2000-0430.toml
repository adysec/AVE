[basic]
description = "Shiva Access Manager 5.0.0 在配置为使用 LDAP 目录存储配置信息时，将 LDAP 根 DN（Distinguished Name）名称和密码以明文形式存储在一个全局可读的文件中。本地攻击者可以读取该文件，获取 LDAP 服务器的管理员凭证，进而完全控制 LDAP 服务器，导致敏感信息泄露和服务器受损。"
published = "2000-06-06"
remediation = "限制配置文件的访问权限，确保仅管理员可读；升级到已修复此问题的版本；避免在配置文件中以明文存储敏感凭据，使用加密存储或专用凭据管理方案。"
score = 7.2
severity = "HIGH"
sources = ["cve"]
title = "Shiva Access Manager 5.0.0 LDAP根DN及密码明文存储漏洞"
updated = "2000-06-16"

