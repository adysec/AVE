[basic]
description = "Sky Communications Skyfull Mail Server 是一款邮件服务器软件，其 SMTP 服务在处理 MAIL FROM 命令时存在缓冲区溢出缺陷。攻击者在未认证的情况下，可通过向目标服务器 TCP 25 端口发送超长的 MAIL FROM 命令内容，触发缓冲区溢出，进而可能导致服务崩溃（拒绝服务）或在特定条件下执行任意代码。该漏洞无需身份认证，攻击条件仅需网络可达目标 SMTP 端口，影响邮件服务的可用性，危害较为严重。"
published = "1999-10-30"
remediation = "建议立即将 Sky Communications Skyfull Mail Server 升级至官方修复后的版本；若暂时无法升级，可在防火墙或边界网络设备上通过 iptables 或 ACL 限制仅允许受信任内网 IP 访问 TCP 25 端口的 SMTP 服务，并禁止外部主机发送超长 MAIL FROM 命令，作为临时缓解措施。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "Sky Communications Skyfull Mail Server SMTP 服务缓冲区溢出漏洞"
updated = "2026-06-16"

