[basic]
description = "Check Point Firewall-1 存在安全绕过漏洞，远程攻击者可通过向 FTP 服务器发送恶意数据包，诱使服务器返回伪造的 227 响应（PASV 模式），导致防火墙错误地放行本应被阻止的端口访问。该漏洞影响 Check Point Firewall-1 产品，CVSS 评分 7.5，危害等级高。攻击者无需身份认证即可利用此漏洞绕过防火墙端口访问限制，实现未授权通信。"
published = "2000-02-12T05:00:00.000"
remediation = "建议升级 Check Point Firewall-1 至最新安全补丁版本（如 Service Pack 2 及以上），或启用 FTP 安全策略中的「严格 RFC  compliance」选项，限制 FTP 数据连接端口范围并启用协议异常检测，防止攻击者伪造 227 响应绕过端口访问控制。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "Check Point Firewall-1 FTP 安全绕过漏洞"
updated = "2026-06-16T21:51:06.277"

