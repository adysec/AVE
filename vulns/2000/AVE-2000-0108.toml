[basic]
description = "Mirabilis ICQ 99b 1.1.1.1 客户端存在远程缓冲区溢出漏洞。攻击者可通过向目标用户发送特制的畸形 URL 链接，在 ICQ 消息解析过程中触发缓冲区溢出，从而在受害者系统上以当前用户权限执行任意命令。该漏洞影响 ICQ 99b 1.1.1.1 及 3.19 等版本，无需身份认证，只需诱使用户点击消息中的恶意链接即可触发，CVSS 评分 7.5，危害等级高。当时官方未发布正式补丁，建议用户升级到更高版本或停止使用受影响版本。"
published = "2000-01-10T05:00:00.000"
remediation = "立即升级 ICQ 客户端至 2000a 或更新版本，该版本已修复 URL 消息处理中的缓冲区溢出漏洞。如无法升级，建议停止使用 ICQ 99b 并迁移至其他即时通讯软件，或在网络边界过滤异常 ICQ 消息流量作为临时缓解措施。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "Mirabilis ICQ 99b 远程缓冲区溢出漏洞"
updated = "2026-06-16T21:50:53.383"

