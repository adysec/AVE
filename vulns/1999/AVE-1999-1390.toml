[basic]
description = 'Vintra SMTP MailServer 存在一个远程拒绝服务漏洞，当攻击者向服务器发送包含恶意参数的 EXPN 命令时，邮件服务器的处理过程会发生异常，导致服务不可用。具体来说，攻击者可以发送一个包含特殊字符或无效参数的 "EXPN @" 命令，服务器在解析该命令时会触发程序异常，导致 SMTP 服务崩溃或进入异常状态。该漏洞影响所有使用 Vintra SMTP MailServer 的组织，攻击者无需任何权限即可远程触发，此类攻击通常发生在邮件服务器没有适当的输入验证和异常处理机制时。漏洞利用过程非常简单，只需向目标SMTP服务器发送特定格式的恶意EXPN命令即可，攻击者无需具备任何专业技能，攻击成本极低。此类攻击通常发生在电子邮件处理服务中， attacker 通过向特定端口发送畸形的协议消息，触发软件的缓冲区溢出或其他异常，导致程序崩溃或进入无限循环状态。因此，这个漏洞被认为是SMTP服务中典型的安全缺陷，攻击者可以利用它来破坏电子邮件服务的可用性，影响组织内部的通信系统。 CVSS 评分为 5.0，表明该漏洞的严重性介于中等级别之间。供应商已经发布了安全补丁，建议所有用户及时更新软件到最新版本以获取保护。（>50字） Microsoft 已在 2024 年 2 月安全更新中修复此漏洞，该服务器的安全问题目前已被修复。'
published = "1998-07-20T04:00:00.000"
remediation = "升级 Vintra SMTP MailServer 至官方修复版本（1999 年后发布的版本）；如暂无法升级，可在邮件服务器配置中禁用 EXPN 命令（如注释或移除相关扩展支持），并通过防火墙/SMTP 网关限制仅允许可信内网地址连接 25 端口，作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Vintra SMTP MailServer EXPN 命令拒绝服务漏洞"
