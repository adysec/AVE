[basic]
description = "Sojourn 2.0 搜索引擎存在路径遍历漏洞，远程攻击者可通过在 URL 中提交包含 ..（点点）序列的特制请求，绕过目录限制读取服务器上的任意文件。该漏洞源于程序未对用户输入的文件路径进行充分过滤，攻击者无需认证即可利用，可能导致敏感信息泄露。CVSS 评分 5.0，危害等级中危。"
published = "2000-03-14T05:00:00.000"
remediation = "建议立即将 Sojourn 搜索程序升级至厂商提供的最新修补版本。如产品已停止维护无法获取补丁，应在 Web 服务器层（如 Apache mod_rewrite）添加规则，拦截包含 ../ 或 %2e%2e/ 等目录遍历特征的请求；同时在应用程序入口处对用户输入的搜索参数进行严格过滤，移除所有路径分隔符和特殊字符，仅允许合法搜索词。作为长期方案，建议迁移至仍在安全维护中的现代搜索引擎产品。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Generation Terrorists Designs Sojourn 2.0 路径遍历漏洞"
updated = "2026-06-16T21:51:10.033"

