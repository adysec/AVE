[basic]
description = "Washington 大学开发的 wu-ftpd FTP 服务器在处理 SITE NEWER 命令时存在内存未正确释放的缺陷，导致内存耗尽拒绝服务漏洞。远程攻击者无需身份认证即可通过反复发送特制的 SITE NEWER 命令消耗服务器内存资源，最终造成 FTP 服务崩溃或无法响应正常请求。该漏洞影响多个版本的 wu-ftpd 服务器软件。"
published = "1999-10-01T04:00:00.000"
remediation = "升级到 wu-ftpd 2.6.0 或更高版本（官方已修复该内存未释放缺陷）。若无法立即升级，可在 ftpaccess 配置中禁用或限制 SITE NEWER 命令，或通过防火墙/inetd 限制 FTP 服务仅对受信任网段开放，并配置连接数与资源使用上限作为临时缓解措施。"
