[basic]
description = "Siemens SIMATIC S7-1200 CPU 设备集成 Web 服务器存在跨站脚本（XSS）漏洞，远程攻击者可通过向受影响设备发送特制请求注入任意 Web 脚本或 HTML 代码，在认证用户浏览器中执行恶意脚本，导致敏感信息泄露或会话劫持。该漏洞影响 SIMATIC S7-1200 CPU 2.x 及 3.x 系列固件版本，CVSS 评分 4.3，危害等级中危。用户应升级固件至修复版本以消除风险。"
published = "2014-04-25T05:12:07.847"
remediation = "将 SIMATIC S7-1200 CPU 固件升级至 4.0 或更高版本，该版本已修复集成 Web 服务器的 XSS 漏洞。如无法升级，在管理界面禁用集成 Web 服务器功能，或通过防火墙规则限制对 Web 服务器端口 (80/443) 的访问，仅允许可信 IP 连接。"
score = 4.3
severity = "MEDIUM"
sources = ["nuclei"]
title = "西门子 SIMATIC S7-1200 CPU 集成Web服务器跨站脚本漏洞"
updated = "2026-06-17T00:07:21.047"

