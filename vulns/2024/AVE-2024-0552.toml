[basic]
description = "Git LFS 在向 Git 凭据助手请求远程主机凭据时，未对 URL 中嵌入的换行控制字符（如 LF、CR）进行过滤，直接将包含控制字符的 URL 传递给 `git-credential` 命令，导致凭据助手返回的凭据被发送回攻击者控制的远程主机。攻击者可构造包含 URL 编码控制字符的恶意 HTTP URL，诱导用户克隆或拉取恶意仓库，窃取用户的 Git 凭据（如 GitHub Token、个人访问令牌等）。该漏洞影响 Git LFS v3.6.1 之前的所有版本，CVSS 4.0 评分 8.5（HIGH），攻击向量为网络、攻击复杂度低、需要用户交互。Git LFS v3.6.1 已修复该漏洞，用户应尽快升级至 v3.6.1 或更高版本，目前暂无已知缓解措施。"
published = "2025-01-14T20:15:28.610"
remediation = "建议立即升级 Git LFS 至 v3.6.1 或更高版本（https://github.com/git-lfs/git-lfs/releases/tag/v3.6.1），执行 `git lfs install --force` 完成更新。官方确认暂无有效缓解措施，无法升级时应避免克隆或拉取不受信的远程仓库，并定期轮换 Git 凭据（如 GitHub Token、个人访问令牌）以降低泄露影响。"
score = 8.5
severity = "HIGH"
sources = ["msrc"]
title = "Git LFS Git LFS 凭据泄露漏洞"
updated = "2026-06-17T08:08:42.903"

