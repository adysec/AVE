[basic]
description = "Debian suidmanager 0.18 版本中的 suidexec 程序存在权限验证缺陷，本地攻击者可通过在命令行参数中指定恶意程序路径，利用该工具以 root 权限执行任意代码，从而获取系统最高控制权。该漏洞影响 Debian 2.0 系统，CVSS 评分 7.2，危害等级高。攻击前提是需要拥有本地系统账号及 shell 访问权限。"
published = "1998-04-28T04:00:00.000"
remediation = "建议升级 suidmanager 至 0.18 以上版本，或直接移除 suidmanager 软件包（apt-get remove suidmanager）。如无法升级，可移除 /usr/bin/suidexec 的 SUID 权限（chmod u-s /usr/bin/suidexec）以消除提权风险。长期方案建议升级至 Debian 3.0 及以上版本。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "Debian suidmanager suidexec 本地权限提升漏洞"
updated = "2026-06-16T21:50:20.250"

