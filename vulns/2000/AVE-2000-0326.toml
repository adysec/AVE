[basic]
description = "Pacific Software 的 Carello 购物车软件 1.2.1 版本中 add.exe 程序存在文件复制漏洞，远程攻击者无需身份认证即可通过特制请求复制服务器上的任意文件，进而读取 .ASP 等 Web 脚本的源代码，导致敏感信息泄露。该漏洞影响 Carello 1.2.1 及更早版本，攻击复杂度低，危害中等。"
published = "2000-05-24"
remediation = "Pacific Software Carello 1.2.1 已停止维护，无官方补丁可用。建议立即在 Web 服务器（IIS）URL 重写规则中禁止访问 /scripts/Carello/add.exe，或直接删除 add.exe 文件以消除源代码泄露风险。长远应迁移至仍在维护的购物车系统。"
score = 5
severity = "MEDIUM"
sources = [
    "cve",
    "exploitdb",
]
title = "Pacific Software Carello 文件复制与源代码披露漏洞"
updated = "2026-06-16"

