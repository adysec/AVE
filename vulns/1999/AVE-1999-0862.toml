[basic]
description = "Windows NT 系统存在注册表权限配置不当的安全漏洞。系统中某关键注册表项的访问控制列表（ACL）配置错误，导致未经身份认证的远程攻击者可能通过多种方式（如空会话连接、SMB 协议等）获取对该注册表项的写入或修改权限。攻击者可利用此漏洞篡改系统级配置信息，进而提升自身权限、禁用安全服务或进行其他恶意操作，完全绕过原有的访问控制机制。该漏洞影响 Windows NT 4.0 及早期基于 Windows NT 内核的系统，CVSS 评分高达 10.0，危害等级为严重。建议管理员立即使用注册表编辑器（regedt32）检查并修复相关注册表项的权限配置，严格限制可访问该关键注册表项的用户和组，仅赋予系统管理员必要的读取权限，避免授予写入或完全控制权限。"
published = "1999-01-01T05:00:00.000"
remediation = 'Windows NT 已停止支持，建议立即升级至 Windows Server 2019/2022 或更高版本。若无法升级，使用 regedt32 检查并收紧关键注册表项（如 HKLM\SAM、HKLM\SECURITY、HKLM\SYSTEM）的权限，移除 Everyone 和 Users 组的完全控制权，仅保留 SYSTEM 和 Administrators 的完全控制权。应用 Microsoft 安全配置工具（SCE）或自定义安全模板（.inf）批量修复注册表 ACL。'
score = 10
severity = "CRITICAL"
sources = ["epss"]
