[basic]
description = "Windows NT 4.0 打印后台处理程序（Spoolss.exe）存在权限配置不当漏洞，本地用户可利用不安全的默认权限指定替代打印提供程序（DLL），从而以系统权限执行任意命令。该漏洞影响 Windows NT 4.0 所有服务包版本，攻击者需拥有本地访问权限，CVSS 评分 7.2，危害等级高。"
published = "1999-11-04T05:00:00.000"
remediation = '立即安装微软针对该漏洞发布的安全补丁（Windows NT 4.0 Service Pack 6a 及后续安全汇总补丁，如通过 Windows Update 或微软安全公告获取对应热修复）。如无法立即打补丁，可临时将打印后台处理服务（Spooler）的启动类型设为"手动"或"禁用"并停止服务，限制普通本地用户对打印提供程序目录的写入权限，避免加载恶意 DLL，同时收紧注册表 HKEY_LOCAL_MACHINE\SYSTEM\CurrentControlSet\Services\Spoolss 相关 ACL 以缓解风险。'
score = 7.2
severity = "HIGH"
sources = ["exploitdb"]
title = "Microsoft Windows NT 4.0 打印后台处理服务 DLL 注入漏洞"
updated = "2026-06-16T21:49:17.310"

