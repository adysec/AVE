[basic]
description = "Alex Heiphetz Group 开发的 EZShopper 3.0 电子商务系统中的 loadpage.cgi CGI 脚本存在目录遍历漏洞与命令注入漏洞。远程攻击者无需身份认证即可通过构造包含 `..` 的路径参数读取服务器任意文件，或通过注入 shell 元字符（如管道符、分号等）远程执行系统命令。该漏洞利用方式简单，攻击者仅需发送特制 HTTP 请求即可完成利用，可导致服务器敏感信息泄露甚至完全被控制。"
published = "2000-02-27T05:00:00.000"
remediation = "立即升级 EZShopper 至不存在此漏洞的最新版本；如厂商已停止维护，建议在 Web 服务器（Apache/Nginx）中删除或禁用 `/cgi-bin/loadpage.cgi` 脚本，或通过 `.htaccess` 限制对该路径的访问。临时缓解措施可在 WAF 规则中拦截包含 `../` 及 shell 元字符（`;` `` ` `` `|`）的请求。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "Alex Heiphetz Group EZShopper loadpage.cgi 远程命令执行漏洞"
updated = "2026-06-16T21:51:10.903"

