[basic]
description = "Allaire Spectra 容器编辑器预览工具存在对象安全策略未正确执行漏洞，攻击者可通过向容器对象添加带有发布规则的对象方法（object-method）来绕过权限检查，从而执行未授权的操作。该漏洞影响 Allaire Spectra 系列产品，攻击者需具备本地访问权限，利用难度较低，可导致部分机密信息泄露。官方已发布安全更新修复此漏洞。"
published = "2000-04-24T04:00:00.000"
remediation = "立即安装 Allaire 官方发布的 Spectra 安全补丁（参考 Allaire 安全公告 ID=15411）。由于 Allaire Spectra 产品已停止维护且厂商已被收购，建议迁移至其他受支持的容器内容管理平台，并在迁移前严格限制对容器编辑器的访问权限，仅允许受信任的管理员使用预览工具。"
score = 2.1
severity = "LOW"
sources = ["avd"]
title = "Allaire Spectra 容器编辑器预览对象安全绕过漏洞"
updated = "2026-06-16T21:51:30.020"

