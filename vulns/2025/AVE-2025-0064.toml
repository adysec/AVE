[basic]
description = "Laravel LaRecipe 文档管理套件的 `renderBlade` 方法存在未授权代码注入漏洞，远程攻击者可在无需认证的情况下通过构造恶意的 Blade 模板内容实现任意代码执行。该漏洞影响使用 LaRecipe 组件的 Laravel 应用，攻击者仅需向目标应用发送特制的 HTTP 请求即可触发，危害等级严重。建议受影响的用户尽快更新 LaRecipe 至安全版本。"
published = "0718"
remediation = "建议立即将 binarytorch/larecipe 升级到 v2.8.1 或以上版本（最新 v2.9.1），该版本已修复 renderBlade 未授权代码注入漏洞。如无法立即升级，可在 LaRecipe 路由配置中添加 auth 中间件限制未授权访问，或禁用 renderBlade 功能作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "Laravel LaRecipe renderBlade 未授权代码执行漏洞"
updated = "0718"

