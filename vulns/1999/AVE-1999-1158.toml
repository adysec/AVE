[basic]
description = "Roxen Web Server 1.3.11 及更早版本中，htmlparse.pike 组件在处理 RXML 页面的 referer 标签时存在缺陷，可能与递归解析逻辑相关。远程攻击者可通过构造包含特制 referer 标签或递归 RXML 结构的恶意请求发送至目标服务器，触发解析异常，可能导致拒绝服务或异常行为。该漏洞影响使用受影响版本 Roxen Web Server 的站点，攻击无需身份认证，仅需能向服务器发送 HTTP 请求即可利用。"
published = "1999-10-07T04:00:00.000"
remediation = "建议立即升级 Roxen Web Server 至 1.3.12 或更高版本，该版本修复了 htmlparse.pike 递归解析和 RXML 中 referer 标签的漏洞。如无法立即升级，可暂时禁用 RXML 中的 referer 标签功能或限制 RXML 递归解析深度作为临时缓解措施。建议从 Roxen 官方网站下载最新版本进行升级。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Roxen Web Server htmlparse.pike 递归解析漏洞"
updated = "2026-06-16T21:50:37.233"

