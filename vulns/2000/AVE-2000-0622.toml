[basic]
description = "CamShot WebCam 2.6 Trial 版本存在远程缓冲区溢出漏洞，远程攻击者可通过向目标 WebCam 服务发送超长 Authorization 头部触发缓冲区溢出，导致任意代码执行。该漏洞影响 CamShot WebCam 2.6 Trial 版本，攻击者无需身份认证即可远程利用，CVSS 评分 7.5，危害等级高。Exploit-DB 上已有公开利用代码（EDB-ID: 20224），攻击者可借此完全控制目标系统。"
published = "2000-11-14T05:00:00.000"
remediation = "立即卸载 CamShot WebCam Trial 2.6 试用版，该版本已不再受支持且存在远程代码执行漏洞。建议迁移至现代 WebCam 服务器软件（如 Yawcam、iSpy 等），并在防火墙层面限制仅允许受信任 IP 访问 WebCam 服务端口（默认 80），同时禁用 Basic 认证或改用更安全的认证方式。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "CamShot WebCam Trial 2.6 远程缓冲区溢出漏洞"
updated = "2026-06-16T21:52:34.097"

