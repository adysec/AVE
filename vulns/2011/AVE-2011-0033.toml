[basic]
description = "Adobe Flash Player 及 Adobe Reader/Acrobat 的 Authplay.dll 组件在处理特制 SWF 文件时存在内存破坏漏洞。攻击者可将恶意 Flash 内容嵌入 Excel 文档或网页中，诱使用户打开即可触发漏洞，导致远程代码执行或应用程序崩溃。该漏洞已发现在野利用，影响 Windows/Mac/Linux/Solaris 及 Android 平台上的 Flash Player 10.2.154.13 及更早版本、AIR 2.5.1 及更早版本、Reader/Acrobat 9.x-10.0.1，CVSS 评分 7.8，危害等级高。"
published = "2011-03-15T17:55:03.827"
remediation = "立即升级 Adobe Flash Player 至 10.2.153.1 及以上版本（Windows/Mac/Linux/Solaris），Android 版升级至 10.1.106.17 及以上版本；Adobe AIR 升级至 2.5.2 及以上版本；Adobe Reader/Acrobat 升级至 9.4.3 或 10.0.2 及以上版本。由于 Adobe Flash Player 已于 2020 年底停止支持，建议彻底卸载 Flash Player 并从浏览器中禁用或移除 Flash 插件，改用 HTML5 替代方案。对于必须使用 Flash 的遗留系统，可配置浏览器策略仅允许可信站点加载 Flash 内容，并启用 Click-to-Play 机制防止自动触发。"
score = 7.8
severity = "HIGH"
sources = ["kev"]
title = "Adobe Flash Player SWF 文件远程代码执行漏洞"
updated = "2026-06-16T23:27:44.460"

