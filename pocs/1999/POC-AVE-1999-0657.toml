[info]
author = "AVE"
description = "检测目标 WPAD 服务器是否可被用于代理配置劫持。通过请求 wpad.dat 文件验证 WPAD 服务器是否返回有效的代理自动配置（PAC）脚本，若存在则攻击者可伪造 WPAD 服务器篡改 IE 代理设置。"
id = "POC-AVE-1999-0657"
name = "CVE-1999-0858 PoC"
severity = "medium"
tags = ["cve-1999-0858"]
vuln_id = [
    "CVE-1999-0858",
    "AVE-1999-0657",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/wpad.dat"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "PROXY",
    "FindProxyForURL",
]
