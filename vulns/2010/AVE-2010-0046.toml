[basic]
description = "Joomla! 的 PowerMail Pro 组件 1.5.3 版本中存在目录遍历漏洞，远程攻击者无需认证即可通过向 index.php 的 controller 参数中传入包含 `..`（点点）的恶意路径，实现任意文件读取。该漏洞源于程序未对用户输入的路径参数进行充分过滤，可读取系统敏感文件如配置文件等，可能导致进一步的信息泄露。CVSS 评分 5.0，危害等级中等。"
published = "2010-04-26T18:30:00.660"
remediation = "立即在 Joomla 后台卸载 com_powermail 组件（PowerMail Pro 1.5.3），该扩展已停止维护不再有安全更新。替换为仍在维护的其他 Joomla 邮件表单扩展。若暂时无法卸载，可在 Apache/Nginx 或 WAF 层面添加规则，拦截 controller 参数中包含 `../` 或 `..%2f` 等目录遍历特征的 GET 请求，作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["nuclei"]
title = "Joomla! PowerMail Pro 本地文件包含漏洞"
updated = "2026-06-16T23:18:34.100"

