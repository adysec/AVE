[basic]
description = "SiYuan 思源笔记 v3.6.5 及以下版本的属性视图（数据库）资产单元渲染器中存在存储型 XSS 漏洞。该漏洞源于在 aria-label 属性渲染时使用了仅转义引号的 escapeAttr() 函数，而非完整的 escapeAriaLabel() 函数，导致恶意资产单元链接内容未经充分过滤即被浏览器解析执行。攻击者可构造包含恶意 onclick、onerror 等事件处理器的资产单元，受害者打开文档时即触发 XSS，悬停单元格时触发二次攻击。由于 Electron 渲染器启用了 nodeIntegration: true 且 contextIsolation: false，攻击者可进一步利用 Node.js 原生模块执行系统命令，实现远程代码执行（RCE）。影响 Windows 和 Linux 平台用户，攻击者仅需分享包含恶意资产单元的文档即可触发，可导致笔记窃取、文件系统访问、凭证窃取及持久化控制。官方已在 v3.7.0 修复，建议立即升级或临时禁用属性视图资产列功能、启用 contextIsolation 并禁用 nodeIntegration 作为缓解措施。"
published = "2026-06-24T22:16:47.513"
remediation = "建议立即升级 SiYuan 至 v3.7.0 或更高版本（官方已在 v3.7.0 修复该漏洞）。如暂时无法升级，可临时禁用属性视图的资产列功能，或在 Electron 配置中设置 contextIsolation: true 并 nodeIntegration: false 以阻断 RCE 链路。长期建议升级 Electron 版本并启用 contextIsolation 与 nodeIntegration: false 作为纵深防御。"
score = 9.9
severity = "CRITICAL"
sources = ["ghsa"]
title = "思源笔记 属性视图资产单元渲染器存储型XSS远程代码执行漏洞"
updated = "2026-06-25T14:16:45.323"

