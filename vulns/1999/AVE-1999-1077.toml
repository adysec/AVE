[basic]
description = "Windows NT 4.0 存在内核句柄处理缺陷，本地用户可通过用户态应用程序关闭已在内核态打开的文件句柄，当内核尝试关闭该句柄时由于双重释放导致系统崩溃，从而引发拒绝服务。该漏洞影响 Windows NT 4.0 系统，攻击者需拥有本地登录权限才能利用，CVSS 评分 2.1，危害等级低。"
published = "1999-12-31T05:00:00.000"
remediation = "安装 Windows NT 4.0 Service Pack 6a (SP6a) 或更高版本，该版本修复了内核模式句柄在用户态关闭导致系统崩溃的问题。如无法升级，限制非授权用户本地登录系统作为临时缓解措施。"
score = 2.1
severity = "LOW"
sources = ["cve"]
title = "Microsoft Windows NT 4.0 内核句柄处理本地拒绝服务漏洞"
updated = "2026-06-16T21:50:16.473"

