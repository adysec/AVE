[basic]
description = "Qualcomm qpopper POP 邮件服务器在创建邮箱锁文件时使用可预测的锁定文件名，导致本地攻击者可以通过提前创建其他用户邮箱的锁文件阻止合法用户访问邮件，从而引发拒绝服务。该漏洞影响 Qualcomm qpopper 2.53/3.0 版本以及 RedHat imap 4.5 和 UoW imap 4.5 中的 popd 组件。攻击者无需特殊权限即可实施攻击。"
published = "2001-08-31"
remediation = "升级 qpopper 到 4.0 或更高版本，该版本已修复锁文件随机化机制；如软件已停止维护，建议迁移至 Dovecot、Cyrus 等受支持的 POP3 服务；临时缓解措施包括移除受影响用户的 shell 登录权限以消除本地攻击面，并限制 /var/lock 目录的写入权限仅允许 pop 守护进程用户访问。"
score = 5.5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Qualcomm qpopper 锁文件拒绝服务漏洞"
updated = "2026-07-21T00:00:00Z"

