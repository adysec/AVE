[basic]
description = "CiscoSecure访问控制服务器（ACS）for UNIX在默认安装配置下缺乏必要的身份验证机制。未经身份认证的远程攻击者无需提供任何凭据，即可直接通过TCP端口9900访问并修改ACS服务器的内部数据库，包括用户账户、访问控制策略及认证配置等敏感数据。该漏洞影响CiscoSecure ACS for UNIX 1.0至2.3.2版本，攻击者可利用此漏洞篡改安全策略、创建未授权账户或植入后门，从而完全绕过企业网络的访问控制体系。"
published = "1999-08-19"
remediation = "升级 CiscoSecure ACS for UNIX 至 2.3.3 或更高版本，该版本默认已启用管理客户端验证。如无法升级，可编辑 CSCconfig.ini 配置文件，设置 ValidateClients=true 并在 [ValidClients] 段中仅允许受信管理主机的 IP 或主机名；同时在网络防火墙上限制对 TCP 端口 9900 的访问，仅允许受信管理网络连接。注意：2.2.2、2.2.3、2.3.1 和 2.3.2 版本启用客户端验证后会影响管理 GUI 功能，建议直接升级至 2.3.3。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "CiscoSecure 访问控制服务器（ACS）默认配置未授权访问漏洞"
