[basic]
description = "Check Point VPN-1/FireWall-1 4.1及更早版本存在安全绕过漏洞。该漏洞源于防火墙错误地重传封装的FWS数据包，即使这些数据包并非来自合法的FWZ客户端。远程攻击者无需身份认证即可通过网络向目标系统发送特制的封装数据包，绕过防火墙的安全策略检查，导致机密性、完整性和可用性部分受损。CVSS评分7.5，危害等级高。"
published = "2000-11-14T05:00:00.000"
remediation = "升级 Check Point VPN-1/FireWall-1 至 4.1 SP6 或更高版本，该漏洞已在后续版本中修复。对于无法升级的遗留系统，在防火墙上配置访问控制规则，仅允许来自可信 FWZ 客户端的加密封装包通过，并禁用不必要的 VPN 隧道封装功能作为临时缓解措施。建议迁移至 Check Point 当前受支持版本（R80 及以上）以获得持续安全更新。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "Check Point VPN-1/FireWall-1 封装数据包重传安全绕过漏洞"
updated = "2026-06-16T21:52:31.053"

