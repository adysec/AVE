[basic]
description = "eTrust Access Control（原名 SeOS）默认安装使用了固定的默认加密密钥，远程攻击者可利用该密钥伪造 eTrust 管理员身份，从而获取系统完全控制权限。该漏洞无需身份认证即可远程利用，攻击复杂度低，影响系统的机密性、完整性和可用性。厂商建议用户立即修改默认加密密钥以降低风险。"
published = "2000-10-20T04:00:00.000"
remediation = "立即修改 eTrust Access Control 默认加密密钥，在配置文件中设置自定义密钥而非使用出厂默认值；将产品升级至 Broadcom 官方提供的最新受支持版本（4.1/5.0 已停止维护，建议迁移至 CA Access Control 最新版本）；在网络层面限制对 eTrust 管理端口的访问，仅允许受信任管理 IP 通过防火墙规则连接，并启用 TLS 加密通信防止中间人攻击。"
score = 10
severity = "CRITICAL"
sources = ["cve"]
title = "CA eTrust Access Control 默认加密密钥认证绕过漏洞"
updated = "2026-06-16T21:52:25.690"

