[basic]
description = "Dansie Shopping Cart 3.0.4 版本的 cart.pl 脚本存在信息泄露漏洞。未经身份认证的远程攻击者可通过在 URL 中引用 env、db 或 vars 等表单变量的方式，直接获取目标系统的购物车数据库及配置文件信息。该漏洞影响使用该版本购物车系统的网站，攻击者无需登录即可利用，可导致敏感数据泄露。建议升级到更高版本或应用官方补丁。"
published = "2000-04-14T04:00:00.000"
remediation = "建议将 Dansie Shopping Cart 升级至最新可用版本，或彻底删除 cart.pl 脚本并替换为官方更新的电子商务平台。若暂无法升级，应在 Web 服务器配置（如 Apache .htaccess）中添加规则拒绝对 cart.pl 的远程访问，并删除或重命名含有 env、db、vars 参数的调试接口，同时在防火墙层面限制对该脚本的 HTTP 请求。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Dansie Shopping Cart cart.pl 购物数据库与配置信息泄露漏洞"
updated = "2026-06-16T21:51:19.827"

