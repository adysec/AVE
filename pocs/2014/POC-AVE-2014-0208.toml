[info]
author = "AVE"
description = "通过构造恶意网页检测目标 Internet Explorer 是否存在权限提升漏洞（CVE-2014-2817）。远程攻击者可利用特制网站绕过 IE 安全区域保护，在用户上下文中提升权限执行任意代码。"
id = "POC-AVE-2014-0208"
name = "Microsoft Internet Explorer 权限提升漏洞 PoC"
severity = "high"
tags = ["ave-2014-0208"]
vuln_id = [
    "CVE-2014-2817",
    "AVE-2014-0208",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "MSIE 6.0",
    "MSIE 7.0",
    "MSIE 8.0",
    "MSIE 9.0",
    "MSIE 10.0",
    "MSIE 11.0",
    "Trident/",
]
