[basic]
description = 'Microsoft IIS 4.0/5.0 存在可执行文件解析漏洞（即"Web 服务器文件请求解析"漏洞），远程未经身份认证的攻击者可通过发送针对可执行文件的畸形请求，在文件名后追加操作系统命令，导致服务器解析并执行任意系统命令。该漏洞影响 Microsoft IIS 4.0 和 5.0 版本，CVSS 评分 7.5（AV:N/AC:L/Au:N/C:P/I:P/A:P），属于高危漏洞。攻击者无需身份认证即可远程发起攻击，通过构造包含系统命令的可执行文件请求路径，利用 IIS 对文件名解析不当的缺陷实现远程代码执行，可完全控制受影响的 Web 服务器。Microsoft 已于 2000 年 12 月发布安全公告 MS00-086 修复此漏洞。'
published = "2000-12-19T05:00:00.000"
remediation = "立即安装 Microsoft 安全公告 MS00-086 提供的补丁 (KB277873)，下载地址：https://www.microsoft.com/technet/security/bulletin/MS00-086.mspx。若使用 IIS 4.0，请升级至 IIS 5.0 并应用补丁；若使用 IIS 5.0，请直接安装补丁 KB277873。无法立即打补丁时，可在 IIS 管理器中移除不必要的脚本映射（如 .exe、.dll、.bat、.cmd 等可执行扩展名的映射），或在 IIS 中禁用脚本/可执行权限作为临时缓解措施。建议尽快升级至 IIS 5.1 或更高版本（Windows XP/Server 2003 自带 IIS 5.1/6.0 已修复此漏洞）。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "微软 IIS 4.0/5.0 远程代码执行漏洞"
updated = "2026-06-16T21:52:40.523"

