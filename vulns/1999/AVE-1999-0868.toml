[basic]
description = "Seattle Labs Emurl 2.0 及更早版本存在不安全存储漏洞，程序将电子邮件附件存入启用了脚本执行的目录中，攻击者可通过发送包含恶意 ASP 文件附件的邮件触发该漏洞，当收件人打开邮件时 ASP 脚本自动执行，导致任意代码执行。该漏洞影响 Seattle Labs Emurl 系列邮件客户端，CVSS 评分 7.5，危害等级高。"
published = "1999-07-28T04:00:00.000"
remediation = "在邮件附件存储目录中禁用脚本执行权限，将附件保存目录移出 Web 根目录或在该目录的 IIS 配置中移除 ASP/脚本映射。升级到 Emurl 2.0 以上版本，并配置附件目录无执行权限。如无法升级，可在 IIS 中将附件目录设置为禁止脚本执行。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "Seattle Labs Emurl 邮件附件脚本执行漏洞"
updated = "2026-06-16T21:49:31.843"

