[basic]
description = "SGI IRIX 6.3 和 6.4 系统中的 System Manager（sysmgr）图形界面存在代码执行漏洞。远程攻击者可通过构造恶意的 runtask 或 runexec 描述符文件（木马文件），当用户在邮件客户端中打开时，若其 Mailcap 配置支持 x-sgi-task 或 x-sgi-exec 类型，则系统会自动执行该描述符文件中指定的 System Manager 任务，从而以当前用户权限运行攻击者控制的命令。攻击需诱导本地用户通过受影响的邮件处理流程触发，影响范围涵盖运行 IRIX 6.3 与 6.4 的 SGI 工作站及服务器，可导致远程命令执行与系统沦陷。"
published = "1998-04-02T05:00:00.000"
remediation = "升级 SGI IRIX 到 6.5 及更高版本（包含安全修复），或直接应用针对 CVE-1999-1183 的官方补丁包。同时修改 Mailcap 配置文件，禁用 x-sgi-task 和 x-sgi-exec 类型，或将其设置为仅允许白名单的执行程序，并禁止在系统管理器 GUI 中处理外部描述符文件。此外，您可以添加安全策略，限制用户无法创建或加载任意 Mailcat 条目，并使用不变量检测机制对附件类型进行验证。"
score = 7.6
severity = "HIGH"
sources = ["avd"]
title = "SGI IRIX 代码执行漏洞"
updated = "2026-06-16T21:49:53.770"

