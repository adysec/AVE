[basic]
description = "Mobius DocumentDirect for the Internet 1.2 的 Web 授权表单存在缓冲区溢出漏洞，远程攻击者无需身份认证即可通过向 username 字段提交超长字符串触发该漏洞，导致目标系统拒绝服务或执行任意命令。该漏洞影响 Mobius DocumentDirect for the Internet 1.2 版本，CVSS 评分 10.0，危害等级严重。目前尚无官方补丁发布，建议限制受影响组件的网络访问权限。"
published = "2000-11-14T05:00:00.000"
remediation = "该产品 Mobius DocumentDirect for the Internet 1.2 已停止维护，厂商未发布官方补丁。建议立即停止使用该版本，迁移至受支持的文档管理解决方案。如无法立即替换，可在网络边界防火墙或反向代理上限制对 Web 授权表单页面的访问，仅允许受信任 IP 段访问，并对输入字段长度进行前端和后端双重校验以缓解缓冲区溢出风险。"
score = 10
severity = "CRITICAL"
sources = ["cve"]
title = "Mobius DocumentDirect for the Internet 缓冲区溢出远程代码执行漏洞"
updated = "2026-06-16T21:52:32.987"

