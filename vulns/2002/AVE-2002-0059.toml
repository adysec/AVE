[basic]
description = "LPRng 打印系统中的 html2ps HTML/PostScript 转换器 1.0 版本存在远程命令执行漏洞。html2ps 在处理 HTML 文件中的 IMG 标签时，未对用户输入进行有效过滤，直接调用 Perl 的 open() 函数打开文件，导致攻击者可通过构造包含恶意管道命令（如 `|` 符号）的 IMG SRC 属性的 HTML 文件，在打印作业处理过程中以 lp 用户权限执行任意系统命令。攻击者需已获得 lp 账户访问权限，但成功利用后可获得 lp 用户权限的远程 shell，进而可能提升权限控制整个系统。该漏洞 CVSS v2 评分为 7.5，危害等级高。"
published = "2002-11-12"
remediation = "将 html2ps 升级至 1.0b3-1.1 或更高版本（Debian 用户可通过 DSA-192 更新）。该漏洞源于 html2ps 在处理 HTML 中 IMG 标签的 SRC 属性时未对用户输入进行过滤，直接传递给 Perl 的 open() 函数导致命令注入。建议同时限制 lp 账户的打印作业来源，仅允许受信任用户提交打印任务，并在 lpd 配置中禁用不必要的远程打印功能作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["osv"]
title = "LPRNG html2ps 1.0 远程命令执行漏洞"
updated = "2002-11-12"

