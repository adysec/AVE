[basic]
description = "Cisco 7xx 系列路由器（3.2 至 4.2 版本）的 HTTP 服务器默认开启，远程攻击者无需认证即可通过 HTTP 接口访问路由器管理页面，进而修改路由器配置，造成网络服务中断或流量劫持。该漏洞影响 Cisco 700 系列路由器，攻击者只需知道路由器 IP 地址即可利用，危害较大。"
published = "1999-03-11T05:00:00.000"
remediation = "升级 Cisco 7xx 系列路由器 IOS 至 4.2 以上版本，或通过命令行执行 `no http-server` 禁用 HTTP 管理服务，并在访问控制列表中限制仅允许可信管理 IP 访问路由器管理端口。若无法升级，建议在边界防火墙上阻断对路由器 TCP 80 端口的公网访问。Cisco 已在后续版本中将 HTTP 服务默认关闭。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "Cisco 7xx系列路由器HTTP服务默认开启漏洞"
updated = "2026-06-16T21:48:20.933"

