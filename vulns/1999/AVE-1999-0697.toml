[basic]
description = "Microsoft Windows NT 4.0 打印后台处理程序 DLL 插入漏洞"
published = "1999-11-04T05:00:00.000"
remediation = '立即升级至 Windows NT 4.0 Service Pack 6a (SP6a)，该版本修复了 Spoolss.exe 的权限配置缺陷。如无法升级，可通过组策略限制本地用户对注册表项 HKEY_LOCAL_MACHINE\SYSTEM\CurrentControlSet\Control\Print\Providers 的写入权限，并移除打印后台处理程序目录中非必要的写入权限作为临时缓解措施。'
