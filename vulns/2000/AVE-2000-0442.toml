[basic]
description = "BRU 备份软件存在环境变量注入漏洞，本地攻击者可通过设置 BRUEXECLOG 环境变量指定任意配置文件路径，导致攻击者能够向系统任意文件追加数据。该漏洞影响 BRU 15.1 及 16.0 版本，攻击者需拥有本地访问权限，CVSS 评分 7.2，危害等级高。建议升级到不受影响版本或限制 BRUEXECLOG 环境变量的使用。"
published = "2000-06-05T04:00:00.000"
remediation = "立即应用 Caldera 安全公告 CSSA-2000-018.0 提供的 BRU 修补版本。如无法升级，可移除 BRU 二进制文件的 setuid 权限（chmod u-s /usr/local/bin/bru），限制本地普通用户执行 BRU 的权限，同时通过系统环境变量过滤或清空 BRUEXECLOG 变量作为临时缓解措施。"
score = 7.2
severity = "HIGH"
sources = ["exploitdb"]
title = "BRU 备份软件 BRUEXECLOG 环境变量本地任意文件追加漏洞"
updated = "2026-06-16T21:51:57.010"

