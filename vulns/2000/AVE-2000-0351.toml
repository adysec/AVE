[basic]
description = "AppleShare IP 6.1 及之后版本存在信息泄露漏洞，远程攻击者可通过向 Web 服务器发送特制的无效范围（Range）请求，触发服务器返回敏感信息。该漏洞利用方式简单，无需认证即可远程触发，影响 AppleShare IP 6.x 系列版本，CVSS 评分 5.0，危害等级中危。"
published = "2000-05-02T04:00:00.000"
remediation = "建议立即下载并安装 AppleShare IP 6.3.1 或更高版本（参考 Apple 安全更新 n11670），该版本修复了 Web 服务器对畸形 HTTP Range 请求处理不当的问题。由于 AppleShare IP 已停产，无法升级时应停止该服务的公网暴露，或在防火墙/反向代理层面过滤异常 Range 头的 HTTP 请求，防止敏感信息泄露。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Apple AppleShare IP 6.x 信息泄露漏洞"
updated = "2026-06-16T21:51:31.557"

