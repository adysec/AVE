[basic]
description = "IBM AIX 系统的 techlibss 组件存在符号链接漏洞，本地攻击者可通过在目标系统上创建恶意的符号链接文件，诱使 techlibss 以高权限访问并覆盖任意文件，从而实现权限提升或破坏系统关键文件。该漏洞需要攻击者拥有本地访问权限，利用难度较低，影响 AIX 多个版本，CVSS 评分 2.1，危害等级低。"
published = "2000-01-10T05:00:00.000"
remediation = "升级 AIX 系统上的 techlib.service.rte 文件集至 1.0.0.4 或更高版本（2000 年 1 月服务 CD 中提供）。该文件集不会随自动更新安装，需手动使用 `installp -aX -d /dev/cd0 techlib.service.rte` 命令强制升级。如无法立即升级，可临时移除 techlibss 的 SUID 位以缓解风险：`chmod -s /usr/lpp/techlib/techlibss`。"
score = 2.1
severity = "LOW"
sources = ["avd"]
title = "IBM AIX techlibss 符号链接漏洞"
updated = "2026-06-16T21:50:57.527"

