[basic]
description = "nftp FTP 客户端 1.40 版本存在缓冲区溢出漏洞，远程恶意 FTP 服务器可通过向客户端发送超长的响应字符串触发该漏洞，导致客户端拒绝服务，甚至可能执行任意代码。攻击者只需搭建恶意 FTP 服务器并诱导目标用户连接即可实施攻击。"
published = "1999-12-31T05:00:00.000"
remediation = "请立即停止使用 nftp 1.40 及更早版本，升级至后继项目 tnftp（Debian 系统中安装 tnftp 包 ≥ 20200705 版本，其他系统可安装 NetBSD tnftp ≥ 20210827）。该漏洞已在 tnftp 的后续重写中得到修复。若无法升级，可改用 curl 或 lftp 等更成熟的 FTP 客户端替代，并在防火墙或应用层面仅允许连接可信任的 FTP 服务器作为临时缓解措施。"
score = 5.1
severity = "MEDIUM"
sources = ["avd"]
title = "nftp FTP客户端 缓冲区溢出远程代码执行漏洞"
updated = "2026-06-16T21:50:07.313"

