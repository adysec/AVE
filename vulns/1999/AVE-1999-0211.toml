[basic]
description = "Fujitsu Chocoa 1.0 beta7R IRC 客户端存在缓冲区溢出漏洞，远程攻击者可通过向目标用户发送特制的 IRC 频道主题（Topic）消息触发该漏洞，导致客户端崩溃或可能执行任意代码。该漏洞影响 Fujitsu Chocoa 1.0 beta7R 版本，攻击者只需控制 IRC 频道即可发起攻击，无需用户交互。"
published = "1999-08-01T04:00:00.000"
remediation = "Fujitsu Chocoa 1.0 beta7R 已停止维护，官方未发布安全更新。建议立即卸载 Fujitsu Chocoa，改用其他仍在维护的 IRC 客户端（如 HexChat、Irssi 等）。如无法卸载，可在防火墙规则中限制 IRC 端口（6660-6669/TCP）的出站连接作为临时缓解措施。"
score = 5.1
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Fujitsu Chocoa IRC 客户端远程缓冲区溢出漏洞"
updated = "2026-06-16T21:48:48.990"

