[basic]
description = "Classifieds.cgi 1.0 存在命令注入漏洞，远程攻击者可通过向 CGI 表单中的隐藏变量提交恶意系统命令，导致任意命令执行。该漏洞源于程序未对用户输入进行有效过滤，攻击者无需身份认证即可利用，可完全控制目标服务器。影响运行 Classifieds.cgi 1.0 的 Web 服务器，CVSS 评分 10.0，危害等级严重。"
published = "1999-12-15T05:00:00.000"
remediation = "该漏洞源于 classifieds.cgi 1.0 未对表单隐藏变量做任何过滤，导致远程攻击者可通过构造恶意 HTTP 请求直接执行任意系统命令。由于该 CGI 脚本已停止维护超过 20 年，建议立即从服务器上删除或替换 classifieds.cgi，改用支持参数化输入验证的现代 Web 应用（如采用 PHP/Python 框架重写），并在 Web 服务器层禁用 CGI 执行权限作为临时缓解措施。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "Greg Matthews Classifieds.cgi 1.0 远程命令执行漏洞"
updated = "2026-06-16T21:49:21.687"

