[basic]
description = "Oracle Java SE 及 Java for Business 的 JRE 组件中存在信任方法链远程代码执行漏洞。由于 Java 运行时环境（JRE）在执行特权方法时对未信任对象的检查不充分，远程攻击者可通过构建特制的 Java 小程序或应用程序，利用未修改关键方法的未信任对象或存在类似信任问题的接口，触发信任方法链（Trusted Methods Chaining）绕过安全限制，在目标系统上执行任意代码，实现完全控制。该漏洞影响 Java SE 6 Update 18、5.0 Update 23 及 1.4.2_25 等版本，CVSS 评分 9.8，危害等级严重。"
published = "2010-04-01T16:30:00.907"
remediation = "立即升级到 Oracle Java SE 6 Update 19 及以上版本、Java 5.0 Update 24 及以上版本、或 1.4.2_26 及以上版本，安装 Oracle 2010 年 3 月关键补丁更新 (CPU) 中的对应修复。如无法立即升级，可在浏览器中禁用 Java Applet 执行，或通过安全策略限制不可信类调用特权方法，并移除 Java 浏览器插件作为临时缓解措施。"
score = 9.8
severity = "CRITICAL"
sources = ["kev"]
title = "Oracle Java Runtime Environment 可信方法链远程代码执行漏洞"
updated = "2026-06-16T23:16:57.020"

