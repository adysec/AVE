[basic]
description = 'Solaris 操作系统中 snmpXdmid（SNMP 到 DMI 映射守护进程）存在缓冲区溢出漏洞。远程攻击者无需身份认证即可通过向目标主机的 snmpXdmid 服务发送超长特制的 "indication" 事件数据包触发栈溢出，从而在目标系统上以 root 权限执行任意命令。该漏洞影响 Solaris 2.6、7.0 及 8.0 版本，CVSS 评分高达 10.0，危害等级严重。Metasploit 框架已集成相应利用模块，攻击者可便捷实施远程入侵。'
published = "2001-05-03T04:00:00.000"
remediation = "建议立即安装 Sun 官方补丁 106874-04 (Solaris 2.6) / 106875-04 (Solaris 7) / 108811-04 (Solaris 8)，或升级至更高版本。如无法打补丁，可在 /etc/inetd.conf 中注释 snmpXdmid 行并重启 inetd 以禁用该服务，同时配置防火墙过滤 UDP 161/162 端口限制 SNMP 访问。"
score = 10
severity = "CRITICAL"
sources = ["exploitdb"]
title = "Sun Solaris snmpXdmid 远程缓冲区溢出漏洞"
updated = "2026-06-16T21:53:56.230"

