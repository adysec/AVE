[basic]
description = "IBM AIX 4.3.2 操作系统的 ftpd 守护进程存在远程缓冲区溢出漏洞。该漏洞源于 ftpd 在 libc 库中对用户输入缺乏充分的边界检查，未经身份认证的远程攻击者可通过向 FTP 服务（默认端口 21）发送特制的 FTP 命令触发缓冲区溢出，进而在目标系统上执行任意代码。该漏洞影响 IBM AIX 4.3.2 版本，攻击条件简单、无需身份验证，且利用难度低，CVSS 评分高达 10.0，危害等级严重。IBM 已通过官方安全公告（APAR）发布补丁修复此漏洞，受影响用户应尽快升级至修复版本。"
published = "1999-09-28T04:00:00.000"
remediation = "建议升级至 AIX 4.3.3 或更高版本，已整合 IBM APAR IX87281 针对 libc 库的缓冲区溢出修复。如无法立即升级，可在 /etc/inetd.conf 中注释 ftp 行并重启 inetd 以禁用 FTP 服务，或使用 TCP wrappers（/etc/hosts.allow 和 /etc/hosts.deny）限制 ftpd 的访问来源 IP。"
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "IBM AIX 4.3.2 ftpd 远程缓冲区溢出漏洞"
updated = "2026-06-16T21:49:03.690"

