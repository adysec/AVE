[basic]
description = "Microsoft FrontPage Server Extensions 中的 htimage.exe CGI 程序存在物理路径泄露漏洞。远程攻击者无需身份认证，通过向目标服务器发送特制的 GET 请求即可触发该程序返回详细的错误信息，从而获取虚拟目录对应的真实物理路径。该漏洞导致服务器敏感信息暴露，可能辅助攻击者实施进一步渗透攻击。受影响版本包括 Microsoft FrontPage Server Extensions 的多个版本，建议禁用 htimage.exe 或安装厂商补丁进行修复。"
published = "2000-02-03T05:00:00.000"
remediation = "升级 Microsoft FrontPage Server Extensions 至 2000 年 3 月之后的安全更新版本，或禁用 htimage.exe CGI 程序的匿名访问。在 IIS 中设置 htimage.exe 仅允许经过身份验证的用户访问，或在 Web 服务器上删除或重命名该 CGI 文件以彻底消除路径泄露风险。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Microsoft FrontPage Server Extensions htimage.exe 路径泄露漏洞"
updated = "2026-06-16T21:51:02.767"

