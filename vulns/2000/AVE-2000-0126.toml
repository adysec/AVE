[basic]
description = "Netopia Timbuktu Pro 远程控制软件 2.0b650 及 5.2.1 版本的认证协议存在拒绝服务漏洞。该漏洞源于软件在处理认证连接时未能正确校验或限制输入，未经身份认证的远程攻击者可向目标主机 407 和 1417 端口发起大量或特制的连接请求，触发认证协议异常，导致服务崩溃或资源耗尽，使远程控制服务不可用。由于攻击无需认证且可远程发起，任何暴露上述端口的 Timbuktu Pro 实例均可能受影响，攻击门槛低、可造成持续的服务中断。"
published = "2000-02-11T05:00:00.000"
remediation = "建议立即升级至 Netopia Timbuktu Pro 后续安全版本（如 5.2.2 或更高版本），或迁移至现代远程控制软件（如 TeamViewer、AnyDesk）。若无法升级，请在防火墙层面封锁 407/TCP 和 1417/TCP 端口，并禁用不再使用的 Timbuktu 服务以防止拒绝服务攻击。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
