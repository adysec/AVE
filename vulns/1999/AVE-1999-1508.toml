[basic]
description = "tags.<value>Solaris 系统中的 snoop 工具存在缓冲区溢出漏洞。未经身份认证的远程攻击者可通过向 rpc.rquotad 服务发送特制的 GETQUOTA 请求触发该漏洞，从而获取目标系统的 root 权限。该漏洞影响 Solaris 操作系统的多个版本，攻击者无需任何凭据即可在远程系统上执行任意代码，进而完全控制受影响的主机。由于该服务在 Solaris 系统上的广泛部署，漏洞危害等级为严重，CVSS 评分为满分 10.0。"
published = "1999-12-09T05:00:00.000"
remediation = "立即向 Sun 获取并安装针对该漏洞的安全补丁（如 Solaris 2.5.1 的 103630/103631、2.6 的 105529/105530 等对应版本补丁），将 Solaris 升级至已修复的 2.6_update/7 版本；在无法立即打补丁前，通过 /etc/inetd.conf 注释掉 rquotad 行并执行 kill -HUP 停用 rpc.rquotad 服务，同时在边界防火墙阻断 111 及 rpc.rquotad 端口以缓解远程利用。"
score = 10
severity = "CRITICAL"
sources = ["avd"]
