[basic]
description = "gpm 软件包中的 gpm-root 组件存在权限管理缺陷，未能正确丢弃特权（setgid），导致本地普通用户可通过从 gpm-root 启动特定工具程序来获取提升的权限。该漏洞影响 gpm 1.18.1/1.19 版本及 Debian 2.x、RedHat 6.x、S.u.S.E 5.3/6.x 等 Linux 发行版，CVSS 评分 7.2，危害等级高。攻击者需拥有本地系统访问权限方可利用。"
published = "2000-03-22T05:00:00.000"
remediation = "升级 gpm 软件包至修复版本：Red Hat 用户安装 RHSA-2000-009 或 RHSA-2000-045 更新，SUSE 用户安装 SUSE Security Announcement 45 更新。如无法升级，可手动移除 gpm-root 的 setgid 权限位作为临时缓解措施。"
score = 7.2
severity = "HIGH"
sources = ["cve"]
title = "gpm gpm-root 本地权限提升漏洞"
updated = "2026-06-16T21:51:16.460"

