[basic]
description = "Nosque 公司 MsgCore 1.9（原 Super Mail Transfer Package, SMTP）邮件服务器存在内存泄漏漏洞，远程攻击者可在同一 SMTP 会话中重复发送 HELO、MAIL FROM、RCPT TO 和 DATA 命令，导致服务器内存资源被耗尽，进而触发拒绝服务。该漏洞无需身份认证即可远程利用，攻击条件简单，仅需建立 TCP 连接后反复发送特定 SMTP 指令即可实施。"
published = "2000-01-13T05:00:00.000"
remediation = "Nosque MsgCore 已停止维护且厂商不再活跃，建议立即迁移至现代受支持的 SMTP 服务软件（如 Postfix、Exim、Microsoft Exchange Server）。在无法立即迁移前，可在 SMTP 服务配置中限制单个会话的连接时长和命令执行速率，设置 MAX_HELO、MAX_MAIL、MAX_RCPT、MAX_DATA 等参数上限，并启用防火墙源 IP 连接频率限制作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Nosque MsgCore 1.9 内存泄漏拒绝服务漏洞"
updated = "2026-06-16T21:50:56.910"

