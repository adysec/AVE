[basic]
description = "Internet Explorer 5.5 及更早版本在调用 Telnet 客户端时，未对网页中指定的命令行参数进行充分过滤，远程攻击者可通过构造恶意网页链接，诱使用户点击后传递特制参数给 Telnet 客户端，导致任意命令执行或文件覆写。该漏洞需目标系统安装 Services for Unix (SFU) 2.0 中的 Telnet 客户端方可利用，影响范围受限。"
published = "2001-06-02T04:00:00.000"
remediation = '安装 Microsoft 2001 年 3 月安全更新 (MS01-015)，升级 Internet Explorer 至 5.5 Service Pack 2 或更高版本。如无法升级，可通过注册表禁用 Telnet 协议处理程序：在 `HKEY_CLASSES_ROOT\telnet\shell\open\command` 中将默认值清空或改为安全程序路径，或在浏览器中禁用 ActiveX 控件 `Telnetexec`。卸载 Services for Unix (SFU) 2.0 中不使用的 Telnet 客户端组件也可作为临时缓解措施。'
score = 5.1
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Microsoft Internet Explorer Telnet 客户端命令参数注入漏洞"
updated = "2026-06-16T21:53:46.020"

