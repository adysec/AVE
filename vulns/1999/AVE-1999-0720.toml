[basic]
description = "远程攻击者可通过在网页中嵌入包含超大 width 参数的 IMG 标签，诱使目标用户使用 Lynx 或 Internet Explorer 浏览器访问该页面，触发浏览器在处理畸形 HTML 元素时的拒绝服务漏洞，导致浏览器崩溃。该漏洞影响 Lynx 及早期 Internet Explorer 版本，攻击者无需身份认证即可实施攻击，危害等级高危。"
published = "1999-01-01T05:00:00.000"
remediation = "升级 Lynx 至 2.8.1 以上版本可修复此漏洞；Internet Explorer 用户应升级至 IE 5.01 以上版本。当前建议弃用已停止支持的 IE，改用 Microsoft Edge 或 Chrome 等现代浏览器，并在 Web 应用中严格校验用户提交的 HTML IMG 标签 width 参数，限制其最大值防止拒绝服务。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "Lynx 和 Microsoft Internet Explorer IMG 标签宽参数远程拒绝服务漏洞"
updated = "2026-06-16T21:48:27.187"

