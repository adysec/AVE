[basic]
description = "Windows NT 4.0 的 CIFS Computer Browser 服务在处理主机公告请求时存在拒绝服务漏洞。远程攻击者可向主浏览表发送大量畸形的主机公告请求帧（HostAnnouncement Flooding），导致服务资源耗尽、系统响应缓慢甚至崩溃。该漏洞影响 Windows NT 4.0 系统，无需认证即可远程触发，CVSS 评分 5.0，危害等级中危。"
published = "2000-05-25T04:00:00.000"
remediation = "安装 Microsoft 2000 年 5 月安全更新 (MS00-036)，或升级至 Windows 2000/XP 以消除该漏洞。临时缓解措施：在防火墙层面过滤 UDP 137-138 和 TCP 139 端口，或禁用 Computer Browser 服务 (net stop browser)。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Microsoft Windows NT 4.0 CIFS Computer Browser 拒绝服务漏洞"
updated = "2026-06-16T21:51:38.590"

