[basic]
description = "HP-UX 10.20 及 11.0 系统中的 SNMP 守护进程（snmpd）的配置文件 snmpd.conf 存在权限配置不当漏洞，该文件被设置为全局可写权限。拥有本地访问权限的攻击者可利用此漏洞修改 SNMP 服务配置，例如更改 SNMP 团体字符串、启用或禁用管理功能，甚至通过注入恶意配置执行任意命令以提升权限至 root。该漏洞影响 HP-UX 10.20 和 11.0 版本，需本地用户身份才能利用。"
published = "2000-06-07"
remediation = "立即修复 /etc/snmpd.conf 权限：`chmod 600 /etc/snmpd.conf` 或 `chmod 644 /etc/snmpd.conf`，确保非 root 用户无法写入。安装 HP-UX 安全补丁（如 PHSS_21120 系列）。在 /etc/hosts.allow 中限制 snmpd 仅允许受信任管理站 IP 访问，必要时在防火墙层面封闭 UDP 161 端口的非授权访问。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "HP HP-UX SNMPD 文件权限漏洞"
updated = "2000-06-07"

