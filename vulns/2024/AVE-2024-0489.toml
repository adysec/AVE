[basic]
description = "Yasm 汇编器在 section.c 文件的 yasm_section_bcs_append 函数中存在空指针解引用漏洞。攻击者可通过向受影响版本提交特制的汇编源文件触发该漏洞，导致程序崩溃拒绝服务。该漏洞影响 yasm commit 9defefae 及之前版本，CVSS 评分 4.8，危害等级中危。目前官方尚未发布正式修复补丁，建议用户谨慎处理来源不明的汇编文件。"
published = "2025-05-29T15:15:29.470"
remediation = "建议将 yasm 更新至包含 commit 121ab15（2024年6月24日提交）的版本，该提交在 libyasm/section.c 中修复了 yasm_section_bcs_append 函数的空指针解引用问题。如无法更新，可手动应用该补丁或避免使用 yasm 处理不可信的汇编源文件作为临时缓解措施。"
score = 4.8
severity = "MEDIUM"
sources = ["msrc"]
title = "Yasm 空指针解引用漏洞"
updated = "2026-06-17T07:11:39.417"

