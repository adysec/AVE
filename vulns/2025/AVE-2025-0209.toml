[basic]
description = "和达数字管理系统 distributionForm 接口存在 SQL 注入漏洞，攻击者可在无需认证的情况下向该接口提交恶意构造的 SQL 查询参数，后端未对用户输入进行充分过滤和参数化处理，直接拼接至数据库查询语句中，导致攻击者能够窃取、篡改或删除后台数据库中的敏感数据。该漏洞影响和达数字管理系统的多个版本，攻击条件低，仅需网络可达即可利用。"
published = "0702"
remediation = "对 distributionForm 接口的所有输入参数实施严格的白名单校验和参数化查询，禁止拼接 SQL 语句；部署 Web 应用防火墙（WAF）拦截注入载荷；临时措施可限制对该接口的访问 IP 白名单，并停用不必要的表单提交功能。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "和达数字管理系统 distributionForm SQL 注入漏洞"
updated = "0702"

