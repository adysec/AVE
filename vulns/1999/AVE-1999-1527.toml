[basic]
description = "Micah Software Full Armor Network Configurator 及 Zero Administration 存在安全绕过漏洞。具有物理访问权限的本地用户可通过三种方式绕过桌面保护：使用 Ctrl+Alt+Del 组合键调出任务管理器终止保护进程、从外部磁盘引导系统绕过启动加载、或在系统引导过程中中断特定执行进程。该漏洞允许低权限攻击者完全绕过系统桌面防护机制获取未授权访问，CVSS 评分 4.6，危害等级中危。"
published = "1998-06-02T04:00:00.000"
remediation = "升级 Micah Software Full Armor 至最新版本，启用 BIOS 密码防止从外部磁盘启动，通过组策略禁用任务管理器（CTRL+ALT+DEL 安全选项），并对物理访问受限的终端实施机箱锁等物理安全措施。"
score = 4.6
severity = "MEDIUM"
sources = ["avd"]
title = "Micah Software Full Armor Network Configurator 安全绕过漏洞"
updated = "2026-06-16T21:50:27.110"

