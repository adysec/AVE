[basic]
description = "IRC 客户端 X-Chat 1.4.2 及更早版本在处理聊天消息中的 URL 时存在命令注入漏洞。远程攻击者可向受影响的用户发送包含 shell 元字符（如反引号、管道符等）的恶意 URL，当 XChat 调用外部浏览器打开该 URL 时，嵌入的恶意命令将被系统执行。该漏洞允许攻击者在用户系统上以当前用户权限执行任意命令，影响 X-Chat 1.2 至 1.5 系列版本。"
published = "2000-10-20T04:00:00.000"
remediation = "升级 X-Chat 至 1.4.3 或更高版本，该版本修复了 URL 中 shell 元字符的过滤问题。如无法升级，建议禁用 X-Chat 的自动 URL 打开功能，或在浏览器启动前对 URL 中的特殊字符进行转义处理，避免直接传递未过滤的 URL 给系统 shell。"
score = 7.5
severity = "HIGH"
sources = ["exploitdb"]
title = "X-Chat IRC 客户端 URL 命令执行漏洞"
updated = "2026-06-16T21:52:28.807"

