[info]
author = "AVE"
description = "检测 DNS 服务器是否为开放递归解析器，验证反射放大攻击可行性。通过向目标 DNS 服务器发送 ANY 类型查询请求，若服务器返回 DNS 应答记录，说明启用了递归查询，可被用于 UDP 反射放大攻击。"
id = "POC-AVE-1999-1093"
name = "DNS 服务器 UDP 反射放大拒绝服务漏洞 PoC"
severity = "medium"
tags = ["ave-1999-1093"]
vuln_id = [
    "CVE-1999-1379",
    "AVE-1999-1093",
]

[poc]
logic = "all"

[[poc.requests]]
dns_type = "A"
path = "{{Hostname}}"
protocol = "dns"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "ANSWER",
    "IN",
]
