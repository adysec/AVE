[basic]
description = "Windows 帮助系统存在本地权限提升漏洞，攻击者可通过编辑具有 .CNT 扩展名的目录表元文件，将主题动作修改为在访问 .hlp 帮助文件时自动执行的恶意命令，从而以其他用户身份在本地系统上执行任意命令。该漏洞影响 Windows 95、Windows 98 及 Windows NT 4.0 系统，CVSS 评分 4.6。攻击者需具备本地访问权限才能利用此漏洞，当受害者或管理员打开被篡改的帮助文件时即可触发命令执行，可能导致敏感数据泄露或系统被植入后门。"
published = "1999-12-10T05:00:00.000"
remediation = "立即为受影响的 Windows 95/98/NT 4.0 安装 Microsoft 官方发布的安全补丁（Windows 95/98 对应安全更新、Windows NT 4.0 对应 SP6a 及后续安全汇总补丁）。如暂无法打补丁，可在文件管理器中将 .CNT 扩展名关联改为不自动执行，并限制普通用户对帮助文件目录的写入权限，避免恶意 .CNT 文件被构造利用。"
score = 4.6
severity = "MEDIUM"
sources = ["avd"]
