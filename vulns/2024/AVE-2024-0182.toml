[basic]
title = "用友 U8-CRM devtools/tools/attrlist.php SQL 注入漏洞"
description = "用友 U8-CRM 系统的 devtools/tools/attrlist.php 接口在 DontCheckLogin=1 与 isquery=1 参数下未对用户输入做鉴权与过滤，直接将 obj_type 参数拼接进 SQL 查询，导致存在 SQL 注入漏洞。攻击者无需登录认证，仅需向目标系统发送特制的 POST 请求（如 obj_type=1';WAITFOR DELAY '0:0:5'--），即可向数据库注入恶意 SQL 语句。该漏洞影响部署了存在缺陷版本 U8-CRM 系统的服务器，攻击者可借此探测数据库、延时盲注获取敏感数据，甚至进一步控制数据库服务器，危害较大。"
severity = "HIGH"
score = 7.5
sources = ["hwpoc"]
published = "2024-08-19"
updated = "2024-08-19"
remediation = "升级用友 U8-CRM 至官方最新修复版本，或在 Web 应用防火墙配置 SQL 注入防护规则拦截 obj_type 参数中的 SQL 语句特征，同时建议在 Web 应用防火墙层面限制 devtools/tools/attrlist.php 接口的非必要访问"
