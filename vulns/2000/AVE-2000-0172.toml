[basic]
description = "Corel Linux OS 1.0 中的 setxconf 程序存在本地权限提升漏洞。当本地用户通过 -T 参数调用 setxconf 时，该程序会以 root 权限执行用户主目录下的 .xserverrc 文件，且未对文件内容进行安全检查。攻击者可在 .xserverrc 中写入恶意代码，执行任意命令，从而获得 root shell。该漏洞影响 Corel Linux OS 1.0 版本，CVSS 评分 7.2，危害等级高。"
published = "2000-02-24T05:00:00.000"
remediation = "升级 Corel Linux OS 至 1.2 以上版本，或移除 setxconf 的 SUID 权限：`chmod u-s /usr/bin/setxconf`。也可直接删除 setxconf 二进制文件：`rm -f /usr/bin/setxconf`。如已停止支持，建议迁移至其他维护中的 Linux 发行版。"
score = 7.2
severity = "HIGH"
sources = ["epss"]
title = "Corel Linux OS setxconf 本地权限提升漏洞"
updated = "2026-06-16T21:51:11.990"

