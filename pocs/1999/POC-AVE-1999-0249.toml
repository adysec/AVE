[info]
author = "ave"
description = "验证 CDE dtspcd 守护进程是否存在未对符号链接进行安全校验的问题。可利用符号链接攻击执行任意命令，实现本地权限提升。"
id = "POC-AVE-1999-0249"
name = "Sun CDE dtspcd 符号链接权限提升漏洞 PoC"
severity = "high"
tags = ["ave-1999-0249"]
vuln_id = [
    "CVE-1999-0689",
    "AVE-1999-0249",
]

[poc]
logic = "all"

[[poc.requests]]
path = "/etc/passwd"
protocol = "file"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["root:"]
