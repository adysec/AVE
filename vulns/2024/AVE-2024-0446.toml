[basic]
description = "满客宝智慧食堂系统的 selectUserByOrgId 接口（路径 /yuding/selectUserByOrgId.action）存在未授权访问漏洞。该系统在处理该用户查询请求时未对调用者身份进行校验，攻击者在未登录、无需任何凭证的情况下，可直接构造 GET 请求并携带 record 参数访问该接口，从而越权获取系统内用户相关敏感数据（如用户信息、组织架构等）。漏洞影响部署了存在缺陷版本的满客宝智慧食堂系统的相关单位，攻击条件仅需网络可达目标系统的 HTTP 服务端口，利用方式简单，通过普通 HTTP 客户端发送请求即可触发，存在用户隐私泄露与进一步横向攻击的风险。"
published = "0807"
remediation = "在 `/yuding/selectUserByOrgId.action` 接口处增加Session或Token身份认证校验，仅允许已登录用户访问；同时配置Web应用防火墙拦截对该接口的未授权GET请求，或将接口访问权限限制在内网地址段。"
score = 5
severity = "MEDIUM"
