[basic]
description = "Adobe Flash Player 和 Adobe AIR 存在双重释放内存漏洞，源于 Flash Player 在处理特定矢量图形对象时存在内存管理缺陷，导致同一内存块被重复释放。攻击者可通过诱导用户访问包含恶意 Flash 内容的网页或打开恶意文档，触发双重释放漏洞实现远程代码执行。该漏洞影响 Windows/Mac OS X 上 11.7.700.269 版本前及 11.8.x 至 12.0.0.70 版本前的 Flash Player，Linux 上 11.2.202.341 版本前，Android 上 4.0.0.1628 版本前的 AIR，以及同版本前的 AIR SDK 与 Compiler。CVSS 3.1 评分 8.8（HIGH），攻击向量为网络，攻击复杂度低，需用户交互，无需权限，可导致机密性、完整性、可用性完全丧失。该漏洞于 2014 年 2 月已在野利用，被 CISA 列入已知被利用漏洞目录，Adobe 已发布安全更新修复。"
published = "2014-02-21T05:07:00.017"
remediation = '建议立即升级 Adobe Flash Player 至 11.7.700.269 或 12.0.0.70 及以上版本（Windows/Mac），Linux 升级至 11.2.202.341 及以上版本，Android 升级 Adobe AIR 至 4.0.0.1628 及以上版本；若暂时无法更新，请在浏览器中禁用 Flash 插件（Chrome 访问 chrome://settings/content/flash 设为"阻止"，Firefox 禁用 Shockwave Flash 插件），并参考 Adobe 官方安全公告 APSB14-07 应用补丁。'
score = 8.8
severity = "HIGH"
sources = ["kev"]
title = "Adobe Flash Player 双重释放远程代码执行漏洞"
updated = "2026-06-17T00:03:09.860"

