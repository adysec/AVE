[basic]
description = "WebShield SMTP 4.5.44 的远程管理服务存在缓冲区溢出漏洞，攻击者可通过向该服务发送超长的配置参数触发缓冲区溢出，从而在目标系统上执行任意命令。该漏洞无需身份认证即可远程利用，攻击复杂度低，可导致系统完全受控。受影响的版本为 WebShield SMTP 4.5.44，建议用户升级至最新版本或禁用远程管理服务以降低风险。"
published = "2000-05-01T04:00:00.000"
remediation = "建议立即升级 WebShield SMTP 至 4.5.44 以上已修复版本，或联系 McAfee 获取补丁。如产品已停止支持，应迁移至受支持的邮件安全网关产品，并在防火墙中限制对远程管理服务（默认端口）的访问来源 IP。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "Network Associates WebShield SMTP 缓冲区溢出远程代码执行漏洞"
updated = "2026-06-16T21:51:45.190"

