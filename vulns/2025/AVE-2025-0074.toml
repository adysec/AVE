[basic]
description = "IBM WebSphere Application Server 存在远程代码执行漏洞，未经身份认证的远程攻击者可通过向目标服务器发送特制的序列化数据包触发该漏洞，导致在服务器端执行任意代码，从而完全控制受影响的服务器。该漏洞影响多个版本的 IBM WebSphere Application Server，危害严重，建议用户立即安装厂商发布的安全补丁进行修复。"
published = "0701"
remediation = "立即升级 IBM WebSphere Application Server 至最新 Fix Pack（如 9.0.5.x 及以上版本），通过 IBM Installation Manager 安装对应 iFix 安全补丁。如无法立即升级，在管理控制台中将全局安全自定义属性 `com.ibm.ws.security.disableWSIF` 设为 `true`，并禁用不使用的 HTTP 入站通道以缩小攻击面。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "IBM WebSphere Application Server 远程代码执行漏洞"
updated = "0701"

