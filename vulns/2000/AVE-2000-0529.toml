[basic]
description = "Norton Antivirus for Exchange (NavExchange) 组件存在缓冲区溢出漏洞，远程攻击者可通过向目标邮件服务器发送包含超长文件名的 .zip 压缩包触发该漏洞，导致 NavExchange 服务崩溃，造成拒绝服务。该漏洞影响 Norton Antivirus for Exchange 版本，CVSS 评分 5.0，危害等级中危。攻击者无需身份认证即可远程利用，但仅能造成服务不可用，无法实现代码执行。"
published = "2000-06-14T04:00:00.000"
remediation = "立即升级 Symantec 官方发布的 Norton AntiVirus for Exchange (NavExchange) 补丁版本，该补丁修复了 ZIP 解压时文件名长度未做边界检查导致的缓冲区溢出问题。如产品已过保或无法获取补丁，建议在邮件服务器前端部署独立的内容过滤网关，对 ZIP 附件文件名长度进行校验（限制文件名不超过 255 字符），或使用支持深度内容检测的替代防病毒产品替换 NavExchange。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Symantec Norton Antivirus for Exchange 缓冲区溢出拒绝服务漏洞"
updated = "2026-06-16T21:51:49.120"

