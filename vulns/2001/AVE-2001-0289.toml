[basic]
description = "这是一个影响趋势科技 Interscan VirusWall 3.2.3/3.3 版本的安全漏洞。路由器上的 HTTP 服务器在处理来自远程攻击者发送的特制长 HELO 命令时会出现缓冲区溢出，导致任意代码被执行。攻击者无需身份验证即可通过网络远程触发此漏洞，实现完整的系统控制。漏洞影响具体产品为 Interscan VirusWall 3.2.3/3.3 版本和可能包括 3.23 版本。攻击条件非常宽松，攻击方式简单，攻击者只需向目标服务器发送一个包含超长 HELO 命令的网络数据包即可触发溢出。在成功的利用中，攻击者可以劫持整个服务器进程，实现远程代码执行（CVE 评分为 10.0 是最高的严重性）。由于存在无限循环写入和可疑的文件系统操作，导致应用程序崩溃和拒绝服务风险很高。"
published = "1999-11-08T05:00:00.000"
remediation = "建议立即升级到 Trend Micro InterScan VirusWall 3.6 或更高版本以获取官方安全补丁，或直接停用该过时产品；若暂时无法升级，请在防火墙配置规则阻断外部对默认 SMTP 端口 25 的访问，并将服务绑定至本地回环地址限制仅本地访问以降低风险。"
score = 10
severity = "CRITICAL"
sources = ["exploitdb"]
title = "趋势科技 InterScan VirusWall HELO 远程缓冲区溢出漏洞"
updated = "2026-06-16T21:54:45.400"

