[basic]
description = "Microsoft Windows NT 4.0 的 SMB（服务器消息块）登录验证机制存在输入验证缺陷，远程攻击者可向目标系统发送特制的 SMB 登录请求，其中实际数据大小与指定大小不一致，触发异常处理错误，导致目标系统服务崩溃或停止响应，造成拒绝服务。该漏洞影响 Windows NT 4.0 系统，无需身份认证即可远程利用，CVSS 评分 5.0，危害等级中等。"
published = "1998-02-14T05:00:00.000"
remediation = "Windows NT 4.0 已停止技术支持，建议立即升级到受支持的 Windows Server 版本。若无法升级，在防火墙层面阻止 139/TCP 和 445/TCP 端口的外部访问可临时缓解该 SMB 拒绝服务风险。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Microsoft Windows NT 4.0 SMB 登录请求拒绝服务漏洞"
updated = "2026-06-16T21:47:57.050"

