description = "捷联智联智能终端操作平台多个API接口存在敏感信息泄露漏洞，攻击者可通过向 `/report/ParkChargeRecord/GetDataList` 等敏感接口发送构造的POST请求，在请求头中携带伪造的 Authorization Bearer Token 及 Cookie（包含 JSESSIONID、UUID、userid 等敏感标识），未经授权即可获取敏感认证凭证、会话标识及用户标识等核心敏感信息。该漏洞影响捷联智联智能终端操作平台多个业务接口，攻击者无需认证即可发起攻击，成功利用可导致用户会话劫持、账号接管及敏感业务数据泄露，攻击门槛低、危害范围广。建议升级至修复版本并加强接口鉴权与敏感信息脱敏处理。建议升级至修复版本，并加强接口鉴权与敏感信息脱敏处理。威胁等级高危，建议尽快修复。"
published = "0823"
remediation = "建议立即升级至 JieLink+智能终端操作平台最新安全版本，并在应用层面为 /report/ParkChargeRecord/GetDataList 等敏感接口强制启用鉴权校验、移除响应头中的 Authorization/JSESSIONID/userid 等敏感字段。若暂无法升级，可在 WAF/网关层配置规则拦截携带敏感 Header 的异常请求，并启用访问日志审计排查泄露范围。"
