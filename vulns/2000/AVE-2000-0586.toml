[basic]
description = "Internet Explorer 4.x 及 5.x 版本在处理通过图片或框架加载的 SSL 连接时，未正确验证服务器证书的所有内容，导致攻击者可通过伪造的 SSL 证书实施中间人攻击，窃取或篡改加密通信中的敏感数据。该漏洞属于 SSL 证书验证缺陷，攻击者需能够拦截用户与目标服务器之间的网络流量方可利用，影响运行 IE 4.x 和 5.x 的所有 Windows 平台。"
published = "2000-06-05T04:00:00.000"
remediation = "安装 Microsoft 安全公告 MS00-039 提供的更新补丁（已整合至 MS00-055 累积补丁），或升级至 Internet Explorer 5.01 Service Pack 1 或 5.5 版本。临时缓解措施：在 Internet 选项→内容→证书中移除受信任根证书颁发机构，使 IE 每次 SSL 连接前都提示用户确认证书；每次 SSL 会话结束后关闭浏览器以清除证书缓存。"
score = 2.6
severity = "LOW"
sources = ["cve"]
title = "Microsoft Internet Explorer 4.x 及 5.x SSL 证书验证漏洞"
updated = "2026-06-16T21:51:54.443"

