[basic]
description = "Mailman 电子邮件归档系统 2.08 之前版本存在跨站脚本漏洞，攻击者可构造包含恶意脚本的邮件链接，诱导其他用户点击访问归档页面时触发脚本执行，窃取受害者的会话凭证、浏览器 Cookie 等敏感信息。该漏洞影响 Mailman 2.08 之前所有版本，攻击者需诱导受害者点击恶意链接并访问邮件归档页面，利用方式为构造包含恶意 JavaScript 的邮件内容，当受害者浏览归档页面时脚本在浏览器执行导致信息泄露。CVSS 5.1 分，攻击向量为网络，攻击复杂度高，需用户交互，影响机密性、完整性和可用性。"
published = "2001-12-21T05:00:00.000"
remediation = "立即升级到 Mailman 2.1.9 或更高版本，该版本修复了跨站脚本漏洞。浏览器禁用JavaScript执行某些邮件列表操作以降低风险。此外，确保邮件列表仅向授权用户发布，并配置正确的认证机制以防止信息泄露。"
score = 5.1
severity = "MEDIUM"
sources = ["redhat"]
title = "GNU Mailman 邮件列表管理器 跨站脚本漏洞"
updated = "2026-06-16T21:55:09.460"

