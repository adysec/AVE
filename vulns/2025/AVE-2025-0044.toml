[basic]
description = "Fortinet FortiWeb 的 Fabric Connector 组件存在 SQL 注入漏洞（CWE-89），由于对用户输入的特殊元素未能正确过滤，未经身份认证的远程攻击者可通过向目标设备发送特制的 HTTP 或 HTTPS 请求触发该漏洞，导致执行未经授权的 SQL 命令，进而可能实现远程代码执行。该漏洞影响 FortiWeb 7.6.0 至 7.6.3、7.4.0 至 7.4.7、7.2.0 至 7.2.10 及 7.0.0 至 7.0.10 等多个版本，CVSS 评分 9.8，危害等级严重。"
published = "2025-07-17T16:15:34.723"
remediation = "立即将 FortiWeb 升级至 7.0.11、7.2.11、7.4.8 或 7.6.4 及以上版本。如无法立即升级，可临时禁用 HTTP/HTTPS 管理接口作为缓解措施。同时建议限制仅信任 IP 访问管理界面，并启用 IPS 规则防护 SQL 注入攻击。"
score = 9.8
severity = "CRITICAL"
sources = ["hwpoc"]
title = "Fortinet FortiWeb Fabric Connector SQL注入漏洞"
updated = "2026-06-17T09:00:34.647"

