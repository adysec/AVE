[basic]
description = "WebBBS 1.15 存在缓冲区溢出漏洞，远程攻击者可通过向目标系统发送特制的超长 HTTP GET 请求触发该漏洞，导致任意代码执行。该漏洞影响 WebBBS 1.15 版本，CVSS 评分 7.5，危害等级高危。攻击者无需身份认证即可远程利用，攻击条件简单，可完全控制受影响系统。"
published = "2000-06-19T04:00:00.000"
remediation = "立即将 WebBBS 升级至 1.15 以上已修复版本，或在 Web 服务器层面（如 Apache 的 mod_security 或 IIS 的 URL 过滤）限制 HTTP GET 请求 URI 长度不超过 1024 字节，防止超长请求触发缓冲区溢出。如厂商已停止维护，建议迁移至其他受支持的现代论坛系统（如 phpBB、Discourse 等），并确保 Web 应用运行在最低权限账户下，以限制漏洞被利用后的影响范围。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "国际电信 WebBBS 1.15 HTTP GET 缓冲区溢出远程代码执行漏洞"
updated = "2026-06-16T21:52:00.050"

