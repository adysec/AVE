[basic]
description = "Ultimate Bulletin Board 将数据文件存储在 cgi-bin 可执行目录中，当 HTTP 服务器尝试执行这些数据文件时触发执行错误，导致文件内容以明文形式返回给远程攻击者，造成敏感数据（如用户帐号、密码哈希、配置信息）泄露。攻击者无需认证即可远程直接访问 cgi-bin 目录下的数据文件触发错误泄露，影响 Ultimate Bulletin Board 5.x 等版本，攻击者可直接获取敏感数据库文件，导致论坛用户数据泄露及后台接管风险。"
published = "1999-11-01T05:00:00.000"
remediation = "建议升级 Ultimate Bulletin Board 至 5.0 或更高版本（已将数据文件移出 cgi-bin 目录）。若无法升级，请在 Web 服务器配置中禁止直接访问 cgi-bin 目录下的数据文件（如配置 Apache 的 ScriptAlias 仅执行 CGI 脚本，禁止静态文件访问），或将 UBB 数据文件目录移至 Web 根目录之外，并设置正确的文件系统权限限制 Web 进程读取权限。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Ultimate Bulletin Board cgi-bin 目录敏感信息泄露漏洞"
updated = "2026-06-16T21:49:11.770"

