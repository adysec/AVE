[basic]
description = "Heimdal Kerberos 实现 0.5 之前版本中的 kadmind 和 kdc 服务存在未明安全漏洞，远程或本地攻击者无需身份认证即可利用该漏洞完全控制目标系统，获取 root 权限。该漏洞影响 Heimdal 0.5 之前的所有版本，攻击复杂度低，无需用户交互，可导致机密性、完整性和可用性完全丧失，CVSS 评分 10.0，危害等级严重。建议升级至 Heimdal 0.5 或更高版本以修复此漏洞。"
published = "2002-10-28T05:00:00.000"
remediation = "将 Heimdal 升级至 0.5 或更高版本。Debian 3.0 (woody) 用户升级至 0.4e-7.woody.4，Debian 2.2 (potato) 用户升级至 0.2l-7.4。如无法立即升级，在防火墙层面限制对 kadmind（端口 749）和 kdc（端口 88）服务的访问，仅允许受信管理网段连接。"
score = 10
severity = "CRITICAL"
sources = ["osv"]
title = "Heimdal kadmind 和 kdc 服务器远程代码执行漏洞"
updated = "2026-06-16T21:58:58.063"

