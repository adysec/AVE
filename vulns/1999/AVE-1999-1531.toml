[basic]
description = "Windows NT 4.0 SP3 之前版本的 TCP/IP 协议栈在处理 IP 分片数据包时存在缺陷。远程攻击者无需身份认证，只需向目标系统发送缺少第一个分片的异常分片 IP 数据包，即可导致协议栈错误地将其重组为有效会话，从而绕过防火墙访问控制规则或造成系统蓝屏崩溃。CVSS 评分 5.0，危害等级中等。微软已在 Windows NT 4.0 Service Pack 3 中修复此漏洞。"
published = "1997-07-10T04:00:00.000"
remediation = "升级 Windows NT 4.0 至 Service Pack 3 (SP3) 或更高版本，该补丁修复了 TCP/IP 协议栈对畸形 IP 分片包的错误重组问题。如无法升级，可在网络边界防火墙或路由器上配置规则，丢弃不包含首分片的 IP 分片包作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Microsoft Windows NT 4.0 TCP/IP 分片包处理拒绝服务漏洞"
updated = "2026-06-16T21:50:29.653"

