[basic]
description = "SunOS 4.1 至 4.1.2 版本中 SPARC 架构的整数乘法模拟代码存在漏洞，本地攻击者可通过执行特制程序触发整数溢出，导致系统崩溃或获取 root 权限。该漏洞影响 SunOS 4.1/4.1.1/4.1.2 等版本，CVSS 评分 7.2，危害等级高。攻击者需拥有本地账户访问权限方可利用，无法远程触发。"
published = "1992-07-21T04:00:00.000"
remediation = "立即升级 SunOS 至 4.1.3 或更新版本，该版本已修复整数乘法模拟代码中的漏洞。对于无法升级的 4.1/4.1.1/4.1.2 系统，请联系 Sun 支持获取对应版本的独立补丁。临时缓解措施包括限制本地用户登录权限并审计可疑的特权提升行为。长期建议迁移至 Solaris 2.x 系列以获取持续安全支持。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "Sun SunOS SPARC 整数乘法模拟代码本地权限提升与拒绝服务漏洞"
updated = "2026-06-16T21:50:21.053"

