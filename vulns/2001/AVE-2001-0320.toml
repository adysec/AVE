[basic]
description = "ht://Dig 3.1.5 及更早版本中的 htsearch CGI 程序存在配置文件解析漏洞，该程序允许远程攻击者使用 -c 选项指定一个备用配置文件。攻击者可以通过向目标系统发送包含恶意配置文件的 HTTP 请求来触发该漏洞。攻击者可以利用这一漏洞通过指定大文件（如 /dev/zero）来消耗系统 CPU 资源，造成拒绝服务；或者通过上传一个包含目标文件路径的配置来读取目标系统中的任意文件，导致敏感信息泄露。该漏洞无需身份验证即可通过网络远程利用，广泛影响基于 htdig 的搜索引擎系统。"
published = "2001-12-06T05:00:00.000"
remediation = "建议升级 htdig 至 3.1.6 或更高版本（已修复 -c 参数配置文件注入漏洞）。若使用 Debian 系发行版，请升级至 Debian 安全公告 DSA-080 提供的修复版本（htdig 3.1.5-2.1 或更高）。若暂时无法升级，可通过 Web 服务器配置（如 Apache 的 LimitExcept 或 ModSecurity 规则）禁止 htsearch CGI 接受 -c 参数，或在 Web 应用防火墙层面拦截包含 -c 参数的请求，同时限制 CGI 程序的文件读取权限（如设置 open_basedir 或 chroot 限制）。"
score = 6.4
severity = "MEDIUM"
sources = ["redhat"]
title = "htDig htsearch CGI 任意文件读取与拒绝服务漏洞"
updated = "2026-06-16T21:55:03.360"

