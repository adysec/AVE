[basic]
description = "id Software 的 Quake III Arena 存在目录遍历漏洞。恶意服务器运营者可向客户端发送包含 `..`（点点）序列的特制数据包，绕过路径限制，读取或修改客户端文件系统中的任意文件。该漏洞源于对服务器下发的文件路径过滤不足，攻击者利用此漏洞可实现文件窃取或恶意文件写入，危害较大。受影响的版本包括 Quake III Arena 及其衍生版本。"
published = "2000-05-03T04:00:00.000"
remediation = "立即升级 Quake 3 Arena 至 1.16 或更高版本，该版本修复了客户端目录遍历漏洞。如无法升级，可在客户端配置中仅连接受信任服务器，并避免自动下载服务器端文件。作为临时缓解措施，可在防火墙或路由器层面限制游戏端口（默认 27960/UDP）的出站连接范围。"
score = 6.4
severity = "MEDIUM"
sources = ["cve"]
title = "id Software Quake3 Arena 目录遍历漏洞"
updated = "2026-06-16T21:51:26.143"

