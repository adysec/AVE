[basic]
description = "Intel InBusiness eMail Station 1.04.87 版本的 POP 服务存在缓冲区溢出漏洞。远程攻击者通过向目标服务发送精心构造的超长用户名字段，可触发缓冲区溢出，导致拒绝服务，甚至可能以服务权限执行任意命令。攻击无需认证，通过网络即可实施，风险较高。受影响的版本为 Intel InBusiness eMail Station 1.04.87，目前尚无厂商补丁发布。"
published = "2000-12-19T05:00:00.000"
remediation = "Intel InBusiness eMail Station 已停止维护且无官方补丁，建议升级到受支持的邮件服务器软件（如 Exchange、Postfix 等）。若暂时无法迁移，可在防火墙上限制对 TCP 110 端口（POP3）的访问来源，仅允许可信内部 IP 连接，同时检查并限制用户名输入长度不超过 64 字节以缓解缓冲区溢出风险。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Intel InBusiness eMail Station 缓冲区溢出漏洞"
updated = "2026-06-16T21:52:55.287"

