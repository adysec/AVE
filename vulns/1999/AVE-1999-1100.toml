[basic]
description = "启用 ICMP 路由器发现协议（IRDP）的 DHCP 客户端存在默认路由可被篡改漏洞。远程攻击者可在无需身份认证的情况下，向目标主机发送伪造的 IRDP 路由器通告报文，诱使其将默认网关修改为攻击者指定的地址，从而劫持或重定向网络流量。该问题主要影响 Microsoft Windows 98/98SE 以及 Solaris 2.6 等系统，属于配置类安全缺陷，CVSS 评分 7.5（高危），可导致中间人攻击与通信被窃听或篡改。"
published = "1999-08-11T04:00:00.000"
remediation = '在 Windows 98 中通过注册表将 HKLM\System\CurrentControlSet\Services\VxD\MSTCP\EnableICMPRouterDisc 设为 0 以禁用 IRDP；在 Solaris 2.6 中编辑 /etc/default/inetinit 将 IRDP 相关参数关闭。根本解决建议升级至受支持的操作系统版本（如 Windows 10+ 或 Solaris 10+），这些版本默认已禁用不安全的 IRDP 功能。'
score = 7.5
severity = "HIGH"
sources = ["avd"]
