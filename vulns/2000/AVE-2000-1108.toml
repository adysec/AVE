[basic]
description = "Internet Explorer 4.x 和 5.x 版本的 ActiveX 组件参数解析功能存在缓冲区溢出漏洞。远程攻击者可通过构造特制的畸形组件属性（Malformed Component Attribute）网页，诱使用户访问恶意站点，触发缓冲区溢出，从而在用户系统上以当前用户权限执行任意命令。该漏洞影响范围广泛，攻击者无需身份认证即可利用，CVSS 评分 7.6，危害等级高。"
published = "2000-05-17T04:00:00.000"
remediation = "立即安装 Microsoft 安全公告 MS00-033 提供的补丁（KB261257），该补丁修复了 IE 4.x/5.x 中 ActiveX 参数解析的缓冲区溢出漏洞。后续累积补丁已整合至 MS00-055。建议升级至不受影响的 IE 5.5 或 IE 5.01 Service Pack 1 版本。临时缓解措施：在 Internet 区域将 ActiveX 控件和插件的相关选项设为「禁用」，或降低 IE 安全级别为「高」。"
score = 7.6
severity = "HIGH"
sources = ["epss"]
title = "Microsoft Internet Explorer ActiveX 参数解析缓冲区溢出远程代码执行漏洞"
updated = "2026-06-16T21:51:47.443"

