[basic]
description = "Linux 内核 DRM/TTM 子系统中存在未定义行为漏洞，位于 ttm_tt.h 头文件中 TTM_TT_FLAG_PRIV_POPULATED 宏定义对有符号 32 位整数进行左移 31 位的操作，触发 UBSAN 移位越界告警。本地低权限攻击者可通过触发 DRM 显示路径（如 fbcon 初始化流程）调用 ttm_bo_move_memcpy 等函数，导致内核崩溃引发拒绝服务。该漏洞影响 Linux 内核各版本，CVSS 评分 5.5，危害等级中危。"
published = "2025-09-18T14:15:37.997"
remediation = "升级 Linux 内核至 6.0.16/6.1.2 及以上版本，或合入提交 2ff0309b73d86e8591881ac035af06e01c112e89 修复补丁。无法立即更新内核时，可通过内核 livepatch 机制（如 Ksplice、kpatch）热修复该未定义行为，或禁用 UBSAN 告警以规避拒绝服务风险。"
score = 5.5
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux Kernel DRM/TTM 位移动未定义行为漏洞"
updated = "2026-06-17T05:23:24.983"

