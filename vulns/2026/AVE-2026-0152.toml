[basic]
description = "用友U8 CRM系统的 /service/changebgflag.php 接口未对 objID 参数进行有效过滤，导致存在 SQL 注入漏洞。攻击者在未授权的情况下，通过向该参数注入恶意 SQL 语句并结合 WAITFOR DELAY 函数进行时间盲注，可获取数据库敏感信息甚至控制后台系统。该漏洞影响用友U8 CRM 相关版本，利用方式简单，危害严重。"
published = "20260301"
remediation = "建议升级到用友官方发布的 U8 CRM 最新安全补丁包，该漏洞源于 changebgflag.php 未对 UserSessionID 等参数做过滤导致 SQL 注入。临时措施：在 WAF 层拦截 /service/changebgflag.php 路径的异常 GET 请求，对 objID、UserSessionID 等参数实施特殊字符过滤。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "用友 U8 CRM changebgflag.php SQL注入漏洞"
updated = "20260301"

