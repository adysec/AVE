[info]
author = "AVE"
description = "检测 SGI IRIX 6.2 系统上 midikeys 与 soundplayer 程序是否存在 shell 元字符注入漏洞。通过检查是否存在脆弱程序并可被用于本地提权。"
id = "POC-AVE-2000-0012"
name = "SGI IRIX midikeys/soundplayer 本地权限提升 PoC"
severity = "high"
tags = ["ave-2000-0012"]
vuln_id = [
    "CVE-2000-0013",
    "AVE-2000-0012",
]

[poc]
logic = "all"

[[poc.requests]]
path = "/usr/sbin/midikeys"
protocol = "file"

[[poc.requests.matchers]]
expect = true
part = "body"
regex = ".+"
type = "regex"
