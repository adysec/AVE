[basic]
description = 'Admiral Systems EmailClub 1.05 版本 POP3 服务器存在缓冲区溢出漏洞，远程攻击者可通过向目标服务器发送包含超长 "From" 头部的恶意电子邮件触发该漏洞，导致缓冲区溢出，从而在系统上执行任意命令。该漏洞影响 EmailClub 所有用户，攻击者无需认证即可远程利用。'
published = "1999-11-15"
remediation = "该产品（Admiral Systems EmailClub）已停止维护，厂商不再提供安全更新。建议立即迁移至现代、持续维护的邮件服务器软件（如 Dovecot、Cyrus IMAP），并关闭 POP3 服务的外部网络访问以降低风险。"
score = 10.0
severity = "CRITICAL"
sources = [
    "cve",
    "exploitdb",
]
title = "Admiral Systems EmailClub POP3 缓冲区溢出漏洞"
