[basic]
description = "HAMcards Postcard CGI 脚本 1.0 版本在处理收件人电子邮件地址时，未正确过滤 shell 元字符（如分号、管道符等），远程攻击者可通过向收件人邮箱地址字段注入恶意 shell 命令，利用 Web 服务器权限执行任意系统命令，导致服务器被控制或敏感信息泄露。攻击无需身份认证，仅需构造特制 HTTP 请求即可触发。"
published = "1998-11-09"
remediation = "升级 HAMcards Postcard CGI 至不受影响的版本，或禁用该 CGI 脚本；对用户输入进行严格过滤，移除 shell 元字符（;|&`$(){}[]<>）并验证邮箱地址格式。"
score = 7.5
severity = "HIGH"
sources = [
    "cve",
    "avd",
]
title = "HAMcards Postcard CGI 1.0 命令执行漏洞"
