[basic]
description = "Intel Express 500 系列交换机在处理畸形 IP 数据包时存在缺陷，远程攻击者无需身份认证即可向目标设备发送特制的畸形 IP 数据包，触发交换机处理异常，导致设备拒绝服务。该漏洞影响 Intel Express 500 交换机固件版本 2.63 及 2.64，CVSS 评分 5.0，危害等级中危。目前厂商已发布相关修复建议，建议用户升级固件版本。"
published = "2000-10-20T04:00:00.000"
remediation = "升级 Intel Express 500 系列交换机固件至 2.65 或更高版本（该漏洞在 2.63/2.64 版本中存在，2.65 已修复）。由于该产品已停止支持，如无法升级固件，可在网络边界部署入侵检测系统（IDS）过滤畸形 IP 分片包，或限制对受影响交换机的未授权网络访问作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Intel Express 500 系列交换机畸形IP数据包拒绝服务漏洞"
updated = "2026-06-16T21:52:25.963"

