[basic]
description = "Linux 内核 ice 网卡驱动（Intel Ethernet 控制器驱动）中存在空指针解引用漏洞，ice_get_vf_vsi 函数在某些场景（如 VF 重置过程中 VSI 被移除并重建）可能返回 NULL 指针，但驱动中多处调用该函数后未检查返回值有效性，导致在特定执行路径下可触发空指针解引用，引发内核崩溃。该漏洞影响 Linux 内核各发行版，本地攻击者可通过触发 VF 重置等操作利用此漏洞造成拒绝服务（系统崩溃）。CVSS 评分 5.5，危害等级中危。修复方式为在所有调用点增加 ice_get_vf_vsi 返回值的有效性检查。"
published = "2025-02-26T07:01:27.653"
remediation = "升级 Linux 内核至 5.18.3 或更高版本（补丁提交 e7be3877589d / baeb705fd6a7）。各发行版执行对应更新：Debian/Ubuntu 执行 apt update && apt upgrade linux-image 后重启；RHEL/CentOS 执行 yum update kernel 后重启；临时缓解措施可卸载 ice 驱动模块（rmmod ice）禁用 Intel VF 网卡直通功能。"
score = 5.5
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux 内核 ice 驱动空指针解引用漏洞"
updated = "2026-06-17T05:18:17.920"

