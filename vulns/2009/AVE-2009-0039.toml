[basic]
description = "tags.<value>Adobe Flash Player 和 Adobe AIR 在解析 SWF 文件中嵌入的 JPEG 数据时，因对图像尺寸参数处理不当而存在堆缓冲区溢出漏洞（CWE-119）。当目标系统运行的 Adobe Flash Player 版本低于 10.0.42.34 或 Adobe AIR 版本低于 1.5.3 时，未经身份认证的远程攻击者可构造特制尺寸的恶意 JPEG 图像并嵌入 SWF 文件中，诱使用户通过浏览器或桌面应用打开该文件。一旦用户访问包含恶意 SWF 的网页或打开恶意文件，即可在用户进程中触发堆溢出，最终导致任意代码执行。该漏洞攻击复杂度中等，但无需交互即可远程利用，且影响 Windows、Mac OS X 及 Linux 等多平台，危害等级严重，可造成系统完全被控及数据泄露风险。Adobe 已发布 APSB09-19 安全公告并修复该漏洞，建议用户立即升级至 Flash Player 10.0.42.34 或更高版本及 Adobe AIR 1.5.3 或更高版本。"
published = "2009-12-10T19:30:00.420"
remediation = "建议立即将 Adobe Flash Player 升级至 10.0.42.34 或更高版本，并将 Adobe AIR 升级至 1.5.3 或更高版本以修复此漏洞。如暂无法升级，可在浏览器中禁用 Flash Player ActiveX 控件作为临时缓解措施，避免访问不可信的 SWF 文件。"
score = 9.3
severity = "CRITICAL"
sources = ["tenable"]
title = "Adobe Flash Player 和 Adobe AIR JPEG 解析堆缓冲区溢出漏洞"
updated = "2026-06-16T23:12:21.653"

