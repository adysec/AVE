[basic]
description = "Linux 内核 ARM 架构 Qualcomm 平台设备树中存在时钟引用缺陷，gcc 驱动未将 PXO_SRC 注册为固定时钟，导致驱动在尝试使用该时钟源时触发内核崩溃（kernel panic）。本地攻击者可通过加载受影响驱动造成拒绝服务。该漏洞影响使用 QCOM DTS 的 ARM Linux 系统，CVSS 评分 5.5，危害等级中危。"
published = "2025-06-18T11:15:50.140"
remediation = "升级 Linux 内核至 5.19.2 或更高版本（如 6.x 主线）；无法升级时，可反向移植提交 0a4fa4ce6979 或 eb9e93937756 到内核代码中，具体修改为在 arch/arm/boot/dts/qcom-ipq8064.dtsi 中将 gcc PXO phandle 替换为 pxo_board 固定时钟声明。"
score = 5.5
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux Linux 内核拒绝服务漏洞"
updated = "2026-06-17T05:22:57.110"

