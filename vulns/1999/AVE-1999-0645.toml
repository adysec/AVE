[basic]
description = "Deerfield MDaemon 邮件服务器 2.7 及 2.8.5/2.8.6 版本在处理客户端连接时存在拒绝服务漏洞。由于服务器未能对并发连接数量进行有效限制，远程攻击者可在无需身份认证的情况下，向目标服务器发起大量连接请求（connection attempts），耗尽系统资源（如连接表、内存或线程），导致服务无法响应正常请求而崩溃或挂起。该漏洞影响上述版本的 SMTP/POP 等网络服务，攻击条件仅需网络可达目标端口并能够建立大量 TCP 连接，利用方式简单，可通过自动化脚本批量发起连接即可触发拒绝服务。"
published = "1999-12-01T05:00:00.000"
remediation = "升级 MDaemon 至 2.8.7 或更高版本，该版本修复了连接请求处理中的套接字数组溢出问题。如无法立即升级，应在防火墙上配置针对单个 IP 的连接速率限制（例如每秒不超过 10 个新连接），并缩短 TCP 连接超时时间以减缓攻击影响。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Deerfield MDaemon 连接请求拒绝服务漏洞"
updated = "2026-06-16T21:49:10.807"

