[basic]
description = "H3C ER3100 路由器 Web 管理界面存在信息泄露漏洞。未经身份认证的远程攻击者可通过向设备管理端口发送特制的 HTTP 请求，获取路由器敏感配置信息，包括系统运行状态、网络参数及管理员凭据等。攻击者可利用泄露的信息扩大攻击面，实施进一步的渗透攻击，严重威胁内网安全。该漏洞影响 H3C ER3100 系列路由器，无需任何认证即可远程触发。"
published = "08.08"
remediation = "建议立即升级至 H3C 官方发布的最新固件版本。如设备型号 ER3100 已停止维护，请考虑更换为 H3C ER3200G2 或 ER5100G2 等仍在支持周期内的设备并升级至最新固件。临时缓解措施：在 Web 管理界面中禁用不必要的远程管理功能，配置 ACL 限制可访问设备管理页面的源 IP 地址，或在防火墙层面拦截对 `/userLogin.asp` 及 `*.cfg` 路径的非授权访问。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "H3C ER3100 信息泄露漏洞"
updated = "08.08"

