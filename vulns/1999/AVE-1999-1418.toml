[basic]
description = "SGI IRIX 6.2 系统中的 day5datacopier 工具存在不可信搜索路径漏洞。本地攻击者可通过修改 PATH 环境变量，使其指向恶意的 cp 程序，当 day5datacopier 被触发执行时，系统将加载攻击者预设的恶意程序而非系统原生的 cp 命令，从而导致任意代码执行。该漏洞影响 SGI IRIX 6.2 版本，CVSS 评分 7.2，危害等级高。攻击者需拥有本地访问权限方可利用此漏洞。"
published = "1997-05-16T04:00:00.000"
remediation = "升级 SGI IRIX 至 6.3 或更高版本，或在 day5datacopier 脚本中使用 cp 命令的绝对路径 /bin/cp 替代相对路径 cp，同时限制普通用户对关键脚本的写权限并移除当前目录（.）从 PATH 环境变量中。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "SGI IRIX day5datacopier 不可信搜索路径漏洞"
updated = "2026-06-16T21:49:59.997"

