[basic]
description = "NBase NH208 和 NH215 交换机运行的 TFTP 服务存在安全漏洞，由于固件更新文件使用默认文件名且未实施访问控制，远程攻击者可通过猜测目标文件名向交换机发送恶意固件更新，导致设备配置被篡改或引发崩溃从而造成拒绝服务。该漏洞影响 NBase NH208 和 NH215 交换机设备，CVSS 评分为 6.4，危害等级中危。"
published = "1998-07-20T04:00:00.000"
remediation = "建议立即禁用 NBase NH208/NH215 交换机上的 TFTP 服务，或通过访问控制列表限制仅允许受信管理 IP 访问 TFTP 端口 (69/UDP)。同时修改默认固件文件名，避免攻击者通过猜测文件名上传恶意固件。该设备已停止支持，建议升级到支持安全认证的现代交换机设备。"
score = 6.4
severity = "MEDIUM"
sources = ["epss"]
title = "NBase NH208 NH215 TFTP 服务器远程拒绝服务漏洞"
updated = "2026-06-16T21:50:24.300"

