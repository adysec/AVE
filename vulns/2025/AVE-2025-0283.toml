[basic]
description = "该漏洞存在于 JournalX 期刊稿件采编系统的 reviewerregister 模块中，由于系统未对用户提交的文件路径参数进行充分校验与过滤，导致存在任意文件读取缺陷。未经身份认证的远程攻击者可通过构造包含路径遍历序列的特制 HTTP 请求，读取服务器上任意敏感文件，包括数据库配置文件、系统源码、管理员凭据等。该漏洞利用无需任何权限，攻击门槛低，可导致 JournalX 系统敏感数据泄露，进而为攻击者后续内网渗透和权限提升创造条件，危害较大。"
published = "0722"
remediation = '升级 JournalX 期刊稿件采编系统至官方最新安全版本，修复 reviewerregister 模块任意文件读取漏洞。在 reviewerregister 接口中对文件路径参数实施严格过滤，禁止包含 ../、..\ 等路径遍历字符，并采用白名单机制仅允许访问指定目录下的文件。如无法立即升级，可在 Web 服务器或 WAF 侧配置规则，拦截 reviewerregister 路径中包含路径遍历特征的请求，同时限制 Web 服务器进程对敏感系统文件的读取权限。'
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "JournalX 期刊稿件采编系统 reviewerregister 任意文件读取漏洞"
updated = "0722"

