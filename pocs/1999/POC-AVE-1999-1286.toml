[info]
author = "AVE"
description = "检测 SGI IRIX 系统上 colorview 二进制是否存在，该程序可通过 -text 参数读取任意文件"
id = "POC-AVE-1999-1286"
name = "CVE-1999-1494 PoC"
severity = "low"
tags = ["cve-1999-1494"]
vuln_id = [
    "CVE-1999-1494",
    "AVE-1999-1286",
]

[poc]
logic = "any"

[[poc.requests]]
path = "/usr/sbin/colorview"
protocol = "file"

[[poc.requests.matchers]]
expect = true
part = "body"
regex = "(?s).+"
type = "regex"

[[poc.requests]]
path = "/usr/bin/colorview"
protocol = "file"

[[poc.requests.matchers]]
expect = true
part = "body"
regex = "(?s).+"
type = "regex"

[[poc.requests]]
path = "/sbin/colorview"
protocol = "file"

[[poc.requests.matchers]]
expect = true
part = "body"
regex = "(?s).+"
