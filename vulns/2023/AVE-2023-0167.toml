[basic]
description = "泛微 E-cology OA 系统存在敏感信息泄露漏洞，未经授权的远程攻击者可通过构造特制的 HTTP 请求访问系统内部接口，导致数据库连接信息、系统配置参数、用户凭证等敏感数据被泄露。该漏洞影响泛微 E-cology 多个版本，攻击者无需身份认证即可利用，危害较大。建议用户及时升级至最新版本或配置访问控制策略进行修复。"
published = "08.08"
remediation = "立即升级泛微E-cology至最新安全补丁版本（≥10.57），在泛微官方服务台获取补丁包。如无法升级，在Nginx/WAF层面配置规则拦截对 `/mobile/`、`/api/` 等敏感路径的非授权访问，并禁用匿名访问系统日志、用户信息等接口。同时检查并删除服务器上非必要的备份文件（如 `.bak`、`.sql` 文件），限制 `/res/css/`、`/js/` 等目录的目录遍历权限。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "泛微 E-cology 敏感信息泄露漏洞"
updated = "08.08"

