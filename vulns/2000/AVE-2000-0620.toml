[basic]
description = "Sambar Server 4.4 Beta 3 中的 search.dll ISAPI 搜索组件存在目录遍历漏洞。远程攻击者无需任何身份认证，通过向搜索功能的 query 参数传递特制目录路径，即可遍历并读取服务器上的任意目录内容，导致敏感信息泄露。该漏洞影响 Sambar Server 4.3 及 4.4 Beta 3 版本，CVSS 评分为 5.0，危害等级中等。攻击者可利用此漏洞获取系统文件列表等敏感信息，为进一步攻击提供铺垫。"
published = "2000-11-14T05:00:00.000"
remediation = "立即升级到 Sambar Server 5.0 或更高版本（如仍受厂商支持）；如无法升级，直接删除或重命名 ISAPI 目录下的 search.dll 文件以移除风险组件，同时在 Web 服务器访问控制中禁止外部对 /cgi-bin/search.dll 路径的请求。由于该产品已停止维护，建议迁移至 Apache 或 Nginx 等活跃维护的 Web 服务器。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Sambar Server Search CGI 目录遍历漏洞"
updated = "2026-06-16T21:52:33.977"

