[basic]
description = "apsfilter 是 FreeBSD ports 包中的打印过滤器软件，在处理用户过滤器配置文件时存在安全缺陷。由于未正确验证和解析用户提供的过滤器配置，本地攻击者可通过构造恶意配置文件，以 lpd 守护进程用户的身份执行任意命令。攻击者需要具备本地系统访问权限，利用难度较低，可导致权限提升或敏感信息泄露。"
published = "2000-06-07"
remediation = "升级 FreeBSD 系统到包含修复补丁的版本，或从 FreeBSD ports 中更新 apsfilter 到最新版本，确保用户过滤器配置被正确解析并限制 lpd 用户的执行权限。"
score = 4.6
severity = "MEDIUM"
sources = ["cve"]
title = "FreeBSD apsfilter 本地代码执行漏洞"
updated = "2026-06-16"

