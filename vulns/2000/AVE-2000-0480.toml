[basic]
description = "Microsoft Internet Explorer 4.0 和 5.0 版本存在 Cookie 跨域访问漏洞。恶意网站可通过在 URL 中包含目标域名及转义字符，绕过浏览器的同源策略限制，非法获取其他域名的客户端 Cookie 数据。攻击者只需诱导用户访问特制链接即可实施攻击，导致用户会话劫持或敏感信息泄露。"
published = "2000-05-11"
remediation = "安装微软安全公告 MS00-033 提供的补丁程序，或升级至 Internet Explorer 5.01 Service Pack 1 及以上版本。该补丁需在 IE 4.01 SP2 或 IE 5.01 基础上安装，修复了 IE 4.0 和 5.0 中因 URL 解析缺陷导致的跨域 Cookie 访问问题。"
score = 2.6
severity = "LOW"
sources = [
    "cve",
    "nvd",
]
title = "Microsoft Internet Explorer Cookie 泄露漏洞"
updated = "2026-06-16"

