[basic]
description = "AIX 4.3 系统中的 nslookup 工具的词法分析例程存在缓冲区溢出漏洞，远程攻击者可通过向目标系统提交超长输入字符串触发该漏洞，导致程序核心转储，甚至可能执行任意代码。该漏洞影响 IBM AIX 4.3 版本，CVSS 评分 7.5，危害等级高危。攻击者无需认证即可利用，且利用复杂度较低，建议受影响的用户及时升级至安全版本。"
published = "1998-07-06T04:00:00.000"
remediation = "升级至已修复此漏洞的 IBM AIX 版本（如 AIX 5.3 及以上），或安装对应 APAR 补丁（IY07146）。由于 AIX 4.3 已停止技术支持，建议迁移至受支持版本（AIX 7.2/7.3）。临时缓解措施：限制 nslookup 可执行权限为仅 root 和 trusted 用户组可执行（chmod 750 /usr/bin/nslookup），并通过防火墙限制外部 DNS 查询来源。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "IBM AIX nslookup 缓冲区溢出代码执行漏洞"
updated = "2026-06-16T21:50:45.107"

