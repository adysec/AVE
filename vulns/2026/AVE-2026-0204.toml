[basic]
description = "MetInfo 开源 CMS 企业建站系统存在 SQL 注入漏洞，由于未对用户输入进行充分过滤和转义，攻击者可在未经认证的情况下通过构造特制的 HTTP 请求参数，向数据库查询语句中注入恶意 SQL 代码，从而获取数据库中的敏感信息，包括管理员账号密码、用户数据及系统配置等。该漏洞攻击难度较低，危害较大，建议用户及时升级修复。"
published = "20260713"
remediation = "建议立即升级至 MetInfo V8.1 最新版：V8.1 用户从 https://www.metinfo.cn/upload/file/patch/8.1-20260407.zip 下载 2026 年 4 月 7 日安全补丁包，解压后覆盖网站根目录所有文件；V7.9 及 V8.0 用户在后台直接一键升级至 V8.1。商业授权用户可在后台使用系统诊所应用同步补丁。作为临时缓解措施，可在 WAF 或服务器层面配置 SQL 注入检测规则，对输入参数进行严格的类型校验和过滤。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "MetInfo CMS SQL注入漏洞"
updated = "20260713"

