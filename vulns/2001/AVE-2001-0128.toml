[basic]
description = "a2ps 4.14 及之前版本中 lib/routines.h 文件的 tempname_ensure 函数在创建临时文件时未进行安全处理，被 spy_user 等函数调用时存在不安全的临时文件创建漏洞。本地攻击者可通过符号链接攻击利用该漏洞，在受影响系统上以运行 a2ps 进程的用户权限修改任意文件，导致权限提升或文件破坏。该漏洞攻击复杂度低，但需要本地访问权限，CVSS 评分 2.1，危害等级低。"
published = "2014-04-05T21:55:06.097"
remediation = "升级 a2ps 至 4.13b 以上已修复版本，该版本修复了 lib/routines.h 中 tempname_ensure 函数的临时文件创建方式，避免使用可预测路径名。如无法升级，作为临时缓解措施确保 /tmp 目录权限为 1777（粘滞位），限制本地低权限用户对临时目录的写入替换能力。"
score = 2.1
severity = "LOW"
sources = ["osv"]
title = "GNU a2ps 不安全文件创建漏洞"
updated = "2026-06-16T21:56:33.777"

