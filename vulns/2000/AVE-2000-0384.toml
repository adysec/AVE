[basic]
description = "Caldera OpenLinux 2.3 系统中的 Ident 服务守护进程存在拒绝服务漏洞。当远程攻击者向目标系统发送大量 IDENT 请求时，该守护进程会为每个请求创建独立线程进行处理，由于未对并发线程数进行有效限制，导致系统资源被迅速耗尽，最终造成服务崩溃或系统无响应。攻击者无需任何身份认证即可通过网络远程触发该漏洞，攻击条件简单，危害等级中等。受影响的系统包括 Caldera OpenLinux 2.3 及可能使用相同 Ident 实现的其他 Linux 发行版。"
published = "1999-10-08T04:00:00.000"
remediation = "建议禁用 identd 服务（identd 主要用于身份验证查询，非关键服务）：执行 `killall identd` 停止进程，并删除或注释 `/etc/inetd.conf` 中的 `auth` 或 `ident` 行，然后重启 inetd。如无法禁用，在防火墙层面阻止外部对 TCP 113 端口的访问：执行 `iptables -A INPUT -p tcp --dport 113 -j DROP`。升级到 Caldera OpenLinux 更高版本或迁移至受支持的 Linux 发行版。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Caldera OpenLinux 2.3 Ident Daemon 拒绝服务漏洞"
updated = "2026-06-16T21:51:34.400"

