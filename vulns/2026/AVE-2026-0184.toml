[basic]
description = "云连 POS-ERP 管理系统的 getClsItem.action 接口存在 SQL 注入漏洞，攻击者可通过构造特制的 clsItem 参数向后台数据库注入恶意 SQL 语句，导致数据库敏感信息泄露，包括用户凭证、订单数据等。该漏洞无需身份认证即可远程利用，影响范围涉及使用云连 POS-ERP 系统的商户终端，危害较大。修复措施包括实施参数化查询及限制接口访问来源。"
published = "nday"
remediation = "立即联系云连厂商获取最新安全补丁；对 getClsItem.action 接口的 clsItem 参数实施参数化查询或预编译语句，禁止拼接 SQL；在应用层白名单校验输入参数类型；部署 WAF 拦截 SQL 注入特征流量；通过防火墙策略限制该接口仅允许内网 IP 访问，避免暴露在公网。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "云连 POS-ERP 管理系统 SQL注入漏洞"
