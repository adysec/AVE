[basic]
description = "Oracle Web Listener 4.0.x 的 ows-bin 目录下存在批处理文件，远程攻击者可通过向目标服务器发送包含 `?&` 的特殊构造 URL 触发该漏洞，绕过认证在服务器上执行任意命令。该漏洞影响 Oracle Web Listener 4.0.x for NT 版本，CVSS 评分 7.5，危害等级高，攻击复杂度低，无需用户交互即可利用。"
published = "2000-03-15T05:00:00.000"
remediation = "立即升级 Oracle Web Listener 至 4.0.1 或更高版本，该版本已移除 ows-bin 目录中的危险批处理文件。如无法升级，手动删除或重命名 $ORACLE_HOME/ows/bin/ 目录下的所有 .bat/.sh 文件，并限制 ows-bin 目录的 HTTP 访问权限（仅允许本地回环地址 127.0.0.1 访问）。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "Oracle Web Listener 4.0.x 远程命令执行漏洞"
updated = "2026-06-16T21:51:08.663"

