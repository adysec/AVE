[basic]
description = "Windows NT 4.0 远程注册表服务存在认证缺陷漏洞，本地认证用户可通过向目标系统发送特制的畸形请求，导致 winlogon 进程异常崩溃，从而引发拒绝服务。该漏洞影响 Windows NT 4.0 系统，攻击者需拥有本地合法账户权限，无法远程匿名利用。Microsoft 已在安全公告 MS00-040 中提供安全更新修复此漏洞。"
published = "2000-06-08T04:00:00.000"
remediation = "安装 Microsoft 安全公告 MS00-040 对应补丁 (Q259728) 修复 Remote Registry 服务认证绕过缺陷。临时缓解措施：禁用 Remote Registry 服务或将注册表远程访问权限限定于指定管理员组。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Microsoft Windows NT 4.0 Remote Registry 拒绝服务漏洞"
updated = "2026-06-16T21:51:35.390"

