[basic]
description = "Dragon-Fire IDS 1.0 版本的 Web 管理接口包含不安全的 CGI 脚本 dfire.cgi，攻击者可通过该脚本中的 IPONE 字段以管道符（|）为前缀注入系统命令，实现远程命令执行。攻击者无需认证即可在目标系统上以 nobody 用户权限执行任意命令，可能导致系统被完全控制。该漏洞无需特殊工具即可利用，危害极大。"
published = "1999-08-05"
remediation = "该漏洞为 1999 年的古老产品，厂商 Network Security Wizards 早已停止支持，无官方补丁可用。建议立即停用 Dragon-Fire IDS 并替换为现代 IDS 产品（如 Snort 或 Suricata）；如无法立即替换，须在 Web 服务器层面通过 .htaccess 或防火墙规则限制对 dfire.cgi 的访问来源 IP，并移除公网暴露的 Dragon-Fire 管理页面。"
score = 10.0
severity = "CRITICAL"
sources = ["cve"]
title = "Network Security Wizards Dragon-Fire IDS 远程命令执行漏洞"
updated = "1999-08-05"

