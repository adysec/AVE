[basic]
description = "泛微 E-COLOCY V9 的 doCreateDocument 接口存在任意文件上传漏洞，由于未对上传文件类型与内容进行有效校验，远程攻击者可直接向目标系统上传恶意 JSP 或 Webshell 文件，从而获取服务器控制权限。该漏洞攻击复杂度低，无需身份认证即可利用，可能导致企业核心数据泄露与内网横向渗透。官方目前未发布完整修复补丁。"
published = "08.08"
remediation = "立即联系泛微技术支持获取 E-COLOGY V9 安全补丁包（涉及 workflow 模块 doCreateDocument 接口的上传校验修复），升级后重点验证 `/page/resource/docomment/doCreateDocument` 路径的上传权限是否已收紧。临时缓解措施：在 Nginx/Web 应用防火墙（WAF）层面配置规则，拦截对 `/workflow/` 目录下 doCreateDocument 接口的非授权 POST 请求，严格限制可上传文件扩展名白名单（仅允许图片/文档类型）。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "泛微 E-COLOGY V9 doCreateDocument 任意文件上传漏洞"
updated = "08.08"

