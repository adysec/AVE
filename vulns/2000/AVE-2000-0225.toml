[basic]
description = "IBM AIX 系统的快速响应缓存加速器（FRCA）中，frcactrl 程序在处理配置文件时存在不安全的文件操作缺陷。本地已登录的普通用户可利用该程序提供的配置功能，通过构造恶意参数对系统上任意文件进行篡改（如覆盖或写入关键系统文件）。该漏洞仅影响本地已获得系统访问权限的低权限用户，无法被远程直接利用，攻击条件是攻击者需先登录到目标 AIX 主机。成功利用后可导致系统文件完整性被破坏，进而可能引发权限提升或服务异常，危害本地系统安全。IBM 已通过相应的补丁程序修复此问题。"
published = "2000-04-26"
remediation = "应用 IBM AIX 对应版本的安全补丁（APAR IY05850 等），升级至已修复的 AIX 4.3.3 维护级别或更高版本。临时缓解措施：使用 chmod 700 与 chown root:system 限制 frcactrl 程序权限，禁止普通用户执行；或通过 /etc/security/user 限制相关用户登录，关闭 FRCA 服务直至完成补丁升级。"
score = 7.2
severity = "HIGH"
sources = ["cve"]
title = "IBM AIX FRCA frcactrl 本地任意文件篡改漏洞"
updated = "2000-04-26"

