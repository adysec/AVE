[basic]
description = 'Mirabilis ICQ Web Front HTTPd 存在输入验证缺陷，远程攻击者无需身份认证即可向目标服务器发送包含 "?" 字符的特制 URL 请求，导致 Web Front 服务进程崩溃，引发拒绝服务。该漏洞影响 ICQ 0.99、98.0a、2000.0A、99a 等多个版本，CVSS 评分 5.0，危害等级中危。目前厂商已停止维护该产品，建议用户迁移至替代方案。'
published = "2000-12-11T05:00:00.000"
remediation = '将 ICQ Web Front HTTPd 升级至官方修复版本（如 2000b 及以上），或禁用 Web Front 组件。如无法升级，在防火墙或反向代理层面过滤包含 "?" 的畸形请求，并限制对 ICQ HTTPd 服务端口的访问仅限可信 IP 段。由于该产品已停止维护，建议迁移至其他受支持的即时通讯解决方案。'
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Mirabilis ICQ Web Front Server 拒绝服务漏洞"
updated = "2026-06-16T21:53:06.287"

