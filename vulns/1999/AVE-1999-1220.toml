[basic]
description = "iChat ROOMS Webserver 存在目录遍历漏洞，远程攻击者可通过在 URL 路径中使用 ../ 序列绕过访问限制，读取服务器上任意文件。该漏洞无需身份认证即可利用，攻击复杂度低，可导致敏感信息泄露。"
published = "1998-09-09"
remediation = "该漏洞源于 iChat ROOMS Webserver 对用户输入路径过滤不严，攻击者可通过 ../ 序列遍历目录读取任意文件。由于该产品已停止维护且无官方补丁，建议立即迁移至受支持的 Web 服务器软件（如 Apache HTTP Server 或 Nginx），并在应用层对用户请求路径进行规范化校验，拒绝包含 ../ 或空字节等特殊字符的请求。同时配置 Web 应用防火墙（WAF）规则拦截目录遍历攻击模式作为临时缓解措施。"
score = 5.0
severity = "MEDIUM"
sources = ["cve"]
title = "iChat ROOMS Webserver 目录遍历漏洞"
updated = "2026-06-16"

