[basic]
description = "汉王EFaceGo人脸识别终端存在任意文件上传漏洞，位于`/manage/resourceUpload/upload.do`接口。攻击者通过在请求路径中插入`..%3B`（即URL编码的`..;`）绕过路径限制，向目标系统上传恶意的JSP文件，从而获取服务器控制权，实现远程代码执行。该漏洞影响汉王EFaceGo系列设备，攻击者无需认证即可利用，危害严重。"
published = "0708"
remediation = "立即联系汉王厂商获取EFaceGo设备最新固件补丁，升级至修复版本。对该设备upload.do接口实施严格的路径规范化处理，过滤`..`、`%3B`等路径遍历字符；采用文件类型白名单机制，仅允许上传图片文件（如jpg/png），禁止上传jsp/asp/php等可执行脚本文件。将上传目录设置为非执行权限，并限制Web容器对该目录的脚本解析能力。在未修复前，在边界防火墙上限制对该设备管理端口（如8080）的访问来源，仅允许可信管理IP连接，并使用WAF规则拦截含有`upload.do`且包含`..%3B`等路径穿越特征的恶意请求。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "汉王 EFaceGo 任意文件上传漏洞"
updated = "0708"

