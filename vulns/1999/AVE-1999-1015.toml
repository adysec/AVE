[basic]
description = "SSH 2.0.12 及部分其他版本存在用户名枚举漏洞。当攻击者尝试登录时，服务器对有效用户名会多次提示输入密码，而对无效用户名仅提示一次即拒绝连接。远程攻击者可利用这一行为差异，通过枚举方式探测目标服务器上存在的合法用户账号，为后续暴力破解或针对性攻击提供前提条件。该漏洞影响 SSH 2.0.12 版本，CVSS 评分 5.0，危害等级中危。"
published = "1999-06-09T04:00:00.000"
remediation = "升级到 SSH 2.1 及以上版本，或迁移至 OpenSSH（2.5+），这些版本统一了有效/无效用户名的密码提示行为，避免泄露用户存在性。如无法升级，可在 sshd_config 中设置 MaxAuthTries 为较小值并启用 LoginGraceTime 限制，同时配合 fail2ban 等工具监控暴力破解尝试。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "OpenSSH 用户枚举漏洞"
updated = "2026-06-16T21:49:59.880"

