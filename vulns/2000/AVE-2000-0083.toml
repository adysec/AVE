[basic]
description = "UnixWare 的 ppptalk 命令存在缓冲区溢出漏洞，本地攻击者可通过向该命令提交超长的 prompt 参数触发缓冲区溢出，进而覆盖内存中的关键数据，导致权限提升至 root 级别。该漏洞影响 UnixWare 操作系统，CVSS 评分 7.2，危害等级高。成功利用此漏洞需要攻击者具有本地系统访问权限。"
published = "2000-01-18T05:00:00.000"
remediation = "立即升级 UnixWare 至最新补丁级别，或安装 SCO 针对此漏洞发布的安全补丁。临时缓解措施：以 root 执行 `chmod 0755 /usr/bin/ppptalk` 移除 setuid 位，阻止普通用户提权；同时通过 `chmod 750` 限制 ppptalk 仅授信管理员可执行。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "SCO UnixWare ppptalk 缓冲区溢出漏洞"
updated = "2026-06-16T21:50:59.913"

