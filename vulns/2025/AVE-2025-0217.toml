[basic]
description = "MetaCRM 客户关系管理系统的 /business/common/sms/sendsms.jsp 接口存在任意文件上传漏洞，未授权的远程攻击者可通过构造包含恶意 JSP 文件的 multipart 表单数据并发送 POST 请求，将 Webshell 上传至服务器任意目录，从而获取服务器控制权，实现远程代码执行。该漏洞危害严重，攻击者无需任何认证即可利用，可能导致服务器被完全接管。"
published = "0701"
remediation = "建议升级 MetaCRM 至最新版本，或在 sendsms.jsp 中添加文件类型白名单校验，仅允许图片/文档等安全格式上传，同时限制上传目录不可执行脚本权限。临时缓解措施可在 Web 应用防火墙（WAF）中配置规则拦截对 /business/common/sms/sendsms.jsp 的 POST 请求。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "MetaCRM 客户关系管理系统 sendsms.jsp 任意文件上传漏洞"
updated = "0701"

