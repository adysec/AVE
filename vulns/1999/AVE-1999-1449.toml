[basic]
description = "Breeze Network Server 开发版中存在远程系统重启漏洞。远程攻击者可通过访问 configbreeze CGI 程序，向目标服务器发送特制请求，无需任何身份认证即可触发系统重启，导致目标服务中断。该漏洞影响 Breeze Network Server 开发版本，攻击条件简单，危害中等，建议升级至稳定版本。"
published = "1998-12-26T05:00:00.000"
remediation = "Breeze Network Server 已停止维护，厂商未提供补丁。建议在 Web 服务器或反向代理层限制对 configbreeze CGI 脚本的访问（如通过 .htaccess 或 Nginx 拒绝规则），并在防火墙上仅允许可信 IP 访问该服务端口，或迁移至受支持的替代产品。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Breeze Network Server 远程系统重启漏洞"
updated = "2026-06-16T21:50:06.177"

