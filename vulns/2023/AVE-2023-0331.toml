[basic]
description = "该漏洞是 Windows 安全启动（Secure Boot）功能中的安全特性绕过漏洞，位于 Windows BitLocker 和 Secure Boot 组件中。具有管理员权限或物理访问权限的攻击者可通过安装被撤销的启动管理器，绕过 Secure Boot 的安全策略和 BitLocker 加密保护机制，从而在系统启动过程中加载未签名的恶意代码。成功利用后将导致系统安全启动链被破坏，影响 Windows 10/11 及 Windows Server 各版本。Microsoft 已在相关安全更新中发布针对此漏洞的修复措施。"
published = "2023-05-09T18:15:12.407"
remediation = '安装最新的 Windows 安全更新（截至 2025 年 7 月已发布多轮累积更新），使系统获得最新的 Windows Boot Manager 和 Secure Boot 吊销列表。补丁安装后保护默认未启用，需参照 KB5025885 手动启用：以管理员身份运行命令 `reg add HKLM\SYSTEM\CurrentControlSet\Control\SecureBoot\SBAT /v OptIn /t REG_DWORD /d 1` 或通过组策略启用 Secure Boot 可变 SVN；然后重启设备使吊销生效。如无法立即启用，可在 UEFI 固件设置中确保 Secure Boot 处于开启状态并更新到最新固件版本作为临时缓解。'
score = 6.7
severity = "MEDIUM"
sources = ["msrc"]
title = "Microsoft Windows Secure Boot 安全功能绕过漏洞"
updated = "2026-06-17T05:40:18.617"

