[basic]
description = "Allaire ColdFusion Server 4.0 及 4.0.1 版本中的 CFCACHE 标签会将临时缓存文件存放于 Web 文档根目录下，远程攻击者无需身份认证即可直接访问这些缓存文件，从而获取包含数据库连接信息、源代码路径等在内的敏感系统信息。该漏洞 CVSS 评分 7.5，危害等级高，影响 ColdFusion 4.x 系列版本。"
published = "2000-01-04T05:00:00.000"
remediation = "升级至 ColdFusion 4.5 及以上版本以修复 CFCACHE 标签缓存文件泄露问题；若无法升级，在 Web 服务器（IIS/Apache）配置中禁止访问 /CFCACHE/ 目录及所有 .cfm 缓存文件，或将缓存目录移至 Web 根目录之外。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "Allaire ColdFusion Server CFCACHE 标签缓存文件信息泄露漏洞"
updated = "2026-06-16T21:50:54.753"

