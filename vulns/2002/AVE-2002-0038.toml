[basic]
description = "HylaFAX 传真服务器 4.1.3 之前版本中的 faxgetty 组件存在缓冲区溢出漏洞。远程攻击者可通过向目标系统发送特制的超长图像数据行触发该漏洞，导致 faxgetty 进程崩溃从而造成拒绝服务，在特定条件下可能实现任意代码执行。该漏洞影响运行 HylaFAX 4.1.3 之前版本的各类 Unix/Linux 系统，攻击无需身份认证，危害等级高。"
published = "2002-10-04T04:00:00.000"
remediation = "立即将 HylaFAX 升级至 4.1.3 或更高版本。Debian Woody 用户应升级至 1:4.1.1-1.1（DSA-148），SUSE Linux 用户安装 SA 2002_035 安全更新。如无法立即升级，可在 faxgetty 配置中限制客户端连接来源 IP 或禁用远程传真接收功能作为临时缓解措施。"
score = 7.5
severity = "HIGH"
sources = ["osv"]
title = "HylaFAX faxgetty 缓冲区溢出远程代码执行漏洞"
updated = "2026-06-16T21:58:38.050"

