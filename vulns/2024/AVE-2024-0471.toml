[basic]
description = "cloud-init 至 25.1.2 版本中，systemd socket 单元 cloud-init-hotplugd.socket 默认 SocketMode 设置为 0666，导致 /run/cloud-init/hook-hotplug-cmd FIFO 文件全局可写。本地低权限攻击者可向该 FIFO 写入恶意载荷触发 hotplug-hook 命令，以 root 权限执行任意操作。该漏洞影响所有使用受影响版本 cloud-init 的 Linux 发行版，危害中等。"
published = "2025-06-26T10:15:24.703"
remediation = "立即升级 cloud-init 至 25.1.3 及以上版本（apt upgrade cloud-init 或从 GitHub 拉取最新源码编译安装）。如无法立即升级，编辑 systemd 单元覆盖文件 /etc/systemd/system/cloud-init-hotplugd.socket.d/override.conf 添加 SocketMode=0640，执行 systemctl daemon-reload && systemctl restart cloud-init-hotplugd.socket 后核查 /run/cloud-init/ 下 FIFO 文件权限。"
score = 5.9
severity = "MEDIUM"
sources = ["cve"]
title = "Canonical cloud-init hotplugd 套接字权限设置不当漏洞"
updated = "2026-06-17T06:58:00.843"

