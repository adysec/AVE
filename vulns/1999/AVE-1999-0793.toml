[basic]
description = "系统网卡被设置为混杂模式（Promiscuous Mode），使网络接口接收所有经过的数据包而非仅发往本机的流量。攻击者在已获得系统本地访问权限后，可利用此配置进行网络嗅探，捕获同一网段内其他主机的通信内容，包括明文传输的密码、会话令牌等敏感信息。该漏洞属于信息泄露类型，危害程度取决于网络环境的安全隔离级别。"
published = "1999-01-01T05:00:00.000"
remediation = "使用 ifconfig 或 ip link 命令检查并关闭网卡的混杂模式（如 ip link set eth0 promisc off），排查系统中是否存在未授权的嗅探程序（如 tcpdump、Wireshark、dsniff 等）并终止清除。加强本地账户权限管理，限制普通用户对网络接口的控制权，采用交换机端口隔离与 VLAN 划分减少同网段广播暴露，对敏感通信全程启用 SSH、TLS 等加密协议以防止明文数据被截获。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "系统网络接口混杂模式数据包嗅探漏洞"
updated = "2026-06-16T21:48:35.503"

