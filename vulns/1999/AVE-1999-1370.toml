[basic]
description = "HP-UX 10.x 和 9.x 系统中的 ftpd/kftpd 服务存在权限许可和访问控制漏洞，由于对用户权限验证不充分，本地攻击者可利用该漏洞绕过权限检查获取 root 权限，特定条件下远程攻击者也可能利用此漏洞提升权限。该漏洞影响 HP-UX 多个版本，危害等级严重，CVSS 评分 10.0。"
published = "1997-02-02T05:00:00.000"
remediation = "根据 HP 安全公告 HPSBUX9702-055，HP-UX 9.X 系统安装补丁 PHNE_10008，HP-UX 10.0X/10.10 安装 PHNE_10009，HP-UX 10.20 安装 PHNE_10010，kftpd 用户安装 PHNE_10011。如版本已停止支持无法获取补丁，应立即在 /etc/ftpd/ftpusers 中禁止匿名用户登录，并限制 ftp 用户目录权限作为临时缓解措施。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "HP-UX ftpd/kftpd 权限许可和访问控制漏洞"
updated = "2026-06-16T21:49:50.913"

