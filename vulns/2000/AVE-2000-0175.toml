[basic]
description = "Atrium Software Mercur Mail Server 3.2 的 POP3 和 IMAP 服务组件存在多个缓冲区溢出漏洞。远程攻击者可向目标服务器的 POP3 或 IMAP 端口发送特制的超长请求，触发缓冲区溢出，导致服务进程崩溃进而造成拒绝服务。该漏洞影响 Mercur Mail Server 3.2 版本，无需认证即可远程利用，危害程度中等。"
published = "2000-03-15T05:00:00.000"
remediation = "建议升级到 Atrium Software 发布的修复版本（若有），或联系厂商获取安全补丁。由于该产品已停止维护，强烈建议迁移至支持 POP3/IMAP 的现代邮件服务器（如 Dovecot、Cyrus IMAP）。临时缓解措施：在防火墙上限制对 TCP 110（POP3）和 143（IMAP）端口的访问，仅允许可信 IP 段连接。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Atrium Software Mercur Mail Server 3.2 POP3和IMAP服务器缓冲区溢出漏洞"
updated = "2026-06-16T21:51:12.360"

