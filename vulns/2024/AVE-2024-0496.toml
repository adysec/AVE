[basic]
description = "XMLUnit for Java 在 2.10.0 版本之前的默认配置中启用了 XSLT 扩展函数功能，当应用程序使用该库处理攻击者提供的不可信 XSLT 样式表时，攻击者可通过构造恶意的 XSLT 扩展函数调用，在 XML 转换过程中触发任意代码执行。该漏洞影响范围较广，利用条件较低，攻击者仅需诱导目标解析特制的 XSLT 文件即可实施攻击。"
published = "2025-10-17T19:15:36.627"
remediation = "升级至 XMLUnit for Java 2.10.0 或更高版本，该版本已将 XSLT 扩展函数默认禁用。如无法立即升级，可手动配置 TransformerFactory 并设置 `javax.xml.transform.TransformerFactory` 系统属性为安全实现，或通过 `XMLUnit.setTransformerFactory()` 传入禁用扩展函数的 TransformerFactory 实例作为临时缓解措施。"
score = 4
severity = "MEDIUM"
sources = ["msrc"]
title = "XMLUnit for Java 默认配置XSLT扩展函数代码执行漏洞"
updated = "2026-06-17T07:28:35.643"

