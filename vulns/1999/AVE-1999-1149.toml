[basic]
description = "Amanda 备份系统中的 runtar 组件以 root 权限执行 tar 命令，由于未对用户指定的目标文件路径进行充分校验，导致本地攻击者可通过向 runtar 提供恶意文件路径实现任意文件读取或覆盖。该漏洞影响多种 UNIX 操作系统上的 Amanda 备份系统，CVSS 评分 7.2，危害等级高。攻击者需拥有系统本地访问权限方可利用此漏洞。"
published = "1999-11-01T05:00:00.000"
remediation = "立即升级 Amanda 至 2.6.2p2 及以上版本，该版本已限制 runtar 仅接受安全参数并过滤 --to-command、--rsh-command、--info-script 等危险选项。如无法升级，可移除 runtar 的 setuid root 权限（chmod u-s /path/to/runtar），改为通过 sudo 配置精细化的 tar 执行规则，限制允许的 tar 参数白名单。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "Amanda 备份系统 runtar 任意文件读取漏洞"
updated = "2026-06-16T21:50:36.593"

