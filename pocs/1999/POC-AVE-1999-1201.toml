[info]
author = "ave"
description = "检测 Solaris 2.x 系统中 rcS 和 mountall 程序在 fsck 失败时是否自动启动特权 shell，验证本地权限提升漏洞的实际存在。此漏洞要求攻击者在系统启动时具有物理访问权限，通过触发文件系统检查失败来获取 root 权限。"
id = "POC-AVE-1999-1201"
name = "CVE-1999-1585 boot-time privilege escalation detection"
severity = "high"
tags = ["ave-1999-1201"]
vuln_id = [
    "CVE-1999-1585",
    "AVE-1999-1201",
]

[poc]
logic = "all"

[[poc.requests]]
path = "/etc/passwd"
protocol = "file"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["root:x"]
