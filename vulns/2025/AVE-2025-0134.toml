[basic]
title = "JeecgBoot 框架 passwordChange 接口任意用户密码重置漏洞"
description = "JeecgBoot 是一款基于代码生成器的 Java 快速开发框架，其 /jeecg-boot/sys/user/passwordChange 接口存在水平越权漏洞。该接口未对当前用户身份与目标用户进行一致性校验，未授权远程攻击者可直接构造包含 username、newPassword 等参数的 HTTP 请求，在无需短信验证码和旧密码的情况下任意修改包括管理员在内的任意用户密码，进而完全接管系统后台，导致敏感数据泄露和系统控制权丧失。"
severity = "CRITICAL"
score = 9.5
sources = ["hwpoc"]
published = "2025-01-14"
updated = "2025-07-09"
remediation = "升级 JeecgBoot 至官方已修复版本（≥3.9.0），官方已在后续版本中为 /jeecg-boot/sys/user/passwordChange 接口添加 Shiro 权限校验注解，确保用户只能修改自身密码。对于无法升级的版本，应在 Nginx/网关层限制该接口仅允许认证用户访问，并在业务代码中增加当前登录用户与参数 username 的一致性校验，避免水平越权。"
