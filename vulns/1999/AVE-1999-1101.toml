[basic]
description = "Apple Mac OS X 1.0 系统中集成的 Apache HTTP Server 存在拒绝服务漏洞。远程攻击者可通过向 CGI 程序发送大量 HTTP GET 请求，导致服务器生成大量进程从而耗尽系统资源，最终造成 Apache 服务崩溃。该漏洞影响 Mac OS X 1.0 版本，CVSS 评分 5.0，危害等级中危。目前官方已停止支持该版本，建议升级至更高版本系统。"
published = "1999-06-03T04:00:00.000"
remediation = "升级 Apple Mac OS X 至 10.1 及以上版本，或升级 Apache HTTP Server 至 1.3.20 及以上版本。配置 Apache 的 `MaxClients`、`MaxRequestsPerChild` 等指令限制并发 CGI 进程数，防止资源耗尽；建议在反向代理或防火墙层实施速率限制（rate limiting）作为额外缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Apple Mac OS X 1.0 Apache HTTP Server HTTP GET请求拒绝服务漏洞"
updated = "2026-06-16T21:50:23.160"

