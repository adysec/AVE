[basic]
description = "Sun StarOffice 5.1 的 StarScheduler Web 服务器组件存在路径遍历漏洞，远程攻击者可通过向目标服务器发送包含 `..`（点点）序列的特制 HTTP 请求，突破目录限制读取服务器上的任意文件。该漏洞无需身份认证即可利用，攻击条件低，可导致敏感信息泄露。受影响版本为 StarOffice 5.1，CVSS 评分 5.0，危害等级中危。"
published = "2000-03-09T05:00:00.000"
remediation = '该漏洞影响已停止维护的 Sun StarOffice 5.1 StarScheduler Web 服务器组件，官方已不再提供安全更新。建议立即停止使用 StarScheduler 组件，或升级至 Oracle 后续版本（如 Oracle Open Office）并启用 Web 服务访问控制列表，限制仅允许可信 IP 访问，同时在 Web 服务器层面配置 URL 过滤规则，拦截包含 "../" 的路径遍历请求。'
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Sun StarOffice 5.1 StarScheduler 任意文件读取漏洞"
updated = "2026-06-16T21:51:09.300"

