[basic]
description = "Linux 内核 iavf 网卡驱动中存在条件竞争漏洞，当搭载 Intel E810 网卡并已创建虚拟功能（VF）的系统进行重启时，iavf_shutdown() 函数先将适配器状态设为 __IAVF_REMOVE，随后 ice 驱动移除流程中调用 iavf_remove() 时，因状态不匹配（非 __IAVF_RUNNING/__IAVF_DOWN/__IAVF_INIT_FAILED）导致进程进入无限休眠，系统永久挂起。本地攻击者可利用系统重启操作触发拒绝服务。该漏洞影响 Linux 内核 iavf 驱动，CVSS 评分 5.5，危害等级中等。"
published = "2025-05-02T16:15:25.480"
remediation = "升级 Linux 内核至 6.3 及以上版本，或针对长期维护分支升级至 5.15.105、6.1.22 或 6.2.9 及以上版本。无法立即升级时，可在重启前先卸载所有 VF 设备（`echo 0 > /sys/class/net/<eth>/device/sriov_numvfs`）避免触发 iavf 驱动状态机死锁。"
score = 5.5
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux 内核 iavf 驱动系统重启挂起漏洞"
updated = "2026-06-17T06:44:13.577"

