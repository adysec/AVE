[basic]
description = "Atrium Software Cassandra NNTP Server 1.10 在处理用户登录认证时存在缓冲区溢出漏洞，远程攻击者无需身份认证即可通过向 119/TCP 端口发送超长登录名称触发该漏洞，导致服务器进程崩溃，造成拒绝服务。该漏洞影响 Cassandra NNTP Server 1.10 版本，CVSS 评分 5.0，危害等级中危。"
published = "2000-05-01T04:00:00.000"
remediation = "升级到 Cassandra NNTP Server 1.10 之后的最新版本或迁移至其他受支持的 NNTP 服务端软件。在网络边界防火墙或主机防火墙中限制对 NNTP 端口（默认 119/TCP）的访问，仅允许可信 IP 来源连接。若无法立即升级，可在服务端配置中限制登录用户名长度作为临时缓解。建议评估迁移至当前仍在维护的 NNTP 服务器替代方案。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Atrium Software Cassandra NNTP Server 1.10 登录拒绝服务漏洞"
updated = "2026-06-16T21:51:30.910"

