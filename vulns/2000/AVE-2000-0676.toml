[basic]
description = 'Armada Design Master Index 1.0 的 search.cgi CGI 脚本存在目录遍历漏洞。远程攻击者无需身份认证即可通过向 "catigory" 参数提交包含 ".."（点点）序列的恶意请求，突破路径限制读取服务器上的任意文件。该漏洞影响 Armada Master Index 1.0 版本，CVSS 评分 5.0，危害等级中危，可能导致敏感信息泄露。'
published = "2000-12-19T05:00:00.000"
remediation = "该漏洞源于 Armada Master Index 1.0 的 search.cgi 未对 catigory 参数做输入过滤。由于该软件已停止维护，官方未发布补丁。建议修复 search.cgi 源码，对 catigory 参数执行严格过滤，移除 ../ 等目录遍历序列及空字节截断，仅允许白名单内的合法路径；同时在 Web 服务器层面配置 WAF 规则或 URL 重写，拦截包含 .. 的异常请求；长期建议迁移至受支持且安全的目录索引替代方案。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Armada Master Index 1.0 search.cgi 目录遍历漏洞"
updated = "2026-06-16T21:52:46.660"

