[basic]
description = "INN（InterNetNews）新闻服务器 2.2.1 及更早版本中存在缓冲区溢出漏洞。远程攻击者可通过向目标服务器发送特制的新闻组文章（article）触发该漏洞，导致服务器进程崩溃，造成拒绝服务。该漏洞影响运行 INN 2.2.1 及之前版本的系统，攻击者无需身份认证即可通过网络远程利用，危害等级中等。建议升级至 INN 2.2.2 或更高版本以修复此漏洞。"
published = "2000-10-20T04:00:00.000"
remediation = "升级 INN 至 2.2.2 或更高版本。Caldera OpenLinux 用户安装 CSSA-1999-038 补丁包，SuSE Linux 用户应用 suse_security_announce_34 更新。临时缓解措施：在防火墙限制对 NNTP 端口（119/tcp）的访问，仅允许可信来源连接。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "ISC INN 缓冲区溢出拒绝服务漏洞"
updated = "2026-06-16T21:51:33.303"

