[basic]
description = "MIT Kerberos 4 和 5 协议实现中的 krb_rd_req() 函数存在缓冲区溢出漏洞，远程攻击者无需身份认证即可向目标系统发送特制的 Kerberos 认证请求触发该漏洞，导致缓冲区溢出，进而实现远程代码执行并以 root 权限控制目标系统。该漏洞影响 Cygnus Network Security 4.0、KerbNet 5.0、MIT Kerberos 4/5 及 RedHat 6.2 等版本，CVSS 评分 10.0，危害等级严重。Exploit-DB 上已有公开利用代码。"
published = "2000-05-16T04:00:00.000"
remediation = "建议立即升级 MIT Kerberos 至 1.2.x 或更高版本（krb5-1.1.1 及更早版本受影响），或安装对应发行版的安全补丁：Red Hat Linux 6.2 用户应应用 RHSA-2000-025 提供的更新 krb5 包；FreeBSD 用户应升级至 2000 年 5 月后的安全修复版本。如无法立即升级，可在防火墙层面限制对 Kerberos 服务端口（TCP/UDP 88、749）的未授权访问作为临时缓解措施。"
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "MIT Kerberos 4/5 krb_rd_req 远程缓冲区溢出漏洞"
updated = "2026-06-16T21:51:36.847"

