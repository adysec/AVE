[basic]
description = "Byte Fusion 公司开发的 BFTelnet 1.1 版本在实现 Telnet 服务时存在缓冲区溢出漏洞。该软件在处理用户登录的用户名输入时，未对输入长度进行充分的边界校验，攻击者可通过建立远程 Telnet 连接并发送超长（异常长度）的用户名字段，触发缓冲区溢出，导致服务进程崩溃，进而造成目标系统的拒绝服务（DoS）。该漏洞影响运行 BFTelnet 1.1 的服务器，攻击条件为攻击者能够与目标服务建立网络连接，无需身份认证即可利用，属于远程可触发的拒绝服务类漏洞。"
published = "1999-11-03T05:00:00.000"
remediation = "升级 Byte Fusion BFTelnet 至厂商后续修复版本（或替换为仍在维护的 Telnet 服务组件）。如无法升级，可在边界防火墙限制 TCP 23 端口的访问来源，仅允许受信任 IP 连接，并使用入侵检测规则拦截超长用户名的登录请求作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Byte Fusion BFTelnet 长用户名缓冲区溢出拒绝服务漏洞"
updated = "2026-06-16T21:49:17.913"

