[basic]
description = "通达OA由于使用了存在反序列化漏洞的Yii框架版本，导致存在前台反序列化漏洞。攻击者可在未经身份认证的情况下，通过向目标OA系统发送特制的序列化数据触发反序列化，进而在目标服务器上执行任意代码，获取服务器完全控制权。该漏洞危害严重，影响范围广泛。"
published = "2023-08-04"
remediation = "升级通达OA至最新安全版本，或安装官方发布的安全补丁以修复Yii框架反序列化漏洞，同时建议在网络边界限制对OA系统的未授权访问，并开启Web应用防火墙防护。"
score = 9.8
severity = "CRITICAL"
