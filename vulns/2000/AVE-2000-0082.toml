[basic]
description = "Microsoft Index Server（索引服务器）的 Internet Data Query（.ida）处理机制存在信息泄漏缺陷。远程攻击者无需身份认证，只需向目标 Web 服务器发起一个针对不存在的 .ida 文件的 HTTP 请求，服务器便会返回包含该 Web 目录真实物理路径的错误信息。攻击者可借此探查服务器文件系统结构，为后续攻击收集路径情报。该漏洞影响运行 Microsoft Index Server 的 IIS Web 服务器，攻击条件仅需网络可达目标且存在 .ida 查询处理，利用方式简单，可通过常规 HTTP 请求触发。"
published = "2000-01-26T05:00:00.000"
remediation = "升级到 Microsoft Index Server 2.0 安装 Windows 2000 Service Pack 1 或更高版本补丁；在 IIS 中删除或限制对 .ida/.idq 文件的访问权限，并在防火墙/代理层屏蔽对 Internet Data Query 文件的请求，作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
