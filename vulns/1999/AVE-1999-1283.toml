[basic]
description = "Slackware Linux 3.1 中 XFree86 SuperProbe 组件的 TestChip 函数存在缓冲区溢出漏洞。本地攻击者可通过向该程序传递超长的 -nopr 参数触发缓冲区溢出，进而覆盖进程内存空间，实现权限提升至 root 级别。该漏洞影响 Slackware Linux 3.1 系统，CVSS 评分 7.2，危害等级高危。由于攻击者需拥有本地访问权限，可利用已编译的利用程序或通过编译源码方式实施攻击。"
published = "1997-03-04T05:00:00.000"
remediation = "升级 Slackware Linux 至 4.0 或更高版本，或升级 XFree86 至 4.0 以上版本。作为临时缓解措施，移除 /usr/X11/bin/SuperProbe 的 SUID 位（chmod -s /usr/X11/bin/SuperProbe），限制本地普通用户执行该程序。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "Slackware Linux XFree86 SuperProbe 本地缓冲区溢出漏洞"
updated = "2026-06-16T21:50:33.060"

