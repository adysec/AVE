[basic]
description = "Windows 95 在启用密码缓存时对密码列表（.pwl）文件使用弱加密算法进行存储，本地攻击者可通过直接访问该文件并利用加密缺陷破译其中的明文密码，从而获取系统登录凭据并提升自身权限。该漏洞影响所有启用密码缓存的 Windows 95 系统，CVSS 评分 4.6，危害等级中危。微软已发布相关安全公告。"
published = "1999-12-31T05:00:00.000"
remediation = 'Windows 95 已停止支持且无官方安全更新。建议立即禁用密码缓存：打开控制面板 → 密码 → 更改密码 → 点击"开始使用"并取消勾选所有密码缓存选项，同时删除 %WINDIR% 目录下所有 .pwl 文件。作为根本解决方案，应升级至仍受支持的 Windows 版本（如 Windows 10/11）以消除此风险。'
score = 4.6
severity = "MEDIUM"
sources = ["cve"]
title = "Microsoft Windows 95 密码列表文件弱加密权限提升漏洞"
updated = "2026-06-16T21:49:43.830"

