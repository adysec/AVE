[basic]
description = "Jgaa 开发的 WarFTPd 1.70 是一款运行于 Windows 平台的 FTP 守护进程。该版本在处理客户端连接时存在资源管理缺陷，未经身份认证的远程攻击者可向目标服务器大量、快速地发起 TCP 连接请求（连接洪水/Connection Flooding），耗尽服务器端的连接资源与系统处理能力，导致服务无法响应正常请求，最终造成拒绝服务（DoS）。攻击仅需网络可达目标 21 端口并能够建立大量连接即可实施，无需任何凭据或特殊权限，影响运行 WarFTPd 1.70 的服务器可用性。"
published = "1999-12-13T05:00:00.000"
remediation = "强烈建议将 War FTP Daemon 1.70 迁移至当前受支持的 FTP 服务器，如 vsftpd 3.0.5 或 ProFTPD 1.3.8 及以上版本，这些版本已内置连接速率限制与并发控制机制。如短期内无法替换，应在防火墙或 iptables 层对 21 端口启用连接速率限制，例如使用 hashlimit 模块限制同一源 IP 每秒新建连接不超过 5 次，并在系统内核参数中调低 tcp_synack_retries 与 tcp_syncookies 阈值以减缓 SYN 洪水冲击。同时建议部署 fail2ban 监控 FTP 异常连接行为，自动封禁高频访问源 IP。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
