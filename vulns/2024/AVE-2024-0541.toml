[basic]
description = 'Git Credential Manager (GCM) 存在换行符处理不一致导致的信息泄露漏洞。Git 在解析 credential 协议时仅将 LF（\n）和 CRLF（\r\n）视为换行符，而 .NET StreamReader 的 ReadLineAsync 方法还将单独的 CR（\r）视为有效换行符。攻击者可构造包含 CR 的恶意远程仓库 URL，当用户克隆或通过 --recursive 参数克隆包含子模块的恶意仓库时，利用该解析差异绕过 Git 的换行符校验，将用户凭据泄露至攻击者控制的另一 Git 远程服务器。该漏洞影响 GCM 2.6.1 之前的所有版本，CVSS 评分 7.4，危害等级高。'
published = "2025-01-14T19:15:31.967"
remediation = "立即将 Git Credential Manager (GCM) 升级至 2.6.1 或更高版本，可从 https://github.com/git-ecosystem/git-credential-manager/releases/tag/v2.6.1 获取。如无法立即升级，避免使用 `git clone --recursive` 克隆不可信仓库，并在克隆前手动检查子模块的远程 URL 是否可信。"
score = 7.4
severity = "HIGH"
sources = ["msrc"]
title = "Git Git Credential Manager 信息泄露漏洞"
updated = "2026-06-17T08:04:15.680"

