[basic]
description = "SCO UnixWare 操作系统中的 xauto 程序存在本地缓冲区溢出漏洞。该程序在处理用户输入时未对数据长度进行边界校验，本地攻击者可通过构造超长的恶意参数写入超出缓冲区边界的内存区域，从而覆盖返回地址并劫持程序执行流程。成功利用后，攻击者能够以 root 权限执行任意指令，完全控制系统。该漏洞影响 UnixWare 7.0、7.0.1、7.1 及 7.1.1 等多个版本，攻击前提为攻击者已拥有目标系统的本地登录权限。"
published = "1999-12-03T05:00:00.000"
remediation = "建议立即升级至 SCO UnixWare 7.1.1 及以上已修复版本，并安装 SCO 官方发布的安全补丁（如 rsync/OpenServer 安全补丁集）；如无法立即升级，可临时将 /usr/bin/X11/xauto 文件权限移除 setuid 位（执行 chmod u-s /usr/bin/X11/xauto），或限制该程序的访问权限以缓解本地提权风险。"
score = 7.2
severity = "HIGH"
sources = ["exploitdb"]
