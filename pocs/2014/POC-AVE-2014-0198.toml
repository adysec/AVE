[info]
author = "AVE"
description = "检测 Microsoft Internet Explorer 6至11版本中 CMarkup::IsConnectedToPrimaryMarkup 释放后重用漏洞。通过向目标发送检测请求，判断目标是否存在该漏洞。"
id = "POC-AVE-2014-0198"
name = "CVE-2014-1776 PoC"
severity = "critical"
tags = ["cve-2014-1776"]
vuln_id = [
    "CVE-2014-1776",
    "AVE-2014-0198",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/check"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["vulnerable"]
