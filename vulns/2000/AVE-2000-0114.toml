[basic]
description = "Microsoft IIS 3.0 及 4.0 中自带的示例 Internet Data Query（IDQ）脚本存在目录遍历漏洞。远程攻击者无需身份认证即可向服务器发送包含 ..（点点）序列的特制 HTTP 请求，利用 IDQ 脚本绕过虚拟目录路径限制，读取服务器上任意文件（如系统配置文件、ASP 源码等）。该漏洞源于 IDQ 脚本未对用户输入的文件路径参数进行充分过滤，影响 Windows NT 4.0 Option Pack 默认安装的 IIS 服务器。"
published = "2000-01-26"
remediation = "删除 IIS 安装目录下 /Scripts/ 文件夹中的示例 IDQ 脚本文件（如 iisadmin.idq、iissamples.idq 等），或升级至不再包含示例脚本的 IIS 版本。对于 Windows NT 4.0 系统，建议升级至 Windows 2000 或更高版本操作系统以获得安全更新支持。"
score = 5.0
severity = "MEDIUM"
sources = [
    "cve",
    "exploitdb",
]
title = "Microsoft IIS 3.0/4.0 示例 IDQ 脚本目录遍历漏洞"
updated = "2000-01-26"

