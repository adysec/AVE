[basic]
description = "Sun Solaris 2.5.1/2.6/7.0 的 TCP 流驱动中存在拒绝服务漏洞，远程攻击者可通过 nmap OS 指纹识别选项（-O）向开放端口发送恶意连接，当目标服务进程被终止后，TCP 流驱动中的 mutex_enter 函数发生递归调用，导致系统内核崩溃重启。"
published = "1999-09-23"
remediation = "升级 Solaris 系统至不受影响的版本，或安装 Sun 官方发布的安全补丁，限制对 TCP 端口的未授权访问，使用防火墙过滤恶意连接以防止利用 nmap OS 指纹识别触发递归 mutex_enter 调用导致系统崩溃"
score = 5.0
severity = "MEDIUM"
sources = ["cve"]
title = "Sun Solaris TCP Stream Driver 递归 mutex_enter 拒绝服务漏洞"
updated = "2026-06-16"

