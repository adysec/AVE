[basic]
description = "Solaris 系统中 tip 命令存在本地缓冲区溢出漏洞，攻击者通过设置过长的 HOME 环境变量可触发缓冲区溢出，从而以 root 权限执行任意代码。该漏洞影响 Solaris 2.5/2.6/7.0/8 及更早版本，需要拥有本地系统访问权限才能利用。攻击者可通过编译并运行本地提权程序完成利用，危害等级高（CVSS 7.2）。"
published = "2001-06-18T04:00:00.000"
remediation = "升级到 Solaris 10 或 11 以获取官方安全修复；如无法升级，立即移除 tip 二进制文件的 setuid 权限（chmod u-s /usr/bin/tip），并限制非授权用户本地登录以降低利用风险。"
score = 7.2
severity = "HIGH"
sources = ["exploitdb"]
title = "Sun Solaris tip 本地缓冲区溢出漏洞"
updated = "2026-06-16T21:54:14.307"

