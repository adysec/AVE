[basic]
description = "Windows NT 4.0 的 CIFS Computer Browser 服务存在主机公告洪泛拒绝服务漏洞。远程攻击者无需身份认证即可向目标主浏览表发送大量特制的主机公告请求，导致服务资源耗尽而崩溃，无法正常响应网络浏览请求。该漏洞影响 Windows NT 4.0 系统，攻击者只需具备网络访问能力即可触发，利用难度低。"
published = "2000-05-25T04:00:00.000"
remediation = '安装微软 MS00-036 安全更新补丁。对于 Windows NT 4.0，在注册表 `HKLM\SYSTEM\CurrentControlSet\Services\MrxSmb\Parameters` 中新建 DWORD 值 `MaximumBrowseEntries`，设为较小值（如 1000）以限制浏览表大小。同时在防火墙层面阻断 UDP 138 端口，防止外部攻击者发送恶意 HostAnnouncement 帧。建议禁用非必要计算机的 Browser 服务。'
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Microsoft Windows NT 4.0 CIFS Computer Browser 拒绝服务漏洞"
updated = "2026-06-16T21:51:38.590"

