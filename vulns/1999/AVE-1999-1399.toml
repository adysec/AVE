[basic]
description = "SunOS 4.1.1 及更早版本中的 in.telnetd 服务存在本地权限提升漏洞，本地攻击者可利用 telnet 守护进程中的缓冲区溢出或权限校验缺陷，通过特制输入获取 root 权限。该漏洞影响 SunOS 4.1.1 及更早版本，要求攻击者具备本地账户访问权限，通过向 in.telnetd 发送特制数据触发缓冲区溢出或绕过权限检查，最终实现本地提权至 root 权限，CVSS 评分 7.2（高危）。Sun Microsystems 已发布补丁修复该漏洞，建议升级至修复版本。"
published = "1991-03-27T05:00:00.000"
remediation = "建议升级至 SunOS 4.1.2 或更高版本（已修复该漏洞），或迁移至 Oracle Solaris 现代版本。若无法升级，请立即禁用 in.telnetd 服务（注释 /etc/inetd.conf 中 telnet 行并重启 inetd），改用 SSH 进行远程管理。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "Sun SunOS in.telnetd 本地权限提升漏洞"
updated = "2026-06-16T21:49:57.387"

