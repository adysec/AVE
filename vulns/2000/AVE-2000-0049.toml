[basic]
description = "aVirt Rover POP3 Server 1.1 存在缓冲区溢出漏洞，远程攻击者可通过向 POP3 服务发送超长的用户名（USER）命令参数触发该漏洞，导致服务进程崩溃，造成拒绝服务。该漏洞利用条件简单，无需身份认证，仅需建立 TCP 连接即可实施攻击。CVSS 评分为 5.0，危害等级中等。"
published = "1999-12-27"
remediation = "aVirt Rover POP3 Server 1.1 已停止维护，官方未发布安全补丁。建议立即迁移至仍在活跃维护的 POP3 服务软件（如 Dovecot 或 Cyrus），并在防火墙策略中限制对 110/TCP 端口的访问来源 IP，仅允许受信任客户端连接。同时可在应用层限制用户名输入长度以缓解缓冲区溢出风险。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "aVirt Rover POP3 Server 缓冲区溢出拒绝服务漏洞"
updated = "2026-06-16"

