[basic]
description = "SWSoft ASPSeek 搜索引擎 1.03 及更早版本中的 s.cgi 程序存在多个缓冲区溢出漏洞。远程攻击者无需身份认证即可通过向目标服务器发送特制的超长 HTTP 查询字符串或超长 tmpl 参数，触发缓冲区溢出，从而在目标系统上执行任意命令。该漏洞影响 ASPSeek 1.03 及之前版本，CVSS 评分 7.5，危害等级高，可导致信息泄露、权限提升及服务被完全控制。"
published = "2001-06-27T04:00:00.000"
remediation = "立即升级 ASPSeek 至 1.0.4 或更高版本（官方补丁已发布于 http://www.aspseek.org/changes.html）。由于该产品已停止维护，建议迁移至现代搜索引擎替代方案。临时缓解措施：移除或限制 Web 服务器上 s.cgi 脚本的执行权限，在 Web 服务器配置中禁止对 /cgi-bin/s.cgi 的访问，并过滤超长 HTTP 查询字符串。"
score = 7.5
severity = "HIGH"
sources = ["exploitdb"]
title = "SWSoft ASPSeek s.cgi 远程缓冲区溢出漏洞"
updated = "2026-06-16T21:54:22.740"

