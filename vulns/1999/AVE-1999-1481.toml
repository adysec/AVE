[basic]
description = "wu-ftpd 2.4 FTP服务器在处理ABOR（中止文件传输）命令时未能正确丢弃特权，导致文件传输过程中的信号被错误处理。本地用户和可能的远程攻击者可利用此漏洞读取服务器上的任意文件，造成敏感信息泄露。"
published = "1997-07-04"
remediation = "升级至wu-ftpd 2.6.2及以上版本修复此漏洞；由于wu-ftpd已停止维护，建议迁移至vsftpd或ProFTPD等受支持的FTP服务器软件，并严格限制文件系统访问权限。"
score = 5.0
severity = "MEDIUM"
sources = ["cve"]
title = "wu-ftpd 任意文件读取漏洞"
