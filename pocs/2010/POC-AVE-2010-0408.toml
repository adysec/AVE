[info]
author = "ave"
description = "通过构造包含交错调用 document.write 与 appendChild 的特制 HTML 页面，触发 Firefox 3.5.x-3.6.11 中 nsCSSFrameConstructor::ContentAppended 的索引跟踪错误，导致内存破坏。访问该页面的易受攻击浏览器将触发崩溃或代码执行。"
id = "POC-AVE-2010-0408"
name = "Mozilla Firefox nsCSSFrameConstructor::ContentAppended 远程代码执行漏洞 PoC"
severity = "critical"
tags = ["ave-2010-0408"]
vuln_id = [
    "CVE-2010-3765",
    "AVE-2010-0408",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "Mozilla Firefox",
    "nsCSSFrameConstructor",
]
