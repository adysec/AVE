[basic]
description = "Microsoft Personal Web Server（PWS）存在目录遍历漏洞，远程攻击者无需身份认证即可通过向目标服务器发送包含特制 `../`（点点斜杠）序列的 HTTP 请求，突破路径限制读取 Web 根目录以外的任意文件，导致敏感信息泄露。该漏洞影响 Microsoft Windows 95/98 及 NT 4.0 系统中的 PWS 组件，攻击方式简单且危害较大。微软已在 MS99-010 安全公告中修复此漏洞。"
published = "1999-03-26T05:00:00.000"
remediation = "建议立即安装 Microsoft 安全公告 MS99-010 对应补丁，或升级至 Windows 2000 及以上版本并使用 IIS 替代 PWS。如无法升级，可在注册表中禁用 PWS 的虚拟目录功能，或通过防火墙限制 80 端口的外部访问作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Microsoft Personal Web Server 远程目录遍历漏洞"
updated = "2026-06-16T21:51:06.647"

