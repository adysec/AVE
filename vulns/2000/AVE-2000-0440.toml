[basic]
description = "KDE 1.1.2 的 KApplication 类在配置文件管理功能中存在本地权限提升漏洞，本地攻击者可利用配置文件处理逻辑缺陷覆盖任意系统文件，进而实现权限提升。该漏洞影响 KDE 1.1.2 版本，攻击者需具备本地访问权限且无需认证，通过构造恶意配置文件路径诱导 KApplication 写入敏感系统文件（如 /etc/passwd、/etc/shadow 或 SUID 程序），实现权限提升至 root 权限。CVSS 评分 7.2（高危），影响机密性、完整性和可用性均为完全影响。该漏洞于 2000 年 5 月披露，ExploitDB 已有公开利用代码（EDB-ID: 19981），KDE 后续版本已修复该配置文件路径遍历漏洞。"
published = "2000-05-31T04:00:00.000"
remediation = '升级到 KDE 2.0 或更高版本，其中修复了 KApplication 配置文件路径验证漏洞。修改配置文件，禁用以 "." 开头的潜在危险配置，并确保使用绝对安全路径而非相对路径访问系统关键文件。通过权限控制限制普通用户对关键系统文件的写权限，并检查所有配置文件变更前验证文件路径安全性和所有权。'
score = 7.2
severity = "HIGH"
sources = ["epss"]
title = "KDE KDE 1.1.2 KApplication 配置文件本地权限提升漏洞"
updated = "2026-06-16T21:51:55.997"

