[basic]
description = "SGI IRIX 及 OpenLinux 系统中的 routed 路由守护进程在处理 traceon 调试功能时存在任意文件追加写入漏洞。远程攻击者可通过向运行 routed 服务的目标系统发送特制的 RIP 路由协议数据包，利用 traceon 机制将数据追加到系统任意文件末尾，从而篡改关键配置文件或实现权限提升。该漏洞影响 SGI IRIX 3/4/5/6 及 OpenLinux 1.0/1.1 等版本，CVSS 评分 6.4，危害等级中等。建议更新至不受影响版本或禁用 routed 服务，以降低被利用风险。"
published = "1998-10-26T05:00:00.000"
remediation = "建议立即禁用或移除 routed 服务（`/etc/init.d/routed stop && chkconfig routed off`），如确需运行请升级到厂商已修复版本；同时在边界防火墙上过滤 UDP 520 端口，限制仅允许受信任网段访问路由协议流量。"
score = 6.4
severity = "MEDIUM"
sources = ["epss"]
title = "SGI IRIX 及 OpenLinux routed 守护进程任意文件写入漏洞"
updated = "2026-06-16T21:47:55.790"

