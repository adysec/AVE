[basic]
description = "Minicom 1.82.1 及更早版本在部分 Linux 系统中存在本地权限提升漏洞。由于程序在处理捕获文件时未能正确检查符号链接，本地用户可通过符号链接攻击创建或覆盖任意文件，这些文件将归属于 uucp 用户。攻击者利用此漏洞可实现权限提升，影响系统安全性。漏洞利用需要本地访问权限且 Minicom 须为 setuid uucp 程序。"
published = "2000-10-20T04:00:00.000"
remediation = "建议升级至 Minicom 2.0 或更高版本，该版本已修复 capture-file 操作的符号链接安全检查缺失问题。如无法升级，执行 `chmod u-s /usr/bin/minicom` 移除 setuid uucp 权限位，阻止提权写入任意文件；同时避免在多用户环境下使用 capture 功能保存文件到公共可写目录。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Minicom 本地符号链接攻击漏洞"
updated = "2026-06-16T21:52:17.570"

