[basic]
description = "rdist 工具的 lookup() 函数存在缓冲区溢出漏洞，本地用户可通过向该函数传递超长参数触发栈溢出，从而覆盖返回地址获取 root 权限。该漏洞影响 BSDI BSD/OS 2.1、FreeBSD 2.1、IBM AIX 4.2、SGI IRIX 6.4、Sun SunOS 4.1.3 等多个 UNIX 系统。攻击者需拥有系统本地账户权限，利用门槛较低，CVSS 评分 7.2，危害等级高。"
published = "1996-07-24T04:00:00.000"
remediation = "立即升级受影响系统的 rdist 至已修复版本：FreeBSD 升级至 2.1.7 及以上版本，SunOS 安装对应补丁 (Sun Patch ID 105401-xx/105402-xx)，AIX 安装 IY00000 安全补丁。在现代系统中应完全移除 rdist（默认已弃用），改用 rsync 替代。如无法升级，限制 rdist 的 setuid 权限并仅允许受信用户执行。"
score = 7.2
severity = "HIGH"
sources = ["epss"]
title = "FreeBSD rdist lookup 函数缓冲区溢出漏洞"
updated = "2026-06-16T21:47:22.417"

