[basic]
description = 'Gordano NTMail 4.2 版本的 Web 文件访问功能存在目录遍历（../ 点号点号）漏洞。该漏洞源于程序未对用户输入的文件路径进行充分校验与过滤，攻击者可构造包含".."序列的特殊请求，突破 Web 根目录限制，远程读取服务器上的任意文件（如系统配置文件、密码文件等敏感内容）。影响范围为运行 NTMail 4.2 且启用 Web 文件访问服务的系统。攻击者无需身份认证，只需向目标服务器发送特制的 HTTP 请求即可利用此漏洞，造成敏感信息泄露。'
published = "1999-05-26T04:00:00.000"
remediation = '立即升级 Gordano NTMail 至 4.2 以上已修复版本，或迁移至受支持的邮件服务器软件。如无法升级，在 Web 服务器层面配置 URL 过滤规则，拦截包含 "../" 或 "..\" 的请求路径，并限制 Web 文件访问目录权限为只读。作为临时缓解措施，可禁用 Web File Access 功能或通过反向代理添加路径规范化校验。'
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Gordano NTMail 4.2 目录遍历漏洞"
updated = "2026-06-16T21:49:20.713"

