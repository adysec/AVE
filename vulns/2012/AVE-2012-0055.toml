[basic]
description = "Apache Struts2 的 ExceptionDelegator 组件在处理属性数据类型不匹配的异常时，会将用户传入的参数值作为 OGNL 表达式进行解析执行，导致远程命令执行漏洞。攻击者无需认证即可通过向受影响应用发送特制的 HTTP 请求参数触发该漏洞，从而在服务器上执行任意 Java 代码，完全控制目标系统。该漏洞影响 Apache Struts2 2.0.0 至 2.3.17 版本，CVSS 评分 9.8，危害等级严重。"
published = "2012-01-08T15:55:01.217"
remediation = '升级 Apache Struts2 至 2.3.17 及以上版本（官方修复版本为 2.2.3.1），该漏洞在 2.3.17 中彻底修复。如无法升级，在 struts.xml 中禁用动态方法调用：<constant name="struts.enable.DynamicMethodInvocation" value="false" />，并严格校验用户输入，过滤 OGNL 表达式特殊字符。同时建议部署 WAF 规则拦截包含 OGNL 表达式的请求参数。'
score = 9.8
severity = "CRITICAL"
sources = ["kev"]
title = "Apache Struts2 远程命令执行漏洞"
updated = "2026-06-16T23:37:12.150"

