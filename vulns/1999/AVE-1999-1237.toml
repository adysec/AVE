[basic]
description = "wu-ftpd和BSDI ftpd在处理SITE EXEC命令时存在竞争条件漏洞。远程攻击者可通过发送特制的SITE EXEC请求，在竞争窗口内利用条件竞争绕过权限检查，从而获取root用户权限，完全控制目标服务器。该漏洞攻击复杂度较高，但成功利用后危害极大。"
published = "1997-09-23"
remediation = "升级到已修复该漏洞的wu-ftpd或BSDI ftpd版本，或禁用SITE EXEC命令。对于已停止维护的系统，建议迁移至更安全的FTP服务器软件如vsftpd，并限制FTP服务的访问权限。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "wu-ftpd和BSDI ftpd SITE EXEC命令竞争条件漏洞"
updated = "2026-06-16"

