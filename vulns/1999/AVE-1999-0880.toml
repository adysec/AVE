[basic]
description = "CVE-1999-0601 是指部分网络入侵检测系统（IDS）未能正确解析和校验 TCP 握手阶段（即三次握手 SYN、SYN-ACK、ACK 数据包）中所携带的数据内容。攻击者在建立 TCP 连接时，可在握手报文中嵌入精心构造的载荷，使 IDS 解析异常或漏报，从而绕过入侵检测机制实施隐藏的恶意通信。该漏洞影响未能严格遵循 TCP 协议状态机、对握手阶段数据处理存在缺陷的 IDS 产品，利用条件为攻击者能够与目标网络建立 TCP 连接并向 IDS 镜像流量注入特制握手数据包，属于检测绕过类安全缺陷。"
published = "1999-01-01T05:00:00.000"
remediation = "该漏洞源于早期网络入侵检测系统（IDS）对TCP三次握手数据包内载荷的解析缺陷，攻击者可在SYN/ACK等握手报文中夹带恶意数据以绕过检测。修复建议：升级所使用的IDS产品至厂商发布后已修复该缺陷的版本（如早期ISS RealSecure、Snort 1.3及以上等）；若暂无法升级，应在边界防火墙或路由器上启用TCP handshake normalization（如清洗握手包中的异常载荷、强制TCP状态严格校验），并开启IDS的stream重组与握手包深度检测功能以降低绕过风险。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
