[basic]
description = "Linux 内核 SCSI lpfc 驱动中的 lpfc_cmpl_ct_cmd_gft_id() 函数在异常退出路径中存在空指针解引用漏洞。当该函数处理 GFT_ID 命令的完成回调时，若进入错误分支，未初始化的 nodelist 指针被传递给 lpfc_nlp_put() 函数，导致空指针解引用，引发内核崩溃（拒绝服务）。本地攻击者可通过构造特定 SCSI 命令触发异常路径利用此漏洞，影响使用 Emulex LightPulse FC 驱动的大多数 Linux 内核版本。内核社区已通过初始化 nodelist 指针修复此问题。"
published = "2025-10-01T12:15:40.457"
remediation = "升级 Linux 内核至 5.19.17、6.0.3 或更高版本；或合入以下任意 commit：04e7cd8c8563、59b7e210a522、82dc1fe4324e。如无法立即升级，可临时限制加载 lpfc 内核模块（通过 modprobe 黑名单或卸载）作为缓解措施，但需注意该操作将禁用 Emulex FC HBA 功能。"
score = 5.5
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux 内核 lpfc SCSI 驱动空指针解引用漏洞"
updated = "2026-06-17T05:23:36.757"

