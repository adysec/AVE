[basic]
description = "Sudo 1.5 版本存在本地信息泄露漏洞。本地攻击者可通过尝试将目标文件名作为程序执行来探测任意文件是否存在，当文件不存在时系统会返回不同的错误提示信息，从而泄露文件存在性信息。该漏洞影响 Debian Linux 2.1 和 Red Hat 6.0 等系统，CVSS 评分 2.1，危害等级低。攻击者需拥有本地访问权限，利用条件较为有限。"
published = "1999-06-08T04:00:00.000"
remediation = "升级 Sudo 至 1.6 及以上版本，该漏洞在 Sudo 1.6 中已修复。对于 Debian 系统，升级至 Debian 3.0 及以上版本；对于 Red Hat 系统，升级至 Red Hat 7.0 及以上版本。如无法升级，可限制本地用户对 sudo 的访问权限，仅允许受信任用户使用 sudo 命令。"
score = 2.1
severity = "LOW"
sources = ["cve"]
title = "Debian Linux 及 Red Hat Sudo 1.5 文件存在性信息泄露漏洞"
updated = "2026-06-16T21:50:33.947"

