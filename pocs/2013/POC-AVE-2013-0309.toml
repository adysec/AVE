[info]
author = "AVE"
description = "检测Microsoft Internet Explorer 6至11中mshtml.dll的SetMouseCapture释放后使用漏洞。通过构造特制的JavaScript字符串触发UAF，远程攻击者可执行任意代码。"
id = "POC-AVE-2013-0309"
name = "CVE-2013-3893 PoC"
severity = "high"
tags = ["cve-2013-3893"]
vuln_id = [
    "CVE-2013-3893",
    "AVE-2013-0309",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["SetMouseCapture"]
