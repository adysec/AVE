[basic]
description = "H3C Workspace 云桌面存在未授权远程命令执行漏洞。其 webui 接口的 aaa_portal_auth_adv_submit 功能在处理 suffix 参数时未对用户输入做安全过滤与校验，攻击者在无需身份认证的情况下，可通过构造包含命令注入 payload（如经 URL 编码的 shell 命令）的特制 HTTP 请求，将恶意命令写入目标系统文件（如 /usr/local/webui/test.txt）从而实现远程代码执行。该漏洞影响暴露该 webui 接口且未打补丁的 H3C Workspace 云桌面设备，攻击条件仅需网络可达目标且能访问对应路径，危害等级高，可导致服务器被完全控制。"
published = "0722"
remediation = "建议将 H3C Workspace 云桌面升级至官方发布的最新修复版本（请联系 H3C 技术支持获取对应安全补丁）。临时缓解措施：在 Web 应用防火墙或反向代理上拦截对 /webui/ 接口的非法请求，限制仅内网可信 IP 访问管理页面，并禁用广告模板相关功能模块直至完成升级。"
score = 5
severity = "MEDIUM"
