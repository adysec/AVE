[basic]
description = "AMaViS 病毒扫描器 0.2.0-pre4 及更早版本存在命令注入漏洞。远程攻击者可通过发送包含恶意 shell 元字符的感染邮件，并在 Reply-To 字段中嵌入系统命令，当 AMaViS 处理邮件时触发命令执行。由于 AMaViS 以 root 权限运行，攻击者可直接获取服务器完全控制权，造成严重安全威胁。"
published = "1999-12-31T05:00:00.000"
remediation = "升级 AMaViS 至 0.3.0 及以上版本，该版本修复了 reply-to 字段的 shell 元字符过滤逻辑。如无法升级，在 sendmail/procmail 调用链中对邮件头部进行严格过滤，阻止包含 `;`、`|`、`` ` `` 等 shell 元字符的 reply-to 字段进入扫描流程，或改用 amavisd-new 替代旧版 AMaViS。"
score = 10
severity = "CRITICAL"
sources = ["cve"]
title = "AMaViS 病毒扫描器远程代码执行漏洞"
updated = "2026-06-16T21:50:35.963"

