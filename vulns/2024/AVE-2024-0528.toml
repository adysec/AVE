[basic]
description = "Linux 内核 dma-debug 子系统在操作 radix_lock 时存在死锁漏洞。当多个 CPU 核心并发执行 DMA 调试操作时，radix_lock 的获取顺序不当可能导致死锁，造成系统无响应或拒绝服务。本地攻击者可通过精心构造的 DMA 操作序列触发该条件，导致内核崩溃。该漏洞影响 Linux 内核多个版本，Red Hat 评估为低危。"
published = "2025-01-11"
remediation = "建议立即将 Linux 内核升级至以下安全版本：5.10.231、5.15.174、6.1.120、6.6.66、6.12.5 或 6.13 及以上版本。对于无法立即升级内核的系统，可通过禁用 DMA 调试功能（内核启动参数中移除 `dma_debug=1` 或设置 `dma_debug=0`）作为临时缓解措施，但请注意这将影响 DMA 相关问题的调试能力。"
score = 5
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux Kernel dma-debug radix_lock 死锁漏洞"
updated = "2025-01-11"

