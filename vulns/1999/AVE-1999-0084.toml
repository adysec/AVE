[basic]
description = "Qualcomm Eudora 邮件客户端（包括 Eudora 4.1/4.2/4.3、Eudora Light 3.0、Eudora Pro 1.0）在处理附件时存在输入验证缺陷，远程攻击者无需身份认证即可通过发送带有超长文件名的恶意邮件附件触发该漏洞，导致邮件客户端崩溃或拒绝服务。由于对附件文件名字段长度缺乏有效校验，攻击者可构造特制邮件批量发送，使目标用户无法正常使用邮件客户端。该漏洞 CVSS v2 评分 7.5，危害等级高，且可能伴随部分机密性和完整性影响。"
published = "2000-05-01"
remediation = "升级至 Eudora 5.0 或更高版本（5.x/6.x 系列已修复此漏洞），并避免打开来源不明的包含超长附件名的邮件。由于 Eudora 已于 2006 年停止维护，建议迁移至 Thunderbird 等仍在安全更新的邮件客户端以防止后续安全风险。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Qualcomm Eudora 拒绝服务漏洞"
updated = "2000-05-01"

