[basic]
description = "OpenCode 的 Markdown 渲染引擎存在跨站脚本（XSS）漏洞，攻击者可通过在 Markdown 内容中嵌入恶意 JavaScript 代码，当用户预览或渲染该内容时触发 XSS 攻击。由于 OpenCode 的渲染环境具备执行系统命令的权限，攻击者可利用该 XSS 漏洞进一步实现远程代码执行（RCE），获取目标系统控制权。该漏洞影响 OpenCode 1.1.10 之前版本，攻击者仅需诱使用户打开包含恶意 Markdown 内容的文件即可触发。官方已在 v1.1.10 版本中移除内联 JavaScript 支持以修复此漏洞。"
published = "nday"
remediation = "建议升级至 OpenCode v1.1.10 及以上版本，该版本修复了 Markdown 渲染引擎中的 XSS 漏洞，阻止了通过恶意 Markdown 内容注入脚本实现远程代码执行的攻击向量。若无法立即升级，应禁用 Markdown 渲染功能或对用户输入的 Markdown 内容进行严格的 HTML 标签过滤与转义处理。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "OpenCode OpenCode Markdown 渲染跨站脚本漏洞"
updated = "nday"

