[basic]
description = "DeskPro 1.1 版本存在多个 SQL 注入漏洞，其后台及部分功能模块在处理用户输入的查询参数时未对数据进行充分的过滤与转义，导致攻击者可将恶意的 SQL 语句拼接进数据库查询中。该漏洞影响运行 DeskPro 1.1 的各类部署环境，攻击条件为攻击者能够访问存在缺陷的 Web 接口并构造特制的 HTTP 请求。利用方式上，远程未授权或低权限攻击者可通过提交包含单引号、UNION SELECT 等 SQL 片段的参数，绕过身份验证、读取敏感数据（如用户凭据、配置信息）甚至篡改数据库内容，从而进一步控制应用系统。"
published = "1999-12-01T05:00:00.000"
remediation = "升级 DeskPro 至官方已修复的 1.2 或更高版本；如无法立即升级，应在 Web 服务器（如 IIS/Apache）层面对 DeskPro 的查询接口部署输入校验与参数化过滤，限制数据库账户权限为只读，并在边界防火墙对 DeskPro 端口做访问控制以缓解 SQL 注入风险。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Gordano NTMail 邮件服务器 VRFY 命令信息泄露漏洞"
updated = "2026-06-16T21:49:07.460"

