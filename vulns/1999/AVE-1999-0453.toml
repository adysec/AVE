[basic]
description = "Netscape Enterprise Server 的 SSL 握手处理过程中存在缓冲区溢出漏洞，远程攻击者无需身份认证即可通过向目标服务器发送特制的 SSL 握手请求触发该溢出，导致服务进程崩溃从而引发拒绝服务。该漏洞影响 Netscape Enterprise Server 3.6 及更早版本，CVSS 评分 5.0，危害等级中等。"
published = "1999-07-06T04:00:00.000"
remediation = "建议将 Netscape Enterprise Server 升级至 4.0 或更高版本以修复 SSL 握手缓冲区溢出漏洞。由于该产品已停止维护，长期方案应迁移至仍在支持的 Web 服务器（如 Apache HTTP Server 或 Nginx）。临时缓解措施可在网络层限制异常 SSL 握手请求频率。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Netscape Enterprise Server SSL Handshake 拒绝服务漏洞"
updated = "2026-06-16T21:48:58.993"

