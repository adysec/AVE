[info]
author = "ave"
description = "检测 IIS 4.0 FrontPage Server Extensions fpcount.exe 缓冲区溢出漏洞。发送 HTTP 请求检查 fpcount.exe 是否存在，确认存在则表明目标可能存在该漏洞。"
id = "POC-AVE-1999-1483"
name = "CVE-1999-1376 PoC"
severity = "critical"
tags = ["ave-1999-1483"]
vuln_id = [
    "CVE-1999-1376",
    "AVE-1999-1483",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/fpcount.exe"
protocol = "http"

[poc.requests.body]
content = ""
type = "raw"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["fpcount"]
