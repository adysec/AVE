[basic]
description = "Microsoft Internet Explorer 中的 Eyedog ActiveX 控件存在缓冲区溢出漏洞，远程攻击者可通过构造恶意网页诱导用户访问，触发 ActiveX 控件的缓冲区溢出，从而在目标系统上以当前用户权限执行任意代码。该漏洞影响 IE 4.0/5.0 等早期版本，无需身份认证即可远程利用，攻击者只需诱导受害者打开包含恶意代码的网页即可触发。CVSS 评分 4.0，属于中等严重度漏洞，微软已发布补丁修复。"
published = "1999-09-01T04:00:00.000"
remediation = "建议立即卸载或禁用 Eyedog ActiveX 控件，在 Internet Explorer 中通过“Internet 选项”→“程序”→“管理加载项”禁用 Eyedog 控件，或直接卸载相关软件；若必须使用 IE，请升级至 IE 6 SP1 及以上版本并安装微软发布的安全补丁 MS99-032 (MS99-032) 修补该漏洞，同时建议在防火墙层面禁用 ActiveX 控件下载作为临时缓解措施"
score = 4
severity = "MEDIUM"
sources = ["epss"]
title = "Microsoft Internet Explorer Eyedog ActiveX 控件缓冲区溢出远程代码执行漏洞"
updated = "2026-06-16T21:48:48.737"

