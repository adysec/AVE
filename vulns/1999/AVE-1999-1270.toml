[basic]
description = "Solaris 操作系统电源管理功能存在安全漏洞。系统从挂起状态恢复时，在调用屏幕锁定程序 xlock 之前会短暂开放键盘输入，使得具有物理访问权限的攻击者可利用此时间窗口向最后一个活动应用程序输入命令，从而可能提升权限。该漏洞影响 Solaris 2.4 至 2.6 版本。"
published = "1998-07-16T04:00:00.000"
remediation = "升级到 Solaris 7 或更高版本，该版本在系统挂起前正确启动 xlock 进程。如无法升级，可禁用电源管理功能（执行 `/usr/bin/powerd -d` 关闭自动挂起），或使用第三方屏幕锁定工具（如 xlockmore）并配置在系统挂起前手动锁定会话。同时确保物理访问控制严格，防止未授权用户接触终端。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "Sun Solaris 电源管理本地权限提升漏洞"
updated = "2026-06-16T21:50:25.720"

