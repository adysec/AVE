[basic]
description = "Oracle Database Assistant 1.0（Oracle 8.0.3 Enterprise Edition 附带组件）在创建新数据库时，将数据库主密码以明文形式写入 spoolmain.log 日志文件中，导致本地攻击者可通过读取该日志文件获取数据库管理员密码。该漏洞源于程序未对敏感凭据进行安全处理，攻击者只需拥有本地文件读取权限即可利用，进而获得数据库完全控制权限。CVSS 评分 4.6，危害等级中危。"
published = "1999-03-04T05:00:00.000"
remediation = "升级 Oracle 数据库至受支持的版本（如 19c 或 21c），该漏洞已在后续版本修复。若无法升级，限制 spoolmain.log 文件权限为仅数据库管理员可读写（chmod 600），并在每次创建数据库后立即删除该日志文件中的明文密码记录。"
score = 4.6
severity = "MEDIUM"
sources = ["epss"]
title = "Oracle Database Assistant 密码明文存储漏洞"
updated = "2026-06-16T21:50:03.053"

