[basic]
description = 'NetBSD ftpd 的 ftpchroot 功能存在路径解析漏洞，攻击者可通过构造包含 ".." 路径遍历序列的 FTP 命令（如 CWD、RETR 等），绕过 chroot 限制跳出受限目录，读取或写入服务器文件系统任意位置的文件。影响 NetBSD 1.4.x 及更早版本的 ftpd 服务，攻击者需拥有合法 FTP 账号并具备登录权限，通过发送精心构造的路径遍历序列即可突破 chroot 限制，导致敏感文件泄露或任意文件写入，进而可能进一步提权控制服务器。NetBSD 官方已发布补丁修复该路径解析缺陷。'
published = "2000-05-28"
remediation = "建议升级 NetBSD 至 1.5 及以上版本，或应用 NetBSD 官方发布的 ftpchroot 补丁（ftp://ftp.netbsd.org/pub/NetBSD/misc/security/advisories/NetBSD-SA2000-012.txt.asc）。若无法立即升级，可临时禁用 ftpchroot 功能或限制 FTP 服务仅允许受信 IP 访问。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "NetBSD ftpchroot 分析漏洞"
updated = "2000-05-28"

