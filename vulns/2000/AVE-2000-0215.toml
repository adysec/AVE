[basic]
description = "Netscape Enterprise Server 在启用 Web Publishing 功能时存在目录遍历漏洞。远程攻击者可通过向服务器发送特制的 GET 请求访问 /publisher 目录，该目录提供的 Java applet 可使攻击者浏览服务器上任意目录列表，导致敏感信息泄露。该漏洞影响 Netscape Enterprise Server 多个版本，CVSS 评分 6.4，危害等级中危。建议禁用 Web Publishing 功能或升级至修复版本。"
published = "2000-03-11T05:00:00.000"
remediation = "升级 Netscape Enterprise Server 至 3.6 SP2 或更高版本，该漏洞已在后续版本中修复。如无法升级，在服务器配置中禁用 Web Publishing 功能（移除 publisher 相关加载模块），或通过访问控制列表限制 /publisher 目录仅允许可信 IP 访问。"
score = 6.4
severity = "MEDIUM"
sources = ["epss"]
title = "Netscape Enterprise Server 目录列举漏洞"
updated = "2026-06-16T21:51:17.547"

