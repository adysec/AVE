[basic]
description = "Python tarfile 模块中的 extract 和 extractall 函数存在目录遍历漏洞，攻击者可通过在 TAR 压缩包的文件名中嵌入 ..（点点）序列构造恶意归档文件，诱使用户解压后实现任意文件覆写。该漏洞源于 tarfile 模块未对文件名中的路径穿越字符进行充分过滤，导致解压时文件可被写入目标系统的任意路径。攻击条件为需要用户主动解压恶意构造的 TAR 文件（社会工程学辅助），影响范围涵盖所有使用 Python tarfile 模块处理不可信 TAR 归档的应用。CVSS 评分 9.8，危害等级严重。"
published = "2007-08-28T01:17:00.000"
remediation = "升级 Python 至 3.6.16、3.8.17、3.9.17、3.10.12 或 3.11.4 及以上版本，这些版本在 tarfile 模块的 extract/extractall 函数中加入了路径遍历防护。如无法升级，可在提取前自行校验 tar 包内文件名是否包含 `../` 或绝对路径，拒绝包含路径穿越序列的文件条目；或使用 `tarfile.extractall(filter='data')`（Python 3.12+）启用安全过滤模式。"
score = 9.8
severity = "CRITICAL"
sources = ["tenable"]
title = "Python tarfile 目录遍历任意文件写入漏洞"
updated = "2026-06-16T22:44:19.430"

