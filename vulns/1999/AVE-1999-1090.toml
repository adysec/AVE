[basic]
description = "perlshop.cgi 购物车程序未对敏感客户信息进行有效保护，将其存储在 Web 根目录下可被直接访问的文件和目录中，导致远程攻击者可通过 HTTP 请求直接获取这些敏感数据。该漏洞属于输入验证不当，影响使用 perlshop.cgi 的在线商店系统，可能导致客户个人隐私和支付信息泄露。"
published = "2005-05-02T04:00:00.000"
remediation = "建议将 perlshop.cgi 的数据目录（/store/customers/、/store/temp_customers/）移出 Web 文档根目录，或通过 Apache 的 <Directory> 及 .htaccess 添加 Deny from all 规则禁止 HTTP 直接访问。由于 perlshop.cgi 已停止维护，建议迁移至受支持的电商平台作为根本解决方案。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "PerlShop perlshop.cgi 敏感信息泄露漏洞"
updated = "2026-06-16T21:50:18.230"

