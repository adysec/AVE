[basic]
description = "rpc.sprayd 是 Unix 系统中用于网络喷发测试的 RPC 服务，运行于 100012 端口。由于 sprayd 守护进程以 root 权限运行且未对调用来源进行充分权限校验，本地攻击者可通过发送特制的 RPC 请求触发 sprayd 命令执行，将自身权限提升至 root。该漏洞影响 Sun Solaris、HP-UX 及其他运行 rpc.sprayd 服务的类 Unix 系统，攻击者需拥有目标系统的本地 shell 访问权限。建议在非必要环境下禁用该服务或配置 RPC 访问控制列表。"
published = "1999-01-01T05:00:00.000"
remediation = "立即禁用 rpc.sprayd 服务：在 Solaris 中执行 `svcadm disable svc:/network/rpc/spray:default` 或从 inetd.conf 中注释 sprayd 行并重启 inetd。同时配置防火墙/TCP Wrapper 限制 RPC 端口（111/32771-32800）仅允许可信网段访问，并安装操作系统厂商提供的 RPC 安全补丁。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Sun RPC rpc.sprayd 服务本地权限提升漏洞"
updated = "2026-06-16T21:48:44.303"

