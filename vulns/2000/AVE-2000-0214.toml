[basic]
description = "Netscape Enterprise Server 3.0、3.6 及 3.51 版本存在目录索引漏洞。当服务器启用目录索引功能时，远程攻击者可通过向目标服务器发送带有 `?wp-ver-info` 或 `?wp-cs-dump` 等 Web 发布标签的恶意请求，绕过访问控制，列出服务器上的目录列表和文件结构。该漏洞可导致敏感信息泄露，为后续攻击提供攻击面。攻击无需认证，利用难度较低。"
published = "2000-03-17T05:00:00.000"
remediation = "升级 Netscape Enterprise Server 至 4.0 及以上版本，或在服务器配置中禁用目录索引功能（Directory Indexing），并移除对 ?wp-ver-info 和 ?wp-cs-dump 等 Web Publishing 标签的处理。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Netscape Enterprise Server 目录索引信息泄露漏洞"
updated = "2026-06-16T21:51:17.417"

