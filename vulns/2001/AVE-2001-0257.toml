[basic]
description = "Zetetic 公司为 PalmOS 开发的密码管理工具 STRIP（Secure Tool for Recalling Important Passwords）0.5 及更早版本存在密码可被暴力破解的安全漏洞。该工具使用 SysRandom 函数生成随机数，而 SysRandom 以 TimeGetTicks（系统滴答计时器）作为种子，导致随机数可预测性极高。同时，其实现缺陷大幅缩减了密码搜索空间，使得本地攻击者能够通过暴力枚举方式在较短时间内恢复所有已存储的密码。该漏洞影响 STRIP 0.5 及之前所有版本，CVSS 评分 7.2，危害等级高，攻击者需具备本地访问权限。"
published = "2001-08-02T04:00:00.000"
remediation = "立即停止使用 Zetetic STRIP 0.5 及更早版本，改用支持加密安全随机数生成器（CSPRNG）的密码管理工具（如 KeePass、1Password）。如必须继续使用 STRIP，请升级至 0.6 或更高版本，该版本已修复 SysRandom 种子熵不足导致的密码搜索空间大幅缩减问题。"
score = 7.2
severity = "HIGH"
sources = ["exploitdb"]
title = "Zetetic STRIP PalmOS 密码管理弱随机数导致暴力破解漏洞"
updated = "2026-06-16T21:54:36.290"

