[info]
author = "ave"
description = "验证 Microsoft Internet Explorer 4.01/5.0 中 HHOpen ActiveX 控件 (hhopen.ocx) OpenHelp 方法缓冲区溢出漏洞。通过构造恶意 HTML 页面调用 ActiveX 控件的 OpenHelp 方法传递超长字符串触发缓冲区溢出。"
id = "POC-AVE-1999-1195"
name = "CVE-1999-1577 PoC - Microsoft IE HHOpen ActiveX Buffer Overflow"
severity = "medium"
tags = ["ave-1999-1195"]
vuln_id = [
    "CVE-1999-1577",
    "AVE-1999-1195",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/poc.html"
protocol = "http"

[poc.requests.body]
content = ""
type = "raw"

[poc.requests.headers]
User-Agent = "AVE/1.0"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "HHOpen",
    "OpenHelp",
    "CLSID:ADB880A6-D8FF-11CF-9377-00AA003B7A11",
]

[[poc.requests.matchers]]
expect = true
status = [200]
type = "status"
