[basic]
description = "Linux 2.2 内核中的 mknod 系统调用在处理符号链接时存在安全缺陷，未正确验证目标文件路径是否为符号链接，导致本地攻击者可通过创建恶意符号链接并调用 mknod 覆盖系统关键文件，从而提升权限或破坏系统完整性。攻击者需拥有本地用户权限，无需其他特殊条件即可利用该漏洞实施权限提升攻击。"
published = "1999-09-28T04:00:00.000"
remediation = "升级 Linux 内核至 2.4.0 及以上版本，该漏洞已在 2.3.x 开发版中修复。如无法升级内核，可通过 LSM（Linux Security Module）如 SELinux 或 AppArmor 限制普通用户执行 mknod 系统调用权限，并设置 /proc/sys/fs/protected_hardlinks 为 1 增强链接保护。"
score = 4.6
severity = "MEDIUM"
sources = ["cve"]
title = "Linux Kernel mknod 本地权限提升漏洞"
updated = "2026-06-16T21:50:15.463"

