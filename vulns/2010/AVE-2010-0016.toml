[basic]
description = "Joomla! 的 DecryptWeb DW Graphs（com_dwgraphs）组件 1.0 版本中存在目录遍历漏洞，远程攻击者可通过向 index.php 的 controller 参数传入包含 ../ 等目录遍历序列的恶意请求，绕过路径限制读取服务器上的任意文件。该漏洞源于 dwgraphs.php 未正确过滤用户输入的 controller 参数，攻击者无需认证即可利用，可窃取配置文件、数据库凭证等敏感信息。"
published = "2010-04-07T18:30:00.547"
remediation = '''建议立即卸载 Joomla! 组件 com_dwgraphs 1.0，该组件已无厂商安全更新。如业务必须保留使用，需手动修改 dwgraphs.php，对 controller 参数做白名单过滤，仅允许字母、数字、下划线和连字符：preg_replace('/[^a-zA-Z0-9_-]/', '', $controller)；同时移除空字节截断。服务器层面设置 open_basedir 限制 PHP 文件访问范围，并在 .htaccess 中添加 RewriteCond %{QUERY_STRING} controller=\.\./ [NC] 规则拦截目录遍历请求作为临时缓解措施。'''
score = 5
severity = "MEDIUM"
sources = ["nuclei"]
title = "Joomla! DW Graphs 组件本地文件包含漏洞"
updated = "2026-06-16T23:18:03.603"

