[basic]
description = "WFTPD 及 WFTPD Pro 2.41 版本在处理 RESTART (REST) 命令时存在文件写入缺陷，未经认证的远程攻击者可通过在 FTP 会话中发送特制的 REST 偏移量参数，结合 STOU、STOR 或 APPE 等存储命令，使服务器在文件末尾之后写入数据或向不存在的文件执行写入操作，从而导致服务进程崩溃，造成拒绝服务。该漏洞无需任何身份验证，攻击复杂度低，CVSS 评分 6.4，危害等级中等。"
published = "2000-07-21T04:00:00.000"
remediation = "升级到 WFTPD 2.4.1 正式版或更高版本（该漏洞在 RC11 后的更新中修复）。如无法立即升级，可在 WFTPD 配置中禁用匿名用户的写权限（STOR/APPE/STOU），同时在防火墙限制对 FTP 端口 21 的访问仅允许可信来源 IP，并监控日志中异常的 REST 命令使用行为以作临时缓解。"
score = 6.4
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Texas Imperial Software WFTPD REST命令拒绝服务漏洞"
updated = "2026-06-16T21:52:10.753"

