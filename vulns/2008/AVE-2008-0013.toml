[basic]
description = "Weberr 公司开发的 Joomla! 组件 RWCards 3.0.11 版本中 captcha/captcha_image.php 存在目录遍历漏洞。当 PHP 配置选项 magic_quotes_gpc 被禁用时，远程攻击者可通过 img 参数构造特制的目录遍历序列（如 ../），实现包含并执行服务器上的任意本地文件。该漏洞可导致敏感信息泄露或进一步获取服务器控制权限，影响运行该组件的所有 Joomla! 站点。"
published = "2009-02-19T16:30:00.407"
remediation = "建议立即卸载 RWCards 3.0.11 组件（该组件已停止维护），更换为仍在活跃开发的 Joomla! 卡片类扩展。如无法卸载，可手动编辑 captcha/captcha_image.php，对 img 参数使用 realpath() 解析并校验路径是否在预期目录内，同时过滤所有包含 ../ 的目录跳转序列。此外，在 .htaccess 中添加 RewriteRule 阻止对 captcha/ 目录的直接恶意请求。PHP 配置中禁用 allow_url_fopen 和 allow_url_include 可降低本地文件包含带来的后续风险。"
score = 6.8
severity = "MEDIUM"
sources = ["nuclei"]
title = "Weberr RWCards Joomla! 组件路径遍历漏洞"
updated = "2026-06-16T23:01:45.123"

