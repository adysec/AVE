[basic]
description = "微信 3.9 版本存在远程代码执行漏洞，攻击者可通过发送特制的聊天记录消息（包含路径遍历的 XML 结构），诱导目标用户点击后触发任意文件执行。漏洞原理在于微信对聊天记录中的文件路径校验不严，允许 `../../` 目录穿越，导致攻击者可构造恶意快捷方式文件实现一键 RCE。攻击条件仅需用户点击恶意消息，无需其他交互，危害严重。"
published = "0718"
remediation = "立即将微信 Windows 版升级至 3.9.10 及以上版本（当前最新版为 4.1.11），该漏洞在 3.9.10 中已通过加强对 recordinfo XML 中 cdndataurl 字段的路径合法性校验和文件名过滤得到修复。如无法立即升级，可在终端安全软件中监控 WeChat.exe 的子进程创建行为，并禁用来自聊天消息的 .bat/.lnk/.exe 文件自动下载执行功能作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "腾讯微信 3.9 远程代码执行漏洞"
updated = "0718"

