[basic]
description = "WircSrv IRC Server 5.07s 存在拒绝服务漏洞，远程攻击者无需身份认证即可向服务器端口发送超长字符串，触发缓冲区异常导致服务崩溃。该漏洞影响 WircSrv IRC Server 5.07s 及之前版本，攻击者只需能够访问目标服务器的 IRC 端口即可利用，攻击门槛低。CVSS 评分 5.0，危害等级中危。"
published = "2000-07-10T04:00:00.000"
remediation = "该产品已停止维护，建议迁移至活跃维护的 IRC 服务器（如 UnrealIRCd 6.x 或 InspIRCd 3.x）。如无法迁移，可在服务端通过反向代理或防火墙规则限制连接消息长度在 512 字节以内，并在 IRC 端口处限制单 IP 连接速率以缓解 DoS 攻击。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "WircSrv IRC Server 5.07s 远程拒绝服务漏洞"
updated = "2026-06-16T21:52:12.800"

