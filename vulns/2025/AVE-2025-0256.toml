[basic]
description = "龙采商城系统 /coupon/auditing 接口未对用户输入的 id 参数进行有效过滤和转义，攻击者可在未经认证的情况下通过 POST 请求向该接口注入恶意 SQL 语句，利用 updatexml 函数实现报错注入，从而获取数据库中的敏感信息（如数据库版本、用户凭证等）。该漏洞危害较大，可能导致商户数据泄露及后台系统被进一步渗透，建议立即对输入参数实施参数化查询。"
published = "2025-07-14"
remediation = "立即升级龙采商城系统至官方最新版本，修复 auditing 接口未对 id 参数进行过滤导致的 SQL 注入漏洞。如暂无法升级，在 WAF 或应用防火墙中配置规则，拦截包含 updatexml、extractvalue 等报错注入关键字的请求，并对 id 参数实施严格的数字类型校验，禁用字符串拼接方式构造 SQL 语句。建议开发团队对所有用户输入参数进行白名单过滤和转义处理，代码层改用参数化查询或预编译语句。"
score = 5.0
severity = "MEDIUM"
sources = ["hwpoc"]
title = "龙采商城系统 auditing 接口 SQL 注入漏洞"
updated = "2025-07-14"

