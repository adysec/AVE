description = "Joomla! 的 JA News (com_janews) 组件 1.0 版本存在目录遍历漏洞。远程攻击者无需身份认证，通过向 index.php 的 controller 参数传递包含 `../` 的恶意路径序列，即可绕过路径限制，读取服务器上的任意本地文件，导致敏感配置信息泄露。该漏洞源于对用户输入路径参数过滤不严，攻击复杂度低，危害等级中危。"
published = "2010-03-30T23:30:00.657"
