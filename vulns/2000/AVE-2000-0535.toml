[basic]
description = "KDE Kmail 邮件客户端存在缓冲区溢出漏洞，远程攻击者可通过向目标用户发送包含超长文件名的邮件附件触发该漏洞，导致 Kmail 进程崩溃并造成拒绝服务。该漏洞影响 KDE 早期版本，攻击者无需身份认证即可利用，CVSS 评分 5.0，危害等级中危。建议用户升级至修复版本或避免打开可疑邮件附件。"
published = "1999-06-01T04:00:00.000"
remediation = "建议升级 KDE 到 2.1.1 或更高版本（包含 kmail 缓冲区溢出修复），或手动应用 KDE 安全补丁 kdelibs-2.1.1-fix.patch。临时缓解：在邮件服务器层面限制附件文件名长度（如 ≤255 字符），或禁用自动预览附件功能以阻断攻击向量。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "KDE Kmail 缓冲区溢出拒绝服务漏洞"
updated = "2026-06-16T21:51:49.610"

