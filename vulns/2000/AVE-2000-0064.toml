[basic]
description = "HP-UX 操作系统自带的 aserver 程序存在权限提升漏洞。在 1999 年 6 月版本中，aserver 在执行时会调用 awk 命令，但其查找 awk 的路径来源于用户可控制的 PATH 环境变量，而非使用绝对路径。本地已登录的普通用户可通过在 PATH 环境变量中预先放置一个恶意的同名 awk 程序，诱导 aserver 以更高权限执行该伪造程序，从而实现本地权限提升，获取 root 等特权账户的控制权。该漏洞影响运行上述受影响版本 HP-UX 并安装了 aserver 组件的系统，攻击前提是攻击者需具备本地账户访问权限，利用方式简单且无需远程网络访问。"
published = "2000-01-02T05:00:00.000"
remediation = "升级 HP-UX 系统至包含安全补丁的发行版（如 HP-UX 11.x 或更高版本），并确保 aserver 程序使用预先设置的、包含完整路径的 PATH 环境变量（/usr/bin:/bin:/usr/sbin:/sbin），同时在 /etc/profile.d 目录中添加安全 PATH 配置，以防止通过 PATH 劫持获取 awk 命令的权限提升攻击。"
score = 7.2
severity = "HIGH"
sources = ["cve"]
title = "HP-UX aserver 本地权限提升漏洞"
updated = "2026-06-16T21:50:57.287"

