[info]
author = "AVE"
description = "Lotus Domino HTTP 服务器对 /cgi-bin 目录下不存在的脚本返回错误信息时泄露服务器真实物理路径。通过 GET 请求 /cgi-bin/nonexistent.cgi，检测响应中是否包含文件系统路径信息，验证路径泄露漏洞是否存在"
id = "POC-AVE-2000-0019"
name = "Lotus Domino HTTP /cgi-bin 路径泄露验证"
severity = "medium"
tags = [
    "cve-2000-0021",
    "lotus-domino",
    "path-disclosure",
]
vuln_id = [
    "CVE-2000-0021",
    "AVE-2000-0019",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/cgi-bin/nonexistent.cgi"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "cgi-bin",
    "cannot execute",
    "not found",
    "path",
]
