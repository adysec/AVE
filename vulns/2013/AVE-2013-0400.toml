[basic]
description = "Microsoft Internet Explorer 6至11版本的mshtml.dll中CDisplayPointer类存在释放后使用（Use-After-Free）漏洞。远程攻击者可通过构造特制JavaScript代码，利用onpropertychange事件处理程序触发内存破坏，成功利用此漏洞可在当前用户上下文中执行任意代码或导致拒绝服务。该漏洞在2013年9月至10月期间已被野外利用，影响范围广泛。Microsoft已通过安全公告MS13-080发布修复补丁。"
published = "2013-10-09T14:54:25.747"
remediation = "安装 Microsoft 2013 年 10 月安全更新 MS13-080 (KB2879017)，该补丁修复了 IE 中 CDisplayPointer 类的释放后重用漏洞。如无法立即安装补丁，可启用 Enhanced Mitigation Experience Toolkit (EMET) 并配置 IE 为受保护应用程序，或使用组策略禁用 Active Scripting 作为临时缓解措施。"
score = 8.8
severity = "HIGH"
sources = ["kev"]
title = "Microsoft Internet Explorer CDisplayPointer 内存释放后使用漏洞"
updated = "2026-06-16T23:55:58.860"

