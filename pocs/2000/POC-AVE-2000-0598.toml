[info]
author = "AVE"
description = "检测 IRIX 6.x 系统中 xfs 文件系统 truncate 函数权限检查缺失漏洞，本地低权限用户可通过 truncate 系统调用清空任意文件内容"
id = "POC-AVE-2000-0598"
name = "CVE-2000-0798 PoC"
severity = "critical"
tags = ["cve-2000-0798"]
vuln_id = [
    "CVE-2000-0798",
    "AVE-2000-0598",
]

[poc]
logic = "all"

[[poc.requests]]
path = "/etc/passwd"
protocol = "file"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["root:"]
