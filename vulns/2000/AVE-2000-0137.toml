[basic]
description = 'Microsoft Personal Web Server (PWS) 存在远程目录遍历漏洞，属于路径穿越类安全缺陷。攻击者无需身份认证，通过向目标服务器发送包含多个 ".."（点点）序列的特制 HTTP 请求，即可突破路径限制，读取服务器上任意可读文件，包括系统配置文件、源代码等敏感信息。该漏洞影响 Microsoft Personal Web Server 多个版本，危害等级中等，微软已在 MS99-010 安全公告中发布修复补丁。'
published = "1999-03-26T05:00:00.000"
remediation = "立即安装 Microsoft 安全公告 MS99-010 提供的补丁程序，或升级至 Internet Information Server (IIS) 4.0 及以上版本。如无法升级，可在 Web 服务器配置中禁用父路径（Parent Paths）功能，并限制网站根目录外的文件访问权限。由于 Personal Web Server 已停止支持，建议迁移至受支持的 Web 服务器产品。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Microsoft Personal Web Server 远程目录遍历漏洞"
updated = "2026-06-16T21:51:06.647"

