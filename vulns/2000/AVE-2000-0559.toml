[basic]
description = "Netscape Communicator 未能正确限制不可信 Java applet 创建 ServerSocket 对象，导致远程攻击者可通过诱导用户访问恶意网页触发恶意 applet，在受害者系统上创建任意监听端口，从而建立后门实现远程控制。该漏洞影响 Sun JDK/JRE 1.1.x 及 Netscape Communicator 浏览器，典型利用方式为 Brown Orifice 攻击。"
published = "2000-10-20T04:00:00.000"
remediation = "升级至 JDK 1.2 或更高版本，该版本引入标准安全管理器 SecurityManager，默认禁止不可信 applet 创建 ServerSocket。如无法升级，在浏览器中禁用 Java applet 支持，或通过防火墙限制出站异常连接。使用 Netscape Communicator 的用户建议升级至 4.74 以上版本或切换至其他浏览器。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "Netscape Communicator 恶意 Applet 服务器套接字漏洞"
updated = "2026-06-16T21:52:19.250"

