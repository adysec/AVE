[basic]
description = "SunOS 4.1.4 系统（运行于 Sparc 20 工作站）的 TCX 帧缓冲设备驱动中存在拒绝服务漏洞。本地攻击者通过读取 /dev/tcx0 设备文件即可触发内核恐慌（kernel panic），导致系统崩溃。该漏洞无需特殊权限即可利用，攻击者仅需具备本地访问权限即可造成系统不可用。受影响系统为 SunOS 4.1.4 及可能更早版本。"
published = "1997-05-19T04:00:00.000"
remediation = "SunOS 4.1.4 已停止维护，无官方补丁。若系统未使用 TCX 帧缓冲硬件，直接删除 /dev/tcx0 设备文件（rm /dev/tcx0）即可根除风险；如需保留设备，将文件权限修改为仅 root 可读写（chmod 600 /dev/tcx0），阻止普通用户读取触发内核崩溃。长期建议升级至 Solaris 7 或更高版本操作系统。"
score = 2.1
severity = "LOW"
sources = ["avd"]
title = "Sun SunOS 4.1.4 本地拒绝服务漏洞"
updated = "2026-06-16T21:50:27.857"

