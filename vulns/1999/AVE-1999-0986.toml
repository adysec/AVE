[basic]
description = "该漏洞并非具体的代码缺陷，而是指运行于 Windows 系统的关键程序、共享库或服务未安装相应的安全补丁、热修复（hotfix）或服务包（service pack），或所使用版本过旧。攻击者可通过探测目标主机已安装的补丁与服务包级别，识别尚未修复的组件，进而利用这些组件中已知的公开漏洞获取系统权限或执行任意代码。其攻击条件为攻击者能够访问目标系统并具备补丁状态探测能力，通常借助网络扫描或服务包注册表检测实现。"
published = "1999-01-01T05:00:00.000"
remediation = "应立即通过 Windows Update 或 WSUS 将系统及所有关键程序、共享库安装至厂商发布的最新安全补丁与服务包级别；对无法自动更新的第三方组件，须手动下载并安装官方发布的最新版本与安全更新；同时启用自动更新策略，定期审计主机已安装的补丁状态，关闭不必要的服务与端口以缩小攻击面。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "Windows 系统关键程序或库未安装安全补丁或服务包"
updated = "2026-07-17T00:00:00Z"

