[basic]
description = "GoodTech Telnet Server NT 2.2.1 版本存在一个严重的缓冲区溢出安全漏洞。当远程攻击者向服务器发送包含超长登录名的 Telnet 报文时，会导致 Telnet 服务的内部缓冲区溢出，进而触发服务异常并导致完全拒绝服务。该漏洞无需任何身份验证即可远程触发，攻击者只需向目标端口发送一个包含数千字节数据的登录名字符串即可完成攻击。该漏洞主要影响 GoodTech Telnet Server NT 2.2.1 版本，CVSS 安全评分为 5.0，属于中等严重程度。该漏洞利用的是 Telnet 服务器在处理用户输入时对缓冲区长度控制不足的问题，通过精心构造的恶意数据包可以轻松导致服务不可用。虽然目前没有详细的利用代码泄露，但根据漏洞原理和 ExploitDB 中的相关报告，该漏洞具有可利用的危险性。用户的匿名登录功能成为攻击者的主要攻击入口点，导致整个服务完全不可用。"
published = "1999-12-06T05:00:00.000"
remediation = "立即升级到 GoodTech Telnet Server NT 3.0 或更高版本，应用官方安全补丁，启用登录名长度限制并配置 telnet 服务仅在内部网络可见。如需即时缓解，请将 telnet 端口绑定到本地回环接口或部署 iptables 拒绝外部访问 telnet 端口。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "GoodTech Telnet Server NT 缓冲区溢出拒绝服务漏洞"
updated = "2026-06-16T21:49:28.577"

