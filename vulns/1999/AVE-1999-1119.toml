[basic]
description = "Cisco IOS 11.1 至 11.3 版本在启用分布式快速交换（DFS）功能时存在访问控制列表绕过漏洞。当路由器将流量从启用了 DFS 的输入接口转发至具有逻辑子接口的输出接口时，远程攻击者可利用该缺陷绕过 ACL 规则，导致未授权网络访问。该漏洞影响大量 Cisco 路由器设备，CVSS 评分 7.5，危害等级高。Cisco 已发布相关修复建议。"
published = "1999-12-31T05:00:00.000"
remediation = "升级 Cisco IOS 至 11.3(6) 或更高版本以修复此漏洞，或禁用分布式快速交换（DFS）功能：在接口配置模式下执行 `no ip route-cache distributed`。无法升级时，避免在 DFS 启用接口和逻辑子接口间路由流量以缓解风险。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "Cisco IOS 分布式快速交换访问控制列表安全绕过漏洞"
updated = "2026-06-16T21:50:29.897"

