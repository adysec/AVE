[basic]
description = "Red Hat Linux 6.1 及之前版本中 rlogin 的 PAM 配置文件存在安全策略绕过漏洞。由于 PAM 规则顺序不当，一条限制较宽松的规则被放在了限制更严格的规则之前，导致即使管理员通过 /etc/nologin 文件明确禁用了 rlogin 服务，攻击者仍可利用该配置缺陷绕过访问控制，在未经授权的情况下通过 rlogin 远程登录目标系统。该漏洞影响 Red Hat Linux 6.1 及更早版本，CVSS 评分 7.5，危害等级高。"
published = "1999-10-07T04:00:00.000"
remediation = "将 `/etc/pam.d/rlogin` 中的 `pam_nologin.so` 规则移至所有认证规则之前（或删除重复的冗余规则），确保 `/etc/nologin` 限制优先于其他宽松规则被检查。同时建议升级 Red Hat Linux 至 6.2 或更高版本，或在 `hosts.deny` 中禁止 rlogin 服务并改用 SSH 替代。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "Red Hat Linux 6.1 PAM rlogin 配置安全绕过漏洞"
updated = "2026-06-16T21:50:14.690"

