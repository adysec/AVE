[basic]
description = "BSDi Symmetric Multiprocessing (SMP) 系统存在拒绝服务漏洞。当系统处于高 CPU 负载状态时，本地攻击者可通过调用 fstat 系统函数触发该漏洞，导致系统拒绝服务。该漏洞影响 BSDi SMP 版本，CVSS 评分 2.1，危害等级低。攻击者需要具有本地访问权限且系统处于高负载状态才能利用此漏洞。"
published = "1999-08-18T04:00:00.000"
remediation = "升级到 BSDi 的 SMP 补丁版本（如 BSD/OS 4.0.1 或更高），该版本已修复高 CPU 负载下 fstat 调用导致的拒绝服务问题。由于 BSDi 操作系统已停止维护，建议迁移至受支持的现代操作系统（如 FreeBSD 或 Linux）以获取持续安全更新。"
score = 2.1
severity = "LOW"
sources = ["avd"]
title = "BSDi Symmetric Multiprocessing 拒绝服务漏洞"
