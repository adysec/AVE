[basic]
description = "Allaire ColdFusion Server 4.5.1及更早版本（含2.0、3.x、4.x）的ColdFusion Administrator administrator登录界面存在输入验证不足缺陷，未经身份认证的远程攻击者可通过向管理登录页面提交超长登录密码触发服务拒绝（DoS）。当ColdFusion Administrator处理过长的密码字段时，应用程序因未对输入长度进行有效边界检查而导致服务异常或崩溃，进而使合法管理员无法正常登录执行管理操作。该漏洞影响所有部署受影响版本ColdFusion Server的站点，攻击者无需任何凭据即可从远程发起利用，利用方式为向登录接口发送包含超长密码字段的特制HTTP请求。Allaire公司已发布安全公告及补丁修复该漏洞，建议管理员升级至修复版本或应用官方补丁。"
published = "2000-06-07T04:00:00.000"
remediation = "升级至 ColdFusion 5.0 或更高版本，该版本已修复由超长登录密码导致的管理员界面拒绝服务漏洞。如暂无法升级，应通过防火墙或反向代理限制 ColdFusion Administrator（/CFIDE/administrator）仅允许可信 IP 访问，并在 Web 服务器或 WAF 层配置规则拒绝包含超过 72 个字符密码字段的 POST 请求，同时启用管理员账户锁定策略以降低服务停止影响。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Allaire ColdFusion 管理后台登录密码拒绝服务漏洞"
updated = "2026-06-16T21:51:57.143"

