[basic]
description = "东胜物流软件 WorkFlowGridSource.aspx 页面存在 SQL 注入漏洞，攻击者可通过向该页面提交恶意构造的 SQL 查询参数，绕过认证直接操作后端数据库，导致敏感数据泄露甚至服务器被控。由于接口未对用户输入进行有效的过滤与参数化处理，攻击者无需登录即可利用，危害较大。"
published = "0719"
remediation = """建议联系东胜物流官方获取最新安全补丁，升级至修复 SQL 注入漏洞的最新版本。如无法立即升级，对 WorkFlowGridSource.aspx 页面实施输入参数过滤，禁止传入特殊 SQL 字符（如 '、"、--、;），并在 Web 应用防火墙（WAF）侧添加 SQL 注入拦截规则作为临时缓解措施。"""
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "东胜物流软件SQL注入漏洞"
updated = "0719"

