[info]
author = "ave"
description = "通过构造恶意 Java Applet 页面，利用 JAX-WS 组件中的 AverageRangeStatisticImpl 类绕过 Java 沙箱限制，在目标系统上执行任意代码。影响 Oracle Java SE 7 Update 7 及更早版本。"
id = "POC-AVE-2012-0306"
name = "Oracle Java SE JAX-WS 远程代码执行漏洞 PoC"
severity = "critical"
tags = ["ave-2012-0306"]
vuln_id = [
    "CVE-2012-5076",
    "AVE-2012-0306",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/"
protocol = "http"

[poc.requests.body]
content = ""
type = "raw"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["AverageRangeStatisticImpl"]
