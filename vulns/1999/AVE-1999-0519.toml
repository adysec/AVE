[basic]
description = "Solaris 2.6 动态链接器存在文件创建漏洞，本地攻击者可通过设置 LD_PROFILE 环境变量并结合符号链接攻击，利用动态链接器的权限创建任意文件。该漏洞允许低权限用户以提升的权限在系统任意位置写入文件，可能导致权限提升或系统破坏。攻击需要本地用户身份且对系统有基本访问权限，CVSS 评分 4.6，危害等级中危。"
published = "1999-09-22T04:00:00.000"
remediation = "在 /etc/ld.so.conf 中注释掉 LD_PROFILE 设置，修改 /etc/profile 文件限制 LD_DEBUG 使用，并设置安全环境变量 LD_DEBUG=0 用于限制动态链接器功能。"
score = 4.6
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Sun Solaris 动态链接器 LD_PROFILE 符号链接攻击漏洞"
updated = "2026-06-16T21:49:03.317"

