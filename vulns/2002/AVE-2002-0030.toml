[basic]
description = "xinetd 2.3.4 版本中存在文件描述符泄露漏洞，当 xinetd 启动子服务时，信号管道的文件描述符未正确关闭，导致被子服务继承。本地攻击者可通过操作继承的文件描述符向信号管道写入数据，触发 xinetd 进程异常行为，最终造成拒绝服务。该漏洞影响使用 xinetd 超级守护进程的各类 Unix/Linux 系统，攻击者需拥有本地访问权限，CVSS 评分 2.1，危害等级低。"
published = "2002-09-05T04:00:00.000"
remediation = "升级 xinetd 至 2.3.5 或更高版本，该版本已修复信号管道文件描述符泄漏问题。如无法升级，可在 xinetd 配置中禁用不必要的服务，并通过 iptables 限制对受影响服务的访问以降低风险。"
score = 2.1
severity = "LOW"
sources = ["osv"]
title = "Xinetd xinetd 信号管道文件描述符泄露拒绝服务漏洞"
updated = "2026-06-16T21:58:18.137"

