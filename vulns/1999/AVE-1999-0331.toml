[basic]
description = "KDE 桌面环境的 klock 屏幕锁定程序存在输入验证缺陷，本地攻击者可通过向该程序提交特制格式错误的输入数据绕过屏幕锁定验证机制，无需输入正确密码即可解锁当前用户会话，获取未授权的系统访问权限。该漏洞影响 KDE 1.x 及更早版本，CVSS 评分 4.6，危害等级中危。利用条件为攻击者需具备目标系统的本地访问权限。"
published = "1999-06-23T04:00:00.000"
remediation = "升级至 KDE 1.1.2 及以上版本（1999年8月发布）即可修复该漏洞。该版本在 kscreensaver 的密码验证流程中增加了 timer.stop() 调用，消除了密码输入与对话框销毁之间的竞态条件，防止恶意格式输入绕过锁屏。如无法升级，作为临时缓解措施可禁用 klock 锁屏程序，改用第三方屏幕锁定工具替代。"
score = 4.6
severity = "MEDIUM"
sources = ["avd"]
title = "KDE klock 程序会话锁定绕过漏洞"
updated = "2026-06-16T21:48:56.367"

