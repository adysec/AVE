[basic]
description = "Joomla! 的 VJDEO 组件（com_vjdeo）1.0 及 1.0.1 版本存在目录遍历漏洞。远程攻击者可通过向 index.php 的 controller 参数传递包含 `..`（点点）的恶意路径，绕过目录限制读取服务器上的任意文件。该漏洞源于未对用户输入的路径参数进行充分过滤，可导致敏感信息泄露，进而为后续攻击提供铺垫。CVSS 评分 5.0，危害等级中等。"
published = "2010-04-12T18:30:01.053"
remediation = "该漏洞源于 Joomla! 第三方组件 VJDEO (com_vjdeo) 1.0/1.0.1，官方已不再维护，无安全更新可用。建议立即在 Joomla! 后台扩展管理中卸载/禁用 VJDEO 组件；若业务必须使用，需在 Web 应用防火墙 (WAF) 侧添加规则拦截 controller 参数中的 `../` 及空字节编码绕过，同时确保 `allow_url_fopen` 与 `allow_url_include` 处于关闭状态。"
score = 5
severity = "MEDIUM"
sources = ["nuclei"]
title = "Joomla! VJDEO 组件 1.0 本地文件包含漏洞"
updated = "2026-06-16T23:18:11.640"

