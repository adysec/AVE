[basic]
description = "SSH 客户端默认配置启用了 X11 转发功能，当用户使用 SSH 连接到攻击者控制的恶意服务器时，服务器端可通过恶意的 xauth 程序劫持客户端的 X11 会话，进而捕获键盘输入、窃取屏幕内容或执行任意 X 窗口操作。攻击条件简单，仅需诱导受害者连接至恶意 SSH 服务器即可触发。"
published = "2000-02-24T05:00:00.000"
remediation = "修改 SSH 客户端配置文件 `~/.ssh/config` 或系统级 `/etc/ssh/ssh_config`，将 `ForwardX11` 设为 `no` 以禁用 X11 转发；同时升级 OpenSSH 到 4.0 以上版本（该版本默认已关闭 X11 转发），并确保 `xauth` 程序位于可信路径且权限为 755。"
score = 5.1
severity = "MEDIUM"
sources = ["avd"]
title = "OpenSSH X11 转发会话劫持漏洞"
updated = "2026-06-16T21:51:14.860"

