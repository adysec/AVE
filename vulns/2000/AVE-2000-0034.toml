[basic]
description = "Microsoft Outlook Express 5 for Macintosh 在处理 HTML 格式电子邮件时存在安全缺陷，当收件人打开包含附件的 HTML 邮件时，应用程序会在未经用户任何确认或提示的情况下，自动将邮件附件下载并保存到本地系统中。该漏洞影响运行于 Macintosh 平台的 Outlook Express 5 版本，攻击条件为攻击者只需向目标用户发送一封精心构造的 HTML 邮件即可，无需用户主动点击或执行任何操作。利用方式上，攻击者可借此在用户无感知的情况下将恶意文件投递至本地，为后续社会工程学攻击或恶意代码执行创造前提条件，构成隐私泄露与潜在的安全风险。"
published = "1999-12-22T05:00:00.000"
remediation = "安装 Microsoft 安全公告 MS99-060 发布的补丁程序，或升级到 Internet Explorer 5.0 for Macintosh 及更高版本以消除此漏洞。如无法立即安装补丁，可在 Outlook Express 中禁用 HTML 邮件预览功能，改为纯文本阅读模式，以阻止邮件附件自动下载。注意该产品已停止支持，建议迁移至现代邮件客户端。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Microsoft Outlook Express 5 for Macintosh HTML 邮件附件自动下载漏洞"
updated = "2026-06-16T21:50:52.150"

