[basic]
description = "金和协同管理平台 C6 版本的 DelTemp.aspx 页面存在 XML 外部实体注入（XXE）漏洞。未经身份认证的远程攻击者可通过向目标系统发送特制的 XML 请求，利用外部实体引用机制读取服务器上的任意敏感文件（如配置文件、系统文件等），导致信息泄露。该漏洞影响金和 OA C6 系列版本，CVSS 评分 5.5，危害等级中危。目前漏洞利用细节已公开，建议用户及时升级或采取访问控制措施。"
published = "2025-07-13T07:15:22.320"
remediation = "立即联系金和厂商获取 C6 安全补丁包；临时缓解措施：在应用服务器 XML 解析器中禁用外部实体解析（设置 libxml_disable_entity_loader(true) 或禁用 DTD），在 WAF 层拦截 POST 请求中包含 `<!ENTITY`、`<!DOCTYPE` 等 XXE 特征 payload 的请求，并对 `/c6/Jhsoft.Web.message/ToolBar/DelTemp.aspx` 路径实施 IP 白名单访问控制。"
score = 5.5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "金和 OA C6 DelTemp.aspx XML外部实体注入致任意文件读取漏洞"
updated = "2026-06-17T10:05:08.377"

