[basic]
description = "NetBSD 1.3.3 及 Linux 系统中的 traceroute 工具存在源地址伪造漏洞，本地低权限用户可通过修改数据包的源地址字段发起欺骗攻击。攻击者利用该漏洞可伪造 IP 源地址，绕过基于地址的访问控制策略，或将他人的攻击流量嫁祸到其他用户。该漏洞影响 NetBSD 1.3.3 及部分 Linux 发行版，CVSS 评分 5.0，危害等级中危。建议用户升级 traceroute 或应用厂商发布的安全补丁。"
published = "2001-03-12T05:00:00.000"
remediation = "升级到 NetBSD-current 19990217 之后的版本，或应用官方补丁 ftp://ftp.NetBSD.ORG/pub/NetBSD/misc/security/patches/19990217-traceroute。如无法立即升级，可临时执行 chmod u-s /usr/sbin/traceroute 移除 setuid 位，禁止普通用户运行 traceroute，防止源地址伪造和包泛洪攻击。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "NetBSD traceroute 本地源地址欺骗漏洞"
updated = "2026-06-16T21:51:27.607"

