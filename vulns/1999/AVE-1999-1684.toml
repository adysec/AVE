[basic]
description = "Linux Kernel 2.0.33 及更早版本中的 IPChains 防火墙组件存在 IP 分片重叠绕过漏洞。由于 IPChains 在检查数据包头信息前未对 IP 分片进行重组，远程攻击者可通过发送多个偏移量为 0 的恶意 IP 分片包，绕过防火墙过滤规则，从而访问本应被阻止的网络资源。该漏洞影响 Linux Kernel 2.2.10 及更早版本，CVSS 评分 7.5，危害等级高。"
published = "1999-07-27T04:00:00.000"
remediation = "升级 Linux 内核至 2.2.11 或更高版本，该版本已修复 IP 分片重组前检查头信息的问题。如无法升级内核，可在防火墙规则中添加 `-f` 标志强制检查分片包，或使用 iptables 替代 ipchains 并启用连接跟踪模块 (`ip_conntrack`) 以正确重组分片。"
score = 7.5
severity = "HIGH"
sources = ["exploitdb"]
title = "Linux Kernel IPChains IP分片过滤绕过漏洞"
updated = "2026-06-16T21:49:31.960"

