[basic]
description = "IBM DB2 Universal Database 6.1 存在默认口令漏洞，安装过程中会自动创建具有已知默认用户名和密码的数据库账户。远程攻击者可利用该默认账户直接登录数据库系统，无需身份认证即可获取数据库的完全控制权限，导致敏感数据泄露、数据篡改或服务中断。该漏洞影响 Linux 及 Windows NT 平台上的 IBM DB2 Universal Database 6.1 版本，危害等级高。"
published = "2001-02-16T05:00:00.000"
remediation = "立即修改 DB2 默认账户（如 db2admin/db2admin）的密码为强密码，或删除不必要的默认账户；升级至 IBM DB2 V7 及以上版本，新版本已移除默认账户机制。同时限制数据库监听端口（默认 50000）仅对可信 IP 开放，并在防火墙层面对数据库端口实施访问控制白名单。"
score = 7.5
severity = "HIGH"
sources = ["exploitdb"]
title = "IBM DB2 Universal Database 默认密码漏洞"
updated = "2026-06-16T21:53:33.807"

