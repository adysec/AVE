[basic]
description = "ProFTPd 1.2.x（包括 1.2.8 及 1.2.10 版本）存在用户枚举漏洞。由于服务器在处理有效用户名和无效用户名的登录请求时响应时间存在差异，未经认证的远程攻击者可通过计时攻击逐一向服务器发送登录请求并测量响应延迟，从而枚举出系统上的有效用户账户。该漏洞虽不直接导致代码执行，但可为后续暴力破解或针对性攻击提供信息基础，影响运行 ProFTPd 1.2.x 的所有 Linux/Unix 系统。"
published = "2004-10-15T04:00:00.000"
remediation = "升级 ProFTPD 至 1.3.0 或更高版本（当前最新为 1.3.10），该版本统一了 USER 命令对有效和无效用户的响应时间，消除时序侧信道。若无法升级，可在防火墙限制 FTP 端口仅允许可信 IP 访问，并配置 MaxLoginAttempts 限制暴力枚举。"
score = 5
severity = "MEDIUM"
sources = ["nuclei"]
title = "ProFTPD 1.2.x 远程用户枚举漏洞"
updated = "2026-06-16T22:08:01.587"

