[info]
author = "ave"
description = "向目标 DNS 服务器发送标准 A 记录查询，验证 DNS 服务是否正常运行。若服务响应则说明目标运行 DNS 服务，存在被利用进行拒绝服务攻击的风险（CVE-1999-0275）。"
id = "POC-AVE-1999-0461"
name = "Windows NT DNS Server Character Saturation DoS PoC"
severity = "medium"
tags = ["ave-1999-0461"]
vuln_id = [
    "CVE-1999-0275",
    "AVE-1999-0461",
]

[poc]
logic = "any"

[[poc.requests]]
dns_type = "A"
path = "{{Hostname}}"
protocol = "dns"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["IN"]
