[basic]
description = "Linux NFS 服务器存在缓冲区溢出漏洞，攻击者可通过发送过长的路径名参数触发缓冲区溢出，进而在目标系统上执行任意代码。该漏洞影响运行 NFS 服务的 Linux 系统，无需身份认证即可远程利用，CVSS 评分 10.0，危害等级严重。成功利用可导致系统完全沦陷，攻击者可获取 root 权限并完全控制受影响主机。"
published = "1999-11-09T05:00:00.000"
remediation = "升级到修复了该 NFS 服务器缓冲区溢出漏洞的 Linux 内核版本（建议 2.2.13 及以上，或安装各发行商 1999 年发布的内核安全更新，如 Red Hat、Debian 对应补丁包）。如无法立即升级，可在防火墙或 TCP Wrapper 中限制对 2049 端口（NFS）的访问，仅允许可信内网主机连接，并临时停用 NFS 服务作为缓解措施。"
score = 10
severity = "CRITICAL"
