[basic]
description = "GNOME esound 0.2.19 及更早版本在创建 Unix 域套接字时存在竞争条件漏洞。本地攻击者可通过符号链接攻击，在 esound 创建套接字的过程中替换目标文件，从而修改任意文件或目录的权限，实现本地权限提升。攻击需要本地用户身份且利用条件较为复杂，但成功利用后可获取额外系统权限，影响系统安全性。"
published = "2000-11-14T05:00:00.000"
remediation = "升级 GNOME esound 至 0.2.20 或更高版本，该版本修复了 Unix 域套接字创建中的竞争条件问题。如无法升级，可删除 esound 的 setuid 位（chmod u-s /usr/bin/esd）并限制仅受信任用户可访问音频设备，以降低 symlink 提权攻击风险。各发行版对应公告：Debian DSA-20001008、RedHat RHSA-2000-077、SuSE 安全公告。"
score = 6.2
severity = "MEDIUM"
sources = ["redhat"]
title = "GNOME esound Unix 域套接字竞争条件漏洞"
updated = "2026-06-16T21:52:37.687"

