[basic]
description = "Sawtooth Software 旗下的 Lighthouse Studio 市场调查平台存在远程代码执行漏洞，攻击者可利用该漏洞在目标服务器上执行任意代码。该漏洞影响 Lighthouse Studio 的某些处理模块，攻击者通过向受影响的服务端发送特制的恶意请求即可触发，无需身份认证即可实施攻击。漏洞 CVSS 评分高，影响系统的机密性、完整性和可用性，具体技术细节尚未公开披露。"
published = "0718"
remediation = "立即升级 Sawtooth Software Lighthouse Studio 至 9.16.14 或更高版本（2025 年 7 月 9 日发布）。升级后须重新生成并重新部署所有调查问卷的 ciwweb.pl CGI 脚本（该软件无自动更新机制，旧版脚本仍可被攻击）。此漏洞无需认证，攻击者通过构造含 [% CODE %] 模板注入的 HTTP 请求即可实现远程代码执行，CVSS 4.0 评分 10.0（严重）。如无法立即升级，应立即在 Web 服务器层面阻止对 ciwweb.pl 脚本的外部访问作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "SawtoothSoftware Lighthouse Studio 远程代码执行漏洞"
updated = "0718"

