[basic]
description = "Digital Creations Zope 2.3.1 b1 及更早版本存在访问控制缺陷，拥有通过 Web 方式脚本编写权限的本地 Zope 用户可利用 ZClasses 类属性修改功能，篡改类属性导致数据完整性破坏。该漏洞影响 Zope 2.3.1 b1 及更早版本，攻击者需具备本地 Zope 用户权限且拥有通过 Web 进行脚本编写的能力，通过 Web 管理界面修改 ZClasses 类属性实施攻击，CVSS 2.1 评分（本地访问/低复杂度/无需认证/无机密性影响/部分完整性影响/无可用性影响），属于低危本地权限提升/完整性破坏漏洞。"
published = "2001-08-22T04:00:00.000"
remediation = "升级Zope到支持安全更新的最新版本（至少2.3.1 b2或更高版本），并确保限制用户通过the-web脚本修改class属性的权限。可通过设置适当权限模型，限制对类属性的修改，或者在外部部署安全补丁更新。要立即进行缓解的紧急情况下，可以通过配置文件禁用Zope特权User密码验证，并在升级前使用安全策略禁止对ZClass的未授权修改。"
score = 2.1
severity = "LOW"
sources = ["redhat"]
title = "Digital Creations Zope ZClasses 类属性修改漏洞"
updated = "2026-06-16T21:54:33.063"

