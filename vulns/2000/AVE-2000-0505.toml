[basic]
description = "Microsoft Outlook Express 5 存在持久化邮件浏览器链接漏洞，远程攻击者可通过向用户发送特制的 HTML 邮件或诱导访问恶意网页，利用 JavaScript 建立与 Outlook Express 窗口的持久化浏览器链接，从而未经授权监视用户的电子邮件内容及操作。该漏洞源于 Outlook Express 未正确限制浏览器对邮件客户端的跨窗口访问，攻击者不需要身份认证即可远程利用。"
published = "2000-07-20T04:00:00.000"
remediation = "安装 Microsoft 安全公告 MS00-046 提供的 Outlook Express 5 安全更新。如无法安装补丁，建议升级至 Outlook Express 5.5 或更高版本，同时配置 Outlook Express 以纯文本格式阅读邮件并禁用 ActiveX 脚本执行。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Microsoft Outlook Express 5 持久邮件浏览器链接漏洞"
updated = "2026-06-16T21:52:11.760"

