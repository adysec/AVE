[basic]
description = "SCO UnixWare 7.1.0 操作系统的 Passthru 驱动程序中存在安全漏洞，本地攻击者可通过向受影响系统发送特制的请求触发该驱动程序的异常处理错误，导致系统内核崩溃或服务不可用，造成拒绝服务。该漏洞影响 SCO UnixWare 7.1.0 版本，CVSS 评分 5.0，危害等级中等。攻击者需具有本地系统访问权限才能利用此漏洞。"
published = "2001-03-12T05:00:00.000"
remediation = "从 SCO 官方 FTP 获取并安装安全公告 SB-99.13a 提供的补丁，或联系 SCO 获取修补后的 passthru 驱动。由于 SCO UnixWare 7.1.0 已停止支持多年，建议迁移至受支持的操作系统（如现代 Linux 发行版）以彻底消除安全隐患。临时缓解措施可在系统层面限制对 passthru 驱动的访问权限。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "SCO UnixWare 7.1.0 Passthru Driver 拒绝服务漏洞"
updated = "2026-06-16T21:51:31.923"

