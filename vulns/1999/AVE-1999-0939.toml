[basic]
description = "RPC portmapper 服务运行在目标系统的 111/TCP 和 111/UDP 端口上，远程攻击者无需身份认证即可通过向该服务发送请求，枚举目标主机上注册的所有 RPC 程序及其对应的端口号、版本号等信息。该漏洞可导致敏感信息泄露，攻击者可利用收集到的 RPC 服务信息进一步定位其他高危服务（如 NFS、NIS 等）并实施针对性攻击。影响范围涵盖所有运行 RPC portmapper 服务的 Unix/Linux 系统及网络设备。"
published = "1999-01-01T05:00:00.000"
remediation = "在防火墙或边界设备上禁用 TCP/UDP 135 端口（RPC 端口映射器）及 137-139、445 等 SMB/RPC 相关端口的入站访问，仅允许受信任内网主机连接；通过组策略关闭不必要的 RPC 服务并将 Portmapper 绑定限制为 localhost；安装微软对应安全更新补丁，启用 Windows Firewall 默认阻止规则以降低被未授权主机枚举和利用的风险。"
score = 7.3
severity = "HIGH"
sources = ["epss"]
