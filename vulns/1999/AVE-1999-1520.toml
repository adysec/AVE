[basic]
description = "CGI City 开发的 CC Whois 1.0 中的 whois.cgi 程序存在命令注入漏洞。远程攻击者无需身份认证即可通过在 domain 参数中注入 shell 元字符（如分号、管道符等）来执行任意系统命令。该漏洞影响 CC Whois 1.0 版本，攻击者利用此漏洞可完全控制目标服务器，获取敏感信息或进行进一步渗透。CVSS 评分 7.5，危害等级高。"
published = "1999-11-09T05:00:00.000"
remediation = "立即删除或禁用 whois.cgi 脚本，该 CGI 程序已停止维护且无安全补丁。如业务需要 Whois 查询功能，改用现代安全的替代方案（如 phpWhois 库），并对所有用户输入执行严格的 shell 元字符过滤（如过滤 `;&|` 等字符）。同时确保 Web 服务器不以 root 权限运行 CGI 程序，降低命令执行影响。作为临时缓解措施，可在 Web 服务器配置中限制对 whois.cgi 的访问（如仅允许特定 IP 或添加认证）。"
score = 7.5
severity = "HIGH"
sources = ["exploitdb"]
title = "CGI City CC Whois 1.0 远程命令执行漏洞"
updated = "2026-06-16T21:49:27.850"

