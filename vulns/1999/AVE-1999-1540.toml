[basic]
description = "IBM AIX 4.1 至 4.3 版本中的性能数据收集工具 sadc 在通过 timex 等程序调用时存在符号链接攻击漏洞。由于 sadc 以 setgid adm 权限运行，本地攻击者可利用此缺陷创建恶意符号链接指向系统任意文件，从而覆盖目标文件内容，实现权限提升或破坏系统关键文件。该漏洞需本地访问权限，攻击复杂度低。"
published = "1998-02-25"
remediation = "升级至 AIX 4.3.3 及以上版本（该版本已修复 sadc 的 setgid 竞争条件漏洞），或安装 IBM APAR IX87942。如无法升级，以 root 身份执行 `chmod 644 /usr/bin/sadc && chmod 644 /usr/bin/timex` 移除 setgid adm 权限位，阻断 symlink 覆盖任意文件的攻击路径。临时缓解措施可移除 /usr/bin/timex 的 sgid 位：`chmod g-s /usr/bin/timex`。"
score = 1.2
severity = "LOW"
sources = [
    "cve",
    "avd",
]
title = "IBM AIX sadc 本地任意文件写入漏洞"
updated = "2026-06-16"

