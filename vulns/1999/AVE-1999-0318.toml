[basic]
description = "Microsoft Windows 3.11/95/NT 3.5.1/NT 4.0 的 TCP/IP 协议栈在处理带外（OOB）数据时存在拒绝服务漏洞，又称 WinNuke。远程攻击者无需身份认证，向目标 TCP 139 端口（NetBIOS）发送设置了 URGENT 标志的恶意数据包，当 URGENT POINTER 指向帧末尾且无正常数据跟随，Windows 内核无法正确处理此异常情况，导致系统蓝屏崩溃（BSOD），需重启恢复。该漏洞影响 Windows 3.11、Windows 95、Windows NT 3.5.1 及 Windows NT 4.0 等广泛使用的版本。"
published = "1997-07-01"
remediation = "在边界防火墙或网络设备上阻断入站 TCP 端口 139（NetBIOS Session）和 445（SMB），阻止外部攻击。若无业务需求，在网卡高级设置中禁用 NetBIOS over TCP/IP。对于 Windows NT 4.0，可安装微软官方补丁（MS97-003）缓解此漏洞。受影响的 Windows 版本已全部停止安全更新，建议升级到受支持的现代 Windows 版本。"
score = 5.0
severity = "MEDIUM"
sources = [
    "cve",
    "nvd",
]
title = "Microsoft Windows NetBIOS OOB 数据包拒绝服务漏洞"
updated = "1997-07-01"

