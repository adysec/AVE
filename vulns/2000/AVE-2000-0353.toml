[basic]
description = "Cart32 3.0 存在信息泄露漏洞，远程攻击者可通过在 URL 请求后附加 /expdate 路径，无需任何认证即可访问敏感调试信息。该漏洞可能导致攻击者获取系统配置、用户数据等敏感内容，为进一步攻击提供信息支撑。漏洞影响 Cart32 3.0 版本，危害等级中等。"
published = "2000-05-03T04:00:00.000"
remediation = "立即升级 Cart32 至最新版本（3.0 之后的安全版本已修复此漏洞）；如无法升级，在 Web 服务器（IIS/Apache）层面配置 URL 访问控制规则，禁止外部访问 /expdate 路径，或删除服务器上 expdate 调试文件以彻底消除信息泄露风险。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Cart32 3.0 expdate 管理信息泄露漏洞"
updated = "2026-06-16T21:51:42.967"

