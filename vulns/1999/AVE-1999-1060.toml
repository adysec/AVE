[basic]
description = "Auto_FTP 0.2 版本中的 Auto_FTP.pl 脚本存在安全设计缺陷，将用户登录凭据（用户名和密码）以明文形式存储在 auto_ftp.conf 配置文件中。攻击者若能够读取该配置文件，即可直接获取明文凭据，进而利用这些凭据进行未授权访问。该漏洞的攻击前提是攻击者已获得文件读取权限，属于信息泄露类漏洞。"
published = "1999-10-05"
remediation = "Auto_FTP 0.2 已停止维护，建议立即迁移至支持加密凭据存储的 FTP 自动化工具（如 lftp 配合加密 .netrc 文件）。如无法替换，须将 auto_ftp.conf 配置文件权限严格限制为仅管理员可读（如 chmod 600），并避免在共享目录中存放该配置文件。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "Auto_FTP 0.2 配置文件明文存储凭据漏洞"
updated = "2026-06-16"

