[basic]
description = "冷风云系统（Cold Wind Cloud System）是一款云计算管理平台，其存在远程命令执行（RCE）漏洞。未经身份验证的远程攻击者可通过构造特制的 HTTP 请求向目标系统发送恶意数据包，触发系统命令执行接口，从而在服务器上执行任意系统命令。攻击者无需任何前置权限即可利用此漏洞，成功利用可完全控制目标服务器，获取敏感数据或植入后门。该漏洞影响冷风云系统多个版本，危害严重。"
published = "08.09"
remediation = "建议立即联系冷风云系统厂商获取最新安全补丁，将系统升级至最新版本。临时缓解措施包括：在 Web 应用防火墙(WAF)层面添加规则过滤系统命令执行关键字（如 cmd、exec、shell、system 等）；对管理后台的输入参数实施严格的白名单校验；关闭不必要的管理端口对外暴露，仅允许可信 IP 访问管理界面；禁用危险函数（如 system、exec、popen 等）。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "冷风云 系统 远程代码执行漏洞"
updated = "08.09"

