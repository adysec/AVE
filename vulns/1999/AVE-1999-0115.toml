[basic]
description = "Qbik WinGate 3.0/Pro 4.0.1/Standard 4.0.1 的 Winsock 重定向服务存在缓冲区溢出漏洞，远程攻击者无需身份认证即可通过向目标系统发送特制的网络请求触发该漏洞，导致服务进程崩溃，造成拒绝服务。该漏洞影响 WinGate 3.0、Pro 4.0.1 及 Standard 4.0.1 版本，CVSS 评分 5.0，危害等级中危。"
published = "1999-02-22T05:00:00.000"
remediation = "升级 WinGate 至 4.1 及以上版本，该版本已修复 Winsock 重定向服务中的缓冲区溢出问题。如无法升级，可在防火墙中限制对 2080/TCP 端口的访问，仅允许可信 IP 连接，以降低远程攻击风险。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Qbik WinGate Winsock Redirector Service 缓冲区溢出拒绝服务漏洞"
updated = "2026-06-16T21:48:24.220"

