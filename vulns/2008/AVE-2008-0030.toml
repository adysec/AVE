[basic]
description = "Apple QuickTime 7.4.5 之前版本的 Windows 平台存在 Animation 编解码器处理堆溢出漏洞。攻击者可向目标用户发送包含特制影片的诱饵文件，当用户使用受影响的 QuickTime 打开该影片文件时，编解码器在处理影片中的行程长度编码数据时触发堆缓冲区溢出，导致程序崩溃或在目标系统上执行任意代码。该漏洞影响所有安装了 QuickTime 7.4.5 之前版本的 Windows 系统，攻击者无需任何身份认证即可远程利用。"
published = "2008-04-04T17:44:00.000"
remediation = "建议立即将 Windows 版 Apple QuickTime 升级至 7.4.5 或更高版本（建议升级至最新 7.7.9 版本）。可从 Apple 官网下载最新安装包（https://support.apple.com/kb/DL837）手动安装，或卸载旧版后使用 Apple Software Update 自动更新。若暂时无法升级，建议卸载 QuickTime 或在防火墙/应用层禁用 .mov/.qt 等 QuickTime 关联文件类型的自动打开，作为临时缓解措施。Apple 已于 2016 年停止对 Windows 版 QuickTime 的安全更新，建议长期迁移至其他媒体播放器（如 VLC、MPC-HC）。"
score = 6.8
severity = "MEDIUM"
sources = ["tenable"]
title = "Apple QuickTime 堆缓冲区溢出远程代码执行漏洞"
updated = "2026-06-16T22:50:49.420"

