[basic]
description = "这是 Solaris 操作系统中的 sadmind 远程命令服务软件存在缓冲区溢出漏洞。攻击者无需身份验证即可远程向目标系统发送特制的 NETMGT_PROC_SERVICE 请求包，利用缓冲区溢出漏洞将恶意代码注入进程内存并执行，从而获取受害主机的最高权限 root 访问权。此漏洞影响所有支持 sadmind 服务的 Solaris 系统版本，攻击者可通过精心 crafted 的网络请求利用此漏洞，危及系统安全。美国国家网络安全数据库已对该漏洞进行了编号标识，风险评级为五星级评级（CVSS 10 分）。"
published = "1999-12-10T05:00:00.000"
remediation = "建议立即安装 Sun Microsystems 发布的 Solaris 安全补丁（如 Solaris 7 安装补丁 106945-01、Solaris 8 安装补丁 108993-01 等对应版本补丁），或升级到已修复该漏洞的 Solaris 版本。若暂时无法打补丁，请立即禁用 sadmind 服务（执行 /etc/init.d/sadmind stop 并禁用自启动），并在防火墙层面封锁 RPC 端口（如 TCP/UDP 32771、111 等）仅允许受信任 IP 访问，作为临时缓解措施。"
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "Solaris sadmind 系统远程缓冲区溢出漏洞"
updated = "2026-06-16T21:49:26.857"

