[basic]
description = "SSH 1.2.25、1.2.23 及部分早期版本在采用 CBC（密码块链）或 CFB（64位密文反馈）加密模式时存在数据注入漏洞。远程攻击者利用已知明文攻击方式，通过计算数据包的有效 CRC-32 校验和，可在已建立的 SSH 客户端与服务器之间的加密流中插入任意数据，破坏通信完整性。该漏洞影响大量使用上述 SSH 版本的系统，攻击者无需认证即可实施中间人攻击或篡改传输内容。由于 SSH 广泛应用于远程管理，该漏洞可能导致敏感信息泄露或系统被非授权控制。目前厂商已发布更新修复此问题，建议升级至不受影响的 SSH 版本。"
published = "1998-06-12T04:00:00.000"
remediation = "升级 SSH 至 1.2.27 或更高版本以修复 CRC-32 补偿攻击漏洞；优先使用 SSH2 协议替代 SSH1；禁用 CBC 模式加密算法（如 arcfour、3des-cbc、blowfish-cbc），改用 CTR 模式（如 aes128-ctr、aes256-ctr）；在服务端配置 Ciphers 选项限制仅使用安全加密套件。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "SSH 1.2.x CBC/CFB 模式加密流数据插入漏洞"
updated = "2026-06-16T21:49:41.383"

