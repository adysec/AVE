[basic]
description = "HP xlock 屏幕锁定程序存在缓冲区溢出漏洞。本地攻击者可构造特制参数触发缓冲区溢出，从而覆盖进程内存空间以执行任意代码，最终获取目标系统的 root 权限。该漏洞影响 BSD/OS、DG/UX、Debian、HP-UX、IBM AIX、SGI IRIX、Solaris 等多个 Unix 系统的 xlock 程序，CVSS 评分 7.2，危害等级高。攻击者需具备本地系统访问权限方可利用此漏洞进行权限提升。"
published = "1997-11-04T05:00:00.000"
remediation = "建议升级 xlock 至 2.5 以上版本，或安装对应操作系统厂商的补丁（HP-UX 11.00 及以上版本已修复此问题）。如无法升级，可限制 xlock 的 SUID 权限或改用其他屏幕锁定程序（如 xscreensaver、vlock）作为临时缓解措施。"
score = 7.2
severity = "HIGH"
sources = ["epss"]
title = "HP Xlock 缓冲区溢出漏洞"
updated = "2026-06-16T21:48:06.993"

