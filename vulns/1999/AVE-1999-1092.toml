[basic]
description = "dbmlparser.exe 是一款 CGI 留言簿程序，其 chroot 操作实现存在缺陷，导致 chroot 限制未能正确生效。远程攻击者无需身份认证即可利用路径遍历技术绕过目录隔离，读取服务器上的任意文件，包括配置文件、密码文件等敏感信息。该漏洞影响使用该 CGI 程序的 Web 服务器，CVSS 评分 5.0，危害等级中危。由于该程序年代久远且已停止维护，建议迁移至其他受支持的留言簿解决方案。"
published = "1999-07-19T04:00:00.000"
remediation = "立即停止使用 dbmlparser.exe 程序，该软件已停止维护且无安全更新。如必须运行，在 Web 服务器层面限制 CGI 脚本执行权限，仅允许访问特定数据目录；同时配置 Web 服务器（如 Apache 的 mod_rewrite 或 IIS 的 URL 重写）过滤 DBMLFILE 参数中的路径遍历字符（如 ../），并确保 CGI 进程以最低权限账户运行，限制其可读取的文件系统范围。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "dbmlparser CGI 留言本程序任意文件读取漏洞"
updated = "2026-06-16T21:50:18.727"

