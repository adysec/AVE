[basic]
description = "Linux 内核 2.2.3 及更早版本的 IP 协议栈在处理分片数据包时存在缺陷，远程攻击者无需身份认证即可发送特制的零长度 IP 分片报文，导致目标系统内核在处理分片重组时出现异常，进而触发系统崩溃或拒绝服务。该漏洞影响 Linux Kernel 2.1.89 至 2.2.16 版本，攻击者只需发送少量恶意分片数据包即可完成利用，危害等级中等。"
published = "1999-03-01"
remediation = "升级 Linux 内核至 2.2.4 或更高版本，该版本已修复零长度 IP 分片导致的拒绝服务漏洞。如无法升级，可在防火墙上配置规则丢弃非法分片数据包作为临时缓解措施。"
score = 5.0
severity = "MEDIUM"
sources = [
    "cve",
    "exploitdb",
    "nvd",
]
title = "Linux Kernel 2.2.3 及更早版本 IP 分段处理拒绝服务漏洞"
