[basic]
description = "Linux 内核 MTD 子系统中的 rawnand 驱动存在双重释放（double free）漏洞，位于 atmel_pmecc_create_user() 函数中。该函数将 `user` 指针的内存分配方式从 kzalloc() 改为 devm_kzalloc() 后，仍保留了 kfree(user) 调用，导致同一内存区域被释放两次，引发内核崩溃或潜在的内存破坏。攻击者需要本地低权限访问，通过加载特制的 NAND Flash 设备触发该漏洞，可能导致系统拒绝服务或权限提升。该漏洞影响 Linux 内核多个版本，CVSS 评分 7.8，危害等级高。"
published = "2025-01-06T17:15:43.127"
remediation = "立即更新 Linux 内核至以下修复版本：4.20 及以上、5.4.289 及以上、5.10.233 及以上、5.15.176 及以上、6.1.123 及以上、6.6.69 及以上、6.12.8 及以上或 6.13-rc5 及以上。Debian 11 用户请安装 DLA-4075-1 安全更新；Ubuntu 24.04 LTS 用户请安装 USN-7381-1 更新（升级至 linux-image-6.11.0-1011-lowlatency 6.11.0-1011.12~24.04.1）。如无法立即更新内核，可临时限制本地低权限用户加载 Atmel NAND Flash 驱动模块（禁用 atmel_nand 内核模块加载），但建议优先安排内核升级。"
score = 7.8
severity = "HIGH"
sources = ["msrc"]
title = "Linux 内核 MTD rawnand 驱动双重释放漏洞"
updated = "2026-06-17T08:12:56.480"

