[basic]
description = "Red Hat Linux 6.0 安装的 /dev/pts 伪终端文件系统权限设置不当，以不安全模式挂载，导致本地普通用户可向其他用户的 TTY 终端设备写入数据。攻击者利用此缺陷可实现向其他终端会话注入任意命令或数据，造成信息泄露或权限提升。该漏洞影响 Red Hat Linux 6.0 及部分早期 Linux 发行版，需拥有本地访问权限才能利用。"
published = "1999-06-01T04:00:00.000"
remediation = "升级至 Red Hat Linux 6.1 或更高版本，或安装 RHSA-1999:014 补丁。若无法升级，编辑 /etc/fstab 中 devpts 挂载行，添加 `mode=0620,gid=tty` 选项（如 `none /dev/pts devpts mode=0620,gid=tty 0 0`），限制 pts 设备仅所属用户和 tty 组可写；同时执行 `mount -o remount /dev/pts` 生效。亦可配置 PAM 模块 `pam_console` 正确设置终端设备权限作为补充缓解措施。"
score = 4.6
severity = "MEDIUM"
sources = ["redhat"]
title = "Red Hat Linux 6.0 /dev/pts 文件系统权限漏洞"
updated = "2026-06-16T21:51:33.913"

