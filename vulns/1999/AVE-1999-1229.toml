[basic]
description = "BNBSurvey 是一款早期的 CGI 网页问卷调查系统，其 survey.cgi 脚本存在远程命令注入漏洞。该程序未对用户提交的输入进行充分的过滤和转义，直接将包含 shell 元字符的数据传递给系统命令执行，导致未经身份认证的远程攻击者可在目标服务器上执行任意操作系统命令。攻击者只需通过网络访问运行有 BNBSurvey 的 Web 服务器，并向 survey.cgi 发送包含分号、管道符、反引号等 shell 元字符的恶意请求即可触发漏洞，从而完全控制目标服务器，造成数据泄露、服务中断或被进一步利用作为跳板等严重后果。"
published = "1998-12-03T05:00:00.000"
remediation = "BNBSurvey survey.cgi 程序未对用户输入进行正确过滤，远程攻击者可通过在请求参数中插入 shell 元字符（如分号、管道符等）实现任意命令执行，获取服务器完全控制权。攻击无需身份认证，仅需向目标 Web 服务器发送特制 HTTP 请求即可触发。该产品已停止维护，建议立即移除或禁用 survey.cgi 脚本，或使用 Web 应用防火墙（WAF）拦截包含 shell 元字符的请求作为临时缓解措施。"
score = 10
severity = "CRITICAL"
