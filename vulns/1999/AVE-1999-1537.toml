[basic]
description = "BSD-based 4.3 及更早版本操作系统的 passwd 工具存在缓冲区溢出漏洞。本地用户可通过向 shell 或 GECOS 字段提供超长输入触发缓冲区溢出，从而覆盖内存中的关键数据，实现权限提升并获得 root 权限。攻击者需要拥有系统本地访问权限才能利用此漏洞，CVSS 评分 7.2，危害等级高。"
published = "1989-01-01T05:00:00.000"
remediation = "升级到 BSD 4.3.1 或更高版本，该版本已修复 passwd 命令中 shell/GECOS 字段的缓冲区溢出问题。如无法升级，可限制本地用户对 passwd 命令的 SUID 执行权限，并审计 /etc/passwd 和 /etc/master.passwd 中异常长度的 GECOS 字段条目。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "BSD passwd 缓冲区溢出漏洞"
updated = "2026-06-16T21:50:30.747"

