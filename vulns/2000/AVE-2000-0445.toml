[basic]
description = "Mirabilis ICQ 2000A Webmail 客户端在用户登录过程中会创建一个全局可读的临时文件且登录后未删除，导致本地用户可通过读取该临时文件获取敏感信息。该漏洞影响 Mirabilis ICQ 2000A 版本的 Webmail 客户端，CVSS 评分 5.5（中危），攻击向量为本地访问（AV:L），攻击复杂度低（AC:L），需要低权限（PR:L），无需用户交互（UI:N），机密性影响高（C:H）。攻击者只需拥有本地系统访问权限，即可读取登录过程中遗留的临时文件获取敏感信息（如会话凭据等）。Mirabilis 已在后续版本中修复此临时文件未清理问题。"
published = "2000-06-06T04:00:00.000"
remediation = "建议立即停止使用 ICQ 2000.0 A 并升级至现代即时通讯软件（如 QQ、微信、Telegram 等）。若必须在旧系统运行，请在系统临时目录设置严格权限（chmod 700 /tmp），并定期清理临时文件防止敏感信息泄露。"
score = 5.5
severity = "MEDIUM"
sources = ["epss"]
title = "Mirabilis ICQ 2000.0 A Mailclient 临时文件权限设置不当漏洞"
updated = "2026-06-16T21:51:58.990"

