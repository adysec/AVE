[basic]
description = "Microsoft Internet Explorer 5.0 与 5.01 版本存在跨框架安全策略绕过漏洞。该漏洞源于浏览器的 external.NavigateAndFind() 函数未正确实施同源与跨框架访问限制，导致远程攻击者可通过构造恶意网页，在用户访问时利用该函数绕过浏览器的跨框架安全隔离机制，非法读取受害者本地文件系统上的文件内容。攻击条件为攻击者需诱导受害者使用受影响的 IE 版本打开其控制的网页，无需身份认证或本地交互。受影响产品包括 Internet Explorer 4、5、5.01 及 5.5 等多个版本，虽 CVSS 评分较低（2.6），但仍可能导致敏感信息泄露。"
published = "1999-12-23T05:00:00.000"
remediation = "建议将 Internet Explorer 升级至 5.5 SP2 或更高版本（如 IE 6 及后续版本），以修复 external.NavigateAndFind() 跨帧安全策略绕过漏洞。如短期内无法升级，可临时通过 Internet Options → Security 将 Internet 区域安全级别调至 High，或禁用 Active Scripting 作为缓解措施，并避免访问不受信任的网站。长期而言，建议迁移至现代浏览器以获得持续安全更新。"
score = 2.6
severity = "LOW"
sources = ["exploitdb"]
title = "Microsoft Internet Explorer 跨帧安全策略绕过漏洞"
updated = "2026-06-16T21:50:51.210"

