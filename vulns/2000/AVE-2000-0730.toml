[basic]
description = "NetWin DMailWeb 和 CWMail 2.6g 及更早版本存在拒绝服务漏洞。远程攻击者可通过向目标服务器发送特制的超长用户名参数，触发缓冲区溢出或资源异常消耗，导致邮件服务进程崩溃或无法响应正常请求，造成拒绝服务。该漏洞影响 NetWin DMailWeb 和 CWMail 全系列旧版本，攻击者无需认证即可远程利用，危害等级中等。"
published = "2000-06-21T04:00:00.000"
remediation = "升级 Netwin DMailWeb/CWMail 至 2.6g 以上版本，该版本修复了用户名参数长度校验缺陷。如无法升级，在 Web 服务器或反向代理层对 username 参数实施长度限制（建议不超过 64 字符），并配置 WAF 规则拦截超长请求。考虑将此类旧版内部邮件系统隔离于非信任网络。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Netwin DMailWeb/CWMail 拒绝服务漏洞"
updated = "2026-06-16T21:52:06.220"

