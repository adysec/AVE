[basic]
description = "Sojourn 搜索引擎 2.0 版本存在路径遍历漏洞，远程攻击者可通过向 URL 参数中注入 `../` 序列绕过访问限制，读取服务器上任意文件。该漏洞源于对用户输入的路径参数缺乏充分过滤，攻击者无需认证即可利用，可能导致敏感信息泄露，如配置文件、密码文件等。CVSS 评分 5.0，危害等级中危。"
published = "2000-03-14T05:00:00.000"
remediation = '建议立即迁移至当前受支持的搜索引擎（如 Elasticsearch）替代 Sojourn。若无法立即迁移，在 Web 服务器（Apache/Nginx）中配置规则拒绝包含 "../" 的 URL 请求，同时修改搜索处理脚本，对用户输入的文件名参数调用 realpath() 规范化路径并校验其是否位于网站根目录下，禁止直接拼接用户输入到文件路径中；此外将 Web 服务进程以最低权限用户运行并启用 chroot 隔离以限制文件访问范围。'
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Generation Terrorists Designs & Concepts Sojourn 路径遍历漏洞"
updated = "2026-06-16T21:51:10.033"

