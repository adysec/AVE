[basic]
description = "Flavio Veloso Nobo 1.2 存在拒绝服务漏洞，远程攻击者可通过向目标系统发送一系列大型 UDP 数据包，导致服务器进程崩溃，从而造成服务不可用。该攻击无需身份认证，攻击条件简单，仅需网络可达即可触发。受影响版本仅为 Nobo 1.2，危害等级中等。"
published = "1999-02-04T05:00:00.000"
remediation = "该漏洞影响 Flavio Veloso Nobo 1.2，该软件已停止维护，无官方补丁。建议立即迁移至其他受支持的替代软件以消除风险；如无法替换，可在网络边界防火墙（如 iptables）添加规则 `iptables -A INPUT -p udp --dport 8800 -m length --length 1000:65535 -j DROP` 限制大尺寸 UDP 数据包，并将 Nobo 绑定至内网非标准端口，避免暴露于公网。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Flavio Veloso Nobo 1.2 UDP数据包拒绝服务漏洞"
updated = "2026-06-16T21:49:52.033"

