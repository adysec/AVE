[basic]
description = "金和OA /c6/JHSoft.Web.CostControl/VouchUpdate.aspx 接口的 ctl 参数存在 SQL 注入漏洞，未经身份认证的远程攻击者可构造恶意 SQL 语句注入数据库执行，导致敏感数据泄露、数据库篡改甚至服务器失陷。攻击无需特殊权限，仅需向目标接口发送特制 HTTP 请求即可触发。建议对 ctl 参数实施参数化查询、限制路径仅允许内网访问并部署 WAF 拦截 SQL 注入特征。"
published = "nday"
remediation = "联系金和厂商获取 VouchUpdate.aspx 的安全补丁；对 ctl 参数实施参数化查询或预编译语句，禁止直接拼接 SQL；在 IIS 或反向代理中限制 /c6/JHSoft.Web.CostControl/ 路径仅允许内网 IP 访问；部署 WAF 拦截包含 SQL 注入特征的请求；若无法立即修复，临时移除 VouchUpdate.aspx 文件的执行权限或禁用该页面。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "金和OA VouchUpdate.aspx SQL注入漏洞"
updated = "nday"

