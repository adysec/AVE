[basic]
description = "Weblate 本地化工具的 `VCS_RESTRICT_PRIVATE` 配置存在缺陷，未能正确识别和拦截部分过渡性 IPv6 地址范围（如 NAT64 众所周知前缀 64:ff9b::/96）、多播地址以及某些半私有 IPv4 地址范围，导致攻击者可绕过私有地址限制发起服务端请求伪造（SSRF）攻击。该漏洞影响 Weblate 5.15 至 2026.6 版本之前的所有版本，CVSS 评分 5.9（中危），攻击向量为网络，攻击复杂度高，无需权限和用户交互，主要影响机密性。攻击者可通过构造特定的内网地址绕过防护，访问内部受保护资源。官方已在 2026.6 版本中修复此问题，建议用户尽快升级。"
published = "2026-06-10T20:17:29.427"
remediation = "建议立即升级 Weblate 到 2026.6 或更高版本（如通过 pip install --upgrade weblate 或 Docker 镜像 weblate/weblate:2026.6）。若暂时无法升级，可在防火墙或网络层面限制 Weblate 服务器的出站访问，仅允许访问必要的公网 VCS 仓库地址，并配置 VCS_RESTRICT_PRIVATE 补充封禁 64:ff9b::/96、ff00::/8 等遗漏的私有/组播地址段作为临时缓解措施。"
score = 5.9
severity = "MEDIUM"
sources = ["ghsa"]
title = "Weblate Weblate SSRF漏洞（出站URL防护绕过私有IP范围）"
updated = "2026-06-17T10:57:37.460"

