[basic]
description = "Tony Greenwood WebWho+ 1.1 中的 whois.cgi 程序存在命令注入漏洞，远程攻击者可通过向 TLD 参数中注入 shell 元字符（如管道符、分号等）执行任意系统命令，从而完全控制目标服务器。该漏洞无需身份认证即可利用，且已有公开的 ExploitDB 利用代码，危害严重。受影响版本为 WebWho+ 1.1，建议升级或移除该 CGI 脚本。"
published = "1999-12-26T05:00:00.000"
remediation = "立即移除或禁用 WebWho+ 的 whois.cgi 脚本，改用系统自带的 whois 命令行工具替代。如需继续使用，须在 CGI 脚本中对 TLD 参数做严格白名单过滤（仅允许字母、数字和连字符），并禁止将用户输入直接传递给 system() 或 popen() 函数，避免 shell 元字符注入。"
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "Tony Greenwood WebWho+ 远程命令执行漏洞"
updated = "2026-06-16T21:50:49.007"

