[basic]
description = "AnalogX Proxy Server 4.04 及更早版本存在缓冲区溢出漏洞。远程攻击者无需身份认证即可通过 SMTP 协议向目标服务发送特制的超长 HELO 命令触发该漏洞，导致代理服务程序崩溃，造成拒绝服务。该漏洞影响 AnalogX Proxy Server 4.04 及之前所有版本，CVSS 评分 5.0，危害等级中危。"
published = "2000-07-25T04:00:00.000"
remediation = "立即升级 AnalogX proxy server 至 4.05 或更高版本（http://www.analogx.com/contents/download/network/proxy.htm），此版本已修复 SMTP HELO 命令缓冲区溢出问题。如无法升级，可在防火墙或代理服务器层面限制 SMTP 协议 HELO 命令长度不超过 255 字节，并禁止外部来源向 SMTP 端口发送畸变 HELO 请求作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "AnalogX proxy server 缓冲区溢出拒绝服务漏洞"
updated = "2026-06-16T21:52:12.310"

