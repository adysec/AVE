[basic]
description = "Xlink Technology 公司 Omni-NFS X Enterprise 6.1 版本中的 NFS 守护进程 nfsd.exe 存在拒绝服务漏洞。远程攻击者可通过向目标系统的 111 端口发送设置了 URG（紧急）标志的畸形 TCP 数据包，导致服务端资源耗尽，从而使 NFS 服务不可用。该漏洞攻击复杂度低，无需认证即可远程触发。"
published = "1999-10-06T04:00:00.000"
remediation = "该漏洞影响 Xlink Technology Omni-NFS/X Enterprise 6.1 及更早版本，该产品已长期停止维护。建议立即迁移至其他受支持的 NFS 服务器方案（如 Windows Server 内置 NFS 服务或第三方现代 NFS 软件），并在防火墙层面限制仅允许可信 IP 访问 TCP/UDP 111 端口（sunrpc），同时禁用不必要的 RPC 服务以减小攻击面。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Xlink Technology Omni-NFS/X Enterprise 6.1 NFS Daemon TCP URG 数据包拒绝服务漏洞"
updated = "2026-06-16T21:50:15.080"

