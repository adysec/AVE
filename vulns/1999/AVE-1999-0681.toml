[basic]
description = "Cisco 675 路由器运行 CBOS 操作系统时，由于未设置 exec 密码或超级用户密码，远程攻击者无需身份验证即可直接建立 telnet 会话并获取设备命令行访问权限。攻击者通过互联网向目标路由器发送 telnet 连接请求即可利用此漏洞，成功利用后可进一步执行配置修改、流量劫持或网络渗透等后续攻击。该漏洞影响所有运行 CBOS 且未配置访问密码的 Cisco 675 路由器。"
published = "1999-07-01"
remediation = "在 Cisco 675 路由器 CBOS 上立即设置 exec 密码和超级用户密码，通过 enable password 命令配置特权级密码，并通过 line vty 配置登录密码限制虚拟终端访问；同时通过访问控制列表限制 telnet 源地址，仅允许受信管理网段访问；如设备型号已停止支持，建议升级至 Cisco 官方发布的修复版本或更换为受支持型号。"
score = 7.5
severity = "HIGH"
sources = [
    "cve",
    "avd",
]
title = "Cisco 675 路由器 CBOS 密码保护缺失远程未授权访问漏洞"
updated = "2026-06-16"

