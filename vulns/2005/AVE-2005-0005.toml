[basic]
description = "Horde 3.0.4 默认安装中存在一个未设置密码的管理员账户，远程攻击者无需任何认证即可通过该空密码账户直接登录 Horde 应用管理后台，获取完全控制权限。该漏洞影响 Debian 系统上预装的 Horde 3.0.4 版本，由于安装脚本在初始化时未强制要求设置管理员密码，导致攻击者可通过默认凭据直接进入系统，进而可能访问或篡改邮件数据、联系人信息及其他敏感资料。CVSS 评分 10.0，危害等级严重。"
published = "2005-11-16T07:42:00.000"
remediation = "建议立即升级 Horde 至修复版本：Debian Sarge 用户升级至 horde3 3.0.4-4sarge1，Sid 用户升级至 3.0.5-2，运行 apt-get update && apt-get upgrade horde3。升级后第一时间登录后台为 admin 账户设置强密码，如不使用默认管理员账户则应直接禁用或删除该账户。手动安装用户可从 debian.org/security/2005/dsa-884 下载补丁包。"
score = 10
severity = "CRITICAL"
sources = ["nuclei"]
title = "Debian Horde 默认管理员空密码漏洞"
updated = "2026-06-16T22:16:46.050"

