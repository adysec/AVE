[basic]
description = "Solaris 8/9 系统中的 /usr/ucb/ps 工具存在本地信息泄露漏洞。本地攻击者可通过使用 -e 选项以查看任意进程的环境变量及敏感信息，导致其他用户的密码、密钥等机密数据被非授权获取。该漏洞影响 Solaris 8、9 及更早版本，攻击者需拥有本地系统访问权限。"
published = "1999-12-31T05:00:00.000"
remediation = "安装 Sun 官方补丁（SunSolve ID 102215），限制 `/usr/ucb/ps` 的访问权限，移除该文件的 setuid 位，仅授权管理员使用。建议升级到受支持的 Oracle Solaris 11 或迁移至其他现代操作系统，避免继续使用已停止安全更新的 Solaris 8/9。"
score = 2.1
severity = "LOW"
sources = ["avd"]
title = "Sun Solaris /usr/ucb/ps 本地信息泄露漏洞"
updated = "2026-06-16T21:50:46.783"

