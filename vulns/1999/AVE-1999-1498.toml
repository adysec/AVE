[basic]
description = "Red Hat Linux 5.1 系统中的 dumpreg 工具以 O_RDWR（读写）权限打开 /dev/mem 设备文件，本地攻击者可通过将标准输出（fd 1）重定向到内核内存空间，导致系统崩溃，造成拒绝服务。该漏洞影响 Red Hat Linux 5.1 版本，需要本地用户权限才能利用，CVSS 评分 2.1，危害等级低。"
published = "1998-07-29T04:00:00.000"
remediation = "立即移除 dumpreg 程序的 setuid 权限，执行 `chmod u-s /usr/sbin/dumpreg`（具体路径以系统实际位置为准），防止普通用户通过重定向标准输出写入 /dev/mem 造成内核崩溃。如条件允许，建议升级至 Red Hat Linux 6.0 或更新版本，该版本已修复此问题。此外可参照 OpenBSD 的 fdalloc 补丁思路，确保 setuid 程序的 0/1/2 号文件描述符默认指向 /dev/null，防止文件描述符劫持。"
score = 2.1
severity = "LOW"
sources = ["avd"]
title = "Red Hat Linux 5.1 dumpreg 本地拒绝服务漏洞"
updated = "2026-06-16T21:50:22.350"

