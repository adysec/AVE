[basic]
description = "ISS RealSecure 入侵检测系统 3.2.1 及 3.2.2 版本存在拒绝服务漏洞。远程攻击者无需身份认证，通过向目标系统发送大量设置了 SYN 标志的 IP 分片数据包，可导致 RealSecure 服务耗尽系统资源而崩溃，造成拒绝服务。该漏洞利用方式简单，攻击条件低，影响运行上述版本的 ISS RealSecure 服务器。"
published = "2000-10-20T04:00:00.000"
remediation = "升级 ISS RealSecure 至 3.2.3 或更高版本，该版本修复了分片 SYN 报文洪流处理逻辑。如无法升级，可在网络边界防火墙或路由器上配置速率限制策略，对入站 SYN 包进行限速，并启用碎片重组检测以缓解攻击。该产品已停止支持，建议迁移至现代入侵检测/防御系统。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "ISS RealSecure 3.2.1/3.2.2 SYN分片数据包洪泛拒绝服务漏洞"
updated = "2026-06-16T21:52:16.817"

