[basic]
description = "Microsoft Windows 95、Windows 98、Windows 2000、Windows NT 4.0 及终端服务器系统在 IP 分片重组处理中存在缺陷。未经身份认证的远程攻击者可通过向目标主机持续发送大量相同偏移的碎片化 IP 数据包（即 Jolt2 攻击），使系统陷入不断重组的死循环并耗尽 CPU 资源，最终导致系统挂起或崩溃，造成拒绝服务。该漏洞无需登录凭据，仅需网络可达即可利用，影响上述各版本 Windows 系统的可用性与稳定性。"
published = "2000-05-19T04:00:00.000"
remediation = "立即安装微软安全公告 MS00-029 对应的补丁：Windows 95 安装补丁 Q262998、Windows 98/98 SE 安装补丁 Q269863、Windows NT 4.0（Workstation/Server/TSE）安装补丁 Q258113、Windows 2000 安装 Service Pack 1（或补丁 Q258113）。如暂时无法打补丁，可在边界防火墙/路由器上启用 IP 分片速率限制并丢弃异常的重复分片报文，或在防火墙上过滤来自不可信网络的 ICMP 之外的分片 IP 流量作为临时缓解措施。"
score = 7.8
severity = "HIGH"
sources = ["exploitdb"]
