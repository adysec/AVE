[basic]
description = "科汛新职教网校系统 checkPayStatus 接口存在 SQL 注入漏洞，攻击者可在未经身份认证的情况下向该接口注入恶意 SQL 语句，绕过系统权限校验，进而窃取数据库中敏感信息（如用户账号密码、订单数据等），甚至通过写入 webshell 获取服务器控制权。该漏洞影响科汛新职教网校系统全版本，攻击者仅需构造特制的 HTTP 请求即可远程利用，危害严重。"
published = "0722"
remediation = "立即升级科汛新职教网校系统至官方已修复该 SQL 注入漏洞的最新版本（建议联系厂商获取 2025 年安全补丁包）；如无法立即升级，可在 Web 应用防火墙（WAF）中添加针对 checkPayStatus 接口 SQL 关键字与 union/select 等 payload 的拦截规则，并限制该接口的访问来源 IP，作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "科汛 新职教网校系统checkPayStatus SQL注入漏洞"
