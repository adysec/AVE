[basic]
description = "Check Point FireWall-1 4.0 及 4.1 版本的 SMTP Security Server 代理组件存在拒绝服务漏洞。远程攻击者无需身份认证，可通过向目标系统的 SMTP 代理发送包含二进制零（无效命令）的恶意数据流，导致 SMTP 安全服务器代理资源耗尽，从而使邮件服务不可用。该漏洞影响 Check Point FireWall-1 4.0 和 4.1 版本，CVSS v2 评分 5.0，危害等级中危。建议用户升级至更高版本或安装厂商发布的安全补丁以修复此漏洞。"
published = "2000-06-30"
remediation = "建议升级至 Check Point FireWall-1 4.1 SP2 及以上版本，该版本已修复 SMTP Security Server 代理对畸形命令的处理逻辑。如无法升级，可在 SMTP Security Server 属性中启用丢弃无效命令选项，并在网关层面限制 SMTP 代理端口的源 IP 范围为可信邮件服务器。"
score = 5.0
severity = "MEDIUM"
sources = ["cve"]
title = "Check Point FireWall-1 SMTP Security Server 拒绝服务漏洞"
updated = "2026-06-16"

