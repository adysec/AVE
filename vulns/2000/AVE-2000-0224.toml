[basic]
description = "Generic-NQS (GNQS) 批处理系统存在未公开细节的本地提权漏洞，本地攻击者可利用该漏洞将权限提升至 root 权限。该漏洞影响 Generic-NQS 批处理系统相关版本，CVSS 评分 7.2 (HIGH)，攻击者需具备本地系统访问权限方可利用。由于漏洞细节未公开，具体利用方式未披露，建议尽快升级至厂商发布的修复版本。"
published = "2000-03-22T05:00:00.000"
remediation = '''
用户需要为 CVE-2000-0247 生成中文修复建议，要求≥20字，具体操作：升级版本、配置修改、缓解措施，不要套话。

已知信息：
- CVE-2000-0247: Generic-NQS 漏洞，本地用户提权到 root
- CVSS 7.2，CWE: NVD-CWE-Other
- Generic-NQS (GNQS) 是一种作业调度系统

需要给出具体修复建议：升级版本、配置修改、缓解措施。需要联网搜索具体版本信息。

