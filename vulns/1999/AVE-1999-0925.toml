[basic]
description = "IBM AIX 4.3 操作系统的 ptrace 系统调用存在权限检查缺陷，本地用户可通过 ptrace 附加到一个 setgid 程序，从而继承该程序的组权限，实现本地权限提升。攻击者需要拥有本地账号且能够执行 ptrace 调用，成功利用后可获得目标程序的组特权，导致机密性、完整性和可用性部分受损。"
published = "1999-05-06"
remediation = "IBM 已发布 APAR IX84286 修复此漏洞，建议升级 AIX 4.3 至包含该补丁的最新维护级别。由于 AIX 4.3 已停止技术支持，建议迁移至受支持的 AIX 版本（如 AIX 7.x）以确保持续获得安全更新。"
score = 4.6
severity = "MEDIUM"
sources = ["cve"]
title = "IBM AIX 4.3 ptrace 本地权限提升漏洞"
updated = "2024-11-20"

