[basic]
description = "Perl 5.004_04及更早版本中使用-e选项执行脚本时，会在/tmp目录创建临时文件，其文件名仅含随机字符后缀，本地攻击者可预先创建指向系统重要文件的符号链接并诱导程序跟随，从而覆盖任意文件。漏洞影响所有Perl 5.004_04及之前版本，攻击者需要本地系统访问权限，成功利用可损坏关键系统文件或实现权限提升。"
published = "1999-12-31"
remediation = "升级 Perl 至 5.004_05 或更高版本，该版本修复了使用 -e 选项时临时文件路径可预测导致的符号链接竞争问题。如无法升级，可将 TMPDIR 环境变量指向仅当前用户可写的私有目录，并合理设置 umask 限制文件创建权限，降低符号链接攻击风险。"
score = 5.5
severity = "MEDIUM"
sources = ["cve"]
title = "Perl 符号链接跟随任意文件写入漏洞"
updated = "2026-06-16"

