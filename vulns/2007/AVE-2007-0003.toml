[basic]
description = "Alcatel-Lucent OmniPCX Enterprise Communication Server R7.1及之前版本的 Unified Maintenance Tool 中 masterCGI 存在命令注入漏洞。远程攻击者无需认证即可通过向 ping 功能提交包含 shell 元字符的特制 user 参数注入任意系统命令，导致目标系统被完全控制。该漏洞已有 Metasploit 利用模块，被 CISA 列入已知被利用漏洞目录，CVSS 评分 9.8，危害等级严重。"
published = "2007-09-19"
remediation = "将 Alcatel-Lucent OmniPCX Enterprise Communication Server 升级至 7.1 之后的安全版本，或安装厂商提供的 masterCGI 补丁。临时缓解措施：在反向代理或防火墙上限制对 masterCGI 接口的访问，仅允许受信任管理 IP 通过，并禁用不必须的 CGI 功能。"
score = 5
severity = "MEDIUM"
sources = ["nuclei"]
title = "阿尔卡特朗讯 OmniPCX Enterprise 通信服务器 7.1 masterCGI 命令注入漏洞"
updated = "2007-09-19"

