[basic]
description = "DataEase 开源商业智能与数据可视化工具 2.10.11 之前版本中 Redshift 数据源 JDBC 连接参数存在安全绕过漏洞。攻击者可通过操控 sslfactory 及 sslfactoryarg 参数绕过 JDBC 连接安全限制，利用该绕过结合其他攻击向量实现后台远程代码执行。此漏洞影响 DataEase 2.10.11 之前所有版本，CVSS 评分 8.9，危害等级高，建议用户升级至 2.10.11 或更高版本修复。"
published = "2025-06-30T21:15:31.563"
remediation = "立即升级 DataEase 至 2.10.11 或以上版本，该版本已修复 Redshift 数据源 JDBC 连接参数中 sslfactory 和 sslfactoryarg 参数的绕过漏洞。如无法立即升级，可暂时禁用 Redshift 数据源连接功能，或限制后台管理界面的网络访问权限，仅允许可信 IP 访问。"
score = 8.9
severity = "HIGH"
sources = ["hwpoc"]
title = "DataEase 数据可视化工具后台远程代码执行漏洞"
updated = "2026-06-17T09:37:27.550"

