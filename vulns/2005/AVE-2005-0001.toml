[basic]
description = "FileZilla FTP Server 0.9.6 之前版本存在输入验证不当漏洞（CWE-20）。远程攻击者可通过向 FTP 服务发送包含 MS-DOS 设备名（如 CON、NUL、COM1、LPT1 等）的特制文件名请求，触发系统保留设备名冲突，导致 FTP 服务程序崩溃或拒绝服务。该漏洞利用条件简单，无需认证即可远程触发，影响使用旧版 FileZilla Server 的所有系统。"
published = "2005-05-02T04:00:00.000"
remediation = "升级 FileZilla FTP Server 至 0.9.6 或更高版本，该版本已修复对 MS-DOS 设备名（如 CON、NUL、COM1、LPT1）的请求处理。如无法立即升级，可在应用层防火墙或反向代理处拦截包含这些保留设备名的请求路径作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["nuclei"]
title = "FileZilla FTP Server 拒绝服务漏洞"
updated = "2026-06-16T22:11:54.927"

