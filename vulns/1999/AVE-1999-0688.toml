[basic]
description = "Microsoft IIS 5.0 的 IISAPI 扩展存在目录枚举漏洞，远程攻击者可通过向服务器发送特制的非存在 URL 请求，该请求被 Perl 解释器（perl.exe）处理，从而获取 Web 服务器的真实物理路径。该漏洞影响 IIS 5.0 版本，攻击者无需认证即可利用，可能导致敏感信息泄露，为进一步攻击提供基础。CVSS 评分 7.5，危害等级高。"
published = "1999-01-26T05:00:00.000"
remediation = "立即将 IIS 升级至 6.0 或更高版本（Windows Server 2003+），旧版 IIS 5.0 已停止安全更新。如无法升级，在 IIS 管理器中删除 Perl ISAPI 扩展（perl.exe）的应用程序映射，或限制其仅对特定 IP 开放访问。"
score = 7.5
severity = "HIGH"
sources = ["exploitdb"]
title = "Microsoft IIS 5.0 IISAPI扩展目录枚举漏洞"
updated = "2026-06-16T21:48:25.340"

