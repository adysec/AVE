[basic]
description = "Microsoft Windows Media Rights Manager 4.0 及 4.1 版本存在拒绝服务漏洞。远程攻击者无需身份认证即可向目标系统发送特制的媒体许可证请求，该畸形请求会导致 Media Rights Manager 服务停止响应，造成合法用户无法正常获取媒体内容授权。该漏洞利用了许可证请求处理过程中的输入验证缺陷，攻击条件简单，仅需网络可达即可触发。"
published = "2000-03-17T05:00:00.000"
remediation = "升级 Microsoft Windows Media Rights Manager 至 4.1 官方更新版本，或停止使用已停止支持的 Windows Media Rights Manager 4.0/4.1，改用 Windows Media Player 9 Series 及以上版本集成的数字权限管理组件。如因兼容性必须保留旧版本，应在防火墙层面限制外部对 License Manager 服务端口（默认 TCP 80）的访问。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Microsoft Windows Media Rights Manager 拒绝服务漏洞"
updated = "2026-06-16T21:51:16.323"

