[basic]
description = "FreeBSD 2.1.5 之前版本中 rzsz 模块所实现的 Z-Modem 协议存在设计缺陷，远程攻击者可通过向客户端发送特制文件触发该漏洞，在目标系统上执行任意代码。该漏洞影响 FreeBSD 2.1.5 之前版本及其他使用 rzsz 实现的系统，CVSS 评分 7.5，危害等级高。攻击者只需诱骗目标使用 rz 接收文件即可完成利用，无需身份认证。"
published = "1996-07-16T04:00:00.000"
remediation = "升级 FreeBSD 至 2.1.5 或更高版本，该版本修复了 rzsz 模块中 Z-Modem 协议实现的设计缺陷。如无法升级，建议禁用 rz 自动接收功能，并在网络层面限制对运行 rz 服务的端口的访问。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "FreeBSD rzsz Z-Modem 协议远程代码执行漏洞"
updated = "2026-06-16T21:50:08.943"

