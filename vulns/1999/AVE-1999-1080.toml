[basic]
description = "Windows NT 4.0 系统内核中存在拒绝服务漏洞，本地用户可通过向 GetThreadContext 或 SetThreadContext 函数传递非法的内核模式地址，导致系统崩溃。该漏洞为本地利用，攻击者需拥有系统本地访问权限，无法远程触发。CVSS 评分 2.1，危害等级低。受影响的系统为 Windows NT 4.0，微软已发布安全更新修复此问题。"
published = "1999-12-31T05:00:00.000"
remediation = "Windows NT 4.0 已停止技术支持，该漏洞无官方补丁。建议将系统升级至 Windows 10/11 或 Windows Server 2016+ 等受支持版本以彻底修复。如无法升级，可通过组策略限制本地用户交互式登录权限，仅允许授权管理员登录，降低本地攻击面。"
score = 2.1
severity = "LOW"
sources = ["epss"]
title = "Microsoft Windows NT 4.0 本地拒绝服务漏洞"
updated = "2026-06-16T21:50:16.977"

