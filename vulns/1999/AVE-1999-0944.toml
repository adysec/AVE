[basic]
description = "Windows 95 在启用密码缓存功能时，对密码列表文件（.pwl）使用了弱加密算法，本地攻击者可通过解密该文件获取存储的用户密码，从而提升权限或冒充其他用户登录系统。该漏洞影响 Windows 95 全版本，攻击者须具备本地访问能力方可利用。由于 .pwl 文件中密码以可逆加密方式存储，攻击者可借助公开的解密工具（如 PWLTools）破解密码，进而获取管理员权限或访问受保护资源。"
published = "1999-12-31"
remediation = "在 Windows 95 系统中，通过「控制面板 → 密码 → 密码属性」取消勾选「使用密码缓存」以禁用 .pwl 文件生成。根本解决方法是升级至 Windows 2000 及以上版本，这些版本采用更强的加密算法（如 RC4）保护凭据缓存。企业管理环境中应通过组策略禁用密码缓存。"
score = 4.6
severity = "MEDIUM"
sources = [
    "cve",
    "epss",
]
title = "Microsoft Windows 95 密码缓存弱加密权限提升漏洞"
updated = "2026-06-16"

