[basic]
description = "FreeBSD 3.0至3.4版本中 asmon 和 ascpu 工具存在本地权限提升漏洞，本地用户可通过构造特制的配置文件触发该漏洞，从而获取 root 权限。攻击者需拥有本地系统访问权限，利用配置文件解析缺陷实现提权，影响 FreeBSD 3.x 系列多个版本。该漏洞 CVSS 评分 4.6，危害等级中危。"
published = "2000-02-21T05:00:00.000"
remediation = "升级到 FreeBSD 3.5 及以上版本，该漏洞已在后续版本修复。如无法升级，可移除 asmon 和 ascpu 的 setuid 权限位（chmod u-s /usr/local/bin/asmon /usr/local/bin/ascpu），或直接卸载这两个软件包。同时限制可写配置文件的目录权限，防止普通用户创建恶意配置。"
score = 4.6
severity = "MEDIUM"
sources = ["avd"]
title = "FreeBSD asmon/ascpu 本地权限提升漏洞"
updated = "2026-06-16T21:51:07.887"

