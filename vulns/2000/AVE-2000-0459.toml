[basic]
description = "OpenBSD ftpd、NetBSD ftpd、ProFTPd 和 Opieftpd 等 FTP 服务器在调用 setproctitle（或 set_proc_title）函数时，未能正确过滤用户可控的格式字符串，导致远程攻击者可以通过发送包含格式字符串特符的输入，触发拒绝服务或执行任意命令。该漏洞影响上述多种 BSD 系及第三方 FTP 服务器软件，攻击者无需预认证，仅通过网络向目标 FTP 服务发送特制数据即可利用，攻击复杂度低，后果为服务中断或潜在的命令执行。"
published = "2000-07-07T04:00:00.000"
remediation = "建议立即升级受影响 FTP 服务到修复版本：OpenBSD 升级至 2.8 或更高版本（含 ftpd 格式化字符串修复补丁），NetBSD 升级至 1.5 或更高版本，ProFTPd 升级至 1.2.3 或更高版本，Opieftpd 升级至最新版本。如无法立即升级，请在防火墙层面限制 FTP 服务（TCP 21 端口）仅允许可信 IP 访问，或暂时停用不必要的 FTP 服务作为临时缓解措施。建议同时检查系统日志中是否存在异常格式化字符串攻击痕迹（如 %n、%s 等异常格式化符号）。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "OpenBSD ftpd 格式字符串漏洞"
updated = "2026-06-16T21:52:01.777"

