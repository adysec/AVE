[basic]
description = "LakeWeb Mail List CGI 脚本存在命令注入漏洞，远程攻击者可通过在收件人电子邮件地址中插入 shell 元字符（如管道符、分号等）执行任意系统命令。该漏洞源于程序未对用户输入的邮件地址进行充分过滤和转义，导致恶意命令被传递给底层 shell 执行。攻击者无需身份认证即可利用此漏洞，获取服务器控制权。受影响的 LakeWeb Mail List 版本需及时升级或采取输入验证措施。CVSS 评分 7.5，危害等级高。"
published = "1998-11-09T05:00:00.000"
remediation = "在 LakeWeb Mail List CGI 脚本中对 recipient 邮件地址参数严格过滤 shell 元字符（; | & ` $ ( )），禁止包含 ! # $ & * + ? 等特殊字符的请求；升级到官方修补版本或改用参数化调用方式替代 system/popen 执行外部命令；如无法升级，建议将脚本迁移至 Python/Perl 的邮件库（如 smtplib）以彻底避免 shell 注入风险。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "LakeWeb Mail List CGI脚本远程命令执行漏洞"
updated = "2026-06-16T21:49:50.277"

