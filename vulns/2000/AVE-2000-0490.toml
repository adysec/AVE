[basic]
description = "WebShield SMTP 管理工具 4.5.44 版本存在访问控制缺陷，当远程 IP 地址无法解析为主机名时，管理端口未正确限制访问权限，导致未经认证的攻击者可通过发送 GET_CONFIG 命令获取 SMTP 服务器配置信息。该漏洞可被用于窃取敏感配置数据，为后续攻击提供信息支撑，影响使用该版本软件的网络设备。"
published = "2000-05-01T04:00:00.000"
remediation = "升级 WebShield SMTP Management Tool 至 4.5.44 之后的安全版本。在网络层面配置防火墙规则，仅允许受信任的管理 IP 访问管理端口；同时在管理工具配置中启用主机名反向解析验证，拒绝未解析 IP 的配置请求。该产品已停止技术支持，建议迁移至受支持的邮件安全网关。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Network Associates WebShield SMTP 管理工具配置修改漏洞"
updated = "2026-06-16T21:51:45.323"

