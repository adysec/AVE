[basic]
description = "Pacific Software Carello 购物车软件 1.2.1 版本的 add.exe 程序存在文件复制漏洞。远程未经身份认证的攻击者可向目标服务器发送特制请求，利用 add.exe 的功能复制服务器上的任意文件，从而获取 ASP 等 Web 脚本文件的源代码。该漏洞导致敏感信息泄露，CVSS 评分 5.0，危害等级中危，攻击者可据此进一步收集系统敏感信息。"
published = "2000-05-24T04:00:00.000"
remediation = "立即删除或限制对 add.exe 的访问权限（如通过 Web 服务器配置禁止执行该文件），并将 Carello 升级到 1.2.2 或更高版本。如厂商已停止支持该产品，建议迁移至其他仍在维护的购物车系统（如 Magento、WooCommerce），并在迁移前通过 .htaccess 或 Web 应用防火墙规则阻止对 add.exe 的直接访问。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Pacific Software Carello 1.2.1 文件复制导致源代码泄露漏洞"
updated = "2026-06-16T21:51:37.720"

