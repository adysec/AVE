[basic]
description = "3Com HiPer Access Router Card (HiperARC) 4.0 至 4.2.29 版本中的 Telnet 服务存在拒绝服务漏洞。远程攻击者可通过向 Telnet 端口（23/TCP）发送大量 IAC (Interpret As Command) 数据包，导致设备 CPU 过载并触发重启，造成服务不可用。攻击无需认证，仅需网络可达即可实施。该产品已停止维护，无官方补丁。"
published = "1999-08-12"
remediation = "该产品已停止维护，无官方补丁。建议在边界防火墙上限制对 Telnet 端口（23/TCP）的访问，仅允许受信任管理 IP 连接。如业务允许，建议禁用 Telnet 服务并迁移至 SSH 进行远程管理，同时尽快替换为受支持的现代路由设备。"
score = 5.0
severity = "MEDIUM"
sources = ["cve"]
title = "3Com HiPerARC 路由器 Telnet 服务 IAC 数据包泛洪拒绝服务漏洞"
updated = "2026-06-16"

