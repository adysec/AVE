[basic]
description = "fast-uri 是一个 Node.js URL 解析库，其 2.3.1 至 4.0.0 版本在处理 Unicode/IDN 主机名时存在规范化工缺陷。该库调用不存在的全局 URL 辅助函数进行 IDN 转换，导致 TypeError 被静默吞入 parsed.error，而 parse()、normalize()、equal() 等函数仍返回未规范化的 Unicode 形式主机名。攻击者可通过构造含全角字符的 URL（如 http://127。0。0。1/）绕过基于主机名的安全策略（黑名单、环回过滤、重定向验证、出站代理路由），因为 fast-uri 与 Node 原生 URL 解析器对同一输入解析出不同主机。该漏洞 CVSS 评分 7.5，危害等级高，影响使用 fast-uri 进行主机策略校验的 Node.js 应用。建议升级至 3.1.3 或 4.0.1 版本修复。"
published = "2026-06-29T14:16:47.967"
remediation = "升级 fast-uri 至 3.1.3（3.x 分支）或 4.0.1（4.x 分支）。如无法升级，在主机策略检查前拒绝所有非 ASCII 主机名，或使用与后续实际请求相同的 URL 解析器执行策略校验，避免因解析差异导致绕过。"
score = 7.5
severity = "HIGH"
sources = ["ghsa"]
title = "fast-uri IDN主机名规范化工不当漏洞"
updated = "2026-07-21T12:17:19.800"

