[basic]
description = "GNU glibc 2.1/2.1.1 中的 pt_chown 辅助程序存在权限检查缺陷，该程序用于更改伪终端（PTY）设备的所有权，但未正确验证操作权限。本地攻击者可利用此漏洞修改属于其他用户的 TTY 终端设备，从而获取对其他用户终端的控制权，实现本地权限提升。攻击者需拥有本地系统访问权限，无需其他特殊条件即可触发。"
published = "1999-08-23T04:00:00.000"
remediation = "升级至 glibc 2.1.2 或更高版本，该版本已修复 pt_chown 的 TTY 设备权限检查缺陷。如无法升级，可移除 pt_chown 的 setuid 权限（chmod u-s /usr/libexec/pt_chown），或直接删除该二进制文件。现代 Linux 发行版已默认移除 pt_chown 组件，建议迁移至受支持的发行版。"
score = 4.6
severity = "MEDIUM"
sources = ["avd"]
title = "GNU glibc pt_chown 本地权限提升漏洞"
updated = "2026-06-16T21:48:54.947"

