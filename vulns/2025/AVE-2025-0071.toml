[basic]
description = "用友BIP数据应用服务存在未授权访问漏洞，其 /bi/api/SemanticModel/GetOlapConnectionList/ 接口未对用户身份进行有效鉴权，攻击者可直接构造带有任意 token 参数的 HTTP 请求访问该接口，获取 OLAP 数据连接列表等敏感信息。该漏洞影响用友BIP系列产品，攻击者无需任何认证即可远程利用，可能导致企业核心业务数据泄露。建议厂商及时修复访问控制逻辑，对敏感接口添加身份验证机制。"
published = "0705"
remediation = "联系用友官方获取最新安全补丁，升级用友BIP至安全版本；在Nginx或WAF层配置访问控制规则，限制对/bi/api/SemanticModel/路径的访问仅允许可信IP；在应用层对该接口增加身份认证与权限校验逻辑，确保调用者需登录且具备相应角色权限后方可访问OLAP连接信息。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "用友 BIP数据应用服务未授权访问漏洞"
updated = "0705"

