[basic]
description = "Matt Wright 开发的 FormMail CGI 脚本（1.6/1.7/1.8 版本）存在环境变量信息泄露漏洞。远程攻击者可通过向表单处理脚本传递恶意的 env_report 参数，使 CGI 程序将服务器端敏感环境变量（如路径配置、系统信息等）回显给攻击者。该漏洞无认证要求，攻击复杂度低，可能导致服务器配置信息泄露，为后续攻击提供便利。建议升级至更高版本或禁用该参数功能。"
published = "2000-05-10T04:00:00.000"
remediation = "立即升级 Matt Wright FormMail 至 1.9 或更高版本，该版本已移除 env_report 功能。如无法升级，建议在 CGI 脚本入口处过滤 env_report 参数，或替换为更安全的邮件表单处理方案（如 NMSFormMail）。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Matt Wright FormMail 环境变量泄露漏洞"
updated = "2026-06-16T21:51:39.580"

