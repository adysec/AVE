[basic]
description = "该漏洞条目原描述为目标系统运行了 POP（Post Office Protocol）邮件服务，该服务默认监听 TCP 110 端口。运行 POP 服务本身并不构成直接安全漏洞，但在配置不当（如未启用加密、使用弱口令认证、暴露于公网）的情况下，远程攻击者可能通过暴力破解或会话劫持等方式获取邮件内容，导致敏感信息泄露。该条目已被 CVE 官方驳回，认为其属于通用配置枚举（CCE）范畴而非安全漏洞。"
published = "1999-01-01T05:00:00.000"
remediation = "如非业务必需，建议在服务器上禁用 POP3 服务（如 CentOS: `systemctl disable dovecot`；Ubuntu: `systemctl disable pop3`）；如确需使用，限制仅允许加密连接（启用 TLS/SSL，设置 `ssl = required`），并在防火墙层面限制仅允许受信 IP 访问 TCP 端口 110。同时建议使用 IMAPS（端口 993）替代明文 POP3。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Multiple Vendors POP Service 未授权访问漏洞"
updated = "2023-11-07T01:54:59.973"

