[basic]
description = "ISC BIND 8.2 至 8.2.2-P6 版本中的 named 服务在处理压缩区传输（ZXFR）请求时存在缺陷。远程攻击者无需认证即可向目标 DNS 服务器发送特制的 ZXFR 请求，随后对未被缓存的权威记录执行名称服务查询，触发服务拒绝（DoS）条件。该漏洞利用难度低，仅需网络可达性即可实施攻击，可导致 BIND 服务崩溃或资源耗尽，影响大量使用 BIND 8 系列版本的 DNS 基础设施。"
published = "2000-12-19T05:00:00.000"
remediation = "升级 ISC BIND 至 8.2.2-P7 及以上版本，或迁移至 BIND 9 系列。如无法升级，可在配置文件中禁用 zone transfer（限制 allow-transfer 仅允许可信从服务器），并限制对 named 服务的未授权递归查询访问。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "ISC BIND 8.2 压缩区域传输请求拒绝服务漏洞"
updated = "2026-06-16T21:52:40.657"

