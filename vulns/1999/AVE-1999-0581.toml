[basic]
description = "NTMail（Gordano）邮件服务器存在信息泄露漏洞，其在 SMTP 协议中的 VRFY 命令无法被管理员通过配置禁用的缺陷持续存在，即便管理员已在 ESMTP 配置中显式关闭了 VRFY 命令选项，该命令仍可被正常调用。未经身份认证的远程攻击者只需连接至目标服务器的 25 端口，即可通过发送 VRFY 命令结合用户名字典对邮件账户进行探测和枚举，服务器会返回匹配的有效邮箱地址，导致大量合法用户邮件地址被泄露，进而成为垃圾邮件和钓鱼攻击的目标。该漏洞影响 NTMail 4.x 及 5.x 版本（含 5.01.0003），CVSS v2.0 评分为 5.0，危害等级中等。"
published = "1999-12-01T05:00:00.000"
remediation = "升级 NTMail 至修复该问题的版本（v5.01.0003 以上），或迁移至其他支持 VRFY 控制的 SMTP 服务器软件（如 Exchange、Postfix）。若无法升级，在 SMTP 服务前部署代理服务器拦截 VRFY 命令，或在防火墙限制 SMTP 端口（25/TCP）仅允许受信任 IP 访问以缓解邮箱枚举风险。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "NTMail 邮件服务器 VRFY 命令绕过漏洞"
updated = "2026-06-16T21:49:07.460"

