[basic]
description = "OpenOffice.org 2.4 及之前版本的 OLE 导入器存在基于堆的缓冲区溢出漏洞。攻击者可通过诱导用户打开包含恶意构造的 DocumentSummaryInformation 流的 OLE 文件，触发堆缓冲区溢出，导致拒绝服务（应用程序崩溃）甚至任意代码执行。该漏洞影响 OpenOffice.org 2.4 之前的所有版本（≤2.3.1），CVSS 评分 9.3（严重），攻击向量为网络，需用户交互（中等攻击复杂度），无需认证即可导致机密性、完整性和可用性完全丧失。攻击者可构造恶意 OLE 文档诱导受害者打开，利用 OLE 导入器处理 DocumentSummaryInformation 流时的堆溢出实现远程代码执行。该漏洞已在 OpenOffice.org 2.4 版本中修复。"
published = "2008-04-17T19:05:00.000"
remediation = "升级 Apache OpenOffice 至 2.4 或更高版本（可通过 https://www.openoffice.org/download/ 获取最新版本），以修复 OLE 导入器中基于堆的缓冲区溢出漏洞。官方安全公告明确指出无临时缓解措施，因此必须升级。如在生产环境暂时无法升级，建议在邮件网关和防火墙层面过滤 .doc/.xls/.ppt 等含 OLE 对象的文件，并禁止打开来源不明的 Office 文档，同时启用操作系统 DEP（数据执行防护）等内存保护机制降低被利用风险。"
score = 9.3
severity = "CRITICAL"
sources = ["tenable"]
title = "OpenOffice.org OpenOffice OLE导入器堆缓冲区溢出漏洞"
updated = "2026-06-16T22:49:23.230"

