[basic]
description = "Netscape Messaging Server 3.55 及 University of Washington imapd 10.234 等 IMAP 服务器实现中存在缓冲区溢出漏洞。远程攻击者无需身份认证即可向目标服务器的 IMAP authenticate 命令发送特制过量数据，触发缓冲区溢出，从而在服务器进程上下文中执行任意命令。该漏洞可被用于完全控制受影响邮件服务器，CVSS 评分 10.0，危害等级严重。"
published = "1998-07-20T04:00:00.000"
remediation = "立即升级 UW imapd 至 11.0 及以上版本，或升级 Netscape Messaging Server 至 4.0 及以上版本；Sun Solaris 系统请安装 Sun 安全公告 #177 对应补丁。如无法升级，在防火墙和主机上限制 IMAP 端口（143/tcp）仅允许受信 IP 访问，并禁用 IMAP 的 authenticate 命令或改用 IMAPS（993/tcp）以缓解风险。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "Netscape Messaging Server IMAP 认证缓冲区溢出漏洞"
updated = "2026-06-16T21:47:18.900"

