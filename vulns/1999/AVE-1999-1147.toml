[basic]
description = "ROUTERmate 路由器设备使用了默认的 SNMP 团体名（community name），且该默认口令未强制要求修改。SNMP 协议本身缺乏强身份认证机制，攻击者只要能够与目标设备建立网络层的 SNMP 通信（UDP 161 端口可达），即可利用这一公开或弱默认的团体名通过 SNMP 协议读写设备的管理信息库（MIB）。远程未授权攻击者可借此查看设备敏感配置信息，并进一步修改网络参数、更改管理口令或重置配置，从而完全控制设备并可能以此为跳板渗透内网。该漏洞影响所有采用默认 SNMP 团体名且未做安全加固的 ROUTERmate 设备，属于配置类弱点，危害程度中等。"
published = "1998-09-01T04:00:00.000"
remediation = "修改 ROUTERmate 默认 SNMP 社区字符串（community name）为高强度自定义字符串，禁止使用默认值。若无需 SNMP 管理功能，直接在设备配置中禁用 SNMP 服务；如需使用，请配置访问控制列表（ACL）仅允许可信管理主机访问 SNMP 端口，并升级至支持 SNMPv3 认证加密机制的固件版本以替代 SNMPv1/v2c。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "ROUTERmate 默认SNMP团体字符串配置漏洞"
updated = "2026-06-16T21:49:04.053"

