[basic]
description = "Check Point Software Firewall-1 存在连接超时设置缺陷，防火墙对以 ACK 等非 SYN 标志位开头的连接设置了过长的超时时间，导致攻击者可通过向无响应的目标系统发起大量此类连接请求，使防火墙连接表被迅速填满而饱和，从而耗尽系统资源，造成防火墙服务崩溃或拒绝服务。该漏洞影响 Firewall-1 3.0 及 4.0 版本，攻击者无需身份认证即可远程触发，危害等级低但利用方式简单。"
published = "1999-07-29T04:00:00.000"
remediation = "升级 Check Point Firewall-1 至 4.1 及以上版本，该版本修复了非 SYN 报文超时过长的问题。如无法升级，在防火墙规则中设置连接速率限制，并将非 SYN 连接的超时时间缩短至 30 秒以下，同时配置 SYN 代理（SYN Defender）以过滤非正常握手包，缓解表耗尽攻击。"
score = 2.1
severity = "LOW"
sources = ["avd"]
title = "Check Point Firewall-1 拒绝服务漏洞"
updated = "2026-06-16T21:49:01.327"

