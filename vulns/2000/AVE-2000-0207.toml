[basic]
description = "imwheel 是一款 Linux 平台下的鼠标滚轮增强工具，其 imwheel-solo 脚本在处理 HOME 环境变量时存在缓冲区溢出漏洞。本地攻击者可通过设置超长 HOME 环境变量并执行 imwheel-solo 脚本触发缓冲区溢出，成功利用后可获得 root 权限。该漏洞影响 Halloween Linux 4.0 及 RedHat Linux 6.1/6.2 版本，CVSS 评分 7.2，危害等级高。"
published = "2000-03-13T05:00:00.000"
remediation = "立即卸载 imwheel 包（rpm -e imwheel）或删除 imwheel-solo 脚本；若确需鼠标滚轮支持，改用 imwheel 安全版本或替代工具 gpm；彻底迁移至受支持的现代 Linux 发行版（如 RHEL 8/9 或 CentOS Stream）；短期内通过限制 /usr/bin/imwheel 文件权限（chmod 750）并仅允许可信用户执行，阻止非授权本地用户触发溢出点。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "RedHat Linux imwheel 本地缓冲区溢出提权漏洞"
updated = "2026-06-16T21:51:16.610"

