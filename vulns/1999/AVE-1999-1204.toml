[basic]
description = 'Solaris 8 与 9（以及部分更早版本）系统中的 /usr/ucb/ps 命令存在本地信息泄露漏洞。该命令在配合 -e 选项使用时，会向本地普通用户显示任意进程的完整环境变量及其取值，而非仅限用户自身进程。攻击条件为攻击者需在目标主机上拥有本地登录权限（低权限用户即可），无需认证或特殊能力。利用方式简单：本地用户执行"ps -e"或针对特定进程调用该命令，即可读取其他用户（如 root 或特权服务）进程的环境变量，从而泄露敏感信息（如密码、密钥、配置路径等），为进一步的权限提升或横向移动提供线索。该漏洞影响范围限于 Solaris 8、9 及部分早期版本，属本地信息泄露类风险，CVSS 基础评分 2.1，危害等级较低。'
published = "1999-12-31T05:00:00.000"
remediation = "建议升级 Solaris 8 至补丁 108434-01 或更高版本，Solaris 9 升级至补丁 113319-01 或更高版本。若无法立即打补丁，可通过 chmod 700 /usr/ucb/ps 限制普通用户执行权限，或使用 RBAC 限制普通用户访问 ps -e 功能作为临时缓解措施。"
score = 2.1
severity = "LOW"
sources = ["exploitdb"]
