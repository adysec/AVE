[basic]
description = "AT&T WinVNC 虚拟网络计算服务器 3.3.3r7 及更早版本存在缓冲区溢出漏洞。当 DebugLevel 注册表键值大于 0 时，未经身份认证的远程攻击者可通过向 Web 服务组件发送超长 HTTP GET 请求触发缓冲区溢出，导致任意代码执行。该漏洞 CVSS 评分 10.0，危害等级严重。"
published = "2001-05-03T04:00:00.000"
remediation = '立即升级 WinVNC 到 3.3.3r8 或更新版本，该版本已在 Log.cpp 中将不安全的 vsprintf 替换为 _vsnprintf 以防止缓冲区溢出。如无法升级，设置注册表项 HKLM\Software\ORL\WinVNC3\DebugLevel 为 0 以禁用调试日志，并在防火墙层面限制对 5800/5900 端口的非授权外部访问作为临时缓解措施。'
score = 10
severity = "CRITICAL"
sources = ["exploitdb"]
title = "AT&T WinVNC Web Server 缓冲区溢出漏洞"
updated = "2026-06-16T21:53:47.883"

