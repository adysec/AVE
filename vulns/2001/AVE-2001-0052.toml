[basic]
description = "Tinyproxy HTTP 代理服务器 1.3.3 及更早版本中存在堆缓冲区溢出漏洞。远程攻击者可通过发送特制的长连接请求触发该漏洞，导致目标代理服务崩溃，且可进一步利用该溢出实现在受影响系统上执行任意命令。该漏洞影响 Tinyproxy 1.3.3 及之前所有版本，CVSS 评分 10.0，危害等级严重。"
published = "2001-03-12T05:00:00.000"
remediation = "升级 Tinyproxy 至 1.3.4 或更高版本。官方修复方案为将 `utils.c` 中 `httperr()` 函数的 `sprintf(outbuf, premsg, err, msg, msg, err, msg, VERSION)` 改用 `snprintf(outbuf, BUFFER, premsg, err, msg, msg, err, msg, VERSION)` 防止缓冲区溢出。如无法升级，可在代理服务器防火墙规则中限制仅允许受信任源 IP 访问 Tinyproxy 端口（默认 8888），以降低外部攻击面。"
score = 10
severity = "CRITICAL"
sources = ["exploitdb"]
title = "Tinyproxy HTTP代理 远程堆溢出漏洞"
updated = "2026-06-16T21:53:42.687"

