[basic]
description = "GnoRPM 0.95 之前版本存在符号链接攻击漏洞。当 GnoRPM 在处理临时文件时未正确检查文件路径安全性，本地攻击者可通过在目标系统上创建恶意的符号链接，诱使以更高权限运行的 GnoRPM 进程将内容写入攻击者指定的任意文件，从而导致权限提升或系统文件被篡改。该漏洞需要本地用户权限即可利用，CVSS 评分 7.2，危害等级高。"
published = "2000-12-19T05:00:00.000"
remediation = "升级 GnoRPM 至 0.95 或更高版本，该版本修复了临时文件创建时的竞态条件问题。如无法升级，避免在多用户环境下以 root 权限运行 GnoRPM，并限制对 /tmp 目录中 GnoRPM 临时文件的符号链接创建权限。"
score = 7.2
severity = "HIGH"
sources = ["redhat"]
title = "GnoRPM 本地符号链接攻击任意文件修改漏洞"
updated = "2026-06-16T21:52:49.983"

