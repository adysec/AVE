[basic]
description = "Samba 是一款广泛使用的开源软件，用于在类 Unix 系统与 Windows 系统间提供 SMB/CIFS 文件与打印共享服务。在 2.0.5 之前的版本中，其核心守护进程 smbd 存在缓冲区溢出漏洞，原理在于程序处理 SMB 消息命令时未对畸形（malformed）消息的长度进行充分校验，攻击者构造超长或格式异常的消息命令即可覆盖栈上相邻内存。攻击者向运行有漏洞 smbd 服务的目标发送特制的畸形消息命令即可触发溢出，进而可能导致服务崩溃（拒绝服务）或以 smbd 进程权限执行任意代码。该漏洞影响 Samba 2.0.5 之前的所有版本，CVSS 评分 5.0，危害等级中等，利用需要能够访问目标的 SMB 服务端口。建议升级至 Samba 2.0.5 或更高版本以修复此问题。"
published = "1999-07-21T04:00:00.000"
remediation = "立即升级 Samba 到 2.0.5 或更高版本（如 4.x 最新稳定版）；若暂时无法升级，请在防火墙层面限制 139/445 端口仅允许受信 IP 访问，或暂时停用不必要的 Samba 服务。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Samba smbd 缓冲区溢出漏洞"
