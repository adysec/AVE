[basic]
description = "SuSE Linux 6.x 版本中的 aaa_base 组件（6.3版本）及 cron.daily（早期版本）存在任意文件删除漏洞。本地攻击者可通过在 /tmp 目录下创建包含空格的恶意文件名，利用 aaa_base 在清理过期文件时对文件名解析错误的缺陷，诱导系统删除任意指定文件。该漏洞影响 SuSE Linux 6.3 及早期版本，攻击者需具备本地账户权限，通过构造包含空格的文件名诱导清理脚本误删任意文件，可能导致系统关键文件被删除造成拒绝服务或权限提升。CVSS 评分 2.1，危害等级较低。"
published = "2000-05-02T04:00:00.000"
remediation = "建议立即升级至受支持的 SUSE Linux Enterprise Server 15 SP5+ 或 openSUSE Leap 15.5+/Tumbleweed 现代版本。若必须维持 SuSE Linux 6.x 环境，请联系 SUSE 获取针对 aaa_base/cron.daily 任意文件删除漏洞的官方补丁包（SuSE-SA:2000:020），并立即设置 /tmp 目录粘滞位（chmod +t /tmp）限制普通用户删除他人文件，同时限制本地非特权用户登录权限作为临时缓解措施。"
score = 2.1
severity = "LOW"
sources = ["exploitdb"]
title = "SUSE Linux aaa_base 本地任意文件删除漏洞"
updated = "2026-06-16T21:51:24.927"

