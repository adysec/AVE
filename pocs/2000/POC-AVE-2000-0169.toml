[info]
author = "ave"
description = "检测目标服务器是否存在 rpm_query CGI，该脚本未经认证即可返回系统已安装的 RPM 包列表，导致信息泄露。发送 GET 请求到 /cgi-bin/rpm_query，若返回包含 RPM 包名特征则判定存在漏洞。"
id = "POC-AVE-2000-0169"
name = "Caldera OpenLinux 2.3 rpm_query CGI 信息泄露 PoC"
severity = "medium"
tags = ["ave-2000-0169"]
vuln_id = [
    "CVE-2000-0192",
    "AVE-2000-0169",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/cgi-bin/rpm_query"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "Name",
    "Distribution",
    "kernel",
    "rpm_query",
]
