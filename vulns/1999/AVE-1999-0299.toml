[basic]
description = "NCSA httpd 服务器中的 campas CGI 程序存在命令注入漏洞，攻击者通过在查询字符串中注入编码的回车符可绕过输入过滤，执行任意系统命令。该漏洞允许远程未经认证的攻击者读取服务器上的敏感文件（如密码文件），影响运行 NCSA httpd 1.2 版本的 Web 服务器系统，CVSS 评分 7.5，危害等级高。"
published = "1997-07-15"
remediation = "立即删除或禁用 campas CGI 脚本（通常位于 /cgi-bin/campas），并升级至不再包含该漏洞的软件版本。NCSA httpd 已停止维护，建议迁移至 Apache HTTP Server 等现代 Web 服务器。如无法立即替换，可在 Web 服务器配置中禁用 CGI 执行权限并限制对 /cgi-bin/ 目录的访问。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "NCSA httpd campas CGI 远程代码执行漏洞"
updated = "2026-06-16"

