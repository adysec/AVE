[basic]
description = "Fetchmail（含 fetchmail-ssl）5.8.17 之前版本在处理 IMAP 或 POP/POP3 服务器对 LIST 请求的响应时，未正确校验带符号整数索引，远程恶意邮件服务器可返回负索引值触发任意内存覆盖，进而可能导致权限提升或代码执行。攻击条件为客户端主动连接并信任恶意或被劫持的 IMAP/POP3 服务；影响使用受影响版本 Fetchmail 拉取邮件的用户与系统。该漏洞 CVSS 评分为 10.0，危害等级严重。"
published = "2001-08-31T04:00:00.000"
remediation = "立即升级 fetchmail 至 5.8.17 或更高版本，该版本修复了 POP3/IMAP 响应中Signed整数索引漏洞，阻止远程恶意服务器通过 LIST 请求覆写任意内存并提升权限。若无法立即升级，可在 fetchmail 配置中禁用 POP3/IMAP 协议（仅使用支持的协议），或将 fetchmail 运行在低权限账户下，通过 Linux 能力集（capabilities）或 seccomp 限制其内存访问权限，降低被利用后的影响范围。"
score = 10
severity = "CRITICAL"
sources = ["redhat"]
title = "Fetchmail IMAP/POP3 LIST 响应负索引任意内存覆盖权限提升漏洞"
updated = "2026-06-16T21:55:24.243"

