[basic]
description = "Microsoft 的 HTML 控件在 Internet Explorer 5.0、FrontPage Express、Outlook Express 5 及 Eudora 等多款软件中存在拒绝服务漏洞。该漏洞源于 HTML 控件对表单字段的处理逻辑缺陷，当远程攻击者构造包含超大尺寸 HTML 表单字段（如表单元格中的大型文本输入框）的恶意网页或 HTML 邮件时，目标软件在渲染该页面时会陷入持续处理状态，导致 CPU 占用率飙升至 100%。攻击条件为诱使用户访问恶意网站或打开特制 HTML 邮件，无需身份认证或特殊权限，成功利用可使受害者系统失去响应，造成可用性耗尽型拒绝服务。"
published = "1999-08-27T04:00:00.000"
remediation = "升级到 Microsoft Internet Explorer 5.01 Service Pack 1 或更高版本（安装微软 1999 年 9 月累积安全更新），FrontPage Express、Outlook Express 5 同步更新至对应补丁版本。临时缓解措施：在 Outlook Express 与 Eudora 中禁用 HTML 邮件预览、以纯文本方式阅读邮件，并使用浏览器安全区域限制自动加载远程网页内容，避免访问不可信站点。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
