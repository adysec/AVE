[basic]
description = "ColdFusion Application Server 的表达式求值器（Expression Evaluator）存在路径访问控制缺陷，远程攻击者可通过 openfile.cfm 脚本绕过服务器权限限制，向目标服务器上传任意文件，进而实现远程文件显示、删除、上传与执行。该漏洞影响 Allaire ColdFusion Server 4.0 及更早版本，CVSS 评分 7.5，危害等级高。厂商已发布安全公告，建议升级至最新版本。"
published = "1999-12-25T05:00:00.000"
remediation = "升级 Allaire ColdFusion Server 至 4.0.1 或更高版本，该版本已修复 openfile.cfm 的权限验证缺失问题。如无法升级，在 Web 服务器层面（如 IIS 的 URLScan 或 Apache 的 mod_rewrite）阻止对 /openfile.cfm 的外部访问，并移除该脚本的执行权限作为临时缓解措施。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "Allaire ColdFusion Application Server 远程文件上传漏洞"
updated = "2026-06-16T21:48:28.877"

