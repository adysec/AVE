[basic]
description = "Linux 内核块设备子系统中存在空指针解引用漏洞，当多个任务共享轮询队列执行轮询 I/O 操作时，一个任务完成 I/O 并释放 bio 后，该 bio 可能被另一任务重新分配，导致 bio->bi_bdev 为空指针，触发内核崩溃（拒绝服务）。本地攻击者可通过提交精心构造的 io_uring 轮询请求利用该漏洞导致系统宕机，影响 Linux 5.12+ 内核版本。CVSS 评分 5.5，危害等级中等。"
published = "2025-09-17T15:15:40.957"
remediation = "建议将 Linux 内核升级至 6.1.16 或 6.2.3 及以上版本，包含提交 310726c33ad7 的补丁。如无法立即升级内核，可在使用 io_uring 轮询 IO 的应用侧避免多任务共享轮询队列作为临时规避措施。"
score = 5.5
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux 内核块设备轮询空指针解引用漏洞"
updated = "2026-06-17T06:45:06.717"

