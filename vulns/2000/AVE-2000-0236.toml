[basic]
description = "Red Hat Linux 6.x 的 X Font Server（xfs）在处理畸形请求时存在缓冲区溢出漏洞，攻击者无需认证即可向目标系统 xfs 服务（默认端口 7100）发送特制请求，触发缓冲区溢出导致字体服务进程崩溃，造成拒绝服务。该漏洞影响 Red Hat Linux 6.x 系列版本，远程攻击者可利用此漏洞中断系统图形界面的字体服务功能。CVSS 评分 2.1，危害等级低危。"
published = "2000-04-16T04:00:00.000"
remediation = "升级到 Red Hat Linux 6.2 以上版本，官方已在该版本中修复此漏洞。如无法升级，可禁用 xfs 服务（`service xfs stop && chkconfig xfs off`），或在 `/etc/X11/fs/config` 中限制访问来源，并将监听地址绑定到本地回环接口（`-ls 127.0.0.1`），减少远程攻击面。"
score = 2.1
severity = "LOW"
sources = ["epss"]
title = "RedHat Linux 6.x X Font Server 拒绝服务漏洞"
updated = "2026-06-16T21:51:21.020"

