[basic]
description = "OpenLDAP 1.2.7至1.2.10版本在Linux系统下的 `/usr/tmp/` 目录中存在不安全的临时文件创建漏洞。本地攻击者可利用符号链接（symlink）攻击，在OpenLDAP服务写入临时文件前创建指向目标文件的符号链接，从而以OpenLDAP进程权限覆写任意系统文件。该漏洞利用条件为需要本地用户权限，CVSS评分2.1，危害等级较低。"
published = "2000-04-21T04:00:00.000"
remediation = "升级至 OpenLDAP 1.2.11 及以上版本，该版本已修复临时文件创建时的符号链接检查。如无法升级，确保 OpenLDAP 以非 root 低权限用户运行，并对 `/usr/tmp/` 目录设置粘滞位（chmod +t /usr/tmp），避免本地用户删除或替换其他进程的临时文件。同时将临时目录迁移至 `/tmp` 并使用 `umask 077` 限制文件权限。"
score = 2.1
severity = "LOW"
sources = ["epss"]
title = "OpenLDAP 本地符号链接攻击导致任意文件修改漏洞"
updated = "2026-06-16T21:51:30.277"

