[basic]
description = "Apple WebObjects Developer 4.5 的 CGI 适配器组件（WebObjects.exe）存在缓冲区溢出漏洞。当该组件运行于 Windows NT4 和 IIS 4.0 环境下处理 HTTP 请求时，未对 Accept 等头部字段长度进行有效边界检查，远程攻击者可通过发送包含超长头部字段的 HTTP 请求触发缓冲区溢出，导致目标 Web 服务进程崩溃，造成拒绝服务。该漏洞无需身份认证即可远程利用。"
published = "2000-04-04T04:00:00.000"
remediation = "升级至 Apple WebObjects 5.0 或更高版本，该版本已修复 CGI 适配器中的缓冲区溢出问题。如无法升级，可在 IIS 中删除 WebObjects CGI 适配器映射，或使用 URLScan 工具限制 HTTP 请求头长度（设置 MaxHeaderLength 不超过 4096 字节）作为临时缓解措施。对于已停止支持的 NT4 系统，建议迁移至受支持的操作平台。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Apple WebObjects Developer CGI-adapter 远程缓冲区溢出漏洞"
updated = "2026-06-16T21:51:25.650"

