[basic]
description = "Solaris 8 和 9 系统中的 /usr/ucb/ps 工具存在本地信息泄露漏洞。本地攻击者通过执行该程序可获取系统敏感信息，包括其他用户进程的详细信息、内存布局等，可能导致进一步权限提升。该漏洞影响 Solaris 8 和 9 版本，攻击者需拥有本地 shell 访问权限，无需特殊权限即可触发。利用方式简单，直接运行 /usr/ucb/ps 命令即可泄露本不应被普通用户访问的进程信息。"
published = "1999-12-31"
remediation = "安装 Sun 官方补丁 102215（Solaris 8/9 对应补丁 ID 102215-xx），或升级到受支持的最新 Solaris 版本。如无法打补丁，可移除 `/usr/ucb/ps` 的 setuid 权限（`chmod 555 /usr/ucb/ps`）并改用标准 `/usr/bin/ps` 替代，同时限制可登录用户为受信任管理员。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Sun Solaris 8/9 /usr/ucb/ps 本地信息泄露漏洞"
updated = "1999-12-31"

