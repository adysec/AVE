[basic]
description = "Omnis Studio 2.4 存在数据库字段加密强度严重不足的安全漏洞。该软件使用极其简单的编码转换（trivial encoding）而非标准加密算法来保护数据库中的敏感字段，攻击者可直接逆向分析编码规则还原明文内容。任何能够读取受影响数据库文件或数据库访问权限的本地或远程攻击者均可轻松提取其中的敏感信息（如账户凭证、个人数据等），无需额外认证或特殊权限。该漏洞影响 Omnis Studio 2.4 及可能的相关版本，鉴于其近乎为零的加密保护力度，危害等级严重。建议用户升级至更高版本或采用外部加密方案替代内置弱加密机制进行数据保护。"
published = "2000-05-01T04:00:00.000"
remediation = "升级 Omnis Studio 至 3.0 或更高版本（使用强加密算法替代弱编码）。如无法升级，应在应用层对敏感数据库字段使用 AES-256 等标准加密算法进行额外加密，并避免依赖 Omnis 内置字段加密功能保护机密数据。"
score = 10
severity = "CRITICAL"
sources = ["cve"]
title = "Omnis Studio 2.4 弱数据库字段加密漏洞"
updated = "2026-06-16T21:51:45.473"

