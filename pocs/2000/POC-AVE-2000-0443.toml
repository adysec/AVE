[info]
author = "AVE"
description = "检测目标 ColdFusion Administrator 登录页面可访问性，并通过超长密码字符串触发拒绝服务。远程攻击者无需身份认证即可利用此漏洞导致服务崩溃。"
id = "POC-AVE-2000-0443"
name = "CVE-2000-0538 ColdFusion Administrator Login Password DoS PoC"
severity = "medium"
tags = ["ave-2000-0443"]
vuln_id = [
    "CVE-2000-0538",
    "AVE-2000-0443",
]

[poc]
logic = "all"

[[poc.requests]]
method = "POST"
path = "/{{BaseURL}}/CFIDE/administrator/index.cfm"
protocol = "http"

[poc.requests.body]
content = ""
type = "raw"

[poc.requests.headers]
Content-Type = "application/x-www-form-urlencoded"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "ColdFusion",
    "Administrator",
]
