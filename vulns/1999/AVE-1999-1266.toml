[basic]
description = "IRIX 6.2 及 NetBSD 1.3.2 及之前版本中的 at(1) 计划任务工具存在信息泄露漏洞。本地攻击者可通过向 at 命令提交带有 -f 参数的目标文件，利用 at 在执行时产生的错误信息将文件内容通过电子邮件发送给攻击者，从而读取系统上任意文件的部分内容。该漏洞攻击难度低但需本地访问权限。"
published = "1998-07-03T04:00:00.000"
remediation = "建议升级至 NetBSD 1.4 及以上版本（1.3.2 之后已修复），IRIX 用户安装 SGI 补丁或升级至 IRIX 6.5.2 以上。若无法升级，可移除 `at` 命令的 setuid 权限（`chmod u-s /usr/bin/at`），或通过 `/etc/at.allow` 仅允许受信用户使用该命令作为临时缓解。"
score = 2.1
severity = "LOW"
sources = ["avd"]
title = "SGI IRIX 及 NetBSD at 命令本地文件读取漏洞"
updated = "2026-06-16T21:50:22.727"

