[basic]
description = "Hughes Technologies Mini SQL (mSQL) 2.0 及 2.0.10 版本存在信息泄露漏洞，攻击者无需身份认证即可通过网络连接默认 1114 端口访问数据库服务，发送特定查询或访问默认开放的管理接口，从而读取数据库结构、用户表及系统配置等敏感元数据。该漏洞源于 mSQL 服务器在处理查询请求时未正确实施访问控制，导致未授权用户可获取敏感信息，可能造成数据泄露并为后续渗透提供条件。"
published = "1999-08-17"
remediation = "升级到 mSQL 2.0.11 或后续已修复版本；若无法升级，应在防火墙层面限制 1114 端口仅允许可信本地或内网地址访问，禁用默认管理接口并移除匿名查询权限，避免将数据库端口直接暴露于公网。"
score = 5.0
severity = "MEDIUM"
sources = ["cve"]
title = "Hughes Technologies Mini SQL 信息泄露漏洞"
updated = "1999-08-17"

