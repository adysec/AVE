[info]
author = "AVE"
description = "验证Internet Explorer 4.01/5的Registration Wizard ActiveX控件(regwizc.dll)缓冲区溢出漏洞。攻击者通过构造恶意HTML页面实例化clsid:50E5E3D1-C07E-11D0-B9FD-00A0249F6B00对象并调用InvokeRegWizard方法传入超长/i前缀字符串触发栈溢出，验证远程代码执行风险。"
id = "POC-AVE-1999-1196"
name = "Microsoft Internet Explorer Registration Wizard ActiveX Buffer Overflow PoC"
severity = "medium"
tags = [
    "cve-1999-1578",
    "ave-1999-1196",
]
vuln_id = [
    "CVE-1999-1578",
    "AVE-1999-1196",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/poc-regwiz.html"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "50E5E3D1-C07E-11D0-B9FD-00A0249F6B00",
    "InvokeRegWizard",
]
