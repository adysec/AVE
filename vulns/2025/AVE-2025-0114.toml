[basic]
description = "用友 U9 Cloud 存在严重远程代码执行漏洞。该漏洞源于 .NET 中 MachineKey 被硬编码，攻击者利用已知的硬编码密钥构造恶意 ViewState 数据进行反序列化，可在目标服务器上执行任意代码，从而完全控制受影响系统。攻击者只需能够访问 U9 Cloud 的 Web 接口即可触发，无需身份认证。该漏洞影响所有使用默认 MachineKey 配置的用友 U9 Cloud 版本，危害严重。"
published = "0714"
remediation = "立即联系用友官方获取 U9 Cloud 最新安全补丁进行版本升级；同时手动修改 U9 Cloud 部署目录下 web.config 中的 machineKey 配置节，将硬编码的 MachineKey/DecryptionKey 替换为随机生成的唯一密钥（可通过 IIS 或 .NET 工具生成），并确保启用 EnableViewStateMac 和设置 ViewStateUserKey。如无法立即修复，建议在 WAF 或反向代理层添加规则拦截包含异常 ViewState 参数的请求，并限制 U9 Cloud 管理端口的公网访问。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "用友 U9 Cloud 远程代码执行漏洞"
updated = "0714"

