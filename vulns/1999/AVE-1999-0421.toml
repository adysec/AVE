[basic]
description = "NCSA HTTPd 1.3/1.4.x/1.5 及 Apache httpd 0.8.11/0.8.14 中存在 ScriptAlias 目录源码泄露漏洞。由于服务器对 ScriptAlias 目录的访问控制配置不当，远程攻击者无需身份认证即可通过直接请求获取该目录下 CGI 程序的源代码，导致敏感业务逻辑和系统信息泄露。该漏洞影响早期版本的 NCSA 和 Apache HTTP 服务器，攻击复杂度低。"
published = "1997-01-01T05:00:00.000"
remediation = "升级至 Apache HTTPd 1.0 或更高版本（建议直接升级至 2.4.x 最新稳定版），该漏洞在 1.0 中已修复。NCSA HTTPd 已停止维护，应迁移至 Apache 2.4.x。如无法立即升级，在 httpd.conf 中移除对 CGI 目录的 ScriptAlias 映射，或通过 <Directory> 块对 cgi-bin 目录设置 Deny from all 限制访问。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "NCSA httpd 与 Apache httpd ScriptAlias 源码泄露漏洞"
updated = "2026-06-16T21:47:58.393"

