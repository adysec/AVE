[basic]
description = 'TriActive Remote Manager 在启用 Basic 认证时，将用户登录凭据（用户名和密码）以明文形式写入 Windows 注册表键值 HKLM\SOFTWARE\TriActive\Remote Manager\ 中。本地攻击者通过读取注册表即可获取明文凭据，进而利用这些凭据提升权限或横向移动。该漏洞的攻击前提是攻击者已获得本地系统访问权限，危害等级为中危，影响 TriActive Remote Manager 使用 Basic 认证的所有版本。'
published = "1999-02-19"
remediation = '将 Triactive Remote Manager 认证方式从 Basic 切换为 Challenge and Response（用户级访问控制），避免明文密码写入注册表；限制 HKLM\SOFTWARE\TriActive\Remote Manager\ 注册表键的访问权限，仅允许管理员账户读取；如无需远程管理功能，建议卸载该软件或禁用服务。'
score = 4.6
severity = "MEDIUM"
sources = ["cve"]
title = "Triactive Remote Manager 明文存储认证凭据致本地权限提升漏洞"
updated = "2026-06-16"

