[basic]
description = "Check Point VPN-1/FireWall-1 4.1 及更早版本存在安全策略绕过漏洞。远程攻击者可通过发送精心构造的 TCP 分片连接请求或重新打开已关闭的 TCP 连接请求，绕过防火墙的单向连接强制检查机制，从而在未授权情况下建立反向连接，导致防火墙安全策略失效。攻击无需身份认证，利用难度低，可导致信息泄露、数据篡改及权限提升等危害。"
published = "2000-11-14T05:00:00.000"
remediation = "立即升级至 Check Point 当前受支持的最新版本（如 R80.x 及以上系列），旧版 4.1 已停止技术支持且不再发布安全更新。如无法升级，在防火墙上配置 TCP 分段重组规则，启用状态检测的严格模式，并设置连接超时后强制重置而非保留半开状态；同时在网络边界部署 IPS 设备，配置针对 TCP 分段绕过攻击的检测签名以阻断此类利用流量。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "Check Point VPN-1/FireWall-1 安全绕过漏洞"
updated = "2026-06-16T21:52:30.933"

