[basic]
description = "WinGate 代理服务器在默认安装时未设置访问密码，导致缺乏必要的身份认证机制。远程攻击者可在无需任何认证的条件下连接至该代理服务，利用其开放的代理功能转发网络连接请求，从而隐藏攻击来源、绕过访问控制或发起匿名攻击。该漏洞影响 WinGate 全系列早期版本，CVSS 评分 7.5，危害等级高。"
published = "1999-02-01T05:00:00.000"
remediation = "立即为 WinGate 代理服务设置管理密码并启用用户认证机制；在 GateKeeper 管理控制台中配置访问控制列表，仅允许受信任的内部 IP 地址段使用代理服务；如业务不需要代理功能，直接卸载或禁用 WinGate 服务；同时在网络防火墙层面拦截外部对 8080/1080 等常见代理端口的入站连接作为临时缓解。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "Qbik WinGate 代理默认无密码未授权访问漏洞"
updated = "2026-06-16T21:48:05.093"

