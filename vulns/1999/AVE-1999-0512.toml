[basic]
description = "Xi Graphics Accelerated-X 服务器版本 4.0.x 和 5.0 存在本地缓冲区溢出漏洞。该漏洞源于程序对 display 或 query 参数缺乏长度校验，本地攻击者可通过传递超长参数触发栈溢出，覆盖返回地址实现任意代码执行，从而获取 root 权限。影响版本包括 Accelerated-X 4.0.x 至 5.0 系列，CVSS 评分 7.2，属高危漏洞。攻击需具备本地登录权限，利用方式为构造恶意长参数调用易受攻击的 X 服务组件。"
published = "1999-06-25"
remediation = "升级 Xi Graphics Accelerated-X 至 5.0 以上安全版本；若无官方补丁，可移除 Xaccel 二进制文件的 setuid root 权限（chmod u-s /usr/X11R6/bin/Xaccel），限制本地非授权用户执行该程序，并禁用 -query 和 -display 参数传递超长输入"
score = 7.2
severity = "HIGH"
sources = [
    "cve",
    "exploitdb",
]
title = "Xi Graphics Accelerated-X 本地缓冲区溢出漏洞"
updated = "2026-06-16"

