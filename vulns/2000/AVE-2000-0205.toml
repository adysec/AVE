[basic]
description = "gpm 软件包中的 gpm-root 程序未能正确放弃特权，存在本地权限提升漏洞。本地攻击者可通过 gpm-root 启动工具程序，从而获取受影响系统的 root 权限。该漏洞影响 gpm 1.18.1/1.19 版本以及 Debian 2.x、RedHat 6.x、S.u.S.E 5.3/6.x 等 Linux 发行版，CVSS 评分 7.2，危害等级高。受影响的 Linux 发行版用户应升级 gpm 软件包至修复版本以消除风险。"
published = "2000-03-22T05:00:00.000"
remediation = "升级 gpm 至 1.20 及以上版本。对 Debian 2.x / RedHat 6.x / S.u.S.E 6.x 等已停止支持的发行版，如无法升级，可临时移除 gpm-root 的 setgid 权限位（执行 `chmod g-s /usr/bin/gpm-root`），或卸载 gpm 软件包并停止 gpm 服务。作为彻底方案，建议升级至仍在支持周期内的操作系统版本。"
score = 7.2
severity = "HIGH"
sources = ["epss"]
title = "Linux gpm gpm-root 本地权限提升漏洞"
updated = "2026-06-16T21:51:16.460"

