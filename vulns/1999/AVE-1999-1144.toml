[basic]
description = "ExpressFS FTP 服务器 2.x 版本中存在缓冲区溢出漏洞。当攻击者向 FTP 服务的 USER 命令发送超长字符串时，可触发栈缓冲区溢出，导致 FTP 服务进程崩溃造成拒绝服务，在特定条件下可进一步实现远程代码执行。攻击者无需身份认证即可利用该漏洞，只需网络可达目标 FTP 端口（默认 21）即可发起攻击。该漏洞影响 Celtech ExpressFS FTP 服务器 2.x 全版本，危害等级高，建议用户尽快升级至修复版本或迁移至其他受支持的 FTP 服务软件。"
published = "2001-11-28T05:00:00.000"
remediation = "ExpressFS FTP Server 2.x 厂商已停止支持且无安全补丁发布，最彻底的修复措施是停止使用该产品，迁移至主动维护的 FTP 服务器如 vsftpd 或 FileZilla Server。临时缓解措施可在防火墙层面限制对 FTP 端口（21/TCP）的访问来源 IP，仅允许可信主机连接。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "Celtech ExpressFS FTP 服务器远程缓冲区溢出漏洞"
updated = "2026-06-16T21:50:36.223"

