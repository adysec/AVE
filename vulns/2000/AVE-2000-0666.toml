[basic]
description = "OpenBSD 2.6 及更早版本中存在 ARP 请求处理缺陷，远程攻击者可通过向目标服务器发送大量 ARP 请求报文，导致系统 ARP 缓存溢出或资源耗尽，从而造成拒绝服务。该漏洞利用简单，无需认证即可发起攻击，影响 OpenBSD 2.x 系列操作系统。"
published = "2000-12-19T05:00:00.000"
remediation = "升级 OpenBSD 至 2.7 或更高版本（该版本已修复 ARP 请求处理逻辑），或在网络边界交换机/路由器上配置 ARP 速率限制（如每秒不超过 100 个 ARP 请求），同时启用静态 ARP 条目为关键服务器提供临时缓解。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "OpenBSD ARP请求洪泛远程拒绝服务漏洞"
updated = "2026-06-16T21:52:45.303"

