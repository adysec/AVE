[basic]
description = "SCO UnixWare 7.0、7.0.1 及 7.1 版本中自带的 Xsco 程序存在基于堆栈的缓冲区溢出漏洞。该产品以 root 权限运行，本地普通用户可通过构造超长的命令行参数触发溢出，覆盖返回地址并执行任意代码，从而提升自身权限至 root，危害系统安全。"
published = "1999-10-08"
remediation = "安装 SCO 官方发布的安全补丁（如 UnixWare 7 的 ptf 包），或升级至已修复该问题的 UnixWare 7.1.1 及后续版本。临时措施可移除 Xsco 程序的 setuid root 位权限。"
score = 7.2
severity = "HIGH"
sources = [
    "cve",
    "epss",
]
title = "SCO UnixWare 7.0/7.0.1/7.1 Xsco 本地缓冲区溢出漏洞"
