[basic]
description = "Washington University WU-FTPD 2.5.0 及其相关 FTP 服务器在处理消息文件中的宏变量时存在缓冲区溢出漏洞。远程攻击者无需身份认证即可通过向目标 FTP 服务器发送特制的消息文件触发该漏洞，导致缓冲区溢出，进而实现以 root 权限执行任意代码。该漏洞 CVSS 评分 10.0，危害等级严重，影响大量使用 WU-FTPD 的 UNIX/Linux 系统。"
published = "1999-10-01T04:00:00.000"
remediation = "升级至 WU-FTPD 2.6.0 或更高版本（已修复该缓冲区溢出），或在 ftpaccess 中禁用 message 文件功能（删除或注释掉 message 相关指令），并限制 FTP 服务仅监听本地回环地址作为临时缓解措施"
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "Washington University WU-FTPD 缓冲区溢出漏洞"
updated = "2026-06-16T21:49:14.873"

