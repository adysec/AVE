[basic]
description = "GoLang 的 crypto/x509 证书验证库中存在安全漏洞，当证书的 URI 中包含带有区域 ID（Zone ID）的 IPv6 地址时，攻击者可通过构造特制证书绕过 URI 名称约束（Name Constraints）检查，导致非预期域名或路径被信任。由于公共 Web PKI 不允许使用含 URI 的证书，该漏洞仅影响使用私有 PKI 且启用 URI 名称约束的场景，攻击者利用该漏洞可导致中间人攻击或证书验证绕过，CVSS 评分 6.1，危害等级中危。"
published = "2025-01-28T02:15:29.147"
remediation = "升级 Go 至 1.22.11、1.23.5 或 1.24.0-rc.2 及以上版本，其中修复了 crypto/x509 对含 IPv6 区域 ID 的 URI 名称约束校验逻辑。如使用 NetApp 产品，请参考 NTAP-20250221-0004 安装对应安全更新。无法立即升级时，避免在私有 PKI 的 URI 中使用含区域 ID 的 IPv6 地址作为临时缓解措施。"
score = 6.1
severity = "MEDIUM"
sources = ["msrc"]
title = "Go crypto/x509 IPv6 区域 ID URI 名称限制绕过漏洞"
updated = "2026-06-17T07:54:03.920"

