[basic]
description = "灵当CRM系统中的XlsFileUpload.php文件存在任意文件上传漏洞，未对上传文件类型进行有效过滤，攻击者可通过构造恶意HTTP请求上传任意文件（如PHP Webshell）到服务器，进而获取服务器控制权。攻击条件：攻击者需能够访问目标CRM系统的Web管理界面，无需登录认证即可触发。"
published = "2025-01-01"
remediation = "建议升级灵当CRM至最新版本，对XlsFileUpload.php上传接口添加文件类型白名单校验，限制仅允许上传.xls/.xlsx等办公文档格式，并禁用上传目录的脚本执行权限。"
score = 9.8
severity = "CRITICAL"
sources = ["hwpoc"]
title = "灵当CRM XlsFileUpload.php 任意文件上传漏洞"
updated = "2025-06-01"

