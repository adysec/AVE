[basic]
description = 'iCat Carbo Server 3.0.0 中的 carbo.dll 组件存在目录遍历漏洞。远程攻击者在未经过身份认证的情况下，可向目标服务器发送包含".."（点点）序列的特制 HTTP 请求，并在 icatcommand 参数中构造恶意路径，从而绕过服务器的目录访问限制，读取 Web 根目录之外的任意文件（如配置文件、源代码或敏感系统文件）。该漏洞影响运行 iCat Electronic Commerce Suite 3.0（Carbo Server 3.0.0）的服务器，攻击条件仅需网络可达目标服务并能够发起 HTTP 请求，利用方式简单、无需特殊权限，可导致服务器上敏感信息泄露。'
published = "1997-11-08T05:00:00.000"
remediation = '鉴于 iCat Carbo Server 3.0.0 已停止维护且厂商未提供补丁，建议立即迁移至受支持的电子商务平台并停用该服务。如确需临时维持运行，应在 Web 应用防火墙（WAF）中部署规则，拦截包含 ".." 路径穿越字符的 icatcommand 参数请求，同时通过 ACL 限制仅允许可信 IP 访问 carbo.dll 相关接口，并将 Web 进程对敏感系统目录的读取权限降至最低，防止攻击者进一步读取服务器敏感文件。'
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "iCat Carbo Server 3.0 目录遍历文件泄露漏洞"
updated = "2026-06-16T21:49:39.400"

