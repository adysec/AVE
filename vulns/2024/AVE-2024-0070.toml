[basic]
description = "金和OA-C6协同管理平台 DBModules.aspx 接口存在 SQL 注入漏洞，攻击者无需身份认证即可通过向 /C6/JHSoft.Web.WorkFlat/DBModules.aspx/ 的 interfaceID 参数注入恶意 SQL 语句，利用 WAITFOR DELAY 等延时函数判断注入点是否存在。成功利用该漏洞可导致数据库敏感信息泄露、数据篡改甚至获取服务器控制权，严重威胁系统安全。"
published = "0826"
remediation = "建议升级金和OA-C6协同管理平台至官方最新安全版本（v6.x及以上），厂商已修复DBModules.aspx接口的SQL注入漏洞。如无法立即升级，可在Web应用防火墙（WAF）中添加规则拦截`/C6/JHSoft.Web.WorkFlat/DBModules.aspx`路径下`interfaceID`参数包含SQL关键字（如WAITFOR、UNION、SELECT等）的请求，同时限制该页面仅允许内网IP访问作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "金和 OA-C6 协同管理平台 DBModules.aspx SQL 注入漏洞"
updated = "0826"

