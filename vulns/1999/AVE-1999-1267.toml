[basic]
description = "SGI IRIX 5.3 与 6.2 系统中的 addnetpr（/usr/lib/netaddpr）工具在处理打印机临时文件时存在符号链接漏洞。由于该程序以 root 权限运行且未对临时文件路径进行安全校验，本地低权限用户可预先创建指向任意系统文件的符号链接，诱导 addnetpr 以 root 身份覆盖该文件内容。攻击者借此可覆写如 /etc/passwd 等关键文件，进而实现本地权限提升、获取 root 权限。该漏洞仅影响本地已登录的普通用户，需具备执行 addnetpr 的权限且系统运行上述受影响版本，利用门槛较低但危害明显。"
published = "1997-05-09T04:00:00.000"
remediation = "升级 SGI IRIX 至已修复该问题的补丁版本（IRIX 6.2 建议应用 0419 或 0434 补丁集，IRIX 5.3 应用对应补丁）；在无法立即打补丁时，临时将 /usr/lib/netaddpr 移除 setuid 位（执行 chmod u-s /usr/lib/netaddpr）并限制普通用户对打印临时目录的写权限，以缓解符号链接攻击导致的任意文件写入与提权风险。"
score = 6.2
severity = "MEDIUM"
sources = ["exploitdb"]
title = "SGI IRIX addnetpr 本地符号链接任意文件写入权限提升漏洞"
updated = "2026-06-16T21:50:22.870"

