[basic]
description = "CDE 桌面环境中的 dtaction 工具的 AddSuLog 函数存在缓冲区溢出漏洞，本地攻击者可通过向该函数提交超长的用户名字符串触发缓冲区溢出，从而覆盖内存中的关键数据，成功利用此漏洞可获得目标系统的 root 权限。该漏洞影响 Digital UNIX 4.0、AIX 4.3.2、CDE 2.1、IRIX 6.5.14 及 Solaris 7.0 等多个 Unix 操作系统版本，CVSS 评分 7.2，危害等级高。"
published = "1999-09-13T04:00:00.000"
remediation = "各受影响厂商均已发布安全补丁：Sun 用户安装 Security Bulletin #192 提供的补丁，HP 用户应用 HPSBUX9909-103 中的 CDE 补丁，IBM AIX 4.3.2 用户安装 APAR IY07386，SGI IRIX 6.5.14 用户安装 SGID 19990901-01-P 补丁，Digital UNIX 4.0 用户安装 Compaq SSRT0584 补丁。由于所有受影响系统均已停止支持，强烈建议迁移至受支持的现代操作系统。"
score = 7.2
severity = "HIGH"
sources = ["exploitdb"]
title = "CDE dtaction AddSuLog 函数缓冲区溢出本地权限提升漏洞"
updated = "2026-06-16T21:48:51.420"

