[basic]
description = "SunOS 4.1.4及之前版本中的OpenWindows 3.0组件所包含的cmdtool终端模拟器及XView 3.0图形工具箱存在信息泄露漏洞。具有物理访问权限的攻击者可通过按下L2/AGAIN密钥，触发系统回显之前被隐藏的输入字符（如密码输入时的不可见字符），从而导致敏感信息被本地获取。该漏洞危害等级低，CVSS评分2.1，但利用条件要求攻击者拥有物理接触权限。"
published = "1998-07-15T04:00:00.000"
remediation = "升级 SunOS 至 4.1.4 以上版本，安装 Sun 官方补丁 ID 100482（针对 OpenWindows 3.0）和 100483（针对 XView 3.0）。如无法升级，可在系统控制台禁用 L2/AGAIN 键绑定功能，或限制物理访问权限以降低暴露风险。"
score = 2.1
severity = "LOW"
sources = ["avd"]
title = "Sun OpenWindows cmdtool 和 SunOS Xview L2/AGAIN 密钥信息泄露漏洞"
updated = "2026-06-16T21:50:08.333"

