[basic]
description = "蓝凌OA系统存在远程代码执行漏洞，攻击者可通过向系统发送特制HTTP请求触发漏洞，实现远程代码执行。该漏洞影响蓝凌OA系统多个版本，CVSS评分9.8，危害等级严重。攻击者无需身份验证即可利用此漏洞，可能导致服务器被完全控制、敏感数据泄露及业务系统瘫痪。2023年8月15日披露的安全通告确认了此漏洞，供应商已发布紧急安全补丁。攻击者可利用该漏洞执行任意命令、修改系统文件、窃取敏感数据、破坏系统稳定性，严重威胁企业信息安全和业务连续性。"
published = "2023-08-15"
remediation = "联系蓝凌官方获取安全补丁，升级至最新修复版本。在无法立即升级的情况下，建议通过WAF等安全设备配置规则拦截恶意请求，限制对OA系统的非必要网络访问，并加强日志监控及时发现异常行为。"
score = 9.8
severity = "CRITICAL"
sources = ["hwpoc"]
title = "蓝凌OA系统远程代码执行漏洞"
updated = "2023-08-15"

