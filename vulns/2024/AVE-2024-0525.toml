[basic]
description = "Redis 是一款开源内存数据库，其内嵌的 Lua 脚本引擎存在释放后使用（Use-After-Free）漏洞。经过身份认证的攻击者可通过 EVAL 或 EVALSHA 命令提交特制的 Lua 脚本，操纵垃圾回收器触发内存释放后的非法访问，从而在 Redis 服务器进程中实现远程代码执行。该漏洞影响 Redis 6.2.17 之前、7.2.7 之前以及 7.4.2 之前的版本，攻击需要低权限且攻击复杂度较高。官方已在 7.4.2、7.2.7 和 6.2.17 版本中修复，也可通过 ACL 限制 Lua 脚本执行作为临时缓解措施。"
published = "2025-01-06T22:15:09.360"
remediation = '立即升级 Redis 至 7.4.2 / 7.2.7 / 6.2.17 或更高版本。如无法升级，通过 ACL 限制 EVAL 和 EVALSHA 命令执行：在 redis.conf 中配置 `rename-command EVAL ""` 和 `rename-command EVALSHA ""`，或使用 ACL 规则 `-EVAL -EVALSHA` 禁止非受信用户执行 Lua 脚本。'
score = 7
severity = "HIGH"
sources = ["msrc"]
title = "Redis Redis Lua 库命令远程代码执行漏洞"
updated = "2026-06-17T07:56:18.577"

