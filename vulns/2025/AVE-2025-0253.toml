[basic]
description = "美特CRM系统download-new接口存在任意文件读取漏洞，攻击者可在未授权情况下通过构造特制的请求参数，利用路径遍历技术读取服务器任意文件，包括配置文件、数据库连接凭证等敏感信息。该漏洞源于对用户输入的文件路径参数缺乏有效的过滤与校验，攻击条件低，无需特殊权限即可远程利用，可能导致敏感数据泄露，进一步扩大攻击面。"
published = "0718"
remediation = "联系美特软件厂商获取最新安全补丁，升级 MetaCRM 至最新版本。如暂无法升级，需对 download-new 接口增加路径参数白名单校验，过滤 ../ 等目录穿越字符，限制文件读取范围到指定上传目录，同时在 Web 应用防火墙（WAF）侧添加路径遍历攻击拦截规则作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "美特 CRM download-new 任意文件读取漏洞"
updated = "0718"

