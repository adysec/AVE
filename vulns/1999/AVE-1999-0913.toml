[basic]
description = "Tetrix TetriNet 守护进程 1.13.16 版本存在缓冲区溢出漏洞。该漏洞源于程序在处理连接主机的 DNS 主机名时未对长度进行有效校验，当远程攻击者从一个具有超长 DNS 主机名的主机连接到目标系统的 31457 端口时，即可触发缓冲区溢出，导致守护进程崩溃产生拒绝服务，并可能进一步执行任意命令。攻击者无需身份认证，只需能够访问目标端口并控制其反向解析主机名即可实施攻击。该漏洞 CVSS v2 评分 5.0，危害等级中等。"
published = "1999-02-17"
remediation = "升级 TetriNET 服务端至修复该缓冲区溢出问题的版本（1.13.1 及以上）。若无法立即升级，可在服务端前部署防火墙或代理限制仅信任客户端连接、关闭或过滤 TetriNET 默认 31457 端口的外部访问，并启用资源限制以减少拒绝服务影响。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = '{"_meta":{},"stopReason":"end_turn","usage":{"cachedReadTokens":1664,"inputTokens":9067,"outputTokens":20,"totalTokens":10751}}'
