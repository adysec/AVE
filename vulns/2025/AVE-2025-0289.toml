[basic]
description = "扁鹊医疗 WebServiceForFirstaidApp 接口中的 GetMonitorList 方法存在 SQL 注入漏洞，攻击者无需身份认证即可通过构造特制的 HTTP 请求参数（如 UserID、SearchName），在调用 updatexml 等函数时注入恶意 SQL 语句，导致数据库敏感信息泄露。该漏洞影响扁鹊医疗系统相关版本，危害严重，可被远程利用。"
published = "0707"
remediation = "建议使用参数化查询或预编译语句重写 GetMonitorList 接口，对 UserID、OperatorID、SearchName 等参数做严格类型校验和长度限制；部署 WAF 拦截含有 updatexml、extractvalue 等报错注入特征的请求；升级扁鹊医疗至已修复该漏洞的最新版本，并限制 WebServiceForFirstaidApp.asmx 仅允许内网 IP 访问。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "扁鹊医疗 急救App WebService GetMonitorList接口SQL注入漏洞"
updated = "0707"

