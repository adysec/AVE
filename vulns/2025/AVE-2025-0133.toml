[basic]
description = "东胜物流软件 WmsZXFeeGridSource.aspx 接口存在 SQL 注入漏洞，攻击者无需身份认证即可通过构造特制的 areaname 参数向后台数据库注入恶意 SQL 语句，可导致数据库信息泄露、数据篡改甚至服务器被控制。该漏洞影响东胜物流软件多个版本，攻击者仅需向目标发送包含恶意载荷的 HTTP 请求即可触发，利用门槛低、危害严重。"
published = "0719"
remediation = "联系东胜物流官方获取最新修补版本，修复 WmsZXFeeGridSource.aspx 中 areaname 参数拼接 SQL 查询的问题；如无法升级，在 Web 应用防火墙（WAF）上添加针对 SQL 注入的规则，对 areaname 等输入参数进行严格过滤和转义，并建议在代码层改用参数化查询代替字符串拼接。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "东胜物流 东胜物流软件 WmsZXFeeGridSource.aspx SQL注入漏洞"
updated = "0719"

