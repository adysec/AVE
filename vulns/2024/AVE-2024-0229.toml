[basic]
description = "锐捷网络（RAISECOM）网关设备的 list_base_config.php 文件存在远程命令执行漏洞，攻击者可通过构造恶意的 template 参数（利用反引号命令替换）注入任意系统命令，在未授权情况下实现远程代码执行。该漏洞影响 RAISECOM 多款网关设备，攻击者仅需发送构造的 GET 请求即可在目标设备上以 Web 服务权限执行任意命令，可进一步写入 Webshell、窃取敏感数据或控制设备。攻击条件为设备暴露 Web 管理界面且无需身份认证，利用方式为发送包含命令注入载荷的 GET 请求至 /vpn/list_base_config.php 接口。建议升级至厂商发布的修复版本并限制管理接口访问。"
published = "0731"
remediation = "建议立即升级 RAISECOM 网关设备固件至最新安全版本并应用补丁。关闭不必要的 web 管理端口，限制访问权限，实施严格的输入验证和 WAF规则作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "RAISECOM 网关设备 list_base_config.php 远程命令执行漏洞"
