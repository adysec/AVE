[basic]
description = "Solaris 7/8 系统中 kcms_configure 程序存在命令行参数缓冲区溢出漏洞，本地攻击者可通过向 kcms_configure 传递过长的命令行参数触发栈缓冲区溢出，从而覆盖返回地址并执行任意代码，进而获取提升后的本地权限。该漏洞影响 Solaris 7 和 Solaris 8 系统，CVSS 评分 4.6（本地攻击、低复杂度、无需认证、部分机密性/完整性/可用性影响），攻击者需具备本地登录权限，通过构造超长命令行参数触发溢出并执行 Shellcode 实现本地提权。Sun Microsystems 已发布补丁修复此漏洞。"
published = "2001-08-02T04:00:00.000"
remediation = "建议立即安装最新的Solaris补丁更新包（针对Solaris 7.0和Solaris 8.0，应更新到最新的安全修复包）。如果无法立即完成补丁更新，作为临时缓解措施，可通过修改 `/etc/system` 文件禁用 `kcms`服务，限制对 `kcms_configure`命令的访问权限，并使用组策略确保只有授权系统管理员可以执行此命令。"
score = 4.6
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Sun Microsystems Solaris 命令行缓冲区溢出漏洞"
updated = "2026-06-16T21:54:35.943"

