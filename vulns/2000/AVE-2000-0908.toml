[basic]
description = "Pine 4.x 邮件客户端在处理 HTML 格式邮件时存在远程命令执行漏洞。当用户查看包含恶意链接的 HTML 邮件时，Pine 会调用 lynx 文本浏览器获取远程 Web 服务器上的 uuencoded 文件，随后自动解码并执行该文件，从而导致任意命令执行。攻击者无需身份认证即可利用此漏洞完全控制目标系统。该漏洞影响 Pine 4.x 所有版本，CVSS 评分 10.0，危害等级严重。"
published = "1999-06-28T04:00:00.000"
remediation = "升级到不再受影响的 Pine 5.0 以上版本，或迁移至其继任者 Alpine 邮件客户端。如无法升级，可在 Pine 配置中将 `url-viewers` 设置为空，禁用外部浏览器自动调用功能，并关闭 HTML 邮件自动渲染和 uudecode 自动解码特性以缓解风险。"
score = 10
severity = "CRITICAL"
sources = ["cve"]
title = "University of Washington Pine 远程代码执行漏洞"
updated = "2026-06-16T21:51:32.433"

