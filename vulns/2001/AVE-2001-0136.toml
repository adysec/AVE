[basic]
description = "ITAfrica WEBactive HTTP Server 1.0 存在目录遍历漏洞，远程攻击者无需认证即可通过在 URL 中插入 ..（点点）序列绕过路径限制，读取服务器上任意文件。该漏洞源于 Web 服务器对用户请求路径未进行充分过滤和规范化，攻击者可利用此漏洞窃取敏感配置文件、源代码或系统文件，导致信息泄露。"
published = "2001-05-03T04:00:00.000"
remediation = "ITAfrica WEBactive HTTP Server 1.00 已停止维护，官方未发布安全补丁。建议立即停止使用并迁移至受支持的 Web 服务器（如 Apache、Nginx）。临时缓解措施：在反向代理或 WAF 层过滤 URL 中的 `../` 及编码变形（`..%2f`、`%2e%2e%2f` 等），并限制 Web 服务进程仅读取网站根目录下的文件。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "ITAfrica WEBactive HTTP Server 目录遍历漏洞"
updated = "2026-06-16T21:54:04.053"

