[basic]
description = "蓝凌OA（Landray OA）系统后台登录接口 getLoginSessionld.html 存在认证绕过漏洞，该接口未对用户身份进行有效验证，远程攻击者无需任何认证即可直接访问该接口绕过登录流程，获取系统后台管理权限。攻击者可进一步利用后台功能执行敏感操作，如获取用户数据、修改系统配置等，对系统安全构成严重威胁。"
published = "08.08"
remediation = "立即联系蓝凌官方获取最新安全补丁，升级至 MK 数智化工作平台最新版本。在升级前，通过 WAF 或反向代理限制对 /sys/ui/sysui_getLoginSessionld.html 路径的访问，仅允许白名单 IP 访问后台管理页面，并删除或重命名该文件作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "蓝凌OA 后台登录绕过漏洞"
updated = "08.08"

