[basic]
description = "UMN Gopherd 2.x 存在缓冲区溢出漏洞，远程攻击者可通过向 Gopher 服务发送特制的 DES 密钥生成请求（GDESkey），其中包含超长的 ticket 值，从而触发缓冲区溢出，导致任意命令执行。该漏洞影响明尼苏达大学（UMN）Gopherd 2.x 版本，CVSS 评分 10.0，危害等级严重。攻击者无需身份认证即可远程利用此漏洞。"
published = "2000-10-20T04:00:00.000"
remediation = "UMN Gopherd 2.x 已停止维护，官方未发布安全补丁。建议立即停用 Gopher 协议服务，迁移至 HTTP/HTTPS；如无法停用，在防火墙限制 70/TCP 端口仅允许可信来源访问，并禁用 GDESkey 密钥生成请求处理功能作为临时缓解措施。"
score = 10
severity = "CRITICAL"
sources = ["exploitdb"]
title = "University of Minnesota Gopherd 2.x 缓冲区溢出漏洞"
updated = "2026-06-16T21:52:23.430"

