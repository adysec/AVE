[basic]
description = "SCO OpenServer 5.0.6 的 lpadmin 命令存在缓冲区溢出漏洞，本地攻击者可通过向该命令的第一个参数提交超长字符串触发缓冲区溢出，从而覆盖内存中的关键数据，导致攻击者获取额外的系统权限。该漏洞影响 SCO OpenServer 5.0.6 版本，CVSS 评分 7.5，危害等级高。攻击者需拥有本地系统访问权限，利用方式简单，成功利用后可完全控制受影响系统。"
published = "2001-08-22T04:00:00.000"
remediation = "该漏洞影响已停止维护的 SCO OpenServer 5.0.6，官方不再提供补丁。建议立即升级到受支持的 SCO OpenServer 版本；若无法升级，执行 `chmod 750 /usr/lib/lpadmin` 移除 setuid 位以消除提权风险，并严格限制可登录系统的本地用户范围。"
score = 7.5
severity = "HIGH"
sources = ["exploitdb"]
title = "SCO OpenServer 5.0.6 lpadmin 缓冲区溢出本地权限提升漏洞"
updated = "2026-06-16T21:54:34.313"

