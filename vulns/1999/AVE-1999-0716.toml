[basic]
description = "tags.<value>Internet Explorer 4.0 和 5.0 中遗留的 Preloader ActiveX 控件存在任意文件读取漏洞。该控件原本用于页面预加载处理，在 IE 5.0 中已不再使用但未被从系统中移除。未经身份认证的远程攻击者可构造恶意网页，通过 object 或 embed 标签在用户浏览器中重新实例化该控件，绕过同源策略安全限制，读取用户本地硬盘上的任意文件内容。该漏洞影响 Internet Explorer 4.0 和 5.0 版本，攻击者需诱使目标用户访问恶意网页才能触发利用，可导致敏感文件信息泄露。微软已在 MS99-018 安全公告中发布补丁 KB231452 彻底移除该遗留控件以修复此问题。"
published = "1999-05-27T04:00:00.000"
remediation = "升级到 Internet Explorer 5.01 Service Pack 2 或 IE 5.5 及以上版本以修复 Preloader ActiveX 控件任意文件读取缺陷；在过渡期间，可在 Internet Explorer 的「Internet 选项 → 安全 → 自定义级别」中将 ActiveX 控件与插件设为「禁用」或「提示」，并通过组策略限制 Preloader 控件（clsid）的运行作为临时缓解。"
score = 5.1
severity = "MEDIUM"
sources = ["avd"]
title = "Microsoft Internet Explorer 任意文件读取漏洞"
updated = "2026-06-16T21:49:19.540"

