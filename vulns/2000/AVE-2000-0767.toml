[basic]
description = "HP OpenView Network Node Manager (NNM) 6.1 及更早版本的 OverView5 CGI 程序中存在缓冲区溢出漏洞，该漏洞源于 Java SNMP MIB Browser 对对象 ID 解析处理不当。远程攻击者可通过向 snmp.exe 服务发送特制的 SNMP 请求触发该漏洞，导致目标系统拒绝服务，在某些条件下可能执行任意命令。该漏洞影响 HP OpenView NNM 6.1 及之前版本，CVSS 评分 5.0，危害等级中等。"
published = "2000-12-11T05:00:00.000"
remediation = "升级 HP OpenView Network Node Manager 至 6.2 及以上版本，该版本已修复 OverView5 CGI 中 SNMP MIB Browser Object ID 解析的缓冲区溢出问题。若无法升级，建议在防火墙或网络边界限制对 SNMP 服务（端口 161/162）和 HTTP 管理端口的访问，仅允许可信 IP 连接。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "HP OpenView Network Node Manager SNMP 服务缓冲区溢出漏洞"
updated = "2026-06-16T21:53:04.140"

