[basic]
description = "Unix 系统中存在权限配置不当漏洞：某个非 root 名称的账户被错误地分配了 UID 0（即 root 用户标识符）。由于操作系统以 UID 而非用户名为依据判定特权，该账户因此拥有与 root 等同的超级用户权限。影响范围涵盖所有采用传统 UID 权限模型的 Unix 及类 Unix 系统。攻击条件为攻击者已获得该异常账户凭据或利用其他途径登录该账户。利用方式上，攻击者可直接以该账户执行任意系统管理操作（如读取/修改敏感文件、创建后门、提权持久化），等效于完全控制整台主机，危害等级严重（CVSS 10.0）。"
published = "1999-01-01T05:00:00.000"
remediation = "立即在系统中检查所有用户账户的UID分配，删除所有不应该拥有UID 0的非root账户，并重新创建root账户以彻底恢复系统权限控制机制。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "Unix系统 非 root 账户 UID 0 权限提升漏洞"
updated = "2026-06-16T21:48:38.127"

