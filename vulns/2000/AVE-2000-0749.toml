[basic]
description = 'Unify eWave ServletExec 3.0C及更早版本存在拒绝服务漏洞。该ServletExec作为JSP/Java Servlet引擎插件，可集成于Apache、IIS、Netscape等Web服务器中。远程攻击者通过向目标服务器发送包含"/servlet/ServletExec"路径的HTTP请求，强制ServletExec引擎重新初始化并尝试在80端口绑定服务线程。由于Web服务器已占用该端口，导致java.net.BindException异常，造成ServletExec引擎异常终止，所有Java Servlet/JSP服务中断，需重启ServletExec服务方可恢复。该漏洞仅影响ServletExec组件，不影响Web服务器本身正常运行。'
published = "2000-12-11"
remediation = '升级至 ServletExec 3.0E 或更高版本以彻底修复此漏洞。若无法立即升级，可在Web服务器（Apache/IIS/Netscape）配置中添加URL访问控制规则，拦截包含"/servlet/ServletExec"的请求路径作为临时缓解措施。'
score = 5.0
severity = "MEDIUM"
sources = [
    "cve",
    "exploitdb",
]
title = "Unify eWave ServletExec 拒绝服务漏洞"
updated = "2026-06-16"

