[basic]
description = "Red Hat Linux 6.1 的 ORBit 和 esound 组件在生成认证密钥时使用了弱随机数，导致本地攻击者可预测并猜测到认证密钥，从而绕过身份认证机制获取未授权访问。该漏洞影响 Red Hat Linux 6.1 系统，CVSS 评分 7.5，危害等级高危，攻击者需拥有本地账号权限才能利用此漏洞。"
published = "1999-12-03T05:00:00.000"
remediation = "应用 Red Hat 安全公告 RHSA-1999:058-01 对应的更新，升级 ORBit 和 esound 软件包以修复弱随机数生成问题。由于 Red Hat Linux 6.1 已停止维护超过 20 年，建议迁移至受支持的 Red Hat Enterprise Linux 版本。临时缓解措施包括限制本地非授信用户登录系统。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "Red Hat Linux 6.1 ORBit和esound弱认证漏洞"
updated = "2026-06-16T21:51:32.937"

