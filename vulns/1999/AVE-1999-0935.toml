[basic]
description = "tin 1.4.0 在用户主目录下创建 .tin 配置目录时使用默认权限 drwxr-xr-x（755），同时 .inputhistory 文件权限为 -rw-rw-r--（664）。当用户使用需要认证的新闻服务器时，tin 会记录所有键盘输入并保存至 ~/.tin/.inputhistory，其他本地用户可直接读取该文件获取明文密码等敏感信息。"
published = "1999-11-17"
remediation = "升级 tin 至更高版本修复目录权限问题；或手动执行 rm -f ~/.tin/.inputhistory && touch ~/.tin/.inputhistory && chmod 000 ~/.tin/.inputhistory 禁止其他用户读取该文件。同时建议使用安全认证方式避免密码明文存储。"
score = 4.6
severity = "MEDIUM"
sources = ["cve"]
title = "tin 1.4.0 .tin目录权限不安全导致密码泄露漏洞"
updated = "2024-06-16"

