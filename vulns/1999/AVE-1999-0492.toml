[basic]
description = "Check Point Firewall-1 防火墙在处理以 ACK 或其他非 SYN 数据包开始的连接时设置了过长的超时时间，攻击者可通过向无响应系统发起大量连接尝试耗尽连接表资源，导致防火墙拒绝服务。该漏洞影响 Check Point Firewall-1 3.0 和 4.0 版本，攻击者无需认证即可远程发起大量伪造连接请求耗尽连接表资源，导致防火墙无法处理合法连接请求，造成拒绝服务。CVSS 评分 2.1，属于低危级别拒绝服务漏洞。"
published = "1999-07-29T04:00:00.000"
remediation = "升级 Check Point Firewall-1 至 4.1 SP2 或更高版本，并在防火墙策略中将非 SYN 包连接超时时间从默认值调低至 10 秒以内，或在边界路由器配置 ACL 丢弃非 SYN 首包的新建连接尝试作为临时缓解措施"
score = 2.1
severity = "LOW"
sources = ["epss"]
title = "Check Point Firewall-1 防火墙表饱和拒绝服务漏洞"
updated = "2026-06-16T21:49:01.327"

