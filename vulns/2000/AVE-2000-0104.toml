[basic]
description = "McAfee Virus Scan 与 Norton Anti-Virus 等杀毒软件的默认配置未将 Windows 回收站文件夹（RECYCLED）纳入病毒扫描范围，攻击者可将恶意代码存放于回收站目录中，绕过杀毒软件的实时监控与文件扫描检测。该漏洞影响 McAfee 4.0、Network Associates for Windows NT 4.0.2/4.0.3a 及 Norton AntiVirus 2000 等版本，CVSS 评分 7.2，危害等级高。攻击者无需特殊权限，只需将恶意文件写入回收站即可实现免杀存放，后续通过其他方式诱导用户执行即可完成攻击。"
published = "1999-12-22T05:00:00.000"
remediation = '在 McAfee VirusScan 中手动添加 RECYCLED 文件夹到扫描范围，或升级至支持回收站扫描的后续版本；Norton AntiVirus 2000 用户应升级到 Norton AntiVirus 2001 或更高版本，其默认配置已包含回收站扫描。如无法升级，创建自定义扫描策略将 `C:\RECYCLED` 和 `C:\RECYCLER` 目录加入实时监控路径。'
score = 7.2
severity = "HIGH"
sources = ["exploitdb"]
title = "McAfee Virus Scan 和 Norton Anti-Virus 回收站文件夹扫描绕过漏洞"
updated = "2026-06-16T21:51:02.397"

