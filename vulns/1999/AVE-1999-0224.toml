[basic]
description = "WebRamp 200i 及 M3 设备的 Web 管理接口存在默认弱口令。攻击者可通过网络访问设备管理页面，使用出厂默认用户名和密码登录，从而获取设备完全控制权限，包括修改网络配置、查看敏感信息等。该漏洞影响 WebRamp 200i 和 M3 系列产品，可通过网络远程利用，危害等级为高。"
published = "1999-08-03"
remediation = "立即登录 WebRamp Web 管理界面修改默认管理员密码，禁止继续使用空密码或出厂预设口令。通过防火墙或访问控制列表限制管理端口（通常为 TCP 80/443）的访问来源，仅允许受信任管理网段连接。该产品年代久远且已停止维护，若仍在生产环境中使用，应尽快隔离管理面并替换为具备强认证与可更新固件的现代网络设备。"
score = 7.5
severity = "HIGH"
sources = [
    "cve",
    "epss",
]
title = "Ramp Networks WebRamp 默认口令漏洞"
updated = "2026-06-16"

