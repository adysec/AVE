[basic]
description = "Linux 内核 Hyper-V 驱动工具（hv_util）中的 KVP（键值对）和 VSS（卷影副本）组件存在条件竞争漏洞。当 KVP 或 VSS 守护进程在 VMBus 通道的环形缓冲区完全初始化之前启动时，守护进程通过字符设备注册自身会触发尚未就绪的回调函数，导致空指针解引用，引发内核崩溃（panic）。本地攻击者可在具备低权限条件下，通过控制 KVP/VSS 守护进程的启动时机触发该条件竞争，造成系统拒绝服务。该漏洞影响 Linux 内核多个版本，CVSS 评分 5.5，危害等级中危。官方修复方案为调整 util_probe() 中的初始化顺序，确保在 vmbus_open() 完成环形缓冲区初始化后再创建字符设备入口。"
published = "2025-01-11T13:15:28.353"
remediation = "立即更新 Linux 内核至以下已修复版本：5.4.289、5.10.233、5.15.176、6.1.122、6.6.68、6.12.7 或更高版本。对应各发行版，Debian 11/12 用户安装 linux 6.1.122-1 及以上版本，Ubuntu 24.04 用户安装 USN-7381-1 更新。如无法立即升级，可卸载 hv_utils 内核模块（rmmod hv_utils）并阻止 KVP/VSS 守护进程自启动，避免竞争条件触发内核空指针解引用崩溃。"
score = 5.5
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux Kernel Hyper-V 工具驱动空指针解引用漏洞"
updated = "2026-06-17T08:11:26.560"

