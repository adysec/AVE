[basic]
description = "Network Associates（NAI）VirusScan NT 在通过 FTP 方式自动更新病毒定义文件（scan.dat）时，未能正确校验更新过程是否真正成功。攻击者可借助被篡改或不可信的 FTP 服务器返回伪造的成功响应，使客户端误以为病毒库已更新，而实际仍使用旧版本病毒定义，从而绕过防护。该漏洞影响依赖 FTP 自动升级的 Windows NT 环境下的反病毒能力，攻击前提为攻击者能控制或劫持更新所用的 FTP 通道。"
published = "1999-05-05"
remediation = "升级到 NAI VirusScan NT 4.0.3 或更高版本以修复 FTP 升级时 scan.dat 病毒库文件未正确更新的问题；若无法立即升级，应改为通过安全 HTTP/HTTPS 或本地介质手动导入病毒库并更新 scan.dat，并在更新后比对文件校验和与版本号，确认病毒库确实更新成功而非仅显示成功提示，同时限制 FTP 服务器访问来源以缓解风险。"
score = 5.1
severity = "MEDIUM"
sources = ["avd"]
title = "NAI VirusScan NT FTP 病毒库更新验证绕过漏洞"
updated = "2026-07-19"

