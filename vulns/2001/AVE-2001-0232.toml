[basic]
description = "Apache HTTP Server 的 htpasswd 和 htdigest 工具存在符号链接（symlink）竞争漏洞。本地攻击者可通过创建恶意符号链接，诱使这些工具在创建或更新密码文件时跟随符号链接写入任意文件，导致目标文件被覆盖或破坏。该漏洞影响 Apache 1.3.14、2.0a9 及早期版本，攻击者需具备本地系统访问权限，CVSS 评分 3.3，危害等级低。建议升级至 Apache 1.3.17 及以上版本以修复此漏洞。"
published = "2001-03-12T05:00:00.000"
remediation = "升级 Apache 至 1.3.20 或 2.0.16 及以上版本，这些版本已修复 htpasswd/htdigest 在创建临时文件时未检查符号链接的问题。如无法升级，确保运行 htpasswd/htdigest 的目录仅由受信任用户写入，或使用 umask 限制文件权限，避免攻击者通过符号链接覆盖系统关键文件。"
score = 3.3
severity = "LOW"
sources = ["redhat"]
title = "Apache HTTP Server htpasswd 和 htdigest 符号链接攻击漏洞"
updated = "2026-06-16T21:53:43.830"

