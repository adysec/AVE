[basic]
description = "Sendmail 5 存在多个未指明安全漏洞，影响运行 Sun SunOS 4.1.3_U1 及 4.1.4 操作系统的系统。远程攻击者可在无需认证的情况下，通过低复杂度的攻击手段利用这些漏洞，对目标系统的机密性、完整性和可用性造成部分影响。具体攻击向量和影响细节未完全公开，Sun 公司已发布安全补丁进行修复。"
published = "1999-12-31T05:00:00.000"
remediation = '升级 sendmail 至 8.9.x 及以上版本（sendmail 8 系列重构了安全架构，默认关闭 wiz/debug 等危险命令），或迁移到 Postfix/Exim 等现代 MTA。对于 SunOS 4.1.x 系统，建议升级至 Solaris 8/9 并安装对应 sendmail 补丁簇（补丁 ID 109326-xx/109327-xx）。如无法升级，在 /etc/sendmail.cf 中设置 "O PrivacyOptions=restrictqrun" 并禁用 SMTP EXPN/VRFY 命令。'
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "Sun SunOS sendmail 5 未指明漏洞"
updated = "2026-06-16T21:50:47.503"

