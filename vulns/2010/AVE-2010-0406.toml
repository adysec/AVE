[basic]
description = "Microsoft Office 在处理特制 RTF 格式数据时存在栈缓冲区溢出漏洞，由于对 RTF 数据长度边界检查不足，攻击者可构造恶意 RTF 文件并诱使用户打开，进而在目标系统上执行任意代码。该漏洞影响 Office XP SP3、Office 2003 SP3、Office 2007 SP2、Office 2010 以及多个 Mac 版本，CVSS 评分 7.8，危害等级高。Microsoft 已在 MS10-087 安全公告中发布修复补丁。"
published = "2010-11-10T03:00:02.087"
remediation = "立即安装 Microsoft 2010 年 11 月安全公告 MS10-087 对应更新（Office 2003 对应 KB2423930，Office 2007 对应 KB2423931，Office 2010 对应 KB2423932），可通过 Windows Update 或 Microsoft Update 自动获取。临时缓解措施：启用 Microsoft Office 文件阻止策略，阻止 RTF 文件通过 Outlook 或 Office 打开；或使用 Microsoft 提供的 Fix it 自动解决方案禁用 RTF 解析功能。"
score = 7.8
severity = "HIGH"
sources = ["kev"]
title = "Microsoft Office RTF 解析栈缓冲区溢出远程代码执行漏洞"
updated = "2026-06-16T23:22:36.323"

