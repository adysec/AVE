[basic]
description = "imwheel 中的 imwheel-solo 脚本存在缓冲区溢出漏洞，本地攻击者可通过设置超长 HOME 环境变量触发该漏洞，导致缓冲区溢出，从而获取 root 权限。该漏洞影响 Halloween Linux 4.0、Red Hat Linux 6.1/6.2 等版本，CVSS 评分 7.2，危害等级高。攻击者需要拥有本地系统访问权限方可利用此漏洞提权。"
published = "2000-03-13T05:00:00.000"
remediation = "立即卸载 imwheel 软件包（`rpm -e imwheel` 或 `apt-get remove imwheel`），或升级到已修复此漏洞的版本。如必须使用，可通过 `chmod -s imwheel-solo` 移除 SUID 位以消除提权风险，并避免在 HOME 环境变量中传入超长字符串。"
score = 7.2
severity = "HIGH"
sources = ["redhat"]
title = "RedHat Linux imwheel 缓冲区溢出本地权限提升漏洞"
updated = "2026-06-16T21:51:16.610"

