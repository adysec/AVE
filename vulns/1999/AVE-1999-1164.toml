[basic]
description = "Cobalt RaQ 2.0 与 RaQ 3i 设备上使用的 cgiwrap 程序未能正确识别运行特定 CGI 脚本所对应的用户身份，导致同一物理主机上不同虚拟站点之间的权限隔离失效。攻击者为具备某一虚拟站点管理权限的恶意站点管理员，可通过构造并访问特定的 CGI 请求，越权查看或修改其他虚拟站点上的数据。该漏洞利用无需普通用户身份，仅需站点管理员权限即可在本地多租户环境中实施跨站越权访问，影响在同一 Cobalt RaQ 系统上托管的所有虚拟站点的数据安全与隔离性。"
published = "1999-11-08"
remediation = "RaQ 2 用户使用 `rpm -U cgiwrap-raq2-3.6.4.C5.mips.rpm` 升级 cgiwrap 至 3.6.4.C5 版本，RaQ 3i 用户使用 `rpm -U cgiwrap-pacifica-3.6.4.C5.i386.rpm` 升级。升级后 cgiwrap 将正确识别用户身份并保持虚拟站点隔离。无法升级的用户应禁用 cgiwrap 服务或限制虚拟站点间 CGI 脚本目录的访问权限。"
score = 3.6
severity = "LOW"
sources = ["cve"]
title = "Cobalt RaQ cgiwrap 虚拟站点权限隔离绕过漏洞"
updated = "2026-06-16"

