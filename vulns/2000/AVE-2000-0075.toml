[basic]
description = "VMware 1.1.2 版本的工作站产品存在拒绝服务漏洞，其根因在于程序在处理某些文件或资源时未对符号链接（symlink）进行充分的安全校验，本地用户可通过构造指向敏感文件或特殊目标的符号链接并发起访问，诱使程序误读或破坏目标资源，从而导致程序崩溃或系统服务不可用。该漏洞影响运行 VMware 1.1.2 的本地系统，攻击前提是攻击者已拥有目标主机的本地登录权限（非远程利用），利用方式相对简单，仅需创建恶意符号链接即可触发拒绝服务，CVSS 评分为 3.6，危害等级较低，但可能影响虚拟化环境的可用性。"
published = "2000-01-17T05:00:00.000"
remediation = "升级 VMWare 至 1.1.3 或更高版本，该版本已修复符号链接攻击漏洞。临时缓解措施：限制本地用户对虚拟机共享目录的写权限，避免恶意符号链接创建。"
score = 3.6
severity = "LOW"
sources = ["cve"]
title = "VMware Workstation 本地拒绝服务漏洞"
updated = "2026-06-16T21:50:58.780"

