[basic]
description = "Apache 1.1、NCSA HTTPd 1.5.2 及 Netscape Server 1.12/1.1/2.0 等早期 Web 服务器默认安装的 nph-test-cgi 脚本未对用户请求进行充分过滤，远程攻击者无需身份认证即可通过向该脚本发送特制请求，遍历并列出服务器上的任意文件目录，导致敏感信息泄露。该漏洞影响多个主流 Web 服务器早期版本，CVSS 评分 7.5，危害等级高。厂商建议移除 nph-test-cgi 脚本或升级至不受影响版本。"
published = "1996-12-10T05:00:00.000"
remediation = "立即删除或禁用 nph-test-cgi 脚本（该脚本仅用于测试，不应部署在生产环境）；升级 Apache 至 2.4 及以上版本（1.3 系列已终止支持，1.1 含多个安全漏洞）；如使用 NCSA HTTPd，建议迁移至 Apache 2.4；Netscape Enterprise Server 用户应升级至 Oracle iPlanet Web Server 7.0+；同时在 Web 服务器配置中禁止 CGI 目录执行任意文件读取操作，严格控制 CGI 脚本文件权限为 750。"
score = 7.5
severity = "HIGH"
sources = ["exploitdb"]
title = "Apache/NCSA/Netscape Web服务器 nph-test-cgi脚本任意文件列表漏洞"
updated = "2026-06-16T21:47:26.793"

