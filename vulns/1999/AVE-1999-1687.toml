[basic]
description = "Microsoft Excel 97 在调用工作表函数前未向用户发出安全警告，攻击者可通过构造包含恶意 CALL 函数的 XLS 文件诱导用户打开，利用 CALL 函数加载并执行恶意 DLL，从而在目标系统上执行任意命令。该漏洞影响 Microsoft Excel 97 及后续兼容版本，攻击者可通过社会工程方式诱导受害者打开特制文档触发，无需身份认证。目前已存在公开利用代码，危害较大。"
published = "1999-12-31T05:00:00.000"
remediation = '立即安装 Microsoft 安全公告 MS98-018 提供的补丁程序，该补丁可通过 https://docs.microsoft.com/en-us/security-updates/securitybulletins/1998/ms98-018 获取。同时在 Excel 中将宏安全级别设置为"高"以阻止未签名的 CALL 函数执行，并建议升级到 Office 2000 及以上版本以彻底规避该问题。'
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "Microsoft Excel 97 工作表函数任意代码执行漏洞"
updated = "2026-06-16T21:49:36.767"

