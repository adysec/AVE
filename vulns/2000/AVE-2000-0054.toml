[basic]
description = "英特尔 InBusiness 电子邮件站的 daynad 程序存在授权验证缺失漏洞，远程攻击者无需任何认证即可通过网络访问该服务，进而修改设备配置、删除服务器文件或读取邮件内容。该漏洞影响英特尔 InBusiness E-mail Station 相关版本，CVSS 评分 7.5，危害等级高。厂商已发布安全公告，建议用户升级固件或限制网络访问。"
published = "1999-12-14T05:00:00.000"
remediation = "Intel InBusiness E-mail Station 已停止技术支持，建议立即迁移至受支持的邮件服务器方案（如 Exchange 或 Postfix）；对于仍在使用该设备的场景，须在网络防火墙上严格限制对 daynad 端口（默认 63/TCP）的访问来源，仅允许受信任管理 IP 连接，并隔离该设备至独立 VLAN。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "英特尔 InBusiness E-mail Station daynad 授权问题漏洞"
updated = "2026-06-16T21:50:56.083"

