[basic]
description = "用友U8-CRM系统的 /bgt/reservationcomplete.php 接口存在SQL注入漏洞。该接口在处理 reservationcomplete.php 请求时未对 ID 参数进行充分的输入校验与过滤，且通过 DontCheckLogin=1 参数可绕过登录鉴权，导致攻击者无需身份认证即可构造恶意 SQL 语句。攻击者可在 ID 参数中拼接分号并执行 SQL Server 扩展存储过程 master..xp_cmdshell，进而在服务器上写入 webshell 文件（如 hello.php），实现远程命令执行。该漏洞影响部署了用友U8-CRM系统且存在上述接口的相关版本，攻击条件为可网络访问目标系统该接口并发送特制请求，危害极大。"
published = "0819"
remediation = "建议立即升级用友U8-CRM系统至最新版本V13.1及以上版本，官方已修复该SQL注入漏洞。临时缓解措施：在Web应用防火墙(WAF)配置SQL注入防护规则，拦截包含xp_cmdshell、SQL注入关键字的请求；限制数据库账户权限，禁止xp_cmdshell等危险存储过程执行；限制数据库服务器外连权限，禁止外连公网。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "用友 用友U8-CRM系统 SQL注入漏洞"
updated = "0819"

