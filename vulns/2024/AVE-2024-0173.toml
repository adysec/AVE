[basic]
description = "三汇网关管理软件存在未授权远程命令执行漏洞，其 debug.php 接口未对 comdtype、cmd 等表单参数做身份校验与命令过滤。攻击者在无需认证的情况下，可通过构造 multipart/form-data 请求，向该接口提交 comdtype=1 与 cmd=<命令>（如 sleep 3）参数来注入并执行任意系统命令。此漏洞影响暴露该管理软件且开启 debug.php 接口的网关设备，攻击者可借此完全控制设备、植入后门或进一步横向渗透内网，危害严重。"
published = "0812"
remediation = "三汇网关管理软件 debug.php 存在未授权远程命令执行漏洞，攻击者可借 comdtype/cmd 参数执行系统命令。建议立即升级到三汇官方发布的最新修复版本（联系厂商获取含 debug.php 鉴权校验的固件/补丁）；临时缓解可在反向代理或防火墙处封禁对 /debug.php 的外部访问、关闭 WAN 侧管理端口，并删除或重命名暴露的 debug.php 接口。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "三汇 网关管理软件 debug.php 远程命令执行漏洞"
updated = "0812"

