[basic]
description = "Lynx 文本模式网页浏览器在调用外部程序处理特定协议（如 telnet）时，未对用户可控的命令行参数进行有效过滤，导致远程攻击者可构造包含恶意命令行参数的特制 URL（如 telnet:// 协议链接），诱导受害者在 Lynx 中打开，从而在受害者系统上以当前用户权限执行任意命令。该漏洞影响 Lynx 多个版本，CVSS 评分 10.0，属严重级别远程命令执行漏洞，攻击者无需身份认证即可远程利用，仅需诱导用户点击恶意链接即可触发命令注入，导致任意代码执行。"
published = "1999-09-15T04:00:00.000"
remediation = "升级 Lynx 至 2.8.1rel.2 或 2.8.2 及以上修复版本（如从源码编译请打上官方安全补丁）。临时缓解措施：在 lynx.cfg 中注释或移除 TELNET、TN3270 等外部程序调用配置（如 `TELNET_PROGRAM`），并禁止 Lynx 通过 telnet:// 等协议拉起外部程序；同时以低权限用户运行 Lynx，限制其对系统命令的调用能力。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "Lynx WWW 客户端 远程命令执行漏洞"
updated = "2026-06-16T21:49:07.183"

