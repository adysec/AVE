[basic]
description = "Windows 95/98 网络软件在处理 UNC 路径时存在缓冲区溢出漏洞，远程攻击者可通过向目标系统发送包含超长文件名字符串的特制 URL 请求触发该漏洞，导致系统拒绝服务或任意代码执行。攻击条件为诱使用户访问恶意网页或网络共享，无需身份认证即可利用。该漏洞影响 Windows 95 和 Windows 98 系统，CVSS 评分 7.6，危害等级高。"
published = "1999-11-12T05:00:00.000"
remediation = "Windows 95/98 已停止支持且无官方补丁。建议立即升级至 Windows 10 或更高版本。如无法升级，可在网络防火墙层面阻止外部对 139/TCP、445/TCP 端口的访问，并禁用 Microsoft 网络的文件和打印机共享功能作为临时缓解措施。"
score = 7.6
severity = "HIGH"
sources = ["avd"]
title = "Microsoft Windows 95/98 UNC 缓冲区溢出漏洞"
updated = "2026-06-16T21:51:29.500"

