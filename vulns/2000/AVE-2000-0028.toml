[basic]
description = "Sun Solaris 操作系统中 Desktop Management Interface（DMI）服务的 dmispd 守护进程存在拒绝服务漏洞。dmi_cmd 组件未对 /var/dmi/db 数据库目录的文件创建操作进行充分限制，本地攻击者可通过持续向该目录写入大量文件来耗尽磁盘空间，导致系统因磁盘满载而拒绝服务。该漏洞仅需本地用户权限即可触发，CVSS v2 评分为 5.0（中危），影响 Solaris 7（SunOS 5.7）版本。"
published = "1999-12-22"
remediation = "升级 Solaris 至已修复版本，或安装 Sun 官方安全补丁（Solaris 7 SPARC 补丁 106954 系列，x86 补丁 106955 系列）。若暂时无法打补丁，可通过将 /var/dmi/db 目录权限设置为 700、限制仅 dmispd 服务账户可写，并对该目录所在分区配置磁盘配额以防止空间耗尽。同时建议禁用不需要的 DMI 服务以减小攻击面。"
score = 5.0
severity = "MEDIUM"
sources = ["cve"]
title = "Sun Solaris DMI 服务 dmispd 拒绝服务漏洞"
updated = "2026-06-16"

