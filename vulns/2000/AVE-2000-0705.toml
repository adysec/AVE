[basic]
description = "Fortech Proxy+ 存在安全绕过漏洞，远程攻击者可通过 telnet 代理将连接重定向至管理服务，从而绕过访问限制，未经授权访问管理接口。该漏洞源于对代理连接来源的验证不充分，攻击者无需身份认证即可利用，影响 Fortech Proxy+ 相关版本，CVSS 评分 5.0，危害等级中危。"
published = "2000-06-26T04:00:00.000"
remediation = "升级 Proxy+ 至最新版本（厂商已通过 FAQ 文章 art01002 发布修复方案）。在防火墙规则中限制管理服务仅允许特定可信 IP 访问，并禁用不必要的外部 telnet 代理端口转发以防止绕过攻击。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Fortech Proxy+ 安全绕过漏洞"
updated = "2026-06-16T21:52:04.870"

