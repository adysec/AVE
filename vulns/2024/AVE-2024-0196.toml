[basic]
description = "H3C CVM 云管理平台 upload 接口存在前台任意文件上传漏洞，攻击者无需认证即可通过 token 参数中的路径遍历（../../../../../var/lib/tomcat8/webapps/cas/js/lib/buttons/）将恶意 JSP 木马上传至 Tomcat webapps 目录，实现远程代码执行。该漏洞影响 H3C CVM 云桌面管理平台，攻击者仅需构造包含路径穿越的 token 参数并上传 JSP webshell，即可在目标 Tomcat 服务器上获取代码执行权限，危害等级严重。厂商已发布补丁修复该漏洞，建议受影响用户尽快升级修复。"
published = "0725"
remediation = "建议升级H3C-CVM系统到最新稳定版本（≥8.1.2），并针对/upload接口配置严格的文件类型白名单验证，关闭所有动态文件执行权限，同时限制上传目录权限，落实至少20字节的文件权限控制措施，并部署文件内容安全检测策略以防止恶意代码混入。"
score = 5
severity = "MEDIUM"
