[basic]
description = "gFTP FTP 客户端在 2.0.8 之前版本中存在格式字符串漏洞，该漏洞源于软件在处理恶意 FTP 服务器响应时，未正确验证格式字符串参数，导致攻击者可通过精心构造的格式化字符串（如 %n、%s 等格式控制符）控制程序内存读写。远程未经认证的攻击者可搭建恶意 FTP 服务器，诱导受害者使用受影响版本的 gFTP 客户端连接，通过发送包含恶意格式字符串的 FTP 响应数据（如文件列表、欢迎消息等），实现远程任意代码执行。该漏洞影响运行 Linux/Unix 系统且使用 gFTP 2.0.8 之前版本的所有用户，攻击者无需身份验证即可远程触发，CVSS 评分 7.5（HIGH，AV:N/AC:L/PR:N/UI:N/S:U/C:P/I:P/A:P），对系统机密性、完整性和可用性均造成部分影响。该漏洞已在 gFTP 2.0.8 版本中修复，用户应立即升级至 2.0.8 或更高版本，或应用 Debian DSA-057 等发行版提供的安全补丁。"
published = "2001-06-27T04:00:00.000"
remediation = "建议立即升级 gftp 到 2.0.8 或更高版本，或通过包管理器安装 Debian DSA-057 安全更新（apt-get update && apt-get upgrade gftp）。如无法立即升级，请避免连接不可信的 FTP 服务器，或在防火墙层面限制仅允许连接受信任的 FTP 服务器 IP。"
score = 7.5
severity = "HIGH"
sources = ["redhat"]
title = "gFTP FTP客户端 格式化字符串远程代码执行漏洞"
updated = "2026-06-16T21:54:24.217"

