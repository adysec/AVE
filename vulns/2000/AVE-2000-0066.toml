[basic]
description = "Solaris 7.0 系统中的 DMI（桌面管理接口）组件存在输入验证缺陷，本地攻击者可通过向 /var/dmi/db 数据库目录写入特制的畸形文件，触发 dmispd 守护进程解析异常，导致该进程崩溃退出，造成拒绝服务。该漏洞需要攻击者拥有本地系统访问权限，无法远程利用，但可导致系统管理功能不可用。"
published = "1999-12-22T05:00:00.000"
remediation = "升级 Solaris 至 7.0 及以上已修复此漏洞的补丁版本，或安装 Sun 官方补丁 106980-01（SPARC）/ 106981-01（x86）。如无法升级，限制 /var/dmi/db 目录的写入权限仅允许 root 用户，或禁用 DMI 服务（dmispd）以消除攻击面。"
score = 10
severity = "CRITICAL"
sources = ["cve"]
title = "Sun Solaris 7.0 DMI 本地拒绝服务漏洞"
updated = "2026-06-16T21:50:51.683"

