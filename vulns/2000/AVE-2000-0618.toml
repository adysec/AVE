[basic]
description = "Windows 2000 系统自带的 telnet 客户端默认会尝试进行 NTLM 身份认证，远程攻击者可通过构造恶意的 telnet:// URL 并诱导目标用户访问，当用户点击该链接后，telnet 客户端会自动向攻击者控制的恶意服务器发送 NTLM 挑战/响应数据包，攻击者即可捕获并重放这些凭据信息，从而获取用户的 NTLM 哈希值，进而实现身份冒充或进一步渗透。该漏洞影响 Windows 2000 所有版本，无需额外权限即可远程利用。"
published = "2000-11-14T05:00:00.000"
remediation = '立即安装 Microsoft 安全公告 MS00-067 提供的官方补丁，下载地址：https://www.microsoft.com/download/details.aspx?FamilyId=0D0032E7-259D-4F68-BF08-B0A7CAA1FD1C。如无法打补丁，可在命令提示符下运行 telnet 后执行 `unset ntlm` 禁用 NTLM 默认认证；同时将 Internet Explorer 安全区域中"Local intranet"和"Trusted sites"的自动登录设置为禁用，并在边界防火墙阻断入站远程登录服务（如 TCP 139/445/23/3389）。'
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "Microsoft Windows 2000 Telnet 客户端 NTLM 身份认证漏洞"
updated = "2026-06-16T21:52:33.847"

