[basic]
description = "用友 U9 Cloud 的 PDFDirectPrint.aspx 接口存在反序列化漏洞，未经身份认证的远程攻击者可向该接口发送精心构造的序列化数据触发反序列化，进而实现远程代码执行。该漏洞影响用友 U9 Cloud 多个版本，攻击者无需登录即可利用，危害严重。"
published = "0719"
remediation = "立即联系用友官方获取并安装 U9 Cloud 针对 PDFDirectPrint.aspx 反序列化漏洞的安全补丁/热修复包，并升级至厂商确认已修复的最新补丁版本。临时缓解：在 IIS/反向代理/WAF 上拦截或删除对 /PDFDirectPrint.aspx 的外部访问（仅允许受信内网），或重命名/下线该页面；将 U9 Cloud 管理与业务端口限制在内网，禁止公网直连；开启应用与 Web 访问日志审计，排查异常 POST/反序列化请求。"
score = 5
severity = "MEDIUM"
