[info]
author = "ave"
description = "验证 IBM AIX eNetwork Firewall 3.2/3.3 的 fwluser 脚本在创建临时文件时存在不安全临时文件创建漏洞，本地用户可通过符号链接攻击写入任意文件。本 PoC 通过检查脚本使用的临时文件路径是否存在被 symlink 劫持的条件来验证漏洞存在。"
id = "POC-AVE-1999-0539"
name = "CVE-1999-0803 AIX eNetwork Firewall fwluser 不安全临时文件 symlink 攻击 PoC"
severity = "low"
tags = ["ave-1999-0539"]
vuln_id = [
    "CVE-1999-0803",
    "AVE-1999-0539",
]

[poc]
logic = "all"

[[poc.requests]]
path = "/tmp/fwluser.tmp"
protocol = "file"

[[poc.requests.matchers]]
expect = false
part = "body"
type = "word"
words = [
    "fwluser",
    "tmp",
]
