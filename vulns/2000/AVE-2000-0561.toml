[basic]
description = "GWScripts News Publisher 1.0 的 news.cgi 脚本在处理作者添加请求时存在认证缺失漏洞，远程攻击者无需任何身份验证即可通过向 new.cgi 程序直接发送 HTTP POST 请求，携带 addAuthor 参数并将 Referer 头伪造为 news.cgi，从而向作者列表中添加新的作者账号。该漏洞允许攻击者获得后台管理访问权限，进而可能导致后续的内容篡改或恶意发布。可利用性较高，影响 GWScripts News Publisher 1.0 版本。"
published = "2000-10-20T04:00:00.000"
remediation = "立即升级到 GWScripts News Publisher 的最新版本（如已停止维护，建议迁移至其他受支持的新闻发布系统）。在无法升级的情况下，在 Web 服务器（Apache/Nginx）层面对 /new.cgi 路径添加 IP 白名单或 HTTP 基本认证限制，仅允许管理员 IP 访问；同时在 news.cgi 中增加服务端 session 认证机制，禁止仅凭 Referer 头进行身份校验。删除 author.file 中未授权的异常条目并定期审计文件权限。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "GWScripts News Publisher 1.0 认证绕过漏洞"
updated = "2026-06-16T21:52:20.387"

