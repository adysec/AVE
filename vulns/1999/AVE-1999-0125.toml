[basic]
description = "Linux autofs 内核模块存在缓冲区溢出漏洞，本地攻击者可通过构造超长目录名触发该漏洞，导致系统拒绝服务。该漏洞影响 Linux Kernel 2.0/2.1/2.2 版本，攻击者需具有本地系统访问权限，利用门槛较低。由于 autofs 模块在处理目录名时未正确校验长度边界，精心构造的超长路径可造成内核缓冲区溢出，使系统崩溃或服务不可用。"
published = "1999-02-19T05:00:00.000"
remediation = "升级 Linux 内核至 2.2.13 及以上版本，该版本修复了 autofs 模块处理超长目录名时的缓冲区溢出问题。如无法升级内核，可禁用 autofs 服务（`/etc/init.d/autofs stop && chkconfig autofs off`）作为临时缓解措施，限制本地用户对 autofs 挂载点的访问权限。"
score = 2.1
severity = "LOW"
sources = ["epss"]
title = "Linux Kernel autofs 本地缓冲区溢出漏洞"
updated = "2026-06-16T21:48:26.563"

