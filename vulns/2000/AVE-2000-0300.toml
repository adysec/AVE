[basic]
description = "Inter7 vpopmail 的 vchkpw POP 认证组件存在缓冲区溢出漏洞，远程攻击者可通过向 POP3 服务提交超长用户名或密码触发该漏洞，导致栈缓冲区溢出，最终可获取目标系统的 root 权限。该漏洞影响 vpopmail 3.4.11 版本，CVSS 评分 10.0，危害等级严重，无需身份认证即可远程利用。"
published = "2000-01-21T05:00:00.000"
remediation = "升级 vpopmail 至 3.4.12 或更高版本，该版本在 vchkpw POP3 认证过程中加入了用户名和密码长度边界检查，防止缓冲区溢出。如无法立即升级，可在防火墙上限制对 POP3 端口（110）的访问来源，仅允许可信网络，或在 qmail 配置中禁用 POP3 服务作为临时缓解措施。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "Inter7 vpopmail POP认证组件缓冲区溢出漏洞"
updated = "2026-06-16T21:50:58.910"

