[basic]
description = "Netopia R9100 及 R 系列路由器 4.6.2 及更早版本存在 SNMP 表权限绕过漏洞。即使管理员已配置禁止修改 SNMP 表，已通过认证的攻击者仍可通过 SNMP 协议直接修改设备 SNMP 表项，可能导致设备配置被篡改、网络异常或后续进一步渗透。攻击者需先获得路由器管理访问权限，利用条件受限但危害明确。建议升级固件或限制 SNMP 访问。"
published = "2000-05-16T04:00:00.000"
remediation = "建议立即升级 Netopia R 系列路由器固件至最新版本（访问 Netopia 官方固件更新页面获取）。如无法升级，在路由器访问控制列表中限制 SNMP (UDP 161) 仅允许受信管理 IP 访问，并将 SNMP 设置为只读模式；若业务不需要 SNMP 功能，建议直接禁用 SNMP 服务以彻底消除风险。"
score = 3.6
severity = "LOW"
sources = ["cve"]
title = "Netopia R9100 路由器 SNMP 配置表未授权修改漏洞"
updated = "2026-06-16T21:51:35.633"

