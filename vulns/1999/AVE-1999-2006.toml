[basic]
description = "HP-UX 10.00 至 11.00 系统中，r-cmnds 工具集包含的多个远程命令服务与客户端程序（remshd、rexecd、rlogind、rlogin、remsh、rcp、rexec、rdist）存在多处未知安全漏洞。远程或本地攻击者在具备一定访问条件时，可利用这些漏洞绕过正常的权限校验机制，非法提升自身权限或越权访问系统上的敏感文件，危害系统机密性与完整性。"
published = "1999-12-28"
remediation = "安装 HP 官方发布的安全补丁 PHNE_20835 或更高版本以修复 remshd/rexecd/rlogind 等 r-cmnds 组件漏洞；如无法立即打补丁，应在 /etc/inetd.conf 中注释掉 shell、login、exec 等服务后执行 /sbin/init.d/inetd stop 与 start 重启 inetd，并使用 TCP Wrappers 限制来源 IP 作为临时缓解措施。"
score = 10.0
severity = "CRITICAL"
sources = ["cve"]
title = "HP-UX r-cmnds 远程命令服务权限提升漏洞"
updated = "2026-07-17"

