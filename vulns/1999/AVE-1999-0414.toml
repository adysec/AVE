[basic]
description = "Microsoft Windows NT 4.0 的 RPC Locator 服务（rpcss.exe）存在拒绝服务漏洞。远程攻击者可通过向目标系统发送特制的 RPC 请求，导致 RPC 定位服务进程崩溃或停止响应，影响系统正常功能。该漏洞无需身份认证即可触发，攻击复杂度低，危害等级中等。Microsoft 官方已发布安全更新解决此问题。"
published = "1997-02-07T05:00:00.000"
remediation = '安装 Microsoft 针对此漏洞发布的热修复补丁 KB Q162567，该补丁解决了 rpcss.exe 在处理特定 RPC 请求时的拒绝服务问题。由于 Windows NT 4.0 已于 2004 年终止支持且不再接收安全更新，建议升级至仍在支持周期内的 Windows 版本（如 Windows Server 2019/2022）。临时缓解措施：在不需要 RPC Locator 服务的环境中，通过 services.msc 将 Remote Procedure Call (RPC) Locator 服务启动类型设为"禁用"，或在防火墙上限制对该服务端口 (TCP 135) 的不必要访问。'
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Microsoft Windows NT 4.0 RPC Locator 拒绝服务漏洞"
updated = "2026-06-16T21:47:57.410"

