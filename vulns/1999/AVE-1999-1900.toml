[basic]
description = "Open VMS 5.3 至 5.5-2 版本在 VAXstations 平台上的 DECwindows 或 MOTIF 组件存在暴力破解防护缺失漏洞。当用户登录失败次数超过系统设定的 break-in 限制阈值后，系统未能正确禁用该账户的访问权限，导致攻击者可以持续进行暴力密码猜测攻击。该漏洞属于 CWE-307 分类的认证绕过问题，影响所有运行上述版本 Open VMS 并启用图形界面的系统。攻击者无需认证即可通过网络远程发起自动化字典攻击，若密码强度不足则存在账户被完全控制的风险。"
published = "1999-12-31T05:00:00.000"
remediation = "建议升级到 Open VMS 5.5-3 或更高版本，该版本修复了 DECwindows/MOTIF 环境下登录失败阈值失效的问题。如无法升级，可在系统参数 LGI_BRK_TERM 中设置更严格的账户锁定阈值（如设为 3 次失败即锁定），并启用 SECURITY 类审计日志监控异常登录行为。"
score = 9.8
severity = "CRITICAL"
sources = ["avd"]
title = "HP Open VMS VAXstations 认证绕过漏洞"
updated = "2026-06-16T21:50:11.863"

