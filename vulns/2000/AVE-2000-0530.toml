[basic]
description = "Netscape Communicator 及 Navigator 4.04 至 4.74 版本存在 Java applet 安全沙箱绕过漏洞。远程攻击者可通过诱导用户访问恶意网页，利用 Java applet 以 file、http、https、ftp 等协议建立任意 URL 连接，绕过浏览器安全限制，越权读取目标系统上的任意文件。该漏洞由名为 Brown Orifice 的 PoC 程序公开演示，影响多平台 Netscape 浏览器及其衍生版本，CVSS 评分 5.0，危害等级中危。"
published = "2000-10-20T04:00:00.000"
remediation = "升级 Netscape Communicator 至 4.75 或更高版本，该版本已修复 Java applet 跨协议文件读取漏洞。如无法升级，请在浏览器设置中禁用 Java applet 支持，或更换为其他现代浏览器（如 Firefox、Chrome）以彻底消除风险。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Netscape Communicator 任意文件读取漏洞"
updated = "2026-06-16T21:52:14.713"

