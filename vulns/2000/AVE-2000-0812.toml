[basic]
description = "IBM AIX 4.3.x 及更早版本系统中的 /usr/bin/setsenv 命令存在缓冲区溢出漏洞。当程序处理超长的 x= 参数时，未对输入长度进行有效校验，导致栈缓冲区溢出。本地攻击者可利用此漏洞以 setsenv 进程权限执行任意命令，实现权限提升。该漏洞需要本地登录权限，无法远程利用，CVSS 评分 4.6，危害等级中危。IBM 已在后续版本中修复此问题。"
published = "2001-01-09T05:00:00.000"
remediation = "立即安装 IBM AIX 的 APAR 修复程序 IY08812 或 IY10721 以修补 setsenv 命令的缓冲区溢出漏洞。如无法立即打补丁，可移除 /usr/bin/setsenv 的 setuid 位（chmod u-s /usr/bin/setsenv），或通过文件权限限制仅允许受信任用户执行该命令作为临时缓解措施。"
score = 4.6
severity = "MEDIUM"
sources = ["exploitdb"]
title = "IBM AIX setsenv 本地缓冲区溢出漏洞"
updated = "2026-06-16T21:53:11.277"

