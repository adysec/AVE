[basic]
description = "Compaq Insight Management Agent 4.23 及更早版本、Management Agents for Servers 4.40 及更早版本在安装 BMC Patrol 组件时，会创建一个名为 PFCUser 的默认账户，该账户使用固定的默认密码且拥有高权限。远程攻击者可利用该默认账户登录系统，获得未经授权的管理员访问权限。该漏洞影响 Compaq/HP 服务器管理软件，危害等级高。"
published = "1999-12-31T05:00:00.000"
remediation = "立即升级 Compaq Insight Management Agent 至 4.23 以上版本，或 Management Agents for Servers 至 4.40 以上版本。如无法升级，手动删除或禁用 PFCUser 账户，并修改所有默认密码为强密码策略（12位以上、含大小写字母数字特殊字符）。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "Compaq Insight Management Agent 默认口令漏洞"
updated = "2026-06-16T21:50:15.847"

