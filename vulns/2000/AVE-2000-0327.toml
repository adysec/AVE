[basic]
description = "Meeting Maker 使用多表代换密码对用户口令进行加密，该加密算法强度不足，存在弱加密漏洞。处于同一网段的远程攻击者可通过网络嗅探捕获加密后的口令数据包，并利用该弱加密算法的可预测性进行解密还原，从而获取明文口令，进而未授权访问 Meeting Maker 账户，危及系统数据安全。"
published = "2000-04-25T04:00:00.000"
remediation = "Meeting Maker 已停止维护，无法通过官方补丁修复。建议立即迁移至支持强加密的现代日程管理软件（如 Microsoft Exchange/Outlook、Google Calendar）；作为临时缓解措施，所有客户端与服务器之间的连接应通过 VPN 或 SSH 隧道加密传输，避免密码在网络上以明文或弱加密形式暴露。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Meeting Maker 密码弱加密漏洞"
updated = "2026-06-16T21:51:28.997"

