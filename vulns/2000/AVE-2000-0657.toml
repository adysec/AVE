[basic]
description = "QSSL Voyager 2.0 1B Web 服务器存在目录遍历漏洞，远程攻击者无需身份认证即可通过向目标发送包含 `..`（点点）序列的特制 HTTP 请求，突破路径限制访问服务器上的任意文件。该漏洞影响运行于 QNX 405 操作系统演示光盘中的 Voyager 2.01B 版本，CVSS 评分 5.0，危害等级中危。攻击者可利用此漏洞读取系统敏感文件如密码配置文件等，导致信息泄露。"
published = "2000-12-19T05:00:00.000"
remediation = '该产品（QSSL Voyager 2.01B）已停止维护且无官方补丁，建议立即升级至受支持的安全 Web 服务器（如 Apache、Nginx）替代。若无法替换软件，应在 Voyager 服务器前端配置反向代理并添加 URL 过滤规则，拦截包含 "../" 等目录遍历特征的请求，同时在防火墙层面限制可访问该服务的来源 IP 范围作为临时缓解措施。'
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "QSSL Voyager Web Server 目录遍历漏洞"
updated = "2026-06-16T21:52:43.710"

