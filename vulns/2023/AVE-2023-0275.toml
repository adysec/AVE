[basic]
description = "华天动力OA8000协同办公平台存在布尔盲注SQL注入漏洞，未经身份认证的远程攻击者可通过向目标系统发送包含恶意构造的SQL条件的HTTP请求，利用服务器返回的布尔响应差异（如页面内容、HTTP状态码或响应长度的不同）逐位推断数据库中的敏感信息。该漏洞影响使用华天动力OA8000系统的企事业单位，攻击者可借此窃取系统管理员账号密码、员工信息、财务数据等核心业务数据，严重时可导致整个OA系统被接管。攻击者仅需具备基本的HTTP请求能力即可发起攻击，无需任何特殊权限。建议管理员及时升级至官方修复版本，或通过Web应用防火墙（WAF）对SQL注入特征进行拦截防护。"
published = "08.14"
remediation = "升级华天动力OA8000至官方最新版本，修复SQL注入漏洞；如无法升级，在Web应用防火墙(WAF)侧配置SQL注入拦截规则，对用户输入参数进行严格过滤和转义，禁用数据库报错信息回显作为临时缓解措施。"
score = 5
severity = "MEDIUM"
