[basic]
description = "WordPress AB Google Map Travel（AB-MAP）插件 4.0 版本之前存在跨站请求伪造（CSRF）漏洞，攻击者可构造恶意请求诱使已登录的管理员访问，从而劫持管理员会话，在未经授权的情况下通过 lat、long、map_width、map_height、zoom 等参数修改插件配置，进而触发跨站脚本攻击，导致恶意脚本注入及敏感信息泄露。"
published = "2015-04-01T14:59:07.803"
remediation = "立即将 WordPress AB Google Map Travel (AB-MAP) 插件升级到 4.0 或更高版本。如无法立即升级，可在 WordPress 后台用户管理中为管理员账户启用 Application Passwords 并禁用该插件，或通过 Web 应用防火墙（WAF）规则拦截对 wp-admin/admin.php 中 ab_map_options 页面的外部来源 POST 请求，同时检查并移除插件中缺少 nonce 验证的表单处理函数。"
score = 6.8
severity = "MEDIUM"
sources = ["nuclei"]
title = "WordPress AB Google Map Travel插件跨站请求伪造漏洞"
updated = "2026-06-17T00:24:41.680"

