[basic]
description = "Microsoft Outlook Express 5.01 及 Internet Explorer 5.01 存在 JavaScript 邮件访问漏洞。远程攻击者可通过向用户发送特制的 HTML 邮件，在邮件被客户端读取时利用脚本访问引用后续邮件内容的变量，从而越权读取受害者的其他电子邮件。该漏洞影响 Outlook Express 5.01 和 Internet Explorer 5.01 版本，CVSS 评分 5.0，危害等级中危。攻击者只需诱使用户预览或打开恶意邮件即可触发，无需额外认证。"
published = "2000-02-01T05:00:00.000"
remediation = "升级 Outlook Express 至 5.5 或更高版本，或安装 Microsoft 安全更新程序以禁用脚本访问邮件客户端内部变量。也可将 Internet 区域安全级别设为「高」并禁用 Active Scripting，同时建议使用 HTML 邮件预览前切换为纯文本格式。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Microsoft Outlook Express 5 及 Internet Explorer 5.01 JavaScript 邮件信息泄露漏洞"
updated = "2026-06-16T21:51:00.663"

