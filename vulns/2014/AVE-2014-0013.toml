[basic]
description = "Seagate BlackArmor NAS 存在输入验证不当漏洞（CWE-20），远程攻击者无需身份认证即可通过向 localhost/backupmgt/localJob.php 的 session 参数或 localhost/backupmgmt/pre_connect_check.php 的 auth_name 参数发送特制请求，触发任意代码执行。该漏洞影响 Seagate BlackArmor NAS 系列设备，CVSS 评分 9.8，危害等级严重，攻击者可完全控制受影响的 NAS 设备，窃取或破坏存储数据。"
published = "2018-02-23T17:29:00.410"
remediation = "立即停止使用 Seagate BlackArmor NAS 设备，该产品已停止技术支持且官方未发布任何安全补丁。如无法立即替换，应在防火墙上限制对设备 80/443 端口的访问，仅允许受信任管理 IP 连接，并将设备置于独立 VLAN 中隔离，同时禁用 backupmgt 目录的 Web 访问权限作为临时缓解措施。"
score = 9.8
severity = "CRITICAL"
sources = ["nuclei"]
title = "Seagate BlackArmor NAS 远程代码执行漏洞"
updated = "2026-06-17T00:07:48.210"

