[basic]
description = "HP-UX 11.0 的 net.init RC 脚本存在符号链接攻击漏洞。本地攻击者可通过在 /tmp/stcp.conf 与目标文件之间建立符号链接，当系统以 root 权限执行 net.init 脚本时，会覆盖任意文件，导致权限提升或系统破坏。该漏洞影响 HP-UX 11.00 版本，攻击者需拥有本地系统访问权限，CVSS 评分 7.2，危害等级高。"
published = "2000-10-20T04:00:00.000"
remediation = "升级到 HP-UX 11.0 或 11.11 (11i) 的累积补丁或安装 PHCO_22666 安全补丁。如无法升级，删除 net.init 脚本的 setuid/setgid 位（chmod u-s /sbin/init.d/net.init），并在执行前创建 /tmp/stcp.conf 为只读空文件防止符号链接劫持。同时限制本地用户对敏感系统文件的写入权限作为纵深防御。"
score = 7.2
severity = "HIGH"
sources = ["cve"]
title = "HP HP-UX net.init RC 脚本符号链接攻击漏洞"
updated = "2026-06-16T21:52:18.083"

