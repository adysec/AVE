[basic]
description = "FreeBSD 5.0、NetBSD 1.4.2 及 OpenBSD 2.7 等 BSD 系统在 socket 编程接口实现中存在拒绝服务漏洞。本地攻击者可通过 socketpair 函数大量创建 socket 对，然后使用 setsockopt 设置超大缓冲区，再向这些缓冲区写入大量数据，从而耗尽系统内存资源，导致目标系统崩溃或无法响应服务。该漏洞需要本地系统访问权限才能触发。"
published = "1999-09-05T04:00:00.000"
remediation = "建议升级操作系统：FreeBSD 用户升级至 5.0-RELEASE-p1 或更高版本；NetBSD 用户升级至 1.5 或更高版本；OpenBSD 用户升级至 2.8 或更高版本。如无法升级，可在系统层面限制每个进程可打开的文件描述符数量（通过设置 /etc/login.conf 中 maxproc 和 openfiles-cur 参数），并启用内核资源限制（kern.maxfiles）以缓解拒绝服务攻击。"
score = 2.1
severity = "LOW"
sources = ["exploitdb"]
title = "多款BSD系统 setsockopt 缓冲区拒绝服务漏洞"
updated = "2026-06-16T21:51:50.637"

