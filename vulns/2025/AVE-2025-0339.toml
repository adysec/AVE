[basic]
description = "南昊网上阅卷系统的 monitor 组件存在未授权访问漏洞，攻击者无需身份认证即可直接访问系统后台敏感接口，获取阅卷数据、考生信息等核心资源。该漏洞源于系统对 monitor 路径下的请求缺乏有效的权限校验机制，攻击者只需构造特定 HTTP 请求即可利用，危害较大。"
published = "2025-07-12"
remediation = "为南昊网上阅卷系统 monitor 路径配置身份认证，在反向代理层添加 Basic Auth 或集成 LDAP 认证机制，同时设置源 IP 白名单仅允许管理网段访问；联系厂商获取安全更新版本并升级，如暂时无法升级则通过防火墙限制对 monitor 组件的访问端口。"
score = 5.0
severity = "MEDIUM"
sources = ["hwpoc"]
title = "南昊网上阅卷系统 monitor 组件未授权访问漏洞"
updated = "2025-07-12"

