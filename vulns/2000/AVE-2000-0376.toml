[basic]
description = "Red Hat Linux 6.0 中的 screen 和 rxvt 终端程序未正确设置 tty 设备的权限模式，导致本地攻击者可以向其他用户的终端写入数据。该漏洞允许低权限本地用户通过向其他 tty 终端发送恶意数据，实现信息干扰、会话劫持或权限提升。攻击者需要拥有本地系统访问权限，无需特殊认证即可利用。该漏洞影响 Red Hat Linux 6.0 系统，CVSS 评分 4.6，危害等级中危。"
published = "1999-06-01T04:00:00.000"
remediation = "升级 Red Hat Linux 至 6.1 或更高版本，该问题已在后续版本中修复。如无法升级，可手动执行 `chmod 620 /dev/pts/*` 将 pts 终端权限从 crw--w--w-（全局可写）改为 crw--w----（仅属主和 tty 组可写），并在 /etc/rc.d/rc.local 中添加 `chmod 620 /dev/pts/*` 确保重启后权限正确。同时检查 screen 和 rxvt 的 suid 配置，移除不必要的 setuid 位作为临时缓解措施。"
score = 4.6
severity = "MEDIUM"
sources = ["avd"]
title = "Red Hat Linux screen 和 rxvt 终端设备权限设置不当漏洞"
updated = "2026-06-16T21:51:33.790"

