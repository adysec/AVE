[basic]
description = "亿赛通电子文档安全管理系统（CDGServer3）在处理 CDGAuthoriseTempletService1 接口的请求时，未能对用户输入的 SQL 语句进行充分过滤与参数化处理，攻击者可构造恶意的 POST 请求向后台数据库注入任意 SQL 指令，进而读取、篡改敏感文档元数据或绕过身份认证，导致权限越权与数据泄露。该漏洞无需认证即可远程触发，危害较大。"
published = "2024-03-01"
remediation = "升级亿赛通电子文档安全管理系统至官方已修复的安全版本，并在 CDGServer3 服务接口层对 CDGAuthoriseTempletService1 的输入参数实施预编译（参数化查询）与严格的白名单校验，同时限制该接口的匿名访问权限。"
score = 8.8
severity = "HIGH"
sources = ["cve"]
title = "亿赛通电子文档安全管理系统 SQL 注入漏洞"
updated = "2024-06-01"

