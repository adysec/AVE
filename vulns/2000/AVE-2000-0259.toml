[basic]
description = "Apple WebObjects Developer 4.5 中的 WebObjects.exe 存在缓冲区溢出漏洞，远程攻击者可通过向目标系统发送包含超长 HTTP 头（如 Accept 字段）的恶意请求触发该漏洞，导致 WebObjects 服务进程崩溃，造成拒绝服务。该漏洞影响安装于 Windows NT 4.0 + IIS 4.0 平台上的 WebObjects Developer 4.5 版本，CVSS 评分 5.0，危害等级中危。"
published = "2000-04-04T04:00:00.000"
remediation = "升级 Apple WebObjects 至 4.5 以上安全版本，或迁移至受支持的 WebObjects 5.x 版本。如无法升级，在 IIS 中限制 HTTP 请求头长度，或禁用 WebObjects CGI 适配器以消除攻击面。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Apple WebObjects Developer 4.5 远程缓冲区溢出漏洞"
updated = "2026-06-16T21:51:25.650"

