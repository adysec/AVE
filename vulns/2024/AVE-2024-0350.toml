[basic]
description = "Array Networks SSL VPN 网关存在路径遍历漏洞，远程未认证攻击者可通过构造带有 X_AN_FILESHARE 头的特制 HTTP 请求，利用 fshare_template 参数中的目录穿越序列读取服务器上的任意文件，包括 /etc/passwd 等敏感系统文件，可能导致系统凭证泄露及内网横向移动风险。"
published = "2024-01-15"
remediation = "升级 Array SSL-VPN 网关至 9.4.0.481 之后的安全版本，限制 VPN 管理接口仅允许可信 IP 访问，并监控异常的文件共享请求。"
score = 7.5
severity = "HIGH"
