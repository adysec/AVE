[basic]
description = "Slackware Linux 3.4 系统自带的 pkgtool 软件包管理工具在运行过程中会创建并读写临时应答文件（reply file），但其未对临时文件路径进行安全的创建与校验。本地已登录的普通用户可通过预先创建指向任意系统文件的符号链接（symlink attack），使 pkgtool 在后续操作中误将攻击者指定的链接目标当作临时文件进行读取或写入。该漏洞影响运行 Slackware Linux 3.4 并可使用 pkgtool 的本地用户，攻击条件为攻击者在目标系统拥有本地账户且能操纵临时目录。成功利用后，攻击者可将自身权限提升至文件所有者权限，读取敏感配置文件或覆写系统关键文件（如密码文件、启动脚本），进而造成信息泄露或本地权限提升。"
published = "1998-04-06T04:00:00.000"
remediation = "建议立即将 Slackware Linux 升级至 3.6 或更高版本，该版本已在 hdsetup.tgz 包中对 pkgtool 等包管理工具的 /tmp 临时文件符号链接攻击进行了修复。如暂无法升级，可在运行系统上执行 installpkg hdsetup.tgz 应用补丁，并以 root 用户执行 touch /tmp/PKGTOOL.REMOVED 创建临时文件阻止符号链接利用，同时将 /tmp 目录权限设置为 1777 以限制普通用户创建符号链接。"
score = 3.6
severity = "LOW"
sources = ["exploitdb"]
title = "Slackware Linux pkgtool 本地符号链接临时文件读写漏洞"
updated = "2026-06-16T21:50:34.210"

