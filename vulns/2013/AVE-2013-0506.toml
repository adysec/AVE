[basic]
description = "JBoss EJBInvokerServlet 和 JMXInvokerServlet 存在反序列化漏洞，远程攻击者无需认证即可通过 HTTP 协议向目标服务器发送特制的序列化 Java 对象，触发反序列化过程导致任意代码执行。该漏洞影响 HP ProCurve Manager 3.20/4.0、PCM+ 3.20/4.0、Identity Driven Manager 4.0 及 Application Lifecycle Management 等产品，CVSS 评分 9.8，危害等级严重。攻击者只需网络可达即可利用，无需用户交互，可完全控制受影响系统。"
published = "2013-09-16T13:01:46.207"
remediation = "升级 JBoss 至 5.0.2.GA 及以上版本，或移除 EJBInvokerServlet 和 JMXInvokerServlet 的远程访问权限。如无法升级，在部署描述符中禁用 HTTP 协议的 invoker 端点，或使用 JBoss 安全过滤器限制对 /invoker/ 路径的访问。临时缓解措施可在反向代理层屏蔽对 /invoker/EJBInvokerServlet 和 /invoker/JMXInvokerServlet 的请求。"
score = 9.8
severity = "CRITICAL"
sources = ["kev"]
title = "HP ProCurve Manager JBoss EJBInvokerServlet 反序列化远程代码执行漏洞"
updated = "2026-06-16T23:57:56.050"

