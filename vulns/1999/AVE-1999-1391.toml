[basic]
description = "Windows 95/98 系统在将多个 TCP/IP 协议栈绑定到同一 MAC 地址时存在拒绝服务漏洞（即 TCP Chorusing 攻击）。远程攻击者可通过向目标系统发送特制的 ICMP Echo（ping）数据包，触发所有绑定的协议栈同时发送 ping 响应，导致网络流量被急剧放大，造成拒绝服务。该漏洞影响 Windows 95/98 系统，利用方式简单，无需认证即可远程触发。"
published = "1999-02-06T05:00:00.000"
remediation = "Windows 95/98 已停止支持，微软不再提供安全更新。建议立即升级到受支持的 Windows 版本（如 Windows 10/11）。如无法升级，缓解措施包括：(1) 避免将多个 TCP/IP 协议栈绑定到同一 MAC 地址；(2) 在网络防火墙或主机防火墙上过滤入站 ICMP Echo 请求，限制 ICMP 流量速率；(3) 禁用不必要的 TCP/IP 协议栈绑定。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Microsoft Windows 95/98 TCP/IP Chorus 拒绝服务漏洞"
updated = "2026-06-16T21:49:56.067"

