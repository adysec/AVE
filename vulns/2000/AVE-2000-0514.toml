[basic]
description = "NetBSD 及 BSD 衍生系统中存在未文档化的 semconfig 系统调用漏洞，该调用会冻结信号量的状态，导致本地用户可通过调用 semconfig 系统调用使信号量系统陷入拒绝服务状态。该漏洞影响 NetBSD 及相关 BSD 衍生系统，CVSS 评分 2.1（AV:L/AC:L/Au:N/C:N/I:N/A:P），属于本地拒绝服务漏洞，攻击者需具备本地用户权限且能调用 semconfig 系统调用即可触发，利用方式为直接调用该未文档化系统调用冻结信号量状态导致系统信号量机制失效，造成拒绝服务影响。"
published = "2000-05-29T04:00:00.000"
remediation = "建议立即升级至 NetBSD 9.3 或 10.0 及以上版本（该版本已移除/修复未文档化的 semconfig 系统调用）。若无法立即升级，可编译内核时排除 semconfig 系统调用（在内核配置文件中移除 semconfig 支持），或通过文件系统权限限制本地用户访问 /dev/ksyms 等接口作为临时缓解措施。同时建议限制本地用户权限，避免非必要用户获取 shell 访问权限。"
score = 2.1
severity = "LOW"
sources = ["avd"]
title = "NetBSD semconfig 系统调用拒绝服务漏洞"
updated = "2026-06-16T21:51:47.067"

