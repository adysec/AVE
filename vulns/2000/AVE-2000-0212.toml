[basic]
description = "Cobalt RaQ 2.0 及 3.0 服务器默认 Apache 配置中 access.conf 文件存在安全缺陷，远程攻击者无需身份认证即可通过 HTTP 请求直接访问受保护目录下的 .htaccess 文件，导致数据库密码、访问控制规则等敏感配置信息泄露。该漏洞影响 Cobalt RaQ 2.0/3.0 系列设备，攻击复杂度低，危害等级中等。"
published = "2000-03-31T05:00:00.000"
remediation = '修改 Apache 配置文件 access.conf，在 `<Files ~ "^\.ht">` 段中添加 `Deny from all` 指令以阻止 .htaccess 文件被直接访问。如使用 RaQ 3.0，建议升级到最新固件版本或迁移至受支持的 Linux 发行版并重新配置 Apache 安全策略。'
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Cobalt RaQ 2.0/3.0 Apache .htaccess 敏感信息泄露漏洞"
updated = "2026-06-16T21:51:17.167"

