[basic]
description = "Microsoft Site Server Commerce Edition 3.0 alpha 的 AdSamples 示例目录存在配置缺陷，远程攻击者可通过 HTTP 请求直接访问 AdSamples 目录下的 SITE.CSC 文件，导致 SQL 数据库连接字符串、账号密码等敏感信息泄露。该漏洞影响 Site Server 3.0 及 Commerce Edition 版本，攻击者无需任何身份认证即可利用，危害等级中等。"
published = "1999-05-11T04:00:00.000"
remediation = '删除 AdSamples 示例目录或通过 IIS 管理器对该目录禁用匿名访问，在 web.config 中添加 `<location path="AdSamples"><deny users="*"/></location>` 阻止外部访问 .csc 文件，同时确保 SITE.CSC 等敏感配置文件存储在 Web 根目录之外且配置 NTFS 权限仅允许 SYSTEM 和管理员访问。'
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Microsoft Site Server 3.0 AdSamples 敏感信息泄露漏洞"
updated = "2026-06-16T21:50:36.980"

