[basic]
description = "Internet Explorer 4.0 在处理网页中的 EMBED 标签时存在缓冲区溢出漏洞（CWE-119）。由于对 EMBED 标签相关数据的边界校验不充分，攻击者可通过构造含有超长或畸形参数的恶意网页，在受害者使用 IE 4.0 浏览该页面时触发溢出，进而覆盖内存并执行任意代码。该漏洞影响运行 Internet Explorer 4.0 的 Windows 系统，攻击条件为诱导用户访问攻击者控制的网页，无需认证，CVSS 评分达到 10.0，危害等级为严重。"
published = "2000-01-04T05:00:00.000"
remediation = '立即将 Internet Explorer 升级至 5.0 或以上版本（推荐升级到 Windows 后续版本自带的 IE 5.5 SP2），并安装微软 1999 年 8 月发布的安全补丁（MS99-032）。如暂无法升级，可在注册表中禁用 EMBED 标签渲染或将 IE 安全区域设为"高"并禁用"运行 ActiveX 控件和插件"作为临时缓解，同时避免访问不可信网页。'
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "Microsoft Internet Explorer 4.0 EMBED 标签缓冲区溢出漏洞"
updated = "2026-06-16T21:49:14.490"

