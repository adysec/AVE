[info]
author = "ave"
description = "检查 SCO UnixWare 7.1 系统中 /var/mail 目录是否存在，该目录默认权限设置不当，本地用户可越权读取和修改其他用户的邮件文件"
id = "POC-AVE-1999-0597"
name = "SCO Unixware 7.1 /var/mail Permissions PoC"
severity = "low"
tags = ["ave-1999-0597"]
vuln_id = [
    "CVE-1999-0825",
    "AVE-1999-0597",
]

[poc]
logic = "all"

[[poc.requests]]
path = "/var/mail"
protocol = "file"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["mail"]
