[basic]
description = "Standard & Poors ComStock 金融数据服务中的 MultiCSP（mcsp Client Site Processor）系统在安装时创建了多个默认账户，这些账户要么没有设置密码，要么使用了极易猜测的默认密码。远程攻击者可利用这些弱口令账户登录系统，获取完全控制权限，导致机密性、完整性和可用性全面受损。"
published = "2000-01-31"
remediation = "删除或禁用所有默认账户，为必要账户设置强密码策略，限制系统管理接口的网络访问范围，仅允许受信任 IP 访问。"
score = 10.0
severity = "CRITICAL"
sources = [
    "cve",
    "exploitdb",
]
title = "Standard & Poors ComStock MultiCSP 默认账户与空口令漏洞"
updated = "2026-06-16"

