[basic]
description = "阿里巴巴 HTTP 服务器存在目录遍历漏洞，远程攻击者无需身份认证即可通过向目标服务器发送包含 `../` 序列的特制 HTTP 请求，突破路径限制读取服务器上的任意文件。该漏洞源于服务器对用户请求路径过滤不严，未正确处理 `..` 路径回溯符，攻击者可利用此漏洞获取敏感配置文件或系统文件，导致信息泄露。CVSS 评分 5.0，危害等级中等。"
published = "1999-05-12T04:00:00.000"
remediation = "立即停止使用已停止维护的阿里巴巴 HTTP 服务器，迁移至 Apache HTTP Server 或 Nginx 等仍在积极维护的 Web 服务器软件。在迁移完成前，可在 Web 服务器前端部署反向代理或 WAF，配置规则拦截包含 `..` 的 URL 请求路径作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "阿里巴巴 HTTP Server 路径遍历漏洞"
updated = "2026-06-16T21:49:02.090"

