[basic]
description = "ProSoft Netware Client 5.12 在 Macintosh MacOS 9 上存在会话管理漏洞。当用户注销系统时，客户端不会自动将用户从 NDS 树中注销，导致 NDS 会话保持活动状态且未受保护。这允许同一系统的其他用户访问未受保护的 NDS 会话，可能导致未授权访问网络资源。该漏洞影响运行 MacOS 9 且安装 ProSoft Netware Client 5.12 的系统，CVSS 评分 4.6（中等严重度），攻击者需具有本地系统访问权限才能利用该会话劫持漏洞。"
published = "1999-11-14T05:00:00.000"
remediation = "升级 ProSoft Netware Client 至 5.12 以上版本，或安装厂商当时提供的安全补丁。如无法升级，用户注销系统前应手动断开 NDS 连接（在 Netware 客户端中选择注销 NDS），并加强 MacOS 9 系统的物理访问控制，防止未授权用户接触已登录终端。"
score = 4.6
severity = "MEDIUM"
sources = ["cve"]
title = "普软公司 Netware客户端 for MacOS 继承NDS漏洞"
updated = "2026-06-16T21:50:38.030"

