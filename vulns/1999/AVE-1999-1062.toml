[basic]
description = "Auto_FTP 0.2 版本中的 Auto_FTP.pl 脚本将 /tmp/ftp_tmp 目录作为共享目录使用，且未设置安全的权限控制，导致本地攻击者可利用该不安全权限实施两种攻击：一是将任意文件放入该目录以发送至远程服务器，二是查看正在传输中的文件内容，造成敏感信息泄露。该漏洞影响 Auto_FTP 0.2 版本，CVSS 评分 4.6，危害等级中危，攻击者需拥有本地访问权限方可利用。"
published = "1999-10-05T04:00:00.000"
remediation = "将 Auto_FTP 升级至 0.3 或更高版本，或手动修改 Auto_FTP.pl 脚本，将共享目录从 /tmp/ftp_tmp 改为仅允许授权用户访问的专用目录（如 /var/ftp/private），并设置目录权限为 750（所有者读写执行，组读执行，其他无权限）。如软件已停止维护，建议迁移至支持安全配置的替代 FTP 自动化工具（如 lftp 或 curl-based 脚本），并避免在 /tmp 等全局可写目录中存放传输中的文件。"
score = 4.6
severity = "MEDIUM"
sources = ["cve"]
title = "Auto_FTP Auto_FTP.pl 脚本不安全临时目录权限漏洞"
updated = "2026-06-16T21:50:14.563"

