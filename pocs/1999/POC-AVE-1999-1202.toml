[info]
author = "ave"
description = "检测目标页面是否包含 IE 子框架欺骗漏洞利用代码。该漏洞利用 JavaScript 在新窗口打开可信站点并篡改其子框架内容，实施钓鱼欺骗。"
id = "POC-AVE-1999-1202"
name = "CVE-1999-0869 IE Subframe Spoofing PoC"
severity = "low"
tags = ["ave-1999-1202"]
vuln_id = [
    "CVE-1999-0869",
    "AVE-1999-1202",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/"
protocol = "http"

[poc.requests.headers]
User-Agent = "Mozilla/4.0 (compatible; MSIE 4.0; Windows 95)"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "b.frames[2].location",
    "setTimeout",
]
