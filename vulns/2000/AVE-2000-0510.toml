[basic]
description = "Netscape Communicator 4.73 及更早版本在处理 JPEG 图片注释时存在堆覆盖漏洞。攻击者可构造包含非法字段长度（值为 1）的 JPEG 注释数据，触发堆内存覆盖，导致拒绝服务或远程执行任意命令。用户只需通过受影响浏览器访问恶意图片即可触发，无需额外交互。该漏洞影响 Netscape Communicator 4.x 全系版本，CVSS 评分 5.0，危害等级中危。"
published = "2000-07-25T04:00:00.000"
remediation = "立即升级到 Netscape Communicator 4.74 或更高版本。由于 Netscape 浏览器已停止维护多年，强烈建议迁移至现代浏览器（如 Firefox、Chrome）。临时缓解措施：不要打开不可信来源的 JPEG 图片。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Netscape Communicator JPEG 注释堆溢出漏洞"
updated = "2026-06-16T21:52:12.003"

