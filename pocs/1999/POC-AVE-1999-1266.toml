[info]
author = "ave"
description = "验证目标系统 at 命令以 root 权限运行且 -f 参数可读任意文件。通过 file 协议检查 /etc/shadow 是否可读，该文件仅 root 可读，若 at -f 可读取则构成本地信息泄露"
id = "POC-AVE-1999-1266"
name = "NetBSD/SGI IRIX at 命令本地文件读取漏洞 PoC"
severity = "low"
tags = [
    "ave-1999-1266",
    "cve-1999-1409",
]
vuln_id = [
    "CVE-1999-1409",
    "AVE-1999-1266",
]

[poc]
logic = "all"

[[poc.requests]]
path = "/etc/shadow"
protocol = "file"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["root:"]
