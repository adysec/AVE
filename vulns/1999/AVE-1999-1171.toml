[basic]
description = "Microsoft IIS 3.0/4.0 web服务器存在SSL资源耗尽拒绝服务漏洞。该漏洞源于IIS未能正确区分需要加密传输和无需加密传输的页面，当远程攻击者通过HTTPS端口向原本设计为非加密传输的文件发送SSL请求时，服务器会额外执行SSL加密工作来传输这些文件，从而导致服务器资源被大量消耗。攻击者无需认证，只需持续构造此类SSL请求即可耗尽服务器资源，造成拒绝服务。该漏洞影响Microsoft IIS 3.x和4.x版本，CVSS评分为5.0，属于中等危害等级，对部署了IIS的Web服务器构成潜在威胁。"
published = "1999-07-07T04:00:00.000"
remediation = "立即升级 Microsoft IIS 到受支持的版本（至少 IIS 6.0 以上，推荐 IIS 10.0）。IIS 3.0 和 4.0 已于 2004 年终止支持，不再提供安全补丁，应尽快迁移至 Windows Server 2016/2019/2022 搭配的 IIS 10.0。若短期无法升级，可在 IIS 管理器中将需要加密的页面和不需要加密的页面分别绑定到不同的端口或虚拟主机，避免所有站点共用 HTTPS 端口 443；同时通过防火墙限制对 HTTPS 端口的异常高频连接，降低 SSL 资源耗尽风险。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Microsoft IIS 3.0/4.0 SSL资源耗尽拒绝服务漏洞"
updated = "2026-06-16T21:50:39.457"

