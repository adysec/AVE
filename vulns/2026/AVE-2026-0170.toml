[basic]
description = "n8n 工作流自动化平台 1.65.0 至 1.121.0 之前版本中存在 Content-Type 混淆漏洞（Ni8mare），攻击者可通过篡改 Webhook 请求的 Content-Type 头为 application/json，绕过 multipart/form-data 校验，利用 Form 节点未验证 Content-Type 的缺陷覆盖 req.body.files 对象，实现任意文件读取。进一步可读取 n8n 数据库文件获取管理员凭证和加密密钥，伪造会话令牌实现认证绕过，最终通过 Execute Command 节点实现远程代码执行。该漏洞无需认证，远程攻击即可利用，CVSS 评分 10.0，影响面极广。"
published = "2026-01-07"
remediation = "立即将 n8n 升级至 1.121.0 或更高版本，该版本修复了 Webhook 请求处理中对 Content-Type 头的校验逻辑缺陷。自托管用户可通过 npm update -g n8n 或 Docker 拉取最新镜像升级。作为临时缓解措施，建议限制或禁用公开可访问的 Webhook 和 Form 端点，并对所有 Form 启用身份认证要求，避免将 n8n 实例暴露在公网。"
score = 10.0
severity = "CRITICAL"
sources = [
    "cve",
    "ghsa",
    "hwpoc",
]
title = "n8n Ni8mare Content-Type 混淆致任意文件读取到远程代码执行漏洞"
updated = "2026-07-21"

