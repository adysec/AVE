[info]
author = "AVE"
description = "检测目标系统是否存在易受攻击的 MSCOMCTL.OCX 文件（CVE-2012-1856 TabStrip ActiveX 远程代码执行漏洞）"
id = "POC-AVE-2012-0111"
name = "CVE-2012-1856 PoC"
severity = "high"
tags = ["cve-2012-1856"]
vuln_id = [
    "CVE-2012-1856",
    "AVE-2012-0111",
]

[poc]
logic = "all"

[[poc.requests]]
path = 'C:\Windows\System32\MSCOMCTL.OCX'
protocol = "file"

[[poc.requests.matchers]]
expect = true
part = "body"
regex = ".+"
type = "regex"
