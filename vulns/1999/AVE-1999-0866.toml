[basic]
description = "Microsoft Internet Explorer 5.0 及其 HTML 控件（含 FrontPage Express、Outlook Express 5、Eudora 等）在处理包含超大 HTML 表单字段（如表格单元格中的超大文本输入框）的恶意网页或 HTML 邮件时，存在 CPU 资源耗尽漏洞。远程攻击者可构造包含超大表单字段的恶意网页或 HTML 邮件，诱导用户访问或打开，触发 HTML 控件处理异常导致 CPU 占用 100%，造成拒绝服务。影响 IE 5.0、FrontPage Express、Outlook Express 5、Eudora 等使用 MSHTML 控件的应用，CVSS 5.0 中危，攻击无需认证、用户交互即可触发。"
published = "1999-08-27T04:00:00.000"
remediation = "升级到 Microsoft Internet Explorer 5.01 Service Pack 1 或更高版本，并安装微软 1999 年 10 月发布的安全补丁（Microsoft Security Bulletin MS99-046）。在无法立即升级的环境中，可在邮件客户端（Outlook Express、Eudora）中禁用 HTML 邮件自动渲染、改为纯文本阅读，并使用防火墙或代理网关过滤外部恶意网页，作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
