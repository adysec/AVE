[basic]
description = "Vim 6.0 及 6.1 版本（可能包括其他版本）的 modeline 功能中存在命令执行漏洞。modeline 中的 libcall 特性未受到沙箱机制限制，当用户使用 vim 打开恶意构造的文件时（如通过 mutt 邮件客户端查看恶意邮件），攻击者可利用该漏洞在用户系统上执行任意命令。该漏洞利用条件要求用户主动打开恶意文件，属于本地攻击向量，影响范围广泛。建议升级至不受影响的版本或禁用 modeline 功能。"
published = "2002-12-23T05:00:00.000"
remediation = "升级 vim 至 6.2 及以上版本（Red Hat 用户安装 RHSA-2002:302 提供的修补包）。如无法升级，在 ~/.vimrc 或系统级 vimrc 中添加 `set modelines=0` 以完全禁用 modeline 功能，这是最有效的临时缓解措施，可阻断所有通过 modeline 执行的恶意命令。"
score = 4.6
severity = "MEDIUM"
sources = ["osv"]
title = "Vim 模式行 libcall 功能任意命令执行漏洞"
updated = "2026-06-16T21:59:12.723"

