[basic]
description = "BEA WebLogic 服务端的 PageCompileServlet 未对访问权限进行有效限制，远程攻击者可通过直接调用该 Servlet 访问任意源文件，从而编译并执行恶意的 JHTML 代码，实现远程命令执行。该漏洞影响 WebLogic 3.1.8/4.0.4/4.5.1 及 5.1.x 版本，CVSS 评分 10.0，危害等级严重。官方已发布修复建议，建议升级至安全版本。"
published = "2000-10-20T04:00:00.000"
remediation = "升级 BEA WebLogic 至 5.1.x 以上安全版本，或直接迁移至 Oracle WebLogic 受支持版本（如 12.2.1.4 及以上）。在 WebLogic 控制台或 web.xml 中移除或限制 PageCompileServlet 的访问权限，仅允许受信任 IP 调用该 Servlet。如无法升级，在反向代理或防火墙层面拦截对 /servlets/pagecompile 路径的外部请求。"
score = 10
severity = "CRITICAL"
sources = ["exploitdb"]
title = "BEA WebLogic Server PageCompileServlet 远程命令执行漏洞"
updated = "2026-06-16T21:52:15.920"

