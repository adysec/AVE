[basic]
description = "契约锁电子签章系统存在路径遍历与Spring表达式注入组合漏洞，未经身份认证的远程攻击者可通过向 /pdfverifier/%2e%2e/template/html/add 路径发送特制POST请求，利用路径遍历绕过访问控制，并在extensionParam参数中注入恶意SpEL表达式，从而实现远程代码执行。该漏洞影响契约锁电子签章系统部署的所有版本，攻击者可在目标服务器上执行任意命令，CVSS评分高，危害等级严重。建议立即升级至最新版本或联系厂商获取安全补丁。"
published = "0702"
remediation = '立即升级契约锁电子签章系统至官方发布的最新安全版本（联系厂商 400-888-9792 获取补丁），该版本已修复路径穿越及 SpEL 表达式解析漏洞。临时缓解措施：在 WAF 或反向代理层拦截包含 `/%2e%2e/` 或 `pdfverifier/template/html/add` 路径的 POST 请求，并在 Nginx 中添加 `if ($uri ~* "\.\.") { return 403; }` 规则阻止路径穿越。'
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "契约锁 电子签章系统远程代码执行漏洞"
