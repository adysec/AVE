[basic]
description = "Apache 1.3.x 至 1.3.24 及 Apache 2.0.x 至 2.0.36 版本中存在分块编码（Chunked Encoding）整数处理漏洞，远程攻击者无需认证即可向目标服务器发送特制的分块编码 HTTP 请求，触发 Apache 在处理请求体大小时发生整数溢出，进而导致拒绝服务或潜在远程代码执行。该漏洞在 Windows x86 平台影响严重，CVSS 评分 7.5，高危级别。官方尚未提供自动修复补丁，建议升级至不受影响版本。"
published = "2002-07-03T04:00:00.000"
remediation = "升级 Apache 至 1.3.26+ 或 2.0.37+ 版本，该漏洞已在后续版本中修复。对于无法升级的旧系统，可在 httpd.conf 中禁用 mod_chunked 或使用 mod_security 规则过滤分块编码请求中的恶意载荷作为临时缓解措施。"
score = 7.5
severity = "HIGH"
sources = ["osv"]
title = "Apache HTTP Server Chunked 编码远程代码执行漏洞"
updated = "2026-06-16T21:57:21.037"

