[basic]
description = "Robin Twombly A1 HTTP Server 1.0a 存在目录遍历漏洞。远程攻击者无需身份认证，通过向目标服务器发送包含 `..`（点点）序列的特制 HTTP GET 请求，即可突破 Web 根目录限制，读取服务器上任意文件，如系统配置文件或敏感数据。该漏洞源于服务器对用户请求路径过滤不严，未正确规范化包含 `../` 的路径参数。"
published = "2001-05-03"
remediation = "A1 HTTP Server 1.0a 已停止维护，无法通过官方补丁修复。建议迁移至受支持的 Web 服务器（如 Apache、Nginx）。若无法立即替换，应配置防火墙或反向代理进行 URL 过滤，拦截包含 `../` 的请求路径，并以低权限用户运行 Web 服务以限制文件系统访问范围。"
score = 5.0
severity = "MEDIUM"
sources = [
    "cve",
    "exploitdb",
]
title = "Robin Twombly A1 HTTP Server 目录遍历漏洞"
updated = "2026-06-16"

