[basic]
description = "Virtual Visions FTP 浏览器中的 ftp.pl CGI 程序存在目录遍历漏洞，远程攻击者可通过向目标服务器发送特制的包含 `..`（点点）序列的 HTTP 请求，绕过文档根目录限制读取服务器上的任意文件，导致敏感信息泄露。该漏洞利用了程序对用户输入路径过滤不严的问题，攻击者无需身份认证即可实施攻击。"
published = "2000-07-12T04:00:00.000"
remediation = '对 ftp.pl 脚本中的 path 参数进行输入过滤，严格禁止包含 ../ 或 ..\ 等目录跳转序列，可使用正则校验只允许字母数字和下划线组成的路径；或将脚本升级至厂商修补后的版本；如软件已停止维护，建议直接禁用或替换该 CGI 脚本，改用其他更安全的 FTP 浏览方案。'
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Virtual Visions FTP浏览器 ftp.pl CGI程序目录遍历漏洞"
updated = "2026-06-16T21:52:14.467"

