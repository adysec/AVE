[basic]
description = "Newtonsoft.Json (Json.NET) 在处理异常情况时存在缺陷，远程攻击者可通过向 JsonConvert.DeserializeObject 方法传递特制的恶意数据触发 StackOverflow 异常，导致目标应用或服务拒绝服务。该漏洞影响 13.0.1 之前的所有版本，无需身份认证即可远程利用，CVSS 评分 7.5，危害等级高。建议用户升级至 13.0.1 或更高版本以修复此漏洞。"
published = "2024-01-03T16:15:08.793"
remediation = "将 Newtonsoft.Json (Json.NET) 升级至 13.0.1 或更高版本。若无法立即升级，可在调用 JsonConvert.DeserializeObject 时设置 MaxDepth 参数限制反序列化深度，并对输入数据长度做校验以缓解拒绝服务风险。"
score = 7.5
severity = "HIGH"
sources = ["msrc"]
title = "Newtonsoft Newtonsoft.Json 异常情况处理不当导致拒绝服务漏洞"
updated = "2026-07-14T23:17:13.903"

