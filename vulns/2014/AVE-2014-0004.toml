[basic]
description = "Eyou Mail System 3.6 之前版本中的 get_login_ip_config_file 函数存在命令注入漏洞，攻击者可通过向 admin/domain/ip_login_set/d_ip_login_get.php 文件的 domain 参数传递包含 shell 元字符的恶意 payload，在未经身份认证的情况下远程执行任意命令。该漏洞影响 Eyou Mail System 全系列版本，CVSS 评分 9.8，危害等级严重，建议用户立即升级至 3.6 或更高版本。"
published = "2017-10-24T14:29:00.237"
remediation = "升级 Eyou Mail System 至 3.6 及以上版本，该版本修复了 `domain` 参数过滤不严导致的命令注入问题。若无法立即升级，可通过 Web 服务器配置（如 Nginx/Apache）对 `/admin/domain/ip_login_set/d_ip_login_get.php` 路径添加访问控制，限制仅允许可信管理 IP 访问。"
score = 9.8
severity = "CRITICAL"
sources = ["nuclei"]
title = "Eyou Mail System 远程文件包含漏洞"
updated = "2026-06-17T00:04:31.473"

