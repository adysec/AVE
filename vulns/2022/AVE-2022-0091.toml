[basic]
description = "Linux 内核 AX.25 协议栈中的设备引用跟踪（dev_tracker）存在缺陷，一个 ax25_dev 可被多个 ax25_cb 结构体同时使用，但内核未正确为每个 ax25_cb 分配独立的 dev_tracker，导致在 ax25_release 释放套接字时引用计数器出现不一致，触发内核引用跟踪警告并可能造成系统崩溃。本地攻击者可通过创建并释放多个 AX.25 套接字来利用此漏洞，影响使用 Linux AX.25 协议栈的系统，CVSS 评分 7.8，危害等级高。"
published = "2025-06-18T11:15:46.560"
remediation = '立即升级 Linux 内核至 5.18.18、5.19.2 或更高版本；LTS 分支用户升级至 5.15.35、5.10.112、5.4.190、4.19.240 或 4.14.277 及以上版本。如无法立即升级且未使用业余无线电功能，可执行 `echo "blacklist ax25" > /etc/modprobe.d/disable-ax25.conf && update-initramfs -u` 禁用 ax25 内核模块作为临时缓解措施。'
score = 7.8
severity = "HIGH"
sources = ["msrc"]
title = "Linux 内核 ax25 设备引用计数错误漏洞"
updated = "2026-06-17T05:22:53.263"

