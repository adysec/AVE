[basic]
description = "Mercury MTA POP3 邮件服务器（NetWare 平台）1.48 及更早版本存在缓冲区溢出漏洞。远程攻击者可通过向 POP3 服务发送超长的 APOP 命令触发缓冲区溢出，导致服务拒绝响应，甚至可能执行任意代码。攻击无需身份认证，仅需网络可达目标服务器的 110 端口即可实施利用。该漏洞已有公开的 PoC 利用代码，危害较大。"
published = "2001-06-27T04:00:00.000"
remediation = "升级 Mercury MTA POP3 服务器至 1.48 以上版本。由于该产品已停止维护，建议迁移至受支持的邮件服务器（如 Postfix、Dovecot），并在网络边界防火墙限制对 POP3 端口（110/TCP）的访问，仅允许可信 IP 连接。"
score = 7.5
severity = "HIGH"
sources = ["exploitdb"]
title = "Mercury MTA POP3 for NetWare 缓冲区溢出漏洞"
updated = "2026-06-16T21:54:19.067"

