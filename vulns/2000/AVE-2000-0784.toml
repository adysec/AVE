[basic]
description = "WFTPD 和 WFTPD Pro 2.41 存在信息泄露漏洞。当文件处于传输过程中时，远程未经认证的攻击者可通过向 FTP 服务器发送 STATUS（STAT）命令，获取服务器上文件的实际路径名。该漏洞源于服务器在处理 STAT 命令时未对路径信息进行过滤限制，导致文件系统真实路径被泄露。攻击者可利用此漏洞收集服务器目录结构信息，为后续渗透攻击提供线索。CVSS 评分 5.0，危害等级中危。"
published = "2000-07-21T04:00:00.000"
remediation = "升级 WFTPD 至 2.41 以上版本（如 2.42 RC 或更高），该版本修复了 STAT 命令泄露真实路径的问题。如无法升级，可在 WFTPD 配置中禁用 STAT 命令或限制可执行该命令的用户组，同时在防火墙层面限制对 FTP 服务端口（默认 21）的访问来源 IP，仅允许可信地址连接。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Texas Imperial Software WFTPD 2.41 路径信息泄露漏洞"
updated = "2026-06-16T21:52:10.887"

