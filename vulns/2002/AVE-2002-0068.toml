[basic]
description = "Sendmail 5.79 至 8.12.7 版本的 crackaddr 函数在处理邮件头中发件人和收件人地址字段注释时存在缓冲区溢出漏洞。远程攻击者无需身份认证，通过向目标邮件服务器发送特制的格式化地址字段邮件即可触发该漏洞，导致任意代码执行。该漏洞影响大量使用 Sendmail 的 Linux/Unix 邮件服务器，CVSS 评分 10.0，危害等级严重。厂商已发布补丁修复此漏洞。"
published = "2003-03-07T05:00:00.000"
remediation = "立即升级 Sendmail 至 8.12.8 或更高版本，该版本已修复 crackaddr 函数中的缓冲区溢出漏洞。如无法升级，可在 sendmail.cf 中限制邮件头字段长度并启用 smrsh 限制可执行程序列表作为临时缓解措施。"
score = 10
severity = "CRITICAL"
sources = ["osv"]
title = "Sendmail Sendmail 邮件头处理缓冲区溢出漏洞"
updated = "2026-06-16T21:59:07.767"

