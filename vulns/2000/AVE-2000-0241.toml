[basic]
description = "Cisco Catalyst 交换机运行 CatOS 5.4 版本时存在使能（enable）密码认证绕过漏洞，攻击者只要能够与设备进行 CLI 交互（通过控制台、Telnet 或 SSH 登录到用户模式），无需输入正确的使能密码便可直接执行 enable 命令进入特权模式，从而完全控制交换机。该漏洞影响 Catalyst 系列运行 5.4.x 版本的设备，可导致攻击者篡改配置、劫持流量或造成拒绝服务，属中危漏洞，CVSS 评分约 4.6。"
published = "2000-04-20T04:00:00.000"
remediation = "升级到 Cisco CatOS 5.4(1) 或更高版本以修复使能密码旁路漏洞。如无法立即升级，应通过 enable password 命令配置强加密使能口令，并限制管理访问来源，仅允许受信任管理员通过控制台或带外管理接口登录设备。"
score = 4.6
severity = "MEDIUM"
sources = ["cve"]
title = "Cisco Catalyst CatOS 5.4.x 使能密码认证绕过漏洞"
updated = "2026-06-16T21:51:21.513"

