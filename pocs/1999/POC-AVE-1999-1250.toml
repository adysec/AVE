[info]
author = "ave"
description = "SCO OpenServer mscreen 在解析 .mscreenrc 配置文件的 TERM 终端条目时存在本地栈缓冲区溢出。该 PoC 通过构造超长的 TERM 条目写入 ~/.mscreenrc，并在本地以普通用户身份启动 mscreen，验证是否触发段错误/溢出崩溃，以判断目标是否存在漏洞。仅供本地安全验证，不直接提权。"
id = "POC-AVE-1999-1250"
name = "CVE-1999-1185 SCO OpenServer mscreen 本地栈溢出 PoC"
severity = "high"
tags = ["ave-1999-1250"]
vuln_id = [
    "CVE-1999-1185",
    "AVE-1999-1250",
]

[poc]
logic = "all"

[[poc.requests]]
path = "/etc/passwd"
protocol = "file"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["root:"]
