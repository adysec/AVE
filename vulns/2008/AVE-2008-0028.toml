[basic]
description = "Apple QuickTime 媒体播放器在解析 PICT 图像文件时，quickTime.qts 组件中存在堆缓冲区溢出漏洞。由于内存复制循环未正确终止，远程攻击者可通过构造特制的 PICT 图像文件，诱使用户在 QuickTime 中打开或查看该文件，从而触发缓冲区溢出并执行任意代码。该漏洞影响 QuickTime 7.4.5 之前的所有版本，攻击无需身份认证，用户仅需打开恶意图像文件即可遭利用，可导致程序崩溃或在受影响系统上获得与用户相同的执行权限。Apple 在 QuickTime 7.4.5 中修复了此漏洞。"
published = "2008-04-04T17:44:00.000"
remediation = "立即将 Apple QuickTime 升级至 7.4.5 或更高版本，可通过系统软件更新功能或访问 Apple 支持网站（support.apple.com/kb/HT1241）下载安装安全更新。如暂时无法升级，建议避免打开来历不明的 PICT 图像文件，并在浏览器中禁用 QuickTime 插件作为临时缓解措施。"
score = 6.8
severity = "MEDIUM"
sources = ["tenable"]
title = "Apple QuickTime PICT图像文件解析缓冲区溢出远程代码执行漏洞"
updated = "2026-06-16T22:50:49.167"

