[basic]
description = "SCO UnixWare 2.1.x 及 OpenServer 5.05 及更早版本中的 xserver 组件存在安全漏洞。本地攻击者可通过向 xserver 发送特制请求，导致系统拒绝服务，使得其他用户无法绑定 1024 以下的保留端口号。该漏洞影响 SCO UnixWare 2.1.x 和 OpenServer 5.05 及更早版本，CVSS 评分 5.0，危害等级中等。目前厂商已发布补丁修复此漏洞。"
published = "2001-03-12T05:00:00.000"
remediation = "建议升级 SCO OpenServer 至 5.06 及以上版本，或安装 SCO 官方提供的 xserver 安全补丁。临时缓解措施：限制本地用户对 X11 服务的访问权限，或在 xserver 配置中禁用低端口号绑定功能。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "SCO OpenServer xserver 端口资源拒绝服务漏洞"
updated = "2026-06-16T21:51:26.633"

