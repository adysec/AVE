[basic]
description = "Internet Explorer 4.01 及 5 版本所安装的 HHOpen ActiveX 控件（hhopen.ocx 1.0.0.1）存在缓冲区溢出漏洞。远程攻击者可通过向该控件的 OpenHelp 方法传递超长参数触发缓冲区溢出，从而在用户浏览器上下文中执行任意命令。攻击者需诱导用户访问恶意网页即可完成利用，无需其他认证条件。"
published = "1999-10-31T04:00:00.000"
remediation = '升级至 Internet Explorer 5.5 及以上版本可消除该漏洞；若无法升级，可通过注册表为 hhopen.ocx 设置 kill bit（CLSID: {ADB880A2-D8FF-11CF-9377-00AA003B7A11}），在 HKEY_LOCAL_MACHINE\SOFTWARE\Microsoft\Internet Explorer\ActiveX Compatibility\{ADB880A2-D8FF-11CF-9377-00AA003B7A11} 下创建 DWORD 值 Compatibility Flags 为 0x400，禁用该 ActiveX 控件。建议使用现代浏览器替代 IE 系列。'
score = 5.1
severity = "MEDIUM"
sources = ["avd"]
title = "Microsoft Internet Explorer HHOpen ActiveX 缓冲区溢出漏洞"
updated = "2026-06-16T21:50:45.543"

