[basic]
description = "Microsoft Outlook Web Access（OWA）for Exchange Server 2003 SP2 的 exchweb/bin/redir.asp 页面存在开放重定向漏洞。远程攻击者可通过向 URL 参数传入恶意构造的链接，诱使用户点击后跳转到任意外部网站，进而实施钓鱼攻击。该漏洞影响 Exchange Server 2003 SP2（build 6.5.7638），CVSS 评分 4.3，危害等级中危。此类重定向漏洞可被用于窃取用户凭据或传播恶意软件，建议用户升级至受支持版本或安装相应安全更新。"
published = "2008-10-21T01:18:01.927"
remediation = "建议立即将 Exchange Server 2003 SP2 升级到受支持的 Exchange Server 2016/2019 或迁移至 Exchange Online，以彻底消除此漏洞。如无法立即升级，可在 IIS 中对 exchweb/bin/redir.asp 添加 URL 重写规则，过滤并阻断非白名单域名的 URL 参数传递，或直接禁用 redir.asp 页面（通过 IIS 删除该文件处理映射）。"
score = 4.3
severity = "MEDIUM"
sources = ["nuclei"]
title = "Microsoft Outlook Web Access for Exchange Server 2003 开放重定向漏洞"
updated = "2026-06-16T22:51:57.103"

