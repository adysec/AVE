[basic]
description = "SuSE Linux pbpg 1.x 软件包中的 pg 和 pb 工具未对文件访问权限进行充分限制，导致已获得本地访问权限的攻击者能够读取系统上任意文件，造成敏感信息泄露。该漏洞影响 SuSE pbpg 1.x 版本，CVSS 评分 7.5，危害等级高。受限于本地攻击前提，攻击者需先获取系统普通用户权限方能利用此漏洞进行文件读取操作。"
published = "1999-08-21T04:00:00.000"
remediation = "立即升级 pbpg 软件包至版本 1.2.2 或更高版本（SuSE Security Announcement 21）。如无法升级，可移除 pg 和 pb 二进制文件的 setuid 位以消除任意文件读取风险：chmod u-s /usr/bin/pg /usr/bin/pb。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "SuSE pbpg 任意文件读取漏洞"
updated = "2026-06-16T21:51:32.690"

