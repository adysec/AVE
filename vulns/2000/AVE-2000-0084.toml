[basic]
description = "Microsoft Systems Management Server 2.0 的远程控制程序在安装时设置了不安全的默认权限，导致本地用户能够通过修改或替换该程序文件来提升系统权限，获取对目标系统的更高访问控制权。该漏洞影响 SMS 2.0 版本，攻击者需拥有本地系统访问权限方可利用，CVSS 评分 7.2，危害等级为高危。建议管理员及时限制远程控制程序文件的访问权限。"
published = "1999-12-29T05:00:00.000"
remediation = "建议安装 Microsoft Systems Management Server 2.0 Service Pack 1 或更高版本更新。手动修复可修改 SMS Remote Control 程序文件（如 WUSER32.EXE）的 ACL，仅允许管理员组具有写入/修改权限，移除 Users 组的写入权限。临时缓解措施可禁用 SMS 远程控制客户端服务或通过组策略限制本地用户对系统目录的写入权限。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "Microsoft Systems Management Server 2.0 默认权限配置不当导致本地权限提升漏洞"
updated = "2026-06-16T21:51:00.050"

