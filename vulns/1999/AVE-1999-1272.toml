[basic]
description = "Slackware Linux 3.2 至 3.5 版本的 login 程序在 /etc/group 文件缺失时未正确检查错误，导致无法正确降权，导致任意本地用户登录系统即可获得 root 权限。该漏洞影响 Slackware Linux 3.2 至 3.5 版本，CVSS 评分 7.2（高危）。攻击者只需拥有本地登录权限，在 /etc/group 文件缺失的条件下登录系统即可获得 root 权限，属于本地权限提升漏洞。官方已在后续版本中修复该漏洞，建议升级至 Slackware Linux 3.6 或更高版本。"
published = "1998-07-13T04:00:00.000"
remediation = "升级到 Slackware Linux 5.0 或更高版本，其中包含对 /etc/group 文件存在性检查的修复，或立即手动创建 /etc/group 文件并确保权限为 644，防止登录过程因文件缺失导致 root 权限错误分配。"
score = 7.2
severity = "HIGH"
sources = ["exploitdb"]
title = "Slackware Linux 本地权限提升漏洞"
updated = "2026-06-16T21:50:25.980"

