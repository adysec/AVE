[basic]
description = "Common Unix Printing System (CUPS) 1.1.14 至 1.1.17 版本中存在文件描述符管理缺陷，未正确检查各类文件操作和套接字操作的返回值，导致文件描述符被分配后无法正常释放。远程攻击者无需身份认证即可通过发送特制请求持续消耗系统文件描述符资源，最终造成拒绝服务。该漏洞影响 Linux/Unix 系统上部署的 CUPS 打印服务，攻击复杂度低，利用工具 fanta 已公开验证。厂商建议升级至 CUPS 1.1.18 及以上版本修复。"
published = "2002-12-26T05:00:00.000"
remediation = "升级 CUPS 至 1.1.18 或更高版本。Debian 用户应安装 DSA-232 安全更新，Red Hat 用户应用 RHSA-2002:295 补丁，Mandrake 用户安装 MDKSA-2003:001 更新。如无法立即升级，可在 CUPS 配置文件 /etc/cups/cupsd.conf 中限制监听地址为 127.0.0.1，禁止远程访问 CUPS 服务以缓解风险。"
score = 7.5
severity = "HIGH"
sources = ["osv"]
title = "Easy Software Products CUPS 文件描述符未正确释放拒绝服务漏洞"
updated = "2026-06-16T21:59:11.930"

