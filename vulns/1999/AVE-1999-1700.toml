[basic]
description = "Novell NetWare 5及更早版本在IPX协议上运行且数据包签名级别低于3时存在安全漏洞。远程攻击者可通过伪造IPC分片数据包中的MAC地址来欺骗NetWare核心协议(NCP)调用，从而在未经授权的情况下获取管理员权限。该漏洞危害严重，CVSS评分10.0，可导致目标系统完全受控。建议升级数据包签名级别至3或以上以进行防护。"
published = "1999-07-15T04:00:00.000"
remediation = "将 NetWare 服务器 NCF 文件中 `SET PACKET SIGNATURE LEVEL` 设置为 3 或更高，强制要求 IPX 数据包签名验证，防止 MAC 地址欺骗攻击。如无法调整签名级别，可考虑禁用 IPX 协议并迁移至 TCP/IP 网络，或使用 VLAN 隔离限制攻击来源。建议升级至 Novell 6 及以上版本以获得完整修复。"
score = 10
severity = "CRITICAL"
sources = ["cve"]
title = "Novell NetWare IPX 管理会话伪骗权限提升漏洞"
updated = "2026-06-16T21:49:41.520"

