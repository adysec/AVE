[basic]
description = "IIS 和 Site Server 中的 showcode.asp 示例文件存在任意文件读取漏洞。远程攻击者无需身份认证即可通过特制的 HTTP 请求利用该示例脚本读取服务器上的任意文件，导致敏感信息泄露。该漏洞影响 Microsoft IIS 4.0 和 Site Server 3.0 等版本，攻击者只需向目标服务器发送构造的 URL 即可触发，利用门槛较低。"
published = "1999-05-07T04:00:00.000"
remediation = "立即删除 IIS 4.0 或 Site Server 3.0 服务器上的 showcode.asp、viewcode.asp、code.asp、codebrws.asp 等示例文件查看器脚本，这些文件默认可被远程攻击者利用读取任意文件。生产环境禁止部署任何 IIS 示例文件，同时安装 MS99-013 补丁程序。如无法立即删除，可通过 NTFS 权限限制对上述脚本的读取访问作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Microsoft IIS 及 Site Server showcode.asp 任意文件读取漏洞"
updated = "2026-06-16T21:48:57.020"

