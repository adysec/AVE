[basic]
description = "ProFTPd 1.2 pre1 至 pre5 版本、wu-ftpd 及 beroftpd 中存在缓冲区溢出漏洞。远程攻击者可通过向目标 FTP 服务器发送一系列精心构造的 MKD（创建目录）和 CWD（切换目录）命令，创建深层嵌套目录结构，触发缓冲区溢出，进而获得 root 权限。该漏洞影响多个主流 FTP 服务端软件，危害严重，无需认证即可远程利用。"
published = "1999-08-27T04:00:00.000"
remediation = "升级 ProFTPd 至 1.2.0 RC1 或更高稳定版本（1.2.0pre 系列已停止支持），该漏洞在 1.2.0 RC1 中修复。使用 wu-ftpd 的用户应升级至 2.6.2 或更新版本，或在 inetd 配置中禁用匿名用户 MKD/CWD 目录创建权限作为临时缓解措施。beroftpd 用户建议迁移至已维护的 FTP 服务器软件。"
score = 10
severity = "CRITICAL"
sources = ["cve"]
title = "ProFTPd MKD/CWD 命令缓冲区溢出漏洞"
updated = "2026-06-16T21:49:18.797"

