[basic]
description = "CGI Script Center Account Manager LITE/PRO 1.0 存在权限验证缺失漏洞，远程攻击者无需身份认证即可直接调用 amadmin.pl 脚本并传递 setpasswd 参数，从而未经授权修改管理员密码，获取系统管理权限。该漏洞影响 Account Manager LITE/PRO 1.0 版本，CVSS 评分 7.5，危害等级高。建议用户升级至最新版本或实施访问控制措施。"
published = "2000-10-20T04:00:00.000"
remediation = "立即删除或限制访问 amadmin.pl 脚本，在 Apache 配置中添加 <Location /cgi-bin/amadmin.pl> Deny from all </Location> 阻止外部直接调用。如业务需要，升级到厂商修复版本或迁移至其他成熟账户管理方案。同时确保 CGI 目录不对外暴露管理端脚本。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "CGI Script Center Account Manager 管理密码更改漏洞"
updated = "2026-06-16T21:52:16.410"

