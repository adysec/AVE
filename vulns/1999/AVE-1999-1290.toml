[basic]
description = "ISC BIND 4.9 及 8.1 版本中 `named` 服务进程存在本地符号链接漏洞。当管理员使用 SIGINT 或 SIGIOT 信号终止 `named` 进程时，该进程会向 `named_dump.db` 或 `named.stats` 文件写入数据。本地攻击者可预先创建同名符号链接指向系统关键文件，诱使 `named` 进程以 root 权限覆写目标文件，造成文件破坏或拒绝服务。该漏洞攻击复杂度低，但需要本地访问权限，CVSS 评分 2.1，危害较低。"
published = "1998-04-10T04:00:00.000"
remediation = "立即升级至 BIND 9 系列最新稳定版（如 9.20.24），BIND 4.x/8.x 已停止维护多年。如无法升级，将 named 运行在 chroot 或容器隔离环境中，限制其对文件系统的写入权限；同时确保 named_dump.db 和 named.stats 所在目录仅允许 named 用户写入，并启用文件系统防护机制（如 nosuid、noexec 挂载选项）防止符号链接攻击。"
score = 2.1
severity = "LOW"
sources = ["avd"]
title = "ISC BIND 符号链接本地文件破坏漏洞"
updated = "2026-06-16T21:50:34.333"

