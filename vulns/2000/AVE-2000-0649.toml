[basic]
description = "Microsoft IIS 4.0 和 5.0 存在 Unicode 目录遍历漏洞，攻击者通过向服务器发送包含 Unicode 编码字符的恶意 URL 时，IIS 系统无法正确验证和处理路径，导致攻击者能够绕过 Web 根目录限制，读取服务器上其他目录的文件，甚至可能执行任意命令对服务器进行控制。该漏洞影响 Microsoft IIS 4.0/5.0 和 PWS，允许远程未认证攻击者访问服务器的敏感文件系统，对 Web 应用安全造成严重威胁。"
published = "2000-12-19T05:00:00.000"
remediation = "立即升级到Windows Server 2003或更新版本（IIS 6.0或更高），这些版本提供了对Unicode目录遍历攻击的完整防护。如果无法立即升级，请立即联系微软技术支持获取安全补丁，同时在配置中禁用URL中Unicode编码的处理，并在web.config中添加安全规则以限制目录遍历访问。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "Microsoft IIS 4.0/5.0 和 PWS Unicode 编码目录遍历漏洞"
updated = "2026-06-16T21:52:40.277"

