[basic]
description = "Anaconda Foundation Directory 1.4 至 1.9 版本的 apexec.pl 脚本存在目录遍历漏洞，远程攻击者可通过向目标发送包含 `../` 序列的特制 URL 请求，绕过路径限制读取服务器上任意文件（如 `/etc/passwd` 等敏感文件）。该漏洞利用难度低，无需认证即可触发，CVSS 评分 5.0，危害等级中危。"
published = "2000-12-19"
remediation = "升级 Anaconda Foundation Directory 至 1.9 或更高版本，该版本修复了 apexec.pl 未正确过滤 ../ 路径遍历序列的问题。如无法立即升级，建议在 Web 服务器层面限制对 apexec.pl 的访问，或直接删除该 CGI 脚本。"
score = 5.0
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Anaconda Foundation Directory apexec.pl 目录遍历漏洞"
updated = "2026-06-16"

