[basic]
description = 'AVM KEN! 设备内置的 Web 服务器存在目录遍历（../ 点号攻击）漏洞，未能正确对用户输入的路径进行规范化校验。远程攻击者无需身份认证，只需向目标设备的 Web 服务端口发送包含".."序列的特制 HTTP 请求，即可绕过目录限制读取服务器根目录之外的任意文件，如配置文件、口令文件等敏感信息。该漏洞影响运行 AVM KEN! 固件并开启 Web 管理界面的设备，攻击条件为攻击者能通过网络访问目标设备的 HTTP 服务，利用方式简单，仅需构造恶意 URL 即可实现信息泄露。'
published = "2000-04-12T04:00:00.000"
remediation = "立即将 AVM KEN! 远程访问软件升级至官方修复版本（固件/程序版本 3.30 及以上，具体以 AVM 发布的安全更新为准）。升级前可在路由器或防火墙侧关闭 KEN! 远程 Web 访问功能，或仅允许受信任 IP 通过端口过滤访问该服务，以临时缓解任意文件读取风险。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "AVM KEN! 网页服务器 任意文件读取漏洞"
updated = "2026-06-16T21:51:20.763"

