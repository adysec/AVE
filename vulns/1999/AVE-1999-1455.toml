[basic]
description = "Samba 1.9.18 版本附带了一个名为 wsmbconf 的原型应用程序，该程序在安装过程中被错误配置了 setgid 权限位。本地攻击者可以利用该程序的漏洞读取和写入任意文件，进而可能通过权限提升获取更高的系统访问权限。该漏洞为本地利用，需要攻击者拥有本地访问权限，影响 Samba 1.9.18 版本，CVSS 评分 4.6，危害等级中危。"
published = "1998-11-19T05:00:00.000"
remediation = "立即升级 Samba 至 2.0.0 或更高版本（该原型程序 wsmbconf 已在后续版本中移除）。如无法升级，可执行以下缓解措施：1) 移除 wsmbconf 的 setgid 位：`chmod g-s $(which wsmbconf)`；2) 如无需使用该工具，直接删除 wsmbconf 二进制文件：`rm -f $(which wsmbconf)`；3) 检查系统内其他 setgid 文件权限是否异常。"
score = 4.6
severity = "MEDIUM"
sources = ["avd"]
title = "Samba wsmbconf 权限配置不当导致信息泄露及权限提升漏洞"
updated = "2026-06-16T21:50:07.050"

