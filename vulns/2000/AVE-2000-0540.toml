[basic]
description = "Zope 2.2 及更早版本中的 DocumentTemplate 包存在未授权访问漏洞，远程攻击者无需身份认证即可通过特制请求修改 DTMLDocument 或 DTMLMethod 模板内容，导致网站页面被篡改或植入恶意代码。该漏洞影响 Zope 2.2 及之前所有版本，CVSS 评分 7.5，危害等级高。攻击者只需网络可达即可利用，无需任何权限，攻击复杂度低。"
published = "2000-06-15T04:00:00.000"
remediation = "立即升级 Zope 至 2.1.7 或更高版本，官方已在 2000 年 6 月 16 日发布安全热修复（Hotfix），可从 Zope 官网 security_alert 页面获取补丁。Red Hat 用户请安装 RHSA-2000:038 更新，FreeBSD 用户请应用 FreeBSD-SA-00:38 安全公告。如无法升级，可在 Web 服务器层面限制对 DTML 模板管理接口的访问 IP 白名单作为临时缓解。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "Zope Zope 2.2 DTML模板和DTML方法未授权修改漏洞"
updated = "2026-06-16T21:51:49.863"

