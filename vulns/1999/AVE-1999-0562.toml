[basic]
description = "Palace 聊天系统客户端存在远程代码执行漏洞，恶意的 Palace 服务器可向连接的客户端发送特制指令，强制客户端执行任意程序，无需用户确认。攻击者通过搭建恶意服务器诱导用户连接，即可在目标主机上以当前用户权限执行任意代码。该漏洞影响早期版本 Palace 客户端，CVSS 评分 5.1，危害等级中危。"
published = "1998-10-02T04:00:00.000"
remediation = "该漏洞源于Palace协议设计缺陷，服务端可强制客户端执行任意程序。由于Communities.com已停止运营，原厂商不再提供安全更新。建议立即停止使用已停维护的Palace客户端，迁移至替代方案。如必须继续使用，仅连接可信任的自建Palace服务器，并在防火墙上限制Palace客户端的出站连接范围，仅允许白名单服务器IP，同时以低权限用户运行客户端以降低利用影响。"
score = 5.1
severity = "MEDIUM"
sources = ["avd"]
title = "Palace Palace Client 远程代码执行漏洞"
updated = "2026-06-16T21:48:11.610"

