[info]
author = "ave"
description = "检测 NTMail 5.x 代理限制绕过漏洞，网络用户可通过将 HTTP 请求重定向至 NTMail Web 配置服务器（通常运行在 8000 端口），绕过代理访问控制策略，导致未授权访问内部网络资源"
id = "POC-AVE-2000-0449"
name = "NTMail Proxy Bypass PoC"
severity = "medium"
tags = ["ave-2000-0449"]
vuln_id = [
    "CVE-2000-0416",
    "AVE-2000-0449",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "NTMail",
    "Configuration",
    "Gordano",
]
