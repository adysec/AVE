[basic]
description = "Breeze Network Server 的开发版本中存在拒绝服务漏洞，远程攻击者无需任何认证即可通过 HTTP 请求访问 configbreeze CGI 程序，导致目标系统立即重启，造成服务不可用。该漏洞攻击复杂度低，仅需网络可达即可触发，严重影响系统连续性。"
published = "1998-12-26"
remediation = "建议立即将 Breeze Network Server 升级至正式稳定版，或彻底移除/禁用 configbreeze CGI 脚本。如无法升级，应在 Web 服务器或网络防火墙层面限制对 configbreeze 脚本的访问（仅允许受信 IP），并删除该脚本的执行权限作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Breeze Network Server configbreeze CGI 访问导致系统重启漏洞"
updated = "2026-06-16"

