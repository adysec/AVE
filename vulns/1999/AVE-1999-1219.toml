[basic]
description = "Debian GNU/Linux netstd 软件包中的 FTP 客户端存在缓冲区溢出漏洞。攻击者可通过向目标系统发送特制的 FTP 服务器响应，触发客户端缓冲区溢出，导致拒绝服务或潜在任意代码执行。该漏洞影响 Debian 2.0 及使用 netstd 软件包的相关系统版本，CVSS 评分 7.2，危害等级高。"
published = "1999-01-03T05:00:00.000"
remediation = "netstd 软件包已在 Debian 后续版本中被拆分废弃，建议升级到受支持的 Debian 稳定版（如 Debian 11/12），使用现代 FTP 客户端替代（如 lftp 或 filezilla），或改用更安全的 SFTP/SCP 协议传输文件。如无法升级，应移除 netstd 软件包并限制本地非授权用户执行 FTP 客户端程序。"
score = 7.2
severity = "HIGH"
