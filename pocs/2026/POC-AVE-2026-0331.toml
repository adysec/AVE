[info]
author = "ave"
description = "检测目标站点是否使用了存在漏洞的 tarteaucitron.js（<1.33.0），该版本中 tarteaucitron.cookie.purge() 未校验触发元素是否为合法按钮，攻击者可通过注入带有 purgeBtn 类名和 data-cookie 属性的 HTML 元素，诱骗用户点击后静默删除任意非 HttpOnly 的已知名称 Cookie。"
id = "POC-AVE-2026-0331"
name = "tarteaucitron.js Cookie 任意删除漏洞 PoC"
severity = "medium"
tags = [
    "cve-2026-49977",
    "tarteaucitron",
    "cookie-deletion",
    "cwe-285",
]
vuln_id = [
    "CVE-2026-49977",
    "AVE-2026-0331",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/tarteaucitron.js"
protocol = "http"

[poc.requests.body]
content = ""
type = "raw"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["tarteaucitron"]

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/tarteaucitron/tarteaucitron.js"
protocol = "http"

[poc.requests.body]
content = ""
type = "raw"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["tarteaucitron"]

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/js/tarteaucitron.js"
protocol = "http"

[poc.requests.body]
content = ""
type = "raw"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["tarteaucitron"]

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/assets/tarteaucitron/tarteaucitron.js"
protocol = "http"

[poc.requests.body]
content = ""
type = "raw"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["tarteaucitron"]
