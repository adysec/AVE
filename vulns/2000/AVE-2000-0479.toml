[basic]
description = "O'Reilly WebSite Professional Web 服务器 2.x 版本的 webfind.exe CGI 程序存在缓冲区溢出漏洞，远程攻击者可通过向目标服务器发送包含超长 keywords 参数的恶意 URL 请求触发该漏洞，导致攻击者能够在目标系统上执行任意命令。该漏洞 CVSS 评分为 10.0，危害等级严重，且无需身份认证即可远程利用。受影响版本包括 2.3.18、2.4 及 2.4.9 等。"
published = "2000-07-19T04:00:00.000"
remediation = "立即升级到 O'Reilly WebSite Professional 2.5 或更高版本，该版本已在发行说明中修复了 webfind.exe 的缓冲区溢出问题。由于该产品已停止维护且厂商不再提供支持，建议迁移至 Apache HTTP Server、Nginx 等现代 Web 服务器。如无法立即迁移，可在 Web 服务器前端部署 WAF 规则，对 keywords 参数长度进行限制（建议不超过 256 字符），或直接禁用 webfind.exe CGI 程序。"
score = 10
severity = "CRITICAL"
sources = ["exploitdb"]
title = "O'Reilly WebSite Professional webfind.exe 远程缓冲区溢出漏洞"
updated = "2026-06-16T21:52:07.803"

