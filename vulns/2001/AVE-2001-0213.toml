[basic]
description = "ISC BIND 4 域名服务器软件的 nslookupComplain 函数存在格式字符串漏洞，远程攻击者无需身份认证即可向目标 DNS 服务器发送特制的格式字符串数据包，触发该函数中的格式化输出缺陷，导致攻击者可以覆盖任意内存地址，最终以 root 权限执行任意代码。该漏洞影响 BIND 4 系列版本，CVSS 评分 10.0，危害等级严重，可导致服务器完全被控。"
published = "2001-02-12T05:00:00.000"
remediation = "立即将 BIND 4 升级至 BIND 9.x 系列最新稳定版（如 BIND 9.18.x），BIND 4 已停止维护且存在多处严重漏洞。如无法升级，在 named.conf 中限制 nslookup 功能访问来源，仅允许受信 IP 段发起 DNS 查询请求作为临时缓解。"
score = 10
severity = "CRITICAL"
sources = ["redhat"]
title = "ISC BIND 4 nslookupComplain 格式字符串漏洞"
updated = "2026-06-16T21:53:29.393"

