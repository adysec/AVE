[basic]
description = "Omnicron OmniHTTPd 2.0.8 及更早版本存在源代码泄露漏洞，攻击者可通过发送包含 URL 编码空格符 (%20) 的 GET 请求，绕过服务器的脚本执行机制直接获取服务器端脚本源代码。该漏洞影响 OmniHTTPd 2.0.4 至 2.0.8 版本，攻击者无需身份认证即可远程发起攻击，仅需构造包含 %20 的恶意 URL 即可获取服务端脚本源码，可能导致敏感信息泄露、业务逻辑泄露等安全风险。攻击者可利用该漏洞获取服务端脚本源代码，进而分析业务逻辑漏洞、数据库连接信息等敏感内容，CVSS 评分 5.0（中危）。"
published = "2001-10-18T04:00:00.000"
remediation = "建议立即迁移至现代维护中的 Web 服务器（如 Apache、Nginx 或 IIS 最新版），OmniHTTPd 2.0.8 及更早版本已停止维护且无官方补丁。临时缓解措施：在 Web 应用防火墙或反向代理层配置规则拦截包含 %20 的 URL 请求，或在 Web 服务器配置中禁用 URL 编码空格解析功能，同时限制对敏感源码目录的直接访问权限。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Omnicron OmniHTTPd 文件源代码泄露漏洞"
updated = "2026-06-16T21:54:56.420"

