[basic]
description = "FlowPoint DSL 路由器固件 3.0.8 之前的版本存在安全设计缺陷，其密码恢复功能本应仅限串行控制台端口使用，却被错误暴露于网络接口。远程攻击者无需认证即可通过网络访问该功能，对设备管理密码进行暴力猜测攻击，可能导致路由器管理权限被非法获取。该漏洞影响 FlowPoint DSL 路由器固件 3.0.8 之前的所有版本，CVSS 评分 5.0，危害等级中危。"
published = "1999-08-07T04:00:00.000"
remediation = "升级 FlowPoint DSL router firmware 至 3.0.8 或更高版本，该版本将密码恢复功能限制在串行控制台端口，禁止远程访问该功能。如无法升级，可在网络边界防火墙中阻断对路由器管理端口（如 Telnet/HTTP）的远程访问。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "FlowPoint DSL Router 固件远程密码暴力破解漏洞"
updated = "2026-06-16T21:50:37.530"

