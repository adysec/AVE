[basic]
description = "Squid 代理服务器在 Red Hat Linux 5.2/6.0 及其他发行版中默认将 cachemgr.cgi 管理脚本安装到公开 Web 目录下，且未配置访问认证措施。远程攻击者无需任何身份验证即可通过 HTTP 直接访问该脚本，将其作为跳板代理连接内网或其他系统，导致敏感信息泄露、内网扫描及未授权访问等安全风险。该漏洞利用门槛较低，仅需目标系统运行存在缺陷的 Squid 版本且 cachemgr.cgi 可被外部访问即可触发。"
published = "1999-07-25T04:00:00.000"
remediation = "删除或限制 Squid 的 cachemgr.cgi 脚本访问权限：从 web 目录中移除该脚本（`rm /usr/lib/squid/cachemgr.cgi`），或在 Squid 配置中使用 ACL 规则限制仅允许信任 IP 访问（如 `acl manager proto cache_object` + `http_access deny manager`）。升级至 Squid 2.3 及以上版本可获得官方修复。"
score = 7.5
severity = "HIGH"
sources = ["osv"]
title = "Squid cachemgr.cgi 未授权连接漏洞"
updated = "2026-06-16T21:48:53.680"

