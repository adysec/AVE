[basic]
description = 'Microsoft Windows 内核未正确验证对未指定内核对象的更改，存在权限提升漏洞。本地攻击者可通过运行特制应用程序利用该漏洞，在内核上下文中执行任意代码，从而获取系统完全控制权。该漏洞影响 Windows 2000 SP4、XP SP2/SP3、Server 2003 SP2、Vista 及 Server 2008 等多个版本，CVSS 评分 7.8，危害等级高。此漏洞又称"Windows Kernel Desktop Vulnerability"，需本地访问权限方可利用。'
published = "2009-06-10T18:30:00.327"
remediation = "安装 Microsoft 安全公告 MS09-025 (KB968537) 提供的更新，可通过 Windows Update 自动更新或手动下载安装。Windows 2000 SP4 需安装 KB968537；XP SP2/SP3 需安装 KB968537；Server 2003 SP2 需安装 KB968537；Vista/Server 2008 需安装 KB968537。无临时缓解措施，必须安装补丁修复。"
score = 7.8
severity = "HIGH"
sources = ["kev"]
title = "Microsoft Windows 内核桌面对象权限提升漏洞"
updated = "2026-06-16T23:06:33.440"

