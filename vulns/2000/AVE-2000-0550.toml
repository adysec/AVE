[basic]
description = "HP-UX 10.20 的 FTP 服务程序（ftpd）存在格式化字符串漏洞，远程攻击者无需身份认证即可通过向 PASS 命令提交特制的格式化字符串参数触发该漏洞，导致目标系统拒绝服务或执行任意命令。该漏洞影响 HP-UX 10.20 版本，CVSS 评分 10.0，危害等级严重，且已有公开利用代码。"
published = "2000-10-20T04:00:00.000"
remediation = "立即安装 HP 安全补丁 PHNE_22307 或更新版本，修复 ftpd 中 PASS 命令的格式化字符串漏洞。如无法打补丁，可在 inetd 配置中禁用 FTP 服务（注释掉 /etc/inetd.conf 中 ftp 行并重启 inetd），改用 SFTP 替代。"
score = 10
severity = "CRITICAL"
sources = ["cve"]
title = "HP HP-UX FTPD 格式字符串远程代码执行漏洞"
updated = "2026-06-16T21:52:17.697"

