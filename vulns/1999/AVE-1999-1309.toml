[basic]
description = "Apache HTTP Server 1.2.5及更早版本在处理大量MIME头部时存在缺陷，远程攻击者可通过发送包含大量MIME头部的特制HTTP请求，导致服务器资源耗尽，造成拒绝服务。该漏洞无需认证即可远程利用，攻击复杂度低。"
published = "1999-09-03"
remediation = "升级至Apache HTTP Server 1.3.0或更高版本，该版本修复了MIME头部处理中的拒绝服务问题。对于无法升级的旧系统，建议在反向代理层面限制单个请求的HTTP头部数量。"
score = 5.0
severity = "MEDIUM"
sources = ["cve"]
title = "Apache HTTP Server 1.2.5 MIME Header 拒绝服务漏洞"
updated = "2026-06-16"

