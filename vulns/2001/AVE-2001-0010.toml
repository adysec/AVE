[basic]
description = "Leif M. Wright 开发的 everythingform.cgi 2.0 程序存在任意命令执行漏洞。攻击者无需身份认证，通过在 config 参数中注入 shell 元字符即可在目标服务器上执行任意系统命令。该漏洞影响 everythingform.cgi 2.0 版本，CVSS 评分 10.0，危害等级严重。受影响用户应立即停用该 CGI 程序或升级至修复版本。"
published = "2001-02-12T05:00:00.000"
remediation = "立即删除或禁用 everythingform.cgi 脚本，该 CGI 程序已不再维护且存在远程命令执行漏洞。如业务必须使用，应对用户输入中的 shell 元字符（如 ; ` | & $ 等）进行严格过滤和转义处理，或迁移至现代 Web 框架重写该功能。"
score = 10
severity = "CRITICAL"
sources = ["exploitdb"]
title = "Leif M. Wright everythingform.cgi 2.0 任意命令执行漏洞"
updated = "2026-06-16T21:53:30.530"

