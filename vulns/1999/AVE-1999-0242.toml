[basic]
description = "Apache 1.2.5 及更早版本中存在缓冲区溢出漏洞，远程攻击者无需身份认证即可通过发送大量包含大量斜杠（/）字符的 GET 请求触发该漏洞，导致目标 Apache 服务进程崩溃，造成拒绝服务。该漏洞源于对异常长度请求 URI 未做充分边界检查，攻击者构造超长 URI 即可触发缓冲区溢出，影响 Apache 1.2.x 全系版本。"
published = "1997-12-30T05:00:00.000"
remediation = "立即升级至 Apache 1.3.0 或更高版本，Apache 1.2.x 系列已停止维护且存在多处已知漏洞。如无法升级，在 httpd.conf 中设置 LimitRequestLine 指令限制请求行长度，并配置 mod_reqtimeout 模块设置请求超时时间作为临时缓解。建议同时将 Apache 迁移至当前主流版本（2.4.x）。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Apache HTTP Server 缓冲区溢出拒绝服务漏洞"
updated = "2026-06-16T21:47:36.150"

