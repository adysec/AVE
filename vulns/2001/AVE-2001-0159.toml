[basic]
description = "IBM WebSphere Application Server / Net.Commerce 3 3.1.2 及之前版本中存在拒绝服务漏洞。远程攻击者无需认证即可直接向 CGI-BIN 目录下的 macro.d2w 脚本发送大量 %0a（换行符）组成的超长字符串，触发该脚本处理异常，导致目标服务因资源耗尽而崩溃或无法响应正常请求。该漏洞影响 IBM WebSphere Application Server 3.x 及 Net.Commerce 3 系列版本。"
published = "2001-07-02T04:00:00.000"
remediation = "升级 IBM WebSphere Application Server 至 3.5 及以上版本，或迁移至受支持的 WebSphere 版本。临时缓解措施：在 Web 服务器层面限制对 /cgi-bin/macro.d2w 路径的访问，或移除该 CGI 脚本文件。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "IBM WebSphere Application Server macro.d2w 拒绝服务漏洞"
updated = "2026-06-16T21:54:13.063"

