[basic]
description = 'Apache 1.3.6 与 PHP 3.x 组合中存在路径遍历文件泄露漏洞。远程攻击者可通过向目标服务器发送包含 "%5c"（URL 编码反斜杠）的变形目录遍历请求，绕过输入过滤机制，读取 Web 服务器上的任意文件。该漏洞源于 PHP 3.x 对编码后的路径分隔符处理不当，攻击者无需身份认证即可利用，可导致敏感配置文件或系统源代码泄露。CVSS 评分 5.0，危害等级中危。Apache 与 PHP 官方已在后续版本中修复此漏洞。'
published = "2001-02-16T05:00:00.000"
remediation = "将 Apache 升级至 1.3.9 或更高版本，并将 PHP 升级至 3.0.18 或 4.0.2 以上版本。同时配置 PHP 的 `doc_root` 和 `open_basedir` 限制访问范围，在 Apache 配置中禁用 `AllowEncodedSlashes On` 并对 `%5c` 等编码字符进行过滤。临时缓解措施可在 Web 应用防火墙或反向代理层拦截包含 `%5c` 的 URL 请求。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Apache HTTP Server PHP 3.x 任意文件读取漏洞"
updated = "2026-06-16T21:53:32.783"

