[basic]
description = "Adobe Flash Player 10.x（10.0.42.34 之前版本）及 Adobe AIR 1.5.3 之前版本存在内存破坏漏洞。攻击者可通过构造特制的恶意文件或网络内容触发内存越界写入，无需身份认证即可在目标系统上执行任意代码。该漏洞影响所有使用受影响版本 Flash Player 或 Adobe AIR 的 Windows 系统，攻击条件为受害者打开或加载恶意 Flash 内容，CVSS 评分 9.3，危害等级严重。"
published = "2009-12-10T19:30:00.500"
remediation = "立即将 Adobe Flash Player 升级至 10.0.42.34 或更高版本，将 Adobe AIR 升级至 1.5.3 或更高版本以修复内存破坏漏洞。如无法立即升级，可在浏览器中禁用 Flash Player 插件，或通过组策略/注册表禁用 Flash ActiveX 控件以降低被利用风险。"
score = 9.3
severity = "CRITICAL"
sources = ["tenable"]
title = "Adobe Flash Player 及 Adobe AIR 内存破坏远程代码执行漏洞"
updated = "2026-06-16T23:12:22.050"

