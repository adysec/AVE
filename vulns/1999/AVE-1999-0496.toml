[basic]
description = 'Compaq 多款管理代理（包括 Client Management Agents 3.70/4.0、Insight Management Agents 4.21 A/4.22 A/4.30 A、Intelligent Cluster Administrator 1.0、Management Agents for Workstations 4.20 A、Server Management Agents 4.23 以及 Survey Utility 2.0）的 Web 组件存在目录遍历漏洞。其原理是 Web 服务未对请求路径中的"../"（点-点-斜杠）序列进行充分过滤与规范化，导致未经身份认证的远程攻击者可通过构造包含父目录回溯序列的特制 HTTP 请求，突破 Web 根目录限制读取服务器上的任意文件（如系统配置文件、密码文件等敏感数据）。该漏洞影响所有部署上述带 Web 组件管理代理的 Compaq 服务器及工作站，攻击条件仅需攻击者能与目标系统的 Web 服务建立网络连接并发送恶意请求，利用方式即发送带有目录遍历序列的 URL 以越权访问受限文件。'
published = "1999-05-26T04:00:00.000"
remediation = "立即升级到 Compaq 官方发布的安全修补版本（如 Management Agents 4.30 B 及以上），或从 Compaq 官方网站下载对应产品的安全补丁。如产品已停止支持，应彻底禁用或卸载受影响组件的 Web 服务模块，并在防火墙层面限制仅允许受信任管理 IP 访问管理代理的 Web 端口（默认 2301），同时配置 Web 服务器禁用目录遍历（如 URL 路径中过滤 `..` 序列）。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Compaq 管理代理 Web 组件目录遍历任意文件读取漏洞"
updated = "2026-06-16T21:49:01.453"

