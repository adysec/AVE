[basic]
description = "xSANE 0.81 及更早版本在处理临时文件时存在不安全的符号链接处理缺陷，本地攻击者可通过在共享临时目录中创建指向其他用户文件的恶意符号链接，诱导 xSANE 以目标用户权限打开并写入该链接指向的文件，从而实现跨用户边界的任意文件修改。攻击前提要求攻击者具备本地系统访问权限，并能预测或控制 xSANE 创建临时文件的路径与时机，利用竞争条件在文件创建与打开的时间窗口内替换符号链接目标。成功利用将导致受害用户文件被篡改、覆盖或破坏，破坏多用户环境下的文件隔离机制，虽 CVSS 仅 1.2 分（低危），但在共享扫描服务器等多用户场景下仍具实质破坏潜力。建议升级至 xSANE 0.82 以上版本，或配置粘滞位保护 /tmp 目录、设置私有 TMPDIR 等缓解措施。"
published = "2002-01-15T05:00:00.000"
remediation = "建议升级 xSANE 至 0.82 或更高版本（Debian 用户可通过 apt upgrade xsane 获取 DSA-706 修复版本）。临时缓解措施：为 /tmp 目录设置粘滞位（chmod +t /tmp），限制普通用户只能删除自己的临时文件；或在用户环境中设置 TMPDIR 指向用户私有目录（如 ~/tmp 且 chmod 700），避免在共享临时目录创建可预测文件名。若无法升级，建议限制 xSANE 仅由受信用户使用，或通过 AppArmor/SELinux 策略限制其对 /tmp 的写入权限。"
score = 1.2
severity = "LOW"
sources = ["redhat"]
title = "xSANE xSANE 临时文件安全漏洞"
updated = "2026-06-16T21:55:09.727"

