[basic]
description = "Mirabilis ICQ 99b 1.1.1.1 及 3.19 版本客户端存在远程缓冲区溢出漏洞。攻击者可通过向目标用户发送包含特制恶意 URL 的 ICQ 消息触发该漏洞，导致在受害者系统上执行任意命令。该漏洞影响大量使用 ICQ 的早期互联网用户，CVSS 评分 7.5，危害等级高，且无需身份认证即可远程利用。"
published = "2000-01-10T05:00:00.000"
remediation = "Mirabilis ICQ 99b 已停止维护，无法通过官方补丁修复。建议立即升级至 ICQ 2000a 或更高版本（2000a 已修复该缓冲区溢出问题）。若无法升级，应避免点击 ICQ 消息中的不明链接，并在网络边界过滤入站 ICQ 流量作为临时缓解。鉴于该产品已被 AOL 收购并关停，长期建议迁移至其他即时通讯软件。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "Mirabilis ICQ 99b 远程缓冲区溢出漏洞"
updated = "2026-06-16T21:50:53.383"

