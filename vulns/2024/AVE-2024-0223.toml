[basic]
description = '用友CRM客户关系管理系统中的 help.php 接口存在任意文件读取漏洞。该系统在处理 /pub/help.php 页面的 key 参数时未进行严格的路径校验与过滤，攻击者可通过构造包含目录穿越序列（如"../../../../apache/php.ini"经 base64 编码后）的 key 参数，利用 GET 请求读取服务器上的任意文件。此漏洞无需身份认证，远程攻击者仅需向目标系统发送特制的 HTTP 请求即可未授权获取敏感配置文件（如 php.ini、源代码等）内容，可能导致系统配置信息泄露，进而为进一步的入侵提供便利。受影响范围为部署了存在缺陷版本用友CRM且未打补丁的系统。'
published = "0819"
remediation = "立即删除应用目录下的 pub/help.php 文件，或在 Apache/Nginx 配置中添加 rewrite 规则禁止对 /pub/help.php 的直接访问，并将 Web 服务器运行用户对系统根目录及 /etc/passwd、数据库配置文件等敏感文件的读取权限降至最低。同时联系用友官方技术支持获取安全补丁，升级至修复后的正式版本。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "用友 CRM 客户关系管理系统 help.php 任意文件读取漏洞"
updated = "0819"

