[basic]
description = "Solaris 7/8 系统中的 ipcs 命令存在缓冲区溢出漏洞，由于未对 TZ（时区）环境变量进行长度检查，本地攻击者可通过设置超长的 TZ 环境变量触发缓冲区溢出，从而以 root 权限执行任意代码。该漏洞影响 Solaris 7 x86 及 Solaris 8 版本，CVSS 评分 7.2，危害等级高。攻击者需拥有本地系统访问权限，无需身份认证即可利用，成功利用后可完全控制目标系统。"
published = "2001-07-02T04:00:00.000"
remediation = "立即升级至 Oracle Solaris 11.4 或更高版本（Solaris 7/8 已停止支持，不再提供安全更新）。如无法升级，可设置内核参数 `noexec_user_stack=1` 并限制本地用户登录，同时通过 `tzsetup` 或环境变量过滤脚本限制 TZ 变量长度不超过 256 字节作为临时缓解措施。"
score = 7.2
severity = "HIGH"
sources = ["exploitdb"]
title = "Sun Solaris ipcs 本地缓冲区溢出漏洞"
updated = "2026-06-16T21:54:16.907"

