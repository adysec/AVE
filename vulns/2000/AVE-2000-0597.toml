[basic]
description = "SGI IRIX 6.2、6.3 及 6.5.x 系统中的 gr_osview 工具存在缓冲区溢出漏洞，本地攻击者可通过向 -D 选项传递超长参数触发该漏洞，导致程序栈缓冲区溢出，进而覆盖返回地址实现权限提升，获得 root 权限。该漏洞影响 IRIX 多个版本，攻击者需具备本地登录权限，利用难度较低。"
published = "2000-10-20T04:00:00.000"
remediation = "建议升级 IRIX 至厂商补丁版本（SGI 已发布 gr_osview 安全补丁），或移除 /usr/sbin/gr_osview 的 setuid 权限位：chmod 755 /usr/sbin/gr_osview。对于已停止维护的 IRIX 系统，应迁移至仍受支持的平台运行。"
score = 7.2
severity = "HIGH"
sources = ["exploitdb"]
title = "SGI IRIX gr_osview 本地缓冲区溢出漏洞"
updated = "2026-06-16T21:52:30.063"

