[basic]
description = "PDGSoft 购物车系统中的 redirect.exe 与 changepw.exe 组件存在缓冲区溢出漏洞，远程未经身份认证的攻击者可通过向目标系统发送精心构造的超长查询字符串（query string）触发该漏洞，导致在服务器上执行任意命令，进而完全控制受影响的 Web 服务器。该漏洞无需用户交互即可远程利用。"
published = "2000-05-01T04:00:00.000"
remediation = "PDGSoft 购物车已停止维护，官方不再提供安全更新。建议立即停止使用 redirect.exe 和 changepw.exe 组件，或迁移至其他受支持的购物车系统。如无法替换，在 Web 服务器（IIS/Apache）层面配置 URL 过滤规则，拦截包含超长查询字符串的请求，并限制可执行文件的访问权限。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "PDGSoft Shopping Cart 缓冲区溢出远程代码执行漏洞"
updated = "2026-06-16T21:51:38.337"

