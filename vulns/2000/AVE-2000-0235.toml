[basic]
description = "AVM KEN! 1.3.10 与 1.4.30 版本的 HTTP 服务器在处理特制的畸形请求时，因对输入数据长度与格式校验不足，导致服务进程崩溃或挂起，造成拒绝服务。攻击者只需向目标主机发送一个精心构造的 TCP 连接请求即可触发，无需身份认证，可远程使受影响服务不可用。"
published = "2000-04-03"
remediation = "升级 AVM KEN! 至官方修复版本 1.4.31 或更高版本，或部署防火墙规则限制对 KEN! Web 服务端口的未授权访问。"
score = 5.0
severity = "MEDIUM"
sources = ["cve"]
title = "AVM KEN! 1.3.10/1.4.30 请求处理拒绝服务漏洞"
updated = "2026-07-19"

