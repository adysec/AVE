[basic]
description = "ePerl 2.2.12 版本在处理 ISINDEX 查询时存在路径遍历漏洞，远程攻击者可通过向 bar.phtml 传递目标文件的完整路径名作为参数，读取服务器上的任意文件，甚至可能执行特定命令。该漏洞影响 ePerl 2.2.12 版本，CVSS 评分 7.5 属高危级别。攻击者无需身份验证即可远程利用，仅需构造包含目标文件绝对路径的请求参数即可实现任意文件读取，严重时可能导致敏感信息泄露或命令执行。"
published = "1998-07-07T04:00:00.000"
remediation = "建议立即停止使用 ePerl 2.2.12 并迁移至现代 Web 框架（如 PHP、Python、Node.js 等）。若必须继续使用，请在 Web 服务器配置中禁用 ISINDEX 功能，并在 Web 服务器层面限制 bar.phtml 对文件系统的访问权限（如配置 open_basedir、禁用危险函数）。建议部署 WAF 规则拦截包含路径遍历特征的 ISINDEX 查询参数。"
score = 7.5
severity = "HIGH"
sources = ["exploitdb"]
