[basic]
description = "ToolTalk 共享库在处理 TT_SESSION 环境变量时存在缓冲区溢出漏洞，本地攻击者可通过向该环境变量传入超长字符串触发缓冲区溢出，从而实现权限提升并获得 root 权限。该漏洞影响 DIGITAL UNIX 4.0、AIX 4.3.2、CDE 2.1、IRIX 6.5.14、Solaris 7.0 及 SunOS 4.1.4 等多个 UNIX 系统，攻击者需拥有本地系统访问权限方可利用。"
published = "2000-03-02T05:00:00.000"
remediation = "Sun Solaris 7.0/SunOS 4.1.4 用户安装 Sun Security Bulletin #192 提供的补丁包；HP-UX/Digital UNIX 4.0 用户应用 HPSBUX9909-103 对应的补丁；AIX 4.3.2 用户安装 IBM APAR 补丁；IRIX 6.5.14 用户安装 SGI 安全补丁。临时缓解措施：以 root 执行 `chmod 555 /usr/dt/bin/ttsession && chmod -s /usr/dt/bin/ttsession` 移除 setuid 位，同时限制非信任用户本地登录。"
score = 7.2
severity = "HIGH"
sources = ["exploitdb"]
title = "多款 Unix 系统 ToolTalk 共享库本地缓冲区溢出漏洞"
updated = "2026-06-16T21:48:51.690"

