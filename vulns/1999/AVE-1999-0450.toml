[basic]
description = "Netscape Enterprise Server 3.51 及 3.6 SP2（含 SSL Handshake Patch）的 Accept 命令处理过程中存在缓冲区溢出漏洞。未经身份验证的远程攻击者可通过发送特制 HTTP 请求触发内存溢出，成功利用可导致远程代码执行或服务崩溃，造成完全拒绝服务。"
published = "1999-09-13T04:00:00.000"
remediation = "应用 Netscape 官方发布的安全补丁程序，或将服务器升级至已修复该漏洞的后续版本。建议限制对服务器管理端口的访问并监控异常请求。"
score = 5.0
severity = "MEDIUM"
sources = ["cve"]
title = "Netscape Enterprise Server Accept 缓冲区溢出漏洞"
