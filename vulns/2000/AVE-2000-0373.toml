[basic]
description = "Intel Express 8100 ISDN 路由器在处理畸形 ICMP 数据包时存在拒绝服务漏洞。远程攻击者无需认证即可向目标路由器发送超大的或经过分片的 ICMP 数据包，触发路由器处理异常导致设备崩溃或重启，造成正常网络服务中断。该漏洞影响 Intel Express 8100 ISDN 路由器设备，CVSS 评分 5.0，危害等级中危。建议用户升级固件或禁用不必要的 ICMP 功能以降低风险。"
published = "2000-05-19T04:00:00.000"
remediation = '登录路由器管理界面，在防火墙规则中丢弃分片 ICMP 数据包（如添加"deny icmp any any fragments"规则），并限制 ICMP 报文速率。由于 Intel 已停止该产品的固件支持，建议将设备替换为仍在安全更新期内的 ISDN 路由器或下一代防火墙设备。'
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Intel Express 8100 ISDN Router ICMP 分片包拒绝服务漏洞"
updated = "2026-06-16T21:51:45.740"

