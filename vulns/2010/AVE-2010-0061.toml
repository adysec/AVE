[basic]
description = "Joomla! Arcade Games 组件 1.0 版本存在目录遍历漏洞，攻击者可通过 index.php 的 controller 参数传入目录遍历序列（../）读取服务器任意文件。该漏洞影响 Joomla! 使用 com_arcadegames 1.0 组件的站点，远程未授权攻击者可直接通过构造恶意 controller 参数实现任意文件读取，CVSS 评分 5.0（中危），属于 CWE-22 路径遍历类漏洞。攻击者无需认证即可利用 controller 参数中的目录遍历序列读取服务器敏感文件。"
published = "2010-05-04T16:00:36.027"
remediation = "建议将 Arcade Games (com_arcadegames) 组件升级至官方修复目录遍历问题的版本；若该组件已停止维护，应在 Joomla 后台扩展管理中直接卸载或禁用该组件。临时缓解措施：在 Web 服务器（如 Apache/Nginx）层部署过滤规则，拦截 index.php 的 controller 参数中包含 ../ 或 .. 的请求，或使用 ModSecurity 等 WAF 规则阻止路径穿越字符，并限制 Web 目录文件读取权限以减小信息泄露风险。"
score = 5.0
severity = "MEDIUM"
sources = ["nuclei"]
title = "Joomla 组件 Arcade Games 1.0 本地文件包含漏洞"
updated = "2026-06-16T23:19:10.747"

