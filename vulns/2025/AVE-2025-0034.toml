[basic]
description = "深信服零信任访问控制系统 aTrust 至 2.4.10 版本存在权限分配不当漏洞（CWE-732），由于对 ExecStartPre 命令的权限控制不足，具有低权限的本地攻击者可修改该命令参数，在服务启动时以更高权限执行恶意代码，实现本地提权。该漏洞影响 Linux 版本部署环境，攻击者需先获得系统普通用户权限方可利用，CVSS 评分 4.3，危害等级中危。"
published = "2025-06-22T01:15:24.097"
remediation = "立即将深信服零信任aTrust Linux服务端升级至最新版本（>V2.4.10），同时检查并修复 /etc/systemd/system/ 下 aTrust 相关服务单元文件的权限，确保属主为 root、权限为 644（-rw-r--r--），非 root 用户不可写入。作为临时缓解措施，可执行 `chmod 644 /etc/systemd/system/sangfor* /lib/systemd/system/sangfor*` 并执行 `systemctl daemon-reload` 重新加载配置。"
score = 4.3
severity = "MEDIUM"
sources = ["hwpoc"]
title = "深信服 aTrust 权限提升漏洞"
updated = "2026-06-17T09:37:17.257"

