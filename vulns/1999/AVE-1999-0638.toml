[basic]
description = "Deerfield MDaemon 邮件服务器中的 WorldClient Web 邮件服务和 WebConfig 管理接口存在拒绝服务漏洞。远程攻击者可通过向目标服务发送超长 URL 请求，导致服务进程崩溃或资源耗尽，造成正常用户无法访问邮件服务。该漏洞影响 MDaemon 2.8.5/2.8.6 版本及 Alt-N WorldClient 2.0.x 系列版本，CVSS 评分 5.0，危害等级中等。厂商已发布更新修复此问题。"
published = "1999-11-24T05:00:00.000"
remediation = "建议将 Deerfield MDaemon 升级至 3.0 及以上修复版本（官方已修复 WorldClient 与 WebConfig 对超长 URL 的处理缺陷）。如无法立即升级，可在 Web 服务器前端（如反向代理）配置 URL 长度限制（如 nginx 的 large_client_header_buffers 调小或 proxy_buffer_size 限制），并部署边界防火墙/IDS 过滤超长 HTTP 请求作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Deerfield MDaemon WorldClient/WebConfig 长 URL 拒绝服务漏洞"
updated = "2026-06-16T21:49:10.560"

