[basic]
description = "Max Feoktistov Small HTTP Server 1.212 至 3.06 版本存在缓冲区溢出漏洞。远程攻击者可通过向目标服务器发送超长 HTTP GET 请求触发内存损坏，溢出缓冲区并覆盖结构化异常处理程序（SEH），导致服务崩溃拒绝服务。该漏洞攻击复杂度低，无需身份验证，但仅能造成拒绝服务而非代码执行。"
published = "2000-06-15"
remediation = "建议立即停止使用 Small HTTP Server，迁移至 Apache HTTP Server、Nginx 或 Microsoft IIS 等仍在积极维护的 Web 服务器。如无法立即迁移，可在反向代理或网络防火墙层面限制 HTTP GET 请求 URI 长度不超过 4096 字节，以阻止超长 GET 请求触发的缓冲区溢出导致的服务崩溃。"
score = 5
severity = "MEDIUM"
sources = [
    "cve",
    "exploitdb",
]
title = "Small HTTP Server 缓冲区溢出致远程拒绝服务漏洞"
updated = "2026-06-16"

