[basic]
description = "Das U-Boot 中的 sqfs_search_dir 函数存在差一错误（off-by-one）漏洞，由于在计算 squashfs 目录列表大小时未考虑路径分隔符，导致堆内存损坏。物理接触目标设备的攻击者可通过构造特制的 squashfs 镜像文件系统，在系统启动过程中触发该漏洞，可能导致拒绝服务或潜在的内存数据破坏。该漏洞影响 2025.01-rc1 之前的所有 Das U-Boot 版本，CVSS 评分 7.1，危害等级高。"
published = "2025-02-18T23:15:09.980"
remediation = "升级 U-Boot 至 2025.01-rc1 及以上版本（上游 commit 048d795bb5b3d9c5701b4855f5e74bcf6849bf5e）。Debian 用户：bullseye 升级至 2021.01+dfsg-5+deb11u3，bookworm 升级至 2023.01+dfsg-2+deb12u3。如无法升级，在 squashfs 文件系统挂载前禁用 squashfs 目录遍历功能，或避免使用 squashfs 格式的启动镜像。"
score = 7.1
severity = "HIGH"
sources = ["msrc"]
title = "DENX Das U-Boot Squashfs 目录列表越界写入漏洞"
updated = "2026-06-17T08:13:28.453"

