[basic]
description = "Slackware Linux 3.3/3.4 版本中 imapd 和 ipop3d 服务程序存在存储器内容更新漏洞。当系统启用 shadow 密码认证时，远程攻击者可通过向目标服务发送一系列不含有效用户名或密码的短 USER 和 PASS 命令，触发服务程序内存访问异常，导致核心转储（core dump）致使服务崩溃。该漏洞可被用于拒绝服务攻击，影响 Slackware 3.3/3.4 等系统。"
published = "1998-02-02T05:00:00.000"
remediation = "建议升级至 Slackware 3.5 及以上版本，该版本已修复 imapd 和 ipop3d 的存储器内容更新漏洞。如无法升级，可禁用 shadow 密码认证（修改 /etc/shadow 配置），或在 inetd 配置中注释掉 imap 和 pop3 服务行并重启 inetd 以临时关闭受影响服务。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Slackware imapd及ipop3d服务拒绝服务漏洞"
updated = "2026-06-16T21:50:27.360"

