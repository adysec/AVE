[basic]
description = "Simple Network Time Sync (SMTS) 守护程序存在缓冲区溢出漏洞，远程攻击者可向目标服务发送特制的超长字符串触发该漏洞，导致服务崩溃拒绝服务，甚至可能执行任意命令。该漏洞由 Atrus Trivalie Productions 开发，利用方式简单且危害严重，CVSS 评分达 10.0 分，影响使用该 Network Time Sync 1.0 版本的系统。"
published = "2000-06-01T04:00:00.000"
remediation = "该漏洞影响 Simple Network Time Sync 1.0 守护程序，厂商已停止维护且无安全更新。建议立即卸载 SMTS 1.0，改用主流维护中的 NTP 服务（如 chrony 或 ntpd 4.2.8+）。如无法替换，在防火墙层面限制仅受信任 IP 可访问该服务的 UDP/TCP 端口（默认 123），并禁用远程管理功能作为临时缓解措施。"
score = 10
severity = "CRITICAL"
sources = ["exploitdb"]
title = "Atrus Trivalie Productions Simple Network Time Sync 守护程序缓冲区溢出漏洞"
updated = "2026-06-16T21:51:51.177"

