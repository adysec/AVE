[basic]
description = "Pine 4.x 邮件客户端存在远程命令执行漏洞。攻击者可构造恶意的 index.html 文件，当 Pine 通过 lynx 浏览器获取该文件时，会从恶意 Web 服务器下载 uudecoded 格式的恶意载荷，随后 Pine 在处理过程中执行该载荷，导致任意命令执行。该漏洞无需身份认证即可远程利用，CVSS 评分 10.0，可完全控制目标系统，影响所有使用 Pine 4.x 版本的系统和用户。"
published = "1999-06-28T04:00:00.000"
remediation = "升级 Pine 至 4.21 或更高版本，该版本已修复通过 index.html 自动调用 lynx 下载并执行恶意文件的漏洞。如无法升级，在 Pine 配置中禁用 auto-html-parsing 选项，并移除或限制 Pine 对 lynx 等外部程序的调用权限，同时在邮件客户端层面禁止自动渲染 HTML 附件。"
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "University of Washington Pine 远程代码执行漏洞"
updated = "2026-06-16T21:51:32.433"

