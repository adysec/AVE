[basic]
description = "浪潮 GS 企业管理系统 PurBidSupplementSrv.asmx 接口存在任意文件读取漏洞，攻击者可通过构造特制的 SOAP/XML 请求包向目标服务器发送 POST 请求，利用该接口未对文件路径参数进行有效过滤，从而读取服务器上的任意敏感文件（如配置文件、数据库连接信息等）。该漏洞影响浪潮 GS 系列版本，攻击者无需身份认证即可远程利用，危害较大。"
published = "0704"
remediation = '建议联系浪潮官方获取GS系统安全补丁，升级至最新修复版本。如无法立即升级，可在Web应用防火墙上配置规则，对 /cwbase/service/cepp/PurBidSupplementSrv.asmx 接口添加身份认证校验，同时过滤SOAP请求中包含 "../"、"..\\" 等目录遍历特征的参数，并限制该接口仅允许可信IP段访问。'
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "浪潮 GS PurBidSupplementSrv.asmx 任意文件读取漏洞"
