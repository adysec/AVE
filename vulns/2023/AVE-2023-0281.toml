[basic]
description = "信呼OA（信呼协同办公系统）存在时间盲注SQL注入漏洞，攻击者可在无需登录的情况下，通过构造特制的HTTP请求参数，利用系统对用户输入过滤不严的缺陷，向数据库查询语句中注入恶意SQL代码，通过判断响应时间差异来逐字符获取数据库中的敏感信息，包括管理员密码、用户数据等。该漏洞源于系统未对用户输入进行充分的参数化查询处理。"
published = "2023-08-08"
remediation = "升级信呼OA至官方发布的最新版本，对用户输入进行严格过滤和参数化查询处理，避免直接将用户输入拼接至SQL语句中执行。"
score = 6.5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "信呼OA 存在时间盲注SQL注入漏洞"
updated = "2023-08-08"

