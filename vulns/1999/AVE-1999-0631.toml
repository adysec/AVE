[basic]
description = "该漏洞存在于 Solaris 7.0 操作系统中的 CDE（Common Desktop Environment）邮件工具 dtmail/mailtool 中。攻击者通过向邮件客户端发送包含超长 MIME Content-Type 头的恶意邮件，触发邮件工具在处理邮件头部信息时出现的缓冲区溢出漏洞。由于该工具对输入缓冲区大小验证不足，溢出会导致控制流破坏，攻击者可借此劫持程序控制权，在本地权限范围内提升至根用户权限，最终实现对目标系统的完全控制。该漏洞仅限本地用户利用，攻击者需通过恶意邮件触发溢出，但无需其他权限，即可绕过系统保护机制获得最高访问权限。"
published = "1999-11-30T05:00:00.000"
remediation = "立即升级到受支持的 Solaris 版本（如 Solaris 11），该版本已修复 CDE mailtool 缓冲区溢出漏洞。如无法升级，可移除 mailtool 和 dtmail 的 setuid root 权限（chmod u-s /usr/dt/bin/dtmail /usr/dt/bin/mailtool），并限制仅授权用户可执行 CDE 邮件工具，以消除本地提权风险。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
