[basic]
description = "Linux 内核 btrfs 文件系统驱动中存在匿名设备号（anon_dev）内存泄漏漏洞（CWE-401）。在 create_subvol() 函数创建子卷过程中，当 btrfs_qgroup_inherit()、btrfs_alloc_tree_block() 或 btrfs_insert_root() 等内部函数调用失败时，代码直接返回而未释放已分配的 anon_dev 资源，导致内核内存泄漏。本地攻击者可通过反复触发子卷创建操作耗尽系统内存，造成拒绝服务（DoS）。该漏洞影响主流 Linux 发行版内核，CVSS 评分 5.5，危害等级中危。开发者已通过重构错误处理逻辑在对应内核版本中修复此问题。"
published = "2025-02-26T07:01:23.157"
remediation = "升级 Linux 内核到 5.17.14、5.18.3 或更高版本（如 5.19 及后续 LTS 版本），其中已包含修复提交 d887b3de3188。该补丁在 create_subvol() 函数中补全了 btrfs_qgroup_inherit()、btrfs_alloc_tree_block() 等调用失败时 anon_dev 的释放路径，消除内存泄漏导致的本地拒绝服务风险。无法立即升级时，可通过限制本地用户对 btrfs 子卷创建操作的访问作为临时缓解。"
score = 5.5
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux btrfs 子卷创建时匿名设备资源泄漏漏洞"
updated = "2026-06-17T05:18:08.603"

