[basic]
description = 'IBM WebSphere Application Server 2.0/3.0/3.0.2.1 版本中存在源代码泄露漏洞。远程攻击者无需认证即可通过向目标服务器发送包含 "/servlet/file" 字符串的特制 URL，直接调用默认的 InvokerServlet，从而读取可执行 Web 文件（如 JSP、Servlet 等）的源代码。该漏洞可能导致敏感业务逻辑泄露，CVSS 评分 5.0，危害等级中危。'
published = "2000-07-24T04:00:00.000"
remediation = "升级 IBM WebSphere Application Server 至 3.5 及以上版本，或修改 servlet 配置文件禁用默认的 InvokerServlet（移除或注释 servlet 映射中的 /servlet/* 路径），并在 Web 服务器层限制对 /servlet/ 路径的外部访问。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "IBM Websphere Application Server 可执行脚本源代码泄露漏洞"
updated = "2026-06-16T21:52:11.633"

