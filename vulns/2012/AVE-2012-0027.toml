[basic]
description = "WordPress 的 Age Verification 插件 0.4 及更早版本中的 age-verification.php 文件存在开放重定向漏洞。远程攻击者可通过向 redirect_to 参数传递恶意 URL，将用户重定向至任意外部网站，进而实施钓鱼攻击。该漏洞源于程序未对用户输入的 URL 进行充分验证，影响使用该插件的所有 WordPress 站点。"
published = "2013-01-12T04:33:49.197"
remediation = "立即停用并删除 Age Verification 插件（该插件已停止维护，无安全更新可用）。如必需使用，可在 WordPress 根目录 wp-content/plugins/age-verification/age-verification.php 中为 redirect_to 参数添加白名单校验，仅允许本站域名内跳转。同时建议在 Web 应用防火墙（如 ModSecurity）中配置规则拦截 redirect_to 参数指向外部域名的请求作为临时缓解。"
score = 5.8
severity = "MEDIUM"
sources = ["nuclei"]
title = "WordPress Age Verification 插件开放重定向漏洞"
updated = "2026-06-16T23:48:14.610"

