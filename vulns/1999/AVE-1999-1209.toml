[basic]
description = "ProFTPD（含 wu-ftpd、beroftpd 等 FTP 服务程序）在处理目录操作时存在缓冲区溢出漏洞。远程攻击者无需身份认证，可通过向 FTP 服务连续发送一系列 MKD（创建目录）和 CWD（切换目录）命令构造深层嵌套目录结构，超出程序分配的缓冲区边界，从而触发溢出并覆盖内存。成功利用该漏洞可使攻击者以 root 权限在目标服务器上执行任意代码，完全控制受影响的 FTP 服务器。该漏洞影响 ProFTPD 1.2 pre1 至 pre5 等早期版本，危害等级极高，需升级至已修复版本以消除风险。"
published = "1999-08-27T04:00:00.000"
remediation = "建议立即将 ProFTPD 从 1.2 pre1 至 pre5 任意预览版升级到已修复该缓冲区溢出的 1.2.0 正式稳定版或更高版本（如 1.2.0rc1+）。升级前可在防火墙/边界设备上限制 21 端口仅允许受信任 IP 访问，并停止不必要的匿名 FTP 服务作为临时缓解措施。"
score = 10
severity = "CRITICAL"
sources = ["exploitdb"]
title = "ProFTPD 1.2 pre1-pre5 远程缓冲区溢出漏洞"
updated = "2026-06-16T21:49:18.797"

