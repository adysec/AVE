[basic]
description = "CartIt 是一款基于 Web 的购物车主程序。该漏洞源于其在处理用户提交订单时未对前端隐藏表单字段（hidden form fields）进行服务端校验与完整性保护，攻击者可通过拦截并篡改这些隐藏字段（如商品价格、商品数量、订单标识等敏感购买信息），在未授权的情况下修改本应受保护的交易数据。远程攻击者只需能够正常访问目标网站的购物车页面并提交 HTTP 请求即可利用此漏洞，无需身份认证或特殊权限。成功利用后，攻击者可操纵订单金额或商品信息，造成商家资损、交易欺诈等安全影响，危害等级为中高危。"
published = "2000-02-01T05:00:00.000"
remediation = "升级 CartIt 到修复隐藏字段篡改漏洞的版本（如 CartIt 3.0 以上版本），或在服务端实现价格/数量的服务端校验与会话存储，禁止前端隐藏字段直接传递敏感交易参数。若无法升级，请在应用层增加隐藏字段完整性校验（HMAC 签名）并拒绝篡改请求。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "厂商 产品 漏洞类型"
updated = "2026-06-16T21:51:04.640"

