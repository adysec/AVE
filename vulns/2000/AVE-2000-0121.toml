[basic]
description = "@Retail 购物车应用程序存在敏感信息篡改漏洞，远程攻击者可通过直接修改网页表单中的隐藏字段（hidden form fields）来篡改商品价格、数量等关键购买信息，导致未授权修改订单金额。该漏洞源于服务器端未对客户端提交的隐藏表单字段进行有效验证，攻击者无需身份认证即可利用该漏洞以任意价格完成购买。CVSS 评分 7.5，危害等级高危。"
published = "2000-02-01T05:00:00.000"
remediation = "@Retail 购物车程序已停止维护，建议立即迁移至仍在安全更新的电商平台（如 Magento、WooCommerce）。若无法立即迁移，须在服务端对所有表单提交参数进行完整的输入校验，禁止将商品价格、数量等敏感信息放在隐藏字段中传递，改用服务端会话存储，并在交易关键步骤（如确认订单）进行金额重新计算与校验。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "@Retail 购物车应用隐藏表单字段远程信息篡改漏洞"
updated = "2026-06-16T21:51:04.387"

