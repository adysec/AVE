[basic]
description = "Messagemedia UnityMail 2.0 邮件服务器在处理邮件 MIME 头部时存在拒绝服务漏洞。远程攻击者可通过向目标服务器发送包含大量 MIME 头部的特制邮件，导致邮件服务进程资源耗尽而崩溃，造成正常邮件收发功能中断。该漏洞影响 UnityMail 2.0 版本，攻击者无需身份认证即可远程触发，CVSS 评分 5.0，危害等级中危。"
published = "1999-09-03T04:00:00.000"
remediation = "该漏洞年代久远（1998年），厂商 Messagemedia 已停止支持 UnityMail 2.0，官方不再提供补丁。建议立即将 UnityMail 2.0 升级或迁移至受支持的邮件列表管理方案（如 Mailman 3 或 GNU Mailman）；若无法替换，在反向代理或防火墙上配置 HTTP 请求头数量限制（如限制单请求 MIME 头不超过 100 个），并限制管理 Web 端口的访问 IP 白名单作为临时缓解。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Messagemedia UnityMail 2.0 MIME Header 拒绝服务漏洞"
updated = "2026-06-16T21:49:20.490"

