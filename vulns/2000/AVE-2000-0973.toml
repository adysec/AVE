[basic]
description = "SunFTP 1.0 Build 9 版本的 FTP 服务器在处理客户端 TCP 连接时存在拒绝服务漏洞。当远程攻击者向服务器发起连接后，在尚未发送任何包含换行符的数据之前即主动断开连接时，服务器会因此触发异常处理逻辑缺陷，进而导致服务无响应或崩溃退出。该漏洞影响运行 SunFTP 的所有操作系统平台，攻击者无需身份认证，只要目标服务器的 FTP 端口（21）网络可达即可实施攻击。利用方式极为简单，攻击者仅需建立连接后立即断开即可触发该漏洞，造成合法用户无法正常使用 FTP 文件传输服务，影响业务连续性。"
published = "2000-11-14T05:00:00.000"
remediation = "SunFTP 1.0 build 9 存在连接关闭不当导致的拒绝服务漏洞，建议尽快升级至其他维护状态良好的 FTP 服务器软件（如 vsftpd、ProFTPD 或 Pure-FTPd），或联系开发商获取修复版本。如无法立即更换，可在防火墙或 iptables 层面限制同一源 IP 短时间内向 FTP 服务发起大量新建连接，并使用 TCP Wrapper 限制可访问 FTP 端口的客户端地址范围，以降低被攻击面。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Rasmus J.P. Allenheim SunFTP 拒绝服务漏洞"
updated = "2026-06-16T21:52:36.523"

