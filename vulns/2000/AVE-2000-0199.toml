[basic]
description = "SCO UnixWare 7.1 及 7.1.1 版本中的 ARCserver 组件在处理 /tmp 临时文件时存在符号链接漏洞。本地攻击者可通过创建恶意符号链接指向系统关键文件，当 ARCserver 以 root 权限写入临时文件时，将覆盖或篡改目标文件，从而实现权限提升获取 root 控制权限。该漏洞利用条件为拥有本地访问权限，攻击复杂度低。"
published = "2000-02-15T05:00:00.000"
remediation = "移除 ARCserve agent 的 setuid/setgid 权限位以防止本地提权；限制系统仅授权可信用户登录。由于 SCO UnixWare 7.x 已停止技术支持且无官方补丁，建议迁移至现代受支持的操作系统与备份解决方案（如 Amanda、Bacula）作为彻底修复措施。"
score = 1.2
severity = "LOW"
sources = ["avd"]
title = "SCO UnixWare ARCserver 本地符号链接漏洞"
updated = "2026-06-16T21:51:15.793"

