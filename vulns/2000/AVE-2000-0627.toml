[basic]
description = "Darxite 0.4 及更早版本的登录认证模块存在缓冲区溢出漏洞。远程攻击者无需身份认证即可通过向登录界面提交精心构造的超长用户名或密码数据，触发栈缓冲区溢出，覆盖返回地址或函数指针，从而在目标系统上执行任意命令。该漏洞 CVSS 评分 7.5，危害等级高，影响 Darxite 0.4 及之前版本，攻击复杂度低，利用条件简单。"
published = "2000-11-14T05:00:00.000"
remediation = "升级 Darxite 至 0.5 或更高版本，该版本修复了登录过程中的缓冲区溢出问题。若厂商已停止维护（Darxite 项目已长期未更新），建议迁移至 active 维护的替代方案（如 Apache MINA 或 Netty），并在边界防火墙上限制对该服务的来源 IP 访问以降低攻击面。"
score = 7.5
severity = "HIGH"
sources = ["exploitdb"]
title = "Darxite 0.4 登录缓冲区溢出漏洞"
updated = "2026-06-16T21:52:35.410"

