[basic]
description = "Microsoft IIS 4.0 在解析 .HTR、.IDC 和 .STM 等扩展名文件时存在缓冲区溢出漏洞，远程攻击者无需身份认证即可通过发送特制的畸形请求触发该漏洞，导致应用程序堆栈缓冲区溢出，从而造成拒绝服务（进程崩溃或服务停止），严重时可实现远程代码执行。该漏洞影响运行 IIS 4.0 的 Windows NT Server 4.0 系统，属于 CWE-119 缓冲区溢出类型。攻击者仅需向目标服务器发送包含超长字段的畸形 HTTP 请求即可利用此漏洞。"
published = "1999-06-16"
remediation = "立即升级至受支持的 Windows Server 版本及 IIS 8.0 或更高版本，彻底消除漏洞。如暂时无法升级系统，须应用 Microsoft Security Bulletin MS99-019 安全补丁，并在 IIS 管理器中移除 .HTR、.IDC 和 .STM 扩展名的脚本映射，或安装 URLScan 工具限制对这些扩展名的 HTTP 请求访问，同时在防火墙层面阻断针对这些扩展名的恶意请求流量，以缓解缓冲区溢出风险。"
score = 10.0
severity = "CRITICAL"
sources = ["avd"]
title = "Microsoft IIS 4.0 .HTR/.IDC/.STM 扩展名解析缓冲区溢出漏洞"
updated = "1999-06-16"

