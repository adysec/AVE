[info]
author = "AVE"
description = "检测 mgetty 软件包 faxrunq/faxrunqd 符号链接攻击漏洞 - 检查 faxrunq 脚本是否存在"
id = "POC-AVE-2000-0542"
name = "CVE-2000-0691 PoC"
severity = "low"
tags = ["ave-2000-0542"]
vuln_id = [
    "CVE-2000-0691",
    "AVE-2000-0542",
]

[poc]
logic = "any"

[[poc.requests]]
path = "/usr/sbin/faxrunq"
protocol = "file"

[[poc.requests.matchers]]
expect = true
part = "body"
regex = "(?s).+"
type = "regex"

[[poc.requests]]
path = "/usr/bin/faxrunq"
protocol = "file"

[[poc.requests.matchers]]
expect = true
part = "body"
regex = "(?s).+"
type = "regex"

[[poc.requests]]
path = "/usr/sbin/faxrunqd"
protocol = "file"

[[poc.requests.matchers]]
expect = true
part = "body"
regex = "(?s).+"
type = "regex"

[[poc.requests]]
path = "/usr/bin/faxrunqd"
protocol = "file"

[[poc.requests.matchers]]
expect = true
part = "body"
regex = "(?s).+"
type = "regex"
