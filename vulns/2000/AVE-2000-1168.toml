[basic]
description = "Kerberos 5 1.1.x 中的 GSSFTP FTP 守护进程未正确限制对部分 FTP 命令的访问权限，远程攻击者可通过发送特制的 FTP 请求导致服务拒绝（DoS），而本地攻击者可利用该权限控制缺陷获取 root 权限。该漏洞影响 Kerberos 5 1.1.x 系列版本，CVSS 评分 10.0，危害等级严重。"
published = "2000-06-14T04:00:00.000"
remediation = "立即禁用受影响系统的 GSSFTP 服务（注释 inetd.conf 中相关行并重启 inetd），升级到 krb5-1.2 或更高版本。如无法升级，可应用 MIT 官方补丁修改 `src/appl/gssftp/ftpd/ftpcmd.y` 中第 869 行的 `$$ = 1` 为 `$$ = $1`，重新编译并安装 ftpd。"
score = 10
severity = "CRITICAL"
sources = ["cve"]
title = "MIT Kerberos 5 GSSFTP FTP 守护进程拒绝服务漏洞"
updated = "2026-06-16T21:51:53.917"

