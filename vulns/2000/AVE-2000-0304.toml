[basic]
description = "NetworkICE ICEcap 2.0.23 及更早版本存在调试功能默认开启的安全缺陷，远程攻击者可利用该功能绕过弱身份验证机制，直接向目标系统发送未加密的事件数据。该漏洞影响 ICEcap Manager 2.0.23 及之前版本，攻击者无需认证即可利用，可能导致敏感信息泄露或系统配置被篡改。建议用户升级至最新版本或禁用调试功能以消除风险。"
published = "2000-05-17T04:00:00.000"
remediation = "升级 NetworkICE ICEcap 至 2.0.24 或更高版本，该版本已禁用调试功能并修复了默认凭据问题。如无法升级，在 ICEcap 配置中手动关闭调试模式（debug=off），立即更改所有默认管理员账户密码，并在防火墙上限制仅允许可信 IP 访问 ICEcap 管理端口（默认 5000/tcp），同时启用 TLS 加密通信防止事件数据明文传输。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "NetworkICE ICEcap Manager 调试功能认证绕过漏洞"
updated = "2026-06-16T21:51:32.053"

