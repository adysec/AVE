[info]
author = "ave"
description = "检测 SGI IRIX 6.5.x 系统中 InPerson inpview 程序是否存在，该程序存在因处理临时文件 .ilmpAAA 时的竞态条件漏洞，本地攻击者可通过符号链接攻击实现权限提升"
id = "POC-AVE-2000-0601"
name = "CVE-2000-0799 PoC"
severity = "medium"
tags = ["cve-2000-0799"]
vuln_id = [
    "CVE-2000-0799",
    "AVE-2000-0601",
]

[poc]
logic = "all"

[[poc.requests]]
path = "/usr/lib/InPerson/inpview"
protocol = "file"

[[poc.requests.matchers]]
expect = true
part = "body"
regex = "."
type = "regex"
