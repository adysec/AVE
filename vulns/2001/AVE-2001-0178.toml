[basic]
description = "LICQ 1.0.3 之前版本的日志记录函数存在缓冲区溢出漏洞，远程攻击者可通过向目标 LICQ 客户端发送特制的超长消息触发该漏洞，导致缓冲区溢出，进而造成拒绝服务，在特定条件下可执行任意代码。该漏洞影响 LICQ 0.85/1.0.1/1.0.2 等版本，攻击无需认证，危害较大。"
published = "2001-07-02T04:00:00.000"
remediation = "升级 LICQ 至 1.0.3 或更高版本，该版本已修复日志记录函数中的缓冲区溢出漏洞。如无法升级，可在防火墙规则中限制 LICQ 通信端口的入站连接，仅允许可信 IP 访问，以降低远程利用风险。"
score = 7.5
severity = "HIGH"
sources = ["redhat"]
title = "LICQ 远程缓冲区溢出漏洞"
updated = "2026-06-16T21:54:18.820"

