[basic]
description = "CVE-1999-0614 候选编号已被官方拒绝使用。该条目原始描述仅指出 FTP 服务正在运行，属于系统配置管理范畴，而非独立的安全漏洞。此类配置问题更适合在通用配置枚举（CCE）框架中收录，不具备传统的攻击向量、利用条件或安全影响。因此该编号不应被用于描述任何安全缺陷，也不构成对系统机密性、完整性和可用性的直接威胁。"
published = "1999-01-01T05:00:00.000"
remediation = "如非业务必要，建议关闭 FTP 服务（systemctl disable vsftpd/proftpd 或移除对应软件包）；如必须使用，应替换为 SFTP/FTPS 等加密传输协议，并配置防火墙仅允许受信 IP 访问（如 iptables -A INPUT -p tcp --dport 21 -s 信任网段 -j ACCEPT），同时限制匿名登录、禁用 root 账户直接 FTP 登录。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "通用 FTP 服务运行配置问题"
