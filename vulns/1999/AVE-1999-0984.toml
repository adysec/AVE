[basic]
description = "该漏洞属于软件供应链投毒攻击，攻击者通过入侵多个知名开源软件的分发服务器，将原始源码替换为植入后门的木马版本，受影响的软件包括 TCP Wrappers 7.6、util-linux 2.9g、wu-ftpd 2.2/2.1f、ircII 2.2.9、OpenSSH 3.4p1 及 Sendmail 8.12.6。用户从被篡改的官方分发点下载并安装这些软件后，系统将被植入后门，远程攻击者可利用后门获取系统的完全控制权限。该漏洞 CVSS 评分 10.0，危害等级严重，影响范围广泛，属于典型的供应链安全事件。"
published = "1999-01-01T05:00:00.000"
remediation = "立即停止使用以下被篡改的软件版本：Sendmail 8.12.6（升级至 8.12.7+）、OpenSSH 3.4p1（升级至 3.4p2+）、TCP Wrappers 7.6（升级至 7.7+）、wu-ftpd 2.2/2.1f（升级至 2.6.2+）、util-linux 2.9g（升级至 2.9h+）、ircII 2.2.9（升级至 2.2.10+）。从官方源重新下载并验证 PGP 签名和 SHA 校验和，确保软件包完整性。在防火墙层面限制对外部不可信源的下游连接，并建立软件分发点完整性监控机制。"
score = 10
severity = "CRITICAL"
sources = ["exploitdb"]
title = "Sendmail TCP Wrappers OpenSSH 等多款软件供应链特洛伊木马后门漏洞"
updated = "2026-06-16T21:48:47.763"

