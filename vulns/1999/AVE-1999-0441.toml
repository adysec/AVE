[basic]
description = "War-FTPD 1.65 在处理用户登录时的密码字段存在缓冲区溢出漏洞，未经认证的远程攻击者可通过向 FTP 服务发送超长的密码字符串触发基于栈的缓冲区溢出，导致服务器进程崩溃或在目标系统上执行任意代码。Metasploit 框架已集成该漏洞的利用模块，攻击门槛较低。"
published = "1998-02-01T05:00:00.000"
remediation = "升级 War-FTPD 至 1.82.00 RC 或更高版本，该版本已修复 Username/Password 栈缓冲区溢出漏洞。如该软件已停止维护，建议迁移至主动维护的 FTP 服务器（如 vsftpd、ProFTPD），并在防火墙限制对 FTP 服务的访问来源 IP。"
score = 7.5
severity = "HIGH"
sources = ["exploitdb"]
title = "War-FTPD 1.65 远程缓冲区溢出漏洞"
updated = "2026-06-16T21:48:00.867"

