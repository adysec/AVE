[basic]
description = "Windows NT 及 Windows 2000 系统中，当管理员修改用户策略时，若本地 ntconfig.pol 文件对用户不可写入，策略无法正确更新，导致本地用户可通过将该策略文件设为只读等方式绕过系统强制执行的访问限制。该漏洞允许低权限用户在未授权情况下提升操作权限，危害系统安全策略的完整性。攻击者需要具有本地登录权限方可利用。"
published = "1999-12-31T05:00:00.000"
remediation = "确保 ntconfig.pol 文件的 NTFS 权限正确配置，仅允许 Administrators 完全控制，禁止普通用户具有写入权限。建议升级到 Windows Server 2003 或更高版本，后续版本的策略应用机制已修复此问题。如无法升级，可定期检查 ntconfig.pol 文件权限完整性并启用审计策略监控异常权限变更。"
score = 4.6
severity = "MEDIUM"
sources = ["cve"]
title = "Microsoft Windows NT/2000 本地策略绕过漏洞"
updated = "2026-06-16T21:50:16.220"

