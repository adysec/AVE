[basic]
description = "Internet Explorer 4.0、5.0 及 5.01 版本中的 external.NavigateAndFind 函数存在跨帧安全策略绕过漏洞。远程攻击者可构造恶意网页，诱导用户访问后绕过同源策略限制，跨帧读取目标系统上的本地文件。该漏洞利用条件简单，仅需用户使用受影响浏览器访问攻击者控制的页面即可触发。由于当时 IE 浏览器市场占有率极高，该漏洞影响范围广泛。"
published = "1999-12-23T05:00:00.000"
remediation = "升级到 Internet Explorer 6.0 或更高版本，该漏洞已在 IE 6.0 及后续版本中修复。由于 IE 5.x 系列已停止技术支持且不再获得安全更新，强烈建议升级到 Microsoft Edge 或现代第三方浏览器（如 Chrome/Firefox）。如因系统限制无法升级浏览器，可禁用 Active Scripting 并在 Internet 安全区域设置为高作为临时缓解措施。"
score = 2.6
severity = "LOW"
sources = ["avd"]
title = "Microsoft Internet Explorer 跨帧安全策略绕过漏洞"
updated = "2026-06-16T21:50:51.210"

