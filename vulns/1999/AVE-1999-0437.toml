[basic]
description = "Listserv 邮件列表管理软件存在缓冲区溢出漏洞，远程攻击者可通过向 Listserv 服务发送特制的恶意请求触发缓冲区溢出，从而在目标系统上执行任意命令。攻击者无需身份认证即可远程利用该漏洞，成功利用后可完全控制受影响服务器，进而窃取敏感数据、植入后门或发起进一步攻击。该漏洞危害等级为高危，影响多个 Listserv 早期版本。"
published = "1997-01-01T05:00:00.000"
remediation = "立即升级 L-Soft LISTSERV 至 1.8d 及以上版本，该版本已修复邮件处理过程中的缓冲区溢出问题。对于仍使用老旧版本的用户，建议升级至当前最新支持的 LISTSERV 17.x 系列版本，并限制不可信用户对邮件命令接口的访问。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "L-Soft LISTSERV 缓冲区溢出远程代码执行漏洞"
