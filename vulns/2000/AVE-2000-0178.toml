[basic]
description = "tags.<value>Internet Explorer 5.x 中的 window.showHelp() 方法未限制 HTML 帮助文件（.chm）仅从本地主机执行，远程攻击者可通过 Microsoft 网络共享诱导用户打开特制的 .chm 文件，从而在目标系统上执行任意命令。该漏洞影响 Internet Explorer 5.x 系列版本，攻击者需结合社会工程学手段诱使用户访问恶意页面或打开恶意帮助文件才能触发。"
published = "2000-03-01T05:00:00.000"
remediation = "升级至 Internet Explorer 5.5 或更高版本以修复此漏洞，该漏洞的补丁包含在微软 MS00-021 安全公告中。如无法升级 IE，可通过组策略禁用 HTML Help 执行权限或阻止来自不受信来源的 .chm 文件下载。鉴于 IE 已停止支持，建议迁移至 Microsoft Edge。如仍须使用旧版 IE，务必在受限环境中运行并启用最高安全级别。"
score = 5.1
severity = "MEDIUM"
sources = ["avd"]
title = "Microsoft Internet Explorer showHelp 远程代码执行漏洞"
updated = "2026-06-16T21:51:12.747"

