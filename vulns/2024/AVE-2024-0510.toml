[basic]
description = "Apache HTTP Server 存在服务端请求伪造（SSRF）漏洞，当 mod_proxy 模块启用且 mod_headers 配置为允许用户可控值修改 Content-Type 请求或响应头时，远程攻击者可利用该配置缺陷发送出站代理请求至恶意 URL，从而访问内部网络资源或执行内网扫描。该漏洞影响 Apache HTTP Server 2.4.64 以下版本，CVSS 评分 7.5，危害等级高。建议升级至 2.4.64 版本修复。"
published = "2025-07-10T17:15:45.987"
remediation = "立即升级 Apache HTTP Server 至 2.4.64 或更高版本，该版本已修复 mod_headers 与 mod_proxy 组合使用时的 SSRF 漏洞。如无法立即升级，可临时移除 mod_headers 中对 Content-Type 请求/响应头的动态修改配置，或在不影响业务的前提下禁用 mod_proxy 模块以降低风险。"
score = 7.5
severity = "HIGH"
sources = ["msrc"]
title = "Apache HTTP Server mod_headers 服务端请求伪造漏洞"
updated = "2026-06-17T07:50:36.103"

