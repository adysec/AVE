[info]
author = "ave"
description = "检测 PDGSoft Shopping Cart 中 redirect.exe 和 changepw.exe 是否存在，这两个 CGI 组件存在缓冲区溢出漏洞，远程攻击者可通过超长查询字符串触发任意代码执行"
id = "POC-AVE-2000-0426"
name = "PDGSoft Shopping Cart redirect.exe/changepw.exe 缓冲区溢出漏洞检测"
severity = "high"
tags = ["ave-2000-0426"]
vuln_id = [
    "CVE-2000-0401",
    "AVE-2000-0426",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/cgi-bin/changepw.exe"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["changepw"]

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/cgi-bin/redirect.exe"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["redirect"]
