[basic]
description = "Solaris 2.6 及 7.0 系统中的 lpset 命令存在缓冲区溢出漏洞，本地用户可通过向 -r 选项传递超长字符串参数触发该漏洞，导致攻击者能够获取 root 权限。该漏洞源于 lpset 程序在处理命令行参数时未正确检查输入长度，造成栈缓冲区溢出。攻击者需拥有本地系统访问权限，无需其他特殊条件即可利用。CVSS 评分 7.2，危害等级高。"
published = "2000-04-24T04:00:00.000"
remediation = "升级到 Solaris 8 GA 或更高版本（包括 Solaris 9、10、11），安装 Sun Microsystems/Oracle 发布的最终安全补丁包。目前 Solaris 7 已停止官方支持，建议迁移到现代 Solaris 版本。如无法立即升级，可使用群集安全管理工具限制本地用户权限，或通过修改权限属性（setuid）禁用对 lpset 命令的 root 访问权限作为临时缓解措施。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "Sun Solaris lpset 本地缓冲区溢出漏洞"
updated = "2026-06-16T21:51:27.843"

