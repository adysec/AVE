[info]
author = "AVE"
description = "Solaris snoop print_domain_name 缓冲区溢出漏洞验证。通过向目标 DNS 服务发送超长域名查询，触发 snoop 详细模式下解析 DNS 响应时的缓冲区溢出，验证攻击面可达性。"
id = "POC-AVE-1999-1506"
name = "CVE-1999-0973 PoC"
severity = "critical"
tags = ["ave-1999-1506"]
vuln_id = [
    "CVE-1999-0973",
    "AVE-1999-1506",
]

[poc]
logic = "all"

[[poc.requests]]
dns_type = "A"
path = "{{Hostname}}"
protocol = "dns"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["IN"]
