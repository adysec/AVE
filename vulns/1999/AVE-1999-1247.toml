[basic]
description = 'IPswitch WS_FTP Server 1.0.1/1.0.2 及 IMail Server 5.0 存在本地权限提升漏洞。本地用户可通过将注册表中 "flags" 键值设置为 1920 来获取额外系统权限，从而修改或添加邮件账户。该漏洞利用条件为需要本地访问权限，攻击复杂度较低，影响系统机密性和完整性。'
published = "1999-02-02T05:00:00.000"
remediation = '''
[id]
ave_id = "AVE-1999-01171"
aliases = ["CVE-1999-1171"]

[basic]
title = "Ipswitch WS_FTP Server 和 IMail 本地权限提升漏洞"
description = "Ipswitch WS_FTP Server 和 IMail 将用户账户信息以不安全的权限存储在 Windows 注册表中。本地用户可通过修改 HKEY_LOCAL_MACHINE\\SOFTWARE\\Ipswitch\\IMail\\Domains\\{domain}\\Users\\{user} 键下的 flags 值为 1920，从而获得管理员权限，实现创建、删除或修改任意邮件账户。攻击者需要具有本地系统访问权限，无需额外认证。"
severity = "MEDIUM"
score = 4.6
sources = ["cve", "exploitdb"]
published = "1999-02-02"
updated = "2024-06-16"
remediation = "厂商 Ipswitch 已发布修复版本，建议升级到最新版本。由于该产品已停止支持，建议迁移到受支持的替代邮件/FTP 服务器产品，并对注册表 HKEY_LOCAL_MACHINE\\SOFTWARE\\Ipswitch 路径设置严格的 ACL 权限，禁止非管理员用户写入。"

[references]
urls = ["http://marc.info/?l=ntbugtraq&m=91816507920544&w=2", "http://www.securityfocus.com/bid/218"]

[exploit]
poc_urls = []
exp_urls = []

[meta]
status = "completed"
collected_at = "2026-07-19T00:00:00Z"'''
