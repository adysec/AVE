[basic]
description = "CiscoSecure ACS（访问控制服务器）存在默认配置安全漏洞，远程攻击者无需任何认证即可直接修改服务器数据库，导致权限提升、配置篡改或服务中断。该漏洞源于出厂默认设置未对管理接口实施访问控制，攻击者只需网络可达即可利用。影响 CiscoSecure ACS 早期版本，建议立即修改默认配置并启用认证机制。"
published = "1999-08-19T04:00:00.000"
remediation = "立即升级 CiscoSecure ACS 至修复该漏洞的最新版本；在 ACS 管理界面中启用数据库访问认证功能，要求所有数据库修改操作须提供有效管理员凭据；同时在防火墙上限制仅允许受信管理 IP 访问 ACS 的数据库管理端口（默认 TCP 2000），作为临时缓解措施。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "Cisco CiscoSecure ACS 默认配置权限绕过漏洞"
updated = "2026-06-16T21:48:56.753"

