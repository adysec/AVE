[basic]
description = "Netscape Navigator 在存储用户用于访问 Netscape 邮件服务的密码时，采用了强度较弱的加密算法进行保护。由于加密强度不足，本地或具备一定权限的攻击者可通过分析相关存储文件，较容易地还原出明文密码。该漏洞影响使用 Netscape Navigator 邮件功能的用户，攻击条件为攻击者需能访问受害者本地存储的密码数据或取得相应读取权限，利用方式为通过逆向弱加密存储内容获取邮件账户凭据，进而可能危及用户邮件通信安全。"
published = "2000-01-12T05:00:00.000"
remediation = '建议将 Netscape Navigator 升级至 4.7 或更高版本（该版本改进了密码存储加密强度）。如无法立即升级，可在邮件客户端中取消"记住密码"选项，改用手动输入，并避免在不信任主机上保存邮件密码；同时在本地系统中对用户配置目录设置严格的文件访问权限以限制密码文件被读取。'
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = '{"_meta":{},"stopReason":"end_turn","usage":{"inputTokens":10768,"outputTokens":17,"totalTokens":10785}}'
