[basic]
description = "Gardyn IoT Hub 管理面板未设置标准 HTTP 安全响应头（如 X-Frame-Options、Content-Security-Policy、X-Content-Type-Options 等），攻击者可通过构造恶意页面嵌入管理面板框架实施点击劫持攻击，或结合其他攻击向量触发跨站脚本攻击。该漏洞影响 Gardyn IoT Hub 设备的内置管理面板，虽然需要管理员用户交互方可利用，但攻击者可能借此窃取管理员会话凭据或在授权上下文中执行非预期操作，对设备机密性和完整性构成中等风险。"
published = "2026-07-03T00:16:52.440"
remediation = "确认 Gardyn IoT Hub 设备已联网，固件将自动更新至 master.627 及以上版本；Cloud API 已升级至 2.12.2026 及以上版本。在 Web 服务器或反向代理层为管理面板添加 Content-Security-Policy、X-Frame-Options: DENY、X-Content-Type-Options: nosniff 和 Strict-Transport-Security 等安全响应头，防止点击劫持和跨站脚本攻击。"
score = 5.1
severity = "MEDIUM"
sources = ["hwpoc"]
title = "Gardyn IoT Hub 管理面板安全标头缺失漏洞"
updated = "2026-07-06T19:42:49.287"

