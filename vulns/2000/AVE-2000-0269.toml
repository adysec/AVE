[basic]
description = "Symantec pcAnywhere 8.0.x 及 9.x 版本在端口扫描处理机制中存在缺陷，远程攻击者可通过向目标服务发送大量 TCP SYN 连接请求（如使用 nmap 进行端口扫描），触发服务进程异常崩溃，导致拒绝服务。该漏洞仅需网络可达即可触发，无需认证。厂商至今未发布官方补丁，建议升级至不受影响的版本或配置网络访问控制策略进行防护。"
published = "2000-04-25T04:00:00.000"
remediation = "升级到 pcAnywhere 12.5 或更高版本，该漏洞在后续版本中已修复。由于 Symantec pcAnywhere 已停止维护（EOL），建议迁移至受支持的远程管理方案（如 Symantec Remote Access 或第三方替代产品）。临时缓解措施：在防火墙上限制对 pcAnywhere 默认端口（TCP 5631、UDP 5632）的访问，仅允许可信 IP 连接。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Symantec pcAnywhere 端口扫描拒绝服务漏洞"
updated = "2026-06-16T21:51:28.727"

