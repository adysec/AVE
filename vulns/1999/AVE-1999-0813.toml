[basic]
description = "Windows NT 操作系统存在自动登录配置缺陷，系统在注册表中以明文存储管理员密码。本地攻击者可通过读取注册表键值获取管理员凭据，进而获得系统完全控制权限。该漏洞影响 Windows NT 4.0 及更早版本，需要攻击者具有本地访问权限，CVSS 评分 7.2，危害等级高。"
published = "1999-01-01T05:00:00.000"
remediation = '在注册表编辑器中定位到 HKEY_LOCAL_MACHINE\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Winlogon，删除 DefaultPassword 键值并将 AutoAdminLogon 键值设为 0；安装 Windows NT 4.0 Service Pack 6a 并使用 Syskey 工具 (Syskey.exe) 为 SAM 数据库提供额外加密保护；开启屏幕保护密码和 Ctrl+Alt+Del 安全登录要求。如业务允许，建议升级至 Windows 2000 或更高版本操作系统。'
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "Microsoft Windows NT 重启后管理员自动登录漏洞"
updated = "2026-06-16T21:48:36.850"

