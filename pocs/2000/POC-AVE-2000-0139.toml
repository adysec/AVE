[info]
author = "AVE"
description = "Windows NT/95/98 系统在访问非可移动介质时自动执行 autorun.inf 文件。验证方式：检查目标驱动器根目录下是否存在 autorun.inf 文件，若存在且包含可执行命令（如 OPEN=），则判定存在漏洞。"
id = "POC-AVE-2000-0139"
name = "Microsoft Windows NT/95/98 autorun.inf 本地代码执行漏洞 PoC"
severity = "high"
tags = ["cve-2000-0155"]
vuln_id = [
    "CVE-2000-0155",
    "AVE-2000-0139",
]

[poc]
logic = "all"

[[poc.requests]]
path = "/autorun.inf"
protocol = "file"

[[poc.requests.matchers]]
expect = true
part = "body"
regex = ".+"
type = "regex"
