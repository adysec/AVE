[basic]
description = "用友NC系统portal/pt/psnImage/download接口的pk_psndoc参数存在Oracle基于时间的盲注漏洞，攻击者可通过构造恶意payload利用DBMS_PIPE.RECEIVE_MESSAGE延时函数实施SQL注入攻击。该漏洞影响用友NC相关版本系统，攻击者无需身份认证即可通过构造包含DBMS_PIPE.RECEIVE_MESSAGE(CHR(65)||CHR(79)||CHR(66)||CHR(101),5)等延时payload的pk_psndoc参数，利用数据库延时响应差异推断数据库信息，进而窃取数据库敏感数据或执行任意SQL命令，严重威胁系统数据安全。攻击者仅需构造恶意请求访问/portal/pt/psnImage/download接口即可触发漏洞，无需任何身份认证前置条件。"
published = "0819"
remediation = "升级用友NC至官方已修复该SQL注入漏洞的最新补丁版本（建议联系用友获取对应版本的安全补丁并升级）；在升级前，可在Web应用防火墙（WAF）中拦截对 /portal/pt/psnImage/download 接口的访问，并对 pageId、pk_psndoc 等参数做严格的输入校验与预编译参数化查询，禁止拼接SQL语句，同时限制该接口的访问来源IP以缓解风险。"
score = 5
severity = "MEDIUM"
