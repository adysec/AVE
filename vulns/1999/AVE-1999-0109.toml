[basic]
description = "Ramp Networks WebRamp 路由器 HTTP 服务器存在拒绝服务漏洞，远程攻击者无需任何身份认证，仅通过网络向目标设备80端口的HTTP服务发送特制的恶意字符串，即可触发该漏洞，导致路由器HTTP服务崩溃或停止响应正常请求。攻击条件极为简单，只需目标WebRamp设备的HTTP端口处于开放状态即可，CVSS评分5.0，危害等级中等。建议用户升级固件或通过防火墙规则限制对HTTP端口的非必要网络访问。"
published = "1999-03-01T05:00:00.000"
remediation = "建议在防火墙或访问控制列表(ACL)中限制对 WebRamp 路由器 HTTP 端口(80/tcp)的访问，仅允许受信任的管理 IP 地址。如设备 Web 管理非必需，直接关闭 HTTP 服务。由于该产品已停产且厂商不再提供更新，长期方案为替换为仍在安全支持周期内的现代路由器产品。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Ramp Networks WebRamp Router HTTP Server 拒绝服务漏洞"
updated = "2026-06-16T21:48:23.680"

