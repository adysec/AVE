[basic]
description = "Linux 内核 futex 子系统中的 futex_requeue 函数存在条件竞争漏洞，该函数未能确保两次调用使用不同的 futex 地址，导致本地攻击者可通过精心构造的 FUTEX_REQUEUE 命令触发不安全的等待队列修改，实现权限提升。该漏洞影响 Linux 内核 3.14.5 及之前版本，主要波及 CentOS 7、RHEL 等企业级发行版。攻击者需具备本地用户权限即可利用，无需交互，利用复杂度低。公开的利用工具（如 libfutex/towelroot）已广泛传播，可实现从普通用户到 root 权限的完全提升，对系统机密性、完整性和可用性均造成严重威胁。该漏洞已被 CISA 列入已知被利用漏洞目录（KEV），实际危害性极高。"
published = "2014-06-07T14:55:27.240"
remediation = "升级 Linux 内核至 3.14.6 或更高版本（包含补丁 commit e9c243a5a6de0be8e584c604d353412584b592f8）。CentOS 7/RHEL 用户可通过 `yum update kernel` 更新至包含修复的内核包，重启后生效。如无法立即升级，可通过 SELinux 策略限制本地用户执行权限作为临时缓解措施。"
score = 7.8
severity = "HIGH"
sources = ["kev"]
title = "Linux Kernel 本地权限提升漏洞"
updated = "2026-06-17T00:07:40.877"

