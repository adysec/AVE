[basic]
description = "Microsoft Internet Explorer 6/7/8 中存在释放后使用（Use-after-free）漏洞。远程攻击者可通过构造特制的层叠样式表（CSS）token 序列与 clip 属性，触发未初始化内存损坏，从而在目标系统上执行任意代码。该漏洞在 2010 年 11 月已被在野利用，影响 Windows 平台上 IE 6/7/8 版本。CVSS 评分 8.1，危害等级高。"
published = "2010-11-05T17:00:02.890"
remediation = "立即升级到 Internet Explorer 9 或更高版本，或迁移至 Microsoft Edge 等现代浏览器。Windows XP/Vista/7 用户应安装 Microsoft 安全公告 MS10-090 对应补丁 (KB2416400)。如无法升级，可在 IE 中禁用 Active Scripting 作为临时缓解措施。"
score = 8.1
severity = "HIGH"
sources = ["kev"]
title = "Microsoft Internet Explorer 释放后使用远程代码执行漏洞"
updated = "2026-06-16T23:23:53.780"

