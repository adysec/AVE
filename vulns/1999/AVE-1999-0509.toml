[basic]
description = "Windows NT 系统中存在权限控制缺陷，本地用户可通过直接调用控制键盘和鼠标的 IOCTL 设备控制码来禁用这些输入设备，导致系统无法正常操作。该漏洞源于系统未对 IOCTL 调用进行充分的权限检查，允许低权限用户绕过访问控制。攻击者只需拥有本地登录权限即可利用此漏洞，影响 Windows NT 系列系统，CVSS 评分 7.8，危害等级高。"
published = "1999-07-06T04:00:00.000"
remediation = "安装 Windows NT 4.0 Service Pack 6a 或后续安全更新，限制非管理员用户对设备 IOCTL 的调用权限。对于已停止支持的旧系统，建议升级至 Windows Server 2016 或更高版本以彻底修复此漏洞。"
score = 7.8
severity = "HIGH"
sources = ["avd"]
title = "Microsoft Windows NT IOCTL 调用权限许可和访问控制漏洞"
updated = "2026-06-16T21:48:55.960"

