[basic]
description = "AIX 4.2/4.3 操作系统中 netstat 命令的 -Zi 选项未正确限制访问权限，导致本地低权限用户可通过执行 netstat -Zi 命令清除网络接口统计数据，从而掩盖异常网络活动的痕迹。该漏洞影响 AIX 4.x.x 系列版本，CVSS 评分 2.1，危害等级低。攻击者需具有本地系统访问权限方可利用。"
published = "2000-11-14T05:00:00.000"
remediation = "IBM 已通过 AIX 4.3.3 Maintenance Level 及后续 APAR 修复此问题，建议升级至 AIX 4.3.3 及更高维护级别。临时缓解措施：以 root 执行 `chmod 500 /usr/bin/netstat` 移除 netstat 的 setgid 权限（原始权限为 2555 → 调整为 0555），限制非 root 用户执行；或通过 `ls -l /usr/bin/netstat` 确认权限后，仅允许可信本地用户组运行。长期方案建议升级至 IBM 当前仍支持的主流 AIX 版本（如 AIX 7.2/7.3），这些版本中已彻底修复此权限缺失问题。"
score = 2.1
severity = "LOW"
sources = ["exploitdb"]
title = "IBM AIX netstat 本地权限管理不当漏洞"
updated = "2026-06-16T21:52:38.860"

