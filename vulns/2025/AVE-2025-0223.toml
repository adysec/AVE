[basic]
description = "EasySite 内容管理平台存在 Java 反序列化漏洞，攻击者可通过向目标系统发送特制的序列化数据触发不安全的反序列化操作，导致远程代码执行。该漏洞影响 EasySite 内容管理平台相关版本，攻击者无需身份认证即可利用，危害严重。建议用户及时升级至最新版本或安装安全补丁以修复此漏洞。"
published = "0703"
remediation = "升级易居系统中的Apache XStream依赖库到安全版本（≥2.0.1），并同时应用WAF规则保护/eportal/ui?portal.url=/portlet/wx-message-accept!accept.portlet&moduleId=0以阻止反序列化攻击流量。如无法立即升级，可临时停用WxMessageAcceptAction模块并限制该端口的外部访问。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "EasySite 内容管理平台反序列化远程代码执行漏洞"
