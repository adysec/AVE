[basic]
description = "Linux cdwtools 093 及更早版本中存在缓冲区溢出漏洞，本地攻击者可利用该漏洞通过向 cdwtools 程序提交特制的输入触发缓冲区溢出，从而获取 root 权限。该漏洞影响 SuSE Linux 6.1/6.2 等发行版本，由于 cwdtools 以 setuid 权限运行，攻击者无需认证即可在本地利用此漏洞实现权限提升。"
published = "1999-10-22T04:00:00.000"
remediation = "升级 cdwtools 至 093 以上版本，或从 SuSE 官方获取安全补丁。如无法升级，可移除 cwdtools 相关二进制文件的 setuid 权限位（chmod u-s /usr/bin/cwdtools），限制本地普通用户执行提权操作。"
score = 7.2
severity = "HIGH"
sources = ["exploitdb"]
title = "SuSE Linux cdwtools 本地缓冲区溢出漏洞"
updated = "2026-06-16T21:51:33.543"

