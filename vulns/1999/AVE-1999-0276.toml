[basic]
description = "Microsoft Windows NT 4.0 的电话拨号程序（dialer.exe）存在缓冲区溢出漏洞（CWE-119）。当系统加载包含特制畸形拨号条目的 dialer.ini 配置文件时，拨号程序在处理该条目过程中发生缓冲区溢出，攻击者可借此在系统上下文中执行任意代码。该漏洞影响安装了 SP1 至 SP5 的所有 Windows NT 4.0 版本，CVSS 2.0 评分为 6.2（MEDIUM，向量：AV:L/AC:H/Au:N/C:C/I:C/A:C）。利用该漏洞需要本地访问权限，攻击者必须能够修改或向目标系统写入恶意的 dialer.ini 文件，然后触发拨号程序加载该配置文件。成功利用可导致攻击者完全控制受影响系统，获得系统级权限。Microsoft 已于 1999 年 7 月通过安全公告 MS99-026 及知识库文章 KB237185 发布修复补丁。"
published = "1999-07-29T04:00:00.000"
remediation = "Windows NT 4.0 已停止支持，建议升级至 Windows 10/11 或 Windows Server 2019+ 等受支持版本。如无法升级，在 dialer.ini 中移除可疑条目，限制 dialer.exe 执行权限，并禁用 Phone Dialer 服务作为临时缓解。"
score = 6.2
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Microsoft Windows NT 4.0 电话拨号程序缓冲区溢出漏洞"
updated = "2026-06-16T21:48:52.550"

