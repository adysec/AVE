[basic]
description = "IBM Lotus Domino 的 HTTP 服务器（Web 服务器组件）未能正确禁用 cgi-bin 目录的匿名访问权限。该漏洞源于服务器配置缺陷，在未对 cgi-bin 目录实施身份验证限制的情况下，允许未经身份认证的远程攻击者直接通过 HTTP 请求访问并执行该目录下的 CGI 程序。攻击条件为攻击者只需能够与目标 Domino 服务器的 80 端口建立网络连接，无需任何凭据即可发起请求。成功利用后，攻击者可在服务器上以 Domino 服务进程权限运行 CGI 脚本，进而读取敏感文件、获取服务器信息甚至执行任意命令，对服务器机密性与完整性构成威胁。受影响范围为启用了 Web 服务且未手动加固 cgi-bin 访问控制的 Lotus Domino 服务器版本。"
published = "1999-12-21T05:00:00.000"
remediation = '建议升级到 Lotus Domino 5.0.3 或更高版本，并在 Domino 目录管理中将 cgi-bin 目录的匿名访问权限显式禁用，仅允许已认证用户访问。同时配置服务器文档中"Internet Protocols-HTTP"下的 Anonymous 设置为否，并定期审查 CGI 目录的 ACL 权限。'
score = 5
severity = "MEDIUM"
sources = ["cve"]
