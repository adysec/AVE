[info]
author = "AVE"
description = "验证 Microsoft Internet Explorer Telnet 客户端命令参数注入漏洞。通过 telnet: URI 协议处理器传递 -f 参数使 Telnet 客户端（SFU 2.0）将会话日志写入攻击者指定的本地文件，结合 Windows 启动目录实现下次用户登录时执行任意代码。"
id = "POC-AVE-2001-0058"
name = "CVE-2001-0150 PoC"
severity = "medium"
tags = ["cve-2001-0150"]
vuln_id = [
    "CVE-2001-0150",
    "AVE-2001-0058",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/"
protocol = "http"

[poc.requests.body]
content = ""
type = "raw"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["telnet:-f"]
