[basic]
description = "Decidim 参与式民主平台的身份验证管理功能存在越权访问漏洞。验证管理员控制器在加载待审核授权记录时使用 Authorization.find() 进行原始查询，未检查该记录是否属于当前组织（current_organization），导致拥有验证管理员权限的攻击者可跨组织访问、批准或拒绝其他租户的身份文档验证请求，造成敏感身份信息泄露。"
published = "2026-07-13"
remediation = "升级 Decidim 至 v0.32.0（或 v0.31.5、v0.30.9）及以上版本，该修复在 PR #16666 中合入，在验证管理员控制器中增加了 current_organization 归属检查。如无法立即升级，可临时禁用身份文档验证方式作为缓解措施。"
score = 4.9
severity = "MEDIUM"
sources = [
    "ghsa",
    "cve",
]
title = "Decidim 验证管理员跨组织越权访问身份信息漏洞"
updated = "2026-07-13"

