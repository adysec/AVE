[basic]
description = "Linux 系统 man 手册程序存在堆缓冲区溢出漏洞，本地用户可通过向 man 命令传递超长的 -S 选项参数触发堆溢出，导致以 man 组权限执行任意代码。该漏洞影响 Immunix OS 6.2/7.0、RedHat 5.2/6.2/7.0、SuSE Linux 6.x/7.0/7.1 等多个 Linux 发行版。攻击者需拥有本地系统访问权限，利用门槛较低，成功利用后可获取 man 组权限，进而可能提升至更高权限。"
published = "2001-09-20T04:00:00.000"
remediation = "升级 man 程序包至修复版本：Red Hat Linux 用户安装 RHSA-2001:069 提供的更新包，SuSE Linux 用户升级至 man 1.5i 及以上版本。如无法升级，可执行 `chmod g-s /usr/bin/man` 移除 man 命令的 setgid 权限位，阻止利用该漏洞提升至 man 组权限。"
score = 4.6
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Linux man 程序堆缓冲区溢出本地权限提升漏洞"
updated = "2026-06-16T21:54:40.733"

