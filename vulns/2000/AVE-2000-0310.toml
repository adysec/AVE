[basic]
description = "Windows NT 4.0 远程注册表服务存在输入验证缺陷，本地认证用户可通过向远程注册表服务器发送特制的畸形请求，触发 winlogon 进程异常失败，导致系统拒绝服务。该漏洞影响 Windows NT 4.0 系统，攻击者需拥有有效登录凭据才能利用，CVSS 评分 5.0，微软已发布 MS00-040 安全公告修复此漏洞。"
published = "2000-06-08T04:00:00.000"
remediation = '安装 Microsoft Security Bulletin MS00-040 提供的补丁 (KB268861)。如无法安装补丁，可通过服务管理器 (services.msc) 停止并禁用 Remote Registry 服务，或通过注册表将 HKLM\SYSTEM\CurrentControlSet\Control\SecurePipeServers\winreg 的 ACL 限制为仅允许授权管理员远程访问，以此缓解风险。'
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Microsoft Windows NT 4.0 远程注册表请求拒绝服务漏洞"
updated = "2026-06-16T21:51:35.390"

