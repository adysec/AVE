[basic]
description = 'KVIrc IRC 客户端 0.9.0 版本在处理 DCC GET 请求时存在目录遍历漏洞。当用户启用了 "Listen to !nick <soundname> requests" 选项后，远程攻击者可通过向目标 IRC 客户端发送包含 `..`（点点）序列的特制 DCC GET 请求，突破文件路径限制，实现任意文件读取。攻击者无需身份认证即可利用此漏洞窃取目标系统上的敏感文件。'
published = "1999-09-24T04:00:00.000"
remediation = "升级 KVIrc 至 1.0.0 或更高版本，该漏洞已在后续版本中修复。如无法升级，请在「设置」→「选项」→「IRC」→「高级」中取消勾选「Listen to !nick &lt;soundname&gt; requests」选项以禁用该功能，并避免在不可信频道中接受 DCC 请求。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "KVIrc IRC客户端 目录遍历任意文件读取漏洞"
updated = "2026-06-16T21:50:15.337"

