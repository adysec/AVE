[basic]
description = "Windows 2000 在安装过程中直至系统首次重启前，Administrator 账户密码未实际生效，导致远程攻击者可在无需认证的情况下直接访问 ADMIN$ 隐藏共享目录。该漏洞影响 Windows 2000 所有版本，攻击者只需知道目标 IP 地址即可通过 SMB 协议利用，可导致系统完全受控。微软已发布安全更新修复此问题。"
published = "2000-02-15T05:00:00.000"
remediation = "安装 Windows 2000 时必须断开网络连接（拔掉网线），防止安装过程中 ADMIN$ 共享被远程匿名访问。首次重启完成后，立即使用强密码为 Administrator 账户设置密码，并确保系统加入域或工作组时通过防火墙封锁 TCP 445/139 端口的入站 SMB 流量。Windows 2000 已停止支持，建议尽快升级到受支持的 Windows 版本。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "Microsoft Windows 2000 ADMIN$ 共享未授权访问漏洞"
updated = "2026-06-16T21:51:15.520"

