[basic]
description = "Windows NT 系统在查找关键系统程序（如 NDDEAGNT.EXE、EXPLORER.EXE、USERINIT.EXE 或 TASKMGR.EXE）时，默认优先搜索 %systemroot% 用户主目录而非系统目录。由于该目录默认可写，本地攻击者可将木马程序放入其中，系统启动或调用时优先执行恶意程序，从而绕过访问限制或提升权限。该漏洞影响 Windows NT 系列系统，CVSS 评分 7.2，危害等级高。"
published = "1999-06-28T04:00:00.000"
remediation = '限制 %systemroot% 目录的写入权限，仅允许 Administrators 和 SYSTEM 账户写入；修改系统路径搜索顺序，确保系统目录（%systemroot%\system32）优先于用户目录被搜索；建议升级至 Windows 2000 或更高版本，该版本已修复此路径搜索顺序问题。'
score = 7.2
severity = "HIGH"
sources = ["cve"]
title = "Microsoft Windows NT 本地权限提升漏洞"
updated = "2026-06-16T21:50:17.093"

