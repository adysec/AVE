[basic]
description = "Sun Java Web Server 2.0 及更早版本的默认配置存在安全漏洞，远程攻击者可通过 board.html 页面上传恶意 Java 代码，再直接调用 JSP 编译器 servlet 导致任意命令执行。该漏洞影响 Sun Java Web Server 2.0 及更早版本，CVSS 评分 7.5，危害等级高危。"
published = "2000-07-12T04:00:00.000"
remediation = "该漏洞源于 Sun Java Web Server 2.0 及更早版本默认安装中 board.html 示例应用允许任意文件上传，且 JSP 编译器 servlet 未做权限校验。修复措施：立即删除 web 根目录下的 sample/ 示例目录（特别是 board.html），限制对 /servlet/ 路径的访问；从 Sun 官方安全公告 jwsca-2000-02 获取补丁，升级至 Sun Java Web Server 2.0 Update 1；在生产环境中禁用 JSP 编译器 servlet 的直接外部访问。由于该产品已停止技术支持，建议迁移至 Oracle WebLogic Server 或其它受支持的 Java Web 服务器。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "Sun Java System Web Server 远程代码执行漏洞"
updated = "2026-06-16T21:52:08.707"

