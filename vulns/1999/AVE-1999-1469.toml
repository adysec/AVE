[basic]
description = 'Cisco IOS 9.1 及更早版本中存在访问控制列表绕过漏洞。当启用 IP 路由缓存且设置了 "established" 关键字时，系统无法正确处理扩展 IP 访问列表规则，导致攻击者可以绕过 ACL 过滤策略，发送非授权网络流量。远程攻击者无需认证即可利用此漏洞，影响运行受影响版本 Cisco IOS 的网络设备，可能导致未授权访问或信息泄露。'
published = "1992-12-10T05:00:00.000"
remediation = "升级 Cisco IOS 至 9.1.2 或更高版本。临时缓解措施：(1) 在应用扩展 ACL 的接口上执行 `no ip route-cache` 关闭快速交换模式，强制使用进程交换以正确评估 ACL；(2) 如无法升级，避免在扩展 ACL 中使用 `established` 关键字，改用具体源目端口的精确匹配规则。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "Cisco IOS 访问控制列表绕过漏洞"
updated = "2026-06-16T21:50:09.570"

