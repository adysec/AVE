[basic]
description = "Windows NT 在搜索 NDDEAGNT.EXE、EXPLORER.EXE 等关键系统程序时，默认优先查找 %systemroot% 用户主目录而非系统目录，而根目录默认可写。本地攻击者可利用此搜索顺序漏洞，将特洛伊木马程序放置于根目录，当系统启动或调用相关程序时优先执行恶意代码，从而绕过访问限制或提升权限。该漏洞影响 Windows NT 系列系统，CVSS 评分 7.2，危害等级高。"
published = "1999-06-28T04:00:00.000"
remediation = "安装 Windows NT 4.0 Service Pack 6a 或后续安全更新，限制 `%systemroot%` 目录权限，确保普通用户无写入权限；将关键系统程序（如 EXPLORER.EXE、TASKMGR.EXE）所在目录权限设置为仅 Administrators 和 SYSTEM 可写；审核并移除根目录下的可疑可执行文件。"
score = 7.2
severity = "HIGH"
sources = ["epss"]
title = "Microsoft Windows NT 本地权限提升漏洞"
updated = "2026-06-16T21:50:17.093"

