[basic]
description = "TLS/SSL 协议重协商漏洞（Project Mogul）存在于 TLS 协议及 SSL 3.0 及更早版本中，广泛影响 Microsoft IIS 7.0、Apache mod_ssl 2.2.14 及之前版本、OpenSSL 0.9.8l 之前版本、GnuTLS 2.8.5 及之前版本、Mozilla NSS 3.12.4 及之前版本等众多产品。该漏洞源于协议未能正确将重协商握手与现有连接关联，导致中间人攻击者可向服务器发送未经认证的请求，该请求会在重协商后的上下文中被追溯性处理，从而实现“明文注入”攻击，向 HTTPS 会话乃至其他受 TLS/SSL 保护的会话注入恶意数据。攻击条件为攻击者能拦截并篡改客户端与服务器间的网络流量（中间人位置），利用方式为在重协商前发送精心构造的请求，使服务器在重协商完成后将攻击者数据视为合法用户请求处理，CVSS 评分 9.8，危害等级严重。"
published = "2009-11-09T17:30:00.407"
remediation = "立即升级受影响组件：OpenSSL 升级至 0.9.8l 或更高版本（或应用厂商回滚补丁禁用 SSL/TLS 重协商）；Apache HTTP Server 升级至 2.2.15 及以上（含 mod_ssl 修复）；Microsoft IIS 7.0 安装 MS09-043 补丁（KB977377）；GnuTLS 升级至 2.8.6+；Mozilla NSS 升级至 3.12.5+；Cisco 设备应用对应安全公告补丁（如 Cisco ASA/ICS/IOS 相关公告）。若无法立即打补丁，可在负载均衡器/防火墙/SSL 终止层禁用 SSL/TLS 重协商功能（如 Apache 设置 SSLInsecureRenegotiation off，Nginx 设置 ssl_renegotiation off，F5/Citrix 等 ADC 启用重协商拦截）作为临时缓解，并强制要求客户端使用支持 RFC 5746 重协商扩展的 TLS 客户端。必须升级所有受影响组件至修复版本以彻底修复。"
score = 9.8
severity = "CRITICAL"
sources = ["tenable"]
title = "OpenSSL OpenSSL TLS/SSL 重协商漏洞"
updated = "2026-06-16T23:11:50.227"

