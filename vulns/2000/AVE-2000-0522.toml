[basic]
description = "Selena Sol WebBanner 4.0 存在路径遍历漏洞，远程攻击者可通过在 URL 请求中使用 `../`（点点斜杠）目录穿越序列，绕过访问限制读取服务器上的任意文件。该漏洞源于程序未对用户输入的文件路径进行充分过滤和校验，攻击者无需身份认证即可利用，可能导致敏感信息泄露（如配置文件、密码文件等）。影响 Selena Sol WebBanner 4.0 版本，CVSS 评分 5.1，危害等级中危。"
published = "2000-02-02T05:00:00.000"
remediation = '立即在 WebBanner CGI 脚本入口处添加输入过滤，拒绝包含 `../` 或 `..\` 等目录遍历序列的请求参数。由于 Selena Sol 已停止维护且无官方补丁，建议停止使用 WebBanner 4.0，迁移至现代受支持的广告管理系统（如 Revive Adserver 或 OpenX），并在 Web 服务器（Apache/Nginx）层面配置 `AllowOverride None` 和禁用符号链接以防止文件越权访问。'
score = 5.1
severity = "MEDIUM"
sources = ["epss"]
title = "Selena Sol WebBanner 任意文件读取漏洞"
updated = "2026-06-16T21:51:48.070"

