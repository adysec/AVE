[basic]
description = "Linux 内核 mpi3mr 驱动程序中存在越界内存访问漏洞，该驱动在分配管理位图时以字节为单位计算大小，而内核位图辅助函数需以 unsigned long 为单位，此差异导致在 find_first_zero_bit() 等操作中发生 slab 越界读取。本地攻击者可通过对 eHBA-9600 控制器执行固件下载操作触发该漏洞，造成系统崩溃或信息泄露。该漏洞影响 Linux 内核使用 mpi3mr 驱动的版本，CVSS 评分 7.1，危害等级高。"
published = "2025-09-18T14:15:40.473"
remediation = "立即将 Linux 内核升级至 6.1.18+、6.2.5+ 或 6.3+ 版本，各发行版对应安装对应安全更新包（如 Debian bookworm 升至 6.1.176-1、Ubuntu 安装对应 HWE 内核更新）。如无法立即升级，可执行 `modprobe -r mpi3mr` 卸载 mpi3mr 驱动模块以临时规避风险（注意：该操作将禁用 Broadcom/SAS HBA 适配器功能，需在业务低谷期操作）。"
score = 7.1
severity = "HIGH"
sources = ["msrc"]
title = "Linux 内核 SCSI mpi3mr 驱动程序越界内存访问漏洞"
updated = "2026-06-17T06:45:08.793"

