[basic]
description = "SNMP 服务在未配置访问控制或使用默认团体字符串时运行，远程攻击者可通过网络探测 UDP 端口 161/162 获取系统信息，包括网络拓扑、运行进程、系统配置和用户账户等敏感数据。该条目已被 NVD 拒绝，理由是此问题属于配置枚举范畴（CCE）而非直接安全漏洞，CVSS 为 0。"
published = "1999-01-01T05:00:00.000"
remediation = "如非必要，建议在系统服务中禁用 SNMP 服务 (snmpd)，减少攻击面。如需使用 SNMP，应升级至支持 SNMPv3 的版本并启用认证与加密（配置 authPriv），同时通过防火墙限制 UDP 161/162 端口的访问来源 IP，仅允许受信任的管理端连接。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "SNMP 服务配置不当漏洞"
updated = "2023-11-07T01:54:59.343"

