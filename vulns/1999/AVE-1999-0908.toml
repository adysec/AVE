[basic]
description = "RSAREF 2.0 加密库中的加密与解密函数存在缓冲区溢出漏洞，本地攻击者可通过向受影响函数传递特制输入数据触发缓冲区溢出，导致拒绝服务或任意代码执行。该漏洞影响 RSA Security 公司开发的 RSAREF 2.0 加密工具包，CVSS 评分 10.0，危害等级严重。由于 RSAREF 库被广泛集成于第三方安全产品中，漏洞影响面较广，建议用户升级至修复版本或采用替代加密库。"
published = "1999-12-01T05:00:00.000"
remediation = "立即将 RSAREF 库从 2.0 升级到 RSA 官方发布的 RSAREF 2.1 或更高版本，该版本修复了加密与解密函数中的缓冲区边界检查缺陷。若暂时无法升级，应将调用 RSAREF 加密/解密接口的服务限制为仅处理可信来源的已验证输入，并对输入长度做严格边界校验，同时避免向不可信网络直接暴露依赖该库的服务进程。"
score = 10
severity = "CRITICAL"
