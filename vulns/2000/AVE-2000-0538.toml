[basic]
description = "Subscribe Me LITE 是一款 CGI 脚本中心提供的邮件订阅管理工具，其管理员密码修改功能存在认证缺陷。远程攻击者无需任何身份验证，可直接向目标服务器上运行的 subscribe.pl 脚本发送带有 setpwd 参数的 HTTP 请求，即可绕过授权检查任意更改管理员密码，进而获取 Account Manager 模块的完整控制权限。该漏洞影响 Subscribe Me LITE 2.0 及更早版本，攻击门槛低，危害较大。"
published = "2000-10-20T04:00:00.000"
remediation = "立即停止使用已停止维护的 Subscribe Me Lite 2.0，该产品厂商已不再提供安全更新。建议迁移至其他仍在维护的邮件订阅脚本（如 Mailman、phpList 等）。如无法立即替换，可在 Web 服务器（Apache/Nginx）层面通过 .htaccess 或 location 规则限制对 subscribe.pl 的访问来源 IP，并移除 setpwd 参数处理逻辑或对该参数进行严格的身份鉴权校验。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "CGI Script Center Subscribe Me Lite 未授权管理员密码修改漏洞"
updated = "2026-06-16T21:52:16.277"

