[basic]
description = "Aladdin eSafe Gateway 2.x 版本存在 HTML 脚本过滤绕过漏洞。远程攻击者可通过将 SCRIPT 标签嵌套嵌入其他 SCRIPT 标签内的特殊 HTML 标签排列方式，绕过网关的 HTML SCRIPT 过滤机制，导致恶意脚本代码被传递至目标用户浏览器执行。攻击者无需身份认证即可远程利用，成功利用后可窃取用户会话 Cookie、篡改网页内容或发起钓鱼攻击，影响机密性、完整性和可用性。该漏洞影响 Aladdin eSafe Gateway 2.x 及 3.0 版本。"
published = "2001-08-14T04:00:00.000"
remediation = "该产品已停止维护，建议立即升级至受支持的 Web 安全网关产品。如暂时无法替换，可在 eSafe Gateway 管理控制台中启用深度内容检测（Deep Content Inspection）功能，并在上游防火墙或反向代理层部署额外的 Web 应用过滤规则，拦截嵌套的 `<SCRIPT>` 标签模式。"
score = 7.5
severity = "HIGH"
sources = ["exploitdb"]
title = "Aladdin eSafe Gateway HTML标签脚本过滤绕过漏洞"
updated = "2026-06-16T21:54:27.230"

