[basic]
description = "蓝凌 EIS 智慧协同平台 DingUsers.aspx 页面存在 SQL 注入漏洞，攻击者可在未经认证的情况下，通过构造特制的 SQL 查询语句注入到后台数据库执行，导致数据库敏感信息泄露，包括用户凭证、系统配置等数据。该漏洞无需登录即可远程利用，攻击门槛低，危害较大。建议用户尽快升级至最新版本或部署 Web 应用防火墙进行防护。"
published = "0719"
remediation = "联系蓝凌官方服务专员获取 DingUsers.aspx SQL 注入安全补丁（通过 myekp.net 服务平台升级），对 DingUsers.aspx 的输入参数进行严格的参数化查询绑定与特殊字符过滤；临时缓解措施包括在 WAF 中拦截对该路径的 SQL 注入特征请求（如 UNION、SELECT 等关键字），并限制该页面仅允许可信 IP 访问。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "蓝凌 EIS 智慧协同平台 DingUsers.aspx SQL注入漏洞"
updated = "0719"

