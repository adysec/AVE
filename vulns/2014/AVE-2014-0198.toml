[basic]
description = "Microsoft Internet Explorer 6至11版本中存在一处释放后重用（Use-After-Free）漏洞，位于CMarkup::IsConnectedToPrimaryMarkup函数中。远程攻击者可通过构造特制网页诱导用户访问，触发已释放内存的非法访问，导致任意代码执行或拒绝服务。该漏洞在2014年4月已被野外利用，影响范围广泛。微软已发布安全更新修复，禁用VGX.DLL可作为临时缓解措施。"
published = "2014-04-27T10:55:03.340"
remediation = '立即安装 Microsoft 安全公告 MS14-021 提供的 Internet Explorer 累积安全更新 (KB2965111)。Windows 用户可通过 Windows Update 自动获取并安装此更新，也可从 Microsoft 下载中心手动下载对应 IE 版本的更新包。对于无法立即打补丁的系统，临时缓解措施包括：以管理员身份运行命令 `regsvr32.exe -u "%CommonProgramFiles%\Microsoft Shared\VGX\vgx.dll"` 注销 VGX.DLL 组件，或将 Internet 安全区域设置为"高"以阻止 ActiveX 控件和活动脚本运行。'
score = 9.8
severity = "CRITICAL"
sources = ["kev"]
title = "Microsoft Internet Explorer 释放后使用远程代码执行漏洞"
updated = "2026-06-17T00:05:32.593"

