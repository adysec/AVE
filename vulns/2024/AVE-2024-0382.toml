[basic]
title = "Microsoft Windows 远程桌面授权服务远程代码执行漏洞"
description = "Windows 远程桌面授权服务（Remote Desktop Licensing Service）存在堆缓冲区溢出漏洞（CWE-122），未经身份认证的远程攻击者可通过向 RDL 服务发送特制数据包触发堆溢出，导致远程代码执行。该漏洞影响 Windows Server 2008 SP2、2008 R2 SP1、2012、2012 R2、2016、2019、2022 及 23H2 版本，攻击无需用户交互，CVSS 3.1 评分 9.8，危害极为严重。"
severity = "CRITICAL"
score = 9.8
sources = ["cve", "nvd", "msrc"]
published = "2024-07-09"
updated = "2024-07-09"
remediation = "立即安装微软 2024 年 7 月安全更新（KB5040430 等对应各版本补丁），将 Windows Server 升级至修复版本。临时缓解措施：在防火墙中阻止 3389 端口的外部访问，如非业务必要可禁用 Remote Desktop Licensing 服务。"
