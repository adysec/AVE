[basic]
description = "该漏洞位于 Nortel Contivity 1.0 设备内置 HTTP 服务器的 cgiproc CGI 脚本中。该脚本在处理用户请求时未对 URL 中传入的 Shell 元字符（如分号、管道符、反引号等）进行充分过滤与转义，导致远程攻击者可在特制 URL 中植入元字符，使恶意输入被系统 shell 直接解析执行，造成拒绝服务、资源耗尽甚至远程命令执行。攻击者无需身份验证即可通过网络远程触发，影响所有运行 Nortel Contivity 1.0 HTTP 服务器的设备，严重威胁设备稳定性与安全性。"
published = "2000-01-17"
remediation = "建议升级到 Nortel Contivity 修复版本（1.0 后续补丁版本或更高），或联系 Nortel 获取该 CGI 漏洞的安全补丁。短期内可在前置防火墙上限制对 cgiproc CGI 脚本路径的访问，并部署入侵检测规则拦截包含 Shell 元字符的异常 URL 请求作为临时缓解措施。"
score = 5.0
severity = "MEDIUM"
sources = ["cve"]
title = "Nortel Contivity HTTP 服务器 cgiproc 命令注入拒绝服务漏洞"
updated = "2026-07-18"

