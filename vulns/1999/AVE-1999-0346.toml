[basic]
description = "VMware 1.0.1 for Linux 版本中存在缓冲区溢出漏洞，由于程序在处理 HOME 环境变量时未正确进行边界检查，本地攻击者可通过设置超长 HOME 环境变量触发缓冲区溢出，导致任意代码执行或以目标进程权限执行恶意操作。该漏洞危害等级高，CVSS 评分 7.2，攻击者需具有本地系统访问权限方可利用。"
published = "1999-06-26T04:00:00.000"
remediation = "建议立即升级至 VMware 2.0 及以上版本（该版本已修复 HOME 环境变量缓冲区溢出漏洞），或在启动脚本中对 `$HOME` 进行长度校验（限制不超过 256 字节），同时在 `/etc/security/limits.conf` 中为 vmware 用户设置 `ulimit -s 1024` 缩减栈空间以降低利用风险。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "VMware 1.0.1 本地缓冲区溢出漏洞"
updated = "2026-06-16T21:48:56.623"

