[basic]
description = "Lilikoi Ceilidh 2.60 存在路径信息泄露漏洞。远程攻击者可通过向目标服务器发送包含特制 translated_path 隐藏表单字段的 HTTP 请求，获取 Ceilidh 安装目录的真实物理路径。该漏洞可能导致攻击者进一步探测系统目录结构，为后续攻击收集信息，危害等级中危。"
published = "2000-06-08T04:00:00.000"
remediation = "Ceilidh 2.60 已停止维护，厂商不再发布安全更新。建议立即升级到不受影响的 Ceilidh 版本，或迁移至其他仍在维护的 CMS 平台。作为临时缓解措施，可在 Web 服务器层面（如 Apache/Nginx 配置）限制对 `translated_path` 参数的访问，或通过 URL 重写规则过滤含该参数的外部请求，同时监控 Web 日志中对此参数的异常访问。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Lilikoi Ceilidh 路径泄露漏洞"
updated = "2026-06-16T21:51:59.260"

