[basic]
description = "Linuxconf 1.1.6 r10 版本中存在远程缓冲区溢出漏洞，其处理用户请求参数的函数未对输入长度做边界校验。攻击者可在无需身份认证的情况下，向目标系统发送超长参数触发缓冲区溢出，覆盖返回地址并实现远程代码执行，从而获取 root 权限。该漏洞影响运行 Linuxconf 1.1.6 r10 的 Linux 系统，危害等级严重。"
published = "1999-12-21"
remediation = "升级 Linuxconf 至官方修复版本（1.1.6 r11 及以上），或暂停 Linuxconf 网络服务并限制其监听端口仅允许本地访问；无法立即升级时可通过防火墙规则封堵 Linuxconf 服务端口以缓解远程利用。"
score = 10.0
severity = "CRITICAL"
sources = [
    "exploitdb",
    "cve",
]
title = "Linux Linuxconf 远程缓冲区溢出漏洞"
updated = "2026-07-18"

