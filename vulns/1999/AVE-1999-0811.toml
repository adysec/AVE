[basic]
description = "SSH 服务器配置了 .rhosts 文件认证方式，允许基于主机信任关系的远程访问，而非强制要求密码或密钥认证。攻击者可通过伪造源 IP 地址或利用 DNS 欺骗绕过身份验证机制，在无需有效凭据的情况下直接获取目标系统的未授权远程访问权限。该漏洞影响大量未正确配置的 SSH 服务端，危害等级严重。建议禁用 .rhosts 认证方式，启用公钥或密码认证以消除此风险。"
published = "1999-01-01T05:00:00.000"
remediation = "禁用 SSH 的 rhosts 认证机制，在 sshd_config 中设置 IgnoreRhosts yes 和 RhostsAuthentication no，并升级至 OpenSSH 3.0 以上版本（默认已禁用）。同时删除用户家目录下的 .rhosts 和 .shosts 文件，避免被用于权限绕过。"
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "SSH .rhosts 文件认证漏洞"
updated = "2026-06-16T21:48:36.623"

