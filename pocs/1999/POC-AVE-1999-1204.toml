[info]
author = "ave"
description = "通过检查 /usr/ucb/ps 是否存在，验证 Solaris 8/9 系统是否存在本地信息泄露漏洞。该漏洞允许本地用户通过 -e 选项查看任意进程的环境变量。"
id = "POC-AVE-1999-1204"
name = "CVE-1999-1587 PoC"
severity = "low"
tags = ["ave-1999-1204"]
vuln_id = [
    "CVE-1999-1587",
    "AVE-1999-1204",
]

[poc]
logic = "all"

[[poc.requests]]
path = "/usr/ucb/ps"
protocol = "file"

[[poc.requests.matchers]]
expect = true
part = "body"
regex = "."
type = "regex"
