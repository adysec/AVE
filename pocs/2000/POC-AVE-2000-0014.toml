[info]
author = "ave"
description = "通过创建符号链接 /tmp/tftpd_xfer_status.log -> /.rhosts，利用 CascadeView TFTP 服务器以 root 权限写入日志时跟随符号链接，覆盖目标文件实现本地权限提升"
id = "POC-AVE-2000-0014"
name = "Ascend CascadeView/UX TFTP 符号链接本地权限提升 PoC"
severity = "medium"
tags = ["ave-2000-0014"]
vuln_id = [
    "CVE-2000-0015",
    "AVE-2000-0014",
]

[poc]
logic = "all"

[[poc.requests]]
path = "/tmp/tftpd_xfer_status.log"
protocol = "file"

[[poc.requests.matchers]]
expect = true
part = "body"
regex = "."
type = "regex"
