[info]
author = "ave"
description = "通过向目标 DNS 服务器发起 AXFR 区域传输请求，验证其是否未限制传输来源从而泄露整个区域的 DNS 记录。若服务器返回完整区域记录（多行包含 NS/A/MX 等资源记录），则确认存在 CVE-1999-0532 漏洞。"
id = "POC-AVE-1999-0798"
name = "CVE-1999-0532 DNS 区域传输未授权访问 PoC"
severity = "medium"
tags = ["ave-1999-0798"]
vuln_id = [
    "CVE-1999-0532",
    "AVE-1999-0798",
]

[poc]
logic = "all"

[[poc.requests]]
path = "{{Hostname}}"
protocol = "dns"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "NS",
    "SOA",
    "A",
    "MX",
]
