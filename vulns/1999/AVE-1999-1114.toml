[basic]
description = "thttpd HTTP 服务器 2.03 及更早版本中存在路径规范化缺陷，远程攻击者可通过向目标服务器发送包含多个连续前导斜杠（/）的特制 GET 请求，绕过文件访问限制，读取服务器上的任意文件，包括配置文件、源码等敏感信息。该漏洞攻击复杂度低，无需身份认证，影响范围广泛，可导致敏感信息泄露。"
published = "1999-12-31T05:00:00.000"
remediation = "升级至 thttpd 2.04 或更高版本（2.04 版本修复了文件名翻译中的路径遍历漏洞）。如无法立即升级，应在反向代理或 WAF 层面规范化 URL 路径，过滤多余斜杠字符，防止攻击者通过多个前导斜杠读取任意文件。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "ACME thttpd HTTP Server 任意文件读取漏洞"
updated = "2026-06-16T21:50:28.777"

