[info]
author = "ave"
description = "检测 Sun Java Web Server 2.0 及更早版本中默认安装的 bboard Servlet，攻击者可利用该 Servlet 通过 board.html 上传恶意 Java 代码，再直接调用 JSP 编译器 servlet 执行任意命令。"
id = "POC-AVE-2000-0763"
name = "Sun Java Web Server bboard Servlet Remote Code Execution PoC"
severity = "high"
tags = [
    "cve-2000-0629",
    "sun-java",
    "rce",
]
vuln_id = [
    "CVE-2000-0629",
    "AVE-2000-0763",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/servlet/sunexamples.BBoardServlet"
protocol = "http"

[poc.requests.body]
content = ""
type = "raw"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["BBoard"]
