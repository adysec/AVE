[basic]
description = 'glibc 的 glob 函数存在缓冲区溢出漏洞，攻击者可通过构造以左大括号 "{" 结尾的 glob 模式字符串触发缓冲区溢出，导致拒绝服务（程序崩溃）并可能执行任意代码。该漏洞影响使用受影响版本 glibc 的 Linux 发行版，包括 Debian Linux、Mandrake Linux、Red Hat Linux 等主流发行版。攻击条件为本地访问权限、低攻击复杂度、无需身份认证，攻击者可通过构造恶意 glob 模式触发漏洞，导致程序崩溃或在特定条件下实现任意代码执行，CVSS 评分 4.6（本地/低复杂度/无需认证/部分机密性/完整性/可用性影响）。Debian 已发布 DSA-103 安全公告修复该漏洞，Mandrake 发布 MDKSA-2001-095 补丁，Red Hat 亦发布相应安全更新。GitHub 等代码托管平台已收录相关 PoC 代码及 Nuclei 检测模板。'
published = "2001-12-21T05:00:00.000"
remediation = "升级 glibc 到包含修复的版本（如 glibc 2.2.4+，该版本修复了 2001 年 CVE-2001-0886 中的 glob 函数缓冲区溢漏洞）。如果使用较旧的系统(如 Red Hat Linux 7.0、Mandrake 8.x)，请立即应用相应的安全补丁。当前大多数现代 Linux 发行版（Debian 11+、Ubuntu 18.04+、CentOS 8+）均已包含修复。已修复且认可的系统无需额外缓解措施，但残留的系统应保持锁定的权限并限制网络访问 glob 函数的可执行程序。"
score = 4.6
severity = "MEDIUM"
sources = ["redhat"]
title = "GNU glibc glob 函数缓冲区溢出漏洞"
updated = "2026-06-16T21:55:09.583"

