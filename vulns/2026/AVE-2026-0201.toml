[basic]
description = "该平台的某个数据查询接口未对用户输入参数进行充分过滤和参数化查询处理，导致存在SQL注入漏洞。远程攻击者可通过向受影响接口发送特制请求，在无需身份认证的情况下注入恶意SQL语句，从而窃取后端数据库中的敏感信息，包括用户凭证、业务数据等。攻击复杂度低，无需特殊权限即可利用，危害较大。"
published = "2024-01-01"
remediation = "对所有用户输入参数实施参数化查询或预编译处理，避免拼接SQL语句；对输入内容进行严格的白名单校验和特殊字符过滤；限制数据库账户权限，遵循最小权限原则；在Web应用防火墙中添加SQL注入攻击特征拦截规则；定期进行代码安全审计和渗透测试。"
score = 6.5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "某综合管理平台存在SQL注入漏洞"
updated = "2024-06-01"

