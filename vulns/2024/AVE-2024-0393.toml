[basic]
description = "泛微云桥e-Bridge OA系统的体验账号程序接口/taste/addTaste处存在SQL注入漏洞，该接口的company、userName、openid、source、mobile等参数未经充分过滤直接拼接至SQL查询语句中。未经身份认证的远程攻击者可通过构造恶意的SQL注入载荷获取数据库中的敏感信息，包括管理员账号密码、企业业务数据等，严重影响企业数据安全与系统完整性。"
published = "2023-12-12"
remediation = "升级泛微云桥e-Bridge至最新版本（≥v9.5 20220113补丁版本），升级前应从官方渠道wx.weaver.com.cn下载安全更新包并完成部署，同时建议对/taste/addTaste接口进行访问控制或禁用非必要体验账号功能。"
score = 7.5
severity = "HIGH"
sources = ["hwpoc"]
title = "泛微云桥 e-Bridge addTaste接口SQL注入漏洞"
updated = "2023-12-12"

