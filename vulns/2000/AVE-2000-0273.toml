[basic]
description = "XFree86 3.3.x 的 -xkbmap 参数处理存在缓冲区溢出漏洞。本地攻击者可向该参数传递超长字符串触发缓冲区溢出，从而以目标系统当前用户权限执行任意代码。该漏洞影响 XFree86 3.3.x 系列版本，需本地访问权限，CVSS 评分 7.2，危害等级高。建议升级至不受影响的 XFree86 版本或应用厂商提供的补丁进行修复。"
published = "2000-04-16T04:00:00.000"
remediation = "升级 XFree86 至 4.0 及以上版本，该版本已修复 xkbmap 参数长度检查不足的问题。由于 XFree86 已停止维护，建议迁移至 X.Org Server（X11R7.x 系列）。临时缓解措施：限制本地用户登录权限，仅允许可信用户访问图形界面。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "XFree86 X11R6 缓冲区溢出代码执行漏洞"
updated = "2026-06-16T21:51:23.867"

