[basic]
description = "Apple Mac OS 8.6 操作系统存在弱密码加密漏洞，用户与组数据文件（Users & Groups Data File）中存储的密码采用强度不足的加密算法进行保护。攻击者若获取该数据文件，可通过暴力破解或密码分析手段轻松还原用户明文密码，从而获得系统访问权限。该漏洞影响所有使用 Mac OS 8.6 版本的系统，攻击条件为本地访问或文件窃取，无需远程利用即可导致凭据泄露。"
published = "1999-07-10T04:00:00.000"
remediation = "将 Mac OS 8.x 系统升级至受支持的现代 macOS 版本（macOS 14 Sonoma 或更高），现代系统使用 SHA-256 等强加密算法存储用户凭据。如因遗留应用必须保留旧系统，应将设备完全隔离于独立网络，禁止联网访问，仅允许经授权的可信物理接触，并通过 OpenFirmware 密码保护固件启动以防未授权访问磁盘数据。"
score = 4.6
severity = "MEDIUM"
sources = ["cve"]
title = "Apple Mac OS 8 弱密码加密漏洞"
updated = "2026-06-16T21:50:40.950"

