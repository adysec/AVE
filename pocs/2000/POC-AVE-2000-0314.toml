[info]
author = "AVE"
description = "验证 NetBSD 1.3.3 及 Linux 系统中 traceroute 是否允许本地低权限用户修改数据包源地址。受影响系统上，普通用户可通过 traceroute -s 选项伪造 IP 源地址，绕过基于 IP 的访问控制或隐藏攻击来源。"
id = "POC-AVE-2000-0314"
name = "CVE-2000-0315 PoC"
severity = "medium"
tags = ["cve-2000-0315"]
vuln_id = [
    "CVE-2000-0315",
    "AVE-2000-0314",
]

[poc]
logic = "any"

[[poc.requests]]
path = "/usr/sbin/traceroute"
protocol = "file"

[[poc.requests.matchers]]
expect = true
part = "body"
regex = ".+"
type = "regex"

[[poc.requests]]
path = "/usr/bin/traceroute"
protocol = "file"

[[poc.requests.matchers]]
expect = true
part = "body"
regex = ".+"
type = "regex"

[[poc.requests]]
path = "/bin/traceroute"
protocol = "file"

[[poc.requests.matchers]]
expect = true
part = "body"
regex = ".+"
type = "regex"

[[poc.requests]]
path = "/usr/local/bin/traceroute"
protocol = "file"

[[poc.requests.matchers]]
expect = true
part = "body"
regex = ".+"
type = "regex"
