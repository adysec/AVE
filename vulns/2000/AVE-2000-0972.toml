[basic]
description = "FreeBSD 操作系统中 eject 命令存在多个缓冲区溢出漏洞，eject 是用于弹出光盘、软盘等可移动介质的系统实用工具。由于程序在解析命令行参数及处理设备路径时未对缓冲区长度进行严格校验，本地已登录用户可通过传递超长或构造畸形的参数触发缓冲区溢出。成功利用该漏洞可导致在受影响系统上执行任意代码，由于 eject 通常以 root 权限运行，攻击者借此可直接获取系统最高权限。该漏洞影响 FreeBSD 及存在相同代码的其他类 Unix 操作系统，需要攻击者拥有本地用户访问权限方可利用，成功利用后将完全危及系统的机密性、完整性和可用性。"
published = "2000-11-14T05:00:00.000"
remediation = "根据 FreeBSD 安全公告 FreeBSD-SA-00:49，建议升级 eject port/package 至修复后的 1.4 版本（2000-08-21 之后编译的包），或重新从 ports 构建该端口。具体操作：若已安装 eject port，可通过 ports 方式 cd /usr/ports/sysutils/eject 执行 make clean && make reinstall 重新编译安装；或直接从官方 FTP 下载修复后的安装包进行升级。如暂无法立即升级，可临时去除 /usr/local/sbin/eject 的 setuid 位权限（执行 chmod u-s /usr/local/sbin/eject）或将其限制为仅受信任的用户组可执行，以降低本地用户提权风险。同时建议检查系统是否有非预期的 eject 安装，如无需使用可直接卸载该端口。"
score = 7.2
severity = "HIGH"
sources = ["cve"]
title = "FreeBSD eject 本地缓冲区溢出漏洞"
updated = "2026-06-16T21:52:36.143"

