[basic]
description = "Compaq Microcom 6000 Access Integrator 存在会话超时机制缺失漏洞。该设备在提示输入用户名或密码后未设置会话超时限制，远程攻击者可通过建立连接但不提供任何认证凭据的方式，长期占用会话资源，导致设备无法处理合法用户的认证请求，从而引发拒绝服务。该漏洞影响 Compaq Microcom 6000 系列设备，CVSS 评分 5.0，危害等级中等。"
published = "1998-06-03T04:00:00.000"
remediation = "该产品已停止支持，无官方补丁可用。建议在网络边界防火墙或 ACL 中限制对 Microcom 6000 管理端口的访问，仅允许受信 IP 连接；同时在设备配置中启用连接超时参数（如 idle-timeout），限制未认证连接的持续时间；或迁移至受支持的替代产品彻底消除风险。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Compaq Microcom 6000 Access Integrator 会话超时未设置导致远程拒绝服务漏洞"
updated = "2026-06-16T21:49:49.783"

