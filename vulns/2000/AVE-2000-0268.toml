[basic]
description = "Napster 客户端 beta 5 版本存在缓冲区溢出漏洞，远程攻击者可通过向目标 Napster 客户端发送超长消息触发缓冲区溢出，导致客户端进程崩溃拒绝服务。该漏洞影响 Napster 客户端 beta 5 版本，攻击难度低，无需身份认证即可远程利用。CVSS 评分 2.1，危害等级低，建议用户升级至更高版本避免风险。"
published = "2000-03-26T05:00:00.000"
remediation = "Napster 客户端 beta 5 已于 2001 年随 Napster 服务关闭而停止维护，官方未发布任何安全补丁。建议立即停止使用 Napster 客户端 beta 5，卸载该软件并迁移至其他现代音乐流媒体服务。如因兼容性原因必须使用，应在防火墙或主机层面限制该程序的出站网络连接，阻止其接收外部消息以降低攻击面。"
score = 2.1
severity = "LOW"
sources = ["avd"]
title = "Napster Napster Client 缓冲区溢出拒绝服务漏洞"
updated = "2026-06-16T21:51:23.380"

