[basic]
description = "HP-UX 11.X 及 10.X 系统中的 shutdown 命令存在输入验证缺陷，本地攻击者可通过向该命令传递特制的畸形输入变量触发漏洞，导致权限提升至 root 级别。该漏洞影响 HP-UX 操作系统的多个版本，攻击者需拥有本地系统访问权限方可利用，CVSS 评分 4.6，危害等级中危。HP 已发布安全公告和补丁修复此漏洞。"
published = "2000-05-04T04:00:00.000"
remediation = "安装 HP 安全公告 HPSBUX0005-114 中提供的 shutdown 命令补丁。如无法立即打补丁，可执行 `chmod 555 /sbin/shutdown` 移除 shutdown 的 setuid root 权限，仅允许 root 用户执行，作为临时缓解措施。同时建议将系统升级至 HP-UX 11.11 或更高版本，后续版本已修复该输入验证缺陷。"
score = 4.6
severity = "MEDIUM"
sources = ["cve"]
title = "HP HP-UX shutdown 命令本地权限提升漏洞"
updated = "2026-06-16T21:51:39.947"

