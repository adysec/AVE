[basic]
description = "vqSoft vqServer 1.4.49 存在缓冲区溢出漏洞，远程攻击者可通过向目标服务器发送超长的 HTTP GET 请求触发该漏洞，导致服务器进程崩溃从而引发拒绝服务，在特定条件下可能实现任意代码执行。该漏洞影响 vqServer 1.4.49 版本，CVSS 评分 7.5，危害等级高。"
published = "2000-10-20T04:00:00.000"
remediation = "升级 vqServer 至不受影响的版本（如有），或迁移至现代 Web 服务器（如 Apache/Nginx）替代。若无法升级，在反向代理或防火墙层限制 HTTP GET 请求 URI 长度（建议不超过 1024 字节），以阻止超长请求触发的缓冲区溢出。如无业务必要，建议禁用或下线该服务。"
score = 7.5
severity = "HIGH"
sources = ["exploitdb"]
title = "vqSoft vqServer 1.4.49 缓冲区溢出拒绝服务漏洞"
updated = "2026-06-16T21:52:26.197"

