[basic]
description = "金蝶云星空 ERP 系统的 SRM 模块 ScpSupRegHandler 接口在处理 multipart 文件上传时未对上传文件名与路径做有效校验，攻击者可构造包含目录穿越序列（../../）的 filename 将恶意 ASP/JSP 脚本写入 uploadfiles 等 Web 可访问目录，随后通过访问该文件实现远程代码执行。需能够访问目标 /k3cloud/SRM/ScpSupRegHandler 接口且无需身份认证即可利用。"
published = "2024-01-01"
remediation = "在 ScpSupRegHandler 接口中增加上传文件类型白名单与文件名合法性校验，禁止目录穿越字符与可执行脚本后缀；升级金蝶云星空至官方发布的安全补丁版本，并在前置反向代理处限制对 /k3cloud/SRM/ 路径的匿名访问。"
score = 9.8
severity = "HIGH"
sources = ["hwpoc"]
title = "金蝶云星空 ScpSupRegHandler 任意文件上传漏洞"
updated = "2026-07-19"

