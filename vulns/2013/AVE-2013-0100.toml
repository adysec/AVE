[basic]
description = "Adobe Reader 和 Acrobat 存在缓冲区溢出漏洞，攻击者可构造特制的 PDF 文档并诱使用户打开，触发缓冲区溢出，从而在目标系统上执行任意代码。该漏洞影响 Adobe Reader/Acrobat 9.5.4 之前版本、10.1.6 之前版本及 11.0.02 之前版本，已在 2013 年 2 月被检测到在野利用。攻击者无需身份认证，仅需用户通过邮件或网页等方式打开恶意 PDF 文件即可触发，危害严重。"
published = "2013-02-14T01:55:02.070"
remediation = '立即升级 Adobe Reader/Acrobat 至 9.5.4、10.1.6 或 11.0.02 及以上版本（对应 APSB13-15 安全公告）。如无法升级，在 Adobe Reader 中启用保护模式（沙箱）并禁用 JavaScript 执行（编辑→首选项→JavaScript→取消勾选"启用 Acrobat JavaScript"），同时建议使用组策略禁用 PDF 内嵌对象的自动解析功能。对于企业环境，可通过 Adobe 自定义部署工具批量推送更新。'
score = 7.8
severity = "HIGH"
sources = ["kev"]
title = "Adobe Acrobat Reader 远程代码执行漏洞"
updated = "2026-06-16T23:49:49.270"

