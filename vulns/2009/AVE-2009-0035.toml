[basic]
description = "OpenOffice.org 在 3.2 版本之前的 filter.vcl/lgif/decode.cxx 中 GIFLZWDecompressor::GIFLZWDecompressor 函数存在堆缓冲区溢出漏洞，攻击者可通过精心构造的恶意 GIF 文件，利用 LZW 解压缩过程中的边界检查缺陷触发堆缓冲区溢出。该漏洞影响 OpenOffice.org 3.2 之前的所有版本，CVSS 评分 9.3（AV:N/AC:M/Au:N/C:C/I:C/A:C），属于高危漏洞。攻击条件为：攻击者需诱导受害者打开或处理恶意制作的 GIF 文件，攻击复杂度中等，无需身份认证，攻击向量为网络（需用户交互）。利用方式为：攻击者构造畸形的 GIF 文件，在 LZW 解压阶段触发堆缓冲区溢出，导致应用程序崩溃造成拒绝服务，或精心构造载荷实现任意代码执行，完全控制受害系统。该漏洞属于 CWE-787 越界写入类型，OpenOffice.org 3.2 版本已修复此漏洞。"
published = "2010-02-16T19:30:00.423"
remediation = '立即升级OpenOffice到3.2或更高版本，该版本修复了libxml2、libxmlsec等库的安全漏洞，并增强了GIF文件处理的安全校验。如果无法立即升级，可暂时禁用Office的GIF预览功能，并通过集团防火墙过滤 "*.gif" 类型的文件entrada sospechosa，降低被利用风险。'
score = 9.3
severity = "CRITICAL"
sources = ["tenable"]
title = "OpenOffice.org GIF 文件解析缓冲区溢出代码执行漏洞"
updated = "2026-06-16T23:10:33.827"

