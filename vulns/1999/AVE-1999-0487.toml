[basic]
description = "思科 IOS 系统中的 AAA（认证、授权、审计）身份验证机制存在授权绕过漏洞，远程攻击者可在未获得有效凭证的情况下绕过身份验证，直接执行系统命令，完全控制受影响设备。该漏洞影响大量思科路由器和交换机等网络设备，CVSS 评分 7.5，危害等级高。厂商已发布安全公告建议升级系统或配置访问控制列表缓解风险。"
published = "1998-01-01T05:00:00.000"
remediation = "升级 Cisco IOS 至 11.2(10) 及以上版本，该版本修复了 AAA 认证过程中未正确校验权限的问题。同时配置 TACACS+ 或 RADIUS 服务器进行集中认证，并在路由器上使用 aaa new-model 启用新版 AAA 认证框架，配合 local 或 group tacacs+ 作为后备认证方法，避免仅依赖 enable password 认证。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "Cisco IOS AAA 认证未授权命令执行漏洞"
updated = "2026-06-16T21:48:05.380"

