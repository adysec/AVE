[basic]
description = 'AOLserver 3.2 及更早版本的 Windows 版本存在目录遍历漏洞。远程攻击者可通过在请求路径中插入 "..." 特殊字符序列（即变形后的目录跳转攻击）绕过路径限制，实现任意文件读取。该漏洞利用无需身份认证，攻击者仅需向目标服务器发送特制的 HTTP 请求即可读取服务器上的敏感文件，如配置文件或系统文件。CVSS 评分 5.0，危害等级中危。'
published = "2001-05-03T04:00:00.000"
remediation = '升级 AOLserver 至 3.3 或更高版本，该版本修复了路径遍历过滤逻辑。若无法升级，在 Web 服务器前部署反向代理，对请求路径中的连续点号进行拦截过滤，防止攻击者通过 "..." 等变形语法绕过目录遍历防护。'
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "AOL AOLserver 3.2 目录遍历漏洞"
updated = "2026-06-16T21:53:52.763"

