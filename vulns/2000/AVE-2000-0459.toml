[basic]
description = "OpenBSD ftpd、NetBSD ftpd、ProFTPd 及 Opieftpd 等 FTP 服务器未对 setproctitle 函数中使用的不可信格式字符串进行正确过滤，存在格式化字符串漏洞。远程攻击者可通过向目标 FTP 服务发送特制的格式字符串参数触发该漏洞，导致拒绝服务或执行任意命令。该漏洞影响多种主流 FTP 服务器实现，危害等级中危，CVSS 评分 5.0。"
published = "2000-07-07T04:00:00.000"
remediation = "OpenBSD 用户应升级至 2.7 或更高版本，或应用 ftpd 补丁；NetBSD 用户应升级至 1.4.2 以上版本，或参考 NetBSD-SA2000-009 安装 ftpd 补丁；ProFTPd 用户应升级至 1.2.0rc2 或更高版本。如无法立即升级，可在 inetd 配置中禁用 FTP 服务，或在防火墙层面限制对 FTP 端口（21）的访问作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "OpenBSD ftpd 格式化字符串远程代码执行漏洞"
updated = "2026-06-16T21:52:01.777"

