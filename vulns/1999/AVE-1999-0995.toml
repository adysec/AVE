[basic]
description = "Linux 2.0.37 内核在处理自定义分段限制时存在编码缺陷，无法正确验证用户空间的段限制值，导致本地攻击者可以绕过权限验证访问内核内存区域。通过精心构造的分段寄存器操作，攻击者可以劫持内核控制流并执行任意代码，最终获得系统的完整控制权。该漏洞仅需本地访问权限即可触发，对系统完整性构成严重威胁，特别是在共享CPU环境或虚拟化容器中风险更高。"
published = "1999-07-11T04:00:00.000"
remediation = "升级至 Linux Kernel 2.2.x 或更高版本，该漏洞已在后续内核版本中修复。如无法升级内核，可通过 grsecurity/PaX 等内核加固补丁限制本地用户访问内核内存空间作为临时缓解措施。"
score = 7.2
severity = "HIGH"
sources = ["exploitdb"]
title = "Linux Kernel 2.0.37 Segment Limit 权限提升漏洞"
updated = "2026-06-16T21:49:51.663"

