[basic]
description = "Windows NT RSH 服务 (RSHSVC) 存在访问控制绕过漏洞，由于服务未能正确验证 .Rhosts 文件中指定的主机级访问规则，当攻击者从已授权主机发起连接时，可绕过认证机制以其他合法用户身份登录目标系统，获取非授权访问权限。该漏洞影响 Windows NT 3.5 至 4.0 版本，CVSS 评分 7.5，危害等级高危，无需用户交互即可远程利用。"
published = "1999-12-31T05:00:00.000"
remediation = "升级至受支持的 Windows Server 版本（如 Windows Server 2019/2022 或更高版本），因 Windows NT 4.0 已停止支持且 KB158320 补丁不可获取。若无法立即升级，应禁用 RSH 服务（RSHSVC），改用以 SSH 作为远程管理替代方案，并在网络防火墙层面封禁 RSH 端口（514/tcp、544/tcp、514/udp）以阻断外部访问。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "Microsoft Windows NT RSH 访问控制漏洞"
updated = "2026-06-16T21:50:28.633"

