[basic]
description = "Adobe Reader 和 Acrobat 的 FlateDecode Stream Predictor 02 组件存在堆缓冲区溢出漏洞，攻击者可通过构造特制的 PDF 文件诱使用户打开，触发内存损坏，最终导致远程代码执行。该漏洞影响 Adobe Reader/Acrobat 7.x（低于 7.1.4）、8.x（低于 8.1.7）及 9.x（低于 9.2）版本，CVSS 评分 8.8，危害等级高危。2009 年 10 月已发现在野利用，Metasploit 框架拥有公开利用模块，攻击者无须身份认证即可远程触发。"
published = "2009-10-13T10:30:00.577"
remediation = "升级 Adobe Reader/Acrobat 至 9.2 及以上版本（7.x 升级至 7.1.4，8.x 升级至 8.1.7），禁用浏览器 PDF 插件自动打开功能，在 PDF 阅读器设置中关闭 JavaScript 执行，并部署组策略限制 PDF 文件来源以降低攻击面。"
score = 8.8
severity = "HIGH"
sources = ["kev"]
title = "Adobe Reader 与 Acrobat 堆缓冲区溢出远程代码执行漏洞"
updated = "2026-06-16T23:11:38.727"

