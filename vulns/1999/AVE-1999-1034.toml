[basic]
description = "Cray UNICOS 6.0 和 6.1 版本中的 accton 工具存在任意文件读取漏洞。本地攻击者利用该工具对系统记账配置文件的处理缺陷，可读取系统上任意文件内容，同时可修改系统记账配置，导致敏感信息泄露和系统审计功能异常。该漏洞需要本地用户权限才能利用，攻击复杂度较低，影响范围限于 Cray UNICOS 特定版本。"
published = "1999-12-31T05:00:00.000"
remediation = "升级到 Cray UNICOS 6.2 及以上版本，该版本已修复 accton 命令的权限检查缺陷。如无法升级，可移除 accton 的 setuid 位（chmod u-s /usr/sbin/accton）以消除本地提权与任意文件读取风险，但会牺牲记账功能。作为替代方案，限制可登录系统的用户范围，仅授予可信用户 shell 访问权限。"
score = 3.6
severity = "LOW"
sources = ["cve"]
title = "Cray UNICOS 任意文件读取漏洞"
updated = "2026-06-16T21:50:08.807"

