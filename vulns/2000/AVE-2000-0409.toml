[basic]
description = "MySQL 3.22 及之前版本存在身份认证绕过漏洞，远程攻击者无需有效凭证即可通过向 MySQL 服务发送特制的短校验字符串绕过密码验证，直接访问目标数据库。该漏洞源于 MySQL 对认证数据包校验长度的处理缺陷，攻击者利用此漏洞可获取数据库的未授权访问权限，导致敏感数据泄露或数据篡改。该漏洞影响所有 MySQL 3.22 系列版本，危害等级高。"
published = "2000-02-08T05:00:00.000"
remediation = "升级 MySQL 至 3.23 及以上版本，该漏洞已在 3.23.x 系列中修复；对于仍在运行的遗留系统，建议升级至当前仍受支持的 MySQL 5.7 或 8.0 版本。如无法升级，可在 my.cnf 中设置 `old_passwords=1` 并限制数据库远程访问来源 IP。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "MySQL MySQL 3.22 密码认证绕过漏洞"
updated = "2026-06-16T21:51:06.007"

