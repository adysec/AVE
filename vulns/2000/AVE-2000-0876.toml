[basic]
description = "go-gnome Helix GNOME 预安装器存在任意文件写入漏洞。本地攻击者可通过在 /tmp 目录下对 uudecode、snarf 及部分安装程序文件实施符号链接攻击，诱使预安装器以提升的权限覆写系统任意文件，导致权限提升或系统文件破坏。该漏洞影响使用 go-gnome 预安装器的 GNOME 环境，CVSS 评分 6.2，危害等级中危。建议用户升级至修复版本或手动加固 /tmp 目录权限。"
published = "2000-10-20T04:00:00.000"
remediation = "删除 go-gnome 软件包（该软件已多年无人维护），改用系统自带包管理器（如 apt/yum）安装 GNOME。如需保留使用，必须修改源码将 /tmp 下所有临时文件（uudecode、snarf 等）改用 mkstemp 创建随机文件名，并在创建前取消设置危险 umask 值。临时缓解措施：以非特权用户运行安装程序，避免 root 提权风险。"
score = 6.2
severity = "MEDIUM"
sources = ["cve"]
title = "Helix GNOME go-gnome Pre-installer 符号链接攻击任意文件写入漏洞"
updated = "2026-06-16T21:52:20.903"

