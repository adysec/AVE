[basic]
description = "Cobalt RaQ 2.0 和 RaQ 3i 服务器中集成的 cgiwrap 程序存在权限管理缺陷，未能正确验证运行特定 CGI 脚本的用户身份。同一系统中的恶意站点管理员可借此漏洞越权访问并查看或修改其他虚拟站点的数据，导致敏感信息泄露或数据篡改。该漏洞攻击复杂度较低，CVSS 评分为 3.6，危害等级低。"
published = "1999-11-08T05:00:00.000"
remediation = "该产品已停止维护，Cobalt Networks 已被收购并终止 RaQ 系列支持。建议立即迁移至受支持的现代 Web 服务器平台（如 Apache/Nginx），迁移前可通过以下措施缓解：在 cgiwrap 配置中将虚拟站点隔离为独立系统用户，并严格限制 CGI 脚本的执行权限，确保每个虚拟站点无法访问其他站点的文件系统路径。"
score = 3.6
severity = "LOW"
sources = ["avd"]
title = "Cobalt RaQ cgiwrap 跨站脚本漏洞"
updated = "2026-06-16T21:50:38.337"

