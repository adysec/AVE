[basic]
description = "Sun Solaris 操作系统中的 dtprintinfo 打印信息管理程序存在缓冲区溢出漏洞。该程序通常以 setuid root 权限运行，本地攻击者可通过向程序传入超长参数或环境变量触发栈缓冲区溢出，覆盖返回地址并执行任意代码，从而将本地普通用户权限提升至 root 权限，完全控制受影响系统。攻击条件为攻击者已获得本地账户访问权限。"
published = "1999-05-10"
remediation = "安装 Sun 官方针对 dtprintinfo 缓冲区溢出发布的安全补丁；在补丁未部署前，可移除 dtprintinfo 程序的 setuid 位以降低本地提权风险，并严格限制本地用户账户的分配。"
score = 7.2
severity = "HIGH"
sources = ["cve"]
title = "Sun Solaris dtprintinfo 程序缓冲区溢出漏洞"
updated = "1999-05-10"

