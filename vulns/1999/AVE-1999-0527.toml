[basic]
description = "Solaris 2.4 系统中的 /bin/fdformat 命令存在本地缓冲区溢出漏洞。由于该命令在处理用户输入时未对缓冲区边界进行有效检查，本地攻击者可通过向 fdformat 程序提交特制的参数触发缓冲区溢出，从而覆盖进程内存空间并执行任意代码。成功利用此漏洞可使普通用户获得 root 权限，完全控制受影响的系统。该漏洞需要攻击者拥有本地系统访问权限，无法远程利用。"
published = "1997-04-01T05:00:00.000"
remediation = "安装 Sun 针对此漏洞发布的安全补丁（对应 Sun Security Bulletin #138），或升级到 Solaris 2.5.1 及以上版本。如无法升级，立即执行 `chmod 0755 /bin/fdformat` 移除 fdformat 的 setuid root 权限位，阻止普通用户以 root 权限执行该程序。同时限制可访问 fdformat 的用户组，仅授权管理员使用。"
score = 7.2
severity = "HIGH"
sources = ["exploitdb"]
title = "Sun Solaris 2.4 /bin/fdformat 本地缓冲区溢出漏洞"
updated = "2026-06-16T21:48:08.140"

