[basic]
description = "ICQ ActiveList Server 存在拒绝服务漏洞，远程攻击者可通过向服务器 UDP 端口发送特制的畸形数据包，导致服务器进程崩溃，无法正常提供服务。该漏洞源于对 UDP 数据包处理时缺少有效的输入验证，攻击者无需身份认证即可利用，影响运行 ICQ ActiveList Server 的系统。"
published = "1999-10-17T04:00:00.000"
remediation = "建议升级至 ICQ 99a 或更高版本以修复该漏洞，旧版 ICQ ActiveList Server 对畸形 UDP 数据包缺乏正确校验。如无法升级，建议在防火墙上阻断 UDP 端口 4000 入站流量，限制外部来源对 ActiveList 服务的访问作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "ICQ ActiveList Server UDP数据包处理拒绝服务漏洞"
updated = "2026-06-16T21:50:14.200"

