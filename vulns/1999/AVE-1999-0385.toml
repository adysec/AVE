[basic]
description = "FTP 协议中 CWD（Change Working Directory）命令存在信息泄露漏洞，远程攻击者可向 FTP 服务器发送特制的 `quote cwd` 命令，服务器响应中会泄露 FTP 用户主目录的完整绝对路径。该漏洞允许攻击者获取服务器文件系统目录结构信息，为后续路径遍历或文件获取等攻击提供信息支撑，影响多种主流 FTP 服务器软件实现，CVSS 评分为 6.4，危害等级中等。"
published = "1997-01-01T05:00:00.000"
remediation = "升级 FTP 服务器软件至最新版本，或应用厂商针对此漏洞发布的安全补丁。配置 FTP 服务器启用 chroot 功能将用户限制在其主目录内，禁止匿名用户执行 CWD 命令，并禁用不必要的 FTP 命令以减少信息泄露风险。"
score = 6.4
severity = "MEDIUM"
sources = ["avd"]
title = "FTP服务器 quote cwd 命令路径信息泄露漏洞"
updated = "2026-06-16T21:47:53.990"

