[basic]
description = "Windows NT 在启用 SYSKEY 功能后，对 SAM 数据库中的密码哈希进行加密时错误地重用了同一密钥流（keystream），而非为每个加密操作生成独立的随机密钥流。攻击者若能够访问存储在磁盘或内存中的加密 SAM 密码哈希，可利用已知明文攻击手段还原出加密所用的密钥流并据此破解用户密码，进而获取系统账号权限。该漏洞影响启用 SYSKEY 的 Windows NT 系统，攻击前提是需要本地或远程（如通过备份文件、注册表导出）获取到加密后的 SAM 数据库，属于本地信息泄露与密码破解类风险，CVSS 评分约为 5.0，危害等级中等。"
published = "1999-12-16T05:00:00.000"
remediation = "建议立即更新到 Windows Server 2003 SP1 或更高版本以获得完整的修复，或升级到 Windows XP Pro with SP2，这些版本修正了 SYSKEY 密钥流重用漏洞。如无法立即更新 Windows，可禁用 SYSKEY 功能并同时在域控制器上启用强制密码加密，短期内可以通过网络策略禁止明文密码存储并强制实施复杂密码策略来降低风险。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Microsoft Windows NT SYSKEY 密钥流重用导致密码破解漏洞"
updated = "2026-06-16T21:49:28.960"

