[basic]
description = "维达外贸客户关系管理系统的 /wap/common/sendmailview.jsp 接口存在 SQL 注入漏洞，攻击者无需身份认证即可通过构造特制的 commonid 参数注入恶意 SQL 语句，利用 WAITFOR DELAY 等时间盲注技术可逐字窃取数据库中的敏感信息，包括用户凭证、客户资料及业务数据。该漏洞影响系统所有版本，攻击条件低，仅需目标系统开放 Web 服务即可远程利用。"
published = "0723"
remediation = "联系维达软件厂商获取安全补丁，对 sendmailview.jsp 中 commonid 参数实施预编译 SQL 语句或参数化查询，严格限制输入类型为数字。临时缓解措施可在 Web 应用防火墙（WAF）侧配置规则拦截 WAITFOR DELAY 等 SQL 注入特征 payload。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "维达 外贸客户关系管理系统 sendmailview.jsp SQL注入漏洞"
updated = "0723"

