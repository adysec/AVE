[basic]
description = "Ruby on Rails 的隐式渲染（implicit render）功能中存在目录遍历漏洞，当启用特定路由通配（route globbing）配置时，远程攻击者无需身份认证即可通过发送特制请求，利用 actionpack/lib/abstract_controller/base.rb 中的路径遍历缺陷读取服务器上的任意文件。该漏洞影响 Rails 3.2.18 之前版本、4.0.5 之前版本及 4.1.1 之前版本，CVSS 评分 7.5，危害等级高，可导致敏感信息泄露。"
published = "2014-05-07T10:55:04.133"
remediation = "升级 Rails 至 3.2.18 / 4.0.5 / 4.1.1 及以上版本。如无法立即升级，在路由配置中禁用 globbing 通配符匹配（如 `*path` 格式的路由），并限制控制器隐式渲染的模板路径白名单，避免未授权文件读取。"
score = 7.5
severity = "HIGH"
sources = ["kev"]
title = "Ruby on Rails 隐式渲染功能目录遍历漏洞"
updated = "2026-06-17T00:02:21.133"

