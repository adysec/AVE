[basic]
description = "alt-n WorldClient 2.1 的 WDaemon Web 服务器存在目录遍历漏洞。远程攻击者无需身份认证即可通过向 URL 路径中注入 ../（点点斜杠）序列，绕过访问限制，读取服务器上任意文件，包括系统配置文件、密码文件等敏感信息。该漏洞影响 WorldClient standard 2.1 版本，CVSS 评分 5.0，危害等级中危。建议用户升级至更高版本或部署 Web 应用防火墙进行防护。"
published = "2000-07-12T04:00:00.000"
remediation = '立即升级 WorldClient 至 2.1.1 及以上版本，该版本修复了 WDaemon 组件对 `..` 目录遍历序列的过滤缺陷。如无法升级，可在 Web 服务器或反向代理层面配置规则，拦截包含 `../` 或 `..\` 的 URL 请求路径，限制 WDaemon 仅允许访问 Web 根目录内的文件。'
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "alt-n WorldClient standard 2.1 目录遍历漏洞"
updated = "2026-06-16T21:52:12.680"

