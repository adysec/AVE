[basic]
description = "CDE（Common Desktop Environment）中的 dtspcd 守护进程存在符号链接攻击漏洞。本地攻击者可通过在临时目录中创建恶意符号链接，诱使 dtspcd 进程以高权限执行任意命令，从而实现本地权限提升。该漏洞影响 Solaris 7.0 及 CDE 2.1.20 等版本，攻击者需拥有本地系统访问权限，利用难度较低，危害等级高。厂商已发布相关安全更新修复此问题。"
published = "1999-09-13T04:00:00.000"
remediation = '安装 Sun Security Bulletin #192 提供的补丁程序（Solaris 7 SPARC 补丁 107018-xx，x86 补丁 107019-xx），或升级至 Solaris 8 及以上版本。如无法打补丁，可在 /etc/inetd.conf 中注释掉 "dtspc" 行后重启 inetd 进程以禁用 dtspcd 服务，或限制对 dtspcd 的本地访问权限。'
score = 7.2
severity = "HIGH"
sources = ["exploitdb"]
title = "Sun CDE dtspcd 本地权限提升漏洞"
updated = "2026-06-16T21:48:51.173"

