[basic]
description = "Apache Tomcat 示例应用 (examples web application) 中的多个 JSP 文件存在跨站脚本 (XSS) 漏洞，远程攻击者通过在 URI 中 ';' 字符之后的部分注入任意 Web 脚本或 HTML 代码触发该漏洞，导致恶意脚本在受害者浏览器中执行，可窃取 Cookie 或篡改页面内容。该漏洞影响 Tomcat 4.0.0 至 6.0.13 的多个版本系列，CVSS 评分 4.3，危害等级中危。建议删除示例应用目录或升级至修复版本。"
published = "2007-06-14T23:30:00.000"
remediation = "升级 Apache Tomcat 至 5.5.25 及以上版本，或 6.0.14 及以上版本。如无法立即升级，可将 webapps 目录下的 examples 目录删除或重命名，禁用示例 Web 应用。生产环境应始终移除 examples 应用，避免部署在对外服务中。"
score = 4.3
severity = "MEDIUM"
sources = ["nuclei"]
title = "Apache Tomcat 跨站脚本攻击漏洞"
updated = "2026-06-16T22:39:37.433"

