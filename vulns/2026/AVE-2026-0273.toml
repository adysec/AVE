[basic]
description = "Decidim 平台的人口统计问卷管理编辑器存在授权缺失漏洞。/admin/demographics/questions 路由未对调用者进行管理员权限校验，已登录的普通参与者可直接访问管理界面并修改问卷内容。攻击者只需拥有普通用户账号即可利用此漏洞，无需管理员权限，可导致问卷数据被未授权篡改，影响平台数据完整性与管理安全。"
published = "2026-07-13"
remediation = "升级至 Decidim 0.32.0 或 0.31.5 及以上版本，这两个版本已在 PR #16665 中修复 /admin/demographics/questions 路由缺少管理员权限校验的问题。如无法立即升级，可禁用 decidim-demographics 模块，或在 Nginx 反向代理层限制该路径的访问。"
score = 5.4
severity = "MEDIUM"
sources = ["ghsa"]
title = "Decidim 人口统计问卷管理编辑器授权缺失漏洞"
updated = "2026-07-13"

