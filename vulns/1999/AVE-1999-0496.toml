[basic]
description = "Compaq Management Agents 和 Compaq Survey Utility 的网络组件允许远程攻击者通过使用「..」攻击（目录遍历）来读取任意文件。此漏洞影响多个版本，包括 Compaq Client Management Agents 4.0+，Survey Utility 2.0+，以及相关的 Insight Manager、Intelligent Cluster Administrator Management Agents 等产品。攻击者无需身份验证即可访问 Web 管理组件，并通过 URL 中包含目录遍历序列「../」的请求来读取目标系统上的敏感文件，例如 WinNT/repair/sam._ 文件或 NetWare 系统上的 ldremote.ncf 文件。漏洞原理在于 Web 服务器未能验证所请求的路径是否超出了其文档树范围。"
published = "1999-05-26"
remediation = "升级到 HP Management Agents 的最新支持版本或确保已应用最新的补丁；如果产品已停止支持，建议彻底卸载 Survey Utility 和 Web 管理组件，并改用受支持的 HP 管理方案替代；禁用 Web 管理组件的远程访问功能；在防火墙级别限制仅允许受信任管理 IP 访问 Web 管理端口 (通常为 2301)。"
score = 5.0
severity = "MEDIUM"
sources = ["nvd"]
title = "Compaq Survey Utility Web 文件访问 - 目录遍历（CVE-1999-0771）"
updated = "2026-06-16"

