[basic]
description = "九佳易管理系统的 PrivilegedCodeDestroy.asmx 接口存在 SQL 注入漏洞，攻击者可通过构造特制的 SOAP 请求向 code 参数注入恶意 SQL 语句，导致未经身份认证即可远程执行数据库操作，造成敏感数据泄露或数据被篡改。攻击条件为系统该 Web 服务接口暴露于公网且未对输入进行有效过滤，利用复杂度较低。建议厂商发布安全补丁或采用参数化查询方式进行修复。"
published = "nday"
remediation = "联系九佳易厂商获取官方安全补丁；对 PrivilegedCodeDestroy.asmx 的 code 参数实施参数化查询或 XML 预编译处理，禁止拼接 SQL 语句；在 IIS 或防火墙上限制该接口仅允许内网 IP 访问；部署 WAF 规则拦截 SOAP/XML 请求中的 SQL 注入特征关键字（如 UNION、SELECT、OR 1=1 等）。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "九佳易 九佳易管理系统 SQL注入漏洞"
updated = "nday"

