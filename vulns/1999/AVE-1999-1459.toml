[basic]
description = "Transarc DCE Distributed File System (DFS) 1.1 for Solaris 2.4 及 2.5 版本存在权限许可和访问控制漏洞。当用户属于大量用户组时，系统未能正确初始化组列表（grouplist），导致这些用户可能获得本不应被授权的 DFS 保护资源的访问权限。攻击者可利用该漏洞越权访问受限文件资源，影响系统数据安全。该漏洞 CVSS 评分 4.6，危害等级中危。"
published = "1996-09-17T04:00:00.000"
remediation = "立即联系 Transarc（后为 IBM 收购）获取 DFS 1.1 的补丁版本，或升级至 DFS 1.1 后续维护版本。同时建议将 Solaris 2.4/2.5 升级至受支持的 Solaris 版本，并在 DFS 服务端配置文件中对用户组最大数量设置显式上限。当前该平台已停止支持，长期缓解措施为迁移至替代分布式文件系统。"
score = 4.6
severity = "MEDIUM"
sources = ["avd"]
title = "Transarc DCE Distributed File System (DFS) 权限许可和访问控制漏洞"
updated = "2026-06-16T21:50:08.030"

