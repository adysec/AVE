[basic]
description = "Digital Unix 4.0 操作系统的 mh（消息处理）套件中的 inc 程序存在缓冲区溢出漏洞。本地或远程攻击者可通过向目标系统发送特制的邮件消息触发该漏洞，导致缓冲区溢出，进而造成程序崩溃或执行任意代码，获取系统控制权限。该漏洞影响 Digital Unix 4.0 版本，CVSS 评分 7.2，危害等级高。"
published = "1999-02-01T05:00:00.000"
remediation = "立即从 Compaq（现 HP）获取并安装 Digital Unix 4.0 的安全补丁（补丁编号请查阅 CIAC 公告 J-027），或升级至 Tru64 UNIX 5.0 及以上版本。若无法立即打补丁，可移除 inc 程序的 setuid 位（chmod u-s /usr/bin/inc）作为临时缓解措施，限制本地普通用户以 root 权限执行 inc 命令。建议改用 mailx 或 Mutt 替代 mh 套件处理本地邮件，降低攻击面。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "Digital Unix 4.0 MH inc 缓冲区溢出漏洞"
updated = "2026-06-16T21:48:13.480"

