[basic]
description = "Check Point Quantum Security Gateway 的 IKEv1 密钥交换协议中存在证书验证逻辑缺陷，未经身份认证的远程攻击者可通过向目标设备的 UDP 500/4500 端口发送特制的 IKEv1 认证请求包，绕过用户身份验证机制，在无需有效用户密码的情况下建立未经授权的远程访问 VPN 连接。该漏洞影响 R80.20.X、R81、R81.10、R81.20、R82 及 R82.10 等多个版本系列，CVSS 评分 9.3，危害等级严重。厂商已发布热修复补丁，建议用户升级至修复版本或禁用 IKEv1 迁移至 IKEv2。"
published = "2026-06-08T12:16:32.367"
remediation = "立即安装 Check Point SK185033 热修复：R82.10 升级至 JHFA Take 19+，R82 升级至 JHFA Take 103+，R81.20 升级至 JHFA Take 141+，R81.10 升级至 R81.10.17，R80.20.X / R82.00.X 升级至 R82.00.10。临时缓解措施：在 VPN 社区中禁用 IKEv1 并仅启用 IKEv2 协议；限制入站 UDP 500/4500 端口仅允许可信源 IP；对 Remote Access 用户启用强制机器证书认证；监控 VPN 日志中异常 IKE SA 建立及来自非预期 IP 的 VPN 会话。"
score = 9.3
severity = "CRITICAL"
sources = ["hwpoc"]
title = "Check Point Quantum Security Gateway IKEv1 认证绕过漏洞"
updated = "2026-06-17T10:57:46.373"

