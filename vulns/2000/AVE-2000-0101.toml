[basic]
description = 'Check Point Firewall-1 3.0 版本存在脚本标签过滤绕过漏洞，由于防火墙未能正确过滤 SCRIPT 标签，远程攻击者可通过在 SCRIPT 标签前插入额外的 `<` 字符（如 `<<SCRIPT>`），绕过 "Strip Script Tags" 安全限制，成功将恶意脚本注入并执行。该漏洞影响 Check Point Firewall-1 3.0 产品，CVSS 评分 7.5（高危），属于输入验证缺陷类漏洞。攻击者无需身份认证即可远程利用，通过构造特制 HTTP 请求载荷绕过内容过滤机制，可能导致跨站脚本攻击（XSS）、会话劫持或敏感信息窃取等后果。'
published = "2000-01-29T05:00:00.000"
remediation = '建议升级至 Check Point Firewall-1 4.0 SP1 或更高版本，或应用官方补丁 HF-0038。临时缓解：在防火墙策略中启用"Strict Script Tag Filtering"严格模式，并在防火墙前部署 Web 应用防火墙（WAF）拦截异常 Script 标签；如无法升级，可临时禁用"Strip Script Tags"功能并部署独立的内容过滤网关进行脚本过滤。'
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "Check Point Firewall-1 脚本标签过滤绕过漏洞"
updated = "2026-06-16T21:51:02.023"

