[basic]
description = "大华 DSS 综合管理平台存在 Java 反序列化远程代码执行漏洞，位于 cascademodifyLinkedDev 接口中。未经身份认证的远程攻击者可通过向目标系统发送特制的序列化数据包，触发不安全的反序列化操作，导致远程代码执行，从而完全控制目标服务器。该漏洞影响大华 DSS 综合管理平台多个版本，危害严重。"
published = "0719"
remediation = "立即升级大华 DSS 综合管理平台至官方最新版本，该漏洞源于 cascademodifyLinkedDev 接口未对反序列化数据做安全校验，攻击者可通过精心构造的序列化数据包实现远程代码执行。如无法立即升级，应在防火墙上限制对 DSS 管理端口（默认 8080/443）的访问来源，仅允许受信任管理 IP 连接，并禁用不必要的远程管理接口。"
score = 5
