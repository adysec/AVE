[basic]
description = "Joe's Own Editor (joe) 2.8 版本在崩溃时生成的临时保存文件 DEADJOE 权限设置为世界可读，导致本地攻击者可读取其他用户正在编辑的敏感文件内容。该漏洞利用条件简单，攻击者只需具备本地用户权限即可访问目标文件，影响使用 joe 2.8 编辑器的系统，属于信息泄露类漏洞，CVSS 评分 2.1，危害等级低。"
published = "1999-07-14T04:00:00.000"
remediation = "升级 joe 至 3.1 及以上版本，该版本已默认限制 DEADJOE 文件权限为仅属主可读。如无法升级，在 .bashrc 中设置 umask 077 后再启动 joe，或编写 cron 脚本定期清理 /tmp 下的 DEADJOE 文件并设置 chmod 600。"
score = 2.1
severity = "LOW"
sources = ["avd"]
title = "Joe's Own Editor joe 许可设置漏洞"
updated = "2026-06-16T21:50:41.200"

