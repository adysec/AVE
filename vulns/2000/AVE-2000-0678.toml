[basic]
description = "SmartWin CyberOffice Shopping Cart 2.0（又名 CyberShop）存在敏感信息泄露漏洞。该软件的默认安装将 `_private` 目录权限设置为全局可读，远程攻击者无需认证即可通过 HTTP 直接访问该目录下的敏感文件，获取数据库配置、用户订单等机密信息。该漏洞影响 CyberOffice Shopping Cart 2.0 版本，CVSS 评分 5.0，危害等级中危。建议用户修改 `_private` 目录的访问权限或部署 Web 应用防火墙进行防护。"
published = "2000-12-19T05:00:00.000"
remediation = "将 `_private` 目录权限改为 750 或更低（仅允许管理员可读），或删除该目录下不必要的信息文件。如使用 Apache，在 `_private` 目录中放置 `.htaccess` 文件添加 `Deny from all` 规则以禁止 Web 访问。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "SmartWin CyberOffice Shopping Cart 2.0 敏感信息泄露漏洞"
updated = "2026-06-16T21:52:46.800"

