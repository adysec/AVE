[info]
author = "ave"
description = "通过构造恶意 HTML 页面，利用 scriptlet.typelib ActiveX 控件（CLSID: 06290BD3-48AA-11D2-8432-006008C3FBFC）被错误标记为'对脚本安全'的特性，在用户访问时写入任意文件并执行命令。参考 Exploit-DB 19468。"
id = "POC-AVE-1999-0184"
name = "Microsoft Internet Explorer 5 ActiveX 远程代码执行漏洞 PoC"
severity = "medium"
tags = [
    "cve-1999-0668",
    "ave-1999-0184",
]
vuln_id = [
    "CVE-1999-0668",
    "AVE-1999-0184",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["scriptlet.typelib"]
