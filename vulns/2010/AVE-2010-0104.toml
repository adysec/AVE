[basic]
description = "Joomla! JPhone 组件 1.0 Alpha 3 版本的 jphone.php 文件存在目录遍历漏洞，远程攻击者可通过 index.php 的 controller 参数传入 ../ 目录遍历序列，包含并执行服务器上的任意本地文件。该漏洞影响 Joomla! 使用 JPhone 组件 1.0 Alpha 3 版本的站点，CVSS 评分 7.5（高危），属于 CWE-22 路径遍历类型。攻击者无需身份认证即可远程利用，通过构造恶意 controller 参数实现本地文件包含，进而可能导致敏感文件读取或代码执行。ExploitDB 已公开相关利用代码。Joomla! 官方已发布更新版本修复该漏洞，建议升级至修复版本。"
published = "2010-09-16T22:00:03.267"
remediation = '立即卸载或禁用 Joomla! 站点中已停更的 JPhone (com_jphone) 1.0 Alpha 3 组件（后台「扩展-管理」中卸载），并删除 /components/com_jphone 与 /modules 下相关文件。若必须保留，应升级到官方后续修复版本或在 jphone.php 中对 controller 参数使用 basename() 过滤并限制白名单，同时在 .htaccess 中拒绝含 ".." 的请求作为临时缓解。'
score = 7.5
severity = "HIGH"
sources = ["nuclei"]
title = "Joomla! Jphone 组件 本地文件包含漏洞"
updated = "2026-06-16T23:22:44.687"

