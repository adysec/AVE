[basic]
description = "Tornado 是一个 Python Web 框架和异步网络库，其 `HTTPHeaders.add` 方法在处理同一请求头名称重复时通过字符串拼接累积值。由于 Python 字符串不可变性，每次拼接都复制整个字符串，导致时间复杂度达 O(n²)。攻击者可利用 Tornado 单事件循环架构，构造包含大量重复头部的恶意 HTTP 请求，长期阻塞服务端事件循环，造成拒绝服务（DoS）。该漏洞影响 Tornado 6.5.2 及更早版本，CVSS 评分 7.5，危害等级高。"
published = "2025-12-12T06:15:41.380"
remediation = "升级 Tornado 至 6.5.3 或更高版本（`pip install 'tornado>=6.5.3'`）。如无法立即升级，保持 `max_header_size` 为默认值 64KB 可有效限制攻击面，同时可在反向代理层（如 Nginx）限制请求头大小作为额外缓解。"
score = 7.5
severity = "HIGH"
sources = ["ghsa"]
title = "Tornado HTTPHeader 合并二次复杂度拒绝服务漏洞"
updated = "2026-06-17T09:58:02.337"

