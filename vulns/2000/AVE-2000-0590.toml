[basic]
description = "Netwin Netauth 4.2e 及更早版本的 netauth.cgi 程序存在目录遍历漏洞，远程攻击者无需身份认证即可通过向目标系统发送包含 `..`（点点）序列的特制 HTTP 请求，利用路径回溯技术读取服务器上的任意文件，导致敏感信息泄露。该漏洞影响 Netwin Netauth 4.2e 及之前版本，CVSS 评分 5.0，危害等级中危。"
published = "2000-10-20T04:00:00.000"
remediation = "建议立即升级 Netwin Netauth 至 4.2e 以上版本，该版本已修复 netauth.cgi 的路径遍历漏洞。如无法升级，在 Web 服务器（如 Apache/IIS）层面配置 URL 重写规则，拦截包含 `..` 的请求路径，并对 `netauth.cgi` 的 `template` 等参数做严格的白名单校验，禁止包含 `../` 的输入。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Netwin Netauth 目录遍历漏洞"
updated = "2026-06-16T21:52:28.203"

