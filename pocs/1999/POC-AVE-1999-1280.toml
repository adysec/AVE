[info]
author = "AVE"
description = "检测 Matt Wright textcounter.pl 1.2 CGI 脚本是否存在。该脚本通过 DOCUMENT_URI 环境变量传递用户输入至 Shell 命令，未做过滤导致远程命令执行。攻击者可在 URL 路径中注入分号等元字符执行任意系统命令。"
id = "POC-AVE-1999-1280"
name = "CVE-1999-1479 PoC"
severity = "critical"
tags = ["cve-1999-1479"]
vuln_id = [
    "CVE-1999-1479",
    "AVE-1999-1280",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/cgi-bin/textcounter.pl"
protocol = "http"

[[poc.requests.matchers]]
expect = true
status = [200]
type = "status"
