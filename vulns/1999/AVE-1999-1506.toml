[basic]
description = "Solaris snoop 网络诊断工具中的 print_domain_name 函数存在缓冲区溢出漏洞，当 snoop 以详细模式（verbose）运行时，远程攻击者可通过发送特制的超长域名触发该漏洞，导致缓冲区溢出，从而以 root 权限执行任意代码。该漏洞影响 Solaris 2.3 至 7.0 等多个版本，CVSS 评分 10.0，危害等级严重。建议用户升级至不受影响的版本或禁用 snoop 的详细模式。"
published = "1999-12-07"
remediation = "立即安装 Sun 官方补丁（Solaris 2.3-2.6 安装补丁 106980-xx，Solaris 7.0 安装补丁 107081-xx，Solaris 7.0 x86 安装补丁 108483-01），或升级到 Solaris 8 及以上版本。如无法立即打补丁，应限制 snoop 命令仅授权管理员使用，并避免在不可信网络上以 verbose 模式运行 snoop。"
score = 10.0
severity = "CRITICAL"
sources = [
    "cve",
    "exploitdb",
]
title = "Sun Solaris snoop 远程缓冲区溢出漏洞"
updated = "2026-06-16"

