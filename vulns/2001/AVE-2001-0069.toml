[basic]
description = "FreeBSD 的 ipfw 和 ip6fw 防火墙组件存在访问控制绕过漏洞。远程攻击者可通过在 TCP 数据包中设置 ECE（Explicit Congestion Notification Echo）标志位，使数据包被误判为已建立连接的一部分，从而绕过防火墙规则实施攻击。该漏洞影响 FreeBSD 4.2 及更早版本，CVSS 评分 7.5，危害等级高。截至目前官方尚未发布完整补丁，建议升级至不受影响版本。"
published = "2001-03-26T05:00:00.000"
remediation = "升级 FreeBSD 至 4.3 或更高版本，该版本修复了 ipfw/ip6fw 对 TCP ECE 标志的校验逻辑。如无法升级，可在 ipfw 规则中添加 `tcpflags` 匹配规则，拒绝含 ECE 标志的非 SYN 数据包，或使用 pf (Packet Filter) 替代 ipfw 作为防火墙方案。"
score = 7.5
severity = "HIGH"
sources = ["exploitdb"]
title = "FreeBSD ipfw/ip6fw 访问限制绕过漏洞"
updated = "2026-06-16T21:53:49.973"

