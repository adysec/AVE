[basic]
description = "Windows NT 4.0 可预测 TCP 初始序列号漏洞：由于 TCP 协议栈实现中初始序列号（ISN）生成算法存在缺陷，产生的序列号可被远程预测，攻击者无需认证即可通过预测 ISN 伪造 TCP 连接，实现对目标 TCP 会话的劫持（Session Hijacking），进而冒充可信主机执行未授权操作。该漏洞影响 Windows NT 4.0 系统，CVSS 评分 5.0，危害等级中危。"
published = "1999-08-24T04:00:00.000"
remediation = '安装 Microsoft 安全公告 MS00-029 提供的 Windows NT 4.0 安全更新 (KB259460)，该补丁修复了 TCP/IP 协议栈中可预测初始序列号 (ISN) 的随机数生成算法。由于 Windows NT 4.0 已停止支持，建议升级至 Windows Server 2012 R2 或更高版本，并启用注册表项 `HKLM\SYSTEM\CurrentControlSet\Services\Tcpip\Parameters\SynAttackProtect` 为 1 以增强 SYN 洪水防护作为临时缓解措施。'
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Microsoft Windows NT 4.0 可预测TCP序列号漏洞"
updated = "2026-06-16T21:51:29.250"

