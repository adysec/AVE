[basic]
description = "Sendmail 8.6.9 的 IDENT 服务实现存在远程命令执行漏洞，攻击者无需身份认证即可通过向目标邮件服务器发送精心构造的 IDENT 查询请求触发该漏洞，以 root 权限执行任意系统命令。该漏洞影响所有运行 Sendmail 8.6.9 的 UNIX/Linux 系统，CVSS 评分 10.0，危害等级严重。官方已发布修复版本，建议升级至 8.6.10 及以上版本。"
published = "1997-01-01T05:00:00.000"
remediation = "立即升级 Sendmail 至 8.9.0 或更高版本，该版本已移除 IDENT 协议查询功能并修复了缓冲区溢出问题。如无法升级，可在 sendmail.cf 配置文件中设置 `O IdentTimeout=0` 或在启动命令行添加 `-noident` 参数彻底禁用 IDENT 查询。同时在防火墙层面阻断对外部端口 113 (auth/ident) 的出站连接，防止 Sendmail 向恶意 identd 服务发送请求。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "Sendmail 8.6.9 IDENT 远程命令执行漏洞"
updated = "2026-06-16T21:47:54.363"

