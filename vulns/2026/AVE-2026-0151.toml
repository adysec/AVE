[basic]
description = "Android 内核的 intfgraph.c 文件中 IntfGraphCreate 函数存在整数溢出漏洞，可导致越界写入。攻击者无需用户交互，仅需低权限即可通过网络远程触发该漏洞，实现远程代码执行。该漏洞影响所有未修复的 Android 内核版本，可能导致设备完全被控，属于 CWE-190 整数溢出与 CWE-787 越界写入漏洞。"
published = "2026-06-16"
remediation = "升级至 Google 2026 年 6 月 Android 安全公告中提供的补丁版本，包含对 intfgraph.c 中整数溢出问题的修复。Pixel 系列设备用户可通过系统设置中的安全更新路径获取 OTA 更新，其他 Android 设备需等待厂商推送相应安全补丁。"
score = 8.8
severity = "HIGH"
sources = ["cve"]
title = "Android 内核 intfgraph.c 整数溢出越界写入远程代码执行漏洞"
updated = "2026-06-17"

