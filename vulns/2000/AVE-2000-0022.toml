[basic]
description = "AnalogX SimpleServer:WWW 1.0.1 版本 HTTP 服务器存在缓冲区溢出漏洞。远程攻击者可通过向目标系统发送特制的超长 GET 请求，触发缓冲区溢出，从而在目标服务器上执行任意命令或导致服务崩溃。该漏洞攻击条件简单，无需认证即可利用，CVSS 评分 7.5，危害等级高危。用户应升级至更高版本以修复此漏洞。"
published = "1999-12-31T05:00:00.000"
remediation = "立即升级到 AnalogX SimpleServer:WWW 最新版本 1.24，该版本已修复 v1.23 中针对大字符串命令的利用问题以及 v1.06 中的缓冲区溢出缺陷。若无法升级，可在防火墙或网络边界限制对 HTTP 服务的访问，仅允许受信任 IP 连接，并避免将服务暴露在公网。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "AnalogX SimpleServer:WWW 缓冲区溢出漏洞"
updated = "2026-06-16T21:50:49.127"

