[basic]
description = "Windows NT 系统在安装 Internet Explorer 5 后，其任务计划程序（Task Scheduler）存在权限提升漏洞。已通过身份认证的用户可在任务被计划调度之后，通过修改该任务的配置内容（如执行命令或参数）来提升自身权限，从而以更高权限（如系统级权限）执行任意操作。该漏洞影响安装 IE 5 的 Windows NT 系统，攻击前提是攻击者需拥有本地普通用户账户并能访问任务计划程序所创建的任务文件。利用方式较为简单，攻击者只需在任务调度后篡改任务定义即可实现本地权限提升，CVSS 评分为 7.2，危害等级为高。"
published = "1999-11-29T05:00:00.000"
remediation = '建议升级 Internet Explorer 至 5.01 版本以修复该漏洞，或通过控制面板卸载 IE 5 离线浏览包以消除任务计划程序组件。如无法立即升级，可临时禁用 IE 5 Offline Browsing Pack 中的任务计划程序功能，或阻止普通用户对 C:\WINNT\Tasks 目录的写入权限作为缓解措施，并尽快应用 Microsoft 安全公告 MS99-051 对应的补丁。'
score = 7.2
severity = "HIGH"
sources = ["epss"]
title = "Microsoft Windows NT Internet Explorer 计划任务权限提升漏洞"
updated = "2026-06-16T21:49:09.937"

