[basic]
description = "深信服 VPN 存在用户密码未授权修改漏洞，由于密码修改接口缺乏有效的身份验证与权限校验机制，远程攻击者无需任何认证即可直接构造恶意请求修改任意用户的 VPN 登录密码，成功利用后可劫持目标用户账户，获取 VPN 网络访问权限，进而渗透内部网络。该漏洞影响范围广泛，危害严重。"
published = "0717"
remediation = "立即升级深信服SSL VPN至最新稳定版本（建议升级至8.3.2及以上版本），登录管理控制台检查并应用所有安全补丁。在无法立即升级的情况下，应在防火墙层面限制VPN管理接口（默认4430/4431端口）的访问权限，仅允许内网管理IP访问，同时启用多因素认证并强制所有用户修改初始密码。建议在升级后执行全量用户密码重置，并审计近期登录日志排查是否存在异常登录行为。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "深信服 VPN 用户密码未授权修改漏洞"
updated = "0717"

