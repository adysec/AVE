[info]
author = "ave"
description = "验证 Internet Explorer 4/5 服务端页面引用重定向漏洞。通过 window.open 打开一个服务端重定向到本地文件的 URL，然后通过变量引用获取本地文件内容，绕过同源策略。"
id = "POC-AVE-1999-0791"
name = "CVE-1999-0981 PoC"
severity = "medium"
tags = ["ave-1999-0791"]
vuln_id = [
    "CVE-1999-0981",
    "AVE-1999-0791",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/poc.html"
protocol = "http"

[poc.requests.body]
content = ""
type = "raw"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["window.open"]
