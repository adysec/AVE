[basic]
description = "SGI IRIX 6.2 系统自带的 cdplayer 程序存在本地权限提升漏洞。该程序在处理命令行参数时未对目标路径进行充分校验，导致本地普通用户可通过指定特定的命令行选项，在任意目录位置（包括本无权写入的系统目录）创建目录。攻击前提是攻击者需拥有目标系统的本地登录权限并能执行 cdplayer 程序。攻击者利用该缺陷可操纵文件系统结构，为后续进一步的权限提升或破坏系统完整性创造条件，从而造成本地权限提升危害。"
published = "1998-03-20T05:00:00.000"
remediation = "建议升级至 SGI 官方修复版本（IRIX 6.3 或更高版本），并应用 SGI 发布的针对 cdplayer 的安全补丁。作为临时缓解措施，可移除 /usr/sbin/cdplayer 的 setuid 位（执行 chmod u-s /usr/sbin/cdplayer），或限制该程序仅供受信任用户使用，以防止本地用户利用命令行选项在任意位置创建目录进行提权。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "SGI IRIX 6.2 cdplayer 本地权限提升漏洞"
updated = "2026-06-16T21:49:24.730"

