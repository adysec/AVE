[basic]
description = "Linux 内核 F2FS 文件系统驱动在实现原子写入功能时存在空指针解引用漏洞。提交 3db1de0e582c 更改了原子写入方式，为原子写入文件创建了 COW（写时复制）inode，但在 f2fs_do_write_data_page 写入该 COW inode 时错误地访问了其自身为空的 COW inode 指针，导致空指针解引用。本地攻击者可通过触发原子写入操作引发内核崩溃，造成拒绝服务（DoS）。该漏洞影响 Linux 5.19-rc6 及之前版本的内核。"
published = "2025-06-18T11:15:28.857"
remediation = "立即将 Linux 内核升级至 5.18.18 或 5.19.4 及以上版本（包含对应稳定版修复）。各发行版用户请安装对应安全更新：如 Ubuntu 安装 linux-image-5.19.0-* 更新，RHEL/CentOS 更新 kernel 包至修复版本。如暂时无法重启升级，可禁用 f2fs 文件系统的原子写入功能（通过 mount 选项 `noatomic_write`），或避免在不可信来源的 f2fs 分区上执行写操作以降低触发风险。"
score = 5.5
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux f2fs 空指针解引用漏洞"
updated = "2026-06-17T05:22:33.060"

