[basic]
description = "Apple QuickTime Player 4.1.2（日文版）Windows 插件存在缓冲区溢出漏洞，远程攻击者可通过构造恶意的 EMBED 标签并向 HREF 参数传入超长字符串触发该漏洞，导致任意命令执行。该漏洞影响安装了 QuickTime 4.1.2 日文版的 Windows 系统，CVSS 评分 7.6，危害等级高危。攻击者可通过诱导用户访问特制网页完成利用，无需额外认证。"
published = "2001-05-03T04:00:00.000"
remediation = "升级 Apple QuickTime 至 4.1.2 以上版本（如 5.0 或更高版本），或卸载 QuickTime 浏览器插件以消除攻击面。对于已终止支持的 Windows 版 QuickTime 7，建议彻底卸载 QuickTime 及相关 ActiveX 控件，改用其他媒体播放方案。"
score = 7.6
severity = "HIGH"
sources = ["exploitdb"]
title = "Apple QuickTime Player 4.1.2 插件远程缓冲区溢出漏洞"
updated = "2026-06-16T21:53:51.953"

