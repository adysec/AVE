[basic]
title = "Microsoft IIS 及 Personal Web Server ASP 备用数据流源码泄露漏洞"
description = "Microsoft IIS 3.0/4.0 及 Personal Web Server 2.0/3.0/4.0 存在安全漏洞，远程攻击者通过在 URL 后附加 \"::$DATA\" 可获取 ASP 文件的源代码。该漏洞利用了 Windows NTFS 文件系统的备用数据流（ADS）特性，导致服务器将 ASP 文件以文本形式返回而非执行，从而泄露数据库连接字符串、业务逻辑等敏感信息。攻击者无需认证即可远程利用，影响范围广泛。"
severity = "MEDIUM"
score = 5.0
sources = ["cve", "exploitdb"]
published = "1999-01-01"
updated = "1999-01-01"
remediation = "升级到 IIS 5.0 或更高版本，或安装微软提供的安全补丁。对于无法升级的系统，建议在 IIS 中配置 URL 重写规则过滤 \"::$DATA\" 请求，或迁移 ASP 应用至更新的服务器平台。"

[references]
urls = ["https://nvd.nist.gov/vuln/detail/CVE-1999-0278", "https://www.exploit-db.com/exploits/19033"]

