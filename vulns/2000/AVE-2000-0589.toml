[basic]
description = "IPSWITCH IMail 6.04 及之前版本的 Web 服务器组件存在路径遍历漏洞。远程攻击者在无需身份认证的情况下，可通过向 Web 服务器发送包含 `../` 等特殊序列的 HTTP 请求，突破路径限制访问任意文件，可读取或删除目标系统上的敏感文件。该漏洞 CVSS 评分 6.4，危害等级中危，影响使用该邮件系统的服务器安全。"
published = "2000-10-20T04:00:00.000"
remediation = '立即升级 IMail 至 6.05（含）以上版本，或对 6.0~6.04 版本安装官方补丁 imailwebpatch604c.exe（下载地址 ftp.ipswitch.com）。无法升级时，在 Web 服务器层面过滤 URL 及请求中的 ".." 目录遍历序列，并严格校验用户附件路径参数，避免访问系统目录。'
score = 6.4
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Ipswitch IMail 6.x Web Server 目录遍历漏洞"
updated = "2026-06-16T21:52:27.943"

