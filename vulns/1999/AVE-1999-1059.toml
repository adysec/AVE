[basic]
description = "Xerox DocuColor 4LP 彩色打印机的 HTTP 服务存在拒绝服务漏洞，远程攻击者无需身份认证即可向目标设备发送包含大量句点（.）字符的特制长 URL，触发服务进程挂起，导致打印机无法正常响应请求。该漏洞影响 DocuColor 4LP 系列设备，CVSS 评分 5.0，危害等级中等，建议限制对设备 Web 管理界面的网络访问以降低风险。"
published = "1999-10-13T04:00:00.000"
remediation = "该设备已停止技术支持，Xerox 未发布官方补丁。建议在打印机网络 ACL 中限制仅允许受信任管理 IP 访问 TCP 80 端口，或直接禁用 Fiery Web 服务（通过打印机控制面板关闭 HTTP 服务）。如业务允许，建议将设备隔离至独立管理 VLAN，禁止普通用户网络访问。作为长期方案，应更换为受支持的打印机型号。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Xerox DocuColor 4LP HTTP服务器 拒绝服务漏洞"
updated = "2026-06-16T21:50:14.327"

