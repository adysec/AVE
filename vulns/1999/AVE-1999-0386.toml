[basic]
description = "Microsoft Windows 95/98 系统的 Telnet 客户端存在堆缓冲区溢出漏洞，当用户连接至恶意 Telnet 服务器时，攻击者可通过发送特制的 Telnet 参数触发该漏洞，导致堆内存损坏，进而可能造成拒绝服务或任意代码执行。该漏洞影响 Windows 95 和 Windows 98 系统，需用户主动发起 Telnet 连接方可触发，属于客户端侧漏洞，CVSS 评分 2.6，危害等级低。"
published = "1999-08-16T04:00:00.000"
remediation = "立即安装 Microsoft 安全公告 MS99-033 提供的 Telnet 客户端补丁，Windows 95 用户通过 https://www.microsoft.com 下载，Windows 98/98 SE 用户通过 Windows Update 或 https://www.microsoft.com/windows98/downloads/contents/WUCritical/Telnet/Default.asp 获取。由于 Windows 95/98 已停止支持，建议升级到 Windows 10 或更高版本以获得持续安全更新。"
score = 2.6
severity = "LOW"
sources = ["avd"]
title = "Microsoft Windows 95/98 Telnet 客户端缓冲区溢出漏洞"
updated = "2026-06-16T21:48:58.607"

