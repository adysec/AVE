[basic]
description = "Microsoft Internet Explorer 4.x 和 5.x 存在 SSL 证书验证绕过漏洞，当用户在同一 IE 会话期间与同一服务器建立新的 SSL 会话时，浏览器未能正确重新验证 SSL 证书。攻击者可利用此缺陷在中间人攻击中呈现伪造证书，导致用户误信恶意站点为合法站点，从而窃取敏感信息或进行会话劫持。影响范围覆盖 IE 4.x 和 5.x 全版本，攻击条件要求攻击者能拦截并修改受害者与目标服务器间的 SSL 通信，且受害者需在同一浏览器会话中重新建立 SSL 连接。微软通过安全公告 MS00-039 发布补丁修复此漏洞，建议升级至 IE 5.01 SP1 或更高版本。"
published = "2000-06-05T04:00:00.000"
remediation = "建议立即升级至 Internet Explorer 5.01 SP1 或更高版本，或安装 Microsoft 安全公告 MS00-032 提供的补丁程序。若无法立即升级，可在 Internet Explorer 的“Internet 选项”→“高级”选项卡中勾选“清除 SSL 状态”并在每次新建 SSL 会话前手动清除 SSL 状态，或在浏览器关闭后重新启动以清除 SSL 会话缓存，作为临时缓解措施。建议尽快升级至 IE 6.0 或更高版本彻底修复该 SSL 证书重复验证漏洞。"
score = 2.6
severity = "LOW"
sources = ["epss"]
title = "Microsoft Internet Explorer 4.x/5.x SSL证书验证绕过漏洞"
updated = "2026-06-16T21:51:54.587"

