[basic]
description = "Microsoft IIS 4.0/5.0 的 FrontPage 服务器扩展中 shtml.exe 程序存在路径泄露漏洞。远程攻击者可通过请求不存在的 HTML、HTM、ASP 或 SHTML 文件，触发错误消息返回服务器物理路径信息，导致系统目录结构等敏感信息泄露。该漏洞有助于攻击者进一步探测目标环境，为后续攻击提供情报支持，影响运行 IIS 4.0/5.0 及 FrontPage 2000 扩展的 Windows 服务器。此漏洞无需身份认证即可远程利用，CVSS 评分 5.0，危害等级中危。"
published = "2000-05-06T04:00:00.000"
remediation = "升级到受支持的 Windows Server 版本（如 Windows Server 2003+ 的 IIS 6.0 或更高版本），FrontPage 服务器扩展已不再维护，建议迁移至现代 Web 发布方案。如无法升级，可在 IIS 管理器中删除 shtml.exe 的脚本映射，或通过 URLScan 工具过滤包含 shtml.exe 的请求路径作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Microsoft FrontPage 2000 IIS 4.0/5.0 Server Extensions 物理路径泄露漏洞"
updated = "2026-06-16T21:51:39.827"

