[basic]
description = "Microsoft Hotmail 存在跨站脚本（XSS）漏洞。攻击者可通过 HTML STYLE 标签注入恶意 JavaScript 代码，当用户浏览包含特制 STYLE 标签的邮件或网页时，脚本将在用户浏览器中自动执行，从而获取受害者的 Hotmail 账户控制权，包括读取邮件内容、发送邮件等操作。该漏洞影响 Hotmail 及 Microsoft Internet Explorer 5、Netscape Communicator 4.0/4.5/4.6 等浏览器，攻击条件为诱使用户访问恶意构造的邮件或页面。CVSS 评分 5.1，危害等级中等。"
published = "1999-09-13T04:00:00.000"
remediation = "建议升级浏览器至 Internet Explorer 5.01 Service Pack 2 或更高版本，Netscape 用户应升级至 4.7x 及以上版本。服务端方面，微软已对 Hotmail/Outlook.com 邮件系统实施 HTML 标签白名单过滤，禁用 STYLE 标签内脚本执行。若仍使用旧版邮件服务，建议切换至 Outlook.com 并使用现代浏览器。对于自建邮件 Web 系统，应对用户输入 HTML 中的 STYLE 属性进行严格转义，移除所有 `javascript:` 协议及事件处理器（如 `onerror`、`onload`）。"
score = 5.1
severity = "MEDIUM"
sources = ["cve"]
title = "Microsoft Hotmail 跨站脚本漏洞"
