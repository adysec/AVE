[basic]
description = "PureFTPd 1.0.18 及更早版本中的 accept_client 函数存在连接数限制缺陷，远程攻击者可通过建立大量并发连接超出服务器最大连接数限制，导致 FTP 服务耗尽系统资源而拒绝服务。该漏洞影响 PureFTPd 1.0.18 及此前所有版本，攻击者无需认证即可利用，CVSS 评分 5.0，危害等级中等。建议升级至 PureFTPd 1.0.19 及以上版本修复。"
published = "2004-08-06T04:00:00.000"
remediation = "升级 PureFTPd 至 1.0.19 或更高版本。如无法立即升级，可在配置文件中调低 `MaxClientsNumber` 和 `MaxClientsPerIP` 参数以限制最大连接数，同时使用防火墙（如 iptables）限制单 IP 并发连接数作为临时缓解。"
score = 5
severity = "MEDIUM"
sources = ["nuclei"]
title = "PureFTPd accept_client 函数拒绝服务漏洞"
updated = "2026-06-16T22:06:06.270"

