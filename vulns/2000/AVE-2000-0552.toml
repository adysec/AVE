[basic]
description = 'suidperl（sperl）是 Perl 5.00503 中用于设置用户 ID 权限的辅助程序，其在调用 /bin/mail 发送错误报告时未正确过滤 "~!" 转义序列。本地攻击者可通过设置 "interactive" 环境变量并传入包含该转义序列的文件名触发 mail 命令的 shell 转义功能，从而以目标用户权限执行任意命令，实现本地权限提升。该漏洞影响 Perl 5.00503 版本，CVSS 评分 7.2，危害等级高。'
published = "2000-10-20T04:00:00.000"
remediation = "升级 Perl 至 5.6.0 或更高版本以修复 suidperl 的 shell 转义漏洞；若无法升级，可移除 suidperl 的 setuid 权限（chmod u-s /usr/bin/suidperl），或直接删除 suidperl 二进制文件并使用普通 perl 替代。"
score = 7.2
severity = "HIGH"
sources = ["exploitdb"]
title = "Perl suidperl 本地权限提升漏洞"
updated = "2026-06-16T21:52:18.217"

