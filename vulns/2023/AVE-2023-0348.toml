[basic]
description = "MariaDB Server 在 JOIN::fix_all_splittings_in_plan 函数中存在缺陷，远程攻击者可通过构造特制的 SQL 查询语句触发该函数中的异常处理错误，导致 MariaDB 服务进程崩溃，造成拒绝服务。该漏洞影响 MariaDB 10.10 至 10.11.* 以及 11.0 至 11.4.* 系列版本，攻击者无需高权限即可利用，CVSS 评分 4.9，危害等级中等。建议用户升级至已修复版本。"
published = "2025-03-08T23:15:14.683"
remediation = "升级 MariaDB Server 至 10.11.12 及以上版本、11.4.6 及以上版本或 11.8.2 及以上版本。该漏洞已在对应修复版本中通过优化器改造解决，建议立即从 mariadb.org 下载更新或通过系统包管理器升级。如无法立即升级，可在应用层避免执行包含子查询左连接的复杂 SQL 语句作为临时缓解措施。"
score = 4.9
severity = "MEDIUM"
sources = ["msrc"]
title = "MariaDB Server 拒绝服务漏洞"
updated = "2026-06-17T06:44:01.470"

