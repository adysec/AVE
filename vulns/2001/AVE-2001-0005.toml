[basic]
description = "Borland/Inprise Interbase 4.0/5.0/6.0 数据库服务器中存在硬编码后门账号，该账号拥有最高权限且无法被常规方式禁用或删除。远程攻击者无需身份认证即可通过该后门账号登录数据库系统，利用存储过程绕过访问控制，实现对服务器任意文件的覆盖写入操作。此漏洞影响所有未安装补丁的 Interbase 4.0/5.0/6.0 版本，CVSS 评分 10.0，危害等级严重。厂商至今未提供官方修复补丁，建议立即停用受影响版本或使用防火墙限制数据库端口访问。"
published = "2001-02-12T05:00:00.000"
remediation = '立即升级至 Firebird 0.9.4 或更高版本（原 InterBase 6.0 用户），或安装 Borland 官方补丁。若无法升级，可在防火墙层面封禁 TCP 端口 3050（gds_db），并删除默认后门账户 "politically" 以降低风险。'
score = 10
severity = "CRITICAL"
sources = ["exploitdb"]
title = "Borland Inprise Interbase 数据库服务器后门账号漏洞"
updated = "2026-06-16T21:53:28.833"

