[basic]
description = "Netscape Enterprise Server（NES）在 HP-UX 平台的 HP Virtual Vault（VVOS）环境中存在拒绝服务漏洞。远程攻击者可通过向目标服务器发送特制超长 URL 请求，触发服务进程崩溃或资源耗尽，导致服务器无法正常处理合法用户请求。该漏洞无需身份认证即可远程利用，攻击门槛较低，主要影响 HP Virtual Vault 操作系统上运行的 NES Web 服务，在特定网络条件下可造成拒绝服务。"
published = "1999-05-07T04:00:00.000"
remediation = "建议立即升级 Netscape Enterprise Server 至 3.6 SP2 及以上版本（HP-UX 对应安全补丁编号 PHSS_20316）。在反向代理或负载均衡器（如 HP-UX Apache-based Web Server）上限制 URL 长度不超过 4096 字节，拒绝超过阈值的请求。配置 WAF 规则过滤包含超长路径的 HTTP 请求。由于 NES 及 HP-UX Virtual Vault 均已停止技术支持，长期解决方案应迁移至受支持的 Web 服务器（如 Apache HTTP Server）和操作系统。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Netscape Enterprise Server HP-UX 平台长 URL 请求拒绝服务漏洞"
updated = "2026-06-16T21:48:50.783"

