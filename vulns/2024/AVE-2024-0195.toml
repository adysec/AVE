[basic]
description = 'H3C SecPath 堡垒机存在未授权访问导致的任意用户登录漏洞。该设备在处理 /audit/gui_detail_view.php 接口的 token、id、uid 及 login 参数时缺乏有效的身份认证与输入校验，攻击者可构造包含 SQL 注入式参数的恶意请求（如 token=1&id=\&uid=,chr(97)) or 1:...&login=admin），绕过登录鉴权逻辑以管理员身份直接登录系统。该漏洞影响相关版本的 H3C SecPath 堡垒机设备，攻击条件为攻击者能够网络访问设备的 Web 管理端口且无需任何凭据，成功利用后可完全接管堡垒机，进而获取其所管控的全部运维主机权限，危害十分严重。'
published = "0725"
remediation = "立即升级 H3C SecPath 堡垒机至官方发布的安全修复版本（最新基线版本），并联系 H3C 技术支持获取对应补丁包。临时缓解措施：在边界防火墙或 ACL 上限制 /audit/gui_detail_view.php 等管理接口的访问来源 IP，仅允许运维网段访问；同时禁用不必要的 guest/anonymous 账户并强制管理员账户使用强口令与双因素认证。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "H3C SecParh堡垒机 任意用户登录漏洞（未授权访问）"
updated = "0725"

