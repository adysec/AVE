[basic]
description = 'Webmin 1.290 之前版本及 Usermin 1.220 之前版本中存在路径遍历漏洞。由于 simplify_path 函数在 HTML 解码之前被调用，远程攻击者无需认证即可利用 "%01" 等编码字符绕过 "../" 过滤检查，通过构造特制的 "..%01" 序列读取服务器上的任意文件，导致敏感信息泄露。该漏洞影响 Webmin <1.290 及 Usermin <1.220 版本，无需特殊权限即可利用。'
published = "2006-07-06"
remediation = "升级 Webmin 至 1.290 及以上版本，Usermin 至 1.220 及以上版本。Debian 用户执行 `apt-get update && apt-get upgrade webmin usermin`，Gentoo 用户同步 Portage 并更新相应包。临时缓解措施：在防火墙上限制对 Webmin（默认 10000 端口）和 Usermin（默认 20000 端口）的管理地址白名单访问。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Webmin 及 Usermin 任意文件读取漏洞"
updated = "2026-06-16"

