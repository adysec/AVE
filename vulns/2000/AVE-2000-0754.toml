[basic]
description = "ISC BIND 8.1 的 host 命令存在缓冲区溢出漏洞，远程攻击者可通过向目标 DNS 服务器发送特制的 AXFR 查询请求，并返回超长响应数据触发缓冲区溢出，从而执行任意命令。该漏洞影响 BIND 8.1 版本，CVSS 评分 10.0，危害等级严重。建议升级至修复版本以消除风险。"
published = "2000-12-11T05:00:00.000"
remediation = "该漏洞影响 ISC BIND 8.1，官方已停止维护 BIND 8 系列，建议升级至 ISC BIND 9.3.2 及以上版本。如无法立即升级，可在 named.conf 中使用 allow-transfer 指令限制区域传输仅对受信 DNS 服务器开放，同时禁用不必要的递归查询（设置 recursion no;）作为临时缓解措施。"
score = 10
severity = "CRITICAL"
sources = ["exploitdb"]
title = "ISC BIND 8.1 Host命令远程缓冲区溢出漏洞"
updated = "2026-06-16T21:53:00.257"

