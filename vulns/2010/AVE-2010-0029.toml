[basic]
description = "Wowjoomla 公司的 Joomla! 组件 LoginBox Pro 中存在路径遍历漏洞，远程攻击者可通过向 index.php 文件的 view 参数传递包含 `..`（点点）的恶意字符串，绕过目录限制读取服务器上的任意文件。该漏洞影响使用该组件的 Joomla! 网站，CVSS 评分 5.0，危害等级中危。攻击无需身份认证，利用难度较低，可导致敏感信息泄露。"
published = "2010-04-12T18:30:01.007"
remediation = '立即卸载 LoginBox Pro (com_loginbox) 组件，该组件已停止维护且无安全更新。如必须使用，在 Joomla! 全局配置中启用「输入过滤」并将 view 参数加入黑名单，拦截 `../` 等路径遍历字符。同时在 Web 服务器（Apache/Nginx）层面添加重写规则，拒绝包含 `../` 的 view 参数请求。作为临时缓解措施，可通过 WAF 规则拦截 `index.php?option=com_loginbox&view=.*\.\..*` 模式的访问。'
score = 5
severity = "MEDIUM"
sources = ["nuclei"]
title = "Joomla LoginBox Pro 组件目录遍历漏洞"
updated = "2026-06-16T23:18:11.527"

