[basic]
description = "dompdf 0.6.1 之前版本的 dompdf.php 中存在路径遍历漏洞。当服务端启用 DOMPDF_ENABLE_PHP 配置时，远程攻击者可通过向 input_file 参数传入 php://filter/read=convert.base64-encode/resource 等 PHP 流封装器协议，绕过 chroot 保护机制读取服务器上的任意文件，导致敏感信息泄露。该漏洞影响广泛使用 dompdf 库的 Web 应用，CVSS 评分 6.8，危害等级中危。"
published = "2014-04-28T14:09:06.707"
remediation = "升级 dompdf 至 0.6.1 或更高版本。如无法升级，在 dompdf 配置中设置 `DOMPDF_ENABLE_PHP=false` 禁用 PHP 执行功能，并严格校验 `input_file` 参数仅允许白名单内的合法路径，同时配置 Web 服务器禁止对 `dompdf.php` 的直接外部访问。"
score = 6.8
severity = "MEDIUM"
sources = ["nuclei"]
title = "dompdf dompdf.php 远程任意文件读取漏洞"
updated = "2026-06-17T00:06:31.027"

