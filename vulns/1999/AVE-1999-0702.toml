[basic]
description = "AIX操作系统的数据包过滤模块中的genfilt功能存在安全漏洞。当目标端口号大于32767时，genfilt无法正确过滤网络流量，导致本应被阻止的流量能够绕过过滤规则。攻击者可利用此漏洞绕过防火墙策略，访问受保护的网络服务，造成信息泄露或系统被进一步利用。"
published = "1999-10-26"
remediation = "IBM已发布相关安全公告，建议用户升级AIX系统到包含修复的版本，或应用IBM官方提供的补丁程序。同时可通过配置额外的防火墙规则对大于32767端口的流量进行二次过滤，作为临时缓解措施。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "AIX数据包过滤模块genfilt存在安全漏洞，无法正确过滤目标端口大于32767的流量"
updated = "1999-10-26"

