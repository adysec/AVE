[basic]
description = "FileZilla FTP Server 2.2.22 存在缓冲区溢出漏洞，远程认证攻击者可通过发送超长的 PORT 或 PASS 命令后跟 MLSD 命令触发该漏洞，导致目标 FTP 服务进程崩溃造成拒绝服务，甚至可能执行任意代码。该漏洞影响 FileZilla FTP Server 2.2.22 版本，CVSS 评分 6.4，危害等级中危。目前厂商已发布修复版本。"
published = "2006-05-04T12:38:00.000"
remediation = "升级 FileZilla Server 至 0.9.29 及以上版本（此漏洞已在后续版本修复）。如无法升级，在防火墙中限制对 FTP 端口（默认 21）的访问 IP，仅允许受信任 IP 连接，并对 FTP 用户实施严格的命令长度限制。"
score = 6.4
severity = "MEDIUM"
sources = ["nuclei"]
title = "FileZilla FTP Server 缓冲区溢出导致拒绝服务与代码执行漏洞"
updated = "2026-06-16T22:24:28.800"

