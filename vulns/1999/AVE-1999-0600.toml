[basic]
description = "IBM AIX 4.1/4.2 系统中 C Set++ 编译器附带的 Source Code Browser Program Database Name Server Daemon (pdnsd) 存在缓冲区溢出漏洞。远程攻击者无需身份认证即可向 pdnsd 服务发送特制请求触发缓冲区溢出，可能导致服务崩溃或任意代码执行。该漏洞 CVSS 评分 10.0，危害等级严重，影响 AIX 4.1 及 4.2 版本。"
published = "1999-08-18T04:00:00.000"
remediation = "立即升级 AIX 至 4.3.3 或更高版本，该漏洞已在后续维护包中修复。如无法升级，可禁用 pdnsd 服务（/usr/bin/pdnsd），在 /etc/inetd.conf 中注释 pdnsd 行并重启 inetd 以缓解风险。"
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "IBM AIX pdnsd 远程缓冲区溢出漏洞"
updated = "2026-06-16T21:48:58.130"

