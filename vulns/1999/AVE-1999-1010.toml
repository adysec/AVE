[basic]
description = 'SystemSoft SystemWizard 软件包中存在两个被标记为"对脚本安全"的 ActiveX 控件（Launch 控件和 RegObj 控件），远程攻击者可通过构造恶意网页在受害系统上调用这些控件执行任意命令。该漏洞影响安装 Windows 98 的 HP Pavilion PC 及其他可能平台，攻击无需身份认证，用户仅需访问恶意网页即可触发。CVSS 评分 7.5，危害等级高。'
published = "1999-12-31T05:00:00.000"
remediation = "建议立即卸载 SystemSoft SystemWizard 软件包，或通过注册表为 Launch 和 RegObj 两个 ActiveX 控件设置 Kill Bit（将 CLSID 下 CompatFlags 子键的 DWORD 值设为 0x400），阻止 Internet Explorer 调用。长期方案应升级至受支持的操作系统（如 Windows 10/11），避免使用已终止支持的 Windows 98 系统。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "SystemSoft SystemWizard ActiveX 远程代码执行漏洞"
updated = "2026-06-16T21:49:56.753"

