[basic]
description = "Allaire ColdFusion Server 4.5.1及更早版本的ColdFusion Administrator管理后台存在拒绝服务漏洞。远程攻击者无需身份认证即可通过向登录页面提交超长密码字符串，触发服务器处理异常，导致ColdFusion服务崩溃或失去响应。该漏洞影响ColdFusion Server 2.0/3.x/4.x系列版本，攻击者仅需发送特制HTTP请求即可利用，无需特殊权限，风险等级中等。"
published = "2000-06-07T04:00:00.000"
remediation = "立即升级至 Allaire ColdFusion 4.6（Q4/2000 发布）或更高版本以修复此漏洞。当前产品已停产，建议迁移至 Adobe ColdFusion（2018/2021/2023 系列）受支持版本。临时缓解措施：限制 ColdFusion Administrator 登录页面（/CFIDE/administrator/index.cfm）的访问来源，仅允许受信任管理 IP；在 Web 服务器层面对该路径添加 HTTP POST 请求体大小限制（如限制 4096 字节），防止超长密码字符串提交。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Allaire ColdFusion Server Administrator 登录拒绝服务漏洞"
updated = "2026-06-16T21:51:57.143"

