[basic]
description = "海康威视综合安防管理平台 clusters 接口存在任意文件上传漏洞，攻击者可通过向 /clusterMgr/clusters/ssl/file 接口发送特制 HTTP 请求绕过文件类型校验，上传包含恶意代码的 JSP 或 Webshell 文件。由于接口缺乏文件类型白名单及路径遍历防护，攻击者可写入任意目录，最终获取服务器控制权限。该漏洞影响海康威视综合安防管理平台多个版本，未授权状态下即可远程利用，危害严重。"
published = "2026-06-15"
remediation = "升级海康威视综合安防管理平台至最新安全版本；在 Nginx 或 WAF 层对 /clusterMgr/clusters/ssl/file 接口添加文件类型白名单，仅允许图片、文档等非脚本类型文件上传；校验上传文件名过滤 ../ 路径遍历序列；移除 JSP 目录写权限并设置不可执行权限；通过防火墙或 ACL 策略限制该接口仅允许内网管理 IP 段访问。"
score = 9.8
severity = "CRITICAL"
sources = ["hwpoc"]
title = "海康威视 综合安防管理平台 clusters 接口任意文件上传漏洞"
updated = "2026-07-21"

