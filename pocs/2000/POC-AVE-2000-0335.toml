[info]
author = "ave"
description = "通过向 IIS 4.0/5.0 发送包含 100 个以上连续点的超长 URL，触发 IIS 文件扩展名解析时呈指数级计算的 MIME 类型匹配，导致 CPU 耗尽、服务停止响应，造成拒绝服务。"
id = "POC-AVE-2000-0335"
name = "Microsoft IIS 4.0/5.0 恶意文件扩展名拒绝服务 PoC"
severity = "high"
tags = ["ave-2000-0335"]
vuln_id = [
    "CVE-2000-0408",
    "AVE-2000-0335",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/default.asp"
protocol = "http"

[poc.requests.body]
type = "raw"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["200 OK"]
