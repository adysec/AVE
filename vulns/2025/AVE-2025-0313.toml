[basic]
description = "金和OA（Jinhe OA）的 ModuleTaskView.aspx 页面存在 SQL 注入漏洞，攻击者可在未授权的情况下通过 POST 请求向 OriginID 参数注入恶意 SQL 语句，利用时间盲注技术获取数据库中的敏感信息。该漏洞影响了金和OA系统的多个版本，危害较大，建议尽快升级至最新版本或进行参数过滤修复。"
published = "0716"
remediation = "联系金和官方获取最新安全补丁，升级至不受影响的最新版本；在 Web 应用防火墙（WAF）中添加规则拦截 `OriginID`、`_ListPage1LockNumber` 等参数中包含的 SQL 语法特征（如 `WAITFOR DELAY`、`'` 单引号、`--` 注释符）；若无法升级，在代码层对 `OriginID` 参数进行严格的白名单过滤或使用参数化查询替代字符串拼接，并禁用数据库 xp_cmdshell 等高危存储过程。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "金和 金和OA SQL注入漏洞"
updated = "0716"

