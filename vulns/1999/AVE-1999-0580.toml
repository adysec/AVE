title = "Sun Solaris 7.0 kcms_configure 缓冲区溢出漏洞"
description = "Solaris 7.0 系统中的 kcms_configure 命令存在严重缓冲区溢出漏洞。攻击者可通过设置过长的 NETPATH 环境变量触发栈缓冲区溢出，劫持程序执行流程。该漏洞存在于默认安装的 Solaris 7.0 系统中，攻击者无需身份验证即可在本地触发漏洞，成功利用后可获取 root 权限实现本地提权。漏洞成因是 kcms_configure 对 NETPATH 环境变量长度缺乏边界检查，导致栈缓冲区溢出覆盖返回地址。"
