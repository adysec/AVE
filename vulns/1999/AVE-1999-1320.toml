[basic]
description = "Excite for Web Servers (EWS) 1.1 存在权限提升漏洞。该软件将加密后的用户密码以明文形式存储在全局可读的 Architext.conf 认证配置文件中，本地攻击者可读取该文件获取加密密码，然后通过 HTTP 请求将加密密码重放至 AT-generated.cgi 或 AT-admin.cgi 接口，从而以其他用户身份执行操作，实现权限提升。该漏洞影响 EWS 1.1 版本，CVSS 评分 7.2，危害等级高。"
published = "1998-11-30T05:00:00.000"
remediation = "立即将 EWS 安装目录权限设置为仅 CGI 运行用户可访问，移除 Architext.conf 的世界可读权限（chmod 600），确保所有 EWS 文件非全局可写。同时修改认证机制，使用随机盐值加密密码，避免明文密码前两字符直接暴露在密文中。由于该产品已停止维护，建议迁移至其他受支持的 Web 服务器软件。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "Excite Excite for Web Servers 1.1 权限提升漏洞"
updated = "2026-06-16T21:49:39.783"

