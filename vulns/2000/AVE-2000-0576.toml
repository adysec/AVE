[basic]
description = "mopd（Maintenance Operations Protocol loader daemon，维护操作协议加载守护进程）存在格式化字符串注入漏洞，由于未能正确过滤用户输入的格式化字符串，远程攻击者无需身份认证即可向目标系统发送特制的格式化字符串载荷，触发该漏洞后可在目标系统上执行任意命令。该漏洞影响运行 mopd 服务的系统，CVSS 评分 7.5，危害等级高。"
published = "2000-10-20T04:00:00.000"
remediation = "升级 mopd（Maintenance Operations Protocol loader daemon）至已修复格式串处理缺陷的最新版本，或应用厂商提供的安全补丁。如无法立即升级，在防火墙层面限制对 mopd 服务端口（通常为 UDP 1509）的远程访问，仅允许可信 IP 段连接，同时禁用不必要的网络服务以减少攻击面。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "HP-UX mopd 格式化字符串远程代码执行漏洞"
updated = "2026-06-16T21:52:24.320"

