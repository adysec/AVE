[basic]
description = "Linux NFS（网络文件系统）服务器存在缓冲区溢出漏洞，未经身份认证的远程攻击者可通过向目标 NFS 共享发送包含超长路径名的请求触发溢出，进而在受影响系统上以 root 权限执行任意命令。该漏洞影响运行存在缺陷的旧版 Linux 内核及 NFS 服务器实现，攻击者只需能够访问目标系统的 NFS 服务端口即可发起利用，无需预先获取系统凭证或权限。"
published = "1999-11-09T05:00:00.000"
remediation = "立即升级 Linux 内核至包含 NFS 服务器路径名溢出修复的版本（内核 2.2.14 及以上或各发行商提供的安全补丁包），Red Hat Linux 6.2 用户应安装 Red Hat 官方 errata 中的更新内核及 nfs-utils 包，Debian 2.2（potato）用户应升级至 debian-security 1999-11-11 公告中发布的修正内核，SuSE 用户应应用 SuSE Security Announcement 29 中的安全更新。如暂时无法打补丁且 NFS 服务非必需，可在防火墙中禁用 TCP/UDP 2049 端口以阻止外部访问 NFS 服务作为临时缓解措施。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "Linux NFS 服务器缓冲区溢出远程代码执行漏洞"
updated = "2026-06-16T21:49:09.053"

