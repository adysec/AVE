[basic]
description = "Miva htmlscript 2.x 版本中存在目录遍历漏洞，该漏洞源于对用户输入路径未进行充分过滤。远程攻击者可通过向 htmlscript CGI 程序发送特制的包含路径遍历序列（如 `../`）的 HTTP 请求，突破 web 根目录限制，实现任意文件读取。攻击者可利用此漏洞读取服务器上的敏感文件，如配置文件、系统密码文件等，导致信息泄露。该漏洞无需身份认证即可利用，攻击复杂度低。"
published = "1998-01-27T05:00:00.000"
remediation = "升级 Miva htmlscript 至 3.0 及以上版本（该版本修复了目录遍历漏洞），或在 Web 服务器（Apache/Nginx）层面配置 URL 重写规则过滤 `../` 路径穿越字符，同时确保 CGI 脚本运行于受限目录权限下，禁止访问 `/etc/`、`/windows/` 等系统敏感路径。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Miva htmlscript 目录遍历漏洞"
updated = "2026-06-16T21:48:01.847"

