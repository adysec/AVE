[basic]
description = "Lilikoi Ceilidh 2.60 存在拒绝服务漏洞，远程攻击者可通过向目标系统发送大量 POST 请求，导致服务端资源耗尽而崩溃，造成拒绝服务。该漏洞影响 Ceilidh 2.60 版本，CVSS 评分 5.0，危害等级中等。攻击者无需认证即可触发，利用难度较低。"
published = "2000-06-09T04:00:00.000"
remediation = "建议升级到 Lilikoi Ceilidh 最新版本以修复该漏洞。如无法升级，可在反向代理层（如 Nginx/Apache）配置 POST 请求频率限制，限制单个 IP 的请求速率（如每秒不超过 10 个请求），并启用 Web 应用防火墙（WAF）过滤异常流量。同时，建议将管理界面限制在内网访问，减小攻击面。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Lilikoi Ceilidh 2.60 POST Request 拒绝服务漏洞"
updated = "2026-06-16T21:51:59.390"

