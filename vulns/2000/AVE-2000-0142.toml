[basic]
description = "SCO OpenServer 系统的 MMDF 邮件服务器存在缓冲区溢出漏洞，远程攻击者无需身份认证即可通过向 SMTP 守护进程发送超长的 MAIL FROM 命令触发缓冲区溢出，从而覆盖内存数据并获得目标系统的特权级访问权限。该漏洞允许攻击者在受影响系统上执行任意代码或提升权限，对系统安全构成严重威胁。受影响版本包括 SCO OpenServer 5.0.x 系列操作系统。"
published = "2000-02-16T05:00:00.000"
remediation = "立即安装 SCO 安全公告 SB-00.06a 中提供的 MMDF 补丁程序，升级到修复后的版本。如无法立即打补丁，可在防火墙层面限制对 SMTP 端口（25/TCP）的访问，仅允许受信任的邮件服务器连接，并禁用 MMDF 中不必要的 SMTP 功能作为临时缓解措施。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "MMDF SMTP 守护进程缓冲区溢出权限提升漏洞"
updated = "2026-06-16T21:51:07.263"

