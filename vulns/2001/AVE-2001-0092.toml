[basic]
description = "Brightstation Muscat 1.0 的 Empower CGI 程序存在路径泄露漏洞。远程攻击者可通过向 DB 参数发送无效请求获取服务器绝对路径名，从而为进一步攻击（如信息收集、目录遍历）提供基础。该漏洞无需认证即可远程利用，攻击复杂度低，CVSS 评分 5.0，危害等级中危。"
published = "2001-06-02T04:00:00.000"
remediation = "升级 Brightstation Muscat 至 1.0 以上版本。如果厂商已停止维护，建议在 Web 服务器层面（如 Apache）禁用 Muscat Empower CGI 脚本，或配置访问控制规则限制 CGI 目录的访问来源 IP。同时可在 application 层对 DB 参数进行输入过滤，拒绝包含路径遍历字符的异常请求。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Brightstation Muscat Empower CGI 绝对路径泄露漏洞"
updated = "2026-06-16T21:53:54.890"

