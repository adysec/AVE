[basic]
description = "Arm Ltd Valhall GPU Kernel Driver 及 Arm 5th Gen GPU Architecture Kernel Driver 存在释放后使用（Use-After-Free）漏洞。本地低权限用户进程通过不当 GPU 内存处理操作访问已释放内存，可导致敏感信息泄露和权限提升，攻击复杂度低且无需用户交互。"
published = "2025-05-02"
remediation = "将 Valhall GPU Kernel Driver 升级至 r49p4（r29p0-r49p3 分支）或 r54p0（r50p0-r53p0 分支）；将 Arm 5th Gen GPU Architecture Kernel Driver 升级至 r49p4（r41p0-r49p3 分支）或 r54p0（r50p0-r53p0 分支）。"
score = 7.8
severity = "HIGH"
sources = ["cve"]
title = "Arm Valhall/5th Gen GPU 内核驱动释放后使用漏洞"
updated = "2026-06-17"

