[basic]
description = "OpenClaw 组件在 macOS 平台上的 Swift exec 功能中存在白名单绕过漏洞，原因为未对组合 POSIX 内联命令标志进行有效检查。攻击者可通过构造特殊组合标志参数绕过白名单限制，执行任意 Shell 命令，导致远程代码执行。该漏洞影响使用 OpenClaw 的 macOS 系统，攻击成功可完全控制目标主机，危害严重。建议用户关注厂商更新并及时修复。"
published = "20260713"
remediation = '建议升级 OpenClaw 至 2026.7.1 及以上版本，该版本已修复 Swift exec 功能中组合 POSIX 内联命令标志的白名单绕过问题。如无法升级，可配置 `agents.defaults.sandbox.mode: "non-main"` 启用沙箱隔离，限制非主会话的 exec 操作；或在 macOS 网关配置中禁用 Swift exec 功能，仅允许通过白名单批准的独立命令执行。'
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "OpenClaw macOS Swift exec 白名单绕过漏洞"
updated = "20260713"

