[basic]
description = 'Titan FTP Server 10.40 build 1829之前版本的Web接口存在目录遍历漏洞（CWE-22）。远程攻击者可通过向Move操作中的src参数提交包含".."（点点）的恶意路径，绕过目录限制，跨目录复制任意用户的home文件夹内容。该漏洞影响Titan FTP Server 10.40 build 1829及更早版本，CVSS评分5.0，危害等级中危。攻击者无需认证即可利用此漏洞获取敏感文件，建议用户升级至10.40 build 1829或更高版本。'
published = "2014-04-29T10:37:03.763"
remediation = "立即升级 Titan FTP Server 至 10.40 build 1829 或更高版本，该版本已修复对 src 参数中 `..` 目录遍历序列的过滤。如无法升级，可在 web 界面前置反向代理中限制 Move 请求的 src 参数包含父目录跳转，或禁用 web 管理接口的远程访问。建议同时限制可访问 web 管理界面的 IP 范围。"
score = 5
severity = "MEDIUM"
sources = ["nuclei"]
title = "Titan FTP Server 目录遍历漏洞"
updated = "2026-06-17T00:05:38.707"

