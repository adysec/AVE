[basic]
description = "Linux 发行版中 lpr 软件包的行式打印机守护进程（lpd）存在认证绕过漏洞。该漏洞源于 lpd 在验证客户端身份时，仅通过反向解析攻击者 IP 的主机名与 gethostname 返回的打印服务器主机名进行比对，未实施任何加密或签名验证。远程攻击者只需控制目标 DNS 解析，将自身 IP 的反向解析结果伪造为打印服务器主机名，即可绕过访问控制，未经授权向 lpd 发送打印任务，甚至可能利用 lpd 的权限执行任意命令。该漏洞影响 RedHat 6.1、IRIX 6.5.18 等多款操作系统，CVSS 评分 10.0，危害等级严重。"
published = "2000-01-08T05:00:00.000"
remediation = "立即停止并禁用 lpd 服务（`service lpd stop && chkconfig lpd off`），该服务已过时且存在严重远程执行漏洞。如必须使用行式打印功能，建议迁移至 CUPS（Common Unix Printing System）替代 lpd。对于无法升级的遗留系统，在 `/etc/hosts.allow` 中添加 `lpd: ALL` 限制访问来源，并在防火墙层面仅允许受信任 IP 访问 TCP 515 端口作为临时缓解。"
score = 10
severity = "CRITICAL"
sources = ["redhat"]
title = "RedHat Linux / SGI IRIX lpr lpd 远程命令执行漏洞"
updated = "2026-06-16T21:53:24.660"

