[basic]
description = "SGI IRIX 6.4 的 xfsdump 工具在处理日志文件时存在不安全的符号链接漏洞。本地攻击者可通过创建指向系统关键文件（如 /etc/passwd）的符号链接 bck.log，诱使 xfsdump 以 root 权限写入日志，从而覆盖任意文件并提升至 root 权限。该漏洞影响 SGI IRIX 6.4 系统，需本地 shell 访问权限方可利用。"
published = "1997-05-07T04:00:00.000"
remediation = "SGI IRIX 已停止维护多年，官方不再提供安全更新。建议立即移除 xfsdump 的 setuid 权限（chmod u-s /usr/sbin/xfsdump），防止普通用户通过符号链接攻击提升至 root 权限。同时将备份日志目录 /var/log/xfsdump 的权限改为 750 并限制属主为 root，或改用不受影响的备份工具（如 tar）替代 xfsdump。"
score = 6.2
severity = "MEDIUM"
sources = ["epss"]
title = "SGI IRIX 6.4 xfsdump 本地权限提升漏洞"
updated = "2026-06-16T21:50:21.323"

