[basic]
description = "Linux 系统 pam_console PAM 模块在用户登录时会对各类设备执行 chown 操作，但用户登出后这些设备的文件描述符仍保持打开状态，导致该用户可以在后续其他用户登录时持续监听设备活动。该漏洞影响 Red Hat Linux 6.0/6.1/6.2 等版本，攻击者利用此漏洞可窃取其他用户的登录会话信息，造成敏感数据泄露。"
published = "2000-05-03"
remediation = "升级 pam_console 至 0.05 或更高版本，该版本在用户注销时正确关闭设备文件描述符。对于 Red Hat Linux 6.x 系统，安装官方 errata 安全更新 RHSA-2000:016。由于 Red Hat Linux 6 已停止维护，建议迁移至受支持的 RHEL/CentOS 7+ 或 Rocky Linux 8+ 等现代发行版。"
score = 7.2
severity = "HIGH"
sources = ["cve"]
title = "RedHat Linux pam_console 模块设备文件描述符残留信息泄露漏洞"
updated = "2026-06-16"

