[basic]
description = "用友U8Cloud的openapi接口存在SQL注入漏洞。攻击者可通过向openapi接口发送特制的恶意请求参数，利用参数过滤不严的缺陷注入恶意SQL语句，从而实现对后端数据库的越权查询与操作。成功利用该漏洞可导致敏感数据泄露（包括用户凭证、业务数据等），严重情况下可能进一步获取服务器控制权限。建议用户及时使用官方安全补丁工具安装对应版本补丁进行修复。"
published = "nday"
remediation = "使用U8C安全补丁升级工具，将securitypatch_tool目录放置到U8CERP目录下，从用友安全中心（security.yonyou.com）下载对应版本的补丁压缩包放入patchesUploadDir目录后执行升级。如无法立即打补丁，可配置WAF规则对openapi接口的输入参数进行SQL注入关键字过滤，或在中间件层面限制openapi接口的访问来源IP。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "用友 U8Cloud openapi SQL注入漏洞"
updated = "nday"

