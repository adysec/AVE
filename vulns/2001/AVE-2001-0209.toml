[basic]
description = "DCScripts DCForum 2000 及更早版本的用户注册功能存在权限提升漏洞。远程攻击者可在注册表单的姓氏字段中插入管道符（|）和换行符，导致系统在注册数据库中创建额外条目，从而获得管理员权限。攻击无需身份认证，攻击复杂度低，成功利用后可完全控制目标论坛系统。该漏洞 CVSS 评分 10.0，危害等级严重。"
published = "2001-08-14T04:00:00.000"
remediation = '立即升级 DCForum 至 2000 之后的版本（官方补丁页面 http://www.dcscripts.com/dcforum/dcfNews/167.html 已失效，该产品已停止维护）。如无法升级，在注册表单处理逻辑中对姓氏字段做严格输入过滤，禁止管道符（|）和换行符（\n）输入，并对所有用户输入进行转义处理后再写入数据库。建议迁移至仍在维护的论坛系统（如 phpBB 或 Discourse）以彻底消除风险。'
score = 10
severity = "CRITICAL"
sources = ["exploitdb"]
title = "DCScripts DCForum 远程权限提升漏洞"
updated = "2026-06-16T21:54:28.223"

