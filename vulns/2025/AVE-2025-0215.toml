[basic]
description = "宏景人力资源管理系统 orgsettree 接口存在 SQL 注入漏洞，攻击者无需身份认证即可通过构造特制的 HTTP 请求参数，向后台数据库注入恶意 SQL 语句，导致数据库中的敏感数据（如用户账号、密码、员工信息等）被窃取。该漏洞影响宏景人力资源管理系统的多个版本，攻击条件低，危害严重，建议用户尽快升级至最新版本或部署 Web 应用防火墙进行防护。"
published = "0719"
remediation = "联系宏景软件厂商获取官方安全补丁，升级至最新版本。如无法立即升级，在 `orgsettree` 接口中对所有入参使用参数化查询或预编译语句，严格过滤用户输入，限制特殊字符。同时配置 Web 应用防火墙（WAF）添加 SQL 注入拦截规则，并限制该系统后台管理地址的访问来源 IP。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "宏景人力资源管理系统 orgsettree SQL 注入漏洞"
updated = "0719"

