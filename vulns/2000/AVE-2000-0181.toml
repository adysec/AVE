[basic]
description = "Trend Micro OfficeScan 存在远程管理命令重放漏洞，远程攻击者可通过网络嗅探捕获管理员与 OfficeScan 服务器之间未加密的通信流量，重放已捕获的管理命令，从而修改 OfficeScan 客户端的配置策略，导致客户端防护功能失效或服务中断。该漏洞影响 Trend Micro OfficeScan 早期版本，攻击者无需身份认证即可实施攻击，危害等级中危。"
published = "2000-03-03T05:00:00.000"
remediation = "立即升级 Trend Micro OfficeScan 至受支持的最新版本（Apex One 或 Worry-Free Business Security Services），该漏洞在后续版本中已修复。如无法升级，在管理控制台启用 HTTPS 通信和客户端身份验证，限制管理端口的网络访问来源，仅允许受信任的管理员 IP 连接，防止攻击者重放管理命令篡改客户端配置。"
score = 6.4
severity = "MEDIUM"
sources = ["cve"]
title = "趋势科技 OfficeScan 远程配置篡改漏洞"
updated = "2026-06-16T21:51:13.267"

