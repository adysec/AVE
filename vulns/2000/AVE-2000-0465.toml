[basic]
description = "DALnet Bahamut IRCd 4.6.5 在 SUMMON 命令处理中存在缓冲区溢出漏洞。远程攻击者无需身份认证，通过向运行该 IRC 服务器的目标发送特制的 SUMMON 命令参数即可触发堆栈缓冲区溢出，导致服务崩溃或执行任意代码。该漏洞 CVSS 评分 10.0，危害等级严重，影响所有运行 DALnet Bahamut IRCd 4.6.5 的服务器。"
published = "2000-06-29T04:00:00.000"
remediation = "立即升级 Dalnet Bahamut IRCd 至 4.6.5 以上版本（当前最新稳定版为 2.2.4），该漏洞已在后续版本中修复。如无法升级，可在 ircd.conf 中禁用 SUMMON 命令（设置 disable_summon = yes），并在防火墙层面限制 IRC 服务器端口（6660-6669/TCP）仅允许可信 IP 访问作为临时缓解措施。"
score = 10
severity = "CRITICAL"
sources = ["exploitdb"]
title = "DALnet Bahamut IRCd 4.6.5 SUMMON 命令远程缓冲区溢出漏洞"
updated = "2026-06-16T21:52:03.320"

