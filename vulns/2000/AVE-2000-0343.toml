[basic]
description = "Cayman 3220-H DSL 路由器存在 ICMP 数据包处理缺陷，远程攻击者可通过发送超大的 ICMP Echo（Ping）请求包触发缓冲区溢出，导致路由器崩溃或重启，造成拒绝服务。该漏洞无需身份认证即可远程利用，攻击条件简单，仅需发送特制的大尺寸 Ping 包即可生效，影响所有运行受影响固件版本的 Cayman 3220-H 设备。"
published = "2000-05-23T04:00:00.000"
remediation = "该设备已停止技术支持，无官方固件更新。建议在网络边界防火墙或路由器上配置 ACL 规则，丢弃 ICMP 数据包长度超过正常范围（如超过 65507 字节）的请求，或直接限制 ICMP 报文速率。如业务允许，可在边界防火墙上完全禁用入站 ICMP echo request 以彻底消除风险。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Cayman 3220-H DSL Router ICMP Ping 数据包拒绝服务漏洞"
updated = "2026-06-16T21:51:40.560"

