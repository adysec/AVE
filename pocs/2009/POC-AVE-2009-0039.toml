[info]
author = "ave"
description = "检测 Adobe Flash Player 和 Adobe AIR 是否存在 JPEG 解析堆缓冲区溢出漏洞（CVE-2009-3794）。该漏洞源于 SWF 文件中嵌入的 JPEG 数据尺寸参数处理不当，可能导致远程代码执行。"
id = "POC-AVE-2009-0039"
name = "Adobe Flash Player/AIR JPEG 解析堆溢出漏洞 PoC"
severity = "high"
tags = ["ave-2009-0039"]
vuln_id = [
    "CVE-2009-3794",
    "AVE-2009-0039",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["Flash"]
