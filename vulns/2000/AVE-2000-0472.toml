[basic]
description = "Allmanage 网站管理软件的管理员密码以明文形式存储在服务器上的文件中，远程攻击者无需身份认证即可通过 HTTP 访问该文件获取管理员密码，进而完全控制网站后台。该漏洞影响 Allmanage 全版本，攻击复杂度低，仅需知道文件路径即可利用，可导致敏感信息泄露和系统权限被接管。"
published = "2000-05-13T04:00:00.000"
remediation = "立即将 Allmanage 管理后台的密码存储方式从明文文件改为加密存储（如 bcrypt 哈希），并对存储密码的文件（如 admin_pass.txt）设置严格的 Web 服务器访问权限（禁止直接通过 HTTP 访问该文件路径）。由于该软件年代久远已停止维护，建议迁移至支持安全认证的现代网站管理平台，同时在 Web 服务器层面添加额外身份验证（如 .htaccess 基本认证）作为临时缓解措施。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "Allmanage 网站管理软件管理员密码明文存储漏洞"
updated = "2026-06-16T21:51:43.500"

