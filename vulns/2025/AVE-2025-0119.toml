[basic]
description = "用友NC的/portal/pt/oacoSchedulerEvents/listUserSharingEvents接口中agent参数存在SQL注入漏洞。攻击者可在未授权情况下通过构造恶意SQL语句利用该漏洞，结合Oracle数据库的UTL_INADDR.GET_HOST_ADDRESS函数进行报错注入，从而窃取数据库敏感信息。该漏洞影响用友NC全系列版本，危害较大。"
published = "2025-07-01"
remediation = "联系用友官方获取NC产品安全补丁并升级至最新版本。临时缓解措施：在WAF/IPS设备上添加规则拦截listUserSharingEvents接口的SQL注入攻击载荷，过滤UTL_INADDR、AND、OR等SQL关键字；通过访问控制策略限制对/portal/pt/oacoSchedulerEvents/路径的外部访问；对agent参数实施严格的输入校验和参数化查询处理。"
score = 5.0
severity = "MEDIUM"
sources = ["hwpoc"]
title = "用友NC listUserSharingEvents SQL注入漏洞"
updated = "2026-07-20"

