[basic]
description = "Windows NT 和 Windows 2000 系统的账户锁定策略存在安全配置不当漏洞，默认情况下账户锁定阈值、锁定持续时间及锁定计数器重置时间等关键参数未设置或设置不合理，导致远程攻击者可对用户账户进行暴力破解或字典攻击，无需触发账户锁定机制即可持续尝试登录。该漏洞影响 Windows NT 4.0 及 Windows 2000 系统，攻击者只需通过网络可达即可利用，无需任何身份认证。建议管理员通过本地安全策略配置账户锁定阈值（如 5 次无效登录后锁定）以缓解风险。"
published = "1997-01-01T05:00:00.000"
remediation = '在「本地安全策略 → 账户策略 → 账户锁定策略」中，将账户锁定阈值设为 3 至 5 次无效登录，账户锁定时间设为 15 分钟以上（或设为"直到管理员解锁"），并将"重置账户锁定计数器"设为 15 分钟。域环境通过组策略（gpedit.msc / 域 GPO）统一下发，最后运行 gpupdate /force 刷新策略并复核生效。'
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Microsoft Windows NT/2000 账户锁定策略配置不当漏洞"
updated = "2026-06-16T21:48:40.593"

