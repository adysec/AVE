[basic]
description = "AnalogX SimpleServer:WWW 1.06 及更早版本存在目录遍历漏洞，远程攻击者无需认证，可通过将点号（.）编码为 %2E 的方式绕过路径过滤，向目标服务器发送特制的 HTTP 请求，实现任意文件读取。该漏洞可导致服务器上的敏感信息（如配置文件、系统文件等）被未授权访问，严重威胁系统安全。"
published = "2000-07-26T04:00:00.000"
remediation = "立即升级 AnalogX SimpleServer:WWW 至 v1.07 或更高版本（当前最新为 v1.24），该版本已修复 %2E 编码的目录遍历问题。下载地址：http://www.analogx.com/contents/download/network/sswww.htm。如无法升级，可在反向代理或网关上配置 URL 过滤规则，拦截包含 %2E%2E%2F 等目录遍历特征的请求作为临时缓解。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "AnalogX SimpleServer:WWW 目录遍历漏洞"
updated = "2026-06-16T21:52:13.153"

