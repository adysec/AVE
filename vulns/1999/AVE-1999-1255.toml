[basic]
description = "Digital Equipment Corporation（DEC）的 Ultrix 4.0 与 4.1 操作系统中，/usr/bin/chroot 程序由于安装权限配置不当（如设置了危险的 setuid 位），存在本地权限提升漏洞。已登录系统的本地普通用户可借助该不安全的 chroot 程序，绕过文件系统的根目录隔离限制，进而获取 root 等更高权限。该漏洞影响运行 Ultrix 4.0 及 4.1 版本且安装了存在缺陷 chroot 二进制的系统，攻击前提是攻击者需先获得目标主机的本地普通用户访问权限，属于一种本地提权利用方式。"
