[basic]
description = "Microsoft IIS 4.0 的 Pickup 目录存在拒绝服务漏洞，本地攻击者通过在该目录下创建文件名超长且扩展名为 .txt.eml 的邮件文件，可触发 Inetinfo.exe 进程崩溃，导致 IIS 邮件服务不可用。该漏洞影响 IIS 4.0 版本，利用条件为攻击者需具备本地文件写入权限，CVSS 评分 2.1，危害等级低，属于本地拒绝服务漏洞。"
published = "2000-02-15T05:00:00.000"
remediation = '该漏洞影响已停止支持的 Microsoft IIS 4.0（Windows NT 4.0 Option Pack），微软未发布针对此版本的安全更新。建议升级至 Windows Server 2003 及以上版本的 IIS 6.0 或更高版本；如无法升级，可通过 NTFS 权限限制本地用户对 %SystemRoot%\System32\Inetsrv\mailroot\Pickup 目录的写入权限，并启用文件名字长检查作为临时缓解措施。'
score = 2.1
severity = "LOW"
sources = ["avd"]
title = "Microsoft IIS 4.0 Pickup 目录拒绝服务漏洞"
updated = "2026-06-16T21:51:08.410"

