[basic]
description = "F5 BIG-IP 2.1.2 及更早版本中的 bigconf.conf 文件存在任意文件读取漏洞。远程攻击者无需认证即可向该文件发送精心构造的请求，通过在 file 参数中指定任意目标文件路径，读取服务器上的敏感文件（如配置文件、系统密码等）。该漏洞影响范围较广，可导致敏感信息泄露，CVSS 评分 5.0，危害等级中危。"
published = "1999-11-08T05:00:00.000"
remediation = "升级 F5 BIG/ip 至 2.1.3 或更高版本，该版本已修复 bigconf.conf 的 file 参数路径校验缺陷。如无法升级，在反向代理或 WAF 层面对 /bigconf.conf 路径及 file 参数实施访问控制与输入过滤，拒绝包含路径遍历符（如 ../）的请求。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "F5 BIG/ip 任意文件读取漏洞"
updated = "2026-06-16T21:50:41.830"

