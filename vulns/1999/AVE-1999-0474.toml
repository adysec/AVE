[basic]
description = "Netscape Enterprise Server 3.5.1 及 FastTrack 3.01 版本存在源代码泄露漏洞。远程攻击者通过在脚本 URL 后附加 %20（URL 编码的空格字符），可绕过服务器对脚本文件的访问限制，直接查看服务器端脚本的源代码。该漏洞导致敏感业务逻辑、数据库连接信息等泄露，为后续攻击提供便利。攻击无需认证，仅需构造特制 URL 即可触发，利用难度低。受影响版本包括 Netscape Enterprise Server 3.5.1 和 FastTrack 3.01。"
published = "2001-03-12T05:00:00.000"
remediation = "升级 Netscape Enterprise Server 至 3.6 及以上版本，或升级 FastTrack 至 4.0 及以上版本。如无法升级，在服务器配置中禁用脚本源码泄露功能，并配置 Web 服务器仅解析 .cgi/.pl 等脚本扩展名，拒绝直接访问脚本文件。长期建议迁移至 Apache 或 Nginx 等现代 Web 服务器。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Netscape Enterprise Server 源代码泄露漏洞"
updated = "2026-06-16T21:48:59.743"

