[basic]
description = "SmarterTools SmarterMail 的密码重置接口存在认证绕过漏洞（CWE-288），其 `/api/v1/auth/force-reset-password` 端点允许未经身份认证的匿名请求，且在重置系统管理员密码时未验证原密码或重置令牌。远程攻击者仅需知道管理员用户名即可通过发送特制 POST 请求直接重置管理员账户密码，成功接管管理员权限后，可利用内置的 Volume Mounts 功能执行任意操作系统命令，实现从账户接管到远程代码执行的完整攻击链。该漏洞影响 Build 9511 之前的所有 SmarterMail 版本，CVSS 评分 9.8，危害严重，已被 CISA 列入已知被利用漏洞目录（KEV）。"
published = "nday"
remediation = "立即将 SmarterMail 升级至 Build 9511 或更高版本（最新 Build 9693），该版本针对 /api/v1/auth/force-reset-password 端点增加了旧密码验证逻辑。如无法立即升级，可在 Web 服务器或防火墙上限制该 API 端点的外部访问，并检查系统事件钩子（System Events）中是否存在可疑的命令执行条目。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "SmarterTools SmarterMail 密码重置接口认证绕过漏洞"
updated = "nday"

