[basic]
description = "Aladdin eSafe Gateway 3.0 及更早版本存在 Unicode 编码绕过漏洞，远程攻击者可通过将 HTML 文档中的 SCRIPT 标签进行 Unicode 编码，绕过网关的 HTML 脚本过滤机制。成功利用该漏洞可导致跨站脚本攻击（XSS），造成敏感信息泄露、会话劫持或恶意脚本执行。攻击无需认证，仅需诱使用户访问特制网页即可触发。"
published = "2001-08-14T04:00:00.000"
remediation = "升级到 Aladdin eSafe Gateway 3.0 以上版本（如 3.1 或更高），该漏洞已在后续版本中修复。由于该产品已停止维护，建议迁移至现代 Web 安全网关产品（如 Fortinet FortiWeb、F5 BIG-IP ASM 等），并在迁移前在网络层部署 WAF 规则对 Unicode 编码的 `<SCRIPT>` 标签进行规范化检测和拦截。"
score = 7.5
severity = "HIGH"
sources = ["exploitdb"]
title = "Aladdin eSafe Gateway 3.0 Unicode 脚本过滤绕过漏洞"
updated = "2026-06-16T21:54:27.450"

