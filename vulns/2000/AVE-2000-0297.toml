[basic]
description = "SCO UnixWare 2.1.x 及 OpenServer 5.05 及更早版本中的 xserver 组件存在安全漏洞，本地攻击者可通过向 xserver 发送特制请求导致系统拒绝服务，使得系统无法正常分配 1024 以下的保留端口号，影响关键网络服务的正常运行。该漏洞利用条件简单，攻击者需具有本地访问权限即可触发。"
published = "2001-03-12T05:00:00.000"
remediation = "升级至 SCO OpenServer 5.0.6 或更高版本，该版本已修复 xserver 对保留端口（1024 以下）的访问控制缺陷。无法升级时，可通过限制本地用户对 X 服务器的访问权限或禁用 xserver 的 setuid 位作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "SCO OpenServer xserver 拒绝服务漏洞"
updated = "2026-06-16T21:51:26.633"

