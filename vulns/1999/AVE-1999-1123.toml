[basic]
description = "Internet Explorer 3.02 及 4.0 版本在处理页面重定向时存在认证信息泄露漏洞。当用户访问的网站将浏览器重定向至第三方站点时，IE 会自动将原始站点的认证凭据（如 HTTP 基本认证信息）发送给目标站点，导致敏感信息泄露。攻击者可构造恶意重定向页面诱使用户访问，从而窃取用户在其他站点上的认证凭据。"
published = "1999-12-31T05:00:00.000"
remediation = "立即升级 Internet Explorer 至 5.01 及以上版本（微软已于 KB176697 补丁中修复此问题），IE 3.02 和 4.0 已停止支持且存在多项安全缺陷，建议同时升级操作系统至受支持版本并使用 Edge 浏览器。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Microsoft Internet Explorer 页面重定向认证信息泄露漏洞"
updated = "2026-06-16T21:50:31.017"

