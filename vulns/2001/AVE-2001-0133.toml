[basic]
description = "Pi3Web 1.0.1 Web 服务器中的 tstisapi.dll 组件存在缓冲区溢出漏洞，远程攻击者可通过向目标服务器发送特制超长 URL 请求触发该漏洞，导致拒绝服务，在特定条件下可能执行任意命令。该漏洞影响 Pi3Web 1.0.1 版本，CVSS 评分 5.0，危害等级中等。"
published = "2001-05-03T04:00:00.000"
remediation = "Pi3Web 1.0.1 已停止维护，不再发布安全更新。建议立即卸载 Pi3Web，迁移至 IIS、Apache 或 Nginx 等仍在支持的 Web 服务器。作为临时缓解措施，可在防火墙或反向代理层限制对 tstisapi.dll 所在路径的访问，或禁用 ISAPI 扩展。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Pi3Web 1.0.1 缓冲区溢出漏洞"
updated = "2026-06-16T21:54:03.607"

