[basic]
description = "SCO UNIX System V/386 Release 3.2 及其他 SCO 产品在安装时，将 dos 用户的家目录设置为 /tmp，将 asg 用户的家目录设置为 /usr/tmp。由于 /tmp 和 /usr/tmp 目录具有全局可写权限，导致其他本地用户能够通过访问这些共享目录获取对 dos 和 asg 用户账户的未授权访问权限，进而可能提升权限或获取敏感信息。"
published = "1993-09-17"
remediation = "建议管理员手动将 dos 和 asg 用户的家目录迁移至非全局可写位置（如 /home/dos 和 /home/asg），并设置适当的目录权限（如 750），限制其他用户的访问。"
score = 5.0
severity = "MEDIUM"
sources = ["avd"]
title = "SCO UNIX System V/386 及其他 SCO 产品用户目录权限配置不当漏洞"
updated = "2026-06-16"

