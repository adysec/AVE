[basic]
description = "WordPress 的 church_admin 插件 0.810 版本之前存在跨站脚本（XSS）漏洞，远程攻击者无需身份认证即可通过 `address` 参数向页面注入任意 Web 脚本或 HTML 代码。当管理员或用户访问特制的 URL（如 `index.php/2015/05/21/church_admin-registration-form/`）时，恶意脚本将在浏览器中执行，可能导致会话劫持、敏感信息泄露等危害。该漏洞影响 church_admin 0.809 及更早版本，攻击复杂度低，仅需诱使用户点击恶意链接即可触发。"
published = "2015-05-28T14:59:08.440"
remediation = "立即将 church_admin 插件升级到 0.810 或更高版本。如无法升级，可在 WordPress 后台插件编辑器中删除或重命名 church_admin 插件目录，或通过 Web 应用防火墙（WAF）规则过滤 address 参数中的恶意 HTML/JavaScript 字符作为临时缓解措施。"
score = 4.3
severity = "MEDIUM"
sources = ["nuclei"]
title = "WordPress church_admin 插件跨站脚本漏洞"
updated = "2026-06-17T00:26:47.240"

