[basic]
description = "WU-FTPD 2.6.1 及更早版本在启用 debug mode 时存在格式化字符串漏洞，远程攻击者可通过向 PASV 端口分配过程提交特制参数触发该漏洞，导致任意命令执行。该漏洞影响 WU-FTPD 2.4.2/2.5/2.6 等多个版本，CVSS 评分 10.0，危害等级严重。攻击者无需认证即可远程利用，建议禁用调试模式或升级至最新版本。"
published = "2001-03-26"
remediation = "升级 wu-ftpd 至 2.6.2 或更高版本，该版本已修复此格式化字符串漏洞。若无法升级，下载并应用官方补丁 ftp://ftp.wu-ftpd.org/pub/wu-ftpd/patches/apply_to_current/missing_format_strings.patch，并在配置文件中禁用 debug mode 选项，限制 FTP 服务（端口 21）的访问来源。"
score = 10.0
severity = "CRITICAL"
sources = [
    "cve",
    "exploitdb",
]
title = "WU-FTPD 调试模式主机名格式字符串远程代码执行漏洞"
updated = "2026-06-16"

