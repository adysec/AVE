[basic]
description = "Novell Netware 4.1/4.11 的 NDS（Novell Directory Services）在安装 SP5B 补丁后，默认权限配置存在缺陷，未经验证的远程客户端对目录树具有读取权限。攻击者无需任何身份认证即可通过 CX.EXE 和 NLIST.EXE 等工具远程访问 NDS 树中的敏感信息，包括用户账户、用户组及其他可读对象。该漏洞影响 Novell Netware 4.1 及 4.11 版本，CVSS 评分 7.5，危害等级高，可导致企业内部敏感目录信息泄露。"
published = "1998-09-18T04:00:00.000"
remediation = "升级 Novell NetWare 至 SP6 及以上版本，或安装 NDS 安全补丁。在 NDS 树属性中移除 [Public] 条目的默认 Read 权限，通过 NWAdmin 或 ConsoleOne 限制未认证用户的浏览和查询操作，仅允许已认证用户访问目录信息。"
score = 7.5
severity = "HIGH"
sources = ["exploitdb"]
title = "Novell Netware NDS 默认读取权限信息泄露漏洞"
updated = "2026-06-16T21:49:32.213"

