[basic]
description = "IBM AIX 系统中的 syslog 组件存在日志写入权限缺陷，攻击者可从任意位置向 syslog 文件写入大量日志条目，导致磁盘空间被占满从而引发拒绝服务。同时，恶意日志会淹没正常审计记录，掩盖攻击者的操作痕迹，增加安全检测与溯源难度。该漏洞影响 IBM AIX 操作系统，CVSS 评分 5.0，危害等级中危。"
published = "1997-08-01T04:00:00.000"
remediation = "升级 IBM AIX 至 4.3.3 或更高版本，安装 APAR IX87386 补丁。同时配置 syslogd 限制远程写入（修改 /etc/syslog.conf 禁用非必要远程日志接收），在 /etc/hosts.allow 中限制 syslog 端口（UDP 514）的访问来源，并启用日志轮转（logrotate）防止单一日志文件过大导致磁盘写满。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "IBM AIX syslog 日志填充拒绝服务漏洞"
updated = "2026-06-16T21:48:39.053"

