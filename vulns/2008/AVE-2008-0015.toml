[basic]
description = "Parallels H-Sphere 3.0.0 P9 及 3.1 P1 版本中 webshell4 组件的 login.php 存在多个跨站脚本（XSS）漏洞，远程攻击者可向 err、errorcode 及 login 等参数注入任意 Web 脚本或 HTML 代码，在用户浏览器中执行恶意脚本，窃取会话 Cookie 或重定向至钓鱼页面。攻击者无需身份认证，仅需诱使用户点击恶意链接即可触发，CVSS 评分 4.3，危害等级中危。"
published = "2009-03-13T10:30:00.577"
remediation = "升级 Parallels H-Sphere 至 3.1 P1 之后的修复版本（如 3.1 P2 或更高），该版本已对 login.php 中 err、errorcode、login 参数做输出编码处理。若产品已停止维护无法升级，建议在 Web 服务器层（如 Apache mod_security）编写规则过滤含 <script> 等标签的请求参数，并对 login.php 的上述参数实施严格的输入验证和 HTML 实体编码输出，防止恶意脚本注入。"
score = 4.3
severity = "MEDIUM"
sources = ["nuclei"]
title = "Parallels H-Sphere login.php 跨站脚本漏洞"
updated = "2026-06-16T23:02:16.683"

