[basic]
description = "CVE-2001-0558漏洞影响T. Hauck Jana Server 1.45/1.46/2.0及更高版本的Web服务器，该服务器在处理HTTP请求时对MS-DOS设备名称（如aux/prn等）进行不安全的检查。当攻击者向目标服务器发送包含MS-DOS设备名（例如GET /aux HTTP/1.0）的URL请求时，服务器会导致请求处理堆栈异常进而崩溃或停止服务，实现远程拒绝服务攻击。该漏洞是一种基于原始网络输入的内存访问控制缺陷，攻击者无需身份验证即可通过简单的HTTP请求触发。当服务器启动时，对于/MS-DOS风格的设备名称，服务器并未正确处理它们，导致系统资源耗尽或服务不可用。该漏洞影响Windows平台下的Jana Web服务器，攻击可能导致服务器完全不可用，影响企业业务连续性和网络服务稳定性。攻击者可以轻松利用这种简单的请求就能达到破坏服务的效果，攻击方式极其简单直接，迫使管理员紧急采取服务中断等措施应对，极大的影响了系统的可用性。因此，这是一个低复杂度、可直接远程利用的拒绝服务漏洞，攻击者无需任何权限或特殊工具，只需构造一个包含MS-DOS设备名的简单HTTP请求，即可使受害服务器崩溃或停止响应，完全暴露了该Web服务器对URL路径进行不安全检查的安全缺陷。"
published = "2001-08-14T04:00:00.000"
remediation = "升级到 Jana Server 2.01 正式版或更高版本，该版本已修复 MS-DOS 设备名称请求导致的崩溃问题。如暂无法升级，应在防火墙或反向代理层过滤包含 MS-DOS 设备名称（CON、AUX、PRN、COM1、LPT1 等）的 HTTP 请求路径，或暂时关闭 Jana Server 面向公网的访问。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "T. Hauck Jana Server MS-DOS 设备名拒绝服务漏洞"
updated = "2026-06-16T21:54:31.887"

