[basic]
description = "TalentSoft Web+ 4.x 购物车应用中的 webpsvr 守护进程存在目录遍历漏洞，远程攻击者无需身份认证即可通过向 webplus CGI 程序提交包含 `../` 序列的恶意请求，突破路径限制读取服务器上的任意文件。该漏洞可导致敏感信息泄露（如配置文件、系统密码文件等），攻击复杂度低，危害较大。"
published = "2000-04-12T04:00:00.000"
remediation = '立即升级至 TalentSoft Web+ 5.0 或更高版本（若厂商已停止支持则须迁移至其他购物车系统）。临时缓解措施：在 Web 服务器或反向代理层添加规则，拦截包含 ".." 及 "%2e%2e" 等目录遍历特征的请求路径，同时限制 webplus CGI 程序的访问权限为只读目录，禁用不必要的文件读取功能。'
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "TalentSoft Web+ 目录遍历漏洞"
updated = "2026-06-16T21:51:23.500"

