[basic]
description = "ScreamingMedia SITEWare 2.5 至 3.1 版本存在目录遍历漏洞。远程攻击者无需身份认证，通过在 SITEWare Editor's Desktop 或 SWEditServlet 的 template 参数中构造 `../` 序列进行路径穿越，可读取服务器上任意可读文件，导致敏感信息泄露。该漏洞 CVSS 评分 10.0，危害等级严重。Exploit-DB 上已有公开利用代码。"
published = "2001-08-14T04:00:00.000"
remediation = """立即升级 ScreamingMedia SITEWare 至 3.1 以上版本（厂商已发布补丁 sms1001.php）。如无法升级，在 Web 服务器层面限制对 SWEditServlet 和 Editor's Desktop 的访问（如通过 .htaccess 或防火墙仅允许可信 IP），并对 template 参数进行严格的路径过滤，拒绝包含 "../" 或空字节的请求。由于该产品已停止维护，建议迁移至其他受支持的 Web 内容管理平台。"""
score = 10
severity = "CRITICAL"
sources = ["exploitdb"]
title = "ScreamingMedia SITEWare 目录遍历漏洞"
updated = "2026-06-16T21:54:31.523"

