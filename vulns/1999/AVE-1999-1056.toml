[basic]
description = "Hylafax 是一款开源的传真服务器软件。该漏洞存在于 Hylafax 4.0.2 版本的 faxalter 命令中，由于程序在处理用户通过 -m 命令行参数传入的数据时未对输入长度进行充分边界检查，导致本地缓冲区溢出。攻击者若已拥有目标系统的本地用户权限，可通过构造并传入超长的 -m 命令行参数触发该溢出漏洞，进而提升自身权限至更高特权级别，可能获取系统管理员权限。该漏洞危害等级为高危，CVSS 评分 7.2，影响所有部署 Hylafax 4.0.2 版本的系统。"
published = "1999-11-04T05:00:00.000"
remediation = "建议将 HylaFAX 从受影响的 4.0.2 版本升级到官方修复版本 4.1 及以上（通过源码重新编译安装或发行版更新包）。如无法立即升级，可临时移除 faxalter 程序的 setuid 权限位（chmod u-s /usr/bin/faxalter），并通过 sudo 限制仅有 fax 组用户可执行该程序，以避免本地用户利用长 -m 参数提权。"
score = 7.2
severity = "HIGH"
sources = ["exploitdb"]
