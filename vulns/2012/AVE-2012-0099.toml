[basic]
description = "Adobe Flash Player 存在通用跨站脚本（Universal XSS）漏洞，远程攻击者可通过构造特制的恶意网页诱使用户访问，在受影响的 Flash Player 环境中注入任意 Web 脚本或 HTML 代码，导致用户会话劫持、敏感信息泄露或钓鱼攻击。该漏洞影响 Windows、Mac OS X、Linux、Solaris 及 Android 2.x/3.x/4.x 平台上的 Flash Player 10.3.183.15 之前版本和 11.1.102.62 之前的 11.x 版本，攻击者无需身份认证但需用户交互（点击链接或访问恶意页面）。该漏洞已在 2012 年 2 月被野外利用，Adobe 已发布安全更新修复。"
published = "2012-02-16T19:55:01.303"
remediation = '立即卸载 Adobe Flash Player（已于 2020 年 12 月 31 日停止支持且不再提供安全更新）。Windows 可通过控制面板"程序和功能"卸载 Flash Player，或运行 Adobe 官方卸载工具；macOS 运行官方卸载程序；Linux 通过包管理器卸载 flashplugin-package。浏览器端彻底禁用 Flash 插件（Chrome/Edge/Firefox 均已默认禁用并移除支持）。如业务强依赖旧版 Flash 内容，仅可在隔离离线环境运行，严禁联网访问。不再建议升级到 10.3.183.15/11.1.102.62 等旧版本，因全系版本均已停止维护且存在大量未修复漏洞。'
score = 6.1
severity = "MEDIUM"
sources = ["kev"]
title = "Adobe Flash Player 跨站点脚本漏洞"
updated = "2026-06-16T23:38:13.193"

