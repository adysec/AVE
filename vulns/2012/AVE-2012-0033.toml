[basic]
description = "Microsoft Windows 的 Authenticode 代码签名验证功能（WinVerifyTrust）存在签名校验绕过漏洞。该漏洞源于系统在对已签名的可移植可执行文件（PE）进行摘要验证时，未能正确校验数字签名的完整性，导致攻击者可在不破坏原有签名的情况下向合法签名的 PE 文件中添加恶意载荷。攻击者需要诱使用户打开特制的恶意文件（如通过钓鱼邮件或恶意网站），即可在目标系统上以当前用户权限执行任意代码。该漏洞影响 Windows XP SP2/SP3、Server 2003 SP2、Vista SP2、Server 2008 SP2/R2/R2 SP1、Windows 7 Gold/SP1 及 Windows 8 Consumer Preview 等多个版本，已被 CISA KEV 收录，表明已存在在野利用。"
published = "2012-04-10T21:55:01.597"
remediation = "立即安装微软 2012 年 4 月安全更新 MS12-024 (KB2653956)，该补丁修复了 WinVerifyTrust 签名验证函数对 PE 文件摘要校验不充分的问题。Windows 7 及更早系统可通过 Windows Update 自动获取更新；Windows XP SP3 用户需手动下载 KB2653956 安装。对于无法打补丁的旧系统，建议限制用户仅从可信来源运行可执行文件，并部署应用程序白名单策略（如 AppLocker）阻止未签名或篡改的 PE 文件执行。"
score = 7.8
severity = "HIGH"
sources = ["kev"]
title = "Microsoft Windows Authenticode签名验证远程代码执行漏洞"
updated = "2026-06-16T23:36:47.550"

