[basic]
description = "QuickTime 的 quicktime.qts 组件在处理电影文件中的裁剪区域（clipping region，简称 crgn）原子时存在基于堆的缓冲区溢出漏洞。远程攻击者可构造包含特制裁剪区域数据的恶意电影文件，当用户使用低于 7.4.5 版本的 Apple QuickTime 打开该文件时，程序在解析 crgn 原子过程中触发堆溢出，导致程序崩溃或在目标系统上执行任意代码。该漏洞影响 Windows 及 macOS 平台上所有 QuickTime 7.4.5 之前的版本，攻击者需诱导用户打开恶意电影文件才能利用成功，利用条件要求一定的用户交互。Apple 已在 QuickTime 7.4.5 及后续版本中修复了该漏洞，CVSS v3 评分为 6.8，危害等级为中等。"
published = "2008-04-04T17:44:00.000"
remediation = "建议将 Apple QuickTime 升级至 7.4.5 或更高版本，修复 quicktime.qts 中 crgn atom 处理函数的堆缓冲区溢出漏洞。如无法立即升级，可暂时卸载 QuickTime 或禁用浏览器中的 QuickTime 插件作为临时缓解措施，并避免打开来源不可信的 .mov 及 .pict 媒体文件。"
score = 6.8
severity = "MEDIUM"
sources = ["tenable"]
title = "Apple QuickTime 堆缓冲区溢出远程代码执行漏洞"
updated = "2026-06-16T22:50:48.887"

