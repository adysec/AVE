[basic]
description = "Progressive Networks Real Video server（pnserver）存在远程拒绝服务漏洞。远程攻击者无需身份认证即可通过发送特制数据包触发该漏洞，导致服务崩溃，影响正常视频流服务。该漏洞利用难度较低，攻击条件简单，但仅影响服务可用性，不会导致数据泄露或权限提升。"
published = "1998-01-15T05:00:00.000"
remediation = "建议立即升级至已修复该漏洞的 Progressive Networks RealVideo Server 最新版本，或从网络层面在防火墙上限制对 pnserver 服务端口（默认 TCP 7070）的访问来源，仅允许可信 IP 连接。由于该产品已长期停止维护，强烈建议迁移至现代受支持的流媒体服务器（如 Wowza Streaming Engine 或 Nginx-RTMP）以彻底消除风险。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Progressive Networks Real Video Server 远程拒绝服务漏洞"
updated = "2026-06-16T21:48:02.730"

