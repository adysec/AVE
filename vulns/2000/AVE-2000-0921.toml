[basic]
description = "nss_ldap 版本 121 之前在与 nscd（名称服务缓存守护进程）配合使用时存在拒绝服务漏洞。远程攻击者可通过向目标系统发送大量 LDAP 请求，导致 nscd 服务资源耗尽或崩溃，从而造成拒绝服务。该漏洞攻击复杂度较高，需要远程网络访问能力，但无需身份认证即可触发。nss_ldap 是 Linux/Unix 系统中用于通过 LDAP 目录服务解析用户和组信息的模块，广泛应用于企业级身份认证场景。"
published = "2000-12-11T05:00:00.000"
remediation = "升级 nss_ldap 至 121 或更高版本，该版本已修复处理大量 LDAP 请求时的崩溃问题。如无法升级，可停止 nscd 服务（`service nscd stop && chkconfig nscd off`）或限制 LDAP 查询速率作为临时缓解措施。"
score = 1.2
severity = "LOW"
sources = ["redhat"]
title = "nss_ldap 拒绝服务漏洞"
updated = "2026-06-16T21:53:02.470"

