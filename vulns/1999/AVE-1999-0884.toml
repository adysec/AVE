[basic]
description = "SSH 服务端 sshd2 在 2.0.12 之前版本存在认证日志缺陷。该服务在远程连接于达到最大登录尝试次数之前被关闭时，未能正确记录此次登录尝试。由于失败尝试未被写入审计日志，未经身份认证的远程攻击者可通过建立连接、尝试少量密码后主动断开并重连的方式，对目标账户进行密码暴力破解，同时规避入侵检测与审计追踪。该漏洞影响所有早于 2.0.12 的 sshd2 版本，攻击仅需网络可达目标 SSH 服务且无需合法凭据，利用门槛低，CVSS 评分为 7.5，危害等级为高。"
published = "1999-05-13T04:00:00.000"
remediation = "升级 SSH2 服务端至 2.0.12 或更高版本以修复审计日志绕过问题。若暂无法升级，可在 sshd 配置中降低 PasswordAuthentication 最大尝试次数（MaxAuthTries）、启用公钥认证并禁用密码登录，同时部署 fail2ban 对失败登录进行封禁，并结合防火墙限制 SSH 端口来源 IP。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
