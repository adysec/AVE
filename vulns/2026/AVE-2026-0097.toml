[basic]
description = "WordPress Visual Link Preview 插件 2.3.1 及之前版本存在敏感数据泄露漏洞（CWE-201），订阅者级别用户可通过该漏洞访问本应受限的敏感信息。漏洞原理在于插件生成链接预览时未正确校验用户权限，导致低权限用户能够获取其他用户的私有数据。攻击者仅需以订阅者身份登录 WordPress 站点即可触发该漏洞，无需特殊权限。CVSS 评分 7.4，危害等级高，影响所有启用该插件的 WordPress 站点。"
published = "2026-06-17"
remediation = "立即更新 Visual Link Preview 插件至 2.4.0 及以上版本。可在 WordPress 后台仪表盘→插件页面找到 Visual Link Preview 并点击更新，或通过 WP-CLI 执行 wp plugin update visual-link-preview 命令更新。如无法立即更新，建议暂时停用该插件并检查网站日志中订阅者账号是否存在异常预览请求。"
score = 7.4
severity = "HIGH"
sources = ["cve"]
title = "WordPress Visual Link Preview 插件敏感数据泄露漏洞"
updated = "2026-06-25"

