[basic]
description = "PHP 以 CGI 模式运行时，sapi/cgi/cgi_main.c 未正确处理不含等号（=）的查询字符串，导致远程攻击者可通过在 URL 查询字符串中注入命令行选项（如 -d、-r 等）来设置 PHP 配置指令并执行任意代码。该漏洞影响 PHP 5.3.12 之前版本及 5.4.2 之前版本，CVSS 评分 9.8，危害等级严重。攻击者无需认证即可远程利用，常用于 Web 服务器环境下的权限提升与远程控制。"
published = "2012-05-11T10:15:48.043"
remediation = "立即升级 PHP 至 5.3.12 或 5.4.2 及以上版本；若无法升级，启用 cgi.force_redirect=1 并配置 --enable-force-cgi-redirect；建议迁移至 PHP-FPM 模式替代 CGI 模式以彻底规避风险。"
score = 9.8
severity = "CRITICAL"
sources = ["nuclei"]
title = "PHP CGI 远程代码执行漏洞"
updated = "2026-06-16T23:40:22.147"

