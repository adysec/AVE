[basic]
description = "Red Hat usermode 包中的 userhelper 程序存在路径遍历漏洞，本地已认证攻击者可通过 PAM（可插拔认证模块）机制利用 ..（点号）目录遍历技术绕过路径限制，读取或执行任意文件，从而将权限提升至 root 级别。该漏洞影响 Mandrake 6.x、RedHat 6.x、Turbolinux 3.5 b2/4.x/6.0.2 等多个 Linux 发行版，CVSS 评分为 7.2，危害等级较高。攻击者需先在目标系统上拥有普通用户账户，方可利用此漏洞获取系统最高权限，进而完全控制受影响主机。"
published = "2000-01-04T05:00:00.000"
remediation = "升级 usermode 软件包至修复版本（如 Red Hat 6.x 升级到 usermode-1.28 或更高版本），该版本修复了 userhelper 程序对 PAM 配置路径的目录遍历检查。如无法升级，移除 userhelper 的 SUID 位（chmod u-s /usr/sbin/userhelper）作为临时缓解措施，限制本地普通用户提权风险。"
score = 7.2
severity = "HIGH"
sources = ["cve"]
title = "Red Hat usermode userhelper PAM 路径穿越本地权限提升漏洞"
updated = "2026-06-16T21:50:54.140"

