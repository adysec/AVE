[basic]
description = "RightFax Web 客户端因会话编号生成算法缺乏随机性，存在会话可预测漏洞。远程攻击者无需身份认证，通过分析并猜测会话编号规律，即可劫持其他用户的已认证会话，获取未授权系统访问权限。该漏洞攻击复杂度低，CVSS 评分 7.5，危害等级高。"
published = "2000-01-29T05:00:00.000"
remediation = "升级至 OpenText RightFax 最新版本（当前为 2024 或更高版本），新版本已采用不可预测的随机会话标识符。如无法升级，可在反向代理层（如 Nginx/Apache）配置会话令牌重写和短超时策略，强制每次登录后重新生成会话 ID，并将会话 Cookie 标记为 HttpOnly 和 Secure。同时启用 Web 应用防火墙（WAF）规则检测会话劫持行为。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "RightFax Web客户端可预见会话标识漏洞"
updated = "2026-06-16T21:51:01.420"

