[basic]
description = "Lynx 2.x 版本存在缓冲区溢出漏洞，远程攻击者可通过在恶意网页中构造超长 URL 链接，诱使 Lynx 用户访问后触发栈缓冲区溢出，导致浏览器程序崩溃，甚至可能以当前用户权限执行任意代码。该漏洞利用无需认证，但需要用户交互（点击恶意链接），影响 Lynx 2.x 全系列版本。"
published = "2000-02-27"
remediation = "升级 Lynx 至官方修复版本，该版本已修复 URL 长度校验不严导致的缓冲区溢出问题。如无法立即升级，可限制用户仅访问受信任站点，或使用 w3m 等替代浏览器作为临时缓解措施。"
score = 7.6
severity = "HIGH"
sources = ["cve"]
title = "Lynx 缓冲区溢出代码执行漏洞"
updated = "2026-06-16"

