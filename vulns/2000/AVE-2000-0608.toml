description = "Axis StorPoint CD 和 StorPoint CD/T 是 Axis Communications 公司生产的 CD ROM 服务器硬件设备，提供基于 Web 的远程管理功能。该设备存在路径遍历认证绕过漏洞，远程攻击者无需任何身份验证即可通过向管理 URL 中插入 ../ 路径遍历序列（如 /cd/../config/html/cnf_gi.htm）绕过登录页面直接访问管理配置界面，从而完全控制设备。攻击者可利用该漏洞修改设备配置、获取敏感信息或进行进一步网络渗透。"
