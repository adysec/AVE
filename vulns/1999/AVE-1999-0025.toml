[basic]
description = "Unix 系统中的 ptylogin 工具存在访问控制缺陷，本地用户可通过操纵伪终端设备锁定调制解调器，导致合法用户无法拨入（拒绝服务）；亦可利用该缺陷以调制解调器身份向外拨号，或截获拨入用户的登录密码。CVSS 评分 7.5，危害等级高，影响所有使用 ptylogin 管理串行拨号会话的 Unix 系统，攻击者需具备本地 shell 访问权限即可实施攻击。"
published = "2001-03-12T05:00:00.000"
remediation = "立即升级 ptylogin 至最新安全版本；同时移除 ptylogin 二进制文件的 setuid 权限（chmod u-s /usr/bin/ptylogin），并将可执行权限限制为仅授权用户组。对调制解调器设备文件（/dev/ttyS*、/dev/modem）设置 600 权限，仅允许 root 和拨号用户组访问。实施回拨认证机制作为临时缓解措施，并建议用 SSH 或 VPN 替代基于调制解调器的远程接入方案。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "Marc Schaefer ptylogin 拒绝服务及密码泄露漏洞"
updated = "2026-06-16T21:48:13.617"

