[basic]
description = "Red Hat Linux 2.1 的 abuse.console 程序使用相对路径而非绝对路径来定位和执行 undrv 程序，本地攻击者可通过在 PATH 环境变量中插入包含恶意木马程序的目录路径，诱使 abuse.console 加载并执行攻击者构造的恶意程序，从而在系统上以提升的权限执行任意命令。该漏洞影响 Red Hat Linux 2.1 版本，属于本地权限提升漏洞，攻击者需拥有本地系统访问权限才能利用。"
published = "1996-02-02T05:00:00.000"
remediation = "升级至 Red Hat Linux 2.2 或更高版本，或修改 abuse.console 脚本，将对 undrv 的调用改为绝对路径（如 /usr/bin/undrv）；若无需该功能，可移除 abuse.console 的 setuid 位并限制仅 root 可执行。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "Red Hat Linux 2.1 abuse.console 本地权限提升漏洞"
updated = "2026-06-16T21:50:33.307"

