[basic]
description = "Analog 日志分析工具 4.16 版本之前存在缓冲区溢出漏洞，远程攻击者可通过 ALIAS 命令构造超长字符串触发栈溢出，进而执行任意代码。该漏洞无需身份认证且攻击复杂度低，成功利用可完全控制目标系统，CVSS 评分 10.0，危害等级严重。受影响版本需升级至 Analog 4.16 或更高版本。"
published = "2001-05-03T04:00:00.000"
remediation = "立即升级 Analog 至 4.16 或更高版本。对于 Debian 系统，执行 apt-get update && apt-get upgrade analog 命令安装安全更新 DSA-033；对于其他发行版，从 https://www.analog.cx/ 下载最新版本并编译安装。若无法立即升级，在 Web 服务器配置中禁用 ALIAS 命令作为临时缓解措施。"
score = 10
severity = "CRITICAL"
sources = ["redhat"]
title = "Analog ALIAS命令缓冲区溢出远程代码执行漏洞"
updated = "2026-06-16T21:54:03.490"

