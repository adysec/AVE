[info]
author = "ave"
description = "通过向 InetServ WebMail 组件发送 HTTP 请求，检测响应中是否包含 InetServ banner，确认目标运行存在缓冲区溢出漏洞的 A-V Tronics InetServ 3.0 版本"
id = "POC-AVE-2000-0206"
name = "A-V Tronics InetServ 3.0 WebMail 缓冲区溢出识别 PoC"
severity = "critical"
tags = [
    "cve-2000-0065",
    "ave-2000-0206",
]
vuln_id = [
    "CVE-2000-0065",
    "AVE-2000-0206",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/webmail/"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["InetServ"]
