[basic]
description = "XWiki Platform 的 getdeleteddocuments.vm 模板中存在 SQL 注入漏洞，攻击者可通过向 sort 参数注入恶意 SQL 语句，该参数值被直接拼接到 ORDER BY 子句中执行，导致未授权 SQL 注入攻击。攻击者无需任何身份认证即可远程利用，成功利用后可实现数据库信息窃取、数据篡改甚至远程代码执行。该漏洞影响 XWiki 9.4-rc-1 至 16.10.5 及 17.0.0-rc-1 至 17.2.2 版本，CVSS 评分 9.8，危害等级严重。官方已在 16.10.6 和 17.3.0-rc-1 版本中修复此漏洞。"
published = "0729"
remediation = "升级 XWiki 至 17.3.0-rc-1 及以上版本，或长期支持版本 16.10.6 及以上版本。官方确认无临时缓解措施，仅能通过升级彻底修复 getdeleteddocuments.vm 模板中 sort 参数的 SQL 注入问题。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "XWiki XWiki getdeleteddocuments.vm SQL注入漏洞"
updated = "0729"

