[basic]
description = 'Microsoft Internet Explorer 4.0.1/5.0/5.01 的"导入/导出收藏夹"功能存在代码注入漏洞（CWE-94）。远程攻击者可通过诱导用户打开或导入特制收藏夹文件（.html/.url 格式），利用 ImportExportFavorites 特性向目标系统写入恶意文件或直接执行任意代码，且代码以当前用户权限运行。该漏洞无需身份认证即可远程利用，攻击复杂度低。受影响版本包括 IE 4.0.1、IE 5.0 和 IE 5.01，CVSS v2 评分为满分 10.0，危害等级严重。Microsoft 于 1999 年 9 月发布 MS99-037 安全公告及 KB241361 补丁修复该漏洞，建议受影响用户尽快升级 IE 至安全版本。'
published = "1999-09-10T04:00:00.000"
remediation = "建议立即将 Internet Explorer 升级至 5.5 或以上版本（通过 Windows Update 安装 Microsoft 1999 年 11 月累积安全补丁），或安装对应安全更新。如暂无法升级，可在「Internet 选项 → 安全」中将 Internet 区域安全级别设为高，禁用「文件下载」与「运行 ActiveX 控件和插件」，并通过组策略限制 Favorites 导入导出功能，同时避免访问不可信网页作为临时缓解。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "Microsoft Internet Explorer 导入导出收藏夹功能远程代码执行漏洞"
updated = "2026-06-16T21:48:52.797"

