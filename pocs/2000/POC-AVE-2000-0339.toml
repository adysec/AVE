[info]
author = "ave"
description = "Matt Wright FormMail 1.6/1.7/1.8 CGI 脚本存在信息泄露漏洞，远程攻击者通过向 env_report 参数发送请求，无需认证即可获取服务器环境变量（如 PATH、SERVER_ROOT 等敏感信息）。"
id = "POC-AVE-2000-0339"
name = "Matt Wright FormMail CGI 环境变量泄露漏洞 PoC"
severity = "medium"
tags = ["ave-2000-0339"]
vuln_id = [
    "CVE-2000-0411",
    "AVE-2000-0339",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/cgi-bin/FormMail.cgi"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["env_report"]

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/cgi-bin/FormMail"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["env_report"]
