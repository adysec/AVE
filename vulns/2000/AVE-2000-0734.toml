[basic]
description = "eXtropia WebStore 1.0 及 2.0 版本的 html_web_store.cgi 和 web_store.cgi CGI 程序存在目录遍历漏洞。远程攻击者可通过向 page 参数提交包含 `../` 的恶意请求，绕过路径限制读取服务器上的任意文件，如配置文件、密码文件等敏感信息。该漏洞无需身份认证，攻击复杂度低，CVSS 评分 5.0，危害等级中危。"
published = "2000-12-11T05:00:00.000"
remediation = "在 html_web_store.cgi 和 web_store.cgi 中对 page 参数做输入过滤，移除 `../` 等目录跳转序列，仅允许文件名在白名单内；同时在 Apache/Nginx 层面添加重写规则，拦截包含 `..` 的 URL 请求。如产品已停止维护，建议迁移至仍在更新支持的替代购物车系统。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "eXtropia WebStore 目录遍历漏洞"
updated = "2026-06-16T21:52:57.310"

