[basic]
description = "Linux 内核 ath11k 无线驱动中存在设备唤醒状态管理缺陷。当通过写入 sysfs 接口模拟固件崩溃触发设备恢复流程时，MHI 总线电源管理状态机中的 `mhi_deassert_dev_wake()` 被调用，但对应的 `mhi_assert_dev_wake()` 因恢复期间 PM 状态非正常而被跳过，导致 `dev_wake` 计数器失衡，在 `mhi_pm_disable_transition()` 中触发内核告警。该漏洞影响 WCN6855 和 QCA6390 等 ath11k 无线芯片组，需本地攻击者具有触发固件崩溃的能力，CVSS 评分 5.5，危害等级中等，可能导致系统可用性受影响。"
published = "2025-02-26T07:01:30.220"
remediation = "升级 Linux 内核至 5.17.14、5.18.3 或 5.19 及以上版本，其中已包含对 ath11k_pci_write32()/ath11k_pci_read32() 的补丁，可在设备恢复过程中避免因 dev_wake 计数不匹配导致的内核警告。如无法立即升级内核，可通过禁用 ath11k 无线网卡驱动或阻止加载 ath11k_pci 内核模块作为临时缓解措施。"
score = 5.5
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux ath11k 驱动 MHI 电源管理 dev_wake 警告致拒绝服务漏洞"
updated = "2026-06-17T05:18:23.943"

