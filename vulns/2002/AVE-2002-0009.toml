[basic]
description = "Apache 2.0 至 2.0.39 版本在 Windows、OS2 及 Netware 平台上存在完整路径泄露漏洞。远程攻击者可通过发送针对 .var 文件的请求，触发服务器返回包含安装路径的错误信息；或者利用脚本（子进程）无法执行时产生的错误消息，间接获取服务器的完整物理路径。该漏洞不要求身份认证，攻击复杂度低，可能导致攻击者进一步利用已知路径实施更深层攻击。CVSS 评分 5.0，危害等级中危。"
published = "2002-09-05T04:00:00.000"
remediation = "升级 Apache 至 2.0.40 或更高版本，该版本修复了 .var 文件请求导致路径泄露的问题。如无法升级，可删除或禁用 .var 文件处理模块 (mod_negotiation)，并在 Apache 配置中设置 ServerTokens Prod 和 ServerSignature Off 以减少信息泄露。"
score = 5
severity = "MEDIUM"
sources = ["osv"]
title = "Apache HTTP Server 2.0 全路径泄露漏洞"
updated = "2026-06-16T21:57:52.443"

