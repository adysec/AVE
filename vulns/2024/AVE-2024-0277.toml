[basic]
description = "LiveGBS 存在任意用户密码重置漏洞，攻击者可利用未授权访问漏洞通过 `/api/v1/user/list` 接口获取系统中所有用户的 ID 列表，随后利用 `/api/v1/user/resetpassword` 接口在无需身份验证的情况下直接重置任意用户的密码。该漏洞源于接口缺乏严格的访问控制与身份校验机制，攻击者无需登录即可完成用户枚举与密码篡改。成功利用后，攻击者可接管任意用户账户，获取敏感数据或进一步控制系统。建议升级至官方修复版本并严格限制接口访问权限。"
published = "0823"
remediation = "1. 临时缓解：立即在反向代理或 WAF 层拦截对 /api/v1/user/list 和 /api/v1/user/resetpassword 接口的未授权访问，仅允许可信 IP 段调用管理接口；2. 配置加固：在应用网关或负载均衡器开启访问控制列表（ACL），限制管理 API 来源 IP；3. 版本升级：联系厂商获取修复补丁并升级到最新安全版本；4. 监控排查：审计日志中是否存在异常的用户列表查询及密码重置请求，及时重置相关管理员密码。"
score = 5
severity = "MEDIUM"
