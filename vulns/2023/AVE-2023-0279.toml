[basic]
description = "吉大正元身份认证网关存在任意文件上传漏洞，由于系统对上传文件类型和内容未进行严格校验，未经身份认证的远程攻击者可通过构造特制的HTTP请求向目标系统上传WebShell等恶意脚本文件，获取服务器控制权限或执行任意命令。该漏洞攻击复杂度低，影响吉大正元身份认证网关多个版本，危害等级高危。"
published = "08.08"
remediation = "立即联系吉大正元获取官方安全补丁，升级身份认证网关至最新版本。同时在上传接口增加文件类型白名单校验（仅允许jpg/png/pdf等必要类型）、限制文件大小并重命名存储文件。部署WAF规则拦截上传目录的脚本执行权限，将文件上传目录置于非Web可访问路径下。如无法立即升级，临时措施为在Nginx/反向代理层对/upload等上传接口添加Content-Type和文件扩展名双重校验。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "吉大正元身份认证网关任意文件上传漏洞"
updated = "08.08"

