[basic]
description = "CDomainFree 2.4 的 whois_raw.cgi 脚本在处理 fqdn 参数时未对用户输入进行有效过滤，远程攻击者可通过在 fqdn 参数中注入 shell 元字符（如反引号、管道符等）执行任意系统命令。该漏洞无需身份认证即可利用，攻击者可完全控制运行该 CGI 脚本的 Web 服务器，获取敏感信息或植入后门。影响所有使用 CDomainFree 2.4 版本的 Web 服务。"
published = "1999-06-01T04:00:00.000"
remediation = "立即从 Web 服务器中删除或禁用 whois_raw.cgi 脚本，停止对外提供 CDomainFree 2.4 的 Whois 查询功能。该软件自 1999 年起已无官方维护和补丁更新，无法通过升级修复。若确需保留 Whois 查询服务，应替换为经过安全审计的替代方案（如安装 whois 命令行工具并通过安全的包装脚本调用，或部署经积极维护的 Web Whois 应用），并确保所有用户输入在传递给系统 shell 前经过严格的白名单字符过滤和参数化处理。同时建议在 Web 服务器配置中限制 CGI 目录的执行权限，删除不必要的 CGI 脚本，并在 WAF 规则中拦截包含 shell 元字符（如反引号、分号、管道符、$()）的 HTTP 请求参数。"
score = 10
severity = "CRITICAL"
sources = ["exploitdb"]
title = "CDomain whois_raw.cgi 远程命令执行漏洞"
updated = "2026-06-16T21:49:37.747"

