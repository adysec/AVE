[basic]
description = 'Cisco PIX 防火墙的 "established" 命令在已存在允许的通道（conduit）时，会允许一台主机连接到目标主机的任意端口，这属于设计缺陷而非传统代码漏洞。若管理员未充分理解此功能机制，可能导致配置比预期更宽松的访问控制策略，从而降低网络安全防护等级。攻击者可利用已建立的合法连接通道绕过防火墙端口限制，向目标主机内部任意端口发起连接，实现未授权访问。该漏洞影响运行 PIX 防火墙软件的 Cisco 设备，CVSS 评分 7.5，危害等级高危。'
published = "1998-07-15T04:00:00.000"
remediation = "严格审查并明确配置 conduit 规则，避免使用过于宽泛的 established 命令规则（如 `established permit tcp any any`），改为对每对主机和端口逐条配置精确的 access-list 规则。建议升级到 PIX 防火墙 6.3 及以上版本并迁移至基于 access-list 的策略配置，替代已废弃的 conduit/established 命令体系。同时定期审计防火墙规则集，确保最小权限原则落地。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "Cisco PIX防火墙 established命令安全特性绕过漏洞"
updated = "2026-06-16T21:50:46.173"

