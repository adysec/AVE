[basic]
description = "Linux Kernel 2.2.x 版本的 knfsd NFS 服务中存在输入验证缺陷，远程攻击者无需身份认证即可通过向目标系统发送包含恶意负值大小参数的 NFS 请求触发该漏洞，导致 knfsd 进程进入异常状态或崩溃，从而造成拒绝服务。该漏洞影响 Linux Kernel 2.1、2.2.0 及 2.3.0 等版本，CVSS 评分 5.0，危害等级中等。"
published = "2000-05-01T04:00:00.000"
remediation = "升级 Linux 内核至 2.2.15 或更高版本，该漏洞已在后续内核版本中修复。如无法升级内核，可在 NFS 服务器上通过防火墙限制仅允许可信 IP 访问 NFS 端口（TCP/UDP 2049），或在 /etc/exports 中限制客户端访问范围作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Linux Kernel knfsd NFS Server 拒绝服务漏洞"
updated = "2026-06-16T21:51:31.287"

