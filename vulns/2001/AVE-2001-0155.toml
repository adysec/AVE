[basic]
description = "PHP-Nuke 的 banners.php 脚本中存在未授权访问漏洞，远程攻击者可直接调用 Change 操作修改广告横幅链接地址，因该操作未对用户身份进行认证。攻击者无需任何权限即可将广告链接替换为恶意 URL，导致用户被重定向至钓鱼或恶意站点。该漏洞影响 PHP-Nuke 4.4 及更早版本，危害等级中等。"
published = "2001-06-18T04:00:00.000"
remediation = "升级 PHP-Nuke 至 5.0 及以上版本，该漏洞已在官方修复包中修补。如无法升级，在 banners.php 开头添加身份验证检查代码，限制 Change 操作仅允许管理员执行；或在 Web 服务器（如 Apache）层面通过 .htaccess 对 banners.php 目录设置访问认证，阻止未授权外部请求直接调用 Change 参数。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "PHP-Nuke 远程广告横幅URL修改漏洞"
updated = "2026-06-16T21:54:12.247"

