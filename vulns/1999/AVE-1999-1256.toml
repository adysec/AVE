[basic]
description = "IBM AIX 4.2 及更早版本中的 ping 命令存在缓冲区溢出漏洞，本地攻击者可通过向 ping 命令传递超长命令行参数触发缓冲区溢出，导致攻击者能够以 root 权限执行任意代码。该漏洞影响 AIX 4.2 及更早版本，CVSS 评分 7.2，危害等级高。利用该漏洞需要本地系统访问权限，攻击者可通过精心构造的输入参数实现权限提升。"
published = "1997-07-21T04:00:00.000"
remediation = "升级到当前支持的最低 IBM AIX 版本（建议 AIX 7.1 或更高），并应用最新的安全补丁包；立即修改 /etc/ping 配置文件，限制 ping 命令行参数长度至 1024 字节以下，并使用系统权限管理的漏洞扫描工具定期检测是否存在未修复的缓冲区溢出；如无法立即升级，可临时通过限制用户权限、禁用 ping 命令或在防火墙层面限制 ICMP 流量作为缓解措施"
score = 7.2
severity = "HIGH"
sources = ["epss"]
title = "IBM AIX ping 本地缓冲区溢出漏洞"
updated = "2026-06-16T21:49:57.010"

