[basic]
description = "Third Voice Web Annotation 注释工具存在跨站脚本（XSS）漏洞。远程攻击者可在网页注释中注入恶意 JavaScript 代码，当其他 Third Voice 用户浏览同一页面并加载注释时，恶意脚本将在用户浏览器中自动执行，导致攻击者可窃取用户 Cookie 及敏感数据，或伪造网页内容实施钓鱼攻击。该漏洞影响 Third Voice 注释扩展所有版本，CVSS 评分 6.4，危害等级中危。用户需警惕不明来源注释，建议卸载该软件以消除风险。"
published = "1999-12-31T05:00:00.000"
remediation = "立即卸载 Third Voice 软件（该产品已停止维护，于 2000 年左右退出市场且不再发布安全更新）。在浏览器扩展管理中移除所有 Third Voice 相关插件。替代方案：使用现代浏览器内置注释功能或基于服务端的内容注释工具（如 Hypothes.is），这些方案默认对用户输入进行转义处理并实施 CSP 策略，可有效防范 XSS 攻击。如需继续使用第三方注释系统，应启用 Content-Security-Policy HTTP 头并配置 `script-src` 限制内联脚本执行。"
score = 6.4
severity = "MEDIUM"
sources = ["cve"]
title = "Third Voice Web Annotation 跨站脚本漏洞"
updated = "2026-06-16T21:49:51.783"

