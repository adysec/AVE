[basic]
description = "畅捷通 T+ 的 GLSyncService.asmx 接口中 DownLoadBlockFile 方法存在任意文件读取漏洞，由于对 blockId 参数缺乏有效的路径规范化校验，未经身份认证的远程攻击者可通过构造包含 ../ 路径遍历序列的特制请求读取服务器任意文件，导致敏感信息泄露。该漏洞影响畅捷通 T+ 全版本，CVSS 评分 9.8，危害严重，建议及时安装官方安全补丁修复。"
published = "nday"
remediation = "立即升级畅捷通T+至最新安全版本，关注畅捷通官方发布的针对DownLoadBlockFile接口的安全补丁。对blockId参数进行严格的路径规范化检查，拒绝包含../等路径遍历序列的输入。在Web应用防火墙(WAF)层面配置规则拦截路径遍历攻击特征。将GLSyncService.asmx接口访问权限限制为仅内网IP可访问，避免暴露在公网。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "畅捷通 T+ DownLoadBlockFile 任意文件读取漏洞"
updated = "nday"

