[basic]
description = "FreeBSD 的 lpd（行式打印机守护进程）在处理超长 DNS 主机名时存在缓冲区溢出漏洞，远程攻击者可通过向目标系统的打印服务发送特制的主机名数据触发该溢出，导致拒绝服务或任意代码执行。该漏洞影响多个 FreeBSD 版本，CVSS 评分 9.3，危害等级严重，无需身份认证即可远程利用。"
published = "1997-03-05T05:00:00.000"
remediation = "建议升级 FreeBSD 至已修复该漏洞的版本（4.0 及以上）。如无法升级，可在 /etc/inetd.conf 中注释 lpd 行并重启 inetd 以禁用打印机守护进程；若需继续使用 lpd，在 /etc/hosts.lpd 和白名单中限制允许访问的客户端 IP，并在防火墙层面阻止外部对 TCP 515 端口的访问作为临时缓解措施。"
score = 9.3
severity = "CRITICAL"
sources = ["epss"]
title = "FreeBSD lpd 远程缓冲区溢出漏洞"
updated = "2026-06-16T21:48:06.117"

