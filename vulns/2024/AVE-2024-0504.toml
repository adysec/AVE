[basic]
description = "containerd 容器运行时在用户 ID（UID:GID）处理中存在整数溢出漏洞（CWE-190）。当容器启动时设置的 UID:GID 值超过 32 位有符号整数的最大值时，会触发整数溢出，导致容器最终以 root 用户（UID 0）运行。该漏洞影响 containerd 1.6.38、1.7.27 及 2.0.4 之前的所有版本，可破坏依赖非 root 用户运行容器的安全隔离策略，CVSS 评分 4.6，危害等级中危。建议升级至修复版本或仅运行可信镜像缓解风险。"
published = "2025-03-17T22:15:13.150"
remediation = "升级 containerd 至 v1.6.38、v1.7.27 或 v2.0.4 及以上版本，该版本修复了 UID:GID 超过 32 位有符号整数上限时溢出为 root 用户的问题。如无法立即升级，应限制仅使用受信任镜像，并严格控制镜像导入权限，防止非受信用户导入恶意构造的镜像。"
score = 4.6
severity = "MEDIUM"
sources = ["msrc"]
title = "containerd 用户ID处理整数溢出漏洞"
updated = "2026-06-17T07:46:12.817"

