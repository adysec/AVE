[basic]
description = "id Software 的 Quake3 Arena（雷神之锤3竞技场）游戏客户端存在路径遍历漏洞。恶意服务器操作者可通过向客户端发送包含 `..`（点点）序列的特制数据包，突破目录限制访问或修改客户端本地文件。攻击者只需搭建恶意游戏服务器并诱使玩家连接，即可在玩家机器上读取敏感文件或写入恶意文件，危害程度较高。该漏洞影响 Quake3 Arena 所有相关版本。CVSS 评分 6.4，属于中危漏洞。"
published = "2000-05-03T04:00:00.000"
remediation = "建议将 Quake III Arena 升级到 1.17n 及以上版本，该版本修复了目录遍历问题。玩家应仅连接可信任的服务器，避免连接未知服务器以防止被恶意利用。如无法升级，可在客户端防火墙中限制 Quake III Arena 的出站连接为已知安全服务器 IP。"
score = 6.4
severity = "MEDIUM"
sources = ["epss"]
title = "id Software Quake3 Arena 目录遍历漏洞"
updated = "2026-06-16T21:51:26.143"

