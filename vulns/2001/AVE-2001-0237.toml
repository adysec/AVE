[basic]
description = "Elron Internet Manager (IM) Message Inspector 及 Anti-Virus 3.0.4 之前版本的 Web 服务器存在目录遍历漏洞。远程攻击者无需身份认证，通过在请求 URL 中添加 `../` 序列即可绕过路径限制，读取服务器上任意文件（如配置文件、密码文件等）。该漏洞利用难度低，攻击者仅需发送特制 HTTP 请求即可触发，可能导致敏感信息泄露。厂商已在 3.0.4 版本中修复此漏洞。"
published = "2001-08-22T04:00:00.000"
remediation = "立即升级 Elron Internet Manager (IM) Message Inspector 及 Anti-Virus 至 3.0.4 或更高版本，该版本修复了 Web 服务器组件对用户请求路径的输入验证缺陷。如无法升级，可在 Web 服务器配置中禁用目录遍历功能，或通过反向代理规则过滤包含 `../` 的 URL 请求作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Elron IM Anti-Virus 目录遍历漏洞"
updated = "2026-06-16T21:54:33.403"

