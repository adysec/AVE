[basic]
description = "FreeBSD 3.x 至 5.x 版本的 Linux 二进制兼容模块中存在缓冲区溢出漏洞。本地攻击者可通过在 Linux shadow 文件系统中构造超长文件名触发该漏洞，成功利用可导致缓冲区溢出，从而获取系统的 root 权限。该漏洞影响范围广泛，攻击条件为拥有本地访问权限，无需其他特殊条件即可提权至最高权限，危害等级高。"
published = "2000-10-20T04:00:00.000"
remediation = '立即升级 FreeBSD 至 4.1-RELEASE 或更高版本，该版本已修复 linux binary compatibility 模块中的缓冲区溢出漏洞。如无法升级，可应用 FreeBSD-SA-00:41 安全公告中的补丁，修改 sys/compat/linux/linux_misc.c 中对 shadow 文件系统文件名长度的检查逻辑，限制文件名长度防止缓冲区溢出。临时缓解措施可禁用 Linux 二进制兼容模块（在 /etc/rc.conf 中设置 linux_enable="NO" 并重启）。'
score = 7.2
severity = "HIGH"
sources = ["cve"]
title = "FreeBSD Linux 二进制兼容模块缓冲区溢出漏洞"
updated = "2026-06-16T21:52:24.050"

