[basic]
description = "Linux 内核 drm/i915 驱动中 `mmap_offset` 重复使用导致内存泄漏，`drm_vma_node_allow()` 与 `drm_vma_node_revoke()` 调用未成对平衡，每次用户调用 `mmap_offset` 时调用前者但后者仅在释放时调用一次，导致每文件 `vm_count` 非零且红黑树节点泄漏。本地攻击者可通过反复触发 `mmap_offset` 操作耗尽系统内存，造成拒绝服务。该漏洞影响 Linux 主线内核版本，CVSS 评分 5.5，危害等级中危。"
published = "2025-03-27T17:15:49.050"
remediation = "立即升级 Linux 内核至 6.1.9 及以上版本（含 6.2+），或合入修复补丁 commits `0bdc4b4ba720` / `0220e4fe178c`（均位于 `drivers/gpu/drm/i915/gem/i915_gem_mman.c`）。若无法立即升级，可通过限制本地用户对 i915 DRM 设备的访问权限作为临时缓解措施，或在内核启动参数中禁用 i915 模块（`modprobe.blacklist=i915`）以完全规避此内存泄漏风险。"
score = 5.5
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux kernel drm/i915 内存泄漏漏洞"
updated = "2026-06-17T06:44:05.637"

