[basic]
description = "该漏洞源于SSH服务器允许通过.rhosts文件进行远程主机认证，攻击者可利用此机制绕过密码验证实现未授权访问。漏洞影响所有启用.rhosts认证的SSH服务，攻击者需具备修改目标用户.rhosts文件或伪造主机名的能力，通过在其中添加恶意主机条目即可无需密码登录系统，严重威胁服务器安全。"
published = "1999-01-01"
remediation = "在SSH服务端配置中禁用.rhosts认证，在/etc/ssh/sshd_config中设置IgnoreRhosts yes、RhostsAuthentication no、RhostsRSAAuthentication no，重启sshd服务生效。同时删除所有用户家目录下的.rhosts和.shosts文件，全面改用公钥认证方式登录。"
score = 10.0
severity = "CRITICAL"
sources = ["cve"]
title = "SSH服务器.rhosts文件远程认证绕过漏洞"
updated = "2024-06-16"

