[basic]
description = "Cisco Catalyst 2900XL 系列交换机 SNMP 服务存在输入验证不当漏洞（CWE-20）。当 SNMP 服务被禁用时，远程攻击者无需认证即可向目标设备的 UDP 161 端口发送特制的空数据包，触发服务处理异常，导致设备拒绝服务。该漏洞影响运行 Cisco IOS 12.0 及 '5.2'XU 版本的 Catalyst 2900XL 交换机，攻击复杂度低，无需特殊权限，仅需网络可达即可实施攻击。Cisco 已发布相关安全公告，建议用户升级固件或配置访问控制列表（ACL）限制 SNMP 端口的访问。"
published = "2001-08-14T04:00:00.000"
remediation = "升级 Cisco Catalyst 2900XL 交换机 IOS 至 12.0(5.2)XU 之后的修复版本；如无法升级，在交换机上配置 ACL 拒绝非信任源对 UDP 161 端口的访问：access-list 100 deny udp any any eq 161；若 SNMP 已禁用仍受影响，建议在边界防火墙上直接过滤入站 UDP 161 流量作为临时缓解。该设备已停产多年，强烈建议替换为受支持的 Catalyst 9000 系列交换机。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Cisco Catalyst 2900XL Switch SNMP 拒绝服务漏洞"
updated = "2026-06-16T21:54:32.837"

