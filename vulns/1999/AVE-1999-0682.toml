[basic]
description = "iHTML Merchant 电子商务购物车软件存在代码解析错误漏洞，远程攻击者无需身份认证即可通过网络向目标系统发送特制请求，利用该解析缺陷获取服务器敏感信息或执行任意命令。该漏洞影响 iHTML Merchant 全版本，CVSS 评分 7.5，危害等级高。厂商已发布安全补丁，建议用户及时更新至修复版本。"
published = "1999-09-16T04:00:00.000"
remediation = "iHTML Merchant 已停止维护且无官方补丁，建议立即迁移至其他受支持的电子商务平台。如无法立即迁移，应在防火墙层面限制仅允许可信 IP 访问该服务，并移除服务器上不必要的文件权限，同时部署 WAF 规则拦截异常代码执行请求作为临时缓解措施。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "iHTML Merchant 代码执行信息泄露漏洞"
updated = "2026-06-16T21:49:16.180"

