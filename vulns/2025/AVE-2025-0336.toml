[basic]
description = "MRCMS 3.1.3 版本的后台管理组编辑接口 /admin/group/edit.do 存在存储型跨站脚本（Stored XSS）漏洞。具有管理员权限的攻击者可在组名称等字段中注入恶意脚本代码，当其他管理员访问管理组页面时脚本自动执行，导致敏感信息泄露、页面内容篡改或恶意软件传播。攻击者需具备后台登录权限，攻击复杂度低。"
published = "2025-05-05"
remediation = "厂商尚未发布官方补丁。建议升级至 MRCMS 最新版本，对用户输入进行严格的 HTML 实体编码和过滤，实施内容安全策略（CSP）限制脚本执行，并限制后台管理组页面的访问权限。"
score = 5.4
severity = "MEDIUM"
sources = [
    "cve",
    "github",
]
title = "MRCMS 3.1.3 后台管理组编辑页面存储型跨站脚本漏洞"
updated = "2026-06-17"

