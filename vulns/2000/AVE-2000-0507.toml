[basic]
description = "IMP 中的 MSWordView 组件在处理 Word 附件时会创建临时文件并保存至 /tmp 目录，但这些临时文件被设置为全局可读（world-readable）权限，导致其他本地用户可读取其中的敏感内容，造成信息泄露。该漏洞影响 Horde IMP 的 MSWordView 组件，攻击条件为拥有目标系统的本地账户访问权限，攻击复杂度低，CVSS 评分 2.1，危害等级低。"
published = "2000-04-22T04:00:00.000"
remediation = "升级 IMP 至 2.2 beta 及以上版本（pre11 起已修复 umask 为 077）；如无法升级，在 imp/lib/mimetypes.lib 中修改临时文件存储路径，创建仅 web 进程可读写（700 权限）的专用目录替代 /tmp；同时设置 cron 定时清理超过 30 分钟的 IMP 临时文件以防磁盘耗尽。"
score = 2.1
severity = "LOW"
sources = ["cve"]
title = "IMP MSWordView 临时文件权限不安全漏洞"
updated = "2026-06-16T21:51:46.667"

