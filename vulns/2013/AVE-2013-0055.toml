[basic]
description = "Adobe ColdFusion 9.0、9.0.1 及 9.0.2 版本在未配置管理员密码时存在认证绕过漏洞。远程攻击者无需任何身份凭证即可绕过系统认证机制，通过未指定的向量直接访问管理控制台，进而可能执行任意代码。该漏洞在 2013 年 1 月已被野外利用，影响范围广泛，CVSS 评分 9.8，危害等级严重。建议用户立即配置管理员密码或升级至修复版本。"
published = "2013-01-09T01:55:00.803"
remediation = "立即升级 Adobe ColdFusion 至 9.0.2 Update 1 或更高版本（Adobe 已针对此漏洞发布 APSB13-03 安全公告）。同时务必为 ColdFusion 管理控制台设置强密码，禁止将管理员接口暴露在公网，并在防火墙或反向代理层面限制对 /CFIDE/ 和 /CFIDE/administrator/ 路径的访问。如无法立即升级，可临时禁用未使用的 RDS 服务并移除默认的 admin 用户。"
score = 9.8
severity = "CRITICAL"
sources = ["kev"]
title = "Adobe ColdFusion 验证绕过漏洞"
updated = "2026-06-16T23:49:47.163"

