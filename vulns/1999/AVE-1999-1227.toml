[basic]
title = "Apple AppleShare IP Mail Server 5.0.3 缓冲区溢出漏洞"
description = "AppleShare IP Mail Server 5.0.3 在处理 SMTP HELO 命令时存在缓冲区溢出漏洞。远程攻击者可通过向 SMTP 端口（25）发送超长 HELO 命令（约500字节以上），触发缓冲区溢出，导致服务器崩溃。由于运行在 MacOS 系统上，该崩溃通常会导致整个系统死机，需要重新启动才能恢复。攻击无需认证，攻击复杂度低。"
severity = "MEDIUM"
score = 5.0
sources = ["cve"]
published = "1998-04-08"
updated = "2024-11-20"
remediation = "升级到 AppleShare IP Mail Server 更高版本，或限制 SMTP 端口的访问来源，仅允许可信 IP 连接。由于该产品已停止维护，建议迁移到其他受支持的邮件服务器软件。"
