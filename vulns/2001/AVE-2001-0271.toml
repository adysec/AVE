[basic]
description = "slrn 新闻阅读器 0.9.7.0 之前版本中的 wrapping 和 unwrapping 函数存在缓冲区溢出漏洞，远程攻击者可通过向目标系统发送特制的长消息头触发该漏洞，导致任意代码执行。该漏洞影响 slrn 0.9.7.0 之前所有版本，CVSS 评分 7.5，危害等级高。用户应升级至 0.9.7.0 或更高版本以修复此漏洞。"
published = "2001-06-27T04:00:00.000"
remediation = "升级 slrn 至 0.9.7.0 及以上版本。Debian 2.2 (potato) 用户可更新至 slrn_0.9.6.2-9potato1，通过 apt-get update && apt-get upgrade slrn 完成安装。如无法升级，建议禁用 slrn 的自动消息头解析功能，或限制 slrn 仅处理可信新闻组来源。"
score = 7.5
severity = "HIGH"
sources = ["redhat"]
title = "slrn 新闻阅读器缓冲区溢出远程代码执行漏洞"
updated = "2026-06-16T21:54:18.940"

