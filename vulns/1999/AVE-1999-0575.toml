description = "tags, and only the content between these tags will be extracted.<value>该漏洞存在于版本 2.0.5 之前的 Samba smbd 服务中，是一种缓冲区溢出 vulnerability。攻击者可以向 smbd 程序发送特制的恶意消息，触发缓冲区溢出，进而可能导致本地权限提升或服务崩溃。该漏洞影响 Linux/Unix 系统上的 Samba 服务，可被未经身份验证的远程攻击者利用，实现对目标主机的完全控制。Microsoft 已发布安全补丁修复此漏洞，建议管理员升级到 2.0.5 或更高版本。"
published = "1999-07-21T04:00:00.000"
remediation = "升级 Samba 至 2.0.5 或更高版本，该版本修复了 smbd 在处理畸形消息命令时的缓冲区溢出漏洞。如无法立即升级，可在 smb.conf 中限制可访问 smbd 服务的来源 IP 地址范围，并禁用不必要的 SMB 协议版本以缩小攻击面。"
