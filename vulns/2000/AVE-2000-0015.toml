[basic]
description = "True North Software Internet Anywhere Mail Server 2.3.x 的 POP3 邮件服务组件存在缓冲区溢出漏洞。未经身份认证的远程攻击者可通过向 POP3 服务发送超长用户名字段，触发缓冲区溢出，导致服务拒绝响应或执行任意命令。该漏洞无需认证即可远程利用，攻击门槛低，影响运行该邮件服务器的所有系统。"
published = "1999-10-01T04:00:00.000"
remediation = "该产品已停止维护且厂商已不存在，无官方补丁可用。建议立即将 Internet Anywhere Mail Server 替换为仍在维护的邮件服务器软件（如 Dovecot、Postfix 等）；若无法立即替换，应在防火墙层面限制对该服务器 110 端口（POP3）的访问，仅允许受信任 IP 连接，并部署入侵检测规则监控针对长用户名的异常请求。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "True North Software Internet Anywhere Mail Server 缓冲区溢出漏洞"
updated = "2026-06-16T21:50:49.750"

