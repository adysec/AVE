[basic]
description = "BEA Systems WebLogic Express 3.1.8/4/5 默认配置存在源代码泄露漏洞，默认 Servlet 对以 /file/ 开头的 URL 请求未做处理直接返回文件内容，导致远程未授权攻击者可通过构造包含 /file/ 前缀的 URL 请求直接读取服务器上的应用程序源代码文件，获取业务逻辑、数据库配置、密钥等敏感信息。该漏洞影响 BEA WebLogic Express 3.1.8、4.x、5.x 版本，CVSS 评分 5.0（中危），攻击向量为网络、攻击复杂度低、无需认证、仅影响机密性。攻击者无需认证即可通过构造类似 /file/WEB-INF/classes/... 的 URL 直接下载类文件、JSP 源码及配置文件，进而进一步攻击应用系统。BEA 官方已发布补丁修复该默认配置缺陷，建议升级至修复版本或配置 Servlet 过滤 /file/ 路径请求。"
published = "2000-06-21T04:00:00.000"
remediation = "升级 BEA WebLogic Express 到支持安全补丁的 6.1 SP1 或更高版本，并禁用默认文件Servlet服务。具体操作：1）停止当前服务器并安装BEA 2001年6月发布的6.1 SP1安全更新；2）编辑WebLogic.xml配置文件，移除或注释掉`<param-name>enableDefaultServlet</param-name>`项；3）在AdminServer中重新部署应用，确保`/file/*`路径被URL重写过滤；4）如无法立即升级，可通过WebLogic控制台禁用默认Servlet功能或在应用层面添加安全规则阻止所有请求以`/file/`开头的路径。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "BEA Systems WebLogic Express 源代码泄露漏洞"
updated = "2026-06-16T21:51:52.023"

