[basic]
description = "用友畅捷通 T+ 系统的 AddressSettingController 接口存在服务端请求伪造（SSRF）漏洞。未经授权的远程攻击者可通过向 `/tplus/ajaxpro/Ufida.T.SM.UIP.UA.AddressSettingController,Ufida.T.SM.UIP.ashx?method=TestConnnect` 端点发送特制 POST 请求，利用该漏洞使服务器向任意内部或外部地址发起 HTTP 请求，从而探测内网端口、访问内部 Web 服务或获取敏感信息。由于该接口未对请求目标地址作有效限制，攻击者只需掌握目标系统访问权限即可远程利用，影响范围较大。"
published = "0702"
remediation = "建议立即升级畅捷通 T+ 系列至最新版本（T+Cloud/T+专属云 ≥ 19.0、T+Online ≥ 19.0、T+软件包 ≥ 13.0），并从官方渠道 https://www.chanjetvip.com/product/goods/goods-detail?id=53aaa40295d458e44f5d3ce5 获取并安装最新安全补丁。如暂时无法升级，可在 WAF 或反向代理层添加规则，拦截对 `/tplus/ajaxpro/Ufida.T.SM.UIP.UA.AddressSettingController` 路径的 POST 请求，同时限制服务器主动发起外部 HTTP 连接作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "用友畅捷通 AddressSettingController 服务端请求伪造漏洞"
updated = "0702"

