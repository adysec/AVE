[basic]
description = "BackOffice Server 安装程序在安装过程中将账户名和明文密码写入 reboot.ini 配置文件，安装完成后未自动删除该文件，导致敏感信息泄露。本地攻击者可通过读取该配置文件获取管理员凭证，进而实现对系统的未授权访问。该漏洞源于安装脚本的不安全设计，影响 BackOffice Server 相关版本，CVSS 评分 2.1，危害等级低。"
published = "1999-02-12T05:00:00.000"
remediation = "安装完成后立即删除 `reboot.ini` 文件（默认位于安装根目录），删除前确认安装已全部完成。可通过组策略或脚本在部署后自动清理该文件。如无法删除，应使用 `cacls` 或 `icacls` 限制该文件的读取权限为仅 SYSTEM 账户。同时避免在安装过程中使用真实的管理员凭据，安装完成后统一修改所有涉及账户的密码。"
score = 2.1
severity = "LOW"
sources = ["avd"]
title = "Microsoft BackOffice Server 安装程序 reboot.ini 明文密码泄露漏洞"
updated = "2026-06-16T21:48:15.307"

