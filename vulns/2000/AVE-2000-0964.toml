[basic]
description = "Deerfield Serv-U 2.5e FTP 服务器软件存在空字节处理缺陷，远程攻击者无需身份认证即可通过网络向目标 FTP 服务发送大量空字节（NULL byte）数据包，触发服务处理异常导致拒绝服务。该漏洞影响 Serv-U 2.5e 版本，攻击复杂度低，无需任何权限即可实施，但仅影响服务可用性，不涉及数据泄露或权限提升。"
published = "2000-11-14T05:00:00.000"
remediation = "将 Serv-U 升级至 2.5f 或更高版本，该漏洞已在 2.5f 中修复。如无法升级，可在防火墙或网络边界限制对 FTP 服务端口（默认 21/TCP）的访问，仅允许可信 IP 连接，以降低远程攻击面。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Deerfield Serv-U FTP 空字节拒绝服务漏洞"
updated = "2026-06-16T21:52:34.227"

