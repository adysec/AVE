[basic]
description = "Wget 1.8.1 的 url_filename 函数存在缓冲区溢出漏洞，远程攻击者可通过向 wget 发送特制的超长 URL 触发该漏洞，导致段错误引发拒绝服务，在特定条件下可能实现任意代码执行。该漏洞影响 GNU Wget 1.8.1 及更早版本，攻击复杂度低，无需认证即可远程利用。"
published = "2003-06-16T04:00:00.000"
remediation = "升级 wget 至 1.8.2 及以上版本（Debian  unstable 仓库已包含 1.8.2-8 修复版本）。如无法立即升级，可在使用 wget 时避免通过命令行或脚本传入超长 URL，并在网络边界或主机防火墙限制 wget 对外发起连接的目标范围，降低被远程利用的风险。"
score = 7.5
severity = "HIGH"
sources = ["osv"]
title = "GNU wget url_filename函数缓冲区溢出漏洞"
updated = "2026-06-16T21:59:33.837"

