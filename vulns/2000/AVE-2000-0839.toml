[basic]
description = "Netscape PublishingXpert 2.0/2.2/2.5 版本中的 PSCOErrPage.htm 组件存在本地文件读取漏洞，远程攻击者可通过向 errPagePath 参数指定目标文件路径，读取服务器上的任意文件内容，导致敏感信息泄露。该漏洞影响 SP2 之前的 2.5 版本及更早版本，CVSS 评分 5.0，危害等级中危。建议升级至 SP2 或更高版本进行修复。"
published = "2001-08-31T04:00:00.000"
remediation = "升级 Netscape PublishingXpert 至 2.5 SP2 及以上版本；对 PSCOErrPage.htm 页面实施输入验证，过滤 errPagePath 参数中的路径遍历字符（如 ../），限制文件访问范围至指定目录，同时配置 Web 服务器 ACL 禁止未经授权访问该页面。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Netscape PublishingXpert 本地文件读取漏洞"
updated = "2026-06-16T21:53:21.507"

