[basic]
description = "Tiny FTPd 0.52 beta3 FTP 服务器存在多个缓冲区溢出漏洞，远程攻击者可通过向受影响的命令（包括 STOR、RNTO、MKD、XMKD、RMD、XRMD、APPE、SIZE 及 RNFR）发送超长参数，触发缓冲区溢出，从而在目标系统上执行任意命令。该漏洞影响 Tiny FTPd 0.52 及更早版本，危害等级严重，攻击者无需身份认证即可远程利用。"
published = "2000-02-01T05:00:00.000"
remediation = "该软件已停止维护多年，厂商未发布修复版本。建议立即停止使用 Tiny FTPd 0.52 beta3，迁移至 vsftpd、ProFTPD 或 FileZilla Server 等持续维护的 FTP 服务器软件。迁移前可在防火墙层面限制对 TCP 21 端口的访问来源，仅允许可信 IP 连接作为临时缓解措施。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "H. Nomura Tiny FTPd 远程缓冲区溢出漏洞"
updated = "2026-06-16T21:51:04.157"

