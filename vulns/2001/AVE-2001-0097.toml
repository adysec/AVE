CVE-2001-0247 is about a buffer overflow in OpenBSD's FTP server glob() function. The fix was released in OpenBSD 2.8. Let me search for the actual patch information.The remediation field is empty in the TOML. Let me check the OpenBSD 2.8 errata for the ftpd glob() vulnerability fix. Let me also check OpenBSD 2.8 errata.
The vulnerability is in BSD FTP servers (specifically OpenBSD ftpd). Looking at the OpenBSD 2.7 errata, entry 037 mentions a one-byte overflow in replydirname() but not the glob() issue. Let me check OpenBSD 2.8 errata page for the specific fix.
The vulnerability affects OpenBSD 2.8 and earlier. The fix was in OpenBSD 2.8 patches or later. Let me look for the specific patch.The OpenBSD 2.8 errata shows that patch 025 and 026 are relevant:
- 025: SECURITY FIX: Apr 10, 2001 - glob(3) contains multiple buffer overflows
- 026: SECURITY FIX: Apr 23, 2001 - ftpd(8) has a potential DoS related to glob(3). This patch introduces a GLOB_LIMIT, eliminating the DoS. You must have 025_glob.patch installed before installing this patch.
So the remediation is to upgrade to OpenBSD 2.8 or later, AND apply patches 025_glob.patch and 026_ftpd.patch to OpenBSD 2.8 systems.
