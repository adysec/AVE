[basic]
description = "FileMaker Pro 5 的 Web Companion 组件存在邮件中继漏洞，远程攻击者无需身份认证即可利用该组件发送匿名或伪造来源的电子邮件。攻击者可通过向目标服务器的 Web Companion 服务发送特制 HTTP 请求，绕过邮件发送限制，将服务器作为垃圾邮件或钓鱼邮件的转发代理。该漏洞影响 FileMaker Pro 5 版本，CVSS 评分 7.5，危害等级高，可被用于大规模垃圾邮件攻击或社会工程攻击。"
published = "2000-05-02T04:00:00.000"
remediation = "升级 FileMaker Pro 至 5.5 或更高版本，该漏洞已在后续版本中修复。如无法升级，可禁用 Web Companion 插件或在防火墙层面限制对 Web Companion 端口（默认 591）的外部访问，仅允许可信 IP 连接。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "FileMaker FileMaker Pro 5 Web Companion 匿名邮件发送漏洞"
updated = "2026-06-16T21:51:36.493"

