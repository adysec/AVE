[basic]
description = "Windows NT 系统在域用户登录时未能正确处理域名的边界情况。当域用户使用在域名末尾带有空格的域名登录到域时，系统无法正确下载并应用系统策略（System Policy），导致安全策略被绕过。该漏洞影响使用域环境且依赖系统策略进行安全管控的 Windows NT 系统，攻击条件为攻击者需诱导或控制域用户以带尾随空格的域名登录域控制器。利用方式上，攻击者可通过构造特殊的登录域名使目标主机跳过应有的安全策略限制，从而削弱系统安全防护、提升本地权限或绕过既定的访问控制策略，造成安全配置失效的风险。"
published = "1999-11-18T05:00:00.000"
remediation = "建议升级到 Windows 2000 或更高版本，并安装 Microsoft 发布的安全补丁（如 MS99-024 补丁包 Q246045）。若无法升级，请确保域用户登录时不在域名末尾添加空格，并在域控制器配置严格的域名验证策略防止尾随空格登录。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
