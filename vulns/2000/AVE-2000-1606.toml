[basic]
description = "Microsoft Word 的邮件合并功能在处理 Access 数据库时，未在执行其中嵌入的 Visual Basic (VBA) 脚本前向用户弹出安全提示，导致攻击者可通过构造恶意的 Access 数据库文件，诱使用户在 Word 中执行邮件合并操作，从而在用户系统上以当前用户权限执行任意命令。该漏洞影响 Microsoft Office 系列产品，攻击者无需身份认证即可远程触发，CVSS 评分 10.0，危害等级严重。由于 VBA 脚本具有完整的系统访问能力，成功利用可导致数据泄露、系统控制权丧失等严重后果。"
published = "2000-10-20T04:00:00.000"
remediation = "立即安装 Microsoft 安全公告 MS00-071 提供的补丁：Word 2000 用户安装 KB274226 更新，Word 97 用户安装 KB272749 更新。该补丁会强制对 Access 邮件合并数据源进行区域检查，阻止来自 Internet 或受限站点区域的数据库自动执行 VBA 脚本。如无法立即打补丁，可在防火墙层面阻止对 135-139 和 445 端口的入站和出站流量，阻断远程 UNC 路径对恶意 Access 数据库的访问。"
score = 10
severity = "CRITICAL"
sources = ["cve"]
title = "Microsoft Word 邮件合并工具远程代码执行漏洞"
updated = "2026-06-16T21:52:28.940"

