[basic]
description = 'Apache HTTP Server 1.3.26及2.0.42之前版本的默认错误页面存在跨站脚本(XSS)漏洞。当服务器配置中将UseCanonicalName设为"Off"且支持通配符DNS解析时，远程攻击者可通过在HTTP请求的Host头部中注入恶意脚本代码，当其他用户访问默认错误页面时该脚本将被执行，导致敏感信息泄露、会话劫持等攻击。攻击者无需身份认证即可实施攻击。'
published = "2002-10-11T04:00:00.000"
remediation = "升级 Apache HTTP Server 至 1.3.27 及以上版本（1.3.x 分支）或 2.0.43 及以上版本（2.0.x 分支）。如无法立即升级，修改 httpd.conf 将 `UseCanonicalName` 指令设为 `On` 或 `DNS`，并关闭通配符 DNS 解析支持，可缓解通过 Host 头部注入恶意脚本的攻击风险。"
score = 6.8
severity = "MEDIUM"
sources = ["osv"]
title = "Apache HTTP Server 跨站脚本攻击"
updated = "2026-06-16T21:58:14.310"

