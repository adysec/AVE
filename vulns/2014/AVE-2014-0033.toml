[basic]
description = "WordPress Last.fm Rotation（lastfm-rotation）插件 1.0 版本的 lastfm-proxy.php 文件存在目录遍历漏洞。由于对 snode 参数过滤不严，未经身份认证的远程攻击者可通过在 snode 参数中注入 ../ 路径遍历序列，绕过目录限制读取 Web 服务器上的任意文件，导致敏感信息泄露。CVSS 评分 5.0，危害等级中危，无需认证即可远程利用。"
published = "2014-08-06T19:55:04.213"
remediation = "立即删除或停用 Last.fm Rotation (lastfm-rotation) 插件 1.0 版本，该插件已停止维护且无安全补丁。如必须保留功能，可在 Web 应用防火墙（WAF）或服务器配置中添加规则，对 `lastfm-proxy.php` 的 `snode` 参数进行过滤，阻止包含 `../` 等路径遍历序列的请求。建议使用 WordPress 官方目录遍历扫描工具全面排查站点文件完整性。"
score = 5
severity = "MEDIUM"
sources = ["nuclei"]
title = "WordPress Last.fm Rotation插件目录遍历漏洞"
updated = "2026-06-17T00:11:10.237"

