[basic]
description = "NetBSD 在多宿主主机（连接多个网络的系统）上存在 ARP 缓存投毒漏洞。当系统配置了多个网络接口并连接到不同子网时，从一个网络接口接收到的 ARP 数据包能够修改另一个网络接口上的 ARP 缓存条目，导致跨网络的 ARP 欺骗攻击。远程攻击者可通过向目标系统发送伪造的 ARP 响应包，将流量重定向至攻击者控制的地址，实现中间人攻击或拒绝服务。该漏洞影响多宿主配置下的 NetBSD 系统，CVSS 评分 6.4，危害等级中危。"
published = "1999-05-01T04:00:00.000"
remediation = "升级 NetBSD 至 1.4.1 及以上版本，该版本修复了多宿主主机上 ARP 表项跨网修改的问题。如无法升级，可通过 sysctl -w net.inet.arp.allow_all=0 禁用跨接口 ARP 学习，或在各网络接口上启用 ARP 过滤（ifconfig xx0 arpfilter），同时为关键网关配置静态 ARP 条目（arp -s）防止 ARP 欺骗攻击。"
score = 6.4
severity = "MEDIUM"
sources = ["avd"]
title = "NetBSD 多宿主主机 ARP 缓存投毒漏洞"
