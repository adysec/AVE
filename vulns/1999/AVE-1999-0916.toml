[basic]
description = "rstat/rstatd 远程统计服务存在权限提升漏洞，该服务在 Unix/Linux 系统中用于远程监控系统性能统计信息（如 CPU 负载、内存使用、磁盘 I/O 等）。攻击者可利用该服务配置不当或权限配置不当的缺陷，通过滥用 rstatd 服务的特权操作获取系统敏感信息或提升权限。该漏洞影响运行 rstatd 服务的 Unix/Linux 系统（如 SunOS、Solaris、Linux 等），攻击者无需认证即可远程访问该服务获取系统敏感统计信息，配合其他漏洞可进一步提升权限至 root 权限。建议禁用不必要的 rstatd 服务或配置严格的访问控制列表限制访问来源。"
published = "1999-01-01T05:00:00.000"
remediation = "建议禁用或卸载系统中不必要的 rstat/rstatd（rstatd 守护进程），通过修改 /etc/inetd.conf 或 systemd 服务配置注释掉 rstatd 相关条目并重启服务，同时使用防火墙限制 772/773/775 等 rpc.rstatd 端口仅允许受信任内网访问，以杜绝该服务暴露带来的信息泄露与权限提升风险。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "SunOS rstat 服务特权提升漏洞"
updated = "2026-06-16T21:48:44.800"

