[basic]
description = "Symantec Norton Utilities 2.0 for Windows 95 中的 TUNEOCX.OCX ActiveX 控件被错误标记为对脚本安全，远程攻击者可通过恶意网页诱导用户使用 Internet Explorer 3.0 等浏览器访问，利用该控件的 run 选项执行任意命令。该漏洞影响 Norton Utilities 2.0 版本，攻击条件为用户访问恶意网页，危害为任意命令执行，CVSS 评分 5.1，危害等级中危。"
published = "1997-05-04T04:00:00.000"
remediation = "在 Internet Explorer 中将 TUNEOCX.OCX 控件的 CLSID（如 {00000000-0000-0000-0000-000000000001}，须确认实际 CLSID）注册 kill bit，阻止浏览器调用该控件；或使用 regsvr32 /u TUNEOCX.OCX 注销该 ActiveX 控件；升级至 Norton Utilities 3.0 及以上版本以彻底解决此问题。"
score = 5.1
severity = "MEDIUM"
sources = ["epss"]
title = "Symantec Norton Utilities ActiveX 远程代码执行漏洞"
updated = "2026-06-16T21:50:18.967"

