[basic]
description = "东胜物流系统的 `/CommMng/Print/UploadMailFile` 接口存在任意文件上传漏洞，未经身份认证的攻击者可通过构造特制的 multipart/form-data POST 请求上传包含恶意代码的 .ashx 等可执行文件至服务器，导致远程代码执行。攻击者仅需网络可达即可利用该漏洞，无需登录或特殊权限，风险较高。"
published = "0703"
remediation = "立即联系东胜物流厂商获取最新安全补丁，升级至修复该漏洞的版本。临时缓解措施：在 Web 服务器（IIS）层面配置上传目录执行权限为无，禁止 .ashx/.asp/.aspx/.jsp 等脚本文件上传；在应用程序中对 UploadMailFile 接口增加文件类型白名单校验（仅允许图片/PDF 等非可执行文件），并对上传文件名进行重命名处理；部署 WAF 规则拦截 multipart 上传中 filename 含脚本扩展名的请求。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "东胜物流 UploadMailFile 任意文件上传漏洞"
updated = "0703"

