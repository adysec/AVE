[basic]
description = "Broadcom LSI PCI-SV92EX Soft Modem 内核驱动程序（AGRSM64.sys）2.2.100.1 及之前版本中存在栈溢出漏洞，攻击者可通过向驱动程序发送特制的 IOCTL 0x1b2150 请求触发 RTLCopyMemory 中的缓冲区溢出，将权限从中等完整性提升至 SYSTEM 级。该漏洞可被用于 BYOVD 勒索软件攻击，绕过内核级防护（如杀毒软件或 PPL 保护），CVSS 评分 7.8，危害等级高。建议用户禁用或移除受影响驱动程序。"
published = "2023-10-10T19:15:09.530"
remediation = "该驱动 (AGRSM64.sys) 已自 2016 年起终止支持，Broadcom 不会发布补丁。建议立即卸载该驱动（若无需使用该调制解调器硬件），或使用 Microsoft 内核驱动的 HVCI（内存完整性）及 WDAC（Windows Defender 应用程序控制）功能阻止 AGRSM64.sys 加载；同时确保安装最新的 Windows 安全更新以获取 Microsoft 易受攻击驱动程序阻止列表的更新，防止 BYOVD 攻击利用该驱动进行权限提升。"
score = 7.8
severity = "HIGH"
sources = ["msrc"]
title = "Broadcom LSI PCI-SV92EX Soft Modem 内核驱动程序权限提升漏洞"
updated = "2026-06-17T05:56:17.097"

