[basic]
description = "IIS 4.0 及 Site Server 3.0 中的 Winmsdp.exe 示例文件存在任意文件读取漏洞。远程攻击者无需身份认证即可通过向该示例文件发送特制请求，利用路径遍历方式读取服务器上的任意文件，导致数据库连接信息、源代码等敏感信息泄露。该漏洞影响 Microsoft IIS 4.0 和 Site Server 3.0 版本，CVSS 评分 5.0，建议禁用或删除该示例文件进行修复。"
published = "1999-12-31T05:00:00.000"
remediation = "立即应用 Microsoft 安全公告 MS99-013 提供的补丁（KB231368），下载地址见于公告页面；同时删除 IIS 4.0 或 Site Server 3.0 服务器上 /iissamples/ 目录下的 Winmsdp.exe 文件，并在生产环境中移除整个示例文件目录（/iissamples/）以避免类似组件被利用。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Microsoft IIS 及 Site Server Winmsdp.exe 任意文件读取漏洞"
updated = "2026-06-16T21:50:28.107"

