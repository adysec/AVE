[basic]
description = "Microsoft Office 2000 的 HTML 解释器存在缓冲区溢出漏洞，由于在处理特制的长嵌入对象标签（object tag）时未正确验证输入长度，导致内存越界写入。远程攻击者可通过构造包含恶意 object 标签的 Office 文档（如 PowerPoint、Excel、Word 文件），诱使用户打开后触发缓冲区溢出，从而在目标系统上以当前用户权限执行任意命令。该漏洞攻击复杂度较高，需要用户交互才能利用，影响 Microsoft Office 2000 全系列产品。"
published = "2000-10-20T04:00:00.000"
remediation = "安装 Office 2000 SR-1 更新包，然后安装微软 MS00-056 安全公告提供的补丁（下载地址：https://office.microsoft.com/downloads/2000/Of9data.aspx）。如无法立即打补丁，可在 Word 2000 中通过「工具→选项→常规」启用「打开时确认转换」功能，防止自动解析恶意 HTML 文档中的对象标签。"
score = 5.1
severity = "MEDIUM"
sources = ["cve"]
title = "Microsoft Office 2000 HTML解释器缓冲区溢出漏洞"
updated = "2026-06-16T21:52:26.080"

