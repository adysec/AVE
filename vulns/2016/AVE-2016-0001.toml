[basic]
description = "LibTIFF 图像处理库 4.0.6 及之前版本中的 tif_predict.h 与 tif_predict.c 文件存在堆缓冲区溢出漏洞。当处理带有 YCbCr 子采样等特殊 tile 尺寸的 TIFF 文件时，断言检查不足会在调试模式下导致断言失败，在发布模式下则触发堆缓冲区溢出。攻击者可借助特制 TIFF 图像文件实现远程代码执行，或通过 tiffutil 等组件导致拒绝服务。该漏洞影响多个操作系统及下游应用，CVSS 评分 9.8，危害严重。"
published = "2016-11-22T19:59:03.387"
remediation = "升级 libtiff 至 4.0.7 或更高版本，该版本修复了 tif_predict.c 中对异常 tile 尺寸（如 YCbCr subsampling）的边界检查缺陷，消除了堆缓冲区溢出风险。Apple macOS 用户应安装 2017 年安全更新或升级至 10.12.4 及以上版本。如无法立即升级，应避免处理来源不可信的 TIFF 文件，特别是包含非标准 tile 尺寸的图像，作为临时缓解措施。"
score = 9.8
severity = "CRITICAL"
sources = ["msrc"]
title = "LibTIFF libtiff Predictor 堆缓冲区溢出漏洞"
updated = "2026-06-17T00:56:11.710"

