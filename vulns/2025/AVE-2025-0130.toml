[basic]
description = "泛微Ecology OA 系统的 jqueryFileTree.jsp 接口未对 dir 参数进行有效的路径过滤与校验，攻击者可通过构造 ../../ 等路径穿越序列，越权遍历并读取服务器任意目录下的敏感文件，包括数据库配置文件、系统配置文件、源代码等，导致严重的信息泄漏风险。该漏洞利用无需登录认证，攻击门槛低，影响泛微Ecology 多个版本，对企业内部办公系统的数据安全构成直接威胁。"
published = "0701"
remediation = "建议联系泛微获取最新安全补丁（Ecology v10.75+），升级至包含该漏洞修复的版本。临时缓解措施：在Web服务器（如Nginx/Apache）层面添加访问控制规则，禁止外部对 `/hrm/hrm_e9/orgChart/js/jquery/plugins/jqueryFileTree/connectors/jqueryFileTree.jsp` 路径的访问，或直接删除该目录下的 jqueryFileTree.jsp 文件（若业务未使用此组件）。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "泛微 Ecology 目录遍历漏洞"
updated = "0701"

