[basic]
description = "HP-UX 10.30 操作系统的 Telnet 远程登录服务存在输入验证缺陷，未经身份认证的远程攻击者可通过网络向目标主机的 Telnet 端口（TCP 23）发送特制畸形数据包，触发 Telnet 守护进程异常退出，导致服务拒绝访问。该漏洞影响运行 HP-UX 10.30 版本的 HP 工作站与服务器，攻击者无需任何凭据即可在低复杂度条件下完成攻击，造成受影响系统上合法用户无法通过 Telnet 进行远程管理，危害等级为中危。"
published = "1997-10-01T04:00:00.000"
remediation = "升级至 HP-UX 11.0 或更高版本（已修复该 Telnet 服务拒绝服务漏洞），或应用 HP 官方发布的 PHNE_19002 补丁。若暂时无法升级，建议在防火墙层面限制 Telnet 端口 (23/tcp) 仅允许受信 IP 访问，或禁用 Telnet 服务改用 SSH 替代。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "HP HP-UX 10.30 Telnet 服务拒绝服务漏洞"
updated = "2026-06-16T21:49:57.627"

