[basic]
description = "Becky! Internet Mail 客户端 1.26.04 及更早版本存在缓冲区溢出漏洞。当用户转发邮件时，攻击者可向邮件头部发送超长的 Content-type: MIME 字段触发缓冲区溢出，导致目标邮件客户端崩溃，造成拒绝服务。该漏洞无需复杂认证条件，攻击者可通过构造恶意邮件并诱导目标用户执行转发操作实施攻击。"
published = "2000-10-20T04:00:00.000"
remediation = "升级至 Becky! Internet Mail 2.x 或更高版本（当前最新为 2.83.03），该漏洞已在后续版本中修复。临时缓解措施：在邮件客户端设置中禁用自动转发功能，不转发来源不明的邮件，尤其是包含异常 MIME 头部的邮件。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Becky! Internet Mail 缓冲区溢出拒绝服务漏洞"
updated = "2026-06-16T21:52:22.547"

