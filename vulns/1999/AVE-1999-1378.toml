[basic]
description = "man.sh CGI 脚本存在远程命令执行漏洞，该脚本最初随 1998 年 5 月 SysAdmin Magazine 发布。由于脚本未对用户输入进行充分过滤与验证，未经身份认证的远程攻击者可通过构造恶意 HTTP 请求向脚本传递特殊参数，从而在 Web 服务器上执行任意操作系统命令。该漏洞影响部署了 man.sh CGI 脚本的 Web 服务器，攻击者无需预先认证即可利用，攻击过程通过网络即可完成，可导致服务器被完全控制。"
published = "1998-05-15"
remediation = "立即从 Web 服务器中删除或禁用不可信的 man.sh CGI 脚本及其所在目录；检查并移除所有来源不明或未经验证的 CGI 脚本，仅保留经过安全审计的程序；对保留的 CGI 脚本严格校验和转义用户输入，禁止将用户输入直接拼接进系统命令；在 Web 服务器配置中限制 CGI 执行目录权限，并启用请求日志记录以便审计异常访问。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "SysAdmin Magazine man.sh CGI 脚本 远程代码执行漏洞"
updated = "2026-07-19"

