[basic]
description = "Atlassian Confluence Data Center 与 Server 自 5.2 版本起存在一个高危远程代码执行漏洞（CVE-2024-21683，CVSS 8.8，CWE-94 代码注入）。已通过身份认证的攻击者可通过向 /admin/plugins/newcode/addlanguage.action 接口发送特制的 multipart/form-data 请求，利用新增语言功能注入恶意代码，从而在目标服务器上执行任意命令。该漏洞影响 Confluence Data Center 及 Server 多个受支持版本，对系统机密性、完整性与可用性均造成高影响，无需用户交互即可被利用，攻击者可借此完全控制服务器。Atlassian 建议用户升级至官方发布的最新修复版本。"
published = "2024-05-21T23:15:07.923"
remediation = "Atlassian 已发布修复版本，Confluence Data Center 建议升级至 8.9.1 或 LTS 版本 8.5.9/7.19.22，Confluence Server 建议升级至 8.5.9 或 7.19.22。如无法立即升级，可通过反向代理或 WAF 拦截对 /admin/plugins/newcode/addlanguage.action 的访问请求，同时限制管理员面板的网络访问范围并启用多因素认证以降低未授权利用风险。"
score = 8.8
severity = "HIGH"
sources = ["hwpoc"]
title = "Atlassian Confluence 远程代码执行漏洞"
updated = "2026-06-17T07:09:58.813"

