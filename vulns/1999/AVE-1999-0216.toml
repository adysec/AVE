[basic]
description = "BSD profil(2) 系统调用存在设计缺陷，本地攻击者可通过结合 profiling 与 execve 机制，在程序执行过程中修改其内部数据空间，从而提升权限或执行任意代码。该漏洞影响 NetBSD 1.4、OpenBSD 2.5 及 Solaris 7.0 等操作系统，CVSS 评分 7.2，危害等级高。攻击者需拥有本地账户权限，利用门槛较低且已有公开利用代码。"
published = "1999-08-09T04:00:00.000"
remediation = "升级 NetBSD 至 1.4.1 及以上版本，升级 OpenBSD 至 2.6 及以上版本，升级 Solaris 至 7.0 对应补丁簇（如 Kernel Patch 107528-xx）。如无法升级，可通过禁用 setuid 二进制文件的 profiling 功能或限制 profil(2) 系统调用的访问权限作为临时缓解措施。"
score = 7.2
severity = "HIGH"
sources = ["exploitdb"]
title = "BSD profil(2) 系统调用本地权限提升漏洞"
updated = "2026-06-16T21:48:49.237"

