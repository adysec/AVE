[basic]
description = "Microsoft IIS 4.0 存在远程缓冲区溢出漏洞，远程攻击者可通过向目标服务器发送特制的包含 .HTR、.IDC 或 .STM 扩展名的畸形请求，触发缓冲区溢出，导致服务崩溃或拒绝服务。该漏洞影响 IIS 4.0 版本，CVSS 评分 10.0，危害等级严重。攻击者无需身份认证即可远程利用，建议升级至更高版本或安装安全补丁。"
published = "1999-06-16T04:00:00.000"
remediation = "立即升级至 IIS 5.0 或更高版本（如 Windows 2000 自带的 IIS 5.0），并安装微软安全公告 MS99-025 提供的补丁。若暂时无法升级，请在 IIS 管理器中移除 .HTR、.IDC、.STM 扩展的脚本映射，或使用 URLScan 2.5 以上版本配置拒绝包含这些扩展名的请求，同时在防火墙层面限制 80/443 端口仅允许可信 IP 访问。"
score = 10
severity = "CRITICAL"
sources = ["exploitdb"]
