[basic]
description = "Linux 内核 ASoC 子系统中 wcd938x 音频编解码器驱动存在数组越界访问漏洞。混音器控件错误地将通道 ID 用作端口 ID，而非从 chan_info 数组中正确推导端口 ID，导致访问 port_map 数组时越界并破坏 wcd938x_sdw_priv 结构体。本地攻击者可通过精心构造的音频操作触发此漏洞，造成系统崩溃或潜在权限提升。该漏洞影响使用 wcd938x 驱动的 Linux 内核相关版本，CVSS 评分 9.8，危害等级严重。"
published = "2024-06-20T11:15:55.207"
remediation = "立即升级 Linux 内核至 5.15.22、5.16.8 或 5.17 及以上版本，该漏洞已在对应稳定分支中修复。补丁提交位于 sound/soc/codecs/wcd938x.c，修复了 mixer 控制中错误使用 channel id 代替 port id 导致的数组越界访问问题。如无法立即升级内核，可临时禁用 wcd938x 声卡编解码器驱动模块（`modprobe -r snd-soc-wcd938x`），但会丧失音频功能。"
score = 9.8
severity = "CRITICAL"
sources = ["msrc"]
title = "Linux ASoC wcd938x 音频编解码器驱动越界写入漏洞"
updated = "2026-06-17T05:16:00.127"

