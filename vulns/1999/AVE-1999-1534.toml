[basic]
description = "SunOS 4.0.x 系统的 rcp（远程拷贝）命令存在认证绕过与任意命令执行漏洞。由于其对 nobody 用户配置不当，来自受信主机的远程攻击者无需有效身份认证即可利用该漏洞以 root 权限执行任意命令，完全控制系统。该漏洞 CVSS 评分 10.0，危害等级严重，影响 SunOS 4.0.x 系列版本。"
published = "1989-10-26T04:00:00.000"
remediation = "立即升级 SunOS 至 4.0.3c 及以上补丁版本，或安装 Sun 官方发布的 rcp 安全补丁。如无法升级，可在 /etc/hosts.equiv 和 .rhosts 中移除不可信主机，并限制 rcp 服务仅对受控网络开放。由于 SunOS 4.0.x 已停止维护，建议迁移至受支持的操作系统（如 Solaris 或 Linux）以彻底消除风险。"
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "Sun SunOS rcp 远程代码执行漏洞"
updated = "2026-06-16T21:50:30.147"

