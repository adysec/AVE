[basic]
description = "致远 A8 OA 系统的 component.do 接口存在认证绕过漏洞，攻击者无须身份验证即可直接访问该接口，通过构造特制的请求参数触发后台功能调用，最终实现远程代码执行。该漏洞影响致远 A8/A6 等多个版本，攻击者仅需网络可达即可利用，危害严重，建议立即升级至安全版本。"
published = "0723"
remediation = "立即升级致远A8至官方最新安全版本（V8.1 SP2及以上补丁包），或联系致远技术支持获取针对component.do认证绕过漏洞的专项补丁。如无法立即升级，在Nginx/WAF层面配置规则拦截对/seeyon/component.do路径的未授权外部访问，并限制OA系统仅对内网可信IP开放。同时排查access日志中是否存在异常调用component.do的请求，确认是否已被利用。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "致远A8 认证绕过远程代码执行漏洞"
updated = "0723"

