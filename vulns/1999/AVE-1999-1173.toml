[basic]
description = "Cactus Software Shell Lock 的 shell-lock 功能存在临时文件符号链接漏洞，本地用户可通过创建符号链接指向目标 shell 文件，诱使程序在处理临时文件时读取或修改已被解码的 shell 文件，从而在 shell 文件执行前篡改其内容。该漏洞影响 Cactus Software Shell Lock 软件，攻击条件要求攻击者具备本地访问权限。攻击者可利用符号链接攻击读取敏感信息或修改已解码的 shell 脚本，进而实现权限提升或执行任意命令。该漏洞 CVSS 评分 7.2，危害等级为高。"
published = "1999-10-04T04:00:00.000"
remediation = "由于 Cactus Software Shell Lock 已停止维护，建议立即停止使用该工具，改用支持安全临时文件创建的替代方案（如 shc）。如无法替换，可在执行 shell-lock 前设置 umask 077 限制临时文件权限，并确保临时目录 /tmp 设置了粘滞位，同时移除 shell-lock 的 setuid 权限以防止权限提升。"
score = 7.2
severity = "HIGH"
sources = ["cve"]
title = "Cactus Software Shell Lock 本地符号链接攻击文件篡改漏洞"
updated = "2026-06-16T21:50:40.697"

