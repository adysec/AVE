[basic]
description = 'cJSON 库 1.7.18 之前版本的 `parse_string` 函数存在基于堆的缓冲区越界读取漏洞（CWE-125）。当调用 `cJSON_ParseWithLength` 解析缺少尾随换行符的特制畸形 JSON 输入（如 `{"1":1,`）时，触发越界读访问，可能导致进程崩溃或敏感信息泄露。攻击者无需认证即可通过构造恶意 JSON 数据触发该漏洞，影响所有使用受影响 cJSON 版本解析不可信 JSON 输入的应用。'
published = "2025-05-23T16:15:22.080"
remediation = "升级 cJSON 库至 1.7.18 或更高版本，该版本已修复 parse_string 函数中因缺少换行符导致的堆缓冲区越界读取问题。无法升级时，可在调用 cJSON_ParseWithLength 前对输入尾部添加换行符作为临时缓解。"
score = 2.9
severity = "LOW"
sources = ["msrc"]
title = "cJSON cJSON 堆缓冲区越界读取漏洞"
updated = "2026-06-17T06:44:24.080"

