[basic]
description = "Ipswitch IMail 5.0.8/6.0/6.1 版本中的 IMonitor 组件 status.cgi CGI 脚本存在拒绝服务漏洞。远程攻击者无需身份认证，可通过向该脚本发送大量请求导致服务资源耗尽，造成 IMail 邮件服务拒绝服务。此漏洞影响 Ipswitch IMail 5.0.8、6.0 及 6.1 版本，CVSS 评分 5.0，危害等级中危。"
published = "2000-01-05T05:00:00.000"
remediation = "升级 Ipswitch IMail 至 6.2 或更高版本以修复该漏洞；如无法升级，在 Web 服务器层面限制对 `/cgi-bin/status.cgi` 的访问，仅允许受信 IP 通过防火墙规则访问 IMonitor 服务端口（默认为 8383），并限制单个 IP 的请求速率以缓解 DoS 攻击。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Ipswitch IMail IMonitor status.cgi 拒绝服务漏洞"
updated = "2026-06-16T21:50:54.633"

