[basic]
description = "wu-ftpd 及 ProFTPD 的 realpath 函数存在缓冲区溢出漏洞，远程攻击者无需身份认证即可通过向目标 FTP 服务器发送特制的路径请求触发该漏洞，导致缓冲区溢出并实现远程 root 权限获取。该漏洞影响 wu-ftpd 2.4.2、ProFTPD 1.2 pre1 及 SCO Open Server 5.0.5 等版本，CVSS 评分 10.0，危害等级严重。厂商已发布安全更新修复此漏洞。"
published = "1999-02-09T05:00:00.000"
remediation = "升级 wu-ftpd 至 2.5.0 及以上版本，或升级 ProFTPD 至 1.2.0 及以上稳定版。如无法立即升级，可在 inetd/xinetd 配置中禁用 FTP 服务或限制可信任 IP 访问作为临时缓解措施。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "WU-FTPD 和 ProFTPD realpath 远程缓冲区溢出漏洞"
updated = "2026-06-16T21:48:14.780"

