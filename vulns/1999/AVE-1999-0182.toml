[basic]
description = "SoftCart 电子商务软件的 CGI 程序 SoftCart.exe 存在配置错误，攻击者可通过直接访问该 CGI 程序获取未授权的私人信息。该漏洞源于管理员未正确配置 SoftCart 的访问控制或目录权限，导致敏感数据（如配置文件、交易记录等）可被远程用户直接下载查看。攻击者无需身份验证即可在受影响服务器上执行信息泄露操作，造成敏感数据外泄风险。"
published = "1999-04-01"
remediation = "检查 SoftCart 安装目录的访问权限配置，确保 SoftCart.exe 和相关配置文件不被直接通过 Web 服务器访问。升级到 SoftCart 官方发布的最新安全版本，删除或禁用不需要的 CGI 脚本，配置 Web 服务器的访问控制列表以限制对 cgi-bin 目录的访问，启用日志审计监控异常请求。"
score = 5.0
severity = "MEDIUM"
sources = ["cve"]
title = "SoftCart CGI 程序配置错误信息泄露漏洞"
updated = "2026-06-16"

