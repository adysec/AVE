[basic]
description = "标签之间。<value>Unix 系统的 NIS+（网络信息服务增强版）rpc.nisd 服务器存在安全漏洞，远程攻击者无需身份认证即可执行特定的 RPC 调用，借此获取目标系统的敏感信息、禁用安全日志记录或篡改 NIS+ 缓存数据。该漏洞影响运行 NIS+ 服务的 Unix/Linux 系统，攻击者可通过网络直接利用该缺陷，导致系统信息泄露或服务可用性受损。"
published = "1998-03-01T05:00:00.000"
remediation = "建议立即安装 Sun 针对 NIS+ 的安全补丁（如 Solaris 2.6/7/8 对应补丁 ID 107181-xx 或 107182-xx），升级至最新受支持版本。如无法打补丁，可在 /etc/hosts.allow 和 /etc/hosts.deny 中限制 rpc.nisd 的访问来源，仅允许可信网段连接，并在防火墙上阻断对 RPC 端口映射服务（111/TCP,UDP）和 NIS+ 服务端口（通常为 32771/TCP,UDP）的未授权访问。若业务允许，建议停用 NIS+ 并迁移至 LDAP 目录服务。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
