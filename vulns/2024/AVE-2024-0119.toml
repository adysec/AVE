[basic]
description = "锐捷EG易网关的登录接口login.php存在认证绕过缺陷，攻击者可通过在密码参数后拼接特殊命令获取设备管理员账户密码；同时cli.php的shell接口未授权即可执行任意系统命令。攻击者只需网络可达即可利用，无需有效凭据，可导致设备完全失陷、内网横向移动等严重安全风险。"
published = "2023-11-28"
remediation = "升级设备固件至最新版本，限制WEB管理界面仅允许受信任IP访问，修改默认管理员密码，关闭非必要的guest认证等前端功能模块。"
score = 7.5
severity = "HIGH"
sources = ["hwpoc"]
title = "锐捷 EG 易网关 login.php 与 cli.php 远程命令执行漏洞"
