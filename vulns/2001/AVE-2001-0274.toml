[basic]
description = "Maxum Rumpus FTP Server 1.3.2/1.3.3/1.3.4/2.0.3 开发版本存在目录名处理缺陷导致的远程拒绝服务漏洞。未经身份认证的远程攻击者可通过发送特制的畸形目录名请求，触发服务端异常导致 FTP 服务崩溃拒绝服务。该漏洞影响 Rumpus FTP Server 多个早期版本，攻击者无需认证即可远程触发，利用方式为发送精心构造的目录名命令导致服务器进程崩溃拒绝服务。"
published = "2001-09-20"
remediation = "建议立即升级至 Maxum Rumpus FTP Server 2.0.4 或更高版本（官方已发布修复版本）。若无法升级，建议立即停用该 FTP 服务并迁移至现代维护中的 FTP 服务器（如 vsftpd、ProFTPD 或 FileZilla Server），或在防火墙层面限制仅信任 IP 访问 21 端口作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Maxum Development Rumpus FTP Server 远程拒绝服务漏洞"
updated = "2001-09-20"

