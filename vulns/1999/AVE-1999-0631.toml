[basic]
description = "Solaris 7.0 CDE dtmail/mailtool 组件存在缓冲区溢出漏洞，本地攻击者可通过构造过长的 MIME Content-Type 头部字段触发栈溢出，从而提升权限至 root。该漏洞源于 mailtool 对 MIME 类型字符串长度缺乏边界检查，导致栈缓冲区被覆盖并劫持控制流。影响范围为运行 CDE 桌面环境的 Solaris 7.0 系统，攻击条件需具备本地账户访问权限，利用方式为本地提权，CVSS 评分 7.2（高危）。"
published = "1999-11-30T05:00:00.000"
remediation = "建议立即安装 Solaris 7.0 MR 5 补丁或更高版本，升级到 Solaris 8/9/10，这些版本均已修复此 CDE dtmail/mailtool 缓冲区溢出漏洞。如果无法立即升级到已修复的版本，请通过编辑 /etc/dtmail/config 文件禁用 dtmail 服务，或在防火墙中禁用 CDE 网络服务作为临时缓解措施。在应用任何补丁之前，请确保停止 dtmail 服务以避免攻击。"
score = 7.2
severity = "HIGH"
sources = ["exploitdb"]
title = "Sun Solaris CDE dtmail 缓冲区溢出漏洞"
updated = "2026-06-16T21:49:10.190"

