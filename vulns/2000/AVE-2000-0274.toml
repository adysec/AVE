[basic]
description = "Windows 95/98 网络软件在处理 UNC 路径时存在缓冲区溢出漏洞，远程攻击者可通过向目标系统发送超长文件名字符串触发该漏洞，导致任意代码执行。该漏洞影响 Windows 95/98 操作系统，攻击者可通过构造恶意 File Access URL 诱使用户访问来实施攻击，CVSS 评分 7.6，危害等级高危。"
published = "1999-11-12T05:00:00.000"
remediation = "安装 Microsoft 安全公告 MS99-049 提供的补丁 (KB245729)。Windows 95 和 Windows 98 已停止支持，建议升级到受支持的 Windows 版本。如无法升级，在防火墙层面禁用 NetBIOS (TCP 139) 和 SMB (TCP 445) 端口，并在 Internet Explorer 中禁用文件下载及 UNC 路径处理作为临时缓解。"
score = 7.6
severity = "HIGH"
sources = ["exploitdb"]
title = "Microsoft Windows 95/98 UNC 缓冲区溢出漏洞"
updated = "2026-06-16T21:51:29.500"

