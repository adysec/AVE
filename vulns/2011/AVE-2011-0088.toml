[basic]
description = "Adobe Reader 和 Acrobat 的 U3D 组件存在内存破坏漏洞，攻击者可构造特制的 PDF 文件，诱导用户打开后触发 U3D 解析过程中的内存越界写入，导致远程代码执行或程序崩溃。该漏洞影响 Windows 和 Mac OS X 平台上的 Adobe Reader/Acrobat 10.1.1 及更早版本，以及 UNIX 平台上的 Adobe Reader 9.x 至 9.4.6 版本。CVSS 评分 9.8，危害等级严重。该漏洞已在 2011 年 12 月被野外利用，Metasploit 框架已集成对应利用模块，攻击者无需身份认证即可通过诱导用户打开恶意 PDF 文件实现完全控制目标系统。"
published = "2011-12-07T19:55:01.673"
remediation = "立即将 Adobe Reader 和 Acrobat 升级至 10.1.2 及以上版本（Windows/Mac），UNIX 系统升级至 Reader 9.4.7 及以上版本。作为临时缓解措施，可通过注册表或组策略禁用 U3D 插件：在 Windows 中设置 Adobe Reader 的增强安全选项，或使用 Adobe Customization Wizard 统一部署禁用 U3D。Red Hat 用户应安装 RHSA-2012-0011 提供的更新包。同时建议在邮件网关层面拦截含 3D 内容的 PDF 文件。"
score = 9.8
severity = "CRITICAL"
sources = ["kev"]
title = "Adobe Acrobat/Reader U3D内存破坏远程代码执行漏洞"
updated = "2026-06-16T23:31:23.203"

