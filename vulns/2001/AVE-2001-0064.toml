[basic]
description = "glibc 2.1.9x 及更早版本中存在环境变量处理缺陷，在执行 setuid/setgid 程序时未能正确清除 RESOLV_HOST_CONF、HOSTALIASES 或 RES_OPTIONS 等环境变量，本地攻击者可通过设置恶意环境变量利用该漏洞读取任意文件，或结合 Resolv+ 库实现本地命令执行。该漏洞影响 Linux 系统中使用受影响 glibc 版本的发行版，危害等级低，需本地访问权限才能利用。"
published = "2001-03-26T05:00:00.000"
remediation = "升级 glibc 至 2.2 及以上版本。对于无法升级的系统，在启动 setuid/setgid 程序前使用 `env -i` 或 `ld.so --preload` 清除 `RESOLV_HOST_CONF`、`HOSTALIASES`、`RES_OPTIONS` 环境变量，并检查系统脚本中是否有环境变量继承风险，限制本地用户执行 setuid 二进制文件时的环境变量传递。"
score = 2.1
severity = "LOW"
sources = ["exploitdb"]
title = "glibc RESOLV_HOST_CONF 环境变量处理本地信息泄露漏洞"
updated = "2026-06-16T21:53:48.183"

