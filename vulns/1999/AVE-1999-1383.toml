[basic]
description = "FreeBSD 系统上的 Pine 邮件客户端在 3.94 及更早版本中存在权限提升漏洞。当用户收到新邮件时，Pine 会创建一个临时锁文件，但程序未对该锁文件进行严格校验，本地攻击者可通过预先创建指向敏感文件的符号链接来实施攻击，利用该 symlink race condition 覆盖或篡改系统文件，从而获取高于当前用户的系统权限。该漏洞仅影响拥有本地登录权限的攻击者，需目标系统运行受影响版本的 Pine 客户端才可被利用。"
published = "1996-08-26T04:00:00.000"
remediation = "立即升级Pine邮件客户端到3.94或更高版本以修复CVE-1999-1187漏洞，建议在FreeBSD系统上使用`pkg update && pkg upgrade pine`命令。升级后，还需要检查是否存在锁文件权限配置不当的问题，建议将锁文件权限设置为600以防止其他用户写入。通过这两个措施既能修复代码中的符号链接漏洞，又能提供额外的权限保护。"
score = 4.6
severity = "MEDIUM"
sources = ["avd"]
title = "华盛顿大学 Pine 符号链接攻击权限提升漏洞"
updated = "2026-06-16T21:49:54.260"

