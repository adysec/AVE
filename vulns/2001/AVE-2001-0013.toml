[basic]
description = "Roaring Penguin rp-pppoe PPPoE 客户端在处理 TCP 零长度选项的 Clamp MSS 功能时存在缺陷，远程攻击者可向目标系统发送特制的 TCP 数据包，触发拒绝服务条件，导致 PPPoE 连接中断。该漏洞影响 RedHat Linux 7.0 及其他使用 rp-pppoe 2.4 及之前版本的系统，攻击者无需认证即可远程利用。"
published = "2001-02-12T05:00:00.000"
remediation = "将 rp-pppoe 升级至 2.5 或更高版本（Red Hat Linux 7.0 用户可通过安装 RHSA-2000-130 安全更新修复）。若无法立即升级，可在 rp-pppoe 配置文件中禁用 Clamp MSS 选项（移除 - clampmss 或设置为 0），阻止对畸形 TCP 选项的错误解析，从而消除远程触发拒绝服务的攻击面。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "红帽 Linux Roaring Penguin PPPoE 拒绝服务漏洞"
updated = "2026-06-16T21:53:30.870"

