[basic]
description = "Unibox 路由器的 `/billing/pms_check.php` 接口对 `ipaddress` 参数缺乏有效的输入过滤与消毒，攻击者可通过在参数中注入反引号包裹的系统命令实现远程命令执行。该漏洞允许未经认证的攻击者获得目标设备的完全控制权限，包括执行任意系统命令、查看敏感文件、修改配置或植入后门。攻击条件仅需目标路由器对外开放 Web 管理接口且网络可达，利用方式简单，危害严重。"
published = "0705"
remediation = "建议升级 Unibox 路由器固件至最新版本，或联系厂商获取补丁。临时缓解措施：在路由器 WAF/防火墙层面限制对 /billing/pms_check.php 的访问，仅允许受信 IP 段访问管理后台，并对 ipaddress 参数实施严格的输入过滤与验证。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "Unibox 路由器 pms_check.php 远程命令执行漏洞"
updated = "0705"

