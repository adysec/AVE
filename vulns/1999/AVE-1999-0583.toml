[basic]
description = 'FTP 协议 PASV 被动模式存在设计缺陷，攻击者可利用 "Pizza Thief" 攻击方式，在 FTP 服务器为合法客户端分配数据端口后，抢先连接该端口从而窃取传输中的数据，或对 FTP 会话执行拒绝服务攻击。该漏洞影响多种 FTP 服务器软件，攻击者无需认证即可实施，导致数据泄露或服务中断。CVSS 评分 6.4，危害等级中危。'
published = "1999-02-01T05:00:00.000"
remediation = "升级 FTP 服务器软件至支持数据连接源 IP 校验的版本，确保 PASV 数据端口仅接受来自同一控制连接客户端的请求。如无法升级，在防火墙层面限制 PASV 端口范围并启用 FTPS（FTP over SSL/TLS，RFC 2228）加密数据通道。临时缓解措施可禁用 PASV 被动模式，强制使用 PORT 主动模式。"
score = 6.4
severity = "MEDIUM"
sources = ["avd"]
title = "FTP 服务器 PASV 模式拒绝服务与资料窃取漏洞"
updated = "2026-06-16T21:48:12.610"

