[basic]
description = "Allaire ColdFusion Server 4.0 及 4.0.1 版本中的 CFCACHE 标签存在信息泄露漏洞。该标签在处理缓存时会将临时文件直接存储在 Web 文档根目录下，且未设置适当的访问限制，导致远程攻击者无需任何认证即可通过直接访问这些缓存文件获取系统敏感信息。CVSS 评分 7.5，危害等级高。"
published = "2000-01-04T05:00:00.000"
remediation = "升级至 ColdFusion Server 4.0.2 及以上版本，该版本已修复 CFCACHE 缓存文件存放在 Web 根目录的问题。若无法升级，修改 ColdFusion 配置文件将缓存目录移至 Web 根目录之外（如 /opt/coldfusion/cache/），并通过 Web 服务器配置禁止直接访问 *.cfm 缓存文件路径。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "Allaire ColdFusion Server 信息泄露漏洞"
updated = "2026-06-16T21:50:54.753"

