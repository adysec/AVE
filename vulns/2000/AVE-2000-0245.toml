[basic]
description = "GNU Emacs 20 版本在启动新子进程时未正确设置从属 PTY 设备权限，存在本地信息泄露漏洞。本地攻击者可利用该漏洞读取或篡改 Emacs 与子进程之间的通信内容，导致敏感信息泄露。攻击者需具备本地系统访问权限方可利用，CVSS 评分 2.1，危害等级低。"
published = "2000-04-18T04:00:00.000"
remediation = "升级到 GNU Emacs 21 及以上版本，该漏洞已在后续版本中修复。如无法升级，可在启动 Emacs 前执行 `umask 077` 限制新建文件的默认权限，或使用 `M-x set-default-file-modes` 将 PTY 文件权限设为 600 以降低被本地其他进程窃听的风险。"
score = 2.1
severity = "LOW"
sources = ["avd"]
title = "GNU Emacs 从属终端权限设置不当本地信息泄露漏洞"
updated = "2026-06-16T21:51:21.877"

