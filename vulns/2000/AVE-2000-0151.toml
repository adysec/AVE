[basic]
description = "mtr（My TraceRoute）网络诊断工具在权限降级处理中存在安全缺陷，仅调用 seteuid 而非 setuid 来降低权限，导致有效用户 ID 未被彻底重置。本地攻击者可利用该漏洞在权限降级后通过进程劫持或信号注入等方式重新获取 root 权限，实现本地权限提升。该漏洞影响 mtr 0.28/0.41 及 Turbolinux 3.5/4.2/4.4/6.0 等版本，CVSS 评分 7.2，危害等级高。"
published = "2000-03-03T05:00:00.000"
remediation = "立即将 mtr 升级至 0.42 或更高版本，该版本已将降权调用从 seteuid() 替换为 setuid()，确保永久丢弃 root 权限。Red Hat Linux/Turbolinux 用户请安装对应发行版安全更新。临时缓解措施：执行 chmod u-s /usr/sbin/mtr 移除 setuid 位（普通用户将无法使用 mtr，仅 root 可执行）。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "Matt Kimball mtr 本地权限提升漏洞"
updated = "2026-06-16T21:51:09.050"

