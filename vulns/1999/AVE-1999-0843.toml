[basic]
description = "Windows NT 系统文件审核策略存在缺陷，对非关键文件或目录的访问操作（无论成功或失败）均不记录审核事件日志。攻击者利用此缺陷可在不触发审核告警的前提下访问、修改或删除非关键文件资源，绕过安全监控机制。该漏洞影响 Windows NT 4.0 及早期版本，CVSS 评分 10.0（严重），属于安全审计绕过类漏洞。攻击条件为本地或远程拥有文件系统访问权限，利用方式为直接操作非关键文件/目录且不留痕迹。"
published = "1999-01-01T05:00:00.000"
remediation = '''
tags
- The content inside <value> will be used as the remediation field

Let me craft a good Chinese remediation suggestion:
- Upgrade to a modern Windows server version
- Configure file audit policies properly
- Provide specific steps and mitigation measures分析：CVE-1999-0577涉及Windows NT系统的文件审计策略未记录非关键文件/目录的成功/失败事件。根据漏洞描述，需要修复Windows NT的日志审计功能。

<value>升级到Windows Server 2003 SP1或更高版本，使用本地安全策略配置“拒绝访问检查”和“成功/失败审计”策略，对于旧系统可通过修改注册表项[HKEY_LOCAL_MACHINE\SYSTEM\CurrentControlSet\Control\Lsa]下的Audit基址来启用审计日志记录，如无法立即升级，建议通过组策略强制启用文件审计策略。'''
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "Microsoft Windows NT 文件审核策略日志记录缺失漏洞"
