[basic]
description = "Alibaba HTTP 服务器存在目录遍历（路径遍历）漏洞。该服务器未能正确过滤 HTTP 请求中的 ../（点点）路径序列，导致远程攻击者可在未认证的情况下，通过构造包含点号序列的特制 HTTP 请求读取 Web 根目录之外的任意文件。受影响范围为运行 Alibaba HTTP 服务器的系统，攻击条件仅需攻击者能与目标服务器建立普通 HTTP 连接。利用方式通常为在 GET 请求的路径中拼接 ../../../../etc/passwd 等序列，从而获取系统口令文件、配置文件或源代码等敏感信息，造成信息泄露。"
published = "1999-05-12"
remediation = "该 Alibaba HTTP 服务器已停止维护，建议立即停用并迁移至受支持的主流 Web 服务器（如 Apache HTTP Server、Nginx）。迁移前可在前端部署反向代理或 WAF，配置规则拦截请求路径中包含 ../ 或编码形式的目录遍历序列作为临时缓解。"
score = 5.0
severity = "MEDIUM"
sources = ["cve"]
title = "Alibaba HTTP 服务器 目录遍历任意文件读取漏洞"
updated = "2026-07-18"

