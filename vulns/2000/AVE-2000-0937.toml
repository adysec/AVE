[basic]
description = "BSD 系 Unix 系统中 lpr/lpd 打印服务的 printjob.c 文件内的 startprinting() 函数存在格式化字符串漏洞。该函数在调用 syslog 记录日志时，错误地将 checkremote() 函数返回的不可信数据直接作为格式化字符串参数使用，而非作为普通字符串参数传递。本地攻击者可通过构造特制的打印任务请求，向该函数传递包含格式化说明符的恶意字符串，触发格式化字符串漏洞，从而以 lp 守护进程权限执行任意代码，实现本地权限提升。该漏洞影响多个 BSD 衍生系统，攻击者需具备本地系统访问权限。"
published = "2002-08-12T04:00:00.000"
remediation = "立即安装 Red Hat RHSA-2000-066 安全更新，或升级 lpr/lpd 至修复了 syslog 格式化字符串漏洞的版本。对于 BSD 系统，请应用对应厂商补丁或升级至修复后的 lpr 包。临时缓解措施：限制本地用户对打印机系统的访问权限，移除不必要的 lpd 服务 setuid 位。"
score = 7.2
severity = "HIGH"
sources = ["redhat"]
title = "BSD lpr/lpd 格式化字符串本地权限提升漏洞"
updated = "2026-06-16T21:53:23.083"

