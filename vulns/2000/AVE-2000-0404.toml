[basic]
description = "FileMaker Pro 5 的 Web Companion 组件存在安全绕过漏洞，远程攻击者无需身份认证，即可通过 XML 发布功能或电子邮件功能绕过数据库的字段级安全限制，从而未经授权访问或修改受保护的字段数据。该漏洞影响 FileMaker Pro 5 版本，攻击者利用方式简单，可能导致敏感数据泄露。"
published = "2000-05-02T04:00:00.000"
remediation = "升级到 FileMaker Pro 5.5 或更高版本，该漏洞已在后续版本中修复。如无法升级，在 Web Companion 配置中禁用 XML 发布和电子邮件功能，并在防火墙层面限制对 Web Companion 端口（默认 80）的访问，仅允许可信 IP 连接。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "FileMaker Pro 5 Web Companion 数据库安全限制绕过漏洞"
updated = "2026-06-16T21:51:36.373"

