[basic]
description = "安博通下一代防火墙存在命令执行漏洞（CNVD-2026-22891），该漏洞源于系统对用户输入的参数过滤不严，未经身份认证的远程攻击者可通过构造特制的 HTTP 请求向目标设备注入恶意系统命令，成功利用后可获取服务器完全控制权，执行任意系统命令，进而可能导致敏感数据泄露或内网横向移动。该漏洞影响安博通下一代防火墙多款版本。"
published = "20260713"
remediation = "立即联系安博通技术支持（400-810-9005）获取针对该命令执行漏洞的专用修复补丁或固件升级包。临时缓解措施：在防火墙管理界面中禁用非必要的远程管理接口（如Telnet/SSH），限制管理IP白名单，并通过ACL策略封禁对设备Web管理端口的非授权访问。"
