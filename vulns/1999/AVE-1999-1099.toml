[basic]
description = "IBM AIX 4.2.1 及之前版本中的 snap 命令存在不安全临时文件创建漏洞。snap 在执行时会在 /tmp/ibmsupt 目录下创建临时文件，但该目录权限设置为世界可读，且执行 snap -a 后不会清理或删除该目录及其中内容。本地攻击者可利用此竞态条件，在 root 用户运行 snap -a 之前提前创建 /tmp/ibmsupt/general/passwd 符号链接指向 /etc/security/passwd，导致系统 shadow 口令文件以可读权限暴露，从而获取其他用户的密文密码。该漏洞需本地 shell 访问权限，影响 AIX 4.2.1 及更早版本。"
published = "1999-02-17T05:00:00.000"
remediation = "升级到 AIX 4.3.2 或更高版本，该版本修复了 snap 命令创建 /tmp/ibmsupt 目录时权限设置不安全且未清理临时文件的问题。如无法升级，可在执行 snap -a 前手动删除 /tmp/ibmsupt 目录，或通过文件系统 ACL 限制普通用户对 /tmp/ibmsupt 的访问权限。也可安装 IBM 官方 APAR 补丁 IX84267。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "IBM AIX snap 不安全的临时文件创建漏洞"
updated = "2026-06-16T21:50:22.220"

