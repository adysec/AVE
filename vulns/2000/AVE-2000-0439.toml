[basic]
description = "Allaire ColdFusion Server 4.5.1 的文件缓存组件存在拒绝服务漏洞。远程攻击者无需身份认证即可通过向服务器发送大量针对 CFCACHE 标签缓存文件的重复请求，由于这些缓存文件未被存储在内存中，导致服务器资源被耗尽，从而引发拒绝服务。该漏洞攻击复杂度低，仅需网络访问即可触发，影响 ColdFusion Server 4.5.1 版本。"
published = "2000-05-10T04:00:00.000"
remediation = "升级 ColdFusion Server 至 4.5.2 或更高版本，该漏洞已在后续版本中修复。如无法升级，可在 ColdFusion 管理后台禁用 CFCACHE 标签缓存功能，或限制对缓存文件的直接 HTTP 访问（通过 Web 服务器 URL 重写规则拦截对缓存目录的请求）。鉴于该产品已极为老旧，建议迁移至受支持的 Adobe ColdFusion 现代版本（2016/2021/2023）或替代平台。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Allaire ColdFusion Server 4.5.1 文件缓存拒绝服务漏洞"
updated = "2026-06-16T21:51:39.460"

