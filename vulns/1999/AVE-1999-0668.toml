[basic]
description = "Internet Explorer 中的 scriptlet.typelib ActiveX 控件被错误标记为「可安全执行脚本」，远程攻击者可通过构造恶意网页利用该漏洞执行任意命令。Bubbleboy 蠕虫即利用此漏洞进行传播，影响 Microsoft Internet Explorer 4.0 和 5.0 版本，用户访问恶意网页即可能触发漏洞，导致系统被完全控制。"
published = "1999-08-21"
remediation = "安装 Microsoft 安全公告 MS99-032 提供的安全更新补丁，或升级 Internet Explorer 至更高版本以修复 ActiveX 控件的安全脚本标记问题。对于无法升级的系统，在 Internet 安全区域中将'对标记为可安全执行脚本的 ActiveX 控件执行脚本'设置为禁用。"
score = 5.1
severity = "MEDIUM"
sources = [
    "cve",
    "epss",
]
title = "Microsoft Internet Explorer scriptlet.typelib ActiveX 控件远程代码执行漏洞"
updated = "2026-06-16"

