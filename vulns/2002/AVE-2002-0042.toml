[basic]
description = "Analog 日志分析工具 5.23 之前版本中的 anlgform.pl 脚本未对 PROGRESSFREQ 进度更新命令进行访问限制，远程攻击者可通过向目标服务器发送特制的 HTTP 请求，利用该命令频繁报告更新进度，导致 Web 服务器错误日志被大量写入而耗尽磁盘空间，造成拒绝服务。该漏洞影响 Analog 5.23 之前所有版本，攻击无需身份认证，危害等级中等。"
published = "2002-10-11T04:00:00.000"
remediation = "升级 Analog 至 5.23 或更高版本，该版本限制了对 PROGRESSFREQ 命令的访问。如无法立即升级，可在 Web 服务器配置中限制对 anlgform.pl 的访问（如通过 .htaccess 或 Nginx location 规则仅允许可信 IP 访问），并监控错误日志大小设置日志轮转（logrotate）防止磁盘耗尽。"
score = 5
severity = "MEDIUM"
sources = ["osv"]
title = "Stephen Turner Analog 5.23 拒绝服务漏洞"
updated = "2026-06-16T21:58:49.523"

