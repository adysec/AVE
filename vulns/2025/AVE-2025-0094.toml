[basic]
description = "九思OA存在未授权XML外部实体注入（XXE）漏洞。未经身份认证的远程攻击者可利用系统对XML解析的安全性缺陷，通过构造包含恶意外部实体的XML请求包实现任意文件读取、内网探测或服务器端请求伪造（SSRF）攻击。该漏洞无需登录即可触发，危害较大，建议用户及时更新补丁或限制XML解析功能。"
published = "0704"
remediation = '联系九思官方获取最新安全补丁版本，升级至修复 XXE 的版本。临时缓解措施：修改 XML 解析配置，在 DocumentBuilderFactory 中禁用外部实体，设置 setFeature("http://apache.org/xml/features/disallow-doctype-decl", true) 和 setFeature("http://xml.org/sax/features/external-general-entities", false)；同时限制未经身份验证的用户访问 XML 解析接口，在 Web 应用防火墙（WAF）侧添加 XXE 攻击检测规则，拦截包含外部实体声明的请求。'
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "九思 九思OA 未授权XXE漏洞"
updated = "0704"

