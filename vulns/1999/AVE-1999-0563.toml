[basic]
description = "Windows NT 系统存在权限提升漏洞，本地用户可通过 Sechole 利用工具获取系统进程的调试级别访问权限，从而以 SYSTEM 权限执行任意代码。该漏洞源于系统权限控制机制缺陷，允许普通用户向系统进程注入调试器，实现权限提升。攻击者需拥有目标系统的本地登录权限，利用门槛较低，影响 Windows NT 4.0 及早期版本系统。"
published = "1998-08-01T04:00:00.000"
remediation = "立即安装 Microsoft Security Bulletin MS98-009 提供的热修复补丁：Windows NT 4.0 x86 安装 privfixi.exe，Alpha 架构安装 privfixa.exe；Windows NT 3.51 分别安装对应版本。该漏洞要求本地登录权限，域控制器默认禁止非管理用户本地登录，不受影响。由于 Windows NT 系列已停止支持，建议升级至 Windows Server 2012 及以上受支持版本。作为临时缓解措施，可限制非管理用户的本地控制台登录权限。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "Microsoft Windows NT 特权提升漏洞"
updated = "2026-06-16T21:48:11.740"

