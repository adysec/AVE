[basic]
description = "Alcatel OmniPCX Enterprise Communication Server R7.1 及之前版本的 Unified Maintenance Tool 中的 masterCGI 组件存在命令注入漏洞。远程攻击者可在 ping 操作的 user 参数中注入 shell 元字符，无需身份认证即可在目标系统上以 Web 服务器权限执行任意命令，导致服务器完全被控制。该漏洞 CVSS 评分 9.8，危害等级严重，影响 Alcatel-Lucent 全系列企业通信服务器。"
published = "2007-09-18T21:17:00.000"
remediation = "立即升级到 Alcatel-Lucent 官方修复版本（R7.1 之后的所有受支持版本），该版本已对 shell 元字符进行正确过滤并加强了访问控制。如无法升级，可在防火墙上限制仅允许维护人员 IP 访问 OXE Web 管理界面（端口 443），或直接禁用 Web 服务器功能（会损失部分非电话业务功能）作为临时缓解措施。"
score = 9.8
severity = "CRITICAL"
sources = ["kev"]
title = "Alcatel-Lucent OmniPCX Enterprise Communication Server masterCGI 命令注入漏洞"
updated = "2026-06-16T22:40:52.660"

