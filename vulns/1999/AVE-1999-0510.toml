[basic]
description = "BSD 系列操作系统（包括 OpenBSD 2.2 及更早版本、FreeBSD 2.2.5 及更早版本）中的系统配置控制（sysctl）功能存在源路由包过滤缺陷，即使在设置了 dosourceroute 或 forwarding 变量的情况下，系统仍然无法正确限制源路由数据包的转发，导致远程攻击者能够利用该漏洞伪造 TCP 连接源地址进行欺骗攻击。该漏洞影响范围较广，攻击者无需认证即可通过网络远程触发，CVSS 评分 5.0，危害等级中危。"
published = "1998-02-01T05:00:00.000"
remediation = "升级至 FreeBSD 2.2.6 及以上或 OpenBSD 2.3 及以上版本。如无法升级，通过 sysctl 设置 net.inet.ip.sourceroute=0 和 net.inet.ip.accept_sourceroute=0 禁用源路由，并在边界防火墙上过滤源路由数据包。该漏洞在于即便设置了 dosourceroute 和 forwarding 变量，内核仍未正确限制源路由包，导致远程攻击者可伪造 TCP 连接。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "OpenBSD FreeBSD 系统 sysctl 源路由数据包限制不当导致 TCP 欺骗漏洞"
updated = "2026-06-16T21:48:06.863"

