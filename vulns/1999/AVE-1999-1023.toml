[basic]
description = "Microsoft Windows 95/98/NT 4.0 操作系统存在 ICMP 重定向消息欺骗漏洞。远程攻击者可通过伪造路由器发送的 ICMP 重定向报文，诱使目标系统修改路由表条目，将网络流量导向无效或恶意路径，导致目标系统无法正常访问网络资源，形成拒绝服务。该漏洞影响 Windows 95、98 及 NT 4.0 版本，无需身份认证即可远程利用，CVSS 评分 5.0，危害等级中等。微软至今未发布官方补丁。"
published = "1999-03-08T05:00:00.000"
remediation = "由于 Windows 95/98/NT 4.0 均已停止支持且无官方补丁，建议立即升级至受支持的 Windows 版本（如 Windows 10/11）。如无法升级，可在防火墙或路由器上过滤入站 ICMP 重定向报文（类型 5），或在主机上禁用 ICMP 路由发现功能（将 EnableICMPRedirect 注册表值设为 0）。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Microsoft Windows 95/98/NT 4.0 ICMP 重定向消息 拒绝服务漏洞"
updated = "2026-06-16T21:50:02.813"

