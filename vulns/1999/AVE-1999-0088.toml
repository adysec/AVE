[basic]
description = "Linux 内核 2.2.3 及更早版本的 IP 分片重组模块存在缺陷，远程攻击者无需身份认证即可向目标系统发送特制的零长度 IP 分片数据包，导致内核在处理畸形分片时进入异常状态，触发系统崩溃或服务中断，造成拒绝服务。该漏洞影响 Linux Kernel 2.1.89 至 2.2.16 版本，CVSS 评分 5.0，危害等级中等。"
published = "1999-03-01T05:00:00.000"
remediation = "升级 Linux 内核至 2.2.4 或更高版本，该版本已修复 IP 分片重组时的空分片处理缺陷。如无法立即升级内核，可在边界防火墙上配置规则丢弃源端口和目标端口不匹配的异常分片包，或在 iptables 中添加规则丢弃零长度分片数据包作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Linux Kernel IP Fragment 拒绝服务漏洞"
updated = "2026-06-16T21:48:22.873"

