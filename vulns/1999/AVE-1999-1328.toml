[basic]
description = "NCSA Telnet 软件包（Macintosh 和 PC 版本）存在默认配置不当的安全漏洞。其配置文件即使在未设置 'ftp=yes' 参数的情况下仍会错误地启用 FTP 服务，导致未经身份认证的远程攻击者能够直接通过该 FTP 服务读取和修改目标系统上的任意文件，严重危害系统数据的机密性和完整性。该漏洞影响 NCSA Telnet for Macintosh 和 PC 版本，无需任何认证即可远程利用，CVSS 评分 7.5，危害等级高。"
published = "1991-09-10T04:00:00.000"
remediation = '在 NCSA Telnet 配置文件中显式添加 "ftp=no" 行以禁用默认启用的 FTP 服务，或升级到已修复此问题的最新版本；如无法升级，在防火墙层面阻止外部对 21/TCP 端口的访问作为临时缓解措施，并考虑迁移到 SSH 等加密远程访问方案以彻底规避风险。'
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "NCSA Telnet 默认配置远程文件读取与修改漏洞"
updated = "2026-06-16T21:49:42.053"

