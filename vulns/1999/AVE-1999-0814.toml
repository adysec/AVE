[basic]
description = "CVE-1999-0550 是一个路由器信息泄露漏洞，由于路由器未对路由表查询请求进行访问控制，攻击者可通过发送 SNMP GetRequest 等协议报文从任意远程主机获取路由器的完整路由表信息。该漏洞影响早期缺乏安全加固的路由器设备，攻击者无需任何认证凭据即可远程读取路由条目，从而获知网络拓扑结构、内部网络地址分配及流量转发路径等敏感信息。攻击者可利用获取的路由信息进一步实施中间人攻击、流量劫持或针对性网络入侵，对网络基础设施安全构成严重威胁。"
published = "1997-01-01T05:00:00.000"
remediation = "立即升级路由器固件至最新版本，在所有接口上启用路由协议认证机制（RIPv2 使用明文/MD5 认证，OSPF 启用 MD5 认证，EIGRP 使用预共享密钥认证），并在面向外部网络的接口上配置访问控制列表（ACL）限制路由更新报文的来源地址，同时通过 `passive-interface` 命令在不需要发送路由更新的接口上禁用路由协议广播，防止攻击者嗅探或伪造路由信息。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "路由器路由表信息泄露漏洞"
updated = "2026-06-16T21:48:36.973"

