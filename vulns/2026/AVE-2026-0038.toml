[basic]
description = "泛微 E-cology OA 系统存在 XML 外部实体注入（XXE）漏洞。系统在处理 XML 数据时未正确禁用外部实体解析，未经身份认证的远程攻击者可通过构造包含恶意外部实体的 XML 请求包触发该漏洞。成功利用可导致攻击者读取服务器任意敏感文件、发起 SSRF 内网探测，造成敏感信息泄露。该漏洞利用难度低、影响范围广，危害严重，建议立即升级至安全版本修复。"
published = "2023-05-19"
remediation = "升级泛微 E-cology 至官方最新安全版本。对于 E9 版本安装安全补丁 v10.80；对于 E8 版本升级至 v10.80；对于 E7 及更早版本升级至 v6.51。如无法立即升级，在 WAF 或反向代理中禁用对 /rest/ofs/RequestInfoByXml 接口的外部访问，并配置 XML 解析器禁用外部实体解析和 DTD 处理。"
score = 8.8
severity = "HIGH"
sources = [
    "hwpoc",
    "cve",
]
title = "泛微 E-cology XML外部实体注入漏洞"
updated = "2023-05-19"

