[basic]
description = "nullmailer 1.00RC5 及更早版本存在拒绝服务漏洞。本地攻击者可通过向不存在的本地用户发送邮件触发错误，导致 nullmailer 邮件发送服务停止响应所有用户的邮件投递请求。该漏洞攻击条件简单（本地低权限即可触发），影响范围限于使用受影响版本 nullmailer 的 Linux/Unix 系统，CVSS 评分 2.1，危害等级低。"
published = "2002-11-29T05:00:00.000"
remediation = "升级 nullmailer 至 1.00RC5-16.1woody2（Debian Woody）或 1.00RC5-17（Debian Sid）及以上版本。如无法立即升级，可限制本地用户对邮件系统的访问权限，或配置 nullmailer 仅接受来自受信任用户的邮件投递请求作为临时缓解措施。"
score = 2.1
severity = "LOW"
sources = ["osv"]
title = "nullmailer 本地用户拒绝服务漏洞"
updated = "2026-06-16T21:59:05.853"

