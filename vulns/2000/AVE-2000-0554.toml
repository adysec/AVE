[basic]
title = "ntop Web模式路径遍历漏洞"
description = "ntop以Web模式运行时存在路径遍历漏洞，远程攻击者无需认证即可通过URL中的..（点点）序列读取服务器上的任意文件，导致敏感信息泄露。该漏洞影响ntop 1.2 a7-9及之前版本。"
severity = "MEDIUM"
score = 5.0
sources = ["cve"]
published = "2000-10-20"
updated = "2000-10-20"
remediation = "升级ntop至1.2 a7-9之后的安全版本，或参考Red Hat安全公告RHSA-2000-049安装补丁更新。"
