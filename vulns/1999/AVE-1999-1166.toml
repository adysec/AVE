[basic]
description = "Eicon Technology Diva LAN ISDN 调制解调器在提供 HTTP 管理服务时，其 login.htm 登录页面对 password 参数的长度缺乏有效校验。远程攻击者无需身份验证，即可向该页面提交超长的密码参数，触发设备内部缓冲区溢出或内存分配异常，导致设备完全挂起（hang）而拒绝服务。受影响设备包括 DIVA ISDN Modem 1.0 与 2.0 版本，攻击方式简单且可远程发起，对网络设备可用性构成直接威胁。"
published = "1999-11-07"
remediation = "升级 Eicon DIVA ISDN Modem 固件至厂商发布的最新修复版本；如无需使用 HTTP 管理功能，应禁用设备的 Web 管理服务或仅允许来自受信任内网地址的访问；在网络边界通过 ACL 限制对调制解调器管理端口的访问，以缓解远程拒绝服务风险。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "Eicon Networks DIVA ISDN Modem login.htm 远程拒绝服务漏洞"
updated = "2026-07-16"

