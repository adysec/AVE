[basic]
description = "IIS 及其他 Web 服务器中的 SSL ISAPI 筛选器存在竞态条件漏洞。当服务器处理 SSL 加密请求时，由于并发访问控制不当，可能导致某些请求在非安全通道上以明文形式泄露敏感信息。攻击者无需特殊权限，通过向目标服务器发送精心构造的 HTTPS 请求即可利用此漏洞。该漏洞影响运行 IIS 的 Windows NT 4.0 等早期版本系统，CVSS 评分 2.6，危害等级低。"
published = "1999-08-11T04:00:00.000"
remediation = "安装 Microsoft 安全公告 MS99-053 提供的补丁程序（KB244613），可从 Microsoft Download Center 获取 x86 和 Alpha 版本。对于仍运行 IIS 4.0 的系统，建议升级至 IIS 5.0 或更高版本以彻底消除该争用条件漏洞。如无法升级，可在高流量场景下避免多线程调用 SSL ISAPI 筛选器作为临时缓解。"
score = 2.6
severity = "LOW"
sources = ["epss"]
title = "Microsoft IIS SSL ISAPI 筛选器争用条件信息泄露漏洞"
updated = "2026-06-16T21:49:12.627"

