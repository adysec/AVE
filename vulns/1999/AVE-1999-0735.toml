[basic]
description = "MBone SDR 软件包在处理 Session Initiation Protocol (SIP) 消息时未对用户输入的特殊字符进行有效过滤，导致远程攻击者可通过在 SIP 消息中注入 shell 元字符（如管道符、分号等）触发命令注入漏洞，从而在目标系统上以 SDR 进程权限执行任意命令。该漏洞影响早期 MBone 多播骨干网环境中的 SDR 会话目录工具，攻击者无需身份认证即可远程利用，CVSS 评分 7.5，危害等级高。"
published = "1999-06-28T04:00:00.000"
remediation = "立即卸载 MBone SDR Package 软件，该软件已停止维护且不再有安全更新。改用现代会话目录工具（如基于 Web 的会议调度系统）替代。如暂时无法卸载，在防火墙层面过滤 UDP/TCP 端口 4444（SDR 默认端口）及 SIP 相关流量，并限制仅允许可信 IP 访问 SDR 服务。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "MBone SDR 远程代码执行漏洞"
updated = "2026-06-16T21:49:22.043"

