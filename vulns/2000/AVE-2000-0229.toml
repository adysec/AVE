[basic]
description = "Dansie Shopping Cart 3.0.4 的 cart.pl 脚本存在信息泄露漏洞，远程攻击者可通过向目标发送特制的 HTTP 请求，在 URL 中直接引用 env、db 或 vars 表单变量，从而未授权获取购物车数据库内容及系统配置信息。该漏洞攻击复杂度低，无需任何身份认证即可远程利用，可能导致用户订单数据、商品信息及商家敏感配置泄露，影响范围广泛。"
published = "2000-04-14T04:00:00.000"
remediation = "升级至 Dansie 官方发布的安全版本（若仍可得）以修复 cart.pl 对 env/db/vars 参数的处理逻辑；该产品已停止维护，建议迁移至受支持的现代购物车系统。临时缓解措施：修改 cart.pl 源码，在参数解析入口处移除或注释对 env、db、vars 三个表单变量的处理逻辑，并在 Web 服务器层面限制对 cart.pl 的访问来源 IP。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Dansie Shopping Cart 3.0.4 敏感信息泄露漏洞"
updated = "2026-06-16T21:51:19.827"

