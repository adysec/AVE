[basic]
description = "基于 BSD/Qualcomm 的 qpopper POP3 服务器在处理 PASS 命令时存在缓冲区溢出漏洞。远程攻击者无需身份认证，通过向目标服务器的 110 端口发送超长 PASS 命令参数即可触发缓冲区溢出，进而覆盖内存中的关键数据结构，最终以 root 权限执行任意代码。该漏洞广泛影响早期 Linux/Unix 系统中部署的 qpopper 版本，攻击复杂度低，危害严重。"
published = "1998-07-14T04:00:00.000"
remediation = "立即升级 qpopper 至 2.5 或更高版本。SGI IRIX 用户应安装 SGI 安全公告 19980801-01-I 中提供的补丁。如无法升级，可在 inetd 配置中注释掉 pop3 服务行并重启 inetd/xinetd 来临时禁用 POP3 服务，或通过 TCP Wrappers (hosts.deny) 限制对 110 端口的访问作为临时缓解措施。"
score = 9.8
severity = "CRITICAL"
sources = ["epss"]
title = "Qualcomm qpopper POP3 服务器远程缓冲区溢出漏洞"
updated = "2026-06-16T21:47:19.097"

