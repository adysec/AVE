[basic]
description = "WU-FTPD 的 FTP 转换功能在处理恶意构造的文件名时存在命令注入漏洞。当 FTP 转换（如 tar 或 uncompress）功能启用时，攻击者可通过上传包含特殊字符的畸形文件名，使其被作为参数传递给外部转换程序，从而在目标服务器上以 FTP 进程权限执行任意命令。该漏洞影响 WU-FTPD 2.4.2 至 2.6.2 版本，CVSS 评分 7.5，危害等级高。"
published = "1999-12-20"
remediation = "升级 WU-FTPD 至 2.6.3 或更高版本，该版本已修复文件名参数注入漏洞。如无法升级，在 ftpaccess 配置文件中将 conversion 功能设为 no 以禁用自动转换功能，或迁移至 vsftpd 或 ProFTPD 等更安全的替代 FTP 服务端。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "WU-FTPD FTP Conversion 远程代码执行漏洞"
updated = "2026-06-16"

