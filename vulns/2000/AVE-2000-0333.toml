[basic]
description = "Daniel Beckham Finger Server 0.82 Beta 存在命令注入漏洞，远程攻击者可通过向目标服务的 Finger 请求中注入 shell 元字符（如管道符、分号等）来执行任意系统命令。该漏洞源于程序未对用户输入进行充分过滤，攻击者无需身份认证即可利用，CVSS 评分 10.0，危害等级严重。受影响的版本为 Finger Server 0.82 Beta，建议升级至最新版本或禁用该服务。"
published = "2000-02-04T05:00:00.000"
remediation = "立即卸载或禁用 Daniel Beckham Finger Server 0.82 Beta 服务，该版本存在命令注入漏洞且已停止维护。如必须使用 Finger 协议，建议替换为支持输入过滤的现代实现（如 inetutils-finger），并在防火墙层面限制仅允许受信 IP 访问 TCP 79 端口。"
score = 10
severity = "CRITICAL"
sources = ["exploitdb"]
title = "Daniel Beckham Finger Server 0.82 Beta 管道命令注入漏洞"
updated = "2026-06-16T21:51:03.530"

