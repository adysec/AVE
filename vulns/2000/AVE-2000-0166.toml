[basic]
description = "Allaire ColdFusion Server 4.x 存在服务器路径信息泄露漏洞，远程攻击者无需认证即可通过发送特制 HTTP 请求访问 application.cfm 或 onrequestend.cfm 文件，导致服务器真实物理路径泄露。该漏洞可被攻击者利用以进一步探测目标系统结构，为后续攻击提供信息支撑，危害等级中等。"
published = "2000-03-01T05:00:00.000"
remediation = "升级至 ColdFusion 4.5.1 及以上版本，该版本修复了 application.cfm 和 onrequestend.cfm 返回真实路径的问题。如无法升级，在 Web 服务器（IIS/Apache）配置中禁止外部访问这两个文件：IIS 下通过 URLScan 或请求筛选阻止路径含 application.cfm 和 onrequestend.cfm 的请求；Apache 下使用 <Files> 指令拒绝访问。同时移除 webroot 中无需使用的 application.cfm 文件。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Allaire ColdFusion 服务器路径信息泄露漏洞"
updated = "2026-06-16T21:51:11.173"

