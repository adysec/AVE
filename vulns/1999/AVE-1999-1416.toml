[basic]
description = "Quake 2 Server 3.13 for Linux 在加载 config.cfg 配置文件时未对文件权限进行充分校验，本地攻击者可通过建立符号链接将 config.cfg 指向任意目标文件，从而以服务器进程权限读取系统敏感文件。该漏洞影响 Quake 2 Server 3.13 版本，CVSS 评分 2.1，危害等级低。攻击者需拥有本地系统访问权限才能利用。"
published = "1998-02-25T05:00:00.000"
remediation = "升级至 Quake 2 server 3.14 或更高版本，该版本已修复对 config.cfg 配置文件的符号链接检查缺陷。若无法升级，确保 config.cfg 文件仅属主可写（chmod 644），禁止将服务器运行目录置于其他用户可写的路径下，并启用文件系统防符号链接攻击保护（如将受保护目录挂载为 nosuid、nosymfollow）。也可切换到开源的 Yamagi Quake II 等现代移植版，其已彻底修复此问题。"
score = 2.1
severity = "LOW"
sources = ["avd"]
title = "id Software Quake 2 Server 符号链接任意文件读取漏洞"
updated = "2026-06-16T21:49:59.633"

