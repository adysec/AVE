[basic]
description = "Linuxconf 1.11r11-rh2 版本中存在缓冲区溢出漏洞，该漏洞存在于 Red Hat Linux 5.1 系统中。本地攻击者可通过向 LANG 环境变量提交超长字符串触发缓冲区溢出，成功利用此漏洞可获取系统的 root 权限。该漏洞影响范围有限，但危害严重，攻击者需要拥有本地访问权限才能利用。建议升级到不受影响的版本以修复此漏洞。"
published = "1999-12-31T05:00:00.000"
remediation = "升级 linuxconf 至 1.11r12 及以上版本，或升级 Red Hat Linux 至 6.0 以上版本。如无法升级，可限制本地用户设置 LANG 环境变量的权限，或移除 linuxconf 的 SUID 位作为临时缓解措施。"
score = 7.2
severity = "HIGH"
sources = ["cve"]
title = "Red Hat Linux linuxconf 本地缓冲区溢出漏洞"
updated = "2026-06-16T21:50:12.240"

