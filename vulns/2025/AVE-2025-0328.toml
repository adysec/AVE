[basic]
description = "安数云综合日志分析系统存在远程命令执行漏洞，攻击者可在未经认证的情况下通过构造特制的HTTP请求向系统注入恶意命令，导致服务器端执行任意系统命令。该漏洞源于系统对用户输入的过滤不严，攻击者可利用该漏洞获取服务器控制权、窃取敏感数据或进行横向移动。该漏洞影响安数云综合日志分析系统的多个版本，具体利用方式需要结合系统接口进行验证。"
published = "0718"
remediation = "联系安数云厂商获取最新安全补丁，升级综合日志分析系统至最新版本。如暂无法升级，应在防火墙上限制仅允许可信 IP 访问该系统管理端口（如 8080/8443），并部署 WAF 规则过滤恶意命令注入 payload 作为临时缓解措施。"
