[basic]
description = "Triactive Remote Manager 在启用基本认证时，将用户名和密码以明文形式存储在注册表键值中，导致本地攻击者可通过读取注册表获取管理员凭据，进而实现权限提升。该漏洞影响 Triactive Remote Manager 相关版本，CVSS 评分 4.6，危害等级中危。建议升级至修复版本或禁用基本认证改用更安全的认证方式。"
published = "1999-02-19T05:00:00.000"
remediation = "立即停止使用 Triactive Remote Manager 的 Basic 认证方式，改用更安全的集成认证（如 Windows 集成认证）。同时删除注册表中已存储的明文凭据项，并限制注册表相关键值的访问权限仅允许管理员组读取。由于该产品已停止维护，建议迁移至其他受支持的远程管理工具。"
score = 4.6
severity = "MEDIUM"
sources = ["cve"]
title = "Triactive Remote Manager 明文凭证存储致权限提升漏洞"
updated = "2026-06-16T21:50:17.973"

