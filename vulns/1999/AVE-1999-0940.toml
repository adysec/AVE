[basic]
description = "Cisco PIX Private Link 4.1.6及更早版本在处理配置文件中的特定命令时存在缺陷，导致DES加密密钥的有效长度从标准的56位降低至48位，大幅削弱了加密强度。攻击者在获取到加密的配置文件后，可通过暴力破解方式在更短时间内恢复密钥，进而解密受保护的通信数据。该漏洞影响Cisco PIX Private Link系列设备，CVSS评分7.5，危害等级高。厂商已发布修复建议，建议用户升级至不受影响版本。"
published = "1999-12-31T05:00:00.000"
remediation = "升级 Cisco PIX 软件至 4.1.7 或更高版本，该版本修复了 DES 密钥长度从 56 位降至 48 位的加密缺陷。如无法升级，应避免在配置文件中使用 DES 加密，改用 3DES 或 AES 等更强加密算法，并限制对配置文件的物理访问权限。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "Cisco PIX Private Link 配置文件加密漏洞"
updated = "2026-06-16T21:49:43.327"

