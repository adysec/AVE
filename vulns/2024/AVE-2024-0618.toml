[basic]
description = "Linux 内核 RDMA/uverbs 子系统中存在整数溢出漏洞，`cmd.wqe_size * cmd.wr_count` 等乘法运算中两个操作数均为用户可控的 u32 值，相乘结果可导致整数回绕，进而传递给 `uverbs_request_next_ptr()` 时引发越界访问。本地低权限攻击者可通过构造特制的 RDMA 用户空间请求触发该漏洞，导致系统崩溃（拒绝服务）。该漏洞影响所有使用 Linux 内核的发行版，CVSS 评分 5.5，危害等级中等。"
published = "2025-01-15T13:15:13.473"
remediation = '立即将 Linux 内核升级至以下安全版本：5.4.289、5.10.233、5.15.176、6.1.124、6.6.70、6.12.9 或更高版本。对于 Debian 系统，执行 `apt update && apt upgrade linux-image` 安装 DLA-4075 安全更新；对于 Ubuntu 系统，执行 `apt update && apt upgrade linux-image-generic` 安装 USN-7381-1 更新。如无法立即重启，可临时限制对 RDMA 设备的本地访问权限，通过 `chmod 600 /dev/infiniband/uverbs*` 限制非 root 用户操作，或通过内核模块黑名单 `echo "blacklist ib_uverbs" > /etc/modprobe.d/disable-rdma.conf` 禁用 RDMA uverbs 模块作为临时缓解措施。'
score = 5.5
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux 内核 RDMA/uverbs 整数溢出漏洞"
updated = "2026-06-17T08:14:09.430"

