[basic]
description = "Advanced Dewplayer 1.2 WordPress 插件中的 download-file.php 脚本存在目录遍历漏洞，远程攻击者可通过向 dew_file 参数传递包含 `..`（点点）序列的恶意路径，绕过访问限制读取服务器上任意文件，从而导致敏感信息泄露。该漏洞危害等级中危，影响 WordPress Advanced Dewplayer 插件的 1.2 版本，CVSS 评分 5.0，攻击者无需身份认证即可利用，影响系统机密性。建议用户及时升级或移除受影响插件。"
published = "2014-01-03T18:54:09.240"
remediation = "立即将 Advanced Dewplayer 插件升级至 1.3 或更高版本（该版本已修复目录遍历问题，仅允许下载 .mp3 音频文件）。由于该插件已于 2025 年 3 月因安全问题被 WordPress 官方下架，建议彻底移除该插件并替换为其他受支持的音频播放器插件。如无法立即移除，可在 Web 服务器（Apache/Nginx）配置中对 download-file.php 路径添加访问控制规则，禁止直接访问该脚本。"
score = 5
severity = "MEDIUM"
sources = ["nuclei"]
title = "WordPress Advanced Dewplayer 插件目录遍历漏洞"
updated = "2026-06-17T00:01:34.260"

