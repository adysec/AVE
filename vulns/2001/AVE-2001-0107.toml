[basic]
description = "xloadimage 4.1（又称 xli 1.16/1.17）存在缓冲区溢出漏洞，远程攻击者可通过向目标系统提交特制的 FACES 格式图片文件，在解析 Firstname 或 Lastname 字段时触发缓冲区溢出，导致任意代码执行。该漏洞影响 Linux 系统下使用 xloadimage/xli 的环境，攻击者只需诱使用户打开恶意构造的图片即可完成利用，CVSS 评分 7.5，危害等级高。"
published = "2001-10-18T04:00:00.000"
remediation = '升级 xloadimage 至 4.1-r2 及以上版本，或 xli 至 1.17.0-r1 及以上版本。Debian 用户安装 DSA-069/DSA-695 对应更新，Red Hat 用户安装 RHSA-2001:088 更新，Gentoo 用户执行 emerge --sync && emerge --ask --oneshot --verbose ">=media-gfx/xloadimage-4.1-r2"。如无法升级，避免使用 xloadimage/xli 处理来自不可信来源的 FACES 格式图片文件。'
score = 7.5
severity = "HIGH"
sources = ["osv"]
title = "Linux xloadimage 远程缓冲区溢出漏洞"
updated = "2026-06-16T21:54:56.080"

