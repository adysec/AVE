[basic]
description = "Sendmail 邮件传输代理存在别名配置漏洞，攻击者可通过构造包含管道符（|）的别名文件条目，将邮件输入直接传递给任意系统命令执行。该漏洞影响早期版本的 Sendmail 系统，远程攻击者无需身份认证即可在运行 Sendmail 的服务器上执行任意命令，获得服务器控制权。攻击者需能够向 Sendmail 别名文件写入或修改内容，进而通过邮件投递触发命令执行，最终可能导致系统被完全入侵，CVSS 评分 10.0，危害等级严重。"
published = "1999-01-01T05:00:00.000"
remediation = '升级 Sendmail 到 8.9.3 或更高版本以修复别名管道执行漏洞。如无法立即升级，应在 sendmail.cf 中设置 DontBlameSendmail=no 或删除 /etc/aliases 中所有含管道符 "|" 的别名条目，并将 alias 文件权限设为只有 root 可读写（chmod 644 /etc/aliases），同时使用 /etc/sendmail.cw 限制中继域名，减少攻击面。'
score = 10
severity = "CRITICAL"
sources = ["epss"]
