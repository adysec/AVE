[basic]
description = "GCC 和 G++ 3.3.3 及更早版本中的 -ftrapv 编译选项本应用于捕获有符号整数溢出，但未能覆盖所有整数溢出类型（如无符号整数回绕及其他边界情况），导致使用该选项编译的应用程序在面对特定溢出攻击时仍存在安全隐患。攻击者可向目标程序提交特制输入触发未处理的整数溢出，可能导致程序崩溃、拒绝服务或敏感信息泄露。"
published = "2000-11-01T05:00:00.000"
remediation = "升级 GCC 至 3.3.4 及以上版本以修复 -ftrapv 选项对部分整数溢出无法捕获的问题；对关键运算逻辑手动添加溢出检查（如 __builtin_sadd_overflow），或改用 -fsanitize=undefined 等现代检测工具替代 -ftrapv。"
score = 7.5
severity = "HIGH"
sources = ["osv"]
title = "GNU gcc 和 g++ 编译器整数溢出安全漏洞"
updated = "2026-06-16T21:53:24.397"

