[basic]
description = "NetBSD 内核 ARP 协议实现存在设计缺陷，远程攻击者可通过向目标系统发送特制的 ARP 数据包覆盖静态 ARP 缓存条目。该漏洞源于 ARP 协议未对静态条目进行写保护，攻击者可在同一广播域内伪造 IP-MAC 地址映射关系，导致目标系统的网络流量被重定向至攻击者控制的设备，进而实现中间人攻击、数据窃听或会话劫持。该漏洞影响 NetBSD 操作系统，攻击者无需认证即可利用，CVSS 评分 6.4，危害等级中危。"
published = "1999-05-01T04:00:00.000"
remediation = "升级到 NetBSD 1.4 或更高版本（1.4 及 1.4_BETA 在 1999-05-05 之后已修复），或从 NetBSD FTP 服务器获取并应用 19990505-arp 补丁。如无法升级，可在网卡层面限制 ARP 学习范围，避免来自非本网段的 ARP 包覆盖静态条目。"
score = 6.4
severity = "MEDIUM"
sources = ["avd"]
title = "NetBSD ARP 静态条目覆盖漏洞"
updated = "2026-06-16T21:49:00.597"

