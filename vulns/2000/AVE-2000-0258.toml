[basic]
description = "LCDProc 0.4 版本存在远程缓冲区溢出漏洞，未经身份认证的远程攻击者可通过向 LCDproc 服务器发送特制的 screen_add 命令触发该漏洞，导致在目标系统上以 root 权限执行任意代码。LCDProc 是一款用于在 LCD 屏幕上显示系统信息的开源客户端/服务器软件，该漏洞影响 0.4 版及以下版本，攻击者成功利用后可完全控制运行 LCDProc 的 Linux 系统。"
published = "2000-04-21T04:00:00.000"
remediation = "立即将 LCDproc 升级至 0.4.5 或更高版本，该版本已修复客户端通信代码中的缓冲区溢出漏洞。如暂时无法升级，应在防火墙层面仅允许受信任的本地客户端连接 LCDproc 服务端口，阻止外部主机直接访问 LCDproc 监听的 TCP 端口，以降低远程利用风险。"
score = 10
severity = "CRITICAL"
sources = ["exploitdb"]
