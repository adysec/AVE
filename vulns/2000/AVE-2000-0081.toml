[basic]
description = "Microsoft Index Server 2.0 及 Windows 2000 Indexing Service 中的 WebHits ISAPI 过滤器存在目录遍历漏洞，远程攻击者通过向目标系统发送特制的畸形 Hit-Highlighting 参数请求，可绕过路径限制读取服务器上的任意文件。该漏洞影响 Windows 2000 系统上运行的 Index Server 2.0 和 Indexing Service，CVSS 评分 5.0，属于中等危害等级。Microsoft 已在安全公告 MS00-006 中发布相关补丁修复此漏洞。"
published = "2000-01-26T05:00:00.000"
remediation = "立即安装 Microsoft 安全公告 MS00-006 提供的补丁（KB251170），该补丁可消除 Index Server 2.0 / Windows 2000 Indexing Service 的 WebHits ISAPI 筛选器（.htw 映射）目录遍历漏洞。如无法安装补丁，可在 IIS 管理器中移除 .htw 应用程序映射，或直接删除 webbits.dll 及 httpext.dll ISAPI 筛选器注册项作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Microsoft Index Server 目录遍历漏洞"
updated = "2026-06-16T21:50:59.673"

