[basic]
description = "浙江大华技术股份有限公司智能物联综合管理平台（ICC）的 GetClassValue 接口存在远程命令执行漏洞。由于该接口未对用户传入的类名与参数进行有效校验和过滤，未授权攻击者可构造恶意请求调用任意 Java 类方法，进而在服务器上执行任意系统命令，最终导致服务器被完全控制、敏感数据泄露及内网横向渗透。该漏洞无需认证即可利用，PoC 已公开并存在在野利用，危害极大。"
published = "2025-07-09"
remediation = "建议尽快联系大华技术支持获取智能物联综合管理平台（ICC）的最新安全补丁并升级到官方修复版本。若无法立即升级，可通过在边界防火墙或反向代理上限制对 GetClassValue 接口的外部访问、关闭管理平台对公网暴露的端口、部署 WAF 拦截异常调用请求等方式进行临时缓解，并排查是否已存在被入侵痕迹。"
score = 9.8
severity = "CRITICAL"
sources = ["hwpoc"]
title = "大华 智能物联综合管理平台 GetClassValue 远程命令执行漏洞"
updated = "2025-07-09"

