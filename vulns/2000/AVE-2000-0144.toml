[basic]
description = "Microsoft 虚拟机 (Microsoft VM) 在 Internet Explorer 4.x 和 5.x 中存在沙箱逃逸漏洞。远程攻击者可通过诱使用户访问恶意网页，利用特制的 Java applet 突破虚拟机安全沙箱限制，实现任意文件读取。该漏洞影响 IE 4.x/5.x 版本，CVSS 评分 5.1，危害等级中危。攻击者无需身份认证即可触发，但需用户交互（点击恶意链接或访问恶意网站）。"
published = "2000-02-18T05:00:00.000"
remediation = "Microsoft VM 已停止支持，无法通过补丁修复。建议立即卸载 Microsoft VM，并在 Internet Explorer 的 Internet 区域安全设置中将「Java」下的「自定义级别」设为「禁用 Java」。同时升级操作系统至受支持版本，或改用 Edge/Chrome 等现代浏览器。如因遗留系统无法升级，可结合 EMET 或组策略限制 Java Applet 执行。"
score = 5.1
severity = "MEDIUM"
sources = ["avd"]
title = "Microsoft Internet Explorer虚拟机文件任意读取漏洞"
updated = "2026-06-16T21:51:07.757"

