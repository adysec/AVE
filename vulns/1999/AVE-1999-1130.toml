[basic]
description = "SGI IRIX 6.5 至 6.5.2 版本中的 nsd（名称服务守护进程）存在信息泄露漏洞。该服务在 UDP 端口上导出一个虚拟文件系统，远程攻击者无需认证即可通过网络挂载该虚拟文件系统，从而读取目标系统上的任意文件，并可能造成拒绝服务。该漏洞影响 SGI IRIX 6.5、6.5.1 及 6.5.2 版本，CVSS v2 评分 6.4，危害等级中危。攻击者只需向目标 UDP 端口发送特制请求即可利用，无需任何身份认证。"
published = "1999-05-31"
remediation = "升级 SGI IRIX 至 6.5.3 或更高版本，该版本已修复 nsd 信息泄露漏洞。如无法升级，可在 /etc/inetd.conf 中注释掉 nsd 服务行并重启 inetd 以禁用该服务，或通过防火墙限制对 nsd 端口（默认 80/443）的访问。作为临时缓解措施，可移除 nsd 的 world-readable 权限：chmod 750 /usr/ns-home/nsd。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "SGI IRIX nsd 信息泄露漏洞"
updated = "1999-05-31"

