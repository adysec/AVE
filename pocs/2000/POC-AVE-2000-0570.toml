[info]
author = "AVE"
description = "NAI Net Tools PKI Server 1.0 strong.exe 缓冲区溢出漏洞检测。Enrollment Web Server 在 HTTPS 端口 444 监听，处理超长 URL（超过 2965 字符）时日志记录例程发生栈溢出，可导致远程代码执行。此 PoC 通过发送 HTTPS GET 请求验证目标服务存在。"
id = "POC-AVE-2000-0570"
name = "CVE-2000-0740 PoC"
severity = "medium"
tags = ["cve-2000-0740"]
vuln_id = [
    "CVE-2000-0740",
    "AVE-2000-0570",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/"
protocol = "http"

[poc.requests.headers]
User-Agent = "AVE/1.0"

[[poc.requests.matchers]]
expect = true
status = [
    200,
    400,
    401,
    403,
    404,
    500,
    501,
    502,
]
type = "status"
