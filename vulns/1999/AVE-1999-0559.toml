[basic]
description = "Linux Slackware 系统中 crond 程序存在缓冲区溢出漏洞，本地用户可通过向 crond 程序发送特制的输入数据触发缓冲区溢出，从而获取 root 权限。该漏洞允许拥有本地账户的攻击者利用 crond 在处理参数时的内存边界校验缺陷，实现权限提升。CVSS 评分 7.2，危害等级高，影响 Slackware Linux 系统。建议用户升级至修复版本或限制本地用户对 crond 的访问。"
published = "1997-12-01T05:00:00.000"
remediation = "升级 Slackware Linux 至 3.4 及以上版本，该修复版本已修正 crond 程序在处理用户提交的计划任务参数时的边界检查缺陷，防止本地用户通过特制参数触发缓冲区溢出提权。如无法升级，可限制 crond 仅允许受信用户通过 `cron.allow` 文件控制访问，并移除 `/etc/cron.d` 中不必要的任务文件。同时检查 crond 二进制是否被替换，使用 `rpm -V` 或 `md5sum` 校验文件完整性。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "Slackware Linux crond 本地缓冲区溢出漏洞"
updated = "2026-06-16T21:48:11.243"

