[basic]
description = 'Windows NT 与 Windows 2000 系统存在用户权限分配不当的安全配置缺陷，部分普通用户账户被错误地授予了本应仅限管理员的高危特权，例如"作为系统动作""加载设备驱动""调试程序""恢复文件""取得对象所有权""远程关机"等。攻击者只需先获取目标主机的本地普通用户登录权限，即可滥用这些过度授权的特权执行本地权限提升，绕过系统安全限制并以 SYSTEM 等高权限身份运行任意操作，进而完全控制受影响主机。该漏洞影响所有采用默认权限配置、未做最小权限加固的 Windows NT 与 Windows 2000 系统，易被本地已认证用户利用来破坏系统完整性与安全性。'
published = "1997-01-01T05:00:00.000"
remediation = '登录域控制器或本地安全策略控制台，依次打开「本地安全策略 → 本地策略 → 用户权限分配」，将"作为系统操作、增加配额、创建永久对象、调试程序、替换进程令牌、取得所有权"等敏感特权从普通用户/Everyone 组中移除，仅保留给 Administrators 与 SYSTEM。对 Windows NT 4.0 升级至 Service Pack 6a，Windows 2000 升级至 Service Pack 4，并通过组策略统一下发修正后的用户权限模板，定期审计特权分配以防止权限滥用。'
score = 4.6
severity = "MEDIUM"
sources = ["epss"]
