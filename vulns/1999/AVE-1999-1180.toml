[basic]
description = "Ipswitch IMail 5.0 及更早版本的 IMAP 服务组件（imapd）的登录功能存在缓冲区溢出漏洞。远程攻击者无需身份认证即可通过向服务器发送超长的用户名或密码参数触发该漏洞，导致 imapd 进程崩溃并造成拒绝服务，在特定条件下可能实现远程代码执行。该漏洞影响 Ipswitch IMail 5.0 及之前版本，CVSS 评分 5.0，危害等级中危。"
published = "2005-05-02T04:00:00.000"
remediation = "升级 Ipswitch IMail 至 5.0 以上版本以修复 imapd 登录函数缓冲区溢出漏洞。如无法升级，建议在防火墙上禁用 IMAP 端口 143 的外部访问，或直接停止 IMAP 服务，仅使用 POP3 替代。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Ipswitch IMail IMAP 服务器缓冲区溢出漏洞"
updated = "2026-06-16T21:50:42.733"

