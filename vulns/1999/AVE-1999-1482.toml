[basic]
description = "Microsoft Windows NT 3.51 及 4.0 系统中运行的 WINS（Windows Internet 名称服务）存在资源耗尽型拒绝服务漏洞。远程攻击者无需身份认证，即可通过向目标 WINS 服务（默认端口 42）发送大量特制畸形数据包，触发服务器持续记录错误日志，导致系统性能严重下降、硬盘空间被迅速耗尽，最终造成服务不可用。该漏洞已有公开利用工具 coke.c，攻击者只需指定目标地址和发包数量即可实施攻击，利用门槛极低。"
published = "1998-05-09T04:00:00.000"
remediation = "Windows NT 3.51 和 NT 4.0 已生命周期终止，微软不再提供安全更新，建议尽快升级至受支持的 Windows Server 版本。如无法升级，在防火墙层面限制对 WINS 端口 (TCP/UDP 42) 的访问，仅允许受信任的 WINS 复制伙伴通信。若环境中不使用 WINS，可停止 WINS 服务以消除攻击面。"
score = 6.4
severity = "MEDIUM"
sources = ["epss"]
title = "Microsoft Windows NT WINS 拒绝服务漏洞"
updated = "2026-06-16T21:50:16.593"

