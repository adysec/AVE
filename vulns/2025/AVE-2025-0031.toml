[basic]
description = "Akamai CloudTest 60 2025.06.02 之前版本存在 XML 外部实体（XXE）注入漏洞，位于 /concerto/services/RepositoryService 的 SOAP 接口中。未经身份认证的远程攻击者可通过向受影响版本发送特制的 XML 请求，利用 XXE 注入实现任意文件包含或服务器端请求伪造（SSRF），可能导致敏感信息泄露。CVSS 评分 5.8，危害等级中危。"
published = "2025-06-30T20:15:25.060"
remediation = '升级 Akamai CloudTest 至 60 2025.06.02 (12988) 或更高版本，该版本已修复 XXE 注入漏洞。如无法立即升级，可在 Web 应用防火墙（WAF）层面添加规则，拦截 POST /concerto/services/RepositoryService 请求中 Content-Type 为 text/xml 且包含外部实体引用的恶意 XML 载荷，同时禁用后端 XML 解析器的外部实体解析功能（设置 DocumentBuilderFactory 的 setExpandEntityReferences(false) 和 setFeature("http://apache.org/xml/features/disallow-doctype-decl", true)）。'
score = 5.8
severity = "MEDIUM"
sources = ["hwpoc"]
title = "Akamai CloudTest SOAP XXE注入漏洞"
updated = "2026-06-17T09:31:23.293"

