[basic]
description = "HP Remote Watch 服务存在远程未授权访问漏洞，远程攻击者无需身份认证即可通过该服务获取目标系统的 root 权限，完全控制受影响的 HP-UX 系统。该漏洞影响 HP-UX 多个版本，CVSS 评分 10.0，危害等级严重。攻击者可在网络可达条件下直接利用该服务默认配置实施攻击，无需任何前置条件或用户交互。"
published = "1996-10-01"
remediation = "建议卸载 HP Remote Watch 服务包（`swremove RemoteWatch`），或在 `/etc/inetd.conf` 中注释掉 remwatch 服务行后重启 inetd。在防火墙层面阻断对 Remote Watch 默认端口 989/TCP 的外部连接。同时升级 HP-UX 至最新安全补丁级别，老旧版本建议迁移至受支持的操作系统版本。"
score = 10.0
severity = "CRITICAL"
sources = ["avd"]
title = "HP Remote Watch 远程权限提升漏洞"
updated = "2026-06-16"

