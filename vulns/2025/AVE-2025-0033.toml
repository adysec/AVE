[basic]
description = "Apache Tomcat 默认 Servlet 存在路径等价漏洞（内部点号），当启用写入权限且支持部分 PUT 请求时，未授权攻击者可通过特制的部分 PUT 请求利用路径等价绕过安全检查，导致安全敏感文件泄露或向文件中注入恶意内容。若应用同时使用基于文件的会话持久化且存在反序列化利用库，攻击者可进一步实现远程代码执行。该漏洞影响 Apache Tomcat 11.0.0-M1 至 11.0.2、10.1.0-M1 至 10.1.34、9.0.0.M1 至 9.0.98 及 8.5.x 系列版本，CVSS 评分 9.8，危害等级严重。建议升级至 11.0.3、10.1.35 或 9.0.99 版本修复。"
published = "2025-03-10T17:15:35.067"
remediation = '升级 Apache Tomcat 至 11.0.3 / 10.1.35 / 9.0.99 或更高版本。如无法立即升级，确保 Default Servlet 的 writable 配置为 false（默认关闭），禁用 partial PUT（设置 allowPartialPut="false"），并避免使用文件会话持久化存储到默认路径，同时移除应用中可能被反序列化利用的类库（如 commons-collections 等）。'
score = 9.8
severity = "CRITICAL"
sources = ["hwpoc"]
title = "Apache Tomcat 默认Servlet路径等价远程代码执行漏洞"
updated = "2026-06-17T08:59:39.593"

