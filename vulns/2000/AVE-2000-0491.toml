[basic]
description = "Big Brother 网络监控系统 1.4h2 及更早版本的默认配置未设置适当的访问限制，存在 CGI 文件创建漏洞。远程攻击者无需身份认证即可通过 bbd 工具上传具有可执行扩展名的文件，被 Web 服务器作为 CGI 脚本执行，从而导致任意命令执行。该漏洞影响 Big Brother 1.0/1.3/1.4 等多个版本，CVSS 评分 7.5，危害等级高危。"
published = "2000-06-11T04:00:00.000"
remediation = "升级 Big Brother 至 1.4h3 或更高版本，该版本已修复默认配置缺少访问限制的问题。如无法升级，在 Web 服务器配置中限制 bbd 脚本的访问来源 IP，仅允许受信任的管理主机访问，并禁止上传目录执行 CGI 脚本的权限。同时检查并删除 bbd 上传目录中可疑的 CGI 文件。"
score = 7.5
severity = "HIGH"
sources = ["exploitdb"]
title = "Sean MacGuire Big Brother CGI 文件上传远程命令执行漏洞"
updated = "2026-06-16T21:52:09.987"

