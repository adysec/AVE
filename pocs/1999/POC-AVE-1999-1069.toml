[info]
author = "ave"
description = "检测 Linux 2.2 内核中 mknod(2) 系统调用是否可能受符号链接跟踪漏洞(CVE-1999-1352)影响。mknod 在处理悬空符号链接时会错误地跟随链接，导致本地攻击者可能通过创建恶意符号链接覆盖系统关键文件。通过检查 /proc/version 确认内核版本是否属于受影响范围(Linux 2.2.x)。"
id = "POC-AVE-1999-1069"
name = "Linux Kernel mknod Symlink Local Privilege Escalation PoC"
severity = "medium"
tags = ["ave-1999-1069"]
vuln_id = [
    "CVE-1999-1352",
    "AVE-1999-1069",
]

[poc]
logic = "all"

[[poc.requests]]
path = "/proc/version"
protocol = "file"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["Linux version"]
