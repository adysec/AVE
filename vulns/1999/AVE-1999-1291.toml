[basic]
description = "Stalker Internet Mail Server 1.6 存在缓冲区溢出漏洞，远程攻击者可通过向 SMTP 服务发送超长 HELO 命令触发该漏洞，导致服务崩溃拒绝服务。该漏洞利用方式简单，无需认证即可远程触发，影响邮件服务器的正常可用性。虽然官方 CVSS 评分较低，但 ExploitDB 将其归类为远程缓冲区溢出，存在被进一步利用实现代码执行的潜在风险。"
published = "1998-04-08T04:00:00.000"
remediation = "该产品已停止维护，建议立即迁移至仍受支持的邮件服务器软件（如 Postfix 3.x 或 Exim 4.x）。若无法立即迁移，可在 SMTP 代理或防火墙层面添加规则，限制 HELO 命令参数长度不超过 256 字节，以临时缓解缓冲区溢出风险。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Stalker Internet Mail Server 1.6 缓冲区溢出漏洞"
updated = "2026-06-16T21:50:34.980"

