[basic]
description = "NGINX Plus 及 NGINX 开源版本的 ngx_http_rewrite_module 模块存在堆缓冲区溢出漏洞。当 rewrite 指令后跟随 rewrite、if 或 set 指令，且替换字符串中包含未命名 PCRE 捕获组及问号时，未经身份认证的远程攻击者可通过发送特制的 HTTP 请求触发堆缓冲区溢出，导致 Nginx 工作进程崩溃重启。在关闭或绕过 ASLR 防护的条件下，攻击者可进一步实现远程代码执行，CVSS 评分 9.2，危害等级严重。该漏洞影响多个 NGINX 版本，建议用户及时升级修复。"
published = "2026-05-13T16:16:50.190"
remediation = "立即升级至 NGINX Open Source 1.31.0 及以上版本，或 NGINX Plus 对应修复版本（R30 P1）。如无法立即升级，在 rewrite 配置中避免在捕获组 $1、$2 后接带问号的替换字符串，并移除所有使用匿名 PCRE 捕获的 rewrite 规则作为临时缓解措施。"
score = 9.2
severity = "CRITICAL"
sources = ["hwpoc"]
title = "NGINX ngx_http_rewrite_module 堆缓冲区溢出漏洞"
updated = "2026-07-15T02:21:38.583"

