[basic]
description = "AT&T TCP/IP 4.0 远程执行守护进程（rexecd）在多种 SVR4 系统上存在命令注入漏洞。该守护进程在处理远程执行请求时，未对传入的命令参数进行充分校验与过滤，导致未经身份认证的远程攻击者可构造恶意请求，使 rexecd 以目标服务权限执行任意系统命令。影响范围涵盖运行 AT&T TCP/IP 4.0 的各 SVR4 类操作系统。攻击者只需能够与目标主机的 rexec 服务（TCP 512 端口）建立网络连接，并发送特制的执行请求即可完成利用，无需本地账户，CVSS 评分高达 10.0，危害等级为严重。"
published = "1992-02-25T05:00:00.000"
remediation = "升级到 AT&T TCP/IP 4.0 的官方修复补丁版本，或停用 rexecd 服务（执行 `chkconfig rexec off` 并 kill 进程）。在防火墙/边界路由器上阻断 TCP 512 端口的入站连接，禁止来自不可信网络的 rexec 访问，作为临时缓解措施。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "AT&T TCP/IP 4.0 (SVR4) rexecd 远程代码执行漏洞"
updated = "2026-06-16T21:49:37.173"

