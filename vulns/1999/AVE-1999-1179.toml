[basic]
description = "Ipswitch IMail 邮件服务器的 Web 服务（5.0 及 6.0 版本）存在缓冲区溢出漏洞。其 Web 服务在处理用户请求的 URL 时未对输入长度进行边界校验，当攻击者向目标服务器发送超长 URL 时，会触发缓冲区溢出，导致服务进程崩溃并造成拒绝服务（DoS）。在特定条件下，攻击者还可能进一步利用该溢出执行任意命令。该漏洞影响运行 Ipswitch IMail 5.0/6.0 Web 服务的系统，攻击条件为攻击者能够与目标 Web 服务端口建立网络连接并发送特制 HTTP 请求，无需身份认证的远程攻击者即可发起攻击。"
published = "1999-03-02T05:00:00.000"
remediation = "升级到最新的 Ipswitch IMail 版本以获取安全补丁，如无法立即更新可禁用 Web 服务端口以降低风险。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Ipswitch IMail 5.0/6.0 Web服务 缓冲区溢出拒绝服务漏洞"
updated = "2026-06-16T21:50:41.970"

