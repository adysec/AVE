[basic]
description = "Solaris sadmind 服务存在远程缓冲区溢出漏洞，未经身份认证的远程攻击者可通过向目标系统的 sadmind 服务发送特制的 NETMGT_PROC_SERVICE 请求触发该漏洞，导致缓冲区溢出，从而以 root 权限执行任意代码。该漏洞影响 Solaris 操作系统多个版本，CVSS 评分 10.0，危害等级严重。攻击者无需任何认证即可远程利用，风险极高。"
published = "1999-12-10T05:00:00.000"
remediation = "立即安装 Sun 官方补丁（对应 Solaris 2.5/2.6/7/8 的 Patch ID 分别为 105401、105802、106815、108528），或升级到不受影响的 Solaris 9 及以上版本。如无法打补丁，在 /etc/inetd.conf 中注释掉 sadmind 行并重启 inetd 以禁用该服务，同时在防火墙层面阻止对 TCP/UDP 端口 2323 和 32771-32774 的外部访问作为临时缓解。"
score = 10
severity = "CRITICAL"
sources = ["exploitdb"]
title = "Oracle Solaris sadmind 远程缓冲区溢出漏洞"
updated = "2026-06-16T21:49:26.857"

