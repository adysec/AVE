[basic]
description = "该候选编号已被拒绝。原条目仅描述 NETBIOS 相关组件服务处于运行状态，属于安全配置范畴而非可直接引入安全漏洞的缺陷。此类配置问题更适合由通用配置枚举（CCE）覆盖管理，因此该 CVE 编号作废，建议参考 CCE 标准进行安全配置检查。"
published = "1999-01-01T05:00:00.000"
remediation = '禁用 NetBIOS over TCP/IP：在网络连接属性中取消选中"Microsoft 网络的文件和打印机共享"的绑定，或在高级 TCP/IP 设置中禁用 NetBIOS。在防火墙层面，阻止外部访问 UDP 137-138 和 TCP 139、445 端口。如业务不需要，直接停止 Server 服务并禁用 SMBv1。'
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Various vendors NETBIOS 组件服务配置不当"
updated = "2023-11-07T01:54:59.540"

