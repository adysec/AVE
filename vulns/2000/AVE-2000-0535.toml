[basic]
description = "KDE Kmail 邮件客户端在处理带有超长文件名的邮件附件时存在缓冲区溢出漏洞。远程攻击者无需身份认证即可向目标用户发送一封包含特制长文件名附件的恶意邮件，触发缓冲区溢出，导致 Kmail 进程崩溃，造成拒绝服务。该漏洞影响 KDE 1.x 系列版本，攻击条件简单，只需用户接收并查看邮件即可触发，危害等级中等。"
published = "1999-06-01T04:00:00.000"
remediation = "升级 KDE 至 1.1.2 及以上版本（KMail 1.0.3 及之后版本已修复此缓冲区溢出漏洞），或升级至 KDE 2.x 系列。如无法升级，避免使用 KMail 打开来源不明的邮件附件，并考虑改用其他邮件客户端（如 Mozilla Mail）作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "KDE Kmail 缓冲区溢出拒绝服务漏洞"
updated = "2026-06-16T21:51:49.610"

