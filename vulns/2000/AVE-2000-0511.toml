[basic]
description = "IMP up to 2.2 Pre12 版本的 MSWordView 应用程序存在文件清理漏洞。当应用程序异常退出时，无法正确删除文档处理过程中产生的临时文件。攻击者可通过反复打开大量文档并提前中断请求，导致系统积累大量未处理的临时文件，逐渐填满磁盘空间，引发拒绝服务攻击，使正常用户无法使用该应用程序。该漏洞影响广泛部署的 IMP 软件中的 MSWordView 模块，由于涉及本地用户权限，攻击者可轻松利用此缺陷破坏系统可用性，尤其在磁盘空间有限的环境中威胁性更大。"
published = "2000-04-22T04:00:00.000"
remediation = "建议升级 IMP 到 2.2 Pre12 及以上版本（该版本已修复 MSWordView 退出时未清理临时文件的问题）。若无法立即升级，可配置定时任务定期清理 /tmp 目录下 MSWordView 遗留的临时文件（如 /tmp/mswv_*），或限制单用户最大磁盘配额防止磁盘被填满导致拒绝服务。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "IMP MSWordView 拒绝服务漏洞"
updated = "2026-06-16T21:51:46.800"

