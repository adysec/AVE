[basic]
description = "Oracle Java SE i18n子组件中AtomicReferenceArray类实现存在类型违规漏洞，未验证数组是否为Object[]类型，导致远程攻击者可通过构造恶意Java应用程序或Applet，利用类型混淆绕过Java沙箱安全限制，实现沙箱逃逸并执行任意代码，或导致JVM崩溃造成拒绝服务。影响Oracle Java SE 7 Update 2及更早版本、6 Update 30及更早版本、5.0 Update 33及更早版本。攻击者无需身份认证，通过网络诱导用户访问包含恶意Java Applet的网页即可触发，无需用户交互，CVSS 3.1评分9.8（CRITICAL），攻击向量为网络、攻击复杂度低、无需权限、无需用户交互、影响机密性/完整性/可用性均为高。该漏洞已被纳入CISA已知被利用漏洞目录，Metasploit框架集成了AtomicReferenceArray Type Violation利用模块（ExploitDB编号18679），攻击者可构造恶意Applet绕过安全管理器直接执行系统命令。Oracle已在2012年2月CPU补丁中修复该漏洞，建议升级至Java SE 7 Update 3、6 Update 31或5.0 Update 34及以上版本。"
published = "2012-06-07T22:55:17.883"
remediation = "安装 Oracle Java SE 7 Update 4 或更高版本、Java SE 6 Update 32 或更高版本、或 Java SE 5.0 Update 34 或更高版本，并确保启动时禁用不安全的 i18n 子组件，同时在 Java Control Panel 中启用自动安全更新并使用最新的安全策略设置。"
score = 9.8
severity = "CRITICAL"
sources = ["kev"]
title = "Oracle Java SE AtomicReferenceArray 类型违规远程代码执行漏洞"
updated = "2026-06-16T23:37:26.540"

