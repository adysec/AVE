[basic]
description = "Intel Pentium 处理器（MMX 和 Overdrive 型号）存在指令处理缺陷，本地攻击者可通过执行一条特定的非法指令（锁定 CMPXCHG8B 指令的无效操作数）触发处理器异常，导致基于 Intel 架构的操作系统（如 Windows NT 和 Windows 95）挂起崩溃，造成拒绝服务。该漏洞需本地用户权限才能利用，CVSS 评分 2.1，危害等级低。"
published = "1999-12-31T05:00:00.000"
remediation = "Intel 发布了处理器微码更新修复此问题，操作系统层面需安装 Windows NT/95 相应安全补丁。临时缓解措施：避免在受影响 Pentium 处理器上执行包含 LOCK 前缀的 CMPXCHG8B 指令，或通过操作系统内核补丁捕获该异常防止系统挂起。该漏洞仅影响早期 Pentium MMX/Overdrive 处理器，升级至后续 P6 架构处理器即可完全规避。"
score = 2.1
severity = "LOW"
sources = ["avd"]
title = "Intel Pentium 处理器拒绝服务漏洞"
updated = "2026-06-16T21:50:31.403"

