[basic]
description = "Courier sqwebmail 0.40.0 之前版本在启动后未能及时丢弃特权，导致本地用户可利用该权限提升漏洞读取系统任意文件。攻击者需具备本地访问权限，通过利用进程残留的高权限访问系统敏感文件，造成机密信息泄露。该漏洞影响 Courier MTA 套件中的 sqwebmail 组件，CVSS 评分 4.6，危害等级中危。"
published = "2002-11-29T05:00:00.000"
remediation = "升级 Courier sqwebmail 至 0.40.0 或更高版本。Debian Woody 用户应升级至 0.37.3-2.3。如无法立即升级，可通过限制本地用户对 sqwebmail 进程的访问权限作为临时缓解措施，确保非授权用户无法利用启动阶段的权限提升窗口读取任意文件。"
score = 4.6
severity = "MEDIUM"
sources = ["osv"]
title = "Courier sqwebmail 权限提升漏洞"
updated = "2026-06-16T21:59:05.633"

