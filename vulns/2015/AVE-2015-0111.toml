[basic]
description = "Microsoft Windows DirectWrite 库在解析特制 TrueType 字体文件时存在内存损坏漏洞，远程攻击者可诱导用户打开嵌入恶意字体的文档或网页，触发内存损坏实现任意代码执行。该漏洞影响 .NET Framework 3.0 SP2/3.5/3.5.1/4/4.5/4.5.1/4.5.2、Office 2007 SP3/2010 SP2、Live Meeting 2007、Lync 2010/2013、Silverlight 5 等多个产品。攻击需要用户交互（如打开恶意文档或访问恶意网页），攻击成功可在当前用户权限下执行任意代码，CVSS 3.1 评分 7.8（高危）。Microsoft 已发布安全更新修复此漏洞，且 CISA 已将其列入已知被利用漏洞目录。"
published = "2015-05-13T10:59:03.910"
remediation = "立即安装 Microsoft 2015 年 5 月安全更新 (MS15-056 / KB3057159 等对应补丁)，将 .NET Framework 升级至 3.0 SP2 及以上修补版本、3.5/3.5.1/4/4.5/4.5.1/4.5.2 安装对应安全补丁；Office 2007 升级至 SP3 并安装 KB3054852，Office 2010 升级至 SP2 并安装 KB3054853；Lync 2010/2013 升级至最新累积更新；Silverlight 5 升级至 5.1.40416.00 或更高版本；Live Meeting 2007 Console 安装 KB3055041。临时缓解：在防火墙层面阻止不可信字体文件加载，禁用 Web 浏览器中字体下载功能，限制非受信任文档打开。启用 Microsoft Update 自动更新确保后续补丁及时安装。"
score = 7.8
severity = "HIGH"
sources = ["kev"]
title = "Microsoft Windows DirectWrite TrueType字体远程代码执行漏洞"
updated = "2026-06-17T00:22:47.647"

