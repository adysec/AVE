[basic]
description = 'wwwcount 组件中的 Count.cgi 2.3 版本存在目录遍历漏洞。远程攻击者可通过向 image 参数提交包含 ".." 序列的特制请求，绕过路径限制读取服务器上的任意 GIF 文件，导致敏感信息泄露。该漏洞攻击复杂度较低，无需身份认证即可远程利用。'
published = "1999-12-31T05:00:00.000"
remediation = '升级 wwwcount 至 2.4 及以上版本，该版本已修复目录遍历问题。如无法升级，在 Count.cgi 中对 image 参数进行输入过滤，拒绝包含 ".." 或 "/" 的请求。同时建议将 CGI 脚本运行在 chroot 环境或受限目录下，限制 Web 服务进程对文件系统的读取权限。'
score = 3.5
severity = "LOW"
sources = ["epss"]
title = "wwwcount Count.cgi 目录遍历漏洞"
updated = "2026-06-16T21:50:47.250"

