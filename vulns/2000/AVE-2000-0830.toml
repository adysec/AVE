[basic]
description = "Ethereal（现称 Wireshark）0.8.13 及更早版本的 AFS ACL 解析器中存在多处缓冲区溢出漏洞。远程攻击者可向目标系统发送特制的网络数据包，在 username 字段中填入超长字符串触发缓冲区溢出，从而在目标系统上执行任意命令。该漏洞影响所有运行受影响版本 Ethereal 的系统，攻击者无需身份认证即可远程利用，危害严重。目前官方已停止维护该版本，建议用户升级至最新版本。"
published = "2001-01-09T05:00:00.000"
remediation = "升级 Ethereal 至 0.8.14 或更高版本，该版本已修复 AFS ACL 解析器中的缓冲区溢出问题。由于 Ethereal 已更名为 Wireshark，建议直接安装最新版 Wireshark（如 4.x 系列）。如无法升级，可在抓包时禁用 AFS 协议解析：编辑 -> 首选项 -> 协议 -> AFS，取消勾选「解析 AFS 协议」。"
score = 7.5
severity = "HIGH"
sources = ["redhat"]
title = "Ethereal AFS ACL 解析器缓冲区溢出漏洞"
updated = "2026-06-16T21:53:18.900"

