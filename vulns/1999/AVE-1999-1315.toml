[basic]
description = "HP LaserJet 打印机 JetDirect 网卡在 TCP/IP 配置下存在安全绕过漏洞。远程攻击者无需身份认证，可直接向 TCP 端口 9099 和 9100 发送 PostScript 文档，绕过打印过滤器执行任意打印任务。该漏洞影响配置了 JetDirect 网卡的多款 HP LaserJet 打印机型号，CVSS 评分 7.5，危害等级高。厂商建议限制对相关端口的网络访问以降低风险。"
published = "1997-10-04T04:00:00.000"
remediation = "在防火墙或网络边界处限制对 TCP 端口 9099 和 9100 的访问，仅允许受信任的管理 IP 连接。如非必要，禁用 JetDirect 卡的 TCP/IP 直连打印功能，改用受认证的打印队列方式提交任务。同时将打印机置于独立 VLAN 中，避免暴露在非信任网络段。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "HP LaserJet JetDirect TCP/IP 安全绕过漏洞"
updated = "2026-06-16T21:49:37.620"

