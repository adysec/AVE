[basic]
description = "ncurses 库存在缓冲区溢出漏洞，本地攻击者可通过设置超长的环境变量（如 TERM 或 TERMINFO_DIRS）触发该漏洞，导致缓冲区溢出，从而在目标系统上以当前用户权限执行任意代码。该漏洞影响多个发行版中集成的 ncurses 库，攻击者需拥有本地访问权限，无需特殊条件即可利用，CVSS 评分 7.2，危害等级高。"
published = "2000-12-19T05:00:00.000"
remediation = "升级 GNU ncurses 库至 5.6 或更高版本，该版本修复了环境变量（如 TERM、TERMINFO_DIRS）处理中的缓冲区溢出问题。如无法立即升级，可限制本地用户设置超长环境变量，或通过 SELinux/AppArmor 策略限制 ncurses 相关程序的执行权限作为临时缓解措施。"
score = 7.2
severity = "HIGH"
sources = ["redhat"]
title = "GNU ncurses 库本地缓冲区溢出漏洞"
updated = "2026-06-16T21:52:51.990"

