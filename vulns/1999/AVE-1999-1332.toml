[basic]
description = "KTH Kerberos 4 实现存在信息泄露漏洞，远程攻击者可通过向 Kerberos 服务发送特制的畸形 UDP 数据包触发错误响应，该错误字符串会无意中包含 Kerberos 领域名称（realm name）及最近登录用户信息，导致敏感信息泄露。攻击者无需身份认证即可利用此漏洞收集目标环境信息，为进一步攻击提供铺垫。该漏洞影响 KTH Kerberos 4 版本，CVSS 评分 5.0，危害等级中危。"
published = "1996-11-22T05:00:00.000"
remediation = "立即将 Kerberos 4 升级至 MIT Kerberos 5 或 Heimdal，Kerberos 5 在 Kerberos 4 兼容模式下同样不受此漏洞影响。如无法升级 Kerberos 版本，可参考 OpenBSD 的补丁对 KDC 的 UDP 请求输入验证进行修复，同时在防火墙层面限制 UDP 端口 750 仅允许受信任网段访问，以阻止外部攻击者利用畸形 UDP 包窃取 realm 名称和用户名。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "KTH Kerberos 4 信息泄露漏洞"
updated = "2026-06-16T21:49:43.190"

