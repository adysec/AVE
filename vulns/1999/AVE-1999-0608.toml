[basic]
description = "INN（InterNetNews）新闻服务器的 inndstart 程序存在权限提升漏洞。该程序在启动时会信任并读取由环境变量 INNCONF 所指定的配置文件路径，本地已登录的普通用户可通过在运行 inndstart 前自行设置 INNCONF 环境变量，将其指向攻击者可控的恶意配置文件，从而诱导以特权（如 news 用户或 root）身份运行的 inndstart 加载该配置并执行其中的危险指令或参数，最终实现本地权限提升。该漏洞影响使用存在缺陷版本 INN 软件且允许本地用户执行 inndstart 的 Unix/Linux 系统，攻击前提是攻击者需具备目标系统的本地账户访问权限且系统未对 INNCONF 环境变量做安全过滤。"
published = "1999-05-11T04:00:00.000"
remediation = "建议升级 INN (InterNetNews) 至 2.2.1 或更高版本，该版本修复了 inndstart 的 INNCONF 环境变量权限提升漏洞。若暂时无法升级，可通过在用户登录脚本或 /etc/profile 中取消设置 INNCONF 环境变量（unset INNCONF），并限制普通用户对 inndstart 的执行权限（chmod 750 /usr/local/news/bin/inndstart）作为临时缓解措施。建议参考 ISC 官方安全公告升级至 INN 2.6.0 或更新版本彻底修复。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "INN inndstart 权限提升漏洞"
updated = "2026-06-16T21:48:59.240"

