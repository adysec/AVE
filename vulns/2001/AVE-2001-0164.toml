[basic]
description = "Solaris 系统中 Junsoft JSparm 4.0 的 perfmon 程序存在权限提升漏洞。本地攻击者可通过 GUI 界面的 Logging File（日志文件）选项，以 root 权限在任意位置创建文件，从而获取系统最高控制权限。该漏洞源于 perfmon 未对日志文件路径进行充分权限校验，导致低权限用户可滥用该功能实现权限提升，CVSS 评分 7.2，危害等级高。"
published = "2001-06-18T04:00:00.000"
remediation = "立即移除 /opt/JSparm/bin/perfmon 程序的 setuid root 权限位（chmod u-s /opt/JSparm/bin/perfmon），并限制仅授权管理员可执行该程序。同时升级 Junsoft JSparm 至厂商提供的最新补丁版本，或考虑迁移至替代性能监控方案。如无法升级，可通过 Solaris RBAC 机制限制 perfmon 的 Logging File 功能调用。"
score = 7.2
severity = "HIGH"
sources = ["exploitdb"]
title = "Junsoft JSparm 4.0 perfmon 日志文件本地权限提升漏洞"
updated = "2026-06-16T21:54:14.530"

