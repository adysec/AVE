[basic]
description = "IRIX 操作系统的 TelnetD 服务存在格式字符串漏洞，远程攻击者可通过向目标发送特制的 IAC-SB-TELOPT_ENVIRON 请求，在 RLD 环境变量中注入格式字符串符号，导致服务器解析时执行任意代码。该漏洞影响 IRIX 5.2 至 6.1 版本，CVSS 评分 10.0，危害等级严重。攻击者无需身份认证即可远程利用，建议升级至修复版本或禁用 Telnet 服务。"
published = "2000-10-20T04:00:00.000"
remediation = "建议升级 IRIX 至 6.2 及以上版本，该版本已修复 telnetd 格式字符串漏洞；如无法升级，可通过 chkconfig telnet off 禁用 telnet 服务，或使用防火墙限制 telnet 访问来源（仅允许可信 IP），并尽早迁移至 SSH。"
score = 10
severity = "CRITICAL"
sources = ["cve"]
title = "SGI IRIX TelnetD 远程代码执行漏洞"
updated = "2026-06-16T21:52:22.137"

