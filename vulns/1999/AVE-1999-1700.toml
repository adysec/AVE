[basic]
description = "Novell NetWare 5 及更早版本在 IPX 协议上运行时，若数据包签名级别低于 3，存在会话伪骗漏洞。远程攻击者可通过伪造 IPC 分片数据包中的 MAC 地址，冒充合法用户发送 NetWare 核心协议（NCP）调用，从而获取管理员权限。该漏洞无需身份认证，攻击者仅需处于同一 IPX 网络段即可实施攻击，CVSS 评分 10.0，危害等级严重。"
published = "1999-07-15T04:00:00.000"
remediation = "将 Novell NetWare 的数据包签名级别（Packet Signature Level）设置为 3 或更高，以强制 NCP 通信使用签名验证。升级到 Novell NetWare 6 及以上版本。在网络层面，对 IPX 协议的 IPC 分片数据包启用源地址验证，并限制可信 MAC 地址的 IPX 流量。如不再需要 IPX 协议，建议迁移至 TCP/IP 协议栈并禁用 IPX。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "Novell NetWare IPX 数据包签名绕过权限提升漏洞"
updated = "2026-06-16T21:49:41.520"

