[basic]
description = "BSD Telnet 客户端在实现加密与 Kerberos 4 认证功能时存在会话加密强度不足的漏洞。远程攻击者可通过网络嗅探方式捕获 Telnet 会话流量，由于加密机制存在缺陷，攻击者能够解密并窃取会话中的敏感信息（如明文密码、传输数据等）。该漏洞影响使用 BSD Telnet 客户端且启用了加密和 Kerberos 4 认证的系统，攻击者只需与目标处于同一网络路径即可实施嗅探攻击，无需任何认证权限。"
published = "1995-03-03T05:00:00.000"
remediation = "立即停止使用 Telnet 协议远程登录，全面迁移至 SSH（OpenSSH 7.0 及以上版本）作为替代方案。如无法立即迁移，在服务端禁用 Kerberos 4 认证支持（配置 `/etc/inetd.conf` 移除 telnet 的 `-a kerberos4` 参数），并在防火墙层面阻断 Telnet 端口（23/TCP）的外部访问。将 BSD Telnet 客户端升级至包含该修复的最新版本或应用厂商提供的安全补丁。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "BSD Telnet 客户端加密会话信息泄漏漏洞"
updated = "2026-06-16T21:49:43.067"

