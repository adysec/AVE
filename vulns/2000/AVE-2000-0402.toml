[basic]
description = "Shadow Op Software 公司开发的 Dragon Server 1.0 及 2.0 版本中的 Telnet 服务存在拒绝服务漏洞。远程攻击者无需身份认证，通过向目标 Telnet 服务器发送超长用户名字符串，即可触发服务崩溃或资源耗尽，导致正常用户无法访问该服务。该漏洞利用方式简单，攻击门槛低，CVSS 评分 5.0，危害等级中等。厂商已停止维护该产品，建议用户迁移至其他替代方案。"
published = "2000-06-16T04:00:00.000"
remediation = "建议立即停止使用已停止维护的 Shadow Op Software Dragon Server 1.0/2.0，迁移至支持现代安全协议的替代产品（如 Microsoft Telnet Server 或 OpenSSH for Windows）。若无法立即替换，可在网络边界防火墙中限制对 TCP 端口 21（FTP）和 23（Telnet）的访问，仅允许受信任 IP 连接，并部署入侵检测规则拦截超长用户名请求（超过 1024 字节的 USER 或 login 输入）。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Shadow Op Software Dragon Server Telnet 拒绝服务漏洞"
updated = "2026-06-16T21:51:49.493"

