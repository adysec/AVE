[basic]
description = "KDE kvt 终端模拟器存在格式化字符串漏洞，由于程序在处理用户输入时未正确过滤格式化字符串参数，导致本地攻击者可通过向 kvt 程序传递特制的格式化字符串参数触发该漏洞，覆盖任意内存地址，从而获取 root 权限。该漏洞影响 KDE 1.x 及更早版本，攻击者需拥有本地系统访问权限，无需身份认证即可提权至 root，危害等级高。"
published = "1999-06-01T04:00:00.000"
remediation = "升级 KDE 至 1.1.2 或更高版本以修复 kvt 终端程序中的格式化字符串漏洞。Red Hat Linux 用户应安装 RHSA-1999:015-01 更新包；Caldera OpenLinux 用户应应用 CSSA-1999-015.0 安全补丁。临时缓解措施可移除 kvt 的 setuid root 权限位（chmod u-s /usr/bin/kvt），限制本地普通用户以 root 权限执行该程序。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "KDE kvt 格式化字符串漏洞"
updated = "2026-06-16T21:51:34.897"

