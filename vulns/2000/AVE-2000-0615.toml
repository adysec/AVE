[basic]
description = "Microsoft WebTV for Windows 98/ME 中的 annclist.exe 组件存在拒绝服务漏洞，远程攻击者无需身份认证即可向目标系统的 22701 至 22705 端口发送特制的大尺寸畸形 UDP 数据包，触发该漏洞导致目标服务崩溃，造成拒绝服务。该漏洞影响 Windows 98/ME 系统上运行的 WebTV 软件，CVSS 评分 5.0，危害等级中等。"
published = "2000-11-14T05:00:00.000"
remediation = "将系统升级至 Windows XP 或更高版本（WebTV 组件已移除），或在防火墙/路由器上屏蔽 UDP 端口 22701-22705 的入站流量，以阻止攻击者发送畸形 UDP 报文触发 annclist.exe 崩溃。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Microsoft WebTV UDP数据包处理拒绝服务漏洞"
updated = "2026-06-16T21:52:33.350"

