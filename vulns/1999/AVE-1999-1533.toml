[basic]
description = 'Cisco IOS 系统 8.2 至 9.1 版本存在访问控制列表绕过漏洞。当特定接口配置了扩展 IP 访问列表、启用 IP 路由缓存且访问列表使用了 "established" 关键字时，远程攻击者可利用 TCP 会话欺骗技术绕过 ACL 过滤规则，实现未授权网络访问。该漏洞影响大量 Cisco 路由器设备，CVSS 评分 7.5，危害等级高。'
published = "1992-12-10T05:00:00.000"
remediation = "立即升级 Cisco IOS 至 9.1.1 或更高版本，该漏洞已在 9.1.1 中修复。如无法升级，可在受影响接口下执行 `no ip route-cache` 禁用 IP 路由缓存（快速转发），强制每个数据包通过 CPU 重新评估 ACL；或将扩展 ACL 中的 `established` 关键词替换为具体的单向规则（如明确允许/拒绝返回流量的源端口范围），避免依赖状态匹配逻辑。同时建议迁移至 Cisco IOS 12.0 及以上版本以获得持续安全支持。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "Cisco IOS 访问控制列表安全绕过漏洞"
updated = "2026-06-16T21:50:30.017"

