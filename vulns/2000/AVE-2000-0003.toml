[basic]
description = "RealNetworks RealServer 5.0 的 ramgen 组件存在拒绝服务漏洞。远程攻击者无需认证即可通过向目标服务器发送特制的超长 ramgen 请求，导致 RealServer 服务崩溃或停止响应，造成拒绝服务。该漏洞影响 RealNetworks RealServer 5.0 版本，攻击条件简单，仅需向目标 80/8080 端口发送恶意构造的 HTTP 请求即可触发，无需任何权限。CVSS 评分 5.0，危害等级中危。"
published = "1999-12-23T05:00:00.000"
remediation = "建议升级至 RealNetworks RealServer 5.0.1 或更高版本，该版本已修复 ramgen 组件对超长请求的缓冲区处理。如无法升级，可在 Web 服务器或反向代理层限制请求 URI 长度不超过 1024 字节，并过滤对 /ramgen 路径的异常请求以缓解 DoS 风险。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "RealNetworks RealServer 5.0 ramgen 拒绝服务漏洞"
updated = "2026-06-16T21:50:47.890"

