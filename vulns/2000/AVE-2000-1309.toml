[basic]
description = 'Microsoft Office 2000（Excel 和 PowerPoint）及 PowerPoint 97 中的 ActiveX 对象被错误标记为"对脚本安全"，远程攻击者可通过诱导用户使用 Internet Explorer 5.01 访问恶意网页或查看特制 HTML 邮件，利用 Visual Basic for Applications（VBA）的 SaveAs 函数将任意文件写入目标系统指定位置，导致任意文件写入甚至代码执行。该漏洞影响 Microsoft Internet Explorer 5.01 及 Office 2000/97 系列产品，CVSS 评分 7.5，危害等级高。'
published = "2000-06-27T04:00:00.000"
remediation = '立即安装 Microsoft 安全公告 MS00-049 提供的 Office 2000 安全更新补丁（Addinsec），将 Excel 2000 和 PowerPoint 2000 标记为"脚本不安全"组件。PowerPoint 97 用户请安装对应版本补丁。同时建议安装 Outlook 电子邮件安全更新，限制 HTML 邮件中 Active Scripting 和 ActiveX 控件的执行，防止通过邮件向量触发该漏洞。如无法安装补丁，可在 Internet Explorer 安全设置中将受信任区域脚本功能禁用作为临时缓解措施。'
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "Microsoft Internet Explorer 与 Office ActiveX 对象远程代码执行漏洞"
updated = "2026-06-16T21:52:04.747"

