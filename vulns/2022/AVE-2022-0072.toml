[basic]
description = "Linux 内核 DRM 调度器（drm/scheduler）中存在围栏引用计数漏洞，当使用 DRM 的进程被异常终止时，依赖围栏未正确释放引用，导致内存泄漏。攻击者可通过运行大量使用 DRM 图形渲染的进程，触发资源耗尽，造成系统拒绝服务。该漏洞影响 Linux 内核的 DRM 子系统，CVSS 评分 5.5，危害等级中等。"
published = "2025-05-01T15:16:06.373"
remediation = "升级 Linux 内核至 6.0.10 及以上版本。该漏洞影响内核 4.18 至 6.0.10 之前版本，修复提交为 e5f4b38362df 和 b3af84383e7a，位于 drivers/gpu/drm/scheduler/sched_entity.c。无法立即升级时，可通过限制本地用户对 DRM 子系统的访问权限作为临时缓解措施。"
score = 5.5
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux 内核 DRM 调度程序围栏引用计数漏洞"
updated = "2026-06-17T05:19:14.727"

