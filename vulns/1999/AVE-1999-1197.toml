[basic]
description = "Microsoft Windows NT 4.0（终端服务器版及未安装 SP6 的 NT Server 4.0）中的 Cenroll ActiveX 控件（xenroll.dll）存在拒绝服务漏洞。该控件在处理证书注册相关操作时缺乏充分资源限制，远程攻击者可在网页中嵌入恶意 ActiveX 调用，诱使用户访问后于目标主机上反复创建大量任意文件，造成磁盘空间与系统资源被耗尽，最终导致服务不可用。攻击需目标用户使用 IE 等支持 ActiveX 的浏览器访问攻击者控制的页面，无需身份认证即可触发，影响范围为未打补丁的 Windows NT 4.0 相关版本。"
published = "2000-12-14T05:00:00.000"
remediation = "升级到 Windows NT 4.0 Service Pack 6（SP6）或更高版本以修复该 ActiveX 控件缺陷；如暂无法打补丁，可在 IE 中通过「Internet 选项→安全→自定义级别」将 Cenroll (xenroll.dll) ActiveX 控件的「下载已签名的 ActiveX 控件」和「运行 ActiveX 控件」设为「禁用」或「提示」，并限制内网终端对 80/443 的可疑文件写入以缓解拒绝服务风险。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
