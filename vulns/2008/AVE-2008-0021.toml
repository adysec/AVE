[basic]
description = "Apple QuickTime 7.4.5 之前版本存在反序列化漏洞，未受信任的 Java 小程序可反序列化 QTJava 对象，导致远程攻击者通过精心构造的恶意 Applet 执行任意代码。该漏洞影响安装在 Windows 系统上的 QuickTime 7.4.5 之前版本，CVSS 评分 6.8（中等危害），攻击向量为网络，攻击复杂度中等，无需身份认证，但需要用户交互（如访问恶意网页运行 Applet）。攻击者可诱导用户访问包含恶意 Java Applet 的网页，利用 QTJava 反序列化缺陷获取提升权限并在目标系统执行任意代码。Apple 已在 QuickTime 7.4.5 版本中修复此漏洞，建议用户升级至 7.4.5 或更高版本。"
published = "2008-04-04T17:44:00.000"
remediation = "建议立即升级 Apple QuickTime 至 7.4.5 或更高版本（可通过 Apple 官网下载安装）。如暂无法升级，可在浏览器中禁用 Java 插件或卸载 QuickTime Java 插件（QTJava.zip）作为临时缓解措施，防止恶意 Java Applet 利用 QTJava 反序列化漏洞执行任意代码。"
score = 6.8
severity = "MEDIUM"
sources = ["tenable"]
title = "Apple QuickTime 代码执行漏洞"
updated = "2026-06-16T22:50:48.387"

