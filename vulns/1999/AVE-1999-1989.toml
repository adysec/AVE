[basic]
description = "Oracle Web Listener 2.1 存在输入验证不当漏洞，远程攻击者可通过将 URL 中的特定字符替换为其 HTTP 十六进制编码（URL 编码）等价形式，绕过服务器的访问限制规则，从而访问受限资源。该漏洞源于程序对用户请求的 URL 参数缺乏充分的规范化处理，导致安全限制被绕过。CVSS 评分 7.5，危害等级高，影响 Oracle Web Listener 2.1 版本。"
published = "1999-11-25T05:00:00.000"
remediation = "建议立即升级到 Oracle HTTP Server（取代 Oracle Web Listener）的最新受支持版本，或迁移至 Oracle WebLogic Server / Oracle Application Server。如无法升级，可在 Web 服务器层面配置 URL 重写规则，将包含 %5f、%2e 等编码字符的请求拦截并返回 403，同时严格限制 owa_util 等敏感包的访问白名单。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "Oracle Web Listener 安全绕过漏洞"
updated = "2026-06-16T21:50:41.440"

