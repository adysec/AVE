[basic]
description = "标签。<value>Microsoft Windows NT 4.0 及其 Service Pack 1 至 5 的帮助文件实用程序存在缓冲区溢出漏洞。攻击者可通过诱导用户打开精心构造的畸形帮助文件触发缓冲区溢出，进而导致任意代码执行。该漏洞影响 Windows NT 4.0 及其 SP1 至 SP5 所有版本，CVSS 评分 4.6，属中危漏洞。攻击者需诱使用户打开恶意帮助文件才能触发漏洞，Microsoft 已发布补丁修复此漏洞。"
published = "1999-05-17T04:00:00.000"
remediation = 'Windows NT 4.0 已停止支持，官方不再提供安全更新。建议立即升级至受支持的 Windows 版本（如 Windows Server 2019/2022 或 Windows 10/11）。如无法升级，可通过组策略禁用 .hlp 文件关联，或使用 regsvr32 -u %windir%\system32\winhlp32.exe 注销帮助文件处理程序以缓解风险。'
score = 4.6
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Microsoft Windows NT 4.0 Help File 缓冲区溢出漏洞"
updated = "2026-06-16T21:48:54.460"

