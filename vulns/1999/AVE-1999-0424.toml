[basic]
description = "Netscape FastTrack Server 3.0.1 存在 HTTP 请求方法大小写处理漏洞。由于服务器对 HTTP 方法（如 `get` 小写和 `GET` 大写）的解析逻辑存在差异，当攻击者使用小写 `get` 发送请求时，服务器会错误地返回根目录的文件列表，导致敏感文件和目录结构被泄露。攻击者无需认证即可远程触发此漏洞，可能利用泄露的信息进行进一步攻击。该漏洞影响 Netscape FastTrack Server 3.0.1 版本，CVSS 评分 7.5，危害等级高危。"
published = "1998-01-01T05:00:00.000"
remediation = "建议立即升级到 Netscape FastTrack Server 3.0.2 或更高版本，该版本已修复小写 get 命令导致的目录遍历问题。该产品已停止维护，强烈建议迁移至现代 Web 服务器（如 Apache HTTP Server 或 Nginx），同时在反向代理层面拦截异常 HTTP 方法作为临时缓解。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "Netscape FastTrack Server 3.0.1 目录列表漏洞"
updated = "2026-06-16T21:47:58.770"

