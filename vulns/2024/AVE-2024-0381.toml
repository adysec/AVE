[basic]
description = "泛微e-cology v10的/papi/passport/login/generateEteamsId接口存在未授权访问漏洞，未经身份认证的远程攻击者可通过直接POST请求该接口获取有效的ETEAMSID凭证，从而绕过系统登录认证机制，获取系统管理员权限，最终可能导致远程代码执行。该漏洞利用难度低，无需特殊权限，危害较大。"
published = "2024-01-01"
remediation = "建议升级泛微e-cology v10至官方最新安全版本，对/papi/passport/login/generateEteamsId接口添加身份认证和访问控制措施，限制未经授权的访问请求，并配置WAF规则拦截对该接口的异常请求。"
score = 5.0
severity = "MEDIUM"
sources = ["hwpoc"]
title = "泛微e-cology v10 获取ETEAMSID未授权访问漏洞"
