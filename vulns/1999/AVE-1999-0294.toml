[basic]
description = "QMail 1.0 存在拒绝服务漏洞，远程攻击者无需认证即可通过 SMTP 协议的 RCPT 命令指定大量收件人地址，导致 QMail 在处理过程中消耗过多系统资源（CPU 与内存），最终造成邮件服务瘫痪。该漏洞影响 Dan Bernstein QMail 1.0 及早期版本，CVSS 评分为 2.1，危害等级低。官方建议升级至 QMail 1.03 或更高版本进行修复。"
published = "1997-06-01T04:00:00.000"
remediation = "升级到 netqmail 1.06 或应用 qmail-1.03 的 RCPT DoS 补丁；在 qmail-smtpd 中设置软限制参数 `MAXRCPTS`（如设为 100），限制单次 SMTP 会话的收件人数量；同时启用 `rcpthosts` 和 `morercpthosts` 控制邮件转发，防止被滥用为拒绝服务攻击的反射点。"
score = 2.1
severity = "LOW"
sources = ["exploitdb"]
title = "Dan Bernstein QMail 远程拒绝服务漏洞"
updated = "2026-06-16T21:47:41.470"

