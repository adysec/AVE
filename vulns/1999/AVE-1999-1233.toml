[basic]
description = "Mutt 邮件客户端 0.93i 及之前版本的 parse.c 文件中存在缓冲区溢出漏洞。当处理特制的 Content-Type 邮件头时，由于缺少边界检查，攻击者可通过发送包含恶意 shellcode 的邮件触发栈溢出，受害者在打开邮箱时无需查看邮件即可触发漏洞，导致远程代码执行。"
published = "1998-07-28"
remediation = "升级 Mutt 至 0.93i 或更高版本，或应用官方提供的 parse.c 补丁，在 Content-Type 解析循环中添加边界检查条件 i < (SHORT_STRING - 1) 以防止缓冲区溢出。"
score = 7.5
severity = "HIGH"
sources = [
    "cve",
    "bugtraq",
]
title = "Mutt 邮件客户端 parse.c 缓冲区溢出远程代码执行漏洞"
updated = "2026-06-16"

