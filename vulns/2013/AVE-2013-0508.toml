[basic]
description = "Microsoft Windows 内核的 NDProxy.sys 驱动程序中存在本地权限提升漏洞。该漏洞源于 NDProxy.sys 对用户态传入的 IOCTL 请求处理不当，导致未正确验证输入参数，本地攻击者可通过构造特制的应用程序向受影响系统发送恶意 IOCTL 调用，从而触发内核态任意内存写入，实现权限提升至 SYSTEM 级别。该漏洞影响 Windows XP SP2/SP3 及 Windows Server 2003 SP2 版本，已在 2013 年 11 月被检测到在野利用。Microsoft 在 MS14-002 安全公告中修复了此漏洞。"
published = "2013-11-28T00:55:04.677"
remediation = '立即安装 Microsoft 安全公告 MS14-002 提供的更新 KB2914368。Windows XP SP3 用户可通过 Windows Update 自动获取或手动下载安装；Windows Server 2003 SP2 用户同样适用。如无法立即打补丁，可临时将 NDProxy.sys 重定向至 Null.sys：以管理员身份运行命令 `sc stop ndproxy` 后执行 `reg add HKLM\System\CurrentControlSet\Services\ndproxy /v ImagePath /t REG_EXPAND_SZ /d system32\drivers\null.sys /f`，重启系统生效。注意该缓解措施会导致 TAPI 相关服务（远程访问、拨号网络、VPN）不可用，打补丁后须撤销此修改。'
score = 7.8
severity = "HIGH"
sources = ["kev"]
title = "Microsoft Windows Kernel NDProxy.sys 本地权限提升漏洞"
updated = "2026-06-16T23:58:19.633"

