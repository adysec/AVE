[basic]
description = 'Seattle Lab Software 出品的 SLmail 3.1 及更早版本的 SMTP 服务组件存在输入验证缺陷，远程攻击者无需身份认证即可通过向目标服务器的 25 号端口发送以左括号 "(" 开头的畸形命令参数，例如 SEND、(、VRFY、(、EXPN、(、MAIL FROM、(、RCPT TO、( 等，导致 SMTP 服务进程崩溃，造成拒绝服务。该漏洞影响 SLmail 3.1 及之前所有版本，攻击复杂度低，且无需任何用户交互。'
published = "1998-09-22T04:00:00.000"
remediation = "SLmail 已停止维护多年，建议迁移至仍在安全更新的邮件服务器（如 Exchange、Postfix 等）。临时缓解措施：在 SMTP 代理或防火墙层面过滤以左括号开头的 SMTP 命令参数，或限制端口 25 的访问来源 IP。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Seattle Lab Software SLmail 3.1 SMTP 命令处理拒绝服务漏洞"
updated = "2026-06-16T21:50:04.197"

