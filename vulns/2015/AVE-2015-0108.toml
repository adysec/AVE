[basic]
description = "Microsoft Office 多个版本存在内存破坏漏洞（CNVD-2015-02509），攻击者可通过构造特制的 RTF（Rich Text Format）文档，诱使用户打开该恶意文件来触发漏洞。该漏洞影响 Microsoft Word 2007 SP3、Office 2010 SP2、Word 2010 SP2、Word 2013 SP1、Word 2013 RT SP1、Word for Mac 2011、Office Compatibility Pack SP3，以及 SharePoint Server 2010/2013 和 Office Web Apps Server 2010/2013 中的 Word Automation Services。成功利用此漏洞可导致远程代码执行，攻击者能以当前用户权限执行任意恶意代码，进而完全控制系统。该漏洞 CVSS 评分 7.8（高危），已被 CISA 纳入已知被利用漏洞目录（KEV），在野攻击中被 APT 组织（如 Sednit）利用。"
published = "2015-04-14T20:59:05.250"
remediation = "立即安装 Microsoft 安全公告 MS15-033 对应的补丁程序（可通过 Windows Update 自动更新或从 Microsoft Update Catalog 手动下载）。受影响产品包括 Word 2007 SP3、Office 2010 SP2、Word 2010 SP2、Word 2013 SP1、Word 2013 RT SP1、Word for Mac 2011、Office Compatibility Pack SP3 等，需分别安装各自对应的更新补丁。若无法立即打补丁，应避免打开来源不明的 RTF 格式文档，并在 Office 中启用受保护视图（Protected View）以降低风险。"
score = 7.8
severity = "HIGH"
sources = ["kev"]
title = "Microsoft Office Word 内存破坏远程代码执行漏洞"
updated = "2026-06-17T00:22:45.033"

