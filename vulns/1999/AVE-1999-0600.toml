[basic]
description = "IBM AIX 系统自带的 pdnsd（个人域名服务守护进程）在处理网络请求时未对输入长度进行边界校验，存在栈缓冲区溢出缺陷。攻击者可通过向受影响服务发送特制的超长网络数据包，覆盖栈上返回地址并执行任意代码，从而以服务进程权限在目标主机上实现远程拒绝服务或远程命令执行，无需身份认证即可触发。"
published = "1999-08-18"
remediation = "升级到 IBM 发布的包含该漏洞修复的 AIX 补丁版本，或在官方修复前停用 pdnsd 服务并限制其监听端口的网络访问。"
score = 10
severity = "CRITICAL"
sources = ["exploitdb"]
title = "IBM AIX pdnsd 域名服务守护进程远程缓冲区溢出漏洞"
updated = "2026-06-16"

