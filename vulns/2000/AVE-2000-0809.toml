[basic]
description = "Microsoft Jet 数据库引擎的 Text I-ISAM 组件存在安全漏洞，攻击者可通过构造特制的数据库查询语句修改服务器上的文本文件内容。该漏洞影响 Windows 系统中使用 Jet 数据库引擎的应用程序（如 Microsoft Access 等），允许攻击者在未授权的情况下通过数据库查询操作实现对受保护文本文件的非预期修改，可能导致敏感信息泄露或系统配置篡改。"
published = "1999-07-28T04:00:00.000"
remediation = "安装 Microsoft 安全公告 MS99-030 提供的 JET 数据库引擎更新补丁。该漏洞影响 Windows 95/98/NT 4.0 及 Office 97/2000 中的 JET 组件，升级至 Microsoft Data Access Components (MDAC) 2.1 SP2 或更高版本可彻底修复。对于仍使用 JET 引擎的遗留系统，应迁移至 Microsoft SQL Server 或 SQL Server Express 等现代数据库引擎，并限制对 .txt/.csv 等文本文件的数据库查询权限作为缓解措施。"
score = 7.6
severity = "HIGH"
sources = ["epss"]
title = "Microsoft JET 数据库引擎 Text I-ISAM 漏洞"
updated = "2026-06-16T21:51:28.597"

