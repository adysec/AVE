[basic]
description = "泛微云桥 e-Bridge 的 sendWxMsg 接口存在 SQL 注入漏洞，由于对 tpids 参数未进行预编译处理，攻击者可在未经认证的情况下构造恶意 SQL 语句注入数据库查询，导致数据库敏感信息泄露、数据篡改甚至进一步获取服务器控制权。攻击者只需向受影响接口发送特制 HTTP 请求即可利用，无需任何权限，危害严重。"
published = "nday"
remediation = "升级泛微云桥 e-Bridge 至厂商发布的最新安全版本，对 sendWxMsg 接口 tpids 参数实施预编译处理或严格白名单校验；部署 WAF 规则拦截包含 SQL 注入特征的 tpids 请求作为临时缓解。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "泛微云桥 e-Bridge sendWxMsg SQL注入漏洞"
