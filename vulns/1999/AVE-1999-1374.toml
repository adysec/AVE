[basic]
description = 'Ipswitch IMail 5.0 及 WS_FTP Server 1.0.1/1.0.2 存在权限提升漏洞。本地攻击者可通过将注册表中 "flags" 键值设置为 1920，从而获取额外系统权限，进而修改或添加邮件账户。此漏洞需要攻击者拥有本地访问权限，利用门槛较低，可导致未授权账户操作及系统配置篡改，影响邮件服务及 FTP 服务的正常安全运行。'
published = "1999-01-02T05:00:00.000"
remediation = '升级 Ipswitch IMail 至 6.0 及以上版本，WS_FTP Server 升级至 2.0 及以上版本。同时使用 regedit 限制注册表项 HKEY_LOCAL_MACHINE\...\flags 的写入权限，仅允许 Administrators 组修改，并移除普通用户的写权限。'
score = 4.6
severity = "MEDIUM"
sources = ["epss"]
title = "Ipswitch IMail 权限提升漏洞"
updated = "2026-06-16T21:49:52.153"

