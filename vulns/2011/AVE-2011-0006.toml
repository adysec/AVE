[basic]
description = 'vsftpd 2.3.4 版本在 2011 年 6 月 30 日至 7 月 3 日期间被植入恶意后门，该后门会在目标主机上监听 6200/tcp 端口并开放一个 root 权限的 shell。攻击者只需向 FTP 服务的登录用户名中注入特定笑脸字符 ":)" 即可触发后门，在未授权的情况下远程执行任意命令，导致服务器被完全控制。该漏洞影响在此期间下载安装的 vsftpd 2.3.4 版本，CVSS 评分为 9.8（严重），任何能够访问目标 FTP 服务及其 6200 端口的网络攻击者均可利用此漏洞获取系统最高权限。'
published = "2019-11-27T21:15:12.387"
remediation = "建议立即升级 vsftpd 至 2.3.5 或更高版本（官方已发布修复版本）。若暂时无法升级，请在防火墙层面封禁 6200/tcp 端口防止后门连接，并检查系统是否已被植入恶意代码。同时建议从官方站点 https://security.appspot.com/vsftpd.html 重新下载验证过的源码包编译安装，避免使用 2011年6月30日至7月3日期间下载的被篡改版本。"
score = 9.8
severity = "CRITICAL"
sources = ["nuclei"]
