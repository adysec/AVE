[basic]
description = "glibc 动态链接器在处理 SUID/SGID 程序的 LD_PRELOAD 环境变量时，未验证 /etc/ld.so.cache 中预加载的共享库是否同样具有 SUID/SGID 权限，导致本地低权限用户可通过将恶意共享库放置于 /lib 或 /usr/lib 目录下，利用 LD_PRELOAD 机制使其被 SUID 程序加载，从而以提升后的权限覆盖任意系统文件。该漏洞影响 glibc 2.1.3 及更早版本，攻击者需拥有本地账户且具备对 /lib 或 /usr/lib 目录的写入权限，CVSS 评分 2.1，危害等级低。"
published = "2001-03-26T05:00:00.000"
remediation = "升级 glibc 至 2.2.0 或更高版本。Debian 用户应安装 DSA-039 提供的更新包；Red Hat 用户应用对应安全 errata。如无法立即升级，可移除 SUID/SGID 二进制文件的 LD_PRELOAD 环境变量支持作为临时缓解，但建议优先完成 glibc 版本升级以彻底修复此漏洞。"
score = 2.1
severity = "LOW"
sources = ["redhat"]
title = "GNU glibc LD_PRELOAD 本地权限提升漏洞"
updated = "2026-06-16T21:53:48.020"

