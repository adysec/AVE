[basic]
description = "XFree86 的 startx 命令存在符号链接（symlink）漏洞，本地攻击者可通过在关键目录中创建符号链接文件，利用 startx 脚本以提升的权限写入或覆盖受限文件，从而可能实现本地权限提升或造成拒绝服务。该漏洞影响 X11R6 3.3.3 及之前版本，攻击者需拥有本地系统访问权限，CVSS 评分 4.6，危害等级中危。"
published = "1999-03-21T05:00:00.000"
remediation = "升级 XFree86 至 4.0 及以上版本，该版本修复了 startx 的符号链接竞争条件问题。如无法升级，建议使用 xinit 替代 startx 启动 X 会话，或确保 /tmp 目录以 nosuid、noexec 选项挂载，并启用 sticky bit（chmod +t /tmp）防止符号链接攻击。现代 Linux 发行版应迁移至 Xorg 替代 XFree86。"
score = 4.6
severity = "MEDIUM"
sources = ["exploitdb"]
title = "XFree86 X11R6 startx 命令符号链接攻击本地权限提升漏洞"
updated = "2026-06-16T21:48:23.133"

