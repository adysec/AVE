[basic]
description = "Checkpoint Firewall-1 在启用 RSH/REXEC 服务时存在安全绕过漏洞。远程攻击者可通过向目标防火墙发送特制的畸形连接请求，绕过访问控制规则限制，直接连接到受保护的 RSH/REXEC 客户端服务。该漏洞影响 Checkpoint Firewall-1 多个版本，CVSS 评分 7.5，危害等级高。攻击无需身份认证，利用复杂度低，可导致敏感信息泄露、权限提升或服务被非法访问。"
published = "2000-10-20T04:00:00.000"
remediation = "立即禁用 Firewall-1 的 RSH/REXEC 服务：在防火墙策略中删除或注释掉允许 RSH（TCP 514）和 REXEC（TCP 512）的规则；如业务必须使用，升级到 Check Point 官方已修复版本（NG FP1 及以上），并在规则中限制仅允许特定源 IP 访问。对于已停止支持的旧版本，建议迁移到受支持的 Firewall 版本并启用应用控制功能拦截异常 RSH 请求。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "Checkpoint Firewall-1 安全绕过漏洞"
updated = "2026-06-16T21:52:27.823"

