[basic]
description = "Gradio 组件存在 proxy_url 参数注入导致的服务端请求伪造（SSRF）漏洞。攻击者可利用特制的 proxy_url 参数绕过访问控制，诱使 Gradio 服务端向内部网络资源发起未授权请求，从而探测内网服务、读取敏感信息或攻击内部系统。该漏洞影响 Gradio 6.6.0 之前的所有版本，攻击无需身份认证，仅需构造恶意请求即可触发。官方已在 6.6.0 版本中修复此漏洞。"
published = "nday"
remediation = "升级 Gradio 至 6.6.0 及以上版本，严格校验 proxy_url 参数的 URL 白名单，禁止内网地址段请求。同时配置网络层访问控制，限制 Gradio 服务对内部网络的出站连接，以缓解 SSRF 风险。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "Gradio proxy_url 注入服务端请求伪造漏洞"
updated = "nday"

