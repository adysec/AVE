[basic]
description = "Linux ext2fs 备份套件中的 dump 工具存在缓冲区溢出漏洞，本地攻击者可通过向 dump 命令传递超长命令行参数触发缓冲区溢出，从而获取目标系统的 root 权限。该漏洞影响 Mandrake Linux 等发行版本，危害等级高，攻击者需拥有本地访问权限。"
published = "2000-02-28T05:00:00.000"
remediation = "立即升级到 Linux 内核 2.4.2+ 并安装 e2fsprogs 4.1 或更高版本，此版本修复了 dump 工具的缓冲区溢出漏洞，并通过编译时堆栈保护机制直接防止相关攻击。卸载多余的 suid 版本的 dump 二进制文件，禁止意外运行 suid/sgid 权限的工具，使用安全的 ext2fs 实用程序替代。为了进一步加强系统安全性，可以通过 iptables 的默认拒绝策略实现额外的缓冲区溢出缓解措施。"
score = 7.2
severity = "HIGH"
sources = ["redhat"]
title = "Linux ext2fs backup dump 缓冲区溢出权限提升漏洞"
updated = "2026-06-16T21:51:10.780"

