[basic]
description = "IRIX 操作系统中 TelnetD telnet 服务器在处理 IAC-SB-TELOPT_ENVIRON 请求时，未能对用户注入的 RLD 环境变量进行正确的格式化字符串清洗，存在格式化字符串漏洞。远程攻击者无需身份认证即可通过向目标系统发送特制的包含超长 RLD 变量的请求触发此漏洞，从而在受影响系统上执行任意命令。该漏洞影响 IRIX 5.2 至 6.1 版本，CVSS 评分 10.0。"
published = "2000-10-20T04:00:00.000"
remediation = "立即升级 IRIX 至 6.5.x 以上版本，或安装 SGI 官方补丁。如无法升级，立即禁用 telnetd 服务（/etc/inetd.conf 中注释 telnet 行并重启 inetd），改用 SSH 进行远程管理。在边界防火墙上阻止外部对 23/TCP 端口的访问作为临时缓解。"
score = 10
severity = "CRITICAL"
sources = ["exploitdb"]
title = "SGI IRIX TelnetD 格式字符串远程代码执行漏洞"
updated = "2026-06-16T21:52:22.137"

