[basic]
description = "Internet Explorer 4.x 和 5.x 版本存在跨框架域验证漏洞。由于浏览器窗口未能正确验证框架所属域，远程攻击者可通过构造恶意网页，诱使用户访问后利用 DocumentComplete() 事件绕过同源策略，从而读取客户端本地文件。该漏洞影响 Windows 平台上的 IE 4.0/5.0/5.5 预览版及 5.0.1 等版本，CVSS 评分 5.1，危害等级中危。攻击者需诱导用户访问恶意页面方可利用。"
published = "2000-05-17"
remediation = "安装 Microsoft 安全公告 MS00-033 提供的修补程序，该补丁要求系统已安装 Internet Explorer 4.01 Service Pack 2 或 IE 5.01。也可升级至 IE 5.5 或 IE 5.01 Service Pack 1，这些版本不受此漏洞影响。后续累积安全更新 MS00-055 也已包含此修复。对于无法升级的旧系统，建议在 IE 安全设置中将 Internet 区域设为高安全级别并禁用 Active 脚本。"
score = 5.1
severity = "MEDIUM"
sources = ["cve"]
title = "Microsoft Internet Explorer 跨域框架访问信息泄露漏洞"
updated = "2026-06-16T21:51:47.567"

