[basic]
description = "Windows Internet 命名服务（WINS）存在安全设计缺陷，远程攻击者可通过向 WINS 服务器发送恶意的 1Ch 注册请求，使域控制器记录被篡改为指向攻击者控制的恶意服务器，从而导致目标网络连接中断或凭据被窃取。该漏洞影响 Microsoft Windows 域控制器环境，CVSS 评分 7.6，危害等级高。Windows 95/98 客户端环境下影响可能受限。"
published = "2009-01-15T01:30:00.407"
remediation = "在 WINS 管理控制台中将域控制器 (1Ch) 记录设置为静态条目而非动态注册，防止被恶意覆盖；将 Windows 2000 升级至 Service Pack 4 以应用所有已知安全更新；在防火墙层面限制对 WINS 服务器 UDP/TCP 137 端口的访问，仅允许受信任的子网发起注册请求；如条件允许，停用 WINS 并迁移至基于 DNS 的 Active Directory 名称解析方案以彻底规避该风险。"
score = 7.6
severity = "HIGH"
sources = ["avd"]
title = "Microsoft Windows Internet 命名服务 拒绝服务漏洞"
updated = "2026-06-16T21:50:47.633"

