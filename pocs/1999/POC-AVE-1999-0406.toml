[info]
author = "ave"
description = "检测 Squid 代理服务器 cachemgr.cgi 管理脚本是否未授权暴露在 Web 目录下，攻击者可利用该脚本作为中转代理扫描内网端口或发起 DoS 攻击。"
id = "POC-AVE-1999-0406"
name = "Squid cachemgr.cgi Unauthorized Access PoC"
severity = "high"
tags = ["ave-1999-0406"]
vuln_id = [
    "CVE-1999-0710",
    "AVE-1999-0406",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/cgi-bin/cachemgr.cgi"
protocol = "http"

[poc.requests.body]
content = ""
type = "raw"

[[poc.requests.matchers]]
expect = true
status = [200]
type = "status"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "Cache Manager",
    "cachemgr.cgi",
]
