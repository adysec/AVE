[basic]
description = "Nortel Networks Optivity NETarchitect 2.0 中的 bna_pass 程序在调用系统 rm 命令时依赖 PATH 环境变量来定位可执行文件，未使用绝对路径，构成安全漏洞。本地攻击者可通过修改 PATH 环境变量，将恶意程序替换为 rm 并在 bna_pass 执行时被调用，从而以 bna_pass 进程权限执行任意命令。该漏洞影响 Optivity NETarchitect 2.0 版本，攻击者需具备本地系统访问权限，CVSS 评分 7.2，危害等级高。"
published = "1999-12-29T05:00:00.000"
remediation = "将 bna_pass 程序中对 rm 的调用改为使用绝对路径 /bin/rm，或在执行 system() 前将 PATH 环境变量重置为安全值（如 /bin:/usr/bin），避免继承用户的 PATH 环境变量。同时设置程序以最小权限运行，禁止 SUID 提权。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "Nortel Networks Optivity NETarchitect 本地权限提升漏洞"
updated = "2026-06-16T21:50:48.877"

