[basic]
description = "HP-UX 10.20 的 HP 资源监视器服务中的 registrar 组件存在本地任意文件读写漏洞。本地攻击者可将原始的 registrar.log 日志文件重命名，并创建指向任意目标文件的符号链接，随后 registrar 会将日志信息追加写入该目标文件并将其权限设置为全局可读，从而实现对系统任意文件的读取与修改。该漏洞影响 HP-UX 10.20 操作系统，CVSS 评分 3.6，危害等级低。"
published = "2001-01-09T05:00:00.000"
remediation = "立即停止并禁用 registrar 服务（/sbin/init.d/registrar stop；chkconfig registrar off），或升级到 HP-UX 11.0 及以上版本，该漏洞已在后续版本中修复。如无法升级，移除 registrar 的可执行权限并限制本地登录用户仅为受信任的管理员账户。"
score = 3.6
severity = "LOW"
sources = ["exploitdb"]
title = "HP HP-UX registrar 本地任意文件读取漏洞"
updated = "2026-06-16T21:53:12.403"

