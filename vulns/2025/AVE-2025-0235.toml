[basic]
description = "南北软件 ERP 系统的 ListDir.jsp 页面存在目录遍历漏洞，未经身份认证的远程攻击者可通过构造特制的路径参数绕过权限限制，遍历服务器任意目录并读取敏感文件（如配置文件、数据库凭证等），导致敏感信息泄露。该漏洞影响南北软件 ERP 多版本，攻击复杂度低，无需用户交互，危害较大。"
published = "0705"
remediation = '建议立即升级至南北软件 ERP V6.0.2.0205 及以上版本（已修复该目录遍历漏洞），或联系厂商获取针对 ListDir.jsp 的安全补丁包。临时缓解措施：在 Web 应用防火墙（WAF）配置拦截含 "../"、"..\\" 等目录遍历特征的请求路径；在 IIS/Apache/Nginx 层面限制 /erp/ListDir.jsp 仅允许内网 IP 访问；删除或重命名 ListDir.jsp 文件（若业务不依赖该功能）。'
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "南北软件 ERP 目录遍历漏洞"
updated = "0705"

