[basic]
description = "CVE-1999-1108 是 CVE-1999-1107 的重复编号，实际对应 KDE 中 kppp 组件的缓冲区溢出漏洞。本地攻击者可通过设置超长 PATH 环境变量触发缓冲区溢出，导致权限提升至 root 级别。该漏洞影响早期 KDE 桌面环境中的 kppp 拨号程序，攻击者需拥有本地系统访问权限方可利用，CVSS v2 评分 7.2，危害等级高。"
published = "1998-11-18T05:00:00.000"
remediation = "该编号已被拒绝，实际对应 CVE-1999-1107（Linux 内核 sys_cookie 函数缓冲区溢出漏洞）。建议升级至 Linux 内核 2.2.13 及以上版本，或应用当时发布的对应发行版安全补丁。如无法升级，可在内核参数中禁用 COOKIE 相关功能作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "REJECTED - 此 CVE 条目已被拒绝，是 CVE-1999-1107 的重复项，所有描述和引用已被移除"
