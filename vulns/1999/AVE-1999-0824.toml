[basic]
description = "GoodTech Telnet Server NT 2.2.1 版本存在缓冲区溢出漏洞，远程未授权攻击者可通过 Telnet 服务发送超长的登录用户名触发缓冲区溢出，导致服务进程崩溃造成拒绝服务攻击。该漏洞影响 GoodTech Telnet Server NT 2.2.1 版本，攻击者无需身份认证即可远程发起攻击，CVSS 评分 5.0（中等危害），攻击向量为网络远程攻击，攻击复杂度低，无需用户交互即可导致服务拒绝。"
published = "1999-12-06T05:00:00.000"
remediation = "建议立即升级到 GoodTech Telnet Server 2.3 或更高版本以修复该缓冲区溢出漏洞；如无法及时升级，可在边界防火墙或路由器上过滤 TCP 23 端口的入站连接，仅允许受信任 IP 访问 Telnet 服务，并配置会话登录名长度限制以缓解远程拒绝服务风险。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "GoodTech Telnet Server NT 登录名缓冲区溢出拒绝服务漏洞"
updated = "2026-06-16T21:49:28.577"

