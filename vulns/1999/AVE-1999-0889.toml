[basic]
description = "Microsoft IIS 3.0 及 4.0 版本（x86 和 Alpha 平台）在处理畸形的 HTTP GET 请求时存在缺陷，远程未经认证的攻击者可向目标 Web 服务器发送特制的 GET 请求，导致 IIS 服务进程挂起，造成拒绝服务。该漏洞无需身份认证即可远程触发，影响运行 IIS 3.0/4.0 的 Windows NT 系统，CVSS 评分 5.0，危害等级中危。官方建议升级至更高版 IIS 版本或部署安全补丁。"
published = "1999-12-31T05:00:00.000"
remediation = "安装 Microsoft Security Bulletin MS98-019 提供的对应平台热修补丁（IIS 3.0/4.0 for x86/Alpha），或升级到 Windows NT 4.0 Service Pack 更高版本。由于 IIS 3.0 和 4.0 均已停止技术支持多年，强烈建议迁移至现代受支持的操作系统及 IIS 版本（如 Windows Server 2022 + IIS 10），从根本上消除此漏洞风险。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Microsoft IIS HTTP GET 拒绝服务漏洞"
updated = "2026-06-16T21:49:34.207"

