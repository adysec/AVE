[basic]
description = "IIS 和 Site Server 中的 showcode.asp 示例文件存在任意文件读取漏洞，未经身份认证的远程攻击者可通过构造特制请求访问该文件，进而读取目标服务器上的任意文件内容。该漏洞影响 Microsoft IIS 4.0 和 Site Server 3.0 版本，攻击者无需任何凭证即可利用此漏洞窃取敏感信息。showcode.asp 作为 IIS 和 Site Server 自带的演示脚本，未对文件路径进行充分限制，允许攻击者通过参数指定服务器上的任意文件路径进行读取，导致信息泄露风险。"
published = "1999-05-07T04:00:00.000"
remediation = "建议安装 Microsoft 安全公告 MS99-013 发布的补丁以修复该漏洞。受影响版本为 IIS 4.0 和 Site Server 3.0，应下载并安装对应的安全更新。如无法立即安装补丁，可删除或禁用服务器上的 showcode.asp、viewcode.asp、code.asp、codebrws.asp 等示例文件查看工具，因为这些文件仅用于演示目的，不应在生产服务器上运行。同时通过 NTFS 权限配置限制对这些文件的访问，或在 IIS 中移除相关虚拟目录映射，以阻止远程用户通过 Web 请求读取服务器上的敏感文件。此外，在防火墙层面限制对 Web 服务器端口的外部访问，并确保 Web 根目录之外的敏感文件系统文件不具有 Web 用户读取权限，作为额外缓解措施。"
score = 5
severity = "MEDIUM"
