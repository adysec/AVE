[basic]
description = "FreeBSD 操作系统实现的 T/TCP（TCP 扩展事务协议，RFC 1644）在处理事务连接时存在设计缺陷，攻击者可通过伪造源 IP 地址和 TCP 序列号构造欺骗性数据包，从而绕过正常的三次握手与连接认证机制，冒充可信主机发起事务请求。该漏洞影响启用了 T/TCP 扩展的 FreeBSD 系统，攻击条件为攻击者需能够向目标主机发送网络数据包且无需通过完整身份认证，利用方式即构造特制 T/TCP 数据包实施地址欺骗，可能导致未授权访问或会话劫持等安全风险。"
published = "1998-05-01T04:00:00.000"
remediation = "升级 FreeBSD 系统到已修复该问题的版本（建议更新至 1999 年 11 月发布的 FreeBSD 3.3-STABLE 或 4.0 及以上版本，应用相关安全补丁）。如无法立即升级，可在内核中禁用 T/TCP 扩展（通过 sysctl 设置 net.inet.tcp.rfc1644=0 关闭 RFC 1644）或在前端防火墙/路由设备上过滤伪造源地址的 T/TCP 连接，作为临时缓解措施。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
