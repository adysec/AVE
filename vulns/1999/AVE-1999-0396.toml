[basic]
description = "Solaris 2.5.1 系统中的 automountd 自动挂载守护进程存在命令注入漏洞，本地或远程攻击者可通过在特制参数中嵌入 shell 元字符触发该漏洞，以 root 权限执行任意命令，实现权限提升。该漏洞影响 Solaris 2.5.1 及更早版本，CVSS 评分 10.0，危害等级严重。目前已存在公开的本地权限提升利用代码。"
published = "1997-11-26T05:00:00.000"
remediation = "升级 Solaris 系统至 2.6 及以上版本，或安装 Sun 官方安全补丁 105403-05（SPARC）/105404-05（x86）。临时缓解措施：在 /etc/init.d/autofs 中禁用 automount 服务（chkconfig autofs off），或限制本地用户执行 mount 操作的权限。配置 /etc/auto_master 避免使用含通配符的自动挂载映射项。"
score = 10
severity = "CRITICAL"
sources = ["redhat"]
title = "Sun Solaris automountd 本地权限提升漏洞"
updated = "2026-06-16T21:47:55.103"

