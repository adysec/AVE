[basic]
description = "泛微E-cology9系统存在SQL注入漏洞，攻击者可在URL参数中构造包含恶意SQL语句的Payload，通过URL二次编码方式绕过系统内置的安全过滤机制，成功注入后可直接查询或篡改后端数据库内容，导致敏感数据泄露。该漏洞源于对用户输入参数的过滤不严，未经认证的远程攻击者无需登录即可利用，对企业数据安全构成直接威胁。"
published = "2025-07-01"
remediation = "联系泛微官方获取针对该SQL注入漏洞的安全补丁，升级E-cology9至最新稳定版本。临时缓解措施：在WAF或反向代理层配置规则，对包含可疑SQL关键字及多次URL编码特征的请求进行拦截，同时对所有用户输入参数实施严格的白名单过滤与参数化查询绑定。"
score = 5.0
severity = "MEDIUM"
sources = ["hwpoc"]
title = "泛微E-cology9 SQL注入漏洞（URL二次编码绕过）"
updated = "2025-07-01"

