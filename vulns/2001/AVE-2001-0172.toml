[basic]
description = "Solaris 8 及之前版本的 FTP 服务器存在内核转储漏洞。本地或远程攻击者可通过发送包含有效用户名及错误密码的认证请求，随后执行 CWD ~ 命令触发 FTP 服务产生内核转储文件（core dump），该文件默认存储于根目录且权限可能为世界可读。攻击者可借此获取其中包含的 shadow 密码等敏感信息，或填满磁盘分区造成拒绝服务。该漏洞无需身份认证即可远程触发，影响 Solaris 2.6/7/8 等版本。"
published = "2001-07-02T04:00:00.000"
remediation = "建议立即安装 Sun 安全补丁 110646-01 (Solaris 8) 或 108809-01 (Solaris 2.6)，可通过 sunsolve.sun.com 获取。如无法打补丁，可在 /etc/ftpd/ftpaccess 中限制匿名用户权限，或在 inetd.conf 中注释 ftp 行并重启 inetd 以禁用 FTP 服务作为临时缓解。"
score = 6.4
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Sun Solaris FTP 服务器敏感信息泄露漏洞"
updated = "2026-06-16T21:54:16.683"

