[basic]
description = "XFree86 X11R6 3.3.5/3.3.6/4.0 版本的 Xserver 在处理 TCP 数据包时存在拒绝服务漏洞。远程攻击者可通过向目标系统的 6000 端口发送特制的畸形 TCP 数据包，其中包含负数的计数器值，导致 Xserver 处理异常而崩溃，造成拒绝服务。该漏洞影响 XFree86 3.3.x 及 4.0 系列版本，CVSS 评分 5.0，危害等级中危。目前已有公开的 PoC 利用代码，攻击者无需身份认证即可远程触发。"
published = "2000-05-18T04:00:00.000"
remediation = "升级 XFree86 至 4.0.1 或更高版本（该版本已修复负数计数器处理缺陷），或迁移至 X.Org 作为替代方案。如无法升级，在防火墙层面限制 TCP 6000 端口的入站连接，仅允许可信来源 IP 访问；同时避免使用 `xhost +` 开放 X 服务到网络，建议通过 SSH X11 转发替代直接 TCP 连接。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "XFree86 X11R6 Xserver TCP数据包拒绝服务漏洞"
updated = "2026-06-16T21:51:46.020"

