[basic]
description = "stunnel 4.0.3 及更早版本存在 SIGCHLD 信号处理程序竞态条件漏洞，当子进程退出时信号处理函数与主进程之间产生不一致状态，导致程序崩溃。攻击者需要本地系统访问权限且利用条件较为复杂，成功利用可造成拒绝服务。该漏洞影响 stunnel 4.0.3 及之前所有版本，CVSS 评分 1.2，危害等级低。厂商已在后续版本中修复此问题。"
published = "2003-05-12T04:00:00.000"
remediation = "升级 stunnel 至 4.04 或更高版本。Red Hat 用户可通过 `up2date` 命令自动更新，或下载 RHSA-2003:223 提供的 RPM 包执行 `rpm -Fvh *.rpm` 升级。升级后需重启以守护进程模式运行的 stunnel 实例，并重新建立所有活跃连接。如无法升级，可改用 xinetd 模式调用 stunnel 而非 daemon 模式，以规避信号处理竞争条件。"
score = 1.2
severity = "LOW"
sources = ["osv"]
title = "stunnel stunnel SIGCHLD 信号处理程序竞争条件拒绝服务漏洞"
updated = "2026-06-16T21:59:33.623"

