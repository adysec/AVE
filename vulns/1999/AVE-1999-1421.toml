[basic]
description = "cddbd（CD 数据库服务器）存在缓冲区溢出漏洞，远程攻击者可向 cddbd 服务发送超长的日志消息，触发缓冲区溢出，进而导致任意代码执行。该漏洞影响早期 Unix/Linux 系统中运行的 cddbd 服务，攻击者无需身份认证即可远程利用，危害严重。"
published = "1996-11-26T05:00:00.000"
remediation = "建议立即停止使用已停止维护的 cddbd 服务，迁移至 librecddb 或 MusicBrainz 等持续更新的替代方案；如无法替换，在 iptables 中限制仅受信任 IP 访问 cddbd 8889 端口，并以低权限专用用户运行于 chroot 环境中，同时通过 TCP wrappers（hosts.allow/hosts.deny）增加访问控制层。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "CDDB cddbd 缓冲区溢出远程代码执行漏洞"
updated = "2026-06-16T21:50:01.027"

