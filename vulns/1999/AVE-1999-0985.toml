[basic]
description = "BisonWare FTP Server 4.1 及更早版本存在拒绝服务漏洞。远程攻击者可通过向目标 FTP 服务的 PORT 命令发送包含非数字字符及大量回车符的畸形数据包，导致 FTP 服务进程崩溃或停止响应，造成拒绝服务。攻击无需身份认证，仅需网络可达即可触发，利用难度较低。"
published = "1999-05-17T04:00:00.000"
remediation = "BisonWare FTP Server 已停止维护且厂商已倒闭，建议迁移至活跃维护的 FTP 服务器软件如 vsftpd 或 ProFTPD。迁移前作为临时缓解措施，可在网络边界防火墙或 IPS 设备上添加规则，过滤包含大量回车符的畸形 FTP PORT 命令，并限制允许连接 FTP 服务的源 IP 范围。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "BisonWare FTP Server PORT命令拒绝服务漏洞"
updated = "2026-06-16T21:49:50.407"

