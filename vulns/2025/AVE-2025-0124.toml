[basic]
description = "久其财务报表系统存在远程命令执行漏洞，攻击者可通过向系统特定接口发送精心构造的恶意请求，绕过安全验证机制直接执行任意系统命令。该漏洞源于系统对用户输入参数过滤不严，导致攻击者可利用该缺陷获取服务器控制权，进而实施数据窃取、勒索软件植入等后续攻击。久其财务报表系统广泛应用于国内政府机关及国有企业，影响范围较大。攻击者无需身份认证即可远程触发，危害严重。"
published = "0721"
remediation = "立即联系久其官方获取最新安全补丁，升级至修复此漏洞的最新版本。临时缓解措施：在 Web 服务器（Nginx/Apache）层面配置访问控制，限制 `/netrep/` 路径仅允许可信 IP 访问；禁用服务器上不必要的 JSP 编译及系统命令执行函数（如 Runtime.exec、ProcessBuilder）；部署 WAF 拦截命令执行特征 payload。"
