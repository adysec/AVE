[info]
author = "ave"
description = "检测目标服务器是否托管了利用 ActiveX OBJECT 标签引用 Microsoft Access 数据库文件（.mdb）的恶意 HTML 页面，该漏洞影响 IE 5.x 浏览器，可导致远程攻击者以当前用户权限执行任意命令"
id = "POC-AVE-2000-1308"
name = "CVE-2000-0596 PoC"
severity = "high"
tags = ["ave-2000-1308"]
vuln_id = [
    "CVE-2000-0596",
    "AVE-2000-1308",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "<OBJECT",
    ".mdb",
    "classid",
]
