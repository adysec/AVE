[basic]
description = "Cisco VPN 3000 Concentrator 4.1.7.F 之前版本存在信息泄露漏洞。远程攻击者可通过向目标设备发送特制的 IKE Aggressive Mode 数据包，在 ID 字段中携带组名称进行探测。若组名有效则设备返回响应，无效则不返回，攻击者据此可枚举有效组名称。该漏洞为后续暴力破解攻击提供了信息基础，影响 Cisco VPN 3000 系列集中器设备，CVSS 评分 5.0，危害等级中危。"
published = "2005-06-20T04:00:00.000"
remediation = "升级 Cisco VPN 3000 Concentrator 至 4.1.7.F 或更高版本。如无法立即升级，可在 VPN 集中器上禁用 IKE Aggressive Mode 协商，或配置 ACL 限制对 UDP 端口 500 的未授权访问，同时启用日志审计以检测组名枚举尝试。"
score = 5
severity = "MEDIUM"
sources = ["tenable"]
title = "Cisco VPN 3000 Concentrator 组名称枚举漏洞"
updated = "2026-06-16T22:14:06.010"

