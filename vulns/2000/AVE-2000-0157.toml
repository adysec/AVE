[basic]
description = "HP OpenView OmniBack II 2.55/3.0/3.1 在处理大量并发连接时存在缺陷，远程攻击者可通过向目标系统的 5555 端口发送大量连接请求，导致服务资源耗尽，从而引发拒绝服务。该漏洞影响 OmniBack II 2.55、3.0 及 3.1 版本，攻击者无需身份认证即可远程利用，CVSS 评分 5.0，危害等级中等。"
published = "2000-02-28T05:00:00.000"
remediation = "HP 已发布安全公告 HPSBUX0006-115 修复此漏洞，建议升级 HP OpenView OmniBack II 至包含补丁的版本。由于该产品已停止支持，建议迁移至受支持的 HP Data Protector 最新版本。如无法立即升级，可在防火墙层面限制仅允许可信源 IP 访问 TCP 5555 端口，防止外部攻击者利用大量连接耗尽服务资源。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "HP OpenView OmniBack II 拒绝服务漏洞"
updated = "2026-06-16T21:51:09.917"

