[basic]
description = "L-Soft LISTSERV 1.8 的 Web Archives 组件存在缓冲区溢出漏洞，远程攻击者可通过向该组件发送特制请求触发溢出，从而在目标服务器上执行任意命令。该漏洞无需身份认证即可利用，攻击门槛较低。受影响的版本为 L-Soft LISTSERV 1.8，CVSS 评分 10.0，危害等级严重。建议用户升级至安全版本或禁用 Web Archives 组件以规避风险。"
published = "2000-05-03T04:00:00.000"
remediation = "立即将 L-Soft LISTSERV 升级至 1.8d 或更高版本（官方公告 Advisory0 对应的修复版本）。当前最新稳定版为 17.5，建议直接升级至最新版。如无法立即升级，可在 Web 服务器（如 IIS/Apache）层面限制对 Web Archives 组件的访问，仅允许可信 IP 范围访问，或在防火墙层面封禁对 LISTSERV Web 端口（默认 80/443）的外部访问作为临时缓解措施。"
score = 10
severity = "CRITICAL"
sources = ["exploitdb"]
title = "L-Soft LISTSERV 1.8 Web Archives 缓冲区溢出漏洞"
updated = "2026-06-16T21:51:42.320"

