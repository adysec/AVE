[basic]
description = 'MODx Revolution 2.0.2-pl 及更早版本的 manager/controllers/default/resource/tvs.php 文件存在路径遍历漏洞。当服务器 magic_quotes_gpc 配置被禁用时，程序未对 class_key 参数进行充分的过滤和校验，未经身份认证的远程攻击者可通过在该参数中注入 ".."（点点）序列绕过目录限制，从而读取服务器上的任意文件（如配置文件、源代码等），造成敏感信息泄露。该漏洞利用条件较为简单，攻击者只需构造包含目录遍历序列的恶意 HTTP 请求即可触发，CVSS 评分 4.3，危害等级中等。'
published = "2012-10-07T20:55:00.907"
remediation = "建议立即升级 MODx Revolution 至 2.0.3 及以上版本，官方已在 2.0.3 版本修复该路径遍历漏洞。若暂时无法升级，可通过以下方式缓解：1) 在 php.ini 中开启 magic_quotes_gpc = On（PHP 5.4+ 已废弃）；2) 在 Web 服务器层面限制对 /manager/controllers/default/resource/tvs.php 的访问权限，仅允许受信 IP 访问后台管理目录；3) 部署 WAF 规则拦截包含 ../ 路径遍历载荷的 class_key 参数请求。"
score = 4.3
severity = "MEDIUM"
sources = ["nuclei"]
