[basic]
description = "Dansie Shopping Cart 3.0.4 版本的购物车应用程序 cart.pl 存在信息泄露漏洞。其原理是程序对用户输入的表单变量缺少安全过滤与访问控制，远程攻击者无需身份认证，即可通过构造包含 env、db 或 vars 等特殊表单变量的恶意 URL 直接请求 cart.pl，从而读取购物车数据库文件及系统配置信息（如环境变量、数据库路径、内部变量等）。该漏洞影响运行 Dansie Shopping Cart 3.0.4 的 Web 服务器，攻击条件仅需目标网站开放该应用且可被远程访问，攻击者利用浏览器或脚本发送特制请求即可获取敏感数据，可能导致用户订单信息泄露及后续进一步攻击。"
published = "2000-04-14T04:00:00.000"
remediation = "建议立即升级至 Dansie Shopping Cart 3.1.0 或更高版本，该版本已修复 cart.pl 信息泄露漏洞。若无法升级，请在 Web 服务器层面配置访问控制，禁止直接访问 cart.pl?action=env/db/vars 等敏感参数，同时在防火墙限制管理后台 IP 访问，并定期审计购物车数据库权限防止配置文件泄露。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Dansie 购物车 信息泄露漏洞"
updated = "2026-06-16T21:51:19.827"

