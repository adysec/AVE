[basic]
description = "FLEXlm 许可管理器 6.0d 及可能其他版本的默认配置存在安全漏洞，远程攻击者无需认证即可通过发送 lmdown 命令关闭许可服务器，导致服务中断。该漏洞影响使用 FLEXlm 许可管理器的各类软件系统，攻击者只需网络可达目标服务器即可利用，无需特殊权限，危害等级中等。"
published = "1998-09-25T04:00:00.000"
remediation = "限制对 FLEXlm 端口 (默认 27000-27009) 的网络访问，仅允许受信 IP 连接；升级到支持认证的 FlexNet Publisher 11.9 以上版本，为 lmdown 等管理命令启用密码保护；在 lmhosts 文件中配置访问控制列表，阻止未授权远程关闭。如无法升级，在防火墙上阻断外部对 FLEXlm 端口的访问。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Flexera FLEXlm 许可管理器远程拒绝服务漏洞"
updated = "2026-06-16T21:49:36.637"

