[basic]
description = "Linux 内核 RDMA/siw 子组件中存在释放后使用（Use-After-Free）漏洞，由于 siw 设备直接管理指向 net_device 的指针而非依赖关联 ib_device 的网络设备生命周期管理，在 siw_query_port() 调用期间已释放的 net_device 被访问，触发 KASAN 检测到 slab 内存释放后使用异常。本地低权限攻击者可利用此漏洞造成系统崩溃或提升权限，CVSS 评分 7.8，危害等级高。"
published = "2025-01-15T13:15:12.403"
remediation = '建议立即将 Linux 内核升级至 6.12.9 或 6.13 及以上版本，该漏洞已在提交 16b87037b488 和 4eafeb4f021c 中修复。对于无法立即升级内核的系统，可通过限制本地用户对 RDMA/siw 模块的访问权限作为临时缓解措施，例如使用 `modprobe.blacklist=siw` 内核参数禁用 siw 模块，或通过 `echo "blacklist siw" > /etc/modprobe.d/siw-blacklist.conf` 阻止模块加载。'
score = 7.8
severity = "HIGH"
sources = ["msrc"]
title = "Linux Kernel RDMA/siw 释放后使用漏洞"
updated = "2026-06-17T08:14:06.840"

