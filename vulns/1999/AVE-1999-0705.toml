[basic]
description = "SuSE Linux 6.2 操作系统中的 sscw 程序在读取 HOME 环境变量时存在缓冲区溢出漏洞。本地低权限用户可通过构造超长的 HOME 环境变量值触发栈溢出，覆盖函数返回地址并执行任意代码，从而将权限提升至 root。该漏洞无需远程网络访问，攻击者只需在本地登录并控制程序运行环境即可完成利用，利用门槛较低。受影响版本为 SuSE Linux 6.2，CVSS 评分 7.2，危害等级高。成功利用后攻击者可完全控制系统，建议用户升级至修复版本以消除风险。"
published = "1999-09-23T04:00:00.000"
remediation = "升级 SuSE Linux 6.2 至官方发布的 sscw 修复版本（sccw 补丁包），或通过 YaST 在线更新安装对应安全更新。临时缓解措施：执行 chmod u-s /usr/bin/sscw 移除其 setuid root 权限，避免本地用户通过超长 HOME 环境变量触发缓冲区溢出提权至 root。"
score = 7.2
severity = "HIGH"
sources = ["exploitdb"]
title = "SUSE Linux 6.2 sscw 缓冲区溢出漏洞"
updated = "2026-06-16T21:49:18.170"

