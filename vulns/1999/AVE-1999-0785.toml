[basic]
description = "SCO UnixWare 特权进程系统存在调试器滥用漏洞，本地攻击者可在特权进程执行前，使用 gdb 等调试工具向 _init 函数插入陷阱指令，从而劫持进程执行流获取 root 权限。该漏洞影响 SCO UnixWare 7.0/7.0.1/7.1/7.1.1 版本，CVSS 评分 7.2，危害等级高。攻击者需拥有本地系统访问权限，无需其他认证条件即可实施利用。"
published = "2000-04-11T04:00:00.000"
remediation = "建议升级至 SCO UnixWare 7.1.1 并安装官方发布的安全补丁 ptf7051（或后续累积补丁），修复特权进程加载机制。作为临时缓解措施，可移除相关特权程序的 setuid/setgid 权限位，限制本地用户对调试器（如 gdb/ptrace）的使用权限，并加强本地账户访问控制，防止未授权用户在特权进程执行前注入调试断点。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
