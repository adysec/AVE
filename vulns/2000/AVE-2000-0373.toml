[basic]
description = "Intel Express 8100 ISDN 路由器存在 ICMP 数据包处理漏洞，该设备在接收到超大或分片的 ICMP 数据包时未能正确处理，导致系统崩溃或无响应。未经身份认证的远程攻击者可向目标路由器发送特制的超大 ICMP Echo 请求（ping）或分片 ICMP 数据包，触发设备异常并造成拒绝服务，使路由器停止转发网络流量，影响所有通过该设备的网络通信。该漏洞影响所有运行原始固件的 Intel Express 8100 ISDN 路由器，由于攻击只需网络可达且无需任何认证，威胁程度较高。目前厂商已停止对该设备的支持，建议升级至不受影响的替代产品。"
published = "2000-05-19T04:00:00.000"
remediation = "该漏洞影响已停产的 Intel Express 8100 ISDN 路由器硬件设备，Intel 未发布固件补丁。建议采取以下措施：1）在上游防火墙或路由器上配置访问控制列表（ACL）过滤所有入站 ICMP 流量，阻止超大分片和分片 ICMP 包到达该设备；2）将该设备替换为支持 ICMP 分片防护的现代路由器或防火墙（如 Cisco ISR 系列或 Palo Alto 防火墙），并在新设备上启用 ICMP 分片检测与丢弃策略；3）如短期无法替换设备，使用网络入侵检测系统（IDS/IPS）部署针对分片 ICMP DoS 攻击的检测规则，并限制仅授权管理 IP 可访问该路由器的管理接口。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Intel Express 8100 ISDN路由器ICMP数据包拒绝服务漏洞"
updated = "2026-06-16T21:51:45.740"

