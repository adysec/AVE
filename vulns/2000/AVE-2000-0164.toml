[basic]
description = "Linux ext2fs 备份套件中的 dump 实用程序存在缓冲区溢出漏洞，本地攻击者可通过向 dump 命令传递超长命令行参数触发缓冲区溢出，导致权限提升。该漏洞影响使用 ext2fs 文件系统的 Linux 发行版（如 Mandrake Linux），攻击者需拥有本地系统访问权限，成功利用后可获取目标系统的 root 权限。建议用户升级至包含修复补丁的版本。CVSS 评分 7.2，危害等级高。"
published = "2000-02-28T05:00:00.000"
remediation = "立即升级 Linux dump 软件包至修复版本（如 Red Hat 6.2 用户安装 RHSA-2000:100 提供的更新），或从受影响系统移除 dump 的 setuid 权限位（chmod u-s /sbin/dump）作为临时缓解措施，限制本地非授权用户利用缓冲区溢出提升权限。"
score = 7.2
severity = "HIGH"
sources = ["cve"]
title = "Linux ext2fs 备份套件 dump 工具缓冲区溢出权限提升漏洞"
updated = "2026-06-16T21:51:10.780"

