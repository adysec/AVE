[basic]
description = "Microsoft Systems Management Server 2.0 的远程控制程序在安装时使用了不安全的默认权限设置，导致本地攻击者可以修改或替换该程序文件，从而以系统权限执行任意代码。该漏洞影响 SMS 2.0 版本，攻击者需要拥有本地访问权限，无需身份认证即可利用，CVSS 评分 7.2，危害等级高。建议管理员手动修复文件权限或升级至更高版本。"
published = "1999-12-29T05:00:00.000"
remediation = "立即安装 Microsoft Systems Management Server 2.0 最新 Service Pack（参见 KB288239），修复远程代理目录权限为 Everyone Full Control 的问题。如无法立即更新，可卸载或禁用 SMS 远程控制功能作为临时缓解措施。"
score = 7.2
severity = "HIGH"
sources = ["exploitdb"]
title = "Microsoft Systems Management Server 2.0 默认权限本地权限提升漏洞"
updated = "2026-06-16T21:51:00.050"

