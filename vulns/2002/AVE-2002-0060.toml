[basic]
description = "Window Maker（wmaker）0.80.0 及更早版本中存在缓冲区溢出漏洞。当程序处理特制图像文件时，未能正确使用图像的宽度和高度信息来分配缓冲区，导致栈缓冲区溢出。远程攻击者可通过诱导用户打开恶意图像文件触发该漏洞，从而在目标系统上执行任意代码。该漏洞影响使用 Window Maker 窗口管理器的 Linux/Unix 系统，CVSS 评分 7.5，危害等级高。"
published = "2002-11-12T05:00:00.000"
remediation = "升级 Window Maker 至 0.80.1 或更高版本。Debian 系统请更新至 wmaker 0.80.0-4.1（DSA-190），Red Hat 系统请安装 RHSA-2003-009 提供的更新包，Mandrake 系统请应用 MDKSA-2002:085 补丁。如无法立即升级，避免使用 Window Maker 打开来自不可信来源的图片文件，或临时切换至其他窗口管理器。"
score = 7.5
severity = "HIGH"
sources = ["osv"]
title = "Window Maker 图像文件处理缓冲区溢出远程代码执行漏洞"
updated = "2026-06-16T21:59:02.697"

