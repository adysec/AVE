[info]
author = "ave"
description = "验证 SCO UnixWare 7.1 的 pkgcat 命令是否因 dacread 权限缺陷导致本地普通用户越权读取任意文件。通过在本地执行 pkgcat 尝试读取 /etc/shadow 等无权访问的文件，若成功输出目标文件内容则说明漏洞存在。该漏洞为本地利用，需已获得目标系统登录权限。"
id = "POC-AVE-1999-0614"
name = "CVE-1999-0828 UnixWare pkg 命令本地任意文件读取 PoC"
severity = "low"
tags = ["ave-1999-0614"]
vuln_id = [
    "CVE-1999-0828",
    "AVE-1999-0614",
]

[poc]
logic = "all"

[[poc.requests]]
path = "/etc/shadow"
protocol = "file"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["root:"]
