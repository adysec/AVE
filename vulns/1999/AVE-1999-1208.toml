[basic]
description = "该漏洞存在于运行 TCP/IP 协议栈的 Microsoft Windows 多宿主主机（配置多个网络接口）中。攻击者通过构造带有宽松源路由选项（LSRR/SSRR）的 IP 数据包，可将数据经由一个网络接口进入并通过另一接口转发至受信任的内部网络，从而绕过边界防火墙或路由器的访问控制策略。攻击条件为：目标主机需连接至少两个网络（如内外网）、且未禁用 IP 源路由，攻击者可借此探测或访问本不应可达的内网资源，造成网络边界隔离被绕过的信息泄露与潜在入侵风险。"
published = "1999-09-20T04:00:00.000"
remediation = "建议安装微软安全公告 MS99-038 提供的对应补丁（Windows 95/98 通过 Windows Update 获取，Windows NT 4.0 升级至 Service Pack 6 及以上）。如暂无法打补丁，应在边界路由器或防火墙上过滤携带 IP 源路由选项（LSRR 类型码 131、SSRR 类型码 137）的入站数据包，并在主机 TCP/IP 属性中禁用「允许 IP 源路由」功能以缓解攻击。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "Microsoft Windows 多宿主系统 IP 源路由绕过安全限制漏洞"
updated = "2026-07-17T00:00:00Z"

