[info]
author = "AVE"
description = "检测目标服务器是否为Microsoft IIS 4.0，该版本存在通过发送大量重复Host头导致内存耗尽拒绝服务的漏洞"
id = "POC-AVE-1999-0667"
name = "Microsoft IIS 4.0 HTTP畸形请求标头洪水拒绝服务漏洞 PoC"
severity = "medium"
tags = [
    "cve-1999-0867",
    "dos",
    "iis",
]
vuln_id = [
    "CVE-1999-0867",
    "AVE-1999-0667",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "header"
type = "word"
words = ["Server: Microsoft-IIS/4.0"]
