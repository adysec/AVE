[basic]
description = "Microsoft Windows内核驱动win32k.sys在处理TrueType字体文件时存在远程代码执行漏洞，攻击者可通过构造恶意TrueType字体文件，诱导用户打开包含该字体的文档或访问嵌入恶意字体的网页，触发内核内存破坏实现远程代码执行。该漏洞影响Windows Server 2003 SP2、Vista SP2、Server 2008 SP2/R2 SP1、Windows 7 SP1、Windows 8/8.1、Server 2012/R2及Windows RT 8.1等版本，CVSS 3.1评分8.8（高危），攻击向量为网络、攻击复杂度低、需用户交互、无需权限。该漏洞于2014年10月已被在野利用（与Duqu 2.0攻击活动相关），Microsoft已于2014年10月补丁日发布补丁修复（MS14-054）。"
published = "2014-10-15T10:55:08.693"
remediation = "建议立即安装微软 2014 年 10 月安全更新 MS14-058 (KB2989935)，受影响系统包括 Windows Server 2003 SP2、Vista SP2、Server 2008 SP2/R2 SP1、Windows 7 SP1、Windows 8/8.1、Server 2012/R2 及 Windows RT/8.1。通过 Windows Update 自动更新或从微软下载中心手动下载对应补丁包安装。无法立即打补丁时，可暂时禁用 Windows 字体缓存服务 (Windows Font Cache Service) 并限制受信任字体来源作为临时缓解措施，建议尽快部署官方补丁彻底修复漏洞。"
score = 8.8
severity = "HIGH"
sources = ["kev"]
title = "Microsoft Windows TrueType字体解析远程代码执行漏洞"
updated = "2026-06-17T00:09:30.150"

