[basic]
description = "Microsoft Windows Server 服务在处理 RPC 请求的路径规范化过程中存在缓冲区溢出漏洞，未经身份认证的远程攻击者可通过向目标系统的 445 端口发送特制 RPC 报文触发该漏洞，导致系统内存破坏从而实现远程代码执行。该漏洞影响 Windows 2000 SP4、XP SP2/SP3、Server 2003 SP1/SP2、Vista、Server 2008 及 7 Pre-Beta 等多个版本，CVSS 评分 9.8，危害等级严重。2008 年 10 月已在野外被 Gimmiv.A 蠕虫大规模利用，微软已通过安全公告 MS08-067 修复此漏洞。"
published = "2008-10-23"
remediation = "立即安装 Microsoft 2008 年 10 月安全更新 MS08-067 (KB958644)，可通过 Windows Update 或 Microsoft Update 自动获取更新。对于无法立即安装补丁的系统，在防火墙层面阻止 TCP 端口 139 和 445 的入站流量，并在不需要 Server 服务的系统上禁用该服务作为临时缓解措施。"
score = 9.8
severity = "CRITICAL"
sources = [
    "kev",
    "cve",
]
title = "Microsoft Windows Server 服务远程代码执行漏洞"
updated = "2024-06-16"

