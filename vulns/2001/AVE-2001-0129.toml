[basic]
description = "DataWizards FtpXQ FTP 服务器 2.0.93 存在目录遍历漏洞，远程攻击者无需认证即可通过向 FTP 服务器的 GET 命令中发送包含 `..`（点点）序列的特制请求，突破目录限制读取服务器上的任意文件。该漏洞影响 FtpXQ 2.0.93 及可能更早的版本，攻击者可利用此漏洞获取系统敏感信息，为进一步攻击提供基础。"
published = "2001-05-03T04:00:00.000"
remediation = "建议立即升级 FtpXQ FTP 服务器至最新版本（如已停止维护，应迁移至 FileZilla Server 或 vsftpd 等活跃维护的 FTP 服务端）。同时，在防火墙或路由器层面限制对 FTP 端口（默认 21）的访问来源 IP，仅允许可信网络段连接，并禁用匿名用户写入权限作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "DataWizards FtpXQ FTP Server 目录遍历漏洞"
updated = "2026-06-16T21:54:02.600"

