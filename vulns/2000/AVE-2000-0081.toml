[basic]
description = 'Microsoft Index Server 2.0 及 Windows 2000 Indexing Service 的 WebHits ISAPI 筛选器存在"畸形命中高亮参数"目录遍历漏洞，远程未授权攻击者可通过构造恶意的 Hit-Highlighting 参数发送 HTTP 请求，绕过路径限制读取服务器任意文件（如系统文件、配置文件、源代码等），导致敏感信息泄露。该漏洞影响运行 Index Server 2.0 或启用 Indexing Service 的 Windows 2000 服务器，CVSS 评分 5.0（中危），攻击无需身份认证，仅需向开放的 Web 端口发送恶意 HTTP 请求即可利用。微软已在 MS00-006 安全公告中发布补丁修复此漏洞，建议升级至最新补丁版本并禁用不必要的 Indexing Service。'
published = "2000-01-26T05:00:00.000"
remediation = "建议立即安装 Windows 2000 Service Pack 2 或更高版本（包含 MS00-006 修复），或安装 Microsoft Index Server 2.0 专用安全补丁（KB269862）。若无法立即打补丁，可在 IIS 中禁用 WebHits ISAPI 筛选器（移除 .idq/.htx/.idq 映射），或在防火墙层面封锁 TCP 80/443 端口对 Index Server 的外部访问，作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "微软索引服务器2.0/索引服务（Windows 2000）目录遍历"
updated = "2026-06-16T21:50:59.673"

