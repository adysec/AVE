[basic]
description = "WebActive HTTP Server 1.00 默认配置将 Web 访问日志文件 active.log 存储在网站文档根目录下，导致远程攻击者可通过直接请求该日志文件路径的方式获取服务器访问记录。该漏洞属于信息泄露类型，攻击者无需认证即可利用日志中可能包含的敏感信息（如管理员 IP、请求路径、Cookie 等）进行进一步攻击。影响范围限于使用 WebActive HTTP Server 1.00 默认配置的 Web 服务器。"
published = "2000-07-12T04:00:00.000"
remediation = "将 WebActive HTTP Server 的日志目录移出文档根目录（DocumentRoot），修改配置文件中的日志路径至 Web 根目录之外的目录（如 /var/log/webactive/），并对日志目录设置严格的访问权限（700），同时通过 .htaccess 或服务器配置禁止直接访问 .log 后缀文件。由于该产品已停止维护，建议迁移至主流受支持的 Web 服务器（如 Apache HTTP Server 或 Nginx）以彻底消除风险。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "WebActive HTTP Server 日志信息泄露漏洞"
updated = "2026-06-16T21:52:10.350"

