[basic]
description = 'Windows NT 系统在配置启用自动登录（AutoAdminLogon）功能后，会在系统重启时自动以管理员或指定用户身份登录，且登录凭据以明文形式存储于注册表 HKEY_LOCAL_MACHINE\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Winlogon 的 DefaultPassword 项中。攻击者在能够物理接触设备或获取注册表读取权限的情况下，可直接提取明文口令并获得系统级访问权限，无需任何认证即可完全控制主机。该配置缺陷使得本地安全边界失效，影响所有启用了自动登录的 Windows NT 工作站与服务器。'
published = "1999-01-01T05:00:00.000"
remediation = '禁用 Windows NT 自动登录：运行 regedit，进入 HKEY_LOCAL_MACHINE\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Winlogon，将 AutoAdminLogon 设为 0，并删除 DefaultPassword、DefaultUserName、DefaultDomainName 中的明文凭据；为管理员账户设置强口令，或通过组策略/域控强制交互式登录。建议升级至 Windows 2000 及后续版本以规避该配置风险。'
score = 7.2
severity = "HIGH"
sources = ["epss"]
title = "Microsoft Windows NT 自动以管理员身份登录后无需认证访问漏洞"
updated = "2026-07-17T00:00:00Z"

