[basic]
description = "这是一个 O'Reilly WebBoard 软件的Pager功能严重输入验证漏洞。当用户发送消息时，系统未能对单引号字符进行正确转义，从而允许攻击者注入JavaScript代码。远程未认证攻击者可通过发送包含恶意脚本的messag实现漏洞利用，导致WebBoard应用崩溃或拒绝服务，影响论坛正常运行。这一漏洞主要影响 O'Reilly WebBoard 4.10 及更早版本，对在线社区造成严重威胁，攻击者可轻易破坏论坛系统的可用性和稳定性。漏洞利用方式是向目标系统发送特制的消息，攻击者无需任何权限即可触发服务可用性问题，进而影响在线社区的用户体验和数据管理可靠性。"
published = "2001-10-18T04:00:00.000"
remediation = "立即升级到 WebBoard 5.x 或更高版本（当前已修复漏洞），或切换到受支持的替代方案如 phpBB、Discourse 等开源论坛系统。如果无法立即升级，可停用 WebBoard服务或通过防火墙过滤包含单引号和JavaScript命令的HTTP请求以临时缓解风险。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "O'Reilly Software WebBoard Pager 4.10.30 拒绝服务漏洞"
updated = "2026-06-16T21:54:52.530"

