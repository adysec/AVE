[basic]
description = "IPSwitch IMail Server 5.0 至 8.1 版本存在密码存储安全缺陷，程序使用弱加密算法将邮件账户密码存储在注册表键值中，本地攻击者可通过获取注册表访问权限来解密并读取敏感凭据。该漏洞允许具有本地系统访问权限的攻击者提取所有邮件账户密码，进而可能导致电子邮件数据泄露或横向移动攻击。利用条件为攻击者需具备本地登录权限。"
published = "1999-12-21T05:00:00.000"
remediation = '立即升级到 Ipswitch IMail 8.1 及以上版本，新版本使用更安全的加密方式存储密码。同时使用 regedit 限制注册表项 `HKEY_LOCAL_MACHINE\SOFTWARE\Ipswitch\IMail` 的访问权限，移除非管理员用户的读取权限。如无法升级，建议迁移至受支持的邮件服务器软件（如 Exchange、Postfix 等），并严格控制服务器的本地登录人员。'
score = 7.2
severity = "HIGH"
sources = ["epss"]
title = "IPSwitch IMail Server 本地密码解密信息泄露漏洞"
updated = "2026-06-16T21:50:34.077"

