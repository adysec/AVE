[basic]
description = "这是一个Huatian Software inforcnter PLM（产品生命周期管理）系统发现的漏洞。该系统的后台文件上传功能在用户上传文件类型和路径时缺乏充分验证，导致攻击者可以上传具有webshell功能的恶意文件。通过攻击者无需身份验证可远程访问的 `/Base/BaseHandler.ashx?type=uploadFileToIIS&uploadPath=../Files/` 文件上传路径，攻击者可以将恶意文件上传到服务器的文件目录中，从而在系统执行文件解析时触发恶意文件并达到执行代码效果，最终实现远程代码执行并完全控制目标服务器。该漏洞主要影响Huatian inforcnter PLM软件用户的核心数据处理功能。攻击者利用不足的输入验证和路径遍历技术，篡改或删除系统中存储的重要企业数据甚至感染恶意病毒，大大扩大了原有漏洞的影响范围和危害程度，引发潜在的安全风险。"
published = "0704"
remediation = "联系华天软件厂商获取 inforcenter PLM 最新安全补丁。在厂商修复前，建议在 IIS 中配置请求过滤规则，禁用 BaseHandler.ashx 的 uploadFileToIIS 操作接口，或对该接口添加身份认证和权限校验；同时限制 Files 上传目录禁止执行脚本（移除 ASP/ASPX 执行权限），并部署 WAF 规则拦截含危险扩展名（.asp/.aspx/.cer/.ashx）的上传请求。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "华天软件 Inforcenter PLM 前台文件上传漏洞"
updated = "0704"

