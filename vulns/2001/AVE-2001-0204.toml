[basic]
description = "Aladdin eSafe Gateway 3.0 及更早版本存在脚本过滤绕过漏洞。远程攻击者可通过将恶意 SCRIPT 代码嵌入特定 HTML 标签属性中（如 BODY 标签的 onload 属性、A 标签的 href 属性、BUTTON 标签、INPUT 标签以及其他支持脚本定义的 HTML 标签），绕过网关的安全过滤机制，在目标用户浏览器中执行任意脚本代码。该漏洞无需身份认证即可远程利用，可能导致敏感信息泄露、会话劫持或进一步攻击。CVSS 评分 7.5，危害等级高。"
published = "2001-08-14T04:00:00.000"
remediation = "升级 Aladdin eSafe Gateway 至 3.0 以上版本（厂商已发布修复版本）。由于该产品已停止维护，建议迁移至受支持的 Web 安全网关产品。如无法立即升级，可在网关上启用更严格的 HTTP 内容过滤规则，对包含 onload、onclick、onerror 等事件处理器的 HTML 标签进行深度检测和拦截，并禁用不必要的 HTML 标签白名单外的所有标签。"
score = 7.5
severity = "HIGH"
sources = ["exploitdb"]
title = "Aladdin eSafe Gateway 脚本过滤绕过漏洞"
updated = "2026-06-16T21:54:27.347"

