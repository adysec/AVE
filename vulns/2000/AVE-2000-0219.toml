[basic]
description = "vqSoft vqServer 存在敏感信息明文存储漏洞，服务端将用户密码等敏感凭据以明文形式保存在 server.cfg 配置文件中，导致本地攻击者可通过读取该配置文件获取管理员权限。该漏洞影响 vqServer 相关版本，攻击者需具备本地文件读取权限，但无需身份认证即可利用，CVSS 评分 5.0，危害等级中危。"
published = "2000-03-21T05:00:00.000"
remediation = "vqServer 将密码以明文形式存储在 server.cfg 配置文件中，攻击者可读取该文件获取敏感信息进而提升权限。建议立即升级到 vqServer 最新版本（如已停止维护则迁移至其他受支持的 FTP/HTTP 服务软件）；同时严格限制 server.cfg 文件的访问权限，确保仅管理员可读写，并避免将配置文件置于 Web 可访问目录下。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "vqSoft vqServer 敏感信息明文存储漏洞"
updated = "2026-06-16T21:51:18.113"

