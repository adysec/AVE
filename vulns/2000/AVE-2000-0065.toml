[basic]
description = "W3C CERN httpd（原 CERN httpd）HTTP 服务器存在路径泄露漏洞。远程攻击者无需认证即可向目标服务器发送请求一个不存在的 URL，服务器返回的错误信息中会泄露系统命令的真实路径名（如 /usr/local/bin/ 等），从而暴露服务器文件系统结构。该漏洞影响所有版本的 W3C CERN httpd 服务器，CVSS 评分 7.5，危害等级高。攻击者可利用泄露的路径信息进一步探测系统结构，为后续攻击提供情报支撑。目前厂商已停止维护该软件，建议用户迁移至其他受支持的 Web 服务器。"
published = "2000-01-18T05:00:00.000"
remediation = "W3C httpd（原名 CERN httpd）已停止维护，建议立即迁移至 Apache httpd 或 Nginx 等现代 Web 服务器。若暂时无法迁移，可在 httpd 配置中禁用 Directory Listing 并限制 ServerTokens 为 Prod 以最小化信息泄露。同时确保 Web 根目录下不包含非必要文件，避免路径推断攻击。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "W3C CERN httpd 路径泄露漏洞"
updated = "2026-06-16T21:50:57.407"

