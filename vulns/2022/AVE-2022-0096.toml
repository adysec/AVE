[basic]
description = "Linux 内核 arm64 架构的 swapper 页表项中缺少 UXN（非特权执行禁止）位设置，在支持 FEAT_EPAN 内存权限隔离特性的系统上，内核启动时访问 __idmap_kpti_flag 会因 idmap 页表权限检查失败而触发内核崩溃（panic），导致本地拒绝服务。该漏洞影响 Linux 内核 arm64 架构版本，CVSS 评分 5.5，危害等级中等，攻击者需具备本地系统访问权限。修复已在主线内核提交 c3cee924bd85 中合入。"
published = "2025-06-18T11:15:54.083"
remediation = "将 Linux 内核升级至包含 commit c3cee924bd85 的版本（主线 v5.18+，或对应发行版如 Debian 已 backport 的内核包），或在启动参数添加 `kpti=off` 作为临时缓解措施（会降低 KPTI 保护）。无法立即升级时，可手动 backport 设置 swapper PTE 中 UXN 位的补丁后重新编译内核。"
score = 5.5
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux kernel arm64 页表 UXN 权限遗漏漏洞"
updated = "2026-06-17T05:23:01.800"

