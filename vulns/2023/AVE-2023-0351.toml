[basic]
description = "Linux 内核 DRM（Direct Rendering Manager）子系统的 VMA（Virtual Memory Area）管理器中存在内存泄漏漏洞（CWE-401）。drm_vma_node_allow_once() 函数在多次调用 drm_vma_node_allow() 时缺乏引用计数与去重机制，导致内核内存资源无法被正确释放，产生内存泄漏。本地攻击者在具备低权限（需要可访问 DRM 设备的权限）的条件下，通过反复发起涉及 DRM VMA 节点操作的 ioctl 调用，可逐步耗尽系统内核内存，触发可用内存不足，最终导致系统拒绝服务。该漏洞影响 Linux 内核 6.1.9 之前版本及 6.2-rc1 至 rc5 版本，CVSS v3.1 评分 5.5，危害等级中危。该 CVE 编号后续已被 CVE Numbering Authority（kernel.org）拒绝/撤销。"
published = "2025-03-27T17:15:48.927"
remediation = "将 Linux 内核升级至 6.1.9 及以上版本，或 6.2-rc6 及以上版本。如使用发行版内核（如 Ubuntu/Debian/RHEL），安装对应内核安全更新即可修复。该修复通过提交 899d3a3c19ac（主线）和 67444f8ca31c（稳定分支）合入，添加了 drm_vma_node_allow_once() 接口以防止 VMA 节点引用计数泄漏导致的内存耗尽。"
score = 5
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux 内核 DRM VMA Manager 安全漏洞"
updated = "2025-07-15T16:15:24.997"

