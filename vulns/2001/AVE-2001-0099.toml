[basic]
description = "iWeb Hyperseek 2000 的 hsx.cgi 程序存在目录遍历漏洞。远程攻击者无需身份认证，通过在 show 参数中构造包含 `..`（点点）序列的恶意路径，即可越权读取服务器上的任意文件和目录。该漏洞影响 iWeb Hyperseek 2000 版本，CVSS 评分 5.0，危害等级中危。成功利用可导致敏感信息泄露，包括配置文件、系统文件等。"
published = "2001-06-02T04:00:00.000"
remediation = "由于 iWeb Hyperseek 2000 已停止维护且厂商不再提供安全更新，建议立即停止使用该产品并迁移至受支持的 Web 搜索方案。若无法替换，需在 Web 服务器层（如 Apache mod_rewrite 或 Nginx）对 hsx.cgi 的 show 参数实施严格的路径白名单过滤，禁止包含 `../` 或绝对路径的请求，同时以最小权限运行 CGI 进程并禁用非必要文件系统访问。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "iWeb Hyperseek 2000 目录遍历漏洞"
updated = "2026-06-16T21:53:58.177"

