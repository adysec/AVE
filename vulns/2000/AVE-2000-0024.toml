[basic]
description = "Microsoft IIS 4.0 及 Site Server 3.0 存在虚拟目录命名漏洞，当虚拟目录名称包含 .com、.exe、.sh、.cgi 或 .dll 等扩展名时，远程攻击者可通过向目标服务器发送特制请求读取 ASP 等脚本文件的源代码。该漏洞可能导致敏感信息泄露，如数据库连接字符串、业务逻辑等，为进一步攻击提供信息支撑。攻击无需认证，仅需通过网络向受影响服务器发送恶意 HTTP 请求即可触发。"
published = "1999-12-21T05:00:00.000"
remediation = "安装 Microsoft 安全公告 MS99-058 提供的补丁程序，或升级至更高版本的 IIS（如 IIS 5.0 及以上）。同时避免在虚拟目录名称中使用 .com、.exe、.dll 等扩展名，并限制 ASP 等脚本文件的目录权限为只执行。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Microsoft IIS 和 Site Server 虚拟目录命名信息泄露漏洞"
updated = "2026-06-16T21:50:50.833"

