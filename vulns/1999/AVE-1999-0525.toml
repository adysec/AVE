[basic]
description = "Netscape 浏览器存在缓存信息泄露漏洞，远程攻击者可通过在网页中嵌入恶意 JavaScript 代码，利用浏览器同源策略的不足读取目标用户缓存中的敏感数据。由于 Netscape 浏览器（ Communicator 系列）的缓存机制缺乏对 JavaScript 访问的适当限制，攻击者可在用户不知情的情况下，通过构造特定脚本触发缓存查询并获取信息。该漏洞影响 Netscape Communicator 4.x 等版本，攻击条件要求用户在浏览恶意页面时目标缓存中存在相关数据，CVSS 评分 2.6，危害等级低。Netscape 官方已发布安全公告建议用户升级至修复版本。"
published = "2000-04-01T05:00:00.000"
remediation = "升级 Netscape Communicator 至 4.5 或更高版本以修复此漏洞，Netscape 官方已在安全公告中提供补丁。如无法立即升级，可在浏览器安全设置中禁用 JavaScript 作为临时缓解措施，阻止恶意脚本访问缓存数据。建议优先通过 Netscape 官网获取最新安全版本，并清除现有浏览器缓存以防止已缓存的敏感信息被读取。"
score = 2.6
severity = "LOW"
sources = ["epss"]
