[basic]
description = "Discard 服务（RFC 863，TCP/UDP 端口 9）是一种诊断网络服务，收到所有数据后直接丢弃而不做任何处理。该服务在生产环境中启用会无谓增加系统攻击面，攻击者可通过端口扫描发现该服务并确认主机存活，用于网络侦察；在 UDP 模式下，还可被用于反射放大 DDoS 攻击的流量放大链，导致目标网络带宽耗尽。此外，大量向该服务发送数据包可能造成服务器资源消耗。该漏洞无需认证、可远程利用，影响所有启用了 discard 服务的系统，应关闭该服务或通过防火墙限制访问。"
published = "1999-01-01T05:00:00.000"
remediation = '在 Linux/Unix 中编辑 /etc/inetd.conf 注释 discard 相关行（stream 和 dgram）并重启 inetd 服务；systemd 系统执行 systemctl mask discard.socket 停止并屏蔽 discard socket。Windows 系统通过控制面板取消勾选"简单 TCP/IP 服务"或运行 dism /online /disable-feature /featurename:SimpleTCP 卸载。同时建议在防火墙上阻断 TCP 和 UDP 端口 9 的入站流量，并检查禁用 echo（端口 7）、chargen（端口 19）等类似高危服务。'
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "多厂商 Discard 服务安全配置漏洞"
updated = "2026-06-16T21:48:46.037"

