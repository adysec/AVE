[basic]
description = "Solaris 2.4 至 7.0 系统中 set-gid 程序存在核心转储权限检查缺陷，当真实用户 ID 不属于 set-gid 组时，set-gid 程序仍可生成 core dump 文件。本地攻击者可通过触发 set-gid 程序崩溃（例如利用 dmesg 命令）生成 core dump，从而以更高权限覆盖或创建任意文件，实现本地权限提升。CVSS 评分 4.6，危害等级中危。"
published = "1996-08-03T04:00:00.000"
remediation = "安装 Solaris 2.4 kernel jumbo patch -35 或更新版本，限制 set-gid 程序在非特权用户下产生 core dump。可使用 coreadm(1M) 将 core 文件限制为只允许 root 读取，或通过 setuid(2) 在关键 set-gid 程序入口处禁用 core dump 生成。同时限制普通用户对 dmesg 等系统日志工具的访问权限。"
score = 4.6
severity = "MEDIUM"
sources = ["epss"]
title = "Sun Solaris set-gid 程序 Core Dump 本地权限提升漏洞"
updated = "2026-06-16T21:50:23.280"

