[basic]
description = "Joomla! 的 Preventive & Reservation (com_preventive) 组件 1.0.5 版本存在目录遍历漏洞。攻击者可通过向 index.php 文件的 controller 参数传递 ../ 等目录跳转序列，绕过路径限制，读取服务器上的任意敏感文件。该漏洞无需身份认证，远程即可利用，可能导致数据库配置、系统密码等敏感信息泄露。CVSS 评分 6.8，危害等级中危。受影响版本为 Joomla! 配合此组件的部署环境。"
published = "2010-04-19T19:30:00.913"
remediation = "立即卸载或停用 com_preventive 组件 1.0.5 版本，该组件已停止维护且无官方补丁。如业务必需，可在 Joomla! 入口文件或 .htaccess 中对 controller 参数添加正则过滤，阻止包含 `../` 等目录遍历字符的请求。建议迁移至替代的预约管理扩展。同时可在 Web 应用防火墙（WAF）层配置规则拦截路径遍历攻击载荷作为临时缓解。"
score = 6.8
severity = "MEDIUM"
sources = ["nuclei"]
title = "Joomla Preventive And Reservation 组件目录遍历漏洞"
updated = "2026-06-16T23:18:27.947"

