[basic]
description = "Infopulse GateKeeper 3.5 及更早版本存在缓冲区溢出漏洞，远程攻击者可通过向 GateKeeper 服务发送超长字符串触发缓冲区溢出，导致任意命令执行。该漏洞无需身份认证即可远程利用，攻击门槛较低，成功利用后可完全控制受影响系统，危害严重。受影响版本包括 GateKeeper 3.5 及之前的所有版本。"
published = "2000-07-13T04:00:00.000"
remediation = "立即升级 Infopulse GateKeeper 至 3.6 或更高版本（3.5 及更早版本存在缓冲区溢出漏洞）。如厂商已不再提供更新支持，建议迁移至其他受支持的远程访问控制方案。临时缓解措施：在防火墙层面限制对 GateKeeper 服务端口（默认 8123/TCP）的访问，仅允许可信 IP 来源连接。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "Infopulse GateKeeper 远程缓冲区溢出漏洞"
updated = "2026-06-16T21:52:14.593"

