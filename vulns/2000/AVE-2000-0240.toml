[basic]
description = "RealNetworks RealServer 存在输入验证不当漏洞，远程攻击者无需身份认证即可向目标服务器的 7070 端口发送特制的畸形数据，触发服务程序崩溃或资源耗尽，导致拒绝服务。该漏洞影响 RealNetworks RealServer Pro 及更早版本，CVSS 评分 7.8，危害等级高。官方建议升级至受影响版本的最新补丁或限制对 7070 端口的访问以缓解风险。"
published = "2000-04-20T04:00:00.000"
remediation = "建议立即升级至 RealServer 8.0 及以上版本（该版本修复了端口 7070 的畸形输入处理问题）。如无法升级，可在防火墙或主机层面限制对 TCP 7070 端口的访问，仅允许可信 IP 连接；或直接停用 RealServer 服务并迁移至替代流媒体服务器方案。对于已停止维护的旧版本，强烈建议彻底下线或隔离部署。"
score = 7.8
severity = "HIGH"
sources = ["avd"]
title = "RealNetworks RealServer 远程拒绝服务漏洞"
updated = "2026-06-16T21:51:22.260"

