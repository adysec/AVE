[basic]
description = "IBM AIX 4.2.1 及之前版本中的 snap 命令存在不安全的临时文件创建漏洞。snap 命令在执行时会在 /tmp 目录下创建 ibmsupt 目录，且该目录权限设置为全局可读。当以 root 权限执行 snap -a 命令时，系统不会清理或删除该临时目录。本地攻击者可通过在 root 执行 snap -a 之前，在 /tmp/ibmsupt/general/ 目录下预先创建恶意的 passwd 文件，从而劫持系统密码文件，导致敏感信息泄露。该漏洞影响 AIX 4.3.2 之前的所有版本，CVSS 评分 10.0，危害等级严重。"
published = "1999-02-17T05:00:00.000"
remediation = "升级 AIX 系统至 4.3.2 或更高版本，该版本已修复 snap 命令的临时文件竞争条件漏洞。如无法升级，可手动在 /tmp/ibmsupt 目录创建后立即设置 0700 权限，或使用 chmod 命令限制其可读性；同时建议使用专用临时目录并配置 umask 077 作为临时缓解措施。"
score = 10
severity = "CRITICAL"
sources = ["cve"]
title = "IBM AIX snap 不安全的临时文件创建漏洞"
updated = "2026-06-16T21:50:22.220"

