[basic]
description = "SCO UnixWare 7.1.0 操作系统的 Passthru 驱动程序中存在安全漏洞，远程攻击者无需身份认证即可通过网络访问向目标系统发送特制请求，触发驱动程序处理异常导致系统拒绝服务。该漏洞影响 SCO UnixWare 7.1.0 版本，CVSS 评分 5.0，危害等级中危。由于该漏洞年代久远且厂商已停止支持，建议用户迁移至受支持的操作系统版本以避免风险。"
published = "2001-03-12T05:00:00.000"
remediation = "立即应用 SCO 安全公告 SB-99.13a 中提供的 passthru 驱动补丁，升级到修复后的 UnixWare 7.1.0 版本。由于 SCO UnixWare 已停止维护，建议迁移至受支持的 Unix/Linux 系统；若无法迁移，可在网络边界防火墙阻断对 passthru 驱动相关端口的非授权访问作为临时缓解。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "SCO UnixWare 7.1.0 Passthru Driver 拒绝服务漏洞"
updated = "2026-06-16T21:51:31.923"

