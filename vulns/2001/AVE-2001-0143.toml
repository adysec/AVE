[basic]
description = "MSHTML.DLL 是 Internet Explorer 内核中的 HTML 解析器组件，在处理浏览器窗口对象关联的脚本时存在缺陷。远程攻击者可通过诱导用户访问特制网页，利用脚本反复创建和删除与浏览器窗口对象关联的 COM 对象，触发 MSHTML.DLL 解析异常，导致浏览器或 Outlook 应用程序崩溃，造成拒绝服务。该漏洞影响 Internet Explorer 4.0 及更早版本以及 Outlook 2000/5.5，攻击者需诱导用户打开恶意页面或邮件，利用条件较低。"
published = "2001-06-02T04:00:00.000"
remediation = "该漏洞影响已停止支持的 Internet Explorer 4.0 及 Outlook 2000/5.5，微软已不再提供安全更新。建议立即升级到 Internet Explorer 11 及以上版本，并将 Outlook 升级到 Office 2016 或更高版本。如无法升级，可禁用 Internet Explorer 中的 Active Scripting 功能（Internet 选项 → 安全 → 自定义级别 → 禁用脚本），或改用 Microsoft Edge / Chrome 等现代浏览器。对于 Outlook，建议禁用 HTML 邮件预览功能或改用纯文本格式阅读邮件。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Microsoft Internet Explorer / Outlook MSHTML.dll 拒绝服务漏洞"
updated = "2026-06-16T21:54:05.823"

