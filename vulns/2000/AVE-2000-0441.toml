[basic]
description = "Linux gpm 程序在处理 /dev/gpmctl 设备时存在拒绝服务漏洞，本地攻击者可通过向该设备大量发送 STREAM sockets 连接请求，耗尽系统资源导致服务拒绝。该漏洞影响 OpenLinux 2.3/2.4、RedHat 6.0/6.1、SCO eServer 2.3 等 Linux 发行版，CVSS 评分 2.1（AV:L/AC:L/Au:N/C:N/I:N/A:P），属于本地拒绝服务漏洞，攻击者需具备本地访问权限，无需身份认证，攻击复杂度低，仅影响系统可用性。攻击者可通过向 /dev/gpmctl 设备文件大量发送 STREAM socket 连接请求，耗尽系统文件描述符或内存资源，导致 gpm 服务或整个系统无法响应合法请求，造成拒绝服务。"
published = "1999-11-23T05:00:00.000"
remediation = "受影响系统请升级至厂商发布的安全补丁版本：OpenLinux 用户升级至 gpm 1.20.1 或更高版本，RedHat 用户应用 RHSA-2000-045 安全更新，SCO 用户升级至 eServer 维护版本。如无法立即升级，可暂时关闭 gpm 服务（执行 `service gpm stop` 或 `systemctl disable gpm`），并移除 `/dev/gpmctl` 设备文件的写入权限（`chmod 600 /dev/gpmctl`），仅允许 root 用户访问，以缓解本地拒绝服务风险。"
score = 2.1
severity = "LOW"
sources = ["epss"]
title = "Caldera OpenLinux Red Hat Linux SCO eServer gpm 拒绝服务漏洞"
updated = "2026-06-16T21:51:56.170"

