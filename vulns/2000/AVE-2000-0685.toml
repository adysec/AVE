[basic]
description = "Samba Web 管理工具（SWAT）在 Samba 2.0.7 版本中存在登录日志记录缺陷，当用户名正确但密码错误时，系统不会记录该登录尝试日志，这为远程攻击者提供了隐蔽的暴力密码猜测攻击条件。攻击者无需提前认证即可通过自动化工具枚举有效密码，由于登录失败不会触发日志记录，攻击行为难以被管理员及时发现和追溯。该漏洞影响运行 Samba 2.0.7 并启用 SWAT Web 管理服务的系统。"
published = "2000-12-19T05:00:00.000"
remediation = "升级 Samba 至 2.0.8 或更高版本，该版本修复了 SWAT 登录审计缺失问题。如无法立即升级，可在 smb.conf 中设置 hosts allow 限制 SWAT 管理页面仅允许内网可信 IP 访问，或在防火墙层面限制对 901 端口（SWAT 默认端口）的访问，同时在操作系统层面启用 SWAT 访问日志作为补充审计手段。"
score = 7.5
severity = "HIGH"
sources = ["exploitdb"]
title = "Samba SWAT 登录失败日志缺失漏洞"
updated = "2026-06-16T21:52:48.497"

