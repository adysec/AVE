[basic]
description = "ht://Dig 是一款用于网站全文检索的开源搜索引擎。其 CGI 程序 htsearch 在处理请求参数时存在安全缺陷，远程攻击者可在传递给 htsearch 的参数中使用反引号（`）包裹文件名，从而触发任意文件读取。受影响版本包括 ht://Dig 3.1.1 至 3.1.4 以及 3.2.0b1。攻击者无需身份认证，只需向存在漏洞的 htsearch 接口发送特制参数即可读取服务器上的任意文件，可能导致敏感配置、密码等关键信息泄露。该漏洞 CVSS 评分约 5.0，危害等级中等。"
published = "2000-02-29T05:00:00.000"
remediation = "立即将 ht://Dig 升级到 3.1.5 及以后修复版本，或升级到已修补的 3.2 正式版及以上，并替换所有 htsearch CGI。若无法马上升级，从 Web 服务器配置中移除或禁用 htsearch（如删除/重命名 cgi-bin 下的 htsearch 可执行文件），仅允许受信内网访问搜索接口，并在 Web/WAF 层过滤请求参数中的反引号（`）等 shell 元字符作为临时缓解。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "ht://Dig Group ht://Dig htsearch 任意文件读取漏洞"
updated = "2026-06-16T21:51:13.673"

