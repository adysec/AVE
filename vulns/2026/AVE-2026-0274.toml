[basic]
description = "FacturaScripts 是一款开源 ERP/会计系统，其 REST API 的 filter 参数存在 SQL 注入漏洞。漏洞位于 `Where::sqlColumn` 方法中，攻击者可通过在 filter 参数中注入括号绕过过滤，构造恶意 UNION SELECT 语句。即使仅持有受限 API Key（仅 `clientes` 资源的 GET 权限）的认证攻击者，也可通过发送特制请求获取管理员密码的 bcrypt 哈希值等敏感数据，导致权限提升。该漏洞影响 FacturaScripts 主分支版本。"
published = "2026-07-14"
remediation = "立即升级至 FacturaScripts 2026.3 及以上版本（当前最新为 2026.5），该版本已对 REST API 的 filter 和 sort 参数进行模型字段白名单校验，阻止恶意 SQL 注入。如无法立即升级，可在 Web 服务器层面配置 WAF 规则拦截包含 UNION/SELECT 等关键词的 API 请求参数，并限制 ApiKey 的 fullaccess 权限为最小必要范围。"
score = 9.9
severity = "CRITICAL"
sources = [
    "cve",
    "ghsa",
]
title = "FacturaScripts REST API 认证后SQL注入漏洞"
updated = "2026-07-14"

