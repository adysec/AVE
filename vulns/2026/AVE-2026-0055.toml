[basic]
description = "Palo Alto Networks PAN-OS 的 GlobalProtect 门户和网关存在身份验证绕过漏洞（CWE-565），源于对 Cookie 验证与完整性校验的缺失。未经身份认证的远程攻击者可利用特制的认证请求绕过安全限制，建立未经授权的 VPN 连接，从而访问内部网络资源。该漏洞影响 PAN-OS 10.2、11.1、11.2、12.1 等多个分支版本，不涉及 Panorama 和 Cloud NGFW。用户需升级至修复版本或禁用 Authentication Override 功能，CVSS 评分 7.8，危害等级高。"
published = "2026-05-13T19:17:01.040"
remediation = "立即升级 PAN-OS 至修复版本：12.1.4-h6+/12.1.7+、11.2.4-h17+、11.1.4-h33+、10.2.7-h34+。同时禁用 GlobalProtect 的 Authentication Override 功能，并为 Cookie 加密配置独立证书，避免与 HTTPS 服务复用同一证书。"
score = 7.8
severity = "HIGH"
sources = ["hwpoc"]
title = "Palo Alto Networks PAN-OS GlobalProtect 认证绕过漏洞"
updated = "2026-06-17T10:10:37.953"

