[basic]
description = "华易企业管理云平台存在 /home/zy 路径的SQL注入漏洞。攻击者可通过构造恶意SQL语句绕过认证机制，直接访问或操纵数据库中的敏感数据。该漏洞影响华易企业管理云平台的用户数据安全，可能导致企业敏感信息泄露、财务数据篡改和核心业务系统瘫痪。攻击者无需身份验证即可利用此漏洞，在平台认证界面或用户注册接口发送精心构造的SQL注入Payload实现目标，严重威胁平台安全稳定。漏洞修复需对输入参数进行严格验证和过滤，并采用参数化查询技术防止SQL注入攻击。"
published = "0702"
remediation = "升级到华易企业管理云平台已修复 /home/zy 接口的最新版本（向厂商获取并确认采用参数化查询），彻底消除 SQL 注入风险；如无法立即升级，可在 WAF 对该接口添加 SQL 注入拦截规则，并限制 /home/zy 仅允许已认证用户访问，同时关闭不必要的数据库错误回显作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "华易 企业管理云平台 SQL 注入漏洞"
updated = "0702"

