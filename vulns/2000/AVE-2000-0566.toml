[basic]
description = "eEye IRIS 1.01 beta 及 SpyNet CaptureNet 3.0.12 存在远程缓冲区溢出漏洞，远程攻击者可向目标发送大量特制 UDP 数据包触发该漏洞，导致目标服务进程崩溃从而造成拒绝服务。该漏洞影响了 eEye Digital Security 的多个网络监控产品版本，危害等级中危。"
published = "2000-10-20T04:00:00.000"
remediation = "eEye IRIS 和 SpyNet CaptureNet 均已停止维护，官方未发布补丁，建议立即迁移至 Wireshark 等活跃维护的网络分析工具。如短期内无法迁移，应在防火墙配置 UDP 连接速率限制规则，仅允许可信 IP 访问受控主机，以降低利用风险。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "eEye Digital Security IRIS 和 SpyNet CaptureNet 远程缓冲区溢出漏洞"
updated = "2026-06-16T21:52:22.280"

