[basic]
description = "SGI IRIX 和 Solaris 系统中 X11R6.3 的 xterm 终端模拟器及其依赖的 Xaw（Athena Widgets）库存在缓冲区溢出漏洞。本地攻击者可通过向 xterm 的 `-xrm` 参数传递超长字符串触发栈溢出，成功利用可获得 root 权限。该漏洞影响 IRIX 及 Solaris 5.5.1 等系统，需要本地账户访问权限，危害等级高。"
published = "1998-05-03T04:00:00.000"
remediation = "升级 X11R6.3 至包含补丁的版本，Solaris 用户安装 Sun 官方补丁 105576-xx（x86）或 105577-xx（SPARC），SGI IRIX 用户升级至 IRIX 6.5+ 并安装 SGI 安全补丁。临时缓解措施：移除 xterm 的 setuid root 权限（chmod u-s /usr/bin/X11/xterm），限制仅受信用户可执行。"
score = 7.2
severity = "HIGH"
sources = ["epss"]
title = "SGI IRIX xterm Xaw 缓冲区溢出权限提升漏洞"
updated = "2026-06-16T21:47:38.733"

