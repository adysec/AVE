[basic]
description = "Apache HTTP Server 1.3.11 至 1.3.20 版本的 mod_usertrack 模块在生成会话标识符（Session ID）时使用了可预测的信息，包括主机 IP 地址、系统时间和服务器进程 ID。本地攻击者可通过预测或计算这些会话 ID 来劫持其他用户的会话，从而绕过身份认证机制，获取未授权访问权限。该漏洞源于会话 ID 生成算法缺乏足够的随机性，属于设计缺陷。"
published = "2001-12-31T05:00:00.000"
remediation = "升级 Apache 至 1.3.20 以上版本以修复 mod_usertrack 的 Session ID 可预测问题；如无法升级，应避免将 mod_usertrack 生成的 Session ID 用于用户认证，改用 mod_session 等安全模块管理会话。"
score = 2.1
severity = "LOW"
sources = ["osv"]
title = "Apache HTTP Server mod_usertrack 可预测会话ID安全绕过漏洞"
updated = "2026-06-16T21:56:27.367"

