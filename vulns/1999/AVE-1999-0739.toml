[basic]
description = "Microsoft Exchange Server 5.0 和 5.5 的 Internet Mail Service (IMS) 组件中存在缓冲区溢出漏洞。远程攻击者无需身份认证即可通过向目标服务器的 25 端口发送特制的 AUTH 或 AUTHINFO 命令，触发 IMS 在处理这些命令时的缓冲区溢出，导致服务进程崩溃，造成拒绝服务。该漏洞影响 Exchange Server 5.0 和 5.5 版本，攻击者只需能够与目标建立 SMTP 连接即可实施攻击，利用门槛较低。"
published = "2001-03-12T05:00:00.000"
remediation = "建议立即安装 Microsoft Exchange 5.5 Post-Service Pack 2 安全汇总更新，或升级至受支持的 Exchange Server 2016/2019 版本。如无法立即升级，可在网络防火墙或 Exchange 前端限制对 SMTP 端口 (25/TCP) 的 AUTH/AUTHINFO 命令访问，仅允许可信来源发起认证请求，作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Microsoft Exchange Server Internet Mail Service 缓冲区溢出拒绝服务漏洞"
updated = "2026-06-16T21:49:22.897"

