[basic]
description = "UltraScripts UltraBoard 1.6 及部分其他版本存在拒绝服务漏洞。当远程攻击者在 Session 参数中引用 UltraBoard 字符串时，应用程序会不断派生自身副本（fork），消耗服务器大量系统资源，导致服务不可用。该漏洞攻击复杂度低，无需认证即可远程触发，影响 UltraBoard 1.6 版本。"
published = "2000-05-05T04:00:00.000"
remediation = "立即停止使用 UltraBoard 1.6 或将应用下线，因厂商 UltraScripts 已停止维护且无安全补丁发布。如必须继续运行，在 Web 服务器（Apache/Nginx）层面配置请求过滤规则，拦截包含 UltraBoard 字符串的 Session 参数请求：Apache 可用 mod_rewrite 规则 `RewriteCond %{QUERY_STRING} Session=.*UltraBoard` 配合 `RewriteRule ^ - [F]` 返回 403；同时限制 Web 服务器子进程最大数量（如 Apache MaxClients），防止 fork 耗尽系统资源。建议迁移至现代论坛软件（如 phpBB、Discourse）作为根本解决方案。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "UltraScripts UltraBoard 1.6 拒绝服务漏洞"
updated = "2026-06-16T21:51:42.443"

