[basic]
description = "Panda Antivirus 控制台监听在 2001 端口，未经认证的本地用户可通过向该端口发送 CMD 命令执行任意系统命令，从而完全控制受影响的系统。该漏洞源于控制台服务缺乏有效的身份认证与命令过滤机制，攻击者只需具备本地访问权限即可利用，无需交互操作，且 CVSS 评分 7.2，危害等级高，Panda 公司已发布补丁修复。"
published = "2000-06-17T04:00:00.000"
remediation = "立即升级至 Panda Antivirus 修复版本（2000 年 6 月后发布的补丁），该版本已修复端口 2001 控制台无需认证即可执行命令的问题。如无法立即升级，在防火墙层面限制端口 2001 仅允许受信管理员 IP 访问，并配置本地安全策略禁止非授权用户连接该端口。"
score = 7.2
severity = "HIGH"
sources = ["cve"]
title = "Panda Panda Antivirus 命令执行漏洞"
updated = "2026-06-16T21:51:57.520"

