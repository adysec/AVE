[basic]
description = "Classifieds.cgi 1.0 存在命令注入漏洞，远程攻击者可通过在 CGI 表单的隐藏变量中插入恶意命令，导致任意命令执行。该漏洞影响 Greg Matthews 开发的 Classifieds.cgi 1.0 版本，由于程序未对隐藏变量参数进行充分过滤，攻击者无需身份认证即可构造特制的 HTTP 请求触发该漏洞，从而实现远程命令执行，完全控制目标服务器。"
published = "1999-12-15T05:00:00.000"
remediation = "该软件已停止维护，无官方补丁。建议立即从 Web 服务器移除 classifieds.cgi 脚本，或替换为现代且受支持的分类广告系统（如 OsClass 或 WordPress 分类插件）。如无法立即移除，可将脚本所在目录添加至 Apache 的 Deny from all 规则或 Nginx 的 deny all 配置以禁用访问。同时检查 Web 服务器日志排查是否已被利用。"
score = 10
severity = "CRITICAL"
sources = ["cve"]
title = "Greg Matthews Classifieds.cgi 1.0 远程命令执行漏洞"
updated = "2026-06-16T21:49:21.687"

