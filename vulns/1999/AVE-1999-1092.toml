[basic]
description = "dbmlparser.exe 是一款流行的 CGI 留言本程序，存在路径遍历漏洞。程序在处理 DBMLFILE 参数时未正确执行 chroot 操作，远程攻击者可通过在 DBMLFILE 参数中插入路径穿越序列（如 ../）读取 Web 服务器上任意具有可读权限的文件，导致敏感信息泄露。攻击者还可修改 HTML 表单源文件指向其他站点以实施文件覆盖攻击。"
published = "1999-07-19"
remediation = "该 CGI 程序已停止维护多年，建议立即从 Web 服务器中删除 dbmlparser.exe 文件，并替换为其他活跃维护的留言本程序。如仍需使用，应在 Web 服务器层面配置访问控制，限制 DBMLFILE 参数值为白名单内的文件路径。"
score = 5.0
severity = "MEDIUM"
sources = ["cve"]
title = "dbmlparser.exe CGI 留言本程序路径遍历漏洞"
updated = "1999-07-19"

