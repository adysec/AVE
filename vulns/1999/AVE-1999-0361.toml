[basic]
description = "Debian 发行版中的 mailman 邮件列表管理软件包存在认证机制缺陷漏洞。由于该软件使用了较弱的身份验证方式（如默认密码或弱加密算法），本地普通用户或未经授权的远程攻击者能够绕过认证限制，获取管理员权限，进而控制邮件列表服务、修改配置或访问敏感邮件数据。该漏洞影响早期 Debian GNU/Linux 发行版中默认安装的 mailman 软件包，利用条件较低，攻击者仅需具备网络访问能力即可尝试利用。官方建议升级至修复版本或加强认证配置。"
published = "1999-06-22"
remediation = "升级 Debian mailman 软件包至 1.0rc2-5 或更高版本，该版本修复了 Cookie 认证值可预测的安全问题。如无法立即升级，限制对 mailman 管理 Web 页面的网络访问（如通过防火墙仅允许可信 IP 段访问），并监控管理界面的异常请求。"
score = 5.0
severity = "MEDIUM"
sources = ["avd"]
title = "Debian Mailman 弱认证权限提升漏洞"
updated = "2026-06-16"

