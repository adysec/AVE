[basic]
description = "信呼OA（信鸽协同办公系统）存在SQL注入漏洞，攻击者可在未授权情况下通过构造特制的HTTP请求参数，将恶意SQL语句注入后台数据库查询，导致敏感数据泄露、管理员权限被窃取。该漏洞影响信呼OA多个版本，攻击条件低，无需登录即可利用，危害较大。"
published = "0701"
remediation = "建议升级信呼OA至最新版本（≥2.6.7），该版本修复了多处SQL注入漏洞。具体操作：登录后台→系统设置→在线更新；或前往官网下载最新完整包覆盖安装。如无法升级，对涉及用户输入参数的模块（如流程审批、公告发布、邮件等模块）在应用层严格过滤单引号、双引号和分号等SQL注入特征字符，同时在数据库连接层开启参数化查询（PDO预处理）以防止恶意SQL拼接。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "信呼 OA SQL注入漏洞"
updated = "0701"

