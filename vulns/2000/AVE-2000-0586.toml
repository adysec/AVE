[basic]
description = "Internet Explorer 4.x 及 5.x 版本存在 SSL 证书验证缺陷，当浏览器通过图片或框架标签加载外部资源建立 SSL 连接时，未对证书的所有字段进行完整性校验，导致攻击者可构造恶意证书或实施中间人攻击绕过验证。该漏洞影响 IE 4.x 和 5.x 全版本，CVSS 评分 2.6（低危），攻击向量为网络、攻击复杂度高、无需认证、仅造成部分机密性泄露。攻击者需诱导用户访问包含恶意图片或框架引用的页面，并控制目标服务器或实施中间人劫持，才能利用证书验证缺陷窃取部分敏感信息。Microsoft 已在后续版本中修复该证书验证逻辑缺陷，建议用户升级至 IE 5.01 SP1 或更高版本并启用完整证书吊销检查。"
published = "2000-06-05T04:00:00.000"
remediation = "彻底卸载 Internet Explorer 4.x/5.x 并立即升级到 Internet Explorer 6+ 或现代浏览器（Edge、Chrome、Firefox），同时在旧系统上禁用 ActiveX 控件并配置安全策略禁止通过图像/框架加载的未经验证的网络内容以弥补SSL验证缺陷。"
score = 2.6
severity = "LOW"
sources = ["epss"]
title = "Microsoft Internet Explorer 4.x/5.x SSL证书验证漏洞"
updated = "2026-06-16T21:51:54.443"

