[basic]
description = "该漏洞存在于支持Kerberos认证的SSH 1.2.27协议栈中，其Kerberos认证票据存储于用户登录时的当前目录文件中。由于系统可能将用户主目录挂载在NFS网络文件系统上，远程攻击者能够通过网络嗅探目标主机上的该文件，从而获取受害者的Kerberos认证票据。这可能导致攻击者完整窃取、篡改和破坏系统的完整性与可用性，CVSS评分高达7.2，威胁等级严重。"
published = "2000-07-05T04:00:00.000"
remediation = "建议升级至 OpenSSH 2.0 或更高版本（已修复该漏洞），或升级至 SSH 1.2.28 及以上版本。若无法立即升级，请将 Kerberos 凭据缓存目录配置为本地非 NFS 目录（如通过 KRB5CCNAME 环境变量指定本地路径），并禁用 SSH 1 协议强制使用 SSH 2 协议；若必须使用 NFS 家目录，请配置 NFS 启用 Kerberos 认证并启用安全选项（sec=krb5p）以加密传输。建议同时禁用 SSH 1 协议的 Kerberos 认证功能，改用 SSH 2 公钥认证。立即检查并修改 /etc/ssh/sshd_config 设置 Protocol 2 和 KerberosAuthentication no。定期轮换 Kerberos 凭据并监控异常票据访问。立即部署补丁并验证 SSH 版本 ≥ 2.0。如无法升级，请配置 Kerberos 缓存目录为本地路径 export KRB5CCNAME=/tmp/krb5cc_%{uid} 并确保目录权限 700。"
score = 7.2
severity = "HIGH"
sources = ["epss"]
title = "SSH Communications Security SSH 1.2.27 Kerberos 票据缓存嗅探漏洞"
updated = "2026-06-16T21:52:01.930"

