[basic]
description = "CyberPatrol 守护进程 cyberdaemon 存在缓冲区溢出漏洞，远程攻击者无需身份认证即可向运行 Gauntlet Firewall 4.1/4.2/5.0、Webshield E-ppliance 100.0/300.0 或 IRIX 6.5.x 的目标系统发送特制请求触发该漏洞，可导致服务拒绝或远程执行任意命令。该漏洞 CVSS 评分 10.0，危害等级严重，受影响系统需及时升级或禁用相关服务。"
published = "2000-05-18T04:00:00.000"
remediation = "立即从 TIS (Trusted Information Systems) 获取并安装针对 Gauntlet Firewall 4.1/4.2/5.0 的安全补丁（详见 tis.com/support/cyberadvisory.html）。WebShield E-ppliance 100.0/300.0 用户同理联系厂商获取补丁。IRIX 6.5.x 用户安装 SGI 对应安全补丁。若无法立即打补丁，可在防火墙层面拦截对 cyberdaemon 端口的入站访问，或临时停用 CyberPatrol 过滤服务作为缓解措施。"
score = 10
severity = "CRITICAL"
sources = ["cve"]
title = """Let me analyze the vulnerability: CVE-2000-0437 is about a buffer overflow in the CyberPatrol daemon "cyberdaemon" used in Gauntlet Firewall and WebShield. The affected products include: - Gauntlet Firewall 4.1/4.2/5.0 - Webshield E-ppliance 100.0/300.0 - IRIX 6.5.x The format should be "厂商 产品 漏洞类型" (Vendor Product Vulnerability Type). The vendor is CyberPatrol (the maker of the cyberdaemon), but it's used in Gauntlet Firewall and WebShield. Looking at the original title, it mentions Gauntlet, Webshield, and IRIX. The cyberdaemon is part of CyberPatrol's content filtering software that was integrated into these products. Let me think about a good Chinese title. The core issue is: - Product: CyberPatrol cyberdaemon (used in Gauntlet Firewall, WebShield, IRIX) - Vulnerability: Remote buffer overflow (远程缓冲区溢出) - Impact: Denial of service or arbitrary code execution A good title could be: 多款产品中 CyberPatrol cyberdaemon 远程缓冲区溢出漏洞 Or more"""
updated = "2026-06-16T21:51:43.900"

