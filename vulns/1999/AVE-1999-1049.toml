[basic]
description = "ncFTP 2.4.2 FTP 客户端在 Red Hat Linux 5.0 及更早版本中存在操作系统命令注入漏洞。当用户使用自动下载选项时，远程攻击者可通过在待下载文件名中嵌入 shell 元字符（如 `;`、`|`、`` ` `` 等）来执行任意系统命令。该漏洞利用条件简单，攻击者只需控制 FTP 服务器上文件名即可触发，危害等级高，可能导致目标主机被完全控制。"
published = "1999-12-31T05:00:00.000"
remediation = "升级 ncftp 至 3.0.0 或更高版本，新版本已对自动下载的文件名进行 shell 元字符转义处理。如无法升级，可在 ncftp 配置中关闭自动下载功能（`set auto-download off`），并避免使用通配符或未验证来源的远程文件。对于 Red Hat Linux 5.0，建议升级操作系统以获取完整的 ncftp 补丁支持。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "Red Hat Linux ncFTP 客户端命令执行漏洞"
updated = "2026-06-16T21:50:13.020"

