[basic]
description = "McAfee Virus Scan 及 Norton Anti-Virus 等杀毒软件默认配置未将 Windows 回收站使用的 RECYCLED 文件夹纳入扫描范围，攻击者可利用此配置缺陷将恶意代码存放于该目录下，从而绕过杀毒软件的检测机制，实现病毒的隐蔽存储与持久化驻留，无需任何特殊权限即可完成攻击。该漏洞影响 McAfee 4.0、Network Associates for Windows NT 4.0.2/4.0.3 a 及 Norton AntiVirus 2000 等版本，CVSS 评分 7.2，危害等级高。"
published = "1999-12-22T05:00:00.000"
remediation = '在 McAfee VirusScan 或 Norton AntiVirus 中手动添加对 `C:\RECYCLED` (Windows 9x) 或 `C:\RECYCLER` (Windows NT/2000) 文件夹的实时扫描和按需扫描，确保杀毒软件不排除回收站目录。同时升级至该软件的最新版本，新版默认已包含回收站目录的扫描。'
score = 7.2
severity = "HIGH"
sources = ["epss"]
title = "McAfee与Norton杀毒软件 回收站文件扫描绕过漏洞"
updated = "2026-06-16T21:51:02.397"

