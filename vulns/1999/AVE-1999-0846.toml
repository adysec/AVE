[basic]
description = "Windows NT 系统中 HKEY_LOCAL_MACHINE 注册表键的系统关键权限配置不当，允许 Everyone 组及非授权用户通过网络远程访问和修改该注册表项。攻击者可通过 SMB、NetBIOS 或远程注册表服务在无需认证的情况下读取或篡改系统关键配置，导致完全控制系统的风险。该漏洞影响 Windows NT 4.0 及更早版本。"
published = "1999-01-01"
remediation = "安装 Windows NT 4.0 Service Pack 6a 或升级至 Windows 2000 及以上版本；同时手动收紧 HKEY_LOCAL_MACHINE 权限，仅保留 SYSTEM 和 Administrators 的完全控制权，移除 Everyone 组的不必要访问权限。"
score = 9.8
severity = "CRITICAL"
sources = ["cve"]
title = "Microsoft Windows NT 注册表 HKEY_LOCAL_MACHINE 权限配置不当漏洞"
updated = "1999-01-01"

