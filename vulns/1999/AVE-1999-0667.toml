[basic]
description = "IIS 4.0 在处理 HTTP 请求时对头部数据缺乏充分的输入验证，未经身份认证的远程攻击者可通过持续向目标服务器发送大量包含畸形或不完整 HTTP 头部的请求，耗尽服务器连接资源或触发异常处理，导致 Web 服务停止响应。该漏洞影响 IIS 4.0、Microsoft Commercial Internet System 2.0/2.5 以及 Site Server Commerce Edition 3.0 alpha/3.0。攻击者无需任何凭据即可在远程发起拒绝服务攻击，通过简单的脚本或工具即可生成大量恶意请求，使目标站点无法为合法用户提供服务，造成业务中断。"
published = "1999-08-11T04:00:00.000"
remediation = "立即安装 Microsoft 1999 年 8 月安全更新（MS99-029，KB238349），该补丁修复 IIS 4.0 对畸形 HTTP 请求头的解析问题。如无法立即应用补丁，可在 Internet 服务管理器（ISM）中配置请求队列限制并启用 TCP/IP 连接超时，以减少恶意请求耗尽服务器内存的风险。受影响的 Microsoft Commerce Internet System 2.0/2.5、Site Server 3.0 及 Site Server Commerce Edition 3.0 用户同样需安装此补丁。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
