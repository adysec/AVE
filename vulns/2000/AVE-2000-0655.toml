[basic]
description = "screen 3.9.5 及更早版本的 vbell_msg 初始化变量存在格式化字符串漏洞。当用户通过环境变量设置 vbell_msg 时，程序未对格式化字符（如 %n、%x、%s）进行过滤，直接将其传递给 printf 类函数处理，导致攻击者可利用格式化字符串的写入原语覆盖内存中的函数指针或返回地址。本地用户只需具备普通账号权限，通过设置恶意的 vbell_msg 环境变量并启动 screen 会话即可触发该漏洞，成功利用后可获取 root 权限，实现本地提权。该漏洞影响所有运行受影响版本 screen 的 Linux/Unix 系统。"
published = "2000-12-19T05:00:00.000"
remediation = "建议立即升级 screen 至 3.9.6 或更高版本（如 screen 4.0.0 及以上），通过包管理器升级：Debian/Ubuntu 执行 `apt-get update && apt-get install screen`，RHEL/CentOS 执行 `yum update screen`。若无法立即升级，可临时移除 screen 的 setuid 位：`chmod u-s /usr/bin/screen`，或限制普通用户执行权限：`chmod 750 /usr/bin/screen`，并限制仅允许可信用户组使用 screen。"
score = 4.6
severity = "MEDIUM"
sources = ["redhat"]
title = "Juergen Weigert screen 3.9 格式字符串漏洞"
updated = "2026-06-16T21:52:43.420"

