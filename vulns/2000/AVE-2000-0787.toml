[basic]
description = 'AOL Instant Messenger（AIM）在处理 "goim" 命令时存在缓冲区溢出漏洞。远程攻击者可通过向目标用户发送特制的超长 "goim" 命令触发该漏洞，导致缓冲区溢出，从而以当前用户权限执行任意代码。该漏洞影响 AOL Instant Messenger 4.3.2229 之前的所有版本，CVSS 评分 7.5，危害等级高危。'
published = "2001-01-09T05:00:00.000"
remediation = "升级 AOL Instant Messenger 至 4.3.2229 或更高版本以修复该缓冲区溢出漏洞。临时缓解措施：在防火墙或网络层面拦截异常的 `aim://` 协议请求，并警惕来自不可信来源的超长即时消息。"
score = 7.5
severity = "HIGH"
sources = ["exploitdb"]
title = "AOL Instant Messenger aim:// 远程缓冲区溢出漏洞"
updated = "2026-06-16T21:53:07.890"

