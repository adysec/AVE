[basic]
description = "Qualcomm Qpopper（版本 3.0）是一款广泛使用的 POP3 邮件服务器软件。该软件的 AUTH 命令处理过程中存在缓冲区溢出漏洞，未经认证的远程攻击者可通过向目标服务器的 POP3 端口发送特制的超长 AUTH 命令请求，触发栈缓冲区溢出，从而覆盖返回地址并执行任意代码，最终获取目标系统的 root 权限。该漏洞无需任何认证即可远程利用，CVSS v2 评分 10.0，危害等级为严重。受影响的版本包括 Qpopper 3.0 及 3.0 b20，部署于 Unix/Linux 平台上的 POP3 服务均可能受到波及。Qualcomm 已发布修补版本，建议管理员立即升级 Qpopper 至最新版本以消除该风险。"
published = "1999-11-30T05:00:00.000"
remediation = "升级 Qpopper 至 3.1 或更高版本，该漏洞在 3.1 中已被修复。Qpopper 已于 2010 年停止维护，建议迁移至现代 POP3 服务器如 Dovecot 或 Cyrus，并在迁移前限制受信任 IP 访问 110 端口作为临时缓解措施。"
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "Qualcomm qpopper 远程缓冲区溢出漏洞"
updated = "2026-06-16T21:49:07.833"

