[basic]
description = "Caldera OpenLinux 2.3 默认安装中包含 rpm_query CGI 程序，该程序未对访问来源进行有效限制，导致远程攻击者无需身份认证即可通过直接访问该 CGI 接口查询系统已安装的软件包列表。攻击者可利用此漏洞收集目标系统的软件配置信息，为进一步的针对性攻击（如利用已知漏洞的软件版本）提供情报支撑。该漏洞影响 Caldera OpenLinux 2.3 系统，CVSS 评分 5.0，危害等级中危。"
published = "2000-03-05"
remediation = "删除或禁用 Caldera OpenLinux 2.3 系统中 /cgi-bin/rpm_query CGI 脚本，或升级到不受影响的版本。如必须使用，通过 Web 服务器访问控制限制该脚本仅允许可信 IP 访问。"
score = 5.0
severity = "MEDIUM"
sources = ["cve"]
title = "Caldera OpenLinux 2.3 rpm_query CGI 信息泄露漏洞"
updated = "2026-06-16"

