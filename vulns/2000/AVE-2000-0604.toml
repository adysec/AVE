[basic]
description = "GNU glibc 2.1.1 中的 unsetenv 函数在清除环境变量时存在安全缺陷，当同一环境变量（如 LD_PRELOAD 或 LD_LIBRARY_PATH）被重复传入两次时，unsetenv 无法正确将其从环境中移除。本地攻击者可利用此漏洞，通过向 setuid 特权程序传递精心构造的重复环境变量，劫持动态链接库的加载流程，从而以提升后的权限执行任意代码。该漏洞影响所有使用 glibc 2.1.1 的 Linux 发行版，CVSS 评分 7.2，危害等级高危。"
published = "2000-11-14T05:00:00.000"
remediation = "升级 glibc 至 2.1.2 或更高版本，此版本已修复 unsetenv() 函数在处理重复环境变量时的 off-by-one 缺陷。各 Linux 发行版对应补丁：Red Hat 安装 RHSA-2000-057 更新、Debian 安装 20000902 安全公告更新、Caldera 安装 CSSA-2000-028、Mandrake 安装 MDKSA-2000-040/045。如无法立即升级，可通过移除 setuid 程序对环境变量 LD_PRELOAD 和 LD_LIBRARY_PATH 的继承来缓解风险。"
score = 7.2
severity = "HIGH"
sources = ["exploitdb"]
title = "ProFTPd ProFTPd 1.2 pre6 snprintf 远程代码执行漏洞"
updated = "2026-06-16T21:52:32.550"

