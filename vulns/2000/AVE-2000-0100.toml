[basic]
description = "BroadGun Software 出品的 CamShot WebCam 2.5 HTTP 服务器组件存在缓冲区溢出漏洞，远程攻击者可通过向目标设备发送超长 GET 请求触发缓冲区溢出，从而在服务器进程中执行任意命令。该漏洞允许未经身份认证的攻击者完全控制受影响的 WebCam 设备，CVSS 评分 7.5，危害等级高。受影响版本为 CamShot WebCam 2.5，厂商已停止维护且未发布官方补丁。"
published = "1999-12-30T05:00:00.000"
remediation = "立即升级 CamShot WebCam 至最新版本（如已停止维护，建议更换为仍在维护的替代产品）。临时缓解措施：在防火墙中限制仅信任 IP 可访问 WebCam 服务的 80 端口，避免将 WebCam 服务暴露在公网。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "BroadGun Software CamShot WebCam 2.5 GET请求缓冲区溢出漏洞"
updated = "2026-06-16T21:50:53.007"

