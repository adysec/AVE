[basic]
description = "Linux Trustees 内核补丁 1.5 版本中存在路径名处理缺陷，本地攻击者可通过访问包含超长路径名的文件或目录，触发内核在处理路径时发生异常，导致拒绝服务（系统崩溃或服务不可用）。该漏洞影响部署了 Bray Systems Linux Trustees 1.5 内核补丁的 Linux 系统，需本地用户权限触发，无法远程利用，CVSS 评分 2.1，危害等级低。"
published = "2000-04-10T04:00:00.000"
remediation = "升级 Linux Trustees 至 1.6 或更高版本，该版本已在路径名处理中增加了长度边界校验。由于该项目已停止维护且厂商网站已失效，建议迁移至现代文件系统访问控制方案，如使用 Linux 原生 LSM（SELinux/AppArmor）替代 Trustees 内核补丁，可从根本上消除此漏洞。"
score = 2.1
severity = "LOW"
sources = ["avd"]
title = "Bray Systems Linux Trustees 1.5 长路径名拒绝服务漏洞"
updated = "2026-06-16T21:51:22.503"

