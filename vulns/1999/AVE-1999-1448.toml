[basic]
description = "Hummingbird Exceed 6.0.1.0 版本错误地捆绑了仅用于开发和测试的 DLL 组件，该组件会将用户登录凭据（用户名和密码）以明文形式记录到 test.log 文件中。本地攻击者可通过读取该日志文件获取敏感凭据信息，进而提升权限或横向移动。该漏洞影响 Hummingbird Exceed 6.0.1.0 及可能更早版本，CVSS 评分 7.5，危害等级高。厂商未提供官方补丁，建议用户删除或限制对 test.log 文件的访问权限。"
published = "1998-12-03T05:00:00.000"
remediation = "删除 Hummingbird Exceed 安装目录下随附的开发测试 DLL 文件，并清除所有已生成的 test.log 文件，确保敏感凭据不被明文记录。升级到 Hummingbird Exceed 6.0.2 或更高版本，该版本已移除此开发组件。如无法升级，通过文件系统 ACL 限制 test.log 的访问权限，仅允许管理员读取。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "Hummingbird Exceed 敏感信息泄露漏洞"
updated = "2026-06-16T21:50:06.053"

