[basic]
description = "Linux 内核 DMA 引擎 at_xdmac 驱动中存在空指针解引用漏洞（CWE-476）。在 at_xdmac_prep_dma_memset 函数中，当 at_xdmac_memset_create_desc 返回 NULL（因 len 参数错误或 atchan->free_descs_list 为空导致内存耗尽）时，未进行空指针检查直接解引用，导致内核崩溃拒绝服务。该漏洞影响使用 Atmel XDMAC DMA 控制器的 Linux 内核版本，攻击者需具备本地低权限访问权限（CVSS:3.1/AV:L/AC:L/PR:L/UI:N/S:U/C:N/I:N/A:H，CVSS 5.5 MEDIUM），通过触发异常 DMA memset 操作（如传入异常长度或耗尽内存）即可触发空指针解引用导致系统崩溃拒绝服务，可用性影响严重。Linux 内核已通过在 at_xdmac_prep_dma_memset 中增加空指针检查修复该漏洞。"
published = "2025-01-06T17:15:43.477"
remediation = "建议立即升级 Linux 内核至包含修复补丁的版本：Debian 11 升级至 linux-image-5.10.223-1 或更新版本（DLA-4075-1）；Ubuntu 24.04 LTS 升级至 linux-image-6.8.0-52-generic 或更新版本（USN-7381-1）；Ubuntu 20.04 LTS 升级至 linux-image-5.15.0-130-generic 或更新版本（USN-7459-1）；其他发行版升级至 Linux 内核 6.12.2、6.11.11、6.6.63、6.1.121、5.15.175、5.10.223、5.4.289 或更新版本。临时缓解措施：在不使用 Atmel XDMAC DMA 控制器的系统上，可通过内核启动参数禁用该驱动（modprobe.blacklist=at_xdmac）或在内核配置中禁用 CONFIG_DMA_AT_XDMAC 选项后重新编译内核。"
score = 5.5
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux Kernel at_xdmac DMA 引擎空指针解引用漏洞"
updated = "2026-06-17T08:12:56.600"

