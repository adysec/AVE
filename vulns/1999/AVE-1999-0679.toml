[basic]
description = "Oracle Intelligent Agent 组件中的 dbsnmp 工具存在权限提升漏洞。本地攻击者可通过设置 ORACLE_HOME 环境变量，使 dbsnmp 加载恶意 nmiconf.tcl 脚本，从而获取目标系统上的更高权限。该漏洞影响 Oracle 8 及 8.1.5 版本，攻击者需具备本地系统访问权限，CVSS 评分 4.6，危害等级中危。"
published = "1999-08-16"
remediation = "升级 Oracle 数据库至 8.1.6 及以上版本，或限制 dbsnmp 可执行文件的访问权限，确保 ORACLE_HOME 环境变量不可被非授权用户修改，并移除 dbsnmp 的 setuid 权限。"
score = 4.6
severity = "MEDIUM"
sources = ["cve"]
title = "Oracle Intelligent Agent dbsnmp 本地权限提升漏洞"
updated = "2026-06-16"

