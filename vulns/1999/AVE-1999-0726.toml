[basic]
description = "Windows NT 4.0 及 Windows 2000 在处理包含特制畸形图像标头的可执行文件时存在拒绝服务漏洞。当用户执行恶意构造的 PE 文件时，系统会因无法正确解析文件头而触发蓝屏崩溃，导致服务器或工作站宕机。攻击者可通过邮件附件、网页下载或文件共享等方式诱使用户执行恶意程序，从而造成拒绝服务。该漏洞无需认证即可远程触发，影响范围广泛。"
published = "1999-06-30"
remediation = "安装 Windows NT 4.0 Service Pack 5（SP5），该版本已包含 MS99-023 安全公告的修复补丁。Terminal Server Edition 用户需安装对应专用补丁。建议限制非授权用户向系统上传或执行可执行文件的能力，并禁用不必要的文件共享功能。"
score = 7.8
severity = "HIGH"
sources = ["cve"]
title = "Microsoft Windows NT 畸形文件图像标头拒绝服务漏洞"
updated = "2026-06-16"

