[basic]
description = "fcheck 是一款用于文件完整性检查的工具，其处理文件名时存在安全缺陷，未对用户可控的文件名中的 shell 元字符（如反引号、分号、管道符等）进行有效过滤和转义。本地攻击者可通过创建含有恶意 shell 元字符的特制文件名，诱使 fcheck 在处理文件时将其传递给 shell 执行，从而以 fcheck 运行权限执行任意命令，实现本地权限提升。该漏洞需要攻击者拥有本地系统访问权限并能够在受影响目录中创建文件才能利用。"
published = "2000-03-31T05:00:00.000"
remediation = "升级 fcheck 至 2.2 或更高版本，该版本已修复文件名 shell 元字符转义问题；若无法升级，建议在 fcheck 源码中调用系统命令前对文件名使用 escapeshellarg() 或等价的 POSIX shell 转义函数处理所有文件名字段。临时缓解措施：限制被监控目录的写入权限，确保不可信用户无法在 fcheck 扫描路径下创建文件，同时考虑迁移至 AIDE、Tripwire 或 Samhain 等仍在维护的文件完整性检查工具。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "fcheck 本地权限提升漏洞"
updated = "2026-06-16T21:51:25.290"

