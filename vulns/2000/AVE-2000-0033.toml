[basic]
description = "Hughes Technologies 公司开发的 Mini SQL (mSQL) 2.0.11 版本中的 w3-msql CGI 程序存在缓冲区溢出漏洞。远程攻击者无需身份认证即可向目标系统发送特制请求，触发缓冲区溢出，进而导致任意代码执行。该漏洞 CVSS 评分 10.0，危害等级严重，攻击者可完全控制受影响服务器。目前已有公开利用代码，建议立即升级至修复版本。"
published = "1999-12-27"
remediation = "升级 mSQL 至 3.x 或更高版本，该版本已修复 w3-msql CGI 中的缓冲区溢出问题。如无法升级，建议移除或禁用 w3-msql CGI 脚本，并在 Web 服务器层面限制对该脚本的访问权限。"
score = 10.0
severity = "CRITICAL"
sources = ["cve"]
title = "Hughes Technologies Mini SQL (mSQL) 2.0.11 w3-msql 缓冲区溢出漏洞"
updated = "2026-06-16"

