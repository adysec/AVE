[basic]
description = "Linux 内核 ACPI 子系统的 x86 平台代码中存在空指针解引用漏洞，函数 `acpi_quirk_skip_serdev_enumeration()` 在调用 `acpi_dev_hid_match()` 前未对 `adev` 参数进行 NULL 检查，导致当传入的控制器父设备没有 ACPI 伴生对象时触发空指针解引用，造成内核崩溃。本地低权限攻击者可通过挂载特定设备触发该漏洞，导致系统拒绝服务。该漏洞影响 Linux 内核各发行版本，CVSS 评分 5.5，危害等级中等。"
published = "2025-01-08T18:15:19.147"
remediation = "立即将 Linux 内核升级至 6.12.5 或更高版本（6.13 及以上不受影响），或手动 cherry-pick 补丁提交 e173bce05f70 和 4a49194f587a（位于 drivers/acpi/x86/utils.c）。如无法立即升级内核，可通过内核 livepatch 机制（如 kpatch 或 KGraft）热修复 acpi_dev_hid_match() 中 adev 空指针解引用问题，或限制本地用户对 ACPI 设备枚举接口的访问作为临时缓解。"
score = 5.5
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux Kernel ACPI 空指针解引用漏洞"
updated = "2026-06-17T08:12:58.887"

