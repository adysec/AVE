[basic]
description = "ISC BIND 的 DNS 解析器代码在移植到 libc、glibc 及 libbind 库时存在缓冲区溢出漏洞。远程恶意 DNS 服务器可通过向使用这些库的 stub 解析器发送特制的 DNS 应答数据包触发溢出，导致目标系统拒绝服务，甚至可能执行任意代码。该漏洞影响大量 Unix/Linux 系统，CVSS 评分 7.5，危害等级高。"
published = "2002-07-03T04:00:00.000"
remediation = "升级 glibc 至 2.2.5 及以上版本（或安装对应发行版安全补丁，如 Red Hat 的 RHSA-2002:132），或升级 BIND 至 8.3.3 及以上版本。如无法立即升级，可在边界防火墙上限制对 DNS 服务器的递归查询来源，仅允许可信 IP 段发起 DNS 请求作为临时缓解。"
score = 7.5
severity = "HIGH"
sources = ["osv"]
title = "ISC BIND DNS 解析器缓冲区溢出漏洞"
updated = "2026-06-16T21:57:51.960"

