[basic]
description = "Zope 2.2.1 之前版本未正确限制对 getRoles 方法的访问权限，导致可编辑 DTML 模板的用户能够通过在 HTTP 请求中修改角色列表参数来添加或提升系统角色权限。攻击者利用此漏洞可获取未授权的管理权限，进而对 Web 应用进行任意配置修改或数据操作，威胁系统完整性与机密性。该漏洞影响 Zope 2.2.1 之前的所有版本，CVSS 评分 7.2，危害等级高，需尽快升级至官方修复版本。"
published = "2000-10-20T04:00:00.000"
remediation = "立即升级 Zope 至 2.2.1 或更高版本，该版本已修复 getRoles 方法权限校验缺陷。如无法升级，应严格限制可编辑 DTML 模板的用户范围，仅授予受信任管理员 DTML 编辑权限，并定期审计角色列表变更日志。"
score = 7.2
severity = "HIGH"
sources = ["cve"]
title = "Zope 权限许可与访问控制漏洞"
updated = "2026-06-16T21:52:21.033"

