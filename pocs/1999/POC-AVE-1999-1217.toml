[info]
author = "AVE"
description = "检测目标是否运行存在跨帧导航漏洞的 Internet Explorer 4.0/4.01 版本。攻击者通过构造恶意 HTML 页面，利用 IE 的跨帧导航机制绕过同源策略，读取用户本地文件。验证方式为检查目标是否返回 IE 4.x 特征响应头及 User-Agent。"
id = "POC-AVE-1999-1217"
name = "Microsoft Internet Explorer 4.0/4.01 Cross Frame Navigate 信息泄露 PoC"
severity = "low"
tags = [
    "cve-1999-0871",
    "cross-frame",
    "ie",
    "information-disclosure",
]
vuln_id = [
    "CVE-1999-0871",
    "AVE-1999-1217",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "header"
type = "word"
words = [
    "MSIE 4.0",
    "MSIE 4.01",
]
