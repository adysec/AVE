[basic]
description = "DataWizard WebXQ 服务器 1.204 版本存在目录遍历漏洞，远程攻击者可通过在 URL 中插入 `../` 序列绕过路径限制，读取 Web 根目录以外的任意文件，导致敏感信息泄露。攻击无需身份认证，仅需向目标服务器发送特制 HTTP 请求即可触发，利用门槛极低。该漏洞影响 DataWizard WebXQ 1.204 及更早版本。"
published = "2001-06-27T04:00:00.000"
remediation = 'DataWizard WebXQ 1.204 已停止维护，无官方补丁。建议立即迁移至现代受支持的 Web 服务器（如 Apache httpd、Nginx）。在迁移完成前，部署反向代理（如 Nginx）过滤 URL 中的 `../` 及 `..\` 目录遍历序列，并配置 WAF 规则拦截路径穿越攻击。同时限制 Web 服务运行账户的文件系统权限，避免敏感目录可被读取。'
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "DataWizard WebXQ 2.1.204 目录遍历漏洞"
updated = "2026-06-16T21:54:24.880"

