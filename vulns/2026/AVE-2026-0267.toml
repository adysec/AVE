[basic]
description = "Gitea是一个轻量级自托管的Git服务。其NPM包标签API端点(AddPackageTag)在处理HTTP请求体时使用io.ReadAll()无限制地读取全部数据到内存中，未做任何大小限制。任何认证用户可通过发送单个大HTTP请求(约服务器可用内存80%)触发OOM(内存耗尽)，导致Gitea进程被操作系统终止。该问题影响Gitea 1.27.0之前的所有版本，攻击不需要事先创建NPM包，且并发请求可造成持续拒绝服务(即使Docker自动重启也会被立即再次攻击致死)。"
published = "2026-07-21"
remediation = "升级到Gitea 1.27.0及以上版本，该版本在AddPackageTag函数中增加了请求体大小限制。如无法立即升级，可考虑在反向代理层限制请求体大小(如nginx client_max_body_size)，或禁用包注册功能模块。"
score = 6.5
severity = "MEDIUM"
sources = ["ghsa"]
title = "Gitea NPM包标签接口存在未限制内存读取导致拒绝服务漏洞"
updated = "2026-07-21"

