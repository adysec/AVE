[basic]
description = "IP 源路由选项（Loose Source and Record Route / Strict Source Routing）允许数据包发送方指定途经路径。当路由器或防火墙未正确过滤携带源路由选项的 IP 数据包时，远程攻击者可绕过正常的路由策略和访问控制规则，伪造可信源地址，将数据包强制路由至本不可达的内部网络，进而实施网络探测、中间人攻击或越权访问。该漏洞无需身份认证即可远程利用，CVSS v2.0 评分 7.5，危害等级高。缓解措施包括在网络边界设备上禁用 IP 源路由选项的转发。"
published = "1997-01-01T05:00:00.000"
remediation = '在路由器或防火墙上禁用 IP 源路由功能：Cisco 设备使用 `no ip source-route` 命令，Linux 系统设置 `net.ipv4.conf.all.accept_source_route=0`，Windows 系统将注册表 `HKLM\SYSTEM\CurrentControlSet\Services\Tcpip\Parameters\DisableIPSourceRouting` 设为 2。同时确保边界 ACL 过滤源路由选项（IP Option 3）的数据包。'
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "路由器或防火墙 IP源路由绕过漏洞"
updated = "2026-06-16T21:48:32.890"

