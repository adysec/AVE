[basic]
description = "xpdf PDF 查看器 0.91 之前版本在处理临时文件时存在任意文件写入漏洞，本地攻击者可通过符号链接攻击（Symlink Attack）方式，诱使 xpdf 在创建临时文件时覆盖系统任意文件。攻击者利用该漏洞可导致系统文件遭篡改或本地权限提升，影响系统完整性与可用性。该漏洞要求攻击者拥有本地访问权限，CVSS 评分 7.2，危害等级高。"
published = "2000-10-20"
remediation = "升级 xpdf 至 0.91 或更高版本。Red Hat Linux 用户可应用 RHSA-2000-060 补丁，Caldera OpenLinux 用户可应用 CSSA-2000-031 补丁。临时缓解措施包括限制本地用户对 /tmp 目录的写权限或使用 nosuid 挂载选项。"
score = 7.2
severity = "HIGH"
sources = ["cve"]
title = "xpdf PDF Viewer 符号链接攻击本地任意文件写入漏洞"
updated = "2000-10-20"

