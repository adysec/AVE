[basic]
title = "EZShopper 3.0 search.cgi 目录遍历与命令注入漏洞"
description = "EZShopper 3.0 的 search.cgi CGI 脚本存在输入验证缺陷，远程攻击者可通过 .. 目录遍历攻击读取服务器上任意文件，或通过 shell 元字符注入执行任意系统命令。攻击无需认证，可导致敏感信息泄露和服务器完全受控。"
severity = "HIGH"
score = 7.5
sources = ["cve"]
published = "2000-02-27"
updated = "2026-06-16"
remediation = "升级 EZShopper 至最新版本或禁用 search.cgi 脚本，对用户输入进行严格过滤，移除危险字符如 .. 和 shell 元字符。"
[references]
urls = ["http://archives.neohapsis.com/archives/bugtraq/2000-02/0356.html", "http://www.securityfocus.com/bid/1014"]
