[basic]
description = 'SSH 1.2.27 服务器存在安全策略绕过漏洞，其加密协商机制未严格校验服务器端配置的加密算法策略。攻击者作为 SSH 客户端在连接时可指定使用 "none" 加密算法（即明文传输），即便服务器策略本不允许该算法，服务器仍会接受此协商结果。该漏洞影响 OpenSSH 早期的 SSH 1.2.27 版本，攻击条件为攻击者能够发起 SSH 客户端连接并主动请求 none 加密方式，无需身份认证前提。利用成功后，SSH 会话将以未加密的明文形式传输数据，导致通信内容可被中间人窃听，敏感信息（如凭证、会话数据）面临泄露风险。该漏洞 CVSS 评分为 2.1，危害等级较低。'
published = "1999-12-14T05:00:00.000"
remediation = '升级 OpenSSH 至 1.2.28 或更高版本，该版本已修复允许客户端使用 "none" 加密算法的策略绕过问题。如无法立即升级，可在服务器配置文件 sshd_config 中显式设置 Ciphers 仅允许强加密算法（如 3des-cbc、blowfish-cbc），并禁止 none 加密方式，同时配合防火墙限制仅允许可信 IP 访问 SSH 服务作为临时缓解措施。'
score = 2.1
severity = "LOW"
sources = ["avd"]
