[basic]
description = "NTMail 4 及 5 版本存在 SMTP 信息泄露漏洞。该邮件服务器在管理后台 ESMTP 设置中提供了关闭 VRFY（验证）命令的选项，但即便管理员明确禁用了该选项，NTMail 仍会继续响应 VRFY 命令。未经身份认证的远程攻击者可通过向目标邮件服务器的 25 端口建立 SMTP 连接，使用 VRFY 命令配合字典暴力枚举有效的邮箱用户名。服务器会针对存在的账户返回 250 响应并回显完整邮箱地址，而不存在的账户则返回 557 错误。攻击者可利用此特性批量爬取邮件服务器上所有活跃的邮箱地址，为后续的垃圾邮件、钓鱼攻击和社会工程学攻击提供精确目标列表。该漏洞影响所有使用 NTMail 4.x 和 5.x 版本的邮件服务器，CVSS v2 评分为 5.0（中等）。建议管理员通过其他方式（如 IP 访问控制或应用 Gordano 官方安全补丁）来限制 VRFY 命令的滥用。"
published = "1999-12-01T05:00:00.000"
remediation = "升级到已修复该问题的 NTMail 最新版本（5.x 及以上），或在邮件服务器配置文件中将 DisableVRFY 选项显式设为 Yes 以强制禁用 VRFY 命令；若使用防火墙，可限制外部对 SMTP 25 端口的直接访问，仅允许受信任中继主机连接作为临时缓解。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "NTMail VRFY 命令未正确禁用导致信息泄露漏洞"
updated = "2026-06-16T21:49:07.460"

