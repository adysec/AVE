[basic]
description = "ARCAD Systemhaus 0.078-5 版本在安装关键程序和文件时设置了全局可写权限，本地攻击者可通过替换程序为特洛伊木马，从而获取系统权限。该漏洞影响 ARCAD Systemhaus 0.078-5 版本，CVSS 评分 4.6，危害等级中危。"
published = "1999-09-29"
remediation = "升级到 ARCAD Systemhaus 的最新版本，或手动修复受影响文件和目录的权限设置，确保关键程序和文件仅对授权用户可写。"
score = 4.6
severity = "MEDIUM"
sources = ["cve"]
title = "ARCAD Systemhaus 本地权限提升漏洞"
updated = "1999-09-29"

