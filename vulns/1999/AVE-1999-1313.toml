[basic]
description = "HP Laserjet打印机配备JetDirect卡并配置TCP/IP时，默认未设置密码保护，未经身份验证的远程攻击者可直接连接打印机并篡改其IP地址或禁用日志记录功能。该漏洞影响所有使用JetDirect卡启用TCP/IP网络打印的HP Laserjet系列打印机设备。攻击者无需任何凭据即可通过Telnet或JetDirect服务连接目标打印机，修改网络配置导致打印服务中断或路由至恶意地址，同时关闭日志功能使安全审计失效。CVSS评分7.5，危害等级高。建议为JetDirect TCP/IP配置启用密码认证并限制访问来源。"
published = "1997-10-04T04:00:00.000"
remediation = "为 HP JetDirect 卡启用并设置强管理员密码（通过打印机控制面板、JetDirect 嵌入式 Web 或 telnet 管理界面），禁止无密码 TCP/IP 配置；在边界防火墙/ACL 上限制仅管理网段可访问打印机 23/515/9099/9100 端口，并将设备划入隔离 VLAN，禁止公网及非必要网段直连；无法立即加固时，临时关闭远程管理并仅允许可信主机通过打印服务器转发任务。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
