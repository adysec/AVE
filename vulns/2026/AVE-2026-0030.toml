[basic]
description = "蓝凌 EKP 系统存在 SQL 注入漏洞，攻击者可在未经身份认证的情况下向系统发送特制的 HTTP 请求参数，通过构造恶意 SQL 语句注入后端数据库执行任意数据库操作，导致敏感数据泄露、数据库内容被篡改甚至服务器被控制。该漏洞影响全版本蓝凌 EKP 系统，攻击复杂度低，危害严重。厂商官方已发布安全补丁，建议用户升级至最新版本修复。"
published = "08.08"
remediation = "建议联系蓝凌服务专员（登录 https://myekp.net 提交工单或拨打 4000-180-300）申请针对该 SQL 注入漏洞的安全补丁，升级至修复后的 EKP 版本；同时在代码层对用户输入参数实施预编译绑定与白名单校验，禁止拼接 SQL 语句；如无法立即升级，可在 WAF 侧添加 SQL 注入特征拦截规则作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "蓝凌 EKP系统 SQL注入漏洞"
updated = "08.08"

