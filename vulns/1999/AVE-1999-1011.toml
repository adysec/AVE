[basic]
description = "Windows NT 4.0 Netbt.sys 驱动在处理 DNS 主机名解析返回值时存在缺陷，当恶意 DNS 服务器返回 0.0.0.0 作为 IP 地址时，系统未能正确处理该异常值，导致 Netbt.sys 崩溃并引发蓝屏死机。攻击者只需控制目标系统使用的 DNS 服务器或通过中间人攻击篡改 DNS 响应即可触发此漏洞，无需用户交互。该漏洞影响 Microsoft Windows NT 4.0 系统，属拒绝服务型漏洞。"
published = "1999-12-31T05:00:00.000"
remediation = "Windows NT 4.0 已终止支持，建议升级至 Windows 2000 及以上受支持版本。如无法升级，安装 Windows NT 4.0 Service Pack 6a 及后续安全汇总更新，并在防火墙或 DNS 解析器层面过滤返回 0.0.0.0 的非法 DNS 响应，同时在注册表中限制 Netbt.sys 对恶意 DNS 响应的处理行为作为临时缓解。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Microsoft Windows NT 4.0 Netbt.sys 拒绝服务漏洞"
updated = "2026-06-16T21:49:58.753"

