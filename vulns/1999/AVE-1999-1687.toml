[basic]
description = "Microsoft Excel 97 存在工作表函数执行安全警告缺失漏洞。当用户打开包含恶意 CALL 函数的 Excel 文件时，程序不会弹出安全警告，导致攻击者可利用 CALL 函数加载并执行恶意 DLL，从而实现任意命令执行。攻击者需诱使用户打开特制的 Excel 文件，无需其他特殊权限。该漏洞影响 Microsoft Excel 97 版本，CVSS 评分 7.5，危害等级高。微软已发布安全更新修复此问题。"
published = "1999-12-31T05:00:00.000"
remediation = "升级到 Microsoft Office 2000 或更高版本，该漏洞在后续版本中已修复。如无法升级，可在 Excel 中禁用 CALL 函数：通过「工具 → 加载宏」取消所有不必要的加载项，或使用组策略限制 Excel 执行外部 DLL 函数。最彻底的方案是停止使用已停止安全更新的 Office 97，迁移至 Microsoft 365 或 Office 2021 等受支持版本。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "Microsoft Excel 97 工作表函数远程代码执行漏洞"
updated = "2026-06-16T21:49:36.767"

