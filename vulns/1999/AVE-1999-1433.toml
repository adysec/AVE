[basic]
description = "WebRamp M3 路由器存在安全配置失效漏洞，即使管理员在配置界面中明确禁用了远程 telnet 或 HTTP 管理访问，这些服务仍保持开启状态。未经认证的远程攻击者可利用此缺陷直接连接路由器的管理端口，获取管理员权限，进而完全控制目标路由器及内部网络，执行任意配置修改或流量劫持等操作。"
published = "1999-01-21T05:00:00.000"
remediation = "升级 WebRamp M3/M3t/M3i/300 固件至最新版本（厂商曾承诺在下一版本中增加禁用 WAN 访问 httpd/telnetd 的开关）。若无法升级，可采取以下缓解措施：1) 修改管理员密码并定期更换；2) 在每个活跃拨号端口启用 Visible Computer，指向未使用的内网 IP（如 192.168.1.254），同时取消勾选 divert incoming 选项；3) 或启用 Telnet/Web Local Server 并指向未使用的 IP 地址。该设备已停止支持多年，建议更换为受支持的路由器产品。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "WebRamp M3 路由器远程telnet和HTTP访问未禁用漏洞"
updated = "2026-06-16T21:50:04.060"

