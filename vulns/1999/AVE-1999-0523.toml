[basic]
description = "HP-UX 系统中 ypbind 组件存在权限控制缺陷，已获得 root 权限的攻击者可通过 ypbind 服务非法修改网络信息服务（NIS）数据，导致目标系统的用户认证信息、主机映射表等关键网络配置被篡改，从而扩大攻击范围或实现持久化控制。该漏洞影响 HP-UX 操作系统，CVSS 评分 5.0，危害等级中危。"
published = "1993-01-13T05:00:00.000"
remediation = "建议立即升级到受支持的 HP-UX 11i v3 或更高版本并安装 HP 发布的最新安全补丁；如无法升级，在防火墙上限制对 RPC port 111（portmap）及 ypbind 动态端口的访问，仅允许受信任的主机访问 NIS 服务。在 /var/yp/securenets 中配置 NIS 域合法客户端子网范围，防止未授权主机获取 NIS 映射数据。长远考虑，建议将 NIS 迁移至 LDAP 或 Kerberos 等支持加密认证的目录服务。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "HP HP-UX ypbind NIS 数据篡改漏洞"
updated = "2026-06-16T21:48:07.757"

