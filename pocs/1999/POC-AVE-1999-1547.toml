[info]
author = "AVE"
description = "通过检查 /usr/etc/netware/ 目录下 ipxchk 和 ipxlink setuid 二进制文件的存在性，判断目标是否可能受 SGI IRIX 6.3 系统中 IFS 环境变量未清除导致的本地命令执行漏洞影响。"
id = "POC-AVE-1999-1547"
name = "SGI IRIX ipxchk 和 ipxlink 本地命令执行漏洞 PoC"
severity = "medium"
tags = ["ave-1999-1547"]
vuln_id = [
    "CVE-1999-1501",
    "AVE-1999-1547",
]

[poc]
logic = "any"

[[poc.requests]]
path = "/usr/etc/netware/ipxchk"
protocol = "file"

[[poc.requests.matchers]]
expect = true
part = "body"
regex = "."
type = "regex"

[[poc.requests]]
path = "/usr/etc/netware/ipxlink"
protocol = "file"

[[poc.requests.matchers]]
expect = true
part = "body"
regex = "."
type = "regex"
