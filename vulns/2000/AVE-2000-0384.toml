[basic]
description = "Caldera OpenLinux 2.3 系统自带的 Ident 身份认证服务守护进程存在拒绝服务漏洞。由于该服务为每个 IDENT 请求创建独立线程进行处理，远程攻击者无需身份认证即可向目标系统发送大量特制的 IDENT 请求，消耗服务器系统资源（如 CPU 和内存），导致服务响应缓慢甚至系统崩溃。该漏洞影响 Caldera OpenLinux 2.3 版本，危害等级中等，CVSS 评分 5.0。受影响的系统应及时安装厂商提供的安全补丁或禁用不必要的 Ident 服务以降低风险。"
published = "1999-10-08T04:00:00.000"
remediation = "建议立即应用 Caldera 安全公告 CSSA-1999-029.1 中提供的修补程序更新 identd。若业务上无需 ident 认证服务，在 /etc/inetd.conf 中注释 auth 服务对应行并重启 inetd 进程以完全禁用 identd，同时通过 iptables 等防火墙工具阻止外部来源对 TCP 113 端口的访问作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Caldera OpenLinux Ident Daemon 拒绝服务漏洞"
updated = "2026-06-16T21:51:34.400"

