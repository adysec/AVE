[basic]
description = "孚盟云CRM系统中的 /Ajax/LicMould.ashx 接口存在 SQL 注入漏洞。攻击者可在未经身份认证的情况下，通过构造特制的 POST 请求向该接口注入恶意 SQL 语句，利用 WAITFOR DELAY 方式进行时间盲注，从而探测并窃取数据库中的敏感信息，包括用户凭证、业务数据等。该漏洞攻击门槛较低，危害较大，建议用户尽快修复。"
published = "0711"
remediation = "升级孚盟云CRM至最新版本，对 /Ajax/LicMould.ashx 接口的 action、key、fuids 参数实施严格输入过滤与参数化查询，禁止拼接 SQL 语句。如暂无法升级，建议在 WAF 层拦截含有 WAITFOR DELAY、SELECT、UNION 等敏感关键词的 POST 请求。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "孚盟云 孚盟云CRM SQL注入漏洞"
updated = "0711"

