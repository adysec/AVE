[basic]
description = "ZTE F460 和 F660 光猫的 web_shell_cmd.gch 接口存在访问控制缺陷漏洞，远程攻击者无需认证即可通过发送特制的 sendcmd 请求（如使用 set TelnetCfg 命令）启用 Telnet 服务并设置任意登录凭据，从而获得设备的完全管理权限。攻击者可利用该漏洞完全控制目标设备，进行流量劫持、DNS 篡改或构建僵尸网络。该漏洞 CVSS 评分 10.0，危害等级严重，受影响的设备需通过固件升级或禁用 Telnet 服务进行修复。"
published = "2014-03-11T13:01:19.140"
remediation = "升级光猫固件至厂商发布的最新版本（如涉及）；在 Web 管理界面关闭 Telnet 远程访问功能；在防火墙或 ACL 规则中限制对光猫 80/443 管理端口的访问来源 IP；删除或重命名 web_shell_cmd.gch 脚本文件以阻断未授权执行路径。"
score = 10
severity = "CRITICAL"
sources = ["nuclei"]
title = "ZTE F460 F660 光猫 web_shell_cmd 远程命令执行漏洞"
updated = "2026-06-17T00:06:24.360"

