[basic]
description = "Linux 内核 ASoC SOF 子系统中 Intel CNL 驱动存在空指针解引用漏洞。在固件启动完成（FW_READY）之前，若损坏的固件提前发送 IPC 回复消息，由于 reply_data 内存仅在收到 FW_READY 后才分配，未过滤的提前回复将导致空指针解引用，造成内核崩溃。该漏洞同时影响 IPC3 与 IPC4 固件，本地低权限攻击者可利用此漏洞发起拒绝服务攻击，影响 Linux 内核全版本。CVSS 评分 5.5，危害等级中等。"
published = "2025-06-18T11:15:29.700"
remediation = "升级 Linux 内核至 5.19.4 及以上版本（或合入补丁 commit 230f646085d1 / acacd9eefd0d），在 sound/soc/sof/intel/cnl.c 中增加对固件启动状态的检查，过滤掉固件启动完成前（FW_READY 前）的 IPC 回复消息，避免空指针解引用。如无法立即升级，可在系统启动参数中添加 snd-sof-intel-hda-common.disable=1 临时禁用 SOF 音频驱动作为缓解措施。"
score = 5.5
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux kernel ASoC SOF Intel Cannonlake 空指针解引用漏洞"
updated = "2026-06-17T05:22:34.050"

