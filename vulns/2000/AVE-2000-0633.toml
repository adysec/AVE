[basic]
description = 'YaBB Bulletin Board（Yet Another Bulletin Board）9.1.2000 版本存在路径遍历漏洞，远程攻击者无需身份认证即可利用。漏洞原理在于应用程序在读取文件时未对用户输入进行充分的路径校验，攻击者可通过构造包含 ".."（点号）序列的请求参数绕过目录限制，从而访问 Web 服务器上任意文件的内容。该漏洞影响运行 YaBB 9.1.2000 版本的所有论坛系统，攻击者利用该漏洞可读取 Web 根目录之外的文件，可能导致配置文件、数据库凭证等敏感信息泄露，进而辅助后续攻击。攻击条件极为宽松：攻击者只需从网络层面即可向目标 YaBB 论坛发送特制请求，攻击复杂度低且无需任何身份凭据。利用方式简单直接，攻击者仅需在请求中使用 "../" 路径穿越序列即可遍历目录并读取任意文件，造成部分信息泄露风险。'
published = "2000-11-14T05:00:00.000"
remediation = "立即将 YaBB Bulletin Board 从 9.1.2000 升级至 YaBB 1 Gold SP1（9.1.2001）或更高版本，该补丁版本已在 YaBB.pl 的 Files.pm 和 Display.pm 模块中对 num 参数增加了输入验证，过滤 ..（点号）路径遍历序列及 %00 空字节，阻止攻击者通过 board=news＆action=display＆num=../../etc/passwd%00 读取服务器敏感文件。在无法立即升级的情况下，可通过 Web 服务器配置文件（如 Apache httpd.conf 或 .htaccess）对 YaBB.cgi 的 num 参数使用正则表达式规则拒绝包含 ../ 或 %00 的请求，并严格限制 YaBB 运行目录的 Web 服务器进程权限，将 Web 服务器使用账户的访问权限降至最低，防止 /etc/passwd、/etc/shadow 等系统文件被泄露。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "YaBB Bulletin Board 任意文件读取漏洞"
