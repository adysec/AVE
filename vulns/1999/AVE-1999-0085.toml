[basic]
description = "OpenSSL 及 SSLeay 早期版本（0.9.2b 之前）存在会话固定漏洞（CWE-384），远程攻击者无需身份认证即可重用已建立的 SSL 会话，从而绕过访问控制机制获取未授权访问权限。攻击者可通过诱导目标用户使用预先设定的会话标识建立 SSL 连接，随后利用该会话冒充合法用户执行敏感操作。该漏洞影响所有使用受影响版本 OpenSSL 和 SSLeay 的应用程序及服务，CVSS 评分 7.5，危害等级高。"
published = "1999-03-22T05:00:00.000"
remediation = "立即升级 OpenSSL 至 0.9.2b 或更高版本（当前最新稳定版为 3.x 系列）；SSLeay 已停止维护，应全面迁移至 OpenSSL。在应用层启用服务端会话超时机制，对每次 SSL 会话独立生成 session ID 并校验，防止未授权会话复用绕过访问控制。"
score = 7.5
severity = "HIGH"
sources = ["redhat"]
title = "OpenSSL OpenSSL SSL会话重用漏洞"
updated = "2026-06-16T21:48:22.500"

