[basic]
description = "Majordomo 是一款邮件列表管理软件，其 wrapper 组件存在本地权限提升漏洞。本地攻击者可通过向 wrapper 传递 `-C` 参数指定任意配置文件，从而以 Majordomo 运行权限执行恶意操作，获取非授权访问权限。该漏洞影响 Majordomo 1.94.4 及 1.94.5 版本，CVSS 评分 4.6，危害等级中危。攻击者需拥有本地系统访问权限方可利用。"
published = "1999-12-28T05:00:00.000"
remediation = "建议立即升级至 Majordomo 2.x 或更高版本（1.94.4/1.94.5 已不再维护），该漏洞在后续版本中已修复。使用 Red Hat Linux 的系统请安装 RHSA-2000-005 安全更新。如无法升级，可移除 wrapper 程序的 setuid 权限（`chmod u-s /usr/bin/wrapper`），并将 wrapper 文件权限设为仅 root 可执行（`chmod 700 /usr/bin/wrapper`），同时确保 Majordomo 配置目录仅对邮件管理员可写。"
score = 4.6
severity = "MEDIUM"
sources = ["redhat"]
title = "Majordomo 本地权限提升漏洞"
updated = "2026-06-16T21:50:52.263"

