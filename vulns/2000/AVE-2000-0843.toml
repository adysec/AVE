[basic]
description = "PostgreSQL 在 pg_shadow 和 pg_pwd 文件中以明文形式存储数据库用户名和密码，具有足够权限的攻击者（如数据库管理员或系统管理员）可直接读取这些文件获取所有用户凭据，进而访问其他数据库账户。该漏洞影响 PostgreSQL 6.3.2 及 6.5.3 版本，CVSS 评分 4.6，危害等级中危。由于密码未经过任何加密或哈希处理，内部攻击者利用难度较低，建议升级至修复版本或采用外部认证机制。"
published = "2001-08-31T04:00:00.000"
remediation = "升级 PostgreSQL 至 7.1 或更高版本（该版本起默认使用 MD5 加密存储密码）。如无法升级，在 postgresql.conf 中设置 password_encryption = md5 并重启服务，同时将 pg_hba.conf 中的认证方式改为 md5 而非 password。作为临时缓解措施，使用 chmod 600 限制 pg_shadow 和 pg_pwd 文件的系统权限，仅允许 postgres 系统用户读取。"
score = 4.6
severity = "MEDIUM"
sources = ["redhat"]
title = "PostgreSQL 明文密码存储漏洞"
updated = "2026-06-16T21:53:21.847"

