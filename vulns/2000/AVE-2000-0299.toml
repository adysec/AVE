[basic]
description = "Windows 95/98 系统的 NetBIOS 协议实现存在空指针引用漏洞，远程攻击者无需身份认证即可向目标主机的 NetBIOS 会话服务发送特制的源名为空的会话请求数据包，触发系统空指针解引用，导致目标系统蓝屏崩溃。该漏洞影响 Windows 95 和 Windows 98 操作系统，攻击者无法利用此漏洞获取代码执行权限，但可造成服务完全中断。由于 Windows 95/98 为消费者级操作系统且微软已停止支持，建议用户升级至受支持的 Windows 版本或禁用 NetBIOS over TCP/IP 服务以缓解风险。"
published = "2000-05-02T04:00:00.000"
remediation = "升级到 Windows 2000 或更高版本系统，或禁用 NetBIOS over TCP/IP（网络连接属性 → TCP/IP → 高级 → WINS → 禁用 NetBIOS over TCP/IP）。如无法升级，在边界防火墙阻断 UDP 137-139 及 TCP 445 端口以缓解风险。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Microsoft Windows 95/98 NetBIOS NULL Source Name 拒绝服务漏洞"
updated = "2026-06-16T21:51:31.690"

