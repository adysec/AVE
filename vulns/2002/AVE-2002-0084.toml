[basic]
description = "Xpdf 中的 pdftops 工具（版本 2.01 及更早版本）以及 CUPS 1.1.18 之前版本存在整数溢出漏洞。当解析 PDF 文件中的 ColorSpace 条目时，若该条目包含大量元素，程序在处理过程中会发生整数溢出，导致堆缓冲区溢出。本地攻击者可通过构造特制的 PDF 文件，诱骗目标用户使用 pdftops 或 CUPS 的 PDF 打印功能打开该文件，从而触发漏洞，实现以当前用户权限执行任意代码。该漏洞影响 Xpdf 2.01 及更早版本、xpdf-i 以及 CUPS 1.1.18 之前版本，CVSS 评分 7.2，危害等级高。"
published = "2003-01-02T05:00:00.000"
remediation = "升级 xpdf 至 2.01-2 及以上版本，或升级 CUPS 至 1.1.18 及以上版本。Debian 系统可安装 DSA-222（xpdf）和 DSA-232（CUPS）对应更新包。如无法立即升级，可限制本地用户对 pdftops 工具的访问权限，或禁用 CUPS 的 PDF 打印功能作为临时缓解措施。"
score = 7.2
severity = "HIGH"
sources = ["osv"]
title = "Xpdf pdftops 整数溢出代码执行漏洞"
updated = "2026-06-16T21:59:13.617"

