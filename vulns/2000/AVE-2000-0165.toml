[basic]
description = "EZShopper 3.0 的 search.cgi CGI 脚本存在路径遍历及命令注入漏洞，远程未经认证的攻击者可利用 ..（点点）目录遍历技术读取服务器上任意文件，或通过构造含 shell 元字符的恶意请求执行系统命令。该漏洞 CVSS 评分 7.5，危害等级高，攻击复杂度低，影响 EZShopper 3.0 版本。"
published = "2000-02-27T05:00:00.000"
remediation = "立即升级 EZShopper 至最新版本或应用厂商提供的安全补丁。如无法升级，请从服务器移除或重命名 search.cgi 脚本，或通过 Web 服务器配置（如 Apache 的 mod_rewrite 或 .htaccess）限制对该脚本的访问，仅允许授信 IP 段请求。同时确保 Web 服务器以低权限用户运行，禁用 CGI 目录的执行权限作为临时缓解措施。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "EZShopper search.cgi 任意文件读取和远程命令执行漏洞"
updated = "2026-06-16T21:51:11.027"

