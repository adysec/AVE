[basic]
description = "Red Hat Linux 7.x 及 6.x 系统中 pam_localuser PAM 模块存在缓冲区溢出漏洞。本地攻击者可通过向该模块提交特制的输入数据触发缓冲区溢出，从而获取 root 权限。该漏洞需要攻击者拥有本地系统访问权限，无法远程利用，但一旦成功利用可完全控制目标系统。受影响的系统包括 Red Hat Linux 6.x 和 7.x 系列版本。"
published = "2001-01-09T05:00:00.000"
remediation = "升级 PAM 软件包至修复版本（Red Hat Linux 6.x 升级至 pam-0.72-26 及以上，7.x 升级至 pam-0.72-26及以上），或安装 Red Hat 2000 年 11 月发布的安全公告 RHSA-2000:088 对应更新。由于 Red Hat Linux 6.x/7.x 已停止维护，建议迁移至受支持的 Red Hat Enterprise Linux 发行版，并确保 PAM 模块保持最新安全更新。"
score = 7.2
severity = "HIGH"
sources = ["redhat"]
title = "Red Hat Linux pam_localuser PAM 模块缓冲区溢出权限提升漏洞"
updated = "2026-06-16T21:53:20.653"

