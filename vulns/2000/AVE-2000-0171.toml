[basic]
description = "Corel Linux OS 1.0 的 buildxconfig 工具存在任意文件写入漏洞。由于该工具在处理 -x 和 -f 参数时未对用户指定的路径进行充分校验，本地攻击者可利用该漏洞向系统任意位置写入或修改文件，进而实现权限提升或以 root 身份执行任意代码。该漏洞仅需本地低权限账户即可触发，攻击复杂度低，影响系统完整性与机密性。"
published = "2000-02-24T05:00:00.000"
remediation = "立即移除 buildxconfig 的 setuid 权限：`chmod u-s /usr/bin/buildxconfig`；或将 Corel Linux OS 1.0 升级至仍受支持的 Linux 发行版（如 Debian/Ubuntu），该漏洞已在后续版本中修复。"
score = 7.2
severity = "HIGH"
sources = ["epss"]
title = "Corel Linux OS buildxconfig 本地任意文件写入漏洞"
updated = "2026-06-16T21:51:11.867"

