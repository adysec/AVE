[basic]
description = "tags as required by the skill specification.<value>Microsoft Network Monitor (Netmon) 存在缓冲区溢出漏洞，该漏洞源于网络监控协议解析过程中的输入长度验证不足。攻击者可通过向目标系统发送特制的数据包（如包含超长浏览器名称的CIFS浏览帧、超长SNMP社区名、超长用户名或文件名等）触发溢出，导致应用程序崩溃并执行任意命令。该漏洞影响 Windows 2000、Systems Management Server 和 Windows NT 等版本，攻击者无需身份验证即可远程利用，CVSS 评分 7.5 级。攻击者最终可完全接管目标系统，获取控制权并执行恶意操作。Microsoft 已发布安全补丁修复此漏洞，用户需及时更新以确保安全。Microsoft 已经在 2000 年 12 月的安全更新中修复此漏洞。预计到 2000-12-19"
published = "2000-12-19T05:00:00.000"
remediation = "立即安装微软安全公告 MS00-078 发布的补丁程序（Windows 2000 需安装 SP2 或更高版本，Windows NT 4.0 需安装 SP6a 及后续补丁包 Q277467），或升级至 Windows 2000 SP4 / Windows NT 4.0 SP6a 及后续补丁包。若无法立即打补丁，建议在防火墙层面封锁 TCP 139/445 端口（SMB）及 UDP 161/162 端口（SNMP），并禁用不必要的 NetMon 网络监控服务作为临时缓解措施。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "微软 系统管理服务器 Windows 2000 缓冲区溢出远程代码执行漏洞"
updated = "2026-06-16T21:52:40.397"

