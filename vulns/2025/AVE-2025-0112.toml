[basic]
description = "浪潮GS企业管理软件中的restfulserviceforweb.asmx接口存在SQL注入漏洞。该接口在处理RESTful请求参数时未对用户输入进行充分的过滤与转义，导致攻击者可通过构造恶意的SQL语句拼接至数据库查询中。未经身份认证的远程攻击者在能够访问该Web服务接口的网络条件下，即可通过发送特制的HTTP请求实施注入攻击，进而读取、篡改数据库中的敏感业务数据，甚至在特定配置下实现权限提升或进一步利用。此漏洞影响使用存在缺陷版本浪潮GS且对外暴露restfulserviceforweb.asmx服务的系统，可能导致企业核心业务数据泄露与系统被非法控制，危害较大。"
published = "0714"
remediation = "建议升级浪潮GS至官方最新安全版本（联系浪潮技术支持获取补丁包），对restfulserviceforweb.asmx接口实施输入参数严格校验与参数化查询改造；临时缓解措施可在WAF/IPS侧配置SQL注入规则拦截对/restfulserviceforweb.asmx的恶意请求。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "浪潮 GS restfulserviceforweb.asmx SQL注入漏洞"
updated = "0714"

