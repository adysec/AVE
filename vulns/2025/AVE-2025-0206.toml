[basic]
description = "帆软 FineReport 报表软件的 print_ie_pdf 模块存在 SQL 注入漏洞。未经身份认证的远程攻击者可通过向该模块的受影响接口发送特制 HTTP 请求，注入恶意的 SQL 语句到后台数据库查询中，导致敏感数据泄露、数据篡改或绕过权限控制执行任意数据库操作。该漏洞攻击门槛低，影响广泛部署于企业内网中的 FineReport 各版本报表系统，危害严重。"
published = "2025-01-01"
remediation = "联系帆软技术支持获取针对 print_ie_pdf 模块的安全补丁，升级至修复后的 FineReport 版本。同时配置 Web 应用防火墙过滤 SQL 注入攻击载荷，在 print_ie_pdf 模块的接口参数中添加输入验证和白名单过滤，限制该模块仅允许可信 IP 访问。如无法立即升级，建议在数据决策系统中临时禁用 print_ie_pdf 功能模块以规避风险。"
score = 5.0
severity = "MEDIUM"
sources = ["hwpoc"]
title = "帆软 FineReport 报表系统 print_ie_pdf 模块 SQL 注入漏洞"
updated = "2025-07-01"

