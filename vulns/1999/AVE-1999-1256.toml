[basic]
description = "IBM AIX 4.2 及更早版本中的 ping 命令在处理命令行参数时存在缓冲区溢出漏洞。由于 ping 以 root 权限的 SUID 位运行，攻击者可通过传递超长的命令行参数触发栈缓冲区溢出，从而在本地系统上获得 root 权限。该漏洞的 CVSS v2 评分为 7.2，攻击向量为本地、攻击复杂度低、无需权限验证，对机密性、完整性和可用性均造成完全影响。成功利用此漏洞需要攻击者拥有目标系统的本地 shell 访问权限。"
published = "1997-07-21"
remediation = "将 IBM AIX 升级至 4.3.2 或更高版本以修复此缓冲区溢出漏洞；如无法立即升级，可通过执行 chmod 555 /usr/sbin/ping 或 chmod u-s /usr/sbin/ping 移除 ping 命令的 SUID root 权限作为临时缓解措施，并限制普通用户对 ping 的执行权限。"
score = 7.2
severity = "HIGH"
sources = [
    "cve",
    "exploitdb",
]
title = "IBM AIX ping 命令本地缓冲区溢出漏洞"
updated = "2024-11-20"

