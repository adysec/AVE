[basic]
description = "ToxSoft NextFTP 1.82 FTP 客户端在处理 CWD（切换工作目录）命令时，未对用户输入的目录路径长度进行充分边界检查，导致栈缓冲区溢出。攻击者可通过构造超长的 CWD 命令参数，覆盖函数返回地址，从而在客户端系统上执行任意代码。该漏洞属于客户端侧漏洞，利用方式为远程攻击，攻击者需诱骗用户连接到恶意 FTP 服务器或访问恶意 FTP 站点触发溢出。成功利用后可导致客户端进程被控制，机密性、完整性和可用性均可能受损。"
published = "1999-08-03"
remediation = "NextFTP 已停止维护且无官方补丁，强烈建议更换为当前受支持的 FTP 客户端软件（如 FileZilla、WinSCP 等）。若短期内无法迁移，应避免使用该软件连接不受信任的 FTP 服务器，并在防火墙中限制其对外网络访问权限。"
score = 5.1
severity = "MEDIUM"
sources = [
    "cve",
    "nvd",
]
title = "ToxSoft NextFTP 1.82 CWD 命令缓冲区溢出漏洞"
updated = "1999-08-03"

