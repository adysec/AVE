[basic]
description = "Microsoft Windows 2000 Server 存在端口洪水拒绝服务漏洞，远程未经身份认证的攻击者可向目标系统的多个 TCP 和 UDP 端口持续发送二进制零数据流，导致系统 CPU 占用率异常飙升，耗尽 CPU 资源并导致拒绝服务。该漏洞影响 Windows 2000 Server 系统，攻击者无需身份认证即可通过网络远程发起攻击，攻击复杂度低，仅影响系统可用性（CVSS 5.0，AV:N/AC:L/Au:N/C:N/I:N/A:P）。攻击者可利用现有 PoC（如 ExploitDB-20048）向目标端口持续发送空字节流触发漏洞，导致系统响应缓慢或完全无响应。Microsoft 已发布补丁修复该漏洞，建议升级至修复版本或配置防火墙限制非必要端口访问。"
published = "2000-06-30T04:00:00.000"
remediation = '安装 Windows 2000 SP4 及更高版本，在注册表中启用网络洪水保护（HKEY_LOCAL_MACHINE\SYSTEM\CurrentControlSet\Services\Tcpip\Parameters 的 "EnableIPOptions" 为 0），同时在防火墙上配置端口限制和流量过滤规则，例如限制单位时间内对每个端口的 SYN 请求数，并部署硬件级网络入侵检测系统以阻止恶意 ICMP 流量。'
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Microsoft Windows 2000 端口泛洪拒绝服务漏洞"
updated = "2026-06-16T21:52:02.560"

