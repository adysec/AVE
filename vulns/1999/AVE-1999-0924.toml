[basic]
description = "WS_FTP Pro 6.0 在初始化文件 ws_ftp.ini 中使用弱加密算法存储用户口令，攻击者可通过网络获取该文件后轻易解密口令，导致敏感信息泄露和系统权限被非法获取。该漏洞利用难度低，无需身份认证即可远程利用。"
published = "1999-07-29"
remediation = "Ipswitch 已针对该漏洞发布安全更新，建议用户升级到 WS_FTP Pro 更高版本；对于已停止支持的版本，建议迁移至其他受安全维护的 FTP 客户端软件，并避免在配置文件中存储明文或弱加密口令。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "Ipswitch WS_FTP Pro 6.0 ws_ftp.ini 配置文件口令弱加密漏洞"
updated = "2026-06-16"

