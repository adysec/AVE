[basic]
description = "Windows 内核模式驱动 win32k.sys 中存在权限提升漏洞（MS14-058），由于系统未正确模拟菜单弹出操作时对内核对象处理不当，导致用户态应用程序可触发内核级内存访问异常。本地攻击者通过运行特制应用程序即可利用该漏洞，在目标系统上获取 SYSTEM 权限，从而完全控制受影响主机。该漏洞影响 Windows Server 2003 SP2、Vista SP2、Server 2008 SP2/R2 SP1、Windows 7 SP1、Windows 8/8.1、Server 2012 Gold/R2 及 Windows RT Gold/8.1 等多个版本，已在 2014 年 10 月被野外利用，属于高危害等级漏洞。Microsoft 在 MS14-058 安全公告中修复了此漏洞。"
published = "2014-10-15T10:55:07.473"
remediation = "立即安装 Microsoft 安全公告 MS14-058 提供的更新 KB3000061。Windows Server 2003 用户通过 Windows Update 或手动下载对应版本补丁安装；Windows Vista/7/8/8.1/Server 2008/2012 用户通过 Windows Update 自动更新或手动下载 Windows6.1-KB3000061-x86/x64.msu 等对应补丁包安装。安装后须重启系统。Windows 8 及以上版本默认禁用 NULL 页映射，可缓解该漏洞利用；无法立即打补丁时，限制用户本地登录权限，防止非授权用户执行提权程序。"
score = 7.8
severity = "HIGH"
sources = ["kev"]
title = "Microsoft Windows win32k.sys 本地权限提升漏洞"
updated = "2026-06-17T00:09:27.350"

