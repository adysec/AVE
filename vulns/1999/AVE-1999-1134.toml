[basic]
description = "Sudo 1.5 存在信息泄露漏洞，本地用户通过尝试将目标文件名作为程序执行，系统在文件不存在时返回不同的错误提示，从而可探测任意文件是否存在。该漏洞影响 Debian Linux 2.1 和 Red Hat 6.0 等早期 Linux 发行版，CVSS 评分 2.1，危害等级低，攻击者需具有本地系统访问权限。"
published = "1999-06-08T04:00:00.000"
remediation = "升级 Sudo 至 1.5.1 或更高版本，该版本修复了因不同错误信息而泄露文件存在性的问题。对于 Debian 2.1 或 Red Hat 6.0 等已停止维护的系统，建议整体升级至受支持的现代 Linux 发行版，确保 Sudo 版本不低于 1.8，以根除该信息泄露风险。"
score = 2.1
severity = "LOW"
sources = ["avd"]
title = "Sudo 文件存在性信息泄露漏洞"
updated = "2026-06-16T21:50:33.947"

