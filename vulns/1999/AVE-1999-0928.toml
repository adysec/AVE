[basic]
description = 'Jana WebServer 1.0至1.46版本中存在目录遍历漏洞，远程攻击者无需身份认证即可通过向服务器发送特制的"......"（变形点点攻击）请求，绕过路径限制读取服务器上的任意文件，导致敏感信息泄露。该漏洞利用方式简单，影响t. hauck Jana代理Web服务器的多个版本。'
published = "1999-10-08T04:00:00.000"
remediation = "该漏洞影响已停止维护的 Jana WebServer 1.40，厂商已不再提供安全更新。建议立即停止使用该产品，迁移至受支持的 Web 服务器（如 Apache HTTP Server 或 Nginx）。如无法立即替换，可在反向代理或 WAF 层过滤包含连续点号（如 `......`）等目录遍历特征的 URL 请求路径作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "T. Hauck Jana WebServer 目录遍历漏洞"
updated = "2026-06-16T21:49:41.017"

