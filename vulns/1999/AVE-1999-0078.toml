[basic]
description = 'Netscape Communicator 4.5 浏览器的 "talkback" 崩溃报告功能存在本地权限滥用漏洞。当一位用户的 Netscape 程序崩溃时，talkback 组件未能正确隔离进程间操作权限，允许同一系统上的本地攻击者利用该机制向任意其他用户的进程发送终止信号，导致非授权进程被终止。攻击者需具有本地系统访问权限且目标用户需运行易受攻击的 Netscape 版本，造成拒绝服务或关键服务中断。'
published = "1999-03-18T05:00:00.000"
remediation = "升级至 Netscape 4.6 及以上版本可修复此漏洞。对于无法升级的环境，建议禁用 talkback 功能：删除或重命名 Netscape 安装目录下的 talkback 可执行文件，或通过配置文件禁用 crash reporter 组件。鉴于 Netscape 浏览器已停止维护，强烈建议迁移至 Firefox 或 Chrome 等现代浏览器。"
score = 6.4
severity = "MEDIUM"
sources = ["epss"]
title = "Netscape Communicator talkback 本地进程终止漏洞"
updated = "2026-06-16T21:48:22.143"

