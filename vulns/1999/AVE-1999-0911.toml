[basic]
description = "tags.<value>Vermillion FTP Daemon VFTPD 1.23 存在缓冲区溢出漏洞。未经身份认证的远程攻击者可通过向目标 FTP 服务连续发送多个超长的 CWD（切换工作目录）命令，触发服务端缓冲区溢出，进而导致拒绝服务，并可能执行任意系统命令。该漏洞影响运行 VFTPD 1.23 的所有服务器，攻击者无需任何凭据，仅需连接至 21 端口即可发起利用。"
published = "1999-11-22T05:00:00.000"
remediation = "立即停用并卸载存在漏洞的 Vermillion FTP Daemon (VFTPD) 1.23，替换为仍在维护的开源 FTP 服务（如 vsftpd、ProFTPD）至最新版本；若必须短期保留，可在边界防火墙限制仅允许受信 IP 访问 TCP 21 端口，并部署入侵检测规则阻断包含超长 CWD 命令的 FTP 请求作为临时缓解。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "Vermillion FTP Daemon 缓冲区溢出拒绝服务漏洞"
updated = "2026-06-16T21:49:37.050"

