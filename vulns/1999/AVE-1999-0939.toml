[basic]
description = "系统运行了 RPC 端口映射服务（rpcbind），该服务会向远程查询者暴露主机上运行的所有 RPC 服务的程序号、版本号和端口号。未经身份认证的远程攻击者可利用该服务收集系统上运行的 RPC 服务清单，从而获取目标系统信息以辅助进一步攻击，构成信息泄露风险。"
published = "1999-01-01T05:00:00.000"
remediation = "在网络边界防火墙上阻止 TCP/UDP 111 端口的入站流量，防止外部枚举 RPC 服务。如业务不需要 RPC 服务，可禁用 portmap/rpcbind 服务（Linux 上执行 `systemctl disable rpcbind && systemctl stop rpcbind`）；若需使用，应限制仅信任来源 IP 可访问，避免暴露在公网。"
score = 7.3
severity = "HIGH"
sources = ["avd"]
title = "通用 RPC Portmapper 服务信息泄露漏洞"
updated = "2026-06-16T21:48:45.710"

