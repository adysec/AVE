[basic]
description = "Microsoft Internet Explorer 5 直接显示过滤器（MSDXM.OCX）中存在缓冲区溢出漏洞，导致未经身份认证的远程攻击者可通过 vnd.ms.radio 协议向目标系统发送精心构造的数据包触发漏洞，实现远程代码执行。该漏洞严重威胁 Internet Explorer 5 所有版本用户，攻击者无需任何权限即可远程控制受影响系统，存在极大安全风险。尽管 Microsoft 于 1999 年初发布了安全更新，但许多用户仍未应用补丁，漏洞仍处于广泛曝光状态，攻击者可利用这一漏洞劫持受害者浏览器，执行恶意代码，窃取敏感信息或进一步攻击内部网络。"
published = "1999-12-06T05:00:00.000"
remediation = "` tags. I need to provide a specific remediation plan.<value>建议升级到Internet Explorer 5.01 SP2及以上版本或切换使用Microsoft Edge浏览器，并彻底禁用vnd.ms.radio协议处理，若无法立即升级，可临时将注册表中的vnd.ms.radio项删除以阻止调用。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
