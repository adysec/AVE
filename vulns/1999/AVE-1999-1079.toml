[basic]
description = "Windows NT 3.51 及 4.0 系统中存在本地拒绝服务漏洞。本地用户可通过运行程序对同一文件创建大量锁，导致系统非分页池（NonPagedPool）资源耗尽，从而触发系统崩溃。该漏洞攻击前提为拥有本地登录权限，无法远程利用，影响范围限于 Windows NT 系列版本，CVSS 评分 2.1，危害等级低。"
published = "1999-12-31T05:00:00.000"
remediation = '建议升级至 Windows NT 4.0 Service Pack 6a 或更高版本系统（如 Windows 2000/XP），此漏洞在后续版本中已修复。对于无法升级的系统，可通过组策略限制非授信用户的本地交互式登录权限，降低攻击面。在注册表 `HKLM\SYSTEM\CurrentControlSet\Control\Session Manager\Memory Management` 中调整 `NonPagedPoolSize` 值可缓解资源耗尽风险。'
score = 2.1
severity = "LOW"
sources = ["cve"]
title = "Microsoft Windows NT 本地拒绝服务漏洞"
updated = "2026-06-16T21:50:16.840"

