[basic]
description = "Novell NetWare 目录服务（NDS）安装默认配置存在信息泄露漏洞。未经身份认证的远程攻击者连接到 NetWare 4.x 或 IntranetWare 服务器时，将以未登录状态获得对 NDS 目录树的默认读取权限。该权限从目录树根节点向下继承，使得攻击者无需任何凭据即可使用系统自带的 CX.EXE 和 NLIST.EXE 工具枚举整个目录树结构，获取用户名、组信息、服务器名称及操作系统版本等敏感数据。攻击者可结合上下文切换和不同服务器的连接操作，逐步绘制完整的 NDS 目录拓扑，进而获取潜在用户账户列表作为后续暴力破解的素材。该漏洞影响 Novell NetWare 4.1、4.11 及安装了 NDS 5.99 的系统，影响范围覆盖几乎所有 NetWare 3.x 及以上版本。默认情况下系统未启用入侵检测功能，攻击行为难以被及时发现。修复方案包括禁用 NDS 目录树根节点的公开读取权限、启用根节点入侵检测功能，并确保所有账户设置高强度密码。"
published = "1998-09-18T04:00:00.000"
remediation = "在 NDS 管理工具中禁用 NDS 树根部的公共 Read 权限，确保所有用户账户均设置强密码并开启入侵检测功能。如已使用 DSREPAIR 或 DSMAINT 等全局工具，需重新检查并确认 NDS 权限设置未被重置。对于无法修改配置的老旧系统，可通过防火墙限制 SYS:LOGIN 目录下 CX.EXE 和 NLIST.EXE 的远程访问作为临时缓解措施。"
score = 7.5
severity = "HIGH"
