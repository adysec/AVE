[basic]
description = "SunOS 系统中 SMI Sendmail 4.0 及更早版本存在安全漏洞，远程攻击者无需身份认证即可利用该漏洞访问目标系统上的用户 bin 目录，可能导致敏感信息泄露或进一步权限提升。该漏洞影响 SunOS 4.0.3 及以下版本，CVSS 评分 7.5，危害等级高。建议用户升级至最新版本或应用厂商提供的安全补丁以修复此漏洞。"
published = "1990-01-29T05:00:00.000"
remediation = "升级 SunOS 至 4.1 或更高版本（已包含修补后的 Sendmail）；或单独升级 Sendmail 至 5.0 以上版本。如无法升级，安装 Sun 补丁 100078-01/100079-01。临时缓解措施：移除 Sendmail 的 setuid root 权限，将 /usr/lib/sendmail 权限设为 755；或在 inetd.conf 中注释 sendmail 行并重启服务以禁用 SMTP 守护进程。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "Sun SunOS SMI Sendmail 远程访问漏洞"
updated = "2026-06-16T21:50:35.230"

