[basic]
description = "Allaire ColdFusion Server 4.0 及 4.0.1 版本中的 CFCACHE 标签会将临时缓存文件写入 Web 文档根目录，远程攻击者无需身份认证即可直接通过浏览器访问这些缓存文件，获取包含敏感系统信息的缓存内容，导致信息泄露。该漏洞利用方式简单，影响范围涵盖 ColdFusion Server 4.0 和 4.0.1 版本。"
published = "2000-01-04T05:00:00.000"
remediation = "立即升级至 Adobe ColdFusion 2021 Update 11 或更高版本，该漏洞在 ColdFusion 5.0 中已修复。若无法升级，应将 CFCACHE 标签的 cachedir 属性配置为 Web 文档根目录以外的路径，避免缓存文件被直接访问；同时在 Web 服务器中添加访问控制规则，禁止用户直接访问 .ucf 等缓存相关文件扩展名。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "Allaire ColdFusion Server CFCACHE标签敏感信息泄露漏洞"
updated = "2026-06-16T21:50:54.753"

