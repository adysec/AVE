[basic]
description = "Ultimate Bulletin Board（终极公告板）将数据文件存储在 cgi-bin 目录下，当 HTTP 服务器尝试执行这些文件时若发生错误，远程攻击者可通过直接访问该目录下的数据文件路径，导致敏感信息泄露。该漏洞影响 Ultimate Bulletin Board 相关版本，攻击者无需身份认证即可利用，危害等级中危。"
published = "1999-11-01T05:00:00.000"
remediation = "将 Ultimate Bulletin Board 升级至官方修复版本（v5.47 及以上，即 5.46a 之后的正式版本），并将 data 数据文件从 cgi-bin 目录移至 Web 根目录之外的非可执行目录（如 /home/ubb/data），同时在 Web 服务器配置中禁止对数据文件目录的脚本执行权限并限制直接 HTTP 访问（如添加 Options -ExecCGI 及访问拒绝规则），以杜绝因执行错误导致数据文件被远程读取的风险。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Ultimate Bulletin Board 访问控制漏洞"
updated = "2026-06-16T21:49:11.770"

