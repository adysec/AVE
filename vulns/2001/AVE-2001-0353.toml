[basic]
description = "Red Hat Linux 7.0 及更早版本中的 DVI 打印过滤器（dvips）默认配置存在安全缺陷，当通过 lpd 守护进程调用 dvips 时未启用安全模式。未经身份认证的远程攻击者可向目标系统发送特制 DVI 文件，其中包含恶意打印命令，当 lpd 处理该文件并调用 dvips 时，恶意命令将在目标系统上以较高权限执行，导致攻击者获得系统权限提升。该漏洞影响 Red Hat Linux 6.2、7.0 及 7.1 等版本，CVSS 评分 7.5，危害等级较高。攻击者无需预先认证即可利用此漏洞，只需能够向目标系统的 lpd 打印服务提交恶意 DVI 文件即可完成远程命令执行。"
published = "2001-08-31T04:00:00.000"
remediation = '安装 Red Hat 安全更新 RHSA-2001:126，升级 tetex-dvips 及 rhs-printfilters 软件包至修复版本。如无法立即更新，临时修改 /usr/lib/rhs/rhs-printfilters/dvi-to-ps.fpi 配置文件，在 dvips 命令行中添加 -R 安全模式参数（将 dvips -f $DVIPS_OPTIONS 改为 dvips -R -f $DVIPS_OPTIONS），阻止 \special{} 宏中的 shell 命令执行；如系统无需 DVI 打印功能，可直接从 /etc/printcap 中移除对应的 dvi printfilter 条目以彻底消除攻击面。'
score = 7.5
severity = "HIGH"
sources = ["redhat"]
title = "Red Hat Linux Lpd 远程命令执行漏洞"
updated = "2026-06-16T21:55:23.407"

