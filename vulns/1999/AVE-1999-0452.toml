[basic]
description = "NCSA HTTPd 1.3 版本存在远程缓冲区溢出漏洞，远程攻击者可通过向目标服务器发送特制的 HTTP 请求触发该漏洞，导致缓冲区越界写入，进而实现远程命令执行。该漏洞影响 NCSA HTTPd 1.x 系列版本，无需身份认证即可远程利用，CVSS 评分 7.5，危害等级高。"
published = "1997-09-23T04:00:00.000"
remediation = "NCSA HTTPd 已停止维护多年，建议立即迁移至 Apache HTTP Server 2.4.x 或 Nginx 等现代 Web 服务器。迁移后需重新配置虚拟主机、访问控制和 SSL 证书，并关闭旧服务器上的 80/443 端口。如无法立即迁移，可在防火墙层面限制对 80 端口的访问来源 IP 作为临时缓解措施。"
score = 7.5
severity = "HIGH"
sources = ["exploitdb"]
title = "NCSA HTTPd 远程缓冲区溢出漏洞"
updated = "2026-06-16T21:48:02.227"

