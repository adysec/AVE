[basic]
description = "True North Internet Anywhere Mail Server 3.1.3 版本的 POP3 服务存在拒绝服务漏洞，未经身份认证的远程攻击者可通过向目标服务器发送大量并发连接请求，耗尽服务器连接资源池，导致 POP3 服务崩溃或无法响应正常请求，影响邮件服务的正常可用性。该漏洞影响 Internet Anywhere Mail Server 3.1.3 版本，无需特殊权限即可远程触发，CVSS 评分 5.0，危害等级中等。"
published = "2000-02-10T05:00:00.000"
remediation = "该漏洞极旧，厂商 True North Software 已停止维护该产品。建议措施：1) 升级到 Internet Anywhere Mail Server 3.3 及以上版本（若仍可获得）；2) 在服务器端 SMTP/POP3 服务中配置最大并发连接数限制（如 MaxConnections=100）；3) 在防火墙层面限制对 POP3 端口（110/TCP）的源 IP 连接速率，防止单一来源大量连接耗尽服务资源；4) 长期建议迁移至仍受支持的现代邮件服务器（如 Dovecot + Postfix）。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "True North Internet Anywhere Mail Server POP3 拒绝服务漏洞"
updated = "2026-06-16T21:51:04.987"

