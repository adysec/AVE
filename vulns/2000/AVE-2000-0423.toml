[basic]
description = "Linux 2.2.16 之前版本内核的 capabilities 功能存在权限管理缺陷，本地攻击者可通过设置 capabilities 阻止 setuid 程序正确丢弃特权，从而绕过系统权限限制实现权限提升或导致拒绝服务。该漏洞影响 Linux 2.2.x 及 2.4.0-test1 内核版本，CVSS 评分 10.0，危害等级严重。攻击者需要本地系统访问权限，利用方式简单，已有公开利用代码。"
published = "2000-06-09T04:00:00.000"
remediation = "升级到 Linux 内核 2.2.16 或更高版本（Red Hat 用户安装对应内核更新 RHSA-2000:037），禁用 setuid 程序中不需要的 capabilities 特性，并限制本地用户对内核 capabilities 的访问权限。"
score = 10
severity = "CRITICAL"
sources = ["redhat"]
title = "Linux Kernel capabilities 本地权限提升漏洞"
updated = "2026-06-16T21:51:52.870"

