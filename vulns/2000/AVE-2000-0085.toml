[basic]
description = "Make-a-Store OrderPage 购物车应用程序存在敏感信息修改漏洞，该应用程序在处理用户提交的订单信息时，将商品价格、数量等关键购买数据以隐藏表单字段（hidden form fields）的形式存储于客户端页面中。远程攻击者可通过直接修改这些隐藏表单字段的值，在未授权的情况下篡改订单金额、商品数量等敏感交易信息，实现低价购买高价商品或以非正常价格完成交易。此漏洞利用难度低，无需身份认证，仅需基本的 HTTP 请求拦截与修改能力即可完成攻击，对在线购物系统的交易完整性和数据安全性构成直接威胁。"
published = "2000-02-01T05:00:00.000"
remediation = "将价格、数量等敏感参数从隐藏表单字段迁移至服务端 Session 存储，禁止客户端提交价格字段；对提交的订单数据在服务端进行完整性校验和权限验证；升级 Make-a-Store 至含服务端校验的最新版本，或更换为现代购物车系统。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "Make-a-Store OrderPage 购物车应用程序信息修改漏洞"
updated = "2026-06-16T21:51:00.167"

