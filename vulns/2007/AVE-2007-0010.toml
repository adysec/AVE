[basic]
description = "libpng 在处理 PNG 图像时，其 pngrutil.c 文件中的 png_handle_tRNS 函数存在缺陷。当解析带有异常 tRNS 数据块 CRC 校验值的灰度 PNG 图像时，未能正确校验数据块完整性，导致程序崩溃。远程攻击者可通过向目标系统发送特制的灰度 PNG 图像文件触发此漏洞，造成拒绝服务。该漏洞影响 libpng 1.0.25 之前版本及 1.2.x 系列 1.2.17 之前版本，CVSS 评分 5.0，危害等级中危。用户应升级至 libpng 1.0.25 或 1.2.17 及以上版本修复此漏洞。"
published = "2007-05-16T22:30:00.000"
remediation = "将 libpng 升级至 1.0.25 或 1.2.17 及以上版本。各发行版用户：Debian/Ubuntu 运行 `apt-get install --only-upgrade libpng`，Red Hat/CentOS 运行 `yum update libpng`，Gentoo 运行 `emerge --sync && emerge -u libpng`。如无法立即升级，可在应用层对 PNG 文件的 tRNS chunk 进行 CRC 校验过滤，拒绝 CRC 校验失败的灰度 PNG 图像。"
score = 5
severity = "MEDIUM"
sources = ["tenable"]
title = "libpng PNG 图片处理拒绝服务漏洞"
updated = "2026-06-16T22:39:36.337"

