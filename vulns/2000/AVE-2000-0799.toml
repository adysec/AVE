[basic]
description = "AnalogX Proxy Server 4.04 及更早版本中存在缓冲区溢出漏洞，远程攻击者无需身份认证即可向目标系统发送特制的 SOCKS4 CONNECT 请求，在用户名字段中填入超长字符串触发缓冲区溢出，导致目标服务进程崩溃，造成拒绝服务。该漏洞影响 AnalogX Proxy Server 4.04 及之前所有版本，攻击复杂度较低。"
published = "2000-07-25T04:00:00.000"
remediation = "升级 AnalogX Proxy 至 4.05 或更高版本以修复 SOCKS4 请求处理中的缓冲区溢出。如无法升级，在防火墙层面限制对 TCP 1080 端口的访问，仅允许可信 IP 段连接，并禁用不必要的 SOCKS4 代理功能。由于该产品已停止维护，建议迁移至现代代理服务器（如 Squid）作为长期解决方案。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "AnalogX Proxy Server 缓冲区溢出拒绝服务漏洞"
updated = "2026-06-16T21:52:12.557"

