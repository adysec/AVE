[info]
author = "AVE"
description = "检测HTTP响应中是否包含Netscape 4.75 HTML解析器缓冲区溢出利用载荷（shellcode特征字节），该漏洞通过超长表单password字段触发，远程攻击者可执行任意命令"
id = "POC-AVE-2000-0930"
name = "Netscape 4.75 HTML解析器缓冲区溢出远程代码执行漏洞 PoC"
severity = "high"
tags = ["cve-2000-1187"]
vuln_id = [
    "CVE-2000-1187",
    "AVE-2000-0930",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["33c9b1103fe906513cfa4733c050f7d050"]
