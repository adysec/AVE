[basic]
description = "Linux 内核 cacheinfo 子系统在处理不同层级共享缓存时存在越界读取漏洞。由于 shared_cpu_map 在构建时仅检查相同索引的缓存共享关系，当 CPU 间缓存层级结构不一致时，会触发 slab 越界访问（CWE-125），且当共享缓存在不同 CPU 上索引不同时会导致 CPU 映射错误。本地攻击者可利用此漏洞获取敏感内核内存信息，影响使用该内核版本的所有 Linux 系统，CVSS 评分 7.1，危害等级高。"
published = "2025-09-15T15:15:52.727"
remediation = "将 Linux 内核升级至 6.1.18、6.2.5 或 6.3 及以上版本对应稳定分支已包含修复提交（commit dea49f2993f5、2f588d0345d6、198102c9103f）。无法升级时可手动 cherry-pick 上述三个补丁至 affected 内核的 `drivers/base/cacheinfo.c` 并重新编译内核模块。"
score = 7.1
severity = "HIGH"
sources = ["msrc"]
title = "Linux Kernel cacheinfo 共享缓存映射越界读取漏洞"
updated = "2026-06-17T06:44:38.793"

