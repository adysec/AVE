[basic]
description = "Cisco PIX Private Link 4.1.6及更早版本在处理配置文件中的特定命令时存在加密强度削弱漏洞，导致 DES 密钥有效长度从标准 56 位降低至 48 位。攻击者可利用该弱点对加密通信实施暴力破解，从而获取敏感信息。该漏洞影响 Cisco PIX 防火墙设备的 Private Link 功能，CVSS 评分 7.5，危害等级高。厂商已发布安全公告并提供修复建议。"
published = "1999-12-31T05:00:00.000"
remediation = "升级 Cisco PIX Private Link 至 4.2 及以上版本，其中已修复 DES 密钥处理逻辑，恢复完整密钥长度。如无法升级或产品已停服，应将加密方案迁移至 AES（如 IPsec 配置中改用 AES-128/256），弃用 DES 算法；同时在防火墙 ACL 中限制可访问 PIX Private Link 管理接口的源 IP 范围，减少暴力破解攻击面。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "Cisco PIX Private Link 配置文件加密漏洞"
updated = "2026-06-16T21:49:43.327"

