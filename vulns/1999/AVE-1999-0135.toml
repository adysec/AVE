[basic]
description = "HP-UX 10.20 操作系统中的 newgrp 程序存在缓冲区溢出漏洞，该程序用于切换用户组身份。本地攻击者可通过向 newgrp 程序提交特制的输入参数触发缓冲区溢出，覆盖内存中的返回地址或函数指针，从而劫持程序执行流程以获取 root 权限。该漏洞影响 HP-UX 10.20 版本，攻击者需拥有本地系统访问权限方可利用，CVSS 评分 7.2，危害等级高危。"
published = "1996-12-01T05:00:00.000"
remediation = "升级 HP-UX 系统至 11.00 或更高版本，该漏洞已在后续版本中修复。如无法升级，可临时移除 /usr/bin/newgrp 的 setuid 权限（chmod u-s /usr/bin/newgrp），这将导致普通用户无法使用 newgrp 命令切换组，但可防止本地提权攻击。同时应用 HP 官方安全补丁包（通过 swinstall 安装最新 Recommended Patch Bundle），并限制可登录系统的用户范围作为纵深防御措施。"
score = 7.2
severity = "HIGH"
sources = ["epss"]
title = "HP HP-UX newgrp 缓冲区溢出本地权限提升漏洞"
updated = "2026-06-16T21:47:27.550"

