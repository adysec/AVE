[basic]
description = "Linux 内核 ath11k 无线驱动存在缓冲区溢出漏洞。ath11k 驱动注册时报告最大支持 16 个 SSID 的主动探测请求，但 scan_req_params 结构体仅能容纳 10 个 SSID。本地攻击者可通过 wpa_supplicant 用户态程序触发 SSID 拷贝操作，导致越界写入覆盖 extraie 指针，造成缓冲区溢出。该漏洞影响使用 ath11k 驱动的 Qualcomm 平台设备，CVSS 评分 5.5，危害等级中等。"
published = "2025-02-26T07:01:29.293"
remediation = "升级包含提交 `373e4b709c7e` 的 Linux 内核版本（如 5.18+ 长期支持分支），将 ath11k 驱动中 `max_ssids` 和 `max_bssids` 分别设为 16 和 4 以匹配 firmware 实际容量。如无法立即更新内核，可在加载 ath11k 模块后通过 `iw wlan0 scan` 限制 userspace 扫描参数作为临时缓解。"
score = 5.5
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux kernel ath11k 驱动缓冲区溢出漏洞"
updated = "2026-06-17T05:18:22.197"

