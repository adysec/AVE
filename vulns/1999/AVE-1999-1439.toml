[basic]
description = "KDE 1.0 中的 Kmail 邮件客户端存在敏感信息泄露漏洞。Kmail 在调用外部程序处理 PGP 加密邮件时，将 PGP 私钥密码以命令行参数形式传递给子进程，导致本地攻击者可通过 ps 等进程列表工具查看其他用户的命令行参数，从而获取 PGP 密码并解密或伪造其加密通信。该漏洞影响 KDE 1.0 版本，攻击者需拥有本地系统访问权限，CVSS 评分 4.6，危害等级中危。"
published = "1998-07-11T04:00:00.000"
remediation = "升级到 KDE 1.1 或更高版本，该版本已修复将 PGP 口令作为命令行参数传递的问题，改用标准输入传递口令防止被其他进程窃取。如无法升级，可使用 gpg-agent 缓存口令避免每次输入。限制不可信用户登录系统。"
score = 4.6
severity = "MEDIUM"
sources = ["avd"]
title = "KDE Kmail PGP密钥口令泄露漏洞"
updated = "2026-06-16T21:50:04.823"

