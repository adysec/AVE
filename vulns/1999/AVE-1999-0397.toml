[basic]
description = "Solaris/SunOS 系统中的 NFS mount 守护进程在处理超长导出列表（超过 256 字符）时存在访问控制绕过漏洞。当导出列表超出长度限制时，权限校验机制失效，导致任意远程攻击者可通过标准 NFS 挂载命令访问本应受限的 NFS 共享目录。该漏洞影响 Solaris/SunOS 系统，CVSS 评分 5.0，中危等级。攻击者无需认证即可通过网络利用此漏洞获取未授权文件访问权限。"
published = "1994-02-14T05:00:00.000"
remediation = "立即升级受影响的 SunOS/Solaris 系统至厂商已修复版本（如 Solaris 2.5.1 及以上），或安装 Sun 安全补丁 105950-01。若无法升级，应在 /etc/exports 中为每条 NFS 共享显式限制可访问主机（如使用 rw=host 选项禁止通配符），并在 inetd.conf 中禁用 mountd 或使用 tcpwrappers 限制 mountd 访问来源。同时建议在边界防火墙上阻断 NFS 相关端口（2049/TCP/UDP、111/TCP/UDP）。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Sun Solaris NFS mountd 未授权目录挂载漏洞"
updated = "2026-06-16T21:47:55.270"

