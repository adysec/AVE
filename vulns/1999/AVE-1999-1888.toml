[basic]
description = "Apache HTTP Server 1.2.5 及更早版本中的 mod_proxy 模块存在拒绝服务漏洞，远程攻击者可通过向服务器发送特制的畸形 FTP 命令请求，触发代理模块在处理时发生段错误导致进程崩溃（dump core），从而使 Apache 服务无法继续正常处理请求。该漏洞影响 Apache 1.2.5 及之前所有版本，攻击者只需发送恶意构造的 FTP 请求即可造成服务中断，CVSS 评分高达 10.0，危害严重。"
published = "1999-12-31T05:00:00.000"
remediation = "升级 Apache HTTP Server 至 1.3.x 或更高版本（Apache 1.2.x 已停止维护）。如无法升级，在 httpd.conf 中移除或注释 `LoadModule proxy_module` 禁用 mod_proxy 模块，并限制 FTP 出站连接以缓解恶意 FTP 命令攻击。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "Apache HTTP Server mod_proxy 畸形FTP命令拒绝服务漏洞"
updated = "2026-06-16T21:50:07.733"

