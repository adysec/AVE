[basic]
description = "这是一个影响 RealPlayer 的堆缓冲区溢出漏洞，攻击者可通过精心构造的 Internet Video Recording (IVR) 文件触发。漏洞存在于 RealPlayer 运行时 DLL 文件中，由于对特定字段长度控制不足导致堆 corruption，进而实现远程代码执行。该漏洞影响 RealPlayer 10 至 11.0.4 版本、RealPlayer Enterprise、Mac RealPlayer 10/10.1、Linux RealPlayer 10 及 Helix Player 10.x 等多个平台和操作系统。攻击者无需身份验证，只需向目标发送恶意 IVR 文件即可利用此漏洞，攻击过程可能通过 Windows Explorer 插件完成。漏洞 CVSS 评分高达 9.3，攻击者可完全控制受影响系统，窃取敏感数据或安装恶意软件。攻击者还可能通过邮件附件、网络共享或其他文件传输方式传播恶意 IVR 文件。RealNetworks 已发布安全补丁，升级到 RealPlayer SP 1.0.5 或更高版本可修复此漏洞。用户应及时更新 RealPlayer 到最新安全版本，以防止此类威胁。"
published = "2009-02-08T21:30:09.813"
remediation = "建议立即升级至 RealPlayer SP 1.0.5 或更高版本（RealPlayer 11.0.5+、RealPlayer Enterprise 2.0+、Mac RealPlayer 10.1.1+、Linux RealPlayer 10.0.1+、Helix Player 10.1+）。若暂时无法升级，可在 Windows 资源管理器中取消 .ivr 文件关联，或在防火墙层面禁止 RealPlayer 访问网络，禁用 RealPlayer 浏览器插件作为临时缓解措施。Windows 用户可通过“控制面板 → 程序 → 默认程序 → 设置关联”取消 .ivr 关联；Linux/Mac 用户可删除或重命名 RealPlayer 浏览器插件文件（如 /usr/lib/mozilla/plugins/nphelix*.so）。"
score = 9.3
severity = "CRITICAL"
sources = ["tenable"]
title = "RealNetworks RealPlayer 堆缓冲区溢出远程代码执行漏洞"
