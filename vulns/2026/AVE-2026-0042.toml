[basic]
description = "禅道项目管理系统存在权限绕过漏洞，未授权远程攻击者可通过构造特制的HTTP请求绕过身份认证机制，直接访问需要登录权限的后台接口，从而获取系统敏感信息或执行未授权操作。该漏洞影响禅道多个版本，攻击无需用户交互，危害等级高。建议用户及时升级到最新版本以修复此漏洞。"
published = "08.08"
remediation = "建议立即升级禅道至以下安全版本：开源版 ≥ 16.5、企业版 ≥ 6.5、旗舰版 ≥ 3.0。如无法立即升级，可在 Web 服务器（Nginx/Apache）层面对 `/zentao/user-login.html` 路径添加访问白名单或 IP 限制，并开启 WAF 规则拦截 SQL 注入载荷作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "禅道 权限绕过漏洞"
updated = "08.08"

