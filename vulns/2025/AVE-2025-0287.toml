[basic]
description = "用友 U8 Cloud 的 QuerySoapServlet 接口未对用户输入进行有效的过滤和参数化处理，存在 SQL 注入漏洞。未经身份认证的远程攻击者可通过向该接口发送特制的 HTTP 请求，在数据库查询语句中注入恶意 SQL 代码，从而窃取、篡改或删除数据库中的敏感数据，甚至可能获取服务器操作系统权限。该漏洞影响用友 U8 Cloud 多个版本，危害严重。"
published = "0723"
remediation = "立即联系用友官方获取 U8 Cloud 最新安全补丁（访问 security.yonyou.com 或联系用友技术支持），升级至修复该漏洞的版本；如无法立即升级，在 WAF/IPS 设备上添加规则拦截 QuerySoapServlet 接口中携带的恶意 SQL 关键字（如 UNION、SELECT、OR 1=1 等），同时限制该接口仅允许可信 IP 访问。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "用友 U8 Cloud QuerySoapServlet SQL注入漏洞"
updated = "0723"

