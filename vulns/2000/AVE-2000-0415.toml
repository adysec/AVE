[basic]
description = "PassWD 1.2 密码管理软件使用弱加密算法（仅进行简单的编码转换）存储用户密码，而非采用标准的强加密算法。能够读取密码文件的本地攻击者可轻易解密所有存储的密码，导致敏感凭据泄露。该漏洞影响 PassWD 1.2 版本，攻击者需具备对密码文件的读取权限，CVSS 评分 5.0，危害等级中危。"
published = "2000-06-04T04:00:00.000"
remediation = "立即停止使用 PassWD 1.2，该版本仅使用弱编码（Base64 类简单编码）存储密码。升级到采用 AES-256 或 bcrypt 等强加密算法的密码管理软件（如 KeePass、Bitwarden）。如无法更换软件，应手动使用 GPG 对密码存储文件进行加密，并设置严格的文件权限（如 chmod 600）。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "PassWD 1.2 弱加密漏洞"
updated = "2026-06-16T21:51:51.047"

