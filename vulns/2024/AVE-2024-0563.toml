[basic]
description = "libxml2 在 2.12.10 之前版本及 2.13.x 至 2.13.5 版本的 xmlschemas.c 中 xmlSchemaIDCFillNodeTables 和 xmlSchemaBubbleIDCNodeTables 函数存在释放后使用漏洞（CWE-416）。攻击者需构造恶意 XML 文档并针对特定身份约束的 XML Schema 进行验证，或使用恶意 XML Schema，即可触发释放后使用导致内存损坏。该漏洞影响广泛使用 libxml2 的 XML 处理应用，CVSS 7.8（HIGH），攻击向量为本地、攻击复杂度高、无需权限与用户交互，成功利用可导致高机密性和完整性影响。修复版本为 2.12.10 及 2.13.6 及以上版本。"
published = "2025-02-18T22:15:12.797"
remediation = "立即更新 libxml2 到稳定版本 2.12.10 或更高版本（或 2.13.6），禁用 DTD 验证或加载特信任 XML 文档功能，如果无法立即打补丁，可在应用层面使用安全的 XML 解析器或限制外部实体处理，在使用 libxml2 的应用程序中添加 XML 文档长度验证措施作为临时缓解。"
score = 7.8
severity = "HIGH"
sources = ["msrc"]
title = "libxml2 libxml2 释放后使用漏洞"
updated = "2026-06-17T08:11:46.753"

