[basic]
description = "Daniel Beckham 开发的 The Finger Server 0.82 Beta 存在命令注入漏洞，服务端未对用户输入进行有效过滤，远程攻击者可通过向 Finger 服务发送包含 shell 元字符的特制请求，在目标系统上以服务进程权限执行任意命令。该漏洞影响 Finger Server 0.82 Beta 版本，CVSS 评分 10.0，危害等级严重，但该软件已停止维护，建议迁移至替代方案。"
published = "2000-02-04T05:00:00.000"
remediation = "该 Finger Server 0.82 Beta 已停止维护，建议立即卸载该服务并禁用系统 finger 协议（如 `/etc/inetd.conf` 中注释 finger 行后重启 inetd）。使用防火墙规则（如 iptables 或安全组）限制外部对 TCP 79 端口的访问，迁移至现代安全替代方案（如 OpenBSD fingerd）。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "Daniel Beckham Finger Server 0.82 Beta 远程命令执行漏洞"
updated = "2026-06-16T21:51:03.530"

