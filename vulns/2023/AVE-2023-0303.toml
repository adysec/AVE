[basic]
description = "大华智慧园区综合管理平台存在任意文件上传漏洞，由于系统对用户上传文件类型及内容校验不严，未经身份认证的远程攻击者可通过构造特制HTTP请求向目标系统上传恶意WebShell文件，从而获取服务器控制权限。该漏洞影响大华智慧园区综合管理平台多个版本，攻击者无需登录即可利用，危害严重。建议用户及时升级至安全版本或部署WAF防护规则。"
published = "08.08"
remediation = "升级大华智慧园区综合管理平台至官方发布的修复版本（2023年8月8日及之后发布的安全版本），登录后台在「系统管理-安全配置」中开启文件上传类型白名单并限制上传目录权限。临时缓解措施：在 Web 服务器（如 Nginx）配置中拦截对上传路径的脚本解析，并限制仅允许内网 IP 访问管理平台上传接口。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "大华 智慧园区平台 任意文件上传漏洞"
updated = "08.08"

