[basic]
description = "Microsoft Windows NT 3.51 及 NT 4.0 的远程访问服务（RAS）与 PPTP 协议实现中存在拒绝服务漏洞。远程攻击者无需身份认证，通过向目标系统发送特制的畸形控制数据包，可导致 RAS/PPTP 服务崩溃或停止响应，造成系统无法正常提供远程访问功能。该漏洞无需用户交互即可远程触发，影响范围涉及企业远程接入环境，可能导致业务中断。"
published = "1999-06-30T04:00:00.000"
remediation = "安装 Windows NT 4.0 Service Pack 4 或更高版本以修复 RAS/PPTP 协议处理中的缺陷。由于 Windows NT 4.0 已停止支持，建议升级至受支持的 Windows Server 版本（如 Windows Server 2019/2022），并在防火墙上限制对 PPTP 端口（TCP 1723）的访问以降低暴露风险。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Microsoft Windows NT 4.0 RAS/PPTP 拒绝服务漏洞"
updated = "2026-06-16T21:47:40.957"

