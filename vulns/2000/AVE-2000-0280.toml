[basic]
description = "OpenLDAP 1.2.7 至 1.2.10 版本在处理临时文件时存在符号链接（symlink）安全漏洞。本地攻击者可通过在 /usr/tmp/ 目录下创建恶意的符号链接，诱使 OpenLDAP 服务器进程将数据写入攻击者指定的任意文件，从而导致敏感信息泄露或系统文件被篡改。该漏洞需要攻击者拥有本地系统访问权限，CVSS 评分 2.1，危害等级低。"
published = "2000-04-21"
remediation = "升级 OpenLDAP 至 1.2.11 或更高版本，该版本修复了 /usr/tmp/ 目录的符号链接竞争条件问题。如无法升级，确保 /usr/tmp/ 目录权限设置为 700 且属主为 ldap 用户，避免本地普通用户通过符号链接劫持临时文件。同时建议使用 sticky bit 保护共享临时目录。"
score = 2.1
severity = "LOW"
sources = ["redhat"]
title = "OpenLDAP 本地符号链接漏洞"
updated = "2026-06-16"

