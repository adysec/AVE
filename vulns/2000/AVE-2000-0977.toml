[basic]
description = "Gordano NTMail 5.0/6.0 Web 配置服务器的 HTTP 请求处理程序存在拒绝服务漏洞，远程未授权攻击者可通过发送一系列不完整的 HTTP 请求（部分 HTTP 请求），导致 Web 配置服务器资源耗尽或进程崩溃，从而拒绝合法用户的服务访问。该漏洞影响 Gordano NTMail 5.0 和 6.0 版本的 Web 配置管理接口，CVSS 评分 5.0（AV:N/AC:L/Au:N/C:N/I:N/A:P），属于网络可利用、低攻击复杂度、无需认证、仅影响可用性的拒绝服务漏洞。攻击者无需认证即可远程发送构造的部分 HTTP 请求流触发漏洞，导致 Web 管理界面无响应或服务进程崩溃，需重启服务恢复。Gordano 官方已发布补丁修复该漏洞，建议升级到修复版本。"
published = "2000-11-14T05:00:00.000"
remediation = "建议立即升级到Gordano NTMail 6.1或更高版本，并应用厂商发布的安全补丁。如无法立即升级，建议通过防火墙限制Web配置服务器管理端口（默认HTTP端口）仅允许受信任IP访问，或暂时禁用Web配置界面服务，改用命令行管理工具进行配置管理。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Gordano NTMail Web配置服务器 HTTP请求处理拒绝服务漏洞"
updated = "2026-06-16T21:52:37.020"

