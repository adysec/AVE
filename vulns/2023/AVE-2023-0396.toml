[basic]
description = "Linux 内核 USB ULPI 子系统中存在内存泄漏漏洞。在调用 debugfs_lookup() 函数获取 debugfs 目录项后，未正确调用 dput() 释放引用计数，导致内核内存随时间逐渐泄漏。本地攻击者可通过反复触发相关代码路径造成系统内存资源耗尽，最终导致拒绝服务。该漏洞影响 Linux 内核多个版本，CVSS 评分 5.5，危害等级中等。"
published = "2025-09-18T14:15:44.503"
remediation = "升级 Linux 内核至修复版本（如 v6.6-rc1 及以上），该漏洞已在 commit 9d0e857 中修复。无法立即升级时，可通过内核模块黑名单禁用 ulpi 模块（/etc/modprobe.d/blacklist.conf 中添加 blacklist ulpi）作为临时缓解。嵌入式系统需同步更新 BSP 内核源码并重新编译。"
score = 5.5
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux 内核 USB ULPI 驱动内存泄漏漏洞"
updated = "2026-06-17T06:45:15.130"

