[basic]
description = 'HP-UX 系统上的 SNMP 服务使用了默认、为空或缺失的团体名（如常见的 "public"），导致攻击者无需有效凭证即可访问 SNMP 代理。该漏洞影响启用了 SNMP 服务且未修改默认配置的 HP-UX 主机，攻击条件为攻击者能通过网络访问目标主机的 UDP 161 端口。利用方式是通过发送带有默认团体名的 SNMP 请求，读取系统信息、网络配置、用户账户等敏感数据，可能造成信息泄露，CVSS 评分 5.9，危害等级为中。'
published = "1997-01-01T05:00:00.000"
remediation = "修改 SNMP community name 为复杂强密码，禁止使用默认值 public 或空字符串；如业务无需 SNMP 服务，直接禁用或卸载相关 SNMP 代理进程；在网络层面通过防火墙或 ACL 限制 UDP 161 端口的访问源，仅允许受信任的管理主机访问；升级至操作系统厂商发布的安全补丁版本，确保 SNMP 配置符合最小权限原则。"
score = 5.9
severity = "MEDIUM"
sources = ["epss"]
title = "HP-UX SNMP 默认团体字符串信息泄露漏洞"
updated = "2026-06-16T21:48:33.790"

