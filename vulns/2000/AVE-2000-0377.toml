[basic]
description = "Red Hat Linux 6.0 在安装 /dev/pts 伪终端文件系统时设置了不安全的文件权限，导致本地用户可以向其他用户的 tty 设备写入数据。攻击者只需拥有本地用户权限，即可向其他用户的终端会话注入恶意命令或窃取会话内容，造成权限提升或信息泄露。该漏洞影响 Red Hat Linux 6.0 系统，CVSS 评分 4.6（本地攻击、低复杂度、无需认证、部分机密性/完整性/可用性影响），属于本地权限提升类漏洞。Red Hat 已发布补丁修复该权限配置错误。"
published = "1999-06-01T04:00:00.000"
remediation = "建议立即升级至 Red Hat Linux 6.1 或更高版本（已修复该漏洞），或应用 Red Hat 官方发布的安全补丁 RHSA-1999:029。若无法立即升级，可通过执行 `chmod 1777 /dev/pts` 修复 /dev/pts 目录权限为 1777（粘滞位），防止本地用户写入他人 tty 设备，作为临时缓解措施。"
score = 4.6
severity = "MEDIUM"
sources = ["avd"]
title = "Red Hat Linux /dev/pts 文件系统权限漏洞"
updated = "2026-06-16T21:51:33.913"

