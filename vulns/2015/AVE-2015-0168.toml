[basic]
description = "Windows 内核模式驱动程序 Win32k.sys 存在权限提升漏洞，攻击者可通过构造恶意应用程序触发内核内存破坏，将本地普通用户权限提升至 SYSTEM 权限。该漏洞影响 Windows Server 2003 SP2、Vista SP2 和 Server 2008 SP2 等旧版本系统，属于本地权限提升漏洞（CVSS 7.8 HIGH），攻击向量为本地、攻击复杂度低、需低权限、无需用户交互，可导致机密性、完整性、可用性完全丧失。该漏洞在 2015 年 4 月已被在野利用（编号 MS15-051），Microsoft 已发布安全更新 MS15-051 修复，CISA 已将其列入已知被利用漏洞目录。"
published = "2015-04-21T10:59:00.073"
remediation = "立即安装微软发布的 MS15-051 安全更新（KB3020393，2015-05-12 发布），受影响系统包括 Windows Server 2003 SP2、Vista SP2、Server 2008 SP2。因这些系统已停止主流支持，强烈建议升级至仍在支持周期内的 Windows 版本（如 Windows 10/11 或 Server 2016+）。若无法立即打补丁，可采取临时缓解措施：限制本地账户登录权限、禁用不必要的系统服务、配置防火墙限制本地端口访问，降低本地提权攻击面。CISA 已将该漏洞列入已知被利用漏洞目录，建议优先处理。"
score = 7.8
severity = "HIGH"
sources = ["kev"]
title = "Microsoft Windows Win32k.sys 本地提权漏洞"
updated = "2026-06-17T00:22:50.733"

