[basic]
description = 'Internet Explorer 4.x 和 5.x 版本的 ActiveX 参数解析功能存在缓冲区溢出漏洞（被称为"畸形组件属性"漏洞），远程攻击者可通过构造畸形的 ActiveX 组件属性参数触发缓冲区溢出，在用户访问恶意网页时无需身份认证即可在目标系统上执行任意代码。该漏洞影响 IE 4.x 和 5.x 所有版本，攻击向量为网络攻击，攻击复杂度较高但无需认证，成功利用可导致系统完全被攻控（机密性、完整性、可用性均完全丧失），CVSS 评分 7.6（高危）。Microsoft 已发布安全公告 MS00-032 修复此漏洞，用户应升级至 IE 5.01 SP1 或更高版本并安装相应补丁。'
published = "2000-05-17T04:00:00.000"
remediation = '立即升级到支持此漏洞修复的现代浏览器版本（IE已停止支持，请使用Microsoft Edge、Google Chrome或Mozilla Firefox）。在Windows Update中启用重要更新，确保获取包含ActiveX安全补丁的最新安全更新。如需继续使用IE，可通过"Internet Explorer安全增强配置"禁用不必要的ActiveX控件并应用最新的IE11安全补丁。'
score = 7.6
severity = "HIGH"
sources = ["avd"]
title = "Microsoft Internet Explorer 4.x/5.x ActiveX 参数解析缓冲区溢出远程代码执行漏洞"
updated = "2026-06-16T21:51:47.443"

