[basic]
description = "KDE 桌面环境中的 kdesud 工具在处理 DISPLAY 环境变量时存在缓冲区溢出漏洞。本地攻击者可通过向 DISPLAY 环境变量传入超长字符串触发缓冲区溢出，从而以 kdesud 进程权限执行任意代码，实现本地权限提升。该漏洞影响 KDE 1.1、1.1.1、1.1.2 及 1.2 版本，攻击者需拥有本地系统访问权限，无需身份认证即可利用，危害等级高。"
published = "2000-05-27T04:00:00.000"
remediation = "建议立即升级 KDE 至 1.2.1 或更高版本（如 KDE 2.0 系列），该漏洞在后续版本中已修复。如无法升级，可临时移除 kdesud 的 setuid root 权限：执行 `chmod u-s /usr/bin/kdesud`，以消除本地用户通过长 DISPLAY 环境变量触发缓冲区溢出获取 root 权限的风险。"
score = 7.2
severity = "HIGH"
sources = ["epss"]
title = "KDE kdesud DISPLAY 环境变量缓冲区溢出漏洞"
updated = "2026-06-16T21:51:46.943"

