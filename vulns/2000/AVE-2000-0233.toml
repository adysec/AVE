[basic]
description = 'Windows NT 4.0 系统中 OffloadModExpo 组件所使用的 Cryptography\Offload 注册表键存在默认权限配置不当的漏洞。该注册表键的访问控制权限设置过于宽松，导致本地已登录的普通用户能够读取或修改该键值。由于该键值中存储了其他用户的加密密钥材料，本地用户可利用此缺陷获取他人的私钥等敏感密钥信息，从而破坏系统加密机制的安全性。攻击条件为攻击者需在目标主机上拥有本地账户并能够登录系统，无需特殊权限即可访问该注册表键。影响范围涵盖运行 Windows NT 4.0 及其终端服务（Terminal Server）的服务器与工作站，危害等级为中高危。'
published = "2000-04-12T04:00:00.000"
remediation = '直接升级 Windows NT 4.0 到 Windows Server 2003 或更高版本，更新安全补丁程序，并重置 Cryptogaphry\Offload 注册表关键权限为安全配置，避免本地用户获取其他用户密钥。'
score = 7.2
severity = "HIGH"
sources = ["cve"]
title = '{"_meta":{},"stopReason":"end_turn","usage":{"inputTokens":10796,"outputTokens":24,"totalTokens":10820}}'
