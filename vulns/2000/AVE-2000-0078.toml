[basic]
description = "FreeBSD 3.4、NetBSD 1.4.1 及 OpenBSD 2.6 等 BSD 系统的 /proc 文件系统存在本地权限提升漏洞。本地攻击者可通过修改 stderr 的文件描述符，利用 /proc/pid/mem 接口写入进程内存，从而以 root 权限执行任意代码。该漏洞需要攻击者拥有本地 shell 访问权限，CVSS 评分 7.2，危害等级高。受影响版本包括 FreeBSD 3.4、NetBSD 1.4.1 及 OpenBSD 2.6。"
published = "2000-02-16T05:00:00.000"
remediation = "建议升级到修复版本：FreeBSD 升级至 3.5 及以上，OpenBSD 升级至 2.7 及以上，NetBSD 升级至 1.5 及以上。如无法升级，卸载 procfs 文件系统（umount /proc）或修改 /etc/fstab 禁止自动挂载 procfs；若必须使用，在挂载选项中添加 -o nosuid 限制提权路径。"
score = 7.2
severity = "HIGH"
sources = ["epss"]
title = "FreeBSD/NetBSD/OpenBSD /proc 文件系统本地权限提升漏洞"
updated = "2026-06-16T21:50:59.290"

