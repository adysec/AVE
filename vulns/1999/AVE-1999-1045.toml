[basic]
description = "SysVInit 是 Red Hat Linux 系统中用于初始化进程的关键组件，其实现存在缓冲区溢出漏洞。本地攻击者可通过向系统提交特制的输入数据触发该溢出，覆盖内存中的关键数据结构，从而获取 root 权限。该漏洞影响 Red Hat Linux 5.1 及更早版本，CVSS 评分 7.2，危害等级高。由于攻击者需要本地访问权限，利用门槛相对较高，但一旦成功可完全控制目标系统。"
published = "1999-12-31T05:00:00.000"
remediation = "升级 SysVinit 软件包至 Red Hat 官方 errata (rh50-errata-general) 中提供的修复版本，或升级至 Red Hat Linux 6.0 及以上版本。如无法立即升级，临时缓解措施包括：限制本地用户的交互式 shell 登录权限，仅授予可信用户访问权限，并监控异常的 setuid 程序执行行为。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "Red Hat Linux SysVInit 缓冲区溢出权限提升漏洞"
updated = "2026-06-16T21:50:12.473"

