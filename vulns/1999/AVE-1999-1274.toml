[basic]
description = "eperl 2.2.12 版本中存在任意文件读取漏洞，远程攻击者无需身份认证，通过向 bar.phtml 传递目标文件的完整路径作为参数，即可读取服务器上的任意文件，并可能进一步执行特定命令。该漏洞影响 eperl 2.2.12 及更早版本，CVSS 评分 7.5，危害等级高。"
published = "1998-07-07T04:00:00.000"
remediation = "建议升级至 ePerl 2.3.0 或更高版本，该版本已修复 CGI 模式下 ISINDEX 查询参数导致 MODE_CGI 误判、将参数当文件路径打开解析的问题。如无法升级，可迁移至 mod_perl 等仍在维护的替代方案；临时缓解措施包括在 Web 服务器层面对 ePerl 脚本的 QUERY_STRING 参数进行严格校验，禁止包含文件路径等内容。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "Ralf S. Engelschall ePerl 任意文件读取漏洞"
updated = "2026-06-16T21:50:26.363"

