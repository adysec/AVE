[basic]
description = "IRIX 与 OpenLinux 系统中运行的 routed 路由守护进程存在文件追加漏洞，其 traceon 调试功能未对输入进行充分校验，远程攻击者可通过向目标主机的 routed 服务发送特制数据包，将任意内容附加到系统文件末尾。该漏洞影响 IRIX 3/4/5/6 及 OpenLinux 1.0/1.1 等版本，攻击者可在无需认证的条件下利用此漏洞破坏系统文件完整性，进而可能导致拒绝服务或权限提升。CVSS 评分 6.4，危害等级中危。建议禁用不必要的 routed 服务或安装厂商补丁。"
published = "1998-10-26T05:00:00.000"
remediation = "建议禁用 routed 服务（`/etc/init.d/routed stop`）或限制其仅监听受信网络接口，利用防火墙规则过滤端口 520/UDP。如业务必须使用，升级到 SGI IRIX 补丁版本（如 6.5.x）或迁移至 OpenLinux 1.1.1+。"
score = 6.4
severity = "MEDIUM"
sources = ["epss"]
title = "SGI IRIX 及 Caldera OpenLinux routed 任意文件追加漏洞"
updated = "2026-06-16T21:47:55.790"

