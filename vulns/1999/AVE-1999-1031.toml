[basic]
description = "Analog 3.0 及更早版本存在任意文件读取漏洞，远程攻击者可通过 forms 接口提交特制请求，利用该漏洞读取服务器上的任意文件，包括配置文件、密码文件等敏感信息，导致信息泄露。该漏洞源于 forms 接口未对用户输入的文件路径参数进行充分校验和过滤，攻击者无需身份认证即可利用目录遍历技术读取任意文件。CVSS 评分 5.0，危害等级中等。"
published = "1999-12-31T05:00:00.000"
remediation = "升级 Analog 至 4.0 以上版本，该漏洞已在后续版本修复。如无法升级，可在 Web 服务器配置中限制对 Analog forms 接口的访问，或禁用 forms 功能，仅允许授信 IP 访问。同时避免将 Analog 的 CGI 接口放置在公网可访问目录下。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Analog 任意文件读取漏洞"
updated = "2026-06-16T21:50:06.927"

