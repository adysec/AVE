[basic]
description = "SGI IRIX 5.x/6.x 系统中的 objectserver 守护进程存在身份验证绕过漏洞，远程攻击者无需认证即可利用该漏洞向目标系统发送特制请求，创建未授权用户账户，从而获得系统访问权限。该漏洞影响 SGI IRIX 5.x 至 6.x 系列版本，CVSS 评分 10.0，危害等级严重。建议用户升级至安全版本或禁用受影响服务。"
published = "2000-03-27"
remediation = "安装 SGI 安全补丁 20000303-01-PX（ftp://sgigate.sgi.com/security/20000303-01-PX），升级到 IRIX 6.5 或更新版本。如无法升级，可在 inetd.conf 中禁用 objectserver 服务，或使用防火墙限制 178/179 端口访问仅允许可信主机连接。"
score = 10.0
severity = "CRITICAL"
sources = ["cve"]
title = "SGI IRIX Objectserver 守护进程远程创建用户账户漏洞"
updated = "2026-06-16"

