[basic]
description = "Microsoft IIS 4.0 的 FrontPage 服务器扩展组件中的 fpcount.exe 存在缓冲区溢出漏洞，远程攻击者可通过向目标服务器发送特制请求触发该漏洞，导致任意代码执行。该漏洞影响运行 IIS 4.0 并启用 FrontPage 服务器扩展的 Windows 系统，CVSS 评分 10.0，危害等级严重。Microsoft 已发布安全更新修复此漏洞，建议用户及时安装补丁。"
published = "1999-01-14T05:00:00.000"
remediation = "升级 IIS 4.0 至 IIS 5.0 或更高版本，或安装 Microsoft 安全公告 MS99-034 对应的补丁程序。如无法升级，可删除或禁用 fpcount.exe 文件，并在 IIS 管理器中移除 FrontPage Server Extensions 映射，同时限制匿名用户对 /_vti_bin/ 目录的访问权限。"
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "Microsoft IIS 4.0 FrontPage Server Extensions fpcount.exe 缓冲区溢出远程代码执行漏洞"
updated = "2026-06-16T21:50:18.477"

