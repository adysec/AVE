[basic]
description = "Shoptron 购物车应用程序存在安全设计缺陷，未对客户端提交的隐藏表单字段进行服务端校验。远程攻击者可通过修改网页中隐藏的价格、数量等敏感字段值，以低于实际价格的金额完成订单提交，导致未授权修改订单信息及欺诈交易。该漏洞利用门槛低，仅需浏览器开发者工具即可实施。"
published = "2000-02-01T05:00:00.000"
remediation = "立即停止使用已停止维护的 Shoptron 购物车程序，迁移至现代活跃维护的开源电商系统（如 WooCommerce、Magento Open Source）。若临时继续使用，务必修改所有涉及金额、数量等敏感数据的隐藏表单字段逻辑，在服务器端重新计算并校验价格，禁止直接信任客户端提交的值。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "Shoptron 购物车应用程序信息修改漏洞"
updated = "2026-06-16T21:51:00.540"

