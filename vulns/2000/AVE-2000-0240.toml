[basic]
description = "RealNetworks RealServer 在处理 RTSP 协议流量时存在拒绝服务漏洞。远程攻击者无需认证即可向服务器 7070 端口发送畸形数据包，导致 RealServer 进程崩溃停止响应，需要手动重启服务才能恢复正常功能。该漏洞影响多个平台的 RealServer 版本，攻击门槛极低且效果显著。"
published = "2000-04-20"
remediation = "升级到 RealServer 7.0.1 或更高版本，或联系 RealNetworks 获取官方安全补丁并安装，同时建议在网络边界限制对 7070 端口的未授权访问。"
score = 7.8
severity = "HIGH"
sources = ["cve"]
title = "RealNetworks RealServer 端口 7070 拒绝服务漏洞"
updated = "2000-04-20"

