[basic]
description = "SGI IRIX 6.2 系统中的 libgl.so 动态链接库存在缓冲区溢出漏洞。本地攻击者可通过设置超长的 HOME 环境变量，并调用依赖该库的 setuid 程序（如 gmemusage 和 gr_osview），触发栈缓冲区溢出，从而以 root 权限执行任意代码。该漏洞影响 SGI IRIX 6.2 及可能的相关版本，CVSS 评分 7.2，危害等级高。攻击者需拥有本地系统访问权限，无需身份认证即可提权至 root，完全控制目标系统。"
published = "2000-10-20T04:00:00.000"
remediation = "SGI IRIX 6.2 已停止维护多年，官方不再提供安全补丁。建议立即迁移至受支持的操作系统。临时缓解措施：以 root 身份执行 `chmod u-s /usr/sbin/gmemusage /usr/sbin/gr_osview` 移除受影响程序的 setuid 权限位，阻断提权路径；同时严格限制本地用户登录权限，仅允许可信用户访问系统。"
score = 7.2
severity = "HIGH"
sources = ["cve"]
title = "SGI IRIX libgl.so 本地缓冲区溢出漏洞"
updated = "2026-06-16T21:52:29.680"

