[basic]
description = "Microsoft IIS 3.0 和 4.0 版本的 showfile.asp 活动服务器页面（ASP）中集成的 FileSystemObject (FSO) 组件存在任意文件读取漏洞。远程攻击者无需身份认证即可通过向服务器发送特制的 HTTP 请求，在 file 参数中指定目标文件路径，从而读取服务器上的任意文件，包括系统配置文件、源代码等敏感信息。该漏洞影响 IIS 3.0 及 4.0 版本，危害中等。"
published = "1999-02-11T05:00:00.000"
remediation = '升级到 IIS 5.0 或更高版本，或删除服务器上的 showfile.asp 文件。如无法升级，在 IIS 管理器中禁用 ASP 组件中的 FileSystemObject (FSO)，并对 file 参数实施严格的路径白名单校验，禁止包含 "../" 等目录遍历字符。'
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Microsoft IIS 3.0/4.0 任意文件读取漏洞"
updated = "2026-06-16T21:50:18.353"

