[basic]
description = "Veritas Volume Manager 3.0.2/3.0.3/3.0.4 版本在运行时会创建全局可写的 .server_pids 文件，本地攻击者可利用该文件权限配置缺陷，向 .server_pids 文件中写入任意恶意命令。当系统通过 vmsa_server 脚本处理该文件时，注入的命令将被自动执行，从而导致权限提升。该漏洞需本地访问权限，CVSS 评分 7.2，危害等级高。"
published = "2000-06-16"
remediation = "升级 Veritas Volume Manager 至 3.0.5 或更高版本，该版本已修复 .server_pids 文件权限问题。如无法升级，手动将 .server_pids 文件权限改为 640（属主读写、属组只读），并确保 vmsa_server 脚本不以 root 运行或限制其执行权限。"
score = 7.2
severity = "HIGH"
sources = [
    "cve",
    "exploitdb",
]
title = "Veritas Volume Manager 不安全文件权限漏洞"
updated = "2026-07-20"

