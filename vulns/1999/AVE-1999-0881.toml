[basic]
description = "网络入侵检测系统（IDS）在处理碎片化IP数据包时存在重组缺陷，攻击者可通过发送特制的碎片数据包绕过IDS检测规则。由于IDS无法正确还原原始载荷，恶意流量被误判为正常，导致攻击行为逃逸检测。该漏洞影响多种主流IDS产品，远程攻击者无需认证即可利用，且攻击复杂度低，无需用户交互。利用方式包括发送超小碎片、重叠偏移或超时碎片等绕过技术。"
published = "1999-01-01T05:00:00.000"
remediation = "升级 IDS/IPS 引擎至最新版本（如 Snort ≥2.9.20、Suricata ≥7.0），启用 frag3 预处理器的分片重组功能；配置 `preprocessor frag3_global: max_frags 65536` 和 `preprocessor frag3_engine: policy windows`；对于无法升级的旧版系统，在网络层启用分片包拦截策略，仅允许完整 IP 包进入检测引擎。"
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "多厂商网络入侵检测系统IP碎片重组绕过检测漏洞"
updated = "2026-06-16T21:48:42.983"

