[basic]
description = "HWPOC-2026-0135dd8a 是 OpenClaw 游戏引擎中 chat.send 网关接口存在的认证绕过漏洞。该漏洞由于对用户身份验证逻辑处理不完善，导致远程攻击者无需有效凭据即可绕过认证机制，直接调用 chat.send 接口发送伪造的聊天消息。攻击者可利用该漏洞伪造系统广播、散布恶意链接或干扰游戏内正常通信，影响游戏服务器的消息完整性和用户体验。目前官方尚未发布修复补丁。"
published = "20260328"
remediation = "升级 OpenClaw 至最新版本，确保 chat.send 接口强制校验会话 Token 或 API Key，禁止未认证请求直接调用消息发送网关；如无法升级，在反向代理层（如 Nginx/Envoy）限制 /chat/send 路由仅允许白名单 IP 访问，并启用速率限制作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "OpenClaw chat.send 网关认证绕过漏洞"
updated = "20260328"

