[basic]
description = "Netscape Communicator 中的 Mail Notification (nsnotify) 工具在连接 IMAP 服务器时未遵循用户的 SSL 配置偏好，始终以明文方式传输数据。攻击者若处于同一网络段，可被动嗅探到 IMAP 认证过程中的用户名和密码，导致邮箱账户凭据泄露。"
published = "2000-01-12"
remediation = "升级至受支持的现代浏览器与邮件客户端，彻底替换已停止维护的 Netscape Communicator；若必须使用遗留系统，应用 Netscape/AOL 发布的安全补丁，并在邮件账户设置中强制启用 IMAP over SSL，禁用明文 IMAP 连接。"
score = 5.0
severity = "MEDIUM"
sources = ["cve"]
title = "Netscape Communicator nsnotify 明文传输 IMAP 凭据漏洞"
updated = "2000-01-12"

