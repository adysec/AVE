[basic]
description = "SCO UnixWare 7.0/7.0.1/7.1/7.1.1 系统中的 uidadmin 程序存在本地权限提升漏洞。该程序在运行时会以 root 权限处理用户可控的文件路径，攻击者可通过创建指向敏感系统文件（如 /etc/passwd）的符号链接，诱使 uidadmin 以 root 身份写入或覆盖目标文件。攻击条件为本地普通用户账户，利用门槛低，成功后可获得 root 权限，造成系统完全沦陷。此漏洞由 symlink 竞争条件引发，属于典型的本地提权类安全问题。"
published = "1998-12-02"
remediation = "升级至 SCO UnixWare 7.1.3 或更高版本（已修复该 symlink 漏洞）；若无法升级，立即移除 uidadmin 的 SUID 位（chmod u-s /usr/bin/uidadmin），并限制普通用户对 /var/opt/K/SCO/UnixWare/ 目录的写入权限，防止本地提权利用。"
score = 10.0
severity = "CRITICAL"
sources = ["cve"]
title = "SCO UnixWare uidadmin 本地符号链接权限提升漏洞"
updated = "2026-06-16"

