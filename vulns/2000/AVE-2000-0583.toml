[basic]
description = "RobTex Viking Server 1.0.6 Build 355 之前版本存在缓冲区溢出漏洞，远程攻击者可通过向服务器发送超长的 HTTP GET 请求，或超长的 Unless-Modified-Since、If-Range、If-Modified-Since 请求头触发该漏洞，导致服务拒绝响应或执行任意命令。该漏洞影响 RobTex Viking Server 1.06-370 之前所有版本，CVSS 评分 7.5，危害等级高。Exploit-DB 已公开 PoC 利用代码。"
published = "2000-10-20T04:00:00.000"
remediation = "立即升级 RobTex Viking Server 至 1.0.6 Build 370 或更高版本，该版本已修复 HTTP GET 请求及多个 HTTP 头部（Unless-Modified-Since、If-Range、If-Modified-Since）的缓冲区溢出问题。由于该产品已停止维护，建议迁移至其他仍在维护的 Web 服务器（如 Apache HTTP Server 或 Nginx）。临时缓解措施：在防火墙层面限制对 Viking Server 端口的访问，仅允许可信 IP 连接。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "RobTex Viking Server 缓冲区溢出漏洞"
updated = "2026-06-16T21:52:27.317"

