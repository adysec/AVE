[basic]
description = "Gitea 1.25.5 版本在预接收钩子（pre-receive hook）会话中存在权限缓存缺陷，其对单分支的写入权限检查结果会错误地在同一会话中的多个引用（refs）间复用。拥有某分支维护者编辑权限的用户可借此跨分支提权，从而获得对完整存储库的写入访问权限。该漏洞 CVSS 评分 8.8，危害等级高，影响所有使用分支级权限功能且版本低于 1.25.6 的 Gitea 实例。"
published = "2026-07-03T21:16:59.157"
remediation = "立即升级至 Gitea 1.26.3 或更高版本（最新为 1.26.4），该版本通过修复预接收挂钩（pre-receive hook）中分支级写入权限的缓存逻辑，阻止跨 ref 复用权限从而提权至完整仓库写入。如无法立即升级，可临时禁用预接收挂钩或对敏感仓库限制可写入分支的用户范围为最小必要权限。"
score = 8.8
severity = "HIGH"
sources = ["ghsa"]
title = "Gitea 预接收钩子权限缓存检查绕过漏洞"
updated = "2026-07-06T18:17:26.860"

