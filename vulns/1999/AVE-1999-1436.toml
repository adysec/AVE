- title: KDE 文件管理器 kfm TCP 服务器远程文件修改漏洞
- description: KDE 桌面环境的文件管理器 kfm 使用未加密的 TCP 套接字进行进程间通信，远程攻击者可通过向该 TCP 服务器发送 copy 命令，将任意文件复制到目标用户主目录下的 .rhosts 文件，从而实现远程访问控制。攻击条件为攻击者能够通过网络访问 kfm TCP 服务器端口，且目标系统上运行了 kfm 服务。
- severity: MEDIUM (CVSS v2.0 5.0)
- score: 5.0
- sources: ["cve"]
- published: 1997-05-05
- updated: 2026-06-16
- remediation: 将 kfm 的进程间通信方式从 TCP 套接字改为 AF_UNIX 域套接字，并正确设置套接字文件的权限，限制仅本地用户可访问。建议升级到不受影响的 KDE 版本或应用厂商发布的安全补丁。
