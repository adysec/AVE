[basic]
description = "Microsoft Internet Security and Acceleration (ISA) Server 2000 的 Web Proxy 组件在处理特定类型的超长 Web 请求时存在拒绝服务漏洞。远程攻击者无需身份认证即可向目标服务器发送特制的超长 HTTP 请求，导致 Web Proxy 服务崩溃或停止响应，无法正常处理后续合法请求。该漏洞影响 ISA Server 2000 所有版本，CVSS 评分 7.5，危害等级为高危。微软已发布安全更新修复此漏洞。"
published = "2001-07-02T04:00:00.000"
remediation = "安装 Microsoft 2001 年 6 月安全更新 (MS01-030)，或升级至 ISA Server 2000 Service Pack 1。如无法立即修补，可在 ISA 管理控制台中限制 Web 代理接受的请求长度，并对非信任来源关闭 Web 代理服务端口 (8080) 作为临时缓解措施。"
score = 7.5
severity = "HIGH"
sources = ["exploitdb"]
title = "Microsoft ISA Server 2000 Web Proxy 拒绝服务漏洞"
updated = "2026-06-16T21:53:56.570"

