[basic]
description = "Linux modutils 2.3.x 包中的 modprobe 程序未对用户输入的参数进行充分过滤，本地攻击者可通过在传递给 modprobe 的参数中注入 shell 元字符（如反引号、$() 等）来执行任意系统命令。该漏洞影响使用 modutils 2.3.x 版本的 Linux 系统，攻击者需要拥有本地访问权限，成功利用后可获取 root 权限，完全控制目标系统。目前已存在公开的利用代码。"
published = "2001-01-09T05:00:00.000"
remediation = "升级 modutils 至 2.3.11 或更高版本，该版本修复了 modprobe 对 shell 元字符的过滤处理。对于 Debian 系统，通过 apt-get install --only-upgrade modutils 更新；对于 Red Hat/Mandrake 系，安装对应安全公告（MDKSA-2000-071）提供的更新包。如无法立即升级，可移除 modprobe 的 suid 权限（chmod -s /sbin/modprobe）作为临时缓解措施。"
score = 7.2
severity = "HIGH"
sources = ["redhat"]
title = "Linux modutils modprobe 任意命令执行漏洞"
updated = "2026-06-16T21:53:08.130"

