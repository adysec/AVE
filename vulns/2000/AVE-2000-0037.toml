[basic]
description = "Mac OS 9 系统在处理畸形数据包时，会生成超大的 ICMP 响应数据包，攻击者可利用该特性将系统作为中继放大源，发起分布式拒绝服务（DDoS）攻击。具体而言，未经身份认证的远程攻击者通过向目标 Mac OS 9 系统发送精心构造的畸形数据包，即可触发系统返回远大于请求数据包大小的 ICMP 响应，从而实现流量放大，消耗目标网络带宽。该漏洞影响运行 Mac OS 9 的 Macintosh 计算机，攻击条件简单，仅需网络可达且系统启用 ICMP 响应即可利用，可能导致网络服务中断。"
published = "1999-12-28T05:00:00.000"
remediation = "升级到 Apple 当前支持的 macOS 版本（macOS 15 Sequoia 或更高版本），Mac OS 9 已停止安全更新超过二十年，无法通过补丁修复此漏洞。在防火墙或路由器上配置入站 ICMP 报文速率限制，丢弃来自外部网络的 ICMP 超时报文，临时缓解 ICMP 放大攻击风险。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Apple Mac OS 9 ICMP 畸形数据包放大拒绝服务漏洞"
updated = "2026-06-16T21:50:52.757"

