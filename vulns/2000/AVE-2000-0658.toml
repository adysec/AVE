[basic]
description = "SmartFTP Daemon 0.2 存在目录遍历访问控制漏洞，本地用户可通过构造包含 .. 序列的上传路径，指定并上传替代的用户配置文件，从而绕过访问限制，访问服务器上的任意文件。该漏洞利用条件要求攻击者具有本地访问权限，CVSS 评分 2.1，危害等级低，影响 SmartFTP Daemon 0.2 版本。"
published = "2000-06-13"
remediation = "升级 SmartFTP Daemon 至已修复版本（0.2 Beta Build 9 之后的版本），并在服务器端对用户上传的配置文件路径进行严格校验，过滤包含 .. 目录遍历序列的路径，同时限制用户配置文件存储目录的访问权限。"
score = 2.1
severity = "LOW"
sources = ["cve"]
title = "SmartFTP Daemon 0.2 目录遍历访问控制漏洞"
updated = "2026-06-16"

