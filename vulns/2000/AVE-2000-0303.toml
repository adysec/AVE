[basic]
description = "OpenBSD 2.5 系统中的 cron 守护进程存在本地权限提升漏洞。当 cron 调用内部伪 popen 函数时，未能对 argv[] 参数数组进行正确的 NULL 终止处理，导致内存越界访问。具有本地访问权限的攻击者可利用特制参数触发此缺陷，从而获取 root 权限。该漏洞影响 OpenBSD 2.5 版本，需本地账户登录后方可利用。此漏洞由程序参数处理不当引起，CVSS 评分 7.2，危害等级高。"
published = "2001-03-12T05:00:00.000"
remediation = "升级至 OpenBSD 2.7 或更高版本（已修复 cron 中 argv 数组未正确 NULL 终止导致的权限提升漏洞），或应用 OpenBSD 官方安全补丁。临时缓解措施：限制本地用户 crontab 写入权限，移除不必要用户的 cron 访问能力。"
score = 7.2
severity = "HIGH"
sources = ["cve"]
title = "OpenBSD cron 本地权限提升漏洞"
updated = "2026-06-16T21:51:27.240"

