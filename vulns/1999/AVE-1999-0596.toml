[basic]
description = "Windows NT SUBST 命令存在漏洞，用户可使用 SUBST 命令将驱动器号映射到文件夹，且该映射在用户注销后不会自动取消，导致后续登录的用户访问该驱动器号时实际访问的是攻击者指定的文件夹。攻击者可利用此漏洞重定向系统文件夹或用户文件夹，导致权限提升或数据篡改。该漏洞影响 Windows NT 系统，攻击者需拥有本地登录权限且能执行 SUBST 命令，攻击需在攻击者注销后、受害者登录前完成映射配置。CVSS 评分 4.6，属中等危害等级。"
published = "1999-11-30T05:00:00.000"
remediation = "建议升级至 Windows NT 4.0 SP6 或更高版本（如 Windows 2000），微软已在 SP6 中修复 SUBST 映射残留漏洞。若无法升级，可通过组策略禁用 SUBST 命令（用户配置→管理模板→Windows 组件→命令提示符→禁用命令提示符），或在用户注销脚本中添加 `subst * /d` 命令强制清除所有驱动器映射作为临时缓解措施。建议通过组策略限制普通用户执行 SUBST 命令权限。建议立即安装微软官方安全补丁（KB239643），或升级至 Windows 2000 SP4 以上版本彻底修复该漏洞。"
score = 4.6
severity = "MEDIUM"
sources = ["epss"]
title = "Microsoft Windows NT Subst.exe 本地权限提升漏洞"
updated = "2026-06-16T21:49:08.080"

