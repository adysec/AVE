[basic]
description = "THTTPD（Trivial HTTP）服务器在处理 HTTP 请求的 If-Modified-Since 头部字段时存在缓冲区溢出漏洞。远程攻击者无需身份认证，通过向目标服务器发送包含超长 If-Modified-Since 头部的特制 HTTP 请求，可触发缓冲区溢出，导致服务进程崩溃造成拒绝服务，或在目标系统上执行任意命令。该漏洞影响 THTTPD 及相关衍生版本，危害严重。"
published = "2000-10-20T04:00:00.000"
remediation = "升级 thttpd 至 2.14 或更高版本，该版本修复了 If-Modified-Since 头处理中的缓冲区溢出问题。如无法升级，可在反向代理层（如 Nginx）过滤或截断过长的 If-Modified-Since 请求头（限制长度不超过 256 字节），并限制 thttpd 仅监听内网端口，避免直接暴露于公网。"
score = 10
severity = "CRITICAL"
sources = ["cve"]
title = "thttpd 缓冲区溢出远程代码执行漏洞"
updated = "2026-06-16T21:51:33.177"

