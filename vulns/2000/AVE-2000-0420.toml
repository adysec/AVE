[basic]
description = "Alt-N MDaemon 2.8.5.0 的 POP 服务器组件中存在竞争条件漏洞。本地攻击者可通过快速连续发送 UIDL 命令后立即退出服务器，利用该竞争条件导致 POP 服务崩溃，造成拒绝服务。该漏洞影响 MDaemon 2.8.5.0 版本，攻击者需具备本地访问权限，无需认证即可实施攻击。CVSS 评分 2.6，危害等级较低。"
published = "2000-06-16T04:00:00.000"
remediation = "升级至 MDaemon 2.8.5.1 及以上版本，该漏洞已在后续版本中修复。当前建议使用最新的 MDaemon 稳定版（20.x）。如无法升级，可在 POP3 服务配置中限制可连接客户端的 IP 范围，并禁用 UIDL 命令（如服务端支持命令白名单）作为临时缓解措施。"
score = 2.6
severity = "LOW"
sources = ["cve"]
title = "Alt-N MDaemon 2.8.5 POP Server UIDL 命令竞争条件拒绝服务漏洞"
updated = "2026-06-16T21:51:52.157"

