[basic]
description = "FreeBSD 系统的 libc 库中 setlocale 函数在处理 PATH_LOCALE 环境变量时存在缓冲区溢出漏洞。本地攻击者可通过构造超长的 PATH_LOCALE 环境变量值，导致堆栈缓冲区溢出，进而执行任意代码获得 root 权限。该漏洞影响 FreeBSD 3.x 早期版本，攻击条件为攻击者拥有本地登录权限或能通过其他方式在目标系统上执行程序并控制其环境变量。"
published = "2000-01-01T05:00:00.000"
remediation = "立即升级至 FreeBSD 3.4-RELEASE 或更高版本（包括 FreeBSD-SA-00:19 补丁），该补丁修复了 libc 中 setlocale 函数处理 PATH_LOCALE 环境变量时的缓冲区溢出问题。如无法立即升级，可在系统环境变量配置中移除 PATH_LOCALE 变量，或修改启动脚本使用支持边界检查的 locale 设置方式，同时建议检查是否有未授权账户登录痕迹。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "FreeBSD libc setlocale 函数 PATH_LOCALE 环境变量缓冲区溢出漏洞"
updated = "2026-06-16T21:49:25.217"

