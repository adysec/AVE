[basic]
description = "Ipswitch IMail 5.0.8/6.0/6.1 版本的 IMonitor 组件中的 status.cgi CGI 脚本存在拒绝服务漏洞。未经身份认证的远程攻击者可通过向目标系统发送大量对 status.cgi 的请求，消耗服务器资源，导致 IMail 服务无法正常响应。该漏洞影响 Ipswitch IMail 5.0.8、6.0 及 6.1 版本，CVSS 评分 5.0，危害等级中等。"
published = "2000-01-05T05:00:00.000"
remediation = "升级 Ipswitch IMail 至 6.2 及以上版本，该版本已修复 status.cgi 接口的拒绝服务问题。如无法升级，可在 Web 服务器层面限制对 /imail/imonitor/status.cgi 的访问，仅允许受信任 IP 访问，或直接移除 imonitor 组件以消除风险。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Ipswitch IMail status.cgi 拒绝服务漏洞"
updated = "2026-06-16T21:50:54.633"

