[basic]
description = "Heat-On HSWeb Web Server 2.0 存在路径泄露漏洞，远程攻击者通过向服务器发送对 /cgi/ 目录的 HTTP 请求，若服务器启用了目录浏览功能，将直接泄露 Web 服务的物理绝对路径。该信息有助于攻击者进一步探测文件结构和构造攻击路径。影响 HSWeb 2.0 版本，危害等级中危，CVSS 评分 5.0。"
published = "2001-05-03T04:00:00.000"
remediation = "升级 HSWeb Web Server 至 2.0 以上版本；在服务器配置中禁用目录浏览功能（关闭 Directory Browsing 选项）；限制 /cgi/ 目录的访问权限，避免直接通过 Web 访问该目录列出文件列表。如无法升级，建议在 Web 服务器前部署反向代理过滤 /cgi/ 路径请求。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Heat-On HSWeb Web Server 2.0 全路径泄露漏洞"
updated = "2026-06-16T21:53:52.183"

