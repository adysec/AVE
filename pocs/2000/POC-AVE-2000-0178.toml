[info]
author = "AVE"
description = "Internet Explorer 5.x window.showHelp() 未限制 .chm 文件仅限本地执行，远程攻击者通过 HTTP 托管恶意 HTML 页面和 .chm 文件，结合 Microsoft 网络共享在 IE 5.x 客户端上执行任意命令"
id = "POC-AVE-2000-0178"
name = "CVE-2000-0201 PoC"
severity = "medium"
tags = ["cve-2000-0201"]
vuln_id = [
    "CVE-2000-0201",
    "AVE-2000-0178",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/test.chm"
protocol = "http"

[[poc.requests.matchers]]
expect = true
status = [200]
type = "status"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "ITSF",
    "MS Help",
]
