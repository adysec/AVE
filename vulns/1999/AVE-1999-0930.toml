[basic]
description = "Linux rwho/rwhod 服务运行时会向网络广播主机状态和用户登录信息，导致敏感信息泄露。攻击者无需认证即可通过监听网络广播获取目标主机的运行状态、负载情况、登录用户列表等敏感信息。该漏洞影响运行 rwhod 服务的 Linux/Unix 系统，攻击者只需处于同一广播域即可被动收集信息，CVSS 评分 5.0（中危），属于信息泄露类漏洞。建议禁用 rwhod 服务或配置防火墙阻断 UDP 513 端口广播流量。"
published = "1997-07-01T04:00:00.000"
remediation = "在不需要该服务的 Linux 主机上执行 `systemctl disable --now rwhod` 停止并禁用 rwhod 服务；通过防火墙（iptables/nftables）阻断 UDP 513 端口的入站流量，限制仅内网可信网段可访问；若仍须使用，升级内核至发行版最新补丁版本并确认 rwhod 已升级至修复版本。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
