[basic]
description = "Digital UNIX 4.0 系统的 at 命令存在缓冲区溢出漏洞，本地攻击者可通过向命令行参数提交超长字符串触发缓冲区溢出，从而获取 root 权限。该漏洞源于 at 程序未对用户输入参数进行长度检查，导致栈缓冲区被覆盖。攻击者需拥有本地系统访问权限，利用难度较低，危害等级高，影响 Digital UNIX 4.0 版本。"
published = "1999-01-25T05:00:00.000"
remediation = "安装 DEC/Compaq 提供的 Digital UNIX 4.0 安全补丁（如 T64KIT0011596-V40BB），或将系统升级至 Tru64 UNIX 5.1 及以上版本。如无法升级，可移除 at 程序的 setuid 位作为临时缓解：chmod u-s /usr/bin/at，并限制可访问 at 命令的用户组。建议迁移至受支持的现代操作系统。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "Digital UNIX at 程序缓冲区溢出漏洞"
updated = "2026-06-16T21:50:29.020"

