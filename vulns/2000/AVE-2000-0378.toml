[basic]
description = "Linux 系统中 cdrecord 工具存在缓冲区溢出漏洞，由于程序在处理 dev 参数时未正确检查输入长度，导致可被利用触发栈溢出。本地攻击者可通过向 cdrecord 传递特制的 dev 参数触发该漏洞，从而获取 root 权限。该漏洞影响 Mandriva Linux Mandrake 7.0 等发行版本，CVSS 评分 7.2，危害等级高。攻击者需拥有本地系统访问权限方可利用。"
published = "2000-05-29T04:00:00.000"
remediation = "升级到 Mandriva Linux Mandrake 8.0 或更高版本，其中包含修复 cdrecord 缓冲区溢漏洞的安全补丁。如果无法立即升级，可通过修改 cdrecord 二进制文件使其拒绝接受超长 dev 参数或使用静态堆栈保护机制进行临时缓解。"
score = 7.2
severity = "HIGH"
sources = ["epss"]
title = "Mandriva Linux Mandrake 7.0 缓冲区溢出漏洞"
updated = "2026-06-16T21:51:46.153"

