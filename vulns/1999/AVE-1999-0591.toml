[basic]
description = "Microsoft Site Server 2.0 与 IIS 4.0 存在任意文件上传漏洞，远程攻击者可通过向目标网站上传包含 ASP 脚本的恶意文件，从而在服务器上执行任意命令。该漏洞影响 Microsoft Site Server 2.0 及 IIS 4.0，CVSS 评分 7.2，危害等级高危。攻击者无需身份认证即可利用此漏洞上传任意文件并远程执行代码。Microsoft 已在相关安全更新中修复此漏洞。"
published = "1999-01-30T05:00:00.000"
remediation = '升级 Microsoft Site Server 至受支持的最新版本或完全迁移至现代 Web 平台。在 IIS 中为上传目录禁用脚本执行权限（目录属性→执行权限设为"无"），并部署 URLScan 工具拦截 .asp 文件上传请求。在防火墙/反向代理层过滤对 uploads 目录中 .asp/.aspx 文件的直接访问。如无法立即升级，应禁用匿名写入权限并严格限制上传文件类型。该产品已停止支持，强烈建议迁移至现代替代方案。'
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "Microsoft Site Server 2.0 任意文件上传漏洞"
updated = "2026-06-16T21:48:13.747"

