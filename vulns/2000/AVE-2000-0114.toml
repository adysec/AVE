[basic]
description = 'Microsoft IIS 3.0/4.0 及 Microsoft Index Server 2.0 内置的 Internet Data Query（IDQ）示例脚本存在目录遍历漏洞。由于这些脚本未对用户输入的路径进行充分校验，远程攻击者可在查询请求中插入".."（点-点）形式的恶意路径序列，从而突破 Web 根目录限制，读取服务器上任意受限文件（如配置文件、系统文件等）。该漏洞无需身份认证即可被利用，攻击条件为开放了 IDQ 示例脚本且未应用 MS00-006 补丁的 IIS/Index Server 主机，攻击者仅需向目标发送特制的 HTTP 请求即可远程读取敏感文件，造成信息泄露。'
published = "2000-01-26T05:00:00.000"
remediation = '立即安装 Microsoft 安全公告 MS00-006 提供的补丁，升级 Index Server 2.0 至修复版本并应用 IIS 3.0/4.0 的相应累积更新。同时删除或限制对 .idq、.ida、.htw 等 ISAPI 扩展脚本的访问权限，在 IIS 中移除示例 IDQ 脚本目录，并通过 URLScan 工具过滤包含 "../" 序列的请求作为临时缓解措施。'
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = '{"_meta":{},"stopReason":"end_turn","usage":{"inputTokens":10851,"outputTokens":29,"totalTokens":10880}}'
