[basic]
description = "Microsoft IIS 4.0/5.0 及 PWS 存在 Unicode 编码目录遍历漏洞。远程攻击者可通过向目标服务器发送包含特殊 Unicode 编码字符的恶意 URL 请求，绕过路径限制访问 Web 根目录以外的任意文件，甚至可能导致远程代码执行。该漏洞影响 Windows NT/2000 等操作系统上运行的 IIS 4.0/5.0 及 Personal Web Server 版本，CVSS 评分 7.5，危害等级高。攻击无需身份认证，仅需构造特制的 HTTP 请求即可触发。"
published = "2000-12-19T05:00:00.000"
remediation = "建议立即安装 Microsoft 安全公告 MS00-078 提供的补丁，或安装 IIS Lockdown Tool 2.1 禁用 Unicode 解码漏洞。亦可升级至 IIS 6.0 或更高版本，该版本默认不启用此危险的编码解析特性。临时缓解措施可在 Web 服务器上禁用对 Unicode 编码请求的处理。"
score = 7.5
severity = "HIGH"
sources = ["exploitdb"]
title = "Microsoft IIS 4.0/5.0 Unicode 目录遍历漏洞"
updated = "2026-06-16T21:52:40.277"

