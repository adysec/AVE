[basic]
description = "Microsoft SharePoint Server 存在不受信任数据反序列化漏洞（CWE-502），经过身份认证的攻击者可通过网络向目标 SharePoint 端点发送特制的反序列化 payload（可利用 ysoserial.net 等工具生成），触发漏洞后导致远程代码执行。该漏洞影响 Microsoft SharePoint Enterprise Server 2016、SharePoint Server 2019 及 SharePoint Server Subscription Edition，CVSS 评分 8.8，危害等级高危。该漏洞已被 CISA 列入已知被利用漏洞目录，Microsoft 已在 2026 年 6 月安全更新中修复。"
published = "2026-05-22T23:16:56.273"
remediation = "安装 Microsoft 2026 年对应月份 SharePoint 安全更新（参阅 MSRC 公告），该更新将修复 SharePoint 中的反序列化漏洞。如无法立即打补丁，可在 Web 应用防火墙（WAF）层配置规则拦截包含 ysoserial.net 特征的反序列化攻击载荷，并限制经身份验证用户上传包含序列化数据的文件类型。"
score = 8.8
severity = "HIGH"
sources = ["hwpoc"]
title = "Microsoft SharePoint 反序列化远程代码执行漏洞"
updated = "2026-07-02T12:16:47.143"

