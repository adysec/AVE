[basic]
description = "OpenSSL 1.0.1 至 1.0.1f 版本中的 TLS 和 DTLS 实现未正确验证 Heartbeat 扩展包的长度字段，存在缓冲区越界读取漏洞（CWE-125）。远程攻击者无需任何身份认证，即可通过向目标服务器发送精心构造的 Heartbeat 请求包，从服务器进程内存中读取最多 64KB 的敏感数据，包括私钥、会话密钥、用户密码和会话 Cookie 等。该漏洞被称为心脏滴血（Heartbleed），影响全球约 17% 的 HTTPS 服务器，攻击者可在不留下任何日志痕迹的情况下持续窃取内存数据，危害极为严重。OpenSSL 1.0.1g 版本已修复此漏洞。"
published = "2014-04-07T22:55:03.893"
remediation = "立即升级 OpenSSL 至 1.0.1g 或更高版本（1.0.2、1.1.0 等），或重新编译 OpenSSL 时添加 -DOPENSSL_NO_HEARTBEATS 禁用心跳扩展。同时撤销所有现有 TLS 证书并重新签发，更换服务器私钥，强制用户重置密码和会话令牌。"
score = 7.5
severity = "HIGH"
sources = ["kev"]
title = "OpenSSL TLS/DTLS 心跳扩展缓冲区越界读取漏洞（心脏滴血）"
updated = "2026-06-17T00:02:24.467"

