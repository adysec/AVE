[basic]
description = "Daniel Beckham The Finger Server 0.82 Beta 版本中存在命令注入漏洞，远程攻击者无需身份认证即可通过向 Finger 服务发送包含 shell 元字符的特制请求，利用管道符等特殊字符执行任意系统命令，从而完全控制目标服务器。该漏洞影响 The Finger Server 0.82 Beta 版本，CVSS 评分 10.0，危害等级严重。目前无官方补丁，建议停止使用该软件或通过防火墙限制访问。"
published = "2000-02-04"
remediation = "Daniel Beckham Finger Server 0.82 Beta 已停止维护且无官方补丁。建议立即更换为安全维护中的替代服务（如系统内置 in.fingerd），或直接禁用 finger 服务（79/tcp）。若必须继续使用，应在输入处理层严格过滤 `;&|$()` 等 shell 元字符，并在防火墙限制 finger 端口仅允许可信来源访问。"
score = 10.0
severity = "CRITICAL"
sources = ["cve"]
title = "Daniel Beckham The Finger Server 0.82 远程命令执行漏洞"
updated = "2026-06-16"

