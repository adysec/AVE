[basic]
description = "ColdFusion Server 4.0 的 Syntax Checker（语法检查器）组件存在设计缺陷，远程攻击者无需身份认证即可通过发送特制请求触发该组件的异常处理流程，导致服务器 CPU 资源被耗尽或服务进程崩溃，造成拒绝服务。攻击者只需能够网络访问目标服务器的 ColdFusion 管理接口即可发起攻击，攻击门槛较低。"
published = "2001-03-12"
remediation = "升级至 ColdFusion 5.0 或更高版本以修复 Syntax Checker 拒绝服务漏洞。若短期内无法升级，可通过在 Web 服务器配置中限制对 ColdFusion Syntax Checker 页面的远程访问，使用防火墙规则拒绝外部对 /CFIDE/administrator/ 相关路径的访问，并在网络边界部署入侵检测系统监控针对语法检查接口的异常请求。"
score = 5.0
severity = "MEDIUM"
sources = ["cve"]
title = "Allaire ColdFusion Server 4.0 Syntax Checker 远程拒绝服务漏洞"
updated = "2026-06-16"

