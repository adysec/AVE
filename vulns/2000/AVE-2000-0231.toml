[basic]
description = "Novell NetWare 5.1 的远程 Web 管理工具（Remote Administration Utility）存在缓冲区溢出漏洞，其原因是该工具在处理 HTTP 请求时未对 URL 长度进行有效校验。未经身份认证的远程攻击者只需向目标系统的管理端口发送一个超长的 URL 请求，即可触发栈缓冲区溢出，导致服务崩溃引发拒绝服务，或进一步覆盖返回地址执行任意命令。该漏洞影响 Novell NetWare 5.1 版本，攻击条件较低，无需认证即可远程利用，CVSS 评分 7.5，危害等级为高危。"
published = "2000-04-19T04:00:00.000"
remediation = "升级到 Novell NetWare 5.1 的官方补丁版本（Service Pack 或 NetWare 5.1 Support Pack 2 及以上），并限制远程管理端口（默认 TCP 8008/8009）仅允许受信任的内部 IP 访问，或在防火墙上禁用该端口的外部访问。"
score = 7.5
severity = "HIGH"
sources = ["exploitdb"]
title = "Novell NetWare 5.1 Remote Administration Utility 缓冲区溢出漏洞"
updated = "2026-07-19T00:00:00Z"

