[basic]
description = "Cisco IOS 11.x 和 12.x 版本的 Telnet 守护进程存在拒绝服务漏洞，远程攻击者可在 Telnet 服务尚未就绪接收连接前发送 ENVIRON 选项，触发守护进程异常导致设备重启。该漏洞影响 Cisco IOS 11.x 至 12.0.7 版本，攻击者无需认证即可远程利用，通过发送特制 Telnet 协议包即可使目标设备重启，造成服务中断。CVSS 评分 5.0，属于中等危害级别的拒绝服务漏洞。"
published = "2000-04-20T04:00:00.000"
remediation = "建议将受影响的 Cisco IOS 设备升级至已修复该漏洞的版本（12.0(7.3)、12.0.7.XE1、11.3(9) 及后续版本，或 12.1 主线）。如无法立即升级，可在 VTY 线路配置中通过 access-class 限制可发起 Telnet 连接的源 IP，或在边界过滤 TCP 23 端口的 Telnet 流量作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
