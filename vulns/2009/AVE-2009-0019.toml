[basic]
description = "libpng PNG 参考库在 1.0.43 之前版本及 1.2.35 之前的 1.2.x 版本中存在未初始化指针释放漏洞。攻击者可通过构造恶意 PNG 文件，在 png_read_png 函数处理、pCAL 块处理或 16 位伽马表设置过程中触发未初始化指针释放，导致应用程序崩溃（拒绝服务）或可能执行任意代码。该漏洞影响使用受影响 libpng 版本的所有应用程序（如 pngcrush 等图像处理工具），CVSS 6.8（中等严重度），攻击向量为网络，攻击复杂度中等，无需认证，可造成部分机密性、完整性和可用性影响。攻击者需诱导受害者打开或处理特制 PNG 文件才能触发漏洞。升级至 libpng 1.0.43 或 1.2.35 及以上版本可修复此漏洞。"
published = "2009-02-22T22:30:00.203"
remediation = "建议立即升级 libpng 至 1.0.43 版本（1.0.x 分支）或 1.2.35 版本（1.2.x 分支）及以上版本。通过包管理器更新：Debian/Ubuntu 执行 `apt-get update && apt-get install libpng12-0`，RHEL/CentOS 执行 `yum update libpng`，或从 libpng 官网下载源码编译安装。如无法立即升级，请在应用层限制处理不可信 PNG 文件，或部署应用层 WAF 规则拦截异常 PNG 块结构作为临时缓解。"
score = 6.8
severity = "MEDIUM"
sources = ["tenable"]
title = "libpng 拒绝服务代码执行漏洞"
updated = "2026-06-16T23:04:08.857"

