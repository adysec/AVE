[basic]
description = "NetBSD 1.4.2 系统中的 ftpd 守护程序在解析 /etc/ftpchroot 配置文件条目时存在逻辑缺陷，无法正确对指定用户执行 chroot 操作，导致本应被限制在用户主目录内的 FTP 用户可绕过目录隔离机制，访问系统中其他目录及文件。攻击者只需拥有合法 FTP 账号并被列入 ftpchroot 列表即可利用此漏洞，属于低权限用户越权访问。该漏洞影响 NetBSD 1.4.2 版本，CVSS 评分 2.1，危害等级低。"
published = "2000-05-28T04:00:00.000"
remediation = "升级 NetBSD 至 1.4.3 或更高版本，该版本已修复 ftpd 对 /etc/ftpchroot 的解析逻辑。如无法升级，手动检查 /etc/ftpchroot 配置确保每个用户条目格式正确，并限制受影响用户的 shell 访问权限作为临时缓解。"
score = 2.1
severity = "LOW"
sources = ["cve"]
title = "NetBSD ftpd chroot 绕过漏洞"
updated = "2026-06-16T21:51:47.193"

