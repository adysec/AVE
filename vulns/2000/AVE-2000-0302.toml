[basic]
description = "Windows 2000 域控制器存在未受保护属性访问漏洞（Mixed Object Access），由于 Active Directory 中部分对象属性缺少适当的访问控制机制，导致已获得域内低权限认证的攻击者能够修改目录对象的关键属性。攻击者可通过 LDAP 协议向域控制器发送特制查询请求，利用未受保护的属性修改用户权限、组成员关系或对象安全描述符，从而提升权限或绕过访问控制策略。该漏洞影响 Windows 2000 Server 及 Advanced Server 版本，CVSS 评分 2.1，危害等级低，但结合其他漏洞可能造成更大安全风险。"
published = "2000-04-20T04:00:00.000"
remediation = "立即安装 Microsoft 于 2000 年 4 月发布的 MS00-026 安全更新补丁，下载地址为 https://www.microsoft.com/download/details.aspx?FamilyId=7237F230-A28B-447B-9034-6654DD7CD05E。如无法安装补丁，应严格限制对域控制器的网络访问权限，仅允许受信任管理员登录，并启用 Active Directory 审核日志以监控异常属性修改行为。"
score = 2.1
severity = "LOW"
sources = ["avd"]
title = "Microsoft Windows 2000 域控制器活动目录属性访问控制漏洞"
updated = "2026-06-16T21:51:27.110"

