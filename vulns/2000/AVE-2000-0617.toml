[basic]
description = "Allaire JRun 2.3.x 版本的 Servlet 示例存在信息泄露漏洞。未经身份认证的远程攻击者可以通过 SessionServlet servlet 获取目标系统的敏感信息，例如列出有效的 HttpSession ID 列表。该漏洞影响运行 JRun 2.3.x 的所有服务器，攻击者无需任何凭证即可在不需要交互的情况下远程利用此漏洞，可能导致会话劫持或其他基于获取会话标识符的后续攻击。"
published = "2000-06-22T04:00:00.000"
remediation = "立即应用 Allaire 官方安全补丁（补丁 ID 16290），或将 JRun 升级至 3.1 及以上版本。若无法立即升级，应删除 JRun 安装目录下 /servlets/ 路径中的示例 Servlet（尤其是 SessionServlet），并在 Web 服务器（如 IIS 或 Apache）配置访问控制规则，禁止外部访问 /servlets/* 路径，同时检查并清理已泄露的 HttpSession ID。"
score = 6.4
severity = "MEDIUM"
sources = ["epss"]
title = "Allaire JRun 信息泄露漏洞"
updated = "2026-06-16T21:51:57.270"

