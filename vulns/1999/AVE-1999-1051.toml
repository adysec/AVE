[basic]
description = "Red Hat Linux 4.0 系统中 cmu-snmp 软件包 3.3-1 之前版本的 snmpd 服务器存在配置错误漏洞。由于默认配置不当，未经身份认证的远程攻击者可利用该漏洞对目标系统上的敏感信息进行读取或写入操作，导致信息泄露或系统配置被篡改。该漏洞影响 Red Hat Linux 4.0 及使用相关 cmu-snmp 组件的系统，CVSS 评分 6.4，危害等级中危。"
published = "1999-12-31T05:00:00.000"
remediation = "升级 cmu-snmp 软件包至 3.3-1 或更高版本，并修改 SNMP 配置文件 /etc/snmp/snmpd.conf，将默认 public/private 团体字改为复杂随机字符串；同时在 iptables 防火墙中限制仅信任 IP 可访问 UDP 161 端口，禁用 SNMP 写权限（read-only）。"
score = 6.4
severity = "MEDIUM"
sources = ["cve"]
title = "Red Hat Linux cmu-snmp snmpd 配置错误漏洞"
updated = "2026-06-16T21:50:13.290"

