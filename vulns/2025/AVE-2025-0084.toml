[basic]
description = "群杰印章管理系统存在密码重置权限绕过漏洞，攻击者可在未经过身份认证的情况下，通过构造特定请求绕过权限校验直接重置印章管理员密码。该漏洞源于系统对密码重置接口缺乏有效的身份验证与授权检查，导致任意用户可提交重置请求并控制印章账户。影响范围涵盖群杰印章管理系统相关版本，攻击者无需前置条件即可远程利用，成功利用后可完全接管印章管理权限，导致印章滥用、文件伪造等严重安全后果。"
published = "0719"
remediation = "建议升级群杰印章智能管理平台至最新版本，该版本已修复密码重置接口的权限校验缺陷。如无法立即升级，可在反向代理层对 `/api/resetPassword` 等密码重置相关接口添加 IP 白名单和二次认证，同时限制同一账号的密码重置请求频率（如每小时不超过 3 次）。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "群杰印章系统密码重置权限绕过漏洞"
updated = "0719"

