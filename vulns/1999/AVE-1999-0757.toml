[basic]
description = "Omnicron OmniHTTPD 1.1 及 2.0 Alpha 1 版本的 visadmin.exe 管理程序存在拒绝服务漏洞。远程攻击者可通过向目标服务器发送特制的畸形 URL 请求，触发该程序在服务器上创建大量临时文件，耗尽磁盘空间或系统资源，导致 Web 服务无法正常响应。该漏洞无需身份认证即可利用，攻击门槛低，影响运行上述版本 OmniHTTPD 的服务器系统。"
published = "1999-06-05T04:00:00.000"
remediation = "升级 OmniHTTPd 至 2.10 或更高版本（该版本已修复 visadmin.exe 畸形 URL 导致大量临时文件创建的缺陷），或在 Web 服务器配置中限制对 /visadmin.exe 路径的访问，仅允许受信任 IP 调用该管理接口。由于该产品已停止维护，建议迁移至 Apache HTTP Server 或 Nginx 等现代 Web 服务器以获得持续安全更新。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Omnicron OmniHTTPd visadmin.exe 拒绝服务漏洞"
updated = "2026-06-16T21:49:25.977"

