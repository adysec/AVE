[basic]
description = 'SCO UNIX 4.2 及更早版本中的 "at" 计划任务程序存在权限配置缺陷，本地已登录的普通用户可利用该程序的安全漏洞将自身权限提升至 root 超级用户。该漏洞影响运行 SCO UNIX 4.2 及之前版本的系统，攻击条件为攻击者需先在目标主机上获得本地普通用户访问权限，随后通过调用存在缺陷的 "at" 程序实现本地权限提升（LPE）。利用方式无需远程网络访问，仅依赖本地账户即可完成提权，从而获得系统的完全控制权。'
published = "1994-11-30T05:00:00.000"
remediation = "升级至 SCO UNIX 5.x 或更高版本，该版本已修复 at 程序的权限缺陷。临时缓解措施：移除 /usr/bin/at 的 setuid 权限（chmod u-s /usr/bin/at），并通过 /etc/at.allow 文件限制仅授权用户可使用 at 命令，防止普通用户以此提升为 root 权限。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "SCO UNIX at 程序本地权限提升漏洞"
updated = "2026-06-16T21:50:09.447"

