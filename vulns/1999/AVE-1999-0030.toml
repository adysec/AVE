[basic]
description = "ISC BIND 4.9 及 8 系列版本中存在反向查询缓冲区溢出漏洞。远程攻击者无需身份认证，通过向目标 DNS 服务器发送特制的反向查询请求包即可触发该漏洞，造成缓冲区溢出，从而在目标系统上执行任意代码或导致拒绝服务。该漏洞影响运行 BIND 4.9 和 BIND 8 的多个操作系统平台，包括 BSD、Solaris、HP-UX 等广泛使用的系统，CVSS v2.0 评分 10.0，危害等级严重。"
published = "1998-04-08"
remediation = "将 ISC BIND 立即升级至 8.2 及以上版本，或应用厂商提供的针对 8.1.2 的补丁。无法升级时，限制 named 服务仅对可信 DNS 服务器开放递归查询，并启用 ACL 访问控制列表限制来源 IP。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "ISC BIND 远程缓冲区溢出漏洞"
updated = "1998-04-08"

