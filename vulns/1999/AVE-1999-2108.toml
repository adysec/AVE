[basic]
description = "Windows Internet Naming Service (WINS) 存在设计缺陷，远程攻击者可通过向 WINS 服务器发送恶意的 1Ch 注册请求，导致 WINS 将域控制器记录指向攻击者控制的恶意服务器，从而造成域名解析劫持。成功利用后，可导致网络连接丢失（拒绝服务）或窃取用户凭据。该问题在 Windows 95/98 客户端环境下或主域控制器不可用时影响可能受限。"
published = "2009-01-15T01:30:00.407"
remediation = "在 Windows NT 4.0 Server 上安装 Microsoft Security Bulletin MS99-009 对应补丁。如操作系统已停止支持，建议升级到 Windows Server 2003 及以上版本。在 WINS 管理控制台中启用「禁止动态更新」或对 1Ch 记录配置静态映射，防止恶意注册篡改域控制器指向。在边界防火墙上限制 UDP/TCP 137-139、445 端口的入站访问，仅允许信任网段访问 WINS 服务。"
score = 7.6
severity = "HIGH"
sources = ["epss"]
title = "Microsoft Windows Internet Naming Service (WINS) 域控制器劫持漏洞"
updated = "2026-06-16T21:50:47.633"

