[basic]
description = "Worm HTTP Server 存在目录遍历漏洞，远程攻击者无需身份认证即可通过向目标发送包含 `..` 序列的特制 HTTP 请求，突破路径限制读取服务器上的任意文件。该漏洞可导致敏感信息泄露（如配置文件、密码文件等），影响使用 Worm HTTP Server 的所有版本，危害等级中危。"
published = "2000-10-20T04:00:00.000"
remediation = "立即停止使用 Worm HTTP server，该软件已停止维护且无官方补丁。建议迁移至 Apache HTTP Server 或 Nginx 等现代 Web 服务器，并确保对用户输入路径进行规范化校验，禁止包含 ../ 等目录遍历序列的请求。如临时无法替换，可在 Web 服务器前端部署反向代理或 WAF，配置规则拦截包含 .. 的 URL 路径。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Worm HTTP Server 目录遍历任意文件读取漏洞"
updated = "2026-06-16T21:52:21.880"

