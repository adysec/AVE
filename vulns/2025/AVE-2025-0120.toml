[basic]
description = "深信服运维安全管理系统 /fort/system;login/netConfig/set_port 接口存在 Redis 命令注入漏洞。未授权的远程攻击者可通过向目标系统发送特制的 POST 请求，在 select 参数中注入 Redis 命令，结合 Redis 主从复制或 crontab 写文件机制实现远程代码执行。该漏洞影响深信服运维安全管理系统多个版本，攻击者无需认证即可利用，可致服务器被完全控制，危害严重。"
published = "2025-07-02"
remediation = "升级深信服运维安全管理系统至官方修复版本；临时缓解措施：在网络层限制 /fort/system;login/netConfig/set_port 接口的外网访问，启用访问认证并关闭不必要的 Redis 端口暴露。"
score = 9.8
severity = "HIGH"
sources = ["hwpoc"]
title = "深信服 运维安全管理系统 远程代码执行漏洞"
updated = "2025-07-02"

