[basic]
description = "Netopia Timbuktu Pro 是一款远程控制与桌面共享软件。该软件在远程会话认证过程中，以明文形式在网络上传输用户名和口令，未采用任何加密保护机制。攻击者在网络链路中实施嗅探（如 ARP 欺骗或共享介质监听）即可截获凭据，进而冒充合法用户获得对目标主机的远程控制权限。攻击条件为攻击者能够访问目标与客户端之间的通信链路。"
published = "2000-01-20"
remediation = "升级到已修复凭据传输加密的 Netopia Timbuktu Pro 新版本；在网络层启用 SSH 隧道或 VPN 加密链路，避免明文凭据在不可信网络中传输。"
score = 5.0
severity = "MEDIUM"
sources = ["cve"]
title = "Netopia Timbuktu Pro 明文传输用户名与口令漏洞"
updated = "2026-07-18"

