[basic]
description = "明尼苏达大学（UMN）Gopherd 2.x 的 Halidate 函数存在缓冲区溢出漏洞。远程攻击者无需身份认证即可向目标系统发送特制的 DES 密钥生成请求（GDESkey），其中包含超长的 ticket 值，从而触发缓冲区溢出，导致任意代码执行。CVSS 评分 10.0，攻击复杂度低，无需交互即可完全控制目标系统，机密性、完整性和可用性均受到严重影响。"
published = "2000-10-20T04:00:00.000"
remediation = "立即在 gopherd 源码目录执行 ./configure --disable-auth 禁用认证功能后重新编译部署，或升级到 UMN 官方发布的补丁版本。由于 Gopher 协议已淘汰且官方不再维护，建议将服务迁移至 HTTP/HTTPS 协议并彻底停用 gopherd 进程，同时在防火墙禁用 TCP 端口 70 以防止外部访问。"
score = 10
severity = "CRITICAL"
sources = ["cve"]
title = "明尼苏达大学 Gopherd 缓冲区溢出漏洞"
updated = "2026-06-16T21:52:23.430"

