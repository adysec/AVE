[basic]
description = "Linux man 命令存在格式字符串漏洞，本地攻击者可通过向 `man -l` 参数传递特制的格式字符串触发该漏洞，导致内存越界读写，进而实现本地权限提升（LPE）。该漏洞影响 Debian 2.2 及 S.u.S.E 6.3/6.4/7.0 等发行版，CVSS 评分 7.2，危害等级高。攻击者需拥有本地账户并执行恶意构造的 man 命令来利用此漏洞。"
published = "2001-05-03T04:00:00.000"
remediation = "对于 Debian 2.2 (potato)，立即升级 man-db 软件包至已修复版本：执行 `apt-get update && apt-get upgrade man-db` 或参考 DSA-028 安全公告手动安装补丁。对于 S.u.S.E Linux 6.3/6.4/7.0，升级 man 软件包至厂商提供的修复版本。如无法立即升级，可通过移除 man 的 setuid 位作为临时缓解：`chmod u-s /usr/bin/man`。"
score = 7.2
severity = "HIGH"
sources = ["exploitdb"]
title = "Linux man 本地格式字符串漏洞"
updated = "2026-06-16T21:53:51.257"

