[basic]
description = "Netscape Enterprise Server 3.6 版本（安装了 SSL Handshake Patch）的 Accept 命令存在缓冲区溢出漏洞。远程攻击者可通过向服务器发送特制的 Accept 请求头，触发缓冲区溢出，导致服务进程崩溃或可能执行任意代码。该漏洞影响 Netscape Enterprise Server 3.51 及 3.6 SP2 版本，CVSS v2.0 评分 5.0，危害等级中危，攻击向量为网络远程攻击，无需认证即可利用。"
published = "1999-09-13"
remediation = "Netscape Enterprise Server 已于 2007 年停止支持，官方不再提供安全更新。建议立即迁移至受支持的 Web 服务器（如 Apache HTTP Server、Nginx 或 IIS），并彻底停用旧版 Netscape 服务器。如无法立即迁移，应在防火墙层面限制对 80/443 端口的访问来源，仅允许可信 IP 连接。"
score = 5.0
severity = "MEDIUM"
sources = [
    "cve",
    "avd",
]
title = "Netscape Enterprise Server Accept 命令缓冲区溢出漏洞"
