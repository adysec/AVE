[basic]
description = "Netscape 4.75 及更早版本的 HTML 解析器存在缓冲区溢出漏洞，远程攻击者可通过在表单字段中提交超长的 password 值触发该漏洞，导致任意命令执行。攻击者无需身份认证，只需诱导用户访问特制网页即可利用。该漏洞影响 Netscape Communicator/Navigator 4.75 及之前版本，CVSS 评分 7.5，危害等级高。"
published = "2001-01-09T05:00:00.000"
remediation = "立即升级 Netscape Communicator/Navigator 至 4.76 或更高版本，该版本已修复 HTML 解析器在处理超长表单密码字段时的缓冲区溢出漏洞。由于 Netscape 4.x 系列已停止维护，建议彻底弃用该浏览器，改用 Firefox、Chrome 等仍在安全支持期内的现代浏览器。如无法立即升级，可在网络层面部署入侵检测规则（如 Snort）拦截包含超长表单字段的 HTTP 请求作为临时缓解措施。"
score = 7.5
severity = "HIGH"
sources = ["redhat"]
title = "Netscape Communicator HTML解析器缓冲区溢出远程代码执行漏洞"
updated = "2026-06-16T21:53:20.427"

