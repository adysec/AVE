[basic]
description = "用友YonBIP（R6旗舰版）存在任意用户密码重置漏洞，攻击者无需用户交互即可绕过认证机制，通过构造特制请求重置任意用户密码，进而获取高权限访问。该漏洞影响用友YonBIP R6旗舰版及相关组件，可导致系统数据泄露、业务被篡改等严重后果。建议用户及时更新至安全版本或部署临时防护措施。"
published = "0716"
remediation = "立即联系用友官方获取最新安全补丁并升级YonBIP R6旗舰版至最新版本。在补丁部署前，建议临时限制YonBIP管理后台的访问权限，仅允许内网IP段访问，并启用多因素认证机制。同时检查并重置所有高权限账户密码，审计近期的密码重置操作日志，排查是否存在异常操作痕迹。"
