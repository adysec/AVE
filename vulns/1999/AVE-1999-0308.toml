[basic]
description = "CDE 日历管理服务守护进程（rpc.cmsd）存在缓冲区溢出漏洞，远程攻击者可通过向目标系统发送特制的 RPC 请求触发该漏洞，导致拒绝服务或任意代码执行。该漏洞影响 Caldera OpenUnix 8.0/UnixWare 7.1.1、HP HP-UX 11.0、Solaris 7.0 及 SunOS 4.1.4 等多个 Unix 操作系统版本，CVSS 评分 10.0，危害等级严重。攻击者无需身份认证即可远程利用此漏洞。"
published = "1999-07-01T04:00:00.000"
remediation = "建议立即安装各厂商对应安全补丁：Solaris 7.0 安装补丁 106827-01 或 106828-01，HP-UX 11.0 安装 PHSS_19757 补丁，UnixWare 7.1.1 安装 erg711905 补丁。如无法打补丁，可在 inetd.conf 中注释掉 rpc.cmsd 服务行并重启 inetd，或在防火墙层面阻止对 611/TCP 端口的访问作为临时缓解措施。"
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "多厂商 CDE Calendar Manager Service Daemon (rpc.cmsd) 缓冲区溢出漏洞"
updated = "2026-06-16T21:48:52.067"

