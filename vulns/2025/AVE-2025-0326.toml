[basic]
description = "灵当 CRM 的 getLogInfo.php 接口存在身份验证绕过与文件上传漏洞，未经授权的远程攻击者可直接向该接口发送特制的 multipart/form-data 请求，上传包含恶意 PHP 代码的文件到服务器，从而导致远程代码执行或获取服务器控制权限。该漏洞利用门槛低，无需登录认证即可触发，对部署了灵当 CRM 的网站服务器构成严重安全威胁。"
published = "0702"
remediation = "建议立即升级灵当 CRM 至官方最新版本，该版本已修复 getLogInfo.php 未授权文件上传漏洞。如无法立即升级，可修改 Web 服务器配置（Nginx/Apache），对 /crm/WeiXinApp/CallRecordLog/ 目录添加访问认证或限制仅内网 IP 访问，同时在 WAF 侧拦截上传文件中的 PHP 代码内容作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "灵当 CRM getLogInfo.php 文件上传漏洞"
updated = "0702"

