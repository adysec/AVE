[basic]
description = "Linux 内核 nvme-rdma 驱动中存在释放后使用漏洞，在创建 NVMe over RDMA 控制器失败时，驱动对 admin 队列执行了静默（quiesce）操作但未在销毁前取消静默（unquiesce），导致待处理请求无法被排空，内核线程永久阻塞在 blk_mq_freeze_queue_wait() 上，造成系统拒绝服务。攻击者需具备相邻网络访问权限和低权限账户，通过触发控制器创建失败即可利用该漏洞。CVSS 评分 5.7，危害等级中等。Linux 内核主线已提交补丁修复此问题。"
published = "2025-01-11T13:15:23.840"
remediation = "立即升级 Linux 内核至 6.6.88、6.12.5 或 6.13 及以上版本，或合入修复补丁 05b436f3cf65、427036030f4d、5858b6875598。Ubuntu 24.04 LTS 用户请安装 USN-7381-1 或 USN-7450-1 安全更新。如无法立即升级，可在不影响业务的前提下限制对 nvme-rdma 设备的本地访问权限作为临时缓解。"
score = 5.7
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux Kernel nvme-rdma 驱动管理队列销毁前未取消静默导致内核挂起漏洞"
updated = "2026-06-17T07:59:59.503"

