[basic]
description = "IBM WebSphere 2.0/3.0 版本中的 ikeyman 工具使用弱加密算法存储 SSL 密钥数据库的密码，导致本地攻击者可通过访问密钥数据库文件并破解弱加密获取明文密码，进而解密 SSL 通信流量或伪造数字证书实施中间人攻击。该漏洞影响 IBM WebSphere 2.0 和 3.0 版本，CVSS 评分 10.0（严重级别），攻击者需具备本地文件系统访问权限方可利用。IBM 已发布修复版本修复该弱加密漏洞。"
published = "1999-10-24T04:00:00.000"
remediation = "升级 IBM WebSphere 至 4.0 及以上版本，该漏洞在后续版本中已修复。对于无法升级的旧系统，应避免使用 ikeyman 工具存储 SSL 密钥库密码，改用外部硬件安全模块(HSM)或手动管理密钥库文件并设置文件系统权限为仅管理员可读。同时审查所有使用 ikeyman 生成的密钥库，重新生成使用强加密算法(AES-256)保护的证书和密钥。"
score = 10
severity = "CRITICAL"
sources = ["exploitdb"]
title = "IBM WebSphere ikeyman 弱加密漏洞"
updated = "2026-06-16T21:49:22.783"

