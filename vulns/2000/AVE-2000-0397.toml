[basic]
description = "RealNetworks RealServer 7.0、7.0.1及8.0 Beta版本的view-source目录存在拒绝服务漏洞。远程攻击者无需身份认证，通过向目标服务器发送特制的畸形请求访问viewsource目录下的页面，可触发该漏洞导致RealServer服务崩溃，造成拒绝服务。该漏洞CVSS评分7.8，危害等级高，影响上述版本的所有部署实例。目前厂商尚未发布官方补丁，建议通过访问控制限制对该目录的访问。"
published = "2000-06-01T04:00:00.000"
remediation = "升级至 RealServer 8.0 正式版或更高版本，该版本已修复 viewsource 目录的畸形请求处理缺陷。如无法升级，可在 Web 服务器或反向代理层限制对 /viewsource/ 路径的访问，阻止外部畸形请求到达 RealServer 服务进程。另外建议将 RealServer 置于防火墙后方，仅允许可信 IP 访问管理接口。"
score = 7.8
severity = "HIGH"
sources = ["exploitdb"]
title = "RealNetworks RealServer 拒绝服务漏洞"
updated = "2026-06-16T21:51:48.737"

