[basic]
description = "Novell NetWare 5.0 的 SMDR.NLM 模块存在拒绝服务漏洞，远程攻击者可通过向目标系统的 UDP 端口 40193 发送大量随机数据包，导致 SMDR 服务崩溃，造成系统拒绝服务。该漏洞影响 NetWare 5.0 SP5 及 6.0 SP1 版本，攻击者无需身份认证即可远程触发，CVSS 评分 5.0，危害等级中等。目前官方尚未发布补丁，建议通过防火墙限制对 40193 端口的访问以缓解风险。"
published = "2000-07-11T04:00:00.000"
remediation = "建议从 Novell 官方获取 SMDR.NLM 的修复补丁或升级至 NetWare 5.1 及以上版本。如无法升级，在服务器控制台执行 `unload smdr` 卸载该模块以消除攻击面。在边界防火墙上禁止外部对 UDP 40193 端口的访问，并配置内部交换机 ACL 仅允许受信管理主机访问该端口，以降低内网横向攻击风险。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Novell NetWare 5.0 SMDR.NLM 拒绝服务漏洞"
updated = "2026-06-16T21:52:13.830"

