[basic]
description = "CVS Kit CVS Server 1.10.8 存在访问控制缺陷，远程攻击者可通过 CVS 提交操作在服务器上创建恶意的 Checkin.prog 或 Update.prog 程序文件。由于服务器未对用户创建可执行程序进行充分限制，攻击者可植入特洛伊木马程序，当其他用户执行 CVS 操作时触发执行，实现任意代码运行。该漏洞影响 CVS 1.10.8 版本，CVSS 评分 7.2，危害等级高。"
published = "2000-10-20T04:00:00.000"
remediation = "升级 CVS 服务器至 1.11.x 或更高版本，此类版本已禁止普通用户创建 Checkin.prog/Update.prog 文件。如无法升级，可通过服务器端脚本移除仓库目录下所有 .prog 文件的执行权限，并限制 CVS 仓库仅允许受信用户通过 SSH 隧道提交，同时定期审计仓库中新增的可执行文件。"
score = 7.2
severity = "HIGH"
sources = ["cve"]
title = "CVS CVS Server 1.10.8 任意程序执行漏洞"
updated = "2026-06-16T21:52:15.253"

