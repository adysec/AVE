[basic]
description = "这是一个使用于 Mozilla Firefox、Thunderbird 和 SeaMonkey 等 Mozilla 产品的 HTML 解析器中的使用后释放漏洞。攻击者可以构造包含恶意 HTML 内容的网页，当浏览器解析此类网页时，会由于内存不足导致 HTML 解析器错误地释放仍在使用的内存对象。随后攻击者控制的文本可以覆写这些被释放的内存区域，当相关方法被调用时，就可能导致这些被覆写的内存对象执行攻击者提供的任意代码。该漏洞影响Firefox 3.0.x版本低于3.0.18及3.5.x版本低于3.5.8的用户，以及Thunderbird低于3.0.2及SeaMonkey低于2.0.3的用户。CVSS评分10.0，危险程度极高，可通过简单的网络攻击实现远程代码执行。Mozilla 在发布Firefox 3.5.8版本时对此漏洞进行了修复。"
published = "2010-02-22T13:00:01.737"
remediation = '立即升级 Firefox 3.0.x 至 3.0.18 或更高版本，或升级 Firefox 3.5.x 至 3.5.8 或更高版本；Thunderbird 用户升级至 3.0.2 及以上；SeaMonkey 用户升级至 2.0.3 及以上。临时缓解：在 Firefox 中禁用 JavaScript（工具→选项→内容→取消勾选"启用 JavaScript"），或安装 NoScript 扩展禁用非信任站点脚本执行。'
score = 10
severity = "CRITICAL"
sources = ["tenable"]
title = "Mozilla Firefox HTML解析器释放后使用远程代码执行漏洞"
updated = "2026-06-16T23:07:32.653"

