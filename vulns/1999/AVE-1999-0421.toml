[basic]
description = "NCSA 1.3/1.4.x/1.5 及 Apache HTTPd 0.8.11/0.8.14 的 ScriptAlias 目录配置存在源码泄露漏洞。攻击者可通过直接访问 ScriptAlias 指定目录下的 CGI 程序文件，绕过服务器对脚本的正常执行处理，从而以明文方式读取 CGI 程序的源代码，导致数据库连接凭证、业务逻辑及内部算法等敏感信息暴露。远程攻击者无需任何身份认证即可利用此漏洞，危害严重。"
published = "1997-01-01T05:00:00.000"
remediation = "立即升级至 Apache HTTPD 2.4.x 或更新版本（NCSA httpd 已停止维护超过 20 年），该漏洞已在 Apache 1.x 后续版本修复。确保 ScriptAlias 目录配置中不包含源文件读取权限，移除不必要的目录映射并限制 CGI 目录的访问控制。"
score = 7.5
severity = "HIGH"
sources = ["exploitdb"]
title = "NCSA HTTPd / Apache httpd ScriptAlias 源代码泄露漏洞"
updated = "2026-06-16T21:47:58.393"

