[basic]
description = "Langflow 是一款开源的低代码 AI 工作流构建工具，其组件接口存在未授权代码注入漏洞。远程攻击者可在无需认证的情况下，通过构造恶意请求向内置组件注入 Python 代码，导致任意代码执行，从而完全控制服务器。该漏洞影响 1.3.0 之前的所有版本，官方已在 1.3.0 版本中修复此问题。"
published = "nday"
remediation = "建议立即将 Langflow 升级至 1.3.0 或更高版本，该版本在 PR #6911 中为 `/api/v1/validate/code` 端点添加了认证校验。如无法立即升级，可在反向代理或 WAF 层面限制该端点的外部访问，仅允许可信 IP/内网调用；同时禁用未使用的 API 端点并实施严格的输入校验。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "Langflow 未授权代码注入漏洞"
updated = "nday"

