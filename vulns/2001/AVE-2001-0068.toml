[basic]
description = "WebMaster ConferenceRoom 1.8.1 存在拒绝服务漏洞，远程攻击者可通过在与 IRC 服务器建立好友关系时克隆服务器连接，导致目标系统资源耗尽而拒绝服务。该漏洞利用方式简单，无需身份认证即可触发，影响 ConferenceRoom 1.8 Developer Edition 版本。"
published = "2001-03-26T05:00:00.000"
remediation = "升级 ConferenceRoom 至 1.8.2 或更高版本（厂商曾发布补丁修复好友关系验证缺陷）。如产品已停止维护无法升级，建议迁移至 InspIRCd 或 UnrealIRCd 等受支持的现代 IRC 服务器。临时缓解措施：在防火墙上限制 IRC 端口（6660-6669）仅允许可信 IP 通信，并禁用 IRC 服务器克隆（server clone）功能以防止利用。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "WebMaster ConferenceRoom 1.8 拒绝服务漏洞"
updated = "2026-06-16T21:53:49.147"

