[info]
author = "AVE"
description = "检测 /dev/kmem 设备文件是否可被非特权用户读取。CVE-1999-0426 影响 Linux 内核 2.0.36 之前版本，/dev/kmem 默认权限为世界可读（CWE-276），本地用户可读取内核虚拟内存中的 TCP 连接数据结构，用于伪造 IP 源地址实施盲欺骗攻击。"
id = "POC-AVE-1999-0079"
name = "Linux Kernel /dev/kmem Default Permission CVE-1999-0426 PoC"
severity = "critical"
tags = ["cve-1999-0426"]
vuln_id = [
    "CVE-1999-0426",
    "AVE-1999-0079",
]

[poc]
logic = "all"

[[poc.requests]]
path = "/dev/kmem"
protocol = "file"

[[poc.requests.matchers]]
expect = false
part = "body"
type = "word"
words = [
    "denied",
    "No such",
    "error",
]
