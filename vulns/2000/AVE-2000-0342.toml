[basic]
description = "Cayman 3220-H DSL 路由器与 GatorSurf 5.3 的 HTTP 管理接口存在拒绝服务漏洞。远程攻击者可通过向管理接口提交超长用户名或密码，导致路由器服务崩溃或无法响应正常请求。该漏洞无需身份认证即可触发，攻击门槛低，影响使用该设备的网络环境稳定性和可用性。"
published = "2000-05-17T04:00:00.000"
remediation = "将路由器固件升级至最新版本；如厂商已停止支持，建议更换受支持的设备。在管理界面配置访问控制列表（ACL），限制仅允许可信 IP 段访问 HTTP 管理端口（默认 80）。同时设置强密码策略，避免使用过长或异常字符的凭据触发缓冲区异常。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Cayman 3220-H DSL Router HTTP管理接口拒绝服务漏洞"
updated = "2026-06-16T21:51:40.330"

