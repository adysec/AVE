[info]
author = "AVE"
description = "检测目标服务器上是否存在 fpcount.exe CGI（IIS 4.0 FrontPage Server Extensions 组件），其存在表示可能受缓冲区溢出漏洞影响"
id = "POC-AVE-1999-1483"
name = "CVE-1999-1376 PoC"
severity = "critical"
tags = ["ave-1999-1483"]
vuln_id = [
    "CVE-1999-1376",
    "AVE-1999-1483",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/_vti_bin/fpcount.exe"
protocol = "http"

[[poc.requests.matchers]]
expect = true
status = [502]
type = "status"
