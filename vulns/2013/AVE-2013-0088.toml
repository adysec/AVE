[basic]
description = "Adobe ColdFusion 9.0、9.0.1、9.0.2 及 10 版本中的 administrator.cfc 组件存在身份验证绕过漏洞。远程攻击者可利用 RDS 组件的默认空密码直接登录，进而访问管理后台 Web 界面，无需任何身份凭证即可获取系统完全控制权限，实现任意代码执行。该漏洞 CVSS 评分 9.8，危害等级严重，已在 2013 年 1 月被野外大规模利用。Adobe 官方已发布安全更新修复此漏洞。"
published = "2013-01-17T00:55:01.200"
remediation = '立即升级 Adobe ColdFusion 至 9.0.2 CHF1 或 10 Update 1 及以上版本（参考 APSB13-03）。如无法升级，在 CFAdmin 中禁用 RDS 服务（取消勾选"Enable RDS"），或为 RDS 设置强密码（CFAdmin > RDS > Password）。同时在网络层面限制对 ColdFusion 管理后台（/CFIDE/administrator/）的访问来源 IP。'
score = 9.8
severity = "CRITICAL"
sources = ["kev"]
title = "Adobe ColdFusion 身份验证绕过漏洞"
updated = "2026-06-16T23:49:48.073"

