[basic]
description = "CommuniGatePro 产品在处理 HTTP 配置端口请求时存在严重的缓冲区溢出安全漏洞。由于输入验证机制不足，攻击者可远程向服务器发送长度超标的字符串来触发堆内存溢出，导致程序崩溃或执行任意代码。此漏洞影响所有当前支持 CommuniGatePro 的版本，攻击者无需身份验证即可利用该漏洞，给产品安全造成极大威胁。"
published = "1999-12-03T05:00:00.000"
remediation = "立即升级至 CommuniGatePro 3.2b5 或 3.2b7 及以上版本，厂商已在 3.2 beta 系列中修复此漏洞。如无法升级，在防火墙层面限制对 HTTP 配置端口（8010/TCP）的远程访问，仅允许受信任管理 IP 连接，以降低被利用风险。"
