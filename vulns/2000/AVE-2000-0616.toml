[basic]
description = "Jack De Winter WinSMTP 1.06f 及 2.x 版本存在缓冲区溢出漏洞。远程攻击者无需身份认证即可向目标 SMTP 服务的 25 端口发送超长的 USER 或 HELO 命令，触发缓冲区溢出，导致 WinSMTP 服务进程崩溃，造成拒绝服务。该漏洞 CVSS 评分 10.0，危害等级严重，影响范围包括 WinSMTP 1.06f 及完整 2.x 系列版本。"
published = "2000-11-14T05:00:00.000"
remediation = "WinSMTP 已停止维护多年，官方未提供安全补丁。建议立即停用 WinSMTP，迁移至仍受支持的 SMTP 服务器软件（如 Postfix、Exchange Server）。如暂时无法迁移，应在防火墙层面限制仅允许受信任 IP 访问 TCP 25 端口，并部署 IPS/IDS 规则检测 USER/HELO 命令的异常超长载荷作为临时缓解措施。"
score = 10
severity = "CRITICAL"
sources = ["exploitdb"]
title = "Jack De Winter WinSMTP 远程缓冲区溢出漏洞"
updated = "2026-06-16T21:52:33.727"

