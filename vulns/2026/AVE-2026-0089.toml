[basic]
description = "7-Zip 在解析 NTFS 格式压缩文件时，其 NTFS 处理器中的 `GetCuSize()` 函数因整数溢出缺陷导致堆缓冲区越界写入漏洞（CWE-190）。攻击者可通过构造恶意的 NTFS 镜像文件（如 .ntfs/.img 或包含此类文件的压缩包），诱导受害者使用 7-Zip 打开或解压，触发越界写入操作覆盖对象虚表指针，造成任意代码执行或程序崩溃。该漏洞影响 7-Zip 26.00 及之前版本，CVSS 评分 8.8，危害等级高。官方已在 7-Zip 26.01 版本中修复此问题。"
published = "2026-06-05T15:16:53.520"
remediation = '升级到 7-Zip 26.01 或更高版本；如无法升级，在注册表 `HKEY_LOCAL_MACHINE\SOFTWARE\7-Zip` 中禁用 NTFS 处理模块，或删除/重命名 7z.dll 中 NTFS 相关处理函数；企业环境通过 AppLocker 或 Software Restriction Policy 限制 7z.dll 加载；避免使用 7-Zip 打开来源不明的 .ntfs/.img 及压缩包文件。'
score = 8.8
severity = "HIGH"
sources = ["hwpoc"]
title = "7-Zip NTFS 处理器堆缓冲区溢出漏洞"
updated = "2026-06-17T10:54:50.997"

