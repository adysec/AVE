[info]
author = "ave"
description = "通过向目标发送超长域名的DNS数据包（UDP 53端口），检测Solaris snoop程序print_domain_name函数缓冲区溢出漏洞。目标系统需正在运行snoop并以详细模式（verbose mode）捕获网络流量，攻击者可利用此漏洞获取root权限。"
id = "POC-AVE-1999-1506"
name = "CVE-1999-0973 Solaris snoop print_domain_name Buffer Overflow PoC"
severity = "critical"
tags = ["ave-1999-1506"]
vuln_id = [
    "CVE-1999-0973",
    "AVE-1999-1506",
]

[poc]
logic = "all"

[[poc.requests]]
dns_type = "A"
path = "{{Hostname}}"
protocol = "dns"

[[poc.requests.matchers]]
expect = false
part = "body"
type = "word"
words = [
    "root:",
    "bin:",
    "sys:",
    "nobody:",
]
