[basic]
description = "Evolvable Shambala Server 4.5 存在拒绝服务漏洞，远程攻击者通过向目标服务器建立 TCP 连接后立即关闭连接，可导致服务器服务崩溃或资源耗尽，无法响应正常请求。该漏洞影响 Shambala Server 4.5 版本，攻击者无需认证即可利用，CVSS 评分 5.0，属于中危漏洞。目前厂商已停止维护，建议用户迁移至其他替代产品。"
published = "2000-12-19T05:00:00.000"
remediation = "Shambala Server 4.5 已停止维护且无官方补丁，建议立即停止使用该版本，迁移至受支持的替代产品。如无法立即下线，可在防火墙或网络边界配置规则，限制对 Shambala Server 端口的非信任来源访问，并禁用未使用的网络接口以降低攻击面。若业务需要继续运行，可考虑在应用前端部署反向代理或 IPS 设备过滤异常连接行为作为临时缓解。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Evolvable Shambala Server 4.5 拒绝服务漏洞"
updated = "2026-06-16T21:52:50.670"

