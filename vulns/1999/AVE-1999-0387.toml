[basic]
description = "wu-ftpd 在处理 FTP 会话时调用 GNU tar 命令进行文件归档操作，但未对用户输入的参数进行充分过滤，导致存在命令注入漏洞。远程攻击者可通过构造特制的 FTP 请求，将恶意参数注入到 tar 命令中，从而在目标服务器上以 FTP 进程权限执行任意系统命令。该漏洞影响 wu-ftpd 等多款 FTP 服务程序，CVSS 评分 7.5，危害等级高危。"
published = "1997-01-01T05:00:00.000"
remediation = "升级 wu-ftpd 至 2.6.2 及以上版本，该版本修复了 GNU tar 管道执行任意命令的问题。由于 wu-ftpd 已停止维护，建议迁移至 vsftpd 或 ProFTPD 等仍受支持的 FTP 服务器。如无法立即迁移，可在 ftpaccess 中禁用 tar 命令转发功能：`tar /bin/true`。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "wu-ftpd 远程代码执行漏洞"
updated = "2026-06-16T21:47:54.110"

