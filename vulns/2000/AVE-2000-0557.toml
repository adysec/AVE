[basic]
description = "IBM WebSphere Server 3.0.2 存在 JSP 源代码泄露漏洞。远程攻击者可通过将 JSP 文件扩展名改为大写形式（如将 `.jsp` 改为 `.JSP`）向目标服务器发起请求，服务器在处理大写扩展名的 JSP 文件时，因未对文件扩展名进行标准化处理，导致返回 JSP 源代码而非执行结果，造成数据库连接信息、业务逻辑等敏感信息泄露。该漏洞影响 IBM WebSphere Server 3.0.2 及多个供应商的同类产品，攻击者无需认证即可远程利用，危害较大。"
published = "2000-06-08T04:00:00.000"
remediation = "升级至 IBM WebSphere 3.0.2.2 及以上版本，或配置 Web 服务器（如 Apache/IHS）添加 URL 重写规则，将 .JSP、.Jsp 等变体请求统一转为小写 .jsp 后转发。也可在应用服务器前端部署 WAF，拦截包含 .jsp 或 .JSP 等扩展名的直接访问请求作为临时缓解措施。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "IBM WebSphere JSP 源代码泄露漏洞"
updated = "2026-06-16T21:51:51.583"

