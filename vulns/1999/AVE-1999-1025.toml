[basic]
description = "Oracle Database Assistant 1.0（Oracle 8.0.3 Enterprise Edition 组件）在创建新数据库时，会将数据库主密码以明文形式写入 spoolmain.log 日志文件，导致本地攻击者可读取该日志文件获取管理员密码。该漏洞允许拥有本地系统访问权限的未授权用户窃取数据库凭证，进而可能获得数据库完全控制权限，危害数据机密性。需本地登录权限即可利用，攻击复杂度较低。"
published = "1999-03-04T05:00:00.000"
remediation = "创建数据库后立即删除或限制 spoolmain.log 文件的访问权限，仅允许数据库管理员账户读取；同时升级到 Oracle 8i 或更高版本，新版本不再将明文密码写入日志文件。作为临时缓解措施，可配置数据库创建脚本在完成后自动清理 spoolmain.log 文件。"
score = 4.6
severity = "MEDIUM"
sources = ["avd"]
title = "Oracle Database Assistant 数据库主密码明文存储漏洞"
updated = "2026-06-16T21:50:03.053"

