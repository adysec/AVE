[basic]
description = "Linux 内核的 drm/amdkfd 驱动在创建 VRAM BO（缓冲区对象）后缺少同步机制，导致 SVM（共享虚拟内存）分配的显存初始化未完成时，应用程序写入该内存会触发数据损坏。本地攻击者可利用此漏洞造成敏感信息泄露或系统崩溃。该漏洞影响 Linux 内核多个版本，CVSS 评分 5.5，危害等级中危。开发者通过增加同步等待初始化完成来修复此问题。"
published = "2025-03-27T17:15:49.920"
remediation = "升级 Linux 内核至 6.1.9 或更高版本（稳定分支对应提交 92af2d3b57a1，主线分支对应提交 ba029e9991d9），或向后移植补丁到 drivers/gpu/drm/amd/amdkfd/kfd_svm.c 中在创建 VRAM BO 后添加同步等待初始化完成。如无法升级，可在 SVM 场景下限制应用对 VRAM 的直接写入操作作为临时缓解。"
score = 5.5
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux 内核 AMD KFD 驱动 VRAM 对象创建后同步缺失漏洞"
updated = "2026-06-17T06:44:06.597"

