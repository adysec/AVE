[basic]
description = "Windows NT 与 Windows 2000 系统中的 RSHSVC（远程 Shell 服务）存在远程代码执行漏洞。未经身份认证的远程攻击者可利用该服务缺乏足够访问控制的问题，通过网络连接向目标系统的 RSHSVC 端口发送特制请求，从而以系统权限执行任意命令，实现完全控制目标主机。该漏洞影响 Windows NT 4.0 及 Windows 2000 版本，危害等级高。"
published = "1997-01-01T05:00:00.000"
remediation = 'Windows NT 4.0 和 Windows 2000 均已生命周期结束，建议立即升级到受支持版本的 Windows（如 Windows Server 2019/2022）以彻底消除该漏洞。如无法升级，可采取缓解措施：通过服务管理器停止 RSHSVC 服务并将启动类型设为"禁用"；同时在防火墙层面阻止外部对 TCP 514 等 rsh 相关端口的访问，限制仅授权管理 IP 可访问。'
score = 7.2
severity = "HIGH"
sources = ["epss"]
title = "Microsoft Windows NT RSHSVC 远程代码执行漏洞"
updated = "2026-06-16T21:47:59.987"

