[info]
author = "ave"
description = "检测Cisco Cache Engine Web管理界面是否存在未授权访问漏洞。向目标发送HTTP GET请求检查是否返回Cache Engine管理页面，若页面包含缓存引擎性能相关标记则说明存在信息泄露。"
id = "POC-AVE-1999-0833"
name = "Cisco Cache Engine Web管理界面信息泄露 PoC"
severity = "medium"
tags = ["ave-1999-0833"]
vuln_id = [
    "CVE-1999-1000",
    "AVE-1999-0833",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["Cache Engine"]
