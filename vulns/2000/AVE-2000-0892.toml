[basic]
description = "SuSE Linux 及其他 Linux 系统中 linuxnfs/knfsd 软件包所包含的 rpc.kstatd（NFS 状态统计守护进程）存在字符串解析错误漏洞。远程攻击者无需身份认证即可通过网络向目标系统发送特制的 RPC 请求，触发该解析错误，导致缓冲区溢出，从而获取目标系统的 root 权限。该漏洞影响范围广泛，CVSS 评分 10.0，危害等级严重，可导致服务器完全被控制。"
published = "2000-10-20T04:00:00.000"
remediation = "立即停止 rpc.kstatd 服务（/etc/init.d/kstatd stop 或 killall rpc.kstatd），并从 inetd.conf 或 xinetd 配置中注释掉 kstatd 相关的 rpc 服务条目。升级 linuxnfs/knfsd 软件包至 SuSE Security Announce 58 中指定的修复版本（SuSE Linux 6.x 系列需更新至 linuxnfs-2.2beta37-xx 或 knfsd-1.4.x-xx 以上版本）。在网络层面通过 iptables 或 TCP Wrappers（hosts.allow/hosts.deny）限制对 rpc.kstatd 对应 RPC 端口的访问。如果不需要 NFS 内核统计功能，建议彻底移除 rpc.kstatd 可执行文件并取消其 RPC 注册。"
score = 10
severity = "CRITICAL"
sources = ["redhat"]
title = "SuSE Linux linuxnfs/knfsd rpc.kstatd 远程权限提升漏洞"
updated = "2026-06-16T21:52:30.447"

