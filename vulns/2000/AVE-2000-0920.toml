[basic]
description = "IIS 4.0 和 5.0 存在文件权限规范化绕过漏洞，由于对某些文件类型的访问控制权限继承机制处理不当，当父文件夹设置了较为宽松的权限时，远程攻击者可通过构造特制的 URL 请求绕过文件访问限制，获取本应受保护的敏感文件内容。该漏洞影响 Windows 2000 及更早版本中运行的 IIS Web 服务器，攻击者无需身份认证即可利用，可能导致敏感信息泄露。"
published = "2000-10-20T04:00:00.000"
remediation = "升级到 IIS 6.0 或更高版本，该漏洞已在后续版本中修复。如无法升级，在 IIS 管理器中为每个站点单独设置文件权限，删除不必要的脚本映射（如 .htr、.idc、.shtm 等），并启用 URLScan 工具过滤恶意请求路径。同时确保 Web 根目录及子目录的 NTFS 权限遵循最小权限原则，禁止继承宽松的父目录权限。"
score = 6.4
severity = "MEDIUM"
sources = ["cve"]
title = "Microsoft IIS 文件权限规范化安全绕过漏洞"
updated = "2026-06-16T21:52:26.697"

