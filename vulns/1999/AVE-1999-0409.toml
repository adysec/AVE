[basic]
description = "Cobalt RaQ2 服务器默认配置存在安全缺陷，未经身份认证的远程攻击者可通过网络访问服务器管理接口，利用默认配置中的权限控制缺失，在服务器上安装任意软件包。该漏洞影响 Cobalt RaQ2 系列服务器设备，CVSS 评分 10.0，危害等级严重。攻击者无需任何认证即可远程执行此操作，可能导致服务器被完全控制或植入恶意软件。"
published = "1999-08-08T04:00:00.000"
remediation = "Cobalt RaQ2 服务器已停止维护且不再接收安全更新，建议立即迁移至受支持的服务器平台。如无法迁移，应限制对服务器的网络访问，仅允许受信任 IP 通过防火墙规则访问管理端口（默认 80/443/21/22），并禁用不必要的远程管理功能。同时建议修改默认管理员密码，移除默认共享和匿名访问权限。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "Cobalt RaQ2 服务器 默认配置远程任意软件包安装漏洞"
updated = "2026-06-16T21:48:55.193"

