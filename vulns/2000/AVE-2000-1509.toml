[basic]
description = "Conectiva Linux 中 OpenLDAP 1.2.11 之前版本的 logrotate 脚本存在信号处理不当漏洞。该脚本在日志轮转过程中向系统内核日志守护进程（klogd）发送了错误的信号，导致 klogd 进程异常终止，造成系统日志记录功能失效。本地攻击者可通过触发日志轮转操作（如使系统日志文件增长至触发轮转条件）利用此漏洞，使目标系统失去日志审计能力，进而掩盖后续攻击行为。该漏洞影响 Conectiva Linux 系统上安装了受影响 OpenLDAP 版本的所有配置。"
published = "2000-10-20T04:00:00.000"
remediation = "升级 OpenLDAP 至 1.2.11 或更高版本，该版本修复了 logrotate 脚本向 klogd 发送错误信号的问题。如无法升级，手动编辑 OpenLDAP 的 logrotate 配置文件（通常位于 /etc/logrotate.d/openldap），移除或修正其中向 klogd 发送信号的命令（如 kill -HUP），改为正确的信号或直接注释该行。"
score = 10
severity = "CRITICAL"
sources = ["cve"]
title = "Conectiva Linux OpenLDAP logrotate脚本信号处理不当拒绝服务漏洞"
updated = "2026-06-16T21:52:23.810"

