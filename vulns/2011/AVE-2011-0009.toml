[basic]
description = "Pure-FTPd 1.0.22 及可能其他版本在 SUSE Linux Enterprise Server 及其他启用 Netware OES 远程服务器功能的操作系统上存在目录遍历漏洞。当启用 Netware OES 远程服务器功能时，本地攻击者可通过未知攻击向量利用路径遍历漏洞覆盖系统任意文件。该漏洞源于对文件路径验证不充分，攻击者需具备本地访问权限且目标系统需启用 OES 远程功能才能利用，CVSS 评分 3.6，属低危漏洞，影响 Pure-FTPd 1.0.22 及可能受影响的其他版本。"
published = "2011-11-04T21:55:02.550"
remediation = "升级 Pure-FTPd 至 1.0.32 或更高版本（SUSE 用户通过 `zypper update pure-ftpd` 安装官方补丁）。若无法立即升级，请在 pure-ftpd 配置中禁用 Netware OES 远程服务器功能（移除或注释 `OES` 相关配置项并重启服务），并限制仅有可信用户具备本地登录权限，以缓解任意文件覆盖风险。"
score = 3.6
severity = "LOW"
sources = ["nuclei"]
