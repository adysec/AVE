[basic]
description = "Motorola CableRouter 设备在 TCP 端口 1024 上开放了管理配置接口，且未实施任何身份认证机制。任何能够访问该端口的远程用户均可直接连接并执行路由器的完整配置管理操作，包括查看和修改设备设置。攻击者仅需通过网络向目标设备的 1024 端口发起连接请求即可完成攻击，无需任何凭据或特殊权限。该漏洞 CVSS v2 评分 10.0（满分），属于最高危级别，影响所有使用默认配置的 Motorola CableRouter 设备，可导致攻击者完全接管受影响的路由器。"
published = "1998-05-10"
remediation = "该设备已停产且不再获得厂商安全支持，建议立即用受支持的调制解调器/路由器替换 Motorola CableRouter。在替换前，在网络防火墙上阻断对设备 TCP 1024 端口的入站访问，并禁用设备上所有远程管理功能。同时将设备置于隔离网段，仅允许受信任的内部管理主机访问。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Motorola CableRouter 未授权远程访问漏洞"
updated = "1998-05-10"

