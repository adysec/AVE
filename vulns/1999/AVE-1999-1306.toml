[basic]
description = "Microsoft Windows 95/98/NT 3.51/NT 4.0/2000 的 IGMP 协议处理组件存在输入验证不当漏洞（CWE-20），远程攻击者可通过向目标系统发送特制的畸形分片 IGMP 数据包，触发系统协议栈处理异常，导致目标系统蓝屏崩溃或网络服务中断。该漏洞影响 Windows 95/98/NT 3.51/NT 4.0/2000 等多个版本，攻击无需身份认证，CVSS 评分 7.8，危害等级高。微软已发布安全更新修复此漏洞。"
published = "1999-07-03T04:00:00.000"
remediation = "安装 Microsoft 安全公告 MS99-034 提供的 IGMP 补丁程序（Windows 95/98 通过 Windows Update 获取，Windows NT 4.0 通过 KB238329 获取）。对于已停止支持的旧版系统，建议在网络边界防火墙或路由器上过滤入站 IGMP 分片报文作为临时缓解措施。"
score = 7.8
severity = "HIGH"
sources = ["avd"]
title = "Microsoft Windows IGMP 畸形数据包拒绝服务漏洞"
updated = "2026-06-16T21:49:19.657"

