[basic]
description = "Quake 1 服务器在处理初始 UDP 游戏连接请求时，会向请求来源发送大量流量。攻击者可通过伪造源 IP 地址发送欺骗性连接请求，利用该服务器作为放大器对第三方目标发起 Smurf 风格分布式拒绝服务攻击，导致目标带宽被耗尽。该漏洞影响 Quake 1 服务器默认监听的 UDP 26000-26005 端口。"
published = "1999-12-22"
remediation = "升级 Quake 1 服务器至官方补丁版本或使用 QuakeWorld 2.30+ 社区修复版。在网络边界部署 uRPF（单播反向路径转发）过滤伪造源 IP 的 UDP 流量，并在防火墙上限制 UDP/26000-26005 端口的入站速率。如无法升级，在服务器配置中启用 sv_allow_download 0 并限制客户端连接速率。"
score = 5.0
severity = "MEDIUM"
sources = [
    "cve",
    "avd",
]
title = "id Software Quake 1 服务器 UDP 流量放大漏洞"
updated = "2026-06-16"

