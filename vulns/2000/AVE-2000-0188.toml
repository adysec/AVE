[basic]
description = "Sambar Server 4.2 Beta 7 在 CGI 目录下包含 ECHO.BAT 和 HELLO.BAT 批处理文件，未对用户输入的 Shell 元字符进行过滤，导致远程攻击者可通过向 CGI 接口提交包含命令注入载荷的请求，实现任意命令执行。该漏洞影响 Sambar Server 4.2 Beta 7 版本，攻击者无需身份认证即可远程利用，CVSS 评分 5.0，属中危漏洞。成功利用可导致服务器完全沦陷，攻击者可执行系统命令、窃取敏感数据或植入恶意代码。"
published = "2000-02-23T05:00:00.000"
remediation = "建议升级到 Sambar Server 的最新官方版本（7.0.0 及以上），移除 CGI 目录中的所有 .bat 文件并删除已知 vulnerable 脚本。特殊情况下如无法立即升级，可通过 Web 服务器配置禁止 CGI 执行、限制 CGI 目录访问权限，以及部署 WAF 规则阻止 shell 元字符检测。如果硬件支持，可完全禁用 IIS CGI 支持以彻底修复此漏洞。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
