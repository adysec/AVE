[basic]
description = "Netscape Enterprise Server (NES) 在处理超长 URL 时存在拒绝服务漏洞。攻击者无需身份认证即可向运行在 HP-UX 平台上的 HP Virtual Vault (VVOS) 系统中的 NES 服务器发送特制超长 URL 请求，导致服务器进程崩溃或资源耗尽，无法正常响应合法用户请求。该漏洞影响 HP Virtual Vault 操作系统上部署的 Netscape Enterprise Server 版本，CVSS 评分 5.0，危害等级中等。厂商已发布安全补丁修复此问题。"
published = "1999-05-07T04:00:00.000"
remediation = "Netscape Enterprise Server 已停止维护，建议迁移至受支持的 Web 服务器（如 Apache HTTP Server 或 Nginx）。如无法迁移，可在反向代理或防火墙层面限制传入 URL 长度不超过 4096 字节，并配置访问控制列表仅允许可信 IP 访问管理端口，以降低拒绝服务攻击风险。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Netscape Enterprise Server HP-UX 长URL 拒绝服务漏洞"
updated = "2026-06-16T21:48:50.783"

