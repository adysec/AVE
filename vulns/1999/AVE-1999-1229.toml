[basic]
description = "BNBSurvey 的 survey.cgi 程序存在命令注入漏洞，远程攻击者可通过在 HTTP 请求参数中插入 shell 元字符（如管道符、分号等）来执行任意系统命令，导致服务器被完全控制。攻击无需身份认证，通过网络即可触发，危害极大。"
published = "1998-12-03"
remediation = "BNBSurvey 已停止维护，建议立即下线该程序或移除 survey.cgi 脚本。如必须使用，应对用户输入进行严格过滤，禁止 shell 元字符（|;&`$(){}[]<>）传入系统命令调用接口。"
score = 10.0
