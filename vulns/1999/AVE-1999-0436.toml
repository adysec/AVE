[basic]
description = "Talkd（talk守护进程）存在拒绝服务漏洞，远程攻击者无需身份认证即可向目标系统发送特制请求，破坏目标用户的终端显示内容，导致正常会话中断或系统服务异常。该漏洞影响早期Unix/Linux系统中运行的talk服务，攻击者可通过网络连接利用该缺陷进行远程拒绝服务攻击。"
published = "1997-01-01T05:00:00.000"
remediation = "立即禁用 talkd 服务（`systemctl disable talkd --now` 或 `killall talkd`），并在防火墙层面拦截 UDP/TCP 517 端口（`iptables -A INPUT -p udp --dport 517 -j DROP`）。如业务需要使用 talk 服务，应升级操作系统的 talkd 实现至修复版本或迁移至加密替代方案。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Unix Talkd 拒绝服务漏洞"
updated = "2026-06-16T21:48:00.253"

