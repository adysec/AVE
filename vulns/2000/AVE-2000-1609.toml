[basic]
description = "GNU Groff 在处理设备描述文件时存在权限提升漏洞。本地攻击者可在当前工作目录中构造包含恶意 postpro 指令的描述文件，当其他用户运行 groff 时，该指令会被执行，从而导致攻击者获取额外系统权限。该漏洞影响所有使用 Groff 的 Unix/Linux 系统，CVSS 评分 10.0，危害等级严重。建议升级至包含补丁的版本或限制 groff 对当前目录描述文件的搜索行为。"
published = "2000-12-19T05:00:00.000"
remediation = "升级 GNU Groff 至 1.17 及以上版本，该版本已修复 groff 从当前工作目录搜索设备描述文件的安全问题。如无法升级，可移除当前目录下设备描述文件的写权限，或使用 AppArmor/SELinux 策略限制 groff 读取非标准路径下的描述文件。"
score = 10
severity = "CRITICAL"
sources = ["cve"]
title = "GNU Groff 本地权限提升漏洞"
updated = "2026-06-16T21:52:30.807"

