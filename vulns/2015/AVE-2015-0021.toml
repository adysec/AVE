[basic]
description = "WordPress 的 Navis DocumentCloud 插件 0.1.1 之前版本的 `js/window.php` 文件中存在跨站脚本（XSS）漏洞，攻击者通过 `wpbase` 参数注入任意 Web 脚本或 HTML 代码。当管理员或用户访问特制链接时，恶意脚本将在浏览器中执行，可能导致会话劫持、敏感信息泄露等危害。攻击条件为诱使用户点击恶意构造的 URL，无需身份认证，影响该插件的所有使用版本。"
published = "2015-09-01T14:59:02.073"
remediation = "立即将 Navis DocumentCloud 插件升级至 0.1.1 或更高版本。如无法升级，可删除插件目录中 `js/window.php` 文件，或在 Web 应用防火墙（WAF）中添加规则过滤 `wpbase` 参数中的恶意脚本代码作为临时缓解措施。"
score = 4.3
severity = "MEDIUM"
sources = ["nuclei"]
title = "WordPress Navis DocumentCloud 插件跨站脚本漏洞"
updated = "2026-06-17T00:24:47.393"

