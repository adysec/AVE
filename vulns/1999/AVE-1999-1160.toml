[basic]
description = "FlowPoint DSL 路由器固件 3.0.8 之前版本存在安全配置缺陷，将本应仅限串口控制台使用的密码恢复功能暴露于网络中，导致远程攻击者无需身份认证即可通过网络访问该功能，对路由器管理密码进行暴力猜解攻击。成功利用此漏洞可导致攻击者获取管理权限，进而控制受影响设备。此漏洞影响所有 FlowPoint DSL 路由器 3.0.8 之前版本的固件。"
published = "1999-08-07T04:00:00.000"
remediation = "建议将 FlowPoint DSL 路由器固件升级至 3.0.8 或更高版本，该版本已将密码恢复功能限制为仅通过串行控制台端口可用。作为临时缓解措施，可在网络层面限制对路由器管理端口的访问，仅允许受信任 IP 连接，或禁用远程密码恢复功能。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "FlowPoint DSL router firmware 远程密码恢复暴力破解漏洞"
updated = "2026-06-16T21:50:37.530"

