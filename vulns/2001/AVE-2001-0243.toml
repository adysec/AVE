[basic]
description = "SCO Open Server 5.0.6 的 lpforms 组件存在缓冲区溢出漏洞，本地攻击者可通过向 lpforms 程序提交特制的输入数据触发缓冲区溢出，覆盖内存中的关键数据，从而获取系统 root 权限。该漏洞影响 SCO Open Server 5.0.6 及可能更早版本，攻击者需要拥有本地系统访问权限才能利用，成功利用后可完全控制受影响的系统。目前已存在公开的利用代码。"
published = "2001-08-22"
remediation = "建议立即安装 SCO 针对 OpenServer 5.0.6 的 lpforms 缓冲区溢出安全补丁（参见 SCO 安全公告 erg711801）。如无法安装补丁，可移除 lpforms 程序的 setuid 位（chmod u-s /usr/bin/lpforms）以消除提权风险，或限制可登录系统的用户范围为受信任用户。由于 SCO OpenServer 5.0.6 已停止维护，建议迁移至受支持的现代操作系统。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "SCO OpenServer 5.0.6 lpforms 缓冲区溢出漏洞"
updated = "2001-08-22"

