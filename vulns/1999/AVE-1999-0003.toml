[basic]
description = "NFS mountd 服务存在缓冲区溢出漏洞，远程攻击者无需身份认证即可向目标系统发送特制请求触发该漏洞，成功利用后可获取 root 权限。该漏洞主要影响 RedHat Linux 5.1、Caldera OpenLinux Standard 1.2 等早期 Linux 发行版，属于经典远程提权漏洞。"
published = "1998-10-12T04:00:00.000"
remediation = "升级到不受影响的 Linux 内核版本（Red Hat Linux 5.2 及以上、Caldera OpenLinux 2.2 及以上已修复该漏洞）。对于仍运行 Red Hat Linux 5.1 或 Caldera OpenLinux 1.2 等早期版本的系统，应立即迁移到受支持的现代 Linux 发行版。若暂时无法迁移，可在防火墙上限制对 mountd 端口（UDP/TCP 635）的访问，仅允许可信主机连接，或在 NFS 服务配置中禁用不必要的挂载导出，以缩小攻击面。"
score = 10
severity = "CRITICAL"
sources = ["redhat"]
title = "Linux NFS mountd 缓冲区溢出远程代码执行漏洞"
updated = "2026-06-16T21:47:18.113"

