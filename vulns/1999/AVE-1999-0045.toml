[basic]
description = "CDE 桌面环境的 dtappgather 程序存在权限配置不当漏洞，本地攻击者可利用该程序的错误权限设置获取非法特权访问或导致系统拒绝服务。该漏洞影响 IBM AIX 4.3、HP HP-UX 10.20/11.0、SCO Unixware 7.0 及 Sun Solaris 2.6 等多个 Unix 操作系统，CVSS 评分 7.2，危害等级高危。厂商已发布安全补丁修复此漏洞。"
published = "1998-01-21T05:00:00.000"
remediation = "IBM AIX 用户应安装对应 APAR 补丁 (IX70583 等)；Sun Solaris 用户请安装 Sun Security Bulletin #185 提供的补丁；HP-UX 用户请安装 HPSBUX9801-075 对应的补丁。临时缓解措施：以 root 执行 chmod 4555 /usr/dt/bin/dtappgather 移除 setuid 位，或限制可执行用户范围。"
score = 7.2
severity = "HIGH"
sources = ["epss"]
title = "IBM AIX CDE dtappgather 本地权限提升漏洞"
updated = "2026-06-16T21:47:21.147"

