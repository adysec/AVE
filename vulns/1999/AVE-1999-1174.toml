[basic]
description = "Apple Mac OS 8 及 8.6 版本的 Users & Groups Data File 中存储的用户密码使用了弱加密算法，攻击者在获取本地文件访问权限后可读取该文件并对加密后的密码哈希进行破解，导致用户凭证泄露。该漏洞影响 Mac OS 8/8.6 系统，攻击者需具备本地或远程文件读取能力，利用难度较低，CVSS 评分 4.6，危害等级中危。"
published = "1999-07-10T04:00:00.000"
remediation = "Mac OS 8.6 及更早版本已停止安全支持，建议立即升级到受支持的 macOS 版本（如 macOS 14 Sonoma 或更高版本），这些版本使用更强健的密码哈希算法（如 SHA-512 派生密钥）。对于无法升级的遗留系统，应限制该系统的网络暴露范围，将其隔离在独立的 VLAN 中，并对所有本地账户启用强密码策略（长度≥12 位，包含大小写字母、数字和特殊字符）。"
score = 4.6
severity = "MEDIUM"
sources = ["avd"]
title = "Apple Mac OS 8 弱密码加密漏洞"
updated = "2026-06-16T21:50:40.950"

