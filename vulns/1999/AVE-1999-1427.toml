[basic]
description = "SCO UnixWare 2.0.x 及 2.1.0 版本中某个系统调用存在权限许可与访问控制漏洞。本地攻击者可通过利用该系统调用的访问控制缺陷，绕过权限限制访问任意文件，并获取 root 权限。该漏洞源于系统调用未能正确验证用户权限，属于本地提权类漏洞，攻击者需拥有本地登录权限。CVSS 评分 7.2，危害等级高。"
published = "1996-09-04T04:00:00.000"
remediation = "SCO UnixWare 2.0.x 和 2.1.0 已停止维护，官方不再提供安全更新。建议立即迁移至受支持的现代操作系统（如 Linux 或受支持的商业 Unix）。作为临时缓解措施，可限制本地用户登录权限，仅允许受信任的管理员账户访问系统，并严格审计系统调用日志以检测异常提权行为。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "SCO UnixWare 系统调用本地权限提升漏洞"
updated = "2026-06-16T21:50:02.563"

