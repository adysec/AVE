[basic]
description = "Linux 内核 2.0、2.2 和 2.4 版本在启用 syncookies 功能时存在严重安全漏洞。syncookies 是 Linux 内核中用于保护 TCP 连接的保护机制，通过在连接建立时计算并验证 cookie 来防止 SYN 重放攻击。然而，该漏洞允许未经身份验证的远程攻击者通过暴力破解 cookie 值来欺骗 syncookies 验证机制，从而绕过防火墙规则。该漏洞在网络层面构成安全威胁，攻击者无需任何权限即可执行攻击，利用难度较低。攻击者通过不断尝试不同的 cookie 值，最终找到一个可以通过 syncookies 验证的伪造值，从而非法访问目标系统并获取其中存储的部分敏感信息。该漏洞影响 Linux 内核 2.0、2.2 和 2.4 版本，在系统启用 syncookies 时尤为突出。企业和组织应及时更新内核版本或禁用 syncookies 功能，以防止此安全漏洞被利用。"
published = "2001-12-06T05:00:00.000"
remediation = "建议升级到包含 syncookies 安全修复的内核版本：Linux 2.5.48 或更高版本（如 2.6.2+ stable 版本），关闭 syncookies 或升级到支持安全 syncookie 实现的内核。可以关闭 syncookies（编辑 /etc/sysctl.conf，设置 net.ipv4.tcp_syncookies=0 并重启），或使用补丁后的系统，同时更新所有系统服务和完整性检查工具，如内核审计日志_analyzer 等工具。"
score = 5
severity = "MEDIUM"
sources = ["redhat"]
title = "Linux 内核 syncookie 安全绕过漏洞"
updated = "2026-06-16T21:55:05.903"

