[basic]
description = "BMC PATROL 4.4 及更早版本的 PATROL Agent 在 TCP 端口 3181 上监听并接收管理控制台发来的管理帧，但其在处理部分管理协议帧时未对来源身份进行充分的认证校验，导致远程攻击者可在未提供有效凭据的情况下伪造控制帧与 Agent 建立会话，从而绕过访问控制机制，执行任意代理操作、读取主机监控信息或下发恶意指令，造成敏感信息泄露与主机被非授权管理的严重后果。攻击仅需网络可达 Agent 端口即可发起，无需本地访问权限。"
published = "1999-04-09T04:00:00.000"
remediation = "升级 BMC PATROL 至官方修复版本（4.5.00 及以上），在管理控制台启用代理认证与访问控制列表（ACL），禁止未授权主机连接 PATROL Agent 端口（默认 3181/TCP），并在网络边界防火墙限制仅允许受信任管理网段访问 Agent，以缓解远程伪造帧绕过认证的风险。"
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "BMC Patrol 远程攻击者访问控制绕过漏洞"
updated = "2026-06-16T21:49:05.163"

