[basic]
description = "NCSA httpd 服务器自带的 campas CGI 程序未对用户输入进行充分过滤，远程攻击者可通过在查询字符串中插入编码的回车符（CR）注入任意系统命令，进而读取服务器上的敏感文件（如密码文件）或执行其他恶意操作。该漏洞影响多个版本的 NCSA web 服务器，无需身份认证即可远程利用，危害严重。"
published = "1997-07-15T04:00:00.000"
remediation = "删除 cgi-bin 目录下的 campas 示例脚本，或确保 NCSA httpd 已升级至不受影响的版本。建议迁移至长期维护的 Web 服务器（如 Apache HTTP Server），并移除所有示例 CGI 脚本以避免类似安全问题。"
score = 7.5
severity = "HIGH"
sources = ["exploitdb"]
title = "NCSA httpd campas CGI 远程命令执行漏洞"
updated = "2026-06-16T21:47:41.800"

