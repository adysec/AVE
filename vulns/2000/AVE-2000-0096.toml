[basic]
description = "Debian GNU/Linux 默认安装过程中使用了不安全的 MBR（主引导记录），本地攻击者可在系统安装阶段通过软盘启动系统，绕过已有安全限制。该漏洞影响 Debian GNU/Linux 默认安装配置，属于本地权限提升漏洞，攻击者需要物理接触目标系统并具有软盘引导权限，利用方式为通过软盘引导进入系统后获取未授权访问。CVSS 评分 7.2，危害等级高。"
published = "2000-02-02T05:00:00.000"
remediation = "安装 Debian GNU/Linux 时在 BIOS 中设置启动密码并将首选启动设备设为硬盘，禁止从软盘/CD-ROM 引导。完成安装后立即移除可移动介质并在 BIOS 中禁用软盘启动，同时设置物理安全策略限制本地控制台访问。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "Debian GNU/Linux MBR 默认配置安全漏洞"
updated = "2026-06-16T21:51:01.543"

