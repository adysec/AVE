[basic]
description = "Classic Cisco IOS 9.1 及之后版本存在敏感信息泄露漏洞。攻击者在获取登录提示符访问权限后，可查看此前用户的命令历史记录片段，从而窃取包含密码、配置密钥等在内的敏感数据。该漏洞攻击门槛较低（需已建立网络连接并接触到登录界面），但影响范围广泛，涉及大量运行 Classic Cisco IOS 的老旧网络设备。CVSS 评分 2.1，危害等级低。"
published = "2001-03-12T05:00:00.000"
remediation = "升级 Cisco IOS 至不受影响的版本（参见 Cisco 安全公告 `ioshist-pub`），或通过 `no history` 全局配置命令禁用命令历史记录功能；在登录提示符下执行 `clear history` 清除历史缓冲区；限制对设备控制台和 VTY 端口的物理及网络访问，仅允许受信任的管理员 IP 连接。如无法升级，可在 line 配置模式下设置 `history size 0` 临时缓解。"
score = 2.1
severity = "LOW"
sources = ["cve"]
title = "Cisco IOS 敏感信息泄露漏洞"
updated = "2026-06-16T21:51:34.267"

