[basic]
description = "美特CRM系统存在Druid监控组件未授权访问漏洞。攻击者无需任何身份认证，直接访问 `/druid/websession.html` 等Druid监控页面，可获取系统会话信息、数据源配置等敏感数据，进而可能导致权限绕过甚至获取系统控制权。该漏洞影响美特CRM相关版本，需通过访问控制策略修复。"
published = "0707"
remediation = "在应用服务器（如Tomcat）中配置访问控制，限制 `/druid/*` 路径仅允许内网IP或管理IP访问；或修改 `web.xml` 为Druid监控页面添加登录认证。生产环境应彻底禁用Druid Monitor（移除 `druid-stat.properties` 或关闭 `StatViewServlet` 的 `enabled=true` 配置）。如无法禁用，升级至官方修复版本或使用反向代理添加身份验证。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "美特 CRM Druid 未授权访问漏洞"
updated = "0707"

