[basic]
description = "BIND 8.2 版本在处理 DNS 区域文件中的 NXT（Next Domain）资源记录时存在缓冲区溢出漏洞。当 BIND 服务器解析包含特制超长或畸形 NXT 记录的域名数据时，由于未对记录长度进行边界校验，会导致内存缓冲区被覆盖。远程攻击者可通过向运行 BIND 8.2 的 DNS 服务器发送精心构造的 NXT 记录查询或响应，触发该溢出，进而造成服务崩溃（拒绝服务）或在特定条件下执行任意代码。该漏洞主要影响使用 BIND 8.2 的 Solaris 及其他类 Unix 系统，攻击无需身份认证，仅需网络可达目标 DNS 服务即可发起。"
published = "1999-11-10T05:00:00.000"
remediation = "建议升级 BIND 至 8.2.3 或更高版本（如 BIND 9.x），或升级 Solaris 至修复该漏洞的补丁版本（如 Solaris 8 10/00 及后续补丁）。临时缓解措施：在防火墙层面限制非授权 IP 访问 DNS 服务（TCP/UDP 53 端口），或在 named.conf 中禁用 DNSSEC/NXT 记录处理功能。建议尽快升级至 BIND 9.2.0 或更高版本彻底修复该 NXT 记录缓冲区溢出漏洞。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "Solaris BIND 8.2 中高级网络服务软件的缓冲区溢出漏洞"
updated = "2026-06-16T21:49:09.190"

