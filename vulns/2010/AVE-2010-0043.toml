[basic]
description = "Joomla! 的 AWDwall 组件（com_awdwall）1.5.4 版本中存在目录遍历漏洞。远程攻击者可以通过向 index.php 的 controller 参数传递包含 `..`（点点）的恶意路径，绕过访问限制，读取服务器上的任意文件，导致敏感信息泄露。该漏洞无需身份认证即可利用，攻击门槛低，影响范围广泛。"
published = "2010-04-23T14:30:01.370"
remediation = "升级 com_awdwall 组件至 1.5.5 及以上版本，或在 Joomla! 后台禁用/卸载该第三方组件。若无法升级，可通过 Web 应用防火墙 (WAF) 规则过滤 `controller` 参数中的 `../` 目录遍历序列作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["nuclei"]
title = "Joomla AWDwall 目录遍历任意文件读取漏洞"
updated = "2026-06-16T23:18:29.737"

