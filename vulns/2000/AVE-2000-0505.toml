[basic]
description = "Microsoft Outlook Express 存在持久邮件浏览器链接漏洞（Persistent Mail-Browser Link）。攻击者可构造包含恶意脚本的 HTML 邮件发送给目标用户，当用户使用预览窗格打开该邮件时，脚本会创建一个与 Outlook Express 窗口持久关联的浏览器窗口，使得该窗口能够持续读取后续在预览窗格中显示的所有邮件内容，并通过 HTTP 将窃取的邮件文本转发给攻击者。该漏洞影响 Outlook Express 4.x 和 5.x 版本，CVSS 评分 5.0，需用户开启预览窗格并打开恶意邮件方可触发。Microsoft 已发布 MS00-045 安全公告提供修复补丁，建议升级至 Outlook Express 5.5 或安装对应补丁程序。"
published = "2000-07-20T04:00:00.000"
remediation = '安装 Microsoft 安全公告 MS00-045 提供的补丁，或将 Outlook Express 升级至 5.5 版本（通过默认安装 Internet Explorer 5.01 Service Pack 1 或 IE 5.5）。临时缓解措施：在 Outlook Express 中禁用预览窗格（视图→布局→取消勾选"显示预览窗格"），或将 HTML 邮件分配到受限制站点区域并禁用 Active Scripting。'
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Microsoft Outlook Express 持久邮件浏览器链接漏洞"
updated = "2026-06-16T21:52:11.760"

