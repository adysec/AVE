[basic]
description = 'Macromedia 公司开发的 "The Matrix" 屏幕保护程序在 Windows 95 系统中存在安全绕过漏洞。当系统启用了"密码保护"选项后，具有物理访问权限的攻击者只需按下键盘上的 ESC（Escape）键即可绕过密码验证提示，直接进入系统桌面。该漏洞利用条件简单，无需任何特殊工具或技术知识，攻击者仅需物理接触目标计算机即可实施攻击，严重威胁系统安全。'
published = "1999-10-04T04:00:00.000"
remediation = '立即卸载 "The Matrix" 屏幕保护程序，改用 Windows 95 自带或经过安全验证的第三方屏保。如必须使用，建议升级至 Windows 10/11 等受支持的操作系统版本，并启用屏幕保护密码与自动锁定策略。在无法升级系统时，可通过物理安全措施（如锁定机箱、限制控制台访问）防止未授权接触。'
score = 4.6
severity = "MEDIUM"
sources = ["cve"]
title = "Macromedia Matrix 屏幕保护程序安全绕过漏洞"
updated = "2026-06-16T21:50:28.500"

