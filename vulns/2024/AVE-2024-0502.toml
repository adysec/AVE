[basic]
description = "Linux 内核 RDMA/rtrs 子系统中存在空指针解引用漏洞，由于 `ib_sge list` 变量被错误地声明在 `always_invalidate` 代码块内部，导致其作用域受限，后续操作中访问该变量时触发内核空指针解引用，造成系统崩溃（拒绝服务）。本地攻击者可通过触发 RDMA 操作利用此漏洞，影响使用 RDMA/rxe 驱动的 Linux 内核版本。CVSS 评分 5.5，危害等级中等。"
published = "2025-01-15T13:15:09.460"
remediation = "将 Linux 内核升级至 6.13 及以上版本，或更新至对应长期支持分支：5.10.233+、5.15.176+、6.1.124+、6.6.70+、6.12.9+。Debian 用户安装 2025 年 3 月安全更新。如无法立即升级，可通过禁用 RDMA rtrs 模块（blacklist rtrs_client 和 rtrs_server）临时缓解。"
score = 5.5
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux Kernel RDMA/rtrs 空指针解引用漏洞"
updated = "2026-06-17T07:36:48.120"

