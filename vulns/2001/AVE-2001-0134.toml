[basic]
description = 'Caucho Resin 1.2.2 存在目录遍历漏洞，远程攻击者无需身份认证即可通过在 URL 请求中插入 "\.." 特殊字符序列绕过路径限制，实现跨目录读取服务器上的任意文件。该漏洞源于对用户输入路径过滤不严，攻击者可利用此漏洞获取敏感配置文件、源代码等未授权信息，危害等级中等。建议升级至 Resin 1.2.3 或更高版本以修复此漏洞。'
published = "2001-05-03T04:00:00.000"
remediation = '升级 Caucho Resin 至 2.0 或更高版本，该漏洞已在后续版本中修复。如暂时无法升级，可在 Web 服务器（如 Apache/Nginx）层面配置 URL 重写规则，拦截包含 "\.." 或 "../../" 等目录遍历特征的请求路径，阻止恶意路径穿越攻击。'
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Caucho Resin 目录遍历漏洞"
updated = "2026-06-16T21:54:03.833"

