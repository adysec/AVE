[basic]
description = "用友 NC 系统的 ServletForESBAdaptor 接口存在 Java 反序列化漏洞，未经身份验证的远程攻击者可通过向目标服务器发送特制的恶意序列化数据包，触发 Java 反序列化机制，进而实现远程代码执行。该漏洞影响用友 NC 系列产品，攻击者无需认证即可直接利用，CVSS 评分高，危害严重。官方建议安装补丁或添加 jdk.serialFilter 过滤规则进行缓解。"
published = "nday"
remediation = "立即联系用友官方获取 ServletForESBAdaptor 反序列化漏洞的安全补丁并安装；临时缓解措施可添加 JVM 参数 -Djdk.serialFilter=!* 拒绝反序列化白名单外的类，同时建议在 Nginx/WAF 层限制对 /servlet/~uapbs/ServletForESBAdaptor 路径的访问。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "用友NC ServletForESBAdaptor 反序列化漏洞"
updated = "nday"

