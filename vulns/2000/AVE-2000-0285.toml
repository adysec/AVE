[basic]
description = "CVS 1.10.7 版本在锁定机制中使用可预测的临时文件名，本地攻击者可在合法用户创建锁目录之前，预先创建同名锁目录，从而阻止 CVS 的正常锁定操作，导致拒绝服务。该漏洞影响 CVS 1.10.7 及更早版本，攻击者需具有本地系统访问权限，无需高权限即可利用，危害等级中等。"
published = "2000-04-23T04:00:00.000"
remediation = "升级 CVS 至 1.10.8 或更高版本，该版本改用不可预测的临时文件名。如无法升级，可在系统层面设置严格的文件系统权限（如使用 sticky bit 和 umask 限制 /tmp 目录），并监控 /tmp 下以 cvs* 命名的可疑目录创建行为。对于使用 CVS pserver 模式的场景，限制本地非授权用户的 shell 访问权限。"
score = 5.5
severity = "MEDIUM"
sources = ["epss"]
title = "CVS 1.10.7 本地拒绝服务漏洞"
updated = "2026-06-16T21:51:30.520"

