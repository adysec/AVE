[basic]
description = "深信服运维安全管理系统search_login接口存在信息泄露漏洞。系统未对HMAC-SHA256密钥及JWT令牌进行完整校验，攻击者可通过构造特制请求获取敏感密钥信息，进而伪造认证凭证绕过登录验证，导致未授权访问后台管理界面。该漏洞攻击复杂度低，无需用户交互，影响范围广泛。"
published = "nday"
remediation = "联系深信服官方获取最新安全补丁，升级至修复版本；立即轮换 HMAC-SHA256 密钥对；对 /search_login 接口添加访问频率限制和 IP 白名单；启用完整的 JWT 签名校验机制；审计所有密钥泄露范围并及时撤销泄露密钥。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "深信服 运维安全管理系统 信息泄露漏洞"
