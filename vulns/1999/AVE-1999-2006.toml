[basic]
description = "HP-UX 10.00 至 11.00 版本的远程命令套件（r-cmnds）中存在多个未明安全漏洞，涉及 remshd、rexecd、rlogind、rlogin、remsh、rcp、rexec、rdist 共 8 个组件。未经认证的远程攻击者可利用这些漏洞提升至更高权限或访问未授权文件，导致目标主机完全受控。CVSS v2 评分为 10.0，攻击复杂度低且无需认证即可远程利用。"
published = "1999-12-28"
remediation = "根据 HP Security Bulletin #00090，安装对应版本累积补丁：HP-UX 10.00/10.01/10.10 安装 PHNE_13618；10.20/10.30 安装 PHNE_13619；11.00 安装 PHNE_16091。临时缓解措施：在 inetd.conf 中注释 remshd/rexecd/rlogind 对应行后重启 inetd，并通过防火墙限制 513/514/512 端口访问。HP VirtualVault（HP-UX 10.24）不受此漏洞影响。"
score = 10.0
severity = "CRITICAL"
sources = ["cve"]
title = "HP-UX r-cmnds 远程命令套件多个未明权限提升与文件未授权访问漏洞"
updated = "2026-06-16"

