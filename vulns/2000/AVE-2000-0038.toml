[basic]
description = "MySQL 3.22.27、3.22.29 及 3.23.8 版本中存在权限管理漏洞，具有 GRANT 权限的本地攻击者可利用该权限修改任意 MySQL 用户的密码，进而接管目标用户账户。该漏洞源于 MySQL 对 GRANT 权限的访问控制检查不严格，未校验操作者是否具备修改指定用户密码的合法权限，导致低权限用户可越权操作。攻击者只需拥有 MySQL 本地访问权限和 GRANT 权限即可利用，影响范围包括上述版本的所有 MySQL 部署实例。"
published = "2000-01-11T05:00:00.000"
remediation = "升级到 MySQL 3.23.9 或更高版本，该版本修复了 GRANT 权限滥用问题。如无法升级，严格限制本地用户对 MySQL 数据库的访问权限，通过操作系统的文件权限控制 mysql 用户表（mysql.user）的读写权限，仅允许 root 用户访问。同时在 GRANT 语句中明确指定用户来源主机，避免使用通配符 % 作为主机名。"
score = 6.4
severity = "MEDIUM"
sources = ["epss"]
title = "MySQL GRANT 全局权限密码修改漏洞"
updated = "2026-06-16T21:50:53.257"

