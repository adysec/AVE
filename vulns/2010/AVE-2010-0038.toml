[basic]
description = "Joomla! 的 Sweety Keeper 组件（com_sweetykeeper）1.5.x 版本存在目录遍历漏洞。远程攻击者无需认证即可通过向 index.php 文件的 controller 参数传入 `../` 序列绕过路径限制，读取服务器上的任意文件，可能导致敏感信息泄露（如配置文件、系统文件等）。该漏洞源于对用户输入的 controller 参数缺乏充分的过滤与验证，CWE-22 目录遍历类型，CVSS 评分 6.8，危害等级中危。建议升级至受影响版本的补丁或替代组件。"
published = "2010-04-19T19:30:00.883"
remediation = '该漏洞源于 Joomla! 第三方扩展 Sweety Keeper 1.5.x（com_sweetykeeper）中 controller 参数缺乏路径过滤，允许远程攻击者通过 ../ 目录遍历读取任意文件。由于该组件已停止维护，推荐在 Joomla! 后台扩展管理中卸载该组件。如需保留功能，修改组件源码 controller 入口文件对 controller 参数执行 basename() 过滤和路径白名单校验，并在 .htaccess 中添加 RewriteCond %{QUERY_STRING} controller=.*\.\./ 拦截规则。同时在 WAF（如 ModSecurity）中部署规则阻止包含 ../ 的 controller 参数请求。'
score = 6.8
severity = "MEDIUM"
sources = ["nuclei"]
title = "Joomla! Sweetykeeper 组件目录遍历漏洞"
updated = "2026-06-16T23:18:27.833"

