[basic]
description = "Apache Struts 2 的 DebuggingInterceptor 组件在开发者模式（devMode）开启时存在代码注入漏洞（S2-008）。远程攻击者可利用调试模式下的参数拦截机制向目标应用发送特制恶意请求，在 struts 处理调试参数过程中注入 OGNL 表达式，从而在服务器端执行任意系统命令。该漏洞影响 Apache Struts 2.3.1.1 之前的版本，攻击无需身份认证，危害严重。厂商建议禁用开发者模式或升级至 2.3.1.1 及以上版本。"
published = "2012-01-08T15:55:01.467"
remediation = "升级 Apache Struts 至 2.3.1.1 或更高版本以修复 DebuggingInterceptor 的代码注入漏洞。生产环境务必关闭开发者模式（devMode=false），禁止在正式环境中启用调试拦截器。如无法立即升级，可在 struts.xml 中移除 DebuggingInterceptor 的配置引用作为临时缓解措施。"
score = 6.8
severity = "MEDIUM"
sources = ["nuclei"]
title = "Apache Struts DebuggingInterceptor 代码注入漏洞"
updated = "2026-06-16T23:37:12.583"

