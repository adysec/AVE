[basic]
description = "Linux 内核 mlx5e 驱动中的 fs_tt_redirect_any_create 函数在错误路径下未释放 fs->any 指针所指向的内存，导致发生内存泄漏。本地攻击者可利用特定错误触发条件重复调用该函数，逐步耗尽系统内存，最终导致拒绝服务（DoS）。该漏洞影响使用 Mellanox ConnectX 网卡的 Linux 系统，CVSS 评分 5.5，危害等级中危。"
published = "2025-09-18T14:15:39.637"
remediation = "升级 Linux 内核至包含该补丁的稳定版本（如 6.1.64+、6.5.13+、6.6.3+），对应 commit 为内核主线中的修复提交。若无法立即升级，可通过 `modprobe.blacklist=mlx5_core` 内核参数临时禁用 mlx5_core 模块作为缓解措施，但会导致 Mellanox 网卡不可用。建议在测试环境验证后批量更新生产环境内核。具体修复版本请查阅对应发行版内核包更新日志（如 `apt changelog linux-image-*`）。"
score = 5.5
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux mlx5e 内存泄漏漏洞"
updated = "2026-06-17T06:45:07.817"

