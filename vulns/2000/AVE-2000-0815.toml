[basic]
description = "IBM AIX 4.3.x 系统中的 piobe 命令存在本地缓冲区溢出漏洞，由于该命令未对用户提供的环境变量长度进行充分检查，本地攻击者可通过向 piobe 传递超长的环境变量参数触发缓冲区溢出，从而覆盖内存中的关键数据，成功利用此漏洞可获得目标系统的 root 权限。该漏洞影响 IBM AIX 4.3.x 系列版本，需要本地访问权限，CVSS 评分 7.2，危害等级高。"
published = "2001-01-09T05:00:00.000"
remediation = "立即安装 IBM AIX APAR IY12638 补丁，升级 piobe 命令至修复版本。如无法立即打补丁，可移除 piobe 命令的 setuid 位（chmod -s /usr/lib/lpd/piobe），并限制仅授权管理员可执行该命令，作为临时缓解措施。"
score = 7.2
severity = "HIGH"
sources = ["exploitdb"]
title = "IBM AIX 4.3.x piobe 命令本地缓冲区溢出漏洞"
updated = "2026-06-16T21:53:11.990"

