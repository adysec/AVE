[basic]
description = 'Internet Explorer 3 在 Temporary Internet Files 和 History 文件夹的 DAT 文件中记录用户访问过的所有 URL 历史记录，当用户选择"清除历史记录"选项时这些文件不会被清除，且由于系统定制的显示方式，用户在浏览这些文件夹时无法直接看到这些 DAT 文件，导致用户无法通过常规方式完全清除浏览痕迹，造成敏感信息泄露风险。'
published = "1997-08-05T04:00:00.000"
remediation = "停止使用 Internet Explorer 3，立即升级至 Internet Explorer 11 或迁移至 Microsoft Edge / Chrome / Firefox 等现代浏览器。现代浏览器已彻底修复历史记录清除不彻底的缺陷，且支持隐私浏览模式防止 URL 记录残留。"
score = 2.1
severity = "LOW"
sources = ["avd"]
title = "Microsoft Internet Explorer URL历史记录信息泄露漏洞"
updated = "2026-06-16T21:50:27.480"

