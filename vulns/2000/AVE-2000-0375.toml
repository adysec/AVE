[basic]
description = "XFree86 X11R6 3.3.x 及 4.0 版本的 Xserver 在处理 TCP 数据包时存在输入验证缺陷，本地或远程攻击者可向目标主机的 6000 端口发送特制的恶意 TCP 数据包，其中包含负计数器值，导致 Xserver 服务崩溃并拒绝服务。该漏洞影响 XFree86 3.3.5、3.3.6 及 4.0 版本，CVSS 评分 5.0，危害等级中等，攻击者无需认证即可触发。"
published = "2000-05-18T04:00:00.000"
remediation = "升级 XFree86 至 4.0.1 或更高版本，或在防火墙层面限制 TCP 6000 端口的非授信访问。建议迁移至 X.Org Server 以彻底规避此问题，因为 XFree86 已停止维护。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "XFree86 X11R6 Xserver 服务程序 TCP 数据包拒绝服务漏洞"
updated = "2026-06-16T21:51:46.020"

