[basic]
description = "Windows NT 4.0 存在内核句柄处理缺陷，本地用户可通过用户态应用程序关闭一个在内核模式下打开的句柄，当内核尝试关闭该句柄时触发双重释放，导致系统崩溃引发拒绝服务。该漏洞影响 Windows NT 4.0 系统，攻击者需拥有本地访问权限，CVSS 评分 2.1，危害等级低。微软至今未发布官方补丁，建议用户限制本地用户权限以降低风险。"
published = "1999-12-31T05:00:00.000"
remediation = "升级至 Windows NT 4.0 Service Pack 6a 或更高版本（若已安装 SP6a，则安装 post-SP6a 安全更新）。微软已终止对 Windows NT 4.0 的支持，建议迁移至受支持的 Windows 版本（如 Windows Server 2019/2022）以持续获得安全更新。"
score = 2.1
severity = "LOW"
sources = ["epss"]
title = "Microsoft Windows NT 4.0 内核句柄操作本地拒绝服务漏洞"
updated = "2026-06-16T21:50:16.473"

