[basic]
description = "SCO OpenServer 及其他 SCO 操作系统中 mscreen 程序存在本地缓冲区溢出漏洞。本地攻击者可通过在 .mscreenrc 配置文件中设置超长 TERM 环境变量条目，触发 mscreen 中的缓冲区溢出，从而劫持程序执行流程，获得 root 权限。该漏洞影响 SCO OpenServer Enterprise System、CMW、Open Desktop、Internet FastStart 等多个产品，CVSS 评分 7.2，危害等级高。攻击者需拥有本地系统访问权限方可利用此漏洞。"
published = "1998-10-06T04:00:00.000"
remediation = "该漏洞影响已停止维护的 SCO OpenServer 5.0.x 系列，官方早已不再提供安全更新。建议立即升级至受支持的 Linux/Unix 发行版（如 RHEL、Ubuntu LTS）以彻底消除风险；若无法迁移，可移除 mscreen 的 setuid 位（`chmod u-s /usr/bin/mscreen`）并限制本地非授信用户登录作为临时缓解。"
score = 7.2
severity = "HIGH"
sources = ["epss"]
title = "SCO mscreen 本地缓冲区溢出漏洞"
updated = "2026-06-16T21:49:54.020"

