[basic]
description = "Netwin DMailWeb 的 CGI 程序存在缓冲区溢出漏洞，远程攻击者可通过向 `utoken` 参数提交超长字符串触发缓冲区溢出，从而在目标服务器上执行任意命令。该漏洞危害等级高（CVSS 7.5），无需身份认证即可远程利用，影响部署了 DMailWeb CGI 组件的邮件服务器系统。"
published = "2000-05-04T04:00:00.000"
remediation = "立即将 Netwin DMailWeb 升级至 2.5e 或更高版本，可从厂商 FTP 服务器 ftp://ftp.netwinsite.com/pub/dmailweb/beta/ 获取对应系统的补丁。如无法升级，应在 Web 服务器上移除或禁用 dmailweb/dmailweb.exe CGI 程序，并在防火墙层面限制对相关 CGI 路径的外部访问作为临时缓解措施。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "Netwin DMailWeb CGI 缓冲区溢出远程代码执行漏洞"
updated = "2026-06-16T21:51:41.950"

