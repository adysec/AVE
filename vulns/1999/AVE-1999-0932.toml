[basic]
description = "CVE-1999-0629 涉及主机 ident/identd 服务的安全配置问题。ident 协议（RFC 1413）允许远程主机查询本地 TCP 连接所对应的系统用户身份。当目标系统运行了 identd 服务且未做适当限制时，攻击者可通过发起本地或远程 TCP 连接并向 ident 端口（113）发起查询，获取与目标连接关联的本地用户名信息。该信息可能被用于用户身份枚举，进而为本地权限提升或针对性攻击（如猜测用户密码、利用用户级漏洞）提供辅助条件。此问题主要影响启用了 identd 服务的类 Unix 系统，攻击前提是对方开放 ident 服务且防火墙未拦截 113 端口，其本身并非可直接利用的代码执行漏洞，而是信息泄露类隐患。"
published = "1999-01-01T05:00:00.000"
remediation = "在 Linux 系统中执行 `systemctl disable --now identd` 或注释掉 /etc/inetd.conf 中的 auth 行后重启 inetd；若业务必须保留，则通过防火墙仅允许受信任内网 IP 访问 113 端口，禁止外部网络访问该服务。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "UNIX系统 identd服务 信息泄露漏洞"
updated = "2026-06-16T21:48:45.460"

