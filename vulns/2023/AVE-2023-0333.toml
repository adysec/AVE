[basic]
description = "GNU Binutils 中的 `struct module *module` 结构体存在未初始化字段 (`file_table`) 漏洞（CWE-457/CWE-908）。由于 `file_table` 字段在使用前未经正确初始化，本地攻击者可通过构造特制的二进制文件，在受影响系统上触发该未初始化内存访问，导致应用程序崩溃，造成本地拒绝服务。该漏洞影响 GNU Binutils 2.40 及之前版本，CVSS 评分 4.7，危害等级中危。建议升级至 Binutils 2.40 以上版本修复。"
published = "2023-09-14T21:15:10.147"
remediation = "升级 binutils 至 2.41 或更高版本，该版本已包含未初始化变量修复（提交 65cf035b）；RHEL 6/7/8 用户应安装 Red Hat 提供的对应 binutils 安全更新。如无法升级且不使用 VMS 目标支持，可在编译时通过 `--disable-targets=vms` 禁用 VMS 相关代码以规避该路径。由于该漏洞仅在处理特制 VMS 二进制文件时触发本地拒绝服务，日常使用中避免打开不可信的 VMS 格式文件也可作为临时缓解措施。"
score = 4.7
severity = "MEDIUM"
sources = ["msrc"]
title = "GNU Binutils 拒绝服务漏洞"
updated = "2026-06-17T05:41:32.893"

