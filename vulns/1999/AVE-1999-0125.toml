[basic]
description = "Linux autofs 模块存在缓冲区溢出漏洞，本地攻击者可通过向 autofs 文件系统传递超长目录名触发该漏洞，导致系统拒绝服务。该漏洞影响 Linux Kernel 2.0/2.1/2.2 版本，攻击者需具备本地用户权限，利用门槛较低。由于 autofs 模块对用户输入的目录名长度缺乏充分校验，超长路径名可导致缓冲区溢出，造成系统崩溃或服务中断。"
published = "1999-02-19T05:00:00.000"
remediation = "升级 Linux 内核至 2.2.0 或更高版本，该漏洞已在 2.2 系列内核中修复。如无法升级内核，可通过卸载 autofs 模块（`rmmod autofs`）或移除 autofs 相关服务来缓解风险。对于仍在使用 2.0/2.1 系列内核的遗留系统，建议迁移至受支持的内核版本。"
score = 2.1
severity = "LOW"
sources = ["exploitdb"]
title = "Linux Kernel autofs 本地缓冲区溢出拒绝服务漏洞"
updated = "2026-06-16T21:48:26.563"

