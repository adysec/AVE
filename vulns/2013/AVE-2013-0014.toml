[basic]
description = 'WordPress 的 Spreadsheet (dhtmlxSpreadsheet) 插件 2.0 版本中 codebase/spreadsheet.php 存在跨站脚本(XSS)漏洞，攻击者通过向 "page" 参数注入恶意 Web 脚本或 HTML 代码，当管理员或用户访问特制链接时，恶意脚本将在浏览器中执行，导致敏感信息泄露或会话劫持。该漏洞影响 dhtmlxSpreadsheet 2.0 版本，CVSS 评分 4.3，危害等级中危。建议升级至最新版本或对输入参数进行严格过滤。'
published = "2013-10-25T14:55:02.763"
remediation = '''升级 dhtmlxSpreadsheet 插件至最新版本，或移除此插件改用替代方案。如无法更新，在 WordPress 主题的 functions.php 中添加对 \$_GET['page'] 参数的输入过滤和 HTML 实体编码，或安装 Web 应用防火墙（如 Wordfence）拦截含恶意脚本的请求。'''
score = 4.3
severity = "MEDIUM"
sources = ["nuclei"]
title = "dhtmlx WordPress Spreadsheet(dhtmlxSpreadsheet) 插件跨站脚本漏洞"
