[basic]
description = "Zope 2.2.1 之前版本存在权限控制不当漏洞，由于对 getRoles 方法的访问限制不严格，能够编辑 DTML 的用户可通过修改请求中包含的角色列表来添加或修改系统角色。攻击者利用此漏洞可提升权限，执行未授权操作，影响系统安全性。该漏洞 CVSS 评分 7.2，危害等级高。"
published = "2000-10-20T04:00:00.000"
remediation = "立即升级 Zope 至 2.2.1 或更高版本，该版本已修复 getRoles 方法的权限检查缺陷。如无法升级，严格限制可编辑 DTML 模板的用户权限，仅授予受信任管理员 DTML 编辑权，并定期审计角色列表变更日志。"
score = 7.2
severity = "HIGH"
sources = ["redhat"]
title = "Zope Zope getRoles 权限管理漏洞"
updated = "2026-06-16T21:52:21.033"

