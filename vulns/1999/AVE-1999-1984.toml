[basic]
description = "趋势科技 InterScan VirusWall for NT 的 SMTP 网关在处理 HELO 命令时存在缓冲区溢出漏洞。远程攻击者可通过向目标系统发送超长 HELO参数的 SMTP 请求，触发缓冲区溢出，导致服务崩溃或任意代码执行。该漏洞影响 Interscan VirusWall 3.23/3.3 版本，CVSS 评分 7.5，危害等级高。"
published = "1999-11-07T05:00:00.000"
remediation = "升级趋势科技 InterScan VirusWall for NT 到 4.x 或更高版本，并确保最新的安全补丁已安装。"
score = 7.5
severity = "HIGH"
