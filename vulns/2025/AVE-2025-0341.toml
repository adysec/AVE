[basic]
description = "飞企互联 OA 系统的 FEwork 模块中的 remoteServlet 接口存在命令执行漏洞，攻击者可构造恶意请求向目标系统发送特制数据包，未经身份认证即可远程在服务器上以 Web 服务权限执行任意系统命令，进而完全控制服务器。该漏洞影响飞企互联 OA 多个版本，危害严重，建议相关用户尽快升级或限制相关接口的访问权限。"
published = "0703"
remediation = "建议立即升级飞企互联 OA 至厂商发布的最新安全版本（联系官方获取补丁包）。临时缓解措施：在 Web 服务器（如 Nginx/Apache）层面配置访问控制，限制对 FEwork/remoteServlet 路径的访问，仅允许可信 IP 调用；同时部署 WAF 规则拦截对该路径的异常请求参数。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "飞企互联 OA FEwork 远程命令执行漏洞"
