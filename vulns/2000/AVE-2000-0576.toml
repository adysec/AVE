[basic]
description = "mopd（Maintenance Operations Protocol loader daemon）未能正确过滤用户注入的格式化字符串，存在格式化字符串漏洞，远程攻击者可通过向目标系统的 mopd 服务发送特制的格式化字符串载荷，触发该漏洞导致任意代码执行。该漏洞影响部署了 mopd 服务的相关系统，CVSS 评分 7.5，危害等级高。"
published = "2000-10-20T04:00:00.000"
remediation = "建议立即升级 HP-UX 系统并安装 mopd 安全补丁（参考 HP 安全公告 HPSBUX0008-121），或禁用 mopd 服务（`/sbin/init.d/mopd stop` 并移除启动项）。如 mopd 为业务必需，在防火墙上限制仅授权 IP 可访问 mopd 端口（默认 150/tcp），以减小攻击面。"
score = 7.5
severity = "HIGH"
sources = ["exploitdb"]
title = "ADC2000 NG Pro SQL 注入漏洞"
updated = "2026-06-16T21:52:24.320"

