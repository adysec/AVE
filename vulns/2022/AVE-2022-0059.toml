[basic]
description = "Linux 内核 netfilter 子系统中的 nf_tables 模块存在释放后使用（Use-After-Free）漏洞。当 netfilter 规则处理返回 NF_STOLEN 判定时，对应的 skb（套接字缓冲区）可能已被释放，但追踪（tracing）功能仍会访问已释放的 skb 中的 nf_trace、mark 等字段，导致释放后使用。本地攻击者可通过构造特制的 netfilter 规则触发此条件，利用该漏洞实现权限提升。该漏洞影响 Linux 内核多个版本，CVSS 评分 7.8，危害等级高。"
published = "2025-02-26T07:01:37.580"
remediation = '升级 Linux 内核至 5.10.137、5.15.61、5.19.17 及以上长期支持版本，或向后移植提交 afc20184c76f ("netfilter: nf_tables: avoid skb access on nf_stolen") 至当前内核源码树。如无法立即升级，可在未打补丁的系统上临时禁用 netfilter 的 nftables 追踪功能（nf_tables trace），降低利用风险。'
score = 7.8
severity = "HIGH"
sources = ["msrc"]
title = "Linux Kernel netfilter nf_tables NF_STOLEN 处理时使用后释放漏洞"
updated = "2026-06-17T05:18:39.343"

