[info]
author = "AVE"
description = "通过 HTTP GET 请求获取 Zope 服务器响应头，检查 Server 头中 Zope 版本号是否低于 2.1.7，验证 Zope DocumentTemplate 包存在的未授权修改 DTMLDocument/DTMLMethod 漏洞。"
id = "POC-AVE-2000-0540"
name = "Zope 2.2 DTML模板和DTML方法未授权修改漏洞 PoC"
severity = "high"
tags = ["ave-2000-0540"]
vuln_id = [
    "CVE-2000-0483",
    "AVE-2000-0540",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "header"
type = "word"
words = [
    "Zope 2.0",
    "Zope 2.1.0",
    "Zope 2.1.1",
    "Zope 2.1.2",
    "Zope 2.1.3",
    "Zope 2.1.4",
    "Zope 2.1.5",
    "Zope 2.1.6",
    "Zope 2.2",
]
