[basic]
description = "微软 Windows NT 4.0 自带的 SUBST 命令允许普通用户将本地路径映射为驱动器盘符。由于该工具未对映射对象实施充分的访问控制校验，已登录的本地用户可利用此功能将他人的用户配置文件或受保护目录挂载为可见盘符，从而在未经授权的情况下访问其他用户的数据，造成本地权限提升与信息泄露。"
published = "1999-11-30"
remediation = "升级到已修复该问题的 Windows NT 4.0 Service Pack 6a 或更高版本；如暂无法升级，可通过组策略禁用普通用户对 SUBST 命令的执行权限，并在用户注销时通过登录脚本调用 SUBST /D 强制卸载所有映射的驱动器盘符，避免残留映射被后续用户访问。"
score = 4.6
severity = "MEDIUM"
sources = ["avd"]
title = "微软 Windows NT SUBST 工具权限提升漏洞"
updated = "2026-07-17"

