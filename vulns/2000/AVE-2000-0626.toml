[basic]
description = "该漏洞利用存在于 Microsoft Windows NT 4.0 和 Windows 2000 操作系统的 DCE/RPC 请求机制中的 SMBwriteX 函数的整数缓冲区溢出。攻击者可通过精心构造的数据长度异常的 SMBwriteX 请求，触发 RPC 服务的整数下溢，导致内核关键数据结构损坏或堆栈破坏，最终引发系统拒绝服务，导致目标主机蓝屏崩溃或重新启动。该漏洞对未进行身份验证的远程攻击者完全可用，无需任何权限，攻击过程为单步骤，攻击条件宽松，成功率较高，影响范围广泛，涵盖所有运行 Windows NT 4.0 和 Windows 2000 的网络主机。由于Windows NT 4.0和Windows 2000系列操作系统已停止服务和支持，此漏洞仍可能存在于Legacy系统或企业内部网络中，已经成为企业内部网络安全重大隐患。"
published = "2000-06-05T04:00:00.000"
remediation = "建议立即安装 Microsoft 安全公告 MS00-066 提供的安全补丁：Windows NT 4.0 需安装 Service Pack 6a 并应用补丁 Q272133；Windows 2000 需安装 Service Pack 2 及后续安全更新。如无法立即打补丁，可在防火墙层面封锁 TCP 135、139、445 端口（DCE/RPC 和 SMB 端口）作为临时缓解措施，并禁用不必要的 SMB 服务。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Microsoft Windows NT 4.0/2000 DCE/RPC SMBwriteX 拒绝服务漏洞"
updated = "2026-06-16T21:51:57.897"

