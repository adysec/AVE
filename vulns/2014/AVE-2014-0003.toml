[basic]
description = "DomPHP 0.83 及更早版本中存在目录遍历漏洞（CWE-22），远程攻击者可通过在 `photoalbum/index.php` 页面的 `url` 参数中插入 `../` 序列，绕过路径限制访问服务器上的任意文件。该漏洞无需身份认证即可利用，攻击者可能读取系统敏感配置文件或应用源码，导致信息泄露。CVSS 评分 7.5，危害等级高，影响所有使用 DomPHP 0.83 及之前版本的系统。"
published = "2015-01-13T15:59:47.367"
remediation = 'DomPHP 0.83 已停止维护，官方未发布安全修复版本。具体修复措施：(1) 修改 photoalbum/index.php 中 url 参数的解析逻辑，使用 realpath() 规范化路径并校验其是否在 photoalbum/ 目录内，直接拒绝包含 ../ 的输入；(2) 在 Nginx 添加 `if ($arg_url ~* "\.\.") { return 403; }` 规则，或在 Apache 使用 RewriteCond 拦截路径遍历请求；(3) 部署 WAF 规则拦截 url 参数中的 dot-dot 序列（如 `\.\.` 正则匹配）；(4) 鉴于项目已无人维护，建议迁移至仍在活跃开发的替代相册系统。'
score = 7.5
severity = "HIGH"
sources = ["nuclei"]
title = "DomPHP 0.83 本地目录遍历漏洞"
updated = "2026-06-17T00:04:07.907"

