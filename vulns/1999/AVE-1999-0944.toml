description = "Microsoft Windows 95 密码列表文件弱加密权限提升漏洞"
published = "1999-12-31T05:00:00.000"
remediation = '禁用 Windows 95 密码缓存功能：在控制面板→密码→密码属性中取消勾选"保存密码"选项，删除所有 .pwl 文件（位于 Windows 目录下）。由于 Windows 95 已停止支持，建议升级至 Windows 10 或更高版本操作系统，从根本上消除弱加密风险。'
