[basic]
description = "NBase 公司 NH2012、NH2012R、NH2015、NH2048 等型号交换机存在硬编码后门密码漏洞。设备出厂预设的特权口令无法被禁用或修改，远程攻击者无需身份认证即可通过 Telnet 或 Web 管理接口使用该后门密码登录交换机，获得完全管理权限，进而可修改设备配置、窃取网络流量或破坏网络通信。该漏洞影响所有运行原厂固件的 NBase 交换机，CVSS 评分 10.0，危害等级严重。厂商至今未发布官方修复补丁。"
published = "1998-07-20T04:00:00.000"
remediation = "NBase NH2012/NH2015/NH2048 系列交换机存在硬编码后门密码且无法禁用，最彻底的修复方案是更换为不受此漏洞影响的交换机设备。如无法替换，须在网络边界防火墙上设置 ACL 规则，仅允许特定受信管理 IP 地址访问交换机的 Telnet/SNMP/HTTP 管理端口，并将这些交换机隔离到独立管理 VLAN 中，禁止来自外部或非信任网段的直接访问。"
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "NBase 交换机后门密码漏洞"
updated = "2026-06-16T21:50:24.177"

