[basic]
description = "OpenLink Software 的 OpenLink 3.2 版本 Web 配置器（web configurator）存在远程缓冲区溢出漏洞。其处理 HTTP 请求时未对输入长度做边界校验，攻击者可构造超长的 GET 请求发送至目标服务的 Web 配置端口，使缓冲区溢出并覆盖相邻内存，从而以目标服务进程权限执行任意代码或提升权限。该漏洞影响运行 OpenLink 3.2 且开放 Web 配置器的远程服务，无需身份认证即可被利用，危害等级极高（CVSS 评分 10.0）。"
published = "1999-10-15T04:00:00.000"
remediation = "升级到 OpenLink Software 官方发布的修复版本（3.2 之后的安全更新版本），替换存在溢出的 Web 配置器组件。如暂无法升级，应在边界防火墙或反向代理上对 OpenLink 监听端口的 HTTP GET 请求长度进行限制（例如截断超过 2048 字节的请求），并仅允许受信任的管理 IP 访问该配置器端口，作为临时缓解措施。"
score = 10
severity = "CRITICAL"
sources = ["exploitdb"]
