[info]
author = "AVE"
description = "检测 Hotmail 邮件系统对 IMG 标签中 LOWSRC 或 DYNRC 参数的 JavaScript 代码过滤不当。攻击者通过发送包含恶意 IMG 标签的邮件，在受害者查看邮件时触发 JavaScript 执行，验证方式为请求邮件阅读接口并检查响应是否包含未被过滤的 IMG 标签属性"
id = "POC-AVE-2000-0222"
name = "CVE-2000-0085 PoC"
severity = "high"
tags = ["cve-2000-0085"]
vuln_id = [
    "CVE-2000-0085",
    "AVE-2000-0222",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/mail/read.aspx"
protocol = "http"

[poc.requests.headers]
Cookie = "{{auth_cookie}}"
User-Agent = "AVE/1.0"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "lowsrc",
    "dynsrc",
]
