[basic]
description = "SGI IRIX 6.2 及 6.3 系统中的 dmplay 工具（位于 /usr/sbin/dmplay）存在本地缓冲区溢出漏洞。攻击者通过向该程序传递超长的命令行选项参数，可触发缓冲区溢出，进而获取 root 权限。该漏洞影响 IRIX 6.2、6.3 及 6.5.x 系列版本，需要攻击者拥有本地系统访问权限。CVSS 评分 7.2，危害等级高。"
published = "2000-10-20T04:00:00.000"
remediation = "建议升级到 IRIX 6.5 及以上版本，官方已在该版本中修复 dmplay 缓冲区溢出问题。如无法升级，可移除 dmplay 的 setuid root 权限：chmod 0755 /usr/sbin/dmplay，并限制仅受信任用户可执行。同时建议禁用不必要的 SUID 本地程序作为纵深防御措施。"
score = 7.2
severity = "HIGH"
sources = ["exploitdb"]
title = "SGI IRIX dmplay 本地缓冲区溢出漏洞"
updated = "2026-06-16T21:52:29.937"

