[basic]
description = "Alibaba 2.0 的 genkey 密钥生成工具在生成 RSA 密钥对时错误地将私钥指数设置为 1，导致对应的公钥指数也为 1，使得 SSL 会话密钥以明文形式传输。远程攻击者无需认证即可通过网络嗅探窃取加密通信内容，或实施中间人攻击篡改数据。该漏洞影响 Alibaba 2.0 版本，且 Netscape Navigator 和 Internet Explorer 浏览器均不会对使用此类无效证书的 SSL 站点发出安全警告，进一步扩大了风险。"
published = "1999-12-31T05:00:00.000"
remediation = "立即停止使用 Alibaba 2.0 的 genkey 工具生成密钥对，改用 OpenSSL 等标准工具生成 RSA 密钥（指数 e 至少为 65537）。如系统仍运行 Alibaba 2.0，应升级到支持安全密钥生成的版本或迁移至其他支持 TLS 加密的电子商务平台，避免交易数据以明文传输。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Alibaba genkey 交易明文发送漏洞"
updated = "2026-06-16T21:50:27.233"

