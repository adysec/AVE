ave_id = "AVE-2024-0142"
aliases = ["HWPOC-2024-01e2bbe5"]
[basic]
title = "万户 OA iWebOfficeSign DocumentEdit_unite.jsp SQL 注入漏洞"
description = "万户 OA 协同办公平台的 iWebOfficeSign 模块中 DocumentEdit_unite.jsp 接口存在 SQL 注入漏洞。由于 RecordID 参数未经过滤直接拼接进 SQL 查询，未经身份认证的远程攻击者可构造恶意 SQL 语句注入数据库。该漏洞影响万户 OA 多个版本，攻击者可直接发送特制 HTTP 请求利用该漏洞，获取数据库敏感信息、读取文件甚至执行系统命令，危害等级高危。"
severity = "HIGH"
score = 7.5
sources = ["hwpoc"]
published = "2024-07-22"
updated = "2024-07-22"
remediation = "1. 立即升级万户 OA 至最新版本（建议升级至 2024 年 7 月后发布的安全版本），请访问万户软件官网（www.whir.net）下载补丁；2. 临时缓解措施：在 Web 应用防火墙（WAF）配置 SQL 注入防护规则，拦截包含 UNION SELECT、SLEEP、BENCHMARK、LOAD_FILE 等特征的请求；3. 限制数据库账户权限，仅授予应用所需的最小权限，禁用危险存储过程和扩展存储过程（如 xp_cmdshell）；4. 监控数据库异常查询日志，及时发现并阻断攻击行为。"
