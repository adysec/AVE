[basic]
description = '深信服 SSL VPN（影响版本 M7.1 至 M7.6.9R4）在开启"找回密码"功能时存在短信验证码暴力猜解漏洞。该漏洞源于系统对用户身份校验环节的设计缺陷，未对短信验证码的尝试次数与频率进行有效限制。攻击者在已获知目标用户账号的前提下，无需身份认证即可对找回密码流程中的短信验证码进行暴力枚举猜解，验证成功后便可重置并修改该用户的登录密码，进而以合法用户身份未授权登录 VPN 系统，获取内网访问权限。利用条件为：目标设备开启了找回密码功能，且攻击者已知晓至少一个有效用户账号。'
published = "2024-08-13"
remediation = "升级深信服 SSL VPN 设备至最新安全补丁版本 M7.6.9R5 或更高版本以修复验证码验证逻辑漏洞；立即关闭设备上的密码找回功能或限制单用户 30 分钟内请求次数不超过 3 次；加强认证机制，启用双因素认证并记录所有验证码验证操作日志以供审计。"
score = 7.5
severity = "HIGH"
sources = ["hwpoc"]
title = "深信服 SSL VPN 短信验证码暴力猜解漏洞"
updated = "2024-08-13"

