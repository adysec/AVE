[basic]
description = "3Com HiPer Access Router Card (HiperARC) 4.0至4.2.29版本中的Telnet服务存在拒绝服务漏洞。远程攻击者可通过向Telnet端口发送大量IAC(Interpret As Command)数据包，导致设备CPU过载并触发系统重启，造成服务不可用。攻击无需认证，仅需网络可达即可实施。"
published = "1999-08-12"
remediation = "该产品已停止支持，无官方补丁。建议在边界防火墙上禁用Telnet服务（端口23）或使用ACL限制可访问Telnet端口的来源IP地址；如业务允许，应替换为支持安全远程管理的现代设备。"
score = 5.0
severity = "MEDIUM"
sources = [
    "cve",
    "avd",
]
title = "3Com HiPerARC 远程Telnet IAC数据包洪水拒绝服务漏洞"
