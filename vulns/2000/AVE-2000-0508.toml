[basic]
description = "Delegate 应用程序代理（Delegate）5.9.x 及 6.0.x 版本存在多个缓冲区溢出漏洞。远程攻击者无需认证即可向目标系统发送特制的网络请求触发缓冲区溢出，从而在服务器上执行任意命令，完全控制受影响系统。攻击者可利用该漏洞进行远程代码执行、数据窃取或部署恶意软件，危害严重。"
published = "1999-11-13T05:00:00.000"
remediation = "升级至 Delegate 7.0 或更高版本，该版本已修复多个缓冲区溢出漏洞。如无法升级，在防火墙层面限制仅允许可信 IP 访问 Delegate 代理服务（默认端口 8080），并启用 TCP 包装器或 iptables 规则限制来源地址。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "ETL Delegate 代理服务远程缓冲区溢出漏洞"
updated = "2026-06-16T21:51:08.143"

