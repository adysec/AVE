[info]
author = "ave"
description = "检测目标系统上 mailx 程序的存在性。SGI IRIX/RedHat Linux/Solaris 系统中的 mailx 程序在处理超长 username 参数时存在栈缓冲区溢出漏洞，攻击者可利用该漏洞以 group mail 权限执行任意代码，实现本地权限提升。CVE-1999-0125。"
id = "POC-AVE-1999-0271"
name = "SGI IRIX mailx 缓冲区溢出漏洞 PoC"
severity = "medium"
tags = ["ave-1999-0271"]
vuln_id = [
    "CVE-1999-0125",
    "AVE-1999-0271",
]

[poc]
logic = "all"

[[poc.requests]]
path = "/bin/mailx"
protocol = "file"

[[poc.requests.matchers]]
expect = true
part = "body"
regex = ".+"
type = "regex"
