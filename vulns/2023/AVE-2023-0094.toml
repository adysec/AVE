[basic]
description = "泛微 E-Mobile 6 前台存在 SQL 注入漏洞。由于系统未对用户输入参数进行充分的过滤与转义处理，未经身份认证的攻击者可通过向登录接口等前台功能发送特制的恶意 HTTP 请求，将构造的 SQL 语句注入后端数据库执行，导致数据库中的敏感数据泄露、管理员权限被获取，进而可能完全控制目标服务器。该漏洞影响泛微 E-Mobile 6 全线版本，危害严重。"
published = "08.10"
remediation = "建议立即联系泛微官方获取 E-Mobile6 最新安全补丁包进行升级安装，或升级至不受影响的版本（如 E-Mobile7 及以上）。如无法立即升级，可在 Web 应用防火墙（WAF）侧配置 SQL 注入特征拦截规则，对 /api/ 等接口的 GET/POST 参数进行关键字过滤（如 and、or、union、select、sleep 等），并在中间件层对输入参数进行严格的类型校验与预编译处理，作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "泛微 E-Mobile6 前台SQL注入漏洞"
updated = "08.10"

