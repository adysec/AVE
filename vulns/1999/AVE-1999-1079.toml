[basic]
description = "Windows NT 3.51 及 4.0 系统中存在资源耗尽型拒绝服务漏洞。本地攻击者可通过运行恶意程序，对同一文件创建大量文件锁，消耗系统非分页池（NonPagedPool）内存资源，导致内核资源耗尽、系统崩溃。该漏洞仅需低权限本地访问即可触发，无需用户交互，影响所有 Windows NT 3.51 及 4.0 版本。CVSS 评分 2.1，危害等级低。"
published = "1999-12-31T05:00:00.000"
remediation = "升级到受支持的现代 Windows 版本（如 Windows 10/11 或 Windows Server 2019+），Windows NT 3.51/4.0 已停止支持且不再发布安全更新。如无法升级，限制本地用户登录权限，仅允许受信任用户操作，并通过系统监视器监控异常的文件锁创建行为作为临时缓解措施。"
score = 2.1
severity = "LOW"
sources = ["epss"]
title = "Microsoft Windows NT 本地拒绝服务漏洞"
updated = "2026-06-16T21:50:16.840"

