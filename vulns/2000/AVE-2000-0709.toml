[basic]
description = "Red Hat Linux 6.2 的 Piranha 虚拟服务器软件包中，Web GUI 管理界面存在硬编码后门账户与密码漏洞。远程攻击者可通过使用预设的默认凭据登录管理后台，无需身份认证即可直接执行任意系统命令，完全控制目标服务器。该漏洞影响 Red Hat Linux 6.2 及早期版本中安装 Piranha 软件包的系统，危害等级严重，CVSS 评分 10.0。建议用户立即升级软件包或修改默认凭据。"
published = "2000-04-24T04:00:00.000"
remediation = '立即删除 /etc/sysconfig/ha/lvs.cf 中默认的 "piranha" 账户及密码条目，或升级到 Red Hat 6.2 之后的安全更新版本。如无法升级，在 iptables 中限制对 9090 端口的访问来源 IP，仅允许管理地址连接 Web GUI。'
score = 10
severity = "CRITICAL"
sources = ["redhat"]
title = "Red Hat Linux Piranha 虚拟服务器包 Web GUI 默认后门账户漏洞"
updated = "2026-06-16T21:51:19.057"

