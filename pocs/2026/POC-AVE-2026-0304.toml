[info]
author = "AVE"
description = "检测 pyLoad EventManager getEvents API 未限制 uuid 参数导致的内存泄漏 DoS 漏洞。发送唯一 uuid 请求验证端点可达，大量请求可耗尽服务器内存。"
id = "POC-AVE-2026-0304"
name = "CVE-2026-48987 PoC"
severity = "medium"
tags = [
    "cve-2026-48987",
    "dos",
    "memory-leak",
]
vuln_id = [
    "CVE-2026-48987",
    "AVE-2026-0304",
    "GHSA-c2f9-4mc8-j656",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/api/getEvents"
protocol = "http"

[poc.requests.headers]
User-Agent = "AVE/1.0"
X-API-Key = "{{apikey}}"

[[poc.requests.matchers]]
expect = true
status = [200]
type = "status"
