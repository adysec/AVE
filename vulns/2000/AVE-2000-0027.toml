[basic]
description = "tags.<value>UnixWare 系统中的 pis 和 mkpis 命令存在符号链接攻击漏洞，本地低权限用户可通过创建指向系统敏感文件的符号链接，当这些命令以高权限运行时，攻击者利用该漏洞可覆盖或篡改关键系统文件，从而实现权限提升。该漏洞影响 UnixWare 操作系统，攻击者需要具备本地访问权限才能成功利用，CVSS 评分 4.6，危害等级为中等。"
published = "1999-12-27T05:00:00.000"
remediation = "安装 SCO 发布的最新 UnixWare 安全补丁，并更新或移除 Skunkware 中的 orion 软件包（含 pis 和 mkpis 命令）。具体操作：首先通过 `patchadd` 确认系统已安装全部当前可用安全补丁；若无需使用 orion 相关命令，可直接删除或卸载该软件包以消除攻击面；如确有使用需求，请访问 SCO Skunkware 网站获取 orion 更新版本。临时缓解措施：以 root 身份对 pis 和 mkpis 命令设置不可写符号链接的权限保护，限制普通用户的符号链接创建能力，从而阻断利用路径。"
score = 4.6
severity = "MEDIUM"
sources = ["cve"]
