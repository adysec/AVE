[basic]
description = "奇安信天擎 EDR 服务端 V10 版本存在未公开的远程代码执行（0day）漏洞，攻击者可利用该服务端程序中的安全缺陷，在未经充分授权的情况下向服务端发送特制请求，从而在执行服务端进程的上下文中执行任意代码。该漏洞影响部署并运行奇安信天擎 EDR 服务端 V10 的企业环境，由于属于 0day 漏洞，攻击者可趁官方尚未发布补丁期间发起攻击，成功利用后可完全控制 EDR 服务端，进而威胁受管控的终端安全。由于公开资料有限，具体的漏洞原理与利用细节尚属未知。"
published = "0722"
remediation = "升级奇安信天擎EDR服务端至官方发布的V10最新安全版本（联系厂商获取修复补丁）；在无法立即升级时，于边界防火墙限制EDR服务端管理端口（如8443/8080）仅允许受信任IP访问，并关闭不必要的外网映射，启用WAF拦截异常RCE请求作为临时缓解。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
