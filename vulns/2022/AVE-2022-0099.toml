[basic]
description = "Linux 内核 MediaTek IOMMU 驱动中存在未初始化资源使用漏洞（CWE-908）。当系统通过 kexec() 热重启时，中断处理程序（ISR）可能在 IOMMU 域初始化完成前被触发，导致内核访问未初始化的内存地址，引发系统崩溃。本地攻击者可在低权限条件下利用此漏洞造成拒绝服务。该漏洞影响 Linux 内核 4.6 至 6.0.17 及 6.1 至 6.1.3 版本，已在对应稳定分支中修复。"
published = "2025-09-15T14:15:34.003"
remediation = "立即升级 Linux 内核至包含 commit 构成（如 v5.10+ 对应补丁集）的版本。各发行版请安装对应安全更新：Ubuntu 安装 `linux-image-*` 至 5.10/5.15 HWE 最新版，Debian 升级至 6.1+，RHEL/CentOS 安装 kernel 安全 errata。如无法立即更新，可临时通过 kernel 命令行添加 `modprobe.blacklist=mtk_iommu` 禁用 MediaTek IOMMU 驱动缓解，但会丧失 IOMMU 功能。"
score = 5.5
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux Kernel MediaTek IOMMU 未初始化内存访问漏洞"
updated = "2026-06-17T05:23:02.553"

