[basic]
description = "SuSE Linux 6.x 及 7.0 系统中的 rctab 工具在处理临时文件 rctmp 时存在竞争条件漏洞。本地攻击者可通过符号链接攻击方式，在 rctab 创建临时文件与写入文件之间的时间窗口内，将 rctmp 符号链接指向目标系统任意文件，从而以 rctab 进程权限创建或覆盖系统任意文件。该漏洞需要攻击者拥有本地账户权限，利用难度较低，可能导致敏感文件篡改或权限提升。"
published = "2001-03-12"
remediation = "SuSE Linux 7.0 及更早版本受此漏洞影响，官方已不再提供安全更新。建议升级至 SUSE Linux Enterprise 或其后继发行版 openSUSE。若无法升级，可手动修改 /sbin/rctab 脚本：使用 mktemp 命令替代硬编码临时文件名，创建临时目录前检查是否已存在，并移除 rctab 的 setuid 权限以降低风险。"
score = 1.2
severity = "LOW"
sources = [
    "cve",
    "exploitdb",
]
title = "SuSE Linux rctab 竞争条件漏洞"
updated = "2026-06-16"

