[basic]
description = "xsoldier 0.96 是 RedHat Linux 6.2 发行版中附带的 X11 窗口射击游戏，该程序在启动时未对命令行参数长度进行充分边界检查，存在本地缓冲区溢出漏洞。攻击者可通过向 xsoldier 传入超长命令行参数触发堆栈溢出，进而覆盖返回地址并执行任意代码，最终获得系统 root 权限。此漏洞影响 RedHat 6.2 系统上安装 xsoldier 0.96 版本的本地用户，攻击条件要求攻击者已在目标系统上拥有普通用户账户访问权限，利用方式为在命令行中执行带有精心构造的溢出载荷的参数即可完成权限提升。CVSS 评分为 7.2，危害等级为高危。"
published = "2000-05-17T04:00:00.000"
remediation = "卸载 xsoldier 0.96 游戏或移除其 setuid 位（chmod u-s /usr/X11R6/bin/xsoldier），建议升级至 Red Hat 7.0 或更高版本，或从红帽官方获取 xsoldier 修补版本进行升级。"
score = 7.2
severity = "HIGH"
sources = [
    "cve",
    "epss",
]
title = "Red Hat xsoldier 0.96 本地缓冲区溢出漏洞"
updated = "2026-06-16T21:49:30.753"

