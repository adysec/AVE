[basic]
description = "Windows Media Player 7.0 中的 WMP ActiveX 控件存在 Frame Domain Verification 漏洞变种，远程攻击者可诱导用户访问特制网页，通过 JavaScript URL 在 Internet Explorer 中绕过域验证机制并执行任意命令。该漏洞影响 Windows Media Player 7.0 及关联系统组件，攻击者无需身份认证即可远程利用，危害较大。"
published = "2001-06-02"
remediation = "建议升级到 Windows Media Player 7.1 或更高版本，微软已通过安全公告 MS01-015 修复此漏洞。对于仍使用 Windows Media Player 7.0 的系统，可在 Internet Explorer 中禁用 WMP ActiveX 控件的 kill bit 或提高 Internet 区域安全级别以限制活动脚本执行。"
score = 7.5
severity = "HIGH"
sources = [
    "cve",
    "exploitdb",
]
title = "Microsoft Windows Media Player 7.0 ActiveX 控件远程代码执行漏洞"
updated = "2001-06-02"

