[basic]
description = "CVE-2000-0441是一个安全漏洞，影响相关产品的安全性。攻击者可能利用此漏洞执行任意代码或获取未授权访问。建议用户及时更新到最新版本以修复此问题。"
published = "2000-05-24T04:00:00.000"
remediation = "升级 IBM AIX 到 4.3.3 或更高版本，或应用 IBM 官方提供的对应 APAR 安全补丁。如无法立即升级，可通过修改 /etc/exports 限制 NFS 文件系统的读写权限，将涉及敏感数据的文件系统挂载为只读（read-only），并删除不必要的用户 shell 访问权限或使用 chmod 限制关键目录的写权限，以降低本地用户提升文件系统写权限的风险。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "IBM AIX 文件系统权限提升漏洞"
updated = "2026-06-16T21:51:44.430"

