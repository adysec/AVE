[basic]
description = 'Windows NT 系统的文件审计策略存在安全配置缺陷，对于非关键文件或目录，系统不会记录访问成功或失败的事件日志。攻击者在已获得目标系统访问权限的情况下，可借此对敏感但被标记为"非关键"的文件或目录进行未授权读取、修改或删除操作，而其行为不会触发任何审计告警，从而规避安全监控与事后溯源。该漏洞影响启用了文件审计策略但未正确配置关键路径的 Windows NT 系统，CVSS 评分达 10.0，危害等级极为严重。利用方式主要为本地或低权限攻击者通过操纵审计策略绕过日志监控实施隐蔽攻击，修复建议是正确配置审计策略，将重要文件与目录纳入审计范围并启用成功与失败事件的双重记录。'
published = "1999-01-01T05:00:00.000"
remediation = "在 Windows NT 的「本地安全策略」→「审核策略」中启用「审核对象访问」的成功和失败审核，然后对关键目录（如系统目录、敏感数据目录）应用审核条目，在 ACL 高级设置中添加 Everyone 组的「完全控制」审核。对于 Windows 2000 及以上版本，建议升级操作系统以获取更完善的审核功能。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
