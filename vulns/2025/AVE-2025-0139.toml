[basic]
description = "金蝶云星空 ERP 系统的 DevReportService 服务接口 GetBusinessobjectData.common.kdsvc 存在反序列化远程代码执行漏洞。未经身份认证的远程攻击者可构造特制的 HTTP POST 请求包，通过反序列化机制触发漏洞，从而在目标服务器上以系统权限执行任意命令。该漏洞影响金蝶云星空多个版本，攻击者利用难度较低，可导致服务器完全失陷、敏感数据泄露或后续横向移动。建议用户尽快升级至官方安全版本或通过访问控制策略限制接口暴露。"
published = "0718"
remediation = "立即联系金蝶官方获取最新安全补丁（PTM 补丁包），升级金蝶云星空至最新 PTM 版本。如无法立即升级，在 IIS 管理器中对 DevReportService 虚拟目录添加 IP 地址和域名访问限制，仅允许内网管理网段访问；同时删除或重命名 GetBusinessobjectData.common.kdsvc 文件以阻断攻击路径。在 Web 应用防火墙（WAF）中添加规则，拦截对 .kdsvc 接口的异常 POST 请求。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "金蝶 金蝶云星空 远程代码执行漏洞"
updated = "0718"

