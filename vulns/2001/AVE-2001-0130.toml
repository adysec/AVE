[basic]
description = 'WarFTP 1.67.04 存在目录遍历漏洞，远程攻击者无需身份认证即可通过发送特制的 "dir *./../.." 命令进行目录遍历，列出服务器任意目录内容并可能读取敏感文件。该漏洞源于对用户输入路径过滤不严，允许使用 "./../" 等序列回溯目录，影响 War FTP 1.67.04 版本及可能更早版本，CVSS 评分 5.0，危害等级中危。'
published = "2001-05-03T04:00:00.000"
remediation = "升级 War FTPD 至 1.67.05 或更高版本，该版本已修复目录遍历漏洞。如厂商已停止维护，建议迁移至 FileZilla Server 或 vsftpd 等仍在更新的 FTP 服务端，并在防火墙中限制 FTP 端口的访问来源 IP。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Jarle Aase War FTP 目录遍历漏洞"
updated = "2026-06-16T21:54:02.817"

