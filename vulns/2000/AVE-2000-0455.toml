[basic]
description = "West Street Software 的 LocalWEB HTTP Server 1.2.0 存在缓冲区溢出漏洞。远程攻击者无需身份认证，通过向目标服务器发送超长的 GET 请求即可触发缓冲区溢出，导致服务进程崩溃，造成拒绝服务。该漏洞影响 LocalWEB HTTP Server 1.2.0 版本，CVSS 评分 6.4，危害等级中危。目前官方已停止维护，建议用户迁移至其他替代产品。"
published = "2000-07-05T04:00:00.000"
remediation = "立即升级 LocalWEB HTTP Server 至 1.2.0 以上版本（如厂商已停止维护，建议迁移至其他受支持的 Web 服务器，如 Apache HTTP Server 或 Nginx）。临时缓解措施：在反向代理或防火墙层限制 HTTP GET 请求长度不超过 4096 字节，并过滤异常长 URL 请求。"
score = 6.4
severity = "MEDIUM"
sources = ["exploitdb"]
title = "West Street Software LocalWEB HTTP Server 缓冲区溢出漏洞"
updated = "2026-06-16T21:52:01.340"

