[basic]
description = "Windows NT 操作系统在处理键盘与鼠标的输入输出控制时存在权限校验缺陷，本地已登录的普通用户可绕过系统限制，直接调用内核中控制输入设备的 IOCTL（如用于禁用键盘或鼠标的设备控制码），强制关闭或禁用这些输入设备。该漏洞影响运行 Windows NT 的本地系统，攻击前提是攻击者需在目标主机上拥有合法的交互式登录会话，利用方式为执行特制程序直接下发相应的 IOCTL 请求，使目标主机的键盘或鼠标失去响应，导致本地拒绝服务，干扰正常用户的操作并影响系统可用性。"
published = "1999-07-06T04:00:00.000"
remediation = "安装 Microsoft 针对 Windows NT 发布的安全更新补丁，或升级至 Windows NT 4.0 Service Pack 6 及以上版本。如无法立即补丁，可通过修改注册表限制普通用户对键盘和鼠标设备驱动程序的访问权限，将相关 IOCTL 调用权限仅授予管理员账户，或通过组策略禁用非管理员用户的交互式桌面访问作为临时缓解措施。"
score = 7.8
severity = "HIGH"
sources = ["epss"]
title = "Microsoft Windows NT IOCTL 权限控制不当漏洞"
updated = "2026-06-16T21:48:55.960"

