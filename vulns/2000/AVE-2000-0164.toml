[basic]
description = "Linux ext2fs 备份套件中的 dump 工具存在缓冲区溢出漏洞，本地攻击者可通过向 dump 命令传递超长命令行参数触发缓冲区溢出，从而获取目标系统的 root 权限。该漏洞影响使用 dump 工具的多个 Linux 发行版（包括 Mandrake Linux 等），CVSS 评分 7.2，危害等级高。攻击者需拥有本地 shell 访问权限，无需其他特殊条件。"
published = "2000-02-28T05:00:00.000"
remediation = "升级 dump 软件包至修复版本（如 dump-0.4b7 及以上），该漏洞在 dump 0.4b7 中已修复。如无法升级，可通过 chmod 移除 dump 的 suid 位（`chmod u-s /sbin/dump`）来消除本地提权风险，但会导致普通用户无法执行备份操作。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "Linux ext2fs dump 工具缓冲区溢出权限提升漏洞"
updated = "2026-06-16T21:51:10.780"

