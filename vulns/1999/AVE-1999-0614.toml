[basic]
description = "SCO UnixWare 7.1 的 pkg 系列命令（如 pkginfo、pkgcat、pkgparam）在处理 dacread 权限时存在缺陷，本地普通用户可借此读取本无权访问的任意文件。攻击前提是攻击者已获得目标系统的本地登录权限，通过构造特定参数调用上述命令即可触发越权文件读取，可能造成系统口令文件、配置文件等敏感信息泄露，属于本地信息泄露类漏洞，影响 UnixWare 7.1 系统的本地数据安全。"
published = "1999-12-02T05:00:00.000"
remediation = "升级至 SCO UnixWare 7.1.1 或更高版本并安装 SCO 安全补丁补丁包（如 SCO Security Patch Supplement）；或通过 chmod 移除 pkginfo/pkgcat/pkgparam 的 setuid 位并限制 dacread 权限，限制本地用户执行权限作为临时缓解"
score = 3.6
severity = "LOW"
sources = ["exploitdb"]
title = "SCO Unixware 7.1 本地缓冲区溢出漏洞"
updated = "2026-06-16T21:49:08.580"

