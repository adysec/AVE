[basic]
description = "IBM AIX 4.1 及 4.2 版本中 lquerypv 工具存在任意文件读取漏洞，本地攻击者可通过 -h 命令行参数指定任意文件路径，导致系统敏感信息泄露。该漏洞源于程序未对用户传入的文件路径参数进行充分过滤，攻击者拥有本地账号即可利用，影响范围有限但可读取 /etc/passwd 等敏感文件。"
published = "1999-12-31T05:00:00.000"
remediation = "升级至 AIX 5.1 及以上版本以彻底修复该漏洞；若无法升级，安装 AIX 4.2.1 对应 APAR 补丁 (IX68465)。临时缓解措施：以 root 执行 `chmod 750 /usr/sbin/lquerypv` 限制 lquerypv 仅 root 和 system 组可执行，或移除该文件的 setuid 权限 `chmod u-s /usr/sbin/lquerypv`。"
score = 2.1
severity = "LOW"
sources = ["epss"]
title = "IBM AIX lquerypv 本地文件读取漏洞"
updated = "2026-06-16T21:49:45.383"

