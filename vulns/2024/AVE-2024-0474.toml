[basic]
description = "Rsync 文件同步工具在比较文件校验和时存在未初始化内存信息泄露漏洞。攻击者可通过操控校验和长度（s2length）参数，使程序将校验和与未初始化的栈内存进行比较，从而逐字节泄露栈中的敏感数据。该漏洞影响所有使用 rsync 进行文件校验的场景，CVSS 评分 7.5，危害等级高。攻击者无需身份认证即可利用此漏洞获取目标系统的栈内存信息，可能导致进一步的信息收集攻击。"
published = "2025-01-14T18:15:25.123"
remediation = "立即将 rsync 升级至 3.4.0 或更高版本（上游已发布修复，可从 https://github.com/RsyncProject/rsync 获取）。各发行版用户安装对应安全更新：RHEL/CentOS 执行 `yum update rsync` 安装 RHSA-2025:0324 等补丁，Debian/Ubuntu 执行 `apt update && apt upgrade rsync`。如无法立即升级，可在 rsync 服务器配置中限制 `--checksum` 选项的使用，或通过防火墙限制仅受信任 IP 访问 rsync 服务端口（默认 873）作为临时缓解。"
score = 7.5
severity = "HIGH"
sources = ["msrc"]
title = "Rsync 未初始化堆栈内容信息泄露漏洞"
updated = "2026-07-20T11:16:33.323"

