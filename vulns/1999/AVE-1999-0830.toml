[basic]
description = "思科缓存引擎（Cisco Cache Engine）存在缓存内容替换安全漏洞。该设备用于对网络流量进行缓存加速，但其缓存内容验证机制存在缺陷，远程攻击者在无需身份认证的情况下，可向缓存引擎发送特制请求或伪造响应数据，将缓存中已存储的合法网页内容替换为攻击者可控的恶意内容。被替换内容会在后续用户访问时直接返回，造成内容投毒、钓鱼或信息篡改等后果。攻击条件为攻击者能与目标缓存引擎建立网络连接并注入伪造数据。"
published = "1999-12-16"
remediation = "升级思科缓存引擎软件至修复版本（Cisco 官方针对 CVE-1999-0998 发布的 Cache Software 2.0.1 及以上版本）。如无法立即升级，应限制缓存引擎管理接口及 HTTP 代理端口仅允许受信任网络访问，关闭不必要的外部可访问服务，并部署上游内容完整性校验以缓解缓存投毒风险。"
score = 5.0
severity = "MEDIUM"
sources = ["avd"]
title = "思科 缓存引擎 缓存内容替换漏洞"
updated = "2026-07-18"

