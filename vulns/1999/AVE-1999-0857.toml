[basic]
description = "Disney Go Express Search 存在信息泄露与篡改漏洞，其原理在于该软件会在用户系统上启动一个本地 HTTP 服务，且未对访问进行有效的身份认证与权限控制。远程攻击者无需任何凭证，只需连接到运行在用户系统上的该 HTTP 服务，即可读取并修改用户的搜索信息，从而破坏用户搜索数据的机密性与完整性。攻击条件较低，仅需目标用户运行了存在缺陷的 Disney Go Express Search 且服务端口可被远程访问。该漏洞主要影响运行该软件的个人用户系统，CVSS 评分 2.6，危害等级为低。"
published = "1999-12-12T05:00:00.000"
remediation = "将 Disney Go Express Search 升级至最新官方版本，或通过修改系统注册表永久禁用该软件的 Go Express Search 功能，并在网络层配置访问控制列表限制对相关端口的访问。"
score = 2.6
severity = "LOW"
sources = ["cve"]
title = "Disney Go Express Search 远程未授权访问和信息篡改漏洞"
updated = "2026-06-16T21:49:30.870"

