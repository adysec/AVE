[basic]
description = "Cisco 路由器在开启 NAT（网络地址转换）功能时存在拒绝服务漏洞。当攻击者以 FTP 客户端身份向目标路由器的 Telnet 端口发送特制的 FTP PORT 命令时，受影响的 Cisco 路由器因处理异常而拒绝服务，导致设备无法正常工作并中断网络连通性。该漏洞影响运行 NAT 且 Telnet 服务可达的 Cisco 路由器，攻击者可远程使设备瘫痪，攻击需能向路由器 Telnet 端口发起连接并发送畸形 FTP PORT 命令。"
published = "1999-11-04"
remediation = "升级到修复该问题的 Cisco IOS 版本（如 12.0.7T 及以上，详见 CISCO Bug ID CSCdm47006 对应修复版本），或关闭不必要的 Telnet 服务改用 SSH 管理，并通过访问控制列表限制 Telnet 端口仅允许可信地址访问作为临时缓解。"
score = 5.0
severity = "MEDIUM"
sources = ["avd"]
title = "思科路由器 NAT 拒绝服务漏洞"
updated = "2026-07-17"

