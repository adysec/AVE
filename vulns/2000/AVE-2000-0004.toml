[basic]
description = "ZBServer Pro 1.5 存在远程缓冲区溢出漏洞，未经身份认证的远程攻击者可向目标 Web 服务发送超长 GET 请求，触发栈缓冲区溢出，从而覆盖返回地址并劫持程序执行流，实现远程代码执行。该漏洞影响 ZBServer Pro 1.5 版本，CVSS 评分 10.0，危害等级严重。建议用户升级至最新版本或部署入侵检测规则拦截超长请求。"
published = "1999-12-22T05:00:00.000"
remediation = "ZBServer Pro 1.5 的 GET 请求处理函数存在栈缓冲区溢出漏洞，攻击者发送超长 GET 请求即可远程执行任意代码。厂商 ZBSoft 未对此漏洞发布任何官方补丁，且该产品已停止维护。**推荐方案**：停止使用 ZBServer Pro，迁移至 Apache HTTP Server、Nginx 或 IIS 等仍在安全维护的 Web 服务器。**临时缓解措施**：在边界防火墙上限制仅允许受信任 IP 访问服务器 TCP 80（HTTP）和 21（FTP）端口；同时在前置反向代理层实施请求行长度限制（如 nginx 的 large_client_header_buffers 配置），过滤超长 GET 请求以阻止利用。"
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "ZBServer Pro 1.5 远程缓冲区溢出漏洞"
updated = "2026-06-16T21:50:47.997"

