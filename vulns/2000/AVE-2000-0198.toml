[basic]
description = "Microsoft Internet Explorer 4.0至5.5版本存在安全区域设置延迟漏洞。当浏览器将文档加载到窗口中时，IE不会立即更新该文档的安全区域设置，而是等到文档完全加载后才进行切换。远程攻击者可利用这一时序差异，在文档加载过程中通过构造恶意页面，使JavaScript代码在与目标文档不同的安全区域上下文中执行，从而绕过区域间的安全隔离策略。该漏洞影响IE 4.0、4.0.1、5.0、5.0.1及5.5版本，攻击者仅需诱使用户访问恶意网页即可触发，无需额外权限。建议升级至已修复此漏洞的Internet Explorer版本或迁移至现代浏览器。"
published = "2000-01-07T05:00:00.000"
remediation = '由于Internet Explorer 4.x/5.x已停止支持超过20年，建议立即迁移至Microsoft Edge或其他现代浏览器。若必须在遗留系统中保留IE，应至少升级至IE 11。临时缓解措施：将所有外部站点添加至"受限制的站点"区域并禁用该区域的活动脚本执行；启用增强安全配置以降低默认安全级别；在组策略中禁用跨域访问和脚本插件加载。'
score = 10
severity = "CRITICAL"
sources = ["cve"]
title = "Microsoft Internet Explorer 安全区域设置延迟绕过漏洞"
updated = "2026-06-16T21:50:55.253"

