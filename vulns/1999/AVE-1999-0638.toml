[basic]
description = "MDaemon WorldClient 和 WebConfig 服务存在拒绝服务漏洞，其根源在于服务在处理 HTTP 请求时未对 URL 长度进行有效校验。未经身份认证的远程攻击者只需向目标服务发送一个超长 URL 的请求，即可触发服务异常，导致 WorldClient 和 WebConfig 服务崩溃或无法响应，从而使合法用户无法正常使用邮件 Web 客户端及配置管理功能。该漏洞影响 Alt-N WorldClient Pro 2.0.0.0/2.0.1.0、Standard 2.0.0.0 以及 Deerfield MDaemon 2.8.5/2.8.6 等版本。攻击门槛较低，只需能够访问目标服务的网络端口即可发起攻击，CVSS 评分为 5.0，危害等级为中危。"
published = "1999-11-24T05:00:00.000"
remediation = "立即将 MDaemon 从 2.8.5/2.8.6 及 WorldClient Pro/Standard 2.0.0.0、2.0.1.0 升级到 2.8.7 及以上已修复版本（现为 MDaemon Technologies 产品线，建议直接升级至当前受支持主版本）。若暂无法升级，在管理控制台停用 WorldClient 与 WebConfig 服务，或在防火墙/边界设备上限制对 WorldClient 默认端口（如 3000）及 WebConfig 端口的外部访问，仅允许可信管理网段连接，并启用 URL 长度限制与请求过滤作为临时缓解。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Alt-N WorldClient Pro 2.0 长 URL 拒绝服务漏洞"
updated = "2026-06-16T21:49:10.560"

