[basic]
description = "Redis 开源内存数据库的 hyperloglog 操作中存在越界写入漏洞，经过身份认证的攻击者可向 Redis 服务发送特制的字符串触发堆栈越界写入，进而导致远程代码执行。该漏洞影响 Redis 2.8 至 8.0.3、7.4.5、7.2.10 及 6.2.19 之前的所有版本，CVSS 评分 7.0，危害等级高。建议升级至修复版本或通过 ACL 限制 hyperloglog 命令以缓解风险。"
published = "2025-07-07T16:15:22.830"
remediation = '立即升级 Redis 至 8.0.3 / 7.4.5 / 7.2.10 / 6.2.19 及以上版本。如无法升级，通过 ACL 规则禁用 hyperloglog 相关命令（PFADD、PFCOUNT、PFMERGE）作为临时缓解措施：在 redis.conf 中添加 `acl setuser default -@hyperloglog` 或 `rename-command PFADD ""`。'
score = 7
severity = "HIGH"
sources = ["hwpoc"]
title = "Redis HyperLogLog 远程代码执行漏洞"
updated = "2026-06-17T09:11:20.273"

