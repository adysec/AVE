[basic]
description = "glFTPd 1.17.2 版本存在默认后门账号漏洞。该 FTP 服务器软件在安装时内置了一个名为 glftpd 的默认用户账号，其密码为固定值且用户 UID 被设置为 0（即 root 权限）。攻击者无需任何身份认证，即可通过网络远程连接到目标服务器的 FTP 端口，使用该默认账号密码登录系统，从而获得服务器的 root 级别完全控制权限，可执行任意代码、读取或篡改敏感文件。CVSS 评分 7.5，危害等级高。"
published = "1999-12-23T05:00:00.000"
remediation = "立即升级 glFTPd 至 2.0 及以上版本（最新为 v2.16），旧版 1.17.2 内置了 UID 为 0 的默认管理员账户 glftpd 及已知默认密码。如无法升级，手动删除或禁用 glftpd 用户账号，修改 /etc/glftpd/ftpusers 中所有默认账户的密码，并检查是否存在其他 UID 0 的非授权账号。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "glFTPd 1.17.2 默认后门账户远程代码执行漏洞"
updated = "2026-06-16T21:50:52.390"

