[basic]
description = "Sybergen Secure Desktop 2.1 存在 ICMP 路由通告 (ICMP 类型 9) 验证缺陷，未正确防护伪造的路由器通告报文。远程攻击者可向目标主机发送伪造的 ICMP 路由器通告报文，篡改目标系统的默认路由表，导致流量被劫持或重定向，造成拒绝服务（可用性影响）。该漏洞影响 Sybergen Secure Desktop 2.1 版本，CVSS 评分 5.0 (AV:N/AC:L/Au:N/C:N/I:N/A:P)，攻击向量为网络，攻击复杂度低，无需认证，仅影响可用性。攻击者只需发送伪造的 ICMP Type 9 数据包即可篡改目标主机默认路由，实现流量劫持或拒绝服务攻击。Sybergen 已停止对该产品的支持，用户应升级至支持的安全产品或配置防火墙过滤 ICMP Type 9 报文。"
published = "2000-06-30T04:00:00.000"
remediation = "立即更新 Sybergen Secure Desktop 到最新支持版本，并关闭或过滤 ICMP 类型 9 的路由通告功能作为首要措施。如无法更新软件，可在网络设备上部署 STP 协议并配置静态路由以防止路由劫持。如需保留兼容性，可启用 ICMP 通告速率限制并验证所有路由来源的路由器 ID。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Sybergen Secure Desktop 2.1 ICMP 路由通告欺骗漏洞"
updated = "2026-06-16T21:52:00.940"

