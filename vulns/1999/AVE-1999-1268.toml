[basic]
description = "Solaris 2.4 至 7.0 版本内核存在 set-gid 程序核心转储权限检查缺陷，当真实用户 ID 不属于 set-gid 组时，系统仍允许 set-gid 程序生成 core dump 文件。本地攻击者可利用 dmesg 等方式触发 set-gid 程序崩溃，通过控制 core dump 文件名和路径覆盖或创建高权限文件，从而提升至更高权限。该漏洞需要本地访问权限，CVSS 评分 4.6，危害等级中危。"
published = "1996-08-03T04:00:00.000"
remediation = "升级 Solaris 2.4 内核至安装 jumbo patch -35 或更高版本（如 Solaris 2.5 及以上已修复）。如无法立即打补丁，可临时限制普通用户对 set-gid 程序的执行权限，并通过脚本定期清理 /core 等核心转储目录，避免低权限用户利用 core dump 越权覆盖或创建文件。"
score = 4.6
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Sun Microsystems Solaris Coredump 文件写入漏洞"
updated = "2026-06-16T21:50:23.280"

