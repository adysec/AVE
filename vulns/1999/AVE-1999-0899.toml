[basic]
description = '该CVE条目已被官方驳回（REJECT），原描述为"TFTP服务正在运行"。TFTP协议使用UDP 69端口，缺乏认证与加密机制，若未配置适当访问控制，运行中的TFTP服务可能被未经授权的攻击者利用进行文件读写操作，导致敏感信息泄露或任意文件上传。但由于该问题属于安全配置范畴而非代码层面的直接安全漏洞，因此不适用CVE编号体系，更适合归入CCE（通用配置枚举）管理。建议在非必要环境中禁用TFTP服务或限制访问来源。'
published = "1999-01-01T05:00:00.000"
remediation = "若业务不需要 TFTP 服务，建议在系统中停止并禁用 tftpd/tftp-hpa 服务（如 `systemctl disable tftp` 或移除 xinetd 配置）。如需使用，通过 iptables/firewalld 限制源 IP 访问 UDP 端口 69，仅允许受信任的管理网段连接，并考虑迁移至 SFTP/SCP 等加密文件传输协议。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "TFTP 服务开放导致信息泄露风险"
updated = "2023-11-07T01:54:59.373"

