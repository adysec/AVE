[basic]
description = "Symantec pcAnywhere 8.x 及 9.0 版本存在拒绝服务漏洞，远程攻击者可通过向目标系统上运行的 pcAnywhere 服务发送大量 TCP SYN 探测包（例如使用 nmap 进行端口扫描），导致服务进程崩溃或无法响应正常连接请求。该漏洞影响 pcAnywhere 8.0.1、8.0.2、9.0、9.2 等多个版本，攻击者无需认证即可远程触发，无需用户交互，危害等级中等。"
published = "2000-04-25T04:00:00.000"
remediation = "升级 pcAnywhere 至 10.0 及以上版本，该漏洞已在后续版本修复。若无法升级，在网络层（防火墙/路由器 ACL）限制对 pcAnywhere 端口的 TCP SYN 扫描来源 IP，仅允许受信任地址访问。如 pcAnywhere 不再使用，建议停用该软件以避免暴露。对于仍无法修补的环境，可部署 IPS/IDS 规则检测并阻断大量 SYN 扫描流量。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Symantec pcAnywhere 端口扫描拒绝服务漏洞"
updated = "2026-06-16T21:51:28.727"

