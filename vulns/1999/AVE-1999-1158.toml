[basic]
description = "Roxen Web Server 1.3.11 及更早版本中的 htmlparse.pike 组件存在递归解析漏洞，与 RXML 标记语言中 referer 标签的处理有关。远程攻击者无需认证，可通过向受影响服务器发送特制的 HTTP 请求触发递归解析，导致服务资源耗尽或异常，造成拒绝服务。该漏洞利用条件简单，攻击者可借此影响服务器可用性。"
published = "1999-10-07"
remediation = "升级到已修复该递归解析问题的 Roxen Web Server 新版本；若暂无法升级，可在服务器配置中禁用或限制 RXML 解析器对 referer 标签的处理，避免攻击者通过特制请求触发递归解析，并监控异常请求以缓解拒绝服务风险。"
score = 5.0
severity = "MEDIUM"
sources = ["cve"]
title = "Roxen Web Server htmlparse.pike 递归解析漏洞"
updated = "2026-06-16"

