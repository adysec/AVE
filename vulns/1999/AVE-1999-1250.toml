[basic]
description = "SCO OpenServer 系统中的 mscreen 程序存在本地栈缓冲区溢出漏洞。该程序在解析用户主目录下 .mscreenrc 配置文件时，未对终端类型环境变量（TERM）的长度进行边界校验，直接将其拷贝至固定大小的栈缓冲区中。本地已登录的普通用户可通过构造超长的 TERM 终端条目写入该配置文件，触发缓冲区溢出，从而覆盖返回地址并执行恶意代码，最终提升至 root 权限。该漏洞影响 SCO OpenServer 5.0.5 等受影响版本，利用条件为攻击者需具备本地用户访问权限，属于本地提权类漏洞。"
published = "1998-10-06T04:00:00.000"
remediation = "应用 SCO 针对 OpenServer 5.0.5 发布的安全补丁，修复 mscreen 程序的缓冲区溢出缺陷，防止本地用户通过超长 TERM 环境变量获取 root 权限。如暂无法安装补丁，可将非 root 用户的 mscreen 执行权限移除（chmod 750 /usr/bin/mscreen），或限制用户对 $HOME/.mscreenrc 文件的写权限，以阻止恶意 TERM 条目注入；同时审计系统日志中异常的特权提升行为。"
score = 7.2
severity = "HIGH"
sources = ["exploitdb"]
title = "SCO OpenServer mscreen 本地缓冲区溢出漏洞"
updated = "2026-06-16T21:49:54.020"

