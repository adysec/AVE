[basic]
description = "Internet Explorer 4.01 SP1 及更早版本中的 JScript 脚本引擎的 Window.External 函数存在缓冲区溢出漏洞。远程攻击者可通过构造特制恶意网页，诱使目标用户使用受影响浏览器访问该页面，触发缓冲区溢出，从而在用户系统上执行任意命令。该漏洞攻击条件低，无需用户交互以外的额外认证，影响范围覆盖早期 Internet Explorer 用户，危害较大。"
published = "1999-12-31T05:00:00.000"
remediation = "升级到 Internet Explorer 5.0 或更高版本，该漏洞在 IE 5.0 中已修复。对于仍使用 IE 4.x 的系统，建议升级至 IE 5.5 SP2 或直接迁移到现代浏览器（如 Edge/Chrome），同时禁用 Active Scripting 作为临时缓解措施。"
score = 5.1
severity = "MEDIUM"
sources = ["avd"]
title = "Microsoft Internet Explorer JScript 脚本引擎缓冲区溢出远程代码执行漏洞"
updated = "2026-06-16T21:49:42.420"

