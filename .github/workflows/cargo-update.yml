name: Daily Cargo Update & Build

on:
  schedule:
    - cron: "0 0 * * *"  # 每天 UTC 00:00
  workflow_dispatch:       # 也支持手动触发

permissions:
  contents: write

jobs:
  update-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            generate-vuln-data-rust/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('generate-vuln-data-rust/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Cargo update
        run: |
          cargo update

      - name: Cargo build
        run: |
          cargo build --release

      - name: Copy binary
        run: |
          mkdir bin
          cp target/release/generate-ave-pages bin/generate-ave-pages
          chmod +x bin/generate-ave-pages
          date -u "+%Y-%m-%d %H:%M UTC" > date.txt

      - name: Commit & Push
        run: |
          git config user.name "AdySec"
          git config user.email "admin@adysec.com"
          git add *
          git commit -m "chore: daily cargo update & rebuild binary" || echo "no changes to commit"
          git push
