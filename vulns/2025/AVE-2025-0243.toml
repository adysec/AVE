[basic]
description = "用友畅捷通T+的KeyInfoList.aspx接口存在SQL注入漏洞，攻击者通过构造特制的preload参数注入恶意SQL语句，利用sp_oacreate存储过程创建WScript.Shell对象执行系统命令，进而实现远程代码执行。该漏洞可导致服务器被完全控制、数据泄露及后续内网渗透，危害严重。攻击者只需网络可达目标系统即可利用，无需任何用户交互或身份认证。"
published = "2025-07-02"
remediation = "立即按畅捷通T系列安全说明升级至厂商在维护的最新T+/T+Cloud版本并安装最新产品补丁；在SQL Server中禁用sp_oacreate、sp_OAMethod等OLE自动化存储过程（业务不需要时）；对KeyInfoList.aspx的preload等入参改为参数化查询并过滤单引号、分号、UNION等注入特征；限制数据库账户权限，禁止公网暴露数据库端口；部署WAF拦截针对/tplus/UFAQD/KeyInfoList.aspx的SQL注入请求。"
score = 9.8
severity = "CRITICAL"
sources = ["hwpoc"]
title = "用友畅捷通T+ KeyInfoList.aspx SQL注入漏洞"
updated = "2025-07-02"

