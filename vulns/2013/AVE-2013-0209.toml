[basic]
description = "Microsoft Internet Explorer 6至10版本中存在释放后使用（Use-After-Free）漏洞。当IE访问已删除的CSS样式表对象时，由于对象引用未正确清理，攻击者可通过构造恶意网页诱导用户访问，触发对已释放内存的访问，进而实现远程代码执行。该漏洞在CanSecWest 2013的Pwn2Own大赛中被VUPEN团队公开演示，影响范围广泛。攻击者成功利用后可获得与当前用户相同的系统权限，完全控制受影响系统。Microsoft已在安全公告MS13-009中修复此漏洞。"
published = "2013-03-11T10:55:01.070"
remediation = "立即安装 Microsoft 安全公告 MS13-009 提供的累积安全更新 KB2792100，该更新通过修改 Internet Explorer 处理内存中对象的方式修复了此释放后使用漏洞。受影响系统包括 Windows XP/Vista/7/8 及 Server 2003/2008/2008 R2/2012 上的 IE6 至 IE10。可通过 Windows Update 自动获取更新，或从 Microsoft 下载中心手动下载安装。对于无法立即打补丁的环境，建议升级到更高版本 IE 或使用 Edge 浏览器替代，并在服务器上启用增强安全配置 (ESC) 以降低风险。"
score = 8.8
severity = "HIGH"
sources = ["kev"]
title = "Microsoft Internet Explorer 释放后使用远程代码执行漏洞"
updated = "2026-06-16T23:53:36.980"

