[basic]
description = 'Microsoft Zero Administration Kit (ZAK) 1.0 的 Appstation 模式存在安全策略绕过漏洞。本地用户可通过 Office 97 应用程序（如 Word）启动资源管理器，将恶意软件安装至 TEMP 目录，再将其重命名为允许运行的程序名（如 Winword.exe），从而绕过"仅允许运行指定应用程序"策略限制，实现未授权软件执行。该漏洞影响 ZAK 1.0 及 Office97 环境，CVSS 评分 4.6，危害等级中危。'
published = "2005-01-07T05:00:00.000"
remediation = "升级到 Windows 2000 及以上版本，使用组策略或软件限制策略替代 ZAK 进行程序白名单管理。同时将 Office 97 升级至 Office 2000 或更高版本。在升级前，可移除 ZAK Appstation 模式下 Office 应用程序的 Explorer 启动权限作为临时缓解措施。"
score = 4.6
severity = "MEDIUM"
sources = ["epss"]
title = "Microsoft Zero Administration Kit (ZAK) Office97 安全策略绕过漏洞"
updated = "2026-06-16T21:50:25.593"

