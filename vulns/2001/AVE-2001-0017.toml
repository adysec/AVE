[basic]
description = "KTH Kerberos 4 存在任意代理使用漏洞，本地用户可通过设置 krb4_proxy 环境变量指定一个替代代理服务器，从而生成虚假的代理响应，可能导致权限提升。该漏洞影响 KTH Kerberos 4 版本，攻击者需具备本地系统访问权限方可利用，CVSS 评分 7.2，危害等级高。"
published = "2001-02-16T05:00:00.000"
remediation = "KTH Kerberos IV 已停止维护且无安全更新，建议迁移至 MIT Kerberos 或 Heimdal：在 krb5.conf 中设置 allow_krb4=false 禁用 Kerberos 4 兼容模式，移除 krb4_proxy 环境变量支持，并将所有服务升级至 Kerberos 5 协议。临时缓解措施：通过 PAM 或系统安全策略限制不可信本地用户设置 krb4_proxy 变量。"
score = 7.2
severity = "HIGH"
sources = ["exploitdb"]
title = "KTH Kerberos 4 任意代理使用漏洞"
updated = "2026-06-16T21:53:31.810"

