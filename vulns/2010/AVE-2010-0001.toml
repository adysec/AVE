[basic]
description = "Joomla! Bible Study (com_biblestudy) 组件 6.1 版本存在目录遍历漏洞，远程攻击者可通过在 index.php 的 studieslist 操作中向 controller 参数注入 .. (点点) 路径遍历序列，包含并执行服务器上的任意本地文件。该漏洞属于本地文件包含 (LFI) 类型，无需身份认证即可远程利用，CVSS 评分 7.5 (HIGH)，影响使用该组件的所有 Joomla! 站点。攻击者可读取敏感系统文件 (如 /etc/passwd)、配置文件或包含恶意脚本实现代码执行。厂商已停止维护该组件，建议迁移至替代组件或升级至安全版本。"
published = "2010-01-06T22:00:12.450"
remediation = """立即卸载 com_biblestudy 组件（版本 6.1 及以下均受影响）。如业务必须使用，请升级到已修复此目录遍历漏洞的最新版本；若开发者已不再维护，则彻底移除该组件。作为临时缓解措施，可在 Web 服务器或 WAF 层面拦截 URL 中 controller 参数包含 "../" 的请求，或编辑 Joomla 配置文件加入 `$controller = preg_replace('/[^A-Za-z0-9]/', '', $controller);` 进行输入过滤。"""
score = 7.5
severity = "HIGH"
sources = ["nuclei"]
title = "Joomla! com_biblestudy 组件 本地文件包含漏洞"
updated = "2026-06-16T23:15:35.200"

