[basic]
description = "FreeBSD 3.0 至 3.4 版本中自带的系统监控工具 asmon 与 ascpu 存在本地权限提升漏洞。该工具在启动时会读取特定的配置文件，但由于对配置文件内容的处理不当（如未正确校验或信任了用户可控的配置项），本地普通用户可通过精心构造恶意配置文件，使程序以 root 权限执行攻击者指定的操作，从而将自身权限提升至 root。该漏洞影响范围涵盖 FreeBSD 3.0、3.1、3.2、3.3、3.4 等版本。攻击条件为攻击者需先获得目标系统的本地普通用户登录权限，利用方式是通过修改 asmon/ascpu 使用的配置文件触发越权操作完成本地提权。"
published = "2000-02-21T05:00:00.000"
remediation = "建议立即升级 FreeBSD 至 4.0-RELEASE 或更高受支持版本，官方已修复 asmon 和 ascpu 的配置文件权限校验逻辑。如暂无法升级，应执行以下缓解措施：以 root 身份将 /etc/asmon.conf 和 /etc/ascpu.conf 的权限修改为 600（chmod 600 /etc/asmon.conf /etc/ascpu.conf），仅允许 root 用户读写；同时执行 chown root:wheel /etc/asmon.conf /etc/ascpu.conf 确保文件所有者为 root；如业务无必需，可通过 chmod 000 /usr/bin/asmon /usr/bin/ascpu 或从系统中移除这两个二进制文件彻底消除攻击面。"
score = 4.6
severity = "MEDIUM"
sources = ["cve"]
title = "FreeBSD Asmon/Ascpu 本地权限提升漏洞"
updated = "2026-06-16T21:51:07.887"

