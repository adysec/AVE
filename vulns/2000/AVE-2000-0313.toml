[basic]
description = "NetBSD 1.3.3 及部分 Linux 系统自带的 traceroute 工具存在参数解析漏洞，当本地用户向 traceroute 提供超大的 waittime（-w）选项参数时，程序未能正确解析该参数，导致数据包发送时间延迟被设置为零，从而可向目标系统发送大量数据包造成网络泛洪攻击。该漏洞影响 NetBSD 1.3.3 及存在相同缺陷的 Linux 发行版，攻击者需拥有本地用户权限才能利用，无需超级用户身份。CVSS 评分 5.0，危害等级中危。"
published = "2001-03-12T05:00:00.000"
remediation = "建议升级 NetBSD 至 1.4.1 及以上版本（NetBSD-SA1999-004 已修复此问题），或应用 ftp://ftp.NetBSD.ORG/pub/NetBSD/misc/security/advisories/NetBSD-SA1999-004.txt.asc 中的补丁。Linux 用户应更新 traceroute 包至最新版本，或限制本地用户对 traceroute 的 setuid 权限作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "NetBSD 和 Linux traceroute 系统溢出漏洞"
updated = "2026-06-16T21:51:27.480"

