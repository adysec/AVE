[basic]
description = 'YaBB 9.11.2000 的 search.pl CGI 脚本存在目录遍历漏洞，远程攻击者通过在 "catsearch" 表单字段中提交包含 `..`（点点）序列的恶意请求，绕过路径限制读取服务器上的任意文件。该漏洞影响 YaBB 9.11.2000 及可能更早版本，攻击者无需认证即可利用，可能导致敏感信息泄露（如配置文件、密码文件等），CVSS 评分 7.5，危害等级高。'
published = "2001-01-09T05:00:00.000"
remediation = "立即升级至 YaBB SE 1.5.1 或更高版本，该版本已修复 search.pl 目录遍历漏洞。如无法升级，手动修改 search.pl 脚本，对 catsearch 参数进行严格过滤，删除所有 `../` 及空字节等路径跳转字符，并使用 Perl 的 taint 模式（`#!/usr/bin/perl -T`）增强输入安全性。同时在 Web 服务器（Apache）层面配置 mod_rewrite 规则，拦截包含 `..` 的请求作为临时缓解措施。"
score = 7.5
severity = "HIGH"
sources = ["exploitdb"]
title = "YaBB search.pl 目录遍历漏洞"
updated = "2026-06-16T21:53:19.160"

