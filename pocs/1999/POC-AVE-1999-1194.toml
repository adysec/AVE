[info]
author = "ave"
description = "Microsoft Internet Explorer 4.01/5.0 中 Kodak/Wang IE Active Setup (setupctl.dll) ActiveX 控件缓冲区溢出漏洞验证。该控件被错误标记为 Safe for Scripting，远程攻击者可通过构造恶意 HTML 页面实例化控件并传入超长字符串参数触发缓冲区溢出，导致任意代码执行。Exploit-DB 编号 19515"
id = "POC-AVE-1999-1194"
name = "CVE-1999-1575 PoC"
severity = "high"
tags = ["ave-1999-1194"]
vuln_id = [
    "CVE-1999-1575",
    "AVE-1999-1194",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["1999-1575"]
