[basic]
description = "CVE-2000-0089 是 Microsoft Windows 系统中注册表相关组件存在的漏洞，攻击者在已获得本地或远程访问权限的情况下，可利用该漏洞枚举注册表中存储的文件相关信息，从而获取系统配置、安装路径及敏感文件位置等数据。该漏洞主要影响 Windows NT 等系统的注册表访问机制，攻击条件为攻击者需具备一定程度的系统访问能力，利用后可辅助进一步的特权提升或信息收集。建议尽快安装微软发布的安全补丁以消除该风险。"
published = "2000-01-19"
remediation = "安装微软发布的对应安全补丁（如 Windows NT 4.0 SP6a 及后续更新），限制注册表远程访问权限，并通过 ACL 收紧对注册表项的访问策略。"
score = 5.0
severity = "MEDIUM"
sources = ["cve"]
title = "Microsoft Windows 注册表枚举文件信息泄露漏洞"
updated = "2000-01-19"

