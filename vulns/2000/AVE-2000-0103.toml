[basic]
description = "Red Hat Linux 系统中的 su 程序存在日志绕过漏洞。当 su 进程在超时前被强制终止时，系统不会记录失败的密码尝试日志，导致本地攻击者可以利用此缺陷进行暴力破解密码攻击，而不会在系统日志中留下痕迹。该漏洞影响 Red Hat Linux 5.2 i386 及 6.0 版本，攻击者需要拥有本地访问权限，CVSS 评分 7.2，危害等级高。建议升级至修复版本或配置适当的日志审计机制。"
published = "1999-06-09T04:00:00.000"
remediation = "升级至 Red Hat Linux 6.1 及以上版本，该版本已修复 su 程序在超时前被终止时不记录失败密码尝试的缺陷。如无法升级，可配置 syslog 的 authpriv 设施捕获所有认证事件，并部署 auditd 审计框架监控 su 执行行为作为临时缓解措施。"
score = 7.2
severity = "HIGH"
sources = ["exploitdb"]
title = "RedHat Linux su 程序登录失败日志缺失导致密码暴力破解漏洞"
updated = "2026-06-16T21:51:02.260"

