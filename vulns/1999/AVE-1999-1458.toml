[basic]
description = "Kolban Webcam32 4.8.3及更早版本的Web管理功能中存在缓冲区溢出漏洞。远程攻击者可通过向Web管理界面发送超长URL触发缓冲区溢出，导致内存破坏，从而在目标系统上执行任意命令。此漏洞无需身份验证即可远程利用，攻击复杂度低，可完全控制受影响系统。"
published = "1998-09-01"
remediation = "升级至 Kolban Webcam32 4.8.4 或更高版本以修复此漏洞。由于该产品已停止维护多年，建议迁移至仍在安全更新的替代产品，或至少限制 Web 管理界面仅允许受信任内网 IP 访问。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "Kolban Webcam32 Web管理功能缓冲区溢出远程代码执行漏洞"
updated = "2026-06-16"

