[basic]
description = "serialize-javascript npm 包存在跨站脚本（XSS）漏洞，由于该模块未能正确过滤正则表达式等 JavaScript 对象类型输入，攻击者可向序列化数据中注入恶意代码，当浏览器反序列化时触发执行。该漏洞影响使用 serialize-javascript 处理用户数据的 Node.js Web 应用，可能导致敏感信息窃取或会话劫持。攻击者仅需诱导目标访问包含恶意序列化数据的页面即可利用。"
published = "2025-02-10T16:15:37.080"
remediation = '将 npm 包 serialize-javascript 升级至 6.0.2 或更高版本（最新版 v7.0.7），修复提交为 f27d65d3。在 package.json 中将依赖版本锁定为 "^6.0.2" 后执行 npm install 更新。如无法立即升级，在反序列化用户可控数据前使用 DOMPurify 等库对输出进行转义过滤，作为临时缓解措施。'
score = 5.4
severity = "MEDIUM"
sources = ["msrc"]
title = "npm serialize-javascript 跨站脚本(XSS)漏洞"
updated = "2026-07-20T05:16:21.397"

