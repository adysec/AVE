[basic]
description = "Microsoft Windows NT 系统注册表中存在一处与应用程序运行密切相关的关键注册表项（registry key），其访问控制权限配置不当，赋予了普通用户或低权限进程本不应拥有的修改或写入权限。攻击者在已获得本地普通用户身份的前提下，可通过修改该注册表项的内容，影响依赖该键值运行的高权限应用程序或服务的行为，从而实现本地权限提升，将自身权限提升至系统管理员（SYSTEM）级别。该漏洞影响运行 Windows NT 操作系统的主机，利用条件为攻击者需先获取目标系统的本地登录或普通用户访问权限，无需远程网络访问即可完成利用，CVSS 基础评分为 10.0，危害等级为严重。"
published = "1999-01-01T05:00:00.000"
remediation = '立即安装 Microsoft 官方针对该漏洞发布的安全补丁（Windows NT 4.0 Service Pack 4 及以上版本）。如无法立即更新，可手动使用 regedt32 将 HKEY_LOCAL_MACHINE\SYSTEM\CurrentControlSet\Services 等关键注册表项的安全权限重置为仅 Administrators 完全控制、普通用户只读，并移除 Everyone 组的写权限，以缓解本地提权风险。'
score = 10
severity = "CRITICAL"
sources = ["epss"]
