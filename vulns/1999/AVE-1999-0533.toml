[basic]
description = "Solaris kcms_configure 命令存在缓冲区溢出漏洞，本地攻击者可通过向该命令提交特制的参数触发缓冲区溢出，从而覆盖内存数据并获取 root 权限。该漏洞影响 Solaris 2.5.1 版本，无需网络访问即可利用，危害等级高。目前官方已发布补丁修复此漏洞。"
published = "1998-12-01T05:00:00.000"
remediation = "立即安装 Sun 针对 Solaris 2.5.1 发布的 kcms 补丁（Sun 补丁 ID: 105401），或升级到 Solaris 7 及以上受支持版本。如无法立即打补丁，可临时移除 kcms_configure 二进制文件的 setuid root 权限作为缓解措施：chmod 0555 /usr/openwin/bin/kcms_configure。同时限制仅授权用户可访问 kcms 相关组件。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "Sun Solaris kcms 本地缓冲区溢出权限提升漏洞"
updated = "2026-06-16T21:48:08.870"

