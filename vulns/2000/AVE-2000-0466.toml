[basic]
description = "Cobalt RaQ2 和 RaQ3 服务器存在权限设置不当漏洞，通过 FrontPage 上传的文件未正确设置访问权限和所有权，导致远程攻击者可以绕过 cgiwrap 安全机制直接修改服务器上的文件。该漏洞影响 Cobalt RaQ2/RaQ3 系列设备，攻击者无需身份认证即可利用，CVSS 评分 7.5，危害等级高。厂商已发布安全更新修复此问题。"
published = "2000-05-22"
remediation = "手动设置上传目录权限为 755，属主为 cgiwrap 用户，避免使用 FrontPage 默认权限配置。若 RaQ 管理界面有权限修复功能，应执行恢复操作。此漏洞年代久远，厂商已停止支持，建议迁移至现代服务器平台。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "Cobalt Networks RaQ2 与 RaQ3 文件权限安全绕过漏洞"
updated = "2026-06-16"

