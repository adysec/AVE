[basic]
description = "Xylogics Annex 终端服务的 ping CGI 程序存在缓冲区溢出漏洞，远程攻击者可通过向目标系统发送特制的超长查询参数（query parameter）触发该漏洞，导致目标服务崩溃并引发拒绝服务。该漏洞影响 Xylogics Annex 终端服务相关版本，CVSS 评分 5.0，危害等级中等。目前厂商已发布安全更新修复此漏洞。"
published = "1998-07-25T04:00:00.000"
remediation = "Xylogics Annex 终端服务器（后被 Bay Networks 收购）已停产且不再受支持，建议立即将设备升级替换为仍在厂商支持周期内的终端服务器产品。若无法立即替换，可采取以下临时缓解措施：在边界防火墙上限制仅允许可信 IP 访问 Annex 管理接口和 CGI 服务（TCP 23/443 等端口）；在 Apache/Nginx 反向代理层对 ping CGI 的 query 参数长度做限制（不超过 256 字符），拦截超长请求；禁用不必要的 CGI 功能模块；监控并记录异常超长 URL 请求日志以便追溯攻击源。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Xylogics Annex 终端服务 ping CGI 缓冲区溢出拒绝服务漏洞"
