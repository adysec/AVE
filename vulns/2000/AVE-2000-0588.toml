[basic]
description = 'Microsoft IIS 5.0 存在源代码泄露漏洞，远程攻击者可通过向目标 Web 服务器发送带有 "Translate: f" 头部的特制 HTTP GET 请求触发该漏洞。该漏洞允许未授权攻击者直接读取 .ASP 脚本及其他文件的源代码，进而可能泄露数据库连接字符串、业务逻辑等敏感信息。攻击无需身份认证，仅需目标开启 IIS 5.0 Web 服务即可利用。Microsoft 已发布安全公告 MS00-058 修复此问题。'
published = "2000-10-20T04:00:00.000"
remediation = '安装 Microsoft Security Bulletin MS00-058 对应补丁，或升级至 IIS 6.0 及以上版本。如无法升级，可使用 URLScan 工具拦截包含 "Translate:" 头的 HTTP 请求作为临时缓解措施。'
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Microsoft IIS 5.0 源代码泄露漏洞"
updated = "2026-06-16T21:52:27.690"

