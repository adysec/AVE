[basic]
description = "Alt-N MDaemon Server 及 Microsoft Exchange Server 等 NT 平台邮件服务的 SMTP HELO 命令存在缓冲区溢出漏洞。远程攻击者无需认证即可向目标服务器的 25 端口发送超长特制的 HELO 参数，触发缓冲区溢出，导致邮件服务进程崩溃，造成拒绝服务。该漏洞影响 Alt-N MDaemon Server 2.71 SP1、Microsoft Exchange Server 4.0/5.0 等产品，CVSS 评分 7.5，危害等级高。"
published = "1998-01-01T05:00:00.000"
remediation = "Alt-N MDaemon 用户应升级至 2.72 及以上版本；Microsoft Exchange Server 4.0/5.0 用户应升级至 Exchange 5.5 及以上版本；IBM Lotus Domino 用户应安装最新维护版本。若无法升级，应在 SMTP 网关或防火墙上限制 HELO 命令参数长度不超过 255 字节，并配置 SMTP 协议深度检测以拦截超长 HELO 请求。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "Alt-N MDaemon Server SMTP HELO 参数缓冲区溢出漏洞"
updated = "2026-06-16T21:48:04.237"

