[basic]
description = "Infoseek Ultraseek 2.1/3.1 for NT 存在缓冲区溢出漏洞，远程攻击者可通过向目标系统发送超长 GET 请求触发该漏洞，导致任意代码执行。该漏洞影响 Infoseek Ultraseek 2.1 及 3.1 for Windows NT 版本，CVSS 评分 7.5，危害等级高危。无需身份认证即可远程利用，属于典型的基于栈的缓冲区溢出。"
published = "1999-12-15T05:00:00.000"
remediation = "立即升级至 Infoseek Ultraseek 3.1 以上版本（如 4.x/5.x 系列），该漏洞在后续版本中已修复。由于 Infoseek 产品线已停止维护，建议迁移至现代搜索引擎解决方案（如 Elasticsearch、Apache Solr 等）。临时缓解措施可在反向代理或 Web 服务器层面限制 GET 请求长度，并对输入参数进行长度校验。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "Infoseek Ultraseek GET请求缓冲区溢出漏洞"
updated = "2026-06-16T21:49:29.210"

