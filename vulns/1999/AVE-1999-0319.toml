[basic]
description = "Gnumeric 电子表格中的 Guile 插件（基于 GNU Guile 脚本引擎扩展）存在代码执行漏洞。攻击者可通过构造特制的 Gnumeric 工作簿文件，诱骗用户打开后触发插件对恶意脚本的不安全处理，导致任意代码在用户权限下执行。该漏洞影响 Gnumeric 受影响版本，攻击需用户交互，CVSS 评分 4.6，危害等级中危。"
published = "1999-08-05T04:00:00.000"
remediation = "将 Gnumeric 升级至 0.50 或更高版本，该版本已为 Guile 插件添加安全沙箱机制，限制 Scheme 扩展代码的权限范围，防止任意代码执行。如无法升级，可删除或重命名 plugins/guile 目录以禁用 Guile 插件作为临时缓解措施。对于仍在使用的老旧发行版，建议迁移至仍受支持的发行版并安装最新 Gnumeric 版本（如 1.12.x）。"
score = 4.6
severity = "MEDIUM"
sources = ["redhat"]
title = "GNOME Gnumeric Guile 插件代码执行漏洞"
updated = "2026-06-16T21:48:54.830"

