[basic]
description = "Linux 2.2.x 内核的 IP 伪装（IP masquerade）功能存在安全绕过漏洞。远程攻击者可通过修改外部 UDP 数据包的源 IP 地址和端口号，使其与已建立的合法连接的源地址和端口相匹配，从而绕过防火墙规则，将恶意 UDP 数据包路由至内部网络的接口，导致内网服务被未授权访问。该漏洞影响所有使用 Linux 2.2.x 内核且启用了 IP 伪装功能的系统，攻击者无需身份认证即可远程触发。CVSS v2 评分 5.0，危害等级中危，可利用性较高但仅影响机密性。"
published = "2000-03-27T05:00:00.000"
remediation = "将 Linux 内核从 2.2.x 升级至 2.2.16 或更高版本，推荐直接迁移至 2.4.x 系列内核，该版本已对 IP masquerading 模块的 UDP 数据包路由校验逻辑进行了修复。如无法立即升级内核，可通过 iptables 规则限制外部 UDP 数据包的目标端口和来源匹配，仅允许已建立连接（ESTABLISHED 状态）的 UDP 流量通过，使用命令：iptables -A FORWARD -p udp -m state --state ESTABLISHED -j ACCEPT，同时拒绝其他未匹配的 UDP 入站流量。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Linux Linux 内核 IP 伪装 UDP 路由绕过漏洞"
updated = "2026-06-16T21:51:24.380"

