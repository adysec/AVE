[basic]
description = "该漏洞为已被撤销的 CVE 编号，原指 NFS（网络文件系统）服务在目标主机上处于运行状态。NFS 服务默认监听 TCP/UDP 2049 端口，若未配置严格的访问控制策略（如 exports 权限限制、IP 过滤、认证机制），远程未授权攻击者可通过网络探测到该服务，进而可能尝试挂载或访问导出的文件系统，导致敏感文件泄露或进一步渗透。该问题不属于安全漏洞范畴，已被转移至通用配置枚举（CCE）进行管理，CVSS 评分 0.0，不涉及具体的攻击利用链路或需修复的软件缺陷。"
published = "1999-01-01T05:00:00.000"
remediation = "如非业务需要，应在不需要 NFS 共享的服务器上关闭 NFS 服务（systemctl disable nfs-server）；确需使用时，应限制 exports 仅允许特定 IP 段访问并使用 root_squash 选项，同时在防火墙中限制 2049/TCP 端口仅对受信来源开放，推荐启用 NFSv4 及以上版本并禁用 NFSv2/v3"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "NFS 服务未授权访问配置问题"
updated = "2023-11-07T01:54:59.713"

