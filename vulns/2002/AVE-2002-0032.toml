[basic]
description = 'Swatch（Simple Watcher）日志监控工具的抑制（throttle）机制存在逻辑缺陷，当同一类型事件在抑制周期结束后再次出现，或匹配同一 "watchfor" 表达式的多个事件未在抑制周期内连续发生时，抑制模块可能无法正常上报这些事件。远程攻击者可利用此缺陷，通过精心安排攻击事件的时间间隔来绕过日志告警系统的检测，从而隐藏恶意行为不被发现。该漏洞影响 Swatch 日志监控系统的告警完整性，CVSS 评分 5.0，危害等级中危。'
published = "2002-10-04T04:00:00.000"
remediation = "升级到 Swatch 3.0 以上版本或迁移至其继任者 swatchdog（最新版 3.2.3），该版本已修复 throttle 抑制事件报告的缺陷。如无法升级，可在 Swatch 配置中增大 throttle_period 参数值并避免在同一个 watchfor 表达式中匹配多条规则，同时启用多个独立 throttle 实例分别监控不同事件类型以降低漏报风险。"
score = 5
severity = "MEDIUM"
sources = ["osv"]
title = "Swatch 日志监控工具抑制事件报告漏洞"
updated = "2026-06-16T21:58:20.830"

