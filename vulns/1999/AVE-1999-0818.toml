[basic]
description = "Unix系统中的账户UID重复漏洞是指系统中两个或多个用户账户被分配了相同的用户标识符，这违反了Unix/Linux系统中账户必须拥有唯一UID的基本安全原则。该漏洞导致系统无法准确区分不同用户的身份访问权限，攻击者可通过创建与特权账户相同的UID来冒充授权用户，访问敏感文件、提升权限并绕过访问控制。漏洞影响范围涵盖所有使用Unix系统的服务器和工作站，只要存在账户重复现象即可触发，攻击条件相对简单，只需要对目标进行账户操作即可。此外，由于UID重复导致文件权限混乱，攻击者还能读取或修改属于其他用户的机密数据，造成严重的权限混淆和安全隐患。漏洞的 CVSS 评分高达 10（满分），表明其安全危害极其严重。这种漏洞通常存在于配置混乱、未严格实施账户管理的Unix系统中，补丁措施包括严格执行账户唯一性检查和使用自动化账户管理工具。"
published = "1999-01-01T05:00:00.000"
remediation = "检查 /etc/passwd 中所有用户 UID，确保每个用户拥有唯一 UID。使用 `awk -F: '{print $3}' /etc/passwd | sort | uniq -d` 查找重复 UID，对冲突账户使用 `usermod -u <新UID>` 分配独立 UID，并同步更新该用户所属文件的 UID（`find / -user <旧UID> -exec chown <新UID> {} +`）。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "Unix 操作系统 重复 UID 权限提升漏洞"
updated = "2026-06-16T21:48:38.230"

