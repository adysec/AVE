[basic]
description = "Axent Raptor 防火墙 6.0 版本在处理 IP 数据包时存在拒绝服务漏洞，源于其对畸形零长度 IP 选项数据包缺乏有效校验。未经身份认证的远程攻击者可通过向目标防火墙发送包含畸形零长度 IP 选项的特制数据包触发该漏洞，导致防火墙服务崩溃或停止响应，无法正常执行访问控制策略，从而影响网络边界防护能力。该漏洞影响部署 Axent Raptor 6.0 防火墙的网络环境，攻击者无需事先获取任何凭据即可远程利用，CVSS v2 评分为 5.0（中危）。"
published = "1999-10-21"
remediation = "升级到 Axent Raptor 防火墙修复版本（6.0 之后发布的补丁版本），或联系 Symantec（Axent 已被收购）获取安全更新；在网络边界部署上游过滤规则丢弃包含非法零长度 IP 选项的异常数据包，限制对防火墙管理接口的暴露面。"
score = 5.0
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Axent Raptor 防火墙 畸形零长度 IP 选项拒绝服务漏洞"
updated = "2026-06-16"

