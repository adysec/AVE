[basic]
description = "Joomla! 的 ccNewsletter 组件（com_ccnewsletter）1.0.5 版本中存在目录遍历漏洞。远程攻击者可通过向 index.php 发送特制请求，在 controller 参数中使用 ../ 路径回溯序列绕过目录限制，读取服务器上的任意文件。该漏洞影响使用该组件的 Joomla! 网站，攻击者无需身份验证即可远程利用，可能导致数据库配置等敏感信息泄露。CVSS 评分 5.8，危害等级中危。"
published = "2010-02-02T17:30:00.407"
remediation = "厂商已于 2010 年发布 ccNewsletter 1.0.6 安全更新修复此漏洞，建议立即将组件升级至 1.0.6 或更高版本；如无法升级，应卸载或禁用该组件，同时通过 .htaccess 规则过滤 controller 参数中的 `..` 目录遍历序列作为临时缓解措施。"
score = 5.8
severity = "MEDIUM"
sources = ["nuclei"]
title = "Joomla! ccNewsletter 组件本地文件包含漏洞"
updated = "2026-06-16T23:16:14.110"

