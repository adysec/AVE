[basic]
description = "Windows NT 4.0 的客户端服务器运行时子系统（CSRSS）存在工作线程耗尽漏洞，当所有工作线程均处于等待用户输入状态时，系统无法处理新的请求，导致拒绝服务。远程攻击者可通过发送大量特定请求耗尽 CSRSS 工作线程池，使目标系统服务中断。该漏洞影响 Windows NT 4.0 系统，攻击者无需认证即可触发，危害等级高危。"
published = "1999-06-23T04:00:00.000"
remediation = "升级到 Windows NT 4.0 Service Pack 6a 或更高版本，该补丁通过限制 CSRSS 工作线程的并发请求数量来防止线程池耗尽。由于 Windows NT 4.0 已停止支持，建议升级到受支持的 Windows Server 版本（如 Windows Server 2019/2022）以获得持续安全更新。"
score = 7.1
severity = "HIGH"
sources = ["epss"]
title = "Microsoft Windows NT 4.0 CSRSS 工作线程耗尽拒绝服务漏洞"
updated = "2026-06-16T21:48:55.320"

