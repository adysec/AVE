[basic]
description = "RSA ACE/Server 4.1 及更早版本存在认证请求端口 UDP 数据包洪水拒绝服务漏洞。远程未经身份验证的攻击者可向服务器的认证请求端口发送大量 UDP 数据包，导致服务器资源耗尽并崩溃，造成拒绝服务。该漏洞影响 RSA ACE/Server 4.1 及之前版本，CVSS 评分 5.0（中等），攻击向量为网络，攻击复杂度低，无需认证，仅影响可用性。攻击者只需向目标服务器的认证 UDP 端口发送大量伪造数据包即可触发拒绝服务，导致合法用户无法进行身份认证。RSA 已发布补丁修复此漏洞，建议升级到 4.1 以上版本。"
published = "2000-06-08T04:00:00.000"
remediation = "建议立即升级至 RSA ACE Server 4.2 或更高版本（即 RSA Authentication Manager），或部署 RSA Authentication Manager 8.x 及以上版本。若暂时无法升级，请在边界防火墙配置 UDP 认证端口（默认 UDP 5500）的速率限制，限制单 IP 每秒请求数；同时在边界防火墙/防 DDoS 设备启用 UDP Flood 防护策略，限制单源 IP 并发连接数与包速率，作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "RSA ACE/Server UDP 数据包洪水拒绝服务漏洞"
updated = "2026-06-16T21:51:54.970"

