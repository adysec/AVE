[basic]
description = "用友NC系统存在任意文件读取漏洞，未经身份认证的远程攻击者可通过发送特制请求，利用相关接口对用户传入的文件名参数过滤不严，结合Java反序列化机制实施路径遍历攻击，读取服务器上任意文件，包括应用配置文件、数据库连接密码、系统敏感文件等敏感信息。该漏洞影响用友NC6.x及NC Cloud系列版本，攻击无需认证即可远程触发，危害较大。用友官方已发布安全公告，建议用户安装官方补丁并添加JVM参数 -Djdk.serialFilter=!* 禁用危险类的反序列化。"
published = "nday"
remediation = "立即联系用友官方获取 NC 系统最新安全补丁进行安装；同时在 JVM 启动参数中添加 -Djdk.serialFilter=!* 以禁用危险的反序列化操作，防止攻击者通过反序列化链读取任意文件。如无法立即修复，建议在 Web 应用防火墙（WAF）层面配置规则拦截对 /nc.bs.framework.comn.serv.CommonServletDispatcher 路径的异常请求，并限制 /NCFindWeb 等相关接口的外网访问权限。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "用友NC 任意文件读取漏洞"
updated = "nday"

