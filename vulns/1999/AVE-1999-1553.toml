[basic]
description = "Digital OpenVMS 7.1 及更早版本中的 loginout 组件存在身份验证绕过漏洞。当启用外部认证机制时，loginout 未能正确验证用户身份，远程攻击者无需任何认证即可通过网络访问目标系统，获得未授权的登录权限，进而导致机密性、完整性和可用性受到部分损害。该漏洞攻击复杂度低，影响范围涵盖 OpenVMS 7.1 及之前版本。"
published = "1998-07-16T04:00:00.000"
remediation = "立即安装 Digital Equipment Corporation (DEC) 提供的 OpenVMS V7.1-1H1 及以上 ECO 补丁包，或升级至 VSI OpenVMS 当前受支持版本。在无法打补丁时，临时缓解措施为在 SYSGEN 或 SYSMAN 中禁用外部认证（SET LOGINOUT/EXTERNAL_AUTHENTICATION=DISABLE），并在防火墙和路由器层面限制对 OpenVMS 登录服务的网络访问。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "Digital OpenVMS loginout 未授权访问漏洞"
updated = "2026-06-16T21:50:42.860"

