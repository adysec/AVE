[basic]
description = "SCO UnixWare 7.0/7.0.1/7.1 系统中的 Xsco 命令存在缓冲区溢出漏洞，本地攻击者可通过向 Xsco 程序传递超长参数触发缓冲区溢出，导致攻击者能够以提升的权限执行任意代码。该漏洞影响 SCO UnixWare 7.0 至 7.1 版本，CVSS 评分 7.2，危害等级高。成功利用此漏洞的攻击者可获得目标系统的完全控制权。"
published = "1999-11-01T05:00:00.000"
remediation = "立即从 SCO 官方获取并安装 UnixWare 7.1 的相应安全补丁（如 rsco 系列补丁集），将系统升级至已修复的维护版本；如暂无法打补丁，应限制普通用户对 /usr/bin/X11/Xsco 的执行权限（chmod 750 并交由 root 组管理），同时通过 /etc/security/tcp 或登录控制减少可信本地用户数量，避免低权限用户借助超长参数触发 root 提权。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "SCO UnixWare Xsco 缓冲区溢出漏洞"
updated = "2026-06-16T21:49:08.813"

