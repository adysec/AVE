[info]
author = "AVE"
description = "检测目标是否为 Solaris 系统，通过检查 /etc/passwd 确认 Unix 环境，getcwd() 缓冲区溢出漏洞存在条件"
id = "POC-AVE-2000-0040"
name = "CVE-2000-0048 PoC"
severity = "high"
tags = ["cve-2000-0048"]
vuln_id = [
    "CVE-2000-0048",
    "AVE-2000-0040",
]

[poc]
logic = "any"

[[poc.requests]]
path = "/etc/passwd"
protocol = "file"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["root:"]
