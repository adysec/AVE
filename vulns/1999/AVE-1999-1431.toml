[basic]
description = "Rainbow Six 多人游戏模式存在缓冲区溢出漏洞，远程攻击者可通过向游戏服务器发送超长昵称（nick）命令触发该漏洞，导致目标服务崩溃造成拒绝服务，在特定条件下可能实现任意代码执行。该漏洞影响早期版本的 Rainbow Six 游戏，攻击者无需任何身份认证即可通过网络远程利用，危害等级中等。"
published = "1997-10-24T04:00:00.000"
remediation = "Rainbow Six 游戏已于多年前停止官方支持，不存在补丁版本。建议立即停用 Rainbow Six Multiplayer 的在线多人对战功能，并将游戏切换为单人离线模式运行。如运营方确需保留多人服务，应在防火墙或网关层对游戏服务器端口（默认 7777-7787 UDP）实施访问控制，仅允许可信 IP 段连接，并在服务器端严格限制玩家昵称（nick）字段长度为 15 个字符以内以阻断溢出触发条件，同时升级至现代平台上的 Tom Clancy's Rainbow Six Siege 作为安全替代方案。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Ubisoft Rainbow Six Multiplayer 缓冲区溢出远程代码执行漏洞"
updated = "2026-06-16T21:50:03.690"

