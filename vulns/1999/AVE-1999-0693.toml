[basic]
description = "Cisco 设备上的发现协议（CDP）存在信息泄露漏洞，远程攻击者可通过向目标设备的 1999 端口发送 SYN 数据包来识别 Cisco 设备的存在及类型。该漏洞允许攻击者获取设备信息，为进一步攻击提供侦察基础，影响大量 Cisco 路由器、交换机等网络设备。攻击无需认证，仅需网络可达即可实施，危害等级中等。"
published = "1999-01-01T05:00:00.000"
remediation = "在不需要 Cisco Discovery Protocol (CDP) 的接口上执行 `no cdp enable` 命令禁用 CDP，或在全局模式下执行 `no cdp run` 完全关闭 CDP 服务。在网络边界防火墙或 ACL 中过滤目标端口 1999 的入站 SYN 包，阻止外部扫描识别设备型号。升级到较新版本的 Cisco IOS 以获取 CDP 安全增强特性。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Cisco CDP 设备信息泄露漏洞"
updated = "2026-06-16T21:48:25.710"

