[basic]
description = "Man and Mice DNS PRO 5.7 存在连接处理拒绝服务漏洞，远程攻击者无需身份认证即可通过向目标系统发送大量并发连接请求触发该漏洞，导致 DNS PRO 服务资源耗尽、响应停滞甚至崩溃。该漏洞影响 Man and Mice DNS PRO 5.7 版本，CVSS 评分 5.0，危害等级中危。建议用户升级至最新版本或限制并发连接数以缓解风险。"
published = "1999-12-20T05:00:00.000"
remediation = "升级 Man and Mice DNS PRO 至 5.8 或更高版本，该版本已修复大量连接导致的拒绝服务问题。如无法升级，可在防火墙上限制对 DNS 服务的并发连接数（如每源 IP 不超过 100 个并发），并配置入侵检测规则拦截异常高频连接请求。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Man and Mice DNS PRO 5.7 远程拒绝服务漏洞"
updated = "2026-06-16T21:50:50.247"

