[basic]
description = "Axigen Free Mail Server 的 View Log Files 组件存在目录遍历漏洞。远程攻击者可通过向 source/loggin/page_log_dwn_file.hsp 发送包含 ..（点点）序列的恶意 fileName 参数来下载任意文件，或通过向默认 URI 发送包含 .. 序列的 fileName 参数进行编辑或删除操作，从而实现任意文件读取或删除。该漏洞源于对用户输入的 fileName 参数缺乏充分的路径过滤，攻击者无需身份认证即可利用，影响 Axigen Free Mail Server 相关版本，CVSS 评分 6.4，危害等级中危。"
published = "2012-10-31T19:55:00.983"
remediation = '升级 Axigen Mail Server 至 7.2.0 及以上版本（该版本已修复日志文件组件中的路径遍历漏洞）。如无法升级，在 Web 管理控制台中将管理端口（默认 9000）绑定到内网 IP，并通过防火墙限制仅允许受信管理 IP 访问该端口，同时在 Web 服务器或反向代理层添加 URL 过滤规则，拦截包含 `..` 或 `..\` 的 fileName 参数请求。'
score = 6.4
severity = "MEDIUM"
sources = ["nuclei"]
title = "Axigen Mail Server 目录遍历漏洞"
updated = "2026-06-16T23:45:56.403"

