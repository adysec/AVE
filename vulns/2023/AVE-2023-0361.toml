[basic]
description = "Linux 内核 LAN78XX USB 以太网驱动在处理数据包描述符时存在内存泄漏漏洞。当描述符中指定的数据包长度大于实际套接字缓冲区长度（skb->len）时，驱动会克隆并上报过长的 skb 到网络协议栈，导致内核内存内容泄露。此外，当数据包长度小于以太网 FCS 校验长度时可能触发整数下溢。本地攻击者可通过物理连接恶意 USB 设备或利用特定网络场景触发此漏洞，泄露敏感内核内存信息。该漏洞影响 Linux 内核各发行版本，CVSS 评分 5.5，危害等级中危。"
published = "2025-05-02T16:15:25.870"
remediation = "建议将 Linux 内核升级至 6.1.22 及以上版本，或 6.2.9 及以上版本，或 6.3 及以上版本以包含修复 commit 44b9ed73369f/7f247f5a2c18/83de34967473。如无法立即升级，可禁用受影响 LAN78XX USB 网卡驱动（blacklist lan78xx）作为临时缓解措施。"
score = 5.5
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux 内核 lan78xx USB 以太网驱动信息泄露漏洞"
updated = "2026-06-17T06:44:14.070"

