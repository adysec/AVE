[basic]
description = "X Windows 系统中的认证机制存在可猜测的 magic cookie（魔法令牌）漏洞。X Window System 采用基于共享密钥的访问控制机制，其中 magic cookie 作为客户端连接到 X 服务器的凭据。由于 cookie 生成算法存在弱随机性问题，远程攻击者可通过暴力枚举方式猜测出有效的认证令牌，从而绕过身份认证直接连接到目标系统的 X 服务器端口（默认 TCP 6000+）。成功利用后，攻击者可获取目标用户 X 会话的完全控制权，包括但不限于捕获键盘输入、截取屏幕内容、注入按键事件以及通过 xterm 等终端模拟器执行任意命令。该漏洞影响运行 X Window System 的多款 Unix/Linux 操作系统（包括 Solaris、IRIX 等），无需任何身份认证即可远程利用，CVSS v2.0 评分 10.0，危害等级严重。"
published = "1995-11-01T05:00:00.000"
remediation = "升级 X11 至 R6.3 及以上版本（或 IRIX 6.5 以上），确保使用 /dev/random 等真随机源生成 cookie。启用 SSH X11 Forwarding（ForwardX11Trusted Yes），禁止 X11 直接暴露于网络。在防火墙上限制 TCP 6000 端口的入站访问，仅允许受信任来源连接。使用 xauth 结合 MIT-MAGIC-COOKIE-1 认证机制，避免使用 xhost + 开放访问。"
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "X.Org X Window System 可猜测 Magic Cookie 远程代码执行漏洞"
