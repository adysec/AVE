[info]
author = "ave"
description = "检测Apache HTTP Server mod_usertrack模块是否启用，该模块在1.3.11-1.3.20版本中使用可预测信息（主机IP、系统时间、进程ID）生成会话ID，可能导致会话劫持。通过检查HTTP响应头中的Set-Cookie字段是否包含Apache=来确认模块启用状态。"
id = "POC-AVE-2001-0123"
name = "Apache HTTP Server mod_usertrack Predictable Session ID PoC"
severity = "low"
tags = ["ave-2001-0123"]
vuln_id = [
    "CVE-2001-1534",
    "AVE-2001-0123",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "header"
type = "word"
words = ["Apache="]
