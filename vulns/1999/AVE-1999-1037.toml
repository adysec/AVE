[basic]
description = "Windows NT SP2 附带的 Passfilt.dll 密码过滤器存在设计缺陷，无法有效阻止用户设置包含用户名的密码。攻击者可利用该漏洞，通过结合已知用户名进行针对性密码猜测攻击，大幅降低暴力破解难度，可能导致未授权访问或权限提升。该漏洞影响 Windows NT SP2 系统，需用户交互触发。"
published = "1999-12-31T05:00:00.000"
remediation = "Windows NT 已停止支持，建议升级至 Windows Server 2019/2022 或更高版本。若无法升级，在 Windows NT 中可通过「域安全策略」→「密码策略」启用「密码必须符合复杂性要求」，并禁用允许密码包含用户名的策略，同时设置密码长度最小值≥8 位。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "Microsoft Windows NT SP2 密码安全筛选策略漏洞"
updated = "2026-06-16T21:50:10.843"

