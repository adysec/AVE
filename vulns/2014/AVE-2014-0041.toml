[basic]
description = "WordPress 的 DukaPress 插件 2.5.4 之前版本中 php/dp-functions.php 文件的 dp_img_resize 函数存在目录遍历漏洞。远程攻击者可通过向 lib/dp_image.php 发送特制的 src 参数，在其中使用 ../ 路径穿越序列读取服务器上的任意文件，导致敏感信息泄露。该漏洞无需身份认证即可远程利用，攻击复杂度低，影响运行 DukaPress 插件的所有 WordPress 站点。"
published = "2014-11-28T15:59:07.417"
remediation = "立即将 DukaPress 插件升级至 2.5.4 或更高版本，该版本修复了 dp_img_resize 函数中对 src 参数路径遍历的校验。如无法升级，可在 WordPress 网站根目录的 .htaccess 中添加规则阻止对 lib/dp_image.php 的恶意请求，或临时禁用该插件。"
score = 5
severity = "MEDIUM"
sources = ["nuclei"]
title = "WordPress DukaPress 插件目录遍历漏洞"
updated = "2026-06-17T00:17:23.620"

