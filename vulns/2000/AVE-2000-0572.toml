[basic]
description = "UMN Gopherd 2.x 的 Halidate 函数存在缓冲区溢出漏洞，远程攻击者可通过向目标服务发送包含超长 ticket 值的 DES 密钥生成请求（GDESkey）触发该漏洞，导致缓冲区溢出，进而执行任意命令。该漏洞影响 UMN Gopherd 2.x 版本，攻击者无需身份认证即可远程利用，危害严重。"
published = "2000-10-20T04:00:00.000"
remediation = "升级 UMN Gopherd 至 2.1.x 以上版本，该漏洞已在 2.1 中修复。如无法升级，建议立即停止 gopherd 服务并禁用 Gopher 协议，改用 HTTP/HTTPS 替代。若必须运行，在防火墙层面限制对 70 端口的访问来源 IP。"
score = 10
severity = "CRITICAL"
sources = ["cve"]
title = "UMN Gopherd 2.x 缓冲区溢出漏洞"
updated = "2026-06-16T21:52:23.430"

