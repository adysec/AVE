[basic]
description = "NetBSD 1.3.3 及 Linux 系统中 traceroute 工具存在源地址篡改漏洞，本地低权限用户可通过修改数据包源地址实施 IP 欺骗攻击。攻击者利用该漏洞可伪造数据包来源，绕过基于源地址的访问控制机制，影响系统网络通信安全性。攻击前提是拥有本地系统访问权限，通过 traceroute 的参数注入实现源地址伪造，CVSS 评分 5.0，危害等级中等。"
published = "2001-03-12T05:00:00.000"
remediation = "升级 NetBSD 至 1.4 或更高版本，Linux 系统升级内核至 2.2.x 以上版本。如无法升级，限制普通用户执行 traceroute 的权限（chmod 750 /usr/sbin/traceroute 或移除 SUID 位 chmod u-s /usr/sbin/traceroute），仅允许 root 用户使用。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "NetBSD traceroute 本地源地址欺骗漏洞"
updated = "2026-06-16T21:51:27.607"

