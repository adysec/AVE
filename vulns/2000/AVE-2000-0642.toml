[basic]
description = 'PhotoAlbum 0.9.9 的 explorer.php 存在目录遍历漏洞，未经身份认证的远程攻击者可通过构造包含 ".." 序列的请求参数，绕过路径限制读取服务器上任意文件。该漏洞源于程序对用户输入的路径参数未进行有效过滤和规范化处理，导致攻击者可利用相对路径遍历到 Web 根目录之外的敏感文件。影响范围为 PhotoAlbum 0.9.9 版本，CVSS 评分 5.0（AV:N/AC:L/Au:N/C:P/I:N/A:N），属于中危漏洞。攻击条件为：目标系统运行受影响版本的 PhotoAlbum，攻击者可远程访问 explorer.php 接口，无需认证即可发起攻击。利用方式为向 explorer.php 发送包含目录遍历序列（如 ../../etc/passwd）的参数，成功时可泄露系统敏感文件内容，可能导致信息泄露、配置文件读取等后果。'
published = "2000-11-14T05:00:00.000"
remediation = '建议立即停止使用 Nathan Purciful PHP Photo Album 0.9.9 并迁移至现代维护中的相册系统（如 Piwigo、Lychee 或 PhotoPrism）。若必须继续使用，请在 Web 服务器层面配置路径遍历防护：Nginx 添加 `location ~ \.\./ { deny all; }`，Apache 配置 `RewriteRule \.\. - [F]`；PHP 代码层面在 explorer.php 中添加 `basename()` 校验并使用 `realpath()` 验证路径在允许目录内；部署 WAF 规则拦截 `../` 等路径遍历载荷；配置 open_basedir 限制 PHP 脚本访问目录。建议尽快迁移至现代维护中的相册系统以彻底消除风险。'
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Nathan Purciful PhotoAlbum 目录遍历漏洞"
updated = "2026-06-16T21:52:38.740"

