[basic]
description = "KDE kscd 是 KDE 桌面环境中的 CD 播放器程序，该程序在调用用户 SHELL 环境变量中指定的程序时未正确丢弃特权（setuid 权限），导致本地攻击者可通过设置恶意的 SHELL 环境变量来替换要执行的程序，从而以提升后的权限执行任意代码。该漏洞影响 KDE 1.1、1.1.1、1.2 及 2.0 版本，攻击者需要拥有本地系统访问权限，利用难度较低，成功利用后可获得目标系统的完全控制权。"
published = "2000-05-16T04:00:00.000"
remediation = "升级至 KDE 3.0 及以上版本，该家族版本已修复 kscd 未丢弃特权的问题。临时缓解措施可移除 kscd 的 setuid 权限位：chmod u-s /opt/kde/bin/kscd，或直接卸载 kscd 软件包（kdebase-cd）。"
score = 7.2
severity = "HIGH"
sources = ["cve"]
title = "KDE kscd SHELL环境变量权限提升漏洞"
updated = "2026-06-16T21:51:37.347"

