[basic]
description = "Computalynx CProxy 3.3 存在缓冲区溢出漏洞，远程攻击者可通过向代理服务器发送超长 HTTP 请求，触发缓冲区溢出，导致服务进程崩溃，造成拒绝服务。攻击无需认证，通过网络即可远程触发。"
