[basic]
description = "CNC Technology BizDB 1.0 的 bizdb-search.cgi CGI 脚本存在远程命令执行漏洞，远程攻击者可通过向 dbname 参数注入 shell 元字符（如管道符、分号等）触发该漏洞，在目标服务器上以 Web 服务进程权限执行任意系统命令。该漏洞 CVSS 评分 10.0，危害等级严重，攻击无需身份认证，攻击复杂度低，影响 BizDB 1.0 版本。"
published = "2000-04-12T04:00:00.000"
remediation = "立即删除或重命名 bizdb-search.cgi 脚本以消除攻击面；如业务必需该功能，应限制 CGI 脚本所在目录仅允许受信 IP 访问，并在 Web 服务器（如 Apache）层面配置 mod_security 规则过滤分号、管道符等 shell 元字符。考虑将 BizDB 迁移至受支持的替代方案。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "CNC Technology BizDB 1.0 bizdb-search.cgi 远程命令执行漏洞"
updated = "2026-06-16T21:51:24.117"

