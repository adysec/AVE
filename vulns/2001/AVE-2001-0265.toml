[basic]
description = "SAFT（Simple Asynchronous File Transfer）套件中的 sendfiled 服务在发送通知邮件时未能正确降低权限，导致本地攻击者可利用该缺陷以提升的权限执行任意命令。该漏洞影响多种 Linux 系统上包含 SAFT 的 Sendfile 1.x/2.1 版本，攻击者需具备本地访问权限，CVSS 评分 4.6，危害等级中危。"
published = "2001-08-02T04:00:00.000"
remediation = "升级 sendfile 至 2.1-20.2 或更高版本。Debian 2.2 (potato) 用户可通过 apt 更新：`apt-get update && apt-get install sendfile`，或从 `http://security.debian.org/dists/stable/updates/` 下载对应架构的 deb 包手动安装。如无法升级，建议禁用 sendfiled 服务（`/etc/init.d/sendfiled stop` 并移除自启动）作为临时缓解措施。"
score = 4.6
severity = "MEDIUM"
sources = ["exploitdb"]
title = "SAFT Sendfile 本地权限提升漏洞"
updated = "2026-06-16T21:54:39.180"

