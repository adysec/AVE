[basic]
description = 'Netscape Communicator 及 Navigator 4.04 至 4.74 版本存在 Java 小程序权限绕过漏洞（又称 Brown Orifice）。远程攻击者可通过诱使用户访问恶意网页，利用 Java applet 以 "file"、"http"、"https"、"ftp" 等协议建立连接，从而读取目标系统上的任意文件。该漏洞允许攻击者窃取敏感文件内容，CVSS 评分 5.0，危害等级中等，影响广泛使用的旧版 Netscape 浏览器。'
published = "2000-10-20T04:00:00.000"
remediation = "该漏洞影响已停止支持的 Netscape Communicator 4.04-4.74，该产品生命周期已终结，Netscape 官方不再发布安全更新。建议立即卸载 Netscape Communicator 并迁移至 Firefox 或 Chrome 等现代浏览器；在 Java 控制面板中将安全级别设为最高，并禁用浏览器 Java applet 执行权限。如非必要，建议卸载 JRE 运行时环境以彻底消除攻击面。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "网景 Netscape Communicator Java applet 远程文件读取漏洞"
updated = "2026-06-16T21:52:14.713"

