[basic]
description = "ZoneAlarm 个人防火墙存在敏感信息明文传输漏洞。当用户在使用过程中请求查看事件的详细信息时，ZoneAlarm 会将系统配置、网络拓扑等敏感信息以明文形式发送至 Zone Labs 服务器，未经过任何加密保护。攻击者若能够劫持网络流量或实施中间人攻击，即可截获这些明文传输的敏感数据，导致用户网络环境及系统信息泄露。该漏洞影响 ZoneAlarm 早期版本，CVSS 评分 5.0，属于中等危害等级。"
published = "2000-02-24T05:00:00.000"
remediation = '立即升级 ZoneAlarm 至 3.0 及以上版本，该版本已修复明文传输问题。同时，在防火墙规则中阻止 ZoneAlarm 进程对 Zone Labs 服务器（zones.com 域）的出站连接，并关闭"自动获取事件详细信息"功能，改用离线查看本地日志。如无法升级，可在系统 hosts 文件中将 zones.com 相关域名指向 127.0.0.1 以阻断数据外传。'
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Zone Labs ZoneAlarm 敏感信息明文传输漏洞"
updated = "2026-06-16T21:51:15.270"

