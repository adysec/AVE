[basic]
description = "Netopia Timbuktu Pro 远程控制软件 2.0b650 及 5.2.1 版本的认证协议存在安全缺陷，远程攻击者无需身份认证即可通过向目标主机的 407 和 1417 端口发送大量连接请求，耗尽系统资源，导致目标服务拒绝服务。该漏洞影响 Timbuktu Pro 系列远程控制软件，CVSS 评分 5.0，危害等级中等，攻击复杂度低，但仅影响服务可用性，不涉及数据泄露或权限提升。"
published = "2000-02-11T05:00:00.000"
remediation = "升级 Timbuktu Pro 至 5.2.2 或更高版本（该版本修复了认证协议中的拒绝服务漏洞）。如无法升级，在防火墙或主机层面阻止对端口 407 和 1417 的未授权外部访问，仅允许可信 IP 连接。对于已停止支持的旧版本，建议迁移至替代远程控制方案。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Netopia Timbuktu Pro 远程控制认证协议拒绝服务漏洞"
updated = "2026-06-16T21:51:05.240"

