[basic]
description = "Mediahouse Statistics Server 的管理员密码以明文形式存储在 ss.cfg 配置文件中，远程攻击者无需身份认证即可通过直接读取该文件获取管理员密码，进而完全控制服务器系统。该漏洞利用条件简单，攻击者只需知道配置文件路径即可实施攻击，危害等级高，CVSS 评分 7.2。"
published = "1999-09-30"
remediation = "Mediahouse Statistics Server 已停止维护，建议立即停用并迁移至受支持的流量统计系统。若短期内无法替换，应将 ss.cfg 文件权限设置为仅管理员可读写，并通过防火墙限制对该文件及管理端口的访问，防止明文密码被远程读取。"
score = 7.2
severity = "HIGH"
sources = ["cve"]
title = "Mediahouse Statistics Server 管理员密码明文泄露漏洞"
updated = "1999-09-30"

