[basic]
description = "Bajie HTTP JServer 0.78 及 0.80 之前版本存在命令注入漏洞，远程攻击者可通过向不存在的 CGI 程序发送包含 Shell 元字符的特制 HTTP 请求，触发服务器执行任意系统命令。攻击者无需身份认证即可远程利用，可能导致服务器被完全控制。该漏洞 CVSS 评分 7.5，危害等级高。"
published = "2001-05-03T04:00:00.000"
remediation = "升级 Bajie HTTP JServer 至 0.80 或更高版本，该版本已修复 CGI 路径中 shell 元字符的过滤逻辑。临时缓解措施可在 Web 服务器前端（如反向代理或 WAF）配置规则，拦截包含 `|`、`;`、`&`、`$` 等 shell 特殊字符的 HTTP 请求路径。"
score = 7.5
severity = "HIGH"
sources = ["exploitdb"]
title = "Bajie HTTP JServer 远程命令执行漏洞"
updated = "2026-06-16T21:54:04.170"

