[basic]
description = "联想网盘 FileZ 的 `/filez/user/getUserSession` 接口存在身份认证绕过漏洞，攻击者无需有效凭证即可通过构造特定请求直接以任意用户身份登录系统，获取他人网盘文件访问权限。该漏洞源于会话验证逻辑缺陷，未对用户身份进行正确校验，攻击复杂度低，无需用户交互，可导致敏感数据泄露。"
published = "0704"
remediation = "建议立即升级联想网盘 FileZ 至最新版本，该版本已修复 getUserSession 接口未授权访问问题。临时缓解措施：在反向代理或 WAF 层面添加对 /filez/user/getUserSession 路径的访问控制规则，限制仅允许已认证内网 IP 访问，并启用会话签名校验机制防止未授权调用。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "联想网盘FileZ getUserSession接口任意用户登录漏洞"
updated = "0704"

