[basic]
description = "Kerberos 4 与 5 的 krb_rd_req() 函数存在缓冲区溢出漏洞。该函数在处理远程认证请求时未对输入长度做边界校验，导致攻击者可通过向运行 Kerberos 服务的目标主机发送特制的畸形 Kerberos 请求数据包，触发栈缓冲区溢出并覆盖返回地址。受影响产品包括 Cygnus Network Security 4.0、KerbNet 5.0、MIT Kerberos 4/5 及 RedHat 6.2 等启用了 Kerberos 兼容性的系统。未经身份认证的远程攻击者利用此漏洞可成功执行任意代码，进而获取目标系统的 root 权限，实现完全控制。"
published = "2000-05-16T04:00:00.000"
remediation = "升级到 MIT Kerberos 5 1.1.1 及以上修复版本（或 Cygnus 发布的补丁版），RedHat 6.2 用户执行 `up2date krb5` 安装 RHSA-2000:025 安全更新。在无法立即升级时，通过防火墙/ACL 限制 88、749、750 等 Kerberos 端口仅对受信任网段开放，并关闭不必要的 krb4 兼容服务，以缓解远程溢出风险。"
score = 10
severity = "CRITICAL"
sources = ["exploitdb"]
title = '{"_meta":{},"stopReason":"end_turn","usage":{"inputTokens":10913,"outputTokens":34,"totalTokens":10947}}'
updated = "2026-06-16T21:51:36.847"

