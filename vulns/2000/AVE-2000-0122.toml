[basic]
description = "CartIT 在线购物车系统存在敏感信息处理不当漏洞，远程攻击者可通过修改网页表单中的隐藏字段（hidden form fields）来篡改商品价格、数量等关键交易数据，实现低价或免费购买商品。该漏洞源于服务端未对客户端提交的隐藏字段数据进行完整性校验，攻击者只需使用浏览器开发者工具或拦截代理修改表单提交内容即可完成攻击，无需任何身份认证，攻击门槛极低。"
published = "2000-02-01T05:00:00.000"
remediation = "tags.<value>对于 CartIt 购物车应用，核心问题是服务器端未校验隐藏表单字段（如商品价格、数量），建议将所有关键数据（单价、折扣、总价）在服务器端重新计算，不接受客户端提交的数值。同时升级到 CartIt 最新版本或迁移至受支持的购物车系统，并对所有表单提交实施服务器端输入验证与会话完整性检查。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "Cartit CartIt 购物车隐藏表单字段信息篡改漏洞"
updated = "2026-06-16T21:51:04.640"

