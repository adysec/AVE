[basic]
description = "ICMP 路由器发现协议（IRDP）存在设计缺陷，远程攻击者可向目标系统发送伪造的 ICMP 路由器通告报文，修改受影响主机的默认路由表。当运行 Microsoft Windows 98a/98b/98SE 或 Solaris 2.6 的系统启用了 IRDP 时，攻击者无需认证即可将网络流量重定向至恶意主机，进而实施中间人攻击、数据窃听或流量劫持。该漏洞利用门槛低，仅需目标处于同一广播域且 IRDP 处于默认启用状态。"
published = "1999-08-11T04:00:00.000"
remediation = '对于 Windows 98 系统，在注册表 HKEY_LOCAL_MACHINE\System\CurrentControlSet\Services\VxD\DHCP 下将 PerformRouterDiscovery 设为 0 以禁用 IRDP；对于 Solaris 2.6，在 /etc/default/inetinit 中将 IRDP 相关参数禁用或升级至受支持的 Solaris 版本。由于上述系统均已停止支持，建议迁移至受支持的操作系统版本。'
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "Microsoft Windows / Solaris ICMP Router Discovery Protocol 默认路由篡改漏洞"
updated = "2026-06-16T21:49:14.373"

