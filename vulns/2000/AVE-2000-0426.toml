[basic]
description = "PDGSoft 购物车系统中的 redirect.exe 和 changepw.exe 组件存在缓冲区溢出漏洞，远程攻击者可通过向这两个组件发送超长查询字符串（query string）触发缓冲区溢出，导致任意代码执行。该漏洞影响 PDGSoft 购物车早期版本，攻击者无需身份认证即可通过网络远程利用，危害严重。目前厂商已停止维护，建议用户迁移至其他替代方案。"
published = "2000-05-01T04:00:00.000"
remediation = "立即从 PDGSoft 官方渠道（原 security2.html 页面）安装针对 redirect.exe 和 changepw.exe 的缓冲区溢出补丁。由于该产品已停止维护多年，强烈建议迁移至仍在安全更新的替代购物车系统。如无法立即替换，可在 Web 服务器（IIS/Apache）层面通过 URL 重写或访问控制规则，限制对 redirect.exe 和 changepw.exe 的访问，仅允许受信 IP 调用，并在输入参数长度上做严格限制（如截断超过 256 字节的 query string）。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "PDGSoft Shopping Cart redirect.exe/changepw.exe 缓冲区溢出远程代码执行漏洞"
updated = "2026-06-16T21:51:38.337"

