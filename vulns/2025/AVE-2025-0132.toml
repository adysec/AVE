[basic]
description = "美特 CRM 系统的 download-new.jsp 接口存在任意文件读取漏洞，由于未对用户传入的文件路径参数进行有效过滤和限制，远程攻击者无需身份认证即可通过构造特制的路径参数读取服务器上的任意文件，包括配置文件、数据库凭证等敏感信息。该漏洞可能导致系统核心数据泄露，攻击者可利用获取的敏感信息进一步渗透内网，危害较大。"
published = "0712"
remediation = "联系美特软件厂商获取最新安全补丁，及时升级 MetaCRM 至修复版本。在 download-new.jsp 中对文件路径参数做严格白名单校验，仅允许读取指定目录下的文件。部署 WAF 规则拦截包含 `../`、`%2e%2e%2f` 等路径遍历特征的请求。同时以最小权限原则运行 Web 服务，限制应用进程对敏感系统目录的读取权限。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "美特 CRM download-new.jsp 任意文件读取漏洞"
updated = "0712"

