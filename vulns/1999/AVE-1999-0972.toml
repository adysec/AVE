[basic]
description = "Netscape Enterprise Server 3.5.1 及 3.6 版本默认配置存在信息泄露漏洞，远程攻击者无需身份认证即可通过向搜索功能发送特制的 HTML-tocrec-demo1.pat 模式文件请求，读取服务器上 JHTML 文件的源代码。该漏洞源于搜索引擎默认配置不当，导致敏感源码暴露，攻击者可从中获取数据库连接信息、业务逻辑等敏感数据，为后续攻击提供跳板。影响范围包括 Netscape Enterprise Server 3.5.1 及可能的相关版本。"
published = "1999-07-30T04:00:00.000"
remediation = "Netscape Enterprise Server 已停止维护且不再提供安全更新，建议立即迁移至受支持的 Web 服务器（如 Apache HTTP Server 或 Nginx）。如无法迁移，可删除或重命名默认搜索规则文件 HTML-tocrec-demo1.pat 以阻止源码泄露，同时限制对服务器 JHTML 目录的访问权限。长期方案应彻底停用该产品并迁移数据。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Netscape Enterprise Server JHTML 源代码泄露漏洞"
updated = "2026-06-16T21:49:47.070"

