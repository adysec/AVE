[basic]
description = 'F5 BIG-IP 2.1.2 及早期版本的 bigconf.conf 文件处理存在任意文件读取漏洞，远程攻击者可通过在 "file" 参数中指定目标文件路径，利用路径遍历漏洞读取服务器上的任意文件内容。该漏洞影响 F5 BIG-IP 2.1.2 及更早版本，CVSS 评分 5.0（中危），属于路径遍历类漏洞（CWE-22）。攻击者无需身份认证即可远程利用，通过构造包含目录遍历序列（如 ../etc/passwd）的 file 参数值，即可读取服务器敏感文件，导致敏感信息泄露。'
published = "1999-11-08"
remediation = "升级到 F5 BIG-IP 修复版本，并限制管理接口访问权限；临时缓解可在 Web 配置接口中禁用 file 参数功能，或通过访问控制列表限制对 bigconf.conf 相关接口的访问来源。"
score = 5.0
severity = "MEDIUM"
sources = ["cve"]
title = "F5 BIG-IP 任意文件读取漏洞"
updated = "1999-11-08"

