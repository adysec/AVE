[basic]
description = "SCO UnixWare 2.1.x 及 OpenServer 5.05 及更早版本的 xserver 组件存在拒绝服务漏洞。攻击者可通过向受影响系统发送特制请求，利用 xserver 对保留端口管理的缺陷，导致系统无法分配 1024 以下的保留端口号，从而中断 HTTP、FTP、SSH 等依赖特权端口的正常网络服务。该漏洞影响多个 SCO 操作系统版本，CVSS 评分 5.0，危害等级中等。"
published = "2001-03-12T05:00:00.000"
remediation = "安装 SCO 安全公告 SB-99.07b 提供的 xserver 补丁，升级 OpenServer 至 5.05 以上版本或 UnixWare 至 2.1.x 以上修复版本。由于 SCO OpenServer 和 UnixWare 均已停止技术支持（EOL），建议迁移至受支持的 Linux 或 BSD 系统以确保长期安全。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "SCO OpenServer 5.05 xserver 拒绝服务漏洞"
updated = "2026-06-16T21:51:26.633"

