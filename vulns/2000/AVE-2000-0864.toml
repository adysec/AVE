[basic]
description = "Pragma Systems TelnetServer 2000 4.0 版本 rexec 组件存在缓冲区溢出漏洞，远程攻击者可通过向 rexec 端口发送大量空字符（null characters）触发该漏洞，导致目标服务崩溃，造成拒绝服务。该漏洞攻击复杂度低，无需身份认证即可远程利用，影响该版本及可能受影响的衍生版本。"
published = "2000-10-20T04:00:00.000"
remediation = "建议立即升级 Pragma TelnetServer 2000 到官方最新版本（当前支持 Windows Server 2025/2022/2019/2016 及 Windows 11/10/8/7），该漏洞已在后续版本中修复。如无法立即升级，可在防火墙层面阻断对 rexec 服务端口（TCP 512）的外部访问，或在 Windows 服务管理器中禁用 rexec 服务作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Pragma Systems TelnetServer 2000 rexec 缓冲区溢出漏洞"
updated = "2026-06-16T21:52:18.880"

