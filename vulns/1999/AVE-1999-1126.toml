[basic]
description = "GNOME 库 1.0.8 版本中存在本地缓冲区溢出漏洞，当程序（如 nethack）处理 --espeaker 参数时，由于未对用户输入长度进行充分校验，本地攻击者可传入超长参数触发缓冲区溢出，从而获取 root 权限。该漏洞影响 Mandriva Linux Mandrake 6.0 及使用 GNOME Libs 1.0.8 的系统，CVSS 评分 7.2，危害等级高。"
published = "1999-09-23T04:00:00.000"
remediation = "升级 GNOME 库至 1.0.9 及以上版本，该版本已修复 espeaker 参数长度校验问题。如无法升级，可移除 nethack 等受影响程序的 setuid root 权限（chmod u-s /usr/games/nethack），限制本地非授权用户执行提权利用。"
score = 7.2
severity = "HIGH"
sources = ["epss"]
title = "Mandriva Linux GNOME 库本地缓冲区溢出漏洞"
updated = "2026-06-16T21:50:31.527"

