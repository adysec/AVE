[basic]
description = "LPRng 3.6.24 的 use_syslog() 函数中存在格式字符串漏洞，远程攻击者可通过向目标系统发送特制的打印请求触发该漏洞，利用格式字符串写入任意内存地址，从而执行任意命令。该漏洞影响 LPRng 3.6.24 及更早版本，CVSS 评分 10.0，危害等级严重，攻击无需认证即可远程利用。"
published = "2000-12-19T05:00:00.000"
remediation = "立即升级 LPRng 至 3.7.0 或更高版本（最新稳定版为 3.8.B/3.9.0）。各发行版用户请安装对应安全更新：Red Hat 用户应用 RHSA-2000:065，FreeBSD 用户安装 FreeBSD-SA-00:56 补丁，Caldera OpenLinux 用户应用 CSSA-2000-033。如无法升级，可通过 tcp_wrappers 或防火墙限制只有可信主机能访问 LPRng 服务（默认端口 515），作为临时缓解措施。"
score = 10
severity = "CRITICAL"
sources = ["exploitdb"]
title = "LPRng LPRng 格式字符串远程代码执行漏洞"
updated = "2026-06-16T21:52:45.720"

