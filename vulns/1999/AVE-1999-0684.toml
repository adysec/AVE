[basic]
description = 'Microsoft Internet Explorer 5 的 "download behavior" 功能存在安全缺陷，远程攻击者可通过诱骗用户访问恶意网页并触发服务器端重定向，利用该功能读取目标系统上的任意文件内容。该漏洞影响 Internet Explorer 5 版本，攻击者无需身份验证即可在用户浏览器环境中执行任意文件读取，可能导致敏感信息泄露。由于浏览器对下载行为的处理机制存在逻辑缺陷，攻击者可将文件内容嵌入下载响应中，从而绕过同源策略限制访问受限资源。'
published = "1999-09-01T04:00:00.000"
remediation = '安装 Microsoft 安全公告 MS99-040（KB242542）补丁，可通过 Windows Update 或 https://www.microsoft.com/downloads 获取，该补丁彻底修复 IE5 "download behavior" 的越域文件读取漏洞。由于 Internet Explorer 5 已停止支持多年且无后续安全更新，强烈建议立即升级到最新版本 Internet Explorer 或迁移至 Microsoft Edge 等现代受支持的浏览器。临时缓解措施：在 IE5 中禁用 DHTML behaviors 和 ActiveX 控件，并避免访问不受信任的网站。'
score = 5
severity = "MEDIUM"
sources = ["avd"]
