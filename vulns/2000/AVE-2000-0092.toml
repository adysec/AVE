[basic]
description = "Debian 2.1 系统中自带的 apcd 程序存在符号链接漏洞。apcd 在运行过程中会以特权（root）身份创建或写入某些临时文件，但未对文件路径进行充分的安全检查，本地攻击者可在程序写入文件之前，预先将目标路径创建为指向任意系统文件的符号链接。当 apcd 以 root 权限向该路径写入数据时，实际写入的是符号链接所指向的任意文件，从而导致本地攻击者能够篡改或覆盖系统中本无权修改的文件（如关键系统配置文件或敏感数据），可能造成权限提升或拒绝服务。该漏洞的利用条件为：攻击者需拥有目标 Debian 2.1 系统的本地普通用户账户，并能在 apcd 运行期间实施符号链接竞争（symlink race）攻击，无需远程网络访问，影响范围限于运行存在缺陷版本 apcd 的 Debian 2.1 本地主机。"
published = "2000-02-01T05:00:00.000"
remediation = "建议升级到 Debian 10（Buster）或更高版本，这些版本已经修复了此CVE漏洞；如果无法立即更新，可通过修改apcd配置文件，将`allow_symlink_following`设置为`false`来缓解风险，并通过限制用户对apcd程序的访问权限来增强安全性。"
score = 7.2
severity = "HIGH"
sources = ["cve"]
title = "Debian 2.1 apcd 符号链接攻击漏洞"
updated = "2026-06-16T21:51:00.917"

