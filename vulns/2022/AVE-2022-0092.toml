[basic]
description = "Linux 内核蓝牙子系统存在工作队列处理缺陷，当 HCI 命令、事件和数据包处理工作队列被排空（drain）以避免死锁时，延迟工作（超时处理函数）仍会向已排空的工作队列提交命令，导致蓝牙控制器命令超时并触发内核警告。该漏洞源于 CWE-667 不正确的锁处理，攻击者可通过蓝牙通信触发此竞态条件，造成系统拒绝服务（DoS）。影响使用受影响 Linux 内核版本的系统，CVSS 评分 5.5，危害等级中等。"
published = "2025-06-18T11:15:46.907"
remediation = "建议立即将 Linux 内核升级至 5.18.18（5.18.x 分支）、5.19.2（5.19.x 分支）或 6.0 及以上版本。对于无法升级内核的情况，可手工 cherry-pick 以下内核补丁：4bf367fa1fef、3b3825557065、877afadad2dc，这些提交新增 HCI_DRAIN_WQ 标志位，防止工作队列排干期间入队超时任务。无其他有效缓解措施。"
score = 5.5
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux Kernel Bluetooth HCI 工作队列竞争条件漏洞"
updated = "2026-06-17T05:22:53.700"

