[basic]
description = "Linux 内核 2.2.16 之前版本的 capabilities 机制存在权限管理漏洞。本地攻击者可通过设置 capabilities 阻止 setuid 程序正常放弃特权，导致进程以提升后的权限继续运行，从而获取 root 权限或造成拒绝服务。攻击条件为拥有本地 shell 访问权限，无需其他认证。该漏洞影响 Linux 2.2.x 及 2.4.0-test1 内核版本，在 SGI ProPack 1.2/1.3 等发行版中可通过 Sendmail 8.10.1 的 capabilities 利用实现本地权限提升。"
published = "2000-06-09T04:00:00.000"
remediation = "立即升级 Linux 内核至 2.2.16 或更高版本，该版本已修复 capabilities 机制中 setuid 程序无法正确降权的缺陷。如无法升级内核，可移除 sendmail 的 CAP_SETUID/CAP_NET_ADMIN 等 capabilities 权限，或禁用 setuid 位作为临时缓解措施。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "Linux Kernel capabilities 本地权限提升漏洞"
updated = "2026-06-16T21:51:52.870"

