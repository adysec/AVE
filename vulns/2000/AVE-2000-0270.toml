[basic]
description = "IRIX Performance Copilot 默认安装配置存在信息泄露漏洞。远程攻击者无需身份认证即可通过 pmcd 守护进程访问目标系统的敏感信息，包括系统性能数据、运行状态等关键指标。该漏洞影响 SGI IRIX 系统中 Performance Copilot 组件的默认安装版本，攻击者可在网络可达条件下直接利用，无需任何特权。建议用户禁用不必要的 pmcd 服务或配置访问控制列表以限制对 pmcd 的访问。"
published = "2000-04-12T04:00:00.000"
remediation = "立即升级 IRIX 至厂商已修复版本或安装 Performance Copilot 安全补丁。在 /var/pcp/config/pcp/shared/access.conf 中添加 restrict 规则仅允许信任主机访问。如无需使用，执行 chkconfig perfcopilot off 禁用服务。在边界防火墙上阻止外部对 pmcd 端口 4321/TCP 的访问作为临时缓解措施。"
score = 6.4
severity = "MEDIUM"
sources = ["epss"]
title = "SGI IRIX Performance Copilot 远程信息泄露漏洞"
updated = "2026-06-16T21:51:23.630"

