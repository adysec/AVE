[basic]
description = "Adobe ColdFusion 9.0.1 及更早版本的管理控制台存在多处目录遍历漏洞，攻击者可通过向 CFIDE/administrator 下的 settings/mappings.cfm、logging/settings.cfm、datasources/index.cfm、j2eepackaging/editarchive.cfm 以及 enter.cfm 等页面的 locale 参数注入路径遍历序列，绕过访问控制读取服务器上的任意文件，从而获取敏感配置信息或凭据。该漏洞无需认证即可远程利用，已被 CISA 纳入已知被利用漏洞目录。"
published = "2010-08-11"
remediation = "升级 Adobe ColdFusion 至 9.0.2 或更高版本，或按照 Adobe 安全公告 APSB10-18 的指引安装官方补丁。如暂时无法升级，应在 Web 服务器或应用层对 locale 参数进行严格白名单校验，禁止包含 ../ 等路径遍历字符的请求到达管理控制台。"
score = 9.8
severity = "CRITICAL"
sources = ["cve"]
title = "Adobe ColdFusion 管理控制台目录遍历漏洞"
updated = "2026-06-16"

