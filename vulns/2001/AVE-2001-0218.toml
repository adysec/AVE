[basic]
description = 'SSH Secure Shell 3.0.0 在 Unix 系统上对 sshd2 守护进程的密码认证机制存在缺陷，未正确处理短密码字段账户（如使用 "NP" 标记锁定的账户），导致本地用户可绕过认证直接访问这些受限账户。该漏洞影响运行 SSH Secure Shell 3.0.0 的 Unix 系统，攻击者需具备本地系统访问权限，利用短密码字段缺陷即可获取锁定账户的完全访问权限，CVSS 7.2 分（本地访问、低复杂度、无需认证、完全破坏 CIA 三要素），属高危本地提权漏洞。'
published = "2001-08-14T04:00:00.000"
remediation = '立即升级 OpenSSH 到 7.9 或更高版本（例如 8.9 及更高主版本），并确保使用最新的安全补丁支持现代密码格式和安全验证机制。修改 /etc/ssh/sshd_config 启用 "PasswordAuthentication yes"和 "PubkeyAuthentication yes" 并添加 "PermitRootLogin no" 和 "MaxAuthTries 3"。配置禁止空密码并强制使用复杂的密码策略，建议每次安全事件后更换所有用户密码，并立即禁用所有旧版 SSH 服务（特别是原生支持的任何基于 SSH2 3.0 的服务），这些服务无法升级或将在支持结束后关闭。'
score = 7.2
severity = "HIGH"
sources = ["exploitdb"]
title = "SSH Secure Shell 3.0 sshd2 短密码认证绕过漏洞"
updated = "2026-06-16T21:54:31.160"

