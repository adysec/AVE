[basic]
description = 'Ipswitch IMail 5.0 及 Ipswitch WS_FTP Server 1.0.1/1.0.2 存在权限提升漏洞。本地攻击者可通过修改注册表中 "flags" 键值为 1920，从而获取额外系统权限，进而创建、修改或删除邮件账户。该漏洞源于程序对注册表权限控制不当，允许低权限用户篡改关键配置项。影响 Ipswitch IMail 5.0 及 WS_FTP Server 1.0.1/1.0.2 版本，CVSS 评分 4.6，危害等级中危。建议升级至最新版本或限制注册表关键键值的写入权限。'
published = "1999-01-02T05:00:00.000"
remediation = '升级 Ipswitch IMail 至 5.0 以上版本，或升级 WS_FTP Server 至 1.0.2 以上版本。如无法升级，通过注册表编辑器限制非管理员用户对 HKLM\...\Ipswitch 相关注册表项的写入权限，防止恶意修改 flags 键值。'
score = 4.6
severity = "MEDIUM"
sources = ["avd"]
title = "Ipswitch IMail 和 WS_FTP Server 本地权限提升漏洞"
updated = "2026-06-16T21:49:52.153"

