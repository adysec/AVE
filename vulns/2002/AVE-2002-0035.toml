[basic]
description = "Double Precision Incorporated 出品的 Courier MTA 0.38.1 版本存在拒绝服务漏洞。远程攻击者可通过向邮件服务器发送包含极端大值或负值年份字段的恶意邮件，触发服务器进入 CPU 密集的紧密循环，导致 CPU 资源耗尽，服务不可用。该攻击无需认证即可远程执行，影响 Courier MTA 0.38.1 版本。CVSS 评分 5.0，危害等级中危。"
published = "2002-10-04T04:00:00.000"
remediation = "升级 Courier MTA 至 0.46 或更高版本，该版本已修复日期解析函数中对超大/负值年份未做校验导致陷入死循环的问题。也可在网络边界部署邮件过滤设备，拦截含有畸变 Date 头字段的邮件作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["osv"]
title = "Double Precision Courier MTA 邮件消息年份处理拒绝服务漏洞"
updated = "2026-06-16T21:58:22.850"

