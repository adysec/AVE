[basic]
description = "泛微 e-cology 协同办公系统的 LoginOperation.jsp 接口存在远程代码执行（RCE）漏洞。该接口在处理用户登录相关请求时未对用户输入进行充分的安全校验与过滤，攻击者可构造恶意的请求参数，将恶意代码注入并交由后端执行，从而在目标服务器上实现任意命令执行。此漏洞影响使用特定缺陷版本（如 08.08）的相关系统，攻击者无需身份认证即可通过网络远程发起攻击，成功利用后可完全控制服务器，造成数据泄露、系统被控等严重后果。"
published = "2023-08-08"
remediation = "立即升级到泛微 e-cology 9.0 或更高版本，如 9.0 SP2 或 v10.56 及以上。如无法立即升级，可通过WAF或反向代理拦截对 LoginOperation.jsp 的异常 POST 请求，临时禁用或重命名漏洞文件，并限制相关接口的网络访问。"
score = 5.0
severity = "MEDIUM"
sources = ["hwpoc"]
title = "泛微 e-cology LoginOperation.jsp 远程代码执行漏洞"
updated = "2023-08-08"

