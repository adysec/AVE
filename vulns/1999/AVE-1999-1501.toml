[basic]
description = "Debian GNU/Linux 2.0 系统中的 fsp 软件包（版本 2.71-10）在安装过程中会自动添加匿名 FTP 用户，且未向管理员发出任何通知。这一设计缺陷可能导致运行 wu-ftp 等服务的目标服务器在管理员不知情的情况下自动启用匿名 FTP 访问，使得远程攻击者能够通过匿名方式登录服务器，获取未经授权的文件访问权限。攻击者无需认证即可利用该漏洞，CVSS 评分 7.5，危害等级高。"
published = "1998-11-26T05:00:00.000"
remediation = "立即卸载 fsp 软件包 (apt-get remove fsp) 或升级至 2.71-10 以上版本。如仍需使用 fsp，安装后手动检查并删除 /etc/ftpusers 中自动添加的 anonymous 条目，同时确保 wu-ftp 配置中禁用匿名访问 (anonymous 行前加 # 注释)。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "Debian GNU/Linux fsp 软件包匿名FTP访问漏洞"
updated = "2026-06-16T21:50:23.013"

