[basic]
description = "CGI Script Center Account Manager 1.0 LITE/PRO 存在认证绕过漏洞。该软件的管理密码修改功能未对请求来源进行身份验证，远程攻击者无需任何凭证即可直接调用 amadmin.pl 脚本并传入 setpasswd 参数，从而任意更改管理员密码，获取系统管理权限。攻击者只需知道目标 Web 路径即可实施攻击，利用门槛极低，可导致服务器完全受控。"
published = "2000-10-20T04:00:00.000"
remediation = "将 Account Manager 升级到最新版本，或删除 amadmin.pl 脚本中的 setpasswd 参数处理逻辑。如无法升级，在 Web 服务器（Apache/IIS）层面限制对 amadmin.pl 的访问来源 IP，仅允许管理员 IP 访问。也可通过 .htaccess 添加基本认证作为临时缓解。"
score = 7.5
severity = "HIGH"
sources = ["exploitdb"]
title = "CGI Script Center Account Manager LITE/PRO 未授权管理员密码修改漏洞"
updated = "2026-06-16T21:52:16.410"

