[basic]
description = 'Cisco Resource Manager (CRM) 1.1 及更早版本创建文件时使用了不安全的权限设置，导致本地攻击者可读取 swim_swd.log、swim_debug.log、dbi_debug.log 以及名称以 "DPR_" 开头的临时文件，从中获取包含用户名、密码和 SNMP 团体字串在内的敏感配置信息。该漏洞攻击复杂度低，但需要系统本地访问权限，CVSS 评分 2.1，危害等级低。'
published = "1999-12-31T05:00:00.000"
remediation = "将 Cisco Resource Manager 升级至 CiscoWorks Resource Manager Essentials (RME) 后续受支持版本；同时立即对 swim_swd.log、swim_debug.log、dbi_debug.log 及 DPR_* 临时文件设置仅 root 可读权限（chmod 600），并清除日志中明文存储的用户名、密码及 SNMP 团体字串；限制仅授权管理员具有本地系统访问权限。"
score = 2.1
severity = "LOW"
sources = ["cve"]
title = "Cisco Resource Manager 信息泄露漏洞"
updated = "2026-06-16T21:49:46.547"

