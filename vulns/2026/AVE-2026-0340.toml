[basic]
description = "Woodpecker CI 的 gRPC 层存在身份验证绕过漏洞（CWE-290），已认证的攻击者可向 gRPC 元数据中注入伪造的 `agent_id` 值，从而模拟同一服务器上的任意其他代理。服务端虽正确验证了 JWT 令牌，但随后丢弃了已验证的代理身份，转而使用客户端提供的值。该漏洞影响 Woodpecker CI 3.0.0 至 3.14.1 版本，攻击者只需低权限即可实施跨租户代理模拟攻击，可能导致高完整性影响。官方已在 3.14.1 版本中修复。"
published = "2026-06-18T14:17:29.400"
remediation = "立即升级 Woodpecker CI 至 v3.14.1 或更高版本，该版本在 gRPC 层正确验证 agent_id 身份，防止元数据伪造。如无法立即升级，设置环境变量 `WOODPECKER_DISABLE_USER_AGENT_REGISTRATION=true` 禁用组织代理注册，并删除所有现有组织代理，以消除跨租户模拟攻击面。"
score = 7.1
severity = "HIGH"
sources = ["ghsa"]
title = "Woodpecker CI gRPC 跨租户代理身份伪造漏洞"
updated = "2026-06-23T15:44:39.343"

