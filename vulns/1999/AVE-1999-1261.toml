[basic]
description = "Debian suidmanager 0.18 版本中的 suidexec 组件存在命令执行漏洞。当系统安装此版本时，只要存在任意一条 suid root 的 shell 脚本，本地攻击者即可通过调用 /usr/bin/suidexec 指定恶意程序和目标脚本路径，以 root 权限执行任意命令，从而导致本地提权至 root。攻击需具备本地用户权限且系统已安装受影响版本。"
published = "1998-04-28"
remediation = "升级 suidmanager 至 >=0.19 版本或使用 sudo 替代工具管理特权提升。Debian 官方已发布安全公告 DSA-006-1，提供补丁和修复方案。安装最新 Debian 更新包以修复此漏洞。"
score = 7.2
severity = "HIGH"
sources = ["exploitdb"]
title = "Debian suidmanager 0.18 命令执行漏洞"
updated = "2026-06-16"

