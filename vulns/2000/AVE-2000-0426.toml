[basic]
description = "PDGSoft Shopping Cart 的 redirect.exe 和 changepw.exe 组件存在缓冲区溢出漏洞。远程攻击者可通过向这两个可执行文件发送特制的超长查询字符串触发缓冲区溢出，从而在服务器上执行任意命令。攻击者无需身份认证即可利用此漏洞，可能导致服务器被完全控制。"
published = "2000-05-01"
remediation = "由于 PDGSoft 已停止运营且产品不再维护，建议立即从受影响服务器移除 redirect.exe 和 changepw.exe 这两个可执行文件，或通过 Web 服务器访问控制列表限制对这两个文件的访问。如条件允许，建议迁移至其他仍在维护更新的购物车系统。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "PDG Shopping Cart redirect.exe 和 changepw.exe 缓冲区溢出代码执行漏洞"
updated = "2026-06-16"

