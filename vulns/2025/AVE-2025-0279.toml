[basic]
description = "浪擎 DAYS 灾备系统存在任意文件上传漏洞，位于 execp2vbackup 接口。未经身份认证的远程攻击者可通过构造特制的 HTTP 请求，向目标服务器上传恶意文件（如 WebShell），进而获取服务器控制权限，实现远程代码执行。该漏洞影响浪擎 DAYS 灾备系统相关版本，危害严重。"
published = "0703"
remediation = "建议升级浪擎 DAYS 灾备系统至最新安全版本，限制 execp2vbackup 接口的访问来源 IP，仅允许管理网段访问；同时在应用层对上传文件类型和后缀进行白名单校验，禁止上传可执行脚本文件；部署 WAF 规则拦截包含恶意载荷的上传请求。如无法立即升级，可临时在 Nginx 反向代理层禁用该接口的 POST 方法。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "浪擎 DAYS 灾备 execp2vbackup 任意文件上传漏洞"
updated = "0703"

