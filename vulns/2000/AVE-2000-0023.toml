[basic]
description = "Microsoft IIS 在 URL 规范化处理中存在安全绕过漏洞，由于服务器未能正确解析 URL 中的转义字符（Escape Character），远程攻击者可通过向目标 IIS 服务器发送包含特殊转义序列的恶意 HTTP 请求，绕过第三方安全软件或组件的访问限制，从而访问受限资源或执行未授权操作。该漏洞影响 Microsoft Site Server Commerce、Site Server 及 Internet Information Server 等多个产品，CVSS 评分 6.4，危害等级中危。"
published = "1999-12-21T05:00:00.000"
remediation = "建议立即安装 Microsoft 安全公告 MS99-061 对应补丁 (Q246013)，或升级至 Windows 2000 Service Pack 1 及以上版本。同时，在 IIS 管理器中禁用不必要的 URL 重写和第三方 ISAPI 筛选器，限制可执行目录的执行权限，并启用 URLScan 工具过滤转义字符请求作为临时缓解措施。"
score = 6.4
severity = "MEDIUM"
sources = ["epss"]
title = "Microsoft IIS 转义字符解析安全绕过漏洞"
updated = "2026-06-16T21:50:50.710"

