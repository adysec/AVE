[info]
author = "ave"
description = "通过检查 HTTP 响应头 MicrosoftSharePointTeamServices 中的版本号，被动判断 SharePoint Server 是否在 CVE-2026-45659 受影响范围内。低于补丁版本号的构建号被判定为存在漏洞，该检测方式安全无损，无需身份认证。"
id = "POC-AVE-2026-0082"
name = "Microsoft SharePoint 反序列化远程代码执行漏洞 PoC"
severity = "high"
tags = ["ave-2026-0082"]
vuln_id = [
    "CVE-2026-45659",
    "AVE-2026-0082",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "header"
type = "word"
words = ["MicrosoftSharePointTeamServices"]
