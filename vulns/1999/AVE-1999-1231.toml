[basic]
description = "BNBForm 是一款基于 Web 的表单处理 CGI 程序，其 automessage 隐藏表单变量未对用户输入进行充分的路径校验与访问限制。远程攻击者无需身份认证，即可通过构造恶意的 automessage 参数向目标 Web 服务器提交特制请求，绕过文件访问限制，从而读取服务器上的任意文件（如配置文件、源代码或敏感系统文件）。该漏洞影响部署了存在缺陷版本 BNBForm 的 Web 应用，攻击条件仅需网络可达目标服务并能够提交 HTTP 表单请求，利用方式简单，危害严重，CVSS v2 评分达到 10.0。"
published = "1998-12-03"
remediation = "BNBForm 已停止维护且无安全更新，建议立即从服务器移除该 CGI 程序，或替换为其他受支持的表单处理方案。如必须继续使用，应在 automessage 参数处理逻辑中增加路径白名单校验，严格过滤 ../ 等目录遍历序列，限制文件读取范围仅限于程序所在目录，同时在 Web 服务器层面禁用 CGI 执行权限或使用 chroot 环境隔离。"
score = 10.0
severity = "CRITICAL"
sources = [
    "cve",
    "avd",
]
title = "BNBForm 任意文件读取漏洞"
updated = "2026-06-16"

