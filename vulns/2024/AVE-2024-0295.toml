[basic]
description = "致远 OA 的 fileUpload.do 接口存在路径遍历与文件上传绕过漏洞。攻击者可通过构造特制的 HTTP 请求，利用路径穿越绕过身份认证限制，在前台上传恶意文件，最终实现远程代码执行。该漏洞影响致远 OA 全版本，攻击者无需登录即可利用，危害严重。建议升级至官方最新版本或部署 WAF 规则拦截。"
published = "0722"
remediation = "建议立即升级致远 OA 至官方发布的最新安全版本（V8.1SP2及以上），该漏洞在后续版本中已修复文件上传路径校验逻辑。如无法立即升级，可在 Nginx 或 WAF 层面配置规则拦截包含 `../` 路径穿越特征的请求，并限制 `/seeyon/fileUpload.do` 接口仅允许内网 IP 访问，同时禁用 `autoinstall.do` 等非必要接口。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "致远 OA fileUpload.do 前台文件上传绕过漏洞"
updated = "0722"

