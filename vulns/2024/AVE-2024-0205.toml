[basic]
description = "用友U8 CRM import.php 文件上传漏洞存在于 crmtools/tools/import.php 接口，攻击者可通过构造包含 DontCheckLogin=1 和 issubmit=1 参数的 POST 请求绕过登录验证，直接上传恶意脚本文件实现远程代码执行。该漏洞影响用友U8 CRM 相关版本，无需身份认证即可利用，攻击条件仅需目标系统暴露该接口且文件上传目录可执行脚本。利用方式为发送 multipart/form-data 请求上传 Webshell，随后访问上传路径获取服务器权限。"
published = "0724"
remediation = "立即升级用友U8 CRM至官方已修复版本（建议联系用友获取最新安全补丁包并升级到U8 V16.5及以上版本）；在升级前，可在 Web 服务器（如 Nginx/Apache）层面对 /crmtools/tools/import.php 路径配置访问控制，仅允许可信内网 IP 访问，并禁用该文件的 PHP 执行权限；同时删除已上传的非法脚本文件，开启 WAF 拦截含 DontCheckLogin 参数的异常上传请求作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "用户需要我为漏洞 HWPOC-2024-02ab7c5c 生成标题字段 [title]。 已知信息： - 漏洞编号: HWPOC-2024-02ab7c5c - 原标题: 用友U8 CRM import.php文件上传 - 原始描述: 用友 用友U8 CRM import.php文件上传 RCE - POST /crmtools/tools/import.php?DontCheckLogin=1&issubmit=1... 格式要求：中文漏洞标题，格式：「厂商 产品 漏洞类型」。示例：Microsoft Windows TCP/IP 远程代码执行漏洞。使用中文，20-100 字。 从原标题和描述可知： - 厂商：用友 - 产品"
updated = "0724"

