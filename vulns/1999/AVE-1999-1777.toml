[basic]
description = "Admiral Systems EmailClub 1.0.5 及更早版本的 POP3 服务器在处理包含超长 From 头的电子邮件消息时存在缓冲区溢出漏洞，远程攻击者可在未认证情况下向目标服务器发送特制邮件触发该缺陷，从而执行任意代码并完全控制受影响的邮件服务器。该漏洞无需身份认证即可远程利用，CVSS 评分达到最高 10.0，危害等级严重，影响范围涵盖所有运行 EmailClub 1.0.5 及之前版本的邮件服务。"
published = "1999-11-15"
remediation = "厂商早已停止维护且无官方补丁，建议立即停用 Admiral Systems EmailClub POP3 服务并迁移至现代邮件服务器（如 Postfix、Dovecot、Microsoft Exchange 等）。若必须临时保留，请在防火墙封锁 POP3 端口（TCP 110/995），并部署规则拦截异常长度的 From 头以缓解风险。"
score = 10.0
severity = "CRITICAL"
sources = ["exploitdb"]
title = "Admiral Systems EmailClub POP3 服务器 From 头缓冲区溢出远程代码执行漏洞"
updated = "2026-07-18"

