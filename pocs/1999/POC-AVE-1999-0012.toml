[info]
author = "AVE"
description = "检测目标是否运行 Cisco IOS Web Server，该服务存在通过超长 URL 导致路由器重启的拒绝服务漏洞（CVE-1999-0222）"
id = "POC-AVE-1999-0012"
name = "CVE-1999-0222 PoC"
severity = "medium"
tags = ["cve-1999-0222"]
vuln_id = [
    "CVE-1999-0222",
    "AVE-1999-0012",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "header"
type = "word"
words = ["cisco-IOS"]
