[basic]
description = "Gardyn 物联网中心使用的 Azure Blob Storage 容器未配置任何访问认证机制，导致设备日志文件可被公开列举。攻击者无需身份验证即可通过网络远程列出并访问存储容器中的所有设备日志文件，获取设备运行状态、配置信息等敏感数据，属于 CWE-497 敏感系统信息泄露漏洞。"
published = "2026-07-02"
remediation = "将 Gardyn Home Firmware 升级至 master.627 及以上版本，Studio Firmware 升级至 master.627 及以上版本，Cloud API 升级至 2.12.2026 及以上版本；确保设备联网以自动下载固件更新，更新移动应用至最新版本。"
score = 5.3
severity = "MEDIUM"
sources = ["cve"]
title = "Gardyn 物联网中心设备日志存储容器未授权访问漏洞"
updated = "2026-07-06"

