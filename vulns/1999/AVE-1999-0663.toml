[basic]
description = "FreeBSD 系统自带的 seyon 通信终端程序存在缓冲区溢出漏洞。当程序处理 HOME 环境变量、-emulator 命令行参数或 -modems 命令行参数，或通过其图形用户界面（GUI）输入时，未对输入长度进行边界校验，导致特制超长输入可覆盖栈上返回地址。本地攻击者只需在启动 seyon 前设置恶意的 HOME 环境变量，或传入超长的 -emulator/-modems 参数，即可触发溢出并可能执行任意代码或造成程序崩溃。该漏洞影响存在 seyon 组件的 FreeBSD 系统版本，攻击需具备本地用户权限或能影响目标用户启动程序的环境，CVSS 基础评分 4.6，危害等级为中等。"
published = "1999-11-08"
remediation = "建议升级到包含修复的 FreeBSD 版本（FreeBSD 3.3-RELEASE 及之后已修复该 seyon 漏洞）。如无法立即升级，可移除或限制 seyon 程序的 setuid 位（chmod u-s /usr/X11R6/bin/seyon），避免以特权身份运行；同时限制普通用户对 HOME 环境变量及 -emulator/-modems 参数的可控输入，作为临时缓解措施。"
score = 4.6
severity = "MEDIUM"
sources = ["avd"]
title = "FreeBSD seyon 缓冲区溢出漏洞"
updated = "2026-07-17"

