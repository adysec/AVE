[basic]
description = "Perl 5.8.0 及更早版本中使用的 Safe.pm 模块 2.0.7 及更早版本存在安全隔离逃逸漏洞。Safe.pm 提供的安全编译机制（Safe::reval 和 Safe::rdo）在连续调用之间未能正确重置 @_ 变量，本地攻击者可利用重定义的 @_ 变量绕过安全隔离限制，在受限制的编译环境中执行不安全代码，导致权限提升或敏感信息泄露。攻击者需具有本地系统访问权限，攻击复杂度低，无需身份认证即可利用。"
published = "2002-12-11T05:00:00.000"
remediation = "升级 Perl 至 5.8.0-14 及以上版本，或单独升级 Safe.pm 模块至 2.0.8 及以上版本。Debian 系统用户应安装 DSA-208 提供的 perl 5.6.1-8.2 更新包。无法立即升级时，避免在不可信输入上调用 Safe::reval 和 Safe::rdo 函数。"
score = 4.6
severity = "MEDIUM"
sources = ["osv"]
title = "Perl Safe.pm 安全沙箱逃逸漏洞"
updated = "2026-06-16T21:59:06.980"

