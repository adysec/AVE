[basic]
description = "Netscape Communicator 及 Sun JDK/JRE 1.1.x 存在安全漏洞，未受信任的 Java applet 可绕过安全限制创建 ServerSocket 对象，远程攻击者通过诱导用户访问包含恶意 applet 的网页，即可在受害者系统上打开任意 TCP 监听端口，进而建立后门服务（即 Brown Orifice 攻击）。该漏洞影响 Netscape Communicator 4.x 及 Sun JDK/JRE 1.1.x 系列版本，CVSS 评分 7.5，危害等级高。"
published = "2000-10-20T04:00:00.000"
remediation = "升级至 Sun JDK/JRE 1.2 及以上版本，新版本引入了更严格的 Security Manager 机制，可阻止不可信 Applet 创建 ServerSocket。如无法升级，在浏览器中禁用 Java Applet 支持，或通过 Java 控制面板将安全级别设为最高并清空站点例外列表。作为临时缓解措施，可在本地防火墙规则中阻止 Java 进程的入站连接。"
score = 7.5
severity = "HIGH"
sources = ["exploitdb"]
title = "Netscape Communicator Java Applet ServerSocket 远程端口监听漏洞"
updated = "2026-06-16T21:52:19.250"

