[basic]
description = "FreeBSD 3.2 内核在生成崩溃转储（core dump）文件时未能正确处理符号链接，会跟随符号链接路径写入文件，导致本地攻击者可通过创建恶意符号链接将 core dump 写入任意文件，实现权限提升或破坏系统文件。该漏洞影响 FreeBSD 3.2 版本，攻击者需具备本地用户权限，利用难度较低，CVSS 评分 2.1，危害等级低。"
published = "2001-03-12T05:00:00.000"
remediation = "升级至 FreeBSD 4.0 或更高版本，该漏洞已在后续版本中修复。如无法升级，可在 `/etc/sysctl.conf` 中添加 `kern.sugid_coredump=0` 禁用 setuid 程序核心转储，或通过 `chmod 1777 /var/crash` 限制核心转储目录写入权限以降低风险。"
score = 2.1
severity = "LOW"
sources = ["cve"]
title = "FreeBSD Kernel 核心转储符号链接跟随本地任意文件修改漏洞"
updated = "2026-06-16T21:51:35.147"

