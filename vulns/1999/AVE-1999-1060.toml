[basic]
description = "Auto_FTP 0.2 中的 Auto_FTP.pl 脚本以明文形式将用户名和密码存储在 auto_ftp.conf 配置文件中，属于敏感信息未加密存储漏洞。攻击者在获取服务器文件读取权限或通过路径遍历等方式访问该配置文件后，可直接读取其中的明文凭据，进而利用泄露的账号密码登录 FTP 服务，造成数据泄露或进一步渗透。该漏洞影响 Auto_FTP 0.2 版本，CVSS 评分 7.5，危害等级高。"
published = "1999-10-05T04:00:00.000"
remediation = "立即将 auto_ftp.conf 配置文件权限改为 600（仅属主可读写），并迁移至支持加密存储凭据的 FTP 客户端（如 lftp 或 FileZilla）。如需继续使用 Auto_FTP，修改 Auto_FTP.pl 源码，将凭据存储改为读取环境变量或交互式输入，避免明文写盘。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "Auto_FTP Auto_FTP.pl 配置文件明文密码泄露漏洞"
updated = "2026-06-16T21:50:14.443"

