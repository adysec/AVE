[basic]
description = "Faust Informatics Freestyle Chat 4.1 SR2 及更早版本存在拒绝服务漏洞。远程攻击者无需认证即可向目标服务器发送包含 MS-DOS 设备名（如 AUX、CON、NUL 等）的特制 HTTP 请求（例如 GET /aux HTTP/1.0），触发服务器在处理这些保留设备名时发生异常，导致服务崩溃或无法响应正常请求。该漏洞攻击条件简单，仅需网络可达即可实施，影响服务可用性。"
published = "2001-08-14T04:00:00.000"
remediation = "升级 Faust Informatics Freestyle Chat 至 4.1 SR3 或更高版本，该版本已修复对 MS-DOS 设备名（如 AUX、CON、NUL）请求的处理逻辑。如无法立即升级，可在 Web 服务器或反向代理层配置规则，拦截包含 MS-DOS 设备名的 URL 请求（如 /aux、/con、/nul、/prn 等），作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Faust Informatics FreeStyle Chat 4.1 SR2 MS-DOS 设备名拒绝服务漏洞"
updated = "2026-06-16T21:54:38.403"

