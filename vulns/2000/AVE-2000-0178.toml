[basic]
description = "Internet Explorer 5.x 中的 window.showHelp() 方法存在安全限制绕过漏洞，未能将 HTML Help 文件（.chm）限制为仅从本地主机执行。远程攻击者可通过 Microsoft 网络共享协议，将恶意 .chm 帮助文件托管在远程位置，并诱使用户通过特制网页调用 showHelp() 方法加载该文件，从而以当前用户权限在目标系统上执行任意命令。该漏洞影响 Internet Explorer 5.0 及 5.01 版本，攻击复杂度较高，需用户交互配合，可导致机密性、完整性和可用性部分受损。"
published = "2000-03-01T05:00:00.000"
remediation = "升级至 Internet Explorer 6.0 及以上版本，该漏洞已在 IE 6.0 中得到修复。由于 IE 5.x 已终止支持且存在多项已知安全缺陷，建议停止使用 IE 浏览器，迁移至 Microsoft Edge 或 Chrome 等现代浏览器。如暂时无法升级，可通过组策略禁用 `showHelp()` 方法调用或移除 `.chm` 文件关联作为临时缓解。"
score = 5.1
severity = "MEDIUM"
sources = ["epss"]
title = "Microsoft Internet Explorer 5.x HTML Help 远程代码执行漏洞"
updated = "2026-06-16T21:51:12.747"

