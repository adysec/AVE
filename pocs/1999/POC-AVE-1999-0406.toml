[info]
author = "ave"
description = "验证目标 Squid 2.2 是否将 cachemgr.cgi 暴露在公开 Web 目录中且未做访问控制。通过请求该 CGI 脚本并检测其返回内容，判断攻击者能否利用它作为中间代理发起连接。"
id = "POC-AVE-1999-0406"
name = "CVE-1999-0710 Squid cachemgr.cgi 未授权连接 PoC"
severity = "high"
tags = ["ave-1999-0406"]
vuln_id = [
    "CVE-1999-0710",
    "AVE-1999-0406",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/cgi-bin/cachemgr.cgi"
protocol = "http"

[poc.requests.headers]
User-Agent = "AVE/1.0"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "Cache Manager",
    "cachemgr",
    "Squid Object Cache",
]
