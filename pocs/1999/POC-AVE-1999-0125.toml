[info]
author = "ave"
description = "通过检查 /proc/modules 中 autofs 模块加载状态，验证系统是否存在 Linux autofs 本地缓冲区溢出漏洞（CVE-1999-0460）。该漏洞允许本地用户通过向 autofs 文件系统传递超长目录名（如 cd 到 256 字符路径）触发缓冲区溢出，导致系统崩溃或拒绝服务。"
id = "POC-AVE-1999-0125"
name = "Linux Kernel autofs 本地缓冲区溢出拒绝服务漏洞 PoC"
severity = "low"
tags = [
    "cve-1999-0460",
    "autofs",
    "dos",
    "kernel",
]
vuln_id = [
    "CVE-1999-0460",
    "AVE-1999-0125",
]

[poc]
logic = "all"

[[poc.requests]]
path = "/proc/modules"
protocol = "file"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["autofs"]
