[basic]
description = "Joe 文本编辑器在异常退出时创建名为 DEADJOE 的救援副本文件，该过程会跟随符号链接，导致本地攻击者可通过预先创建指向其他用户文件的符号链接，当受害者的 Joe 编辑器会话崩溃时，救援文件将覆盖目标文件。该漏洞影响 Joe 文本编辑器的多个版本，攻击者需具备本地系统访问权限，利用条件为等待或诱导目标用户使用 Joe 编辑器时发生异常退出。漏洞危害等级为中危，CVSS 评分 5.5，可导致本地文件被非授权覆盖，影响系统文件完整性。"
published = "2001-01-09T05:00:00.000"
remediation = "升级 Joe 文本编辑器至 2.8 以上版本（如 Immunix OS 升级至 joe-2.8-42.62_StackGuard，Debian 升级至对应安全更新版本），该版本修复了异常退出时创建 DEADJOE 救援文件跟随符号链接的问题。如无法立即升级，可限制本地用户对 joe 的 SUID 权限或移除 joe 的 SUID 位：`chmod u-s /usr/bin/joe`，防止普通用户通过符号链接覆盖其他用户文件。"
score = 5.5
severity = "MEDIUM"
sources = ["redhat"]
title = "Joe 文本编辑器符号链接漏洞"
updated = "2026-06-16T21:53:19.383"

