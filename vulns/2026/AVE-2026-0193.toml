[basic]
description = "汉王e脸通综合管理平台 uploadMapFile.do 接口存在任意文件上传漏洞，由于未对上传文件类型进行有效的白名单校验，未授权的远程攻击者可通过构造特制 HTTP 请求直接上传恶意的 JSP 脚本文件，获取服务器 WebShell 权限，进而执行任意系统命令、窃取敏感数据或横向攻击内网。该漏洞影响汉王e脸通综合管理平台多个版本，危害严重。"
published = "2026-07-21"
remediation = "对 uploadMapFile.do 接口添加文件类型白名单校验，仅允许图片类型文件上传；禁用 JSP 目录的写入执行权限；限制该接口仅允许内网 IP 访问；部署 WAF 规则拦截文件上传请求中的恶意脚本内容；定期审计服务器上传目录中的文件。"
score = 5.0
severity = "MEDIUM"
sources = ["hwpoc"]
title = "汉王e脸通综合管理平台任意文件上传漏洞"
updated = "2026-07-21"

