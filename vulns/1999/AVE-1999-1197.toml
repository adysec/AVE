[basic]
description = "Windows NT 4.0 的 Cenroll ActiveX 控件（xenroll.dll）存在资源耗尽型拒绝服务漏洞。远程攻击者可通过构造恶意网页，诱导目标用户访问后触发该 ActiveX 控件在目标系统上创建大量任意文件，导致系统磁盘或内存资源被耗尽，造成拒绝服务。该漏洞影响 Windows NT 4.0 Terminal Server Edition 及 Windows NT Server 4.0（未安装 Service Pack 6 的版本），CVSS 评分 5.0，危害等级中危。安装 Windows NT 4.0 Service Pack 6 可修复此漏洞。"
published = "2000-12-14T05:00:00.000"
remediation = "立即将 Windows NT 4.0 Server 及 Terminal Server Edition 升级至 Service Pack 6 (SP6) 或更高版本。SP6 已修复 xenroll.dll ActiveX 控件允许远程创建任意文件导致资源耗尽的问题。如因业务原因无法升级，可在 Internet Explorer 中将 Cenroll 控件 killbit 设为 1 以禁用该 ActiveX 控件，降低攻击面。Windows NT 4.0 已停止支持，建议迁移至受支持的 Windows Server 版本。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Microsoft Windows NT 4.0 Cenroll ActiveX Control 远程拒绝服务漏洞"
updated = "2026-06-16T21:50:45.793"

