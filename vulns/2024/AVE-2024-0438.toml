[basic]
description = "Netgear WN604 无线路由器的 siteSurvey.php 接口存在未授权访问漏洞，攻击者无需身份认证即可直接访问该页面并获取 JSON 格式的 ARP 表数据，其中包含路由器所在局域网内多达 10 个 IP 地址及对应 MAC 地址信息。该漏洞源于 siteSurvey.php 缺少访问控制机制，任何能够访问路由器 Web 管理界面的远程攻击者均可利用此漏洞枚举内网主机，为后续针对性攻击提供目标信息。"
published = "2024-08-07"
remediation = "升级 Netgear WN604 路由器固件至最新可用版本，确保 siteSurvey.php 接口受到访问控制保护；如设备已停止维护，建议通过防火墙规则限制对路由器管理界面的外部访问，仅允许可信 IP 段访问 Web 管理端口。临时缓解措施包括禁用远程管理功能并设置强管理密码。"
score = 5.0
severity = "MEDIUM"
sources = ["hwpoc"]
title = "网件 WN604 无线路由器 siteSurvey.php 未授权访问漏洞"
updated = "2024-08-07"

