[basic]
description = '微软 Windows 98 操作系统在处理特制的 "oshare" 网络数据包时存在拒绝服务漏洞。远程攻击者无需身份认证即可向目标系统发送包含无效分片偏移（fragmentation offsets）的恶意数据包，导致系统网络服务崩溃或响应中断。该漏洞影响 Windows 98 及部分早期操作系统版本，攻击条件简单，危害性中等。'
published = "1999-01-25T05:00:00.000"
remediation = "该系统已停止支持，应升级至 Windows 10/11 或更高版本；无法升级时，在边界防火墙和主机上阻止 TCP/UDP 137-139、445 端口的入站流量，并禁用 NetBIOS 和文件共享服务作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Microsoft Windows 98 畸形 oshare 数据包远程拒绝服务漏洞"
updated = "2026-06-16T21:48:13.350"

