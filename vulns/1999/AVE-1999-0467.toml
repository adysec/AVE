[basic]
description = 'tags.<value>Windows NT 4.0 远程访问服务（RAS）和路由与远程访问服务（RRAS）客户端存在凭据管理错误漏洞。当用户使用 RAS 或 RRAS 客户端拨号连接到服务器时，即使未勾选"保存密码"选项，系统仍会在注册表中以加密形式缓存用户的密码凭据。影响版本包括 Windows NT Workstation 4.0、Windows NT Server 4.0 及 Windows NT Server 4.0 企业版。攻击者若获得对本地注册表的访问权限，可能提取缓存的密码，进而获取对远程访问账户的未授权访问。该漏洞危害等级为中危，CVSS 评分为 5.0。Microsoft 已于 1999 年 5 月发布安全公告 MS99-017 并推送补丁修复此问题。'
published = "1999-05-27T04:00:00.000"
remediation = "安装 Microsoft Windows NT 4.0 的累计安全补丁（如 1999 年 9 月发布的 Service Pack 6 或对应的 RAS/RRAS 热修复补丁），升级至 SP6 及以上版本。如暂无法升级，应在拨号连接属性中取消勾选「保存密码」选项，并定期修改账户口令，避免密码被缓存在本地。同时限制拨号用户的本地登录权限以降低泄露风险。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Microsoft Windows NT RAS 拨号网络密码缓存漏洞"
updated = "2026-06-16T21:48:59.367"

