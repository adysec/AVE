[basic]
description = "LPPlus 3.2.2 及 3.3 版本在创建 lpdprocess 文件时设置了全局可写权限，导致本地用户可通过向该文件写入其他进程 ID，并利用 setuid 权限的 dcclpdshut 程序强制终止目标进程，造成拒绝服务。该漏洞需本地攻击者拥有操作系统用户权限，攻击条件较低，影响 LPPlus 打印管理服务的可用性。"
published = "2000-11-14T05:00:00.000"
remediation = "将 lpdprocess 文件权限修改为 640（属主读写、属组读），仅允许 lp 用户写入。升级到 LPPlus 更高版本（如 4.0 以上）以修复此问题。如无法升级，使用 chmod 命令收紧 lpdprocess 文件权限，并通过监控文件完整性检测异常修改。"
score = 3.6
severity = "LOW"
sources = ["exploitdb"]
title = "LPPlus 打印服务本地权限拒绝服务漏洞"
updated = "2026-06-16T21:52:39.750"

