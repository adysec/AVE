[basic]
description = "Apache Jakarta Tomcat 3.0及3.1版本自带的Snoop Servlet存在信息泄露漏洞。远程攻击者通过向目标服务器发送带有.snp后缀的不存在URL请求，可触发Snoop Servlet返回系统环境变量、请求参数、系统属性等敏感信息。该漏洞无需身份认证即可利用，攻击者可借此收集目标系统配置信息，为进一步攻击提供依据。建议升级至Tomcat 3.2及以上版本或移除Snoop Servlet。"
published = "2000-10-20T04:00:00.000"
remediation = "Tomcat 3.x 已停止支持，官方不再发布安全更新。该漏洞修复于 Tomcat 3.3a 版本，建议升级至 Tomcat 9.0.x 或更高版本。如无法立即升级，应立即从生产环境中删除 `examples` Web 应用（其默认包含 snoop servlet），或在 `web.xml` 中移除 snoop servlet 的映射配置，同时通过防火墙或访问控制列表限制对 `*.snp` 后缀路径的访问作为临时缓解措施。"
score = 6.4
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Apache Tomcat 3.0/3.1 Snoop Servlet 信息泄露漏洞"
updated = "2026-06-16T21:52:25.440"

