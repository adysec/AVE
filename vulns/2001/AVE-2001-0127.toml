[basic]
description = "Joe Text Editor 2.8 存在本地提权漏洞，由于程序会在当前工作目录（CWD）中搜索 .joerc 配置文件，本地攻击者可将特制的恶意 .joerc 文件放置在目标用户将要执行 joe 的目录下，当其他用户在该目录中运行 joe 时，恶意配置文件中的命令将被执行，从而导致攻击者获取其他用户的权限。该漏洞利用条件为攻击者具有本地访问权限并能将文件写入目标目录。"
published = "2001-05-03T04:00:00.000"
remediation = "升级到 JOE 3.0 及以上版本，该版本不再从当前工作目录搜索 .joerc 配置文件，改为仅读取用户家目录下的 ~/.joerc。临时缓解措施：避免在非信任目录下执行 joe 命令，并及时移除公共可写目录中的 .joerc 文件。"
score = 4.6
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Joe Text Editor 2.8 .joerc 配置文件本地任意命令执行漏洞"
updated = "2026-06-16T21:54:02.157"

