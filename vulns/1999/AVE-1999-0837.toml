[basic]
description = "思科（Cisco）缓存引擎（Cache Engine）存在访问验证缺陷，未对管理接口实施有效的身份认证机制。远程攻击者可在无需提供合法凭据的情况下，使用空用户名和空密码直接登录设备，从而绕过访问控制并获得设备的非授权访问权限。该漏洞影响运行相关版本软件的思科缓存引擎设备，攻击条件为攻击者能够与设备的管理接口建立网络连通（通常经由 HTTP 管理端口）。利用方式简单，攻击者仅需构造带有空凭据的请求即可完成登录，进而可能查看或修改设备配置，造成信息泄露或进一步的网络入侵风险。"
published = "1999-12-16T05:00:00.000"
remediation = "立即将 Cisco Cache Engine 升级至修复该空凭证绕过问题的官方固件版本（Cisco 发布于 1999 年 12 月的 Caching Software 2.0.3 及以上版本）。无法立即升级时，在边界防火墙或路由器 ACL 上限制仅允许受信任管理网段访问缓存引擎的 3128 等管理端口，并禁用匿名访问，对管理接口强制启用强口令认证作为临时缓解措施。"
score = 2.6
severity = "LOW"
sources = ["avd"]
