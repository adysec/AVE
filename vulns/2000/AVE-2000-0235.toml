[basic]
description = "AVM KEN! ISDN 代理服务器 1.3.10 和 1.4.30 版本存在远程拒绝服务漏洞，攻击者可通过发送畸形请求导致服务崩溃，使合法用户无法访问。该漏洞源于服务器对恶意构造的请求处理不当，无需身份认证即可远程触发，影响使用受影响版本 ISDN 代理服务的系统可用性。CVSS 评分 5.0，属于中等危害级别。"
published = "2000-04-12T04:00:00.000"
remediation = "升级 AVM KEN! ISDN Proxy 服务器到官方修复版本（1.4.30 之后的安全更新版本），可通过 AVM 官网下载固件/软件更新包进行升级。如无法立即升级，应在边界防火墙或路由器上限制对 KEN! ISDN Proxy 服务端口（TCP 80/443 及 ISDN 代理端口）的外部访问，仅允许受信任的内部网络地址连接，以缓解远程拒绝服务攻击风险。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
