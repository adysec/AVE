[info]
author = "ave"
description = "Tiger 2.2.3 安全审计工具在默认工作目录（WORKDIR）下使用可预测临时文件，本地用户可通过预先创建指向敏感文件的符号链接，诱使 Tiger 在运行时覆盖该文件。本 PoC 在本地模拟该攻击场景，验证 Tiger 的 WORKDIR 临时文件可被符号链接劫持，从而确认任意文件写入风险。需在已安装受影响版本 Tiger 的本地系统上以普通用户权限执行。"
id = "POC-AVE-1999-1296"
name = "CVE-1999-1038 Tiger 2.2.3 符号链接攻击本地 PoC"
severity = "high"
tags = ["ave-1999-1296"]
vuln_id = [
    "CVE-1999-1038",
    "AVE-1999-1296",
]

[poc]
logic = "all"

[[poc.requests]]
path = "/tmp/tiger_poc_testfile"
protocol = "file"

[[poc.requests.matchers]]
expect = false
part = "body"
type = "word"
words = ["PoC symlink target overwritten"]
