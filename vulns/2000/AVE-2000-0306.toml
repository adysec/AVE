[basic]
description = "Red Hat Linux 在用户初始密码设置时默认使用 DES 算法配合 crypt() 函数进行加密，而非采用更安全的 MD5 算法。DES 加密算法使用 56 位密钥，有效密钥空间较小，且只能处理前 8 个字符，导致密码强度大幅降低。本地攻击者可通过获取 /etc/shadow 文件中的密码哈希后，利用 DES 加密的弱密码特性实施暴力破解，以较低的计算成本获取用户密码，进而提升权限或横向移动，对系统安全性构成严重威胁。"
published = "2000-01-21T05:00:00.000"
remediation = "建议立即升级到 Red Hat Linux 6.0 以上版本，该版本默认使用 MD5 密码哈希算法。对于现有系统，可使用 `authconfig --passalgo=md5` 或编辑 `/etc/login.defs` 将 `ENCRYPT_METHOD` 设置为 `MD5`，并重新设置所有用户密码使其使用更强的哈希算法。如运行 Red Hat Enterprise Linux，建议升级到 RHEL 5 及以上版本以使用 SHA-512 哈希。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "Red Hat Linux 口令初始化使用 DES 弱加密算法漏洞"
updated = "2026-06-16T21:50:59.167"

