[basic]
description = "Netwin DMailWeb CGI 程序存在缓冲区溢出漏洞，远程攻击者可通过向 utoken 参数提交超长字符串触发缓冲区溢出，从而在目标服务器上执行任意命令。该漏洞影响 Netwin DMail 邮件服务器中的 Web 管理组件，攻击者无需身份认证即可远程利用，CVSS 评分 7.5，危害等级高。厂商已发布安全更新修复此漏洞。"
published = "2000-05-04T04:00:00.000"
remediation = "立即将 DMailWeb 升级至 2.5e 或更高版本（下载地址：ftp://ftp.netwinsite.com/pub/dmailweb/beta/）。如无法立即升级，可在 Web 服务器或应用防火墙层面对 CGI 程序 dmailweb/dmailweb.exe 的 utoken 参数做长度检查，限制输入长度不超过 256 字节，并过滤特殊字符以缓解缓冲区溢出风险。同时建议将该 CGI 程序移出或限制其只允许可信 IP 访问。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "Netwin DMailWeb 缓冲区溢出远程代码执行漏洞"
updated = "2026-06-16T21:51:41.950"

