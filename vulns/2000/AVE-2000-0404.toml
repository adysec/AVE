[basic]
description = "FileMaker Pro 5 Web Companion 组件存在安全绕过漏洞。由于对 XML 发布及邮件功能的访问控制验证不足，远程攻击者无需身份认证即可绕过数据库的字段级安全限制，直接访问或修改受保护的敏感数据。该漏洞影响 FileMaker Pro 5 版本，攻击者利用难度较低，可导致数据泄露或越权操作。建议用户升级至更高版本或限制 Web Companion 的暴露范围。"
published = "2000-05-02"
remediation = "建议升级到 FileMaker Pro 5.5v1 或更高版本，该版本已修复 Web Companion 中 XML 发布和邮件功能的安全限制绕过问题。如无法立即升级，可在 Web Companion 配置中禁用 XML 发布和邮件功能，并限制仅信任主机可访问 Web Companion 服务端口。"
score = 5.0
severity = "MEDIUM"
sources = ["cve"]
title = "FileMaker Pro 5 Web Companion 安全绕过漏洞"
updated = "2026-06-16"

