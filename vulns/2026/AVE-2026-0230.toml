[basic]
description = "H2O-3 机器学习平台存在 JDBC 连接参数注入漏洞，攻击者可通过构造恶意的 JDBC 连接 URL（如 jdbc:mysql://attacker:3306/test?autoDeserialize=true）触发自动反序列化操作，从而在目标服务器上执行任意代码。该漏洞影响 H2O-3 的数据库连接功能模块，无需身份认证即可远程利用，危害严重。建议用户及时更新至修复版本并对 JDBC 连接参数进行严格校验。"
published = "20250901"
remediation = "升级 H2O-3 至最新版本（≥3.46.0.11），该版本已修复 JDBC 连接参数注入问题。如无法升级，需对用户提交的 JDBC URL 进行严格白名单校验，禁止包含 autoDeserialize、allowLoadLocalInfile、allowUrlInLocalInfile 等危险参数，同时限制 JDBC 连接目标仅允许内部可信数据库地址，并在网络层面隔离 H2O-3 对外部出站连接的访问。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "H2O H2O-3 JDBC 连接参数注入远程代码执行漏洞"
updated = "20250901"

