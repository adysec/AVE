[basic]
description = "信呼OA（Xinhu OA）系统的 uploawAction.php 接口存在 SQL 注入漏洞。攻击者通过向 /index.php?a=upfile&n=uploaw|api&d=task 端点发送特制的 multipart/form-data POST 请求，在 filename 参数中构造闭合 SQL 语句的 payload（如利用 sleep 函数进行时间盲注），可实现数据库信息窃取、管理员权限获取等操作。该漏洞无需身份认证即可远程利用，危害严重。"
published = "0709"
remediation = "建议立即升级信呼OA至官方发布的最新版本，修复 uploawAction.php 中 filename 参数未正确过滤导致的 SQL 注入。如无法立即升级，可在 nginx/apache 层对上传接口 /index.php?d=task&a=upfile 的 filename 参数添加 WAF 规则，拦截引号、括号等 SQL 特殊字符；同时代码层改用参数化查询或预编译语句处理文件上传相关的数据库写入操作，避免直接拼接用户输入。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "信呼OA uploawAction.php 接口SQL注入漏洞"
updated = "0709"

