[basic]
description = 'Big Brother 监控系统 1.4h1 及更早版本的 bb-hostsvc.sh 脚本中存在目录遍历漏洞，远程攻击者可通过向 HOSTSVC 参数传递包含 ".." 的恶意路径，绕过访问限制读取服务器上的任意文件。该漏洞无需身份认证即可远程利用，可能导致系统敏感信息泄露，对受影响系统的机密性构成严重威胁。'
published = "2000-07-11T04:00:00.000"
remediation = "立即升级 Big Brother 至 1.4h2 或更新版本（补丁下载自 bb4.com/download.html），该版本已对 HOSTSVC 参数做输入校验防止目录遍历。如无法升级，编辑 bb-hostsvc.sh 在 `$HOSTSVC` 变量使用前过滤 `../` 及空路径，同时在 Web 服务器层面限制对 bb-hostsvc.sh 的访问来源 IP。"
score = 10
severity = "CRITICAL"
sources = ["exploitdb"]
title = "Sean MacGuire Big Brother 目录遍历漏洞"
updated = "2026-06-16T21:52:09.860"

