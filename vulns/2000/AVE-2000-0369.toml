[basic]
description = "Red Hat Linux 6.1 的 ORBit CORBA 组件和 gnome-session 会话管理服务存在远程拒绝服务漏洞。远程攻击者可通过向目标系统发送特制请求，利用 ORBit 或 gnome-session 对异常数据的处理缺陷，导致相关程序崩溃，造成拒绝服务。该漏洞影响 Red Hat Linux 6.1 系统，CVSS 评分 5.0，危害等级中等，无需身份认证即可远程触发。"
published = "1999-12-03"
remediation = "升级 Red Hat Linux 至 6.2 及以上版本，或安装 Red Hat 官方提供的 ORBit 和 gnome-session 安全补丁（RHSA-1999:058-01）。由于 Red Hat Linux 6.1 已停止维护，建议迁移至受支持的 Red Hat Enterprise Linux 版本，并在网络层面限制对 ORBit 服务（默认端口 683）的访问。"
score = 5.0
severity = "MEDIUM"
sources = ["cve"]
title = "Red Hat Linux 6.1 ORBit 与 gnome-session 远程拒绝服务漏洞"
updated = "2026-06-16"

