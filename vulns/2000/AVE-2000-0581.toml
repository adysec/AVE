[basic]
description = "xlockmore 和 xlockf 屏幕锁定工具中存在格式化字符串漏洞，由于程序未能正确过滤用户通过 -d 参数传入的格式化字符串，本地攻击者可利用该参数注入恶意格式说明符，触发内存读写操作，从而实现越权代码执行并以 root 权限运行任意命令。该漏洞影响 xlockmore 4.16 及之前版本，攻击者需拥有本地系统访问权限，无需身份认证即可提权至 root，危害等级高。"
published = "2000-10-20T04:00:00.000"
remediation = "建议升级 xlockmore 至 4.17 或更高版本，该版本已修复 -d 选项的用户输入格式化字符串漏洞。如无法立即升级，可移除 xlock 二进制文件的 setuid 权限位（chmod u-s /usr/X11R6/bin/xlock），限制本地非授权用户执行特权操作。同时避免在 setuid 程序中使用用户可控的格式化字符串参数。"
score = 7.2
severity = "HIGH"
sources = ["exploitdb"]
title = "David Bagley xlockmore 格式字符串本地权限提升漏洞"
updated = "2026-06-16T21:52:25.817"

