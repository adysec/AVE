[basic]
description = "Computalynx CProxy Server 3.3 SP2 的 HTTP 服务组件存在缓冲区溢出漏洞。远程攻击者可向目标服务器 8080 端口发送超长 HTTP 请求，触发缓冲区溢出，导致服务进程崩溃，造成拒绝服务。该漏洞源于 CProxy 对 HTTP 请求行长度缺乏有效边界检查，攻击者无需认证即可远程利用，影响 CProxy 3.3 SP2 版本。"
published = "2000-05-16"
remediation = "Computalynx 公司已停止维护 CProxy Server 产品，官方未发布补丁。建议用户迁移至其他受支持的代理服务器软件（如 Squid、HAProxy 等），并在网络边界部署入侵检测系统，限制 HTTP 请求头长度以缓解风险。"
score = 5.0
severity = "MEDIUM"
sources = ["cve"]
title = "Computalynx CProxy Server 3.3 SP2 缓冲区溢出拒绝服务漏洞"
updated = "2026-06-16"

