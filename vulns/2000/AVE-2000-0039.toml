[basic]
description = "雅虎通（Yahoo Pager/Messenger）客户端存在缓冲区溢出漏洞。远程攻击者无需身份认证，只需向目标用户发送包含超长 URL 的即时消息，即可触发缓冲区溢出，导致 Yahoo Messenger 客户端崩溃进入拒绝服务状态。该漏洞 CVSS 评分 5.0，危害等级中危，攻击复杂度低，仅需诱导用户查看恶意消息即可触发，影响 Yahoo Messenger 全版本用户。"
published = "1999-10-01T04:00:00.000"
remediation = "立即卸载 Yahoo Pager/Messenger 客户端，该产品已于 2018 年 7 月 17 日正式停服，官方不再提供安全更新。如无法卸载，在防火墙侧拦截 Yahoo Messenger 相关域名的网络流量作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Yahoo Pager 缓冲区溢出拒绝服务漏洞"
