[basic]
description = "Microsoft MSN Messenger Service 1.0 Setup BBS 组件中的 setupbbs.ocx ActiveX 控件存在缓冲区溢出漏洞。远程攻击者可通过诱使用户访问恶意网页或打开恶意文件，调用该控件的 vAddNewsServer 或 bIsNewsServerConfigured 方法并传入超长参数，触发缓冲区溢出，从而在目标系统上执行任意命令。该漏洞影响运行 MSN Messenger Service 1.0 Setup BBS 4.71.0.10 的 Windows 系统，攻击者无需身份验证即可远程利用，危害等级为高危（CVSS 7.5）。"
published = "1999-09-24T04:00:00.000"
remediation = "立即卸载或禁用 MSN Messenger Service 1.0 自带的 Setup BBS ActiveX 控件（setupbbs.ocx，版本 4.71.0.10），在 Internet Explorer 中通过“管理加载项”将该控件设为禁用并不允许运行。升级到已修复此问题的 Microsoft MSN Messenger 后续版本（3.0 及以上），同时在企业网络中通过组策略限制 ActiveX 控件运行以降低远程代码执行风险。"
score = 7.5
severity = "HIGH"
sources = ["exploitdb"]
title = "Microsoft MSN Messenger Service Setup BBS ActiveX 控件缓冲区溢出漏洞"
updated = "2026-06-16T21:50:32.423"

