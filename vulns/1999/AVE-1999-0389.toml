[basic]
description = "Sendmail 8.6.9 版本在处理 IDENT 协议查询时存在命令注入漏洞。远程攻击者无需身份认证，可通过向目标邮件服务器发送特制的 ident 请求，在 identd 返回数据中嵌入恶意 shell 命令。由于 Sendmail 未对 ident 返回数据进行充分过滤和转义，导致该数据被直接传递给 shell 执行，从而允许攻击者以 root 权限在目标系统上执行任意命令。该漏洞影响广泛部署的 Sendmail 8.6.9 及更早版本，可被用于完全控制目标邮件服务器。"
published = "1997-01-01T05:00:00.000"
remediation = "立即升级 Sendmail 至 8.7.0 或更高版本，该漏洞已在 8.7.0 中修复。如无法升级，可在 sendmail.cf 中将 ident 查询功能禁用（设置 O Timeout.ident=0），或在防火墙层面阻止入站 TCP 113 端口连接以缓解攻击风险。"
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "Sendmail 8.6.9 IDENT 远程命令执行漏洞"
updated = "2026-06-16T21:47:54.363"

