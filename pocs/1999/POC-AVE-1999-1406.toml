[info]
author = "AVE"
description = "检测 IBM WebSphere 2.0/3.0 中 ikeyman 工具生成的密钥数据库密码存储文件（stash file），该文件使用 XOR 0xf5 弱加密算法保护 SSL 密钥库密码，本地攻击者可读取并解密获取明文密码。"
id = "POC-AVE-1999-1406"
name = "IBM WebSphere ikeyman Weak Encrypted Password PoC"
severity = "critical"
tags = ["ave-1999-1406"]
vuln_id = [
    "CVE-1999-0944",
    "AVE-1999-1406",
]

[poc]
logic = "all"

[[poc.requests]]
path = "/opt/IBMWebSphere/ikeyman/key.sth"
protocol = "file"

[[poc.requests.matchers]]
expect = true
part = "body"
regex = '[\s\S]+'
type = "regex"
