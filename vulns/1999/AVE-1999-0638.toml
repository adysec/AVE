[basic]
description = "Deerfield MDaemon 2.8.5/2.8.6 版本的 WorldClient 和 WebConfig 服务在处理过长 URL 请求时存在缓冲区溢出漏洞，远程未认证攻击者可通过发送超长的 URL 请求触发缓冲区溢出，导致服务进程崩溃并造成拒绝服务攻击。该漏洞影响 MDaemon 2.8.5/2.8.6 及 Alt-N WorldClient Pro 2.0.0.0/2.0.1.0/Standard 2.0.0.0 版本，攻击者无需身份认证即可远程发送超长 URL 触发漏洞，导致邮件服务中断，CVSS 评分 5.0 属中等严重度。厂商已发布补丁修复该漏洞，建议升级至修复版本。"
published = "1999-11-24T05:00:00.000"
remediation = "升级 Deerfield MDaemon 至 2.8.7 或更高版本，该版本已修复 WorldClient 与 WebConfig 服务因超长 URL 导致的拒绝服务问题；如暂无法升级，可在 Web 服务器前端（如反向代理）配置 URL 长度限制（建议不超过 2048 字节）并限制异常高频请求作为临时缓解。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Deerfield MDaemon 2.8.5/2.8.6 URL 拒绝服务漏洞"
updated = "2026-06-16T21:49:10.560"

