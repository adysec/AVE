[basic]
description = "Caldera Open Administration System (COAS) 存在权限配置不当漏洞，导致系统 /etc/shadow 密码文件被设置为全局可读。攻击者可通过本地访问读取该文件，获取系统所有用户的密码哈希值，进而通过离线破解获得明文密码。该漏洞影响 Caldera 相关操作系统版本，CVSS 评分 2.1，危害等级低，利用前提为攻击者已获得本地访问权限。"
published = "1999-04-27T04:00:00.000"
remediation = "立即升级到受支持的现代 Linux 发行版（如 SUSE Linux Enterprise 或 OpenSUSE），Caldera OpenLinux 及 COAS 已停止维护多年，不再提供安全更新。如无法升级，可手动执行 `chmod 600 /etc/shadow` 确保 shadow 文件仅 root 可读，并移除 COAS 的 setuid 二进制文件或卸载 COAS 软件包以消除攻击面。"
score = 2.1
severity = "LOW"
sources = ["avd"]
title = "Caldera Open Administration System 敏感信息泄露漏洞"
updated = "2026-06-16T21:48:53.950"

