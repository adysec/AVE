[basic]
description = "Microsoft IIS 4.0 和 5.0 的 ssinc.dll 组件中存在缓冲区溢出漏洞。当服务器端包含（SSI）指令处理超长文件名时，目录名被拼接触发缓冲区溢出，导致攻击者能够以系统权限执行任意代码。本地攻击者需拥有在目标 IIS 服务器上上传包含恶意 SSI 指令文件的能力，成功利用后可完全控制受影响系统。该漏洞影响 IIS 4.0 和 5.0 版本，CVSS 评分 7.2，危害等级高。"
published = "2001-09-20T04:00:00.000"
remediation = "立即安装 Microsoft 安全公告 MS01-044 提供的 IIS 累积安全补丁。IIS 4.0 补丁下载：https://www.microsoft.com/download/details.aspx?FamilyId=7DD8F695-FA97-4378-B57B-7BCCF3533BE3，IIS 5.0 补丁下载：https://www.microsoft.com/download/details.aspx?FamilyId=F74552AC-4313-4F93-9412-539DCA0753EB。安装前确保 Windows NT 4.0 已安装 SP5 或 SP6a，Windows 2000 已安装 SP1 或 SP2。如无法立即打补丁，作为临时缓解措施，应严格限制非授权用户向服务器上传文件的权限，并禁用不必要的服务器端包含（SSI）功能。"
score = 7.2
severity = "HIGH"
sources = ["exploitdb"]
title = "Microsoft IIS 4.0/5.0 SSI 缓冲区溢出权限提升漏洞"
updated = "2026-06-16T21:54:26.107"

