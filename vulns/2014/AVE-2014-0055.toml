[basic]
description = "该漏洞存在于 Rejetto HTTP 文件服务器的 ParserLib.pas 文件中，具体位于 findMacroMarker 函数。该函数在处理搜索请求时未能正确验证传入的 %00 空字节序列，允许攻击者绕过文件扩展名检查并上传可执行程序。攻击者只需向目标 HTTP 文件服务器发送包含空字节的特殊搜索请求，即可触发远程代码执行漏洞。漏洞影响 HFS 2.3x 系列版本（2.3c 及更早版本）。攻击条件成熟，无需认证即可远程触发，完全可能被利用。成功利用该漏洞可导致系统完全控制权，攻击者可以上传任意恶意程序并执行，危及服务器安全。该漏洞 CVSS 评分 9.8，评级为严重等级，由微软及相关安全厂商处理。"
published = "2014-10-07T10:55:04.493"
remediation = "升级到 HFS 2.3c 或更高版本以获取完整修复，或手动更新 parserLib.pas 文件到最新版本以修复 findMacroMarker 函数的 Null 字节验证漏洞。如无法立即打补丁，可在防火墙上封锁对 HFS 服务端口的访问，或停止运行此服务直到升级完成。如需继续使用，建议严格限制访问权限，仅允许可信网络连接，并禁用搜索功能以降低风险。"
score = 9.8
severity = "CRITICAL"
sources = ["kev"]
title = "Rejetto HTTP File Server 远程代码执行漏洞"
