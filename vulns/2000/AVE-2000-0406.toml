[basic]
description = "Cart32、QuickCommerce、Shop Express、StoreCreator 等多款早期 Web 购物车应用将商品价格、数量等敏感交易信息以 HTML 隐藏表单字段（hidden form fields）形式存储在客户端页面中，未在服务端进行二次校验。远程攻击者可通过修改表单中隐藏字段的值（如将价格改为低价或零）提交请求，从而实现低价购买或篡改订单金额。该漏洞攻击门槛低，仅需浏览器即可利用，影响涉及多款购物车系统的多个版本。"
published = "2000-02-01T05:00:00.000"
remediation = "立即升级到 Cart32 3.0a 以上版本或厂商已发布的最新补丁；对于已停止维护的版本（QuickCommerce 2.5/3.0、Shop Express 1.0、StoreCreator 3.0），建议迁移至受支持且进行服务端数据校验的购物车系统。作为临时缓解措施，在 Web 应用层对所有表单提交字段（包括隐藏域）实施服务端验证，确保价格、数量、折扣等敏感参数由后端计算而非依赖前端提交值。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "Cart32 / QuickCommerce 等多款购物车程序隐藏表单字段漏洞"
updated = "2026-06-16T21:51:04.510"

