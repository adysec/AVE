[basic]
description = "Hyperseek 是一款 Web 搜索引擎软件，其后台管理脚本 admin.cgi 缺乏有效的身份认证和权限校验机制，远程攻击者无需任何凭证即可直接向 admin.cgi 发送带有 edit_file 参数的请求，从而修改 Hyperseek 的配置文件。攻击者可利用此漏洞篡改搜索引擎的配置项，影响搜索结果与系统正常运行。CVSS v2 评分 5.0，危害等级中危。"
published = "1999-02-19T05:00:00.000"
remediation = "立即删除或停用 Hyperseek 软件，该产品已停止维护且无安全更新可用。如必须使用，应在 Web 服务器（Apache/Nginx）层面限制对 admin.cgi 的访问，仅允许受信 IP 地址通过认证后访问，同时移除 edit_file 操作参数的处理逻辑或将其注释掉。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Hyperseek Hyperseek 远程配置修改漏洞"
updated = "2026-06-16T21:50:02.930"

