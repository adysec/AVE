[basic]
description = "Orchard 是一个基于 ASP.NET MVC 的开源内容管理系统（CMS）。其 Users/Account/LogOff 页面中的 ReturnUrl 参数存在开放重定向漏洞，由于程序对用户输入的 URL 参数未进行充分校验，远程攻击者可通过构造特制的恶意链接，诱导已登录用户点击后将其重定向到任意外部网站，进而实施钓鱼攻击以窃取用户凭据。该漏洞影响 Orchard 1.0.21 之前、1.1.31 之前、1.2.42 之前及 1.3.10 之前的版本，CVSS 评分 5.8，危害等级中危。"
published = "2013-01-12T04:33:48.993"
remediation = "升级 Orchard CMS 至修复版本：1.0.x 升级到 1.0.21 及以上、1.1.x 升级到 1.1.31 及以上、1.2.x 升级到 1.2.42 及以上、1.3.x 升级到 1.3.10 及以上。如无法立即升级，可在应用层对 `ReturnUrl` 参数进行白名单校验，仅允许跳转到本站域名内的 URL，或移除该参数的重定向功能作为临时缓解措施。"
score = 5.8
severity = "MEDIUM"
sources = ["nuclei"]
title = "Orchard 开放重定向漏洞"
updated = "2026-06-16T23:36:13.603"

