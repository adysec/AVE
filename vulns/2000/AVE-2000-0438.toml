[basic]
description = "3R Soft MailStudio 2000 2.0 及更早版本中的 userreg.cgi CGI 程序存在任意命令执行漏洞。远程攻击者可通过向该 CGI 脚本发送包含 shell 元字符（如管道符、分号等）的特制 HTTP 请求，在服务器端以 Web 进程权限执行任意系统命令，从而完全控制目标邮件服务器。该漏洞危害严重，CVSS 评分 10.0，攻击无需认证且复杂度低。"
published = "2000-06-09T04:00:00.000"
remediation = "该漏洞极其老旧，厂商 3R Soft 已停止运营且不再提供安全更新。建议立即停用 MailStudio 2000 或禁用 userreg.cgi 脚本，同时在 Web 服务器层面配置严格输入过滤，阻止 shell 元字符（; | & ` $）传入 CGI 参数，并限制 CGI 目录执行权限为最小必要用户。如业务仍依赖该软件，建议迁移至替代方案。"
score = 10
severity = "CRITICAL"
sources = ["cve"]
title = "3R Soft MailStudio 2000 userreg.cgi 任意命令执行漏洞"
updated = "2026-06-16T21:51:55.630"

