[basic]
description = "Microsoft IIS 3.0 和 4.0 自带的 showfile.asp 活动服务器页面使用 FileSystemObject（FSO）组件读取文件，但未对传入的 file 参数进行有效过滤与校验。远程攻击者无需身份认证，即可通过构造包含目标文件路径的 file 参数向 showfile.asp 发送 HTTP 请求，越权读取服务器上的任意文件，包括配置文件与敏感文档，造成严重的信息泄露。该漏洞影响所有部署并启用 showfile.asp 的 IIS 3.0/4.0 站点，攻击条件仅为可访问该页面并发送特制请求。"
published = "1999-02-11"
remediation = "删除或重命名存在缺陷的 showfile.asp 页面，禁止匿名访问调用 FileSystemObject 的 ASP 脚本；在 IIS 服务管理器中移除或注销 scrrun.dll 的脚本执行权限以禁用 FSO 组件，并将站点迁移至 IIS 5.0 及以上版本，同时配置 NTFS 权限限制 IUSR 账户仅可读取必要文件。"
score = 5.0
severity = "MEDIUM"
sources = [
    "exploitdb",
    "cve",
]
title = "Microsoft IIS 3.0/4.0 showfile.asp 任意文件读取漏洞"
updated = "2026-07-18"

