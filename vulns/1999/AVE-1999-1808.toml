[basic]
description = 'Internet Explorer 在安全级别设置为"中"以下时，由于对 FileSystemObject ActiveX 对象的访问控制不足，导致远程攻击者可通过构造恶意网页来调用该对象，从而在用户浏览器上下文中执行任意系统命令。该漏洞影响旧版 Internet Explorer 浏览器，攻击者只需诱导用户访问恶意页面即可触发，无需额外认证。CVSS 评分 10.0，危害等级严重。修复方案为提升浏览器安全级别或安装相应安全更新。'
published = "1999-05-06T04:00:00.000"
remediation = "将 Internet Explorer 安全级别设置为「中」或更高（工具 → Internet 选项 → 安全 → 默认级别），或通过组策略禁用 FileSystemObject ActiveX 控件：在「管理模板 → Windows 组件 → Internet Explorer → 安全功能」中启用「一致性安全区域设置」。建议升级使用 Microsoft Edge 浏览器替代已停止支持的 IE。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "Microsoft Internet Explorer ActiveX FileSystemObject 远程代码执行漏洞"
updated = "2026-06-16T21:50:01.150"

