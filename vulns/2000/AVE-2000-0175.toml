[basic]
description = "Atrium Software Mercur Mail Server 3.2 的 POP3 和 IMAP 服务存在多个缓冲区溢出漏洞。远程攻击者无需身份认证，通过向受影响服务发送特制超长请求即可触发缓冲区溢出，导致服务崩溃从而拒绝服务。该漏洞影响 Mercur Mail Server 3.2 版本，攻击者可通过 110/TCP（POP3）或 143/TCP（IMAP）端口实施攻击，危害等级中等。"
published = "2000-03-15T05:00:00.000"
remediation = "立即升级 Mercur Mail Server 至 3.3 及以上版本（Atrium 在被 Ipswitch 收购前发布的最终修复版）。如产品已停止维护无法获取更新，应迁移至仍在安全支持周期内的邮件服务器（如 Ipswitch IMail 或 Exchange）。临时缓解措施：在防火墙层面限制 POP3(TCP 110)、IMAP(TCP 143) 和 SMTP(TCP 25) 仅允许受信 IP 访问，并在服务端关闭不必须的 POP3/IMAP 服务，减小攻击面。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Atrium Software Mercur Mail Server 3.2 多个缓冲区溢出漏洞"
updated = "2026-06-16T21:51:12.360"

