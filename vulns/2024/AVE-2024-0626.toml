[basic]
description = "Linux 内核 af_packet 模块存在一个漏洞，源于 vlan_get_protocol_dgram() 函数在处理 IPv6 报文时未能正确处理 MSG_PEEK 操作。当攻击者向目标系统发送精心构造的 IPv6 报文时，该函数会因网络缓冲区管理不当而崩溃，导致内核 panic。这种漏洞可以远程触发，无需身份验证，可能导致系统崩溃和权限提升。受影响的 Linux 内核版本使用 af_packet 模块进行数据包捕获，特别是在处理 IPv6 流量时使用自定义的 socket 操作。该漏洞的根源在于函数在 MSG_PEEK 条件下无法安全管理报文缓冲区，导致内存访问失控并触发内核 BUG。"
published = "2025-01-15T13:15:14.747"
remediation = "建议立即升级 Linux 内核至已修复版本：Linux 6.13-rc4 及后续稳定版（含修复提交 af_packet: fix vlan_get_protocol_dgram() vs MSG_PEEK）。各发行版修复版本：Debian 11 升级至 linux-image-5.10.234-1 或更高（DLA-4075-1）；Ubuntu 24.04 LTS 升级至 linux-image-6.8.0-53-generic 或更高（USN-7381-1）；Ubuntu 20.04 LTS 升级至 linux-image-5.15.0-131-generic 或更高（USN-7459-1）；RHEL/CentOS 等待 RHSA-2025 补丁。暂无法升级内核时，可通过禁用 af_packet 模块（`modprobe -r af_packet` 并加入 blacklist）或限制本地非特权用户访问 AF_PACKET 套接字（`sysctl -w net.packet.enable=0`）作为临时缓解措施，但会影响抓包工具（如 tcpdump）功能。"
score = 5.5
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux Linux内核 af_packet模块MSG_PEEK处理不当导致内核崩溃漏洞"
updated = "2026-06-17T08:14:10.977"

