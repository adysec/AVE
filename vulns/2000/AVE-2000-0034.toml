[basic]
description = "Outlook Express 5 for Macintosh 在处理 HTML 格式邮件时存在附件自动下载漏洞。当用户预览或打开包含附件的 HTML 邮件时，系统会在未向用户发出任何提示或确认的情况下自动下载附件，导致攻击者可通过发送特制 HTML 邮件诱使用户下载恶意附件。该漏洞影响 Macintosh 平台上的 Outlook Express 5 版本，CVSS 评分 5.0，危害等级中等。攻击者利用此漏洞可绕过用户的安全确认机制，在用户不知情的情况下将恶意文件下载到本地系统，进而为后续攻击行为创造条件。"
published = "1999-12-22"
remediation = "安装 Microsoft 安全公告 MS99-060 提供的官方补丁，该补丁修复了 Outlook Express 5 for Macintosh 自动下载 HTML 邮件附件的问题。受影响用户应安装 Internet Explorer 4.5 for Macintosh 更新包，其中包含 Outlook Express 5 的修复程序及更新的数字证书。由于该产品已停止支持，建议迁移至受支持的邮件客户端（如 Microsoft Outlook for Mac 或 Mozilla Thunderbird）。"
score = 5.0
severity = "MEDIUM"
sources = ["cve"]
title = "Microsoft Outlook Express 5 for Macintosh HTML邮件附件自动下载漏洞"
updated = "2026-06-16"

