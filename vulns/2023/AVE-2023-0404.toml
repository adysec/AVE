[basic]
description = "CVE-2023-53469 已被 CVE 编号管理机构（CNA）撤销/拒绝，属于无效 CVE 编号。原始标题指向 Linux 内核 af_unix 模块中 unix_stream_sendpage() 函数存在空指针解引用（null-ptr-deref）问题，但该 CVE 已被官方撤回，无有效 CVSS 评分、无官方确认的漏洞详情及影响范围，不应作为有效安全漏洞使用。"
published = "2025-10-01T12:15:48.973"
remediation = "升级 Linux 内核至 6.5 及以上版本（6.5 已重构 sendpage 机制，不受此漏洞影响）；对于 6.1/6.2/6.3/6.4 等旧版本，将补丁 4a3fcfc3b51796e5e6974041c9a7cf7808d16f9e 反向移植到对应内核分支，该补丁在 unix_stream_sendpage() 中加锁保护对端接收队列的 skb 访问，避免与垃圾回收的竞态条件导致空指针解引用。"
score = 5
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux 内核 af_unix 空指针解引用漏洞"
updated = "2025-12-29T16:15:39.987"

