[basic]
description = "MMDF 邮件服务器在处理 SMTP 协议的 MAIL FROM 命令时存在缓冲区溢出漏洞，远程攻击者无需身份认证即可向目标服务器的 25 端口发送超长 MAIL FROM 命令，触发栈缓冲区溢出，从而覆盖返回地址实现任意代码执行，进而获取服务器最高权限。该漏洞影响 SCO OpenServer 等使用 MMDF 邮件系统的操作系统，CVSS 评分 7.5，危害等级高。"
published = "2000-02-16T05:00:00.000"
remediation = "建议升级 SCO OpenServer 至 5.0.5 或更高版本，并安装 MMDF 相关安全补丁。如无法升级，可在 inetd.conf 中注释 SMTP 服务或配置防火墙限制 25 端口访问，同时限制 SMTP 后台程序的 MAIL FROM 命令长度作为临时缓解措施。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "SCO OpenServer MMDF 缓冲区溢出权限提升漏洞"
updated = "2026-06-16T21:51:07.263"

