[basic]
description = "GNU ed 在 0.2-18.1 之前版本中存在符号链接攻击漏洞。本地攻击者可通过在目标系统上创建恶意的符号链接，诱使 GNU ed 在处理文件时跟随该符号链接，从而覆盖其他用户的文件。该漏洞利用条件为攻击者拥有本地系统访问权限，无需特殊权限即可实施攻击。成功利用后可能导致敏感文件被篡改、数据完整性受损，甚至引发权限提升。该漏洞 CVSS 评分 4.6，危害等级中危，影响使用 GNU ed 的各类 Linux/Unix 系统。"
published = "2001-01-09T05:00:00.000"
remediation = '升级 GNU ed 至 0.2-r4 或更高版本，该版本修复了临时文件创建的不安全行为。对于 Gentoo 系统，执行 emerge --sync && emerge -pv ">=sys-apps/ed-0.2-r4" && emerge ">=sys-apps/ed-0.2-r4" 完成更新。如无法升级，避免在受信任目录中以 root 身份使用 ed 编辑文件，并监控 /tmp 目录的符号链接攻击行为。'
score = 4.6
severity = "MEDIUM"
sources = ["redhat"]
title = "GNU ed 符号链接攻击本地文件覆盖漏洞"
updated = "2026-06-16T21:53:13.900"

