[basic]
description = "Check Point Firewall-1 3.0/4.0 版本存在连接表饱和拒绝服务漏洞。该防火墙对非 SYN 标志（如 ACK）发起的连接设置了过长的超时时间，攻击者可向无响应系统发送大量伪造的 ACK 或其他非 SYN 数据包，导致防火墙连接表被占满，阻塞合法连接并引发拒绝服务。影响范围为 Firewall-1 3.0 和 4.0 版本，攻击条件为攻击者可向目标发送网络数据包，利用方式为发送大量非 SYN 连接尝试耗尽连接表资源。"
published = "1999-07-29T04:00:00.000"
remediation = "部署 Check Point VPN-1 Firewall/1 v4.1 或更新版本，这修复了关于 ACK/SYN 数据包处理的 TCP 连接超时逻辑。临时缓解措施包括禁止使用空连接到防火墙 WAN 端口，或在应用级代理上启用 SYN 防护规则。"
score = 2.1
severity = "LOW"
sources = ["exploitdb"]
title = "Check Point Firewall-1 连接表饱和拒绝服务漏洞"
updated = "2026-06-16T21:49:01.327"

