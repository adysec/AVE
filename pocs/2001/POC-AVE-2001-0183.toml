[info]
author = "AVE"
description = "检测 Baltimore Technologies WEBsweeper 4.0 是否对超长 HTTP Referer 头存在内存耗尽拒绝服务漏洞。通过发送包含超长 Referer 头的 HTTP 请求，观察服务器是否因内存耗尽而响应超时或连接重置。"
id = "POC-AVE-2001-0183"
name = "CVE-2001-0460 PoC"
severity = "medium"
tags = ["cve-2001-0460"]
vuln_id = [
    "CVE-2001-0460",
    "AVE-2001-0183",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/"
protocol = "http"

[poc.requests.headers]
Referer = "http://evil."
User-Agent = "AVE/1.0"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "timeout",
    "reset",
    "refused",
    "closed",
]
