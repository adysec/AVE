[basic]
description = "Skunkware 2.0 中的 view-source CGI 程序存在目录遍历漏洞，远程攻击者无需身份认证即可通过构造包含 `../` 的恶意请求读取服务器上的任意文件。该漏洞利用 `..`（点点）路径穿越技术，可突破 Web 根目录限制，访问 `/etc/passwd` 等敏感系统文件，导致信息泄露。影响 Skunkware 2.0 及可能包含该组件的 Linux 发行版。"
published = "1997-02-01T05:00:00.000"
remediation = "删除或禁用 Skunkware 2.0 中的 view-source CGI 脚本，或升级至已修复路径遍历漏洞的版本。对用户输入进行严格过滤，移除 `../` 等目录跳转字符，并限制 CGI 脚本对文件系统的访问权限。如该脚本非必需，建议直接移除以避免风险。"
score = 6.4
severity = "MEDIUM"
sources = ["epss"]
title = "Skunkware 2.0 view-source CGI 目录遍历漏洞"
updated = "2026-06-16T21:47:45.550"

