[basic]
description = "Network Associates Gauntlet Firewall 5.0 在处理 ICMP 数据包时存在缺陷，未能对畸形的 ICMP 报文进行正确校验。远程攻击者无需身份认证，只需向目标防火墙发送构造异常的 ICMP 数据包，即可触发该漏洞导致防火墙服务崩溃或停止响应，造成拒绝服务（DoS）。该漏洞影响运行 Gauntlet Firewall 5.0 版本的设备，攻击条件仅需攻击者能够向目标防火墙发送网络数据包，利用方式简单，可直接通过普通网络访问发起，威胁网络边界防护的可用性。"
published = "1999-07-30"
remediation = "建议升级 Network Associates Gauntlet Firewall 至 5.0 后续补丁版本或更高版本，并在防火墙策略中配置 ICMP 包过滤规则，阻断来源不明的畸形 ICMP 报文。如暂时无法升级，可在边界路由器上配置 ACL，仅允许必要 ICMP 类型通过，丢弃异常 ICMP 包以缓解拒绝服务风险。"
score = 5.0
severity = "MEDIUM"
sources = ["cve"]
title = "Network Associates Gauntlet 防火墙 5.0 畸形 ICMP 报文拒绝服务漏洞"
updated = "2026-07-17"

