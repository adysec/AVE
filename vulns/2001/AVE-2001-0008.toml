[basic]
description = "Endymion MailMan Webmail 3.0.25 及更早版本存在任意命令执行漏洞。攻击者无需身份认证即可通过向服务的 alternate_template 参数提交包含 shell 元字符的特制请求，在服务器端执行任意系统命令。该漏洞源于程序未对用户输入做有效过滤，导致攻击者可直接控制目标服务器，危害严重。"
published = "2001-02-16"
remediation = "升级 MailMan Webmail 至 3.0.26 或更高版本，该版本已修复通过 alternate_template 参数注入 shell 元字符的问题。如无法升级，在 Web 服务器层面对 alternate_template 参数进行输入过滤，禁止包含 |;&$ 等 shell 特殊字符，并限制 Web 服务运行账户的最小权限。"
score = 10.0
severity = "CRITICAL"
sources = [
    "cve",
    "exploitdb",
]
title = "Endymion MailMan Webmail 任意命令执行漏洞"
updated = "2026-06-16"

