[basic]
description = "Solaris 操作系统中的 rpc.admind 服务默认未以安全模式运行，导致其在处理远程管理请求时缺乏有效的身份认证与访问控制机制。未经身份认证的远程攻击者可通过网络直接连接该服务并发送管理指令，从而以高权限在目标系统上执行任意命令、修改系统配置或获取敏感信息。该漏洞影响运行 Solaris 的主机，攻击条件较低，仅需能够访问目标开放的 rpc.admind 服务端口即可利用，CVSS 评分为 10.0，危害等级严重。管理员应将 rpc.admind 配置为安全模式运行并限制相关端口的网络访问。"
published = "1999-01-01T05:00:00.000"
remediation = "立即安装 Sun 针对 Solstice AdminSuite 的安全补丁（如补丁 ID 106235-xx 等对应版本），或升级至受支持的 Solaris 版本。如无需远程管理功能，执行以下操作禁用该服务：编辑 /etc/inetd.conf 注释掉 rpc.admind 相关行后重启 inetd，或在 SMF 环境下执行 svcadm disable svc:/network/rpc/admind:default。同时，在防火墙层面限制对 TCP 端口 2325 的入站访问作为临时缓解措施。"
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "Sun Solaris rpc.admind 不安全配置漏洞"
updated = "2026-06-16T21:48:39.160"

