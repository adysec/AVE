[basic]
description = "ISC DHCP Distribution 服务器（dhcpd）1.0 和 2.0 版本中存在多个缓冲区溢出漏洞，远程攻击者可通过发送超长 DHCP 选项字段触发溢出，导致服务崩溃拒绝服务，甚至可能在服务器上执行任意代码。该漏洞影响运行易受版本 DHCP 服务的系统，攻击者无需身份认证即可远程利用，CVSS 评分 7.5，属高危漏洞。"
published = "1999-12-31T05:00:00.000"
remediation = "建议立即升级至 ISC DHCP 3.0.1 及以上版本，或迁移至 ISC Kea DHCP 等现代维护版本。若暂时无法升级，请在防火墙层面限制仅允许受信任网段访问 UDP 67/68 端口，并在 dhcpd.conf 中限制 max-lease-time 与 option 长度作为临时缓解措施。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
