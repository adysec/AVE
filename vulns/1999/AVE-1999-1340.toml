[basic]
description = "AIX 系统中 FTP 安装脚本 anon.ftp 默认配置不当，将匿名 FTP 服务设置为不安全状态，允许远程攻击者无需认证即可连接目标系统。攻击者可利用该配置缺陷上传恶意文件或执行任意系统命令，导致服务器被完全控制。此漏洞影响 IBM AIX 操作系统，CVSS 评分 10.0，危害等级严重。建议立即修复 FTP 服务配置或禁用匿名访问。"
published = "1992-04-27T04:00:00.000"
remediation = "立即检查 AIX 系统中 /etc/ftpusers 和 anon.ftp 脚本权限，确保匿名 FTP 脚本不可被非授权用户修改。升级 AIX 至已修复此问题的最新维护级别（如 AIX 4.3 及以上版本）。如无需匿名 FTP 服务，建议在 /etc/inetd.conf 中注释 ftp 行并重启 inetd 以禁用该服务。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "IBM AIX 匿名FTP配置远程代码执行漏洞"
updated = "2026-06-16T21:49:45.643"

