[basic]
description = "Joomla! 内容管理系统中的 redSHOP 组件（com_redshop）1.0.x 版本存在目录遍历漏洞。远程攻击者可通过向 index.php 传递含有 `..`（点点）序列的恶意 view 参数，绕过路径限制读取服务器上的任意敏感文件。该漏洞源于程序未对用户输入的路径参数进行充分过滤，攻击无需身份认证，可窃取配置文件、数据库凭据等敏感信息，CVSS 评分 7.5，危害等级高。"
published = "2010-04-26T18:30:00.630"
remediation = "立即升级 redSHOP 组件至 1.1 或更高版本，该版本已修复 view 参数目录遍历漏洞。如无法升级，则应在 Joomla! 后台卸载 com_redshop 组件，或在 .htaccess 中对 view 参数添加正则过滤规则阻止 `../` 序列。亦可限制 `index.php?option=com_redshop` 的访问来源 IP 作为临时缓解。"
score = 7.5
severity = "HIGH"
sources = ["nuclei"]
title = "Joomla! redSHOP 组件目录遍历漏洞"
updated = "2026-06-16T23:18:33.980"

