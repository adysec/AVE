[basic]
description = "Microsoft IIS 4.0 及 5.0 的 ISM.DLL 组件存在文件片段读取漏洞。远程攻击者可通过向目标服务器发送带有大量编码空格（%20）并以 .htr 扩展名结尾的特制文件请求，绕过访问限制读取服务器上的任意文件内容。该漏洞无需身份认证即可利用，CVSS 评分 7.5，危害等级高。Microsoft 已发布安全更新修复此漏洞。"
published = "2000-05-11T04:00:00.000"
remediation = "移除 IIS 中 .htr 脚本映射（ISM.DLL 处理程序），可通过 IIS 管理控制台删除 .htr 应用程序映射。安装 Microsoft 安全公告 MS00-031 对应补丁程序。建议升级至受支持操作系统（如 Windows Server 2012+）并关闭 .htr 扩展功能。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "Microsoft IIS 4.0/5.0 .HTR 文件片段读取漏洞"
updated = "2026-06-16T21:51:46.553"

