[basic]
description = "F5 BIG-IP 设备的 Traffic Management User Interface（TMUI）存在身份认证绕过漏洞。未经身份认证的远程攻击者可通过管理端口或自 IP 地址访问 BIG-IP 系统的配置实用程序，绕过认证机制直接执行任意系统命令。该漏洞源于对用户请求的认证检查不充分（CWE-288、CWE-306），影响 BIG-IP 多个版本，CVSS 评分 9.8，危害等级严重。F5 已发布安全更新修复此漏洞。"
published = "2023-10-26T21:15:08.097"
remediation = "升级至已修复版本：BIG-IP 17.1.0.3 + Hotfix-BIGIP-17.1.0.3.0.75.4-ENG、16.1.4.1、15.1.10.2、14.1.5.1 或 13.1.5.1。如无法立即升级，可临时通过 iRule 限制对 TMUI 管理端口的访问，仅允许可信源 IP 连接 BIG-IP 的管理口和 self IP 地址，并在防火墙层面封禁对配置管理端口（默认 443/tcp）的非必要访问。"
score = 9.8
severity = "CRITICAL"
sources = ["hwpoc"]
title = "F5 BIG-IP TMUI 远程代码执行漏洞"
updated = "2026-06-17T06:31:32.640"

