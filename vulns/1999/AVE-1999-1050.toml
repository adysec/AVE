[basic]
description = "Elm 2.4 版本中的 filter 命令存在多处缓冲区溢出漏洞。攻击者可通过向受害者发送包含超长 From 头或 Reply-To 头的恶意邮件，或通过提供超长 -f (filterfile) 命令行参数来触发缓冲区溢出，从而执行任意命令。该漏洞 CVSS 评分 7.5，危害等级高，受影响系统包括使用 Elm 2.4 邮件客户端的各类 Unix/Linux 平台。建议用户升级至更高版本以修复此漏洞。"
published = "1999-12-31T05:00:00.000"
remediation = "建议升级至 Elm 2.5 或更高版本（若可用），或迁移至现代邮件客户端如 Mutt、Alpine 等。临时缓解：禁用 Elm 的 filter 命令功能，避免处理超长 From:/Reply-To: 头或 -f 参数，并在邮件网关层面过滤异常长度的邮件头。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "Elm 2.4 缓冲区溢出代码执行漏洞"
updated = "2026-06-16T21:50:13.147"

