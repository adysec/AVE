[basic]
description = "Cisco IOS 11.1CC 和 11.1CT 版本中分布式快速交换（DFS）功能存在安全绕过漏洞。当路由器将流量从启用了 DFS 的接口转发到未启用 DFS 的接口时，远程攻击者可通过发送特制数据包绕过特定访问控制列表（ACL）的过滤规则，导致未授权网络访问。该漏洞影响 Cisco IOS 11.1CC 和 11.1CT 版本，CVSS 评分 7.5，危害等级高。"
published = "1999-12-31T05:00:00.000"
remediation = "升级 Cisco IOS 至 11.1CC 或 11.1CT 之后的安全修复版本（如 12.0 及以上）；如无法升级，请在接口上禁用分布式快速交换（DFS，使用 `no ip route-cache distributed` 命令），或改用快速交换/进程交换模式以避免 ACL 绕过。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "Cisco IOS 分布式快速交换访问控制列表绕过漏洞"
updated = "2026-06-16T21:50:29.780"

