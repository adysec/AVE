[basic]
description = "Apache OFBiz 存在不正确的授权漏洞（CWE-863），未经身份验证的攻击者可利用未授权端点提交恶意的 Groovy 载荷，在 OFBiz 用户进程上下文中执行远程代码。该漏洞影响 Apache OFBiz 18.12.14 及之前所有版本，CVSS 评分为 9.8，属于严重危害等级。攻击者可完全控制受影响系统，导致敏感信息泄露、数据篡改或服务中断。该漏洞已被 CISA 列入已知被利用漏洞目录（KEV），实际野外攻击已发生。"
published = "2024-08-05"
remediation = "升级 Apache OFBiz 至 18.12.15 或更高版本以修复授权绕过漏洞。同时建议限制 /webtools/control/main/ProgramExport 等敏感接口的未授权访问，并遵循最小权限原则配置端点权限。"
score = 9.8
severity = "CRITICAL"
sources = [
    "cve",
    "hwpoc",
]
title = "Apache OFBiz 授权不当导致远程代码执行漏洞"
updated = "2024-08-27"

