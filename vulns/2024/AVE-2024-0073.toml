[basic]
description = "金和OA MailTemplates.aspx页面存在SQL注入漏洞。攻击者可通过构造恶意的tempID参数，在WAITFOR DELAY语句中注入SQL代码，导致数据库延迟执行，从而判断注入是否存在。该漏洞可被用于获取敏感数据，且无需身份认证即可远程利用。"
published = "2024-04-01"
remediation = "升级金和OA至最新安全版本，对MailTemplates.aspx页面的tempID参数进行严格的输入过滤和参数化查询，禁止直接拼接用户输入构造SQL语句，同时部署Web应用防火墙(WAF)防护SQL注入攻击。"
score = 5.0
severity = "MEDIUM"
sources = ["hwpoc"]
title = "金和OA MailTemplates.aspx SQL注入漏洞"
updated = "2026-07-17"

