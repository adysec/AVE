[basic]
description = "Microsoft SQL Server 7.0 在处理客户端连接所使用的 TDS（Tabular Data Stream）协议数据包时存在输入验证缺陷（CWE-20）。远程攻击者无需身份认证，只需向目标数据库服务端口（默认 1433）发送构造畸形或包含空数据的 TDS 数据包，即可触发服务端异常，导致 SQL Server 服务崩溃或停止响应，造成拒绝服务。该漏洞影响 Microsoft SQL Server 7.0 及 7.0 SP1 版本，攻击条件为攻击者能够与数据库服务建立网络连接并发送特制数据包，利用方式是通过网络发送畸形 TDS 报文使服务不可用，CVSS 评分 4.3，危害等级中等。"
published = "1999-11-19T05:00:00.000"
remediation = "升级到 Microsoft SQL Server 7.0 Service Pack 2（SP2）或以上版本以修复 TDS 包解析缺陷；若暂无法升级，应在边界防火墙限制 TCP 1433 端口仅允许受信任 IP 访问，并在网络层过滤畸形 TDS 数据包作为临时缓解措施。"
score = 4.3
severity = "MEDIUM"
sources = ["avd"]
