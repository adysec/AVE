[basic]
title = "Microsoft Exchange 5.0/5.5 SMTP/NNTP 拒绝服务漏洞"
description = "Microsoft Exchange Server 5.0 和 5.5 版本的 SMTP 服务（TCP 端口 25）和 NNTP 服务（TCP 端口 119）在处理畸形协议命令时存在拒绝服务漏洞。攻击者可发送特定畸形 SMTP/NNT P 数据包，导致 Internet Mail Service 或 Information Store 服务停止响应，造成拒绝服务。攻击不影响底层操作系统，服务重启即可恢复，但可能丢失未保存的邮件草稿。"
