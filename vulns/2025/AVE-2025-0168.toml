[basic]
description = "Google Chrome V8 引擎存在类型混淆漏洞（CWE-843），攻击者可通过构造特制的 HTML 页面诱导用户访问，成功利用可在浏览器沙箱上下文中实现任意读写操作，进而可能导致远程代码执行。该漏洞影响 Chrome 138.0.7204.96 之前版本，CVSS 评分 8.1，危害等级高。Google 已在 Chrome 138.0.7204.96 版本中修复此漏洞。"
published = "2025-06-30T22:15:29.873"
remediation = "建议立即将 Google Chrome 升级至 138.0.7204.96 及以上版本，该版本已修复 V8 引擎中的类型混淆漏洞。如无法立即升级，可启用 Chrome 的站点隔离功能（chrome://flags/#enable-site-per-process）并禁用 JavaScript 执行作为临时缓解；企业用户可通过组策略强制自动更新。同时建议使用基于 Chromium 的其他浏览器（如 Edge）的用户关注厂商同步更新。"
score = 8.1
severity = "HIGH"
sources = ["hwpoc"]
title = "Google Chrome V8 类型混淆远程代码执行漏洞"
updated = "2026-06-17T10:02:08.217"

