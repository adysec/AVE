[basic]
description = "Oracle 8 8.1.5 版本的智能代理组件存在安全漏洞，影响 Oracle Intelligent Agent 组件中的 dbsnmp 二进制程序。该漏洞源于 dbsnmp 通过 ORACLE_HOME 环境变量定位 nmiconf.tcl 配置脚本的可利用性，攻击者可通过设置恶意 ORACLE_HOME 环境变量，将控制权移交给自身的 TCL 脚本，从而实现局部权限提升。攻击者仅需具备目标系统的本地访问权限即可触发该漏洞，导致被攻击系统被完全接管。该漏洞影响 Oracle 8 及更高版本的 Intelligent Agent，攻击者可利用此漏洞获取更高权限，包括潜在的数据库权限，从而严重威胁 Oracle 8 数据库的安全性和完整性。"
published = "1999-08-16T04:00:00.000"
remediation = "升级至 Oracle 8.1.6 或更高版本以修复 dbsnmp 对 ORACLE_HOME 环境变量的信任问题。如无法立即升级，应限制 dbsnmp 可执行文件的权限（chmod 750 并归属专用低权账户），禁止普通用户设置 ORACLE_HOME，并通过 sudo 仅授权必要命令运行 dbsnmp，避免本地用户借 nmiconf.tcl 路径加载获取提权。"
score = 4.6
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Oracle Intelligent Agent 本地权限提升漏洞"
updated = "2026-06-16T21:49:15.940"

