[basic]
description = "Microsoft Internet Explorer 5.0 和 4.0.1 版本中存在 JavaScript URL 重定向漏洞 (MS99-043)，远程攻击者可通过构造恶意网页将数据重定向至 JavaScript 小程序，从而读取用户本地文件系统中的任意文件。该漏洞源于 IE 对 JavaScript URL 重定向处理不当，攻击者只需诱导用户访问精心构造的恶意页面，即可在无需用户交互的情况下窃取本地敏感文件。该漏洞影响 IE 5.0 和 4.0.1 版本，CVSS 评分 2.6（低危），攻击复杂度较高，需用户访问恶意页面触发。Microsoft 已在 MS99-043 安全公告中发布补丁修复此漏洞。"
published = "1999-11-17T05:00:00.000"
remediation = "升级到 Internet Explorer 6 SP1 或更高版本并应用 Microsoft 安全更新 MS02-018，建议同时更换为 Chrome/Firefox 等现代浏览器。如无法立即升级，可通过注册表禁用 JavaScript 协议处理，并在 Windows 防火墙阻止文件访问流量。"
score = 2.6
severity = "LOW"
sources = ["epss"]
