[basic]
description = "Microsoft FrontPage Server Extensions (PWS) 3.0.2.926 在处理超长 URL 时存在缓冲区溢出漏洞。远程攻击者无需认证即可通过发送特制长 URL 请求触发缓冲区溢出，导致目标服务器拒绝服务。该漏洞影响 Windows 95 平台上的 Personal Web Server。"
published = "2001-03-12"
remediation = "Microsoft FrontPage Server Extensions 已停止维护，建议升级至受支持的现代 Web 服务器平台（如 IIS），或迁移至其他安全的 Web 发布解决方案。"
