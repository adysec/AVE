[basic]
description = "Red Hat Piranha 虚拟服务器软件包中附带的 passwd.php3 CGI 脚本在处理用户输入时未对特殊字符进行过滤与转义，导致本地已认证或具有本地访问权限的用户可在传递给该脚本的参数中插入 Shell 元字符（如分号、反引号、管道符等）。攻击者在满足能够访问该 CGI 脚本所在的 Web 服务并具备本地执行环境的条件下，即可利用这些元字符注入并执行任意系统命令，从而完全控制服务器。该漏洞影响安装了 Piranha Virtual Server Package 的 Red Hat Linux 系统，CVSS 评分高达 10.0，危害等级为严重，属于本地命令执行类漏洞。"
published = "2000-04-24T04:00:00.000"
remediation = "升级到包含修复的 Red Hat Piranha 软件包（执行 `up2date piranha` 或安装 redhat 安全公告 RHSA-2000 对应更新）；若无法立即升级，应立即删除或移除 /usr/lib/piranha/passwd.php3 脚本，并限制该目录 CGI 执行权限，将 Web 服务以低权限用户运行，同时在防火墙限制对 piranha 管理端口的访问作为临时缓解。"
score = 10
severity = "CRITICAL"
sources = ["exploitdb"]
title = "Red Hat Piranha Virtual Server Package passwd.php3 任意命令执行漏洞"
updated = "2026-06-16T21:51:28.470"

