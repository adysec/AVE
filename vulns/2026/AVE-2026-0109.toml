[basic]
description = "Capgo 的 Supabase PostgREST 全局统计端点存在信息泄露漏洞，未认证的远程攻击者可利用公开的 apikey 直接访问 /rest/v1/global_stats 接口，无需任何额外身份验证即可获取 MRR、总收入、套餐收入细分、客户数量及运营遥测等敏感财务与业务指标数据。该漏洞影响 Capgo 12.128.2 之前的所有版本，CVSS 评分 8.7，危害等级高危。厂商已发布 12.128.2 版本修复此漏洞，建议在升级前通过反向代理或 WAF 限制对该端点的外部访问。"
published = "2026-07-12"
remediation = "立即升级到 Capgo 12.128.2 或更高版本；在升级前，通过反向代理/WAF 限制对 /rest/v1/global_stats 端点的外部访问，仅允许受信 IP 或内网访问；禁用不必要公开的 PostgREST 端点并轮换当前泄露的 public apikey。"
score = 8.7
severity = "HIGH"
sources = ["hwpoc"]
title = "Capgo PostgREST 全局统计端点信息泄露漏洞"
updated = "2026-07-13"

