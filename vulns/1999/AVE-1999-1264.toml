[basic]
description = "Sun Solaris 2.x、SunOS 4.x 以及 4.4 版本之前的 BSD 类操作系统存在 UNIX 域套接字访问控制绕过漏洞。系统内核在创建 UNIX 域套接字时未正确强制执行文件权限检查，导致套接字的访问权限设置被完全忽略。本地非授权用户可直接连接到这些套接字并向其写入数据，从而干扰或控制使用该套接字的应用程序，进而造成服务中断、数据篡改或权限提升等后果。"
published = "1997-05-17T04:00:00.000"
remediation = "建议将 Solaris 升级至已修复该问题的补丁集群版本（Solaris 2.6 安装 Sun 官方内核补丁后版本），BSD 系统升级至 4.4 或相应发行版修复版本（如 FreeBSD 3.2+）。在无法立即升级时，可改用 TCP 回路地址套接字或调整相关守护进程的数据目录权限为 0700 并归属专用用户，以限制本地非授权用户连接域套接字。"
score = 2.1
severity = "LOW"
sources = ["exploitdb"]
title = "Sun Solaris FreeBSD UNIX 域套接字访问控制绕过漏洞"
updated = "2026-06-16T21:50:21.837"

