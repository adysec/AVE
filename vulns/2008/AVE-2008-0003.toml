[basic]
description = "WordPress 的 Sniplets 插件 1.1.2 和 1.2.2 版本中存在多个跨站脚本漏洞，远程攻击者可通过向 view/sniplets/ 目录下的 warning.php、notice.php、inset.php 文件传递 text 参数、向 view/admin/submenu.php 传递 url 参数、或向 view/admin/pager.php 传递 page 参数注入任意 Web 脚本或 HTML 代码，在受害用户浏览器中执行恶意脚本，导致敏感信息泄露或会话劫持。攻击无需身份认证，影响所有使用该插件的 WordPress 站点。"
published = "2008-02-28T19:44:00.000"
remediation = "立即升级 Sniplets 插件至 1.2.3 或更高版本（1.2.3 为安全更新版本）。由于该插件已长期停止维护且不兼容新版 WordPress，建议在后台插件管理中停用并删除该插件，迁移至其他仍在维护的代码片段管理插件（如 Code Snippets）作为替代方案。"
score = 4.3
severity = "MEDIUM"
sources = ["nuclei"]
title = "WordPress Sniplets 插件跨站脚本漏洞"
updated = "2026-06-16T22:50:54.180"

