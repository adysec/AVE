[basic]
description = "IBM Net.Data 的 db2www CGI 程序存在缓冲区溢出漏洞，远程攻击者可通过向 CGI 程序发送超长 PATH_INFO 环境变量触发缓冲区溢出，从而在目标系统上执行任意命令。该漏洞影响使用 IBM Net.Data 的 Web 服务器，CVSS 评分 10.0，危害等级严重。攻击者无需身份认证即可远程利用此漏洞，建议受影响的用户及时安装 IBM 官方发布的补丁。"
published = "2000-10-20T04:00:00.000"
remediation = "立即将 IBM Net.Data 升级至 7.1 及以上版本（该版本修复了 db2www CGI 对 PATH_INFO 环境变量的长度校验问题）；如无法升级，建议从 CGI-BIN 目录中移除或重命名 db2www 可执行文件，或在 Web 服务器（Apache/IHS）配置中限制对该 CGI 脚本的访问，仅允许受信任来源调用。"
score = 10
severity = "CRITICAL"
sources = ["cve"]
title = "IBM Net.Data db2www CGI 缓冲区溢出远程代码执行漏洞"
updated = "2026-06-16T21:52:14.877"

