[basic]
description = "浪潮云财务系统 AllotOrderSrv.asmx Web 服务接口存在反序列化漏洞，攻击者可构造恶意 SOAP 请求，利用 .NET 反序列化机制在服务器上执行任意代码。攻击者无需认证即可发送精心构造的 SOAP 消息到该接口，通过恶意序列化对象实现远程代码执行，可完全控制服务器。影响浪潮云财务系统多个版本，攻击向量为网络远程调用，无需用户交互。"
published = "2025-01-07"
remediation = "建议立即联系浪潮官方技术支持获取云财务系统安全补丁并升级至最新版本。临时缓解措施：在 Web 应用防火墙（WAF）或反向代理层面封禁对 /AllotOrderSrv.asmx 接口的外网访问，仅允许内网受信 IP 调用；禁用 .asmx 服务中不必要的 SOAP 方法；开启 Web 服务的请求参数严格校验和反序列化白名单机制；监控该接口的异常调用日志。"
score = 8.5
severity = "HIGH"
sources = ["hwpoc"]
title = "浪潮 云财务系统 AllotOrderSrv.asmx 远程代码执行漏洞"
updated = "2025-07-01"

