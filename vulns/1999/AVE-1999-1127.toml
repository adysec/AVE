[basic]
description = "Sun HotSpot Performance Engine VM 存在输入验证缺陷，远程攻击者可通过向运行 HotSpot 的服务器发送包含 `[` 字符的特制 URL 触发该漏洞，导致目标服务崩溃并拒绝服务。该漏洞影响 Microsoft IIS 4.0 集成的 Sun Java HotSpot 组件，CVSS 评分 5.0，危害等级中等。攻击者无需身份认证即可远程利用，但无法实现代码执行。"
published = "1999-07-06T04:00:00.000"
remediation = "升级 Sun HotSpot Performance Engine 至包含 Bug ID 4254559 修复的版本，或禁用 HotSpot VM 改用其他 Java 虚拟机（如标准 JVM）。临时缓解措施可在 Web 服务器或反向代理层配置 URL 过滤规则，拦截包含 `[` 字符对 `/servlet/` 路径的请求（例如 IIS URLScan 工具或 Rewrite 模块），同时升级 IIS 至更高版本以减少攻击面。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Sun Java HotSpot Performance Engine 远程拒绝服务漏洞"
updated = "2026-06-16T21:50:31.667"

