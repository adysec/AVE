[basic]
description = "Netscape Enterprise Server 在处理 SSL 握手过程时存在缓冲区溢出漏洞，其根本原因是服务器对 SSL 握手阶段接收的数据缺乏充分的长度校验。未经身份认证的远程攻击者可通过向目标服务器的 SSL 端口发送特制的、超长的握手数据包，触发缓冲区溢出，导致服务进程崩溃，从而引发拒绝服务。攻击者仅需具备网络可达性即可发起攻击，无需任何凭据或用户交互。该漏洞影响 Netscape Enterprise Server 3.6 等版本，成功利用会造成 Web 服务不可用，CVSS 评分 5.0，危害等级中等。"
published = "1999-07-06T04:00:00.000"
remediation = "建议立即升级 Netscape Enterprise Server 至 3.6.1 或更高安全版本以修复 SSL 握手缓冲区溢出漏洞，或迁移至受支持的 iPlanet Web Server。如暂时无法升级，可在防火墙及反向代理设备上配置规则拦截包含超长记录的畸形 SSL 握手报文作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Netscape Enterprise Server SSL 握手缓冲区溢出拒绝服务漏洞"
updated = "2026-06-16T21:48:58.993"

