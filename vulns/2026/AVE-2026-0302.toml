[basic]
description = "Elixir Mint HTTP/1 客户端库的请求行编码函数 `encode_request_line/2` 未对调用者传入的 `method` 和 `target` 参数进行字符校验，直接将用户可控输入拼接至 HTTP/1 请求行中。攻击者可通过在 `method` 字段中注入 CRLF 控制字符提前终止请求行，进而注入任意 HTTP 请求头或通过管道技术（HTTP pipelining）在同一个 TCP 连接中走私完全由攻击者控制的第二个 HTTP 请求。该漏洞影响 Mint 0.1.0 至 1.9.0 之前的所有版本，当应用程序将用户可控输入作为 HTTP method 参数传递给 `Mint.HTTP.request/5` 时即可被利用，可能导致请求头伪造、缓存投毒或越权访问后端接口。"
published = "2026-06-02T16:16:44.470"
remediation = '升级 Mint 至 1.9.0 或以上版本（`mix deps.update mint`），该版本已对 method 字段进行 CRLF 字符校验。如无法立即升级，可在应用层对传入 Mint.HTTP.request/5 的 method 参数做严格校验，拒绝包含 `\r` 或 `\n` 的输入，并启用 `validate_request_target/2` 的默认校验。'
score = 2.1
severity = "LOW"
sources = ["ghsa"]
title = "elixir-mint Mint HTTP请求行CRLF注入漏洞"
updated = "2026-07-22T19:10:00.120"

