[basic]
description = 'Caucho Technology Resin 1.2（含更早版本）存在 JSP 源代码泄漏漏洞。远程攻击者无需身份认证，只需在 HTTP 请求中访问 .jsp 文件并在文件名后附加特定字符序列（如 ".."、"%2e.."、"%81"、"%82" 等），即可绕过服务器解析机制，直接获取 JSP 文件的原始源代码。该漏洞导致 Web 应用的业务逻辑、数据库连接信息等敏感配置暴露，攻击者可据此深入分析系统弱点并发起进一步攻击。'
published = "2000-11-23T05:00:00.000"
remediation = '升级 Resin 至 1.2.1 及以上版本，该版本修复了文件名特殊字符处理缺陷，对 JSP 请求路径进行规范化验证。如无法升级，在 Apache 前端通过 mod_rewrite 添加规则，拒绝包含 ".."、"%81"、"%82" 等字符的 .jsp 请求；或在应用层增加过滤器，对 .jsp 请求的 URL 参数进行严格校验和编码过滤，阻止路径遍历字符。'
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Caucho Technology Resin 1.2 JSP 源代码泄漏漏洞"
updated = "2026-06-16T21:53:25.010"

