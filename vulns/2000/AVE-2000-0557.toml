[basic]
description = "IBM WebSphere Server 3.0.2 存在 JSP 源代码泄露漏洞，由于服务器对文件扩展名的大小写处理不当，远程攻击者可通过将 JSP 文件扩展名改为大写（如将 .jsp 改为 .JSP）直接请求目标 URL，绕过服务器对 JSP 文件的编译执行机制，从而获取服务器端 JSP 文件的原始源代码。该漏洞可导致敏感业务逻辑和数据库配置等源码信息泄露，为攻击者进一步挖掘系统漏洞提供便利。CVSS 评分 7.5，危害等级高危。"
published = "2000-06-08T04:00:00.000"
remediation = "建议立即升级 IBM WebSphere Application Server 至 3.0.2.1 或更高版本，IBM 已针对 JSP 文件扩展名大小写处理问题发布专用 efix 补丁（参考 www-4.ibm.com/software/webservers/appserv/efix.html）。如无法立即升级，可在前端 Web 服务器（如 Apache、IHS）配置 URL 重写规则，将 .JSP、.Jsp 等大小写变体统一重定向为小写 .jsp 后缀，阻断源码直接泄露路径。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "IBM WebSphere Server JSP源代码泄露漏洞"
updated = "2026-06-16T21:51:51.583"

