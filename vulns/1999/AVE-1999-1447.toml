[basic]
description = "nlog CGI 脚本（nlog-smb.pl 和 rpc-nlog.pl）在处理用户提交的 IP 地址参数时，仅过滤了反引号、单引号、管道符等部分 shell 元字符，但未过滤分号和斜杠等关键字符，导致远程攻击者可通过 QUERY_STRING 注入任意系统命令。该漏洞影响 nlog 1.0 版本，攻击者无需身份认证即可利用，CVSS 评分 7.5，危害等级高。由于 nlog 常用于网络管理，若部署在网关上，攻击者可借此对内网主机发起进一步攻击。"
published = "1998-12-25T05:00:00.000"
remediation = "升级 nlog 至已修复版本，或编辑 rpc-nlog.pl 和 nlog-smb.pl，对 $ipaddr 输入增加 ; / $ ( ) & 等完整 shell 元字符过滤，并改用 Net::RPC 等 Perl 模块替代反引号执行外部命令。如无法修改代码，应在 Apache/Nginx 中禁用这两个 CGI 脚本的访问权限，或限制仅可信 IP 来源可调用。建议弃用 nlog 改用现代日志分析工具。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "nlog CGI脚本系统命令注入漏洞"
updated = "2026-06-16T21:50:05.807"

