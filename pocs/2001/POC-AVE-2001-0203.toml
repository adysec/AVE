[info]
author = "ave"
description = "通过发送包含 javascript:伪协议 HREF 或 onload 事件处理器的 HTML 页面，验证 eSafe Gateway 是否未能正确过滤 HTML 标签属性中的脚本代码。若网关返回的响应中仍包含原始脚本内容，则说明过滤被绕过。"
id = "POC-AVE-2001-0203"
name = "Aladdin eSafe Gateway HTML标签脚本过滤绕过 PoC"
severity = "high"
tags = ["ave-2001-0203"]
vuln_id = [
    "CVE-2001-0519",
    "AVE-2001-0203",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/test.html"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    '<A HREF="javascript:',
    "<BODY onload=",
]
