[basic]
description = "Microsoft Windows 95/98 存在 ARP 缓存欺骗漏洞。由于系统未能正确处理伪造的 ARP 数据包，远程攻击者可通过向目标网络发送特制的 ARP 响应报文，覆盖目标系统 ARP 缓存表中的静态条目，从而实施中间人攻击或导致网络通信重定向。该漏洞影响 Windows 95 和 Windows 98 操作系统，CVSS 评分 5.0，危害等级中危。攻击者需与目标处于同一广播域方可利用。"
published = "2000-06-29T04:00:00.000"
remediation = "Windows 95/98 已停止支持，微软不再提供安全更新，建议立即升级到受支持的 Windows 10/11 版本。临时缓解措施：在网卡上绑定静态 ARP 表项（arp -s 网关IP 网关MAC），部署 ARP 防火墙或使用交换机端口安全（DHCP Snooping + DAI）防御 ARP 欺骗攻击。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Microsoft Windows 9x/NT 4.0 ARP缓存表欺骗漏洞"
updated = "2026-06-16T21:52:06.560"

