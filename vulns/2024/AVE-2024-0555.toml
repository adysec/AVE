[basic]
description = "Linux 内核 UFS 驱动的 bsg 子系统中存在释放后使用（Use-After-Free）漏洞，在移除 bsg 设备后未将 bsg_queue 指针置为 NULL，导致后续对该已释放内存的访问可能触发 UAF。本地攻击者需具备低权限访问系统，利用此漏洞可实现权限提升，获取完全的内存读写能力，导致机密性、完整性和可用性均遭破坏。该漏洞影响 Linux 内核多个版本，Red Hat 评估为低危，但 NVD 评分为 7.8（高危）。各 Linux 发行版已通过安全更新修复此漏洞。"
published = "2025-02-27T03:15:10.770"
remediation = "立即升级 Linux 内核至以下已修复版本：5.10.237、5.15.181、6.1.129、6.6.79、6.12.16 或 6.13.4 及以上。Debian 11/12 用户安装 DLA-4178-1/DLA-4102-1 安全更新；SUSE 用户安装 SUSE-SU-2025:01951-1 等更新。Siemens SIMATIC S7-1500 MFP 用户升级固件至 V3.1.6 以上版本。如无法立即升级，可通过禁用受影响系统上的 UFS bsg 设备节点作为临时缓解措施。"
score = 7.8
severity = "HIGH"
sources = ["msrc"]
title = "Linux kernel SCSI UFS BSG 模块释放后使用漏洞"
updated = "2026-07-14T13:17:12.847"

