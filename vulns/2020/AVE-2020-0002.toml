[basic]
description = "Nokogiri 是一个提供 HTML、XML 解析功能的 Ruby 扩展库，其 `Nokogiri::XML::Schema` 组件在处理 XML Schema 时默认信任外部实体，存在 XML 外部实体（XXE）漏洞。远程攻击者可构造恶意的 XML Schema 文件，诱导应用程序解析后触发对外部资源的网络访问，导致敏感信息泄露或服务器端请求伪造（SSRF）攻击。该漏洞影响 Nokogiri 1.11.0.rc4 之前的所有版本，CVSS 评分 2.6，危害等级低。用户应升级至 1.11.0.rc4 或更高版本以修复此漏洞。"
published = "2020-12-30T19:15:12.920"
remediation = "将 Nokogiri 升级至 1.11.0.rc4 及以上版本，该版本修复了 XML::Schema 在 NONET 模式下仍允许网络请求的问题。如无法升级，避免对不可信输入使用 Nokogiri::XML::Schema 解析，或在解析前手动禁用外部实体加载。"
score = 2.6
severity = "LOW"
sources = ["msrc"]
title = "Nokogiri XML::Schema XXE漏洞"
updated = "2026-06-17T03:07:54.800"

