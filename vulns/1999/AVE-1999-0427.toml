[basic]
description = "某些使用 shadow 密码机制的 Linux 系统（如 Slackware Linux）中 POP3 邮件服务存在认证绕过漏洞。远程攻击者无需有效凭据即可通过 POP3 协议直接访问系统上的邮件文件，导致用户邮件数据泄露。该漏洞利用难度低，攻击条件仅需目标系统运行存在缺陷的 POP3 服务，影响范围涉及早期使用 shadow 密码的 Linux 发行版。"
published = "1995-03-01T05:00:00.000"
remediation = "该漏洞源于 Linux 系统使用 shadow 密码套件时，POP3 守护进程（popper）对邮件 spool 文件的访问控制检查不严，远程攻击者可绕过权限限制读取任意用户的邮件文件。受影响的 Slackware Linux 版本已停止官方支持，建议立即升级至 Slackware 4.0 及以上版本，或将 POP3 守护进程更新至 qpopper 2.3 以上版本，并确保 shadow 套件与 PAM 模块配合使用。如无法立即升级，可在 inetd.conf 中注释掉 pop3 服务行并在防火墙上关闭 TCP 110 端口以阻断远程 POP3 访问。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "Linux 系统 Shadow Passwords POP3 邮件文件远程访问漏洞"
updated = "2026-06-16T21:47:59.133"

