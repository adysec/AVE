[basic]
description = "AgentSyste 代理商管理系统存在 Struts2 远程代码执行漏洞。由于系统使用了存在缺陷的 Struts2 框架，攻击者在未经认证的情况下，可向 /login.action 接口发送特制的 POST 请求，通过构造恶意的 OGNL 表达式禁用方法执行限制并调用 Runtime.exec 执行任意系统命令，从而导致服务器被完全控制。该漏洞危害严重，影响部署了该版本 AgentSyste 管理系统的所有服务器。"
published = "0701"
remediation = "将 Apache Struts2 升级至 2.3.32 或 2.5.10.1 及以上版本（对应 CVE-2017-5638 修复版本），同时移除或禁用 login.action 中不必要的 debug 调试参数接口。如无法升级框架，可在 Web 应用防火墙（WAF）层拦截包含 `xwork.MethodAccessor.denyMethodExecution`、`ognl`、`#context` 等关键字的 POST 请求体作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "AgentSyste 代理商管理系统 login.action Struts2 远程代码执行漏洞"
updated = "0701"

