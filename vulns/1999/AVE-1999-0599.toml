[basic]
description = "metamail 邮件处理工具包中存在 shell 元字符注入漏洞，在将邮件内容传递给 mailcap 条目处理时未对 shell 元字符进行正确引号转义，导致远程攻击者可通过向目标用户发送特制邮件触发命令执行。攻击者利用该漏洞可在受害者系统上以当前用户权限执行任意命令，影响广泛部署 metamail 的 Unix/Linux 系统。CVSS 评分 7.5，危害等级高。"
published = "1999-02-04T05:00:00.000"
remediation = "升级 metamail 至 2.7-9 或更高版本，该版本已对 mailcap 文件中的 shell 元字符进行正确转义处理。如无法升级，可临时移除或禁用系统中所有不可信来源的 mailcap 配置项，同时限制邮件客户端自动调用 metamail 处理附件。在 sendmail 环境下，建议禁用自动执行 mailcap 条目的功能，并审查 /etc/mailcap 及用户 ~/.mailcap 中的每条规则，确保不含未引用的 shell 元字符。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "Metamail mailcap 条目未过滤 shell 元字符远程命令执行漏洞"
updated = "2026-06-16T21:48:14.403"

