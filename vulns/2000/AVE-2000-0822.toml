[basic]
description = "Recourse ManTrap 1.6 蜜罐系统中存在隐藏进程泄露漏洞。攻击者可通过对比 kill 命令结果与 /proc 文件系统中的进程列表，发现被隐藏的进程，从而判断自身处于蜜罐环境而非真实系统。该漏洞导致蜜罐的隐蔽性失效，使其欺骗和溯源功能无法正常发挥，影响 ManTrap 1.6 及 1.6.1 版本。CVSS 评分 2.1，危害等级低。"
published = "2001-01-09T05:00:00.000"
remediation = '建议升级到 ManTrap 1.6.1 或更高版本，该版本已修复 /proc 文件系统中进程信息未正确隐藏的问题。如无法升级，可通过内核安全模块（如 SELinux/AppArmor）限制非特权用户对 /proc/\<PID\> 目录的访问权限，或在系统层面使用 hidepid 选项重新挂载 /proc 文件系统，防止攻击者通过对比 kill 命令结果与 /proc 列表来识别蜜罐环境。'
score = 2.1
severity = "LOW"
sources = ["exploitdb"]
title = "Recourse ManTrap 1.6 蜜罐系统隐藏进程信息泄露漏洞"
updated = "2026-06-16T21:53:14.330"

