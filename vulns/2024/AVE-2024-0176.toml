[basic]
description = "AspCMS 系统的 /plug/comment/commentList.asp 接口存在 SQL 注入漏洞。该接口在处理 id 参数时未对用户输入进行严格的过滤与参数化校验，攻击者可构造特殊的 SQL 语句（如通过 id=-1 union select ... 从用户表中提取 UserID、LoginName、Password 等敏感字段）拼接至后台数据库查询中。未经身份认证的远程攻击者只需向目标站点发送特制的 HTTP 请求即可利用此漏洞，成功读取管理员账号与密码等核心数据，进而可能获取系统后台权限。该漏洞影响使用存在缺陷版本 AspCMS 的各类网站，攻击门槛低、危害较大。"
published = "0807"
remediation = "升级 AspCMS 至官方已修复版本（建议 2.5.7 及以上），并修改 /plug/comment/commentList.asp 中对 id 参数的处理逻辑，使用参数化查询替代字符串拼接；在 Web 应用防火墙中启用 SQL 注入防护规则拦截 id 参数中的特殊字符作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
