[basic]
description = "Adobe ColdFusion 9.0、9.0.1 及 9.0.2 版本存在敏感信息泄露漏洞，攻击者可通过未指定的向量远程获取服务器敏感信息。该漏洞无需身份认证即可利用，攻击复杂度低，且已在 2013 年 1 月被野外利用。成功利用可导致配置文件、数据库凭证等敏感数据泄露，进一步扩大攻击面。该漏洞已被纳入 CISA 已知被利用漏洞目录（KEV），建议立即修复。"
published = "2013-01-09T01:55:03.617"
remediation = "立即升级 Adobe ColdFusion 至 9.0.2 并安装 APSB13-03 安全公告中提供的累积热修复（Cumulative Hotfix），或升级至 ColdFusion 10 及以上版本。如无法立即升级，在 Web 服务器（IIS/Apache）层面配置访问控制策略，限制对 CFIDE/ 及 CFIDE/administrator 目录的访问仅允许受信管理 IP，并禁用未使用的 ColdFusion Web 服务组件以缩小攻击面。"
score = 7.5
severity = "HIGH"
sources = ["kev"]
title = "Adobe ColdFusion 敏感信息泄露漏洞"
updated = "2026-06-16T23:49:47.907"

