[basic]
description = "索贝 SCMS 内容管理系统的 watermark 文件上传接口存在任意文件上传漏洞。攻击者无需身份认证即可通过 POST 请求向 `/sobey-mchEditor/watermark/upload` 路径上传恶意文件，服务器未对上传文件的类型、内容进行有效校验，导致攻击者可上传 webshell 等恶意脚本从而获取服务器控制权限。该漏洞可导致服务器被远程控制、数据泄露或进一步内网渗透。"
published = "0705"
remediation = "升级索贝 SCMS 至官方最新版本，或联系厂商获取安全补丁。临时缓解措施：在 Web 服务器层限制 `/sobey-mchEditor/watermark/upload` 路径仅允许已认证管理员访问；配置上传目录禁止脚本执行权限；严格校验上传文件类型，仅允许图片格式（jpg/png/gif）并重命名文件。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "索贝 SCMS 内容管理系统任意文件上传漏洞"
updated = "0705"

