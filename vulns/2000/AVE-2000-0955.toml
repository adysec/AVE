[basic]
description = "Check Point VPN-1/FireWall-1 4.1 及更早版本中的 OPSEC 通信认证机制（fwn1）存在认证绕过漏洞。远程攻击者无需身份认证即可利用该漏洞伪造合法连接，绕过安全策略控制，实现对目标系统的未授权访问。攻击者可通过构造特制的 OPSEC 协议数据包欺骗防火墙认证过程，导致机密性、完整性和可用性受损。该漏洞 CVSS 评分 7.5，危害等级高。"
published = "2000-11-14T05:00:00.000"
remediation = "立即升级 Check Point VPN-1/FireWall-1 至 4.1 Service Pack 2 及以上版本，该版本修复了 OPSEC 认证机制中的欺骗漏洞。如无法升级，可在防火墙上配置 OPSEC 认证访问控制列表（ACL），仅允许受信任 IP 地址发起 OPSEC 连接，并启用 fwn1 模块的强认证选项以降低被欺骗风险。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "Check Point VPN-1/FireWall-1 OPSEC 认证欺骗漏洞"
updated = "2026-06-16T21:52:31.310"

