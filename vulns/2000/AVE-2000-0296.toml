[basic]
description = "Sniffit 0.3.x 的 -L 日志记录功能存在缓冲区溢出漏洞，远程攻击者可通过向 Sniffit 监听的 SMTP 端口发送包含超长 MAIL FROM 邮件头的恶意数据包触发该漏洞，导致缓冲区溢出，进而实现任意命令执行。该漏洞影响 Sniffit 0.3.6 HIP 及 0.3.7 Beta 版本，攻击者无需任何身份认证即可远程利用，危害严重。"
published = "2000-05-02"
remediation = "立即停止使用 Sniffit 0.3.x 系列版本，该软件已停止维护且无官方补丁。建议迁移至 tcpdump 或 Wireshark 等现代网络分析工具。如无法立即替换，应避免使用 -L 日志记录选项处理不可信邮件流量，并在网络边界过滤 SMTP 协议中的超长 MAIL FROM 头部。"
score = 10.0
severity = "CRITICAL"
sources = [
    "cve",
    "exploitdb",
]
title = "Sniffit 0.3.x Mail Logging 缓冲区溢出漏洞"
updated = "2026-06-16"

