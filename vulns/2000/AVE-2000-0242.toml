[basic]
description = "Linux trustees 内核安全补丁在处理超长文件或目录路径名时存在缺陷，攻击者通过访问具有超长名称的文件或目录即可触发缓冲区溢出，导致系统内核崩溃或不可用。该漏洞仅在本地可访问系统的攻击条件下可被利用，影响安装了 trustees 补丁的 Linux 系统，造成本地拒绝服务（DoS）后果。"
published = "2000-04-10"
remediation = "移除或更新 Linux trustees 内核补丁至无此缺陷的最新版本，或禁用 trustees 对超长路径名的特殊处理机制，确保系统不加载存在该缺陷的补丁版本。"
score = 2.1
severity = "LOW"
sources = ["cve"]
title = "Linux Trustees 内核补丁长路径名拒绝服务漏洞"
updated = "2020-06-16"

