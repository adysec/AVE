[basic]
description = "IBM AIX 4.2 系统中的 lchangelv 工具存在本地缓冲区溢出漏洞，攻击者可通过向该程序传递特制的超长参数触发缓冲区溢出，从而覆盖内存中的返回地址以劫持程序执行流程，最终获取 root 权限。该漏洞需要攻击者拥有本地账号才能利用，影响 IBM AIX 4.2 及更早版本，CVSS 评分 7.2，危害等级高。"
published = "1997-07-21T04:00:00.000"
remediation = "升级 IBM AIX 至 4.3 及以上版本，该漏洞已在后续版本中修复。如无法升级，可执行 `chmod 0500 /usr/sbin/lchangelv` 移除 setuid root 权限，限制普通用户执行该命令，防止本地提权攻击。也可通过 IBM APAR IX72386 获取单独补丁进行修复。"
score = 7.2
severity = "HIGH"
sources = ["epss"]
title = "IBM AIX 4.2 lchangelv 本地缓冲区溢出漏洞"
updated = "2026-06-16T21:47:38.147"

