[basic]
description = "Sendmail 8.8.x 及 8.9.2 版本在处理邮件头时存在拒绝服务漏洞。远程攻击者无需身份认证即可通过向目标邮件服务器发送包含大量邮件头的特制邮件消息，触发 Sendmail 的邮件头预扫描（headers prescan）过程消耗过度资源，导致服务崩溃或无法响应正常请求，造成拒绝服务。CVSS 评分 5.0，危害等级中危。"
published = "1999-01-01T05:00:00.000"
remediation = "升级至 Sendmail 8.9.3 或更高版本，该版本修复了 headers prescan 处理逻辑中的缺陷。若无法升级，可在 sendmail.cf 中限制每个邮件的最大头部数量（MaxHeadersLength 参数），并在 MTA 层面配置 rate limiting 限制单连接请求频率以缓解 DoS 攻击。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Eric Allman Sendmail 头扫描拒绝服务漏洞"
updated = "2026-06-16T21:48:18.040"

