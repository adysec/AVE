[basic]
description = "Solaris AnswerBook2 中的 dwhttpd Web 服务器管理接口存在命令注入漏洞，远程攻击者可通过在请求参数中注入 shell 元字符（如分号、管道符等）绕过输入过滤，在服务器上以 Web 进程权限执行任意系统命令。未经身份认证的攻击者无需任何前置条件即可远程利用该漏洞，完全控制受影响的 Solaris 系统。"
published = "2000-10-20"
remediation = "立即安装 Sun 发布的补丁 110011-02 (SPARC) 或 110012-02 (x86)，将 AnswerBook2 升级到 v1.4.2 或更高版本。如无法立即打补丁，可在防火墙上限制对端口 8888 的访问，仅允许可信 IP 连接，或临时禁用 AnswerBook2 服务以消除风险。"
score = 10.0
severity = "CRITICAL"
sources = ["cve"]
title = "Solaris AnswerBook2 远程命令执行漏洞"
updated = "2000-10-20"

