[basic]
description = "AT&T WinVNC（虚拟网络计算）客户端 3.3.3r7 及更早版本存在基于栈的缓冲区溢出漏洞。远程攻击者可通过向目标 VNC 客户端发送特制的 rfbConnFailed 数据包，在其中包含超长 reason 字符串，触发缓冲区溢出，导致任意代码执行。该漏洞可被用于在受害者主机上执行恶意代码，影响范围广泛。目前已存在 Metasploit 框架的公开利用模块。"
published = "2001-05-03T04:00:00.000"
remediation = "升级 VNC 客户端至 4.x 或更高版本，该漏洞存在于 3.3.3r7 及更早版本的 WinVNC 客户端 rfbConnFailed 消息处理中，新版本已修复此缓冲区溢出问题。如无法升级，建议使用 TightVNC、UltraVNC 等替代客户端连接远程桌面，并在网络边界限制 VNC 协议（默认端口 5900）仅允许可信来源访问。"
score = 7.6
severity = "HIGH"
sources = ["exploitdb"]
title = "AT&T WinVNC (RealVNC) 客户端缓冲区溢出漏洞"
updated = "2026-06-16T21:53:47.753"

