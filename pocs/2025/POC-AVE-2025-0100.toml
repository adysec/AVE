[info]
author = "AVE"
description = "检测 Microsoft SharePoint Server ToolShell 反序列化漏洞，通过向 /_layouts/15/ToolPane.aspx 发送特制请求触发远程代码执行"
id = "POC-AVE-2025-0100"
name = "CVE-2025-53770 PoC"
severity = "critical"
tags = ["cve-2025-53770"]
vuln_id = [
    "CVE-2025-53770",
    "AVE-2025-0100",
]

[poc]
logic = "all"

[[poc.requests]]
method = "POST"
path = "/{{BaseURL}}/_layouts/15/ToolPane.aspx"
protocol = "http"

[poc.requests.body]
content = ""
type = "raw"

[poc.requests.headers]
Content-Type = "application/x-www-form-urlencoded"
User-Agent = "AVE/1.0"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "Microsoft SharePoint",
    "ToolPane",
]
