[basic]
description = "A-V Tronics InetServ 3.0 是一款提供 WebMail 等服务的服务器软件，其 WebMail 组件在处理超长 GET 请求时存在缓冲区溢出漏洞，攻击者无需认证即可远程发送特制请求触发缓冲区溢出，从而在目标系统上执行任意命令，完全控制受影响服务器。"
published = "2000-01-17"
remediation = "该软件已停止维护，建议升级到不受影响的最新版本或替换为其他同类安全的产品，如 Apache + Roundcube WebMail 组合。"
score = 10.0
severity = "CRITICAL"
sources = ["cve"]
title = "A-V Tronics InetServ 3.0 WebMail 缓冲区溢出漏洞"
updated = "2000-01-17"

