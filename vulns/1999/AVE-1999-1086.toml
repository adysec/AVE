[basic]
description = "Internet Explorer 5.0 的安装向导 (ie5setup.exe) 在无人值守安装过程中会禁用屏幕保护程序和任务计划程序服务。若安装过程发生故障，系统将处于登录状态下而无屏保保护，使具有物理接触权限的攻击者可利用该配置缺陷获取系统访问权限。同时任务计划程序被禁用可能导致安全关键程序无法按时执行，降低系统整体安全性。CVSS 评分 7.2，危害等级高。"
published = "1999-03-23T05:00:00.000"
remediation = "该漏洞存在于 Internet Explorer 5.0 安装程序 (ie5setup.exe) 中，微软已在后续版本修复。建议立即升级至 Internet Explorer 6.0 及以上版本，或使用现代浏览器（如 Edge/Chrome/Firefox）替代。如暂时无法升级，请在 ie5setup.exe 完成安装后手动重新启用屏幕保护程序（控制面板→显示→屏幕保护程序）和任务计划程序服务（services.msc→Task Scheduler→启动）。"
score = 7.2
severity = "HIGH"
sources = ["epss"]
title = "Microsoft Internet Explorer 5.0 安装向导信息泄露漏洞"
updated = "2026-06-16T21:50:17.730"

