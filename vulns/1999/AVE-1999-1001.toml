[basic]
description = "tags.<value>Cisco IOS 11.2 及更早版本所配套的 Cisco Cache Engine 在实现 Web 缓存控制协议（WCCP）时未引入任何认证机制。WCCP 通过 UDP 2048 端口通信，用于协调缓存引擎与路由器之间的流量重定向。由于协议缺乏身份校验，未经过认证的远程攻击者可向目标路由器的 UDP 2048 端口伪造并发送 WCCP 报文，从而将经过该设备的 HTTP 流量重定向至攻击者可控的任意主机，进而实施中间人劫持、流量监听或钓鱼攻击。该漏洞影响运行 Cisco IOS 11.2 及更早版本且启用 WCCP 功能的 Cisco 网络设备与缓存引擎，攻击只需网络可达目标 UDP 2048 端口，无需本地权限或用户交互，利用门槛低、危害较大。"
published = "1999-12-31T05:00:00.000"
remediation = '升级 Cisco IOS 至 11.3 或更高版本以启用 WCCP 身份验证功能；若暂时无法升级，请在路由器上执行 "no ip wccp" 命令禁用 WCCP 服务，或在防火墙层面阻断 UDP 2048 端口防止未授权流量重定向。'
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "Cisco IOS Cache Engine Web Cache Control Protocol 认证漏洞"
updated = "2026-06-16T21:49:52.753"

