[basic]
description = "RealNetworks RealServer 7.0/7.0.1/8.0 Beta 版本的 viewsource 目录存在拒绝服务漏洞，远程未经身份验证的攻击者可通过向 viewsource 目录发送畸形的页面请求触发该漏洞，导致服务器拒绝服务。该漏洞影响 RealNetworks RealServer 7.0、7.0.1 及 8.0 Beta 版本，CVSS 评分 7.8（AV:N/AC:L/Au:N/C:N/I:N/A:C），攻击向量为网络、攻击复杂度低、无需认证、仅影响可用性。攻击者只需发送精心构造的畸形 HTTP 请求访问 viewsource 目录下的页面即可触发拒绝服务，导致服务器停止响应。ExploitDB 已公开 PoC 利用代码（EDB-19977），RealNetworks 已发布补丁修复此漏洞，建议升级至修复版本。"
published = "2000-06-01T04:00:00.000"
remediation = "立即更新 RealNetworks RealServer 到支持修复的安全版本，实施输入验证以拒绝 malformed 请求，并禁用 viewsource 目录访问权限作为临时缓解措施。"
score = 7.8
severity = "HIGH"
sources = ["avd"]
title = "RealNetworks RealServer 查看目录拒绝服务漏洞"
updated = "2026-06-16T21:51:48.737"

