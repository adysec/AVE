[basic]
description = 'Cacti 网络流量监控系统 0.6.8 之前版本的控制台模式中存在命令执行漏洞。具有控制台访问权限的攻击者可通过在"Data Input"（数据输入）选项中注入恶意系统命令，利用该漏洞在服务器上以 Web 服务进程权限执行任意命令，进而完全控制目标系统。该漏洞影响 Cacti 0.6.8 之前所有版本，攻击者只需拥有控制台登录权限即可触发，无需其他特殊条件，危害严重。'
published = "2003-04-22T04:00:00.000"
remediation = "立即将 Cacti 升级至 0.6.8 或更高版本。Debian 系统可参考 DSA-164 安全公告安装更新包。如无法立即升级，可在 Web 服务器层面限制对 Cacti 控制台管理页面的访问 IP，并禁用未授权的 Data Input 功能作为临时缓解措施。"
score = 10
severity = "CRITICAL"
sources = ["osv"]
title = "Raxnet Cacti 控制台命令执行漏洞"
updated = "2026-06-16T21:59:24.197"

