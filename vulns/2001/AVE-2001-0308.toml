[basic]
description = 'Apache HTTP Server 1.3.20 在启用 Multiviews 选项时存在目录索引信息泄露漏洞，远程未认证攻击者可通过发送包含 "M=D" 查询字符串的 URL 请求，绕过默认索引页面直接获取目录列表内容，导致服务器目录结构和文件信息泄露。该漏洞影响启用 Multiviews 选项的 Apache 1.3.20 版本，攻击者无需身份认证即可通过网络远程利用，攻击复杂度低，CVSS 评分 5.0（中危），主要影响机密性。攻击者只需构造包含 "M=D" 参数的 HTTP 请求即可绕过索引页面直接列出目录内容，获取敏感文件列表信息。Apache 已在后续版本中修复此漏洞，建议升级至修复版本或禁用 Multiviews 选项。'
published = "2001-10-01T04:00:00.000"
remediation = "升级 Apache 至 1.3.21 或更高版本（已修复该漏洞）。若暂时无法升级，请在 httpd.conf 中将 Options Indexes FollowSymLinks MultiViews 修改为 Options FollowSymLinks（移除 Indexes 和 MultiViews），或在目录级配置添加 <Directory /> Options -Indexes -MultiViews </Directory> 禁用目录索引与多视图功能。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Apache HTTP Server 目录索引信息泄露漏洞"
updated = "2026-06-16T21:54:51.233"

