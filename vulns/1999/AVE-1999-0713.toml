[basic]
description = "Pacific Software URL Live! 1.0 Web 服务器存在目录遍历漏洞，由于未对用户请求中的文件路径进行充分过滤和验证，远程攻击者可通过在 URL 中插入 .. (点线) 序列突破目录限制，读取服务器上的任意文件。该漏洞无需身份认证即可利用，攻击者只需向目标服务器发送包含特制路径的 HTTP 请求，即可访问 Web 根目录之外的敏感文件（如系统配置文件或密码文件）。"
published = "1999-10-28T04:00:00.000"
remediation = '升级 Pacific Software URL Live! 至修复了该目录遍历缺陷的后续版本（联系厂商获取 1.0 之后的补丁版本）；如暂无法升级，应在 Web 服务器配置中禁止对外访问包含 ".." 序列的请求路径，并配合前端反向代理或防火墙规则过滤包含 "../" 的 URL 请求，限制服务器仅能读取 Web 根目录内的文件。'
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Pacific Software URL Live! 1.0 目录遍历漏洞"
updated = "2026-06-16T21:49:19.300"

