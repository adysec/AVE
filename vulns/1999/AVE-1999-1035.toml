[basic]
description = "Novell UnixWare 1.1 系统中的 urestore 恢复工具存在权限许可漏洞，本地普通用户可利用该程序在处理文件恢复操作时未正确验证权限的缺陷，通过精心构造的恢复请求绕过系统权限检查，从而获取 root 超级用户权限。攻击者需要拥有本地系统访问权限，无需身份认证即可利用，成功利用后可完全控制目标系统，造成机密性、完整性和可用性全面丧失。该漏洞影响 Novell UnixWare 1.1 版本。"
published = "1999-12-31T05:00:00.000"
remediation = "建议升级到 Novell UnixWare 2.0 或更高版本。如无法升级，可立即移除 `/bin/urestore` 的 setuid 权限：`chmod u-s /bin/urestore`。同时限制本地用户登录权限，仅允许受信任的管理员通过 su/sudo 执行特权操作，并在系统层面启用文件访问审计 (audit) 以监控异常提权行为。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "Novell UnixWare urestore 本地权限提升漏洞"
updated = "2026-06-16T21:50:09.703"

