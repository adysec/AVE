[basic]
description = "Microsoft IIS 在处理包含 Visual Basic Script 的 ASP 页面时，VBScript 引擎对脚本中使用的正则表达式（RegExp 对象 Pattern 属性）缺乏有效校验，当传入非法或不完整的正则表达式时，VBScript 运行时（vbscript.dll）会触发访问违例（Exception C0000005），导致承载 Web 服务的 Inetinfo.exe 进程崩溃，从而引发拒绝服务。攻击者须具备在服务器上创建或修改 ASP 页面的本地权限，通过在 ASP 页面中写入含无效正则表达式的 VBScript 代码并请求该页面，即可触发服务崩溃，使 IIS 停止响应所有 HTTP 请求。该漏洞主要影响 Windows NT 4.0 Enterprise 上运行 Service Pack 6 及 6a 版本 IIS 的系统。Microsoft 后续通过安全更新修复了 VBScript 引擎对正则表达式的异常处理机制，建议受影响用户及时安装补丁并限制本地用户的 ASP 页面写入权限。"
published = "2000-01-21T05:00:00.000"
remediation = "建议将 Microsoft IIS 升级至 Windows 2000 Service Pack 1 或安装微软 2000 年 2 月发布的安全更新（MS00-008），以修复 VBScript 正则表达式处理缺陷。如无法立即升级，可在 IIS 管理控制台中取消匿名用户对存放 ASP 页面的虚拟目录的执行权限，并仅允许受信任用户访问，同时限制本地普通账户对 Web 目录的写权限作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
