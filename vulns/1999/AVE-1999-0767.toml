[basic]
description = "Linux Kernel 2.0/2.1 版本中存在 ICMP Smurf 拒绝服务漏洞。攻击者通过向目标网络的广播地址发送源地址伪造的 ICMP Echo 请求数据包，该网络中的所有主机都会向伪造的源地址（受害者）发送 ICMP Echo 响应，形成流量放大攻击，导致目标系统网络带宽被耗尽而无法提供正常服务。该漏洞影响 Linux Kernel 2.0/2.1 及 Digital UNIX、FreeBSD、HP-UX、IBM AIX、NetBSD、Solaris 等多个操作系统版本，攻击条件为目标网络允许定向广播（Directed Broadcast）且未配置相关防护措施。"
published = "1998-01-05T05:00:00.000"
remediation = "在路由器上禁用 IP 定向广播功能（no ip directed-broadcast），并在各主机操作系统层面禁止响应 ICMP 广播请求（如 Linux 设置 net.ipv4.icmp_echo_ignore_broadcasts=1），同时部署网络入口过滤防止源地址伪造。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Linux Kernel ICMP Smurf 拒绝服务漏洞"
updated = "2026-06-16T21:48:33.307"

