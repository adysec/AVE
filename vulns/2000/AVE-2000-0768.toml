[basic]
description = "L-Soft Listserv 1.8d 及更早版本的 Web 归档组件中存在缓冲区溢出漏洞。远程攻击者可通过向该组件发送特制超长查询字符串触发溢出，从而在目标系统上执行任意命令。该漏洞影响广泛部署的邮件列表管理软件 Listserv，CVSS 评分 7.5，危害等级高。厂商已发布修复版本，建议升级至 1.8e 或更新版本。"
published = "2000-07-17T04:00:00.000"
remediation = "立即升级 L-Soft Listserv 至 1.8e 或更高版本。如无法升级，临时缓解措施为在 Web 服务器配置中移除或禁用 web archive CGI 组件（如 wa.exe），并限制外部流量对该组件的访问。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "L-Soft Listserv Web Archive 组件缓冲区溢出远程代码执行漏洞"
updated = "2026-06-16T21:52:09.080"

