[info]
author = "AVE"
description = "Microsoft Java Virtual Machine getSystemResourceAsStream 信息泄露漏洞验证。通过恶意 Java Applet 利用 ClassLoader.getSystemResourceAsStream() 读取本地文件。"
id = "POC-AVE-2000-00001"
name = "CVE-2000-0132 PoC"
severity = "low"
tags = ["cve-2000-0132"]
vuln_id = [
    "CVE-2000-0132",
    "GHSA-4r25-8qgq-j8pv",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/Test.class"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["CA FE BA BE"]
