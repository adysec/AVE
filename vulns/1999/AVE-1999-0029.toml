[basic]
description = "Windows NT 4.0 SP4 的 KnownDLLs 缓存机制存在安全漏洞，本地攻击者可通过修改 KnownDLLs 列表，将系统 DLL 路径指向恶意程序，从而在系统下次加载该 DLL 时以管理员权限执行恶意代码。该漏洞需要本地用户权限才能利用，攻击条件较为局限，但一旦成功可完全控制受影响系统。"
published = "1999-02-20T05:00:00.000"
remediation = "安装 Windows NT 4.0 Service Pack 5 或更高版本以修复 KnownDLLs 缓存权限漏洞。由于 Windows NT 4.0 已停止支持，建议将系统升级至仍在安全更新周期内的 Windows Server 版本，同时在组策略中限制交互式用户对系统目录的写入权限作为临时缓解。"
score = 4.6
severity = "MEDIUM"
sources = ["avd"]
title = "Microsoft Windows NT 4.0 SP4 KnownDLLs 本地权限提升漏洞"
updated = "2026-06-16T21:48:15.863"

