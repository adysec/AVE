[basic]
description = "MetaInfo MetaWeb Web 服务器存在严重的安全访问控制缺陷，未经身份认证的远程攻击者可直接向目标服务器上传、执行和读取任意脚本文件。该漏洞影响 MetaInfo Sendmail 2.0/2.5 及 MetaIP 3.1 等产品，CVSS 评分 10.0，危害等级严重。攻击者无需任何认证即可通过 HTTP 请求将恶意脚本（如 CGI 脚本）上传至服务器并远程执行，从而完全控制受影响的系统。"
published = "1999-01-01T05:00:00.000"
remediation = "MetaInfo MetaWeb 服务器已停止维护多年且不再提供安全补丁，建议立即停用该服务并迁移至 Apache httpd 或 Nginx 等现代 Web 服务器。迁移前作为临时缓解措施，应移除上传目录的执行权限（如配置 `php_flag engine off`），并将文件上传目录隔离至 Web 根目录之外。"
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "MetaInfo MetaWeb 服务任意脚本上传与执行漏洞"
updated = "2026-06-16T21:48:02.347"

