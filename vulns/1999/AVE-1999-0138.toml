[basic]
description = 'NetApp C630 Netcache 设备中存在 SNMP 默认团体字符串安全配置漏洞。管理员尝试禁用默认的 "public" 团体字符串后，该字符串仍未被正确移除，导致攻击者可通过 SNMP 协议利用默认团体字符串远程访问设备，获取系统敏感信息。该漏洞影响 NetApp C630 Netcache 设备，CVSS 评分 5.0，危害等级中危。建议管理员手动确认并彻底删除默认团体字符串配置。'
published = "1999-04-07T04:00:00.000"
remediation = '立即检查 NetApp NetCache C630 设备上的 SNMP 配置，确认默认 community string "public" 是否已被禁用或修改为自定义复杂字符串。由于该产品已停止支持且无官方补丁，建议在设备 ACL 中限制 SNMP（UDP 161/162）仅允许受信任管理 IP 访问，或直接禁用 SNMP 服务。对于仍在运行的旧设备，应尽快迁移至受支持的替代产品。在 Brocade 等后续受影响产品中，升级至厂商确认不受影响的固件版本。'
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "NetApp NetCache SNMP 默认团体名安全绕过漏洞"
updated = "2026-06-16T21:48:28.237"

