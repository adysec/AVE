[basic]
description = "Netopia Timbuktu Pro 远程控制软件以明文方式传输用户 ID 和口令，攻击者无需身份认证即可通过网络嗅探截获这些敏感凭据。该漏洞允许在同一网络段的攻击者利用数据包捕获工具拦截登录过程中的账号密码，进而获取系统访问权限。受影响版本为 Netopia Timbuktu Pro，攻击条件简单，仅需与目标处于同一广播域即可实施嗅探攻击。"
published = "2000-01-18T05:00:00.000"
remediation = '升级到支持加密认证传输的 Netopia Timbuktu Pro 6.0 及以上版本，在客户端开启"加密网络登录"选项，配置使用 3DES 或 Blowfish 加密协议保护凭证传输。如无法升级，应在网络边界防火墙限制 TCP/UDP 407 端口的访问来源 IP，或通过 SSH 隧道/VPN 封装 Timbuktu 流量，避免明文凭证在不可信网络上暴露。'
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Netopia Timbuktu Pro 明文传送用户名与口令漏洞"
updated = "2026-06-16T21:50:58.273"

