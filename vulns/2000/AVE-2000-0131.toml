[basic]
description = "Novell GroupWise 5.5 Enhancement Pack 的 Web Access 组件中的 Java Servlet 存在拒绝服务漏洞。远程攻击者无需认证，只需向目标服务器的 Servlet 发送超长 URI 请求，即可触发该漏洞，导致 Java 服务进程耗尽资源或崩溃，从而使 GroupWise Web 邮件服务不可用。该漏洞利用门槛低，攻击者仅需发送特制 HTTP 请求即可实施 DoS 攻击，影响范围包括 GroupWise 5.5 Enhancement Pack 版本。"
published = "2000-02-07T05:00:00.000"
remediation = "升级到 Novell GroupWise 6.0 或更高版本，该问题已在后续版本中修复。若无法升级，可在前端 Web 服务器（如 Apache、IIS）中限制请求 URI 长度不超过 1024 字节，以阻止超长 URL 到达后端 Java Servlet 引擎。同时可在 servlet 容器层（如 Tomcat/JRun）配置 maxHttpHeaderSize 参数，对请求行长度进行服务端限制，缓解因畸形超长 URI 导致的拒绝服务攻击。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Novell GroupWise 5.5 Web Access Enhancement Pack Java Server 拒绝服务漏洞"
updated = "2026-06-16T21:51:05.753"

