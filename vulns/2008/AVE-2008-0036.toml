[basic]
description = "VLC Media Player 在 0.8.6f 之前版本中存在多处整数溢出漏洞，漏洞原理在于 MP4 解复用器、Real 解复用器及 Cinepak 编解码器在处理特制媒体文件时，因整数运算溢出导致缓冲区边界计算错误，进而触发缓冲区溢出。未经身份认证的远程攻击者可通过向目标用户发送或诱使其打开包含恶意构造数据的 MP4、Real 或 Cinepak 媒体文件，利用该漏洞导致 VLC 崩溃，造成拒绝服务。该漏洞影响所有使用受影响版本 VLC 的 Windows、Linux 及 macOS 系统用户，攻击条件简单，仅需用户播放恶意媒体文件即可触发，无需复杂交互。VideoLAN 已在 0.8.6f 版本中修复该漏洞，用户应升级至最新版本以消除安全隐患。"
published = "2008-04-25T06:05:00.000"
remediation = "立即将 VLC Media Player 升级至 0.8.6f 或更高版本。Debian/Ubuntu 用户可通过 apt-get install --only-upgrade vlc 完成升级；Intrepid (8.10) 及之后版本不受影响。若无法立即升级，可从 VideoLAN 官网下载最新稳定版覆盖安装。对于使用旧版发行版（如 Dapper/Feisty/Gutsy）的系统，建议迁移至受支持的操作系统版本以获取持续安全更新。"
score = 6.8
severity = "MEDIUM"
sources = ["tenable"]
title = "VideoLAN VLC 整数溢出拒绝服务漏洞"
updated = "2026-06-16T22:52:27.140"

