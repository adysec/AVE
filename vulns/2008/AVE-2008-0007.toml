[basic]
description = "CMSimple 3.1 存在目录遍历漏洞，当 PHP 的 register_globals 选项开启时，远程攻击者可通过向 index.php 的 sl 参数传递 `../` 路径序列实现任意本地文件包含与执行。攻击者可先包含 adm.php 文件，再通过上传功能进一步实现远程代码执行。该漏洞影响 CMSimple 3.1 版本，CVSS 评分 6.8，危害等级中危。厂商已于 2008 年 6 月发布修补版本。"
published = "2008-06-10T18:32:00.000"
remediation = "CMSimple 已针对 3.1 版本发布了安全补丁，应立即升级至修补后的 3.1 版本（版本号未变但已修复）。同时强制关闭 PHP `register_globals` 选项（在 php.ini 中设置 `register_globals = Off`），并对用户输入 `sl` 参数进行严格的路径过滤，禁止包含 `../` 等路径遍历字符。如该 CMS 已停止维护，建议迁移至其他仍在安全更新的内容管理系统。"
score = 6.8
severity = "MEDIUM"
sources = ["nuclei"]
title = "CMSimple 3.1 本地文件包含与任意文件上传漏洞"
updated = "2026-06-16T22:54:10.330"

