[basic]
description = "Microsoft Windows NT 4.0 的本地安全认证子系统服务（LSASS.EXE）在处理 LSA/LSARPC 请求时存在访问冲突漏洞。远程攻击者可通过向目标系统发送特制的 RPC 请求，触发 LSASS.EXE 进程崩溃，导致系统拒绝服务。该漏洞影响 Windows NT 4.0 系统，攻击者无需身份认证即可实施攻击，但无法实现远程代码执行或提权。"
published = "1997-06-01T04:00:00.000"
remediation = "建议升级至受支持版本的 Windows（Windows 10/11 或 Windows Server 2019/2022 等），Windows NT 4.0 已终止支持且不再发布安全更新。临时缓解措施：在边界防火墙上阻止 TCP 135 (RPC) 和 139 (NetBIOS) 端口的入站连接，限制 LSARPC 接口的远程访问。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Microsoft Windows NT 4.0 LSA/LSARPC 拒绝服务漏洞"
updated = "2026-06-16T21:47:57.290"

