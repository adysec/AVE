[basic]
description = "Linux 内核 x86/MCE 子系统中存在逻辑缺陷，AMD Zen 系列处理器在指令获取（IF）单元发生毒化错误时，微架构无法保证同步 #MC 异常传递，导致 MCG_STATUS[EIPV|RIPV] 标志位不被设置。内核因未正确保存代码段（CS）寄存器值，默认将错误上下文判定为内核态（cs=0），从而触发非必要的内核恐慌（kernel panic），造成拒绝服务。该漏洞影响使用 AMD Zen 架构的 Linux 系统，CVSS 评分 5.5，本地攻击者可通过触发数据毒化错误利用此漏洞。"
published = "2025-09-18T16:15:47.967"
remediation = "建议将 Linux 内核升级至 6.1.53、6.4.16、6.5.3 或 6.6 及以上版本，对应内核稳定分支补丁提交分别为 4240e2ebe679、6eac39659014、2e01bdf7203c 和 e6e6a5f50f58。受影响系统请优先更新内核包（apt upgrade linux-image 或 yum update kernel）并重启。临时缓解可在 grub 内核启动参数添加 mce=off 禁用 MCE 处理，但此举会关闭所有机器检查异常上报，仅作为紧急临时方案。"
score = 5.5
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux 内核 AMD Zen 处理器 IF Poison 错误处理不当导致拒绝服务漏洞"
updated = "2026-06-17T06:45:20.177"

