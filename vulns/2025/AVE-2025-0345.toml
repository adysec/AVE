[basic]
description = "万户OA系统存在SQL注入漏洞，攻击者可在未经认证的情况下通过特制的HTTP请求参数注入恶意SQL语句，进而绕过权限验证窃取数据库中的敏感信息（包括用户凭证、系统配置等）。该漏洞影响万户OA多个版本，攻击复杂度低，无需用户交互，可远程利用，建议用户尽快升级至安全版本。"
published = "0723"
remediation = "建议立即联系万户软件官方（400-9918-728）获取最新安全升级包或升级至修复后的版本。如无法立即打补丁，可在 Nginx/Apache 反向代理层部署 WAF 规则拦截常见 SQL 注入payload，对用户输入参数做严格的类型校验并过滤单引号、注释符（--/#）等危险字符，同时将数据库连接账户权限降至最低（仅允许存储过程执行，禁用直接表操作）。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "万户 万户OA SQL注入漏洞"
updated = "0723"

