[basic]
description = "Microsoft Windows NT 4.0 SNMP 服务代理存在内存泄漏漏洞。远程攻击者可通过向目标系统 SNMP 服务发送大量查询请求，导致系统内存资源被持续消耗直至耗尽，最终造成拒绝服务。该漏洞影响 Windows NT 4.0 SP5 之前版本，CVSS 评分 5.0，危害等级中危。安装 SP5 及以上版本补丁可修复此漏洞。"
published = "1999-12-31T05:00:00.000"
remediation = "升级 Windows NT 4.0 至 Service Pack 5 (SP5) 或更高版本，SP5 已修复 SNMP Agent 的内存泄漏问题。对于无法升级的系统，可在防火墙规则中限制对 UDP 端口 161 的访问，仅允许受信任的管理站发起 SNMP 查询，以降低远程攻击面。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Microsoft Windows NT 4.0 SNMP Agent 内存泄漏拒绝服务漏洞"
updated = "2026-06-16T21:49:06.917"

