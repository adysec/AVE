[basic]
description = 'Allaire JRun 3.0 HTTP Servlet 服务器存在目录泄露漏洞。远程攻击者通过在 URL 请求开头添加额外的斜杠（"/"），可绕过访问控制直接访问 WEB-INF 目录下的敏感文件，如配置文件、类文件等。该漏洞无需身份认证即可利用，攻击条件简单，可能导致服务器配置信息泄露，进一步扩大攻击面。受影响的版本为 Allaire JRun 3.0。'
published = "2000-12-11T05:00:00.000"
remediation = "根据 Allaire 安全公告 ASB00-27 安装对应安全更新，或将 JRun 升级至 3.1 及以上版本。若无法立即升级，可在反向代理或 Web 服务器层面添加 URL 重写规则，拦截包含 //WEB-INF 的请求路径，同时配置 web.xml 中 <security-constraint> 显式禁止对 WEB-INF 目录的访问。鉴于 Allaire 已被 Adobe 收购且 JRun 产品已停止维护超过 15 年，建议将应用迁移至仍在维护的 Java Servlet 容器（如 Apache Tomcat 10.x 或 Eclipse Jetty 12.x）。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Allaire JRun 3 目录泄露漏洞"
updated = "2026-06-16T21:53:03.200"

