[basic]
description = "安科瑞智能环保云平台存在SQL注入漏洞，攻击者可通过向 /Swicth/getmonitorrealdata 接口发送特制的POST请求，在请求参数中构造恶意SQL语句，从而绕过身份认证并直接访问后台数据库，导致敏感数据泄露。该漏洞攻击复杂度低，无需任何权限即可远程利用，影响范围广泛，建议用户尽快升级修复。"
published = "0705"
remediation = "联系安科瑞官方获取智能环保云平台最新安全更新，将 `/Swicth/getmonitorrealdata` 接口的数据库查询改为参数化查询或存储过程，对用户输入严格过滤特殊字符。临时缓解措施可在 Web 应用防火墙（WAF）或反向代理层面配置规则拦截该接口的 SQL 注入 payload。"
score = 5
