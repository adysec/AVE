[info]
author = "AVE"
description = "Google Chrome V8 引擎在处理特定 JavaScript 对象时存在越界读写漏洞（CVE-2026-11645），源于 V8 对内存边界验证不足。远程攻击者可通过构造特制的 HTML 页面诱导用户访问，触发 OOB 读写进而实现沙箱内任意代码执行。本 PoC 返回包含恶意 JavaScript 的 HTML 页面，触发 V8 越界读写以验证漏洞存在。"
id = "POC-AVE-2026-0056"
name = "Google Chrome V8 越界读写漏洞 PoC"
severity = "high"
tags = [
    "cve-2026-11645",
    "v8",
    "oob",
    "chrome",
]
vuln_id = [
    "CVE-2026-11645",
    "AVE-2026-0056",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/cve-2026-11645-poc.html"
protocol = "http"

[poc.requests.body]
content = ""
type = "raw"

[[poc.requests.matchers]]
expect = true
status = [200]
type = "status"
