[basic]
description = "Alt-N MDaemon 2.8.5.0 的 POP 服务器存在竞争条件漏洞，本地攻击者可通过执行 UIDL 命令后迅速断开连接触发该漏洞，导致 POP 服务进入死锁状态而拒绝服务。该漏洞影响 MDaemon 2.8.5.0 版本，CVSS 评分 2.6，危害等级低。攻击者需具备本地系统访问权限方可利用。"
published = "2000-06-16T04:00:00.000"
remediation = "升级至 MDaemon 2.8.6.0 或更高版本，该版本已修复 POP3 服务器中 UIDL 命令处理的条件竞争问题。如无法升级，可在防火墙层面限制本地用户对 POP3 端口（110）的访问，或通过系统策略限制不可信用户本地登录服务器以降低风险。"
score = 2.6
severity = "LOW"
sources = ["exploitdb"]
title = "Alt-N MDaemon POP3 拒绝服务漏洞"
updated = "2026-06-16T21:51:52.157"

