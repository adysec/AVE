[info]
author = "ave"
description = "检测 Solaris 7.0/8.0 系统中 Xsun X 服务器二进制文件是否存在，该文件存在 -dev 参数缓冲区溢出漏洞，本地攻击者可利用此漏洞提升至 root 权限"
id = "POC-AVE-2000-0283"
name = "CVE-2000-0337 PoC"
severity = "high"
tags = ["ave-2000-0283"]
vuln_id = [
    "CVE-2000-0337",
    "AVE-2000-0283",
]

[poc]
logic = "all"

[[poc.requests]]
path = "/usr/openwin/bin/Xsun"
protocol = "file"

[[poc.requests.matchers]]
expect = true
part = "body"
regex = "."
type = "regex"
