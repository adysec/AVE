[basic]
description = "Solaris SunOS 系统中的 rpc.mountd 服务存在信息泄露漏洞。该服务在处理远程文件系统挂载请求时生成的错误消息中包含服务器上文件及目录的路径信息，未经认证的远程攻击者无需任何权限即可通过向目标系统的 RPC 端口发送特制的 mount 请求，利用错误消息中返回的路径信息枚举服务器上的文件系统结构，从而获取敏感信息。该漏洞影响多个 Solaris/SunOS 版本，CVSS 评分 7.8，危害等级高。"
published = "1998-04-29T04:00:00.000"
remediation = "建议升级到 SunOS 5.5.1 及以上版本，或安装 Sun 安全补丁 103600-03 (SPARC) / 103601-03 (x86)。如无法升级，可在 /etc/init.d/nfs.server 中注释 rpc.mountd 启动行以禁用该服务，或在防火墙层面限制对 RPC 端口 (111/tcp, 111/udp) 的访问，仅允许可信主机连接。"
score = 7.8
severity = "HIGH"
sources = ["avd"]
title = "Sun Solaris rpc.mountd 信息泄露漏洞"
updated = "2026-06-16T21:47:55.403"

