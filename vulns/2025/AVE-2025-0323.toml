[basic]
description = "绿盟 NIPS（网络入侵防御系统）存在敏感信息泄漏漏洞，攻击者通过向目标设备发送特制的 GET 请求访问 `/api/config/users.json` 接口，无需任何身份认证即可获取系统用户配置信息，包括用户名、密码哈希等敏感数据。该漏洞影响绿盟 NIPS 系列产品，攻击者利用获取的凭证可进一步深入渗透内网，扩大攻击面。漏洞利用方式简单，危害较大。"
published = "0705"
remediation = "建议立即升级绿盟NIPS设备至厂商发布的最新固件版本，并在设备管理界面中开启API接口身份认证功能。同时，在NIPS管理口的网络层面配置访问控制列表（ACL），仅允许受信任的管理IP地址访问管理端口（如443/8443），避免将管理接口直接暴露在业务网络中。如无法立即升级，可临时在NIPS前端防火墙上配置规则，阻止对/api/config/users.json路径的外部访问。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "绿盟 NIPS users.json 敏感信息泄漏漏洞"
updated = "0705"

