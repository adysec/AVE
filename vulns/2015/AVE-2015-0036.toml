[basic]
description = "WordPress SE HTML5 Album Audio Player 插件 1.1.0 及更早版本中的 `download_audio.php` 文件存在目录遍历漏洞。未经身份验证的远程攻击者可通过向 `file` 参数传递 `../` 等路径穿越序列，绕过目录限制读取服务器上任意文件（如 `/etc/passwd`、`wp-config.php` 等敏感文件）。该漏洞无需认证即可利用，攻击复杂度低，仅需构造特制 HTTP 请求即可触发，可能导致网站配置信息、数据库凭证等敏感数据泄露。"
published = "2015-06-17T18:59:08.407"
remediation = '立即删除 se-html5-album-audio-player 插件，该插件已于 2013 年从 WordPress 官方仓库下架且不再维护，无法通过升级修复。删除路径：WordPress 后台 → 插件 → 已安装插件 → 找到 SE HTML5 Album Audio Player → 点击「删除」。如因业务需要暂时保留，可在网站根目录 .htaccess 中添加规则：`RewriteRule ^wp-content/plugins/se-html5-album-audio-player/download_audio\.php - [F,L]` 以阻断对 download_audio.php 的访问。'
score = 5
severity = "MEDIUM"
sources = ["nuclei"]
title = "WordPress SE HTML5 Album Audio Player 目录遍历漏洞"
updated = "2026-06-17T00:27:15.047"

