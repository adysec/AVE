[basic]
description = "泛微 E-cology 10.0 的 /papi/esearch/data/devops/dubboApi/debug/method 接口存在缺少身份认证的远程代码执行漏洞（CWE-306）。未经认证的远程攻击者可通过构造特制 POST 请求，控制 interfaceName 和 methodName 参数调用已暴露的调试功能，进而执行任意命令，完全控制目标服务器。该漏洞影响 20260312 之前的所有版本，CVSS 评分 9.3，危害等级严重。Shadowserver Foundation 已于 2026 年 3 月 31 日观测到在野利用。厂商已在 20260312 版本中修复此漏洞。"
published = "2026-04-07T13:16:45.400"
remediation = "立即升级至泛微 E-cology 10.0 20260312 及以上版本，该版本已修复 /papi/esearch/data/devops/dubboApi/debug/method 端点未经身份验证即可远程执行命令的问题。如无法立即升级，可在中间件层面（如 Nginx/WAF）配置规则拦截对 /papi/esearch/data/devops/dubboApi/debug/method 路径的 POST 请求，或通过防火墙限制对该端点的外部访问作为临时缓解措施。"
score = 9.3
severity = "CRITICAL"
sources = ["hwpoc"]
title = "泛微 E-cology 10 Dubbo 反序列化远程代码执行漏洞"
updated = "2026-06-17T10:20:13.370"

