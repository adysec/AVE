[basic]
description = "Windows NT 4.0 的客户端服务器运行时子系统（CSRSS）存在工作线程耗尽漏洞，当所有工作线程均处于等待用户输入状态时，远程攻击者可通过发送大量特制请求耗尽系统资源，导致 CSRSS 无法响应新请求，从而引发拒绝服务。该漏洞影响 Windows NT 4.0 系统，攻击者无需身份认证即可利用，危害等级高危。"
published = "1999-06-23T04:00:00.000"
remediation = "立即安装 Microsoft 安全公告 MS99-021 提供的补丁程序，该补丁确保最后一个 CSRSS 工作线程仅处理无需用户输入的请求，从而防止线程耗尽导致的拒绝服务。对于仍运行 Windows NT 4.0 的系统，建议升级至受支持的 Windows Server 版本（如 Windows Server 2019/2022），因为 Windows NT 4.0 已于 2004 年停止支持，不再接收安全更新。如无法升级，可限制交互式登录用户数量，并监控 CSRSS 线程池使用情况作为临时缓解措施。"
score = 7.1
severity = "HIGH"
sources = ["avd"]
title = "Microsoft Windows NT 4.0 CSRSS 拒绝服务漏洞"
updated = "2026-06-16T21:48:55.320"

