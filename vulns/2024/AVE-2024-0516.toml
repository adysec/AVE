[basic]
description = "Grub2 的 grub_mofile_open() 函数在处理语言 .mo 文件时，未对内部缓冲区大小计算过程中的整数溢出进行正确校验，导致缓冲区分配大小计算溢出，进而引发堆越界读写。本地攻击者需具备高权限，通过加载特制的 .mo 语言文件触发该漏洞，可造成敏感数据泄露或关键数据覆写，甚至绕过安全启动（Secure Boot）保护机制。该漏洞影响所有使用 Grub2 的 Linux 发行版，CVSS 评分 6.7，危害等级中危。"
published = "2025-02-18T20:15:19.313"
remediation = "立即更新 grub2 至修复版本：RHEL 9 升级至 grub2-2.06-104.el9_6 及以上（RHSA-2025:6990），RHEL 10 升级至 grub2-2.12-15.el10_0 及以上（RHSA-2025:16154）。其他发行版请更新至 grub2 最新补丁版本。更新后执行 `grub2-mkconfig -o /boot/grub2/grub.cfg` 重新生成引导配置，并重新安装 grub 到引导扇区（`grub2-install`），同时重新注册 Secure Boot 密钥以确保安全启动保护生效。临时缓解措施：限制物理控制台访问权限，仅允许受信任管理员操作。"
score = 6.7
severity = "MEDIUM"
sources = ["msrc"]
title = "GNU GRUB2 .mo文件解析整数溢出堆越界读写漏洞"
updated = "2026-06-29T23:16:40.930"

