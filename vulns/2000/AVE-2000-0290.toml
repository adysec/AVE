[basic]
description = "SuSE Linux 6.3/6.4 的 Gnomelib 组件中存在缓冲区溢出漏洞，由于程序未对 DISPLAY 环境变量长度进行有效边界检查，本地攻击者可通过向该变量传递超长字符串触发缓冲区溢出，从而以当前用户权限执行任意命令。该漏洞影响 SuSE Linux 6.3 及 6.4 版本，CVSS 评分 7.2，危害等级高。攻击者需拥有本地系统访问权限方可利用。"
published = "2000-04-29T04:00:00.000"
remediation = "升级 SuSE Linux 至 6.4 及以上版本，或安装 SuSE 官方提供的 Gnomelib 补丁包（可从 ftp.suse.com 获取）。临时缓解措施可限制本地用户设置 DISPLAY 环境变量的长度，或限制受影响系统的本地登录权限。"
score = 7.2
severity = "HIGH"
sources = ["cve"]
title = "SuSE Linux Gnomelib 本地缓冲区溢出漏洞"
updated = "2026-06-16T21:51:30.770"

