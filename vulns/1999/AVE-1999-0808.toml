[basic]
description = "Samba 2.0.5 的网络基本输入/输出服务守护程序 (nmbd) 存在严重漏洞，该漏洞源于网络服务在处理特定结构化数据包时未能有效验证输入，导致程序崩溃或无限循环。该漏洞影响 Linux 网络共享环境中的 Windows 文件重定向和 NetBIOS 名称解析功能，攻击者无需身份验证即可远程向目标 Samba 服务器发送精心构造的 NetBIOS 名称服务查询包，触发服务崩溃，导致 SMB/NFS 服务不可用。当地安全团队报告称，攻击者可以通过发送大量虚假的 NetBIOS 名称查询来放大攻击效果，实现拒绝服务攻击，严重影响企业网络的稳定性。Samba 2.0.5 及早前版本均存在此漏洞，已在后续版本中修复。"
published = "1999-07-21T04:00:00.000"
remediation = "立即将 Samba 升级至 2.0.5 或更高版本（2.0.5a 已包含此修复），该版本修复了 nmbd 在处理畸形 NetBIOS 名称时可能崩溃或进入死循环的缺陷。如无法立即升级，可在防火墙层面限制对 UDP 端口 137（NetBIOS 名称服务）的访问，仅允许可信来源，作为临时缓解措施。"
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "Samba Team Samba 2.0.5 nmbd 拒绝服务漏洞"
updated = "2026-06-16T21:49:06.230"

