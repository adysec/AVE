[basic]
description = "Linuxconf 在 Red Hat Linux 6.0 及更早版本中存在访问控制缺陷，未能正确禁用基于 PAM 的 shutdown 命令访问权限。本地攻击者可通过利用该配置缺陷直接调用 shutdown 命令触发拒绝服务，导致系统异常关闭或重启。该漏洞影响范围有限，仅本地用户可触发，无需提升权限即可利用。"
published = "1999-06-30T04:00:00.000"
remediation = "升级 Red Hat Linux 至 6.1 及以上版本；若无法升级，编辑 /etc/pam.d/shutdown 文件，限制仅 root 用户可执行 shutdown 命令，或通过 linuxconf 工具禁用 PAM 对 shutdown 的访问权限。"
score = 2.1
severity = "LOW"
sources = ["avd"]
title = "Red Hat Linux Linuxconf 本地拒绝服务漏洞"
updated = "2026-06-16T21:50:14.943"

