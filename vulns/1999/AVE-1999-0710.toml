[basic]
description = "Sun Solaris 2.5.1/2.6/7.0 的 TCP 流驱动程序中存在 mutex_enter 递归调用漏洞，远程攻击者可通过发送特制的恶意连接触发递归 mutex_enter 调用，导致服务器内核 panic 崩溃，造成拒绝服务攻击。该漏洞影响 Solaris 2.5.1、2.6 和 7.0 版本，CVSS 评分 5.0（中等严重），攻击者无需身份认证即可远程发起攻击，通过发送精心构造的 TCP 连接触发内核 mutex 锁递归死锁导致系统崩溃拒绝服务。Sun Microsystems 已发布补丁修复此漏洞。"
published = "1999-09-23T04:00:00.000"
remediation = "建议升级到 Sun 官方补丁 ID 107080-01 (Solaris 7) 或 107081-01 (x86 平台)，该补丁修复了 TCP 流驱动中 mutex_enter 递归调用导致的 panic 问题。由于 Solaris 7 已停止技术支持，建议迁移至 Oracle Solaris 11 或更高版本。临时缓解措施可在网络边界防火墙限制对受影响主机的 TCP 连接，仅允许可信来源访问。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Sun Solaris TCP流驱动递归mutex_enter远程拒绝服务漏洞"
updated = "2026-06-16T21:49:18.417"

