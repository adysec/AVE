[basic]
description = "CUPS（Common Unix Printing System）1.1.14 至 1.1.17 版本的 jobs.c 文件在处理选项字符串时未正确使用 strncat 函数调用，导致存在缓冲区溢出漏洞。未经身份认证的远程攻击者可通过向 CUPS 服务发送特制的打印任务请求触发该漏洞，造成缓冲区溢出，进而实现任意代码执行。该漏洞影响运行 CUPS 的各类 Unix/Linux 系统，CVSS v2.0 评分为 10.0，危害等级严重。攻击者无需任何认证即可远程利用，且能完全控制目标系统。"
published = "2002-12-26T05:00:00.000"
remediation = "立即升级 CUPS 至 1.1.18 或更高版本。Red Hat 用户安装 RHSA-2002:295 提供的更新包；Debian 用户安装 DSA-232 提供的 cupsys 更新包；SuSE 用户安装 SuSE-SA:2003:002 更新；Mandrake 用户安装 MDKSA-2003:001 更新。如无法立即升级，可在 CUPS 配置文件 cupsd.conf 中限制远程访问，仅允许受信任 IP 连接 631 端口，并禁用 Job 选项中的危险参数传递。"
score = 10
severity = "CRITICAL"
sources = ["osv"]
title = "CUPS Common Unix Printing System 缓冲区溢出远程代码执行漏洞"
updated = "2026-06-16T21:59:11.630"

