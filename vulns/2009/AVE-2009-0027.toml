[basic]
description = "通过精心构建的网页，攻击者可以欺骗 Safari 浏览器将用户可控的文本意外地显示在系统对话框中，导致 UI 伪造漏洞。攻击无需身份验证，只需用户访问恶意网站即可触发。攻击在 Safari 9.1 版本及更早版本中尤为严重，影响所有运行 Safari 的苹果设备，包括台式机和移动设备。该漏洞可能被攻击者用于实施网络钓鱼欺骗、诱导用户点击恶意按钮或输入敏感信息，甚至可能被用于其他安全敏感操作，危及用户信息安全。Microsoft 虽未发布官方补丁，但用户应升级到 Safari 9.1 或更高版本以获得修复。CVSS 评分 4.3，中等威胁级别，主要影响信息欺骗领域。支持网站利用该漏洞实现社交工程攻击，尤其针对点击劫持和用户欺骗场景。"
published = "2016-03-24T01:59:00.353"
remediation = "立即升级 Safari 至 9.1 或更高版本（随 OS X El Capitan 10.11.1 / iOS 9.1 发布）。无法立即升级时，可暂时禁用 JavaScript 或改用 Chrome/Firefox 等替代浏览器，并警惕弹出对话框中的异常文本，避免误点确认。"
score = 4.3
severity = "MEDIUM"
sources = ["tenable"]
title = "Apple Safari 界面欺骗漏洞"
updated = "2026-06-16T23:08:59.083"

