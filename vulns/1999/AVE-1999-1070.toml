[basic]
description = "Nosque MsgCore 2.14 存在密码明文存储漏洞，管理员密码以明文形式保存在注册表 AdmPasswd 键中，用户密码以明文形式存储在 Userbase.dbf 数据文件中。本地攻击者可通过读取注册表或数据库文件直接获取凭证，进而提升权限并完全控制系统，影响机密性与完整性。"
published = "1999-09-07"
remediation = "建议升级至 MsgCore 2.15 或更高版本；如厂商已停止维护，应使用 Windows 注册表 ACL 限制 AdmPasswd 键仅允许管理员读取，对 Userbase.dbf 设置 NTFS 权限仅允许管理员访问并启用 EFS 加密，同时确保服务器物理安全。建议迁移至其他支持安全密码存储的邮件服务器。"
score = 4.6
severity = "MEDIUM"
sources = ["cve"]
title = "Nosque MsgCore 明文密码存储漏洞"
updated = "2026-06-16"

