[info]
author = "ave"
description = "验证华盛顿大学Pico编辑器在特定版本下存在的符号链接漏洞。利用恶意符号链接诱使用户操作特定文件（如编辑某个文件），攻击者可控制写入目标将导致任意文件被覆盖。此漏洞源于Pico编辑器在处理临时或目标文件时未正确验证路径真实性，攻击者仅需本地访问权限即可利用。该漏洞实际影响在于系统配置文件或关键文件可能被破坏，导致系统完整性破坏。"
id = "POC-AVE-2001-0310"
name = "CVE-2001-0736Pico编辑器符号链接文件覆盖漏洞 PoC"
severity = "high"
tags = ["ave-2001-0310"]
vuln_id = [
    "CVE-2001-0736",
    "AVE-2001-0310",
]

[poc]
logic = "all"

[[poc.requests]]
path = "/etc/passwd"
protocol = "file"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["root:"]
