[basic]
description = "Microsoft Windows NT 4.0 的本地安全权威子系统（LSA）在处理 LsaLookupSids 函数调用时存在输入验证缺陷（CWE-20）。该函数用于根据安全标识符（SID）查找对应的账户信息，但远程攻击者可通过构造畸形、格式不正确的 SID 参数发起请求。由于 LSA 未对传入参数进行充分校验，接收到畸形 SID 后会导致 Local Security Authority Subsystem Service 进程异常崩溃，进而引发目标系统拒绝服务，需重启才能恢复。该漏洞影响运行 Windows NT 4.0 的远程主机，攻击者可未经身份认证通过网络远程触发，无需本地登录权限或用户交互，利用方式即向目标发送包含畸形 SID 参数的 LsaLookupSids 请求。"
published = "1999-12-16T05:00:00.000"
remediation = "安装 Microsoft 发布的安全补丁 KB248185，该修复已包含在 MS99-056（Syskey Keystream Reuse）公告的补丁包中。受影响系统包括 Windows NT Workstation 4.0、Windows NT Server 4.0、Windows NT Server 4.0 Enterprise Edition 以及 Windows NT Server 4.0 Terminal Server Edition。已应用 MS99-056 补丁的用户无需额外操作。如短期内无法安装补丁，可在边界防火墙上封锁 NetBIOS 及 TCP 445 端口的访问，以阻断远程攻击者向 LSA 发送畸形 SID 请求的路径。由于 Windows NT 4.0 已停止支持，长期缓解措施为将系统升级至受支持的 Windows 版本。"
score = 7.8
severity = "HIGH"
sources = ["epss"]
title = "Microsoft Windows NT 4.0 Local Security Authority 子系统 LsaLookupSids 拒绝服务漏洞"
updated = "2026-06-16T21:49:29.080"

