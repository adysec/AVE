[basic]
description = "Microsoft Windows 2000 Telnet 服务在处理超长登录命令中的退格符时存在缓冲区处理缺陷，远程攻击者无需身份认证即可通过向目标系统的 Telnet 端口（默认23）发送特制请求，触发服务进程崩溃，导致合法用户无法正常登录。该漏洞源于 Telnet 服务对特殊字符序列的边界检查不充分，攻击者只需具备网络访问能力即可实施，影响所有 Windows 2000 系统。"
published = "2001-07-21"
remediation = "安装 Microsoft 安全公告 MS01-031 提供的补丁程序，或升级至 Windows 2000 Service Pack 3 及以上版本。如无需使用 Telnet 服务，建议在服务管理器中禁用 Telnet Service (tlntsvr) 以彻底消除风险。"
score = 5.0
severity = "MEDIUM"
sources = [
    "cve",
    "exploitdb",
]
title = "Microsoft Windows 2000 Telnet 服务拒绝服务漏洞"
updated = "2026-06-16"

