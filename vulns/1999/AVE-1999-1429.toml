[basic]
description = "Xyplex 终端服务器 6.0.1S1 及可能其他版本存在安全绕过漏洞，远程攻击者无需身份认证，通过在登录密码提示符处输入 CTRL-Z 字符或问号(?)即可绕过认证机制，从而未授权获取终端服务器访问权限。CVSS 评分 7.5，危害等级高，影响系统机密性、完整性和可用性。"
published = "1997-11-26T05:00:00.000"
remediation = "联系厂商获取最新固件版本，或在终端服务器配置中禁用特殊字符（CTRL-Z、问号）透传，启用强密码认证机制。如设备已停止支持，建议在网络边界部署访问控制列表（ACL），仅允许受信 IP 访问终端服务器端口，并在传输层启用 SSH 替代 Telnet 以消除明文认证绕过风险。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "Xyplex Terminal Server 安全绕过漏洞"
updated = "2026-06-16T21:50:03.183"

