[basic]
description = "CUPS（Common Unix Printing System）1.04 及更早版本存在认证拒绝服务漏洞。远程攻击者无需身份认证即可通过提交不存在的用户名或没有 shadow 密码的用户名进行认证，导致 CUPS 守护进程崩溃或资源耗尽，造成拒绝服务。该漏洞影响运行 CUPS 1.04 及之前版本的系统，攻击复杂度低，无需特殊权限即可远程触发。"
published = "2000-06-21T04:00:00.000"
remediation = "升级 CUPS 至 1.1.4-3 或更高版本，该版本修复了认证处理中的拒绝服务漏洞。如无法升级，可在 CUPS 配置文件 cupsd.conf 中限制远程访问，仅允许可信 IP 段连接，并确保所有用户账号均设置有效 shadow 密码。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Easy Software Products CUPS 认证拒绝服务漏洞"
updated = "2026-06-16T21:51:53.787"

