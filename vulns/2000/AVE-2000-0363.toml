[basic]
description = "Linux 系统中 mirror 2.8.x 版本存在路径遍历漏洞，远程攻击者可通过在镜像同步过程中构造特制的目录遍历路径，将文件写入到本地目标目录的上一级目录中，实现越目录文件创建。该漏洞源于 mirror 工具对目标路径的规范化处理不充分，未有效过滤 `../` 等相对路径序列，导致攻击者可在目标系统上任意位置创建文件，进而可能结合其他漏洞实现权限提升或代码执行。"
published = "2000-09-28"
remediation = "升级 GNU Mirror 至 2.9 及以上版本（最后一个版本为 2.9），该版本修复了目录遍历问题。由于 Mirror 已停止维护，建议迁移至 rsync 或 wget 等活跃维护的替代工具；若必须继续使用旧版本，应在配置文件中对目标路径参数进行严格校验，阻止包含 ../ 的路径。同时以最小权限运行 Mirror 进程，限制其写入目录范围。"
score = 5.0
severity = "MEDIUM"
sources = ["cve"]
title = "GNU Mirror 2.8.x 目录遍历漏洞"
updated = "2026-06-16"

