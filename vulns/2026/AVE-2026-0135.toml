[basic]
description = "智慧校园安校易管理系统的 FileUpload.ashx 接口存在任意文件上传漏洞，未经身份认证的远程攻击者可直接向该接口上传恶意脚本文件（如 ASP/ASPX Webshell），从而获取服务器完全控制权限，进而窃取敏感数据或发起横向移动。攻击者无需任何前置权限即可完成利用，攻击门槛低、危害极大。建议厂商对 FileUpload.ashx 添加文件类型白名单校验，限制上传路径不可包含路径遍历序列，并禁止 Web 目录执行动态脚本。"
published = "nday"
remediation = "联系安校易厂商获取官方安全补丁更新系统；对 FileUpload.ashx 接口添加文件类型白名单校验，仅允许上传图片、文档等安全类型；限制上传路径参数，禁止包含 ../ 等目录遍历序列；Web 上传目录禁止执行动态脚本（如 ASP、ASPX、PHP）；在 IIS 或反向代理层限制该接口仅允许内网 IP 访问。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "安校易 智慧校园安校易管理系统 任意文件上传漏洞"
updated = "nday"

