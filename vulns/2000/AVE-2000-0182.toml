[basic]
description = "Oracle 8.1.5.x 在 Linux 系统上安装时，安装程序会跟随符号链接（symlink）创建 orainstRoot.sh 文件，且该文件被设置为全局可写权限，导致本地攻击者可通过符号链接攻击修改该文件内容，从而在 root 用户执行该脚本时提升权限至 root。该漏洞影响 Oracle 8i Standard Edition 8.1.5 for Linux 版本，CVSS 评分 6.2，危害等级中危。"
published = "2000-03-05T05:00:00.000"
remediation = "升级到 Oracle 8i 8.1.6 或更高版本，该问题已在后续版本中修复。如无法升级，安装前手动删除或重命名 /tmp/orainstRoot.sh 符号链接，安装后立即执行 chmod 700 $ORACLE_HOME/orainstRoot.sh 限制文件权限，并确保安装目录仅对 Oracle 用户可写。"
score = 6.2
severity = "MEDIUM"
sources = ["cve"]
title = "Oracle Oracle8i Standard Edition 8.1.5 Linux 本地权限提升漏洞"
updated = "2026-06-16T21:51:13.403"

