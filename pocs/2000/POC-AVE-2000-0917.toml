[info]
author = "AVE"
description = "检测 O'Reilly WebSite Pro 2.3.7 中 uploader.exe 是否可被未授权访问，该程序允许远程攻击者上传任意文件至服务器"
id = "POC-AVE-2000-0917"
name = "O'Reilly WebSite Pro uploader.exe 任意文件上传 PoC"
severity = "high"
tags = ["ave-2000-0917"]
vuln_id = [
    "CVE-2000-0769",
    "AVE-2000-0917",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/cgi-win/uploader.exe"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "upload",
    "Upload",
    "file",
    "browse",
]
