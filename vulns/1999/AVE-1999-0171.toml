[basic]
description = "rpc.statd 服务存在 RPC 调用转发漏洞，远程攻击者可通过 SM_MON 和 SM_NOTIFY 命令将伪造的 RPC 请求转发至本地操作系统，进而利用该机制触发 automountd 等其他组件的安全漏洞。该漏洞影响 Sun Solaris 2.5.1 等版本，CVSS 评分 7.5，危害等级高。攻击者无需认证即可远程利用，实现权限提升或系统控制。"
published = "1999-06-07T04:00:00.000"
remediation = "建议升级至 Sun Solaris 2.6 或更高版本，官方已在该版本中修复 rpc.statd RPC 转发漏洞。如无法升级，可停止 rpc.statd 服务（/etc/init.d/nfs.server stop），并添加防火墙规则阻止外部访问 TCP/111 和 TCP/32771 端口。作为临时缓解措施，也可编辑 /etc/hosts.allow 和 /etc/hosts.deny 限制 rpc 服务访问来源。"
score = 7.5
severity = "HIGH"
sources = ["redhat"]
title = "Sun Solaris rpc.statd 远程 RPC 调用转发漏洞"
updated = "2026-06-16T21:48:30.887"

