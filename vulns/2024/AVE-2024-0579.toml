[basic]
description = "Linux 内核 DRM 子系统中 STI 显示驱动存在空指针解引用漏洞，drm_atomic_get_crtc_state() 函数在内存分配失败或参数异常时可能返回错误指针（ERR_PTR），但驱动未对返回值进行有效性检查便直接解引用，导致内核崩溃。本地低权限攻击者可通过触发特定的 DRM 原子操作来利用此漏洞，造成系统拒绝服务。该漏洞影响 Linux 内核各发行版版本，CVSS 评分 5.5，危害等级中等。"
published = "2025-01-08T18:15:18.447"
remediation = "立即更新 Linux 内核至以下已修复版本：5.15.174、6.1.120、6.6.64、6.12.4 或 6.13 及以上。各发行版用户请安装对应安全更新，例如 Ubuntu 24.04 LTS 用户升级至 linux-image-6.11.0-1011-lowlatency 或执行 `apt update && apt upgrade linux-image-*`；Debian 用户参考 DLA-4045-1 公告更新内核包。更新后需重启系统生效。如无法立即更新，可卸载或禁用 sti 内核模块（`modprobe -r sti`）作为临时缓解措施，但可能影响显示输出功能。"
score = 5.5
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux kernel DRM/STI 错误指针解引用漏洞"
updated = "2026-06-17T08:12:57.967"

