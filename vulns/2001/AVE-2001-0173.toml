[basic]
description = "Solaris 操作系统中的 Xsun 组件存在缓冲区溢出漏洞。Xsun 是 Solaris 下的 X Window System 服务器实现，在处理 HOME 环境变量时未正确检查长度边界，本地攻击者可通过设置超长的 HOME 环境变量并触发 Xsun 执行，导致栈缓冲区溢出。攻击者利用此漏洞可覆盖返回地址，以 root 权限执行任意代码，实现本地权限提升。该漏洞影响 Solaris 8 及更早版本，需要本地系统访问权限，无需用户交互。已存在公开可利用代码。"
published = "2001-07-02T04:00:00.000"
remediation = "Solaris 8 用户安装补丁 108652（SPARC）/108653（x86），Solaris 7 安装 106942（SPARC）/106943（x86），Solaris 2.6 安装 105565（SPARC）/105566（x86）。上述版本均已停止支持，建议升级至 Solaris 11。临时缓解措施：限制 Xsun 二进制文件执行权限，仅允许可信用户执行 `/usr/openwin/bin/Xsun`。"
score = 7.2
severity = "HIGH"
sources = ["exploitdb"]
title = "Oracle Solaris Xsun HOME 环境变量缓冲区溢出漏洞"
updated = "2026-06-16T21:54:16.800"

