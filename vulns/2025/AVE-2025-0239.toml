[basic]
description = "汉王 e 脸通综合管理平台 loginOn.do 接口存在权限绕过与任意文件读取漏洞。攻击者在未授权情况下可通过构造特制 HTTP 请求绕过身份验证，读取服务器上任意文件，包括系统配置文件、敏感数据等。该漏洞影响汉王 e 脸通综合管理平台多版本，远程攻击者利用难度低，可导致核心信息泄露。"
published = "0705"
remediation = "升级汉王 e 脸通综合管理平台至最新版本，或联系厂商获取修复补丁。临时缓解措施：在 Web 应用防火墙或反向代理层配置规则，拦截对 /loginOn.do 路径的异常请求参数；限制应用服务器文件系统权限，确保 Web 进程仅可访问必要目录；部署文件访问审计日志，监控异常文件读取行为。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "汉王 e脸通综合管理平台任意文件读取漏洞"
updated = "0705"

