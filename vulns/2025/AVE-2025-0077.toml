[basic]
description = "Windows SMB 客户端存在访问控制不当漏洞（CWE-284），已获得授权的攻击者可通过构造恶意 SMB 服务器诱导目标客户端连接，利用 SMB 协议对访问权限的验证不充分的缺陷实现权限提升，进而可能实现远程代码执行。该漏洞影响 Windows 11 等版本，CVSS 评分 8.8，危害等级高危。"
published = "2025-06-10T17:23:02.967"
remediation = "立即安装 Microsoft 2025 年 6 月安全更新，各版本修复版本号分别为：Windows 10 1507 升级至 10.0.10240.21034、Windows 10 1607/Server 2016 升级至 10.0.14393.8148、Windows 10 1809/Server 2019 升级至 10.0.17763.7434、Windows 10 21H2 升级至 10.0.19044.5965、Windows 10 22H2 升级至 10.0.19045.5965、Windows 11 22H2 升级至 10.0.22621.5472、Windows 11 23H2 升级至 10.0.22631.5472、Windows 11 24H2 升级至 10.0.26100.4349、Server 2022 升级至 10.0.20348.3745。亦可启用 Windows Update 自动获取修复。临时缓解措施：在防火墙及边界路由器上阻止 TCP 139/445 端口的入站 SMB 流量，并限制 SMB 仅对受信任网络开放。"
score = 8.8
severity = "HIGH"
sources = ["hwpoc"]
title = "Microsoft Windows SMB 客户端特权提升漏洞"
updated = "2026-06-17T09:13:04.220"

