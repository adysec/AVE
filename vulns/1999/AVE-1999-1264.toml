[basic]
description = "Solaris 2.x、SunOS 4.x 及 4.4BSD 之前版本的 BSD 衍生操作系统中，UNIX 域套接字的访问权限检查被忽略，导致本地攻击者可以绕过权限限制连接到本不应有访问权限的域套接字，进而干扰或控制使用该套接字的程序运行。该漏洞影响范围广泛，攻击者只需拥有本地账户即可利用，无需任何认证，CVSS 评分 2.1，危害等级低。"
published = "1997-05-17T04:00:00.000"
remediation = "升级操作系统至 4.4BSD 或更高版本（FreeBSD 升级至 4.4+），该版本开始正确实施 UNIX domain socket 的访问权限检查。对于 Solaris 2.x/SunOS 4.x，安装供应商提供的对应安全补丁（Sun Patch ID 107544-01 及后续更新）。将 UNIX domain socket 文件放置于仅可信用户可访问的目录中，并在应用层对 socket 连接进行身份验证作为深度防御。"
score = 2.1
severity = "LOW"
sources = ["avd"]
title = "Sun Solaris 及 FreeBSD UNIX 域套接字访问权限绕过漏洞"
updated = "2026-06-16T21:50:21.837"

