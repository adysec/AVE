[basic]
description = 'Sendmail 8.10.x 版本中的 mail.local 组件在处理邮件消息时未能正确识别标识消息文本结束的 ".\n" 字符串，存在拒绝服务漏洞。远程攻击者可通过发送一条长度为 2047 字符且以 ".\n" 结尾的特制邮件消息行，触发该漏洞，导致目标系统邮件服务拒绝服务或邮箱数据损坏。该漏洞影响 Sendmail 8.10.x 系列版本，CVSS 评分 5.0，危害等级中危。'
published = "2000-04-23T04:00:00.000"
remediation = "升级至 Sendmail 8.11.0 及以上版本。当前最新稳定版为 8.18.2，可从 ftp.sendmail.org 获取。如无法升级，可通过防火墙限制对 SMTP 端口（25/tcp）的访问来源，仅允许受信任的邮件服务器连接，减少外部攻击面。同时建议监控 mail.local 日志中异常长的邮件行。对于已废弃的旧系统，建议迁移至维护中的邮件传输代理。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Sendmail mail.local 远程拒绝服务漏洞"
updated = "2026-06-16T21:51:28.097"

