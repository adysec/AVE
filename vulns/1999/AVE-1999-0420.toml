[basic]
description = "NCSA httpd 1.4.1 及更早版本存在缓冲区溢出漏洞，远程攻击者无需身份认证即可向目标 Web 服务器发送特制请求触发该漏洞，导致拒绝服务或远程代码执行。该漏洞影响 NCSA HTTPd 1.x 系列版本，攻击者利用此漏洞可完全控制受影响系统，危害严重。目前官方已停止维护该软件，建议用户升级至其他受支持的 Web 服务器软件。"
published = "1995-02-17T05:00:00.000"
remediation = "NCSA httpd 已停止维护多年，官方不再发布安全更新。建议立即迁移至 Apache HTTP Server（最新稳定版为 2.4.68），该服务器由 NCSA httpd 衍生而来，兼容原有配置且持续提供安全支持。迁移后注意关闭不必要的 CGI 脚本并配置最低权限运行服务进程以降低风险。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "NCSA httpd 远程缓冲区溢出漏洞"
updated = "2026-06-16T21:47:58.270"

