[basic]
description = "Microsoft Windows 95/98/2000/NT 4.0 及终端服务器系统在处理 IP 分片重组时存在资源管理缺陷，远程攻击者无需身份认证即可通过发送大量相同的畸形 IP 分片数据包（即 Jolt2 攻击），利用系统协议栈在处理异常分片时的整数溢出或重复处理逻辑缺陷，导致目标系统 CPU 利用率飙升、内存耗尽，最终造成拒绝服务。该漏洞影响广泛，微软已在 MS00-029 安全公告中修复。"
published = "2000-05-19T04:00:00.000"
remediation = "安装 Microsoft 安全公告 MS00-029 对应的补丁程序：Windows 95 安装 KB259728USA5，Windows 98 安装 KB259728USA8，Windows NT 4.0 安装 KB259728 (FamilyId 7075667C-C667-4BCB-BEAC-FCA6EE1E770B)，Windows 2000 安装 KB259728 (FamilyId 43065EB6-F04D-4FB0-809C-D8BACACBBE05)。如无法打补丁，可在防火墙或代理服务器层面丢弃分片 IP 数据包作为临时缓解措施。"
score = 7.8
severity = "HIGH"
sources = ["epss"]
title = "Microsoft Windows IP 分片重组拒绝服务漏洞"
updated = "2026-06-16T21:51:26.387"

