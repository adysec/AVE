[basic]
description = "XML::Parser 是 Perl 语言中广泛使用的 XML 解析库，其 2.47 及之前版本在 st_serial_stack 函数中存在差一（off-by-one）堆缓冲区溢出漏洞。当解析深度嵌套的 XML 元素且栈指针（stackptr）等于 stacksize - 1 时，本应触发栈扩展的代码未执行，导致新值被写入紧邻分配缓冲区边界之外的位置，造成堆内存越界写入。远程攻击者可通过向目标应用提交特制的深度嵌套 XML 文档触发该漏洞，造成堆内存破坏，可能导致拒绝服务或远程代码执行。CVSS 评分 9.8，危害等级严重。"
published = "2026-03-19T12:16:17.047"
remediation = "立即将 Perl XML::Parser 模块升级至 2.48 或更高版本（最新版为 2.59）。可通过 CPAN 执行 `cpan -U XML::Parser` 更新。Red Hat 系系统请安装对应 RHSA 安全更新（如 RHEL 7 升级 perl-XML-Parser 至 2.41-10.el7_9.1，RHEL 8 升级至 2.44-12.el8_10，RHEL 10 升级至 2.47-6.1.el10_1）；Debian Bullseye 用户请参照 LTS 公告安装补丁。临时缓解措施可在无法升级的环境中限制解析深层嵌套 XML 文档，或对 XML 输入进行预处理校验以防止触发堆越界写入。"
score = 9.8
severity = "CRITICAL"
sources = ["msrc"]
title = "Perl XML::Parser 堆缓冲区越界写入漏洞"
updated = "2026-07-15T02:16:55.277"

