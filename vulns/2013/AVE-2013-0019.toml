[basic]
description = "Code Aurora 贡献的 Qualcomm MSM 设备 Android 内核 acdb 音频驱动中，audio_acdb.c 文件的 acdb_ioctl() 函数存在栈缓冲区溢出漏洞。攻击者通过具有 /dev/msm_acdb 设备访问权限的恶意应用，在 ioctl 调用参数中传入过大的 size 值触发栈溢出，可导致内核态权限提升。该漏洞影响 Linux 内核 2.6.x 及 3.x 系列版本，CVSS 评分 8.4，危害等级高，已被 CISA KEV 收录，存在在野利用。"
published = "2014-08-31T10:55:03.753"
remediation = "立即安装设备厂商提供的最新 Android 安全更新（2013 年后的 Qualcomm MSM 设备补丁已包含修复）。对于运行自定义 ROM 或 AOSP 编译环境的用户，需将内核升级至包含 acdb_ioctl 函数中 ioctl 参数大小校验补丁的版本（在 audio_acdb.c 中增加对用户传入 size 值的边界检查，确保不超过栈缓冲区长度），或从 Code Aurora Forum (CAF) 对应内核分支 cherry-pick 相关修复 commit。如无法立即更新，可通过限制 /dev/msm_acdb 设备节点的访问权限（仅允许系统级音频服务进程访问，禁止第三方应用直接操作）作为临时缓解措施。"
score = 8.4
severity = "HIGH"
sources = ["kev"]
title = "Qualcomm MSM设备acdb音频驱动堆栈缓冲区溢出漏洞"
