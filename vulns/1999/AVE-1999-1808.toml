[basic]
description = 'Internet Explorer 在安全级别设置为"中"以下时，存在 ActiveX 控件远程代码执行漏洞。远程攻击者可通过构造恶意网页，利用 FileSystemObject ActiveX 对象执行任意命令，导致系统被完全控制。该漏洞影响所有将 IE 安全级别设置为"中"以下的 Windows 系统版本，攻击者无需身份认证即可利用，危害严重。'
published = "1999-05-06T04:00:00.000"
remediation = "将 Internet Explorer 安全级别设置为「中」或更高（控制面板 → Internet 选项 → 安全 → Internet 区域 → 自定义级别）；禁用「对未标记为可安全执行脚本的 ActiveX 控件进行初始化和脚本化」；在注册表中设置 FileSystemObject 控件的 kill bit (CLSID: 0D43FE01-F093-11CF-8940-00A0C9054228)，或运行 Microsoft 提供的 FSO 安全更新。建议升级到现代浏览器（如 Edge/Chrome）以彻底规避此风险。"
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "Microsoft Internet Explorer 远程代码执行漏洞"
updated = "2026-06-16T21:50:01.150"

