[basic]
description = "teTeX 过滤器在 1.0.7 版本之前存在临时文件竞争条件漏洞，当使用 lpr 命令打印 .dvi 文件时，程序会创建临时文件。本地攻击者可通过在临时文件创建前建立恶意符号链接，利用竞争条件将临时文件重定向到攻击者控制的文件，从而实现本地提权。该漏洞影响 teTeX filter 1.0.7 之前的所有版本，攻击者需要具备本地系统访问权限并能执行 lpr 打印命令，在临时文件创建的时间窗口内成功建立符号链接即可触发漏洞，导致攻击者获得更高的系统权限，完全破坏系统的机密性、完整性和可用性。"
published = "2001-06-22T04:00:00.000"
remediation = "建议立即升级 teTeX filter 至 1.0.7 或更高版本（可从 TeX Live 或 teTeX 官方仓库获取更新包）。若暂时无法升级，可通过以下缓解措施降低风险：1) 限制 lpr 打印命令的执行权限，仅允许受信任用户使用；2) 配置临时文件目录权限为 1777（粘滞位），防止普通用户创建恶意软链接；3) 使用安全的临时文件创建方式（如 mkstemp）替代不安全的临时文件生成方式；4) 限制本地用户对打印子系统的访问权限。"
score = 6.2
severity = "MEDIUM"
sources = ["redhat"]
title = "teTeX teTeX filter 临时文件竞争条件漏洞"
updated = "2026-06-16T21:55:12.060"

