[basic]
description = "LaserFiche NetWare 版本存在敏感信息泄露漏洞，其以未加密的明文形式存储用户用户名和密码，且允许未经认证的管理员配置更改且不记录日志。远程攻击者可通过访问漏洞服务获取明文的认证凭据，进而利用管理员权限进行进一步攻击，如修改系统配置或发起拒绝服务攻击，造成系统可用性严重受损。"
published = "1999-01-01T05:00:00.000"
remediation = "立即将 LaserFiche 从 NetWare 版本迁移至当前受支持的 Laserfiche Windows 版本（如 Laserfiche 10/11），该版本已采用 SQL Server 后端及加密存储机制。迁移完成后启用审计日志功能记录所有管理操作，并配置 TLS 加密传输。在完成迁移前，应在防火墙层面限制对 NetWare 服务器的 80/443/524 端口访问，仅允许受信管理 IP 连接作为临时缓解。"
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "Novell LaserFiche 用户凭证明文存储漏洞"
updated = "2026-06-16T21:48:13.863"

