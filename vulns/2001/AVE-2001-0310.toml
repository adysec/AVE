[basic]
description = "华盛顿大学 Pico 编辑器（包含在 Pine 4.33 之前版本中）在文件操作时存在符号链接攻击漏洞。本地攻击者可通过构造恶意符号链接，诱导用户在编辑文件时将内容写入攻击者指定的任意文件路径，从而实现任意文件覆盖。该漏洞源于编辑器在创建临时文件或保存文件时未正确验证文件路径的真实性，攻击者只需具备本地访问权限即可利用，CVSS 评分 2.1（低危），影响系统完整性，可能导致关键配置文件被篡改或敏感数据被破坏。受影响版本包括 Pine 4.33 之前版本及其自带的 Pico 编辑器，用户需升级至 Pine 4.33 或更高版本修复该漏洞。"
published = "2001-10-18T04:00:00.000"
remediation = "升级 Pine 至 4.33 或更高版本（该版本已修复 Pico 编辑器的符号链接攻击漏洞）。若暂时无法升级，可通过设置环境变量 TMPDIR 指向受限目录、或使用 mount --bind 将 /tmp 重映射为非共享目录，防止本地用户利用符号链接覆盖任意文件。"
score = 2.1
severity = "LOW"
sources = ["redhat"]
title = "华盛顿大学 Pico 编辑器 符号链接攻击导致文件覆盖漏洞"
updated = "2026-06-16T21:54:51.757"

