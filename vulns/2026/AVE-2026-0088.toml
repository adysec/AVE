[basic]
description = "Linux 内核 crypto 子系统的 algif_aead 接口存在堆内存溢出漏洞，由于在 AEAD 加密操作中错误地采用了原地（in-place）处理模式，而源和目标缓冲区来自不同的内存映射区域，导致堆内存越界写入。本地攻击者可通过 AF_ALG 套接字接口发送特制的 AEAD 请求触发该漏洞，成功利用可实现权限提升（LPE）。该漏洞影响 Linux 内核 6.12.10 之前版本，CVSS 评分 7.8，危害等级高。"
published = "2026-04-22T09:16:21.270"
remediation = "升级 Linux 内核至 6.12.10 或更高版本（对应发行版请安装最新稳定版内核包）。如无法立即升级，可通过禁用 AF_ALG 套接字家族（modprobe.blacklist=algif_aead）或限制非特权用户访问 crypto 接口作为临时缓解措施。"
score = 7.8
severity = "HIGH"
sources = ["hwpoc"]
title = "Linux Kernel algif_aead 堆溢出漏洞"
updated = "2026-07-15T02:19:47.730"

