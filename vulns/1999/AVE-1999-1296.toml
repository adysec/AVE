[basic]
description = "Tiger 2.2.3 安全审计工具在临时文件处理机制中存在严重漏洞。攻击者可通过操纵默认工作目录（WORKDIR）下的临时文件创建符号链接，诱使程序覆盖原始文件，实现对任意系统文件的写入操作。此漏洞影响虎嗅安全工具的默认配置，攻击者无需网络即可通过本地权限执行攻击，实现文件权限提升和系统文件破坏。攻击过程通过精心构造的符号链接链，实现对目标文件的完全控制，包括读取、修改和删除，可能导致敏感信息泄露或系统崩溃。漏洞利用时攻击者需具备本地用户权限，但一旦成功可获得系统级文件访问权限。"
published = "1998-06-26"
remediation = "升级 Tiger 安全审计工具至 2.2.4 或更高版本，此版本修复了临时文件创建过程中的符号链接验证漏洞。具体修复措施包括：1. 在创建临时文件时验证文件路径的真实性，防止符号链接攻击；2. 使用原子操作创建临时文件；3. 限制临时文件权限，避免未经授权的访问；4. 建议用户将 WORKDIR 目录权限设置为仅当前用户可访问（chmod 700），并定期清理临时文件以降低风险。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "Tiger 安全审计工具 2.2.3 符号链接攻击任意文件写入漏洞"
updated = "2026-06-16"

