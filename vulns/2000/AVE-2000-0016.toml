[basic]
description = "FreeBSD 系统中的 Window Maker 窗口管理器组件 wmmon 存在命令执行漏洞。本地攻击者可通过在被攻击用户的 Home 目录下构造恶意的 .wmmonrc 配置文件，当 wmmon 程序加载该配置文件时会执行其中包含的任意命令，从而导致攻击者以目标用户权限执行恶意代码，实现本地权限提升。该漏洞影响 Windowmaker wmmon 1.0 b2 及更早版本，CVSS 评分 7.2，危害等级高。"
published = "1999-12-22T05:00:00.000"
remediation = "移除 wmmon 二进制文件的 setuid 权限位（`chmod u-s /usr/X11R6/bin/wmmon`），阻止本地用户通过劫持 `~/.wmmonrc` 配置文件实现提权；如无需使用，直接通过 `pkg_delete wmmon` 或 `pkg remove wmmon` 卸载该软件包以彻底消除风险。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "FreeBSD wmmon 配置文件本地权限提升漏洞"
updated = "2026-06-16T21:50:50.007"

