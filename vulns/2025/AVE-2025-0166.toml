[basic]
description = "用友 U8 CRM 客户关系管理系统的 checkselectpartapply.php 接口存在 SQL 注入漏洞，攻击者可在未经身份认证的情况下通过构造恶意 HTTP 请求向该接口注入恶意 SQL 语句，从而绕过数据库访问控制，窃取敏感数据（如用户凭证、客户信息）甚至获取数据库管理权限。该漏洞影响用友 U8 CRM 多个版本，危害严重，需尽快修复。"
published = "0730"
remediation = '升级用友 U8 CRM 至厂商发布的安全修复版本（2025 年最新补丁包），并登录后台在"系统管理-安全设置"中关闭 checkselectpartapply.php 接口的 SQL 拼接查询；临时缓解可在 Web 服务器（如 Nginx/Apache）配置该接口路径的访问白名单或 WAF 规则，拦截含单引号、union、select 等关键词的恶意请求。'
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "用友 U8 CRM客户关系管理系统 checkselectpartapply.php SQL注入漏洞"
updated = "0730"

