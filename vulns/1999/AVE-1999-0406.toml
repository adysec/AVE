[basic]
description = "Squid Web Proxy 2.2 版本在 Red Hat Linux 5.2、6.0 及其他发行版中将 cachemgr.cgi 安装于公开 Web 目录中，导致未授权远程攻击者可直接访问该 CGI 脚本，并将其作为中间代理向内网或外部系统发起任意连接，绕过网络访问控制实现跳板攻击。该漏洞 CVSS 评分 7.5（HIGH），影响范围覆盖所有部署了默认配置 Squid 2.2 的 Linux 系统，攻击者无需认证即可利用 cachemgr.cgi 的代理功能探测内网拓扑、访问受限服务或发起进一步攻击。厂商已在后续版本中通过限制 cachemgr.cgi 访问权限修复该漏洞，建议升级至修复版本或配置访问控制限制该脚本访问。"
published = "1999-07-25T04:00:00.000"
remediation = "将 Squid 升级至 2.2.STABLE4 或更高版本，新版本默认将 cachemgr.cgi 移出公共 Web 目录并限制访问权限；若暂无法升级，请立即从 Web 服务器的可访问目录（如 /usr/lib/cgi-bin/）中删除或移走 cachemgr.cgi，并在 Web 服务器配置中通过 Allow/Deny 规则限制仅允许本地回环地址（127.0.0.1）访问该 CGI，同时在 squid.conf 中配置 cachemgr_passwd 设置访问口令，以阻断远程攻击者借其作为 intermediary 连接其他系统。"
score = 7.5
severity = "HIGH"
sources = ["exploitdb"]
title = "Squid Web Proxy 2.2 cachemgr.cgi 未授权连接漏洞"
updated = "2026-06-16T21:48:53.680"

