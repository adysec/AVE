[basic]
description = "Computalynx CMail 2.3 SP2 及 2.4 版本的 SMTP 服务在处理 MAIL FROM 命令时存在缓冲区溢出漏洞，远程攻击者无需认证即可通过发送超长命令参数触发溢出，导致拒绝服务或任意代码执行。该漏洞 CVSS 评分 10.0，危害等级严重，受影响的邮件服务器可能被完全控制。"
published = "1999-09-12T04:00:00.000"
remediation = "Computalynx CMail 已停止维护，官方未发布安全补丁。建议立即迁移至受支持的 SMTP 邮件服务器（如 Postfix 或 Exchange），并在迁移完成前通过防火墙限制 25/TCP 端口的访问来源，仅允许可信 IP 连接，以降低被远程利用的风险。"
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "Computalynx CMail 2.3 SP2 及 2.4 SMTP 远程缓冲区溢出漏洞"
updated = "2026-06-16T21:50:37.103"

