[info]
author = "ave"
description = "AVE-2000-1109 verification"
id = "POC-AVE-2000-1109"
name = "PoC for AVE-2000-1109"
severity = "medium"
tags = ["ave-2000-1109"]
vuln_id = ["AVE-2000-1109"]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "timeout",
    "Connection refused",
    "closed",
]
