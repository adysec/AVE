[basic]
description = "博硕 BGM_Upload.ashx 接口存在任意文件上传漏洞，未经身份认证的攻击者可直接向该接口发送特制的 HTTP 上传请求，将恶意脚本文件（如 ASP、ASPX 等 WebShell）上传至服务器任意目录，从而获取服务器控制权。该漏洞危害严重，攻击者无需任何前置权限即可远程利用，CVSS 评分 9.8。建议对上传接口添加文件类型白名单校验、限制路径遍历并禁止 Web 目录执行动态脚本。"
published = "nday"
remediation = "联系博硕厂商获取 BGM_Upload.ashx 的最新安全补丁；在代码层对该接口添加文件类型白名单校验（仅允许图片等安全类型）；限制上传路径参数中不可包含 ../ 目录遍历序列；将 Web 上传目录配置为禁止执行任何动态脚本；通过防火墙或反向代理限制 BGM_Upload.ashx 仅允许受信内网 IP 访问。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "博硕 BGM_Upload.ashx 任意文件上传漏洞"
updated = "nday"

