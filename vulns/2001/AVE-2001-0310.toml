[basic]
description = "华盛顿大学 Pico 编辑器 3.x/4.x 版本（随 pine 邮件客户端 4.33 之前版本附带）存在符号链接攻击漏洞，本地用户可通过创建恶意符号链接欺骗 pico 编辑器覆盖任意系统文件。该漏洞源于 pico 编辑器在处理临时文件时未正确验证符号链接，攻击者需具备本地账户访问权限，通过构造指向敏感文件的符号链接，诱导受害者使用 pico 编辑文件时触发覆盖，导致任意文件被篡改，影响系统完整性。CVSS 2.1 分（本地访问、低复杂度、无需认证、部分完整性影响）。受影响版本为 pine 4.33 之前版本及随附的 pico 编辑器 3.x/4.x 版本，升级至 pine 4.33 或更高版本可修复。攻击者需具备本地登录权限，通过构造指向关键系统文件（如 /etc/passwd）的符号链接，诱导用户编辑文件触发漏洞覆盖目标文件。"
published = "2001-10-18T04:00:00.000"
remediation = "建议立即升级 Pine 到 4.33 或更高版本，或升级 Pico 编辑器到修复版本。若无法立即升级，可通过设置环境变量 TMPDIR 指向安全目录，或在启动时使用 -T 选项禁用临时文件创建作为临时缓解措施。"
score = 2.1
severity = "LOW"
sources = ["exploitdb"]
title = "华盛顿大学 Pico 文件覆盖漏洞"
updated = "2026-06-16T21:54:51.757"

