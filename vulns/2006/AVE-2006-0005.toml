[basic]
description = "FileZilla Server 0.9.22 之前版本在处理 LIST 和 NLST 命令的通配符参数时存在空指针解引用漏洞。远程未经认证的攻击者可通过向 FTP 服务端发送特制的包含通配符参数的 LIST 或 NLST 命令，触发空指针解引用导致服务崩溃，造成拒绝服务。该漏洞影响 FileZilla Server 0.9.21 及更早版本，CVSS 评分 4.0，危害等级中危。用户需升级至 0.9.22 或更高版本修复此漏洞。"
published = "2006-12-15T11:28:00.000"
remediation = "升级 FileZilla Server 至 0.9.22 及以上版本，该版本已修复 LIST/NLST 命令通配符参数导致的空指针解引用问题。若无法立即升级，可在防火墙或 IPS 中过滤包含通配符的 FTP LIST/NLST 命令，或限制仅信任 IP 访问 FTP 服务作为临时缓解措施。"
score = 4
severity = "MEDIUM"
sources = ["nuclei"]
title = "FileZilla Server 通配符参数 NULL 指针解引用拒绝服务漏洞"
updated = "2026-06-16T22:33:22.903"

