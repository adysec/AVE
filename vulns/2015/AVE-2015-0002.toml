[basic]
description = "Paul's PPP Package (ppp) 2.4.6 及更早版本中 plugins/radius/util.c 文件的 rc_mksid 函数存在缓冲区溢出漏洞。当 pppd 进程 PID 大于 65535 时，远程攻击者可通过向 RADIUS 服务器发送特制的 start accounting 消息触发该溢出，导致服务崩溃拒绝服务。该漏洞危害等级中危（CVSS 4.3），影响广泛使用的 PPP 拨号协议实现，攻击者无需认证即可远程触发。"
published = "2015-04-24T14:59:11.860"
remediation = "升级 ppp 至 2.4.7 或更高版本；如无法升级，可在 RADIUS 客户端配置中禁用记账功能（取消 `radius` 插件加载），或限制 pppd PID 不超过 65535 以降低风险。"
score = 4.3
severity = "MEDIUM"
sources = ["msrc"]
title = "Paul's PPP Package (ppp) rc_mksid 函数缓冲区溢出漏洞"
updated = "2026-06-17T00:25:42.897"

