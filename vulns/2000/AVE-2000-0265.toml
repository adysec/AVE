[basic]
description = "Solaris 系统的 lp 打印服务在处理 -d 选项参数时存在缓冲区溢出漏洞。本地攻击者可通过向 lp 命令传递超长的 -d 参数触发该漏洞，覆盖内存中的关键数据结构，从而获取 root 权限。该漏洞影响 Solaris 2.6 及 7.0 版本，CVSS 评分 7.2，危害等级高。建议用户安装厂商发布的安全补丁进行修复。"
published = "2000-04-24T04:00:00.000"
remediation = "请安装 Sun 针对 lp 命令缓冲区溢出的安全补丁 (Patch ID 106235-01 或更新版本)，将 Solaris 7 升级至最新维护版本。如无法立即打补丁，可通过 chmod 移除 lp 命令的 setuid 位作为临时缓解，但需注意这会影响打印功能。对于 Solaris 2.6 系统，安装对应补丁 106827-01。"
score = 7.2
severity = "HIGH"
sources = ["epss"]
title = "Sun Solaris lp 命令 -d 选项缓冲区溢出漏洞"
updated = "2026-06-16T21:51:27.727"

