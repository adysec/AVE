[basic]
description = "Qualcomm qpopper 3.0 的 beta 测试版本在处理 POP3 协议的 LIST 命令时存在缓冲区溢出漏洞。由于程序未对 LIST 命令参数长度做边界校验，本地已登录用户可向服务进程发送超长的 LIST 命令参数，覆盖栈上返回地址，从而执行任意代码并提升至 root 权限。该漏洞影响运行 qpopper 3.0 beta 的邮件服务器，攻击条件为攻击者需先获得本地普通用户访问权限，利用方式即构造超长 LIST 参数触发溢出完成本地提权。"
published = "2000-01-26T05:00:00.000"
remediation = "立即升级 qpopper 至 3.1 或更高稳定版本（最新为 4.1），该漏洞已在后续版本中修复。如无法升级，可在 inetd/xinetd 配置中限制 qpopper 仅监听内网 IP，并在防火墙层面限制 POP3 端口（110/TCP）仅允许受信来源访问。同时建议迁移至 Dovecot 等持续维护的邮件服务器软件。作为临时缓解措施，限制本地用户登录服务器可降低被利用风险。"
score = 7.2
severity = "HIGH"
sources = ["cve"]
title = "Qualcomm qpopper 3.0 缓冲区溢出本地权限提升漏洞"
updated = "2026-06-16T21:50:59.533"

