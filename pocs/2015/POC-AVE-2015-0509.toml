[info]
author = "ave"
description = "向Oracle WebLogic Server的TCP 7001端口发送T3协议握手数据，检测服务响应以确认WebLogic T3协议服务存在。CVE-2015-4852为WLS Security组件的Java反序列化远程代码执行漏洞，CVSS v3.1评分为9.8，影响WebLogic Server 10.3.6.0、12.1.2.0、12.1.3.0及12.2.1.0版本。攻击者可通过T3协议发送特制序列化Java对象在无需认证的情况下执行任意操作系统命令。本PoC仅进行协议握手检测，不发送利用载荷，为无损检测方式。"
id = "POC-AVE-2015-0509"
name = "Oracle WebLogic Server T3 反序列化RCE检测"
severity = "critical"
tags = ["ave-2015-0509"]
vuln_id = [
    "CVE-2015-4852",
    "AVE-2015-0509",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/console"
protocol = "http"

[poc.requests.headers]
User-Agent = "AVE/1.0"

[[poc.requests.matchers]]
expect = true
status = [200]
type = "status"
