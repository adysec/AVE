[basic]
description = "Palo Alto Networks Prisma Browser 存在条件竞争漏洞，本地经过身份验证的非管理员用户可利用此漏洞绕过浏览器的访问控制和数据策略限制，导致未授权访问敏感信息或规避安全策略。攻击者需要本地访问权限并以低权限用户身份操作，利用条件竞争窗口实施绕过。"
published = "2026-05-13"
remediation = "升级 Prisma Browser 到 146.10.7.154 或更高版本，该版本在 PAN-SA-2026-0007 安全公告中发布，可从 Palo Alto Networks 官方支持门户获取。受影响版本为低于 146.10.7.154 的桌面版。"
score = 4.7
