[basic]
description = "CVSWeb 1.80 中的 cvsweb CGI 脚本存在不安全的 Perl `open` 函数调用漏洞，具有 CVS 仓库写入权限的远程攻击者可通过向 `open` 函数传递包含 shell 元字符的特制参数，触发命令注入漏洞，进而导致在目标服务器上执行任意命令。该漏洞影响 CVSWeb 1.80 版本，CVSS 评分 7.2，危害等级高。"
published = "2000-07-12T04:00:00.000"
remediation = "升级 CVSWeb 至 2.0 及以上版本，该版本已修复 Perl open() 函数中 shell 元字符未过滤的问题。如无法升级，建议迁移至 ViewVC 替代方案，并在 CVS 服务器上配置严格的文件路径白名单，限制 CGI 脚本对 repository 路径的写入权限。同时在 Web 服务器层面过滤传入参数中的特殊字符（如 |、;、` 等）。"
score = 7.2
severity = "HIGH"
sources = ["cve"]
title = "CVSWeb Developer CVSWeb 1.80 远程代码执行漏洞"
updated = "2026-06-16T21:52:13.950"

