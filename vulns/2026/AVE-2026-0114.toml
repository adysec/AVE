[basic]
description = "FatFs（ChaN FatFs）R0.16 及之前版本的 FAT32 文件系统挂载函数 mount_volume() 中存在整数溢出漏洞（CWE-190）。当攻击者构造一个 BPB_FATSz32 字段值为 0x80000001 的恶意 FAT32 镜像时，fasize 与 fs->n_fats 的乘法运算会发生整数回绕，导致后续读取操作的偏移量和长度被攻击者控制。该漏洞允许物理接触的攻击者通过挂载特制 FAT32 镜像实现任意内存读取或代码执行，在 OTA/固件更新场景下也可远程触发。CVSS 评分 7.6，危害等级高。"
published = "2026-07-01T15:17:12.313"
remediation = "立即从 https://elm-chan.org/fsw/ff/ 下载并应用 FatFs R0.16 的 2026 年 7 月 10 日最新补丁，或在 mount_volume() 中 fasize *= fs->n_fats 运算前添加整数溢出检查：if (fs->n_fats > 0 && fasize > UINT_MAX / fs->n_fats) return FR_INT_ERR；同时校验 BPB_FATSz32 字段值不超过合法范围作为深层防御。"
score = 7.6
severity = "HIGH"
sources = ["hwpoc"]
title = "ChaN FatFs FAT32 整数溢出漏洞"
updated = "2026-07-02T14:37:48.377"

