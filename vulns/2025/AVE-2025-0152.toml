[basic]
description = "金和OA的 /C6/JHSoft.Web.DailyTaskManage/TaskTreeJSON.aspx 接口存在 SQL 注入漏洞，攻击者无需身份认证即可通过构造恶意的 id 参数注入恶意 SQL 语句，可导致数据库信息泄露（如数据库版本、管理员凭据等敏感数据）。攻击条件低，仅需目标系统开放该接口即可利用，危害较大。"
published = "0701"
remediation = "联系金和官方获取 jc6 最新安全补丁，升级至已修复 SQL 注入漏洞的版本；对 /C6/JHSoft.Web.DailyTaskManage/TaskTreeJSON.aspx 的 id 参数实施参数化查询或预编译处理；临时缓解措施可在 WAF 或反向代理层拦截 id 参数含 union、select、@@version 等 SQL 关键字的请求。"
score = 5
