[basic]
description = '该漏洞影响多种厂商和版本的入侵检测系统（IDS）设备，包括Cisco Secure IDS 2.0/3.0、Cisco Catalyst 6000入侵检测系统模块、Dragon Sensor 4.x、Snort 1.x（低于1.8.1版本）、ISS RealSecure网络传感器5.x和6.x（XPU 3.2之前）、ISS RealSecure服务器传感器5.5和6.0（Windows版）。漏洞原理是这些系统中存在一种检测逃避机制，攻击者可以通过向目标系统发送包含非标准"%u" Unicode编码的ASCII字符的URL来构造HTTP攻击请求，从而触发本漏洞，实现对攻击流量的检测逃避。该漏洞影响范围广泛，涵盖了多个主流IDS平台，为攻击者提供了绕过安全监测系统的机会。攻击条件方面，远程攻击者无需身份认证即可利用此漏洞，攻击者只需向目标系统发送特制的数据包或构造包含Unicode编码的URL即可触发漏洞而无需任何前置条件。这意味着攻击者可以在不具备任何权限或认证的情况下远程控制目标IDS系统。此外，由于IDS设备通常部署在网络边界，具有监控和过滤大量网络流量的能力，一旦被此漏洞影响，将导致攻击者能够直接绕过这些安全设备，进入更深层次的网络环境，最终可能导致数据泄露、系统破坏或更严重的网络安全事件。因此，尽管此漏洞属于检测逃避类问题，但其潜在影响非常严重，可能导致整个网络安全防御体系失效，攻击者可以更从容地实施进一步的攻击。'
published = "2001-10-30T05:00:00.000"
remediation = "建议立即升级受影响的 IDS 产品：Snort 升级至 1.8.1 或更高版本，ISS RealSecure 升级至 XPU 3.2 或更高版本，Cisco Secure IDS 升级至厂商发布的最新补丁版本。同时在 Web 应用防火墙或反向代理层面启用 Unicode 解码规则（如 %u 编码解码、UTF-8 规范化），并在 IDS 规则集中添加针对非标准 Unicode 编码的检测规则（如 Snort 规则 sid:1002 等）。若无法立即升级，可在边界防火墙配置规则拦截包含 %u 编码的 HTTP 请求作为临时缓解措施。"
score = 7.5
severity = "HIGH"
sources = ["exploitdb"]
title = "Cisco Secure IDS等多款IDS产品 编码IIS攻击检测绕过漏洞"
