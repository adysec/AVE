[basic]
description = "天运通 PACTL 系统存在任意文件上传漏洞，攻击者可通过向 upload 接口发送特制的 HTTP 请求，绕过服务端文件类型校验，上传包含恶意代码的脚本文件（如 JSP/PHP），从而获取服务器控制权，实现远程代码执行。该漏洞影响天运通 PACTL 相关版本，攻击者无需身份认证即可远程利用，危害严重。"
published = "0719"
remediation = "联系天运通厂商获取最新安全补丁，升级 PACTL 系统至修复版本。在升级前，临时缓解措施包括：在应用层对 upload 接口添加文件类型白名单校验（仅允许图片/文档等必要类型），将上传目录设置为不可执行脚本权限，并使用随机重命名方式存储上传文件以防止路径遍历攻击。同时建议在 Web 服务器层面限制 upload 目录的脚本解析权限。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "天运通 PACTL 任意文件上传漏洞"
updated = "0719"

