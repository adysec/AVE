[basic]
description = "Ximian Evolution 1.0.x 及更早版本的 camel 组件存在 SSL 证书验证绕过漏洞。当客户端首次建立 SSL 连接并验证证书后，后续在同一会话中建立新的 SSL 连接时，camel 组件未能重新验证服务器证书的有效性。远程攻击者可通过中间人攻击方式，在客户端与服务器之间插入恶意代理，拦截或篡改加密通信内容，导致敏感信息泄露。攻击者只需处于同一网络路径即可实施攻击，无需身份认证，危害较大。"
published = "2003-04-22T04:00:00.000"
remediation = "升级 Ximian Evolution 至 1.1.0 或更高版本，该版本在每次建立新 SSL 连接时均强制验证证书链。若无法升级，可在 Evolution 配置中禁用 SSL/TLS 自动连接功能，或使用 stunnel 等工具在客户端与服务器之间建立独立 TLS 隧道，由外部工具接管证书验证逻辑。"
score = 5
severity = "MEDIUM"
sources = ["osv"]
title = "Ximian Evolution SSL证书验证绕过漏洞"
updated = "2026-06-16T21:59:23.413"

