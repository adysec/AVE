[basic]
description = 'Microsoft 零管理工具包 (ZAK) 1.0 及 Office 97 的 Appstation 模式存在策略绕过漏洞。攻击者可通过 Office 97 应用程序（如 Word）启动 Windows 资源管理器，将任意程序安装到临时目录并重命名为允许运行的应用程序名称（如 Winword.exe），从而绕过"仅运行允许的应用程序"安全策略。该漏洞影响安装了 ZAK 1.0 和 Office 97 的 Windows 系统，需要本地用户权限且能访问 Office 应用程序才可利用，CVSS 评分 4.6，属中危本地权限提升漏洞。'
published = "2005-01-07T05:00:00.000"
remediation = '立即卸载 Microsoft Zero Administration Kit (ZAK) 1.0 并删除相关注册表项，同时禁用 Office 97 的"仅允许运行指定的应用程序"策略，禁止通过 Office 应用程序启动 Explorer.exe，并清除TEMP目录中可疑的Winword.exe等文件。'
score = 4.6
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Microsoft Zero Administration Kit (ZAK) 1.0 Office 97 后门访问漏洞"
updated = "2026-06-16T21:50:25.593"

