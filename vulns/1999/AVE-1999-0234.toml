[basic]
description = "Microsoft FrontPage Personal Web Server (PWS) 1.0 的服务器扩展组件存在缓冲区溢出漏洞。远程攻击者可通过向目标系统发送超长 URL 请求，触发缓冲区溢出，导致 Web 服务崩溃或拒绝服务。该漏洞影响 Windows 95 平台上的 FrontPage 服务器扩展 3.0.2.926 及可能其他版本，攻击者无需身份认证即可利用，但仅能导致服务异常终止，无法实现代码执行。"
published = "2001-03-12T05:00:00.000"
remediation = "该漏洞影响已停止维护的 Windows 95 及 Microsoft FrontPage Personal Web Server 1.0（Server Extensions 3.0.2.926）。建议立即迁移至受支持的 Windows Server 版本并部署 IIS 或 Apache 等现代 Web 服务器。无法升级时，可部署 WAF/IPS 设备过滤超长 URL 请求，限制 URL 长度不超过 2048 字节，并在防火墙层面限制对 PWS 服务的访问来源 IP 作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Microsoft FrontPage Personal Web Server 缓冲区溢出拒绝服务漏洞"
updated = "2026-06-16T21:48:50.150"

