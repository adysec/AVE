[basic]
description = "CSM 邮件服务器在处理客户端连接时存在缓冲区溢出漏洞。当远程攻击者与目标邮件服务器建立 SMTP 连接，并在会话初始阶段发送超长的 HELO 命令（包含远超预期长度的字符串）时，服务器未能对输入长度进行边界校验，导致内部缓冲区被溢出覆盖。该漏洞影响运行存在缺陷版本的 CSM 邮件服务器的系统，未经身份认证的远程攻击者无需任何权限即可利用此缺陷，既可使邮件服务崩溃造成拒绝服务，也可能通过精心构造的溢出数据覆盖返回地址，从而在目标服务器上执行任意命令，完全控制受影响主机。"
published = "1999-12-29T05:00:00.000"
remediation = "建议立即升级 CSM mail server 至官方发布的修复版本（2000 年 1 月补丁版本），并限制 SMTP 服务端口（默认 25）仅对可信 IP 开放。如无法立即升级，可在防火墙或入侵防御系统上设置 HELO 命令长度阈值（如不超过 512 字节），阻断超长 HELO 请求作为临时缓解措施。"
score = 10
severity = "CRITICAL"
sources = ["cve"]
