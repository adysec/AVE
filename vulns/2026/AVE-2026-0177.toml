[basic]
description = "Fortinet FortiClient EMS 存在 SQL 注入漏洞，攻击者可向管理接口或 API 端点发送特制的 SQL 查询语句，在未授权或低权限条件下执行任意 SQL 命令。成功利用该漏洞可导致攻击者绕过身份验证、窃取后端数据库中的敏感配置信息，并在特定条件下进一步利用数据库功能实现远程命令执行。该漏洞影响 FortiClient EMS 7.4.5 之前版本，Fortinet 已在安全公告中确认并在对应版本中修复。"
published = "nday"
remediation = "立即升级 FortiClient EMS 至 7.4.5 或更高版本。如无法立即升级，在 EMS 服务器防火墙上限制对 443/TCP 端口的访问来源，仅允许受信管理 IP 连接，并启用 SQL 注入攻击检测规则作为临时缓解。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "Fortinet FortiClient EMS SQL注入远程命令执行漏洞"
updated = "nday"

