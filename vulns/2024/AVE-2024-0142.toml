[basic]
description = "华务 OA 协同办公平台的 iWebOfficeSign 模块中 DocumentEdit_unite.jsp 接口存在 SQL 注入漏洞。攻击者可通过构造特制的 RecordID 参数，绕过身份认证直接向数据库注入恶意 SQL 语句，导致数据库敏感信息泄露，严重时可进一步读取服务器文件甚至获取系统控制权限。"
published = "2024-07-22"
remediation = "1. 联系厂商获取安全补丁，升级 iWebOfficeSign 组件至修复版本；2. 对 RecordID 参数实施严格的输入过滤和参数化查询，防止 SQL 注入；3. 在 WAF 层面配置规则拦截 UNION、SLEEP 等危险 SQL 关键字；4. 限制数据库账户权限，遵循最小权限原则，禁用 xp_cmdshell 等危险扩展。"
score = 7.5
severity = "HIGH"
sources = ["hwpoc"]
title = "华务 OA iWebOfficeSign DocumentEdit_unite.jsp SQL 注入漏洞"
updated = "2024-07-22"

