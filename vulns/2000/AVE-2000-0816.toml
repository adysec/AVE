[basic]
description = "Red Hat Linux 6.2 中 bundled 的 restore 工具（0.4b15 及更早版本）存在环境变量信任漏洞。该程序信任 RSH 环境变量指定的路径名，本地攻击者可预先修改 RSH 变量指向特洛伊木马程序，当 root 用户或特权进程调用 restore 时，木马将以 root 权限执行，导致本地权限提升。攻击者需具备本地账户访问权限以设置恶意环境变量。"
published = "2001-01-09"
remediation = "升级 dump/restore 软件包至 0.4b16 及以上版本。临时缓解措施：以 root 运行 restore 前执行 unset RSH 清除环境变量，或移除 restore 和 dump 的 SUID 权限以防止普通用户利用。"
score = 7.2
severity = "HIGH"
sources = [
    "cve",
    "exploitdb",
]
title = "Red Hat Linux restore 本地权限提升漏洞"
updated = "2026-06-16"

