[basic]
description = "perlshop.cgi 购物车程序存在敏感信息泄露漏洞，该程序将客户订单信息、信用卡号等敏感数据以文件形式存储在 Web 根目录下，未进行任何访问控制。远程攻击者只需通过 HTTP 请求直接访问这些文件路径即可获取客户敏感信息，导致用户隐私数据泄露。该漏洞影响使用 perlshop.cgi 的早期 Perl 购物车系统，攻击条件简单，无需身份认证。"
published = "2005-05-02T04:00:00.000"
remediation = "立即将 perlshop.cgi 的数据存储目录移出 Web 根目录（如移至 /var/lib/perlshop/），并在 Web 服务器配置中禁止直接访问该目录（Apache 使用 <Directory> 指令或 .htaccess 的 Deny from all）。由于 perlshop.cgi 已长期无人维护，建议迁移至现代购物车系统（如 Magento、WooCommerce）并删除旧脚本。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "perlshop.cgi 购物车程序敏感信息泄露漏洞"
updated = "2026-06-16T21:50:18.230"

