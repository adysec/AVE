[basic]
description = "JournalX 期刊稿件采编系统的 Resume 模块存在任意文件上传漏洞，攻击者可通过构造特制的文件上传请求，绕过系统对文件类型的校验，将恶意脚本文件（如 JSP/PHP）上传至服务器可执行目录。成功利用该漏洞可导致远程代码执行，完全控制目标服务器。该漏洞影响 JournalX 系统的多个版本，危害严重，无需身份认证即可触发。"
published = "0719"
remediation = "联系厂商获取最新安全补丁，升级 JournalX 稿件采编系统至最新版本；在服务器端严格限制上传文件类型，仅允许 doc/pdf/docx 等合法格式，禁止上传 jsp/php/asp 等可执行脚本文件；对上传目录取消执行权限，设置为只读存储；对上传文件进行重命名处理，避免使用原始文件名；部署 WAF 规则拦截含有恶意代码的文件上传请求。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "JournalX 期刊稿件采稿系统 任意文件上传漏洞"
updated = "0719"

