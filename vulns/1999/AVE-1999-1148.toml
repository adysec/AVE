[basic]
description = "TenFour TFS Gateway SMTP 邮件服务器 3.2 版本存在缓冲区溢出漏洞。攻击者通过向 SMTP 服务的 MAIL FROM 命令中发送超过 128 字节的特制字符串即可触发该溢出，导致邮件服务器崩溃，并可能进而执行任意代码。该漏洞影响运行 TenFour TFS Gateway SMTP 3.2 的服务器，未经身份认证的远程攻击者即可利用，无需特殊权限或交互条件。CVSS 评分 7.5，危害等级为高。"
published = "1999-09-02T04:00:00.000"
remediation = "TenFour 官方已在 TFS SMTP Gateway 4.0 中修复该缓冲区溢出漏洞。建议立即将 TenFour TFS Gateway SMTP 服务器从 3.2 升级至 4.0 或更高版本。如暂时无法升级，可通过在防火墙或邮件网关处对 SMTP 连接中 MAIL FROM 命令的数据长度进行限制（拒绝超过 128 字节的字符串）作为临时缓解措施，并监控邮件服务器日志以发现异常连接断开。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
