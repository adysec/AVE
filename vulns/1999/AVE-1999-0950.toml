[basic]
description = "CVE-1999-0637 指 Unix 系统上开启的 systat 远程服务存在信息泄露类安全漏洞。systat 服务（通常监听 TCP 11 端口）会在收到连接请求时返回系统当前进程状态、CPU 与内存占用等敏感信息，且默认无需任何身份认证即可访问。远程攻击者只需与目标主机建立 TCP 连接并发送请求，即可在未授权情况下获取主机运行状态与进程清单，进而辅助侦察与进一步攻击。该漏洞影响默认启用 systat 服务的各类 Unix/Linux 系统，利用条件仅为网络可达且服务端口开放，危害虽不直接导致代码执行，但显著增加了系统被探测与定向攻击的风险。"
published = "1999-01-01T05:00:00.000"
remediation = "建议在 /etc/inetd.conf 中注释或删除 systat 服务所在行（通常为 systat stream tcp nowait root /usr/sbin/systat），然后重启 inetd 或 xinetd 服务使配置生效。如使用 systemd 系统，执行 systemctl disable systat 并停止对应服务。作为替代监控方案，可使用 netstat、ss 等本地命令查看系统状态。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Unix systat 服务 多个远程安全漏洞"
updated = "2026-06-16T21:48:46.140"

