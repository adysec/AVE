[basic]
description = "Linux内核SCSI驱动程序mpi3mr存在一个配置页面破坏漏洞。驱动程序通过SAS传输暴露的sysfs接口，允许启用/禁用控制器/扩展器中的PHY。当多个PHY被快速启用/禁用时，会导致与SAS IO单元/SAS扩展器相关的持久和当前配置页面遭到破坏。攻击者通过sysfs接口需要本地访问权限，触发PHY状态的快速切换操作，从而引发配置页面损坏。该漏洞影响Linux内核版本，CVSS评分5.5（中等严重性）。尽管目前没有报告出具体的利用实例或直接影响，但配置页面的破坏可能导致系统不稳定，并可能为进一步攻击提供机会。"
published = "2025-01-11T13:15:30.233"
remediation = "建议立即升级 Linux 内核至已修复版本：Ubuntu 24.04 LTS 请安装 USN-7381-1 提供的内核更新（linux-image-6.8.0-52-generic 及以上）；Ubuntu 22.04 LTS 请安装 USN-7514-1 提供的内核更新。其他发行版请升级至 Linux 6.12.2、6.11.11、6.6.66、6.1.117 或 5.15.176 及以上版本。若暂无法升级内核，可通过 `echo 0 > /sys/class/scsi_host/hostX/device/phy_enable` 禁用受影响控制器的 PHY 切换功能作为临时缓解，但会失去 PHY 启用/禁用功能。建议优先通过发行版包管理器（如 `apt update && apt upgrade linux-image-generic`）应用官方内核更新。"
score = 5.5
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux内核 SCSI mpi3mr驱动 配置页面损坏漏洞"
updated = "2026-06-17T08:14:04.303"

