[basic]
description = "Linux 系统中的 man 帮助程序存在缓冲区溢出漏洞，本地攻击者可通过设置超长的 MANPAGER 环境变量触发该漏洞，导致以 man 组权限（egid 15）执行任意代码，实现本地权限提升。该漏洞影响 RedHat 6.1 等 Linux 发行版，CVSS 评分 7.2，危害等级高。利用方式为本地触发，无需目标系统开启网络服务。"
published = "2000-02-26T05:00:00.000"
remediation = "升级 RedHat 6.1 的 man 程序包至修复版本（如 man-1.5i-4），或直接升级至受支持的 RedHat Enterprise Linux 现代版本（RHEL 7/8/9）。如无法升级系统，可临时移除 man 命令的 SGID 权限（chmod g-s /usr/bin/man），并在 /etc/profile 中全局禁止通过 MANPAGER 环境变量传递恶意参数，同时限制不可信用户的本地 shell 访问权限。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "Linux man 本地缓冲区溢出权限提升漏洞"
updated = "2026-06-16T21:51:08.797"

