[basic]
description = "HP-UX 操作系统的 SharedX 组件中的 recserv 程序存在拒绝服务漏洞。未经认证的远程攻击者可通过向 recserv 服务端口发送特制网络请求，导致该服务崩溃或停止响应，影响 HP-UX 系统上 SharedX 功能的正常使用。该漏洞无需身份验证即可远程触发，攻击复杂度低。"
published = "1998-09-03"
remediation = "安装 HP 安全公告 HPSBUX9810-086 中对应的 PHSS 补丁集。临时缓解措施：在防火墙或 TCP Wrappers 中限制对 recserv 服务端口的访问，仅允许受信任主机连接；如无需使用 SharedX 功能，建议直接禁用该服务。"
score = 5.0
severity = "MEDIUM"
sources = [
    "cve",
    "nvd",
]
title = "HP-UX SharedX recserv 程序拒绝服务漏洞"
