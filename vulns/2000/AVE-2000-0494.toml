[basic]
description = "Savant Web Server 2.1 及 3.0 版本存在远程缓冲区溢出漏洞。攻击者无需身份认证，通过向目标服务器发送超长特制 GET 请求即可触发缓冲区溢出，导致服务器进程崩溃或执行任意命令。该漏洞影响 Savant Web Server 2.1 和 3.0 版本，CVSS 评分 7.5，危害等级高。官方已发布修复版本，建议用户升级至最新版本。"
published = "2000-07-08T04:00:00.000"
remediation = "立即停止使用 Savant Web Server（已停止维护，无官方补丁），迁移至受支持的产品如 Apache HTTP Server、Nginx 或 Microsoft IIS。如无法立即迁移，可在前端部署反向代理（如 Nginx、HAProxy）对 HTTP GET 请求 URI 长度做严格限制（建议不超过 4096 字节），并在网络边界防火墙限制 Savant 端口（默认 80/443）仅对可信 IP 开放，同时部署 IDS/IPS 规则检测超长 GET 请求攻击流量。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "Michael Lamont Savant WebServer 远程缓冲区溢出漏洞"
updated = "2026-06-16T21:52:10.233"

