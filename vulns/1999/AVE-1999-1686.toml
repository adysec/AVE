[basic]
description = 'Matt Wright Guestbook.pl 2.3.1 留言本程序存在服务端包含（SSI）注入漏洞。该程序在处理用户提交的留言内容时，仅通过删除"<!--"和"-->"分隔符之间的文本来过滤 SSI 命令，但 Apache 1.3.9 及部分其他版本支持除"-->"以外的其他 SSI 关闭序列，导致过滤机制可被绕过。远程攻击者可构造包含恶意 SSI 指令的留言内容提交至留言板，当管理员或用户浏览该留言时，恶意指令将在 Web 服务器上下文中被执行，从而实现任意命令执行。该漏洞影响运行于早期 Apache 服务器上的 Guestbook.pl 2.3.1 及可能的其他版本，CVSS 评分 7.5，危害等级为高危。'
published = "1999-09-13T04:00:00.000"
remediation = "Guestbook.pl 2.3.1 已停止维护且不再更新，建议立即停用该脚本并替换为受支持的留言本方案（如 Serendipity 或自定义脚本）。若暂时无法替换，可在 Apache 配置中针对留言本目录禁用 SSI（Options -Includes），同时在脚本入口处对所有用户输入执行严格过滤，将 `<`、`>`、`!`、`-` 等特殊字符转义或删除。"
score = 7.5
severity = "HIGH"
sources = ["exploitdb"]
title = "Matt Wright Guestbook.pl 留言簿脚本服务器端包含注入漏洞"
updated = "2026-06-16T21:49:36.507"

