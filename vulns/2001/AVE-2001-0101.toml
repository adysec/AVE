[basic]
description = "SSH 1.2.27 至 1.2.30 版本中的 ssh-keygen 工具在启用 Secure-RPC 功能时存在弱加密身份认证漏洞。本地攻击者可利用该漏洞恢复同一系统上其他用户生成的 SUN-DES-1 认证魔语（magic phrase），进而解密该用户的私钥文件，导致 SSH 私钥泄露。该漏洞影响 SSH 1.2.x 系列版本，CVSS 评分 3.6，危害等级低，攻击者需具备本地系统访问权限。"
published = "2001-06-02T04:00:00.000"
remediation = "升级至 SSH 2.0 及以上版本或迁移至 OpenSSH，Secure-RPC 认证机制已在后续版本中被移除。如无法立即升级，可禁用 Secure-RPC 认证（在 sshd_config 中移除或注释 Secure-RPC 相关配置项），并限制本地用户对 ssh-keygen 的访问权限。"
score = 3.6
severity = "LOW"
sources = ["exploitdb"]
title = "SSH ssh-keygen Secure-RPC 弱加密身份认证漏洞"
updated = "2026-06-16T21:53:58.833"

