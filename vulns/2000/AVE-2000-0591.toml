[basic]
description = "IRC XChat 客户端 1.4.2 及更早版本存在命令执行漏洞，远程攻击者无需身份认证即可利用此漏洞。攻击原理是将 Shell 元字符（如反引号、管道符等）编码进恶意 URL 中，当 XChat 客户端自动调用外部浏览器打开该 URL 时，包含的恶意命令会被 Shell 解析执行，从而实现任意命令执行。该漏洞影响 XChat 1.4.2 及之前所有版本，CVSS 评分 7.5，危害等级高，攻击者可通过 IRC 频道消息、私聊等方式诱使用户点击恶意链接触发。"
published = "2000-10-20T04:00:00.000"
remediation = "升级 XChat 至 1.4.3 或更高版本，该版本修复了 URL 中 shell 元字符编码导致的命令执行问题。如无法升级，可在 XChat 设置中禁用自动打开 URL 功能，或使用其他 IRC 客户端替代。同时在浏览器侧禁用对 `|` `;` `$()` 等 shell 特殊字符的自动解析。"
score = 7.5
severity = "HIGH"
sources = ["redhat"]
title = "XChat IRC客户端 远程命令执行漏洞"
updated = "2026-06-16T21:52:28.807"

