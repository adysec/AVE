[basic]
description = "Microsoft Windows 95/98/ME 操作系统在处理包含 DOS 设备名称（如 CON、NUL、AUX、LPT1 等）的路径名时存在缺陷，攻击者通过构造特制路径名可导致系统蓝屏崩溃或完全挂起，造成拒绝服务。该漏洞无需身份验证即可远程触发，影响所有 Windows 9x 系列系统。"
published = "2000-03-04"
remediation = "微软已发布安全公告 MS00-007 提供补丁修复此漏洞，建议用户升级至 Windows 2000 或更高版本操作系统，或在 Windows 9x 系统上安装官方补丁程序。由于 Windows 9x 已停止支持，最彻底的修复方案是升级到受支持的 Windows 版本。"
score = 5.0
severity = "MEDIUM"
sources = [
    "cve",
    "exploitdb",
]
title = "Microsoft Windows 9x 设备名路径处理拒绝服务漏洞"
updated = "2000-07-13"

