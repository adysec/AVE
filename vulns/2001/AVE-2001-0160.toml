[basic]
description = "Caucho Resin 1.3b1 及更早版本存在信息泄露漏洞，远程攻击者可通过在 HTTP 请求的 WEB-INF 路径前插入 `.jsp` 后缀，绕过 Servlet 容器的访问限制，直接读取 JavaBean 文件的源代码。该漏洞可导致应用程序的敏感业务逻辑、数据库连接信息及配置参数泄露，攻击者无需任何身份认证即可通过构造特制 URL 远程利用，影响范围包括 Caucho Resin 1.2 和 1.3 系列版本。"
published = "2001-06-18T04:00:00.000"
remediation = "升级至 Caucho Resin 1.3.1 及以上版本，该版本已修复通过 `.jsp` 前缀绕过 WEB-INF 目录限制的问题。由于 Resin 1.x 系列早已停止维护，建议迁移至 Resin 4.0.x 或更高版本，同时在 `web.xml` 中添加 `<security-constraint>` 规则禁止外部直接访问 `/WEB-INF/*` 路径，作为纵深防御措施。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Caucho Technology Resin JavaBean 源码泄露漏洞"
updated = "2026-06-16T21:54:14.087"

