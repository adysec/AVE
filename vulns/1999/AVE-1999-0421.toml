[basic]
description = "NCSA HTTPd 1.3/1.4.x/1.5 及 Apache HTTP Server 0.8.11/0.8.14 版本中 ScriptAlias 目录配置存在源码泄露漏洞。远程攻击者无需认证即可通过向服务器发送特制 HTTP 请求，绕过 CGI 程序正常执行流程，直接读取 CGI 脚本的源代码，导致数据库凭据、业务逻辑等敏感信息泄露。该漏洞影响早期广泛部署的 Web 服务器环境，利用方式简单且危害较高。"
published = "1997-01-01T05:00:00.000"
remediation = "升级至 Apache HTTP Server 1.3.0 或更新版本（推荐 2.4.x），该漏洞已在后续版本中修复。NCSA httpd 已停止维护，应迁移至 Apache httpd。临时缓解措施可在 httpd.conf 中移除 ScriptAlias 指令，或对 CGI 目录添加 <FilesMatch> 权限限制禁止直接访问。此外应确保使用正斜杠而非反斜杠访问路径，并禁用 SSI（Server-Side Includes）相关配置。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "NCSA HTTPd 与 Apache httpd ScriptAlias CGI 源代码泄露漏洞"
updated = "2026-06-16T21:47:58.393"

