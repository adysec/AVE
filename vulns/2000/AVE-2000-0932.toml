[basic]
description = "imwheel 套件中的 imwheel-solo 是一个 SUID Perl 脚本，存在一个危险的符号链接漏洞。攻击者能够通过精心 crafted 的 .imwheelrc 文件（或相关临时文件）创建指向敏感文件（如 /etc/shadow、/etc/passwd 等）的符号链接，当 imwheel-solo 脚本在处理这些文件时，将导致系统权限用户实际修改这些关键系统文件。漏洞原理在于脚本未充分验证目标文件的真实路径，而是直接打开并写入用户控制的路径。具体影响方面，任何本地用户均可利用此漏洞修改系统关键配置文件，潜在后果包括：破坏系统安全（修改密码文件）、破坏服务配置（权限提升）、数据破坏或导致系统服务崩溃。攻击条件要求攻击者首先获得本地用户权限，通常通过其他漏洞或社会工程学手段实现，这类攻击通常通过辅助工具（如编译自定义 payload）结合定时任务或登录后执行链实现。利用方式上，攻击者需要先分析目标系统的 .imwheelrc 文件权限和位置，精心设计恶意符号链接路径，利用 imwheel-solo 的 SU 权限触发写入操作，因此这是典型的本地提权漏洞，危害等级为低至中（CVSS v2.0 评分为 2.1），影响系统完整性和机密性。官方补丁通常建议升级到安全版本并修改 imwheel-solo 的权限配置，或直接禁用其 SU 权限以消除风险。"
published = "2001-08-31"
remediation = "立即升级 imwheel 至修复版本（Red Hat 已发布 RHSA-2000:016 安全公告，对应 imwheel 补丁版本）。如无法升级，可删除 imwheel-solo 的 suid 位（chmod u-s /usr/bin/imwheel-solo），或直接卸载 imwheel 软件包以消除攻击面。临时缓解措施包括确保 .imwheelrc 文件所在目录仅由可信用户管理。"
score = 5
severity = "MEDIUM"
sources = ["redhat"]
title = "imwheel imwheel-solo 本地符号链接任意文件修改漏洞"
updated = "2001-08-31"

