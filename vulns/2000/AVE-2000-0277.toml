[basic]
description = "tcpdump 和 Ethereal 等网络抓包工具的 DNS 解码器存在无限循环漏洞，远程攻击者可通过发送特制的畸形 DNS 数据包触发该漏洞。当数据包中的跳转偏移量指向自身时，tcpdump 在解压缩过程中会陷入无限循环，导致拒绝服务。该漏洞影响 tcpdump 3.4/3.5 alpha 及 Ethereal 0.8.4/0.8.5/0.8.6 等版本，CVSS 评分 5.0，危害等级中等。攻击者无需认证即可远程触发，但需诱使目标用户或系统处理恶意构造的 DNS 流量。"
published = "1999-05-31T04:00:00.000"
remediation = "升级 tcpdump 至 3.6 及以上版本，升级 Ethereal（现 Wireshark）至 0.8.7 及以上版本。现代系统应更新至 tcpdump 最新稳定版及 Wireshark 最新稳定版。如无法升级，可在抓包时使用过滤表达式 `not dns` 排除 DNS 流量，或禁用 DNS 解析器中的压缩指针解压功能作为临时缓解。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = """Let me analyze this CVE: - CVE-2000-0333 - Affected products: tcpdump, Ethereal (Wireshark's former name) - Vulnerability type: DNS Decoder Infinite Loop - 拒绝服务漏洞 (Denial of Service) - The issue is in the DNS decoder that enters an infinite loop when processing malformed DNS packets The format should be: "厂商 产品 漏洞类型" For this vulnerability, the products are tcpdump and Ethereal. Let me craft a title that captures the vendor, product, and vulnerability type. The vendor would be the tcpdump group / Ethereal project, products are tcpdump and Ethereal, vulnerability type is 拒绝服务漏洞. Title: tcpdump/Ethereal DNS 解析器无限循环拒绝服务漏洞 Actually, let me think about this more carefully. The format is "厂商 产品 漏洞类型". - 厂商: Since tcpdump is from the tcpdump group and Ethereal was the predecessor to Wireshark, I could say "tcpdump Group" but that's not common. Typically we'd just say the product name as the vendor/product combination. - 产品: tcpdump/Ethereal - 漏洞类型: DNS 解析器无限循环拒绝服务漏洞"""
updated = "2026-06-16T21:51:29.867"

