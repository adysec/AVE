[basic]
description = "Windows 95/98/NT 4.0 的自动运行功能存在权限处理缺陷，本地攻击者可在非可移动介质（如硬盘分区）中放置恶意 autorun.inf 文件，指定替代程序执行的路径。当其他用户访问该驱动器时，系统会以当前用户权限自动执行攻击者预设的恶意程序，导致权限提升或信息泄露。该漏洞利用难度低，影响 Windows 95/98/NT 4.0 多个版本。"
published = "2000-02-18T05:00:00.000"
remediation = '建议安装 Microsoft Windows NT 4.0 Service Pack 6a 及后续安全更新。如无法升级，可通过注册表将 `HKEY_LOCAL_MACHINE\Software\Microsoft\Windows\CurrentVersion\Policies\Explorer\NoDriveTypeAutoRun` 值设为 0xFF 以禁用所有驱动器的自动运行功能，或在组策略中启用"关闭自动播放"策略。同时建议升级到不再受支持的 Windows 版本（如 Windows 10/11）以彻底修复。'
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "Microsoft Windows NT 4.0 autorun.inf 本地代码执行漏洞"
updated = "2026-06-16T21:51:06.887"

