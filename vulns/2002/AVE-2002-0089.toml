[basic]
description = "mgetty 1.1.29 之前版本中的 faxspool 组件使用了全局可写的缓冲目录来存储待发送传真文件，本地攻击者可通过向该目录写入恶意文件或修改现有传真文件，从而篡改传真传输权限或干扰传真发送流程。该漏洞影响 mgetty 1.1.29 之前的所有版本，攻击者需具有本地系统访问权限，CVSS 评分 2.1，危害等级低。建议升级至 mgetty 1.1.29 或更高版本以修复此问题。"
published = "2003-01-17T05:00:00.000"
remediation = "升级 mgetty 至 1.1.29 或更高版本。Red Hat Linux 用户可安装 RHSA-2003:008 提供的更新包；Mandrake Linux 用户可安装 MDKSA-2003:053 提供的更新包。如无法立即升级，可手动将传真假脱机目录（通常为 /var/spool/fax）的权限从 0777 修改为 0755，并确保目录所有者设为 fax 用户，以阻止本地非授权用户篡改传真传输。"
score = 2.1
severity = "LOW"
sources = ["osv"]
title = "MGetty faxspool 传真缓冲目录本地权限提升漏洞"
updated = "2026-06-16T21:59:14.527"

