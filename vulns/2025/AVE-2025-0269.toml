[basic]
description = '紫光 System WorkFlow 存在任意文件读取漏洞，由于 download 接口未对 path 参数进行有效的路径过滤和权限校验，导致攻击者可通过构造包含恶意路径的 POST 请求（如 path=C:\Windows\win.ini）读取服务器任意文件，造成敏感信息泄露。攻击者只需知道目标系统地址即可远程利用，无需复杂认证，危害较大。'
published = "0704"
remediation = '建议联系紫光获取最新安全补丁，升级 System WorkFlow 至修复版本。临时缓解措施：在 Web 服务器或 WAF 层面添加规则，对 `/System/WorkFlow/download.html` 的 `path` 参数进行路径过滤，禁止包含 `../`、`..\`、`:` 等遍历字符，同时限制只能访问指定目录下的文件，并对用户输入做严格的白名单校验。'
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "紫光 System WorkFlow 任意文件读取漏洞"
updated = "0704"

