[basic]
description = "Microsoft Windows 95/98、NT 3.51/4.0（含 Enterprise Server、Terminal Server、Workstation 各 SP 版本）及 Windows 2000 系统的 TCP/IP 协议栈在处理 IGMP（Internet 组管理协议）报文头时存在缺陷。远程攻击者无需身份认证，只需向目标主机发送特制的畸形 IGMP 报文，即可触发协议栈解析异常，导致系统崩溃或停止响应，形成拒绝服务。该漏洞影响上述所有启用了 IGMP 处理的 Windows 版本，攻击者可借此使目标主机长时间无法提供网络服务，但无法直接执行任意代码，危害等级为中低。"
published = "1999-07-03"
remediation = "建议立即安装微软针对该漏洞发布的安全补丁（Windows 95/98 安装相应更新，Windows NT 4.0 升级至 Service Pack 6 或更高版本，Windows 2000 安装对应安全更新）。如无法立即打补丁，可在边界防火墙或路由器上禁用并过滤 IGMP 协议（协议号 2）流量，仅允许受信任内网网段收发 IGMP，以阻断外部伪造 IGMP 报文发起的拒绝服务攻击。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Microsoft Windows IGMP Header 拒绝服务漏洞"
updated = "1999-07-03"

