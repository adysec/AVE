[basic]
description = "Martin Stover 开发的 Mars NetWare Emulation（NWE / mars_nwe）网络仿真服务包存在缓冲区溢出漏洞，其组件在处理目录名称时未对输入长度进行边界校验，当传入超长目录名时会覆盖相邻内存。该漏洞影响 Mars NWE 0.99 及更早版本，本地已登录的攻击者可通过构造包含超长目录名的路径触发溢出，进而改写返回地址实现权限提升或执行任意代码。利用方式通常为在本地文件操作中传入特制的长目录名，攻击前提为攻击者需具备目标系统的本地访问权限。"
published = "1999-08-31T04:00:00.000"
remediation = "建议升级 Mars NWE 到 0.99.pl20 或更高版本（如 mars_nwe-0.99.pl20.tar.gz），该版本修复了长目录名缓冲区溢出漏洞；若无法升级，请限制本地用户创建长目录名权限（如设置目录名最大长度限制），或使用 chroot 限制用户访问范围，建议迁移至现代 NetWare 兼容方案（如 Samba/Netatalk）。"
score = 7.2
severity = "HIGH"
sources = ["exploitdb"]
title = "Martin Stover Mars NWE 本地缓冲区溢出漏洞"
updated = "2026-06-16T21:49:01.833"

