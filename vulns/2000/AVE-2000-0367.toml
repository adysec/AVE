[basic]
description = "Marty Bochane MDBms 0.9 数据库服务器中的 xbx 组件存在缓冲区溢出漏洞，远程攻击者可通过向服务器发送超长字符串触发该漏洞，导致任意命令执行。该漏洞影响 MDBms 0.9 及更早版本，CVSS 评分 7.5，危害等级高。攻击者无需认证即可远程利用，成功利用后可完全控制目标系统。"
published = "2000-05-24T04:00:00.000"
remediation = "立即停止使用已停止维护的 MDBms 0.9 数据库服务器，迁移至受支持的关系型数据库（如 MySQL、PostgreSQL 等）。在无法立即迁移的情况下，在防火墙层面严格限制数据库服务端口（默认监听 TCP 端口）的访问来源，仅允许受信任的内部 IP 连接，并禁用 xbx 远程管理组件。同时使用 iptables 或其他主机防火墙对数据库服务端口进行白名单 ACL 控制。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "Marty Bochane MDBMS 数据库服务器缓冲区溢出漏洞"
updated = "2026-06-16T21:51:45.073"

