[basic]
description = "Big Brother 1.09b及1.09c版本中的CGI历史模块bb-hist.sh存在安全漏洞，由于程序未对用户输入进行充分过滤，导致远程攻击者无需认证即可通过构造特制的HTTP请求读取服务器上的任意文件部分内容，造成敏感信息泄露。该漏洞影响范围较广，攻击门槛低，CVSS评分5.0，危害等级中危。"
published = "1999-12-31T05:00:00.000"
remediation = '升级 Big Brother 至 1.09d 或更高版本（已包含 bb-hist.sh 输入验证补丁），或从 bb4.com 下载 bb-hist.sh 的独立安全补丁。如无法升级，在 Web 服务器（Apache）配置中通过 <Files "bb-hist.sh"> Require all denied 或使用 .htaccess 限制该 CGI 脚本的访问权限。鉴于 Big Brother 已停止维护，建议迁移至其继承项目 Xymon（原 Hobbit Monitor），彻底消除历史漏洞风险。'
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Big Brother bb-hist.sh 远程文件泄露漏洞"
updated = "2026-06-16T21:50:29.523"

