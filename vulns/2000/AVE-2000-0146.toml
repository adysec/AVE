[basic]
description = "Sun Internet Mail Server（SIMS）在安装过程中会创建全局可读的密码文件，导致本地攻击者可通过读取该文件直接获取系统用户密码凭据。该漏洞影响 Sun Internet Mail Server 多个版本，利用条件为攻击者需拥有本地系统访问权限，无需额外认证即可实现密码泄露，进而可能导致未授权访问与权限提升。CVSS 评分 7.2，危害等级高。"
published = "2000-02-20T05:00:00.000"
remediation = "修改 SIMS 安装目录下包含密码的配置文件权限为 600 或仅 root 可读，确保 /etc/mail/ 及其子目录下敏感文件（如 authlist、passwd 等）不对外部用户开放读权限。同时避免使用明文密码存储，如有条件建议迁移至现代邮件服务器方案。"
score = 7.2
severity = "HIGH"
sources = ["epss"]
title = "Sun Internet Mail Server 密码泄露漏洞"
updated = "2026-06-16T21:51:08.017"

