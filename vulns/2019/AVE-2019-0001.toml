[basic]
description = "WSO2 产品 5.8.0 之前版本存在服务器端请求伪造漏洞。攻击者可利用 shindig Web 应用的 UI 小工具加载功能，通过修改特定 URL 参数使服务器向攻击者控制的地址发起 GET 请求，从而造成内部网络探测和信息泄露。"
published = "2019-01-01"
remediation = "将 WSO2 产品升级至 5.8.0 或更高版本，以修复 shindig 组件中存在的 SSRF 漏洞。"
score = 6.8
severity = "MEDIUM"
