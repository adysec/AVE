[basic]
description = "React Server Components（RSC）存在不安全反序列化漏洞，攻击者可构造特制 HTTP 请求向目标服务器发送恶意 RSC 负载，利用 RSC 解析过程中的不安全反序列化调用 Node.js 内置模块，实现远程代码执行。成功利用该漏洞的攻击者可完全控制目标服务器，执行任意系统命令。该漏洞危害严重，需尽快升级修复。"
published = "20250701"
remediation = "立即升级 react-server-dom-webpack/react-server-dom-parcel/react-server-dom-turbopack 至 19.0.1/19.1.2/19.2.1 或更高版本；使用 Next.js 的项目升级至 14.2.35/15.4.11/16.1.5 等对应修复版本；使用 @vitejs/plugin-rsc 升级至 0.5.3 或更高版本。同时升级 react 和 react-dom 至对应修复版本。如无法立即修复，应确保服务器端不启用 Server Components 功能，或通过 WAF 规则拦截对 Server Function 端点的可疑 HTTP 请求作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "React Server Components 反序列化远程代码执行漏洞"
updated = "20250701"

