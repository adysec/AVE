[basic]
description = "Netwin DMailWeb CGI 程序存在缓冲区溢出漏洞，远程攻击者可通过向 utoken 参数提交超长字符串触发缓冲区溢出，从而在目标服务器上以 CGI 进程权限执行任意命令。该漏洞影响 Netwin DMailWeb 相关版本，攻击无需身份认证，攻击复杂度低，CVSS 评分 7.5，危害等级高。"
published = "2000-05-04T04:00:00.000"
remediation = "立即升级 Netwin DMailWeb CGI 程序至 2.5e 或更高版本，可从 ftp://ftp.netwinsite.com/pub/dmailweb/beta/ 获取。如无法升级，可在 Web 服务器层面限制对 dmailweb/dmailweb.exe 的访问，或对 utoken 参数长度进行输入校验（限制不超过 256 字符）作为临时缓解措施。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "Netwin DMailWeb CGI 缓冲区溢出远程代码执行漏洞"
updated = "2026-06-16T21:51:41.950"

