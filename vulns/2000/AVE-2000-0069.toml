[basic]
description = "HP-UX 操作系统中 asecure 组件在创建音频安全文件 /var/adm/audio.sec 时设置了不安全的文件权限，导致本地攻击者可通过修改或替换该文件触发拒绝服务或获取额外系统权限。该漏洞影响 HP-UX 多个版本，攻击者需拥有本地系统访问权限，利用难度较低，CVSS 评分 4.6，危害等级中危。"
published = "2000-04-18"
remediation = "升级 HP-UX 至对应补丁版本：10.20 安装 PHSS_14055、11.00 安装 PHSS_14056、11i 安装 PHSS_14057 或更高版本；或通过执行 chmod 600 /var/adm/audio.sec 将音频安全文件权限修正为仅 root 可读写；临时缓解可禁用 asecure 服务或限制本地用户访问音频设备。"
score = 4.6
severity = "MEDIUM"
sources = ["cve"]
title = "HP-UX asecure 音频安全文件权限配置不当漏洞"
updated = "2026-07-18"

