[basic]
description = "Sun SunOS 4.1.1 本地权限提升漏洞"
published = "1991-05-20T04:00:00.000"
remediation = "立即移除 /usr/release/bin/makeinstall 和 /usr/release/bin/winstall 的 setuid root 权限：执行 chmod u-s /usr/release/bin/makeinstall /usr/release/bin/winstall。如无需使用 Sun Source 安装工具，直接删除这两个程序。升级到 SunOS 4.1.2 及以上版本或迁移至 Solaris 2.x 以彻底修复此问题。"
