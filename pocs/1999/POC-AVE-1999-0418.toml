[info]
author = "AVE"
description = "检测 Microsoft IIS 1.0/Netscape Server 1.0/1.12/O'Reilly WebSite Professional 1.1b 是否将 .cmd/.bat 文件作为 CGI 脚本执行，通过请求 .cmd 文件判断服务器是否存在远程命令执行漏洞"
id = "POC-AVE-1999-0418"
name = "CVE-1999-0233 PoC"
severity = "critical"
tags = ["cve-1999-0233"]
vuln_id = [
    "CVE-1999-0233",
    "AVE-1999-0418",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/.cmd"
protocol = "http"

[poc.requests.body]
content = ""
type = "raw"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "CGI Error",
    "CGI/1.1",
    "The specified CGI application",
]
