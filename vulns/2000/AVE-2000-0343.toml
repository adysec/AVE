[basic]
description = "Cayman 3220-H DSL 路由器在处理 ICMP Echo 请求时存在缓冲区溢出漏洞，远程攻击者无需任何认证即可向目标设备发送超大的 Ping 数据包，由于设备未对 ICMP 报文长度进行有效校验，超长数据包将触发内存溢出，导致路由器服务崩溃、重启或无响应，造成拒绝服务。该漏洞属于经典的 Ping of Death 攻击变种，攻击条件简单，仅需目标可达即可实施，影响所有 Cayman 3220-H DSL 路由器。"
published = "2000-05-23"
remediation = "该路由器型号已停产且无官方补丁，建议更换支持 ICMP 报文长度校验的现代路由器。若无法更换设备，应在网络边界防火墙配置 ACL 规则，丢弃长度超过 65535 字节的 ICMP Echo Request 数据包以缓解风险。"
score = 5.0
severity = "MEDIUM"
sources = [
    "cve",
    "exploitdb",
]
title = "Cayman 3220-H DSL路由器 ICMP Ping of Death 拒绝服务漏洞"
updated = "2026-06-16"

