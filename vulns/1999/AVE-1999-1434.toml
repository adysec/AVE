[basic]
description = 'Seattle Lab Software 出品的 SLmail 3.1 及更早版本的 SMTP 服务组件存在输入验证缺陷，远程攻击者无需认证即可通过向目标 SMTP 端口发送参数以左括号 "(" 开头的畸形命令（如 SEND、VRFY、EXPN、MAIL FROM、RCPT TO）触发该漏洞，导致邮件服务进程崩溃或拒绝服务。该漏洞影响 SLmail 3.1 及之前所有版本，CVSS 评分 5.0，危害等级中危。'
published = "1998-09-22T04:00:00.000"
remediation = "升级到 SLmail 4.0 或更高版本（该漏洞在后续版本中已修复）。由于 SLmail 已停止维护，建议迁移至受支持的邮件服务器软件（如 Exchange Server、Postfix 等）。临时缓解措施：在防火墙上限制对 TCP 端口 25 的访问来源，仅允许可信 IP 连接 SMTP 服务。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Seattle Lab Software SLmail SMTP 命令拒绝服务漏洞"
updated = "2026-06-16T21:50:04.197"

