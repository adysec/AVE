[basic]
description = "泛微OA存在前台任意SQL语句执行漏洞，攻击者无需身份认证即可通过前端接口注入恶意SQL语句并直接执行。该漏洞原理是系统对用户输入的SQL参数未做充分过滤和参数化处理，导致攻击者可构造恶意请求绕过权限验证，在目标数据库上执行任意SQL命令，包括查询、修改、删除数据及执行系统命令等操作。影响范围涵盖使用泛微OA系统的企事业单位，攻击者可利用该漏洞获取敏感数据、篡改业务数据或进一步控制服务器。修复方式为升级泛微OA至安全版本并对SQL查询进行参数化改造。"
published = "08.08"
remediation = "立即升级泛微OA（E-cology）至最新安全版本，泛微官方已发布补丁修复前台SQL注入漏洞。具体操作：1）登录泛微官方服务站点 https://ecology.waver.cn/ 下载对应版本的最新补丁包；2）若当前版本低于 E-cology 9.0 补丁 20230808 之后的安全更新，应优先升级至已包含该修复的版本（E-cology 10.0 及以上版本已修复）；3）升级前务必备份数据库和应用目录，执行补丁脚本后重启应用服务；4）如暂无法升级，在WAF中添加规则拦截对 /api/ec/dev/command、/api/ec/cas/ 、/api/ec/dev/weblogic 等接口的异常SQL关键字（如 SELECT/INSERT/UPDATE/DELETE/UNION/EXEC）请求，并禁用不必要的前台接口访问。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "泛微OA 前台任意SQL语句执行漏洞"
updated = "08.08"

