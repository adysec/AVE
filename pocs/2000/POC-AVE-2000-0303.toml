[info]
author = "AVE"
description = "验证 OpenBSD 2.5 cron 守护进程的 argv NULL 终止缺陷，本地用户可通过精心构造的非 NULL 结尾参数数组传递给 cron 的伪 popen 函数，导致内存越界访问，从而获取 root 权限"
id = "POC-AVE-2000-0303"
name = "CVE-2000-0312 OpenBSD cron 本地权限提升 PoC"
severity = "high"
tags = ["ave-2000-0303"]
vuln_id = [
    "CVE-2000-0312",
    "AVE-2000-0303",
]

[poc]
logic = "all"

[[poc.requests]]
path = "/etc/crontab"
protocol = "file"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["cron"]
