[basic]
description = "Microsoft Java 虚拟机（Microsoft VM）的 getSystemResourceAsStream 函数存在信息泄露漏洞，未经身份认证的远程攻击者可通过构造恶意的 Java applet 或网页，调用该函数在目标系统上读取任意本地文件内容。该漏洞影响安装并启用了 Microsoft Java Virtual Machine 的 Windows 系统（2000 系列及 3000 系列相关版本），攻击者只需诱导用户访问包含恶意代码的网页即可触发，无需本地权限或用户交互之外的条件，可被用于窃取敏感配置文件等内容。"
published = "2000-01-31T05:00:00.000"
remediation = "安装微软 2000 年 2 月发布的安全公告 MS00-005 对应补丁（Microsoft VM build 5.0.0.3167 及以上），通过 Windows Update 或微软下载中心升级 Microsoft Java Virtual Machine。如无法立即打补丁，可在 Internet Explorer 的「安全」设置中将 Internet 区域的 Java 权限设为「高安全级」或禁用 Java，并限制不可信站点访问以缓解远程文件读取风险。"
score = 2.6
severity = "LOW"
sources = ["cve"]
title = "Microsoft Java 虚拟机 远程文件读取漏洞"
updated = "2026-06-16T21:51:04.040"

