[basic]
description = "WordPress Movies 插件 0.6 及更早版本中存在跨站脚本漏洞，远程攻击者可通过向 getid3/demos/demo.mimeonly.php 页面的 filename 参数注入恶意 Web 脚本或 HTML 代码，在用户浏览器中执行任意脚本，导致敏感信息泄露。该漏洞影响广泛使用 WordPress 的网站，攻击者无需身份认证即可利用，危害等级中危。"
published = "2019-12-27T19:15:11.787"
remediation = "立即停用并删除 Movies 插件 0.6 及更早版本，该插件已停止维护且存在跨站脚本漏洞。迁移至官方维护的替代插件（如 MG Movies）或自行在 getid3/demos/demo.mimeonly.php 中对 filename 参数添加 htmlspecialchars 过滤后使用。"
score = 6.1
severity = "MEDIUM"
sources = ["nuclei"]
title = "WordPress Movies 插件跨站脚本漏洞"
updated = "2026-06-17T00:10:12.267"

