[basic]
description = 'Symantec Mail-Gear 1.0 的 Web 界面服务器存在目录遍历漏洞，远程攻击者可利用 ".."（点点）序列突破目录限制读取服务器任意文件。漏洞源于对用户输入路径参数缺乏有效过滤和规范化处理，攻击者无需身份认证即可通过构造包含目录遍历载荷的 HTTP 请求，访问 Web 根目录以外的敏感系统文件。影响版本为 Symantec Mail-Gear 1.0，CVSS 评分 5.0（中危），成功利用可导致服务器配置文件、源代码或其他敏感信息泄露，进而辅助后续攻击。'
published = "1999-11-29"
remediation = "升级到 Symantec 官方已修复该目录遍历问题的 Mail-Gear 后续版本（或迁移至受支持的 Symantec 邮件安全产品）；若暂无法升级，应在 Web 服务器前端配置路径规范化校验并拒绝包含 `../` 及 URL 编码 `..%2f` 的请求，同时在防火墙/反向代理层限制对 Mail-Gear Web 接口的管理访问，仅允许可信来源连接。"
score = 5.0
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Symantec Mail-Gear 1.0 目录遍历漏洞"
updated = "2026-07-17"

