[basic]
description = "1C: Arcadia Internet Store 1.0 的 tradecli.dll 组件存在路径泄露漏洞，远程未认证攻击者可通过构造包含不存在文件模板参数的 URL 请求，导致应用程序在错误响应中泄露服务器工作目录的完整物理路径。该漏洞影响 1C: Arcadia Internet Store 1.0 版本，攻击者无需身份认证即可远程利用，仅需发送特制 HTTP 请求即可获取服务器目录结构信息，CVSS 评分 7.5（高危），属于信息泄露类漏洞，攻击者可利用泄露的路径信息进一步发起路径遍历、文件包含等后续攻击。官方已停止维护该版本，建议升级至新版本或迁移至现代电商平台。"
published = "2001-09-20T04:00:00.000"
remediation = "升级到最新的 1C:Enterprise 平台版本，应用最新的安全补丁并更新 tradecli.dll。修改 web 服务器配置，禁用模板参数功能或实现严格的错误处理以防止路径信息泄露。如无法立即更新，可在防火墙中添加规则以拒绝对 tradecli.dll 的访问请求，作为临时缓解措施。"
score = 7.5
severity = "HIGH"
sources = ["exploitdb"]
title = "1C Arcadia Internet Store 1.0 路径泄露漏洞"
updated = "2026-06-16T21:54:48.217"

