[basic]
description = "Microsoft Internet Explorer 5.0 中集成的 Windows Media Player ActiveX 控件存在信息泄露漏洞。当请求的文件不存在时，该控件会返回特定的错误码，远程攻击者可通过构造恶意网页诱导用户访问，利用该错误码差异探测目标系统上文件是否存在，导致敏感信息泄露。该漏洞影响 Internet Explorer 5.0 及关联的 Windows Media Player 组件，攻击复杂度低，无需身份认证。"
published = "1999-11-14"
remediation = "升级到 Internet Explorer 5.01 及以上版本，或禁用 Windows Media Player ActiveX 控件在 Internet Explorer 中的自动加载，以消除文件存在性探测风险。"
score = 5.0
severity = "MEDIUM"
sources = [
    "cve",
    "avd",
]
title = "Microsoft Internet Explorer 5 Windows Media Player ActiveX 信息泄露漏洞"
