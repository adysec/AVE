[basic]
description = "明源地产 ERP 系统的 DataRuleXMLHTTP.aspx 接口存在 SQL 注入漏洞。该接口在处理用户输入的查询参数时未对数据进行有效的过滤与转义，直接将用户可控参数拼接进数据库查询语句中执行，导致攻击者可通过构造恶意的 SQL 语句进行注入。未经身份认证的远程攻击者可向该页面发送特制的 HTTP 请求，绕过安全限制读取、修改甚至删除后台数据库中的敏感数据，进而可能获取系统权限或窃取企业核心业务信息。该漏洞影响使用存在缺陷版本的明源地产 ERP 系统的相关部署环境，攻击门槛低、危害较大，建议相关用户尽快升级补丁并加强输入校验。"
published = "0722"
remediation = "建议联系明源官方获取最新安全补丁，升级 ERP 系统至不受影响版本。对 DataRuleXMLHTTP.aspx 接口实施输入参数白名单校验，过滤特殊 SQL 字符。临时缓解措施可在 WAF 或反向代理层配置规则拦截含 SQL 注入特征的请求。如无法立即升级，建议限制该页面仅允许内网可信 IP 访问。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "明源 地产 ERP DataRuleXMLHTTP.aspx SQL 注入漏洞"
