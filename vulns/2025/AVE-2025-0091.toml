[basic]
description = "用友时空KSOA 企业服务系统存在 SQL 注入漏洞，攻击者可通过向 /worksheet/workslist.jsp 页面的 id 参数注入恶意 SQL 语句，利用 WAITFOR DELAY 等时间盲注手法获取数据库敏感信息。该漏洞无需身份认证即可利用，攻击门槛低，危害较大，影响使用该系统的企业用户数据安全。建议厂商及时修复参数过滤机制。"
published = "0707"
remediation = "联系用友官方获取 KSOA 最新安全补丁包进行升级；如无法立即升级，修改 /worksheet/workslist.jsp 中 id 参数处理逻辑，使用预编译 PreparedStatement 替代字符串拼接，并对输入参数强制整型校验；在 WAF 层面添加规则拦截 id 参数中的 SQL 注入特征（如 WAITFOR DELAY、union、select 等关键字），作为临时缓解措施。"
score = 5
severity = "MEDIUM"
