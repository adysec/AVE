[basic]
description = "DNS 协议允许远程攻击者通过伪造源地址向 DNS 名称服务器发送 UDP 查询请求，利用 DNS 的无状态特性和 UDP 源地址可伪造性，将 DNS 服务器作为流量放大器对受害者实施拒绝服务攻击。由于 DNS 响应流量通常远大于请求流量，攻击者仅需发送少量伪造查询即可产生大量反射流量，对目标造成带宽消耗型 DoS。该漏洞无需认证即可发起，影响所有未限制递归查询或未防范源地址伪造的 DNS 服务器。"
published = "1999-12-31"
remediation = "在网络边界路由器部署 BCP 38（uRPF 单播反向路径转发）过滤伪造源地址的 UDP 流量；DNS 服务器仅对信任客户端开放递归查询，禁止对公网开放递归解析；在防火墙上限制对 DNS 服务器的外部访问并启用速率限制；参考 AUSCERT 公告 AL-1999.004 及 CIAC 公告 J-063 升级 DNS 软件至已修复版本并关闭开放递归。"
score = 5.0
severity = "MEDIUM"
sources = ["cve"]
title = "DNS 服务器 UDP 查询反射放大拒绝服务漏洞"
updated = "2026-07-16"

