[basic]
description = "rpc.yppasswdd（NIS 口令更新守护进程）在处理口令修改请求时存在缓冲区溢出漏洞。该进程在生成 MD5 哈希的过程中未对用户输入的长度进行边界校验，导致本地用户可通过构造超长的输入数据触发缓冲区溢出，进而覆盖相邻内存并篡改执行流程，最终以 root 权限执行任意指令实现本地权限提升。该漏洞影响运行 NIS/yp 服务且启用了 rpc.yppasswdd 的 Unix/Linux 系统，攻击者需具备目标系统的本地登录权限方可利用，CVSS 评分 7.2，危害等级为高危。修复建议升级至已修补的相关系统版本或停止不必要的 rpc.yppasswdd 服务。"
published = "1999-10-23T04:00:00.000"
remediation = "建议升级 rpc.yppasswdd（NIS/yp-tools 或 ypserv 软件包）到厂商发布的已修复版本，例如通过操作系统包管理器执行 apt-get update && apt-get upgrade ypserv 或 yum update ypserv 安装最新补丁。如无法立即升级，应停用 yppasswdd 服务（关闭 rpc.yppasswdd 守护进程）并限制对 NIS 端口的本地访问，避免本地用户利用 MD5 哈希生成触发缓冲区溢出提权。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
