[basic]
description = "Linux 内核 MPTCP 协议实现中存在内存泄漏漏洞，当 mptcp 套接字创建因 CGROUP_INET_SOCK_CREATE eBPF 程序执行失败时，子流（subflow）清理函数 __mptcp_destroy_sock() 未被正确调用，导致所有子流套接字发生泄漏。本地攻击者可利用此漏洞消耗系统内存资源，造成拒绝服务。该漏洞影响 Linux 内核多个版本，CVSS 评分 7.8，危害等级高。"
published = "2025-06-18T11:15:35.950"
remediation = "该漏洞影响 Linux 内核 5.11 至 5.19.3 版本中 MPTCP 子流在 eBPF 阻断场景下的内存泄漏问题。建议将内核升级至 5.19.4 及以上版本，合入 commit c0bf3c6aa444（主线）或 6139039c8fc5（稳定树）中的补丁。若无法立即升级，可禁用 MPTCP 模块（modprobe -r mptcp 并添加 blacklist mptcp）作为临时缓解。"
score = 7.8
severity = "HIGH"
sources = ["msrc"]
title = "Linux 内核 MPTCP 子流套接字内存泄漏漏洞"
updated = "2026-06-17T05:22:41.990"

