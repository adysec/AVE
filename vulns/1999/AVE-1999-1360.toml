[basic]
description = "HP-UX 9.x及更早版本中的GlancePlus套件所包含的Glance和gpm程序存在权限许可和访问控制漏洞。本地攻击者可以利用这些程序的不当权限设置，访问任意系统文件并获取提升的权限，从而完全控制受影响系统。"
published = "1994-05-04"
remediation = "HP已发布安全公告HPSBUX9404-004，建议用户联系HP获取补丁或升级到不受影响的版本。同时应限制本地用户对Glance和gpm程序的访问权限，遵循最小权限原则。"
score = 7.2
severity = "HIGH"
sources = [
    "cve",
    "avd",
]
title = "HP-UX GlancePlus Glance和gpm本地权限提升漏洞"
