[basic]
description = "3Com SuperStack II 集线器运行 Management Information Base (MIB) 软件存在信息泄露漏洞。攻击者可通过只读社区字符串访问特定对象标识符（.1.3.6.1.4.1.43.10.4.2），该标识符会泄露完整的社区字符串列表。远程攻击者无需身份认证即可利用 SNMP 协议获取该敏感信息，进而利用泄露的社区字符串对设备执行未授权管理操作，威胁设备安全性。"
published = "1999-08-30T04:00:00.000"
remediation = "建议禁用 SNMP 只读团体字符串 (read-only community string)，或将 SNMP 服务仅绑定到管理网段。在防火墙上限制 UDP 端口 161 的访问来源 IP 范围，仅允许受信任的管理站访问。如设备固件版本低于 2.10，请联系 3Com 获取最新固件更新以修复 MIB 对象访问控制问题。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "3Com SuperStack II 集线器 MIB 管理信息库信息泄露漏洞"
updated = "2026-06-16T21:50:36.093"

