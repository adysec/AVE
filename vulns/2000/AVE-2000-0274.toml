[basic]
description = "Windows 95/98 网络软件在处理 UNC（通用命名约定）路径时存在缓冲区溢出漏洞。远程攻击者可通过向目标系统发送特制长文件名字串的 URL 触发该漏洞，导致攻击者能够以系统权限执行任意命令。该漏洞影响 Windows 95 和 Windows 98 操作系统，由于系统默认启用文件共享功能且无需用户交互即可触发，危害等级较高，CVSS 评分 7.6。微软未提供官方补丁，建议禁用文件共享或升级至更高版本系统防范风险。"
published = "1999-11-12T05:00:00.000"
remediation = "Windows 95/98 已停止支持，微软不再提供安全更新。建议升级到仍受支持的 Windows 版本（如 Windows 10/11），并在防火墙层面阻止从外部网络入站的 SMB 流量（TCP 139、445）和 NetBIOS 数据报（UDP 137/138），同时禁用文件和打印机共享作为临时缓解措施。"
score = 7.6
severity = "HIGH"
sources = ["epss"]
title = """The user wants me to generate a `[title]` field for CVE-2000-0330. Let me analyze the known information: - CVE-2000-0330 - Original title: Microsoft Windows 95/98 - UNC Buffer Overflow (2) - NVD description: The networking software in Windows 95 and Windows 98 allows remote attackers to execute commands via a long file name string, aka the "File Access URL" vulnerability. - CVSS: 7.6 (High) - The vulnerability is about a buffer overflow in UNC path handling in Windows 95/98 networking software So the format should be: "厂商 产品 漏洞类型" (Vendor Product Vulnerability Type) - Vendor: Microsoft - Product: Windows 95/98 (networking software / UNC handling) - Vulnerability type: 远程代码执行漏洞 (Remote Code Execution) or 缓冲区溢出漏洞 (Buffer Overflow) Given the description says "allows remote attackers to execute commands", the vulnerability type is remote code execution. It's a buffer overflow in the UNC file name handling. A good title would be: "Microsoft Windows 95/98 UNC 缓冲区溢出远程代码执行漏洞" Or more concisely following the pattern: "Microsoft Windows 95/98 网络软件 UNC 路径远程代码执行漏洞"""
updated = "2026-06-16T21:51:29.500"

