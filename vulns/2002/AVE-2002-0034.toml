[basic]
description = "Sendmail 8.12.5 之前版本中，当配置使用自定义 DNS 映射查询 TXT 记录时，其处理 DNS 应答的代码存在缓冲区溢出漏洞。远程攻击者可通过控制恶意 DNS 服务器向目标 Sendmail 服务器发送特制的 DNS 应答数据包，触发缓冲区溢出，导致服务拒绝响应，甚至可能执行任意代码。该漏洞影响广泛部署的邮件传输代理软件，CVSS 评分 7.5，危害等级高。"
published = "2002-10-04T04:00:00.000"
remediation = "升级 Sendmail 至 8.12.5 或更高版本，该版本已修复 parse_dns_reply 函数中的缓冲区溢出问题。如无法立即升级，可临时移除或禁用自定义 DNS map（custom DNS map）中对 TXT 记录的查询配置，避免向不可信 DNS 服务器发起 TXT 记录请求以降低风险。"
score = 7.5
severity = "HIGH"
sources = ["tenable"]
title = "Sendmail DNS查询TXT记录响应处理缓冲区溢出远程代码执行漏洞"
updated = "2026-06-16T21:58:21.937"

