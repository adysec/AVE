[basic]
description = "Microsoft IIS 4.0 及 Apache 等 Web 服务器在记录 HTTP 请求日志时，未对请求方法（Method）字段长度进行有效限制，远程攻击者可通过构造超长 HTTP 请求方法字符串，将实际请求的恶意 URL 隐藏在日志记录之外，从而实现日志绕过。该漏洞允许攻击者在未授权情况下隐藏攻击痕迹，影响运行 IIS 4.0 的 Windows NT 系统，增加安全审计和溯源难度。"
published = "1999-01-01T05:00:00.000"
remediation = "升级至 Windows 2000 自带的 IIS 5.0 或更高版本，该版本已修复日志绕过问题。如无法升级，可启用 IIS 日志记录中的 URI 查询字段截断功能，并限制 HTTP 请求方法长度不超过 1024 字节以缓解攻击。Windows NT 4.0 已停止支持，建议尽快迁移至受支持的操作系统版本。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Microsoft IIS 4.0 日志请求方法绕过漏洞"
updated = "2026-06-16T21:48:25.087"

