[basic]
description = "Microsoft Visual Interdev 1.0 的 dvwssr.dll 组件（Link View 服务器端组件）存在缓冲区溢出漏洞。远程攻击者可通过向运行 Microsoft FrontPage 98 Server Extensions 的 IIS 服务器发送特制请求，触发该组件在处理输入时未对缓冲区边界进行充分检查，导致缓冲区溢出。成功利用此漏洞可造成目标系统拒绝服务，或在受影响系统上以 SYSTEM 权限执行任意命令，严重威胁服务器安全。"
published = "2000-04-14T04:00:00.000"
remediation = "安装 Microsoft 安全公告 MS00-014 对应补丁，或升级至 Windows 2000/Windows XP 及更高版本系统。如无法升级，在 IIS 管理器中删除 FrontPage Server Extensions 虚拟目录映射并卸载 dvwssr.dll 组件作为临时缓解措施。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "Microsoft Visual InterDev 1.0 缓冲区溢出漏洞"
updated = "2026-06-16T21:51:20.640"

