<toml>
[info]
id = "POC-AVE-1999-0232"
name = "AIX gethostbyname Buffer Overflow PoC"
author = "ave"
severity = "critical"
description = "检查 AIX 系统 /bin/host 文件的存在性与内容，确认 gethostbyname() 栈缓冲区溢出漏洞（CVE-1999-0101）的攻击面。该漏洞影响 AIX 3.x/4.x、SunOS 5、Windows 95/98/2000/NT 4.0，可通过 suid /bin/host 本地提权至 root。"
vuln_id = ["CVE-1999-0101", "AVE-1999-0232"]

[poc]
logic = "all"

[[poc.requests]]
protocol = "file"
path = "/bin/host"
[[poc.requests.matchers]]
type = "word"
words = ["host"]
part = "body"
expect = true
</toml>
