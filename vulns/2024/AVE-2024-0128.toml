[basic]
description = "章管家是一款智能印章管理系统，其 /app/message/listUploadIntelligent.htm 接口存在 SQL 注入漏洞。攻击者无需身份认证，可通过构造恶意 POST 请求，对 person_id、unit_id、pageNo、is_read 等参数注入 SQL 语句，利用 union select 等手法执行任意数据库查询，获取系统中所有用户的账户密码等敏感信息，危害严重。该漏洞在 2024 年护网行动期间被广泛利用。"
published = "2024-08-13"
remediation = "建议升级章管家到最新版本，修复 listUploadIntelligent 接口的参数过滤逻辑。临时缓解措施：在 WAF 中对 /app/message/listUploadIntelligent.htm 路径配置 SQL 注入防护规则，拦截含 union、select、-- 等关键字的请求；同时对所有输入参数实施严格的白名单校验，禁止特殊字符传入。"
score = 5.0
severity = "MEDIUM"
sources = ["hwpoc"]
title = "章管家 listUploadIntelligent.htm 接口 SQL 注入漏洞"
updated = "2024-08-13"

