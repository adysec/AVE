[basic]
description = "StarOffice StarScheduler Web 服务器存在缓冲区溢出漏洞，远程攻击者可通过向目标服务器发送超长 GET 请求触发缓冲区溢出，成功利用可在目标系统上以 root 权限执行任意代码。该漏洞影响 StarOffice 系列产品，CVSS 评分 10.0，危害等级严重。攻击无需身份认证，攻击复杂度低，建议用户立即升级至修复版本。"
published = "2000-03-09T05:00:00.000"
remediation = "StarOffice StarScheduler 已于 2000 年停止维护，官方不再提供补丁。建议立即停止使用 StarOffice StarScheduler，迁移至受支持的办公套件（如 LibreOffice 或 Apache OpenOffice），并在防火墙层面封禁该服务端口（默认 8080）作为临时缓解措施。"
score = 10
severity = "CRITICAL"
sources = ["cve"]
title = "StarOffice StarScheduler Web 服务器缓冲区溢出漏洞"
updated = "2026-06-16T21:51:09.427"

