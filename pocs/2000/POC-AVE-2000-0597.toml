[info]
author = "AVE"
description = "检测 SGI IRIX 系统上是否存在 gr_osview 易受攻击的二进制文件"
id = "POC-AVE-2000-0597"
name = "CVE-2000-0797 PoC"
severity = "high"
tags = ["ave-2000-0597"]
vuln_id = [
    "CVE-2000-0797",
    "AVE-2000-0597",
]

[poc]
logic = "all"

[[poc.requests]]
path = "/usr/sbin/gr_osview"
protocol = "file"

[[poc.requests.matchers]]
expect = true
part = "body"
regex = "."
type = "regex"
