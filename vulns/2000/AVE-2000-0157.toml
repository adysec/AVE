[basic]
description = "HP OpenView OmniBack II 2.55/3.0/3.1 存在拒绝服务漏洞，远程攻击者无需身份认证即可通过向目标端口 5555 发送大量连接请求，触发服务资源耗尽导致崩溃。该漏洞影响 HP OpenView OmniBack II 2.55、3.0 及 3.1 版本，攻击条件简单，可造成备份服务中断，影响企业备份系统的可用性，需及时升级修复。"
published = "2000-02-28T05:00:00.000"
remediation = "建议在防火墙层面限制对 TCP 5555 端口的访问，仅允许受信任的管理网段连接。由于 HP OpenView OmniBack 已停止维护多年，官方补丁渠道早已关闭，应尽快迁移至受支持的备份解决方案以彻底消除风险。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "HP OpenView OmniBack 拒绝服务漏洞"
updated = "2026-06-16T21:51:09.917"

