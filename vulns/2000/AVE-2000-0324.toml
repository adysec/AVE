[basic]
description = "Axent NetProwler 3.0 存在拒绝服务漏洞，远程攻击者可通过向目标系统发送特制的畸形 IP 数据包，触发其中间人检测签名处理逻辑异常，导致 NetProwler 服务崩溃或停止响应。该漏洞影响 Axent NetProwler 3.0 版本，攻击者无需认证即可远程利用，危害等级中等。目前官方已发布补丁修复此漏洞。"
published = "2000-05-18T04:00:00.000"
remediation = "升级至 Symantec 收购后发布的 NetProwler 后续版本或迁移至 Symantec 官方支持的入侵检测/防御产品（如 Symantec IPS）。若无法升级，可在 NetProwler 管理控制台中临时禁用 FTP Man-in-the-Middle 签名规则，并在网络边界防火墙配置分片包过滤策略，阻止非必要的畸形 IP 分片进入受保护网络，以降低被攻击风险。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Axent NetProwler 3.0 拒绝服务漏洞"
updated = "2026-06-16T21:51:37.467"

