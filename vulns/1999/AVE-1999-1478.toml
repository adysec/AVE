[basic]
description = "SGI IRIX 操作系统的 object server 程序存在配置错误漏洞，远程攻击者可在特定配置条件下利用该漏洞获取目标系统的 root 权限。该漏洞影响 SGI IRIX 5.2 至 6.1 版本，CVSS 评分 10.0，危害等级严重。攻击者无需身份认证即可远程触发，通过向目标系统的 object server 服务发送特制请求实现权限提升，完全控制受影响主机。"
published = "1996-01-03T05:00:00.000"
remediation = "立即安装 SGI 安全公告 19960101-01-PX 提供的补丁程序，或将系统升级至 IRIX 6.2 或更高版本。如暂无法打补丁，可通过关闭 object server 服务（停止 /usr/sbin/objectserver 进程）或在网络边界限制对该服务的访问作为临时缓解措施。"
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "SGI IRIX Object Server 远程权限提升漏洞"
updated = "2026-06-16T21:50:11.240"

