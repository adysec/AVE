[basic]
description = "SGI IRIX 操作系统 5.2 及更早版本（含 5.1）内置的 sgihelp 帮助系统及打印管理器存在本地权限提升漏洞。由于相关程序（可能通过 clogin 命令）在处理过程中未正确限制特权操作，导致本地普通用户可利用该程序获取 root 超级用户权限。该漏洞影响范围限于运行上述版本 IRIX 的本地系统，攻击条件为攻击者需先获得目标主机的本地登录权限。利用方式为本地用户执行或触发 sgihelp 相关组件，借助其缺陷提升自身权限至 root，进而完全控制系统。"
published = "1994-08-11T04:00:00.000"
remediation = "建议将 SGI IRIX 系统升级至受支持的 IRIX 6.5 或更高版本以修复此漏洞。临时缓解措施包括：以 root 身份移除 sgihelp 和 clogin 命令的 setuid 位（执行 chmod u-s /usr/sbin/sgihelp /usr/bin/clogin），禁止普通用户执行这些程序；同时通过 /etc/passwd 和 /etc/group 严格限制系统账户权限，并检查 /var/adm/SYSLOG 中是否有本地提权攻击痕迹。由于 IRIX 5.x 已完全停止支持，长期方案应迁移至现代操作系统。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "SGI IRIX sgihelp 本地权限提升漏洞"
updated = "2026-06-16T21:49:58.367"

