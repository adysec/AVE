[basic]
description = "nftp FTP 客户端 1.40 版本存在缓冲区溢出漏洞。远程攻击者可通过搭建恶意 FTP 服务器，向连接至此服务器的客户端发送超长响应字符串触发缓冲区溢出，导致客户端拒绝服务，在特定条件下可能实现任意代码执行。攻击者需要诱导目标用户主动连接至恶意 FTP 服务器进行利用，属于客户端侧漏洞。"
published = "1999-12-31T05:00:00.000"
remediation = "升级至 nftp 1.41 或更高版本（1.41 版本已明确修复该安全漏洞），建议直接使用最终版本 1.71。nftp 项目已于 2002 年停止维护，建议迁移至仍在维护的 FTP 客户端（如 lftp、curl）作为长期方案。临时缓解措施：避免使用 nftp 连接不可信的 FTP 服务器。"
score = 5.1
severity = "MEDIUM"
sources = ["cve"]
title = "nftp FTP 客户端缓冲区溢出漏洞"
updated = "2026-06-16T21:50:07.313"

