[basic]
description = "iChat ROOMS WebServer 3.0.2 及更早版本存在目录遍历漏洞，攻击者可通过在 HTTP 请求中构造包含 ../ 序列的 URL 路径，绕过服务器的访问限制读取 Web 根目录之外的任意文件。由于服务器未对用户请求路径进行规范化与越界校验，攻击者在无需认证的情况下，即可远程读取系统敏感文件（如 /etc/passwd），造成信息泄露，进而为后续渗透提供便利。"
published = "1998-09-09"
remediation = "升级 iChat ROOMS WebServer 至 3.0.3 或更高版本以修复路径遍历问题；若暂无法升级，应在防火墙限制 4080 端口仅对可信网络开放，或临时停用 ROOMS 服务，并核查服务器上以低权限用户可读取的敏感文件是否存在泄露风险。"
score = 5.0
severity = "MEDIUM"
sources = ["avd"]
title = "iChat ROOMS WebServer 路径遍历漏洞"
updated = "2026-07-17"

