[basic]
description = "FreeBSD 系统 orville-write 软件包中的 huh 程序存在缓冲区溢出漏洞，本地攻击者可通过向该程序提交特制的输入数据触发缓冲区溢出，成功利用后可获取 root 权限。该漏洞影响多版本 FreeBSD 系统，CVSS 评分 7.2，危害等级高。"
published = "2000-03-27T05:00:00.000"
remediation = "升级 orville-write 包至 2.50 及以上版本。如无法升级，移除 `huh` 程序的 setuid root 权限：`chmod u-s /usr/local/bin/huh`；若不需要该功能，直接卸载 orville-write 包：`pkg_delete orville-write`。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "FreeBSD orville-write huh 缓冲区溢出漏洞"
updated = "2026-06-16T21:51:17.297"

