[basic]
description = "Ethereal（后更名为 Wireshark）的 AFS ACL（文件系统访问控制列表）解析器存在多个缓冲区溢出漏洞。远程攻击者可通过向目标系统发送特制的包含超长用户名的数据包，触发解析过程中的缓冲区溢出，从而在目标系统上以 Ethereal 进程权限执行任意命令。该漏洞影响 Ethereal 0.8.13 及更早版本，CVSS 评分 7.5，危害等级高。"
published = "2001-01-09T05:00:00.000"
remediation = "立即升级 Ethereal 至 0.8.14 或更高版本以修复 AFS ACL 解析器中的缓冲区溢出漏洞。各 Linux 发行版用户应安装对应的安全更新：Red Hat 安装 RHSA-2000-116 更新、Debian 安装 20001122a 安全更新、FreeBSD 安装 SA-00:81 更新。若无法升级，可在防火墙或网络层面阻止不可信的 AFS 流量作为临时缓解措施。"
score = 7.5
severity = "HIGH"
sources = ["exploitdb"]
title = "Ethereal AFS ACL 解析器缓冲区溢出漏洞"
updated = "2026-06-16T21:53:18.900"

