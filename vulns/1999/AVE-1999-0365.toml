[basic]
description = "Netscape Enterprise Server 及 FastTrack Server 中存在缓冲区溢出漏洞，远程攻击者可通过发送超长的 HTTP GET 请求触发溢出，从而在服务器上执行任意代码并提升权限。该漏洞无需身份认证即可远程利用，攻击门槛低，成功利用后可导致服务器被完全控制、敏感信息泄露及服务中断。"
published = "2000-01-04"
remediation = "升级 Netscape Enterprise Server 与 FastTrack Server 至厂商发布的已修复版本，在补丁部署前可通过反向代理或 WAF 限制过长的 HTTP GET 请求长度，并对 HTTP 请求头字段做长度校验以缓解溢出风险。"
score = 7.5
severity = "HIGH"
