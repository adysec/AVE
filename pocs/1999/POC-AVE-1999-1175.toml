[info]
author = "AVE"
description = "检测 Joe's Own Editor (joe) 2.8 崩溃保存文件 DEADJOE 是否存在且为世界可读权限，验证本地信息泄露漏洞"
id = "POC-AVE-1999-1175"
name = "Joe's Own Editor DEADJOE 文件权限验证 PoC"
severity = "low"
tags = [
    "cve-1999-1545",
    "joe",
    "deadjoe",
    "local",
    "permission",
]
vuln_id = [
    "CVE-1999-1545",
    "AVE-1999-1175",
]

[poc]
logic = "any"

[[poc.requests]]
path = "/tmp/DEADJOE"
protocol = "file"

[[poc.requests.matchers]]
expect = true
part = "body"
regex = ".+"
type = "regex"
