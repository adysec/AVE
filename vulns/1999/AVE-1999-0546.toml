[basic]
description = "Linux 2.2.x 内核的 ICMP 协议处理模块存在拒绝服务漏洞，远程攻击者可通过向目标系统发送包含异常类型、代码及畸形 IP 头部长度的特制 ICMP 数据包，触发内核协议栈处理异常，导致系统崩溃或服务不可用。该漏洞影响 Linux 2.2/2.3 内核版本，涉及 Debian 2.1、RedHat 6.0、SuSE 6.1 等发行版，攻击无需认证，远程即可实施。"
published = "1999-06-01T04:00:00.000"
remediation = "升级至 Linux 2.4.x 及以上内核版本，该漏洞已在 2.4.0 中修复。如无法升级内核，可通过 iptables 添加规则丢弃异常 ICMP 包：iptables -A INPUT -p icmp -m icmp --icmp-type 8 -j DROP。建议升级至仍有安全支持的发行版（如 RHEL 7+、Ubuntu 16.04+）。"
score = 5
severity = "MEDIUM"
sources = ["redhat"]
title = "Linux Kernel 2.2.x ICMP 畸形数据包拒绝服务漏洞"
updated = "2026-06-16T21:49:05.527"

