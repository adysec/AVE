[basic]
description = "Secure Locate（slocate）存在内存破坏漏洞，本地攻击者可通过构造恶意的 slocate 数据库文件，在其中指定超出预期缓冲区边界的偏移值，从而触发内存越界访问，导致程序内存损坏。攻击者利用该漏洞可实现权限提升，获取目标系统的更高访问权限。该漏洞影响 slocate 1.3 及之前版本，攻击者需具备本地账户才能利用，无需用户交互。"
published = "2001-02-16T05:00:00.000"
remediation = "升级 slocate 至 2.5 或更高版本（Debian DSA 20001217a / Red Hat RHSA-2000:128）。该漏洞源于 slocate 在处理恶意构造的数据库文件时未校验偏移量值，导致越界内存访问，本地攻击者可利用该漏洞提升权限。修复版本增加了对数据库文件中偏移量字段的边界检查。作为长期缓解措施，建议将 slocate 替换为 mlocate 或 plocate，这两个替代品已修复该问题且安全性更高。"
score = 7.2
severity = "HIGH"
sources = ["exploitdb"]
title = "Secure Locate slocate 本地缓冲区溢出漏洞"
updated = "2026-06-16T21:53:35.530"

