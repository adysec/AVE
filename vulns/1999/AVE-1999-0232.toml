[basic]
description = "AIX 3.x/4.x、Windows 95/98/2000/NT 4.0 及 SunOS 5 等操作系统的 `gethostbyname()` 库函数存在缓冲区溢出漏洞。远程攻击者可通过向目标系统发送恶意的 DNS 主机名解析请求触发缓冲区溢出，导致任意代码执行，从而获取 root 权限。该漏洞影响多个主流操作系统平台，CVSS 评分 10.0，危害等级严重。攻击者无需身份认证即可远程利用，对核心服务器和网络设备危害极大。"
published = "1996-12-10T05:00:00.000"
remediation = "受影响系统均已停止安全技术支持，建议立即升级至厂商仍在支持的最新操作系统版本。AIX 用户应升级至 AIX 7.2 及以上；Solaris 用户升级至 Solaris 11.4；Windows 平台已无法通过官方补丁修复，须迁移至 Windows 10/11 或 Server 2016+。临时缓解措施：在网络边界防火墙或 DNS 服务器上过滤恶意 DNS 响应数据包，限制应用程序对 gethostbyname() 的输入长度。"
score = 10
severity = "CRITICAL"
sources = ["exploitdb"]
title = "IBM AIX/Microsoft Windows/Sun SunOS gethostbyname() 远程缓冲区溢出漏洞"
updated = "2026-06-16T21:47:35.340"

