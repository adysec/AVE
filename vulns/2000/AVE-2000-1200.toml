[basic]
description = "Danware NetOp 6.0 的文件传输机制未提供任何身份认证措施，远程攻击者无需任何凭证即可通过网络连接直接访问目标系统的文件传输服务，进而实现对服务器上任意文件的读取、写入和修改操作。该漏洞影响所有 Danware NetOp 6.0 版本，攻击者可在完全匿名的情况下利用该漏洞获取敏感信息或植入恶意文件，CVSS 评分 10.0，危害等级严重。"
published = "2000-05-23T04:00:00.000"
remediation = "升级 Danware NetOp 至 7.0 及以上版本，该版本在文件传输功能中加入了身份认证机制。如无法升级，可在防火墙添加规则，仅允许受信 IP 访问 NetOp 文件传输端口（默认 TCP 1677），并启用操作系统层面的网络访问控制列表（ACL）限制未授权访问。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "Danware NetOp 6.0 文件传输机制访问控制漏洞"
updated = "2026-06-16T21:51:58.853"

