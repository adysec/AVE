[basic]
description = "mgetty 1.1.29 之前版本中的 cnd-program 组件存在缓冲区溢出漏洞。远程攻击者可通过向目标系统发送包含超长 CallerName 参数的 Caller ID 字符串触发该漏洞，导致缓冲区溢出，进而造成拒绝服务，甚至可能执行任意代码。该漏洞影响运行 mgetty 服务的各类 Unix/Linux 系统，攻击者无需身份认证即可远程利用，CVSS 评分 7.5，危害等级高。"
published = "2003-01-17T05:00:00.000"
remediation = "升级 mgetty 至 1.1.30 或更高版本。Red Hat 用户可通过 RHSA-2003:008 更新（执行 up2date 命令），Mandrake 用户安装 MDKSA-2003:053 提供的 mgetty-1.1.30-1.1mdk 包。如无法升级，可在 modem 配置中禁用 Caller ID 处理功能（注释或移除 cnd-program 配置行）作为临时缓解措施。"
score = 7.5
severity = "HIGH"
sources = ["osv"]
title = "mgetty cnd-program 缓冲区溢出远程代码执行漏洞"
updated = "2026-06-16T21:59:14.413"

