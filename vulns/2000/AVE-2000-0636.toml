[basic]
description = "MIT Kerberos 4 KDC（密钥分发中心）存在双重释放（double-free）内存管理漏洞。远程攻击者无需身份认证即可向目标 KDC 服务发送特制请求，触发内存重复释放操作，导致 KDC 进程崩溃，造成拒绝服务。该漏洞影响 MIT Kerberos 4.0、5.0、5.1.1.1 及 5-1.1 版本，CVSS 评分 5.0，危害等级中等。建议升级至修复版本或应用厂商提供的安全补丁。"
published = "2000-06-09T04:00:00.000"
remediation = "升级 MIT Kerberos 至 krb5-1.2 及以上版本（该漏洞在 krb5-1.2 中修复），或直接禁用 Kerberos 4 兼容模式（在 kdc.conf 中设置 k4_supported = false）。对于已停止维护的 Kerberos 4 系统，应迁移至 MIT Kerberos 5。如无法立即升级，在防火墙层面限制对 KDC 端口 750/udp 的访问作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["redhat"]
title = "MIT Kerberos 4 KDC 双重释放拒绝服务漏洞"
updated = "2026-06-16T21:51:58.693"

