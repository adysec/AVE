[basic]
description = "Joomla! 的 Helpdesk Pro 插件 1.4.0 之前版本存在目录遍历漏洞，远程攻击者无需身份认证即可通过向 ticket.download_attachment 任务的 filename 参数传入 `../` 路径序列，绕过路径限制读取服务器上的任意文件。该漏洞影响所有使用 Helpdesk Pro 插件低于 1.4.0 版本的 Joomla! 站点，可导致敏感信息泄露（如配置文件、数据库凭据等），CVSS 评分 7.5，危害等级高。"
published = "2017-09-20T16:29:00.643"
remediation = "立即将 Joomla! Helpdesk Pro 插件升级至 1.4.0 或更高版本。如无法升级，在 Web 服务器层面配置访问控制规则，阻止对 filename 参数中包含 `..` 的请求，或临时禁用该插件直至完成升级。"
score = 7.5
severity = "HIGH"
sources = ["nuclei"]
title = "Joomla! Helpdesk Pro插件路径遍历漏洞"
updated = "2026-06-17T00:26:44.013"

