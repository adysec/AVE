[basic]
description = "FatFs R0.16 及更早版本中的 f_getlabel() 函数存在栈缓冲区溢出漏洞（CWE-121）。该漏洞源于程序在处理 exFAT 文件系统卷标时，未对 XDIR_NumLabel 字段长度进行规范上限校验，攻击者可通过挂载特制的 exFAT 镜像文件，设置恶意卷标长度值触发栈缓冲区溢出。该漏洞影响嵌入式系统中广泛使用的 FatFs 文件系统库，物理接触设备的攻击者可利用此漏洞实现任意代码执行或系统崩溃，CVSS 评分 7.6，危害等级高危。"
published = "2026-07-01T15:17:12.870"
remediation = "升级至 FatFs R0.17 或更高版本（官方已修复）。如无法升级，手动修补 `ff.c` 中 `f_getlabel()` 函数，在调用 `ld_utf8()` 写入卷标前增加对 `XDIR_NumLabel` 的校验，限制其最大值为 22（exFAT 规范上限）。临时缓解措施：禁止程序挂载来源不可信的 exFAT 镜像文件。"
score = 7.6
severity = "HIGH"
sources = ["hwpoc"]
title = "FatFs exFAT 卷标栈缓冲区溢出漏洞"
updated = "2026-07-02T14:38:40.173"

