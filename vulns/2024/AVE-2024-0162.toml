[basic]
description = "Oracle JD Edwards EnterpriseOne 存在未授权访问漏洞，攻击者在无需身份认证的情况下即可访问系统敏感接口，获取被加密存储的管理员密码数据。由于系统使用了可被逆向还原的加密方式（如基于硬编码密钥的 AES 加密），攻击者可通过提取密文并利用解密脚本还原出管理员明文密码，进而以管理员权限登录系统。该漏洞影响启用了相关组件的 JD Edwards EnterpriseOne 企业用户，攻击条件仅需网络可达目标系统且无需任何权限，利用方式为先抓取加密凭据再通过解密工具还原密码，危害严重，可导致企业核心系统被完全控制。"
published = "0826"
remediation = "升级 Oracle JD Edwards EnterpriseOne 至 2024 年 7 月关键补丁更新（CPU）版本，并应用 Oracle 安全公告中针对该组件的补丁。在补丁就绪前，应在 Web 应用防火墙及网络层限制对 JD Edwards 管理/解密接口（如 BSSV 与 Web 客户端服务端口）的未授权访问，仅允许受信任内网 IP 访问，并强制启用身份认证与最小权限原则，同时轮换所有管理员账户密码以消除已泄漏凭据风险。"
score = 5
