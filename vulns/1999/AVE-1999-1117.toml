[basic]
description = "Big Brother 1.09b 及 1.09c 版本中的 bb-hist.sh CGI History 模块存在文件信息泄露漏洞，远程攻击者可通过向目标系统发送特制的 HTTP 请求，利用该 CGI 脚本的安全缺陷读取服务器上的任意文件内容（受限部分）。该漏洞属于信息泄露类型（CWE-200），影响范围广泛，攻击无需认证，CVSS 评分为 5.0，危害等级中危。"
published = "1999-12-31T05:00:00.000"
remediation = "升级 Big Brother 至 1.09d 或更高版本，该版本已修复 bb-hist.sh 脚本对用户输入路径的过滤不足问题。如无法升级，可移除或禁用 bb-hist.sh CGI 脚本的执行权限，并在 Web 服务器层限制对 /cgi-bin/bb-hist.sh 的访问。同时确保 CGI 脚本对文件路径参数做严格的白名单校验，禁止包含 ../ 等目录遍历字符。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Big Brother CGI History 模块远程文件泄露漏洞"
updated = "2026-06-16T21:50:29.523"

