[basic]
description = "CVE-2000-0408 是 Microsoft IIS 4.0 和 5.0 版本中存在的畸形扩展数据拒绝服务漏洞。远程攻击者无需身份认证即可向目标 IIS 服务器发送包含大量文件扩展名的畸形超长 URL，服务器在处理该畸形扩展数据时发生异常，导致 IIS 服务进程崩溃或停止响应正常请求。该漏洞攻击条件简单，影响范围涵盖所有运行 IIS 4.0/5.0 的 Web 服务器系统。"
published = "2000-05-11T04:00:00.000"
remediation = "建议立即安装 Microsoft MS00-028 安全公告对应的补丁程序（Q257872），彻底解决畸形扩展名解析问题。IIS 4.0/5.0 均已停止支持，长期方案是升级至 Windows Server 2012 R2 及以上版本并启用 IIS 8.5+。临时缓解措施可在 URLScan 工具中禁止包含多个扩展名的请求。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Microsoft IIS 4.0/5.0 畸形文件扩展名数据拒绝服务漏洞"
updated = "2026-06-16T21:51:39.220"

