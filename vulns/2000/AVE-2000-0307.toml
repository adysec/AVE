[basic]
description = "OpenBSD 2.6 系统中存在本地权限配置漏洞，具有系统访问权限的本地用户可通过修改网络接口媒体配置参数，导致系统网络功能异常或降级。该漏洞源于系统对接口配置操作缺少充分的权限校验，攻击者需拥有本地 shell 访问权限才能利用。受影响版本为 OpenBSD 2.6，危害等级中危，建议升级至高版本修复。"
published = "2001-03-12T05:00:00.000"
remediation = "该漏洞存在于 OpenBSD 2.6，任何本地用户均可通过 ifmedia ioctl 修改网络接口介质配置。建议立即从 OpenBSD 官方 errata 页面下载并应用编号 002 的源码补丁，或升级至 OpenBSD 2.7 及以上版本。若无法升级，可限制本地用户登录或禁用受影响接口的 ifmedia 功能作为临时缓解措施。"
score = 4.6
severity = "MEDIUM"
sources = ["avd"]
title = "OpenBSD 网络接口媒体配置本地提权漏洞"
updated = "2026-06-16T21:51:27.350"

