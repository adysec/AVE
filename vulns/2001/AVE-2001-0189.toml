[basic]
description = 'RobTex Viking Web Server 1.0.7 及之前版本存在目录遍历漏洞。远程攻击者无需身份认证，通过在 HTTP URL 请求中使用经过特殊构造的 `\...`（反斜杠加多个点）序列绕过路径限制，可读取服务器上的任意文件，导致敏感信息泄露。该漏洞影响 RobTex Viking Server 1.07-381 之前的所有版本，攻击复杂度低，仅需发送特制 HTTP 请求即可利用。'
published = "2001-06-27T04:00:00.000"
remediation = '''
