[basic]
description = "nftp FTP 客户端 1.40 版本存在缓冲区溢出漏洞，当用户连接恶意 FTP 服务器时，攻击者可通过发送特制的超长响应字符串触发该漏洞，导致客户端崩溃引发拒绝服务，在特定条件下可能实现远程代码执行。用户需要手动连接恶意服务器方可触发，攻击门槛较低，影响范围广泛。"
published = "1999-12-31T05:00:00.000"
remediation = "升级 nftp 至 1.41 或更高版本（1.41 已修复此缓冲区溢出漏洞，参见版本历史 http://www.ayukov.com/nftp/history.html）。如无法升级，应避免连接不可信的 FTP 服务器，勿使用 nftp 访问不受控的外部 FTP 站点。"
score = 5.1
severity = "MEDIUM"
sources = ["epss"]
title = "nftp FTP 客户端缓冲区溢出漏洞"
updated = "2026-06-16T21:50:07.313"

