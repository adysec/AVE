[basic]
description = "Microsoft Windows Media Services 4.0 及 4.1 版本中的 Windows Media Encoder 组件存在拒绝服务漏洞。远程攻击者无需身份认证即可通过向目标系统发送特制的畸形 Encoder 请求，导致 Windows Media Services 服务停止响应或崩溃，影响正常的媒体流服务。该漏洞已公开披露（MS00-038），利用难度较低。受影响的系统包括 Windows 2000 Server 及早期 Windows Server 平台。"
published = "2000-05-30T04:00:00.000"
remediation = "立即安装 Microsoft 安全公告 MS00-038 提供的更新补丁，升级 Windows Media Services 至 4.1 最新版本。如无法安装补丁，可在防火墙或路由器上禁用对 Windows Media 编码器端口（默认 8080 和 8090）的外部访问，限制仅允许可信来源连接。由于该产品已停止支持，建议升级到受支持的 Windows Server 版本并迁移至更新的媒体服务解决方案。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Microsoft Windows Media Services 编码器请求 拒绝服务漏洞"
updated = "2026-06-16T21:51:51.460"

