[basic]
description = "Adobe Reader/Acrobat 及 Flash Player 的 authplay.dll 组件存在内存破坏漏洞，远程攻击者可通过诱使用户打开包含恶意 Flash 应用的 PDF 文件或直接访问特制 SWF 文件触发该漏洞，导致任意代码执行或拒绝服务。该漏洞影响 Adobe Reader/Acrobat 9.x 至 9.1.2、Flash Player 9.x 至 9.0.159.0 及 10.x 至 10.0.22.87 版本，CVSS 评分 7.8，危害等级高。2009 年 7 月已发现在野利用，Adobe 后续已发布安全更新修复。"
published = "2009-07-23T20:30:00.233"
remediation = '升级 Adobe Flash Player 至 9.0.246.0 或 10.0.32.18 及以上版本，Adobe Reader/Acrobat 升级至 9.1.3 及以上版本。如无法升级，在浏览器中禁用 Flash 插件，并配置 PDF 阅读器禁用自动播放嵌入的 Flash 内容（在首选项中取消勾选"在文档中播放多媒体"）。'
score = 7.8
severity = "HIGH"
sources = ["kev"]
title = "Adobe Flash Player 及 Adobe Reader/Acrobat authplay.dll 远程代码执行漏洞"
updated = "2026-06-16T23:08:13.467"

