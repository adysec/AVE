[basic]
description = "Linux 内核 JFFS2 文件系统的 rtime 解压缩例程在解压过程中未充分校验边界条件，当处理特制的损坏压缩数据时，会导致越界写入解压缩缓冲区之外的内存区域，造成内存损坏。本地攻击者可通过挂载恶意的 JFFS2 文件系统镜像触发此漏洞，可能导致系统崩溃或权限提升。该漏洞影响所有使用 JFFS2 文件系统的 Linux 内核版本，CVSS 评分 7.8，危害等级高。"
published = "2025-01-11T15:15:07.423"
remediation = '立即将 Linux 内核升级至以下安全版本：5.4.287、5.10.231、5.15.174、6.1.120、6.6.66、6.12.5 或更高版本。对于 Debian 系统，安装 DLA-4075-1 安全更新；对于 Ubuntu 24.04 LTS，安装 USN-7381-1 更新。如无法立即升级内核，可通过禁用 JFFS2 文件系统模块（`echo "blacklist jffs2" > /etc/modprobe.d/disable-jffs2.conf && update-initramfs -u`）并卸载已挂载的 JFFS2 分区作为临时缓解措施。'
score = 7.8
severity = "HIGH"
sources = ["msrc"]
title = "Linux kernel jffs2 rtime解压缩内存损坏漏洞"
updated = "2026-06-17T08:14:06.410"

