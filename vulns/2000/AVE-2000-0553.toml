[basic]
description = "SGI Omron WorldView Wnn 亚洲语言服务器存在远程缓冲区溢出漏洞。攻击者无需身份认证，即可通过向该服务的 JS_OPEN、JS_MKDIR 或 JS_FILE_INFO 命令发送超长参数触发缓冲区溢出，从而在目标系统上执行任意命令。该漏洞影响 WorldView 6.5 及 Wnn4 4.2 版本，CVSS 评分 10.0，危害等级严重。"
published = "2000-10-20"
remediation = "应用 SGI 安全公告 20000803-01-A 提供的修复补丁，升级 Wnn 至修复版本。若系统已停产无法获取补丁，应立即停止 js_wnnd 服务（默认端口 22273/TCP）或在防火墙上限制该端口的访问，仅允许受信任源 IP 连接。建议将运行该服务的旧系统隔离至独立网络段或迁移至替代方案。"
score = 10.0
severity = "CRITICAL"
sources = [
    "cve",
    "exploitdb",
]
title = "SGI Omron WorldView Wnn 亚洲语言服务器远程缓冲区溢出漏洞"
