[basic]
description = "F5 BIG-IP APM（Access Policy Manager）存在远程代码执行漏洞，由于对用户输入的数据校验不严，未经身份认证的远程攻击者可通过向目标发送特制请求触发该漏洞，导致在目标系统上以 root 权限执行任意代码，从而完全控制设备。该漏洞影响 F5 BIG-IP 多版本，危害严重。"
published = "20251015"
remediation = "升级至 BIG-IP 17.1.2 / 16.1.5 / 15.1.10 及以上版本，通过 TMOS 命令行执行 `tmsh load sys config default` 后安装对应热修复包。临时缓解措施：在配置实用程序及 APM 虚拟服务器上添加 ACL 限制源 IP，仅允许受信管理地址访问，并禁用未使用的 APM 配置接口。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "F5 BIG-IP APM 远程代码执行漏洞"
updated = "20251015"

