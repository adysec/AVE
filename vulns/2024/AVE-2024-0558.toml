[basic]
description = "Motorola SM56 Modem WDM 驱动程序 SmSerl64.sys 存在权限提升漏洞，低权限用户可通过向驱动发送特制的 IOCTL 请求映射物理内存，从而获取系统最高权限执行任意代码并泄露敏感信息。该驱动因持有有效数字签名，可绕过微软驱动签名策略被用于加载恶意代码。攻击者无需任何身份认证即可远程利用，CVSS 评分 9.8，危害等级严重。受影响的驱动版本为 v6.12.23.0，建议立即禁用或替换该驱动。"
published = "2025-01-07T18:15:20.987"
remediation = '立即卸载 Motorola SM56 Modem WDM Driver v6.12.23.0，在设备管理器中找到该调制解调器驱动并选择"卸载设备"；使用 Microsoft Defender for Identity 或 Windows Defender Application Control (WDAC) 将 SmSerl64.sys 加入阻止列表；在企业环境中通过组策略禁止非授权驱动加载，并启用 HVCI（Hypervisor-protected Code Integrity）阻止已知有问题的内核驱动运行。'
score = 9.8
severity = "CRITICAL"
sources = ["msrc"]
title = "Motorola SM56 Modem WDM Driver 权限提升漏洞"
updated = "2026-06-17T08:11:06.960"

