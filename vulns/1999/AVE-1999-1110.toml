[basic]
description = "Windows NT 4.0 的 GINA（图形化标识与身份验证）组件存在权限许可与访问控制不当漏洞。具有物理访问权限的攻击者在用户锁定工作站后，通过在登录界面的用户名输入框中执行粘贴操作（CTRL-V），即可泄露已锁定用户剪贴板中的部分内容。虽然 CVSS 评分仅 2.1，危害等级低，但该漏洞可能导致敏感信息泄露，攻击前提是攻击者必须能够物理接触目标系统。"
published = "1999-12-31T05:00:00.000"
remediation = "安装 Microsoft Security Bulletin MS99-20 提供的 QFE 更新包，禁止锁定状态下粘贴操作到 GINA 登录界面。无法安装补丁时，建议升级至 Windows 2000 及以上版本，同时在物理层面限制非授权人员接触终端，启用屏幕保护程序恢复时要求密码。"
score = 2.1
severity = "LOW"
sources = ["epss"]
title = "Microsoft Windows NT GINA 权限许可和访问控制漏洞"
updated = "2026-06-16T21:50:28.233"

