[basic]
description = "Kerberos 4 KDC (密钥分发中心) 程序的 process_v4 函数中存在缓冲区溢出漏洞，攻击者可通过构造恶意的 localrealm 变量参数触发缓冲区溢出，导致 KDC 服务崩溃拒绝服务。该漏洞影响运行 Kerberos 4 KDC 服务的系统，远程未授权攻击者可通过网络发送恶意构造的 Kerberos 请求数据包触发漏洞，无需身份认证即可导致 KDC 服务拒绝服务，CVSS 评分 5.0 (AV:N/AC:L/Au:N/C:N/I:N/A:P)，属于中危拒绝服务漏洞。攻击者只需向目标 KDC 发送包含超长 localrealm 字段的恶意 Kerberos v4 请求即可触发缓冲区溢出导致服务崩溃，造成拒绝服务攻击。MIT Kerberos 团队已发布补丁修复该漏洞，建议升级到修复版本或禁用 Kerberos 4 服务。"
published = "2000-06-09T04:00:00.000"
remediation = "立即升级至 Kerberos 5（krb5-1.1.1 或更高版本）或应用厂商提供的 Kerberos 4 补丁包（如 Red Hat RHSA-2000:047、Debian DSA-066）。若无法升级，请在防火墙层面封禁 KDC 端口（TCP/UDP 88、TCP 749）并禁用 Kerberos 4 KDC 服务（krb5kdc -4），同时在网络边界部署入侵检测规则拦截异常长度的 localrealm 参数请求。如需临时缓解，可在防火墙层面限制仅受信任网段访问 KDC 端口，并监控异常大包流量。升级后务必重启 KDC 服务并验证 kerberos 认证功能正常。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "MIT Kerberos 4 KDC 缓冲区溢出拒绝服务漏洞"
updated = "2026-06-16T21:51:58.287"

