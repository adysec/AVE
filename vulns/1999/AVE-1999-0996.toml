[basic]
description = "Third Voice Web Annotation 注释工具存在跨站脚本（XSS）安全漏洞。远程攻击者可通过在注释内容中注入恶意 JavaScript 脚本，当其他用户浏览包含恶意注释的页面时触发该漏洞，从而导致攻击者能够窃取用户的敏感会话数据、窃取身份认证凭据或生成伪造的网页内容实施钓鱼攻击。该漏洞影响了 Third Voice Web Annotation 用户的数据机密性和完整性。"
published = "1999-12-31T05:00:00.000"
remediation = "立即卸载 Third Voice Web Annotation 浏览器插件，该软件已停止维护且无官方安全更新。作为通用缓解措施，在 Web 应用中启用 Content-Security-Policy HTTP 响应头（如 script-src 'self'），并对所有用户输入实施严格的输出编码（HTML实体编码），防止恶意脚本注入。"
score = 6.4
severity = "MEDIUM"
sources = ["epss"]
title = "Third Voice Web Annotation 跨站脚本漏洞"
updated = "2026-06-16T21:49:51.783"

