[basic]
description = "Network Associates Net Tools PKI Server 1.0 中的 HTTP Server 组件存在拒绝服务漏洞，远程攻击者可通过向目标服务器发送超长的 HTTP 请求，导致服务进程崩溃，无法正常响应合法用户请求。该漏洞影响 Net Tools PKI Server 1.0 版本，CVSS 评分 5.0，危害等级中等。攻击条件简单，无需身份认证即可实施，但仅造成服务不可用，不涉及数据泄露或代码执行。"
published = "2000-06-19T04:00:00.000"
remediation = "Network Associates Net Tools PKI Server 1.0 已长期停止维护，官方曾发布热修复补丁（参见 ftp://ftp.tis.com/gauntlet/hide/pki/hotfix.txt），但该产品及补丁分发渠道均已废弃。建议立即迁移至受支持的 PKI 服务器产品（如 Windows Server Active Directory 证书服务或企业级 PKI 方案）；若短期内无法迁移，应在网络边界防火墙配置访问控制策略，限制仅受信任 IP 段访问 PKI 服务器的 HTTP 端口，以降低攻击面。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Network Associates Net Tools PKI Server 1.0 HTTP 服务拒绝服务漏洞"
updated = "2026-06-16T21:51:55.870"

