[basic]
description = "Cisco Cache Engine 的 Web 管理界面存在信息泄露漏洞，其管理接口在访问控制上存在缺陷，未对性能统计页面实施有效的身份验证与授权校验。未经身份认证的远程攻击者只需通过 HTTP 请求访问该管理界面的相关路径，即可查看目标设备的性能统计信息，包括缓存命中率、流量负载、连接状态等敏感运行数据。攻击者无需任何凭证或用户交互，仅需能够网络访问设备的 Web 管理端口即可利用此漏洞。泄露的统计信息可能被用于进一步的侦察，帮助攻击者了解设备运行状况并为后续攻击提供支撑。该漏洞影响范围为 Cisco Cache Engine 系列产品，CVSS 评分 5.0，危害等级中等。"
published = "1999-12-16T05:00:00.000"
remediation = "建议将 Cisco Cache Engine 升级到修复该问题的较新软件版本（具体版本以 Cisco 官方安全公告为准），并在升级前通过访问控制列表（ACL）限制仅允许受信任的管理主机访问其 Web 管理界面（默认 TCP 端口 3128），同时在边界防火墙上关闭对外的管理端口映射，以缓解远程未授权查看性能统计信息的风险。"
score = 5
severity = "MEDIUM"
