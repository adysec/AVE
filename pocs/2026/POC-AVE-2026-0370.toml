[info]
author = "ave"
description = "AVE-2026-0370 verification"
id = "POC-AVE-2026-0370"
name = "PoC for AVE-2026-0370"
severity = "medium"
tags = ["ave-2026-0370"]
vuln_id = ["AVE-2026-0370"]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/test/vulnerable"
protocol = "http"

[poc.requests.headers]
User-Agent = "AVE/1.0"

[[poc.requests.matchers]]
expect = true
status = [
    200,
    301,
    302,
]
type = "status"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["vulnerable"]
