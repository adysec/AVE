[basic]
description = "Kolban Webcam32 4.8.3 及更早版本的 Web 管理功能中存在缓冲区溢出漏洞。远程攻击者可通过向目标系统发送超长 URL 请求触发该漏洞，导致任意命令执行。攻击者无需身份认证即可远程利用，可完全控制受影响的 Webcam 服务系统。该漏洞影响 Webcam32 4.8.3 及之前所有版本，CVSS 评分 7.5，危害等级高，建议用户升级至最新版本或禁用 Web 管理功能。"
published = "1998-09-01T04:00:00.000"
remediation = "Kolban Webcam32 4.8.3 及更早版本均受此漏洞影响，且产品已停止维护，不存在官方补丁。建议立即停用 Kolban Webcam32，迁移至其他仍受支持的 Web 摄像管理软件。若无法立即停用，需在防火墙层面限制对 Web 管理端口（默认 80/TCP）的访问，仅允许受信任的管理 IP 地址连接，并避免将管理界面暴露在公网。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "Kolban Webcam32 缓冲区溢出远程代码执行漏洞"
updated = "2026-06-16T21:50:07.593"

