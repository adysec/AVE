[basic]
description = "Linux 内核媒体子系统 DW9714 镜头驱动（`drivers/media/i2c/dw9714.c`）在驱动探测失败时未正确关闭稳压器（regulator），导致 regulator 核心在资源释放时触发内核警告（WARNING），可能造成稳压器资源泄漏、功耗异常或后续驱动加载失败。攻击者需具备本地系统访问权限及加载该驱动的条件才能触发此缺陷，CVSS 评分 5.5，危害等级中危。开发者已在驱动探测失败的分支路径中补充 regulator 禁用逻辑修复此问题。"
published = "2025-02-26T07:01:28.780"
remediation = '升级 Linux 内核至包含 commit 98b0c0e0b15a 的版本（主线 5.18+、长期稳定 5.15.39+ / 5.10.119+），或在相应发行版安装对应内核安全更新。也可通过反向移植该补丁到自定义内核构建中。无法立即升级时，可卸载（blacklist）dw9714 内核模块（echo "blacklist dw9714" > /etc/modprobe.d/blacklist-dw9714.conf）作为临时缓解。'
score = 5.5
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux 内核 dw9714 驱动资源释放不当漏洞"
updated = "2026-06-17T05:18:20.603"

