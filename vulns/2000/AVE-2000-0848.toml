[basic]
description = "Phorum 3.0.7 版本的管理后台 admin.php3 存在未授权密码修改漏洞。由于该页面未对请求来源进行身份验证，远程攻击者无需登录即可通过构造包含 step、option、confirm 及 newPssword 参数的 HTTP 请求，直接修改管理员密码。攻击者可利用此漏洞完全接管论坛管理权限，进而控制整个论坛系统。"
published = "2000-12-31T05:00:00.000"
remediation = "立即升级至 Phorum 3.0.8 及以上版本（推荐迁移至 Phorum 5.x 系列），该版本在 admin.php3 中增加了 session 认证检查，确保修改密码操作必须携带有效管理员会话凭证。如无法升级，手动在 admin.php3 文件顶部添加管理员身份验证逻辑：检查 $_SESSION['admin'] 或 $_COOKIE 中的有效登录令牌，未通过验证则拒绝执行密码修改操作（header('Location: login.php') 并 exit）。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Phorum 3.0.7 管理员密码未授权修改漏洞"
updated = "2026-06-16T21:53:25.480"

