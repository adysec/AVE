[basic]
description = "Oracle 数据库监听程序默认安装版本 7.3.4、8.0.6 和 8.1.6 存在默认配置漏洞，未经身份认证的远程攻击者可通过发送 SET TRC_FILE 或 SET LOG_FILE 命令，将日志信息追加写入任意文件并实现任意命令执行。该漏洞源于监听程序默认配置允许未认证用户修改日志文件路径，攻击者可利用该特性覆盖系统关键文件（如 crontab、.rhosts）或写入恶意脚本实现远程代码执行。影响范围覆盖 Oracle 7.3.4、8.0.6、8.1.6 默认安装环境，CVSS 10.0（AV:N/AC:L/Au:N/C:C/I:C/A:C），攻击无需认证、网络远程可利用、完全破坏机密性/完整性/可用性。攻击者只需向监听端口（默认 1521）发送特制 TNS 命令即可触发，无需任何认证凭证。Oracle 已发布补丁修复该默认配置缺陷，建议升级至修复版本或限制监听器网络访问权限。"
published = "2000-12-19T05:00:00.000"
remediation = "立即升级Oracle Listener到安全版本：申请并安装Oracle发布的完整安全补丁包（已修复验证逻辑及文件写入漏洞）。同时，将`listener.ora`文件权限限制为root所有rw-，并将TRC_FILE及LOG_FILE文件路径限制在/log/oracle/listener目录内，不可写入系统根目录，避免任意文件写入。永久删除未使用的SET命令权限，仅保留管理员操作，并开启监听日志审计功能，记录所有listener操作，第一时间发现异常写入行为。"
score = 10
severity = "CRITICAL"
sources = ["cve"]
title = "Oracle Oracle Listener 命令执行漏洞"
updated = "2026-06-16T21:52:32.423"

