[basic]
description = "Red Hat Linux 6.2 自带的 DiskCheck 脚本 diskcheck.pl 在处理临时文件时未正确检查文件链接，存在典型的条件竞争/符号链接漏洞。本地攻击者可通过在临时文件创建前预置符号链接指向目标文件，诱使脚本以当前用户权限覆盖或写入任意系统文件，导致本地权限提升或系统文件被破坏。该漏洞影响 Red Hat Linux 6.2 及可能使用该脚本的其他发行版，CVSS 评分 2.1，危害等级低，攻击前提是拥有本地账户权限。"
published = "2000-10-20T04:00:00.000"
remediation = "升级至 Red Hat Enterprise Linux 7 及以上版本以彻底修复。如无法升级，请手动修改 diskcheck.pl：1) 编辑 /etc/diskcheck.conf 将临时文件路径 $tempfile 改为 /var/local/diskusagealert.txt；2) 在 diskcheck.pl 中引入 Perl 的 File::Temp 模块替代直接拼接临时文件名，避免可预测路径；3) 使用 O_CREAT|O_EXCL 标志创建临时文件，防止符号链接跟随攻击。"
score = 2.1
severity = "LOW"
sources = ["redhat"]
title = "Red Hat Linux diskcheck 符号链接攻击任意文件写入漏洞"
updated = "2026-06-16T21:52:19.767"

