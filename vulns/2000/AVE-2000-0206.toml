[basic]
description = "A-V Tronics InetServ 3.0 WebMail 组件存在缓冲区溢出漏洞，远程攻击者可通过向目标服务器发送特制的超长 GET 请求触发该漏洞，导致拒绝服务或任意命令执行。该漏洞影响 InetServ 3.0 版本，CVSS 评分 10.0，危害等级严重。攻击者无需认证即可远程利用，仅需构造并发送特定长度的 HTTP GET 请求即可触发溢出。"
published = "2000-01-17T05:00:00.000"
remediation = "InetServ 3.0 已停止维护，厂商未发布补丁。建议立即迁移至有安全支持的替代邮件服务产品。如无法立即替换，可在网络边界防火墙上限制仅信任 IP 访问 WebMail 端口（默认 TCP 80/8080），同时在前置反向代理（如 Nginx）中配置请求 URI 长度限制（如 client_header_buffer_size 4k）以拦截超长 GET 请求作为临时缓解。"
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "A-V Tronics InetServ 3.0 WebMail 缓冲区溢出漏洞"
updated = "2026-06-16T21:50:55.723"

