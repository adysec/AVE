[basic]
description = "Linux 内核 netlink 子系统中存在越界写入漏洞，在创建 `nlmsgerr` 结构体时未对灵活数组成员进行边界检查，导致 `memcpy()` 可能跨复合灵活数组结构写入超 32 字节数据（目的字段仅 16 字节），触发运行时缓冲区溢出。本地攻击者可利用 `NETLINK` 套接字发送特制的错误消息触发该漏洞，导致内存敏感信息泄露。CVSS 评分 5.5，影响所有使用受影响 Linux 内核版本的系统。"
published = "2025-05-01T15:15:59.380"
remediation = "升级 Linux 内核至 5.17 以上版本，具体包含提交 f6b3051e9adbe (netlink: Bounds-check struct nlmsgerr creation) 的内核已修复此问题。对于无法升级内核的生产环境，可通过启用 FORTIFY_SOURCE 编译选项（-D_FORTIFY_SOURCE=2）并在 sysctl 中限制 netlink 访问权限（kernel.dmesg_restrict=1）作为临时缓解措施。"
score = 5.5
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux Kernel netlink 内存越界写入漏洞"
updated = "2026-06-17T05:19:05.743"

