[basic]
description = "Windows 2000 的 telnet 客户端默认自动尝试 NTLM 身份认证，攻击者可通过构造恶意的 telnet:// URL 并诱导用户访问，捕获并重放 NTLM 挑战/响应凭据数据，从而获取用户的 NTLM 哈希值进行进一步攻击。该漏洞影响 Windows 2000 系统，攻击条件为需要用户交互（点击恶意链接），危害等级高，可能导致凭证泄露和横向移动。微软已发布安全更新修复此问题。"
published = "2000-11-14T05:00:00.000"
remediation = "安装 Microsoft 发布的 MS00-067 安全更新补丁（KB272743），该补丁会在向不可信区域发送 NTLM 凭据前弹出警告确认。如无法安装补丁，可在 telnet 客户端中执行 `unset ntlm` 命令禁用 NTLM 默认认证。同时建议在边界防火墙阻止入站 Telnet（TCP 23）及远程登录服务端口。"
score = 7.5
severity = "HIGH"
sources = ["exploitdb"]
title = "Microsoft Windows 2000 telnet 客户端 NTLM 身份认证信息泄露漏洞"
updated = "2026-06-16T21:52:33.847"

