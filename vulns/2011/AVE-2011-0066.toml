[basic]
description = "tags.<value>Microsoft Forefront Threat Management Gateway (TMG) 2010 防火墙客户端中的 NSPLookupServiceNext 函数存在内存破坏漏洞，未经身份认证的远程攻击者可通过向目标系统发送特制请求触发该漏洞，导致远程代码执行。该漏洞影响 Microsoft Forefront TMG 2010 版本，CVSS 评分 9.8，危害等级严重。该漏洞已被 CISA KEV 收录，存在在野利用。Microsoft 已于 2011 年 6 月安全更新 MS11-040 中修复此漏洞。"
published = "2011-06-16T20:55:02.543"
remediation = "立即安装 Microsoft 安全公告 MS11-040 提供的更新 (KB2520426)，将 Forefront TMG 2010 Client 升级至文件版本 7.0.7734.182。可通过 Microsoft Update 自动获取更新，或从 Microsoft 下载中心手动下载安装包 (TMG-KB2520426-ENU.msp)，使用命令 msiexec /p TMG-KB2520426-ENU.msp /quiet 静默安装后重启系统。如无法立即打补丁，可临时禁用 TMG 2010 Client 服务作为缓解措施。"
score = 9.8
severity = "CRITICAL"
sources = ["kev"]
title = "Microsoft Forefront Threat Management Gateway (TMG) 防火墙客户端远程代码执行漏洞"
updated = "2026-06-16T23:30:18.967"

