[basic]
description = "Microsoft Internet Explorer 4.0 和 5.0 存在跨域 Cookie 信息泄露漏洞。攻击者可构造包含目标域名及转义字符的恶意 URL，诱导已登录目标站点的用户点击该链接。当用户使用受影响版本的 IE 浏览器访问此恶意页面时，浏览器会将该目标域名的 Cookie 数据泄露给攻击者，导致会话令牌、身份凭证等敏感信息被窃取，进而引发会话劫持或账户信息泄露。该漏洞的利用需要较高的用户交互条件，攻击者必须先通过社会工程手段诱导用户点击恶意链接才能成功。Microsoft 已针对该漏洞发布安全补丁进行修复。"
published = "2000-05-11T04:00:00.000"
remediation = '安装 Microsoft Security Bulletin MS00-033 安全补丁（对应 KB 文章 KB262509），该补丁修复了 Internet Explorer 4.0/4.01/5.0/5.01 中的未授权 Cookie 访问漏洞。受影响用户应升级至 Internet Explorer 5.01 或更高版本（IE 5.5 不受此漏洞影响）。如无法立即打补丁，可临时将浏览器安全区域设置为"高"，限制网页脚本执行并阻止跨域 Cookie 读取。'
score = 2.6
severity = "LOW"
sources = ["avd"]
title = "Microsoft Internet Explorer 跨域 Cookie 信息泄露漏洞"
updated = "2026-06-16T21:51:44.173"

