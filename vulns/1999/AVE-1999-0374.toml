[basic]
description = "Microsoft IIS 3.0 中的 newdsn.exe CGI 脚本存在未授权文件创建漏洞。远程攻击者无需身份认证即可通过发送特制 HTTP 请求，利用该脚本覆盖服务器上的任意文件。该漏洞影响运行于 Windows NT Server 上的 IIS 3.0 版本，攻击者可能借此篡改 Web 页面内容或系统配置文件，导致信息泄露或服务异常。CVSS 评分 6.4，危害等级中等。"
published = "1997-09-01T04:00:00.000"
remediation = "升级至 IIS 4.0 或更高版本，或直接从 IIS 脚本目录中删除 newdsn.exe 文件并移除相关虚拟目录映射，禁止匿名用户通过 CGI 执行此文件。"
score = 6.4
severity = "MEDIUM"
sources = ["epss"]
title = "Microsoft IIS 3.0 newdsn.exe 远程文件创建漏洞"
updated = "2026-06-16T21:47:51.367"

