[basic]
description = "Microsoft Excel 存在远程代码执行漏洞，攻击者通过诱导用户打开特制的 Excel 文件即可触发该漏洞，导致任意代码执行。该漏洞影响 Excel 2000、XP、2003 及 2004 for Mac 等多个版本，已被用于定向零日攻击。攻击需要用户交互配合，但无需额外身份认证，危害严重。"
published = "2007-02-03T01:28:00.000"
remediation = "立即安装 Microsoft 安全公告 MS07-015 提供的更新（KB932553），该补丁通过 Windows Update 自动更新或从微软官网下载安装。对于 Excel 2000/XP/2003 及 Office 2004 for Mac 用户，安装此更新可彻底修复该远程代码执行漏洞。临时缓解措施：不要打开不可信的 Excel 附件，在邮件网关层面拦截带有 .xls 附件的可疑邮件。Office 2000 等已停止支持版本建议升级到受支持版本。"
score = 8.8
severity = "HIGH"
sources = ["kev"]
title = "Microsoft Excel 未指明远程代码执行漏洞"
updated = "2026-06-16T22:36:02.527"

