[basic]
description = "Internet Explorer 4.01 与 5.0 版本中使用的 Registration Wizard ActiveX 控件（regwizc.dll，InvokeRegWizard 方法，版本 3.0.0.0）存在缓冲区溢出漏洞。该控件在处理远程传入的参数时未对输入长度进行边界校验，攻击者可构造特制的网页，当用户使用 IE 浏览该页面时，恶意脚本即可触发溢出并覆盖内存，进而在目标系统上以当前用户权限执行任意命令。影响范围为安装了上述版本 IE 及该 ActiveX 控件的 Windows 系统，攻击需诱导受害者访问恶意网页或打开恶意 HTML 文档，属于远程、需用户交互的客户端代码执行漏洞。"
published = "1999-09-24T04:00:00.000"
remediation = "建议升级至 Internet Explorer 5.5 SP2 或更高版本（含 MS00-043 补丁），或在 IE 安全设置中将“ActiveX 控件和插件”设为“禁用/提示”，并通过注册表设置 regwizc.dll 的 Kill Bit（CLSID: {F3643E1A-2E4A-11D2-885D-00C04F8EF3E3}）禁用该控件。"
score = 5.1
severity = "MEDIUM"
sources = ["cve"]
title = "微软 Internet Explorer 注册向导控件缓冲区溢出远程代码执行漏洞"
updated = "2026-06-16T21:50:45.670"

