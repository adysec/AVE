[basic]
description = "Guild FTPD 0.9.7 存在目录遍历漏洞，远程攻击者可通过向 FTP 服务发送包含 `..` 路径序列的特制请求，利用不同错误响应信息判断 FTP 根目录之外的文件是否存在，从而导致敏感文件信息泄露。该漏洞影响 Guild FTPD 0.9.7 版本，CVSS 评分 7.5，危害等级高危。目前官方尚未发布补丁，建议通过访问控制限制非授权用户访问。"
published = "2000-07-08T04:00:00.000"
remediation = "立即升级 Guild FTPD 至 0.9.8 以上版本，该版本修复了路径遍历检查不严导致文件存在泄露的问题。如厂商已停止维护，建议迁移至 actively maintained 的 FTP 服务器软件（如 vsftpd、ProFTPD），并在防火墙端限制对 21 端口的非必要访问作为临时缓解。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "Guild FTPD 0.9.7 目录遍历文件存在泄露漏洞"
updated = "2026-06-16T21:52:10.107"

