[basic]
description = "Linux 系统中 man 命令存在缓冲区溢出漏洞，本地攻击者可通过设置 MANPAGER 环境变量为超长字符串触发该漏洞，导致缓冲区溢出，从而获得 egid 15 权限提升。该漏洞影响 RedHat 6.1 等早期 Linux 发行版，CVSS 评分 7.2，危害等级高危。攻击者需拥有本地账户方可利用，低权限用户可通过此漏洞实现权限提升，获取系统敏感信息或进一步控制主机。"
published = "2000-02-26T05:00:00.000"
remediation = "升级 man 程序至 1.5i 及以上版本，或在系统配置文件中清除 MANPAGER 环境变量，避免 man 传递恶意环境变量至外部程序。同时限制非信任用户的本地访问权限，以降低本地提权风险。"
score = 7.2
severity = "HIGH"
sources = ["epss"]
title = "Red Hat Linux man 本地缓冲区溢出漏洞"
updated = "2026-06-16T21:51:08.797"

