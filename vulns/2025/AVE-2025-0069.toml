[basic]
description = "深信服堡垒机 `netConfig/set_port` 接口存在远程命令执行漏洞，由于未对用户输入做有效过滤，未认证的远程攻击者可通过向 `/fort/system;login/netConfig/set_port` 发送特制的 POST 请求，注入恶意 Redis 命令与 base64 编码的 bash 载荷实现任意命令执行，从而完全控制目标服务器，风险极高。"
published = "0704"
remediation = '立即升级深信服堡垒机至官方发布的最新安全版本，该漏洞影响 /fort/system;login/netConfig/set_port 接口的 select 参数，攻击者可注入 Redis 命令实现远程命令执行。如无法立即升级，应在 WAF/IPS 层面添加规则拦截包含 "select=" 及 Redis 命令特征（如 -j DROP、SLAVEOF 等）的 POST 请求，同时将堡垒机管理口限制为仅允许可信管理 IP 访问，避免暴露在公网。'
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "深信服 堡垒机 远程命令执行漏洞"
updated = "0704"

