[basic]
description = "Linux 内核 DSA（分布式交换架构）子系统中存在越界读取漏洞。在多芯片级联交换网络拓扑中，当某交换机端口离开桥接时，VLAN 过滤同步机制会错误地向其他交换芯片发送跨芯片通知，导致使用不存在的端口号进行数组越界访问（CWE-125），引发内核崩溃。攻击者可通过构造特定的网络配置触发该漏洞，实现拒绝服务攻击。该漏洞影响 Linux 内核各发行版本，CVSS 评分 7.1，危害等级高。"
published = "2025-02-26T07:01:00.407"
remediation = "升级 Linux 内核至 5.17.2 及以上版本，该版本已合入修复补丁。补丁提交为主线 e1f2a4dd8d43 和稳定分支 108dc8741c20，修复了 dsa_port_vlan_filtering 函数在跨芯片通知场景下使用无效端口号导致数组越界的问题。各 Linux 发行版用户应参照发行商安全公告更新内核包。"
score = 7.1
severity = "HIGH"
sources = ["cve"]
title = "Linux 内核 DSA 跨芯片 VLAN 过滤同步数组越界读取漏洞"
updated = "2026-06-17T05:17:27.830"

