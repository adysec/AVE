[basic]
description = "Cmail 2.4.7 Web 管理界面存在缓冲区溢出漏洞，远程攻击者可通过向目标发送超长 GET 请求触发缓冲区溢出，进而执行任意命令。该漏洞无需身份认证，攻击复杂度低，危害等级为严重。受影响的版本为 Cmail 2.4.7，建议用户升级至最新版本或限制 Web 管理界面的访问权限以降低风险。"
published = "2000-06-05T04:00:00.000"
remediation = "立即将 Cmail 升级至 2.4.8 或更高版本，该版本已对 GET 请求参数长度进行正确边界检查，消除了缓冲区溢出。在无法立即升级的情况下，可通过反向代理或 WAF 规则限制 HTTP GET 请求 URI 长度不超过 1024 字节，并过滤包含大量连续字符的畸形请求；同时在防火墙层面限制仅信任 IP 访问 Cmail Web 管理端口（默认 80/443）。鉴于 Cmail 为 2000 年发布的软件，厂商已停止维护，建议迁移至当前仍在安全更新的 Web 邮件系统（如 Roundcube 或 SquirrelMail 的现代分支）。"
score = 10
severity = "CRITICAL"
sources = ["cve"]
title = "Cmail 2.4.7 Web 接口缓冲区溢出远程代码执行漏洞"
updated = "2026-06-16T21:51:59.647"

