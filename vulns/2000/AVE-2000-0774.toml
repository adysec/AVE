[basic]
description = "MiniVend 购物车程序的 view_page.html 示例页面存在命令注入漏洞，远程攻击者可通过向该页面提交包含 shell 元字符的特制请求，在服务器端以 Web 进程权限执行任意命令。该漏洞影响 MiniVend 4.0 及更早版本，攻击无需身份认证，利用门槛较低，可能导致服务器被完全控制。厂商未提供官方补丁，建议删除或限制访问示例页面。"
published = "2000-07-10T04:00:00.000"
remediation = "立即升级至 MiniVend 4.05 或更高版本以修复 Util.pm 中不安全的 Perl open() 调用；若无法升级，立即删除 Web 服务器上的 view_page.html 示例文件作为临时缓解措施；同时建议迁移至 MiniVend 的继任项目 Interchange 以获得持续安全支持。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "MiniVend 购物车 view_page.html 命令注入漏洞"
updated = "2026-06-16T21:52:09.450"

