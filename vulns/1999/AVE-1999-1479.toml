[basic]
description = "SSH 1.2.26 客户端在启用 Kerberos V 认证时存在缓冲区溢出漏洞。远程攻击者可通过向目标发送特制的长 DNS 主机名，在 TGT 票据传递过程中触发缓冲区溢出，导致拒绝服务或执行任意命令。该漏洞影响启用了 Kerberos V 的 SSH 1.2.26 客户端，CVSS 评分 7.5，危害等级高，建议升级至修复版本。"
published = "1998-11-05T05:00:00.000"
remediation = "升级到 OpenSSH 2.x 及以上版本（SSH 1.2.26 已停止维护），或改用 OpenSSH 替代。如必须使用旧版，在 ssh 客户端配置中禁用 Kerberos 认证（设置 KerberosAuthentication no），并在服务端限制 DNS 主机名长度，避免超长主机名触发缓冲区溢出。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "SSH 客户端 Kerberos 缓冲区溢出远程代码执行漏洞"
updated = "2026-06-16T21:50:11.493"

