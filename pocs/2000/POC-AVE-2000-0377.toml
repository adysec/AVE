[info]
author = "ave"
description = "检测 /dev/pts 伪终端设备文件是否具有不安全的全局可写权限。在 Red Hat Linux 6.0 中，/dev/pts 文件系统以不安全模式安装，本地用户可写入其他 tty 设备。"
id = "POC-AVE-2000-0377"
name = "Red Hat Linux 6.0 /dev/pts 伪终端文件系统权限漏洞 PoC"
severity = "medium"
tags = ["ave-2000-0377"]
vuln_id = [
    "CVE-2000-0365",
    "AVE-2000-0377",
]

[poc]
logic = "any"

[[poc.requests]]
path = "/dev/pts/0"
protocol = "file"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["pts"]
