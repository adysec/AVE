[basic]
description = "vLLM 推理服务引擎在处理多声道音频时，默认使用 Librosa 库的 numpy.mean 进行声道下混（to_mono），而国际标准 ITU-R BS.775-4 规定了加权混音算法，两者存在处理差异。攻击者可利用此差异构造特制多声道音频，使人类听到的内容与 AI 模型处理的内容不一致，从而绕过内容审核机制。该漏洞影响 vLLM 0.5.5 至 0.18.0 之前版本，CVSS 评分 5.9，危害等级中危。官方已在 0.18.0 版本中修复此问题。"
published = "2026-04-02T20:16:25.437"
remediation = "立即将 vLLM 升级至 0.18.0 或以上版本（于 2026 年发布，包含该修复）。如无法立即升级，可修改音频预处理管线，将降混算法替换为 ITU-R BS.775-4 加权算法（参考 librosa 的 `to_mono` 实现，改用 `librosa.core.resample` 配合权重矩阵），并增加音频输入的内容安全校验机制以防范隐式注入攻击。"
score = 5.9
severity = "MEDIUM"
sources = ["ghsa"]
title = "vLLM 多声道音频混音算法不一致安全绕过漏洞"
updated = "2026-06-17T10:39:34.550"

