[basic]
description = "Joomla! J!WHMCS Integrator 组件 1.5.0 版本存在目录遍历漏洞，攻击者可通过 index.php 的 controller 参数传入目录遍历序列（../）读取服务器任意文件。该漏洞源于对 controller 参数输入验证不足，导致路径遍历序列未被过滤。攻击者无需身份认证即可远程利用，可读取服务器敏感文件如 /etc/passwd、配置文件等敏感信息，CVSS 评分 7.5，危害等级高危。影响使用 J!WHMCS Integrator 1.5.0 组件的 Joomla! 站点，攻击者可通过构造恶意 controller 参数实现任意文件读取。"
published = "2010-05-19T20:00:01.270"
remediation = "立即升级到 Joomla! 最新版本并安装官方安全补丁，如果无法立即更新，在防火墙中添加路径验证规则并禁止包含 '..' 的请求访问 com_jwhmcs 目录。"
score = 7.5
severity = "HIGH"
sources = ["nuclei"]
title = "Joomla! J!WHMCS Integrator 组件 本地文件包含漏洞"
updated = "2026-06-16T23:19:42.080"

