[basic]
description = "Sitecore CMS 7.0 Update-4之前版本存在跨站脚本(XSS)漏洞，远程攻击者可通过向默认URI的xmlcontrol参数注入恶意Web脚本或HTML代码触发该漏洞，导致敏感信息泄露或会话劫持。攻击无需身份认证，仅需诱使用户访问特制链接即可利用。该漏洞影响Sitecore CMS 7.0 Update-4之前所有版本，CVSS评分4.3，危害等级中危。建议升级至7.0 Update-4或更高版本修复。"
published = "2015-01-13T11:59:03.303"
remediation = "升级 Sitecore CMS 至 7.0 Update-4 (rev. 140120) 或更高版本，该版本修复了 xmlcontrol 参数未正确过滤导致的 XSS 漏洞。如无法立即升级，可在 Web 应用防火墙 (WAF) 中添加规则过滤 xmlcontrol 参数中的恶意脚本字符作为临时缓解措施。"
score = 4.3
severity = "MEDIUM"
sources = ["nuclei"]
title = "Sitecore CMS 跨站脚本漏洞"
updated = "2026-06-17T00:04:00.033"

