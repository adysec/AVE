[basic]
description = "Jetico BestCrypt 0.6、0.7、0.8 及 0.8.1 及更早版本中的 bctool 工具存在缓冲区溢出漏洞。该工具在执行卸载加密卷（umount）操作时，会对文件或目录的路径名进行处理，但未对路径名长度进行充分的边界检查，导致栈上缓冲区溢出，攻击者可在栈上覆盖关键变量并劫持程序执行流程。本地攻击者可通过构造包含特制长路径名的文件或目录，在系统上以 root 权限执行任意代码，从而完全控制目标主机。该漏洞利用门槛极低，无需身份认证，攻击者可利用公开可获取的 PoC 利用代码，通过创建含 shellcode 的深层目录路径，调用 bctool umount 命令触发溢出并获得 root shell。受影响的系统包括安装了上述版本 BestCrypt 的 Linux 主机，CVSS 评分为 7.2，危害等级为高危。Jetico 已在后续版本中修复此漏洞，建议用户升级到最新版本并限制本地未授权用户的访问权限。"
published = "2001-10-18T04:00:00.000"
remediation = "升级到支持路径长度限制的最佳版本如 BestCrypt 0.8.2 或更高版本。配置 BCTool 时启用路径长度验证，限制最大路径长度为 255 字节。如无法立即升级，可在权限控制中限制普通用户执行 UMount 操作，并启用路径长度检查功能。"
score = 7.2
severity = "HIGH"
sources = ["exploitdb"]
title = "Jetico BestCrypt BCTool UMount 缓冲区溢出漏洞"
updated = "2026-06-16T21:54:54.287"

