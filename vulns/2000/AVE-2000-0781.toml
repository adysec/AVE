[basic]
description = "WebActive HTTP Server 1.00 存在缓冲区溢出漏洞。远程攻击者无需认证即可向目标服务器发送超长 URL 请求，触发缓冲区溢出，导致 WebActive HTTP Server 进程崩溃，造成拒绝服务。该漏洞影响 WebActive HTTP Server 1.00 版本，CVSS 评分 5.0，危害等级中危。受影响的系统管理员应限制对 HTTP 服务的访问或升级至修复版本。"
published = "2000-07-12T04:00:00.000"
remediation = "建议立即停止使用 WebActive HTTP Server 1.00，该产品已停止维护且不再提供安全更新。将服务迁移至 Nginx 或 Apache HTTP Server 等仍在积极维护的现代 Web 服务器。如无法立即迁移，可在反向代理或 WAF 层面配置规则，限制传入 URL 长度不超过 1024 字节，以缓解缓冲区溢出导致的拒绝服务风险。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "WebActive HTTP Server 缓冲区溢出拒绝服务漏洞"
updated = "2026-06-16T21:52:10.477"

