[basic]
description = "Rainbow Six 多人游戏模式存在缓冲区溢出漏洞，远程攻击者可通过向游戏服务器发送超长的昵称（nick）命令触发该漏洞，导致目标服务进程崩溃引发拒绝服务，在特定条件下可能实现任意代码执行。该漏洞影响早期版本的 Rainbow Six 多人游戏组件，攻击无需身份认证，仅需向目标发送特制网络数据包即可触发。"
published = "1997-10-24T04:00:00.000"
remediation = "该漏洞存在于彩虹六号（Rainbow Six）多人游戏服务端，厂商 Red Storm Entertainment 已停止技术支持且未发布官方补丁。缓解措施：1）在边界防火墙设置规则丢弃包含超长 nickname 字段的异常 UDP 数据包（建议限制 nickname 不超过 24 字节）；2）将游戏服务限制于可信内部网络运行，避免暴露在公网；3）使用第三方代理工具对 nick 命令输入实施长度校验过滤。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Rainbow Six Multiplayer 缓冲区溢出漏洞"
updated = "2026-06-16T21:50:03.690"

