[basic]
description = "Microsoft SQL Server 7.0 存在存储过程权限绕过漏洞，本地用户可通过创建临时存储过程并引用原有存储过程的方式，绕过其本不具备执行权限的存储过程限制，以更高权限执行数据库操作，导致敏感信息泄露或未授权数据操作。攻击者需拥有本地登录访问数据库的权限。该漏洞影响 SQL Server 7.0 版本，CVSS 评分 4.6，危害等级中危。"
published = "2000-07-07T04:00:00.000"
remediation = "立即安装 Microsoft 官方补丁 MS00-048（下载 S70843i.exe 或 S70843a.exe），该补丁修复了临时存储过程绕过权限检查的问题。同时避免使用 sa 账户作为数据库所有者，应使用独立 sysadmin 登录账户，并将用户数据库的所有权从 sa 更改为非特权账户。"
score = 4.6
severity = "MEDIUM"
sources = ["cve"]
title = "Microsoft SQL Server 7.0 存储过程权限绕过漏洞"
updated = "2026-06-16T21:52:05.487"

