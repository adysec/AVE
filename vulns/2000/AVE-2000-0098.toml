[basic]
description = "Microsoft IIS 的 ASP 页面在处理 Visual Basic 脚本时存在拒绝服务漏洞。远程攻击者可通过向目标 IIS 服务器发送包含精心构造的非法正则表达式的 HTTP 请求，触发 ASP 脚本解析器异常，导致 IIS 工作进程崩溃或陷入死循环，造成服务器无法响应正常请求。该漏洞影响早期 Microsoft IIS 版本，CVSS 评分 5.0，危害等级中危。"
published = "2000-01-21T05:00:00.000"
remediation = "安装 Microsoft 为 IIS 4.0 发布的安全更新（参见 MS00-006 安全公告），或升级至 Windows 2000 Server + IIS 5.0 及以上受支持版本。同时在 ASP 页面对用户输入的正则表达式做 try-catch 异常捕获，避免非法正则传入 RegExp.Execute 方法导致进程崩溃。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Microsoft IIS Visual Basic Script ASP 页面拒绝服务漏洞"
updated = "2026-06-16T21:51:01.897"

