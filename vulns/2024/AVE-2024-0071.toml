[basic]
description = "深信服下一代防火墙存在远程命令执行漏洞，其Web管理界面的登录接口在处理PHP会话ID时未对特殊字符进行过滤，攻击者可在Cookie参数中嵌入反引号包裹的命令执行代码。未经身份认证的远程攻击者仅需向设备的/cgi-bin/login.cgi接口发送特制的POST请求，即可在服务器上执行任意系统命令，如写入文件或获取敏感信息。该漏洞影响深信服下一代防火墙产品，攻击门槛低且危害严重，可导致防火墙设备被完全控制。"
published = "0726"
remediation = "建议立即将深信服下一代防火墙（NGAF）升级至 AF8.0.17 及以上版本，或安装 SP_AF_JG_26 及以上补丁包。如暂时无法升级，可临时在防火墙管理口配置访问控制列表，仅允许可信管理网段访问登录页面，阻断外部对 /cgi-bin/login.cgi 的未授权访问，或通过深信服技术支持渠道获取补丁文件。"
