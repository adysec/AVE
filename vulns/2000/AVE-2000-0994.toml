[basic]
description = "FreeBSD 系统中的 periodic 命令在 4.1.1 及更早版本存在符号链接竞争条件漏洞。该命令以 root 权限执行系统定期维护任务时，会在临时目录创建日志文件，但由于未对文件创建过程进行安全校验，具有本地访问权限的低权限攻击者可预先在目标路径放置指向系统关键文件的符号链接。当 periodic 进程打开并写入该文件时，实际会以 root 权限覆写符号链接所指向的任意文件内容，例如 /etc/passwd、/etc/crontab 或 /etc/rc.conf 等核心配置文件。该漏洞影响 FreeBSD 4.1.1 及更早版本系统，要求攻击者拥有本地用户账户或 shell 访问权限即可发起利用。成功利用后攻击者可篡改系统配置文件、植入持久化后门或提升至 root 权限，严重威胁系统完整性与可用性。"
published = "2001-02-16T05:00:00.000"
remediation = "立即运行 sysinstall 或 freebsd-update 升级 FreeBSD 到修复版本（4.1.1-RELEASE 或更高版本）；或手动修改 /etc/periodic.conf 将临时目录从 /tmp 改为 /var/tmp，并确保 periodic 脚本使用 mktemp 创建不可预测的临时文件名，避免使用 /tmp/periodic.$PID 形式。临时缓解措施：以 root 身份执行 rm /tmp/periodic.* 清除所有可疑符号链接文件，并定期检查 /tmp 目录下是否存在指向敏感文件的 symbolic link。"
score = 1.2
severity = "LOW"
sources = ["cve"]
title = "FreeBSD periodic 任意文件写入漏洞"
updated = "2026-06-16T21:52:41.107"

