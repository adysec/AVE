[id]
ave_id = "AVE-2000-0067"
aliases = ["CVE-2000-0080"]
[basic]
title = "IBM AIX techlibss 符号链接覆盖文件漏洞"
description = "IBM AIX 操作系统的 techlibss 工具存在符号链接（symlink）漏洞。该工具在处理临时文件时未对文件路径进行充分验证，本地低权限用户可在临时文件目录中创建指向敏感系统文件的符号链接，诱使 techlibss 在写入临时数据时实际覆盖目标文件，从而导致文件内容被篡改或破坏。攻击者需具备目标系统的本地登录权限方可利用此漏洞，成功利用可导致系统配置文件或关键可执行文件被修改，进而实现权限提升或造成系统不稳定。IBM 已发布安全公告建议管理员修复该工具的临时文件处理机制，避免使用可预测的临时文件名。"
severity = "LOW"
score = 2.1
sources = ["cve"]
published = "2000-01-10T05:00:00.000"
updated = "2026-06-16T21:50:57.527"
