[basic]
description = "Netscape Navigator 在存储用户 Netscape 邮件密码时采用了弱加密算法（如可逆或易被破解的编码方式），导致密码以不安全的形式保存在本地。该漏洞影响使用 Netscape Navigator 邮件客户端并启用了密码保存功能的用户，攻击条件为本地攻击者或能访问用户配置文件者。利用方式是通过读取本地存储的加密密码数据，使用相应解密手段恢复出明文邮件密码，从而窃取用户凭据，可能造成账户被非法访问。"
published = "2000-01-12T05:00:00.000"
remediation = '将 Netscape Navigator 升级到 4.7 及以上版本，该版本改进了口令存储加密强度；若无法升级，应在邮件客户端中取消"记住口令"选项，并避免在共享或公共计算机上使用 Netscape 邮件功能，同时配置本地防火墙限制对外部邮件服务器的非必要访问作为临时缓解。'
score = 5
severity = "MEDIUM"
sources = ["avd"]
