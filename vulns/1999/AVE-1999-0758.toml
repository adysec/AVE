[basic]
description = "WolfPack Development 开发的 XSHIPWARS（Xshipwars）游戏 1.0 和 1.2.4 版本中存在远程缓冲区溢出漏洞。攻击者可通过向目标系统的 xsw 程序发送特制的网络数据包触发缓冲区溢出，导致程序崩溃或执行任意代码。该漏洞无需身份认证即可远程利用，CVSS 评分 7.5，危害等级高，影响运行上述版本的游戏服务器。"
published = "1999-12-09T05:00:00.000"
remediation = "Xshipwars 项目已停止维护，建议迁移至当前仍在更新的替代太空策略游戏服务器。如短期内无法替换，请在防火墙层面限制 xsw 程序的 TCP 端口仅对可信 IP 开放，并以最小权限独立账户运行该服务，避免以 root 身份启动。同时定期审计系统日志，发现异常连接立即阻断。"
score = 7.5
severity = "HIGH"
sources = ["exploitdb"]
