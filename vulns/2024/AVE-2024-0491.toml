[basic]
description = "LuaJIT 及 OpenRusty luajit2 的 lj_strfmt_num.c 文件中 lj_strfmt_wfnum 函数存在栈缓冲区溢出漏洞，攻击者可通过构造特制的格式化字符串输入触发该漏洞，导致远程代码执行或服务崩溃。该漏洞影响 LuaJIT 2.1 及之前版本、OpenRusty luajit2 早于 v2.1-20240626 的版本，无需认证即可远程利用，CVSS 评分 9.8，危害等级严重。"
published = "2025-07-07T17:15:27.247"
remediation = "立即将 LuaJIT 升级至包含 commit 343ce0ed 的修复版本（≥2.1 主分支），或使用 OpenResty luajit2 v2.1-20240626 及以上版本。Debian 用户可安装对应 LTS 安全更新。如无法升级，避免将 LuaJIT 暴露于不可信输入，并限制 `string.format` 等触发数值格式化路径的调用。"
score = 9.8
severity = "CRITICAL"
sources = ["msrc"]
title = "LuaJIT 数字格式化栈缓冲区溢出漏洞"
updated = "2026-06-17T07:15:38.887"

