[basic]
description = "Slackware Linux 3.4 的 pkgtool 工具在处理临时文件时存在符号链接攻击漏洞。本地攻击者可通过在目标系统上创建恶意的符号链接指向任意文件，诱使 pkgtool 在操作临时 reply 文件时覆盖或读取目标文件内容，从而实现任意文件读写。该漏洞利用条件为拥有本地访问权限，影响 Slackware Linux 3.4 版本，CVSS 评分 3.6，危害等级低。"
published = "1998-04-06T04:00:00.000"
remediation = "升级 Slackware Linux 至 4.0 或更高版本，该问题已在后续版本中修复。如无法升级，建议对 pkgtool 脚本进行修补，使用 mktemp 替代硬编码临时文件名创建 reply 文件，避免 /tmp 目录下符号链接攻击。"
score = 3.6
severity = "LOW"
sources = ["epss"]
title = "Slackware Linux 3.4 pkgtool 本地文件符号链接漏洞"
updated = "2026-06-16T21:50:34.210"

