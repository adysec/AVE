[basic]
description = "Microsoft Exchange 5.5 在处理访问控制列表（ACL）修改时存在安全缺陷。当管理员对目录存储中的对象权限（ACL）进行修改后，这些变更并不会立即生效，而是要等到目录存储缓存（directory store cache）被刷新之后才会真正应用。攻击者在缓存刷新前的窗口期内，仍可利用旧的、未更新的访问控制规则访问本应被限制的目录对象或执行受限操作，从而绕过预期的权限隔离。该漏洞影响运行 Microsoft Exchange Server 5.5 的系统，攻击条件为攻击者需具备一定的目录访问能力且利用缓存未即时同步的时间差，利用方式是通过在 ACL 变更后、缓存刷新前发起越权访问请求，实现权限绕过与信息读取。"
published = "1999-12-13T05:00:00.000"
remediation = "升级到 Microsoft Exchange Server 5.5 的 Service Pack 4 或更高版本以修复 ACL 缓存刷新缺陷。若无法立即升级，可定期重启 Exchange 目录服务（DS）强制刷新目录存储缓存，使 ACL 修改及时生效，并在边界防火墙限制对 Exchange 目录服务的非授权访问作为临时缓解。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
