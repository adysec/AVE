[basic]
description = '用友畅捷通 T+ 存在敏感信息泄露漏洞，其部分以 "Get" 开头的 API 接口（Get*A）未对访问请求进行有效的权限校验，导致未经认证的远程攻击者可直接构造恶意请求访问这些接口，从而获取系统配置信息、数据库连接凭证、用户账户数据等敏感内容。该漏洞攻击复杂度低，无需特殊权限，攻击者仅需目标系统 T+ 管理后台网络可达即可实施利用，对业务数据保密性造成严重威胁。'
published = "0703"
remediation = "立即升级畅捷通 T+ 至最新版本 19.0（2023年12月发布），并从 https://www.chanjetvip.com/product/goods/goods-detail?id=53aaa40295d458e44f5d3ce5 获取并安装最新安全补丁。同时，在 Web 应用防火墙或反向代理层面限制对 Get*A 相关接口的匿名访问，禁止非授权 IP 直接访问 T+ 管理端口。如为专属云部署，须严格限制服务器公网开放端口，避免将数据库、Redis 等服务端口暴露在公网。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "用友 畅捷通 T+ 敏感信息泄露漏洞"
updated = "0703"

