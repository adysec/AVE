[basic]
description = "VDOLive Player 3.0.2 存在本地缓冲区溢出漏洞，远程攻击者可通过向 VDO 客户端发送特制的 .vdo 文件触发该漏洞，导致在目标系统上执行任意命令。该漏洞影响 VDOLive Player 3.0.2 及更早版本，攻击者只需诱使用户打开恶意构造的 .vdo 媒体文件即可完成利用，无需额外身份认证，危害等级高。"
published = "1999-12-13T05:00:00.000"
remediation = "VDOLive Player 3.0.2 已停止维护，官方未发布安全补丁。建议立即卸载 VDOLive Player，改用支持安全更新的替代播放器（如 VLC media player）。如业务必须使用，切勿打开来源不明的 .vdo 文件，并在网络边界阻止 .vdo 文件传输以降低攻击面。"
score = 7.6
severity = "HIGH"
sources = ["exploitdb"]
title = "VDO VDOLive Player 3.0.2 缓冲区溢出漏洞"
updated = "2026-06-16T21:49:30.627"

