[basic]
description = "True North Internet Anywhere Mail Server 2.3.1 的 POP3 服务存在拒绝服务漏洞。远程攻击者无需身份认证即可通过向目标服务器的 POP3 端口发送包含字母作为参数的 LIST、TOP 或 UIDL 命令，导致服务进程崩溃，造成正常邮件服务中断。该漏洞影响 Internet Anywhere Mail Server 2.3.1 版本，CVSS 评分 5.0，危害等级中危。厂商未提供官方补丁，建议升级至更高版本或采取访问控制措施缓解风险。"
published = "1999-10-01"
remediation = "该产品已停止维护，建议迁移至其他受支持的邮件服务器软件。如仍需使用，应在防火墙或网络边界限制对 POP3 端口（默认 110）的访问来源，仅允许可信 IP 段连接，并部署入侵检测系统监控异常 POP3 命令请求。"
score = 5.0
severity = "MEDIUM"
sources = ["cve"]
title = "True North Internet Anywhere Mail Server 2.3.1 POP3 服务拒绝服务漏洞"
updated = "2026-06-16"

