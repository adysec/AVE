[basic]
description = "DNS协议存在反射放大攻击漏洞，远程攻击者通过向开放的DNS递归服务器发送源地址伪造的UDP查询请求，使响应数据包远大于请求包，从而将大量流量反射至受害者目标，造成带宽耗尽型拒绝服务。该漏洞影响所有未限制递归查询的DNS服务器，攻击者无需认证即可利用，危害等级中等。"
published = "1999-12-31T05:00:00.000"
remediation = "在 DNS 服务器上禁用递归查询（仅开放给可信客户端），部署响应速率限制（Response Rate Limiting, RRL），配置 BCP38 源地址验证过滤伪造 IP 的流量，升级 BIND 至 9.18 或更高版本以支持内置的防放大攻击保护。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "DNS 服务器 UDP 反射放大拒绝服务漏洞"
updated = "2026-06-16T21:50:18.833"

