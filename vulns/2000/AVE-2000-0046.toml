[basic]
description = "Solaris 系统的 chkperm 命令存在缓冲区溢出漏洞，本地攻击者可通过传入超长的 `-n` 选项参数触发堆栈缓冲区溢出，从而在受影响系统上提升至 root 权限，实现对主机的完全控制。该漏洞影响 Solaris 操作系统中的 chkperm 工具，攻击者需具备本地登录权限才能利用，利用成功后可直接获取系统最高权限，危害等级为高危。"
published = "2000-01-06T05:00:00.000"
remediation = "立即安装 Sun Solaris 对应版本的补丁（如 Solaris 2.6 的 105484-05、Solaris 7 的 107014-01 等），并通过 `patchadd` 应用。如无法及时打补丁，可将 /usr/bin/chkperm 权限改为 0750 并移至 root 私有目录，或重命名该命令以消除本地提权途径，同时收紧 setuid/setgid 文件审计。"
score = 7.2
severity = "HIGH"
sources = ["cve"]
title = "Sun Solaris chkperm 缓冲区溢出漏洞"
updated = "2026-06-16T21:50:54.510"

