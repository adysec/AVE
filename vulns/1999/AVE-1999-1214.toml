[basic]
description = "Internet Explorer 4.01 的文件上传控件存在不安全的设计缺陷，攻击者可通过脚本将任意文件名粘贴到文件上传控件中，远程读取目标系统上的任意文件内容。该漏洞影响运行 Microsoft Internet Explorer 4.0.1（含 SP1）的客户端系统，攻击者无需身份认证即可在用户访问恶意网页时触发漏洞，利用方式为构造包含恶意脚本的网页，当用户使用受影响的 IE 版本浏览该页面时，脚本会自动将文件路径粘贴到上传控件，从而泄露敏感文件内容。"
published = "1998-10-01T04:00:00.000"
remediation = '应用 Microsoft 1998 年 11 月发布的安全更新 MS98-015（KB169245），该补丁修复了 Internet Explorer 4.01 中通过脚本化粘贴操作向文件上传控件注入文件名从而读取任意文件的漏洞。受影响版本包括 Windows 95、Windows 98、Windows NT 4.0、Windows 3.1 和 Windows NT 3.51 上的 IE 4.01 及 4.01 SP1。如无法立即安装补丁，应在 IE 的"安全"选项卡中将 Internet 区域和受限站点区域的 Active Scripting（VBScript 和 JScript）设置为"禁用"，并重新启用"提交非加密表单数据"的警告提示，以防止脚本在未经用户确认的情况下提交文件内容。最终建议升级到更高版本的 Internet Explorer 或更换为现代浏览器以彻底消除该风险。'
score = 2.6
severity = "LOW"
sources = [
    "cve",
    "avd",
]
title = "Microsoft Internet Explorer 4.01 不受信任脚本粘贴任意文件读取漏洞"
updated = "2026-06-16T21:49:13.733"

