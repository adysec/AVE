[basic]
description = "深信服SSL VPN的管理后台存在任意用户添加漏洞。攻击者可通过向/cgi-bin/php-cgi/html/delegatemodule/HttpHandler.php接口发送特制POST请求，利用User控制器中的AddUser操作绕过身份验证机制，在未授权情况下直接创建VPN用户账户。成功利用该漏洞可导致攻击者获得目标VPN系统的管理访问权限，进一步控制内网资源。该漏洞危害等级严重，影响深信服SSL VPN全系列产品，建议用户及时升级至安全版本或联系厂商获取修复补丁。"
published = "0717"
remediation = "立即将深信服 SSL VPN 设备升级至 M6.3 R1 及以上版本，或安装官方发布的最新安全补丁。如暂无法升级，可登录设备在「系统设置→系统配置→访问控制」中将管理接口绑定到非公网 IP，并在防火墙上限制仅可信源 IP 访问 VPN 设备的 /cgi-bin/ 路径以降低风险。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "深信服 VPN 任意用户添加漏洞"
updated = "0717"

