[basic]
description = "Xyplex terminal server 6.0.1S1 及可能其他版本存在安全绕过漏洞，远程攻击者无需认证即可通过输入 CTRL-Z 字符或问号（?）绕过密码提示符，直接获取未授权访问权限。该漏洞利用方式简单，攻击条件低，可导致敏感信息泄露或系统被非法控制，影响范围涉及使用该设备的网络环境。"
published = "1997-11-26T05:00:00.000"
remediation = "立即将 Xyplex terminal server 设备替换为仍在厂商支持生命周期内的终端服务器产品，从根本上消除风险。在完成替换前，在边界防火墙上严格限制可访问该终端服务器 TCP 端口（默认 23/Telnet）的源 IP 地址范围，仅允许受信任的管理网段访问，并在服务器端启用 TACACS+ 或 RADIUS 等外部认证机制作为密码验证的增强补充。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "Xyplex Terminal Server 安全绕过漏洞"
updated = "2026-06-16T21:50:03.183"

