[info]
author = "ave"
description = "Mandrake Linux 6.1-7.1 中 Apache mod_perl 默认配置将 /perl/ 设为可索引（Indexes），远程攻击者直接访问 /perl/ 即可获得目录文件列表，泄露脚本路径与文件名。发送 GET 请求至 /perl/ 目录，若响应包含 Index of /perl 等目录列表特征字符串则确认漏洞存在"
id = "POC-AVE-2000-0648"
name = "Mandrake Linux Apache mod_perl /perl/ 目录浏览漏洞 PoC"
severity = "medium"
tags = ["cve-2000-0883"]
vuln_id = [
    "CVE-2000-0883",
    "AVE-2000-0648",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/perl/"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["Index of /perl"]
