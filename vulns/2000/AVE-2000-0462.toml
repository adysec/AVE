[basic]
description = "Microsoft Windows 2000 Telnet 服务存在拒绝服务漏洞，远程未授权攻击者可通过向目标 Telnet 服务持续发送二进制零字节流触发该漏洞，导致 Telnet 服务进程崩溃，造成拒绝服务。该漏洞影响 Microsoft Windows 2000 操作系统的 Telnet 服务组件，CVSS 评分 5.0（AV:N/AC:L/Au:N/C:N/I:N/A:P），攻击复杂度低、无需身份认证、仅影响可用性。攻击者只需具备网络访问权限，即可通过发送持续的二进制零数据流触发服务崩溃，导致合法用户无法使用 Telnet 服务。Microsoft 已发布安全更新修复此漏洞，建议升级至修补版本或禁用不必要的 Telnet 服务。"
published = "2000-06-30T04:00:00.000"
remediation = "升级到包含 Telnet 服务修复程序的 Windows 2000 SP4 或更高版本；关闭或禁用 Telnet 服务；在防火墙上限制 Telnet 端口（端口 23）访问；配置 Windows 2000 阻止零字节序列或实现包过滤以过滤异常流量。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Microsoft Windows 2000 Telnet Server 拒绝服务漏洞"
updated = "2026-06-16T21:52:02.687"

