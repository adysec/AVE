[basic]
description = "Windows NT 及 Windows 2000 系统中，域用户或管理员账户使用了过于简单、可被轻易猜测的口令。攻击者可通过暴力破解或字典攻击方式，远程或本地尝试登录目标系统的域控制器或成员服务器，成功后可获取该账户的访问权限，进而可能提升至域管理员权限，控制整个 Windows 域环境。该漏洞影响所有未实施强口令策略的 Windows NT 4.0 及 Windows 2000 域环境。"
published = "1998-10-01T04:00:00.000"
remediation = "在域安全策略中启用密码必须符合复杂性要求并设置最小长度≥8位；通过组策略配置账户锁定阈值（5次无效登录锁定30分钟）；升级至Windows Server 2003以上版本以增强Kerberos认证；立即排查并重置所有域管理员账户的弱密码。"
score = 7.2
severity = "HIGH"
sources = ["epss"]
title = "Microsoft Windows NT/2000 域用户及管理员账户弱口令漏洞"
updated = "2026-06-16T21:48:32.317"

