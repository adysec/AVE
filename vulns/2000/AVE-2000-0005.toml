[basic]
description = "UnixWare 操作系统自带的 rtpm 程序存在缓冲区溢出漏洞，其在处理环境变量时未对输入长度进行边界校验。本地已登录的普通用户可通过设置超长的环境变量（如向环境传入异常长度的字符串）触发该溢出，覆盖栈上返回地址或相邻内存，从而以 root 等更高权限执行任意代码，实现本地权限提升。该漏洞影响运行 rtpm 程序的 UnixWare 系统本地用户，攻击前提为攻击者已获得目标系统的本地访问权限，利用方式依赖构造恶意环境变量启动该程序。"
published = "1999-12-30"
remediation = "厂商已发布补丁修复该漏洞，建议用户升级 UnixWare 至最新版本或安装对应安全补丁。如无法升级，应限制不可信用户对 rtpm 程序的本地访问权限，移除 rtpm 的 setuid 位以降低提权风险。"
score = 10.0
severity = "CRITICAL"
sources = ["cve"]
title = "UnixWare rtpm 程序缓冲区溢出漏洞"
updated = "2026-06-16"

