[basic]
description = "Linux cdwtools 093 及更早版本中存在缓冲区溢出漏洞，本地攻击者可通过向 cwdtools 程序发送特制的输入数据触发缓冲区溢出，从而获得 root 权限。该漏洞影响 S.u.S.E. Linux 6.1/6.2 系统，攻击者需要拥有本地访问权限，无需身份认证即可利用，CVSS 评分 7.2，危害等级高。目前已公开的利用代码可通过 ExploitDB 获取。"
published = "1999-10-22T04:00:00.000"
remediation = "升级 cdwtools 至 0.93 以上版本，或安装 SUSE 官方提供的安全补丁。由于 SUSE Linux 6.x 已停止支持，建议将系统升级至受支持版本。临时缓解措施可移除 cdwtools 相关二进制文件的 setuid 权限：`chmod u-s /usr/bin/cdw*`，限制本地普通用户以 root 权限执行该程序。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "SuSE Linux cdwtools 本地缓冲区溢出漏洞"
updated = "2026-06-16T21:51:33.543"

