[basic]
description = "SuSE Linux 的 pbpg 1.x 软件包中的 pg 和 pb 命令存在任意文件读取漏洞，由于程序未对文件路径参数进行充分过滤和权限检查，本地攻击者可通过向 pg 或 pb 命令传递特制文件路径参数，读取系统上任意文件内容，包括敏感配置文件、密码文件等。该漏洞影响 SuSE Linux 系统中安装了 pbpg 1.x 软件包的系统，攻击者需要拥有本地 shell 访问权限即可利用。"
published = "1999-08-21T04:00:00.000"
remediation = "立即升级 SuSE Linux 中的 pbpg 软件包至 2.0 或更高版本，该版本已修复 pg 和 pb 命令的任意文件读取漏洞。如无法升级，可卸载 pbpg 软件包（rpm -e pbpg），或通过文件权限限制 pg/pb 命令仅允许 root 用户执行（chmod 700 /usr/bin/pg /usr/bin/pb）。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "SuSE pbpg 1.x 任意文件读取漏洞"
updated = "2026-06-16T21:51:32.690"

