[basic]
description = "AppleShare IP 6.x 网络共享服务器在 HTTP Range 请求头的验证处理中存在安全漏洞。当攻击者向服务器发送格式错误的范围请求头时，服务器未能正确解析或验证请求边界，导致对共享文件夹中存储的敏感文件进行目录遍历和信息泄露。该漏洞允许任何远程未认证攻击者通过特制的无效范围请求获取目录列表、文件内容等系统敏感信息，可能暴露企业的商业机密和用户数据。 CVSS 评估显示此漏洞评分为 5.0，等级为中危，影响主要集中在保密性层面，对完整性和可用性无直接影响，攻击者无需特殊条件即可远程触发。 AppleShare IP 6.x 用户应立即更新到最新版本，并采取服务器访问控制措施以限制敏感资源泄露的风险。"
published = "2000-05-02T04:00:00.000"
remediation = "建议立即升级 AppleShare IP 到 6.3.1 或更高版本（Apple 已在 2001 年发布的 AppleShare IP 6.3.1 修复了该漏洞）。如暂时无法升级，可在 Web 服务器前部署反向代理或 WAF 规则拦截包含无效 Range 头的 HTTP 请求（如 Range: bytes=-1,-2 等异常范围），或在防火墙层面限制 Web 服务仅对可信 IP 开放 80/443 端口作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Apple AppleShare IP 6.x 信息披露漏洞"
updated = "2026-06-16T21:51:31.557"

