[basic]
description = "Knox Software Arkeia 备份产品的 nlservd 与 rnavc 组件存在缓冲区溢出漏洞。本地用户通过设置超长的 HOME 环境变量即可触发溢出，进而获得目标系统的 root 权限。该漏洞影响 Arkeia 4.0 版本，攻击条件要求攻击者具备本地登录权限或已有本地 shell 访问能力，利用方式简单直接，危害等级较高，可能导致备份服务器完全失陷。"
published = "1999-09-23T04:00:00.000"
remediation = "立即将 Knox Software Arkeia 备份产品升级至修复该溢出问题的 4.0 后续版本（建议 4.1 及以上，可从厂商获取补丁包）。在无法立即升级时，限制普通用户执行 nlservd 与 rnavc 的权限，使用 chmod 去除相关二进制文件的 setuid 位（chmod u-s /path/nlservd /path/rnavc），并通过系统审计限制对 HOME 环境变量的恶意赋值，作为临时缓解措施降低本地提权风险。"
score = 7.2
severity = "HIGH"
sources = ["cve"]
title = "Knox Software Arkeia 备份软件 本地缓冲区溢出漏洞"
updated = "2026-06-16T21:50:38.923"

