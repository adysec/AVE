[basic]
description = "Ollama for Windows 更新机制中存在路径遍历漏洞（CWE-22），由于程序在下载更新时未对 HTTP 响应头中的字段进行有效验证，直接将攻击者可控的头部值传递给 filepath.Join 函数拼接本地文件路径，攻击者可通过中间人攻击或篡改更新服务器响应，在 HTTP 响应头中注入 `../` 等路径遍历序列，将恶意可执行文件写入当前用户可访问的任意路径，包括 Windows 启动目录。结合 CVE-2026-42248（更新签名验证缺失漏洞），攻击者可实现无用户交互的自动恶意载荷投放与持久化代码执行。该漏洞影响 Ollama for Windows 0.12.10 至 0.17.5 版本，CVSS 评分 7.7，危害等级高。厂商截至漏洞披露时未提供官方修复版本。"
published = "2026-04-29T12:16:19.113"
remediation = '目前厂商未发布官方修复版本，建议持续关注 Ollama 官方发布页获取补丁。临时缓解措施：(1) 在防火墙或代理层面阻止 ollama.com 的更新服务器通信，防止恶意更新响应注入；(2) 为 Windows 启动目录 `%APPDATA%\Microsoft\Windows\Start Menu\Programs\Startup` 和更新暂存目录 `%APPDATA%\Ollama` 设置严格的 ACL 写入权限，仅允许 Administrators 组写入；(3) 使用进程监视工具（如 Sysmon）监控 ollama.exe 的异常子进程创建行为；(4) 如不使用自动更新功能，可通过组策略或注册表禁用 Ollama 的后台更新服务。'
score = 7.7
severity = "HIGH"
sources = ["hwpoc"]
title = "Ollama Ollama for Windows 更新路径遍历远程代码执行漏洞"
updated = "2026-06-17T10:47:34.550"

