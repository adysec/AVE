[basic]
description = "GNU C 库（glibc）2.2 之前版本的 manual/search.texi 文档未明确说明 tdelete 函数在删除树根节点时的返回值未定义，导致开发者误用该返回值而访问悬空指针。攻击者可利用此缺陷触发程序崩溃或信息泄露。该漏洞影响所有使用旧版 glibc 的 Linux 系统，CVSS 评分 9.8，危害等级严重。用户应升级至 glibc 2.2 及以上版本以修复此问题。"
published = "2020-10-06T13:15:13.087"
remediation = "升级 glibc 至 2.2 及以上版本以获取完整的 tdelete 返回值文档说明；应用程序中调用 tdelete 后须检查返回值是否为 NULL，避免直接解引用潜在悬挂指针。无法升级时，在调用 tdelete 删除树根节点后手动将指针置 NULL。"
score = 9.8
severity = "CRITICAL"
sources = ["redhat"]
title = "GNU glibc tdelete 未检查返回值导致悬垂指针访问漏洞"
updated = "2026-06-16T21:47:53.723"

