[basic]
description = "Website Pro 是一款网页制作软件，存在目录路径泄露漏洞。攻击者可通过构造恶意URL请求，诱使服务器返回内部目录路径信息，从而泄露网站实际物理路径布局。该漏洞导致攻击者能够映射服务器文件结构，便于进一步定位目标系统及其潜在弱点。漏洞影响范围包括 WebSite Pro 所有版本，攻击条件较为简单，只需发送包含特殊字符的URL即可触发。利用方式主要有两种：一是手动探测目录路径以收集系统信息，二是利用获取的路径信息为后续攻击提供目标协助，从而可能导致更严重的攻击事件。该漏洞已被证实为真实安全问题，但由于披露时间较早，具体影响范围和利用细节尚需进一步研究。微软官方并未发布针对此漏洞的安全补丁更新。相关的 CWE 分类为 NVD-CWE-Other。"
published = "2000-01-13T05:00:00.000"
remediation = '建议立即升级 Microsoft Site Server 3.0 至 Service Pack 3 或更高版本，或安装 Microsoft 安全公告 MS00-009 提供的安全补丁（KB252693）。若无法立即升级，可在 IIS 中配置 URLScan 过滤器拦截包含 ".." 或特殊编码的恶意 URL 请求，或在防火墙层面限制对 Web 服务器管理端口的访问作为临时缓解措施。'
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Website Professional WebSite Pro 目录泄露漏洞"
updated = "2026-06-16T21:50:55.843"

