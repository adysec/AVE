[basic]
description = "Microsoft Clip Art Gallery 5.0 存在缓冲区溢出漏洞，远程攻击者可通过向受害者发送特制的 CIL（剪贴画库）文件触发该漏洞，导致目标系统拒绝服务或执行任意命令。该漏洞源于程序在处理畸形 CIL 文件时未正确校验输入长度，造成缓冲区越界写入。攻击者需诱使用户打开恶意 CIL 文件才能成功利用，CVSS 评分 5.1，危害等级中危。"
published = "2000-03-06T05:00:00.000"
remediation = "安装微软安全公告 MS00-017 提供的更新补丁。由于 Microsoft Clip Art Gallery 5.0 属于 Office 2000 组件且已停止技术支持，建议升级到受支持的 Microsoft Office 版本（Office 2016 及以上），或在组策略中禁用 Clip Art Gallery 组件，避免打开来源不明的 .cil 剪贴画库文件。"
score = 5.1
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Microsoft Clip Art Gallery 5.0 缓冲区溢出漏洞"
updated = "2026-06-16T21:51:12.620"

