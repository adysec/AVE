[basic]
description = "Excite for Web Servers（EWS）存在远程命令执行漏洞，由于该软件在处理用户输入时未对 shell 元字符进行充分过滤，远程攻击者无需身份认证即可通过向目标服务器提交包含管道符、分号等 shell 特殊字符的特制 HTTP 请求，在服务器端以 Web 进程权限执行任意系统命令。该漏洞影响 Excite for Web Servers 所有版本，可导致服务器被完全控制，危害严重。"
published = "1998-01-01"
remediation = "立即停止使用已停止维护的 Excite for Web Servers (EWS)，迁移至现代 Web 服务器如 Apache HTTP Server 或 Nginx。若短期内无法迁移，应在 Web 应用层对所有用户输入进行严格过滤，禁止 `|` `;` `&` `$` `` ` `` 等 shell 特殊字符传入后端处理。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Excite Excite for Web Servers 远程命令执行漏洞"
updated = "1998-01-01"

