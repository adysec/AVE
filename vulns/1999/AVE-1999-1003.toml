[basic]
description = "O'Reilly WebSite 1.1e 及 Website Pro 2.0 存在命令注入漏洞。远程攻击者无需认证即可通过向 args.cmd 或 args.bat 脚本的参数中注入 shell 元字符（如 `|`、`;`、`` ` `` 等），以 Web 服务器进程权限在目标系统上执行任意系统命令。该漏洞允许攻击者完全控制受影响服务器，可能导致数据泄露、植入后门或横向移动。CVSS 评分 5.0，危害等级中等。"
published = "1999-02-16T05:00:00.000"
remediation = "升级 O'Reilly WebSite 至 2.1 以上版本。该产品已停止维护，建议迁移至 IIS 或 Apache 等现代 Web 服务器，并在应用层严格过滤输入中的 shell 元字符（如 | & ; $ `）。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "O'Reilly WebSite 远程命令执行漏洞"
updated = "2026-06-16T21:49:53.360"

