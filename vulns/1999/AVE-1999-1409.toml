[basic]
description = "OmniHTTPd Web 服务器版本 1.1 和 2.4 Pro 中的 imagemap.exe CGI 程序存在缓冲区溢出漏洞。该漏洞的原理是 imagemap.exe 在处理用户输入时未进行充分的边界检查，导致缓冲区溢出。未经身份认证的远程攻击者可向目标服务器的 imagemap.exe CGI 接口发送精心构造的超长请求参数，触发缓冲区溢出并覆盖程序返回地址，从而在目标服务器上执行任意系统命令，实现远程代码执行。该漏洞影响使用 OmniHTTPd 1.1 及 2.4 Pro 版本的 Windows Web 服务器环境，攻击者可借此完全接管服务器，危害等级为严重（CVSS 10.0）。"
published = "1999-10-22T04:00:00.000"
remediation = "立即删除或禁用 OmniHTTPd 中的 imagemap.exe CGI 组件，阻止攻击者利用缓冲区溢出执行远程命令。首选方案是将 Web 服务迁移至现代且持续维护的服务器软件（如 Nginx、Apache HTTP Server 或 Microsoft IIS），彻底淘汰已停止维护的 OmniHTTPd。若暂时无法迁移，需在 OmniHTTPd 配置中完全禁用 CGI 执行功能，并在防火墙层面限制对 Web 服务端口（默认 80）的外部访问，仅允许可信 IP 段连接。"
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "Omnicron OmniHTTPd CGI imagemap.exe 远程缓冲区溢出漏洞"
updated = "2026-06-16T21:49:23.620"

