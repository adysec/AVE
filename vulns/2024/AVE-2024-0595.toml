[basic]
description = "Das U-Boot 的 SquashFS 文件系统实现中的 sqfs_size 函数存在栈消耗漏洞（CWE-674），由于在处理符号链接时未限制递归深度，攻击者可通过向目标设备加载包含深度嵌套符号链接的恶意 SquashFS 文件系统镜像，触发无限递归导致栈溢出，造成系统拒绝服务。该漏洞需要物理接触目标设备才能利用，影响 U-Boot 2025.01-rc1 之前的所有版本。"
published = "2025-02-18T23:15:09.800"
remediation = "升级 U-Boot 至 2025.01 或更高版本（该漏洞在 2025.01-rc1 之前存在）。Debian 11 用户请执行 `apt-get update && apt-get upgrade u-boot` 安装 DLA-4150-1 安全更新。若无法升级，可在加载 squashfs 文件系统前校验其来源可信性，避免加载包含深层符号链接嵌套的恶意 squashfs 镜像。嵌入式设备用户应同步更新厂商提供的 U-Boot 补丁包。"
score = 2
severity = "LOW"
sources = ["msrc"]
title = "DENX Das U-Boot squashfs 文件系统栈消耗拒绝服务漏洞"
updated = "2026-06-17T08:13:28.190"

