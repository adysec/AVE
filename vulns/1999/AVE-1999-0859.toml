[basic]
description = "该漏洞源于 OpenSource Application 的 WWW 服务器未能在受限制的文件系统中运行（如未使用 chroot 实现）。攻击者无需身份验证即可直接访问服务器的文件系统，这导致攻击者能够浏览和获取系统内所有关键文件和敏感信息，如配置文件、密码数据库、账号凭证等。受影响系统涵盖各种运行 OpenSource Application 的 Web 服务器，由于此类服务器广泛应用于众多企业和机构，因此整体影响范围极大。攻击者仅需向目标服务器发送简单 HTTP 请求即可触发漏洞，操作简单且风险较低，适合大规模扫描利用。攻击者通过获取系统关键文件，可进一步获取权限提升、利用其他漏洞、破坏系统完整性等高级恶意行为。该漏洞因其极端危害性获得 CVSS 满分 10.0 分，被列为严重安全事件，亟需系统重新构建安全沙箱环境，确保 Web 服务隔离和文件系统安全控制。"
published = "1999-01-01T05:00:00.000"
remediation = "将Web服务器进程限制在chroot jail或容器环境中运行，配置DocumentRoot限制文档根目录，禁用FollowSymLinks选项防止目录遍历，以最小权限用户（如www-data）运行Web服务进程，禁用不必要的模块（如mod_autoindex），配置open_basedir限制PHP脚本访问路径，部署WAF规则阻断目录遍历攻击Payload（如../等），定期审计Web目录权限确保最小权限原则。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "开源应用 WWW 服务器文件系统信息泄露漏洞"
updated = "2026-06-16T21:48:41.170"

