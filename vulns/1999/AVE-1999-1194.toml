[basic]
description = 'Microsoft Internet Explorer 4.01 和 5.0 中的多个 Kodak/Wang ActiveX 控件（包括 Image Edit、Image Annotation、Image Scan、Thumbnail Image、Image Admin、HHOpen、Registration Wizard 和 IE Active Setup 等 imgedit.ocx、imgscan.ocx、regwizc.dll、setupctl.dll 组件）被错误地标记为"可安全用于脚本调用"（Safe for Scripting）。该漏洞的根本原因在于这些控件本不应被脚本任意调用，却被赋予了脚本安全标志，导致远程攻击者可诱使受害者访问恶意网页，通过网页中的脚本代码调用这些控件，从而在目标系统上创建和修改任意文件并执行任意命令。攻击者无需身份认证，仅需受害者使用存在漏洞的 IE 版本浏览精心构造的恶意页面即可触发，可能造成缓冲区溢出，进而完全控制受害主机。该漏洞影响使用 IE 4.01 及 5.0 的 Windows 系统，CVSS 评分 5.1，危害等级中等。'
published = "1999-09-10T04:00:00.000"
remediation = '升级 Internet Explorer 至 5.0 SP1 或更高版本，并安装 Microsoft 安全公告 MS99-037 补丁。补丁将为 imgedit.ocx、imgscan.ocx、imgthumb.ocx、imgadmin.ocx、hhopen.ocx、regwizc.dll、setupctl.dll 等受影响 ActiveX 控件设置 Kill Bit 以阻止其加载。同时将 IE 安全设置中"允许标记为可安全执行脚本的 ActiveX 控件"选项设为"禁用"。如暂无法打补丁，可通过注册表为上述控件设置 Kill Bit：在 HKEY_LOCAL_MACHINE\Software\Microsoft\Internet Explorer\ActiveX Compatibility 下为各控件 ClassID 创建 Compatibilty Flags 值为 0x00000400 的 DWORD 值。推荐尽快迁移至现代浏览器以彻底消除风险。'
score = 5.1
severity = "MEDIUM"
sources = ["cve"]
title = "Microsoft Internet Explorer ActiveX控件 远程代码执行漏洞"
updated = "2026-06-16T21:50:45.250"

