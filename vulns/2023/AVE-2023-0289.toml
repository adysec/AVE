[basic]
description = "泛微 E-Office v9.5 系统的 flow_xml.php 文件存在 SQL 注入漏洞，攻击者可在未经身份认证的情况下通过构造特制的 HTTP 请求参数注入恶意 SQL 语句，从而操纵后端数据库执行任意查询，导致敏感数据泄露、管理员权限被窃取甚至服务器被远程控制。该漏洞影响泛微 E-Office v9.5 版本，攻击条件低，仅需网络可达即可利用，危害严重。"
published = "08.08"
remediation = "建议立即升级泛微 E-Office 至 v9.5 官方最新补丁版本，通过后台「系统管理-系统升级」在线更新或从泛微官网下载安全补丁包覆盖安装。若无法立即升级，可在 WAF 或应用层对 flow_xml.php 接口的 sql 等参数进行严格过滤，拦截含 UNION、SELECT、单引号等 SQL 注入特征的请求，并对数据库账户采用最小权限原则以限制注入危害。"
score = 5
