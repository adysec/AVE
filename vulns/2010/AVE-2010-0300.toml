[basic]
description = "Red Hat JBoss 企业应用平台（JBoss EAP）4.2 至 4.2.0.CP09 之前版本及 4.3 至 4.3.0.CP08 之前版本中的 Web 控制台（web-console）存在访问控制缺陷，仅对 GET 和 POST 方法执行权限检查，未对其他 HTTP 方法（如 PUT、DELETE、OPTIONS 等）进行鉴权。远程攻击者无需认证即可通过发送特制的非 GET/POST 请求绕过访问控制，获取服务器敏感配置信息，可能导致进一步攻击。该漏洞 CVSS 评分 7.5，危害等级高。"
published = "2010-04-28T22:30:00.793"
remediation = "升级 JBoss EAP 4.2 至 4.2.0.CP09 及以上版本，或 4.3 至 4.3.0.CP08 及以上版本。如无法立即升级，可在反向代理或 Web 服务器层面（如 Apache/httpd 的 LimitExcept 指令）仅允许 GET/POST 方法访问 /web-console 路径，并限制该路径的源 IP 白名单作为临时缓解措施。"
score = 7.5
severity = "HIGH"
sources = ["kev"]
title = "Red Hat JBoss Enterprise Application Platform Web Console 信息泄露漏洞"
updated = "2026-06-16T23:18:22.453"

