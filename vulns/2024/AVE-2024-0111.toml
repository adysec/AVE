[basic]
description = "建文工程管理系统在 BusinessManger.ashx 接口处存在 SQL 注入漏洞。该系统处理 AppInterface/Business/BusinessManger.ashx 的 POST 请求时，未对 method 与 content 参数做充分过滤与参数化，攻击者可在 content 参数中插入恶意 SQL 语句。攻击者可构造含 union select、HASHBYTES 等 payload 的请求，以未授权方式读取或篡改数据库内容，甚至提取管理员凭证等敏感信息。任何可访问该系统 Web 服务的远程用户均无需身份认证即可发起攻击，危害程度较高。"
published = "0725"
remediation = "立即升级建文工程管理系统至厂商发布的安全修复版本（联系厂商获取包含 BusinessManger.ashx 参数过滤与预编译修复的更新包）。临时缓解措施：在 Web 应用防火墙（WAF）中增加对 /AppInterface/Business/BusinessManger.ashx 的 POST 请求参数过滤，拦截含单引号、UNION SELECT、HASHBYTES 等 SQL 关键字与注释符的恶意输入；同时对 method、content 等参数使用参数化查询或白名单校验，避免拼接 SQL。"
score = 5
severity = "MEDIUM"
