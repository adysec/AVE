[basic]
description = "WinNuke 是 Microsoft Windows 95/NT 系列操作系统 NetBIOS 协议实现中的拒绝服务漏洞。远程攻击者无需身份认证，即可向目标系统的 NetBIOS 端口（139/TCP）发送特制的带外（Out-of-Band，OOB）数据包，触发操作系统内核无法正确处理异常网络数据，导致系统崩溃并显示蓝屏（BSOD）。该漏洞影响 Windows 3.11、Windows 95、Windows NT 3.5.1 及 Windows NT 4.0 等早期版本，是互联网早期最知名的拒绝服务攻击之一。攻击者只需掌握目标 IP 地址即可发起攻击，利用门槛极低。"
published = "1997-07-01T04:00:00.000"
remediation = '建议在防火墙或路由器上阻止入站 TCP 端口 137-139 和 445，禁用 NetBIOS over TCP/IP 服务（网络连接属性中取消"Microsoft 网络的文件和打印机共享"绑定）。由于 Windows 3.11/95/NT 4.0 已停止支持，官方不再提供安全更新，根本解决方案是升级到受支持的 Windows 版本或迁移至现代操作系统。'
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Microsoft Windows NetBIOS OOB 数据包远程拒绝服务漏洞 (WinNuke)"
updated = "2026-06-16T21:47:42.847"

