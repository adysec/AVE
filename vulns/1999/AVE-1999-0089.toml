[basic]
description = "SGI IRIX 5.3 及 6.2 系统中的 ordist 命令存在缓冲区溢出漏洞，本地攻击者可向 ordist 命令提交特制请求触发缓冲区越界读取，从而获取系统 root 权限。该漏洞影响 SGI IRIX 5.3 和 6.2 版本，利用前提是攻击者拥有本地系统访问权限，属于本地权限提升漏洞。"
published = "1997-07-16T04:00:00.000"
remediation = "安装 SGI 于 1997 年发布的 ordist 安全补丁（SGI Security Advisory 19970701），或升级到 IRIX 6.3 及以上版本。如无法升级，建议移除 ordist 的 setuid root 权限：chmod u-s /usr/sbin/ordist，并限制仅授信用户可本地登录系统。"
score = 8.4
severity = "HIGH"
sources = ["exploitdb"]
title = "SGI IRIX ordist 本地权限提升漏洞"
updated = "2026-06-16T21:47:23.303"

