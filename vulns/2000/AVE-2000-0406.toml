[basic]
description = "Cart32、QuickCommerce 等多款网上购物车应用存在隐藏表单字段未受保护的安全漏洞。远程攻击者可通过修改 HTML 表单中的隐藏字段值（如商品价格、数量、订单金额等敏感信息）来操纵交易数据，实现低价购买或篡改订单内容。该攻击无需身份认证，仅需向目标服务器发送特制的 HTTP 请求即可实施。受影响版本包括 Cart32 2.5a/3.0、QuickCommerce 2.5/3.0、Shop Express 1.0 及 StoreCreator 3.0 等，CVSS 评分 7.5，危害等级高。"
published = "2000-02-01T05:00:00.000"
remediation = "升级到已修复隐藏表单字段信任问题的软件版本；若厂商已停止支持，应迁移至仍受支持的购物车系统。核心修复措施为服务端对所有表单提交参数（包括隐藏字段）进行完整性校验，将价格/数量等敏感数据存储于服务端 Session 而非 HTML 隐藏字段，防止客户端篡改。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "Cart32/QuickCommerce/Shop Express/StoreCreator 购物车系统隐藏表单字段信息修改漏洞"
updated = "2026-06-16T21:51:04.510"

