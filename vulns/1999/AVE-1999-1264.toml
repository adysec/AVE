[basic]
description = "UNIX 域套接字的访问权限在 Solaris 2.x、SunOS 4.x 以及 4.4BSD 之前的 BSD 衍生操作系统中未被正确强制执行，导致本地用户可连接到该套接字，进而可能干扰或控制使用该套接字的程序操作。该漏洞影响 FreeBSD 3.1、Solaris 2.6 等系统，需要本地访问权限，CVSS 评分 2.1，危害等级低。由于年代久远，相关系统已不再维护，建议升级至支持操作系统。"
published = "1997-05-17T04:00:00.000"
remediation = "升级到 Solaris 7 及以上版本（Solaris 8 后已修正此问题），或升级 FreeBSD 到 4.0 以上。对于无法升级的老系统，将 UNIX domain socket 文件放置于权限设为 0700 的专用目录中，避免放在 /tmp 等全局可读位置，利用目录权限限制未授权访问。"
score = 2.1
severity = "LOW"
sources = ["epss"]
title = "Sun Solaris FreeBSD UNIX 域套接字访问权限忽略漏洞"
updated = "2026-06-16T21:50:21.837"

