[basic]
description = "Microsoft IIS 3.0/4.0/5.0 的管理脚本存在输入验证缺陷，远程攻击者可通过访问缺少特定参数的目录浏览脚本，导致 IIS 服务消耗大量系统资源并停止响应，造成拒绝服务。该漏洞影响 IIS 3.0 至 5.0 版本，攻击者无需认证即可远程触发，CVSS 评分 5.0，属于中危漏洞。建议禁用不必要的管理脚本或升级至更高版本。"
published = "2000-07-14T04:00:00.000"
remediation = "建议立即升级至 IIS 6.0 或更高版本（Windows Server 2003 及以上），这些版本已彻底移除该管理脚本组件。若无法升级，请在 IIS 管理器中删除 /iisadmin/ 虚拟目录或移除其匿名访问权限，并在防火墙层面限制对 80/443 端口的来源 IP 作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Microsoft IIS Administrative Script 拒绝服务漏洞"
updated = "2026-06-16T21:52:08.957"

