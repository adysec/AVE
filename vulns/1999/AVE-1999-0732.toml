[basic]
description = "TeamShare TeamTrack 3.0 的 Web 接口存在目录遍历漏洞，远程攻击者可在未经身份认证的情况下通过构造包含 ../ 等路径序列的 HTTP 请求，突破 Web 根目录限制读取服务器上的任意文件。该漏洞源于 CGI 程序对用户提交的路径参数未进行规范化与合法性校验，攻击条件仅需能访问 TeamTrack 的 Web 服务端口，成功利用后可泄露配置文件、源代码及系统敏感文件，造成信息泄露。"
published = "1999-10-01T04:00:00.000"
remediation = "TeamShare TeamTrack 3.0 已停止支持且无官方补丁，建议立即迁移至受支持的缺陷跟踪系统。如短期内无法下线，应在 Web 服务器层面对所有请求进行路径过滤，禁止包含 ..、%2e%2e 等遍历字符，并限制 Web 服务进程仅能访问站点根目录内的文件，同时将其置于反向代理或 WAF 之后禁止直接暴露公网。"
score = 5.0
severity = "MEDIUM"
sources = ["avd"]
title = "TeamShare TeamTrack 3.0 目录遍历漏洞"
updated = "2026-07-17T00:00:00Z"

