[basic]
description = "wwwcount 的 Count.cgi 程序存在缓冲区溢出漏洞，远程攻击者可通过向目标 Web 服务器发送特制的 HTTP 请求触发该漏洞，导致任意命令执行。该漏洞影响 wwwcount 2.3 及更早版本，攻击无需身份认证，危害等级高，CVSS 评分 7.5。通过向 Count.cgi 传入超长参数即可触发栈溢出，从而实现远程代码执行或拒绝服务。"
published = "1997-11-05T05:00:00.000"
remediation = "升级 wwwcount 至 2.4 及以上版本，或从 CGI 目录移除 Count.cgi 脚本。若无法升级，在 Web 服务器层面添加输入过滤规则，限制对 Count.cgi 的参数长度（如 Apache ModSecurity 限制 QUERY_STRING 不超过 256 字节），并确保以最低权限运行 CGI 程序。同时可在 Web 服务器访问控制中限制 Count.cgi 仅允许信任的来源 IP 调用，降低被远程利用的风险。"
score = 7.5
severity = "HIGH"
sources = ["exploitdb"]
title = "Muhammad A. Muquit wwwcount 远程缓冲区溢出漏洞"
updated = "2026-06-16T21:47:22.013"

