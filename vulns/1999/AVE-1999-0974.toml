[basic]
description = "CVE-1999-0653 涉及 Unix 系统中与 NIS+（网络信息服务增强版）相关的组件服务存在远程安全漏洞。该漏洞的原理是目标主机上运行了存在安全隐患的 NIS+ 组件服务，攻击者可在未经过身份认证的情况下，通过网络远程探测并连接该服务，进而获取敏感的系统信息服务（如用户、主机名映射等），为后续提权或横向移动创造条件。其影响范围涵盖运行 NIS+ 服务的各类 Unix 及类 Unix 系统，攻击条件为攻击者能够与目标的 NIS+ 服务端口建立网络连接，利用方式主要是远程枚举或滥用该服务暴露的信息以辅助进一步入侵。"
published = "1999-01-01T05:00:00.000"
remediation = "在受影响的 Unix 主机上停止并禁用 NIS+ 服务（执行 `svcadm disable nisplus` 或注释 `/etc/nsswitch.conf` 中 nisplus 条目后停用 rpc.nisd），将 NIS+ 端口（如 32771 等）及 SunRPC 端口映射器 111 端口通过防火墙/iptables 仅对可信管理网段开放，改用更安全的 LDAP 目录服务替代 NIS+，并升级操作系统到厂商已移除 NIS+ 默认启用的最新补丁版本（如 Solaris 10 最新 Recommended Patch Cluster 或迁移至 Solaris 11）。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "Unix 操作系统 NIS+ 组件服务远程安全漏洞"
updated = "2026-06-16T21:48:47.190"

