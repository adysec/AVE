[basic]
description = "NAI Net Tools PKI Server 1.0 的 strong.exe 程序存在目录遍历漏洞。远程攻击者无需身份认证，通过向注册服务器发送包含 `../` 路径遍历序列的特制 HTTPS 请求，即可突破路径限制读取服务器上的任意文件。该漏洞影响 HotFix 3 之前的所有版本，可能导致敏感信息泄露，如配置文件、私钥等。攻击者仅需能够访问目标服务器的 HTTPS 端口即可实施攻击，利用门槛较低。"
published = "2000-10-20T04:00:00.000"
remediation = "立即升级 NAI Net Tools PKI Server 至 HotFix 3 及以上版本，该补丁修复了 strong.exe 在处理 HTTPS 请求时的路径遍历缺陷。若产品已停止支持无法获取补丁，建议在 Web 应用防火墙或反向代理层面添加访问规则，拦截包含 `../` 等路径遍历特征的请求，并限制 enrollment server 的访问来源 IP。同时迁移至受支持的替代 PKI 解决方案。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "NAI Net Tools PKI Server 目录遍历漏洞"
updated = "2026-06-16T21:52:22.920"

