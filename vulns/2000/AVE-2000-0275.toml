[basic]
description = 'UltraBoard 1.6 的 UltraBoard.pl 及 UltraBoard.cgi CGI 脚本存在目录遍历漏洞。远程攻击者无需身份认证即可通过在路径名字符串中插入 ".."（点点）并以空字节结尾的方式，绕过访问限制读取服务器上的任意文件。该漏洞影响 UltraBoard 1.6 版本，CVSS 评分 5.0，危害等级中等。受影响的系统包括使用该 CGI 脚本的 Web 服务器，攻击者可利用此漏洞窃取敏感配置文件或系统文件。'
published = "2000-05-03"
remediation = "立即升级 UltraBoard 至 1.7 或更高版本，该版本已修复目录遍历漏洞。在 Web 服务器（Apache/IIS）中配置 URL 重写规则，拦截包含 `../` 及空字节（%00）的请求路径。若无法升级，建议删除或禁用 `UltraBoard.pl` 和 `UltraBoard.cgi` 脚本，或通过 Web 服务器访问控制限制 CGI 目录的执行权限。"
score = 5.0
severity = "MEDIUM"
sources = ["cve"]
title = "UltraScripts UltraBoard 1.6 目录遍历漏洞"
updated = "2026-06-16"

