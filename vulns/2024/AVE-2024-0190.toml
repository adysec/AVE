[basic]
description = "同鑫科技 EHR 人力资源管理系统全系列版本存在 SQL 注入漏洞。该系统在处理用户请求时未对输入参数进行充分的过滤与转义，导致攻击者可将恶意的 SQL 语句拼接进数据库查询逻辑中。未经过身份认证的远程攻击者只需向存在漏洞的接口发送特制的 HTTP 请求即可利用该缺陷，进而读取、篡改乃至删除后台数据库中的敏感数据，包括但不限于员工个人信息、薪资与账号凭证。该漏洞影响同鑫科技 EHR 系统全系列产品，攻击者无需任何权限即可远程发起攻击，危害较大，建议尽快排查并升级至官方修复版本。"
published = "0722"
remediation = "建议立即联系同鑫科技官方获取 EHR 系统最新安全补丁并升级至最新版本，临时缓解可在 WAF 配置 SQL 注入防护规则拦截恶意 SQL 语句，同时在应用层启用参数化查询/预编译语句替代拼接 SQL，并限制数据库账号最小权限原则。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "同鑫科技 EHR 系统 SQL 注入漏洞"
updated = "0722"

