CVE-1999-0891 is about Microsoft Internet Explorer 5's "download behavior" feature that allows a remote attacker to read arbitrary files via a server-side redirect.
1. Description: "The 'download behavior' in Internet Explorer 5 allows remote attackers to read arbitrary files via a server-side redirect."
2. CVSS v2.0: Base Score 5.0 MEDIUM, Vector: (AV:N/AC:L/Au:N/C:P/I:N/A:N)
3. CWE: CWE-94 (Improper Control of Generation of Code ('Code Injection'))
4. Published: 09/01/1999
5. References: Multiple including MS99-040 bulletin
6. Affected: Microsoft Internet Explorer 5.0
Now let me fix the issues:
1. description: Need more technical details. The vulnerability is in IE5's "download behavior" feature (a DHTML behavior). When a server-side redirect occurs during a download initiated by the `download` behavior, IE5 doesn't properly validate the redirected target, allowing arbitrary file reads from the local filesystem. The attack vector involves a malicious website using the `download` behavior to trigger a download, and the server responds with a redirect to a `file://` URL, causing IE to read and expose local files.
2. remediation: Need specific actionable steps. Since IE5 is EOL, the primary fix is to upgrade. But MS99-040 was the official patch. Let me provide specific remediation.
3. severity/score: CVSS v2.0 score is 5.0 MEDIUM. The current TOML has score=5, severity="MEDIUM" - that's correct.
