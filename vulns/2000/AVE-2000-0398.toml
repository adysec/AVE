[basic]
description = "Allaire ColdFusion ClusterCATS 存在 URL 重定向信息泄露漏洞。当系统执行 HTML 重定向操作时，会错误地将过时的查询字符串参数附加到重定向目标 URL 中，导致敏感信息（如会话令牌、数据库凭证等）被泄露给第三方站点。攻击者无需特殊权限，通过构造特定的重定向请求即可触发该漏洞。CVSS 评分 2.6，危害等级低。"
published = "2000-05-08T04:00:00.000"
remediation = "Allaire ClusterCATS 已于 2000 年代停止维护，建议立即迁移至受支持的 Web 服务器负载均衡方案（如 Nginx Plus、HAProxy 或 F5 BIG-IP），并禁用 ClusterCATS 的 URL 重定向功能。如无法立即迁移，可在 Web 服务器层面配置 URL 重写规则过滤掉查询字符串中的残留参数，并限制敏感信息通过重定向传递。"
score = 2.6
severity = "LOW"
sources = ["epss"]
title = "Allaire ClusterCATS URL重定向漏洞"
updated = "2026-06-16T21:51:36.003"

