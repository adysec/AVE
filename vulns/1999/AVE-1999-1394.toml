[basic]
description = 'Check Point Firewall-1 在处理用户自定义对象时未能正确识别 Mail、auth、time 等受限关键字，导致这些对象被创建后，相关防火墙规则会默认使用 "ANY" 地址而非预期的限制范围。远程攻击者可利用此缺陷绕过访问控制策略，访问比管理员预期更多的系统资源，造成安全边界失效。该漏洞影响 Check Point Firewall-1 多个版本，CVSS 评分 7.5，危害等级高。'
published = "1998-05-11T04:00:00.000"
remediation = "立即将所有名为保留关键字（Mail、auth、time、Short、Long、Alert、Account、UserDefined、spoof 等）的用户定义网络对象和服务对象重命名为其他非保留名称，然后重新安装安全策略使更改生效。同时建议升级至 Check Point Firewall-1 后续版本，新版本已内置禁止将保留关键字用作对象名的防护机制。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "Check Point Firewall-1 用户定义对象受限关键字处理安全限制绕过漏洞"
updated = "2026-06-16T21:49:56.473"

