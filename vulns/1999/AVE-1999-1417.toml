[basic]
description = "Id Software Quake Server 2 存在拒绝服务漏洞，远程攻击者可通过伪造 UDP 数据包并将源地址设置为 127.0.0.1（本地回环地址），使目标服务器尝试连接自身而导致服务崩溃或不可用。该漏洞影响 Quake 2 服务器，攻击者无需任何认证即可远程触发，且无需额外权限，危害等级中等。"
published = "1997-12-24T05:00:00.000"
remediation = "升级到 Quake 2 服务器 3.20 或更高版本，该版本已修复伪造 UDP 源地址导致的自我连接问题。如无法升级，可在服务器所在网络边界部署防火墙规则，丢弃源地址为 127.0.0.1 的外部入站 UDP 数据包，或使用 iptables 添加规则：iptables -A INPUT -p udp --dport 27910 -s 127.0.0.1 -j DROP。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Id Software Quake Server 2 拒绝服务漏洞"
updated = "2026-06-16T21:49:59.753"

