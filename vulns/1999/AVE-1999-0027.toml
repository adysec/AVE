[basic]
description = "Network Flight Recorder (NFR) 2.0.2-Research 的 webd 组件存在缓冲区溢出漏洞，远程攻击者无需身份认证即可向目标发送特制请求触发该漏洞，导致攻击者在受影响系统上执行任意命令。该漏洞影响 NFR 2.0.2-Research 版本，CVSS 评分 7.5，危害等级高，建议受影响的用户及时升级至最新版本或应用厂商提供的补丁。"
published = "1999-02-16T05:00:00.000"
remediation = "升级 NFR 至 2.0.3 或更高版本，该版本已修复 webd 组件缓冲区溢出漏洞。如无法升级，在防火墙上限制对 webd 服务端口（默认 TCP 8080）的访问，仅允许可信管理 IP 连接，同时建议迁移至受支持的现代 IDS/IPS 解决方案替代已停止维护的 NFR 产品。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "NFR Network Flight Recorder webd 缓冲区溢出远程代码执行漏洞"
updated = "2026-06-16T21:48:15.687"

