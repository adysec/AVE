[basic]
description = "FreeBSD 系统下运行的 Seyon 2.1 rev. 4b（i586-Linux 版本）串口通信程序存在本地权限提升漏洞。该程序在处理 `-emulator` 命令行参数时未进行充分校验与边界检查，本地普通用户可通过在参数中指定恶意构造的程序路径来诱导 Seyon 以更高权限执行攻击者控制的代码。成功利用该漏洞后，本地用户能够获取特权账户权限，进而完全控制受影响系统。该漏洞仅影响安装了存在缺陷版本 Seyon 的本地主机，攻击前提条件是攻击者需拥有目标系统的本地登录权限。"
published = "1999-11-08T05:00:00.000"
remediation = "升级到已修复该问题的 FreeBSD 系统补丁版本（1999 年 11 月后的 seyon 修正包），或执行 `chmod u-s $(which seyon)` 移除 seyon 的 setuid(root) 位以消除本地提权条件。若无法立即升级，应限制 seyon 仅由可信用户通过 sudo 运行，并移除不可信用户的执行权限。"
score = 4.6
severity = "MEDIUM"
sources = ["epss"]
