[info]
author = "AVE"
description = "检测 Solaris 7.0 DMI 组件 dmispd 守护进程是否存在。dmispd 在处理特制 MIF 文件时存在栈缓冲区溢出漏洞，本地攻击者可通过 dmi_cmd 向 /var/dmi/db 提交恶意 MIF 文件触发崩溃，造成拒绝服务。"
id = "POC-AVE-2000-0066"
name = "Solaris 7.0 DMI dmispd Buffer Overflow DoS PoC"
severity = "critical"
tags = ["ave-2000-0066"]
vuln_id = [
    "CVE-2000-0032",
    "AVE-2000-0066",
]

[poc]
logic = "all"

[[poc.requests]]
path = "/usr/sbin/dmispd"
protocol = "file"

[[poc.requests.matchers]]
expect = true
part = "body"
regex = ".+"
type = "regex"
