[basic]
description = "Solaris 7.0 及 8.0 系统中的 Xsun X 服务器存在缓冲区溢出漏洞，本地攻击者可通过向 -dev 参数传递超长字符串触发该漏洞，导致攻击者获取 root 权限。该漏洞利用条件为攻击者需拥有本地系统访问权限，通过精心构造的参数输入即可完成提权操作，危害等级高危。"
published = "2000-04-24T04:00:00.000"
remediation = "安装 Sun 官方提供的 X11 安全补丁（Solaris 7 对应补丁 ID 106900，Solaris 8 对应补丁 ID 108652）。如无法安装补丁，作为临时缓解措施，可移除 Xsun 的 SUID 权限（chmod -s /usr/openwin/bin/Xsun）以阻止本地用户通过该漏洞获取 root 权限。"
score = 7.2
severity = "HIGH"
sources = ["epss"]
title = "Sun Solaris Xsun 缓冲区溢出漏洞"
updated = "2026-06-16T21:51:30.407"

