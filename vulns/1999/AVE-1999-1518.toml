[basic]
description = "Royal DaVinci PIM 软件在存储数据时使用 Microsoft Access 的 .mdb 文件，但未对文件进行有效的密码保护。本地攻击者可通过直接使用其他应用程序（如 Microsoft Access）打开 .mdb 文件，绕过密码验证读取其中敏感数据。该漏洞影响 Royal DaVinci 系列产品，攻击者需具备本地文件访问权限，CVSS 评分 2.1，危害等级低。"
published = "1999-01-01T05:00:00.000"
remediation = "立即将 Royal daVinci 数据库文件（.mdb）存放目录的 NTFS 权限设置为仅允许授权用户访问，移除 Everyone 和 Users 组的读取权限。同时启用 Access 数据库文件密码保护（工具 → 安全 → 设置数据库密码），并升级到官方修复此问题的最新版本。如已停止维护，建议迁移至支持加密存储的替代 PIM 方案。"
score = 2.1
severity = "LOW"
sources = ["avd"]
title = "Royal daVinci PIM 数据库未授权访问漏洞"
updated = "2026-06-16T21:50:25.463"

