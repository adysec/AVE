[basic]
description = "SGI IRIX 6.2 系统中的 libgl.so 库存在缓冲区溢出漏洞，本地用户可通过向 HOME 环境变量传入超长字符串，触发 gmemusage 和 gr_osview 等程序中的栈溢出，从而获得 root 权限。该漏洞影响 SGI IRIX 6.2 版本，利用条件为攻击者拥有本地账户，无需交互即可完成提权攻击。"
published = "2000-10-20T04:00:00.000"
remediation = "该漏洞影响已停止技术支持逾二十年的 SGI IRIX 6.2 操作系统。原始修复方案为安装 SGI 官方安全补丁或升级至修复版本。由于 IRIX 全系列已于 2006 年终止支持且 SGI 公司已不复存在，当前唯一有效的安全措施是将业务和数据迁移至受支持的现代操作系统，同时在过渡期间严格限制本地用户登录权限、移除 gmemusage 和 gr_osview 的 setuid 位作为临时缓解。"
score = 7.2
severity = "HIGH"
sources = ["exploitdb"]
title = "SGI IRIX libgl.so 本地缓冲区溢出漏洞"
updated = "2026-06-16T21:52:29.680"

