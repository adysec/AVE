[basic]
description = "IRIX 6.4 及更早版本中 Korn Shell (ksh) 的 suid_exec 程序存在缓冲区溢出漏洞，本地攻击者可通过向该 setuid 程序传入特制参数触发缓冲区溢出，从而获取 root 权限。该漏洞影响 SGI IRIX 6.x 及更早版本操作系统，CVSS 评分 7.2，危害等级高。"
published = "1998-04-08T04:00:00.000"
remediation = "SGI 已于 1999 年发布 IRIX 6.5 及后续安全补丁修复此漏洞，建议立即升级至 IRIX 6.5.22 及以上版本。如无法升级，可通过 `chmod 4555 /usr/lib/ksh/suid_exec` 移除 suid_exec 的 setuid 位，禁止普通用户以 root 权限执行该程序，作为临时缓解措施。对于仍在运行 IRIX 的系统，建议迁移至受支持的现代操作系统。"
score = 7.2
severity = "HIGH"
sources = ["epss"]
title = "SGI IRIX Korn Shell suid_exec 本地权限提升漏洞"
updated = "2026-06-16T21:49:45.003"

