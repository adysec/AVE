[basic]
description = "Linux 内核 SMB/CIFS 客户端中存在 TCP 计时器死锁漏洞，当卸载 SMB 客户端内核模块（rmmod）时，TCP 计时器未能正确清理，导致内核线程陷入死锁状态，可能引发系统崩溃或拒绝服务。该漏洞影响使用 SMB/CIFS 文件系统的 Linux 系统，攻击者可通过诱导系统卸载 SMB 模块触发此问题。Ubuntu 24.04 LTS 等发行版已在相关安全更新中修复此漏洞。"
published = "2025-01-11T13:15:27.340"
remediation = "CVE-2024-54680 已被 Linux CNA 于 2025-04-02 正式驳回（REJECTED），该编号对应的 SMB 客户端 TCP 计时器死锁问题被认定为非安全缺陷，无需安装任何安全更新或采取缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux Kernel SMB 客户端 TCP 计时器死锁漏洞"
updated = "2025-04-02T16:15:35.587"

