[basic]
description = "Apache HTTP Server 1.2.5 和 1.3.1 版本存在 MIME 头拒绝服务漏洞。远程攻击者无需身份认证即可通过向目标服务器发送包含大量 MIME 头的 HTTP 请求来触发该漏洞，导致 Apache 子进程消耗过多内存或 CPU 资源而崩溃或挂起，从而造成服务中断，影响系统可用性。该漏洞在 UnityMail 2.0 等基于受影响 Apache 版本的邮件系统中同样存在风险。CVSS 评分 10.0，危害等级严重。"
published = "1999-09-03T04:00:00.000"
remediation = "将 Apache HTTP Server 升级至 1.3.2 或更高版本（当前推荐升级至 2.4.x 最新稳定版）以修复该漏洞。如暂时无法升级，可在 httpd.conf 中配置 LimitRequestFieldSize 和 LimitRequestFields 参数限制单请求的头部大小及数量，或在前端防火墙/WAF 上设置规则限制单个来源 IP 的并发连接与请求频率作为临时缓解措施。"
score = 10
severity = "CRITICAL"
sources = ["exploitdb"]
title = "Apache HTTP Server MIME Header 拒绝服务漏洞"
updated = "2026-06-16T21:49:20.597"

