[basic]
description = "Microsoft HTTP.sys协议栈在处理特制的HTTP请求头（特别是Range头）时存在整数溢出漏洞，未经身份认证的远程攻击者可向运行IIS服务的Windows系统发送精心构造的HTTP请求，触发HTTP.sys中的内存损坏，从而实现远程代码执行。该漏洞影响Windows 7 SP1、Windows Server 2008 R2 SP1、Windows 8、Windows 8.1以及Windows Server 2012等多个版本，CVSS评分9.8，危害等级为严重。攻击者无需任何身份凭据即可利用此漏洞完全控制目标服务器，Microsoft已于2015年4月发布安全公告MS15-034修复此漏洞，强烈建议受影响用户立即安装补丁。该漏洞已被CISA纳入已知被利用漏洞目录，实际攻击中已被广泛利用。"
published = "2015-04-14T20:59:01.263"
remediation = "立即安装 Microsoft 安全公告 MS15-034 对应的补丁程序 KB3042553，可通过 Windows Update 或从 Microsoft 下载中心手动下载安装。若无法立即打补丁，可在 IIS 管理器中禁用内核缓存（netsh http show cachestate），或通过防火墙限制对 IIS 服务的外部访问，仅允许内网访问。受影响系统包括 Windows 7 SP1、Windows Server 2008 R2 SP1、Windows 8/8.1、Windows Server 2012/R2，升级后需重启服务器以确保 HTTP.sys 驱动加载修复后的版本。"
score = 9.8
severity = "CRITICAL"
sources = ["kev"]
title = "Microsoft Windows HTTP.sys 远程代码执行漏洞"
updated = "2026-06-17T00:22:44.360"

