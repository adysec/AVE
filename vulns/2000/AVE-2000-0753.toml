[basic]
description = "HP-UX 11.0 的 /bin/cu 程序中存在缓冲区溢出漏洞，本地攻击者可通过向 -l 命令行参数传入超长字符串触发该漏洞，成功利用后可获取目标系统的 root 权限。该漏洞影响 HP-UX 11.0 操作系统，CVSS 评分 7.2，危害等级高。攻击者需拥有本地系统访问权限才能利用此漏洞。"
published = "2000-12-11T05:00:00.000"
remediation = "升级 HP-UX 至 11.11 及以上版本，或安装 HP 安全补丁 PHCO_24446。如无法升级，执行 `chmod 755 /bin/cu` 移除 suid 权限作为临时缓解，限制本地普通用户对 cu 的访问。"
score = 7.2
severity = "HIGH"
sources = ["exploitdb"]
title = "HP HP-UX cu 本地权限提升漏洞"
updated = "2026-06-16T21:53:00.150"

