[basic]
description = "Jakarta Tomcat 3.1 默认配置中未对 /admin 管理控制台路径进行访问限制，远程攻击者可在无需认证的情况下直接调用管理 Servlet 添加根目录上下文，从而遍历并读取服务器上的任意敏感文件，包括配置文件、源代码、数据库凭证等。该漏洞影响 Tomcat 3.0 和 3.1 版本，CVSS 评分 5.0，危害等级中危。"
published = "2000-07-20"
remediation = "升级 Jakarta Tomcat 至 3.2 及以上版本，或编辑 server.xml 移除 /admin 上下文映射，并在 web.xml 中为所有管理 Servlet 添加角色认证限制，确保仅授权用户可访问 admin 路径。如无法升级，在应用服务器前端通过反向代理阻断对 /admin 路径的访问。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Apache Jakarta Tomcat /admin 默认配置访问控制不当导致远程任意文件读取漏洞"
updated = "2026-06-16"

