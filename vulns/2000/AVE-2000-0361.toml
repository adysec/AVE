[basic]
description = "Qpopper 2.53 及更早版本中存在格式字符串漏洞，本地攻击者可通过在邮件 From: 头部中嵌入精心构造的格式字符串标识符（如 %s、%n 等），当系统调用 EUIDL 命令处理该邮件时，格式串未被正确过滤而直接作为格式化参数传入，导致攻击者能以运行 Qpopper 进程的权限执行任意代码，实现本地权限提升。该漏洞影响 Cobalt RaQ 2.0/3.0 等设备上部署的 Qpopper 邮件服务器软件，CVSS 评分 7.5，危害等级高。"
published = "2000-05-24"
remediation = "升级 Qpopper 至 3.0 或更高版本，该系列版本已修复 euidl 命令中的格式字符串处理缺陷。对于 Cobalt RaQ 2.0/3.0 用户，应安装厂商发布的最新 qpopper RPM 安全更新包。如无法立即升级，应限制不可信用户获取本地 shell 访问权限以降低风险。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "Qualcomm Qpopper EUIDL 格式字符串漏洞"
updated = "2000-05-24"

