[basic]
description = "RealSystem G2 服务器将管理员密码以明文形式存储于全局可读的配置文件中，本地攻击者可通过读取该配置文件获取管理员权限。该漏洞影响 RealSystem G2 服务器版本，攻击者需具有本地系统访问权限，无需认证即可利用。由于密码以明文存储且文件权限设置不当，攻击者可轻易窃取管理员凭据，进而完全控制服务器。"
published = "1998-12-10T05:00:00.000"
remediation = "建议立即将包含管理员密码的配置文件权限改为仅管理员可读写（如 `chmod 600`），防止本地用户读取。同时升级到 RealSystem iQ 或更新版本，避免以明文存储密码。如无法升级，可考虑使用操作系统文件权限监控工具（如 Tripwire）检测配置文件的异常读取行为。"
score = 4.6
severity = "MEDIUM"
sources = ["avd"]
title = "RealNetworks RealSystem G2 Server 信息泄露漏洞"
updated = "2026-06-16T21:50:06.293"

