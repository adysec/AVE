[basic]
description = '部分调制解调器未实现或配置了零秒的 AT 命令保护间隔（guard time），导致远程攻击者可通过在 ICMP 数据包、电子邮件主题、IRC 命令等网络流量中嵌入 "+++" 转义序列，绕过正常拨号保护机制，向目标调制解调器发送 ATH、ATH0 等任意 AT 命令，实现挂断、重拨等非授权操作。该漏洞影响多款未正确配置保护间隔的调制解调器设备，CVSS 评分 7.5，危害等级高。厂商建议启用或延长 guard time 参数以防止 "+++" 序列被误解析为命令转义符。'
published = "1998-09-27T04:00:00.000"
remediation = "在 Modem 的初始化字符串中添加 S12=50（设置退出数据模式的 guard time 为 500 毫秒），同时在 S-Register 中将 S2 设置为 255 以禁用 +++ 转义序列。为关键系统使用的 Modem 创建专用防火墙规则，过滤掉包含 +++ 序列的 ICMP 和 SMTP 流量作为深层防御。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "多款调制解调器 AT 命令远程代码执行漏洞"
updated = "2026-06-16T21:49:59.507"

