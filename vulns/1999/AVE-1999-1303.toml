[basic]
description = 'Cheyenne InocuLAN Anti-Virus Server 4.0（Service Pack 2 之前版本）在创建更新目录时设置了"EVERYONE FULL CONTROL"权限，导致本地攻击者可利用该不安全权限向更新目录植入恶意 DLL 文件。当 InocuLAN 的防病毒更新功能执行时，系统会加载该恶意 DLL，从而以系统权限执行任意代码。该漏洞需本地访问权限，CVSS 评分 7.2，危害等级高。'
published = "1998-06-11T04:00:00.000"
remediation = "立即升级到 Cheyenne InocuLAN 4.0 Service Pack 2 或更高版本。如无法升级，手动修改更新目录的 NTFS 权限，移除 Everyone 组的完全控制权限，仅保留 SYSTEM 和管理员权限。同时建议在组策略中限制本地用户对 Program Files 目录的写入权限。"
score = 7.2
severity = "HIGH"
sources = ["epss"]
title = "Cheyenne InocuLAN 防病毒服务器设置不安全目录权限漏洞"
updated = "2026-06-16T21:50:42.477"

