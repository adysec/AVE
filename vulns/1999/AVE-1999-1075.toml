[basic]
description = "Windows NT 和 Windows 2000 系统中存在安全策略绕过漏洞。当管理员更改用户策略时，如果本地 ntconfig.pol 文件对用户不可写，策略将无法正确更新，导致本地用户可通过将该策略文件设置为只读等方式绕过系统强制实施的安全限制。该漏洞影响 Windows NT 及 Windows 2000 操作系统，CVSS 评分 4.6，危害等级中危。攻击者需拥有本地系统访问权限方可利用。"
published = "1999-12-31"
remediation = "安装 Microsoft KB157673 安全更新。确保 ntconfig.pol 文件权限设置正确，普通用户不应具有对该文件的写入权限。对于已停止支持的 Windows NT/2000 系统，建议升级到受支持的操作系统版本以获取持续安全更新。"
score = 4.6
severity = "MEDIUM"
sources = ["cve"]
title = "Microsoft Windows NT/2000 用户策略绕过漏洞"
updated = "2026-06-16"

