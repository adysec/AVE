CVE-1999-0978: htdig allows remote attackers to execute commands via filenames with shell metacharacters.
Key details:
- Description: htdig allows remote attackers to execute commands via filenames with shell metacharacters.
- CVSS v2.0 Score: 7.5 HIGH (AV:N/AC:L/Au:N/C:P/I:P/A:P)
- Published: 1999-12-09
- Reference: http://www.securityfocus.com/bid/867
- CWE: NVD-CWE-Other
htdig is a web search/indexing tool. The vulnerability is about shell metacharacters in filenames leading to command execution.
