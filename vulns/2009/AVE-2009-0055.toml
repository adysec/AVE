[basic]
description = "Microsoft Office Word 存在栈缓冲区溢出漏洞，远程攻击者可通过向目标用户发送特制的 Word 文档，其中包含精心构造的无效长度字段标签，触发栈缓冲区溢出，导致任意代码执行。该漏洞影响 Word 2002 SP3、2003 SP3、2007 SP1/SP2、Office for Mac 2004/2008、Open XML File Format Converter for Mac、Word Viewer 2003 SP3 及 Office 兼容包等多个版本，CVSS 评分 7.8，危害等级高。攻击者需诱使用户打开恶意文档方可利用，成功利用后可获取与当前用户相同的系统权限。"
published = "2009-06-10T18:00:00.313"
remediation = "安装 Microsoft 安全公告 MS09-027 提供的更新 (KB969514)，该更新修补了 Word 在处理包含畸形长度字段的标记时存在的栈缓冲区溢出漏洞。所有受影响版本（Office Word 2002/2003/2007、Office for Mac 2004/2008、Word Viewer、兼容包）均应通过 Windows Update 或手动下载安装此安全更新。如暂时无法安装补丁，建议不要打开来自不可信来源的 Word 文档，并使用 Microsoft Office 文件验证功能拦截异常文件。"
score = 7.8
severity = "HIGH"
sources = ["kev"]
title = "Microsoft Office Word 缓冲区溢出远程代码执行漏洞"
updated = "2026-06-16T23:05:18.980"

