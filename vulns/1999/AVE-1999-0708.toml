[basic]
description = 'Microsoft Internet Information Server (IIS) 4.0 及 Microsoft Commercial Internet System (MCIS) 2.5 中的 FTP 服务存在权限绕过漏洞。该漏洞源于 Windows NT 4.0 Service Pack 5 之后发布的热修复补丁引入的回归错误，导致 FTP 服务器未能正确执行 NTFS 文件系统的"无访问"权限设置。远程攻击者可通过浏览器匿名访问目标 FTP 服务器，读取甚至删除本应被禁止访问的文件，造成敏感信息泄露或数据破坏。攻击者无需身份认证即可利用此漏洞，CVSS v2.0 评分为 7.5，危害等级高。Microsoft 已在安全公告 MS99-039 中发布补丁修复此问题。'
published = "1999-09-23"
remediation = "立即安装 Microsoft 安全公告 MS99-039 提供的补丁程序（对应 KB 文章 Q241407/Q242559），该补丁修复了 IIS 4.0 和 MCIS 2.5 中 FTP 权限绕过问题。如运行 Windows NT 4.0，应升级至 Service Pack 5 或更高版本。对于仍在使用的旧系统，建议迁移至受支持的 Windows Server 版本（如 Windows Server 2019/2022）并启用最新安全更新。临时缓解措施：在 FTP 站点上禁用匿名访问，并对敏感目录设置 NTFS 文件系统权限而非仅依赖 IIS 权限控制。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Microsoft Internet Information Server 安全绕过漏洞"
updated = "1999-09-23"

