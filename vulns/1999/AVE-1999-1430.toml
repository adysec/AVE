[basic]
description = "SunOS 4.1.1 及更早版本中的 rpc.pwdauthd 守护进程未正确限制远程访问，导致未经认证的远程攻击者可直接连接该服务并获取系统敏感信息。该漏洞利用难度较低，攻击者无需任何身份认证即可通过网络远程触发信息泄露，影响范围覆盖 SunOS 4.1.1 及之前版本。由于 rpc.pwdauthd 默认监听网络端口，攻击者可通过发送特制 RPC 请求获取用户账户等敏感数据，进一步扩大攻击面。"
published = "1991-01-15T05:00:00.000"
remediation = "升级到 SunOS 4.1.2 或更高版本以修复 rpc.pwdauthd 远程访问漏洞；如无法升级，在 /etc/inetd.conf 中注释 rpc.pwdauthd 行并重启 inetd 以禁用该服务，或使用 tcpwrappers 限制仅允许可信 IP 段访问"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Sun SunOS rpc.pwdauthd 远程信息泄露漏洞"
updated = "2026-06-16T21:50:03.313"

