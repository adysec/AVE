[basic]
description = "11in1 CMS 1.2.1 版本中存在目录遍历漏洞，远程攻击者可通过向 index.php 或 admin/index.php 的 class 参数传入 `../` 等路径遍历序列，绕过访问限制读取服务器上的任意文件，导致敏感信息泄露。该漏洞源于程序未对用户输入的 class 参数进行充分的路径过滤与校验，攻击者无需身份认证即可利用，危害较大。"
published = "2012-02-24T13:55:02.733"
remediation = "11in1 1.2.1 及之前版本受影响，建议升级至官方最新版本；如已停止维护，需在 index.php 和 admin/index.php 中对 class 参数使用 basename() 或正则过滤移除 ../ 路径遍历序列，仅允许字母数字字符；或通过 WAF 规则拦截包含 ../ 的请求作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["nuclei"]
title = "11in1 CMS 目录遍历漏洞"
updated = "2026-06-16T23:38:38.130"

