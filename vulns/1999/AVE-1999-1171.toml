[basic]
description = "Microsoft IIS 3.0 及 4.0 版本存在 SSL 资源耗尽拒绝服务漏洞。由于 IIS 无法区分需要加密传输的页面与不需要加密的页面，远程攻击者可通过向 HTTPS 端口发送大量针对非加密文件的 SSL 请求，迫使 IIS 执行额外的 SSL 加密操作来传输这些文件，导致服务器 CPU 和内存资源被大量消耗，最终造成拒绝服务。该漏洞影响 IIS 3.x 和 4.x 版本，攻击者无需身份认证即可远程利用。"
published = "1999-07-07T04:00:00.000"
remediation = "升级到 IIS 5.0 或更高版本（如 IIS 6.0/7.0/7.5/8.0/8.5/10.0），这些版本已区分加密与非加密页面请求，避免不必要的 SSL 加密开销。如无法升级，可在防火墙层面限制单个 IP 对 HTTPS 端口的并发连接数（如限制为 100 个/分钟），并启用连接速率限制作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Microsoft IIS 3.0/4.0 SSL 资源耗尽拒绝服务漏洞"
updated = "2026-06-16T21:50:39.457"

