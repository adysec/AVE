[basic]
description = "海信智能公交企业管理系统存在 SQL 注入漏洞。该系统在处理用户输入的查询参数时未对数据进行严格的合法性校验与预编译处理，导致攻击者可将恶意的 SQL 语句拼接至后端数据库查询中。受影响范围为部署并运行该系统的相关公交企业管理平台，攻击者无需身份认证，只需通过构造特制的 HTTP 请求（如修改查询参数或表单字段），即可将恶意 SQL  payload 发送至服务端。成功利用后，攻击者可绕过鉴权、读取数据库中的敏感信息（如管理员账号、乘客数据等），甚至在特定条件下实现数据篡改或进一步的内网渗透，严重威胁业务数据安全与系统可用性。"
published = "0723"
remediation = "立即联系海信获取官方安全补丁，升级智能公交企业管理系统至最新版本。对 /YZSoft/Forms/XForm/BM/ 目录下的所有 .aspx 接口实施输入参数校验和参数化查询，禁止拼接 SQL 语句。部署 WAF 拦截 SQL 注入特征 payload，并将数据库账户降权为最小权限运行。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "海信 智能公交企业管理系统 SQL注入漏洞"
