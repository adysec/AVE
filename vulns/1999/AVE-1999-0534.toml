[basic]
description = "Microsoft Excel 在处理符号链接（SYLK）格式文件时存在安全缺陷，当 SYLK 文件内嵌宏代码时，Excel 未向用户发出安全警告，导致宏代码可在用户不知情的情况下自动执行。该漏洞影响 Microsoft Excel 97 及早期版本，攻击者可通过诱导用户打开精心制作的包含恶意宏的 SYLK 文件，在用户不知情的情况下执行任意宏代码，可能导致任意代码执行、数据窃取或系统破坏。攻击条件为受害者需打开攻击者构造的恶意 SYLK 文件，利用方式为通过电子邮件附件、网页下载或文件共享传播恶意 SYLK 文件诱导用户打开。"
published = "1999-10-01"
remediation = "安装 Microsoft 安全公告 MS99-044 对应的补丁（知识库文章 Q241900/Q241901/Q241902）。如无法立即更新，可在 Excel 选项中将宏安全级别设为“高”或“非常高”，禁止未经提示的宏自动执行，并避免打开来历不明的 SYLK 文件。"
score = 4.6
severity = "MEDIUM"
sources = ["cve"]
title = "Microsoft Excel SYLK格式文件宏处理不当漏洞"
updated = "2026-07-18"

