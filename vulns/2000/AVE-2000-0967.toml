[basic]
description = "UnixWare 7 scohelphttp webserver 的 search97cgi/vtopic 组件存在目录遍历漏洞，远程未授权攻击者可通过在参数中构造 ../ 目录遍历序列读取服务器任意文件。该漏洞源于输入验证缺失，攻击者无需身份认证即可通过网络发送恶意请求，利用 ../ 序列遍历目录结构读取敏感文件（如 /etc/passwd、配置文件等）。影响范围为运行 scohelphttp webserver 的 UnixWare 7 系统，CVSS 5.0（AV:N/AC:L/Au:N/C:P/I:N/A:N），攻击复杂度低、无需认证、仅影响机密性。攻击者可通过构造包含 ../ 序列的 HTTP 请求实现任意文件读取，获取系统敏感信息。SCO 已发布补丁修复该漏洞。"
published = "2000-11-14T05:00:00.000"
remediation = "建议升级 UnixWare 7 至最新补丁版本（安装 SCO 安全补丁 SCO-2000.09 或更高版本），或将 scohelphttp 服务禁用并禁用 search97cgi/vtopic CGI 程序。若无法升级，建议在 Web 服务器层配置路径遍历防护规则（如 Apache mod_rewrite 规则拦截包含 ../ 的请求），并在防火墙层面限制对 scohelphttp 端口（默认 457/tcp）的外部访问。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "SCO UnixWare 7 Web服务器任意文件读取漏洞"
updated = "2026-06-16T21:52:34.843"

