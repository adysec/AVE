[basic]
description = "SuSE Linux 6.4 默认安装的 Apache 1.3.12 存在默认配置错误，其 /cgi-bin-sdb/ 目录配置不当，允许远程未认证攻击者通过将请求 URL 中的 /cgi-bin/ 替换为 /cgi-bin-sdb/ 直接访问并下载 CGI 脚本的源代码。该漏洞影响 SuSE Linux 6.4 默认安装的 Apache 1.3.12，攻击者无需身份认证即可远程利用，仅需构造将 /cgi-bin/ 替换为 /cgi-bin-sdb/ 的 HTTP 请求即可读取 CGI 脚本源代码，导致敏感源代码泄露，CVSS 5.0（AV:N/AC:L/Au:N/C:P/I:N/A:N），属于信息泄露类漏洞。SuSE 已发布补丁修复该配置错误。"
published = "2000-11-14T05:00:00.000"
remediation = "建议升级 SuSE Linux 6.4 中的 Apache 至 1.3.14 或更高版本，或升级至 SuSE Linux 7.0 以上版本。临时缓解措施：编辑 httpd.conf 删除或注释掉 ScriptAlias /cgi-bin-sdb/ 配置行，重启 Apache 服务使配置生效，或在 Web 应用防火墙层面拦截包含 /cgi-bin-sdb/ 的请求路径。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "SuSE Linux Apache 源代码泄露漏洞"
updated = "2026-06-16T21:52:38.250"

