[basic]
description = "Atrium Software Mercur Mail Server 3.2 的 POP3 和 IMAP 服务组件存在多个缓冲区溢出漏洞。远程攻击者无需身份认证即可向目标服务器发送特制的超长请求，触发缓冲区溢出，导致服务进程崩溃，造成拒绝服务。该漏洞影响 Mercur Mail Server 3.2 版本，CVSS 评分 5.0，危害等级中危。厂商已停止维护，建议用户升级至不受影响的版本或迁移至其他邮件服务器软件。"
published = "2000-03-15T05:00:00.000"
remediation = "该产品（Atrium Software Mercur Mail Server 3.2）已停止维护，官方不再提供安全更新。建议立即迁移至仍在支持周期内的邮件服务器软件（如 Dovecot、Cyrus IMAP 等），并在迁移完成前在防火墙层面限制对 POP3（110/TCP）和 IMAP（143/TCP）端口的访问，仅允许受信任 IP 连接。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Atrium Software Mercur Mail Server 3.2 多个缓冲区溢出漏洞"
updated = "2026-06-16T21:51:12.360"

