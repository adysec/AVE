[basic]
description = "WEBgais 1.0 的 websendmail CGI 脚本存在远程命令执行漏洞。websendmail 在处理 receiver 参数（$VAR_receiver 变量）时未对用户输入进行有效过滤和转义，导致远程攻击者可通过向该 CGI 脚本发送特制请求，在参数中注入 shell 命令，从而以 Web 服务器进程权限在目标系统上执行任意命令、读取任意文件。该漏洞影响 WEBgais 1.0 版本，攻击者无需身份认证即可远程利用，CVSS 评分 5.0，属于中危风险。"
published = "1997-07-08T04:00:00.000"
remediation = "Webgais 1.0 已停止维护且无安全补丁，建议立即停止使用 websendmail 组件或整体移除 Webgais 服务，改用现代化 Web 服务器。临时缓解措施包括：在 websendmail 脚本中对 receiver 参数进行严格输入过滤，禁止包含 shell 元字符（如 ;、|、`、$() 等），并限制 Web 服务器运行在最低权限账户下。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "WEBgais websendmail 远程命令执行漏洞"
updated = "2026-06-16T21:47:53.363"

