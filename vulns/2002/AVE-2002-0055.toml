[basic]
description = "Linux PAM（Pluggable Authentication Modules）0.76 版本存在认证绕过漏洞，该版本将已禁用用户的密码视为空密码（null password）处理，导致本地或远程攻击者可通过空密码认证方式绕过账户禁用限制，以被禁用用户的身份获取系统访问权限。该漏洞影响使用 PAM 0.76 的各类 Linux 发行版，攻击者无需任何特殊权限即可利用，可能导致权限提升或未授权访问。"
published = "2002-10-28T05:00:00.000"
remediation = '升级 Linux PAM 库至 0.76-22 或更高版本（Debian 已通过 DSA-177 发布补丁），该版本修复了将禁用用户密码视为空密码的认证逻辑缺陷。如无法立即升级，可在 /etc/shadow 中将禁用账户的密码字段设为 "!*" 而非空值，并确保 pam_unix.so 配置中启用 nullok 选项时仅对明确允许的账户生效。'
score = 7.5
severity = "HIGH"
sources = ["osv"]
title = "Linux-PAM 空密码认证绕过权限提升漏洞"
updated = "2026-06-16T21:58:58.173"

