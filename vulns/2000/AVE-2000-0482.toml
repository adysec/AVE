[basic]
description = "Computer Software Manufaktur 公司开发的 Alibaba Web 服务器 2.0 版本存在缓冲区溢出漏洞。远程攻击者可通过向目标服务器发送超长的 GET 请求，触发缓冲区溢出，导致目标服务崩溃从而引发拒绝服务。攻击无需任何身份认证，仅需网络可达即可实施。该漏洞影响了 Alibaba Web Server 2.0 版本。"
published = "2000-07-18T04:00:00.000"
remediation = "该漏洞影响 Computer Software Manufaktur Alibaba 2.0，该产品已长期停止维护，无官方补丁可用。建议立即停止使用 Alibaba 2.0 并迁移至受支持的 Web 服务器（如 Apache HTTP Server 或 Nginx）。如暂时无法替换，可在防火墙或反向代理层面限制入站 GET 请求长度（如 max-uri-length 1024）作为临时缓解。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Alibaba Web Server 2.0 缓冲区溢出拒绝服务漏洞"
updated = "2026-06-16T21:52:08.330"

