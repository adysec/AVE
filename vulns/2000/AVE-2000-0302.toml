[basic]
description = "Windows 2000 域控制器中存在不安全的对象属性访问漏洞（Mixed Object Access）。由于 Active Directory 中某些属性未设置适当的访问控制保护，已通过认证的攻击者可利用域控制器的 LDAP 接口直接修改这些未受保护的目录属性，进而篡改活动目录中的对象信息。攻击者需要拥有有效的域账户才能利用此漏洞，CVSS 评分 2.1，危害等级低。该漏洞影响 Windows 2000 Server 版本，微软已发布安全更新修复此问题。"
published = "2000-04-20T04:00:00.000"
remediation = "立即安装微软安全公告 MS00-026 对应补丁（下载链接：https://www.microsoft.com/download/details.aspx?FamilyId=7237F230-A28B-447B-9034-6654DD7CD05E），或升级至 Windows 2000 Service Pack 及以上版本。同时检查域控制器上活动目录对象的 ACL 配置，确保最小权限原则，定期审计目录修改日志以检测异常操作。"
score = 2.1
severity = "LOW"
sources = ["epss"]
title = "Microsoft Windows 2000 Active Directory 未授权访问漏洞"
updated = "2026-06-16T21:51:27.110"

