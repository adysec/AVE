[basic]
description = "Microsoft IIS 2.0 至 5.1 版本存在内部 IP 地址泄露漏洞。当受基本认证保护且未定义 realm 的网页收到 HTTP 1.0 请求时，服务器会在响应中泄露其内部 IP 地址。远程攻击者无需认证即可利用此漏洞获取目标服务器的内网 IP 信息，为后续渗透提供网络拓扑情报。该漏洞影响 IIS 2.0/3.0/4.0/5.0/5.1 版本，CVSS 评分 2.6，危害等级低。"
published = "2000-07-13T04:00:00.000"
remediation = "安装 Microsoft 针对此漏洞发布的安全更新补丁（Q271917），为需要基本认证的页面显式配置 realm 域值，或者在 IIS 管理器中禁用 HTTP 1.0 协议的匿名请求。建议升级到 IIS 7.0 及以上版本（Windows Server 2008+），这些版本不再存在此问题。如无法升级，可使用 URLScan 工具过滤 HTTP 1.0 请求作为临时缓解措施。"
score = 2.6
severity = "LOW"
sources = ["exploitdb"]
title = "Microsoft IIS 内部IP地址泄露漏洞"
updated = "2026-06-16T21:52:11.267"

