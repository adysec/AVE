[info]
author = "AVE"
description = "检测 Adobe Flash Player 在处理特制 MP4 文件中的 cprt 标签时的内存破坏漏洞。通过 HTTP 服务端返回包含恶意 Flash 内容的 HTML 页面，触发目标 Flash Player 解析恶意 MP4 文件导致内存越界写入。"
id = "POC-AVE-2012-0088"
name = "Adobe Flash Player MP4 cprt Remote Overflow PoC"
severity = "high"
tags = [
    "cve-2012-0754",
    "flash-player",
    "memory-corruption",
]
vuln_id = [
    "CVE-2012-0754",
    "AVE-2012-0088",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "Flash",
    "Shockwave",
]
