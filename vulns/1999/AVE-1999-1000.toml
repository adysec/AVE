[basic]
description = "ISC BIND 8.2 及 8.2.1 版本在处理 TCP 会话时存在拒绝服务漏洞，因未能正确关闭设置了 SO_LINGER 选项的 TCP 连接（improperly closing TCP sessions via so_linger）。远程攻击者可通过向运行 BIND 的 DNS 服务器发起大量特制的 TCP 会话连接，利用 SO_LINGER 套接字选项触发资源耗尽或非正常会话关闭逻辑，导致 named 守护进程崩溃或停止响应，造成 DNS 服务不可用。该漏洞影响使用 BIND 8.2 与 8.2.1 版本的 DNS 服务器，攻击者仅需网络可达目标 53 端口（TCP）即可实施攻击，无需身份认证，CVSS 评分达 10.0，危害等级严重。"
published = "1999-11-10T05:00:00.000"
remediation = "立即将 ISC BIND 升级至 8.2.2 或更高版本，该版本已修复 TCP 会话处理中 so_linger 使用不当导致的拒绝服务问题。如无法立即升级，可在 named.conf 中限制允许建立 TCP 区传送连接的客户端（allow-transfer），并在边界防火墙对 DNS 服务器 53 端口的 TCP 连接数做限速与并发限制，作为临时缓解措施。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "ISC BIND 8.2/8.2.1 TCP Session 拒绝服务漏洞"
updated = "2026-06-16T21:49:09.680"

