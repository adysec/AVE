[basic]
description = "Microsoft Excel 97 及 Excel 2000 在打开外部文本文件时，默认不向用户发出安全警告即允许执行其中的 Excel 宏语言（XLM）宏，构成安全特性绕过漏洞。攻击者可通过诱使用户打开包含恶意 XLM 宏的文本文件，在未获用户确认的情况下执行任意宏代码，导致宏病毒传播。该漏洞影响 Excel 97 和 Excel 2000 版本，CVSS 评分 7.2，危害等级高。Microsoft 未发布官方补丁，建议用户禁用外部文本文件中的宏执行功能以避免风险。"
published = "2000-04-03T04:00:00.000"
remediation = "Excel 97 用户需先安装 Office 97 Service Release 2，然后安装安全更新补丁（https://www.microsoft.com/download/details.aspx?FamilyID=47e6bbc2-029d-42f3-9baa-dfb1ed20846f）；Excel 2000 用户应安装 Office 2000 Service Release 1（https://www.microsoft.com/download/details.aspx?FamilyID=AF6C8D03-7633-45B4-AB96-795EE656F2A2）。更彻底的方案是升级到更高版本如 Office XP/2003 及以上，并将 Excel 宏安全级别设为「高」以仅允许数字签名宏运行。"
score = 7.2
severity = "HIGH"
sources = ["epss"]
title = "Microsoft Excel 97与2000 XLM宏自动执行漏洞"
updated = "2026-06-16T21:51:22.867"

