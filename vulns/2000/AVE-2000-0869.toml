[basic]
description = "Red Hat Linux 6.2 自带的 diskcheck.pl 脚本在处理临时文件时存在符号链接（symlink）竞争条件漏洞。本地攻击者可通过在临时文件创建前建立恶意符号链接，诱使脚本以 root 权限向任意文件写入数据，实现本地权限提升或破坏系统关键文件。该漏洞影响 Red Hat Linux 6.2 系统，需要本地用户身份才能利用，CVSS 评分 2.1，危害等级低。"
published = "2000-10-20T04:00:00.000"
remediation = "升级 Red Hat Linux 至 7.0 及以上版本，或手动修补 diskcheck.pl 脚本，将临时文件创建方式改为使用 mktemp 命令而非可预测路径名，避免符号链接竞争条件。如无需该脚本，建议直接删除 diskcheck.pl 以消除风险。"
score = 2.1
severity = "LOW"
sources = ["cve"]
title = "Red Hat Linux DiskCheck 符号链接任意文件写入漏洞"
updated = "2026-06-16T21:52:19.767"

