[basic]
description = 'Microsoft Exchange 5.5 存在电子邮件中继绕过漏洞。远程攻击者可以利用封装的 SMTP 地址格式（如"<user@domain.com>"嵌入在邮件地址字段中）发送邮件，即使服务器已启用防中继功能，仍能绕过限制将邮件中继到外部域。该漏洞可被垃圾邮件发送者利用来发送大量垃圾邮件，导致服务器被滥用为开放中继。影响 Microsoft Exchange Server 5.5 版本，攻击无需认证，仅需构造特制邮件地址即可触发。'
published = "1999-08-06T04:00:00.000"
remediation = "安装 Microsoft Security Bulletin MS99-027 提供的 Exchange Server 5.5 安全更新，该补丁使封装的 SMTP 地址同样受反中继保护。若无法安装补丁，可在 Internet Mail Service 属性中将中继权限限制为仅允许经过身份验证的用户，并禁用不必要的站点到站点 SMTP 中继功能。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Microsoft Exchange Server 5.5 SMTP 邮件中继安全绕过漏洞"
updated = "2026-06-16T21:48:50.280"

