[basic]
description = 'tags.<value>Netscape FastTrack Server 3.0.1 存在目录列表漏洞，由于服务器对 HTTP 方法的大小写处理不当，攻击者使用小写的 "get" 命令替代标准的大写 "GET" 发送请求时，服务器会返回根目录及子目录的文件列表，导致敏感信息泄露。未经身份认证的远程攻击者可利用此漏洞遍历服务器文件系统，获取配置文件、源代码等敏感信息。该漏洞影响 Netscape FastTrack Server 3.0.1 版本，CVSS 评分 7.5，危害等级高危。'
published = "1998-01-01T05:00:00.000"
remediation = "Netscape FastTrack Server 3.0.1 已停止维护超过二十年，官方不再提供安全补丁。建议立即迁移至仍受支持的 Web 服务器（如 Apache HTTP Server、Nginx 或 Microsoft IIS）。若短期内无法迁移，可在反向代理或 WAF 层面配置规则拦截小写 HTTP 方法（将小写 get 请求转换为 400/403 响应）作为临时缓解措施，同时严格限制可访问该服务器的源 IP 范围。"
score = 7.5
severity = "HIGH"
sources = ["exploitdb"]
title = "Netscape FastTrack Server 目录列表信息泄露漏洞"
updated = "2026-06-16T21:47:58.770"

