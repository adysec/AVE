[basic]
description = "BSD 及 Linux 系统中的 lpr 软件包中的行式打印机守护进程（lpd）存在权限提升漏洞。本地攻击者可通过向 sendmail 传递任意命令行参数（如使用 -C 选项指定恶意配置文件）触发该漏洞，从而获取 root 权限。该漏洞影响多个 Linux 发行版及 BSD 系统，CVSS 评分 10.0，危害等级严重。利用该漏洞需要本地用户权限，无需交互即可完成提权。"
published = "2000-01-08"
remediation = "针对 Red Hat Linux 系统，升级 lpr 软件包至修复版本：6.x 升级至 lpr-0.48-1，5.x 升级至 lpr-0.48-0.5.2，4.x 升级至 lpr-0.48-0.4.2。Debian 用户安装 2000 年 1 月 9 日安全公告对应的 lpr 更新。补丁通过过滤传递给 sendmail 的命令行参数（禁止 -C 等危险选项）来阻止攻击者利用控制文件注入任意参数提权。如无法立即修补，可临时禁用 LPD 服务（/etc/init.d/lpd stop && chkconfig lpd off）。"
score = 10.0
severity = "CRITICAL"
sources = ["osv"]
title = "BSD及Linux系统 lpr 本地权限提升漏洞"
updated = "2026-06-16"

