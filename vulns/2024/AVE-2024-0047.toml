[basic]
description = "章管家（zhangin.com）企业印章管理平台存在前台任意文件上传漏洞，攻击者可利用/seal/sealApply/uploadFileByChunks.htm接口在未授权的情况下上传恶意JSP文件，从而获取服务器控制权限，导致敏感数据泄露和系统被控。"
published = "2024-01-01"
remediation = "对/seal/sealApply/uploadFileByChunks.htm接口实施严格的文件类型校验，禁止上传JSP等可执行脚本文件，同时增加身份认证和权限控制措施，限制未授权访问上传接口。"
score = 5.0
severity = "MEDIUM"
sources = ["hwpoc"]
