[basic]
description = "Red Hat Linux 6.1 及更早版本中的 Xsession 组件存在安全绕过漏洞。具有受限账户的本地用户可通过从 kdm 登录管理器启动 KDE、GNOME 或其他桌面环境，绕过 .xsession 文件的执行限制，从而获取非授权的桌面环境访问权限。该漏洞影响 Red Hat Linux 6.1 及之前版本，CVSS 评分 4.6，危害等级中危。攻击者需要拥有本地账户且能够物理或远程登录系统，利用门槛较低。"
published = "1999-10-07T04:00:00.000"
remediation = "升级至 Red Hat Linux 6.2 及以上版本，该版本已修复 Xsession 脚本对 kdm 启动桌面环境的权限校验。如无法升级，可修改 /etc/X11/xdm/Xsession 脚本，在启动 kde/gnome 前增加用户权限检查逻辑，或限制 kdm 仅允许授权用户登录。"
score = 4.6
severity = "MEDIUM"
sources = ["cve"]
title = "Red Hat Linux Xsession 安全限制绕过漏洞"
updated = "2026-06-16T21:50:14.813"

