[basic]
description = "Rit Research Labs The Bat! 1.51 邮件客户端在处理邮件内容时，未正确处理仅包含回车符 <CR> 而缺少换行符 <LF> 的畸形邮件，导致远程攻击者可通过发送包含单独回车符的特制邮件触发拒绝服务漏洞。该漏洞影响 Rit Research Labs The Bat! 1.51 for Windows 版本，攻击者无需身份认证即可远程发送恶意邮件触发漏洞，导致邮件客户端拒绝服务，CVSS 评分 5.0 (AV:N/AC:L/Au:N/C:N/I:N/A:P)，属于中危级别拒绝服务漏洞。攻击者仅需向目标用户发送包含畸格式行结束符的邮件即可触发拒绝服务，导致邮件客户端崩溃或无法正常处理邮件。"
published = "2001-09-20T04:00:00.000"
remediation = "升级到 The Bat! 4.0 或更高版本，该版本修复了邮件解析的 CR/LF 处理漏洞。或者，从官方网站 https://thebat.net 手动下载并安装 4.0 版。在安装前，可暂时在邮件服务器或客户端策略中禁用不支持 CR/LF 不完整序列的 MIME 解码，或者配置电子邮件服务只接受确以 LF 结尾的邮件。对于 Windows 2000/XP 系统，建议启用安全更新并应用最新的杀毒软件签名数据库以增强保护。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Rit Research Labs The Bat! 1.51 邮件客户端 CR/LF 处理拒绝服务漏洞 (CVE-2001-0675)"
