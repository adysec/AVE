[basic]
description = "Maximizer Enterprise 4 的日历和地址簿程序存在访问控制缺陷，当用户共享日历时，系统未对修改操作进行充分的权限验证，导致任意用户均可修改其他用户的日历内容。攻击者可利用共享功能，未经授权篡改目标用户的日程安排，影响日历数据的完整性和可用性。该漏洞影响 Maximizer Enterprise 4 版本，属于设计层面的权限缺失问题。"
published = "1999-01-14T05:00:00.000"
remediation = "升级 Maximizer Enterprise 4 至当前最新版 Maximizer CRM，该版本已对日历共享的访问控制机制进行了重构。若暂时无法升级，应立即禁用日历共享功能，或在日历共享设置中将权限严格限制为「只读」模式，禁止其他用户编辑。同时，在网络层通过防火墙规则限制 Maximizer 服务端口的访问来源，仅允许可信的内部 IP 段连接，防止外部任意用户利用该设计缺陷篡改他人日历数据。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Maximizer Enterprise 4 日历未授权修改漏洞"
updated = "2026-06-16T21:49:52.400"

