[basic]
description = "Linux 内核 btrfs 文件系统在 relocate_one_folio() 函数中存在条件竞争漏洞。当调用 btrfs_read_folio() 读取 folio 时，该 folio 会被解锁，此时其他线程可能通过 invalidate_inode_pages2() 修改映射并将 mapping 置为 NULL。若后续未重新检查 folio 映射有效性就直接调用 set_extent_mapping()，将导致空指针解引用，引发内核崩溃。本地低权限攻击者可通过并发触发 btrfs 块组重定位与事务中止操作来利用此漏洞，造成系统拒绝服务。该漏洞影响 Linux 内核 btrfs 文件系统，CVSS 评分 5.5，危害等级中等。"
published = "2025-01-06T17:15:40.597"
remediation = "建议立即升级内核至修复版本：SUSE Linux Enterprise 15 SP6 Azure 内核升级至 SUSE-SU-2025:1177-1 版本，SUSE Linux Enterprise 15 SP7 升级至 SUSE-SU-2025:01967-1 或 SUSE-SU-2025:01951-1 版本，Ubuntu 24.04 LTS 升级至 USN-7381-1 提供的内核版本，Debian 12 升级至 DSA-5973 提供的内核版本，Microsoft CBL-Mariner/Azure Linux 升级至 AZL-55032 修复版本。如无法立即升级内核，可暂时卸载或禁用 btrfs 文件系统模块（modprobe -r btrfs 并加入黑名单 /etc/modprobe.d/blacklist-btrfs.conf），或避免在 btrfs 卷上执行 balance/relocate 操作作为临时缓解措施。"
score = 5.5
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux Kernel btrfs 空指针解引用漏洞"
updated = "2026-06-17T08:12:55.433"

