[basic]
description = "金和OA系统 jc6_viewConTemplate.action 接口存在 FreeMarker 模板注入漏洞。攻击者可在未经认证的情况下，通过 POST 请求向目标接口发送特制的模版注入 payload，利用 FreeMarker 模板引擎的 Execute 内置函数执行任意系统命令，从而导致远程代码执行。该漏洞危害严重，攻击者无需任何权限即可利用，可完全控制目标服务器。建议用户及时升级或限制相关接口的访问权限。"
published = "0725"
remediation = "建议立即升级金和OA Jc6至V6.2sp1及以上版本（官方已修复FreeMarker模板注入漏洞），或升级至最新版V7.0以上。临时缓解措施：在Web应用防火墙(WAF)层面配置规则拦截包含freemarker.template.utility.Execute等恶意模板表达式的POST请求，或在Web应用防火墙配置规则拦截/jc6/platform/portalwb/portalwb-con-template!viewConTemplate.action路径下包含clob、freemarker.template.utility.Execute等关键字的POST请求，同时限制应用服务器执行系统命令权限，禁用不必要的模板引擎功能。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "金和 OA FreeMarker模板注入漏洞"
updated = "0725"

