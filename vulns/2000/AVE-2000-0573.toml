[basic]
description = "CUPS（Common Unix Printing System）1.04及更早版本中的IPP（Internet Printing Protocol）请求处理组件存在输入验证缺陷，远程攻击者可通过向目标系统发送特制的畸形IPP数据包触发该漏洞，导致CUPS服务进程崩溃，造成拒绝服务。该漏洞影响CUPS 1.04及之前版本，CVSS评分5.0，危害等级中危。攻击无需身份认证，通过网络即可远程利用，但无法实现代码执行或数据窃取。"
published = "2000-06-21T04:00:00.000"
remediation = "升级 CUPS 至 1.1.4 或更高版本，该版本修复了畸形 IPP 请求导致的拒绝服务问题。如无法升级，可在网络边界防火墙或 iptables 中限制对 UDP/TCP 端口 631 (IPP) 的访问，仅允许可信来源连接。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Easy Software Products CUPS IPP请求拒绝服务漏洞"
updated = "2026-06-16T21:51:53.397"

