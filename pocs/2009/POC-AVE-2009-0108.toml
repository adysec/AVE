[info]
author = "ave"
description = "AVE-2009-0108 verification"
id = "POC-AVE-2009-0108"
name = "PoC for AVE-2009-0108"
severity = "medium"
tags = ["ave-2009-0108"]
vuln_id = ["AVE-2009-0108"]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/test.php"
protocol = "http"

[poc.requests.headers]
User-Agent = "AVE/1.0"

[[poc.requests.matchers]]
expect = true
status = [200]
type = "status"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["test"]
