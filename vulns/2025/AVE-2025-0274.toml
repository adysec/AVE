[basic]
description = "汉王人脸识别管理系统 `/manage/authMultiplePeople/getValidEmpForGroup.do` 接口存在 SQL 注入漏洞。攻击者可在未授权的情况下，通过构造恶意的 `order` 参数，利用 `UPDATEXML` 函数实施报错注入，从而获取数据库中的敏感信息（如管理员凭证、用户数据等）。攻击只需向目标服务器发送特制 HTTP 请求即可触发，无需任何身份认证，危害较大。"
published = "0710"
remediation = "建议升级汉王管理系统至最新安全版本，对 getValidEmpForGroup.do 接口的 recoToken、page、pageSize、order 参数实施严格的白名单校验和参数化查询，禁止将用户输入直接拼接 SQL 语句。临时缓解措施可在 WAF 或反向代理层配置规则，拦截包含 UPDATEXML、EXTRACTVALUE、CONCAT 等 SQL 函数关键词的请求参数。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "汉王 管理系统 getValidEmpForGroup.do SQL注入漏洞"
updated = "0710"

