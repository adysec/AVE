[basic]
description = "Gene6 G6 FTP Server 2.0（又名 BPFTP Server 2.10）存在用户凭证泄露漏洞。当用户查询位于网络共享上的文件信息时，服务器会向共享所在主机发送 NETBIOS 认证凭据，攻击者可通过嗅探同一网络段上的通信流量捕获这些凭据，进而获取目标系统的访问权限。该漏洞影响 Gene6 G6 FTP Server 2.0 版本，攻击者只需与受影响的 FTP 服务器建立连接并请求网络共享路径上的文件信息即可触发。"
published = "2001-06-18T04:00:00.000"
remediation = "升级 Gene6 G6 FTP Server 至 2.2 以上版本以修复凭证泄露问题；如在关键业务中无法升级，建议在 FTP 服务器上禁用 NetBIOS over TCP/IP，并在防火墙层面限制对 FTP 服务器 21 端口的访问仅允许受信来源 IP，同时启用 TLS/SSL 加密传输保护所有认证流量。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Gene6 G6 FTP Server 用户凭证泄露漏洞"
updated = "2026-06-16T21:53:59.387"

