[basic]
description = "XFree86 及其他 X11 实现（包括 Gnome 1.0/1.1、Open Group X11R6 3.3.3-4.0）中的 libICE 库存在拒绝服务漏洞。SKIP_STRING 宏未对用户指定的大数值进行正确边界检查，远程攻击者可通过发送特制的 X11 请求触发该漏洞，导致目标系统上的 X11 服务崩溃，造成拒绝服务。该漏洞影响范围广泛，CVSS 评分 5.0，危害等级中危。"
published = "2000-06-19T04:00:00.000"
remediation = "升级至 XFree86 4.0.1 或更高版本，该版本已修复 libICE 中 SKIP_STRING 宏的超长值边界检查问题。如无法升级，在启动 X 服务时添加 -nolisten tcp 参数禁用远程 ICE 连接，或配置防火墙限制对 X 服务端口（6000/TCP）的访问。现代 Linux 发行版建议直接迁移至 X.Org 服务器以替代已停止维护的 XFree86。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "XFree86 libICE SKIP_STRING 远程拒绝服务漏洞"
updated = "2026-06-16T21:51:52.550"

