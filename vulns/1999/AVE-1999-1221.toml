[basic]
description = "SGI IRIX 6.4 系统中的 startmidi 程序存在本地权限提升漏洞，属于符号链接攻击类型。该程序在运行时以较高权限创建或写入临时文件，却未对目标路径进行安全校验，本地普通用户可预先建立指向系统关键文件（如 /etc/passwd 或 setuid 二进制）的符号链接，诱使 startmidi 以特权身份向链接目标写入内容，从而篡改任意文件。攻击需攻击者具备目标主机的本地登录权限，并能在程序执行前布置恶意符号链接，利用门槛较低但仅限本地。成功利用后攻击者可修改受保护文件实现权限提升，获取 root 权限，影响所有运行 IRIX 6.4 的 SGI 设备。"
published = "1997-02-01T05:00:00.000"
remediation = "建议升级到 SGI 官方发布的 IRIX 6.4 补丁（如 6.4 后续 Maintenance Release 或相应 patch 版本，可通过 Software Manager 安装）。若暂无法升级，可将 /usr/sbin/startmidi 权限改为 0700 或直接从系统中移除该程序，并限制普通用户对相关目录的写权限，避免符号链接攻击被利用。"
score = 7.2
severity = "HIGH"
sources = ["exploitdb"]
title = "SGI IRIX 6.4 startmidi 本地权限提升漏洞"
updated = "2026-06-16T21:49:24.607"

