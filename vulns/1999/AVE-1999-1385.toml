[basic]
description = "Solaris 2.5.1 及更早版本的 eeprom 命令存在栈缓冲区溢出漏洞，本地攻击者可通过传递超长命令行参数触发栈溢出，覆盖返回地址并执行任意代码，从而将权限提升至 root。该漏洞影响 Solaris 2.5.1 及更早版本，攻击者需具备本地登录权限，通过构造超长参数字符串触发栈溢出劫持控制流，最终获取 root 权限实现本地提权。"
published = "1997-06-24T04:00:00.000"
remediation = "升级 Sun Solaris 至 2.6 或 Solaris 7 及以上已修复版本（相应补丁为 103630/103630-12 等）。如无法立即升级，应限制普通用户对 eeprom 命令的执行权限（如移除 setuid 位或用 sudo 限定授权用户），并强化本地账户访问控制以缓解本地提权风险。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
