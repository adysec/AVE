[basic]
description = "Caldera OpenLinux 2.3 默认安装中包含 rpm_query CGI 程序，该程序未对访问来源进行有效身份验证与权限控制，导致远程攻击者无需任何认证即可通过 HTTP 请求直接查询系统已安装的软件包列表。攻击者可利用此信息了解系统软件环境，为进一步渗透提供情报支撑。该漏洞影响 Caldera OpenLinux 2.3 默认安装版本。"
published = "2000-03-05T05:00:00.000"
remediation = '立即删除或移动 /cgi-bin/rpm_query CGI 脚本，或通过 Apache 配置 <Directory> 与 <Files> 指令拒绝对该脚本的访问：在 httpd.conf 中添加 <Files "rpm_query"> Deny from all </Files>。如无法删除，可升级至更新版本的操作系统或迁移至受支持的 Linux 发行版。'
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Caldera OpenLinux 2.3 rpm_query CGI 信息泄露漏洞"
updated = "2026-06-16T21:51:11.600"

