[basic]
description = 'Lotus Notes 4.5 客户端存在加密邮件明文传输漏洞。当用户发送加密邮件但未设置"Encrypt Saved Mail"首选项时，客户端会将加密邮件的副本以明文形式在网络上传输，导致加密保护失效。远程攻击者可通过网络嗅探方式捕获并读取本应加密的邮件内容，造成敏感信息泄露。该漏洞影响 Lotus Notes 4.5 及可能的相关版本，攻击条件简单，只需攻击者处于同一网络段。官方建议用户启用"Encrypt Saved Mail"首选项以缓解风险。'
published = "1999-03-01T05:00:00.000"
remediation = '在 Lotus Notes 4.5 客户端中，依次进入"文件→偏好设置→邮件"，勾选"Encrypt Saved Mail"选项以强制加密已保存邮件。建议升级至 Lotus Notes 5.0 或更高版本，新版默认启用此安全选项。如无法升级，可在邮件服务器和客户端之间启用 SSL/TLS 加密传输作为额外缓解措施。'
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "Lotus Notes 客户端加密邮件明文传输信息泄露漏洞"
updated = "2026-06-16T21:48:22.620"

