[basic]
description = "LCDProc 0.4 版本中存在缓冲区溢出漏洞，远程攻击者可通过向目标服务发送特制的 screen_add 命令触发该漏洞，导致缓冲区溢出，从而以 root 权限执行任意代码。该漏洞影响 LCDProc 0.4 及更早版本，攻击者无需身份认证即可远程利用，危害严重。"
published = "2000-04-21T04:00:00.000"
remediation = "立即升级 LCDproc 至 0.4.1 及以上版本（最新稳定版为 0.5.7），该漏洞在 0.4.1 中已修复。如无法立即升级，可在防火墙层面限制仅受信任 IP 访问 LCDproc 监听端口（默认 13666），并避免以 root 权限运行 LCDproc 守护进程以降低提权风险。"
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "LCDProc 0.4 远程缓冲区溢出漏洞"
updated = "2026-06-16T21:51:25.167"

