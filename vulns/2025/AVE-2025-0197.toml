[basic]
description = "微助教课堂管理系统 Indexs 模块存在任意文件读取漏洞，由于系统未对用户请求的文件路径进行有效过滤与权限校验，未经授权的攻击者可构造特制请求绕过权限验证，读取服务器上的任意敏感文件（如配置文件、数据库连接信息等），导致敏感信息泄露，进一步可扩大攻击面。该系统广泛应用于高校教学场景，影响范围较大。"
published = "2025-07-02"
remediation = "建议立即升级微助教课堂管理系统至官方最新版本，修复 Indexs 接口未授权访问问题。同时配置 Web 服务器（如 Nginx/Apache）限制对敏感文件目录的直接访问，对文件读取参数进行严格的白名单校验，禁止路径穿越字符（如 ../），并确保所有文件操作接口均需身份认证与权限校验。"
score = 5.5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "微助教课堂管理系统 Indexs 模块任意文件读取漏洞"
updated = "2025-07-02"

