[basic]
description = "HP Web JetAdmin 5.6 的 Web 接口服务器存在目录遍历漏洞，远程攻击者可通过向目标系统发送包含 `..`（点点）序列的特制 HTTP 请求，绕过路径限制读取服务器上的任意文件。该漏洞影响 HP Web JetAdmin 5.6 及更早版本，CVSS 评分 7.5，危害等级高。攻击者无需身份认证即可利用，可能导致敏感信息泄露（如配置文件、密码文件等）。ExploitDB 已公开该漏洞的利用代码，进一步降低了攻击门槛。"
published = "2000-05-24T04:00:00.000"
remediation = "HP Web JetAdmin 5.6 已停止维护，建议立即升级到受支持的 HP JetAdvantage Management 或迁移至其他现代设备管理方案。如无法升级，可在防火墙层面限制对端口 8000 的访问，仅允许受信任管理 IP 连接，并禁用 web 接口中的 CGI 目录遍历功能作为临时缓解措施。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "HP Web JetAdmin 目录遍历漏洞"
updated = "2026-06-16T21:51:44.673"

