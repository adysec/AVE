[basic]
description = "Canna输入系统的uum程序存在缓冲区溢出漏洞。由于uum程序以SUID root权限安装，攻击者可通过'-D'选项传入超长用户数据触发栈溢出，从而执行任意代码并获取root权限。该漏洞影响IRIX 6.5、Solaris 7.0、Turbolinux 4.2等系统。"
published = "1999-11-02T05:00:00.000"
remediation = "立即移除 uum 程序的 setuid 权限位（chmod u-s /usr/bin/uum），防止本地用户通过缓冲区溢出提权。如无需 Canna 输入法，直接卸载该软件包。受影响系统应联系厂商获取安全补丁或升级到已修复该漏洞的操作系统版本。"
score = 7.2
severity = "HIGH"
sources = ["exploitdb"]
title = "IRIX、Solaris、Turbolinux Canna输入系统uum程序本地缓冲区溢出漏洞"
updated = "2026-06-16T21:49:23.260"

