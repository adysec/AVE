[basic]
description = "Elm 邮件客户端 2.4 及更早版本（含 2.3）在处理环境变量时存在缓冲区溢出漏洞。该程序在读取 TERM 环境变量时未对输入长度进行边界校验，本地用户可通过在 shell 中设置超长的 TERM 环境变量后启动 Elm，使恶意构造的数据覆盖栈上返回地址，从而以 Elm 进程权限（通常为目标用户权限）执行任意代码并提升本地权限。该漏洞影响采用受影响版本 Elm 的本地系统用户，攻击前提是攻击者已拥有目标系统的本地登录权限，利用方式简单，仅需设置环境变量即可触发，CVSS 基础评分约为 4.6，危害等级为中。"
published = "1997-05-13T04:00:00.000"
remediation = "建议立即升级到 Elm 2.5 或更高版本（该版本已修复 TERM 环境变量缓冲区溢出）。如无法立即升级，可在 /etc/profile 或用户 shell 配置中对 TERM 变量长度做限制（如 truncate 至 40 字符以内），并避免以特权用户运行 elm；临时缓解可在 setuid 环境中用 env -u TERM 方式启动，移除 TERM 变量传入。"
score = 4.6
severity = "MEDIUM"
sources = ["avd"]
