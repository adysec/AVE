[basic]
description = "用友时空KSOA企业管理系统PrintZPZP.jsp接口的zpshqid参数存在SQL注入漏洞，攻击者可在未经授权的情况下通过构造恶意SQL语句注入到后台数据库查询中，导致数据库敏感信息泄露，包括管理员账号密码、业务数据等。攻击者仅需能够访问该接口即可利用，无需额外权限。"
published = "2024-01-01"
remediation = "限制/kp/PrintZPZP.jsp接口的访问来源IP，对zpshqid参数实施严格的参数化查询或输入过滤，删除不必要的PrintZPZP.jsp文件或迁移至认证后才能访问的路径。"
score = 5.0
severity = "MEDIUM"
sources = ["hwpoc"]
title = "用友时空KSOA系统接口PrintZPZP.jsp存在SQL注入漏洞"
updated = "2026-07-20"

