[basic]
description = "汉王人脸识别管理系统 `/manage/authMultiplePeople/queryManyPeopleGroupList.do` 接口存在 SQL 注入漏洞，攻击者无需认证即可通过 `order` 参数注入恶意 SQL 语句（如 UPDATEXML 函数），可导致数据库敏感信息泄露、数据篡改甚至服务器被进一步控制。该漏洞影响汉王多款人脸识别考勤管理设备，攻击条件低，危害较大。"
published = "0704"
remediation = "建议立即联系汉王厂商获取安全补丁或升级至修复版本。如需自行修复，在服务端对 `order` 参数进行白名单校验，仅允许预定义的排序字段名通过；同时将所有数据库查询改为参数化查询（PreparedStatement），禁止直接拼接 SQL 语句。临时缓解措施可在 WAF 或反向代理层拦截含 `UPDATEXML`、`EXTRACTVALUE` 等 SQL 函数的关键字请求。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "汉王管理后台queryManyPeopleGroupList.do接口SQL注入漏洞"
updated = "0704"

