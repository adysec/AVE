[basic]
description = "KDE 1.1.2 的 KApplication 类在配置文件管理功能中存在安全漏洞，本地攻击者可通过创建特制符号链接或利用配置文件处理逻辑缺陷，覆盖系统上的任意文件，从而实现对敏感文件（如用户配置文件、系统脚本等）的写入操作。成功利用此漏洞的攻击者可提升权限至目标用户身份，进而执行任意命令。该漏洞影响 KDE 1.1.2 版本，CVSS 评分 7.2，危害等级高危。"
published = "2000-05-31T04:00:00.000"
remediation = "升级到 KDE 1.1.2 之后的修复版本（如 KDE 1.2 及以上）。临时缓解措施：以 root 身份执行 `chmod 1777 /tmp` 并确保临时文件创建使用安全模式（O_CREAT|O_EXCL），避免 KApplication 以 root 权限覆盖任意文件；普通用户切勿在特权环境下运行 KDE 组件。"
score = 7.2
severity = "HIGH"
sources = ["exploitdb"]
title = "KDE KApplication 配置文件本地权限提升漏洞"
updated = "2026-06-16T21:51:55.997"

