[info]
author = "ave"
description = "检测 HP-UX 系统上 registrar 日志文件是否存在，确认 HP resource monitor 服务安装状态以验证 CVE-2000-1127 漏洞的攻击条件。受影响系统：HP-UX 10.20。"
id = "POC-AVE-2000-0818"
name = "HP-UX registrar 本地任意文件读取漏洞 PoC"
severity = "low"
tags = ["ave-2000-0818"]
vuln_id = [
    "CVE-2000-1127",
    "AVE-2000-0818",
]

[poc]
logic = "all"

[[poc.requests]]
path = "/etc/opt/resmon/registrar"
protocol = "file"

[[poc.requests.matchers]]
expect = true
part = "body"
regex = ".+"
type = "regex"
