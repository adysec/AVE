[basic]
description = "download.cgi 1.0 存在路径遍历漏洞，远程攻击者可通过向 f 参数传入 `../` 等目录跳转序列，绕过访问限制读取服务器上的任意文件。该漏洞源于程序未对用户输入的文件路径进行充分过滤和规范化处理，攻击者无需身份认证即可利用，可能导致敏感配置文件、系统文件等泄露。影响运行 Matt Wright's download.cgi 1.0 的 Web 服务器。"
published = "1999-09-09T04:00:00.000"
remediation = "立即停止使用 Matt Wright 的 download.cgi 1.0 脚本，该脚本已停止维护且无安全更新。彻底删除服务器上所有 download.cgi 文件，或通过 Web 服务器配置（如 Apache 的 <Location> 指令）限制对该脚本的访问。如必须使用，在 CGI 脚本中对 f 参数进行路径规范化过滤，拒绝包含 ../ 或 %2e%2e/ 等目录遍历序列的输入。"
score = 5
severity = "MEDIUM"
