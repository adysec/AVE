[basic]
description = "PHP/FI 2.0 的 php.cgi 脚本存在目录遍历漏洞，远程攻击者可通过向目标系统发送特制的 HTTP 请求，利用路径遍历技术读取服务器上的任意文件，包括敏感配置文件、密码文件等。该漏洞影响 PHP/FI 2.0 版本，攻击者无需认证即可利用，危害较大。"
published = "1997-08-01T04:00:00.000"
remediation = "立即移除或禁用 PHP/fi 2.0 中的 php.cgi 脚本，升级至 PHP 3.0 或更高版本（PHP 3.0 起已重写架构并修复此目录遍历问题）。如无法升级，在 Web 服务器配置中限制 php.cgi 仅访问指定目录，或通过 .htaccess / httpd.conf 禁止直接访问该脚本。"
score = 10
severity = "CRITICAL"
sources = ["exploitdb"]
title = "PHP PHP/fi 2.0 目录遍历漏洞"
updated = "2026-06-16T21:47:58.650"

