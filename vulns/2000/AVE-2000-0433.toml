[basic]
description = "Stelian Pop dump 0.4 及更早版本中的 restore 程序存在缓冲区溢出漏洞，由于对磁带名称输入长度缺乏边界检查，本地攻击者可通过传递超长的磁带名称参数覆盖栈缓冲区，从而执行任意代码并提升权限。该漏洞影响 dump 软件包 0.4b17 及之前版本，攻击向量为本地（AV:L），利用复杂度低（AC:L），无需认证（Au:N），可导致机密性、完整性、可用性完全丧失（C:C/I:C/A:C），CVSS 评分 7.2。攻击者需具备本地系统访问权限，通过构造恶意磁带名称参数调用 restore 程序触发溢出，进而获得进程权限执行任意命令。"
published = "2000-06-07T04:00:00.000"
remediation = "建议立即升级 dump 包至 0.4b18 或更高版本（Stelian Pop dump 修复了 restore 程序的缓冲区溢出）。若无法立即升级，可通过以下缓解措施降低风险：1) 限制 restore 命令仅允许 root 或受信用户执行（chmod 700 /usr/sbin/restore）；2) 使用 sudo 限制普通用户执行 restore；3) 监控异常长磁带名称参数的调用日志；4) 考虑替换为 GNU tar 或其他维护中的备份工具。"
score = 7.2
severity = "HIGH"
sources = ["epss"]
title = "Stelian Pop dump 缓冲区溢出漏洞"
updated = "2026-06-16T21:51:54.720"

