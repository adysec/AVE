[basic]
description = "Windows NT 4.0 操作系统的 SNMP 代理服务存在内存泄漏漏洞，Service Pack 5 之前的所有版本均受影响。未经身份认证的远程攻击者可以通过向目标系统发送大量 SNMP 查询请求，导致 SNMP 代理持续分配内存但无法正确释放，最终造成系统内存耗尽，引发拒绝服务。该漏洞影响所有运行受影响版本 Windows NT 4.0 的服务器和工作站，攻击者可利用工具自动化发送海量查询，使系统响应变慢甚至完全不可用。"
published = "1999-12-31"
remediation = "安装 Windows NT 4.0 Service Pack 5 或更高版本以修复 SNMP 代理内存泄漏问题，相关补丁可通过 Microsoft 知识库文章 KB Q196270 获取。若环境中不需要 SNMP 服务，建议直接禁用 SNMP 代理服务以消除攻击面。"
score = 5.0
severity = "MEDIUM"
sources = ["cve"]
title = "Windows NT 4.0 SNMP 代理服务内存泄漏拒绝服务漏洞"
updated = "2026-06-16"

