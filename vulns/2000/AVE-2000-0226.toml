[basic]
description = "QNX 4.25 A 的 crypt() 密码加密函数使用了弱加密算法，本地攻击者可通过分析加密后的密码哈希值，利用加密算法弱点进行解密还原明文密码，从而获得其他用户（包括 root）的登录凭证，实现本地权限提升。该漏洞影响 QNX 4.25 A 版本，需要本地访问权限方可利用。"
published = "2000-04-14T04:00:00.000"
remediation = "建议升级至 QNX Neutrino 6.3 及以上版本，这些版本使用更强的 MD5 或 SHA 密码哈希算法替代原有的弱加密。如无法升级，可通过限制控制台/SSH 登录用户为受信任管理员，并启用系统审计日志监控 `/etc/shadow` 文件的异常读取行为作为临时缓解。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "QSSL QNX 4.25 crypt 函数弱加密本地权限提升漏洞"
updated = "2026-06-16T21:51:19.307"

