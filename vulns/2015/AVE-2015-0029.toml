[basic]
description = "Bonita BPM Portal 6.5.3 之前版本中存在目录遍历漏洞（CWE-22）。远程攻击者无需身份认证即可通过向 bonita/portal/themeResource 接口发送特制请求，在 theme 参数中使用 ../ 路径穿越序列并在 location 参数中指定目标文件路径，从而读取服务器上的任意文件。该漏洞仅影响机密性，攻击复杂度低，利用方式简单，已有公开 PoC 和利用代码。"
published = "2015-06-18T18:59:01.303"
remediation = "将 Bonita BPM Portal 升级至 6.5.3 或更高版本。如无法立即升级，在 Web 服务器（如 Apache/Nginx）层面配置访问规则，限制对 `/bonita/portal/themeResource` 路径的 `theme` 和 `location` 参数中 `../` 序列的传入，或通过 WAF 规则拦截路径遍历攻击载荷。"
score = 5
severity = "MEDIUM"
sources = ["nuclei"]
title = "Bonita BPM Portal 路径遍历漏洞"
updated = "2026-06-17T00:26:28.037"

