[basic]
description = "Corel Linux OS 1.0 的 get_it 程序存在路径信任漏洞，该程序以 root 权限执行 cp 命令时未指定完整路径，而是直接调用系统 PATH 环境变量中的 cp 程序。本地攻击者可通过修改 PATH 环境变量，将其指向恶意的 cp 可执行文件，从而在 get_it 执行过程中以 root 权限运行任意代码。该漏洞影响 Corel Linux OS 1.0 版本，需要本地用户权限作为攻击前提，危害等级较高。"
published = "2000-01-12T05:00:00.000"
remediation = "升级到 Corel Linux OS 1.1 或更高版本（该版本已修复 get_it 未使用绝对路径调用 cp 的问题）。如无法升级，手动编辑 /usr/bin/get_it 脚本，将其中 cp 命令改为 /bin/cp 绝对路径；同时移除 get_it 的 setuid 位：chmod u-s /usr/bin/get_it。建议迁移至仍受支持的 Linux 发行版。"
score = 7.2
severity = "HIGH"
sources = ["epss"]
title = "Corel Corel Linux OS 本地权限提升漏洞"
updated = "2026-06-16T21:50:53.630"

