[basic]
description = "Apache Tomcat 存在敏感信息泄露漏洞（CWE-209），当服务器在处理 HTTP 请求时发生错误，Tomcat 会返回包含详细异常信息的错误页面。攻击者可通过发送特制的畸形请求或利用请求走私技术，触发服务器返回包含内部路径、堆栈跟踪、配置参数等敏感信息的错误响应。该漏洞影响 Apache Tomcat 8.5.7 至 8.5.63 及 9.0.0-M11 至 9.0.43 版本，攻击者无需身份验证即可远程利用。成功利用后，攻击者可获取系统内部结构信息，为进一步攻击提供情报支持。建议用户升级至 8.5.64 或 9.0.44 及更高版本进行修复。"
published = "2024-01-19T11:15:08.043"
remediation = "建议立即将 Apache Tomcat 升级至 8.5.64 及以上版本或 9.0.44 及以上版本，新版本已修复错误响应中泄露敏感信息的问题。如暂无法升级，可在前端反向代理（如 Nginx/Apache HTTPD）层面对后端 Tomcat 的响应进行拦截与重写，隐藏包含堆栈或内部路径的错误信息，并关闭不必要的默认错误页面作为临时缓解。"
score = 5.3
severity = "MEDIUM"
sources = ["hwpoc"]
title = "Apache Tomcat 错误信息敏感数据泄露漏洞"
updated = "2026-06-17T07:10:02.277"

