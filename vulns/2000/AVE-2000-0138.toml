[basic]
description = "SCO Unixware 7.1 及 7.1.1 版本中 ARCserver 组件在处理 /tmp 目录下的临时文件时存在不安全的符号链接（symlink）漏洞。本地攻击者可通过创建恶意符号链接指向目标系统文件，诱导 ARCserver 进程在写入临时文件时覆盖或修改任意系统文件，导致权限提升或系统破坏。该漏洞利用条件要求攻击者拥有本地访问权限，CVSS 评分 1.2，危害等级低。"
published = "2000-02-16T05:00:00.000"
remediation = "建议安装 SCO 针对 UnixWare 7.1/7.1.1 的 ARCserve 组件安全补丁，或升级到不受影响的更高版本。临时缓解措施包括：限制本地用户对 /tmp 目录的写权限，避免 ARCserve 进程使用可预测的临时文件名，将 ARCserve 服务切换到专用非特权用户运行以降低提权风险。"
score = 1.2
severity = "LOW"
sources = ["epss"]
title = "SCO UnixWare ARCserver 本地符号链接漏洞"
updated = "2026-06-16T21:51:06.770"

