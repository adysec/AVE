[basic]
description = "DCForum 的 cgforum.cgi CGI 脚本存在任意文件读取漏洞，远程攻击者可通过向目标系统发送包含畸形 'forum' 变量的 HTTP 请求，绕过访问控制读取服务器上任意文件内容，甚至可删除程序自身。该漏洞影响 DCForum 1-6 版本，攻击者无需身份认证即可远程利用，对系统机密性和完整性构成严重威胁。"
published = "2001-01-09T05:00:00.000"
remediation = '立即升级 DCForum 至官方发布的修复版本（如已不可获取则手动修补 cgforum.cgi），在脚本入口处对 forum 参数做严格过滤，拒绝含 `../`、`..\\`、空字节及非字母数字的异常输入；同时在 Web 服务器层禁用对该 CGI 脚本的访问或限制其可读取目录范围。由于 DCForum 已停止维护，建议迁移至活跃更新的论坛系统。'
score = 6.4
severity = "MEDIUM"
sources = ["exploitdb"]
title = "DCForum cgforum.cgi 任意文件读取漏洞"
updated = "2026-06-16T21:53:13.103"

