[basic]
description = "Linux 内核 2.0.3x 版本的 ping 命令在处理带有 -R（record route）选项的特大网络包时存在缺陷，本地攻击者可通过发送超长的带路由记录选项 ICMP 数据包触发该漏洞，导致系统 ping 进程崩溃或内核资源耗尽，从而造成拒绝服务。该漏洞影响 Linux Kernel 2.0.x 至 2.0.38 版本，包括 Debian 2.1、RedHat 5.2 等早期发行版，攻击条件为攻击者已拥有本地用户权限，无需远程网络交互即可复现。"
published = "1999-12-08T05:00:00.000"
remediation = "建议将 Linux 内核升级到 2.0.39 及以上版本（Debian 用户升级至 2.0.39 对应的 kernel-image 软件包，RedHat 5.2 用户安装官方提供的 kernel 更新 RPM），该版本已修复 ping 处理带 -R 选项大包时的拒绝服务问题。如无法立即升级内核，可在防火墙或主机安全策略层面禁止普通用户使用 ping 的原始套接字（移除 /bin/ping 的 setuid 权限或限制用户执行 ping），并临时禁用 ICMP 记录路由选项作为缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Linux Kernel 2.0.x ping 记录路由选项拒绝服务漏洞"
updated = "2026-06-16T21:49:27.963"

