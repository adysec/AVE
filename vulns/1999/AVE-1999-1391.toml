[basic]
description = "Windows 95/98 中当多个 TCP/IP 栈绑定到相同 MAC 地址时，存在协议栈协调缺陷。攻击者可远程发送特定 ICMP 回显数据包触发流量放大效应，导致所有 TCP/IP 栈同时响应，造成系统严重拥塞和拒绝服务。该漏洞无需认证即可利用，对 Windows 95/98 网络服务可用性构成严重威胁。"
published = "1999-02-06T05:00:00.000"
remediation = "修复该漏洞的核心措施是确保每块网卡仅绑定一个 TCP/IP 协议栈：打开「控制面板」→「网络」配置，逐一检查每块网卡的「已绑定的协议」列表，若发现「TCP/IP」出现多次，删除多余的绑定项，仅保留一个后重启系统即可消除漏洞触发条件。由于 Windows 95/98 已终止支持且无法获取官方补丁，建议尽快将受影响系统升级至受支持的 Windows 版本（如 Windows 10/11）。在升级完成前，可在边界路由器或防火墙上启用 ICMP 速率限制和入口过滤（BCP 38），限制 ICMP echo 请求的频率，以临时缓解流量放大攻击。"
score = 5
severity = "MEDIUM"
