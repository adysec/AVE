[basic]
description = "Windows Media Services 4.0 及 4.1 版本在处理客户端握手数据包序列时存在逻辑缺陷，远程攻击者无需身份认证即可通过发送乱序的握手请求包触发该漏洞，导致目标 Media 服务崩溃或停止响应，造成拒绝服务。该漏洞影响 Microsoft Windows Media Services 相关系统，攻击条件低，只需网络可达即可利用。"
published = "2000-02-23T05:00:00.000"
remediation = "立即安装 Microsoft 安全公告 MS00-013 提供的补丁：Windows NT Server 4.0 用户下载 WMSU4954_NT4.EXE，Windows 2000 Server 用户下载 WMSU4954_Win2000.EXE，升级 Windows Media Services 至 4.1 版本后安装补丁。重启 Windows Media Unicast Service 服务可临时恢复运行，但需安装补丁彻底修复。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Microsoft Windows Media Services 4.0/4.1 握手序列拒绝服务漏洞"
updated = "2026-06-16T21:51:14.050"

