[basic]
description = "SuSE Linux 5.2 的 PLP lpc 程序存在缓冲区溢出漏洞，本地攻击者可通过向 lpc 程序发送特制的输入数据触发栈缓冲区溢出，从而以 root 权限执行任意代码。该漏洞影响 SuSE Linux 5.2 版本，CVSS 评分 7.2，危害等级高。利用该漏洞需要攻击者拥有本地系统访问权限。"
published = "1999-02-02T05:00:00.000"
remediation = "升级至 S.u.S.E. Linux 5.3 或更高版本，该漏洞已在后续版本中修复。临时缓解措施：移除 lpc 程序的 setuid root 权限，执行 `chmod u-s /usr/sbin/lpc`，限制本地普通用户以 root 权限执行 lpc 命令，降低提权风险。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "SuSE Linux 5.2 lpc 缓冲区溢出本地权限提升漏洞"
updated = "2026-06-16T21:48:14.117"

