[basic]
description = "Yamaha MidiPlug 1.1 b-j 版本存在缓冲区溢出漏洞，攻击者可通过向 EMBED 标签中的 Text 变量传递超长字符串触发该漏洞，导致目标系统拒绝服务或执行任意代码。该漏洞影响 Yamaha MidiPlug 1.1 b-j 版本，CVSS 评分 5.1，危害等级中危。攻击者需诱使用户访问包含恶意 EMBED 标签的页面以完成利用。"
published = "1999-11-02T05:00:00.000"
remediation = '立即卸载 Yamaha MidiPlug 1.1 b-j 组件，通过控制面板"添加/删除程序"执行卸载。如无法卸载，手动删除注册表 HKEY_LOCAL_MACHINE\SOFTWARE\Yamaha\MidiPlug 项及浏览器插件目录中的 MidiPlug.dll 文件。临时缓解措施：在浏览器中禁用 ActiveX 控件执行权限，或使用组策略阻止 EMBED 标签加载 MidiPlug 插件。建议迁移至 Web MIDI API 等现代方案替代该过时组件。'
score = 5.1
severity = "MEDIUM"
sources = ["epss"]
title = "Yamaha MidiPlug 缓冲区溢出漏洞"
updated = "2026-06-16T21:49:23.023"

