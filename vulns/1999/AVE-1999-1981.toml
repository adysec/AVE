[basic]
description = "BisonWare BisonFTP Server 4.1 之前版本存在缓冲区溢出漏洞。未经身份认证的远程攻击者可通过向 FTP 服务发送超长的 USER、LIST 或 CWD 命令触发栈缓冲区溢出，导致服务拒绝服务，在特定条件下可进一步实现远程代码执行。该漏洞影响 BisonFTP Server 3.5 及更早版本，CVSS 评分 7.5，危害等级高。目前已存在公开的 Metasploit 利用模块，增大了被攻击风险。"
published = "1999-05-17T04:00:00.000"
remediation = "立即升级 BisonWare FTP Server 至 4.1 或更高版本，该版本已修复 USER、LIST、CWD 命令的缓冲区溢出漏洞。如无法升级，建议在防火墙上限制仅允许可信 IP 访问 FTP 服务（21/TCP），并禁用匿名用户登录权限作为临时缓解措施。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "BisonWare BisonFTP Server 远程缓冲区溢出漏洞"
updated = "2026-06-16T21:50:35.723"

