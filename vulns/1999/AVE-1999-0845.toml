[basic]
description = "Windows NT 系统的注册表审计策略存在缺陷，系统未对非关键注册表键的访问事件记录成功或失败的审计日志。该漏洞导致对这些注册表键值的修改、创建或删除操作无法被安全日志捕获，使得管理员无法通过审计日志追踪对非关键注册表项的未授权更改。攻击者可能利用此审计缺失，在未留下可追溯痕迹的情况下修改系统配置或注册表项，降低系统的审计完整性和安全可见性，间接增加了后续攻击活动的隐匿性和成功概率。"
published = "1999-01-01T05:00:00.000"
remediation = "建议安装 Windows NT 4.0 Service Pack 6a 及后续安全更新。通过域安全策略或本地安全策略启用「审计对象访问」，覆盖所有注册表项；针对非关键注册表项手动配置审核条目，如使用注册表编辑器为关键项添加 SYSTEM 审计访问。无法立即修复时部署第三方注册表监控工具（如 Sysinternals Regmon）补充审计缺失。"
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "Microsoft Windows NT 注册表审核策略日志记录缺失漏洞"
updated = "2026-06-16T21:48:40.243"

