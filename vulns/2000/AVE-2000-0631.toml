[basic]
description = "Windows 2000 的 Still Image Service（静止图像服务）存在缓冲区溢出漏洞，本地攻击者可通过向该服务发送超长的 WM_USER 消息触发缓冲区溢出，导致以内核权限执行任意代码，实现本地权限提升。该漏洞影响 Windows 2000 系统，攻击者需拥有本地用户登录权限，无法远程利用，CVSS 评分 4.6，危害等级中危。"
published = "2000-11-14T05:00:00.000"
remediation = 'Windows 2000 已停止支持，官方不再提供安全更新。建议立即禁用 Still Image Service（stisvc）服务（services.msc → 右键停止服务并设置启动类型为"已禁用"），同时通过本地安全策略限制仅允许受信任用户进行交互式登录。如业务条件允许，应升级至仍在支持周期内的 Windows 版本。'
score = 4.6
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Microsoft Windows 2000 Still Image Service 权限提升漏洞"
updated = "2026-06-16T21:52:36.020"

