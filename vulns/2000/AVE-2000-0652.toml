[basic]
description = "International Telecommunications WebBBS 论坛系统存在缓冲区溢出漏洞，攻击者可通过向 WebBBS 服务器发送精心构造的超长参数或请求数据，触发栈缓冲区溢出，覆盖返回地址或函数指针，从而在服务器进程上下文中执行任意代码。该漏洞影响 International Telecommunications WebBBS 早期版本，攻击者无需身份认证即可远程发起攻击，通过构造恶意 HTTP 请求或表单参数触发缓冲区溢出，获取服务器控制权限，可导致服务器完全沦陷、数据窃取或进一步横向渗透。攻击条件为目标服务器运行受影响版本的 WebBBS 且 Web 服务对外开放，攻击者仅需发送恶意构造的 HTTP 请求即可触发。厂商已发布补丁修复该缓冲区溢出漏洞，建议升级至修复版本。"
published = "2000-06-19"
remediation = "建议升级 International Telecommunications WebBBS 至 4.30 或更高版本，该版本修复了 POST 请求中长字符串导致的缓冲区溢出漏洞。如无法立即升级，可通过 Web 服务器配置限制 POST 请求体大小（如 Apache LimitRequestBody 102400）或在 Web 应用防火墙层面拦截超长 POST 请求作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "International Telecommunications WebBBS 缓冲区溢出代码执行漏洞"
updated = "2000-06-19"

