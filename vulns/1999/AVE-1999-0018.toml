[basic]
description = "Netmanager Chameleon SMTPd 存在缓冲区溢出漏洞，远程攻击者可通过向目标 SMTP 服务发送特制的请求数据触发该漏洞，导致服务进程崩溃，造成拒绝服务。该漏洞影响 Netmanager Chameleon SMTPd 相关版本，CVSS 评分 5.0，危害等级中等。"
published = "1999-03-01T05:00:00.000"
remediation = "建议立即将 Netmanage Chameleon SMTPd 替换为受支持的 SMTP 服务器软件（如 Postfix 或 Exchange Server），因原厂商 NetManage 已停止运营且无安全补丁发布。无法立即替换时，在边界防火墙上限制仅允许内部可信 IP 访问 TCP 25 端口，并部署 SMTP 代理（如 nginx mail proxy）对传入连接进行速率限制与请求长度校验，临时缓解缓冲区溢出导致的拒绝服务风险。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Netmanager Chameleon SMTPd 缓冲区溢出漏洞"
updated = "2026-06-16T21:48:01.477"

