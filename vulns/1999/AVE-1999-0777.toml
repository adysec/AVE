[basic]
description = "Hybrid Networks 线缆宽带接入系统 1.0 的管理接口未包含身份认证机制，远程攻击者无需任何凭证即可通过 HSMP 协议直接访问并修改设备配置，实现完全控制。该漏洞影响 Hybrid Networks 线缆调制解调器及配套宽带接入系统的所有版本，攻击者仅需网络可达即可触发，CVSS 评分 10.0，危害等级严重。目前已有公开的远程配置利用代码。"
published = "1999-10-06T04:00:00.000"
remediation = "升级 Hybrid Networks Cable Broadband Access System 到最新固件版本。在无法升级的情况下，在网络边界防火墙处阻止 HSMP 协议端口（TCP 1812/1813），限制管理接口仅允许受信任的内部 IP 访问。如设备已停止技术支持，建议更换为仍受支持的新款线缆调制解调器设备。禁用远程管理功能可有效降低被远程利用的风险。"
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "Hybrid Networks Cable Broadband Access System 未授权访问漏洞"
updated = "2026-06-16T21:49:03.927"

