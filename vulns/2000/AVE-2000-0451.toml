[basic]
description = "Sybergen SyGate 2.0 及 3.11 版本存在拒绝服务漏洞，远程攻击者无需身份认证即可通过向目标系统的内部网络接口发送特制的畸形 DNS UDP 数据包，触发服务崩溃或停止响应，导致正常用户无法访问网络资源。该漏洞源于对畸形 UDP 数据包处理不当，攻击条件简单，危害等级中等。"
published = "2000-06-30T04:00:00.000"
remediation = "建议升级到 SyGate 4.0 及以上版本，该版本已修复畸形 DNS UDP 数据包导致的拒绝服务问题。如无法升级，可在防火墙规则中限制对 SyGate 内部接口的 UDP 53 端口访问，仅允许可信 DNS 服务器通信，以降低攻击面。由于 SyGate 已停止维护，建议迁移至仍在安全更新周期内的替代网关产品。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Sybergen SyGate DNS UDP 数据包拒绝服务漏洞"
updated = "2026-06-16T21:52:01.067"

