[info]
author = "ave"
description = "检测 IRIX 系统上 nph-publish CGI 脚本是否存在。该脚本 1.2 之前版本存在目录遍历漏洞，远程攻击者可在上传路径中使用 .. 序列实现目录跳转，覆盖任意文件。PoC 仅通过 GET 请求验证 CGI 端点是否存在，不执行写入操作。"
id = "POC-AVE-1999-1002"
name = "nph-publish 目录遍历任意文件写入漏洞 PoC"
severity = "medium"
tags = ["ave-1999-1002"]
vuln_id = [
    "CVE-1999-1177",
    "AVE-1999-1002",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/cgi-bin/nph-publish"
protocol = "http"

[[poc.requests.matchers]]
expect = true
status = [
    200,
    403,
]
type = "status"

[[poc.requests.matchers]]
expect = false
part = "body"
type = "word"
words = [
    "Not Found",
    "does not exist",
    "404",
]

[[poc.requests.matchers]]
condition = "or"
expect = true
part = "body"
type = "word"
words = [
    "nph-publish",
    "IRIX",
    "SGI",
    "publish",
]
