[basic]
description = "NLS（自然语言服务）存在缓冲区溢出漏洞，远程攻击者可通过向受影响系统发送特制的 NLS 请求触发缓冲区溢出，导致系统崩溃或任意代码执行。该漏洞影响 UNICOS 9、MAX 1.3、AIX 4.2、IRIX 6、RedHat 4、Slackware 3、libc 5.2.18 及 mk 1.5 等多个 Unix 操作系统，CVSS 评分 7.5，危害等级高危。由于涉及系统核心库组件，攻击者无需身份认证即可远程利用。"
published = "1997-02-13T05:00:00.000"
remediation = "对于 Red Hat Linux 4/Slackware 3 等 Linux 系统，应升级至现代发行版并确保 glibc 版本高于 2.0（含 NLS 缓冲区溢出修复）；IBM AIX 4.2 用户请安装 APAR IX70456 补丁或升级至 AIX 5.3 及以上版本；SGI IRIX 6 用户应安装补丁 3369 或升级至 IRIX 6.5.4+。如无法升级，可移除 nls 可执行文件的 setuid 权限（chmod u-s /usr/bin/nls），并限制仅受信用户可执行。"
score = 7.5
severity = "HIGH"
sources = ["exploitdb"]
title = "多款Unix系统libc NLS组件缓冲区溢出漏洞"
updated = "2026-06-16T21:47:26.153"

