[basic]
description = 'BOA Web Server 0.94.8.2 及更早版本存在目录遍历漏洞，远程攻击者无需认证即可通过向服务器发送精心构造的 GET 请求，使用 "%2E" 替代 "." 绕过过滤机制，实现路径遍历，从而读取服务器上的任意文件。该漏洞影响 BOA Web Server 0.94.8.2 及之前所有版本，CVSS 评分 5.0，危害等级中等，攻击者可直接利用该漏洞获取敏感文件信息。'
published = "2000-12-19T05:00:00.000"
remediation = "升级 BOA Web Server 至 0.94.8.3 或更高版本，该版本修复了 %2E 编码的目录遍历问题。FreeBSD 用户应安装 FreeBSD-SA-00:60 公告中提供的补丁，Debian 用户应更新至 20001009 公告中指定的修复版本。如无官方补丁或无法升级，建议迁移至积极维护的 Web 服务器（如 Apache 或 Nginx），并在反向代理或 WAF 层拦截包含 %2E 编码的路径遍历请求作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "BOA Web Server 目录遍历漏洞"
updated = "2026-06-16T21:52:46.130"

