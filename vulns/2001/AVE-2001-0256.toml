[basic]
description = "Netscape Communicator 4.77 之前版本在处理 GIF 图像时存在任意 JavaScript 执行漏洞。攻击者可将恶意 JavaScript 代码嵌入 GIF 图像的注释字段中，当用户使用受影响浏览器访问包含特制 GIF 图片的网页时，JavaScript 会在用户浏览器上下文中自动执行，导致敏感信息泄露或会话劫持。攻击无需身份认证，仅需诱使用户浏览恶意页面即可触发，危害较大。"
published = "2001-08-02T04:00:00.000"
remediation = "升级 Netscape Communicator 至 4.77 或更高版本，该版本修复了 GIF 图片注释中嵌入 JavaScript 代码的远程执行漏洞。由于该产品已停止维护，建议迁移至现代浏览器（如 Firefox、Chrome）并禁用 Netscape 系列产品的使用。"
score = 7.5
severity = "HIGH"
sources = ["exploitdb"]
title = "Netscape Navigator GIF图像注释远程代码执行漏洞"
updated = "2026-06-16T21:54:36.167"

