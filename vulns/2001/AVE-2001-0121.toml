[basic]
description = "OpenSSH 在启用 Kerberos V 认证时存在身份验证绕过漏洞。由于 OpenSSH 3.0.1 之前版本中 Kerberos V 认证模块未能正确验证用户身份，远程攻击者可在无需有效凭据的情况下直接登录目标系统，获得未经授权的访问权限。该漏洞影响启用 Kerberos V 认证的 OpenSSH 服务，CVSS 评分 7.5，危害等级高。OpenBSD 已发布安全补丁修复此问题。"
published = "2001-12-31T05:00:00.000"
remediation = "升级 OpenSSH 至 3.0.1 或更高版本，该版本已修复 Kerberos V 认证绕过问题。如无法立即升级，可在 sshd_config 中将 KerberosAuthentication 设为 no 以禁用 Kerberos 认证，或通过防火墙限制对 SSH 端口的访问作为临时缓解措施。"
score = 7.5
severity = "HIGH"
sources = ["osv"]
title = "OpenSSH OpenSSH Kerberos认证绕过漏洞"
updated = "2026-06-16T21:56:24.113"

