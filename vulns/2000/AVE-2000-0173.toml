[basic]
description = "Linux nmh 邮件处理套件中的 mhshow 组件存在缓冲区溢出漏洞，远程攻击者可通过向目标用户发送包含恶意构造 MIME 头的电子邮件触发该漏洞，导致任意代码执行。该漏洞影响 nmh 0.27 及更早版本，攻击者无需身份认证即可利用，CVSS 评分 7.5，危害等级高。建议用户升级至 nmh 1.0 或更高版本以修复此漏洞。"
published = "2000-02-28T05:00:00.000"
remediation = "升级 nmh 软件包至 1.0 及以上版本。Red Hat Linux 用户应参照 RHSA-2000-006 安全公告安装修补后的 nmh 程序包；其他发行版用户应更新至 nmh 1.0 或更高版本。临时缓解措施可禁用 mhshow 对 MIME 头的自动解析处理。"
score = 7.5
severity = "HIGH"
sources = ["redhat"]
title = "GNU nmh mhshow 缓冲区溢出远程代码执行漏洞"
updated = "2026-06-16T21:51:12.113"

