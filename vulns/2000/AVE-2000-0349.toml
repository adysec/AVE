[basic]
description = "Cisco 路由器在线帮助系统存在信息泄露漏洞。低权限（非 enable 模式）的本地攻击者可通过在 CLI 界面中执行 show 命令，利用帮助系统选项获取敏感配置信息。该漏洞影响 Cisco 2500/2600/3600/4000/7200/7500 系列路由器及 IOS 系统，CVSS 评分 2.1，危害等级低。攻击者需已获得本地访问权限方可利用，无法远程触发。"
published = "2000-05-03T04:00:00.000"
remediation = "升级 Cisco IOS 至不受影响版本（如 12.0(5) 及以上），或通过全局配置模式使用 `no service help` 命令禁用在线帮助系统。同时配置 privilege 级别限制，将 `show` 命令的访问权限绑定至 privilege level 15，防止低权限用户通过 `show` 命令获取敏感配置信息。如无法立即升级，可在 line vty 下配置 `privilege level 15` 限制非授权用户访问。"
score = 2.1
severity = "LOW"
sources = ["avd"]
title = "Cisco IOS 路由器在线帮助系统信息泄露漏洞"
updated = "2026-06-16T21:51:31.413"

