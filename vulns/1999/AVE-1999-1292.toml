[basic]
description = "Digital Ultrix 4.1 和 4.2 版本的 LAT/Telnet 网关（lattelnet）存在权限提升漏洞，本地攻击者可利用该组件缺陷获取 root 权限。漏洞源于 lattelnet 服务对输入验证不当，攻击者通过构造特定请求绕过权限检查，实现从普通用户到超级用户的提权。影响范围限于运行受影响 Ultrix 版本且启用 LAT/Telnet 网关服务的系统，攻击需本地访问权限，无需身份认证即可利用。"
published = "1991-12-31"
remediation = "升级到 Ultrix 4.2A 或后续修复版本，应用 Digital 官方补丁；若无法升级，应禁用 lattelnet 服务（删除或停止相关守护进程），限制本地用户访问，并迁移至受支持的操作系统。"
score = 10.0
severity = "CRITICAL"
sources = [
    "avd",
    "cve",
]
title = "Digital Equipment Corporation Ultrix LAT/Telnet 网关(lattelnet) 本地权限提升漏洞"
updated = "2026-07-18"

