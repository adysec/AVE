[basic]
description = "Soft Lite ServerWorx 3.00 存在目录遍历漏洞，远程攻击者无需身份认证即可向目标服务器发送特制的 HTTP GET 请求，在请求路径中插入 `..` 或 `...` 序列绕过路径限制，从而读取服务器上的任意文件。该漏洞利用门槛较低，攻击者可借此获取敏感配置文件或系统信息，对服务器安全性构成严重威胁。"
published = "2001-06-02T04:00:00.000"
remediation = "该产品（Soft Lite ServerWorx 3.00）已停止维护，无官方补丁可用。建议立即迁移至仍受支持的其他 Web 服务器软件（如 Apache httpd、Nginx）。若无法更换，可在反向代理或 WAF 层面添加规则，拦截包含 `../` 或 `...` 的 URL 请求，并限制 Web 进程文件系统访问权限为最小目录。同时建议将服务器置于独立内网段，减少暴露面。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Soft Lite ServerWorx 目录遍历漏洞"
updated = "2026-06-16T21:53:52.870"

