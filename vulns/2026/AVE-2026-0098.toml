[basic]
description = "WordPress SALESmanago 及 Leadoo 插件存在 SQL 注入漏洞，版本 3.11.2 及以下中未对用户输入进行充分过滤，经身份认证的订阅者权限攻击者可通过向插件相关参数注入恶意 SQL 语句，进而实现数据库信息窃取、数据篡改或获取更高权限。该漏洞影响大量使用该插件的 WordPress 站点，CVSS 评分 8.5，危害等级高。厂商已在 3.11.3 版本中修复此漏洞。"
published = "2026-06-25T14:16:46.747"
remediation = "立即将 WordPress SALESmanago 与 Leadoo 插件升级至 3.11.3 或更高版本。如无法立即升级，可在 Web 应用防火墙（WAF）中添加规则拦截包含 SQL 注入特征的请求参数，并限制 WordPress 站点仅允许受信任用户注册订阅者账号，同时禁用未使用的用户注册功能以减少攻击面。"
score = 8.5
severity = "HIGH"
sources = ["hwpoc"]
title = "WordPress SALESmanago & Leadoo 插件 SQL 注入漏洞"
updated = "2026-06-25T16:16:39.440"

