[basic]
description = "Unix NIS+ 命名服务中的 rpc.nisd 守护进程存在身份认证绕过漏洞，远程攻击者在无需任何身份凭证的情况下即可向服务器发起特定的 RPC 调用，从而获取系统敏感信息、禁用审计日志记录功能或篡改本地缓存数据。该漏洞影响运行 NIS+ 服务的 Unix 系统（如 Solaris），攻击者仅需具备网络可达性即可远程发起攻击，可导致信息泄露、审计失效及缓存被篡改，严重威胁系统安全性与完整性。"
published = "1998-03-01"
remediation = "升级到 SunOS 5.8 及更高版本（已包含 rpc.nisd 认证加固补丁）；若无法立即升级，应在 NIS+ 配置中启用强认证（nisauth.conf），禁用匿名 RPC 访问，并通过防火墙限制 32771/UDP（rpc.nisd）端口仅允许受信任网络访问，同时关闭不必要的 NIS+ 服务。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "Unix NIS+ rpc.nisd 服务身份认证绕过漏洞"
updated = "2026-07-18"

