[basic]
description = "glibc 2.1.1 中的 unsetenv 函数在处理重复传入的环境变量时存在缺陷，当同一环境变量（如 LD_PRELOAD 或 LD_LIBRARY_PATH）被重复指定时，unsetenv 无法正确清除该变量。本地攻击者可利用此漏洞，在 setuid 程序中传入重复的恶意环境变量，绕过安全限制执行任意命令，从而获取提升后的权限。该漏洞影响使用 glibc 2.1.1 的 Linux 系统，CVSS 评分 7.2，危害等级高。"
published = "2000-11-14T05:00:00.000"
remediation = "升级 glibc 至 2.1.2 或更高版本，该版本修复了 unsetenv 对重复环境变量处理不当的问题。对于无法立即升级的系统，可在启动 setuid 程序前手动清除 LD_PRELOAD、LD_LIBRARY_PATH 等危险环境变量，或移除受影响 setuid 程序的 suid 权限位作为临时缓解措施。"
score = 7.2
severity = "HIGH"
sources = ["redhat"]
title = "GNU glibc 2.1.1 unsetenv 函数重复环境变量本地权限提升漏洞"
updated = "2026-06-16T21:52:32.550"

