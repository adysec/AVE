[basic]
description = "Berkeley 自动挂载守护进程（amd）的日志记录功能存在缓冲区溢出漏洞，远程攻击者无需身份认证即可向目标系统发送特制的请求触发该漏洞，导致远程代码执行或服务崩溃。该漏洞影响 BSD/OS 3.1/4.0.1、FreeBSD 3.0/3.1/3.2 及 RedHat Linux 6.0 等系统，CVSS 评分 9.3，危害等级严重。厂商已发布安全补丁修复此漏洞。"
published = "1999-09-16T04:00:00.000"
remediation = "升级 am-utils 至 6.0 以上版本，或应用厂商安全补丁：FreeBSD 用户升级至 3.3 及以上版本，RedHat 用户安装 RHSA-1999:032 提供的 am-utils 更新包。如无法升级，在 inetd 配置中禁用 amd 服务或限制 amd 仅监听可信网络接口。对于 BSD/OS 用户，联系厂商获取 4.1 版本的修复补丁。"
score = 9.3
severity = "CRITICAL"
sources = ["exploitdb"]
title = "Berkeley am-utils amd 远程缓冲区溢出漏洞"
updated = "2026-06-16T21:48:53.043"

