[basic]
description = 'Microsoft Internet Explorer 4/5 中的 Eyedog ActiveX 控件被错误标记为"对脚本安全"，导致远程攻击者可通过构造特制网页调用该控件执行任意命令。著名的 Bubbleboy 蠕虫即利用此漏洞进行传播攻击，影响 Windows 系统上安装 IE 4/5 的用户。该漏洞仅需用户使用浏览器访问恶意页面即可触发，无需额外交互。CVSS 评分 4.0，危害等级中危。'
published = "1999-09-01T04:00:00.000"
remediation = "在注册表中为 Eyedog ActiveX 控件设置 kill bit（CLSID：{0006F061-0000-0000-C000-000000000046}），禁用该控件的脚本执行权限；立即升级 IE 至 5.01 SP2 或更高版本；在 IE 安全设置中将 ActiveX 脚本标记为「禁用」或「提示」，并启用增强安全配置以阻止历史 ActiveX 控件运行。"
score = 4
severity = "MEDIUM"
sources = ["avd"]
title = "Microsoft Internet Explorer ActiveX Eyedog 远程命令执行漏洞"
updated = "2026-06-16T21:48:48.617"

