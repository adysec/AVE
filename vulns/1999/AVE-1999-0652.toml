[basic]
description = "IBM WebSphere 在安装过程中对反安装脚本及其存放在 /usr/bin 目录下的数据文件设置了不当的文件系统权限，使得本地普通用户具备修改这些文件的权限。该漏洞影响在类 Unix 系统上部署的 IBM WebSphere 相关版本，攻击前提为攻击者已获得目标主机的本地登录权限。本地用户可利用该缺陷篡改反安装脚本或其数据内容，在后续执行反安装或特权操作时实施权限提升，从而以更高权限执行任意命令，危害系统安全。"
published = "1999-12-02T05:00:00.000"
remediation = "升级到最新的WebSphere Application Server V9.0或更高版本，并确保应用最新的安全补丁包。升级前请备份所有配置和数据，然后按照官方指南执行安装过程，变更权限设置和脚本权限，关闭不必要服务，启用审计日志以监控权限变更。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "IBM WebSphere 卸载脚本权限配置不当漏洞"
updated = "2026-06-16T21:49:11.523"

