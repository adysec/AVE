[basic]
description = "rxvt 是一款 Unix 系统下的终端模拟器。当该程序在编译时启用了 PRINT_PIPE 选项后，其 setuid root 安装版本会错误地将 -print-pipe 命令行参数所指定的管道程序以 root 权限执行。本地普通用户可借此以 root 身份运行任意命令，从而造成本地权限提升，完全控制受影响的主机系统。"
published = "1996-01-02T05:00:00.000"
remediation = "升级 rxvt 至已修复版本（≥2.7.6），或重新编译时禁用 PRINT_PIPE 选项（添加 -DNO_PRINT_PIPE 宏），并避免以 setuid root 方式安装 rxvt，同时移除旧版本中 -print-pipe 参数的使用。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "rxvt 终端模拟器 本地权限提升漏洞"
updated = "2026-07-19T00:00:00Z"

