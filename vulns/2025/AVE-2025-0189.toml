[basic]
description = "红帆OA（iOffice）办公自动化系统的 NetCAUserLogin.aspx 登录页面存在SQL注入漏洞。该页面在验证用户身份时，将用户输入的账号参数直接拼接到SQL查询语句中，未进行参数化处理或特殊字符过滤。攻击者无需任何身份认证，只需向该页面发送包含恶意SQL语句的HTTP请求，即可构造 UNION 查询提取数据库中的敏感信息，或利用 SQL 盲注绕过登录验证获取管理员权限。该漏洞影响使用该页面的所有红帆OA系统版本，攻击条件简单，危害较大。"
published = "2025-07-29"
remediation = "联系红帆科技获取官方安全补丁并升级至最新版本；修改 NetCAUserLogin.aspx 页面代码，将字符串拼接方式改为参数化查询，对账号和密码参数过滤单引号、分号、-- 注释符等特殊字符；如无法立即升级，可在Web应用防火墙上配置规则拦截包含 UNION、SELECT、OR 1=1 等SQL注入特征的HTTP请求。"
score = 5.0
severity = "MEDIUM"
sources = ["hwpoc"]
title = "红帆OA NetCAUserLogin.aspx SQL注入漏洞"
updated = "2025-07-29"

