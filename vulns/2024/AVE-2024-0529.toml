[basic]
description = 'Apache HTTP Server 2.4.63及更早版本中存在 mod_ssl 错误日志变量转义不足的漏洞。当使用 CustomLog 配置日志记录时，如果使用 "%{varname}x" 或 "%{varname}c" 格式来记录 mod_ssl 提供的变量（如 SSL_TLS_SNI），mod_log_config 和 mod_ssl 不会对来自客户端的变量进行任何转义处理。这允许不受信任的 SSL/TLS 客户端向日志文件中注入转义字符，可能破坏日志文件完整性甚至导致远程代码执行。该漏洞影响 Windows 10/11、Windows Server 2019/2022 等版本，CVSS 评分 7.5，危害等级中危。Apache 已经在安全更新中修复了此漏洞。'
published = "2025-07-10T17:15:46.400"
remediation = "升级 Apache HTTP Server 至 2.4.64 或更高版本。如无法立即升级，在日志配置中避免使用 `%{varname}x` 和 `%{varname}c` 记录 mod_ssl 提供的变量（如 SSL_TLS_SNI），或改用 `%{escapemd}varname}x` 格式进行转义输出，防止恶意客户端注入转义字符到日志文件。"
score = 7.5
severity = "HIGH"
sources = ["msrc"]
title = "Apache HTTP Server mod_ssl 日志变量转义漏洞"
updated = "2026-06-17T07:56:47.053"

