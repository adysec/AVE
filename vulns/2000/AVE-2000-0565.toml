[basic]
description = "McAfee VirusScan 4.03 存在访问控制缺陷，在告警文本文件发送至中央告警服务器前未正确限制其访问权限，导致本地攻击者可任意修改告警内容。该漏洞影响 McAfee VirusScan 4.03 版本，攻击者需拥有本地系统访问权限，利用难度较低，可篡改安全告警信息从而干扰病毒检测与防护机制的正常运行。"
published = "2000-06-08T04:00:00.000"
remediation = "将 McAfee VirusScan 升级至 4.04 及以上版本。如无法升级，通过 NTFS 权限设置将 alert 文本文件的写入权限限制为仅 SYSTEM 和管理员账户，禁止普通用户修改。同时启用 Windows 审核策略监控对该文件的异常访问。"
score = 2.1
severity = "LOW"
sources = ["cve"]
title = "McAfee VirusScan 访问控制漏洞"
updated = "2026-06-16T21:51:52.287"

