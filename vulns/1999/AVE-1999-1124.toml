[basic]
description = "ProFTPD 1.2 在启用 mod_sqlpw 模块时，会将用户认证密码明文记录到系统 wtmp 日志文件中，造成敏感信息泄露。本地攻击者可通过 last 等命令读取 wtmp 日志获取其他用户的明文密码，进而提升权限。该漏洞影响 ProFTPD 1.2 版本，利用门槛低，仅需本地访问权限即可实施攻击。"
published = "1999-11-19"
remediation = "升级 ProFTPD 至 1.2.1 或更高版本，该版本已修复 mod_sqlpw 模块将用户密码记录到 wtmp 日志文件的问题。如无法升级，可限制 wtmp 日志文件的读取权限（仅允许 root 用户访问），并定期清理 wtmp 日志内容，避免在多用户环境下使用 last 命令查看日志。"
score = 4.6
severity = "MEDIUM"
sources = ["cve"]
title = "ProFTPD mod_sqlpw 密码明文记录漏洞"
updated = "2026-06-16"

