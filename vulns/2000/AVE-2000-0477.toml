[basic]
description = "Cisco Secure PIX Firewall 存在 TCP RST 伪造包识别缺陷，远程攻击者可通过向防火墙保护的连接发送伪造的 TCP 重置（RST）数据包，利用该漏洞强制防火墙关闭合法 TCP 连接，导致正常网络服务中断或拒绝服务（DoS）。该漏洞影响 PIX Firewall 2.7/3.x/4.x/5.x 版本，攻击者无需认证即可远程触发，危害范围较广。"
published = "2000-03-20T05:00:00.000"
remediation = "升级 Cisco PIX Firewall 至 5.2(1) 或更高版本，该版本改进了 TCP 重置报文验证机制，可有效识别伪造 RST 包。如无法升级，可在入口边界部署 ACL 过滤源 IP 伪造流量，并启用 TCP 时间戳选项增加 RST 伪造难度。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Cisco Secure PIX Firewall 伪造 TCP RST 包漏洞"
updated = "2026-06-16T21:52:06.677"

