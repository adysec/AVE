[basic]
description = "Ascend CascadeView/UX 1.0 的 TFTP 服务器存在符号链接攻击漏洞。本地攻击者可创建指向系统敏感文件（如口令文件）的符号链接，诱使 TFTP 服务器读取或写入这些文件，从而获取本不应拥有的访问权限。该漏洞影响 Ascend CascadeView/UX 1.0 版本，利用条件为拥有本地账号，危害等级中危，CVSS 评分 4.6。"
published = "1999-12-31T05:00:00.000"
remediation = "建议立即升级 Ascend CascadeView/UX 至非易受攻击版本，或禁用 TFTP 服务改用 SCP/SFTP 替代。在无法升级时，限制 TFTP 服务仅监听受信网络接口，并通过 chroot 隔离 TFTP 根目录，禁止符号链接跨目录访问。同时配置本地用户最小权限原则，避免低权限用户拥有对 TFTP 目录的写权限。"
score = 4.6
severity = "MEDIUM"
sources = ["avd"]
title = "Ascend CascadeView/UX TFTP 符号链接本地权限提升漏洞"
updated = "2026-06-16T21:50:49.637"

