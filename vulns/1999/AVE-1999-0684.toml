[basic]
description = "Internet Explorer 5 的 download behavior 功能允许网页作者通过客户端脚本下载文件。设计上应仅允许下载同域文件以防止跨域读取，但攻击者可通过服务端 HTTP 重定向绕过此同源限制，使恶意网站能够读取用户本地文件系统及内网中的任意文件。该漏洞属于代码注入类（CWE-94），攻击者无需用户交互即可触发，影响所有安装 IE5 的系统。"
published = "1999-09-01"
remediation = "微软已发布 MS99-040 安全公告及补丁修复此漏洞。由于 Internet Explorer 5 已停止支持超过 20 年，建议立即升级至受支持的现代浏览器（如 Microsoft Edge 或 Chrome）。若因系统兼容性必须使用旧版 IE，可配置组策略禁用 ActiveX 下载行为组件并将受信站点区域安全级别设为高。"
score = 5.0
severity = "MEDIUM"
sources = [
    "cve",
    "ms",
]
title = "Microsoft Internet Explorer 5 下载行为组件远程文件读取漏洞"
updated = "2026-06-16"

