[basic]
description = "SunOS 系统的 NIS（网络信息服务）finger 守护进程存在拒绝服务漏洞。当远程攻击者向目标主机发送大量伪造的 finger 请求时，每个请求都会触发一次 NIS 查询，导致 NIS 服务被海量查询请求淹没，消耗系统资源并最终使服务不可用。该漏洞影响运行 SunOS 且启用 NIS 与 finger 服务的系统，攻击者无需身份认证即可通过网络远程发起攻击，利用方式简单，仅需持续发送大量并发 finger 请求即可造成目标系统拒绝服务。CVSS 评分为 2.6，危害等级较低，但仍可被用于干扰正常的网络信息服务。"
published = "1998-06-29T04:00:00.000"
remediation = "在 SunOS/Solaris 上将 /etc/inetd.conf 中 finger 服务行注释并执行 kill -HUP 重启 inetd 以禁用 fingerd；若业务仍需 finger，用 TCP Wrappers（hosts.allow/hosts.deny）仅允许受信网段访问 TCP 79，并在边界防火墙拒绝外网对 79 端口的访问。同时限制 ypbind/NIS 仅对内网开放，避免 finger 引发大规模 NIS 查询；长期应迁移至已打补丁或已废弃 finger/NIS 的新版 Solaris/现代目录服务。"
score = 2.6
severity = "LOW"
sources = ["avd"]
title = "Sun SunOS NIS Finger 拒绝服务漏洞"
updated = "2026-06-16T21:49:04.677"

