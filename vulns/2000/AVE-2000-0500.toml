[basic]
description = "Microsoft Internet Explorer 4.x 及 5.x 版本中的 Active Setup ActiveX 组件存在安全漏洞，远程攻击者可通过构造声称软件厂商为 Microsoft 的特制网页，诱使用户访问后绕过安全提示在未经用户确认的情况下静默安装任意软件组件。该漏洞可被用于传播恶意软件或安装未授权程序，影响广泛使用的旧版 IE 浏览器用户，需用户交互触发，CVSS 评分 7.6，危害等级高。"
published = "2000-02-21T05:00:00.000"
remediation = "升级 Internet Explorer 至 5.01 SP2 或更高版本，该漏洞已在后续版本中修复。在安全区域设置中将 ActiveX 控件和插件设为禁用，并将 Internet 区域安全级别设为高。当前建议停止使用已停止支持的 IE 浏览器，改用 Microsoft Edge 以获得持续安全更新。"
score = 7.6
severity = "HIGH"
sources = ["avd"]
title = "Microsoft Internet Explorer ActiveX Active Setup 组件远程代码执行漏洞"
updated = "2026-06-16T21:51:07.510"

