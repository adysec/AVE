[basic]
description = "Internet Explorer 4.x 及 5.x 版本在处理浏览器窗口中的框架时未能正确验证框架所属域，存在跨框架访问漏洞（Frame Domain Verification）。远程攻击者可通过构造恶意网页，诱使用户访问后利用 DocumentComplete 事件跨框架读取客户端本地文件，导致敏感信息泄露。该漏洞影响 Internet Explorer 4.0、5.0、5.5 预览版及 5.0.1 等多个版本，CVSS 评分 5.1，危害等级中危。"
published = "2000-05-17T04:00:00.000"
remediation = "建议立即升级至 Internet Explorer 5.01 或更高版本，该漏洞已在 IE 5.01 更新中修复。如无法升级，可禁用 Active Scripting 及跨帧脚本执行功能作为临时缓解措施，或在受限站点区域中限制来自不可信来源的页面加载。"
score = 5.1
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Microsoft Internet Explorer 跨框架域验证漏洞"
updated = "2026-06-16T21:51:47.567"

