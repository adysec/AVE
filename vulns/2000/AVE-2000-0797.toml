[basic]
description = "BSDi 3.0 和 4.0 系统自带的 rcvtty 工具在执行脚本前未能正确丢弃特权权限，存在本地权限提升漏洞。具有系统普通账户访问权限的本地攻击者可通过在命令行中指定恶意的特洛伊木马脚本，利用 rcvtty 的权限缺陷以更高权限执行任意代码，从而完全控制受影响系统。该漏洞影响 BSDi 3.0 及 4.0 版本，CVSS 评分 7.2，危害等级高。"
published = "2001-01-09T05:00:00.000"
remediation = "建议升级到 BSD/OS 4.1 或更高版本，该漏洞已在后续版本中修复。如无法升级，可临时移除 rcvtty 的 setuid 权限（chmod u-s /usr/bin/rcvtty），并严格限制本地用户的可信度，仅授予受信任用户 shell 访问权限以降低提权风险。"
score = 7.2
severity = "HIGH"
sources = ["exploitdb"]
title = "BSDi rcvtty 本地权限提升漏洞"
updated = "2026-06-16T21:53:09.207"

