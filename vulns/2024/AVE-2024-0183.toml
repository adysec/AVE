description = "Apache OFBiz 授权机制不当导致远程代码执行漏洞。攻击者可利用 /webtools/control/main/ProgramExport 接口提交恶意 Groovy 程序，通过对程序参数进行编码后提交的 POST 请求触发代码执行。该漏洞影响 Apache OFBiz 18.12.14 及之前版本，所有未经身份验证的远程攻击者均可利用此安全漏洞。漏洞的 CVSS 评分为 9.8，属于严重危害等级。该漏洞可能导致系统权限丢失、敏感信息泄露和其他严重安全问题。Apache OFBiz 目前已经发布了相应的补丁和安全更新，建议用户及时升级至最新版本。"
