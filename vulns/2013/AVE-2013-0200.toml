[basic]
description = "Linux 内核 3.8.9 之前版本中 kernel/events/core.c 文件的 perf_swevent_init 函数存在整数类型错误漏洞（CWE-189）。本地攻击者可通过精心构造的 perf_event_open 系统调用触发该漏洞，利用整数溢出绕过内核权限检查，实现本地权限提升（LPE），获得 root 权限。该漏洞影响 Ubuntu 12.04/12.04.1/12.04.2 等主流发行版，CVSS 评分 8.4，危害等级高。已有公开利用代码（ExploitDB 33589），且已被 CISA 列入已知被利用漏洞目录，实际攻击风险极高。"
published = "2013-05-14T20:55:01.527"
remediation = "立即升级 Linux 内核至 3.8.9 及以上版本。Ubuntu 12.04/12.04.1/12.04.2 用户应安装官方安全更新，将内核升级至 linux-image-3.8.0-19-generic 或更高版本。Red Hat/CentOS 用户可通过 `yum update kernel` 更新。如无法立即升级，可通过 `kernel.perf_event_paranoid=2` 内核参数限制 perf_event_open 系统调用的使用作为临时缓解措施。"
score = 8.4
severity = "HIGH"
sources = ["kev"]
title = "Linux kernel perf_swevent_init 整数溢出本地权限提升漏洞"
updated = "2026-06-16T23:52:44.150"

