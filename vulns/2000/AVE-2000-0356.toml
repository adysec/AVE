[basic]
description = "CyberPatrol 守护进程 cyberdaemon 存在远程缓冲区溢出漏洞，该组件运行于 Gauntlet Firewall 4.1/4.2/5.0、WebShield E-ppliance 100.0/300.0 及 IRIX 6.5.x 等系统中。未经身份认证的远程攻击者可通过向目标系统的 cyberdaemon 服务发送特制的网络请求触发缓冲区溢出，导致服务崩溃或执行任意命令。该漏洞 CVSS 评分 10.0，危害等级严重，攻击复杂度低且无需认证即可远程利用。"
published = "2000-05-18T04:00:00.000"
remediation = "该漏洞影响已停止维护的 Gauntlet Firewall 4.1/4.2/5.0、WebShield E-ppliance 100.0/300.0 及 IRIX 6.5.x，厂商已不再提供安全更新。建议立即将 Gauntlet 防火墙升级至支持的最新版本或迁移至其他受支持的防火墙产品；对于 IRIX 系统，升级至 SGI 后续安全版本或迁移至替代操作系统。临时缓解措施：在网络边界防火墙或主机上限制对 cyberdaemon 监听端口（默认 TCP 端口需查阅产品文档）的访问，仅允许可信来源 IP 连接，并禁用 CyberPatrol 内容过滤功能（如非业务必需）。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "Network Associates Gauntlet Firewall CyberPatrol 守护进程远程缓冲区溢出漏洞"
updated = "2026-06-16T21:51:43.900"

