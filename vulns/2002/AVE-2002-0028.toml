[basic]
description = "CVSD 的 rcs.c 文件中 PreservePermissions 功能存在差一（Off-by-one）溢出漏洞，版本低于 1.11.2 的 CVSD 受影响。本地攻击者可利用该漏洞触发缓冲区溢出，从而执行任意代码。该漏洞源于对权限处理时边界检查不严格，导致写入操作超出预期缓冲区范围，CWE-193 分类，CVSS 评分 7.8，危害等级高。"
published = "2002-08-12T04:00:00.000"
remediation = "升级 CVSD 至 1.11.2 或更高版本以修复 PreservePermissions 越界溢出漏洞。如无法升级，可禁用 PreservePermissions 功能（配置文件中设置 PreservePermissions=no）作为临时缓解措施。"
score = 7.8
severity = "HIGH"
sources = ["osv"]
title = "CVS CVSD 越界溢出代码执行漏洞"
updated = "2026-06-16T21:58:15.073"

