[basic]
description = "FreeBSD 3.3 系统中的 gdc 程序存在符号链接（symlink）竞态漏洞。该程序在运行时以不安全的方式创建或写入临时文件，本地已登录的普通用户可通过预先创建指向敏感文件（如 /etc/passwd 或其他用户文件）的符号链接，使 gdc 在后续操作中误写入目标文件，从而篡改系统文件或越权修改其他用户的数据。该漏洞影响本地已获得 shell 访问权限的低权限用户，攻击条件为攻击者需能在目标系统上本地执行命令并控制当前工作目录下的文件创建行为，利用方式仅需在运行 gdc 前构造恶意符号链接即可完成文件篡改，无法直接实现远程攻击或权限提升，危害等级较低。"
published = "1999-12-01T05:00:00.000"
remediation = "升级到已修复该问题的 FreeBSD 3.3-STABLE 后续版本或 FreeBSD 3.4 及以上版本（通过 /usr/sbin/sysinstall 或 `freebsd-update` 更新系统并重新编译 base 系统）。如无法立即升级，可临时移除或限制 gdc 程序的 setuid 权限（`chmod u-s /usr/bin/gdc`），或限定普通用户对该程序所在目录及临时目录的写权限，以缓解本地符号链接攻击风险。"
score = 2.1
severity = "LOW"
sources = ["avd"]
