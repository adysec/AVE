[basic]
description = "dbmlparser.exe CGI 留言簿程序未正确执行 chroot 操作，导致目录隔离失效。远程攻击者无需身份认证即可利用路径遍历技术，通过特制 HTTP 请求读取服务器上任意文件，包括系统配置文件、密码文件等敏感信息。该漏洞影响早期使用 dbmlparser.exe 的 CGI 留言簿应用，CVSS 评分 5.0，危害等级中危。建议升级至修复版本或禁用该 CGI 程序。"
published = "1999-07-19T04:00:00.000"
remediation = '立即从 Web 服务器的 CGI 目录中移除 dbmlparser.exe 程序文件，或删除其可执行权限（chmod -x），彻底禁用该 CGI 组件。由于该软件已停止维护多年，不存在官方补丁，如需留言板功能请迁移至现代受支持的替代方案（如 PHP 实现的留言本）。临时缓解措施可在 Web 服务器配置中针对该脚本路径添加访问控制规则（如 Apache 的 <Files> 或 <Location> 指令限制 IP 白名单），或在应用层对 DBMLFILE 参数进行路径过滤，拒绝包含 "../" 等目录遍历字符的请求。'
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "dbmlparser.exe CGI留言本程序任意文件读取漏洞"
updated = "2026-06-16T21:50:18.727"

