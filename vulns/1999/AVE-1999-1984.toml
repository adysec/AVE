[basic]
description = "Trend Micro Interscan VirusWall for NT 的 SMTP 网关组件在处理 HELO 命令时存在缓冲区溢出漏洞。远程攻击者无需身份认证，通过向目标服务器发送超长的 HELO 命令字符串，即可触发缓冲区溢出，进而导致任意代码执行。该漏洞影响 Interscan VirusWall 3.23 及 3.3 版本，CVSS 评分 7.5，属于高危漏洞，可被攻击者用于完全控制受影响系统。"
published = "1999-11-07T05:00:00.000"
remediation = "升级 Trend Micro Interscan VirusWall 至 3.3 以上版本，该漏洞已在后续版本中修复。如产品已停止支持，建议迁移至 Trend Micro 当前受支持的网关安全产品（如 InterScan Web Security），并在 SMTP 服务器层面限制 HELO 命令长度及来源 IP 作为临时缓解措施。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "趋势科技 InterScan VirusWall SMTP HELO 命令缓冲区溢出漏洞"
updated = "2026-06-16T21:50:38.173"

