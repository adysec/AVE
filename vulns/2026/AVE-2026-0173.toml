[basic]
description = "Apache HTTP Server 的 mod_http2 模块存在双重释放（double-free）漏洞，远程攻击者可通过发送特制的 HTTP/2 请求触发该漏洞，导致堆内存损坏，最终可实现远程代码执行。攻击无需身份认证，影响启用了 HTTP/2 协议的 Apache HTTP Server 版本。厂商已发布 2.4.67 及以上版本修复此漏洞，建议用户立即升级。"
published = "nday"
remediation = "立即将 Apache HTTP Server 升级至 2.4.67 或更高版本，该版本已修复 mod_http2 模块中的双重释放漏洞。如无法立即升级，可在 httpd.conf 中注释或移除 LoadModule http2_module 行以禁用 HTTP/2 协议作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "Apache HTTP Server mod_http2 双重释放远程代码执行漏洞"
updated = "nday"

