[basic]
description = "Linuxconf 1.11r11-rh2 存在缓冲区溢出漏洞，该程序在处理 LANG 环境变量时未正确检查输入长度，本地用户可通过向 LANG 环境变量传入超长字符串触发缓冲区溢出，从而获取 root 权限。该漏洞影响 Red Hat Linux 5.1 系统，攻击者需拥有本地登录权限才能利用，CVSS 评分 7.2，危害等级高危。"
published = "1999-12-31T05:00:00.000"
remediation = "立即升级 linuxconf 至 Red Hat 官方修复版本（rh51-errata-general 中提供的更新 RPM），该版本已修复 LANG 环境变量缓冲区溢出问题。如无法升级，可移除 linuxconf 的 suid root 权限（chmod u-s /sbin/linuxconf）作为临时缓解措施，或直接卸载 linuxconf 改用其他系统管理工具。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "Red Hat Linux linuxconf 本地缓冲区溢出漏洞"
updated = "2026-06-16T21:50:12.240"

