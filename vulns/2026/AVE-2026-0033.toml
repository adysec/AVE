[basic]
description = "安恒明御堡垒机存在任意用户注册漏洞，攻击者无需认证即可通过构造特定请求绕过身份验证机制，在堡垒机系统中注册任意用户账户。成功利用此漏洞可获取系统管理权限，进而对内部资产进行未授权访问和控制。该漏洞影响安恒明御堡垒机相关版本，危害性高。"
published = "2023-08-09"
remediation = "升级安恒明御运维审计与风险控制系统（堡垒机）至厂商发布的最新安全版本，通过安恒信息技术支持中心（bbs.dbappsecurity.com.cn）获取对应补丁包。如无法立即升级，在网络边界防火墙配置白名单策略，限制对堡垒机 Web 管理端口（默认 443/TCP）的访问来源，仅允许运维人员 IP 段访问，同时在堡垒机系统配置中关闭用户自助注册功能入口作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
