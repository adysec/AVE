[basic]
description = "NullSoft Winamp 2.64 及更早版本存在缓冲区溢出漏洞，远程攻击者可通过构造包含超长 #EXTINF: 扩展字段的恶意 .m3u 播放列表文件，诱使用户在 Winamp 中打开该文件，触发栈缓冲区溢出，导致任意代码执行。该漏洞攻击条件简单，用户只需打开恶意文件即可被利用，影响所有未打补丁的 Winamp 2.64 及之前版本。"
published = "2000-07-20T04:00:00.000"
remediation = "建议升级到 Winamp 2.65 或更高版本，该版本已修补 M3U 播放列表解析中的缓冲区溢出问题。如无法升级，可在文件关联设置中取消 .m3u 文件与 Winamp 的自动关联，改为手动打开；同时在邮件客户端和浏览器中禁用 Winamp 自动处理下载的 .m3u 文件，避免点击恶意链接即可触发。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "NullSoft Winamp 2.64 M3U 播放列表缓冲区溢出漏洞"
updated = "2026-06-16T21:52:08.083"

