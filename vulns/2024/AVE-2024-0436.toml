[basic]
description = "证书查询系统存在任意文件读取漏洞，攻击者可通过路径遍历手法遍历系统关键文件目录。攻击者无需认证即可构造恶意参数，利用`../../`目录遍历序列访问敏感文件，如系统配置文件、数据库文件等，导致机密信息泄露及潜在远程代码执行。该漏洞影响基于Web的证书查询服务，攻击者可通过简单HTTP请求实现对服务器文件系统的任意读操作，可能进一步读取数据库凭证、应用配置及系统文件，威胁整体系统安全。鉴于请求路径的简单性及影响范围，该漏洞被评定为高危，存在较高安全风险。攻击者可通过构造恶意请求实现对目标证书查询系统任意文件的读取操作，对系统数据安全构成严重威胁。"
published = "0731"
remediation = '建议升级证书查询系统至官方最新版本以修复该漏洞。若无法立即升级，应在代码层对 lang 参数进行严格白名单校验，过滤 `../`、`..\\` 等路径穿越字符，禁止拼接用户可控输入到文件路径中；同时通过 WAF 拦截包含 `../application/database` 等敏感路径的请求，并限制 Web 进程对配置及数据库文件的读取权限，作为临时缓解措施。'
score = 5
severity = "MEDIUM"
