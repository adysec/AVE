[basic]
description = "Webmin 0.5之前版本存在安全漏洞，未对同一用户名输入无效密码的次数进行限制。远程攻击者可通过暴力破解密码方式，获取系统管理员权限，进而完全控制受影响系统。攻击无需认证，利用难度较低。"
published = "1999-12-31"
remediation = "升级至 Webmin 0.5 或更高版本，该版本引入了登录失败次数限制机制，可有效防御暴力破解攻击。"
