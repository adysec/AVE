[basic]
description = "AstrBot 的 /api/chat/get_file 接口存在路径遍历漏洞，攻击者可通过在 filename 参数中注入 ../ 序列（如 ../../../../../../../etc/passwd）绕过路径限制，读取服务器上的任意文件，导致敏感信息泄露。该漏洞源于对用户传入的文件名参数缺乏充分的过滤与校验，攻击者无需特殊权限即可利用，危害较大。"
published = "0729"
remediation = "升级 AstrBot 至最新版本，修复 `/api/chat/get_file` 接口对 `filename` 参数未做路径过滤的问题。如无法升级，在反向代理层（如 Nginx）添加规则拦截包含 `../` 的请求路径，或对 `filename` 参数做正则校验（仅允许字母数字文件名），并使用 `os.path.realpath()` 验证解析后的路径是否在允许的目录范围内。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "AstrBot 路径遍历信息泄露漏洞"
updated = "0729"

