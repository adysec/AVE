[basic]
description = 'Debian Linux 系统中的 mail 程序 "deliver" 存在缓冲区溢出漏洞，本地攻击者可利用该漏洞通过精心构造的输入数据触发缓冲区溢出，从而获取系统 root 权限。该漏洞需攻击者拥有本地访问权限，危害等级高，影响 Debian Linux 系统。建议及时安装厂商发布的安全补丁进行修复。'
published = "1998-01-01T05:00:00.000"
remediation = "升级 Linux 发行版至至少 Debian 3.0（Woody）以上版本，该版本已移除有漏洞的 deliver 程序，改用更安全的邮件传输代理。如因特殊原因仍使用 deliver，立即将其 SUID 权限移除（chmod u-s /usr/bin/deliver），并迁移至 exim 或 postfix 等现代 MTA。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "Debian Linux deliver 邮件程序本地缓冲区溢出漏洞"
updated = "2026-06-16T21:48:11.357"

