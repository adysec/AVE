[info]
author = "ave"
description = "Microsoft FrontPage Server Extensions（PWS）3.0.2.926 在 Windows 95 及可能其他版本上存在缓冲区溢出漏洞，远程攻击者通过向目标 HTTP 服务发送超长 URL 即可触发拒绝服务。本 PoC 通过构造超过正常长度的 URL 请求，观察服务器是否发生崩溃或连接异常断开，以验证漏洞存在。仅用于安全无损的检测验证。"
id = "POC-AVE-1999-0234"
name = "CVE-1999-0681 Microsoft FrontPage PWS 缓冲区溢出拒绝服务 PoC"
severity = "medium"
tags = ["ave-1999-0234"]
vuln_id = [
    "CVE-1999-0681",
    "AVE-1999-0234",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/"
protocol = "http"

[poc.requests.body]
content = ""
type = "raw"

[poc.requests.headers]
User-Agent = "AVE/1.0"

[[poc.requests.matchers]]
expect = true
status = [
    500,
    502,
    503,
    504,
]
type = "status"
