[basic]
description = 'CPython 标准库 mimetypes 模块在 Windows 平台上存在不安全的默认搜索路径缺陷。该模块将 Linux/macOS 上的默认 MIME 类型文件路径（如 /etc/mime.types）直接沿用至 Windows 系统，导致这些路径变为用户可写入位置（C:\etc\mime.types）。本地低权限攻击者可利用此缺陷创建恶意文件，在 Python 运行时启动时触发 MemoryError 导致拒绝服务，或使文件扩展名被错误解析为不正确的文件类型。该漏洞影响所有使用 CPython 的 Windows 系统，CVSS 评分 2.3，危害等级低。建议用户在 Windows 平台上调用 mimetypes.init([]) 传入空列表以规避默认路径。'
published = "2025-02-14T17:15:15.567"
remediation = '升级至 Python 3.14.0 或更高版本，此版本已修复 mimetypes 模块在 Windows 上误用 Unix 默认路径的问题。如无法升级，可在 Windows 平台调用 mimetypes.init([]) 传入空列表以避免使用默认的已知文件位置列表作为临时缓解措施。此外建议删除 C:\etc\mime.types 等可能被利用的恶意文件并限制 C:\etc 目录的写入权限。'
score = 2.3
severity = "LOW"
sources = ["msrc"]
title = "Python CPython mimetypes 模块不可信搜索路径漏洞"
updated = "2026-06-17T07:43:33.550"

