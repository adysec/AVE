[basic]
description = "SCO UNIX 4.2 及更早版本的 login 程序存在访问权限验证漏洞。本地攻击者可通过向 login 程序发送特制的认证请求，绕过正常的权限检查机制，从而获取 root 超级用户权限。该漏洞允许已拥有系统低权限账户的攻击者实现权限提升，完全控制目标系统，包括读取、修改任意文件及执行任意命令。此漏洞影响 SCO UNIX 4.2 及之前版本，危害等级高。"
published = "1994-11-30T05:00:00.000"
remediation = "官方已在 SCO UNIX 后续版本中修复该 login 权限提升漏洞。建议立即升级至 SCO UNIX 5.x 或更高版本；由于 SCO UNIX 已停止技术支持，更推荐迁移至受支持的操作系统（如 Linux）。若无法升级，可采取临时缓解措施：在 /etc/default/su 中限制 login 和 su 命令仅允许 wheel 组成员执行，并移除不必要的本地用户账号以降低攻击面。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "SCO UNIX 登录本地权限提升漏洞"
updated = "2026-06-16T21:50:09.323"

