[basic]
description = "Debian Linux 2.1 系统中的 dump 备份还原工具在处理符号链接恢复时存在权限检查缺陷，本地攻击者可通过在备份文件中预置恶意的符号链接，触发 dump 在还原过程中错误地跟随链接修改目标文件的所有权。该漏洞需要本地系统访问权限才能利用，影响 Debian GNU/Linux 2.1 版本，CVSS 评分 2.1，危害等级低。"
published = "1999-12-02T05:00:00.000"
remediation = "升级 Debian Linux 至 2.2 或更高版本，该漏洞已在后续版本中修复。如无法升级，可限制本地用户对 dump 命令的访问权限，移除 dump 的 setuid 位（chmod u-s /sbin/dump）作为临时缓解措施。"
score = 2.1
severity = "LOW"
sources = ["cve"]
title = "Debian Linux dump 符号链接本地权限提升漏洞"
updated = "2026-06-16T21:51:34.033"

