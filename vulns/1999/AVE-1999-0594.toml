[basic]
description = "Ipswitch WS_FTP Server 1.0.1 及 1.0.2 版本存在远程拒绝服务漏洞。未经身份认证的攻击者可通过向目标 FTP 服务器发送特制的 CWD（Change Working Directory）命令，导致 FTP 服务进程异常崩溃或停止响应，从而中断正常的文件传输服务。该漏洞 CVSS 评分 5.0，危害等级中危，受影响用户应升级至更高版本以修复此问题。"
published = "1999-02-02T05:00:00.000"
remediation = "升级至 WS_FTP Server 1.0.3 及以上版本可修复此漏洞；在防火墙中限制 FTP 服务端口的访问来源 IP，防止未授权远程连接发起 CWD 命令攻击。鉴于该产品版本过于老旧，建议迁移至受支持的最新版 WS_FTP Server 或替代 FTP 服务软件。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Ipswitch WS_FTP Server 远程拒绝服务漏洞"
updated = "2026-06-16T21:48:13.990"

