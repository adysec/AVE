[basic]
description = 'tcsh 和 bash 在处理包含 shell 元字符（反引号 `）的目录名时存在权限提升漏洞。当 shell 使用 PS1 环境变量中的 \w 选项展开文件名时，目录名中嵌入的恶意命令会被执行。本地攻击者可创建包含反引号的目录名，诱导特权用户进入该目录触发命令执行，从而获取更高权限。该漏洞影响 tcsh 6.05 及 bash 1.14.7 之前版本，CVSS 评分 4.6，危害等级中危。'
published = "1996-09-13T04:00:00.000"
remediation = '升级 tcsh 至 6.06 及以上版本，升级 bash 至 1.14.7 及以上版本（现代版本如 bash 4.x/5.x 均不受影响）。如无法立即升级，在 tcsh 的 .cshrc 中将 prompt 设置中移除 %/ 或 %~ 变量，在 bash 的 .bashrc 中将 PS1 变量中的 \w（长路径）替换为 \W（仅当前目录名）或移除之，避免 shell 在显示提示符时展开含反引号目录名中的命令。'
score = 4.6
severity = "MEDIUM"
sources = ["avd"]
title = "GNU bash 及 tcsh 通配符扩展本地权限提升漏洞"
updated = "2026-06-16T21:50:19.350"

