[basic]
description = "Nginx-UI 是一款基于 Web 的 Nginx 管理面板，其 MCP 管理接口存在认证绕过漏洞。由于对用户会话及权限校验不严，未认证的远程攻击者可直接绕过登录验证，访问管理接口并执行敏感操作，如修改 Nginx 配置、查看系统信息等。该漏洞影响 2.3.4 之前版本，攻击者无需身份凭证即可利用，危害较大。建议用户升级至 2.3.4+ 版本修复。"
published = "nday"
remediation = "建议立即将 Nginx-UI 升级至 2.3.4 或更高版本，该版本已修复 MCP 接口认证绕过问题。如无法立即升级，可在反向代理层添加对 MCP 接口的访问控制规则，限制仅允许授信 IP 访问 /mcp 路径，并启用 Web 应用防火墙拦截未授权请求。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "Nginx-UI MCP 接口认证绕过漏洞"
updated = "nday"

