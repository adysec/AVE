[basic]
description = "Microsoft IIS 3.0 与 4.0 在 x86 及 Alpha 架构平台上存在拒绝服务漏洞。远程攻击者无需身份认证，只需向目标 Web 服务器发送一个格式畸形的 HTTP GET 请求，即可触发服务进程异常挂起，使 IIS 无法继续响应正常请求，导致网站服务中断。该漏洞影响运行 IIS 3.0/4.0 的 Windows NT 系统，攻击条件简单、可远程利用，仅需网络可达目标端口即可实施，属于典型的远程拒绝服务类安全问题。"
published = "1999-12-31T05:00:00.000"
remediation = "立即升级到 IIS 7.0 或更高版本，并应用 Microsoft 安全更新（如 Windows Server 2008 R2 + KI 更新包），或通过安装 IIS 10.0+ 并启用请求过滤机制来修复此漏洞。如无法立即升级，可通过配置 IIS 请求队列大小限制和添加 HTTP 头验证来作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
