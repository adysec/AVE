[basic]
description = "AnswerBook2 (AB2) Web 服务器 dwhttpd 3.1a4 存在格式化字符串漏洞。远程攻击者可通过向 HTTP 请求中发送编码后的 % 字符触发该漏洞，由于服务器在日志记录时未正确过滤格式化字符串，导致拒绝服务甚至可能执行任意命令。该漏洞影响 AnswerBook2 系列产品，CVSS 评分 7.5，危害等级高。建议升级至最新版本或禁用受影响组件。"
published = "1998-08-23T04:00:00.000"
remediation = "升级 dwhttpd 至 3.1a4 以上版本，或安装 Sun 官方补丁。若无法升级，执行 /usr/bin/ab2admin -o stop 禁用 AnswerBook2 服务，并在防火墙限制对 8888 端口的访问。同时在前端反向代理中对 HTTP 请求中的编码 % 字符进行过滤转义，防止格式化字符串注入日志处理函数。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "Sun AnswerBook2 dwhttpd 格式化字符串远程代码执行漏洞"
updated = "2026-06-16T21:50:23.803"

