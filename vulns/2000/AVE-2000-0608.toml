[basic]
description = "Axis Communications StorPoint CD 网络存储设备存在身份认证绕过漏洞。远程攻击者无需任何认证即可通过向管理员 URL 中添加 `..` 目录遍历序列，绕过访问控制机制直接访问受限制的管理后台页面，获取设备完全控制权限。该漏洞 CVSS 评分 10.0，危害等级严重，影响范围广泛。厂商已发布固件更新修复此漏洞，建议用户及时升级。"
published = "2000-02-29T05:00:00.000"
remediation = "升级 Axis StorPoint CD 固件至 3.0 及以上版本，该版本修复了路径遍历认证绕过漏洞；若无固件更新可用，应在防火墙或反向代理中限制对设备管理页面的访问来源 IP，仅允许受信任的管理网段访问。此外，禁用不必要的 Web 管理接口可降低暴露面。"
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "Axis Communications StorPoint CD 身份认证绕过漏洞"
updated = "2026-06-16T21:51:11.463"

