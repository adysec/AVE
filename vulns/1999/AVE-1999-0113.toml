[basic]
description = "nph-test-cgi 脚本存在任意文件列表漏洞，远程攻击者无需身份认证即可通过向目标 Web 服务器发送特制 HTTP 请求，利用该脚本枚举服务器上的任意文件，导致系统敏感信息（如配置文件、源代码、认证凭据等）泄露。该漏洞影响 Apache 1.1、NCSA HTTPd 1.5.2 及 Netscape Server 1.12/1.1/2.0 等多个早期 Web 服务器软件版本，CVSS 评分 7.5，危害等级高。建议移除或禁用 nph-test-cgi 脚本，或升级至不受影响的版本。"
published = "1996-12-10T05:00:00.000"
remediation = "删除 Web 服务器 cgi-bin 目录下的 nph-test-cgi 脚本文件，并升级 Apache 至 1.3.x 或 2.x 版本（NCSA httpd 已停止维护，建议迁移至 Apache 2.x；Netscape Server 升级至 iPlanet Web Server 6.0+）。作为临时缓解措施，在 httpd.conf 中通过 &lt;Directory&gt; 块限制 cgi-bin 目录权限，禁止目录浏览和脚本列表。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "Apache、NCSA httpd 及 Netscape Server nph-test-cgi 脚本任意文件列表漏洞"
updated = "2026-06-16T21:47:26.793"

