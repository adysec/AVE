[basic]
description = "Netopia R9100 路由器存在 SNMP 表访问控制缺陷，即使管理员已配置禁止修改 SNMP 表，已认证用户仍可绕过限制修改 SNMP 配置。攻击者需先获取路由器有效认证凭据，利用该漏洞可篡改 SNMP 管理信息库，影响网络设备监控与管理。该漏洞影响 Netopia R 系列路由器 4.6.2 版本，CVSS 评分 3.6，危害等级低。"
published = "2000-05-16T04:00:00.000"
remediation = "建议限制 SNMP 访问来源，在路由器 ACL 中仅允许受信任管理 IP 访问 SNMP 服务（UDP 161/162）；使用强 SNMP 读/写团体字串替代默认 public/private；如业务不需要 SNMP 写操作，在路由器配置中禁用 SNMP SET 功能；由于该设备已停产多年且厂商不再提供安全更新，应尽快更换为仍在支持周期内的现代网络设备。"
score = 3.6
severity = "LOW"
sources = ["epss"]
title = "Netopia R9100 路由器 SNMP 表修改漏洞"
updated = "2026-06-16T21:51:35.633"

