[basic]
description = "GoodTech FTP Server 3.0 及 3.0.1 版本存在拒绝服务漏洞，远程攻击者可通过向 FTP 服务发送大量 RNTO（Rename To）命令触发该漏洞，导致服务器进程崩溃或资源耗尽，无法继续提供正常服务。该漏洞利用难度低，无需认证即可实施攻击，影响使用该版本 FTP 服务的所有系统。目前官方已停止维护，建议用户升级至替代产品。"
published = "2000-10-20T04:00:00.000"
remediation = "GoodTech FTP Server 3.0/3.0.1 已停止维护，官方未发布安全补丁。建议立即迁移至仍受支持的 FTP 服务器软件（如 FileZilla Server 或 vsftpd），并在迁移完成前在防火墙层面限制对 TCP 端口 21 的访问来源 IP，仅允许可信地址连接，同时配置入侵检测规则监控异常 RNTO 命令流量作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "GoodTech FTP Server 远程拒绝服务漏洞"
updated = "2026-06-16T21:52:20.007"

