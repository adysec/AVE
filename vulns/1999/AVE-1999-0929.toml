[basic]
description = "Jana Web Server 1.45 及更早版本存在目录遍历漏洞。远程攻击者可通过向目标服务器发送包含 `..`（点点斜线）序列的特制 HTTP 请求，突破路径限制，读取服务器上任意文件，如配置文件、密码文件等敏感信息。该漏洞无需身份认证即可利用，攻击复杂度低，可导致敏感信息泄露。CVSS 评分 5.0，危害等级中危。"
published = "1999-10-08"
remediation = "Jana Server 已停止维护，建议立即迁移至其他活跃维护的 HTTP 服务器（如 Apache、Nginx）。如暂时无法迁移，可在 Jana 配置中禁用内置 HTTP 服务器组件，仅保留代理功能；同时在反向代理或防火墙层过滤包含 `../` 及 `./` 的 URL 路径请求，并限制对 Jana 服务器的访问来源 IP 为可信网段。"
score = 5.0
severity = "MEDIUM"
sources = [
    "cve",
    "avd",
]
title = "Jana Server 目录遍历漏洞"
updated = "2026-06-16"

