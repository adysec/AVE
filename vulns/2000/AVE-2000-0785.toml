[basic]
description = "Microsoft Windows NT 4.0 Phone Book 服务（电话簿服务）中存在缓冲区溢出漏洞，当处理超长输入数据时未能正确验证缓冲区边界，导致可被用于覆盖内存中的关键数据结构。本地攻击者可通过向受影响的 Phone Book 服务发送特制的请求触发缓冲区溢出，从而以系统权限执行任意代码。该漏洞影响 Windows NT 4.0 系统，微软已发布 MS00-094 安全公告修复此问题，Metasploit 框架中已有公开利用模块。"
published = "2001-01-09T05:00:00.000"
remediation = "立即安装 Microsoft 安全公告 MS00-094 提供的补丁（KB276575）。Windows NT 4.0 需先安装 SP6a 后再应用该补丁；Windows 2000 需在 Gold 或 SP1 基础上安装。如非必要，通过「添加/删除程序」中的 Windows 组件向导卸载 Phone Book Service（即 Internet 连接服务中的电话簿服务）作为临时缓解措施。由于 Windows NT 4.0 已停止支持，建议升级到受支持的 Windows Server 版本。"
score = 10
severity = "CRITICAL"
sources = ["exploitdb"]
title = "Microsoft Windows NT 4.0 电话簿服务缓冲区溢出漏洞"
updated = "2026-06-16T21:53:07.557"

