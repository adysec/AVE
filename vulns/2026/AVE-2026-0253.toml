[basic]
description = 'Open WebUI 是一款自托管的离线人工智能平台，其响应消息中的 iFrame 嵌入功能存在存储型跨站脚本（Stored XSS）漏洞。攻击者通过手动修改聊天历史记录，在响应消息中设置恶意的 `embeds` 属性，该属性内容被加载到 iFrame 中时，沙箱策略配置了 `allow-scripts` 和 `allow-same-origin` 权限，绕过了系统的 "iframe Sandbox Allow Same Origin" 安全配置。攻击者可将包含恶意载荷的聊天链接分享给同一实例上的其他用户，触发 XSS 攻击，导致用户会话劫持或敏感信息窃取。该漏洞影响 0.6.44 之前的所有版本，CVSS 评分 7.3，危害等级高，建议用户升级至 0.6.44 或更高版本修复此漏洞。'
published = "2026-02-19T20:25:42.453"
remediation = "升级 Open WebUI 至 0.6.44 或以上版本，该版本修复了 iFrame embed 未正确遵循沙箱配置的问题。如无法立即升级，可在反向代理层配置 Content-Security-Policy 头，限制 frame-src 和 script-src 来源，并禁用 iframe 的 allow-same-origin 和 allow-scripts 权限作为临时缓解措施。"
score = 7.3
severity = "HIGH"
sources = ["ghsa"]
title = "Open WebUI iFrame嵌入响应消息存储型跨站脚本漏洞"
updated = "2026-06-17T10:25:55.207"

