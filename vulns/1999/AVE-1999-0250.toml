[basic]
description = "Solaris 2.5.1 的 ffbconfig 图形配置工具存在缓冲区溢出漏洞，本地攻击者可通过向 ffbconfig 程序传递特制参数触发缓冲区溢出，覆盖进程内存空间，从而获取 root 权限。该漏洞影响 Solaris 2.5.1 操作系统，CVSS 评分 7.2，危害等级高。攻击者需要拥有本地系统账号才能利用此漏洞实施提权攻击。"
published = "1997-02-10T05:00:00.000"
remediation = "立即应用 Sun Security Bulletin #140 提供的补丁程序，或直接升级到 Solaris 7 及以上版本。临时缓解措施可移除 /usr/sbin/ffbconfig 的 setuid 权限（chmod u-s /usr/sbin/ffbconfig），限制本地非授权用户执行该命令，防止普通用户利用缓冲区溢出提权至 root。"
score = 7.2
severity = "HIGH"
sources = ["exploitdb"]
title = "Sun Solaris ffbconfig 缓冲区溢出本地权限提升漏洞"
updated = "2026-06-16T21:47:36.407"

