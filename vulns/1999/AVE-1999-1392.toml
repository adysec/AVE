[basic]
description = "StarTech POP3 Proxy Server 和 Telnet Server 存在身份验证拒绝服务漏洞。远程攻击者可通过向目标服务器的身份验证模块发送超长的 USER 命令，触发缓冲区异常导致服务崩溃。该漏洞影响 StarTech POP3 Proxy Server 及 Telnet Server 相关版本，无需身份认证即可远程利用，攻击门槛低。厂商至今未发布官方补丁，建议限制受影响服务的访问来源。"
published = "1998-07-03T04:00:00.000"
remediation = "建议立即停止使用 StarTech POP3 Proxy Server 和 Telnet Server，改用主流维护中的替代方案（如 Dovecot、Postfix 等现代邮件代理）。如无法替换，应在网络边界防火墙配置规则，限制对 POP3 (110/TCP) 和 Telnet (23/TCP) 端口的来源 IP 白名单访问，防止任意来源的恶意连接。同时，在服务端程序层面建议实现输入长度检查，对 USER 命令参数做长度上限（如 ≤64 字节）截断校验。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "StarTech POP3 Proxy Server与Telnet Server认证长用户名拒绝服务漏洞"
updated = "2026-06-16T21:49:56.200"

