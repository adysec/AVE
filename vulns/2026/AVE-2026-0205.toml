[basic]
description = "tags.<value>SuperMap iServer 的 output 接口存在路径遍历漏洞，由于未对用户传入的文件路径参数进行充分过滤，攻击者可通过构造 `../` 等目录穿越序列结合 URL 编码绕过访问限制，实现任意文件读取。攻击者无需身份认证即可通过网络远程利用该漏洞，可读取系统配置文件（如 `WEB-INF/iserver-system.xml` 等）导致敏感信息泄露。该漏洞影响 SuperMap iServer 全版本，请及时升级至最新版本修复。"
published = "20260315"
remediation = "建议立即升级 SuperMap iServer 至 2026 最新安全补丁版本（>= 11.2.1），该版本已修复 output 接口路径穿越问题。如无法立即升级，可在反向代理（Nginx/Apache）中添加规则拦截 `/iserver/output/` 路径中出现的 `../` 及 URL 编码变种（如 `..;/`、`%2e%2e/`、`%2546` 等），并在 WAF 中部署路径穿越攻击签名规则作为临时缓解。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "SuperMap iServer 任意文件读取漏洞"
updated = "20260315"

