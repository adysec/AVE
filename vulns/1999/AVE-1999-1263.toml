[basic]
description = "SGI IRIX 6.2 系统中的 SpaceWare 7.3 v1.0 版本所包含的 spaceball 程序存在本地权限提升漏洞。由于该程序在执行时未对 HOSTNAME 环境变量进行安全过滤，本地攻击者可通过在 HOSTNAME 环境变量中注入恶意命令，当 spaceball 程序运行时这些命令将以 root 权限执行，从而导致攻击者获取系统最高权限。该漏洞影响 SGI IRIX 6.2 系统，CVSS 评分 7.2，危害等级高。攻击者需拥有本地系统访问权限方可利用。"
published = "1997-08-20T04:00:00.000"
remediation = '立即删除 setuid root 权限的 spaceball 程序（`rm /usr/local/SpaceWare/spaceball`），或编辑 `$SWDIR/spaceball.sh` 在 "Utilities" 段添加 `HOSTNAME=/usr/bsd/hostname` 以覆盖危险的环境变量。由于 SGI IRIX 6.2 及 SpaceWare 7.3 均已停止技术支持，建议迁移至受支持的现代操作系统作为根本解决。'
score = 7.2
severity = "HIGH"
sources = ["epss"]
title = "SGI IRIX 6.2 SpaceWare spaceball 本地权限提升漏洞"
updated = "2026-06-16T21:50:21.450"

