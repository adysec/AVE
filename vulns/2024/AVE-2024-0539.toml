[basic]
description = "Linux 内核 net/smc（共享内存通信）子系统中存在输入验证缺陷，服务端在处理客户端发送的 proposal 消息时，未对 v2_ext_offset、eid_cnt、ism_gid_cnt 等字段进行充分校验。攻击者可利用该漏洞，通过构造特制的 proposal 消息，使 v2_ext_offset 超出合法范围，导致内核访问错误内存地址，引发系统崩溃。该漏洞需本地低权限访问，CVSS 评分 5.5，仅影响系统可用性。"
published = "2025-01-11T13:15:23.637"
remediation = "立即更新 Linux 内核至 6.6.68、6.12.7 或 6.13 及以上版本，对应补丁提交为 295a92e3df32、42f6beb2d577、7863c9f3d24b。各发行版用户请安装对应内核更新包：Ubuntu 24.04 LTS 更新至 linux-image-6.11.0-1011-lowlatency（USN-7381-1），SUSE Linux Enterprise 15 SP7 安装 SUSE-SU-2025:02307-1 更新。如无法立即升级，可在不需要 SMC 协议的系统上通过 modprobe.blacklist=smc 内核参数禁用 SMC 模块作为临时缓解措施。"
score = 5.5
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux Kernel SMC 协议提议消息验证不足导致拒绝服务漏洞"
updated = "2026-06-17T07:59:59.403"

