[basic]
description = "Debian GNU/Linux 发行版中的 cfengine 软件包存在符号链接攻击漏洞。cfengine 是一款基于主机的配置管理工具，通常以 root 权限运行。由于其在处理临时文件时未充分验证符号链接的真实性，拥有本地账户权限的攻击者可通过在可写目录中创建恶意符号链接（指向 /etc/shadow 等系统关键文件），诱导 cfengine 以 root 权限错误地读取或覆写目标文件，导致敏感信息泄露或系统完整性破坏。该漏洞利用条件为攻击者需具备本地 shell 访问权限。"
published = "1999-02-16T05:00:00.000"
remediation = "建议升级 cfengine 至 1.5.4 及以上版本，该版本修复了临时文件创建中的符号链接跟随漏洞。使用 cfengine 管理文件时避免将临时文件写入公共可写目录（如 /tmp），或使用专属临时目录并设置 umask 077 限制访问权限。在 Debian 系统中及时应用 apt-get update && apt-get upgrade 保持软件包更新。"
score = 2.1
severity = "LOW"
sources = ["avd"]
title = "Debian GNU/Linux cfengine 符号链接攻击漏洞"
updated = "2026-06-16T21:48:15.563"

