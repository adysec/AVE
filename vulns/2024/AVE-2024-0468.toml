[basic]
description = "ISC BIND 9 的 DNS 解析组件存在 CPU 资源耗尽漏洞，攻击者可构造包含大量附加记录（Additional section）的恶意 DNS 区域，当查询该区域时，权威服务器或独立解析器在处理响应时会产生大量额外记录，导致 CPU 资源被过度消耗，造成拒绝服务。该漏洞影响 BIND 9 多个版本系列（9.11 至 9.21），CVSS 评分 7.5，危害等级高。攻击者需预先构造恶意区域并诱导目标服务器查询，无需认证即可远程触发。建议升级至已修复版本或应用厂商安全补丁。"
published = "2025-01-29T22:15:28.637"
remediation = "立即升级 BIND 9 至修复版本：9.18.33、9.20.5 或 9.21.4（BIND SPE 用户升级至 9.18.33-S1）。如无法立即升级，可在 named.conf 的 options 块中添加 `minimal-responses yes;` 作为临时缓解措施，限制 DNS 响应中附加记录数量以降低 CPU 耗尽风险。"
score = 7.5
severity = "HIGH"
sources = ["msrc"]
title = "ISC BIND 9 DNS 附加记录CPU耗尽漏洞"
updated = "2026-06-17T06:57:14.430"

