[basic]
description = "Red Hat Linux 6.0 单用户模式存在身份验证绕过漏洞，攻击者拥有物理访问权限或控制台访问权限时，可在系统启动进入单用户模式的密码提示界面按下 Ctrl+C 组合键，绕过 root 密码验证直接获取 root Shell 权限。该漏洞源于单用户模式密码验证逻辑缺陷，未正确处理中断信号，导致本地攻击者可提权至 root 权限，完全控制受影响系统。影响范围限于 Red Hat Linux 6.0 版本，攻击条件要求攻击者具备物理或控制台访问权限并能重启系统进入单用户模式，CVSS 评分 7.2，属高危本地提权漏洞。Red Hat 已发布补丁修复此漏洞，建议升级至修复版本或限制物理访问权限。"
published = "2000-02-23T05:00:00.000"
remediation = "建议立即升级到 Red Hat Linux 6.1 或以上版本，该版本修复了单用户模式鉴别漏洞。如无法立即升级，可通过修改启动配置文件禁用单用户模式，或在 bootloader 中设置密码保护单用户模式进入，并确保 console=tty（禁用控制台重定向），以防止通过按 Ctrl+C 绕过认证。"
score = 7.2
severity = "HIGH"
sources = ["exploitdb"]
title = "Red Hat Linux 6.0 单用户模式身份验证绕过本地权限提升漏洞"
updated = "2026-06-16T21:51:15.137"

