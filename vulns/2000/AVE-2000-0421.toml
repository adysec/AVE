[basic]
description = "XFree86 系统中的 libICE 库存在拒绝服务漏洞，远程攻击者可通过向 SKIP_STRING 宏传递特制的大数值参数触发该漏洞。由于宏未对输入值进行有效边界检查，导致 libICE 在处理畸形数据时发生崩溃，造成服务不可用。该漏洞影响 Open Group X11r6 3.3.3 至 4.0 及 XFree86 系列版本，攻击者无需身份认证即可远程利用，危害等级中等。"
published = "2000-06-19T04:00:00.000"
remediation = "升级至 XFree86 4.0.1 或更高版本，该版本已修复 libICE 中 SKIP_STRING 宏对过大长度值未做校验的问题。由于 XFree86 项目已停止维护，建议迁移至 X.Org Server 以获得持续安全更新。临时缓解措施：在防火墙上阻断针对 ICE 端口（TCP 6550）的未授权访问。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "XFree86 libICE SKIP_STRING 拒绝服务漏洞"
updated = "2026-06-16T21:51:52.550"

