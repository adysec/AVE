[basic]
description = "这是一个导致 Ceilidh 2.60 服务拒绝的远程 DoS 漏洞。攻击者可通过向目标系统发送大量 POST 请求，利用服务对多请求的处理不足，导致其资源耗尽或崩溃，从而使服务无法正常响应合法请求。该漏洞影响 Windows 及其服务器操作系统版本，CVSS 评分 5.0，危害程度中等。攻击无需身份验证即可进行，攻击条件简单，攻击者可远程轻易触发此漏洞，导致服务不可用。微软已在后续的安全更新中修复此漏洞。"
published = "2000-06-09T04:00:00.000"
remediation = "建议立即迁移至现代维护中的 Web 服务器（如 Apache httpd 2.4.x、Nginx 1.24+ 或 OpenResty），Lilikoi Ceilidh 2.60 已于 2000 年停止维护且无官方补丁。若暂时无法迁移，请在边界防火墙或 WAF 配置每 IP 每秒最大 POST 请求数限制（建议 ≤10 req/s），并在 Web 应用防火墙启用 POST 请求体大小限制（如 ≤1MB）及连接频率限制作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Lilikoi Ceilidh 2.60 POST请求拒绝服务漏洞"
updated = "2026-06-16T21:51:59.390"

