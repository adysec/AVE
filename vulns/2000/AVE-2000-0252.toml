[basic]
description = 'TalentSoft Web+ 购物车应用中的 webpsvr 守护进程在处理 webplus CGI 程序请求时，未对用户输入的路径进行充分校验，导致远程攻击者可通过在请求中插入".."(点点)目录遍历序列，突破 Web 根目录限制访问服务器上的任意文件。该漏洞影响 Web+ 4.x 版本，攻击者无需身份认证，只需向目标系统发送特制的 HTTP 请求即可读取如密码文件、配置文件等敏感内容，可能造成信息泄露，为后续进一步入侵提供条件。'
published = "2000-04-12T04:00:00.000"
remediation = "建议立即安装 TalentSoft 官方发布的 Webplus46p 安全补丁（ftp://ftp.talentsoft.com/Download/Webplus/Unix/Patches/Webplus46p%20Read%20me.html），将受影响版本升级至修补后的版本。如无法立即安装补丁，可在 Web 服务器前端部署 WAF 规则，拦截 webplus CGI 程序请求中包含 `..` 或 `%2e%2e` 路径穿越序列的 HTTP 请求，作为临时缓解措施。"
score = 5
severity = "MEDIUM"
