[basic]
description = "cpio 在 FreeBSD 2.1.0、Debian GNU/Linux 3.0 及可能其他操作系统中存在不安全文件权限漏洞。当使用 -O（归档）或 -F 选项创建文件时，cpio 将 umask 设置为 0，导致创建的文件权限为 0666（全局可读写）。本地攻击者可利用此漏洞读取或覆盖这些文件，从而获取敏感信息或破坏系统数据完整性。CVSS 评分 2.1，危害等级低。"
published = "1996-07-16T04:00:00.000"
remediation = "将 cpio 升级至包含补丁的版本（cpio main.c rev 1.3 及以上）。Debian 用户安装 DSA-664 更新，Red Hat 用户安装 RHSA-2005-073/RHSA-2005-080 更新。如无法升级，避免使用 -O 和 -F 选项创建归档文件，或在使用前手动设置 umask 为 077 以限制文件权限。"
score = 2.1
severity = "LOW"
sources = ["redhat"]
title = "cpio 本地文件权限漏洞"
updated = "2026-06-16T21:50:44.777"

