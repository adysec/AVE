[info]
author = "ave"
description = "IBM AIX 4.1/4.2 pdnsd 远程缓冲区溢出漏洞验证。通过DNS A记录查询检测目标是否运行存在漏洞的pdnsd守护进程"
id = "POC-AVE-1999-0600"
name = "IBM AIX pdnsd 缓冲区溢出漏洞 PoC"
severity = "critical"
tags = [
    "cve-1999-0745",
    "aix",
    "pdnsd",
    "buffer-overflow",
]
vuln_id = [
    "CVE-1999-0745",
    "AVE-1999-0600",
]

[poc]
logic = "any"

[[poc.requests]]
dns_type = "A"
path = "{{Hostname}}"
protocol = "dns"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["IN"]
