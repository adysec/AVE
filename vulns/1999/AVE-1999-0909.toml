[basic]
description = "ISC BIND 8.2.2p1 及之前版本的 named 守护进程在处理 DNSSEC SIG 记录时存在输入验证缺陷，远程攻击者可发送包含畸形 SIG 记录的恶意 DNS 查询包，导致 named 进程崩溃或停止响应，造成拒绝服务。该漏洞影响广泛部署的 BIND 8.x 系列 DNS 服务器，攻击者无需认证即可远程触发，仅需向目标 DNS 服务器发送精心构造的包含无效 SIG 记录的数据包即可利用，CVSS 评分 10.0，危害等级为严重。"
published = "1999-11-10T05:00:00.000"
remediation = "建议立即安装 BIND 8.2.2p2 或更高版本的安全补丁，以修复 SIG 记录解析缺陷。如无法立即升级，可临时配置 `options { rate-limit {} };` 以限制查询速率，并通过防火墙过滤异常的 SIG 记录流量。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "ISC BIND 域名服务器 SIG 记录拒绝服务漏洞"
updated = "2026-06-16T21:49:09.437"

