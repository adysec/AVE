[basic]
description = "Ipswitch IMail 5.0 及 6.0 版本的 Web 服务存在缓冲区溢出漏洞。远程攻击者可通过向目标服务器发送超长 URL 请求触发该漏洞，导致服务进程崩溃从而引发拒绝服务，在特定条件下可能进一步实现任意代码执行。该漏洞影响 Ipswitch IMail 5.0/6.0，CVSS 评分 5.0，危害等级中危。目前已有公开的拒绝服务利用代码。"
published = "1999-03-02T05:00:00.000"
remediation = "建议升级至 Ipswitch IMail 6.01 或更高版本以修复此缓冲区溢出漏洞。若暂时无法升级，请在防火墙层面禁止外部访问 IMail Web 服务端口（默认 80/443），或在 IIS/服务配置中禁用 Web 管理界面作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Ipswitch IMail Web服务缓冲区溢出漏洞"
updated = "2026-06-16T21:50:41.970"

