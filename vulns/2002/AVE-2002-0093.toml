[basic]
description = "mpack 1.5 及更早版本中的 munpack 组件存在缓冲区溢出漏洞。攻击者可通过向目标系统发送特制的 MIME 编码邮件附件，在解包处理时触发缓冲区溢出，导致目标程序崩溃造成拒绝服务，甚至可能执行任意代码。该漏洞攻击条件简单，远程未认证攻击者即可利用，影响运行 mpack 1.5 及之前版本的系统。"
published = "2003-04-11T04:00:00.000"
remediation = "升级 mpack 至 1.5.2 或更高版本。Debian 用户可通过 apt-get update && apt-get install mpack 安装修复版本（参考 DSA-141）。如无法立即升级，建议限制 munpack 程序对不可信附件的自动解包处理，或移除 mpack 软件包中 setuid 权限位作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["osv"]
title = "mpack munpack 缓冲区溢出漏洞"
updated = "2026-06-16T21:59:18.193"

