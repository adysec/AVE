[basic]
description = "GlimpseHTTP 1.0/2.0 及 WebGlimpse 1.0 的 aglimpse CGI 程序存在管道命令注入漏洞，未对用户输入进行有效过滤，导致远程未授权攻击者可通过向 aglimpse CGI 发送包含管道符（|）及任意命令的恶意请求，实现远程任意命令执行。该漏洞影响 GlimpseHTTP 1.0/2.0 及 WebGlimpse 1.0 版本，CVSS 评分 7.5（HIGH），攻击向量为网络、攻击复杂度低、无需认证、机密性/完整性/可用性均受部分影响。攻击者无需身份认证即可远程触发，通过构造包含管道命令注入载荷的 HTTP 请求即可在服务器上以 Web 服务进程权限执行任意系统命令。ExploitDB 已收录公开 PoC (EDB-ID: 20449)。"
published = "1997-07-01T04:00:00.000"
remediation = "立即删除或禁用 Web 服务器中所有 aglimpse CGI 脚本（通常位于 cgi-bin/aglimpse）。若仍在使用 GlimpseHTTP/WebGlimpse，建议立即迁移至现代搜索引擎（如 Elasticsearch、Algolia）或静态站点搜索方案，该软件已于 1990 年代末停止维护且无官方补丁。临时缓解措施：在 Web 服务器配置中禁止 CGI 执行或通过防火墙屏蔽对 /cgi-bin/aglimpse 的访问。"
score = 7.5
severity = "HIGH"
sources = ["tenable"]
title = "Glimpse GlimpseHTTP/WebGlimpse 远程命令执行漏洞"
updated = "2026-06-16T21:47:41.957"

