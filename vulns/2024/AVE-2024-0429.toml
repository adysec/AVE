[basic]
description = "攻击者可通过特殊构造的efolioer_in参数实现SQL注入攻击，攻击者可以读取敏感数据、修改数据库记录、获取数据库权限或进一步攻陷其他系统。该漏洞利用泛微OA的Java JDBC连接处理缺陷，在GET或POST请求中传递恶意SQL语句诱使目标数据库执行，可影响OceanBase等数据库系统。漏洞影响范围广，危害严重，攻击者无需权限即可获取数据库敏感信息，威胁企业数据安全和系统稳定。"
published = "2024-05-08"
remediation = "升级到泛微OEA 10.x系列最新版本，安装官方安全补丁包；更新系统到支持安全修复的版本；加强系统权限控制，限制数据库用户权限；进行安全渗透测试，发现并修复类似漏洞"
score = 5.5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "泛微公司Office OA系统 efolioer_in参数SQL注入漏洞"
updated = "2024-06-15"

