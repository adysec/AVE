[basic]
description = "Allaire ColdFusion Server 4.0 的 Expression Evaluator 组件中存在路径访问控制缺陷，远程攻击者无需身份认证即可通过 openfile.cfm 脚本向服务器上传任意文件，同时还可实现远程文件读取、删除和执行。该漏洞源于对文件访问权限的校验不严，攻击者利用 HTTP 请求即可触发，影响 ColdFusion Server 4.0 版本，CVSS 评分 7.5，危害等级高。"
published = "1999-12-25T05:00:00.000"
remediation = "立即升级 ColdFusion Server 至 4.0.1 或更高版本，该版本已修复 openfile.cfm 未授权访问问题。如无法升级，在 Web 服务器（IIS/Apache）层面配置访问控制规则，禁止外部直接访问 /cfm/openfile.cfm 路径，或通过 URL 重写模块拦截包含 openfile.cfm 的请求。同时移除不必要的示例文件目录，并启用身份验证保护管理接口。"
score = 7.5
severity = "HIGH"
sources = ["exploitdb"]
title = "Allaire ColdFusion Server 4.0 任意文件上传与执行漏洞"
updated = "2026-06-16T21:48:28.877"

