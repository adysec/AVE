[basic]
description = "Linux Kernel 2.2.x 内核在处理 ICMP 数据包时存在拒绝服务漏洞。该漏洞源于内核网络子系统对畸形 ICMP 数据包的校验不足，当数据包携带异常的 ICMP 类型（type）、代码（code）以及非法的 IP 头部长度时，内核无法正确解析并可能导致系统崩溃或资源耗尽。攻击者可构造此类特制数据包，通过向目标主机发送该畸形 ICMP 包触发漏洞，无需身份认证且可远程发起。受影响范围主要包括运行 Linux 2.2.x 内核的系统（如 Debian Linux 2.1、RedHat Linux 6.0、SuSE Linux 6.1 等）。利用方式通常为使用工具构造携带异常选项的 IP 报文发送 ICMP 数据包，致使目标系统内核异常、停止响应，从而造成拒绝服务。"
published = "1999-06-01T04:00:00.000"
remediation = "建议将受影响的 Linux 2.2.x 内核升级至官方已修复该 ICMP 处理缺陷的 2.2.10 及以上版本；Debian 用户升级到 potato 内核包、RedHat 用户应用对应 RHSA 内核补丁、SuSE 用户升级至 6.1 之后的内核 RPM。若暂时无法升级，可在边界防火墙或用 iptables/route 过滤来源不可信的畸形 ICMP 包，并设置 net.ipv4.icmp_echo_ignore_all=1 缓解攻击。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Linux Kernel Linux Kernel 2.2.x ICMP畸形包拒绝服务漏洞"
updated = "2026-06-16T21:49:05.527"

