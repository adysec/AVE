[basic]
description = "用友时空KSOA 存在 SQL 注入漏洞，攻击者可通过向特制的 HTTP 请求参数中注入恶意 SQL 语句绕过应用层过滤，进而直接操作后端数据库。该漏洞源于程序未对用户输入进行充分的参数化查询处理，导致攻击者可以在未授权的情况下远程获取敏感数据、篡改数据库内容，甚至执行系统命令。该漏洞影响用友时空KSOA 多版本，攻击难度较低，危害较大。"
published = "nday"
remediation = "建议升级用友时空KSOA至最新安全版本，联系用友官方获取SQL注入漏洞补丁。临时缓解措施：在WAF中添加针对该路径参数的SQL注入规则，对用户输入进行参数化校验和过滤，限制数据库账户权限为最小必要原则。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "用友 时空KSOA SQL注入漏洞"
updated = "nday"

