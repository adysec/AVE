[basic]
description = "Linux 内核 mt76 无线驱动中 mt7915 模块的 `mt7915_pci_init_hif2()` 函数调用 `pci_get_device()` 获取 PCI 设备后，未调用 `pci_dev_put()` 释放引用计数，导致 PCI 设备引用计数泄漏。本地攻击者可利用该漏洞通过多次触发驱动初始化操作耗尽系统内存资源，造成拒绝服务。该漏洞影响使用 mt7915 无线网卡的 Linux 系统，CVSS 评分 5.5，危害等级中危。"
published = "2025-10-01T12:15:39.997"
remediation = "升级 Linux 内核至 6.0.16、6.1.2 或 6.2 及以上版本（分别对应稳定分支补丁 commit 8abc65796671、5938196cc188、2d4b9c7e81f3），已修复 mt7915 PCI 设备引用计数泄漏。如无法立即升级，可在内核引导参数中添加 `modprobe.blacklist=mt7915e` 临时禁用受影响驱动模块，或通过 `rmmod mt7915e` 卸载模块并阻止自动加载。"
score = 5.5
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux kernel mt76 mt7915 无线网卡驱动 PCI 设备引用计数泄漏漏洞"
updated = "2026-06-17T05:23:36.433"

