[basic]
description = "bootpd（Bootstrap Protocol Daemon）2.4.3 及更早版本中存在缓冲区溢出漏洞，远程攻击者可通过向目标系统发送特制的包含超长引导文件路径的 DHCP/BOOTP 请求触发该漏洞，导致缓冲区溢出，可能造成远程代码执行或服务崩溃。该漏洞影响运行 bootpd 服务的各类 Unix/Linux 系统，攻击者无需身份认证即可远程利用，CVSS 评分 10.0，危害等级严重。"
published = "1997-06-01T04:00:00.000"
remediation = "该漏洞存在于 bootpd 2.4.3 及更早版本中，由于对引导文件位置参数长度缺乏有效校验，攻击者可通过提交超长 boot file 路径触发缓冲区溢出，实现远程代码执行，CVSS v2.0 评分 10.0，危害极高。建议立即升级 bootpd 至 2.4.4 或更高版本（如已停止维护，应彻底禁用 bootpd 服务）；如业务仍依赖 BOOTP 协议，应迁移至 DHCP 服务（如 isc-dhcp-server），并在防火墙上限制 UDP 端口 67/68 的访问来源。对于无法立即升级的遗留系统，可在服务启动参数中限制配置文件路径长度作为临时缓解措施。"
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "BSD bootpd 缓冲区溢出漏洞"
updated = "2026-06-16T21:49:04.920"

