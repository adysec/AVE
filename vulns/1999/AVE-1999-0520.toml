[basic]
description = "Debian man-db 软件包中的 zsoelim 程序存在符号链接（Symlink）漏洞。本地攻击者可通过构造恶意符号链接，诱导 zsoelim 程序在处理手册页时将其重定向至目标文件，从而覆盖系统上的任意文件，实现权限提升或破坏系统完整性。该漏洞影响 Debian man-db 2.3.10 及更早版本，CVSS 评分 10.0，危害等级严重。建议用户升级至最新版本以修复此漏洞。"
published = "1999-06-12T04:00:00.000"
remediation = "升级 man-db 软件包至 2.3.11 及以上版本，该版本中 zsoelim 不再跟随符号链接处理临时文件。建议运行 apt-get update && apt-get install man-db 更新。作为临时缓解，可在系统层面移除 zsoelim 的 setuid 权限：chmod u-s /usr/lib/man-db/zsoelim。"
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "Debian man-db zsoelim 本地符号链接覆盖漏洞"
updated = "2026-06-16T21:48:56.240"

