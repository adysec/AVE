[basic]
description = "Linux 内核 coresight 驱动中存在内存泄漏漏洞（CWE-401），位于 drivers/hwtracing/coresight/coresight-platform.c。在 ACPI 缓冲区处理过程中，acpi_get_dsd_graph() 返回后未释放 buf.pointer 指向的内存，导致已分配内存无法回收。具有本地低权限的攻击者可反复触发相关代码路径，持续消耗系统内存，最终导致拒绝服务。该漏洞影响 Linux 内核 5.3 至 6.5.3 之前版本，CVSS 评分 5.5，危害等级中危。内核社区已通过将临时变量移至 acpi_coresight_parse_graph() 并在函数返回前释放缓冲区的方式修复此漏洞。"
published = "2025-09-15T15:15:53.540"
remediation = "立即将 Linux 内核升级至 6.5.3 或更高版本（稳定版已包含修复提交 d1b60e7c9fee），或向后移植补丁 https://git.kernel.org/stable/c/1a9e02673e2550f5612099e64e8761f0c8fc0f50 至当前内核。临时缓解措施：在不使用 CoreSight 调试功能的系统上，可卸载 coresight 驱动模块或通过内核命令行参数禁用相关 ACPI 设备节点以防止触发内存泄漏。"
score = 5.5
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux kernel coresight 内存泄漏漏洞"
updated = "2026-06-17T06:44:39.973"

