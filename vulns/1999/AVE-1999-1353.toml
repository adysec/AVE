[basic]
description = "HP-UX 11.0及更早版本中的Character-Terminal User Environment (CUE)组件存在符号链接攻击漏洞。本地用户可通过在IOERROR.mytty临时文件上实施符号链接攻击，将文件指向任意系统文件，从而覆盖任意文件并获取root权限。该漏洞源于程序以不安全的方式创建和使用临时文件，未进行充分的路径检查，导致攻击者可在文件创建前建立符号链接实现权限提升。"
published = "1997-09-01"
remediation = "HP已发布安全公告HPSBUX9801-074修复此漏洞。受影响用户应安装HP-UX安全补丁或升级至不受影响的版本。同时应限制本地用户对系统的交互式访问权限，并监控IOERROR.mytty等临时文件的异常创建行为以防止符号链接攻击。"
score = 7.2
severity = "HIGH"
sources = ["cve"]
title = "HP-UX Character-Terminal User Environment 符号链接攻击提权漏洞"
updated = "2026-06-16"

