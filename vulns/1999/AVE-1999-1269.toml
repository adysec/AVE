[basic]
description = "Solaris 系统中 ping 程序在处理通过回环接口（loopback interface）发送到多播地址（multicast address）的 ICMP 请求时存在缺陷，未经充分验证的输入可导致内核崩溃，引发系统 panic。该漏洞影响 Solaris 2.3 至 2.6 版本（含 SunOS 5.3 至 5.6）。本地攻击者若拥有目标系统的 shell 访问权限，可通过执行 `ping -i <多播地址>` 等命令触发该拒绝服务漏洞，使系统宕机或重启。Sun Microsystems 已通过 Sun Security Bulletin 发布补丁修复此问题。"
published = "1997-06-26T04:00:00.000"
remediation = "安装 Sun Security Bulletin 146 中提供的补丁程序，或升级到不受影响的 Solaris 版本。临时缓解措施：限制普通用户执行 ping 命令的权限，通过 chmod 移除 /usr/sbin/ping 的 setuid 位，或使用 RBAC 控制 ping 命令的调用，防止本地用户通过 `ping -i` 向组播地址发送请求触发系统崩溃。"
score = 2.1
severity = "LOW"
sources = ["exploitdb"]
title = "Sun Solaris 2.3 至 2.6 Ping 组播地址拒绝服务漏洞"
updated = "2026-06-16T21:50:24.550"

