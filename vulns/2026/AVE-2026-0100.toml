[basic]
description = "Oracle PeopleSoft PeopleTools 的 Updates Environment Management 组件存在认证缺失漏洞（CWE-306），未经身份认证的远程攻击者可通过 HTTP 协议向目标系统发送特制请求，利用 /psp/ 及 /PSEMHUB/hub 等接口的反序列化缺陷触发远程代码执行，导致系统完全被接管。该漏洞影响 PeopleTools 8.61 及 8.62 版本，CVSS 评分 9.8，危害等级严重。厂商已发布补丁，建议升级至 PeopleTools 8.63+ 并配置访问控制与反序列化过滤器。"
published = "2026-06-11T04:16:53.680"
remediation = "立即升级 PeopleSoft PeopleTools 至 8.63 或更高版本；在防火墙上限制 /psp/ 和 /PSEMHUB/hub 接口仅允许内网 IP 访问；添加 JVM 反序列化过滤器参数 -Djdk.serialFilter=!* 以阻断恶意序列化攻击；部署 WAF 规则拦截 ysoserial 工具的攻击特征载荷。"
score = 9.8
severity = "CRITICAL"
sources = ["hwpoc"]
title = "Oracle PeopleSoft Enterprise PeopleTools 远程代码执行漏洞"
updated = "2026-06-17T10:40:19.560"

