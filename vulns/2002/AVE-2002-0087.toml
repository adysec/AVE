[basic]
description = 'GeneWeb 4.09 之前版本的守护进程（daemon）在处理请求路径时存在路径遍历漏洞，远程攻击者无需身份认证即可通过构造包含特殊字符（如 "../"）的恶意 URL，绕过路径限制读取服务器上任意文件，导致系统敏感信息泄露。该漏洞攻击复杂度低，仅需发送特制 HTTP 请求即可利用，影响范围涵盖 GeneWeb 4.09 之前的所有版本。'
published = "2003-01-17T05:00:00.000"
remediation = "立即将 GeneWeb 升级至 4.09 或更高版本（该版本于 2002 年 12 月 30 日发布，修复了路径处理不当导致的任意文件读取漏洞）。Debian 用户应参考 DSA-223 安全公告安装对应更新。如无法立即升级，可在反向代理或防火墙层面限制对 GeneWeb 守护进程（gwd）的访问，仅允许可信 IP 连接，并避免将 GeneWeb 暴露在公网。"
score = 5
severity = "MEDIUM"
sources = ["osv"]
title = "GeneWeb 4.09之前版本守护进程路径处理不当导致任意文件读取漏洞"
updated = "2026-06-16T21:59:14.300"

