[basic]
description = "Microsoft Windows 95/98/NT 4.0/2000 及 Terminal Server 系统的 IP 碎片重组模块存在资源管理错误漏洞。远程攻击者无需身份认证，只需向目标系统发送大量内容相同的 IP 分片数据包（即 Jolt2 攻击），即可导致目标系统 CPU 占用率飙升、系统响应缓慢甚至完全崩溃，造成拒绝服务。该漏洞影响范围广泛，攻击条件简单，利用代码已公开，危害等级高。微软已在 MS00-029 安全公告中发布补丁修复此漏洞。"
published = "2000-05-19T04:00:00.000"
remediation = "安装微软 MS00-029 安全更新补丁，或升级至 Windows XP 及以上版本。对于仍运行 Windows 2000 的系统，在防火墙规则中丢弃入站 IP 分片数据包可临时缓解。这些操作系统均已停止支持，建议尽快升级至受支持的 Windows 版本。"
score = 7.8
severity = "HIGH"
sources = ["cve"]
title = "Microsoft Windows IP 碎片重组拒绝服务漏洞"
updated = "2026-06-16T21:51:26.387"

