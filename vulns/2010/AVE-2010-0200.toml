[id]
ave_id = "AVE-2010-0200"
aliases = ["CVE-2010-0249"]
[basic]
title = "Microsoft Internet Explorer 释放后重用内存破坏远程代码执行漏洞"
description = "Microsoft Internet Explorer 6/7/8 存在释放后重用（Use-After-Free）内存破坏漏洞，是由于对已删除对象的内存指针未正确处理导致的。远程攻击者可通过构造特制网页，诱使用户在受影响的浏览器中访问该页面，从而触发内存破坏并执行任意代码。该漏洞在 2009 年 12 月至 2010 年 1 月期间已被极光行动（Operation Aurora）利用于野外攻击，影响 Windows 2000/XP/Vista/7 及 Windows Server 2003/2008 等多个系统版本。微软已在安全公告 MS10-002 中发布补丁修复。"
severity = "HIGH"
score = 8.8
sources = ["kev"]
published = "2010-01-15T17:30:00.533"
updated = "2026-06-16T23:15:47.577"
remediation = "立即安装 Microsoft 安全公告 MS10-002 (KB978207) 提供的 Internet Explorer 累积安全更新，将 IE 升级至修复版本（IE6 SP1 升级至 6.0 SP1 更新版，IE7 升级至 7.0 更新版，IE8 升级至 8.0 更新版）。临时缓解措施：将 Internet 安全区域设置为"高"并禁用 Active Scripting，同时避免以管理员权限浏览不可信网站。"
