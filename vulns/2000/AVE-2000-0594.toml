[basic]
description = "IRIX 操作系统中 /usr/bin/lpstat 工具存在本地缓冲区溢出漏洞。lpstat 程序在处理 -n 参数时未对用户输入长度进行有效边界检查，导致攻击者可通过传递超长字符串触发缓冲区溢出，覆盖内存中的关键数据。本地攻击者利用该漏洞可获取 root 权限，实现完全控制目标系统。攻击条件要求拥有本地 shell 访问权限，无需身份认证即可提权。该漏洞影响 IRIX 6.2 及 6.3 版本，CVSS 评分 7.2，危害等级高。"
published = "2000-10-20T04:00:00.000"
remediation = "立即升级到 IRIX 6.5.11 或更高版本，该版本已修复 lpstat 缓冲区溢出漏洞。如无法升级，可临时移除 /usr/bin/lpstat 的 setuid 权限（chmod u-s /usr/bin/lpstat），限制本地非授权用户执行该程序。由于 SGI IRIX 已停止维护，建议尽快迁移至受支持的操作系统。"
score = 7.2
severity = "HIGH"
sources = ["cve"]
title = "SGI IRIX lpstat 本地缓冲区溢出漏洞"
updated = "2026-06-16T21:52:29.807"

