[basic]
description = "Linux 内核 drm/amdgpu 驱动中的 SDMA 更新页表功能使用了未加锁的迭代器，当从非锁定上下文调用 SDMA 更新页表操作时，会触发内核警告及潜在的使用后释放漏洞。本地攻击者可通过构造特定的 GPU 操作序列导致内存访问错误，造成系统拒绝服务或潜在的信息泄露。该漏洞影响 Linux 内核版本，CVSS 评分 5.5，危害等级中危。"
published = "2025-09-18T14:15:38.380"
remediation = "升级 Linux 内核至 5.19.17/6.0.3/6.1 及以上版本，或 cherry-pick 修复提交 `3913f0179ba3`。无法立即升级时，可在加载 amdgpu 模块时添加 `amdgpu.sg_display=0` 参数作为临时缓解措施。"
score = 5.5
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux Kernel AMDGPU SDMA 未锁定迭代器安全漏洞"
updated = "2026-06-17T05:23:26.330"

