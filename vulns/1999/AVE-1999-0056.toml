[basic]
description = "Land 攻击是一种经典的拒绝服务漏洞，攻击者向目标系统发送源 IP 地址和源端口与目标 IP 地址和端口完全相同的特制 TCP SYN 数据包，目标操作系统收到该数据包后会尝试与自己建立 TCP 连接，形成回环死循环，最终耗尽系统资源导致拒绝服务。该漏洞影响 Windows 95/NT 4.0、FreeBSD 2.x、HP-UX 9/10/11、Linux Kernel 2.0.3、NetBSD 1 等多个操作系统版本，远程攻击者只需发送单个精心构造的数据包即可触发，无需认证，危害范围广泛。各厂商后续通过补丁禁止处理源目标地址相同的 TCP 数据包修复此漏洞。"
published = "1997-12-01T05:00:00.000"
remediation = "安装 Microsoft 官方补丁或升级至 Windows NT 4.0 Service Pack 5 及以上版本。对于 Linux/BSD/HP-UX 系统，升级内核至修复版本（Linux 2.0.34+、FreeBSD 3.0+）。临时缓解措施：在网络防火墙上添加规则，丢弃源 IP 等于目标 IP 的入站 SYN 数据包。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Microsoft Windows 95/NT Land IP 拒绝服务漏洞"
updated = "2026-06-16T21:47:21.427"

