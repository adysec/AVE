[basic]
description = "Microsoft SQL Server 7.0 及 Microsoft Data Engine (MSDE) 1.0 的查询处理器存在输入验证缺陷，远程攻击者无需身份认证即可向目标数据库发送特制的 Select 语句触发此漏洞，成功利用后可获取数据库管理员权限，导致受影响系统的机密性、完整性和可用性受损。"
published = "2000-03-08T05:00:00.000"
remediation = "建议立即安装 Microsoft SQL Server 7.0 Service Pack 2 (SP2) 或更高版本，该更新已修复通过畸形 Select 语句提升权限的问题。若无法升级，建议在应用层严格过滤用户输入的 SQL 语句，避免直接拼接恶意查询，并使用最小权限原则运行 SQL Server 服务账户。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "Microsoft SQL Server 和 MSDE 权限提升漏洞"
updated = "2026-06-16T21:51:12.873"

