[basic]
description = 'Ceph 分布式存储系统的 RadosGW 组件在 JWT 认证实现中存在身份验证绕过漏洞。由于未正确校验 JWT 签名算法，攻击者可构造 alg 字段为 "none" 的恶意 JWT 令牌绕过签名验证，从而以任意用户身份访问 RadosGW 的 OIDC 提供者接口。该漏洞允许已获得低权限的远程攻击者利用特制请求提升权限，导致机密性和完整性失陷。影响 Ceph 19.2.3 及以下版本，CVSS 评分 8.1，危害等级高。'
published = "2025-07-30T20:15:33.423"
remediation = '立即升级 Ceph Squid 至 v19.2.3 或更高版本（v19.2.3 已通过 PR#62137 修复此漏洞），升级命令：`cephadm upgrade --ceph-version 19.2.3`。如无法立即升级，在 RadosGW 配置中禁用 OIDC 身份提供商（`rgw sts key = ` 置空），或在反向代理层拦截含 `"alg":"none"` 的 JWT 令牌请求作为临时缓解。'
score = 8.1
severity = "HIGH"
sources = ["msrc"]
title = "Ceph RadosGW 身份验证绕过漏洞"
updated = "2026-06-17T07:59:01.940"

