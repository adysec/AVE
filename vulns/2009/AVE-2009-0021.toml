[basic]
description = "RealNetworks RealPlayer 多版本（RealPlayer 10、10.5、11、Enterprise 版、Mac 10/10.1、Linux 10 及 Helix Player 10.x）在处理 Internet Video Recording (IVR) 文件时存在堆缓冲区溢出漏洞。攻击者可构造文件名长度字段包含巨大整数的恶意 IVR 文件，诱导用户通过 Windows 资源管理器插件打开，触发任意内存位置被 0x00 字节覆盖，导致任意代码远程执行。漏洞影响 Windows、Mac、Linux 多平台多版本 RealPlayer 及 Helix Player，CVSS 9.3 严重级别，攻击者需诱导用户打开恶意文件即可实现远程代码执行，RealNetworks 已发布 RealPlayer SP 1.0.5 修复版本。"
published = "2009-02-08T21:30:09.797"
remediation = "立即升级 RealPlayer 至 SP 1.0.5 或更高版本（RealPlayer 11.0.5+、RealPlayer 10.5 6.0.12.1742+、RealPlayer 10 修补版）。无法立即升级时，在 Windows 资源管理器中取消关联 .ivr 文件，或卸载 RealPlayer Windows Explorer 插件（卸载 ivfsrc.ax 过滤器），禁止打开不可信的 IVR 文件作为临时缓解措施。"
score = 9.3
severity = "CRITICAL"
sources = ["tenable"]
title = "RealNetworks RealPlayer IVR 文件缓冲区溢出代码执行漏洞"
updated = "2026-06-16T23:04:53.820"

