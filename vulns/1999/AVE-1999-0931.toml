[basic]
description = 'Microsoft Windows NT 4.0 的用户外壳文件夹功能中，"AEDebug" 注册表项权限设置不当，导致本地攻击者可在系统崩溃时通过修改该注册表项指向恶意调试器，从而实现特权提升或执行任意代码。攻击者需具备本地访问权限，利用门槛较低，危害中等。'
published = "1999-12-31T05:00:00.000"
remediation = '限制 `HKEY_LOCAL_MACHINE\SOFTWARE\Microsoft\Windows NT\CurrentVersion\AEDebug` 注册表项的写入权限，仅保留 SYSTEM 和 Administrators 的完全控制权，移除 Users 组的写入/修改权限。如无需自动调试功能，可将 `AEDebug` 的 `Debugger` 值清空或删除该注册表项。建议升级至 Windows 2000 或更高版本以获得完整的注册表访问控制支持。'
score = 4.6
severity = "MEDIUM"
sources = ["cve"]
title = "Microsoft Windows NT 4.0 注册表权限提升漏洞"
updated = "2026-06-16T21:49:41.253"

