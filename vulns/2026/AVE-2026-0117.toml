[basic]
description = "CVE-2026-6685 最初被分配用于描述 FatFs 文件系统（ChaN FatFs）中存在的整数下溢漏洞。该漏洞涉及在 f_read() 函数中因无符号减法下溢导致的脏缓存越界写入问题，理论上可导致系统崩溃或数据损坏。然而，经 CVE 编号管理机构（CNA）复核确认，该漏洞判定存在错误，因此本 CVE 编号已被正式拒绝/撤销，不应视为有效安全漏洞。"
published = "2026-07-01T15:17:12.660"
remediation = "该 CVE 已被 CNA 确认为误报并撤销，实际不存在安全漏洞，无需安装任何补丁或采取缓解措施。如果代码中已根据该报告添加了相关修复，建议移除临时补丁以避免不必要的性能开销。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "ChaN FatFs 整数下溢越界写入漏洞"
updated = "2026-07-16T21:17:22.107"

