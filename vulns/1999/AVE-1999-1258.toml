[basic]
description = "SGI IRIX 操作系统（5.2 及 6.0.1 之前版本）自带的桌面权限工具（Desktop Permissions Tool）存在权限文件操纵缺陷。该工具在修改文件权限时未对调用者的操作范围进行充分校验，导致已登录的本地普通用户能够对任意系统文件的访问权限进行修改。攻击者在获得本地访问权限后，可将自身对某些系统关键文件或可执行文件的权限提升为可写或可执行状态，进而替换特权程序、篡改系统配置文件，最终实现本地权限提升，获取 root 级别的控制权。该漏洞利用条件简单，仅需本地账户即可触发，严重影响系统完整性。"
published = "1995-03-03"
remediation = "升级 IRIX 至已修复该问题的版本（6.0.2 及以上），或卸载/禁用 SGI Desktop Permissions Tool 桌面权限工具。若无法立即升级，应限制普通用户对权限工具的访问，收紧敏感系统文件的权限设置，并定期审计关键文件的权限变更。"
score = 4.6
severity = "MEDIUM"
sources = [
    "exploitdb",
    "cve",
]
title = "SGI IRIX Desktop Permissions Tool 本地权限提升漏洞"
updated = "2026-07-18"

