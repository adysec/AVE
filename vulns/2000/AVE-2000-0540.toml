[basic]
description = "Zope 2.2 及更早版本的 DocumentTemplate 包存在授权绕过漏洞，远程攻击者无需任何身份认证即可修改服务器上的 DTMLDocument 或 DTMLMethod 对象，导致网站内容被篡改或植入恶意 DTML 代码。该漏洞影响 Zope 2.2 及其之前所有版本，攻击者只需通过网络向目标 Zope 服务器发送特制请求即可触发，无需特殊权限或前提条件。"
published = "2000-06-15T04:00:00.000"
remediation = "立即安装 Zope 官方于 2000 年 6 月 16 日发布的安全热修复补丁（Hotfix_06_16_2000），或升级至 Zope 2.2.1 及以上版本。Red Hat 用户应应用 RHSA-2000-038 安全更新；FreeBSD 用户应安装 FreeBSD-SA-00:38 中提供的补丁。如无法立即升级，可在 Zope 管理界面中限制 DTML 文档和方法的远程访问权限，仅允许受信任 IP 访问管理端口。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "Zope 2.2 DTML模板和DTML方法未授权修改漏洞"
updated = "2026-06-16T21:51:49.863"

