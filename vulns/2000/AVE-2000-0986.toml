[basic]
description = "Eudora 邮件客户端在生成虚拟通行证（VCF 文件）时，会将发送者主机的绝对文件系统路径嵌入其中，导致本地路径信息泄露。攻击者可通过诱导受害者发送 VCF 文件或拦截邮件附件，解析其中的绝对路径获取受害者主机文件系统结构信息，辅助后续路径遍历、文件包含等攻击。该漏洞影响 Eudora 邮件客户端早期版本，CVSS 5.0（AV:N/AC:L/Au:N/C:P/I:N/A:N），属中等危害，攻击者无需认证即可通过网络远程获取部分敏感路径信息。Qualcomm 已在后续版本中修复该路径泄露问题。"
published = "2000-11-14T05:00:00.000"
remediation = "建议升级 Eudora 邮件客户端至 5.1 或更高版本（Qualcomm 已修复此问题），或在邮件客户端设置中禁用虚拟名片（VCF）附件功能以防止路径泄露。若无法升级，建议配置邮件客户端不自动发送 VCF 附件，或使用防火墙/邮件网关过滤包含绝对路径的 VCF 附件。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Qualcomm Eudora邮件客户端 虚拟通行证(VCF)路径泄露漏洞"
updated = "2026-06-16T21:52:38.987"

