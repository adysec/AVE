[basic]
description = "ISC BIND 8.2 至 8.2.2-P6 版本的 named 服务程序在处理 SRV 资源记录时存在缺陷，远程攻击者无需身份认证即可向目标 DNS 服务器发送特制的 SRV 记录请求，触发服务异常，导致 BIND 服务进程崩溃或拒绝服务。该漏洞影响运行 BIND 8.2 系列版本的 DNS 服务器，攻击者只需能够向目标服务器发送 DNS 查询即可利用，攻击门槛低，可导致正常域名解析服务中断。"
published = "2000-12-19T05:00:00.000"
remediation = "建议立即升级 ISC BIND 至 8.2.2-P7 或更高版本，该漏洞已在 8.2.2-P7 中修复。如无法升级，可迁移至 BIND 9 系列以获得长期支持。临时缓解措施：在边界防火墙上限制对 DNS 服务器的外部访问，仅允许可信源发起 DNS 查询。"
score = 5
severity = "MEDIUM"
sources = ["redhat"]
title = "ISC BIND SRV 记录处理拒绝服务漏洞"
updated = "2026-06-16T21:52:40.820"

