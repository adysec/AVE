[basic]
description = "用友NC系统的门户接口 `/portal/pt/link/content` 存在SQL注入漏洞。该接口在处理 `pk_funnode` 等参数时未对用户输入进行充分的过滤与参数化校验，攻击者可构造包含恶意SQL语句的请求（如利用 `';waitfor delay '0:0:0'--` 进行时间盲注），通过未授权的HTTP GET请求向目标系统发送特制URL即可触发数据库任意查询。此漏洞影响部署了存在缺陷版本用友NC系统的服务器，成功利用可导致数据库敏感信息泄露、权限绕过乃至进一步的内网渗透，危害较大。"
published = "0812"
remediation = "立即安装用友官方发布的安全补丁包（建议升级至 NC 6.5 及以上最新累积补丁版本），修复 link 接口的 SQL 注入缺陷；在无法立即升级时，于 Web 应用防火墙（WAF）中拦截 /portal/pt/link/content 路径对 pk_funnode、pageId 参数的特殊字符（单引号、分号、注释符）请求作为临时缓解，并配置反向代理仅允许受信任内网 IP 访问该接口，同时关闭对外网暴露的 NC 门户匿名访问权限。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "用友 NC系统 SQL注入漏洞"
updated = "0812"

