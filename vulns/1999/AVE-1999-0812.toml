[basic]
description = "目标系统运行了不必要的 NFS（网络文件系统）服务，虽然未导入或导出任何文件系统，但开放的 NFS 端口（2049/TCP 和 2049/UDP）可能被远程攻击者通过端口扫描发现并利用，导致系统信息泄露或攻击面扩大。攻击者可尝试枚举共享资源或利用 NFS 协议相关缺陷发起进一步攻击。建议关闭非必要的 NFS 服务以缩小攻击面。"
published = "1999-01-01T05:00:00.000"
remediation = "立即停止并禁用不必要的 NFS 服务：在 Linux 上执行 `systemctl stop nfs-server && systemctl disable nfs-server`，在 Solaris 上执行 `svcadm disable nfs/server`。如需保留 NFS 功能，在 `/etc/exports` 中严格限制可导出目录及访问客户端（如 `192.168.0.0/16(rw)`），并使用 `exportfs -ra` 生效。同时配置 iptables 或防火墙仅允许可信 IP 访问端口 2049(TCP/UDP) 和 111(TCP/UDP)。"
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "多款 NFS 服务器实现多余服务运行信息泄露漏洞"
updated = "2026-06-16T21:48:36.730"

