[basic]
description = "Ollama 0.17.1 之前版本的 GGUF 模型加载器中存在堆越界读取漏洞。攻击者可通过 /api/create 端点上传特制的 GGUF 文件，其中声明的张量偏移和大小超过文件实际长度，导致服务器在量化处理时读取越界堆内存，泄露环境变量、API 密钥、系统提示词及并发用户会话数据等敏感信息，并可通过 /api/push 端点将泄露数据外传至攻击者控制的镜像仓库。该漏洞 CVSS 评分 8.8，危害等级高，尽管默认绑定 127.0.0.1，但实际广泛配置为 OLLAMA_HOST=0.0.0.0 导致大量公网暴露。建议升级至 0.17.1 或更高版本，并限制 /api/create 和 /api/push 端点访问。"
published = "2026-05-04T13:16:01.727"
remediation = "立即升级到 Ollama 0.17.1 或更高版本（含 commit 88d57d0483cca）。临时缓解措施：限制 /api/create 和 /api/push 端点的外部访问，仅允许受信任的内网 IP 调用；禁止将 OLLAMA_HOST 设置为 0.0.0.0；在反向代理层对上传的 GGUF 文件大小和张量偏移进行校验；启用身份认证并轮换已暴露的 API 密钥和凭据。"
score = 8.8
severity = "HIGH"
sources = ["hwpoc"]
title = "Ollama GGUF 堆越界读取漏洞"
updated = "2026-06-17T11:02:30.040"

