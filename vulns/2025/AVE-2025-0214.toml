[basic]
description = "东胜物流软件 WorkFlowGridSource.aspx 页面存在 SQL 注入漏洞，攻击者可在未经授权的情况下向 `id` 等参数构造恶意 SQL 语句并注入后端数据库，导致敏感信息泄露、数据被篡改甚至获取服务器控制权。该漏洞影响东胜物流软件多个版本，危害较大。"
published = "0723"
remediation = "对 WorkFlowGridSource.aspx 页面传入的参数进行严格过滤与类型校验，使用参数化查询或存储过程替代 SQL 字符串拼接。升级东胜物流软件至官方最新版本，或在 Web 应用防火墙上添加针对该路径的 SQL 注入检测规则作为临时缓解。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "东胜物流软件 WorkFlowGridSource.aspx SQL注入漏洞"
updated = "0723"

