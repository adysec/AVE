[basic]
description = "Check Point Firewall-1 LDAP属性访问限制不当漏洞"
published = "1999-10-20T04:00:00.000"
remediation = "升级 Check Point Firewall-1 至最新受支持版本（当前为 Quantum Security Gateway R8x 系列），确保已应用所有安全补丁。在防火墙规则库中严格限制 LDAP（TCP 389）和 LDAPS（TCP 636）端口的访问源，仅允许受信管理服务器和认证服务器发起连接。禁用不必要的 LDAP 匿名查询功能，并在 LDAP 服务器对象中配置属性集访问控制列表（ACL），仅开放业务必需的属性字段。"
score = 7.5
