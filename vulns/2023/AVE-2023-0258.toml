[basic]
description = "Jeecg-Boot 是一款基于 SpringBoot 的快速开发平台，其集成报表组件 JimuReport 在 FreeMarkerUtils 中暴露了 FreemarkerMethod.compute 方法，该方法将用户输入的表达式直接传递给 AviatorEvaluator.execute 执行。未经认证的攻击者可通过 /jmreport/queryFieldBySql 等接口注入恶意 FreeMarker 模板表达式，利用 Aviator 脚本引擎配合反射机制实现任意 Java 代码执行，进而完全控制服务器。"
published = "2023-08-20"
remediation = "将 JimuReport 升级至 1.6.1 或更高版本，该版本移除了存在缺陷的模板处理方法；同时建议在网络层面限制 /jmreport/ 接口的访问来源，避免暴露给未授权用户。"
score = 9.8
severity = "CRITICAL"
sources = [
    "cve",
    "hwpoc",
]
title = "Jeecg-Boot JimuReport FreeMarker 模板注入远程代码执行漏洞"
updated = "2026-07-20"

