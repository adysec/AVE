[basic]
description = "QEMU 的 PCIe SR-IOV 虚拟功能（VF）实现中存在缓冲区溢出漏洞，位于 hw/pci/pcie_sriov.c 的 register_vfs 函数。当虚拟机内客户机操作系统写入的 NumVFs 值超过 TotalVFs 上限时，QEMU 未能正确校验该边界条件，导致 VF 实现中发生堆缓冲区溢出（CWE-122/CWE-787）。攻击者可通过在客户机中构造恶意 PCI 配置空间写入操作触发此漏洞，造成宿主机 QEMU 进程崩溃（拒绝服务），在特定条件下可能实现任意代码执行。该漏洞影响 QEMU 7.1.0 至 10.0.3 版本，CVSS 评分 5.3，危害等级中危。"
published = "2024-02-19T05:15:22.527"
remediation = "将 QEMU 升级至 9.0.0 或更高版本（上游提交 6081b4243cd64dff1b2cf5b0c215c71e9d7e753b）；RHEL 9 用户安装 RHSA-2024:9136 提供的 qemu-kvm-9.0.0-10.el9_5 或更新版本；Debian/Ubuntu 用户通过包管理器更新至发行版提供的修复版本。如无法立即升级，可在虚拟机配置中禁用 PCIe SR-IOV 功能（-device pcie-root-port,disable-sriov=on）作为临时缓解。"
score = 5.3
severity = "MEDIUM"
sources = ["msrc"]
title = "QEMU PCIe SR-IOV Virtual Function 缓冲区溢出漏洞"
updated = "2026-06-17T07:17:36.877"

