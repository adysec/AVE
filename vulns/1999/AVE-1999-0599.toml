[basic]
description = "metamail 邮件处理工具包存在命令注入漏洞，由于 mailcap 条目中的 shell 元字符（如管道符 |、分号 ; 等）未正确转义过滤，远程攻击者可通过向目标系统发送包含恶意载荷的邮件触发该漏洞，导致任意命令执行。该漏洞影响广泛部署 metamail 的 Unix/Linux 邮件系统，CVSS 评分 7.5，危害等级高危。"
published = "1999-02-04T05:00:00.000"
remediation = "升级 metamail 至 2.7-30 及以上版本，对 mailcap 文件中所有 %s 等宏替换参数使用双引号包裹，避免 shell 元字符被解析执行。如无法升级，可移除 mailcap 中涉及自动调用外部程序的条目以缓解风险。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "metamail 远程命令执行漏洞"
updated = "2026-06-16T21:48:14.403"

