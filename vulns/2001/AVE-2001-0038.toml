[basic]
description = "BSD 系统的 TelnetD 服务存在远程命令执行漏洞，由于 telnetd 对环境变量处理不当，攻击者可通过向目标系统的 telnet 端口发送特制的恶意请求，利用 telnet 协议中的选项协商机制触发漏洞，从而在目标系统上以 root 权限执行任意命令。该漏洞影响多个 BSD 衍生系统，攻击者无需身份认证即可远程利用，危害严重。"
published = "2001-02-12"
remediation = "立即应用 NetBSD SA2000-017 或对应 FreeBSD 补丁更新 telnetd 版本；在 inetd.conf 中注释 telnet 行（`telnet stream tcp nowait root /usr/libexec/telnetd telnetd -a`）并重启 inetd 服务以禁用 telnetd；改用 SSH 作为远程登录替代方案；限制本地非授权用户对系统的交互式访问权限。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "BSD TelnetD 远程命令执行漏洞"
updated = "2001-02-12"

