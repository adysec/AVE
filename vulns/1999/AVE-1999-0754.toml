[basic]
description = "Microsoft Windows 存在本地权限提升漏洞，已获得系统登录权限的认证用户可通过 Metasploit 框架等利用工具执行任意代码，从而获取更高系统权限。该漏洞影响 Windows NT 4.0 及更早版本，攻击者需拥有有效账户登录目标系统后方可利用，属于本地认证利用场景。由于 Windows 对用户权限的校验机制不完善，导致低权限用户可执行本应受限的操作。"
published = "1997-01-01"
remediation = '立即为所有本地用户和管理员账户设置强密码，确保密码非空且符合复杂度要求。通过本地安全策略（secpol.msc）启用"密码必须满足复杂性要求"和"密码长度最小值≥8个字符"，并禁用"允许使用空密码的本地账户只允许进行控制台登录"策略。对于 Windows NT 4.0 及后续版本，建议安装最新服务包（SP6a）并启用账户锁定策略（5次无效登录后锁定30分钟）。'
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Microsoft Windows 已认证用户代码执行漏洞"
updated = "1997-01-01"

