[basic]
description = "Crawl4AI Docker API 服务器存在凭据泄露漏洞（CWE-200），影响 0.8.8 之前版本。攻击者无需认证即可访问 /md、/llm、/llm/job 等接口，通过构造恶意的 base_url 参数将 LLM API 调用重定向至攻击者控制的端点，并设置 api_token 为 env:VARIABLE_NAME 格式读取任意环境变量，从而窃取 JWT 签名密钥、Provider API Key、Redis 密码等敏感凭据。该漏洞 CVSS 评分 8.8，危害等级高，可能导致服务器被完全接管。官方已在 0.8.8 版本中修复。"
published = "2026-07-12T12:16:45.013"
remediation = "立即升级 Crawl4AI 至 0.8.8 或更高版本（修补提交 aa81e8f），该版本已修复 base_url 参数重定向问题并增强 LLMConfig 环境变量解析保护。如无法升级，设置 CRAWL4AI_API_TOKEN 环境变量启用 JWT 认证，并在防火墙/反向代理层限制 Docker API 端口（默认 8080/11234）仅允许受信任来源访问；升级后立即轮换所有已泄露的 Provider API Key、JWT_SECRET_KEY 及 REDIS_PASSWORD 等敏感凭据。"
score = 8.8
severity = "HIGH"
sources = ["hwpoc"]
title = "Crawl4AI Docker API 凭据泄露漏洞"
updated = "2026-07-14T18:29:21.830"

