[basic]
description = "Aladdin Knowledge Systems eToken 3.3.3 设备存在 PIN 码提取漏洞，具有物理访问权限的攻击者可通过直接操作设备 EEPROM 重置 PIN 码，从而绕过身份验证机制获取敏感信息。该漏洞源于 EEPROM 存储保护不足，攻击者无需知道原所有者 PIN 即可完成重置，影响 eToken 3.3.3 版本，CVSS 评分 4.6，危害等级中危。"
published = "2000-05-04T04:00:00.000"
remediation = "立即停止使用 Aladdin eToken 3.3.3，该产品已停止技术支持超过 20 年。迁移至 Thales SafeNet eToken 系列（如 eToken PRO 或 eToken 5110），新硬件在 EEPROM 层面实现了 PIN 防篡改保护。在迁移完成前，将 eToken 存放于物理安全柜中并实施双人管控，限制物理接触。同时启用操作系统层面的智能卡 PIN 锁定策略（连续输错 3 次锁定），作为临时缓解措施。"
score = 4.6
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Aladdin Knowledge Systems eToken 3.3.3 PIN提取漏洞"
updated = "2026-06-16T21:51:42.583"

