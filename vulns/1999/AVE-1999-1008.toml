[basic]
description = "Sky Communications Skyfull 1.1.4 邮件服务器存在缓冲区溢出漏洞，攻击者可通过向目标系统的 SMTP 服务发送超长的 MAIL FROM 命令触发栈溢出。未经身份认证的远程攻击者在无需账号凭据的情况下，仅需连接到邮件服务器端口即可构造恶意数据包，利用该漏洞可导致服务崩溃或执行任意代码，进而完全控制服务器。受影响版本为 Sky Communications Skyfull 1.1.4，CVSS 评分为 7.5（高危）。该产品年代久远且厂商支持已终止，应停止使用并迁移至持续维护的邮件服务。"
published = "1999-10-30"
remediation = "立即停止使用 Skyfull 1.1.4 邮件服务器，迁移至 Postfix、Exim 或 Microsoft Exchange 等持续维护的邮件系统。在完成替换前，应在防火墙上限制仅可信 IP 访问 SMTP 端口（25/TCP），关闭对外暴露的 SMTP 服务，并部署网络入侵检测规则监控异常 MAIL FROM 超长请求。"
score = 7.5
severity = "HIGH"
sources = ["exploitdb"]
title = "Sky Communications Skyfull 邮件服务器 MAIL FROM 缓冲区溢出漏洞"
updated = "2026-06-16"

