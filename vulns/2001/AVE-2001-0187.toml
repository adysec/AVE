[basic]
description = "CrossWind CyberScheduler 2.1 的 websyncd 组件中存在缓冲区溢出漏洞，远程攻击者可通过向 websync.exe 发送超长的 tzs（时区）参数触发该漏洞，导致目标系统执行任意命令。该漏洞无需身份认证即可远程利用，攻击复杂度低，成功利用后可完全控制受影响系统。CVSS 评分 10.0，危害等级严重。目前已存在公开的 ExploitDB 利用代码。"
published = "2001-07-02T04:00:00.000"
remediation = "该产品已停止维护，官方未发布补丁。建议立即停止使用 CrossWind CyberScheduler 2.1，迁移至受支持的调度方案（如 ActiveState 或 Jenkins）。若无法立即替换，可在 Web 服务器（Apache/Nginx）层面配置规则拦截包含超长 tzs 参数的请求，并在防火墙限制对 websync.cgi 的访问来源 IP。"
score = 10
severity = "CRITICAL"
sources = ["exploitdb"]
title = "CrossWind CyberScheduler websyncd 远程缓冲区溢出漏洞"
updated = "2026-06-16T21:54:21.397"

