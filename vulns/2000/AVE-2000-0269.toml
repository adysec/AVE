[basic]
description = "Symantec pcAnywhere 8.0.1、8.0.2、9.0 及 9.2 版本存在拒绝服务漏洞。远程攻击者可通过发送大量 TCP SYN 扫描数据包（例如使用 nmap 工具）向目标主机的 pcAnywhere 服务发起攻击，导致服务进程崩溃或停止响应，正常用户无法进行远程控制操作。该漏洞攻击条件低，无需认证即可触发，影响企业远程运维场景。"
published = "2000-04-25T04:00:00.000"
remediation = "升级至 pcAnywhere 10.0 或更高版本，该漏洞已在后续版本中修复。如无法升级，在防火墙/路由器上限制 TCP 端口 5631-5632 仅允许可信 IP 访问，并配置入侵检测系统（IDS）过滤 SYN 扫描流量作为临时缓解措施。由于 Symantec pcAnywhere 已停止维护，建议迁移至受支持的远程访问解决方案（如 Symantec Secure Remote Access 或同类产品）。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Symantec pcAnywhere 端口扫描拒绝服务漏洞"
updated = "2026-06-16T21:51:28.727"

