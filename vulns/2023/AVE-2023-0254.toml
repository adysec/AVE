[basic]
description = "金蝶 EAS（企业应用套件）部分版本存在任意文件读取漏洞。该漏洞源于系统对文件路径参数校验不严，攻击者无需身份认证即可通过构造包含路径遍历序列（如 ../）的特制 HTTP 请求，访问 Web 服务器上有权读取的任意文件。影响范围涉及存在该缺陷的金蝶 EAS 部分部署版本，攻击条件为目标系统暴露于网络且相关接口可直接访问。成功利用后可读取配置文件、源码及敏感信息，进而可能导致进一步渗透与权限提升。"
published = "08.09"
remediation = '升级金蝶 EAS 至官方已修复的安全版本（如 8.6.1 及以上或厂商发布的安全补丁包），并删除或重命名存在缺陷的 Web 组件（如 /appmonitor/ 相关接口）。在无法立即升级时，通过 Web 应用防火墙（WAF）限制对文件读取接口的访问路径，禁止包含 "../" 等目录遍历字符的请求，并仅允许受信任内网 IP 访问该系统作为临时缓解措施。'
score = 5
severity = "MEDIUM"
