[basic]
description = "森鑫炬税务企业综合运营平台存在任意文件读取漏洞，攻击者可通过向 File/Get 接口发送特制请求，利用路径遍历或未授权访问缺陷读取服务器上的任意文件，包括配置文件、敏感数据等。该漏洞无需身份认证即可远程利用，攻击条件低，危害较大，可能导致系统敏感信息泄露，影响平台所有使用该接口的版本。"
published = "0710"
remediation = "联系森鑫炬厂商获取官方安全更新，修复 File/Get 接口中路径参数未过滤 ../ 等目录遍历字符的问题。临时缓解措施：在 Web 应用防火墙（WAF）层面添加规则，对 File/Get 接口的 path 参数进行路径遍历攻击检测和拦截；同时在应用层对文件路径进行白名单校验，仅允许读取指定目录下的文件，禁止直接拼接用户传入的路径参数。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "森鑫炬 税务企业综合运营平台 任意文件读取漏洞"
updated = "0710"

