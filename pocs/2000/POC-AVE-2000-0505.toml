[info]
author = "AVE"
description = "通过 HTML 邮件嵌入恶意 JavaScript，利用 Outlook Express 预览窗格创建持久浏览器链接，持续窃取后续邮件内容。PoC 由 Georgi Guninski 发布"
id = "POC-AVE-2000-0505"
name = "CVE-2000-0653 PoC"
severity = "medium"
tags = ["cve-2000-0653"]
vuln_id = [
    "CVE-2000-0653",
    "AVE-2000-0505",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/"
protocol = "http"

[[poc.requests.matchers]]
expect = false
part = "body"
type = "word"
words = ["Microsoft Outlook Express"]
