[basic]
description = "OpenLink Software OpenLink 3.2的Web配置器组件存在缓冲区溢出漏洞。远程攻击者可通过向Web配置器发送超长的GET请求，触发缓冲区溢出，导致任意代码执行，从而获取系统控制权限。攻击无需身份认证，利用难度较低。"
published = "1999-10-15"
remediation = "该产品已停止维护，建议升级到不受影响的版本或迁移至替代产品。如无法升级，应限制对Web配置器端口的网络访问，仅允许受信任IP访问。"
score = 10.0
severity = "CRITICAL"
