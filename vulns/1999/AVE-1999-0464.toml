[basic]
description = 'Microsoft IIS 及 Personal Web Server 存在信息泄露漏洞。由于 IIS 在处理 NTFS 交换数据流时未能正确拦截对 "::$DATA" 流句柄的访问，远程攻击者可在 ASP 文件 URL 后追加 "::$DATA" 后缀直接请求该文件的数据流，绕过 ASP 脚本引擎解析，从而获取 ASP 文件的原始源代码。攻击者可通过泄露的源代码获取数据库连接字符串、业务逻辑及管理后台路径等敏感信息。该漏洞影响 IIS 3.0/4.0 及 Personal Web Server 2.0/3.0/4.0 版本，无需身份认证即可利用。'
published = "1998-06-01T04:00:00.000"
remediation = '升级至 Windows NT 4.0 Service Pack 4 (SP4) 或更高版本，安装 IIS 4.0 累积安全更新。如无法升级，可部署 URLScan 工具拦截包含 `::$DATA` 的 URL 请求，或在 IIS 管理器中删除 ASP 文件扩展名的"读取"权限以降低泄露风险。'
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Microsoft IIS ASP 源码泄露漏洞"
updated = "2026-06-16T21:48:03.587"

