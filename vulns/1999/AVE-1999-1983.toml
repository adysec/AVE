1. title: "Computalynx CMail 2.3 SP2/2.4 SMTP缓冲区溢出漏洞"
2. description: "Computalynx CMail 2.3 SP2 和 2.4 版本的SMTP服务器在处理MAIL FROM命令时存在缓冲区溢出漏洞。远程攻击者可通过向SMTP端口发送超长的MAIL FROM参数触发堆栈缓冲区溢出，进而在服务器上下文中执行任意代码，完全控制服务器。该漏洞影响CMail 2.3 SP2和2.4版本的SMTP服务，CVSS评分10.0（严重级），攻击无需认证且可远程触发。攻击者只需向SMTP端口发送畸形的MAIL FROM命令即可触发缓冲区溢出，进而执行任意Shellcode获取服务器控制权。"
3. remediation: "立即升级到最新版本的Computalynx CMail（≥2.5版本）并应用安全补丁，关闭不必要的SMTP服务端口，限制MAIL FROM命令的长度，部署网络ACL限制对服务器的访问，并监控异常的SMTP流量。"
