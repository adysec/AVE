[basic]
description = "Be BeOS 4.0/4.5/5.0 存在拒绝服务漏洞，远程攻击者可通过向目标系统发送特制 IP 数据包触发该漏洞。当数据包头部长度字段的值小于实际头部长度时，系统无法正确处理此类畸形报文，导致服务崩溃或系统重启，造成拒绝服务。攻击者无需身份认证即可远程利用，对目标系统可用性造成影响。"
published = "2000-04-07T04:00:00.000"
remediation = "BeOS 已停止维护，无官方补丁。建议将受影响系统隔离在可信网络内，在网络边界防火墙配置规则丢弃长度异常的 IP 分片包，或在受影响主机上禁用不必要的网络服务以减少攻击面。长期方案应迁移至仍在维护的操作系统。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Be BeOS IP数据包长度字段处理拒绝服务漏洞"
updated = "2026-06-16T21:51:23.117"

