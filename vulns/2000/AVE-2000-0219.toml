[basic]
description = "vqSoft vqServer 存在敏感信息明文存储漏洞，服务器将用户密码等敏感信息以明文形式保存在 server.cfg 配置文件中，本地攻击者可读取该文件获取明文凭证，进而实现权限提升。该漏洞影响 vqServer 相关版本，攻击复杂度低，无需特殊权限即可利用。"
published = "2000-03-21T05:00:00.000"
remediation = "建议立即升级 vqServer 至厂商发布的最新版本，并检查 server.cfg 文件内容确保密码不以明文方式存储；如厂商已停止维护（vqServer 为早期产品，极可能已 EOL），应迁移至持续安全更新的替代 Web 服务器（如 Apache httpd 或 Nginx）。临时缓解措施：通过文件系统权限将 server.cfg 的读取权限仅限于必要管理员账户，并移除配置文件中所有明文凭据。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "vqSoft vqServer 敏感信息泄露漏洞"
updated = "2026-06-16T21:51:18.113"

