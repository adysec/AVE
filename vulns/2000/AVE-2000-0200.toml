[basic]
description = "Zope 对象发布环境（Z Object Publishing Environment）中的 DTML（Document Template Markup Language）实现存在权限绕过漏洞。远程攻击者可通过发送特制的 HTTP 请求，利用 DTML 模板引擎对用户权限检查不充分的缺陷，在未经认证的情况下执行任意 DTML 代码、访问或修改受保护的资源数据。该漏洞 CVSS 评分 10.0，危害等级严重，广泛影响 Zope 系列产品，建议用户升级至安全版本或应用官方补丁。"
published = "2000-01-04"
remediation = "升级至 Zope 2.0 及以上版本，该版本修复了 DTML 权限检查缺陷。若无法升级，在 Zope 管理界面中限制 DTML 方法仅允许管理员角色执行，或禁用未使用的 DTML Document 对象创建权限。在网络层面限制来源 IP 访问 Zope 管理端口以降低风险。"
score = 10.0
severity = "CRITICAL"
sources = ["cve"]
title = "Zope Z Object Publishing Environment DTML 远程未授权操作漏洞"
updated = "2026-06-16"

