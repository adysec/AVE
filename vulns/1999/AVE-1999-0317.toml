[basic]
description = "IBM GINA for NT 1.0 在作为 Windows NT 用户进行 OS/2 域认证时存在权限提升漏洞。该组件会在本地注册表中维护用于域用户到本地组映射的 GroupMapping 注册表项，且未对此注册表项施加充分的访问控制。已在本机拥有普通用户权限的本地攻击者，可通过修改（或篡改）该 GroupMapping 注册表键值，将自身账号映射至管理员组，从而绕过正常的权限分配机制，非法获取本地管理员（administrator）权限。受影响范围为使用 IBM GINA 1.0 并启用 OS/2 域认证方式的 Windows NT 系统，攻击者需具备目标主机的本地登录权限及对相关注册表项的写权限方可实施利用。"
published = "2001-03-12T05:00:00.000"
remediation = '立即升级 IBM GINA for NT 至修复版本（1.0 之后的补丁版本），或停用该 GINA 组件改用标准 Windows NT 登录认证；通过注册表编辑器对 HKLM\Software\Microsoft\Windows NT\CurrentVersion\Winlogon 下的 GroupMapping 项设置仅 Administrators 拥有完全控制权限、普通用户仅只读，并启用 NTFS 权限审计以阻止本地用户篡改。'
score = 6.2
severity = "MEDIUM"
sources = ["epss"]
