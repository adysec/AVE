[basic]
description = "孚盟云 CRM 管理系统 GetPic.aspx 接口存在 SQL 注入漏洞。攻击者可通过向 /Common/GetPic.aspx 接口传递恶意构造的参数，由于系统未对用户输入进行有效过滤和转义，导致攻击者能够执行任意 SQL 语句。该漏洞允许未经身份认证的远程攻击者直接获取后台数据库中的敏感信息，包括客户数据、业务记录等，影响范围约 2600 余个暴露在公网的实例。厂商尚未发布官方补丁。"
published = "0718"
remediation = "厂商应在 GetPic 接口中对用户传入的参数进行严格的类型校验与参数化查询处理，避免直接将输入拼接至 SQL 语句。建议升级至官方发布的最新安全版本；若无法升级，可在 Web 应用防火墙（WAF）侧配置规则拦截对 GetPic 接口的恶意 SQL 注入 payload，同时对输入中的单引号、union、select 等关键词进行过滤。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "孚盟云 GetPic SQL注入漏洞"
updated = "0718"

