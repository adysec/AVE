[basic]
description = "Corel Linux OS 1.0 的 get_it 程序存在 PATH 环境变量操纵漏洞，本地低权限用户可通过设置恶意的 PATH 环境变量，使 get_it 调用攻击者控制的恶意 cp 程序替代系统 cp，从而获取 root 权限。该漏洞影响 Corel Linux OS 1.0 版本，CVSS 评分 7.2，危害等级高。攻击者需拥有本地系统访问权限方可利用。"
published = "2000-01-12T05:00:00.000"
remediation = "升级到 Corel Linux 的官方补丁版本，或修改 get_it 脚本中将 cp 等命令改为绝对路径（如 /bin/cp）；同时移除 get_it 的 setuid 位（chmod u-s /usr/bin/get_it），限制非信任用户执行。鉴于 Corel Linux 已停止维护，建议迁移至持续更新的发行版（如 Ubuntu/Debian）。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "Corel Linux OS 1.0 get_it 本地权限提升漏洞"
updated = "2026-06-16T21:50:53.630"

