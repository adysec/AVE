[basic]
description = "ht://Dig 的 htsearch CGI 程序存在任意文件包含漏洞，远程攻击者无需认证即可通过向 htsearch 参数传递反引号（`）包裹的文件名，导致服务端执行命令并读取任意敏感文件。该漏洞影响 ht://Dig 3.1.1、3.1.2、3.1.3、3.1.4 及 3.2.0b1 版本，CVSS 评分 5.0，危害等级中危。"
published = "2000-02-29T05:00:00.000"
remediation = "升级 ht://Dig 至 3.2.0b2 或更高版本，该版本已修复 shell 元字符转义问题，阻止通过反引号执行命令读取任意文件。如无法升级，可移除 htsearch CGI 的执行权限，或通过 Web 服务器配置限制对其的访问，仅允许可信来源调用。临时缓解措施可对传入 htsearch 的参数做严格过滤，禁止包含反引号、$() 等 shell 特殊字符。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "ht://Dig htsearch 任意文件包含漏洞"
updated = "2026-06-16T21:51:13.673"

