[basic]
description = "Aladdin Knowledge Systems eToken 3.3.3 设备存在 PIN 提取漏洞。攻击者仅需物理接触设备，即可通过修改 EEPROM 中的数据重置目标设备的 PIN 码，从而绕过 PIN 保护机制，非法获取设备存储的所有敏感信息，包括信用卡 PIN、密码等机密数据。该漏洞利用设备内部PIN存储机制的缺陷，攻击者无需得知原始PIN即可访问全部机密信息，严重威胁了用户的身份认证安全。该设备支持多种金融认证应用，广泛应用于银行、支付系统等领域，漏洞影响范围涵盖所有使用该型号设备的用户。攻击条件为：攻击者必须具备对设备的物理接触权限，可随时执行PIN提取操作。该漏洞CVSS评分4.6，安全等级中低，表明其影响虽有限，但一旦被利用，将导致严重数据泄露风险。"
published = "2000-05-04T04:00:00.000"
remediation = "建议立即更换为Aladdin eToken 4.0及以上版本或厂商最新硬件令牌，启用防篡改物理外壳与密封标签防止物理接触攻击，配合双因子认证（PIN+生物识别）作为额外防护层，并定期审计设备物理完整性与固件完整性。"
score = 4.6
severity = "MEDIUM"
sources = ["avd"]
title = "Aladdin Knowledge Systems eToken PIN 提取漏洞"
updated = "2026-06-16T21:51:42.583"

