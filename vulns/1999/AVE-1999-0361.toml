[basic]
description = "Debian 系统中的 Mailman 邮件列表管理软件存在弱认证机制漏洞。攻击者可以利用该漏洞绕过身份验证，获取系统管理权限，进而访问、修改邮件列表配置信息或窃取敏感数据。该漏洞影响 Debian 系统上运行的 Mailman 软件包。"
published = "1999-06-22"
remediation = "升级 Debian Mailman 软件包至已修复版本，或应用厂商提供的安全补丁。建议启用强密码认证机制，限制管理接口的访问来源 IP，并定期审计邮件列表管理员账户。"
score = 5.0
severity = "MEDIUM"
sources = ["cve"]
title = "Debian Mailman 弱认证漏洞"
updated = "2026-06-16"

