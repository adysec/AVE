[basic]
description = "Linux 系统运行时链接器 ld.so 与 ld-linux.so 存在缓冲区溢出漏洞，本地攻击者可通过调用 setuid 程序并传递超长程序名（argv[0]）触发链接器报错处理逻辑中的缓冲区溢出，从而实现本地权限提升。该漏洞影响包括 openlinux_lite 在内的多个 Linux 发行版，攻击者需具备本地访问权限并能执行 setuid 程序，通过精心构造超长程序名参数触发链接器错误处理路径中的缓冲区溢出实现提权。"
published = "1997-07-17T04:00:00.000"
remediation = "升级系统动态链接器 ld.so 和 ld-linux.so 到已修复版本，或应用 Alan Cox 提供的补丁，在 d-link/boot1.c 中增加 argv_remap 函数限制 argv[0] 长度不超过 256 字符，防止超长程序名通过 vsprintf 触发缓冲区溢出。已安装系统可通过发行版官方软件包管理器升级相关软件包。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "Linux 动态链接器 ld.so/ld-linux.so 缓冲区溢出本地提权漏洞"
updated = "2026-06-16T21:49:53.643"

