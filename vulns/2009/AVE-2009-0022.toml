[basic]
description = "Microsoft Office Excel 在解析特制 Excel 文档时存在代码执行漏洞，由于程序未能正确处理无效对象的内存访问请求，远程攻击者可通过诱使用户打开恶意构造的 Excel 文件触发该漏洞，导致任意代码执行。该漏洞影响 Office Excel 2000/2002/2003/2007、Excel Viewer 2003/2007、Office 2004/2008 for Mac 等多个版本，CVSS 评分 8.8，危害等级高。该漏洞已在 2009 年 2 月被 Trojan.Mdropper.AC 木马在野利用，用户应避免打开来源不明的 Excel 文件。"
published = "2009-02-25T16:30:00.343"
remediation = "安装 Microsoft 安全公告 MS09-017 对应更新：Excel 2000 安装 KB969683、Excel 2002 安装 KB969679、Excel 2003 安装 KB969680、Excel 2007 安装 KB969462；Excel Viewer 升级至最新版；Office for Mac 2004 安装 KB969681、2008 安装 KB969682。无法打补丁时使用 MOICE（Microsoft Office Isolated Converter Environment）打开未知来源 Excel 文件作为临时缓解。"
score = 8.8
severity = "HIGH"
sources = ["kev"]
title = "Microsoft Office Excel 远程代码执行漏洞"
updated = "2026-06-16T23:04:33.880"

