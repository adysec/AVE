[basic]
description = 'UltraBoard 1.6 及部分其他版本存在拒绝服务漏洞。远程攻击者可通过在 Session 参数中引用"UltraBoard"字符串，触发 UltraBoard 不断 fork 自身进程副本，消耗服务器系统资源，导致服务不可用。该漏洞攻击复杂度低，无需身份认证即可远程利用。'
published = "2000-05-05T04:00:00.000"
remediation = "UltraBoard 1.6 及更早版本已停止维护，官方不再提供补丁。建议立即迁移至其他仍在维护的论坛系统（如 phpBB、Discourse 等）。若暂时无法迁移，可在 Web 服务器（如 Apache）层面添加 RewriteRule 过滤包含 UltraBoard 字样的 Session 参数请求，或在应用入口处对 Session 参数进行正则校验，拒绝包含 UltraBoard 的异常请求，以缓解 fork 耗尽服务器资源的风险。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "UltraScripts UltraBoard 1.6 拒绝服务漏洞"
updated = "2026-06-16T21:51:42.443"

