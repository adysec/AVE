[basic]
description = "iMesh 1.02 存在缓冲区溢出漏洞。远程攻击者无需身份认证，向 iMesh 服务端口发送特制的超长字符串即可触发缓冲区溢出，进而导致目标系统执行任意代码。该漏洞影响 iMesh 1.02 版本，CVSS v2.0 评分为 7.5，危害等级高。厂商已发布更新版本修复此漏洞，建议用户升级至最新版本。"
published = "2000-06-29T04:00:00.000"
remediation = "建议立即升级 iMesh 至高于 1.02 的版本，官方下载页面已发布修复版本。若无法升级，可在防火墙上拦截 iMesh 默认通信端口作为临时缓解措施，阻止远程攻击者发送恶意构造的长字符串触发缓冲区溢出。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "iMesh iMesh 1.02 缓冲区溢出远程代码执行漏洞"
updated = "2026-06-16T21:52:05.000"

