[basic]
description = "Linux 内核 zswap 压缩交换缓存的回写机制存在竞态条件漏洞（CWE-362），当 zswap 执行内存页面回写时，用户程序失效页面并分配新页面到同一交换偏移量，导致回写线程写入错误数据。攻击者可利用此竞态条件造成内存损坏，触发系统崩溃或信息泄露。该漏洞影响所有启用 zswap 功能的 Linux 内核版本，CVSS 评分 4.7，危害等级中危。通过限制 zswap 池大小并避免高并发内存压力场景可降低利用风险，官方已在内核主线中修复此问题。"
published = "2025-09-15T14:15:39.803"
remediation = "将 Linux 内核升级至 6.1.30+、6.3.4+ 或 6.4+ 版本（主线修复 commit: 04fc7816089c5a32c29a04ec94b998e219dfb946），或相应发行版已包含该补丁的内核包。如无法立即升级，可通过设置 /sys/module/zswap/parameters/max_pool_percent=0 临时禁用 zswap 以规避风险。"
score = 4.7
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux kernel mm zswap 写入回刷竞争条件漏洞"
updated = "2026-06-17T06:44:26.843"

