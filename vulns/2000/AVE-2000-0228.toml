[basic]
description = "Dansie Shopping Cart 的 cart.pl 文件存在命令注入漏洞。攻击者可通过向表单变量中注入 shell 元字符（如分号、管道符等），使服务器执行任意系统命令，进而完全控制目标主机。该漏洞影响 Dansie Shopping Cart 的早期版本，攻击者无需身份认证即可远程利用，危害严重。"
published = "2000-04-11T04:00:00.000"
remediation = "将 Dansie Shopping Cart 升级至官方修复版本或替换为仍受支持的购物车系统。若无法立即升级，需修改 cart.pl 源码，在处理表单变量前使用 Perl 正则过滤 shell 元字符（如 ; & | ` $ ( ) { } < >），并对所有用户输入执行 `use CGI qw/:standard/; param() 配合 taint 模式` 确保数据安全。同时将 Web 服务器中 cart.pl 的执行用户降权为最低权限用户，在 Apache 中通过 `suEXEC` 或 `mod_suexec` 限制执行权限，并禁用不需要的 CGI 目录执行权限。如果条件允许，建议迁移至现代安全框架（如 Ruby on Rails 或 Django）并启用 Web 应用防火墙（WAF）拦截利用 shell 注入的请求。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Dansie Shopping Cart 远程代码执行漏洞"
updated = "2026-06-16T21:51:19.550"

