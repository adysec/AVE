[basic]
description = "McMurtrey/Whitaker & Associates Cart32 2.6/3.0 版本中存在后门密码漏洞，未经身份认证的远程攻击者可利用默认后门密码登录管理后台，进而执行任意系统命令。该漏洞影响 Cart32 3.0 及更早版本，CVSS 评分 7.5（高危），攻击向量为网络、攻击复杂度低、无需认证，可导致机密性、完整性和可用性部分受损。攻击者无需任何认证即可远程利用该后门密码获取系统控制权。ExploitDB 已公开 PoC 利用代码（EDB-19881）。"
published = "2000-04-27T04:00:00.000"
remediation = "建议立即迁移至现代电商平台（如 Shopify、Magento、WooCommerce 等），Cart32 早已停止维护且官方无补丁。若必须继续使用，请立即：1) 在防火墙层面仅允许受信 IP 访问 /admin 管理后台；2) 修改所有默认/弱口令，强制使用 16 位以上强密码；3) 在 Web 应用防火墙（WAF）层面拦截包含默认后门密码的登录请求；4) 禁用不必要的远程管理功能，仅允许 VPN 内网访问管理后台。建议尽快完成迁移，彻底消除该 20 年前的后门风险。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "McMurtrey/Whitaker & Associates Cart32 后门密码远程代码执行漏洞"
