[basic]
description = "Linux 系统中 lpr 软件包的行式打印机守护进程（lpd）存在权限提升漏洞。本地攻击者可通过向 lpd 提交特制的打印任务，诱使其调用 sendmail 时传递任意命令行参数（如使用 -C 选项指定恶意配置文件），从而以 root 权限执行任意代码。该漏洞影响多种 Linux 发行版，CVSS 评分 10.0，危害等级严重。攻击者需具备本地系统访问权限，无需身份认证即可利用，成功利用后可完全控制目标系统。"
published = "2000-01-08T05:00:00.000"
remediation = "立即升级 lpr 软件包至修复版本：Red Hat Linux 6.x 升级至 lpr-0.48-1，5.x 升级至 lpr-0.48-0.5.2，4.x 升级至 lpr-0.48-0.4.2；Debian 系统应用 2000 年 1 月 9 日安全更新。如无法立即升级，建议禁用 LPD 服务（`chkconfig lpd off` 或 `systemctl disable lpd`）并在防火墙层面阻止 515 端口入站流量作为临时缓解措施。"
score = 10
severity = "CRITICAL"
sources = ["redhat"]
title = "Linux lpr 行式打印机守护进程本地权限提升漏洞"
updated = "2026-06-16T21:53:24.513"

