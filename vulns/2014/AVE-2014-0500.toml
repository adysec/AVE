[basic]
description = "Microsoft Windows OLE 包管理器存在远程代码执行漏洞 (MS14-060)，影响 Windows Vista SP2、Windows Server 2008 SP2/R2 SP1、Windows 7 SP1、Windows 8/8.1、Windows Server 2012/R2 及 Windows RT/8.1。攻击者可通过构造恶意的 OLE 对象（如精心制作的 PowerPoint 文档）诱导用户打开，触发 OLE 包管理器处理缺陷，在目标系统上以当前用户权限执行任意代码。该漏洞于 2014 年 10 月已在野被利用，攻击者通过鱼叉式钓鱼邮件投递恶意 Office 文档实施定向攻击，CVSS 评分 7.8 (HIGH)。"
