[basic]
description = "Linux 系统 modutils 2.3.x 软件包中的 modprobe 工具存在任意命令执行漏洞。攻击者可通过在参数中注入 shell 元字符（如反引号、管道符等）来触发该漏洞，从而实现以 root 权限执行任意系统命令。该漏洞影响 modutils 2.3.9 及之前的版本，需要本地用户权限才能利用，CVSS 评分 7.2，危害等级高。"
published = "2001-01-09T05:00:00.000"
remediation = "升级 modutils 至 2.3.11 及以上版本（或迁移至 module-init-tools/kmod 替代 modutils），禁用 modprobe 的 setuid 权限，限制可加载内核模块的用户仅为 root。作为临时缓解措施，移除 /sbin/modprobe 的 setuid 位：chmod u-s /sbin/modprobe。"
score = 7.2
severity = "HIGH"
sources = ["exploitdb"]
title = "Linux modutils modprobe 任意命令执行漏洞"
updated = "2026-06-16T21:53:08.130"

