[basic]
description = "SGI InfoSearch 的 CGI 程序 infosrch.cgi 未对用户输入进行有效过滤，远程攻击者可通过向该脚本传递包含 shell 元字符的特制请求，利用系统 shell 执行任意命令。该漏洞影响 SGI InfoSearch 1.0 及 IRIX 6.5.x 等版本，攻击者无需身份认证即可远程利用，CVSS 评分 7.5，危害等级高。"
published = "2000-03-01T05:00:00.000"
remediation = "立即应用 SGI 安全公告 20000501-01-P 提供的补丁，升级 InfoSearch 至已修复版本；如无法打补丁，删除或禁用 infosrch.cgi 脚本，或通过 Web 服务器配置限制对 infosrch.cgi 的访问权限，同时严格过滤用户输入中的 shell 元字符（;、|、`、$ 等）。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "SGI IRIX InfoSearch CGIs infosrch.cgi 远程命令执行漏洞"
updated = "2026-06-16T21:51:13.523"

