[basic]
description = "ColdFusion Server 4.5.1 中存在拒绝服务漏洞，远程攻击者通过发送大量请求访问未存储在内存中的 CFCACHE 标记缓存文件，导致服务器CPU和内存资源被耗尽，造成服务不可用。攻击无需身份验证，可远程发起。"
published = "2000-05-10"
remediation = "应用 Allaire 官方安全补丁，或限制外部对 CFCACHE 缓存文件的直接访问，并配置缓存文件存储在内存中以减少资源消耗。"
