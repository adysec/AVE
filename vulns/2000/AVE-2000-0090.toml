[basic]
description = "Microsoft Outlook Express 5.01 及 Internet Explorer 5.01 存在跨邮件访问漏洞。远程攻击者可向目标用户发送包含恶意 JavaScript 脚本的 HTML 邮件，当用户使用 Outlook Express 阅读邮件时，该脚本能够访问客户端后续读取的其他邮件内容，导致用户隐私泄露。攻击者无需身份认证，仅需诱使用户打开恶意邮件即可触发。该漏洞影响 Outlook Express 5.01 及 Internet Explorer 5.01 版本，CVSS 评分 5.0，属于中等危害等级。"
published = "2000-02-01T05:00:00.000"
remediation = "安装 Microsoft 发布的 Outlook Express 5.5 安全更新或升级至 Outlook Express 5.5 以上版本；同时升级 Internet Explorer 至 5.5 以上版本。如无法升级，可在邮件客户端中禁用 ActiveX 控件及脚本执行功能，或配置 Outlook Express 以纯文本方式阅读邮件（工具→选项→阅读→以纯文本阅读所有邮件），防止恶意 JavaScript 自动执行。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Microsoft Outlook Express 5 JavaScript 电子邮件信息泄露漏洞"
updated = "2026-06-16T21:51:00.663"

