[basic]
description = "标签中。<value>Exim 邮件传输代理多个版本在批处理 SMTP 模式下存在格式字符串漏洞，远程攻击者无需身份认证即可通过在 SMTP 邮件头中构造恶意的格式字符串触发该漏洞，进而在目标系统上执行任意代码。该漏洞影响包括 Red Hat 3.22-10、Debian 3.12 及 Conectiva 3.16 在内的多个 Linux 发行版所打包的 Exim 3.x 版本，CVSS 评分 7.5，危害等级高。攻击者可通过发送特制的 SMTP 流量即可利用此漏洞，实现远程代码执行。"
published = "2001-09-20T04:00:00.000"
remediation = "升级至 Exim 4.00 或更高版本，Exim 3.x 已停止开发且存在该漏洞。若短期内无法升级，编辑 Exim 配置文件将 syntax_checking 设置为 false 以禁用语法检查模式作为临时缓解措施。同时建议立即安装所属 Linux 发行版的安全更新：Debian 用户执行 apt-get upgrade exim，Red Hat 用户应用 RHSA-2001:078 补丁包，Conectiva 用户应用 CLA-2001:402 更新。"
score = 7.5
severity = "HIGH"
sources = ["exploitdb"]
title = "Exim 3.x 邮件传输代理格式字符串远程代码执行漏洞"
updated = "2026-06-16T21:54:46.620"

