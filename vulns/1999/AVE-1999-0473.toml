[basic]
description = "Alt-N MDaemon Server 2.71 SP1 及 Microsoft Exchange Server 4.0/5.0 等邮件服务器的 SMTP HELO 命令存在缓冲区溢出漏洞。远程攻击者无需认证即可向目标服务器的 25 端口发送超长 HELO 参数，触发缓冲区溢出，导致目标邮件服务程序崩溃造成拒绝服务。该漏洞影响 Ipswitch、MDaemon、Exchange 等多款 NT 平台邮件服务器，属于经典的早期 SMTP 协议栈溢出攻击案例。"
published = "1998-01-01T05:00:00.000"
remediation = "升级 Alt-N MDaemon 至 3.0 及以上版本，或升级 Microsoft Exchange Server 至 5.5 及以上版本并安装最新 Service Pack；在 SMTP 服务层对 HELO/EHLO 参数做长度限制与输入校验；在防火墙限制 SMTP（25端口）只对信任来源开放作为临时缓解措施。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "多款邮件服务器 SMTP HELO 命令缓冲区溢出漏洞"
updated = "2026-06-16T21:48:04.237"

