[basic]
description = "Microsoft Internet Explorer 5.0 在用户通过 FTP 协议访问服务器时，会将登录使用的用户名和密码明文记录在 URL 历史记录中，存储于 index.dat 文件。本地攻击者可通过读取其他用户的 index.dat 文件获取 FTP 凭据，或通过肩窥（shoulder surfing）方式在用户鼠标悬停链接时从状态栏窃取密码。该漏洞影响 IE 5 及早期版本，CVSS 评分 4.6，危害等级中危，需本地访问权限方可利用。"
published = "1999-08-25T04:00:00.000"
remediation = "避免使用 Internet Explorer 5 内置 FTP 客户端访问需要认证的 FTP 站点；改用专用 FTP 客户端软件（如 FileZilla）或使用资源管理器的 FTP 功能代替。同时定期清除 IE 历史记录（工具→Internet 选项→清除历史记录），并启用 IE 的「退出时删除浏览历史」策略。建议升级至更高版本 IE 或更换现代浏览器以彻底消除此安全隐患。"
score = 4.6
severity = "MEDIUM"
sources = ["avd"]
title = "Microsoft Internet Explorer 5 FTP 密码信息泄露漏洞"
updated = "2026-06-16T21:50:00.410"

