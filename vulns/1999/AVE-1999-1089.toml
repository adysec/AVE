[basic]
description = "FORE PowerHub 5.0.0 存在拒绝服务漏洞，远程攻击者可通过发送带有 TCP/IP 操作系统指纹识别的 TCP SYN 扫描数据包（如使用 nmap 工具）触发该漏洞，导致目标设备挂起或停止响应。该漏洞影响 FORE PowerHub 5.0.1 之前的所有版本，攻击者无需身份认证即可远程利用，危害程度中等。"
published = "2005-01-05T05:00:00.000"
remediation = "升级 FORE PowerHub 至 5.0.1 或更高版本以修复此漏洞。临时缓解措施可在网络边界防火墙配置规则，限制对 PowerHub 设备的 TCP SYN 扫描探测，或部署入侵检测系统 (IDS) 拦截异常的 TCP 探测流量。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "FORE PowerHub 拒绝服务漏洞"
updated = "2026-06-16T21:50:18.090"

