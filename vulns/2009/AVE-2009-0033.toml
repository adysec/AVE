[basic]
description = "Microsoft Office PowerPoint 在处理特制 PPT 文件时，OutlineTextRefAtom 中存在无效索引值，导致内存破坏。远程攻击者可通过诱使用户打开恶意 PPT 文件触发此漏洞，成功利用可在目标系统上执行任意代码。该漏洞影响 PowerPoint 2000/2002/2003 及 Office 2004 for Mac 版本，CVSS 评分 8.8，危害等级高。2009 年 4 月已被 Exploit:Win32/Apptom.gen 在野利用。"
published = "2009-04-03"
remediation = "安装 Microsoft 安全公告 MS09-017 对应补丁：PowerPoint 2000 SP3 安装 KB957790，PowerPoint 2002 SP3 安装 KB957781，PowerPoint 2003 SP3 安装 KB957784，PowerPoint 2007 安装 KB957789，Office 2004/2008 for Mac 分别安装 KB969661/KB971822，PowerPoint Viewer 安装 KB969615/KB970059。同时建议禁用打开 PowerPoint 4.0 文件格式。"
score = 8.8
severity = "HIGH"
sources = [
    "cve",
    "kev",
]
title = "Microsoft Office PowerPoint 内存破坏远程代码执行漏洞"
updated = "2009-06-09"

