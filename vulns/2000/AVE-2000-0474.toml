[basic]
description = "Allmanage 网站管理软件 2.6 版本中的 allmanageup.pl 文件上传 CGI 脚本存在未授权访问漏洞，远程攻击者无需身份认证即可直接调用该脚本，从而上传恶意文件或修改用户账户信息与网页内容。该漏洞利用方式简单，攻击者只需构造特制的 HTTP 请求即可触发，影响 Allmanage 2.6 及可能更早版本，CVSS 评分 7.5，危害等级高。"
published = "2000-05-13T04:00:00.000"
remediation = "升级 Allmanage 至最新版本（如已停止维护则考虑替换为仍受支持的同类产品）；在 Web 服务器（Apache/IIS）层面限制对 /cgi-bin/allmanageup.pl 的访问来源 IP，或直接移除该 CGI 脚本文件；配置 Web 服务器认证模块，确保管理后台脚本仅允许授权用户通过 HTTPS 调用。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "Allmanage Website Administration Software 远程管理权限获取漏洞"
updated = "2026-06-16T21:51:43.620"

