[basic]
description = "IMP 邮件系统在处理文档时调用 MSWordView 组件进行转换，但未在 MSWordView 异常退出后正确清理临时文件。本地攻击者可通过大量请求文档并提前终止请求，使临时文件不断堆积占用磁盘空间，最终导致系统拒绝服务。该漏洞影响 IMP 2.2 Pre12 及更早版本，CVSS 评分 5.0，危害等级中危。"
published = "2000-04-22T04:00:00.000"
remediation = "升级 IMP 至 2.2 Pre12 之后的安全版本，修复 MSWordView 退出时临时文件清理机制。如无法升级，限制单个用户请求文档的数量，并配置 cron 定期清理 /tmp 下 IMP 生成的临时文件。建议在应用层对文档转换过程设置超时和资源上限，防止因进程异常中止导致磁盘填满。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Horde IMP MSWordView 拒绝服务漏洞"
updated = "2026-06-16T21:51:46.800"

