[basic]
description = "Adobe Acrobat 和 Reader 8.1.2 及更早版本中存在基于栈的缓冲区溢出漏洞。攻击者可通过构造特制的 PDF 文件，诱导用户打开后触发该漏洞，导致远程代码执行。该漏洞源于 PDF 文档中 util.printf JavaScript 函数在处理精心构造的格式字符串参数时存在栈缓冲区溢出。远程攻击者可通过社会工程学方式诱使用户打开恶意 PDF 文件实现利用，无需任何身份认证。"
published = "2008-11-04T18:29:47.667"
remediation = '升级 Adobe Reader/Acrobat 至 8.1.3 或更高版本，该版本已修复 util.printf() 函数栈缓冲区溢出漏洞。如无法升级，可在 Adobe Reader 中禁用 JavaScript 功能（编辑→首选项→JavaScript→取消勾选"启用 Acrobat JavaScript"）作为临时缓解措施。'
score = 7.8
severity = "HIGH"
sources = ["kev"]
title = "Adobe Acrobat Reader util.printf JavaScript 栈缓冲区溢出远程代码执行漏洞"
updated = "2026-06-16T22:54:53.110"

