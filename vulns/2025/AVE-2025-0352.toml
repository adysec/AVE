[basic]
description = 'Tornado 是一个 Python Web 框架和异步网络库，其 `httputil.py` 中的 `_parseparam` 函数在解析 `multipart/form-data` 等 HTTP 头部参数时使用了低效算法，在处理包含引号分号（如 `param=";"`）的参数时会在嵌套循环中反复调用 `string.count()`。攻击者可通过向 `Content-Disposition` 头部发送大量恶意构造的参数，使服务器 CPU 使用率呈二次方增长（O(n²)），导致拒绝服务。由于 Tornado 采用单事件循环架构，单个恶意请求即可使整个服务器长时间无响应。该漏洞影响 Tornado 6.5.2 及以下版本，CVSS 评分 7.5，危害等级高。官方已在 6.5.3 版本中修复。'
published = "2025-12-12T07:15:44.920"
remediation = "立即将 Tornado 升级至 6.5.3 或更高版本（pip install --upgrade tornado），该版本已修复 `_parseparam` 函数在解析 multipart 参数时的 O(n²) 性能问题。如无法立即升级，可在反向代理层（如 Nginx）限制 `Content-Disposition` 头部的参数数量，或对上传请求进行速率限制作为临时缓解措施。"
score = 7.5
severity = "HIGH"
sources = ["ghsa"]
title = "Tornado Multipart 参数解析二次方拒绝服务漏洞"
updated = "2026-06-17T09:58:02.440"

