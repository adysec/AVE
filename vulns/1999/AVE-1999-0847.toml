[basic]
description = "Norton AntiVirus 2000 (NAV2000) 附带的 POP3 代理服务器 POProxy 组件存在缓冲区溢出漏洞。未经认证的远程攻击者可通过向目标 POP3 服务发送精心构造的超长 USER 命令，触发缓冲区溢出，导致服务崩溃或可能执行任意代码。该漏洞影响安装 NAV2000 的 Windows 系统，CVSS 评分 5.0，危害等级中等，需升级至不受影响版本。"
published = "1999-12-16T05:00:00.000"
remediation = "立即安装 Symantec 为 NAV2000 发布的 POProxy 安全补丁（文档 ID: 6206f660a1f2516a882568660082c930），或升级到 Norton AntiVirus 2001 及以上版本。如暂时无法更新，可禁用 POP3 邮件扫描功能以关闭 POProxy 服务，或在防火墙中限制对 TCP 110 端口的非信任来源访问作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Symantec Norton AntiVirus NAV2000 POProxy POP服务器缓冲区溢出漏洞"
updated = "2026-06-16T21:49:30.250"

