[basic]
description = 'Microsoft Index Server 2.0 在 IIS 4.0 上存在信息泄露漏洞。Index Server 将索引目录的物理路径信息存储在注册表 ContentIndex\Catalogs 子键下的 AllowedPaths 键值中，由于该注册表项的权限配置不当，本地及远程攻击者可通过访问注册表获取被索引目录的物理路径。攻击者利用此信息可进一步探测目标系统目录结构，为后续攻击提供情报支持。该漏洞影响 Windows NT 4.0 及 IIS 4.0 环境，CVSS v2.0 评分 7.5，危害等级高。'
published = "1999-03-23"
remediation = '立即升级到受支持的 Windows Server 版本（如 Windows Server 2019/2022）及对应 IIS 版本，Index Server 2.0 和 IIS 4.0 均已停止支持，无法通过补丁修复。如无法升级，可手动收紧注册表键 `HKLM\SYSTEM\CurrentControlSet\Control\ContentIndex\Catalogs\AllowedPaths` 的权限，移除 Everyone 和 Users 组的读取权限，并限制对该注册表路径的远程访问。同时建议禁用 Index Server 服务（cisvc）以彻底消除暴露面。'
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Microsoft Windows NT Index Server 远程注册表管理漏洞"
updated = "1999-03-23"

