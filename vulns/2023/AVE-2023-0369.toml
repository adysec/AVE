[basic]
description = "Rust 语言的 openssl crate 在 0.10.55 之前版本中存在越界读取漏洞（CWE-126），当向 X509VerifyParamRef::set_host 方法传入空字符串时，由于边界检查不完善，程序会触发缓冲区越界读取操作，可能导致敏感内存信息泄露。该漏洞危害等级中等，CVSS 评分 4.5，攻击难度较低，无需特殊权限即可触发，影响了所有使用受影响版本 openssl crate 的 Rust 应用。"
published = "2025-07-28T03:15:23.193"
remediation = "立即将 `openssl` crate 升级到 0.10.55 或更高版本（`cargo update -p openssl`）。如无法立即升级，在调用 `set_host` 前对输入字符串判空，避免传入空字符串触发越界读取。"
score = 4.5
severity = "MEDIUM"
sources = ["msrc"]
title = "Rust openssl crate 越界读取漏洞"
updated = "2026-06-17T06:44:24.773"

