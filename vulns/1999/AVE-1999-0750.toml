[basic]
description = "Windows NT 和 Windows 2000 系统中，NetBIOS 共享信息可能通过 SNMP 注册表项被非授权泄露。远程攻击者可利用 SNMP 服务查询目标系统的注册表，获取 NetBIOS 共享名称、路径等敏感信息，为后续攻击提供侦察基础。该漏洞影响 Windows NT 4.0 及 Windows 2000 版本，攻击者只需能够访问目标系统的 SNMP 服务（默认端口 161/162）即可利用，无需身份认证。建议禁用不必要的 SNMP 服务或限制 SNMP 访问权限以降低风险。"
published = "1997-01-01T05:00:00.000"
remediation = '升级到 Windows Server 2003 或更高版本系统，或在 SNMP 服务配置中将注册表项 HKLM\System\CurrentControlSet\Services\SNMP\Parameters 的权限设置为仅允许管理员访问，同时在防火墙上限制 UDP 161/162 端口的访问来源 IP。'
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "Microsoft Windows NT/2000 SNMP NetBIOS 共享信息泄露漏洞"
updated = "2026-06-16T21:48:31.723"

