[basic]
description = "华盛顿大学 IMAP 服务器（UW-IMAP）的 imapd 组件 4.7 版本存在缓冲区溢出漏洞。具有有效账户的攻击者可通过向 IMAP 服务发送特制的 LIST 或其他命令触发该漏洞，导致缓冲区溢出，进而实现远程代码执行。该漏洞影响 WU-IMAP 2000.287 版本，CVSS 评分 7.5，危害等级高。攻击者需先拥有目标系统的有效账户方可利用，攻击复杂度较低。"
published = "2000-04-16"
remediation = "升级 UW IMAPD 至 4.7 以上已修复版本（如 imap-2000.287 之后的版本），或在无法升级时限制受信用户访问 IMAP 服务，并在网络层限制对 IMAP 端口（143/tcp）的访问来源。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "华盛顿大学 IMAPD 远程缓冲区溢出漏洞"
updated = "2026-06-16"

