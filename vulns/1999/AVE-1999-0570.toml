[basic]
description = "Netscape Directory Server 在安装过程中会将包含敏感信息（如管理员口令、配置凭据等）的文件以不当权限保留在本地文件系统中，该文件可被本地普通用户直接读取。此漏洞影响在本地安装 Netscape Directory Server 的系统，攻击条件为攻击者需拥有目标主机的本地登录权限或本地文件读取权限。本地用户通过访问安装过程遗留的敏感文件即可获取凭据等关键信息，进而可能提升权限或进一步攻击目录服务，造成信息泄露与潜在的服务沦陷风险。"
published = "1999-05-01T04:00:00.000"
remediation = "安装完成后立即删除安装过程中生成的临时文件（如 install.log、setup.ini），并将安装目录权限设置为 750（仅管理员可读写执行），防止本地用户访问敏感配置信息。建议升级至 Red Hat Directory Server 或 389 Directory Server 等仍在维护的替代产品。"
score = 7.2
severity = "HIGH"
