[basic]
description = "SGI IRIX 5.x 和 6.x 系统中 /usr/lib/desktop/permissions 程序存在栈缓冲区溢出漏洞。本地攻击者可通过向该程序提供超长且精心构造的第4个参数，触发缓冲区溢出，从而以 sys 组权限执行任意代码。该漏洞已有公开利用代码，由 David Hedley 于 1997年5月发布。"
published = "1997-11-01"
remediation = "立即应用 SGI 安全公告 19971103-01-PX 中提供的补丁，升级 permissions 程序。如无法打补丁，应移除 permissions 程序的 setuid 位（chmod u-s /usr/lib/desktop/permissions），并严格限制可登录系统的本地用户账号，仅保留受信任的管理员用户。"
score = 7.2
severity = "HIGH"
sources = [
    "cve",
    "exploitdb",
]
title = "SGI IRIX permissions 程序缓冲区溢出本地权限提升漏洞"
updated = "2026-06-16"

