[basic]
description = "suidperl（sperl）是 Perl 中用于执行 SUID 权限脚本的辅助程序，其在处理用户输入时存在缓冲区溢出漏洞。本地攻击者可通过向目标系统提交特制的 Perl 脚本参数触发该溢出，覆盖内存中的关键数据结构，从而获取 root 权限。该漏洞影响 Perl 4.x 及 5.x 版本，涉及 BSD/OS、RedHat、SGI 等多个操作系统平台，CVSS 评分 7.2，危害等级高。"
published = "1997-05-29T04:00:00.000"
remediation = "升级 Perl 至 5.004 或更高版本以修复 suidperl 缓冲区溢出漏洞。如无法升级，可移除 suidperl 的 setuid 权限（chmod u-s /usr/bin/suidperl），并改用 sudo 机制替代 setuid 脚本执行。长期建议彻底废弃 suidperl，使用常规 Perl 解释器配合 sudo 调用。"
score = 7.2
severity = "HIGH"
sources = ["exploitdb"]
title = "Perl suidperl 本地缓冲区溢出漏洞"
updated = "2026-06-16T21:47:24.680"

