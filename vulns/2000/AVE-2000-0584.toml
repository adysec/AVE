[basic]
description = "Netscape Communicator 4.73 及更早版本存在证书验证绕过漏洞。当用户此前已接受某个网站的证书后，浏览器无法对该证书用于不同网站时进行有效警告，导致远程攻击者可通过篡改目标网站的 DNS 信息，将合法网站的流量重定向至恶意服务器，利用已接受的证书实施网站欺骗攻击。该漏洞允许攻击者伪造可信网站身份，窃取用户敏感信息。"
published = "2000-05-26"
remediation = "升级至 Netscape Communicator 4.74 或更高版本，该版本已修复证书验证绕过逻辑。由于 Netscape 浏览器已停止维护，建议迁移至现代浏览器（如 Firefox、Chrome），并在 DNS 层面启用 DNSSEC 防止 DNS 劫持攻击。"
score = 5.0
severity = "MEDIUM"
sources = ["cve"]
title = "Netscape Communicator 证书验证安全绕过漏洞"
updated = "2026-06-16"

