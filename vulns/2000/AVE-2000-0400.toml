[basic]
description = "H. Nomura 开发的 Tiny FTPd 0.52 beta3 版本的 FTP 服务器在多个命令处理函数中存在缓冲区溢出漏洞。受影响命令包括 STOR、RNTO、MKD、XMKD、RMD、XRMD、APPE、SIZE 和 RNFR 等。由于服务端在接收这些命令的参数时未对输入长度进行边界校验，远程攻击者可通过向目标 FTP 服务器发送超长参数的特制命令，覆盖栈上返回地址或相邻内存，进而在服务器进程上下文中执行任意命令或代码。攻击条件为攻击者需能与目标主机的 FTP 服务（默认 21 端口）建立网络连接并发送上述命令，通常需具备有效的登录凭据或匿名访问权限。该漏洞危害极大，CVSS 评分达 10.0，可导致远程服务被完全控制。"
published = "2000-02-01T05:00:00.000"
remediation = "立即升级 Tiny FTPd 至 0.52 beta3 以上版本，或迁移至 vsftpd/ProFTPD 等仍在维护的 FTP 服务器软件。如无法升级，在防火墙/路由器层面限制对 FTP 端口的访问来源 IP，并禁用匿名写入权限以降低被利用风险。"
score = 10
severity = "CRITICAL"
sources = ["cve"]
title = "H. Nomura Tiny FTPDaemon 0.52 多重缓冲区溢出漏洞"
updated = "2026-06-16T21:51:04.157"

