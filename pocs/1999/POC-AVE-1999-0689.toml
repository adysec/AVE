[info]
author = "ave"
description = "检测 SCO OpenServer 5.0.5 系统中 userOsa 程序是否存在，该程序存在符号链接竞争条件漏洞，本地攻击者可通过创建恶意符号链接指向 /etc/shadow 等敏感文件，诱导 userOsa 写入数据导致文件损坏或权限提升。"
id = "POC-AVE-1999-0689"
name = "SCO OpenServer 5.0.5 userOsa 符号链接漏洞 PoC"
severity = "low"
tags = ["ave-1999-0689"]
vuln_id = [
    "CVE-1999-0893",
    "AVE-1999-0689",
]

[poc]
logic = "all"

[[poc.requests]]
path = "/etc/shadow"
protocol = "file"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["root:"]
