[basic]
description = "Netscape Communicator 4.7 及更早版本在处理过长证书密钥时存在缓冲区溢出漏洞，远程攻击者可通过发送超长证书密钥触发拒绝服务，甚至可能执行任意代码。该漏洞影响所有使用受影响版本 Communicator 的客户端系统，攻击者无需身份认证即可远程利用，CVSS 评分 2.6，属于低危漏洞。"
published = "1999-10-28T04:00:00.000"
remediation = "升级到 Netscape Communicator 4.7 以上的修复版本（如 4.75 及后续 4.x 版本），或迁移至已修复该证书密钥处理缺陷的 Mozilla/Netscape 6 系列。在无法立即升级时，应在邮件客户端与浏览器中禁用对远程站点的 SSL 证书自动获取与处理，并通过防火墙/代理过滤异常超长证书请求，避免接收构造的恶意证书以缓解拒绝服务风险。"
score = 2.6
severity = "LOW"
sources = ["avd"]
title = "Netscape Communicator 长证书密钥远程拒绝服务漏洞"
updated = "2026-06-16T21:49:59.260"

