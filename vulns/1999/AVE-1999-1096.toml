[basic]
description = "苹果 PowerBook 笔记本电脑控制面板中的密码安全选项存在设计缺陷，具有物理访问权限的攻击者可通过应急启动盘引导系统，使用磁盘编辑器修改本应无法直接访问的 APWD 文件中的密码开关或密码字段，从而绕过系统密码保护。该漏洞需物理接触设备即可利用，影响苹果 PowerBook 系列设备。"
published = "1999-05-21T04:00:00.000"
remediation = "在 Open Firmware 中启用安全模式（设置 security-mode=command 或 full），并设置 Open Firmware 密码以防止从外部启动磁盘引导；同时使用磁盘工具启用 FileVault 全盘加密保护数据。对于无法设置固件密码的旧型号，应限制物理访问或移除内置光驱/软驱等外部启动设备。"
score = 4.6
severity = "MEDIUM"
sources = ["avd"]
title = "苹果 PowerBook 控制面板密码安全选项安全绕过漏洞"
updated = "2026-06-16T21:50:20.637"

