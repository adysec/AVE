[basic]
description = "Compaq Insight Manager agent 中的 Integration Maintenance Utility 组件在 SmartStart 4.50 之前版本中存在配置篡改漏洞。该工具可修改 Windows NT 系统的登录法律通知标题（LegalNoticeCaption）和文本（LegalNoticeText），导致安全策略中规定的法律声明被篡改或绕过。攻击者利用该工具可覆盖系统登录时的法律提示内容，使其不符合企业安全合规要求，从而削弱系统安全管理机制。此漏洞需要本地访问权限，危害程度中等，影响使用 Compaq Insight Manager agent 的 Windows NT 系统。"
published = "1999-09-02T04:00:00.000"
remediation = "升级 Compaq Insight Manager agent 至 SmartStart 4.50 或更高版本，该版本修复了 Integration Maintenance Utility 可被伪造请求修改 Windows NT 法律声明的问题。如无法升级，建议限制对 Compaq Insight Manager agent 管理端口的网络访问权限，仅允许受信任主机连接。"
score = 4.6
severity = "MEDIUM"
sources = ["cve"]
title = "Compaq Insight Manager agent Integration Maintenance Utility 法律通告篡改漏洞"
updated = "2026-06-16T21:50:15.973"

