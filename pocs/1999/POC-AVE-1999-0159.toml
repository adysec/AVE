[info]
author = "ave"
description = "验证 Internet Explorer 4.0/5.0 DHTML Edit ActiveX 控件(DHTMLEDIT)跨域安全限制绕过漏洞(CVE-1999-0487)。通过 object 标签嵌入 DHTMLEDIT 控件(CLSID:2D360201-FFF5-11D1-8D03-00A0C959BC0A)，利用跨帧访问技术绕过同源策略读取受害者本地文件系统内容。攻击者需诱使用户访问恶意页面。"
id = "POC-AVE-1999-0159"
name = "Microsoft Internet Explorer DHTML Edit ActiveX File Read PoC"
severity = "low"
tags = ["ave-1999-0159"]
vuln_id = [
    "CVE-1999-0487",
    "AVE-1999-0159",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/"
protocol = "http"

[poc.requests.body]
content = ""
type = "raw"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["2D360201-FFF5-11D1-8D03-00A0C959BC0A"]
