[basic]
description = "Windows NT 域认证机制存在安全缺陷，当域用户在登录时输入的域名末尾包含空格字符，系统无法正确下载并应用域安全策略，导致绕过身份认证。该漏洞影响 Windows NT 系列操作系统，攻击者只需拥有域账户，通过在域名后附加空格即可触发。利用方式简单，危害等级严重，CVSS 评分 10.0。微软已发布安全更新修复此问题。"
published = "1999-11-18T05:00:00.000"
remediation = "建议立即升级 Windows NT 4.0 至 Service Pack 6a 或更高版本，该补丁（KB Q237923）修复了域登录时尾部空格导致策略下载失败的问题。对于无法升级的系统，应在登录流程入口处对域名字段做 Trim 处理，去除首尾空白字符，并确保域控制器和客户端统一校验域名格式。"
score = 10
severity = "CRITICAL"
sources = ["cve"]
title = "Microsoft Windows NT 安全策略绕过漏洞"
updated = "2026-06-16T21:49:28.090"

