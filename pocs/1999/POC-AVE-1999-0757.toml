[info]
author = "ave"
description = "检测 Omnicron OmniHTTPD 1.1/2.0 Alpha 1 中 visadmin.exe 管理程序拒绝服务漏洞。通过向服务器发送 HTTP 请求并检查响应头中的 OmniHTTPd 标识，验证目标是否运行存在漏洞的版本。"
id = "POC-AVE-1999-0757"
name = "Omnicron OmniHTTPD visadmin.exe Denial of Service PoC"
severity = "medium"
tags = [
    "cve-1999-0970",
    "dos",
    "omnihttpd",
]
vuln_id = [
    "CVE-1999-0970",
    "AVE-1999-0757",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/"
protocol = "http"

[poc.requests.headers]
User-Agent = "AVE/1.0"

[[poc.requests.matchers]]
expect = true
part = "header"
type = "word"
words = ["OmniHTTPd"]
