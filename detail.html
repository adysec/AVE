<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="AVE 漏洞详情 - 查看完整的漏洞信息、参考链接与 PoC/EXP 资产" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛡️</text></svg>" />
    <title>AVE 漏洞详情</title>
    <link rel="stylesheet" href="assets/styles.css" />
  </head>
  <body>
    <header class="hero">
      <div class="hero-inner">
        <div class="hero-top">
          <a href="index.html" class="back-link">← 返回列表</a>
          <h1>漏洞详情</h1>
        </div>
        <p id="detail-subtitle">正在加载漏洞详情 ...</p>
      </div>
    </header>

    <main class="layout detail-layout">
      <section class="panel detail-panel">
        <div id="status" class="status">初始化中...</div>

        <article class="detail-card" id="detail-card" style="display:none;">

          <!-- ═══ 头部 ═══ -->
          <div class="detail-header">
            <div class="detail-id-row">
              <strong class="detail-ave" id="d-ave">-</strong>
              <span class="severity" id="d-sev">UNKNOWN</span>
              <div class="detail-score-box">
                <span class="score-big" id="d-score">0</span>
                <span class="score-suffix" id="d-score-label">/ 10</span>
              </div>
            </div>
            <div class="detail-header-actions">
              <a class="detail-link" id="d-raw" target="_blank" rel="noopener noreferrer">📄 原始 TOML</a>
            </div>
          </div>

          <h2 class="detail-title" id="d-title"></h2>
          <p class="detail-desc" id="d-desc"></p>

          <!-- ═══ 元信息网格 ═══ -->
          <div class="detail-grid">
            <div class="detail-grid-item">
              <span class="grid-label">发布时间</span>
              <span class="grid-value" id="d-published">-</span>
            </div>
            <div class="detail-grid-item">
              <span class="grid-label">更新时间</span>
              <span class="grid-value" id="d-updated">-</span>
            </div>
            <div class="detail-grid-item">
              <span class="grid-label">状态</span>
              <span class="grid-value" id="d-status">-</span>
            </div>
            <div class="detail-grid-item">
              <span class="grid-label">采集时间</span>
              <span class="grid-value" id="d-collected">-</span>
            </div>
          </div>

          <!-- ═══ 来源 & 别名 ═══ -->
          <div class="detail-tags-section">
            <div class="tag-row">
              <span class="tag-row-label">来源</span>
              <span id="d-sources"></span>
            </div>
            <div class="tag-row">
              <span class="tag-row-label">别名</span>
              <span id="d-aliases"></span>
            </div>
          </div>

          <!-- ═══ 修复建议 ═══ -->
          <p class="detail-remediation" id="d-remediation"></p>

          <!-- ═══ PoC / EXP 标记 ═══ -->
          <div class="flags">
            <span class="flag" id="d-poc">PoC：无</span>
            <span class="flag" id="d-exp">EXP：无</span>
          </div>

          <!-- ═══ 参考链接 ═══ -->
          <section class="detail-block">
            <h4>🔗 参考链接</h4>
            <div class="links" id="d-refs"></div>
          </section>

          <!-- ═══ TOML 中声明的 PoC URL ═══ -->
          <section class="detail-block" id="d-poc-urls-section">
            <h4>🔗 PoC 链接（外部）</h4>
            <div class="links" id="d-poc-urls"></div>
          </section>

          <!-- ═══ TOML 中声明的 EXP URL ═══ -->
          <section class="detail-block" id="d-exp-urls-section">
            <h4>🔗 EXP 链接（外部）</h4>
            <div class="links" id="d-exp-urls"></div>
          </section>

          <!-- ═══ 仓库 PoC 资产 ═══ -->
          <section class="detail-block" id="d-repo-pocs">
            <h4>📁 仓库 PoC 资产</h4>
            <div id="d-repo-poc-files" class="asset-list"></div>
          </section>

          <!-- ═══ 仓库 EXP 资产 ═══ -->
          <section class="detail-block" id="d-repo-exps">
            <h4>📁 仓库 EXP 资产</h4>
            <div id="d-repo-exp-files" class="asset-list"></div>
          </section>

        </article>
      </section>
    </main>

    <footer class="site-footer">
      <div class="footer-inner">
        <p class="footer-brand"><a href="https://github.com/adysec/AVE" target="_blank" rel="noopener noreferrer">AVE</a> 公开漏洞库</p>
        <p class="footer-desc">AdySec Vulnerability Exposures — 多源聚合漏洞知识库</p>
      </div>
    </footer>

    <script src="assets/detail.js"></script>
  </body>
</html>
