[basic]
description = "NetWin DNews 5.3 服务器中的 DNEWSWEB CGI 程序存在缓冲区溢出漏洞，远程攻击者可通过向 group、cmd、utag 等 CGI 参数提交超长字符串触发缓冲区溢出，进而执行任意系统命令。该漏洞影响 NetWin DNews 5.3 及更早版本，攻击者无需任何身份认证即可远程利用，危害较大。官方已发布修复版本建议用户升级。"
published = "2000-05-05T04:00:00.000"
remediation = "NetWin DNews 已停止维护，官方早已不再发布更新。建议立即升级至 DNews 5.4 及以上版本（5.4 已修复该溢出漏洞），或停用 DNews 迁移至替代新闻组服务器（如 INN）。若短期内无法迁移，可在 Web 服务器层面对 DNEWSWEB CGI 的输入参数长度进行限制，或禁用该 CGI 程序。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "NetWin DNews 5.3 Server 缓冲区溢出漏洞"
updated = "2026-06-16T21:51:42.067"

