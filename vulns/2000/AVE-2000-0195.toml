[basic]
description = "ZoneAlarm 防火墙在处理用户请求事件详细信息时，会以明文方式将系统配置、网络拓扑等敏感信息发送至 Zone Labs 服务器，中间人攻击者可通过网络嗅探拦截并获取这些未加密数据。该漏洞影响 ZoneAlarm 早期版本，CVSS 评分 5.0，危害等级中危，建议用户升级至修复版本并避免在不可信网络中使用。"
published = "2000-02-24T05:00:00.000"
remediation = '升级 ZoneAlarm 至最新版本，新版本已对用户请求事件详情时的数据传输进行加密处理。如无法立即升级，可在 ZoneAlarm 设置中关闭"事件详情在线查询"功能，或通过防火墙规则阻止 ZoneAlarm 进程向 Zone Labs 服务器（zones.zonelabs.com）发送明文 HTTP 请求，改用加密通道传输敏感系统与网络信息。'
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Zone Labs ZoneAlarm 敏感信息明文传输漏洞"
updated = "2026-06-16T21:51:15.270"

