[basic]
description = "Red Hat Linux 6.2 的 inetd 超级服务守护进程未能正确关闭其内部服务（如 chargen、daytime、echo 等）的套接字连接。远程攻击者可通过向目标系统发起大量并发连接请求，消耗系统文件描述符资源，导致 inetd 服务无法响应新的连接请求，最终引发拒绝服务。该漏洞影响 Red Hat Linux 6.2 及使用相同 inetd 实现的 Linux 发行版，攻击条件简单，无需身份认证即可远程触发。"
published = "2001-06-02T04:00:00.000"
remediation = "建议升级至 Red Hat Linux 6.2 补丁版本或更高版本。如无法升级，编辑 /etc/inetd.conf，注释（行首加 #）chargen、daytime、echo、discard 等内部服务行，然后重启 inetd 服务（kill -HUP <inetd_pid> 或 /etc/init.d/inetd restart）；也可迁移至 xinetd 替代传统 inetd 以缓解此问题。"
score = 5
severity = "MEDIUM"
sources = ["redhat"]
title = "Red Hat Linux 6.2 inetd 拒绝服务漏洞"
updated = "2026-06-16T21:54:04.383"

