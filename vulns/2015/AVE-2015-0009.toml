[basic]
description = "Elasticsearch Groovy 脚本引擎沙盒存在安全绕过漏洞，攻击者可通过精心 crafted 的 Groovy 脚本打破沙盒保护机制，在目标系统中执行任意 shell 命令。该漏洞影响于允许用户运行脚本的 Elasticsearch 服务器，攻击者无需任何身份认证即可远程利用漏洞，以 Elasticsearch 服务进程的权限在受影响的服务器上执行任意代码，导致系统完全被接管。该漏洞的攻击条件极其苛刻，攻击者无需任何权限或用户交互即可实现，攻击复杂度低，对系统的保密性、完整性和可用性造成全面影响。漏洞 CVSS 评分高达 9.8，危害等级为严重，已公开发布并被多种安全研究平台收录利用代码。微软已针对此漏洞发布了多个安全补丁，用户需尽快升级至最新版本以修复此安全漏洞。"
published = "2015-02-17T15:59:04.560"
remediation = "建议立即升级 Elasticsearch 到 1.3.8 或 1.4.3 或更高版本，以修复 Groovy 脚本引擎沙盒保护机制的安全绕过漏洞。如无法立即升级，可临时限制 Groovy 脚本权限或部署在防火墙后。"
score = 9.8
severity = "CRITICAL"
sources = ["kev"]
title = "Elasticsearch Elasticsearch Groovy 脚本引擎沙箱绕过远程代码执行漏洞"
