[basic]
description = "Gene6 G6 FTP Server 2.0 存在资源耗尽型拒绝服务漏洞。远程攻击者无需身份认证，通过向 FTP 服务器提交超长的用户名或密码字符串，即可触发缓冲区溢出，导致 FTP 服务进程崩溃或资源耗尽，从而使服务不可用。该漏洞利用方式简单，直接发送畸形请求即可实施攻击，影响服务器正常业务运行。"
published = "1999-11-17T05:00:00.000"
remediation = "升级 Gene6 G6 FTP Server 至 3.0 及以上版本，该版本对用户名和密码长度做了输入校验。如无法升级，建议在网络防火墙或 IPS 设备上配置规则，限制 FTP 登录用户名和密码字段长度不超过 64 字符，并对发往 21 端口的异常长度数据包进行拦截。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Gene6 G6 FTP Server 2.0 拒绝服务漏洞"
updated = "2026-06-16T21:50:36.847"

