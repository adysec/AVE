[basic]
description = "Linux Kernel 2.4 及 2.2 版本中的 ptrace 系统调用存在条件竞争漏洞。本地攻击者可通过利用 ptrace 跟踪并修改正在运行的 setuid 进程，在 execve 执行过程中触发竞态条件，从而获得目标进程的权限提升。该漏洞影响 RedHat 6.2/7.0 等发行版中使用的 2.2.14/2.2.18 内核版本，攻击者需具备本地用户权限，无需认证即可利用。ExploitDB 已公开该漏洞的利用代码。"
published = "2001-05-03T04:00:00.000"
remediation = "立即升级 Linux 内核至 2.2.19 或 2.4.1 以上版本，该竞态条件漏洞已在后续内核中得到修复。如无法升级内核，可通过禁用 ptrace 功能或限制普通用户执行 ptrace 系统调用作为临时缓解措施。"
score = 3.7
severity = "LOW"
sources = ["exploitdb"]
title = "Linux Kernel ptrace/execve 条件竞争权限提升漏洞"
updated = "2026-06-16T21:54:05.250"

