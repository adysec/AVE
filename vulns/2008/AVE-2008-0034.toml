[basic]
description = 'libpng 库在处理 PNG 文件中零长度 "unknown" chunks 时存在未初始化内存访问漏洞。攻击者可构造包含零长度未知块的恶意 PNG 文件，诱导受害者使用受影响版本的 libpng 库（1.0.6-1.0.32、1.2.0-1.2.26、1.4.0beta01-1.4.0beta19）的应用程序打开或处理该文件，触发未初始化内存访问导致应用程序崩溃（拒绝服务），甚至可能实现任意代码执行。攻击者需诱导用户打开恶意 PNG 文件或通过网页嵌入恶意图片触发漏洞，攻击向量为网络远程攻击，无需身份认证，攻击复杂度低，CVSS 评分 7.5（高危）。受影响产品广泛使用 libpng 的图像查看器、浏览器、图像处理软件等。升级至 libpng 1.0.33、1.2.27、1.4.0beta20 或更高版本可修复该漏洞。'
published = "2008-04-14T16:05:00.000"
remediation = "建议升级 libpng 至 1.2.27 或更高版本（1.0.x 分支升级至 1.0.33）。Linux 发行版用户可通过系统包管理器更新，如 Debian/Ubuntu 执行 apt upgrade libpng，RHEL/CentOS 执行 yum update libpng。如无法立即升级，可在编译时将 PNG_READ_UNKNOWN_CHUNKS_SUPPORTED 和 PNG_READ_USER_CHUNKS_SUPPORTED 宏定义为 0 以禁用未知块处理功能作为临时缓解。同时升级受影响的关联软件，如图像处理库 ImageMagick（6.2.5 至 6.4.0-4 版本受影响，需升级至安全版本）。更多信息请参阅 libpng 官方安全公告 http://libpng.sourceforge.net/Advisory-1.2.26.txt。"
score = 7.5
severity = "HIGH"
sources = ["tenable"]
title = "libpng 代码执行和拒绝服务漏洞"
updated = "2026-06-16T22:51:37.550"

