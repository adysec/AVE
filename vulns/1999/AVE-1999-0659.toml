[basic]
description = "Solaris 操作系统中的 chkperm 工具存在安全漏洞，本地攻击者可通过设置 VMSYS 环境变量并结合符号链接攻击，以 bin 用户权限读取系统上的任意文件，导致敏感信息泄露。攻击条件为拥有本地系统访问权限。"
published = "1999-12-01"
remediation = "建议升级到不受影响的 Solaris 版本或安装 Sun 官方提供的安全补丁。如无法升级，应限制不可信用户对系统的本地访问权限，并监控 chkperm 工具的异常使用行为。"
score = 2.1
