[basic]
description = "Auto_FTP 0.2 中的 Auto_FTP.pl 脚本在 auto_ftp.conf 配置文件中以明文存储 FTP 账户的用户名和密码。攻击者若能读取该配置文件（例如通过 Web 访问或本地文件包含），即可直接获取凭证，进而控制 FTP 服务器，造成敏感信息泄露。该漏洞无需特殊权限即可利用。"
published = "1999-10-05"
remediation = "升级到不再使用明文存储凭据的 Auto_FTP 版本，或移除 auto_ftp.conf 文件中的明文凭据并改用环境变量/密钥管理服务；同时确保配置文件的文件权限设置为仅允许必要用户读取（如 chmod 600）。"
score = 7.5
severity = "HIGH"
sources = [
    "cve",
    "nvd",
]
title = "Auto_FTP 0.2 auto_ftp.conf 配置文件以明文存储用户名和密码漏洞"
updated = "2026-06-16"

