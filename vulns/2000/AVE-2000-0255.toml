[basic]
description = "CNC Technology BizDB 1.0 的 bizdb-search.cgi 脚本存在远程命令执行漏洞，由于对 dbname 参数中的 shell 元字符过滤不严，未经身份认证的远程攻击者可通过向目标系统发送特制的 HTTP 请求，注入系统命令并执行任意代码。攻击者无需认证即可利用该漏洞完全控制受影响服务器，危害严重。"
published = "2000-04-12T04:00:00.000"
remediation = "BizDB 1.0 已停止维护且厂商 CNC Technology 不再提供安全更新，建议立即从 Web 服务器根目录移除或重命名 bizdb-search.cgi 脚本，或直接卸载 BizDB 软件；如业务必须使用，需在 Web 服务器（Apache/Nginx）层面限制该脚本的执行权限并启用严格的输入过滤规则，禁止 dbname 参数包含 shell 元字符。最彻底的方案是替换为仍在维护的数据库管理系统。"
score = 10
severity = "CRITICAL"
sources = ["cve"]
title = "CNC Technology BizDB 远程命令执行漏洞"
updated = "2026-06-16T21:51:24.117"

