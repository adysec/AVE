[basic]
description = "Deerfield MDaemon 2.7、2.8.5 和 2.8.6 版本的邮件服务器在处理大量并发连接请求时存在拒绝服务漏洞。未经身份认证的远程攻击者可通过向目标服务器发送大量连接尝试，耗尽服务器连接资源导致邮件服务拒绝服务，影响正常邮件收发功能。该漏洞无需身份认证即可远程利用，攻击门槛较低，CVSS 评分 5.0（中等严重）。Deerfield 已在后续版本中修复此漏洞，建议受影响用户升级到修复版本。"
published = "1999-12-01T05:00:00.000"
remediation = "建议升级到 Deerfield MDaemon 2.8.7 或更高版本，该版本修复了连接耗尽导致的拒绝服务问题。如暂时无法升级，可在 MDaemon 管理控制台中启用「IP 屏蔽」与「连接频率限制」，将单 IP 最大并发连接数调低，并通过防火墙对 SMTP/POP3 端口（25、110、143 等）设置每秒新建连接速率上限作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Deerfield MDaemon 连接拒绝服务漏洞"
updated = "2026-06-16T21:49:10.807"

