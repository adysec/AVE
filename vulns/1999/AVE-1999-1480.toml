[basic]
description = "Exchange 邮件系统中安装 1ArcServe Backup 及 Inoculan 防病毒客户端模块时，会在本地创建名为 exchverify.log 的日志文件。该日志文件以明文形式记录用户的账户名和密码，导致敏感凭据信息泄露。本地攻击者可通过读取该日志文件获取系统登录凭证，进而提升权限或访问受限资源。此漏洞影响 Exchange 与上述软件集成的环境，危害等级中危。"
published = "1998-11-12T05:00:00.000"
remediation = "立即删除或移动 exchverify.log 文件，并确保该文件所在目录权限设置为仅管理员可读写（如 chmod 600）。升级到厂商已修复的最新版本，或卸载存在问题的 1ArcServe Backup 和 Inoculan AV 客户端模块，改用支持加密日志的替代方案。作为临时缓解措施，使用文件系统 ACL 限制 exchverify.log 的访问权限。"
score = 4.6
severity = "MEDIUM"
sources = ["epss"]
title = "1ArcServe Backup及Inoculan AV Exchange客户端模块明文密码信息泄露漏洞"
updated = "2026-06-16T21:50:11.617"

