[basic]
description = "Red Hat Linux 6.0 系统中的 screen 和 rxvt 终端程序未正确设置 tty 设备的权限模式，导致本地用户能够向其他用户的终端写入数据。攻击者利用此漏洞可向其他终端会话注入命令或干扰正常操作，造成信息泄露或权限提升。该漏洞需要攻击者拥有本地访问权限，CVSS 评分 4.6，危害等级中危。"
published = "1999-06-01T04:00:00.000"
remediation = "升级 Red Hat Linux 至 6.1 及以上版本，或单独升级 screen 至 3.9.5-7、rxvt 至 2.6.4 以上版本。同时检查 /dev/tty* 设备权限，确保仅 root 和所属用户可写（权限 620），并启用 pam_console 模块限制终端访问。"
score = 4.6
severity = "MEDIUM"
sources = ["redhat"]
title = "Red Hat Linux screen 和 rxvt 终端权限设置不当漏洞"
updated = "2026-06-16T21:51:33.790"

