[basic]
description = "aVirt Rover POP3 服务器 1.1 版本中存在缓冲区溢出漏洞。远程攻击者无需身份认证，可通过向服务端发送超长用户名字符串触发缓冲区溢出，导致 POP3 服务进程崩溃，造成拒绝服务。该漏洞影响 aVirt Rover POP3 Server 1.1 版本，CVSS 评分 5.0，危害等级中危。建议升级至最新版本或限制 POP3 服务访问来源以降低风险。"
published = "1999-12-27T05:00:00.000"
remediation = "升级 aVirt Rover POP3 服务器至 1.1 以上版本以修复缓冲区边界检查缺陷；如厂商已停止维护，建议迁移至其他受支持的 POP3 服务器软件（如 Dovecot、Cyrus）。作为临时缓解措施，在防火墙上限制源 IP 访问 TCP 110 端口，并在服务器上部署入侵检测规则拦截超长用户名请求。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "aVirt Rover POP3 Server 缓冲区溢出拒绝服务漏洞"
updated = "2026-06-16T21:50:55.140"

