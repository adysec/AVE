[basic]
description = "Sendmail 的别名（alias）功能允许将电子邮件内容通过管道（pipe）传递给指定程序执行，远程攻击者可利用此机制发送特制邮件触发目标系统执行任意命令，从而导致远程代码执行。该漏洞影响广泛使用的 Sendmail 邮件服务器软件，攻击者无需身份认证即可利用，危害等级严重（CVSS 10.0），可导致服务器完全受控。"
published = "1999-01-01T05:00:00.000"
remediation = "升级 Sendmail 至 8.9.0 或更高版本，启用 smrsh（SendMail Restricted SHell）限制别名可调用的程序列表，仅允许白名单内的安全程序（如 mail、vacation）。同时在 /etc/mail/aliases 中移除或审查所有调用外部程序的管道别名，避免将未经消毒的输入传递给管道命令。如无法升级，可在 mc 配置中加入 FEATURE(smrsh) 并设置 smrsh 可执行路径。"
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "Sendmail 别名管道命令执行漏洞"
updated = "2026-06-16T21:48:38.933"

