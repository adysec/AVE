[basic]
description = "Red Hat Linux 6.2 Piranha 虚拟服务器套件的 Web 管理界面存在后门密码漏洞，远程攻击者无需身份认证即可通过预设的默认账户和密码登录管理后台，进而执行任意系统命令，完全控制目标服务器。该漏洞影响 Red Hat Linux 6.2 版本，危害等级严重。"
published = "2000-04-24T04:00:00.000"
remediation = "立即删除 /etc/piranha/default 中的默认密码配置，或升级到 Red Hat 官方修补版本；如无法升级，建议禁用 Piranha Web GUI 服务（停止 httpd 或 piranha-gui 服务），并在防火墙上限制仅信任 IP 可访问端口 8080。同时修改所有 Piranha 管理账户密码，确保使用强口令。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "Red Hat Piranha Virtual Server Package 默认后门密码漏洞"
updated = "2026-06-16T21:51:19.057"

