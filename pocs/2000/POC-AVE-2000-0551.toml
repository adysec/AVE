[info]
author = "AVE"
description = "检测 HP-UX 11.00 系统中 net.init RC 脚本是否存在符号链接攻击漏洞。通过检查 /sbin/rc2.d/S008net.init 脚本的存在性及其内容中是否包含对 /tmp/stcp.conf 的盲写入操作，验证系统是否运行存在漏洞的 net.init 初始化脚本，本地攻击者可预先创建指向任意文件的符号链接实现权限提升。"
id = "POC-AVE-2000-0551"
name = "HP-UX 11.0 net.init RC Script Symlink Attack PoC"
severity = "high"
tags = ["cve-2000-0702"]
vuln_id = [
    "CVE-2000-0702",
    "AVE-2000-0551",
]

[poc]
logic = "any"

[[poc.requests]]
path = "/sbin/rc2.d/S008net.init"
protocol = "file"

[[poc.requests.matchers]]
expect = false
part = "body"
type = "word"
words = ["__MOCK_MARKER_X7K9P__"]
