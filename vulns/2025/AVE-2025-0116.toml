[basic]
description = "普华科技 PowerPms 系统的忘记密码（ForgotPassword）功能存在 SQL 注入漏洞，攻击者可在无需身份认证的情况下，向目标接口提交特制的恶意 SQL 查询参数，绕过输入过滤直接操作后台数据库。成功利用该漏洞可导致数据库信息泄露（包括用户凭证、业务数据等），甚至可能进一步获取系统控制权。该漏洞影响普华科技 PowerPms 多个版本，危害严重。"
published = "0709"
remediation = "联系普华科技获取官方修复补丁，升级 PowerPms 至最新安全版本；对 ForgotPassword 接口的 email 参数实施参数化查询或预编译 SQL，严禁字符串拼接；部署 WAF 对该接口的恶意 SQL 注入特征进行拦截；限制数据库账户权限，采用最小权限原则隔离存储过程。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "普华科技 PowerPms 忘记密码SQL注入漏洞"
updated = "0709"

