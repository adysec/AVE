[basic]
description = "NeXTstep 操作系统中 `/usr/etc/restore0.9` 脚本设置了 SUID 位，导致脚本以 root 权限运行。由于该脚本存在安全缺陷，攻击者可通过注入恶意命令或利用脚本中的逻辑漏洞，在脚本执行过程中以 root 身份执行任意代码，实现本地权限提升。该漏洞影响 NeXT 1.0a 及 1.0 版本，本地普通用户无需任何身份认证即可利用，完成提权后完全控制目标系统。"
published = "1990-10-03T04:00:00.000"
remediation = "立即移除 `/usr/etc/restore0.9` 脚本的 suid 权限位：`chmod u-s /usr/etc/restore0.9`；如非必要直接删除该脚本：`rm -f /usr/etc/restore0.9`。NeXTstep 1.0/1.0a 已停止维护，建议迁移至现代操作系统，无法升级时严格限制本地用户登录权限并审计 suid 脚本。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "NeXT NeXTstep restore0.9 本地权限提升漏洞"
updated = "2026-06-16T21:50:20.500"

