[basic]
description = "WebsitePanel（Windows 服务器管理面板）登录页面 Default.aspx 存在开放重定向漏洞。攻击者可通过在 ReturnUrl 参数中构造恶意 URL，诱使用户点击后跳转到任意外部网站，进而实施钓鱼攻击。该漏洞源于程序未对用户输入的 ReturnUrl 参数进行充分验证，影响 WebsitePanel 1.2.2.1 之前的所有版本。攻击者无需身份认证即可利用，CVSS 评分 5.8，危害等级中危。"
published = "2012-07-17T21:55:02.583"
remediation = "升级 WebsitePanel 至 1.2.2.1 或更高版本，该版本已修复 ReturnUrl 参数未校验跳转目标的问题。如无法升级，在反向代理或 Web 应用防火墙 (WAF) 层面对 Default.aspx 的 ReturnUrl 参数实施白名单校验，仅允许跳转到本站域名内地址。"
score = 5.8
severity = "MEDIUM"
sources = ["nuclei"]
title = "WebsitePanel 登录页面开放重定向漏洞"
updated = "2026-06-16T23:44:18.527"

