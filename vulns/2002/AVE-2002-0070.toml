[basic]
description = "Wget 1.8.2-4 之前版本存在目录遍历漏洞。远程 FTP 服务器可通过在文件名中包含绝对路径（如 /absolute/path）或相对路径（如 ..）序列，在 wget 用户权限下创建或覆盖任意文件。攻击者只需搭建恶意 FTP 服务器并诱导用户使用 wget 下载文件即可触发，无需身份认证。该漏洞影响所有使用受影响版本 wget 的 Linux/Unix 系统，可能导致任意文件写入，进而实现代码执行或系统控制。"
published = "2002-12-18T05:00:00.000"
remediation = "升级 wget 至 1.8.2-4 或更高版本。Debian Woody 用户升级至 1.8.1-6.1，Red Hat 用户安装 RHSA-2002:256 提供的更新包。如无法立即升级，可在 wget 命令中禁用 FTP 递归下载（不使用 -r 参数），或使用 curl 替代 wget 进行 FTP 文件传输作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["osv"]
title = "GNU wget 目录遍历漏洞"
updated = "2026-06-16T21:59:08.543"

