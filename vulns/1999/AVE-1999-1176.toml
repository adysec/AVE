[basic]
description = "Cabletron SmartSwitch Router SSR 8000 交换机路由器存在 ARP 泛洪拒绝服务漏洞。该设备固件 2.x 版本每秒仅能处理 200 个 ARP 请求，远程攻击者可向目标发送大量伪造 ARP 数据包，超出设备处理能力上限，导致设备无法正常处理合法网络请求，造成拒绝服务。该漏洞无需认证即可远程利用，攻击条件简单有效。"
published = "1999-11-24T05:00:00.000"
remediation = "该设备（Cabletron SmartSwitch Router 8000）已停产且不再获得厂商支持，建议立即更换为支持 ARP 速率限制和动态 ARP 检测的现代路由器产品。若无法立即更换，可在上游交换机或防火墙上配置 ARP 数据包速率限制，将每接口 ARP 处理上限降至 200 pps 以下，并启用端口安全与 DHCP Snooping 功能，配合静态 ARP 表项绑定关键 IP 地址以缓解 ARP 洪泛攻击影响。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Cabletron SmartSwitch Router 8000 ARP请求泛洪拒绝服务漏洞"
updated = "2026-06-16T21:50:41.563"

