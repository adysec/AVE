[basic]
description = "jaZip Zip/Jaz 磁盘驱动器管理器存在本地缓冲区溢出漏洞，攻击者可通过向 DISPLAY 环境变量传入超长字符串触发缓冲区溢出，导致本地权限提升至 root 级别，从而完全控制受影响系统。该漏洞影响 jaZip 0.32-2 及更早版本，攻击者需拥有本地系统访问权限方可利用，CVSS 评分 7.2，危害等级高。"
published = "2001-03-12T05:00:00.000"
remediation = "升级 jaZip 至 0.32-3 或更高版本。由于该软件已停止维护，建议彻底卸载 jaZip 并改用兼容的 ZIP 管理工具（如 unzip/p7zip）。作为临时缓解措施，可移除 jaZip 的 setuid root 权限：`chmod u-s /usr/bin/jazip`，限制本地非授权用户利用该漏洞提权。"
score = 7.2
severity = "HIGH"
sources = ["exploitdb"]
title = "jaZip Zip/Jaz 磁盘驱动器管理器本地缓冲区溢出漏洞"
updated = "2026-06-16T21:53:40.473"

