[basic]
description = "Tektronix PhaserLink 打印机 Web 服务器存在未授权访问漏洞。攻击者无需身份认证，直接调用 ncl_items.html 和 ncl_subjects.html 等未公开 URL 即可绕过权限验证，获取管理员密码。该漏洞影响 Phaser 740/750/750DP/840/930 等型号打印机，CVSS 评分 10.0，危害等级严重。厂商未提供官方补丁，建议禁用 PhaserLink Web 服务或限制网络访问。"
published = "1999-11-16T05:00:00.000"
remediation = "由于该漏洞影响的老旧机型（Tektronix Phaser 740/750/840/930等）厂商已停止支持且无安全补丁，建议立即禁用 PhaserLink Web 服务（通过打印机面板或 telnet 进入设置关闭 HTTP 服务）；如无法关闭，则在网络边界防火墙对打印机管理端口（默认 80/TCP）设置 IP 白名单，限制仅授权管理 IP 可访问，并将打印机隔离至独立 VLAN，避免暴露在非信任网络中。"
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "Tektronix PhaserLink Printer 管理员密码泄露漏洞"
updated = "2026-06-16T21:50:35.480"

