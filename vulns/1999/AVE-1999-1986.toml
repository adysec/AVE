[basic]
description = "Persits Software 公司开发的 AspUpload 组件中的 AspUpload.dll 存在缓冲区溢出漏洞，影响 1.4.0.2 之前的所有版本。该组件通常用于 ASP 应用程序中处理浏览器文件上传功能，部署在 Windows NT 4.0 Server + IIS 3.0/4.0 等环境中。未经身份认证的远程攻击者可通过向使用 AspUpload 的上传页面提交特制 HTTP 请求，在表单的文件名字段中输入 3800 个或更多字符的超长参数来触发缓冲区溢出，导致 IIS 的 inetinfo 进程崩溃终止，进而造成 Web 服务拒绝服务。在某些条件下，该漏洞还可能被利用以执行任意命令。"
published = "1999-07-20"
remediation = "升级 Persits Software AspUpload 组件至 1.4.0.2 或更高版本，该版本已修复文件名字段缓冲区溢出问题；如无法立即升级，应移除或禁用 AspUpload 组件，并在前端上传页面限制文件名长度不超过合理范围（如 255 字符）以减轻拒绝服务风险。"
score = 10
severity = "CRITICAL"
sources = ["cve"]
title = "Persits Software AspUpload 缓冲区溢出漏洞"
updated = "2026-06-16"

