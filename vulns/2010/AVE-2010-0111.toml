[basic]
description = 'Joomla! 平台的 Fxwebdesign JRadio（com_jradio）组件在 1.5.1 之前版本中存在目录遍历漏洞。该组件在处理 index.php 的 controller 参数时未对用户输入进行充分过滤与校验，导致远程攻击者可在 controller 参数中插入"../"等目录遍历序列，从而突破 Web 根目录限制，读取服务器上的任意文件（如配置文件、敏感源码等）。攻击无需身份认证，仅需向目标站点发送特制的 HTTP 请求即可触发，影响所有运行受影响版本 JRadio 组件的 Joomla! 站点，可能导致敏感信息泄露，进而为进一步的入侵提供条件。'
published = "2011-02-01T23:00:03.437"
remediation = "建议将 Joomla! 的 JRadio (com_jradio) 组件升级至 1.5.1 或更高版本，可从官方扩展目录重新下载安装以覆盖存在漏洞的旧版。若无法立即升级，可在 Joomla! 后台禁用或卸载 com_jradio 组件，并通过 Web 服务器规则（如 Apache 的 .htaccess）拒绝对外界暴露 index.php 中 controller 参数的非预期目录遍历字符（../ 等），作为临时缓解措施。"
score = 7.5
severity = "HIGH"
sources = ["nuclei"]
title = "Fxwebdesign Com Jradio 路径遍历漏洞"
updated = "2026-06-16T23:25:24.880"

