[basic]
description = "Linux 内核 Btrfs 文件系统的块组管理中存在释放后使用（Use-After-Free）漏洞。当新创建的块组在尚未完成创建流程之前被标记为未使用时，内核错误地将其从未块组列表移至未使用块组列表，但未正确处理引用计数，导致后续释放操作时触发释放后使用。本地攻击者可通过执行特定的 Btrfs 文件系统操作序列（如创建和删除子卷、触发块组回收）利用此漏洞，造成内核崩溃（系统拒绝服务），在特定条件下可能导致权限提升。该漏洞影响 Linux 内核 6.4-rc6 及之前的版本，CVSS 评分 7.8，危害等级高。"
published = "2025-09-15T14:15:40.907"
remediation = "建议立即将 Linux 内核升级至 6.5 或更高版本（主线修复提交 0657b20c5a76，已合入 v6.5 正式版）。对于使用 5.15 LTS 内核的系统，升级至包含稳定版回滚补丁（6297644db23f）的 5.15.y 最新次版本；对于使用 6.1 LTS 的系统，升级至包含对应回滚补丁的 6.1.y 最新次版本。该漏洞位于 btrfs 模块的块组引用计数逻辑中，无配置层面缓解措施，必须通过内核代码补丁修复。"
score = 7.8
severity = "HIGH"
sources = ["msrc"]
title = "Linux Kernel Btrfs 释放后使用漏洞"
updated = "2026-06-17T06:44:27.880"

