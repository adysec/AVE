[basic]
description = "SmartDesk WebSuite 2.1 存在缓冲区溢出漏洞。该漏洞的原理是应用程序在处理 HTTP 请求时未对用户提供的 URL 长度进行充分的边界检查，远程攻击者可通过向目标服务器发送包含超长 URL 的特制 HTTP 请求触发缓冲区溢出，导致应用程序崩溃并引发拒绝服务。该漏洞影响运行 SmartDesk WebSuite 2.1 版本的 Web 服务器，攻击者无需身份认证即可在远程发起攻击，利用方式简单直接，仅需构造并发送包含过长路径的 HTTP 请求即可触发漏洞。"
published = "1999-05-23T04:00:00.000"
remediation = "SmartDesk WebSuite 已停止维护，官方不再提供安全更新。建议立即迁移至受支持的 Web 服务器软件（如 Apache/Nginx）。若无法迁移，可在反向代理或 WAF 层面添加规则，限制 URL 长度不超过 2048 字节并过滤异常字符作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
