[basic]
description = "Kabsoftware Lydia 工具使用弱加密算法将用户密码存储在 lydia.ini 配置文件中，本地攻击者可轻易解密密码文件，从而获取提升的权限。该漏洞源于加密强度不足，攻击者无需认证即可在本地利用。"
published = "1999-02-19"
remediation = "升级到 Kabsoftware Lydia 的修复版本，或使用更强的加密方案替代原有的弱加密算法存储密码。如无法升级，应限制对 lydia.ini 文件的本地访问权限。"
score = 4.6
severity = "MEDIUM"
sources = ["cve"]
title = "Kabsoftware Lydia 密码弱加密存储漏洞"
