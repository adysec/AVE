[basic]
description = "该漏洞源于目标硬件设备固件中对管理接口的身份认证机制缺失或可被绕过，攻击者在无需有效凭据的情况下，可通过本地网络或物理接口访问设备的管理功能，进而读取敏感配置、修改运行参数或植入恶意固件。攻击条件为攻击者能够与受影响设备处于同一网络可达范围，或具备物理接触条件，成功利用可导致设备被非授权控制并影响业务连续性。"
published = "2023-08-08"
remediation = "升级受影响硬件设备至厂商发布的最新固件版本，并启用管理接口的强身份认证与访问控制，限制管理端口仅对受信任网络开放。"
score = 5.5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "HWPOC 硬件固件 未授权访问漏洞"
updated = "2023-08-08"

