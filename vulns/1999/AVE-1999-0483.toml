[basic]
description = "Vixie Cron 是 Linux 系统中广泛使用的任务调度程序。RedHat Linux 4.2/5.2/6.0 及 S.u.S.E. Linux 6.0/6.1 版本中，Vixie Cron 在处理 MAILTO 环境变量时存在缓冲区溢出漏洞。本地攻击者可通过设置超长 MAILTO 环境变量触发缓冲区溢出，从而以 root 权限执行任意代码，完全控制目标系统。该漏洞 CVSS 评分 7.5，危害等级高，攻击者需拥有本地账户权限方可利用。"
published = "1999-08-25T04:00:00.000"
remediation = "升级 Vixie Cron 至 3.0.1 或更高版本，或安装对应发行版安全补丁（Red Hat 6.2+ 已修复）。如无法升级，在 crontab 中避免使用 MAILTO 变量，或限制 crontab 文件权限为 600 并仅允许受信用户编辑。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "Red Hat Linux Vixie Cron MAILTO 环境变量缓冲区溢出漏洞"
updated = "2026-06-16T21:49:01.067"

