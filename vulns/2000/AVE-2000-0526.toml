[basic]
description = "Microsoft Windows NT 4.0 及 2000 系统中的 NetBIOS 名称服务器（NBNS）协议缺乏身份认证机制，远程攻击者可通过向目标系统发送伪造的 Name Conflict（名称冲突）或 Name Release（名称释放）数据报，导致目标系统释放或冲突其 NetBIOS 名称注册，从而造成拒绝服务。该漏洞影响 Windows NT 4.0 和 Windows 2000 系统，CVSS 评分 5.0，危害等级中危。攻击者无需认证即可远程触发，利用难度较低。"
published = "2000-07-27T04:00:00.000"
remediation = "安装 Microsoft 安全公告 MS00-047 提供的更新补丁以修复 NBNS 协议认证缺陷。在防火墙上阻止来自外部网络的 UDP 137-139 端口以及 TCP 139、445 端口的入站 NetBIOS 流量。在不需要 NetBIOS 的系统中，通过 TCP/IP 高级设置禁用 NetBIOS over TCP/IP 服务作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Microsoft Windows NT 4.0/2000 NetBIOS Name Server 拒绝服务漏洞"
updated = "2026-06-16T21:52:14.333"

