[info]
author = "ave"
description = "检测 Linux 系统中 man 程序是否受 MANPAGER 环境变量缓冲区溢出漏洞影响。通过检查 /usr/bin/man 二进制文件的存在性，确认目标系统存在该漏洞的利用条件。本地用户可通过设置超长 MANPAGER 环境变量触发缓冲区溢出，获取 egid 15 权限。"
id = "POC-AVE-2000-0149"
name = "Linux man MANPAGER 环境变量缓冲区溢出漏洞 PoC"
severity = "high"
tags = ["ave-2000-0149"]
vuln_id = [
    "CVE-2000-0170",
    "AVE-2000-0149",
]

[poc]
logic = "all"

[[poc.requests]]
path = "/usr/bin/man"
protocol = "file"

[[poc.requests.matchers]]
expect = true
part = "body"
regex = "."
type = "regex"
