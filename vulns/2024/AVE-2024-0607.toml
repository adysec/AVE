[basic]
description = "Linux 内核 virtio-net 驱动中的 virtnet_rq_alloc 函数存在整数溢出漏洞。当系统配置 net.core.high_order_alloc_disable 为 1 时，frag 分配始终仅获取一页内存，而 virtnet_rq_dma 结构体占用 16 字节位于 frag 头部，导致缓冲区与结构体总大小超过单页边界触发溢出。具有本地低权限的攻击者可利用此漏洞造成虚拟机崩溃或 SCP 大文件传输失败，导致拒绝服务。该漏洞影响所有使用 virtio-net 的 Linux 内核版本，CVSS 评分 5.5，危害等级中等。"
published = "2025-01-11T15:15:07.170"
remediation = "升级 Linux 内核至 6.6.66、6.12.5 或 6.13 及以上版本（对应修复 commit a8f7d6963768/67a11de8965c/6aacd1484468）。Ubuntu 24.04 LTS 用户更新至 linux-image-6.11.0-1011-lowlatency 及以上版本。如无法立即升级，可临时设置 sysctl net.core.high_order_alloc_disable=0 降低触发概率，但建议尽快重启加载新内核完成修复。"
score = 5.5
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux kernel virtio-net 缓冲区溢出漏洞"
updated = "2026-06-17T08:14:06.020"

