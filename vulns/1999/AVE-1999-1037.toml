[basic]
description = "Windows NT SP2 的 Passfilt.dll 密码过滤器存在安全设计缺陷，允许用户设置包含用户名的弱密码，降低了密码复杂度要求。攻击者可在知晓用户名后，通过暴力破解或字典攻击等方式更容易地猜测出用户密码，进而获取系统未授权访问权限。该漏洞影响 Windows NT SP2 及可能的相关版本，危害等级高。"
published = "1999-12-31T05:00:00.000"
remediation = "Windows NT SP2 已停止支持，建议立即升级至 Windows 2000 及以上版本。如无法升级，可在本地安全策略中启用密码复杂性要求（Password must meet complexity requirements），并通过组策略禁止密码包含用户名。同时部署强密码策略（最小长度 8 位、包含三种字符类型）。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "Microsoft Windows NT SP2 密码过滤安全漏洞"
updated = "2026-06-16T21:50:10.843"

