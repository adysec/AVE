[basic]
description = "Compaq Tru64 UNIX 系统中的 dtlogin 程序存在权限提升漏洞。该程序在处理用户认证时未能正确验证权限，导致本地攻击者可通过向 dtlogin 发送特制请求或利用其不安全的文件权限，获取 root 权限。攻击者需拥有本地系统访问权限，成功利用后可完全控制受影响系统。该漏洞影响 Compaq Tru64 UNIX 多个版本，CVSS 评分 7.2，危害等级高。"
published = "1999-06-11"
remediation = "Compaq Tru64 UNIX 已停止支持，建议迁移至受支持操作系统。如无法迁移，可移除 dtlogin 程序的 setuid root 权限位（chmod u-s /usr/dt/bin/dtlogin），并限制可登录控制台的用户组，仅允许受信任管理员使用本地控制台。"
score = 7.2
severity = "HIGH"
sources = [
    "cve",
    "avd",
]
title = "Compaq Tru64 UNIX dtlogin 本地权限提升漏洞"
updated = "2026-06-16"

