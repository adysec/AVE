[basic]
description = "IMP/MSWordView 应用程序存在严重的文件权限漏洞。该应用创建的临时文件存储在 /tmp 目录，并设置了世界可读权限，导致任何本地用户均可访问这些临时文件，读取其中存储的敏感信息。这种漏洞源于不安全的文件权限配置，暴露了用户的隐私数据、配置信息和日志记录。攻击者可利用此漏洞读取系统内的敏感信息，可能导致信息泄漏和进一步安全风险。该漏洞影响 IMP/MSWordView 应用的用户及本地系统账户，攻击条件简单，只需获得本地访问权限即可轻易读取临时文件中的敏感数据。"
published = "2000-04-22T04:00:00.000"
remediation = "建议升级 IMP (Internet Messaging Program) 至 2.2 版本或更高版本，该版本已修复 MSWordView 在 /tmp 目录创建全局可读文件的问题。若无法立即升级，可通过设置 /tmp 目录粘滞位 (chmod +t /tmp) 或配置 MSWordView 使用用户私有临时目录 (设置 TMPDIR 环境变量指向 $HOME/tmp 并 chmod 700) 作为临时缓解措施，限制本地用户读取临时文件内容。"
score = 2.1
severity = "LOW"
sources = ["avd"]
title = "IMP MSWordView /tmp文件权限不当导致本地信息泄露漏洞"
updated = "2026-06-16T21:51:46.667"

