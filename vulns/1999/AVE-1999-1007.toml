[basic]
description = "Hummingbird Exceed 5.0 X Window 服务器存在输入验证缺陷，远程攻击者可通过向 TCP 端口 6000 发送特制的畸形数据，触发服务端解析异常，导致 X 服务进程崩溃或资源耗尽，造成拒绝服务。该漏洞影响 Hummingbird Exceed 5.0 版本，攻击无需认证，仅需网络可达即可实施。"
published = "1999-04-07T04:00:00.000"
remediation = "将 Hummingbird Exceed 从 5.0 版本升级至 6.0.1、6.0.2 或 6.1 版本以修复该拒绝服务漏洞。如无法立即升级，可在防火墙或主机层面限制对 TCP 端口 6000（X11 服务端口）的外部访问，仅允许可信 IP 连接，作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Hummingbird Exceed 5.0 远程拒绝服务漏洞"
updated = "2026-06-16T21:49:55.377"

