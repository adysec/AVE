[basic]
description = "React Server Components 的 RSC 协议存在反序列化漏洞（CWE-502），react-server-dom-parcel、react-server-dom-turbopack 与 react-server-dom-webpack 三个包未能安全校验 HTTP 请求中 Server Function 端点的载荷数据，未经身份认证的远程攻击者可发送特制的序列化请求触发该漏洞，导致远程代码执行。该漏洞影响 React 19.0.0 至 19.2.0 版本，CVSS 评分 10.0，危害等级严重。React 官方已发布修复版本 19.2.1 及更新。"
published = "2025-12-03T16:15:56.463"
remediation = "立即将 react-server-dom-webpack/react-server-dom-parcel/react-server-dom-turbopack 升级至 19.0.1、19.1.2 或 19.2.1 及以上版本。若使用 Next.js，按对应版本线升级至 14.2.35/15.0.8/15.1.12/15.2.9/15.3.9/15.4.11/15.5.10/16.0.11/16.1.5。若使用 React Router/Waku/Vite RSC 插件，同步升级 react、react-dom 及对应 RSC 包至最新版。无法立即升级时，在反向代理/WAF 层对 /_rsc 等 Server Function 端点实施访问控制或禁用 RSC 功能作为临时缓解。"
score = 10
severity = "CRITICAL"
sources = ["hwpoc"]
title = "React Server Components 反序列化远程代码执行漏洞"
updated = "2026-06-17T09:41:24.913"

