[basic]
description = "Slackware Linux 3.3 及 3.4 版本中 imapd 和 ipop3d 服务在启用 shadow 密码功能时存在存储器内容泄露漏洞。远程攻击者无需身份认证，通过发送短序列的 USER 和 PASS 命令（不提供有效用户名或密码）即可触发服务核心转储（core dump），导致进程内存中的敏感信息（如密码哈希等）被写入磁盘文件，可能被本地用户进一步利用获取系统权限。该漏洞 CVSS 评分 5.0，危害等级中等。"
published = "1998-02-02T05:00:00.000"
remediation = "升级 Slackware 系统至 3.5 及以上版本，或重新编译安装打过补丁的 imapd/ipop3d 守护进程。若无法升级，建议禁用 shadow 密码功能或在 inetd.conf 中注释掉 imap/pop3 服务端口作为临时缓解。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Slackware imapd及ipop3d存储器内容泄露漏洞"
updated = "2026-06-16T21:50:27.360"

