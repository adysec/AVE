[basic]
description = "Seattle Labs Emurl 2.0 及更早版本在处理电子邮件附件时存在安全缺陷，会将附件保存到服务器上启用了脚本执行权限的特定目录中。攻击者可将恶意的 ASP 文件作为邮件附件发送给目标用户，当收件人打开该邮件时，附件中的 ASP 脚本会在服务器上下文中被执行，从而可能导致任意代码运行或信息泄露。该漏洞影响使用 Emurl 2.0 及之前版本接收邮件的用户，攻击条件为攻击者能够向其发送带恶意 ASP 附件的电子邮件且收件人打开该邮件，利用方式依赖于服务器端对附件目录启用了脚本执行能力。"
published = "1999-07-28T04:00:00.000"
remediation = "建议立即升级 Seattle Labs Emurl 至厂商发布的修复版本（2.0 以上），或在 IIS 中禁用邮件附件存储目录的脚本执行权限（移除该目录的执行权限、禁用 ASP 映射），同时配置邮件网关拦截 .asp/.asa/.cer 等可执行脚本附件作为临时缓解措施。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "Seattle Labs Emurl 邮件附件脚本执行漏洞"
updated = "2026-06-16T21:49:31.843"

