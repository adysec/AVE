[basic]
description = "Sun Microsystems 的两枚安全代码签名证书遭泄露，攻击者可利用泄露的私钥对恶意代码（如 Java Applet）进行签名，使其伪装为由 Sun 官方签名的可信代码。该漏洞影响所有信任 Sun 代码签名证书的 Java 运行环境及支持 Applet 的浏览器，攻击者可通过网络将恶意签名的 Applet 分发给目标用户，诱使用户在浏览器或 Java 客户端中运行，从而绕过代码签名验证和 Java 安全沙箱检查，在客户端系统中执行任意恶意代码。攻击条件要求攻击者能够获取泄露证书的签名能力并诱导用户执行恶意 Applet，利用门槛较高但危害严重。Sun 已在安全公告 #00198 中发布证书吊销及修复措施，CERT 同步发布 CA-2000-19 安全通告进行预警。"
published = "2001-02-12T05:00:00.000"
remediation = "立即升级 Java Runtime Environment（JRE）至 Sun 发布的最新补丁版本，在 Java 控制面板中删除受影响的 Sun 签名证书并重新导入新根证书，修改 java.security 配置文件将不信任的证书从 trustStore 中移除，并在防火墙或代理层限制未经签名的 Java Applet 下载执行。"
score = 5.1
severity = "MEDIUM"
sources = ["cve"]
title = "Sun Java 代码签名证书泄露漏洞"
updated = "2026-06-16T21:52:40.987"

