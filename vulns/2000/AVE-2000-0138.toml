[basic]
description = "tags.<value>SCO UnixWare 7.1/7.1.1 中的 ARCserve 代理存在符号链接攻击漏洞，本地攻击者可通过创建恶意符号链接指向任意文件，诱导 ARCserve 代理以特权写入或修改目标文件，从而实现任意文件修改。该漏洞影响 SCO UnixWare 7.1 和 7.1.1 版本，CVSS 评分 1.2，属于低危漏洞，攻击需要本地访问权限，利用方式为竞争条件下的符号链接替换。"
published = "2000-02-16T05:00:00.000"
remediation = "该漏洞影响已停止维护的 SCO UnixWare 7.1/7.1.1，官方已不再提供安全更新。建议立即迁移至受支持的操作系统平台（如现代 Linux 发行版）。如无法迁移，可采取以下缓解措施：1) 严格限制本地用户登录权限，仅允许受信任的管理员账户访问系统；2) 确保 /tmp 目录设置粘滞位（chmod 1777 /tmp），防止非属主删除或重命名临时文件；3) 使用文件系统 ACL 限制 ARCserve agent 对 /tmp 的写入范围；4) 监控 /tmp 目录的符号链接创建行为，通过审计日志及时发现异常。"
score = 1.2
severity = "LOW"
sources = ["cve"]
title = "SCO UnixWare ARCserve 代理本地符号链接漏洞"
updated = "2026-06-16T21:51:06.770"

