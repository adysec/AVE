[basic]
description = "Microsoft IIS 4.0 存在输入验证不当导致的拒绝服务漏洞。远程攻击者可通过向目标服务器发送大量包含畸形 HTTP 请求头的报文，触发 IIS 服务进程崩溃，导致网站无法正常响应合法用户请求。该漏洞影响 IIS 4.0 及 Microsoft Commercial Internet System 2.0/2.5、Site Server Commerce Edition 3.0 等产品，CVSS 评分 5.0，危害等级中危。攻击者无需身份认证即可远程利用，但无法实现代码执行或数据窃取。"
published = "1999-08-11T04:00:00.000"
remediation = "立即安装 Microsoft 安全公告 MS99-029 提供的补丁程序，该补丁修复了 IIS 4.0 对畸形 HTTP 请求头处理不当导致的拒绝服务问题。受影响产品包括 IIS 4.0、Site Server 3.0、Site Server 3.0 Commerce Edition 及 Microsoft Commercial Internet System 2.0/2.5。如无法安装补丁，可在网络边界防火墙或 IIS 中配置限制单个 IP 的并发连接数，并监控异常大量 HTTP 请求以缓解攻击。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Microsoft IIS 4.0 HTTP请求畸形标头洪水拒绝服务漏洞"
updated = "2026-06-16T21:49:13.347"

