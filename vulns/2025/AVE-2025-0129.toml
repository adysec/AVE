[basic]
description = "浪潮财务管理系统（Inspur Financial Management System）中的 gspauditwebservice.asmx 接口存在不安全的反序列化漏洞。由于该接口在反序列化用户提交的 SOAP 请求数据时缺乏充分的类型校验与安全过滤，远程未经身份认证的攻击者可构造恶意序列化载荷发送至目标接口，触发服务器执行任意代码。成功利用此漏洞可导致攻击者完全控制目标服务器，进行数据窃取、植入后门等恶意操作，严重威胁企业财务数据安全。受影响的系统版本范围待进一步确认，建议用户尽快联系厂商获取安全更新。"
published = "0714"
remediation = "立即联系浪潮官方获取最新安全补丁，升级浪潮财务管理系统至最新版本。临时缓解措施：在 IIS 管理器中禁用或删除 gspauditwebservice.asmx 文件，或在 Web.config 中移除相关 HTTP 处理程序映射；同时配置防火墙/WAF 限制对 /gspauditwebservice.asmx 路径的访问，仅允许受信任内网 IP 调用。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "浪潮财务管理系统 gspauditwebservice.asmx 反序列化远程代码执行漏洞"
updated = "0714"

