[basic]
description = "Squid 代理服务器在 Red Hat Linux 5.2/6.0 等发行版中默认将 cachemgr.cgi 脚本安装于公开 Web 目录下，且未对访问来源进行有效限制。远程攻击者无需任何身份认证即可利用该 CGI 脚本作为中间代理转发连接请求，从而绕过目标网络的访问控制策略，实现内网探测、隐藏攻击来源或作为跳板对外发起攻击。该漏洞影响范围广泛，仅需目标开放 HTTP 服务即可利用，危害等级高危。"
published = "1999-07-25T04:00:00.000"
remediation = "升级 squid 至 Red Hat RHSA-1999-025 对应修复版本，或将 cachemgr.cgi 移出 Web 公开目录（如 /usr/lib/cgi-bin/）。在 Apache 配置中为 cachemgr.cgi 添加访问控制，仅允许受信管理 IP 访问：<Location /cachemgr.cgi> Order deny,allow; Deny from all; Allow from 192.168.0.0/16 </Location>。如无需远程管理功能，直接删除 cachemgr.cgi 文件。Debian 用户应升级至 DSA-576 对应版本。"
score = 7.5
severity = "HIGH"
sources = ["redhat"]
title = "Squid cachemgr.cgi 未授权代理连接漏洞"
updated = "2026-06-16T21:48:53.680"

