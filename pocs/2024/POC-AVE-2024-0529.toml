[info]
author = "ave"
description = "检测 Apache HTTP Server 2.4.63 及更早版本中 mod_ssl 日志变量转义不足漏洞。通过 TLS 连接发送包含 CRLF 注入的恶意 SNI，验证目标是否运行存在漏洞的 Apache HTTP Server。"
id = "POC-AVE-2024-0529"
name = "Apache HTTP Server mod_ssl Log Injection PoC"
severity = "high"
tags = [
    "cve-2024-47252",
    "apache",
    "mod_ssl",
    "log-injection",
]
vuln_id = [
    "CVE-2024-47252",
    "AVE-2024-0529",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "header"
type = "word"
words = ["Apache"]
