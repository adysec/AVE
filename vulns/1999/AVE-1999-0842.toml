[basic]
description = "War FTP Daemon (WarFTPd) 1.70 存在连接洪水拒绝服务漏洞，远程攻击者无需身份认证即可通过向 FTP 服务发送大量并发连接请求，耗尽服务器连接池与系统资源，导致 FTP 服务崩溃或无法响应正常用户请求。该漏洞影响 WarFTPd 1.70 版本，攻击条件简单，危害等级中等。"
published = "1999-12-13T05:00:00.000"
remediation = "升级至 WarFTPd 1.80 及以上版本（1.80 改进了连接处理机制），或在防火墙层面为 TCP 端口 21 配置连接速率限制（如 iptables 的 connlimit 模块限制单 IP 最大并发连接数）。由于该软件已停止维护，建议迁移至 FileZilla Server 或 vsftpd 等持续维护的 FTP 服务端软件。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Jgaa WarFTPd 1.70 拒绝服务漏洞"
updated = "2026-06-16T21:49:30.130"

