[basic]
description = "Shadow Op Software Dragon Server 1.0/2.0 中的 Telnet 服务存在拒绝服务漏洞，远程攻击者可通过向目标服务器发送超长的用户名字符串触发该漏洞，导致 Telnet 服务崩溃或无法响应正常请求。攻击者无需身份认证即可发起攻击，利用难度较低。该漏洞影响 Dragon Server 1.0 及 2.0 版本，危害等级中等。"
published = "2000-06-16T04:00:00.000"
remediation = "该产品已停止维护，厂商不再提供补丁。建议立即停用 Dragon Server 并迁移至受支持的 Telnet/SSH 服务端软件（如 OpenSSH），同时在网络边界防火墙封禁对 23/TCP 端口的非授权访问作为临时缓解。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Shadow Op Software Dragon Server Telnet 拒绝服务漏洞"
updated = "2026-06-16T21:51:49.493"

