[basic]
description = "Ipswitch WinCOM LPD 1.00.90 版本的 LPD 服务（端口 515）在处理大量 LPD 选项时存在缺陷，远程未认证攻击者可向 LPD 端口发送大量特制的 LPD 选项数据包，导致服务资源耗尽或进程崩溃，引发拒绝服务。该漏洞影响 Ipswitch WinCOM LPD 1.00.90 版本，攻击者无需身份认证即可通过网络远程发起攻击，利用方式为向目标主机 515 端口发送大量畸形或超量的 LPD 选项请求，导致 LPD 服务停止响应或崩溃，造成拒绝服务，CVSS 评分 5.0（中等危害），影响可用性。"
published = "2000-11-14T05:00:00.000"
remediation = "建议立即升级至 Ipswitch WinCOM LPD 最新版本或迁移至现代打印解决方案（如 Progress WhatsUp Gold），若无法升级请在防火墙层面封禁 TCP 515 端口（LPD 端口）禁止外部访问，或在 Windows 服务中禁用 LPD Print Service 服务并重启服务生效。若必须保留打印服务，建议配置防火墙仅允许受信任 IP 访问 515 端口，并部署入侵检测规则监控异常 LPD 选项流量。建议尽快规划迁移至现代打印协议（IPP/IPPS）。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Ipswitch WinCOM LPD 1.00.90 拒绝服务漏洞"
updated = "2026-06-16T21:52:34.460"

