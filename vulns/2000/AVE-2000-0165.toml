[basic]
description = "EZShopper 3.0 的 search.cgi CGI 脚本存在路径遍历和命令注入漏洞，远程攻击者可通过向该脚本提交包含 `..` 的恶意请求读取服务器上的任意文件，或利用 shell 元字符执行任意系统命令。该漏洞影响 EZShopper 3.0 版本，攻击者无需身份认证即可利用，危害等级高，可能导致敏感信息泄露和服务器被完全控制。"
published = "2000-02-27T05:00:00.000"
remediation = "升级 EZShopper 至已修复 search.cgi 输入验证问题的最新版本；如无法升级，在 Web 服务器层禁用或限制 search.cgi 访问权限，并在应用层过滤 `..` 路径遍历序列和 `|;&` 等 shell 元字符，同时实施最小权限原则限制 Web 服务器对文件系统的读取范围。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "EZShopper search.cgi 任意文件读取和远程代码执行漏洞"
updated = "2026-06-16T21:51:11.027"

