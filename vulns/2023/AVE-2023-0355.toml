[basic]
description = "Linux 内核 bnxt_en 网卡驱动中存在缓冲区溢出漏洞，该漏洞位于 bnxt_ethtool_init.c 函数中，测试名称拼接时读取超出首个名称末尾，触发了内核缓冲区溢出检测机制，导致系统崩溃。本地攻击者可利用此漏洞造成拒绝服务。CVSS 评分 5.5，危害等级中等。Linux 内核主线版本已通过重构 hwrm_selftest_qlist_output 结构体为实际数组、并使用 snprintf() 替代 strncat() 的方式修复此漏洞。"
published = "2025-03-27T17:15:50.030"
remediation = '升级 Linux 内核至 5.15.94 及以上版本，或合入 commit 0f4a9a7b 补丁。如无法立即升级，可通过内核模块黑名单禁用 bnxt_en 模块：echo "blacklist bnxt_en" > /etc/modprobe.d/blacklist-bnxt.conf，重启后临时规避风险。'
score = 5.5
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux kernel bnxt 驱动缓冲区溢出漏洞"
updated = "2026-06-17T06:44:06.693"

