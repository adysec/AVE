[basic]
description = 'Macromedia 公司开发的 "The Matrix" 屏幕保护程序在 Windows 95 系统中存在安全绕过漏洞。当系统启用了"密码保护"选项后，具有物理访问权限的攻击者只需按下键盘上的 ESC（Escape）键即可绕过密码验证界面，直接进入系统桌面。该漏洞利用方式简单，无需任何工具或特殊技能，攻击者仅需物理接触目标计算机即可完成绕过。严重影响受感染系统的机密性和完整性。'
published = "1999-10-04T04:00:00.000"
remediation = '建议卸载 "The Matrix" 屏幕保护程序，改用 Windows 自带的密码保护屏保。如必须使用，请勿启用其密码保护功能，改为通过系统级安全措施（如 BIOS 开机密码、屏幕自动锁定）限制物理访问。长期方案是升级至受支持的操作系统（如 Windows 10/11），Windows 95 已停止安全更新多年。'
score = 4.6
severity = "MEDIUM"
sources = ["avd"]
title = "Macromedia The Matrix 屏幕保护程序安全绕过漏洞"
updated = "2026-06-16T21:50:28.500"

