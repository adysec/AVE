[basic]
description = "IBM HomePagePrint 1.0.7 是日本版 Windows 98（Windows98J）平台上的网页打印软件，其在解析 HTML 页面 IMG 标签的 SRC 属性时存在缓冲区溢出漏洞，未对输入长度进行边界校验。未经身份认证的远程攻击者可构造包含超长 IMG_SRC 属性值的恶意网页，诱导受害者使用 HomePagePrint 浏览该页面，触发溢出并以查看者系统权限执行任意代码，从而完全控制受害主机。该漏洞影响安装 IBM HomePagePrint 1.0.7 for Windows98J 的系统，攻击条件仅需受害者访问恶意网页，利用门槛低、危害较大。"
published = "1999-11-02T05:00:00.000"
remediation = "建议立即升级 IBM HomePagePrint 至修复该缓冲区溢出问题的后续版本（1.0.7 之后的官方更新版），并卸载不再使用的旧版插件。如无法立即升级，可在浏览器中禁用或移除 HomePagePrint 插件/ActiveX 控件，避免访问不可信网页，同时在网络边界限制外部 Web 内容加载，作为临时缓解措施。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
