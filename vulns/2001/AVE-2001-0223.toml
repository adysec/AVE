[basic]
description = "GnuPG（gpg）1.0.4 及之前版本在从公钥服务器导入密钥时，未区分公钥和私钥，也未向用户提示存在私钥导入的情况。攻击者可在公钥服务器上发布包含恶意私钥的密钥包，当用户执行密钥导入操作时，私钥被静默导入本地密钥环，从而破坏 OpenPGP 信任链模型。该漏洞攻击复杂度低，无需身份认证，远程即可实施，影响所有使用 GnuPG 进行密钥管理的用户。"
published = "2001-02-12T05:00:00.000"
remediation = "升级 GnuPG 至 1.0.5 或更高版本（当前最新稳定版为 2.4.x），该漏洞已在 1.0.5 中修复，导入密钥时会提示用户注意私钥。如无法升级，使用 `gpg --import --import-options import-clean` 导入密钥，并在导入后执行 `gpg --list-secret-keys` 检查是否有意外私钥被导入，及时删除。避免从不可信的公开密钥服务器直接导入密钥包。"
score = 5
severity = "MEDIUM"
sources = ["redhat"]
title = "GNU GnuPG 从公钥服务器导入私钥未通知用户导致信任链破坏漏洞"
updated = "2026-06-16T21:53:36.220"

