[basic]
description = "Apache Struts2 存在OGNL表达式注入漏洞（S2-016），远程攻击者无需身份认证即可通过向HTTP请求中构造带有action:、redirect:或redirectAction:前缀的恶意参数，触发Struts2框架对参数值进行OGNL表达式解析，从而在目标服务器上执行任意系统命令。该漏洞影响Struts2 2.0.0至2.3.15版本，CVSS评分9.8，危害等级严重，攻击复杂度低，可导致服务器完全沦陷。"
published = "2013-07-20T03:37:30.737"
remediation = "立即升级 Apache Struts 至 2.3.15.1 或更高版本，该版本已修复 DefaultActionMapper 对 action:/redirect:/redirectAction: 前缀参数处理不当导致的 OGNL 表达式注入问题。如无法升级，可部署 WAF 规则拦截包含 action:、redirect:、redirectAction: 前缀的请求参数作为临时缓解措施。"
score = 9.8
severity = "CRITICAL"
sources = ["kev"]
title = "Apache Struts2 远程命令执行漏洞（S2-016）"
updated = "2026-06-16T23:53:01.530"

