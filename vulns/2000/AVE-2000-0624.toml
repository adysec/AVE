[basic]
description = "PGP Certificate Server 2.5.0 和 2.5.1 版本的命令端口（端口 4000）存在拒绝服务漏洞。当远程攻击者的主机名没有反向 DNS 解析记录，且连接到服务器的 4000 端口时，会导致服务器拒绝服务。该漏洞源于服务器在处理无反向 DNS 解析的连接请求时未正确处理异常情况，导致服务停止响应。攻击条件为：攻击者控制的主机无 PTR 记录，且能直接连接目标服务器的 4000 端口。利用方式简单，攻击者只需确保攻击主机无反向 DNS 记录，然后向目标服务器 4000 端口发起连接即可触发拒绝服务。影响范围限于 PGP Certificate Server 2.5.0 和 2.5.1 版本，CVSS 评分 5.0（中等），仅影响可用性，不影响机密性和完整性。"
published = "2000-06-14T04:00:00.000"
remediation = "建议立即升级 PGP Certificate Server 到 2.5.2 或更高版本以修复此拒绝服务漏洞。若暂时无法升级，请在防火墙配置规则限制仅允许具有有效反向 DNS 解析记录的主机访问服务器的 4000 端口，同时在 DNS 服务器配置所有合法客户端的 PTR 记录以确保反向解析正常工作，作为临时缓解措施降低被拒绝服务攻击的风险。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "PGP Certificate Server 2.5.0/2.5.1 反向 DNS 条目拒绝服务漏洞"
updated = "2026-06-16T21:51:57.777"

