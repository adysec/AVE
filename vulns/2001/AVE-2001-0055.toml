[basic]
description = "SSH 1.2.x 协议实现的 CRC-32 补偿攻击检测器中存在整数溢出漏洞，远程攻击者可在未授权情况下向 SSH 服务器或客户端发送特制的数据包触发此漏洞，利用 CRC-32 检测机制的整数回绕缺陷绕过安全检测，最终实现在目标系统上远程执行任意代码。该漏洞影响所有使用 SSH 1.x 协议版本的实现，危害评级严重。"
published = "2001-03-12T05:00:00.000"
remediation = "立即升级至 SSH-2.0 或更新版本，SSH-1.2.x 协议存在 CRC-32 补偿攻击整数溢出漏洞。如无法升级，在服务端配置中禁用 SSH1 协议支持（Protocol 2），并替换为 OpenSSH（3.0+ 版本已完全移除 SSH1 兼容性代码）。"
score = 10
severity = "CRITICAL"
sources = ["exploitdb"]
title = "SSH 1.2.x CRC-32 补偿攻击检测器整数溢出远程代码执行漏洞"
