[basic]
description = "Mobius DocumentDirect for the Internet 1.2 的 ddicgi.exe 组件存在缓冲区溢出漏洞，远程攻击者可通过向目标 HTTP 服务发送特制请求，在 User-Agent 参数中提交超长字符串触发栈溢出，从而在服务器端执行任意命令。该漏洞 CVSS 评分 10.0，危害等级严重，且已有公开的 ExploitDB 利用代码，攻击门槛极低。"
published = "2000-11-14T05:00:00.000"
remediation = "Mobius DocumentDirect for the Internet 1.2 已停止维护，建议立即升级到厂商提供的最新版本或迁移至替代产品。临时缓解措施：在 IIS 或反向代理层配置 URL Scan 规则，过滤长度超过 256 字节的 User-Agent 请求头；或在防火墙侧限制对 ddicgi.exe 的匿名外网访问。"
score = 10
severity = "CRITICAL"
sources = ["exploitdb"]
title = "Mobius DocumentDirect for the Internet 远程缓冲区溢出漏洞"
updated = "2026-06-16T21:52:33.107"

