[basic]
description = "KDE 桌面环境中的 kscd（CD 播放器）程序存在权限提升漏洞。该程序在执行用户 SHELL 环境变量中指定的程序时，未正确丢弃其特权（setuid 权限），导致本地用户可通过将 SHELL 环境变量设置为恶意程序来获取提升后的权限。攻击者只需拥有本地系统访问权限，即可利用此漏洞以 kscd 程序的权限执行任意代码，实现本地权限提升。该漏洞影响 KDE 1.1、1.1.1、1.2 及 2.0 版本，CVSS 评分 7.2，危害等级高。"
published = "2000-05-16T04:00:00.000"
remediation = "升级 KDE 至 2.1 及以上版本，或移除 kscd 二进制文件的 setuid 特权位（chmod u-s /usr/bin/kscd）。如无法升级，可通过在 /etc/profile 中过滤 SHELL 环境变量或限制 kscd 仅允许受信任用户执行来缓解。"
score = 7.2
severity = "HIGH"
sources = ["exploitdb"]
title = "KDE kscd SHELL 环境变量未丢弃特权导致本地权限提升漏洞"
updated = "2026-06-16T21:51:37.347"

