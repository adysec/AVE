[basic]
description = "Miva htmlscript 2.x 的 CGI 程序存在目录遍历漏洞，远程攻击者无需身份认证即可通过向目标系统发送特制的 HTTP 请求（包含如 `../../` 等路径遍历序列）绕过访问限制，读取 Web 服务器上的任意文件。该漏洞可能导致敏感配置文件、系统密码文件等泄露，影响运行 Miva htmlscript 2.x 的 Web 服务器，CVSS 评分 5.0，危害等级中危。"
published = "1998-01-27T05:00:00.000"
remediation = '升级 Miva htmlscript 至 3.x 或更高版本，该版本已修复路径遍历问题。如无法升级，在 Web 服务器层配置 URL 重写规则，拦截包含 `../` 或 `..\\` 的请求路径；同时对用户输入的 filename 参数做白名单校验，仅允许访问指定目录下的文件。'
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Miva htmlscript CGI 目录遍历漏洞"
updated = "2026-06-16T21:48:01.847"

