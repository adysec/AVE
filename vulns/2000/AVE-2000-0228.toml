[basic]
description = "Dansie Shopping Cart 应用的 cart.pl 脚本存在远程命令执行漏洞，攻击者可通过在 Web 表单变量中注入 Shell 元字符（如反引号、管道符、分号、&& 等），将恶意系统命令嵌入表单输入。当应用程序未对用户提交的数据进行充分过滤与转义时，这些命令将在服务器端被 shell 执行。该漏洞影响部署了 Dansie Shopping Cart 的 Web 站点，攻击者无需身份认证即可远程利用，可导致服务器敏感信息泄露、网站内容被篡改甚至服务器被完全控制。"
published = "2000-04-11"
remediation = "升级到修复了该漏洞的 Dansie Shopping Cart 新版本；若无法立即升级，应在 cart.pl 中对所有表单变量使用严格的输入校验与转义（如过滤分号、管道符、反引号等 Shell 元字符），避免将用户输入直接传入 system、exec 等函数；同时在 Web 服务器（如 Apache）配置中禁用 CGI 脚本的危险命令执行能力，并部署 Web 应用防火墙拦截包含 Shell 元字符的恶意请求作为临时缓解措施。"
score = 5.0
severity = "MEDIUM"
sources = ["cve"]
title = "Dansie 购物车 cart.pl 远程命令执行漏洞"
updated = "2026-07-19"

