[basic]
description = "Knox Software Arkeia 4.0 备份产品中的 nlservd 和 rnavc 组件存在缓冲区溢出漏洞。本地攻击者可通过向 HOME 环境变量传入超长字符串触发缓冲区溢出，成功利用后可获取系统 root 权限。该漏洞影响 Arkeia 4.0 版本，攻击者需拥有本地系统访问权限，CVSS 评分 7.2，危害等级高。"
published = "1999-09-23T04:00:00.000"
remediation = "建议升级至 Arkeia 4.0 以上修复版本，或限制仅授权用户可登录系统。临时缓解措施：以 root 执行 `chmod 0755 /path/to/nlservd /path/to/rnavc` 移除 setuid 位，防止普通用户通过长 HOME 环境变量触发缓冲区溢出提权。严格限制本地用户登录权限亦可降低风险。"
score = 7.2
severity = "HIGH"
sources = ["epss"]
title = "Knox Software Arkeia 本地缓冲区溢出漏洞"
updated = "2026-06-16T21:50:38.923"

