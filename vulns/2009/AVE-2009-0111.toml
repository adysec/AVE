[basic]
description = "Adobe Reader 和 Acrobat 的 Multimedia.api 组件中 Doc.media.newPlayer 方法存在释放后使用（Use-After-Free）漏洞。攻击者可通过构造特制的 ZLib 压缩流 PDF 文件，诱使用户打开后触发该漏洞，导致远程代码执行。该漏洞影响 Windows 和 Mac OS X 平台上的 Adobe Reader/Acrobat 9.3 之前版本及 8.2 之前版本，CVSS 评分 7.8，危害等级高。该漏洞已在 2009 年 12 月被野外利用。"
published = "2009-12-15T02:30:00.217"
remediation = '升级 Adobe Reader/Acrobat 至 9.3 及以上版本（Windows/Mac OS X），8.x 分支升级至 8.2 及以上版本。如暂时无法升级，可在 PDF 阅读器中禁用 JavaScript（编辑→首选项→JavaScript→取消勾选"启用 Acrobat JavaScript"），并配置组策略阻止 PDF 文件中 ZLib 压缩流的自动解析。同时建议使用沙箱模式或替代 PDF 阅读器作为临时缓解措施。'
score = 7.8
severity = "HIGH"
sources = ["kev"]
title = "Adobe Reader 和 Acrobat 释放后使用远程代码执行漏洞"
updated = "2026-06-16T23:13:26.803"

