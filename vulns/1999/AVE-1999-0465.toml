[basic]
description = "Excite for Web Servers（EWS）存在命令注入漏洞，远程攻击者可通过向服务提交包含 shell 元字符（如管道符、分号）的恶意请求，在服务进程中执行任意操作系统命令。该漏洞源于 EWS 对用户输入过滤不严，未正确处理 shell 特殊字符，导致攻击者可远程控制目标服务器。CVSS 评分 7.5，危害等级高。"
published = "1998-01-01T05:00:00.000"
remediation = "Excite for Web Servers (EWS) 已停止维护多年，无官方补丁。建议立即迁移至现代 Web 服务器（如 Apache/Nginx）替代 EWS。如无法立即迁移，在反向代理层过滤用户输入中的 shell 元字符（; | ` $ &）、严格限制 CGI 参数、并对 Web 服务目录实施最小权限访问控制。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "Excite Excite for Web Servers 远程命令执行漏洞"
updated = "2026-06-16T21:48:03.717"

