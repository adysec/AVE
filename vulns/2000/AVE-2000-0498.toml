[basic]
description = "Texas Imperial Software WFTPD 2.41 及之前版本在处理 MLST 命令时存在空指针引用缺陷。未经认证的远程攻击者可在未登录 FTP 服务器的情况下直接发送特制的 MLST 命令，导致服务器进程崩溃，造成拒绝服务。该漏洞影响 WFTPD 2.4.1、2.4.1 RC11、2.34、2.40 等多个版本，攻击复杂度低，无需任何身份认证即可触发。"
published = "2000-07-21T04:00:00.000"
remediation = "将 WFTPD 升级至 2.42 或更高版本，厂商已修复 MLST 命令未经验证即可执行的问题，要求用户完成登录认证后方可处理 MLST 指令。若无法升级，可在防火墙上限制 TCP 端口 21 仅允许受信任 IP 段访问，同时在 WFTPD 配置中启用 IP 访问控制列表，作为临时缓解措施。长期建议迁移至仍在维护的 FTP 服务器软件。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Texas Imperial Software WFTPD MLST命令拒绝服务漏洞"
updated = "2026-06-16T21:52:11.020"

