[basic]
description = "杭州九麒科技 BigAnt-Admin 后台管理系统存在任意文件读取漏洞。系统在文件读取接口中对用户传入的路径参数缺乏充分过滤与校验，导致未授权远程攻击者可通过构造包含 ../ 等路径遍历序列的 HTTP 请求，读取服务器上任意文件，如配置文件、数据库凭证、源码等敏感信息。该漏洞可导致服务器敏感数据泄露，为后续攻击提供信息支撑。"
published = "0719"
remediation = "立即升级至最新版本 BigAnt Server，并通过其管理界面禁用受影响的的文件访问功能。如无法立即更新，建议在防火墙中加入IP白名单限制管理后台访问，并定期审计重要系统文件的权限设置。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "杭州九麒科技 BigAnt-Admin 任意文件读取漏洞"
updated = "0719"

