[basic]
description = "Microsoft Internet Explorer、Outlook Express和Windows Explorer所使用的HTML库中存在缓冲区溢出漏洞。攻击者可通过res:本地资源协议向受影响组件发送特制请求，触发缓冲区溢出，从而在目标系统上以当前用户权限执行任意代码。该漏洞无需用户交互即可远程利用，危害严重。"
published = "1997-11-01"
remediation = "安装微软官方安全更新，升级Internet Explorer至修复版本。由于该漏洞年代久远，建议升级至不再使用受影响组件的现代操作系统版本，并避免在受影响的旧系统上打开不可信链接。"
score = 10
severity = "CRITICAL"
sources = [
    "cve",
    "avd",
]
title = "Microsoft Internet Explorer Outlook Express Windows Explorer res: 协议本地资源缓冲区溢出漏洞"
