[basic]
description = "QMail 1.0.3 存在拒绝服务漏洞，远程攻击者可通过 SMTP RCPT 命令指定大量收件人地址，导致邮件服务器处理过程中消耗过多系统资源，造成服务响应缓慢或崩溃。该漏洞影响 QMail 1.0.3 版本，无需身份认证即可利用，攻击门槛低。厂商至今未发布官方补丁。"
published = "1997-06-01T04:00:00.000"
remediation = "升级 QMail 至 1.03 及以上版本，该版本修复了 RCPT 命令大量收件人导致的拒绝服务问题；若无升级条件，可在 SMTP 代理层限制单次会话 RCPT TO 命令数量不超过 100 个，并在 qmail-smtpd 前添加 tcpserver 的并发连接限制（如 `tcpserver -c 50`）。"
score = 2.1
severity = "LOW"
sources = ["epss"]
title = "Dan Bernstein QMail RCPT 拒绝服务漏洞"
updated = "2026-06-16T21:47:41.470"

