[basic]
description = "微软 Internet Explorer 4/5 随附的 Active Setup ActiveX 控件（asctrls.ocx）存在设计缺陷，允许在未对本地未签名 CAB 文件做充分校验的情况下安装并执行其中内容。攻击者可将恶意 CAB 伪装成无图片等附件随 HTML 邮件发送，邮件客户端（如 Outlook Express）预览时将附件落盘到可预测的临时目录，邮件内嵌 VBScript 再调用该 ActiveX 控件加载并执行 CAB 中的可执行程序，从而在用户机器上实现远程代码执行。攻击条件包括使用允许 HTML 邮件脚本的邮件客户端、ActiveX 可运行，以及临时文件路径可预测；影响信息机密性、完整性与可用性。"
published = "1999-11-11"
remediation = "安装微软安全公告 MS99-048 对应更新（知识库文章 KB244540），或将 Internet Explorer 升级到已修复的更高版本；将 Internet 区域安全级别设为高以禁用或限制 ActiveX，避免使用会自动运行 HTML 邮件脚本的邮件客户端，并勿打开来源不明的附件。"
score = 5.1
severity = "MEDIUM"
sources = [
    "exploitdb",
    "cve",
]
title = "微软 Internet Explorer 4.x/5 及 Outlook 2000/98/Express 4.x ActiveX CAB 文件远程代码执行漏洞"
updated = "2026-06-16"

