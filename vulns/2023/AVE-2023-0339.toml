[basic]
description = "OpenIDC/cjose 库在 AES GCM 解密时错误地使用了 JWE 中实际提供的认证标签长度，而非规范要求的固定 16 字节长度。攻击者可通过提供截断的认证标签并相应修改 JWE 载荷触发该漏洞，导致数据完整性校验被绕过。该漏洞影响所有使用 AES GCM 加密算法的 cjose 版本，CVSS 评分 8.6，危害等级高。用户需升级至 0.6.2.2 及以上版本修复。"
published = "2023-07-14T21:15:08.903"
remediation = "升级 cjose 至 >=0.6.2.2 版本。无法升级时，在应用配置中将加密算法从 AES GCM 切换到 AES CBC，禁用 GCM 模式使用。"
score = 8.6
severity = "HIGH"
sources = ["msrc"]
title = "OpenIDC cjose AES GCM 解密身份验证标签长度不正确漏洞"
updated = "2026-06-17T06:08:16.283"

