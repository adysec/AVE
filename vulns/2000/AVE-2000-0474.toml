[basic]
description = "Allmanage 网站管理软件 2.6 版本中的 allmanageup.pl 文件上传 CGI 脚本存在未授权访问漏洞。远程攻击者无需身份认证即可直接调用该脚本，通过构造恶意请求上传或覆盖文件，从而修改用户账户信息或篡改网页内容。该漏洞利用难度低，无需特殊权限，可导致机密性、完整性和可用性部分受损，CVSS 评分 7.5，危害等级高。"
published = "2000-05-13T04:00:00.000"
remediation = "立即删除或重命名服务器上的 `allmanageup.pl` 脚本文件，阻止远程直接调用。在 Web 服务器（Apache/Nginx）配置中对该脚本路径添加 IP 白名单或 HTTP 基本认证。如厂商已发布新版本，升级至 Allmanage 2.6 以上安全版本；若无法升级，建议迁移至其他受支持的网站管理软件。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "Allmanage Allmanage Website 任意文件上传漏洞"
updated = "2026-06-16T21:51:43.620"

