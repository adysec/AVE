[basic]
description = "Yamaha MidiPlug 1.1 b-j 版本在处理 EMBED 标签中的 Text 变量时存在缓冲区溢出漏洞。攻击者可通过向用户发送嵌入了恶意 Text 参数的 MIDI 文件链接，诱使用户在浏览器中打开触发该漏洞，导致拒绝服务或任意代码执行。该漏洞影响 Yamaha MidiPlug 1.1 b-j 及更早版本，CVSS 评分 5.1，危害等级中等。"
published = "1999-11-02T05:00:00.000"
remediation = "立即禁用或卸载 Yamaha MidiPlug 1.10b-j 插件：在 Internet Explorer 中进入「工具」→「Internet 选项」→「程序」→「管理加载项」，找到 YAMAHA MidiPlug 并设为禁用；同时在浏览器安全设置中取消勾选「运行 ActiveX 控件和插件」。由于该插件已于 1999 年停止维护，不存在修复版本，建议彻底移除并使用替代 MIDI 播放方案。作为临时缓解措施，将 Internet 区域安全级别设为「高」以阻止未签名插件自动加载。"
score = 5.1
severity = "MEDIUM"
sources = ["avd"]
title = "Yamaha MidiPlug 缓冲区溢出漏洞"
updated = "2026-06-16T21:49:23.023"

