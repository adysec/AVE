[info]
author = "ave"
description = "检测目标是否为受影响的 Netscape Enterprise Server 3.6 SP2/4.0 或 FastTrack Server 2.0.1，通过 Server 响应头识别版本。该版本存在远程缓冲区溢出漏洞(CVE-1999-0744)，发送超长 HTTP GET 请求(>4080字符)可触发服务崩溃甚至任意代码执行。"
id = "POC-AVE-1999-0365"
name = "Netscape Enterprise Server Remote Buffer Overflow PoC"
severity = "high"
tags = ["ave-1999-0365"]
vuln_id = [
    "CVE-1999-0744",
    "AVE-1999-0365",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "header"
type = "word"
words = [
    "Netscape-Enterprise",
    "Netscape-FastTrack",
]
