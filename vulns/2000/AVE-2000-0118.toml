[basic]
description = "War FTPd 1.66及1.67-3版本中存在缓冲区溢出漏洞。远程攻击者可通过向FTP服务器发送超长的MKD（创建目录）和CWD（切换目录）命令，触发缓冲区溢出，导致服务进程崩溃，造成拒绝服务。该漏洞利用简单，无需身份认证即可远程触发，影响运行War FTPd 1.6x系列版本的系统。"
published = "2000-02-01T05:00:00.000"
remediation = "升级 War FTPd 至 1.67-4 或更高版本，该版本修复了 CWD/MKD 命令缓冲区溢出问题。如无法升级，可限制 FTP 用户的目录创建与切换操作权限，并在防火墙规则中限制对 FTP 服务 (默认端口 21) 的访问来源。建议迁移至现代维护的 FTP 服务器软件（如 FileZilla Server）替代已停止更新的 WarFTPd。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Jgaa WarFTPd 缓冲区溢出拒绝服务漏洞"
updated = "2026-06-16T21:51:03.917"

