[basic]
description = "Gossamer Threads DBMan 2.0.4 的 db.cgi CGI 脚本存在信息泄露漏洞。远程攻击者可通过在 db 参数中引用一个不存在的数据库名称，触发脚本返回环境变量及配置信息等敏感数据，导致系统信息泄露。该漏洞攻击复杂度低，无需身份认证即可远程利用，CVSS 评分 6.4，危害等级中危。攻击者利用泄露的信息可进一步探测目标系统环境，为后续攻击提供情报支撑。"
published = "2000-05-05T04:00:00.000"
remediation = "升级 Gossamer Threads DBMan 至 2.0.5 或更高版本，该版本已修复 db.cgi 对无效 db 参数返回环境变量和配置信息的问题。如无法升级，修改 db.cgi 脚本，在查询参数中 db 值对应的数据库不存在时仅返回通用错误页面而非调试信息，同时在 Web 服务器层限制对 db.cgi 的访问来源 IP。"
score = 6.4
severity = "MEDIUM"
sources = ["avd"]
title = "Gossamer Threads DBMan 信息泄露漏洞"
updated = "2026-06-16T21:51:35.887"

