[basic]
description = "Creative Solutions 开发的 Creative Contact Form（前身为 Sexy Contact Form）WordPress 插件 1.0.0 之前版本及 Joomla! 组件 2.0.1 之前版本中集成的 jQuery File Upload Plugin 6.4.4 存在危险类型文件无限制上传漏洞。该漏洞源于 server/php/UploadHandler.php 未对上传文件的扩展名进行有效过滤，允许远程未认证攻击者直接上传包含 .php 扩展名的恶意文件，随后通过直接访问 files/ 目录下的该文件即可实现任意代码执行。该漏洞已在 2014 年 10 月被野外利用，影响范围广泛，危害严重。"
published = "2020-02-08T18:15:11.383"
remediation = "立即将 WordPress 版 Creative Contact Form 升级至 1.0.0 及以上版本，Joomla! 版升级至 2.0.1 及以上版本。同时限制上传目录的 PHP 执行权限，在 web 服务器配置中禁止 files/ 目录解析 PHP 文件，并移除服务器端未使用的文件上传处理脚本 UploadHandler.php。"
score = 9.8
severity = "CRITICAL"
sources = ["nuclei"]
title = "Creative Solutions Creative Contact Form 任意文件上传漏洞"
updated = "2026-06-17T00:17:15.220"

