[basic]
description = "CVE-1999-0656 涉及 Linux 内核的 ugidd RPC 接口。该接口在设计上允许远程攻击者通过指定任意的 UID，由 ugidd 服务将其映射为本地的用户和组名称，从而枚举出系统中有效的用户名。其影响范围为运行了 ugidd RPC 服务的 Linux 系统，攻击条件为攻击者能够与目标主机的 ugidd RPC 服务建立网络连接，无需身份认证即可发起请求。利用方式上，攻击者持续提交不同的 UID 值，根据服务返回的本地用户名判断该 UID 是否对应真实账户，进而收集用户清单，为后续定向攻击提供情报。"
published = "1999-01-01T05:00:00.000"
remediation = "禁用 ugidd RPC 服务：在 /etc/inetd.conf 或 systemd 中注释掉 ugidd 相关条目并重启服务；若使用 NFS，改用更安全的 rpc.idmapd 并升级到修复该问题的内核版本（2.2.x 以上）。同时在边界防火墙屏蔽 111 端口（portmapper）及 ugidd 所用端口，禁止不可信网络访问 RPC 服务作为缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Linux Kernel ugidd RPC 用户信息枚举漏洞"
updated = "2026-06-16T21:48:47.460"

