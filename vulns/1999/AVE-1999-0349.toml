[basic]
description = "Novell NetWare Web Server 2.x 的 convert.bas CGI 程序存在任意文件读取漏洞。远程攻击者无需身份认证，通过向目标服务器发送特制 HTTP 请求，利用 convert.bas 程序可实现读取 Web 服务器内部可访问的任意文件，包括系统配置文件和敏感数据，导致敏感信息泄露。该漏洞影响 Novell NetWare Web Server 2.x 版本，CVSS 评分 5.0，危害等级中危，属于典型的 CGI 程序输入验证不严导致的路径遍历漏洞，利用方式简单且易于实现。"
published = "1996-07-01T04:00:00.000"
remediation = "删除 Web 服务器上的 convert.bas 脚本或移除其执行权限；在 NetWare 服务器上使用 FILTER 或 RCONSOLE 限制对 Web Server CGI 目录的访问；升级至 NetWare 6.5 SP8 以上版本（如仍受支持）；建议迁移至受支持的现代操作系统平台（如 SUSE Linux Enterprise Server），彻底规避遗留系统风险。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Novell NetWare Web Server 2.x 任意文件读取漏洞"
updated = "2026-06-16T21:47:45.673"

