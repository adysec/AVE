[basic]
description = "Corel Word Perfect 8 for Linux 在运行时创建的临时工作目录权限设置为全局可写，本地攻击者可通过以下两种方式利用该漏洞：一是修改工作目录中的文件，从而改变 Word Perfect 的正常运行行为；二是利用符号链接攻击（symlink attack）操控其他用户的临时文件，导致文件被篡改或信息泄露。该漏洞攻击复杂度低，但需要本地访问权限，影响 Corel Word Perfect 8 for Linux 版本，CVSS 评分 2.1，危害等级低。"
published = "1998-12-18T05:00:00.000"
remediation = "避免以 root 用户安装或运行 Corel WordPerfect 8 for Linux，应使用普通用户执行安装。安装后手动将 /tmp/wpc-<hostname> 目录权限改为 700，并删除目录内所有全局可写文件。如非必要，建议停止使用该版本或迁移至替代办公软件。"
score = 2.1
severity = "LOW"
sources = ["epss"]
title = "Corel Word Perfect for Linux 本地信息修改漏洞"
updated = "2026-06-16T21:49:52.520"

