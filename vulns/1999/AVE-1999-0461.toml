[basic]
description = "Windows NT 4.0 DNS 服务在处理 DNS 查询请求时存在输入验证缺陷，远程攻击者无需认证即可向目标系统的 UDP 53 端口发送大量超长字符串，导致 DNS 服务消耗过多系统资源而崩溃，造成拒绝服务。该漏洞仅需网络可达即可触发，攻击复杂度低，影响所有 Windows NT 4.0 系统。"
published = "1997-06-10T04:00:00.000"
remediation = "安装 Windows NT 4.0 Service Pack 4（SP4）或更高版本服务包，该更新包含 DNS 服务器端口 53 洪泛攻击的修复。如无法立即安装补丁，可在防火墙上限制仅允许可信 DNS 客户端访问 UDP/TCP 53 端口作为临时缓解措施。建议升级至受支持的 Windows Server 版本（如 Windows 2000 Server 及以上），其 DNS 服务具备更强的抗洪泛能力。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Microsoft Windows NT 4.0 DNS Server 拒绝服务漏洞"
updated = "2026-06-16T21:48:03.227"

