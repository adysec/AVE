[basic]
description = "IRIX 6.2 及 6.3 系统中的 gr_osview 工具存在缓冲区溢出漏洞，由于程序未对用户通过 -D 选项传入的超长参数进行长度校验，导致栈缓冲区溢出。本地攻击者无需任何认证即可利用该漏洞，通过精心构造的超长参数触发溢出，覆盖返回地址，从而获取 root 权限。该漏洞影响 SGI IRIX 6.2 和 6.3 版本，CVSS 评分 7.2，危害等级高。目前已存在公开的本地利用代码。"
published = "2000-10-20T04:00:00.000"
remediation = "立即应用 SGI 安全公告 20040104-01-P 提供的补丁，升级 gr_osview 至修复版本。如无法升级，可移除 /usr/sbin/gr_osview 的 setuid root 权限（chmod u-s /usr/sbin/gr_osview），限制本地非授权用户通过 -D 参数触发缓冲区溢出提权。"
score = 7.2
severity = "HIGH"
sources = ["cve"]
title = "SGI IRIX gr_osview 本地缓冲区溢出漏洞"
updated = "2026-06-16T21:52:30.063"

