[basic]
description = "华盛顿大学（University of Washington）IMAP 软件包中随附的 pop-2d POP2 守护进程（pop2d 4.4 版本）存在缓冲区溢出漏洞。该守护进程在处理客户端发来的 FOLD 命令时，未对用户输入的长度进行边界校验，便将参数拷贝至固定大小的栈缓冲区，导致缓冲区被越界写入。未经过身份认证的远程攻击者只需向目标主机的 POP2 服务端口（TCP 109）建立连接并发送特制的超长 FOLD 命令，即可覆盖返回地址并执行任意代码，从而以 pop2d 进程权限（通常为 root）实现提权或完全控制受影响系统。该漏洞影响运行华盛顿大学 IMAP 4.4 包且启用 pop2d 服务的类 Unix 服务器，CVSS 评分高达 10.0，危害等级为严重。管理员应及时升级 IMAP 软件包或停用存在缺陷的 pop2d 服务以消除风险。"
published = "1999-05-26T04:00:00.000"
remediation = "建议升级至 University of Washington IMAP 4.5 或更高版本以修复 pop2d 中的缓冲区溢出漏洞，该漏洞允许远程攻击者通过 FOLD 命令获取系统权限。如暂无法立即升级，可暂时禁用或卸载 pop2d 服务进程作为缓解措施，同时在防火墙层面限制对 POP2 端口（端口 109）的远程访问。"
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "华盛顿大学 pop2d 远程缓冲区溢出漏洞"
updated = "2026-06-16T21:49:19.893"

