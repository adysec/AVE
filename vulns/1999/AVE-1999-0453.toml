[basic]
description = "Netscape Enterprise Server 3.6 及更早版本在处理 SSL 握手过程中存在缓冲区溢出漏洞，远程攻击者无需身份认证即可通过向目标服务器发送特制的 SSL 握手请求触发该漏洞，导致服务器进程崩溃，造成拒绝服务。该漏洞影响 Netscape Enterprise Server 3.6 版本，CVSS 评分 5.0，危害等级中等。厂商已停止支持该产品，建议用户迁移至其他受支持的 Web 服务器。"
published = "1999-07-06T04:00:00.000"
remediation = "Netscape Enterprise Server 已于 2000 年代停止维护，官方不再提供安全更新。建议立即迁移至受支持的 Web 服务器（如 Apache HTTP Server、Nginx 或 IIS），并禁用旧版 SSL/TLS 协议。临时缓解措施可在网络防火墙或反向代理层面过滤畸形 SSL 握手请求，限制源 IP 访问范围。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Netscape Enterprise Server SSL Handshake 拒绝服务漏洞"
updated = "2026-06-16T21:48:58.993"

