[basic]
description = "目标系统上运行着不必要的 discard 网络服务（TCP/UDP 9 端口），该服务依据 RFC 863 定义仅接收并丢弃所有传入数据，本身不具备实际业务功能。该漏洞影响运行 inetd 或 xinetd 的类 Unix/Linux 系统，以及任何意外开放 9 端口的网络设备。攻击条件为攻击者能够通过网络访问目标主机的 9 端口且该服务处于监听状态。攻击者可利用该开放服务进行网络侦察以确认主机存活及服务运行状态，或在分布式拒绝服务攻击中将其作为 UDP 反射放大节点；当该服务以 root 等高权限运行时，还可被与其他漏洞链式利用，从而实现权限提升。"
published = "1999-01-01T05:00:00.000"
remediation = "在 Windows NT/2000 中通过「控制面板→服务」停止并禁用 Discard（丢弃）服务，将其启动类型设为「已禁用」；同时在边界防火墙和主机 IPsec 策略上屏蔽 TCP/UDP 9 端口的入站流量，仅允许受信任内网访问以缓解暴露风险。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "Microsoft Windows Discard 服务权限提升漏洞"
updated = "2026-06-16T21:48:46.037"

