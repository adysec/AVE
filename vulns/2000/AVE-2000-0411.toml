[basic]
description = "FreeBSD、NetBSD 和 OpenBSD 系统的 setsockopt() 系统调用存在拒绝服务漏洞。本地攻击者可通过 socketpair() 创建大量套接字对，利用 setsockopt() 设置超大缓冲区大小，随后写入大量数据，导致内核资源耗尽，系统无法响应正常服务。该漏洞影响 FreeBSD 5.0、NetBSD 1.4.2 及 OpenBSD 2.7 等版本，CVSS 评分 2.1，危害等级低，攻击需本地权限。"
published = "1999-09-05T04:00:00.000"
remediation = "升级 FreeBSD 至 5.0-RELEASE-p1 及以上版本，NetBSD 升级至 1.5+，OpenBSD 升级至 2.8+。如无法立即升级，可通过 sysctl 调低 `kern.maxfiles` 或通过 `ulimit -n` 限制单个进程的最大文件描述符数量，减小 socketpair 批量创建的攻击面。"
score = 2.1
severity = "LOW"
sources = ["cve"]
title = "FreeBSD NetBSD OpenBSD setsockopt 拒绝服务漏洞"
updated = "2026-06-16T21:51:50.637"

