[basic]
description = 'Microsoft IIS 3.0 的 ASP 功能处理 URL 时存在输入验证缺陷，远程攻击者无需身份认证即可向目标服务器发送包含大量 "/" 字符的恶意 URL 请求至 ASP 页面，触发 IIS 服务进程消耗过多系统资源而导致拒绝服务。该漏洞影响 IIS 3.0 版本，攻击复杂度低，危害等级中等。'
published = "1999-12-31T05:00:00.000"
remediation = "升级至 Microsoft IIS 4.0 或更高版本，该漏洞已在后续版本中修复。如无法升级，可通过 URLScan 工具限制请求路径长度，或配置 IIS 过滤器拦截包含超长路径的 ASP 请求以缓解 DoS 风险。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Microsoft IIS 3.0 ASP 拒绝服务漏洞"
updated = "2026-06-16T21:49:58.883"

