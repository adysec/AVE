[basic]
description = "思科 IOS 11.x/12.x 版本的 HTTP 配置接口存在认证绕过漏洞。攻击者可通过向目标设备的 HTTP 配置服务发送特制请求，无需有效凭据即可获取管理员级别的访问权限，完全控制目标路由器或交换机。该漏洞影响广泛部署的 Cisco IOS 11.x 及 12.x 系列版本，攻击者可借此篡改网络配置、窃取流量或发动进一步攻击。"
published = "2001-07-21"
remediation = "升级 Cisco IOS 至 12.1(5)T 及之后或 12.2(1) 及之后已修复版本。如无需 HTTP 管理功能，通过全局配置命令 `no ip http server` 禁用 HTTP 服务；若需保留 Web 管理，配置 `ip http authentication aaa` 启用 AAA 认证并设置 `ip http access-class` 限制可访问的源 IP 范围，同时建议改用 HTTPS（配置 `ip http secure-server`）替代明文 HTTP。"
score = 5
severity = "MEDIUM"
sources = ["nuclei"]
title = "Cisco IOS HTTP配置任意管理访问漏洞"
updated = "2001-07-21"

