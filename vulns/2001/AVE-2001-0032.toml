[basic]
description = "Technote 2000/2001 的 main.cgi 脚本存在目录遍历漏洞，远程攻击者无需身份认证即可通过在 filename 参数中注入 ../ 序列实现目录跳转，进而读取服务器上的任意文件。该漏洞根源在于程序未对用户输入的路径参数进行过滤和校验，可能导致敏感信息泄露甚至命令执行。受影响版本为 Technote 2000/2001，CVSS 评分 5.0，危害等级中危。"
published = "2001-02-12T05:00:00.000"
remediation = '建议立即升级 Technote 至最新版本或应用厂商提供的安全补丁。若无法升级，在 Web 服务器层（如 Apache/Nginx）配置 WAF 规则，对 main.cgi 的 filename 参数进行路径过滤，禁止包含 "../"、"..\" 等目录遍历序列。同时建议限制 Web 应用运行账户对敏感系统目录的读取权限，并迁移至已维护的替代产品。由于 Technote 已停止维护，长远方案是迁移至仍在安全更新的知识库系统。'
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Technote Technote 2000/2001 main.cgi 目录遍历漏洞"
updated = "2026-06-16T21:53:36.560"

