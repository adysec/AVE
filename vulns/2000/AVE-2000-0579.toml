[basic]
description = "Apache Tomcat 3.1 版本存在路径泄露漏洞，攻击者可通过发送特制 HTTP 请求（如访问不存在的 JSP 文件或触发错误页面）导致服务器在错误响应中返回内部文件系统的绝对路径信息。该漏洞影响 Apache Tomcat 3.1 及早期版本，远程未经身份认证的攻击者即可利用，无需特殊权限。攻击者可利用泄露的路径信息进一步探测目录结构、定位敏感文件或配合其他漏洞实施攻击，属于信息泄露类漏洞，CVSS 评分通常为中等级别（约 5.0 分）。"
published = "2000-10-20"
remediation = "升级到 Apache Tomcat 3.2 或更高版本以修复路径泄露问题。如无法升级，可在 Tomcat 的 web.xml 中禁用目录列表（将 listings 参数设为 false），并通过 Web 应用防火墙（WAF）过滤包含异常路径特征的请求作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Apache Tomcat 3.1 路径显示漏洞"
updated = "2000-10-20"

