[basic]
description = "SVGAlib zgv 3.0-7 及更早版本存在权限泄露漏洞。zgv 是一款基于 SVGAlib 的图像查看工具，在处理子进程时未能正确隔离 iopl(3) 特权级别，导致本地攻击者可通过执行子进程继承父进程的 I/O 特权，从而获取 root 权限。该漏洞影响 Linux 系统上使用 SVGAlib zgv 的环境，攻击者需拥有本地用户权限即可利用，危害等级高。"
published = "1999-02-19T05:00:00.000"
remediation = "升级 SVGAlib zgv 至 3.0-8 或更高版本，该版本修复了 iopl(3) 权限泄漏至子进程的问题。如无法升级，可移除 zgv 软件包或限制本地用户执行 setuid 二进制程序作为临时缓解措施。"
score = 7.2
severity = "HIGH"
sources = ["cve"]
title = "SVGAlib zgv 本地权限提升漏洞"
updated = "2026-06-16T21:50:32.183"

