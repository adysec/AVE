[basic]
description = "Netscape Communicator 及 Navigator 4.04 至 4.74 版本存在 URL 协议处理安全漏洞（又称 Brown Orifice）。远程攻击者可通过诱导用户访问恶意网页，触发内嵌 Java 小程序使用 file、http、https、ftp 等协议建立连接，从而绕过浏览器安全限制读取目标系统上的任意文件，导致敏感信息泄露。该漏洞影响 Windows、Mac、Linux 等多个平台的 Netscape 浏览器。"
published = "2000-10-20"
remediation = "升级 Netscape Communicator 至 4.75 或更高版本，该版本已修复 Java applet 通过 file/http/https/ftp 协议读取本地文件的漏洞。如无法升级，请在浏览器安全设置中禁用 Java applet 支持，或使用现代浏览器替代。Linux 发行版用户可参考 RedHat (RHSA-2000-054)、Caldera (CSSA-2000-027)、SuSE 及 FreeBSD (FreeBSD-SA-00:39) 发布的安全公告安装对应补丁。"
score = 5.0
severity = "MEDIUM"
sources = ["cve"]
title = "Netscape Communicator 任意文件读取漏洞"
updated = "2026-06-16"

