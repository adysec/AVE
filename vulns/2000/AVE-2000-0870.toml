[basic]
description = "MDaemon 2.8 的 WorldClient 邮件客户端存在会话标识符泄露漏洞。当用户点击邮件中的 URL 时，WorldClient 会将当前会话 ID 附加在 HTTP 请求的 Referer 字段中发送给目标网站，攻击者可借此获取用户会话 ID 并劫持会话，进而读取用户的邮件内容。攻击者只需诱使用户点击恶意链接即可利用此漏洞，无需额外认证条件。"
published = "2000-10-20T04:00:00.000"
remediation = "立即升级 MDaemon 至 3.0 或更高版本，该版本已修复 WorldClient 在 HTTP Referer 头中泄露会话 ID 的问题。如无法升级，建议配置反向代理在请求转发前移除 Referer 头中的会话标识，并强制 WorldClient 仅通过 HTTPS 访问以防止中间人窃取会话。"
score = 2.6
severity = "LOW"
sources = ["cve"]
title = "MDaemon WorldClient 邮件客户端会话劫持漏洞"
updated = "2026-06-16T21:52:19.890"

