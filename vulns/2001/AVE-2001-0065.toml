[basic]
description = "WhitSoft SlimServe HTTPd 1.0/1.1 存在缓冲区溢出漏洞，远程攻击者可通过向目标服务器发送超长 GET 请求触发该漏洞，导致服务拒绝响应（DoS），在特定条件下可能实现任意代码执行。该漏洞影响 SlimServe HTTPd 1.0 及 1.1 版本，CVSS 评分 10.0，危害等级严重。"
published = "2001-05-03T04:00:00.000"
remediation = "立即停用 WhitSoft SlimServe HTTPd 1.0/1.1 服务器软件，该软件已于 2001 年后停止维护，不存在官方补丁。建议将 Web 服务迁移至当前受支持的替代产品，如 Nginx、Apache HTTP Server 或 Caddy，并确保使用最新稳定版本。在迁移完成前，应在防火墙或网络设备上限制对 SlimServe 服务端口（默认 TCP 80）的访问，仅允许可信 IP 地址连接，以防止远程攻击者发送超长 GET 请求触发缓冲区溢出。"
score = 10
severity = "CRITICAL"
sources = ["exploitdb"]
title = "WhitSoft SlimServe HTTPd 缓冲区溢出拒绝服务漏洞"
updated = "2026-06-16T21:53:48.327"

