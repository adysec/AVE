[basic]
description = "Linux 内核 Lantiq xrx200 网络驱动中存在内存释放缺陷（CWE-401），当驱动在特定路径下发生内存分配失败时，系统会存储无效的缓冲区地址。后续重新使用该描述符时，内核会在 `build_skb()` 函数中访问已释放或无效的内存，导致系统崩溃（内核 panic）。该漏洞仅需本地低权限用户即可触发，影响使用 Lantiq xrx200 网卡驱动的嵌入式 Linux 设备，CVSS 评分 5.5，危害等级中等。Linux 内核社区已通过补丁修复此问题，建议用户更新至包含该修复的内核版本。"
published = "2025-06-18T11:15:27.447"
remediation = "升级 Linux 内核至 5.19.6 或更高版本（6.0 及以上已修复），长期稳定分支可分别 cherry-pick 补丁提交 c9c3b1775f80 或 3ef2786e32d9。若无法立即升级内核，可临时禁用 lantiq_xrx200 以太网驱动模块（rmmod lantiq_xrx200），但注意该操作将禁用相关网口功能。"
score = 5.5
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux lantiq_xrx200 网络驱动内存分配失败后无效缓冲区引用漏洞"
updated = "2026-06-17T05:19:42.653"

