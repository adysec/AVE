[basic]
description = "IRIX 6.2/6.5.1 及 NetBSD 1.3.2 及更早版本中的 at(1) 任务调度程序存在本地文件信息泄露漏洞。本地攻击者可通过向 at 命令的 -f 参数传递任意文件路径，系统在执行调度时因文件内容不符合语法规则产生错误信息，这些错误输出将通过邮件发送给本地用户，从而实现读取任意文件的部分内容。该漏洞要求攻击者拥有本地系统访问权限，CVSS 评分 2.1，危害等级低，但可能导致系统敏感信息（如配置文件、密码文件等）泄露。"
published = "1998-07-03T04:00:00.000"
remediation = "NetBSD 用户应升级至 19980626 之后的内核版本，或应用官方补丁（ftp://ftp.NetBSD.ORG/pub/NetBSD/misc/security/patches/19980626-at）；SGI IRIX 用户应安装厂商提供的 at 修补程序。临时缓解措施：以 root 执行 chmod u-s /usr/bin/at 移除 at 的 setuid 位，此举会禁止普通用户使用 at 命令。"
score = 2.1
severity = "LOW"
sources = ["epss"]
title = "NetBSD/SGI IRIX at 命令本地文件读取漏洞"
updated = "2026-06-16T21:50:22.727"

