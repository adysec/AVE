[basic]
description = "OpenLink Software OpenLink 3.2 存在远程缓冲区溢出漏洞，远程攻击者可通过向 Web 配置器发送超长 GET 请求触发缓冲区溢出，导致任意代码执行或权限提升。该漏洞无需身份认证即可远程利用，影响 OpenLink 3.2 版本，CVSS 评分 10.0，危害等级严重。目前厂商已发布安全更新修复此漏洞。"
published = "1999-10-15T04:00:00.000"
remediation = "立即升级 OpenLink 至 3.2 以上版本以修复缓冲区溢出漏洞；如无法升级，应在防火墙层面限制对 Web Configurator 端口（默认 80/443）的访问，仅允许受信任管理 IP 连接。更彻底的缓解措施是停止 Web Configurator 服务或从生产环境移除该组件，避免攻击者通过长 GET 请求远程执行任意代码获取系统权限。"
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "OpenLink Software OpenLink Web Configurator 远程缓冲区溢出漏洞"
updated = "2026-06-16T21:49:22.660"

