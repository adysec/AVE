[basic]
description = "Red Hat Linux 6.1 及更早版本中 rlogin 的 PAM 配置文件存在安全绕过漏洞。由于 PAM 规则配置顺序不当，宽松规则位于严格规则之前，导致即使管理员通过 /etc/nologin 文件明确禁用了 rlogin 登录，攻击者仍可利用该配置缺陷绕过限制，通过 rlogin 服务远程访问目标系统。该漏洞影响 Red Hat Linux 6.1 及更早版本，CVSS 评分 7.5，危害等级高。"
published = "1999-10-07"
remediation = "升级 Red Hat Linux 至 6.2 或更高版本，或手动修改 /etc/pam.d/rlogin 配置文件，将检查 /etc/nologin 的限制规则置于宽松规则之前，确保禁用 rlogin 的配置生效。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "Red Hat Linux rlogin PAM 配置安全绕过漏洞"
updated = "2026-06-16"

