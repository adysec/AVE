[basic]
description = "昂捷CRM系统的cwsuploadpicture接口存在任意文件读取漏洞，攻击者可通过构造包含路径遍历序列的特制请求参数，利用该接口未对文件路径参数进行充分校验的缺陷，读取服务器上任意敏感文件，如配置文件、数据库连接信息等，导致敏感信息泄露，威胁系统安全。"
published = "2025-01-01"
remediation = "建议对cwsuploadpicture接口的filepath参数进行严格的路径过滤和校验，禁止包含../等路径穿越字符，限制文件读取范围仅为指定上传目录，避免读取系统配置文件等敏感路径。"
score = 5.0
severity = "MEDIUM"
sources = ["hwpoc"]
title = "昂捷CRM系统cwsuploadpicture任意文件读取"
updated = "2025-01-01"

