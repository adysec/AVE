[info]
author = "AVE"
description = "检测系统 /etc/mime.types 文件是否存在且包含合法 MIME 类型定义，判断 CPython mimetypes 模块是否可能从不可信搜索路径加载配置"
id = "POC-AVE-2024-0497"
name = "CVE-2024-3220 PoC"
severity = "low"
tags = ["ave-2024-0497"]
vuln_id = [
    "CVE-2024-3220",
    "AVE-2024-0497",
]

[poc]
logic = "any"

[[poc.requests]]
path = "/etc/mime.types"
protocol = "file"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["application/"]
