[basic]
description = "IP-Switch IMail 及 Seattle Labs Slmail 2.6 邮件服务器软件在处理 VRFY 命令时存在缓冲区溢出漏洞，远程攻击者无需身份认证即可通过向 SMTP 端口发送超长 VRFY 命令触发该漏洞，导致目标服务崩溃引发拒绝服务，在特定条件下可进一步实现远程代码执行。该漏洞影响 Slmail 2.6 及早期版本。"
published = "1999-01-01T05:00:00.000"
remediation = "立即升级到 Slmail 2.7 及以上版本；对于 IP-Switch IMail，安装厂商提供的安全补丁。如无法升级，在 SMTP 服务器上禁用 VRFY 命令（在配置文件中添加 disable_vrfy 或使用访问控制规则限制 VRFY 命令执行），并在防火墙上限制对 SMTP 端口(25)的访问来源。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "IP-Switch IMail 及 Seattle Labs Slmail 缓冲区溢出漏洞"
updated = "2026-06-16T21:47:57.770"

