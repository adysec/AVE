[basic]
description = "天地伟业 Easy7 综合管理平台 downloadNote 接口存在路径遍历漏洞，未授权的远程攻击者可通过构造包含 ../ 的特殊 fileName 参数读取服务器上的任意文件（如 /etc/passwd），导致敏感信息泄露。该漏洞影响天地伟业 Easy7 综合管理平台，攻击者无需认证即可利用。建议厂商及时修复此漏洞，限制 fileName 参数目录遍历行为。"
published = "20260315"
remediation = "立即将天地伟业 Easy7 综合管理平台升级至 V7.19 之后的修复版本，可通过互联网在线升级或联系 400-040-9999 获取补丁。同时，在 Web 应用服务器或 WAF 层面配置路径遍历过滤规则，拦截包含 `../` 的 `fileName` 参数请求，限制 `/Easy7/rest/file/downloadNote` 接口的访问来源 IP 白名单。"
score = 5
severity = "MEDIUM"
