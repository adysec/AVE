[basic]
description = "Zope 对象发布环境（Z Object Publishing Environment）中的 DTML（Document Template Markup Language）实现存在权限验证缺陷，远程攻击者无需任何认证即可通过网络向目标服务器发送特制的 DTML 模板请求，绕过访问控制执行未授权操作，导致完全控制目标系统的机密性、完整性和可用性。该漏洞影响 Zope 相关版本，攻击复杂度低，危害等级严重。"
published = "2000-01-04T05:00:00.000"
remediation = '升级到 Zope 2.1.7 及以上版本，该版本修复了 DTML 中未经授权访问对象的问题。同时检查 DTML 文档权限配置，确保仅授予可信用户"管理 DTML"和"使用 DTML"角色权限，并禁用匿名用户的 DTML 编辑功能。对于仍在运行的旧系统，建议迁移至 Zope 4.x 或 5.x 系列，其 DTML 安全模型已完全重构。'
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "Zope DTML 授权绕过漏洞"
updated = "2026-06-16T21:50:55.373"

