[basic]
description = "Apple QuickTime 在 Windows 系统上的 quickTime.qts 组件存在基于堆的缓冲区溢出漏洞（CWE-119）。该漏洞是由于组件在处理 PICT 格式图像文件时未对 Kodak 编码的图像数据进行充分的错误检查，导致远程攻击者可通过构造恶意的 PICT 图像文件触发堆溢出。受影响的版本为 Windows 平台上的 QuickTime 7.4.5 及更早版本。攻击条件：攻击者需诱使用户打开或预览一个特制的 PICT 图像文件（如通过电子邮件附件、网络下载等方式）。成功利用后，攻击者可在用户系统中以当前用户权限执行任意代码，造成程序崩溃或完全接管目标系统，对数据机密性、完整性和可用性均造成严重影响。"
published = "2008-04-04T17:44:00.000"
remediation = "立即将 Windows 系统上的 Apple QuickTime 升级至 7.4.5 或更高版本，该修复包含在 Apple 安全更新 2008-003 中，可通过 Apple 软件更新功能自动安装。如 QuickTime 非必需，可暂时卸载以消除攻击面。日常使用中应避免打开来历不明的 PICT 图像文件，以缓解该缓冲区溢出漏洞导致的远程代码执行风险。"
score = 6.8
severity = "MEDIUM"
sources = ["tenable"]
title = "Apple QuickTime 堆缓冲区溢出远程代码执行漏洞"
updated = "2026-06-16T22:50:49.297"

