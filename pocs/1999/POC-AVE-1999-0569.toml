[info]
author = "AVE"
description = "Microsoft Internet Explorer 4.x/5.x 无效字节跨框架访问漏洞验证。在 about: 协议的 JavaScript URL 中注入 %01（或 ^A/&#01）字符，浏览器将后续域名解析为当前安全域，绕过同源策略读取本地文件。诱导用户访问恶意页面即可触发。"
id = "POC-AVE-1999-0569"
name = "CVE-1999-0347 PoC"
severity = "critical"
tags = ["ave-1999-0569"]
vuln_id = [
    "CVE-1999-0347",
    "AVE-1999-0569",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["about:%01"]
