[basic]
description = "Winamp 2.10 的 PLS 播放列表文件解析组件存在缓冲区溢出漏洞，远程攻击者可通过向用户发送包含超长文件名的恶意 PLS 文件触发栈溢出，导致任意代码执行。攻击条件依赖用户手动打开精心构造的播放列表文件，影响 Winamp 2.10 及更早版本，CVSS 评分 7.2，危害等级高危。"
published = "2000-01-04T05:00:00.000"
remediation = "升级 Winamp 至 2.11 及以上版本，该漏洞已在后续版本中修复。鉴于 Winamp 已停止更新维护，建议迁移至其他仍受支持的音频播放软件（如 VLC、foobar2000），避免打开来源不明的 .pls 播放列表文件。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "NullSoft Winamp 2.10 播放列表文件解析缓冲区溢出远程代码执行漏洞"
updated = "2026-06-16T21:50:53.757"

