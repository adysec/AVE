[info]
author = "AVE"
description = "检测 Microsoft Internet Explorer 4/5 中 Eyedog ActiveX 控件（CLSID:06A7EC63-4E21-11D0-A112-00A0C90543AA）是否可被脚本化访问。该控件被错误标记为安全可脚本化，远程攻击者可通过恶意网页调用 MSInfoLoadFile 方法触发缓冲区溢出，导致浏览器崩溃或执行任意命令。Bubbleboy 蠕虫即利用此漏洞通过 HTML 邮件自动传播。"
id = "POC-AVE-1999-0196"
name = "CVE-1999-0669 PoC"
severity = "medium"
tags = [
    "cve-1999-0669",
    "activex",
    "eyedog",
]
vuln_id = [
    "CVE-1999-0669",
    "AVE-1999-0196",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["06A7EC63-4E21-11D0-A112-00A0C90543AA"]
