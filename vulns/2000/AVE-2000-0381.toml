[basic]
description = "Debian GNU/Linux 系统中 eterm 终端模拟器 0.8.8 版本存在权限许可漏洞。由于 eterm 在处理特定操作时未正确限制用户权限，本地攻击者可通过向 eterm 发送特制请求或利用其 SUID 机制提升自身权限，从而获取 root 权限。该漏洞攻击复杂度低，成功利用后可完全控制目标系统，影响机密性、完整性和可用性。攻击者需具备本地系统访问权限方可触发。"
published = "1999-02-18T05:00:00.000"
remediation = "立即升级 eterm 至 0.9 或更高版本，该版本已修复权限许可漏洞。如无法升级，可移除 eterm 的 setuid root 权限位（`chmod u-s /usr/bin/eterm`），以消除本地提权风险，但会丢失部分终端功能。作为 Debian GNU/Linux 用户，建议升级至包含修复的完整发行版更新。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "Debian GNU/Linux eterm 本地权限提升漏洞"
updated = "2026-06-16T21:51:34.143"

