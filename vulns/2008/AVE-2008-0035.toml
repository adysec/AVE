[basic]
description = "VLC Media Player 0.8.6e 的 libmp4.c 中 MP4_ReadBox_rdrf 函数存在整数溢出漏洞，远程攻击者可通过构造恶意的 MP4 RDRF box 触发堆缓冲区溢出，导致拒绝服务（崩溃）并可能执行任意代码。该漏洞影响 VLC 0.8.6e 版本，CVSS 评分 6.8（高危），攻击向量为网络、攻击复杂度中等、无需认证，可造成机密性、完整性、可用性部分影响。攻击者需诱导用户打开恶意构造的 MP4 文件即可触发漏洞，利用方式为通过整数溢出触发堆缓冲区溢出实现代码执行或拒绝服务。VLC 官方已在后续版本中修复该漏洞，建议用户升级至最新版本。"
published = "2008-03-25T00:44:00.000"
remediation = "建议立即升级 VLC Media Player 至 0.8.6f 或更高版本（建议升级至最新稳定版 3.0.x 以上）。Linux 用户可通过包管理器升级（如 Gentoo: emerge --sync && emerge -u media-video/vlc，Ubuntu/Debian: apt update && apt install vlc）。临时缓解措施：禁止播放不可信的 MP4 文件，或在防火墙层面限制不可信源的媒体流访问。"
score = 6.8
severity = "MEDIUM"
sources = ["tenable"]
title = "VideoLAN VLC Media Player MP4 整数溢出导致堆缓冲区溢出漏洞"
updated = "2026-06-16T22:51:50.723"

