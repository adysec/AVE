[basic]
description = 'IIS（Internet Information Server）及 Commercial Internet System 的 FTP 服务存在权限校验绕过漏洞。由于 FTP 服务器对用户访问权限的处理逻辑存在缺陷，远程攻击者即使被设置为"无访问权限（No Access）"，仍可通过构造恶意 FTP 请求绕过权限限制，非法读取或删除服务器上的文件。该漏洞影响运行上述 FTP 服务的 Windows 系统，攻击者可利用匿名或低权限 FTP 连接即可远程发起攻击，无需身份认证，危害较大。'
published = "1999-09-23T04:00:00.000"
remediation = '建议升级至 IIS 6.0 或更高版本并安装微软安全补丁 MS99-025；在 IIS 管理器中为 FTP 站点移除匿名用户的"No Access"权限，改为显式拒绝访问；若暂无法升级，请在防火墙层面限制 FTP 端口(21/TCP)仅允许受信 IP 访问，并禁用匿名 FTP 登录作为临时缓解措施。'
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "Microsoft IIS FTP 安全绕过漏洞"
updated = "2026-06-16T21:49:02.220"

