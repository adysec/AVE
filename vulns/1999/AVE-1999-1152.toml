[basic]
description = "基于 BSD 4.4 代码实现的共享内存子系统存在资源管理缺陷，本地用户可通过调用 mmap 或 shmget 系统调用连续分配大块共享内存并触发大量页面错误，绕过系统资源限制（如 rlimit）导致系统内存耗尽或性能严重下降。该漏洞影响 FreeBSD 3.2/NetBSD 1.4/Linux Kernel 2.3 及使用 BSD 4.4 共享内存实现的其他操作系统，攻击者利用本地账号即可实施拒绝服务攻击，无需任何特殊权限。"
published = "1999-07-15"
remediation = "Linux 系统安装 util-linux 补丁启用 RLIMIT_AS 支持，通过 /etc/limits 配置地址空间上限（如 default V512 限制 512MB），或通过 /etc/security/limits.conf 设置 as 限制。FreeBSD/NetBSD 升级内核使 mmap/shmget 检查 rlimits，或通过 sysctl 限制 kern.ipc.shmmax。临时缓解措施：在 shell 启动脚本中执行 ulimit -v 限制单进程虚拟内存。"
score = 5.0
severity = "MEDIUM"
sources = [
    "cve",
    "bugtraq",
]
title = "FreeBSD NetBSD Linux 共享内存 mmap 拒绝服务漏洞"
updated = "1999-07-15"

