[basic]
description = "H3C 网络管理系统存在任意文件读取漏洞，由于系统未对 `file_name` 参数进行充分的路径过滤与校验，远程攻击者可通过路径穿越方式构造 `../../../../../etc/passwd` 等恶意请求，读取服务器上的任意敏感文件。该漏洞影响 H3C 多款网络管理产品，攻击者无需身份认证即可利用，危害较大。建议厂商及时修复参数校验逻辑，限制路径访问范围。"
published = "0725"
remediation = "建议联系 H3C 官方获取最新安全补丁，升级网络管理系统至不受影响版本。临时缓解措施：在 Web 前端或反向代理层对 `/webui/` 路径的 `file_name` 参数进行路径遍历过滤，禁止包含 `../` 序列；同时限制 `/webui/` 接口仅允许可信管理 IP 访问。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "H3C 网络管理系统任意文件读取漏洞"
updated = "0725"

