[basic]
description = "Microsoft IIS 2.0/3.0/4.0 的 ISAPI 扩展处理中存在权限提升漏洞。当 IIS 服务器以 SYSTEM 权限运行并加载 ISAPI 扩展时，远程攻击者可通过向服务器发送特制请求，调用 GetExtensionVersion() 函数触发漏洞，从而以 SYSTEM 权限执行任意命令。该漏洞影响 IIS 2.0/3.0/4.0 版本，攻击者无需身份认证即可利用，危害等级高。"
published = "1999-02-19T05:00:00.000"
remediation = "升级至 IIS 5.0 或更高版本以消除此漏洞；避免以 SYSTEM 账户运行 IIS 服务，改为使用低权限专用账户；禁用不必要的 ISAPI 扩展，仅保留必需扩展并实施最小权限原则。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "Microsoft IIS ISAPI GetExtensionVersion 远程代码执行漏洞"
updated = "2026-06-16T21:48:20.530"

