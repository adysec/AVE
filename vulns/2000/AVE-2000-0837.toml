[basic]
description = "PHF（电话簿查询）CGI 程序存在缓冲区溢出漏洞，远程攻击者可向目标 Web 服务器发送包含大量参数及超长 MIME 头的特制 HTTP 请求，触发缓冲区溢出，进而以 Web 服务器进程权限执行任意命令。该漏洞影响运行 PHF CGI 程序的 Linux/x86 系统，攻击者无需认证即可远程利用，CVSS 评分 7.5，危害等级高。"
published = "2001-01-09T05:00:00.000"
remediation = "立即删除或禁用 `/cgi-bin/phf` 脚本，该程序并非 Apache 标准组件，无正常业务用途。建议升级至 Apache 2.x 或更高版本（已移除 phf），或在 Web 服务器配置中禁止访问 `/cgi-bin/phf` 路径。作为临时缓解措施，可在防火墙或反向代理层面拦截对 `/cgi-bin/phf` 的请求。"
score = 7.5
severity = "HIGH"
sources = ["exploitdb"]
title = "NCSA HTTPd PHF CGI 远程缓冲区溢出漏洞"
updated = "2026-06-16T21:53:20.317"

