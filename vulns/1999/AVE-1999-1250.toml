[basic]
description = "SCO OpenServer 系统的 mscreen 程序在处理用户主目录下的 .mscreenrc 配置文件时，对 TERM（终端类型）等条目的长度未作边界校验，直接将超长字符串拷贝至固定大小栈缓冲区，导致缓冲区溢出。该漏洞影响 SCO OpenServer Enterprise System、OpenServer、Open Desktop、Internet FastStart 及 CMW 等多款产品（如 5.0.5 版本）。攻击者可通过构造过长的 TERM 终端条目写入 .mscreenrc 文件并运行 mscreen 触发漏洞，成功利用可使本地普通用户提升权限至 root，完全控制受影响系统。"
published = "1998-10-06"
remediation = "升级 SCO OpenServer 至厂商发布的修复版本（安装 SCO 安全补丁 rsco-1998-005 或升级到 5.0.6 及以上版本）。同时限制终端类型 TERM 的长度并校验 .mscreenrc 配置文件内容，避免超长输入触发溢出。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "SCO OpenServer mscreen 程序缓冲区溢出漏洞"
updated = "2026-07-19"

