[basic]
description = "Matt Wright 的 FormHandler.cgi 脚本在默认配置下存在任意文件读取漏洞。该脚本允许将任意目录用作附件存储路径，且仅限制对 /etc/ 目录的访问，未能有效阻止目录穿越。远程攻击者在无需身份认证的情况下，可通过构造 reply_message_attach 附件参数，指定目标系统上的任意文件路径，从而越权读取服务器上的敏感文件（如配置文件、密码文件等）。该漏洞影响所有采用默认配置部署该 CGI 脚本的网站，攻击条件仅为目标开启该脚本且可被远程访问，利用方式为发送特制的 HTTP 请求并操控附件参数指向预期之外的文件。"
published = "1999-11-16T05:00:00.000"
remediation = "升级 Matt Wright FormHandler.cgi 至官方修复版本（1.12 及以上），并在脚本配置中将 reply_message_attach 附件目录严格限制为 Web 根目录下专用目录，禁止指向 /etc/ 之外的系统路径；同时移除或重命名公开的 formhandler.cgi 脚本，并通过 Web 服务器访问控制（如 .htaccess 拒绝非授权 IP）限制其访问，作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Matt Wright FormHandler.cgi 任意文件读取漏洞"
updated = "2026-06-16T21:49:36.223"

