[basic]
description = "QPC Software 公司 QVT/Term Plus 4.2d 及 4.3 版本与 QVT/Net 4.3 版本中的 FTP 服务器存在缓冲区溢出漏洞。远程攻击者无需身份认证，可通过向 FTP 服务发送超长的用户名或密码，触发缓冲区溢出，导致目标 FTP 服务崩溃产生拒绝服务，甚至可能利用该漏洞执行任意命令。该漏洞 CVSS 评分 7.5，危害等级高。"
published = "1999-11-10T05:00:00.000"
remediation = "升级 QVT/Term Plus 至 4.3 以上最新版本（如厂商已停止维护，建议迁移至其他 FTP 服务器软件如 FileZilla Server 或 vsftpd）。如无法升级，在防火墙限制 FTP 端口（默认 21）仅允许受信 IP 访问，并监控异常长度的登录用户名/密码请求作为临时缓解。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "QPC Software QVT Term/QVT/Net FTP服务器缓冲区溢出漏洞"
updated = "2026-06-16T21:50:40.440"

