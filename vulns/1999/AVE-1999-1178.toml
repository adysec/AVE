[basic]
description = 'F5 BIG/ip 2.1.2 及之前版本的 bigconf.conf 配置文件中存在任意文件读取漏洞。远程攻击者无需身份认证，通过向目标系统发送特制的 HTTP 请求，在 "file" 参数中指定任意系统文件路径，即可读取服务器上的敏感文件，如 /etc/passwd、配置文件等。该漏洞利用方式简单，影响范围广泛，可导致敏感信息泄露，危害等级中等。'
published = "1999-11-08T05:00:00.000"
remediation = "升级 F5 BIG-IP 至 2.2 及以上版本以消除 bigconf.cgi 任意文件读取漏洞。同时建议限制对 bigconf.cgi 的访问来源，仅在信任网络内开放管理接口，并对 CGI 参数进行严格的路径白名单校验，防止目录穿越攻击。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "F5 BIG/ip 任意文件读取漏洞"
updated = "2026-06-16T21:50:41.830"

