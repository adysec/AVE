[basic]
description = "Sun Solaris 操作系统自带的 BIND 域名服务（named）存在拒绝服务漏洞，其根源在于对 NAPTR（命名权威指针）类型 DNS 记录的处理逻辑存在缺陷。远程攻击者无需身份认证，只需向运行 named 服务的目标主机发送特制的包含畸形 NAPTR 记录的 DNS 查询请求，即可触发服务异常并导致 named 进程崩溃或停止响应，从而造成 DNS 服务不可用。该漏洞影响配置了 BIND named 且启用 NAPTR 记录解析的 Solaris 系统，攻击条件仅为攻击者能够与目标主机的 DNS 服务（通常为 UDP/TCP 53 端口）进行网络连通，利用方式简单、可远程发起，会对依赖该 DNS 服务的网络环境造成拒绝服务影响。"
published = "1999-11-10T05:00:00.000"
remediation = "升级 Solaris 系统至已修复该 BIND 缺陷的补丁集群（如 Solaris 2.6 的 105708、Solaris 7 的 106655 等对应版本），或升级 BIND 至 8.2.2-P5 及以上版本。临时缓解措施：在 named 配置中限制递归查询来源，并通过防火墙阻断外部对 53 端口的 naptr 查询访问。"
score = 2.1
severity = "LOW"
