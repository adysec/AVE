[basic]
description = "ARCServeIT Client Agent 6.62 中的 uagentsetup 组件在将临时文件移动至 agent.cfg 配置文件时，未正确检查该临时文件的存在性及所有权归属，导致本地攻击者可通过在临时文件被移动前对其进行篡改，注入恶意命令，从而实现以目标进程权限执行任意命令。该漏洞影响 ARCServeIT Client Agent 6.62 版本，攻击者需具备本地系统访问权限，利用难度较低，可导致系统完全受控。"
published = "2000-10-20T04:00:00.000"
remediation = "立即升级 ARCServeIT Client Agent 至 6.63 或更高版本，该版本已修复临时文件竞争条件问题。如无法升级，确保 agent.cfg 所在目录权限为 755 且仅允许受信管理员账户登录系统，同时在系统层监控 /tmp 目录下 uagentsetup 创建的临时文件操作日志，防止本地低权限用户通过符号链接攻击篡改配置文件。"
score = 7.2
severity = "HIGH"
sources = ["cve"]
title = "CA ARCServeIT Client Agent 本地任意命令执行漏洞"
updated = "2026-06-16T21:52:28.070"

