[basic]
description = "这是一个针对 Microsoft Windows Server 的严重权限提升漏洞，源于 Adobe Type Manager Font 驱动程序中的整数溢出或缓冲区溢出。攻击者通过构建包含恶意字体数据的精细控制的应用程序，并以低权限本地用户身份执行，可以触发 ATMFD.DLL 模块的严重内存损坏。在本地访问权限的情况下，攻击无需用户交互即可直接利用这种漏洞，导致远程代码执行并获得系统管理员级别的权限。该漏洞影响 Windows Server 2003 SP2、Windows Vista SP2、Windows Server 2008 SP2 和 R2 SP1、Windows 7 SP1、Windows 8、Windows 8.1、Windows Server 2012 Gold 和 R2 以及 Windows RT Gold 和 8.1 等多个 Windows Server 版本。成功攻击后，攻击者可以完全控制受影响系统，读取敏感数据、修改系统文件或破坏系统服务，造成严重安全威胁。该漏洞被评定为 CVSS 3.1 评分 7.8 的 HIGH 级别，代表了该漏洞的严重性和潜在影响。Microsoft 已经在 2015 年 8 月的累积更新中发布了安全补丁，修复了此漏洞。"
published = "2015-07-14T22:59:08.103"
remediation = '建议立即安装微软2015年7月安全更新MS15-077（KB3079904），通过Windows Update自动更新或手动下载对应系统版本补丁包安装。如无法立即打补丁，可通过注册表禁用ATMFD.DLL字体驱动作为临时缓解：在注册表HKEY_LOCAL_MACHINE\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Windows中将ATMFD.DLL值数据清空并重启系统，或通过组件服务禁用"Windows Font Cache Service"服务作为临时缓解措施。建议尽快升级至Windows 10或更高版本以获得长期支持。'
score = 7.8
severity = "HIGH"
sources = ["kev"]
title = "Microsoft Windows 权限提升漏洞"
updated = "2026-06-17T00:24:01.693"

