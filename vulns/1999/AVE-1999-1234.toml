[basic]
description = "iCat Carbo Server 3.0.0 中的 carbo.dll 组件存在目录遍历漏洞，远程攻击者无需认证即可向 icatcommand 参数传递包含 `../` 序列的恶意请求，绕过路径限制读取服务器上的任意文件，导致数据库配置、源代码等敏感信息泄露。该漏洞攻击复杂度低，影响 iCat Electronic Commerce Suite 3.0 版本。"
published = "1997-11-08T05:00:00.000"
remediation = "iCat Carbo Server 3.0.0 已停止维护，厂商不再提供安全更新。建议立即迁移至受支持的电子商务平台（如 Magento、Shopify 等）。如无法迁移，可在 Web 服务器（IIS/Apache）层面添加 URL 重写规则，拦截 icatcommand 参数中包含 ../ 或 ..%2f 等目录遍历序列的请求，作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "iCat Carbo Server 目录遍历漏洞"
updated = "2026-06-16T21:49:39.400"

