[basic]
description = ".NET SDK (Microsoft.NET.Build.Containers) 容器镜像构建过程中存在不当链接解析漏洞 (CWE-59)，本地低权限攻击者可通过链接跟随方式注入恶意资源，导致同一台机器上其他用户构建的容器镜像被篡改。影响 .NET 8.0.0-8.0.28、.NET 9.0.0-9.0.17、.NET 10.0.0-10.0.9 版本，CVSS 7.0 高危，影响机密性、完整性、可用性均为高。攻击需本地低权限访问且攻击复杂度高，无需用户交互。Microsoft 已发布修复版本 (.NET 8.0.29/9.0.18/10.0.10)，建议升级 SDK 并重新编译部署自包含应用。"
published = "2026-07-14T20:17:37.240"
remediation = "立即更新到修正版本：对于.NET 8用户请升级至8.0.29及以上版本；对于.NET 9用户请升级至9.0.18及以上版本；对于.NET 10用户请升级至10.0.10及以上版本。更新完成后重启应用程序生效。对于自包含应用程序，请重新编译并部署更新后的版本。"
score = 7
severity = "HIGH"
sources = ["ghsa"]
title = "Microsoft .NET SDK 容器镜像构建过程本地资源注入篡改漏洞"
updated = "2026-07-22T21:17:40.993"

