[basic]
description = "Lasso CGI 程序存在任意文件读取漏洞。Lasso 是由 Blue World 开发的 Web 应用开发环境，部署于 WebSTAR 等服务器上。由于 CGI 程序未对用户输入的文件路径参数进行充分过滤和验证，远程攻击者无需认证即可通过构造特制的 HTTP 请求，利用路径遍历技术读取服务器上的任意文件，包括配置文件、密码文件等敏感信息，可能导致敏感数据泄露。该漏洞严重程度中等，修复方案为升级 Lasso 至安全版本或禁用相关 CGI 程序。"
published = "1997-08-19T04:00:00.000"
remediation = "立即升级 Lasso 至厂商发布的安全版本（如 3.03 或更高），并在 WebSTAR 服务器配置中限制 CGI 目录的访问权限，禁止 URL 中包含 ../ 路径遍历序列。由于该产品已停止维护，建议迁移至受支持的现代 Web 服务器和 CGI 解决方案。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Blue World Lasso CGI 任意文件读取漏洞"
updated = "2026-06-16T21:50:02.273"

