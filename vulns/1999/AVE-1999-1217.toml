[basic]
description = 'Microsoft Internet Explorer 4.0 与 4.01 版本在实现跨框架（cross frame）安全隔离机制时存在缺陷，未能正确阻止不同源框架之间的导航与访问。远程攻击者可通过构造恶意网页，利用框架间的导航绕过浏览器的同源安全策略，诱使用户访问特制页面，从而在受害者浏览器上下文中读取本地或远程文件系统中的敏感文件内容。该漏洞影响运行 IE 4.0 及 4.01 的 Windows 平台用户，攻击无需身份认证，仅需受害者浏览攻击者控制的网页即可触发，属于典型的信息泄露类漏洞（即"Cross Frame Navigate"漏洞），攻击门槛低且危害范围较广。'
published = "1998-09-04T04:00:00.000"
remediation = '建议立即升级至 Internet Explorer 5.01 或更高版本，或迁移至现代浏览器（如 Microsoft Edge、Chrome、Firefox）。若无法升级，可在 Internet 选项→安全→自定义级别中禁用"跨框架导航"功能，或通过组策略禁用 IE 的跨框架导航功能作为临时缓解措施。'
score = 2.6
severity = "LOW"
sources = ["avd"]
title = "Microsoft Internet Explorer 跨帧导航信息泄露漏洞"
updated = "2026-06-16T21:49:13.867"

