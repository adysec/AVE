[basic]
description = "NetBSD 1.3.3 及 Linux 系统自带的 traceroute 工具存在参数解析漏洞，本地攻击者可通过向 traceroute 传递超大的 waittime（-w）参数触发该漏洞。由于程序未正确解析该参数值，导致发送数据包的时间延迟被设置为零，从而使 traceroute 以极快的速率向目标系统发送大量 ICMP/UDP 数据包，形成拒绝服务攻击。该漏洞影响 NetBSD 1.3.3 及部分 Linux 发行版，CVSS 评分 5.0，危害等级中等。"
published = "2001-03-12T05:00:00.000"
remediation = "升级 NetBSD 至 1.4 及以上版本，或安装对应安全补丁修复 traceroute 对 -w 参数的解析逻辑。Linux 系统应升级至 2.2.x 或更高内核版本。临时缓解措施可通过 chmod 限制 traceroute 的 setuid 位，仅允许受信任用户执行。现代系统已不受此漏洞影响，建议使用最新受支持版本。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "NetBSD traceroute 资源耗尽漏洞（影响 Linux 系统）"
updated = "2026-06-16T21:51:27.480"

