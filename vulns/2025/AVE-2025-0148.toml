[basic]
description = "汉王e脸通综合管理平台 exportResourceByFilePath.do 接口存在任意文件读取漏洞，由于服务端未对 filePath 参数进行充分的路径过滤与校验，攻击者可在未授权状态下向 /manage/leaveList/exportResourceByFilePath.do 接口传入恶意构造的 filePath 参数（如 WEB-INF/web.xml 或包含 ../ 的路径穿越序列），远程读取服务器任意文件内容。该漏洞可导致 Web 应用配置文件、数据库连接信息、系统敏感文件等关键数据泄露，攻击者无需任何认证即可利用，影响范围广且危害较高。"
published = "0721"
remediation = "建议联系汉王厂商获取最新安全补丁，或升级到修复该漏洞的最新版本。临时缓解措施：在 Nginx/反向代理层对 `/manage/leaveList/exportResourceByFilePath.do` 路径添加访问控制，限制仅授权 IP 可访问；同时在应用层对 `filePath` 参数进行严格白名单校验，禁止包含 `../`、`WEB-INF` 等路径穿越关键字，仅允许读取指定导出目录下的文件。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "汉王 e脸通综合管理平台 任意文件读取漏洞"
updated = "0721"

