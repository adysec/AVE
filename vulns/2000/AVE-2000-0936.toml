[basic]
description = "Red Hat Linux 的 usermode 包中的 userhelper 工具在执行非 setuid 程序时以 root 权限运行，导致 glibc 的安全防护机制（如格式化字符串保护）未被激活。本地攻击者可通过设置 LANG 或 LC_ALL 环境变量触发 glibc 中的格式化字符串漏洞（CVE-2000-0844），从而以 root 权限执行任意代码。该漏洞影响 Red Hat Linux 系统，CVSS 评分 7.2，危害等级高，攻击者需具备本地访问权限，但无需认证即可利用。"
published = "2000-09-30T04:00:00.000"
remediation = "立即升级 usermode 软件包至 1.74 或更高版本（Red Hat 已通过 RHSA-2000:016 安全公告修复）。可通过 `rpm -Uvh usermode-1.74-1.i386.rpm` 命令安装更新版本。如无法升级，可移除 userhelper 的 setuid 位（`chmod u-s /usr/sbin/userhelper`）作为临时缓解措施，但会导致部分用户管理功能不可用。"
score = 7.2
severity = "HIGH"
sources = ["redhat"]
title = "Red Hat Linux usermode userhelper 本地权限提升漏洞"
updated = "2026-06-16T21:53:22.973"

