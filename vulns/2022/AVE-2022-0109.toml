[basic]
description = "Linux 内核的 /proc/pid/smaps_rollup 文件接口存在空指针解引用漏洞。当进程没有虚拟内存区域（VMA）时，读取 smaps_rollup 会触发 show_smaps_rollup 函数中的空指针解引用，导致内核崩溃。该漏洞由提交 258f669e7e88 引入的回归问题所致，本地低权限攻击者可利用此漏洞实施拒绝服务攻击。影响 Linux 内核 4.19 至 6.0.5 版本，已在 4.19.264/5.4.221/5.10.152/5.15.76/6.0.6 中修复，CVSS 评分 5.5，危害等级中等。"
published = "2025-09-18"
remediation = "升级 Linux 内核至以下安全版本：4.19 分支 ≥ 4.19.264、5.4 分支 ≥ 5.4.221、5.10 分支 ≥ 5.10.152、5.15 分支 ≥ 5.15.76、6.0 分支 ≥ 6.0.6。使用发行版包管理器（如 apt upgrade linux-image / yum update kernel）更新后重启系统。无法立即更新时，可通过 SELinux 或 AppArmor 限制非特权用户对 /proc/*/smaps_rollup 的访问权限作为临时缓解。"
score = 5
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux 内核 /proc/pid/smaps_rollup 空指针解引用漏洞"
updated = "2025-09-18"

