[basic]
description = "Windows 95/98/NT 的多宿主系统在处理带有特定 IP 选项的畸形数据包时存在安全漏洞。远程攻击者可利用特制数据包绕过 IP 源路由限制，实施 IP 地址欺骗攻击，获取对受影响系统的未授权访问权限，导致信息泄露或权限提升。该漏洞又名 Spoofed Route Pointer。"
published = "1999-09-20"
remediation = "微软已发布安全公告 MS99-038 修复此漏洞，建议受影响用户安装对应的安全更新补丁 KB238453，或升级到已修复的操作系统版本。在多宿主系统上禁用 IP 源路由功能也可作为临时缓解措施。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "Microsoft Windows 多宿主系统 IP 源路由绕过漏洞"
updated = "2026-06-16"

