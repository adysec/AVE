[basic]
description = "Windows NT 域认证机制存在安全缺陷，当域用户在登录时于域名末尾添加空格字符，系统将无法正确下载并应用域安全策略，导致用户可能绕过域策略限制获得非授权访问权限。该漏洞影响 Windows NT 4.0 及更早版本，CVSS 评分 10.0，危害等级严重。攻击者只需在登录界面域名后添加空格即可触发，利用条件简单，可导致域策略完全失效。"
published = "1999-11-18T05:00:00.000"
remediation = "立即为受影响 Windows NT 4.0 系统安装 Microsoft 安全修复补丁 Q237923（对应安全公告），或升级并安装 Windows NT 4.0 Service Pack 6a (SP6a) 及 2001 年 7 月发布的 Security Rollup Package (SRP)，该补丁已修正域登录末尾带空格时不下载系统策略的认证绕过缺陷。若暂无法打补丁，可在域控制器上通过组策略强制校验登录域名格式、禁止带尾随空格的域名登录，并限制受信任域的账号登录来源作为临时缓解。"
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "Microsoft Windows NT 身份验证绕过漏洞"
updated = "2026-06-16T21:49:28.090"

