[basic]
description = "Node.js 实验性权限模型（Permission Model）中存在不完整的权限分配修复漏洞。当使用 `--allow-fs-write` 标志限制文件写入权限时，Promise 版本的 `FileHandle.chmod()` 和 `FileHandle.chown()` 方法未正确实施权限检查，而回调版本的 `fs.fchmod()` 和 `fs.fchown()` 已正确修复。攻击者可通过已打开的只读文件描述符调用 Promise API 修改文件权限和所有者，从而绕过预期的写入限制。该漏洞影响 Node.js 20.x、22.x、24.x 及 25.x 版本，CVSS 评分 3.3，危害等级低。"
published = "2024-09-07T16:15:02.410"
remediation = "升级 Node.js 至 v20.15.1 或 v22.4.1 及以上版本，这两个版本已修复 FileHandle.chmod()/chown() 绕过权限模型检查的问题。如无法立即升级，可在启动时移除 --allow-fs-write 标志，或避免在受限权限模式下使用 Promise 风格的 FileHandle 方法操作文件描述符。"
score = 3.3
severity = "LOW"
sources = ["msrc"]
title = "Node.js Permission Model 文件权限检查绕过漏洞"
updated = "2026-06-17T07:36:10.207"

