[basic]
description = "SunOS 4.1.4 系统中的 arp(8c) 命令在处理 -f 参数指定的文件时存在信息泄露缺陷。该命令原本用于批量设置 ARP 表项，但在解析文件过程中，对于无法正确解析的行会将其内容直接输出到标准输出。本地已登录的普通用户可利用此特性，通过向 arp -f 传入包含敏感文件（如 /etc/passwd、配置文件等）内容的路径，使文件中无法被 ARP 条目格式正确解析的行原样回显，从而读取本无权访问的文件内容。该漏洞影响 SunOS 4.1.4 系统，攻击条件为攻击者需在目标主机上拥有本地账户并执行 arp 命令，利用方式简单，无需特殊权限或远程网络访问，属本地低危信息泄露类漏洞。"
published = "1999-12-01T05:00:00.000"
remediation = "升级至 Sun Solaris 2.6 或更高版本（已修复该 arp 漏洞），或应用 Sun 官方发布的安全补丁 105781-01（针对 SunOS 4.1.4）。若暂无法升级，可通过限制 arp 命令执行权限（chmod 700 /usr/sbin/arp）仅限 root 执行，或通过文件系统权限限制普通用户读取敏感文件作为临时缓解措施。"
score = 2.1
severity = "LOW"
sources = ["exploitdb"]
title = "Sun Microsystems Solaris 系统拨号协议 arp(8c) 命令信息泄露漏洞"
updated = "2026-06-16T21:49:12.377"

