[basic]
description = "HP-UX 11.0及更早版本与MPE/iX 5.5及更早版本中的Predictive组件存在信息泄露漏洞（CWE-200）。攻击者可通过电子邮件或调制解调器拦截客户与Response Center Predictive系统之间的消息数据传送，导致敏感配置信息和诊断数据被未授权获取。该漏洞源于Predictive消息在传输过程中缺乏加密和认证保护机制，攻击者无需认证即可利用本地访问方式实施拦截。"
published = "1998-07-30"
remediation = "应用HP安全公告HPSBUX9807-081中提供的补丁，升级HP-UX到11.0以上版本或MPE/iX到5.5以上版本。在Predictive消息传输中启用加密和认证机制，限制对Response Center系统的网络访问权限。"
score = 4.6
severity = "MEDIUM"
sources = [
    "cve",
    "avd",
]
title = "HP-UX与MPE/iX Predictive组件信息泄露漏洞"
updated = "2026-06-16"

