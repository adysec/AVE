[basic]
description = "IRIX 操作系统中的 addnetpr 工具存在不安全的临时文件创建漏洞，本地攻击者可通过符号链接（symlink）攻击，在打印机临时文件创建前将其替换为指向任意系统文件的符号链接，从而覆盖目标文件内容，最终可能获取 root 权限。该漏洞影响 IRIX 5.3 及 6.2 版本，CVSS 评分 6.2，危害等级中危。攻击者需拥有本地系统访问权限，利用条件较低，且已有公开的本地权限提升利用代码。"
published = "1997-05-09T04:00:00.000"
remediation = "建议升级 IRIX 至 6.5.x 版本或应用 SGI 官方安全补丁（patch 1335），该补丁修复了 addnetpr 临时文件未正确处理符号链接的问题。对于已停止支持的 IRIX 版本，应迁移至受支持的现代操作系统（如 Linux），并确保敏感文件目录的粘滞位（sticky bit）设置正确。"
score = 6.2
severity = "MEDIUM"
sources = ["avd"]
title = "SGI IRIX addnetpr 本地权限提升漏洞"
updated = "2026-06-16T21:50:22.870"

