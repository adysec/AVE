[basic]
description = "DotNetNuke（DNN）在 7.4.1 之前版本中存在安全绕过漏洞，安装向导页面 Install/InstallWizard.aspx 在系统完成初始安装后未正确移除或设置访问权限，导致远程攻击者无需任何身份认证即可直接访问该页面并重新执行安装流程。攻击者通过向目标发送特制的 HTTP 请求即可触发该漏洞，在安装过程中创建新的 SuperUser 管理员账户，从而完全控制整个 DNN 站点。该漏洞影响所有 7.4.1 之前版本的 DotNetNuke 部署，CVSS 评分 9.8，危害等级严重。"
published = "2017-02-06T15:59:00.137"
remediation = "立即升级 DotNetNuke 至 7.4.1 或更高版本，该版本已修复安装向导未授权访问问题。如无法立即升级，删除或重命名 Install 目录下的 InstallWizard.aspx 文件，或在 Web 服务器（IIS）层面限制对 /Install/InstallWizard.aspx 路径的访问，仅允许管理员 IP 访问。"
score = 9.8
severity = "CRITICAL"
sources = ["nuclei"]
title = "DotNetNuke 安装向导权限绕过漏洞"
updated = "2026-06-17T00:24:46.163"

