[basic]
description = "WordPress Frontend Uploader 插件 0.9.2 版本存在跨站脚本（XSS）漏洞，远程攻击者无需身份认证即可通过向默认 URI 的 `errors[fu-disallowed-mime-type][0][name]` 参数中注入恶意的 Web 脚本或 HTML 代码，当管理员或其他用户访问受影响页面时，恶意脚本将在浏览器中执行，可能导致敏感信息泄露、会话劫持或钓鱼攻击。该漏洞影响 Frontend Uploader 0.9.2 及可能更早版本，攻击复杂度较低，但需要用户交互触发。"
published = "2015-01-02T20:59:02.587"
remediation = "立即升级 Frontend Uploader 插件至最新版本（≥0.9.3），或直接停用并删除该插件。如无法升级，在 WordPress 后台 → 插件 → 编辑器中找到 frontend-uploader.php，对 `$_GET['errors']` 和 `$_POST` 参数添加 `esc_html()` 或 `htmlspecialchars()` 转义处理，防止恶意脚本注入。"
score = 4.3
severity = "MEDIUM"
sources = ["nuclei"]
title = "WordPress Frontend Uploader 插件 0.9.2 跨站脚本漏洞"
updated = "2026-06-17T00:18:22.940"

