[basic]
description = "Fortinet FortiOS 5.2.0至5.2.2版本的SSLVPN登录页面存在跨站脚本（XSS）漏洞。该漏洞源于程序对用户输入参数未进行充分的过滤与转义处理，远程攻击者可通过向目标系统SSLVPN登录页面提交特制的恶意请求，注入任意Web脚本或HTML代码。当管理员或其他用户访问受影响的登录页面时，注入的脚本将在浏览器中执行，可能导致敏感信息泄露（如会话令牌窃取）。攻击者无需身份认证，但需要诱使用户访问恶意构造的链接。Fortinet已在FortiOS 5.2.3版本中修复此漏洞。"
published = "2015-05-12T19:59:08.053"
remediation = "升级 FortiOS 至 5.2.3 或更高版本，该版本修复了 SSLVPN 登录页面的跨站脚本注入问题。如无法立即升级，可在 FortiGate 上配置 Web 过滤策略，对 SSLVPN 登录页面的输入参数进行严格校验，并启用 HTTP Content-Security-Policy 头以缓解 XSS 攻击风险。"
score = 4.3
severity = "MEDIUM"
sources = ["nuclei"]
title = "Fortinet FortiOS SSLVPN 登录页面跨站脚本漏洞"
updated = "2026-06-17T00:23:09.870"

