[basic]
description = "SuSE Linux 6.x 系统的 aaa_base（6.3 版本）及更早版本的 cron.daily 脚本在清理 /tmp 目录过期文件时存在空格文件名处理缺陷。由于脚本未对包含空格的文件名进行正确的引号包裹或转义处理，本地攻击者可在 /tmp 下创建文件名包含空格的特制文件，当 aaa_base 自动删除过期文件时，会将空格分割后的文件名片段解析为多个独立参数，导致系统意外删除其他非目标文件。该漏洞影响 SuSE Linux 6.x 系列，CVSS 2.1 低危，需本地访问权限方可利用。"
published = "2000-05-02T04:00:00.000"
remediation = '升级 SuSE Linux 至 6.4 及以上版本，或安装 SuSE 官方提供的 aaa_base 安全补丁。如无法升级，可修改 aaa_base 脚本中清理 /tmp 目录的逻辑，对文件名变量添加双引号包裹（如 `"$file"`）以防止 shell 通配符/空格解析错误，同时限制清理范围仅针对应用自身创建的文件而非全目录扫描。'
score = 2.1
severity = "LOW"
sources = ["avd"]
title = "SuSE Linux aaa_base 任意文件删除漏洞"
updated = "2026-06-16T21:51:24.927"

