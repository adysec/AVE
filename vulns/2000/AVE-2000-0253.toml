[basic]
description = "华盛顿大学（University of Washington）开发的 IMAP 服务程序 imapd 4.7 版本存在缓冲区溢出漏洞。已通过身份认证、拥有合法邮箱账户的用户，可向服务器发送超长的 LIST 等 IMAP 命令，使服务端在处理命令参数时发生缓冲区溢出，进而覆盖返回地址并执行任意命令。该漏洞影响运行 WU-IMAP 4.7 的邮件服务器，攻击前提是攻击者需具备一个有效的系统账户，利用方式是通过构造畸形 IMAP 命令触发溢出实现权限提升或远程命令执行。"
published = "2000-04-16T04:00:00.000"
remediation = "立即将 University of Washington imapd 升级至 4.7c2（2000.287 之后的修复版本）或更高版本（建议升级到 2000.315 及以上）。如无法立即升级，可在防火墙/ACL 上限制仅允许受信任 IP 访问 TCP 143 端口的 IMAP 服务，并禁用匿名或低权限账户的远程登录，同时启用 tcp_wrappers 限制访问来源作为临时缓解。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "华盛顿大学 imapd IMAP 服务缓冲区溢出漏洞"
updated = "2026-06-16T21:51:23.750"

