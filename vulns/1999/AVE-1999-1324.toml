[basic]
description = "SSH 1.2.25、1.2.23 及更早版本在使用 CBC（密码块链接）或 CFB（64位密码反馈）加密模式时存在插入攻击漏洞。远程攻击者利用已知明文攻击，可计算出通过 CRC-32 校验的有效数据包，从而在 SSH 客户端与服务器之间的已加密数据流中插入任意数据。该漏洞影响了早期 SSH 协议的多种实现，威胁数据流完整性与机密性。CVSS 评分 5.0，危害等级中等。"
published = "1998-06-12T04:00:00.000"
remediation = "立即升级至 SSH 2.x 协议（如 OpenSSH 3.4p1 及以上版本），在 sshd_config 中配置 Protocol 2 禁用 SSH-1 协议以彻底规避该漏洞。如无法升级，在服务端配置 Ciphers 禁用 CBC 模式密码（如仅使用 aes128-ctr/aes256-ctr），并启用 HMAC 完整性校验（MACs hmac-sha1），同时禁用压缩和转发代理作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "SSH 1.2 CBC/CFB模式加密流数据插入攻击漏洞"
updated = "2026-06-16T21:49:41.383"

