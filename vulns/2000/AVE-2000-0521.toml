[basic]
description = "Linux 系统 pam_console PAM 模块存在认证绕过漏洞，当 gdm 或 kdm 等显示管理器启用 XDMCP 协议时，未经授权的用户可通过控制台访问系统并重启机器，导致系统可用性受损。"
published = "2000-07-27"
remediation = "应用 RedHat 安全公告 RHSA-2000-044 提供的补丁，或禁用 gdm/kdm 的 XDMCP 功能以防止未授权控制台访问。"
