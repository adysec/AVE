[basic]
description = "Windows 2000 在安装过程中直至系统首次重启前，管理员密码尚未激活生效，导致远程攻击者可在无需任何身份认证的情况下，通过网络共享协议直接连接目标系统的 ADMIN$ 隐藏共享目录，获取完全访问权限。该漏洞影响 Windows 2000 所有版本，攻击者只需知道目标 IP 地址即可在安装阶段未完成时实施攻击，可能导致系统被完全控制、敏感信息泄露或恶意软件植入。由于 ADMIN$ 共享拥有系统最高权限，攻击者可利用此漏洞在系统重启前执行任意操作。"
published = "2000-02-15T05:00:00.000"
remediation = "安装 Windows 2000 后立即重启系统以激活 Administrator 密码；重启前勿将系统接入网络；安装后立即通过本地控制台设置强管理员密码；禁用不必要的 ADMIN$ 默认共享（net share ADMIN$ /delete）；升级至受支持的操作系统版本（如 Windows Server 2019/2022）以彻底规避此漏洞。"
score = 10
severity = "CRITICAL"
sources = ["cve"]
title = "Microsoft Windows 2000 ADMIN$共享未授权访问漏洞"
updated = "2026-06-16T21:51:15.520"

