[basic]
description = "HP Laserjet 打印机 JetDirect 网卡在配置 TCP/IP 协议时存在无密码认证漏洞。远程攻击者无需任何凭证即可通过网络连接至打印机管理接口，进而修改设备 IP 地址或禁用日志记录功能，导致打印机管理权限被非法获取。该漏洞影响配置了 JetDirect 网卡的 HP Laserjet 系列打印机，CVSS 评分 7.5，危害等级高。厂商建议启用密码认证机制以修复此漏洞。"
published = "1997-10-04T04:00:00.000"
remediation = "为 JetDirect 卡设置管理员密码，通过 telnet 或 Web 界面访问打印机并执行 `password: <密码>` 命令启用密码保护；在网络边界防火墙限制对打印机 9100/TCP 端口的访问，仅允许受信任管理 IP 连接。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "HP LaserJet 打印机 JetDirect 网卡 TCP/IP 未授权访问漏洞"
updated = "2026-06-16T21:49:37.477"

