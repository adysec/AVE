[basic]
description = "Inso dwhttpd 3.1a4（AnswerBook2 Web服务器）存在拒绝服务漏洞。远程攻击者可通过向目标服务器发送包含超长 Content-Length 头的 HTTP POST 请求，耗尽服务器资源导致服务崩溃。该漏洞影响 dwhttpd 3.1a4 版本，在未打补丁的情况下，攻击者无需认证即可实施攻击，影响服务可用性。"
published = "1998-08-23T04:00:00.000"
remediation = "该产品 Inso dwhttpd 3.1a4（AnswerBook2 Web 服务器）已停止维护，官方未发布任何安全补丁。建议立即停止使用该服务，迁移至受支持的现代 Web 服务器（如 Apache HTTP Server 或 Nginx）。如暂时无法迁移，可在反向代理或防火墙层面限制 HTTP POST 请求的 Content-Length 最大值（如限制为 10MB），并仅允许可信 IP 访问该服务作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Inso dwhttpd 拒绝服务漏洞"
updated = "2026-06-16T21:50:23.673"

