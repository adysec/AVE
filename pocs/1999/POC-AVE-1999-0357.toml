[info]
author = "ave"
description = "检测目标 IIS 服务器上是否存在 codebrws.asp 示例文件，该文件允许远程攻击者读取 Web 根目录下 .asp/.inc/.htm/.html 文件的源代码"
id = "POC-AVE-1999-0357"
name = "Microsoft IIS/Site Server codebrws.asp 任意文件读取漏洞 PoC"
severity = "medium"
tags = ["ave-1999-0357"]
vuln_id = [
    "CVE-1999-0739",
    "AVE-1999-0357",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/iissamples/sdk/asp/docs/codebrws.asp"
protocol = "http"

[poc.requests.body]
content = ""
type = "raw"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["View Active Server Page Source"]
