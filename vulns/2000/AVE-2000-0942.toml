[basic]
description = "iputils 中的 ping 工具在获取原始套接字后未正确放弃 root 特权，导致即使后续代码存在缺陷，攻击者也可利用这些缺陷以高权限执行任意代码。该漏洞影响 Red Hat Linux 6.2 至 7J 及其他使用 iputils 20001010 之前版本的操作系统。本地攻击者可通过向存在缺陷的 ping 程序发送特制请求触发漏洞，实现权限提升，CVSS 评分 7.5，危害等级高。"
published = "2000-10-18T04:00:00.000"
remediation = "升级 iputils 至 20001010 或更高版本，该版本在获取原始套接字后正确释放特权。对于 Red Hat Linux 6.2 至 7J 系统，通过 `rpm -Uvh iputils-20001010-*.rpm` 安装更新包；其他发行版使用对应包管理器更新。如无法升级，移除 ping 的 SUID 位（`chmod u-s /bin/ping`）以降低提权风险，但会限制普通用户使用 ping 功能。"
score = 7.5
severity = "HIGH"
sources = ["redhat"]
title = "Red Hat Linux iputils ping 未释放特权漏洞"
updated = "2026-06-16T21:53:23.697"

