[basic]
description = "汉王 EFaceGO 人脸识别门禁系统的 queryManageDeviceLogs.do 接口存在 SQL 注入漏洞，原因是 columnKey 参数使用 MyBatis ${} 拼接方式处理用户输入，未进行预编译防护。攻击者可通过向该接口发送特制请求，利用该漏洞注入恶意 SQL 语句，进而获取数据库敏感信息、篡改设备配置或导致系统权限失陷。攻击条件低，无需身份认证即可利用，影响设备正常运行与企业安全管理。"
published = "nday"
remediation = "联系汉王厂商获取 TVD-2026-HWN001 安全补丁进行升级；将 columnKey 参数的 MyBatis ${} 拼接改为 #{} 预编译绑定，防止 SQL 注入；在应用服务器或网络层面限制 /queryManageDeviceLogs.do 接口仅允许内网 IP 访问；部署 WAF 规则拦截 columnKey 参数中的 SQL 注入特征 payload。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "汉王 EFaceGO SQL注入漏洞"
updated = "nday"

