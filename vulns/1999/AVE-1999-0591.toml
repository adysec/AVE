[basic]
description = "Microsoft Site Server 2.0 与 IIS 4.0 存在任意文件上传漏洞，由于服务器未对上传文件类型进行有效过滤，远程攻击者可通过向目标网站上传包含恶意 ASP 脚本的文件，从而在服务器上远程执行任意命令。该漏洞影响部署了 IIS 4.0 的 Microsoft Site Server 2.0 系统，攻击者无需身份认证即可利用，CVSS 评分 7.2，危害等级高。"
published = "1999-01-30T05:00:00.000"
remediation = "建议立即删除 /scripts 目录下的 cpshost.dll、uploadn.asp、uploadx.asp、upload.asp、repost.asp、postinfo.asp 等文件；如无需 Site Server 功能应直接卸载该组件。通过 IIS MMC 管理控制台检查并移除 Web 目录的 Write 写权限。使用 NTFS 文件权限确保匿名 Internet 账户 (IUSR_MACHINE) 对文件系统没有任何写入权限。鉴于该产品已停止支持，建议升级到受支持的 Windows Server 版本及 IIS。"
score = 7.2
severity = "HIGH"
sources = ["epss"]
title = "Microsoft Site Server 2.0 任意文件上传漏洞"
updated = "2026-06-16T21:48:13.747"

