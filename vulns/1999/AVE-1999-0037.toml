[basic]
description = "Windows NT 中的屏幕保护程序在安全上下文切换时未正确验证权限变更，导致本地攻击者可通过物理访问终端或诱导系统进入屏保状态触发该漏洞，以提升后的权限执行任意程序。该漏洞影响 Windows NT 4.0 及 NT 3.5.1 的多个 Service Pack 版本，CVSS 评分 7.2，危害等级高。"
published = "1999-03-12T05:00:00.000"
remediation = "建议升级至 Windows 2000 或更高版本系统（Windows NT 4.0/3.5.1 已于 2004 年停止支持，不再提供安全更新）。如无法升级，可在组策略编辑器（gpedit.msc）中启用「屏幕保护程序超时锁定」策略，并将屏幕保护程序启动等待时间设为不超过 15 分钟，同时确保所有用户账户均设有强密码，限制非授权用户的本地登录权限。"
score = 7.2
severity = "HIGH"
sources = ["exploitdb"]
title = "Microsoft Windows NT 屏幕保护程序权限提升漏洞"
updated = "2026-06-16T21:48:16.647"

