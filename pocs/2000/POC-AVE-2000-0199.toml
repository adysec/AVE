[info]
author = "ave"
description = "检测 SCO UnixWare 7.x 上 ARCserve 代理服务是否存在，验证本地符号链接攻击条件（/tmp 目录可写且 ARCserve 相关临时文件存在）"
id = "POC-AVE-2000-0199"
name = "SCO UnixWare ARCserver 本地符号链接漏洞 PoC"
severity = "low"
tags = ["ave-2000-0199"]
vuln_id = [
    "CVE-2000-0224",
    "AVE-2000-0199",
]

[poc]
logic = "any"

[[poc.requests]]
path = "/tmp/.arcserve"
protocol = "file"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [""]

[[poc.requests]]
path = "/opt/arcserve/agent"
protocol = "file"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [""]

[[poc.requests]]
path = "/usr/lib/arcserve"
protocol = "file"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [""]
