[basic]
description = "Shiva 远程访问服务器（Shiva Access Manager / LanRover）在默认安装时存在弱口令或未授权访问缺陷，攻击者可在未提供有效凭据的情况下远程连接并获取设备的管理访问权限，进而控制拨号接入网络、读取或修改配置。该漏洞利用条件为设备暴露在可网络访问的范围内且未修改默认凭证，属于因默认配置不当导致的高危认证绕过问题。"
published = "1999-12-31"
remediation = "修改 Shiva 远程访问服务器的所有默认账户口令，禁用不必要的远程管理访问，配置 ACL 限制管理接口仅允许受信任 IP 访问，并将设备固件/软件升级至厂商发布的安全版本。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "Shiva 远程访问服务器 默认账户弱口令未授权访问"
updated = "1999-12-31"

