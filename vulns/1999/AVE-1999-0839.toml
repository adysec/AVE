[basic]
description = "Netscape Navigator 在存储用户的 Netscape 邮件密码时采用了较弱的加密保护机制，导致本地保存的凭据安全性不足。该漏洞影响安装并使用 Netscape 邮件功能的 Netscape Navigator 用户，攻击条件为攻击者需具备对受害者本地计算机的访问权限（如共享主机、物理接触或已获取本地账户权限），可通过读取并解密浏览器存储的弱加密密码文件来获取用户邮件账户明文密码，进而冒用身份登录邮件系统，造成敏感信息泄露与账户被非法控制。"
published = "2000-01-12T05:00:00.000"
remediation = '建议将 Netscape Navigator 升级至 4.7 或更高版本（该版本改进了密码存储加密强度），并启用主密码（Master Password）功能对本地存储的邮件密码进行二次加密保护。如暂无法升级，应在邮件客户端中取消"记住密码"选项，改为每次手动输入，并限制本机物理与登录访问权限，避免邮件密码文件被本地提取破解。'
score = 5
severity = "MEDIUM"
sources = ["avd"]
