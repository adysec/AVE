[basic]
description = "Datadog dd-trace-go Go 客户端库在解析 W3C  baggage 传播头时存在资源分配无限制漏洞。该库在提取（extract）路径上未对 baggage HTTP 头的条目数量（默认上限 64）和总字节数（默认上限 8192）进行限制，仅对注入（inject）路径实施了检查。远程未认证攻击者可向目标服务发送包含任意大量逗号分隔键值对或单个超大值的 baggage 头，导致服务端为每个键值对分配哈希表条目，造成 CPU 和内存资源耗尽，引发拒绝服务。启用 baggage 传播风格的 HTTP 服务均受影响，该风格在大多数受影响追踪器中默认开启。DataDog 已在 dd-trace-go 2.8.1 版本中修复此漏洞。"
published = "2026-07-17T21:17:07.337"
remediation = "立即将 dd-trace-go 升级至 2.8.1 或更高版本。如无法立即升级，从 DD_TRACE_PROPAGATION_STYLE 中移除 baggage（或设置 DD_TRACE_PROPAGATION_STYLE_EXTRACT 排除 baggage），并在反向代理层限制 HTTP 请求头大小（如 Nginx 设置 large_client_header_buffers 4 8k，Envoy 设置 max_request_headers_kb）。"
score = 7.5
severity = "HIGH"
sources = ["ghsa"]
title = "Datadog dd-trace-go W3C Baggage 标头解析拒绝服务漏洞"
updated = "2026-07-20T16:17:04.673"

