[basic]
description = "FreeBSD 在 2000 年 1 月 14 日发布的 SSH 安全补丁中，错误地将 SSH 服务配置为同时在 722 和 22 两个端口上监听。远程攻击者利用这一配置错误，可在 22 端口被防火墙过滤的情况下，通过 722 端口绕过访问控制策略，未经授权访问目标系统的 SSH 服务。该漏洞影响 FreeBSD 系统，CVSS 评分 7.5，危害等级高危。"
published = "2000-06-07T04:00:00.000"
remediation = "升级至 OpenSSH 2.1 及以上版本（此后的官方发布版已移除 722 端口的监听），或在 /etc/ssh/sshd_config 中显式设置 Port 22 且不包含 Port 722，重启 sshd 服务。临时缓解措施可在防火墙层面添加规则阻止外部对端口 722 的访问，例如 iptables -A INPUT -p tcp --dport 722 -j DROP。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "FreeBSD SSH 安全绕过漏洞"
updated = "2026-06-16T21:51:56.300"

