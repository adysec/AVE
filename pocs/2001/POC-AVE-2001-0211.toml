[info]
author = "AVE"
description = "检测 Microsoft Outlook 98/2000/2002 Outlook View ActiveX 控件远程代码执行漏洞。通过构造包含 ActiveX 对象引用的 HTML 页面，验证目标 Outlook 客户端是否存在该漏洞。"
id = "POC-AVE-2001-0211"
name = "CVE-2001-0538 PoC"
severity = "critical"
tags = ["cve-2001-0538"]
vuln_id = [
    "CVE-2001-0538",
    "AVE-2001-0211",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/"
protocol = "http"

[poc.requests.body]
content = ""
type = "raw"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["Microsoft Outlook"]
