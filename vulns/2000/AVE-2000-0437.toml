[basic]
description = '3R Soft MailStudio 2000 2.0 及更早版本的 mailview.cgi CGI 程序存在路径遍历漏洞，远程未认证攻击者可通过在参数中构造 ".." (点点) 路径遍历序列，绕过目录限制读取服务器文件系统上的任意文件。该漏洞影响 MailStudio 2000 2.0 及更早版本，CVSS 5.0 (AV:N/AC:L/Au:N/C:P/I:N/A:N)，攻击复杂度低、无需认证、仅影响机密性。攻击者可利用此漏洞读取敏感系统文件、配置文件或源代码，导致信息泄露。ExploitDB 已收录公开利用代码 (EDB-ID: 20008)。'
published = "2000-06-09T04:00:00.000"
remediation = '建议立即升级 3R Soft MailStudio 2000 至 2.0 之后的最新版本（如 2.01 或更高版本），或从 3R Soft 官网下载官方补丁补丁包（如 MS2000-PATCH-20000609.exe）并安装。若暂无法升级，请在 Web 服务器层面配置 URL 重写规则拦截包含 ../ 或 ..\\ 的请求路径，或在 Web 应用防火墙（WAF）层面启用目录遍历防护规则拦截 ../ 遍历攻击，同时限制 mailview.cgi 只能访问 Web 根目录下的文件。'
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "3R Soft MailStudio 2000 2.0 任意文件访问漏洞"
updated = "2026-06-16T21:51:55.467"

