[basic]
description = "GnuPG（GPG）1.0.4 及之前版本在处理分离签名时存在签名验证缺陷，未能正确校验分离签名的有效性，导致攻击者可在不触发任何告警的情况下篡改文件内容。该漏洞为本地攻击向量，攻击者需具备对目标文件的写入权限，利用方式为替换已签名文件及其分离签名文件，使接收方误认为篡改后的文件仍来自可信来源。受影响版本包括 GnuPG 1.0.4 及更早版本，CVSS 评分 2.1，危害等级低。"
published = "2001-02-12T05:00:00.000"
remediation = "升级 GnuPG 至 1.0.4b 或更高版本。Debian 用户运行 `apt-get update && apt-get install gnupg`，Red Hat 用户安装 RHSA-2000-131 提供的更新包。如无法升级，在验证分离签名时手动检查文件哈希值并与签名中的哈希比对，作为临时缓解措施。"
score = 2.1
severity = "LOW"
sources = ["redhat"]
title = "GnuPG 分离签名验证绕过漏洞"
updated = "2026-06-16T21:53:36.093"

