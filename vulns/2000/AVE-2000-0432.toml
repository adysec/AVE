[basic]
description = "Microsoft Windows 95/98/NT 4.0/2000 系统中的 CIFS Computer Browser 服务存在拒绝服务漏洞。远程攻击者无需身份认证即可向主浏览器（Master Browser）发送特制的 ResetBrowser 数据帧，导致目标系统上的浏览器服务崩溃或停止响应，造成网络资源浏览功能不可用。该漏洞攻击复杂度低，仅需通过网络发送构造的数据包即可触发，无需用户交互。Microsoft 已在 MS00-036 安全公告中发布补丁修复此漏洞。"
published = "2000-05-25T04:00:00.000"
remediation = '安装 Microsoft 安全公告 MS00-036 对应补丁：Windows NT 4.0 下载 https://www.microsoft.com/download/details.aspx?FamilyId=8375821F-9F40-4FC1-9757-D8D056B76351，Windows 2000 下载 https://www.microsoft.com/download/details.aspx?FamilyId=4B4CB25B-66F8-4890-A762-B45447DF213E。安装后设置注册表项 RefuseReset 为 1（DWORD），路径为 HKLM\SYSTEM\CurrentControlSet\Services\MrxSmb\Parameters，使浏览器忽略 ResetBrowser 帧。临时缓解措施：在防火墙上阻止 UDP 端口 138，防止外部攻击者发送恶意帧。'
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Microsoft Windows CIFS Computer Browser 拒绝服务漏洞"
updated = "2026-06-16T21:51:38.717"

