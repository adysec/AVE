[basic]
description = "Guild FTPd 0.9.7 存在目录遍历信息泄露漏洞。远程攻击者通过在 FTP 命令中使用 `..`（点点）序列进行目录遍历，由于服务器对存在与不存在的文件返回不同的错误信息，导致可探测 FTP 根目录之外文件的存在性。该漏洞无需身份认证即可利用，影响 DrPhibez 和 Nitro187 开发的 Guild FTPd 0.9.7 版本，CVSS 评分 7.5，危害等级高，可导致敏感文件路径信息泄露，为后续攻击提供情报支撑。"
published = "2000-07-08T04:00:00.000"
remediation = "建议立即将 Guild FTPd 升级至修复该问题的最新版本；由于该软件已停止维护，最佳方案是迁移至活跃维护的 FTP 服务器（如 vsftpd 或 ProFTPD），并配置严格的 chroot 隔离将用户限制在其主目录内。如无法立即迁移，可采取以下缓解措施：（1）禁用匿名 FTP 登录；（2）在防火墙层面限制对 TCP 端口 21 的访问来源，仅允许受信 IP 连接；（3）在 FTP 根目录下避免存放敏感文件，减小信息泄露影响。"
score = 7.5
severity = "HIGH"
sources = ["exploitdb"]
title = "Guild FTPD 文件存在泄露漏洞"
updated = "2026-06-16T21:52:10.107"

