[basic]
description = "NullSoft Winamp 2.10 播放器在处理 .pls 播放列表文件时存在缓冲区溢出漏洞，远程攻击者可构造包含超长条目的恶意 .pls 文件并诱导用户打开，触发缓冲区溢出，进而导致任意代码执行。该漏洞无需身份认证即可远程利用，影响 Winamp 2.10 及之前版本。"
published = "2000-01-04T05:00:00.000"
remediation = "升级 Winamp 至 2.11 或更高版本，该版本已修复 .pls 文件解析中的缓冲区溢出漏洞。作为临时缓解措施，不要打开来源不明的 .pls 播放列表文件，并通过安全软件拦截异常进程行为。"
score = 7.2
severity = "HIGH"
sources = ["epss"]
title = "NullSoft Winamp 2.10 PLS 文件解析缓冲区溢出漏洞"
updated = "2026-06-16T21:50:53.757"

