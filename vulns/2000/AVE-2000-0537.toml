[basic]
description = "BEA WebLogic 服务器 PageCompileServlet 存在未授权访问漏洞，远程攻击者无需认证即可直接调用该 Servlet 编译并执行任意 JHTML 代码，导致远程命令执行。该漏洞影响 WebLogic 3.1.8、4.0.4、4.5.1 及 5.1.x 等多个版本，CVSS 评分 10.0，危害等级严重。厂商已发布安全公告，建议升级至不受影响版本。"
published = "2000-10-20T04:00:00.000"
remediation = "升级 BEA WebLogic Server 至 5.1.x 之后的安全版本（如 6.0 及以上），或部署 BEA 官方安全公告 (Security Alert 000731) 提供的补丁。如无法升级，在 web.xml 中移除 PageCompileServlet 映射或添加 security-constraint 限制访问；也可在 Apache/IIS 反向代理层屏蔽对 /servlet/PageCompileServlet 路径的请求作为临时缓解。"
score = 10
severity = "CRITICAL"
sources = ["cve"]
title = "BEA WebLogic PageCompileServlet 远程命令执行漏洞"
updated = "2026-06-16T21:52:15.920"

