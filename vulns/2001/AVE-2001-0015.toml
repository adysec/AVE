[basic]
description = "Oops! WWW 代理服务器 1.4.6 及可能其他版本存在堆缓冲区溢出漏洞。远程攻击者通过控制反向 DNS 查询结果，向服务器返回超长的主机名或域名，触发堆缓冲区溢出，从而可执行任意命令。该漏洞 CVSS 评分 10.0，危害等级严重，无需认证即可远程利用。"
published = "2001-02-12T05:00:00.000"
remediation = "建议立即升级 oops proxy server 至 1.4.7 或更高修复版本；若项目已停止维护，建议迁移至 Squid、HAProxy 等仍在活跃维护的代理服务器产品。临时缓解措施：在 oops 配置中禁用 reverse DNS lookup 功能（如有相关选项），同时在网络层通过 iptables 限制仅信任源可访问代理端口（默认 8080），降低被远程利用的风险。"
score = 10
severity = "CRITICAL"
sources = ["exploitdb"]
title = "oops WWW proxy server 堆缓冲区溢出漏洞"
updated = "2026-06-16T21:53:31.220"

