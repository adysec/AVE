[basic]
description = "Linux kreatecd 程序存在路径信任漏洞，该程序在调用 cdrecord 工具时信任用户提供的路径参数，未对路径进行充分校验。本地攻击者可通过构造恶意路径并诱使 kreatecd 执行，从而以 root 权限执行任意代码，实现本地权限提升。该漏洞影响 Halloween Linux 4.0 及 S.u.S.E. Linux 6.0/6.1/6.2/6.3 等多个发行版本，CVSS 评分 7.2，危害等级高。"
published = "2000-03-16T05:00:00.000"
remediation = "立即移除 kreatecd 的 setuid 权限位（chmod u-s /opt/kde/bin/kreatecd），阻止本地用户以 root 权限执行任意程序。同时升级到已修复此漏洞的 KDE 1.x 以上版本，或迁移至受支持的现代 Linux 发行版（如 openSUSE Leap/SUSE Linux Enterprise Server），这些版本已不包含该有漏洞的组件。"
score = 7.2
severity = "HIGH"
sources = ["epss"]
title = "SuSE Linux kreatecd 本地权限提升漏洞"
updated = "2026-06-16T21:51:16.747"

