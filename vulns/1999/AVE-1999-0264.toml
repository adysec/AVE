[basic]
description = "Sybase PowerDynamo 个人 Web 服务器存在路径遍历漏洞。攻击者无需身份认证即可通过 URL 中的 ../ 序列绕过访问限制，远程读取服务器文件系统上的任意文件（如 /etc/passwd 等敏感文件），导致敏感信息泄露。该漏洞影响系统机密性，攻击复杂度低。"
published = "2000-04-11"
remediation = "Sybase PowerDynamo 已停止维护，建议立即迁移至 SAP 官方推荐的替代产品（如 SAP ASE Web 服务或迁移至现代 Web 服务器）。如无法迁移，在 Web 服务器层面配置 URL 重写规则拦截包含 .. 的请求路径，并限制 Web 服务进程对系统敏感文件的读取权限。"
score = 5.0
severity = "MEDIUM"
sources = ["cve"]
title = "Sybase PowerDynamo 路径穿越任意文件读取漏洞"
updated = "2026-06-16"

