[basic]
description = "美特 CRM 系统的 sendfile.jsp 接口存在文件上传漏洞，未经身份认证的远程攻击者可通过向该接口发送特制的恶意文件请求，绕过文件类型检查将 JSP 木马文件上传至服务器可访问目录，进而获得服务器控制权限，实现远程代码执行。该漏洞影响美特 CRM 多个版本，危害严重，建议用户尽快升级或限制接口访问权限。"
published = "0702"
remediation = "立即将美特 MetaCRM 升级至高于 6.4.2 的官方安全版本；若暂无法升级，在应用服务器上删除、重命名或禁止访问 /business/common/importdata/sendfile.jsp，并在 Web 服务器/WAF 拦截对该路径的 multipart 上传请求；限制 CRM 仅内网访问、关闭公网暴露，对上传目录禁止 JSP/脚本执行并定期排查 webshell，待厂商发布补丁后尽快安装。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "美特 CRM 文件上传远程代码执行漏洞"
updated = "0702"

