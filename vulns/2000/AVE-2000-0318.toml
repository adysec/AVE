[basic]
description = "Intel NetStructure 7110 和 7180 设备存在未记录的后门账户漏洞，设备内置了 servnow、root 和 wizard 三个隐藏账户，其密码基于设备 MAC 地址生成且极易被猜测。远程攻击者无需认证即可通过猜测密码登录设备获取 root 权限，完全控制目标设备。该漏洞影响 Intel NetStructure 7110 及 7180 系列产品，危害严重。"
published = "2000-05-08T04:00:00.000"
remediation = "立即禁用 servnow、root、wizard 等未记录后门账号或修改为强密码，避免密码基于 MAC 地址；在网络边界防火墙限制对设备管理端口（如 Telnet/SSH/HTTP）的源 IP 访问白名单；如业务允许，建议将设备隔离到独立管理 VLAN 中并关闭不必要的远程管理服务。"
score = 10
severity = "CRITICAL"
sources = ["cve"]
title = "Intel NetStructure 7110 未记录密码漏洞"
updated = "2026-06-16T21:51:36.250"

