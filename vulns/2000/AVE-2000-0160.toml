[basic]
description = "iPlanet Web Server 4.1 存在拒绝服务漏洞，远程攻击者无需认证即可向目标服务器发送大量 HTTP GET 请求，消耗服务器大量内存资源导致系统内核崩溃，造成服务不可用。该漏洞影响 iPlanet Web Server 4.1 版本，CVSS 评分 5.0，危害等级中等，攻击复杂度低且无需特殊权限。"
published = "2000-02-23T05:00:00.000"
remediation = "升级 iPlanet Web Server 至 4.1 Service Pack 1 或更高版本，该版本已限制单连接最大并发请求数。如无法升级，可在 Web 服务器前端部署反向代理或负载均衡设备（如 Apache/Nginx），配置 `limit_req` 模块限制单 IP 请求速率；同时在操作系统层面调整连接跟踪表大小（`net.ipv4.netfilter.ip_conntrack_max`），防止洪泛请求耗尽内核内存触发 panic。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "iPlanet Web Server 4.1 HTTP GET 拒绝服务漏洞"
updated = "2026-06-16T21:51:10.270"

