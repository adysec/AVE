[basic]
description = "GTK+ 库 1.2.8 及之前版本中存在任意可加载模块执行漏洞。该漏洞源于 GTK+ 库在处理 GTK_MODULES 环境变量时未进行有效限制，本地用户可通过设置恶意的 GTK_MODULES 环境变量，在被 setuid/setgid 程序加载 GTK+ 库时，导致程序加载并执行攻击者指定的任意共享模块，从而实现本地权限提升。该漏洞影响使用 GTK+ 1.2.8 的各类 Linux/Unix 系统，攻击者必须具备本地用户权限方可利用。"
published = "2001-02-12T05:00:00.000"
remediation = "禁止将 GTK+ 用于 setuid/setgid 程序，GTK 官方已声明不会修复此问题。正确的架构方案是将程序拆分为：一个最小化的 setuid 后端（通过管道/Unix socket 与 GUI 通信）和一个非特权的前端 GUI 进程。临时缓解措施可在启动 setuid 程序前执行 `unset GTK_MODULES` 以消除模块注入风险，或升级至 GTK+ 2.x/3.x 版本（尽管官方同样不保障 setuid 安全性）。"
score = 7.2
severity = "HIGH"
sources = ["exploitdb"]
title = "GTK+ 1.2.8 任意可加载模块执行本地权限提升漏洞"
updated = "2026-06-16T21:53:37.553"

