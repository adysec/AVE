[basic]
description = "Windows NT 4.0 的 TCP/IP 协议栈组件 tcpip.sys 在处理 ICMP 子网掩码地址请求（Subnet Mask Address Request）数据包时存在缺陷。当目标系统在同一网络接口上绑定了多个 IP 地址时，远程攻击者可向该主机发送特制的 ICMP 子网掩码请求报文，触发协议栈处理异常，导致系统拒绝服务。该漏洞影响 Windows NT 4.0 SP4 之前版本，攻击者无需身份认证即可远程触发，但需目标系统配置多 IP 地址作为前置条件。"
published = "1999-12-31T05:00:00.000"
remediation = "升级到 Windows NT 4.0 Service Pack 4 或更高版本，该补丁修复了 tcpip.sys 对异常 ICMP Subnet Mask Address Request 报文的处理逻辑。如无法升级，可在网络边界防火墙或路由器上过滤入站的 ICMP Subnet Mask 地址请求报文（类型 17、代码 0）。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Microsoft Windows NT 4.0 TCP/IP ICMP Subnet Mask 拒绝服务漏洞"
updated = "2026-06-16T21:49:50.523"

