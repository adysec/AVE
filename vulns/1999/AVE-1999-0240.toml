[basic]
description = "Network Associates Gauntlet Firewall 5.0 在处理畸形的 ICMP 数据包时存在缺陷，远程攻击者无需身份认证即可向目标防火墙发送特制的 ICMP 报文，触发服务崩溃导致拒绝服务。该漏洞直接影响 Gauntlet Firewall 5.0 版本，可造成安全防护中断、网络流量失去过滤，为后续攻击创造条件。利用方式简单，仅需发送构造的恶意 ICMP 数据包即可实现。"
published = "1999-07-30T04:00:00.000"
remediation = "升级到 Network Associates Gauntlet Firewall 5.5 或更高版本，该版本已修复畸形 ICMP 包处理逻辑。如无法升级，可在防火墙上配置 ICMP 包过滤规则，丢弃类型不明的 ICMP 报文作为临时缓解措施。鉴于产品已停止维护，建议迁移至受支持的防火墙解决方案如 McAfee NGFW 或同类产品。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Network Associates Gauntlet Firewall 5.0 ICMP报文拒绝服务漏洞"
updated = "2026-06-16T21:48:50.410"

