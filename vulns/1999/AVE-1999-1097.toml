[basic]
description = "在 BSD 4.4 衍生操作系统（含 BSDI BSD/OS 4.0、FreeBSD 3.2、NetBSD 1.4、OpenBSD 2.5）中，安全等级 1 机制用于阻止 root 用户修改设置了不可变（immutable）和仅追加（append-only）标志的文件。然而，具有 root 权限的攻击者可通过卸载文件系统后使用 fsdb 等文件系统编辑器直接操作底层设备，绕过该保护机制清除文件标志位。该漏洞需攻击者已获得本地 root 权限，利用条件苛刻，但本质上绕过了安全等级的核心防护设计。"
published = "1999-07-02T04:00:00.000"
remediation = "将系统安全级别提升至 2（在 /etc/rc.conf 或 /etc/sysctl.conf 中设置 kern_securelevel=2），此时即使 root 也无法通过卸载文件系统绕过 immutable/append-only 保护标志。如有条件，应升级至各 BSD 发行版修复此漏洞的后续版本（如 OpenBSD 2.6+、FreeBSD 4.0+）。"
score = 2.1
severity = "LOW"
sources = ["avd"]
title = "BSD 系列操作系统 UFS 安全级别绕过漏洞"
updated = "2026-06-16T21:50:20.763"

