[basic]
description = "泛微 e-cology OA 系统的 /api/workflow/reqform/remarkOperate 接口存在远程命令执行漏洞。攻击者通过构造特制的 POST 请求包，利用接口参数校验缺陷，可在未授权情况下向目标服务器注入恶意命令并获得执行权限，进而完全控制服务器。该漏洞影响泛微 e-cology 9 系列版本，危害严重，建议用户立即升级至安全版本。攻击方式简单，只需发送构造的 HTTP 请求即可触发。"
published = "0704"
remediation = "立即升级泛微 Ecology OA 至 2025 年 4 月及以上安全补丁版本（官方已修复该接口的未授权访问与参数过滤缺陷）。临时缓解措施：在 Nginx 或 WAF 上配置规则，对 `/api/workflow/reqform/remarkOperate` 路径实施 POST 请求拦截，或限制该路径仅允许可信 IP 访问。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "泛微OA remarkOperate远程命令执行漏洞"
updated = "0704"

