[basic]
description = "易宇通 KingTrans 物流管理系统的 getAccountTypeByNumber 接口存在 SQL 注入漏洞，由于未对 number 参数进行充分过滤和参数化查询，远程攻击者无需身份认证即可通过构造特制的 SQL 语句注入到后端数据库，导致数据库中的用户信息、物流订单等敏感数据被非法窃取或篡改。该漏洞影响 KingTrans 物流管理系统的多个版本，攻击者可利用该接口在公网直接进行探测利用，危害较大。"
published = "2026-07-21"
remediation = "在代码层面对 number 参数改为预编译/参数化查询并做白名单校验，禁止拼接 SQL；将该接口限制为仅内网或 VPN 可访问，并在前置 WAF/网关拦截 union/select/sleep 等 SQL 注入特征作为临时缓解措施。联系易宇通厂商获取安全补丁或升级至最新版本。"
score = 5.0
severity = "MEDIUM"
sources = ["hwpoc"]
title = "易宇通 KingTrans 物流管理系统 SQL注入漏洞"
updated = "2026-07-21"

