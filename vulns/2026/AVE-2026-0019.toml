[basic]
description = "ARRIS VAP2500 无线接入设备的 list_mac_address.php 接口存在未授权命令注入漏洞，远程攻击者无需任何身份认证即可通过 POST 请求向该接口发送恶意构造的 macaddr 参数，利用 shell 元字符注入执行任意系统命令。攻击者可上传 Webshell 获取设备完全控制权，进而实施内网横向移动和数据窃取等操作。该漏洞影响 ARRIS VAP2500 系列无线接入设备，危害严重。"
published = "2023-08-15"
remediation = "目前 ARRIS 官方未发布针对此漏洞的安全补丁，VAP2500 设备可能已停止支持。建议立即在网络边界防火墙上阻断对设备管理端口（80/443）的未授权外部访问，仅允许受信任的管理 IP 连接。在设备 Web 后台禁用远程管理功能，并通过 ACL 限制管理接口的源 IP 范围。同时监控设备日志中针对 /list_mac_address.php 的异常 POST 请求。如条件允许，建议更换为仍在维护周期内的受支持网络设备。"
score = 9.8
severity = "CRITICAL"
sources = ["hwpoc"]
title = "ARRIS VAP2500 list_mac_address 未授权远程代码执行漏洞"
