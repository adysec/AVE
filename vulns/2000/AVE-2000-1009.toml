[basic]
description = "Rockliffe MailSite Management Agent 的 wconsole.dll 组件存在缓冲区溢出漏洞。远程攻击者无需身份认证，可通过向目标服务发送特制的 HTTP GET 请求，在 query_string 参数中传入超长字符串触发缓冲区溢出，从而在服务器上以系统权限执行任意命令。该漏洞 CVSS v2.0 评分 10.0，危害等级严重，影响 Rockliffe MailSite 邮件系统。"
published = "2000-05-24T04:00:00.000"
remediation = "升级 Rockliffe MailSite 至 5.0 或更高版本（该漏洞在 2000 年 5 月 Bugtraq 公告后由厂商修复）。如无法升级，在防火墙中限制对 MailSite Management Agent HTTP 服务端口的访问，仅允许受信任的管理 IP 连接，并在 Web 服务器层面对 query_string 参数长度进行限制。"
score = 10
severity = "CRITICAL"
sources = ["cve"]
title = "Rockliffe MailSite Management Agent wconsole.dll 缓冲区溢出漏洞"
updated = "2026-06-16T21:51:37.960"

