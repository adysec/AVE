[basic]
description = "ProFTPd 1.2 pre1 至 pre5 版本、wu-ftpd 及 beroftpd 等 FTP 服务器软件存在远程缓冲区溢出漏洞。远程攻击者无需身份认证，可通过向目标服务器发送特制的 MKD（创建目录）和 CWD（切换目录）命令序列，构造嵌套目录结构触发缓冲区溢出，从而获得目标系统的 root 权限。该漏洞危害严重，攻击者可在完全控制受影响服务器后执行任意代码。"
published = "1999-08-27T04:00:00.000"
remediation = "升级 ProFTPd 至 1.2.0rc1 或更高版本，升级 wu-ftpd 至 2.6.1 或更高版本，升级 beroftpd 至已修复版本。如无法升级，在 inetd/xinetd 配置中禁用匿名 FTP 写入权限，并限制 MKD/CWD 命令的目录深度。同时建议迁移至仍在维护的 FTP 服务器软件（如 vsftpd）。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "ProFTPD MKD/CWD 命令远程缓冲区溢出漏洞"
updated = "2026-06-16T21:49:18.797"

