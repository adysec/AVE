[basic]
title = "Microsoft Windows Media Rights Manager 许可证管理器畸形请求拒绝服务漏洞"
description = "Microsoft Windows Media Rights Manager 中的许可证管理器（License Manager）在处理特制的畸形许可证请求时存在拒绝服务漏洞。远程攻击者无需认证即可发送恶意构造的请求，导致许可证管理器停止响应，从而阻止合法用户获取受保护数字内容的播放许可证。重启许可证管理器可恢复正常服务。该漏洞不影响已获得许可证内容的离线播放。"
severity = "MEDIUM"
score = 5.0
sources = ["cve"]
published = "2000-03-17"
updated = "2000-03-17"
remediation = "安装 Microsoft 安全公告 MS00-016 提供的补丁程序，升级 Windows Media Rights Manager 至修复版本。补丁下载地址：https://www.microsoft.com/download/details.aspx?displaylang=en&FamilyID=85E422C6-A6F9-4EAF-BD8E-B5267160D3CC"
[references]
urls = ["https://docs.microsoft.com/en-us/security-updates/securitybulletins/2000/ms00-016", "http://www.securityfocus.com/bid/1058"]
