[basic]
description = "Netscape Communicator 4.73 及更早版本在导入新证书时存在符号链接跟随漏洞。当用户导入证书时，程序会以不安全的方式操作 /tmp 目录下的临时文件，本地攻击者可通过在 /tmp 目录下预先创建符号链接，指向目标用户的可写文件，诱使目标用户导入证书从而触发该漏洞，导致攻击者可以覆盖目标用户的任意文件。该漏洞影响 Netscape Communicator 4.5 至 4.73 版本，CVSS 评分 3.7，危害等级低，攻击复杂度较高，需要本地访问权限及用户交互。"
published = "2000-05-10T04:00:00.000"
remediation = "立即升级至 Netscape Communicator 4.74 或更高版本，该版本已修复导入证书时跟随符号链接的问题。由于 Netscape 产品线已停止维护，建议迁移至 Mozilla Firefox 或 Google Chrome 等现代浏览器。临时缓解措施：在导入证书前手动清理 /tmp 目录中的可疑符号链接，或以非特权用户身份执行证书导入操作。"
score = 3.7
severity = "LOW"
sources = ["avd"]
title = "Netscape Communicator 证书导入符号链接漏洞"
updated = "2026-06-16T21:51:39.343"

