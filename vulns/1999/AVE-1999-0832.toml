[basic]
description = "Microsoft SQL Server 7.0 的 Tabular Data Stream (TDS) 数据包解析存在验证不足的问题。攻击者远程发送特制的畸形 TDS 报文，可触发服务端异常，导致 SQL Server 服务崩溃并进入拒绝服务状态。该漏洞影响 Microsoft SQL Server 7.0 及 7.0 SP1 版本，攻击者无需身份验证即可轻易利用实现服务中断，严重影响数据库服务可用性。"
published = "1999-11-19T05:00:00.000"
remediation = "升级到 Microsoft SQL Server 7.0 Service Pack 2（SP2）或更高版本以修复 TDS 协议解析缺陷。如暂无法升级，可在边界防火墙或 IPS 上过滤并丢弃发往 1433 端口的畸形 TDS 数据包，限制仅允许可信 IP 访问数据库端口，作为临时缓解措施。"
score = 4.3
severity = "MEDIUM"
sources = ["epss"]
