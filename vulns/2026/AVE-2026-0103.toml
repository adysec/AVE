[basic]
description = "WordPress wpDataTables 插件 7.4 及之前版本存在未认证 SQL 注入漏洞。未经身份验证的远程攻击者可通过向受影响插件发送特制的 HTTP 请求，在数据库查询中注入恶意 SQL 语句，进而窃取敏感数据、篡改数据库内容甚至获取网站管理权限。该漏洞影响所有使用 wpDataTables 插件的 WordPress 站点，CVSS 评分 9.3，危害等级严重，需尽快升级至 7.5 或更高版本。"
published = "2026-06-26T15:16:40.230"
remediation = "立即将 wpDataTables 插件升级至 7.5 或更高版本以修复未经身份验证的 SQL 注入漏洞；如无法升级，在 WordPress 后台禁用 wpDataTables 插件直至补丁就绪；同时部署 Web 应用防火墙（WAF）规则拦截包含 SQL 注入特征的请求作为临时缓解措施。"
score = 9.3
severity = "CRITICAL"
sources = ["hwpoc"]
title = "WordPress wpDataTables 插件 SQL 注入漏洞"
updated = "2026-06-26T16:16:32.443"

