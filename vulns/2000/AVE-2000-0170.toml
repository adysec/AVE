[basic]
description = "Corel Linux OS 1.0 的 Dosemu 模拟器默认配置存在权限配置不当漏洞，本地攻击者可利用 Dosemu 默认集成的 system.com 程序执行任意系统命令，从而获取提升后的系统权限。该漏洞影响 Corel Linux OS 1.0 版本，攻击者需拥有本地访问权限即可利用，无需认证，CVSS 评分 7.2，危害等级高。"
published = "2000-03-02T05:00:00.000"
remediation = "升级 dosemu 至 1.2.0 以上版本，或修改 dosemu.conf 配置文件，将 `$_system.com` 设置为禁用，同时限制本地用户对 dosemu 二进制文件的执行权限，仅允许受信任用户组使用。鉴于 Corel Linux 已停止维护，建议迁移至持续更新的 Debian 系发行版。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "Corel Linux OS Dosemu 本地权限提升漏洞"
updated = "2026-06-16T21:51:11.730"

