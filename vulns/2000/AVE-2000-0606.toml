[basic]
description = "EZShopper 3.0 的 loadpage.cgi CGI 脚本存在目录遍历和远程命令执行漏洞。远程攻击者可通过向 loadpage.cgi 传入包含 `..` 序列的路径参数遍历服务器目录，读取任意文件；或通过注入 shell 元字符执行系统命令。该漏洞攻击复杂度低，无需身份认证，可导致敏感信息泄露和服务器被完全控制，影响 EZShopper 3.0 版本。"
published = "2000-02-27T05:00:00.000"
remediation = "立即停止使用 EZShopper 3.0，将该软件从服务器彻底卸载或下线，因其已停止维护且无法获取安全更新。如暂无法下线，请在 Web 服务器（Apache/Nginx）层面配置访问控制规则，禁止外部访问 loadpage.cgi 脚本，并删除或重命名该文件以阻断利用路径。同时检查服务器是否存在 webshell 等后门文件，必要时重建服务器。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "Alex Heiphetz Group eZshopper loadpage.cgi 目录遍历与远程命令执行漏洞"
updated = "2026-06-16T21:51:10.903"

