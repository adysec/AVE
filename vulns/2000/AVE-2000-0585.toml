[basic]
description = "MediaHouse Software Statistics Server LiveStats 5.2 存在缓冲区溢出漏洞，远程攻击者可通过向目标服务器发送超长的 HTTP GET 请求触发该漏洞，导致缓冲区溢出，进而实现任意命令执行。该漏洞影响 MediaHouse Statistics Server 5.02x 版本，攻击者无需身份认证即可远程利用，可造成目标系统机密性、完整性和可用性受损。目前已存在公开的远程利用代码。"
published = "2000-10-20T04:00:00.000"
remediation = "该漏洞存在于 MediaHouse Statistics Server 5.02x 及更早版本，厂商已停止维护，建议立即停用该软件并迁移至其他受支持的 Web 统计服务。如无法立即替换，可在 Web 服务器或反向代理层限制 HTTP GET 请求长度（如 nginx 的 large_client_header_buffers 设置为 4k），并在防火墙仅允许可信 IP 访问该服务端口以缩小攻击面。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "MediaHouse Software Statistics Server LiveStats 5.2 缓冲区溢出漏洞"
updated = "2026-06-16T21:52:27.433"

