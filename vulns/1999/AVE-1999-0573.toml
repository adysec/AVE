[basic]
description = "Microsoft IIS 的 FTP 服务中的 list (ls) 命令存在缓冲区溢出漏洞，远程攻击者无需身份认证即可向目标服务器发送特制的 FTP 列表请求触发该漏洞，导致拒绝服务或远程代码执行。该漏洞影响早期版本的 IIS，攻击条件低，危害严重，建议及时安装安全补丁。"
published = "1999-01-27T05:00:00.000"
remediation = "建议立即安装 Microsoft 安全公告 MS99-003 提供的补丁（Q223783），或升级至 IIS 5.0 及以上版本。如无法升级，可在 IIS 管理器中禁用 FTP 服务（停止 MSFTPSVC 服务），或限制匿名用户对 FTP 根目录的写入权限以降低风险。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "Microsoft IIS FTP LIST 命令缓冲区溢出漏洞"
updated = "2026-06-16T21:48:12.357"

