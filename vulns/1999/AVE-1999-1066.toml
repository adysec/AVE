[basic]
description = "Xlink Technology 的 Omni-NFS/X Enterprise 6.1 中的 NFS 守护进程 nfsd.exe 存在拒绝服务漏洞。远程攻击者可通过向 TCP 111 端口发送设置了 URG（紧急）标志的特殊数据包，触发资源耗尽，导致 NFS 服务不可用。"
published = "1999-10-06"
remediation = "该产品已停止维护，无官方补丁可用。建议在防火墙限制对端口 111 (TCP/UDP) 的外部访问，仅允许可信 IP；如仍需 NFS 功能，请迁移至其他受支持的 NFS 实现。"
score = 5.0
severity = "MEDIUM"
sources = ["cve"]
title = "Xlink Technology Omni-NFS/X Enterprise 6.1 NFS 守护进程拒绝服务漏洞"
updated = "2026-06-16"

