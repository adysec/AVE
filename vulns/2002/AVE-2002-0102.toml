[basic]
description = "OpenSSL 0.9.6e 版本在处理 SSLv2 协议的 CLIENT_MASTER_KEY 消息时存在安全缺陷，s2_srvr.c 中的代码使用断言（assert）来检测缓冲区溢出攻击，而非采用更温和的错误处理机制。未经身份认证的远程攻击者可通过向目标服务器发送特制的 SSLv2 CLIENT_MASTER_KEY 消息，触发断言失败导致 OpenSSL 进程异常终止，造成拒绝服务。该漏洞影响使用 OpenSSL 0.9.6e 及之前版本的服务。"
published = "2003-11-17T05:00:00.000"
remediation = "升级 OpenSSL 至 0.9.7 或更高版本，该漏洞已在 OpenSSL CVS 仓库提交补丁（chngview?cn=7659）修复 s2_srvr.c 中 SSLv2 CLIENT_MASTER_KEY 消息处理使用断言而非安全错误处理的问题。如无法立即升级，可在服务端配置中禁用 SSLv2 协议以缓解风险。"
score = 5
severity = "MEDIUM"
sources = ["osv"]
title = "OpenSSL SSLv2 CLIENT_MASTER_KEY 消息处理拒绝服务漏洞"
updated = "2026-06-16T21:59:34.167"

