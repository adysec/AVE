[basic]
description = "Windows NT 4.0 和 Windows 2000 的 smss.exe 调试子系统存在权限验证缺陷，未能正确验证连接其他进程的程序的合法性。本地攻击者可通过复制特权进程的句柄（Handle），以 DebPloit 等利用工具实现权限提升至 Administrator 或 SYSTEM 级别。该漏洞仅需本地访问权限即可利用，影响所有 Windows NT 4.0 及 Windows 2000 版本，CVSS 评分 7.8，危害等级高危。"
published = "2002-06-25T04:00:00.000"
remediation = "建议升级至 Microsoft Windows 2000 Service Pack 3 (SP3) 或更高版本，Windows NT 4.0 用户应安装 Service Pack 6a (SP6a) 及之后的安全累积更新。此漏洞位于 smss.exe 调试子系统中，攻击者通过复制特权进程句柄即可提升至 SYSTEM 权限，补丁已强制校验进程间连接的认证。如无法升级，建议限制本地用户登录权限并移除不必要的调试权限。作为最后手段，可在组策略中禁用系统调试功能以降低风险。"
score = 7.8
severity = "HIGH"
sources = ["kev"]
title = "Microsoft Windows NT 4.0/2000 smss.exe 本地权限提升漏洞"
updated = "2026-06-16T21:57:17.883"

