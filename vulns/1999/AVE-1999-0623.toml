[basic]
description = "Cat Soft 公司开发的 Serv-U FTP Server 2.5a 存在缓冲区溢出漏洞。远程攻击者无需身份认证即可通过向 FTP 服务的 SITE PASS 命令发送特制超长参数，触发缓冲区溢出，导致 FTP 服务进程崩溃，造成拒绝服务。该漏洞影响 Serv-U FTP Server 2.5a 版本，攻击条件简单，危害等级中等。"
published = "1999-12-01T05:00:00.000"
remediation = "建议立即升级至 Serv-U FTP Server 2.5b 或更高版本（已修复 SITE PASS 缓冲区溢出漏洞）。若暂无法升级，请在防火墙层面限制仅信任 IP 访问 FTP 服务（默认端口 21），并禁用 FTP 服务的 SITE 命令功能作为临时缓解措施。"
