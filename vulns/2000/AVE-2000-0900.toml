[basic]
description = "SCO UnixWare 7.1.0 及更早版本中默认安装的 Sendmail 配置文件 sendmail.cf 存在权限配置缺陷，本地攻击者可利用该漏洞提升至 root 权限。攻击者通过构造特制的配置文件或利用 Sendmail 运行时的特权操作，可完全控制系统，造成机密性、完整性和可用性全部丧失。CVSS 评分 10.0，危害等级严重。"
published = "2001-03-12T05:00:00.000"
remediation = "立即从 SCO 官方 FTP 获取安全公告 SB-99.10a 中提供的补丁，更新 sendmail.cf 配置文件以修复权限配置缺陷。具体操作：下载补丁后执行 `scoadmin` 应用补丁包，或手动替换 `/etc/mail/sendmail.cf` 为加固版本并重启 sendmail 服务（`/etc/init.d/mail stop/start`）。由于 SCO UnixWare 7.1.0 及更早版本已停止官方支持，建议尽快迁移至受支持的 Unix/Linux 发行版以获取持续安全更新。"
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "SCO UnixWare sendmail.cf 权限提升漏洞"
updated = "2026-06-16T21:51:31.803"

