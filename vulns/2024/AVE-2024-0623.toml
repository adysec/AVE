[basic]
description = "Linux 内核 WiFi 子系统 cfg80211 模块存在链接 ID 位图管理逻辑错误，在链接删除过程中过早从 valid_links 位图清除链接 ID，导致后续清理操作（如 cfg80211_cac_event()）因找不到有效链接 ID 而触发内核 WARN_ON() 警告。该漏洞影响 Linux 内核 WiFi 子系统，攻击者需具备本地低权限访问权限且无需用户交互，通过触发特定链接删除操作可触发内核警告导致系统完整性受到低度影响（CVSS 3.3 LOW，AV:L/AC:L/PR:L/UI:N/S:U/C:N/I:L/A:N）。Linux 内核已修复该逻辑顺序问题，将链接 ID 清除移至清理操作完成之后。"
published = "2025-01-15T13:15:14.427"
remediation = '建议升级 Linux 内核至 6.6.75、6.10.14、6.11.3 或更高版本（包含提交 8d5a7b3e1f2c "wifi: cfg80211: clear link ID from bitmap during link delete after clean up" 的版本）。Ubuntu 24.04 LTS 用户请安装 USN-7381-1 提供的 linux-image-6.8.0-52-generic (6.8.0-52.52) 或更新版本；Ubuntu 22.04 LTS 用户请安装 USN-7514-1 提供的 linux-image-6.8.0-1006-oem (6.8.0-1006.6) 或更新版本。如无法立即升级内核，可暂时禁用不使用的 Wi-Fi 接口或限制本地用户对 nl80211 netlink 接口的访问权限作为临时缓解措施。'
score = 3.3
severity = "LOW"
sources = ["msrc"]
title = "Linux kernel cfg80211 链接删除时位图清理顺序错误导致内核警告漏洞"
updated = "2026-06-17T08:14:10.567"

