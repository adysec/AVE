[basic]
description = "wmcdplay 是一款运行于 WindowMaker 桌面环境的 CD 播放器程序，其 1.0 beta1-2 版本存在缓冲区溢出漏洞。本地攻击者可通过向该程序传递超长参数触发缓冲区溢出，导致内存数据被破坏，进而获取系统 root 权限。该漏洞影响 wmcdplay 1.0 beta1-2 版本，CVSS 评分 7.2，危害等级高。目前暂无官方补丁发布，建议用户避免使用存在漏洞的版本或限制本地用户对受影响程序的访问权限。"
published = "2000-03-10T05:00:00.000"
remediation = "该漏洞影响 Sam Hawker wmcdplay 1.0 beta1-2 及之前版本，官方已停止维护且不再发布补丁。建议立即卸载 wmcdplay 或切换至其他受支持的 CD 播放器（如 xmms、audacious）。如确需保留，执行 `chmod -s $(which wmcdplay)` 移除 setuid 权限位以限制提权路径。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "Sam Hawker wmcdplay CD播放器缓冲区溢出漏洞"
updated = "2026-06-16T21:51:15.650"

