[basic]
description = "基于 BSD 4.4 的类 Unix 操作系统（包括 BSDI BSD/OS 4.0、FreeBSD 3.2、NetBSD 1.4 及 OpenBSD 2.5）在安全级别 1 模式下存在安全机制绕过漏洞。当系统运行于安全级别 1 时，具有 root 权限的攻击者可通过卸载文件系统，然后使用 fsdb 等文件系统编辑器直接操作底层设备，从而清除文件上设置的不可变（immutable）和仅追加（append-only）标志位。该漏洞破坏了安全级别机制对关键文件保护的设计意图，使得本应受保护的系统文件（如日志、审计记录等）可被恶意篡改。攻击者需要拥有 root 权限并具备文件系统卸载和底层设备操作能力，属于本地利用场景，CVSS 评分 2.1，危害等级低。"
published = "1999-07-02T04:00:00.000"
remediation = "将系统安全级别提升至 securelevel 2（在 /etc/rc.conf 设置 kern_securelevel=2），该级别禁止写入原始磁盘设备，从而阻止通过 fsdb 等工具绕过不可变/仅追加标志。如无法提升安全级别，应避免向不可信用户授予 root 权限，并监控对 /dev 下原始磁盘设备的异常访问。"
score = 2.1
severity = "LOW"
sources = ["cve"]
title = "BSD 系列操作系统 UFS 安全级别绕过漏洞"
updated = "2026-06-16T21:50:20.763"

