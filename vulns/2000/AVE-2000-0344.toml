[basic]
description = "NetWin DNews 5.3 服务器的 DNEWSWEB CGI 程序存在缓冲区溢出漏洞，远程未授权攻击者可通过向 group、cmd、utag 等参数传递超长字符串触发栈溢出，进而在服务器上下文中执行任意命令。该漏洞影响 NetWin DNews 5.3 版本，攻击者无需认证即可远程利用，CVSS 评分 5.0（AV:N/AC:L/Au:N/C:N/I:P/A:N），主要影响系统完整性。攻击者可通过构造包含超长参数的 HTTP 请求触发缓冲区溢出，实现远程代码执行。ExploitDB 已公开远程缓冲区溢出利用代码（EDB-19895）。"
published = "2000-05-05T04:00:00.000"
remediation = "建议立即升级 NetWin DNews 服务器至 5.4 或更高版本（建议升级至最新稳定版），或联系 NetWin 官方获取 DNEWSWEB CGI 缓冲区溢出补丁补丁。若暂无法升级，可在 Web 服务器层面配置 WAF 规则拦截过长的 group、cmd、utag 参数（建议限制参数长度 ≤256 字节），并在防火墙层面限制对 DNEWSWEB CGI 接口的访问来源 IP。建议同时禁用不必要的 CGI 功能模块以减少攻击面。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "NetWin DNews 5.3 Server 缓冲区溢出漏洞"
updated = "2026-06-16T21:51:42.067"

