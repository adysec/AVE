[basic]
description = "Roaring Penguin rp-pppoe PPPoE 客户端在处理 Clamp MSS 选项时存在拒绝服务漏洞。远程攻击者可通过向目标系统发送包含零长度 TCP 选项的恶意 TCP 数据包，触发 rp-pppoe 客户端在处理 MSS 钳制时发生异常，导致 PPPoE 连接中断或客户端崩溃，造成拒绝服务。该漏洞影响 rp-pppoe 2.4 及更早版本，攻击者无需身份认证即可远程利用，CVSS 评分 5.0，危害等级中危。"
published = "2001-02-12T05:00:00.000"
remediation = "升级 rp-pppoe 至 2.4 或更高版本。Red Hat Linux 7.0 用户安装 RHSA-2000-130 提供的更新包；Mandrake Linux 用户安装 MDKSA-2000-084 更新。临时缓解措施可在 PPPoE 配置中禁用 Clamp MSS 选项（注释掉 /etc/ppp/pppoe.conf 中 clamp-mss 相关行）。"
score = 5
severity = "MEDIUM"
sources = ["redhat"]
title = "Roaring Penguin rp-pppoe 拒绝服务漏洞"
updated = "2026-06-16T21:53:30.870"

