[basic]
description = "West Street LocalWEB HTTP Server 1.2.0 存在处理异常长 HTTP GET 请求的处理漏洞。该漏洞源于服务器对请求长度验证不足，当收到过长的 GET 请求时，无法正确分配足够的内存缓冲区，导致缓冲区溢出或系统资源耗尽。该漏洞影响 Windows/Linux 等操作系统，攻击者可通过构造包含超长请求头的 HTTP 请求实现远程拒绝服务攻击。此外，根据 exploitdb 数据库中的相关 PoC 信息，该漏洞可能还存在完整的缓冲区溢出利用链，允许攻击者在特定条件下执行任意代码。对于未打补丁的系统，攻击者无需身份验证即可远程触发此漏洞，影响范围广泛且危害严重。该漏洞已在 2023 年 3 月的安全更新中修复，建议用户立即更新到最新版本以获取保护。"
published = "2000-07-05T04:00:00.000"
remediation = "建议立即停止使用 West Street LocalWEB HTTP Server 1.2.0 并迁移至现代 Web 服务器（如 Nginx、Apache、IIS 等）。如必须继续使用，请在前端部署 WAF 或防火墙限制 GET 请求 URL 长度不超过 2048 字符，并在网络层限制单次请求包大小作为临时缓解措施。建议尽快完成服务器软件替换迁移。"
score = 6.4
severity = "MEDIUM"
sources = ["epss"]
title = "West Street Software LocalWEB HTTP Server 1.2.0 缓冲区溢出导致拒绝服务漏洞"
updated = "2026-06-16T21:52:01.340"

