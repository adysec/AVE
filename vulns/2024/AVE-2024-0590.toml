[basic]
description = "Linux 内核 i.MX8M Plus SoC 驱动存在初始化顺序缺陷，当内核命令行启用 driver_async_probe=* 参数时，soc-imx8m.c 驱动在时钟驱动尚未完成探测前调用 of_clk_get_by_name() 获取时钟信息，导致返回 -EPROBE_DEFER 错误并触发内核警告栈回溯。本地攻击者可通过设置特定内核引导参数触发该竞态条件，造成系统可用性受影响。该漏洞影响 i.MX8M Plus 平台上的 Linux 内核，CVSS 评分 5.5，危害等级中等。修复方式是将 SoC 代码转换为平台驱动并实现 probe 重试机制。"
published = "2025-01-08T18:15:19.763"
remediation = "将 Linux 内核升级至 5.15.174、6.1.120、6.6.66 或 6.12.5 及以上版本，对应提交为 2129f6faa5df 等。Debian 用户可运行 apt update && apt upgrade 安装 USN-7381-1 安全更新。如无法立即升级，避免在内核命令行使用 driver_async_probe=* 参数作为临时缓解措施。"
score = 5.5
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux kernel i.MX8M SoC 驱动异步探测导致拒绝服务漏洞"
updated = "2026-06-17T08:12:59.550"

