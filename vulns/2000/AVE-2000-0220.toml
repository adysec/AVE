[basic]
description = "GeoCel WindMail 3.0 存在远程文件读取漏洞，由于程序未对用户输入中的 shell 元字符进行有效过滤，远程攻击者可通过向邮件服务器发送特制请求，利用 shell 元字符执行任意命令或读取服务器上的任意文件。该漏洞影响 WindMail 3.0 版本，CVSS 评分 5.0，危害等级中危，攻击者无需身份认证即可远程利用。"
published = "2000-03-25T05:00:00.000"
remediation = "GeoCel WindMail 已停止维护多年，官方未发布补丁。建议迁移至其他受支持的安全邮件服务器软件。如无法替换，应在应用层对用户输入中的 shell 元字符（`|`、`;`、`` ` ``、`$`、`&`、`>`、`<`）进行严格过滤，禁止直接拼接至系统调用；以低权限账户运行 WindMail 服务，限制其文件系统读取范围；在防火墙上限制仅信任来源可访问 WindMail 端口，作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "GeoCel WindMail 3.0 远程文件读取漏洞"
updated = "2026-06-16T21:51:18.250"

