[basic]
description = "Oracle WebLogic Server Core 组件存在关键功能认证机制缺失漏洞（CWE-306），未经身份认证的远程攻击者可通过 T3、IIOP 协议向目标服务器发送特制请求，绕过身份验证机制，成功利用后可未授权访问服务器中的敏感数据，甚至获取全部可访问数据的完全访问权限。该漏洞影响 WebLogic Server 12.2.1.4.0、14.1.1.0.0 及 14.1.2.0.0 版本，CVSS 评分 7.5，危害等级高。Oracle 官方已发布安全补丁修复此漏洞。"
published = "2025-07-15T20:15:30.567"
remediation = "立即从 My Oracle Support 下载并安装 Oracle 2025 年 7 月关键补丁更新 (CPUJul2025)，为 WebLogic Server 12.2.1.4.0/14.1.1.0.0/14.1.2.0.0 应用对应补丁。如无法立即更新，可在 WebLogic 管理控制台禁用 T3 和 IIOP 协议，或在网络层面限制对 7001/7002 端口的未授权访问作为临时缓解措施。"
score = 7.5
severity = "HIGH"
sources = ["hwpoc"]
title = "Oracle WebLogic Server Core 认证机制缺失漏洞"
updated = "2026-06-17T09:09:18.940"

