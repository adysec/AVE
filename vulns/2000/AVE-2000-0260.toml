[basic]
description = "Symantec pcAnywhere 9.x 默认使用的加密算法强度不足，存在弱加密漏洞。远程攻击者可通过网络嗅探捕获通信流量，利用弱加密算法解密会话数据，进而获取 pcAnywhere 或 NT 域账户的凭据信息。该漏洞允许攻击者在无需认证的情况下窃取敏感凭证，影响所有使用 pcAnywhere 9.x 版本进行远程管理的系统，危害等级严重。"
published = "2000-04-06T04:00:00.000"
remediation = "立即升级至 Symantec pcAnywhere 10.5 及以上版本，该版本采用更强加密算法保护传输凭据。如无法升级，应避免在公网直接暴露 pcAnywhere 服务，改为通过 VPN 或 SSH 隧道加密远程管理流量，并启用 Windows 本地安全策略限制仅允许特定 IP 地址连接。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "赛门铁克 pcAnywhere 9.0 弱加密漏洞"
updated = "2026-06-16T21:51:25.770"

