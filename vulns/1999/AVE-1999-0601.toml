[basic]
description = "Windows NT 4.0 Service Pack 4 存在身份认证绕过漏洞，由于系统在处理空 NT 哈希值时存在缺陷，远程攻击者可通过使用空密码访问网络共享资源，绕过正常的身份验证机制。该漏洞影响 Windows NT 4.0 SP4 版本，攻击者无需额外凭证即可利用 SMB 协议访问目标系统的共享文件夹，可能导致敏感信息泄露。CVSS 评分 7.5，危害等级高。"
published = "1999-02-08"
remediation = "立即安装 Microsoft 安全公告 MS99-004 提供的修补程序（KB Q214840），或升级至 Windows NT 4.0 Service Pack 5（SP5）及以上版本。如无法打补丁，可在域控上禁用对 downlevel 客户端（DOS/Windows 3.x/OS2/Mac）的 LM 哈希兼容认证作为临时缓解措施。考虑到 Windows NT 4.0 已停止支持，建议迁移至受支持的 Windows Server 版本。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "Microsoft Windows NT 4.0 空密码认证绕过漏洞"
updated = "2026-06-16"

