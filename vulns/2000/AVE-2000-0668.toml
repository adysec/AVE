[basic]
description = "SGI InfoSearch 组件中的 infosrch.cgi CGI 程序存在命令注入漏洞，由于程序未对用户提交的输入进行充分过滤，远程攻击者可通过向 fname 参数中注入 shell 元字符执行任意系统命令。该漏洞影响 SGI InfoSearch 1.0 及 IRIX 6.5.x 版本，CVSS 评分 7.5，危害等级高，攻击者无需身份认证即可远程利用。"
published = "2000-03-01T05:00:00.000"
remediation = "立即安装 SGI 安全公告 20000501-01-P 提供的官方补丁，升级 infosrch.cgi 至修复版本；如无法打补丁，应从 Web 服务器根目录彻底移除 infosrch.cgi 脚本或删除其可执行权限，并在 Apache/Irix httpd 配置中禁用该 CGI 路径。对 CGI 输入参数（如 fname）严格过滤 shell 元字符（; | ` $ () {} <>），并建议迁移至不受支持的 IRIX 版本已终止生命周期，需升级至新一代操作系统。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "SGI InfoSearch 远程命令执行漏洞"
updated = "2026-06-16T21:51:13.523"

