[basic]
description = "Oracle Java SE 7 Update 11及之前版本以及OpenJDK 7中的JMX组件存在安全沙箱绕过漏洞。远程攻击者可诱使用户访问恶意网页，通过未指定向量利用JMX组件缺陷绕过Java安全沙箱限制，在目标系统上执行任意代码。该漏洞影响广泛部署的Java运行时环境，攻击者无需身份认证即可利用，CVSS评分5.3，危害等级中危。Oracle已在后续安全更新中修复此漏洞。"
published = "2013-01-31T14:55:01.327"
remediation = "升级 Oracle Java SE 7 至 Update 15 及以上版本（Oracle 2013 年 2 月关键补丁更新 CPU 已修复此漏洞），或升级至 Java SE 8 及更高版本。对于 OpenJDK 7，更新至 7u15 及以上版本。如无法立即升级，可在浏览器中禁用 Java Applet 插件，或在系统层面移除 Java 浏览器插件（如删除 `libnpjp2.so` 文件）。"
score = 5.3
severity = "MEDIUM"
sources = ["kev"]
title = "Oracle Java SE 7 JMX Applet 安全沙箱绕过漏洞"
updated = "2026-06-16T23:49:27.023"

