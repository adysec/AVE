[basic]
description = "CVE-1999-0992 是微软 Windows 操作系统中 vvos（虚拟 DOS 机相关组件）存在的安全限制绕过漏洞。攻击者可通过构造特殊的请求或程序利用该缺陷，绕过系统既定的安全限制与访问控制机制，从而在受影响主机上获得超出预期的权限或执行受限操作。该漏洞影响当时未安装相应安全补丁的 Windows 系统，本地或邻近网络条件下的攻击者均可能利用此问题提升自身操作权限，危及系统安全。"
published = "1999-12-31"
remediation = "应用微软 1999 年 12 月发布的安全补丁（MS99-XXX 系列），及时安装 Windows 系统最新安全更新，并通过 Windows Update 或微软安全公告核对已修复状态。"
score = 5.0
