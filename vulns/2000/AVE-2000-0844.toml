[basic]
description = "`sa` 账户默认空口令是 Microsoft SQL Server 2000、SQL Server 7.0 及 MSDE 1.0 的安全配置缺陷。远程攻击者可利用该账户无需认证直接登录数据库，执行任意 SQL 语句进而完全控制服务器。该漏洞影响范围广泛，包括使用这些数据库产品的 Compaq Insight Manager、Tumbleweed Secure Mail、Visio 2000 等第三方软件。蠕虫病毒 Voyager Alpha Force 与 Spida 已在野外利用此漏洞进行大规模传播。"
published = "2002-08-12T04:00:00.000"
remediation = "立即为 SQL Server 的 sa 账户设置强密码（至少 12 位含大小写字母、数字和特殊字符），或禁用 sa 账户并改用 Windows 身份验证模式。在 SQL Server Management Studio 中执行：ALTER LOGIN sa WITH PASSWORD = '强密码'; ALTER LOGIN sa DISABLE;。同时排查并删除所有使用空密码的 SQL Server 账户，确保数据库连接字符串不硬编码 sa 凭据。"
score = 10
severity = "CRITICAL"
sources = ["exploitdb"]
title = "Microsoft SQL Server sa账户默认空口令权限提升漏洞"
updated = "2026-06-16T21:53:23.207"

