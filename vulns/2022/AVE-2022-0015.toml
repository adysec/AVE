[basic]
description = "Linux 内核 Mediatek 时钟驱动（clk: mediatek）在设备探测（probe）过程中存在内存泄漏漏洞。当 probe 函数在初始化时钟控制器时发生错误，未能正确释放已分配的内存资源，导致内核内存泄漏。本地攻击者可利用此漏洞通过反复触发设备探测操作消耗系统可用内存，引发拒绝服务（DoS）或潜在信息泄露。该漏洞影响 Linux 内核，CVSS 评分 5.5，危害等级中等。"
published = "2025-02-26T07:00:48.183"
remediation = "建议升级 Linux 内核至 5.16.20、5.17.3 或更高版本，这些版本已合入修复提交 c6a0b4133985。该漏洞是 drivers/clk/mediatek/clk-mt8192.c 中 probe 失败分支未释放已分配内存导致的内存泄漏（CWE-401），本地低权限用户可通过反复加载驱动模块触发资源耗尽拒绝服务。如无法升级内核，可禁用 CONFIG_MTK_SCP_VPU 相关模块编译或通过 modprobe.blacklist=clk_mt8192 启动参数阻止加载受影响驱动。"
score = 5.5
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux 内核 MediaTek 时钟驱动内存泄漏漏洞"
updated = "2026-06-17T05:17:06.070"

