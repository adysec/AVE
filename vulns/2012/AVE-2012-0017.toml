[basic]
description = "MySQLDumper 1.24.4 存在多处目录遍历漏洞。远程攻击者无需身份认证，通过向 learn/cubemail/install.php 的 language 参数或 learn/cubemail/filemanagement.php 的 f 参数注入 `../` 路径遍历序列，可读取服务器上的任意文件；或向 learn/cubemail/menu.php 的 config 参数注入 `../` 序列，可执行任意本地文件。该漏洞源于程序未对用户输入路径进行充分过滤，CVSS 评分 4.3，危害等级中危。"
published = "2012-08-13T18:55:05.740"
remediation = "由于 MySQLDumper 1.24.4 已无官方维护且无后续版本修复，建议手动修改受影响 PHP 文件：在 learn/cubemail/install.php 中对 language 参数、learn/cubemail/filemanagement.php 中对 f 参数、learn/cubemail/menu.php 中对 config 参数，添加 basename() 或 realpath() 路径过滤，禁止包含 ../ 等目录遍历序列。同时通过 Web 服务器（如 Nginx/Apache）或 WAF 添加规则，拦截包含 ../ 及空字节编码的请求作为临时缓解措施。"
score = 4.3
severity = "MEDIUM"
sources = ["nuclei"]
title = "MySQLDumper 多个目录遍历漏洞"
updated = "2026-06-16T23:44:42.823"

