[basic]
description = "SSH默认配置启用了X11转发功能，允许远程攻击者通过恶意的xauth程序控制客户端的X会话，实现会话劫持。攻击者需要能够访问目标网络并诱使用户连接恶意X服务器，利用条件较为复杂但危害严重，可导致敏感信息泄露和远程控制。"
published = "2000-02-24"
remediation = "禁用SSH的X11转发功能，在sshd_config中设置X11Forwarding no；或升级到修复此漏洞的SSH版本，限制xauth程序的执行权限。"
score = 5.1
severity = "MEDIUM"
sources = ["cve"]
title = "OpenSSH X11转发远程会话劫持漏洞"
updated = "2026-06-16"

