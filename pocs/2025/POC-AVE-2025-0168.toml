[info]
author = "AVE"
description = "Google Chrome V8 引擎类型混淆漏洞 PoC，通过 delete x?.[y]?.a 可选链操作在 Temporal Dead Zone 中触发类型混淆，验证 CVE-2025-6554 漏洞影响 Chrome < 138.0.7204.96"
id = "POC-AVE-2025-0168"
name = "CVE-2025-6554 PoC"
severity = "high"
tags = ["cve-2025-6554"]
vuln_id = [
    "CVE-2025-6554",
    "AVE-2025-0168",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/cve-2025-6554.html"
protocol = "http"

[poc.requests.headers]
Content-Type = "text/html; charset=utf-8"
X-PoC = "CVE-2025-6554"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["CVE-2025-6554"]
