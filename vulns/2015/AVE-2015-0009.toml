[basic]
description = "Elasticsearch 1.3.8 之前版本及 1.4.0 至 1.4.3 版本的 Groovy 脚本引擎存在沙箱绕过漏洞。攻击者无需认证即可通过 HTTP API 向 Elasticsearch 提交特制的 Groovy 脚本，绕过沙箱保护机制并执行任意系统命令，实现远程代码执行。该漏洞影响所有开启动态脚本功能的 Elasticsearch 节点，CVSS 评分 9.8，危害等级严重。官方已在 1.3.8 和 1.4.3 版本中修复此漏洞，建议升级或禁用动态脚本功能。"
published = "2015-02-17T15:59:04.560"
remediation = "立即升级 Elasticsearch 至 1.3.8 或 1.4.3 及以上版本。如无法升级，在 elasticsearch.yml 中设置 `script.groovy.sandbox.enabled: false` 禁用 Groovy 沙箱，或通过 `script.allowed_types: none` 禁止动态脚本执行，并在网络层面限制 9200/9300 端口仅对可信来源开放。"
score = 9.8
severity = "CRITICAL"
sources = ["nuclei"]
title = "Elasticsearch Groovy 脚本引擎沙箱绕过远程代码执行漏洞"
updated = "2026-06-17T00:22:24.453"

