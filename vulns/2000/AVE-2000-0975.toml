[basic]
description = "muh 2.05d IRC 服务器在处理用户昵称的日志记录功能时未对格式字符串进行有效过滤，存在格式字符串注入漏洞。未经身份认证的远程攻击者可通过发送包含格式化字符（如 %s、%n）的畸形昵称来触发该漏洞，成功利用后可导致服务器进程崩溃引发拒绝服务，或在部分平台下执行任意命令，进而完全控制运行 muh 服务器的宿主机。该漏洞影响所有使用 muh 2.05d 版本的 IRC 服务器，CVSS 评分 7.5，危害等级高。由于利用仅需建立 IRC 连接并发送构造的昵称即可完成，攻击条件简单，无需身份验证或复杂交互，建议管理员尽快应用官方安全补丁进行修复。"
published = "2000-11-14T05:00:00.000"
remediation = '将 muh 2.05d IRC 服务器日志模块中所有直接使用用户输入（如 nickname）作为 format string 的 `sprintf`/`printf` 调用，改为使用 `snprintf` 或将用户输入作为参数传入（如 `log("user: %s", nick)` 而非 `log(nick)`），确保格式字符串不被用户控制。若暂无法修改源码，可在服务器前端增加 nick 过滤规则，拒绝包含 "%" 字符的连接请求，或改用其他维护中的 IRC 服务器软件。'
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "muh IRC 服务器日志功能格式字符串远程代码执行漏洞"
updated = "2026-06-16T21:52:36.770"

