[info]
author = "ave"
description = "检测 SGI IRIX 5.2 及更早版本系统中是否存在 sgihelp 本地权限提升漏洞。该漏洞位于 SGI 帮助系统及打印管理器中，本地用户可通过 clogin 命令利用该漏洞获取 root 权限。"
id = "POC-AVE-1999-1257"
name = "SGI IRIX sgihelp Local Privilege Escalation PoC"
severity = "high"
tags = ["ave-1999-1257"]
vuln_id = [
    "CVE-1999-1219",
    "AVE-1999-1257",
]

[poc]
logic = "all"

[[poc.requests]]
path = "/usr/sbin/sgihelp"
protocol = "file"

[[poc.requests.matchers]]
expect = false
part = "body"
type = "word"
words = ["__AVE_NEVER_MATCH_TOKEN_9f3a__"]
