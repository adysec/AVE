[basic]
description = "ktadmin 开发框架的 upload 文件上传接口存在权限绕过漏洞，攻击者可在未授权的情况下绕过访问控制检查，向目标服务器上传任意文件。由于该框架广泛应用于企业内部管理系统，攻击者可通过上传 Webshell 等恶意文件获取服务器控制权限，进而实施数据窃取、内网渗透等后续攻击。漏洞利用无需身份认证，攻击复杂度低。"
published = "2025-07-02"
remediation = "联系 ktadmin 官方获取最新版本并升级，在 upload 接口中增加身份鉴权与权限校验，实施文件类型白名单、文件大小限制、MIME 类型校验，并将上传目录设置为禁止脚本执行。"
score = 5.0
severity = "MEDIUM"
sources = ["hwpoc"]
title = "ktadmin 开发框架 upload 文件上传权限绕过漏洞"
updated = "2026-07-20"

