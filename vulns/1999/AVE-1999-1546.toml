[basic]
description = "IRIX 6.4 系统的 diskperf 和 diskalign 工具存在权限处理缺陷，本地攻击者可利用这些工具创建属于 root 用户的任意文件，从而获得 root 权限。该漏洞需要攻击者拥有本地访问权限，无法远程利用，影响 IRIX 6.4 版本，CVSS 评分 7.2，危害等级高。SGI 已发布安全公告修复此漏洞。"
published = "1998-05-27T04:00:00.000"
remediation = "安装 SGI 安全公告 19980502-01-P3030 提供的补丁程序 P3030，该补丁修复了 diskperf 和 diskalign 程序的任意文件创建缺陷。若无法安装补丁，可立即以 root 身份执行 `chmod 0 /sbin/diskperf /sbin/diskalign` 移除 setuid 权限作为临时缓解措施。由于 IRIX 6.4 已停止技术支持（EOL），建议尽快迁移至受支持的操作系统平台。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "SGI IRIX diskperf/diskalign 本地权限提升漏洞"
updated = "2026-06-16T21:50:33.433"

