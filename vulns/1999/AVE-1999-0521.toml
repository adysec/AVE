[basic]
description = "SSH Communications Security SSH 1.2.27 版本的认证代理（ssh-agent）在处理 UNIX 域套接字时存在符号链接跟随漏洞。本地攻击者可通过在目标用户认证套接字路径上创建符号链接，诱使认证代理将身份验证信息写入攻击者指定的任意文件，从而导致 SSH 认证密钥泄露。该漏洞仅需要本地访问权限，攻击者可利用窃取的私钥冒充目标用户进行远程登录。受影响版本为 SSH 1.2.27。"
published = "1999-09-17T04:00:00.000"
remediation = "升级至 SSH 1.2.28 及以上版本即可修复该符号链接跟随漏洞。鉴于 SSH 1.x 已停止维护，建议迁移至 OpenSSH（推荐 ≥ 7.5 版本）或相关发行版提供的 openssh-server 软件包。临时缓解措施：禁止非信任用户在本地登录共享账户。"
score = 2.1
severity = "LOW"
sources = ["avd"]
title = "SSH Communications Security SSH 认证代理符号链接漏洞"
updated = "2026-06-16T21:49:03.440"

