[basic]
description = "Microsoft IIS 服务器存在服务器端包含（SSI）功能安全缺陷，默认启用了 #exec 指令执行权限。远程攻击者可通过上传包含恶意 #exec 指令的 .shtml/.stm 文件至可写目录，触发目标服务器执行任意系统命令，导致完全控制服务器。该漏洞影响 IIS 4.0 及早期版本，CVSS 评分 10.0，危害等级严重。微软官方已发布安全公告并建议禁用 SSI #exec 功能。"
published = "1999-01-01T05:00:00.000"
remediation = "建议立即升级至 IIS 4.0 及以上版本并安装微软发布的安全补丁（如 MS99-023）。配置层面：在 IIS 管理器中禁用 SSI 的 #exec 指令，或完全关闭服务器端包含 (SSI) 功能。临时缓解：在防火墙层面限制对 Web 服务器的非必要访问，并监控异常 SSI 请求日志。"
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "Microsoft IIS 服务器端包含远程代码执行漏洞"
updated = "2026-06-16T21:48:38.580"

