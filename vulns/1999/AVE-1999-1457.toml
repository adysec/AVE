[basic]
description = "Microsoft Windows 95 及 Windows NT 4.0 等版本的 TCP/IP 协议栈实现存在 TCP 连接重置漏洞。远程攻击者无需身份认证，通过向目标连接发送 PSH ACK 等特殊构造的数据包，从响应包中获取目标连接的最新序列号，进而伪造 RST 重置数据包，导致目标 TCP 连接被强制中断。该漏洞可被用于拒绝服务攻击，影响范围广泛，攻击条件较低。"
published = "1998-10-05T04:00:00.000"
remediation = "此漏洞源于早期 Windows 95/NT 4.0 的 TCP/IP 协议栈未随机化初始序列号（ISN），攻击者可通过 PSH ACK 包推测序列号并伪造 RST 包断连。建议升级至 Windows 2000/XP 及以上版本，其 TCP/IP 栈实现了 RFC 1948 标准的 ISN 随机化；如无法升级，可在网络边界防火墙配置 TCP 重置检测规则过滤异常 RST 包，并启用 IPsec 策略保护通信完整性。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Microsoft Windows TCP/IP 重置连接漏洞"
updated = "2026-06-16T21:50:07.433"

