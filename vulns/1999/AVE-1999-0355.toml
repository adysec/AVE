[basic]
description = "Microsoft IIS 4.0 及 Site Server 附带的 viewcode.asp 示例脚本存在路径遍历漏洞，未经身份认证的远程攻击者可通过向该脚本发送包含目标文件路径的特制 HTTP 请求，读取服务器文件系统中的任意文件内容，包括配置文件、源代码及敏感数据。该漏洞影响安装了上述示例脚本且未删除或未打补丁的 IIS 4.0 与 Site Server 版本，攻击者仅需目标服务器开放 Web 服务即可利用，无需任何凭据。Microsoft 已在 MS99-013 安全公告中发布补丁，建议删除 viewcode.asp 等示例脚本或升级至修复版本。"
published = "1999-05-07T04:00:00.000"
remediation = '立即删除 IIS 4.0 安装目录下 /scripts/showcode.asp、viewcode.asp 等示例脚本文件（默认位于 C:\WINNT\System32\inetsrv\scripts\），并升级到 IIS 4.0 Service Pack 3 或更高版本；无法立即升级时，应在 IIS 管理器中移除示例站点并配置 NTFS 权限禁止匿名用户读取敏感目录作为临时缓解。'
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Microsoft IIS 4.0 任意文件读取漏洞"
updated = "2026-06-16T21:48:57.140"

