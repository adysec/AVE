[basic]
description = "Sendmail 守护进程存在本地权限提升漏洞，本地攻击者可通过启动 Sendmail 的 daemon 模式获取 root 权限。该漏洞源于 Sendmail 在启动时未正确限制权限，允许普通用户将 Sendmail 以守护进程模式运行并继承超级用户特权，从而实现权限提升。受影响版本包括 BSD 2、Sendmail 8.x、FreeBSD 2.1.x、HP-UX 10.x、AIX 4、RedHat 4 等多个操作系统上的 Sendmail 实现。"
published = "1996-11-16"
remediation = "升级 Sendmail 至 8.9.0 或更高版本，该版本通过限制守护进程模式的本地启动权限修复此漏洞。RedHat 4 用户安装 erg0910 更新包；AIX 4 用户升级至 sendmail 8.8.6 以上版本；FreeBSD 2.1.x 用户升级至 ports 中已修复版本；HP-UX 10.x 用户升级 sendmail 或安装 HP 安全补丁。临时缓解措施：移除 sendmail 二进制文件的 setuid root 权限（chmod 6555 /usr/lib/sendmail），或限制本地用户通过 SMTP 端口启动守护进程。"
score = 7.2
severity = "HIGH"
sources = ["epss"]
title = "Sendmail 本地特权提升漏洞"
updated = "2026-06-16"

