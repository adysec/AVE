[basic]
description = "Fastream FUR HTTP Server 1.0b 版本存在拒绝服务漏洞，由于 Web 服务器对过长的 HTTP GET 请求缺乏长度校验，远程未认证攻击者可向目标服务器发送超长 GET 请求导致服务器进程崩溃或资源耗尽，造成拒绝服务。该漏洞影响 Fastream FUR HTTP Server 1.0b 版本，CVSS 评分 5.0（AV:N/AC:L/Au:N/C:N/I:N/A:P），攻击向量为网络、攻击复杂度低、无需认证、仅影响可用性。攻击者只需发送精心构造的超长 GET 请求即可触发漏洞，无需身份认证即可导致目标服务拒绝服务。"
published = "2000-11-14T05:00:00.000"
remediation = "建议立即升级至 Fastream FUR HTTP Server 2.0 或更高版本（Fastream 已被 Peer Software 收购，建议迁移至 Peer Software 的现代文件同步解决方案）。如无法升级，请在 Web 应用防火墙（WAF）或反向代理层面配置规则限制 GET 请求 URL 长度不超过 2048 字符，并在防火墙层面限制单个 IP 的并发连接数，作为临时缓解措施。建议尽快迁移至现代维护中的 Web 服务器软件（如 Nginx、Apache、IIS 等）。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Fastream FUR HTTP Server 1.0b GET请求拒绝服务漏洞"
updated = "2026-06-16T21:52:34.343"

