[basic]
description = "华盛顿大学（University of Washington）IMAP 软件包中附带的 pop-2d POP 守护进程 4.4 版本存在缓冲区溢出漏洞，其根因在于处理 FOLD 命令时未对用户输入长度做边界校验，导致攻击者可控数据覆盖栈上返回地址。该漏洞影响使用 pop2d 4.4 版本的邮件服务器，攻击条件为攻击者能够与目标服务建立网络连接并发送特制 FOLD 命令。未经身份认证的远程攻击者可通过发送超长畸形参数触发溢出，进而以守护进程权限执行任意代码或获取系统权限，危害等级为严重（CVSS 10.0）。"
published = "1999-05-26T04:00:00.000"
remediation = "建议立即升级到 University of Washington IMAP 工具包 4.5 及以上版本（或迁移至受支持的 imap-2000 系列），从官方 ftp.cac.washington.edu 获取并重新编译安装。无法立即升级时，应在网络边界防火墙屏蔽 109/tcp (POP2) 端口，并停止 pop2d 服务（在 inetd.conf 中注释 pop-2 行后执行 kill -HUP 重启 inetd）作为临时缓解。"
score = 10
severity = "CRITICAL"
sources = ["exploitdb"]
