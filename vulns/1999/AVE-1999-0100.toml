[basic]
description = "SGI IRIX 6.3 系统中的 webdist.cgi 脚本存在命令注入漏洞，远程攻击者无需身份认证即可通过向 distloc 参数注入 shell 元字符（如分号、管道符等）构造恶意 HTTP 请求，以 Web 服务器权限在目标系统上执行任意命令。该漏洞影响 SGI IRIX 6.3 版本，利用门槛较低，可导致服务器完全受控。"
published = "1997-05-06T04:00:00.000"
remediation = "建议升级到 SGI IRIX 6.4 或更高版本，或安装 SGI 安全公告 19970501-02-PX 提供的补丁。如无法升级，可删除 webdist.cgi 脚本或修改 HTTP 服务器配置禁止 CGI 目录访问作为临时缓解措施。同时对用户输入中的 shell 元字符（; | & ` $）做严格过滤。"
score = 7.3
severity = "HIGH"
sources = ["epss"]
title = "SGI IRIX webdist.cgi 命令执行漏洞"
updated = "2026-06-16T21:47:25.717"

