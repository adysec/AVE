[basic]
description = "gv 3.5.8 及更早版本在处理 PDF 文件或 gzip 压缩文件的文件名时，未对 shell 元字符（如反引号、$()、| 等）进行有效过滤，存在命令注入漏洞。远程攻击者可构造包含恶意 shell 元字符的特制文件名，诱使用户在 gv 中打开该文件，从而在目标系统上以当前用户权限执行任意命令。该漏洞影响范围广泛，攻击复杂度低，无需身份认证，CVSS 评分 7.5，危害等级高。"
published = "2003-11-17T05:00:00.000"
remediation = "升级 gv 至 3.5.8-27 及以上版本（Debian 对应版本 1:3.5.8-27），或直接升级至 3.7.4 及以上版本。该漏洞源于 gv 在处理 PDF 和 gzip 文件名时未过滤 shell 元字符，攻击者可构造恶意文件名触发任意命令执行。如无法升级，避免使用 gv 打开来源不明的 PDF/gzip 文件，或改用其他 PDF 阅读器（如 evince、okular）作为临时缓解措施。"
score = 7.5
severity = "HIGH"
sources = ["osv"]
title = "GNU gv 远程代码执行漏洞"
updated = "2026-06-16T21:59:34.273"

