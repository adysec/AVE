[basic]
description = "Solaris 2.5.1 系统中的 kcms_configure 命令存在缓冲区溢出漏洞，本地攻击者可通过向该程序发送超长参数触发缓冲区溢出，从而覆盖内存中的关键数据，最终获得 root 权限。该漏洞影响 Solaris 2.5.1 版本，需要攻击者拥有本地系统访问权限，CVSS 评分 7.2，危害等级高。"
published = "1998-12-01T05:00:00.000"
remediation = "立即安装 Sun 官方补丁 105401-01 (SPARC) 或 105402-01 (x86)。如无法安装补丁，可临时移除 kcms_configure 的 setuid root 权限：执行 `chmod 755 /usr/bin/kcms_configure` 或 `chmod 755 /usr/openwin/bin/kcms_configure`，防止本地用户通过缓冲区溢出提权。同时建议限制可登录系统的用户白名单作为纵深防御。"
score = 7.2
severity = "HIGH"
sources = ["epss"]
title = "Sun Solaris kcms_configure 本地缓冲区溢出漏洞"
updated = "2026-06-16T21:48:08.870"

