[basic]
description = "网络入侵检测系统（IDS）在处理网络数据包时未验证校验和字段的正确性，远程攻击者可通过发送精心构造的畸形数据包绕过 IDS 的检测规则。由于 IDS 与目标主机对数据包的解析结果不一致，攻击者可利用该缺陷隐藏恶意流量，实现绕过告警的入侵行为。该漏洞影响多数未实现校验和验证的 IDS 产品，CVSS 评分 10.0，危害等级严重。"
published = "1999-01-01T05:00:00.000"
remediation = "在 IDS/IPS 配置中启用 IP 和 TCP 校验和验证功能（如 Snort 的 `config checksum_mode: all`），丢弃校验和错误的报文；升级至支持完整校验和检测的现代 IDS 版本（如 Suricata 7.x 或 Snort 3.x）；在边界防火墙上启用 TCP 校验和强制检查；同时在网络设备上启用 IP 选项过滤和分片重组校验，消除攻击者利用校验和绕过检测的路径。"
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "网络入侵检测系统 数据包校验和未验证漏洞"
updated = "2026-06-16T21:48:42.743"

