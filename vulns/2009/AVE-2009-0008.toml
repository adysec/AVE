[basic]
description = "Adobe ColdFusion Server 8.0.1 及更早版本的多个管理页面存在跨站脚本（XSS）漏洞。远程攻击者无需认证即可通过向 administrator/logviewer/searchlog.cfm 的 startRow 参数或 _logintowizard.cfm、_authenticatewizarduser.cfm、enter.cfm 等页面的查询字符串注入恶意 HTML 或脚本代码，当管理员点击特制链接后，脚本将在受害者浏览器中执行，可能导致管理员会话劫持或敏感信息泄露。CVSS 评分 4.3，危害等级中危。"
published = "2009-08-18T22:30:00.217"
remediation = "立即安装 Adobe 于 2009 年 8 月通过 APSB09-12 安全公告发布的 ColdFusion 8.0.1 Cumulative Hotfix 1，或升级至 ColdFusion 9 及以上版本。如无法立即修补，可在 Web 服务器层（如 IIS/Apache）配置输入过滤规则，对 administrator/logviewer/searchlog.cfm 等管理后台页面的 query string 参数进行严格编码校验，同时限制管理后台的访问 IP 来源作为临时缓解措施。"
score = 4.3
severity = "MEDIUM"
sources = ["nuclei"]
title = "Adobe ColdFusion Server 多个跨站脚本漏洞"
updated = "2026-06-16T23:08:15.213"

