[basic]
description = "Amanda 备份系统（广泛用于多种 UNIX 操作系统，包括 FreeBSD）中的 runtar 组件会以 root 权限执行 tar 命令。由于权限控制不当，本地普通用户可通过向 runtar 提供特制的目标文件参数，使其以 root 身份读取或覆盖系统中的任意文件。该漏洞影响使用 Amanda 备份软件且未修复的 UNIX/Linux 系统，攻击条件为攻击者需拥有目标系统的本地低权限账户，利用方式是通过构造恶意参数调用 runtar 触发越权文件访问，可能导致敏感信息泄露或系统完整性被破坏。"
published = "1999-11-01T05:00:00.000"
remediation = "tags. Let me provide that.<value>升级 Amanda 到包含修复的版本（社区版 3.5 及以上），或限制 runtar 的 setuid 权限，确保只有授权管理员可执行 Amanda 管理命令。同时建议使用最小权限原则运行备份服务。"
score = 7.2
severity = "HIGH"
sources = ["cve"]
title = "Amanda 备份系统 runtar 本地权限提升漏洞"
updated = "2026-06-16T21:50:36.593"

