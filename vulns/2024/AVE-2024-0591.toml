[basic]
description = "eazy-logger v4.0.1 的 lib.Logger 函数存在原型污染漏洞，攻击者可通过向该函数传递特制的 payload 触发原型链污染，导致日志处理过程中出现未预期的行为，进而造成拒绝服务（DoS）。该漏洞无需身份认证即可远程利用，攻击复杂度低，影响使用 eazy-logger 组件的 Node.js 应用。CVSS 评分 7.5，危害等级高。目前已有公开 PoC 验证该漏洞的存在。"
published = "2025-02-05T22:15:31.803"
remediation = "立即将 eazy-logger 升级至 v4.1.0 或以上版本（npm update eazy-logger），该版本已修复 lib.Logger 函数中的原型污染问题。如无法升级，可在调用 Logger 前对用户输入进行 JSON Schema 校验，过滤 __proto__、constructor 等危险键，或使用 Object.create(null) 创建无原型链的空对象作为日志配置参数。"
score = 7.5
severity = "HIGH"
sources = ["msrc"]
title = "Eazy-Logger 原型污染拒绝服务漏洞"
updated = "2026-06-17T08:13:17.013"

