[basic]
description = "Microsoft Outlook 及 Outlook Express 在处理电子邮件时存在空字段处理缺陷，远程攻击者可通过向受害者发送包含空白字段（如 BCC、Reply-To、Return-Path、From 等）的特制邮件，导致 Outlook 客户端发生拒绝服务异常。该漏洞影响 Microsoft Exchange 4.0/5.0 及关联 Outlook 版本，攻击方式简单，无需身份认证即可触发。"
published = "2000-06-05T04:00:00.000"
remediation = "建议升级到 Microsoft Exchange 2000 或更高版本，或安装 Microsoft 为 Exchange 4.0/5.0 发布的 MS00-031 安全更新补丁；Outlook/Outlook Express 用户应升级到 Outlook 2000 SR-1 及以上版本。若无法升级，可在邮件服务器或客户端部署邮件过滤规则，拦截含有空白 BCC、Reply-To、Return-Path 或 From 字段的畸形邮件，作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Microsoft Exchange/Outlook 空白字段拒绝服务漏洞"
updated = "2026-06-16T21:51:55.220"

