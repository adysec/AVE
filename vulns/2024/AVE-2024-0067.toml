[basic]
description = "泛微E-cology9的browserjsp接口存在SQL注入漏洞，远程未认证攻击者可通过构造恶意的HTTP请求参数向数据库发送特制的SQL查询语句。该漏洞允许攻击者在未经身份验证的情况下直接访问和操作后端数据库，可能导致敏感业务数据泄露、数据库权限提升甚至服务器被完全控制。攻击者只需向目标系统的browserjsp相关接口发送包含SQL注入payload的HTTP请求即可触发漏洞。受影响版本为泛微E-cology9系列产品，建议用户及时升级到官方安全版本并加强数据库访问权限控制。"
published = "0726"
remediation = "升级泛微E-cology9至最新安全补丁版本（>=10.64），该版本已修复browserjsp接口的SQL注入问题。如无法立即升级，可在WAF/IPS中配置规则拦截对/browserjsp路径的恶意SQL注入请求参数，并限制该接口仅允许内网IP访问作为临时缓解措施。"
