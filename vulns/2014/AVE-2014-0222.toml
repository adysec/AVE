[basic]
description = "MRLG（Multi-Router Looking Glass）5.5.0 之前版本中的 fastping.c 存在内存破坏漏洞。远程攻击者无需身份认证即可通过发送特制的 ICMP 数据包触发任意内存写入，导致服务崩溃或远程代码执行。该漏洞影响所有运行 MRLG 5.5.0 以下版本的服务器，CVSS 评分 9.8，危害等级严重。建议用户升级至 MRLG 5.5.0 或更高版本以修复此漏洞。"
published = "2017-03-31T16:59:00.237"
remediation = "升级 MRLG 至 5.5.0 或更高版本，该版本已修复 fastping.c 中的内存写入缺陷。如无法立即升级，可在网络边界限制对 MRLG 服务的访问，仅允许可信 IP 连接，并禁用不必要的 ICMP 功能以降低攻击面。"
score = 9.8
severity = "CRITICAL"
sources = ["kev"]
title = "MRLG Multi-Router Looking Glass fastping.c 远程内存破坏漏洞"
updated = "2026-06-17T00:09:09.423"

