[basic]
description = "微软 Internet Explorer 浏览器存在远程命令执行漏洞。攻击者可通过构造特制的 .lnk 快捷方式文件或 .url 链接文件，诱使用户点击后在当前用户上下文环境中执行任意命令。该漏洞利用方式简单，无需身份认证，影响使用 Internet Explorer 的 Windows 系统。由于 IE 对 .lnk 和 .url 文件的处理缺乏充分校验，导致攻击者可在用户浏览网页时触发恶意操作。"
published = "1997-04-01T05:00:00.000"
remediation = "升级到 Internet Explorer 5.01 Service Pack 2 及以上版本，或安装 Microsoft Security Bulletin MS99-013 对应补丁。该漏洞已在新版 IE 中修复，建议立即停止使用旧版 IE，改用 Microsoft Edge 或 Chrome 等现代浏览器。如因兼容性必须使用，可在安全设置中将「Internet 区域」和「受限站点区域」的安全级别设为「高」，并禁用「下载未签名的 ActiveX 控件」。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "Microsoft Internet Explorer 远程命令执行漏洞"
updated = "2026-06-16T21:48:03.833"

