[basic]
description = "HP-UX 9.X 至 10.20 版本中的 chfn 命令存在缓冲区溢出漏洞。本地攻击者可通过向 chfn 命令行参数传递超长字符串触发栈缓冲区溢出，从而覆盖返回地址并执行任意代码，最终获取 root 权限。该漏洞源于 chfn 程序未对用户输入进行充分长度检查，导致攻击者能够以提升的权限执行恶意指令，完全控制系统。"
published = "1996-12-13"
remediation = "升级到已修复的 HP-UX 版本或应用厂商提供的安全补丁。由于该漏洞影响 HP-UX 9.X 至 10.20 版本，建议升级到 10.20 之后的修复版本，或参考 CIAC 公告 h-16 和 h-21 获取补丁详情。"
score = 7.2
severity = "HIGH"
sources = ["cve"]
title = "HP-UX chfn 命令缓冲区溢出权限提升漏洞"
updated = "2026-07-19"

