[basic]
description = "cfingerd 是一款可配置的 finger 服务守护程序，由于其未对用户查询进行充分的访问控制过滤，远程攻击者可通过向目标系统发送特制的 `search.**@target` 查询请求，枚举系统上所有已注册用户账号信息，造成敏感信息泄露。该漏洞影响使用 cfingerd 的 Unix/Linux 系统，攻击者可在未授权条件下远程利用，为进一步的社会工程学攻击或密码爆破提供用户列表基础。"
published = "1997-05-23T04:00:00.000"
remediation = "升级 cfingerd 至 1.4.3 或更高版本以修复用户列表泄露漏洞；如无法升级，建议在 inetd/xinetd 配置中禁用 finger 服务（注释掉 finger 行），或使用 tcpwrappers（hosts.allow/hosts.deny）限制可访问源 IP。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "cfingerd 用户信息泄露漏洞"
updated = "2026-06-16T21:48:01.240"

