[basic]
description = "Joomla! 内容管理系统中的 jVideoDirect 组件（com_jvideodirect）存在目录遍历漏洞，远程攻击者可通过向 index.php 文件的 controller 参数传递包含 ../ 序列的恶意路径，绕过目录访问限制，读取服务器上的任意文件。该漏洞影响使用该组件的 Joomla! 网站，攻击者无需身份认证即可远程利用，可能导致数据库配置、系统文件等敏感信息泄露，危害较大。"
published = "2010-03-08T15:30:00.747"
remediation = "该组件（com_jvideodirect）已长期无人维护，官方未发布安全补丁。建议立即在 Joomla 后台卸载该扩展；如因业务依赖无法卸载，需在控制器入口处对 controller 参数过滤 ../ 和空字节等目录遍历字符，同时可通过 Web 服务器规则（如 Apache mod_rewrite）拦截包含连续点号的查询字符串作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["nuclei"]
title = "Joomla! com_jvideodirect 目录遍历漏洞"
updated = "2026-06-16T23:17:10.897"

