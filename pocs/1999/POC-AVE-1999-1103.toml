[info]
author = "ave"
description = "验证 ICQ 99a Web 服务器 build 1701 的 'Active Homepage' 功能是否存在文件存在性信息泄露漏洞。远程攻击者可通过向服务器发送 HTTP 请求并对比响应状态码——文件存在时返回 '404 Forbidden'、文件不存在时返回 '404 not found'——来探测服务器上任意文件是否存在。"
id = "POC-AVE-1999-1103"
name = "ICQ 99a ICQ Web Server File Existence Information Leakage PoC"
severity = "medium"
tags = ["cve-1999-1418"]
vuln_id = [
    "CVE-1999-1418",
    "AVE-1999-1103",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/nonexistent_file.html"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "404 Forbidden",
    "404 not found",
]
