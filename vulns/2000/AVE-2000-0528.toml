[basic]
description = "Windows 2000 桌面隔离机制存在访问控制缺陷，同一窗口站（Window Station）内的本地用户进程可越权访问其他用户的桌面会话，导致敏感信息泄露或权限提升。攻击者需拥有本地账户权限并登录系统，通过调用窗口站相关 API 即可跨用户桌面读取剪贴板内容、捕获键盘输入或注入窗口消息。该漏洞影响 Windows 2000 所有版本，CVSS 评分 4.6，危害等级中危。微软尚未发布官方补丁，建议通过限制本地用户登录或启用安全策略缓解风险。"
published = "2000-06-15T04:00:00.000"
remediation = '建议立即升级到 Windows 10/11 或 Windows Server 2019/2022 等受支持版本，Windows 2000 已停止支持不再有安全更新。如无法升级，可通过组策略编辑器 (gpedit.msc) 依次展开「计算机配置 → Windows 设置 → 安全设置 → 本地策略 → 用户权限分配」，将「创建桌面」和「创建窗口站」权限仅授予 Administrators 组，移除 Users 组。同时配置注册表 `HKLM\SYSTEM\CurrentControlSet\Control\Session Manager\Kernel\ObjectDirectories` 下的窗口站对象权限，限制非管理员进程的桌面访问。'
score = 4.6
severity = "MEDIUM"
sources = ["epss"]
title = "Microsoft Windows 2000 桌面隔离访问控制漏洞"
updated = "2026-06-16T21:51:48.863"

