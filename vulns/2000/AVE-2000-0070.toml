[basic]
description = "CuteFTP 使用弱加密算法将 FTP 服务器登录密码存储在本地 `tree.dat` 文件中，攻击者在获取目标系统本地文件访问权限后，可读取 `tree.dat` 文件并利用弱加密的可逆性还原明文密码，从而窃取用户的 FTP 登录凭据。该漏洞影响 CuteFTP 全系版本，CVSS 评分 5.0，属于中危漏洞。用户应升级至官方最新版本或避免在共享/多用户环境下使用该软件。"
published = "2000-01-06T05:00:00.000"
remediation = "立即升级 CuteFTP 至 4.2 或更高版本，该版本已修复弱加密存储密码问题。如无法升级，建议停止使用 tree.dat 存储密码，改用其他安全 FTP 客户端（如 FileZilla）替代，并清除已保存的密码记录。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "CuteFTP 密码信息弱加密存储漏洞"
updated = "2026-06-16T21:50:58.020"

