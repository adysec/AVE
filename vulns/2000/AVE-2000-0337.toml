[basic]
description = "glibc 2.1.3 中的 DNS 解析器使用可预测的查询 ID，本地攻击者可通过向目标系统发送特制的 DNS 响应包，利用可预测的 ID 字段实施 DNS 缓存投毒攻击，将用户请求重定向至恶意站点，导致信息泄露或中间人攻击。该漏洞影响使用 glibc 2.1.3 的 Linux 系统，攻击者需具备本地网络访问权限，无需身份认证即可利用。"
published = "2000-05-03T04:00:00.000"
remediation = "升级 glibc 至 2.2 或更高版本，该版本修复了 DNS 事务 ID 可预测问题。如无法升级，可在本地 DNS 解析器（如 BIND）上启用 DNSSEC 并限制递归查询来源，同时使用 iptables 限制仅允许可信 DNS 服务器响应，降低欺骗攻击风险。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "GNU glibc DNS 解析器预测性 ID 欺骗漏洞"
updated = "2026-06-16T21:51:30.143"

