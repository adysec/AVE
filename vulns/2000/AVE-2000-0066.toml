[basic]
description = "Solaris 7.0 的 DMI（桌面管理接口）组件中存在拒绝服务漏洞，本地攻击者可通过向 /var/dmi/db 数据库目录中添加特制的恶意文件，触发 dmispd 守护进程崩溃，导致系统拒绝服务。该漏洞影响 Sun Solaris 7.0 操作系统，攻击者需拥有本地访问权限，无需高权限即可利用，CVSS 评分 10.0，危害等级严重。"
published = "1999-12-22T05:00:00.000"
remediation = "建议升级到 Sun Solaris 7_x86 推荐的维护补丁簇（如 106541-05 及以上，对应 SPARC 平台 106541 系列补丁），或通过 SunSolve 安装 dmispd 相关的最新内核/系统补丁。如无法立即打补丁，可暂时将 /var/dmi/db 目录权限收紧为仅 root 可写（chmod 700 /var/dmi/db 并校验属主），并移除普通用户的写权限以阻止写入畸形文件触发 dmispd 崩溃，同时可通过 RBAC 限制非授权用户访问 DMI 数据库作为缓解措施。"
score = 10
severity = "CRITICAL"
sources = ["exploitdb"]
title = '{"_meta":{},"stopReason":"end_turn","usage":{"inputTokens":10813,"outputTokens":20,"totalTokens":10833}}'
