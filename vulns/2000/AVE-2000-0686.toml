[basic]
description = "Windows 2000 在安装过程中直至系统首次重启前不会激活 Administrator 账户密码，导致远程攻击者可在无需认证的情况下通过 SMB 协议连接至 ADMIN$ 隐藏共享，获取系统完全控制权限。该漏洞影响 Windows 2000 所有版本，CVSS 评分 10.0，危害等级严重。攻击者只需知道目标 IP 地址即可在安装后的重启间隙利用空密码直接访问管理共享，进行恶意操作。"
published = "2000-02-15T05:00:00.000"
remediation = "Windows 2000 安装完成后立即重启系统以激活管理员密码，重启前勿将系统接入网络。如无法立即重启，可先通过本地安全策略设置管理员密码，并禁用 ADMIN$ 默认共享（net share ADMIN$ /delete）。安装 Windows 2000 Service Pack 1 或更高版本可彻底修复此问题。"
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "Microsoft Windows 2000 ADMIN$共享未授权访问漏洞"
updated = "2026-06-16T21:51:15.520"

