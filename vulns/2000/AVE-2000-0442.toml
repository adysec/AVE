[basic]
description = "BRU 备份软件 15.1 及 16.0 版本中存在环境变量处理缺陷，本地攻击者可通过设置 BRUEXECLOG 环境变量指定任意配置文件路径，从而将恶意数据追加到系统任意文件尾部。该漏洞允许低权限用户实现权限提升，影响 BRU 备份软件全系列部署环境。攻击者需具备本地系统访问权限，无需用户交互即可触发，CVSS 评分 7.2，危害等级高。建议升级至最新版本或限制 BRUEXECLOG 环境变量使用。"
published = "2000-06-05T04:00:00.000"
remediation = "升级 BRU 至 16.1 或更高版本以修复环境变量注入问题；限制非授权用户对系统的本地访问权限；移除 BRU 相关二进制文件的 setuid 位（如 `chmod u-s /usr/local/bru`）以防止低权限用户通过 BRUEXECLOG 向任意文件追加内容；通过 SELinux/AppArmor 策略限制 BRU 进程的文件写入路径。"
score = 7.2
severity = "HIGH"
sources = ["cve"]
title = "BRU 备份软件 BRUEXECLOG 环境变量本地权限提升漏洞"
updated = "2026-06-16T21:51:57.010"

