[basic]
description = "libarchive 3.7.6 及之前版本中的 bsdtar 程序在处理 tar 格式文件的 PAX 扩展头部时，存在空指针解引用漏洞。具体位于 `archive_read_support_format_tar.c` 文件的 `header_pax_extension` 函数中，当解析特制的 PAX 扩展属性时，程序未对指针进行有效性检查便直接解引用，导致崩溃。远程攻击者可通过向目标系统发送包含恶意 PAX 扩展头部的 tar 文件触发该漏洞，造成拒绝服务。攻击无需身份认证及用户交互，攻击复杂度低，CVSS 评分 7.5，危害等级高。"
published = "2025-03-28T15:15:45.023"
remediation = "立即升级 libarchive 至 3.7.7 及以上版本（最新稳定版为 3.8.8）。该漏洞存在于 3.7.6 及更早版本的 `header_pax_extension` 函数中，处理特制 PAX 头部时触发空指针解引用导致 bsdtar 崩溃。可通过 `apt upgrade libarchive`（Debian/Ubuntu）或 `yum update libarchive`（RHEL/CentOS）更新。如无法立即升级，避免使用 bsdtar 处理不可信的 tar 归档文件作为临时缓解措施。"
score = 7.5
severity = "HIGH"
sources = ["msrc"]
title = "libarchive bsdtar 空指针解引用漏洞"
updated = "2026-06-17T07:58:37.273"

