[basic]
description = "GeoServer 开源服务器 REST API 存在授权绕过漏洞。由于 REST API 安全过滤器仅匹配 `/rest` 及其子路径，未正确处理带文件扩展名的请求（如 `/rest.html`），导致攻击者可通过在 REST API 路径后添加扩展名绕过默认安全限制，访问 REST API 索引页面，从而泄露已安装扩展信息。该漏洞攻击复杂度低，无需认证即可远程利用，影响 GeoServer 2.26.3 之前版本及 2.25.6 之前版本。官方已在 2.26.3 和 2.25.6 版本中修复此漏洞。"
published = "2025-06-10T15:15:23.903"
remediation = "升级 GeoServer 至 2.26.3 或 2.25.6 及以上版本。若无法升级，修改 ${GEOSERVER_DATA_DIR}/security/config.xml，将 rest 过滤器路径改为 /rest.*,/rest/**，将 gwc 过滤器路径改为 /gwc/rest.*,/gwc/rest/**，然后重启 GeoServer 服务。"
score = 5.3
severity = "MEDIUM"
sources = ["hwpoc"]
title = "GeoServer REST API 未授权访问漏洞"
updated = "2026-06-17T09:03:43.363"

