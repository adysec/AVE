[basic]
description = "Samba 2.2.2 至 2.2.6 版本存在缓冲区溢出漏洞，远程攻击者可通过发送特制的加密密码触发该漏洞。在服务端解密过程中，将 DOS 代码页字符串转换为小端 UCS2 Unicode 字符串时发生缓冲区溢出，导致拒绝服务或任意代码执行。攻击者无需身份认证即可远程利用，CVSS 评分 10.0，危害等级严重。受影响系统需升级至 Samba 2.2.7 或更高版本。"
published = "2002-12-11T05:00:00.000"
remediation = "立即升级 Samba 至 2.2.7 或更高版本。对于 Debian Woody (3.0) 用户，安装 DSA-200 提供的 samba 2.2.3a-12 更新包。如无法升级，可应用官方补丁：修改 source/libsmb/smbencrypt.c 中 dos_struni2 调用的长度参数，将第 66 行的 256 改为变量 len。临时缓解措施：在 smb.conf 中禁用加密密码变更请求（设置 encrypt passwords = no），但此操作会降低安全性，仅作为临时方案。"
score = 10
severity = "CRITICAL"
sources = ["osv"]
title = "Samba 缓冲区溢出远程代码执行漏洞"
updated = "2026-06-16T21:59:06.367"

