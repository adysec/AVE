[basic]
description = "Linux Slackware 3.6 系统在安装后首次重启过程中存在身份认证绕过漏洞。远程攻击者可在系统启动阶段利用 root 账号无需密码直接登录，从而获得系统最高权限。该漏洞源于安装程序在初次重启时未正确设置 root 账户密码，攻击条件简单，无需任何身份凭证即可完全控制目标系统。影响范围包括 Slackware 3.6 及可能的相关版本。"
published = "1999-03-17"
remediation = "安装完成后首次重启前，务必使用 passwd root 命令为 root 账户设置强密码。升级到 Slackware Linux 3.6 以上版本，新版本在安装流程中强制要求设置 root 密码。如无法升级，可在 /etc/inittab 中配置单用户模式需要密码认证，并检查 /etc/shadow 确保 root 密码字段非空。"
score = 7.2
severity = "HIGH"
sources = ["cve"]
title = "Slackware Linux 安装后重启root账户未授权登录漏洞"
updated = "2026-06-16"

