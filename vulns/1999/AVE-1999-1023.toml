[basic]
description = "Windows 95、98 及 NT 4.0 系统在网络栈实现中存在 ICMP 重定向消息处理缺陷，远程攻击者可通过伪造路由器发出的 ICMP 重定向报文，诱使目标系统修改路由表，将网络流量重定向至攻击者控制的路径，从而导致目标系统网络连接中断、通信不可用。该漏洞攻击条件低，无需身份认证即可远程触发，影响范围涵盖 Windows 95/98/NT 4.0 等早期版本。"
published = "1999-03-08T05:00:00.000"
remediation = '升级到 Windows 2000 或更高版本，这些旧版系统已停止支持且不再接收安全更新。若无法升级，在注册表 HKEY_LOCAL_MACHINE\SYSTEM\CurrentControlSet\Services\Tcpip\Parameters 中将 EnableICMPRedirect 设为 0（DWORD），禁用 ICMP 重定向功能以缓解风险。'
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Microsoft Windows 95/98/NT 4.0 ICMP重定向消息拒绝服务漏洞"
updated = "2026-06-16T21:50:02.813"

