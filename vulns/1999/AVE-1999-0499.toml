[basic]
description = "Compaq Management Agents和Compaq Survey Utility存在拒绝服务漏洞，由于程序对输入数据缺乏充分的长度校验，未经身份认证的远程攻击者可通过网络向目标系统的2301端口发送超长字符串，触发服务异常崩溃或系统无响应。该漏洞影响运行Compaq Insight Management Agent及相关管理代理服务的服务器系统，攻击条件简单，仅需目标端口网络可达即可实施利用，无需任何凭据，导致合法用户无法正常访问管理服务，影响系统可用性。"
published = "1999-06-01T04:00:00.000"
remediation = "升级 Compaq Insight Management Agent 及 Survey Utility 至 Compaq 官方发布的修复版本，或安装对应 SoftPaq 安全补丁；如暂无法升级，应在防火墙或主机 ACL 中限制仅允许可信管理网段访问 TCP 2301 端口，并临时禁用不必要的 Compaq Survey Utility 服务以降低被攻击面。"
score = 6.4
severity = "MEDIUM"
sources = ["epss"]
title = "康柏 Insight Management Agent 长字符串拒绝服务漏洞"
updated = "2026-06-16T21:49:01.590"

