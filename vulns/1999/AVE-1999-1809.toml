[basic]
description = "Microsoft Site Server 3.0 的 Direct Mailer 功能存在敏感信息泄露漏洞。该功能将用户域名和密码以纯文本形式保存在 TMLBQueue 网络共享中，且该共享的默认权限设置不安全，允许远程攻击者通过访问该网络共享读取明文凭据，进而获取系统特权或进一步横向移动。CVSS 评分 7.5，危害等级高。"
published = "1999-12-31T05:00:00.000"
remediation = "立即安装 Microsoft KB229972 安全更新，该补丁修复了 Direct Mailer 组件明文存储凭据的问题。如无法安装补丁，手动收紧 TMLBQueue 网络共享的 ACL 权限，仅允许授权管理员访问，并启用 SMB 签名防止中间人窃取。建议升级至 Site Server 4.0 或迁移至更现代的替代产品。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "Microsoft Site Server 3.0 Direct Mailer 敏感信息明文存储漏洞"
updated = "2026-06-16T21:50:01.790"

