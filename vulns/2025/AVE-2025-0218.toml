[basic]
description = "用友畅捷通 T+ 产品 AccountClearControler 接口存在 SQL 注入漏洞，攻击者通过向 /tplus/ajaxpro/Ufida.T.SM.UIP.Tool.AccountClearControler 发送特制请求，可在未经授权的情况下注入恶意 SQL 语句，进而窃取数据库敏感数据或获取系统控制权限。该漏洞影响多个版本的用友畅捷通 T+ 系统，远程攻击即可利用，危害较大。"
published = "0707"
remediation = "升级用友畅捷通 TPLUS 至官方最新安全版本（≥16.0），并联系用友技术支持获取针对 AccountClearControler 接口的安全补丁。临时缓解措施：在 WAF/IPS 中配置规则拦截 /tplus/ajaxpro/Ufida.T.SM.UIP.Tool.AccountClearControler* 路径的异常 SQL 语法请求，并对该接口实施严格的输入参数校验与参数化查询。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "用友畅捷通TPLUS AccountClearControler SQL注入漏洞"
updated = "0707"

