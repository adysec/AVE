[basic]
description = "易宝OA系统BasicService.asmx WebService接口存在SQL注入漏洞，GetStreamID方法的SOAP参数未进行有效过滤，未经身份认证的攻击者可通过构造恶意SOAP请求包（SOAPAction: http://tempuri.org/GetStreamID），在POST请求体中注入恶意SQL语句，导致数据库信息泄露、数据篡改甚至获取服务器权限。该漏洞影响易宝OA系统相关版本，攻击者仅需能访问WebService端点即可无需认证发起攻击，CVSS评分高危。官方已发布补丁修复该漏洞，建议用户尽快升级修复。"
published = "0809"
remediation = "建议立即联系易宝OA厂商获取并升级至修复了该SQL注入的安全版本（确认 BasicService.asmx 的 GetStreamID 接口已采用参数化查询）；如暂无法升级，应在WAF或反向代理处对 /WebService/BasicService.asmx 的POST请求做SQL关键字过滤与参数校验，并限制该路径仅允许内网访问以缓解风险。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "易宝OA系统BasicService.asmx SQL注入漏洞"
updated = "0809"

