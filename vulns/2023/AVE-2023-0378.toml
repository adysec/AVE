[basic]
description = "Linux 内核 AMDGPU 显卡驱动中存在空指针解引用漏洞，具体位于 amdgpu 虚拟内存管理模块中。当使用 CPU 更新页表时，虚拟机更新围栏（fence）未被使用并被设置为 NULL 指针，后续调用 dma_fence_wait() 时触发空指针解引用，导致系统崩溃或拒绝服务。攻击者可通过构造特定 GPU 操作序列触发此漏洞，影响使用 AMD Radeon 显卡的 Linux 系统。CVSS 评分 5.5，危害等级中等。"
published = "2025-09-15T15:15:52.040"
remediation = "建议将 Linux 内核升级到 6.1.47、6.4.12 或 6.5 及以上版本，或 cherry-pick 补丁提交 78b25110eb8c、aa9e9ba5748c、187916e6ed9d 三者之一到当前内核源码树并重新编译。该漏洞需本地低权限触发，无法通过网络缓解，升级内核是唯一彻底修复方案。"
score = 5.5
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux kernel AMDGPU 空指针解引用漏洞"
updated = "2026-06-17T06:44:37.670"

