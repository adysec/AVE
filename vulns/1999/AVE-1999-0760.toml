[basic]
description = "Windows NT 及 Windows 2000 的域用户或管理员账户存在默认密码为空（null）、空白（blank）或缺失（missing）的安全缺陷。该漏洞源于系统在初始配置时未强制为域账户设置强密码，导致攻击者可在无需任何凭证的情况下直接利用空密码远程或本地登录目标域账户。影响范围涵盖运行 Windows NT 与 Windows 2000 的域控制器及加入域的计算机，危害等级较高（CVSS 7.2）。攻击条件为：目标主机开启了域账户登录且相关账户未配置密码。利用方式简单，攻击者可凭空密码直接进行身份认证，进而获取域用户乃至管理员权限，造成信息泄露、权限提升与进一步横向移动的风险。"
published = "1998-10-01T04:00:00.000"
remediation = "为所有 Windows NT/2000 域用户和管理员帐户设置强密码（至少 8 位，含大小写字母、数字和特殊字符）。通过域安全策略启用密码复杂性要求，开启「密码必须满足复杂性要求」和「密码长度最小值」，并禁用「允许使用空白密码的帐户只允许控制台登录」策略。在本地安全策略中将「帐户: 使用空白密码的本地帐户只允许进行控制台登录」设置为已启用。"
score = 7.2
severity = "HIGH"
sources = ["epss"]
