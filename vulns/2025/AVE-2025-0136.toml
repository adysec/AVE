[basic]
description = "东胜物流系统 `/SoftMng/FileInputHandler/Upload` 接口存在任意文件上传漏洞，攻击者可在未经身份认证的情况下，通过构造特制的 multipart/form-data 请求向服务器上传恶意文件（如 WebShell），进而获取服务器控制权，实现远程代码执行。该漏洞影响东胜物流系统多个版本，危害等级高，建议厂商及时修复。"
published = "2025-07-11"
remediation = "立即联系东胜物流厂商获取最新安全补丁，升级至修复该漏洞的版本。临时缓解措施：在 Web 服务器（如 Nginx/Apache）中限制 `/SoftMng/FileInputHandler/Upload` 及 `/MsWlTruck/CertUpload` 接口仅允许上传图片等白名单扩展名，禁止上传目录的脚本执行权限，并在应用层增加文件内容类型校验，避免直接保存可执行脚本文件。"
score = 7.5
severity = "HIGH"
sources = ["hwpoc"]
title = "东胜物流系统 SoftMng 任意文件上传漏洞"
updated = "2025-07-11"

