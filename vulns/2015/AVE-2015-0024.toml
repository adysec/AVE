[basic]
description = "SysAid Help Desk 15.2 之前版本存在多处目录遍历漏洞。远程攻击者无需身份认证即可通过向 getGfiUpgradeFile 接口的 fileName 参数传递 `..`（点点）序列实现任意文件读取，或向 calculateRdsFileChecksum 接口的 fileName 参数传递 `..` 序列触发 CPU 与内存资源耗尽导致拒绝服务。该漏洞影响 SysAid Help Desk 全线版本，CVSS 评分 8.5，危害等级高，攻击复杂度低，无需用户交互即可远程利用。"
published = "2015-06-08T14:59:04.633"
remediation = "建议升级 SysAid Help Desk 至 15.2 或更高版本，该版本已修复目录遍历漏洞。如无法立即升级，可在 Web 服务器层面配置访问控制规则，对 getGfiUpgradeFile 和 calculateRdsFileChecksum 接口的 fileName 参数进行路径合法性校验，过滤 ../ 序列，并限制 Web 应用对敏感目录的读取权限。"
score = 8.5
severity = "HIGH"
sources = ["nuclei"]
title = "SysAid Help Desk 目录遍历漏洞"
updated = "2026-06-17T00:25:07.120"

