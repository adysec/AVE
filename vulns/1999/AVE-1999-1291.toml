[basic]
description = "Stalker Internet Mail Server 1.6 存在远程缓冲区溢出漏洞，未经身份认证的远程攻击者可通过向 SMTP 服务发送超长的 HELO 命令触发缓冲区溢出，导致服务拒绝服务（崩溃）。该漏洞影响 Stalker Internet Mail Server 1.6 版本，攻击者无需身份认证即可远程发起攻击，CVSS 评分 5.0（中等危害），主要导致拒绝服务而非代码执行。该漏洞发布于 1999 年，相关产品早已停止维护，建议升级至新版邮件服务器或迁移至现代邮件解决方案。"
published = "1998-04-08T04:00:00.000"
remediation = "建议立即停用 Stalker Internet Mail Server 1.6 并迁移至现代维护中的邮件服务器软件（如 Postfix、Exim、Exchange 等）。若必须暂时保留，请在防火墙层面限制 SMTP 端口(25/587)仅允许可信 IP 访问，并在 SMTP 代理/网关层面限制 HELO/EHLO 命令长度不超过 255 字符，同时配置 SMTP 服务拒绝过长 HELO 命令作为临时缓解措施。建议尽快迁移替代，该软件已停止维护多年无官方补丁。要求升级到现代邮件服务器软件（如 Postfix 3.x、Exchange 2019+），并在边界防火墙限制 SMTP 端口仅对受信 IP 开放，同时在邮件网关配置 HELO 命令长度限制（≤255 字符）作为临时缓解。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Stalker Internet Mail Server 1.6 远程缓冲区溢出漏洞"
updated = "2026-06-16T21:50:34.980"

