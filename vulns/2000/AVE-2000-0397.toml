[basic]
description = "RealNetworks RealServer 7.0、7.0.1 及 8.0 Beta 版本的 viewsource 目录存在拒绝服务漏洞。远程攻击者无需身份认证即可向目标服务器发送特制的畸形请求，触发该目录下的页面处理异常，导致 RealServer 服务进程崩溃或停止响应，造成合法用户无法访问流媒体服务。攻击条件低，仅需网络可达即可实施。该漏洞 CVSS 评分 7.8，危害等级高，已有公开 PoC 代码可利用。"
published = "2000-06-01T04:00:00.000"
remediation = "升级 RealNetworks RealServer 至 8.0 正式版或更高版本，该漏洞在 8.0 正式版中已修复。如无法升级，可在 Web 服务器或反向代理层面过滤对 `/viewsource/` 目录的畸形请求（如包含异常字符的 URL），或限制该目录的访问来源 IP 以降低攻击面。"
score = 7.8
severity = "HIGH"
sources = ["epss"]
title = "RealNetworks RealServer 7.x viewsource 目录拒绝服务漏洞"
updated = "2026-06-16T21:51:48.737"

