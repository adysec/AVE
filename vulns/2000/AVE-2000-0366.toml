[basic]
description = "Red Hat Linux 6.1 的可插拔认证模块（PAM）在处理 NIS（网络信息服务）账户时存在锁定机制缺陷，导致已禁用的 NIS 账户仍能被错误地授予系统访问权限。攻击者可利用已禁用或失效的 NIS 账户绕过身份认证限制，进而获取非授权访问。该漏洞影响 Red Hat Linux 6.1 系统，CVSS 评分 4.6，危害等级中危。"
published = "1999-10-13T04:00:00.000"
remediation = "升级 Red Hat Linux 系统的 pam 软件包至修复版本（如 pam-0.68-10 及以上），确保 PAM 在认证时正确校验 NIS 账户的禁用状态。如无法升级，在 /etc/pam.d/system-auth 中添加 account required pam_listfile.so 规则，对 NIS 禁用账户实施额外访问控制作为临时缓解。"
score = 4.6
severity = "MEDIUM"
sources = ["cve"]
title = "RedHat PAM NIS账户锁定漏洞"
updated = "2026-06-16T21:51:32.820"

