[basic]
description = "splitvt 1.6.5 之前版本中存在多处缓冲区溢出漏洞。该漏洞源于程序对用户输入边界检查不足，本地攻击者可通过向受影响组件传递特制的长参数，触发缓冲区溢出，从而覆盖内存中的关键数据，最终在目标系统上以当前用户权限执行任意命令。攻击者需要拥有本地系统访问权限才能利用此漏洞，无法远程触发。"
published = "2001-03-12T05:00:00.000"
remediation = "升级 splitvt 至 1.6.5 或更高版本。于 Debian/Ubuntu 系统可执行 `apt-get update && apt-get install --only-upgrade splitvt`；于 Red Hat/CentOS 可执行 `yum update splitvt`。若无法升级，可通过 `chmod 750 /usr/bin/splitvt` 限制二进制文件的可执行权限，仅允许受信任用户使用该程序，降低本地提权风险。"
score = 7.2
severity = "HIGH"
sources = ["exploitdb"]
title = "splitvt 1.6.5之前版本 本地缓冲区溢出漏洞"
updated = "2026-06-16T21:53:40.693"

