[basic]
description = "IObit Protected Folder 13.6.0.5及之前版本中，驱动程序IUProcessFilter.sys的IOCTL处理程序在0x8001E000/0x8001E004功能号处理时存在空指针解引用漏洞。本地攻击者可通过发送特制IOCTL请求触发空指针解引用，导致系统蓝屏崩溃拒绝服务。该漏洞需本地低权限用户身份访问，已公开PoC利用代码，厂商IObit未做出回应。"
published = "2025-01-05"
remediation = "厂商IObit未发布官方补丁，建议升级Protected Folder至13.6.0.5以上版本，限制非授权用户对IUProcessFilter.sys驱动的IOCTL调用权限，部署驱动程序访问控制策略以降低本地拒绝服务攻击风险。"
score = 5.5
severity = "MEDIUM"
sources = [
    "cve",
    "vuldb",
]
title = "IObit Protected Folder IUProcessFilter.sys IOCTL处理程序空指针解引用拒绝服务漏洞"
