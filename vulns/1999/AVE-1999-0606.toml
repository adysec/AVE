[basic]
description = "Hughes Technologies Mini SQL（mSQL）2.0.11 之前版本自带的 w3-msql CGI 脚本在处理用户请求时存在信息泄露缺陷。攻击者可通过构造特制的 HTTP 请求访问受限目录，使得 w3-msql 脚本将本不应暴露的目录信息（如文件路径、数据库配置等）返回给客户端。该漏洞无需身份认证，只要目标服务器对外开启了 w3-msql 服务的 Web 访问即可能被远程利用，可导致敏感信息泄露，为后续进一步攻击提供辅助信息。"
published = "1999-08-17T04:00:00.000"
remediation = "升级 Hughes Technologies Mini SQL 至 2.0.11 或更高版本，该版本修复了 w3-msql CGI 脚本泄露受限目录信息的问题。若无法立即升级，应删除或限制对 w3-msql 脚本的访问权限，在 Web 服务器配置中禁止执行该 CGI 程序，并将敏感目录移出 Web 根目录或设置访问权限控制。"
score = 7.5
severity = "HIGH"
sources = ["exploitdb"]
title = "Hughes Technologies Mini SQL w3-msql 信息泄露漏洞"
updated = "2026-07-17T00:00:00Z"

