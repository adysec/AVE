[basic]
description = "Cisco Cache Engine 的 Web 管理界面存在信息泄露漏洞，未经身份认证的远程攻击者可直接访问管理界面的性能统计页面，无需认证即可查看设备的性能统计信息，包括缓存命中率、流量统计、系统资源使用等敏感运行数据。该漏洞影响 Cisco Cache Engine 多个版本，攻击者仅需通过网络访问管理界面的特定 URL 路径即可获取敏感性能数据，无需任何身份认证或特殊权限。攻击者可利用泄露的性能统计信息分析设备负载情况、网络流量模式及系统配置，为后续攻击提供情报支持。Cisco 已发布补丁修复该漏洞，建议升级到修复版本并限制管理界面的网络访问权限。"
published = "1999-12-16T05:00:00.000"
remediation = "建议升级 Cisco Cache Engine 至厂商修复后的软件版本（如 ACNS 4.x 或更高版本）。同时应对 Web 管理界面配置访问控制列表（ACL），仅允许受信任的管理网段访问；关闭或限制未授权用户对性能统计页面的访问，并为管理界面启用强身份认证。如无法立即升级，可在边界防火墙上限制对 Cache Engine 管理端口（如 TCP 8001/8888）的外部访问作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
