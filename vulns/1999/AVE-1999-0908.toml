[basic]
description = "RSA Security RSAREF 2.0 库的加密与解密函数存在本地缓冲区溢出漏洞。攻击者可通过构造特制的输入数据，在调用加密或解密接口时触发缓冲区溢出，从而执行任意代码或造成服务拒绝。该漏洞影响所有使用 RSAREF 2.0 库实现公钥加密、解密及数字签名功能的应用程序，攻击者需具备本地访问权限或能够诱使目标程序处理恶意构造的数据包。由于该库曾被广泛应用于各类安全产品和商业软件中，成功利用可导致敏感信息泄露或系统完全被控。建议升级至更高版本的加密库或应用厂商发布的安全补丁以彻底修复该漏洞。"
published = "1999-12-01T05:00:00.000"
remediation = "建议立即升级到已修复该缓冲区溢出问题的 RSAREF 2.0 后续版本（或迁移至 OpenSSL 等维护中的加密库）。如无法立即升级，应限制对调用 RSAREF 库程序的本地访问权限，移除相关 setuid/setgid 位，并以非特权账户运行，同时对输入长度做严格边界校验以缓解利用风险。"
score = 10
severity = "CRITICAL"
sources = ["exploitdb"]
title = "RSA Security RSAREF 2.0 缓冲区溢出漏洞"
updated = "2026-06-16T21:49:09.317"

