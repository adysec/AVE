[basic]
description = "Handspring Visor 移动设备的 Network HotSync 程序缺乏身份认证机制，远程攻击者可在同一网络段内直接连接目标设备的 HotSync 服务端口，无需任何凭证即可越权访问设备中的电子邮件、联系人、日历等个人数据文件。该漏洞影响 Handspring Visor 系列掌上设备，攻击者仅需与目标处于同一网络即可远程利用，CVSS 评分 5.0，危害等级中等。"
published = "2000-01-05T05:00:00.000"
remediation = "Handspring Visor 已停止维护且无官方补丁。建议禁用 Network HotSync 功能，仅在需要时临时开启；在防火墙上限制 14238/TCP 端口的访问来源，仅允许可信 IP 连接；避免在不受信任的网络（如公共 Wi-Fi）上使用 HotSync 同步功能。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = """The user wants me to generate a title field for CVE-2000-0058. Let me analyze the information: - Product: Handspring Visor - Feature: Network HotSync - Issue: No authentication, allowing remote attackers to retrieve email and files - This is an authentication bypass vulnerability The format should be: "厂商 产品 漏洞类型" Manufacturer: Handspring (Handspring公司) Product: Visor (Visor掌上电脑) Vulnerability type: 认证缺失漏洞 / 远程信息泄露漏洞 Let me think about the best translation: "Handspring Visor Network HotSync 认证缺失漏洞" or "Handspring Visor Network HotSync 远程信息泄露漏洞" The core issue is that Network HotSync has no authentication, allowing remote attackers to retrieve email and files. So it's an authentication bypass / missing authentication vulnerability. I'll go with something like: "Handspring Visor Network HotSync 认证缺失漏洞" Actually, let me look at the original title more carefully: "Handspring Visor Network HotSync漏洞" - this is the AVD title. The NVD description says: "Network HotSync program in Handspring Visor does not have authentication, which allows remote attackers to retrieve email and files." So it's an authentication bypass / missing authentication vulnerability leading to information disclosure. Title: "Handspring Visor Network HotSync 认证缺失漏洞" That's concise and follows the format: manufacturer "Handspring", product "Visor Network HotSync", vulnerability type "认证缺失漏洞".Handspring Visor Network HotSync 认证缺失漏洞 <value"""
