[basic]
description = "Horde 及 Horde Groupware 的 framework/Image/Image.php 中存在目录遍历漏洞，远程攻击者可通过向 Horde_Image::factory 方法的 driver 参数传入包含目录遍历序列（如 ../）的特制字符串，绕过访问限制实现任意本地文件的包含与执行。该漏洞影响 Horde 3.2.4 以下及 3.3.3 以下版本、Horde Groupware 1.1.5 以下版本，CVSS 评分 6.4，危害等级中危。厂商已发布升级版本修复此漏洞，建议用户及时更新。"
published = "2009-03-17T21:30:00.313"
remediation = "升级 Horde Framework 至 3.2.4 及以上版本（或 3.3.3 及以上版本），升级 Horde Groupware 至 1.1.5 及以上版本。如无法立即升级，可在应用入口处校验 Horde_Image driver 参数，禁止包含 ../ 等目录遍历序列。"
score = 6.4
severity = "MEDIUM"
sources = ["nuclei"]
title = "Horde Horde_Image 驱动参数本地文件包含漏洞"
updated = "2026-06-16T23:06:08.290"

