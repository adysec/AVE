[basic]
description = "IRIX 及 Solaris 系统中 FLEXlm License Manager 4.0 至 5.0 版本存在任意文件创建与程序执行漏洞。攻击者可利用 License Manager 服务的缺陷创建任意文件并执行任意程序，从而完全控制目标系统。该漏洞无需认证即可远程利用，影响多个操作系统平台，危害严重。"
published = "1997-01-06T05:00:00.000"
remediation = "将 FLEXlm License Manager 升级至 5.0 以上版本，并安装 Sun 和 SGI 当时发布的对应安全补丁（Sun Patch ID 105395-01 及后续更新）。因 Solaris 2.5.1 和 IRIX 已停止技术支持，建议迁移至受支持的操作系统平台。若无法立即迁移，须在防火墙上限制对 lmgrd 默认端口（TCP 1718）的访问来源，仅允许受信管理主机连接，并撤销 FLEXlm 后台服务的本地文件写权限以缓解任意文件创建风险。"
score = 7.2
severity = "HIGH"
sources = ["epss"]
title = "Sun Microsystems Solaris 与 SGI IRIX FLEXlm LicenseManager 任意文件创建与代码执行漏洞"
updated = "2026-06-16T21:47:27.673"

