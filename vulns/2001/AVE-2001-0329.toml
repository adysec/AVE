[basic]
description = "Red Hat Linux 7.1 韩语版安装程序内核版本 2.4.3-12 存在默认 umask 配置错误，初始化程序的默认权限掩码被错误设置为 000，导致安装过程中创建的所有文件拥有全局可写权限。未经身份验证的远程攻击者可通过网络访问安装程序，在安装过程中向系统写入或修改任意文件，导致系统文件被篡改、权限提升及完整性破坏。该漏洞影响 Red Hat Linux 7.1 韩语版安装程序，CVSS 评分 5.0（中危），攻击向量为网络、攻击复杂度低、无需身份验证，主要影响系统完整性。"
published = "2001-12-06T05:00:00.000"
remediation = "立即升级 Red Hat Linux 7.1 内核至 2.4.3-12 或更高版本，并应用官方安全更新 RHSA-2001-148；手动修改 Korean 安装程序中 init 的默认 umask 配置为 022，防止安装的文件被设置为全局可写；如无法立即升级，应禁止未授权用户在安装程序运行期间访问系统，安装完成后立即校验关键文件权限。"
score = 5
severity = "MEDIUM"
sources = ["redhat"]
title = "Red Hat Red Hat Linux 7.1 Korean 安装程序 不安全默认 Umask 漏洞"
updated = "2026-06-16T21:55:06.990"

