[basic]
description = "Windows NT 系统的登录对话框默认显示上一次成功登录的用户名，导致本地攻击者可通过物理访问目标系统获取有效账户信息。该漏洞属于信息泄露类型，攻击者利用获取的用户名可进一步实施密码猜测或暴力破解攻击，降低系统安全性。此漏洞影响 Windows NT 4.0 及更早版本，无需特殊权限即可利用。"
published = "1999-01-01T05:00:00.000"
remediation = '建议升级至 Windows NT 4.0 Service Pack 6a 或更高版本（如 Windows 2000），微软在 SP6a 中修复了此漏洞。若无法立即升级，可通过组策略“交互式登录：不显示最后的用户名”设置为“已启用”来禁用登录框显示上次登录用户名，或修改注册表 HKEY_LOCAL_MACHINE\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Winlogon\DontDisplayLastUserName 设为 1 作为临时缓解措施。'
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "Microsoft Windows NT 登录用户信息泄露漏洞"
updated = "2026-06-16T21:48:41.777"

