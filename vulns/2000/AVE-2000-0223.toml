[basic]
description = "Microsoft IIS 4.0 和 5.0 在将虚拟目录映射到 UNC 共享路径时存在 ISAPI 扩展处理缺陷，远程攻击者可通过向 UNC 映射的虚拟主机发送特制请求绕过脚本执行限制，直接读取 ASP 等动态文件的源代码，导致敏感信息泄露。该漏洞源于 IIS 对 UNC 共享路径的权限验证不完整，攻击者无需认证即可利用。"
published = "2000-03-30"
remediation = "安装 Microsoft 安全公告 MS00-019 提供的补丁（IIS 4.0 下载 KB249599 更新，IIS 5.0 下载对应安全更新）；如无法安装补丁，避免将包含 ASP 等脚本文件的虚拟目录映射到 UNC 共享路径，或将脚本文件移至本地目录并移除 UNC 映射。"
score = 5.0
severity = "MEDIUM"
sources = ["cve"]
title = "Microsoft IIS UNC 映射虚拟目录源代码泄露漏洞"
updated = "2026-06-16"

