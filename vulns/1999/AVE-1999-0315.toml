[basic]
description = "Windows NT 4.0 的帮助文件处理程序（WinHelp）存在缓冲区溢出漏洞，当用户打开一个特制的 .hlp 帮助文件时，可触发栈缓冲区溢出，导致任意代码执行。攻击者可通过诱导用户访问恶意网页或打开包含恶意帮助文件的邮件附件来利用此漏洞。该漏洞影响 Windows NT 4.0 所有 SP 版本，CVSS 评分 4.6，危害等级中危。"
published = "1999-05-17T04:00:00.000"
remediation = '立即安装 Microsoft 安全公告 MS99-015 提供的补丁（KB 文章 Q231605），该补丁可阻止通过畸形帮助文件执行任意代码。由于 Windows NT 4.0 已停止支持，建议升级到 Windows 10/11 或 Windows Server 2016+ 等受支持版本。临时缓解措施：限制用户对 WINNT\help 目录的写入权限，仅允许管理员修改该目录下的帮助文件。'
score = 4.6
severity = "MEDIUM"
sources = ["avd"]
title = "Microsoft Windows NT 4.0 帮助文件工具缓冲区溢出漏洞"
updated = "2026-06-16T21:48:54.460"

