[basic]
description = "Eric Allman Sendmail 8.10.0 及之前版本存在拒绝服务漏洞。远程攻击者可通过向目标 SMTP 服务器发送一系列 ETRN 命令后立即断开连接，而 Sendmail 在连接已终止后仍持续处理这些命令，导致服务器资源被大量消耗，最终造成拒绝服务。该漏洞利用条件简单，无需认证即可触发。"
published = "1999-12-22T05:00:00.000"
remediation = "升级 Sendmail 至 8.10.0 或更高版本，该版本修复了 ETRN 命令在连接断开后继续处理导致的资源耗尽问题。如无法立即升级，可在 SMTP 服务配置中禁用 ETRN 命令（在 sendmail.cf 中移除或注释 ETRN 相关规则），或通过防火墙限制 SMTP 端口的来源 IP 以减少外部攻击面。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Eric Allman Sendmail ETRN 命令拒绝服务漏洞"
updated = "2026-06-16T21:49:44.347"

