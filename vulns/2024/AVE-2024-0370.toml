[basic]
description = "某短视频直播打赏系统的采集中间件接口/caiji/get_curl存在任意文件读取漏洞。由于未对url参数进行协议过滤，攻击者可传入file://协议读取服务器任意文件（如/etc/passwd），导致敏感信息泄露。攻击者无需身份认证即可通过构造特制HTTP请求远程利用该漏洞。"
published = "2024-01-01"
remediation = "对get_curl接口的url参数进行严格协议白名单校验，仅允许http和https协议，禁止file、dict、gopher等危险协议；对用户输入进行路径规范化处理，防止目录遍历；建议部署WAF规则拦截包含file://的请求。"
score = 5.0
severity = "MEDIUM"
sources = ["hwpoc"]
title = "某短视频直播打赏系统采集中间件任意文件读取漏洞"
updated = "2024-01-01"

