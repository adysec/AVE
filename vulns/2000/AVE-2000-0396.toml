[basic]
description = "AnalogX SimpleServer:WWW 1.05 是一款运行在 Windows 系统上的轻量级 Web 服务器软件，该软件的 1.05 版本在处理用户对 cgi-bin 目录下程序的 HTTP GET 请求时存在缓冲区溢出漏洞。漏洞原理在于软件未对请求中的 URL 路径长度进行充分边界校验，远程攻击者无需身份认证，只需向运行受影响版本的服务器发送超长 URL 的 GET 请求（如 `http://target/cgi-bin/long_string_here`），即可触发缓冲区溢出，导致 Web 服务崩溃停止响应，实现拒绝服务攻击。受影响的目标系统为所有运行 AnalogX SimpleServer:WWW 1.05 的 Windows 版本（包括 95/98/ME/NT/2000/XP/Vista 等），服务将停止接受请求，需要手动重启服务器服务才能恢复正常功能。AnalogX 厂商已在 SimpleServer:WWW 1.06 版本中修复此溢出错误，用户应及时将软件升级至 1.06 或更高版本以消除该安全风险。"
published = "2000-06-15T04:00:00.000"
remediation = "立即将 AnalogX SimpleServer:WWW 升级到 1.06 或更高版本（当前最新为 1.24），以修复 cgi-bin 目录缓冲区溢出漏洞。如暂时无法升级，可在防火墙或前端代理处限制对 /cgi-bin/* 路径的 HTTP GET 请求长度，或临时禁用 cgi-bin 目录功能作为缓解措施；长期建议更换为仍在维护的现代 Web 服务器软件。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "AnalogX SimpleServer cgi-bin远程缓冲区溢出漏洞"
updated = "2026-06-16T21:51:48.603"

