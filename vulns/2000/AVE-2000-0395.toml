[basic]
description = "CVE-2000-0472 是 ISC InterNetNews（innd）2.2.2 版本中存在的远程缓冲区溢出漏洞。攻击者可通过向目标 News 服务器发送特制的 cancel 请求（内含超长 Message-ID 字段）触发缓冲区溢出，从而在服务器进程中执行任意命令，完全控制受影响系统。该漏洞影响 innd 2.x 系列版本，危害严重，建议升级至最新版本。"
published = "2000-02-06T05:00:00.000"
remediation = "升级 ISC INN 至 2.3.0 或更高版本，该版本已修复 cancel 请求消息 ID 长度检查逻辑。如无法升级，可在 innd.conf 中限制远程连接来源 IP，或禁用远程取消功能（取消 `allowcancel` 选项）。"
score = 3.6
severity = "LOW"
sources = ["cve"]
title = "ISC innd 远程缓冲区溢出漏洞"
updated = "2026-06-16T21:51:48.463"

