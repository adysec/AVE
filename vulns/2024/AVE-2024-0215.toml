[basic]
description = "海康威视综合安防管理平台的 clusters 接口存在任意文件上传漏洞。攻击者可通过 POST 请求向 /clusterMgr/clusters/ssl/file;.js 接口上传特制恶意文件，由于系统未对上传文件类型进行有效校验，成功利用可在服务器上执行任意代码，获取系统控制权限。攻击条件为需要网络访问目标系统的 clusters 管理接口。"
published = "2024-07-18"
remediation = "升级海康威视综合安防管理平台至官方发布的最新安全版本，限制对 clusters 接口的网络访问权限，实施严格的服务器端文件类型与内容校验机制。"
