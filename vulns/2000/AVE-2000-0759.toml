[basic]
description = "Check Point Firewall-1 会话代理组件（Session Agent）3.0 至 4.1 版本存在用户枚举漏洞。该组件在处理登录认证请求时，对无效用户名和无效密码返回不同的错误提示信息，导致远程攻击者可通过错误消息差异枚举出系统中存在的合法用户名，进而针对有效账户发起字典暴力破解攻击，获取系统访问权限。该漏洞影响 Check Point Firewall-1 3.0/4.0/4.1 等版本，CVSS 评分 7.5，危害等级高。"
published = "2000-12-11T05:00:00.000"
remediation = "该漏洞影响 Check Point Firewall-1 Session Agent 3.0-4.1。升级到 Firewall-1 4.1 Service Pack 2 或更高版本（含 NG 及后续全系列），此版本已统一认证失败的错误提示信息，防止用户名枚举。如无法升级，可在防火墙上限制对 Session Agent 端口（TCP 259）的访问来源 IP，仅允许受信任的管理端连接。"
score = 7.5
severity = "HIGH"
sources = ["exploitdb"]
title = "Check Point Firewall-1 Session Agent 用户名枚举漏洞"
updated = "2026-06-16T21:53:01.320"

