[basic]
description = "Shoptron 购物车应用程序存在敏感信息修改漏洞，攻击者可通过拦截并修改 HTML 表单中的隐藏字段（hidden form fields），在未授权的情况下篡改订单金额、商品数量、用户身份等敏感购买信息。该漏洞源于服务端未对隐藏提交字段进行完整性校验，远程攻击者无需身份认证即可利用，影响 Shoptron 购物车系统的数据完整性与交易安全。"
published = "2000-02-01T05:00:00.000"
remediation = "将订单金额、商品价格等敏感字段从隐藏表单移至服务器端会话存储，所有价格合计须在服务端重新计算而非信任客户端提交值；对必须保留的隐藏字段实施 HMAC 签名或加密防篡改；部署 WAF 规则拦截异常的隐藏字段修改请求。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "Shoptron 购物车应用程序隐藏字段篡改漏洞"
updated = "2026-06-16T21:51:00.540"

