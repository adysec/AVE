[basic]
description = "Cat Soft Serv-U FTP Server 2.5/a/b 版本在 Windows 95/98/2000/NT 4.0 系统上运行时，其 SHGetPathFromIDList 函数存在缓冲区溢出漏洞。远程攻击者若拥有 FTP 服务器访问权限，可通过向服务器发送针对畸形 .lnk 快捷方式文件的 LIST 命令触发该漏洞，导致服务器进程崩溃并造成拒绝服务。该漏洞影响 Serv-U FTP Server 2.5、2.5a、2.5b 版本，CVSS 评分 2.1（低危），攻击者需具备 FTP 访问权限并能执行 LIST 命令，通过构造畸形 .lnk 文件并请求目录列表即可触发缓冲区溢出导致服务拒绝。Cat Soft 已发布补丁修复该漏洞，建议升级至修复版本。"
published = "2000-02-04T05:00:00.000"
remediation = "建议立即升级到 Serv-U FTP Server 的最新支持版本或至少 7.0 系列，应用最新的安全补丁包（如 Serv-U 7.x 及以上版本包含完整修复）。同时应禁用服务在公共网络上暴露，强制使用强密码策略，并在防火墙配置中限制访问端口，仅允许可信主机连接 Serv-U 管理控制台，并禁用易受攻击的 .lnk 文件自动解析功能。"
score = 2.1
severity = "LOW"
sources = ["cve"]
