[basic]
description = 'Joomla! 的 Jstore（com_jstore）第三方扩展组件存在目录遍历（路径遍历）漏洞，属于 CWE-22 类型缺陷。该组件在处理 index.php 页面的 controller 参数时未对用户输入进行充分过滤与规范化，远程攻击者可构造包含 ".."（点点）序列的恶意 controller 参数提交请求，绕过目录访问限制读取服务器上的任意文件（如配置文件、密码等敏感数据）。由于该组件作为 Joomla! 站点插件部署，凡安装并启用了存在漏洞版本 com_jstore 组件的 Joomla! 网站均受影响。攻击者无需身份认证，仅需向目标站点发送特制的 HTTP 请求即可触发，CVSS 基础评分高达 10.0（满分），危害等级为严重，除文件读取外还可能存在其他未明确说明的安全影响。'
published = "2012-11-26T23:55:01.300"
remediation = "立即卸载或升级存在漏洞的 Jstore (com_jstore) 第三方组件至官方修复版本，并通过后台「扩展管理-管理」彻底移除该组件；若暂不能升级，可在 Web 服务器（如 Apache 的 .htaccess）中对 index.php 的 controller 参数做过滤，拒绝包含「../」「..%2f」等路径穿越字符的请求，同时配置 PHP 的 open_basedir 限制脚本可访问目录，作为临时缓解措施。"
score = 10
severity = "CRITICAL"
sources = ["nuclei"]
title = "Joomla! com_jstore 组件 目录遍历漏洞"
updated = "2026-06-16T23:26:28.973"

