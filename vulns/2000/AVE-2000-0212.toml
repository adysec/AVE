[basic]
description = "Cobalt RaQ 2.0 及 3.0 服务器中 Apache 的默认 access.conf 配置存在访问控制缺陷，导致远程攻击者无需认证即可直接读取服务器上的 .htaccess 文件内容。该文件通常包含目录访问密码、IP 白名单等敏感配置信息，泄露后可被攻击者利用以绕过身份验证或获取进一步攻击所需情报。此漏洞影响 Cobalt RaQ 2.0 和 3.0 版本，CVSS 评分 5.0，危害等级中等。"
published = "2000-03-31T05:00:00.000"
remediation = '修改 Apache 配置（access.conf 或 httpd.conf），在 `<Directory>` 块中添加 `<Files ~ "^\.ht">\n  Deny from all\n</Files>` 阻止所有 .htaccess 文件被外部访问。如仍使用 Cobalt RaQ 官方支持的版本，安装最新安全补丁；该设备已停止支持，建议迁移至现代服务器平台。'
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Cobalt RaQ 2.0/3.0 Apache .htaccess 信息泄露漏洞"
updated = "2026-06-16T21:51:17.167"

