[basic]
description = "ReiserFS 3.5.28 文件系统存在缓冲区溢出漏洞，本地用户可通过向系统传入超长目录名触发该漏洞，导致目标系统拒绝服务，甚至可能以内核权限执行任意代码。该漏洞影响 SuSE Linux 中集成的 ReiserFS 3.5.28 版本，CVSS 评分 7.2，危害等级高危。攻击者需具备本地文件系统写入权限，通过构造超过缓冲区限制的长目录名进行利用。"
published = "2001-03-26T05:00:00.000"
remediation = "升级 Linux 内核至 2.4.1 及以上版本（ReiserFS 3.5.29+），该版本已修复目录名长度检查逻辑，避免缓冲区溢出。对于已停止维护的旧系统，建议迁移至受支持的发行版并使用更新的内核版本；同时限制本地用户的目录创建权限可降低攻击风险。"
score = 7.2
severity = "HIGH"
sources = ["exploitdb"]
title = "SuSE Linux ReiserFS 本地缓冲区溢出漏洞"
updated = "2026-06-16T21:53:48.460"

