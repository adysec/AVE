[basic]
description = "可视化融合指挥调度平台存在任意文件上传漏洞，攻击者可通过向 /upload 接口发送特制的 HTTP 请求，未经验证直接上传恶意脚本文件至服务器。该漏洞源于平台对上传文件类型缺乏有效的白名单校验，且未对上传路径进行限制。成功利用此漏洞的攻击者可在 Web 服务器目录中执行任意动态脚本，进而获取服务器控制权，导致敏感数据泄露或横向移动。"
published = "nday"
remediation = "对 /upload 接口添加文件类型白名单校验，仅允许图片/文档等安全格式；限制上传文件至非 Web 可访问目录；Web 上传目录禁止执行动态脚本（如 PHP/ASPX）；配置 WAF 规则拦截上传的可执行文件；限制该接口仅允许内网可信 IP 访问；如厂商已发布安全补丁请优先升级。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "可视化融合指挥调度平台 任意文件上传漏洞"
updated = "nday"

