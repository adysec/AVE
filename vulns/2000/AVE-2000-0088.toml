[basic]
description = "glFtpD FTP服务器在处理SITE ZIPCHK命令时未正确过滤用户输入中的元字符（如管道符、分号等），本地用户可通过构造特制参数注入并执行任意系统命令，从而绕过权限限制并提升权限。攻击者需具备本地访问或有效FTP登录能力，成功利用后可完全控制运行该服务的主机，危害严重。"
published = "1999-12-23"
remediation = "立即停用或限制glFtpD的SITE ZIPCHK命令，禁止普通用户执行该SITE扩展；收紧FTP账户权限与本地登录，避免以高权限账号运行服务。该漏洞年代久远且官方公开补丁信息不完整，建议将glFtpD替换为仍在维护的FTP服务（如vsftpd、ProFTPD），并关闭不必要的SITE命令与系统命令调用能力。"
score = 10.0
severity = "CRITICAL"
sources = ["cve"]
title = "glFtpD SITE ZIPCHK命令元字符注入权限提升漏洞"
updated = "2026-06-16"

