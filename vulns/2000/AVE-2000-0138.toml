[basic]
description = "SCO UnixWare 7.1/7.1.1 中 ARCserver 组件在处理 /tmp 临时文件时未进行符号链接安全检查，本地攻击者可通过在 /tmp 目录创建恶意符号链接，诱使 ARCserver 进程以高权限向攻击者指定的任意文件写入数据，从而实现对敏感文件的非授权修改。该漏洞要求攻击者拥有本地访问权限，利用难度较低，影响 ARCserver 所管理的所有备份与恢复任务。"
published = "2000-02-16T05:00:00.000"
remediation = "立即升级至 SCO Unixware 7.1.1 及 ARCserve 5.0 或更高版本，使用最新的安全补丁。配置 ARCserve 强制指定安全目录而不使用 /tmp，并启用对临时文件的完整性验证。降低用户权限，避免使用 root 用户操作。"
score = 1.2
severity = "LOW"
sources = ["avd"]
title = "SCO UnixWare ARCserver 本地符号链接漏洞"
updated = "2026-06-16T21:51:06.770"

