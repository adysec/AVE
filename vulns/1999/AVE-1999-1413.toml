[basic]
description = "CVE-1999-1224 是 IMAP 服务（如 IMAP 4.1 BETA 及可能其他版本）中存在的一个拒绝服务漏洞。其原理是 imapd 进程未能正确处理 SIGABRT（abort）信号，当本地用户向服务器发送特定顺序的命令组合时，会触发中止信号导致服务进程异常崩溃并生成核心转储（core dump）文件。该漏洞影响运行上述存在缺陷版本 IMAP 服务的系统。攻击条件为攻击者需具备目标系统的本地访问权限。利用方式是本地用户通过构造并发送特定命令序列诱发服务崩溃，不仅造成邮件服务不可用，而且生成的核心转储文件中可能包含敏感密码等凭据信息，存在信息泄露风险。"
published = "1997-10-08T04:00:00.000"
remediation = "升级到 IMAP 4.1 正式发布版（4.1 final 或更高版本），该版本已修复对 SIGABRT 信号处理不当的问题。若无法立即升级，可在服务端以非特权用户运行 imapd，并配置系统限制 core dump 文件生成（如执行 ulimit -c 0 或在 /etc/security/limits.conf 中设置 * hard core 0），同时收紧 imapd 运行目录权限，防止 core 文件泄露敏感口令信息。"
score = 3.6
severity = "LOW"
sources = ["avd"]
