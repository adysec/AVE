[basic]
description = "EasyCart 购物车应用程序存在隐藏表单字段篡改漏洞，远程攻击者可通过修改隐藏表单字段中的敏感购买信息（如价格、数量、商品 ID 等）来篡改订单数据。攻击者无需身份认证即可远程利用该漏洞，通过在提交订单前修改表单隐藏字段的值，实现低价购买、篡改订单金额或修改商品信息等欺诈行为。该漏洞影响 EasyCart 购物车应用程序相关版本，CVSS 评分 7.5，属于高危漏洞。攻击者仅需在提交订单前修改表单隐藏字段的值即可实施攻击，无需特殊权限或复杂条件。"
published = "2000-02-01T05:00:00.000"
remediation = "升级到已修复该问题的 EasyCart 最新版本，并彻底移除对客户端隐藏表单字段的依赖，改在服务端会话中保存并校验商品价格、数量等敏感订单数据，对每次提交执行服务端签名或令牌校验，禁止前端可篡改字段参与金额计算。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
