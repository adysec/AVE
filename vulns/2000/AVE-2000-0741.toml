[basic]
description = "HP TurboIMAGE 是 HP MPE/iX 系统上的数据库管理系统，其 DBUTIL 工具（DBUTIL.PUB.SYS）存在权限提升漏洞。本地攻击者可通过执行特制的 DBUTIL 命令获取额外系统权限，实现机密性、完整性和可用性部分破坏。该漏洞源于 DBUTIL 对用户权限检查不充分，攻击者需拥有本地系统访问权限。CVSS v2 评分 4.6，危害等级中危。"
published = "2000-06-26"
remediation = "HP 已发布安全公告 HPSBMP-2000-006 修复此漏洞。建议立即安装 HP 官方补丁，或临时移除 DBUTIL.PUB.SYS 的 setuid/setgid 权限，限制仅管理员可执行该程序，并启用本地日志审计。"
score = 4.6
severity = "MEDIUM"
sources = ["cve"]
title = "HP TurboIMAGE DBUTIL 本地权限提升漏洞"
updated = "2026-06-16"

