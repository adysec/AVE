[basic]
description = "多个 Linux 系统自带的 dip（Dialup IP）拨号连接工具存在本地缓冲区溢出漏洞，由于其 setuid root 权限设计，本地普通用户可通过向 dip 程序传入超长参数触发栈溢出，从而以 root 权限执行任意代码，实现本地权限提升。该漏洞影响 dip 3.3.7 及可能更早的版本，CVSS 评分 7.2，危害等级高。利用条件为拥有本地 shell 权限。"
published = "1996-07-09T04:00:00.000"
remediation = "升级 dip 至 3.3.7p 或更高版本以修复缓冲区溢出漏洞；如无法升级，可执行 `chmod u-s /usr/sbin/dip` 移除 dip 的 setuid 位作为临时缓解措施，防止非授权用户以 root 权限执行 dip。建议同时限制可访问 dip 的用户组范围。"
score = 7.2
severity = "HIGH"
sources = ["epss"]
title = "Fred N. van Kempen dip 3.3.7 本地缓冲区溢出漏洞"
updated = "2026-06-16T21:47:40.520"

