[basic]
description = "FNOS 的 app-center 组件 static 文件服务接口存在目录遍历漏洞，由于未对用户请求路径中的 `../` 序列进行有效过滤与校验，远程未授权攻击者可通过向目标系统发送特制的 HTTP GET 请求（如 `/static/../../../etc/passwd`），利用路径穿越技术越权读取服务器上的任意敏感文件。该漏洞可导致系统配置文件、用户凭证等关键信息泄露，进一步扩大攻击面，危害较大。"
published = "20260301"
remediation = "升级飞牛 fnOS 系统至包含该修复的最新版本（关注 https://help.fnnas.com/articles/v1/safety/vulnerability-report 发布的应用安全更新公告）。在 app-center 静态文件服务中加入路径规范化校验，对 `../` 及绝对路径符号进行过滤，确保最终解析路径位于 `static/` 目录白名单内。临时缓解措施可在反向代理层（如 Nginx）添加 `location /static/ { alias ...; }` 规则并禁止路径穿越。若无版本修复，可暂时关闭 app-center 的对外静态文件访问或通过 WAF 规则拦截 `../` 等遍历特征。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "FNOS app-center static 目录遍历漏洞"
updated = "20260301"

