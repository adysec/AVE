[basic]
description = "用友NC系统 `/ebvp/register/qrySubPurchaseOrgByParentPk` 接口存在 SQL 注入漏洞，攻击者无需身份认证即可通过 POST 请求向 `pk_group` 参数注入恶意 SQL 语句，利用 Oracle 数据库的 `DBMS_PIPE` 等内置函数实现数据窃取、权限提升甚至远程命令执行。该漏洞影响用友 NC 全版本，危害等级高，建议用户尽快升级至安全版本或部署 WAF 防护规则。"
published = "2025-07-05"
remediation = "升级用友NC至官方发布的安全补丁版本，在Nginx或反向代理层配置WAF规则拦截对 `/ebvp/register/qrySubPurchaseOrgByParentPk` 接口的恶意SQL注入请求，同时对 `pk_group` 等输入参数实施严格的类型校验和参数化查询处理。"
score = 5.0
severity = "MEDIUM"
sources = ["hwpoc"]
title = "用友 NC qrySubPurchaseOrgByParentPk SQL注入漏洞"
updated = "2025-07-05"

