[basic]
description = "IBM Network Station Manager NetStation 2.0 R1 存在竞争条件漏洞，本地用户可通过符号链接攻击提升系统权限。该漏洞允许未经身份认证的本地用户在目标系统上执行符号链接操作，利用文件处理中的时间差竞态突破原有权限限制，最终获取更高权限。该漏洞影响 IBM Network Station Manager 部署环境，CVSS 评分 6.2，危害等级中等。"
published = "1999-12-27T05:00:00.000"
remediation = "建议将 IBM Network Station Manager 升级至修复了该符号链接竞争条件漏洞的后续版本（2.0 R2 或厂商发布的相关补丁）。如暂无法升级，应以最小权限原则限制本地普通用户对关键目录的写权限与符号链接创建能力，并监控 /tmp 等临时目录下的异常符号链接行为，避免低权限用户借机提权。"
score = 6.2
severity = "MEDIUM"
sources = ["cve"]
title = "IBM Network Station Manager 本地用户竞争条件权限提升漏洞"
updated = "2026-06-16T21:50:51.093"

