[basic]
description = "Solaris Solstice AdminSuite（AdminSuite）2.1 及 2.2 版本中的 Database Manager（数据库管理器）存在权限提升漏洞。该组件以 setgid bin 权限运行，导致本地用户可通过其保存选项（save option）获取 bin 组权限，从而实现权限提升。攻击者需拥有本地系统访问权限才能利用，影响范围覆盖 Solaris 操作系统平台。"
published = "1997-11-10T05:00:00.000"
remediation = "立即应用 Sun Security Bulletin #145 提供的补丁，升级 Solstice AdminSuite 至修复版本。如无法升级，以 root 身份执行 `chmod g-s /usr/bin/db_manager` 移除 Database Manager 的 setgid bin 权限位，作为临时缓解措施。同时限制可登录主机的本地用户范围，仅授权可信用户访问。"
score = 6.2
severity = "MEDIUM"
sources = ["avd"]
title = "Sun Solaris Solstice AdminSuite 权限提升漏洞"
updated = "2026-06-16T21:50:25.203"

