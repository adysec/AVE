[basic]
description = "lpr 软件包中的行式打印机守护进程（lpd）存在权限提升漏洞，本地攻击者可通过诱使 sendmail 以特制命令行参数（如使用 -C 选项指定恶意配置文件）执行，从而获取 root 权限。该漏洞影响多种 BSD 及 Linux 操作系统，攻击者需具备本地系统访问权限，无需身份认证即可利用，CVSS 评分 10.0，危害等级严重。"
published = "2000-01-08T05:00:00.000"
remediation = "立即升级 lpr 软件包至修复版本：Red Hat Linux 6.x 升级至 lpr-0.48-1，5.x 升级至 lpr-0.48-0.5.2，4.x 升级至 lpr-0.48-0.4.2；Debian 及其他 Linux 发行版请更新 lpr/lpd 至对应安全修复版本。如无法立即打补丁，可临时禁用 lpd 服务（systemctl disable lpd 或 chkconfig lpd off），或在防火墙层面阻止对 TCP 端口 515 的远程访问作为临时缓解措施。"
score = 10
severity = "CRITICAL"
sources = ["exploitdb"]
title = "BSD/Linux lpr 行式打印机守护进程本地权限提升漏洞"
updated = "2026-06-16T21:53:24.513"

