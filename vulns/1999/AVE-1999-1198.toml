[basic]
description = "Red Hat Linux 系统中的 screen 终端复用程序未使用 Unix98 伪终端（ptys），存在安全漏洞。本地攻击者可利用此缺陷，通过 screen 程序向其他用户的终端写入数据，实现终端劫持或注入恶意命令。该漏洞影响 Red Hat Linux 多个版本，CVSS 评分 10.0，危害等级严重。攻击者需拥有本地系统访问权限，无需额外认证即可利用。"
published = "2000-01-04T05:00:00.000"
remediation = "升级 screen 程序至 3.7.6 及以上版本，该版本默认使用 Unix98 ptys 并正确设置终端权限，防止本地用户跨终端写入。如无法升级，可在 screen 配置文件中设置 `perm` 选项限制终端访问，或通过 `chmod 700 /dev/pts/*` 收紧伪终端权限作为临时缓解措施。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "Red Hat Linux screen 程序本地终端写入漏洞"
updated = "2026-06-16T21:49:16.680"

