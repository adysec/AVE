[basic]
description = "Internet Anywhere POP3 Mail Server 2.3.1 存在拒绝服务漏洞，远程攻击者无需身份认证即可向 POP3 服务发送特制的 LIST、TOP 或 UIDL 命令（以字母作为参数），导致服务进程崩溃，造成拒绝服务。该漏洞影响了 True North 公司开发的邮件服务器软件，危害等级中危，CVSS 评分为 5.0。"
published = "1999-10-01T04:00:00.000"
remediation = "立即停止使用已停止维护的 Internet Anywhere POP3 Mail Server 2.3.1，迁移至受支持的邮件服务器（如 Dovecot、Microsoft Exchange）。如无法立即迁移，在防火墙上限制仅允许可信 IP 访问 POP3 端口（TCP 110），并部署 IPS/IDS 规则拦截包含异常 LIST/TOP/UIDL 命令的流量作为临时缓解。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "True North Internet Anywhere Mail Server POP3 拒绝服务漏洞"
updated = "2026-06-16T21:50:34.463"

