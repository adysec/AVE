[basic]
description = "WordPress 插件 Spider Event Calendar 1.4.9 存在 SQL 注入漏洞，远程攻击者可通过向 wp-admin/admin-ajax.php 发送特制的 spiderbigcalendar_month 请求，在 cat_id 参数中注入恶意 SQL 语句，从而获取数据库中的敏感信息（如用户凭证、密码哈希等）。该漏洞无需身份认证即可利用，攻击复杂度低，影响运行该插件的所有 WordPress 站点。厂商至今未发布修复补丁，建议停用该插件。"
published = "2015-03-03T19:59:02.467"
remediation = "立即将 Spider Event Calendar 插件升级至最新版本 1.5.65（该版本已修复 SQL 注入漏洞）；由于该插件已于 2022 年 1 月永久关闭不再维护，建议彻底删除该插件并替换为其他仍在维护的 WordPress 日历插件。临时缓解措施：在 WAF 或 Web 服务器层面添加规则，对 wp-admin/admin-ajax.php 请求中的 cat_id 参数过滤 SQL 注入关键字（如 UNION、SELECT、FROM 等），并限制 admin-ajax.php 的访问来源。"
score = 7.5
severity = "HIGH"
sources = ["nuclei"]
title = "Web-Dorado Spider Event Calendar WordPress插件SQL注入漏洞"
updated = "2026-06-17T00:23:44.737"

