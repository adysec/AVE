[basic]
description = 'UltraScripts UltraBoard 1.6 存在拒绝服务漏洞。远程攻击者可通过在 Session 参数中引用 "UltraBoard" 字符串，触发 UltraBoard 无限 fork 自身进程副本，大量消耗服务器系统资源，导致服务不可用。攻击无需身份认证，仅需向目标发送特制 HTTP 请求即可触发。该漏洞影响 UltraBoard 1.6 及可能的相关版本。'
published = "2000-05-05T04:00:00.000"
remediation = "建议立即升级到 UltraBoard 2000 或更高版本，或联系厂商获取安全补丁。由于 UltraBoard 1.x 系列已停止维护，建议迁移至其他受支持的论坛软件（如 phpBB 或 Discourse）。临时缓解措施可在 Web 服务器（Apache/Nginx）层面限制对 ultraboard.pl 的访问来源 IP，或通过 mod_rewrite 规则过滤包含 Session=../UltraBoard.pl 的恶意请求。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "UltraScripts UltraBoard 1.6 拒绝服务漏洞"
updated = "2026-06-16T21:51:42.443"

