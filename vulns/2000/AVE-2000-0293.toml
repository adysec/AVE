[basic]
description = "Qualcomm Eudora 4.x 邮件客户端存在安全警告绕过漏洞（CWE-59，链接跟随问题）。远程攻击者可通过向目标用户发送包含 .lnk 快捷方式文件的恶意邮件，该快捷方式指向 .exe、.com 或 .bat 等可执行附件，从而绕过 Eudora 内置的可执行附件安全警告机制。当用户点击看似无害的 .lnk 文件时，系统将自动执行其指向的可执行程序，导致任意代码执行。攻击者无需任何身份认证，仅需诱使用户打开邮件即可触发。该漏洞影响 Eudora 4.x 全版本，CVSS 评分 7.5，危害等级高。"
published = "2000-04-28T04:00:00.000"
remediation = '升级到 Eudora 5.0 或更高版本，该版本已修复 .lnk 文件绕过附件警告的问题。如无法升级，请在 Eudora 设置中禁用"自动打开附件"选项，并教育用户不要打开来自不可信来源的 .lnk 后缀文件。同时可在邮件网关层面过滤带有 .lnk 附件的邮件作为临时缓解措施。'
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "Qualcomm Eudora 4.x 可执行附件警告绕过漏洞"
updated = "2026-06-16T21:51:31.033"

