[basic]
description = 'ICQ 99a 的 Web 服务器组件（build 1701）在启用 "Active Homepage" 功能时存在文件存在性信息泄露漏洞。远程攻击者无需认证即可通过向目标服务器发送特定的文件路径请求，根据服务器返回 "404 Forbidden"（文件存在）与 "404 Not Found"（文件不存在）的不同响应状态码，判断服务器上敏感文件是否存在，从而为进一步攻击收集信息。该漏洞影响 ICQ 99a 版本，危害等级中危。厂商尚未发布官方修复补丁。'
published = "1999-05-01T04:00:00.000"
remediation = '立即禁用 ICQ 99a 的 "Active Homepage" 功能（在设置中取消勾选），或升级至 ICQ 2000b 及以上版本。如无法升级，在系统防火墙中阻止外部对 ICQ 内嵌 Web 服务器端口（默认 7326/TCP）的访问，仅允许本地回环地址连接。'
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "ICQ ICQ 99a Web服务器路径信息泄露漏洞"
updated = "2026-06-16T21:50:23.923"

