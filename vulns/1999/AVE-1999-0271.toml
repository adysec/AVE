[basic]
description = "SGI IRIX 系统自带的 mailx 邮件处理程序存在缓冲区溢出漏洞。攻击者可通过向目标系统发送特制的邮件或构造超长的命令行参数，触发 mailx 程序在处理输入时发生缓冲区溢出，导致程序崩溃或执行任意代码。该漏洞影响 RedHat Linux 4.2、SGI IRIX 6.3 及 Solaris 2.6 等操作系统版本，CVSS 评分 4.6，危害等级中危。本地攻击者可利用该漏洞提升权限，远程攻击者也可能通过邮件投递触发利用。"
published = "1998-01-25T05:00:00.000"
remediation = "RedHat Linux 4.2 用户请升级至 RedHat Linux 5.0 及以上版本，或安装 RedHat 官方提供的 mailx 补丁 (RHSA-1999:001)。SGI IRIX 6.3 用户请安装 SGI 安全补丁 1317 (mailx patch)。Solaris 2.6 用户请安装 Sun 补丁 105922-01。所有平台上均可通过限制 mailx 程序仅对受信任用户可执行来降低风险。"
score = 4.6
severity = "MEDIUM"
sources = ["epss"]
title = "SGI IRIX mailx 缓冲区溢出漏洞"
updated = "2026-06-16T21:47:38.563"

