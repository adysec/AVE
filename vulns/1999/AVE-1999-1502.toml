[basic]
description = "DEC ULTRIX 4.2 之前版本的 /usr/bin/mail 程序存在权限提升漏洞。本地攻击者可通过向该程序传递特制参数或利用其不安全的文件操作逻辑，获取超出自身权限的访问能力，从而执行任意系统命令或读取敏感文件。该漏洞影响 DEC ULTRIX 4.2 之前版本，CVSS 评分 4.6，危害等级中危。厂商已发布更新修复此问题。"
published = "1991-08-23T04:00:00.000"
remediation = "建议升级 DEC ULTRIX 至 4.2 及以上版本。如无法升级，可移除 /usr/bin/mail 的 setuid 权限位（chmod u-s /usr/bin/mail）作为临时缓解措施，并限制本地用户对受影响系统的交互式登录权限。"
score = 4.6
severity = "MEDIUM"
sources = ["avd"]
title = "DEC ULTRIX /usr/bin/mail 本地权限提升漏洞"
updated = "2026-06-16T21:50:23.530"

