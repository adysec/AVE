[basic]
description = "Icecast 媒体流媒体服务器存在目录遍历漏洞，攻击者可通过特制的 HTTP 请求发送编码的路径遍历序列 (..)，绕过安全检查读取服务器上的任意文件。这一漏洞影响 Icecast 1.3.10 及更早版本，可能泄露敏感配置、用户凭证及系统文件等信息。攻击者无需身份验证即可远程实施攻击，对使用旧版 Icecast 的组织构成严重威胁。"
published = "2001-10-18T04:00:00.000"
remediation = "升级 Icecast 到 2.x 系列（当前稳定版为 2.5.0），Icecast 1.x 已于多年前停止维护，不再提供安全补丁。从 https://icecast.org/download/ 下载最新源码或通过发行版包管理器安装 icecast2 软件包（如 Debian/Ubuntu 执行 `apt install icecast2`，Red Hat/CentOS 通过 EPEL 源安装）。若无法立即升级，可通过防火墙规则限制仅允许可信 IP 访问 Icecast HTTP 端口（默认 8000），或在 Icecast 配置文件中将 `staticdir` 限制为空目录并关闭目录列表功能，以缩小可被遍历的文件范围。"
score = 5
severity = "MEDIUM"
sources = ["redhat"]
title = "Icecast Icecast 1.3.10 目录遍历漏洞"
updated = "2026-06-16T21:54:57.107"

