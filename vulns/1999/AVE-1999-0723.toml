[basic]
description = "ColdFusion Server 4.0 中的示例可运行代码片段存在安全漏洞，远程攻击者可利用这些代码片段读取服务器上的任意文件、发起拒绝服务攻击，或将服务器作为 HTTP 代理用于其他恶意请求。该漏洞源于 ColdFusion 默认安装时附带的示例文件未进行充分的访问控制，攻击者无需身份认证即可通过构造特制 HTTP 请求触发。受影响版本为 ColdFusion Server 4.0，CVSS 评分 7.5，危害等级高。建议删除或限制对示例目录的访问以缓解风险。"
published = "2001-03-12T05:00:00.000"
remediation = "升级到 ColdFusion 5.0 或更高版本，该漏洞在后续版本中已修复。如无法升级，删除 ColdFusion Server 4.0 安装目录下的 `/cfdocs/examples/` 和 `/cfdocs/snippets/` 等示例目录，或通过 Web 服务器配置限制对这些目录的访问。由于 Allaire 公司已被 Macromedia（后为 Adobe）收购，建议迁移至 Adobe ColdFusion (2023/2021) 以获得持续安全支持。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "Allaire ColdFusion Server 示例代码片段文件读取与拒绝服务漏洞"
updated = "2026-06-16T21:49:20.250"

