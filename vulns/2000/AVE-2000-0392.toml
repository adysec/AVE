[basic]
description = "FreeBSD 3.2 内核在生成进程崩溃转储（core dump）文件时未正确处理符号链接，未正确检查目标文件路径是否为符号链接，导致本地攻击者可通过在受影响目录中预先创建符号链接，诱使内核将 core dump 数据写入任意文件，从而实现任意文件内容覆盖或篡改。该漏洞影响 FreeBSD 3.2 版本，攻击者需拥有本地系统访问权限，利用难度较低，可导致系统文件完整性破坏或权限提升。"
published = "2001-03-12T05:00:00.000"
remediation = "升级 FreeBSD 至 3.3 或更高版本，该漏洞已在 FreeBSD-SA-00:17 安全公告中修复。如无法升级，可通过在 /etc/sysctl.conf 中添加 kern.coredump=0 禁用 core dump 功能，或使用 chmod 1777 设置 core dump 目录权限防止符号链接攻击。"
score = 2.1
severity = "LOW"
sources = ["avd"]
title = "FreeBSD kernel 符号链接跟随本地任意文件修改漏洞"
updated = "2026-06-16T21:51:35.147"

