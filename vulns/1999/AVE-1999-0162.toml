[basic]
description = "Cisco IOS 12.0 及之前版本的 Syslog 服务在处理 UDP 数据包时存在拒绝服务漏洞，远程攻击者无需身份认证即可向目标设备的 syslog 端口（UDP 514）发送特制的恶意数据包，导致设备系统崩溃或重新加载，造成拒绝服务。该漏洞影响 Cisco IOS 12.0.2 及更早版本，攻击条件低，可被远程利用，属于中危安全风险。Cisco 已发布软件更新进行修复。"
published = "1999-01-11T05:00:00.000"
remediation = "升级 Cisco IOS 至 12.0.3 或更高版本以修复 syslog 处理中的缺陷；同时配置扩展 ACL 限制仅允许可信日志服务器向路由器 514/UDP 端口发包，如无需远程日志功能可执行 `no logging host` 关闭 syslog 服务以彻底消除攻击面。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Cisco IOS Syslog UDP 数据包拒绝服务漏洞"
updated = "2026-06-16T21:47:29.447"

