[basic]
description = "D-Link DIR-600 路由器 rev. Bx 版本在固件 2.17b02 之前存在多处跨站请求伪造（CSRF）漏洞。远程攻击者可利用特制的配置模块向 hedwig.cgi 发送请求，劫持管理员会话创建管理员账户或启用远程管理功能；也可通过 SETCFG,SAVE,ACTIVATE 操作向 pigwidgeon.cgi 发送请求激活恶意配置，或通过 diagnostic.php 的 ping 操作发起攻击。攻击者需与目标设备处于同一局域网，且管理员已登录管理后台。该漏洞 CVSS 评分 8.0，危害等级高，可能导致设备完全受控。"
published = "2015-01-13T11:59:04.477"
remediation = "将 D-Link DIR-600 路由器固件升级至 2.17b02 或更高版本。如无法升级，在路由器管理界面禁用远程管理功能，并限制仅内网 IP 可访问管理页面（192.168.x.x），同时修改默认管理员密码为强密码。建议在 WAN 侧关闭 HTTP/HTTPS 管理端口。"
score = 8
severity = "HIGH"
sources = ["kev"]
title = "D-Link DIR-600 路由器跨站请求伪造漏洞"
updated = "2026-06-17T00:04:00.147"

