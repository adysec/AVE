[basic]
description = "Novell GroupWise 的 Web 服务器组件 GWWEB.EXE 存在目录遍历漏洞。未经身份认证的远程攻击者可通过在 HELP 参数中注入 ..（点号点号）序列，突破 Web 根目录限制，读取服务器上任意扩展名为 .htm 的文件内容。该漏洞影响 Novell GroupWise 5.2 和 5.5 版本，CVSS v2 评分为 5.0（中危），攻击向量为网络，攻击复杂度低，无需身份验证即可利用，但仅可导致信息泄露，无法直接修改数据或执行代码。攻击者只需向目标 Web 服务器发送包含特制 HELP 参数的请求即可触发漏洞，敏感文件内容可能由此外泄。"
published = "1999-12-19T05:00:00.000"
remediation = '升级到 Novell GroupWise 5.5 及以上已修复版本（安装 Novell 官方发布的安全补丁），或对 GWWEB.EXE 的 HELP 参数输入做路径规范化校验，过滤".."目录遍历字符；无法立即升级时可在 Web 服务器前端用反向代理拦截含"../"的请求作为临时缓解措施。'
score = 5
severity = "MEDIUM"
