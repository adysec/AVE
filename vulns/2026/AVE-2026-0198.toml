[basic]
description = "东方通 TongWeb 应用服务器 ejbserver 组件在处理 EJB 远程调用时存在 Java 反序列化漏洞，未经身份认证的远程攻击者可向目标服务器的 /ejbserver/ejb 接口发送特制的反序列化数据包触发该漏洞，导致远程代码执行。该漏洞影响东方通 TongWeb 全系列版本，相关编号为 QVD-2025-44295，危害等级严重。临时缓解措施包括禁用 EJB 远程调用协议、限制接口访问来源及添加 JVM 反序列化过滤器。"
published = "nday"
remediation = "联系东方通技术支持获取 QVD-2025-44295 对应补丁进行升级；临时缓解措施包括：在 TongWeb 管理控制台禁用 EJB 远程调用协议，在反向代理层限制 /ejbserver/ejb 接口的访问来源 IP，添加 JVM 反序列化过滤器 -Djdk.serialFilter=!*，并监控异常的序列化流量。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "东方通 TongWeb 应用服务器 EJB 反序列化远程代码执行漏洞"
updated = "nday"

