[basic]
description = "Windows NT 4.0 DNS 服务器存在拒绝服务漏洞，远程攻击者可通过向目标服务器发送伪造的 DNS 应答数据包（针对未经发起的查询请求）触发该漏洞，导致 DNS 服务因错误处理异常响应而崩溃或停止响应。由于服务器未对非预期的应答包进行有效性验证，攻击者无需身份认证即可利用，严重影响 Windows NT 4.0 系统的域名解析服务可用性。"
published = "1997-01-01T05:00:00.000"
remediation = "安装 Windows NT 4.0 Service Pack 4（SP4）或更高版本以修复 DNS 服务对畸形响应包的解析缺陷。Windows NT 4.0 已停止支持，强烈建议迁移至受支持的 Windows Server 版本（如 Windows Server 2022/2025）。在无法升级前，应配置防火墙仅允许受信任源访问 DNS 服务器 UDP 53 端口，并禁用 DNS 递归查询以降低攻击面。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Microsoft Windows NT 4.0 DNS Server 拒绝服务漏洞"
updated = "2026-06-16T21:48:03.090"

