[basic]
description = "Allaire ColdFusion Server 4.5.1 的 CFCACHE 标签缓存机制存在拒绝服务漏洞。远程攻击者可通过向服务器发送大量针对未存储在内存中的 CFCACHE 缓存文件的重复请求，导致服务器资源耗尽，无法响应正常服务。该漏洞影响 ColdFusion Server 4.5.1 版本，攻击无需身份认证，利用难度较低。"
published = "2000-05-10T04:00:00.000"
remediation = "将 ColdFusion Server 升级至 4.5.2 或更高版本（Allaire 在该版本中修复了缓存处理逻辑，确保 CFCACHE 文件正确存储在内存而非落盘可无限访问）。若无法升级，在 Web 服务器（IIS/Apache）层对 CFIDE 及缓存目录实施限速（rate limiting）和 IP 访问控制，限制同一源地址对缓存文件的重复请求频率。同时清理已产生的磁盘缓存文件，避免被持续滥用耗尽资源。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Allaire ColdFusion Server 4.5.1 文件缓存拒绝服务漏洞"
updated = "2026-06-16T21:51:39.460"

