[basic]
description = "Netscape Enterprise Server 3.6 版本的 SSL 握手处理模块存在缓冲区溢出漏洞。攻击者可通过向目标服务器发送精心构造的 SSL 握手消息，触发缓冲区溢出，导致服务进程异常终止，造成拒绝服务。该漏洞无需认证即可远程利用，攻击条件宽松，任何能与服务器建立 SSL 连接的攻击者均可触发。受影响版本为 Netscape Enterprise Server 3.6，攻击者利用该漏洞可造成服务器宕机，影响网站正常服务可用性。"
published = "1999-07-06T04:00:00.000"
remediation = "立即迁移至受支持的 Web 服务器产品（如 Nginx、Apache HTTP Server 或 Tomcat），并删除或隔离运行 Netscape Enterprise Server 3.6 的主机。如短期无法迁移，应在网络层对 443 端口实施访问控制，仅允许可信 IP 访问 SSL 服务，同时在防火墙上阻断外部对 SSL 端口的直接连接，以缓解拒绝服务风险。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Netscape Enterprise Server SSL 握手缓冲区溢出拒绝服务漏洞"
updated = "2026-06-16T21:48:58.993"

