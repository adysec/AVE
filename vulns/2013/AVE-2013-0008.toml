[basic]
description = "Oracle Fusion Middleware 的 GlassFish Server、JDeveloper 和 WebLogic Server 组件中存在路径遍历漏洞。攻击者无需认证即可远程向 Java Server Faces (JSF) 组件发送包含 ../ 序列的特制资源请求 URI（如 /javax.faces.resource/../../WEB-INF/web.xml.jsf），绕过路径限制读取 Web 应用目录外的任意文件，导致敏感配置信息泄露。"
published = "2013-10-16"
remediation = "建议立即安装 Oracle 2013 年 10 月关键补丁更新（CPU Oct 2013）：WebLogic Server 10.3.6.0 升级至 10.3.6.0.12 及以上、12.1.1.0 升级至 12.1.2.0 及以上；GlassFish Server 2.1.1/3.0.1/3.1.2 升级至对应 CPU 补丁版本；JDeveloper 11.1.2.3.0/11.1.2.4.0/12.1.2.0.0 安装对应补丁。如无法立即升级，可在反向代理层限制对 /jsf/ 等 JSF 路径的访问作为临时缓解。"
score = 5.0
severity = "MEDIUM"
sources = [
    "cve",
    "nuclei",
]
title = "Oracle Fusion Middleware 多个组件路径遍历漏洞"
updated = "2026-06-16"

