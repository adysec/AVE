[basic]
description = "DataEase 是一款开源商业智能与数据可视化工具，其 2.10.11 之前版本中存在 PostgreSQL 数据源 JDBC 连接参数绕过漏洞。虽然此前已对 socketFactory 和 socketFactoryArg 参数进行了检测过滤，但攻击者仍可利用 sslfactory 和 sslfactoryarg 参数绕过限制，通过构造恶意的 JDBC 连接字符串（如使用 FileSystemXmlApplicationContext 加载远程恶意 XML 配置文件），在未授权情况下触发远程代码执行。该漏洞影响 DataEase <= 2.10.10 所有版本，CVSS 评分 9.8，危害严重。官方已在 2.10.11 版本中修复此漏洞。"
published = "2025-07-01T01:15:28.430"
remediation = "立即升级 DataEase 至 v2.10.11 及以上版本，该版本已修复 sslfactory 和 sslfactoryarg 参数的 JDBC 连接绕过漏洞。如无法立即升级，可在前端页面限制 PostgreSQL 数据源 JDBC 连接串输入长度，禁止包含 sslfactory、sslfactoryarg 等危险参数，并限制 DataEase 服务出站网络访问以防止恶意 payload 远程加载执行。"
score = 8.9
severity = "HIGH"
sources = ["hwpoc"]
title = "DataEase PostgreSQL数据源JDBC连接参数远程代码执行漏洞"
updated = "2026-06-17T09:37:27.673"

