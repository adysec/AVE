[basic]
description = "War-FTPD 1.65 版本中存在缓冲区溢出漏洞，远程攻击者可通过向 FTP 服务发送超长用户名或密码参数触发栈溢出，导致远程代码执行。该漏洞影响 War-FTPD 1.65 及更早版本，无需身份认证即可利用，CVSS 评分 7.5，危害等级高危。目前已存在公开的 Metasploit 利用模块。"
published = "1998-02-01"
remediation = "升级 War-FTPD 至 1.67 或更高版本以修复 Username/Password 缓冲区溢出漏洞；如已停止维护，建议迁移至 RaidenFTPD 或其他活跃维护的 FTP 服务器软件。作为临时缓解措施，可限制 FTP 服务仅对可信 IP 开放，并在防火墙侧封锁匿名访问。"
score = 7.5
severity = "HIGH"
sources = [
    "cve",
    "exploitdb",
]
title = "War-FTPD 1.65 缓冲区溢出远程代码执行漏洞"
