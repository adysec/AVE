[basic]
description = "Cherokee HTTPD 0.5 及更早版本中存在跨站脚本（XSS）漏洞。远程攻击者可通过向目标服务器发送特制的畸形请求触发 HTTP 400 错误，由于错误消息生成时未对用户输入进行正确过滤和转义，导致恶意 Web 脚本或 HTML 代码可被注入并执行。此类攻击需配合用户交互（如点击恶意链接），成功利用后可窃取会话 Cookie 或用于钓鱼攻击。CVSS 评分 4.3，危害等级中危。"
published = "2006-04-11T00:02:00.000"
remediation = "升级 Cherokee HTTPD 至 0.5.1 或更高版本，该版本已对 HTTP 400 错误信息中的用户输入进行正确转义处理，防止 XSS 注入。如无法升级，可在反向代理或 WAF 层面过滤包含恶意脚本的畸形请求作为临时缓解。"
score = 4.3
severity = "MEDIUM"
sources = ["nuclei"]
title = "Cherokee HTTPD 跨站脚本漏洞"
updated = "2026-06-16T22:23:25.767"

