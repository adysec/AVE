[basic]
description = "Mandrake Linux usermode 软件包存在权限控制不当漏洞，本地攻击者可通过执行 usermode 提供的系统管理命令，触发目标系统非预期的关机或重启操作。该漏洞源于 usermode 软件包对 halt 和 reboot 等敏感命令的权限校验机制不完善，未正确限制普通用户的执行权限。攻击者只需拥有本地 shell 访问权限即可利用此漏洞，导致系统可用性受影响，造成拒绝服务。受影响的 Mandrake Linux 系统应安装 Red Hat 安全公告 RHSA-2000-053 中提供的更新补丁进行修复。"
published = "2000-07-18T04:00:00.000"
remediation = "将 usermode 软件包升级至修复版本：Mandrake Linux 7.1 升级至 usermode-1.22-2mdk，Red Hat Linux 用户安装 RHSA-2000:053 提供的更新包。可通过 rpm -Uvh usermode-1.22-2mdk.i586.rpm 命令手动升级，或使用 MandrakeUpdate 自动更新。升级后将移除允许普通用户执行 reboot/halt/shutdown/poweroff 的权限，禁止无 root 权限的关机重启操作。"
score = 2.1
severity = "LOW"
sources = ["redhat"]
title = "Mandrake Linux usermode 本地拒绝服务漏洞"
updated = "2026-06-16T21:52:09.197"

