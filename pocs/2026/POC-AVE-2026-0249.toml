[info]
author = "ave"
description = "检测 Gitea 1.27.0 之前版本中 OAuth2 头像同步功能的盲 SSRF 漏洞。当 UPDATE_AVATAR 启用时，服务端使用 Go 默认 HTTP 客户端直接 GET OIDC picture 声明中的 URL，未做出站 IP/主机限制，低权限用户可借此向内网发起 HTTP GET 请求。"
id = "POC-AVE-2026-0249"
name = "CVE-2026-23603 PoC"
severity = "low"
tags = [
    "cve-2026-23603",
    "gitea",
    "ssrf",
]
vuln_id = [
    "CVE-2026-23603",
    "AVE-2026-0249",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/api/v1/version"
protocol = "http"

[[poc.requests.matchers]]
expect = true
status = [200]
type = "status"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["version"]
