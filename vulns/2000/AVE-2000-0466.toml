[basic]
description = "Cobalt RaQ2 和 RaQ3 服务器在处理 FrontPage 上传文件时，未正确设置文件访问权限和所有权，导致攻击者可绕过 cgiwrap 安全机制，直接修改服务器上的文件。该漏洞影响 Cobalt RaQ2 和 RaQ3 服务器产品，攻击者无需身份认证即可通过网络远程利用，攻击复杂度低，成功利用可导致文件被篡改，影响系统的机密性、完整性和可用性，CVSS 评分 7.5（高危）。攻击者可通过 FrontPage 上传功能上传恶意文件，利用权限配置缺陷绕过 cgiwrap 保护，进而修改或覆盖服务器上的关键文件，实现权限提升或破坏服务完整性。Sun Microsystems 已发布补丁修复此漏洞，建议受影响用户尽快升级至修复版本。"
published = "2000-05-22T04:00:00.000"
remediation = "建议立即升级 Cobalt RaQ 服务器至最新固件版本（建议升级至 RaQ 4 或更高版本，或迁移至现代 Linux 服务器平台）。临时缓解措施：1) 在 Web 服务器配置中禁用 FrontPage Server Extensions；2) 手动修复上传目录权限，确保上传文件所有者为 Web 用户且权限设为 644，目录权限 755；3) 配置 cgiwrap 正确限制 CGI 脚本权限；4) 在防火墙层面限制非必要的管理端口访问。建议尽快迁移至现代 Linux 服务器（如 CentOS/Ubuntu + Apache/Nginx），Cobalt RaQ 系列已于 2000 年代停止支持。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "Cobalt RaQ 2/3 安全绕过漏洞"
updated = "2026-06-16T21:51:43.107"

