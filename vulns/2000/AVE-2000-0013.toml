[basic]
description = "Savant Web Server 2.0 存在空字符拒绝服务漏洞。远程攻击者无需身份认证，通过向目标服务器发送包含空字符（%00）的特制 URL 请求即可触发该漏洞。服务器在处理此类畸形请求时，由于对 URL 中的空字符处理不当，导致 Web 服务进程崩溃或停止响应，无法正常提供 HTTP 服务。该漏洞影响 Savant Web Server 2.0 版本，攻击者仅需构造简单的 HTTP 请求即可实施攻击，危害程度中等。"
published = "1999-12-28T05:00:00.000"
remediation = "建议立即停止使用 Savant WebServer 2.0，该软件已停止维护且无安全更新可用。将现有 Web 服务迁移至仍在积极维护的 Web 服务器（如 Apache HTTP Server 2.4.x 或 Nginx 1.x），并确保迁移后完整测试服务可用性。作为临时缓解措施，可在反向代理或 WAF 层面过滤包含空字节（`%00`）的请求 URL，阻止 `.*%00.*` 模式的恶意访问。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Savant WebServer 2.0 URL空字符拒绝服务漏洞"
updated = "2026-06-16T21:50:49.510"

