[basic]
description = "Linux 内核 media 子系统的 vidtv（虚拟数字电视）驱动中存在空指针解引用漏洞。当 vidtv_start_streaming() 中 dvb->mux 未通过 vidtv_mux_init() 成功初始化时，后续调用 vidtv_mux_stop_thread() 会访问空指针 mux，导致内核崩溃。本地低权限攻击者可通过构造特殊 DVB 设备操作序列触发此漏洞，造成拒绝服务。该漏洞影响 Linux 内核多个版本，CVSS 评分 5.5，危害等级中危。"
published = "2025-02-27T03:15:10.870"
remediation = "立即更新 Linux 内核至包含 commit 9b2ffa6148b1 的版本（主线 v6.13-rc4 及以上）。Ubuntu 22.04 LTS 用户升级至 linux-image-5.15.0-1083-gcp 或更新版本（USN-7511-1）；Debian 11 用户应用 DLA-4178 安全更新。如无法立即升级，可卸载或禁用 vidtv 内核模块（modprobe -r vidtv），该模块仅用于测试目的，非生产环境必需。"
score = 5.5
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux kernel vidtv 空指针解引用漏洞"
updated = "2026-06-17T08:14:05.300"

