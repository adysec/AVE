[basic]
description = "CVE-1999-0638 涉及 Unix 系统上运行的多个网络服务存在远程安全漏洞。其中 daytime 服务（端口 13）在目标主机上处于开启状态，该服务会响应 TCP/UDP 请求并返回当前系统时间字符串。攻击条件为攻击者能够与暴露该服务的目标主机建立网络连接，利用方式是通过向 daytime 服务发送探测请求以确认服务存活并收集目标系统信息，从而辅助后续侦察与攻击。该漏洞本身危害较低，主要影响运行了不必要网络服务的 Unix 系统，暴露了多余的服务端口，增加了攻击面。"
published = "1999-01-01T05:00:00.000"
remediation = "在 inetd/xinetd 配置中注释掉 daytime 服务条目（如 /etc/inetd.conf 中的 daytime stream tcp nowait 行并执行 kill -HUP 重启 inetd），或使用防火墙规则（如 iptables -A INPUT -p tcp --dport 13 -j DROP）屏蔽 TCP/UDP 13 端口，关闭不必要的 daytime 服务以减小信息泄露与攻击面。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Unix Daytime 服务暴露漏洞"
updated = "2026-06-16T21:48:46.270"

