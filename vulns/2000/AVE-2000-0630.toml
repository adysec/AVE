[basic]
description = "Kerberos 4 的密钥分发中心（KDC）组件中的 process_v4 函数存在缓冲区溢出漏洞，在处理 localrealm 变量时未正确检查输入长度。远程攻击者无需身份认证即可向目标 KDC 服务发送特制请求触发缓冲区溢出，导致服务崩溃，造成拒绝服务。该漏洞影响使用 Kerberos 4 认证协议的系统。"
published = "2000-06-09T04:00:00.000"
remediation = "立即升级 MIT Kerberos 5 至 1.2 及以上版本，或为 krb5-1.0.x 应用补丁 krb4kdc_10x_patch.txt、为 krb5-1.1.x 应用补丁 krb4kdc_111_patch.txt（均来自 web.mit.edu/kerberos/www/advisories）。KTH-krb4 用户升级至 0.10 及以上版本。如无法升级，可在防火墙限制对 KDC 端口 88/750 的访问，仅允许可信客户端连接作为临时缓解。"
score = 5
severity = "MEDIUM"
sources = ["redhat"]
title = "MIT Kerberos 4 KDC 缓冲区溢出拒绝服务漏洞"
updated = "2026-06-16T21:51:58.287"

