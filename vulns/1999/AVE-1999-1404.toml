[basic]
description = "Novell Netware 4.0 和 4.01 版本中的 LOGIN.EXE 程序在用户登录过程中会将用户名和密码等敏感凭据临时写入磁盘文件，且未妥善保护文件权限。本地攻击者可通过读取这些临时文件获取明文凭据，进而提升权限并接管系统。该漏洞属于本地权限提升类别，CVSS 评分 4.6，影响范围限于 Novell Netware 4.0 和 4.01 版本，攻击条件要求攻击者具备本地系统访问权限。利用方式为直接读取 LOGIN.EXE 生成的临时凭据文件，无需复杂交互即可完成权限提升。"
published = "1993-09-16T04:00:00.000"
remediation = "升级至 Novell Netware 4.11 或更高版本（已修复该漏洞），或应用 Novell 官方发布的 LOGIN.EXE 补丁程序。若无法立即升级，可限制本地用户对 LOGIN.EXE 临时文件目录的访问权限作为临时缓解措施。"
score = 4.6
severity = "MEDIUM"
sources = ["avd"]
title = "Novell Netware 权限提升漏洞"
updated = "2026-06-16T21:49:57.867"

