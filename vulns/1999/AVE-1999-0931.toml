[basic]
description = "Microsoft Windows NT 4.0 AEDebug 注册表项权限配置不当漏洞"
published = "1999-12-31T05:00:00.000"
remediation = '使用注册表编辑器 (regedt32) 将 HKEY_LOCAL_MACHINE\SOFTWARE\Microsoft\Windows NT\CurrentVersion\AEDebug 项的权限修改为仅允许 Administrators 组完全控制，移除 Everyone 和 Users 组的写入权限。如无需自动调试功能，可将 Debugger 键值清空或删除该注册表项。建议升级至受支持的操作系统版本（如 Windows 10/11 或 Windows Server 2016+），因 Windows NT 4.0 已停止安全更新。'
score = 4.6
severity = "MEDIUM"
sources = ["avd"]
title = "Microsoft Windows NT 4.0 注册表权限本地权限提升漏洞"
updated = "2026-06-16T21:49:41.253"

