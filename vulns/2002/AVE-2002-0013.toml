[basic]
description = "OSSP mm 共享内存库（libmm）1.2.0 之前版本存在本地权限提升漏洞。由于该库在处理临时文件时未正确检查文件链接，本地 Apache 用户可通过符号链接攻击操纵临时文件，从而获取目标系统上的更高权限。攻击者需拥有本地访问权限，利用条件较低。该漏洞影响 OSSP mm 1.2.0 之前的所有版本，CVSS 评分 6.2，危害等级中危。"
published = "2002-08-12T04:00:00.000"
remediation = "升级 OSSP mm library (libmm) 至 1.2.0 或更高版本，该版本已修复临时文件创建中的竞争条件问题。如无法立即升级，确保 Apache 用户对临时文件目录（如 /tmp）的写入权限受到严格限制，并启用文件系统防护机制（如 symlink 保护）以缓解符号链接攻击风险。"
score = 6.2
severity = "MEDIUM"
sources = ["osv"]
title = "OSSP libmm 本地权限提升漏洞"
updated = "2026-06-16T21:57:53.087"

