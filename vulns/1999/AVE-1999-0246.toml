[basic]
description = "ToolTalk ttsession 守护进程存在 RPC 认证缺陷，由于使用了弱 RPC 认证机制，远程攻击者无需有效认证即可向该服务发送恶意请求，利用该漏洞可在目标系统上以 ttsession 进程权限执行任意命令。该漏洞影响多个 Unix 操作系统版本，CVSS 评分 7.5，危害等级高。建议升级到包含修复的版本或禁用 ToolTalk 服务。"
published = "1999-09-13T04:00:00.000"
remediation = "立即停止并禁用 ttsession 守护进程（ToolTalk 服务），该服务默认监听 RPC 端口。如业务不需要 ToolTalk 功能，执行 `/etc/init.d/dtlogin stop` 并移除相关启动项。在防火墙上限制对 RPC 端口映射服务（111/TCP,UDP）和 ToolTalk 动态端口的入站访问，仅允许可信主机通信。对于必须使用 ToolTalk 的环境，升级到 Sun 安全公告 192 对应的补丁版本（Solaris 2.5.1/2.6/7），或迁移至已修复此漏洞的 Solaris 8 及以上版本。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "CDE ToolTalk ttsession 守护进程远程代码执行漏洞"
updated = "2026-06-16T21:48:50.907"

