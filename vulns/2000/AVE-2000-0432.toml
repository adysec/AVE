[basic]
description = "Microsoft Windows 95/98/NT 4.0/2000 中的 CIFS Computer Browser 服务存在拒绝服务漏洞，远程攻击者无需身份认证即可通过网络向主浏览器（Master Browser）发送特制的 ResetBrowser 数据帧，导致目标系统的浏览服务崩溃，无法正常维护网络资源列表，造成拒绝服务。该漏洞利用方式简单，后果严重，影响多个 Windows 版本，但受影响的浏览服务重启后可自动恢复。"
published = "2000-05-25T04:00:00.000"
remediation = "Windows 95/98/NT 4.0 已停止支持且无安全补丁，建议升级至受支持版本。对于 Windows 2000，安装最新 Service Pack 并禁用 Computer Browser 服务（services.msc → 停止并禁用）。在防火墙层面阻止入站 UDP 137-138 及 TCP 139/445 端口可缓解远程攻击。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Microsoft Windows CIFS Computer Browser 拒绝服务漏洞"
updated = "2026-06-16T21:51:38.717"

