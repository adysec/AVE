[basic]
description = "Generic-NQS（通用网络队列系统）中存在未知安全漏洞，本地用户可通过特定操作利用该漏洞获取 root 权限。该漏洞影响 Generic-NQS 相关版本，攻击者需具有本地系统访问权限，利用后可在目标系统上实现权限提升，完全控制受影响主机。由于漏洞细节未完全公开，建议用户尽快升级至修复版本。"
published = "2000-03-22T05:00:00.000"
remediation = "立即将 Generic-NQS 升级至 3.50.9 或更高版本。若系统未使用该批处理队列服务，建议直接卸载 generic-nqs 包以彻底消除风险。如暂无法升级，可限制本地用户对 GNQS 相关二进制文件的执行权限，并移除 SetUID 位作为临时缓解措施。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "Generic-NQS GNQS 本地权限提升漏洞"
updated = "2026-06-16T21:51:18.900"

