[basic]
description = "Ipswitch IMail 服务器 6.02 及更早版本在处理 AUTH CRAM-MD5 认证命令时存在拒绝服务漏洞。远程攻击者无需身份认证即可向目标服务器的 143 端口发送特制的 AUTH CRAM-MD5 请求，由于服务器对挑战响应的 CRLF 结束符处理不当，导致服务进程锁定并停止响应，正常用户无法访问邮件服务。该漏洞 CVSS v2 评分 5.0，攻击复杂度低且无需任何权限。"
published = "2000-04-06"
remediation = "升级 Ipswitch IMail 至 6.03 或更高版本，该版本已修复 CRAM-MD5 认证处理中缺少 CRLF 结束符导致的锁定问题。如无法立即升级，可在服务器上禁用 CRAM-MD5 认证方式，强制客户端使用 LOGIN 认证；同时在 Eudora 客户端中设置 SmtpAuthBanished=CRAM-MD5 以绕过该认证方法。若服务已锁定，需重启 IMail 服务进程恢复。"
score = 5.0
severity = "MEDIUM"
sources = [
    "cve",
    "avd",
]
title = "Ipswitch IMail AUTH CRAM-MD5 命令拒绝服务漏洞"
updated = "2026-06-16"

