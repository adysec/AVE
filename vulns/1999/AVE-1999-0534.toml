[basic]
description = "Microsoft Excel 在处理符号链接（SYLK）格式文件时存在安全缺陷，未能对文件中嵌入的宏代码向用户发出安全警告。攻击者可构造包含恶意宏的 SYLK 文件，通过社会工程学手段诱导用户打开，从而在用户系统上执行任意代码。该漏洞影响多个版本的 Microsoft Excel，CVSS 评分 4.6，危害等级中危。用户应谨慎打开来源不明的 SYLK 文件，并确保 Excel 宏安全设置处于较高保护级别。"
published = "1999-10-01T04:00:00.000"
remediation = "升级到 Microsoft Office 2000 及以上版本，这些版本已对 SYLK 文件中的宏显示安全警告。如无法升级，可在组策略中禁用 SYLK 文件关联或通过注册表阻止 .slk 文件自动打开，同时教育用户不要打开来源不明的 SYLK 文件。"
score = 4.6
severity = "MEDIUM"
sources = ["avd"]
title = "Microsoft Excel SYLK 格式文件宏安全警告缺失漏洞"
updated = "2026-06-16T21:49:04.297"

