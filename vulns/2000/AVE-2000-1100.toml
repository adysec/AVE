[basic]
description = 'Microsoft Office 2000 的 UA ActiveX 控件被错误标记为"对脚本安全"，导致远程攻击者可通过诱导用户访问恶意网页或 HTML 邮件，利用 Office 帮助系统中的"Show Me"功能执行任意操作，包括读取、修改或删除用户文件、执行系统命令等。该漏洞影响 Microsoft Office 2000 版本，攻击者无需身份认证即可利用，CVSS 评分 7.5，危害等级高。微软尚未发布官方补丁，建议用户禁用相关 ActiveX 控件以降低风险。'
published = "2000-05-11T04:00:00.000"
remediation = "建议升级至 Microsoft Office XP 或更高版本，Office 2000 已停止安全支持且该 ActiveX 控件存在设计缺陷。如无法升级，可删除或禁用 Office 2000 UA Control 控件的注册表键值（CLSID 下相关项），或通过组策略将 Internet 区域中 ActiveX 控件设置为「禁用」以缓解风险。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "Microsoft Office 2000 UA控件安全脚本绕过漏洞"
updated = "2026-06-16T21:51:41.587"

