[basic]
description = "Ramp Networks WebRamp 1.0 设备存在拒绝服务漏洞。远程攻击者无需身份认证即可向目标设备的 UDP 5353 端口发送特制恶意数据包，触发设备 IP 地址被异常修改，导致网络连接中断。该漏洞利用难度较低，仅需构造简单的 UDP 报文即可实现攻击，影响 WebRamp 全系版本。"
published = "1999-03-01"
remediation = "在防火墙上配置规则阻止外部来源对 UDP 5353 端口的访问，防止恶意 UDP 包篡改设备 IP 地址。由于 Ramp Networks 已被收购且该产品已停止维护，建议更换为仍在支持周期内的同类网络设备。"
score = 5.0
severity = "MEDIUM"
sources = ["cve"]
title = "Ramp Networks WebRamp 1.0 UDP数据包拒绝服务漏洞"
updated = "2026-06-16"

