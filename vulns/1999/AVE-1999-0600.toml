[basic]
description = "IBM AIX 4.1 及 4.2 版本的 C Set++ 编译器所附带的源码浏览器程序数据库名称服务守护进程（pdnsd）存在缓冲区溢出漏洞。攻击者可通过向目标系统发送特制的网络请求触发该溢出，进而在无需身份认证的情况下执行任意代码或导致服务拒绝。由于 pdnsd 以较高权限运行，成功利用后可完全控制系统，影响范围涵盖运行受影响版本 AIX 的系统。该漏洞 CVSS v2 评分为 10.0，危害等级为严重。IBM 已发布相应安全公告及补丁程序修复此问题。"
published = "1999-08-18T04:00:00.000"
remediation = "建议升级到 IBM 官方发布的 C Set ++ 编译器补丁版本，安装 pdnsd 相关 APAR 修复补丁。若无法及时升级，应限制或禁用 Source Code Browser 的 pdnsd 守护进程，通过防火墙限制其网络访问，仅允许可信主机连接，并以最小权限运行该服务以降低缓冲区溢出被利用的风险。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "IBM AIX pdnsd 远程缓冲区溢出漏洞"
updated = "2026-06-16T21:48:58.130"

