[basic]
description = "Internet Explorer 5.01 存在跨帧安全策略绕过漏洞。远程攻击者可通过构造恶意 Java Applet，利用 JSObject 接口与浏览器 DOM 交互，修改 IFRAME 属性指向任意 JavaScript URL，从而绕过跨帧安全限制，读取或操作其他网页框架中的敏感信息。该漏洞影响 IE 5.01 版本，攻击者需诱导用户访问恶意网页，CVSS 评分 2.6，危害等级低。"
published = "2000-04-18T04:00:00.000"
remediation = '升级 Internet Explorer 至 5.5 或更高版本（如 IE 6 SP1），该漏洞在后继版本中已修复。如无法升级，可在浏览器安全设置中将 Java 小程序权限设为禁用，或在 Internet 区域启用"保护模式"（适用于 IE 7+）。鉴于 IE 已停止支持，建议升级至 Microsoft Edge 以获得持续安全更新。'
score = 2.6
severity = "LOW"
sources = ["epss"]
title = "Microsoft Internet Explorer 跨帧安全策略绕过漏洞"
updated = "2026-06-16T21:51:21.387"

