[basic]
description = "Ethereal（现更名为 Wireshark）网络封包分析工具在保存捕获文件时未能正确处理符号链接（symlink），存在不安全的临时文件释放漏洞。本地攻击者可通过在目标系统上预设恶意的符号链接，诱使 Ethereal 进程将捕获数据写入攻击者指定的任意文件路径，从而覆盖系统关键文件或用户数据。该漏洞攻击条件简单，本地用户即可利用，影响所有使用 Ethereal 保存数据包捕获文件的场景，CVSS 评分 7.2，危害等级高。"
published = "1999-07-30T04:00:00.000"
remediation = "该漏洞存在于 Ethereal 在写入数据包捕获文件时未检查符号链接，攻击者可提前创建指向任意系统文件的符号链接，诱使 Ethereal 覆盖目标文件。建议立即升级至 Ethereal 0.8.0 或更高版本（该版本已修复符号链接跟随问题），或直接迁移至 Wireshark（Ethereal 的更名后继项目，默认不存在此漏洞）。临时缓解措施：避免以 root 权限运行 Ethereal，将捕获文件输出到专用目录并确保该目录不允许非信任用户写入，同时设置严格的 umask 限制文件权限。"
score = 7.2
severity = "HIGH"
sources = ["cve"]
title = "Ethereal 数据包捕获文件本地符号链接攻击任意文件写入漏洞"
updated = "2026-06-16T21:49:59.377"

