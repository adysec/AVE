[basic]
description = "O'Reilly WebSite Web服务器 1.1e 及更早版本中的 win-c-sample.exe 存在缓冲区溢出漏洞。远程攻击者可通过向该 CGI 程序发送超长查询字符串（query string），触发栈缓冲区溢出，导致任意代码执行。该漏洞影响 O'Reilly WebSite 1.x 和 2.0 系列版本，属高危漏洞，CVSS 评分 7.5。攻击者无需认证即可实施远程利用，且在 Windows 平台上广泛存在。"
published = "1997-01-01T05:00:00.000"
remediation = "O'Reilly WebSite 已停止维护且不再提供安全更新，建议立即迁移至受支持的 Web 服务器（如 Apache、Nginx）。临时缓解措施：删除或重命名 WebSite 安装目录下的 `win-c-sample.exe` 文件，并在 Web 服务器层面限制对 CGI 示例程序的访问。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "OReilly WebSite 服务器 win-c-sample.exe 缓冲区溢出漏洞"
updated = "2026-06-16T21:47:46.037"

