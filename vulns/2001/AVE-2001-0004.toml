[basic]
description = "NetScreen 防火墙 WebUI 管理界面存在缓冲区溢出漏洞，远程攻击者无需身份认证即可通过向 Web 管理接口发送超长 URL 请求触发该漏洞，导致防火墙服务崩溃，造成拒绝服务。该漏洞影响 ScreenOS 1.73 及 2.x 系列版本，利用方式简单，仅需构造特制 HTTP 请求即可触发，严重威胁网络边界安全设备的可用性。"
published = "2001-02-12T05:00:00.000"
remediation = "升级 ScreenOS 至 3.0 及以上版本以修复 WebUI 缓冲区溢出漏洞。同时，在防火墙策略中限制 WebUI 管理界面的访问来源 IP，仅允许可信管理网段访问（默认端口 80/443），避免将管理接口暴露在公网。如无法立即升级，可在防火墙上配置访问控制列表（ACL）拦截对管理接口的异常长 URL 请求作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "NetScreen Firewall WebUI 缓冲区溢出拒绝服务漏洞"
updated = "2026-06-16T21:53:28.713"

