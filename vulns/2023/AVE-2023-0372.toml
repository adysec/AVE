[basic]
description = "Linux 内核 mac80211_hwsim 模拟 WiFi 驱动存在空指针解引用漏洞，在 mac80211_hwsim_select_tx_link() 函数中未对 sta 指针进行 NULL 有效性检查即直接访问，本地攻击者可利用特制条件触发空指针解引用，导致内核崩溃引发拒绝服务。该漏洞影响 Linux 内核相关版本，需本地权限方可利用。CVSS 评分 5.5，危害等级中等。"
published = "2025-09-15T15:15:47.437"
remediation = "将 Linux 内核升级至 6.1.42、6.4.7 或更高版本，已包含修复提交 d0124848c794。如无法立即升级内核，可卸载 mac80211_hwsim 内核模块（modprobe -r mac80211_hwsim）并禁用其自动加载，作为临时缓解措施。"
score = 5.5
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux kernel mac80211_hwsim 空指针解引用漏洞"
updated = "2026-06-17T06:44:30.673"

