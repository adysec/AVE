[basic]
description = "Microsoft Windows OLE Automation 数组远程代码执行漏洞（CVE-2014-6332，CNVD-2014-08252）存在于 OleAut32.dll 的 SafeArrayDimen 函数中，因对数组重新维度操作时的大小值处理不当导致缓冲区溢出。攻击者可构造恶意网页诱使用户访问，触发数组重新维度操作从而触发漏洞，实现远程代码执行。影响范围覆盖 Windows Server 2003 SP2、Vista SP2、Server 2008 SP2/R2 SP1、Windows 7 SP1、Windows 8/8.1、Server 2012/R2 及 Windows RT 8.1 等版本。攻击向量为网络（AV:N），攻击复杂度低（AC:L），无需权限（PR:N），但需要用户交互（UI:R），CVSS 3.1 评分 8.8（HIGH），机密性、完整性、可用性影响均为高。该漏洞已被 CISA 列入已知被利用漏洞目录，已有公开 PoC/EXP（如 ExploitDB 38512、37668、37800、38500 等）。Microsoft 已于 2014 年 11 月补丁日发布补丁修复。用户需安装对应补丁（MS14-064）并避免访问不可信网站。"
published = "2014-11-11T22:55:05.200"
remediation = "立即安装 Microsoft 2014 年 11 月安全更新补丁 MS14-064 (KB3000869/KB3003057)，通过 Windows Update 自动更新或从 Microsoft Update 目录手动下载对应系统版本补丁包安装。如无法立即打补丁，可在防火墙层面临时阻断非必要的外部 Web 访问，并在 Internet Explorer 中将“ActiveX 控件和插件”设置为“禁用”作为临时缓解措施。建议尽快升级至 Windows 7 SP1 及以上版本并应用最新安全补丁，旧版本 Windows Server 2003/XP 已停止支持建议尽快迁移至受支持系统。"
score = 8.8
severity = "HIGH"
sources = ["kev"]
title = "Microsoft Windows OLE 远程代码执行漏洞"
updated = "2026-06-17T00:12:55.477"

