[basic]
description = "Linux 内核 XSK（XDP Socket）子系统的 Tx 路径中存在空指针解引用漏洞。在 sendmsg() 系统调用流程中，napi id 可以在接口未启用（IFF_UP 未设置）时被标记，随后进入 xsk_xmit() 函数时由于设备标志检查滞后，导致对空指针的访问，引发内核崩溃。攻击者可通过构造特制的 XSK 套接字程序，在未启动的网络接口上触发 Tx 操作，造成拒绝服务。该漏洞影响 Linux 内核版本，CVSS 评分 5.5，危害等级中危。"
published = "2025-09-15T15:15:51.120"
remediation = "此漏洞已在 Linux 内核主线版本 6.3 及稳定分支中修复，对应补丁提交为 commit 1596dae2f17ec、cecc68559cd5 和 ffe19750e68d。建议将内核升级至以下任一已修复版本：6.2.3 及以上、6.1.16 及以上、5.18 及以上（含对应补丁的长期支持版本如 5.15.x 需 cherry-pick 该补丁）。对于无法立即升级内核的环境，可在系统层面限制非授权用户对 AF_XDP 套接字的访问权限，或禁用 xdpsock 类型程序的执行以降低攻击面，但最彻底的修复仍是部署已合入补丁的内核版本。"
score = 5.5
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux内核XSK Tx路径空指针解引用漏洞"
updated = "2026-06-17T06:44:36.210"

