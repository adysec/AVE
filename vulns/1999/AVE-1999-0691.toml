[basic]
description = "Check Point Firewall-1 存在访问控制缺陷，未对 LDAP 目录属性实施有效限制，导致远程未授权攻击者可直接读取或修改敏感 LDAP 属性数据。该漏洞影响配置了 LDAP 集成的 Firewall-1 所有版本，攻击者无需认证即可通过 LDAP 协议访问目录服务中的用户凭证、策略配置等敏感信息，进而可能导致防火墙策略被篡改、管理账号泄露或网络访问控制失效。CVSS 评分 7.5，属高危漏洞，建议升级至修复版本或禁用不必要的 LDAP 服务。"
published = "1999-10-20T04:00:00.000"
remediation = "升级 Check Point Firewall-1 至 4.0 SP2 或更高版本，该版本已修复 LDAP 属性访问控制缺陷。同时，在防火墙规则中限制对 LDAP 服务的访问来源，仅允许受信任的管理主机连接 LDAP 端口（389/TCP），并配置严格的 LDAP 属性访问控制列表（ACL）。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "Check Point Firewall-1 LDAP 属性访问控制漏洞"
updated = "2026-06-16T21:49:16.810"

