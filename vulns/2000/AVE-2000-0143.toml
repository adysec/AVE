[basic]
description = "HP Ignite-UX 是 HP-UX 操作系统中的系统镜像创建工具，其在创建可信系统镜像时未能正确保存 /etc/passwd 文件中的用户密码哈希字段，导致生成的镜像中用户密码字段被置空。本地攻击者登录系统后可通过空密码直接访问任意用户账户，从而获得系统最高权限。该漏洞影响 HP-UX 操作系统，CVSS 评分 7.5，危害等级高。"
published = "2000-02-17"
remediation = "安装 HP 提供的 Ignite-UX 安全补丁（如 PHCO_20153 等对应版本补丁）。使用 Ignite-UX 创建系统映像前，手动备份 /etc/passwd 和 /etc/shadow 文件；恢复系统后立即执行 pwconv 同步口令数据库，并使用 passwd 命令为所有用户（尤其是 root）重设口令，确认 /etc/passwd 中口令字段非空。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "HP HP-UX 权限提升漏洞"
updated = "2000-02-17"

