[basic]
description = "XCmail 0.99.6 在启用 autoquote 功能时存在缓冲区溢出漏洞，远程攻击者可通过向目标邮件服务器发送包含超长 Subject 字段的恶意邮件，触发缓冲区溢出，导致任意代码执行。该漏洞无需身份认证即可远程利用，CVSS 评分 10.0，危害严重。"
published = "1999-05-01"
remediation = "升级到 XCmail 0.99.7 或更高版本，该版本已修复 autoquote 功能的缓冲区溢出问题。由于该软件已长期停止维护，建议迁移至仍受支持的邮件客户端软件。"
score = 10.0
severity = "CRITICAL"
sources = ["cve"]
title = "XCMail 0.99.6 autoquote 功能缓冲区溢出漏洞"
updated = "2026-06-16"

