[basic]
description = "wwwcount 的 Count.cgi 程序存在缓冲区溢出漏洞，远程攻击者无需身份认证即可通过向目标 Web 服务器发送特制的 HTTP 请求触发该漏洞，成功利用后可导致任意命令执行。该漏洞影响 wwwcount 2.3 及更早版本，攻击向量简单，危害严重，属于早期 CGI 应用中典型的远程代码执行漏洞。"
published = "1997-11-05T05:00:00.000"
remediation = "升级 wwwcount 至 2.4 及以上版本，修复 Count.cgi 中缓冲区边界检查缺陷。如无法升级，立即从 CGI 目录移除 Count.cgi 或通过 Web 服务器 ACL 限制访问来源 IP；也可在反向代理层过滤对 /cgi-bin/Count.cgi 的请求并限制 URL 参数长度不超过 256 字节。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "Muhammad A. Muquit wwwcount 缓冲区溢出漏洞"
updated = "2026-06-16T21:47:22.013"

