[basic]
description = "Windows 内核模式驱动 win32k.sys 中的 TrueType 字体解析引擎存在内存破坏漏洞，远程攻击者可通过诱导用户打开包含特制字体数据的 Word 文档或访问恶意网页触发该漏洞，导致系统内核层面远程代码执行。该漏洞已被 Duqu 蠕虫在 2011 年 11 月利用于真实攻击，影响 Windows XP SP2/SP3、Server 2003 SP2、Vista SP2、Server 2008 SP2/R2/R2 SP1 及 Windows 7 Gold/SP1 等多个版本。"
published = "2011-11-04T21:55:04.693"
remediation = '立即安装 Microsoft 安全公告 MS11-087 对应的更新 KB2639417。可通过 Windows Update 自动更新，或从 Microsoft 下载中心手动下载安装。受影响系统包括 Windows XP SP2/SP3、Windows Server 2003 SP2、Windows Vista SP2、Windows Server 2008 SP2/R2/R2 SP1、Windows 7 Gold/SP1。如无法立即打补丁，可在管理员命令行下执行 `icacls "%windir%\system32\t2embed.dll" /deny *S-1-1-0:(F)` 拒绝访问 T2EMBED.DLL 作为临时缓解措施，注意此操作会影响依赖嵌入字体的应用程序（如 PDF 生成）。安装更新后需撤销该缓解措施以恢复功能。'
score = 8.8
severity = "HIGH"
sources = ["kev"]
title = "Microsoft Windows TrueType 字体解析引擎远程代码执行漏洞"
updated = "2026-06-16T23:33:14.020"

