[basic]
description = "Webcart CGI 程序存在配置不当漏洞，由于未对访问权限进行正确限制，远程攻击者可通过向目标服务器发送特制的 HTTP 请求直接访问该 CGI 脚本，导致数据库中的敏感信息（如用户订单详情、支付信息等）被泄露。该漏洞影响使用 Webcart 的早期电子商务网站，攻击者无需身份认证即可利用，危害等级中等。建议管理员限制 CGI 脚本的访问权限或升级至安全版本。"
published = "1999-04-01T05:00:00.000"
remediation = "升级 Webcart CGI 程序至厂商修复版本（1999 年后发布的安全版本），并在 Web 服务器配置中将 Webcart CGI 脚本的执行权限收紧为仅限授权用户访问，移除或重命名暴露内部数据的脚本路径。同时在 Web 服务器（如 Apache）中禁用目录列表、限制 CGI 目录访问来源 IP，并审查 CGI 配置文件确保不输出私有信息作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "webcart 网络购物系统信息泄露漏洞"
updated = "2026-06-16T21:48:43.933"

