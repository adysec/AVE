[basic]
description = "ISC BIND 8.2 及 8.2.1 版本的 named 守护进程存在文件描述符资源耗尽漏洞。远程攻击者可通过向目标 DNS 服务器发送大量特制请求，消耗超过系统限制的文件描述符数量，导致 named 无法处理新的连接请求，造成拒绝服务。该漏洞影响 ISC BIND 8.2 及 8.2.1 版本，同时 BIND 8.2.2 版本还存在 NXT 记录溢出问题，可被利用于远程代码执行。"
published = "1999-11-10"
remediation = "升级 ISC BIND 至 8.2.3 或更高版本，该版本修复了文件描述符耗尽导致的拒绝服务问题。对于运行 IRIX 6.5.17 的系统请安装 SGI 对应补丁，Solaris 7.0 请安装 Sun 安全补丁。若无法升级，可在系统层面限制 named 进程的文件描述符上限，如使用 ulimit 命令设置限制。当前 BIND 8 系列已停止维护，建议迁移至 BIND 9 系列以获得持续安全支持。"
score = 5.0
severity = "MEDIUM"
sources = ["cve"]
title = "ISC BIND 8.2/8.2.1 named 文件描述符耗尽拒绝服务漏洞"
updated = "2026-06-16"

