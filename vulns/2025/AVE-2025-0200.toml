[basic]
description = "汉王e脸通综合管理平台存在SQL注入漏洞，攻击者可通过路径穿越访问 `/doorInfo/queryDoorInfoList.do` 接口，在 `order` 参数中构造恶意UPDATEXML函数注入SQL语句，无需身份认证即可远程利用。该漏洞可导致数据库敏感信息泄露，影响部署了该平台的所有系统版本。厂商尚未发布官方补丁，建议限制相关接口的访问权限。"
published = "0729"
remediation = "建议联系汉王获取官方补丁，或对 queryDoorInfoList.do 等接口的入参使用预编译 SQL 语句（参数化查询）替代字符串拼接，严格校验 order 参数仅允许白名单内的字段名。同时修复路径遍历漏洞，在路由层禁用 /..;/ 序列的解析。临时缓解措施可在 WAF 中配置规则拦截 order 参数中含 UPDATEXML、EXTRACTVALUE 等 SQL 报错注入函数的请求。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "汉王e脸通综合管理平台 SQL注入漏洞"
updated = "0729"

