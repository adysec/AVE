[basic]
description = "GNU glibc 2.1/2.1.1 版本中的 pt_chown 命令存在本地权限提升漏洞。该漏洞的原理是 pt_chown 程序在修改 TTY 终端设备所有权时缺乏严格的权限验证，允许本地用户更改属于其他用户的终端设备权限。攻击者作为系统本地低权限用户，可利用此漏洞将 TTY 设备的写权限授予自己或其他用户，进而窃取同一终端上的会话数据、注入命令或实施进一步攻击，最终实现从普通用户到特权用户的权限提升。该漏洞影响使用受影响 glibc 版本的 Linux 系统，CVSS 评分 4.6，危害等级为中危。"
published = "1999-08-23T04:00:00.000"
remediation = "立即将 GNU glibc 升级至 2.1.2 及以上版本（或发行版对应安全补丁），补丁移除了 pt_chown 的 setuid root 权限并修正 TTY 设备归属逻辑。若无法立即升级，可在系统中移除或重命名 /usr/libexec/pt_chown（或对应路径）并关闭其 setuid 位（chmod u-s），改用 devpts 文件系统挂载伪终端，以临时缓解本地提权风险。"
score = 4.6
severity = "MEDIUM"
sources = ["exploitdb"]
