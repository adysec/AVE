[basic]
description = "Red Hat Linux 系统中 Secure Locate（slocate）工具存在权限提升漏洞。本地攻击者可通过设置 LOCATE_PATH 环境变量指向特制的恶意配置文件，当 slocate 执行时读取该配置文件，导致攻击者获取 root 或更高权限。该漏洞影响 slocate 组件所在的多版本 Red Hat Linux 系统，攻击者需拥有本地账户访问权限即可利用，危害中等。建议升级至 slocate 最新版本或限制 LOCATE_PATH 环境变量的使用。"
published = "2000-06-21T04:00:00.000"
remediation = "升级 slocate 至 2.6-1 或更高版本。如无法升级，可移除 slocate 的 SUID 权限：`chmod u-s /usr/bin/slocate`。同时避免以 root 身份运行 slocate，并限制用户对 `LOCATE_PATH` 环境变量的控制能力。"
score = 4.6
severity = "MEDIUM"
sources = ["cve"]
title = "Red Hat Secure Locate 权限提升漏洞"
updated = "2026-06-16T21:52:05.363"

