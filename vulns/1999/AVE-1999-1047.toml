[basic]
description = "Red Hat Linux 4.2 中的 netcfg 2.16-1 网络配置工具存在安全配置缺陷，当特定选项被设置后，系统重启时以太网接口的控制权会被不当授予普通用户。本地攻击者可利用此漏洞在未授权的情况下关闭网络接口，导致目标系统失去网络连接能力，造成拒绝服务。该漏洞影响 Red Hat Linux 4.2 系统，CVSS 评分 2.1，危害等级低，攻击前提是攻击者拥有本地访问权限。"
published = "1999-12-31T05:00:00.000"
remediation = "升级 netcfg 至修复版本，或应用 Red Hat RH42 errata 中针对 netcfg 的安全更新。该漏洞在 Red Hat Linux 4.2 的 netcfg 2.16-1 中存在，建议禁用 netcfg 的自动接口控制选项作为临时缓解。对于已停止支持的旧版本，建议迁移至现代受支持的 RHEL 发行版（如 RHEL 7/8/9），并确保网络管理组件保持最新安全更新。"
score = 2.1
severity = "LOW"
sources = ["cve"]
title = "Red Hat Linux netcfg 本地拒绝服务漏洞"
updated = "2026-06-16T21:50:12.733"

