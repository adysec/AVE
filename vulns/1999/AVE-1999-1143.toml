[basic]
description = "3Com SuperStack II 集线器运行软件版本 2.10 中的管理信息库（MIB）存在信息泄露漏洞。该漏洞源于 MIB 中对象标识符 .1.3.6.1.4.1.43.10.4.2 在只读团体字符串权限下即可访问，但该标识符会列出完整的团体字符串表。远程攻击者无需认证即可通过 SNMP 协议读取该 OID，获取所有团体字符串，进而利用获取的读写团体字符串对设备进行未授权配置修改或信息窃取。该漏洞影响 3Com SuperStack II 系列集线器设备，CVSS 评分 7.5，危害等级高。"
published = "1999-08-30T04:00:00.000"
remediation = "3Com SuperStack II hub 已停止支持且无官方补丁。建议立即升级到支持 SNMPv3 的替代设备；如无法更换，须在边界防火墙上限制 SNMP 端口（UDP 161/162）仅允许受信管理 IP 访问，并将 SNMP read-only community 字符串修改为复杂随机值，同时禁用默认 public/private 字符串，定期审计 SNMP 访问日志。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "3Com SuperStack II hub Management Information Base (MIB) 信息泄露漏洞"
updated = "2026-06-16T21:50:36.093"

