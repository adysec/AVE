[basic]
description = "Oracle Java SE 7 Update 6及更早版本中的Java运行时环境（JRE）组件存在安全管理器绕过漏洞。远程攻击者可通过诱导用户访问恶意网页，由特制Java小程序（Applet）利用com.sun.beans.finder.ClassFinder.findClass方法结合forName异常机制访问受限类（如sun.awt.SunToolkit），再通过反射调用getField方法修改私有字段，完全绕过SecurityManager安全限制，实现任意代码执行。该漏洞在2012年8月已被野外利用，影响所有安装了受影响Java版本的浏览器用户，CVSS评分9.8，危害等级严重。Oracle官方已在后续更新中修复此漏洞。"
published = "2012-08-28T00:55:01.860"
remediation = "立即卸载 Java 7 Update 6 及更早版本，升级到 Oracle Java 7 Update 7 或更高版本。如业务必须使用旧版 Java，可在浏览器中禁用 Java Applet 插件，并将 Java 安全级别设置为最高。"
score = 9.8
severity = "CRITICAL"
sources = ["kev"]
title = "Oracle Java SE JRE 远程代码执行漏洞"
updated = "2026-06-16T23:45:34.017"

