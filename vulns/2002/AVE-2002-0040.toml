[basic]
description = "purity 1-16 版本中存在多处缓冲区溢出漏洞。该漏洞源于程序在处理游戏高分记录等数据时未正确验证输入长度，导致缓冲区溢出。本地攻击者可利用该漏洞以游戏进程权限执行任意代码，从而提升权限并篡改高分榜数据。攻击条件为拥有本地系统访问权限，无需额外认证，危害等级高。"
published = "2002-09-24T04:00:00.000"
remediation = "建议立即升级 purity 至 1-16 或更高版本。Debian 用户应通过 apt upgrade 安装 purity 1-14.2（woody）或更新版本。如无法升级，建议限制本地非信任用户访问系统以降低利用风险。"
score = 7.2
severity = "HIGH"
sources = ["osv"]
title = "purity 游戏缓冲区溢出本地权限提升漏洞"
updated = "2026-06-16T21:58:46.310"

