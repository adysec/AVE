[basic]
description = "Check Point FireWall-1 3.0 及 4.0 版本存在拒绝服务漏洞。远程攻击者可通过 VPN-1 通道向目标主机 UDP 端口 0 发送特制数据包，触发防火墙组件异常，导致服务崩溃或无法响应正常请求。该漏洞无需身份认证即可远程利用，但攻击前提是目标已配置 VPN-1 功能且相关端口可达。受影响的版本包括 Check Point FireWall-1 3.0 与 4.0 系列。"
published = "1999-08-09T04:00:00.000"
remediation = "升级 Check Point FireWall-1 至 4.0 Service Pack 3 及以上版本，或迁移至 FireWall-1 4.1。如在边界防火墙上启用 VPN-1 模块，建议在入方向 ACL 中丢弃目标端口为 0 的 UDP 报文，并在 VPN-1 网关配置中禁用对 port 0 流量的转发处理作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Check Point FireWall-1 3.0/4.0 UDP 数据包拒绝服务漏洞"
updated = "2026-06-16T21:48:49.377"

