[info]
author = "ave"
description = "检测目标 DNS 服务是否运行 BIND named（CVE-1999-0029）。该漏洞是 BIND 8.x 在处理大量并发 TCP 连接时未能正确关闭连接，导致 named 进程崩溃或拒绝服务。通过向目标发送 DNS A 记录查询，检查是否返回正常响应以确认服务存在。"
id = "POC-AVE-1999-0089"
name = "CVE-1999-0029 BIND named TCP 连接拒绝服务 PoC"
severity = "medium"
tags = [
    "cve-1999-0029",
    "bind",
    "denial-of-service",
    "dns",
    "ave-1999-0089",
]
vuln_id = [
    "CVE-1999-0029",
    "AVE-1999-0089",
]

[poc]
logic = "any"

[[poc.requests]]
dns_type = "A"
path = "{{Hostname}}"
protocol = "dns"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["IN"]
