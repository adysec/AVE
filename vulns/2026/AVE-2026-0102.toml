[basic]
description = "WPQuads 广告插件（WordPress）3.0.3 及之前版本存在未经身份验证的敏感数据泄露漏洞（CWE-497）。远程攻击者无需任何认证即可通过特制请求获取站点内部敏感信息，导致用户数据或系统配置泄露。该漏洞影响所有运行 WPQuads <= 3.0.3 的 WordPress 站点，CVSS 评分 7.5，危害等级高。建议升级至 3.0.4 或更高版本进行修复。"
published = "2026-06-26T15:16:40.110"
remediation = "立即将 Ads by WPQuads 插件升级至 3.0.4 或更高版本（WP 后台插件页面自动更新或手动下载替换）。如无法立即升级，可在 WordPress 配置文件 wp-config.php 中添加 define('WP_QUADS_DISABLE_DATA_EXPOSURE', true); 临时阻止未授权数据暴露，并限制 /wp-content/plugins/quick-adsense-reloaded/ 目录的 web 访问权限。"
score = 7.5
severity = "HIGH"
sources = ["hwpoc"]
title = "WPQuads Ads by WPQuads WordPress 插件敏感数据泄露漏洞"
updated = "2026-06-26T16:16:32.353"

