[basic]
description = "Windows NT 4.0 及 Terminal Server Edition 系统中的 rdisk 工具在备份注册表时，会将注册表配置单元（hive）信息存储到临时文件中，且该临时文件权限设置不当，允许本地普通用户读取。攻击者利用低权限账户登录系统后，可读取该临时文件中的敏感注册表信息，可能导致系统密码哈希、配置密钥等机密数据泄露。该漏洞影响 Windows NT 4.0 及 Terminal Server Edition 版本，CVSS 评分 2.1，危害等级低，利用前提是攻击者已获得本地访问权限。"
published = "2000-02-04T05:00:00.000"
remediation = "Windows NT 4.0 及 Terminal Server Edition 已停止支持，建议升级至 Windows Server 2016/2019/2022 或更高版本。临时缓解措施：限制 RDISK.EXE 的执行权限，禁止非管理员用户运行该工具；修改临时目录权限，确保注册表临时文件仅 SYSTEM 和管理员可读。"
score = 2.1
severity = "LOW"
sources = ["epss"]
title = "Microsoft Windows NT 4.0 及终端服务器 RDISK 注册表枚举文件信息泄露漏洞"
updated = "2026-06-16T21:50:58.660"

