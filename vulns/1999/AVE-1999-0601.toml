[basic]
description = "Windows NT 4.0 Service Pack 4 中存在身份认证绕过漏洞（CWE-287），由于系统对空 NT 哈希值的处理存在缺陷，攻击者可使用空密码远程访问目标系统的网络共享资源。该漏洞影响 Windows NT 4.0 SP4 版本，CVSS 评分 7.5，危害等级高，可导致未授权访问敏感共享数据。"
published = "1999-02-08T05:00:00.000"
remediation = "立即安装 Microsoft 安全公告 MS99-004 提供的修补补丁，或将 Windows NT 4.0 升级至 Service Pack 5（SP5）及以上版本。该漏洞源于 SP4 对空 NT hash 值的认证逻辑错误，安装补丁后无需修改用户密码即可修复。鉴于 Windows NT 4.0 已停止支持，建议迁移至受支持的 Windows Server 版本。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "Microsoft Windows NT 4.0 网络共享空密码认证绕过漏洞"
updated = "2026-06-16T21:48:14.543"

