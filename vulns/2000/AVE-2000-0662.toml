[basic]
description = "Sybergen Secure Desktop 2.1 未能正确防护伪造的路由器通告（ICMP type 9）报文，远程攻击者可向目标主机发送特制的虚假 ICMP 路由器通告数据包，导致目标系统默认路由被篡改，进而将网络流量劫持至攻击者控制的恶意主机。该漏洞源于对 ICMP 协议报文缺乏充分的验证机制，攻击者无需认证即可在目标网络内实施中间人攻击，造成信息泄露或进一步渗透。CVSS 评分 5.0，危害等级中危。"
published = "2000-06-30T04:00:00.000"
remediation = "建议升级到 Sybergen Secure Desktop 更高版本（该产品已停止维护，建议迁移至其他受支持的端点安全软件），同时在网络边界防火墙及主机层面配置丢弃入站 ICMP 类型 9 路由器通告报文（IPv4）以及阻断 ICMPv6 路由通告，防止未授权的路由表篡改。如无法升级，在操作系统层面禁用 ICMP 路由发现协议（如 Windows 下将 EnableICMPRedirect 注册表值设为 0 并关闭 Routing and Remote Access 服务）。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Sybergen Secure Desktop 2.1 ICMP 路由通告欺骗漏洞"
updated = "2026-06-16T21:52:00.940"

