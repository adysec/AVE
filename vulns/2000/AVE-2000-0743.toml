[basic]
description = "Alt-N MDaemon 3.1.1 及更早版本的 WebConfig 组件中存在堆溢出漏洞。远程攻击者可通过向目标系统发送超长 URL 触发该漏洞，导致服务拒绝，甚至可能在受影响系统上执行任意命令。该漏洞影响 MDaemon 3.1.1 及之前版本，CVSS 评分 7.5，危害等级高危。"
published = "2000-12-11T05:00:00.000"
remediation = "立即升级 Alt-N MDaemon 至 3.1.2 或更高版本，该漏洞已在后续版本中修复。如无法升级，在防火墙或路由器层面限制对 WebConfig 服务端口（默认 3000）的远程访问，仅允许可信 IP 连接，以降低被攻击风险。"
score = 7.5
severity = "HIGH"
sources = ["exploitdb"]
title = "Alt-N MDaemon WebConfig 堆溢出远程拒绝服务漏洞"
updated = "2026-06-16T21:52:59.267"

