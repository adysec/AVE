[basic]
description = 'TalentSoft Web+ 4.x 购物车应用中的 webpsvr 守护进程存在目录遍历漏洞，远程攻击者可通过向 webplus CGI 程序发送包含".."（点点）路径遍历序列的恶意请求，绕过目录限制读取服务器上任意文件。该漏洞影响 TalentSoft Web+ 4.x 版本购物车应用，CVSS 评分 5.0（中等危害），攻击者无需身份认证即可远程利用，通过构造包含目录遍历序列的 HTTP 请求即可读取服务器敏感文件，如配置文件、源代码或系统敏感文件，导致敏感信息泄露。TalentSoft 已发布补丁修复该漏洞，建议用户及时升级至修复版本。'
published = "2000-04-12T04:00:00.000"
remediation = "升级 TalentSoft Web+ 至官方修复版本 4.1 或以上（或迁移至已修复的 Web+ 5.0 版本）；如暂无法升级，应在 webpsvr 配置中禁用 webplus CGI 程序，并在 Web 服务器（如 Apache/IIS）层添加 URL 重写规则拦截包含 `../` 和 `..%2f` 的请求路径，同时以低权限用户运行 webpsvr 并限制其对系统目录的访问权限作为临时缓解。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "TalentSoft Web+ 4.x 目录遍历漏洞"
updated = "2026-06-16T21:51:23.500"

