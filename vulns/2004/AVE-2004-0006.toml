[basic]
description = "Open Bulletin Board (OpenBB) 1.0.6 及更早版本中存在多个跨站脚本（XSS）漏洞，由于未对用户输入进行充分过滤，远程攻击者无需身份认证即可通过向 member.php 的 redirect 参数、myhome.php 的 to 参数、post.php 的 TID 参数或 index.php 的 redirect 参数注入恶意 Web 脚本或 HTML 代码，在受害者浏览器中执行任意脚本，窃取会话 Cookie 或进行钓鱼攻击，影响系统机密性。"
published = "2004-04-25T04:00:00.000"
remediation = "升级 OpenBB 至 1.0.6 以上版本，该版本已修复多个 XSS 注入点。对所有用户输入参数（member.php 的 redirect、myhome.php 的 to、post.php 的 TID 等）进行 HTML 实体编码输出，在应用层面禁用不安全的重定向功能或添加白名单验证机制。"
score = 4.3
severity = "MEDIUM"
sources = ["nuclei"]
title = "Open Bulletin Board (OpenBB) 1.0.6 及之前版本跨站脚本漏洞"
updated = "2026-06-16T22:08:44.267"

