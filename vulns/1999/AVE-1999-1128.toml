[basic]
description = "Squid Web Proxy 2.2.STABLE5 及更早版本在使用外部认证模块时存在身份验证绕过漏洞。攻击者可在用户名或密码字段中插入换行符（newline），绕过访问控制规则，从而未经授权访问受保护的代理服务。该漏洞影响 Squid 1.0/1.1/2.1 等多个版本，攻击者无需高级权限即可利用，可能导致敏感信息泄露或代理资源被滥用。"
published = "1999-12-31T05:00:00.000"
remediation = '升级 Squid 至 2.2.STABLE6 或更高版本，该版本已修复外部认证过程中未正确过滤用户名/密码中换行符的问题。对于无法升级的遗留系统，可在认证代理层增加输入校验，过滤 \r\n 等控制字符后转发给外部认证程序。'
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Squid Web Proxy 访问控制绕过漏洞"
updated = "2026-06-16T21:50:32.043"

