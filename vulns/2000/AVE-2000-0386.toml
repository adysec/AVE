[basic]
description = "KDE 桌面环境中的 libmediatool 库存在符号链接攻击漏洞。本地攻击者可通过在 mediatool 处理临时文件时创建恶意的符号链接，诱使程序以当前用户权限在任意路径创建或覆盖文件，导致系统完整性受损。该漏洞攻击复杂度较高，需要本地系统访问权限，且无法远程利用。CVSS 评分 1.2，危害等级低。"
published = "1999-03-01T05:00:00.000"
remediation = "升级 KDE libmediatool 至修复版本（Caldera OpenLinux 安全公告 CSSA-1999-005 对应补丁），或移除 libmediatool 的 setuid 权限位（chmod -s /usr/bin/mediatool），限制本地普通用户对 mediatool 临时目录的写权限，避免符号链接劫持。"
score = 1.2
severity = "LOW"
sources = ["avd"]
title = "KDE libmediatool 符号链接攻击漏洞"
updated = "2026-06-16T21:51:34.640"

