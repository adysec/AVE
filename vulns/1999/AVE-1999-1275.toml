[basic]
description = "Linux 内核 2.0.34 版本中存在信号处理不当的漏洞，由于未正确限制用户向任意进程发送 SIGIO 信号的权限，本地攻击者可向未捕获该信号的进程发送恶意 SIGIO 信号，导致目标进程异常终止或拒绝服务。该漏洞为本地利用，攻击者需具有系统本地访问权限，影响 Linux 2.0/2.1 系列内核版本，CVSS 评分 2.1，危害等级低。"
published = "1998-06-30T04:00:00.000"
remediation = "升级 Linux 内核至 2.2.x 或更高版本，该系列内核已限制普通用户向任意进程发送 SIGIO 信号的权限。如无法升级内核，可通过内核参数或 grsec/PAX 等安全模块限制信号发送权限作为临时缓解。"
score = 2.1
severity = "LOW"
sources = ["avd"]
title = "Linux Kernel SIGIO 信号任意进程拒绝服务漏洞"
updated = "2026-06-16T21:50:26.860"

