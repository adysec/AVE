[basic]
description = "泛微 E-Office 9 的 do_excel.php 接口存在任意文件写入漏洞，由于未对用户传入的文件路径和内容进行有效过滤与校验，攻击者可通过构造特制的 HTTP 请求向服务器任意目录写入恶意文件。该漏洞可被远程利用，无需身份认证，攻击成功后可能导致服务器被完全控制。影响泛微 E-Office 9 全版本，建议用户及时升级至安全版本。"
published = "08.08"
remediation = "立即升级泛微 EOFFICE9 至最新版本（≥V9.0.20230808），该版本已修复 do_excelphp 接口未授权文件写入问题。如无法升级，在 Web 服务器层面配置访问控制，限制对 E-Mobile/do_excel.php 路径的访问，仅允许可信 IP 段访问，并禁用 PHP 的 system/exec 等危险函数。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "泛微 EOFFICE9 do_excelphp 任意文件写入漏洞"
