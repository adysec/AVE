[basic]
description = "Netscape Enterprise Server 3.5.1（及可能的其他版本）的搜索功能在默认配置下存在信息泄露漏洞。由于搜索引擎的默认配置允许远程攻击者利用 HTML-tocrec-demo1.pat 模式文件提交特制的搜索命令，从而绕过正常的页面处理逻辑，直接读取服务器端 JHTML 文件的源代码。该漏洞影响运行默认配置的 Netscape Enterprise Server 3.5.1/3.6 等产品，无需身份认证，攻击者仅通过普通的 HTTP 请求即可远程利用，可导致包含业务逻辑、数据库连接等敏感信息在内的 JHTML 源码被泄露，进而增加系统被进一步攻击的风险。"
published = "1999-07-30T04:00:00.000"
remediation = "升级至现代 Web 服务器（如 Apache 2.4+、Nginx 1.18+），Netscape Enterprise Server 已于 2003 年停止支持且无官方补丁。若必须继续使用旧版本，请立即删除或禁用 search engine 的演示模式文件（HTML-tocrec-demo1.pat），并在 Web 应用防火墙层面封禁对 /search 路径及 .pat 文件的访问，同时配置 Web 服务器禁止直接访问 JHTML 源文件。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Netscape Enterprise Server JHTML 源代码泄露漏洞"
updated = "2026-06-16T21:49:47.070"

