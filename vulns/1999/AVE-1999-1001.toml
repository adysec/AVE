[basic]
description = "Cisco Cache Engine（用于 Cisco IOS 11.2 及更早版本）中的 Web 缓存控制协议（WCCP）缺乏身份认证机制，远程攻击者无需任何鉴权即可向目标设备的 UDP 2048 端口发送特制 WCCP 数据包，从而将原本指向合法服务器的 HTTP 流量重定向至攻击者控制的任意主机，进而实现中间人攻击、流量劫持或敏感信息窃取。该漏洞影响大量早期 Cisco 网络设备，CVSS 评分 7.5，危害等级高。"
published = "1999-12-31T05:00:00.000"
remediation = "升级 Cisco IOS 到 11.3 或更高版本（该版本起 WCCP 支持 MD5 认证），并在网络中配置 ACL 限制 UDP 2048 端口的来源 IP 仅为受信任的缓存引擎设备，拒绝来自外部的 WCCP 流量。如无法升级，可在边界防火墙上丢弃发往 UDP 2048 的非授权数据包作为临时缓解。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "Cisco IOS Cache Engine WCCP 身份验证缺失漏洞"
updated = "2026-06-16T21:49:52.753"

