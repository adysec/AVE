[basic]
description = "Atmel 802.11b VNET-B 接入点 1.3 及更早版本的 SNMP 服务存在漏洞，Netgear ME102 和 Linksys WAP11 等采用该芯片组的设备受影响。该漏洞源于 SNMP 服务未正确验证社区字符串，接受任意社区字符串并允许请求的 MIB 修改操作。远程未经身份认证的攻击者可通过网络发送恶意 SNMP 请求，利用该漏洞获取敏感信息（如 WEP 加密密钥）、导致拒绝服务或获得网络访问权限。CVSS 评分 7.5（高危），攻击向量为网络、攻击复杂度低、无需认证，影响机密性、完整性和可用性。"
published = "2001-07-21T04:00:00.000"
remediation = "建议立即升级 Atmel 802.11b VNET-B Access Point 固件至 1.3 以上版本，Netgear ME102 用户升级至固件 2.1.1 以上，Linksys WAP11 用户升级至固件 1.3 以上版本。临时缓解措施：在防火墙层面封锁 UDP 161/162 端口（SNMP 端口），或在无线 AP 管理界面将 SNMP 社区字符串修改为复杂随机字符串并禁用 SNMP 写权限（仅保留只读）。"
score = 7.5
severity = "HIGH"
sources = ["redhat"]
title = "Netgear ME102 Linksys WAP11 802.11b SNMP协议信息泄露与拒绝服务漏洞"
updated = "2026-06-16T21:54:26.680"

