[basic]
description = "TeamTrack Web 服务器存在目录遍历漏洞，远程攻击者无需身份认证即可通过向目标发送包含 `..`（点点）序列的特制 URL 请求，突破路径限制读取服务器上的任意文件。该漏洞影响 TeamTrack 3.0 版本，可能导致敏感信息泄露，为后续攻击提供跳板。CVSS 评分 5.0，危害等级中等。"
published = "1999-10-01T04:00:00.000"
remediation = '建议升级 TeamTrack 至 3.0 以上已修复版本，或迁移至受支持的替代产品。如无法升级，应在 Web 服务器层配置 URL 重写规则，过滤 `../` 及 `..\` 等目录遍历序列，并对用户输入的文件路径参数进行严格的白名单校验，拒绝包含路径分隔符的请求。'
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "TeamShare TeamTrack 3.0 目录遍历漏洞"
updated = "2026-06-16T21:49:21.440"

