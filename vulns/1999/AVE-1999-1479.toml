[basic]
description = "SSH 1.2.26客户端在启用Kerberos V认证时存在缓冲区溢出漏洞。当处理TGT票据传递过程中的长DNS主机名时，未正确进行边界检查，导致缓冲区溢出。远程攻击者可利用此漏洞造成拒绝服务或执行任意命令。"
published = "1998-11-05"
remediation = "升级SSH客户端至1.2.27或更高版本以修复该漏洞。禁用Kerberos V认证可作为临时缓解措施。建议迁移至OpenSSH等现代SSH实现，避免使用已停止维护的SSH 1.x协议版本。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "SSH 1.2.26 Kerberos V 缓冲区溢出漏洞"
updated = "2026-07-20"

