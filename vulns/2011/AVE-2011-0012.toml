[basic]
description = 'Tiki Wiki CMS Groupware 7.0 版本在 web 页面生成过程中，对 snarf_ajax.php 通过 GET 方式传入的 "ajax" 参数未做充分的转义与过滤处理，导致存在跨站脚本（XSS）漏洞。由于该参数内容被直接回显至响应页面，未经身份认证的远程攻击者可构造包含恶意 JavaScript 脚本的特制 URL 诱骗受害者访问，从而在受害者浏览器上下文中执行任意脚本，可能窃取会话 Cookie、篡改页面内容或发起进一步攻击。该漏洞影响 Tiki Wiki CMS Groupware 7.0 及相邻版本，攻击条件仅需受害者点击恶意链接且无需任何权限，利用方式简单，危害等级为中等（CVSS 6.1）。'
published = "2020-01-15T14:15:11.433"
remediation = "建议立即升级 Tiki Wiki CMS Groupware 至 7.1 或更高版本（官方已修复该 XSS 漏洞），或手动修补 snarf_ajax.php 对 ajax 参数进行 htmlspecialchars 转义处理。若暂不能升级，可在 Web 应用防火墙配置规则拦截包含脚本标签的 ajax 参数请求作为临时缓解。"
score = 6.1
severity = "MEDIUM"
sources = ["nuclei"]
