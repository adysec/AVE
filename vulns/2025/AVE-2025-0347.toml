[basic]
description = "泛微 Ecology9 的 FileDownloadLocation 接口存在任意文件下载漏洞，源于权限校验逻辑缺陷。未经身份认证的远程攻击者可在未授权的情况下直接构造恶意请求，通过 mailId 参数注入 SQL 语句绕过权限检查，读取服务器上任意文件（如 WEB-INF 配置、数据库密码等敏感信息）。该漏洞影响泛微 Ecology9 系列版本，危害较大，可能导致企业核心数据泄露。"
published = "2025-07-02"
remediation = "建议升级至泛微 Ecology9 最新安全补丁版本，或联系泛微官方获取针对 FileDownloadLocation 接口的安全修复补丁。临时缓解措施包括：部署 Web 应用防火墙（WAF）拦截包含异常 mailId 参数的请求，在中间件层面限制 /weaver/weaver.email.FileDownloadLocation/ 路径的访问权限，或对该接口进行身份认证加固。"
score = 5.0
severity = "MEDIUM"
sources = ["hwpoc"]
title = "泛微 Ecology9 FileDownloadLocation 任意文件下载漏洞"
updated = "2025-07-02"

