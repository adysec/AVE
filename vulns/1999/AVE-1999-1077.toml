[basic]
description = "Windows NT 4.0 内核句柄管理存在缺陷，本地用户可通过用户态应用程序关闭内核态打开的句柄，当内核尝试重复关闭该句柄时触发系统崩溃，导致拒绝服务。攻击者需拥有本地登录权限，无法远程利用，但成功利用可直接造成目标系统蓝屏宕机，影响 Windows NT 4.0 所有版本。"
published = "1999-12-31T05:00:00.000"
remediation = "升级到 Windows NT 4.0 Service Pack 6a 或更高版本以修复内核句柄处理缺陷。如暂无法升级，应限制本地普通用户权限并禁用不必要的交互式登录会话，避免本地用户运行可关闭内核模式句柄的恶意程序，作为临时缓解措施。"
score = 2.1
severity = "LOW"
sources = ["avd"]
title = "Microsoft Windows NT 4.0 本地拒绝服务漏洞"
updated = "2026-06-16T21:50:16.473"

