[basic]
description = 'Kootenay Web Inc 开发的 KW Whois 1.0 CGI 程序存在命令注入漏洞，远程攻击者通过向 "whois" 参数中注入 shell 元字符（如分号、管道符等）可执行任意系统命令。该漏洞源于程序未对用户输入进行有效过滤便将其传递给系统 shell 执行，CVSS 评分 10.0，危害等级严重。攻击者无需认证即可远程利用，可完全控制目标服务器。'
published = "2000-12-19T05:00:00.000"
remediation = "升级到 Kootenay Web KW Whois 2.0 或更高版本；如已停止维护，直接删除或禁用 whois.cgi 脚本，并在 Web 服务器层面对 whois 参数过滤 shell 元字符（如 ;、|、&、`）作为临时缓解措施。"
score = 10
severity = "CRITICAL"
sources = ["exploitdb"]
title = "Kootenay Web KW Whois 1.0 远程命令执行漏洞"
updated = "2026-06-16T21:52:49.050"

