[basic]
description = "Microsoft IIS 4.0 及 Site Server 3.0 存在虚拟目录命名漏洞，当虚拟目录名称中包含 .com、.exe、.sh、.cgi、.dll 等扩展名时，远程攻击者可通过特制 URL 请求绕过脚本执行权限限制，直接读取该目录下 ASP 文件的源代码，导致敏感信息泄露。该漏洞影响 IIS 4.0 与 Site Server 3.0 版本，攻击者无需身份认证即可利用。"
published = "1999-12-21T05:00:00.000"
remediation = "安装 Microsoft 安全公告 MS00-003 提供的补丁，升级 IIS 4.0 至最新 Service Pack。临时缓解措施：避免在虚拟目录名称中使用 .com、.exe、.sh、.cgi、.dll 等可执行文件扩展名，或将 ASP 文件移出此类虚拟目录。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Microsoft IIS 和 Site Server 虚拟目录命名信息泄露漏洞"
updated = "2026-06-16T21:50:50.833"

