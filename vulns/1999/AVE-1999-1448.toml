[basic]
description = "Hummingbird Exceed 6.0.1.0 版本错误地包含了一个本应用于开发和测试的 DLL 组件，该组件会将用户输入的用户名和密码以明文形式记录到 test.log 日志文件中。攻击者若能获取服务器文件系统访问权限或通过其他方式读取该日志文件，即可直接获取用户凭据，进而实施进一步攻击。"
published = "1998-12-03"
remediation = "删除或限制 test.log 日志文件的访问权限，移除不必要的开发和测试 DLL 组件，并升级到 Hummingbird Exceed 不受影响的版本。"
score = 7.5
severity = "HIGH"
sources = [
    "cve",
    "nvd",
]
title = "Hummingbird Exceed 开发测试 DLL 泄露明文密码漏洞"
updated = "2026-06-16"

