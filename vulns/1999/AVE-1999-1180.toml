[basic]
description = "Ipswitch IMail 5.0 及更早版本的 IMAP 服务器（imapd）在处理登录功能时存在缓冲区溢出漏洞。由于程序未对用户提交的用户名和密码长度进行有效校验，未经身份认证的远程攻击者可通过发送超长的用户名或密码触发栈缓冲区溢出，导致 imapd 服务崩溃形成拒绝服务，并可能进一步执行任意代码。该漏洞无需认证即可远程触发，利用方式为向目标 IMAP 服务的登录接口发送特制超长字符串，危害等级中等，CVSS 评分 5.0。"
published = "2005-05-02T04:00:00.000"
remediation = "升级 Ipswitch IMail 至 6.0 或更高版本，修复 imapd 登录模块对超长用户名及密码的缓冲区溢出缺陷。如暂无法升级，建议在防火墙层面限制 IMAP 服务仅对可信 IP 开放，并临时禁用外部 IMAP 访问作为缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Ipswitch IMail 5.0 IMAP 服务器缓冲区溢出拒绝服务漏洞"
updated = "2026-06-16T21:50:42.733"

