[basic]
description = "util-linux 软件包中的 script 命令在 2.11n 版本之前存在任意文件写入漏洞（CWE-59）。本地攻击者可通过将 typescript 日志文件硬链接到系统中的任意文件，然后诱导 root 用户执行 script 命令，导致攻击者能够覆盖系统任意文件内容。该漏洞利用条件为需要本地访问权限，危害等级中危，CVSS 评分 5.5。"
published = "2001-12-31T05:00:00.000"
remediation = "升级 util-linux 至 2.11n 及以上版本，该版本修复了 script 命令在处理 typescript 日志文件时未正确检查硬链接的问题。如无法立即升级，可移除 script 命令的 setuid 权限（chmod u-s /usr/bin/script）作为临时缓解措施，或限制非授信用户对 script 命令的访问。攻击者需本地登录权限，因此做好用户访问控制也可降低风险。"
score = 5.5
severity = "MEDIUM"
sources = ["osv"]
title = "util-linux script 命令任意文件写入漏洞"
updated = "2026-06-16T21:56:22.617"

