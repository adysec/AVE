[basic]
description = "Spytech Spynet Chat Server 6.5 存在拒绝服务漏洞，远程未授权攻击者可向 6387 端口发起大量连接请求，导致服务器资源耗尽崩溃，造成拒绝服务。该漏洞影响 Spytech Spynet Chat Server 6.5 版本，攻击复杂度低、无需认证、可远程利用，CVSS 评分 5.0（中危），主要影响可用性。攻击者可通过建立大量 TCP 连接耗尽服务器资源导致服务崩溃，ExploitDB 已有公开 PoC（EDB-20828）。官方暂未发布官方补丁，建议限制 6387 端口访问或升级至修复版本。"
published = "2001-08-22T04:00:00.000"
remediation = "建议立即停用 SpyNet 6.5 Chat Server 并迁移至现代聊天服务器软件（如 OpenFire、ejabberd 等现代 XMPP 服务器）。若必须继续使用，请在防火墙层面封锁 TCP 6387 端口对外访问，并配置连接数限制（如 iptables -A INPUT -p tcp --dport 6387 -m connlimit --connlimit-above 10 -j DROP）防止大量连接导致服务崩溃。建议尽快替换为受维护的现代通讯服务器软件。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Spytech SpyNet Chat Server 6.5 多重连接拒绝服务漏洞"
updated = "2026-06-16T21:54:34.530"

