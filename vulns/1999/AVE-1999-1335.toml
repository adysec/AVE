[basic]
description = "KDE 桌面环境中的 kppp 拨号工具存在缓冲区溢出漏洞，本地攻击者可通过设置超长 PATH 环境变量触发该漏洞，导致缓冲区溢出，从而获取 root 权限。该漏洞影响 KDE 早期版本，攻击者需拥有本地系统访问权限，利用难度较低，危害等级高，可完全控制受影响的系统。"
published = "1998-11-18T05:00:00.000"
remediation = "升级 KDE 至 2.0 及以上版本，该版本已修复 kppp 缓冲区溢出问题。如无法升级，可移除 kppp 的 setuid root 权限（chmod u-s /opt/kde/bin/kppp），或限制仅授权用户可通过 kppp 拨号，防止本地普通用户利用 PATH 环境变量溢出提权。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "KDE kppp 本地缓冲区溢出漏洞"
updated = "2026-06-16T21:49:44.193"

