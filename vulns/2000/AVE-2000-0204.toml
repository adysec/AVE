[basic]
description = "Microsoft Windows Media Rights Manager（媒体权限管理器）4.0及4.1版本存在拒绝服务漏洞。远程攻击者无需认证即可向目标系统发送特制的畸形媒体许可证请求，导致媒体许可证管理器服务停止响应，造成拒绝服务。该漏洞影响了使用Windows Media Rights Manager 4.0和4.1的系统，攻击条件简单，危害中等。微软已在相关安全公告中公布此漏洞。"
published = "2000-03-17T05:00:00.000"
remediation = "立即安装 Microsoft 安全公告 MS00-016 提供的补丁（https://www.microsoft.com/download/details.aspx?familyid=85E422C6-A6F9-4EAF-BD8E-B5267160D3CC），修复 Windows Media Rights Manager 1.0 中畸形许可证请求导致服务停止的问题。如无法安装补丁，可通过定期重启 License Manager 服务作为临时缓解措施，并在防火墙层面限制对许可证服务器的非授权访问。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Microsoft Windows Media Rights Manager 4.0/4.1 拒绝服务漏洞"
updated = "2026-06-16T21:51:16.323"

