[basic]
description = "Grub2 引导加载程序中的 grub_extcmd_dispatcher() 函数在调用 grub_arg_list_alloc() 分配参数列表内存时，未对内存分配失败进行返回值检查。当内存分配失败时，空指针被传递给 parse_option() 函数进行处理，导致 Grub 崩溃或在罕见场景下破坏中断向量表（IVT）数据。该漏洞需要攻击者具有高权限且能够本地访问系统，攻击复杂度较高，影响使用 Grub2 的各类 Linux 发行版。攻击者可通过精心构造的引导配置触发内存分配失败，进而引发拒绝服务或潜在的数据损坏。"
published = "2025-02-18T20:15:19.177"
remediation = "立即将 GRUB2 升级至包含上游提交 05be856a8c3aae41f5df90cab7796ab7ee34b872 的版本（该提交在 grub-core/commands/extcmd.c 的 grub_extcmd_dispatcher 函数中增加了对 grub_arg_list_alloc 返回值的 NULL 检查）。各发行版用户请安装对应的安全更新：RHEL 用户安装 RHSA 安全公告对应更新，Ubuntu 用户等待 grub2-unsigned/grub2-signed 包更新至修复版本。如无法立即升级，可通过限制本地高权限用户对 GRUB 引导配置的写入权限作为临时缓解措施。"
score = 5.2
severity = "MEDIUM"
sources = ["msrc"]
title = "GNU GRUB2 extcmd 空指针解引用拒绝服务漏洞"
updated = "2026-07-20T06:16:20.397"

