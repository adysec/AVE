[basic]
description = "Unibox 路由器 `/authentication/update_byod.php` 接口的 `macAddress` 参数存在 SQL 注入漏洞，攻击者可在未经身份认证的情况下构造特制的 POST 请求，注入恶意 SQL 语句并利用基于时间的盲注技术（如 SLEEP 延迟）判断执行结果，进而窃取数据库中的敏感信息或获取设备更高权限。该漏洞影响 Unibox 系列路由器产品，危害较高，建议厂商尽快发布补丁修复。"
published = "0704"
remediation = "建议在路由器管理后台禁用 BYOD 功能或限制管理页面仅内网访问；同时在 Web 服务器层对 macAddress 参数添加 MAC 地址格式校验（仅允许 ^([0-9A-Fa-f]{2}[:-]){5}([0-9A-Fa-f]{2})$），对后端数据库查询改用预编译参数化语句替代字符串拼接；在 WAF 侧部署规则拦截 SLEEP、AND、OR 等时间盲注关键字。如厂商后续发布固件更新，请第一时间升级至最新版本。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "Unibox Unibox路由器 SQL注入漏洞"
updated = "0704"

