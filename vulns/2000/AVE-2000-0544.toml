[basic]
description = "Microsoft SQL Server 的数据转换服务（DTS）包属性对话框存在密码泄露漏洞。本地攻击者可通过访问 DTS 包属性界面，以明文形式获取数据库连接密码。该漏洞影响 Microsoft SQL Server 7.0 及更早版本，攻击者需拥有本地系统访问权限，利用难度较低。由于 DTS 包在保存时未对密码字段进行加密保护，导致具有本地登录权限的用户可轻易窃取敏感凭据，进而可能提升数据库访问权限。"
published = "2000-05-30T04:00:00.000"
remediation = "立即安装 Microsoft 官方补丁 MS00-041（下载 DTSUIi.exe 并执行），该补丁会移除 DTS 包属性对话框和 Enterprise Manager 注册服务器对话框中的明文密码泄露风险。如无法安装补丁，应改用 Windows 身份验证替代 SQL Server 身份验证存储密码，并严格限制 MSDB 数据库的 Guest 访问权限以及 DTS 包的所有者编辑权限作为临时缓解措施。"
score = 2.1
severity = "LOW"
sources = ["cve"]
title = "Microsoft SQL Server DTS 密码泄露漏洞"
updated = "2026-06-16T21:51:50.143"

