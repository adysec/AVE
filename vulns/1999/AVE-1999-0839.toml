[basic]
description = "Netscape Navigator 浏览器在存储用户邮件密码时采用弱加密算法，导致本地攻击者能够通过分析加密数据恢复明文密码。该漏洞存在于密码存储机制中，攻击者需具备本地系统访问权限，利用弱加密算法的可逆特性即可获取用户凭证信息，可能导致邮箱账户被非法访问。受影响版本包括 Netscape Navigator 全版本。"
published = "2000-01-12T05:00:00.000"
remediation = "立即停止使用 Netscape Navigator 内置邮件客户端收发邮件，迁移至 Mozilla Firefox、Google Chrome 等现代浏览器或 Thunderbird 等独立邮件客户端访问邮件服务。如暂无法迁移，在 Netscape 首选项中关闭密码记忆功能，每次手动输入邮箱密码，避免凭据持久化存储于本地弱加密文件中。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Netscape Navigator 邮件密码弱加密存储漏洞"
updated = "2026-06-16T21:49:29.997"

