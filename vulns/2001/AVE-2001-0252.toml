[basic]
description = "HP Tru64 UNIX TCP/IP 协议栈在生成初始序列号（ISN）时使用随机增量算法，导致序列号可预测性增加。远程未认证攻击者可向目标系统发送大量包含不同 ISN 值的数据包洪水，其中某个数据包的 ISN 可能匹配目标 TCP 连接预期的序列号，从而实现会话劫持或导致 TCP 连接中断拒绝服务。该漏洞影响 HP Tru64 UNIX 系统的 TCP/IP 协议栈，攻击者无需认证即可远程发起攻击，攻击复杂度低，主要造成可用性影响（CVSS 5.0，AV:N/AC:L/Au:N/C:N/I:N/A:P），属于拒绝服务类漏洞。HP 已发布补丁 PHNE_26771 和 PHNE_26101 修复该漏洞。"
published = "2001-06-27T04:00:00.000"
remediation = "建议立即安装 HP 官方补丁 PHNE_26771 (针对 HP-UX 11.00) 和 PHNE_26101 (针对 HP-UX 10.20)，或升级至 HP Tru64 UNIX V5.1A 及以上版本。若无法立即打补丁，可在防火墙配置入口过滤规则阻止伪造源 IP 的 TCP 数据包，并启用 TCP 序列号随机化内核参数（如 HP-UX 的 tcp_seq_randomness=1）作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["redhat"]
title = "HP Tru64 UNIX TCP/IP 初始序列号预测拒绝服务漏洞"
updated = "2026-06-16T21:54:06.470"

