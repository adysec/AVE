[basic]
description = "Microsoft IIS 4.0 及更早版本的 FTP 服务存在资源耗尽型拒绝服务漏洞，远程攻击者无需身份认证即可通过与目标 FTP 服务器同时建立大量被动（PASV）连接，耗尽服务器连接资源，导致正常服务不可用。该漏洞利用复杂度低、无需特殊权限，影响安装了 IIS 4.0 FTP 服务的 Windows NT 系统。"
published = "1999-12-31T05:00:00.000"
remediation = '立即安装 Microsoft Security Bulletin MS98-006 (KB189262) 提供的更新补丁，该补丁限制了对 IIS 线程池的过度消耗。如无法安装补丁，建议将 FTP 服务与 WWW 服务分离到不同服务器，避免 FTP 连接耗尽导致 Web 服务中断；同时配置防火墙限制 FTP 端口的并发连接数，并监控系统事件日志中大量 "Passive connect timed out" 告警以识别攻击源。'
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Microsoft IIS 4.0 FTP Server 拒绝服务漏洞"
updated = "2026-06-16T21:49:49.420"

