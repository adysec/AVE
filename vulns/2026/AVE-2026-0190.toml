[basic]
description = "OpenClaw 存在授权绕过漏洞，已认证用户可通过操纵客户端元数据或请求参数绕过权限检查，执行未授权操作。该漏洞允许低权限攻击者访问受限资源或执行越权操作，影响系统的数据机密性和完整性。攻击者需拥有合法账户，利用难度较低，危害较大。"
published = "20260713"
remediation = "升级 openclaw 至最新版本（2026.3.20 或以上），该版本包含 JWT 认证迁移修复，加强服务端权限校验。如无法升级，在服务端实施严格的请求参数白名单校验，对 client metadata 进行签名验证防止篡改，并在 API 网关层增加细粒度的权限拦截规则。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "OpenClaw OpenClaw 授权绕过漏洞"
updated = "20260713"

