[basic]
description = "IBM AIX 4.1 及 4.2 系统中的 lquerypv 工具在解析 -h 命令行参数时未对文件路径进行充分校验，导致存在任意文件读取漏洞。本地攻击者可通过向 -h 参数传入目标文件路径（如 /etc/passwd 或系统配置文件），越权读取本无权访问的敏感文件内容，造成信息泄露。该漏洞利用条件要求攻击者拥有本地 shell 访问权限，虽然无需 root 权限但无法远程触发，故整体危害较低，CVSS 评分 2.1。"
published = "1999-12-31T05:00:00.000"
remediation = "升级 IBM AIX 至 4.3 或更高版本，IBM 已通过 APAR 修复此问题。如无法升级，以 root 执行 `chmod 755 /usr/sbin/lquerypv` 移除 setuid 权限，阻止普通用户以特权运行该命令。同时通过文件系统 ACL 限制可执行 `lquerypv` 的用户范围作为临时缓解。"
score = 2.1
severity = "LOW"
sources = ["cve"]
title = "IBM AIX lquerypv 本地文件读取漏洞"
updated = "2026-06-16T21:49:45.383"

