[basic]
description = "Mandriva Linux Mandrake 7.0 中 cdrecord 工具存在缓冲区溢出漏洞，本地攻击者可通过构造恶意的 dev 参数触发栈缓冲区溢出，进而实现本地权限提升至 root 权限。该漏洞源于 cdrecord 在处理 dev 参数时未进行边界检查，攻击者仅需本地普通用户权限即可构造超长参数覆盖返回地址并执行任意代码。受影响版本为 Mandriva Linux Mandrake 7.0 默认安装的 cdrecord 版本，CVSS 评分 7.2（本地攻击、低复杂度、无需认证、完全影响 CIA），属于高危本地提权漏洞。攻击者仅需本地账户即可利用该漏洞获取 root 权限，建议升级至修复版本或限制 cdrecord 的 SUID 权限。"
published = "2000-05-29T04:00:00.000"
remediation = "升级 cdrecord 到最新 patched 版本（≥3.2），或直接迁移到现代的 growisofs 或 wodim 等替代 burning 工具；同时修改配置文件，严格验证 dev 参数长度和字符集，避免包含 '..' 或特殊字符；如果无法立即更新，可临时通过修改 /etc/group 文件将 cdrecord 用户从 root 分组中移除，或在 sudoers 文件中限制 cdrecord 的权限。这样可以直接修复已知溢出漏洞，通过输入验证和权限控制提供即时缓解措施。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "Mandriva Linux Mandrake 7.0 cdrecord 本地缓冲区溢出漏洞"
updated = "2026-06-16T21:51:46.153"

