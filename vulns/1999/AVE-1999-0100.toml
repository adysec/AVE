[basic]
description = "SGI IRIX 6.3 的 webdist.cgi 程序存在命令注入漏洞，远程攻击者通过在 distloc 参数中注入 shell 元字符（如分号、管道符），即可绕过输入过滤执行任意系统命令。该漏洞影响 SGI IRIX 6.3 版本，攻击无需身份认证，仅需向目标 Web 服务发送特制的 HTTP 请求即可触发，可导致服务器被完全控制。CVSS 评分 7.3，危害等级高。"
published = "1997-05-06T04:00:00.000"
remediation = "建议从 SGI 安全公告 19970501-02-PX 获取并安装对应 IRIX 版本的补丁。如无法立即打补丁，应删除或禁用 CGI 目录下的 webdist.cgi 程序，并确保 webdist 服务已停止。对于仍在使用 SGI IRIX 的系统，建议迁移至受支持的操作系统，因为 IRIX 已于 2006 年 12 月停止技术支持，不再提供安全更新。"
score = 7.3
severity = "HIGH"
sources = ["exploitdb"]
title = "SGI IRIX webdist.cgi 命令执行漏洞"
updated = "2026-06-16T21:47:25.717"

