[basic]
description = "Norton AntiVirus for Internet Email Gateways (NAVIEG) 1.0.1.7及之前版本、Norton AntiVirus for MS Exchange (NAVMSE) 1.5及之前版本存在加密错误漏洞。该漏洞将管理员密码以明文形式存储在NAVIEG的navieg.ini配置文件和NAVMSE的ModifyPassword注册表项中。具有本地访问权限的攻击者可通过读取这些文件或注册表项直接获取管理员密码，进而接管杀毒软件管理控制台。CVSS评分4.6，危害等级中危。"
published = "1999-04-09T04:00:00.000"
remediation = '建议升级至 NAVIEG 1.0.1.8 及以上版本、NAVMSE 1.6 及以上版本，新版本已改用哈希存储密码。如无法升级，应立即通过 NTFS 权限将 navieg.ini 文件设置为仅允许管理员读取（禁止 Everyone 访问），同时使用 regedt32 将 HKLM\Software\Symantec\NAVMSE\1.5\ModifyPassword 注册表项的权限设为仅 Administrators 可访问，并将内置 Web 管理页面的绑定地址限制为 127.0.0.1 以阻断远程访问。'
score = 4.6
severity = "MEDIUM"
sources = ["avd"]
title = "Symantec Norton AntiVirus NAVIEG及NAVMSE 明文密码存储漏洞"
updated = "2026-06-16T21:50:11.737"

