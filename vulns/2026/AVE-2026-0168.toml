[basic]
description = "Drupal Core 的 PostgreSQL 数据库驱动模块中存在 SQL 注入漏洞，由于对用户输入的特殊元素未进行正确的中和过滤，导致攻击者可在无需认证的情况下通过构造恶意 SQL 语句注入数据库查询，实现信息窃取、数据篡改甚至远程代码执行。该漏洞影响 Drupal Core 8.9.0 至 11.3.10 之间的多个版本，CVSS 评分 9.8，危害等级严重。攻击者利用该漏洞无需用户交互，仅需向受影响系统发送特制请求即可触发。Drupal 官方已发布安全更新修复此漏洞。"
published = "2026-05-20T20:16:41.230"
remediation = "立即升级 Drupal 核心至以下修复版本：10.4.10、10.5.10、10.6.9、11.1.10、11.2.12 或 11.3.10（取决于当前使用的分支）。同时建议对 PostgreSQL 数据库连接启用最小权限原则，并开启 Drupal 的查询参数化预处理功能。如无法立即升级，可在数据库层面配置 pg_stat_statements 监控异常 SQL 查询。"
score = 9.8
severity = "CRITICAL"
sources = ["hwpoc"]
title = "Drupal Core PostgreSQL SQL注入漏洞"
updated = "2026-06-17T11:04:48.250"

