[basic]
description = "Apache OFBiz 存在授权不当漏洞（CWE-863），未经身份验证的攻击者可通过 /webtools/control/main/ProgramExport 等端点提交恶意请求，利用屏幕渲染代码执行任意命令。该漏洞影响 Apache OFBiz 18.12.14 及之前所有版本，攻击者无需任何身份验证即可远程利用，CVSS 评分 9.8，属于严重级别。漏洞已出现在 CISA 已知被利用漏洞目录中，具有实际在野利用风险。"
published = "2024-08-05"
remediation = "升级 Apache OFBiz 至 18.12.15 或更高版本。官方在 18.12.15 版本中修复了授权检查不当的问题，对未认证端点进行了权限校验。如无法立即升级，建议限制 /webtools/ 路径的未授权访问并审查屏幕渲染配置。"
score = 9.8
severity = "CRITICAL"
sources = [
    "cve",
    "hwpoc",
]
title = "Apache OFBiz 授权不当导致远程代码执行漏洞"
updated = "2026-06-17"

