[basic]
description = "wu-ftpd 2.6.0 及更早版本存在安全漏洞，未经身份认证的远程攻击者可通过网络向目标 FTP 服务发送特制数据包触发该漏洞。该漏洞与 CVE-2001-0550 中描述的 ftpglob 错误无关，攻击者无需任何凭据即可利用，成功利用后可导致部分机密性、完整性和可用性损失，可能造成远程命令执行或拒绝服务。"
published = "2001-11-28T05:00:00.000"
remediation = "建议立即将 wu-ftpd 升级至 2.6.1 或更高版本，上游修复通过更新 glob.c 文件消除了缓冲区溢出风险。临时缓解措施：在防火墙层面限制 FTP 服务仅对可信来源开放，禁用不必要的匿名访问及 SITE EXEC 等危险命令；长期建议迁移至持续维护的 FTPServer（如 vsftpd 或 proftpd），避免继续使用已多年无安全更新的 wu-ftpd。"
score = 7.5
severity = "HIGH"
sources = ["redhat"]
title = "华盛顿大学 wu-ftpd 缓冲区溢出漏洞"
updated = "2026-06-16T21:55:15.593"

