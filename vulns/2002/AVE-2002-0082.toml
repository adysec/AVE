[basic]
description = "Exim 邮件服务器 daemon.c 组件中存在格式字符串漏洞，具有管理员权限的本地攻击者可通过修改 pid_file_path 参数值触发该漏洞，导致任意代码执行。该漏洞影响 Exim 4.x 至 4.10 版本及 3.x 至 3.36 版本，CVSS 评分 7.2，危害等级高。攻击者需具备 exim 管理用户权限方可利用。"
published = "2002-12-23T05:00:00.000"
remediation = "升级 Exim 至 4.11 或更高版本（4.x 系列）或 3.37 或更高版本（3.x 系列），该漏洞已在后续版本中修复。如无法立即升级，严格限制 exim 管理用户权限，禁止非授权用户修改 pid_file_path 等配置参数，并监控 syslog 中异常的 exim 进程行为作为临时缓解措施。"
score = 7.2
severity = "HIGH"
sources = ["osv"]
title = "Exim Internet Mailer 格式字符串远程代码执行漏洞"
updated = "2026-06-16T21:59:13.233"

