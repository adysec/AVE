[basic]
description = "Solaris 7.0 系统中的 ufsdump/ufsrestore 工具存在缓冲区溢出漏洞，拥有本地访问权限的攻击者可通过向该工具传递特制参数触发溢出，覆盖内存数据，进而实现权限提升或以 root 权限执行任意代码。该漏洞影响 Solaris 7.0 版本，CVSS 评分 8.4，危害等级高危，需系统本地账号方可利用。"
published = "1998-04-29T04:00:00.000"
remediation = "升级 Solaris 系统至 Solaris 8 及以上版本，或安装 Sun 官方补丁 106880-01 (SPARC) / 106881-01 (x86)。临时缓解措施：限制 ufsdump/ufsrestore 的 setuid 权限，仅授权管理用户执行文件系统备份操作。"
score = 8.4
severity = "HIGH"
sources = ["exploitdb"]
title = "Sun Solaris ufsdump/ufsrestore 本地缓冲区溢出漏洞"
updated = "2026-06-16T21:47:30.363"

