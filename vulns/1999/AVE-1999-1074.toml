[basic]
description = 'Netscape Communicator 4.04 至 4.7 版本（及可能其他版本）在多种 UNIX 操作系统中存在字符编码转换漏洞，程序将 0x8b 字符错误转换为 "<" 符号、0x9b 字符错误转换为 ">" 符号。远程攻击者可通过向未过滤这些字符的 CGI 程序注入特制载荷，触发跨站脚本攻击，进而窃取用户会话 Cookie 或执行恶意操作。该漏洞影响运行 Netscape Communicator 的 UNIX 系统，CVSS 评分 7.5，危害等级高。'
published = "1999-10-05T04:00:00.000"
remediation = "该漏洞影响已停止维护的 Netscape Communicator 4.04-4.7。由于该产品已于 2001 年终止支持，建议立即停止使用并迁移至 Firefox 等现代浏览器。同时，服务器端 CGI 程序应对用户输入中的 0x8b 和 0x9b 字符进行过滤或 HTML 转义编码，作为纵深防御措施。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "Netscape Communicator 跨站脚本漏洞"
updated = "2026-06-16T21:50:16.097"

