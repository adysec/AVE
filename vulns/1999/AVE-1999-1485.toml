[basic]
description = "dbadmin CGI 程序 1.0.1 版本存在缓冲区溢出漏洞，远程攻击者可通过向目标系统发送特制的 HTTP 请求触发该漏洞，导致任意命令执行。该漏洞影响 Linux 平台下运行 dbadmin CGI 程序的系统，CVSS 评分 7.5，危害等级高。目前厂商已停止维护，建议用户迁移至替代方案或部署 Web 应用防火墙进行防护。"
published = "1998-10-08T04:00:00.000"
remediation = "立即停止使用 dbadmin CGI 程序并彻底删除或禁用该脚本，因为该软件自 1998 年起已停止维护且无任何安全补丁。如无法立即移除，在 Apache 配置中通过 IP 白名单和 .htaccess 认证严格限制访问来源。建议迁移至现代且仍在维护的数据库管理工具（如 phpMyAdmin、Adminer 或 DBeaver）替代 mSQL 管理功能。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "dbadmin CGI程序缓冲区溢出代码执行漏洞"
updated = "2026-06-16T21:50:19.093"

