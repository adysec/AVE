[basic]
description = "Lotus Domino HTTP 服务器存在路径信息泄露漏洞，远程攻击者通过向 /cgi-bin 目录发送请求访问不存在的脚本，服务器返回的错误信息中会泄露 Web 服务的真实物理路径。攻击者利用此信息可进一步探测系统目录结构，为后续攻击收集情报。该漏洞影响 Lotus Domino Web Server 多个版本，CVSS 评分 5.0，危害等级中等。"
published = "1999-12-01T05:00:00.000"
remediation = "升级至 Lotus Domino 5.0.1 及以上版本，该版本已修复 /cgi-bin 脚本路径泄露问题。如无法升级，可在服务器配置中禁用不必要的 CGI 脚本执行权限，通过限制对 /cgi-bin 目录的访问或移除该目录来缓解信息泄露风险。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Lotus Domino HTTP Server 路径泄露漏洞"
updated = "2026-06-16T21:50:50.360"

