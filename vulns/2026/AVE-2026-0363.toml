[basic]
description = "Microsoft .NET 的 SMTP 客户端实现（System.Net.Mail）存在输出编码或转义不当漏洞（CWE-116），攻击者可在邮件消息路由过程中进行消息欺骗，使接收方看到伪造的发件人地址或内容。该漏洞影响 .NET 8.0（低于 8.0.29）、.NET 9.0（低于 9.0.18）及 .NET 10.0（低于 10.0.10）的所有平台与架构版本，CVSS 评分 6.5，危害等级为中危。攻击者需具备较低权限并在网络上具备授权访问能力，无需用户交互即可发起利用。Microsoft 已在后续版本中修复此漏洞，建议升级至最新的 .NET 版本并重新编译部署自包含应用程序。"
published = "2026-07-14T20:17:38.917"
remediation = ".NET 8.0 应用升级至 8.0.29，.NET 9.0 升级至 9.0.18，.NET 10.0 升级至 10.0.10；通过 NuGet 更新 Microsoft.NetCore.App.Runtime 相关程序包引用并重新编译，或使用 dotnet --info 确认当前版本后通过 Visual Studio 更新至最新 .NET SDK，自包含部署的应用须重新编译并重新部署，更新后重启应用使补丁生效。"
score = 6.5
severity = "MEDIUM"
sources = ["ghsa"]
title = "Microsoft .NET SMTP 客户端消息欺骗漏洞"
updated = "2026-07-22T21:17:42.713"

