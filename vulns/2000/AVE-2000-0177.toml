[basic]
description = "Microsoft Clip Art Gallery 5.0 存在缓冲区溢出漏洞，远程攻击者可通过向目标用户发送特制的 CIL（剪贴画库）文件触发该漏洞，成功利用后可导致目标系统拒绝服务或执行任意命令。该漏洞影响 Microsoft Clip Art Gallery 5.0 版本，CVSS 评分 5.1，危害等级中危，需用户交互打开恶意文件方可触发。"
published = "2000-03-06T05:00:00.000"
remediation = "立即卸载 Microsoft Clip Art Gallery 5.0，该产品已停止支持且不再接收安全更新。如业务必须使用，请勿打开来源不明的 .cil 文件，并限制该软件的网络访问权限。建议迁移至 Microsoft Office 内置的剪贴画功能或其他受支持的替代产品。"
score = 5.1
severity = "MEDIUM"
sources = ["cve"]
title = "Microsoft Clip Art Gallery 5.0 缓冲区溢出漏洞"
updated = "2026-06-16T21:51:12.620"

