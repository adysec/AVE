[basic]
description = "Hylafax 4.0 pl2 版本中 faxsurvey CGI 脚本存在命令注入漏洞，远程攻击者可通过向该脚本发送包含 shell 元字符（如管道符、分号等）的特制查询字符串，在目标服务器上以 Web 服务进程权限执行任意命令。该漏洞影响 Linux 平台下运行 Hylafax 4.0 pl2 的系统，无需身份认证即可远程利用，CVSS 评分 7.5，危害等级高。"
published = "1998-08-04T04:00:00.000"
remediation = "升级 Hylafax 至 4.1 及以上版本，该版本已修复传真调查 CGI 脚本对用户输入未过滤直接传递给 shell 的问题。如无法升级，应移除或禁用 faxsurvey CGI 脚本，并确保 Web 服务器不对外暴露该脚本路径。同时对所有 CGI 输入实施严格的特殊字符过滤，防止 shell 元字符注入。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "HylaFAX 4.0 Faxsurvey CGI 远程命令执行漏洞"
updated = "2026-06-16T21:48:01.590"

