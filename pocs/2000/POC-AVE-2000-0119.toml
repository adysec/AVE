[info]
author = "ave"
description = "Microsoft Java Virtual Machine getSystemResourceAsStream 信息泄露漏洞PoC。通过Java Applet调用ClassLoader.getSystemResourceAsStream读取客户端本地文件，绕过MS VM安全沙箱的文件访问限制"
id = "POC-AVE-2000-0119"
name = "CVE-2000-0132 PoC"
severity = "low"
tags = ["cve-2000-0132"]
vuln_id = [
    "CVE-2000-0132",
    "AVE-2000-0119",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/Test.class"
protocol = "http"

[poc.requests.body]
content = ""
type = "raw"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["CAFEBABE"]
