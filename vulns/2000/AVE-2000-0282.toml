[basic]
description = "Adtran MX2800 M13 多路复用器以太网接口存在拒绝服务漏洞，远程攻击者可通过向目标设备的以太网接口发送大量 ICMP Ping 数据包（ping flood），导致设备处理过载而崩溃，无法正常提供服务。该漏洞影响 Adtran MX2800 M13 系列多路复用器，攻击者无需认证即可远程触发，危害等级中等。"
published = "2000-04-19T04:00:00.000"
remediation = "建议在边界路由器或防火墙上配置 ICMP 速率限制（rate-limit），限制每秒入站 ICMP 包数量；同时配置 ACL 仅允许可信源 IP 访问 MX2800 的管理接口。如设备支持，升级到 Adtran 提供的最新固件版本。若无法升级，建议将 MX2800 置于独立管理 VLAN 中，避免直接暴露于不可信网络。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Adtran MX2800 M13 复用器以太网接口拒绝服务漏洞"
updated = "2026-06-16T21:51:24.773"

