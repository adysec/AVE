[basic]
description = "S.u.S.E. Linux 6.2 系统中的 sscw 工具存在基于 HOME 环境变量的缓冲区溢出漏洞。本地攻击者可通过设置超长 HOME 环境变量并运行 sscw 程序触发缓冲区溢出，从而获得 root 权限。该漏洞影响 S.u.S.E. Linux 6.2 版本，CVSS 评分 7.2，危害等级高。攻击者需拥有本地系统访问权限，利用门槛较低，可导致完全的系统控制权丧失。"
published = "1999-09-23T04:00:00.000"
remediation = "升级 S.u.S.E. Linux 至 6.3 及以上版本，或安装厂商提供的 sscw 安全补丁。临时缓解措施：移除 sscw 二进制文件的 setuid 权限位（chmod u-s /usr/bin/sscw），防止本地用户通过 HOME 环境变量缓冲区溢出提权至 root。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "SUSE Linux sscw HOME环境变量本地缓冲区溢出漏洞"
updated = "2026-06-16T21:49:18.170"

