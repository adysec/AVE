[basic]
description = "CVSWeb 1.80 的 cvsweb CGI 脚本存在不安全的 Perl open 函数调用漏洞，具有 CVS 仓库写入权限的远程攻击者可通过向 cvsweb 脚本提交包含 shell 元字符的特制请求，利用 Perl open 函数对用户输入过滤不严的缺陷，在目标服务器上执行任意系统命令。该漏洞影响 CVSWeb 1.80 及之前版本，攻击者需具备 CVS 仓库写入权限，危害等级高。"
published = "2000-07-12T04:00:00.000"
remediation = "升级 CVSWeb 至打过补丁的版本（FreeBSD SA-00:37 提供对应补丁），或迁移至维护中的替代方案 ViewVC。修改 cvsweb CGI 脚本中所有 Perl `open()` 调用，将单字符串参数改为安全的三参数列表形式（如 `open(my $fh, '-|', @args)`），避免 shell 解释传入的元字符。对用户输入中的 `;`、`|`、`` ` ``、`$()` 等 shell 特殊字符进行严格过滤，并限制 CVS 仓库写入权限仅为可信用户。"
score = 7.2
severity = "HIGH"
sources = ["exploitdb"]
title = "CVSWeb Developer CVSWeb 1.80 Perl open 远程代码执行漏洞"
updated = "2026-06-16T21:52:13.950"

