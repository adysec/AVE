[basic]
description = "AltaVista 搜索引擎的 query.cgi CGI 程序存在目录遍历漏洞。攻击者通过在查询参数中使用 ..（点号）路径遍历序列，可绕过 Web 服务器文档根目录限制，读取 Web 根目录之外的任意文件内容。该漏洞利用条件宽松，无需身份认证即可远程触发，攻击者可借此获取服务器敏感配置文件、源代码等关键信息，对网站安全构成严重威胁。"
published = "1999-12-29T05:00:00Z"
remediation = "升级到 AltaVista Search Intranet 2.5 或更高版本，该版本已修复 query.cgi 中通过 .. (dot dot) 进行的目录遍历漏洞。如无法立即升级，临时缓解措施为在 Web 服务器层面对 query.cgi 程序的所有用户输入进行过滤，禁止包含 .. 字符序列。由于 AltaVista Search Intranet 已停止支持且长期未更新，强烈建议迁移至现代企业搜索引擎解决方案（如 Apache Solr、Elasticsearch 或云搜索服务）以彻底消除安全风险。"
score = 5.0
severity = "MEDIUM"
sources = ["cve"]
title = "AltaVista Search Intranet query.cgi 目录遍历漏洞"
updated = "2026-06-16T21:50:52Z"

