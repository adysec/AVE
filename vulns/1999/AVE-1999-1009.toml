[basic]
description = "Microsoft IIS 4.0 在处理 .HTR、.IDC 和 .STM 文件请求时，其过滤器 DLL 存在未检查的缓冲区溢出漏洞。远程攻击者无需认证即可发送特制畸形请求触发溢出，导致 IIS 服务崩溃造成拒绝服务，在精心构造下还可实现远程任意代码执行。"
published = "1999-06-16"
remediation = "安装 Microsoft 安全公告 MS99-019 提供的补丁，或通过 IIS 管理控制台移除不需要的 .HTR、.IDC、.STM 脚本映射以缓解风险。受影响版本为 IIS 4.0。"
score = 9.8
severity = "CRITICAL"
sources = [
    "cve",
    "ms",
]
title = "Microsoft IIS 4.0 HTR/IDC/STM 文件请求缓冲区溢出漏洞"
