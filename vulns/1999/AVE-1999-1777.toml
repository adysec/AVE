[basic]
description = 'Admiral Systems EmailClub 1.0.0.5 版本的 POP3 服务器存在缓冲区溢出漏洞。其原因在于程序未对邮件"From"头部字段的长度进行合法性校验，在处理超长输入时未做边界检查，导致缓冲区被覆盖。未经身份认证的远程攻击者只需向目标 POP3 服务发送一封包含异常超长"From"头部的电子邮件，即可触发该溢出并覆盖返回地址，进而在目标系统上执行任意命令。该漏洞影响运行 EmailClub 1.0.0.5 的服务器，攻击条件仅需网络可达目标 POP3 端口且能投递邮件，利用方式简单，危害程度极高。'
published = "1999-11-15T05:00:00.000"
remediation = "立即升级 Admiral Systems EmailClub 至修复版本（1.0.0.6 及以上），并停用存在漏洞的 POP3 服务。如无法立即升级，可在防火墙限制仅允许受信任 IP 访问 POP3 端口（默认 110），并关闭匿名邮件接收功能作为临时缓解措施。"
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "Admiral Systems EmailClub 远程缓冲区溢出漏洞"
updated = "2026-06-16T21:49:54.630"

