[info]
author = "AVE"
description = "Opera 3.2.1 浏览器在解析包含额外斜杠的畸形URL（如 http:///example.com）时触发拒绝服务崩溃。远程攻击者可通过诱骗用户访问包含此类URL的恶意页面触发漏洞，导致浏览器应用程序崩溃。"
id = "POC-AVE-1999-1451"
name = "Opera 3.2.1 Malformed URL DoS PoC"
severity = "medium"
tags = [
    "cve-1999-1283",
    "denial-of-service",
    "opera",
]
vuln_id = [
    "CVE-1999-1283",
    "AVE-1999-1451",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/cve-1999-1283-poc"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["POC_CVE_1999_1283"]
