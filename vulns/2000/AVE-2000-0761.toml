[basic]
description = 'Lotus Domino 企业服务器 5.0.2c 及更早版本的 ESMTP 服务存在多处缓冲区溢出漏洞，远程未经认证的攻击者可通过向该服务发送包含超长 "RCPT TO"、"SAML FROM" 或 "SOML FROM" 命令的恶意 SMTP 请求触发缓冲区溢出，导致目标服务崩溃造成拒绝服务，在特定条件下可执行任意代码。该漏洞影响 Lotus Domino Enterprise Server 及 Mail Server 5.0.1/5.0.2/5.0.3 等版本，CVSS 评分 10.0，危害等级严重。'
published = "2000-12-11T05:00:00.000"
remediation = "升级 Lotus Domino 至 5.0.3 及以上版本，该版本已修复 ESMTP 服务中的多个缓冲区溢出漏洞。如无法升级，可在 SMTP 网关或防火墙上限制对 Domino 服务器 25 端口的访问，仅允许可信邮件服务器连接，并禁用不必要的 SMTP 扩展命令。对于已停服的老版本，建议迁移至更新的 IBM Domino 版本（如 9.x 或更高）以获得持续安全支持。"
score = 10
severity = "CRITICAL"
sources = ["exploitdb"]
title = "Lotus Domino ESMTP 远程缓冲区溢出漏洞"
updated = "2026-06-16T21:53:02.613"

