[basic]
description = "Microsoft Windows NT 中存在一个与系统关键注册表项相关的安全漏洞：某个对系统安全至关重要的注册表键值被设置为不恰当的数值。攻击者若能够访问或修改该注册表项（通常需要本地或远程获得相应权限，或通过其他漏洞达成注册表写入），即可使系统关键安全配置失效，进而破坏系统完整性、提升权限或绕过安全控制。该漏洞影响运行 Microsoft Windows NT 操作系统的相关版本，CVSS 基础评分达 10.0（满分），危害等级为严重，可能导致系统被完全控制。建议尽快检查并修正相关注册表键值，将不当配置恢复为厂商推荐的安全默认值。"
published = "1999-01-01T05:00:00.000"
remediation = '立即升级至 Windows 2000 或更高版本操作系统，Windows NT 4.0 已于 2004 年停止支持。如无法升级，在注册表编辑器中检查 HKLM\Software\Microsoft\Windows\CurrentVersion\Run 等关键键值的 ACL 权限，移除 Everyone 组的写入权限，并启用 Windows NT 的 ACL 审核策略监控注册表变更。'
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "Microsoft Windows NT 注册表不当配置安全漏洞"
updated = "2026-06-16T21:48:48.253"

