[basic]
description = "BossMail 是一款企业级邮件系统，其 webmail.php 文件存在 SQL 注入漏洞。攻击者可通过向该页面发送特制的 HTTP 请求参数，在未经身份认证的情况下注入恶意 SQL 语句，进而窃取数据库中的用户凭证、邮件内容等敏感信息，甚至可能进一步获取服务器控制权。该漏洞攻击难度较低，影响范围广泛，仅需目标系统开放 Web 管理接口即可远程利用。"
published = "0705"
remediation = "立即升级 BossMail 邮件系统至最新修复版本（≥5.2.x），webmail.php 中所有用户输入参数须使用预编译语句（Prepared Statement）替代字符串拼接。临时缓解措施：在 Web 服务器（Apache/Nginx）层面配置 WAF 规则，拦截 webmail.php 请求中包含 UNION、SELECT、INSERT、UPDATE、DELETE、DROP、SLEEP 等 SQL 关键字的参数；同时确保数据库账户遵循最小权限原则，禁止使用 root 或 sa 账户连接应用数据库。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "BossMail 邮件系统 webmail.php SQL 注入漏洞"
updated = "0705"

