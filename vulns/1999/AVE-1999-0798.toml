[basic]
description = "DNS 区域传输（Zone Transfer）是 DNS 主从服务器间同步域名数据库的标准机制。当 DNS 服务器未正确限制区域传输的发起来源时，任意远程攻击者均可通过发送 AXFR 查询请求获取该域名的全部 DNS 记录，包括 A/AAAA 记录、MX 邮件交换记录、CNAME 别名记录、NS 名称服务器记录及 TXT 文本记录等。攻击者利用这些信息可绘制目标网络的完整拓扑结构，识别关键服务器 IP 地址，为后续针对性攻击（如 DDoS 放大攻击、钓鱼攻击）提供情报支撑。该漏洞通常由 DNS 服务器配置不当导致，影响 BIND、Microsoft DNS Server 等主流 DNS 服务软件。"
published = "1997-07-01"
remediation = "限制区域传输仅允许授权的从服务器 IP 地址，在 BIND 中使用 allow-transfer 配置项或设置成 none，并启用 TSIG 签名认证机制增强传输安全性，定期审计 DNS 服务器日志监控异常 AXFR 请求。"
score = 5.0
severity = "MEDIUM"
sources = ["cve"]
title = "DNS 服务器区域传输未授权访问信息泄露漏洞"
updated = "2026-07-16"

