[basic]
description = "Red Hat Linux 5.2/6.0 系统中的 su 程序存在安全日志缺失漏洞。当攻击者在 su 认证超时前强制终止 su 进程时，系统不会记录失败的密码尝试日志，导致本地攻击者可利用此缺陷绕过日志审计机制，对用户密码进行无记录的暴力猜解攻击。该漏洞降低了暴力破解的攻击成本与检测难度，影响 Red Hat Linux 5.2 i386 及 6.0 版本，CVSS 评分 7.2，危害等级高。"
published = "1999-06-09T04:00:00.000"
remediation = "升级 Red Hat Linux 至 6.1 或更高版本，该版本已修复 su 程序在超时前被终止时不记录失败密码尝试的缺陷。如无法升级，可部署 auditd 或 snoopy 等第三方审计工具记录所有 su 执行行为作为临时缓解。限制可执行 su 命令的用户组范围（仅允许 wheel 组使用 su）也能降低暴力破解风险。"
score = 7.2
severity = "HIGH"
sources = ["epss"]
title = "RedHat Linux su 程序未记录失败密码登录漏洞"
updated = "2026-06-16T21:51:02.260"

