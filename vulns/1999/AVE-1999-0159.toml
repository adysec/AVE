[basic]
description = "Microsoft Internet Explorer 4.0 和 5.0 版本中的 DHTML Edit ActiveX 控件存在跨框架访问漏洞，远程攻击者可通过构造恶意网页，诱使用户访问后利用该控件读取目标系统上的任意文件。该漏洞影响 IE 4/5 用户，攻击者需结合社会工程学手段诱导用户点击恶意链接，危害等级低，CVSS 评分 2.6。"
published = "1999-05-01T04:00:00.000"
remediation = '建议立即升级至 Internet Explorer 6 或更高版本，该漏洞在 IE6 中已修复。如无法升级，可通过注册表为 DHTML Edit ActiveX 控件设置 Kill Bit（CLSID: {2D360201-FFF5-11D1-8D03-00A0C959BC0A}），在 HKEY_LOCAL_MACHINE\SOFTWARE\Microsoft\Internet Explorer\ActiveX Compatibility 下新建该 CLSID 键并将 Compatibility Flags 设为 0x400 以禁用该控件。长期建议迁移至 Microsoft Edge 等现代浏览器。'
score = 2.6
severity = "LOW"
sources = ["exploitdb"]
title = "Microsoft Internet Explorer DHTML Edit ActiveX 控件任意文件读取漏洞"
updated = "2026-06-16T21:48:30.130"

