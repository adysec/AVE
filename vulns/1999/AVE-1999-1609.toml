[basic]
description = "HP VirtualVault 操作系统存在安全绕过漏洞。在安装了 PHSS_17692 补丁的环境中，未授权或低权限的本地进程可利用 Trusted Gateway Proxy (TGP) 组件绕过系统的访问控制限制，从而获取未授权的资源访问权限。该漏洞影响 HP VirtualVault 操作系统相关版本，CVSS 评分 10.0，危害等级严重。厂商已发布补丁修复此问题。"
published = "2000-01-18T05:00:00.000"
remediation = "立即安装 HP 安全公告 HPSBUX9912-107 中指定的补丁（PHSS_18263 或更新版本），该补丁修复了 Trusted Gateway Proxy (TGP) 的访问控制绕过问题。在无法安装补丁的情况下，限制非授权用户对 TGP 服务的本地访问权限，审查并收紧 TGP 配置中的访问控制规则。由于 HP VirtualVault VVOS 已停止技术支持，建议迁移至受支持的安全操作系统平台。"
score = 10
severity = "CRITICAL"
sources = ["cve"]
title = "HP VirtualVault 未授权进程访问限制绕过漏洞"
updated = "2026-06-16T21:49:28.707"

