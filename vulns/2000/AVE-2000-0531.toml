[basic]
description = 'Symantec Norton Antivirus for Exchange (NavExchange) 存在"故障开放"状态漏洞，当防病毒引擎因故障或资源耗尽进入失效开放状态时，病毒邮件可绕过扫描直接通过 Exchange 服务器传递给收件人。该漏洞影响运行 NavExchange 的 Microsoft Exchange 服务器，攻击者仅需向目标服务器发送携带病毒的邮件，当防病毒引擎处于故障开放状态时即可绕过检测导致病毒传播，CVSS 评分 5.0（AV:N/AC:L/Au:N/C:N/I:P/A:N），属部分完整性影响漏洞。Symantec 已发布补丁修复该故障开放逻辑缺陷。'
published = "2000-06-14T04:00:00.000"
remediation = '''
用户想要为 CVE-2000-0478 (Norton Antivirus for Exchange 漏洞) 生成一个 remediation 字段。该漏洞是 Norton Antivirus for Exchange (NavExchange) 进入 "fail-open" 状态，允许病毒通过服务器。

我需要提供中文的具体、可操作的修复建议（≥20字），包括：
1. 升级到哪个具体版本
2. 配置变更
3. 缓解措施
不要只说"参考官方公告"

让我先搜索关于此漏洞的具体信息，找到确切的修复版本/补丁信息。<bash command="curl -s 'https://github.com/CVEProject/cvelistV5/blob/3dd627d6b90f81690ae15e5d5fb02176cc79caf3/cves/2000/0xxx/CVE-2000-0478.json'" />
