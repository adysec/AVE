[basic]
description = "Windows NT 4.0 的 GINA（图形化标识和身份验证）组件存在权限许可和访问控制漏洞。当用户锁定工作站后，系统未正确清空剪贴板内容，导致具有物理访问权限的攻击者可通过在用户名输入框中执行粘贴操作（CTRL-V），从而获取已锁定用户剪贴板中的部分敏感信息。该漏洞攻击复杂度低，但需要物理接触目标系统，CVSS 评分 2.1，危害等级低。"
published = "1999-12-31T05:00:00.000"
remediation = "建议立即安装 Windows NT 4.0 Service Pack 6a (SP6a)，该版本已包含此漏洞的修复。如无法升级，可应用 Microsoft 知识库文章 Q214802 提供的专用热修复补丁。由于 Windows NT 4.0 已终止支持，强烈建议升级至受支持的 Windows Server 版本。临时缓解措施：用户在锁定工作站前手动清空剪贴板（复制任意无关内容覆盖当前剪贴板数据），以防止锁屏状态下剪贴板信息被窃取。"
score = 2.1
severity = "LOW"
sources = ["avd"]
title = "Microsoft Windows NT GINA 权限许可和访问控制漏洞"
updated = "2026-06-16T21:50:28.233"

