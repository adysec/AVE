[basic]
description = "ISC BIND 4.9 和 8.1 版本的 named 进程存在符号链接竞争条件漏洞。本地攻击者可在 named 进程以 root 权限运行时，通过预先创建指向敏感系统文件的符号链接（named_dump.db 或 named.stats），诱导 root 进程在接收 SIGINT 或 SIGIOT 信号转储调试文件时跟随符号链接覆盖任意关键文件，导致任意文件破坏。该漏洞影响 ISC BIND 4.9 和 8.1 版本，攻击条件为本地用户权限且需诱导 root 进程发送特定信号，利用方式为符号链接竞争条件攻击导致任意文件覆盖破坏，CVSS 评分 2.1，危害等级较低。"
published = "1998-04-10T04:00:00.000"
remediation = "建议升级到 ISC BIND 4.9.8 或 8.1.1 及以上版本修复该符号链接漏洞。若暂无法升级，请以非 root 权限运行 named 进程并配置 chroot 监狱限制文件系统访问，防止 root 进程被信号杀死时触发符号链接攻击破坏文件系统。"
score = 2.1
severity = "LOW"
sources = ["exploitdb"]
title = "ISC BIND named 符号链接本地文件破坏漏洞"
updated = "2026-06-16T21:50:34.333"

