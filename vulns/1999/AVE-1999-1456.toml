[basic]
description = "Windows NT 系统上运行的 ICQ 98 beta 版本存在信息泄露漏洞，当客户端位于 NAT 等网络地址转换环境后时，ICQ 协议在 TCP 数据段中发送的是客户端的内部私有 IP 地址而非公网地址，导致远程攻击者能够获取目标的内网 IP 信息，进而可能探测内部网络拓扑结构。该漏洞影响使用 ICQ 98 beta 的 Windows NT 系统，CVSS 评分 7.5，危害等级高危，无需特殊权限即可利用。"
published = "1998-11-11T05:00:00.000"
remediation = "建议升级到 ICQ 99a 或更高版本，该版本已修复 NAT 环境下的内网 IP 泄露问题。如无法升级，可在 ICQ 网络设置中配置 SOCKS 代理或防火墙规则重写 ICQ 数据包中的源 IP 地址；对于 Windows NT 系统，也可通过启用网络地址转换（NAT）编辑功能并结合应用层网关来屏蔽内部地址泄露。作为深层防御，建议在企业网络边界防火墙上封禁 ICQ 使用的 TCP 端口 4000 及文件传输相关端口，强制所有 ICQ 通信通过代理服务器中转。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "ICQ ICQ 98 Windows NT 内部IP地址信息泄露漏洞"
updated = "2026-06-16T21:50:07.183"

