[basic]
description = "webpack-dev-server 存在输入验证不当漏洞，未经身份认证的攻击者可通过向目标开发服务器发送包含格式错误 Host 标头的 HTTP 请求，或向默认 /ws 端点发送格式错误 Origin 标头的 WebSocket 升级请求，触发主机验证路径中的未捕获异常，导致 Node.js 进程崩溃，造成拒绝服务。该漏洞影响 webpack-dev-server 5.2.5 及更早版本，CVSS 评分 5.3，危害等级中危。建议升级至 5.2.6 版本修复，或将开发服务器绑定至 localhost 避免暴露于不可信网络。"
published = "2026-07-03T18:16:24.687"
remediation = "立即将 webpack-dev-server 升级至 5.2.6 或更高版本。如无法立即升级，确保 dev server 仅监听 localhost（默认配置），切勿将其暴露到不可信网络中；可在反向代理或防火墙层面过滤含有异常 Host/Origin 标头的请求作为临时缓解措施。"
score = 5.3
severity = "MEDIUM"
sources = ["ghsa"]
title = "Webpack webpack-dev-server 拒绝服务漏洞"
updated = "2026-07-07T15:08:59.667"

