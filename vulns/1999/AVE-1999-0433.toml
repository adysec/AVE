[basic]
description = "SSH 服务软件 sshd 1.2.17 版本的身份认证代理机制存在竞争条件漏洞（Race Condition）。远程攻击者在认证窗口内利用时序差向目标发送精心构造的认证请求，可在合法用户完成认证前截获或替换其身份凭证，从而窃取其他用户的 SSH 登录凭据并获得未授权访问。该漏洞影响早期 SSH 协议实现，利用难度较低，可导致敏感信息泄露和系统被控。"
published = "1999-01-01T05:00:00.000"
remediation = "升级至 sshd 1.2.18 及以上版本，该版本已修复认证代理机制中的条件竞争漏洞。也可迁移至 OpenSSH（自 1999 年起开源维护），并保持版本更新。若无法升级，限制对 ssh-agent 的本地访问权限，仅允许受信任用户使用代理转发功能。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "SSH sshd 认证代理竞争条件漏洞"
updated = "2026-06-16T21:47:59.860"

