[basic]
description = "HP-UX 9.X 至 10.20 版本中的 chsh 命令存在安全漏洞，本地用户可利用该漏洞获取系统最高权限。chsh 命令在处理用户输入时未正确进行权限检查，导致低权限用户可以通过执行特制操作来提升至 root 权限，完全控制受影响系统。攻击者需要拥有本地访问权限，无需其他认证条件。"
published = "1997-01-09"
remediation = "HP 已发布针对 chsh 命令漏洞的安全补丁，用户应升级 HP-UX 至 10.20 以上版本或安装厂商提供的补丁程序。同时建议限制本地用户对 chsh 命令的访问权限，并监控系统日志中的异常提权行为。"
score = 7.2
severity = "HIGH"
sources = ["cve"]
title = "HP-UX chsh 命令本地权限提升漏洞"
updated = "2026-06-16"

