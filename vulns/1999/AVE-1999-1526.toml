[basic]
description = "Internet Explorer 4.0 的 OBJECT 标签解析 CLASSID 参数时存在缓冲区边界缺陷，远程攻击者可通过构造包含超长 CLASSID 参数的 HTML 页面，诱使用户访问后触发缓冲区溢出，导致浏览器崩溃拒绝服务。该漏洞影响 Internet Explorer 4.0 版本，攻击者无需身份认证，利用难度较低，但影响范围有限。"
published = "1998-07-28T04:00:00.000"
remediation = "建议升级到 Internet Explorer 5.0 或更高版本，该漏洞已在后续版本中修复。由于 IE 4.0 已停止支持，建议迁移至现代浏览器（如 Edge/Chrome/Firefox）以获得持续安全更新。如无法升级，可在 IE 安全设置中将 ActiveX 控件和 OBJECT 相关选项禁用作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Microsoft Internet Explorer 4.0 对象标签 CLASSID 参数远程拒绝服务漏洞"
updated = "2026-06-16T21:50:27.600"

