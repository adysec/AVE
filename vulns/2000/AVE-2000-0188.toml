published = "2000-02-23T05:00:00.000"
remediation = "立即删除 CGI 目录下的 ECHO.BAT 和 HELLO.BAT 文件，移除不必要的 CGI 批处理脚本；升级 Sambar Server 至 6.4 或更高版本（如仍受支持）；在 Web 服务器层面过滤 CGI 参数中的 shell 元字符（如 &、|、;、`、$、()）；限制 CGI 目录执行权限，仅允许必要的可执行文件。"
