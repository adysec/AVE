[info]
author = "ave"
description = "Microsoft HTML 控件在解析包含超大文本输入框（如表格单元格中的大型 <input> 字段）的恶意网页或 HTML 邮件时，会触发 CPU 资源耗尽（100% 占用），造成拒绝服务。该 PoC 通过构造包含超大表单字段的 HTML 页面来验证目标是否易受此拒绝服务问题影响。"
id = "POC-AVE-1999-0866"
name = "CVE-1999-1016 Internet Explorer 5 HTML 表单控件拒绝服务 PoC"
severity = "medium"
tags = ["ave-1999-0866"]
vuln_id = [
    "CVE-1999-1016",
    "AVE-1999-0866",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/cve-1999-1016-dos.html"
protocol = "http"

[poc.requests.body]
content = ""
type = "raw"

[[poc.requests.matchers]]
expect = true
status = [200]
type = "status"
