[basic]
description = "Matt Wright 开发的 FormMail CGI 脚本 1.6/1.7/1.8 版本中存在环境变量信息泄露漏洞。攻击者可通过向 env_report 参数提交恶意构造的请求，远程获取目标服务器的敏感环境变量信息，包括系统路径、配置参数等，可能导致进一步的信息收集与攻击。该漏洞无需身份认证即可远程利用，攻击复杂度低，影响广泛部署该 CGI 脚本的 Web 服务器。"
published = "2000-05-10T04:00:00.000"
remediation = "立即停止使用 Matt Wright FormMail 1.8 及更早版本，升级至 nms-formmail 1.92 或更新版本（该分支修复了 env_report 参数泄露问题）。如无法升级，在 CGI 脚本中删除或注释掉 env_report 功能相关代码，并在 Web 服务器层面限制对 formmail.pl 的访问来源 IP。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Matt Wright FormMail CGI 环境变量泄露漏洞"
updated = "2026-06-16T21:51:39.580"

