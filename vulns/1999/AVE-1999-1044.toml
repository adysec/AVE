[basic]
description = "linuxconf 1.11.r11-rh3 之前版本（Red Hat Linux 5.1）在处理临时文件时未正确验证符号链接，存在本地权限提升漏洞。具有本地账号的攻击者可通过符号链接攻击覆盖系统任意文件，从而获得 root 权限。该漏洞影响 Red Hat Linux 5.1 系统，CVSS 评分 7.2，危害等级高危。"
published = "1999-12-31T05:00:00.000"
remediation = "升级 linuxconf 至 1.11.r11-rh3 或更高版本，或直接升级 Red Hat Linux 至受支持的发行版（如 RHEL 6+）。作为临时缓解措施，限制 linuxconf 的 suid 权限：`chmod u-s /usr/bin/linuxconf` 可阻断提权路径，仅允许 root 用户执行配置管理操作。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "Red Hat Linux linuxconf 符号链接攻击本地权限提升漏洞"
updated = "2026-06-16T21:50:12.357"

