[basic]
description = "真内控国产化开发平台存在任意文件读取漏洞，攻击者可通过向 `/print/billPdf/preview` 接口的 `urlPath` 参数传入路径遍历序列（如 `../../../../etc/passwd`）读取服务器任意文件，导致敏感信息泄露。该漏洞无需身份认证即可远程利用，攻击复杂度低，影响部署了该平台的所有系统版本。建议厂商尽快修复路径过滤逻辑，用户应限制该接口的访问权限。"
published = "0807"
remediation = "升级真内控国产化开发平台至最新版本，修复 `/print/billPdf/preview` 接口的路径遍历漏洞。如无法升级，在应用层对 `urlPath` 参数进行严格校验，禁止包含 `../` 等目录穿越字符，仅允许白名单内的 PDF 模板文件路径，同时配置 Web 应用防火墙（WAF）拦截包含路径遍历特征的请求。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "真内控国产化开发平台 preview 任意文件读取漏洞"
updated = "0807"

