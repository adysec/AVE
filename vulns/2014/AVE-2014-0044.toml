[basic]
description = "GNU Bash 在通过环境变量处理函数定义时，未正确截断后续字符串内容，导致攻击者可通过构造特制环境变量在目标系统上执行任意命令。该漏洞（又称 ShellShock）影响 GNU Bash 4.3 及更早版本，利用 OpenSSH 的 ForceCommand 功能、Apache HTTP Server 的 mod_cgi/mod_cgid 模块、DHCP 客户端脚本等多种向量，无需身份认证即可远程触发。攻击者仅需设置包含恶意代码的环境变量并触发 Bash 解释执行，即可在当前权限下获得远程代码执行能力，对服务器、Web 应用和网络设备构成严重威胁。该漏洞 CVSS 评分 9.8，危害等级严重，已列入 CISA KEV 目录，并被 Metasploit、Nuclei 等工具收录利用代码。"
published = "2014-09-24T18:48:04.477"
remediation = '''
# 下载并安装最新的bash源代码
   wget https://ftp.gnu.org/gnu/bash/bash-5.2.tar.gz
   tar xzf bash-5.2.tar.gz && cd bash-5.2
   ./configure --prefix=/usr/local
   make -j$(nproc) && make install
   ```

3. **系统配置强化**：
   ```bash
   # 限制危险Shell函数
   echo 'alias. () { :;}; alias. () { :;}' >> /etc/bashrc
   echo 'function. () { :;}' >> /etc/bashrc
   echo '() { :;}' >> /etc/bashrc
   
   # 启用Bash安全限制（read 中的安全模式）
   cat >> /etc/profile << 'EOF'
   ulimit -S -n 4096
   export SHELLOPTS=semblues
   EOF
   ```

4. **应用层防护措施**：
   - Apache HTTP Server：升级mod_cgi/mod_cgid到安全补丁版本
   - OpenSSH服务：升级到包含安全补丁的版本，配置`"ForceCommand"`受限命令
   - 所有Web应用：验证CGI脚本对环境变量的有效性限制
   - DHCP服务：确保设备发送的安全环境变量过滤机制

5. **临时缓解措施**：
   - 停止启用CGI脚本或危险Shell命令功能
   - 配置防火墙过滤包含`() {`或`eval `等危险模式的环境变量的网络包
   - 使用web应用防火墙规则禁止可疑的环境变量注入攻击

6. **后续监控与验证**：
   ```bash
   # 验证补丁是否成功应用
   bash --version | grep "4.4\|5.0\|5.1\|5.2"
   grep -r "(): {" /etc/profile /etc/bashrc /etc/bash.bashrc 2>/dev/null || true'''
