[info]
author = "ave"
description = "验证 Microsoft Internet Explorer 4.01/5.0 注册向导 ActiveX 控件 (regwizc.dll) 缓冲区溢出漏洞。通过 HTTP 服务恶意 HTML 页面，诱导 IE 加载易受攻击的 ActiveX 控件并触发 InvokeRegWizard 方法溢出。"
id = "POC-AVE-1999-1196"
name = "CVE-1999-1578 PoC"
severity = "medium"
tags = ["ave-1999-1196"]
vuln_id = [
    "CVE-1999-1578",
    "AVE-1999-1196",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/poc.html"
protocol = "http"

[poc.requests.body]
content = """
<!DOCTYPE html>
<html>
<head>
  <title>CVE-1999-1578 PoC - Registration Wizard ActiveX Buffer Overflow</title>
  <meta charset="utf-8">
</head>
<body>
  <h1>CVE-1999-1578 PoC Test Page</h1>
  <p>Testing for vulnerable Registration Wizard ActiveX control (regwizc.dll)</p>
  <object id="regwiz" classid="clsid:3AF36230-A269-11CF-B77A-00AA004AE837" width="0" height="0"></object>
  <script>
    try {
      var ctrl = document.getElementById('regwiz');
      if (ctrl && typeof ctrl.InvokeRegWizard === 'function') {
        document.body.innerHTML += '<p style="color:green">[+] Vulnerable ActiveX control detected: regwizc.dll InvokeRegWizard method available</p>';
        // PoC only: do NOT trigger overflow, just verify control presence
        // ctrl.InvokeRegWizard(long_string_to_trigger_overflow);
      } else {
        document.body.innerHTML += '<p style="color:red">[-] ActiveX control not found or method unavailable</p>';
      }
    } catch (e) {
      document.body.innerHTML += '<p style="color:red">[-] Error: ' + e.message + '</p>';
    }
  </script>
</body>
</html>"""
type = "raw"

[poc.requests.headers]
Content-Type = "text/html; charset=utf-8"

[[poc.requests.matchers]]
expect = true
status = [200]
type = "status"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "regwizc.dll",
    "InvokeRegWizard",
    "Vulnerable ActiveX control detected",
]
