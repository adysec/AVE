[basic]
description = "Microsoft IIS 3.0及4.0版本中showfile.asp页面使用FileSystemObject（FSO）组件时，未对file查询参数进行充分过滤，远程攻击者可通过目录遍历序列（如../../global.asa）突破Web根目录限制，读取服务器上任意文件，包括ASP源代码及其他用户文件。由于FSO以TextStream方式读取文件，ASP代码在输出时不会被解析执行，效果类似于::$DATA数据流泄露漏洞。在虚拟主机场景下，恶意用户利用该漏洞可查看其他租户的ASP应用源码，导致凭据和业务逻辑等敏感信息泄露。"
published = "1999-02-11"
remediation = "删除或禁用服务器上的showfile.asp文件；升级至受支持的Windows Server版本及IIS版本并安装所有安全更新；在IIS管理器中使用URL授权规则限制ASP文件的未授权访问；对用户输入的file参数进行路径规范化校验，拒绝包含目录遍历序列（../）的请求。"
score = 5.0
severity = "MEDIUM"
sources = ["cve"]
title = "Microsoft IIS 3.0/4.0 showfile.asp 文件系统对象（FSO）任意文件读取漏洞"
updated = "2024-06-01"

