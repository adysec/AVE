[basic]
description = "Cacti 网络监控系统 0.6.8 之前版本的 graphs.php 文件中存在命令注入漏洞，具有管理员权限的远程认证用户可在编辑模式下通过标题字段注入 shell 元字符，导致任意命令执行。攻击者需先获取 Cacti 管理后台的合法凭据，成功利用后可完全控制目标服务器，窃取敏感数据或横向移动。该漏洞影响 Cacti 0.6.8 之前所有版本，CVSS 评分 7.5，危害等级高。厂商已在 0.6.8 版本中修复此漏洞。"
published = "2003-04-22T04:00:00.000"
remediation = "升级 Cacti 至 0.6.8 或更高版本，该版本修复了 graphs.php 中 title 参数未正确过滤 shell 元字符的问题。如无法升级，限制仅信任的管理员账号可访问编辑功能，并在 Web 应用防火墙（WAF）层面过滤 title 参数中的 `;`、`|`、`&`、`$` 等 shell 特殊字符。"
score = 7.5
severity = "HIGH"
sources = ["osv"]
title = "Raxnet Cacti 远程代码执行漏洞"
updated = "2026-06-16T21:59:24.077"

