[info]
author = "ave"
description = "检测目标是否运行 Big Brother 网络监控系统 1.0/1.3/1.4，验证 CGI 文件创建漏洞。通过检查 Web 界面的 bb 路径和 logs 目录，确认是否存在远程文件创建和脚本执行风险。"
id = "POC-AVE-2000-0491"
name = "Sean MacGuire Big Brother CGI File Creation PoC"
severity = "high"
tags = ["ave-2000-0491"]
vuln_id = [
    "CVE-2000-0639",
    "AVE-2000-0491",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/bb/logs/"
protocol = "http"

[[poc.requests.matchers]]
expect = true
status = [
    200,
    301,
    302,
    403,
]
type = "status"
