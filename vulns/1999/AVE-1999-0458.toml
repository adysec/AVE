[basic]
description = "Slmail 3.0.2421 及 2.5 版本的 POP3 服务存在拒绝服务漏洞，远程攻击者无需身份认证即可通过向目标主机的 POP3 端口（默认 110）发送特制恶意数据包，导致服务进程崩溃或停止响应，造成正常的邮件收发功能中断。该漏洞利用方式简单，无需复杂权限即可触发，影响运行 Slmail 服务的邮件服务器系统。"
published = "1997-10-01T04:00:00.000"
remediation = "Slmail 产品已停止维护多年，建议迁移至现代受支持的邮件服务器软件（如 Postfix、Exchange 等）。如仍需继续使用，可在防火墙层面限制 POP3 端口（110）仅允许受信任 IP 段访问，并监控异常连接流量作为临时缓解。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Slmail POP3 拒绝服务漏洞"
updated = "2026-06-16T21:48:02.843"

