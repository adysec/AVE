[basic]
description = "GNU Bash 4.3 及之前版本（至 bash43-026）在解析环境变量值中的函数定义时存在解析缺陷，未正确处理函数定义后的尾随字符串，导致攻击者可通过构造恶意环境变量注入任意命令。该漏洞是对 CVE-2014-6271、CVE-2014-7169、CVE-2014-6277 等 Shellshock 系列漏洞的不完整修复补全。攻击者可在跨越权限边界设置环境变量的场景中触发漏洞，典型攻击向量包括：OpenSSH sshd 的 ForceCommand 强制命令环境、Apache HTTP Server 的 mod_cgi/mod_cgid 模块处理 CGI 脚本、DHCP 客户端脚本处理环境变量等场景。攻击者无需认证即可通过网络远程触发，仅需用户交互（如访问 CGI 脚本），即可在目标系统上以服务进程权限执行任意命令，导致完全的机密性、完整性、可用性丧失（CVSS 3.1 8.8 HIGH，AV:N/AC:L/PR:N/UI:R/S:U/C:H/I:H/A:H）。受影响范围覆盖所有未打补丁的 GNU Bash 4.3 及更早版本，广泛存在于 Linux/Unix 服务器、嵌入式设备、Mac OS X 等系统中。厂商已发布补丁修复，用户应升级至 bash43-027 或更高版本。"
published = "2014-09-30T10:55:04.723"
remediation = "升级 Bash 到 4.3-r093 或更高版本（如 4.4-r12），并编译时启用 `--enable-optimized-malloc`；在 Apache HTTP 服务器中，编辑 `/etc/httpd/conf.d/cgid.conf`，将 `PassEnv` 和 `SetEnv` 限制在必要变量上；在 mod_cgi 中使用 `CGIBin` 配置验证代码签名的 CGI 执行目录；如无法立即更新，部署网络防火墙规则禁用所有 IPv6 接口和 CGI 执行权限。"
score = 8.8
severity = "HIGH"
sources = ["kev"]
title = "GNU Bash 不完整修复远程代码执行漏洞"
updated = "2026-06-17T00:12:50.047"

