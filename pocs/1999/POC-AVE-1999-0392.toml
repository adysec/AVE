[info]
author = "ave"
description = "验证 Microsoft Hotmail 网页邮件服务是否存在 HTML STYLE 标签 JavaScript 注入漏洞。攻击者可在邮件内容中嵌入含 JavaScript 代码的 STYLE 标签，当收件人使用 Internet Explorer 5 或 Netscape Communicator 4.0/4.5/4.6 等早期浏览器查看邮件时，由于 Hotmail 未对 STYLE 标签内容进行充分过滤，恶意脚本将在 Hotmail 页面上下文中执行，导致会话令牌窃取、邮件内容读取或账号命令执行等危害。"
id = "POC-AVE-1999-0392"
name = "Hotmail JavaScript STYLE 标签注入验证 PoC"
severity = "medium"
tags = ["ave-1999-0392"]
vuln_id = [
    "CVE-1999-0750",
    "AVE-1999-0392",
]

[poc]
logic = "all"

[[poc.requests]]
method = "POST"
path = "/{{BaseURL}}/"
protocol = "http"

[poc.requests.body]
content = "body=<style>//javascript injection test via STYLE tag</style>"
type = "form"

[poc.requests.headers]
Content-Type = "application/x-www-form-urlencoded"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["<style>"]
