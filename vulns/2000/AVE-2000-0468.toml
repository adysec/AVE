[basic]
description = "Flowerfire Sawmill 5.0.21 使用弱加密算法存储用户密码，攻击者通过获取密码存储文件可轻易解密出明文密码，进而登录系统修改 Sawmill 配置，造成信息泄露或配置篡改。该漏洞影响 Flowerfire Sawmill 5.0.21 版本，CVSS 评分 7.5，危害等级高危。"
published = "2000-06-26T04:00:00.000"
remediation = "建议立即将 Flowerfire Sawmill 升级至 6.0 或更高版本，新版本已采用强哈希算法存储密码。如无法升级，应对管理后台实施 IP 白名单访问控制，限制仅可信 IP 访问；同时确保配置文件目录权限设置为 600 或更严格，防止本地低权限用户读取加密密码文件。此外，建议在 Web 服务器层面对管理路径添加 HTTP 基本认证作为额外防护层。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "Flowerfire Sawmill 弱密码加密漏洞"
updated = "2026-06-16T21:52:03.697"

