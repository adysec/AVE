[basic]
description = "TP-LINK 多款路由器固件存在目录遍历漏洞，远程攻击者无需认证即可通过向 login/ 路径的 PATH_INFO 参数中注入 ../ 序列，绕过路径限制读取设备上的任意文件，如配置文件、密码哈希等敏感信息。该漏洞影响 Archer C5/C7/C8/C9、TL-WDR3500/3600/4300、TL-WR740N/741ND、TL-WR841N/841ND 等多个系列产品，CVSS 评分 7.5，危害等级高。厂商已在 2015 年 3 月前后的固件更新中修复此漏洞。"
published = "2015-04-22T01:59:02.553"
remediation = "将受影响的 TP-LINK 路由器固件升级至以下版本：Archer C5 升级至 150317 及以上、Archer C7 升级至 150304 及以上、Archer C8 升级至 150316 及以上、TL-WDR3500/3600/4300 升级至 150302 及以上、TL-WR740N/741ND 升级至 150312 及以上、TL-WR841N/ND 升级至 150310 及以上。登录路由器管理后台，在「系统工具→固件升级」中在线更新，或从 TP-LINK 官网下载对应型号固件手动升级。如无法立即更新，可在 WAN 口访问控制中限制管理页面仅允许内网 IP 访问，并禁用远程管理功能。"
score = 7.5
severity = "HIGH"
sources = ["nuclei"]
title = "TP-LINK 多款路由器目录遍历漏洞"
updated = "2026-06-17T00:25:09.817"

