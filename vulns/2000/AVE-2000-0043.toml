[basic]
description = "Allaire Spectra 1.0 的配置向导存在拒绝服务漏洞，远程攻击者可通过向目标系统发送恶意的 URL 请求，反复提交数据集合进行索引操作，导致服务器资源耗尽，从而使服务不可用。该漏洞影响 Allaire Spectra 1.0 版本，攻击者无需认证即可利用，危害等级中危。"
published = "2000-01-04T05:00:00.000"
remediation = "限制对 Allaire Spectra Configuration Wizard 的访问，通过 Web 服务器（如 IIS）或防火墙配置仅允许受信任 IP 访问 /spectra/config/ 路径。在生产环境中彻底禁用或移除 Configuration Wizard 组件，防止外部通过 URL 重复提交索引请求导致拒绝服务。如无法禁用，在 Web 服务器层面对该路径添加请求频率限制（rate limiting）。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Allaire Spectra 1.0 Configuration Wizard 拒绝服务漏洞"
updated = "2026-06-16T21:50:54.023"

