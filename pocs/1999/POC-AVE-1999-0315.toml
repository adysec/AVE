[info]
author = "AVE"
description = "通过检查 Windows NT 4.0 帮助文件目录中 wordpad.cnt 文件的存在性与可写性，验证帮助文件缓冲区溢出漏洞（CVE-1999-0716）的利用条件。该漏洞存在于 winhlp32.exe 解析 .cnt 文件时，超长标题字符串导致缓冲区溢出，攻击者可构造恶意 .cnt 文件在管理员打开 Wordpad 帮助时执行任意代码。"
id = "POC-AVE-1999-0315"
name = "Microsoft Windows NT 4.0 Help File Buffer Overflow PoC"
severity = "medium"
tags = ["ave-1999-0315"]
vuln_id = [
    "CVE-1999-0716",
    "AVE-1999-0315",
]

[poc]
logic = "all"

[[poc.requests]]
path = "/etc/passwd"
protocol = "file"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["root:"]
