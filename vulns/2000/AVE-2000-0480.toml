[basic]
description = "Microsoft Internet Explorer 4.0 和 5.0 存在未授权 Cookie 访问漏洞。恶意网站可通过在 URL 中嵌入目标域名及转义字符，绕过浏览器的同源策略限制，非法获取其他域名的 Cookie 信息。攻击者无需身份认证，仅需诱导用户访问特制链接即可实施攻击，导致用户会话凭证泄露。该漏洞影响 IE 4.0 及 5.0 版本，CVSS 评分 2.6，危害等级低。"
published = "2000-05-11T04:00:00.000"
remediation = "升级 Internet Explorer 至 5.01 及以上版本，该版本修复了跨域 Cookie 访问漏洞。对于仍使用 IE 4.0 的环境，应立即升级至 IE 5.01 SP2 或更高版本。同时建议在 Web 服务器端配置严格的 Cookie 安全属性（Secure、HttpOnly），并限制不可信域名的 URL 重定向。长期建议迁移至现代浏览器（如 Edge/Chrome）以获得持续安全更新。"
score = 2.6
severity = "LOW"
sources = ["epss"]
title = "Microsoft Internet Explorer Cookie 泄露漏洞"
updated = "2026-06-16T21:51:44.173"

