[basic]
description = "Microsoft Internet Explorer 6至11版本的MSHTML引擎中的SetMouseCapture实现存在释放后使用（Use-After-Free）漏洞。远程攻击者可通过构造特制的JavaScript字符串，利用ms-help:协议URL触发hxds.dll加载，从而在已释放的内存对象上执行操作，最终实现远程代码执行。攻击者成功利用该漏洞可获得与当前用户相同的系统权限。该漏洞影响范围广泛，覆盖IE 6至11所有主流版本，且已有公开的Metasploit利用模块，被CISA列入已知被利用漏洞目录，实际攻击风险极高。"
published = "2013-09-18T10:08:24.867"
remediation = "立即安装 Microsoft 2013 年 10 月安全公告 MS13-080 提供的 Internet Explorer 累积安全更新 (KB2879017)，该补丁修复了 mshtml.dll 中 SetMouseCapture 函数释放后重用漏洞。如无法安装补丁，可通过组策略禁用 ms-help:// 协议处理程序，或升级至 Microsoft Edge 浏览器以彻底规避风险。"
score = 8.8
severity = "HIGH"
sources = ["kev"]
title = "Microsoft Internet Explorer MSHTML内存释放后使用远程代码执行漏洞"
updated = "2026-06-16T23:55:58.240"

