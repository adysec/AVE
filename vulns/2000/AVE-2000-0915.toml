[basic]
description = "Internet Explorer 4.x 和 5.x 中用于调用脚本小程序（Scriptlet）的 ActiveX 控件存在文件类型解析漏洞。该控件在处理非 HTML 文件时错误地将其渲染为可执行脚本内容，导致攻击者可以诱导用户访问恶意网页，从而读取目标系统上的任意本地文件，造成敏感信息泄露。攻击条件要求用户使用受影响版本的 IE 浏览器访问攻击者构造的恶意页面。"
published = "2000-10-20T04:00:00.000"
remediation = "立即安装 Microsoft 安全公告 MS00-055 提供的补丁，该补丁限制 Scriptlet Component 仅渲染 HTML 文件，并修复了框架域验证问题。对于 Internet Explorer 4.x 和 5.x 用户，可通过 Windows Update 或从 https://docs.microsoft.com/en-us/security-updates/securitybulletins/2000/ms00-055 下载安装。如无法立即打补丁，可将 Internet 区域的 Active Scripting 禁用作为临时缓解措施。"
score = 2.6
severity = "LOW"
sources = ["cve"]
title = "Microsoft Internet Explorer Scriptlet 渲染任意文件读取漏洞"
updated = "2026-06-16T21:52:26.320"

