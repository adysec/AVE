[basic]
description = "Linux 和 BSD 系统的 mount/umount 工具存在缓冲区溢出漏洞，本地用户可通过向 umount 命令传递超长相对路径名参数触发缓冲区溢出，从而获得 root 权限。该漏洞影响多个 Linux 发行版及 BSD 系统，攻击者需要拥有本地账号才能利用，CVSS 评分 7.2，危害等级高。厂商已发布补丁修复此漏洞。"
published = "2000-02-03T05:00:00.000"
remediation = "升级 Linux 内核至 2.2.15 及以上版本，或安装对应发行版的安全补丁（如 Red Hat 的 RHSA-2000:004）。作为临时缓解措施，可移除 mount/umount 二进制文件的 setuid 位：chmod u-s /bin/umount /bin/mount，但会影响普通用户正常卸载文件系统。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "Linux mount/umount 本地权限提升漏洞"
updated = "2026-06-16T21:51:15.003"

