[basic]
description = "Big Brother 系统与网络监控工具的 bbd 服务器存在远程命令执行漏洞。攻击者无需身份认证即可通过网络向 bbd 服务器发送特制请求，利用该漏洞在目标系统上以 bbd 进程权限执行任意命令，从而完全控制受影响的监控服务器。该漏洞影响 Big Brother 全版本，CVSS 评分 7.5，危害等级高。目前官方已发布安全更新修复此漏洞，建议用户升级至最新版本。"
published = "2000-05-18T04:00:00.000"
remediation = "升级 Big Brother 至 1.9c 及以上版本（该版本修复了 bbd 命令注入问题）；如无法升级，立即在防火墙层面限制 TCP 1984 端口仅允许受信任的监控服务器 IP 访问，并对 bbd 的输入参数做严格过滤。由于 Big Brother 已停止维护，建议迁移至其活跃分支 Xymon（原 Big Brother 的替代品）。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "Big Brother System and Network Monitor 远程代码执行漏洞"
updated = "2026-06-16T21:51:45.600"

