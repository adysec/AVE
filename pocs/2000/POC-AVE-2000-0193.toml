[info]
author = "ave"
description = "通过检查 /bin/umount 存在性判断目标是否可能受 CVE-2000-0218 影响。该漏洞为 Linux mount 与 umount 命令缓冲区溢出，本地攻击者通过超长相对路径名触发，可提升至 root 权限。"
id = "POC-AVE-2000-0193"
name = "Linux mount/umount 本地缓冲区溢出权限提升漏洞 PoC"
severity = "high"
tags = ["cve-2000-0218"]
vuln_id = [
    "CVE-2000-0218",
    "AVE-2000-0193",
]

[poc]
logic = "all"

[[poc.requests]]
path = "/bin/umount"
protocol = "file"

[[poc.requests.matchers]]
expect = true
part = "body"
regex = "."
type = "regex"
