[basic]
description = "Windows NT 4.0 系统内核中存在本地拒绝服务漏洞，当本地用户通过 GetThreadContext 或 SetThreadContext 函数传入非法的内核模式地址时，系统未对输入指针进行有效验证，导致内核崩溃引发蓝屏。攻击者需具备本地登录权限且能够执行恶意程序方可利用，无法远程触发。该漏洞影响 Windows NT 4.0 所有版本，CVSS 评分 2.1，危害等级低。"
published = "1999-12-31T05:00:00.000"
remediation = "安装 Windows NT 4.0 Service Pack 5 (SP5) 或更高版本（推荐 SP6a）即可修复此漏洞。由于 Windows NT 4.0 已停止支持，建议迁移至受支持的 Windows 版本（如 Windows Server 2019/2022）。临时缓解措施：限制本地用户登录权限，仅允许受信任用户进行交互式登录。"
score = 2.1
severity = "LOW"
sources = ["cve"]
title = "Microsoft Windows NT 4.0 本地拒绝服务漏洞"
updated = "2026-06-16T21:50:16.977"

