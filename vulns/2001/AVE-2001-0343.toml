[basic]
description = "SANE 扫描仪访问库 1.0.3 及更早版本的某些后端驱动程序存在不安全的临时文件创建漏洞。前端软件（如 XSane）在使用这些后端驱动时，会在创建临时文件时未进行安全检查，导致本地攻击者可通过符号链接攻击修改任意文件。攻击者需具备本地访问权限，利用竞争条件在临时文件创建前建立指向敏感文件的符号链接，从而实现任意文件修改。该漏洞影响使用 SANE 1.0.3 及早期版本的扫描软件，CVSS 评分 2.1（本地访问/低复杂度/部分完整性影响），危害等级低。"
published = "2001-12-11T05:00:00.000"
remediation = "建议升级 SANE 库至 1.0.4 或更高版本（该版本修复了后端驱动程序中临时文件的符号链接攻击漏洞）。若暂时无法升级，可通过设置安全的临时文件目录权限（如设置 sticky bit：chmod +t /tmp）或配置 SANE 后端使用专用、权限受限的临时目录来缓解符号链接攻击风险。同时建议限制本地用户对扫描服务的访问权限，降低本地提权风险。"
score = 2.1
severity = "LOW"
sources = ["redhat"]
title = "SANE 后端驱动 不安全临时文件创建漏洞"
updated = "2026-06-16T21:55:10.083"

