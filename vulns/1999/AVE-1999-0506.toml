[basic]
description = "Microsoft IIS 3.0 和 4.0 在将默认语言配置为简体中文、韩文或日文等双字节代码页（Double Byte Code Page）时，存在源代码泄露漏洞。由于服务器对双字节字符编码的处理不当，远程攻击者在无需身份认证的情况下，可通过构造包含特定双字节字符序列的 HTTP 请求访问 ASP 等动态脚本文件，使服务器错误解析请求并返回这些文件的源代码而非执行结果。该漏洞影响所有以中文、日文或韩文为默认语言运行的 IIS 3.0/4.0 网站，攻击条件仅为目标站点启用相应双字节代码页且可直接网络访问，攻击者利用浏览器或脚本即可远程触发，进而可能泄露数据库凭据、内部逻辑等敏感信息。Microsoft 已通过后续安全更新修复此问题。"
published = "1999-08-19T04:00:00.000"
remediation = "立即为受影响的 IIS 3.0 或 IIS 4.0 服务器应用 Microsoft Security Bulletin MS99-022 的安全补丁，补丁对应知识库文章 KB233335（标题：Page Contents Visible When Certain Characters are at End of URL）。请注意：补丁的语言版本应与 IIS 安装的语言版本相匹配，而非服务器当前默认语言版本；若已安装 IIS 4.0 补丁且存在回归错误，请下载 1999 年 8 月 19 日重新发布的修正版本。最根本的修复方案是将 IIS 升级至 5.0 或更高版本。如暂时无法打补丁，可将服务器默认语言从中文、日文或韩文更改为英文作为临时缓解措施，或通过 URLScan 工具过滤包含双字节字符的特制 URL 请求，防止服务器绕过处理并将文件以纯文本形式返回给浏览器。"
score = 7.1
severity = "HIGH"
sources = ["epss"]
title = "Microsoft IIS 3.0/4.0 双字节代码页源代码泄露漏洞"
updated = "2026-06-16T21:48:55.577"

