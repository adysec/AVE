[basic]
description = "AnalogX Proxy Server 4.04 及更早版本中存在缓冲区溢出漏洞，远程攻击者无需认证即可通过向 POP3 协议发送超长的 USER 命令触发该漏洞，导致目标服务崩溃并拒绝服务。该漏洞主要影响使用 AnalogX Proxy 的代理服务器环境，CVSS 评分 5.0，危害等级中危。建议用户升级至最新版本以修复此漏洞。"
published = "2000-07-25T04:00:00.000"
remediation = "立即升级 AnalogX Proxy 至 v4.05 或更高版本（当前最新版为 v4.15），下载地址 http://www.analogx.com/contents/download/network/proxy.htm。v4.05 版本已明确修复 SMTP/POP3/FTP 处理中的溢出漏洞。如无法立即升级，可在防火墙层面限制对代理服务器 POP3 端口的访问，仅允许内部可信任 IP 连接，以降低远程利用风险。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "AnalogX Proxy Server POP3 USER 命令缓冲区溢出拒绝服务漏洞"
updated = "2026-06-16T21:52:12.437"

