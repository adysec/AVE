[basic]
description = "FrontPage 97 与 98 的服务器扩展组件中，htimage.exe 与 Imagemap.exe 在处理服务器端图像映射（Image Map）请求时存在缓冲区溢出漏洞。由于程序未对用户输入的映射参数进行长度校验，远程攻击者可通过构造超长的恶意请求数据发送至此组件，触发缓冲区溢出。成功利用后，攻击者可绕过网站原有的访问控制限制，执行本不应被允许的操作（如越权访问或执行代码）。该漏洞影响部署了 FrontPage 97/98 Server Extensions 的 Web 服务器，攻击者仅需能访问站点图像映射功能、无需身份认证即可发起攻击，CVSS 评分为 7.5，危害等级为高。"
published = "2000-04-19T04:00:00.000"
remediation = "立即从 Web 服务器中删除或重命名 htimage.exe 与 Imagemap.exe（通常位于 /_vti_bin/ 及 /_vti_bin/_vti_adm/ 目录），禁用服务端图像映射功能；在 IIS 中移除非必要的 FrontPage Server Extensions，或升级至已修复的 Microsoft FrontPage 2000 Server Extensions / 更新版 FrontPage（如 SR-1.2 及以上）。临时缓解可在防火墙或 IIS 中拒绝向 *_vti_bin/* 路径的 htimage/Imagemap 请求，并仅允许受信任 IP 访问管理目录。"
score = 7.5
severity = "HIGH"
sources = ["exploitdb"]
