[basic]
description = "Oracle WebLogic Server 的 WLS Security 组件在处理 T3 协议流量时存在 Java 反序列化漏洞。远程攻击者可通过 TCP 7001 端口向目标服务器发送特制的序列化 Java 对象，利用 Apache Commons Collections 等组件中的反序列化链，在无需身份认证的情况下执行任意操作系统命令，实现远程代码执行。该漏洞影响 Oracle WebLogic Server 10.3.6.0、12.1.2.0、12.1.3.0 及 12.2.1.0 等版本，CVSS v3.1或将评分为 9.8，危害等级严重。攻击者仅需网络可达目标服务器即可发起利用，且已有公开 PoC 及在野利用记录，建议立即升级至官方安全补丁版本并限制 7001 端口的网络访问。"
published = "2015-11-18T15:59:00.133"
remediation = "建议立即安装 Oracle WebLogic Server October 2015 Critical Patch Update（CPU），10.3.6.0 升级到 10.3.6.0.6，12.1.2.0/12.1.3.0/12.2.1.0 应用对应补丁集更新。若无法立即打补丁，应在防火墙或网络层面限制 TCP 7001 端口的 T3 协议访问权限，仅允许可信来源 IP 连接，作为临时缓解措施。"
score = 9.8
severity = "CRITICAL"
sources = ["kev"]
title = "Oracle WebLogic Server T3 反序列化远程代码执行漏洞"
updated = "2026-06-17T00:28:02.700"

