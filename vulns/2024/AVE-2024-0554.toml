[basic]
description = "Linux 内核 RISC-V 架构的 kfence 内存调试子系统中的 kfence_protect_page() 函数在禁用中断的上下文中调用了 flush_tlb_kernel_range()，该函数可能通过核间中断（IPI）向所有 CPU 核心发送 TLB 刷新请求，导致在中断关闭时触发内核警告（smp_call_function_many_cond 中的 WARN_ON），可能引发系统不稳定或拒绝服务。本地攻击者只需低权限即可通过触发特定内存分配释放路径来利用此漏洞。该漏洞影响 Linux 内核 RISC-V 架构版本，CVSS 评分 5.5，危害等级中等。"
published = "2025-01-11T13:15:26.120"
remediation = "立即将 Linux 内核升级至 6.6.67、6.12.6 或 6.13 及以上版本，对应提交为 b3431a8bb336、6f796a6a396d 和 3abfc4130c42。Ubuntu 用户安装 USN-7381-1 或 USN-7514-1 安全更新。RISC-V 架构下若无法立即升级，可临时禁用 kfence 内核调试功能（内核启动参数添加 kfence.sample_interval=0）作为缓解措施。"
score = 5.5
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux Kernel RISC-V kfence 内存保护中断处理不当导致拒绝服务漏洞"
updated = "2026-06-17T08:09:06.133"

