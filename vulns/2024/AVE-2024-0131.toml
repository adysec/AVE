[basic]
description = "通天星CMSV6车载视频监控平台存在会话伪造漏洞，攻击者无需认证即可通过向特定端点提交伪造的会话参数来绕过身份验证。该漏洞影响通天星生产的车载视频监控平台系统，可能导致未经授权的远程访问和监控控制。攻击者只需向目标服务器发送包含伪造 SESSION 参数的 HTTP POST 请求，即可成功劫持用户会话权限，实现非法访问平台功能。"
published = "0807"
remediation = "建议升级通天星CMSV6车载视频监控平台至最新版本，厂商已在后续版本中修复SESSION伪造漏洞。如无法立即升级，可在Web服务器（如Nginx/Apache）或防火墙层面限制`/808gps/LocationManagement/UserSessionAction_saveUserSession.action`路径仅允许可信内网IP访问，并对userSession参数实施服务端签名校验，防止任意伪造。"
