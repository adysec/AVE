[basic]
description = "Joomla! 的 Cookex Agency CKForms 组件（com_ckforms）1.3.3 版本存在目录遍历漏洞。远程攻击者可通过向 index.php 的 controller 参数传递包含 `..`（点点）的恶意路径，绕过访问限制读取服务器上的任意文件，导致敏感信息泄露。该漏洞影响范围有限，攻击复杂度低，无需身份认证即可利用。"
published = "2010-04-09T18:30:00.633"
remediation = "该组件自 2010 年后未再更新，建议立即在 Joomla! 后台扩展管理中卸载 com_ckforms 组件。如因业务需要无法卸载，修改 .htaccess 添加 RewriteRule 过滤 controller 参数中的 ../ 路径穿越字符，或在 php.ini 中禁用 allow_url_fopen 并配置 open_basedir 限制文件访问范围。"
score = 5
severity = "MEDIUM"
sources = ["nuclei"]
title = "Joomla! Cookex Agency CKForms 组件 本地文件包含漏洞"
updated = "2026-06-16T23:18:10.603"

