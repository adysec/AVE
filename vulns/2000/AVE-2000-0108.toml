[basic]
description = "Mirabilis ICQ 99b 1.1.1.1 客户端存在远程缓冲区溢出漏洞，攻击者可通过向目标用户发送包含恶意构造 URL 的 ICQ 消息触发该漏洞，导致在用户系统上执行任意命令。该漏洞影响 ICQ 99b 版本，攻击者无需身份认证即可远程利用，危害等级高。目前官方已停止对该版本的支持，建议用户升级至最新版本或采取替代通信方案。"
published = "2000-01-10T05:00:00.000"
remediation = "升级至 ICQ 2000a 或更高版本，该版本已修复 URL 解析缓冲区溢出问题。由于 Mirabilis ICQ 产品线已停止维护且官方服务已关闭，建议迁移至 Signal/Telegram 等现代即时通讯软件作为最终解决方案。"
score = 7.5
severity = "HIGH"
sources = ["exploitdb"]
title = "Mirabilis ICQ 99b 远程缓冲区溢出漏洞"
updated = "2026-06-16T21:50:53.383"

