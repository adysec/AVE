[basic]
description = "泛微 eoffice 的 `/general/new_mytable/block_content.php` 接口存在 SQL 注入漏洞，攻击者通过向 `block_id` 参数传入恶意构造的 UNION 查询语句，可绕过认证直接获取数据库中敏感信息，包括管理员凭证、用户数据等。该漏洞无需身份验证即可远程利用，攻击门槛低，影响部署了泛微 eoffice 的各类企业办公系统，危害较大。"
published = "0704"
remediation = "建议升级至泛微 e-office 最新版本（≥9.5），官方已修复 block_content.php 中 block_id 参数的 SQL 注入问题。如无法升级，需在应用层对 block_id 参数进行严格的白名单校验，仅允许纯数字输入，并部署 WAF 规则拦截注入 payload。同时建议将数据库连接账户权限降为最小，禁用 xp_cmdshell 等高危功能作为纵深防御。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "泛微 e-office block_content.php SQL注入漏洞"
updated = "0704"

