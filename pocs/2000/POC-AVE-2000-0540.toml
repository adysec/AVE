[info]
author = "AVE"
description = "检测 Zope 2.2 及更早版本 DocumentTemplate 包 DTML 文档/方法未授权修改漏洞。远程攻击者可在未认证情况下修改 DTMLDocument 或 DTMLMethod 对象。通过 HTTP 请求识别 Zope 服务器以判定影响范围。"
id = "POC-AVE-2000-0540"
name = "CVE-2000-0483 PoC"
severity = "high"
tags = ["ave-2000-0540"]
vuln_id = [
    "CVE-2000-0483",
    "AVE-2000-0540",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/manage"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "Zope Management Interface",
    "manage_workspace",
    "manage_main",
]

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "header"
type = "word"
words = ["Zope"]
