[info]
author = "ave"
description = "SCO UnixWare 7.x 的 ARCserve 代理在处理 /tmp 目录文件时存在符号链接漏洞，本地攻击者可创建指向敏感文件的符号链接，诱导以 root 权限运行的 ARCserve 进程写入目标文件实现提权。本 PoC 仅做安全无损验证，检查 /tmp 目录是否存在可被 ARCserve 误用的符号链接风险文件。"
id = "POC-AVE-2000-0199"
name = "CVE-2000-0224 ARCserve /tmp Symlink PoC"
severity = "low"
tags = ["ave-2000-0199"]
vuln_id = [
    "CVE-2000-0224",
    "AVE-2000-0199",
]

[poc]
logic = "all"

[[poc.requests]]
path = "/tmp/arcserve.lnk"
protocol = "file"

[[poc.requests.matchers]]
expect = false
part = "body"
type = "word"
words = [
    "arcserve",
    "symlink",
    "root",
]
