[basic]
description = "Microsoft Internet Explorer 3.x 至 4.01 版本存在子框架欺骗（frame spoofing）漏洞。该漏洞源于浏览器未能正确隔离不同来源网页的框架内容，远程攻击者可通过构造包含特制框架的恶意网页，将伪造的恶意内容（如虚假登录表单或钓鱼信息）插入并显示在另一个可信网站的框架中。攻击条件为诱使用户使用受影响的 IE 版本访问攻击者控制的网页，无需身份认证。成功利用后，攻击者可在受害者浏览可信站点时实施钓鱼欺骗或误导用户操作，影响 IE 3.x 至 4.01 用户，CVSS 评分为 2.6，危害等级较低。"
published = "1998-12-01T05:00:00.000"
remediation = "升级到 Microsoft Internet Explorer 5.0 及以上版本（安装 1999 年 11 月累积安全补丁），或通过 Windows Update 安装对应 IE 安全更新。如暂时无法升级，可在 IE 安全设置中将「通过域访问数据资源」设为禁用，并取消「允许通过脚本操作框架和窗口」，以降低子框架欺骗风险。"
score = 2.6
severity = "LOW"
sources = ["avd"]
title = "Microsoft Internet Explorer 子框架欺骗漏洞"
updated = "2026-06-16T21:49:13.603"

