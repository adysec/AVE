[basic]
description = "PCCS MySQLDatabase Admin Tool Manager 1.2.4 及更早版本在安装过程中将包含数据库连接凭据的配置文件 dbconnect.inc 放置在 Web 根目录下，导致远程攻击者可直接通过 HTTP 访问该文件获取数据库管理员密码等敏感信息。该漏洞影响 MySQLDatabase Admin Tool Manager 全系列版本，攻击者无需身份认证即可利用，可能导致数据库被未授权访问和数据泄露。"
published = "2000-10-20T04:00:00.000"
remediation = "立即将 PCCS MySQLDatabase Admin Tool 升级至 1.2.4 以上版本；将 dbconnect.inc 配置文件移出 Web 根目录（如放置于上级目录），并设置 Web 服务器（Apache/Nginx）拒绝访问 .inc 后缀文件，同时限制管理后台仅允许内网 IP 访问。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "PCCS MySQLDatabase Admin Tool Manager 信息泄露漏洞"
updated = "2026-06-16T21:52:18.757"

