[basic]
description = "Open WebUI 是一款自托管的离线 AI 平台，其引文预览功能存在存储型跨站脚本（Stored XSS）漏洞。攻击者通过手动篡改聊天历史记录，在文档元数据中设置恶意的 `html` 属性，使前端将文档内容作为 HTML 渲染并在 iFrame 中预览引文，从而注入并执行任意 JavaScript 代码。该 payload 在共享聊天中查看引文时同样生效。漏洞影响 0.7.0 之前版本，CVSS 评分 7.3，危害等级高。攻击者需具备修改聊天历史的能力，利用难度较低，可导致会话劫持、数据窃取等后果。官方已在 0.7.0 版本中修复。"
published = "2026-02-19T20:25:42.290"
remediation = "立即将 Open WebUI 升级至 v0.7.0 或更高版本，该版本修复了通过 iFrame 渲染文档 HTML 内容导致的存储型 XSS 问题。如无法立即升级，可在反向代理层过滤或转义用户上传文档中 metadata 的 html 属性值，避免前端直接渲染为 HTML。同时建议限制非受信用户修改聊天历史记录的权限。"
score = 7.3
severity = "HIGH"
sources = ["ghsa"]
title = "Open WebUI 存储型跨站脚本漏洞"
updated = "2026-06-17T10:25:55.093"

