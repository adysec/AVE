[basic]
description = "Linux 内核 Btrfs 文件系统的 zoned 模式中存在空指针解引用漏洞。当在分区设备（zoned device）上克隆 btrfs_device 结构体时，未能同时克隆关联的 btrfs_zoned_device_info 结构体，导致后续访问设备的 zone_info（如将区域设置为 active 状态）时触发空指针解引用。本地攻击者可通过挂载特制的分区文件系统触发此漏洞，造成系统崩溃（拒绝服务）。该漏洞影响使用 Btrfs zoned 模式的 Linux 内核版本，CVSS 评分 5.5，危害等级中等。"
published = "2025-05-01T15:16:06.780"
remediation = "升级 Linux 内核至 6.0.9 或更高版本（修复提交 21e61ec6d0bb、ad88cabcec94），或向后移植这两个补丁至当前内核。该漏洞仅影响使用 zoned 模式（主机管理/主机感知式 SMR 硬盘）的 btrfs 文件系统，若未使用此类设备则不受影响；受影响的系统应优先升级内核，无法立即升级时避免在 SMR 设备上启用 btrfs 的 zoned 模式作为临时缓解。"
score = 5.5
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux Kernel btrfs 分区设备克隆时空指针解引用漏洞"
updated = "2026-06-17T05:19:15.210"

