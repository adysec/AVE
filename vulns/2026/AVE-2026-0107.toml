[basic]
description = "libssh2 库的 `ssh2_transport_read()` 函数在解析 SSH 数据包时未对 `packet_length` 字段做上限校验，存在越界写入漏洞。远程攻击者无需身份认证即可向使用 libssh2 的客户端或服务端发送特制 SSH 数据包，通过设置超大的 `packet_length` 值触发堆内存破坏，最终实现远程代码执行。该漏洞影响 libssh2 1.11.1 及之前版本，CVSS 评分 9.2，危害等级严重。"
published = "2026-06-17T20:17:28.667"
remediation = "立即升级到 libssh2 1.11.2 或更高版本（commit 7acf3df 已包含修复）；如无法升级，在调用 SSH 库前对远程返回的 packet_length 字段进行上限校验，拒绝超过 35000 字节的数据包。对于嵌入式场景，可通过重新编译禁用非必要的 SSH 通道功能作为临时缓解。"
score = 9.2
severity = "CRITICAL"
sources = ["hwpoc"]
title = "libssh2 libssh2 越界写入远程代码执行漏洞"
updated = "2026-07-14T22:17:17.183"

