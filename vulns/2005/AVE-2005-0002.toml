[basic]
description = "FileZilla Server 存在远程拒绝服务漏洞，远程攻击者无需认证即可通过向 FTP 服务端口（默认 21）发送特制的 MKD 命令（包含超长字符串或空字节），触发服务进程空指针解引用异常，导致 FileZilla Server 服务崩溃终止，影响正常的 FTP 文件传输服务可用性。该漏洞影响 FileZilla Server 0.9.8d 及之前版本。"
published = "2005-05-02"
remediation = "升级 FileZilla Server 至 0.9.6 或更高版本。如无法立即升级，可在服务器配置中禁用 MODE Z（zlib 压缩）功能，以阻止攻击者通过触发 zlib 解压死循环耗尽服务器资源。建议定期关注 FileZilla 官方更新通知，及时应用安全补丁。"
score = 5
severity = "MEDIUM"
sources = ["nuclei"]
title = "FileZilla Server 拒绝服务漏洞"
updated = "2005-05-02"

