[basic]
description = "FreeBSD 3.2 及部分其他版本中存在拒绝服务漏洞。本地用户可通过大量进程并发访问 NFS v3 挂载目录，触发内核 panic 导致系统崩溃。该漏洞利用条件为拥有本地用户权限，无需特殊系统调用或提权操作，攻击复杂度低。受影响系统包括 FreeBSD 3.2 系列版本，CVSS 评分 2.1，危害等级低。"
published = "1999-09-02T04:00:00.000"
remediation = "升级至 FreeBSD 3.2-RELEASE-p10 或更高版本（含修复补丁）；或在 /etc/sysctl.conf 设置 kern.maxprocperuid 限制单用户进程数，并通过 /etc/exports 限制 NFS v3 挂载访问权限作为临时缓解。"
score = 2.1
severity = "LOW"
sources = ["cve"]
title = "FreeBSD NFSv3 系统 拒绝服务漏洞"
updated = "2026-06-16T21:50:43.607"

