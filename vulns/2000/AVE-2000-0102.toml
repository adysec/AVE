[basic]
description = "Cobalt RaQ2 服务器中的 siteUserMod.cgi 程序存在权限管理缺陷，允许站点管理员在未授权的情况下修改其他用户、站点管理员乃至超级管理员（root）的密码。攻击者只需拥有站点管理员权限即可利用此漏洞，通过直接调用 CGI 接口实现权限提升，获取服务器的完全控制权限。该漏洞影响 Cobalt RaQ2 系列服务器，CVSS 评分 7.2，危害等级高。"
published = "2000-01-30T05:00:00.000"
remediation = "限制 siteUserMod.cgi 访问权限：移除该 CGI 可执行权限（chmod 000 siteUserMod.cgi）或直接删除文件。在 Apache 配置中对 /cgi-bin/ 目录添加 IP 白名单（Allow from 可信管理网段），仅限堡垒机/管理 IP 访问。由于 Cobalt 已被 Sun 收购且 RaQ 系列早已停产，建议迁移至仍在维护的 Linux 发行版或现代服务器管理面板，从根本上消除该漏洞风险。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "Cobalt RaQ siteUserMod.cgi 特权提升漏洞"
updated = "2026-06-16T21:51:02.133"

