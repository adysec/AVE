[basic]
description = "Linux 内核 KVM 虚拟化子系统的 x86 影子分页机制存在释放后使用（Use-After-Free）漏洞，漏洞源于角色（role）字段校验缺失导致非叶子页表被错误复用。攻击者可通过在虚拟机外部修改 PDE 映射后删除内存槽（memslot）触发该漏洞，造成影子页释放后 rmap 条目仍残留，后续脏页记录或 MMU 通知器遍历该 GFN 时将解引用已释放内存导致内核崩溃或潜在权限提升。该漏洞影响 Linux 内核 KVM 相关版本，CVSS 评分 8.8，危害等级高。"
published = "2026-07-04T12:17:01.760"
remediation = "立即升级 Linux 内核至以下修复版本：主线 ≥ 7.2-rc1，或长期支持分支升级至 6.1.177+、6.6.144+、6.12.95+、6.18.38+、7.1.3+。内核修复提交包括 1ae7d5a6db6c、2ad3afa40ac6、5e470998a23e4、81ccda30b4e8、9291654d69e0、b1337aae5e19（均在 arch/x86/kvm/mmu/mmu.c 中修复影子页表角色校验缺失导致的 use-after-free）。若无法立即更新，可临时限制 /dev/kvm 设备文件的访问权限（仅允许受信用户），或卸载 kvm_amd/kvm_intel 内核模块停止虚拟机服务作为缓解措施。"
score = 8.8
severity = "HIGH"
sources = ["hwpoc"]
title = "Linux Linux Kernel KVM 虚拟机逃逸漏洞"
updated = "2026-07-18T08:16:36.620"

