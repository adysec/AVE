[basic]
description = "Java虚拟机（JVM）中的字节码验证器组件存在安全缺陷，攻击者可将精心构造的恶意Java小程序（Applet）嵌入网页中。当用户使用Netscape Communicator或Navigator浏览器访问该恶意页面时，字节码验证器未能正确检测恶意字节码，导致攻击者能够在受害者系统上远程执行任意代码。该漏洞影响Netscape Communicator 4.x及更早版本，CVSS评分7.5，危害等级高。"
published = "1999-03-01T05:00:00.000"
remediation = "立即升级 Netscape Communicator 至 4.5 以上版本，或安装 Sun 于 1999 年 3 月发布的 JVM 安全补丁。在浏览器设置中禁用 Java applet 自动执行功能，并将安全级别调至最高。鉴于该产品已停止维护，建议彻底停止使用 Netscape Communicator/Navigator，迁移至现代浏览器。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "Netscape Communicator Java Virtual Machine 远程代码执行漏洞"
updated = "2026-06-16T21:48:24.073"

