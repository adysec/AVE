[basic]
description = "SGI IRIX 操作系统中的 colorview 工具存在任意文件读取漏洞。由于 colorview 在处理 -text 参数时未对用户指定的文件路径进行充分校验，本地攻击者可通过向 colorview 传递特制的 -text 参数读取系统上任意文件，包括敏感配置文件。该漏洞影响 SGI IRIX 5.1、5.2 及 6.0.1 版本，攻击者需拥有本地系统访问权限，CVSS 评分 2.1，危害等级低。"
published = "1994-08-09T04:00:00.000"
remediation = "建议立即应用 SGI 于 1995 年发布的安全公告 19950209-01-P 中的官方补丁（ftp://patches.sgi.com/support/free/security/advisories/19950209-01-P）。如无法安装补丁，可移除 colorview 的 setuid/setgid 权限（chmod u-s /usr/sbin/colorview）并严格限制可执行该命令的用户范围。由于 SGI IRIX 已停止支持多年，建议将业务迁移至仍受支持的操作系统平台。"
score = 2.1
severity = "LOW"
sources = ["avd"]
title = "SGI IRIX colorview 任意文件读取漏洞"
updated = "2026-06-16T21:50:33.680"

