[basic]
description = 'CVE-1999-0639 涉及 Unix 系统上运行的多个网络服务存在远程安全漏洞。其中 chargen（字符生成）服务在目标主机上处于开启状态，该服务属于经典的"无用服务"，会在收到连接后持续返回随机字符流。攻击者可通过向目标主机的 chargen 端口（TCP/UDP 19）建立连接，诱导其产生大量无意义流量，并可结合 echo 等服务发起反射放大攻击，消耗系统资源或参与分布式拒绝服务（DDoS）。影响范围为默认开启或暴露此类老旧服务的 Unix/Linux 系统。利用条件为攻击者能够网络可达目标主机的 chargen 端口，且服务未做访问限制。建议关闭并禁用 chargen 等不必要的网络服务以减小攻击面。'
published = "1999-01-01T05:00:00.000"
remediation = "在 inetd/xinetd 配置中注释掉 chargen 服务条目（如 /etc/inetd.conf 中 #chargen 及 /etc/xinetd.d/chargen 设置 disable = yes），执行 kill -HUP $(pidof inetd) 或重启 xinetd 使配置生效；同时在边界防火墙阻断 TCP/UDP 19 端口，禁止外部访问该服务以消除反射放大与信息泄露风险。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Unix/Linux chargen 服务未授权访问漏洞"
updated = "2026-06-16T21:48:46.383"

