[basic]
description = "ISC INN（InterNetNews）2.2 版本中的 inews 程序存在缓冲区溢出漏洞。该程序用于向 Usenet 新闻服务器投递文章，攻击者可通过网络向目标系统发送特制的新闻文章内容触发溢出，无需身份认证即可利用。成功利用可导致远程代码执行或服务拒绝，影响运行该版本的 Linux 服务器及其上承载的新闻服务。CVSS v2 评分为 7.5（高危），攻击向量为网络，攻击复杂度低，无需权限即可实施。"
published = "1999-09-01T04:00:00.000"
remediation = "立即将 ISC INN 升级至 2.2.1 或更高版本（官方已修复该缓冲区溢出），Red Hat Linux 6.0 用户应通过 up2date 或 rpm 命令安装厂商提供的 inn 安全更新包（如 inn-2.2-3 以上）。如暂时无法升级，可将 inews 二进制文件权限设为 0750 并归属至受限新闻组用户组，移除其他用户的执行权限，同时限制本地不可信用户登录以缓解被利用风险。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "ISC INN inews 缓冲区溢出漏洞"
updated = "2026-06-16T21:48:53.177"

