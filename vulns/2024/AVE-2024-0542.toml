[basic]
description = "Git 在通过终端交互式提示用户输入凭证时，未对 URL 中的特殊字符进行清理。攻击者可以构造包含 ANSI 转义序列的恶意 URL，当用户使用 Git 克隆或访问该 URL 时，终端会解析这些转义序列，从而在界面上伪造出可信 Git 托管站点的身份验证提示，诱骗用户输入用户名和密码。实际上这些凭证会被发送到攻击者控制的不可信站点，导致凭证泄露。该漏洞影响 Git 2.40.4 之前及 2.41.3/2.42.4/2.43.6/2.44.3/2.45.3/2.46.3/2.47.2/2.48.1 之前版本，攻击条件要求用户交互（如克隆恶意仓库），CVSS 评分 2.1，危害等级低。官方已在 v2.48.1 等版本中修复。"
published = "2025-01-14T19:15:32.157"
remediation = "立即升级 Git 至 v2.48.1、v2.47.2、v2.46.3、v2.45.3、v2.44.3、v2.43.6、v2.42.4、v2.41.3 或 v2.40.4 及以上版本，这些版本已包含提交 7725b81 和 c903985 的补丁。如无法立即升级，应避免从不可信 URL 克隆仓库，尤其禁止递归克隆操作，并建议使用凭据助手（credential helper）替代终端交互式输入。"
score = 2.1
severity = "LOW"
sources = ["msrc"]
title = "Git 交互式凭证提示 URL 清理不当漏洞"
updated = "2026-06-17T08:04:17.040"

