[info]
author = "AVE"
description = "检测目标是否提供利用 scriptlet.typelib ActiveX 控件执行任意命令的恶意页面"
id = "POC-AVE-1999-0184"
name = "CVE-1999-0668 PoC"
severity = "medium"
tags = [
    "cve-1999-0668",
    "activex",
    "ie",
    "rce",
]
vuln_id = [
    "CVE-1999-0668",
    "AVE-1999-0184",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["scriptlet.typelib"]
