CVE-1999-1147: Buffer overflow in Platinum Policy Compliance Manager (PCM) 7.0
- Product: Platinum PCM 7.0 (Agent component)
- Vulnerability: Buffer overflow in smaxagent.exe listening on port 1827
- Impact: Remote code execution, denial of service
- CVSS v2: 7.5 HIGH (AV:N/AC:L/Au:N/C:P/I:P/A:P)
- Published: 1998-12-04
- References:
- http://marc.info/?l=bugtraq&m=91273739726314&w=2
- http://www.osvdb.org/3164
- https://exchange.xforce.ibmcloud.com/vulnerabilities/1430
- Remediation: No official patch available as product is EOL; upgrade to latest version or isolate affected service
