[basic]
description = "泛微e-cology的WorkPlanService SOAP接口中的deleteWorkPlan方法存在SQL注入漏洞。攻击者可通过向/services/WorkPlanService接口发送特制的SOAP请求，在in0参数中注入恶意SQL语句，利用SLEEP函数进行时间盲注，进而窃取数据库中敏感信息。该漏洞无需身份认证，攻击者通过网络即可远程利用。"
published = "2024-06-15"
remediation = "升级泛微e-cology至最新安全版本；在Web应用防火墙中配置规则拦截对/services/WorkPlanService的可疑SOAP请求；对SOAP接口输入参数实施严格的类型校验和参数化查询，避免SQL语句拼接。"
score = 5.0
severity = "MEDIUM"
sources = ["hwpoc"]
