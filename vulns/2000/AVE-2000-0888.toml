[basic]
description = "Microsoft Virtual Machine（VM）存在Java沙箱逃逸漏洞，远程攻击者可通过构造包含非法类型转换操作的恶意Java Applet，诱使用户访问恶意网页触发漏洞，从而突破Java安全沙箱的限制并在目标系统上执行任意命令。该漏洞影响Microsoft Virtual Machine多个版本，CVSS评分7.6，危害等级高。"
published = "1999-10-21T04:00:00.000"
remediation = "升级 Microsoft VM 至 build 2442（2000 系列）或 build 3188（3000 系列）及以上版本。该补丁随 Microsoft Security Bulletin MS99-045 发布，可通过 Windows Update 获取。由于 Microsoft 已于 2007 年终止对 Microsoft Java VM 的支持，建议彻底卸载 Microsoft VM 并迁移至最新版 Java Runtime Environment（JRE），同时在浏览器中禁用 Java Applet 支持以彻底消除攻击面。"
score = 7.6
severity = "HIGH"
sources = ["avd"]
title = "Microsoft Virtual Machine Java沙箱逃逸远程代码执行漏洞"
updated = "2026-06-16T21:51:29.123"

