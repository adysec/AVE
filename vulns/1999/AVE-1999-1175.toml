[basic]
title = "Joe's Own Editor DEADJOE 文件权限漏洞"
description = "Joe's Own Editor (joe) 2.8 版本在创建崩溃恢复文件 DEADJOE 时，错误地将其权限设置为全局可读（world-readable）。这导致同一系统上的任意本地用户均可读取该文件内容，进而窃取其他用户正在编辑的敏感文件数据（如配置文件、脚本、文档等）。攻击条件为：攻击者需拥有本地系统账户，且目标用户使用 joe 编辑器且发生崩溃触发 DEADJOE 生成。利用方式为直接读取当前目录或家目录下的 DEADJOE 文件，无需提权即可获取他人编辑内容。"
severity = "LOW"
score = 2.1
sources = ["cve"]
published = "1999-07-14T04:00:00.000"
updated = "2026-06-16T21:50:41.200"
remediation = "升级至 joe 3.0 或更高版本，该版本已修复 DEADJOE 文件默认权限问题。若暂时无法升级，可手动执行 'chmod 600 DEADJOE' 将崩溃文件权限限制为仅所有者可读写，或将 DEADJOE 存储于权限受限的私有目录中（如设置 umask 077 后再启动编辑器）。"
