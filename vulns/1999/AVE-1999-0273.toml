[basic]
description = 'SCO Doctor 管理工具中存在权限提升漏洞，本地用户可通过该工具的 "Tools" 选项以 root 权限执行任意操作。攻击者需拥有系统本地访问权限，利用该漏洞可完全控制受影响系统，包括修改系统配置、访问敏感数据及安装恶意程序。该漏洞影响 SCO OpenServer 等版本，CVSS 评分 7.2，危害等级高。建议用户限制本地用户对 SCO Doctor 工具的访问权限。'
published = "1999-09-09T04:00:00.000"
remediation = "升级 SCO OpenServer 至 5.0.5 及以上版本，或安装 SCO 官方安全补丁 erg712103。如无法升级，移除 SCO Doctor 的 setuid root 权限（chmod u-s /opt/K/SCO/Doctor/1.0.0/bin/doctor），并限制可登录系统的本地用户账号数量，仅保留管理员可交互登录。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "SCO Doctor 本地权限提升漏洞"
updated = "2026-06-16T21:48:52.187"

