[basic]
description = "Linux cdwtools 工具集 093 及之前版本存在缓冲区溢出漏洞。本地攻击者可利用该漏洞通过精心构造的输入触发缓冲区溢出，覆盖内存中的关键数据，从而获取 root 权限。该漏洞影响 S.u.S.E. Linux 6.1/6.2 等发行版本，CVSS 评分 7.2，危害等级高。由于攻击需要本地访问权限，利用条件受到一定限制，但成功利用后将导致目标系统完全受控。"
published = "1999-10-22T04:00:00.000"
remediation = "升级 cdwtools 至 0.93 以上版本，该版本已修复缓冲区溢出漏洞。如软件已废弃，建议替换为现代替代工具（如 cdrdao 或 wodim），并移除旧版 cdwtools 的 suid 权限以消除提权风险。"
score = 7.2
severity = "HIGH"
sources = ["cve"]
title = "SuSE Linux cdwtools 本地缓冲区溢出漏洞"
updated = "2026-06-16T21:51:33.543"

