[basic]
description = "IRIX 操作系统在 6.4 版本的补丁 2291 和 2848 中，diskalign 与 diskperf 两个工具存在本地权限提升漏洞。由于这些工具在运行过程中会以不安全的方式创建由 root 拥有的文件，本地已登录的普通用户可借助该缺陷操纵文件创建过程，使系统生成被其控制内容的 root 属主文件，进而篡改关键系统文件或替换易受信任的二进制程序，最终达成完全获取 root 权限的本地提权。该漏洞影响安装了上述补丁的 IRIX 6.4 系统，攻击者需具备本地普通用户访问权限，通过正常调用 diskalign 或 diskperf 触发，无需远程网络即可完成利用。"
published = "1998-05-27T04:00:00.000"
remediation = "从受影响补丁版本移除或降级补丁 2291 和 2848，确保 diskalign 与 diskperf 工具不再以 root 权限创建可被本地用户控制的文件；同时联系 SGI 支持获取该公告 (19980502-01-P3030) 对应的修订补丁并正确安装。若无法及时获取补丁，建议将本地用户与 root 操作严格隔离，对 diskalign 和 diskperf 的访问权限设为仅 root 可执行，并在可行情况下迁移至 IRIX 6.5 或更高版本的受支持操作系统。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "SGI IRIX 6.4 补丁本地提权漏洞"
updated = "2026-06-16T21:49:34.700"

