[basic]
description = "GNU Emacs 20 中的 make-temp-name Lisp 函数在创建临时文件时使用可预测的文件名，本地攻击者可通过符号链接攻击（symlink attack）在目标系统上实现文件劫持或信息窃听。该漏洞影响 GNU Emacs 20 及可能受影响的早期版本，攻击者需拥有本地用户权限，利用难度较低。建议升级至不受影响的版本或采用安全的临时文件创建方式。"
published = "2000-04-18T04:00:00.000"
remediation = "升级到 Emacs 21.1 或更高版本（2001 年 10 月发布），该版本引入 make-temp-file 函数，该函数原子化创建临时文件，从根本上消除竞争条件。如无法升级，将所有 Elisp 代码中对 make-temp-name 的调用替换为 make-temp-file，并确保创建临时文件时使用 O_CREAT|O_EXCL 标志防止符号链接劫持。作为临时缓解措施，在系统层面配置 umask 077 避免其他用户访问临时目录。"
score = 3.6
severity = "LOW"
sources = ["avd"]
title = "GNU Emacs 可预测临时文件名本地符号链接攻击漏洞"
updated = "2026-06-16T21:51:22.010"

