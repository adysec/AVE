[basic]
description = "Solaris 7.0 系统内核在处理 set-gid 程序时存在权限检查缺陷，即使真实用户 ID 不属于 set-gid 所属组，仍允许 set-gid 程序产生 core dump 文件。本地攻击者可利用该漏洞，通过触发程序崩溃（如使用 dmesg 命令）来以更高权限覆盖或创建任意文件，从而实现本地权限提升。该漏洞影响 Solaris 2.4 至 7.0 版本，需本地访问权限且攻击难度较低。"
published = "1996-08-03T04:00:00.000"
remediation = "安装 Solaris 7.0 对应内核补丁集（Kernel Jumbo Patch）或升级至更高版本，确保 set-gid 程序 core dump 受权限检查约束。临时缓解措施：使用 `coreadm -d setid` 禁用 set-gid 程序的 core dump 功能，并通过 `coreadm -e log` 记录 core dump 事件以监控异常。"
score = 4.6
severity = "MEDIUM"
sources = ["avd"]
title = "Sun Solaris set-gid 程序核心转储本地权限提升漏洞"
updated = "2026-06-16T21:50:23.280"

