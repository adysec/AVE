[basic]
description = "HHOpen ActiveX 控件（hhopen.ocx）1.0.0.1 版本存在缓冲区溢出漏洞，影响 Internet Explorer 4.01 及 5。远程攻击者可通过向 OpenHelp 方法传递超长参数触发栈缓冲区溢出，从而执行任意命令。攻击者通常构造恶意网页诱导用户访问来实施攻击，成功后可获取与当前用户相同的系统权限。"
published = "1999-10-31T04:00:00.000"
remediation = '升级到 Internet Explorer 6 或更高版本，该漏洞在 IE 6 中已修复。如无法升级浏览器，可通过注册表设置 HHOpen ActiveX 控件的 kill bit（CLSID: {A28CBB10-5A6E-11D2-8E41-006008C53C5E}），在 HKEY_LOCAL_MACHINE\SOFTWARE\Microsoft\Internet Explorer\ActiveX Compatibility 下创建对应 CLSID 的 Compatibility Flags 值为 0x400 以禁用该控件。'
score = 5.1
severity = "MEDIUM"
sources = ["epss"]
title = "Microsoft Internet Explorer HHOpen ActiveX 控件缓冲区溢出漏洞"
updated = "2026-06-16T21:50:45.543"

