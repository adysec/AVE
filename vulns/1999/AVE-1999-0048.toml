[basic]
description = "Teardrop 攻击利用 IP 分片重组过程中的缺陷，攻击者向目标系统发送重叠偏移或过长的 IP 分片数据包，导致目标在重组片段时发生缓冲区溢出或死锁，引发系统崩溃或蓝屏死机。该漏洞影响 Microsoft Windows 95/NT 3.51/NT 4.0 及 HP-UX 10.34 等操作系统。远程攻击者可构造特制分片包实施拒绝服务攻击，CVSS 评分 5.0。"
published = "1997-12-16T05:00:00.000"
remediation = "建议升级至 Windows 2000 及以上版本，这些系统已内置 Teardrop 攻击防护。如无法升级，安装 Microsoft 安全公告 MS99-017 对应补丁；或在网络边界防火墙/路由器上配置过滤分片异常的 IP 数据包，丢弃源和目标地址相同的分片包作为临时缓解。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Microsoft Windows 95/NT Teardrop IP 拒绝服务漏洞"
updated = "2026-06-16T21:47:21.280"

