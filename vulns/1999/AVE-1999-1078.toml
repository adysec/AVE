[basic]
description = "Windows NT 4.0 SP2 之前版本的 Win32k.sys 内核模块存在拒绝服务漏洞。本地攻击者可通过向特定 WIN32K 函数传递异常参数触发该漏洞，导致系统崩溃。该漏洞影响 Windows NT 4.0 系统，CVSS 评分 2.1，危害等级低。由于需要本地访问权限且仅造成拒绝服务，实际利用价值有限。"
published = "1999-12-31"
remediation = "升级到 Windows NT 4.0 Service Pack 2 或更高版本以修复 Win32k.sys 内核模块中处理 WIN32K 函数参数时的缺陷。SP2 已包含针对此问题的安全补丁（KB Q160601），限制了异常参数对内核的异常调用，防止系统崩溃。"
score = 2.1
severity = "LOW"
sources = ["cve"]
title = "Microsoft Windows NT 4.0 拒绝服务漏洞"
updated = "2026-06-16"

