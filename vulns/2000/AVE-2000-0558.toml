[basic]
description = "Unify eWave ServletExec 存在 JSP 源代码泄露漏洞（CWE-178）。远程攻击者无需身份认证，只需将请求 URL 中的 JSP 文件扩展名改为大写（如将 `.jsp` 改为 `.JSP`），服务器即会以文本形式返回 JSP 文件的原始源代码而非执行编译结果。该漏洞可导致数据库连接密码、业务逻辑、内部接口等敏感信息泄露，影响使用 ServletExec 的多个供应商产品，CVSS 评分 7.5，危害等级高。"
published = "2000-06-08"
remediation = "升级至 ServletExec 3.0.2 或更高版本，该版本已修复大小写不敏感处理问题。如无法升级，可在 Web 服务器层面添加 URL 重写规则，将所有 .JSP/.jsp 及各类大小写变体的请求统一转发至 Servlet 引擎处理，禁止直接返回源码内容。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "Unify eWave ServletExec JSP源代码泄露漏洞"
updated = "2026-06-16"

