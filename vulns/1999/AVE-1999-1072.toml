[basic]
description = "Compaq Insight Management Agent 4.23及之前版本、Management Agents for Servers 4.40及之前版本在安装BMC Patrol组件时，会自动创建一个名为PFCUser的默认账户，该账户使用固定默认密码且拥有过高系统权限。远程攻击者可利用此默认凭证登录目标系统，获取未授权访问权限，进而执行恶意操作。该漏洞影响大量Compaq/HP服务器管理系统，危害严重。"
published = "1999-12-31T05:00:00.000"
remediation = "升级 Compaq Insight Management Agent 至 4.23 以上版本，或 Management Agents for Servers 至 4.40 以上版本；同时删除或禁用默认创建的 PFCUser 账户，并修改所有相关账户的默认口令。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "Compaq Management Agents for Servers 弱配置默认口令漏洞"
updated = "2026-06-16T21:50:15.847"

