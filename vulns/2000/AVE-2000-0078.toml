[basic]
description = "BSD 系统 /proc 文件系统中的 /proc/pid/mem 接口存在权限检查缺陷，本地普通用户可通过修改 stderr 文件描述符来操纵目标进程的内存空间，从而将自身权限提升至 root。该漏洞影响 FreeBSD 3.4、NetBSD 1.4.1 及 OpenBSD 2.6 等版本，CVSS 评分 7.2，危害等级高。攻击者需拥有目标系统的本地访问权限，无需认证即可利用。"
published = "2000-02-16T05:00:00.000"
remediation = "建议升级到已修复版本：FreeBSD 升级至 3.5 或更高版本，OpenBSD 升级至 2.7 或更高版本，NetBSD 升级至 1.4.2 或更高版本。如无法升级，可通过在 /etc/fstab 中注释 procfs 挂载行并重启来禁用 /proc 文件系统，或在内核配置中去掉 options PROCFS 后重新编译内核。临时缓解措施可移除 /proc/pid/mem 的 setuid 权限（chmod 000 /proc/*/mem）。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "FreeBSD NetBSD OpenBSD /proc 文件系统本地权限提升漏洞"
updated = "2026-06-16T21:50:59.290"

