[basic]
description = "AnalogX SimpleServer:WWW 1.0.5 存在缓冲区溢出漏洞，远程攻击者无需身份认证即可通过向目标服务器 cgi-bin 目录发送特制的超长 GET 请求触发该漏洞，导致服务崩溃拒绝服务。攻击条件简单，仅需网络可达即可发起攻击，影响运行该版本 Web 服务的所有系统。CVSS 评分 7.5，危害等级高。"
published = "2000-06-15T04:00:00.000"
remediation = "升级 AnalogX SimpleServer:WWW 至 1.06 或更高版本（若厂商已停止维护，建议迁移至 Nginx/Apache 等现代 Web 服务器）。临时缓解措施：在反向代理或 WAF 层限制 GET 请求 URI 长度不超过 4096 字节，过滤包含过长 cgi-bin 路径的请求。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "AnalogX SimpleServer:WWW 1.0.5 缓冲区溢出拒绝服务漏洞"
updated = "2026-06-16T21:51:48.603"

