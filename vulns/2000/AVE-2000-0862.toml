[basic]
description = "FreeBSD 系统中的 libmytinfo 库存在缓冲区溢出漏洞，本地攻击者可通过向 TERMCAP 环境变量传入超长字符串触发该漏洞，导致缓冲区溢出，进而执行任意命令。该漏洞影响 FreeBSD 系统，攻击者需要拥有本地访问权限才能利用，成功利用后可获得与受影响进程相同的权限，对系统机密性、完整性和可用性造成部分影响。"
published = "1990-05-09T04:00:00.000"
remediation = "升级 FreeBSD 至 3.4-RELEASE 之后的安全修复版本（含 SA-00:17 补丁），或安装最新 FreeBSD 稳定版（此漏洞仅影响 2000 年之前的旧版本）。如无法升级，可在 shell 启动脚本中过滤 TERMCAP 环境变量长度，限制其不超过 1024 字节，并严格控制本地用户的可信度。同时建议禁用 libmytinfo 库中不必要的终端信息处理功能以降低攻击面。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "FreeBSD libmytinfo 库缓冲区溢出本地代码执行漏洞"
updated = "2026-06-16T21:51:36.727"

