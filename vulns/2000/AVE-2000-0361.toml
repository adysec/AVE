[basic]
description = "Qpopper 2.53及更早版本中存在格式字符串漏洞，本地用户可通过在邮件From头中插入特制的格式字符串标识符（如%n、%s等），当euidl命令处理该头部时触发漏洞，导致攻击者能够以提升的权限执行任意代码。该漏洞影响Cobalt RaQ 2.0/3.0及qpopper 2.52/2.53等版本，CVSS评分7.5，危害等级高。攻击者需具备本地用户权限即可利用，无需认证。"
published = "2000-05-24T04:00:00.000"
remediation = "升级 Qpopper 至 2.54 或更高版本，该版本已修复 euidl 命令处理 From: 头时的格式化字符串漏洞。如无法升级，可在 qpopper 配置中禁用 EUIDL 命令，或限制仅信任用户使用 POP3 服务。运行 Qpopper 的 Cobalt RaQ 设备应同步更新厂商提供的安全补丁。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "Qualcomm Qpopper EUIDL 命令格式字符串漏洞"
updated = "2026-06-16T21:51:44.560"

