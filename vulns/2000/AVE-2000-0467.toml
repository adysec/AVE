[basic]
description = "Flowerfire Sawmill 5.0.21 版本中的 CGI 程序存在信息泄露漏洞，远程攻击者可通过向 rfcf 参数传递目标文件路径，触发程序将文件内容解析为配置命令，从而读取任意文件的首行内容。该漏洞影响 Sawmill 5.0.21 版本，CVSS 评分 5.0，危害等级中危。攻击无需认证，利用难度低，可导致敏感信息泄露。"
published = "2000-06-26T04:00:00.000"
remediation = "立即升级 Sawmill 至 5.0.22 及以上版本，官方已在后续版本中修复了 CGI 程序对 rfcf 参数的不当解析问题。如无法升级，可删除或禁用 Sawmill 的 CGI 脚本（如 sawmill.cgi），或在 Web 服务器层面限制对该 CGI 脚本的访问（如通过 .htaccess 或 Nginx/Apache 访问控制规则仅允许受信 IP 访问），同时确保 Web 服务器不以高权限运行。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Flowerfire Sawmill 5.0.21 任意文件读取漏洞"
updated = "2026-06-16T21:52:03.573"

