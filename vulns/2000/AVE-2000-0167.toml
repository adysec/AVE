[basic]
description = "AOL Instant Messenger（AIM）3.5 版本在处理特制消息时存在拒绝服务漏洞。远程攻击者可通过向目标用户发送包含畸形 ASCII 值的消息，导致 AIM 客户端崩溃或停止响应，造成拒绝服务。该漏洞影响 AOL Instant Messenger 3.5 版本，攻击者无需认证即可利用，危害等级中等，目前官方已发布补丁修复。"
published = "2000-03-02T05:00:00.000"
remediation = "建议立即卸载 AOL Instant Messenger 3.5（该产品已于 2017 年 12 月正式停服，不再提供安全更新），并迁移至其他受支持的即时通讯软件。如无法立即卸载，可在网络边界防火墙封禁 AIM 使用的 5190/TCP 端口作为临时缓解措施，同时限制客户端仅接收可信联系人的消息。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "AOL Instant Messenger 3.5 畸形ASCII值消息拒绝服务漏洞"
updated = "2026-06-16T21:51:11.313"

