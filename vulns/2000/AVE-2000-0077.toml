[basic]
description = "glFTPd 1.17.2 FTP 服务器存在默认账户漏洞，软件内置了名为 glftpd 的默认用户账户，该账户使用固定默认密码且 UID 被设置为 0（超级管理员权限）。远程攻击者无需身份认证即可通过 FTP 协议登录该默认账户，直接获取目标系统的 root 级完全控制权限，进而执行任意命令、上传恶意文件或窃取敏感数据。该漏洞影响 glFTPd 1.17.2 及更早版本，攻击复杂度低，危害严重。"
published = "1999-12-23"
remediation = "立即删除 glFTPd 中默认的 glftpd 系统账户（UID 0，密码为默认值），或升级至已修复此问题的 glFTPd 1.17.3 及以上版本。如无法升级，建议在 ftpusers 文件中禁止 root 用户登录，并改用 vsftpd 或 Pure-FTPd 等持续维护的 FTP 服务替代。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "glFTPd 1.17.2 远程代码执行漏洞"
updated = "1999-12-23"

