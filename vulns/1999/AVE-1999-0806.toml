[basic]
description = "Internet Explorer 5 的收藏夹图标（Favorites icon）处理功能存在缓冲区溢出漏洞。当浏览器解析攻击者构造的畸形收藏夹图标文件时，由于未对输入数据长度进行正确边界校验，会导致缓冲区溢出，使远程攻击者能够在目标用户系统上执行任意命令。该漏洞影响使用 Internet Explorer 5 的 Windows 系统，攻击者可借助恶意网页或诱导用户导入特制收藏夹图标的方式触发，无需身份认证，只要受害者访问恶意内容即可实现远程代码执行，危害等级高。"
published = "1999-05-27T04:00:00.000"
remediation = "升级至 Internet Explorer 5.01 SP2 或 IE 5.5 及以上版本，并安装微软 2000 年 3 月安全汇总补丁（如 Windows Update 中的 IE 累积更新）。如暂无法升级，可在浏览器安全设置中将「收藏夹」及 Active Desktop 相关脚本禁用，并通过代理过滤畸形 Favorites 图标(.ico)响应作为临时缓解。"
score = 7.6
severity = "HIGH"
sources = ["epss"]
