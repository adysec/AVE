[basic]
description = "Meeting Maker 使用弱加密算法（多表代换密码）存储用户密码，远程攻击者可通过网络嗅探捕获加密后的密码数据，并利用该弱加密算法的可逆性进行解密，从而获取明文密码。该漏洞影响 Meeting Maker 所有版本，攻击者无需认证即可实施攻击，可能导致敏感账户信息泄露。建议升级至修复版本或采用强加密算法保护密码传输与存储。"
published = "2000-04-25T04:00:00.000"
remediation = "建议升级 Meeting Maker 至 6.0 及以上版本（1998 年后版本引入了更强加密机制），或迁移至支持现代加密协议（如 TLS 1.2+ 及 AES-256）的日程管理方案。如无法升级，应在网络入口配置防火墙规则限制对 Meeting Maker 服务端口（默认 624/625 UDP）的访问，仅允许受信 IP 段连接，并通过 VPN 加密所有传输流量。避免在不可信网络中通过明文中继连接服务。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "NetManage Meeting Maker 弱加密漏洞"
updated = "2026-06-16T21:51:28.997"

