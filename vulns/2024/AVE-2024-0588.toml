[basic]
description = "Linux 内核中 MIPS 架构龙芯 64 平台（Loongson64）的设备树（DTS）存在 PCIe 端口节点配置缺陷，ls7a 芯片组的设备树源文件中缺少必要的 `#address-cells` 属性且中断控制器配置不当，导致内核在解析设备树时触发运行时警告及中断映射失败。本地攻击者可通过加载特制的设备树或利用系统启动过程中的设备树解析流程触发该漏洞，造成内核告警泛滥及系统可用性受影响。该漏洞影响使用龙芯 64 处理器及 ls7a 芯片组的 Linux 系统，CVSS 评分 5.5，危害等级中等。Linux 内核主线已通过提交 d89a415ff8d5 修复此问题。"
published = "2025-01-08T18:15:19.487"
remediation = "建议将 Linux 内核升级至包含 commit d89a415ff8d5 及后续修复的版本（主线内核 >= 6.12）。Ubuntu 24.04 LTS 用户可通过 `sudo apt update && sudo apt install linux-image-6.8.0-1028-gcp`（GCP 实例）或对应发行版的最新内核包修复；其他发行版用户应更新至包含该补丁的内核版本。如无法立即升级，可临时禁用受影响硬件平台（Loongson64）的 PCIe 热插拔功能作为缓解措施。"
score = 5.5
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux Kernel MIPS Loongson64 DTS PCIe 设备树配置缺陷导致拒绝服务漏洞"
updated = "2026-06-17T08:12:59.357"

