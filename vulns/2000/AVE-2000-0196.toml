[basic]
description = "Nortel Nautica Marlin 桥接设备的 SNMP 服务存在拒绝服务漏洞，远程攻击者无需认证即可向目标设备的 SNMP 端口（默认 UDP 161）发送特制的零长度 UDP 数据包，导致设备 SNMP 服务崩溃或停止响应，造成网络管理功能中断。该漏洞影响 Nortel Nautica Marlin 系列桥接设备，攻击者只需掌握目标 IP 地址即可发起攻击，无需交互或权限认证，危害等级中等。"
published = "2000-02-25T05:00:00.000"
remediation = "建议禁用 SNMP 服务（如业务不需要），或在网桥/防火墙上配置访问控制列表，仅允许信任源 IP 访问 UDP 端口 161。该设备已停止技术支持，建议尽快迁移至受支持的替代产品以根除风险。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Nortel Nautica Marlin SNMP 服务拒绝服务漏洞"
updated = "2026-06-16T21:51:15.397"

