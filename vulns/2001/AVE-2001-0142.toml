[basic]
description = "IBM Net.Commerce 2.0/3.x/4.x 及 IBM Websphere Commerce Suite 4.1.1 及更早版本的 orderdspc.d2w 宏中存在 SQL 注入漏洞。远程攻击者可通过向 report 功能的 order_rn 参数中插入恶意 SQL 查询语句，绕过认证执行任意数据库操作，导致敏感数据泄露或数据篡改。该漏洞无需身份认证即可利用，攻击复杂度低，CVSS 评分 7.5，危害等级高。"
published = "2001-05-03T04:00:00.000"
remediation = "IBM Net.Commerce 系列（2.0/3.x/4.x）及 WebSphere Commerce Suite 4.1.1 及更早版本已停止维护，官方不再提供安全补丁。建议立即升级至 IBM 当前支持的 WebSphere Commerce 版本，或迁移至现代电子商务平台。如无法升级，应在 Web 服务器或应用层对 order_rn 参数实施严格的输入过滤，禁止包含 SQL 关键字和特殊字符，并限制 report 功能仅授权用户访问。"
score = 7.5
severity = "HIGH"
sources = ["exploitdb"]
title = "IBM Net.Commerce SQL 注入漏洞"
updated = "2026-06-16T21:54:05.483"

