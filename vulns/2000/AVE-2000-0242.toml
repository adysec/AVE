[basic]
description = "Linux Trustees 1.5 内核补丁存在长路径名处理缺陷，本地攻击者可通过访问包含超长路径名的文件或目录触发该漏洞，导致系统拒绝服务。该漏洞影响 Bray Systems Linux Trustees 1.5 版本，攻击者需要具有本地访问权限，CVSS 评分 2.1，危害等级低。"
published = "2000-04-10T04:00:00.000"
remediation = "升级至 Linux Trustees 1.5.1 或更高版本，该版本已修复长路径名导致的拒绝服务问题。如果无法升级，可在 trustees 配置文件中限制最大路径长度（max_path_len）不超过 256 字符，并避免在受 trustees 保护的目录中使用超长文件名。"
score = 2.1
severity = "LOW"
sources = ["epss"]
title = "Bray Systems Linux Trustees 长路径名拒绝服务漏洞"
updated = "2026-06-16T21:51:22.503"

