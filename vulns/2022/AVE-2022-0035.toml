[basic]
description = "Linux 内核 Mellanox MLX5 网卡驱动 E-Switch 模块中存在锁机制缺陷，mlx5_get_next_phys_dev() 函数在未持有接口锁的情况下被调用，导致在配对不支持链路聚合（LAG）的设备时触发内核告警（WARNING），造成系统拒绝服务。本地攻击者可通过 devlink 命令触发 eswitch 模式切换操作利用该漏洞，影响使用 MLX5 网卡的 Linux 系统。CVSS 评分 5.5，危害等级中危。"
published = "2025-02-26T07:01:10.090"
remediation = "立即升级 Linux 内核至 5.19 或对应的修复版本 5.17.15/5.18.4，其中已合入提交 cdbcdddb8076/3008e6a0049，在 E-Switch offloads 配对时增加 LAG 能力检查，避免在不支持 LAG 的设备上调用 mlx5_get_next_phys_dev() 触发内核 WARNING。如无法立即升级，可暂时关闭 ConnectX 系列的 E-Switch offloads 功能（devlink dev eswitch set pci/<dev> mode legacy）作为临时缓解。"
score = 5.5
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux Kernel mlx5 E-Switch 设备配对时未持有锁拒绝服务漏洞"
updated = "2026-06-17T05:17:44.820"

