[basic]
description = "Microsoft Silverlight 5 及 5 Developer Runtime 在 5.1.20125.0 之前版本中存在双重解引用（Double Dereference）漏洞。该漏洞源于 Silverlight 在渲染 HTML 对象时未能正确验证指针，导致攻击者可以构造恶意的 Silverlight 应用程序，诱使用户访问包含恶意内容的网页，从而触发内存访问错误，最终实现远程代码执行。攻击成功后可完全控制受影响的系统，获取与当前用户相同的权限。该漏洞需要用户交互（如点击链接或打开邮件附件）才能触发，影响安装了 Silverlight 5 的所有 Windows 平台。Microsoft 已在 2013 年 3 月安全更新中修复此漏洞。"
published = "2013-03-13T00:55:01.137"
remediation = "立即安装 Microsoft 安全公告 MS13-022 (KB2814124) 提供的更新，将 Silverlight 升级至 5.1.20125.0 或更高版本。Windows 用户可通过 Microsoft Update 自动获取更新，或从 https://www.microsoft.com/download/details.aspx?familyid=75eef049-1f39-47b4-9a1e-839974fc89b9 手动下载安装。Mac 用户可通过 Silverlight 自动更新功能或下载 Silverlight.dmg 安装。如无法立即打补丁，可通过注册表设置 Silverlight ActiveX 控件 kill bit（CLSID: {DFEAF541-F3E1-4C24-ACAC-99C30715084A}）临时禁用 Silverlight 插件作为缓解措施。"
score = 7.8
severity = "HIGH"
sources = ["kev"]
title = "Microsoft Silverlight 双重解引用远程代码执行漏洞"
updated = "2026-06-16T23:48:44.767"

