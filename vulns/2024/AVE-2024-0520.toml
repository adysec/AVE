[basic]
description = "GNU GRUB2 的 tar 文件系统解析器在处理畸形 tar 文件时存在整数溢出漏洞。当读取 tar 文件时，GRUB2 为文件名分配内部缓冲区，但在分配长度计算过程中未正确校验整数溢出风险。攻击者可通过构造特制的 tar 文件触发分配长度溢出，导致堆越界写入。该漏洞允许具有本地高权限的攻击者绕过 Secure Boot 安全启动保护机制，在系统启动阶段执行任意代码，破坏系统完整性验证链。CVSS 评分 6.7，危害等级中等，影响使用 GRUB2 的多个 Linux 发行版。"
published = "2025-03-03T15:15:14.950"
remediation = "升级 GRUB2 至包含 commit 0087bc69 的版本（如 GRUB 2.12 以上或对应发行版补丁包）。对于 Red Hat 系发行版，安装 RHSA 安全更新；Debian/Ubuntu 运行 `apt update && apt upgrade grub-pc` 后执行 `update-grub`。无法立即升级时，启用 UEFI Secure Boot 并配置 shim 签名验证，限制本地攻击者加载自制 tar 归档的物理访问条件。"
score = 6.7
severity = "MEDIUM"
sources = ["msrc"]
title = "GNU GRUB2 tar文件解析整数溢出导致堆越界写入漏洞"
updated = "2026-06-29T23:16:41.443"

