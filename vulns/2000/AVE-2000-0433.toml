[basic]
description = "dump 软件包中的 restore 恢复程序（版本 0.4b17 及更早）存在缓冲区溢出漏洞。本地攻击者可向 restore 程序传递超长的磁带名称参数，触发栈缓冲区溢出，从而劫持程序执行流，以运行 restore 的权限执行任意命令。该漏洞影响使用 dump/restore 工具的 Linux/Unix 系统，CVSS 评分 7.2，危害等级高危。建议升级至最新版本或应用厂商提供的补丁。"
published = "2000-06-07T04:00:00.000"
remediation = "升级 dump 软件包至 0.4b18 或更高版本，该版本已修复 restore 程序中 tape name 参数长度检查不严导致的缓冲区溢出。如无法升级，可通过限制本地用户对 restore 的 suid 执行权限作为临时缓解。"
score = 7.2
severity = "HIGH"
sources = ["exploitdb"]
title = "dump restore 缓冲区溢出漏洞"
updated = "2026-06-16T21:51:54.720"

