[info]
author = "AVE"
description = "Microsoft Internet Explorer 4.0/5.0 中 Preloader ActiveX 控件（preload.cab）允许远程攻击者通过构造恶意网页读取受害者系统上的任意文件"
id = "POC-AVE-1999-0716"
name = "CVE-1999-0917 PoC"
severity = "medium"
tags = [
    "cve-1999-0917",
    "ave-1999-0716",
]
vuln_id = [
    "CVE-1999-0917",
    "AVE-1999-0716",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["Preloader"]
