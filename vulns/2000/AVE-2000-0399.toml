[basic]
description = "xterm、Eterm 和 rxvt 等终端模拟器在处理转义序列时存在拒绝服务漏洞。攻击者可通过向目标终端中嵌入特制的窗口大小调整转义字符，强制终端窗口反复调整大小，导致大量内存消耗，最终使系统资源耗尽而拒绝服务。该漏洞影响 XFree86 X11R6 3.3.3/4.0 及 Eterm 0.8.10、rxvt 2.6.1 等版本，攻击者无需身份认证即可远程触发，CVSS 评分 5.0，危害等级中等。由于受影响软件已停止维护，建议用户升级至替代终端模拟器或应用相关发行版的安全补丁。"
published = "2000-06-01T04:00:00.000"
remediation = "升级 xterm 至 4.0 以上版本、Eterm 至 0.9 以上版本、rxvt 至 2.7.0 以上版本，或替换为现代终端模拟器（如 GNOME Terminal、Konsole）。如无法升级，可在终端配置中禁用窗口大小变化的转义序列处理，或通过 iptables 限制对受影响服务的远程访问作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "XFree86 xterm/Eterm/rxvt 转义序列拒绝服务漏洞"
updated = "2026-06-16T21:51:48.990"

