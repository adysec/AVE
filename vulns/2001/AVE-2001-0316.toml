[basic]
description = 'Microsoft Internet Explorer 5.5 和 6.0 版本存在 Cookie 处理漏洞（又称"First Cookie Handling Vulnerability"）。该漏洞原理在于浏览器对 `about:` 协议 URL 中的 JavaScript 执行缺乏适当的安全隔离，攻击者可构造包含恶意 JavaScript 代码的 `about:` URL，绕过同源策略限制，从而读取或篡改用户的 Cookie 信息。攻击条件为：受害者使用受影响版本的 Internet Explorer 浏览器访问攻击者精心构造的恶意网页或链接，无需任何身份认证即可触发。利用方式是通过嵌入 `about:` URL 的 JavaScript 脚本访问其他域名的 Cookie 数据，导致敏感会话信息泄露或会话劫持。该漏洞 CVSS 评分 6.4，影响 Internet Explorer 5.5 和 6.0 版本，属于中等危害等级的安全缺陷。'
published = "2001-12-06T05:00:00.000"
remediation = '升级至 Internet Explorer 6.0 SP1 或更高版本，该补丁已包含在 IE 6.0 SP1 安全更新中。如仍在使用 IE 5.5，建议直接迁移至 IE 6.0 SP1 或更新的现代浏览器（如 Microsoft Edge、Google Chrome、Mozilla Firefox）。作为临时缓解措施，可在 Internet 选项 → 安全 → Internet 区域中将 JavaScript 禁用或设置为"提示"，并启用"检查网站服务器证书吊销"及受限制的安全区域策略。'
score = 6.4
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Microsoft Internet Explorer 5/6 Cookie泄露与修改漏洞"
updated = "2026-06-16T21:54:50.227"

