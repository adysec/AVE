[basic]
description = "nph-publish 1.2 之前版本存在目录遍历漏洞，远程攻击者可在上传操作的文件路径名中使用 ..（点点）序列实现目录跳转，从而覆盖服务器上任意文件。该漏洞利用条件简单，无需身份认证，攻击者仅需构造特制的上传请求即可触发，可能导致 Web 服务文件被篡改或恶意文件写入，影响系统完整性和可用性。"
published = "1999-12-31T05:00:00.000"
remediation = "立即将 nph-publish 升级到 1.2 及以上版本，该版本已修复路径遍历问题。如无法升级，应在服务器端对上传路径参数进行严格过滤，拒绝包含 `..` 的路径字符串，并将上传目录限制在非 Web 可访问的独立目录中。建议迁移至仍在维护的 Web 服务器软件作为最终解决方案。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "nph-publish 目录遍历任意文件写入漏洞"
updated = "2026-06-16T21:49:52.990"

