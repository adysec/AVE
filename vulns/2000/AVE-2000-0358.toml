[basic]
description = "Linux 系统中 fdmount 工具存在本地缓冲区溢出漏洞，该工具用于挂载软盘设备且允许 floppy 组成员使用。当 fdmount 处理超长的 mountpoint 参数时，可触发栈缓冲区溢出，导致攻击者能够覆盖返回地址并执行任意代码。该漏洞影响 S.u.S.E Linux 4.x/5.x/6.x/7.0、Slackware 3.x/4.0、Turbolinux 6 及 OpenLinux 7.0 等多个发行版本。本地攻击者只需获取 floppy 组成员权限，传入特制的长参数即可利用此漏洞实现权限提升至 root。"
published = "2000-05-22T04:00:00.000"
remediation = "建议立即移除 fdmount 的 setuid 权限：`chmod u-s /usr/bin/fdmount`；或彻底卸载 fdmount 软件包。对于受影响的老旧发行版（SuSE/Slackware/Turbolinux 等），建议升级至不受影响的版本或改用现代发行版。如业务必须使用 fdmount，应限制仅可信用户加入 floppy 组。"
score = 7.2
severity = "HIGH"
sources = ["exploitdb"]
title = "多款Linux发行版 fdmount 本地缓冲区溢出漏洞"
updated = "2026-06-16T21:51:44.043"

