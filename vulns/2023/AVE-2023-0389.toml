[basic]
description = "Linux 内核 habanalabs 加速器驱动中存在内存泄漏漏洞（CWE-401），当用户映射（user_mapping）被捕获后立即打开新上下文且执行硬重置时，驱动程序在清除用户映射信息过程中未能正确释放已分配的内存，导致内存泄漏。本地攻击者可通过多次触发该操作序列耗尽系统内存资源，造成拒绝服务（DoS）。该漏洞影响 Linux 内核中 accel/habanalabs 模块，CVSS 评分 5.5，危害等级中等。"
published = "2025-09-17T15:15:41.100"
remediation = "将 Linux 内核升级至 6.4.12 或更高版本（6.5+），该漏洞已在 6.4.12 稳定版中修复。如无法立即升级，可 cherry-pick 提交 314a7ffd7c19 或 973e0890e526 至受影响内核，该补丁修复了 habanalabs 驱动中 user_mappings 上下文切换时未释放内存导致泄漏的问题。"
score = 5.5
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux kernel habanalabs 驱动内存泄漏漏洞"
updated = "2026-06-17T06:45:07.103"

