[basic]
description = "Linux 内核 i.MX6QDL 平台的 PCI imx6 驱动程序中存在挂起/恢复功能缺陷，在挂起后恢复时未能正确重置连接的 PCIe 设备，导致设备无法从 D3hot 状态切换回 D0 状态，触发内核崩溃。本地低权限攻击者可通过连接特定 PCIe 设备（如 ath10k 或 iwlwifi 无线网卡）并触发挂起/恢复操作，造成系统拒绝服务。该漏洞影响使用 i.MX6QDL 处理器的 Linux 系统，CVSS 评分 5.5，危害等级中危。"
published = "2025-01-11T14:15:25.080"
remediation = "升级 Linux 内核至 6.12.4 或 6.13 及以上版本，对应提交为 ac43ea3d27a8 和 0a726f542d7c。Ubuntu 24.04 LTS 用户可通过 `sudo apt update && sudo apt install linux-image-6.11.0-1011-lowlatency` 安装 USN-7381-1 更新后重启。若无法立即升级，避免在 i.MX6QDL 设备上执行 suspend/resume 操作，或临时禁用 PCIe 设备作为缓解措施。"
score = 5.5
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux 内核 NXP i.MX6QDL PCI 挂起恢复功能拒绝服务漏洞"
updated = "2026-06-17T08:14:04.797"

