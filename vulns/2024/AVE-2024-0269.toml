[basic]
description = "同享人力资源管理系统 MobileService/Web/Handler/hdlUploadFile.ashx 接口存在文件上传漏洞，攻击者可通过路径遍历（如 puser=../../../Style/rce）绕过目录限制，结合 multipart 表单上传恶意文件至服务器任意目录，最终实现远程代码执行。该漏洞影响同享人力资源管理系统多个版本，攻击者无需身份认证即可利用，危害严重。"
published = "0812"
remediation = "立即联系同享科技获取官方补丁或升级至最新版本。临时缓解措施：在 IIS 中配置请求过滤规则，禁止对 /MobileService/Web/Handler/hdlUploadFile.ashx 的 POST 请求中携带路径遍历字符（../），并在 Web 应用防火墙（WAF）层面拦截 multipart 文件上传请求中文件名包含路径遍历的恶意载荷。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "同享 人力资源管理系统 hdlUploadFile.ashx 文件上传漏洞"
updated = "0812"

