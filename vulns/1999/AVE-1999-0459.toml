[basic]
description = "Sun Solaris 2.5.1 系统的 Telnet 服务存在控制字符处理缺陷，未经身份认证的远程攻击者可通过向目标 Telnet 服务发送 Ctrl+D（^D）控制字符触发该漏洞，导致 Telnet 服务进程崩溃，造成拒绝服务。该漏洞攻击复杂度低、无需任何权限，影响 Solaris 2.5.1（SunOS 5.5.1）版本，CVSS 评分 5.0，危害等级中等。"
published = "1998-01-01T05:00:00.000"
remediation = "升级 Oracle Solaris 至受支持的版本（Solaris 10 及以上），或迁移至基于 illumos 的发行版（如 OpenIndiana）。升级后默认使用 SSH 替代 telnet 进行远程管理；若仍需使用 telnet，可在 /etc/inetd.conf 中注释 telnet 行后重启 inetd 以禁用该服务，并通过 /etc/hosts.allow 限制仅允许可信 IP 访问。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Sun Solaris 2.5.1 Telnet 拒绝服务漏洞"
updated = "2026-06-16T21:48:02.973"

