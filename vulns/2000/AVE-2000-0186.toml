[basic]
description = "Windows Media Services 4.0/4.1 的握手过程存在序列验证缺陷，远程攻击者无需身份认证即可向目标服务器发送精心构造的异常顺序握手数据包，触发服务处理逻辑混乱，导致 Windows Media 服务进程崩溃或停止响应，造成拒绝服务。该漏洞影响运行 Windows Media Services 4.0 及 4.1 版本的 Windows NT 4.0 和 Windows 2000 系统，CVSS 评分 5.0，危害等级中危。"
published = "2000-02-23"
remediation = "安装 Microsoft 安全公告 MS00-013 提供的补丁程序。由于 Windows Media Services 4.0/4.1 已停止支持，建议升级到受支持的 Windows Server 版本。临时缓解措施可在防火墙层限制对 Windows Media 服务端口 1755/TCP 及 UDP 的访问。"
score = 5.0
severity = "MEDIUM"
sources = [
    "cve",
    "avd",
]
title = "Microsoft Windows Media Services 远程拒绝服务漏洞"
updated = "2026-06-16"

