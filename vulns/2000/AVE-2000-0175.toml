[basic]
description = "Atrium Software Mercur Mail Server 3.2 的 POP3 和 IMAP 邮件服务组件中存在多个缓冲区溢出漏洞。未经身份认证的远程攻击者可通过向目标服务器的 POP3 或 IMAP 端口发送特制的大量数据触发缓冲区溢出，导致服务进程崩溃，造成拒绝服务。该漏洞影响 Mercur Mail Server 3.2 版本，CVSS 评分 5.0，危害等级中危。"
published = "2000-03-15T05:00:00.000"
remediation = "建议立即升级至 MERCUR Mail Server 4.0 或更高版本（如仍可获得），该版本修复了 POP3 和 IMAP 服务中的缓冲区溢出问题。由于 Atrium Software 已停止运营，该产品已停止维护，建议迁移至其他受支持的邮件服务器软件（如 hMailServer、Dovecot 等）。作为临时缓解措施，可在防火墙限制对 TCP 端口 110（POP3）和 143（IMAP）的访问，仅允许受信任的内网 IP 连接。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Atrium Software Mercur Mail Server 3.2 POP3和IMAP服务器缓冲区溢出漏洞"
updated = "2026-06-16T21:51:12.360"

