[basic]
description = "帆软报表系统的 `dbcommit` 接口存在反序列化代码执行漏洞，攻击者无需身份认证即可通过精心构造的 HTTP 请求向目标服务器发送恶意序列化数据，触发 Java 反序列化过程，导致远程代码执行。该漏洞影响帆软报表多个版本，攻击者可借此获取服务器权限，安装后门或窃取敏感数据，危害严重。"
published = "0723"
remediation = "立即升级帆软 FineReport 至最新稳定版本（v11.5 及以上），该版本已修复 dbcommit 相关反序列化代码执行漏洞；如无法立即升级，可在系统层面通过防火墙/ACL 限制只允许可信 IP 访问报表管理后台（默认端口 8075/8080），并关闭不必要的远程数据库连接功能。同时建议在部署时配置 web.xml 添加权限校验过滤器，防止未授权调用 dbcommit 相关接口。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "帆软 帆软报表 dbcommit代码执行漏洞"
updated = "0723"

