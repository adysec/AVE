[basic]
description = "rdist 远程文件分发工具的 lookup() 函数存在缓冲区溢出漏洞，本地攻击者可利用该漏洞通过向受影响系统提交特制请求触发缓冲区溢出，从而获取 root 权限。该漏洞影响 FreeBSD 2.1、BSDI BSD/OS 2.1、IBM AIX 4.2、SGI IRIX 6.4 及 Sun SunOS 4.1.3 等多个操作系统版本，CVSS 评分 7.2，危害等级为高危。"
published = "1996-07-24T04:00:00.000"
remediation = "升级 rdist 到 6.1.5 或更高版本（各厂商已发布对应安全补丁），或改用 rsync 替代 rdist 进行远程文件分发，以消除缓冲区溢出风险。如无法升级，建议限制受影响系统上 rdist 的 SUID 权限并监控异常提权行为。"
score = 7.2
severity = "HIGH"
sources = ["epss"]
title = "FreeBSD rdist 缓冲区溢出漏洞"
updated = "2026-06-16T21:47:22.417"

