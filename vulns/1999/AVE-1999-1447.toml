[basic]
description = "nlog CGI 脚本未对 IP 地址参数中的 shell 元字符进行有效过滤，存在操作系统命令注入漏洞。远程攻击者可通过向 nlog-smb.pl 或 rpc-nlog.pl 脚本发送特制请求注入恶意命令，在服务器上以 Web 权限执行任意系统命令。此漏洞影响使用 nlog CGI 脚本的配置环境，攻击无需认证，利用难度较低，可导致敏感信息泄露或服务器被控制。"
published = "1998-12-25T05:00:00.000"
remediation = "nlog 软件已停止维护，无官方补丁。建议立即从 Web 服务器 CGI 目录中移除 nlog-smb.pl 和 rpc-nlog.pl 两个脚本，或通过 Web 服务器（Apache/Nginx）访问控制规则禁止外部请求访问这两个 CGI 脚本。如需临时保留使用，必须修改脚本源码，在将 IP 地址参数传入 shell 命令前使用 Perl 的 quotemeta 函数或正则替换过滤 shell 元字符（; | & ` $() 等），禁止直接拼接用户输入到 system/exec 等系统命令调用中。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "nlog CGI脚本系统命令注入漏洞"
updated = "2026-06-16T21:50:05.807"

