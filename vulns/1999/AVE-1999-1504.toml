[basic]
description = "AnswerBook2 (AB2) Web 服务器 dwhttpd 3.1a4 存在格式化字符串漏洞。远程攻击者无需认证即可向目标系统发送包含编码 % 字符的恶意 HTTP 请求，触发服务器日志记录功能的格式化字符串处理缺陷，进而导致拒绝服务，在特定条件下可能执行任意命令。该漏洞影响 Sun AnswerBook2 3.1a4 及更早版本，CVSS 评分 7.5，危害等级高危。"
published = "1998-08-23"
remediation = "升级 AnswerBook2（dwhttpd）至 3.1 以上已修复版本，或安装 Sun 提供的对应 Solaris 安全补丁。若产品已停止维护，应立即停止 AnswerBook2 服务并禁用相关端口（默认 TCP 8888），在防火墙上限制对该端口的访问。建议迁移至现代文档服务器方案替代 AnswerBook2。"
score = 7.5
severity = "HIGH"
sources = [
    "cve",
    "epss",
]
title = "Sun AnswerBook2 dwhttpd 格式化字符串漏洞"
updated = "2026-06-16"

