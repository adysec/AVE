[basic]
description = "Cisco 7xx 系列路由器 Telnet 服务存在缓冲区溢出漏洞，未经身份认证的远程攻击者可通过向目标设备 Telnet 端口发送特制超长数据触发缓冲区溢出，导致服务崩溃或任意代码执行。该漏洞影响 Cisco 7xx 系列路由器等设备，CVSS 评分 5.0，危害等级中危。Cisco 官方已发布修复建议，建议用户升级固件或禁用 Telnet 服务。"
published = "1997-12-15T05:00:00.000"
remediation = "建议升级 Cisco IOS 至不受影响的版本，或在路由器配置中禁用 Telnet 服务（使用 `no service telnet` 命令），改用 SSH 进行远程管理。如无法立即升级，可在网络访问控制列表（ACL）中限制 Telnet 端口的源地址访问范围作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Cisco 7xx路由器 Telnet 缓冲区溢出漏洞"
updated = "2026-06-16T21:47:57.653"

