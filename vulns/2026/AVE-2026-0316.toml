[basic]
description = 'Mint HTTP/1 客户端在解析 Content-Length 响应头时，使用 Integer.parse/1 函数处理头部值，该函数允许可选的 "+" 或 "-" 符号前缀。虽然长度 ≥0 的检查排除了负数，但 "+0"、"+123" 等输入仍被当作有效长度值处理，违反了 RFC 7230 规定的 Content-Length 必须为纯数字的规范。当客户端通过严格遵守 RFC 的前置代理或负载均衡器复用连接时，代理与 Mint 对响应帧的解析不一致，导致响应走私攻击：攻击者控制的恶意上游服务器可在共享连接上向其他消费者的响应流中注入数据。该漏洞影响 Mint 0.1.0 至 1.9.0 之前的所有版本，CVSS 评分 6.3，危害等级中危。官方已在 1.9.0 版本中通过修复 Content-Length 解析逻辑完成修复。'
published = "2026-06-02T16:16:44.777"
remediation = "立即将 Mint 升级至 1.9.0 或更高版本（`mix deps.update mint`），该版本已修复 Content-Length 解析器对 `+` 前缀的宽松处理。如无法升级，可在上游代理/负载均衡层配置规则拒绝 `Content-Length` 值含非数字字符的请求，并避免跨信任域复用同一 Mint 连接池。"
score = 6.3
severity = "MEDIUM"
sources = ["ghsa"]
title = "elixir-mint Mint HTTP/1 客户端 HTTP 响应走私漏洞"
updated = "2026-07-22T19:10:00.120"

