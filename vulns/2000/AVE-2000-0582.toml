[basic]
description = "vqSoft vqServer 1.4.49 存在缓冲区溢出漏洞，远程攻击者可通过向服务器发送超长 HTTP GET 请求触发该漏洞，导致服务崩溃（拒绝服务）或可能获取系统权限。该漏洞影响 vqServer 1.4.49 版本，CVSS 评分 7.5，危害等级高。攻击无需身份认证，利用难度较低，已有公开 PoC 代码可用。"
published = "2000-10-20T04:00:00.000"
remediation = "vqServer 1.4.49 已停止维护，厂商不再提供安全更新。建议立即停止使用 vqServer 并将服务迁移至受支持的替代产品（如 Apache HTTP Server 或 Nginx），同时在防火墙层面限制对 vqServer 端口的访问来源，仅允许可信 IP 连接以降低攻击面。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "vqSoft vqServer 1.4.49 缓冲区溢出拒绝服务漏洞"
updated = "2026-06-16T21:52:26.197"

