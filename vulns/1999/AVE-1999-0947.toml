[basic]
description = "Windows 95 在启用 NetWare 网络的远程管理和文件共享功能后，当管理员远程登录系统时会自动创建隐藏的 C$ 共享，远程攻击者可通过映射网络驱动器的方式访问该共享，从而读取目标系统上的任意文件。该漏洞影响 Windows 95 操作系统，CVSS 评分 5.0，危害等级中等。攻击者无需身份认证即可利用该漏洞，但需要管理员已远程登录过目标系统。"
published = "1999-12-31T05:00:00.000"
remediation = 'Windows 95 已停止支持且无官方补丁，建议立即升级至受支持版本的 Windows（如 Windows 10/11）。如无法升级，请禁用"NetWare 网络远程管理与文件共享"功能：控制面板 → 网络 → 服务中移除该组件；同时在防火墙中禁止 TCP 139/445 端口入站连接，并限制管理员远程登录权限。'
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Microsoft Windows 95 Remote Administration 任意文件读取漏洞"
updated = "2026-06-16T21:49:43.947"

