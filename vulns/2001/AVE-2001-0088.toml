[basic]
description = "PALS Library System WebPALS 1.0 的 pals-cgi 程序存在任意命令执行漏洞，远程攻击者可通过向 documentName 参数注入 shell 元字符（如管道符、分号等）触发该漏洞，导致在服务器上以 Web 进程权限执行任意系统命令。该漏洞影响 WebPALS 1.0 版本，攻击者无需身份认证即可利用，CVSS 评分 7.5，危害等级高。"
published = "2001-06-02T04:00:00.000"
remediation = "建议立即升级到 PALS 官方发布的最新版本（WebPALS 1.0 之后版本），或迁移至其他受支持的图书馆管理系统。如无法升级，需在 Web 服务器层面对 pals-cgi 脚本的 documentName 参数进行严格输入过滤，禁止传入 `|` `;` `$()` `` ` `` 等 shell 元字符，并在 Web 应用防火墙（WAF）中添加规则拦截包含 shell 特殊字符的请求，同时限制 pals-cgi 的访问来源 IP 范围作为临时缓解措施。"
score = 7.5
severity = "HIGH"
sources = ["exploitdb"]
title = "PALS Library System WebPALS 1.0 pals-cgi 任意命令执行漏洞"
updated = "2026-06-16T21:53:53.993"

