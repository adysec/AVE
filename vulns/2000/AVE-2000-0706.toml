[basic]
description = "Citrix MetaFrame 1.0 及 1.8 版本中的 ICA（独立计算架构）协议使用 XOR 弱加密算法对用户认证数据进行加密，由于 XOR 加密极易被逆向破解，处于同一网络中的攻击者可通过嗅探网络流量截获认证会话并还原明文凭据，进而获取系统未授权访问权限。该漏洞影响 Citrix MetaFrame 1.0 和 1.8 版本，建议升级或启用替代加密方案。"
published = "2000-03-29T05:00:00.000"
remediation = "升级至 Citrix Metaframe 1.8 以上版本，ICA 协议在后续版本中改用 RC5 加密替代 XOR。如无法升级，在 Citrix 服务器上启用 SSL/TLS 中继（Secure ICA），强制客户端通过 TLS 加密通道连接，并在服务器防火墙中限制仅允许受信 IP 访问 ICA 端口 1494。"
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "Citrix Metaframe ICA协议弱加密漏洞"
updated = "2026-06-16T21:51:18.517"

