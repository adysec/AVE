[basic]
description = "HP-UX 11.0 系统中 SNMP 守护进程（snmpd）的配置文件 snmpd.conf 权限设置不当，被设置为全局可写，导致本地攻击者能够修改 SNMP 配置，进而可能窃取 SNMP 通信数据或提升权限至更高等级。该漏洞影响 HP-UX 10.20 及 11.0 版本，本地用户只需拥有系统访问权限即可利用此漏洞进行权限提升或配置篡改，造成敏感信息泄露和系统控制权丧失。"
published = "2000-06-07"
remediation = "将 snmpd.conf 文件权限修复为仅 root 可读写（chmod 600 /etc/snmpd.conf），并确认文件所有者 root。同时升级至 HP 官方补丁或更高版本，或迁移至受支持的操作系统版本。同时检查系统日志有无非授权用户修改该文件的记录。"
score = 10
severity = "CRITICAL"
sources = ["cve"]
title = "HP-UX SNMP 守护进程 snmpd.conf 配置文件权限设置不当漏洞"
updated = "2026-06-16"

