[basic]
description = "华测监测预警系统2.2的sysGroupEdit.aspx页面存在SQL注入漏洞。该系统未对用户传入的id参数进行有效的过滤与转义处理，攻击者可在未经身份认证的情况下，通过向id参数拼接恶意SQL语句（如UNION ALL SELECT）获取后端数据库中的敏感信息。攻击者使用GET请求即可直接触发该漏洞，利用难度低，可导致数据泄露，危害较大。"
published = "0701"
remediation = "对 sysGroupEdit.aspx 页面的 id 参数实施参数化查询或预编译 SQL 语句，禁止直接拼接用户输入。在 Web 应用防火墙（WAF）侧添加规则拦截包含 UNION、SELECT、CHAR 等 SQL 关键字的请求。联系华测厂商获取官方安全更新，或对 id 参数做严格的白名单校验（仅允许数字）。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "华测监测预警系统2.2 SQL注入漏洞"
updated = "0701"

