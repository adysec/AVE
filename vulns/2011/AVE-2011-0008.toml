[basic]
description = 'Chyrp 2.0 及更早版本的 includes/lib/gz.php 文件存在目录遍历漏洞。该脚本在处理 file 参数时未对用户输入进行充分过滤与校验，导致远程攻击者可在参数中插入".."(点号点号)序列跳出网站根目录限制。攻击者在无需身份认证的情况下，仅需向目标服务器发送包含恶意路径的 HTTP 请求，即可读取服务器上的任意文件，如配置文件、源代码或敏感系统文件等，进而造成信息泄露。该漏洞影响所有运行 Chyrp 2.0 及之前版本且未打补丁的站点，利用方式简单，仅需构造包含目录遍历序列的 URL 即可触发。'
published = "2011-07-19T21:55:00.837"
remediation = "建议升级 Chyrp 至 2.1 及以上版本（官方已修复该目录遍历漏洞），或手动修复 includes/lib/gz.php 中的 file 参数过滤逻辑，增加路径规范化与目录遍历防护（如使用 realpath 验证路径是否在允许目录内）。临时缓解可在 Web 服务器层面配置规则拦截包含 ../ 的 file 参数请求。"
score = 5
severity = "MEDIUM"
sources = ["nuclei"]
title = "Chyrp 2.x gz.php 文件参数目录遍历任意文件读取漏洞"
updated = "2026-06-16T23:31:59.280"

