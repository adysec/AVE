[basic]
description = "SCO Unixware 7.0 自带的 SCOhelp HTTP 服务器中 search97.cgi CGI 脚本存在格式字符串漏洞。远程攻击者无需身份认证，通过向 queryText 参数传入特制的格式字符串标记（如 %s、%n），即可触发该漏洞，导致攻击者能够在目标系统上执行任意命令。由于该服务通常以高权限运行，成功利用可造成服务器完全失陷，危害严重。该漏洞影响 SCO Unixware 7.0 版本。目前厂商已停止支持，建议用户升级至受支持的操作系统或迁移至替代方案。"
published = "2000-12-11T05:00:00.000"
remediation = "立即停止使用 SCOhelp HTTP 服务，删除或移走 search97.cgi 脚本以防止远程利用。如业务必需该服务，建议升级到 SCO 官方发布的安全补丁版本，并在 Web 服务器层面限制对 search97.cgi 的访问来源 IP。由于 Unixware 7.0 已停止支持，强烈建议迁移至受支持的操作系统。同时，在防火墙上封禁对该服务的 80/443 端口外部访问，减少暴露面。"
score = 7.5
severity = "HIGH"
sources = ["exploitdb"]
title = "SCO Unixware SCOhelp HTTP Server 格式字符串远程代码执行漏洞"
updated = "2026-06-16T21:52:58.420"

