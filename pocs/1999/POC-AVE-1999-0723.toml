[info]
author = "AVE"
description = "检测 ColdFusion Server 4.0 是否暴露可运行示例代码文件，攻击者可利用这些文件读取服务器文件、发起拒绝服务或作为 HTTP 代理"
id = "POC-AVE-1999-0723"
name = "Allaire ColdFusion Server 4.0 示例代码远程访问漏洞 PoC"
severity = "high"
tags = ["ave-1999-0723"]
vuln_id = [
    "CVE-1999-0923",
    "AVE-1999-0723",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/cfdocs/viewexample.cfm"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "ColdFusion",
    "cfml",
    "cfoutput",
    "cfscript",
]

[[poc.requests]]
method = "GET"
path = "/cfdocs/exampleapp/"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "ColdFusion",
    "cfml",
    "cfoutput",
    "cfscript",
]

[[poc.requests]]
method = "GET"
path = "/CFIDE/exampleapp/"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "ColdFusion",
    "cfml",
    "cfoutput",
    "cfscript",
]
