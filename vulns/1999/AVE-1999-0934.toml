[basic]
description = "UNIX 系统中的新闻阅读器 tin 和 rtin 在创建 /tmp/.tin_log 日志文件时使用了不安全的文件权限，并且程序会跟随符号链接进行操作。本地攻击者可通过创建指向目标文件的符号链接，诱导 tin/rtin 将日志写入该链接指向的文件，从而修改用户可写文件的权限。该漏洞影响多种 UNIX 系统，攻击者需具备本地访问权限，利用难度较低。"
published = "2002-01-15T05:00:00.000"
remediation = "升级 tin/rtin 至 1.4 及以上版本，该版本已修复符号链接跟随问题。如无法升级，确保 /tmp 目录设置了粘滞位（chmod +t /tmp），并移除已存在的 /tmp/.tin_log 文件。建议使用 `mktemp` 替代固定临时文件路径。作为临时缓解，可限制受影响用户对 /tmp/.tin_log 的写入权限。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "UNIX tin和rtin新闻阅读器 符号链接权限漏洞"
updated = "2026-06-16T21:49:42.177"

