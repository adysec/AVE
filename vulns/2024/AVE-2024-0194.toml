[basic]
description = '中兴（ZTE）ZSR V2 系列多业务路由器存在任意文件读取漏洞。该漏洞源于设备 Web 管理界面的静态资源处理接口（/css/）未对用户输入的路径做充分的规范化与越权校验，攻击者可构造包含"../"序列的特制 URL（如 GET /css//../../../../../../../../etc/passwd）实施路径遍历，绕过目录限制读取设备上的任意文件。影响范围为启用了 Web 管理服务的 ZTE ZSR V2 系列多业务路由器，未经身份认证的远程攻击者只需能访问设备 Web 端口（通常为 TCP 80/443），即可通过网络发送恶意 HTTP 请求读取系统敏感文件（如 /etc/passwd、配置文件、密钥等），可能导致设备凭据与配置信息泄露，进而被用于进一步攻击。'
published = "0830"
remediation = "建议将中兴 ZTE ZSR V2 系列路由器固件升级至厂商发布的安全修复版本（详见中兴官网安全公告并按设备型号下载对应版本刷入）。如暂无法升级，可在设备 ACL 或防火墙层面限制 Web 管理接口的源 IP 访问，并关闭公网对 80/443 端口的暴露，临时缓解任意文件读取风险。"
score = 5
