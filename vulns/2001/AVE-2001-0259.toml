[basic]
description = "KDE 1.x 中集成的文件管理器 KFM 在 /tmp 缓存目录下以不安全方式创建临时文件（.tmp），本地攻击者可利用符号链接（symlink）攻击，在 KFM 创建临时文件前预先建立指向目标文件的符号链接，从而劫持文件写入操作，实现权限提升。该漏洞影响 SuSE 7.0 等使用 KDE 1.x 的系统，攻击者需拥有本地账户权限，CVSS 评分 4.6，危害等级中危。"
published = "2001-08-02T04:00:00.000"
remediation = "升级 KDE 至 2.0 及以上版本（KFM 在 KDE 2.0 中已修复此问题），或升级 SuSE Linux 至 7.1 及以上版本。临时缓解措施：手动删除 /tmp/kfm-cache-* 目录并以 root 执行 `chmod 700 /tmp/kfm-cache-*` 限制目录权限，或移除 kfm 二进制文件的 setuid 位（`chmod u-s /opt/kde/bin/kfm`）。"
score = 4.6
severity = "MEDIUM"
sources = ["exploitdb"]
title = "KDE KFM 临时文件符号链接漏洞"
updated = "2026-06-16T21:54:37.737"

