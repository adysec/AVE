[basic]
description = "ypbind 3.3 的日志记录函数存在格式化字符串漏洞，当以调试模式运行时，未经身份认证的远程攻击者可通过向 ypbind 服务发送特制的格式化字符串，导致文件描述符泄露，进而造成拒绝服务。该漏洞影响 SuSE Linux 6.2/6.3/6.4/7.0 等版本，CVSS 评分 10.0，危害等级严重。建议升级至最新版本或禁用调试模式以缓解风险。"
published = "2000-12-11T05:00:00.000"
remediation = "升级 ypbind 至 3.3 以上已修复版本。各发行版对应操作：Red Hat Linux 升级至 RHSA-2000:086 提供的更新包；Debian GNU/Linux 安装 2000-10-14 发布的 ypbind 安全更新；SuSE Linux 6.2-7.0 用户安装 SuSE 安全公告 2000-Q4-0262 提供的修补包；Mandrake Linux 安装 MDKSA-2000:064 更新。如无法升级，在 ypbind 启动参数中去掉 -debug 标志以禁用调试模式，并在防火墙上限制对 ypbind 端口（默认 32768/65511 UDP）的访问。"
score = 10
severity = "CRITICAL"
sources = ["redhat"]
title = "SuSE Linux ypbind 日志记录格式化字符串拒绝服务漏洞"
updated = "2026-06-16T21:53:01.743"

