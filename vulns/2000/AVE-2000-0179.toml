[basic]
description = "Trend Micro OfficeScan 3.5 的 tmlisten.exe 组件存在输入验证缺陷，远程攻击者可通过向 12345 端口发送特制的畸形数据包，触发该组件异常崩溃，导致拒绝服务。该漏洞影响 OfficeScan 3.5 版本，攻击者无需认证即可远程利用，危害等级中危。"
published = "2000-02-28T05:00:00.000"
remediation = "立即安装 Trend Micro 官方提供的 OfficeScan 3.5 补丁（下载地址 http://www.antivirus.com/download/ofce_patch_35.htm）。建议升级到不再使用 tmlisten.exe 的受支持版本（如 Apex One）。若无法立即升级，在防火墙上阻断外部对 TCP 端口 12345 的访问作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Trend Micro OfficeScan 3.5 tmlisten.exe 远程拒绝服务漏洞"
updated = "2026-06-16T21:51:12.990"

