[basic]
description = "Novell NetWare 操作系统中集成的 Novell-HTTP-Server 及第三方 YAWN Web 服务器存在拒绝服务漏洞。远程攻击者无需认证即可通过向服务器发送大量 HTTP GET 请求，耗尽服务器连接池与处理资源，导致服务器无法响应合法用户请求，造成服务中断。该漏洞利用方式简单，攻击门槛极低，属于典型的资源耗尽型 DoS 攻击。"
published = "1999-06-16"
remediation = "升级 Novell NetWare 至厂商修复版本或安装最新补丁。对于已停止维护的旧版本，建议在网络边界部署反向代理或 Web 应用防火墙（WAF），配置请求速率限制（rate limiting）和连接数阈值，限制单个 IP 的并发连接数及每秒请求数，以缓解大量 HTTP GET 请求导致的资源耗尽攻击。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Novell NetWare HTTP Server 拒绝服务漏洞"
updated = "2026-06-16"

