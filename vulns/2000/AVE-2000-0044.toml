[basic]
description = "Linuxconf 1.1.6 r10 存在远程缓冲区溢出漏洞，未经身份认证的远程攻击者可通过向运行 Linuxconf 服务的系统发送特制的超长参数，触发缓冲区溢出，进而导致任意代码执行并可获取 root 权限。该漏洞 CVSS 评分 10.0，危害等级严重，影响使用 Linuxconf 1.1.6 r10 的 Linux 发行版。目前暂无官方补丁，建议禁用该服务或升级至更高版本。"
published = "1999-12-21T05:00:00.000"
remediation = "立即升级 Linuxconf 至 1.1.6 r11 及以上版本，或在 Red Hat 系统上应用当时发布的对应安全补丁。由于 Linuxconf 已停止维护，建议彻底移除 linuxconf 软件包（rpm -e linuxconf），改用 Webmin 或 Cockpit 等现代系统管理工具。如无法移除，应在 iptables 防火墙中限制仅信任 IP 可访问 linuxconf 端口（默认 TCP 99）。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "Linux linuxconf 远程缓冲区溢出漏洞"
updated = "2026-06-16T21:50:49.870"

