[info]
author = "AVE"
description = "向 OmniHTTPd 服务器的 /cgi-bin/imagemap.exe 发送超长 GET 请求，触发缓冲区溢出，验证漏洞存在。参考 ExploitDB 19566 公开利用。"
id = "POC-AVE-1999-1409"
name = "Omnicron OmniHTTPd CGI imagemap.exe 远程缓冲区溢出 PoC"
severity = "critical"
tags = ["ave-1999-1409"]
vuln_id = [
    "CVE-1999-0951",
    "AVE-1999-1409",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/cgi-bin/imagemap.exe"
protocol = "http"

[poc.requests.body]
content = ""
type = "raw"

[poc.requests.headers]
User-Agent = "AVE/1.0"

[[poc.requests.matchers]]
expect = true
status = [
    200,
    500,
]
type = "status"
