[basic]
description = "Zeus Web Server 3.x 存在空字节截断漏洞，远程攻击者可通过在 URL 末尾添加空字符（%00）绕过服务器对 CGI 脚本的访问控制，导致源码泄露（如 .pl、.cgi 等文件内容被直接读取）。该漏洞利用方式简单，无需认证即可触发，影响运行 Zeus Web Server 3.x 的 Web 服务器。攻击者可利用泄露的源码分析服务器逻辑，为进一步攻击提供信息。CVSS 评分 5.0，危害等级中危。"
published = "2000-02-08T05:00:00.000"
remediation = "建议立即升级 Zeus Web Server 至 3.4 或更高版本，该版本已修复空字符截断问题。由于 Zeus Web Server 已停止维护，建议迁移至 Apache httpd 或 Nginx 等现代 Web 服务器。临时缓解措施：在反向代理或 Web 应用防火墙上配置规则，拦截包含 %00 空字符的 URL 请求，防止 CGI 源码泄露。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Zeus Web Server 3.x 空字符注入信息泄露漏洞"
updated = "2026-06-16T21:51:06.133"

