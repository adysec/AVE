[basic]
description = "NetBSD 操作系统 VAX 架构下的 ptrace 系统调用存在权限提升漏洞。本地攻击者可通过 ptrace 调试进程时修改 PSL（处理器状态长字）寄存器内容，从而获取更高权限。该漏洞影响 NetBSD 系统，攻击者需拥有本地访问权限，利用难度较低，CVSS 评分 7.2，危害等级高。"
published = "2000-02-01T05:00:00.000"
remediation = "建议升级 NetBSD 至 1.4.1 或更高版本，该版本已修复 ptrace 系统调用中 PSL 寄存器修改导致的权限提升问题。如无法升级，可限制本地用户对 ptrace 的访问权限，或禁用 VAX 架构上的调试功能作为临时缓解措施。"
score = 7.2
severity = "HIGH"
sources = ["cve"]
title = "NetBSD ptrace 本地权限提升漏洞"
updated = "2026-06-16T21:51:07.147"

