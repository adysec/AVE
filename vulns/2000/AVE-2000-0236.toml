[basic]
description = "Red Hat Linux 6.x 的 X 字体服务器 (xfs) 存在拒绝服务及缓冲区溢出漏洞，源于字体服务器未正确处理畸形字体请求。远程未认证攻击者可向 X 字体服务端口（默认 7100/tcp）发送精心构造的畸形请求，触发缓冲区溢出或服务崩溃，导致拒绝服务甚至潜在的代码执行。该漏洞影响运行 X 字体服务的 Red Hat Linux 6.x 系统，攻击者无需认证即可远程发起攻击，CVSS 评分 2.1，属低危级别。Red Hat 已发布补丁修复该漏洞，建议升级至修复版本或禁用不必要的 X 字体服务。"
published = "2000-04-16T04:00:00.000"
remediation = "建议立即升级到 Red Hat Linux 6.2 附带的 xfs 修复版本（执行 `rpm -Uvh xfs-*.rpm` 或通过 `up2date xfs` 安装官方补丁）。若无法立即升级，可在 /etc/X11/fs/config 中将 `no-listen = tcp` 设为开启并注释掉 `port = 7100`，仅允许本地 Unix socket 访问，同时用防火墙阻断 7100 端口的外来连接，并停止非必要的 xfs 服务（`/etc/rc.d/init.d/xfs stop`）作为临时缓解。"
score = 2.1
severity = "LOW"
sources = ["cve"]
