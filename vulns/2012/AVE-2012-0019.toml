[basic]
description = "AWStats 7.0 及之前版本中的 awredir.pl 脚本存在跨站脚本（XSS）漏洞。远程攻击者可通过向目标系统发送特制的 HTTP 请求，在用户浏览器中执行恶意脚本，导致敏感信息泄露或会话劫持。该漏洞影响 AWStats 7.0 及更早版本，CVSS 评分 4.3，危害等级中危。用户需升级至 AWStats 7.1 或更高版本以修复此漏洞。"
published = "2012-10-31T10:50:32.123"
remediation = "升级 AWStats 至 7.1 或更高版本，该版本已修复 awredir.pl 中的跨站脚本漏洞。如无法升级，可在 Web 服务器层面对 awredir.pl 的输入参数进行严格过滤，限制特殊字符传入。"
score = 4.3
severity = "MEDIUM"
sources = ["nuclei"]
title = "AWStats 7.0 跨站脚本漏洞"
updated = "2026-06-16T23:45:18.483"

