[basic]
description = "JournalX 期刊稿件采编系统的 Resume 模块存在任意文件读取漏洞，未经授权的远程攻击者可通过构造特制的请求路径，利用系统对用户输入过滤不严的缺陷，读取服务器上的任意文件（如配置文件、数据库连接信息等敏感数据），导致信息泄露。该漏洞影响 JournalX 期刊稿件采编系统各版本，攻击者无需身份认证即可利用，风险较高。建议厂商限制文件读取路径并加强输入验证。"
published = "0722"
remediation = "建议联系 JournalX 厂商获取最新补丁版本。临时缓解措施：在 Resume 文件下载接口中对 path/filename 参数进行路径规范化处理，过滤 `../` 及空字节等路径穿越字符；将可读取目录限制在 `Upload/Resume/` 范围内，使用白名单机制而非黑名单过滤；同时部署 WAF 规则拦截目录遍历攻击载荷。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "JournalX 期刊稿件采编系统 Resume 任意文件读取漏洞"
updated = "0722"

