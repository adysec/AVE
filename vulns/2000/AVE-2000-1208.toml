[basic]
description = "HP OpenView Network Node Manager（NNM）6.1 版本的 Alarm 服务（OVALARMSRV）存在缓冲区溢出漏洞，该服务监听在 TCP 2345 端口。未经身份认证的远程攻击者可向目标系统发送特制的网络请求触发缓冲区溢出，导致任意代码执行，从而完全控制受影响的服务器。该漏洞影响 HP OpenView NNM 6.1 及更早版本，CVSS 评分 10.0，危害等级严重。建议用户升级至最新版本或禁用相关服务以规避风险。"
published = "2000-06-06T04:00:00.000"
remediation = "立即安装 HP 针对 OVALARMSRV 缓冲区溢出漏洞发布的安全补丁（HP Security Bulletin 相关更新），将 HP OpenView NNM 升级到修复版本。如无法打补丁，在防火墙上封锁 TCP 2345 端口（OVALARMSRV 服务），仅允许可信管理站访问该端口。该产品已停止主流支持，建议升级到 Micro Focus Network Node Manager i 等受支持版本。"
score = 10
severity = "CRITICAL"
sources = ["cve"]
title = "HP OpenView Network Node Manager 缓冲区溢出漏洞"
updated = "2026-06-16T21:51:59.787"

