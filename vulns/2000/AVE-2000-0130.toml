[basic]
description = "Debian GNU/Linux 系统中 gnucash 财务管理软件所使用的 libguile.so 共享库文件被设置了全局可写权限（world-writable），本地攻击者可通过向该共享库文件中写入恶意代码，当其他用户或服务加载该库时触发执行，从而实现权限提升或任意代码执行。该漏洞影响 Debian GNU/Linux 系统，利用条件为攻击者拥有本地访问权限，CVSS 评分 7.5，危害等级高。建议立即修复 libguile.so 文件的权限设置。"
published = "2000-02-05T05:00:00.000"
remediation = "建议立即修复 `/usr/lib/libguile.so` 文件权限：执行 `chmod 755 /usr/lib/libguile.so` 移除全局可写权限，并确认 `umask` 设置为 `022` 以避免后续安装的共享库再次出现权限问题；同时升级 gnucash 至包含权限修复的版本（如 Debian 2.2.x 对应安全更新）。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "Debian GNU/Linux gnucash libguile 权限配置不当漏洞"
updated = "2026-06-16T21:51:05.630"

