[basic]
description = "EServ 2.9.2 及更早版本的日志记录功能存在缓冲区溢出漏洞，远程攻击者可通过向目标 SMTP 服务器发送超长的 MKD 命令触发该漏洞，导致任意代码执行。该漏洞影响 Etype EServ 邮件服务器软件，CVSS 评分 10.0，危害等级严重。攻击者无需认证即可利用此漏洞，实现远程控制目标服务器。"
published = "2000-06-06T04:00:00.000"
remediation = "升级到 EServ 2.9.3 或更高版本（若厂商已停止维护则无官方补丁），建议迁移至主流 FTP 服务器软件如 vsftpd 或 ProFTPD 替代 EServ。作为临时缓解措施，在防火墙/路由器上限制对 FTP 端口（21）的访问，仅允许受信任 IP 连接，并禁用不必要的 FTP 匿名登录。"
score = 10
severity = "CRITICAL"
sources = ["cve"]
title = "Etype EServ 日志缓冲区溢出漏洞"
updated = "2026-06-16T21:51:55.100"

