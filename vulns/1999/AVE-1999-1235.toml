[basic]
description = "Solaris 系统的 lpstat 命令在处理 class 参数时存在缓冲区溢出漏洞。本地未授权用户可通过向 lpstat 传入超长的 class 参数触发溢出，进而以 root 权限执行任意代码。该漏洞影响 Solaris 2.6 和 SunOS 5.7 等多个版本，攻击者需具备本地登录权限或可执行 lpstat 命令的访问权，利用后可完全控制系统。建议及时应用 Solaris 官方安全补丁并限制非授权用户对 lpstat 命令的访问权限。"
published = "1999-01-28T05:00:00.000"
remediation = "应用 Sun 官方安全补丁或升级到 Solaris 8 及以上版本，并通过 chmod 移除普通用户对 lpstat 命令的可执行权限。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "Sun Solaris lpstat 命令类参数缓冲区溢出漏洞"
updated = "2026-06-16T21:49:23.740"

