[basic]
description = "Cisco Secure Workload 存在未授权 API 访问漏洞（CWE-306），由于内部 REST API 端点的访问验证与身份认证机制不足，未经身份认证的远程攻击者可通过向受影响端点发送特制的 API 请求绕过认证，以 Site Admin 管理员权限访问站点资源。成功利用该漏洞可导致攻击者跨租户边界读取敏感信息并修改配置，CVSS 评分 10.0，危害等级严重。建议用户及时更新至 Cisco 官方修复版本。"
published = "2026-05-20T17:16:20.400"
remediation = "立即升级 Cisco Secure Workload 至修复版本：3.10.x 分支升级到 3.10.8.3 或更高版本，4.0.x 分支升级到 4.0.3.17 或更高版本。3.9 及更早版本须迁移至以上修复版本。SaaS 部署用户无需操作，Cisco 已在云端自动修复。建议通过 Cisco Software Center 下载对应版本安装包执行就地升级。"
score = 10
severity = "CRITICAL"
sources = ["hwpoc"]
title = "Cisco Secure Workload 未授权 API 访问漏洞"
updated = "2026-06-30T16:30:59.007"

