[basic]
description = "strace 工具在处理内存映射文件名时存在任意文件读取漏洞。本地攻击者可通过 strace 跟踪其他进程的方式，利用内存映射文件名中的路径信息读取系统上任意文件内容，导致敏感信息泄露。该漏洞影响 strace 工具，攻击者需具有本地系统访问权限，危害等级较低，CVSS 评分 2.6。"
published = "1999-12-25T05:00:00.000"
remediation = "升级 strace 至 4.3 及以上版本（修复了通过内存映射文件名读取任意文件的缺陷）。如暂时无法升级，应限制普通用户对 strace 的执行权限（如通过 sudo 规则或移除 setuid），并避免在该系统上以特权用户运行未知程序，作为临时缓解措施。"
score = 2.6
severity = "LOW"
sources = ["cve"]
title = "strace strace 本地任意文件读取漏洞"
updated = "2026-06-16T21:50:48.500"

