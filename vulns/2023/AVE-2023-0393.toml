[basic]
description = "Linux 内核 GICv3 驱动在处理 NVIDIA T241 平台多芯片场景时存在硬件勘误（T241-FABRIC-4），当来自不同 GIC 的多传输 AXI4 Stream 数据包在目标芯片侧发生交织时，会破坏中断控制器内部状态，导致内核崩溃及不可预期行为。该漏洞影响配置超过 2 个 T241 芯片的服务器平台，需满足多插槽间的多传输数据包交互条件。官方通过将寄存器读取定向至 SPI 所属芯片并禁用 GICv4.x 特性实现规避，CVSS 评分 5.5，危害等级中等。"
published = "2025-09-18T14:15:41.310"
remediation = "升级 Linux 内核至包含 commit af5b3c36e5e0 (irqchip/gicv3: Workaround for NVIDIA erratum T241-FABRIC-4) 的版本，如 6.1.72+、6.6.11+。多插槽 T241 平台须禁用 GICv4 功能，在 cmdline 添加 gicv3_disable_gicv4=1 内核参数；单/双插槽配置不受影响，无需特殊处理。"
score = 5.5
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux kernel GICv3 NVIDIA T241 平台中断控制器状态损坏漏洞"
updated = "2026-06-17T06:45:10.157"

