[basic]
description = "SunView（SunTools）组件中的 selection_svc 服务存在远程文件读取漏洞，该服务未对客户端请求进行充分的身份验证和权限检查，远程攻击者可通过网络向目标系统发送特制请求，无需任何认证即可读取任意文件，导致敏感信息泄露。该漏洞影响 SunOS 4.1.1 系统，CVSS 评分 5.0，危害等级中危。"
published = "1990-08-14T04:00:00.000"
remediation = "升级 SunOS 至 4.1.2 或更新版本，或迁移至 Solaris 2.x 系列。在 /etc/inetd.conf 中注释 selection_svc 行并重启 inetd 以禁用该服务。配置防火墙过滤 selection_svc 使用的 TCP/UDP 端口，限制远程访问。由于 SunOS 4.1.1 已停止维护，建议迁移至受支持的操作系统。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Sun SunOS SunView selection_svc 远程文件读取漏洞"
updated = "2026-06-16T21:47:54.977"

