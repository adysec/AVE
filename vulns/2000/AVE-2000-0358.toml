[basic]
description = 'fdmount 是 Linux 系统中用于挂载软盘设备的工具，该工具在处理 mountpoint 参数时存在缓冲区溢出漏洞，以 "floppy" 组成员身份登录的本地攻击者可通过传入超长的挂载点路径参数触发溢出，进而以 root 权限执行任意命令。该漏洞影响 S.u.S.E. 4.x/5.x/6.x/7.x、Slackware 3.x/4.0、Turbolinux 6 以及 OpenLinux 7.0 等 Linux 发行版，CVSS v2 评分 7.2，危害等级高。'
published = "2000-05-22T04:00:00.000"
remediation = "对于 fdmount 缓冲区溢出漏洞（CVE-2000-0438），应立即移除 fdmount 程序的 SUID 权限：执行 chmod u-s /usr/bin/fdmount 或用 ls -l /usr/bin/fdmount 确认 SUID 位已清除。同时将 floppy 组中非必要用户移除：执行 gpasswd -d <用户名> floppy，仅保留必须使用软驱的账户。如厂商已发布补丁，应升级至 fdmount 修复版本（如 S.u.S.E.、Slackware、Turbolinux、OpenLinux 及 Mandrake Linux 发行版安全更新）以彻底消除该漏洞。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "S.u.S.E. Linux 等发行版 fdmount 本地缓冲区溢出漏洞"
updated = "2026-06-16T21:51:44.043"

