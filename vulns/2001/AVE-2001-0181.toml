[basic]
description = "WhitSoft SlimServe HTTPd 1.0/1.1 存在目录遍历漏洞，远程攻击者无需身份认证即可通过向目标服务器发送包含特殊编码的点点（...）序列的 HTTP 请求，绕过路径限制读取服务器上的任意文件。该漏洞影响 SlimServe HTTPd 1.0 及 1.1 版本，CVSS 评分 5.0，危害等级中等。攻击者利用此漏洞可获取系统敏感信息，为后续攻击提供基础。"
published = "2001-06-27T04:00:00.000"
remediation = "立即停止使用已停止维护的 WhitSoft SlimServe HTTPd，迁移至 Apache HTTP Server 或 Nginx 等仍在安全更新的 Web 服务器软件。若短期内无法迁移，在 Web 服务器前部署反向代理（如 Nginx），对请求路径进行规范化过滤，拒绝包含 `...`、`../` 等目录遍历特征的 HTTP 请求。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "WhitSoft SlimServe HTTPd 目录遍历漏洞"
updated = "2026-06-16T21:54:20.280"

