[basic]
description = "MetaProducts Offline Explorer 1.2 及更早版本存在目录遍历漏洞，远程攻击者可通过向应用程序发送包含 `..`（点点）序列的特制 URL 请求，绕过路径访问限制读取目标系统上的任意文件。该漏洞影响 Offline Explorer 1.0/1.1/1.2 版本，攻击者无需身份认证即可远程利用，可能导致敏感系统文件泄露。CVSS 评分 5.0，危害等级中危。"
published = "2000-05-19T04:00:00.000"
remediation = "升级 MetaProducts Offline Explorer 至 1.3 或更高版本，该版本修复了路径遍历问题。如无法升级，避免使用 Offline Explorer 下载来自不可信来源的网站内容，并在代理或防火墙层面对出站请求进行路径规范化过滤。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "MetaProducts Offline Explorer 目录遍历漏洞"
updated = "2026-06-16T21:51:43.747"

