[basic]
description = "Linux 系统 pam_console PAM 认证模块存在权限验证漏洞。当显示管理器（如 gdm 或 kdm）启用 XDMCP 远程显示协议时，任意用户（包括非授权用户）均可通过 XDMCP 远程访问系统控制台，进而获得重启系统的权限。该漏洞影响 Conectiva 4.x/5.x 及 RedHat 6.x 等 Linux 发行版本，CVSS 评分 5.0，危害等级中等。攻击者可利用此漏洞绕过控制台访问限制，实现对目标系统的未授权重启操作。"
published = "2000-07-27T04:00:00.000"
remediation = "立即升级 pam 软件包至最新版本，或禁用 XDMCP：在 /etc/X11/gdm/gdm.conf 中将 Enable=true 改为 Enable=false，同时在防火墙中阻止 UDP 端口 177 以阻断远程 XDMCP 连接。如使用 kdm，在 /etc/X11/kdm/kdmrc 中设置 XDMCPPort=0。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "RedHat/Conectiva Linux pam_console PAM 模块远程权限提升漏洞"
updated = "2026-06-16T21:52:13.697"

