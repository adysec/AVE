[basic]
description = 'US Robotics/3Com Total Control Chassis 在处理 Frame Relay 配置时存在安全绕过漏洞。当管理员为端口设置 "set host prompt" 后，系统无法正确强制执行访问过滤规则。远程攻击者只需在 "host: " 提示符下连续输入两次主机名即可绕过身份验证限制，获取未授权访问权限。该漏洞影响 3.6.22 至 3.7.24 版本之间的设备，CVSS 评分 7.5，危害等级高，可能导致敏感信息泄露或设备配置被篡改。'
published = "1998-05-11"
remediation = "升级 3Com Total Control Chassis 软件至 3.7.24 及以上版本以修复访问过滤绕过问题。如无法升级，应避免在端口上启用 set host prompt 配置，并通过外部防火墙限制对受影响端口的网络访问，仅允许可信 IP 地址连接。同时建议将该设备纳入网络访问控制策略管理，定期审计访问日志以发现异常行为。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "3Com Total Control Chassis Frame Relay 安全限制绕过漏洞"
updated = "2026-06-16"

