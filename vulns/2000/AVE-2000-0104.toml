[basic]
description = "McAfee Virus Scan 及 Norton Anti-Virus 等杀毒软件的默认配置未将 Windows 回收站目录（RECYCLED 文件夹）纳入病毒扫描范围，攻击者可利用此安全遗漏将恶意代码放置在回收站文件中，绕过杀毒软件的实时监控与文件检测机制。该漏洞影响 McAfee 4.0、Network Associates for Windows NT 4.0.2/4.0.3 及 Norton AntiVirus 2000 等多个版本，CVSS 评分 7.2，危害等级高。由于回收站文件在系统默认行为下不被自动扫描，攻击者无需特殊权限即可实现恶意代码的持久驻留与隐蔽执行。"
published = "1999-12-22T05:00:00.000"
remediation = '将 McAfee VirusScan 升级至 4.0.4 以上版本，或 Norton AntiVirus 升级至 2001 以上版本；在现有版本中手动开启「扫描回收站文件夹」选项，在实时扫描配置中添加 C:\RECYCLED 目录为扫描路径，确保所有文件操作均经过病毒检测引擎。'
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "McAfee VirusScan 与 Norton AntiVirus 回收站文件扫描绕过漏洞"
updated = "2026-06-16T21:51:02.397"

