[basic]
description = "中成科信票务管理系统TicketManager.ashx接口的GetReServeOrder方法存在SQL注入漏洞。攻击者可通过向/systemmanager/api/TicketManager.ashx发送特制的POST请求，在solutionId参数中注入恶意SQL语句（如使用WAITFOR DELAY进行时间盲注），从而绕过身份验证、获取或篡改数据库中的票务订单数据。该漏洞影响使用中成科信票务管理系统的所有部署实例，攻击者无需身份认证即可在远程服务器上执行任意SQL查询，严重时可导致敏感数据泄露、数据库被拖库或服务器被进一步控制。建议尽快升级至官方修复版本或临时限制对该接口的访问权限。"
published = "0813"
remediation = "建议立即升级中成科信票务管理系统至最新版本（建议联系厂商获取最新安全补丁版本）。临时缓解措施：1) 在WAF/Web应用防火墙配置SQL注入防护规则，拦截包含WAITFOR DELAY、' OR '1'='1等SQL注入特征的POST请求；2) 在Web应用防火墙层面限制/SystemManager/Api/TicketManager.ashx接口的访问频率和IP白名单；3) 在数据库层面为应用账户仅授予最小权限，禁止执行WAITFOR DELAY等延时函数；4) 启用数据库审计日志记录所有WAITFOR DELAY等可疑SQL语句。建议联系中成科信官方获取官方安全补丁补丁包。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "中成科信 票务管理系统 SQL注入漏洞"
updated = "0813"

