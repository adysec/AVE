[basic]
description = "Windows NT 4.0 的 CIFS Computer Browser 服务在处理 HostAnnouncement 帧时未对浏览表大小做限制。远程攻击者可通过向主浏览器发送大量伪造的 HostAnnouncement 帧，导致浏览表膨胀、复制流量耗尽网络带宽，从而引发拒绝服务。攻击者需与目标位于同一子网，且无需认证即可发起攻击。"
published = "2000-05-25"
remediation = "安装 Microsoft 安全公告 MS00-036 提供的补丁，在 Windows NT 4.0 上通过注册表设置 MaximumBrowseEntries（默认 100000）限制浏览表大小，并设置 RefuseReset 忽略 ResetBrowser 帧。同时在防火墙层面阻止外部对 UDP 138 端口的访问。Windows NT 4.0 已停止支持，建议升级至受支持的操作系统版本。"
score = 5.0
severity = "MEDIUM"
sources = ["cve"]
title = "Microsoft Windows NT 4.0 CIFS Computer Browser HostAnnouncement 洪泛拒绝服务漏洞"
updated = "2026-06-16"

