[info]
author = "ave"
description = "验证 Mandrake Linux 6.1-7.1 版本中 mod_perl 模块的 /perl/ 目录是否被设置为可浏览，测试攻击者能否通过 HTTP 请求访问该目录并列出其中的文件内容，导致敏感信息泄露。"
id = "POC-AVE-2000-0648"
name = "CVE-2000-0883 Mandrake mod_perl /perl 目录浏览漏洞 PoC"
severity = "medium"
tags = ["ave-2000-0648"]
vuln_id = [
    "CVE-2000-0883",
    "AVE-2000-0648",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/perl/"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "index of /perl",
    "Directory listing",
]
