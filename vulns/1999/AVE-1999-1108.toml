[basic]
description = "WU-FTPD 及相关 FTP 服务器在处理 MAPPING_CHDIR 命令时存在缓冲区溢出漏洞。远程攻击者无需身份认证即可向目标 FTP 服务器发送特制的超长 MAPPING_CHDIR 命令，触发缓冲区溢出，覆盖内存中的关键数据结构，从而以 root 权限执行任意代码。该漏洞影响 WU-FTPD 及其衍生 FTP 服务器软件，攻击者只需能够连接到目标 FTP 服务的 21 端口即可利用，利用难度低，可完全控制受影响系统。"
published = "1999-08-22"
remediation = "WU-FTPD 已停止维护多年，官方未发布安全补丁。建议立即停止使用 WU-FTPD，迁移至受支持且无此漏洞的替代 FTP 服务器软件，如 vsftpd 3.0.x、ProFTPD 1.3.x 或 Pure-FTPD 最新稳定版。如无法立即迁移，应在防火墙层面限制对 FTP 服务的访问来源 IP，仅允许可信网络段访问，并禁用不必要的 FTP 功能。"
score = 10.0
severity = "CRITICAL"
sources = [
    "cve",
    "avd",
]
title = "WU-FTPD MAPPING_CHDIR 远程缓冲区溢出漏洞"
updated = "2026-06-16"

