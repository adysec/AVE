[basic]
description = "HylaFAX 4.0.2 的 faxalter 工具中存在本地缓冲区溢出漏洞。攻击者通过向 -m 命令行参数传递超长字符串，可触发栈缓冲区溢出，覆盖返回地址，从而以 faxalter 进程权限（通常为 root）执行任意代码。该漏洞为本地利用，攻击者需拥有系统普通用户权限，无需认证即可利用，CVSS v2.0 评分 7.2，危害等级高。成功利用后可完全控制目标系统，获取完整机密性、完整性和可用性权限。"
published = "1999-11-04T05:00:00.000"
remediation = "建议立即升级至 Hylafax 4.1 或更高版本（当前最新稳定版为 7.0.11），该漏洞在 4.1 版本中已修复。如无法立即升级，可临时移除 faxalter 的 suid-uucp 位：执行 `chmod u-s /usr/local/bin/faxalter` 取消其 setuid 权限，防止普通用户通过该程序提权至 uucp。同时限制 faxalter 仅授权可信任的 uucp 组用户使用，并监控 uucp 帐户下关键文件（如 hfaxd 配置文件）的异常修改。"
score = 7.2
severity = "HIGH"
sources = ["epss"]
title = "Hylafax Hylafax 4.0.2 本地缓冲区溢出漏洞"
updated = "2026-06-16T21:50:13.947"

