[basic]
description = "HP-UX 10.30 的 Telnet 服务存在拒绝服务漏洞，远程攻击者无需身份认证即可通过向目标系统的 Telnet 端口（默认 23）发送特制数据包，导致 telnetd 进程崩溃或资源耗尽，从而使服务不可用。该漏洞影响 HP-UX 10.30 版本，攻击条件简单，危害等级中等，建议升级至修复版本或限制 Telnet 服务访问。"
published = "1997-10-01T04:00:00.000"
remediation = "立即禁用 telnet 服务：编辑 /etc/inetd.conf，注释或删除 telnet 行后执行 inetd -c 重载配置；或直接停止 telnet 服务进程。将远程管理迁移至 SSH 协议。升级 HP-UX 至 11i v3 或更高版本，并安装 HP 对应 PHCO 补丁。在边界防火墙上阻断 TCP 23 端口外来访问，缩小攻击面。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "HP HP-UX 10.30 Telnet Server 拒绝服务漏洞"
updated = "2026-06-16T21:49:57.627"

