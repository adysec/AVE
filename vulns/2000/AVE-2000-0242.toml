[basic]
description = "Linux trustees 内核补丁（Bray Systems 1.5 版本）在处理超长路径名的文件或目录时存在拒绝服务漏洞。该补丁对长路径名的边界检查存在缺陷，攻击者通过访问具有过长名称的文件或目录即可触发漏洞，导致系统出现拒绝服务。该漏洞影响安装了 trustees 内核补丁的 Linux 系统，攻击条件为攻击者具备本地访问权限或能够对文件系统执行操作，利用方式简单直接，仅需构造超长路径名并访问即可使系统服务中断。CVSS 评分为 2.1，危害等级为低危。"
published = "2000-04-10T04:00:00.000"
remediation = "建议升级 Linux Trustees 内核补丁至 1.6 或更高版本，该版本修复了处理超长文件名/路径时的边界检查缺陷。若无法及时升级，应临时卸载或禁用 trustees 内核补丁，改用标准文件系统权限（chmod/chown/ACL）进行访问控制，并在应用层限制用户可创建的文件名长度，避免拒绝服务。"
score = 2.1
severity = "LOW"
sources = ["exploitdb"]
title = "Bray Systems Linux Trustees 长路径名拒绝服务漏洞"
updated = "2026-06-16T21:51:22.503"

