[basic]
description = "AMaViS 病毒扫描器 0.2.0-pre4 及更早版本存在命令注入漏洞。远程攻击者可通过向目标邮件服务器发送包含 shell 元字符的恶意邮件，将特制载荷置于 Reply-To 字段中，当 AMaViS 处理该邮件时即可触发命令执行，以 root 权限在系统上执行任意命令。该漏洞 CVSS 评分 10.0，危害等级严重，攻击者无需身份认证即可远程利用，可完全控制受影响服务器。"
published = "1999-12-31T05:00:00.000"
remediation = "升级 AMaViS 至 0.2.1 或更高版本，该版本已修复 reply-to 字段的 shell 元字符转义问题。如无法升级，在调用 sendmail 或 amavis 的 Perl 脚本中，对 reply-to、from、subject 等用户可控邮件头字段使用 quotemeta() 函数进行转义后再传入 shell 命令，并确保禁用以 root 身份运行扫描进程的配置。"
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "AMaViS virus_scanner 远程命令执行漏洞"
updated = "2026-06-16T21:50:35.963"

