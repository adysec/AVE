[basic]
description = "Norton AntiVirus for Internet Email Gateways 的 Web 服务器组件存在缓冲区溢出漏洞，远程攻击者可通过向目标系统发送超长 URL 请求触发该漏洞，导致 Web 服务进程崩溃，造成拒绝服务。该漏洞影响 Norton AntiVirus for Internet Email Gateways 相关版本，CVSS 评分 5.0，危害等级中危。厂商已发布安全更新修复此漏洞，建议用户及时升级。"
published = "2000-03-17T05:00:00.000"
remediation = "升级 Symantec Norton AntiVirus for Internet Email Gateways 至最新安全更新版本，厂商已修复 Web 服务器组件中 URL 长度校验不足导致的缓冲区溢出问题。如无法立即升级，可在 Web 服务器层面配置 URL 最大长度限制，并在网络边界过滤超长请求路径缓解。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Symantec Norton AntiVirus for Internet Email Gateways Web服务器缓冲区溢出拒绝服务漏洞"
updated = "2026-06-16T21:51:17.670"

