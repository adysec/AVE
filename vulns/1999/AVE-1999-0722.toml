[basic]
description = "ColdFusion Server 4.0 的示例应用程序中存在源代码泄露漏洞，远程攻击者无需身份认证即可通过直接访问 sourcewindow.cfm 文件获取服务器端脚本源码。该漏洞源于示例应用未对 sourcewindow.cfm 文件进行访问控制，攻击者可利用此漏洞窃取敏感业务逻辑、数据库连接信息等，为进一步攻击提供情报支撑。影响 Adobe ColdFusion Server 4.0 版本，建议删除或限制对示例目录的访问。"
published = "2001-03-12T05:00:00.000"
remediation = "删除 ColdFusion Server 安装目录下的 `CFIDE/exampleapps` 示例应用文件夹，或在 Web 服务器（IIS/Apache）层面添加访问控制规则，禁止外部访问 `/CFIDE/` 路径。同时建议升级到 Adobe 官方仍在支持的最新 ColdFusion 版本（2023 及以上），该版本已移除所有示例应用并默认启用安全配置。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Allaire ColdFusion Server 4.0 源代码泄露漏洞"
updated = "2026-06-16T21:49:20.130"

