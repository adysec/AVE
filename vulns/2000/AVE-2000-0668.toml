[basic]
description = "SGI InfoSearch 1.0 版本中的 infosrch.cgi CGI 程序存在命令注入漏洞。远程攻击者无需认证即可通过向该 CGI 程序传入包含 shell 元字符的参数，在服务器端执行任意操作系统命令。该漏洞影响 SGI IRIX 6.5.x 系统，由于程序未对用户输入进行充分的过滤和转义处理，攻击者可利用此漏洞完全控制受影响的服务器，造成严重的信息泄露和系统沦陷风险。"
published = "2000-03-01"
remediation = "应用 SGI 安全公告 20000501-01-P 提供的官方补丁，或直接禁用 InfoSearch CGI 程序 infosrch.cgi 的访问权限。若业务无需使用 InfoSearch 功能，建议从 Web 服务器配置中移除该 CGI 程序映射，并升级至 IRIX 后续安全更新版本以消除风险。"
score = 7.5
severity = "HIGH"
sources = [
    "cve",
    "exploitdb",
]
title = "SGI InfoSearch CGI 程序 infosrch.cgi 远程命令注入漏洞"
updated = "2026-06-16"

