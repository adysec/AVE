[basic]
description = "CommuniGatePro 邮件服务器 HTTP 配置端口存在缓冲区溢出漏洞，远程攻击者可通过向该端口发送超长字符串触发缓冲区溢出，导致服务崩溃或任意代码执行。该漏洞影响 CommuniGatePro 早期版本，攻击者无需身份认证即可远程利用，CVSS 评分 5.0，危害等级中等。建议用户升级至最新版本或限制 HTTP 配置端口的访问权限。"
published = "1999-12-03T05:00:00.000"
remediation = "立即升级至 CommuniGatePro 3.2 或更高版本（官方已在 3.2b5 中修复）。如无法升级，在防火墙层面限制对 HTTP 配置端口（8010）的远程访问，仅允许受信任的管理 IP 连接，以降低被利用风险。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Stalker Software CommuniGatePro HTTP配置端口缓冲区溢出漏洞"
updated = "2026-06-16T21:49:13.100"

