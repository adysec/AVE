[basic]
description = "Oracle Java SE 的 Hotspot 组件中存在一个未明漏洞，远程攻击者可通过诱导用户访问恶意网页或运行特制的 Java Applet 小程序触发该漏洞。由于字节码验证器缓存处理不当，攻击者能够绕过 Java 沙箱安全限制，在目标系统上执行任意代码，完全控制受影响的系统。该漏洞影响 Java SE 7 Update 4 及更早版本、6 Update 32 及更早版本、5 Update 35 及更早版本以及 1.4.2_37 及更早版本，CVSS 评分 9.8，危害等级严重。Oracle 已在 2012 年 6 月的关键补丁更新中修复此漏洞。"
published = "2012-06-16T21:55:03.500"
remediation = "升级 Oracle Java SE 至 7u5、6u33、5u36 或 1.4.2_38 及以上版本，或安装 Oracle 官方 2012 年 6 月 Critical Patch Update (CPU)。如无法立即升级，可在浏览器中禁用 Java Applet 插件，或通过控制面板将 Java 安全级别设为最高。"
score = 9.8
severity = "CRITICAL"
sources = ["kev"]
title = "Oracle Java SE Hotspot 组件远程代码执行漏洞"
updated = "2026-06-16T23:40:10.777"

