[basic]
description = "Itetris 1.6.1/1.6.2 版本中存在危险的命令执行漏洞。该游戏在运行时会信任 PATH 环境变量来查找并执行 gunzip 程序，而非使用绝对路径调用系统程序。本地攻击者可通过修改 PATH 环境变量，将其指向自行构造的恶意 gunzip 可执行文件，当 Itetris 以 root 权限运行时（如设置了 setuid 位），该恶意程序将继承高权限执行，从而造成本地权限提升，攻击者可完全控制目标系统。"
published = "2001-02-12T05:00:00.000"
remediation = "升级 itetris 到 1.6.3 或更高版本（若已不再维护，建议卸载该软件包）。如无法升级，可移除 itetris 二进制文件的 setuid 权限位（chmod u-s /usr/games/itetris），并将 gunzip 调用改为绝对路径 /usr/bin/gunzip 以防止 PATH 劫持攻击。"
score = 7.2
severity = "HIGH"
sources = ["exploitdb"]
title = "Itetris Itetris/xitetris 本地提权漏洞"
updated = "2026-06-16T21:53:37.890"

