[basic]
description = "Microsoft Windows 9x/NT/2000 系列操作系统存在设备名路径解析拒绝服务漏洞。当用户或远程访问者通过文件共享等方式访问包含 DOS 保留设备名（如 CON、NUL、AUX、LPT1 等）的路径时，系统内核无法正确处理此类特殊文件名，导致系统蓝屏崩溃。攻击者无需身份认证，仅需诱使目标用户访问特制路径或通过网络共享发送恶意请求即可触发。该漏洞影响 Windows 95/98/ME、NT 3.5x/4.0 及 Windows 2000 等广泛版本，危害中等，可利用性高。"
published = "2000-03-04T05:00:00.000"
remediation = "安装 Microsoft 安全公告 MS00-017 提供的专用补丁：Windows 95 用户下载 KB256015 补丁，Windows 98/98 SE 用户安装 4C6FD7E5-A66E-4A08-B782-2A64C77B95B6 补丁。由于受影响的 Windows 9x 系列系统已终止支持，建议尽快升级到仍在支持周期内的 Windows 10/11 版本。临时缓解措施包括：在 Internet Explorer 中禁用活动脚本并将 Internet 区域安全级别设为高，同时在邮件客户端中阻止 HTML 格式邮件以降低远程触发风险。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Microsoft Windows 设备名路径拒绝服务漏洞"
updated = "2026-06-16T21:51:08.537"

