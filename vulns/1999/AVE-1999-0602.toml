[basic]
description = "FreeBSD 3.3 系统中自带的游戏 angband 存在本地缓冲区溢出漏洞。具有本地系统访问权限的攻击者可利用该漏洞，通过向 angband 程序提交特制的输入数据触发缓冲区溢出，从而覆盖内存中的关键数据结构，实现权限提升并获得更高权限。该漏洞影响 FreeBSD 3.3 版本，CVSS 评分 4.6，危害等级中危，需要攻击者拥有本地账户。"
published = "1999-12-01T05:00:00.000"
remediation = "该漏洞存在于 FreeBSD 3.3 发行版附带的 angband 游戏中，因 setuid 二进制程序存在缓冲区溢出可导致本地提权。建议升级至 FreeBSD 3.4 或更高版本，该版本已修复此问题；如无法升级，可立即执行 `chmod u-s /usr/local/bin/angband` 移除 angband 的 setuid 权限位以阻断提权路径，或直接卸载 angband 软件包。"
score = 4.6
severity = "MEDIUM"
sources = ["cve"]
title = "FreeBSD angband 本地缓冲区溢出漏洞"
updated = "2026-06-16T21:49:08.333"

