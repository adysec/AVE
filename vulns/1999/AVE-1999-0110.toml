[basic]
description = "SGI IRIX 6.2 操作系统中的 fsdump 命令存在本地权限提升漏洞，本地普通用户可通过修改敏感文件利用该漏洞获取 root 权限。该漏洞源于 fsdump 程序在处理文件时未能正确限制权限，攻击者只需拥有本地 shell 访问权限即可实施攻击，影响 SGI IRIX 6.2 版本。"
published = "1996-12-03T05:00:00.000"
remediation = "立即删除 fsdump 程序的 setuid 位（chmod u-s /usr/sbin/fsdump），防止普通用户以 root 权限执行；同时将 IRIX 系统升级至 6.3 及以上版本（包含 SGI 官方补丁），或限制仅信任管理员可通过 group 策略执行 fsdump。如无法升级，可通过移除 SUID 权限彻底阻断本地提权路径。"
score = 7.2
severity = "HIGH"
sources = ["epss"]
title = "SGI IRIX 6.2 fsdump 本地权限提升漏洞"
updated = "2026-06-16T21:47:26.660"

