[basic]
description = "Microsoft Windows Media Player 7 中的 OCX 嵌入式控件存在资源关闭不当漏洞（OCX Attachment 漏洞）。当使用支持 RTF 格式的电子邮件客户端打开包含特制 OCX 控件的邮件时，由于该控件未能被正确关闭，攻击者可远程触发拒绝服务，导致目标系统崩溃或无响应。该漏洞影响 Windows Media Player 7 版本，利用条件简单，用户仅需预览或打开恶意 RTF 邮件即可触发。"
published = "2000-12-19T05:00:00.000"
remediation = "升级到 Windows Media Player 9 或更高版本，该漏洞在后续版本中已修复。如无法升级，可在邮件客户端中禁用 ActiveX 控件运行，或使用非 RTF 格式查看邮件。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Microsoft Windows Media Player 7 OCX 控件嵌入式拒绝服务漏洞"
updated = "2026-06-16T21:52:47.363"

