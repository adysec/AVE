[basic]
description = "Talk 协议守护进程（talkd）存在拒绝服务漏洞，远程攻击者无需身份认证即可向目标系统发送特制的网络请求，导致目标用户的终端显示界面被破坏或服务进程异常崩溃。该漏洞影响早期 UNIX 及类 UNIX 系统中运行的 talkd 服务，攻击者只需知道目标用户的网络地址即可实施攻击，无需交互或特权。CVSS 评分 5.0，危害等级中等。"
published = "1997-01-01T05:00:00.000"
remediation = "建议关闭并移除 talkd 服务：在 inetd/xinetd 配置中注释掉 talk 行后重启服务，或执行 `apt-get remove talkd`（Debian/Ubuntu）或 `yum remove talk-server`（RHEL/CentOS）。在防火墙上拒绝 UDP 517 端口的入站连接作为加强防护。如确需使用 talk，应限制允许连接的主机范围。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Unix/Linux talkd 拒绝服务漏洞"
updated = "2026-06-16T21:48:00.253"

