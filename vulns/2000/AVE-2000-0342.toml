[basic]
description = "Cayman 3220-H DSL Router 1.0 的管理接口存在拒绝服务漏洞，远程攻击者无需身份认证即可通过向 HTTP 管理界面提交超长的用户名或密码参数，导致路由器服务崩溃或无法响应正常请求。该漏洞影响 Cayman 3220-H DSL Router 1.0 及 GatorSurf 5.3 等版本，CVSS 评分 5.0，危害等级中危。厂商已停止支持该产品，建议用户升级设备或限制管理接口的访问来源。"
published = "2000-05-17T04:00:00.000"
remediation = "该设备已于 2000 年代停产，厂商不再提供安全更新。建议升级至支持最新固件的现代 DSL 路由器；如无法替换设备，应在网络边界防火墙设置 ACL，限制仅可信内网 IP 可访问 HTTP 管理界面（TCP 80），并禁用 WAN 侧远程管理功能；同时避免将管理接口暴露在公网。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Cayman 3220-H DSL Router HTTP管理接口拒绝服务漏洞"
updated = "2026-06-16T21:51:40.330"

