[basic]
description = "Microsoft Internet Explorer 4.01 和 5.0 中的 HHOpen ActiveX 控件 (hhopen.ocx 1.0.0.1) 存在缓冲区溢出漏洞。远程攻击者可通过向 OpenHelp 方法传递超长参数触发缓冲区溢出，进而远程执行任意命令。该漏洞影响 IE 4.01 和 5.0 版本，CVSS 评分 5.1（中等严重度），攻击者无需认证即可远程利用，微软已发布安全更新修复该漏洞。"
published = "1999-10-31T04:00:00.000"
remediation = "升级到 Internet Explorer 5.5 或更高版本（含 2000-08-15 的累积安全补丁），或通过 Windows Update 安装微软安全更新修复 hhopen.ocx ActiveX 控件溢出。临时缓解措施：在 IE 安全设置中将 ActiveX 控件与插件设为「禁用」，并限制对 hhopen.ocx（1.0.0.1）的访问权限。"
score = 5.1
severity = "MEDIUM"
sources = ["exploitdb"]
