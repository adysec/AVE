[basic]
description = "Norton Antivirus for Exchange (NavExchange) 存在失效开放（fail-open）安全缺陷，当该防病毒软件发生故障或崩溃时，会进入允许所有流量通过的状态而非阻断状态，导致病毒和恶意软件能够绕过病毒扫描引擎直接穿透邮件服务器。攻击者可通过向目标邮件服务器发送携带病毒的邮件触发此漏洞，在防病毒服务失效的情况下实现病毒传播与感染。该漏洞影响 Norton Antivirus for Exchange 各版本，CVSS 评分 5.0，危害等级中危。建议用户更新至最新版本或配置为失效关闭模式以降低风险。"
published = "2000-06-14T04:00:00.000"
remediation = '升级 Norton Antivirus for Exchange 至最新版本，确保病毒扫描服务在异常时进入"fail-closed"（拒绝服务）而非"fail-open"（放行）状态。配置邮件流策略，在防病毒服务不可用时自动隔离邮件队列。启用实时监控日志，定期检查服务运行状态。'
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Symantec Norton Antivirus for Exchange 安全防护绕过漏洞"
updated = "2026-06-16T21:51:49.250"

