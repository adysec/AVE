[basic]
description = "Berkeley automounter daemon（amd）的日志记录功能存在缓冲区溢出漏洞，远程攻击者无需身份认证即可通过向目标系统发送特制的请求触发该漏洞，导致拒绝服务或任意代码执行。该漏洞影响 BSD/OS 3.1/4.0.1、FreeBSD 3.0/3.1/3.2 及 RedHat Linux 6.0 等使用 am-utils 软件包的系统，CVSS 评分 9.3，危害等级严重。"
published = "1999-09-16T04:00:00.000"
remediation = "建议立即升级 am-utils 至 6.0.1 或更高版本（该版本修复了 amd 日志记录功能的缓冲区溢出漏洞）。对于 RedHat Linux 6.0，可安装官方提供的 am-utils 安全更新包。如无法升级，可在 inetd 配置中禁用 amd 服务，或通过防火墙限制 amd 端口（默认 672/udp）的访问来源。对于 FreeBSD/BSD/OS 系统，建议升级至已修复该漏洞的后续版本或迁移至现代受支持的操作系统版本。"
score = 9.3
severity = "CRITICAL"
sources = ["epss"]
title = "Linux/BSD am-utils amd 守护进程日志记录缓冲区溢出漏洞"
updated = "2026-06-16T21:48:53.043"

