[basic]
description = "Windows NT 4.0 存在本地拒绝服务漏洞。用户模式应用程序关闭内核模式下已打开的句柄时，内核尝试关闭该句柄而导致系统崩溃。攻击者需要本地系统访问权限，利用此漏洞可造成目标系统崩溃，影响系统可用性。"
published = "1999-12-31"
remediation = "微软已在KB Q160650公告中提供热修复补丁，建议受影响的Windows NT 4.0系统安装该补丁。Windows NT 4.0已停止支持，建议升级到受支持的Windows版本以确保安全性。"
score = 2.1
severity = "LOW"
sources = ["cve"]
title = "Windows NT 4.0 内核模式句柄关闭致拒绝服务漏洞"
updated = "2026-06-16"

