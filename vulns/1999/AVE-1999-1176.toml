[basic]
description = "Cabletron SmartSwitch Router (SSR) 8000 固件版本 2.x 存在 ARP 请求处理能力限制漏洞，设备每秒仅能处理 200 个 ARP 请求。远程攻击者只需在网络中发送大量伪造 ARP 请求，当请求速率超过设备处理上限时，即可耗尽路由器 CPU 资源，导致设备拒绝服务。该漏洞影响所有运行 2.x 固件的 SSR 8000 系列路由器，攻击条件简单，无需认证即可实施。"
published = "1999-11-24T05:00:00.000"
remediation = "将 Cabletron SSR 8000 固件升级至 3.x 及以上版本（该版本增强了 ARP 处理能力）；若无法升级，在设备上配置 ARP 速率限制（如 `arp rate-limit 500`），限制每接口每秒最大 ARP 包处理量；在网络边界部署 ACL 过滤非受信任网段的 ARP 广播；因设备已停产停服，建议迁移至现代替代型号并启用 ARP 防护机制。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Cabletron SmartSwitch Router 8000 ARP 泛洪拒绝服务漏洞"
updated = "2026-06-16T21:50:41.563"

