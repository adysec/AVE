[basic]
description = "BisonWare BisonFTP Server 3.5 及之前版本存在缓冲区溢出漏洞，远程攻击者可通过向 FTP 服务发送超长的 USER、LIST 或 CWD 命令触发该漏洞，造成服务拒绝响应，在特定条件下可能实现远程代码执行。该漏洞 CVSS 评分 7.5，危害等级高，已有 Metasploit 模块公开利用方法。"
published = "1999-05-17T04:00:00.000"
remediation = "立即升级 BisonWare BisonFTP Server 至 4.1 或更高版本，该版本已修复 USER/LIST/CWD 命令的缓冲区溢出问题。如厂商已停止维护且无法升级，应立即停止使用该 FTP 服务，迁移至其他受支持的 FTP 服务器软件（如 vsftpd、ProFTPD），同时在网络边界防火墙限制对 FTP 端口的访问仅允许可信 IP。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "BisonWare BisonFTP Server 远程缓冲区溢出漏洞"
updated = "2026-06-16T21:50:35.723"

