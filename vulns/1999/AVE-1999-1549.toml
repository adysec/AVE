[basic]
description = "Macromedia Shockwave 6.0 之前版本中的 GETNETTEXT 命令存在安全漏洞，远程攻击者可通过在 Shockwave 影片中嵌入恶意 GETNETTEXT 命令，诱使用户访问恶意网页来触发该漏洞。成功利用后，攻击者可读取受害用户的本地邮件内容，并可能访问内部网络中的 Web 服务器，导致敏感信息泄露。该漏洞影响所有运行 Shockwave 6.0 之前版本的 Windows 系统，CVSS 评分 5.1，危害等级中危。"
published = "1997-03-14T05:00:00.000"
remediation = "建议升级到 Macromedia Shockwave 6.0 或更高版本以修复此漏洞。如无法升级，可在浏览器设置中禁用 Shockwave 插件执行，或通过组策略限制 ActiveX 控件的加载来降低风险。同时建议不在浏览器中保持邮箱登录状态，防止内部网络被探测。"
score = 5.1
severity = "MEDIUM"
sources = ["epss"]
title = "Macromedia Shockwave GETNETTEXT 本地文件泄露漏洞"
updated = "2026-06-16T21:50:37.650"

