[basic]
description = "IRAI AUTOMGEN 8.0.0.7 及之前版本（含 8.022）在处理项目文件时存在释放后重用（Use-After-Free）漏洞。程序在处理特定畸形字段时先释放对象对象，随后解引用已释放的悬空指针，导致攻击者可通过控制内存内容影响间接函数调用。远程攻击者可通过向目标系统发送特制的项目文件触发该漏洞，造成拒绝服务，特定条件下可导致远程代码执行。该漏洞 CVSS 评分 6.9，危害等级中等。"
published = "2025-11-12T22:15:40.533"
remediation = "该漏洞影响 IRAI AUTOMGEN 8.0.0.7 及更早版本。原始发现者指出厂商未发布官方补丁，建议升级到 IRAI AUTOMGEN 最新可用版本（应高于 8.0.0.7/8.022），避免打开来源不可信的 .agz 项目文件，以低权限用户运行软件降低风险。"
score = 6.9
severity = "MEDIUM"
sources = [
    "cve",
    "nvd",
]
title = "IRAI AUTOMGEN 释放后使用远程代码执行漏洞"
updated = "2026-06-16T23:28:30.563"

