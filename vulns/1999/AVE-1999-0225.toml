[basic]
description = "EFnet 常用的 hybrid-6 IRC 服务器存在缓冲区溢出漏洞，远程攻击者可通过向服务器发送特制的 m_invite invite 选项触发该漏洞，导致任意代码执行。该漏洞影响 Hybrid Ircd 5.0.3 p7 及更早版本，CVSS 评分 7.5，危害等级高。攻击者无需身份认证即可远程利用，成功利用后可完全控制目标服务器。"
published = "1999-08-13T04:00:00.000"
remediation = "升级 hybrid-ircd 至 6.0 或更高版本，该漏洞已在后续版本中修复。如无法升级，可在 IRC 服务器配置中禁用 m_invite 命令或限制远程用户的 invite 权限作为临时缓解措施。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "EFnet Hybrid IRCd 远程缓冲区溢出漏洞"
updated = "2026-06-16T21:48:49.900"

