[info]
author = "ave"
description = "检测 FreeBSD 系统中存在 gdc 程序，该程序存在符号链接竞态漏洞，本地用户可通过预置符号链接篡改系统文件。本 PoC 通过检查本地 gdc 可执行文件是否存在进行安全无损验证。"
id = "POC-AVE-1999-0656"
name = "FreeBSD gdc Symlink Attack PoC"
severity = "low"
tags = ["ave-1999-0656"]
vuln_id = [
    "CVE-1999-0857",
    "AVE-1999-0656",
]

[poc]
logic = "all"

[[poc.requests]]
path = "/usr/sbin/gdc"
protocol = "file"

[[poc.requests.matchers]]
expect = true
part = "body"
regex = "."
type = "regex"
