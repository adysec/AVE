[basic]
description = "帆软 FineReport 报表系统的 export/excel 接口存在 SQL 注入漏洞，攻击者无需认证即可向该接口发送特制的 HTTP 请求，通过拼接恶意 SQL 语句绕过参数过滤，进而窃取数据库中的敏感数据或执行任意数据库操作。该漏洞影响 FineReport 11.5.4.1 以下版本及 7.0.5 以下版本，危害严重。厂商已发布安全更新，建议用户升级至修复版本。"
published = "nday"
remediation = "将帆软 FineReport 升级至 11.5.4.1 及以上版本（FineReport 11）或 7.0.5 及以上版本（FineReport 7）以修复 export/excel 接口的 SQL 注入漏洞。如无法立即升级，可在反向代理或 WAF 层对 export/excel 接口的传入参数添加 SQL 注入检测规则，过滤危险字符与 SQL 关键字作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "帆软 FineReport export/excel 接口 SQL 注入漏洞"
updated = "nday"

