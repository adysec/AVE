[basic]
description = "Linux 内核配额子系统存在工作队列刷新不完整的竞态条件漏洞。在文件系统冻结过程中，`dquot_writeback_dquots()` 路径未及时刷新 `quota_release_work` 工作队列，导致冻结完成后仍有待处理的配额释放工作项。当内核随后尝试处理这些工作项时，会因文件系统已处于冻结状态而触发 `WARN_ON(sb->s_writers.frozen == SB_FREEZE_COMPLETE)` 警告，造成内核日志污染并可能引发系统不稳定。本地攻击者需具备低权限访问，通过触发文件系统冻结操作（如 `freeze_super`）与配额写回操作的特定时序即可利用此漏洞。该漏洞影响 Linux 内核 ext4 等文件系统，CVSS 评分 5.5，危害等级中等。"
published = "2025-01-08T18:15:18.910"
remediation = "建议立即升级 Linux 内核至以下已修复版本：5.4.287+、5.10.231+、5.15.174+、6.1.120+、6.6.64+、6.12.4+，或直接应用主线补丁（commit a5abba5e0e58）。Debian 11 用户请更新至 DLA-4075 对应内核版本，Ubuntu 24.04 LTS 用户请安装 USN-7381-1 提供的 linux-image-6.11.0-1011-lowlatency 及以上版本。如无法立即升级，可避免在业务高峰期执行文件系统冻结操作作为临时缓解。"
score = 5.5
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux Kernel 配额子系统写回时工作队列刷新遗漏漏洞"
updated = "2026-06-17T08:12:58.673"

