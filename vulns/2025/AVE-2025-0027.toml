[basic]
description = "Windows SPNEGO Extended Negotiation (NEGOEX) 安全机制存在堆缓冲区溢出漏洞，未经身份认证的远程攻击者可通过向目标系统发送特制协商请求触发该漏洞，导致远程代码执行。该漏洞影响多个 Windows 版本，CVSS 评分 9.8，危害等级严重。攻击者无需用户交互即可利用，建议用户尽快安装安全更新修复。"
published = "2025-07-08T17:15:38.633"
remediation = "立即安装 Microsoft 2025 年 7 月安全更新。受影响版本对应修复版本：Windows 10 1507 ≥ 10.0.10240.21073、Windows 10 1607/Server 2016 ≥ 10.0.14393.8246、Windows 10 1809/Server 2019 ≥ 10.0.17763.7558、Windows 10 21H2 ≥ 10.0.19044.6093、Windows 10 22H2 ≥ 10.0.19045.6093、Windows 11 22H2 ≥ 10.0.22621.5624、Windows 11 23H2 ≥ 10.0.22631.5624、Windows 11 24H2/Server 2025 ≥ 10.0.26100.4652、Server 2022 ≥ 10.0.20348.3932。如无法立即打补丁，可通过注册表禁用 SPNEGO NEGOEX 机制作为临时缓解措施。"
score = 9.8
severity = "CRITICAL"
sources = ["hwpoc"]
title = "Microsoft Windows SPNEGO Extended Negotiation (NEGOEX) 远程代码执行漏洞"
updated = "2026-06-17T09:28:56.633"

