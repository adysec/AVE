[basic]
description = "Linux cdrecord 工具中存在缓冲区溢出漏洞，本地攻击者可通过向 dev 参数传递特制的长字符串触发缓冲区溢出，从而获取目标系统的 root 权限。该漏洞影响 Mandriva Linux Mandrake 7.0 等版本，CVSS 评分 7.2，危害等级高。攻击者需拥有本地系统访问权限方可利用此漏洞。"
published = "2000-05-29T04:00:00.000"
remediation = "将 cdrtools 升级至 1.8.1a01 或更高版本，该版本已修复 cdrecord 的 dev 参数缓冲区溢出问题。各发行版用户应安装对应安全更新（如 Red Hat 的 2000-0262 公告）。临时缓解措施可移除 cdrecord 的 setuid 位：chmod u-s /usr/bin/cdrecord，以限制本地普通用户提权风险。"
score = 7.2
severity = "HIGH"
sources = ["cve"]
title = "Mandriva Linux cdrecord 本地缓冲区溢出权限提升漏洞"
updated = "2026-06-16T21:51:46.153"

