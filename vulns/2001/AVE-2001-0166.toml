[basic]
description = "Samba 2.0.x 及之前版本中存在不安全的临时文件符号链接漏洞。本地攻击者可通过向 /tmp 目录创建恶意符号链接，诱使 Samba 服务在处理打印机队列查询、smbclient 的 more 命令或 mput 命令时，以提升的权限覆盖任意系统文件。该漏洞利用条件为攻击者拥有本地访问权限，CVSS 评分 2.1，危害等级低，影响 Samba 2.2.0 之前的所有版本。"
published = "2001-07-02T04:00:00.000"
remediation = "升级至 Samba 2.2.0 或更高版本，该版本修复了临时文件符号链接竞争条件问题。如无法立即升级，可限制 smbclient 的本地访问权限，仅允许受信用户执行 smbclient 命令，并避免在多用户环境下使用打印机队列查询功能。同时可配置严格的 umask 策略和文件系统权限，减少符号链接攻击面。"
score = 2.1
severity = "LOW"
sources = ["exploitdb"]
title = "Samba 2.0.x 临时文件符号链接漏洞"
updated = "2026-06-16T21:54:14.870"

