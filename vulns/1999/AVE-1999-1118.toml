[basic]
description = "Cisco IOS 11.1CC 和 11.1CT 版本启用了分布式快速交换（DFS）功能时存在安全绕过漏洞。远程攻击者利用该漏洞可绕过特定访问控制列表（ACL）的限制，当路由器将流量从启用了 DFS 的接口交换到未启用 DFS 的接口时，本应被 ACL 拦截的恶意流量可能被错误放行，导致未授权网络访问。该漏洞 CVSS 评分 7.5，危害等级高，影响使用相关 Cisco IOS 版本的网络设备。"
published = "1999-12-31T05:00:00.000"
remediation = "升级 Cisco IOS 至 11.1(13)CC 或 11.1(13)CT 及以上版本，或在受影响的接口上禁用 distributed fast switching（DFS）功能，使用常规 fast switching 或 process switching 作为临时缓解措施。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "Cisco IOS 分布式快速交换访问控制列表绕过漏洞"
updated = "2026-06-16T21:50:29.780"

