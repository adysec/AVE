[basic]
description = "tags to ensure proper formatting.<value>Apple Mac OS 8 8.6 操作系统中存在密码存储弱加密漏洞，该系统使用弱加密算法存储在用户与用户组数据文件中的密码。攻击者可借此漏洞无需任何身份验证即可访问系统中的用户密码数据，窃取敏感信息。通过暴力破解或密码重放技术，攻击者可以轻易获取受害者密码，进而获得对系统的非法访问权限，对用户隐私安全构成严重威胁。"
published = "1999-07-10T04:00:00.000"
remediation = "建议升级到 macOS 10.x 或更高版本，彻底替换已终止支持的 Mac OS 8。当前系统应立即禁用本地用户账户并迁移到现代认证机制。为确保安全性，请启用 FileVault 磁盘加密并使用 Stronger密码策略，修改默认的弱加密算法。如果无法立即升级，请通过安全外设设备限制网络访问，并部署第三方安全软件以监控密码存储区域。"
