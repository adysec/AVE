[basic]
description = "Oracle 8.x Intelligent Agent for Unix 中包含的 oratclsh 解释器未正确限制 Tcl 命令执行权限，本地用户可利用该解释器以 root 权限执行任意 Tcl 命令，实现本地权限提升。攻击者需要拥有系统本地访问权限，利用此漏洞可完全控制受影响的 Oracle 服务器。"
published = "1999-04-29"
remediation = "应用 Oracle 官方针对 8.x Intelligent Agent 的安全补丁。如无法立即修补，建议限制对 oratclsh 二进制文件的执行权限，仅允许受信任的管理员用户访问，并监控系统异常进程执行行为。"
score = 4.6
severity = "MEDIUM"
sources = ["cve"]
title = "Oracle 8.x Intelligent Agent Unix版 oratclsh 解释器本地权限提升漏洞"
updated = "2024-08-01"

