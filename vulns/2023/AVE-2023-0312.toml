[basic]
description = "广联达协同办公管理平台存在SQL注入漏洞，攻击者可通过构造恶意的SQL语句作为参数传入存在缺陷的查询接口，绕过系统鉴权并直接操作后台数据库。成功利用该漏洞可读取、篡改或删除业务数据，甚至进一步获取服务器权限。攻击条件为攻击者能够访问存在漏洞的Web接口并发送特制的HTTP请求，无需身份认证即可发起远程攻击。"
published = "2023-08-08"
remediation = "升级广联达协同办公管理平台至官方发布的安全修复版本；在数据库访问层统一使用参数化查询或预编译语句替代动态拼接SQL，对用户输入进行严格白名单校验与过滤；如暂无法升级，建议在应用服务器前部署WAF并配置SQL注入防护规则，同时临时限制平台公网访问权限，仅允许内网或VPN访问，直至完成版本升级。"
score = 5.5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "广联达 协同办公管理平台 SQL注入漏洞"
updated = "2023-08-08"

