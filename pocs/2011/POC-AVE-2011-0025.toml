[info]
author = "AVE"
description = "检测 D-Link DIR-300 路由器管理页面是否在 HTML 响应中泄露明文密码。该路由器在固件中以明文存储管理员密码，通过访问管理界面可获取明文凭据。"
id = "POC-AVE-2011-0025"
name = "D-Link DIR-300 明文密码存储信息泄露 PoC"
severity = "medium"
tags = [
    "cve-2011-4723",
    "d-link",
    "dir-300",
    "cleartext-password",
]
vuln_id = [
    "CVE-2011-4723",
    "AVE-2011-0025",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "password=",
    "pwd=",
    "admin=",
]
