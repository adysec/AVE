[basic]
description = "Eastman Work Management 3.21 版本将用户密码以明文形式存储在注册表的 COMMON 和 LOCATOR 键值中，存在安全隐患。具有本地访问权限的攻击者可通过读取这些注册表项获取凭据，进而提升系统权限。此漏洞利用条件为需要本地访问权限，CVSS 评分 4.6，危害等级中危。"
published = "1999-06-24T04:00:00.000"
remediation = "升级 Eastman Work Management 至 3.21 以上版本，或迁移至受支持的替代产品。如无法升级，通过注册表 ACL 限制 COMMON 和 LOCATOR 键仅允许管理员访问，并启用 Windows 审核策略监控对该注册表路径的异常读取行为。"
score = 4.6
severity = "MEDIUM"
sources = ["avd"]
title = "Eastman Work Management 明文密码存储漏洞"
updated = "2026-06-16T21:50:30.620"

