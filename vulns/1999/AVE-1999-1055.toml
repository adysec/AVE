[basic]
description = "Linux 2.2.10 及更早版本中使用 ipchains 的 NAT 功能、以及 FreeBSD 3.2 中使用 ipfw 的 NAT 功能存在拒绝服务漏洞。远程攻击者可通过向目标系统发送特制的 `ping -R`（记录路由）ICMP 数据包触发内核 panic，导致系统崩溃。该漏洞影响 Linux 2.2.x 系列及 FreeBSD 3.2 等版本，仅需网络可达即可远程触发，无需认证。"
published = "1999-12-31T05:00:00.000"
remediation = "Linux 用户应将内核升级至 2.4.0 及以上版本（或改用 iptables/nftables），FreeBSD 用户应升级至 4.0 及以上版本。临时缓解措施：在 ipchains 或 ipfw 规则中添加丢弃带记录路由选项（record route）的 ICMP 包，或禁用 NAT 功能以避免触发内核 panic。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Linux ipchains 与 FreeBSD ipfw NAT 拒绝服务漏洞"
updated = "2026-06-16T21:50:13.823"

