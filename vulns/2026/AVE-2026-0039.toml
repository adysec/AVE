[basic]
description = "Chrome 浏览器的 PDF 渲染引擎 PDFium 在处理特制 PDF 文件时存在内存损坏漏洞，攻击者可构造恶意的 PDF 文档，通过社会工程学方式诱导用户在 Chrome 中打开该文件，成功利用此漏洞可在目标系统上实现远程代码执行。该漏洞影响当时最新版本的 Google Chrome 浏览器，覆盖 Windows、macOS 及 Linux 平台，攻击者可在浏览器沙盒环境中获得代码执行权限，若配合沙盒逃逸漏洞可造成更大危害。"
published = "08.14"
remediation = '立即升级 Google Chrome 至 116.0.5845.96 及以上版本，通过 chrome://settings/help 自动更新并重启浏览器。企业用户通过 Google 管理控制台推送该安全更新。若无法立即升级，可在 Chrome 设置中关闭 PDF 内置预览功能（设置→隐私和安全→网站设置→PDF 文档→关闭"下载 PDF 文件"），并避免打开来源不明的 PDF 文件作为临时缓解措施。'
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "Google Chrome PDF 远程代码执行漏洞"
updated = "08.14"

