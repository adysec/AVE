[basic]
description = "MailStudio 2000 是 3R Soft 开发的基于 Web 的邮件管理软件，其 2.0 及更早版本中的 userreg.cgi CGI 脚本同时存在命令注入和栈缓冲区溢出漏洞。远程攻击者无需身份认证，即可利用该漏洞以 root 身份在目标系统上执行任意命令或代码。一方面，攻击者可通过在 CGI 参数中注入 shell 元字符（如 %0a 换行符）将恶意命令直接传递至 shell 执行；另一方面，通过向 /cgi-auth/userreg.cgi 发送超长特制 POST 请求触发栈溢出，可覆盖返回地址并执行 shellcode。该漏洞影响部署 MailStudio 2000 2.0 的所有 Linux/Windows 服务器，成功利用后攻击者可读取系统敏感文件、窃取邮件与密码、修改或删除用户数据，并进一步控制整个服务器。由于攻击向量为网络、攻击复杂度低且无需任何授权，CVSS v2 基础评分满分 10.0，危害极其严重。"
published = "2000-06-09T04:00:00.000"
remediation = "立即将 MailStudio 2000 升级至厂商发布的安全修复版本，或迁移至受支持的后续版本。如暂时无法升级，应在 Web 服务器配置中删除或禁用 /cgi-auth/userreg.cgi 脚本，仅保留必要的 CGI 功能；同时修改该文件权限为不可执行（如 chmod 644），并在防火墙或 WAF 中拦截包含换行符（%0a、%0d）、管道符（|）、分号（;）等 shell 元字符的 HTTP 请求，作为临时缓解措施。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "3R Soft MailStudio 2000 2.0 任意命令执行漏洞"
updated = "2026-06-16T21:51:55.630"

