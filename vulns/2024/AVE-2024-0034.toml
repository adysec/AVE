description = "赛蓝企业管理系统 EHR 模块的 SubmitUploadify 接口存在任意文件上传漏洞，未授权的远程攻击者可通过构造特制的 multipart/form-data 请求，向目标系统上传包含恶意代码的 .aspx 文件，进而获取服务器权限实现远程代码执行。攻击无需任何身份认证，仅需目标系统开放相关接口即可利用，危害严重。"
published = "0807"
