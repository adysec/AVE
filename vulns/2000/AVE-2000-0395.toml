[basic]
description = "ISC innd 2.2.2 存在远程缓冲区溢出漏洞，远程攻击者可通过向目标新闻服务器发送包含超长消息 ID 的 cancel 请求触发栈缓冲区溢出，导致任意代码执行或服务拒绝。该漏洞影响 ISC InterNetNews 2.2.2 版本，攻击无需认证但复杂度较高，需向默认 119 端口发送特制 NNTP 数据包触发。"
published = "2000-02-06T05:00:00.000"
remediation = "升级 ISC innd 至 2.3.0 或更高版本，该版本已修复 cancel 请求消息 ID 长度检查逻辑，防止缓冲区溢出。如无法升级，可在 innd.conf 中限制允许执行 cancel 操作的来源 IP 范围，或禁用远程 cancel 功能作为临时缓解措施。"
score = 3.6
severity = "LOW"
sources = ["exploitdb"]
title = "ISC innd 远程缓冲区溢出漏洞"
updated = "2026-06-16T21:51:48.463"

