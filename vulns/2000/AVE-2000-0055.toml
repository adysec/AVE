[basic]
description = "SCO UnixWare 7.1 系统中的 i2odialogd 守护进程存在远程缓冲区溢出漏洞。该进程在解析用户认证请求时，未对传入的用户名或密码授权字符串长度进行边界校验，攻击者可通过网络向目标服务发送超长的认证字符串，使栈缓冲区溢出并覆盖返回地址，从而以 root 权限执行任意代码。该漏洞无需身份认证，影响开启了 i2odialogd 服务的 UnixWare 7.1 主机，攻击条件仅需网络可达目标端口，危害等级为严重。"
published = "1999-12-21T05:00:00.000"
remediation = "建议安装 SCO 官方安全补丁以修复 i2odialogd 缓冲区溢出漏洞，补丁下载地址为 http://www.sco.com/security，或升级至 UnixWare 7.1.1 及更高版本。若暂无法立即打补丁，可通过执行 `scoshutdown i2odialogd` 停止该守护进程，并修改 `/etc/inetd.conf` 注释掉 i2odialogd 相关行以阻止其重启，作为临时缓解措施。同时建议在防火墙层面限制对 i2odialogd 服务端口的远程访问。"
score = 10
severity = "CRITICAL"
sources = ["exploitdb"]
