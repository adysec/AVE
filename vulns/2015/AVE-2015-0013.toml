[basic]
description = "WordPress WP Attachment Export 插件（版本低于 0.2.4）存在授权机制缺失漏洞（CWE-862）。该插件在导出附件/文章 XML 数据时未对用户身份进行有效验证，导致未经认证的远程攻击者可直接通过构造特制的 HTTP 请求访问导出接口，下载包含所有附件及文章详细信息的 XML 文件，造成敏感信息泄露。攻击者无需任何权限或用户交互，仅需网络访问即可利用该漏洞。CVSS 评分 7.5，危害等级高。"
published = "2021-11-01T09:15:08.093"
remediation = "立即将 WP Attachment Export 插件升级至 0.2.4 或更高版本，该版本已添加权限检查，阻止未认证用户下载附件 XML 数据。如无法立即升级，可临时在 WordPress 网站根目录的 .htaccess 或 Nginx 配置中添加规则，阻止对 `/wp-content/plugins/wp-attachment-export/` 目录的匿名访问。"
score = 7.5
severity = "HIGH"
sources = ["nuclei"]
title = "WordPress WP Attachment Export 插件授权机制缺失漏洞"
updated = "2026-06-17T00:23:23.630"

