[basic]
description = "LPRng 3.6.x 版本在安装时将 lpd 守护进程错误地设置了 setuid root 权限，导致本地用户可利用该权限向任意文件中追加 lpd 调试跟踪日志信息。该漏洞源于不正确的文件权限配置，攻击者需拥有本地系统访问权限，利用 lpd 的日志功能将任意内容写入系统文件，可能造成日志伪造或敏感信息泄露。CVSS 评分 2.1，危害等级低。"
published = "2000-07-19T04:00:00.000"
remediation = "建议升级 LPRng 至 3.7.0 或更高版本，该版本移除了 lpd 的不必要 setuid root 权限设置。如无法升级，可立即执行 chmod u-s /usr/sbin/lpd 去除 setuid 位，并限制本地非授权用户对 lpd 日志目录的写入权限作为临时缓解措施。"
score = 2.1
severity = "LOW"
sources = ["cve"]
title = "LPRng LPD setuid root 权限配置不当导致日志信息泄露漏洞"
updated = "2026-06-16T21:52:06.920"

