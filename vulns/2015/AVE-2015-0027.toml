[basic]
description = "ElasticSearch 在 1.4.5 之前及 1.5.2 之前的 1.5.x 版本中，当启用 site 插件时存在目录遍历漏洞。远程攻击者可通过向目标 ElasticSearch 服务发送特制的 HTTP 请求，利用 site 插件对路径过滤不严的缺陷，实现跨目录读取服务器上的任意文件（如 /etc/passwd 等敏感文件）。该漏洞危害等级中危，CVSS 评分 4.3，攻击复杂度较高（需启用 site 插件），但无需身份认证即可利用。官方已在 1.4.5 和 1.5.2 版本中修复此漏洞。"
published = "2015-05-01T15:59:06.850"
remediation = "升级 Elasticsearch 至 1.4.5 或 1.5.2 及以上版本。如无法立即升级，可禁用所有 site 插件（删除 plugins 目录下非必要插件），或在反向代理层配置规则拦截包含 `../` 的 URL 路径请求作为临时缓解措施。"
score = 4.3
severity = "MEDIUM"
sources = ["nuclei"]
title = "Elasticsearch site插件目录遍历与文件读取漏洞"
updated = "2026-06-17T00:25:45.857"

