[basic]
description = 'IBM Lotus Domino R5 和 R6 版本 WebMail 模块在启用"为所有字段生成 HTML"选项时，将 names.nsf 中的敏感数据存储在隐藏表单字段中。远程攻击者可通过查看 HTML 源码获取包括 HTTPPassword 字段中的密码哈希值、密码修改日期、客户端平台与机器名等敏感信息，导致凭据泄露。CVSS 评分 5.0，危害等级中等。'
published = "2005-08-03T04:00:00.000"
remediation = "在 Domino Designer 中打开 Person 表单，在表单属性第 2 个标签页中取消勾选「Generate HTML for all fields（为所有字段生成 HTML）」；同时打开 $PersonalInheritableSchema 子表单，将 $dspHTTPPassword 和 HTTPPassword 字段的属性中「Hide paragraph from（隐藏段落对象）」勾选 Web 浏览器。建议同步升级至 IBM Lotus Domino R7 及以上版本以彻底修复。"
score = 5
severity = "MEDIUM"
sources = ["nuclei"]
title = "IBM Lotus Domino names.nsf 敏感信息泄漏漏洞"
updated = "2026-06-16T22:14:52.093"

