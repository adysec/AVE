[basic]
description = "Citrix MetaFrame 1.0/1.8 的 ICA（Independent Computing Architecture）协议在用户身份认证过程中仅采用弱加密算法（简单 XOR）保护凭据。攻击者在能够嗅探或截获客户端与服务器之间网络流量的条件下，可轻易还原出经 XOR 处理后的用户名与密码，进而冒用合法账号登录远程桌面会话。该缺陷属于网络可达、无需先验认证的凭据泄露问题，可导致完整机密性与完整性丧失，NVD 给出 CVSS 2.0 评分为 10.0（高危）。受影响产品主要为早期 Citrix MetaFrame 1.0 与 1.8 版本。"
published = "2000-03-29T05:00:00.000"
remediation = "升级到 Citrix MetaFrame 1.8 Service Pack 2 或更高版本，该版本已采用更强的加密方式替代原有 XOR 弱加密。如无法立即升级，应在边界防火墙处限制 1494 端口（ICA 协议）仅对受信任的管理网段开放，并通过 VPN 隧道传输 ICA 流量以缓解明文凭证被截获的风险。"
score = 10
severity = "CRITICAL"
sources = ["cve"]
title = "Citrix Metaframe ICA 协议弱加密漏洞"
updated = "2026-06-16T21:51:18.517"

