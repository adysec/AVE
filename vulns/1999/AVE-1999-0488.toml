[basic]
description = "Microsoft Windows NT 4.0 的 WINS 服务存在安全漏洞，远程攻击者可通过 SNMP 协议向目标 WINS 服务器发送特制请求，删除 WINS 数据库中的所有记录，导致网络名称解析服务失效。该漏洞影响 Windows NT 4.0 系统，攻击者无需认证即可利用 SNMP 管理接口实施拒绝服务攻击，危害等级中等。"
published = "1997-10-01T04:00:00.000"
remediation = '安装 Windows NT 4.0 Service Pack 5 或更高版本补丁，或升级至 Windows 2000 及以上版本。临时缓解措施：在防火墙及主机层面限制 SNMP 服务 (UDP 161) 的访问来源，仅允许受信任的管理主机访问，并在 WINS 服务器上配置 SNMP 读写团体字串为复杂值，避免使用默认的 "public"。'
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Microsoft Windows WINS 拒绝服务漏洞"
updated = "2026-06-16T21:48:05.503"

