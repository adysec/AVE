[basic]
description = "bootpd 是 BOOTP（Bootstrap Protocol）协议服务器程序，2.4.3 及更早版本在处理客户端请求时，对 boot file 位置字段缺乏长度校验，当接收到包含超长路径字符串的请求时会发生缓冲区溢出。该漏洞影响使用受影响版本 bootpd 的系统，远程未经身份认证的攻击者可通过发送特制的 BOOTP 请求触发溢出，导致服务崩溃或可能执行任意代码，进而影响网络启动服务的可用性。"
published = "1997-06-01T04:00:00.000"
remediation = "升级 bootpd 至 2.4.4 或更高版本以修复缓冲区溢出。若无法立即升级，可在 /etc/inetd.conf 中禁用 bootpd 服务，或通过防火墙限制仅允许受信任的 DHCP/BOOTP 客户端网段访问 67/UDP 端口作为临时缓解措施。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "BSD bootpd 远程缓冲区溢出漏洞"
updated = "2026-06-16T21:49:04.920"

