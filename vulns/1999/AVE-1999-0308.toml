[basic]
description = "CDE 日历管理器服务守护进程（rpc.cmsd）存在缓冲区溢出漏洞，远程攻击者无需身份认证即可向目标系统发送特制的 RPC 请求触发该漏洞，导致拒绝服务或任意代码执行。该漏洞影响 Caldera OpenUnix 8.0、UnixWare 7.1.1、HP HP-UX 11.0、Solaris 7.0 及 SunOS 4.1.4 等多个 UNIX 操作系统版本，CVSS 评分 10.0，危害等级严重。"
published = "1999-07-01T04:00:00.000"
remediation = "立即安装各厂商提供的安全补丁：HP-UX 11.0 安装 PHCO_20200 或更新版本补丁；Solaris 7.0 安装 106900-07 或更新版本；UnixWare/OpenUnix 安装 Caldera 官方补丁。如无法打补丁，在 inetd.conf 中注释 rpc.cmsd 服务行并重启 inetd 以禁用 CDE 日历管理器服务，或在防火墙层面阻止 TCP 端口 611 的入站访问。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "CDE rpc.cmsd 日历管理服务守护进程缓冲区溢出漏洞"
updated = "2026-06-16T21:48:52.067"

