[basic]
description = "Make-a-Store OrderPage 购物车应用程序存在信息修改漏洞，该应用在处理订单时使用隐藏表单字段传递敏感购买信息（如商品价格、数量、用户标识等），但未对客户端提交的数据进行严格的服务端校验。未经身份认证的远程攻击者可通过拦截或篡改页面中的隐藏表单字段，将敏感购买信息修改为任意值，从而以更低价格完成订单或篡改购买内容。该漏洞影响部署 Make-a-Store OrderPage 购物车应用的网站，攻击者只需通过浏览器开发者工具或代理工具修改隐藏字段参数即可发起利用，无需复杂技术手段，危害等级为高。"
published = "2000-02-01T05:00:00.000"
remediation = "立即升级 Make-a-Store OrderPage 至官方修复版本（2000 年 2 月及之后的安全发布版），并在服务器端对订单金额、数量、商品 ID 等敏感字段做重算与签名校验，丢弃前端提交的隐藏表单值；部署前用 WAF 规则拦截篡改 price/total 等隐藏字段的请求作为临时缓解措施。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
