[basic]
description = "Alex Heiphetz Group 开发的 eZshopper 3.0 电子商务软件中 loadpage.cgi CGI 脚本存在目录遍历与远程命令执行漏洞。攻击者可通过在 URL 参数中使用 `..`（点点）路径遍历手法读取服务器上任意文件，或通过 shell 元字符注入执行任意系统命令。该漏洞无需身份认证即可远程利用，影响 eZshopper 3.0 版本，CVSS 评分 7.5，危害等级高。厂商至今未发布官方补丁，建议用户停止使用该软件或通过 Web 服务器访问控制限制 CGI 脚本的访问。"
published = "2000-02-27T05:00:00.000"
remediation = "该产品已停止维护，无官方补丁可用。建议立即从 Web 服务器中删除或禁用 loadpage.cgi 脚本，并在 Apache/Nginx 中配置访问控制规则拒绝访问 /cgi-bin/ 目录下的 .cgi 文件。如业务仍依赖该软件，建议迁移至仍在维护的替代电商平台，或使用 WAF 规则拦截包含 ../ 及 shell 元字符的请求作为临时缓解措施。"
score = 7.5
severity = "HIGH"
sources = ["exploitdb"]
title = "Alex Heiphetz Group eZshopper 3.0 loadpage.cgi 远程命令执行漏洞"
updated = "2026-06-16T21:51:10.903"

