[basic]
description = "Check Point VPN-1/FireWall-1 4.1 SP2 的 Fast Mode 功能存在访问限制绕过漏洞。远程攻击者无需身份认证，通过向目标防火墙发送特制的畸形 TCP 分片数据包，可绕过防火墙规则过滤，将恶意流量穿透至受保护的内网。该漏洞影响 Check Point Firewall-1 4.1 SP2 版本，CVSS 评分 7.5，危害等级高。厂商建议禁用 Fast Mode 功能或升级至修复版本。"
published = "2001-02-12"
remediation = "升级至 Check Point Firewall-1 下一代版本（如 NG FP1 及以上），或禁用 Fast Mode 功能（在 Security Policy → Properties 中取消勾选 Accept Fast Mode）。对于无法升级的环境，可在网络边界设备上配置碎片重组策略，丢弃非法的微小 TCP 分片包。"
score = 7.5
severity = "HIGH"
sources = [
    "cve",
    "exploitdb",
]
title = "Check Point Software FireWall-1 Fast Mode TCP 碎片绕过限制漏洞"
updated = "2026-06-16"

