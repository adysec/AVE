[info]
author = "ave"
description = "CVE-1999-0045 PoC - FrontPage Server Extensions shtml.dll remote command execution"
id = "POC-AVE-1999-0113"
name = "CVE-1999-0045 PoC"
severity = "medium"
tags = [
    "cve-1999-0045",
    "ave-1999-0113",
]
vuln_id = [
    "CVE-1999-0045",
    "AVE-1999-0113",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/_vti_bin/shtml.dll"
