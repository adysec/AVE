[basic]
description = "InterScan VirusWall 的 SMTP 扫描引擎在处理畸形附件时存在扫描绕过漏洞。远程攻击者可通过向目标邮件服务器发送特制附件的电子邮件，绕过病毒扫描检测，将恶意代码或病毒文件传输至受保护网络内部。该漏洞影响 InterScan VirusWall 的 SMTP 扫描模块，攻击者无需认证即可利用，可能导致企业内部网络遭受病毒传播和恶意代码侵入。Trend Micro 已发布相关安全公告。"
published = "1999-12-27T05:00:00.000"
remediation = "建议将 Trend Micro InterScan VirusWall 升级至已修复此漏洞的版本（Trend Micro 已发布安全补丁），或在 SMTP 扫描配置中启用严格 MIME 解析策略，对 Content-Type 异常或结构畸形的附件直接隔离或拒绝处理。如无法立即升级，可在邮件网关层添加深度包检测规则，拦截 MIME 编码格式异常的邮件作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Trend Micro InterScan VirusWall SMTP 扫描绕过漏洞"
updated = "2026-06-16T21:50:51.807"

