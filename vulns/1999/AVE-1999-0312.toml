[basic]
description = "Windows NT 4.0 远程访问服务（RAS）客户端在处理电话簿条目时存在未经检查的缓冲区，攻击者可通过向 RAS 客户端提供特制的畸形电话簿条目触发缓冲区溢出，导致拒绝服务或任意代码执行。该漏洞影响 RAS 客户端而非服务器，攻击者需要具有添加或修改电话簿条目的权限方可利用，无法通过远程直接利用。"
published = "1999-05-20"
remediation = "安装微软安全公告 MS99-016 提供的补丁程序，升级 Windows NT 4.0 RAS 客户端至修补版本，限制电话簿文件的 ACL 权限仅允许授权用户修改，防止非授权用户通过畸形电话簿条目触发缓冲区溢出。"
score = 4.6
severity = "MEDIUM"
sources = ["cve"]
title = "Microsoft Windows NT 远程访问服务电话簿条目缓冲区溢出漏洞"
updated = "2026-06-16"

