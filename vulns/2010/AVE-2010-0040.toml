[basic]
description = "Joomla! 的 AlphaUserPoints 组件 1.5.5 版本存在目录遍历漏洞（CWE-22）。远程攻击者可通过向 index.php 的 view 参数传入 `../` 序列绕过路径限制，实现任意文件读取，可能进一步导致敏感信息泄露或其他未明影响。该漏洞利用难度低，无需身份认证即可触发，影响运行该组件的 Joomla! 站点。"
published = "2010-04-19T19:30:00.947"
remediation = "立即升级 AlphaUserPoints 组件至官方最新版本（高于 1.5.5），或在 Joomla! 后台卸载 com_alphauserpoints 组件以彻底消除风险。如因业务必须保留，可修改 controller.php 中对 view 参数的取值逻辑，过滤 `../` 等目录穿越字符，并限制 view 参数仅允许字母数字和白名单路径。"
score = 6.8
severity = "MEDIUM"
sources = ["nuclei"]
title = "Joomla! AlphaUserPoints 组件 1.5.5 本地文件包含漏洞"
updated = "2026-06-16T23:18:28.053"

