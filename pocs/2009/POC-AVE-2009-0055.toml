[info]
author = "AVE"
description = "Microsoft Office Word 栈缓冲区溢出漏洞验证，通过 HTTP 发送特制 Word 文档（含无效长度字段标签）触发远程代码执行"
id = "POC-AVE-2009-0055"
name = "CVE-2009-0563 PoC"
severity = "high"
tags = ["cve-2009-0563"]
vuln_id = [
    "CVE-2009-0563",
    "AVE-2009-0055",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/CVE-2009-0563.doc"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["Word"]
