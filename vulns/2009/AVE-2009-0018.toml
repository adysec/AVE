[basic]
description = "Cisco IOS XR 系统在 BGP 协议实现中存在输入验证不当漏洞，远程攻击者无需身份认证即可向目标设备发送包含非法属性的特制 BGP UPDATE 消息，触发 BGP 会话重置，导致拒绝服务。该漏洞影响 IOS XR 3.4.0 至 3.8.1 版本，CVSS v3.1 评分 5.9，已被 CISA 列入已知被利用漏洞目录，2009 年 8 月已有野外利用案例。"
published = "2009-08-20"
remediation = "立即安装对应版本的 Cisco IOS XR SMU 补丁（如 hfr-rout-3.4.1.CSCtb18562 或 c12k-rout-3.4.1.CSCtb18562），具体 SMU ID 请根据设备平台和运行版本在 Cisco 公告中查询；升级至 3.8.1 之后的修复版本。若无法立即打补丁，可在 BGP 邻居入方向应用 RPL 路由策略过滤含异常 AS_PATH 的更新，或协调上游邻居在出方向上过滤存在问题的前缀通告。"
score = 5
severity = "MEDIUM"
sources = ["kev"]
title = "Cisco IOS XR BGP 拒绝服务漏洞"
updated = "2009-08-20"

