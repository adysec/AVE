[basic]
description = '运行 IOS 的思科千兆交换机和路由器在访问控制列表（ACL）中对 "established" 关键字存在不当处理，导致网络访问控制机制被绕过。未经身份认证的远程攻击者可通过向目标设备发送特制的 TCP 数据包，利用该漏洞让设备转发原本被 ACL 规则拒绝的未经授权数据包，从而绕过防火墙或路由器的访问控制策略。该漏洞影响运行 IOS 的思科千兆交换机及路由器系列产品，CVSS 评分 10.0，危害等级严重。'
published = "1999-06-10T04:00:00.000"
remediation = '升级受影响的 Cisco 千兆交换机/路由器至修复了该 ACL "established" 关键字处理缺陷的 IOS 版本（如 11.2(15)GS 及以上、12.0 系列对应修复版本），通过思科 Software Center 下载并安装官方 IOS 镜像；在无法立即升级时，临时修改访问控制列表，移除或重寫存在缺陷的 "established" 规则，改用基于状态的 CBAC 防火墙检查，并在边界过滤非法入站 TCP 数据包作为缓解措施。'
score = 10
severity = "CRITICAL"
sources = ["epss"]
