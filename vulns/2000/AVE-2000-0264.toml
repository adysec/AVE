[basic]
description = "SCO OpenServer 系统中的 calserver 组件存在远程缓冲区溢出漏洞。未经身份认证的远程攻击者可通过向目标系统的 calserver 服务发送特制的超长消息，触发缓冲区溢出，从而以 root 权限执行任意代码。该漏洞影响 SCO OpenServer 5.0.x 版本，攻击无需任何认证即可远程利用，且漏洞利用代码已公开，实际危害较高。"
published = "2001-03-12T05:00:00.000"
remediation = "立即应用 SCO 安全公告 SB-99.02a 提供的补丁，升级 calserver 组件至修复版本。由于 SCO OpenServer 5 已停止维护，建议迁移至受支持的操作系统平台。临时缓解措施：在 inetd 配置中禁用 calserver 服务，或在防火墙层面限制对 calserver 端口（通常为 615/tcp）的访问。"
score = 10
severity = "CRITICAL"
sources = ["cve"]
title = "SCO OpenServer calserver 远程缓冲区溢出漏洞"
updated = "2026-06-16T21:51:26.513"

