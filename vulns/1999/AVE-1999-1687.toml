[basic]
description = "Microsoft Excel 97 在执行工作表函数前不会向用户发出任何警告或确认提示。攻击者可在恶意构造的 Excel 文档中利用内置的 CALL 工作表函数加载并执行一个恶意的 DLL 动态链接库，从而在受害者系统上执行任意命令。该漏洞影响 Microsoft Excel 97 版本，攻击条件为诱导用户打开特制的 Excel 文件，属于典型的恶意文档投递型代码执行漏洞，用户一旦打开文档即可能在无感知的情况下被远程控制。"
published = "1999-12-31T05:00:00.000"
remediation = "将 Microsoft Excel 升级到 Office 2000 SR-1 或安装 Microsoft 安全公告 MS99-022 提供的补丁，该补丁已禁止 CALL 函数加载外部 DLL。如暂时无法升级，可在组策略中禁用 Excel 加载宏与调用外部函数，并限制用户打开来自不可信来源的 Excel 文档，以避免通过恶意工作簿执行恶意 DLL。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
