[basic]
description = "Cisco Catalyst SD-WAN Controller 中存在认证绕过漏洞，攻击者可通过向 UDP 12346 端口发送特制报文绕过身份验证机制，未授权访问控制器管理接口，进而获取设备配置信息并可能进一步控制受影响设备，危害较大。"
published = "2026-07-21"
remediation = "升级至 Cisco Catalyst SD-WAN Controller 20.19.1 及以上版本，同时在网络边界防火墙上禁止 UDP 12346 端口对外暴露，限制管理接口的访问来源 IP。"
