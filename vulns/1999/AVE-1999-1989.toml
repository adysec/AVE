[basic]
description = "web_listener 是一款用于监听网络连接的工具。该工具存在认证绕过漏洞，攻击者可在未提供有效凭证的情况下访问本应受保护的监听端口或管理功能，从而读取、重定向或干扰经过该监听器的网络流量。攻击只需能够与目标监听器建立网络连接即可发起，无需用户交互。厂商已确认该问题并提供了修复版本。"
published = "1999-12-31"
remediation = "升级 web_listener 到官方发布的修复版本，并限制监听器仅绑定到受信任的内部网络接口，同时配置访问控制列表以校验连接来源。"
score = 5.0
severity = "MEDIUM"
sources = ["cve"]
title = "web_listener 认证绕过漏洞"
updated = "1999-12-31"

