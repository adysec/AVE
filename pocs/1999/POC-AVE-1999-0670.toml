[info]
author = "ave"
description = "检测 Internet Explorer 5/4.01 中 IFRAME 元素上 document.execCommand 方法绕过同源策略读取本地文件的信息泄露漏洞。通过构造包含 IFRAME 和 execCommand 的 HTML 页面，尝试读取本地文件内容以验证漏洞存在。"
id = "POC-AVE-1999-0670"
name = "Microsoft Internet Explorer IFRAME ExecCommand 信息泄露 PoC"
severity = "medium"
tags = ["ave-1999-0670"]
vuln_id = [
    "CVE-1999-0877",
    "AVE-1999-0670",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/poc-ie-iframe-exec.html"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "I1.focus()",
    "document.execCommand",
    "file://c:/test.txt",
]
