[basic]
description = "Xylan OmniSwitch 交换机在 3.2.6 版本之前存在一个安全漏洞，远程攻击者可以通过发送 CTRL-D（控制字符）绕过登录提示。该漏洞导致交换机仅支持一个会话，攻击者利用此漏洞可以锁定其他合法用户，使其无法访问交换机，从而造成拒绝服务。攻击条件简单，攻击者只需通过网络连接到目标交换机并发送特定的控制字符即可触发。"
published = "1999-03-31"
remediation = "将 Xylan OmniSwitch 交换机固件升级至 3.2.6 或更高版本，以修复登录提示绕过漏洞。"
score = 5.0
severity = "MEDIUM"
sources = ["cve"]
title = "Xylan OmniSwitch 登录提示绕过拒绝服务漏洞"
updated = "1999-03-31"

