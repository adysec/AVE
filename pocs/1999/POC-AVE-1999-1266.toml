[info]
author = "AVE"
description = "检测目标系统上 at 命令是否存在。IRIX 6.2 及 NetBSD 1.3.2 及之前版本中 at(1) 存在本地文件读取漏洞，攻击者通过 at -f 参数提交目标文件，利用执行错误信息将文件内容通过邮件发送给攻击者。"
id = "POC-AVE-1999-1266"
name = "CVE-1999-1409 PoC"
severity = "low"
tags = ["cve-1999-1409"]
vuln_id = [
    "CVE-1999-1409",
    "AVE-1999-1266",
]

[poc]
logic = "any"

[[poc.requests]]
path = "/usr/bin/at"
protocol = "file"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [""]
