[basic]
description = "Sun SunOS 4.1.3_U1 和 4.1.4 系统上预装的 sendmail 5 存在多个未指明安全漏洞。远程攻击者可在无需认证的情况下，以低复杂度攻击方式利用这些漏洞实现机密性、完整性和可用性的部分破坏。该漏洞可能与 CVE-1999-0129 描述的通过 .forward 或 :include: 文件写入获取组权限的问题存在重叠。CVSS v2 评分为 7.5，危害等级高。"
published = "1999-12-31"
remediation = "安装 Sun 官方补丁 00159-01（通过 SunSolve 获取），将 sendmail 升级至修补版本。由于 SunOS 4.1.x 已停止技术支持，最彻底的方案是迁移至受支持的 Oracle Solaris 11 或 Linux 等现代操作系统。作为临时缓解措施，在防火墙层面限制对 sendmail 端口（25/tcp）的访问，仅允许受信任来源 IP 连接。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Sendmail 未指明漏洞"
updated = "1999-12-31"

