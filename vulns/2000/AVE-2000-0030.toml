[basic]
description = "InterScan VirusWall SMTP 扫描组件存在邮件附件扫描绕过漏洞。由于程序在处理畸形格式的邮件附件时未能正确扫描其内容，远程攻击者可通过向目标邮件服务器发送特制附件的电子邮件绕过病毒检测机制，导致恶意软件在受保护网络中传播。该漏洞影响趋势科技 InterScan VirusWall 系列产品，CVSS 评分 5.0，危害等级中危。"
published = "1999-12-27T05:00:00.000"
remediation = "升级 InterScan VirusWall 至 3.52 及以上版本，该版本修复了畸形 MIME 附件的解析逻辑。如无法升级，在 SMTP 策略中启用「严格 MIME 解析」选项，并配置附件过滤规则阻止可疑文件类型作为缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Trend Micro InterScan VirusWall 邮件扫描绕过漏洞"
updated = "2026-06-16T21:50:51.807"

