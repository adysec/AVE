[basic]
description = "Hughes Technologies Mini SQL (mSQL) 2.0.11 的 w3-msql CGI 程序存在缓冲区溢出漏洞，远程攻击者可通过向目标服务器发送特制的 HTTP 请求触发该漏洞，导致任意代码执行。该漏洞影响 mSQL 2.0.11 及更早版本，CVSS 评分 10.0，危害等级严重。攻击者无需身份认证即可利用，成功利用后可完全控制目标系统。"
published = "1999-12-27T05:00:00.000"
remediation = "立即升级 mSQL 至 3.0 及以上版本（当前最新为 4.4），该漏洞在后续版本中已修复。如无法升级，直接删除或禁用 w3-msql CGI 程序（位于 cgi-bin 目录），并在 Web 服务器配置中禁止对该脚本的外部访问。同时限制 Web 服务器以非 root 权限运行，降低缓冲区溢出被利用后的影响范围。"
score = 10
severity = "CRITICAL"
sources = ["exploitdb"]
title = "Hughes Technologies Mini SQL (mSQL) w3-msql 远程缓冲区溢出漏洞"
updated = "2026-06-16T21:50:49.253"

