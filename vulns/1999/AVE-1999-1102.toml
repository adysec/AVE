[basic]
description = "IBM Netfinity Remote Control 软件的进程管理器以系统级权限运行，本地攻击者可通过该进程管理器启动任意程序，从而获得管理员权限并执行任意代码。该漏洞影响 IBM Remote Control Software 1.0 版本，CVSS 评分为 7.2，危害等级为高危。攻击者需要具备目标系统的本地访问权限才能利用此漏洞。"
published = "1999-05-25T04:00:00.000"
remediation = "立即升级到 IBM Netfinity Manager 的修复版本，或安装 IBM 官方提供的安全补丁。如无法立即升级，可执行以下缓解措施：限制 WNETFIN 目录的文件级权限，禁止普通用户执行 Netfinity Manager Services；通过 Netfinity Security Manager 禁用 Process Manager 和 Remote Session 组件；将服务账户从 SYSTEM/ADMINISTRATOR 降级为普通用户账户以限制权限；修改 INSTALL.INI 配置文件，阻止 Process Manager 和 Remote Session 的安装。最终建议卸载 IBM Netfinity Remote Control Software 并替换为更安全的远程管理方案。"
score = 7.2
severity = "HIGH"
sources = ["exploitdb"]
title = "IBM Netfinity Remote Control 本地权限提升漏洞"
updated = "2026-06-16T21:50:23.410"

