[basic]
description = "多种 Unix 系统下的 shell 程序（包括 tcsh、csh、sh 和 bash）在处理 here-document 重定向（<< 操作符）时存在符号链接（symlink）竞争条件漏洞。本地攻击者可通过在目标用户执行脚本或命令时创建恶意的符号链接，诱使 shell 程序将输出重定向到攻击者指定的任意文件，从而覆盖其他用户的敏感文件。该漏洞利用条件要求攻击者拥有本地系统访问权限，且能够预测或观察到目标用户使用 here-document 的时机。成功利用可导致任意文件覆写，进而可能实现权限提升或系统破坏。"
published = "2001-01-09T05:00:00.000"
remediation = "升级各 shell 程序至修复版本：tcsh 升级至 6.10 或更高版本，bash 升级至 2.04 或更高版本，csh/tcsh 升级至包含 FreeBSD-SA-00:76 补丁的版本。各 Linux 发行版用户应安装对应安全更新：Red Hat 安装 RHSA-2000:117/RHSA-2000:121，Debian 安装 20001111a 更新，Mandrake 安装 MDKSA-2000:069/MDKSA-2000:075。如无法立即升级，可通过 umask 限制和文件系统审计缓解本地 symlink 攻击风险。"
score = 7.2
severity = "HIGH"
sources = ["redhat"]
title = "多款 Unix Shell 程序 Here-Document 符号链接竞争条件漏洞"
updated = "2026-06-16T21:53:13.380"

