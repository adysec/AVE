[basic]
description = "thttpd HTTP Server 2.03 及更早版本存在路径遍历漏洞。攻击者无需身份认证即可通过向目标服务器发送包含多个连续前导斜杠（/）的 GET 请求，绕过路径限制读取服务器上的任意文件，如配置文件或系统敏感信息。该漏洞源于服务器对 URI 中斜杠字符的过滤不严，导致路径回溯检查失效，影响范围较广。用户应升级至 thttpd 2.04 或更高版本修复此问题。"
published = "1999-12-31T05:00:00.000"
remediation = "升级 thttpd 至 2.04 或更高版本（该版本限制路径中不能包含连续前导斜杠）。如无法升级，可在 Web 服务器前部署反向代理（如 Nginx），在代理层过滤含多个连续斜杠的 GET 请求；或在 thttpd 源码 `libhttpd.c` 中 `httpd_parse_request()` 函数增加对连续前导斜杠的拒绝逻辑后重新编译。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "ACME thttpd HTTP Server 任意文件读取漏洞"
updated = "2026-06-16T21:50:28.777"

