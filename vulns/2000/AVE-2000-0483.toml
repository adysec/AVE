[basic]
description = "AIX 3.2.x 及 4.x 版本的文件系统存在权限控制缺陷，本地用户可通过本地或远程挂载的 AIX 文件系统获取对文件的非授权写入权限。攻击者利用该漏洞可修改系统关键文件或用户数据，破坏文件完整性。攻击条件较低，只需拥有本地用户权限即可触发，无需身份认证，影响系统安全策略的隔离性。"
published = "2000-05-24T04:00:00.000"
remediation = "升级至 AIX 4.3.3 及以上版本，并安装最新的维护包（Maintenance Level）。对于无法立即升级的系统，在 /etc/exports 中为 NFS 导出文件系统添加 `-root=` 选项限制 root 访问，并确保导出目录权限设置为 `rw=client:hostname` 而非全局可写。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "IBM AIX 文件系统权限提升漏洞"
updated = "2026-06-16T21:51:44.430"

