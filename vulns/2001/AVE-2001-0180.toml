[basic]
description = 'BRS WebWeaver FTP 服务器 0.64 Beta 之前版本存在路径泄露漏洞。远程攻击者无需身份认证即可通过向 FTP 服务发送特制的 "CD *" 命令后执行 ls 命令，服务器会返回文件系统的真实绝对路径而非相对路径，导致服务器物理路径信息泄露。攻击者可利用此信息进一步探测系统目录结构，为后续攻击提供情报支持。该漏洞影响 BRS WebWeaver FTP 服务器 0.64 Beta 之前的所有版本，CVSS 评分 5.0，危害等级中危。'
published = "2001-06-27T04:00:00.000"
remediation = "升级 BRS WebWeaver FTP 服务器至 0.64 Beta 或更高版本，该版本已修复 CD * 命令导致路径泄露的问题。如无法立即升级，可在 FTP 服务配置中限制匿名用户的目录遍历权限，或禁用 CD * 通配符命令的使用。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "BRS WebWeaver FTP 服务器路径泄露漏洞"
updated = "2026-06-16T21:54:20.057"

