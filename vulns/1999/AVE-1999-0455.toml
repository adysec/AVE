[basic]
description = "Netscape Enterprise Server 3.x/4.x 版本中存在信息泄露漏洞，攻击者通过向服务器发送特制的 PageServices 查询请求，可获取目标系统上的文件列表与目录结构。该漏洞源于服务器对 PageServices 参数过滤不足，导致目录遍历与文件枚举。攻击者利用此漏洞可收集敏感文件路径、配置信息等，为后续攻击提供情报支撑，CVSS 评分 5.0，危害等级中危。"
published = "1998-08-01T04:00:00.000"
remediation = "建议升级到 Netscape Enterprise Server 4.1 及以上版本，或在服务器配置中禁用 PageServices CGI 程序，删除或重命名 PageServices 相关文件，同时配置访问控制列表（ACL）限制敏感路径的访问。如业务无法升级，可在反向代理或防火墙层面拦截对 /PageServices 路径的请求作为临时缓解。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Netscape Enterprise Server PageServices 信息泄露漏洞"
updated = "2026-06-16T21:48:02.477"

