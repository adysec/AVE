[basic]
description = "施耐德电气 EcoStruxure Data Center Expert（原 StruxureWare Data Center Expert）v9.0 及之前版本中存在硬编码凭据漏洞（CWE-798）。当 SOCKS 代理功能启用时，攻击者在已知管理员凭据和 PostgreSQL 数据库凭据的情况下，可通过网络利用该漏洞实现信息泄露和远程代码执行。SOCKS 代理默认处于禁用状态，但一旦开启将带来严重安全风险。该漏洞 CVSS v4.0 评分为 7.5，危害等级较高，可导致敏感数据泄露、系统完整性破坏及关键业务中断。"
published = "2026-03-10"
remediation = "建议用户立即升级 EcoStruxure Data Center Expert 至 SEVD-2026-069-05 安全公告中指定的修复版本。如无需使用 SOCKS 代理功能，应确保其保持默认禁用状态。同时应限制对管理界面的网络访问，仅允许受信任 IP 连接，并定期更换管理员及数据库凭据。具体补丁文件请从施耐德电气官网下载中心获取。"
score = 7.5
severity = "HIGH"
sources = [
    "zdi",
    "cve",
]
title = "施耐德电气 EcoStruxure Data Center Expert 硬编码凭据远程代码执行漏洞"
updated = "2026-06-17"

