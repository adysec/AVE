[basic]
description = "Linux 内核 CIFS 文件系统客户端在会话初始化过程中存在内存泄漏漏洞，由于 `cifs_ses::auth_key.response` 在重新分配前未正确释放，导致在重连或挂载操作时发生内存泄露。本地低权限攻击者可利用该漏洞反复触发会话重建，耗尽系统内存资源，造成拒绝服务。该漏洞影响 Linux 内核 2.6.37 至 6.1.8 版本及 6.2 候选版本，CVSS 评分 5.5，危害等级中等。Linux 内核社区已在 6.1.9 及后续稳定版本中修复此漏洞。"
published = "2025-03-27T17:15:49.797"
remediation = "将 Linux 内核升级至包含 commit 4ce341b4b8e7（cifs: fix potential memory leaks in session setup）的版本（如 6.6 及以上稳定版），或应用对应发行版（RHEL/Ubuntu/Debian）提供的安全补丁。无法立即更新的情况下，可禁用 SMB1 协议（在 /etc/samba/smb.conf 中设置 min protocol = SMB2）以减少攻击面。"
score = 5.5
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux Kernel CIFS 会话设置内存泄漏漏洞"
updated = "2026-06-17T06:44:06.447"

