[basic]
description = "Debian smtp-refuser 软件包的日志记录功能存在不安全符号链接处理漏洞。本地攻击者可通过创建符号链接将日志文件重定向指向系统任意文件，利用日志写入操作删除目标文件，造成拒绝服务或本地权限提升。该漏洞需本地用户权限方可利用，攻击条件受限，影响 Debian 系统中的 smtp-refuser 软件包。"
published = "1999-08-19T04:00:00.000"
remediation = "Debian 已移除 smtp-refuser 软件包，建议迁移至 Postfix 或 Exim 等现代 MTA。若仍需使用，需将日志目录所有权设为专用系统用户，且日志文件创建时使用 O_EXCL 标志防止跟随符号链接，同时以低权限用户运行守护进程。"
score = 2.1
severity = "LOW"
sources = ["avd"]
title = "Debian smtp-refuser 日志记录本地任意文件删除漏洞"
updated = "2026-06-16T21:48:56.500"

