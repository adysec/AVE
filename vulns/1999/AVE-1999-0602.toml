[basic]
description = "FreeBSD 3.3 操作系统附带的 angband 游戏程序存在缓冲区溢出漏洞，其处理用户输入时未对边界进行正确校验，导致本地用户可通过构造超长的恶意输入数据溢出缓冲区。攻击条件为攻击者需在本机拥有合法账户并能够执行该游戏程序，利用方式是通过向程序传递特制参数或环境变量触发溢出，进而覆盖返回地址并提升自身权限至 root。该漏洞影响 FreeBSD 3.3 系统的 angband 组件，属于本地提权类漏洞，危害中等，需本地访问才能利用。"
published = "1999-12-01T05:00:00.000"
remediation = "升级到已修复该缓冲区溢出问题的 FreeBSD 3.3-STABLE 后续版本或 FreeBSD 3.4 及以上版本；若暂无法升级，请以 root 身份执行 pkg_delete 卸载 angband 游戏包，或将其二进制文件权限设为 755 且属主为 root、移除 setuid 位（chmod u-s /usr/local/bin/angband）以消除本地提权风险。"
score = 4.6
severity = "MEDIUM"
sources = ["avd"]
