[basic]
description = "Microsoft Internet Explorer 5.01 存在跨框架安全策略绕过漏洞。其 Java 实现中的 JSObject 接口未对网页小程序与文档对象模型（DOM）的交互进行充分限制，远程攻击者可通过构造恶意的 Java Applet，借助 JSObject 修改 DOM 属性，将 IFRAME 框架的源设置为任意 JavaScript URL，从而绕过浏览器同源策略与跨框架安全限制。攻击需诱导受害者访问恶意网页并加载该 Applet，成功利用后攻击者可在受害者浏览器上下文中执行脚本、读取受限内容或发起进一步攻击。该漏洞影响运行 IE 5.01 的系统，CVSS 评分约为 2.6，危害等级较低，属于安全策略绕过类问题。"
published = "2000-04-18T04:00:00.000"
remediation = "建议立即将 Internet Explorer 升级至 5.5 或更高版本，并安装 Microsoft 发布的安全更新补丁（如 2000 年 4 月发布的累积安全修补程序）。如暂时无法升级，可在 IE「Internet 选项→安全」中将安全级别调至「高」，禁用 Java  applet 运行与脚本对 DOM 的跨框架访问，作为临时缓解措施。"
score = 2.6
severity = "LOW"
sources = ["cve"]
