[basic]
description = "Solution Scripts Home Free 1.0 中的 search.cgi 脚本存在目录遍历漏洞，远程攻击者可通过在 URL 参数中构造 `..`（点点）序列进行路径穿越，从而读取目标服务器上的任意目录列表。该漏洞无需身份认证即可利用，可导致敏感文件路径泄露。受影响版本为 Solution Scripts Home Free 1.0，建议用户升级或移除该脚本以消除风险。"
published = "1999-01-03T05:00:00.000"
remediation = 'Solution Scripts Home Free 已于 2000 年代初停止维护，无官方补丁。建议立即删除或禁用 `cgi-bin/search.cgi` 脚本；如仍需搜索功能，可在脚本入口处添加输入过滤，拒绝包含 `../`、`..\\` 等路径遍历序列的 `letter` 参数；同时通过 Web 服务器（Apache/Nginx）配置 URL 重写规则，拦截包含路径遍历特征（如 `../`、`%2e%2e`）的请求；最终应迁移至现代受维护的 Web 应用以彻底消除风险。'
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Solution Scripts Home Free 目录遍历漏洞"
updated = "2026-06-16T21:50:54.393"

