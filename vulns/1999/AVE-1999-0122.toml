[basic]
description = "Cisco IOS 12.0 版本运行 NAT（网络地址转换）功能时存在访问控制列表绕过漏洞。由于 NAT 处理数据包的顺序问题，部分本应被入站访问控制列表（ACL）过滤的恶意数据包可能绕过 ACL 检查直接进入内部网络，导致 ACL 安全策略失效。远程攻击者可利用此漏洞绕过访问控制，向受保护网络发送未授权流量。该漏洞影响运行 IOS 12.0 并启用 NAT 功能的 Cisco 路由器设备，CVSS 评分 5.0，危害等级中危。"
published = "1999-04-01T05:00:00.000"
remediation = "升级 Cisco IOS 至 12.0(7) 或更高版本，该版本修复了 NAT 环境下入站访问列表过滤绕过的问题。如无法立即升级，可在入站接口上配置 ip access-group 并启用 ip inspect 或 CBAC 作为临时缓解措施，同时避免在 NAT 接口上依赖纯入站 ACL 过滤。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Cisco IOS 12.0 NAT 输入访问列表过滤绕过漏洞"
updated = "2026-06-16T21:48:24.720"

