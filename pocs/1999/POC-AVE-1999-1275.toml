[info]
author = "AVE"
description = "Linux 2.0/2.1 内核未正确限制用户向任意进程发送 SIGIO 信号，本地攻击者可通过 fcntl(F_SETOWN) 设置文件描述符所有者后启用 O_ASYNC 标志，向目标进程发送 SIGIO 信号导致其异常退出。验证方式：编译并运行 PoC 程序，指定目标 PID 后按回车发送信号。"
id = "POC-AVE-1999-1275"
name = "Linux Kernel SIGIO 任意进程拒绝服务 PoC"
severity = "low"
tags = [
    "cve-1999-1441",
    "dos",
    "linux",
    "kernel",
]
vuln_id = [
    "CVE-1999-1441",
    "AVE-1999-1275",
]

[poc]
logic = "all"

[[poc.requests]]
path = "/tmp/sigio_poc"
protocol = "file"

[[poc.requests.matchers]]
expect = false
part = "body"
type = "word"
words = ["ELF"]
