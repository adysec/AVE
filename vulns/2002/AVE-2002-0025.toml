[basic]
description = "nss_ldap 的 DNS SRV 记录解析代码存在缓冲区溢出漏洞，远程攻击者可通过向使用 nss_ldap 的目标系统发送特制的 DNS SRV 响应触发该漏洞，导致目标服务崩溃（拒绝服务），在特定条件下可能实现任意代码执行。该漏洞影响 nss_ldap-198 之前的所有版本，CVSS 评分 7.5，危害等级高。"
published = "2002-08-12T04:00:00.000"
remediation = "立即升级 nss_ldap 至 nss_ldap-198 或更高版本，该版本修复了 DNS SRV 代码中的缓冲区溢出问题。如无法立即升级，可在 LDAP 客户端配置中禁用 DNS SRV 自动解析功能，或通过防火墙限制对 LDAP 服务器的外部访问作为临时缓解措施。"
score = 7.5
severity = "HIGH"
sources = ["osv"]
title = "nss_ldap DNS SRV 记录处理缓冲区溢出漏洞"
updated = "2026-06-16T21:58:12.480"

