[basic]
description = "GNU Emacs 20 版本在启动新子进程时，未能正确设置从属伪终端（PTY）设备的权限，导致本地用户能够读取或修改 Emacs 与子进程之间的通信内容。该漏洞影响 GNU Emacs 20 版本，攻击者需具备本地系统访问权限，通过访问权限不当的 PTY 设备文件，可窃听或篡改 Emacs 与其子进程（如 Shell、编译器等）间的交互数据，导致信息泄露或进程控制劫持。攻击者需拥有本地账户权限，利用 PTY 权限配置缺陷实施窃听或篡改攻击。CVSS 评分 2.1，属低危本地信息泄露漏洞。"
published = "2000-04-18T04:00:00.000"
remediation = "建议升级到 GNU Emacs 20.2 或更高版本（可通过官方 ftp.gnu.org 下载源码重新编译安装，或使用发行版提供的更新包），该版本修复了启动子进程时从伪终端（PTY）从设备权限设置不当的问题，将 slave PTY 权限由可被同机其他本地用户读写的 0666 改为仅属主可读写的 0600 并正确设置属主。对于无法立即升级的环境，临时缓解措施为：避免在本机多用户共享环境下于 Emacs 中运行含敏感信息的 shell 命令或交互式子进程；通过限制 /dev/pty* 与 /dev/ttyp* 设备节点的默认权限（如由系统管理员将相应设备权限收紧为 0600）降低被其他本地用户窃听或篡改通信的风险；也可改用 screen 或 tmux 等已正确设置 PTY 权限的终端复用器来运行子进程。"
score = 2.1
severity = "LOW"
sources = ["cve"]
title = "GNU Emacs 本地窃听漏洞"
updated = "2026-06-16T21:51:21.877"

