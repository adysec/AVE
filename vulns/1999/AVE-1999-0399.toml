[basic]
description = "Sun Solaris 2.4 至 2.6 版本的 libnsl 库在处理 RPC 服务绑定请求时存在拒绝服务漏洞。未经身份认证的远程攻击者可通过向目标系统的 rpcbind 服务发送特制的 RPC 请求报文，触发 libnsl 库中的缺陷，导致 rpcbind 服务崩溃或停止响应，影响系统正常的 RPC 服务调用。该漏洞影响 Solaris 2.4、2.5、2.5.1 及 2.6 等多个版本。"
published = "1998-07-15"
remediation = "升级 Solaris 至 7.0 及以上版本，该漏洞已在后续版本修复。如无法升级，在 /etc/hosts.deny 中添加 rpcbind 访问控制规则，仅允许信任主机访问 rpcbind 服务（TCP/UDP 111 端口），并在防火墙上限制对该端口的非必要外部访问。"
score = 10.0
severity = "CRITICAL"
sources = [
    "cve",
    "nvd",
]
title = "Sun Solaris rpcbind libnsl 拒绝服务漏洞"
updated = "2026-06-16"

