[basic]
description = "Linux Kernel 2.2 版本的 ldd 命令在处理恶意构造的 core 文件时存在拒绝服务漏洞。本地攻击者可通过诱导用户在包含畸形数据的 core 文件上执行 ldd 命令，触发内核异常导致系统强制重启。该漏洞影响 Linux Kernel 2.2.0 及之前版本，CVSS 评分 4.6，危害等级中危。受影响的系统在攻击者获得普通用户权限后即可实施该攻击，无需额外认证。"
published = "1999-01-26T05:00:00.000"
remediation = "升级 Linux 内核至 2.2.1 或更高版本，该版本已修复 ldd 解析 core 文件时的崩溃问题。如无法立即升级，作为临时缓解措施，禁止对不可信的 core 文件运行 ldd 命令，并通过 sysctl -w kernel.core_uses_pid=1 和设置 fs.suid_dumpable=0 限制核心转储文件的生成与访问权限。"
score = 4.6
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Linux Kernel 2.2 ldd命令处理core文件拒绝服务漏洞"
updated = "2026-06-16T21:48:19.000"

