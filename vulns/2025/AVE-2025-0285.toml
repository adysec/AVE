[basic]
description = "用友NC系统的 deleteEvent 接口存在 SQL 注入漏洞，攻击者可在未经身份认证的情况下向目标系统发送特制请求参数，通过拼接恶意 SQL 语句绕过数据库访问限制，实现敏感信息窃取、数据篡改甚至获取系统控制权限。该漏洞影响用友 NC 系列产品，危害严重，CVSS 评分高危。"
published = "0708"
remediation = "立即联系用友官方获取 deleteEvent 接口安全补丁（访问 security.yonyou.com 或联系 400-6600-588），将 NC 系统升级至最新安全版本。临时缓解措施：在 WAF/IPS 中添加规则拦截 deleteEvent 参数中的 SQL 关键字（如 UNION、SELECT、SLEEP 等），或通过反向代理对 /deleteEvent 路径的请求参数进行严格输入校验，过滤单引号、分号等特殊字符。"
score = 5
severity = "MEDIUM"
