[info]
author = "ave"
description = "通过构造超长HTTP请求方法字符串，验证IIS 4.0日志绕过漏洞。发送包含超长Method字段的HTTP请求，使实际请求的恶意URL被隐藏在日志记录之外。"
id = "POC-AVE-1999-0683"
name = "Microsoft IIS 4.0 Log Avoidance PoC"
severity = "medium"
tags = ["ave-1999-0683"]
vuln_id = [
    "CVE-1999-0448",
    "AVE-1999-0683",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/"
protocol = "http"

[poc.requests.headers]
User-Agent = "AVE/1.0"

[[poc.requests.matchers]]
expect = true
status = [200]
type = "status"
