[basic]
description = "大蚂蚁即时通讯系统 down.html 页面存在路径遍历漏洞，未授权远程攻击者可通过构造包含 ../ 等目录回溯符的恶意参数，绕过路径限制读取服务器上任意文件，包括配置文件、敏感数据等。该漏洞无需认证即可远程利用，攻击门槛低，危害较大。建议厂商修复文件路径过滤逻辑。"
published = "0719"
remediation = '升级大蚂蚁即时通讯服务器至官方最新安全版本，对 down.html 中 file 参数实施严格的路径白名单过滤，禁止包含 "../" 等目录遍历字符，限定可下载文件仅位于指定目录内。同时配置 Web 应用防火墙（WAF）拦截路径遍历攻击特征，限制对 down.html 页面的未授权外部访问，并禁用不必要的文件下载功能。'
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "大蚂蚁即时通讯 down.html 任意文件读取漏洞"
