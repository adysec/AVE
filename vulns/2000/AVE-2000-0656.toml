[basic]
description = "Mirabilis ICQ 2000a/99b 等版本的 Web Front 服务中的 guestbook CGI 程序存在缓冲区溢出漏洞，远程攻击者可通过向 guestbook 的 URL 参数（name）提交超长字符串，导致目标服务崩溃或拒绝服务。该漏洞影响 ICQ 2000a、99b 及更早版本，攻击者无需认证即可通过网络远程触发，危害等级中等。厂商至今未发布官方补丁，建议用户禁用 guestbook 功能或升级替代方案。"
published = "2000-05-29T04:00:00.000"
remediation = "该产品已停止维护且无官方补丁。建议立即停用 Mirabilis ICQ Web Front 服务，或从 Web 服务器中移除存在漏洞的 guestbook CGI 脚本。如业务必须运行，应在网络防火墙或反向代理层面限制外部对 guestbook CGI 的访问，仅允许可信 IP 来源，并启用 WAF 规则拦截超长 URL 参数请求作为临时缓解。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Mirabilis ICQ 留言簿 CGI 远程拒绝服务漏洞"
updated = "2026-06-16T21:52:00.420"

