[basic]
description = "1C: Arcadia Internet Store 1.0 的 tradecli.dll 组件在处理模板参数时未正确验证 MS-DOS 设备名称（如 COM1、PRN、AUX 等），远程未认证攻击者可构造包含 MS-DOS 设备名称的 URL 请求，导致服务器进程挂起或崩溃，造成拒绝服务。该漏洞影响 Arcadia Internet Store 1.0 版本，攻击向量为网络，攻击复杂度低，无需认证，仅影响可用性（CVSS 5.0，AV:N/AC:L/Au:N/C:N/I:N/A:P）。攻击者只需发送包含类似 COM1、PRN 等设备名的模板参数即可触发拒绝服务，ExploitDB 已公开 PoC（EDB-20949）。"
published = "2001-09-20T04:00:00.000"
remediation = "建议立即升级至 1C: Arcadia Internet Store 2.0 或更高版本（官方已停止 1.0 版本支持）。若无法升级，建议在 Web 应用防火墙（WAF）层面拦截包含 MS-DOS 设备名（如 COM1、LPT1、AUX、PRN、NUL、CON）的 template 参数请求，或在 Web 服务器层面配置 URL 重写规则拦截包含设备名的模板参数请求，同时建议迁移至现代电商平台替代该已停止维护的旧版本产品。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "1C Arcadia Internet Store 1.0 拒绝服务漏洞"
updated = "2026-06-16T21:54:48.097"

