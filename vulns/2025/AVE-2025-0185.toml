[basic]
description = "浪潮 GSP 企业管理软件的 srbbdefineservice.asmx 接口存在远程代码执行漏洞。攻击者可通过向该 Web 服务接口发送特制 SOAP 请求，利用服务对用户输入参数校验不严的缺陷，实现任意命令执行，进而完全控制目标服务器。该漏洞影响浪潮 GSP 企业管理软件多个版本，严重威胁企业内部核心业务系统安全。"
published = "0707"
remediation = "立即联系浪潮获取 GSP 企业管理软件安全补丁，升级至修复该漏洞的最新版本。如无法立即升级，在 IIS 或反向代理层对 `/srbbdefineservice.asmx` 路径配置访问控制列表（ACL），仅允许可信 IP 访问，并启用身份认证。同时检查 Web.config 中 SOAP 服务配置，禁用不必要的 .asmx 服务端点。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "浪潮GSP企业管理软件 srbbdefineservice.asmx 远程代码执行漏洞"
