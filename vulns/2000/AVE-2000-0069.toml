[basic]
description = "HP-UX 操作系统中的 asecure 工具在创建音频安全配置文件 audio.sec 时，未正确设置文件权限，导致该文件权限配置不当。本地攻击者利用此漏洞可读取或修改 audio.sec 文件，造成拒绝服务或获取额外系统权限。该漏洞影响 HP-UX 系统，需拥有本地访问权限才能利用，危害等级中危。"
published = "2000-04-18T04:00:00.000"
remediation = "立即为 HP-UX 系统安装 HP 安全公告 HPSBUX0002-109 中对应的 asecure 补丁。临时缓解措施：以 root 权限执行 `chmod 600 /etc/audio.sec` 限制音频安全文件仅 root 可读写，并移除不必要的 audio 子系统 SUID 权限 (`chmod -s /usr/sbin/asecure`)。"
score = 4.6
severity = "MEDIUM"
sources = ["avd"]
title = "HP HP-UX asecure 音频安全文件权限设置不当漏洞"
updated = "2026-06-16T21:50:57.903"

