[basic]
description = "Microsoft Internet Explorer 5.0 中集成的 Windows Media Player ActiveX 控件存在信息泄露漏洞。当远程攻击者通过恶意网页调用该控件访问客户端本地文件时，若文件不存在则返回特定错误码，攻击者可据此枚举目标系统上的文件是否存在，从而探测用户敏感文件信息。该漏洞影响 Internet Explorer 5.0 及关联的 Windows Media Player 组件，攻击者只需诱导用户访问恶意网页即可触发，无需任何身份认证。"
published = "1999-11-14T05:00:00.000"
remediation = '升级到 Internet Explorer 更高版本（如 IE 5.01 SP2 及以上）或改用现代浏览器（Edge/Chrome/Firefox）。如无法升级，可在 IE 中禁用 Windows Media Player ActiveX 控件：Internet 选项→安全→自定义级别→ActiveX 控件和插件→禁用"对标记为可安全执行脚本的 ActiveX 控件执行脚本"。'
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Microsoft Internet Explorer 5 Windows Media Player ActiveX 信息泄露漏洞"
updated = "2026-06-16T21:49:44.477"

