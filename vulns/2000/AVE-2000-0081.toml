[basic]
description = "Microsoft Index Server 2.0 及 Windows 2000 Indexing Service 中的 WebHits ISAPI 筛选器存在目录遍历漏洞。远程攻击者可通过向目标系统发送特制的畸形 Hit-Highlighting 参数请求，绕过路径限制读取服务器上的任意文件，导致敏感信息泄露。该漏洞影响 Windows 2000 及安装了 Index Server 2.0 的系统，CVSS 评分 5.0，危害等级中危。攻击无需身份认证，利用难度较低。"
published = "2000-01-26T05:00:00.000"
remediation = "安装 Microsoft 安全公告 MS00-006 提供的官方补丁：Index Server 2.0 用户下载 Intel 或 Alpha 平台对应补丁（https://www.microsoft.com/download/details.aspx?FamilyID=87BCE044-43FD-470E-8CAC-C2B51BEC872A），Windows 2000 Indexing Service 用户下载补丁（https://www.microsoft.com/download/details.aspx?FamilyID=61AA188B-07F4-430D-877A-8C68D7AAF47D）。如无法立即打补丁，可暂时禁用 WebHits ISAPI 筛选器（_vti_bin/..%5c..%5c..%5c..%5c 路径过滤）作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Microsoft Index Server 目录遍历漏洞"
updated = "2026-06-16T21:50:59.673"

