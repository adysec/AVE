[basic]
description = "Pragma Systems InterAccess TelnetD Server 4.0 Build 4的recv()函数存在缓冲区溢出漏洞，远程攻击者可通过向Telnet服务发送超长登录名触发溢出，导致服务CPU占用率达到100%或执行任意代码。该漏洞影响Build 4（1998年5月4日构建）及更早版本。"
published = "2000-02-21"
remediation = "升级到InterAccess TelnetD Server 4.0 Build 7（2000年1月5日发布）或更高版本，并安装最新的Windows NT服务包。"
