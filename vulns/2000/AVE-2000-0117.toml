[basic]
description = "SCO UnixWare 系统的 scohelp 帮助程序存在缓冲区溢出漏洞，远程攻击者无需任何身份认证即可通过向目标主机发送特制的网络请求数据包，触发 scohelp 进程的缓冲区溢出，从而覆盖返回地址或函数指针，最终实现以受影响服务进程权限执行任意代码。该漏洞可导致攻击者远程获取系统的完全控制权，对目标系统的机密性、完整性和可用性构成严重威胁。"
published = "2000-01-27T05:00:00.000"
remediation = "立即安装 SCO 安全公告 SB-00.02a 中的 scohelp 补丁，可从 ftp://ftp.sco.com/SSE/security_bulletins/SB-00.02a 获取。由于 SCO UnixWare 已停止维护，建议在防火墙层面封锁 scohelp 服务端口（TCP 457/tcp），或迁移至受支持的现代操作系统以彻底消除风险。"
score = 7.2
severity = "HIGH"
sources = ["epss"]
title = "SCO SCOhelp 缓冲区溢出远程代码执行漏洞"
updated = "2026-06-16T21:51:03.790"

