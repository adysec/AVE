[basic]
description = "O'Reilly WebSite 1.1e 与 Website Pro 2.0 Web 服务器软件在处理用户请求时，未对传入参数中的 shell 元字符进行充分过滤与校验。远程攻击者无需身份验证，即可通过向 args.cmd 或 args.bat 参数注入包含 shell 元字符的恶意输入，使服务器将其作为系统命令执行，从而获取目标主机的命令执行权限，造成敏感信息泄露、系统被接管等严重后果。该漏洞属于典型的命令注入类缺陷，影响当时广泛部署于 Windows NT 平台的 O'Reilly WebSite 系列 Web 服务器。"
published = "1999-02-16"
remediation = "O'Reilly WebSite 系列已停止维护且无官方补丁。建议迁移至仍在维护的 Web 服务器（如 Apache 2.4、Nginx 1.24 或 IIS 10 以上）。若必须保留旧系统，应在网络层用防火墙禁止外部直接访问 args.cmd、args.bat 等 CGI 端点，并配置仅允许受信内网 IP 访问，同时在边界部署入侵检测规则拦截包含 shell 元字符的异常请求。"
score = 5.0
severity = "MEDIUM"
sources = ["avd"]
title = "O'Reilly WebSite 1.1e 与 Website Pro 2.0 命令执行漏洞"
updated = "2026-07-19"

