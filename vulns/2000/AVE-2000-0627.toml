[basic]
description = "Darxite 0.4 及更早版本的登录模块存在缓冲区溢出漏洞，攻击者可通过发送超长的用户名或密码字符串触发缓冲区溢出，导致远程任意代码执行。该漏洞影响 Darxite 0.4 及更早版本，CVSS 评分 7.5（AV:N/AC:L/Au:N/C:P/I:P/A:P），属于高危漏洞。攻击者无需身份认证即可远程发起攻击，通过构造畸形登录数据包覆盖栈缓冲区，劫持程序控制流执行任意 Shellcode。攻击者可利用该漏洞在目标服务器上以服务进程权限执行任意命令，完全控制受影响服务器。ExploitDB 已公开 PoC 利用代码（EDB-ID: 20159）。"
published = "2000-11-14T05:00:00.000"
remediation = "建议立即升级到 Darxite 0.5 或更高版本（若存在后续版本），或迁移至现代维护的 IRC 服务器软件（如 InspIRCd、UnrealIRCd 等）。若无法升级，请在防火墙层面限制 IRC 服务端口（默认 6667/6666）仅允许受信 IP 访问，或禁用存在缓冲区溢出的登录认证功能作为临时缓解措施。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "Darxite 0.4 登录缓冲区溢出漏洞"
updated = "2026-06-16T21:52:35.410"

