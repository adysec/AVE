[basic]
description = "CDomain Web 服务器中 whois_raw.cgi CGI 脚本存在命令注入漏洞，由于程序未对用户提交的 fqdn 参数中特殊字符进行过滤，远程攻击者可通过向该脚本发送包含 shell 元字符的恶意请求，实现在目标服务器上以 Web 服务器权限执行任意系统命令。该漏洞影响 CdomainFree 2.4 及之前版本，攻击无需认证，危害严重。"
published = "1999-06-01T04:00:00.000"
remediation = "建议立即从服务器移除或禁用 whois_raw.cgi 脚本，或升级到 CdomainFree 最新版本。如无法升级，应对 fqdn 参数做严格输入过滤，禁止 shell 元字符（; ` | & $）传入，同时考虑迁移到替代的 Whois 查询方案。若该 CGI 非业务必需，直接删除或注释相关配置即可彻底消除风险。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "CDomainFree whois_raw.cgi 远程命令执行漏洞"
updated = "2026-06-16T21:49:37.747"

