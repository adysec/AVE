[basic]
description = "该漏洞源于QuickTime Clip算符解析过程中的堆缓冲区溢出，影响Windows平台上的QuickTime 7.4.5之前版本。攻击者无需身份验证即可远程触发，通过精心制作的PICT图像文件向目标系统发送恶意数据包，在Clip算符解析时引发堆缓冲区溢出漏洞，实现远程代码执行。该漏洞对QuickTime用户构成严重威胁，可能导致系统被攻击者完全控制，窃取敏感数据或安装恶意软件等严重后果。"
published = "2008-04-04T17:44:00.000"
remediation = "立即升级 Apple QuickTime 至 7.4.5 或更高版本（访问 apple.com/quicktime/download 下载）。若无法立即升级，建议卸载 QuickTime 或在浏览器中禁用 QuickTime 插件，并避免打开来源不明的 PICT 图像文件作为临时缓解措施。"
score = 6.8
severity = "MEDIUM"
sources = ["tenable"]
title = "Apple QuickTime PICT 图像文件远程代码执行漏洞"
updated = "2026-06-16T22:50:49.677"

