[info]
author = "ave"
description = "验证目标系统是否存在 GNU glibc 2.1/2.1.1 中 pt_chown 命令的本地权限提升漏洞。该漏洞允许本地用户修改属于其他用户的 TTY 终端设备所有权。本 PoC 通过检查 pt_chown 二进制文件的存在性来判断系统是否受该漏洞影响。"
id = "POC-AVE-1999-0320"
name = "CVE-1999-0720 pt_chown 本地权限提升 PoC"
severity = "medium"
tags = ["ave-1999-0320"]
vuln_id = [
    "CVE-1999-0720",
    "AVE-1999-0320",
]

[poc]
logic = "any"

[[poc.requests]]
path = "/usr/libexec/pt_chown"
protocol = "file"

[[poc.requests.matchers]]
expect = true
part = "body"
regex = '[\s\S]+'
type = "regex"

[[poc.requests]]
path = "/usr/lib/pt_chown"
protocol = "file"

[[poc.requests.matchers]]
expect = true
part = "body"
regex = '[\s\S]+'
type = "regex"
