[basic]
description = "Drupal 核心 7.32 之前版本的数据库抽象 API 中的 expandArguments 函数未能正确处理预处理语句的构造，远程攻击者可通过向含有数组键的特定参数传递经特殊设计的键值，在无需认证的情况下触发 SQL 注入漏洞。该漏洞被广泛称为 Drupalgeddon，影响 Drupal 7.0 至 7.31 版本，攻击者无需登录即可利用该漏洞实现添加管理员账户、窃取敏感数据乃至完全控制目标站点，CVSS 评分 7.5，危害等级高。官方已发布 7.32 版本修复此漏洞。"
published = "2014-10-16T00:55:06.653"
remediation = "立即升级 Drupal 核心至 7.32 或更高版本，该版本修复了 expandArguments 函数中预处理语句构造不当的问题。如无法立即升级，可部署 WAF 规则拦截包含数组键名的恶意 POST 请求作为临时缓解措施。"
score = 7.5
severity = "HIGH"
sources = ["nuclei"]
title = "Drupal 核心数据库抽象API SQL注入漏洞"
updated = "2026-06-17T00:08:47.197"

