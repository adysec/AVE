[basic]
description = "Tigris 远程访问服务器 11.5.4.22 之前版本存在认证审计记录缺失漏洞。当用户第一次登录认证失败、随后再次尝试成功时，服务器未正确记录 Radius 计费信息，导致失败的登录尝试无法被审计追踪。攻击者可利用此缺陷绕过日志监控，掩盖暴力破解或凭证试探行为。该漏洞影响 Tigris remote access server 11.5.4.22 以下所有版本，CVSS 评分 5.0，危害等级中危。"
published = "2000-06-13T04:00:00.000"
remediation = "升级 Tigris 远程访问服务器至 11.5.4.22 或更高版本，该版本已修复 Radius 认证计费记录不完整的问题。如无法立即升级，可启用 Radius 日志审计功能，定期检查认证日志中的异常成功登录记录作为临时监控手段。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Tigris 远程访问服务器 登录认证漏洞"
updated = "2026-06-16T21:51:57.653"

