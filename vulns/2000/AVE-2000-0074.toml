[basic]
description = "Microsoft Windows NT 4.0 及 Terminal Server Edition 中的 RDISK 实用程序在创建紧急修复磁盘时，会将注册表配置单元信息以临时文件形式存储在磁盘上，且该临时文件权限设置不当，允许本地用户读取其中敏感数据，导致信息泄露。攻击者需具有本地系统访问权限，通过访问临时目录中的注册表备份文件即可获取系统账户哈希、配置信息等敏感数据。该漏洞 CVSS 评分 2.1，危害等级低。"
published = "2000-02-04T05:00:00.000"
remediation = "安装 Microsoft 针对 Windows NT 4.0 和 Terminal Server Edition 的安全更新 (MS00-003)，该补丁修正了 rdisk 工具将注册表配置单元写入临时文件时权限设置不当的问题。如无法安装补丁，可通过限制用户对 rdisk.exe 的执行权限，并删除 `%TEMP%` 目录下 `rdisk*` 临时文件来进行临时缓解。由于 Windows NT 4.0 已停止支持，建议升级至受支持的 Windows 版本。"
score = 2.1
severity = "LOW"
sources = ["avd"]
title = "Microsoft Windows NT 4.0 RDISK 注册表枚举文件信息泄露漏洞"
updated = "2026-06-16T21:50:58.660"

