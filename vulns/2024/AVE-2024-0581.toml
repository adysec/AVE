[basic]
description = "Linux 内核 DRM/STI 显示驱动中的 sti_hqvdp_atomic_check 函数在调用 drm_atomic_get_crtc_state() 时未对返回值进行有效性检查，当该函数返回错误指针时直接解引用将导致空指针访问或内存损坏。本地低权限攻击者可通过提交特制的原子模式设置请求触发此漏洞，造成系统崩溃（拒绝服务）。该漏洞影响 Linux 内核各发行版，CVSS 评分 5.5，危害等级中等。厂商已在内核主线提交修复补丁。"
published = "2025-01-08T18:15:18.683"
remediation = "建议将 Linux 内核升级至 5.15.174、6.1.120、6.6.64、6.12.4 或 6.13 及以上版本，对应修复提交为 c1ab40a1fdfe（主线）及各稳定分支的向后移植提交。对于 Ubuntu 系统，安装 USN-7381-1 或 USN-7450-1 安全更新；Debian 系统参考 DLA-4075-1 公告。如无法立即升级，可通过内核模块黑名单禁用 sti 驱动（modprobe.blacklist=sti）作为临时缓解措施。"
score = 5.5
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux kernel drm/sti 错误指针解引用漏洞"
updated = "2026-06-17T08:12:58.297"

