[basic]
description = "Windows 系统中的 HTML 库在处理 `res:` 本地资源协议时存在缓冲区溢出漏洞。攻击者可构造特制的 HTML 页面，通过 Internet Explorer、Outlook Express 或 Windows Explorer 触发该溢出，导致远程代码执行或系统崩溃。该漏洞影响 Windows 95/98/NT 4.0 等早期版本，CVSS 评分 10.0，危害等级严重。用户应避免在受影响浏览器中打开不可信链接，并及时安装微软安全补丁。"
published = "1997-11-01"
remediation = "升级 Internet Explorer 至 5.0 或更高版本，该漏洞已在 IE 5.0 中修复。对于 Windows 95/98/NT 4.0 系统，安装微软 MS99-007 安全更新。长期建议迁移至现代浏览器（如 Microsoft Edge）以获得持续安全支持。"
score = 10.0
severity = "CRITICAL"
sources = ["cve"]
title = "Microsoft Internet Explorer / Outlook Express / Windows Explorer HTML 库缓冲区溢出漏洞"
updated = "2026-06-16"

