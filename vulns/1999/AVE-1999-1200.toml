[basic]
description = "RealNetworks RealServer 管理工具中存在缓冲区溢出漏洞，未经身份认证的远程攻击者可通过向管理接口发送超长的用户名或密码字段触发该漏洞，进而在目标服务器上执行任意命令。该漏洞影响使用 RealServer 及 GameHouse 相关组件的系统，攻击者无需事先获取账户凭据即可利用，且可导致服务器被完全接管，危害等级极高，CVSS 评分 10.0。建议尽快升级至厂商发布的安全版本，并限制管理接口的访问来源。"
published = "1999-11-04T05:00:00.000"
remediation = "建议升级 RealNetworks RealServer 至官方安全版本以修复管理工具缓冲区溢出漏洞，具体操作请访问 RealNetworks 官网下载并安装最新安全补丁。如暂时无法升级，应在防火墙中限制对 RealServer 管理端口的访问，仅允许可信来源 IP 连接，并禁用存在漏洞的 dldisplay ActiveX 控件以防止远程命令执行。"
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "Real Networks GameHouse dldisplay ActiveX 控件缓冲区溢出漏洞"
updated = "2026-06-16T21:49:16.937"

