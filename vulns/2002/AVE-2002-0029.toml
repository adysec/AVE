[basic]
description = "tinyproxy HTTP 代理服务器 1.5.0、1.4.3 及更早版本中存在双重释放（double-free）内存漏洞。远程攻击者可通过向目标代理服务器发送特制的 HTTP 请求触发该漏洞，导致内存损坏，进而实现任意代码执行。该漏洞影响运行 tinyproxy 的各类 Linux/Unix 系统，CVSS 评分 7.5，危害等级高。"
published = "2002-08-12"
remediation = "升级 tinyproxy 至 1.4.4 或更高版本（上游修复版本）。Debian 用户应参考 DSA-145，将 woody 系统上的 tinyproxy 升级至 1.4.3-2woody2，unstable 系统升级至 1.4.3-3。"
score = 7.5
severity = "HIGH"
sources = ["osv"]
title = "tinyproxy HTTP 代理服务器双重释放远程代码执行漏洞"
updated = "2026-06-16"

