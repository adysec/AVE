[basic]
description = "Raptor GFX 配置工具中的 pgxconfig 组件存在符号链接攻击漏洞，本地用户可通过创建恶意符号链接诱使该工具以提升的权限操作目标文件，从而获取系统最高权限。该漏洞源于程序在处理临时文件时未对符号链接做安全检查，攻击者只需拥有本地访问权限即可利用，严重影响系统安全性。目前官方已发布修复版本，建议用户升级。"
published = "2000-10-20T04:00:00.000"
remediation = "立即移除 pgxconfig 的 setuid/setgid 权限位（chmod u-s /path/to/pgxconfig），防止普通用户以更高权限执行该程序。如业务不需要该工具，直接卸载 Raptor GFX 软件包。若需保留功能，建议使用 mkstemp 等安全临时文件创建方式重写 pgxconfig 中涉及 /tmp 临时文件写入的代码，避免使用不可预测的固定路径。"
score = 7.2
severity = "HIGH"
sources = ["cve"]
title = "Raptor GFX pgxconfig 配置工具本地权限提升漏洞"
updated = "2026-06-16T21:52:17.067"

