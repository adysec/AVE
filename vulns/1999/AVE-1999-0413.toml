[basic]
description = "Microsoft Windows NT 4.0 的 LSA/LSARPC 服务组件（LSASS.EXE）存在访问冲突拒绝服务漏洞。远程攻击者无需身份认证即可通过向目标系统发送特制的 RPC 请求触发 LSASS.EXE 进程异常崩溃，导致系统身份验证服务中断，受影响系统无法正常处理用户登录请求。该漏洞影响 Windows NT 4.0 全版本，攻击条件低，可被用于中断域环境或本地系统的正常认证服务。"
published = "1997-06-01T04:00:00.000"
remediation = "安装 Windows NT 4.0 Service Pack 4 或更高版本，或安装 KB 文章 Q154087 提供的修补程序。Windows NT 4.0 已于 2004 年 12 月 31 日终止支持，建议立即升级至受支持的 Windows 版本（如 Windows Server 2019/2022）。作为临时缓解措施，可在防火墙上阻止 TCP/UDP 端口 135（RPC 终结点映射器）及 TCP 端口 445，限制对 LSARPC 服务的远程访问。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Microsoft Windows NT 4.0 LSA/LSARPC 拒绝服务漏洞"
updated = "2026-06-16T21:47:57.290"

