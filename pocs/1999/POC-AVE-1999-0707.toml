[info]
author = "ave"
description = "检测 sccw（soundcard_cw）工具是否存在，该工具存在本地任意文件读取漏洞，攻击者可利用其读取系统敏感文件"
id = "POC-AVE-1999-0707"
name = "CVE-1999-0907 PoC"
severity = "low"
tags = ["ave-1999-0707"]
vuln_id = [
    "CVE-1999-0907",
    "AVE-1999-0707",
]

[poc]
logic = "any"

[[poc.requests]]
path = "/usr/bin/sccw"
protocol = "file"

[[poc.requests.matchers]]
expect = true
part = "body"
regex = "."
type = "regex"
