[basic]
description = "Linux 内核 KVM 子系统的 VMX（虚拟机扩展）模块中，在虚拟机入口（vmenter）操作前进行 SPEC_CTRL 寄存器写入与 vmenter 之间存在平衡的返回指令序列。尽管平衡返回通常安全，但理论上深度调用栈的非屏蔽中断（NMI）可能在返回执行前耗尽返回栈缓冲区（RSB），导致 RSB 下溢。攻击者利用此漏洞可能引发基于推测执行的信息泄露。该漏洞影响 Linux 内核，CVSS 评分 5.5，危害等级中等。开发者通过禁止在 SPEC_CTRL 写入与 vmenter 之间的任何返回操作来修复此问题。"
published = "2025-02-26T07:01:36.463"
remediation = "建议将 Linux 内核升级至 5.18.14 及以上版本（适用于 5.18.x 稳定分支）或 5.19 及以上版本（主线），其中已通过 commit afd743f6dde8 修复 VMX vmenter 前 SPEC_CTRL 写入与 VM 进入之间的 RSB 下溢问题。使用 RHEL/CentOS 8/9、Ubuntu 20.04/22.04 LTS、Debian 11/12 等发行版的用户，请安装厂商提供的 linux-image 安全更新包并重启宿主机。如无法立即升级，可在 KVM 模块参数中设置 kvm.ignore_msrs=1 缓解侧信道风险，或在 BIOS 中关闭 Intel VT-x 功能禁用硬件虚拟化（将导致所有虚拟机无法运行）。"
score = 5.5
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux KVM VMX 返回栈缓冲区下溢漏洞"
updated = "2026-06-17T05:18:37.410"

