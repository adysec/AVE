[info]
author = "ave"
description = "检测 Sun Java Web Server 1.1 Beta 是否未正确配置 .jhtml 文件处理方式，直接返回原始 Java 源代码而非执行结果。通过访问 .jhtml 文件并检查响应中是否包含 Java 代码特征（如 import、class、page 指令等）来判断漏洞是否存在。"
id = "POC-AVE-1999-0472"
name = "CVE-1999-0283 PoC"
severity = "critical"
tags = ["ave-1999-0472"]
vuln_id = [
    "CVE-1999-0283",
    "AVE-1999-0472",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/index.jhtml"
protocol = "http"

[poc.requests.body]
content = ""
type = "raw"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "<%@",
    "import",
    "class ",
    "<html>",
]
