[basic]
description = "Windows NT 4.0 的 GINA（图形化标识与身份验证）组件存在权限许可和访问控制漏洞。具有物理访问权限的攻击者可在目标系统已锁定工作站的情况下，通过将剪贴板内容粘贴（CTRL-V）到用户名输入框中，从而泄露锁定用户剪贴板中的敏感信息。该漏洞影响 Windows NT 4.0 系统，攻击者需具备物理接触条件，CVSS 评分 2.1，危害等级低。"
published = "1999-12-31T05:00:00.000"
remediation = "升级到 Windows 2000 或更高版本操作系统，这些版本已修复 GINA 在锁定状态下允许粘贴剪贴板内容的问题。如无法升级，可通过组策略禁用交互式登录前的粘贴功能，或确保物理访问环境受控，仅允许授权人员接触终端。"
score = 2.1
severity = "LOW"
sources = ["cve"]
title = "Microsoft Windows NT GINA 权限许可和访问控制漏洞"
updated = "2026-06-16T21:50:28.233"

