[basic]
description = "Omnis Studio 2.4 数据库字段加密机制存在严重安全缺陷，其使用的加密方式仅为简单的编码转换（trivial encoding），而非真正的密码学加密算法。这意味着任何能够访问数据库文件或数据库备份的攻击者，无需任何密钥即可直接还原出原始数据内容。该漏洞影响 Omnis Studio 2.4 版本，攻击者只需具备对数据库文件的读取权限即可完成利用，无需身份认证，危害等级严重。厂商至今未发布官方修复补丁，建议用户避免在 Omnis Studio 2.4 中存储敏感数据。"
published = "2000-05-01T04:00:00.000"
remediation = "升级到 Omnis Studio 3.0 或更高版本，该版本已修复弱加密问题，改用标准加密算法保护数据库字段。如无法升级，避免使用 Omnis Studio 内置的数据库字段加密功能，改用应用层 AES-256 加密后再写入数据库，并确保数据库连接使用 TLS 加密传输。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "Omnis Studio 2.4 弱数据库字段加密漏洞"
updated = "2026-06-16T21:51:45.473"

