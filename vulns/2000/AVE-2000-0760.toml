[basic]
description = "Apache::ASP 模块 1.93 及更早版本中自带的 source.asp 示例脚本存在任意文件写入漏洞。远程攻击者无需身份认证即可通过构造特制的 HTTP 请求，利用该脚本向目标服务器文件系统写入恶意内容，可导致任意文件创建或覆盖，进而可能实现远程代码执行。该漏洞影响 Apache::ASP 1.93 及之前版本，CVSS 评分 7.5，危害等级高危。"
published = "2000-07-11T04:00:00.000"
remediation = "升级 Apache::ASP 至 1.95 及以上版本，该版本已在 source.asp 的文件打开操作中对特殊字符进行过滤。如无法立即升级，可手动删除生产服务器上的 ./site/eg/source.asp 示例脚本，并确保 Apache web 服务器用户对该目录无写入权限作为临时缓解措施。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "Apache Apache::ASP 源文件非法写入漏洞"
updated = "2026-06-16T21:52:08.580"

