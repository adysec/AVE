[basic]
description = "Metamail 2.7-7.2 之前版本中存在任意文件写入漏洞。远程攻击者可通过发送包含 uuencode 编码附件的恶意邮件，在附件中指定目标文件的完整路径名，当 Metamail 脚本（如 sun-audio-file）调用 uuencode 处理该附件时，会将附件内容写入攻击者指定的任意路径，从而覆盖目标系统上的任意文件。该漏洞攻击条件简单，仅需向受害者发送特制邮件即可触发，危害较大。"
published = "2003-08-15T04:00:00.000"
remediation = "升级 metamail 至 2.7-7.2 或更高版本（如 Debian 的 2.7-7.2 及以上软件包），通过系统包管理器执行 apt-get update && apt-get install metamail 或 yum update metamail 完成更新。如无法立即升级，可在邮件网关或 MTA 上禁用 uuencode 解码、过滤含 uuencoded 附件的邮件，并移除或重命名 /usr/bin/ 下 metamail 自带的 uuencode 相关脚本（如 sun-audio-file）以临时缓解。"
score = 2.6
severity = "LOW"
sources = ["avd"]
title = "Metamail 邮件处理程序任意文件写入漏洞"
updated = "2026-06-16T21:50:03.937"

