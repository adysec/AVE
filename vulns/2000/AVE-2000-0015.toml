[basic]
description = "True North Software Internet Anywhere Mail Server 2.3.x 的 POP3 邮件服务存在缓冲区溢出漏洞，远程攻击者无需身份认证即可通过向服务器发送超长的用户名参数触发该漏洞，可导致服务崩溃引发拒绝服务，或远程执行任意命令。该漏洞影响 2.3.x 及更早版本，CVSS 评分 5.0，危害等级中危。"
published = "1999-10-01T04:00:00.000"
remediation = "该产品已于 2000 年代初停止维护，True North Software 已不再运营。建议立即迁移至其他受支持的邮件服务器软件（如 hMailServer、MailEnable 等）。在迁移完成前，可在防火墙层面将 POP3（110/TCP）和 SMTP（25/TCP）端口限制为仅允许受信任的内部 IP 访问，并部署入侵检测规则匹配超长用户名请求作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "True North Software Internet Anywhere Mail Server POP3 缓冲区溢出漏洞"
updated = "2026-06-16T21:50:49.750"

