[basic]
description = "Linux 内核的 drm/panfrost 驱动中发现一处释放后使用（Use-After-Free）漏洞。该驱动中 job 结构体通过引用 panfrost_priv 来获取 MMU 上下文，但在某些场景下 MMU 上下文的生命周期可以超过对应的 panfrost_priv，当 panfrost_priv 被释放后，job 仍尝试访问已释放的内存区域，从而触发释放后使用漏洞。本地攻击者可利用此漏洞造成系统崩溃或潜在权限提升。该漏洞影响 Linux 内核多个版本，CVSS 评分 7.8，危害等级高。"
published = "2025-02-26T07:01:12.583"
remediation = "升级 Linux 内核至 5.18 或更高版本，或更新至发行版提供的已包含此补丁的内核（如 Ubuntu 22.04 的 5.15.0-xx、Debian 的 5.10.y 稳定更新）。若无法立即升级，可禁用 Panfrost DRM 驱动模块（modprobe -r panfrost）作为临时缓解措施。"
score = 7.8
severity = "HIGH"
sources = ["msrc"]
title = "Linux Kernel Panfrost DRM 驱动释放后使用漏洞"
updated = "2026-06-17T05:17:49.290"

