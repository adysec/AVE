[basic]
description = "Solaris Solstice AdminSuite (AdminSuite) 2.1 在更新 NIS 数据库时未正确处理符号链接，导致存在任意文件写入漏洞。本地攻击者可通过创建恶意符号链接，诱使 AdminSuite 将数据写入目标文件，从而实现任意文件覆盖或篡改。该漏洞影响 Solaris 系统上的 AdminSuite 2.1 版本，CVSS 评分 6.2，危害等级中危。攻击者需拥有本地系统访问权限，利用难度较低。"
published = "1997-11-10T05:00:00.000"
remediation = "安装 Sun Security Bulletin #00145 提供的修补程序，升级 Solstice AdminSuite 至包含符号链接检查的更新版本；如无法升级，限制不可信用户的本地登录，并监控 NIS 数据库更新操作中的异常文件写入行为。对于仍在运行的遗留系统，建议迁移至受支持的 Solaris 版本并启用 Solaris Trusted Extensions 以加强权限控制。"
score = 6.2
severity = "MEDIUM"
sources = ["avd"]
title = "Sun Solaris Solstice AdminSuite 符号链接任意文件写入漏洞"
updated = "2026-06-16T21:50:24.953"

