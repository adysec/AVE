[basic]
description = "SCO UnixWare 7.1.0 及更早版本中默认安装的 Sendmail 邮件传输代理配置文件 sendmail.cf 存在权限配置缺陷，本地攻击者可利用该文件中的不安全配置选项提升至 root 权限。该漏洞源于 sendmail.cf 中某些参数被设置为允许普通用户执行特权操作，攻击者在拥有本地访问权限后，通过构造特定的 sendmail 命令即可实现权限提升，完全控制目标系统。CVSS 评分 10.0，危害等级严重。"
published = "2001-03-12T05:00:00.000"
remediation = "请从 SCO 官方 FTP 站点 (ftp://ftp.sco.com/SSE/security_bulletins/SB-99.10a) 获取并安装对应安全补丁，或升级到 SCO UnixWare 7.1.1 及以上版本。作为临时缓解措施，以 root 身份执行 `chown root:sys /etc/mail/sendmail.cf && chmod 644 /etc/mail/sendmail.cf`，确保 sendmail 配置文件仅 root 可写，防止本地用户修改后利用 sendmail 的 setuid 权限提升至根权限。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "SCO UnixWare Sendmail 配置文件权限提升漏洞"
updated = "2026-06-16T21:51:31.803"

