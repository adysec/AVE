[basic]
description = 'Microsoft Windows NT 和 Windows 2000 系统中的命令处理器（CMD.EXE）存在缓冲区溢出漏洞。本地攻击者可通过设置超长环境变量触发该漏洞，导致命令处理器缓冲区溢出，造成目标系统拒绝服务。该漏洞被命名为"格式错误的环境变量"漏洞，影响 Windows NT 及 Windows 2000 系统，需本地用户权限触发，CVSS 评分 5.0，危害等级中等。'
published = "2000-04-20T04:00:00.000"
remediation = "安装 Microsoft 针对 Windows NT 4.0 和 Windows 2000 发布的安全更新 (MS00-027)，限制本地用户通过超长环境变量触发 CMD.EXE 缓冲区溢出。如无法安装补丁，应限制非授权用户的本地登录权限，并监控异常进程创建行为作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Microsoft Windows NT/2000 命令处理器缓冲区溢出拒绝服务漏洞"
updated = "2026-06-16T21:51:29.623"

