[basic]
description = "SunOS 4.0.x 的 rcp 命令存在安全漏洞，远程攻击者可通过受信主机以 root 权限执行任意命令，该漏洞可能与 nobody 用户的配置问题有关。攻击者无需认证即可远程利用，完全控制目标系统。"
published = "1989-10-26"
remediation = "升级到 SunOS 4.1.x 或更高版本，或安装 Sun 官方提供的安全补丁。限制受信主机列表，禁用不必要的 r 系列服务（rcp/rsh/rlogin），改用 SSH 替代。"
score = 10.0
severity = "CRITICAL"
