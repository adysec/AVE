[basic]
description = "天地伟业 Easy7 视频监控管理平台 downloadResource 接口存在任意文件读取漏洞，由于未对用户请求的文件路径进行有效过滤和权限校验，远程攻击者可通过构造特制的 HTTP 请求，利用路径遍历技术读取服务器上的任意文件，包括系统配置文件、数据库凭证等敏感信息。该漏洞影响天地伟业 Easy7 系列产品，攻击者无需身份认证即可利用，危害较大。"
published = "0703"
remediation = "升级天地伟业 Easy7 综合管理平台至 V7.19 以上最新版本，可通过互联网在线升级或访问天地伟业官网下载中心获取修复补丁；如升级失败可拨打 400-040-9999 获取技术支持。临时缓解措施：在网络边界部署 WAF 规则，对 downloadResource 接口的 path 参数进行目录穿越特征过滤（拦截 ../、%2e%2e/ 等），并将该接口的可访问路径限制在指定资源目录范围内。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "天地伟业 Easy7 downloadResource 任意文件读取漏洞"
updated = "0703"

