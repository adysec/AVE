[basic]
description = "Unix 系统中 ptylogin 终端登录管理工具存在安全漏洞，远程攻击者可通过网络利用 ptylogin 对调制解调器设备控制不足的缺陷，锁定调制解调器线路造成拒绝服务，或利用该调制解调器向外拨号，甚至窃取用户密码。该漏洞 CVSS v2 评分 7.5，攻击复杂度低且无需认证，影响机密性、完整性和可用性。"
published = "2001-03-12T05:00:00.000"
remediation = "建议限制 ptylogin 程序权限，仅 root 或授权管理员可执行；同时加强调制解调器设备的访问控制，配置拨号密码认证，避免未授权使用。对无需拨号服务的系统，应彻底禁用 ptylogin/mgetty 并移除 setuid 位；有安全更新的 Unix 厂商应升级至修复版本；长远建议迁移至 SSH 等加密远程访问方案，替代不安全的拨号登录方式。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "Unix ptylogin 拒绝服务漏洞"
updated = "2026-06-16T21:48:13.617"

