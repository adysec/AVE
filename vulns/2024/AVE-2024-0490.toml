[basic]
description = "jq 是一款命令行 JSON 处理器，其 jv.c 文件中的 jvp_array_write 函数存在有符号整数溢出漏洞。当攻击者使用索引值 2147483647（有符号整数上限）向数组赋值时，会触发整数溢出，导致程序崩溃，造成拒绝服务。该漏洞影响 jq 1.7.1 及之前所有版本，CVSS 评分 4.3，危害等级中危。攻击者无需认证即可利用此漏洞，但需要目标系统运行 jq 处理特制的 JSON 输入。官方已在 commit de21386681c0df0104a99d9d09db23a9b2a78b1e 中修复此漏洞。"
published = "2025-05-21T15:16:03.920"
remediation = "升级 jq 至 1.8.0 及以上版本（该版本限制数组/对象最大元素数为 536870912，彻底修复整数溢出问题）；如无法升级，可通过打补丁方式应用 commit de21386681c0df0104a99d9d09db23a9b2a78b1e；临时缓解措施：避免使用 jq 处理包含超大索引（接近 2147483647）的不可信 JSON 输入。"
score = 4.3
severity = "MEDIUM"
sources = ["msrc"]
title = "jqlang jq 整数溢出拒绝服务漏洞"
updated = "2026-06-17T07:12:37.490"

