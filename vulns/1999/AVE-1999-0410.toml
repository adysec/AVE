[basic]
description = "IRC 服务器存在拒绝服务漏洞，远程攻击者无需认证即可向目标 IRC 服务器发送特制数据包，导致服务器进程崩溃，无法正常提供服务。该漏洞影响早期版本的 IRC 服务器软件，CVSS 评分 10.0，危害等级严重。攻击条件简单，利用门槛低，可造成服务长时间不可用。"
published = "1999-01-01T05:00:00.000"
remediation = "将 IRC 守护进程升级至仍在维护的版本（如 InspIRCd v3+、UnrealIRCd 6+、ircd-hybrid 8+），这些现代版本已修复各类崩溃型拒绝服务漏洞。同时配置连接速率限制（connect_flood 限速）、客户端超时断开、最大客户端连接数限制，并在防火墙侧限制 IRC 端口（6660-6669/TCP）仅允许可信 IP 访问作为临时缓解。"
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "IRC Server 拒绝服务漏洞"
updated = "2026-06-16T21:47:56.423"

