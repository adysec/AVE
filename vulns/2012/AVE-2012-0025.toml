[basic]
description = "Tiki Wiki CMS Groupware 8.3 版本的 tiki-featured_link.php 文件中存在 URL 重定向漏洞。攻击者可通过向 url 参数传入恶意构造的链接，诱导用户点击后加载任意外部网页到框架中，实施钓鱼攻击。该漏洞源于程序对用户输入的 url 参数缺乏充分验证与过滤（CWE-20），属于开放重定向类型。攻击者无需身份认证即可远程利用，影响 Tiki Wiki CMS Groupware 8.3 及可能更早版本，CVSS 评分 5.8，危害等级中危。建议升级至最新版本或对 url 参数进行严格的白名单校验。"
published = "2012-10-08T18:55:01.370"
remediation = "升级 Tiki Wiki CMS Groupware 至 9.0 或更高版本，该版本已修复 url 参数未正确校验重定向目标的问题。如无法升级，在 tiki-featured_link.php 中对 url 参数添加白名单校验，仅允许内部可信域名，同时设置 X-Frame-Options: SAMEORIGIN 响应头防止点击劫持。"
score = 5.8
severity = "MEDIUM"
sources = ["nuclei"]
title = "Tiki Wiki CMS Groupware URL 重定向漏洞"
updated = "2026-06-16T23:46:39.053"

