[basic]
description = "Coremail 邮件系统存在未授权访问漏洞，攻击者无需身份认证即可通过构造特制的 URL 路径 `/coremail/common/assets/` 直接访问系统敏感资源，从而获取管理员账号密码等关键信息。该漏洞影响 Coremail 邮件系统的多个版本，攻击条件简单，仅需目标系统对外开放 Web 服务即可远程利用，可能导致企业邮件系统被完全控制，造成严重的数据泄露风险。"
published = "0725"
remediation = "建议立即升级 Coremail 邮件系统至官方最新版本（XT5.0.9 及以上或 CMXT 最新补丁版本），修复未授权访问路径解析缺陷。若无法立即升级，可在 Nginx/反向代理层配置访问控制，拦截包含 `/coremail/common/assets/;/;/` 等分号绕过特征的异常请求路径，并对 `/coremail` 管理接口启用 IP 白名单限制；同时排查日志确认管理员账密是否已泄露，若已泄露应立即重置所有管理员账户密码。"
score = 5
