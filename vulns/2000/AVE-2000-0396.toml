[basic]
description = "AnalogX SimpleServer:WWW 1.0.5 存在缓冲区溢出漏洞，远程攻击者可通过向 cgi-bin 目录下的程序发送超长 GET 请求触发该漏洞，导致服务进程崩溃，造成拒绝服务。该漏洞影响 AnalogX SimpleServer:WWW 1.0.5 版本，CVSS 评分 7.5，危害等级高。攻击者无需身份认证即可远程利用，且已有公开的 PoC 代码，实际威胁较大。"
published = "2000-06-15T04:00:00.000"
remediation = "升级到 AnalogX SimpleServer:WWW 更高版本（如 1.1.0 以上），或迁移至其他受支持的 Web 服务器（如 Apache、Nginx、IIS）。如无法升级，在防火墙或反向代理层面限制对 80 端口的 CGI 目录访问，仅允许可信 IP 来源，并禁用不必要的 CGI 功能以降低攻击面。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "AnalogX SimpleServer:WWW 1.0.5 缓冲区溢出拒绝服务漏洞"
updated = "2026-06-16T21:51:48.603"

