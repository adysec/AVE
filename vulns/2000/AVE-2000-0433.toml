[basic]
description = "dump 软件包中的 restore 程序（版本 0.4b17 及之前）存在缓冲区溢出漏洞，本地攻击者可通过向 restore 程序传递超长磁带名称（tape name）参数触发该漏洞，导致缓冲区溢出，从而执行任意命令。该漏洞影响 Stelian Pop dump 0.4 及更早版本，CVSS 评分 7.2，危害等级高。利用该漏洞需要本地用户权限，无需认证即可完成攻击。"
published = "2000-06-07T04:00:00.000"
remediation = "建议立即升级 dump 软件包至 0.4b18 或更高版本。如无法升级，应移除 restore 程序的 setuid 位（chmod u-s /sbin/restore），并通过文件权限限制仅 root 用户可执行 restore，作为临时缓解措施。"
score = 7.2
severity = "HIGH"
sources = ["cve"]
title = "Stelian Pop dump restore 缓冲区溢出漏洞"
updated = "2026-06-16T21:51:54.720"

