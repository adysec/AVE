[basic]
description = "远程攻击者可通过向目标主机发送特制的 IP 或 ICMP 数据包，根据目标系统对异常数据包的不同响应特征（如 TTL 值、DF 标志位、ICMP 错误消息格式等）来识别其操作系统类型。该漏洞利用不同操作系统 TCP/IP 协议栈实现的差异进行被动或主动指纹识别，攻击者无需任何身份认证即可远程执行。使用 nmap、queso 等工具可自动化完成此探测过程，为后续针对性攻击提供信息支撑。该漏洞影响多种开源路由器及通用操作系统，危害等级严重。"
published = "1999-01-01T05:00:00.000"
remediation = "在边界防火墙上配置 ACL 规则丢弃不必要的 ICMP 报文（如 timestamp request、address mask request），并限制 TTL 回复行为；升级操作系统至最新版本，现代系统默认已缓解此类指纹识别攻击；使用 TCP 栈参数调优（如修改初始 TTL 值、禁用 ICMP 重定向）增加识别难度。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "多款操作系统 TCP/IP 协议栈远程操作系统识别漏洞"
updated = "2026-06-16T21:48:25.877"

