[basic]
description = "PHP/FI 2.0 的 php.cgi 脚本存在目录遍历漏洞，远程攻击者可通过向目标服务器发送特制的 HTTP 请求，利用路径遍历符（如 ../）绕过访问限制，读取系统上任意文件（如 /etc/passwd 等敏感文件）。该漏洞影响 PHP/FI 2.0 及更早版本，无需身份认证即可利用，CVSS 评分 10.0，危害等级严重。建议升级至更新版本或禁用 php.cgi 来修复。"
published = "1997-08-01T04:00:00.000"
remediation = "立即升级 PHP/Fi 2.0 至当前受支持的 PHP 版本（如 8.x 系列），该版本已停止维护 25 年以上。若无法升级，在 Web 服务器中禁用或移除 php.cgi 二进制文件；在 php.ini 中设置 cgi.force_redirect=1 和 doc_root 限定文档根目录，配置 open_basedir 限制文件访问范围仅为网站目录；编译时启用 --enable-force-cgi-redirect 选项，防止攻击者绕过重定向检查直接调用 CGI 二进制读取任意文件。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "PHP PHP/fi 2.0 目录遍历漏洞"
updated = "2026-06-16T21:47:58.650"

