[basic]
description = "Linux 内核 vdpa 子系统的 vdpa_nl_policy 结构体缺少对最大 VQP 属性的 nlattr 长度校验，本地攻击者可通过向目标系统发送特制的 nlmsg 消息触发越界读取漏洞（CWE-787）。该漏洞类似于 CVE-2023-3773，可导致敏感内存信息泄露或权限提升。影响使用受影响 Linux 内核版本的系统，CVSS 评分 7.8，危害等级高。建议升级至包含该补丁的内核版本。"
published = "2025-10-04T16:15:49.413"
remediation = '建议将 Linux 内核升级至以下安全版本：5.15.x 系列升级至 5.15.209 及以上，6.1.x 系列升级至 6.1.47 及以上，6.4.x 系列升级至 6.4.12 及以上，其他版本升级至 6.5 及以上。补丁提交为 baed19c108ac 等。如无法立即升级，可通过黑名单禁用 vDPA 内核模块（echo "blacklist vdpa" >> /etc/modprobe.d/blacklist.conf）作为临时缓解措施。'
score = 7.8
severity = "HIGH"
sources = ["msrc"]
title = "Linux 内核 vdpa 越界读取漏洞"
updated = "2026-06-18T14:29:50.373"

