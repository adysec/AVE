[basic]
description = "nfs-utils 软件包中的 rpc.statd 守护进程未能正确清理不可信格式字符串，存在格式字符串漏洞。远程攻击者无需认证即可向目标系统发送特制请求触发该漏洞，利用格式字符串特性执行任意代码，从而获取 root 权限。该漏洞影响 Conectiva 4.x/5.x、Debian 2.x、RedHat 6.x、S.u.S.E 6.x/7.0 及 Trustix 1.x 等 Linux 发行版，CVSS 评分 10.0，危害等级严重。"
published = "2000-07-16T04:00:00.000"
remediation = "升级 nfs-utils 至 0.1.6 或更高版本。对于无法升级的遗留系统，立即在 /etc/hosts.allow 和 /etc/hosts.deny 中限制 rpc.statd 仅允许受信 IP 访问，并在 iptables 层面阻断对 rpc.statd 端口 (默认 111 端口映射) 的外部连接。同时建议停用未使用的 NFS 服务以减小攻击面。"
score = 10
severity = "CRITICAL"
sources = ["exploitdb"]
title = "Linux nfs-utils rpc.statd 远程格式字符串漏洞"
updated = "2026-06-16T21:52:13.413"

