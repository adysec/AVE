[basic]
description = 'UltraBoard 1.6 中的 UltraBoard.pl 或 UltraBoard.cgi CGI 脚本存在目录遍历漏洞。远程攻击者可通过在路径名字符串中包含".."（点点）并以空字节结尾的方式，绕过路径限制读取服务器上的任意文件。该漏洞允许攻击者获取敏感配置文件、密码文件等未授权信息，危害中等。攻击条件简单，无需身份认证即可通过网络远程利用，影响运行 UltraBoard 1.6 的 Web 服务器。'
published = "2000-05-03T04:00:00.000"
remediation = '立即升级 UltraBoard 至 1.7 或更高版本，该版本已修复输入验证缺陷。如无法升级，在 Web 服务器（Apache/Nginx）层面配置 URL 重写规则，拦截包含 "../" 及空字节 (%00) 的请求路径；同时限制 CGI 脚本运行目录权限，确保 Web 用户无法读取 /etc/passwd 等系统敏感文件。'
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "UltraScripts UltraBoard 1.6 目录遍历漏洞"
updated = "2026-06-16T21:51:29.747"

