[basic]
description = "Microsoft IIS 4.0 的 Pickup 目录存在拒绝服务漏洞，本地攻击者可在该目录中创建文件名超长且扩展名为 .txt.eml 的邮件文件，导致 IIS 的 Inetinfo.exe 进程因无法正确处理畸形文件名而崩溃，造成拒绝服务。该漏洞仅需本地访问权限即可触发，攻击条件简单，影响 IIS 4.0 版本的 Web 服务可用性。CVSS 评分 2.1，危害等级低。"
published = "2000-02-15T05:00:00.000"
remediation = '升级至 IIS 5.0 或更高版本以彻底修复此漏洞；如无法升级，在 IIS 管理控制台中禁用 SMTP 服务的 Pickup 目录功能，或通过 NTFS 权限限制 Pickup 目录（默认路径 C:\Inetpub\mailroot\Pickup）的写入权限，仅允许受信任的应用程序访问。'
score = 2.1
severity = "LOW"
sources = ["exploitdb"]
title = "Microsoft IIS 4.0 Pickup 目录拒绝服务漏洞"
updated = "2026-06-16T21:51:08.410"

