[info]
author = "AVE"
description = "检测 NCSA HTTPd 中 PHF (电话簿查询) CGI 程序的远程缓冲区溢出漏洞(CVE-2000-1186)。攻击者通过发送超长查询字符串及特殊构造的 MIME 头 X: 至 /cgi-bin/phf，触发栈缓冲区溢出，覆盖返回地址，可导致远程代码执行，影响 Linux/x86 平台。"
id = "POC-AVE-2000-0837"
name = "NCSA HTTPd PHF CGI Remote Buffer Overflow PoC"
severity = "high"
tags = ["ave-2000-0837"]
vuln_id = [
    "CVE-2000-1186",
    "AVE-2000-0837",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/cgi-bin/phf"
protocol = "http"

[poc.requests.headers]
X = ""

[[poc.requests.matchers]]
expect = true
status = [200]
type = "status"
