[basic]
description = "Solution Scripts Home Free 1.0 中的 search.cgi 脚本存在目录遍历漏洞，远程攻击者可通过向该脚本提交包含 `..`（点点）序列的恶意请求，绕过路径限制访问服务器上的任意目录与文件。该漏洞影响 Home Free 1.0 版本，攻击者无需身份认证即可利用，可能导致敏感信息泄露。CVSS 评分 5.0，危害等级中危。"
published = "1999-01-03T05:00:00.000"
remediation = "立即停止使用 Home Free 系列产品（已停止维护），删除或重命名 search.cgi 文件，并在 Web 服务器（Apache/Nginx）配置中拒绝包含 `..` 的 URL 请求路径。建议迁移至现代支持目录遍历防御的内容管理系统。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Solution Scripts Home Free 目录遍历漏洞"
updated = "2026-06-16T21:50:54.393"

