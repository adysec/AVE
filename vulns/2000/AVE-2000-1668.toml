[basic]
description = "Sun Java Web Server 管理模块存在远程代码执行漏洞。攻击者可通过向管理模块上传恶意 Java 代码，然后请求以 /servlet/ 开头的 URL 调用 com.sun.server.http.pagecompile.jsp92.JspServlet，从而在服务器上执行任意命令。该漏洞无需认证即可远程利用，CVSS 评分 10.0，危害等级严重，可导致服务器完全被控制。"
published = "2000-11-14T05:00:00.000"
remediation = "立即升级 Sun Java Web Server 至 2.0 版本（含补丁），该版本修复了管理模块中未经授权即可通过 /servlet/ 路径调用 JspServlet 上传并执行任意 Java 代码的问题。如无法升级，在 Web 服务器配置中删除或禁用管理模块（admin module），并限制对 /servlet/ 路径的访问，仅允许受信 IP 通过防火墙规则访问管理端口。"
score = 10
severity = "CRITICAL"
sources = ["cve"]
title = "Sun Java Web Server 管理模块远程代码执行漏洞"
updated = "2026-06-16T21:52:31.923"

