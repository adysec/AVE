[info]
author = "AVE"
description = "检测 Oracle Java SE JDK 及 JRE 7 和 6 Update 27 及更早版本中 Rhino Script Engine 沙箱绕过漏洞。通过托管恶意 Java Applet 页面，诱导目标浏览器加载 Exploit.class，利用 Rhino Error 对象 toString 方法绕过沙箱限制执行任意代码。"
id = "POC-AVE-2011-0100"
name = "CVE-2011-3544 PoC"
severity = "critical"
tags = ["cve-2011-3544"]
vuln_id = [
    "CVE-2011-3544",
    "AVE-2011-0100",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["Java"]
