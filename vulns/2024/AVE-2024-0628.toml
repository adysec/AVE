[basic]
description = "Linux 内核工业 I/O (IIO) 子系统中 TI ADS8688 ADC 驱动的触发缓冲区实现存在信息泄漏漏洞。驱动在触发缓冲区模式下使用局部数组 buffer 向用户空间推送采样数据，但仅通过 iio_for_each_active_channel() 为活跃通道赋值，未初始化非活跃通道对应的数组元素。攻击者需具备本地低权限访问权限，通过触发 ADC 缓冲区读取操作，可读取内核栈上未初始化的内存残留数据（如指针、栈帧数据等），导致高机密性影响（内核内存泄露）和高可用性影响（可能引发内核崩溃）。影响搭载 TI ADS8688 ADC 芯片并启用 IIO 触发缓冲区功能的 Linux 内核版本（含主线内核及各发行版下游内核），攻击者需本地访问权限且能访问 IIO 设备节点，通过读取触发缓冲区数据即可触发信息泄露。Linux 内核已通过在推送数据前将 buffer 数组零初始化的方式修复该漏洞（CVE-2024-57906，CVSS 7.1 HIGH，CWE-908）。"
published = "2025-01-19T12:15:24.800"
remediation = "升级 Linux 内核到包含补丁 commit 1c80a0985a9a14f33dbf63cd703ca010f094f878 或更高版本（如 v6.6.72+、v6.12.10+、v6.13-rc6+），对 drivers/iio/adc/ti-ads8688.c 文件进行 patch 应用，确保 buffer 数组被初始化为零，防止非活跃通道的未初始化数据泄露给用户空间。"
score = 7.1
severity = "HIGH"
sources = ["msrc"]
title = "Linux 开源项目 IIO ADC 驱动程序 ti-ads8688 信息泄漏漏洞"
updated = "2026-06-17T08:14:11.857"

