[info]
author = "ave"
description = "检测 Oracle Java SE JRE 信任方法链远程代码执行漏洞。通过 HTTP 服务托管恶意 Java 小程序，利用 Statement.invoke() 信任方法链绕过安全限制执行任意代码。影响 Java SE 6 Update 18、5.0 Update 23、1.4.2_25。"
id = "POC-AVE-2010-0209"
name = "Oracle Java Runtime Environment Trusted Methods Chaining PoC"
severity = "critical"
tags = [
    "cve-2010-0840",
    "java",
    "rce",
    "trusted-chain",
]
vuln_id = [
    "CVE-2010-0840",
    "AVE-2010-0209",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "Java",
    "applet",
    "application",
]
