[basic]
description = "Oracle 8.x Intelligent Agent for Unix系统中包含的oratclsh解释器存在安全缺陷，本地用户可利用该解释器以root权限执行任意Tcl命令，导致权限提升、信息泄露或系统破坏。攻击者需要本地系统访问权限，无需认证即可利用。"
published = "1999-04-29"
remediation = "限制oratclsh解释器的访问权限，移除不必要的setuid位，仅授权可信用户使用Oracle Intelligent Agent组件。"
