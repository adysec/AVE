[basic]
description = "MySQL 3.21 版本的 mysqld 守护进程以全局可读权限创建日志文件，导致添加至用户数据库的用户密码被记录并暴露给所有本地用户。本地攻击者可直接读取日志文件获取用户凭证，进而实现未授权数据库访问。该漏洞影响 MySQL 3.21 版本，CVSS 评分 4.6，危害等级中危。"
published = "1998-12-27T05:00:00.000"
remediation = "升级 MySQL 至 3.23 及以上版本，该问题已在后续版本中修复。配置 umask 限制日志文件权限为 640，确保 mysqld 日志目录仅对 mysql 用户和 dba 组可读。在 my.cnf 中设置 log-bin、log-error 等日志文件路径指向权限受限目录，并通过 chmod 640 定期审计日志文件权限。"
score = 4.6
severity = "MEDIUM"
sources = ["epss"]
title = "MySQL mysqld 日志文件权限配置不当信息泄露漏洞"
updated = "2026-06-16T21:49:54.387"

