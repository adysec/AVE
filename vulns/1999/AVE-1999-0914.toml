[basic]
description = 'CVE-1999-0622 已被正式驳回（REJECT），原候选编号描述为"DNS 相关服务组件正在运行"。该条目仅涉及系统配置层面的 DNS 服务开放状态，属于安全配置审计范畴而非可直接利用的安全漏洞，不存在攻击路径与利用条件。此类配置信息更适合在通用配置枚举（CCE）中覆盖，不适用作 CVE 漏洞编号。因此该 CVE 不具有实际漏洞意义，不记录 CVSS 评分。'
published = "1999-01-01T05:00:00.000"
remediation = "配置 DNS 服务时应限制区域传输仅允许授权的辅助 DNS 服务器，关闭递归查询或将其限制为仅内网客户端，防止 DNS 反射放大攻击。同时部署 DNSSEC 保障数据完整性，禁止版本信息泄露，并定期审计 DNS 日志。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "通用 DNS 服务配置检测（非安全漏洞）"
updated = "2023-11-07T01:54:59.607"

