[info]
author = "AVE"
description = "验证 Netscape SmartDownload 1.3 是否存在远程缓冲区溢出漏洞。攻击者构造包含超长 URL（超过 271 字符）的恶意网页，诱导安装了 SmartDownload 的用户访问，触发 sdph20.dll 中 URL 解析函数的缓冲区溢出，可能导致任意代码执行。"
id = "POC-AVE-2001-0102"
name = "Netscape SmartDownload 1.3 Remote Buffer Overflow PoC"
severity = "high"
tags = ["ave-2001-0102"]
vuln_id = [
    "CVE-2001-0262",
    "AVE-2001-0102",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/trigger.html"
protocol = "http"

[poc.requests.body]
content = ""
type = "raw"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["SmartDownload"]
