[basic]
description = "man2html 在处理 CGI 临时文件时未对文件名进行安全校验，存在符号链接（symlink）竞争条件漏洞。本地攻击者通过在程序创建临时文件之前建立符号链接指向目标系统文件，可导致 man2html 将输出内容写入攻击者指定的任意文件，从而覆盖或篡改敏感数据。该漏洞影响 man2html 2.1 及之前版本，利用前提是攻击者拥有本地系统访问权限。"
published = "1999-08-20T04:00:00.000"
remediation = "升级 man2html 至 2.2 及以上版本，该版本已修复临时文件创建时的竞态条件与符号链接攻击问题。如无法升级，建议使用 `mktemp` 命令创建临时文件而非在 `/tmp` 下使用可预测文件名，或改用 `man2html` 的替代方案（如 `groff` + `man` 直接生成 HTML）。"
score = 4.6
severity = "MEDIUM"
sources = ["avd"]
title = "man2html 任意文件写入漏洞"
updated = "2026-06-16T21:50:43.720"

