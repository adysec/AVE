[basic]
description = "WebShield SMTP管理系统4.5.44版本存在安全漏洞，该系统在处理未解析主机名的IP地址时，未能正确限制管理端口的访问权限，导致攻击者可通过GET_CONFIG命令远程访问系统配置。该漏洞影响范围广泛，只要存在网络通信，该管理工具均可受到影响，攻击者无需身份验证即可执行远程代码访问操作，最终可能导致敏感信息泄露，威胁到用户的网络安全。利用此漏洞攻击者可以通过发送特制网络请求来绕过访问控制机制，获取系统配置信息，并可能进一步利用获取的信息进行攻击。Microsoft已发布安全更新修复了此漏洞，建议用户及时进行系统更新以确保安全。"
published = "2000-05-01T04:00:00.000"
remediation = "建议立即升级至 WebShield SMTP 4.5.44 之后的修复版本（建议升级至 McAfee Security for Email Servers 最新版）。若无法升级，请在防火墙配置仅允许受信任管理IP访问 SMTP 管理端口（默认 8081/TCP），并在 DNS 服务器配置管理服务器 IP 的 PTR 反向解析记录，确保 IP 能正确解析为主机名以触发访问控制。若产品已停止维护，建议迁移至 Microsoft Exchange Online Protection 或 Proofpoint Email Protection 等现代邮件安全网关。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "网络联合 WebShield SMTP 管理工具 SMTP管理端口访问控制绕过漏洞"
updated = "2026-06-16T21:51:45.323"

