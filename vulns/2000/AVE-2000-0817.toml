[basic]
description = "Caldera Linux 系统中所集成的通用鼠标服务（gpm）存在安全漏洞，本地攻击者可通过向该服务发送特制请求利用此漏洞，从而删除系统任意文件或触发拒绝服务（DoS）条件。该漏洞影响 Caldera Linux 发行版，利用前提是攻击者已获得本地系统访问权限。CVSS 评分为 3.6，危害等级较低。"
published = "2000-07-27"
remediation = "将 gpm 软件包升级到 Caldera 官方已修复的版本，或应用相应安全补丁。如系统不需要鼠标控制台功能，建议通过系统启动项配置禁用以减少攻击面。管理有本地访问权限的用户列表，避免赋予不可信用户 shell 访问权限。"
score = 3.6
severity = "LOW"
sources = ["cve"]
title = "Caldera Linux gpm 本地文件删除与拒绝服务漏洞"
updated = "2000-07-27"

