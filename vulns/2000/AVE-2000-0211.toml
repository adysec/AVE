[basic]
description = "Microsoft Windows NT 4.0 及 Windows 2000 系统的 TCP/IP 打印服务（Print Services for Unix）存在拒绝服务漏洞。远程攻击者无需身份认证，只需向目标系统的打印服务端口发送特制的畸形 TCP/IP 打印请求，即可导致打印服务崩溃或系统资源耗尽，造成拒绝服务。该漏洞危害等级较低，但影响 Windows NT 4.0 和 Windows 2000 系列版本，攻击者可在局域网或远程环境下实施攻击。"
published = "2000-03-30T05:00:00.000"
remediation = '安装 Microsoft Security Bulletin MS00-021 对应补丁。在 Windows 2000 中禁用 TCP/IP Print Server (LPDSVC) 服务；在 Windows NT 4.0 中停止并禁用 "TCP/IP Print Server" 服务。在防火墙层面过滤入站 515 端口 (LPD) 流量，阻断外部打印请求。如打印服务非业务必需，建议永久禁用该服务以彻底消除攻击面。'
score = 2.1
severity = "LOW"
sources = ["avd"]
title = "Microsoft Windows NT 4.0/2000 TCP/IP Printing Service 拒绝服务漏洞"
updated = "2026-06-16T21:51:16.883"

