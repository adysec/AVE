[basic]
description = "PowerScripts PlusMail WebConsole 1.0 的 CGI 程序存在弱认证漏洞，其密码文件权限设置不当，导致远程攻击者无需有效凭据即可直接访问或修改密码文件，进而获取系统控制权限。攻击者可通过向目标服务器发送特制 HTTP 请求，利用不安全的文件权限读取或覆盖密码文件，从而以管理员身份执行任意命令。该漏洞影响 PlusMail WebConsole 1.0 版本，CVSS 评分 7.5，危害等级高，建议升级至最新版本或严格限制密码文件访问权限。"
published = "2000-01-11T05:00:00.000"
remediation = "立即修复 PlusMail 密码文件权限，确保 `password.txt` 等敏感文件权限设置为 600 或更严格，仅允许 Web 服务进程所有者读写。同时升级到 PowerScripts PlusMail 最新版本（如厂商已停止维护，建议迁移至其他受支持的邮件 Web 管理方案）。在 Web 服务器（如 Apache）层面配置访问控制，限制 `/cgi-bin/` 目录仅允许授权 IP 访问，并禁用目录列表功能。"
score = 7.5
severity = "HIGH"
sources = ["exploitdb"]
title = "PowerScripts PlusMail WebConsole 弱认证漏洞"
updated = "2026-06-16T21:50:56.790"

