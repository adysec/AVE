[basic]
description = "Softarc FirstClass 网络服务器 5.506 及更早版本的 E-mail 客户端存在敏感信息明文存储漏洞。程序将用户登录凭据（用户名和密码）以未加密的明文形式保存在本地文件中，包括 5.506 版本的 home.fc、3.5 版本的 network.fc 以及开启日志时的 FCCLIENT.LOG 文件。攻击者在获取受害者主机访问权限后，可直接读取上述文件中的凭据信息，进而利用泄露的账号登录 FirstClass 服务，导致横向移动或权限提升。"
published = "1999-08-30T04:00:00.000"
remediation = '该漏洞厂商从未发布补丁且产品已停止维护，建议立即迁移至受支持的邮件系统（如 Microsoft Exchange 或开源方案）。如无法迁移，须在客户端设置中取消勾选"保存密码"选项，避免将凭据写入 home.fc/network.fc 文件；同时禁用 FCCLIENT.LOG 日志记录功能，并严格限制客户端计算机的物理访问权限。'
score = 4.6
severity = "MEDIUM"
sources = ["avd"]
title = "Softarc FirstClass 网络服务器电子邮件客户端明文凭据存储漏洞"
updated = "2026-06-16T21:50:15.720"

