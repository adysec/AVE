[basic]
description = "泛微OA E-Cology V9版本中/page/exportImport/uploadOperation.jsp接口存在未授权任意文件上传漏洞。攻击者无需任何身份认证即可通过构造multipart/form-data请求直接上传包含恶意代码的JSP文件至服务器，上传后的文件可被直接访问并执行，导致攻击者获取WebShell权限，进而完全控制服务器执行任意系统命令、窃取敏感数据或进行内网横向移动。该漏洞影响范围广且利用门槛低，危害严重。"
published = "2023-08-15"
remediation = "升级泛微E-Cology至官方安全版本（≥V10.0），如无法升级则在Nginx/WAF层配置上传目录禁止解析JSP脚本文件，限制/page/exportImport/uploadOperation.jsp接口仅允许可信IP访问，并对上传文件进行严格的类型和内容校验。"
score = 9.8
severity = "CRITICAL"
sources = ["hwpoc"]
title = "泛微 E-Cology uploadOperation.jsp 任意文件上传漏洞"
updated = "2023-08-15"

