[basic]
description = "RedHat 6.2/7.0 版本中 tmpwatch 工具的 --fuser 选项存在命令注入漏洞，由于对文件名中的 Shell 元字符（如反引号、分号、管道符等）缺乏过滤和转义，本地攻击者可通过创建包含恶意 Shell 元字符的文件名，诱使 tmpwatch 在执行 --fuser 选项处理临时文件清理时触发命令注入，从而以 tmpwatch 进程权限（通常为 root 权限）执行任意命令。该漏洞影响 RedHat Linux 6.2 和 7.0 版本，攻击条件为本地用户具备创建文件权限，CVSS 2.1 评分（本地攻击、低复杂度、部分完整性影响），属于本地权限提升漏洞，RedHat 已发布补丁修复（MDKSA-2000-056）。"
published = "2000-10-06T04:00:00.000"
remediation = "建议升级 tmpwatch 到 2.8.4 或更高版本（RedHat 6.2 升级至 tmpwatch-2.8.4-2，RedHat 7.0 升级至 tmpwatch-2.8.4-3）。若无法立即升级，可编辑 /etc/cron.daily/tmpwatch 移除 --fuser 参数，或使用 chattr +i 锁定 /tmp 防止创建包含 shell 元字符的文件名作为临时缓解。"
score = 2.1
severity = "LOW"
sources = ["cve"]
title = "RedHat Tmpwatch 任意命令执行漏洞"
updated = "2026-06-16T21:52:32.177"

