[basic]
description = "Mistune（Python Markdown 解析器）的 `parse_link_text` 函数在处理大量连续 `[` 字符时存在二次时间复杂度（O(n²)）问题。外层循环每次仅前进 1 个字符，而每次失败调用都会对剩余字符串执行 O(n) 扫描，导致 CPU 资源耗尽。未经身份认证的远程攻击者可通过提交特制的 Markdown 文本（约 6KB 载荷即可使 CPU 阻塞数秒）触发拒绝服务。该漏洞影响 Mistune 3.3.0 之前所有版本，CVSS 评分 8.7，危害等级高危。建议升级至 3.3.0 或更高版本修复。"
published = "2026-06-24T18:17:18.937"
remediation = "升级 Mistune 至 3.3.0 或更高版本（`pip install --upgrade mistune`）。如无法立即升级，可在解析用户输入的 Markdown 前，限制输入长度（如 ≤4096 字符）或过滤连续 `[` 字符超过一定数量的输入作为临时缓解措施。"
score = 8.7
severity = "HIGH"
sources = ["ghsa"]
title = "Mistune Markdown 解析器 parse_link_text CPU耗尽拒绝服务漏洞"
updated = "2026-07-15T02:22:36.243"

