[basic]
description = "Linux 内核 USB DWC3 控制器驱动中存在内存泄漏漏洞。在驱动初始化过程中，`dwc3_get_properties()` 函数调用 `power_supply_get_by_name()` 获取 USB 电源供应器引用，但 probe 函数的错误处理路径上未正确释放该引用，导致引用计数泄漏（CWE-401）。本地低权限攻击者可通过反复触发异常 probe 路径持续消耗系统内存，最终导致拒绝服务（系统崩溃或内存资源耗尽）。该漏洞影响多个 Linux 内核版本，CVSS 评分 5.5，危害等级中危。"
published = "2025-09-17T15:15:34.397"
remediation = '升级 Linux 内核至 5.10.165+、5.15.90+、6.1.8+ 或 6.2+ 版本，其中已包含 dwc3_get_properties() 中 power_supply_get_by_name() 返回值的释放修复。若无法升级内核，可通过黑名单模块禁用 dwc3 驱动（`echo "blacklist dwc3" >> /etc/modprobe.d/blacklist-dwc3.conf`），此操作将禁用 USB 3.0 控制器，仅建议在无 USB 3.0 需求的嵌入式场景中临时使用。'
score = 5.5
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux 内核 USB DWC3 核心驱动内存泄漏漏洞"
updated = "2026-06-17T05:23:19.083"

