[basic]
description = "Digital UNIX（即 Tru64 UNIX）4.0 至 4.0d 版本中的高级文件系统工具（advfs）存在本地权限提升漏洞。该漏洞源于 advfs 实用程序在处理文件操作时对权限校验逻辑存在缺陷，导致已登录系统的本地普通用户能够利用该工具绕过正常的访问控制机制，将自身权限提升至更高等级（如 root）。攻击条件要求攻击者必须先在目标主机上获得一个合法的本地用户账户，并能够执行受影响的 advfs 相关命令；由于属于本地利用，无需网络访问即可完成。成功利用后，攻击者可完全控制受影响系统，读取、修改或删除任意文件，并执行任意系统级操作，对系统机密性、完整性和可用性构成严重威胁。"
published = "1998-05-07T04:00:00.000"
remediation = "建议将 Digital UNIX（Tru64 UNIX）升级至 4.0e 或后续已修复版本，并安装厂商发布的相关补丁。如无法立即升级，应限制普通用户对 advfs 相关程序的访问权限，通过文件系统权限配置（如 chmod 去除 setuid 位）及最小权限原则降低本地提权风险，同时加强审计日志监控异常提权行为。"
score = 4.6
severity = "MEDIUM"
sources = ["avd"]
