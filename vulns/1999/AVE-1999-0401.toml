[basic]
description = "Sun SunOS 4.1、4.1.1 及 4.1.2 版本中存在拒绝服务漏洞，远程攻击者可通过向目标系统发送伪造的 ICMP 不可达数据包，导致目标系统网络连接中断，无法正常处理后续通信。该漏洞源于操作系统对 ICMP 协议数据包的处理缺陷，攻击者无需身份认证即可发起攻击，影响范围覆盖整个 SunOS 4.1 系列版本。"
published = "1992-07-21T04:00:00.000"
remediation = "立即升级至 Sun Solaris 7 及以上版本（SunOS 4.x 已停止技术支持）。如无法升级，在网关/防火墙上过滤入站 ICMP Unreachable 报文（丢弃类型 3 的 ICMP 包），并配置内核参数 `ndd -set /dev/ip ip_respond_to_echo_broadcast 0` 禁用相关 ICMP 响应以缓解攻击面。"
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "Sun SunOS 4.1 ICMP Unreachable 数据包拒绝服务漏洞"
updated = "2026-06-16T21:47:55.663"

