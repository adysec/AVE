[basic]
description = "Phorum 3.0.7 的 violation.php3 文件存在任意邮件中继漏洞，未经身份认证的远程攻击者可通过构造恶意的 Mod 和 ForumName 参数，利用该脚本将邮件服务器作为垃圾邮件代理，向任意邮箱地址发送大量垃圾邮件。该漏洞影响 Phorum 3.0.7 版本，危害等级中等，攻击者无需特殊权限即可发起攻击。"
published = "2000-12-31T05:00:00.000"
remediation = "升级 Phorum 至 3.0.8 及以上版本，该版本已修复 violation.php3 的参数校验缺陷。如无法升级，在 Web 服务器配置中限制对 violation.php3 文件的访问，并验证 Mod 与 ForumName 参数来源。同时在防火墙中限制服务器仅允许授权的邮件中继目标地址。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Phorum 3.0.7 violation.php3 任意邮件中继漏洞"
updated = "2026-06-16T21:53:26.140"

