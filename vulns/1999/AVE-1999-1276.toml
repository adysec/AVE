[basic]
description = "AMD K6 处理器与 Linux 2.0.x 及 2.1.x 内核配合使用时存在拒绝服务漏洞。本地攻击者可通过执行特定的指令序列触发该漏洞，该指令序列涉及越段内存地址访问（访问段外地址），导致内核崩溃，系统无法正常运行。该漏洞影响搭载 AMD K6 处理器且运行 Linux 2.0.x 和 2.1.x 内核的系统，攻击者需具备本地访问权限，无需高权限即可利用，危害较高。"
published = "1998-06-22T04:00:00.000"
remediation = "升级至 Linux 内核 2.2.0 或更新版本，该版本已修复 AMD K6 处理器在特定指令序列下访问越界地址导致系统崩溃的问题。受影响的版本为 2.0.0~2.0.39 及 2.1.0~2.1.132，应立即停止使用这些已终止支持的内核分支。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "AMD K6处理器 拒绝服务漏洞"
updated = "2026-06-16T21:50:26.983"

