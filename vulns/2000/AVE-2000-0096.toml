[basic]
description = "Debian GNU/Linux 在默认安装时使用了安全性不足的引导扇区（MBR，主引导记录），该引导记录未对本地启动设备进行足够限制。在系统安装阶段，具备本地物理接触或控制台访问权限的用户可利用此缺陷，在开机时插入软盘并从软盘引导启动系统，从而绕过正常的安装与引导流程及潜在的安全控制。该漏洞影响采用 Debian GNU/Linux 默认安装配置的本地系统，攻击条件为攻击者需拥有对目标机器的本地物理访问权限，利用方式是在安装过程中插入软盘并选择从软盘引导，进而可能干扰或绕过系统安装与后续的安全机制。"
published = "2000-02-02T05:00:00.000"
remediation = "升级到已修复该问题的 Debian GNU/Linux 2.2 (potato) 及以上版本，安装后使用 lilo 或 grub-install 重新写入受保护的 Master Boot Record。在安装阶段对服务器加设 BIOS 密码并禁用软盘启动（将 BIOS 启动顺序设为仅从硬盘启动），同时对物理控制台实施访问限制，防止本地用户借软盘引导绕过系统安全限制。"
score = 7.2
severity = "HIGH"
sources = ["cve"]
title = "Debian GNU/Linux MBR 安全绕过漏洞"
updated = "2026-06-16T21:51:01.543"

