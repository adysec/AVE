[basic]
description = '施耐德电气 EcoStruxure Control Expert 存在本地提权漏洞，攻击者通过利用 Windows Installer 的 MSI 回滚机制（C:\Config.msi\ 目录权限缺陷），可在已获得低权限访问的情况下将权限提升至 SYSTEM。该漏洞允许攻击者完全控制系统，影响 EcoStruxure Control Expert 系列版本。攻击需要本地访问权限，但无需用户交互，危害等级高。'
published = "20250601"
remediation = '''
立即升级到 Schneider Electric EcoStruxure Control Expert 最新版本（建议 2024 年 10 月发布 v10.2.0 或更高），完成完整安装后删除 C:\Config.

Based on my research:

The vulnerability is: EcoStruxure Control Expert 本地提权漏洞 - 利用 C:\Config.msi\ MSI 回滚机制提权至 SYSTEM


Got the SEVD PDF! Let me extract text from it.

The HWPOC describes a local privilege escalation via C:\Config.msi\ MSI rollback mechanism to SYSTEM - this is a classic MSI installer race/rollback LPE pattern. I couldn't find an exact CVE matching Config.msi for EcoStruxure Control Expert specifically.


基于 SEVD-2023-101-03：受影响为 v16.0 之前版本，应升级至 16.0，并针对 `C:\Config.msi` MSI 回滚提权做权限与安装过程加固。

<value>立即将 EcoStruxure Control Expert 升级至 v16.0 或更高版本（v16.0 已修复相关本地提权问题）。升级前完整备份工程与授权，并在离线/测试环境验证后再上线。若暂无法升级：以管理员身份删除或加固残留的 C:\Config.msi 目录（取消 Users 写/修改权限，仅 Administrators/SYSTEM 可写）；禁止普通用户本地安装/修复 MSI；开启应用白名单（如 McAfee Application Control）阻止非授权 msiexec 与回滚脚本；限制工程站仅可信账户登录，并禁用不必要的本地管理员权限。
'''
