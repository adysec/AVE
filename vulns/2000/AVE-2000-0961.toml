[basic]
description = "Ipswitch IMail 6.00 Web 服务存在拒绝服务漏洞，远程未认证攻击者可通过发送大量包含超长 Host 头的 HTTP 连接，导致服务线程崩溃引发拒绝服务。该漏洞影响 Ipswitch IMail 6.00 版本，攻击者无需认证即可远程发起攻击，通过发送大量恶意构造的 HTTP 请求消耗服务器线程资源导致服务拒绝，CVSS 评分 5.0（AV:N/AC:L/Au:N/C:N/I:N/A:P），属于可用性部分影响的中危漏洞。Ipswitch 已发布补丁修复该漏洞，建议升级到修复版本。"
published = "2000-11-14T05:00:00.000"
remediation = "建议立即升级 Ipswitch IMail 至 6.01 或更高版本（官方已发布补丁修复长 Host 头导致的线程崩溃）。若无法立即升级，可在防火墙或 WAF 层面限制单 IP 连接数并拦截超长 Host 头（建议限制 Host 头长度 ≤ 255 字符），同时在 IMail 服务配置中降低最大并发连接数作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Ipswitch IMail 6.00 Web Service 拒绝服务漏洞"
updated = "2026-06-16T21:52:32.720"

