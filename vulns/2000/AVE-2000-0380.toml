[basic]
description = "Debian GNU/Linux 2.1 系统中的 dump 备份还原工具在处理符号链接时存在权限验证缺陷，未能正确恢复符号链接的所有权属性。本地攻击者可通过在备份文件中构造恶意的符号链接，在还原过程中利用该漏洞将任意文件的所有权修改为其他用户，从而实现对系统文件的非授权篡改。该漏洞攻击复杂度低，无需身份认证，但需要本地访问权限，CVSS 评分 2.1，危害等级低。"
published = "1999-12-02T05:00:00.000"
remediation = "升级 Debian GNU/Linux 至 3.0 或更高版本，其中 dump 已修复符号链接处理逻辑。如无法升级，限制本地用户对 dump 命令的执行权限（chmod 750 /sbin/dump），并仅授予可信用户本地 shell 访问权限以降低攻击面。"
score = 2.1
severity = "LOW"
sources = ["avd"]
title = "Debian GNU/Linux 2.1 dump 符号链接还原漏洞"
updated = "2026-06-16T21:51:34.033"

