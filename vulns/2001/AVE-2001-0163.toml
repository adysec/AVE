[basic]
description = "IPFilter 3.4.16 及更早版本存在访问控制绕过漏洞。由于数据包过滤模块在处理分片数据包时，缓存中未包含充分的会话状态信息，远程攻击者可通过先向目标系统的未限制端口发送完整数据包建立会话缓存，再向限制端口发送特制的分片数据包，从而绕过 IP 规则过滤机制访问受限端口。该漏洞影响 IPFilter 3.x 系列版本，CVSS 评分 7.5，危害等级高。"
published = "2001-06-18T04:00:00.000"
remediation = "升级 IPFilter 至 3.4.17 或更高版本，该版本修复了分片包缓存会话信息不足的问题。如无法升级，可在防火墙上配置 `block in log quick` 规则丢弃所有分片包，或启用 `ipf -T fragstate` 增强分片状态跟踪作为临时缓解措施。"
score = 7.5
severity = "HIGH"
sources = ["exploitdb"]
title = "IPFilter IP分片规则绕过漏洞"
updated = "2026-06-16T21:54:14.413"

