[basic]
description = "Linux 内核 DRM 子系统的 adv7511 显示桥接驱动中存在释放后使用（Use-After-Free）漏洞。在 adv7533_parse_dt() 函数中，host_node 指针被赋值后即被释放，而后续 adv7533_attach_dsi() 函数仍继续使用该已释放的指针，导致释放后使用。本地攻击者利用此漏洞可造成内核内存损坏，导致系统崩溃或权限提升。攻击者需具备本地低权限访问，无需用户交互即可触发，影响系统的机密性、完整性和可用性。该漏洞影响使用 Linux 内核且启用 DRM adv7511 驱动的系统，CVSS 评分 7.8，危害等级高。"
published = "2025-01-15T13:15:13.130"
remediation = "立即将 Linux 内核升级至以下已修复版本：长期支持分支升级至 5.10.234、6.1.125、6.6.70 或 6.12.9 及以上版本，主线升级至 6.13 及以上版本。对应发行版用户：Debian 11 安装 linux-5.10.0-34 更新（DLA-4075-1），Debian 12 安装对应内核更新（DSA-5860-1），Ubuntu 24.04 LTS 安装 USN-7381-1 更新。如无法立即升级，可通过禁用 adv7511 DRM 桥接驱动模块（modprobe -r adv7511）作为临时缓解措施。"
score = 7.8
severity = "HIGH"
sources = ["msrc"]
title = "Linux Kernel DRM ADV7511 驱动释放后使用漏洞"
updated = "2026-06-17T08:14:09.020"

