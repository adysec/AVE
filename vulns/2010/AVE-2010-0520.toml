[basic]
description = 'SAP NetWeaver Java 应用服务器中的 Invoker Servlet 在 7.3 版本之前未正确实施访问控制，远程攻击者无需任何身份认证即可通过构造特制的 HTTP 或 HTTPS 请求直接调用该 Servlet，从而在目标服务器上执行任意代码。该漏洞被称为 "Detour" 攻击，早在 2013 年至 2016 年间已被广泛利用于真实环境中，影响范围包括 SAP NetWeaver 全系列版本。由于 Servlet 容器默认开放且缺少必要的权限校验，攻击条件门槛极低，只需目标服务器暴露在网络上即可实施攻击，危害等级为严重。'
published = "2016-05-13T10:59:00.173"
remediation = "立即应用 SAP Note 1445998 提供的补丁，将 SAP NetWeaver Application Server Java 升级至 7.3 及以上版本。如无法立即升级，在 J2EE Engine 配置中禁用 Invoker Servlet（移除 servlet 映射 /Invoker/），或通过 Web 服务器反向代理规则限制对 /Invoker/* 路径的访问，仅允许受信 IP 段访问 SAP Java 服务。"
score = 10
severity = "CRITICAL"
sources = ["kev"]
title = "SAP NetWeaver Application Server Java Invoker Servlet 远程代码执行漏洞"
updated = "2026-06-16T23:26:33.823"

