[basic]
description = "汉王e脸通综合管理平台 meetingFileManage.do 接口存在 SQL 注入漏洞，攻击者可在未经身份认证的情况下向该接口构造恶意 SQL 查询语句，从而窃取数据库中的敏感信息（如用户凭证、考勤数据等），甚至获取服务器控制权限。该漏洞影响汉王e脸通综合管理平台多个版本，攻击条件低，危害较大。"
published = "0701"
remediation = """联系汉王科技获取修复版本的升级补丁，对 meetingFileManage.do 接口的传入参数进行预编译绑定处理，避免拼接 SQL 语句。同时在 Web 应用防火墙（WAF）侧配置针对该接口的 SQL 注入拦截规则，对参数中的特殊字符（'、"、--、union、select 等）进行过滤和转义，作为临时缓解措施。建议对所有数据库操作统一使用参数化查询框架（如 MyBatis 的 #{} 或 JDBC PreparedStatement）替代字符串拼接。"""
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "汉王 e脸通综合管理平台 meetingFileManage.do SQL注入漏洞"
updated = "0701"

