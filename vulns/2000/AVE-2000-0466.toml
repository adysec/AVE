[basic]
description = "Cobalt RaQ2 和 RaQ3 服务器在通过 FrontPage 扩展上传文件时，未能正确设置文件访问权限和所有权，导致 CGI 包装器（cgiwrap）的安全限制被绕过。远程攻击者无需身份认证即可利用此缺陷上传恶意文件或修改服务器上的现有文件，从而获得对系统的未授权访问权限。该漏洞影响 Cobalt RaQ2 及 RaQ3 系列服务器设备，CVSS v2 评分 7.5，危害等级高。"
published = "2000-05-22"
remediation = "Cobalt RaQ2/RaQ3 已停产且不再受支持，建议立即迁移至受支持的服务器平台。如暂时无法迁移，可采取以下缓解措施：1) 禁用 FrontPage Server Extensions 服务（执行 `/etc/rc.d/init.d/frontpage stop && chkconfig frontpage off`）；2) 手动设置上传目录 umask 为 027，确保文件归属为 www 用户且组权限仅读；3) 在 Apache 配置中限制 cgiwrap 的执行权限，仅允许受信用户访问；4) 在防火墙层面限制对 80/443 端口的来源 IP 范围。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Cobalt RAQ 2/RAQ 3i 安全绕过漏洞"
updated = "2000-05-22"

