[basic]
description = "Trend Micro OfficeScan 企业版（3.0、3.5、3.11、3.13 等版本）的客户端服务在处理网络连接时存在拒绝服务漏洞。远程攻击者无需身份认证，只需向目标主机监听的 12345 端口发起 5 次连接请求，即可触发该漏洞，使目标进程的 CPU 占用率升至 100%，造成服务无响应或系统资源耗尽。该漏洞影响运行上述版本 OfficeScan 客户端的 Windows 主机，攻击条件简单、可远程发起且无需特权，但仅导致可用性丧失，属中危拒绝服务类问题。"
published = "2000-02-28T05:00:00.000"
remediation = "升级 Trend Micro OfficeScan 客户端至官方已修复版本，或应用 Trend Micro 发布的官方安全补丁以修复 12345 端口连接处理缺陷，并在防火墙层面限制对 12345 端口的未授权访问。"
score = 5.0
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Trend Micro OfficeScan 客户端拒绝服务漏洞"
updated = "2026-06-16T21:51:13.130"

