[basic]
description = "Xylan OmniSwitch（后为阿尔卡特 OmniSwitch）3.2.6 之前版本存在登录绕过漏洞。远程攻击者可通过向交换机登录提示符发送 CTRL-D（Control D）字符绕过身份认证，由于该交换机仅支持单会话同时登录，此操作将锁定其他合法管理员的会话，导致交换机拒绝服务。攻击无需任何认证，仅需网络可达即可利用。"
published = "1999-03-31T05:00:00.000"
remediation = "升级到 Xylan OmniSwitch 3.2.6 及以上版本，该版本修复了 CTRL-D 绕过登录提示的漏洞。如无法升级，可在交换机管理界面配置访问控制列表（ACL），限制管理端口的源 IP 范围，仅允许受信任的管理员 IP 连接，降低被攻击风险。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Xylan OmniSwitch 登录验证绕过拒绝服务漏洞"
updated = "2026-06-16T21:50:42.983"

