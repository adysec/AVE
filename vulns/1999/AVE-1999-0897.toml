[basic]
description = "Gauntlet 5.0 BSDI 防火墙在按照特定顺序安装 BSDI 官方补丁时，补丁间的依赖关系和加载顺序存在缺陷，导致远程攻击者能够利用该顺序缺陷绕过防火墙预设的访问控制规则，访问原本被拦截的网络资源或服务。由于该绕过行为不会被系统日志记录，安全审计人员无法通过日志追踪相关攻击活动，造成安全防护盲区。该漏洞影响 Gauntlet 5.0 BSDI 版本，CVSS 评分 7.5，危害等级较高。建议管理员按照官方推荐顺序安装补丁并复核防火墙规则配置，以消除安全绕过风险。"
published = "1999-10-18T04:00:00.000"
remediation = "正确安装补丁顺序：先安装 BSDI 补丁 M310-049，再安装 Gauntlet 5.0，最后重新编译并重启内核；或联系 NAI/TIS 获取官方修复补丁。临时缓解措施：以 root 身份将 /usr/local/sys.gauntlet/i386/OBJ/ip_input.o 复制到 /usr/src/sys/i386/OBJ，执行 /usr/local/sys.gauntlet/build_kernel/build_kernel 50.1 重新编译内核后重启系统，防止防火墙访问规则被绕过且无日志记录。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
