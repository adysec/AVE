[basic]
description = "Apache ActiveMQ Web 控制台中的 Jolokia JMX-HTTP 桥接端点（/api/jolokia/）存在不当输入验证与代码注入漏洞。经过身份认证的攻击者可利用默认 Jolokia 访问策略允许对 ActiveMQ MBeans 执行操作的特性，通过调用 addNetworkConnector 或 addConnector 方法传入特制的 discovery URI，触发 VM 传输协议的 brokerConfig 参数加载远程恶意 Spring XML 应用上下文。由于 Spring 的 ResourceXmlApplicationContext 在 BrokerService 验证配置之前即实例化所有单例 bean，通过 bean 工厂方法（如 Runtime.exec）可在代理 JVM 上实现任意代码执行。该漏洞影响 Apache ActiveMQ 5.19.4 以下版本及 6.0.0 至 6.2.3 以下版本，CVSS 评分 8.8，危害等级高危。用户应升级至 5.19.4 或 6.2.3 版本修复。"
published = "2026-04-07T09:16:20.967"
remediation = "立即升级至 Apache ActiveMQ 5.19.4 或 6.2.3 及以上版本（官方已修复 addNetworkConnector 中 vm:// 传输协议的远程加载问题）。在反向代理/WAF 层面限制 /api/jolokia/ 端点仅允许受信 IP 访问；修改 jolokia-access.xml 将 org.apache.activemq:* 的 exec 操作权限设为 none 或仅保留只读操作。将 ActiveMQ Web 控制台绑定内网管理地址，禁用默认 admin/admin 凭据并启用强密码策略。若无法立即升级，可在 6.0.0-6.1.1 版本中临时禁用 Jolokia 端点或通过防火墙限制 8161 端口访问。"
score = 8.8
severity = "HIGH"
sources = ["hwpoc"]
title = "Apache ActiveMQ Jolokia 远程代码执行漏洞"
updated = "2026-07-15T02:20:30.640"

