[basic]
description = "深信服运维安全管理系统（OSM）的 /protocol/session 接口存在命令注入漏洞。攻击者可通过向该接口发送特制请求注入系统命令，从而在目标服务器上执行任意命令，获取服务器控制权。该漏洞影响 OSM 3.0.12 之前版本，攻击条件低，无需高级权限即可远程利用，危害较大。厂商已发布安全更新，建议用户升级至 3.0.12 20241106 及以上版本修复此漏洞。"
published = "nday"
remediation = "升级深信服运维安全管理系统至 3.0.12 20241106+ 版本，该版本已修复 /protocol/session 接口的命令注入漏洞。如无法立即升级，可在运维安全管理系统前端 WAF 或网络防火墙上添加规则，拦截对 /protocol/session 路径的异常请求参数作为临时缓解。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "深信服 运维安全管理系统 OSM 命令注入漏洞"
updated = "nday"

