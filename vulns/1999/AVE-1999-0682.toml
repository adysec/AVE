[basic]
description = "iHTML Merchant 电子商务软件存在输入过滤缺陷，远程攻击者可通过在请求参数中注入特殊的 iHTML 服务端解析标签或元字符，诱使服务器执行任意 iHTML 代码，从而读取服务器上的敏感文件（如配置文件、订单数据）或在 Web 服务器上下文中执行任意命令。攻击无需身份认证，仅需构造恶意 HTTP 请求即可触发，可导致信息泄露及服务器被完全控制。"
published = "1999-09-16T04:00:00.000"
remediation = "由于 iHTML Merchant 厂商已停止运营且官方补丁页面已下线，该漏洞无可用官方补丁。建议立即停用 iHTML Merchant 并迁移至维护中的替代产品。如因业务原因无法立即替换，应在 Web 服务器前部署 WAF 拦截包含特殊代码解析特征的请求，并在网络层面限制对该系统的访问源，仅允许可信 IP 段访问。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "iHTML Merchant 远程代码执行与信息泄露漏洞"
updated = "2026-06-16T21:49:16.180"

