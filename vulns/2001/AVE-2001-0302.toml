[basic]
description = "Sun Microsystems 开发的 Sun Validation Test Suite（SunVTS）4.3 及更早版本中，ptexec 工具在处理 -o 命令行参数时存在缓冲区溢出漏洞。该程序未对用户传入的参数长度进行充分的边界检查，攻击者可构造超长字符串作为 -o 参数的值，覆盖栈上的返回地址，从而劫持程序执行流程。该漏洞仅影响具备本地访问权限的用户，攻击者需首先登录到运行 SunVTS 的 Solaris 系统，然后执行 /opt/SUNWvts/bin/ptexec -o 并附带超长载荷即可触发溢出，实现权限提升并可能获得系统的完全管理控制权。Sun Microsystems 已发布安全补丁修复此漏洞。"
published = "2001-09-20T04:00:00.000"
remediation = "建议升级 SunVTS 至 5.0 或更高版本，或应用 Sun 安全补丁 112617-01。如暂无法升级，临时措施为将 /opt/SUNWvts/bin/ptexec 权限修改为仅 root 用户可执行（chmod 700），并限制普通用户对 SunVTS 的访问，以消除本地用户利用该缓冲区溢出提权的风险。"
score = 7.2
severity = "HIGH"
sources = ["exploitdb"]
title = "Sun SunVTS PTExec 缓冲区溢出漏洞"
updated = "2026-06-16T21:54:47.867"

