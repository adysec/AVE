[basic]
description = "微信客户端存在链接 href 参数可控的跨站脚本漏洞，攻击者可通过构造特制的 weixin:// 协议链接（如跳转 voip 通话、打开联系人验证等），诱导用户点击后在微信内执行任意 JavaScript 脚本。该漏洞可被用于钓鱼攻击或身份伪造，影响微信各版本用户。攻击者无需特殊权限，仅需受害者点击恶意链接即可触发。"
published = "0714"
remediation = "建议升级微信至最新版本（v8.0+），对 a 标签 href 属性中的用户可控输入进行 HTML 实体编码和协议白名单校验，禁止非 http/https 协议直接渲染；同时严格过滤 msgmenucontent 等参数的输入，防止注入恶意脚本作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "腾讯微信a标签href参数跨站脚本漏洞"
updated = "0714"

