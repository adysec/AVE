[basic]
description = "Microsoft Outlook Express 4.72.3612.1700 之前版本的 POP3 客户端在处理包含 '..' 字符的邮件时存在缺陷，恶意用户可发送包含 '..' 的邮件导致 Outlook 误重入 POP3 命令模式，使 POP3 会话挂起，造成拒绝服务。攻击者需能向目标发送邮件，无需认证即可远程触发，影响服务可用性。"
published = "1999-05-11"
remediation = "升级 Microsoft Outlook Express 至 4.72.3612.1700 或更高版本，或升级至 Outlook Express 5.0 及以上版本，微软已在后续版本中修复此 POP3 协议解析缺陷。"
score = 5.0
severity = "MEDIUM"
sources = [
    "cve",
    "epss",
]
title = "Microsoft Outlook Express POP3 拒绝服务漏洞 (CVE-1999-1033)"
updated = "2026-06-16"

