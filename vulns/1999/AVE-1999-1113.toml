[basic]
description = "Windows NT 3.5 至 4.0 版本中的 RSH 服务 (RSHSVC) 存在访问控制漏洞。当用户从已授权主机发起连接时，该服务未能正确解析 .Rhosts 文件中的访问控制规则，导致来自同一授权主机的未授权用户也可绕过身份验证访问 RSH 服务。远程攻击者可利用此漏洞在目标系统上以 SYSTEM 权限执行任意命令，影响 Windows NT 3.5/4.0 等版本，CVSS 评分 7.5，危害等级高。"
published = "1999-12-31T05:00:00.000"
remediation = '建议立即禁用 Windows NT 系统中的 RSH 服务 (RSHSVC)，该服务已过时且存在严重访问控制缺陷。打开服务管理器，找到 "RSHSVC" 或 "Remote Shell Service"，将启动类型改为"禁用"并停止服务。如业务必须使用远程 shell，应迁移至 SSH 服务（如安装 OpenSSH for Windows），并配置防火墙规则阻止外部对 TCP 端口 514 的访问作为临时缓解措施。'
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "Microsoft Windows NT RSH 访问控制漏洞"
updated = "2026-06-16T21:50:28.633"

