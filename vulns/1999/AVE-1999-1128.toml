[basic]
description = "Squid Web Proxy 2.2.STABLE5 及更早版本在使用外部认证程序时，未正确处理用户名/密码中的换行符，导致认证绕过漏洞。攻击者可在认证凭据中注入换行符，绕过访问控制列表（ACL）检查，从而绕过身份验证获得未授权的代理访问权限。该漏洞影响 Squid 1.0、1.1、2.1 及 2.2.STABLE5 及更早版本，攻击前提是 Squid 配置了外部认证程序（如 NCSA、LDAP 等）。攻击者只需在认证时提交包含换行符的用户名/密码组合即可绕过访问控制，CVSS 评分 5.0，属中等严重性漏洞。"
published = "1999-12-31T05:00:00.000"
remediation = "建议升级 Squid 至 2.2.STABLE6 或更高版本（官方已修复换行符注入漏洞），或升级至 3.x/4.x 稳定分支。若暂时无法升级，请禁用 external_acl_type 等外部认证模块，改用内置 basic/ntlm/digest 认证，并在前置代理/防火墙层面过滤用户名密码中的换行符（%0A/%0D）作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "美国国家科学基金会 Squid Web Proxy 认证绕过漏洞"
updated = "2026-06-16T21:50:32.043"

