[basic]
description = "Macromedia Shockwave 7 自动更新功能存在信息泄露漏洞，该功能在未经加密保护的情况下将用户密码及硬盘信息以明文形式传输至 Macromedia 服务器。攻击者通过网络监听或中间人攻击可截获传输中的敏感数据，导致用户凭证与系统信息泄露。CVSS 评分 5.0，危害等级中等。"
published = "1999-03-11T05:00:00.000"
remediation = "立即卸载 Macromedia Shockwave 并安装 Adobe Shockwave Player 12.3.5.207 或更高版本（最终安全版本）。如业务必须使用，可在防火墙上阻止软件对 `download.macromedia.com` 等域名的出站连接，或在网络边界部署 SSL 解密设备检查自动更新流量。由于该产品已于 2019 年停止支持，建议迁移至替代方案（如 Adobe Flash 替代技术或 HTML5 播放器）。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Macromedia Shockwave 自动更新功能信息泄露漏洞"
updated = "2026-06-16T21:50:37.780"

