[basic]
description = "SCO UnixWare su(1) 程序存在栈缓冲区溢出漏洞，因未对用户名参数长度进行边界检查，本地攻击者可通过向 su 命令传递超长用户名参数触发栈溢出，覆盖返回地址实现任意代码执行，从而将权限从普通用户提升至 root。该漏洞影响 SCO UnixWare 2.1、7.0、7.0.1、7.1、7.1.1 等多个版本，CVSS 评分 7.2（高危），攻击向量为本地，需攻击者具备合法本地账户并能执行 su 命令，利用方式为构造超长用户名参数触发栈溢出劫持控制流获取 root shell。SCO 已发布补丁修复该漏洞，建议升级至修复版本。"
published = "1999-11-25T05:00:00.000"
remediation = "立即将系统升级到最新的Red Hat Enterprise Linux或Ubuntu LTS发行版，或应用最新的SCO Unixware安全补丁；如无法立即升级，可通过修改su程序验证逻辑长度限制和加强用户权限控制来临时缓解漏洞。"
score = 7.2
severity = "HIGH"
sources = ["epss"]
title = "SCO UnixWare su 程序缓冲区溢出漏洞"
updated = "2026-06-16T21:49:10.687"

