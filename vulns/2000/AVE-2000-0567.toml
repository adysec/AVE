[basic]
description = "Internet Explorer 5.01 的 WebBrowser 控件中 IFRAME 实现存在跨框架安全策略绕过漏洞。远程攻击者可通过构造恶意网页，利用 NavigateComplete2 事件绕过同源策略限制，访问不同框架中的敏感信息。该漏洞影响 IE 5.01 版本，攻击者需诱使用户访问恶意页面，CVSS 评分 2.6，危害等级低。"
published = "2000-06-06T04:00:00.000"
remediation = '该漏洞已在 Internet Explorer 5.01 Service Pack 1 (SP1) 及后续版本中修复，建议立即升级至 IE 5.01 SP1 或 IE 5.5 以上版本。对于已停止支持的旧系统，应停用 Internet Explorer 并改用 Microsoft Edge 等现代浏览器。如无法升级，可在浏览器安全设置中将"对标记为可安全执行脚本的 ActiveX 控件执行脚本"设为禁用作为临时缓解措施。'
score = 2.6
severity = "LOW"
sources = ["cve"]
title = "Microsoft Internet Explorer WebBrowser 控件跨框架访问漏洞"
updated = "2026-06-16T21:51:52.427"

