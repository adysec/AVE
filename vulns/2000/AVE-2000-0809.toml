[basic]
description = "Microsoft Jet 数据库引擎在处理文本格式数据库查询时存在安全漏洞，攻击者可通过构造特制的数据库查询语句，利用 Text I-ISAM 驱动程序访问并修改目标系统中的任意文本文件。该漏洞影响 Microsoft Jet 数据库引擎支持的多个 Windows 版本，攻击者只需具备向数据库发起查询的能力即可触发，可能导致敏感信息泄露或系统文件被篡改，CVSS 评分 7.6，危害等级高。"
published = "1999-07-28T04:00:00.000"
remediation = "立即安装 Microsoft 安全公告 MS99-030 提供的 Jet 数据库引擎更新补丁（下载地址：https://www.microsoft.com/download/details.aspx?FamilyID=3EFBE71A-00BB-48CE-930A-47FB9827E1E7），该补丁适用于 Office 97/2000 及所有使用 Jet 引擎的应用程序。如无法安装补丁，应避免打开来源不明的 Office 文档和数据库文件，并在邮件网关层面拦截可疑的 .mdb/.xls 附件作为临时缓解措施。"
score = 7.6
severity = "HIGH"
sources = ["avd"]
title = "Microsoft Jet 数据库引擎 Text I-ISAM 文件修改漏洞"
updated = "2026-06-16T21:51:28.597"

