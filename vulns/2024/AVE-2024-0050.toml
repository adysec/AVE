[basic]
description = '华天动力 OA 系统的 downloadWpsFile.jsp 接口存在任意文件读取漏洞。该接口未对 fileName 参数做路径穿越过滤，攻击者可在未认证情况下通过构造包含 "../" 的 fileName 参数（如 ../../../../../../htoa/Tomcat/webapps/ROOT/WEB-INF/web.xml）向 /OAapp/jsp/downloadWpsFile.jsp 发送特制 HTTP 请求，绕过目录限制读取服务器上的任意文件。该漏洞影响部署了存在缺陷版本华天动力 OA 的 Web 服务器，攻击条件仅需网络可达目标且无需登录凭证，利用方式简单，可导致配置文件、源代码及敏感信息泄露，严重威胁系统安全。'
published = "0726"
remediation = '升级华天动力 OA 至官方已修复该任意文件读取漏洞的安全版本（请联系厂商获取 2024 年补丁包并覆盖部署）；临时缓解措施：在 Web 服务器或反向代理层拦截包含 "../" 及 downloadWpsFile.jsp 的恶意请求，限制对 /OAapp/jsp/downloadWpsFile.jsp 的访问权限，并将 web.xml 等敏感配置文件移出 web 可访问目录。'
