[basic]
description = "Texas Imperial Software 开发的 WFTPD 及 WFTPD Pro 2.41 版本在处理 RESTART (REST) 命令时存在拒绝服务漏洞。远程攻击者可通过向 FTP 服务发送特制的 REST 命令，结合 STOU、STOR 或 APPE 等存储指令，将数据写入文件末尾之外的位置或写入不存在的文件，导致 FTP 服务崩溃或异常终止，造成拒绝服务。该漏洞无需身份认证即可远程触发，CVSS 评分 6.4，影响 WFTPD 2.4.1/2.4.1 Rc11/2.34/2.40 等多个版本。"
published = "2000-07-21T04:00:00.000"
remediation = "该产品厂商已停止运营，官方不再提供安全更新。建议立即停用 WFTPD 2.41 及所有更早版本，替换为积极维护的 FTP 服务器软件（如 vsftpd 3.0.5+、ProFTPD 1.3.8+）。如无法立即替换，可在防火墙或 TCP Wrappers 层面限制只允许可信 IP 访问 FTP 端口（21），并禁用匿名用户写入权限作为临时缓解措施。"
score = 6.4
severity = "MEDIUM"
sources = ["cve"]
title = "Texas Imperial Software WFTPD 拒绝服务漏洞"
updated = "2026-06-16T21:52:10.753"

