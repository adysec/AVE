[info]
author = "ave"
description = "Netscape Enterprise Server phf CGI 缓冲区溢出漏洞检测，通过访问 /cgi-bin/phf 确认存在该脆弱 CGI 程序"
id = "POC-AVE-2000-0465"
name = "Netscape Enterprise Server phf CGI PoC"
severity = "high"
tags = [
    "cve-2000-0586",
    "cgi",
    "buffer-overflow",
]
vuln_id = [
    "CVE-2000-0586",
    "AVE-2000-0465",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/cgi-bin/phf"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "Phone",
    "phf",
    "CGI",
]
