[basic]
description = "L0pht AntiSniff（后更名为Stake AntiSniff）1.0.1及Researchers 1.0版本存在缓冲区溢出漏洞。远程攻击者可通过向目标系统发送特制的恶意DNS响应数据包触发该漏洞，导致缓冲区溢出，从而在目标主机上执行任意命令。该漏洞影响L0pht AntiSniff 1.0.1及更早版本，CVSS评分10.0，危害等级严重。目前厂商已发布相关修复措施。"
published = "2000-05-16T04:00:00.000"
remediation = "L0pht AntiSniff 已停止维护且厂商已不存在（L0pht 后被 @stake 收购，@stake 于 2004 年被 Symantec 收购），官方未发布补丁。建议立即迁移至活跃维护的替代方案如 Snort、Suricata 或 Zeek 等现代网络监控工具。临时缓解措施：在网络防火墙及入侵检测系统上添加规则，拦截异常 DNS 响应数据包，并限制 AntiSniff 所在主机的网络访问来源。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "L0pht AntiSniff DNS 响应缓冲区溢出漏洞"
updated = "2026-06-16T21:51:38.847"

