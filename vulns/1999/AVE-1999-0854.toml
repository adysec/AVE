[basic]
description = "VDO Live Player 3.0.2 存在缓冲区溢出漏洞，远程攻击者可通过向用户发送特制的 .vdo 文件触发该漏洞，导致在受害者客户端上执行任意命令。攻击者只需诱导用户打开恶意构造的 .vdo 媒体文件即可完成利用，无需身份认证，危害等级高。"
published = "1999-12-13T05:00:00.000"
remediation = "VDOLive Player 3.0.2 已停止维护且无官方安全补丁，建议立即卸载该软件，改用 VLC、Windows Media Player 等仍在受支持的媒体播放器。如需继续使用，可通过防火墙和组策略限制该程序对网络资源的访问权限，并避免打开来源不明的 .vdo 文件作为临时缓解措施。"
score = 7.6
severity = "HIGH"
sources = ["cve"]
title = "VDO VDOLive Player 远程缓冲区溢出漏洞"
updated = "2026-06-16T21:49:30.627"

