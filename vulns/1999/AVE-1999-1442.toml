[basic]
description = "Squid Internet Object Cache 1.1.20 存在安全绕过漏洞，攻击者通过将 URL 使用十六进制转义序列编码，可绕过访问控制列表（ACL）的限制，从而访问本应被禁止的资源。该漏洞允许远程未认证攻击者利用 URL 编码绕过 ACL 规则，导致未授权访问敏感信息或资源。CVSS 评分 7.5，危害等级高，建议升级至最新版本。"
published = "1998-02-20T05:00:00.000"
remediation = "升级 Squid 至 2.0 或更高版本，新版本在 ACL 检查前会正确解码 URL 中的十六进制转义序列（如 %2e 等），防止绕过。如无法升级，可在 squid.conf 中启用 uri_whitespace strip 并添加 acl 规则对编码后的 URL 模式进行二次匹配作为临时缓解。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "Squid Internet Object Cache 访问控制列表绕过漏洞"
updated = "2026-06-16T21:50:05.197"

