[basic]
description = "东胜物流系统 MsBaseInfo 模块 GetBANKList 接口存在 SQL 注入漏洞，攻击者可在未经身份认证的情况下，通过 POST 请求向 strCondition 参数提交特制 payload，绕过应用层过滤直接操纵后端数据库查询。该漏洞源于未对用户输入进行参数化处理或充分转义，成功利用可导致数据库中的敏感信息泄露，包括但不限于用户凭证、物流订单、银行账户等核心业务数据，对企业信息安全和客户隐私构成严重威胁。"
published = "0707"
remediation = "升级东胜物流系统至最新安全版本；对 GetBANKList 接口的 strCondition 参数实施参数化查询或预编译语句，严格过滤用户输入；在 Web 应用防火墙中添加针对 SQL 注入的规则，拦截包含 UNION/OR/AND 等恶意 SQL 关键字的请求；限制数据库账户权限，避免使用高权限账户连接应用。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "东胜物流 MvcShipping 系统 GetBANKList SQL注入漏洞"
updated = "0707"

