[basic]
description = "O'Reilly Website Professional Web 服务器存在目录路径泄露漏洞。远程攻击者无需身份认证，通过向目标服务器发送特制的畸形 URL 请求（如包含非预期字符或过长的路径名），即可获取 Web 目录的真实物理路径信息。该漏洞属于信息泄露类型，可被攻击者利用来探测服务器文件系统结构，为后续攻击收集目标环境信息。影响 Website Professional 全版本。"
published = "2000-01-13T05:00:00.000"
remediation = "安装 O'Reilly WebSite Pro 官方提供的免费 WSAPI 扩展，配置自定义 404/403/401 错误页面以隐藏真实目录路径。同时限制服务器返回的错误信息详细程度，避免在 404 响应中暴露物理路径。该产品已于 2000 年代停止维护，建议迁移至 Apache、Nginx 等仍在安全更新的 Web 服务器。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "O'Reilly Website Professional 目录路径泄露漏洞"
updated = "2026-06-16T21:50:55.843"

