[basic]
description = "福建科立讯通信有限公司的 logout.php 接口存在 SQL 注入漏洞，未经身份认证的远程攻击者可通过向 `/custom/zx/logout.php` 的 sign 参数注入恶意 SQL 语句，利用时间盲注技术获取数据库中的敏感信息。该漏洞源于未对用户输入进行有效的过滤与转义，攻击者无需任何权限即可实施攻击，可能导致数据泄露、服务器被控等严重后果。"
published = "0711"
remediation = "建议对 /custom/zx/logout.php 的 sign 参数实施参数化查询或预编译语句，彻底阻断 SQL 注入；同时对该参数进行严格的输入校验，仅允许预期的数字或短字符串格式。临时缓解措施可在 WAF 或 Nginx 层面拦截包含 SLEEP、AND、OR 等 SQL 注入特征字符的 sign 参数请求。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "福建科立讯通信有限公司 后台管理平台 logout.php SQL注入漏洞"
updated = "0711"

