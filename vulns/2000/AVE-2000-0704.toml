[basic]
description = "cURL（libcurl）在 6.0-1.1 之前版本（curl-ssl 在 6.0-1.2 之前版本）中存在缓冲区溢出漏洞。攻击者通过构造包含超长错误信息的恶意响应，触发 cURL 在处理时发生栈缓冲区溢出，从而能够在目标系统上以该进程权限执行任意代码。该漏洞攻击复杂度低，无需认证即可远程利用，CVSS v2 评分 10.0，危害程度极高。受影响的用户应及时升级至 7.4 或更高版本以修复此漏洞。"
published = "2000-12-19T05:00:00.000"
remediation = "升级 curl 至 7.4 及以上版本（当前最新版本已远超于此）。如无法升级，可在服务端限制错误消息长度，或使用防火墙规则限制与恶意服务器的通信。现代操作系统默认包含的 curl 版本已不受此漏洞影响。建议同步更新 openssl 等相关依赖库以避免因旧版本依赖引入类似溢出问题。"
score = 10
severity = "CRITICAL"
sources = ["exploitdb"]
title = "cURL 远程缓冲区溢出漏洞"
updated = "2026-06-16T21:52:53.267"

