[basic]
description = "Mandrake Linux 及 Red Hat Linux 发行版中的 usermode 用户模式工具包存在权限管理缺陷，本地攻击者无需特殊权限即可利用该程序执行系统重启或关机操作，导致系统可用性受损。该漏洞源于 usermode 包未正确限制普通用户对系统关机/重启命令的调用权限，攻击者仅需拥有本地 shell 访问权限即可触发拒绝服务攻击。CVSS 评分 2.1，危害等级低。"
published = "2000-07-18T04:00:00.000"
remediation = "立即将 usermode 软件包升级至 1.22-2mdk 及以上版本（Mandrake 7.1 对应 MDKSA-2000:020），该更新移除了允许普通用户执行重启/关机/断电操作的权限文件。Red Hat 用户参照 RHSA-2000:053 同步更新 usermode 包。作为临时缓解措施，可删除 /usr/bin/reboot、/usr/bin/halt、/usr/bin/shutdown、/usr/bin/poweroff 的 SUID 或普通用户执行位。"
score = 2.1
severity = "LOW"
sources = ["cve"]
title = "MandrakeSoft Mandrake Linux usermode 本地拒绝服务漏洞"
updated = "2026-06-16T21:52:09.197"

