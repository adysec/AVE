[basic]
description = "Adobe Flash Player 存在堆缓冲区溢出漏洞（CVE-2015-3113），源于 Nellymoser 音频解码器处理特制音频数据时未正确校验缓冲区边界，导致越界写入。攻击者可构造恶意 Flash 内容（SWF），诱导受害者访问含恶意 Flash 的网页，触发堆溢出实现远程代码执行。漏洞影响 Windows/OS X 上 13.0.0.296 之前版本、14.x 至 18.x 18.0.0.194 之前版本，以及 Linux 上 11.2.202.468 之前版本。CVSS 3.1 评分 9.8（CRITICAL），攻击向量为网络（AV:N）、低复杂度（AC:L）、无需权限（PR:N）、无需用户交互（UI:N），2015 年 6 月已在野利用。Adobe 已于 2015 年 6 月发布安全更新修复该漏洞（APSB15-11），CVE 编号 CVE-2015-3113，CWE 编号 CWE-787/CWE-122。"
published = "2015-06-23T21:59:01.960"
remediation = "立即卸载所有系统上的 Adobe Flash Player（Windows/macOS/Linux），Adobe 已于 2020 年 12 月 31 日停止支持且不再提供安全更新。Windows 可通过「控制面板→程序和功能→卸载 Adobe Flash Player」或运行官方卸载工具；macOS 运行官方卸载脚本；Linux 使用包管理器卸载 flashplugin-nonfree 或 adobe-flashplugin。浏览器中彻底禁用 Flash 插件（Chrome: chrome://settings/content/flash 设为「阻止」；Firefox: about:addons 禁用 Shockwave Flash；Edge: edge://settings/content/flash 关闭）。若存在必须运行的旧版 Flash 应用，务必将其隔离在无网络访问的离线虚拟机中运行，严禁联网。不可继续使用任何版本的 Flash Player，包括最后版本 32.0.0.465，均存在已知未修复漏洞。建议迁移至 HTML5/WebAssembly 等现代替代技术。"
score = 9.8
severity = "CRITICAL"
sources = ["kev"]
title = "Adobe Flash Player 堆缓冲区溢出漏洞"
updated = "2026-06-17T00:25:19.230"

