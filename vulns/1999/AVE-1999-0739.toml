[basic]
description = "Microsoft Exchange Server 5.0 和 5.5 版本的 Internet 邮件服务（IMS）组件存在缓冲区溢出漏洞。该漏洞源于 IMS 在处理 SMTP 的 AUTH 或 NNTP 的 AUTHINFO 命令时，未对输入数据的长度进行有效校验，导致超长参数覆盖内存缓冲区。未经身份认证的远程攻击者只需向目标邮件服务器发送包含特制超长参数的 AUTH 或 AUTHINFO 命令，即可触发溢出，造成服务崩溃并引发拒绝服务（DoS），使合法用户无法正常收发邮件。攻击条件较低，仅需网络可达邮件服务端口即可利用，主要影响 Exchange 5.0/5.5 的邮件服务可用性。"
published = "2001-03-12T05:00:00.000"
remediation = "立即安装微软安全公告 MS99-051 提供的补丁程序（KB Q169174），该补丁修复了 Exchange 5.0/5.5 Internet Mail Service 中 AUTH/AUTHINFO 命令的缓冲区溢出漏洞。若无法立即打补丁，应在防火墙或路由器上限制对 Exchange 服务器 25 端口的访问，仅允许可信网络连接 IMS 服务。长期解决方案是将 Microsoft Exchange Server 升级至 5.5 SP4 或更高版本，或迁移至受支持的 Exchange 新版本。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
