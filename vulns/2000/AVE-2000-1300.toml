[basic]
description = "ISC DHCP 客户端程序 dhclient 存在远程命令执行漏洞，该程序在处理 DHCP 服务器返回的响应数据时，未能对主机名、域名等字段中的 shell 元字符（如反引号、$() 等）进行安全过滤。攻击者可搭建恶意 DHCP 服务器，在本地网段向目标主机发送包含特制 shell 元字符的 DHCP 响应报文，当 dhclient 处理该响应时会将元字符传递给 shell 解释执行，导致以 root 权限执行任意系统命令。该漏洞影响 FreeBSD、NetBSD、Debian、SuSE Linux 等操作系统中的 ISC DHCP 客户端，CVSS 评分 10.0，危害等级严重，完全威胁系统机密性、完整性和可用性。"
published = "2000-06-24T04:00:00.000"
remediation = "立即升级 dhclient 至修复版本：FreeBSD 用户应用 FreeBSD-SA-00:34 补丁，Debian 用户安装 2000 年 6 月 28 日安全更新，SuSE Linux 用户应用公告 #56 补丁。核心修复措施为对 DHCP 服务器返回的选项字段中的 shell 元字符（如 `;&|`）进行严格转义过滤，防止拼接至命令执行。如无法升级，可在 dhclient-script 中手动过滤处置变量中的特殊字符作为临时缓解。"
score = 10
severity = "CRITICAL"
sources = ["cve"]
title = "ISC DHCP Client 远程代码执行漏洞"
updated = "2026-06-16T21:52:03.183"

