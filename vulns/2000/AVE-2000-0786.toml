[basic]
description = 'Alex Heiphetz Group EZshopper 2.0 及 3.0 版本的 loadpage.cgi CGI 程序存在目录遍历漏洞。远程攻击者无需身份认证，通过在 file 参数的目标文件名前插入 "/" 字符，即可突破路径限制，遍历并读取 EZshopper 数据目录中的任意文件，导致敏感信息泄露。该漏洞 CVSS 评分为 5.0，危害等级中等。'
published = "2001-01-09T05:00:00.000"
remediation = '立即联系 AHG 获取 EZshopper 最新版本进行升级，新版本已对 file 参数增加 "../" 路径遍历检查。如无法升级，应删除或禁用 loadpage.cgi 脚本，或在 Web 服务器（如 Apache）层面通过 RewriteRule 或 Location 指令限制对该 CGI 的访问，仅允许白名单 IP 调用。'
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "alex heiphetz Group EZshopper 目录遍历漏洞"
updated = "2026-06-16T21:53:07.783"

