[basic]
description = "WWWBoard 2.0 将加密后的用户密码存储于 Web 根目录下的 passwd.txt 文件中，由于该文件未做访问控制，未经身份验证的远程攻击者无需任何凭据即可通过 HTTP 直接请求下载该密码文件。攻击者获取文件后可使用字典或暴力破解方式离线破解加密密码，进而获取管理员或注册用户的明文凭据，登录系统后台执行任意操作。该漏洞影响所有将 WWWBoard 2.0 部署于 Web 可访问目录下的实例，CVSS 评分 10.0，危害等级严重。"
published = "1999-09-16T04:00:00.000"
remediation = "立即升级 WWWBoard 至 2.0 以上已修复版本（官方将口令文件移出 Web 根目录）；如暂无法升级，须将 passwd.txt 移出 Web 可访问目录（如移至 cgi-bin 或上一级非发布目录），并在 Web 服务器配置中禁止对该文件及敏感目录的 HTTP 访问（如 Apache 添加 <Files passwd.txt> Require all denied </Files>），同时强制重置所有已泄露账户的口令。"
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "Matt Wright WWWBoard 远程密码泄露漏洞"
updated = "2026-06-16T21:49:23.863"

