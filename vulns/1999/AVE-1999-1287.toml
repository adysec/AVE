[basic]
description = "Solaris 2.6 系统的 CDE 屏幕锁定程序 (screenlock) 存在认证绕过漏洞。当主机配置为 NIS+ 客户端时，该程序未能正确锁定非特权用户的控制台会话，导致具有物理访问权限的攻击者可在锁定状态下输入任意字符串即可登录系统。该漏洞影响 Solaris 2.6 操作系统，CVSS 评分 4.6，危害等级中危。攻击者需具备物理接触目标主机的条件方可利用。"
published = "1998-11-12T05:00:00.000"
remediation = "升级 Solaris 到支持 NIS+安全修复的8.0或更高版本，并安装最新补丁包103716-19（或更高版本），否则导致NIS+客户端系统上的屏幕锁定失效；同时手动编辑 `/usr/dt/bin/screenlock` 配置文件，将验证模式修改为基于本地用户权限验证，并确保NIS+认证跳过物理会话锁定；如无法立即应用补丁，可通过修改 `/etc/nsswitch.conf` 禁用NIS+认证机制作为临时缓解措施。"
score = 4.6
severity = "MEDIUM"
sources = ["avd"]
title = "Sun Solaris CDE/NIS+ screenlock 认证绕过漏洞"
updated = "2026-06-16T21:49:32.893"

