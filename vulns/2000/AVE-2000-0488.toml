[basic]
description = "Network Associates WebShield SMTP 4.5.44 版本的远程管理服务存在缓冲区溢出漏洞，未经身份认证的远程攻击者可通过向管理服务发送超长的配置参数触发栈溢出，导致在目标系统上以服务进程权限执行任意代码。该漏洞影响 WebShield SMTP 4.5.44 版本，攻击向量为网络远程、攻击复杂度低、无需身份认证，成功利用可导致系统机密性、完整性和可用性全部被破坏，CVSS 评分 7.5（高危）。攻击者只需向目标服务的管理端口发送超长配置参数即可触发溢出并执行任意代码，Network Associates 已发布补丁修复该漏洞。"
published = "2000-05-01T04:00:00.000"
remediation = "立即升级至 Network Associates WebShield SMTP 4.5.44 之后的修补版本（建议升级至 McAfee WebShield SMTP 4.5.50 或更高版本），官方补丁可通过 Network Associates 安全公告 NAI-2000-001 获取。若无法立即升级，请在防火墙层面封锁 WebShield 远程管理服务端口（默认 TCP 8080/8443），仅允许受信任管理网段访问，并禁用远程配置参数接口作为临时缓解措施。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "Trend Micro WebShield SMTP 缓冲区溢出远程代码执行漏洞"
updated = "2026-06-16T21:51:45.190"

