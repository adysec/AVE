[basic]
description = "w3m 0.3.2 版本存在跨站脚本（XSS）漏洞，该漏洞源于程序在处理 HTML 框架（frame）标签时未正确转义特殊字符，导致攻击者可通过构造包含恶意脚本的特制网页，诱使用户使用 w3m 浏览器访问该页面，从而在用户浏览器环境中执行任意 HTML 或 JavaScript 代码，进而窃取 Cookie、获取敏感文件内容或实施钓鱼攻击。攻击者无需身份认证，仅需诱导用户访问恶意链接即可触发。"
published = "2002-12-11T05:00:00.000"
remediation = "升级 w3m 至 0.3.2.2 或更高版本（SourceForge 已发布修复版本）。如无法升级，确保不使用 -F 参数启动 w3m，并检查 /etc/w3m/w3mconfig 和 ~/.w3m/config 中 frame 选项保持禁用状态，以阻止恶意 HTML 框架注入。"
score = 4.3
severity = "MEDIUM"
sources = ["osv"]
title = "w3m 跨站脚本漏洞"
updated = "2026-06-16T21:59:07.490"

