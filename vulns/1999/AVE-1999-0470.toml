[basic]
description = "CVE-1999-0282 是一个已被官方驳回（REJECTED）的 CVE 编号，原因是它错误地将 CVE-1999-1584 和 CVE-1999-1586 两个不同漏洞的参考信息和描述合并为一条记录。NVD 已移除该编号下所有描述与引用，禁止继续使用。该编号不指向任何真实存在的漏洞，不存在可利用的攻击面或影响范围。"
published = "1997-09-23T04:00:00.000"
remediation = 'CVE-1999-0282 已被撤销，请勿使用此编号。实际漏洞分别对应 CVE-1999-1584（SunOS 4.1.1–4.1.3c 及 Open Windows 3.0 中 loadmodule/modload 的本地权限提升）和 CVE-1999-1586（SunOS 4.1.x 中 xnews 调用的 loadmodule 未正确清理环境变量导致本地提权）。Sun 当时发布了补丁（如 Sun patch 100124-01），CERT 也发布了公告 CA-1993-18，但这些补丁现已无法获取。由于 SunOS 4.x 早已停止支持，建议将仍在运行的 SunOS 4.1.x 系统迁移至受支持的操作系统（如 Solaris 11、Linux 或 \*BSD），同时严格控制 setuid/setgid 二进制文件的权限以降低本地提权风险。'
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "（已废弃）CVE-1999-0282 错误合并 SunOS loadmodule 两个独立漏洞的无效编号"
