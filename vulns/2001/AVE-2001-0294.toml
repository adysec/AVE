[basic]
description = "minicom 1.83.1 及更早版本存在格式字符串漏洞，本地攻击者可通过多个格式字符串攻击手段获取额外系统权限。该漏洞源于程序处理用户输入时未正确验证格式字符串参数，攻击者可在本地环境中利用此缺陷提升特权，进而完全控制系统。由于该组件常用于串口通信管理，可能导致敏感数据泄露或系统完整性被破坏。"
published = "2001-08-14T04:00:00.000"
remediation = "应立即安装对应 Linux 发行版的安全更新：Red Hat RHSA-2001-067、Caldera CSSA-2001-016.0 或 Immunix OS 的 minicom-1.83.1-1.0.6x_StackGuard 补丁，这些补丁修复了日志文件中 vsprintf 调用的格式字符串漏洞并移除了 setuid 位。如无法立即打补丁，作为临时缓解措施可执行 `chmod u-s /usr/bin/minicom` 移除 minicom 的 setuid 权限位，阻止本地攻击者利用格式字符串漏洞获取额外特权。"
score = 7.2
severity = "HIGH"
sources = ["redhat"]
title = "minicom 本地特权提升漏洞"
updated = "2026-06-16T21:54:33.293"

