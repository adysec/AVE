[basic]
description = "WWWThreads 5.0 论坛系统存在 SQL 注入漏洞，由于程序未对传递给 SQL 查询的数值类型数据及表名进行有效过滤，远程攻击者可通过构造特制的 SQL 命令输入，绕过身份验证机制，实现对论坛数据库的任意操作，包括窃取用户凭证、篡改论坛内容或提升管理员权限。该漏洞影响 Wired Community Software WWWThreads 5.0 版本，CVSS 评分 7.5，危害等级高。"
published = "2000-02-03T05:00:00.000"
remediation = "立即升级 WWWThreads 至 5.0 以上最新版本，该版本已修复 SQL 注入问题。如厂商已停止维护，建议迁移至其他受支持的论坛系统（如 phpBB、Discourse）。临时缓解措施：在 Web 应用层对所有用户输入（包括数字参数和表名参数）实施严格的类型校验和参数化查询，禁止将用户输入直接拼接至 SQL 语句。"
score = 7.5
severity = "HIGH"
sources = ["exploitdb"]
title = "Wired Community Software WWWThreads 5.0 SQL注入漏洞"
updated = "2026-06-16T21:51:03.143"

