[basic]
description = "Sky Communications Skyfull 1.1.4 邮件服务器在处理 MAIL FROM 命令时存在缓冲区溢出漏洞，远程攻击者可通过向 SMTP 服务发送超长特制的 MAIL FROM 参数触发该漏洞，导致服务崩溃或任意代码执行。该漏洞影响 Skyfull 1.1.4 及更早版本，CVSS 评分 7.5，危害等级高，无需身份认证即可远程利用。"
published = "1999-10-30T04:00:00.000"
remediation = "Sky Communications 已停止维护 Skyfull Mail Server，官方不再提供安全补丁。建议立即迁移至受支持的邮件服务器（如 Postfix 3.x 或 Exim 4.x），并在迁移完成前在边界防火墙上限制对 SMTP 25/TCP 端口的访问，仅允许受信任的内部 IP 连接，同时配置入侵检测系统监控异常 SMTP 命令流量作为临时缓解措施。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "Sky Communications Skyfull 1.1.4 Mail Server MAIL FROM 命令缓冲区溢出漏洞"
updated = "2026-06-16T21:49:14.123"

