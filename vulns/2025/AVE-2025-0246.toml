[basic]
description = "飞企互联 FEwork OA 系统的 ChangeBGServlet 存在命令执行漏洞，该 Servlet 在处理背景图片更换请求时未对用户传入的参数进行充分过滤和校验，攻击者可通过构造特制的 HTTP 请求向参数中注入系统命令，导致远程代码执行。攻击者利用该漏洞可在目标服务器上以 Web 服务权限执行任意命令，进而获取服务器控制权、窃取敏感数据或进行内网横向移动。漏洞无需身份认证即可远程利用，攻击门槛较低，危害严重。"
published = "0703"
remediation = "建议联系飞企互联官方获取最新安全补丁，升级 FEwork 模块至最新版本。如无法立即升级，可在 Web 服务器（如 Nginx/Apache）层面配置访问控制，限制 `/FEwork/ChangeBGServlet` 路径仅允许可信 IP 访问，同时部署 WAF 规则拦截包含命令执行特征的请求参数作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "飞企互联 OA FEwork ChangeBGServlet 远程命令执行漏洞"
updated = "0703"

