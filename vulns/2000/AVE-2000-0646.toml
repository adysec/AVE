[basic]
description = "LPPlus 3.2.2/3.3 版本存在权限配置缺陷，其创建的 lpdprocess 文件具有全局可写权限。本地攻击者可利用该缺陷向文件写入任意进程 ID，随后调用具有 setuid 权限的 dcclpdshut 程序终止指定进程，导致任意进程被终止的拒绝服务攻击。该漏洞影响 LPPlus 3.2.2 和 3.3 版本，攻击者需具备本地系统访问权限且能写入 lpdprocess 文件，利用方式为写入目标进程 PID 后触发 setuid 程序终止该进程，CVSS 评分 3.6（AV:L/AC:L/Au:N/C:N/I:P/A:P），属本地权限提升类拒绝服务漏洞。"
published = "2000-11-14T05:00:00.000"
remediation = "建议升级至 LPPlus 3.3.1 或更高版本（厂商已修复该权限问题）。若无法升级，请立即执行以下缓解措施：1) 修改 lpdprocess 文件权限为 644（chmod 644 /var/spool/lpd/lpdprocess），移除全局写权限；2) 移除 dcclpdshut 程序的 setuid 位（chmod u-s /usr/bin/dcclpdshut）；3) 限制本地用户对打印队列目录的访问权限。建议联系厂商获取官方补丁包 LPPlus-3.3.1-patch.tar.gz 进行正式修复。"
score = 3.6
severity = "LOW"
sources = ["cve"]
title = "LPPlus 权限拒绝服务漏洞"
updated = "2026-06-16T21:52:39.750"

