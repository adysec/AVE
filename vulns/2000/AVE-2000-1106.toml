[basic]
description = "Trend Micro InterScan VirusWall 3.32 及更早版本的 SMTP 网关存在缓冲区溢出漏洞，远程攻击者可通过发送包含超长文件名的 uuencode 编码附件触发缓冲区溢出，无需身份认证即可在目标系统上以系统权限执行任意代码。该漏洞影响 InterScan VirusWall 3.32 及更早版本，CVSS 评分 10.0（CVSS:3.0/AV:N/AC:L/PR:N/UI:N/S:U/C:H/I:H/A:H），属于严重级别。攻击者无需身份验证即可远程触发，通过构造超长文件名的 uuencode 附件发送至目标 SMTP 网关即可触发缓冲区溢出并执行任意代码，Trend Micro 已发布补丁修复此漏洞。"
published = "2000-05-04T04:00:00.000"
remediation = "立即升级至 Trend Micro InterScan Virus Wall 3.33 或更高版本（官方已发布修补补丁）。如无法立即升级，请在防火墙层面封锁 SMTP 端口（25/587）仅允许受信邮件服务器访问、限制邮件附件大小上限至 10MB 以下、在邮件网关启用附件类型过滤拦截 uuencode 编码附件、部署 IPS 规则拦截超长文件名 payload、联系 Trend Micro 技术支持获取官方补丁包及部署指导文档。"
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "趋势科技 InterScan Virus Wall SMTP 网关缓冲区溢出远程代码执行漏洞"
updated = "2026-06-16T21:51:42.710"

