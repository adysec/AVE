[basic]
description = "帆软报表（FineReport）ReportServer 组件存在未授权文件上传漏洞，攻击者可通过访问 /WebReport/ReportServer?op=fr_remote_design 接口，利用 design_install_reufile 命令向服务器上传恶意 .reu 文件，从而实现远程代码执行（RCE）。该漏洞无需认证即可触发，影响部署了帆软报表且暴露 ReportServer 服务的系统，攻击者可借此获取服务器控制权限，执行任意系统命令，对数据安全和业务运行造成严重威胁。"
published = "0703"
remediation = "升级帆软报表至 2020-08-01 之后的安全版本（如 V11.0 及以上），该版本已移除 fr_remote_design 调试接口。如无法升级，在 Nginx/反向代理层配置规则拦截包含 /WebReport/ReportServer?op=fr_remote_design 的请求，或通过 WAF 阻断 .reu 文件上传请求。同时删除 FR 部署目录下的 fr_remote_design 相关类文件以彻底关闭该接口。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "帆软报表 fr_remote_design 文件上传远程代码执行漏洞"
updated = "0703"

