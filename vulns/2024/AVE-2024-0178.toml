[basic]
description = "宝兰德 BES 中间件存在反序列化远程代码执行漏洞，攻击者可向 /BesEJB/spark 端点发送包含恶意序列化对象的 POST 请求，利用 Java 反序列化机制在服务器上执行任意代码。该漏洞影响宝兰德 BES 中间件多个版本，无需身份认证即可远程利用，CVSS 评分 9.8，危害等级严重。攻击条件为目标系统暴露该端点且未禁用危险的反序列化功能，建议升级至修复版本或配置反序列化过滤器防护。"
published = "0812"
remediation = "建议立即升级宝兰德 BES 中间件至最新安全版本（建议升级至 V6.0 SP3 或更高版本），并重启服务使补丁生效。若暂无法升级，建议在防火墙层面限制 /BesEJB/spark 端点仅允许受信任 IP 访问，并禁用 Java 反序列化相关功能作为临时缓解措施。"
