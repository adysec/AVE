[basic]
description = "InterScan Virus Wall 3.32 及更早版本的 SMTP 网关存在缓冲区溢出漏洞。远程攻击者可通过向目标 SMTP 网关发送包含超长文件名的 uuencode 编码邮件附件，触发缓冲区溢出，从而在系统上下文中执行任意命令。该漏洞无需身份认证即可远程利用，攻击复杂度低，可导致目标系统完全受控。Trend Micro 已发布安全更新修复此漏洞。"
published = "2000-05-04T04:00:00.000"
remediation = "立即将 Trend Micro InterScan Virus Wall 升级至 3.32 以上版本（如 4.0 或更高），该漏洞在 SMTP 网关组件中修复。由于该产品已停止技术支持，建议迁移至 Trend Micro 当前支持的邮件安全产品（如 InterScan Messaging Security），并在 SMTP 网关层面限制附件文件名长度，对 uuencode 编码附件进行深度内容过滤，同时在防火墙上限制仅允许可信来源连接 SMTP 服务端口（25/587）。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "Trend Micro InterScan VirusWall SMTP 网关缓冲区溢出远程代码执行漏洞"
updated = "2026-06-16T21:51:42.710"

