[basic]
description = "Adobe Acrobat 4.05、Reader、Business Tools 及 Fill In 等 PDF 处理产品中存在缓冲区溢出漏洞。攻击者可通过向 PDF 文件中的 /Registry 或 /Ordering 说明符提供超长字符串触发缓冲区溢出，从而执行任意代码。该漏洞影响 Adobe Acrobat 系列 PDF 处理软件，攻击者只需构造特制 PDF 文件诱使用户打开即可完成利用，危害严重。"
published = "2000-10-20T04:00:00.000"
remediation = "立即升级 Adobe Acrobat / Reader 至 5.0 及以上版本，该漏洞已在后续版本中修复。对于无法升级的旧系统，建议停用 PDF 解析功能或更换为其他 PDF 阅读器，并在应用层过滤包含超长 /Registry 或 /Ordering 字段的 PDF 文件。"
score = 7.6
severity = "HIGH"
sources = ["cve"]
title = "Adobe Acrobat 缓冲区溢出代码执行漏洞"
updated = "2026-06-16T21:52:19.503"

