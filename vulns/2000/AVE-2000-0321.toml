[basic]
description = 'Qualcomm Qpopper 2.53 及 3.0 版本存在输入验证缺陷，程序未能正确识别标识消息结束的 \n 字符串。远程攻击者可通过向 POP3 服务发送一条长度为 1023 字节且以 \n 结尾的特制消息行，触发该漏洞，导致 Qpopper 服务进程崩溃或邮箱数据损坏，造成拒绝服务。该漏洞无需身份认证即可远程利用，CVSS 评分 5.0，危害等级中等。'
published = "2000-04-21T04:00:00.000"
remediation = '升级 Qpopper 至 4.0 及以上版本，该版本改进了消息行长度检查机制，正确识别行终止符，防止单行长 1023 字节以 `\n` 结尾时触发 fgets 缓冲区溢出。如无法升级，可在 `popuser` 文件中限制用户邮箱大小，并在 MTA 层面（如 sendmail）设置单行最大长度限制作为临时缓解措施。'
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Qualcomm Qpopper 拒绝服务漏洞"
updated = "2026-06-16T21:51:28.230"

