[basic]
description = "Red Hat Linux 系统中 tmpwatch 工具在处理目录递归清理时存在拒绝服务漏洞。tmpwatch 会为每个目录层级 fork 一个新的进程，本地攻击者可在 /tmp 或 /var/tmp/ 下创建大量深层嵌套目录，触发 tmpwatch 递归清理操作，导致系统进程数急剧增加，消耗大量系统资源，最终造成拒绝服务。该漏洞影响 Red Hat Linux 6.1 及衍生版本，攻击者需具有本地访问权限，CVSS 评分 2.1，危害等级低。"
published = "2000-11-14T05:00:00.000"
remediation = "升级 tmpwatch 至 2.5.2 及以上版本（Red Hat 已发布修复更新），或升级至 Red Hat Enterprise Linux 3 及以上受支持版本。临时缓解措施：在 /etc/security/limits.conf 中限制用户进程数（nproc），避免 tmpwatch 递归 fork 耗尽系统资源；避免使用 --fuser 或 -s 选项运行 tmpwatch。"
score = 2.1
severity = "LOW"
sources = ["redhat"]
title = "Red Hat Linux tmpwatch 本地拒绝服务漏洞"
updated = "2026-06-16T21:52:33.230"

