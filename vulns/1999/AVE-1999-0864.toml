[basic]
description = "Solaris 2.7（即 Solaris 7.0）系统中的 /usr/bin/mail 命令在处理 -m 参数时存在本地缓冲区溢出漏洞。该命令在将用户提供的 -m 参数拷贝至固定大小缓冲区时未进行长度校验，本地已登录的普通用户可通过向 mail 命令传入超长的 -m 参数触发溢出，覆盖相邻的栈内存并控制程序执行流程，从而提升权限至 root。该漏洞影响运行 Solaris 2.7 的本地系统，攻击前提为攻击者需拥有本地账户并能够执行 mail 命令，利用方式是通过构造特制命令行参数实现本地提权。"
published = "1999-09-13T04:00:00.000"
remediation = "建议升级到 Sun Solaris 7 已修复该问题的补丁集群（如 106327 系列或后续 Recommended Patch Cluster），通过 sunsolve.sun.com 下载并应用对应架构的补丁；如暂时无法打补丁，应限制普通用户对 /usr/bin/mail 的执行权限（如 chmod 750 并归属 root:bin），或使用 RBAC 移除其 setuid 权限作为临时缓解。"
score = 4.6
severity = "MEDIUM"
sources = ["avd"]
title = "Sun Microsystems Solaris 7.0 /usr/bin/mail 本地缓冲区溢出漏洞，导致攻击者可通过'-m'参数获取管理员权限"
updated = "2026-06-16T21:49:31.477"

