[basic]
description = "SunFTP build 9(1) 存在缓冲区溢出漏洞，未经身份验证的远程攻击者可通过向目标 FTP 服务器发送超长的 GET 请求文件路径触发该漏洞。由于程序在处理请求时未对输入长度进行边界检查，导致缓冲区溢出，进而引发服务崩溃（拒绝服务），在某些条件下覆盖调用栈甚至可能执行任意系统命令。该漏洞影响 SunFTP 9(1) 版本，攻击者只需拥有目标主机的网络可达性即可发起攻击，无需凭据或交互，CVSS 评分为 7.5，危害等级为高。xs4all Data 已在后续版本中修复了此缺陷，建议用户升级至最新版本并限制 FTP 服务的访问来源以降低风险。"
published = "2000-11-14T05:00:00.000"
remediation = "SunFTP build 9(1) 存在缓冲区溢出漏洞，厂商未发布补丁。建议立即升级 SunFTP 到最新可用版本，若无可升级版本，应在防火墙中限制 FTP 服务访问源 IP 并使用入侵检测系统过滤超长 GET 请求；同时禁用 SunFTP 的匿名登录功能，或替换为标准 FTP 服务器如 vsftpd 或 ProFTPD 作为临时缓解措施。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "xs4all SunFTP 缓冲区溢出漏洞"
updated = "2026-06-16T21:52:36.647"

