[basic]
description = "Microsoft Office 98 Macintosh 版在创建文件时未能正确初始化所分配的磁盘空间，导致已删除文件的数据残留被嵌入新生成的 Office 文件中，造成敏感信息泄露。攻击者可通过获取目标用户共享的 Office 文件，从中提取可能包含密码、文档内容等敏感数据的残留信息。该漏洞影响 Office 98 Macintosh Edition，CVSS 评分 2.1，危害等级低，利用条件较为受限。"
published = "1999-12-31T05:00:00.000"
remediation = "无法获取准确补丁信息（KB189529 链接已失效），但该漏洞仅影响 Microsoft Office 98 Macintosh Edition。建议升级到 Office 2001 for Mac 或更高版本，新版 Office 在文件创建时正确初始化磁盘空间，不会泄露已删除文件数据。如暂时无法升级，可在创建敏感 Office 文件前使用安全删除工具彻底擦除磁盘空闲空间。目前 Office 98 已停止支持，升级是唯一根治措施。"
score = 2.1
severity = "LOW"
sources = ["avd"]
title = "Microsoft Office 98 Macintosh Edition 信息泄露漏洞"
updated = "2026-06-16T21:50:03.430"

