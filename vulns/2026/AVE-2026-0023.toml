[basic]
description = "nginx 在配置 alias 指令时若 location 路径末尾未加斜杠，会导致目录穿越漏洞。攻击者可通过在请求路径中添加 ../ 等遍历序列，绕过访问限制读取服务器上任意文件，包括配置文件、源码等敏感信息。该漏洞影响所有使用 alias 指令且配置不当的 nginx 服务器，攻击者无需认证即可远程利用，危害等级高。"
published = "08.10"
remediation = '升级 nginx 至最新稳定版（≥1.24.0）。检查所有 location 块中 alias 指令的使用，确保 location 路径与 alias 路径末尾斜杠一致，或在 alias 路径后添加 `/`，如 `location /foo { alias /var/www/foo/; }`。推荐优先使用 root 指令替代 alias 以避免路径拼接问题。同时限制 location 范围，添加 `location ~ \.php$ { ... }` 针对脚本执行做白名单。如无法升级，可在 WAF/Nginx 层添加 `if ($uri ~ "\.\.") { return 403; }` 规则阻止路径穿越。'
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "NGINX nginx 目录穿越任意文件读取漏洞"
updated = "08.10"

