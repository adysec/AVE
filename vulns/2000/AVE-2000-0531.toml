[basic]
description = 'Norton Antivirus for Exchange（NavExchange）存在失效开放（fail-open）漏洞。当该防病毒软件在处理特定邮件流量时出现异常或资源耗尽时，会进入"失效开放"状态，即停止扫描而直接放行所有邮件流量，导致病毒和恶意代码能够绕过病毒检测机制通过邮件服务器传播。攻击者可通过向目标邮件服务器发送大量精心构造的邮件触发此状态，从而绕过安全防护。该漏洞影响 Norton Antivirus for Exchange 系列产品，CVSS 评分 5.0，危害等级中等。'
published = "2000-06-14T04:00:00.000"
remediation = '立即升级 Norton Antivirus for Exchange (NavExchange) 至 Symantec 官方发布的最新版本，该漏洞在后续版本中已修复。如无法升级，可配置 NavExchange 在检测到扫描引擎故障时切换为"拒绝所有邮件"模式而非"放行"模式，防止病毒绕过检测。同时建议部署邮件网关层独立防病毒扫描作为纵深防御。'
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Symantec Norton Antivirus for Exchange 安全功能绕过漏洞"
updated = "2026-06-16T21:51:49.250"

