[basic]
description = "Linux Kernel 2.0.37 版本中存在段限制（Segment Limit）编码缺陷漏洞，由于内核未能正确编码自定义段限制，导致本地攻击者可通过访问和修改内核内存来提升权限至 root。该漏洞影响 Linux Kernel 2.0.37 及可能更早版本，攻击者需具备本地用户权限即可利用，无需身份认证。成功利用后攻击者可完全控制系统，CVSS 评分 7.2，危害等级高。"
published = "1999-07-11T04:00:00.000"
remediation = "立即将 Linux 内核从 2.0.37 升级至 2.0.38 或更高版本（kernel.org 已发布 patch-2.0.38）。如无法升级内核，可通过 grsecurity/Exec-Shield 等内核加固方案限制本地用户访问内核内存空间，并移除受影响系统上不可信用户的本地登录权限作为临时缓解措施。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "Linux Kernel 2.0.37 权限提升漏洞"
updated = "2026-06-16T21:49:51.663"

