[basic]
description = "iPass RoamServer 3.1 在创建临时文件时未正确设置权限，导致生成的临时文件具有全局可写权限。本地攻击者可通过在临时文件创建与使用之间的时间窗口内写入恶意数据或符号链接，实现权限提升或敏感信息泄露。该漏洞影响 iPass RoamServer 3.1 版本，CVSS 评分 6.4，危害等级中危。厂商未提供官方补丁，建议限制受影响系统的本地访问权限。"
published = "1997-12-29T05:00:00.000"
remediation = "立即升级 iPass RoamServer 至最新版本，或在服务器配置中设置 umask 0077 限制临时文件权限为仅属主可读写；同时将临时目录位置修改到仅授权用户可访问的路径，并启用文件完整性监控定期扫描 /tmp 目录下敏感临时文件的权限设置。"
score = 6.4
severity = "MEDIUM"
sources = ["avd"]
title = "iPass RoamServer 不安全临时文件创建漏洞"
updated = "2026-06-16T21:50:05.317"

