[basic]
description = "Linux Intrusion Detection System (LIDS) 0.9.7 存在权限许可和访问控制漏洞。当系统以 security=0 启动选项关闭 LIDS 保护机制时，本地攻击者可利用该缺陷绕过 LIDS 的访问控制限制，获取 root 超级用户权限。攻击者需要拥有系统的本地登录权限，通过修改引导参数或利用系统已存在的不安全配置即可完成权限提升，CVSS 评分 7.2，危害等级高。"
published = "2000-10-20"
remediation = "升级 LIDS 至 0.9.8 或更高版本，该版本修复了通过 security=0 启动参数绕过 LIDS 权限控制的问题。同时配置 GRUB 密码保护以防止未授权用户修改内核启动参数，并限制物理控制台访问权限。作为临时缓解措施，可移除 /boot/grub/grub.conf 中不必要的 security= 参数并设置 grub 密码。"
score = 7.2
severity = "HIGH"
sources = ["cve"]
title = "LIDS Linux Intrusion Detection System 本地权限提升漏洞"
updated = "2026-06-16"

