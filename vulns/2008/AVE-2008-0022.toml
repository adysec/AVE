[basic]
description = "Microsoft Windows 系统中 DirectShow 组件的 msvidctl.dll 所加载的 MPEG2TuneRequest ActiveX 控件，在处理特制网页时存在栈缓冲区溢出漏洞。该漏洞源于 Active Template Library (ATL) 中 CComVariant::ReadFromStream 函数对数据长度验证不严，远程攻击者可通过构造恶意 Web 页面诱导用户访问，成功利用可在目标系统上执行任意代码。此漏洞在 2009 年 7 月已被在野利用，影响 Windows 2000/XP/2003/Vista/2008 等多个版本，CVSS 评分 8.8，危害等级高。"
published = "2009-07-07T23:30:00.187"
remediation = "立即安装 Microsoft 安全公告 MS09-032 (KB973354) 及 MS09-035 对应系统版本的更新补丁，通过 Windows Update 自动更新即可。对于 Windows 2000 SP4/XP SP2-SP3/Server 2003 SP2/Vista/Server 2008，将 msvidctl.dll 升级至修复版本。临时缓解措施：在 IE 中禁用 MPEG2TuneRequest ActiveX 控件的 kill bit，设置 CLSID {0955AC62-BF2E-4CBA-A2B9-A63F772D46CF} 的兼容性标志为 0x400。"
score = 8.8
severity = "HIGH"
sources = ["kev"]
title = "Microsoft Windows DirectShow ActiveX 远程代码执行漏洞"
updated = "2026-06-16T22:48:45.957"

