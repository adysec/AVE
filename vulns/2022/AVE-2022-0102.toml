[basic]
description = "Linux 内核 kprobes 动态追踪机制中的 `kill_kprobe()` 函数存在检查顺序缺陷，在调用 `disarm_kprobe_ftrace()` 之前先设置了 `KPROBE_FLAG_GONE` 标志，导致探针启用状态的判断始终为假，无法正确执行探针禁用流程。本地攻击者可以利用此缺陷触发空指针解引用（CWE-476），造成系统崩溃拒绝服务。该漏洞影响 Linux 内核各版本，需本地低权限用户访问且具备 kprobe 操作能力，CVSS 评分 5.5，危害等级中等。"
published = "2025-09-15T15:15:37.347"
remediation = "建议将 Linux 内核升级至以下修复版本：4.5+、4.10+、4.15+、4.20+、5.5+、5.9+、6.0.16+ 或 6.1.2+。对于无法立即升级内核的系统，可应用对应稳定分支的补丁：`0c76ef3f26d5`（4.4）、`c909985dd0c0`（4.9）、`f20a067f1310`（4.14）；可通过关闭 `CONFIG_KPROBES` 内核编译选项禁用 kprobes 功能作为临时缓解。"
score = 5.5
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux Kernel kprobes 空指针解引用漏洞"
updated = "2026-06-17T05:23:06.787"

