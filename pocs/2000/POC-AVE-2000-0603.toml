[info]
author = "AVE"
description = "RedHat Linux 6.2/7.0 tmpwatch --fuser 选项对包含 shell 元字符（;、`、$()）的文件名未正确转义就传入 system() 执行，导致本地任意命令注入。攻击者在 tmpwatch 管理的目录（如 /tmp）中创建含恶意命令的文件名，tmpwatch 处理时元字符被 shell 解释执行注入命令。真实 PoC 代码见 ExploitDB 20285。"
id = "POC-AVE-2000-0603"
name = "RedHat Tmpwatch 任意命令执行漏洞 PoC"
severity = "low"
tags = [
    "cve-2000-0816",
    "tmpwatch",
    "fuser",
]
vuln_id = [
    "CVE-2000-0816",
    "AVE-2000-0603",
]

[poc]
logic = "all"

[[poc.requests]]
path = "/etc/passwd"
protocol = "file"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["root"]
