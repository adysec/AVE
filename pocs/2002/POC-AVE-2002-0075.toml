[info]
author = "ave"
description = "检测 CUPS 1.1.14-1.1.17 版本中存在的本地竞争条件漏洞，通过访问 CUPS Web 界面获取版本号判断是否存在漏洞"
id = "POC-AVE-2002-0075"
name = "CVE-2002-1366 CUPS 本地竞争条件漏洞 PoC"
severity = "medium"
tags = ["ave-2002-0075"]
vuln_id = [
    "CVE-2002-1366",
    "AVE-2002-0075",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}:631/"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "CUPS 1.1.1",
    "CUPS/1.1.1",
]
