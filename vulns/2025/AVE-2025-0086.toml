[basic]
description = "用友畅捷通T+（TPlus）的 keyEdit.aspx 页面中 KeyID 参数未对用户输入进行有效的过滤和参数化处理，存在 SQL 注入漏洞。攻击者可构造特制的 GET 请求，在 KeyID 参数中注入恶意 SQL 语句，实现对后台数据库的查询与数据窃取。该漏洞影响部署了畅捷通T+的 Web 服务实例，攻击者无需身份认证，仅需目标系统可访问即可利用，可能导致数据库中敏感业务数据泄露。"
published = "0702"
remediation = '立即升级畅捷通T+至官方最新安全版本（≥18.0），该版本已修复keyEdit.aspx中KeyID参数未做参数化查询导致的SQL注入漏洞。如无法立即升级，在Web应用防火墙（WAF）中添加规则拦截包含"KeyID="且含SQL关键字（如and、select、union、@@version）的GET请求，同时限制/tplus/UFAQD/keyEdit.aspx路径的访问来源IP白名单。'
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "用友 畅捷通T+ keyEdit.aspx SQL注入漏洞"
updated = "0702"

