[basic]
description = "UUCP（Unix-to-Unix Copy Protocol）在 AIX 3.2 之前版本的默认配置存在权限控制缺陷，本地攻击者可利用该配置漏洞直接获取 root 用户权限。该漏洞源于 UUCP 服务的文件权限和默认设置不当，攻击者仅需拥有系统本地访问权限即可实施提权攻击，无需其他认证条件。影响范围包括 AIX 3.2 之前版本，CVSS 评分 7.2，危害等级高。"
published = "1992-03-19T05:00:00.000"
remediation = "升级 AIX 系统至 3.2 及以上版本，或修改 UUCP 配置文件（/etc/uucp/*）权限，限制非授权用户对 UUCP 程序的访问，移除 uucp 用户组中不必要的本地用户，并确保 uucp 相关 SUID 程序仅对 root 可执行。"
score = 7.2
severity = "HIGH"
sources = ["epss"]
title = "IBM AIX UUCP 本地权限提升漏洞"
updated = "2026-06-16T21:49:45.900"

