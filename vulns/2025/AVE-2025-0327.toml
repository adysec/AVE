[basic]
description = "泛微e-cology 9协同办公系统存在SQL注入漏洞，攻击者可通过向`/api/doc/out/more/list`接口发送包含恶意SQL语句的`elementmore`参数，绕过输入验证直接注入数据库查询语句。该漏洞可导致攻击者非法读取、修改或删除数据库数据，甚至获取服务器操作系统权限。影响范围涵盖使用泛微e-cology 9版本的所有企业用户。建议升级至最新版本并部署WAF规则过滤特殊字符。"
published = "0711"
remediation = "立即将泛微 e-cology 升级至补丁版本 10.58.0 或更高版本，该版本已修复 /api/doc/out/more/list 接口中 elementmore 参数的 SQL 注入漏洞。如无法立即升级，可通过 WAF 添加规则对 elementmore 参数进行特殊字符过滤，并限制对 /api/doc/out/more/list 路径的访问来源 IP。"
score = 5
severity = "MEDIUM"
