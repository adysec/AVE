[basic]
description = "Microsoft IIS 2.0及3.0版本存在拒绝服务漏洞。远程攻击者通过发送包含超长查询字符串（长度在4KB到8KB之间）的HTTP GET请求，可导致IIS服务进程崩溃或停止响应。该漏洞影响IIS 2.0、3.0及4.0（SP4之前版本），攻击无需身份认证即可通过网络远程触发。"
published = "1997-06-01"
remediation = "升级到 Windows 2000 及以上版本内置的 IIS 5.0 或更高版本，IIS 2.0/3.0 已停止支持且不再有安全更新。如无法升级，安装微软官方提供的 UrlScan 工具限制 URL 长度可缓解风险。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Microsoft IIS 2.0/3.0 长URL 拒绝服务漏洞"
updated = "1997-06-01"

