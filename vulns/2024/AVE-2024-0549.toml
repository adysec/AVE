[basic]
description = "Linux 内核 NTFS3 文件系统驱动中存在缺陷，当 mi_enum_attr() 函数在解析 NTFS 文件属性时检测到错误后，未能及时将 inode 标记为损坏状态，导致后续操作可能继续访问已损坏的 inode 结构，进而引发内核崩溃或系统挂起。本地低权限攻击者可通过挂载特制的恶意 NTFS 镜像文件触发此漏洞，造成拒绝服务。该漏洞影响所有使用 Linux 内核 NTFS3 驱动的系统，CVSS 评分 5.5，危害等级中等。"
published = "2025-02-27T03:15:10.573"
remediation = "立即更新 Linux 内核至 6.13.4 或更高版本，或 cherry-pick 补丁提交 `d9c699f2c4dc174940ffe8600b20c267897da155`（主线）及 `2afd4d267e6dbaec8d3ccd4f5396cb84bc67aa2e`（稳定树）。如无法升级内核，可通过 `modprobe.blacklist=ntfs3` 内核参数禁用 ntfs3 驱动，改用稳定的 ntfs-3g 用户态驱动作为临时缓解措施。"
score = 5.5
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux Kernel ntfs3 拒绝服务漏洞"
updated = "2026-06-17T08:07:27.560"

