[basic]
description = "LVS精益价值管理系统 loginVaild.aspx 接口存在路径遍历漏洞，未授权的远程攻击者可通过构造特制的 file 参数（如 ../../WEB-INF/web.config）绕过目录限制，读取服务器上的任意文件（包括配置文件、源代码等敏感信息）。攻击者无需身份认证即可利用该漏洞，CVSS 评分 7.5，危害等级高危。受影响的版本包括 LVS精益价值管理系统多个版本，建议升级至最新版本或对该接口实施严格的路径校验与访问控制。"
published = "20260415"
remediation = "联系吉拉科技获取最新安全补丁或升级至修复版本；同时在 loginVaild.aspx 中对 file 参数进行严格过滤，禁止包含 ../ 等路径遍历序列的输入，并限制仅允许读取指定目录内的文件；在 IIS 或反向代理层配置 URL 重写规则，拦截包含 ../ 的请求；部署 WAF 规则阻断路径遍历攻击载荷。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "LVS精益价值管理系统 loginVaild.aspx 任意文件读取漏洞"
updated = "20260415"

