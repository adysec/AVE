[basic]
description = "Windows HTTP.sys 组件存在整数溢出漏洞（CWE-122），未经身份认证的远程攻击者可通过向目标服务器发送特制的 HTTP 请求触发该漏洞，造成整数溢出进而演变为堆溢出，最终导致远程代码执行。该漏洞影响多个 Windows 版本，CVSS 评分 9.8，危害等级严重。攻击无需用户交互，利用复杂度低，可被用于蠕虫式传播，建议用户立即安装 Microsoft 安全更新以修复此漏洞。"
published = "2026-06-09T17:17:34.627"
remediation = "立即安装 Microsoft 2026 年 6 月安全更新，各版本修复版本号：Windows 10 1607 ≥ 10.0.14393.9234、1809 ≥ 10.0.17763.8880、21H2 ≥ 10.0.19044.7417、22H2 ≥ 10.0.19045.7417；Windows 11 23H2 ≥ 10.0.22631.7219、24H2 ≥ 10.0.26100.8655、25H2 ≥ 10.0.26200.8655、26H1 ≥ 10.0.28000.2269；Windows Server 2012/2012 R2 同步更新。可通过 Windows Update 自动获取或从 Microsoft 更新目录手动下载。如无法立即打补丁，建议在边界防火墙上限制对 HTTP.sys 服务（80/443 端口）的访问来源，仅允许可信 IP 作为临时缓解措施。"
score = 9.8
severity = "CRITICAL"
sources = ["hwpoc"]
title = "Microsoft Windows HTTP.sys 远程代码执行漏洞"
updated = "2026-06-17T10:54:28.290"

