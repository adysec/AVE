[info]
author = "ave"
description = "检测目标是否运行 NCSA HTTPd 1.3 版本，该版本存在缓冲区溢出漏洞（CVE-1999-0267），远程攻击者可通过超长 GET 请求触发栈溢出实现远程命令执行。"
id = "POC-AVE-1999-0452"
name = "NCSA HTTPd 1.3 缓冲区溢出检测"
severity = "high"
tags = ["ave-1999-0452"]
vuln_id = [
    "CVE-1999-0267",
    "AVE-1999-0452",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "header"
type = "word"
words = [
    "NCSA",
    "HTTPd",
]
