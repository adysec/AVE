[basic]
description = "NetWin DNews 5.3 服务器的 DNEWSWEB CGI 程序存在缓冲区溢出漏洞，远程攻击者通过向 group、cmd、utag 等参数提交超长字符串，可触发缓冲区溢出并在服务器上执行任意命令。该漏洞影响 NetWin DNews 5.3 及更早版本，攻击者无需身份认证即可通过 HTTP 请求远程利用，危害严重。"
published = "2000-05-05T04:00:00.000"
remediation = "NetWin DNews 5.3 已停止维护且不再发布安全更新，建议立即迁移至其他受支持的 Usenet 新闻服务器软件（如 INN 或 Leafnode）。如无法迁移，须移除 DNEWSWEB CGI 可执行文件的 SUID 权限并在 Web 服务器层面限制对 CGI 脚本的访问来源 IP；同时避免将 group、cmd、utag 等参数直接传递给用户输入。该版本已无官方补丁，继续使用风险极高。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "NetWin DNews CGI 远程缓冲区溢出漏洞"
updated = "2026-06-16T21:51:42.067"

