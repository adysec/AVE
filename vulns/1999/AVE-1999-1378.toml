[basic]
description = "man.sh CGI 脚本存在远程命令执行漏洞，该脚本随 1998 年 5 月《SysAdmin Magazine》杂志发布。未经身份认证的远程攻击者可通过向 Web 服务器发送特制 HTTP 请求，利用该脚本对用户输入参数过滤不严的缺陷，在目标系统上以 Web 服务器进程权限执行任意系统命令。该漏洞影响配置了 man.sh CGI 脚本的各类 Unix/Linux 系统，CVSS 评分 7.5，危害等级高。建议立即移除或禁用该 CGI 脚本。"
published = "1998-05-15T04:00:00.000"
remediation = "立即删除或停用服务器上的 man.sh CGI 脚本，该脚本未对用户输入进行过滤，允许远程命令执行。如仍需类似功能，应使用经过安全审计的替代实现（如 man.cgi）并确保对用户输入进行严格过滤和验证。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
