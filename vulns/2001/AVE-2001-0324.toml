[basic]
description = "Squid 代理服务器 2.4 及早期版本的 FTP 代理功能存在拒绝服务漏洞，远程未认证攻击者可发送仅包含 MKD 命令的 FTP PUT 请求，触发 Squid 进程崩溃导致拒绝服务。该漏洞影响 Squid 2.4 及更早版本，CVSS 评分 5.0（中危），攻击向量为网络、攻击复杂度低、无需认证、仅影响可用性。攻击者只需向开放 FTP 代理端口的 Squid 服务器发送特制的仅含 MKD 命令的 FTP PUT 请求即可触发崩溃，导致代理服务拒绝服务。Squid 官方已在后续版本中修复此漏洞，建议升级至 2.5 及以上版本或禁用 FTP 代理功能缓解风险。"
published = "2001-12-06T05:00:00.000"
remediation = "立即升级到 Squid 4.0 或更高版本以获取完整修复。如无法立即更新，可配置 `ftp_put_cmd_only_toplevel=off` 禁用敏感FTP命令，或通过防火墙限制FTP端口访问作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["redhat"]
title = "Squid 代理服务器 2.4 FTP 代理拒绝服务漏洞"
updated = "2026-06-16T21:55:04.817"

