[basic]
description = "Mac OS 9 的空闲锁定功能存在安全漏洞，本地攻击者可通过程序员开关或 CMD-PWR 键盘组合键调出调试器，利用调试器禁用屏幕锁定，从而绕过密码保护获取未授权访问权限。攻击者需要物理接触目标系统。"
published = "1999-11-01"
remediation = "升级至 Mac OS X 或更高版本操作系统，或物理禁用程序员开关以防止调试器被未授权调用。"
score = 4.6
severity = "MEDIUM"
