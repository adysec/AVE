[info]
author = "ave"
description = "Microsoft Windows OLE Automation 数组远程代码执行漏洞 (CVE-2014-6332, MS14-064) PoC 验证。通过构造恶意 VBScript 触发 SafeArrayRedim 整数溢出，实现远程代码执行。影响 IE 及使用 WebBrowser 控件的应用（Avant Browser、The World Browser、HTML Compiler 等）。"
id = "POC-AVE-2014-0409"
name = "CVE-2014-6332 PoC"
severity = "high"
tags = ["ave-2014-0409"]
vuln_id = [
    "CVE-2014-6332",
    "AVE-2014-0409",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/cve-2014-6332-poc.html"
protocol = "http"

[poc.requests.body]
content = ""
type = "raw"

[poc.requests.headers]
User-Agent = "AVE/1.0"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "CVE-2014-6332",
    "SafeArrayRedim",
    "chrw(01)&chrw(2176)",
]

[[poc.requests.matchers]]
expect = true
part = "status"
status = [200]
type = "status"
