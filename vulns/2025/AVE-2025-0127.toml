[basic]
description = "雨人 ERP 系统中 ASP.NET 的 Request.axd 调试处理程序未正确配置访问控制，导致远程攻击者无需任何身份认证即可直接访问该接口，获取服务器端敏感信息（包括应用程序配置、会话状态、服务器变量、请求参数等）。攻击者只需向目标发送特制的 HTTP 请求即可触发信息泄露，进一步利用泄露的信息可扩大攻击面，实施更深入的渗透攻击。该漏洞影响雨人 ERP 多个版本，危害等级中危，建议厂商及时修复访问控制策略。"
published = "0702"
remediation = '在 IIS 管理器中移除或注释掉 web.config 中 Request.axd 的 HttpHandler 映射（<remove verb="*" path="Request.axd" />），或将该处理程序限制为仅本地 IP（127.0.0.1）可访问；同时禁用 ASP.NET 跟踪功能（<trace enabled="false" />），并在生产环境中将 deployment retail 属性设为 true 以关闭所有调试输出。'
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "雨人 ERP Request.axd 信息泄露漏洞"
updated = "0702"

