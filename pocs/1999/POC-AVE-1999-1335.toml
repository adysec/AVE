[info]
author = "AVE"
description = '检测 KDE kppp 是否存在 setuid root 的缓冲区溢出漏洞。kppp 在复制 PATH 环境变量到静态缓冲区时未检查长度（strncat(path, getenv("PATH"), sizeof(path)-512)），本地攻击者可通过设置超长 PATH 触发缓冲区溢出，获取 root 权限。'
id = "POC-AVE-1999-1335"
name = "KDE kppp 本地缓冲区溢出漏洞 PoC"
severity = "high"
tags = [
    "cve-1999-1107",
    "kde",
    "kppp",
    "buffer-overflow",
    "local-privilege-escalation",
]
vuln_id = [
    "CVE-1999-1107",
    "AVE-1999-1335",
]

[poc]
logic = "all"

[[poc.requests]]
path = "/usr/bin/kppp"
protocol = "file"

[[poc.requests.matchers]]
expect = true
part = "body"
regex = ".+"
type = "regex"
