[basic]
description = "系统关键程序、库文件或系统文件的校验和或其他完整性检测指标被篡改，表明这些文件已被恶意修改。攻击者可通过替换或修改系统关键组件，在目标系统上实现权限提升，获取高于预期权限的访问能力。该漏洞影响多种操作系统及软件包管理机制，CVSS评分10.0，危害等级严重。修复方式包括重新安装受影响的软件包并验证文件完整性。"
published = "1999-01-01T05:00:00.000"
remediation = "建议立即验证系统关键程序、库文件的完整性校验和，对比官方发布版本的哈希值，发现篡改立即从可信源重新安装受影响组件；启用文件完整性监控（如AIDE/Tripwire）实时监控关键文件变更；启用文件系统完整性保护（如Linux IMA/EVM、Windows系统文件保护）；限制非特权用户对关键系统目录的写入权限，实施最小权限原则；定期对比官方发布的校验和验证系统完整性。如无法立即修复，建议部署运行时应用自我保护（RASP）或主机入侵检测系统（HIDS）监控关键文件完整性变更作为临时缓解措施。建议升级至厂商发布的修复版本或应用官方安全补丁。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "通用 软件包 系统关键文件完整性校验绕过提权漏洞"
updated = "2026-06-16T21:48:48.027"

