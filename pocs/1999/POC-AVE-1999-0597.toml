[info]
author = "AVE"
description = "检测 SCO UnixWare 7.1 /var/mail 目录默认权限配置不当漏洞，本地用户可读取和修改其他用户的邮件文件"
id = "POC-AVE-1999-0597"
name = "CVE-1999-0825 PoC"
severity = "low"
tags = ["ave-1999-0597"]
vuln_id = [
    "CVE-1999-0825",
    "AVE-1999-0597",
]

[poc]
logic = "all"

[[poc.requests]]
path = "/var/mail"
protocol = "file"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["mail"]
