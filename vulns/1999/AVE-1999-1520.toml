[basic]
description = "CGI City 的 CC Whois 1.0 程序中的 whois.cgi 存在命令注入漏洞，其根源在于程序未对用户输入的域名参数进行任何过滤或转义，便直接拼接至系统 Shell 命令中执行。远程攻击者无需身份认证，只需向 whois.cgi 提交包含 Shell 元字符（如分号、管道符、反引号等）的恶意域名查询请求，即可在目标 Web 服务器上执行任意操作系统命令。该漏洞影响所有运行 CC Whois 1.0 的服务器，成功利用可导致服务器被远程控制、敏感数据泄露或拒绝服务，CVSS 评分为 7.5，危害等级为高。"
published = "1999-11-09T05:00:00.000"
remediation = "tags.<value>升级到最新版 CC Whois 1.5+，使用安全解析函数替代 shell_exec，并在 web 根目录禁用执行权限；如无法立即更新，可使用 waf 规则过滤包含特殊字符的域名参数作为临时缓解措施。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "CGI City CC Whois 1.0 远程命令注入漏洞"
updated = "2026-06-16T21:49:27.850"

