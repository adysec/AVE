[basic]
description = "Digital Unix（即 OSF/1）3.x 版本中的 dxchpwd 程序存在符号链接攻击漏洞。该程序在运行过程中会以不安全的方式处理名为 dxchpwd.log 的日志文件，本地已登录的普通用户可通过预先创建指向任意系统文件的符号链接来替换该日志文件路径。当 dxchpwd 以较高权限写入日志时，实际写入的是被链接指向的任意文件，从而导致本地用户未经授权地修改系统上的任意文件内容。该漏洞影响范围限于运行 Digital Unix 3.x 且本地存在普通用户账户的系统，攻击条件为攻击者需具备本地登录权限并能在程序运行前布置恶意符号链接，利用方式是通过符号链接劫持实现本地文件任意篡改，可能造成系统配置文件或关键数据被恶意修改，CVSS 基础评分约为 2.1，危害等级较低。"
published = "1996-11-17T05:00:00.000"
remediation = "升级到已修复该符号链接问题的 Digital Unix（OSF/1）后续补丁版本（建议应用厂商 ECO/DUX 补丁至 4.0 及以上）。在无法立即升级时，可移除 dxchpwd 程序的 SUID 位（chmod u-s /usr/bin/dxchpwd）或限制普通用户对 dxchpwd.log 所在目录的写权限，以阻止符号链接攻击。"
score = 2.1
severity = "LOW"
sources = ["avd"]
title = "Digital Unix OSF/1 dxchpwd 符号链接攻击文件任意修改漏洞"
updated = "2026-06-16T21:49:58.630"

