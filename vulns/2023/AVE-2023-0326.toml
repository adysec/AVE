[basic]
description = "深圳市蓝凌软件股份有限公司OA系统存在命令执行漏洞，攻击者可通过构造恶意请求在服务器上执行任意系统命令。该漏洞源于系统对用户输入缺乏有效过滤与校验，未经身份认证的远程攻击者可直接利用。影响蓝凌OA多个版本，成功利用可导致服务器完全沦陷、敏感数据泄露及内网横向移动。建议立即升级至官方修复版本并加强输入验证与权限控制。"
