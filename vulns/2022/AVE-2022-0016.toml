[basic]
description = "Linux 内核的 ath11k 无线驱动中存在死锁漏洞，由于 wmi_mgmt_tx_work 工作队列在加锁竞争条件下无法被调度执行，导致管理帧因无法在超时时间内完成刷新而持续积压。攻击者可通过发送大量管理帧触发该竞态条件，造成系统拒绝服务（如 Wi-Fi 连接断开、管理帧丢失），影响使用 ath11k 驱动的无线网卡设备。CVSS 评分 5.5，危害等级中等。"
published = "2025-02-26T07:00:49.640"
remediation = "建议将 Linux 内核升级至 5.17.3 及以上版本（5.18+ 已含修复），或安装各发行版对应安全更新（如 Ubuntu 的 linux-image-5.17.3 内核包）。该补丁已反向移植至多个 LTS 稳定分支，执行 `git cherry-pick 261b07519518` 和 `33e723dc054e` 两个提交可手动修复源码。若无法立即升级，可通过热移除 ath11k 内核模块（`modprobe -r ath11k_pci`）临时缓解，但会禁用对应无线网卡功能。"
score = 5.5
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux kernel ath11k 驱动死锁拒绝服务漏洞"
updated = "2026-06-17T05:17:08.830"

