[basic]
description = 'Sun Solaris x86 2.4、2.5 及 2.5.1 版本中的 nlps_server（System V listener 监听服务）存在缓冲区溢出漏洞。该服务监听于 TCP 2766 端口，未经身份认证的远程攻击者可向该端口发送以 "NLPS:002:002:" 开头的超长字符串，触发栈缓冲区溢出，从而以 root 权限在目标系统上执行任意代码。攻击条件仅需能够访问目标主机的 2766 端口，无需任何凭据，利用方式简单且危害极高。成功利用可导致攻击者完全控制受影响系统，CVSS 评分 9.8，危害等级为严重。建议关闭或限制访问 System V listener 服务，并升级到已修复的系统版本。'
published = "1999-12-31T05:00:00.000"
remediation = "建议升级至 Sun Solaris x86 2.5.1 并应用 Sun 官方发布的安全补丁（补丁编号 106738-01 或更高版本）。如无法立即升级，建议在防火墙层面封禁 TCP 2766 端口（System V listener 端口），或通过 /etc/inet/inetd.conf 注释掉 nlps_server 服务并重启 inetd 服务以禁用该服务作为临时缓解措施。建议尽快升级至 Solaris 7 或更高版本彻底修复该缓冲区溢出漏洞。"
score = 9.8
severity = "CRITICAL"
sources = ["cve"]
title = "Sun Solaris x86 nlps_server 缓冲区溢出漏洞"
updated = "2026-06-16T21:50:46.927"

