[basic]
description = "Id Software Quake 1.9 及 NetQuake 服务器存在 UDP 泛洪拒绝服务漏洞。远程攻击者可通过伪造大量 UDP 连接数据包向目标服务器发起泛洪攻击，导致服务器资源耗尽或强制断开玩家连接。该漏洞利用了服务器未对连接请求进行合法性校验的缺陷，攻击者无需认证即可实施攻击，且伪造源 IP 地址可绕过简单过滤。该漏洞影响 Quake 1 系列游戏服务器，CVSS 评分 5.0，危害等级中等。"
published = "2001-07-17T04:00:00.000"
remediation = "将 Quake 1 服务器替换为社区维护的开源源码分支（如 QuakeSpasm-Spiked 或 vkQuake），这些分支内置了连接验证和速率限制机制。在防火墙层面配置 UDP 速率限制，对单 IP 的 UDP 连接请求进行限速（如每秒不超过 10 个连接包），超出阈值自动丢弃。同时在服务器配置文件中合理设置最大玩家数（maxplayers），避免设为无限制值，并启用 IP 白名单仅允许可信客户端连接。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Id Software Quake 1 UDP Flooding 拒绝服务漏洞"
updated = "2026-06-16T21:50:44.320"

