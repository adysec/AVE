[basic]
description = "Windows NT 4.0 本地安全认证子系统服务 (LSASS.EXE) 存在空指针解引用漏洞。远程攻击者可通过向 SamrOpenDomain、SamrEnumDomainUsers 及 SamrQueryDomainInfo 等 RPC 调用传递空策略句柄，导致 LSASS 进程崩溃，引发目标系统拒绝服务。该漏洞影响 Windows NT 4.0 全版本，攻击者无需身份认证即可远程触发，CVSS 评分 5.0，危害等级中危。微软尚未发布官方补丁，建议通过防火墙限制对 RPC 端口的访问以缓解风险。"
published = "1999-10-26T04:00:00.000"
remediation = '该漏洞源于 LSASS.EXE 在处理 MSRPC 请求时未正确校验空策略句柄所致。Microsoft 在 Windows NT 4.0 生命周期内未发布专门修复此问题的安全更新（SP3/SP4/SP5 及 LSA3-fix 均无效）。建议采取以下措施：(1) 在边界防火墙上阻止对 TCP 135/139/445 和 UDP 137/138/445 端口的入站访问，限制匿名 RPC 调用；(2) 通过本地安全策略将"网络访问：允许匿名 SID/名称转换"设置为"已禁用"；(3) Windows NT 4.0 已于 2004 年终止支持，建议升级至受支持的 Windows 版本（如 Windows Server 2019 或更高版本）以获取持续安全更新。'
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Microsoft Windows NT 4.0 LSA lsass.exe 拒绝服务漏洞"
updated = "2026-06-16T21:50:00.263"

