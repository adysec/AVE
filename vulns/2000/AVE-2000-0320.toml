[basic]
description = "MIT Kerberos 4/5 及 Cygnus Network Security 4.0、KerbNet 5.0、RedHat 6.2 等系统中的 krb_rd_req() 函数存在缓冲区溢出漏洞。远程攻击者无需身份认证即可向目标系统发送特制的 Kerberos 协议请求，触发缓冲区溢出，从而以 root 权限执行任意代码。该漏洞 CVSS 评分 10.0，危害等级严重，影响范围广泛，已有公开利用代码。"
published = "2000-05-16T04:00:00.000"
remediation = "升级 MIT Kerberos 至 krb5-1.1.1 及以上版本（含 kth-krb4 补丁），Red Hat 6.2 用户安装安全勘误更新。Kerberos 4 协议本身已停止维护，应全面迁移至 Kerberos 5 并禁用对 krb4 兼容模式的支持。在无法立即升级的环境下，在防火墙层面限制对 kdc 服务（TCP/UDP 88 端口）和 krb4 服务（TCP/UDP 750 端口）的访问白名单，并启用 SELinux/AppArmor 限制 krb_rd_req 调用进程权限。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "MIT Kerberos 4/5 krb_rd_req 远程缓冲区溢出漏洞"
updated = "2026-06-16T21:51:36.847"

