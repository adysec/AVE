[basic]
description = "Linux OpenLDAP 服务器在处理临时文件时存在符号链接（symlink）安全漏洞。本地攻击者可通过在 `/usr/tmp/` 目录下创建恶意符号链接，诱使 OpenLDAP 服务器以提升的权限写入目标文件，从而实现任意文件修改。该漏洞影响 OpenLDAP 1.2.7/1.2.8/1.2.9/1.2.10 版本，利用需要本地系统访问权限，CVSS 评分 2.1，危害等级低。"
published = "2000-04-21T04:00:00.000"
remediation = "升级到 OpenLDAP 1.2.11 或更高版本，该版本已修复符号链接跟踪问题。临时缓解措施：确保 /usr/tmp/ 目录设置 sticky bit（chmod +t /usr/tmp），并避免在多用户环境下以 root 权限运行 slapd。"
score = 2.1
severity = "LOW"
sources = ["cve"]
title = "OpenLDAP 符号链接本地任意文件修改漏洞"
updated = "2026-06-16T21:51:30.277"

