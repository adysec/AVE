[basic]
description = "ascdc 是 AfterStep 窗口管理器中的 CD 播放器控制工具，其以 setuid 权限运行时存在缓冲区溢出漏洞。本地攻击者可通过向 -d、-m 或 -f 选项传递超长字符串参数触发缓冲区溢出，导致攻击者以 root 权限执行任意代码。该漏洞影响 AfterStep 及包含 ascdc 组件的相关 Linux 发行版，CVSS 评分 7.2，危害等级高。利用该漏洞需要本地系统访问权限，但无需用户交互，攻击复杂度低。"
published = "2001-06-27T04:00:00.000"
remediation = "升级 AfterStep 至 1.8.1 及以上版本，该版本修复了 ascdc 的缓冲区溢出问题。如无法升级，立即移除 ascdc 的 setuid 权限（chmod u-s /usr/bin/ascdc），防止本地用户通过 -d、-m、-f 参数触发缓冲区溢出获取 root 权限。"
score = 7.2
severity = "HIGH"
sources = ["exploitdb"]
title = "Rob Malda ASCDC 本地缓冲区溢出漏洞"
updated = "2026-06-16T21:54:20.837"

