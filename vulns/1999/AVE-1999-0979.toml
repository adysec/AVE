[basic]
description = "WinGate 代理服务器软件存在权限提升漏洞，远程攻击者可通过连接其代理服务端口（如 1080 SOCKS、80 HTTP 等）绕过访问控制规则，获取对内部网络资源的未授权访问权限。该漏洞影响 WinGate 多个版本，攻击者无需认证即可利用，可能导致敏感信息泄露或进一步内网渗透。建议升级至最新版本或配置严格的访问控制策略。"
published = "1999-01-01T05:00:00.000"
remediation = "升级到 WinGate 4.5.0 或更高版本，在管理控制台中关闭对外的 Telnet/Remote Config 管理端口，仅允许内网地址访问代理服务，并为管理员账户配置强密码与 IP 访问限制。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
