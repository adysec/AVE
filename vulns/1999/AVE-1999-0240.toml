[basic]
description = "Network Associates Gauntlet Firewall 5.0 在处理异常格式的 ICMP 数据包时存在拒绝服务漏洞，远程攻击者无需身份认证即可向目标防火墙发送特制的畸形 ICMP 报文，触发异常的报文处理流程，导致防火墙服务崩溃或停止响应，从而阻断正常网络流量通过。该漏洞直接影响 Gauntlet Firewall 5.0 版本，CVSS 评分 5.0，危害等级中危。"
published = "1999-07-30T04:00:00.000"
remediation = "Network Associates Gauntlet Firewall 5.0 已停止技术支持，官方不再发布安全补丁。建议立即升级至仍在支持周期内的现代防火墙产品。如需临时缓解，可在网络边界 ACL 中配置丢弃畸形 ICMP 报文（如分片 ICMP、长度异常 ICMP 等），并限制 ICMP 速率，减少拒绝服务攻击面。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Network Associates Gauntlet Firewall 5.0 ICMP Packet 拒绝服务漏洞"
updated = "2026-06-16T21:48:50.410"

