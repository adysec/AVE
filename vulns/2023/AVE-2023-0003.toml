[basic]
description = "Citrix NetScaler ADC 和 NetScaler Gateway 存在敏感信息泄漏漏洞（CVE-2023-4966，又名 Citrix Bleed），该漏洞源于设备内存管理缺陷，当设备配置为网关（VPN 虚拟服务器、ICA 代理、CVPN、RDP 代理）或 AAA 虚拟服务器时，未经身份认证的远程攻击者可通过向目标设备发送特制请求读取内核内存中的会话令牌（Session Token），从而劫持合法用户已建立的会话，绕过身份认证机制直接进入目标内网。该漏洞影响 NetScaler ADC 和 NetScaler Gateway 多个版本，CVSS 评分 9.4，危害等级严重，已有公开的利用工具（如 assetnote 和 Chocapikk 发布的 exploit）在野外被广泛使用。Citrix 官方已在 2023 年 10 月发布安全公告并推出修复版本，建议用户立即升级至不受影响版本。"
published = "2023-10-10T14:15:10.977"
remediation = "立即升级 NetScaler ADC 和 NetScaler Gateway 至以下修复版本：13.1-49.13 及以上、13.0-91.13 及以上、12.1-65.35 及以上。如无法立即打补丁，可在受影响设备上禁用未使用的 AAA 虚拟服务器，并强制终止现有用户会话、轮换所有会话密钥以降低风险。"
score = 9.4
severity = "CRITICAL"
sources = ["hwpoc"]
title = "Citrix NetScaler ADC 和 Gateway 敏感信息泄漏漏洞"
updated = "2026-06-17T06:38:59.773"

