[basic]
description = "mSQL（Mini SQL）2.0.6 版本存在信息泄露漏洞。攻击者可通过发送 ServerStats 查询请求，未经验证的远程用户即可获取服务器的敏感信息，包括当前在线用户列表、数据库名称以及服务器版本等关键数据。该漏洞源于 mSQL 2.0.6 对 ServerStats 查询的权限验证不足，导致攻击者能够轻易提取数据库服务器的详细配置信息和运行状态，对数据库系统的安全性和隐私性造成严重威胁。该漏洞可通过简单的网络请求触发，无需任何特殊权限即可执行，从而为攻击者提供了大量关于目标系统内部结构的敏感信息，有可能进一步为后续攻击行动提供支持。"
published = "1999-02-15T05:00:00.000"
remediation = "升级到 mSQL 2.0.6 以上版本以获取漏洞修复，或禁用 ServerStats 查询功能以防止信息泄露，建议部署权限控制和认证机制限制对查询功能的访问。升级到 mSQL 2.0.6 以上版本，以获取漏洞修复，或禁用 ServerStats 查询功能以防止信息泄露，建议部署权限控制和认证机制限制对查询功能的访问。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "Hughes Technologies mSQL 信息泄露漏洞"
