[basic]
description = "ntop 1.2 a7-9 及 1.3.1 版本的 Web 模式中存在缓冲区溢出漏洞，远程攻击者无需身份认证即可向目标发送特制 HTTP 请求触发该漏洞，导致任意命令执行。该漏洞影响运行 ntop Web 模式的系统，CVSS 评分 10.0，危害等级严重。建议升级至修复版本。"
published = "2000-10-20T04:00:00.000"
remediation = "立即升级 ntop 至 1.3.2 或更高版本，该版本已修复 Web 模式下的缓冲区溢出漏洞。如无法立即升级，可临时禁用 ntop 的 Web 管理界面（使用 -n 参数启动），仅通过命令行方式使用 ntop 进行网络监控，以降低远程攻击面。"
score = 10
severity = "CRITICAL"
sources = ["cve"]
title = "Luca Deri ntop 远程缓冲区溢出漏洞"
updated = "2026-06-16T21:52:18.627"

