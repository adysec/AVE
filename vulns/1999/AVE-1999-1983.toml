[basic]
description = "Computalynx CMail 2.4 及 2.3 SP2 版本的 SMTP 服务在处理 MAIL FROM 命令时存在缓冲区溢出漏洞，远程攻击者无需身份认证即可向目标服务器发送特制的超长 MAIL FROM 命令，触发缓冲区溢出，进而导致任意代码执行。该漏洞 CVSS 评分 10.0，危害等级严重，受影响服务器可能被完全控制。"
published = "1999-09-12T04:00:00.000"
remediation = "Computalynx CMail 2.3 SP2/2.4 已停止维护，无可用安全补丁。建议立即迁移至仍在安全支持期的邮件服务器软件（如 Postfix、Exim、Microsoft Exchange），同时在网络防火墙层面限制外部对 SMTP 端口（25/TCP）的访问，仅允许可信 IP 连接作为临时缓解措施。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "Computalynx CMail SMTP 缓冲区溢出漏洞"
updated = "2026-06-16T21:50:37.103"

