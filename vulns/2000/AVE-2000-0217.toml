[basic]
description = "Atrium Software Mercur WebView WebMail 服务器存在缓冲区溢出漏洞，远程攻击者可通过构造包含超长 mail_user 参数的 HTTP GET 请求发送至目标服务器，触发缓冲区溢出，导致服务崩溃并拒绝服务。该漏洞影响 Mercur WebView WebMail-Client 1.0 版本，虽无法直接实现远程代码执行，但可造成服务器持续拒绝服务，危害较大。"
published = "2000-03-15T05:00:00.000"
remediation = "升级到 Atrium Software 发布的 Mercur WebView 修复版本（1.0 之后的补丁版本），彻底修复 mail_user 参数缓冲区溢出；若无法立即升级，应在边界防火墙或反向代理上限制对 WebView WebMail 服务端口的访问，仅允许受信任内网 IP 连接，并配置 Web 服务器（如 IIS/Apache）对请求参数长度设置上限（mail_user 限制为合理字符数），同时在 WAF 中拦截超长 GET 请求，定期重启服务以释放被拒绝连接占用的资源。建议评估迁移至受支持的现代邮件网关产品以彻底消除风险。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Atrium Software Mercur WebView WebMail 缓冲区溢出漏洞"
updated = "2026-06-16T21:51:17.810"

