[basic]
description = "ROUTERmate 路由器设备使用了默认的 SNMP 团体名（community name），未进行修改。SNMP 协议依靠团体名进行简单的身份认证，由于该默认团体名公开且未变更，未经身份认证的远程攻击者只要能够网络访问目标设备的 SNMP 服务（通常为 UDP 161 端口），即可利用该默认团体名与该设备建立会话，进而读取设备信息或发送写请求修改其配置（如更改路由、DNS 或管理设置）。该漏洞影响所有使用出厂默认配置的 ROUTERmate 设备，攻击无需本地权限或用户交互，危害程度中等，建议管理员立即修改默认 SNMP 团体名并限制访问来源。"
published = "1998-09-01T04:00:00.000"
remediation = "立即修改 ROUTERmate 默认 SNMP 社区字符串为强密码，并在防火墙/ACL 限制仅允许可信管理 IP 访问 SNMP 端口（UDP 161/162）；若不再使用 SNMP 管理功能，建议在设备配置中完全禁用 SNMP 服务。由于该产品已停止维护，无可用升级版本，建议尽快替换为受厂商支持的网络设备。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "路由 ROUTERmate 默认 SNMP 社区名称漏洞"
updated = "2026-06-16T21:49:04.053"

