[basic]
description = "甄云SRM云平台存在SpEL表达式注入漏洞，攻击者可在未经身份认证的情况下，通过向/oauth/public/路径中注入恶意的SpEL表达式，利用GroovyClassLoader动态加载并执行任意恶意代码，进而远程控制目标服务器。该漏洞影响范围广泛，危害严重。"
published = "2024-03-01"
remediation = "厂商暂未发布官方补丁，建议部署WAF拦截SpEL表达式特征，限制/oauth/public/路径的访问权限，避免将SRM云平台直接暴露在公网。同时可配置安全过滤器对用户输入中的SpEL表达式进行过滤。"
score = 9.8
