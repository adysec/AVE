[basic]
description = "Webalizer 2.01-06 版本（及可能的其他版本）存在跨站脚本（XSS）漏洞，远程攻击者可通过两种方式注入任意 HTML 标签：一是通过 HTTP Referer 头中嵌入的搜索关键词，二是通过反向 DNS 查询返回的主机名。该漏洞源于 Webalizer 在生成统计报告时未对 Referer 头中的关键词和反向 DNS 解析的主机名进行充分的输入验证与输出编码，导致恶意脚本可在查看统计报告的用户浏览器中执行。攻击者无需身份认证即可远程发起攻击，仅需诱导受害者访问包含恶意 Referer 的页面或控制反向 DNS 记录。漏洞影响 Webalizer 2.01-06 版本，CVSS 评分 7.5（高危），攻击向量为网络、攻击复杂度低、无需认证、可导致机密性、完整性、可用性部分受损。攻击者可利用该漏洞窃取用户会话、篡改页面内容或发起进一步攻击。建议升级至修复版本或禁用 Referer 统计功能、对反向 DNS 结果进行严格过滤转义。"
published = "2001-12-06T05:00:00.000"
remediation = "立即升级到 Webalizer 2.9.1 或更高版本，这解决了 CVE-2001-0835 中提到的 XSS 漏洞。通过移除原生执行功能的全新版本，攻击者无法再通过搜索关键字或反向 DNS 查询注入恶意 HTML 代码。如果无法立即更新，建议禁用 Webalizer 服务或通过 WAF 规则过滤包含反斜杠或尖括号的 HTTP 请求和主机名，作为临时缓解措施。"
score = 7.5
severity = "HIGH"
sources = ["redhat"]
title = "Bradford Barrett Webalizer 跨站脚本攻击漏洞"
updated = "2026-06-16T21:55:03.593"

