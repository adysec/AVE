[basic]
description = "IRIX 系统中 /usr/bin/lpstat 组件存在本地缓冲区溢出漏洞，通过向 -n 选项提供超长参数可触发栈溢出，导致攻击者获取 root 权限。该漏洞影响 IRIX 5.3 至 6.5.11 等多个版本，需要本地用户权限。攻击者编译并执行本地提权程序即可利用，CVSS 评分 7.2，危害等级高。"
published = "2000-10-20T04:00:00.000"
remediation = "立即移除 `/bin/lpstat` 和 `/usr/bin/lpstat` 的 setuid 位（执行 `chmod u-s /bin/lpstat /usr/bin/lpstat`），阻止非授权用户以 root 权限执行该程序。SGI IRIX 已于 2006 年终止支持，SGI 公司已解散，官方不再提供安全补丁，建议将业务迁移至受支持的操作系统（如 Linux）以彻底消除安全隐患。"
score = 7.2
severity = "HIGH"
sources = ["exploitdb"]
title = "SGI IRIX lpstat 本地缓冲区溢出漏洞"
updated = "2026-06-16T21:52:29.807"

