[basic]
description = "Microsoft FrontPage 97 与 98 的 Server Extensions 中的 htimage.exe 与 Imagemap.exe 组件存在缓冲区溢出漏洞。服务端图像映射组件在处理用户提交的特制图像映射请求时，未对输入长度进行正确的边界校验，导致缓冲区可被溢出。远程攻击者无需身份认证，只需向托管受影响 FrontPage 扩展的 Web 服务器发送精心构造的 HTTP 请求即可触发该漏洞，从而执行本应通过网站正常功能无法进行的操作（如越权访问或执行任意代码）。该漏洞影响部署了 FrontPage 97/98 Server Extensions 的 IIS 等 Web 服务器。"
published = "2000-04-19"
remediation = "升级到修复该问题的 Microsoft FrontPage 2000 Server Extensions（应用 Microsoft 安全公告 MS00-028 提供的补丁），如无法升级请立即卸载或禁用 FrontPage 97/98 Server Extensions 的 htimage.exe 与 Imagemap.exe 组件，并改用受支持的 Web 服务器扩展技术。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "Microsoft FrontPage 97/98 Server Extensions 图像映射缓冲区溢出漏洞"
updated = "2026-07-19"

