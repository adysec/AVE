[basic]
description = "Microsoft Outlook 97/98/2000 在处理电子邮件 X-UIDL 头字段时存在拒绝服务漏洞。远程攻击者通过向目标用户发送多条包含相同 X-UIDL 标头的恶意邮件，可导致 Outlook 客户端在处理邮件时发生挂起甚至崩溃。攻击无需用户交互，仅需打开收件箱即可触发。该漏洞影响 Outlook 97/98/2000 版本，危害等级中危。"
published = "1999-06-25T04:00:00.000"
remediation = "该漏洞影响已停止支持的 Outlook 97/98/2000，微软未发布官方补丁。建议升级到 Outlook 2003 或更高版本（如 Office 365），新版本已修复此问题。如无法升级，可在邮件服务器或客户端侧配置规则过滤含重复 X-UIDL 头的邮件作为临时缓解。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Microsoft Outlook 97/98/2000 X-UIDL Header 远程拒绝服务漏洞"
updated = "2026-06-16T21:49:51.417"

