[basic]
description = "Serena MCP 工具包内置的 Web 仪表板在固定端口（TCP 24282）上运行未经验证的 Flask API，缺乏认证、CSRF 保护和 Host 头校验。攻击者可通过 DNS 重绑定攻击，诱使用户在运行 Serena 时访问恶意网页，使浏览器将同源请求重定向至本地仪表板，进而向代理的持久化内存存储写入任意内容。结合默认启用的 `execute_shell_command`（`shell=True`）功能，代理在读取被污染的内存后会自动执行恶意命令，形成完整的远程代码执行链。该漏洞影响 v1.5.2 之前的所有版本，CVSS 评分 8.3，危害等级高。官方已在 v1.5.2 版本中修复。"
published = "2026-07-07T21:17:25.833"
remediation = "立即升级 Serena 至 v1.5.2 或更高版本，该版本在仪表板中增加了身份验证、CSRF 保护和 Host 头校验。如无法立即升级，可在 `config.yml` 中将 `web_dashboard` 设为 `false` 以禁用内置 Web 仪表板，或在防火墙中阻止对 TCP 端口 24282 的外部访问，并确保浏览器不访问运行 Serena 的本地地址。同时建议审查并移除所有默认 context 配置中 `shell=True` 的调用，改用 `shell=False` 并传递参数列表形式执行命令。"
score = 8.3
severity = "HIGH"
sources = ["ghsa"]
title = "Serena Web Dashboard DNS 重绑定远程代码执行漏洞"
updated = "2026-07-20T14:54:40.713"

