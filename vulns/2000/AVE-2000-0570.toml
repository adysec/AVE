[basic]
description = "NAI Net Tools PKI Server 1.0 的 strong.exe 组件存在缓冲区溢出漏洞，远程攻击者可通过向 HTTPS 端口发送特制的超长 URL 请求触发该漏洞，导致任意命令执行。该漏洞影响 NAI Net Tools PKI Server 1.0 HotFix 3 之前的所有版本，攻击者无需身份认证即可远程利用，CVSS 评分 5.0，危害等级中危。"
published = "2000-10-20T04:00:00.000"
remediation = "安装 NAI Net Tools PKI Server 1.0 HotFix 3 或更高版本，此补丁修复了 strong.exe 对 HTTPS 端口上超长 URL 请求的边界检查缺陷。若无法升级，建议在防火墙上限制对 PKI 服务器 HTTPS 端口的访问来源 IP，并禁用不必要的 HTTPS 远程管理功能。由于该产品已停止维护，建议迁移至受支持的 PKI 解决方案。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "NAI Net Tools PKI Server 远程缓冲区溢出漏洞"
updated = "2026-06-16T21:52:23.050"

