[basic]
description = "W3C CERN httpd（原 CERN httpd）HTTP 服务器存在路径泄露漏洞，远程攻击者可通过向服务器发送特制的不存在的 URL 请求，从错误响应中获取服务器上命令的真实路径信息。该漏洞可导致敏感目录结构暴露，为后续攻击提供信息支撑，影响运行 W3C httpd 服务的系统，CVSS 评分 7.5，危害等级高。"
published = "2000-01-18T05:00:00.000"
remediation = "立即停止使用已停止维护的 CERN httpd(W3C httpd)，迁移至 Apache HTTP Server 2.4.x 或 Nginx 等现代活跃维护的 Web 服务器。迁移后需正确配置错误页面响应，禁用 ServerTokens 及 ServerSignature 等服务器信息泄露选项，避免将内部路径暴露给客户端。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "W3C CERN httpd 路径泄露漏洞"
updated = "2026-06-16T21:50:57.407"

