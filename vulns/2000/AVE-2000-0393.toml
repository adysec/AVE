[basic]
description = "Allegro RomPager 2.10 HTTP服务器在处理畸形认证请求时存在缺陷，远程未认证攻击者可通过发送特制的畸形HTTP认证请求触发拒绝服务漏洞，导致服务崩溃或无响应。该漏洞影响Allegro RomPager 2.10版本，CVSS评分7.5（AV:N/AC:L/Au:N/C:P/I:P/A:P），属于高危漏洞。攻击者无需认证即可远程发送畸形认证请求触发漏洞，导致服务拒绝服务，ExploitDB编号10237已公开PoC利用代码。"
published = "2000-06-01T04:00:00.000"
remediation = "建议升级到 rompager v3.x 或更高版本，应用安全补丁，开启 URL 输入验证并配置防火墙规则限制对 vulnerable 端口的访问流量；如无法立即升级，可将页面根目录限制到安全目录并禁用不必要的服务以降低攻击面。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "Allegro RomPager URL 拒绝服务漏洞"
updated = "2026-06-16T21:51:48.193"

