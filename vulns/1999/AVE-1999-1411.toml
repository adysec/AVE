[basic]
description = "Majordomo 1.94.3 及更早版本在配置文件启用 advertise 或 noadvertise 指令时，远程攻击者可通过向邮件列表发送带有 shell 元字符的 Reply-To 头部的恶意邮件触发命令注入漏洞，在目标服务器上以邮件守护进程权限执行任意命令。该漏洞影响部署 Majordomo 的邮件列表服务器，无需身份认证即可远程利用，CVSS 评分 7.5，危害等级高。"
published = "1997-08-24T04:00:00.000"
remediation = "升级 Majordomo 至 1.94.5 或更高版本，该版本修复了 Reply-To 头中 shell 元字符的过滤逻辑。如无法升级，立即移除所有配置文件中 advertise 和 noadvertise 指令的使用，并在 MTA（如 Sendmail/Postfix）层面过滤入站邮件 Reply-To 头中的特殊字符（; | & ` $）。建议迁移至 Mailman 3 等现代邮件列表管理系统以彻底规避此类注入风险。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "Majordomo 远程代码执行漏洞"
updated = "2026-06-16T21:49:58.500"

