[basic]
description = "SCO Unixware 7.0/7.0.1/7.1/7.1.1 系统中的 xauto 程序存在缓冲区溢出漏洞。本地攻击者可通过向 xauto 程序发送特制的输入数据触发缓冲区溢出，覆盖内存中的关键数据或执行代码，从而获取 root 权限。该漏洞影响 SCO Unixware 多个版本，攻击者需拥有本地系统访问权限，无需身份认证即可利用，危害等级高。"
published = "1999-12-03"
remediation = "建议立即安装 SCO 官方安全公告 SB-99.24a 中针对 UnixWare 7.x 发布的 xauto 补丁包。如无法打补丁，可执行 chmod u-s /usr/bin/X11/xauto 移除 xauto 的 setuid 位作为临时缓解措施。该产品已停止维护，建议迁移至受支持的操作系统。"
score = 7.2
severity = "HIGH"
sources = ["cve"]
title = "SCO Unixware xauto 本地缓冲区溢出漏洞"
updated = "2026-06-16"

