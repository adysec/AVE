[basic]
description = "L-Soft LISTSERV 1.8 的 Web Archives 组件存在缓冲区溢出漏洞，远程攻击者无需身份认证即可向目标系统发送特制的 HTTP 请求触发溢出，导致任意命令执行。该漏洞影响 L-Soft LISTSERV 1.8 版本，CVSS 评分 10.0，危害等级严重。建议用户升级至最新版本或安装厂商提供的安全补丁。"
published = "2000-05-03T04:00:00.000"
remediation = "升级 L-Soft LISTSERV 至 1.8d 或更高版本，该版本已修复 Web Archives 组件缓冲区溢出漏洞。如无法立即升级，建议禁用 Web Archives 功能或在 Web 服务器层面限制对 archives 目录的访问。若不再需要该服务，建议迁移至受支持的 Listserv 版本。"
score = 10
severity = "CRITICAL"
sources = ["cve"]
title = "L-Soft LISTSERV 1.8 Web Archives 缓冲区溢出漏洞"
updated = "2026-06-16T21:51:42.320"

