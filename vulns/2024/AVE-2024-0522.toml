[basic]
description = "GNU GRUB2 的 HFS 文件系统驱动在处理挂载操作时，未对用户提供的卷标名称长度进行有效校验，直接调用 `strcpy()` 将卷标复制到固定大小的堆缓冲区中，导致堆越界写入漏洞。本地攻击者可通过挂载特制的 HFS 文件系统卷触发该漏洞，破坏 GRUB 的敏感数据完整性，最终绕过安全启动（Secure Boot）保护机制。该漏洞影响所有使用受影响版本 GRUB2 的系统，CVSS 评分 7.8，危害等级高。"
published = "2025-03-03T17:15:12.900"
remediation = "升级 GRUB2 至 2.12 以上版本（含已合入补丁的构建），或应用上游补丁 `417547c10410b714e43f08f74137c24015f8f4c3`，将 `grub-core/fs/hfs.c:382` 处的 `grub_strcpy()` 替换为 `grub_strlcpy()` 以限制拷贝长度。各发行版用户安装对应安全更新：RHEL 用户关注 RHSA 公告，Debian/Ubuntu 用户通过 `apt update && apt upgrade grub-pc grub-efi` 更新，更新后执行 `grub-install` 重新安装引导器。如无法立即更新，限制本地攻击者访问系统引导分区并启用 UEFI Secure Boot 配合 SBAT 策略阻止未签名 GRUB 加载。"
score = 7.8
severity = "HIGH"
sources = ["msrc"]
title = "GNU GRUB2 HFS 文件系统堆越界写入漏洞"
updated = "2026-06-29T23:16:41.673"

