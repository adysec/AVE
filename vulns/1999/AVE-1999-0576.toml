[basic]
description = "Samba smbmnt 函数在处理文件系统挂载操作时存在条件竞争漏洞。由于 smbmnt 在执行挂载过程中未对文件路径进行充分的原子性检查和锁定保护，本地攻击者可在特定时间窗口内通过符号链接攻击或并发操作，利用该竞争条件将文件系统挂载到任意系统路径，从而绕过正常的权限限制。成功利用此漏洞可导致攻击者访问受保护的系统目录、覆盖敏感文件或实现本地权限提升，严重威胁系统安全。该漏洞影响 Samba 2.0.5 及之前版本，CVSS 评分 7.6，危害较高。"
published = "2000-07-12"
remediation = "升级 Samba 至 2.0.5a 或更高版本，该版本修复了 smbmnt 中的条件竞争问题。如无法升级，应限制本地用户对 smbmnt 的访问权限，或禁用不必要的文件系统挂载功能。"
score = 7.6
severity = "HIGH"
sources = [
    "cve",
    "nvd",
]
title = "Samba smbmnt 本地文件系统挂载条件竞争漏洞"
updated = "2026-06-16"

