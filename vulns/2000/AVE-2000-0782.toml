[basic]
description = "Microsoft SQL Server 7.0/2000 及 Microsoft Data Engine (MSDE) 1.0/2000 中的扩展存储过程 xp_showcolv 函数存在缓冲区溢出漏洞。攻击者可通过向受影响数据库系统发送特制参数，触发 srv_paraminfo API 调用中的缓冲区边界检查缺陷，导致缓冲区溢出，进而造成服务拒绝或执行任意命令。该漏洞允许拥有数据库登录权限的攻击者远程利用，危害严重。"
published = "2001-01-09"
remediation = "该漏洞对应 Microsoft 安全公告 MS00-092。SQL Server 7.0 需先安装 Service Pack 2 后再安装 MS00-092 补丁（已包含于 SP3）；SQL Server 2000 直接安装 MS00-092 补丁（已包含于 SP1）。MSDE 1.0/2000 需安装对应补丁。作为缓解措施，可撤销 xp_showcolv 等受影响扩展存储过程的 EXECUTE 权限。由于以上产品均已终止支持，建议升级至受支持的 SQL Server 版本（如 SQL Server 2019/2022）。"
score = 2.1
severity = "LOW"
sources = [
    "cve",
    "exploitdb",
]
title = "Microsoft SQL Server 7.0/2000 xp_showcolv 缓冲区溢出漏洞"
updated = "2026-06-16"

