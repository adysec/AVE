[basic]
description = "新华三（H3C）智能管理中心（iMC）是一款综合网络管理产品。其autoDeploy.xhtml接口存在未授权远程代码执行漏洞，攻击者可通过向/imc/dc3dtopo/dc2dtopo/autoDeploy.xhtml发送特制POST请求，利用JSF ViewState表达式注入执行任意系统命令，无需认证即可完全控制目标服务器。该漏洞影响iMC全系列版本。"
published = "2024-10-11"
remediation = "官方尚未发布正式补丁，建议用户升级H3C iMC至最新版本。临时缓解措施包括：限制/imc路径的访问权限，配置Web应用防火墙拦截对autoDeploy.xhtml的异常POST请求，或在不影响业务的情况下删除autoDeploy.xhtml文件。"
score = 7.5
severity = "HIGH"
sources = ["hwpoc"]
title = "新华三 H3C iMC 智能管理中心 autoDeploy.xhtml 远程代码执行漏洞"
updated = "2026-07-18"

