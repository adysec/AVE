[basic]
description = "朗新天霁智能eHR人力资源管理系统中的GetE01ByDeptCode接口存在SQL注入漏洞。攻击者可通过POST请求向/api/Com/GetE01ByDeptCode接口发送特制的deptCode参数，利用拼接的SQL语句绕过认证或窃取数据库敏感信息，包括用户凭证、员工数据等。该漏洞无需身份验证即可远程利用，危害较大。"
published = "2024-06-15"
remediation = "对deptCode参数进行严格的输入验证和过滤，使用参数化查询或预编译语句替代SQL字符串拼接，限制API接口的访问权限，及时更新系统至厂商发布的安全版本。"
score = 7.5
severity = "HIGH"
sources = ["hwpoc"]
title = "朗新天霁智能eHR人力资源管理系统 GetE01ByDeptCode SQL注入漏洞"
