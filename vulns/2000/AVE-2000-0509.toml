[basic]
description = "Pragma Systems InterAccess TelnetD Server 4.0 Build 4 存在缓冲区溢出漏洞，远程攻击者可通过向 TelnetD 服务发送超长的登录用户名触发该漏洞，导致缓冲区溢出，进而能够在目标系统上执行任意命令。该漏洞无需身份认证即可利用，CVSS 评分高达 10.0，危害等级严重。"
published = "2000-02-21T05:00:00.000"
remediation = "建议立即升级至 Pragma InterAccess TelnetD 4.1 及以上版本，该版本已修复缓冲区溢出漏洞。如厂商已停止维护，应彻底停用 InterAccess TelnetD 服务，改用 OpenSSH 等安全远程访问方案，并在防火墙禁用 Telnet 端口（23/TCP）。"
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "Pragma Systems InterAccess TelnetD Server 缓冲区溢出远程代码执行漏洞"
updated = "2026-06-16T21:51:08.287"

