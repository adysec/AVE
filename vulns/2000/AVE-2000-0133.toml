[basic]
description = "Zeus Web Server 3.x 版本存在空字符截断漏洞，远程攻击者通过在 URL 末尾添加空字符（%00）可绕过服务器对 CGI 文件的解析逻辑，导致任意 CGI 程序源码被直接泄露。攻击者无需身份认证即可利用该漏洞获取数据库连接信息、业务逻辑等敏感数据，CVSS 评分 5.0，危害等级中危。"
published = "2000-02-08T05:00:00.000"
remediation = '升级 Zeus Web Server 至 4.0 或更高版本，该版本已修复空字符截断问题。如无法升级，在 Web 服务器前端部署反向代理（如 Nginx），添加规则拦截包含 `%00` 的 URL 请求：`if ($request_uri ~* "%00") { return 403; }`。同时确保 Web 应用目录权限配置为禁止直接访问 CGI 脚本源码。'
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Zeus Web Server 3.x 空字节截断远程源代码泄露漏洞"
updated = "2026-06-16T21:51:06.133"

