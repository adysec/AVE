[basic]
description = """O'Reilly WebSite Professional Web 服务器 2.x 版本的 Webfind CGI 程序（webfind.exe）存在缓冲区溢出漏洞。远程攻击者可通过向目标服务器发送包含超长 "keywords" 参数的特制 URL 请求触发缓冲区溢出，从而在服务器端执行任意命令。该漏洞影响 WebSite Professional 2.3.18、2.4 及 2.4.9 等版本，无需身份认证即可远程利用，CVSS 评分 10.0，危害等级严重。"""
published = "2000-07-19T04:00:00.000"
remediation = "立即升级至 O'Reilly WebSite Professional 2.5 或更高版本（该发布说明已修复该漏洞），或直接禁用/移除 webfind.exe CGI 程序。由于该产品已终止维护超过二十年，强烈建议迁移至 Apache 或 Nginx 等仍在安全更新的现代 Web 服务器。临时缓解措施可在网络边界防火墙限制对 TCP 80/443 端口的非必要来源访问。"
score = 10
severity = "CRITICAL"
sources = ["cve"]
title = "O'Reilly WebSite Professional Webfind CGI 远程缓冲区溢出漏洞"
updated = "2026-06-16T21:52:07.803"

