[basic]
description = "Microsoft Windows 95/98/NT 3.51/NT 4.0/2000 的 IGMP 协议实现存在输入验证缺陷（CWE-20），远程攻击者可向目标系统发送特制的分片 IGMP 数据包，触发协议栈解析异常，导致目标系统蓝屏崩溃或服务完全停止。该漏洞无需用户交互即可远程触发，影响所有受支持的 Windows 9x/NT 系列版本，攻击者只需发送少量畸形数据包即可造成拒绝服务。"
published = "1999-07-03T04:00:00.000"
remediation = "Windows 95/98 用户请通过 Microsoft Windows Update 安装安全更新或下载 MS99-034 补丁（KB Q238329）；Windows NT 4.0 用户请安装 Service Pack 6a 及后续安全汇总。上述系统均已终止支持，建议升级至 Windows 10/11 或 Windows Server 2016 以上版本。临时缓解措施：在边界防火墙上禁用 IGMP 协议或过滤碎片化 IGMP 报文。"
score = 7.8
severity = "HIGH"
sources = ["cve"]
title = "Microsoft Windows IGMP 报文处理拒绝服务漏洞"
updated = "2026-06-16T21:49:19.657"

