[basic]
description = "Linux 内核 bgmac 以太网驱动中函数 bcma_mdio_mii_register 调用 of_get_child_by_name() 获取设备节点后未调用 of_node_put() 释放引用计数，导致引用计数泄漏。该函数每次被调用时都会递增设备节点的引用计数，缺少对应的释放操作使得引用计数持续增长。本地攻击者可通过反复加载卸载 bgmac 驱动模块耗尽系统内存资源，从而触发拒绝服务（DoS）条件。该漏洞影响 Linux 内核 4.8 至 5.17.15 之前及 5.18 至 5.18.4 之前的版本，CVSS 评分 5.5，危害等级中等。"
published = "2025-02-26"
remediation = "升级 Linux 内核至 5.17.15、5.18.4 或 5.19 及以上版本，修复补丁已合入主线。涉及修复提交：b51996e35bbf、7fb1fe7d9a16、b8d91399775c。如无法立即升级，可卸载 bgmac 内核模块（rmmod bgmac）并禁用相关 Broadcom 以太网接口以缓解风险。生产环境建议订阅 LTS 内核稳定更新。"
score = 5.5
severity = "MEDIUM"
sources = ["cve"]
title = "Linux 内核 bgmac 以太网驱动引用计数泄漏漏洞"
updated = "2026-06-17"

