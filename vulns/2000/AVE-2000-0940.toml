[basic]
description = "Zope 2.2.0至2.2.4版本中对Image和File对象的数据更新方法保护不充分，拥有DTML编辑权限的攻击者可利用该缺陷修改这些对象的原始数据，导致数据完整性受损。该漏洞影响Zope 2.2.x系列版本，攻击者需具备DTML编辑权限方可利用，CVSS评分5.0，危害等级中等。建议升级至2.2.5及以上版本修复此漏洞。"
published = "2000-12-18T05:00:00.000"
remediation = "升级 Zope 至 2.2.5 或更高版本（官方 Hotfix_2000-12-18 已集成于该版本）。Debian 用户执行 `apt-get upgrade zope` 安装 DSA-007 安全更新；Red Hat 用户安装 RHSA-2000:135 提供的更新包。如无法立即升级，应严格限制 DTML 编辑权限仅授予可信用户，并移除 Image 和 File 对象的非必要数据更新方法访问权限。"
score = 5
severity = "MEDIUM"
sources = ["redhat"]
title = "Zope Zope 2.2 DTML编辑权限提升漏洞"
updated = "2026-06-16T21:53:23.580"

