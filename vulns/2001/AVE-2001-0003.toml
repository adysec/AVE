[basic]
description = 'Windows NT 4.0 系统的 Winsock2ProtocolCatalogMutex 互斥体存在不安全的默认权限配置漏洞（CWE-732），该互斥体被设置为 Everyone 组拥有完全控制权限，导致本地攻击者可将互斥体访问权限修改为"No Access"，从而禁用 Winsock 网络协议栈，使系统无法建立任何网络连接，造成拒绝服务。该漏洞影响 Windows NT 4.0 全版本，攻击者需具备本地登录权限即可利用，无需交互。Microsoft 已于安全公告 MS01-003 中发布修复补丁。'
published = "2001-02-12"
remediation = "安装 Windows NT 4.0 Service Pack 6a（SP6a）及之后发布的安全更新汇总包，该补丁修复了 Networking Mutex 中的竞争条件导致系统蓝屏崩溃的问题。对于已停止支持的旧系统，建议升级至更高版本 Windows（如 Windows Server 2003/2008）以获取持续安全支持。如无法升级，限制不可信用户对受影响主机的网络访问作为临时缓解。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Microsoft Windows NT 4.0 网络互斥体拒绝服务漏洞"
updated = "2001-02-12"

