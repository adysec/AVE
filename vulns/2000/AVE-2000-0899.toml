[basic]
description = "Linux 内核日志守护进程（klogd）存在格式化字符串漏洞，由于未能正确过滤用户注入的格式化字符串，本地攻击者可通过触发格式错误的内核消息，利用该漏洞以 root 权限执行任意代码。该漏洞影响多个 Linux 发行版本，攻击者需拥有本地系统访问权限，无需身份认证即可利用，CVSS 评分 7.2，危害等级高。"
published = "2000-11-14T05:00:00.000"
remediation = "立即升级 sysklogd 软件包至修复版本：Red Hat Linux 用户安装 RHSA-2000:061 提供的更新包；Mandrake 用户安装 MDKSA-2000:050 更新；Caldera OpenLinux 用户应用 CSSA-2000-032.0 补丁。如无法升级，可在 /etc/syslog.conf 中限制内核日志记录级别，并限制本地用户登录权限作为临时缓解。"
score = 7.2
severity = "HIGH"
sources = ["redhat"]
title = "Linux Kernel klogd 格式化字符串本地权限提升漏洞"
updated = "2026-06-16T21:52:38.097"

