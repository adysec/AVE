[basic]
description = "CVE-2000-0744 是 CVE-2000-0743 的重复编号。后者描述的是明尼苏达大学（UMN）Gopher 服务程序 gopherd 2.x 版本中存在缓冲区溢出漏洞。远程攻击者可通过向 GDESkey（DES 密钥生成请求）接口发送包含超长 ticket 值的特制请求报文，触发栈溢出，从而在目标服务器上以 gopherd 进程权限执行任意代码。攻击无需任何身份认证，CVSS v2 评分 10.0，危害等级高危。受影响的版本包括 UMN gopherd 2.x 系列。"
published = "2000-10-20T04:00:00.000"
remediation = "建议立即升级 UMN gopherd 至已修复版本（2.x 之后的安全更新），或直接禁用 gopherd 服务。如业务必须使用，在防火墙层面限制对 gopher 端口（70/TCP）的访问，仅允许可信来源 IP 连接，并监控异常请求（如超长 DES key 请求）。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "University of Minnesota Gopherd 缓冲区溢出远程代码执行漏洞"
updated = "2023-11-07T01:55:23.877"

