[basic]
description = "OpenLDAP 1.2.11 及更早版本在安装 ud 二进制文件时错误地设置了群组可写权限，导致该群组中的任意用户可将 ud 文件替换为特洛伊木马程序。攻击者只需拥有目标系统上的本地群组账号即可利用此漏洞，通过替换 ud 二进制实现权限提升或执行任意代码。该漏洞影响范围广，利用条件低，CVSS 评分 4.6，危害等级中危。"
published = "2000-10-20T04:00:00.000"
remediation = "立即修复 `ud` 二进制文件的权限：执行 `chmod 755 /path/to/ud` 移除组写权限。升级 OpenLDAP 至 1.2.12 或更高版本。如无法升级，使用 `chmod g-w /path/to/ud` 移除组写权限，并检查 `/etc/group` 中哪些用户属于该组，移除不必要的组成员。"
score = 4.6
severity = "MEDIUM"
sources = ["cve"]
title = "OpenLDAP ud 权限配置不当漏洞"
updated = "2026-06-16T21:52:23.930"

