[basic]
description = "glFTPD 1.18 版本中的 privpath 指令存在安全绕过漏洞。远程攻击者可利用 FTP 服务的文件名自动补全功能，绕过目录访问限制，访问本应被禁用的目录及文件。该漏洞影响 glftpd 1.18 版本，CVSS 评分达 10.0，危害等级严重。攻击无需认证，仅需通过 FTP 客户端连接到目标服务器即可触发。"
published = "2000-06-26T04:00:00.000"
remediation = "升级 glftpd 至 1.19 或更高版本（该版本已修复 privpath 绕过漏洞）。如无法立即升级，可在 glftpd.conf 中禁用文件名自动补全功能，并在防火墙层面限制对 FTP 服务端口（21/TCP）的访问来源，仅允许可信 IP 连接。"
score = 10
severity = "CRITICAL"
sources = ["cve"]
title = "glFTPd privpath 目录访问限制绕过漏洞"
updated = "2026-06-16T21:52:03.443"

