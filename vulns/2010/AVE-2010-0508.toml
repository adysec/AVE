[basic]
description = "Exim 4.72 及更早版本中存在权限提升漏洞，本地攻击者可利用 exim 用户账户指定包含任意命令的替代配置文件（如 spool_directory 指令），从而以 root 权限执行任意命令。该漏洞源于 Exim 对配置文件处理不当，未充分校验配置指令中的命令参数。攻击者需拥有 exim 用户账户权限即可触发，影响所有 Exim 4.72 及之前版本，CVSS 评分 7.8，危害等级高。"
published = "2010-12-14T16:00:04.257"
remediation = "升级 Exim 至 4.73 或更高版本，该版本通过限制配置文件指令中的命令执行修复了此漏洞。如无法立即升级，应移除 exim 用户的 shell 登录权限（usermod -s /sbin/nologin exim），并确保 exim 用户不属于 sudo 或 wheel 等特权组，防止本地提权。"
score = 7.8
severity = "HIGH"
sources = ["kev"]
title = "Exim 邮件传输代理权限提升漏洞"
updated = "2026-06-16T23:24:36.353"

