[basic]
description = "MSN Setup BBS 4.71.0.10 ActiveX 控件（setupbbs.ocx）的 vAddNewsServer 和 bIsNewsServerConfigured 方法存在缓冲区溢出漏洞，远程攻击者可通过构造恶意网页诱导用户访问，向该方法传入超长参数触发溢出，从而在受影响系统上执行任意命令。该漏洞影响 Microsoft MSN Messenger Service 1.0 及其附带的 ActiveX 组件，CVSS 评分 7.5，危害等级高。由于该组件已停止维护，建议用户卸载或禁用相关 ActiveX 控件。"
published = "1999-09-24T04:00:00.000"
remediation = "该漏洞源于 MSN Setup BBS ActiveX 控件 (setupbbs.ocx) 的缓冲区溢出，建议立即卸载 MSN Messenger Service 1.0（该产品已停止支持），或在注册表中为 CLSID {B1B6A000-2A0C-11D2-8E2A-00C04F79E3AE} 设置 Kill Bit（将 Compatibility Flags 设为 0x400），禁用该 ActiveX 控件在 Internet Explorer 中的加载。同时建议升级到受支持的即时通讯产品。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "Microsoft MSN Messenger Service Setup BBS ActiveX 缓冲区溢出漏洞"
updated = "2026-06-16T21:50:32.423"

