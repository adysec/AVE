[basic]
description = "iParty Conferencing Server 1.2 及更早版本中存在缓冲区溢出漏洞。远程攻击者可通过连接默认端口 6004 并发送重复的扩展字符触发该漏洞，导致服务器进程崩溃，造成拒绝服务。该漏洞影响 iParty Conferencing Server 1.2 及之前版本，攻击者无需认证即可远程利用，危害等级中等。截至目前厂商未发布官方补丁。"
published = "1999-05-08T04:00:00.000"
remediation = "iParty Conferencing Server 已停止维护且厂商不再发布安全更新，建议立即停用该软件并迁移至其他受支持的会议服务解决方案。若暂时无法迁移，可在网络防火墙及主机防火墙层面封禁 TCP/UDP 6004 端口，并限制仅受信任 IP 地址可访问该服务。另可考虑在应用层部署入侵检测规则以拦截含超长字符的攻击流量。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "iParty Conferencing Server 缓冲区溢出拒绝服务漏洞"
updated = "2026-06-16T21:50:43.843"

