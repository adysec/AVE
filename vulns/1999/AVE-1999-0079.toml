[basic]
description = "Linux 内核 2.0.36 之前版本中 /dev/kmem 设备文件的默认权限设置不当，导致本地普通用户可读取内核内存空间。攻击者利用该漏洞可获取内核中的 TCP 序列号等敏感信息，进而实施盲 TCP 欺骗攻击，伪造 TCP 连接或破坏现有连接，影响系统通信安全。该漏洞无需特殊攻击条件，拥有本地账户即可利用，危害等级严重。"
published = "1999-03-01T05:00:00.000"
remediation = "升级 Linux 内核至 2.0.36 及以上版本，该版本修复了 /dev/kmem 默认权限问题。如无法升级内核，可将 /dev/kmem 权限修改为 640 或更严格，仅允许 root 用户读取，以降低 IP 欺骗攻击风险。"
score = 9.8
severity = "CRITICAL"
sources = ["exploitdb"]
title = "Linux Kernel /dev/kmem 默认权限不当导致 IP 欺骗漏洞"
updated = "2026-06-16T21:48:22.267"

