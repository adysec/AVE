[basic]
description = "gpm 软件包中的 gpm-root 组件未能正确释放特权，存在本地权限提升漏洞。本地攻击者可通过 gpm-root 启动系统工具，利用该漏洞获取目标系统的 root 权限。该漏洞影响 gpm 1.18.1/1.19 版本及 Debian 2.x、RedHat 6.x、S.u.S.E 5.3/6.x 等 Linux 发行版，CVSS 评分 7.2，危害等级高。"
published = "2000-03-22T05:00:00.000"
remediation = "立即升级 gpm 至 1.20 或更高版本，该版本已修复 gpm-root 未正确释放特权的问题。如无法升级，可执行 `chmod ug-s /usr/bin/gpm-root` 移除 setgid 位作为临时缓解措施，或直接卸载 gpm 软件包（非必需时）。"
score = 7.2
severity = "HIGH"
sources = ["redhat"]
title = "gpm gpm-root 本地权限提升漏洞"
updated = "2026-06-16T21:51:16.460"

