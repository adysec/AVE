[basic]
description = 'Sun Solaris x86 2.4、2.5 及 2.5.1 版本的 nlps_server 组件存在缓冲区溢出漏洞。远程攻击者无需身份认证，可通过向监听端口（TCP 2766）发送特制的以 "NLPS:002:002:" 开头超长字符串触发该漏洞，导致以 root 权限执行任意代码。该漏洞影响 Solaris x86 系列操作系统，CVSS 评分 9.8，危害等级严重。'
published = "1999-12-31T05:00:00.000"
remediation = "立即升级至受支持的 Oracle Solaris 11 或更高版本，该漏洞在后续版本中已修复；如无法升级，禁用 nlps_server 服务（执行 `/etc/init.d/nlps_server stop` 并移除以 S 开头的启动链接），同时在防火墙层面封锁 TCP 端口 2766 阻止外部访问监听端口。"
score = 9.8
severity = "CRITICAL"
sources = ["avd"]
title = "Sun Solaris x86 nlps_server 缓冲区溢出漏洞"
updated = "2026-06-16T21:50:46.927"

