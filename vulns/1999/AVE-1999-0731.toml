[basic]
title = "Mediahouse Statistics Server 管理员密码明文存储漏洞"
description = "Mediahouse Statistics Server 的 ss.cfg 配置文件中以明文存储管理员密码（admin password），未进行任何加密或哈希处理。远程攻击者可通过 Web 路径遍历或直接请求 ss.cfg 文件路径（如 /ss.cfg）读取该文件，获取管理员密码后可直接登录管理后台，完全控制统计服务器。该漏洞源于开发者在配置文件中硬编码凭据且未设置访问权限控制。"
severity = "HIGH"
score = 7.2
sources = ["cve"]
published = "1999-09-30"
updated = "2026-06-16"
remediation = "1) 立即将 ss.cfg 文件权限设置为仅管理员可读写（chmod 600），禁止 Web 用户访问；2) 在 Web 服务器（Apache/Nginx）配置中添加规则拒绝直接访问 ss.cfg 文件；3) 将密码迁移至数据库或使用 bcrypt/argon2 哈希存储；4) 升级至 Mediahouse Statistics Server 最新版本或迁移至其他支持安全凭据管理的统计软件；5) 在防火墙层面限制管理后台仅允许可信 IP 访问。"
score = 7.2
severity = "HIGH"
sources = ["cve"]
title = "Mediahouse Statistics Server 管理员密码明文存储漏洞"
