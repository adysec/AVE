[basic]
description = "Seapine TestTrack 服务器存在拒绝服务漏洞，攻击者可通过连接到端口 99 并在未发送数据的情况下立即断开连接，利用 TestTrackWeb.exe 或 ttcgi.exe 组件触发高 CPU 消耗，导致服务器拒绝服务。该漏洞影响 Seapine TestTrack 系统用户，可导致系统资源耗尽，服务不可用，影响生产环境中的软件测试和缺陷管理流程。"
published = "1999-03-08T05:00:00.000"
remediation = "建议升级 Seapine TestTrack 至厂商修复后的最新版本（请安装 2000 年之后发布的包含该缺陷修复的版本）。如无法立即升级，可在边界防火墙或 TCP 包装层限制仅允许受信任 IP 访问 TCP 99 端口，阻断未授权主机连接 TestTrackWeb.exe 与 ttcgi.exe 服务，作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Seapine TestTrack 远程拒绝服务漏洞"
updated = "2026-06-16T21:50:43.967"

