[basic]
description = "IrfanView32 3.07 及更早版本在处理 PhotoShop 图像文件头部时存在缓冲区溢出漏洞，攻击者可通过构造包含特定标识后跟超长字符串的恶意图像文件在文件解析过程中触发堆栈溢出，从而在用户打开文件时实现任意代码执行。该漏洞影响多个版本，CVSS 评分 7.5，攻击者仅需诱导受害者打开精心构造的恶意文件即可执行代码。攻击途径包括附件、下载或即时通讯文件传输。"
published = "1999-11-09T05:00:00.000"
remediation = "升级 IrfanView 至 3.08 或更高版本，该版本已修复图像文件头缓冲区溢出漏洞。如无法升级，请关闭对于 .psd/.psp 文件的自动预览功能，并谨慎处理来自未经身份验证的来源的文件。"
score = 7.5
severity = "HIGH"
sources = ["exploitdb"]
title = "IrfanView IrfanView32 3.0.7 图像文件缓冲区溢出漏洞"
updated = "2026-06-16T21:49:44.740"

