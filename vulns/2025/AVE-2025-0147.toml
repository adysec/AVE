[basic]
description = "蓝凌OA的 treexml.tmpl 接口存在远程命令执行漏洞，该接口未对用户输入进行有效过滤和鉴权，未经身份认证的远程攻击者可通过 POST 请求向 `/ekp/data/sys-common/dataxml.tmpl` 接口传递特制的 `s_bean=ruleFormulaValidate` 参数并注入恶意 Java 代码，成功利用可在目标服务器上执行任意系统命令，进而获取服务器控制权限。该漏洞影响蓝凌OA多个版本，危害严重，已有公开的批量检测工具和利用脚本。"
published = "0703"
remediation = "立即联系蓝凌官方获取最新安全补丁或升级至不受影响的版本。如无法升级，在 Nginx/WAF 层面配置规则拦截对 /ekp/data/sys-common/dataxml.tmpl 和 /data/sys-common/treexml.tmpl 路径的 POST 请求，同时限制 s_bean=ruleFormulaValidate 参数传入，并删除或重命名服务器上存在风险的 treexml.tmpl 文件作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "蓝凌 OA 远程命令执行漏洞"
updated = "0703"

