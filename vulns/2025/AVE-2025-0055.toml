[basic]
description = "Erlang/OTP SSH 实现中存在认证绕过漏洞（CWE-306），由于 SSH 协议消息处理存在缺陷，未经身份认证的远程攻击者可通过向目标 SSH 服务器发送特制的协议消息触发该漏洞，在无需有效凭据的情况下绕过认证并执行任意代码。该漏洞影响 OTP-27.3.3、OTP-26.2.5.11 及 OTP-25.3.2.20 之前的所有版本，CVSS 评分 10.0，危害等级严重。建议用户立即升级至修复版本或通过防火墙限制 SSH 访问。"
published = "2025-04-16T22:15:14.373"
remediation = "立即升级 Erlang/OTP 至安全版本：OTP-27.3.3、OTP-26.2.5.11 或 OTP-25.3.2.20。如无法立即打补丁，可在防火墙或网络层面禁用 SSH 服务对外暴露，仅允许受信 IP 访问 22 端口作为临时缓解措施。"
score = 10
severity = "CRITICAL"
sources = ["hwpoc"]
title = "Erlang/OTP SSH 预认证远程代码执行漏洞"
updated = "2026-06-17T09:11:59.137"

