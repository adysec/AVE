[basic]
description = "tarteaucitron.js 是一款合规的 Cookie 横幅管理工具，其 `tarteaucitron.cookie.purge()` 方法在调用时未校验触发元素是否为合法的 tarteaucitron 按钮，也未校验待删除的 Cookie 是否属于该工具管理的服务。攻击者若能在页面中注入 HTML，可通过构造带有 `purgeBtn` 类名和 `data-cookie` 属性的元素，诱骗用户点击后静默删除任意非 HttpOnly 的已知名称 Cookie。该漏洞影响 1.33.0 之前版本，CVSS 评分 4.3，危害等级中危。建议升级至 1.33.0 或更高版本修复。"
published = "2026-07-17T21:17:06.930"
remediation = "立即将 tarteaucitron.js 升级至 v1.33.0 或更高版本，该版本已对 purgeBtn 类元素的 data-cookie 属性进行合法性校验。如无法立即升级，可在服务端设置 Content-Security-Policy 限制 HTML 注入，并对所有敏感 Cookie 启用 HttpOnly 标志以防止被删除。"
score = 4.3
severity = "MEDIUM"
sources = ["ghsa"]
title = "AmauriC tarteaucitron.js Cookie 任意删除漏洞"
updated = "2026-07-20T19:17:24.153"

