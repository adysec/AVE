[basic]
description = "SCO UnixWare 7.1 操作系统的 pkginstall 管理工具（如 pkginfo、pkgcat、pkgparam 等）存在安全缺陷，本地用户可通过 dacread 权限读取系统任意文件。当攻击者向这些工具传递特制参数时，还可能触发缓冲区溢出漏洞，导致敏感信息泄露或权限提升。该漏洞影响 SCO UnixWare 7.1 版本，利用前提是攻击者需具备本地登录权限。建议系统管理员升级至厂商发布的安全更新版本以消除风险。"
published = "1999-12-02T05:00:00.000"
remediation = "建议将 SCO UnixWare 7.1 升级到 UnixWare 7.1.3 或更高版本，SCO 为此发布了相应的安全补丁以修复 pkginfo、pkgcat 和 pkgparam 命令中的缓冲区溢出问题。如无法立即升级，可临时将本地用户的 dacread 权限设为仅允许特定授权用户，限制对 pkg 相关命令的访问，并部署文件访问监控工具以检测对敏感文件的异常读取行为。"
score = 3.6
severity = "LOW"
sources = ["avd"]
