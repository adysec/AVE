[basic]
description = "Allmanage Website administration software 2.6 包含一个文件上传 CGI 脚本 allmanageup.pl，该脚本存在权限验证漏洞。远程攻击者可以直接调用此脚本，无需任何身份验证，成功进入系统。攻击者可以修改管理员账户信息、网页内容，甚至可能篡改网站功能，导致网站安全完整性受到破坏。该漏洞攻击风险较高，受攻击面较广，主要影响那些使用 Allmanage 2.6 版本的管理系统，攻击者只需简单网络请求即可发起攻击，使用技术门槛较低。"
published = "2000-05-13T04:00:00.000"
remediation = "建议立即升级 Allmanage Website Administration 软件至 2.6 以上版本或最新版本；若无法升级，请立即删除或禁用 allmanageup.pl 文件上传 CGI 脚本，或在 Web 服务器层面通过访问控制列表（ACL）禁止外部访问该脚本路径；同时配置 Web 应用防火墙（WAF）拦截针对 allmanageup.pl 的直接调用请求，并强制所有管理账户启用强密码策略和多因素认证作为临时缓解措施。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "Allmanage 网站管理系统 管理员密码检索漏洞"
updated = "2026-06-16T21:51:43.620"

