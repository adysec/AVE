[basic]
description = "glFTPD 存在本地权限提升漏洞，本地攻击者通过在 SITE ZIPCHK 命令中插入元字符（metacharacters）可执行任意系统命令，从而获取更高权限。该漏洞源于程序未对用户输入的命令参数进行充分过滤或转义，攻击者需拥有本地账户即可利用，成功利用后可提升至 root 权限，完全控制受影响系统。"
published = "1999-12-23T05:00:00.000"
remediation = "立即升级 glFTPd 至 1.24 或更高版本，该版本已修复 SITE ZIPCHK 命令中元字符未正确转义的问题。如无法升级，在 glftpd.conf 中禁用 SITE ZIPCHK 命令（添加 deny SITE ZIPCHK 规则），并确保 FTP 用户使用 chroot 限制目录访问权限，降低提权风险。"
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "glFtpD SITE ZIPCHK 命令本地权限提升漏洞"
updated = "2026-06-16T21:50:52.640"

