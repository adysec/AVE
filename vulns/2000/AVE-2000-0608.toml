[basic]
description = "Axis Communications StorPoint CD 设备存在路径遍历漏洞，远程攻击者无需身份认证即可通过在 URL 中注入 `..`（点点）序列绕过访问控制，直接访问管理员管理界面及敏感配置页面。该漏洞影响 StorPoint CD 系列设备，攻击者可利用此漏洞获取设备完全控制权限，进而篡改配置或窃取敏感信息。CVSS 评分 10.0，危害等级严重。"
published = "2000-02-29T05:00:00.000"
remediation = "立即升级 Axis StorPoint CD 固件至厂商提供的最新版本。如设备已停止支持，应将管理界面绑定到内网特定 IP 或 VLAN，在防火墙上限制对设备 80/443 端口的访问来源，仅允许受信任管理 IP 连接。同时禁用不必要的 Web 管理功能，并在反向代理层过滤路径遍历特征（如 `..`、`%2e%2e`）。"
score = 10
severity = "CRITICAL"
sources = ["exploitdb"]
title = "Axis Communications StorPoint CD 身份认证绕过漏洞"
updated = "2026-06-16T21:51:11.463"

