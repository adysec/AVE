[basic]
description = "BEA WebLogic 3.1.8 至 4.5.1 默认配置存在大小写敏感处理缺陷（CWE-178），远程未认证攻击者可通过请求大写扩展名（如 .JSP 而非 .jsp）的 JSP 文件 URL，绕过 JSP 编译执行逻辑直接获取源代码。该漏洞影响 WebLogic 3.1.8 至 4.5.1 版本的默认部署环境，CVSS 3.1 评分 7.5（HIGH），攻击向量为网络、攻击复杂度低、无需权限、无需用户交互、机密性影响高。攻击者仅需构造包含大写 .JSP 扩展名的 HTTP 请求即可无损读取 JSP 源码，可能导致业务逻辑泄露、数据库连接信息泄露等敏感信息泄露，进而辅助后续攻击。BEA 已在后续版本中修复此大小写敏感处理缺陷，建议升级至修复版本或配置 Web 服务器统一处理大小写扩展名。"
published = "2000-06-08T04:00:00.000"
remediation = "升级BEA WebLogic到支持安全JSP映射的7.0或以上版本，或直接应用BEA提供的安全补丁包CVE-2000-0499安全更新。关闭JSP扩展名大小写敏感处理功能，并启用严格的JSP文件访问控制，禁止通过URL直接请求大写扩展名访问源代码。如无法立即应用补丁，可临时禁用所有外部JSP文件访问或通过防火墙规则限制对端口8080的JSP请求。为确保安全，建议同时关闭不必要的管理服务，减少攻击面。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "BEA WebLogic JSP源代码泄露漏洞"
updated = "2026-06-16T21:51:51.860"

