[basic]
description = "Livingston RADIUS 认证服务存在缓冲区溢出漏洞，远程攻击者无需身份认证即可向目标系统发送特制的 RADIUS 数据包触发溢出，导致以 root 权限远程执行任意命令。该漏洞影响 Livingston 系列 RADIUS 服务器，CVSS 评分 7.5，危害等级高。建议升级至修复版本或部署访问控制措施限制 RADIUS 服务暴露范围。"
published = "1997-12-01T05:00:00.000"
remediation = "立即升级至 Lucent 发布的补丁版本或迁移至现代 RADIUS 服务器（如 FreeRADIUS 3.x、Microsoft NPS）。Livingston RADIUS 已停止维护，不应再用于生产环境。临时缓解措施：在防火墙限制 UDP 1812/1813 端口仅允许受信任的管理 IP 访问。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "Livingston RADIUS 缓冲区溢出漏洞"
updated = "2026-06-16T21:47:59.367"

