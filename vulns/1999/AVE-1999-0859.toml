[basic]
description = "WWW 服务器未运行在受限文件系统环境中（如未使用 chroot 机制隔离），导致远程攻击者可通过 HTTP 请求直接访问服务器系统关键文件（如 /etc/passwd、配置文件等），造成敏感信息泄露。该漏洞影响未正确配置 chroot 环境的各类 WWW 服务器软件，攻击者无需认证即可利用，CVSS 评分 10.0，危害等级严重。修复方式为使用 chroot 或容器技术限制 Web 服务的文件系统访问范围。"
published = "1999-01-01T05:00:00.000"
remediation = "将 WWW 服务器配置为在 chroot 环境或容器中运行，限制其对 /etc/passwd、/etc/shadow 等系统关键文件的访问。修改 Web 服务器配置文件，设置 DocumentRoot 为独立目录，并禁止符号链接跟随 (FollowSymLinks)，同时使用最小权限原则运行服务进程（如 www-data 用户）。"
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "OpenSource 应用 WWW 服务器文件系统限制绕过漏洞"
updated = "2026-06-16T21:48:41.170"

