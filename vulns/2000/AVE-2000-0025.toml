[basic]
description = "IBM Network Station Manager（NetStation）2.0r1 存在竞争条件漏洞，其特权进程在处理临时文件或日志文件时未对文件路径进行严格的符号链接（symlink）检查，导致存在「检查-使用」时间差（TOCTOU）。本地低权限用户可通过在特权进程操作的文件路径处创建符号链接，指向其可控的系统关键文件，在竞争窗口内使特权进程跟随该链接进行写操作，从而覆盖或篡改本应由高权限管理的系统文件，最终实现本地权限提升，获得系统的 root 或管理员级别访问权限。该漏洞影响 IBM Network Station Manager 2.0r1 版本，CVSS v2 评分为 6.2（中危），攻击复杂度较高，需本地账户访问权限即可触发。IBM 建议用户升级至修复版本，并确保特权进程使用 O_NOFOLLOW 等安全机制处理文件操作，防止符号链接攻击。"
published = "1999-12-27T05:00:00.000"
remediation = "建议升级到 IBM Network Station Manager 2.0 R2 或更高版本，该版本修复了 NetStation 的竞态条件漏洞。如暂无法升级，应以最小权限运行 NetStation 服务，限制本地用户对临时目录的写入权限，并定期审计 /tmp 等可写目录下的符号链接创建行为，避免攻击者通过符号链接攻击提升权限。"
score = 6.2
severity = "MEDIUM"
sources = ["exploitdb"]
title = "IBM Network Station Manager 竞争条件权限提升漏洞"
updated = "2026-06-16T21:50:51.093"

