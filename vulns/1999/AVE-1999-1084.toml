[basic]
description = "InoculateIT 4.53 的 MS Exchange Server 选项中的 AV 选项仅扫描 Microsoft Exchange 服务器的收件箱文件夹树，当用户邮件规则将邮件移动到其他邮箱时，病毒可绕过检测。该漏洞影响 InoculateIT 4.53 及可能其他版本，攻击者利用邮件规则转移恶意邮件即可逃避扫描，导致病毒检测失效。CVSS 评分 7.5，危害等级高，需升级至修复版本或调整扫描策略以覆盖所有邮箱文件夹。"
published = "1999-05-12T04:00:00.000"
remediation = '升级 InoculateIT 反病毒软件至 4.53 以上版本，或启用针对所有 Exchange 邮箱文件夹（包括非收件箱子文件夹）的全面扫描策略。在 AV Option 配置中取消 "仅扫描收件箱" 的限制，确保规则移动后的邮件仍被扫描，避免病毒绕过检测。'
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "InoculateIT MS Exchange Server 防病毒选项邮件扫描绕过漏洞"
updated = "2026-06-16T21:50:17.480"

