[basic]
description = "Microsoft Internet Explorer 3.0/3.0.1 存在远程命令执行漏洞。攻击者可通过构造恶意的 .lnk 快捷方式文件或 .url 链接文件，诱使目标用户使用 IE 浏览器访问恶意网页或打开特制文件，从而在用户系统上以当前用户权限远程执行任意命令。该漏洞无需身份认证即可远程利用，CVSS v2.0 评分 7.5，影响广泛。由于该漏洞年代久远且微软已停止支持旧版 IE，建议用户升级至更高版本或使用现代浏览器替代。"
published = "1997-04-01"
remediation = "升级至 Microsoft Internet Explorer 4.0 或更高版本（该漏洞在 IE 4.0 中修复）。当前 IE 3.x 已停止支持 20 余年，强烈建议升级至现代浏览器（如 Microsoft Edge）；在组策略中禁用从浏览器区域自动执行 .lnk 和 .url 文件，并将 Internet 安全区域设为高等级以阻止文件自动下载执行。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Microsoft Internet Explorer 远程代码执行漏洞"
updated = "1997-04-01"

