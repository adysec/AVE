[basic]
description = "Red Hat Linux 5.0 及更早版本中 ncftp 2.4.2 FTP 客户端的自动下载选项存在命令注入漏洞。当用户使用 ncftp 自动下载文件时，远程攻击者可通过在文件名中嵌入 shell 元字符（如反引号、管道符等）来构造恶意文件名，诱使客户端下载该文件时触发命令执行。攻击者无需认证即可利用此漏洞，在用户系统上以当前用户权限执行任意命令，危害较大。该漏洞影响 Red Hat Linux 5.0 及之前版本中的 ncftp 2.4.2。"
published = "1999-12-31T05:00:00.000"
remediation = "立即升级 ncftp 至 2.4.3 或更高版本（该版本已将目录创建改为安全的 mkdir() 调用，替代存在命令注入风险的 system()）。Red Hat Linux 5.0 用户请参考 Red Hat Errata (rh50-errata-general) 安装补丁包。临时缓解措施：避免对不可信 FTP 源使用 ncftp 的 get -R 自动递归下载功能。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "NcFTP ncftp FTP 客户端命令执行漏洞"
updated = "2026-06-16T21:50:13.020"

