[basic]
description = "Solaris 7.0（即 Solaris 2.7）系统中 /usr/bin/mail 命令存在本地缓冲区溢出漏洞。攻击者通过向该命令传递超长的 -m 参数，可触发缓冲区溢出，进而在本地执行任意代码或提升系统权限。该漏洞影响 Solaris 7.0/2.7 版本，CVSS 评分 4.6，危害等级中等。具备本地登录权限的攻击者无需网络访问即可利用此漏洞获取更高权限，因此建议管理员尽快升级系统补丁或限制不必要的本地账户访问权限。"
published = "1999-09-13"
remediation = "立即升级到 Solaris 官方已修复该问题的补丁版本（Solaris 7 推荐集群补丁 106327 及以上），使用 patchadd 安装 Sun 官方安全补丁。如暂时无法升级，可将 /usr/bin/mail 的 setuid 位移除（chmod u-s /usr/bin/mail）以缓解本地提权风险，并限制普通用户对该命令的执行权限。"
score = 4.6
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Solaris 7.0 /usr/bin/mail 命令本地缓冲区溢出漏洞"
updated = "2026-06-16"

