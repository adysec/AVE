[basic]
description = "Wvdial 1.4 及之前版本中的 PPP wvdial.lxdialog 脚本在创建 .config 配置文件时，未正确设置文件权限，导致该文件具有全局可读权限。属于 dialout 组的本地攻击者可通过读取该配置文件，获取其中存储的拨号登录用户名和密码等敏感凭据信息，进而实施进一步攻击。该漏洞影响 wvdial 1.4 及更早版本，CVSS 评分 2.1，危害等级低，修复方式为升级至更高版本。"
published = "1999-12-14"
remediation = "升级 wvdial 至 1.5 及以上版本，该版本已将 .config 文件权限默认设为仅属主可读（0600）。如无法升级，手动执行 chmod 600 ~/.wvdial.conf 限制配置文件权限，并将 dialout 组成员资格仅授予可信用户。"
score = 2.1
severity = "LOW"
sources = ["cve"]
title = "Wvdial PPP wvdial.lxdialog 脚本权限许可和访问验证漏洞"
updated = "2026-06-16"

