[basic]
description = "Cart32 3.0 存在信息泄露漏洞，远程攻击者可通过在 URL 请求后附加 `/expdate` 路径，无需任何身份认证即可访问敏感调试信息。该漏洞源于程序对调试接口访问控制不当，攻击者可利用泄露的调试信息进一步分析系统架构或寻找其他攻击入口。影响运行 Cart32 3.0 版本的 Web 服务器，CVSS 评分 5.0，危害等级中等。"
published = "2000-05-03T04:00:00.000"
remediation = "升级 Cart32 至 3.0 以上版本以修复 /expdate 路径的调试信息泄露问题。如无法升级，在 Web 服务器（如 IIS）中配置 URL 重写规则或访问控制列表，阻止对 /expdate 路径的外部请求。同时限制 Web 服务器仅允许授权 IP 访问管理后台目录，并禁用调试模式。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Cart32 3.0 expdate 敏感调试信息泄露漏洞"
updated = "2026-06-16T21:51:42.967"

