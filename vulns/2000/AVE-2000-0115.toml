[basic]
description = "Progress Webspeed 配置程序未正确限制对 WSMadmin 管理工具接口的访问权限，导致远程攻击者可通过 wsisa.dll 绕过身份验证机制，获取系统控制权限。该漏洞影响 Progress Webspeed 相关版本，攻击者无需任何认证即可远程利用，CVSS 评分 7.5，危害等级高。厂商已发布安全公告提供修复方案。"
published = "2000-02-03T05:00:00.000"
remediation = "删除或重命名服务器上的 wsisa.dll 文件，或通过 Web 服务器访问控制列表（ACL）限制对 /wsisa.dll 及 WSMadmin 管理路径的远程访问。同时升级 Progress Webspeed 至最新版本以修复权限验证缺陷。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "Progress Webspeed 远程权限提升漏洞"
updated = "2026-06-16T21:51:03.400"

