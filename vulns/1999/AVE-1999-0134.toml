[basic]
description = "Novell NetWare 4.1 及 4.11 的 Remote.NLM 组件中使用了弱加密算法对用户密码进行加密处理，远程攻击者可通过网络嗅探捕获加密后的密码数据，并利用该弱加密算法的缺陷在离线状态下快速破解还原出明文密码，从而获得对目标系统的未授权访问权限。该漏洞影响 Novell NetWare 4.1 和 4.11 版本，CVSS 评分 5.0，危害等级中等。"
published = "1999-04-09T04:00:00.000"
remediation = "升级至 Novell NetWare 4.11 SP6 或更高版本，该版本修复了 Remote.NLM 中密码加密强度不足的问题。如无法升级，建议在服务器控制台使用 UNLOAD REMOTE.NLM 命令卸载远程管理模块，或通过防火墙限制对 TCP 端口 1680 的访问，仅允许受信任的管理 IP 连接。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Novell Netware Remote.NLM 密码弱加密漏洞"
updated = "2026-06-16T21:48:27.980"

