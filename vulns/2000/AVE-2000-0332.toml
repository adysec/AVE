[basic]
description = "Microsoft Windows NT 和 Windows 2000 系统的命令处理器 CMD.EXE 存在缓冲区溢出漏洞。本地用户可通过设置超长环境变量触发该漏洞，导致命令处理器崩溃，造成拒绝服务。该漏洞无需特殊权限即可利用，攻击者只需在本地环境中构造畸形的环境变量字符串即可触发溢出。受影响系统包括 Windows NT 4.0 和 Windows 2000 所有版本。"
published = "2000-04-20T04:00:00.000"
remediation = "立即安装 Microsoft 安全公告 MS00-027 提供的补丁：Windows NT 4.0 用户安装 KB259622 更新（下载地址 https://www.microsoft.com/download/details.aspx?FamilyId=F403EC53-9726-42A1-AAAC-95772ED06A9A），Windows 2000 用户安装对应补丁（下载地址 https://www.microsoft.com/download/details.aspx?FamilyId=2D8C75EA-01FA-45CE-A448-4AFE869D1782）。如无法立即打补丁，临时缓解措施为：限制远程用户执行批处理脚本的权限，避免向 CMD.EXE 传递超长环境变量参数。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Microsoft Windows NT 和 Windows 2000 CMD.EXE 缓冲区溢出漏洞"
updated = "2026-06-16T21:51:29.623"

