[basic]
description = "Linux 内核 Intel 核显驱动（drm/i915）的内存管理中存在整数溢出漏洞。当 hole_end 值过小时进行减法运算会导致下溢出，同时 (addr + 2 * min_alignment) 计算在模拟测试场景中也可能发生上溢出，进而触发越界写入内存（CWE-787）。攻击者可通过诱导系统执行特定内存分配操作利用此漏洞，导致系统崩溃或本地权限提升。该漏洞影响使用 Intel 显卡的 Linux 内核系统，CVSS 评分 7.8，危害等级高。"
published = "2025-02-26T07:01:38.733"
remediation = "立即将 Linux 内核升级至 5.19 及以上版本，或更新至包含提交 ab3edc679c55 的 LTS 版本（5.15.58+、5.10.136+、5.4.210+）。如无法立即更新内核，可通过 git cherry-pick ab3edc679c55 手动应用补丁到 drivers/gpu/drm/i915/selftests/i915_gem_gtt.c 文件并重新编译内核。"
score = 7.8
severity = "HIGH"
sources = ["msrc"]
title = "Linux kernel drm/i915 自测程序减法溢出越界写入漏洞"
updated = "2026-06-17T05:18:42.040"

