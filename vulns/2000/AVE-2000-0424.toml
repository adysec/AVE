[basic]
description = "MDaemon POP 服务器存在缓冲区溢出漏洞，远程攻击者可通过向 POP3 端口发送超长用户名，触发缓冲区溢出导致服务崩溃，造成拒绝服务。该漏洞影响 MDaemon 系列邮件服务器，攻击无需身份认证，攻击条件简单，危害等级中等。"
published = "2000-05-24T04:00:00.000"
remediation = "升级 MDaemon 至 3.5.4 或更高版本，该版本已修复 POP3 服务对超长用户名输入的处理。如无法立即升级，可在网络防火墙或服务器本地防火墙中限制对 110 端口（POP3）的访问来源 IP，仅允许可信邮件客户端连接，以降低远程攻击风险。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Alt-N Technologies MDaemon POP 服务器缓冲区溢出拒绝服务漏洞"
updated = "2026-06-16T21:51:38.083"

