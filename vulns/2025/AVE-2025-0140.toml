[basic]
description = "宏景eHR 人力资源管理系统中的 DisplayOleContent 接口存在任意文件读取漏洞，未经身份认证的远程攻击者可通过构造特制的 HTTP 请求，利用该接口未对文件路径参数进行有效过滤的缺陷，读取服务器上的任意文件（如配置文件、数据库连接信息等敏感数据），导致系统敏感信息泄露。该漏洞影响宏景eHR 多版本，危害等级高，攻击者无需任何权限即可远程利用。"
published = "0708"
remediation = "建议升级宏景eHR至官方发布的最新安全版本（≥V2025.01），该漏洞已在后续版本中修复。如无法立即升级，可在Web服务器层面配置URL访问控制规则，限制对 `/servlet/DisplayOleContent` 路径的访问权限，仅允许授权用户访问，并校验传入的文件路径参数，禁止包含 `../` 等目录遍历字符。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "宏景 宏景eHR DisplayOleContent 任意文件读取漏洞"
updated = "0708"

