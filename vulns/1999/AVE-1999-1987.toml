[basic]
description = "QPC Software QVT/Term Plus 及 QVT/Net 系列产品的 FTP 服务组件存在缓冲区溢出漏洞，影响版本包括 QVT/Term Plus 4.2d、4.3 以及 QVT/Net 4.3。远程攻击者无需认证即可向目标 FTP 服务发送超长的用户名或密码字段，触发栈缓冲区溢出，导致服务崩溃拒绝服务，攻击者还可能借此执行任意系统命令。该漏洞 CVSS 评分 7.5，危害等级为高，建议用户升级至修复后的版本或限制 FTP 服务的网络访问。"
published = "1999-11-10T05:00:00.000"
remediation = "QPC QVT/Term Plus 及 QVT/Net 产品已停止维护，厂商未发布任何安全补丁。建议立即停用受影响版本，迁移至受支持的 FTP 服务器软件（如 vsftpd、ProFTPD 最新版）。若暂时无法迁移，应在网络边界防火墙限制对 FTP 服务 21 端口的访问，仅允许可信 IP 连接，并在应用层部署入侵检测规则拦截超长用户名/密码输入。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "QPC Software QVT/Term FTP 服务器缓冲区溢出漏洞"
updated = "2026-06-16T21:50:40.440"

