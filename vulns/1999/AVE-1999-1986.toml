[basic]
description = "Persits Software AspUpload 组件中的 AspUpload.dll 存在缓冲区溢出漏洞，远程攻击者可通过向 HTTP 请求中提交超长参数触发该漏洞，导致目标系统发生拒绝服务，甚至可能执行任意命令。该漏洞影响 AspUpload 1.4.0.2 之前的所有版本，攻击者无需身份认证即可远程利用，危害严重。"
published = "1999-07-20T04:00:00.000"
remediation = "升级 Persits AspUpload 至 1.4.0.2 或更高版本，该版本已修复 AspUpload.dll 中缓冲区长度检查缺陷。如无法升级，在 IIS 中配置 URLScan 或类似工具，限制 HTTP 请求参数长度不超过合理阈值，作为临时缓解措施。"
score = 10
severity = "CRITICAL"
sources = ["avd"]
