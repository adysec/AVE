[basic]
description = "MAGMI（Magento Mass Importer）插件 for Magento Server 的 `web/ajax_pluginconf.php` 文件存在路径遍历漏洞。远程攻击者无需身份认证即可通过构造包含 `../` 的恶意 `file` 参数，利用目录穿越技术读取服务器上的任意文件，导致敏感信息泄露。该漏洞影响使用该插件的 Magento 服务器，攻击复杂度低，仅需发送特制 HTTP 请求即可利用。"
published = "2015-02-24T17:59:03.817"
remediation = "立即升级 MAGMI 插件至最新版本 0.7.21（SourceForge 下载），该版本修复了路径遍历问题。如无法升级，在 web/ajax_pluginconf.php 中对 file 参数进行严格过滤，禁止包含 `../` 等目录跳转字符，仅允许白名单内的合法文件名。若业务不需要 MAGMI 插件，建议直接禁用或删除该插件目录。"
score = 5
severity = "MEDIUM"
sources = ["nuclei"]
title = "MAGMI Magento Mass Importer 插件路径遍历漏洞"
updated = "2026-06-17T00:23:32.290"

