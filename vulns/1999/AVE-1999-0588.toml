[basic]
description = "ControlIT v4.5 及更早版本使用弱加密算法存储地址簿中的用户名和密码，攻击者在获取地址簿文件访问权限后，可轻易破解加密还原明文凭证。该漏洞源于加密强度不足而非算法实现缺陷，影响所有使用该版本 ControlIT 远程控制软件的系统。成功利用可导致敏感凭证泄露，进而实现未授权远程访问，CVSS v2.0 评分 10.0，危害严重。"
published = "1999-01-25T05:00:00.000"
remediation = "由于 ControlIT 已停止维护且无官方补丁，建议立即迁移至受支持的远程控制方案（如 TeamViewer、AnyDesk 或 VNC over SSH）。如暂无法替换，须通过 NTFS 权限将地址簿文件访问限制为仅当前用户，并启用 BitLocker 全盘加密以防护本地存储的凭据数据。"
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "ControlIT v4.5 地址簿弱加密存储用户名和密码漏洞"
updated = "2026-06-16T21:48:13.230"

