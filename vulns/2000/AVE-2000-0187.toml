[basic]
description = "Pragma Systems InterAccess TelnetD Server 4.0 在处理终端客户端配置信息（terminal client configuration）时存在缺陷，远程攻击者无需身份认证即可向目标 Telnet 服务发送特制的畸形终端配置数据，触发服务异常并导致拒绝服务（DoS），使 Telnet 守护进程崩溃或拒绝后续连接。该漏洞影响运行 InterAccess TelnetD Server 4.0 的 Windows 系统，攻击条件为攻击者能够与目标服务器的 Telnet 端口（默认 23）建立网络连接。利用方式简单，仅需发送畸形配置报文即可造成服务不可用，CVSS 评分约 5.0，危害等级为中。"
published = "2000-02-24T05:00:00.000"
remediation = "建议升级 Pragma Systems InterAccess TelnetD Server 至 4.0 之后的修复版本（建议升级至 5.0 或更高版本），可从 Pragma Systems 官网下载最新补丁。如暂时无法升级，建议在防火墙层面限制 Telnet 服务（TCP 23 端口）仅允许可信 IP 访问，或在不影响业务前提下暂时禁用 Telnet 服务改用 SSH 替代。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
