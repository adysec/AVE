[basic]
description = "Symantec pcAnywhere 8.0 及 9.0 版本存在拒绝服务漏洞。远程攻击者可在 pcAnywhere 提供登录提示符之前主动终止连接，导致目标系统上的 pcAnywhere 服务进入异常状态而无法正常响应后续连接请求，造成拒绝服务。该漏洞无需身份认证即可远程触发，攻击难度较低，影响了大量使用 pcAnywhere 进行远程管理的企业环境。"
published = "2000-04-09T04:00:00.000"
remediation = "升级至 pcAnywhere 10.0 或更高版本（该漏洞在 10.0 中修复）。如无法升级，在防火墙中限制对 pcAnywhere 端口的非授权访问，仅允许可信 IP 连接。Symantec pcAnywhere 已停止维护，建议迁移至现代远程访问解决方案（如 VPN + RDP 或 TeamViewer 等）。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Symantec pcAnywhere 远程拒绝服务漏洞"
updated = "2026-06-16T21:51:22.387"

