[info]
author = "ave"
description = "检测 KDE kdesud 是否存在于系统中，该程序在处理超长 DISPLAY 环境变量时存在缓冲区溢出漏洞，可导致本地权限提升"
id = "POC-AVE-2000-0382"
name = "KDE kdesud DISPLAY 环境变量缓冲区溢出 PoC"
severity = "high"
tags = ["ave-2000-0382"]
vuln_id = [
    "CVE-2000-0460",
    "AVE-2000-0382",
]

[poc]
logic = "all"

[[poc.requests]]
path = "/usr/bin/kdesud"
protocol = "file"

[[poc.requests.matchers]]
expect = true
part = "body"
regex = ".+"
type = "regex"
