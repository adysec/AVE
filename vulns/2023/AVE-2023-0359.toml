[basic]
description = "Linux 内核的 AMD 显示驱动（DRM/AMD/display）中存在本地拒绝服务漏洞。在 dcn30 显示流水线提交（pipe commit）过程中，若同时对 DRR（动态刷新率）寄存器（如 OTG_V_TOTAL_MIN）进行写操作，会导致显示控制器发生底层缓冲下溢（underflow），造成图形输出异常甚至系统服务不可用。该漏洞影响 Linux 内核 4.15 至 6.2.8 之间的多个版本，攻击者需具备本地系统访问权限及低权限用户身份即可触发，无需用户交互。Linux 内核社区已在 6.1.21 及 6.2.8 稳定版中通过补丁修复该问题，禁止在管道提交帧中同时写入 DRR 寄存器。"
published = "2025-05-02T16:15:23.320"
remediation = "升级 Linux 内核至 6.1.21/6.2.8 及以上版本，或合入修复补丁（commit f8080f1e300e / 3c20a098b507 / 56574f89dbd）。如无法立即更新内核，可通过 kernel livepatch 热修复或限制本地低权限用户加载 amdgpu 内核模块作为临时缓解。"
score = 5.5
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux Kernel AMD Display DRR 设置拒绝服务漏洞"
updated = "2026-06-17T06:44:11.080"

