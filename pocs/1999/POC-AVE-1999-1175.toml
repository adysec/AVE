[info]
author = "ave"
description = "验证 Joe's Own Editor 2.8 在崩溃时生成的恢复文件 DEADJOE 是否存在且可被本地普通用户读取，该文件以不安全权限保存了其他用户正在编辑的敏感文件内容，导致信息泄露。"
id = "POC-AVE-1999-1175"
name = "Joe's Own Editor DEADJOE 崩溃文件权限漏洞"
severity = "low"
tags = ["ave-1999-1175"]
vuln_id = [
    "CVE-1999-1545",
    "AVE-1999-1175",
]

[poc]
logic = "all"

[[poc.requests]]
path = "DEADJOE"
protocol = "file"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [""]
