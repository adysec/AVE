[basic]
description = "DALnet Bahamut IRCd 4.6.5 的 SUMMON 命令存在缓冲区溢出漏洞，远程攻击者无需任何身份认证，通过向目标 IRC 服务器发送特制的 SUMMON 命令即可触发该漏洞，可导致服务进程崩溃造成拒绝服务，或进一步执行任意代码。该漏洞影响 Bahamut IRCd 4.6.5 版本，CVSS 评分 10.0，危害等级严重。"
published = "2000-06-29T04:00:00.000"
remediation = "立即升级 Bahamut IRCd 至 1.4.3 及更高版本，该漏洞已在后续版本中修复。如无法升级，可在 IRCd 配置文件中禁用 SUMMON 命令（设置 summon = no 或从命令列表移除），同时通过防火墙限制对 IRC 端口（6667/TCP）的访问来源，仅允许可信 IP 连接。"
score = 10
severity = "CRITICAL"
sources = ["cve"]
title = "DALnet Bahamut IRCd 4.6.5 SUMMON命令缓冲区溢出漏洞"
updated = "2026-06-16T21:52:03.320"

