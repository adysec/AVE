[basic]
description = "Classifieds.cgi 1.0 存在 shell 元字符注入漏洞，远程攻击者可通过在请求参数中注入分号、管道符等 shell 元字符，使服务器执行额外的系统命令，从而读取服务器上的任意文件，导致敏感信息泄露。该漏洞影响 Greg Matthews 开发的 Classifieds.cgi 1.0 版本。"
published = "1999-12-15"
remediation = "建议升级到已修复该漏洞的最新版本，或对用户输入进行严格过滤，禁止 shell 元字符传入系统命令执行函数。"
score = 5.0
severity = "MEDIUM"
sources = [
    "cve",
    "epss",
]
title = "Greg Matthews Classifieds.cgi 1.0 任意文件读取漏洞"
