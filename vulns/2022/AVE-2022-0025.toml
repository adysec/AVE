[basic]
description = "Linux 内核 SPI FSI 驱动中的状态寄存器轮询循环缺少超时机制，当硬件进入异常状态时，数据搬移过程中的轮询操作会陷入无限循环，导致系统挂起。本地攻击者可通过触发 FSI 总线上的特定操作使硬件进入异常状态，从而引发拒绝服务。该漏洞影响 Linux 内核版本，CVSS 评分 5.5，危害等级中危。"
published = "2025-02-26T07:00:54.407"
remediation = "将 Linux 内核升级至 5.16.19 及以上版本（5.16.x 分支）或 5.17.2 及以上版本（5.17.x 分支），或 cherry-pick 补丁 commit 89b35e3f2851/d4982ceb137e/dac1438f347d 至当前内核源码并重新编译部署。若无法立即升级，可考虑卸载或屏蔽 spi-fsi 内核模块（modprobe -r spi-fsi）作为临时缓解措施。"
score = 5.5
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux 内核 FSI 驱动 SPI 数据轮询缺少超时处理拒绝服务漏洞"
updated = "2026-06-17T05:17:16.617"

