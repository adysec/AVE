[basic]
description = 'Netscape Communicator 4.x 在启用 JavaScript 时存在安全绕过漏洞，即使用户设置了"仅接受来自同一服务器的 cookie"选项，浏览器也不会对 cookie 设置发出警告。攻击者可通过恶意 JavaScript 代码绕过同源策略限制，在用户不知情的情况下设置或读取跨域 cookie，导致隐私泄露或会话劫持。该漏洞影响 Netscape Communicator 4.x 所有启用 JavaScript 的版本，攻击者需诱导用户访问包含恶意脚本的页面即可触发，CVSS 评分 5.0，属中危漏洞。Netscape 已在后续版本中修复此同源策略绕过问题。'
published = "1999-07-09T04:00:00.000"
remediation = '升级到 Netscape Communicator 4.51 或更高版本以修复该 cookie 安全设置提示缺陷；在无法立即升级时，可在浏览器偏好设置中关闭 JavaScript 功能，或手动将 cookie 接受策略设置为"仅接受来自同一服务器的 cookie"，以缓解隐私泄露风险。'
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Netscape Communicator 4.x 安全绕过漏洞"
updated = "2026-06-16T21:49:06.117"

