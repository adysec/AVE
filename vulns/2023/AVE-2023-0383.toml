[basic]
description = "Linux 内核通用中断子系统（genirq/ipi）中存在空指针解引用漏洞，当 `ipi_send_mask()` 或 `ipi_send_single()` 函数被传入无效中断号时，所有局部变量均为 NULL，而 `ipi_send_verify()` 函数在调用 `irq_data_get_affinity_mask()` 前未对参数进行空指针检查，导致空指针被解引用进而引发内核崩溃（oops）。本地攻击者可利用此漏洞触发拒绝服务（DoS）条件，影响使用受影响 Linux 内核版本的所有系统。该漏洞由 Linux 验证中心通过 SVACE 静态分析工具发现，CVSS 评分 5.5，危害等级中危。"
published = "2025-09-16T17:15:39.730"
remediation = "立即升级 Linux 内核至 6.2.5 及以上版本（或长期支持分支 6.1.18 及以上版本）。该漏洞已在提交 feabecaff590、926aef60ea64、7448c73d640 中修复，可通过 `git cherry-pick` 将补丁应用到自定义内核，或在发行版中通过包管理器安装更新版本的内核（如 `apt upgrade linux-image`、`yum update kernel`）。无法立即升级时，可限制本地用户对内核 IPI 功能的调用权限作为临时缓解。"
score = 5.5
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux Kernel genirq/ipi 空指针解引用漏洞"
updated = "2026-06-17T06:44:55.030"

