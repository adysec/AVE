[basic]
description = "Netscape Messaging Server 3.54、3.55 及 3.6 版本在处理 SMTP 会话中的 RCPT TO 命令时存在设计缺陷，未对接收方地址的长度与数量进行合理限制。未经身份认证的远程攻击者可向目标邮件服务器的 SMTP 端口建立连接，并连续发送大量带有超长收件人地址的 RCPT TO 命令，导致服务器持续分配内存而无法正常释放，最终引发内存耗尽式拒绝服务，使邮件服务不可用。该漏洞影响上述三个版本的 Netscape Messaging Server，攻击条件仅需网络可达目标 SMTP 服务且无需任何身份认证，利用方式较为简单，可通过脚本批量发送畸形命令实现。"
published = "1999-10-29T04:00:00.000"
remediation = "升级到 Netscape/iPlanet Messaging Server 4.1 或更高版本（该系列已并入 Oracle 产品线，建议迁移至当前受支持的邮件服务器）。如暂时无法升级，应在 SMTP 网关或防火墙侧限制单个 IP 的并发 RCPT TO 命令数量与连接速率，并对单连接邮件事务数设置上限以缓解内存耗尽。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Netscape Messaging Server 3.54/3.55/3.6 RCPT TO 内存耗尽拒绝服务漏洞"
updated = "2026-06-16T21:50:38.627"

