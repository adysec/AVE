[basic]
description = "Caldera Linux及Mandrake Linux等发行版中kdm的默认配置允许来自任意主机的XDMCP连接，远程攻击者可利用此漏洞获取敏感信息或绕过额外访问限制，且无需认证即可远程利用。"
published = "1999-08-22"
remediation = "修改kdm配置文件以限制允许XDMCP连接的主机范围，或直接禁用XDMCP服务。具体配置步骤可参考Caldera安全公告CSSA-1999-021.0。"
score = 10.0
severity = "CRITICAL"
sources = ["cve"]
title = "Caldera Linux kdm 默认配置允许远程XDMCP连接漏洞"
updated = "2024-06-01"

