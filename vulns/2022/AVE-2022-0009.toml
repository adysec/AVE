[basic]
description = "libsndfile 1.2.2 中存在多处有符号整数溢出漏洞，位于 src/au.c 的 au_read_header 函数以及 src/mat4.c 的 mat4_open 和 mat4_read_header 函数中。在 WAV 和 AIFF 文件格式处理路径中，samplesperblock 与 blocks 的 32 位乘法运算在赋值给 sf.frames（int64 类型）前发生整数溢出，导致错误的帧计数，进而引发堆缓冲区溢出或拒绝服务。攻击者可通过构造特制的音频文件触发该漏洞，CVSS 评分 7.8，危害等级高。"
published = "2023-07-18T14:15:12.033"
remediation = "建议升级 libsndfile 至 1.2.1 及以上版本（1.2.1 已修复 WAV 相关整数溢出 bug，1.2.2 为最新稳定版）。如无法立即升级，在解析不可信音频文件前应严格校验 WAV 文件头中 samplesperblock 和 blocks 字段的乘积不超过 INT_MAX，并启用地址 sanitizer（ASAN）作为运行时防护。"
score = 7.8
severity = "HIGH"
sources = ["msrc"]
title = "Libsndfile libsndfile 整数溢出漏洞"
updated = "2026-06-17T04:48:25.687"

