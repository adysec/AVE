[basic]
description = 'Recourse ManTrap 1.6.1 构建的 chroot 隔离环境中，根目录 "/" 的 inode 编号异常高于正常值，导致被限制在此环境中的攻击者可通过对比 inode 编号判断自身处于 chroot 环境而非真实系统。该漏洞属于信息泄露类型，虽然攻击者无法直接突破 chroot 限制，但知道被隔离的事实后可能改变攻击策略。CVSS 评分 2.1，危害等级低。影响 ManTrap 1.6.1 版本。'
published = "2001-01-09T05:00:00.000"
remediation = "升级至 Recourse ManTrap 2.0 版本，该版本已修复根目录 inode 号异常问题。若无法升级，管理员可在 chroot 环境创建后手动调整根目录 inode 号至正常范围，或通过修改内核参数隐藏 inode 信息。同时建议在 chroot 环境内外部署独立的进程监控机制，防止通过 crash 工具跨 cage 获取进程信息。长期建议使用纯操作系统原装环境部署蜜罐，而非依赖软件层模拟。"
score = 2.1
severity = "LOW"
sources = ["exploitdb"]
title = "Recourse ManTrap 1.6.1 根目录Inode信息泄露漏洞"
updated = "2026-06-16T21:53:14.993"

