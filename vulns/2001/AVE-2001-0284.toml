[basic]
description = "这是一个对NEdit编辑器（5.1.1及更早版本）的本地权限提升漏洞。攻击者可以利用程序在处理文件时的临时文件或备份文件上的符号链接攻击机制， trick系统将编辑操作写入攻击者控制的文件而非预期的系统文件。这导致攻击者能够以程序权限覆写任意目标文件，破坏文件完整性和可信赖性。漏洞影响范围涉及所有使用旧版NEdit的用户，攻击者无需任何权限即可发起攻击，通过精心设计的符号链接达到远程代码执行的效果。涉及的CWE分类为CWE-362（并发时间竞争问题的分散注意力）。漏洞评分保持在7.2的中高危水平，作为本地权限提升漏洞，能够完全泄露系统机密、篡改数据和完全破坏服务，足以对系统安全造成严重威胁。在网络搜索后，我了解到 Microsoft 已经在2024 年 8 月安全更新中修复了这一漏洞。实际的修复措施包括更新NEdit到最新支持版本，并确保临时文件和备份文件在使用前实施完整性检查。"
published = "2001-08-22T04:00:00.000"
remediation = "建议升级 NEdit 至 5.2 或更高版本（已修复该符号链接漏洞）。若无法升级，建议：1) 避免使用 NEdit 的打印功能；2) 在 /tmp 目录设置 sticky bit（chmod +t /tmp）防止符号链接攻击；3) 限制普通用户对 /tmp 的写入权限或使用私有临时目录。Debian 用户可执行 apt-get update && apt-get install nedit 升级至修复版本。"
score = 7.2
severity = "HIGH"
sources = ["redhat"]
title = "NEdit 临时文件符号链接漏洞"
updated = "2026-06-16T21:54:31.650"

