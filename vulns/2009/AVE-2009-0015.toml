[basic]
description = "Joomla! 的 iF Portfolio Nexus (com_if_nexus) 组件 1.5 版本存在目录遍历漏洞。远程攻击者可通过向 index.php 传递包含 `..` 序列的 controller 参数触发该漏洞，实现任意本地文件的包含与执行，可能导致敏感信息泄露或远程代码执行。该漏洞影响 Joomla! 中使用该组件的网站，CVSS 评分 7.5，危害等级高。"
published = "2010-03-08T15:30:00.480"
remediation = "立即卸载或禁用 Joomla! 的 com_if_nexus 组件（版本 1.5），此组件已停止维护且不再有官方补丁。作为临时缓解，可修改 index.php 对 controller 参数进行严格过滤，拒绝包含 `..` 的路径字符串，或删除该组件目录彻底消除风险。建议迁移至其他仍在维护的 Joomla! 图库组件替代 iF Portfolio Nexus。"
score = 7.5
severity = "HIGH"
sources = ["nuclei"]
title = "Joomla! iF Portfolio Nexus 目录遍历漏洞"
updated = "2026-06-16T23:14:09.170"

