[basic]
description = "Internet Explorer 4.x 及 5.x 版本存在安全域访问控制漏洞（Image Source Redirect）。远程攻击者可通过恶意网页将图片源重定向至本地文件系统，绕过浏览器的同源策略限制，读取客户端本应受保护的任意文件。该漏洞无需用户交互即可触发，攻击者只需诱使用户访问恶意网页即可实施窃密。CVSS 评分 5.1，危害等级中危。"
published = "2000-02-16T05:00:00.000"
remediation = "该漏洞对应 Microsoft 安全公告 MS00-009 (KB251109)：IE 4.0/4.01/5.0/5.01 用户应通过 Windows Update 安装补丁，或升级至 IE 5.01 SP2 及以上版本；4.01 SP1 及更早版本须直接升级到 IE 最新版。当前 IE 已停止支持，建议立即迁移至 Microsoft Edge 并启用 IE 兼容模式以运行遗留站点，同时将 Internet 安全区域设置为高并禁用活动脚本。"
score = 5.1
severity = "MEDIUM"
sources = ["epss"]
title = "Microsoft Internet Explorer 访问控制漏洞"
updated = "2026-06-16T21:51:07.020"

