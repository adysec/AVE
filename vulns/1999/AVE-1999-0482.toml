[basic]
description = "Solaris 系统的 libc 库、ufsrestore 及 rcp 工具中存在缓冲区溢出漏洞，本地攻击者可通过设置特制的 LC_MESSAGES 环境变量触发该漏洞，导致缓冲区溢出，进而实现权限提升或以目标进程权限执行任意代码。该漏洞影响 Sun Solaris 7.0 及 IBM AIX 4.2.1 等版本，CVSS 评分 7.2，危害等级高。攻击者需拥有本地系统访问权限方可利用。"
published = "1999-09-08T04:00:00.000"
remediation = "建议安装 Sun 安全补丁 106815-01 (Solaris 7) 或升级至 Solaris 8 及以上版本；AIX 用户应安装 APAR IX89654 或升级至 AIX 4.3.3。临时缓解措施：在系统层面限制 LC_MESSAGES 环境变量长度，或通过 setuid 程序过滤环境变量。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "Sun Solaris 及 IBM AIX LC_MESSAGES 环境变量 libc 缓冲区溢出漏洞"
updated = "2026-06-16T21:49:00.953"

