[basic]
description = "Cisco IOS XR 3.4.0 至 3.9.1 版本在启用 BGP 协议时，未能正确处理无法识别的传递属性（transitive attribute）。远程攻击者可通过向目标设备发送特制的 BGP 前缀通告（包含属性类型代码 99）触发该漏洞，导致 BGP 对等会话重置，造成拒绝服务。该漏洞影响运行 Cisco IOS XR 的多种路由设备，CVSS 评分 7.5，危害等级高。Cisco 已发布安全公告修复此漏洞。"
published = "2010-08-30T21:00:12.203"
remediation = "升级 Cisco IOS XR 至 3.9.2 或更高版本（该版本包含 CSCti62211 的修复补丁）；在无法立即升级时，可在 BGP 入口策略中配置 route-map 丢弃属性类型码 99 的更新，或使用 `neighbor x.x.x.x filter-list` 配合前缀列表过滤异常 BGP 通告，同时启用 BGP 会话 MD5 认证和 TTL 安全跳数限制缓解风险。"
score = 7.5
severity = "HIGH"
sources = ["kev"]
title = "Cisco IOS XR BGP 远程拒绝服务漏洞"
updated = "2026-06-16T23:22:00.630"

