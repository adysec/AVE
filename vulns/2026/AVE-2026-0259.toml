[basic]
description = "New API（LLM 网关与 AI 资产管理系统）在通知 URL 处理中存在 SSRF 防护绕过漏洞。由于默认配置下 ApplyIPFilterForDomain 未启用，系统对 Webhook、Bark、Gotify 等通知 URL 进行域名校验时仅检查域名黑白名单，而未解析域名对应的 IP 地址并验证其是否属于内网或元数据地址。已认证的普通攻击者可利用此漏洞配置指向内部服务或云元数据接口的主机名，诱使服务器向内部网络发送请求，进而访问敏感信息或横向移动。该漏洞影响 0.12.0-alpha.1 之前的所有版本，CVSS 评分 7.7，危害等级高，建议升级至 0.12.0-alpha.1 或更高版本进行修复。"
published = "2026-07-09T23:17:04.763"
remediation = '立即升级到 v0.12.0-alpha.1 或更高版本，该版本已将 ApplyIPFilterForDomain 默认启用为 true，确保通知 URL 中的主机名被解析后经过 IP 过滤校验。如无法立即升级，在系统设置 → 请求设置中手动开启"对域名启用 IP 过滤"选项，同时配置通知 URL 域名白名单限制可用的外部域名，并在网络层面限制出站流量仅允许访问必要的外部服务。'
score = 7.7
severity = "HIGH"
sources = ["ghsa"]
title = "New API 通知URL SSRF防护绕过漏洞"
updated = "2026-07-16T16:36:20.480"

