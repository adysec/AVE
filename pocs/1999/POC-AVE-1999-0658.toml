[info]
author = "AVE"
description = "检测 Solaris/SunOS 系统中 arp(8c) 命令 -f 参数信息泄露漏洞。本地用户通过 arp -f 传入任意文件路径，文件中无法被 ARP 条目格式正确解析的行会原样回显，导致敏感信息（如 /etc/passwd）泄露。"
id = "POC-AVE-1999-0658"
name = "CVE-1999-0859 PoC"
severity = "low"
tags = [
    "cve-1999-0859",
    "solaris",
    "arp",
    "local-file-read",
]
vuln_id = [
    "CVE-1999-0859",
    "AVE-1999-0658",
]

[poc]
logic = "all"

[[poc.requests]]
path = "/etc/passwd"
protocol = "file"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["root:"]
