[basic]
description = "Classifieds.cgi 是 Greg Matthews 开发的 1.0 版本分类广告 CGI 脚本，存在命令行元字符注入漏洞。该脚本在处理用户输入时未对特殊字符（如分号、反引号、管道符等 shell 元字符）进行过滤与转义，导致远程攻击者可通过构造包含恶意元字符的 HTTP 请求参数，将额外命令注入到后台 shell 命令中执行。攻击者可借此读取服务器上的任意文件（如 /etc/passwd 等敏感文件），从而泄露系统信息、破坏数据机密性。由于该漏洞无需身份认证且可通过网络远程利用，任何运行该脚本的 Web 服务器均可能受影响，危害程度为中等。"
published = "1999-12-15"
remediation = "升级到已修复该命令行注入问题的 Classifieds.cgi 新版本；若无法立即升级，应对用户输入的所有参数进行严格的 shell 元字符过滤（如分号、反引号、管道符、& 等），使用参数化调用而非直接拼接 shell 命令，并将 CGI 脚本以最小权限用户运行。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Greg Matthews Classifieds.cgi 远程任意文件读取漏洞"
updated = "2026-07-17"

