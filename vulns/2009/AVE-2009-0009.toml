[basic]
description = "Joomla! 的 MooFAQ 组件（com_moofaq）1.0 版本中的 includes/file_includer.php 存在目录遍历漏洞，远程攻击者可通过向 file 参数传递包含 `../` 序列的恶意路径读取服务器上的任意文件，导致敏感信息泄露。该漏洞无需身份认证即可远程利用，影响范围包括使用该组件的所有 Joomla! 网站。"
published = "2009-06-09T19:30:00.250"
remediation = "该第三方组件 MooFAQ (com_moofaq) 1.0 已停止维护，官方未发布安全补丁。建议立即在 Joomla 后台卸载该组件；若必须使用，可手动修改 components/com_moofaq/includes/file_includer.php，在接收 file 参数后添加 realpath() 路径规范化检查和 basename() 过滤，禁止包含 ../ 等目录跳转序列，并设置 open_basedir 限制 PHP 文件访问范围。"
score = 7.5
severity = "HIGH"
sources = ["nuclei"]
title = "Joomla! MooFAQ 组件本地文件包含漏洞"
updated = "2026-06-16T23:08:34.823"

