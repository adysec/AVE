[basic]
description = "Qualcomm qpopper 3.0 beta 版本 POP3 守护进程在处理 LIST 命令时存在缓冲区溢出漏洞。已通过身份认证的攻击者可通过向 TCP 端口 110 上的 POP3 服务发送超长特制的 LIST 命令参数，触发栈缓冲区溢出，导致攻击者能够以 qpopper 进程权限执行任意代码，实现本地权限提升。该漏洞 CVSS v2 评分 7.2，危害等级高，影响系统机密性、完整性和可用性。"
published = "2000-01-26T05:00:00.000"
remediation = "升级至 qpopper 3.0 正式发布版（非 beta 版本）以修复 LIST 命令缓冲区溢出漏洞。由于 Qualcomm 已停止维护 qpopper，建议迁移至 Dovecot 等活跃维护的 POP3/IMAP 服务器。临时缓解措施包括限制本地用户对 qpopper 服务的访问权限，并通过系统审计日志监控异常的 LIST 命令请求。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "Qualcomm qpopper 3.0 LIST 命令远程缓冲区溢出漏洞"
updated = "2026-06-16T21:50:59.533"

