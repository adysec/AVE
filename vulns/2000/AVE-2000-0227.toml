[basic]
description = "HP-UX 11.04 VirtualVault（VVOS）存在数据转发漏洞。当网络接口配置多个别名 IP 地址时，系统会将本应发送给特权进程的数据通过别名接口错误地发送给未授权进程，导致敏感信息泄露。攻击者可通过网络远程利用此漏洞，无需认证即可触发数据错误路由，造成部分完整性破坏。"
published = "2000-04-06"
remediation = "安装 HP 安全公告 HPSBUX0004-112 对应的补丁程序。临时缓解措施：避免在 VirtualVault 网络接口上配置多个别名 IP 地址。HP-UX 11.04 VVOS 已停止支持，建议升级至受支持版本。"
score = 5.0
severity = "MEDIUM"
sources = [
    "cve",
    "avd",
]
title = "HP-UX VirtualVault 别名IP地址信息泄露漏洞"
updated = "2000-04-06"

