[basic]
description = "Microsoft Internet Explorer 5 中的 Active Movie ActiveX 控件未对可下载文件类型进行有效限制，存在输入验证不完善漏洞。远程攻击者可通过电子邮件或新闻组帖子编码任意类型文件，诱导用户访问后导致恶意文件被下载到目标系统。该漏洞影响 Internet Explorer 5 浏览器，CVSS 评分 7.5，危害等级高。微软已发布安全更新修复此漏洞。"
published = "2000-05-13T04:00:00.000"
remediation = "升级到 Internet Explorer 5.01 或更高版本，该漏洞已在 IE 5.01 中修复。如无法升级，在 IE 安全设置中将 ActiveX 控件和插件相关选项设为「禁用」，特别是「下载未签名的 ActiveX 控件」和「对标记为可安全执行脚本的 ActiveX 控件执行脚本」两项。也可通过注册表设置 CLSID {05589FA0-C356-11CE-BF01-00AA0055595A} 的 Kill Bit 来禁用该 ActiveX 控件。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "Microsoft Internet Explorer 5 Active Movie ActiveX 控件任意文件下载漏洞"
updated = "2026-06-16T21:51:38.210"

