[basic]
description = "Novell GroupWise 5.2 和 5.5 版本的 Web 接口组件 GWWEB.EXE 存在两个安全缺陷。首先，HELP 参数会向客户端返回服务器完整文件系统路径，泄露敏感的内部目录结构信息。其次，攻击者通过在 HELP 参数中注入 '../' 目录遍历序列，可绕过访问控制读取服务器上任意位置的 .htm 文件或浏览目录内容。此外，向 GWWEB.EXE 发送超长字符串可触发 GWINTER.NLM 的缓冲区溢出，导致服务崩溃。攻击者无需身份认证，仅需向目标服务器发送构造的 HTTP 请求即可利用。"
published = "1999-12-19"
remediation = "升级至 Novell GroupWise 5.5 后续支持包或更高版本，修复 GWWEB.EXE 的目录遍历与缓冲区溢出缺陷。若无法立即升级，应在 Netscape Enterprise Server 或前端代理中配置 URL 过滤规则，拦截 HELP 参数中包含 '../' 或 '..' 的请求，并将 GWWEB.EXE 进程权限限制在其 Web 根目录范围内，禁止越权访问其他文件系统路径。"
score = 5.0
severity = "MEDIUM"
sources = [
    "cve",
    "bugtraq",
    "exploit-db",
]
title = "Novell GroupWise 5.2/5.5 GWWEB.EXE 目录遍历与路径泄露漏洞"
