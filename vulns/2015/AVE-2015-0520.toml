[basic]
description = "Oracle Java SE 6u101、7u85 和 8u60 版本中存在的未指定漏洞，允许远程攻击者通过与部署相关的未知向量影响系统完整性。该漏洞属于拒绝服务类型，无需身份认证即可触发，攻击者可构造特制的部署包或利用 Java Web Start 组件中的缺陷，使目标系统出现服务中断或数据损坏。Oracle 已在后续安全更新中修复此问题，建议用户升级至不受影响的版本以消除风险。"
published = "2015-10-22T00:00:03.093"
remediation = "升级 Oracle Java SE 至 6u102、7u91 或 8u66 及以上版本，禁用 Java Deployment Toolkit 及 Java Plug-in 组件，通过系统部署策略阻止未签名 Java Applet 的自动执行。"
score = 5.3
severity = "MEDIUM"
sources = ["kev"]
title = "Oracle Java SE Deployment 拒绝服务漏洞"
updated = "2026-06-17T00:28:08.793"

