[basic]
description = "devalcms 1.4a 的 index.php 文件中存在反射型跨站脚本漏洞，远程攻击者可通过向 currentpath 参数注入恶意 HTML 或 JavaScript 代码触发该漏洞，当管理员或用户访问特制链接时，恶意脚本将在受害者浏览器中执行，导致敏感信息泄露（如 Cookie 窃取、会话劫持）或页面内容篡改。该漏洞无需认证即可利用，攻击复杂度较高。目前官方已停止维护，建议迁移至其他 CMS 系统。CVSS 评分 4.3，危害等级中危。"
published = "2009-08-19T05:24:52.360"
remediation = "升级 devalcms 至 1.5 或更高版本，该版本已修复 currentpath 参数未正确过滤转义导致的 XSS 问题。若厂商已停止维护，建议在 index.php 中对 currentpath 参数执行 htmlspecialchars 或 strip_tags 过滤，同时部署 WAF 规则拦截包含恶意脚本的请求作为纵深防御。"
score = 4.3
severity = "MEDIUM"
sources = ["nuclei"]
title = "devalcms 1.4a 跨站脚本漏洞"
updated = "2026-06-16T23:03:21.723"

