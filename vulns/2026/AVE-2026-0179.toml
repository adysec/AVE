[basic]
description = "天地伟业 Easy7 综合管理平台 `/Easy7/rest/workbook/queryDataByTypeEx` 接口存在 SQL 注入漏洞。该接口未对 `tabname` 参数进行有效的过滤与转义，攻击者可通过 UNION 联合查询注入技术向参数中构造恶意 SQL 语句，导致数据库敏感信息泄露。未经身份认证的远程攻击者可利用该漏洞获取数据库用户凭证、业务数据等核心信息，严重威胁系统数据安全。"
published = "20260615"
remediation = "建议联系天地伟业官方获取 Easy7 最新安全补丁，升级至修复该 SQL 注入漏洞的版本。同时，在 Web 应用防火墙上配置规则拦截 `/Easy7/rest/workbook/queryDataByTypeEx` 路径的异常 `tabname` 参数请求（如包含 SQL 关键字），并限制管理后台仅允许可信 IP 访问。开发侧应对 `tabname` 参数实施参数化查询或严格的白名单校验，杜绝拼接 SQL 语句。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "天地伟业 Easy7 queryDataByTypeEx SQL注入漏洞"
updated = "20260615"

