[basic]
description = "Cisco TACACS+ 认证服务器 tac_plus 存在缓冲区溢出漏洞，远程攻击者可通过向目标服务器发送特制的畸形数据包，其中包含超长的 length 字段，触发缓冲区溢出，导致服务器进程崩溃，造成拒绝服务。该漏洞影响 Cisco TACACS+ 相关版本，攻击者无需身份认证即可远程利用，危害等级中危。"
published = "2000-05-30T04:00:00.000"
remediation = "立即升级 Cisco TACACS+ tac_plus 服务器至修复版本（CSCds25847），或安装 Cisco 于 2000 年 5 月发布的补丁。如无法立即升级，可在网络边界防火墙配置 ACL 限制仅允许可信 IP 访问 TACACS+ 端口（TCP 49），并对入站 TACACS+ 报文进行深度包检测以拦截畸形长度字段的恶意包。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Cisco TACACS+ 缓冲区溢出拒绝服务漏洞"
updated = "2026-06-16T21:51:50.270"

