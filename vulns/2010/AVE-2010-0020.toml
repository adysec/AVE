[basic]
description = "Magic Updater (com_joomlaupdater) 是 Joomla! 的一款组件，其 index.php 文件中的 controller 参数存在目录遍历漏洞。远程攻击者可通过在 controller 参数中注入 ../ 序列来读取服务器上的任意文件，导致敏感信息泄露。该漏洞无需身份认证即可利用，攻击复杂度低，影响所有使用该组件的 Joomla! 网站。"
published = "2010-04-08T16:30:00.907"
remediation = '该组件「Magic Updater (com_joomlaupdater)」已多年未维护，官方未发布任何补丁。建议立即在 Joomla 后台扩展管理中卸载该组件；若必须保留功能，需在 controller 参数入口处过滤 `../` 和空字节 `%00` 等目录遍历字符，或在 Web 服务器（Apache/Nginx）层面添加规则拦截 controller 参数中的 `\.\.` 及空字节序列作为临时缓解措施。'
score = 5
severity = "MEDIUM"
sources = ["nuclei"]
title = "Joomla! Magic Updater 组件本地文件包含漏洞"
updated = "2026-06-16T23:18:04.173"

