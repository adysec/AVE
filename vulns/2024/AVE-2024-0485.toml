[basic]
description = "OpenSSL FIPS 模块 3.0 至 3.4 版本中的 ECDSA 签名计算存在时序侧信道漏洞。当经过逆运算的 ECDSA nonce 值最高位字为零时，会产生约 300 纳秒的时序差异，攻击者可通过精确测量签名操作的执行时间推断出私钥信息。该漏洞主要影响 NIST P-521 椭圆曲线，利用条件苛刻，攻击者需与目标位于同一物理主机或具备极低延迟的高速网络连接。CVSS 评分 4.1，危害等级中危。"
published = "2025-01-20T14:15:26.247"
remediation = "升级 OpenSSL 至修复版本：3.0.x 升级至 3.0.16+，3.1.x 升级至 3.1.8+，3.2.x 升级至 3.2.4+，3.3.x 升级至 3.3.3+，3.4.0 升级至 3.4.1+。如无法立即升级，可通过限制签名操作仅允许本地受信进程访问、避免在高延迟网络环境下使用 ECDSA P-521 曲线签名来降低攻击风险。"
score = 4.1
severity = "MEDIUM"
sources = ["msrc"]
title = "OpenSSL ECDSA 签名计算定时侧信道漏洞"
updated = "2026-06-17T07:01:23.167"

