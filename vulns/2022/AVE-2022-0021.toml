[basic]
description = "Linux 内核蓝牙子系统（hci_event）中存在空指针解引用漏洞。当蓝牙控制器针对同一连接句柄重复发送多次连接完成事件时，内核会重复注册设备，导致内存损坏。具有低权限的攻击者在相邻网络范围内可通过特制蓝牙数据包触发此漏洞，造成系统崩溃或拒绝服务。该漏洞影响 Linux 内核版本 2.6.27 至 5.17.3，CVSS 评分 5.7，危害等级中危。Linux 内核社区已通过引入 HCI_CONN_HANDLE_UNSET 标识和句柄合法性检查机制修复此问题。"
published = "2025-02-26"
remediation = "升级 Linux 内核至 5.10.110 及以上版本（或 5.15.33 及以上、5.16.19 及以上、5.17.2 及以上），该修复已合入主线。若无法立即升级，可禁用蓝牙模块（rmmod btusb）或通过内核启动参数添加 `btdisable=1` 作为临时缓解。"
score = 5
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux 内核 Bluetooth 子系统 HCI 事件处理安全漏洞"
updated = "2025-02-26"

