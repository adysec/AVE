[basic]
description = "ProFTPD 1.3.3c 官方源码包在 2010 年 11 月 28 日至 12 月 2 日期间被植入恶意后门，攻击者通过触发隐藏的 FTP 命令即可以 root 权限在服务器上执行任意 Shell 命令。该漏洞影响使用该版本源码编译安装的 ProFTPD 服务器，无需身份认证即可远程利用，CVSS 评分 9.3，属严重级别供应链投毒型漏洞。"
published = "2025-08-20T16:15:34.137"
remediation = "立即从官方渠道重新下载并升级到 ProFTPD 1.3.3d 或更高版本（1.3.3d 已移除该后门），严禁使用 2010 年 11 月 28 日至 12 月 2 日期间下载的 1.3.3c 源码包或二进制文件。升级前校验官方 GPG 签名与 SHA 校验和，确认软件完整性；若已部署受影响版本，应重置服务器凭据并检查是否存在异常 root 权限命令执行记录作为临时缓解措施。"
score = 9.3
severity = "CRITICAL"
sources = ["nuclei"]
title = "ProFTPD 1.3.3c 版本源码后门隐藏命令任意命令执行漏洞"
updated = "2026-07-15T02:16:56.140"

