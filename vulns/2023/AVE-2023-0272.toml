[basic]
description = "用友时空 KSOA 系统的 servletimagefield 接口在处理 sKeyvalue 参数时未对用户输入进行严格的过滤与参数化校验，导致攻击者可在该参数中拼接恶意 SQL 语句，造成 SQL 注入漏洞。该漏洞影响使用存在缺陷版本用友时空 KSOA 的各类企业服务端，攻击者可未经身份认证，通过构造包含特殊 SQL 片段的 HTTP 请求发送至目标服务器对应接口，进而读取、篡改后台数据库中的敏感数据，甚至在特定条件下借助数据库功能实现远程代码执行，严重危及业务系统数据安全与服务器控制权。"
published = "08.14"
remediation = "建议立即升级用友时空 KSOA 至官方发布的安全修复版本（2023年8月14日之后的补丁包），并联系用友获取 servletimagefield 接口的修复程序。如无法立即升级，可在 Web 应用防火墙（WAF）中拦截包含 SQL 关键字及单引号、union、select 等特征的请求，临时关闭或限制 servletimagefield 文件对外访问权限作为缓解措施。"
score = 5
severity = "MEDIUM"
