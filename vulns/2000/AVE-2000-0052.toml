[basic]
description = "WebSite Pro 存在目录泄露漏洞，远程攻击者无需认证即可通过向目标服务器发送特制的畸形 URL 请求，获取 Web 目录的真实物理路径信息。该漏洞可泄露服务器目录结构、文件路径等敏感信息，为攻击者后续实施更深入的攻击提供侦察基础，影响 WebSite Pro 相关版本。"
published = "2000-01-13T05:00:00.000"
remediation = "建议立即升级至 O'Reilly WebSite Professional 2.5.1 或更高版本，该版本已修复目录路径泄露问题。如无法升级，可在 Web 服务器配置中禁用目录浏览功能，并在 IIS 或反向代理层过滤包含异常路径字符（如 `%00`、`..`、`%2e%2e`）的 URL 请求。同时建议迁移至仍受支持的主流 Web 服务器软件。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "O'Reilly WebSite Professional 目录泄露漏洞"
updated = "2026-06-16T21:50:55.843"

