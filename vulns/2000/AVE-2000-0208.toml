[basic]
description = "PowerScripts PlusMail WebConsole 1.0 的 CGI 程序存在弱身份认证漏洞，远程攻击者无需知晓当前管理员密码即可通过 plusmail 脚本（通常为 /cgi-bin/plusmail）提交 new_login 参数重置管理员用户名和密码。成功利用后，攻击者可通过 Web 控制面板执行邮件列表管理、网站编辑等特权操作，完全接管服务器管理权限。"
published = "2000-01-11T05:00:00.000"
remediation = "建议升级到 PowerScripts PlusMail 修复版本（联系厂商获取 1.0 之后的补丁），或停止部署 WebConsole 组件。临时缓解措施：检查并修正密码文件权限（如 chmod 600 并归属 Web 服务专用账户），限制 WebConsole 目录仅允许可信 IP 访问，并通过 Web 服务器配置禁用匿名调用相关 CGI 接口。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "PowerScripts PlusMail WebConsole 1.0 远程身份认证绕过漏洞"
updated = "2026-06-16T21:50:56.790"

