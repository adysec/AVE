[basic]
description = "Joomla! 的 Shoutbox Pro（com_shoutbox）组件 1.3 版本中存在目录遍历漏洞，远程攻击者可通过向 index.php 的 controller 参数传递包含 `..`（点点）的恶意路径，绕过访问控制读取服务器上的任意文件。该漏洞源于组件未对用户输入的路径参数进行充分的过滤与验证，攻击者无需身份认证即可利用，结合公开的 PoC 可实现敏感信息泄露。影响范围包括使用该组件的所有 Joomla! 站点，CVSS 评分 5.0，危害等级中危。"
published = "2010-04-26T18:30:00.723"
remediation = "建议立即卸载 Joomla! Shoutbox Pro 组件，或升级到已修复路径遍历漏洞的最新版本。如无官方补丁，可直接删除或禁用 com_shoutbox 组件目录，并在 .htaccess 中添加规则过滤 `controller` 参数中的 `..` 路径遍历字符作为临时缓解。对于不再维护的第三方扩展，迁移到替代组件是最彻底的修复方案。"
score = 5
severity = "MEDIUM"
sources = ["nuclei"]
title = "Joomla Shoutbox Pro 组件目录遍历漏洞"
updated = "2026-06-16T23:18:34.317"

