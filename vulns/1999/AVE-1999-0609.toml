[basic]
description = "FuseWare FuseMail 2.7 的 POP 邮件服务存在缓冲区溢出漏洞，远程攻击者无需身份认证即可通过向 POP 服务发送超长的 USER 或 PASS 命令触发该漏洞，导致服务崩溃或执行任意代码。该漏洞 CVSS 评分 10.0，危害等级严重，影响 FuseWare FuseMail 2.7 版本。目前厂商已停止维护，建议用户迁移至其他受支持的邮件服务。"
published = "1999-09-13T04:00:00.000"
remediation = "FuseWare FuseMail 2.7 已停止维护，建议立即迁移至受支持的邮件服务器（如 Exchange、Postfix、Dovecot）。在迁移完成前，在防火墙上限制 POP 端口（110/TCP）仅允许受信任源 IP 访问，并禁用 POP 服务改用 IMAP 作为临时缓解措施。"
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "FuseWare FuseMail 2.7 POP 邮件服务缓冲区溢出漏洞"
updated = "2026-06-16T21:48:59.867"

