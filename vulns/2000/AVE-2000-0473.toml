[basic]
description = "BitchX IRC 客户端在处理 INVITE 邀请命令时存在格式化字符串漏洞，由于程序未正确过滤不受信任的字符串格式，远程攻击者可通过向目标用户发送包含特制格式字符（如 %n、%s）的频道名称邀请，导致格式化字符串被恶意解析，进而造成 IRC 客户端崩溃拒绝服务。该漏洞影响 BitchX 1.0c16 及更早版本，攻击者仅需能够发送 IRC 消息即可利用，无需身份认证，对依赖该客户端的 IRC 用户构成可用性威胁。"
published = "2000-07-04T04:00:00.000"
remediation = "升级 BitchX IRC 客户端至 1.1 及以上版本，该版本已修复格式化字符串处理漏洞。如无法升级，可通过修改源代码中处理 INVITE 消息的函数，对频道名称中的特殊格式字符（如 %n、%s）进行转义过滤后重新编译。临时缓解措施可配置客户端忽略来自不可信来源的 INVITE 请求。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "BitchX IRC Client 格式化字符串拒绝服务漏洞"
updated = "2026-06-16T21:52:04.317"

