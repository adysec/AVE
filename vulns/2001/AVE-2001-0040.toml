[basic]
description = "Infinite Interchange 3.61 的 Web 管理界面存在拒绝服务漏洞，远程攻击者无需身份认证即可向目标系统发送特制的超大 HTTP POST 请求，导致应用程序崩溃而无法响应正常请求。该漏洞影响 Infinite InterChange 3.6.1 版本，攻击条件简单，只需构造并发送一个超大的 POST 请求即可触发，危害等级中等。"
published = "2001-02-12T05:00:00.000"
remediation = "该软件已停止维护，建议迁移至受支持的替代产品。临时缓解措施：在 Web 服务器或反向代理层面限制 POST 请求体大小（如 Nginx 设置 client_max_body_size 1m），并部署 WAF 规则拦截异常大请求以降低攻击面。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Infinite InterChange 3.6.1 Web 接口拒绝服务漏洞"
updated = "2026-06-16T21:53:38.980"

