[basic]
description = "邦永 PM2 项目管理平台系统的 FlowChartDefine/ExcelIn.aspx 接口存在任意文件上传漏洞。该系统在处理 Excel 数据导入请求时，未对上传文件的类型与内容做合法性校验，攻击者可在未认证情况下构造 multipart/form-data 请求，将恶意脚本文件（如 ASPX WebShell）上传至服务器 Web 目录。成功利用后，攻击者可远程访问所上传文件实现任意代码执行（RCE），进而完全控制服务器。该漏洞影响部署邦永 PM2 项目管理平台且对外开放 ExcelIn.aspx 接口的系统，攻击仅需网络可达目标并发送特制 HTTP POST 请求即可，无需登录凭证，危害严重。"
published = "0729"
remediation = "建议立即升级邦永PM2项目管理平台至厂商已修复该任意文件上传漏洞的最新版本，并联系厂商获取安全补丁。如无法及时升级，可在Web服务器（IIS）层面对/FlowChartDefine/ExcelIn.aspx接口的multipart/form-data上传请求做文件类型与扩展名白名单校验，禁止上传.aspx/.ashx/.jsp等可执行脚本；同时配置WAF拦截非常规文件上传载荷，并限制该接口仅允许已认证用户访问以缓解风险。"
score = 5
severity = "MEDIUM"
