[basic]
description = 'oops WWW Proxy Server 1.5.2 及更早版本的 HTML 解析代码中存在缓冲区溢出漏洞，远程攻击者可通过向目标代理服务器发送包含大量双引号（"）字符的特制 HTTP 请求触发该漏洞，导致缓冲区溢出并实现任意命令执行。该漏洞影响 oops Proxy Server 1.5.2 及之前所有版本，无需身份认证即可远程利用，危害严重。'
published = "2001-02-12T05:00:00.000"
remediation = "该漏洞已由厂商在 Oops Proxy Server 1.5.3 及以上版本中修复，建议立即升级至最新版本。若厂商已停止维护，应迁移至 Squid、HAProxy 等仍在积极维护的代理服务器软件。临时缓解措施包括：在防火墙上限制仅受信任 IP 可访问代理端口（默认 1080/tcp），并在反向代理或 WAF 层对 HTTP 请求中过多的引号字符进行过滤或截断，以防止触发缓冲区溢出。"
score = 10
severity = "CRITICAL"
sources = ["exploitdb"]
title = "Oops Proxy Server 远程缓冲区溢出漏洞"
updated = "2026-06-16T21:53:31.100"

