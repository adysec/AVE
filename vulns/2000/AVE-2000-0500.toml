[basic]
description = "Microsoft Internet Explorer 4.x 及 5.x 版本中的 Active Setup ActiveX 组件存在安全绕过漏洞。远程攻击者可通过声称软件制造商为 Microsoft 的方式，诱使用户在未经提示的情况下自动安装任意软件组件。该漏洞允许攻击者绕过 ActiveX 安全策略，在用户不知情的情况下执行安装操作，导致系统安全边界被突破，影响 Windows 平台上使用受影响 IE 版本的系统。"
published = "2000-02-21T05:00:00.000"
remediation = "升级至 Internet Explorer 6.0 或更高版本，该漏洞在后续版本中已修复。如无法升级 IE 版本，可通过注册表设置 ActiveX 控件 kill bit（CLSID: {FDC2E560-0002-0001-0000-074C00000001}），禁用 Active Setup ActiveX 控件的实例化。建议在域环境中通过组策略将 ActiveX 控件安全级别设为「禁用不安全的 ActiveX 控件」，并彻底停止使用已停止安全更新的 Internet Explorer，改用 Edge 或其他现代浏览器。"
score = 7.6
severity = "HIGH"
sources = ["epss"]
title = "Microsoft Internet Explorer ActiveX 控件远程代码执行漏洞"
updated = "2026-06-16T21:51:07.510"

