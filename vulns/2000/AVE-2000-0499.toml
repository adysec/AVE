[basic]
description = "Texas Imperial Software WFTPD 2.4.1 及 WFTPD Pro 2.41 存在拒绝服务漏洞。本地攻击者可在未执行 RENAME FROM（RNFR）命令的情况下直接发送 RENAME TO（RNTO）命令，导致 FTP 服务进程崩溃或进入异常状态，造成拒绝服务。该漏洞需要攻击者拥有本地访问权限，CVSS 评分 5.0，危害等级中等。"
published = "2000-07-11T04:00:00.000"
remediation = "建议将 WFTPD 升级至 2.41 以上的最新版本，该版本已修复 RNTO 命令在未执行 RNFR 时的异常处理。如官方已停止维护，应迁移至其他活跃维护的 FTP 服务器软件（如 FileZilla Server、vsftpd 等），并在迁移前通过防火墙限制对 FTP 服务的访问来源作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Texas Imperial Software WFTPD 拒绝服务漏洞"
updated = "2026-06-16T21:52:11.140"

