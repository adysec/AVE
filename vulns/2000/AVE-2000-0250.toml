[basic]
description = "GNU Emacs 20 版本的 `read-passwd` 等 Lisp 函数在处理密码输入后未能正确清除最近按键历史记录，导致本地攻击者可通过读取按键历史缓冲区获取未加密的明文密码。该漏洞影响 GNU Emacs 20 系列版本，攻击者需具有本地系统访问权限才能利用，CVSS 评分 4.6，危害等级中危。建议升级至 Emacs 21 或更高版本以修复此问题。"
published = "2000-04-18T04:00:00.000"
remediation = "升级到 GNU Emacs 21 及以上版本，该版本已修复 read-passwd 函数未清除历史按键缓冲区的问题。如无法升级，可在输入密码后手动执行 (clear-this-command-keys) 清除按键历史，或避免在多用户共享系统上使用 Emacs 的密码输入功能。"
score = 4.6
severity = "MEDIUM"
sources = ["avd"]
title = "GNU Emacs 密码历史记录未清除本地信息泄露漏洞"
updated = "2026-06-16T21:51:22.133"

