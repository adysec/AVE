[basic]
description = "通达 OA v2014 的 /mobile/inc/get_contactlist.php 接口未进行有效的权限验证，远程攻击者无需身份认证即可通过构造特定请求参数（如 P=1、KWORD=%25、isuser_info=3）直接访问该接口，从而获取系统用户的联系方式、部门结构等敏感信息，导致敏感信息泄漏。该漏洞影响通达 OA v2014 版本，攻击者仅需知晓目标系统地址即可利用，危害中等。"
published = "0705"
remediation = "升级至通达 OA 最新版本（v11.x 及以上），该版本已对此类未授权访问接口进行全面修复。如无法升级，在 web 服务器（Apache/Nginx）中配置对 `/mobile/inc/get_contactlist.php` 的访问控制，限制仅允许已认证用户访问；同时在应用层添加 session 鉴权校验，在 `get_contactlist.php` 入口处检查用户登录状态，阻止未授权请求。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "通达 OA v2014 get_contactlist.php 敏感信息泄漏漏洞"
updated = "0705"

