[basic]
title = "SGI IRIX colorview 任意文件读取漏洞"
description = "SGI IRIX 5.1、5.2 和 6.0 版本中的 colorview 工具存在本地文件读取漏洞，本地攻击者可通过向 colorview 程序传递 -text 参数并指定任意文件路径，利用该程序未正确验证文件路径的缺陷，读取系统上任意用户可读的文件内容。该漏洞影响 SGI IRIX 5.1、5.2 和 6.0 版本，CVSS 评分 2.1（低危），属于本地权限下的信息泄露漏洞。攻击者需具备本地系统访问权限，且需能执行 colorview 程序，通过构造恶意的 -text 参数指向敏感文件（如 /etc/passwd、/etc/shadow 等），即可读取文件内容导致敏感信息泄露。SGI 已在后续版本中修复该漏洞，建议升级至修复版本或限制 colorview 程序的执行权限。"
published = "1994-08-09T04:00:00.000"
remediation = "升级 SGI IRIX 至 6.0.1 或更高版本，或通过 chmod 限制 colorview 程序执行权限（chmod 700 /usr/sbin/colorview），限制本地用户执行权限以防止任意文件读取。"
score = 2.1
severity = "LOW"
