[basic]
description = "JumpServer（开源堡垒机）的 Ansible 组件中存在 Jinja2 模板注入漏洞（CWE-94），具有后台权限的认证攻击者可通过构造恶意的 Ansible 剧本，在 Celery 容器中触发模板注入，进而执行任意代码。由于 Celery 容器以 root 权限运行且可访问数据库，攻击者可窃取所有主机的敏感信息或篡改数据库内容。该漏洞影响 JumpServer v3.0.0 至 v3.10.6 版本，CVSS 评分 9.9，危害等级严重。官方已在 v3.10.7 版本中修复此漏洞。"
published = "2024-03-29T15:15:12.223"
remediation = "建议立即将 JumpServer 升级至 v3.10.7 或更高版本以修复该 Jinja2 模板注入漏洞。如无法立即升级，可在管理后台临时禁用 Ansible 相关任务执行入口，并严格限制具有 Playbook 创建/执行权限的后台账号访问，同时通过网络策略限制 Celery 容器对数据库及宿主机的访问作为缓解措施。"
score = 9.9
severity = "CRITICAL"
sources = ["hwpoc"]
title = "JumpServer 堡垒主机 Ansible 模块 Jinja2 模板注入远程代码执行漏洞"
updated = "2026-06-17T07:22:37.197"

