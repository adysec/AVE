[basic]
description = "Cisco IOS 11.1 至 12.1 版本的 HTTP 服务存在输入验证漏洞（CWE-20）。远程攻击者无需身份认证即可向目标路由器的 HTTP 服务发送包含连续百分号（%%）的特制 URL 请求，触发服务崩溃，导致拒绝服务。该漏洞影响 Cisco 全系列路由器和交换机，CVSS 评分 7.1，危害等级高。攻击者只需知道目标设备 IP 地址即可发起攻击，利用难度低。Cisco 官方已发布安全公告，建议升级至 IOS 12.1 以上版本修复。"
published = "2000-04-26T04:00:00.000"
remediation = "升级 Cisco IOS 至 12.1(1) 或更高版本，该版本已修复 HTTP 服务对 `%%` 字符串的输入验证缺陷。如无法立即升级，可在全局配置模式下使用 `no ip http server` 命令关闭 HTTP 服务，或通过访问控制列表（ACL）限制仅允许受信任管理 IP 访问 HTTP 管理端口。"
score = 7.1
severity = "HIGH"
sources = ["avd"]
title = "Cisco IOS HTTP 服务拒绝服务漏洞"
updated = "2026-06-16T21:51:35.753"

