[basic]
description = "XMail 是一款开源邮件服务器软件，其 0.5 和 0.6 版本的 CTRLServer 组件中存在缓冲区溢出漏洞。攻击者可通过向 cfgfileget 或 domaindel 函数发送特制请求触发溢出，从而在目标服务器上以服务进程权限执行任意命令。该漏洞无需身份认证即可远程利用，CVSS v2.0 评分为 10.0，危害等级为严重。"
published = "2001-05-03T04:00:00.000"
remediation = "升级 XMail 至 0.7 及以上版本，禁用 CTRLServer 组件的 cfgfileget 和 domaindel 功能接口，并在防火墙层面限制仅受信 IP 可访问 XMail 控制端口（默认 6017）。"
score = 10
severity = "CRITICAL"
sources = ["exploitdb"]
title = "XMail CTRLServer 缓冲区溢出任意命令执行漏洞"
updated = "2026-06-16T21:53:51.137"

