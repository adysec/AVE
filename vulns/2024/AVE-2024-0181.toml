[basic]
description = "金和OA系统CarCardInfo.aspx页面存在SQL注入漏洞，攻击者可通过向/c6/JHSoft.Web.Vehicle/CarCardInfo.aspx/发送恶意构造的POST请求，在未授权情况下注入任意SQL语句，导致数据库信息泄露、数据篡改甚至服务器沦陷。该漏洞影响金和OA多个版本，利用条件为目标系统暴露该接口且无WAF防护，CVSS评分预计为高危等级。"
published = "0725"
remediation = "建议立即升级金和OA至厂商发布的安全修复版本（C6最新补丁包），并联系金和官方获取针对CarCardInfo.aspx接口SQL注入的专用补丁；若无法立即升级，可在Web应用防火墙（WAF）中拦截/c6/JHSoft.Web.Vehicle/CarCardInfo.aspx/路径的异常POST参数，同时对该接口参数进行严格白名单校验与预编译参数化查询，限制数据库账户最小权限作为临时缓解。"
