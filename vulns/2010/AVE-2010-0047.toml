[basic]
description = "Joomla! 的 TweetLA（com_tweetla）组件 1.0.1 版本中存在目录遍历漏洞，远程攻击者无需认证即可通过向 index.php 文件的 controller 参数传入包含 ..（点点）的恶意路径，实现任意文件读取，导致网站敏感信息泄露。该漏洞影响运行 Joomla! CMS 并启用该组件的网站系统，CVSS 评分 7.5，危害等级高。"
published = "2010-04-26T18:30:00.690"
remediation = '立即卸载 Joomla! 后台已安装的 TweetLA 组件（com_tweetla），或在服务器上删除 components/com_tweetla/ 目录。如仍需类似功能，选择仍在维护的替代组件。同时配置 Web 应用防火墙（如 ModSecurity）拦截路径遍历特征，规则示例：`SecRule ARGS:controller "@contains .." "id:1001,deny"`。'
score = 7.5
severity = "HIGH"
sources = ["nuclei"]
title = "Joomla! TweetLA 组件本地文件包含漏洞"
updated = "2026-06-16T23:18:34.207"

