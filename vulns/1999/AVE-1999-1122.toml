[basic]
description = "Internet Explorer 4.0 存在同源策略绕过导致的信息泄露漏洞。远程攻击者可在恶意网页中嵌入极小的 IFRAME 框架，利用 Dynamic HTML（DHTML）技术读取受害者本机上的任意文本及 HTML 文件内容，并将窃取的数据发送至攻击者控制的远程服务器。该漏洞无需任何身份认证，攻击者仅需诱导用户访问恶意网页即可触发，属于中等危害等级的信息泄露漏洞，影响 Internet Explorer 4.0 版本。"
published = "1999-12-31T05:00:00.000"
remediation = "升级 Internet Explorer 至 5.0 或更高版本（该漏洞在 IE 5.0 中已修复）。IE 4.0 已于 2001 年停止支持，建议迁移至 Microsoft Edge 或其他现代浏览器以持续获取安全更新。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Microsoft Internet Explorer 任意文件读取漏洞"
updated = "2026-06-16T21:50:30.877"

