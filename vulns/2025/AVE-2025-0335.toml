[basic]
description = "汉王e脸通系统中存在SQL注入漏洞。攻击者无需身份认证，即可向`/manage/authMultiplePeople/getGroupEmployee.do`接口的`order`参数注入恶意SQL语句，利用`UPDATEXML`函数构造报错注入，可泄露后端数据库中的敏感信息如数据库版本等。该漏洞影响汉王e脸通人脸识别考勤管理系统，攻击条件低，仅需构造特制HTTP请求即可触发，可能导致企业员工数据及系统配置信息泄露。"
published = "0704"
remediation = "联系汉王科技获取e脸通系统最新安全补丁，对getGroupEmployee.do接口的groupId和order参数实施参数化查询或预编译SQL处理，严格过滤用户输入的特殊字符。在官方修复前，可通过防火墙或反向代理限制对/manage/目录的访问，仅允许可信IP地址访问管理后台。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "汉王 汉王e脸通 getGroupEmployee.do SQL注入漏洞"
updated = "0704"

