[basic]
description = "HP-UX 10.x及更早版本中的ppl程序存在安全漏洞，本地用户可通过强制ppl程序产生core dump文件的方式获取root权限。该漏洞源于ppl程序对core dump文件的处理缺陷，攻击者无需认证即可利用，完全影响系统的机密性、完整性和可用性。"
published = "1996-11-03"
remediation = "立即应用HP安全公告HPSBUX9704-057中提供的补丁程序，或升级至已修复此漏洞的HP-UX版本。如无法升级，可移除ppl程序的setuid权限位（chmod u-s /usr/bin/ppl），以消除本地用户通过强制core dump获取root权限的攻击路径。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "HP HP-UX ppl 本地权限提升漏洞"
updated = "2026-06-16"

