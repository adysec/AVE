[basic]
description = "H3C 路由器 Web 管理界面存在远程命令执行漏洞，由于前端处理接口对用户输入的参数缺乏充分的过滤与校验，未经身份认证的攻击者可通过向目标路由器的 Web 管理页面发送特制的恶意请求，利用命令注入方式在设备底层操作系统上执行任意命令，从而完全控制目标路由器。该漏洞可导致设备被植入后门、网络流量被劫持、内网横向渗透等严重后果，攻击者仅需网络可达目标设备即可触发，利用难度低、危害较大。"
published = "0702"
remediation = "立即登录 H3C 官网软件下载页面（https://www.h3c.com/cn/Service/Document_Software/Software_Download/），根据设备型号下载并升级到最新固件版本。如暂无官方补丁，在设备上执行以下临时缓解措施：将管理 Web 服务绑定到特定管理 VLAN 或内网接口（命令：ip http source-interface 或 ip https source-interface），并在 ACL 中限制仅允许可信管理 IP 访问 Web 管理端口（默认 80/443），同时关闭非必要的 HTTP/HTTPS 服务（undo ip http enable / undo ip https enable）。定期关注新华三安全通告页面获取官方补丁。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "H3C 路由器前台远程代码执行漏洞"
updated = "0702"

