[basic]
description = "Ipswitch IMail 5.0 的 IMonitor 组件存在缓冲区溢出漏洞。远程攻击者可通过向 8181 端口发送超长字符串，触发缓冲区溢出，导致服务拒绝服务，甚至可能执行任意命令。该漏洞 CVSS 评分 10.0，危害等级严重，影响 Ipswitch IMail 5.0 版本，无需身份认证即可远程利用。"
published = "1999-03-01T05:00:00.000"
remediation = "升级到 Ipswitch IMail 6.0 或更高版本，该漏洞已在后续版本中修复。如无法升级，可在防火墙层面限制对 8181 端口的访问，仅允许可信 IP 连接 IMonitor 服务，并禁用不必要的远程管理功能作为临时缓解措施。"
score = 10
severity = "CRITICAL"
sources = ["exploitdb"]
title = "Ipswitch IMail 5.0 IMonitor 缓冲区溢出漏洞"
updated = "2026-06-16T21:49:35.570"

