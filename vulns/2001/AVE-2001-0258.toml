[basic]
description = "cfingerd 1.4.3 及更早版本中存在格式字符串漏洞，当该服务处理特制的 ident 响应时，会将用户可控的输入直接传递给 syslog 函数作为格式化字符串参数，导致攻击者可以利用格式字符串特性（如 %n、%s 等）实现任意内存读写。远程攻击者无需身份认证即可通过网络向目标 cfingerd 服务发送恶意构造的 ident 响应触发该漏洞，从而获取系统额外权限，实现完全控制目标主机。该漏洞影响 Infodrom cfingerd 1.4.3 及之前所有版本，危害严重。"
published = "2001-08-02T04:00:00.000"
remediation = "升级 cfingerd 至 1.4.4 或更高版本（该版本修复了 syslog 格式化字符串漏洞）。Debian 用户可参考 DSA-049 安全公告，通过 `apt-get update && apt-get install cfingerd` 更新。如无法立即升级，可在 inetd/xinetd 配置中注释 cfingerd 行并重启服务以临时禁用 finger 协议，或通过防火墙限制对 79/TCP 端口的访问。"
score = 9.8
severity = "CRITICAL"
sources = ["exploitdb"]
title = "Infodrom cfingerd 格式字符串漏洞"
updated = "2026-06-16T21:54:37.620"

