[basic]
description = "Matt Wright FormHandler.cgi 脚本默认配置存在任意文件读取漏洞。由于程序仅限制了对 /etc/ 目录的访问，未对其他目录进行有效过滤，远程攻击者可通过构造特制的 reply_message_attach 附件参数，读取服务器上任意文件，包括敏感配置文件。该漏洞影响使用该 CGI 脚本的 Web 服务器，CVSS 评分 5.0，危害等级中等。建议升级或禁用该脚本以规避风险。"
published = "1999-11-16T05:00:00.000"
remediation = "立即停止使用 Matt Wright 开发的 FormHandler.cgi 脚本，该脚本已停止维护且存在严重安全缺陷。建议迁移至现代 CGI 文件处理方案（如 Perl 的 CGI::Minimal 模块自行实现），并对 attachment 参数做严格白名单校验，仅允许预定义的上传目录，禁止路径穿越字符（如 ../）。如无法立即替换，可在 Web 服务器层面（Apache/Nginx）配置 location 规则拒绝访问 formhandler.cgi，或限制 reply_message_attach 参数仅接受字母数字文件名。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Matt Wright FormHandler.cgi 任意文件读取漏洞"
updated = "2026-06-16T21:49:36.223"

