[basic]
description = "bootpd（BOOTP 服务器守护进程）在 OpenBSD、FreeBSD 及 Linux 等操作系统上存在缓冲区溢出漏洞。未经身份认证的远程攻击者可通过向运行 bootpd 服务的目标发送包含异常构造的 header type 字段的特制数据包，触发缓冲区溢出，从而可能执行任意代码或导致服务崩溃。该漏洞影响提供 BOOTP/DHCP 服务的系统，攻击者无需凭据即可在远程发起利用，危害严重。建议系统管理员升级至已修复该漏洞的最新版本或应用厂商发布的安全补丁。"
published = "1998-12-04T05:00:00.000"
remediation = "立即为受影响系统应用安全补丁：OpenBSD 2.4 用户请升级至 OpenBSD 2.5 或应用 1998 年 11 月 28 日发布的 bootpd.patch（ftp://ftp.openbsd.org/pub/OpenBSD/patches/2.4/common/bootpd.patch）；FreeBSD 用户请升级至最新安全分支并更新 bootpd 端口；Linux 发行版用户请通过包管理器更新 dhcp/bootp 相关软件包。如无需 bootpd 服务，可直接在 /etc/inetd.conf 中注释掉 bootps 行并重启 inetd，或在防火墙层面禁用 UDP 67/68 端口作为临时缓解措施。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
