[basic]
description = "当 Linux 2.2.10 及更早版本（使用 ipchains）或 FreeBSD 3.2（使用 ipfw）启用网络地址转换（NAT）功能时，存在一个拒绝服务漏洞。远程攻击者可通过向目标发送带有记录路由选项的 ping 请求（ping -R），触发内核在处理 IP 记录路由选项时的异常，导致目标系统内核崩溃（kernel panic），造成服务不可用。该漏洞利用条件简单，无需认证即可远程触发，影响范围包括运行上述版本 Linux 和 FreeBSD 且启用 NAT 功能的系统。"
published = "1999-12-31T05:00:00.000"
remediation = "Linux 用户应将内核升级至 2.2.11 或更高版本（patch-2.2.11.gz 已修复 ipchains NAT 下 ping -R 导致的内核崩溃）；FreeBSD 用户应升级至 3.3 或更高版本。临时缓解措施：在 ipchains 或 ipfw 规则中丢弃携带记录路由（record-route）选项的 ICMP 数据包，或禁用 NAT 功能。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Linux Kernel 和 FreeBSD NAT 拒绝服务漏洞"
updated = "2026-06-16T21:50:13.823"

