[basic]
description = 'Microsoft IIS 4.0 和 5.0 版本在处理包含大量转义字符的 URL 请求时存在输入验证缺陷，远程未认证攻击者可通过发送包含大量转义字符的恶意 URL 请求（即 "Myriad Escaped Characters" 漏洞），导致 IIS 服务消耗过多 CPU 资源而拒绝服务。该漏洞影响 Microsoft IIS 4.0 和 5.0 版本，CVSS 评分 7.5（高危），属于输入验证不当（CWE-20）类型。攻击者无需身份认证即可远程发起攻击，通过发送大量包含转义字符的 URL 请求消耗服务器 CPU 资源，导致服务拒绝。Microsoft 已发布安全更新修复此漏洞，建议升级至修补版本或应用官方补丁。'
published = "2000-04-12T04:00:00.000"
remediation = "建议升级至 Microsoft IIS 5.0 后续版本（SP1 及以上）或 IIS 6.0，并安装 Microsoft 安全公告 MS00-078 提供的补丁（KB272760）。若无法立即升级，可在 IIS 配置中限制最大 URL 长度或在防火墙层面限制 URL 长度与转义字符数量作为临时缓解措施。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
