[basic]
description = "SGI IRIX 4.x 与 5.x 系统中的 serial_ports 管理程序在运行时信任用户自定义的 PATH 环境变量来查找并执行 ls 程序，未做路径校验。本地已登录的低权限用户可在 PATH 中植入伪造的特制 ls 程序（特洛伊木马），当 serial_ports 以 root 权限调用 ls 时便会执行该恶意程序，从而提升至 root 权限。该漏洞影响 SGI IRIX 4.x 及 5.2/5.3 等版本，攻击需本地账户访问权限，利用门槛低、危害为本地提权。"
published = "1994-10-02T04:00:00.000"
remediation = "建议升级到已修复该问题的 SGI IRIX 6.2 或更高版本，并安装 SGI 官方安全补丁（如 1999 年发布的相应补丁集）。在无法立即升级时，应以 root 身份将 serial_ports 程序中的 ls 调用路径改为绝对路径 /bin/ls，并收紧该程序 setuid 权限或限制普通用户执行权限，同时检查并清理用户环境中可疑的 PATH 值与伪造的 ls 程序作为临时缓解措施。"
score = 6.2
severity = "MEDIUM"
sources = ["epss"]
title = "SGI IRIX serial_ports 程序 PATH 环境变量信任本地权限提升漏洞"
updated = "2026-06-16T21:49:32.487"

