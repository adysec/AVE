[basic]
description = "Solaris Solstice AdminSuite 2.1 在向 NIS+ 密码表添加新用户时使用了不安全的文件权限设置，导致本地攻击者可通过修改自身的密码表条目来获取 root 权限。该漏洞允许拥有系统普通账户权限的用户利用权限配置缺陷提升至超级用户权限，影响 Solaris 操作系统的安全性和完整性。由于攻击需要本地访问权限，CVSS 评分为 6.2，危害等级中等。"
published = "1997-11-10T05:00:00.000"
remediation = "及时应用 Sun Security Bulletin #145（Sun 安全公告 145）中提供的 Solaris Solstice AdminSuite 补丁。对于 Solstice AdminSuite 2.1 及 2.2 版本，建议升级到修复此权限问题的后续版本。如无法升级，临时缓解措施为手动检查 /etc/nsswitch.conf 中 NIS+ 配置，收紧 NIS+ 口令表（passwd table）的权限设置，确保只有 root 用户具备写入权限，并移除不必要的本地用户登录权限以降低攻击面。"
score = 6.2
severity = "MEDIUM"
sources = ["avd"]
title = "Solaris Solstice AdminSuite 本地权限提升漏洞"
updated = "2026-06-16T21:50:24.700"

