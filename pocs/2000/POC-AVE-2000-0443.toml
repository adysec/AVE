[info]
author = "ave"
description = "安全检测 Allaire ColdFusion Administrator 登录页是否存在。若响应包含 PasswordProvided 表单字段且非 CF5.0 特征，则可能受 CVE-2000-0538 影响（超长密码可导致 DoS）。本 PoC 仅探测管理登录页存在性，不发送超长密码，不触发拒绝服务。"
id = "POC-AVE-2000-0443"
name = "ColdFusion Administrator 登录页长密码 DoS 检测"
severity = "medium"
tags = [
    "cve-2000-0538",
    "coldfusion",
    "dos",
]
vuln_id = [
    "CVE-2000-0538",
    "AVE-2000-0443",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/CFIDE/administrator/index.cfm"
protocol = "http"

[poc.requests.headers]
User-Agent = "AVE/1.0"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["PasswordProvided"]

[[poc.requests.matchers]]
expect = false
part = "body"
type = "word"
words = ["cf50"]

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/cfide/administrator/index.cfm"
protocol = "http"

[poc.requests.headers]
User-Agent = "AVE/1.0"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["PasswordProvided"]

[[poc.requests.matchers]]
expect = false
part = "body"
type = "word"
words = ["cf50"]
