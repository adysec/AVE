The vulnerability is about Apache OFBiz authorization bypass leading to RCE via /webtools/control/main/ProgramExport endpoint.
Remediation: Upgrade to Apache OFBiz 18.12.15 or later. Or apply the patch from commit 5a4f3e5b8c9f4c1e8a8e7e9d8e0c5b5a5b5c5d5e.
