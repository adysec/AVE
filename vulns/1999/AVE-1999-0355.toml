[basic]
description = "Microsoft IIS 4.0 默认安装附带 showcode.asp 示例脚本，该脚本未对用户输入的文件路径参数进行充分过滤，远程攻击者无需身份认证即可通过向服务器发送特制 HTTP 请求，利用该脚本读取服务器上的任意文件内容（如系统配置文件、脚本源码等），导致敏感信息泄露。该漏洞影响 IIS 4.0 及 Site Server 相关版本，攻击条件低，仅需目标开放 Web 服务即可利用。"
published = "1999-05-07T04:00:00.000"
remediation = '删除 IIS 安装目录下的 `IISSamples` 虚拟目录及 `showcode.asp` 文件（默认路径 `C:\Inetpub\IISSamples\`），并移除 `/IISsamples` 映射。如业务需要保留示例脚本，应通过 NTFS 权限限制仅管理员可访问。建议升级至 Windows Server 2003 以上版本，新版 IIS 已移除这些有风险的示例文件。'
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Microsoft IIS 4.0 showcode.asp 任意文件读取漏洞"
updated = "2026-06-16T21:48:57.140"

