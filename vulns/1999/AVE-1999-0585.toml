[basic]
description = "HP-UX 系统中的 rpc.pcnfsd 服务存在权限配置错误漏洞，远程未经身份认证的攻击者可通过修改主打印机假脱机目录的权限，获取远程 root 权限访问。该漏洞影响 HP-UX 多个版本，CVSS 评分 9.3，危害等级严重。攻击者无需认证即可远程利用，通过篡改打印机假脱机目录权限实现权限提升至 root 权限，严重威胁系统安全。建议升级至修复版本或禁用 rpc.pcnfsd 服务。"
published = "1999-02-10T05:00:00.000"
remediation = '升级 HP-UX 到最新的Patched-Up 11.11 或更高版本，并应用最新的安全补丁包。具体步骤：1. 执行"swinstall -s /somepath/hpus11v1_patch"安装补丁；2. 检查并删除不必要的rpc.pcnfsd服务，使其处于禁用状态；3. 在防火墙上配置规则，仅允许本地网络段访问rpc.pcnfsd端口；4. 验证/spool目录的权限，确保持有者为root且权限为755，禁止其他用户修改。'
score = 9.3
severity = "CRITICAL"
sources = ["epss"]
