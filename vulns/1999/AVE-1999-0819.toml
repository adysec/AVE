[basic]
description = "UnixWare 操作系统的 pkgtrans 软件包传输工具在处理输入文件时未对符号链接进行充分验证，本地低权限用户可通过创建指向敏感文件（如 /etc/shadow）的符号链接并触发该工具读取，从而绕过访问控制机制获取系统敏感信息。该漏洞影响 SCO UnixWare 7.x 等版本，CVSS 评分为 7.2，危害等级为高危。攻击者需要具有目标系统的本地登录权限才能利用此漏洞，成功利用后可能导致用户凭证泄露、系统配置文件暴露等后果。"
published = "1999-12-04"
remediation = "升级到 SCO UnixWare 已修复该问题的补丁版本；若暂无法升级，应避免以特权用户身份运行 pkgtrans 处理不可信目录，并移除工作目录中由低权限用户可控的符号链接，限制 pkgtrans 临时目录的写入权限以防止符号链接劫持。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "SCO UnixWare pkgtrans 符号链接攻击任意文件读取漏洞"
updated = "2026-07-18"

