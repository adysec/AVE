[basic]
description = "AMaViS virus scanner 0.2.0-pre4 及更早版本存在命令注入漏洞，远程攻击者可向目标邮件服务器发送包含 shell 元字符（如反引号、管道符等）的 Reply-To 字段的恶意邮件，当 AMaViS 扫描处理该邮件时，会以 root 权限执行攻击者嵌入的任意系统命令。攻击者无需身份认证即可利用此漏洞完全控制目标服务器。受影响的版本为 AMaViS 0.2.0-pre4 及之前的所有版本，该漏洞 CVSS 评分 10.0，危害等级为严重。"
published = "1999-12-31T05:00:00.000"
remediation = '该软件已停止维护，建议升级至其后续项目 amavisd-new（当前最新版 2.11.1）。若无法升级，须手动修改 scanmails 脚本，在将 sender（$2）和 receiver（$7）变量传入 mail 命令前，使用 ${var//\`/} 和 ${var//\$\(/} 等方式过滤反引号、$（ 和 ）等 shell 元字符；同时在邮件网关层面限制入站邮件头的特殊字符作为临时缓解措施。'
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "AMaViS virus_scanner 远程代码执行漏洞"
updated = "2026-06-16T21:50:35.963"

