[basic]
description = "Microsoft Internet Information Services (IIS) 4.0 SP4 在未安装特定安全修补程序的情况下存在认证绕过漏洞。远程攻击者可利用 Visual InterDev 6.0 等客户端工具绕过目标系统的身份验证机制，在无需提供有效凭据的情况下获取对受保护资源的未授权访问权限。该漏洞影响 IIS 4.0 SP4 版本，CVSS 评分 7.5，危害等级高。"
published = "1999-12-31T05:00:00.000"
remediation = "该漏洞影响 Microsoft IIS 4.0 SP4 on Windows NT 4.0，该产品线已停止支持。建议立即升级操作系统至 Windows Server 2003 及以上版本（含 IIS 6.0+），从根本上消除认证绕过风险。如暂时无法升级，应为 IIS 4.0 SP4 安装 Microsoft 官方发布的所有 SP4 安全热修复补丁，并在 IIS 管理中将目标站点的身份验证模式从「匿名访问」改为「集成 Windows 身份验证」，同时在 Web 应用程序中强制实施 ACL 权限控制。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "Microsoft Internet Information Services 安全绕过漏洞"
updated = "2026-06-16T21:50:47.373"

