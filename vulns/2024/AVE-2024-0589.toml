[basic]
description = "Linux 内核 BPF 子系统存在 bpf_link 生命周期管理缺陷，当 BPF 链接可以被安全释放时，未能正确放置关联的 BPF 程序，可能导致释放后使用（Use-After-Free）或引用计数错误。本地具有低权限的攻击者可通过加载特制 BPF 程序触发此漏洞，造成系统崩溃或权限提升。该漏洞影响 Linux 内核相关版本，但该 CVE 编号已被 Linux CNA 官方驳回，建议参考对应内核补丁进行修复。"
published = "2025-01-08T18:15:19.633"
remediation = "建议立即更新 Linux 内核至包含修复的版本：RHEL 9 用户升级至 kernel-5.14.0-611.5.1.el9_7（RHSA-2025:20518），Ubuntu 24.04 LTS 用户升级至 linux-image-6.11.0-1011.12~24.04.1（USN-7381-1），其他发行版更新至主线内核 6.13 及以上版本。更新完成后须重启系统生效。如无法立即更新，可通过限制非特权用户加载 BPF 程序作为临时缓解措施：设置 kernel.unprivileged_bpf_disabled=1。"
score = 5
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux Kernel BPF 链接安全释放漏洞"
updated = "2025-06-19T13:15:46.830"

