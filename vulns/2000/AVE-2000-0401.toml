[basic]
description = "AOL Instant Messenger（AIM）的文件传输组件存在路径信息泄露漏洞。当用户通过 AIM 的文件传输功能发送文件时，系统会将发送方本地文件系统的完整物理路径暴露给接收方。远程攻击者无需身份认证即可利用该漏洞获取目标系统的目录结构信息，为进一步攻击收集敏感信息。该漏洞影响 AOL Instant Messenger 的多个版本，攻击者只需诱导目标发送任意文件即可触发信息泄露。"
published = "2000-05-08T04:00:00.000"
remediation = 'AOL Instant Messenger 已于 2017 年 12 月 15 日正式停止服务，建议立即卸载 AIM 客户端并迁移至其他受支持的即时通讯软件（如 Slack、Microsoft Teams 等）。如因历史原因必须继续使用，可在 AIM 文件传输设置中禁用"显示文件路径"选项，并在防火墙规则中阻止 AIM 的 TCP 端口 5190 出站连接以限制文件传输功能。'
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "AOL Instant Messenger 文件传输路径泄露漏洞"
updated = "2026-06-16T21:51:36.130"

