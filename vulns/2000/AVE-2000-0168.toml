remediation = "PHP 3.x 版本已于 2000 年停止官方维护，建议立即升级至 PHP 7.4+ 或 PHP 8.x 最新稳定版本（推荐 8.2 及以上）。该漏洞在 PHP 4.0.5 版本中已修复。若短期内无法完成迁移，可通过 php.ini 设置 disable_functions 禁用 popen、exec、shell_exec、system、proc_open 等危险函数，同时配置 open_basedir 限制 PHP 可访问的目录范围，并在网络边界防火墙层限制对 PHP 应用的访问。"
