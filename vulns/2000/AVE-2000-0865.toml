[basic]
description = "Microsoft FrontPage 2000 Server Extensions 1.1 的 shtml.exe 组件存在拒绝服务漏洞。远程攻击者可通过向目标服务器发送包含标准 DOS 设备名（如 CON、NUL、AUX 等）的特制 URL 请求，导致服务器组件崩溃或停止响应，造成拒绝服务。该漏洞影响 FrontPage 2000 Server Extensions 1.1 版本，攻击无需身份认证，利用难度较低。"
published = "2000-10-20T04:00:00.000"
remediation = "微软于 2000 年发布安全公告 MS00-060，建议安装 FrontPage 2000 Server Extensions 1.1 补丁。该产品已停止支持，无法获取官方更新，建议升级至受支持的 Web 服务器平台（如 IIS 10.0 或 Apache），并禁用不必要的老旧 ISAPI 扩展 shtml.exe。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Microsoft FrontPage 2000 Server Extensions 1.1 shtml.exe 拒绝服务漏洞"
updated = "2026-06-16T21:52:19.003"

