[basic]
description = 'Microsoft IIS 5.0 存在源代码泄露漏洞，远程攻击者无需身份认证即可向目标服务器发送带有 "Translate: f" 头的 HTTP GET 请求，导致服务器返回 .ASP 等脚本文件的源代码而非执行结果。攻击者可借此获取数据库连接字符串、管理员密码、业务逻辑等敏感信息，为进一步攻击提供基础。该漏洞利用方式简单，仅需构造特制 HTTP 请求头即可触发，影响所有运行 IIS 5.0 的 Windows 服务器系统。'
published = "2000-10-20T04:00:00.000"
remediation = '立即安装 Microsoft 安全公告 MS00-058 提供的补丁（KB Q277873），或升级至 Windows 2000 Service Pack 1 及以上版本。如无法立即打补丁，可在 IIS 管理器中禁用 WebDAV 扩展（该漏洞通过 WebDAV 的 Translate 头触发），或使用 URLScan 工具拦截包含 "Translate: f" 头的 HTTP 请求作为临时缓解措施。'
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Microsoft IIS 5.0 Translate: f 源代码泄露漏洞"
updated = "2026-06-16T21:52:27.690"

