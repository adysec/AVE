[info]
author = "AVE"
description = "检测 Siemens Reliant UNIX ppd 竞争条件漏洞：ppd -T 在 /tmp/ppd.trace 创建临时文件时未进行原子化检查，本地攻击者可预创建符号链接指向目标文件（如 /etc/passwd），运行 ppd -T 后目标文件被覆写"
id = "POC-AVE-2001-0156"
name = "CVE-2001-0384 PoC"
severity = "low"
tags = ["cve-2001-0384"]
vuln_id = [
    "CVE-2001-0384",
    "AVE-2001-0156",
]

[poc]
logic = "all"

[[poc.requests]]
path = "/tmp/ppd.trace"
protocol = "file"

[[poc.requests.matchers]]
expect = true
part = "body"
regex = ".+"
type = "regex"
