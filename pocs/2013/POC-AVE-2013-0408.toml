[info]
author = "AVE"
description = "检测 Microsoft GDI+ TIFF 图像处理整数溢出漏洞，通过 HTTP 提供恶意 TIFF 文件，参考 Metasploit 模块 ms13_096_tiff"
id = "POC-AVE-2013-0408"
name = "CVE-2013-3906 PoC"
severity = "high"
tags = ["cve-2013-3906"]
vuln_id = [
    "CVE-2013-3906",
    "AVE-2013-0408",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/CVE-2013-3906.tiff"
protocol = "http"

[poc.requests.body]
content = ""
type = "raw"

[[poc.requests.matchers]]
expect = true
status = [200]
type = "status"
