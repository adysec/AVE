[basic]
description = "listmanager 2.105.1 之前版本存在缓冲区溢出漏洞。该漏洞源于软件对输入数据长度缺乏有效校验，本地攻击者可通过向目标程序传递超长输入数据触发缓冲区溢出，覆盖关键内存区域并执行任意代码，从而实现权限提升，获得系统更高控制权限。该漏洞需要攻击者具备本地账户访问权限，CVSS评分7.2，危害等级为高危。受影响用户应立即升级至2.105.1或更高版本以修复此漏洞。"
published = "2000-11-14T05:00:00.000"
remediation = "立即将 listmanager 升级至 2.105.1 或更高版本，该版本已修复缓冲区溢出漏洞。若无法升级，应立即停止使用 listmanager 或替换为其他安全的邮件列表管理软件。作为临时缓解措施，限制本地用户对 listmanager 二进制文件的访问权限（chmod 750），并确保 listmanager 进程以最小权限运行（非 root 用户）。同时启用系统级缓冲区保护机制（如 stack canary、ASLR）以增加攻击难度。"
score = 7.2
severity = "HIGH"
sources = ["cve"]
title = "Lyris ListManager 缓冲区溢出本地提权漏洞"
updated = "2026-06-16T21:52:37.550"

