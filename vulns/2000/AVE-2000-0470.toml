[basic]
description = "SuSE Linux 的 aaa_base 软件包将某些系统账户的主目录设置为 /tmp，本地用户可在 /tmp 下创建用户启动脚本（如 .profile、.bashrc 等），当这些系统账户登录或执行相关操作时会加载并执行攻击者植入的脚本，从而获得该系统账户的权限。该漏洞影响安装了有缺陷 aaa_base 包的 SuSE Linux 发行版，攻击者需具备本地访问权限并在 /tmp 目录写入恶意启动脚本，待目标系统账户登录或执行相关操作时触发代码执行，导致权限提升至对应系统账户权限，CVSS 评分 4.6（本地攻击、低复杂度、无需认证、部分机密性/完整性/可用性影响）。"
published = "2000-05-02T04:00:00.000"
remediation = "立即升级 SUSE Linux aaa_base 包到修复版本（建议升级至 SuSE 6.4 或更高版本的修复版本），通过 YaST 在线更新或从 SUSE 官方 FTP 下载修补包安装。临时缓解措施：检查 /etc/passwd 中系统账户（如 uucp、news 等）的主目录是否指向 /tmp，若是则修改为 /var/spool/该账户 等安全目录；同时设置 /tmp 目录粘滞位（chmod +t /tmp）并限制普通用户在 /tmp 创建可执行脚本的权限（chmod 1777 /tmp），防止本地用户通过放置恶意 profile 脚本劫持系统账户权限。"
score = 4.6
severity = "MEDIUM"
sources = ["avd"]
title = "Suse Linux 权限提升漏洞"
updated = "2026-06-16T21:51:43.377"

