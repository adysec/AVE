[basic]
description = "Check Point VPN-1/FireWall-1 4.1 及更早版本中模块间 S/Key 一次性密码认证机制的种子生成算法存在设计缺陷，远程攻击者无需身份认证即可通过网络对种子值进行暴力破解，从而预测并绕过一次性密码认证，获得对受保护网络的未授权访问权限。该漏洞影响 Check Point 防火墙产品，攻击复杂度低，可导致机密性、完整性和可用性部分受损。"
published = "2000-11-14T05:00:00.000"
remediation = "立即升级 Check Point VPN-1/FireWall-1 至 4.1 SP2 或更高版本（该版本已修复 S/Key 种子生成机制缺陷）。由于 4.1 系列已停止技术支持，建议迁移至受支持的 Check Point 版本（如 R80 及以上系列）。如无法立即升级，可在防火墙上配置访问控制策略，限制对 VPN-1 管理接口的源 IP 范围，并启用登录失败锁定机制以缓解暴力破解风险。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "Check Point VPN-1/FireWall-1 S/Key 认证绕过漏洞"
updated = "2026-06-16T21:52:31.430"

