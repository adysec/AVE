[basic]
description = "ICMP（Internet控制报文协议）回显请求（ping）默认允许来自任意主机的响应，导致攻击者可通过发送ICMP Echo Request报文探测目标主机是否存活，进而进行网络拓扑测绘和主机发现。该漏洞影响大量早期TCP/IP协议栈实现，攻击者无需任何认证即可远程利用，常被用作网络侦察和信息收集的前置步骤。此外，结合伪造源地址的Smurf攻击方式，该漏洞还可被用于放大反射式拒绝服务攻击（DDoS），对网络基础设施造成严重影响。缓解措施包括在网络边界防火墙限制ICMP流量、配置系统禁用ICMP回显响应。"
published = "1999-01-01T05:00:00.000"
remediation = '建议在网络边界防火墙上配置访问控制策略，阻止来自不可信来源的 ICMP echo request（类型 8）报文，仅允许来自受信监控系统的 ping 探测。在 Linux 系统上可通过 iptables 规则 `-A INPUT -p icmp --icmp-type echo-request -j DROP` 实现，在 Windows 防火墙中可勾选"阻止传入的 ICMP echo 请求"。'
score = 5
severity = "MEDIUM"
sources = ["redhat"]
title = "通用网络设备 ICMP Ping 允许任意主机访问漏洞"
updated = "2026-06-16T21:48:34.590"

