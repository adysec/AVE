[basic]
description = "XCmail 0.99.6 邮件客户端在启用自动引用功能时存在缓冲区溢出漏洞，远程攻击者可通过发送超长邮件主题行触发栈缓冲区溢出，进而在受害者机器上以当前用户权限执行任意代码。该漏洞影响 XCmail 0.99.6 版本，攻击者需诱导受害者打开或预览包含超长主题的邮件即可触发，无需用户交互即可实现远程代码执行，CVSS 评分 10.0，危害等级为严重。"
published = "1999-05-01T04:00:00.000"
remediation = "升级 XCmail 至官方已修复该缓冲区溢出问题的后续版本（0.99.7 及以上，或迁移至维护中的替代邮件客户端）。在无法立即升级时，关闭 XCmail 的 autoquote 自动引用功能，并避免打开来自不可信来源的含超长主题行的邮件作为临时缓解措施。"
score = 10
severity = "CRITICAL"
sources = ["exploitdb"]
title = "Xcmail Xcmail 0.99.6 缓冲区溢出漏洞"
updated = "2026-06-16T21:50:42.237"

