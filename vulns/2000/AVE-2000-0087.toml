[basic]
description = "SmartCart 购物车应用程序存在隐藏表单字段篡改漏洞，远程未认证攻击者可通过篡改 HTML 表单中的隐藏字段（如商品价格、数量、商品 ID 等敏感购买参数），绕过客户端验证直接提交篡改后的订单数据，导致以极低价格甚至零价格购买商品、修改订单金额或篡改其他敏感交易信息。该漏洞源于服务端未对提交的表单数据进行完整性校验与服务端价格校验，影响所有部署 SmartCart 购物车系统的电商站点，攻击者无需认证即可通过浏览器开发者工具或代理工具篡改表单提交实施攻击，CVSS 2.0 评分 7.5，属高危漏洞。"
published = "2000-02-01T05:00:00.000"
remediation = "不要在 HTML 隐藏表单字段中存放商品价格、数量、金额等敏感交易数据，改为在服务端会话或数据库中维护权威价格与库存信息；订单提交时以服务端商品 ID 重新查询价格并进行二次校验，拒绝客户端传入的价格与金额字段；对所有表单参数做完整性校验（如加签名/HMAC 校验），并记录异常订单以便审计。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "SmartCart 购物车应用 隐藏表单字段篡改漏洞"
updated = "2026-06-16T21:51:00.427"

