[basic]
description = "Netscape Messaging Server 3.54、3.55 及 3.6 版本在处理 SMTP RCPT TO 命令时存在内存耗尽漏洞。远程未认证攻击者可通过向服务器 SMTP 端口发送一系列超长的 RCPT TO 命令，导致目标系统内存资源被逐步耗尽，最终造成拒绝服务。该漏洞无需任何身份验证即可利用，攻击门槛较低，影响邮件服务的可用性。"
published = "1999-10-29T04:00:00.000"
remediation = "Netscape Messaging Server 已停止维护，建议迁移至现代邮件服务器（如 Exchange、Postfix）。如无法迁移，可在 SMTP 网关或防火墙层面限制 RCPT TO 命令长度不超过 512 字节，并对来源 IP 实施速率限制以缓解内存耗尽风险。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Netscape Messaging Server 拒绝服务漏洞"
updated = "2026-06-16T21:50:38.627"

