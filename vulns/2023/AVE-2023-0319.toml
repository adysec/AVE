[basic]
description = "红帆OA系统的newportal.asmx接口存在SQL注入漏洞。攻击者可通过向该接口发送包含恶意SQL语句的特制请求参数，在未经身份认证的情况下直接访问后台数据库。该漏洞影响使用红帆OA系统的各类企事业单位，攻击者可能借此获取敏感业务数据，甚至进一步获取服务器权限。"
published = "2023-08-08"
remediation = "建议将红帆OA升级至厂商在2023年8月8日后发布的安全版本（含该SQL注入修复补丁）。如暂无法升级，可在Web应用防火墙(WAF)中添加针对/newportal.asmx接口的SQL注入拦截规则，并限制仅内网访问该接口；同时收紧数据库账户权限，禁用高危存储过程与联合查询，作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "红帆OA newportal.asmx SQL注入漏洞"
updated = "2023-08-08"

