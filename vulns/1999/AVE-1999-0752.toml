[basic]
description = "Unix 系统存在默认账户或空密码配置漏洞，当管理员未设置密码或密码为空时，攻击者可通过 SSH 服务使用常见默认用户名（如 root、admin）进行远程登录尝试。成功登录后可获系统完全控制权限，执行任意命令。该漏洞影响大量未正确配置账户安全的 Unix/Linux 系统，利用难度低、危害严重。"
published = "1998-03-01T05:00:00.000"
remediation = "立即检查所有本地 Unix 系统账户，为每个账户设置强密码（至少 12 位，含大小写字母、数字及特殊字符）；删除或禁用无密码账户及默认测试账户；配置 `/etc/shadow` 确保密码哈希字段非空；启用 PAM 模块 `pam_pwquality.so` 强制密码复杂度策略，并在 SSH 配置中设置 `PermitEmptyPasswords no` 禁止空密码登录。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "Unix SSH 默认空口令远程登录漏洞"
updated = "2026-06-16T21:48:31.960"

