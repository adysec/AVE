[basic]
description = "通天星 CMSV6 车载定位监控平台的 `/point_manage/merge` 接口存在 SQL 注入漏洞，攻击者可通过构造恶意的 POST 请求，利用 UNION SELECT 语句结合 `INTO DUMPFILE` 功能将恶意 JSP 文件写入服务器可访问目录，从而获得远程代码执行权限。该漏洞影响通天星 CMSV6 系列车载定位监控平台，攻击者无需身份认证即可利用，危害严重。"
published = "0807"
remediation = "立即联系通天星厂商获取最新安全版本并升级 CMSV6 车载定位监控平台；在 Tomcat 层面限制 webapps/gpsweb 目录的 JSP 文件写入权限，禁止数据库用户具备 FILE 权限；部署 WAF 规则拦截 /point_manage/merge 接口的 UNION SELECT 及 INTO dumpfile 等 SQL 注入特征；若无法立即升级，临时下线该接口或添加严格的输入校验过滤特殊字符。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "通天星 CMSV6 车载定位监控平台 merge 远程代码执行漏洞"
updated = "0807"

