[basic]
description = "Netscape Professional Services FTP Server 1.3.6 存在路径遍历漏洞，远程攻击者无需身份认证即可通过 FTP 协议发送包含 `..`（点点）序列的特制请求，突破目录限制读取服务器上的任意文件。该漏洞影响该版本 FTP 服务，CVSS 评分 10.0，危害等级严重。ExploitDB 已公开该漏洞的利用方法，攻击者可获取敏感配置文件或系统文件，导致信息泄露。目前官方已停止维护，建议迁移至其他 FTP 服务软件。"
published = "2000-06-21T04:00:00.000"
remediation = "建议立即停止使用已停止维护的 Netscape Professional Services FTP Server，迁移至现代受支持的 FTP 服务器方案（如 vsftpd、ProFTPD）。在迁移完成前，应在防火墙层面严格限制对该 FTP 服务（TCP 21）的来源 IP 访问，并禁用匿名用户上传目录的写权限以缓解被用于任意文件读取的风险。"
score = 10
severity = "CRITICAL"
sources = ["exploitdb"]
title = "Netscape Professional Services FTP Server 目录遍历漏洞"
updated = "2026-06-16T21:52:02.193"

