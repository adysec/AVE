[basic]
description = 'Microsoft Outlook Express 4.27.3110 及 4.72.3120 等 4.72.3612.1700 之前版本存在拒绝服务漏洞。其 POP3 邮件处理机制存在缺陷，攻击者可构造并发送一封包含特定序列（".."）的恶意邮件，当目标用户使用 Outlook Express 收取该邮件时，客户端会错误地重新进入 POP3 命令模式，导致 POP3 会话挂起无法正常工作。该漏洞影响使用上述版本且通过 POP3 协议收发邮件的用户，攻击条件为攻击者能够向受害者发送电子邮件，利用方式是通过发送特制邮件触发客户端异常，造成邮件客户端拒绝服务，无需身份认证且用户交互为正常收信操作。'
published = "1999-05-11T04:00:00.000"
remediation = '升级到不受影响的 Microsoft Outlook Express 5.0 或更高版本；若无法立即升级，应避免使用受影响版本收取来自不可信发件人的邮件，并应用微软发布的相关安全更新（如 Windows 更新汇总），以修复 POP3 邮件处理中 ".." 序列解析缺陷。'
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Microsoft Outlook Express POP3 拒绝服务漏洞"
updated = "2026-06-16T21:49:33.953"

