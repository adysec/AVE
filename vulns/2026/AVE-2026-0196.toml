[basic]
description = "通达OA `/general/video_file.php` 接口存在任意文件上传漏洞，由于对 `path` 参数缺乏充分的路径规范化校验，攻击者可通过路径遍历将恶意文件上传至服务器任意目录，结合文件包含或直接访问上传的 webshell 可实现远程代码执行。该漏洞影响通达 OA 多个版本，CVSS 评分高，危害等级高。官方已发布 TVD-2026-15329 安全补丁，建议用户立即升级或通过限制接口仅允许内网访问、部署 WAF 规则进行缓解。"
published = "nday"
remediation = "立即安装通达OA官方发布的TVD-2026-15329安全补丁，对video_file.php的path参数实施路径规范化校验，禁止包含../等路径遍历字符；同时将/general/video_file.php接口限制为仅内网IP可访问，并在WAF层添加路径遍历拦截规则作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "通达通达OA video_file.php接口任意文件上传漏洞"
updated = "nday"

