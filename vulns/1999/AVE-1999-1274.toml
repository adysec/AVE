[basic]
description = "ePerl 2.2.12 存在任意文件读取漏洞，远程攻击者可通过向 bar.phtml 脚本传递目标文件的完整路径作为参数，读取服务器上的任意文件内容，在特定条件下还可能执行任意命令。该漏洞源于程序对用户输入的参数缺乏充分的过滤与验证，攻击者无需身份认证即可利用，影响使用 ePerl 的 Web 应用服务器。CVSS 评分 7.5，危害等级高。"
published = "1998-07-07T04:00:00.000"
remediation = "升级 ePerl 至 2.3.0 及以上版本，该版本修复了 bar.phtml 参数处理中的路径遍历问题。如无法升级，应在 Web 服务器层配置访问规则，禁止将用户输入直接传递给 bar.phtml 脚本，并实施严格的输入过滤和路径白名单校验。同时确保 Web 服务以最小权限运行，限制 ePerl 脚本可访问的文件系统范围。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "Ralf S. Engelschall ePerl 任意文件读取漏洞"
updated = "2026-06-16T21:50:26.363"

