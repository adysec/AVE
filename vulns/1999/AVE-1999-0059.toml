[basic]
description = "statd服务存在缓冲区溢出漏洞，远程攻击者可向目标系统的RPC statd服务发送特制请求触发缓冲区溢出，从而以root权限执行任意代码。该漏洞影响IBM AIX 3.2/4.1、SCO Unixware 7.1.1、SGI IRIX 5.3及Sun Solaris 2.5.1等多款Unix操作系统。"
published = "1997-12-05T05:00:00.000"
remediation = "升级操作系统至厂商已修复版本（如 AIX 4.1+、Solaris 2.6+、IRIX 6.3+）。如无法升级，在 inetd.conf 中注释掉 statd 行并重启 inetd 以禁用该服务，或在防火墙层面阻止 TCP/UDP 111 (portmap) 和 2049 (nfs) 端口的入站访问。"
score = 10
severity = "CRITICAL"
sources = ["redhat"]
title = "多款Unix系统 statd 缓冲区溢出权限提升漏洞"
updated = "2026-06-16T21:47:21.700"

