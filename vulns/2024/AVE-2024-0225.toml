[basic]
description = "蓝凌 EIS 智慧协同平台的 frm_button_func.aspx 接口存在 SQL 注入漏洞。该接口在处理 formid 参数时未对用户输入做严格过滤与预编译，攻击者可通过 GET 请求构造形如 formid=1 and 1=@@version-- 的恶意参数，将 SQL 语句拼接至后端数据库查询。影响范围为部署相关版本 EIS 智慧协同平台的系统，攻击条件为无需认证、仅需网络可达目标服务并发送 HTTP 请求。成功利用可泄露数据库版本与敏感业务数据，可能导致数据泄露及进一步入侵。"
published = "0731"
remediation = "升级到蓝凌官方发布的已修复该SQL注入的EIS智慧协同平台最新版本（请向蓝凌技术支持获取对应补丁包）；如暂无法升级，应立即在frm_button_func.aspx接口对formid参数实施整数型白名单校验与参数化查询，并在WAF中拦截含and、@@version、--等注入特征的请求作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "蓝凌EIS智慧协同平台frm_button_func.aspx SQL注入漏洞"
updated = "0731"

