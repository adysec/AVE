[basic]
description = "基于 BSD 4.4 代码实现的共享内存子系统存在设计缺陷，本地攻击者可通过调用 mmap 或 shmget 分配大量共享内存并触发页面错误，绕过系统资源限制（rlimits）导致拒绝服务。该漏洞影响 FreeBSD/NetBSD/Linux 等多种操作系统内核版本，攻击者无需特殊权限即可利用，危害等级中等。"
published = "1999-07-15"
remediation = "对于 FreeBSD 3.2 及更早版本，应用内核补丁使 mmap/shmget 系统调用检查 RLIMIT_AS 限制；对于 NetBSD 1.4 及更早版本，升级至 NetBSD 1.4.1 或更高版本；对于 Linux 2.3 及更早版本，安装 util-linux-2.9o 或更高版本并配置地址空间限制。"
score = 5.0
severity = "MEDIUM"
sources = [
    "cve",
    "avd",
]
title = "FreeBSD/NetBSD/Linux 共享内存 mmap/shmget 拒绝服务漏洞"
updated = "1999-07-15"

