[basic]
description = "KDE KTVision 0.1.1-271 及更早版本存在本地文件覆盖漏洞，攻击者可通过符号链接（symlink）将用户配置文件指向系统敏感文件，当应用程序写入配置时实际覆盖系统关键文件，从而获得 root 权限并完全控制系统。该漏洞影响 KDE 桌面环境下运行 KTVision 0.1 至 0.1.1-271 版本的 Linux 系统，攻击者需具备目标主机的本地用户访问权限，利用该漏洞可绕过权限限制直接获取最高管理员权限，危害等级严重。"
published = "2001-10-18T04:00:00.000"
remediation = "建议升级 KDE KTVision 至 0.1.1-272 或更高版本，或升级到 KDE 2.2.2 及以上版本。临时缓解措施：限制普通用户对 /tmp 目录的写入权限，或设置 sticky bit 防止符号链接攻击（chmod +t /tmp），同时限制用户对配置文件目录的写入权限。"
score = 7.2
severity = "HIGH"
sources = ["exploitdb"]
title = "KDE KTVision 文件覆盖漏洞"
updated = "2026-06-16T21:54:56.887"

