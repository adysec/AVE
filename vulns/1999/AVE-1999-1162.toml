[basic]
description = "Sun NetBeans Developer 3.0 Beta及Forte Community Edition 1.0 Beta内置的HTTP服务器未能正确按照配置文件中的IP白名单规则限制访问，当为特定IP启用服务后，任意远程攻击者无需认证即可通过HTTP 8082端口直接访问服务器根目录及所有子目录，获取IDE内部敏感信息。该漏洞在NetBeans 3.0 Beta中为默认启用状态，用户无需任何操作即可被利用。"
published = "1999-11-23"
remediation = "升级至NetBeans/Forte正式版（非Beta），该漏洞在稳定版中已修复。临时缓解措施：在项目设置的HTTP Server中将'Enable'设为False禁用内置服务器，或在全局设置中移除HTTP Server模块；同时在防火墙层面禁用端口8082的外部访问。"
score = 7.5
severity = "HIGH"
sources = [
    "cve",
    "avd",
]
title = "Sun NetBeans Java IDE HTTP服务器IP限制绕过漏洞"
updated = "2026-06-16"

