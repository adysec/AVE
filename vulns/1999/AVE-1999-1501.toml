[basic]
description = "Debian GNU/Linux 2.0 系统中 fsp 软件包（版本 2.71-10）在安装过程中会静默创建匿名 FTP 用户，且未向管理员发出任何通知。该行为导致使用 wu-ftp 等 FTP 服务的服务器在管理员不知情的情况下自动开启匿名 FTP 访问权限，任何远程攻击者均可利用该匿名账户未经认证访问服务器上的文件资源，造成敏感信息泄露。此漏洞源于软件包安装脚本的设计缺陷，影响 Debian GNU/Linux 2.0 系统，CVSS 评分 7.5，危害等级高。"
published = "1998-11-26T05:00:00.000"
remediation = "立即删除系统中由 fsp 软件包安装脚本自动创建的 ftp 匿名账户（运行 `userdel ftp`），并检查 /etc/passwd 中是否存在多余 ftp 用户条目；升级 fsp 软件包至不再自动创建 ftp 用户的修复版本，或改用 ProFTPd 替代 wu-ftpd（ProFTPd 需要手动配置才能启用匿名 FTP，不受此漏洞影响）；同时检查 wu-ftpd 等 FTP 守护进程配置，确保未意外启用匿名登录。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "Debian GNU/Linux fsp 软件包匿名 FTP 未授权访问漏洞"
updated = "2026-06-16T21:50:23.013"

