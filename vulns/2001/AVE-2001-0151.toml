[basic]
description = 'Qualcomm Eudora 5.0.2 及之前版本存在远程代码执行漏洞。当用户启用了"Use Microsoft Viewer"和"允许 HTML 内容中的可执行文件"选项后，远程攻击者可通过发送特制的 HTML 邮件，在 IMG 标签中嵌入 JavaScript 脚本、ActiveX 控件及恶意代码来触发该漏洞，导致在用户系统上执行任意代码。该漏洞影响 Eudora 5.1 之前的所有版本，CVSS 评分 7.5，危害等级高。用户需升级至 Eudora 5.1 或更高版本以修复此漏洞。'
published = "2001-06-27T04:00:00.000"
remediation = "升级 Eudora 至 5.1 或更高版本，该版本修复了通过 HTML 邮件中的 JavaScript 和 ActiveX 控件执行任意代码的问题。同时建议在 Eudora 设置中禁用「Use Microsoft Viewer」选项，并禁止 HTML 内容中的可执行文件运行，以降低攻击面。"
score = 7.5
severity = "HIGH"
sources = ["exploitdb"]
title = "Qualcomm Eudora 远程代码执行漏洞"
updated = "2026-06-16T21:54:10.193"

