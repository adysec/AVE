[basic]
description = "CuteFTP 使用弱加密算法在 tree.dat 文件中存储密码信息，导致本地攻击者可通过读取该文件并解密其中的弱加密数据，获取用户的 FTP 服务器登录凭据。该漏洞影响所有使用受影响版本 CuteFTP 的用户，攻击者需具备本地文件系统访问权限才能读取 tree.dat 文件，随后利用弱加密特性还原明文密码，进而接管受害者的 FTP 账号。CVSS 评分 5.0，属中等危害等级。"
published = "2000-01-06T05:00:00.000"
remediation = "建议立即将 CuteFTP 升级到 v8.6 及更高版本，该版本修复了 tree.dat 文件的弱加密漏洞；或在安全模式下使用新版本并重新导入密码。禁用旧版中的“兼容模式”和“明文密码存储”选项，加强认证失败后的账户锁定机制。通过 Windows Update 设置每日备份本地密码文件或使用第三方安全密码管理器，如 LastPass 1.0 等现代工具，彻底淘汰旧版 CuteFTP。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "CuteFTP 密码信息弱加密存储漏洞"
updated = "2026-06-16T21:50:58.020"

