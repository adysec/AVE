[basic]
description = "Matt Kruse Calendar Script 2.2 中的 calender.pl 和 calendar_admin.pl 脚本存在命令注入漏洞，远程攻击者无需身份认证即可通过向脚本参数中注入 shell 元字符（如反引号、管道符等）执行任意系统命令。该漏洞源于 CGI 程序未对用户输入进行有效过滤，直接传递给 shell 执行，可导致服务器被完全控制，危害严重。目前官方已停止维护，建议用户移除相关脚本。"
published = "2000-05-16"
remediation = "Matt Kruse Calendar Script 已停止维护，建议立即移除 calender.pl 和 calendar_admin.pl 脚本，或迁移至其他仍在维护的日历系统。如仍需使用，需在脚本中对用户输入进行严格的 shell 元字符过滤（如过滤反引号、$、|、; 等特殊字符），并限制 Web 服务器对该脚本的访问权限。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "Matt Kruse Calendar Script 远程命令执行漏洞"
updated = "2026-06-16"

