[basic]
description = "Linux内核DRM Meson显示驱动存在释放后使用漏洞。meson_encoder_hdmi_init和meson_encoder_cvbs_init函数在初始化时向全局bridge_list注册DRM桥接器，但在驱动模块卸载时未手动移除这些桥接器，导致全局链表中残留指向已释放内存的悬挂指针。当驱动模块重新加载时，drm_bridge_add函数遍历全局bridge_list会访问已释放的内存，触发use-after-free。该漏洞影响Linux 4.10至5.19.16及6.0至6.0.2版本，攻击者需具备本地低权限即可利用，可能造成权限提升或内核代码执行，CVSS评分7.8，危害等级高。"
published = "2025-09-15T14:15:36.363"
remediation = "将 Linux 内核升级至 5.19.17、6.0.3 或更高版本，包含对应 git commit de2b6ebe0cb7/fc1fd114dde3/09847723c12f。若无法立即升级，可在加载 meson_drm 模块前通过 blacklist 禁止自动加载（/etc/modprobe.d/blacklist.conf 中添加 blacklist meson_drm），或在内核编译时取消 CONFIG_DRM_MESON 选项以移除受影响驱动模块。"
score = 7.8
severity = "HIGH"
sources = ["msrc"]
title = "Linux Linux内核meson DRM驱动使用后释放内存漏洞"
updated = "2026-06-17T05:23:05.297"

