[basic]
description = 'Microsoft IIS 服务器默认启用了服务器端包含（SSI）文件中的 #exec 指令功能。该漏洞原理在于 Web 服务器在处理 .shtml 等 SSI 页面时，允许攻击者通过构造包含 `<!--#exec cmd="..." -->` 的页面或请求，在服务端执行任意系统命令。受影响范围为开启了 SSI 且未禁用 #exec 的 Microsoft IIS 版本（如 IIS 4.0/5.0 早期默认配置）。攻击条件为：目标站点允许上传或托管 SSI 文件、或存在可被用户控制的 SSI 解析路径，且攻击者能够向服务器提交包含恶意 #exec 指令的请求。利用方式为：攻击者将含 #exec 指令的 SSI 内容提交至目标，诱导服务器解析执行，从而在主机上以 Web 服务账户权限运行命令，可能导致信息泄露、权限提升或进一步入侵。'
published = "1999-01-01T05:00:00.000"
remediation = "在 IIS 管理器的网站属性中禁用 Server Side Include (SSI) 执行权限，或通过修改 MetaBase.xml 将 SSIEnable 设为 False。若必须使用 SSI，应删除所有 .stm/.shtml 文件中的 #exec 和 #include 指令，并在 Internet 服务管理器中将这些扩展名映射到静态文件处理器而非 ssinc.dll，同时升级到 IIS 6.0 及以上版本以获得更严格的安全默认配置。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
