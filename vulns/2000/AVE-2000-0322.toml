[basic]
description = "IC Radius 软件包存在缓冲区溢出漏洞，远程攻击者可通过向 RADIUS 认证服务发送特制的超长用户名字段触发缓冲区溢出，导致服务进程崩溃并拒绝服务。该漏洞影响 IC Radius 的早期版本，攻击无需身份认证即可远程利用，危害等级中危。修复方式为升级至已修补版本或严格限制用户名长度输入。"
published = "2000-04-24T04:00:00.000"
remediation = "立即升级 IC Radius 至最新版本，或迁移至仍在维护的 RADIUS 实现（如 FreeRADIUS）。如无法升级，在 RADIUS 服务前端部署反向代理或防火墙规则，限制仅允许可信 IP 访问 UDP 1812/1813 端口，并在应用层对用户名输入长度进行严格校验（限制不超过 64 字符）作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "IC Radius 缓冲区溢出拒绝服务漏洞"
updated = "2026-06-16T21:51:28.350"

