[basic]
description = "漏洞存在于xinetd版本2.1.8.8之前的内部字符串处理例程中。当攻击者向目标系统发送包含恶意长度参数的数据包时，该漏洞会导致整数溢出和长度检查失效，这是由于程序在处理用户输入的长度参数时缺乏有效验证。受影响的版本包括xinetd 2.1.8.8之前的版本，是广泛应用于Linux系统的网络服务守护程序，影响了多种Linux发行版上的服务器和工作站。该漏洞的攻击条件非常宽松，攻击者无需身份验证即可远程触发，只需向目标系统发送包含恶意长度参数的数据包即可。这种缺陷导致攻击者可以通过缓冲区溢出攻击在目标系统上执行任意代码，完全破坏系统的机密性、完整性和可用性，严重威胁系统的安全运行。攻击者利用精心构造的恶意数据包来触发漏洞，该数据包通过禁用长度检查机制诱使xinetd调用其内部的字符串处理函数，最终导致内存缓冲区溢出。通过溢出攻击，攻击者可以在目标系统上注入任意代码并获得完全控制权限，使系统处于攻击者的掌控之下。"
published = "2001-12-06T05:00:00.000"
remediation = "tags.<value>建议立即升级 xinetd 至 2.1.8.8 或更高版本（当前最新 2.3.15+），具体操作：1) Red Hat 系执行 `yum update xinetd`，Debian/Ubuntu 执行 `apt-get install --only-upgrade xinetd`；2) 参考 RHSA-2001-092、Conectiva CLA-2001:406、Immunix IMNX-2001-70-029-01 应用官方补丁；3) 无法立即升级时，用 iptables 限制 xinetd 监听端口仅允许受信 IP 访问，并禁用不必要的内置服务（如 telnet、ftp）；4) 检查 /etc/xinetd.conf 与 /etc/xinetd.d/ 下配置，确保 `only_from`、`no_access` 正确设置访问控制。该漏洞 CVSS 10.0，远程无需认证即可 RCE，务必优先修复。"
score = 10
severity = "CRITICAL"
sources = ["redhat"]
title = "xinetd xinetd 缓冲区溢出远程代码执行漏洞"
updated = "2026-06-16T21:55:01.847"

