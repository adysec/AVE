[basic]
description = "Microsoft WebTV for Windows 中的 annclist.exe 组件存在拒绝服务漏洞。远程攻击者无需身份认证即可向目标系统的 22701 至 22705 端口发送特制的大尺寸畸形 UDP 数据包，导致 annclist.exe 进程崩溃，造成服务不可用。该漏洞影响 WebTV for Windows 98/ME 版本，CVSS 评分 5.0，危害等级中等。攻击者只需具备网络访问能力即可触发，利用门槛低，已有公开 PoC 代码。"
published = "2000-11-14T05:00:00.000"
remediation = "该漏洞影响已停止支持的 WebTV for Windows（Windows 98/ME 时代产品），微软未发布官方补丁。建议在防火墙或网络边界设备上添加规则，阻止外部 UDP 流量访问 22701-22705 端口；如业务已不再使用 WebTV，应直接卸载该组件或升级至受支持的 Windows 操作系统版本。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Microsoft WebTV annclist.exe UDP数据包拒绝服务漏洞"
updated = "2026-06-16T21:52:33.350"

