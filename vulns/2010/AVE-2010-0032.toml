[basic]
description = "Joomla! 的 Photo Battle 组件(com_photobattle) 1.0.1 版本中存在目录遍历漏洞，远程攻击者可通过向 index.php 的 view 参数传递特制的路径序列（如 ../）实现任意文件读取。该漏洞允许未经验证的攻击者读取服务器上的敏感文件，如配置文件或系统文件，导致信息泄露。受影响的版本为 Joomla! Photo Battle 1.0.1 及可能更早版本，攻击复杂度低，无需认证即可利用。"
published = "2010-04-16T19:30:00.570"
remediation = "立即卸载 Photo Battle 组件 (com_photobattle) 1.0.1 或升级至官方修复版本；如无修复版本，应彻底卸载该组件。临时缓解措施：在 Web 应用防火墙 (WAF) 层面添加规则，过滤 view 参数中的目录遍历序列（如 ../），或在 Joomla! 入口文件对 view 参数做路径白名单校验。"
score = 5
severity = "MEDIUM"
sources = ["nuclei"]
title = "Joomla! Photo Battle 组件 本地文件包含漏洞"
updated = "2026-06-16T23:18:26.423"

