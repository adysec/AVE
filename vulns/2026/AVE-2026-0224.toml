[basic]
description = "Cisco Unified Communications 多款产品（包括 Unified Communications Manager、IM & Presence Service 等）存在代码注入漏洞。该漏洞源于对用户输入验证不充分，经过身份认证的远程攻击者可通过向受影响设备管理接口发送特制请求，导致在系统上下文中执行任意代码。攻击者利用此漏洞可完全控制目标设备，影响 CUCM 12.6 及 15 系列版本。Cisco 已发布安全更新，用户应升级至 15SU2 或 12.6(2)ES04 版本。"
published = "nday"
remediation = "将 Cisco Unified Communications Manager 升级至 15SU2 或 12.6(2)ES04 及以上工程特殊版本。如无法立即升级，在防火墙上限制对 CUCM Web 管理端口（8443/443/8080）的访问，仅允许受信任管理网段连接，并禁用非必要的对外 Web 服务接口，同时实施严格的输入验证与最小权限策略作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "Cisco Unified Communications 多产品远程代码注入漏洞"
updated = "nday"

