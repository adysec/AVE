[basic]
description = "IRIX 5.0.x 至 6.2 版本的 Desktop searchbook 程序存在不安全的文件权限设置漏洞。该程序在安装或运行过程中将用户文件（iconbook 和 searchbook）设置为全局可读写权限，导致本地普通用户可读取或修改其他用户的敏感配置数据。攻击者利用此漏洞可提升权限或窃取用户信息，影响 IRIX 桌面环境的机密性和完整性。"
published = "1996-12-05T05:00:00.000"
remediation = "立即安装 SGI 安全公告 19961201-01-PX 提供的补丁，或升级 IRIX 至 6.2 以上版本。如无法打补丁，手动执行 chmod 600 ~/.iconbook ~/.searchbook 限制文件权限，仅允许所有者读写。对于仍在运行 IRIX 的系统，建议迁移至受支持的平台，因 IRIX 已停止维护多年。"
score = 4.6
severity = "MEDIUM"
sources = ["avd"]
title = "SGI IRIX Desktop searchbook 不安全文件权限漏洞"
updated = "2026-06-16T21:50:21.713"

