[basic]
description = "McAfee VirusScan 4.5 和 NetShield 4.5 默认安装过程中为标识 AutoUpgrade 目录的注册表项设置了不安全的权限，导致本地低权限用户可将该目录中原有的 SETUP.EXE 替换为特洛伊木马程序。当系统执行自动升级时，木马即以高权限运行，从而实现本地权限提升或任意命令执行。该漏洞攻击前提为攻击者已获得本地访问权限，利用难度较低。"
published = "2000-07-11T04:00:00.000"
remediation = '立即将 VirusScan/NetShield 升级至 4.5 以上官方最新版本，该版本已修复 AutoUpgrade 注册表项（`HKLM\Software\Network Associates\TVD\VirusScan\AutoUpgrade`）权限配置问题。如无法升级，手动收紧该注册表项权限：使用 `regedit` 将该项的 ACL 修改为仅允许 Administrators 和 SYSTEM 完全控制，移除 Users/Everyone 组的写入权限。同时建议启用 Windows 组策略限制非管理员对本机注册表的写入操作作为纵深防御。'
score = 2.1
severity = "LOW"
sources = ["cve"]
title = "McAfee VirusScan 和 NetShield AutoUpgrade 目录权限许可漏洞"
updated = "2026-06-16T21:52:11.383"

