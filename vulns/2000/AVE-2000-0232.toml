[basic]
description = "Microsoft IIS 4.0 和 5.0 存在拒绝服务漏洞。远程攻击者可通过向服务器发送大量包含转义字符（百分号编码）的 URL 请求，耗尽服务器 CPU 资源导致拒绝服务。该漏洞无需身份验证即可远程利用，漏洞编号为 MS00-023。"
published = "2000-04-12"
remediation = "安装微软安全公告 MS00-023 提供的安全补丁。对于已停止支持的 IIS 4.0/5.0，建议升级至 Windows Server 2003 (IIS 6.0) 或更高版本，并部署 URLScan 或 WAF 过滤包含过多转义字符的异常 URL 请求。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "Microsoft IIS 4.0/5.0 URL 拒绝服务漏洞"
updated = "2026-06-16"

