[basic]
description = "Netscape Communicator 4.7及更早版本在处理超长证书密钥时存在安全漏洞。远程攻击者可向用户发送包含恶意超长证书密钥的服务器响应，触发缓冲区溢出，导致目标系统拒绝服务，甚至可能执行任意命令。该漏洞影响 Netscape Communicator 系列浏览器，属拒绝服务漏洞，CVSS 评分 2.6，危害等级低。"
published = "1999-10-28T04:00:00.000"
remediation = "该漏洞影响已停止支持的 Netscape Communicator 4.7 及更早版本。建议立即停止使用该软件，升级至仍受支持的现代浏览器（如 Firefox、Chrome、Edge），避免因未修复的证书解析漏洞导致拒绝服务或任意代码执行。如暂时无法升级，可在网络层面配置深度包检测（DPI）过滤异常长度的证书链流量作为临时缓解措施。"
score = 2.6
severity = "LOW"
sources = ["epss"]
title = "Netscape Communicator 长证书密钥远程拒绝服务漏洞"
updated = "2026-06-16T21:49:59.260"

