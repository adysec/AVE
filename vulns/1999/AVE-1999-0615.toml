[basic]
description = "HP Secure Web Console（HP 虚拟保险库管理控制台）在管理通信过程中使用了弱加密算法对传输数据进行保护，导致远程攻击者可通过网络嗅探捕获加密流量，并利用弱加密算法的可破解性对会话数据进行离线解密，从而获取管理员凭据等敏感信息。该漏洞影响部署了 HP Secure Web Console 的服务器设备，攻击者在无需身份认证的情况下即可实施被动窃听或中间人攻击，严重威胁系统机密性。攻击者需处于可监听目标网络流量的位置方可实施攻击。"
published = "1999-11-01"
remediation = "建议升级 HP Secure Web Console 至修复版本并启用强加密传输协议（如 TLS 1.2 及以上），禁用 SSLv3、RC4、DES 等弱加密套件。若无法立即升级，应在网络边界部署 TLS 终止代理强制使用强加密，并将管理控制台访问限制为仅允许受信任的 IP 地址。"
score = 5.0
severity = "MEDIUM"
sources = ["avd"]
title = "HP Secure Web Console 弱加密漏洞"
updated = "2026-07-17"

