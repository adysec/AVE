[basic]
description = "Nbase-Xyplex EdgeBlaster 路由器存在拒绝服务漏洞，远程攻击者无需身份认证即可通过向目标设备发送扫描 FormMail CGI 程序的特定 HTTP 请求触发该漏洞，导致路由器进程崩溃或停止响应正常网络流量。该漏洞影响 EdgeBlaster 1.0 版本，攻击者只需发送简单的 CGI 路径探测请求即可触发，无需特殊权限或复杂攻击前置条件，危害等级中等。"
published = "2000-04-05T04:00:00.000"
remediation = "Nbase-Xyplex EdgeBlaster 路由器已停产且无官方补丁，建议立即替换为受支持的替代产品。临时缓解措施：在边界防火墙上添加 ACL 规则阻断对路由器 Web 管理接口中 FormMail CGI 路径的外部访问，并限制仅管理网段 IP 可远程管理设备。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Nbase-Xyplex EdgeBlaster 路由器拒绝服务漏洞"
updated = "2026-06-16T21:51:19.953"

