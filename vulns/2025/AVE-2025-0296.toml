[basic]
description = "汉王 e 脸通综合管理平台 `updateVisitorMapConfig.do` 接口存在任意文件上传漏洞，未授权的远程攻击者可通过构造特制的 HTTP 请求向服务器上传恶意文件（如 Webshell），从而获取服务器控制权，实现远程代码执行。该漏洞影响汉王 e 脸通综合管理平台多个版本，攻击者无需任何身份认证即可利用，危害严重。"
published = "0712"
remediation = "联系厂商获取最新安全补丁或升级至最新版本；在 Web 应用防火墙 (WAF) 层面配置规则拦截对 /updateVisitorMapConfig.do 的非授权 POST 请求；在应用服务器上对该接口实施严格的文件类型白名单校验，禁止上传 jsp/jspx/php 等可执行脚本文件；将文件上传目录设置为不可执行权限。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "汉王 e脸通综合管理平台任意文件上传漏洞"
updated = "0712"

