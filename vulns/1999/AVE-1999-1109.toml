[basic]
description = "Washington University WU-FTPD 2.5.0 在处理 message 文件中的宏变量时存在缓冲区溢出漏洞。远程攻击者无需身份认证即可向目标 FTP 服务器发送特制的包含恶意宏变量的 message 文件，触发缓冲区溢出，覆盖内存中的关键数据，从而以 root 权限执行任意代码。该漏洞影响 WU-FTPD 2.5.0 及相关的 FTP 服务器软件，CVSS v2.0 评分为 10.0，攻击复杂度低，危害等级严重。攻击者只需建立 FTP 连接并上传或触发包含超长宏变量的 message 文件即可完成利用，已有公开的远程利用代码。"
published = "1999-10-01T04:00:00.000"
remediation = "WU-FTPD 已停止维护多年，官方未发布安全补丁。建议立即停止使用 WU-FTPD，迁移至受支持的替代 FTP 服务器软件，如 vsftpd 3.0.x、ProFTPD 1.3.x 或 Pure-FTPD 最新稳定版。如无法立即迁移，可在 ftpaccess 配置文件中禁用所有 message 文件处理功能，并在防火墙层面限制 FTP 服务访问来源 IP 作为临时缓解措施。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "Washington University WU-FTPD 远程缓冲区溢出漏洞"
updated = "2026-06-16T21:49:14.873"

