[basic]
description = 'Cisco IOS 9.1 及更早版本中存在访问控制列表绕过漏洞。当启用 IP 路由缓存且扩展 IP 访问列表中设置了 "established" 关键字时，设备无法正确处理已建立连接的过滤规则，导致远程攻击者可通过伪造 TCP 连接状态绕过 ACL 过滤规则，未经授权访问受保护的网络资源。该漏洞影响 Cisco IOS 9.1 及之前版本，攻击者无需身份认证即可利用，CVSS 评分 7.5，危害等级高危。Cisco 官方建议升级到不受影响版本或禁用 IP 路由缓存以缓解此漏洞。'
published = "1992-12-10T05:00:00.000"
remediation = "升级 Cisco IOS 至 9.1 之后的版本（如 9.1.2 或更高），以修复 IP 路由缓存与 established 关键字冲突导致的 ACL 绕过问题。如无法升级，可在接口上执行 `no ip route-cache` 关闭路由缓存作为临时缓解措施，或改用自反访问控制列表（reflexive ACL）替代 established 关键字。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "Cisco IOS 访问控制列表安全绕过漏洞"
updated = "2026-06-16T21:50:09.570"

