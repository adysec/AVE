[basic]
description = "Novell WebServer Examples Toolkit 2 中的 files.pl 脚本存在路径遍历漏洞，远程攻击者无需身份认证即可通过向目标服务器发送特制的 HTTP 请求，利用该脚本对文件路径过滤不严的缺陷，读取服务器上任意文件，包括配置文件、密码文件等敏感信息。该漏洞影响 Novell NetWare Web Server 3.x 版本，CVSS 评分 5.0，危害等级中危。攻击者只需能够访问目标 Web 服务即可实施攻击，利用难度较低。"
published = "2002-01-15T05:00:00.000"
remediation = "升级 Novell NetWare Web Server 到不受影响的版本（NetWare 5 及以上）。如无法升级，立即从 Web 服务器目录中删除 `files.pl` 脚本文件，同时配置访问控制规则禁止外部访问 cgi-bin 目录下的未经授权脚本。在反向代理或 WAF 层面过滤包含 `..` 目录遍历特征的请求路径作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Novell Netware Web Server 任意文件读取漏洞"
updated = "2026-06-16T21:49:40.900"

