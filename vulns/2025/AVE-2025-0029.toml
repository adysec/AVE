[basic]
description = "飞致云 DataEase 是一款开源商业智能与数据可视化工具。在 2.10.10 之前的版本中，此前针对 CVE-2025-32966 的修复补丁存在缺陷：由于该补丁仅以区分大小写的方式禁止 JDBC 连接串中的 INIT 与 RUNSCRIPT 关键字，攻击者可通过大小写变换（如 Init、runsCRIPT 等）绕过该限制。在具备数据源校验接口（如 /de2api/datasource/validate）访问权限的前提下，攻击者能构造特制的 PostgreSQL JDBC 连接参数，借助 INIT/RUNSCRIPT 执行任意 SQL 或系统命令，从而实现远程代码执行。该漏洞影响所有低于 v2.10.10 的 DataEase 版本，CVSS 评分为 8.2（高危），官方已在 2.10.10 版本中修复，暂无其他可用的临时缓解措施。"
published = "2025-06-03T21:15:22.550"
remediation = "建议立即将飞致云 DataEase 升级至 v2.10.10 及以上版本，该版本修复了针对 CVE-2025-32966 补丁的绕过问题（因大小写不敏感导致 INIT 和 RUNSCRIPT 被绕过）。升级前可在网络层临时限制对 /de2api/datasource/validate 接口的访问来源，仅允许可信管理网段访问，并关闭公网暴露的数据源校验接口以降低被利用风险。官方未提供其他可用缓解措施，请务必尽快完成版本升级。"
score = 8.2
severity = "HIGH"
sources = ["hwpoc"]
title = "飞致云 DataEase Postgresql JDBC 绕过远程代码执行漏洞"
updated = "2026-06-17T09:30:39.097"

