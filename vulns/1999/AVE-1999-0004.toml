[basic]
description = "Microsoft Windows NT 3.51/NT 4.0 的远程访问服务（RAS）与 PPTP 协议实现存在拒绝服务漏洞。远程攻击者可通过向目标系统发送特制的畸形控制数据包，导致 RAS/PPTP 服务崩溃或停止响应，造成合法用户无法正常访问远程网络资源。该漏洞影响 Windows NT 3.51 及 NT 4.0 版本，攻击者无需身份认证即可触发，利用门槛低，可导致目标系统远程访问功能完全瘫痪。"
published = "1999-06-30T04:00:00.000"
remediation = "升级 Microsoft Windows NT 4.0 至 Service Pack 4 (SP4) 或更高版本，该更新已修复 RAS/PPTP 协议处理畸形控制包导致的拒绝服务问题。对于无法升级的系统，可在防火墙层面阻止外部对 TCP 端口 1723 (PPTP) 的访问作为临时缓解措施。Windows NT 3.51 用户需升级至 Windows NT 4.0 SP4 或直接迁移至受支持的 Windows 版本。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Microsoft Windows NT RAS/PPTP 拒绝服务漏洞"
updated = "2026-06-16T21:47:40.957"

