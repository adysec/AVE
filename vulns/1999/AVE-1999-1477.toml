[basic]
description = "SunOS 4.1.3 及之前版本中 /usr/5bin/su 程序存在搜索路径安全隐患，其查找可执行文件时将当前工作目录 (.) 置于系统目录之前，导致本地攻击者可在当前目录放置特洛伊木马程序，利用 su 命令以提升的权限执行恶意代码，从而完全控制目标系统。该漏洞影响 SunOS 4.1.3 及更早版本，攻击者需拥有本地访问权限，CVSS 评分 7.2，危害等级高。"
published = "1993-09-17T04:00:00.000"
remediation = "立即安装 Sun 官方补丁 100630（可从 SunSolve 获取）修复 /usr/5bin/su 搜索路径含当前目录的问题。如无法打补丁，手动编辑 /usr/5bin/su 脚本，在调用外部命令前将 PATH 设为安全值（如 /bin:/usr/bin）并移除 '.'。亦可升级至 Solaris 2.x 或更高版本彻底规避此漏洞。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "Sun SunOS su 命令搜索路径本地权限提升漏洞"
updated = "2026-06-16T21:50:11.110"

