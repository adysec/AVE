[basic]
description = "Linux 内核 syslogd 守护进程在处理网络连接时存在拒绝服务漏洞，未经身份认证的远程攻击者可通过向目标系统发起大量并发连接请求消耗系统资源，触发 syslogd 进程崩溃或系统响应变慢，导致日志服务长时间不可用。该漏洞影响运行 syslogd 的各类 Linux 发行版，攻击条件简单，攻击者仅需使用脚本持续向目标 syslog 端口发送连接请求即可复现利用，无需任何权限或凭证。攻击成功后，系统将丧失日志记录能力，影响安全审计、故障排查及事件溯源，危害较大。"
published = "1999-11-19T05:00:00.000"
remediation = "建议将 Linux 内核升级至 2.2.13 及以上版本（含 syslogd 修复补丁），或应用各发行版对应安全更新（如 Red Hat 的 syslogd 补丁包）。如无法立即升级，可在 /etc/syslog.conf 中限制 syslogd 监听来源，使用防火墙规则限制可发起 syslog 连接的客户端 IP，并降低 syslog 服务并发连接上限以缓解拒绝服务风险。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Linux Kernel Syslog 拒绝服务漏洞"
updated = "2026-06-16T21:49:08.923"

