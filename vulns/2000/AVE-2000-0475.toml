[basic]
description = "LeafDigital LeafChat 1.7 IRC 客户端存在拒绝服务漏洞，远程 IRC 服务器可通过快速发送大量错误消息导致客户端崩溃，无法正常提供服务。攻击者只需搭建恶意 IRC 服务器并诱使目标客户端连接，即可触发该漏洞。该漏洞影响 LeafChat 1.7 版本，CVSS 评分 5.0，危害等级中危。目前暂无官方补丁发布，建议用户避免连接不可信的 IRC 服务器。"
published = "2000-06-25T04:00:00.000"
remediation = "升级至 LeafChat 1.8 及以上版本（若仍可用），或迁移至仍在维护的替代 IRC 客户端（如 HexChat、AdiIRC、mIRC v7 以上版本）。临时缓解措施：在本地 IRC 代理/弹跳器（BNC）层面限制服务器错误消息速率，或避免连接到不受信任的 IRC 服务器。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "LeafDigital LeafChat 1.7 拒绝服务漏洞"
updated = "2026-06-16T21:52:05.243"

