[basic]
description = "Windows NT 系统中的 RSH 服务（RSHSVC）存在访问控制漏洞。当用户从 .Rhosts 文件配置的授权主机发起连接时，服务未能正确校验文件中的访问限制规则，导致未经授权的攻击者可通过从受信任主机登录的方式绕过身份认证机制，非法访问 RSH 服务。该漏洞影响 Windows NT 3.5 至 4.0 版本，CVSS 评分 7.5，危害等级高。攻击者需要具备受信任主机的访问权限方可实施利用。"
published = "1999-12-31T05:00:00.000"
remediation = '建议立即升级至 Windows Server 2003 及以上受支持版本，RSH 服务 (RSHSVC) 已在后续版本中移除。如无法升级，在 Windows NT 4.0 中通过服务管理器 (services.exe) 停止 RSH 服务并将启动类型设为"禁用"，同时在防火墙策略中阻止 TCP 514 端口入站连接以彻底阻断攻击面。'
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "Microsoft Windows NT RSH 访问控制漏洞"
updated = "2026-06-16T21:50:28.633"

