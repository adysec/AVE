[basic]
description = "Microsoft Site Server Commerce Edition 3.0 alpha 版本的 Ad Server Sample 目录（AdSamples）存在不当配置问题，未经身份认证的远程攻击者可直接通过 HTTP 访问该目录下的 SITE.CSC 文件，从而获取其中包含的 SQL 数据库连接字符串等敏感配置信息。攻击者无需任何凭据即可利用此漏洞，成功后可获得后端数据库凭据，进而可能访问或操作数据库内容，造成进一步的信息泄露或破坏。"
published = "1999-05-11"
remediation = "立即删除或限制 IIS 中 AdSamples 示例目录（默认路径 /AdSamples/）的匿名访问权限，移除其中的 SITE.CSC 文件以避免泄露 SQL 数据库连接信息。建议卸载 Site Server 3.0 附带的所有示例应用程序，并在生产环境中禁止部署演示代码，同时通过 NTFS 权限限制对该目录的访问。"
score = 5.0
severity = "MEDIUM"
sources = ["cve"]
title = "Microsoft Site Server Commerce Edition 3.0 alpha AdSamples 目录敏感信息泄露漏洞"
updated = "2026-07-16"

