[basic]
description = "IIS 4.0 存在信息泄露漏洞，远程攻击者可通过向服务器发送针对不存在的 .ida 或 .idq 扩展名文件的 HTTP 请求，获取 Web 文档根目录的真实物理路径。该漏洞可帮助攻击者进一步探测目标服务器系统结构及文件布局，为后续渗透攻击提供信息支撑。此漏洞影响 Microsoft IIS 4.0 版本，攻击复杂度低，无需身份认证，危害等级中危。"
published = "2000-01-11T05:00:00.000"
remediation = "立即将 IIS 4.0 升级至 IIS 6.0 或更高版本（IIS 4.0 已停止支持多年，无法通过补丁修复）。同时移除 IIS 中 .ida/.idq 的应用程序映射（网站属性 → 主目录 → 配置 → 删除 .ida/.idq 映射），并将 IIS 错误模式改为「自定义错误页」以隐藏真实路径。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Microsoft IIS 4.0 物理路径泄露漏洞"
updated = "2026-06-16T21:50:56.437"

