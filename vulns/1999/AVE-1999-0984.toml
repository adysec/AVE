[basic]
description = "Sendmail 8.12.6 等多个开源软件的分发服务器遭入侵，攻击者将木马版本替换了原始软件包，用户在下载安装后即被植入后门。受影响的软件包括 TCP Wrappers 7.6、util-linux 2.9g、wu-ftpd 2.2/2.1f、ircII 2.2.9、OpenSSH 3.4p1 及 Sendmail 8.12.6。该漏洞属于供应链投毒攻击，攻击者可在软件分发环节植入恶意代码，导致用户系统被完全控制，危害极大。"
published = "1999-01-01T05:00:00.000"
remediation = "立即升级 Sendmail 至 8.12.7 或更高版本（如 8.15.2 等长期支持版本），并从官方站点 sendmail.org 重新下载验证过签名的源码包；无法立即升级时，请从可信镜像站重新获取源码并校验 PGP 签名（PGP 密钥 ID：0x7B7C7C7C），同时在防火墙层面限制 25 端口仅对可信中继开放，禁止直接暴露在公网。升级后务必重新编译安装并重启 sendmail 服务。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "Sendmail/TCP Wrappers/OpenSSH 等多款开源软件分发点木马后门漏洞"
updated = "2026-06-16T21:48:47.763"

