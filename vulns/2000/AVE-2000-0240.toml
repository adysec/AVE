[basic]
description = "RealNetworks RealServer 在处理端口 7070 上的服务请求时存在输入验证缺陷，远程攻击者无需身份认证即可向目标服务器发送特制的畸形数据包，触发服务组件崩溃从而导致拒绝服务。该漏洞影响 RealNetworks RealServer 7.0 及更早版本，包括 Pro 版本，CVSS 评分 7.8，危害等级高。厂商已发布安全公告建议用户升级至最新版本或配置防火墙限制对端口 7070 的访问。"
published = "2000-04-20T04:00:00.000"
remediation = "RealNetworks RealServer 7.0 及更早版本已停止维护。建议立即升级至 RealServer 8.0 以上版本（若许可证有效）以修复该漏洞；如无法升级，应在网络防火墙中配置 ACL 规则，仅允许内部受信 IP 访问 TCP 7070 端口，同时部署 IPS/IDS 设备检测并拦截发送至 7070 端口的畸形数据包。"
score = 7.8
severity = "HIGH"
sources = ["epss"]
title = "RealNetworks RealServer 拒绝服务漏洞"
updated = "2026-06-16T21:51:22.260"

