[basic]
description = "OpenBSD 2.4 系统在启用 DDB（内核调试器）的情况下，其 i386 架构的 trace-trap 处理机制存在安全缺陷。本地攻击者可通过触发特定的追踪陷阱（trace-trap）导致系统内核崩溃，造成拒绝服务。该漏洞影响 OpenBSD 2.4 版本，需要攻击者拥有本地系统访问权限，无法远程利用，CVSS 评分 2.1，危害等级低。"
published = "2001-03-12T05:00:00.000"
remediation = "升级至 OpenBSD 2.5 或更高版本，该版本已修复 i386 跟踪陷阱处理中的拒绝服务漏洞。如无法升级，在编译内核时移除 DDB 选项（`option DDB`），禁用内核调试器以消除攻击面。限制本地用户对系统的交互式访问权限亦可作为临时缓解措施。"
score = 2.1
severity = "LOW"
sources = ["avd"]
title = "OpenBSD 2.4 DDB 本地拒绝服务漏洞"
updated = "2026-06-16T21:51:26.870"

