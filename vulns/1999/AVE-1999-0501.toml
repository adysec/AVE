[basic]
description = "Sun Solaris 7.0 系统中的 lpset 程序存在缓冲区溢出漏洞，本地用户可通过向该程序提交特制的输入数据触发缓冲区溢出，从而覆盖内存中的关键数据，成功利用此漏洞可获得 root 权限，实现本地权限提升。该漏洞影响 Sun Solaris 7.0 版本，攻击者需拥有本地系统访问权限，利用难度较低，危害严重。"
published = "1999-05-11"
remediation = "升级 Sun Solaris 至 7.0 及以上补丁版本，或迁移至受支持的 Solaris 8/9/10 版本。如无法升级，建议限制 /usr/bin/lpset 的 setuid 权限（chmod 0500 /usr/bin/lpset）并移除不必要的用户对 lpset 的执行权限作为临时缓解。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Sun Solaris 7.0 lpset 本地缓冲区溢出漏洞"
updated = "1999-05-11"

