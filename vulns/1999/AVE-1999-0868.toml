[basic]
description = "Seattle Labs Emurl 2.0 及早期版本将邮件附件存储在启用脚本执行权限的特定目录中，攻击者可发送包含恶意 ASP 脚本的邮件附件，诱导收件人打开邮件查看附件时触发服务器端 ASP 代码执行，导致远程代码执行。该漏洞影响 Seattle Labs Emurl 2.0 及更早版本，CVSS 评分 7.5（高危），攻击者需诱导用户打开恶意邮件附件即可触发远程代码执行，攻击门槛较低，危害严重。"
published = "1999-07-28T04:00:00.000"
remediation = "升级 Seattle Labs Emurl 至已修复该问题的后续版本（2.0 以上官方补丁版），并修改邮件附件存储目录的 Web 服务器配置，禁用该目录的脚本执行权限（关闭 ASP 执行映射），同时配置邮件网关在投递前剥离或重命名可疑脚本类附件（如 .asp），作为无法立即升级时的临时缓解措施。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
