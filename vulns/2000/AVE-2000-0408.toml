[basic]
description = "Infopop Ultimate Bulletin Board（UBB）论坛系统中存在命令注入漏洞，远程攻击者无需身份认证即可在发表主题时通过隐藏字段（topic hidden field）注入shell元字符，成功利用可导致服务器端任意命令执行，完全控制目标系统。该漏洞影响UBB全版本，CVSS评分10.0，危害等级严重。建议立即升级至不受影响版本。"
published = "2000-02-11T05:00:00.000"
remediation = "升级至 Ultimate Bulletin Board 5.14 或更高版本，该版本已对 topic 隐藏表单字段进行 shell 元字符过滤。手动缓解措施：编辑 UBB CGI 脚本，在将所有用户输入（尤其是 topic 字段）传递给 system/popen 等调用之前，过滤掉 | ; ` $ ( ) 等 shell 特殊字符。UBB 已于 2000 年代停止维护，建议迁移至现代活跃维护的论坛系统。"
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "Infopop Ultimate Bulletin Board 远程代码执行漏洞"
updated = "2026-06-16T21:51:05.100"

