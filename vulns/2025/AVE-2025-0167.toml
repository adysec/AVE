[basic]
description = "科讯新职教网校系统的 checkPayStatus 接口存在 SQL 注入漏洞，攻击者可在未经身份认证的情况下向该接口注入恶意 SQL 查询语句，从而绕过权限控制获取数据库中的敏感信息，包括用户凭证、订单数据等。该漏洞影响科讯新职教网校系统全版本，攻击条件低，仅需目标系统可访问即可利用，危害较大。"
published = "0723"
remediation = "请联系科讯官方获取最新安全补丁；同时由开发团队对 checkPayStatus 接口中所有传入参数改用参数化查询（PreparedStatement）或 ORM 内置绑定变量，禁止直接拼接 SQL 字符串；在 WAF 侧添加针对该接口的 SQL 注入拦截规则，过滤单引号、union、sleep 等危险关键字；数据库账户按最小权限原则配置，避免 Web 应用使用高权限数据库连接。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "科讯新职教网校系统checkPayStatus SQL注入漏洞"
updated = "0723"

