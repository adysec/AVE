[basic]
description = "理正企业综合管理系统 LzMIS 存在任意 SQL 语句执行漏洞，攻击者无需身份认证即可通过向 `/ajax/LeadingMIS.CustomExp.AjaxExp,LeadingMIS.CustomExp.ashx` 接口发送特制的 POST 请求，利用 `strSQL` 参数直接执行任意 SQL 语句，可导致数据库信息泄露、数据篡改甚至服务器被控制。攻击条件低，仅需目标系统开放 Web 服务即可远程利用。"
published = "0704"
remediation = "升级理正企业综合管理系统至最新版本，对 /ajax/LeadingMIS.CustomExp.AjaxExp,LeadingMIS.CustomExp.ashx 接口实施严格的输入参数过滤与预编译语句绑定，避免直接拼接 SQL 语句；同时限制该接口仅允许内部可信 IP 访问，并移除高风险 _method=ExecSQLScalarToString 功能。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "理正企业综合管理系统LzMIS SQL注入漏洞"
