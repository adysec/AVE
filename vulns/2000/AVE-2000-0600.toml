[basic]
description = "DNSTools 1.0.8 及 1.10 版本的 CGI 应用程序在处理用户输入时，未对 host_name 和 domain_name 等参数进行任何转义或过滤，直接传递给 system() 函数调用。远程攻击者可通过在参数中注入 shell 元字符（如双引号、分号、管道符等），绕过预期逻辑，在目标服务器上以 Web 服务器权限执行任意系统命令。攻击无需身份认证，可远程发起，CVSS v2.0 评分 10.0，危害等级严重。"
published = "2000-03-02"
remediation = "DNSTools 已停止维护，建议立即卸载该软件或删除所有 CGI 脚本文件。如必须使用，应对 host_name 和 domain_name 等 CGI 参数进行严格输入验证，过滤 shell 元字符（;|&`$(){}[]<>），并限制 Web 服务器运行权限为最低权限账户。"
score = 10.0
severity = "CRITICAL"
sources = [
    "cve",
    "exploitdb",
]
title = "DNSTools CGI 应用程序命令注入漏洞"
updated = "2024-06-16"

