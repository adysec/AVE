[basic]
description = "GnuPG (gpg) 1.0.3 版本在处理包含多个文档的签名文件时存在签名验证缺陷，未能正确校验除第一个文档外所有文档的签名信息。远程攻击者可通过构造特制的多文档签名文件，在无需破解合法签名的情况下篡改后续文档内容而不被检测。该漏洞影响使用 GnuPG 1.0.3 进行多文档签名验证的系统，CVSS 评分 7.5，危害等级高，可能导致数据完整性被破坏。"
published = "2000-12-19T05:00:00.000"
remediation = "升级 GnuPG 至 1.0.4 或更高版本，该版本已修复多文档签名校验不完整的问题。如无法升级，应避免直接信任多文档签名文件中的非首文档内容，建议对每个文档单独验证签名后再使用。"
score = 7.5
severity = "HIGH"
sources = ["redhat"]
title = "GnuPG gpg 多文档签名验证绕过漏洞"
updated = "2026-06-16T21:52:53.400"

