[basic]
description = "Linux 内核 DRM DP MST 子系统的 `drm_dp_mst_handle_up_req()` 函数中存在空指针解引用与释放后使用漏洞。当一个线程处理 MST 上行请求消息时，另一线程可能通过 `drm_dp_mst_topology_mgr_set_mst(false)` 移除 MST 拓扑结构，释放 `mst_primary` 指针并置为 NULL，导致并发访问时出现空指针解引用或释放后使用，可能造成本地权限提升或系统崩溃。攻击者需具备本地低权限即可利用，影响使用 Linux 内核的各类系统。"
published = "2025-01-11T13:15:29.743"
remediation = "建议立即升级 Linux 内核至至少 6.1.82 版本或以上；如果使用 Ubuntu 22.04 LTS，请执行 `sudo apt update && sudo apt install linux-generic-hwe-22.04` 进行内核升级；Ubuntu 24.04 LTS 执行 `sudo apt update && sudo apt install linux-generic-hwe-24.04`。如无法立即升级，可通过在内核启动参数中添加 `drm_dp_mst_topology_mgr_set_mst=0` 禁用 MST 功能作为临时缓解措施（需重新启动生效），但会导致多显示器 MST 链路不可用，适用于低风险环境。"
score = 7.8
severity = "HIGH"
sources = ["msrc"]
title = "Linux Linux Kernel DRM DP MST 释放后使用漏洞"
updated = "2026-06-17T08:14:03.557"

