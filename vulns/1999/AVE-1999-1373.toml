[basic]
description = "Flavio Veloso Nobo 1.2 存在拒绝服务漏洞，远程攻击者可通过向目标系统发送一系列特制的大尺寸 UDP 数据包，导致 Nobo 服务进程崩溃，造成拒绝服务。该漏洞无需身份认证即可远程触发，攻击条件简单，仅需构造并发送大量异常 UDP 报文即可实现。受影响版本为 Nobo 1.2，CVSS 评分 5.0，危害等级中危。"
published = "1999-02-04T05:00:00.000"
remediation = "Nobo 1.2 已停止维护，官方不再提供补丁。建议在网络边界防火墙或主机 iptables 中添加规则丢弃超过 1024 字节的 UDP 数据包，并对目标端口实施 UDP 速率限制（如 iptables -A INPUT -p udp --dport 137 -m length --length 1024:65535 -j DROP），同时迁移至替代软件以彻底消除风险。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Flavio Veloso Nobo 1.2 UDP 数据包拒绝服务漏洞"
updated = "2026-06-16T21:49:52.033"

