[basic]
description = "Apache Axis2 存在默认管理员口令漏洞，其 admin 账户默认密码为 axis2。攻击者可通过该默认凭证登录 Axis2 管理控制台，上传恶意打包的 Web 服务（.aar 文件）实现远程代码执行。该漏洞影响 SAP BusinessObjects Enterprise XI 3.2、CA ARCserve D2D r15 等集成 Axis2 的产品，CVSS 评分 10.0，危害等级严重。建议修改默认口令或禁用管理控制台以进行修复。"
published = "2010-10-18T17:00:03.457"
remediation = "针对 Apache Axis2 默认口令漏洞，建议立即修改 Axis2 admin 账户默认密码（原为 axis2），在 axis2.xml 或配置界面中设置强密码；SAP BusinessObjects 用户需应用 SAP Security Note 1432881 更新 dswsbobje.war 组件；CA ARCserve D2D r15 用户应安装最新安全补丁；同时通过防火墙限制对 Axis2 服务端口（如 8080/8443）的访问，仅允许可信 IP 调用管理接口。"
score = 10
severity = "CRITICAL"
sources = ["nuclei"]
title = "Apache Axis2 默认管理员口令漏洞"
updated = "2026-06-16T23:15:44.017"

