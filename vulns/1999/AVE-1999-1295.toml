[basic]
description = "SATAN 1.1.1 的 rex.satan 脚本在创建临时文件时使用了固定的绝对路径 /tmp/rex.$$，本地用户可通过预先创建指向目标文件（如系统关键文件或其他用户文件）的符号链接，使 rex.satan 脚本在运行时将内容写入该链接所指向的文件，从而实现任意文件覆盖。攻击者需具备本地访问权限且在目标用户运行 SATAN 之前完成符号链接的布置，可能导致权限提升或破坏系统完整性。"
published = "1998-06-26"
remediation = "避免使用固定的 /tmp/rex.$$ 绝对路径创建临时文件，改用 mkstemp 等安全临时文件生成方式，或采用相对路径（如 ./rex.$$）并配合 O_EXCL 标志创建文件；如无法升级，请以受限权限运行 SATAN 并清理 /tmp 下相关临时文件。"
score = 7.2
severity = "HIGH"
sources = [
    "cve",
    "avd",
]
title = "SATAN 1.1.1 rex.satan 符号链接任意文件覆盖漏洞"
updated = "2026-06-16"

