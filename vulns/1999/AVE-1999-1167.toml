[basic]
description = "Knox Software Arkeia 备份产品中的 nlservd 和 rnavc 组件存在缓冲区溢出漏洞。攻击者可通过设置超长 HOME 环境变量触发缓冲区溢出，成功利用可获取 root 权限。该漏洞影响 SuSE Linux 6.2 等多个操作系统平台。"
published = "1999-09-23"
remediation = "升级到 Knox Software 官方修复版本，或移除 nlservd 和 rnavc 的 SUID 权限位以防止本地提权。"
