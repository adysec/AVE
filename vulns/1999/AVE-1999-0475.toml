[basic]
description = "Microsoft Windows NT 4.0 Resource Kit 中的 telnet 工具存在拒绝服务漏洞，远程攻击者通过建立 telnet 连接后立即关闭连接，可导致目标系统 telnet 服务崩溃无法响应。该漏洞影响 Windows NT 4.0 系统及 Resource Kit 组件，无需认证即可远程触发，利用难度低。"
published = "1999-01-01T05:00:00.000"
remediation = '微软已终止对 Windows NT 4.0 的支持，官方不再提供安全更新。建议将系统升级到受支持的 Windows Server 版本（如 Windows Server 2019/2022）；若无法升级，立即通过服务管理器停止并禁用 Telnet 服务（services.msc → Telnet → 启动类型设为"禁用"），同时在网络防火墙中阻止对 TCP 23 端口的入站连接，以降低拒绝服务攻击风险。'
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "Microsoft Windows NT 4.0 Resource Kit Telnet 拒绝服务漏洞"
updated = "2026-06-16T21:48:04.357"

