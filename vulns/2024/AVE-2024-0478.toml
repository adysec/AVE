[basic]
description = "libtasn1 库在处理特定证书数据时存在解码效率低下的缺陷。当处理证书中大量元素时，libtasn1 的解析时间显著增加，导致系统响应缓慢甚至崩溃。远程攻击者可通过向目标系统发送特制的证书文件触发该漏洞，造成拒绝服务攻击。该漏洞影响使用 libtasn1 库的各类应用和服务，CVSS 评分 5.3，危害等级中危。"
published = "2025-02-10T16:15:37.260"
remediation = "将 libtasn1 升级至 4.20.0 或更高版本。Red Hat 发行版用户安装对应安全更新：RHEL 8 升级至 libtasn1-4.13-5.el8_10（RHSA-2025:4049），RHEL 9 升级至 libtasn1-4.16.0-9.el9（RHSA-2025:7077）。Debian/Ubuntu 用户通过包管理器更新至修复版本。无法立即升级时，在应用层限制证书中 Subject Alternative Name 和 Name Constraints 字段数量，或通过 cgroups 限制 libtasn1 进程的 CPU 使用率作为临时缓解。"
score = 5.3
severity = "MEDIUM"
sources = ["msrc"]
title = "GNU libtasn1 DER解码低效导致拒绝服务漏洞"
updated = "2026-06-30T03:16:39.960"

