[basic]
description = "Solaris 7 和 Solaris 8 系统中的 ximp40 共享库存在缓冲区溢出漏洞。本地攻击者可通过向进程传递超长的 arg0（进程名）参数触发该溢出，从而获取 root 权限。该漏洞影响 Solaris 7 和 Solaris 8 操作系统，CVSS 评分 7.2，危害等级高。攻击者需具备本地系统访问权限，利用难度较低，建议用户及时安装厂商补丁。"
published = "2001-05-03T04:00:00.000"
remediation = "针对 Solaris 7 安装补丁 107256-xx（x86 平台 107257-xx），针对 Solaris 8 安装补丁 108869-xx（x86 平台 108870-xx）。如无法立即打补丁，可通过 chmod 移除 ximp40 库的 setuid 权限或限制本地用户登录作为临时缓解措施。"
score = 7.2
severity = "HIGH"
sources = ["exploitdb"]
title = "Sun Solaris 7/8 ximp40 共享库缓冲区溢出漏洞"
updated = "2026-06-16T21:53:47.500"

