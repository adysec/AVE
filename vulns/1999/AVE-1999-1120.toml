[basic]
description = "miniSQL 数据库套件中的 w3-auth CGI 程序存在缓冲区溢出漏洞，远程攻击者可通过向目标服务器发送包含超长 URL 或超长 User-Agent MIME 头的特制 HTTP 请求触发该漏洞，导致任意命令执行。该漏洞影响启用 w3-auth CGI 的 miniSQL 部署，CVSS 评分 7.5，危害等级高。"
published = "1999-09-30T04:00:00.000"
remediation = "立即升级 mSQL（miniSQL）至 3.0 或更高安全修复版本。如无法升级，移除或禁用 w3-auth CGI 脚本（通常位于 cgi-bin/w3-auth），或通过 Web 服务器配置（如 Apache 的 <Location> 或 .htaccess）限制其访问来源 IP 范围。临时缓解措施可在 Web 服务器上禁用 HTTP 基本认证（Basic Auth）的转发，因为该漏洞利用需要 HTTP_AUTHORIZATION 环境变量已设置。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "Hughes Technologies miniSQL w3-auth 缓冲区溢出远程代码执行漏洞"
updated = "2026-06-16T21:50:30.497"

