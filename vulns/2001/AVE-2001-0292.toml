[basic]
description = "FCron 在 1.1.1 版本之前存在符号链接漏洞，其 fcrontab 命令在处理临时文件时未对临时文件路径进行安全检查。具有本地账户的攻击者可在系统临时目录中预先创建指向其他用户 crontab 文件的符号链接，当该用户执行 fcrontab 编辑操作时， FCron 会错误地将调度配置写入符号链接所指向的其他用户的 crontab 文件中，从而导致其他用户的计划任务配置被篡改或破坏，可实现跨用户的权限提升或服务中断。"
published = "2001-09-20T04:00:00.000"
remediation = "升级 FCron 至 1.1.1 或更高版本，该版本已修复临时文件符号链接漏洞，引入安全的临时文件创建机制防止被攻击者利用。如暂无法立即升级，可将 fcron 临时文件目录（/var/spool/fcron/）权限设置为仅 fcron 用户可读写，并确保普通用户无法创建指向该目录的符号链接作为临时缓解措施。建议同时检查并恢复可能已遭篡改的用户 crontab 文件。"
score = 2.6
severity = "LOW"
sources = ["exploitdb"]
title = "Thibault Godouet FCron 1 符号链接攻击漏洞"
updated = "2026-06-16T21:54:46.060"

