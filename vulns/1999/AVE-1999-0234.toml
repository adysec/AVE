[basic]
description = "Microsoft FrontPage Server Extensions（PWS）3.0.2.926 在 Windows 95 及可能其他版本上存在缓冲区溢出漏洞。远程攻击者无需身份认证，即可通过向目标 Web 服务器发送特制的超长 URL 请求触发该溢出，导致 PWS 服务进程异常终止，引发拒绝服务（Denial of Service），使 Web 服务完全不可用。该漏洞影响安装了受影响版本 FrontPage Server Extensions 的 Windows 系统，攻击条件简单，仅需向 PWS 的 HTTP 接口发送构造的恶意请求即可完成利用，无需任何登录凭据或特殊权限。"
published = "2001-03-12T05:00:00.000"
remediation = "升级 Microsoft FrontPage Server Extensions 至 3.0.2.926 之后的修补版本，或安装 Microsoft 针对该缓冲区溢出的官方安全补丁（参考 Microsoft Security Bulletin MS99-0xx 及知识库文章 KB238453）。若无法立即更新，可在 Internet Information Services 或 Personal Web Server 的 URL 验证配置中限制请求 URL 的最大长度，或在防火墙层面禁止外部直接访问 FrontPage Server Extensions 端口（默认 80/443），仅允许内网可信 IP 访问，以此作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Microsoft FrontPage Personal Web Server 缓冲区溢出拒绝服务漏洞"
updated = "2026-06-16T21:48:50.150"

