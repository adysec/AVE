[basic]
description = "BackWeb 客户端在 Windows 注册表 Communication 键值中以明文存储代理认证的用户名和密码，本地攻击者可通过读取该注册表项获取敏感凭据信息，进而利用泄露的凭证提升自身权限，实现未授权访问。该漏洞影响 BackWeb 客户端软件，CVSS 评分 4.6，危害等级中危。攻击者需具备本地系统访问权限，无需用户交互即可完成利用。"
published = "1998-12-24T05:00:00.000"
remediation = '将 BackWeb 客户端升级至修复版本（如 v7.x 以上），或禁用代理认证密码存储功能。如无法升级，通过注册表权限管理工具限制 `HKLM\Software\BackWeb\Communication` 键的读取权限仅为 SYSTEM 和 Administrators，移除普通用户的读取权限，防止密码泄露。'
score = 4.6
severity = "MEDIUM"
sources = ["avd"]
title = "BackWeb 客户端权限提升漏洞"
updated = "2026-06-16T21:50:05.690"

