[basic]
description = "Axent NetProwler 3.0 存在拒绝服务漏洞。远程攻击者可通过向运行 NetProwler 的服务器发送特制的畸形 IP 数据包，触发其中间人（Man-in-the-Middle）检测签名，导致 NetProwler 服务崩溃或无法正常处理网络流量，造成拒绝服务。该漏洞影响 NetProwler 3.0 版本，攻击者无需认证即可远程利用，CVSS 评分 5.0，危害等级中等。"
published = "2000-05-18T04:00:00.000"
remediation = "建议升级至 Axent NetProwler 3.0 以上版本，或迁移至 Symantec 后续支持的 IDS 产品（如 Symantec IPS）。如无法升级，可在网络边界防火墙配置规则，过滤异常畸形 IP 分片报文，并禁用 NetProwler 的 Man-in-the-Middle 签名检测功能作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Axent NetProwler 3.0 拒绝服务漏洞"
updated = "2026-06-16T21:51:37.467"

