[basic]
description = "CWP（Control Web Panel，又称 CentOS Web Panel）0.9.8.1205 之前版本的文件管理器模块中存在 OS 命令注入漏洞。远程攻击者在已知一个有效非 root 用户名的情况下，可通过向 /myuser/index.php?module=filemanager&acc=changePerm 端点发送特制请求，在 t_total 参数中注入 shell 元字符执行任意系统命令，导致未经身份认证的远程代码执行。该漏洞影响大量使用 CWP 面板的 CentOS 服务器，CVSS 评分 9.0，危害等级严重。厂商已在 0.9.8.1205 版本中修复此漏洞。"
published = "2025-09-19T18:15:36.620"
remediation = "立即将 Control Web Panel (CWP) 升级至 0.9.8.1205 或更高版本。升级命令：`sh <(curl -fsSL https://control-web-panel.com/install/update.sh)`。如无法立即升级，可在 Web 服务器（Apache/Nginx）层面配置访问控制，限制 `/myuser/index.php` 路径仅允许可信 IP 访问，并删除或限制 `filemanager` 模块的未授权调用权限。"
score = 9
severity = "CRITICAL"
sources = ["hwpoc"]
title = "CWP CentOS Web Panel filemanager 远程代码执行漏洞"
updated = "2026-06-17T09:30:12.133"

