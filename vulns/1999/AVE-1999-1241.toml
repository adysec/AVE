[basic]
description = "sudo 1.5.x 版本存在路径遍历导致的本地代码执行漏洞。由于 sudo 在处理命令路径时未能正确过滤“..（点点）”目录遍历序列，本地已通过认证的低权限用户可在调用 sudo 执行命令时构造包含“..”的恶意路径，绕过预期的命令限制，使 sudo 以 root 权限执行攻击者指定的任意命令。该漏洞影响 sudo 1.5.x 系列版本，攻击前提是攻击者需具备本地登录权限且被授权使用 sudo。利用方式简单，只需在 sudo 命令参数中插入“..”目录穿越路径即可提升权限执行任意命令，危害较大。"
published = "1998-01-12T05:00:00.000"
remediation = "升级 sudo 至 1.5.9 或更高版本（如 Debian 提供的修复包），以修复路径遍历导致的本地命令执行问题。若无法立即升级，可临时收紧 sudoers 配置、移除存在风险的命令授权，并限制普通用户对 sudo 二进制文件及配置目录的写权限作为缓解措施。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "Todd Miller sudo 1.5.x 本地权限提升代码执行漏洞"
updated = "2026-06-16T21:49:24.480"

