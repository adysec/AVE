[basic]
description = 'Microsoft IIS 4.0 存在访问限制绕过漏洞。当用户发起初始会话请求且其 IP 地址无法反向解析为 DNS 域名时，IIS 未能正确限制该请求的访问权限，即所谓的"域名解析"漏洞。未经身份认证的远程攻击者可通过使用无法解析到 DNS 域名的 IP 地址发起初始会话请求，绕过访问控制策略，获取未授权访问。该漏洞影响 IIS 4.0 版本，CVSS 评分 7.5，危害等级高危。'
published = "1999-12-31T05:00:00.000"
remediation = "立即安装 Microsoft 安全公告 MS99-039 提供的 IIS 4.0 域限制热修复补丁（KB241562/KB241805），该补丁修正了 IIS 4.0 在 IP 地址无法解析为 DNS 域名时错误放行首次会话请求的问题。由于 IIS 4.0 及 Windows NT 4.0 已停止支持，建议升级至受支持的 Windows Server 版本（如 Windows Server 2019/2022）并部署最新版 IIS。临时缓解措施：在 IIS 管理器中禁用基于域名的访问限制策略，改为使用 IP 地址范围限制；同时确保反向 DNS 解析服务正常工作，避免因解析失败导致访问绕过。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "Microsoft IIS 4.0 域名解析访问限制漏洞"
updated = "2026-06-16T21:50:00.120"

