[info]
author = "ave"
description = "Microsoft FrontPage 默认将表单提交结果存储在 /_private/form_results.txt，该文件世界可读且位于文档根目录，远程攻击者可读取其他用户提交的敏感信息。通过 HTTP GET 请求检测该文件是否存在且可访问。"
id = "POC-AVE-1999-0905"
name = "Microsoft FrontPage 表单结果文件信息泄露验证"
severity = "medium"
tags = ["ave-1999-0905"]
vuln_id = [
    "CVE-1999-1052",
    "AVE-1999-0905",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/_private/form_results.txt"
protocol = "http"

[[poc.requests.matchers]]
expect = true
status = [200]
type = "status"
