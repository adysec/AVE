[basic]
description = "U-Mail 邮件系统存在任意文件上传漏洞，由于对上传文件类型及内容校验不严，未经身份验证的远程攻击者可通过构造特制的 HTTP 请求上传恶意 WebShell 文件，成功利用后可获取服务器控制权，实现远程代码执行。该漏洞影响 U-Mail 多版本，攻击复杂度低，无需用户交互。"
published = "0709"
remediation = "升级 U-Mail 至厂商提供的最新安全版本，并严格限制 web 上传目录（如 webmail/upload/）的脚本执行权限，在 Nginx/Apache 中配置禁止解析上传目录下的 jsp/php/asp 等脚本文件；同时在上传接口增加文件类型白名单校验，仅允许图片、文档等非可执行文件格式；部署 WAF 规则拦截包含恶意代码的文件上传请求。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "U-Mail 任意文件上传漏洞"
updated = "0709"

