[basic]
description = "方向标邮件网关（FangMail）的 get_audit.cgi 接口存在远程命令执行漏洞。攻击者可在无需身份认证的情况下，通过向该接口发送特制的 HTTP 请求注入系统命令，导致目标服务器被远程控制。该漏洞源于 CGI 程序未对用户输入进行充分的过滤与转义，攻击者可直接在参数中拼接恶意命令并执行。漏洞影响部署方向标邮件网关的所有系统，可导致服务器被完全控制、数据泄露、横向移动及服务中断，危害严重。"
published = "2025-07-18"
remediation = "联系方向标（FangMail）厂商获取最新安全版本并升级邮件网关系统。在完成升级前，临时措施包括：在 Web 应用防火墙上配置规则拦截对 /get_audit.cgi 的非法请求参数，限制网关管理端口仅对内网可信 IP 开放，并禁用不必要的 CGI 接口以降低攻击面。"
score = 7.5
severity = "HIGH"
sources = ["hwpoc"]
title = "方向标 邮件网关 get_audit.cgi 远程命令执行漏洞"
updated = "2025-07-18"

