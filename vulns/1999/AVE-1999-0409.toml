[basic]
description = "Cobalt RaQ2 服务器默认配置存在安全缺陷，远程攻击者无需认证即可通过默认服务接口向服务器安装任意软件包，导致完全控制服务器，获取敏感信息或发起进一步攻击。攻击者利用该漏洞可完全控制受影响系统。"
published = "1999-08-08"
