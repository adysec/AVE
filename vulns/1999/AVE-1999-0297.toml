[basic]
description = "cfingerd（由 Martin Schulze 开发的 Finger 服务守护进程）在处理用户信息的 GECOS 字段时存在缓冲区溢出漏洞。本地攻击者可通过设置超长 GECOS 字段（通常通过修改 /etc/passwd 文件实现）触发栈溢出，从而以 root 权限执行任意代码。该漏洞影响 cfingerd 1.4.2 版本，CVSS 评分 7.2，危害等级高。攻击者需在目标系统上拥有本地用户权限才能利用此漏洞，成功利用后可完全接管系统。"
published = "1999-09-21"
remediation = "升级 cfingerd 至 1.4.3 或更高版本，该版本对 GECOS 字段长度进行了边界检查修复。在 Debian/Ubuntu 系统上可通过 `apt-get install cfingerd` 获取最新补丁版本；如暂时无法升级，可临时禁用 cfingerd 服务（`systemctl stop cfingerd` 并 `systemctl disable cfingerd`），或在防火墙层面限制本地用户对 finger 服务（TCP 79 端口）的访问，以减少本地提权攻击面。"
score = 7.2
severity = "HIGH"
sources = ["exploitdb"]
title = "Martin Schulze Cfingerd GECOS 缓冲区溢出漏洞"
updated = "2026-06-16"

