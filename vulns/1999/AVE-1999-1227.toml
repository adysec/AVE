description = "AppleShare IP Mail Server 5.0.3 在处理 SMTP HELO 命令时存在缓冲区溢出漏洞。远程攻击者可通过向 SMTP 端口（25）发送超长 HELO 命令（约500字节以上），触发缓冲区溢出，导致服务器进程崩溃。由于运行在 MacOS 8.1 及更早版本系统上，该崩溃通常会导致整个操作系统死机，需要物理重启才能恢复。攻击无需任何认证，攻击复杂度低，危害较大。"
