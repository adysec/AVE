[basic]
description = "ProFTPD 1.2 在编译启用 mod_sqlpw 模块时存在敏感信息泄露漏洞。该模块会将用户认证密码明文记录到系统 wtmp 日志文件中，本地攻击者可通过执行 last 等命令读取 wtmp 日志获取其他用户的明文密码，进而利用获取的密码提升权限或横向移动。该漏洞影响 ProFTPD 1.2 版本，攻击者需拥有本地系统访问权限，攻击复杂度低，CVSS v2 评分 4.6，危害等级中危。"
published = "1999-11-19"
remediation = "升级 ProFTPD 至 1.2.1 及以上版本，该版本已修复 mod_sqlpw 将用户密码明文写入 wtmp 日志的问题。如无法升级，可卸载 mod_sqlpw 模块或限制 wtmp 日志文件的读取权限（chmod 640 /var/log/wtmp），仅允许 root 用户访问。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "ProFTPD mod_sqlpw 密码泄露漏洞"
updated = "1999-11-19"

