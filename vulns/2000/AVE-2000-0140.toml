[basic]
description = "Internet Explorer 4.x 及 5.x 版本存在跨域文件访问漏洞（Image Source Redirect）。当 Web 服务器将浏览器窗口从一个域导航到另一个域时，IE 安全模型会检查服务器对新页面的权限。但攻击者可以构造恶意网页，将浏览器窗口打开到客户端本地文件，再将该窗口导航回攻击者所属域，使得本地文件内容在极短时间内对新窗口可访问。攻击者只需知道或猜测文件名及路径，即可读取目标计算机上可在浏览器窗口中打开的任意类型文件，但无法添加、修改或删除文件。该漏洞影响 Internet Explorer 4.0、4.01、5.0 及 5.01 版本，Microsoft 已于 2000 年 2 月发布安全公告 MS00-009 提供修复补丁。"
published = "2000-02-16T05:00:00.000"
remediation = "安装 Microsoft 安全公告 MS00-009 对应补丁，可通过 Windows Update 获取更新。IE 4.01 SP1 及更早版本需升级至 IE 5.01 以上版本后再安装补丁。鉴于 Internet Explorer 已停止技术支持，建议彻底迁移至 Microsoft Edge 或 Chrome 等现代浏览器以根除风险。"
score = 5.1
severity = "MEDIUM"
sources = ["avd"]
title = "Microsoft Internet Explorer 安全域绕过漏洞"
updated = "2026-06-16T21:51:07.020"

