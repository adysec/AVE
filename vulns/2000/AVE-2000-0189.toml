[basic]
description = "FTPx FTP Explorer 1.0.00.10 版本在存储 FTP 站点的用户名、密码及配置文件时采用了弱加密算法，导致本地攻击者可通过访问存储配置文件或注册表项，利用弱加密算法解密还原明文凭据，从而窃取 FTP 站点登录凭证。该漏洞影响 FTPx FTP Explorer 1.0.00.10 版本，攻击者需具备本地文件系统或注册表访问权限，通过逆向分析弱加密算法或使用现成解密工具即可还原凭据，进而实施横向移动或数据窃取攻击。CVSS 评分 4.6，属中等严重程度漏洞。"
published = "2000-02-24"
remediation = '建议立即停止使用 FTPx FTP Explorer 1.0.00.10 并迁移至支持强加密存储的现代 FTP 客户端（如 FileZilla、WinSCP 等）；删除注册表 HKCU\Software\FTP Explorer\Profiles\ 下存储的所有站点配置，避免残留凭据被解密；若必须继续使用旧版本，请勿保存密码并改用外部密码管理器管理凭据。'
score = 4.6
severity = "MEDIUM"
sources = ["exploitdb"]
title = "FTPx FTP Explorer 1.0.00.10 弱密码加密漏洞"
updated = "2026-06-16"

