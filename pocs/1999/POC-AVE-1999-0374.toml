[info]
author = "ave"
description = "检测 Microsoft IIS 3.0 服务器上 /scripts/tools/newdsn.exe CGI 脚本是否存在。该 CGI 允许远程攻击者在服务器上创建或覆盖任意文件，若 NTFS 权限配置不当可导致系统配置篡改或敏感信息泄露。攻击复杂度低，无需身份认证。"
id = "POC-AVE-1999-0374"
name = "Microsoft IIS newdsn.exe 文件创建漏洞 PoC"
severity = "medium"
tags = ["ave-1999-0374"]
vuln_id = [
    "CVE-1999-0191",
    "AVE-1999-0374",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/scripts/tools/newdsn.exe"
protocol = "http"

[poc.requests.body]
content = ""
type = "raw"

[[poc.requests.matchers]]
expect = true
status = [200]
type = "status"
