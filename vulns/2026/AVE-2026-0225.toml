[basic]
description = "禅道项目管理软件 search 模块的 words 参数存在前台 SQL 注入漏洞。未经认证的远程攻击者可构造特制的 GET 请求，在 words 参数中注入恶意 SQL 语句，利用 MySQL 函数错误注入方式直接操作后端数据库。该漏洞可导致数据库中的用户凭证、项目数据等敏感信息泄露，受影响版本广泛。建议升级官方补丁或严格过滤用户输入参数。"
published = "20220801"
remediation = "升级禅道至最新版本（开源版 22.3 或对应企业版/旗舰版最新版），该版本已修复 search 模块 words 参数未做参数化查询的问题。如无法立即升级，修改 module/search/control.php 中 index 方法，对 words 参数使用 $this->dao->quote() 进行转义处理，并改用 prepared statement 替代字符串拼接构建 SQL 查询。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "禅道 项目管理软件 search 模块 SQL 注入漏洞"
updated = "20220801"

