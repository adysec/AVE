[basic]
description = "Microsoft Site Server Commerce Edition 3.0 alpha 的 Ad Server Sample 目录（AdSamples）存在配置错误，导致攻击者可直接访问并下载 SITE.CSC 文件，该文件包含敏感的 SQL 数据库连接信息（如服务器地址、数据库名、用户名、密码等）。攻击者无需身份认证即可通过直接访问 AdSamples 目录下的 SITE.CSC 文件获取数据库敏感信息，进而可能进一步攻击数据库服务器。该漏洞影响 Microsoft Site Server Commerce Edition 3.0 alpha 版本，CVSS 评分 5.0（中危），攻击者只需构造针对 AdSamples 目录的 HTTP 请求即可无需认证获取敏感配置文件。"
published = "1999-05-11T04:00:00.000"
remediation = "删除或限制对 AdSamples 目录下 SITE.CSC 文件的 Web 访问权限（如通过 IIS 移除该目录的匿名读取权限或设置 NTFS ACL），并修改其中暴露的 SQL 数据库账户密码，升级至已修复该配置问题的后续版本。"
score = 5.0
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Microsoft Site Server Commerce Edition 3.0 alpha AdSamples 目录敏感信息泄露漏洞"
updated = "2026-07-18T00:00:00.000"

