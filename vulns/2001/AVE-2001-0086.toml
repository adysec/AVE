[basic]
description = "Way-Board 2.0 的 CGI 程序存在路径遍历漏洞，远程攻击者可通过向 db 参数传递包含空字节的文件名（如 ../../etc/passwd%00），绕过输入过滤限制从而读取服务器上的任意文件。该漏洞无需身份认证即可利用，可能导致敏感信息泄露，影响运行 Way-Board 2.0 的所有 Web 服务器。"
published = "2001-06-02T04:00:00.000"
remediation = 'Way-Board 2.0 CGI 程序已停止维护，无官方安全补丁。永久修复方案：将该 CGI 程序下线，迁移至现代受支持的论坛系统（如 phpBB、Discourse 等）。临时缓解措施：在 Web 服务器（Apache/Nginx）层面配置规则，过滤 db 请求参数中的 null 字节（%00）与路径遍历字符（../），可添加 RewriteCond %{QUERY_STRING} db=.*%00 [NC] 并返回 403 状态码拒绝请求；同时建议在 CGI 脚本入口处增加输入验证，移除 db 参数中的 \x00 字符以防止任意文件读取。'
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Way-Board 2.0 CGI 任意文件读取漏洞"
updated = "2026-06-16T21:53:53.767"

