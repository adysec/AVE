[basic]
description = "Samba 打印子系统中存在操作系统命令注入漏洞。在配置了 print command 参数时，Samba 将客户端可控的打印作业描述（job description）字符串通过 %J 替换符传递给 shell 命令，而未对 shell 元字符进行转义过滤。远程未经身份认证的攻击者可通过提交特制的打印作业描述，在目标服务器上以 root 权限执行任意命令。该漏洞影响 Samba 4.20.2 之前版本，CVSS 评分 9.0，危害等级严重。"
published = "2026-05-26"
remediation = "立即升级至 Samba 4.20.2 及以上版本，该版本已修复 %J 参数未转义 shell 元字符的问题。如无法立即升级，可在 smb.conf 中禁用打印服务（load printers = no、printing = bsd），或在防火墙层面限制 445/tcp 端口的访问来源。"
score = 9.0
severity = "CRITICAL"
sources = [
    "cve",
    "hwpoc",
]
title = "Samba 打印子系统远程代码执行漏洞"
updated = "2026-07-15"

