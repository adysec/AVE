[basic]
description = 'Majordomo 2 在 20110131 之前的版本中，lib/Majordomo.pm 文件的 _list_file_get 函数存在目录遍历漏洞。由于该函数未对用户输入中的文件路径进行充分过滤，远程攻击者可借助 help 命令中携带的".."（点点）路径序列读取服务器上的任意文件。攻击条件为：攻击者无需身份认证，可通过发送特制的电子邮件，或经由 Web 接口中的 cgi-bin/mj_wwwusr 页面提交恶意请求来触发该漏洞。受影响范围为 Majordomo 2 早于 20110131 的所有版本，可能造成敏感文件（如配置文件、口令文件等）泄露，危害中等。'
published = "2011-02-04T01:00:07.400"
remediation = "升级 Majordomo 至 2011-01-31 及之后版本（Majordomo 2.0 及以上修复版），从官方源码仓库获取并重新部署 lib/Majordomo.pm。如暂时无法升级，应限制 cgi-bin/mj_wwwusr 网络接口的访问来源（如 Web 服务器 ACL 或防火墙仅允许可信 IP），并禁用或过滤 help 命令中传入的“../”路径遍历字符，作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["nuclei"]
title = "Majordomo Majordomo 2 目录遍历漏洞"
updated = "2026-06-16T23:26:41.687"

