[basic]
description = 'Vintra SMTP MailServer 在处理 EXPN 命令时存在输入验证缺陷，远程攻击者可通过向 SMTP 端口发送特制的 "EXPN *@" 命令，导致邮件服务器服务崩溃或拒绝服务。该漏洞影响 Vintra SMTP MailServer 相关版本，攻击者无需身份认证即可远程触发，CVSS 评分 5.0，危害等级中危。目前厂商已发布安全更新修复此漏洞。'
published = "1998-07-20T04:00:00.000"
remediation = "编辑 Vintra SMTP MailServer 的 sendmail.cf 配置文件，添加配置行 `O PrivacyOptions=needmailhelo, noexpn` 以禁用 EXPN 命令，然后重启 MTA 服务。该产品已停止维护，建议迁移至受支持的邮件服务器（如 Exchange Server、Postfix）并从防火墙限制 25 端口仅允许可信 IP 访问。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Vintra SMTP MailServer EXPN 命令拒绝服务漏洞"
updated = "2026-06-16T21:49:55.943"

