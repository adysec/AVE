[basic]
description = "tags.<value>MySQL 及 MariaDB 的 sql/password.c 中存在身份认证绕过漏洞。由于某些平台上 memcmp() 函数返回值在隐式转换为 int 类型时存在截断问题，当非零返回值的低字节恰好为零时，密码比对会错误地判定为成功。远程攻击者无需有效凭据，只需反复使用同一错误密码向目标数据库服务器发起认证请求，平均约 256 次尝试即可绕过身份验证，获得目标数据库的完全访问权限。该漏洞影响 Oracle MySQL 5.1.x 至 5.6.x 系列及 MariaDB 5.1.x 至 5.5.x 系列特定版本，CVSS 评分 5.1，危害评级中危。"
published = "2012-06-26T18:55:05.083"
remediation = "升级 MySQL 至 5.1.63/5.5.24/5.6.6 及以上版本，或升级 MariaDB 至 5.1.62/5.2.12/5.3.6/5.5.23 及以上版本。如无法立即升级，可在 MySQL 配置中增加 `max_connect_errors=10000` 并启用 `skip_name_resolve` 以降低暴力重试认证的成功率，同时限制数据库端口的网络访问来源。"
score = 5.1
severity = "MEDIUM"
sources = ["nuclei"]
title = """The user wants me to generate a title field for CVE-2012-2122 following the format "厂商 产品 漏洞类型" in Chinese. From the known information: - Vendor: Oracle MySQL / MariaDB - Product: MySQL / MariaDB - Vulnerability type: 身份认证绕过 (Authentication Bypass) The format should be: "厂商 产品 漏洞类型" So: "Oracle MySQL 身份认证绕过漏洞" - but this is too similar to the original title. Let me think about what's more accurate. The vulnerability is in MySQL (by Oracle) and MariaDB, where authentication can be bypassed due to a memcmp issue. The original title mentions "MySQL 身份认证绕过漏洞". Following the format strictly: "Oracle MySQL 身份认证绕过漏洞" seems appropriate. But I could also be more descriptive. Let me think - the format is "厂商 产品 漏洞类型": - 厂商: Oracle (MySQL) / MariaDB... but primarily Oracle MySQL - 产品: MySQL (also affects MariaDB) - 漏洞类型: 身份认证绕过 So: "Oracle MySQL 身份认证绕过漏洞" Or maybe: "Oracle MySQL 及 MariaDB 身份认证绕过漏洞" to be more comprehensive about affected products. Actually, looking at the example "Microsoft Windows TCP"""
updated = "2026-06-16T23:41:02.110"

