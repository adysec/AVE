[basic]
title = "ISC DHCP 客户端缓冲区溢出拒绝服务漏洞"
description = "ISC DHCP 服务端（dhcpd）1.0 和 2.0 版本存在多个缓冲区溢出漏洞。远程攻击者可通过发送超长 DHCP 选项参数触发溢出，导致服务崩溃（拒绝服务），并可能执行任意命令。该漏洞影响广泛部署的 DHCP 服务器，攻击者无需认证即可远程利用，危害较大。"
severity = "HIGH"
score = 7.5
sources = ["cve", "avd"]
published = "1999-12-31"
updated = "2026-06-16"
remediation = "升级到 ISC DHCP 2.0pl1 或更高版本，或应用官方安全补丁 dhcp-1.0.0-1.0pl1.diff；同时配置防火墙限制 DHCP 服务端口的访问来源。"
[references]
urls = [
"http://ciac.llnl.gov/ciac/bulletins/i-053.shtml",
"http://marc.info/?l=bugtraq&m=90221101925960&w=2",
]
