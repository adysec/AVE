[basic]
description = "Miva htmlscript 2.x 的 CGI 程序存在目录遍历漏洞，远程攻击者无需身份认证即可通过向 Web 服务器发送特制的 HTTP 请求，利用路径遍历符（如 ../）绕过访问限制，读取服务器上任意文件，导致敏感信息泄露。该漏洞影响 Miva htmlscript 2.x 版本，CVSS 评分 5.0，危害等级中危。"
published = "1998-01-27T05:00:00.000"
remediation = "立即升级 Miva htmlscript 至 3.0 及以上版本，该漏洞已在后续版本中修复。如无法升级，请从服务器上移除或禁用 htmlscript CGI 脚本，或在 Web 服务器（Apache/Nginx）配置中限制对该脚本的访问权限，并实施输入验证过滤 `../` 等目录遍历字符。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Miva htmlscript 目录遍历漏洞"
updated = "2026-06-16T21:48:01.847"

