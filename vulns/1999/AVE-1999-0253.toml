[basic]
description = "AIX 4.2 系统的 CDE 桌面环境中的 dtterm 终端程序存在本地缓冲区溢出漏洞。拥有本地访问权限的攻击者可向 dtterm 程序传递特制的长参数触发缓冲区溢出，导致任意代码执行或以 root 权限覆盖关键系统文件。该漏洞影响运行 AIX 4.2 并安装了 CDE 子系统的系统，CVSS 评分 7.2，危害等级高。IBM 已于后续版本中通过补丁修复此漏洞。"
published = "1997-05-01T04:00:00.000"
remediation = "安装 IBM 针对 dtterm 缓冲区溢出漏洞的 APAR 补丁包，或升级至 AIX 4.3 及以上版本。如无法立即打补丁，临时缓解措施可移除 dtterm 二进制文件的 setuid root 权限：`chmod u-s /usr/dt/bin/dtterm`，这将阻止非授权用户利用漏洞进行本地提权。"
score = 7.2
severity = "HIGH"
sources = ["epss"]
title = "IBM AIX CDE dtterm 本地缓冲区溢出漏洞"
updated = "2026-06-16T21:47:36.680"

