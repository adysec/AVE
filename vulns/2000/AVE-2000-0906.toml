[basic]
description = "Pine 邮件客户端 4.21 之前版本在处理 URL 时未正确过滤 shell 元字符，远程攻击者可通过向用户发送包含恶意构造 URL 的邮件触发漏洞，在用户点击该 URL 时执行任意命令。该漏洞影响所有 Pine 4.21 之前版本，CVSS 评分 10.0，危害等级严重。攻击者无需身份认证即可远程利用，且无需特殊权限即可完全控制目标系统。"
published = "1999-11-18T05:00:00.000"
remediation = "立即升级 Pine 至 4.21 或更高版本，该版本已正确过滤 URL 中的 shell 元字符。如无法升级，可配置邮件客户端禁用 URL 自动点击打开功能，并在系统层面限制 Pine 进程对 shell 命令的调用权限。对于企业环境，建议在邮件网关层面过滤包含特殊字符的恶意链接。"
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "University of Washington Pine URL shell元字符注入远程代码执行漏洞"
updated = "2026-06-16T21:51:32.313"

