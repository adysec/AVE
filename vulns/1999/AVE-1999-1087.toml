[basic]
description = "Solaris 2.6 及 2.7 系统中的 /usr/bin/write 工具存在缓冲区溢出漏洞。本地攻击者可通过向终端名称参数传入超长字符串触发缓冲区溢出，从而获取系统最高权限。该漏洞为本地提权漏洞，攻击者需拥有本地账户才能利用，影响 Solaris 2.6 和 2.7 版本，CVSS 评分 7.2，危害等级高。"
published = "1999-03-08T05:00:00.000"
remediation = "该漏洞影响已停止支持的 Solaris 2.6 和 7，Oracle 不再提供安全补丁。建议立即升级到受支持的 Solaris 11 或更高版本；如无法升级，可执行 `chmod 755 /usr/bin/write` 移除 setuid 位以缓解提权风险，或使用 `chmod 0 /usr/bin/write` 完全禁用该命令。"
score = 7.2
severity = "HIGH"
sources = ["cve"]
title = "Sun Solaris /usr/bin/write 本地缓冲区溢出漏洞"
updated = "2026-06-16T21:50:17.847"

