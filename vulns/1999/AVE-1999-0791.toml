[basic]
description = "Microsoft Internet Explorer 4/5 及 Outlook 98 存在服务器端页面引用重定向漏洞。远程攻击者可通过构造恶意网页，利用 window.open 方法创建客户端窗口引用，并借助服务器端重定向绕过同源策略，从而访问受害者本地文件系统中的敏感文件。该漏洞影响 Internet Explorer 5.01 及更早版本，攻击者只需诱导用户访问恶意链接即可触发，无需额外认证。"
published = "1999-12-08"
remediation = "该漏洞影响已停止支持的 Internet Explorer 4/5 及 Outlook 98，微软未发布安全更新。建议立即升级至现代浏览器（如 Edge/Chrome/Firefox）和邮件客户端（如 Outlook 新版本/Thunderbird），并在 IE 中禁用活动脚本及跨域窗口导航功能作为临时缓解。"
score = 5.1
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Microsoft Internet Explorer 4/5 及 Outlook 98 服务器端页面重定向本地文件访问漏洞"
updated = "2026-06-16"

