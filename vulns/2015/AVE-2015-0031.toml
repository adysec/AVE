[basic]
description = "WordPress 的 NewStatPress 插件 0.9.8 及之前版本中 includes/nsp_search.php 文件存在 SQL 注入漏洞。已登录认证的攻击者可通过向 wp-admin/admin.php 页面提交 nsp_search 请求，在 where1 参数中注入恶意的 SQL 语句，从而执行任意 SQL 命令，导致数据库中的敏感信息泄露、数据篡改甚至完全控制数据库。该漏洞仅需低权限认证即可远程利用，影响所有使用受影响版本插件的 WordPress 站点。建议用户立即升级至 0.9.9 或更高版本以修复此漏洞。"
published = "2015-05-27T18:59:03.023"
remediation = "立即将 NewStatPress 插件升级到 0.9.9 或更高版本。如无法升级，可在 wp-admin/admin.php 的 nsp_search 页面中对 where1 参数添加严格的输入过滤和参数化查询，或临时禁用该插件。同时建议限制后台用户权限，仅授予可信用户管理员访问权限。"
score = 6.5
severity = "MEDIUM"
sources = ["nuclei"]
title = "WordPress NewStatPress 插件 SQL 注入漏洞"
updated = "2026-06-17T00:26:42.610"

