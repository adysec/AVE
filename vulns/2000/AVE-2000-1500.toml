[basic]
description = "Auction Weaver CGI 脚本 1.03 及更早版本存在路径遍历漏洞，远程攻击者无需身份认证即可通过在 catdir 参数中构造 ../ 序列实现目录跳转，从而读取服务器上的任意文件。该漏洞利用方式简单，攻击者可获取系统敏感文件（如 /etc/passwd、配置文件等），导致信息泄露。CVSS v2.0 评分为 10.0，危害等级严重。"
published = "2000-10-20"
remediation = "删除或禁用 Auction Weaver CGI 脚本 1.03 及更早版本；由于该软件年代久远且厂商不详，建议替换为经安全审计的替代方案。若必须继续使用，应在 Web 服务器层面对 catdir 参数实施输入过滤，阻止 ../ 等目录遍历序列，并限制 Web 服务进程的文件系统访问权限至最小必要范围。"
score = 10.0
severity = "CRITICAL"
sources = ["cve"]
title = "Auction Weaver CGI 目录遍历任意文件读取漏洞"
updated = "2026-06-16"

