[basic]
description = "Linux 内核 accel/habanalabs 驱动中存在内存释放不当漏洞（CWE-401），当用户关闭文件描述符时，内存管理器 IDR 被过早销毁，而此时用户上下文可能仍被持有、内存缓冲区可能仍在被使用。后续尝试释放这些缓冲区时因无法在 IDR 中找到句柄而失败，导致内核内存泄漏。本地攻击者可通过反复打开和关闭 habanalabs 设备文件描述符触发此漏洞，造成系统资源耗尽。该漏洞影响 Linux 内核中 habanalabs 驱动的相关版本，CVSS 评分 5.5，危害等级中等。"
published = "2025-09-17T15:15:39.293"
remediation = "立即将 Linux 内核升级至 6.3.4 及以上版本，或向后移植补丁提交 2e8e9a895c45（主线）及 840de329ca99（稳定分支），即拆分 mem_mgr IDR 销毁到 hpriv_release() 中释放。由于该漏洞为本地内存泄漏（CVSS 5.5），无法通过配置缓解，唯一修复途径是更新内核。"
score = 5.5
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux Kernel accel/habanalabs 内存泄漏漏洞"
updated = "2026-06-17T06:44:58.863"

