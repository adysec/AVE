[basic]
description = "Linux Kernel 2.0.37 版本中存在段限制（Segment Limit）编码缺陷漏洞，由于内核未正确编码自定义段限制，导致本地攻击者能够通过访问和修改内核内存来提升权限至 root。该漏洞影响 Linux Kernel 2.0.37 版本，攻击者需具备本地系统访问权限，CVSS 评分 7.2，危害等级高。目前官方已发布更新修复此漏洞。"
published = "1999-07-11T04:00:00.000"
remediation = "升级 Linux 内核至 2.2.x 或更高版本，该漏洞在内核 2.0.38 及之后版本中已被修复。由于 2.0.x 系列已停止维护，建议升级至仍受支持的内核分支（如 2.6.x 或更新版本）。如无法升级内核，可通过 grsecurity/PaX 等内核加固补丁限制本地用户访问内核内存空间作为临时缓解措施。"
score = 7.2
severity = "HIGH"
sources = ["epss"]
title = "Linux Kernel 2.0.37 Segment Limit 本地权限提升漏洞"
updated = "2026-06-16T21:49:51.663"

