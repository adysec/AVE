[basic]
description = "Windows帮助系统存在本地权限提升漏洞。本地用户可通过编辑.CNT扩展名的目录元文件，修改主题操作为执行指定命令，当其他用户访问对应的.hlp帮助文件时触发执行。攻击者需具有本地写入.CNT文件的权限，利用难度较低。该漏洞影响Windows 95/98/NT 4.0系统。"
published = "1999-12-10"
remediation = "微软已发布安全公告MS99-043。Windows 95/98/NT 4.0均已停止支持，建议升级到Windows 10/11等受支持版本。临时防护措施：禁用winhlp32.exe帮助系统组件，或通过组策略限制用户对.hlp和.cnt文件的访问权限，不打开来源不明的帮助文件。"
score = 4.6
severity = "MEDIUM"
sources = [
    "cve",
    "exploitdb",
]
title = "Microsoft Windows 95/98/NT 4.0 帮助文件后门漏洞"
updated = "2026-07-19"

