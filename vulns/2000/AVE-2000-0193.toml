[basic]
description = "Linux/BSD 系统中的 mount 和 umount 命令存在缓冲区溢出漏洞，本地用户可通过向 umount 命令传递超长相对路径名参数触发该漏洞，导致缓冲区溢出，从而获取 root 权限。该漏洞影响多个 Linux 发行版及 BSD 系统，攻击者需拥有本地访问权限，利用难度较低，CVSS 评分 7.2，危害等级高。"
published = "2000-02-03T05:00:00.000"
remediation = "立即安装 Caldera OpenLinux 安全公告 CSSA-2000-002.0 提供的补丁，或升级 util-linux 至 2.10f 及以上版本。对于 BSD 系统，应用对应 BSD 发行版的安全补丁。现代 Linux 发行版（内核 2.4+ 及对应 util-linux 版本）已修复此问题，建议确保系统已安装最新安全更新。如无法升级，可限制非信任用户本地登录作为临时缓解措施。"
score = 7.2
severity = "HIGH"
sources = ["cve"]
title = "Linux mount/umount 缓冲区溢出本地权限提升漏洞"
updated = "2026-06-16T21:51:15.003"

