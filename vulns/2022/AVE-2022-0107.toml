[basic]
description = "Linux 内核 SCSI target 子系统的 iSCSI 登录流程中存在竞争条件漏洞。恶意发起者在发送登录 PDU 后立即发送随机数据，触发 iscsi_target_sk_data_ready() 回调调度 login_work；当登录完成但 LOGIN_FLAGS_INITIAL_PDU 标志未被清除时，login_work 会无限重调度自身。此时若发起者断开连接，iscsit_conn 结构体被释放，login_work 将解引用已释放的 socket 结构，导致内核空指针解引用崩溃。该漏洞影响 Linux 内核中启用 iSCSI target 功能的系统，攻击者无需认证即可远程触发拒绝服务，CVSS 评分 4.7，危害等级中危。"
published = "2025-09-16T17:15:34.833"
remediation = "立即升级 Linux 内核至 6.0.16、6.1.2 或更高版本，包含提交 fec1b2fa62c1 / 3ecdca49ca49 / 1533b8b3058d 的修补。如无法升级，可在 iSCSI Target 端配置访问控制白名单，仅允许可信 Initiator 连接，并禁用未使用的 iSCSI 端口以缩小攻击面。"
score = 4.7
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux Kernel SCSI target iSCSI 竞争条件漏洞"
updated = "2026-06-17T05:23:17.813"

