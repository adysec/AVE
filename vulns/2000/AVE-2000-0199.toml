[basic]
description = "SCO UnixWare 7.x 中的 ARCserve 代理服务存在符号链接漏洞。本地攻击者可通过创建恶意符号链接，诱使以 root 权限运行的 ARCserve 代理访问攻击者控制的文件路径，从而获取 root 权限。攻击条件为拥有系统本地访问权限。"
published = "2000-02-15T05:00:00.000"
remediation = "升级 SCO UnixWare 至 7.1.1 以上补丁版本，或限制 ARCserver 服务使用专用临时目录（如 /var/tmp/arcserve）并设置粘滞位（chmod +t），同时避免以 root 权限运行 ARCserver 服务，使用最小权限账户运行。"
score = 1.2
severity = "LOW"
sources = ["cve"]
title = "SCO UnixWare ARCserver 本地符号链接漏洞"
updated = "2026-06-16T21:51:15.793"

