[basic]
description = "HP Secure Web Console 使用弱加密算法保护敏感数据传输，导致攻击者可通过中间人攻击或密文分析破解加密通信，窃取或篡改管理控制台传输的敏感信息（如管理凭据、配置数据）。该漏洞影响 HP Secure Web Console 早期版本，攻击者需处于网络中间位置（如同一局域网、ARP 欺骗、路由劫持）即可实施被动窃听或主动篡改攻击，利用弱加密算法的已知弱点（如密钥长度过短、算法已知漏洞）还原明文，进而获取管理控制台权限或窃取敏感配置数据。建议升级至修复版本并强制启用强加密套件（如 TLS 1.2+、AES-GCM）。"
published = "1999-11-01T05:00:00.000"
remediation = "升级到 HP Secure Web Console 1.0 之后修复该弱加密问题的固件版本（具体以 HP 官方发布的安全补丁为准）；在无法立即升级前，应禁用通过 Web Console 的远程明文管理访问，改为通过本地串口或带外管理网络访问，并在边界防火墙限制仅允许受信任管理 IP 访问 443 端口，同时强制启用强密码认证以缓解弱加密带来的信息泄露风险。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "HP Secure Web Console 弱加密漏洞"
updated = "2026-06-16T21:49:08.690"

