[basic]
description = "Foundry Networks ServerIron 系列交换机存在 TCP/IP 序列号可预测漏洞，远程攻击者可通过预测 TCP 序列号，伪造数据包以劫持或欺骗现有 TCP 会话。攻击者无需认证即可实施会话劫持，导致被攻击者与目标之间的通信被拦截、篡改或重定向。该漏洞影响 ServerIron 系列交换机，CVSS 评分 7.5，危害等级高，建议受影响的用户尽快更新固件。"
published = "2000-02-28T05:00:00.000"
remediation = "升级 ServerIron 交换机固件至最新版本（如已停产则无法获取补丁）。在交换机上启用 TCP 序列号随机化功能（如支持），或配置 ACL 限制仅允许可信 IP 访问管理端口。在网络边界部署防火墙启用 TCP 序列号随机化（如 ISE 功能）。建议将已停产的 ServerIron 替换为仍在厂商支持周期内的现代负载均衡设备以彻底修复此漏洞。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "Foundry Networks ServerIron 交换机 TCP/IP 会话劫持漏洞"
updated = "2026-06-16T21:51:09.800"

