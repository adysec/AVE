[basic]
description = "Rational Software ClearCase for Unix 3.2 中的 db_loader 程序存在条件竞争漏洞，本地攻击者可通过设置 SUID 位利用该漏洞，在竞争窗口内执行特权操作，从而获取 root 权限。该漏洞影响 ClearCase for Unix 3.2 版本，需要本地系统访问权限，攻击复杂度较高但危害严重，CVSS 评分 6.2，属于中危漏洞。"
published = "1999-02-08T05:00:00.000"
remediation = "升级 Rational ClearCase 至 3.2 以上安全版本，或移除 db_loader 程序的 SUID 权限位（chmod u-s /path/to/db_loader），限制本地普通用户对该程序的执行权限，防止竞态条件提权攻击。"
score = 6.2
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Rational Software ClearCase db_loader 条件竞争本地权限提升漏洞"
updated = "2026-06-16T21:48:12.480"

