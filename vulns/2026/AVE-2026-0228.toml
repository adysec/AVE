[basic]
description = "Tenda WH450 路由器 /goform/RouteStatic 接口处理 page 参数时存在栈缓冲区溢出漏洞。攻击者可通过向目标设备发送特制的 HTTP 请求触发该漏洞，在未授权情况下导致缓冲区溢出，进而实现远程代码执行或设备拒绝服务。该漏洞影响 Tenda WH450 系列路由器，CNVD 编号为 CNVD-2026-26822，危害等级高危。建议用户及时关注厂商固件更新以修复此漏洞。"
published = "20260713"
remediation = "建议联系 Tenda 官方或访问 Tenda 官网 (tenda.com.cn) 检查 WH450 型号是否有最新固件版本并升级。如无官方补丁，请在路由器管理页面禁用远程管理功能，并在防火墙中限制仅信任 IP 可访问路由器 80/443 端口，以降低被远程利用风险。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "Tenda WH450 栈缓冲区溢出漏洞"
updated = "20260713"

