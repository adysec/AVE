[basic]
description = "中识云平台 sys_user_list 接口存在未授权访问漏洞，攻击者无需身份认证即可直接访问该接口，获取系统中所有用户的敏感信息（包括用户名、手机号、邮箱等）。该漏洞影响中识云平台全版本，攻击者可通过构造特定 HTTP 请求利用此漏洞，导致大量用户隐私数据泄露，危害较大。建议厂商尽快对该接口添加访问权限控制。"
published = "0714"
remediation = "建议对中识云平台 `sys_user_list` 接口添加身份认证与鉴权机制，仅允许系统管理员角色访问，同时在网关层配置 IP 白名单限制访问来源。对接口返回数据中的敏感字段（密码、手机号、邮箱等）进行脱敏处理，并启用接口访问审计日志以便追溯。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "中识 中识云平台 信息泄露漏洞"
updated = "0714"

