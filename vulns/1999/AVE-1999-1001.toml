[basic]
description = "Cisco Cache Engine（用于 Cisco IOS 11.2 及更早版本）中的 Web 缓存控制协议（WCCP）未实施任何身份验证机制，远程攻击者可通过向目标设备的 UDP 端口 2048 发送特制的 WCCP 数据包，将 HTTP 流量重定向至任意主机，从而导致中间人攻击或服务劫持。该漏洞影响大量部署 Cisco 缓存设备的网络环境，CVSS 评分 7.5，危害等级高。官方未发布补丁，建议升级至更高版本 IOS 或配置访问控制列表缓解风险。"
published = "1999-12-31T05:00:00.000"
remediation = "升级 Cisco IOS 至 12.0 或更高版本，新版 WCCP 支持 MD5 认证配置（`ip wccp web-cache password <口令>`）。如无法升级，在边界路由器上配置 ACL 限制 UDP 2048 端口的源 IP 仅为可信缓存引擎地址。若无需 Web 缓存加速，全局关闭 WCCP（`no ip wccp web-cache`）以彻底消除暴露面。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "Cisco Cache Engine Web缓存控制协议认证绕过漏洞"
updated = "2026-06-16T21:49:52.753"

