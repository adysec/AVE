[basic]
description = "Microsoft Internet Explorer 4.0.1 与 5.0 版本存在 JavaScript URL 重定向安全漏洞，源于浏览器对通过 JavaScript 小程序（applet）重定向数据的处理缺乏充分限制。远程攻击者可在网页中构造恶意 JavaScript 代码，诱导受害者访问特制页面后，将本应受同源策略保护的数据重定向并读取本地或跨域文件内容，从而泄露敏感信息。该漏洞影响运行上述版本 IE 的 Windows 系统，需用户在攻击者的诱导下访问恶意网页方可触发，攻击条件为远程、需用户交互，CVSS 基础评分 2.6，危害等级较低。Microsoft 已在安全公告 MS99-043 中提供相应修复。"
published = "1999-11-17T05:00:00.000"
remediation = "升级至 Microsoft Internet Explorer 5.01 或更高版本并安装安全更新 MS99-043，或在 Internet 选项安全设置中禁用 JavaScript 执行作为临时缓解措施。"
score = 2.6
severity = "LOW"
sources = ["avd"]
title = "Microsoft Internet Explorer JavaScript URL 重定向信息泄露漏洞"
updated = "2026-06-16T21:49:04.173"

