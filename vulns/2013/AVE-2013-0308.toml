[basic]
description = "Microsoft Windows 内核模式驱动 win32k.sys 中的 EPATHOBJ::pprFlattenRec 函数在初始化 PATHRECORD 链中下一对象的指针时存在缺陷，导致本地攻击者可通过触发分页内存的过度消耗并大量调用 FlattenPath 函数，从而获取对 PATHRECORD 链的写入权限，最终实现权限提升。该漏洞影响 Windows XP SP2/SP3、Server 2003 SP2、Vista SP2、Server 2008 SP2/R2 SP1、Windows 7 SP1、Windows 8 及 Server 2012 等多个版本，CVSS 评分 7.8，危害等级高。攻击者需具备本地系统访问权限，利用难度较低，成功利用后可获取 SYSTEM 权限。"
published = "2013-05-24T20:55:01.903"
remediation = "建议立即安装微软 2013 年 4 月安全公告 MS13-036 提供的更新补丁（KB2823324），或通过 Windows Update 自动更新。对于 Windows 8 及 Windows Server 2012 等受支持系统，安装 MS13-046 累积更新（KB2829361）。对于已停止支持的 Windows XP/2003/Vista/2008/7 系统，微软不再提供安全更新，建议升级到 Windows 10/11 或 Windows Server 2016/2022 等受支持版本；如无法升级，应限制低权限用户本地登录，并部署端点检测与响应（EDR）产品监控异常 win32k 调用行为作为临时缓解措施。"
score = 7.8
severity = "HIGH"
sources = ["kev"]
title = "Microsoft Windows win32k.sys 本地权限提升漏洞"
updated = "2026-06-16T23:55:35.730"

