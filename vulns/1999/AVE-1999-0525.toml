[basic]
description = "Netscape 浏览器存在信息泄露漏洞，远程攻击者可通过恶意网页中的 JavaScript 脚本访问用户浏览器缓存中的敏感信息，包括浏览历史记录、已访问页面内容等。该漏洞影响早期 Netscape 浏览器版本，攻击者只需诱使用户访问包含恶意脚本的网页即可利用，无需特殊权限。由于缓存可能包含私人数据，该漏洞会严重威胁用户隐私安全。"
published = "2000-04-01T05:00:00.000"
remediation = "升级 Netscape Communicator 到 4.7 及以上版本，Netscape 已针对 JavaScript 读取缓存问题发布安全修复。如无法升级，可在浏览器设置中禁用 JavaScript 作为临时缓解措施。鉴于 Netscape 已停止维护，建议迁移到现代浏览器（如 Firefox、Chrome）以获得持续安全支持。"
score = 2.6
severity = "LOW"
sources = ["avd"]
title = "Netscape Navigator 浏览器 JavaScript 缓存信息泄露漏洞"
updated = "2026-06-16T21:49:03.810"

