[basic]
description = "rpc.lockd 是 Linux 系统中 NFS 文件锁管理服务，负责处理远程文件锁定请求。Red Hat Linux 6.1/6.2 及 Debian 2.1/2.2、Mandrake 6.0/6.1/7.0 等发行版中的 rpc.lockd 存在输入验证缺陷，远程攻击者无需身份认证即可向目标系统发送特制的畸形 RPC 请求，触发服务崩溃，导致拒绝服务。该漏洞影响范围广泛，CVSS 评分 5.0，危害等级中等。"
published = "1994-12-19T05:00:00.000"
remediation = '升级 Red Hat Linux 至 7.1 或更高版本，或安装对应发行版的安全补丁。临时缓解措施：在 /etc/hosts.deny 中添加 "rpc.lockd: ALL" 禁用 rpc.lockd 服务，或在防火墙层面封锁 TCP/UDP 端口 111 (portmap/rpcbind) 以阻止外部 RPC 请求。'
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Red Hat Linux rpc.lockd 远程拒绝服务漏洞"
updated = "2026-06-16T21:51:53.130"

