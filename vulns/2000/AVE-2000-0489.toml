[basic]
description = "Big Brother 监控系统 1.4h1 及更早版本中的 bb-hostsvc.sh 脚本存在目录遍历漏洞。远程攻击者无需身份认证即可通过在 HOSTSVC 参数中构造 `../` 序列进行路径穿越，从而读取服务器上的任意文件，导致敏感信息泄露。该漏洞利用难度较低，影响范围广泛。"
published = "2000-07-11T04:00:00.000"
remediation = "升级 Big Brother 至 1.4h2 或更高版本以修复目录遍历漏洞。如无法升级，修改 bb-hostsvc.sh 脚本，对 HOSTSVC 参数做输入过滤，拒绝包含 `../` 或绝对路径的请求；同时在 Web 服务器层限制对 bb-hostsvc.sh 的访问来源 IP。"
score = 10
severity = "CRITICAL"
sources = ["cve"]
title = "Big Brother bb-hostsvc.sh 目录遍历漏洞"
updated = "2026-06-16T21:52:09.860"

