[basic]
description = "Matt Wright 开发的 textcounter.pl 1.2 版本存在任意命令执行漏洞。该脚本未对用户输入进行有效过滤，远程攻击者可通过向脚本参数中注入 shell 元字符（如分号、管道符等）实现任意系统命令执行。该漏洞影响广泛运行于各类 Unix/Linux Web 服务器的 textcounter.pl 1.2，攻击者无需身份认证即可利用，危害严重。"
published = "1998-06-24T04:00:00.000"
remediation = '升级 textcounter.pl 至已修复 shell 元字符过滤的更新版本；若无法升级，应立即停用该脚本并改用安全性更好的替代方案（如 AWStats）。如必须继续使用，需在 Perl 脚本中启用 taint 模式并使用严格参数校验（如拒绝 `;|&\`$()` 等特殊字符），同时在 Web 服务器层限制 CGI 执行权限。建议从代码层面彻底移除对 `system()` 或反引号调用的依赖，改用安全的文件操作 API。'
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "Matt Wright textcounter.pl 任意命令执行漏洞"
updated = "2026-06-16T21:50:31.793"

