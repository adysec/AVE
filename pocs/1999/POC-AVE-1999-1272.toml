[info]
author = "AVE"
description = "检测目标系统是否存在 /etc/group 文件以验证本地权限降级检查。该漏洞源于 Slackware 默认安装缺失 /etc/group 文件，导致系统丢失组权限检查，任意本地用户可获取 root 权限。PoC 通过检查文件存在性辅助判断系统是否处于受影响配置。"
id = "POC-AVE-1999-1272"
name = "CVE-1999-1434 Slackware /etc/group 缺失本地提权 PoC"
severity = "high"
tags = ["ave-1999-1272"]
vuln_id = [
    "CVE-1999-1434",
    "AVE-1999-1272",
]

[poc]
logic = "all"

[[poc.requests]]
path = "/etc/group"
protocol = "file"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["root:x:"]
