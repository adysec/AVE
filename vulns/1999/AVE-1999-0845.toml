[basic]
description = "Windows NT 系统的注册表审核策略存在缺陷，对非关键注册表键值的访问操作（无论成功或失败）均不会记录审核事件日志。攻击者可利用此缺陷在不留下审计痕迹的情况下修改非关键注册表键值，潜在地篡改系统配置或植入恶意配置，从而规避安全审计机制的检测。该漏洞影响 Windows NT 系列操作系统，CVSS 评分 10.0，属于严重级别的审计绕过漏洞。"
published = "1999-01-01T05:00:00.000"
remediation = '在 Windows NT 中打开注册表编辑器 regedt32，进入"安全"→"审核"，为 HKEY_LOCAL_MACHINE\SYSTEM、SOFTWARE 等非关键注册表项添加"成功"与"失败"的审核项；同时运行 regedt32 中"选项"→"审核"确保已启用注册表审核策略。将域控制器与重要服务器加入域安全策略强制开启审计，并定期审阅安全日志，无法立即配置时限制远程注册表访问（禁用 Remote Registry 服务）作为缓解。'
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "Microsoft Windows NT 注册表审核策略日志记录缺失漏洞"
updated = "2026-06-16T21:48:40.243"

