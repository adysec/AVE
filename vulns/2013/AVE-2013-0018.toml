[basic]
description = "Linux 内核 drivers/video/fbmem.c 文件中的 fb_mmap 函数存在整数溢出漏洞（CWE-190），当用户通过 /dev/graphics/fb0 设备文件调用 mmap2 系统调用时，由于对内存映射大小计算不当导致整数溢出，使得本地攻击者能够创建覆盖整个内核内存的读写映射，进而实现权限提升。该漏洞影响 Linux 内核 3.8.9 之前版本，被用于 Motorola Android 4.1.2 等设备中。攻击者只需拥有本地低权限账户即可触发，无需用户交互，攻击复杂度低。Motochopper 利用程序已公开该漏洞的完整利用方法，攻击者可通过该漏洞完全控制目标系统。"
published = "2013-04-13T02:59:46.627"
remediation = "升级 Linux 内核至 3.8.9 及以上版本（对应提交 b4cbb197c7e7 和 fc9bbca8f650），或安装厂商提供的安全补丁。对于 Motorola Android 设备，请更新官方固件至已修复版本。临时缓解措施：限制对 /dev/graphics/fb0 设备的访问权限，禁止非 root 用户执行 mmap2 系统调用。"
score = 7.8
severity = "HIGH"
sources = ["kev"]
title = "Linux Kernel 帧缓冲设备整数溢出本地权限提升漏洞"
updated = "2026-06-16T23:53:41.450"

