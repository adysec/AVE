[basic]
description = "CVS 1.10.7 版本在文件锁定机制中使用可预测的临时文件名，本地攻击者可通过在合法 CVS 用户创建锁目录之前预先创建同名锁目录，导致 CVS 服务无法正常获取文件锁，从而引发拒绝服务。该漏洞攻击复杂度低，无需认证即可利用，影响 CVS 1.10.7 及可能更早版本，CVSS 评分 5.5，危害等级中等。"
published = "2000-04-23T04:00:00.000"
remediation = "升级 CVS 至 1.11 或更高版本，该版本已修复可预测临时文件名问题。如无法升级，可通过 umask 限制本地用户对锁目录的访问权限；建议迁移至 Subversion (SVN) 或 Git 替代 CVS。作为临时缓解，可配置严格的本地文件系统权限防止非授权用户创建锁目录。"
score = 5.5
severity = "MEDIUM"
sources = ["cve"]
title = "CVS 1.10.7 可预测临时文件名本地拒绝服务漏洞"
updated = "2026-06-16T21:51:30.520"

