[basic]
description = "GNOME gdm、KDE kdm 及 wdm 等显示管理器中的 XDMCP 解析代码存在缓冲区溢出漏洞，远程攻击者可通过向目标系统发送特制的超长 FORWARD_QUERY 请求触发该漏洞，导致任意命令执行或拒绝服务。该漏洞影响 gdm 1.0.x/2.0.x BETA/2.2.0 等版本，CVSS 评分 10.0，危害等级严重。受影响的系统需升级到修复版本或禁用 XDMCP 服务以规避风险。"
published = "2000-05-24T04:00:00.000"
remediation = "立即将 gdm 升级至 2.2.0 以上版本（如 2.4.x 或更高），kdm 升级至包含修复的对应版本；Caldera OpenLinux 用户请安装 CSSA-2000-013 补丁，SuSE Linux 用户请安装 Security Announcement 49 补丁。如无法立即升级，在 gdm.conf 中设置 DisallowTCP=true 或关闭 XDMCP 支持以禁用远程显示管理器协议，并在 iptables 防火墙中添加规则 `-A INPUT -p udp --dport 177 -j DROP` 封锁传入 XDMCP 流量。"
score = 10
severity = "CRITICAL"
sources = ["redhat"]
title = "GNOME gdm、KDE kdm 及 wdm XDMCP 缓冲区溢出漏洞"
updated = "2026-06-16T21:51:50.913"

