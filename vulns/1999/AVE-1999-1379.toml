[basic]
description = "Silicon Graphics IRIX 6.2 至 6.4 操作系统中的在线客户注册软件（On-Line Customer Registration）存在本地权限提升漏洞。该软件在处理用户操作时权限校验不当，导致拥有本地登录权限的普通用户可利用该缺陷提升至 root 权限，从而完全控制目标系统。攻击条件为攻击者需具备本地账户访问权限，无需身份认证即可触发，影响机密性、完整性和可用性。该漏洞影响所有运行 IRIX 6.2、6.3 及 6.4 版本的 SGI 工作站与服务器，攻击者成功利用后可读取、篡改任意文件并执行任意管理命令，是导致系统被本地完全接管的高危风险。"
published = "1998-09-29"
remediation = "SGI 已在安全公告 19980901-01-PX 中发布补丁，建议从 patches.sgi.com 下载并安装对应 IRIX 6.2/6.3/6.4 的官方补丁，或升级至 IRIX 6.5 及以上版本以彻底修复。若暂无法打补丁，可移除或禁用在线客户注册软件相关的 setuid 程序，并限制普通用户对注册组件的访问权限以缓解风险。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "Silicon Graphics IRIX 在线客户注册软件本地权限提升漏洞"
updated = "2026-06-16"

