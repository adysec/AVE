[basic]
description = "Matt Wright FormHandler.cgi 2.0 存在目录遍历漏洞，远程攻击者可通过 reply_message_attach 附件参数中的 `..`（点点）序列，或通过指定文件名为模板路径，绕过路径限制读取服务器上任意文件。该漏洞源于脚本未对用户输入的文件路径参数进行充分验证和过滤，导致攻击者可构造恶意路径遍历至 Web 根目录以外的敏感文件（如系统配置文件、源代码、数据库凭证等）。攻击条件为：目标服务器运行受影响版本的 FormHandler.cgi，且攻击者可远程访问该 CGI 脚本，无需身份认证即可发起利用。成功利用可导致敏感信息泄露，进而辅助后续攻击。"
published = "1999-11-12T05:00:00.000"
remediation = '立即将 Matt Wright FormHandler.cgi 脚本升级到官方修复版本 3.0 或更高，并删除旧版 formhandler.cgi 文件；在 CGI 配置中将 attachment 目录设为仅允许写入的隔离目录，使用 chroot 或 open_basedir 限制脚本可访问的文件系统范围，禁止用户通过 reply_message_attach 参数传入包含 "../" 的路径；同时在 Web 服务器（如 Apache）中通过 mod_rewrite 规则过滤包含 ".." 的请求作为临时缓解。'
score = 5
severity = "MEDIUM"
