[basic]
description = "致远互联 OA 系统的 NCFindWeb 接口存在本地文件包含漏洞（CWE-22），远程未经身份认证的攻击者可通过向 /NCFindWeb?service=IPreAlertConfigService&filename=WEB-INF/web.xml 路径发送特制的 GET 请求，利用 filename 参数读取服务器上任意文件，导致 web.xml 等敏感配置文件泄露。攻击者可进一步利用泄露的信息扩大攻击面，危害严重。攻击条件低，无需任何权限认证。"
published = "2015-08-01"
remediation = "立即升级致远 OA 至官方最新版本（A6+ / A8+ 最新安全补丁包）；如无法升级，在 Nginx/WAF 层添加规则拦截 `/NCFindWeb?service=` 路径请求，对 `filename` 参数做路径白名单校验，禁止包含 `../` 等目录遍历字符。"
score = 7.5
severity = "HIGH"
sources = ["nuclei"]
title = "致远 OA NCFindWeb 接口本地文件包含漏洞"
updated = "2015-08-01"

