[basic]
description = 'Linux 内核文件扩展属性处理模块（fs/xattr）存在文件描述符引用泄露漏洞。在 fremovexattr() 系统调用中，当 strncpy_from_user() 对 name 参数操作失败时，函数提前返回但未调用 fdput() 释放通过 fdget() 获取的文件引用。在多线程进程环境下，fdget() 走慢路径时该缺陷导致每次调用永久泄露一个文件引用，使得 struct file 及相关内核对象无法从内存中释放。本地非特权攻击者可反复触发该漏洞造成内核内存耗尽，影响系统稳定性。该漏洞已在提交 a71874379ec8（"xattr: switch to CLASS(fd)"）中修复，建议尽快升级内核版本。'
published = "2026-03-09T16:16:14.313"
remediation = "立即升级 Linux 内核至 6.6.133、6.12.77 或 6.13 及以上版本，该漏洞已在提交 a71874379ec8 中修复。如无法立即升级，可限制本地用户对 fremovexattr 系统调用的访问权限作为临时缓解措施，例如通过 seccomp 过滤或 LSM 模块拦截该调用。"
score = 5.5
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux 内核 fremovexattr 文件引用泄露漏洞"
updated = "2026-06-26T20:18:19.230"

