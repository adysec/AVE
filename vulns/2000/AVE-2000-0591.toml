[basic]
description = "IRC 聊天客户端 X-Chat 1.4.2 及更早版本存在命令执行漏洞。当用户点击聊天消息中的 URL 时，X-Chat 会调用系统默认浏览器打开该链接，但未能对 URL 中的 shell 元字符（如反引号、管道符等）进行有效过滤。远程攻击者可以构造包含恶意 shell 命令的特制 URL 发送给目标用户，当用户点击该 URL 时，嵌入的恶意命令将在用户系统上以当前用户权限执行，导致信息泄露、系统被控等严重后果。该漏洞攻击条件低，无需认证，利用方式简单，影响所有使用受影响版本的 X-Chat 用户。"
published = "2000-10-20T04:00:00.000"
remediation = "升级 X-Chat 至 1.4.3 或更高版本，该版本已修复通过 URL 编码 shell 元字符执行任意命令的问题。如无法升级，可在 X-Chat 设置中禁用自动打开 URL 功能，或使用防火墙规则阻止 IRC 端口（6667）的异常出站连接作为临时缓解措施。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "X-Chat IRC客户端URL命令执行漏洞"
updated = "2026-06-16T21:52:28.807"

