[basic]
description = "GNU Emacs 20 在启动子进程时未能正确设置从属 PTY 设备的权限，导致本地攻击者可利用该漏洞读取或修改 Emacs 与子进程之间的通信内容。该漏洞影响 Emacs 20 系列版本，攻击者需拥有本地系统访问权限，CVSS 评分 2.1，危害等级低。建议用户升级至最新版本以修复此问题。"
published = "2000-04-18T04:00:00.000"
remediation = "建议升级到 GNU Emacs 20.7 或更高版本（如 Emacs 21.1 及以上），这些版本已修复 PTY 权限设置缺陷。若暂时无法升级，可通过设置 /dev/ptmx 权限为 600 或限制普通用户访问 PTY 设备作为临时缓解措施。建议尽快升级至受支持的 Emacs 版本（如 28.x 或 29.x）。"
score = 2.1
severity = "LOW"
sources = ["redhat"]
title = "GNU Emacs 20 从属PTY设备权限设置不当导致本地信息泄露漏洞"
updated = "2026-06-16T21:51:21.877"

