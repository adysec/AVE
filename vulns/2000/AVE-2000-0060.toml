[basic]
description = "Microsoft Windows 系统中的 Rich Text Format (RTF) 阅读器存在缓冲区溢出漏洞。当用户使用受影响系统打开包含恶意构造控制词的特制 RTF 文件时，可触发缓冲区溢出，导致程序崩溃或拒绝服务。攻击者可通过诱使用户打开恶意 RTF 文件（如通过电子邮件附件或网页下载）来利用此漏洞。该漏洞影响 Windows 95/98、NT 4.0 及终端服务器等多个版本，CVSS 评分 5.0，危害等级中等。"
published = "1999-11-17T05:00:00.000"
remediation = "受影响系统均为已停止支持的旧版 Windows（95/98/NT 4），微软未发布官方补丁。建议立即升级至 Windows 10/11 等受支持版本；在无法升级的环境中，配置组策略禁止从邮件客户端和浏览器自动打开 RTF 附件，并教育用户不打开来源不明的 .rtf 文件。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Microsoft Windows RTF解析器缓冲区溢出漏洞"
updated = "2026-06-16T21:50:56.680"

