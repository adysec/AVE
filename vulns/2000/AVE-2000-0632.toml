[basic]
description = "Kerberos 4 的 KDC 密钥分发中心组件存在缓冲区溢出漏洞。远程攻击者可向目标 Kerberos 服务发送特制请求，触发 kerb_err_reply 函数在处理 e_msg 变量时发生缓冲区越界写入，导致 KDC 服务崩溃并拒绝服务。该漏洞影响使用 Kerberos 4 协议的系统，CVSS 评分 5.0，危害等级中危。"
published = "2000-06-09T04:00:00.000"
remediation = "建议升级 MIT Kerberos 5 至 krb5-1.2 或更高版本；若无法升级，对 krb5-1.0.x 和 krb5-1.1.x 分别安装 MIT 官方补丁 krb4kdc_10x_patch.txt 和 krb4kdc_111_patch.txt；对 Kerberos 4 Patch 10 用户安装 MIT krb4 补丁（krb4kdc_krb4p10_patch.txt）；KTH-krb4 用户升级至 1.0.1 及以上版本；RedHat 用户应用 RHSA-2000-031 安全更新。临时缓解措施可在防火墙限制对 KDC 端口（88/udp）的访问。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "MIT Kerberos 4 KDC 缓冲区溢出拒绝服务漏洞"
updated = "2026-06-16T21:51:58.423"

