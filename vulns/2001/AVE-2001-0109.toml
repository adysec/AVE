[basic]
description = "Hylafax 传真软件在 FreeBSD 系统上存在格式化字符串漏洞，本地攻击者可通过向 faxrm 或 faxalter 命令的 -h hostname 参数中传入特制的格式化字符串标识符，触发格式化字符串漏洞，导致攻击者能够以 root 权限执行任意代码。该漏洞影响运行 Hylafax 的 FreeBSD 系统，CVSS 评分 7.2，危害等级高。建议用户升级到已修复版本或限制本地用户对受影响命令的访问权限。"
published = "2001-09-23T04:00:00.000"
remediation = "升级 Hylafax 到 4.1.1 及以上版本，该版本已修复 faxrm 和 faxalter 中 -h 参数的格式化字符串问题。FreeBSD 用户可通过 ports 更新：`portsupgrade print/hylafax` 或重新编译安装。Debian 用户升级至 1:4.1.1-1.1（对应 DSA-148）。如无法立即升级，应限制本地不可信用户对 faxrm 和 faxalter 命令的执行权限，仅允许受信任的管理员使用。"
score = 7.2
severity = "HIGH"
sources = ["osv"]
title = "HylaFAX faxrm/faxalter 格式字符串本地代码执行漏洞"
updated = "2026-06-16T21:55:27.187"

