[basic]
description = "Microsoft IIS 5.0 存在路径信息泄露漏洞，远程攻击者可通过向服务器发送特制的非存在 URL 请求（由 Perl 解释器 perl.exe 处理），从而枚举出 Web 服务器的真实物理路径。该漏洞影响 IIS 5.0 版本，攻击者无需身份认证即可利用，可能导致敏感系统路径信息泄露，为进一步攻击提供线索。CVSS 评分 7.5，危害等级高。"
published = "1999-01-26"
remediation = "升级到受支持的 Windows Server 版本（IIS 5.0 已停止支持），或迁移至 IIS 7.0 及以上版本。如无法升级，在 IIS 管理器中删除 Perl ISAPI 扩展映射（perl.exe），并配置自定义错误页面禁止返回详细路径信息，同时限制 IIS 对非可执行目录的脚本映射权限。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "Microsoft IIS 5.0 IISAPI扩展目录枚举漏洞"
updated = "2026-06-16"

