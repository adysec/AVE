[basic]
description = "Microsoft SQL Server 6.5 的 SQLExecutiveCmdExec 账户密码采用弱加密算法进行保护，并将加密后的密码存储于注册表可访问区域中。本地攻击者可通过读取注册表中 CmdExecAccount 值并破解弱加密密码，从而获取该账户的访问权限，实现本地权限提升。该漏洞影响 Microsoft SQL Server 6.5 版本，CVSS 评分 7.2，危害等级高。建议升级至更高版本或采取更强密码保护措施。"
published = "1998-06-29T04:00:00.000"
remediation = '立即升级到受支持的 SQL Server 版本（如 2019/2022），因 SQL Server 6.5 已停止安全更新。限制注册表项 HKEY_LOCAL_MACHINE\SOFTWARE\Microsoft\MSSQLServer\SQLExecutive\CmdExecAccount 的访问权限，仅允许 SYSTEM 和 Administrators 组读取。改用 Windows 集成身份验证替代 CmdExecAccount 明文密码存储方案。'
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "Microsoft SQL Server 6.5 权限提升漏洞"
updated = "2026-06-16T21:50:42.610"

