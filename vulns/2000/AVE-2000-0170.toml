[basic]
description = "Corel Linux OS 1.0 的 Dosemu（DOS 模拟器）默认配置存在权限控制不当漏洞，本地低权限用户可利用 Dosemu 默认环境中的 system.com 程序执行任意系统命令，从而获取更高的系统特权权限。该漏洞影响 Corel Linux OS 1.0 版本，攻击者需拥有本地系统访问权限，利用门槛较低，CVSS 评分 7.2，危害等级高。"
published = "2000-03-02T05:00:00.000"
remediation = '立即升级 Corel Linux 至 1.0 以上版本，或移除 Dosemu 配置中对 system.com 的默认执行权限。编辑 `/etc/dosemu/dosemu.conf`，添加 `$_comspec = "/bin/bash"` 限制可执行命令路径，并将 Dosemu 用户组仅限信任用户加入，防止本地低权限用户通过 Dosemu 执行 system.com 获取特权。如不再需要 DOS 兼容环境，可直接卸载 dosemu 软件包。临时缓解措施包括移除 system.com 的执行权限：`chmod -x /var/lib/dosemu/system.com`。'
score = 7.2
severity = "HIGH"
sources = ["epss"]
title = "Corel Linux Dosemu 默认配置本地权限提升漏洞"
updated = "2026-06-16T21:51:11.730"

