[basic]
description = "Windows NT 系统中关键注册表项存在权限配置不当漏洞，攻击者利用不安全的注册表权限可修改系统关键配置，进而实现本地权限提升或完全控制系统。该漏洞影响 Windows NT 4.0 及更早版本，CVSS 评分 10.0，危害等级严重。攻击者需具有本地系统访问权限或通过远程获取写入权限后进行利用。"
published = "1999-01-01T05:00:00.000"
remediation = '使用 regedt32.exe 检查并收紧系统关键注册表项（如 HKLM\SAM、HKLM\SECURITY、HKLM\SYSTEM）的 ACL 权限，确保仅 SYSTEM 和 Administrators 拥有完全控制权，移除 Everyone 组的写入权限。同时安装 Windows NT 4.0 Service Pack 6a 及后续安全汇总更新，并在域环境中通过组策略统一加固注册表权限配置。'
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "Microsoft Windows NT 注册表权限漏洞"
updated = "2026-06-16T21:48:41.410"

