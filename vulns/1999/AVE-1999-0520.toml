[basic]
description = "Debian man-db 软件包中的 zsoelim 程序在处理手册页的 .so 预处理请求时，会在 /tmp 目录下以可预测的文件名（如 /tmp/zman0<进程ID>aaa）创建临时文件。该程序在创建文件前未校验目标路径是否为符号链接，会无条件跟随并写入。本地攻击者可在 man 命令执行前预先创建指向敏感文件（如 /etc/nologin、~/.ssh/authorized_keys 等）的符号链接，当运行 man 命令处理包含 .so 请求的手册页时，zsoelim 将跟随符号链接覆写目标文件，导致任意文件写入、权限提升或拒绝服务。"
published = "1999-06-12"
remediation = "升级 Debian man-db 软件包至已修复 zsoelim 符号链接漏洞的版本，或应用 Debian 官方安全补丁。临时缓解措施包括将 /var/cache/man 目录的写权限限制给 root 用户，并避免普通用户运行 man 命令处理不可信来源的手册页，以降低符号链接攻击风险。"
score = 10
severity = "CRITICAL"
sources = ["exploitdb"]
title = "Debian man-db zsoelim 符号链接攻击文件覆写漏洞"
updated = "2026-06-16"

