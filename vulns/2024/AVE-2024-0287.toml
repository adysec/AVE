[basic]
description = "金和OA C6的/C6/Jhsoft.Web.appraise/GeneralXmlhttpPage.aspx页面中id参数存在SQL注入漏洞。攻击者可通过构造特制的type=CheckAppraiseState请求，在id参数中注入恶意SQL语句，导致数据库信息泄露、数据篡改等严重后果。该漏洞无需身份认证即可远程利用，攻击门槛低。"
published = "2024-07-26"
remediation = "升级金和OA C6至官方最新版本，厂商已修复GeneralXmlhttpPage.aspx中id参数的SQL注入问题。临时缓解措施：在IIS中配置URL重写规则过滤id参数中的SQL关键字（如union、select、insert等），或部署WAF拦截对/C6/Jhsoft.Web.appraise/GeneralXmlhttpPage.aspx的恶意请求。"
score = 5.0
severity = "MEDIUM"
sources = ["hwpoc"]
title = "金和OA C6 GeneralXmlhttpPage.aspx 页面SQL注入漏洞"
updated = "2024-07-26"

