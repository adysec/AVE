[basic]
description = "Inter7 vpopmail（含 vchkpw 组件）的 POP 认证服务存在缓冲区溢出漏洞，影响 3.4.11 及之前版本。该服务在处理 POP 认证的用户名或密码时，未对输入长度做边界校验，攻击者可通过发送超长用户名或密码触发栈溢出。远程未认证攻击者利用此漏洞可覆盖返回地址并执行任意代码，最终获取目标系统的 root 权限，危害极大。"
published = "2000-01-21T05:00:00.000"
remediation = "立即升级 vpopmail/vchkpw 至最新版本（当前稳定版为 5.4.33），该版本已修复 POP3 认证过程中的缓冲区溢出漏洞。如无法升级，可在 tcpserver 层限制 POP3 服务的连接来源 IP，并部署入侵检测规则监控异常长度的认证请求作为临时缓解。"
score = 10
severity = "CRITICAL"
sources = ["cve"]
