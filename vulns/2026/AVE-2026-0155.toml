[basic]
description = "捷顺 JieLink+ 智能终端操作平台存在 SQL 注入漏洞，攻击者可通过向 deviceId 参数构造恶意 SQL 语句，绕过身份认证获取数据库敏感信息或执行任意 SQL 命令。该漏洞影响相关平台的多个版本，攻击条件低，无需高级权限即可远程利用，危害较大。建议用户联系厂商获取安全补丁，对 deviceId 参数实施参数化查询，并限制相关接口仅允许内网访问。"
published = "2026-07-21"
remediation = "对所有输入参数（尤其是 deviceId）实施参数化查询或预编译语句，禁止拼接 SQL 语句；限制该接口仅允许可信内网 IP 访问；部署 WAF 规则拦截 SQL 注入攻击特征，如检测单引号、恒真条件等常见注入载荷；联系捷顺厂商获取最新安全补丁并升级。"
score = 5.0
severity = "MEDIUM"
sources = ["hwpoc"]
title = "捷顺 JieLink+ 智能终端操作平台 SQL 注入漏洞"
updated = "2026-07-21"

