[basic]
description = "SSH 默认配置中启用了 X11 转发功能，远程攻击者可通过恶意的 xauth 程序控制客户端的 X 会话，导致会话劫持或敏感信息泄露。该漏洞影响多数 SSH 实现版本，CVSS 评分 5.1，危害等级中等。攻击者需要诱导客户端连接至恶意 SSH 服务器或通过中间人攻击触发，利用条件较高。"
published = "2000-02-24T05:00:00.000"
remediation = "在 sshd_config 中将 X11Forwarding 设置为 no 以禁用 X11 转发功能；如确需使用，升级至 OpenSSH 2.1.1 及以上版本，并配置 xauth 路径为可信程序，同时通过防火墙限制来源 IP 连接 SSH 端口。对于不需要远程 X11 转发的用户，关闭该功能是最佳缓解措施。"
score = 5.1
severity = "MEDIUM"
sources = ["epss"]
title = "SSH客户端 xauth 转发远程控制漏洞"
updated = "2026-06-16T21:51:14.860"

