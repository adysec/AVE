[info]
author = "AVE"
description = "通过 DHTML Edit ActiveX 控件构造恶意网页，利用跨帧访问特性读取目标系统文件"
id = "POC-AVE-1999-0159"
name = "Microsoft Internet Explorer DHTML Edit ActiveX 任意文件读取漏洞 PoC"
severity = "low"
tags = ["ave-1999-0159"]
vuln_id = [
    "CVE-1999-0487",
    "AVE-1999-0159",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/ie-dhtml-edit-poc.html"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "DHTML Edit",
    "ActiveX",
]
