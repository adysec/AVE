[basic]
description = "KDE 桌面环境中的 kdesud 工具存在缓冲区溢出漏洞，本地攻击者可通过向 DISPLAY 环境变量传递超长字符串触发该漏洞，导致缓冲区溢出，从而获取 root 权限。该漏洞影响 KDE 1.1 至 1.2 版本，攻击者需拥有本地系统访问权限，无需身份认证即可利用，危害等级高。"
published = "2000-05-27T04:00:00.000"
remediation = "建议升级至 KDE 1.3 或更高版本（KDE 系列已结束生命周期的 1.x/2.x/3.x 版本不再发布安全更新），该版本修复了 kdesud 对 DISPLAY 环境变量的缓冲区边界检查缺陷。对于无法升级的系统，可立即移除 kdesud 的 setuid root 权限位：chmod u-s /usr/bin/kdesud，阻止本地非特权用户利用该溢出漏洞提权。如不使用该组件，可直接删除或卸载 kdesud 可执行文件。"
score = 7.2
severity = "HIGH"
sources = ["exploitdb"]
title = "KDE kdesud DISPLAY 环境变量缓冲区溢出漏洞"
updated = "2026-06-16T21:51:46.943"

