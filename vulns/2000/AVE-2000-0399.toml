[basic]
description = "xterm、Eterm 和 rxvt 等终端模拟器存在拒绝服务漏洞。攻击者可通过向终端发送特制的窗口大小调整转义序列（escape sequence），强制终端窗口持续进行尺寸变换，导致系统内存被大量消耗，最终使目标系统崩溃或无法正常响应。受影响版本包括 Eterm 0.8.10、rxvt 2.6.1、PuTTY 0.48 及 X11R6 3.3.3/4.0。该攻击可通过网络远程触发，也可由本地用户构造恶意输出流发起，无需身份认证即可实施，危害等级中危。"
published = "2000-06-01T04:00:00.000"
remediation = "升级终端模拟器至已修复版本：xterm 升级至高于 Patch #182 的版本，Eterm 升级至高于 0.9.1 的版本，rxvt 升级至高于 2.7.8 的版本，PuTTY 升级至高于 0.49 的版本。如无法升级，可在终端配置文件（如 .Xresources）中禁用窗口大小调整响应，添加 `XTerm*allowSendEvents: false` 和 `rxvt*allowSendEvents: false` 作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "xterm Eterm rxvt 等多个终端模拟器窗口转义序列拒绝服务漏洞"
updated = "2026-06-16T21:51:48.990"

