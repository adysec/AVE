[basic]
description = "HP OpenView Network Node Manager (NNM) 6.2 至 7.50 版本中存在命令注入漏洞，远程攻击者可通过向 connectedNodes.ovpl、cdpView.ovpl、freeIPaddrs.ovpl 及 ecscmg.ovpl 等脚本的 node 等参数中注入 shell 元字符（如管道符、分号），以 NNM 服务进程权限在目标系统上执行任意命令。攻击无需认证即可远程触发，CVSS 评分 9.8，危害等级严重。HP 已发布补丁修复此漏洞，建议升级至不受影响版本。"
published = "2005-09-02T23:03:00.000"
remediation = "该漏洞仅影响已停止维护的 HP OpenView NNM 6.2-7.50，官方不再发布补丁。建议立即升级至 HPE 当前受支持的 Network Node Manager i (NNMi) 10.x 或更高版本。作为临时缓解措施，在防火墙上限制对 NNM Web 控制台端口（默认 80/443/8080）的访问，仅允许可信管理网段 IP，并对 connectedNodes.ovpl、cdpView.ovpl、freeIPaddrs.ovpl、ecscmg.ovpl 等 CGI 脚本实施严格的输入参数校验或直接删除这些脚本文件。"
score = 9.8
severity = "CRITICAL"
sources = ["kev"]
title = "HP OpenView Network Node Manager 远程命令执行漏洞"
updated = "2026-06-16T22:15:39.213"

