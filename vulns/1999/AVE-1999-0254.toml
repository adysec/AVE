[basic]
description = 'HP CDE（Common Desktop Environment）在设置 root 用户环境变量 PATH 时错误地将当前目录 "." 包含在内，导致本地攻击者可在任意目录中放置与系统命令同名的恶意程序，当 root 用户通过 su 或登录进入该目录并执行未指定路径的命令时，恶意程序将以 root 权限自动执行，实现本地提权。该漏洞影响 HP-UX 系统中运行 CDE 的版本，需要攻击者拥有本地 shell 访问权限，CVSS 评分 7.2，危害等级高。'
published = "1999-07-01T04:00:00.000"
remediation = '编辑 root 用户的 .profile、.login 或 CDE 系统级配置文件 /etc/dt/config/Xsession.d/ 下的相关脚本，移除 PATH 中的当前目录（即删除 "." 或空路径项），确保 PATH 仅包含绝对路径的系统目录（如 /usr/bin:/usr/sbin）。同时建议修改 CDE 启动脚本中 PATH 的拼接方式，使用完整路径调用命令，消除当前目录隐式搜索带来的提权风险。'
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "HP CDE 将当前目录加入 root 的 PATH 环境变量导致权限提升漏洞"
updated = "2026-06-16T21:48:51.300"

