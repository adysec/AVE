aliases = ["CVE-1999-1515"]
[basic]
title = "TenFour TFS Gateway 4.0 邮件地址解析拒绝服务漏洞"
description = "TenFour TFS Gateway 4.0 的非默认配置下存在拒绝服务漏洞。当管理员启用了"将完整消息退回发件人"功能后，攻击者可通过 SMTP 端口发送包含无效发件人地址和无效收件人地址的邮件，导致网关每隔 10 秒持续尝试退回该消息，直至管理员手动干预。大量此类消息将耗尽系统资源，造成服务不可用。远程攻击者无需认证即可利用该漏洞，影响 TFS Gateway 4.0 版本。"
severity = "MEDIUM"
score = 5.0
sources = ["cve"]
published = "1999-08-31"
updated = "2026-06-16"
remediation = "TFS Gateway 4.0 已停止维护，建议升级至最新版本或迁移至其他受支持的邮件网关产品。如无法升级，可在配置中关闭"退回整条消息"功能，或限制单条消息的最大重试次数并缩短重试间隔。同时应在邮件网关入口处过滤格式异常的邮件地址，防止攻击者构造无效地址触发持续重试。"
