[basic]
description = 'Cisco 路由器 8.2 至 9.1 版本中，当特定接口启用了扩展 IP 访问控制列表、IP 路由缓存功能开启且 ACL 使用了 "established" 关键字时，存在安全绕过漏洞。远程攻击者无需认证即可绕过 ACL 规则限制，向目标网络发送非法数据包，导致防护策略失效。该漏洞影响大量 Cisco 路由器设备，CVSS 评分 7.5，危害等级高。建议用户升级固件或调整 ACL 配置以修复此问题。'
published = "1992-12-10T05:00:00.000"
remediation = "升级 Cisco IOS 至 9.1 以上版本，该漏洞已在后续版本中修复。如无法升级，可在受影响接口上执行 `no ip route-cache` 关闭 IP 路由缓存，或避免在扩展 IP 访问控制列表中使用 `established` 关键字作为临时缓解措施。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "Cisco IOS 访问控制列表绕过漏洞"
updated = "2026-06-16T21:50:30.017"

