[info]
author = "ave"
description = "检测 Samba 2.0.7 SWAT 的 cgi.log 日志文件是否具有世界可读权限（权限检查为 -rw-r--r--），本地低权限用户可读取该文件中的历史用户名和密码等敏感信息"
id = "POC-AVE-2000-0684"
name = "Samba SWAT cgi.log 本地信息泄露 PoC"
severity = "low"
tags = ["ave-2000-0684"]
vuln_id = [
    "CVE-2000-0936",
    "AVE-2000-0684",
]

[poc]
logic = "all"

[[poc.requests]]
path = "/tmp/cgi.log"
protocol = "file"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [""]
