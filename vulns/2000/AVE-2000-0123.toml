[basic]
description = "该漏洞指目标系统被植入了分布式拒绝服务（DDoS）攻击工具，包括 Trinoo、Tribe Flood Network（TFN）、Tribe Flood Network 2000（TFN2K）、stacheldraht、mstream 或 shaft 等攻击程序的主控端（master）、代理端（agent）或傀儡端（zombie）。攻击者利用这些工具，通过主控端统一调度大量被控主机同时向指定目标发送海量流量或畸形数据包，从而耗尽目标的网络带宽、系统资源或连接数，导致目标服务瘫痪、无法响应正常请求。受影响系统一旦被感染，便沦为攻击者发动大规模 DDoS 攻击的跳板，攻击条件为系统已被入侵并成功安装相应攻击组件，危害等级为中等，CVSS 评分 5.0。"
published = "2000-05-02T04:00:00.000"
remediation = "立即排查并清理系统中是否安装了 Trinoo、TFN、TFN2K、stacheldraht、mstream、shaft 等 DDoS 攻击工具/代理程序，彻底清除僵尸进程并修复被利用的系统漏洞。部署网络层 DDoS 防护设备（如防火墙、流量清洗设备），配置入侵检测系统拦截 DDoS 攻击流量，及时安装系统安全补丁防止被植入攻击代理。配置防火墙限制异常流量，启用入侵检测系统监控异常流量模式。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Trinoo/TFN/TFN2K/Stacheldraht/mstream/Shaft 分布式拒绝服务代理漏洞"
updated = "2026-06-16T21:51:04.757"

