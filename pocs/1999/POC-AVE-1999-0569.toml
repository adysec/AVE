[info]
author = "ave"
description = "通过构造包含 '%01' 特殊字符的 'about:' JavaScript URL 的恶意 HTML 页面，检测目标 IE 浏览器是否存在跨域读取本地文件或页面伪造漏洞。攻击者诱导用户访问恶意链接后，可绕过同源策略读取用户本地文件。"
id = "POC-AVE-1999-0569"
name = "Microsoft Internet Explorer 跨框架访问安全限制绕过漏洞 PoC"
severity = "critical"
tags = ["ave-1999-0569"]
vuln_id = [
    "CVE-1999-0347",
    "AVE-1999-0569",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/poc.html"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["about:%01"]
