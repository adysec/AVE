[basic]
description = 'Nevis Systems All-Mail 1.1 存在远程缓冲区溢出漏洞。远程攻击者可通过向 SMTP 服务发送特制的超长 "MAIL FROM" 或 "RCPT TO" 命令触发缓冲区溢出，进而导致任意命令执行。该漏洞 CVSS 评分 10.0，危害等级严重，影响 All-Mail 1.1 版本，无需身份认证即可远程利用。目前官方已发布安全更新修复此问题。'
published = "2000-12-19T05:00:00.000"
remediation = "立即升级到 All-Mail 1.2 或更高版本，该版本修复了 SMTP 命令长度检查的缓冲区溢出问题。如无法升级，建议在防火墙上限制对 25/TCP 端口的访问，仅允许可信 IP 连接 SMTP 服务，并部署入侵检测规则监控异常的 MAIL FROM/RCPT TO 长命令。"
score = 10
severity = "CRITICAL"
sources = ["exploitdb"]
title = "Nevis Systems All-Mail 1.1 远程缓冲区溢出漏洞"
updated = "2026-06-16T21:52:54.800"

