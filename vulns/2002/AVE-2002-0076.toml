[basic]
description = 'Common Unix Printing System (CUPS) 1.1.14 至 1.1.17 版本存在安全绕过漏洞。远程攻击者无需任何认证，通过向目标 CUPS 服务发送特制的 UDP 数据包即可添加打印机，进而利用"需要授权"页面窃取管理服务器的本地根证书，执行未授权操作。该漏洞影响部署了上述 CUPS 版本的 Linux 及 macOS 系统，攻击复杂度低，无需用户交互，CVSS 评分 10.0，危害等级严重。'
published = "2002-12-26T05:00:00.000"
remediation = "立即升级 CUPS 至 1.1.18 或更高版本。Debian 用户执行 apt-get upgrade cupsys 升级至 1.1.14-5；Red Hat 用户安装 RHSA-2002:295 提供的更新；Mandrake 用户应用 MDKSA-2003:001 补丁；SuSE 用户安装 2003_002_cups 安全更新。如无法升级，在防火墙中限制 UDP 端口 631 的入站访问，仅允许受信任管理 IP 连接 CUPS 服务。"
score = 10
severity = "CRITICAL"
sources = ["osv"]
title = "Easy Software Products CUPS 未授权添加打印机安全绕过漏洞"
updated = "2026-06-16T21:59:11.317"

