[basic]
description = "Roxen Web Server 1.3.11 及更早版本中的 htmlparse.pike 模块存在递归解析漏洞。RXML 解析器采用递归机制处理标签，但 <referer> 标签的代码未对客户端输入的 Referer HTTP 头进行正确转义或阻止进一步递归解析，导致远程攻击者可通过发送构造了恶意 Referer 头的 HTTP 请求触发无限递归解析，造成服务器资源耗尽（拒绝服务）。该漏洞影响所有启用了 Pike-tag 或 RXML 解析器的 Roxen Web Server 实例，攻击者无需身份认证即可远程利用，CVSS v2.0 评分 5.0（AV:N/AC:L/Au:N/C:N/I:N/A:P），厂商已于 1999 年 10 月发布补丁修复。"
published = "1999-10-07"
remediation = '升级 Roxen Web Server 至 1.3.12 或更高版本，或应用官方补丁修改 htmlparse.pike 中 referer 标签处理逻辑：将 `return sizeof(id->referer)?id->referer*"":m->alt?m->alt:"..";` 改为 `return sizeof(id->referer)?({ id->referer*"" }):m->alt?m->alt:"..";`，用数组包裹返回值防止递归解析注入。临时缓解措施可禁用 RXML 解析器及 Pike-tag 功能。'
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Roxen Web Server htmlparse.pike 递归解析和 RXML referer 标签漏洞"
updated = "1999-10-07"

