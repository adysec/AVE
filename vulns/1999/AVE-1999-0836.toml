[basic]
description = "这是一个影响 ZyXEL Prestige 路由器的管理和配置服务漏洞。该路由的管理界面（包括 Web 管理界面或 Telnet 服务）配置不当，允许来自任意网络的未授权连接。攻击者无需身份验证即可访问路由器的管理服务，能够进行配置修改、查看网络状态或执行其他管理操作，从而可能导致路由设备被完全控制，网络安全架构被破坏，甚至成为进一步攻击的跳板。此类漏洞影响于支持远程管理的网络设备，攻击者可通过网络直接对路由进行非法操作，危害网络基础设施安全。"
published = "1999-01-01T05:00:00.000"
remediation = "升级 ZyXEL Prestige 路由器固件至最新版本，建议开启访问控制列表 (ACL) 仅允许特定 IP 访问管理接口，并关闭不必要的服务如 Telnet，使用强密码并启用 HTTPS 管理。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "ZyXEL Prestige 路由器 管理接口未授权访问漏洞"
updated = "2026-06-16T21:48:39.527"

