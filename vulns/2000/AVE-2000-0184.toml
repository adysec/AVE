[basic]
description = "Lynx 2.x 版本的 HTTP 客户端实现中存在缓冲区溢出漏洞，远程攻击者可通过在恶意网页中嵌入超长 URL，诱使目标用户访问后触发该漏洞，导致 Lynx 浏览器崩溃或实现任意代码执行。该漏洞影响 Lynx 2.x 全系列版本，攻击条件简单，仅需用户使用 Lynx 浏览器访问恶意链接即可触发，危害较高。"
published = "2000-02-27T05:00:00.000"
remediation = "升级 Lynx 至 2.8.3 或更高版本，该版本在 HTTP.c 中添加了缓冲区边界检查，防止超长 URL 触发溢出。如无法升级，避免在 Lynx 中打开不可信网页附件或点击可疑长链接，并可考虑临时使用其他浏览器（如 w3m）替代。"
score = 7.6
severity = "HIGH"
sources = ["epss"]
title = "Lynx URL 处理缓冲区溢出代码执行漏洞"
updated = "2026-06-16T21:51:13.793"

