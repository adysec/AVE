[basic]
description = "Dansie 购物车应用 cart.pl 中存在安全设计缺陷，远程攻击者可通过修改网页中隐藏表单字段（hidden form fields）的值来篡改敏感购买信息（如商品价格、数量等），从而实现以低于原价的价格完成订单。该漏洞无需身份认证即可利用，攻击者只需向目标服务器发送包含恶意修改的隐藏表单字段值的 HTTP 请求即可触发。由于 danish cart.pl 未对隐藏表单字段进行服务端校验，导致任意未授权用户均可绕过支付逻辑。CVSS 评分为 10.0，危害等级严重，影响运行 Dansie shopping cart 的 Web 服务器。"
published = "2000-04-11T04:00:00.000"
remediation = "该漏洞源于 cart.pl 将商品价格、数量等敏感交易数据存放在 HTML 隐藏表单域中，攻击者可直接修改提交任意值。根本修复方案：废弃该 CGI 程序，改用服务端会话机制存储订单信息，所有价格、折扣等关键数据仅在服务端维护，不接受客户端提交。如仍在使用旧版 Perl CGI 购物车，须对所有隐藏表单提交的参数做服务端校验，或迁移至支持服务端会话的现代购物车系统（如 WooCommerce、Magento 等）。"
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "Dansie Shopping Cart 隐藏表单域敏感信息修改漏洞"
updated = "2026-06-16T21:51:19.690"

