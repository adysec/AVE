[basic]
description = "VDOLive Player 3.0.2 及更早版本在处理特制的 .vdo 媒体文件时存在基于堆/栈的缓冲区溢出缺陷。攻击者可通过诱导用户打开恶意 .vdo 文件，使超长数据覆盖内存边界，导致客户端崩溃并在目标主机上执行任意代码。该漏洞无需身份验证，攻击条件为诱使用户打开恶意文件，对用户系统构成严重安全威胁。"
published = "1999-12-13"
remediation = "升级到 VDOLive Player 官方发布的修复版本，移除存在溢出缺陷的旧版 3.0.2 及更早版本。如无法立即升级，应在邮件网关和浏览器中阻止 .vdo 文件下载与自动打开，并禁用媒体的自动播放功能以减少攻击面。"
score = 7.6
severity = "HIGH"
sources = ["cve"]
title = "VDOLive Player 缓冲区溢出远程代码执行漏洞"
updated = "2026-07-19"

