[basic]
description = "Netsweeper 4.0.4 的 Web 管理后台 `webadmin/deny/index.php` 中存在反射型跨站脚本漏洞。远程攻击者无需身份认证即可向 `url` 参数注入任意 HTML 或 JavaScript 脚本，当管理员或用户访问特制链接时，恶意脚本将在浏览器中执行，导致敏感信息泄露、会话劫持或钓鱼攻击。该漏洞源于程序在 Web 页面生成时未对用户输入进行正确的转义处理，CVSS 评分 6.1，危害等级中危。"
published = "2020-02-19T20:15:13.597"
remediation = "升级 Netsweeper 至 4.0.4 之后的安全修复版本（如 6.x 系列），或联系厂商获取最新补丁。若无法升级，在 Web 服务器或反向代理层添加 WAF 规则，对 `webadmin/deny/index.php` 的 `url` 参数进行输入过滤，拦截 `<script>`、`onerror=` 等 XSS 载荷；同时在应用层对输出进行 HTML 实体编码，确保用户输入不被浏览器解释为可执行脚本。"
score = 6.1
severity = "MEDIUM"
sources = ["nuclei"]
title = "Netsweeper Netsweeper 跨站脚本漏洞"
updated = "2026-06-17T00:18:39.017"

