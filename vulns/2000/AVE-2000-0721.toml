[basic]
description = "Blackboard CourseInfo 4.0 存在敏感信息明文存储漏洞，系统将本地管理员及 SQL 数据库管理员的用户名和密码以明文形式保存在注册表键值中，且该键值的访问控制权限配置不当，允许普通用户读取。本地攻击者可登录目标系统后直接读取注册表获取管理员凭据，进而提升权限或访问后端数据库。CVSS 评分 2.1，危害等级低。"
published = "2000-07-10T04:00:00.000"
remediation = '立即升级到受支持的 Blackboard Learn 版本（CourseInfo 4.0 已停止维护），同时使用 regedit 限制注册表项 `HKLM\SOFTWARE\Blackboard\CourseInfo\4.0` 的权限，仅允许 SYSTEM 和 Administrators 读取，并立即更改所有明文存储的本地管理员和 SQL 管理员密码。'
score = 2.1
severity = "LOW"
sources = ["cve"]
title = "Blackboard CourseInfo 4.0 明文管理员密码漏洞"
updated = "2026-06-16T21:52:05.730"

