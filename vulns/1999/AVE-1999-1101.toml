[basic]
description = "Apple Mac OS X 1.0 中集成的 Apache HTTP Server 存在拒绝服务漏洞。远程攻击者可通过向 CGI 程序发送大量 HTTP GET 请求，导致服务器生成大量进程从而耗尽系统资源，最终造成服务崩溃。该漏洞影响 Mac OS X 1.0 版本，攻击者无需认证即可发起攻击，危害等级中等。"
published = "1999-06-03T04:00:00.000"
remediation = "升级 Apache HTTP Server 至 1.3.14 及以上版本，或升级 Mac OS X 至 10.1 及以上版本以修复该拒绝服务漏洞。如无法升级，可在 Apache 配置中启用 mod_limitipconn 模块限制单 IP 并发连接数，或在防火墙层面限制 CGI 路径的请求速率作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Apple Mac OS X Apache HTTP Server CGI 拒绝服务漏洞"
updated = "2026-06-16T21:50:23.160"

