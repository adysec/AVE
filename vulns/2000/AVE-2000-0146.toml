[basic]
description = "Sun Internet Mail Server 密码泄露漏洞"
published = "2000-02-20T05:00:00.000"
remediation = "Sun Internet Mail Server (SIMS) 已停止维护，建议迁移至 Oracle Communications Messaging Server 或其它受支持的邮件服务器。临时缓解措施：以 root 身份执行 `chmod 640 /etc/mail/sims.conf /etc/mail/sims.passwd` 限制配置文件权限，并移除全局可读权限；同时检查 `/var/mail` 下是否存在权限过松的密码缓存文件，确保仅 mail 管理员组可读。"
