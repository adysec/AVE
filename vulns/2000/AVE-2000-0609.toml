[basic]
description = "Microsoft SQL Server 7.0 及 Microsoft Data Engine (MSDE) 1.0 存在权限提升漏洞。远程攻击者可通过向目标数据库发送特制的 Select 语句，利用 SQL 查询解析过程中的缺陷实现权限提升，从而获取数据库系统的高级控制权限。该漏洞影响 SQL Server 7.0 和 MSDE 1.0 版本，CVSS 评分 7.5，危害等级高。建议用户升级至受支持版本或安装官方补丁。"
published = "2000-03-08T05:00:00.000"
remediation = "立即安装 Microsoft 安全公告 MS00-014 提供的补丁，适用于 SQL Server 7.0 及 MSDE 1.0。建议升级至 SQL Server 7.0 Service Pack 2，该版本已包含此漏洞修复。临时缓解措施：限制仅允许受信任用户通过 ODBC/OLE DB 提交查询，优先使用 Windows 身份验证模式而非 SQL Server 身份验证。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "Microsoft SQL Server 7.0 及 MSDE 1.0 权限提升漏洞"
updated = "2026-06-16T21:51:12.873"

