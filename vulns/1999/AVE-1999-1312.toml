[basic]
description = "AT&T TCP/IP 4.0 软件套件中的 rexec 守护进程（rexecd）存在远程命令执行漏洞。该守护进程未能正确验证用户输入，远程攻击者无需身份认证即可通过网络向目标系统发送特制请求，利用该漏洞在 SVR4 系统上以守护进程权限执行任意命令。该漏洞影响多种运行 SVR4 操作系统的平台，CVSS 评分 10.0，危害等级严重。目前厂商已发布补丁修复此问题。"
published = "1992-02-25T05:00:00.000"
remediation = "立即禁用 rexec 服务（rexecd），在 inetd.conf 中注释或删除 rexec 行并重启 inetd 进程。对于 SVR4 系统，升级 AT&T TCP/IP 至 4.0 以上已修复版本，或迁移至 SSH 替代 r 系列命令（rsh/rexec/rlogin）。在防火墙层面阻止 TCP 端口 512（rexec）的入站连接作为临时缓解措施。"
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "AT&T TCP/IP 4.0 rexecd 远程代码执行漏洞"
updated = "2026-06-16T21:49:37.173"

