[basic]
description = "Check Point Firewall-1 4.0及4.1版本在处理畸形IP分片数据包时存在缺陷，远程攻击者无需身份认证即可向目标系统发送大量特制的畸形IP分片报文，触发防火墙组件解析异常，导致服务崩溃或拒绝服务。该漏洞影响Check Point Firewall-1 4.0/4.1系列版本，CVSS评分5.0，危害等级中危。"
published = "2000-06-06"
remediation = "升级至Check Point Firewall-1 4.1 Service Pack 2及以上版本。临时缓解措施可在防火墙上配置分片报文重组限制，丢弃恶意畸形分片包，或限制单位时间内分片报文的数量以防止资源耗尽。"
score = 5.0
severity = "MEDIUM"
sources = [
    "cve",
    "exploitdb",
]
title = "Check Point Firewall-1 畸形IP分片包拒绝服务漏洞"
updated = "2026-06-16"

