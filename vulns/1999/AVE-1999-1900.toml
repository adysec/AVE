[basic]
description = "Open VMS VAXstations 系统在配置 DECwindows 或 MOTIF 图形界面环境时，存在账户锁定机制失效的安全漏洞。当用户登录失败次数超过设定的阈值后，系统未能正确禁用该账户的访问权限，导致远程攻击者可以持续进行暴力密码猜测攻击，绕过认证限制获取系统访问权限。该漏洞影响 Open VMS 5.3 至 5.5-2 版本，CVSS 评分 9.8，危害等级严重。"
published = "1999-12-31T05:00:00.000"
remediation = "升级 Open VMS 至 5.5-2-H1 或更高版本，该版本已修复登录失败阈值检测失效问题。如无法升级，在 SYSGEN 中设置 LGI_BRK_TERM 和 LGI_BRK_DISUSER 参数为启用状态，并配置系统安全审计策略监控异常登录行为。"
score = 9.8
severity = "CRITICAL"
sources = ["epss"]
title = "HP OpenVMS VAXstations 登录失败账户锁定机制绕过漏洞"
updated = "2026-06-16T21:50:11.863"

