[basic]
description = "Citrix NetScaler ADC 和 Gateway 的认证接口存在输入验证不足漏洞，当设备配置为 Gateway（VPN 虚拟服务器、ICA 代理、CVPN、RDP 代理）或 AAA 虚拟服务器时，未经身份认证的远程攻击者可通过向 `/p/u/doAuthentication.do` 端点发送特制 HTTP 请求触发内存越界读取，导致敏感信息泄露。该漏洞影响 Citrix NetScaler ADC 和 Gateway 14.1 等多个版本，CVSS 评分 9.3，危害等级严重。厂商已发布安全更新修复此漏洞。"
published = "2025-06-17T13:15:21.523"
remediation = "立即将受影响 NetScaler ADC/Gateway 升级至 14.1-43.56 或 13.1-58.32 及以上版本（FIPS/NDcPP 版本请联系 Citrix 支持获取对应修复版本）。升级后执行 `kill sessions` 命令清除已有会话，防止攻击者利用已窃取的内存数据持续访问。该漏洞无临时缓解措施，无法通过 WAF 签名或防火墙规则规避，必须升级修复。"
score = 9.3
severity = "CRITICAL"
sources = ["hwpoc"]
title = "Citrix NetScaler ADC/Gateway 内存信息泄露漏洞"
updated = "2026-06-17T09:48:43.670"

