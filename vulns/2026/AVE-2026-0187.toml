[basic]
description = "Oracle Unified Directory 存在权限许可和访问控制漏洞，未经认证的远程攻击者可通过 LDAP 或 RMI 接口向目标系统发送特制请求，绕过身份验证机制实现对目录服务的未授权访问。成功利用该漏洞可导致敏感目录信息泄露、权限提升甚至横向移动，威胁系统安全。该漏洞影响 Oracle Unified Directory 多个受支持版本，建议用户及时关注 Oracle 官方安全公告并安装相应补丁。"
published = "2026-07-13"
remediation = "立即通过 My Oracle Support 下载并安装适用于当前 Oracle Unified Directory 版本的最新 Critical Patch Update（CPU）补丁并完成重启验证；在补丁落地前，于网络边界与主机防火墙严格限制 LDAP（389/636）及 RMI 管理端口仅对可信管理网段开放，关闭或限制匿名绑定与未鉴权 RMI 访问，并定期审计目录访问与认证日志。"
score = 5.0
severity = "MEDIUM"
sources = ["hwpoc"]
title = "Oracle Unified Directory 未授权访问漏洞"
updated = "2026-07-13"

