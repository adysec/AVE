[basic]
description = "SCO OpenServer 5.0.5 中的 userOsa 程序存在符号链接漏洞，本地攻击者可通过创建恶意符号链接欺骗程序写入或覆盖任意文件，导致文件损坏或权限提升。该漏洞影响 SCO OpenServer 5.0.5 版本，攻击者需具备本地用户权限，利用 userOsa 程序处理符号链接时的竞争条件，将符号链接指向敏感系统文件，诱导程序写入恶意数据导致文件损坏或权限提升。CVSS 评分 2.1，属于本地权限提升类低危漏洞，SCO 已发布补丁修复该符号链接竞争条件漏洞。"
published = "1999-10-11T04:00:00.000"
remediation = "升级 SCO OpenServer 至 5.0.6 或更高版本，该漏洞已在后续版本中修复。如无法升级，可移除 userOsa 的 setuid 位（chmod u-s /usr/bin/userOsa）或限制可执行该程序的用户组，以阻断符号链接攻击路径。"
score = 2.1
severity = "LOW"
sources = ["avd"]
title = "SCO OpenServer 5.0.5 userOsa 符号链接漏洞"
updated = "2026-06-16T21:49:16.557"

