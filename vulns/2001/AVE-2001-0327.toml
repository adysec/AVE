[basic]
description = "该漏洞存在于 Red Hat Linux 系统中的 TUX HTTP 服务器 2.1.0-2 版本中，该服务器在处理 HTTP 请求时对 Host 头部信息的验证不足，导致攻击者能够向目标系统发送包含超长 Host 头部的恶意 HTTP 请求。通过这种方式，远程攻击者可以触发服务器的整数溢出或内存耗尽等异常情况，最终导致服务器拒绝服务，无法正常响应客户请求。该漏洞主要影响了部署 Red Hat Linux 并使用 TUX HTTP 服务器的 Web 服务平台攻击者无需任何身份验证即可实施攻击，只需要向目标服务器发送一个包含超长 Host 头的简单HTTP请求即可成功触发漏洞通过这种简单的网络攻击手段，攻击者可以使目标服务器变得不可用，影响了企业的正常在线服务运营带来了重大的安全隐患。MICROSOFT和相关安全团队已确认这一漏洞的风险并建议采取相应的安全措施，包括更新服务器补丁或配置服务器以限制Host头部的长度。"
published = "2001-12-06T05:00:00.000"
remediation = "建议升级 TUX HTTP server 到 2.1.0-3 或更高版本，该版本修复了长期存在的 Host 头部限制不足问题。还应更新到最新的安全增强版操作系统发行版，如 Red Hat Enterprise Linux 2.1 或更高版本，以获取所有已知漏洞的综合修复。作为临时缓解措施，可在 Web 服务器防火墙配置中限制 HTTP Host 头部的最大长度至 256 字节以下，并使用 RBL 或防火墙对可疑 IP 进行速率限制。通过这些分层控制措施，可立即降低过长的 Host 头部攻击向量。"
score = 5
severity = "MEDIUM"
sources = ["redhat"]
title = "红帽 TUX HTTP Server 2.1.0-2 Host Header 拒绝服务漏洞"
updated = "2026-06-16T21:55:06.070"

