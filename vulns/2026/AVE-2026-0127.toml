[basic]
description = "Esri ArcGIS Server 存在目录遍历漏洞（CVE-2026-9181，CVSS 9.8），未经身份认证的远程攻击者可通过向目标系统发送特制的路径参数触发路径遍历，导致覆盖系统敏感文件。成功利用此漏洞可获得 ArcGIS Server 的完全管理员权限，对机密性、完整性和可用性造成严重影响。该漏洞影响 Windows 和 Linux 平台上 ArcGIS Server 12.0 及之前所有版本，ArcGIS Enterprise on Kubernetes 不受影响。"
published = "2026-07-06T19:17:09.553"
remediation = "立即升级 ArcGIS Server 至 12.0 之后的最新版本（Esri 已于 2026 年 5 月安全公告中发布修复版本）。如无法立即升级，可在 Web 服务器或反向代理层添加路径规范化规则，拦截包含 `../` 等目录遍历特征的请求参数；同时考虑迁移至 ArcGIS Enterprise on Kubernetes 平台，该部署形态不受此漏洞影响。"
score = 9.8
severity = "CRITICAL"
sources = ["hwpoc"]
title = "Esri ArcGIS Server 目录遍历漏洞"
updated = "2026-07-08T15:16:32.720"

