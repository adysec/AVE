[basic]
description = "Solaris 8及更早版本系统中的 mailx 程序存在本地缓冲区溢出漏洞。当 mailx 处理超长的 '-F' 命令行参数时，由于未对输入长度进行充分检查，导致缓冲区溢出，本地攻击者可利用该漏洞覆盖内存中的关键数据，从而获取额外的系统权限。攻击者只需拥有本地 shell 访问权限即可触发该漏洞，无需身份认证。该漏洞影响 Solaris 2.5、2.6、7.0 及 8 等多个版本。"
published = "2001-08-14T04:00:00.000"
remediation = "升级到 Solaris 9 或更高版本，该漏洞已在后续版本中修复。如无法升级，可移除 mailx 的 setuid 权限（chmod u-s /usr/bin/mailx），限制本地普通用户通过 -F 参数触发缓冲区溢出。同时建议限制可登录系统的用户范围，仅允许受信任用户访问本地 shell。"
score = 4.6
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Oracle Solaris mailx 本地缓冲区溢出漏洞"
updated = "2026-06-16T21:54:32.717"

