[basic]
description = "Internet Explorer 4.0 在处理 EMBED 标签时存在缓冲区溢出漏洞。远程攻击者可构造包含超长 EMBED 标签属性的恶意 HTML 页面，当用户使用 IE 4.0 访问该页面时触发缓冲区溢出，导致攻击者可在当前用户上下文中执行任意代码，完全控制受影响系统。该漏洞影响 Windows 平台上使用 IE 4.0 的所有版本。"
published = "2000-01-04T05:00:00.000"
remediation = "立即升级 Internet Explorer 至 4.01 Service Pack 2 及以上版本，该版本修复了 EMBED 标签解析时的缓冲区溢出漏洞。对于当前仍在使用旧版 IE 的环境，建议升级至受支持的现代浏览器（如 Microsoft Edge），并禁用已停止维护的 IE 浏览器中 ActiveX 及 EMBED 标签的调用权限。"
score = 10
severity = "CRITICAL"
sources = ["cve"]
title = "Microsoft Internet Explorer 4.0 缓冲区溢出漏洞"
updated = "2026-06-16T21:49:14.490"

