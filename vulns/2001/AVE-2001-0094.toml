[basic]
description = "mICQ 客户端 0.4.6 及更早版本存在缓冲区溢出漏洞，远程攻击者可通过向目标用户发送特制的超长 Description 字段消息触发该漏洞，导致目标 mICQ 客户端崩溃（拒绝服务），在特定条件下还可执行任意代码。该漏洞影响所有使用 mICQ 0.4.6 及之前版本的用户，CVSS 评分 10.0，危害等级严重。攻击者无需身份认证即可远程利用，建议用户升级至修复版本。"
published = "2001-03-26T05:00:00.000"
remediation = "升级 mICQ 客户端至 0.4.7 或更高版本，该版本已修复 Description 字段缓冲区溢出问题。Debian 用户可通过 apt-get install micq 更新至安全版本。由于 mICQ 项目已停止维护，建议迁移至其他受支持的 ICQ 兼容客户端（如 Pidgin 或 Adium）以持续获得安全更新。如无法升级，可在防火墙或代理层面过滤 ICQ 协议流量（TCP 端口 5190），限制客户端仅连接可信服务器作为临时缓解措施。"
score = 10
severity = "CRITICAL"
sources = ["redhat"]
title = "mICQ 0.4.6 远程缓冲区溢出漏洞"
updated = "2026-06-16T21:53:55.893"

