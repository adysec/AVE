[basic]
description = "Solaris 2.5.1 系统中的 ffbconfig 工具存在缓冲区溢出漏洞，该程序在处理特定输入时未正确校验数据长度，导致可触发栈溢出。本地攻击者可利用该漏洞覆盖内存中的关键数据，实现权限提升，获取 root 权限。攻击者需拥有本地 shell 访问权限才能执行利用，CVSS 评分 7.2，危害等级高。"
published = "1997-02-10T05:00:00.000"
remediation = "建议升级至 Solaris 2.6 或更高版本。如无法升级，可临时移除 ffbconfig 的 setuid 权限以阻断利用：`chmod u-s /usr/sbin/ffbconfig`，或通过文件系统 ACL 限制可执行用户为 root 组：`chown root:root /usr/sbin/ffbconfig && chmod 750 /usr/sbin/ffbconfig`。"
score = 7.2
severity = "HIGH"
sources = ["epss"]
title = "Sun Solaris ffbconfig 本地缓冲区溢出漏洞"
updated = "2026-06-16T21:47:36.407"

