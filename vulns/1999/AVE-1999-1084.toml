[basic]
description = "InoculateIT 4.53 的 MS Exchange Server 选项中的 AV Option 组件存在安全检测缺陷，该组件仅扫描 Exchange 服务器的收件箱（Inbox）文件夹树，而未对其他邮箱文件夹进行病毒扫描。当用户通过邮件规则将邮件自动移动到其他邮箱时，包含病毒的邮件可绕过防病毒检测，导致恶意代码在目标系统中执行。该漏洞影响 InoculateIT 4.53 及可能更早版本，攻击者利用此设计缺陷可实现对邮件系统的隐蔽攻击，危害等级高。"
published = "1999-05-12T04:00:00.000"
remediation = "升级 InoculateIT 到 4.53 以上版本，或安装 CA 官方发布的针对 MS Exchange Server 选项的安全补丁。配置邮件规则时将扫描范围覆盖所有邮箱文件夹（Inbox、Sent Items、Deleted Items 等），避免仅扫描收件箱。建议禁用自动移动邮件的用户规则，或改用支持全邮箱扫描的防病毒软件（如 Microsoft Defender for Exchange）替代。如无法升级，可启用 Exchange 服务器的第三方防病毒接口（Virus Scanning API, VSAPI）实现全路径扫描作为临时缓解。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "InoculateIT MS Exchange Server 选项 病毒扫描绕过漏洞"
updated = "2026-06-16T21:50:17.480"

