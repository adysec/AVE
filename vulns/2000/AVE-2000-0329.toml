[basic]
description = "Windows NT 4.0 系统生成的 TCP 初始序列号（ISN）存在可预测性漏洞，其随机数生成算法存在缺陷，导致攻击者能够预测后续连接的序列号。远程攻击者可在无需认证的情况下，通过预测 ISN 伪造 TCP 连接或劫持已有会话，从而冒充可信主机执行未授权操作。该漏洞影响 Windows NT 4.0 所有版本，攻击者仅需掌握目标网络可达性即可发起攻击，危害等级中等。"
published = "1999-08-24T04:00:00.000"
remediation = "安装 Microsoft 安全公告 MS00-029 对应的修补程序（KB259728），或升级至 Windows NT 4.0 Service Pack 6a。对于无法安装补丁的遗留系统，建议在网络边界防火墙上启用 TCP 序列号随机化（如设置 ip tcp-random-seq），并部署入侵检测系统监控 TCP 会话劫持行为作为临时缓解。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Microsoft Windows NT 4.0 TCP 可预测初始序列号漏洞"
updated = "2026-06-16T21:51:29.250"

