[basic]
description = "浪潮云财务系统存在命令执行漏洞，攻击者可通过向 BizIntegrationWebService 接口发送特制 SOAP 请求，在 GetChildFormAndEntityList 方法中注入恶意命令参数，未经授权即可在服务器端执行任意系统命令。该漏洞影响浪潮云财务系统多个版本，攻击者无需认证即可远程利用，可导致服务器被完全控制、数据泄露或植入后门，危害严重。"
published = "0701"
remediation = "建议立即安装浪潮云财务系统最新安全补丁以修复命令注入漏洞，如无法立即部署，可先更新认证和会话验证模块，将输入参数转换为白名单模式，并关闭webserver服务的高风险功能接口作为临时缓解措施。"
