[info]
author = "AVE"
description = "通过构造包含超长参数的 pdf.setview 调用，触发 Adobe Acrobat Reader 4.0 中 pdf.ocx ActiveX 控件的栈缓冲区溢出，验证远程代码执行漏洞的存在。利用 CLSID CA8A9780-280D-11CF-A24D-444553540000 实例化控件。"
id = "POC-AVE-1999-2008"
name = "Adobe Acrobat Reader ActiveX pdf.ocx setview 缓冲区溢出 PoC"
severity = "high"
tags = ["ave-1999-2008"]
vuln_id = [
    "CVE-1999-1576",
    "AVE-1999-2008",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/poc.html"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["CA8A9780-280D-11CF-A24D-444553540000"]
