[basic]
description = "NetBSD 1.4.2 及更早版本以及 FreeBSD 3.4/4.0/5.0 的 IP 协议栈在处理 IP 时间戳选项时存在未对齐访问漏洞。远程攻击者可通过向目标系统发送特制的包含未对齐 IP 时间戳选项的数据包，触发内核内存访问异常，导致系统崩溃或拒绝服务。该漏洞无需认证即可远程利用，攻击复杂度较低，影响多个 BSD 系操作系统版本。"
published = "2000-05-01T04:00:00.000"
remediation = "升级到 NetBSD 1.4.3 及以上版本，或 FreeBSD 4.0-STABLE（2000-04-15 后版本）。如无法升级，可在 pf/ipfw 防火墙规则中丢弃包含 IP Timestamp 选项的数据包（iptables -m ipoption --tsopt -j DROP），或在系统层设置 net.inet.ip.process_options=0 禁用内核 IP 选项处理。也可在边界路由器上使用 access-list 过滤 IP 选项包（Cisco: deny ip any any options timestamp）。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "FreeBSD/NetBSD 内核 IP Timestamp 选项远程拒绝服务漏洞"
updated = "2026-06-16T21:51:44.310"

