[basic]
description = "phpShowtime 2.0 存在目录遍历漏洞，远程攻击者可通过向 index.php 文件的 'r' 参数传递包含 `..`（点点）序列的恶意路径，绕过访问限制，遍历并列出服务器上任意目录及图片文件。该漏洞源于程序未对用户输入的路径参数进行充分过滤，攻击者无需身份认证即可利用，影响 phpShowtime 2.0 版本，CVSS 评分 5.0，危害等级中危。"
published = "2012-02-02T17:55:01.677"
remediation = "phpShowtime 2.0 已停止维护且无官方补丁。建议立即停用 phpShowtime，迁移至仍在维护的图片展示系统。如无法替换，需手动修改 index.php 对 r 参数做路径过滤，禁止包含 ../ 等目录遍历序列，并使用 realpath() 将解析路径限制在网站根目录内，同时在 Web 服务器（如 Apache/Nginx）层面禁止访问非公开目录。"
score = 5
severity = "MEDIUM"
sources = ["nuclei"]
title = "phpShowtime 2.0 目录遍历漏洞"
updated = "2026-06-16T23:38:36.367"

