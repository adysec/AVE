[basic]
description = "3Com SuperStack II 交换机运行软件版本 2.10 的管理信息库（MIB）中存在一个可被只读团体字符串访问的对象标识符（.1.3.6.1.4.1.43.10.4.2），该 OID 泄露了完整的团体字符串表。攻击者只需知道只读 SNMP 团体字符串，即可通过 SNMP 协议获取设备的读写团体字符串，从而获得对设备的完全控制权限，实施未经授权的配置修改和网络监控。"
published = "1999-08-30"
remediation = "升级 3Com SuperStack II 交换机固件至不受影响版本；如无法升级，限制 SNMP 访问来源 IP，禁用不必要的 SNMP 服务，或使用 SNMPv3 并启用加密和认证功能。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "3Com SuperStack II 交换机 SNMP MIB 团体字符串信息泄露漏洞"
updated = "2026-06-16"

