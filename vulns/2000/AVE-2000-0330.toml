[basic]
description = "Microsoft Active Movie ActiveX 控件（随 Internet Explorer 5 分发）存在输入验证不当漏洞，该控件未对可下载的文件类型进行任何限制。远程攻击者可通过将恶意文件编码在电子邮件或新闻组帖子中，诱使用户在 IE 中查看包含该 ActiveX 控件的内容，从而将任意类型的文件（包括可执行文件）下载到用户系统上。成功利用此漏洞可导致任意代码执行、敏感信息泄露或拒绝服务。攻击无需身份认证，仅需用户交互（如预览邮件或点击链接）。"
published = "2000-05-13T04:00:00.000"
remediation = "立即安装 Microsoft 安全公告 MS00-033 提供的综合补丁，或升级至 Internet Explorer 5.01 Service Pack 1 及以上版本（IE 5.5 不受影响）。如无法打补丁，可通过注册表为 ActiveMovieControl Object (CLSID: 05589FA0-C356-11CE-BF01-00AA0055595A) 设置 Kill Bit 来禁用该 ActiveX 控件，防止任意文件下载攻击。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "Microsoft Internet Explorer Active Movie ActiveX 控件任意文件下载漏洞"
updated = "2026-06-16T21:51:38.210"

