[basic]
description = "CGI-World Poll It 2.0 投票系统 CGI 脚本存在内部变量覆盖漏洞，远程攻击者可通过向 data_dir 参数提交特制的文件名，绕过访问限制读取服务器上的任意文件，导致敏感信息泄露如配置文件、密码文件等。该漏洞影响 Poll It 2.0 及可能更早版本，攻击无需身份认证，利用难度低，危害较大。"
published = "2000-07-04T04:00:00.000"
remediation = '立即停止使用 CGI-World Poll It 2.0，该软件已停止维护且不再有安全更新。彻底删除服务器上 poll_it.cgi 及关联文件，改用现代投票系统替代。如必须保留使用，需在 Web 应用防火墙 (WAF) 层面添加规则过滤 data_dir 参数中的路径遍历字符（如 "../"），并限制 CGI 进程对文件系统的访问权限。'
score = 7.5
severity = "HIGH"
sources = ["exploitdb"]
title = "CGI-World Poll It 2.0 任意文件读取漏洞"
updated = "2026-06-16T21:52:03.820"

