[basic]
description = "PGP 5.5.x 至 6.5.3 版本在处理公钥证书时，未正确验证附加解密密钥（ADK）是否位于证书的签名区域内。攻击者若能篡改受害者的公钥证书并植入恶意的 ADK，即可利用该缺陷解密任何使用被篡改证书加密的数据。此漏洞属于设计层面的信任校验缺失，影响使用受影响 PGP 版本的所有用户，可能导致加密通信的机密性完全丧失。"
published = "2000-10-20T04:00:00.000"
remediation = "立即升级到 PGP 6.5.4 或更高版本，该版本已修复 ADK 在公钥证书签名部分存储时的校验逻辑。如无法升级，建议切换使用 GnuPG (GPG) 替代 PGP，避免使用带有 ADK 扩展字段的不可信公钥，并在加密通信前手工校验对方公钥的指纹与签名完整性。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "PGP 5.5.x至6.5.3 Additional Decryption Key验证绕过漏洞"
updated = "2026-06-16T21:52:15.010"

