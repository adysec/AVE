[basic]
description = "Eleanor CMS 的 go.php 文件存在开放重定向漏洞，远程攻击者可通过 QUERY_STRING 参数传入恶意 URL，将用户重定向至任意外部网站，进而实施钓鱼攻击。该漏洞攻击复杂度低，无需身份认证，仅需诱导用户点击特制链接即可触发。影响 Eleanor CMS 所有受影响版本，CVSS 评分 5.0，危害等级中危。建议升级至最新版本或对 go.php 的重定向目标进行白名单校验。"
published = "2014-12-02T16:59:17.087"
remediation = "Eleanor CMS 官方已停止维护，建议立即在 go.php 中添加 URL 白名单验证机制：仅允许重定向到本站域名或预定义的信任域名列表，拒绝所有外部 URL 重定向。具体实现可在 go.php 中增加 parse_url() 解析 QUERY_STRING 参数，提取 host 部分与白名单比对，不匹配则返回 400 错误或跳转到首页。如无法修改代码，可在 Web 服务器（Nginx/Apache）层面配置规则拦截对 go.php 的非本站域名参数传递。"
score = 5
severity = "MEDIUM"
sources = ["nuclei"]
title = "Eleanor CMS go.php 开放重定向漏洞"
updated = "2026-06-17T00:17:52.730"

