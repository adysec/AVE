[basic]
description = "Squid 代理服务器软件在 Red Hat Linux 5.2/6.0 及其他发行版中默认将 cachemgr.cgi 脚本安装于公开 Web 目录下，且未进行充分的访问权限控制。远程攻击者无需身份认证即可通过 HTTP 请求直接访问该脚本，将其作为中间代理连接至内部系统，进而实施端口扫描、内网探测等未授权操作。该漏洞影响 Squid 2.2 及更早版本，CVSS 评分 7.5，危害等级高。建议升级至最新版本或限制 cachemgr.cgi 的访问来源。"
published = "1999-07-25T04:00:00.000"
remediation = "立即应用 Red Hat RHSA-1999-025 安全公告提供的补丁，升级 Squid 软件包至修复版本。如无法升级，手动删除或移走 Web 目录下的 cachemgr.cgi 文件（通常位于 /usr/share/squid/cgi-bin/cachemgr.cgi），或通过 Apache/Nginx 配置限制对该 CGI 脚本的访问，仅允许受信任的管理 IP 地址访问。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "Squid cachemgr.cgi 未授权连接漏洞"
updated = "2026-06-16T21:48:53.680"

