[basic]
description = "NAI Net Tools PKI Server 1.0 的 strong.exe 组件存在缓冲区溢出漏洞，远程攻击者可通过向 HTTPS 端口发送特制的超长 URL 触发溢出，导致任意命令执行。该漏洞影响 HotFix 3 之前的所有版本，攻击者无需身份认证即可远程利用，危害较大。"
published = "2000-10-20T04:00:00.000"
remediation = "升级 NAI Net Tools PKI Server 至 HotFix 3 或更高版本，该补丁修复了 strong.exe 中处理 HTTPS 请求时的缓冲区溢出问题。如无法升级，可在防火墙上限制对 443 端口的非信任来源访问作为临时缓解。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "NAI Net Tools PKI Server strong.exe 缓冲区溢出漏洞"
updated = "2026-06-16T21:52:23.050"

