[basic]
description = "Microsoft SQL Server 7.0 混合模式认证功能存在敏感信息泄露漏洞。当 SQL Server 服务启动时，系统管理员 (sa) 账户的密码以明文形式记录在日志文件中，而该日志文件可被任意本地用户读取。攻击者若能够登录到目标系统，即可通过读取日志文件获取 sa 账户密码，进而以数据库管理员权限访问 SQL Server，可能导致数据库中的敏感数据泄露或进一步横向移动。该漏洞影响 Microsoft SQL Server 7.0 版本，CVSS 评分 2.1，危害等级低。"
published = "2000-05-30T04:00:00.000"
remediation = '立即安装 Microsoft 安全公告 MS00-035 提供的补丁程序，或使用 KB263968 中的密码清除工具删除 sqlsp.log 和 setup.iss 文件中记录的 SA 密码。同时将 SQL Server 身份验证模式从混合模式改为更安全的 Windows NT 身份验证模式，并使用 sp_password 存储过程更改 SA 账户密码。最后手动删除 %TEMP%\sqlsp.log 和 %WINNT%\setup.iss 文件（按住 Shift 键拖入回收站彻底删除），防止被恢复。'
score = 2.1
severity = "LOW"
sources = ["epss"]
title = "Microsoft SQL Server 7.0 明文密码存储漏洞"
updated = "2026-06-16T21:51:38.473"

