description = "Joomla! 的 ionFiles 组件（com_ionfiles）4.4.2 版本中的 download.php 文件存在目录遍历漏洞。远程攻击者无需身份认证即可通过在 file 参数中插入 `..` 序列实现路径跳转，进而读取服务器上任意敏感文件，如配置文件、数据库凭证等。该漏洞源于对用户输入的 file 参数缺乏充分的路径过滤与安全检查，影响范围涉及所有使用该版本组件的 Joomla! 网站，CVSS 评分 5.0，危害等级中等。"
