[basic]
description = "Linux 内核 PCI/MSI 子系统中存在不恰当的 irqdomain 缺失处理缺陷。在未提供 PCI/MSI 支持的 RISCV 等平台上，当设备尝试启用 MSI-X 中断时，pci_msi_setup_msi_irqs() 函数会触发遗留回退存根（legacy fallback stub），产生内核警告并可能导致系统拒绝服务。该漏洞源于 PCI/MSI 层未能正确评估遗留模式是否启用，在缺乏 PCI/MSI 父域关联的情况下仍执行了无效的遗留回退路径。本地攻击者需具备低权限，通过触发特定设备的 MSI-X 中断请求即可利用，影响 Linux 内核各发行版本，CVSS 评分 5.5，危害等级中等。"
published = "2025-01-06T17:15:41.173"
remediation = "立即升级 Linux 内核至 6.6.69、6.12.8 或 6.13 及以上版本，对应内核提交 b1f7476e07b93、aed157301c65、a60b990798eb 已包含修复。Ubuntu 24.04 LTS 用户可通过 apt update && apt install linux-image-6.8.0-1028-nvidia 安装 USN-7514-1 更新，或安装 USN-7381-1 提供的 linux-image-6.11.0-1011-lowlatency 版本，更新后重启系统生效。RISC-V 平台如不支持 PCI/MSI，可在内核配置中禁用 CONFIG_PCI_MSI 以消除警告。"
score = 5.5
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux Linux Kernel PCI/MSI irqdomain 缺失处理不当导致拒绝服务漏洞"
updated = "2026-06-17T08:12:55.740"

