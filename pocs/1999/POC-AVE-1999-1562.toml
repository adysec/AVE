[info]
author = "AVE"
description = "检测目标 IIS 5.0 服务器上是否存在可被利用的 .printer ISAPI 扩展映射。发送 GET 请求至 /NULL.printer，若返回状态 200 则表明易受攻击的扩展已启用。"
id = "POC-AVE-1999-1562"
name = "Microsoft Windows 2000 Internet 打印服务 ISAPI 扩展远程代码执行漏洞 PoC"
severity = "critical"
tags = ["cve-2001-0241"]
vuln_id = [
    "CVE-2001-0241",
    "AVE-1999-1562",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/NULL.printer"
protocol = "http"

[[poc.requests.matchers]]
expect = true
status = [200]
type = "status"
