[basic]
description = "rlogin 程序存在缓冲区溢出漏洞，攻击者可通过向 TERM 环境变量传入超长字符串触发栈溢出，导致本地权限提升。该漏洞影响 BSD/OS、DG/UX、Debian、Digital UNIX、FreeBSD、HP-UX、IBM AIX、NetBSD、NeXTstep、SGI IRIX、SunOS 等多种 UNIX 系统，攻击者须具备本地登录权限，利用难度较低。"
published = "1997-02-06T05:00:00.000"
remediation = "立即禁用所有受影响系统上的 rlogin/rsh 服务（停止 inetd 中的 login 服务并注释 /etc/inetd.conf 中相关行），改用 SSH 替代远程登录。如必须保留 rlogin，升级到各厂商已发布的安全补丁版本，并在编译时禁用 TERM 环境变量的长缓冲区传递。防火墙层面阻止 TCP 端口 513 入站流量以缓解外部攻击。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "多款Unix系统 rlogin 本地缓冲区溢出漏洞"
updated = "2026-06-16T21:47:26.963"

