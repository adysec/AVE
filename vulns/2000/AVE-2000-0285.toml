[basic]
description = "CVS 1.10.7 版本在处理锁文件时使用可预测的临时文件名，本地攻击者可利用此漏洞预先创建锁目录，阻止合法 CVS 用户获取文件锁，从而导致拒绝服务。该漏洞影响 CVS 1.10.7，攻击者需具有本地系统访问权限，无法远程利用，CVSS 评分 5.5，危害等级中危。"
published = "2000-04-23"
remediation = "升级 CVS 至 1.11 或更高版本，新版本使用 mkstemp 等安全临时文件创建机制替代可预测文件名。如无法升级，可限制本地用户对 CVS 锁目录的写入权限，或使用文件系统 ACL 仅允许授权用户操作临时文件。"
score = 5.5
severity = "MEDIUM"
sources = ["cve"]
title = "CVS 1.10.7 本地拒绝服务漏洞"
updated = "2026-06-16"

