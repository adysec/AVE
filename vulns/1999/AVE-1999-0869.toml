[basic]
description = "Windows NT 系统登录框默认会显示上一次成功登录的用户名，导致系统敏感信息泄露。本地攻击者通过物理访问目标系统即可获取有效用户名，降低了暴力破解登录密码的难度。该漏洞影响所有 Windows NT 及早期 Windows 版本，攻击者无需任何特权即可利用此漏洞收集账户信息，从而为后续攻击提供便利。"
published = "1999-01-01T05:00:00.000"
remediation = '在 Windows NT 中，打开组策略编辑器 (gpedit.msc)，依次展开「计算机配置 → Windows 设置 → 安全设置 → 本地策略 → 安全选项」，将「交互式登录: 不显示上次登录的用户名」设置为「已启用」。也可直接修改注册表 `HKEY_LOCAL_MACHINE\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Winlogon`，新建 DWORD 值 `DontDisplayLastUserName` 并设为 `1`。在 Windows Server 2003 及之后版本中此功能已默认启用，无需额外配置。'
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "Microsoft Windows NT 登录用户名信息泄露漏洞"
updated = "2026-06-16T21:48:41.777"

