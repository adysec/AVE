[basic]
description = "HP-UX 操作系统 8.0 至 9.0 版本中包含的 Support Watch（SupportWatch）组件存在权限管理缺陷，本地攻击者可通过利用该组件的配置漏洞获取超出其应有权限的系统访问权限。此漏洞允许低权限用户提升至更高权限级别，从而执行未授权的系统操作。攻击者需具备本地系统访问权限方可利用，影响范围涉及 HP-UX 8.0 至 9.0 版本。"
published = "1994-11-30T05:00:00.000"
remediation = "建议升级至 HP-UX 11i v3 及以上版本并安装最新 Quality Pack。如无法升级，以 root 执行 `chmod u-s /usr/sbin/supportwatch` 移除 SUID 位，或直接卸载 SupportWatch 组件以消除提权风险。"
score = 4.6
severity = "MEDIUM"
sources = ["avd"]
title = "HP-UX Support Watch 本地权限提升漏洞"
updated = "2026-06-16T21:50:02.033"

