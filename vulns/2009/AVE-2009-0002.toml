[basic]
description = "ZeroShell 1.0beta11 及更早版本的 cgi-bin/kerbynet 脚本中存在命令注入漏洞，远程攻击者无需认证即可通过向 NoAuthREQ x509List 动作的 type 参数中注入 shell 元字符，触发任意命令执行。该漏洞影响 ZeroShell 1.0beta11 及之前版本，CVSS 评分 10.0，危害等级严重。目前官方尚未发布补丁，建议限制相关页面的网络访问。"
published = "2009-02-12T23:30:01.170"
remediation = "升级至 ZeroShell 1.0beta12 或更高版本；若无法升级，对 1.0beta11 应用官方补丁 C100（zeroshell.net/eng/patch-details/#C100）；临时缓解措施：在防火墙或反向代理层限制对 /cgi-bin/kerbynet 的未授权访问，并对 web 管理控制台启用 IP 白名单或 HTTP 认证。"
score = 10
severity = "CRITICAL"
sources = ["nuclei"]
title = "ZeroShell 1.0beta11 远程代码执行漏洞"
updated = "2026-06-16T23:05:16.320"

