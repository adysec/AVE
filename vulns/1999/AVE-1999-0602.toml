[basic]
description = "FreeBSD 3.3 系统自带的 angband 游戏程序存在缓冲区溢出漏洞。该漏洞源于程序在处理用户输入时未对缓冲区边界进行充分校验，本地攻击者可通过向 angband 程序传入特制的超长数据触发溢出，进而执行任意代码并提升系统权限。该漏洞影响 FreeBSD 3.3 版本，攻击者需具备本地登录权限才能利用此漏洞成功获取更高权限。"
published = "1999-12-01T05:00:00.000"
remediation = "将 FreeBSD 系统升级至 3.4-RELEASE 或更高受支持版本，或通过 Ports Collection 升级 angband 游戏至 2.8.3 或更新版本以修复缓冲区溢出漏洞。如暂无法升级，可直接删除 angband 二进制文件（/usr/local/bin/angband）并移除相关端口作为临时缓解措施。"
score = 4.6
severity = "MEDIUM"
sources = ["exploitdb"]
title = "FreeBSD angband 本地缓冲区溢出漏洞"
updated = "2026-06-16T21:49:08.333"

