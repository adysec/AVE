[basic]
description = "ARP 协议缺乏身份验证机制，允许局域网内任意主机伪造 ARP 回复包投毒 ARP 缓存，导致 IP 地址欺骗或拒绝服务攻击。攻击者只需接入同一广播域，发送伪造的 ARP 应答将目标 IP 映射到攻击者 MAC 地址，即可劫持流量、窃取数据或中断通信。该漏洞影响所有使用标准 ARP 协议的 IPv4 网络设备，CVSS 评分 10.0，危害等级严重。"
published = "1997-09-19T04:00:00.000"
remediation = "在交换机上启用动态 ARP 检测 (DAI) 和 DHCP Snooping 功能，对关键服务器配置静态 ARP 条目，部署 ARP 欺骗检测工具（如 arpwatch），并在主机侧启用数据包签名或使用 IPSec 加密通信以缓解 ARP 缓存投毒攻击。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "ARP 协议 ARP 缓存投毒 拒绝服务欺骗漏洞"
updated = "2026-06-16T21:48:48.363"

