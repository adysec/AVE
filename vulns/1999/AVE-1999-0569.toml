[basic]
description = 'Microsoft Internet Explorer 4.01 及 5.0.1 版本中存在跨帧访问安全漏洞，远程攻击者通过在 "about:" JavaScript URL 中插入 "%01" 无效字节字符，可绕过同源策略限制，跨域读取目标系统本地文件内容或实施网页伪造欺骗。该漏洞影响面广泛，攻击者只需诱使用户访问构造的恶意网页即可触发，无需任何身份认证，CVSS 评分 10.0，危害等级严重。'
published = "1999-01-26T05:00:00.000"
remediation = '升级 Internet Explorer 至 5.01 Service Pack 1 或更高版本（如 IE 5.5/6.0），以消除 %01 字符跨域访问漏洞。若无法升级，可临时将 Internet 区域安全级别设为"高"并禁用 Active Scripting，以降低被利用风险。'
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "Microsoft Internet Explorer Invalid Byte 跨框架访问漏洞"
updated = "2026-06-16T21:48:12.110"

