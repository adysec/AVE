[basic]
description = "vqSoft vqServer for Windows 1.9.9 存在目录遍历漏洞，远程攻击者无需认证即可通过在 URL 中构造特制的 `/./` 路径序列（`..` 点号攻击的变种）绕过访问限制，遍历服务器文件系统并读取任意文件。该漏洞利用方式简单，攻击者可借此获取敏感配置信息或源代码，影响服务器数据机密性。建议升级至更高版本或部署访问控制措施。"
published = "2000-03-21"
remediation = "vqSoft vqServer 1.9.9 for Windows 已达生命周期，厂商不再发布安全补丁。建议立即迁移至其他仍在维护的 Web 服务器（如 Apache HTTP Server、Nginx 或 IIS）。如无法立即替换，可在 Web 服务器前部署反向代理或 WAF，配置规则拦截包含连续 `../` 及 `.//` 等目录遍历特征的 URL 请求，并限制网站进程对系统目录的读取权限。"
score = 5.0
severity = "MEDIUM"
sources = ["cve"]
title = "vqSoft vqServer for Windows 目录遍历漏洞"
updated = "2026-06-16"

