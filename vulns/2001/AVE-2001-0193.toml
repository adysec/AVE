[basic]
description = "Tektronix PhaserLink 850 网络打印机管理接口存在未授权访问漏洞。攻击者无需任何身份认证即可直接访问 `_ncl_subjects.shtml` 和 `_ncl_items.shtml` 等敏感配置页面，进而修改打印机配置信息，导致打印机服务异常或拒绝服务。该漏洞影响 Tektronix Phaser 740/750/850/930 系列打印机，攻击条件简单，仅需目标设备网络可达即可利用。"
published = "2001-06-27T04:00:00.000"
remediation = "将 Tektronix PhaserLink 850 打印机置于受信任的内部网络，在防火墙上限制对 80/443 端口的访问来源 IP，仅允许管理员的特定 IP 连接。禁用不必要的 Web 管理功能（如 _ncl_subjects.shtml 和 _ncl_items.shtml）。如设备固件有更新，升级到最新版本。对于已停产无法更新的设备，建议隔离到独立管理 VLAN 或替换为支持认证的新型号打印机。"
score = 6.4
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Tektronix PhaserLink 850 配置页面未授权访问拒绝服务漏洞"
updated = "2026-06-16T21:54:23.640"

