[basic]
description = "SapporoWorks WinProxy 2.0 及 2.0.1 版本的 POP3 服务存在缓冲区溢出漏洞。远程攻击者可通过向该服务的 USER、PASS、LIST、RETR 或 DELE 命令发送超长参数触发溢出，导致任意代码执行。该漏洞无需认证即可利用，影响运行 WinProxy 的系统，CVSS 评分 7.5，危害等级高危。建议用户立即升级至不受影响的版本。"
published = "2000-06-27T04:00:00.000"
remediation = "立即升级 WinProxy 至 2.0.2 或更高版本，该版本已修复 POP3 服务中多个命令的缓冲区溢出问题。由于该产品已停止维护，建议迁移至受支持的替代代理软件（如 Squid、HAProxy 等），并在防火墙规则中限制对 POP3 端口的非信任来源访问作为临时缓解措施。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "SapporoWorks WinProxy POP3 远程缓冲区溢出漏洞"
updated = "2026-06-16T21:52:04.063"

