[basic]
description = "禅道研发项目管理系统存在未授权访问漏洞，攻击者无需身份认证即可通过直接访问特定接口（如 /misc-captcha-user.html、/repo-create.html、/repo-edit-10000-10000.html 等）绕过验证码验证和权限校验，直接访问验证码接口、创建/编辑代码库等敏感功能。攻击者无需认证即可远程利用，影响禅道研发项目管理系统相关版本，可能导致敏感功能被未授权访问、代码库信息泄露或被恶意篡改，建议及时升级至官方修复版本并加强访问控制策略。"
published = "0726"
remediation = "立即升级禅道至最新版本（开源版 ≥ 22.3、企业版 ≥ 13.3、旗舰版 ≥ 8.3、IPD版 ≥ 5.3），该版本已修复验证码绕过导致的未授权访问漏洞。如无法立即升级，可在 Web 服务器（Nginx/Apache）层面对 `/misc-captcha-user.html`、`/repo-create.html`、`/repo-edit-` 等路径添加访问控制规则，仅允许可信 IP 访问，同时禁用未使用的模块路由。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "禅道 研发项目管理系统 未授权访问漏洞"
updated = "0726"

