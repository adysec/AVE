[basic]
description = "Be BeOS 4.0/4.5/5.0 存在拒绝服务漏洞，远程攻击者可通过向目标系统发送特制的畸形 IP 数据包触发该漏洞，其中数据包长度字段值小于实际头部长度，导致系统无法正确处理而崩溃。该漏洞影响 BeOS 4.0、4.5 及 5.0 版本，CVSS 评分 5.0，危害等级中危。目前官方已停止支持，建议用户迁移至其他操作系统。"
published = "2000-04-07T04:00:00.000"
remediation = "BeOS 已停止维护且无官方补丁，建议在网络边界防火墙启用非法分片包过滤规则，丢弃 IP 首部长度字段与载荷长度不一致的异常数据包。同时在受影响的 BeOS 主机上禁用不必要的网络服务，并限制仅允许受信任内网段访问。长远建议迁移至仍受支持的操作系统平台。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Be BeOS IP报文长度字段处理拒绝服务漏洞"
updated = "2026-06-16T21:51:23.117"

