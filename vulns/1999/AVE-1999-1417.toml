[basic]
description = "Id Software Quake Server 2 存在拒绝服务漏洞，远程攻击者可通过向服务器发送源地址为 127.0.0.1 的伪造 UDP 数据包，使服务器试图连接自身而导致服务崩溃或停止响应。该漏洞无需身份认证即可远程触发，影响 Quake 2 服务器及其衍生版本，CVSS 评分 5.0，危害等级中危。"
published = "1997-12-24T05:00:00.000"
remediation = "升级到已修复此漏洞的 Quake 2 服务器最新版本；在服务器端对入站 UDP 数据包进行源地址校验，丢弃声称来自 127.0.0.1 但实际从外部网络接口到达的数据包；在网络边界部署 ingress 过滤（BCP 38），阻止源地址为私有/回环地址的外部入站流量。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Id Software Quake Server 2 UDP Packet 拒绝服务漏洞"
updated = "2026-06-16T21:49:59.753"

