[basic]
description = "Microsoft Edge 内置的 Copilot Chat 组件存在注入漏洞，由于未对用户输入及外部数据进行充分过滤与校验，攻击者可通过精心构造的恶意请求向 Copilot Chat 发送特定载荷，导致注入恶意指令或内容。成功利用此漏洞可能使攻击者在目标用户会话中执行未授权操作、绕过安全限制或窃取敏感信息。该漏洞影响 Microsoft Edge 浏览器中集成 Copilot Chat 功能的版本，需用户交互触发，危害等级为高危。"
published = "20260604"
remediation = '建议立即将 Microsoft Edge 更新至最新稳定版（通过 edge://settings/help 检查并安装更新），最新版本已修复已知的 Copilot 注入漏洞。同时，在组策略中启用 Microsoft Edge 安全浏览模式（Enable browser legacy extension point blocking），并通过 edge://settings/privacy 关闭 Copilot 侧边栏的自动建议功能作为临时缓解措施。企业环境可通过 Intune 或 GPO 配置 "CopilotPagesEnabled" 策略为 0 以禁用 Copilot 集成，直至补丁应用完成。'
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "Microsoft Edge Copilot Chat 注入漏洞"
updated = "20260604"

