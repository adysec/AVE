[basic]
description = 'Microsoft Internet Explorer 存在无效字节跨框架访问漏洞。远程攻击者可在 about: 协议的 JavaScript URL 中注入 "%01" 特殊字符，使浏览器将其后的域名解析为当前安全域，从而绕过同源策略限制，读取本地文件并伪造网页内容。攻击者只需诱导用户访问恶意构造的网页即可触发该漏洞。'
published = "1999-01-26T05:00:00.000"
remediation = '立即停止使用 Internet Explorer 4.x/5.x，升级到 Microsoft Edge 或 Chrome/Firefox 等现代浏览器。IE 4/5 已于 2000 年代初停止支持，微软不再提供安全更新。如因兼容性必须使用 IE，建议在 Internet 区域禁用 JavaScript（工具 → Internet 选项 → 安全 → Internet → 自定义级别 → 脚本 → 禁用），并部署 URL 过滤规则拦截包含 "%01" 字符的 about: 请求作为临时缓解。'
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "Microsoft Internet Explorer 跨域框架访问绕过漏洞"
updated = "2026-06-16T21:48:12.110"

