[basic]
description = "Kerberos 4 密钥分发中心（KDC）程序的 kerb_err_reply 函数中存在基于 e_msg 变量的缓冲区溢出漏洞（CWE-120）。未经身份认证的远程攻击者可通过向目标 Kerberos 服务发送特制网络数据包触发该溢出，导致 KDC 服务崩溃或不可用，进而造成拒绝服务。该漏洞影响 MIT Kerberos 4 全系列（含 4.0 及 patch10）、MIT Kerberos 5 1.0 至 1.1.1 版本以及 Cygnus Network Security/KerbNet 产品。攻击者无需任何凭据即可在网络可达的情况下利用此漏洞，攻击复杂度低，仅造成可用性部分损失，不涉及数据泄露或篡改。CERT 发布了 CA-2000-11 安全公告，RedHat 同步发布了 RHSA-2000-031 修复补丁，MIT Kerberos 团队也发布了 krb4kdc.txt 公告和补丁程序，受影响用户应升级至安全版本以消除风险。"
published = "2000-06-09T04:00:00.000"
remediation = "升级 MIT Kerberos 5 至 krb5-1.2 正式版或更高版本，该版本已包含修复补丁；若仍在使用 krb5-1.0.x 或 krb5-1.1.x，须从 MIT 官方安全公告页面（web.mit.edu/kerberos/www/advisories/index.html）下载对应的 krb4kdc 补丁并应用至源码 kdc/kerberos_v4.c，补丁核心是将 kerb_err_reply 函数中的 strcat 替换为 strncat 并限制长度，同时在 APPL 请求处理中增加 MAX_KTXT_LEN 边界检查。若使用 MIT Kerberos 4，需应用 Patch 10 之后的安全补丁。若使用 KTH-krb4，须升级至 0.10 或更高版本。若暂时无法升级，可在 KDC 配置中禁用 Kerberos 4 兼容模式（设置 kdc_v4 = KDC_V4_DISABLE），或在防火墙层面仅允许受信客户端访问 KDC 端口 88，以限制攻击面。Red Hat 用户可安装 RHSA-2000:031 安全通告中的更新包。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "MIT Kerberos 4 缓冲区溢出拒绝服务漏洞"
updated = "2026-06-16T21:51:58.423"

