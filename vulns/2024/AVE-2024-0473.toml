[basic]
description = "这是一个由 Rync 协议栈中的整数溢出漏洞导致的堆缓冲区溢出问题。该漏洞源于对攻击者控制的校验和长度（s2length）处理不当，当 MAX_DIGEST_LEN 超过固定的 SUM_LENGTH（16 字节）时，攻击者可以向 sum2 缓冲区写入超出边界的数据。在未身份验证的远程攻击者通过向目标系统发送特制的 IPv6 数据包触发此漏洞后，可导致远程代码执行。该漏洞影响 Windows 10/11 及 Windows Server 2019/2022 等版本，CVSS 评分 9.8，危害等级严重。Microsoft 已在 2024 年 8 月安全更新中修复此漏洞。"
published = "2025-01-15T15:15:10.537"
remediation = "立即将 rsync 升级至 3.4.0 或更高版本。各发行版用户：Debian/Ubuntu 运行 apt update && apt upgrade rsync，Red Hat 系列安装 RHBA-2025:6470 更新（rsync-3.4.1-2.el10），源码编译用户从 https://rsync.samba.org 下载 3.4.0 重新编译。如无法立即升级，在非必要服务器上停止 rsync --daemon 服务（systemctl stop rsync && systemctl disable rsync），并在防火墙限制 rsync 端口（默认 873）仅允许可信来源访问作为临时缓解措施。"
score = 9.8
severity = "CRITICAL"
sources = ["msrc"]
title = "Rsync Rsync 守护进程 堆缓冲区溢出漏洞"
updated = "2026-06-29T21:16:29.923"

