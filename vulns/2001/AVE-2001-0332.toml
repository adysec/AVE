[basic]
description = 'Acme.Serve 1.7 存在URI处理缺陷，攻击者可通过向URI头部添加多个斜杠（"/"）字符，绕过路径验证机制，从而读取目标系统中任意文件。该漏洞影响 Cisco Secure ACS Unix 及某些其它使用 Acme.Serve 1.7 的产品，允许未经身份验证的远程攻击者访问敏感文件，如系统配置文件、密码文件、数据库文件等，窃取机密信息。攻击者只需发送构造恶意的HTTP请求，即可利用该漏洞在目标服务器上执行任意文件读取操作，威胁系统数据安全。基于 CVSS V2 评分为 5.0，攻击复杂度低，评估风险等级为中度，尽管其仅影响保密性，但可能导致严重信息泄露，尤其在涉及企业核心数据的应用系统中更为危险。该漏洞早先公布于 2001 年 10 月，至今仍有大量系统中未安装相关安全补丁，攻击风险不容忽视。（生成自CVE-2001-0748标准化数据集）'
published = "2001-10-18T04:00:00.000"
remediation = "Acme.Serve 1.7 版本存在目录遍历漏洞，直接导致任意文件读取。建议立即更新到最新安全版本（需查阅厂商最新补丁或官方版本），或使用路径验证中间件处理用户输入路径；如无法立即更新，可在防火墙/IDS中配置URL路径匹配规则，拦截包含多个连续'/'的前缀路径请求。可以使用Nginx反向代理部署Path 정규化验证，正则表达式:^/[a-zA-Z0-9_-]+[^/]*$，确保URL路径不以多个'/'开头。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Acme Serve 1.7 任意文件访问漏洞"
updated = "2026-06-16T21:54:53.097"

