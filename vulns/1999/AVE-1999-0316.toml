[basic]
description = "Microsoft Excel 97 的病毒警告机制存在安全缺陷，远程攻击者可通过构造特制的 Excel 文件，在用户打开该文件时绕过内置的病毒警告提示，从而在用户不知情的情况下执行恶意宏代码。该漏洞影响 Microsoft Excel 97 版本，攻击者需诱使用户打开恶意文件，CVSS 评分 2.6，危害等级低。"
published = "1999-05-07T04:00:00.000"
remediation = "升级到 Microsoft Office 2000 或更高版本，该漏洞已在后续版本中修复。如无法升级，建议禁用 Excel 中的宏自动执行功能，并在打开来自互联网的 Excel 文件前启用病毒警告机制。"
score = 2.6
severity = "LOW"
sources = ["epss"]
title = "Microsoft Excel 97 病毒警告机制禁用漏洞"
updated = "2026-06-16T21:48:54.573"

