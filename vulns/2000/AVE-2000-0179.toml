[basic]
description = "Trend Micro OfficeScan 3.5 的 tmlisten.exe 组件存在输入验证缺陷，远程攻击者无需身份认证即可向目标主机的 12345 端口发送特制的畸形数据，触发服务进程崩溃，导致拒绝服务。该漏洞影响 OfficeScan 3.5 版本，攻击者只需具备网络访问能力即可实施攻击，利用难度较低。"
published = "2000-02-28T05:00:00.000"
remediation = "升级 Trend Micro OfficeScan 至 3.5 以上已修复版本，或在防火墙上封禁 TCP 端口 12345 的外部访问，限制 tmlisten.exe 服务的网络暴露面。由于该版本已停止支持，建议迁移至受支持的 Worry-Free Business Security 版本。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Trend Micro OfficeScan 3.5 tmlisten.exe 远程拒绝服务漏洞"
updated = "2026-06-16T21:51:12.990"

