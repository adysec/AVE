[basic]
description = "CVE-1999-0539 涉及两台 Unix 主机之间建立的信任关系（如基于 .rhosts 或 hosts.equiv 的配置）。其原理是系统允许受信任的主机在无需身份认证的情况下以特定用户身份登录或执行命令。影响范围为配置了主机间信任关系的 Unix 系统，攻击者只要能够控制其中一台受信任主机，或以伪造源地址等方式冒用信任主机身份，即可在目标主机上绕过密码验证直接访问资源或执行命令，从而扩大攻击面并可能导致未授权访问与权限提升。"
published = "1999-01-01T05:00:00.000"
remediation = "删除或清空各主机的 .rhosts 文件及 /etc/hosts.equiv 文件中的信任条目，确保仅允许明确授权的主机建立信任关系；禁用 rlogin、rsh、rcp 等基于信任机制的传统远程服务，改用 SSH 密钥认证方式替代；在防火墙或网络层面限制 rlogin/rcp 相关端口（513、514）的访问，仅允许必要的管理主机通过 SSH 访问。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "Unix 主机信任关系未授权访问漏洞"
updated = "2026-06-16T21:48:36.267"

