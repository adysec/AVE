[basic]
description = "NCM Content Management System 中的 content.pl 脚本未对 id 参数进行有效过滤，存在 SQL 注入漏洞。远程攻击者无需身份认证即可向 id 参数插入特制 SQL 语句，实现对内容数据库的任意数据读取，导致敏感信息泄露。该漏洞攻击复杂度低，仅需构造恶意 HTTP 请求即可触发，ExploitDB 上已有公开利用代码。"
published = "2001-07-02T04:00:00.000"
remediation = '该产品已停止维护，无官方补丁。建议立即将 content.pl 脚本中 id 参数改为整数类型检查（如 `/^\\d+$/`），并对所有用户输入使用参数化查询或 prepared statement 替代字符串拼接。部署 Web 应用防火墙 (WAF) 拦截包含 SQL 特征的请求。考虑迁移至受支持的 CMS 平台。'
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "NCM Content Management System content.pl SQL注入漏洞"
updated = "2026-06-16T21:54:16.360"

