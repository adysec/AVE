[basic]
description = "BitchX IRC 客户端在处理频道邀请（/INVITE）时存在格式化字符串漏洞。由于程序未能正确过滤频道名称中的特殊格式化字符，远程攻击者可通过向运行 BitchX 的用户发送包含恶意格式化字符串的频道邀请，触发格式化字符串漏洞，导致客户端崩溃拒绝服务。该漏洞影响 BitchX IRC Client 75p1、75p3 及 1.0c16 版本，CVSS 评分 5.0，危害等级中危。"
published = "2000-07-04T04:00:00.000"
remediation = "针对 BitchX 75p1/75p3/1.0c16 的 /INVITE 格式化字符串漏洞，应立即升级至已修复该问题的 BitchX 版本（≥1.0c17）。Red Hat Linux 用户请安装 RHSA-2000:042 提供的更新包；Caldera OpenLinux 用户请应用 CSSA-2000-022.0.txt 补丁；FreeBSD 用户可通过 ports 系统更新至已修复版本。由于 BitchX 已停止维护，强烈建议迁移至其他受支持的 IRC 客户端（如 Irssi、WeeChat、HexChat）以避免类似安全问题。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "BitchX IRC Client '/INVITE' 格式化字符串拒绝服务漏洞"
updated = "2026-06-16T21:52:04.317"

