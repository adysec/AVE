[basic]
description = "孚盟云（Fox Cloud）系统 GetImage.aspx 页面存在 SQL 注入漏洞，未授权的远程攻击者可通过向该页面传递特制的请求参数注入恶意 SQL 语句，从而绕过身份认证获取数据库中的敏感信息，包括管理员凭据及业务数据。攻击者无需登录即可利用该漏洞，攻击门槛低、危害性较大，建议用户及时升级修复。"
published = "2025-07-25"
remediation = "建议联系上海孚盟软件官方获取修复补丁或升级至最新版本，同时在Web应用防火墙上配置SQL注入防护规则，对GetImage.aspx页面的所有输入参数实施严格的参数化查询处理和输入过滤。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "孚盟云 GetImage.aspx SQL注入漏洞"
updated = "2026-07-20"

