[basic]
description = "Symantec Norton AntiVirus 在解析特制构造的恶意文件（如特定格式的压缩包或文档）时，由于未对输入数据长度进行充分边界校验，存在堆/栈缓冲区溢出缺陷。攻击者在无需认证的情况下，可通过诱导用户扫描或打开恶意文件触发该漏洞，导致杀毒引擎崩溃或执行任意代码，从而绕过安全防护并危害系统安全。"
published = "1999-12-31"
remediation = "升级至 Symantec 官方发布的 Norton AntiVirus 修复版本（建议 2000 年及以后的安全更新版本），并及时更新病毒定义库；在补丁就绪前避免扫描来源不明的文件。"
score = 7.5
severity = "HIGH"
sources = [
    "cve",
    "epss",
]
title = "Symantec Norton AntiVirus 恶意文件处理缓冲区溢出漏洞"
