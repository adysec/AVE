[basic]
description = "Linux 内核 netdevsim 驱动中存在内存泄漏漏洞（CWE-401），当用户通过 debugfs 接口向 `nsim_dev_trap_fa_cookie_write()` 函数写入 fa_cookie 时，分配的内存在设备移除过程（`nsim_drv_remove()`）中未被释放。本地攻击者可反复写入 fa_cookie 触发内存泄漏，最终导致系统内存耗尽引发拒绝服务。该漏洞影响 Linux 内核，CVSS 评分 5.5，危害等级中等。"
published = "2025-05-01T15:16:03.617"
remediation = "升级 Linux 内核至 6.1 及以上版本，或打补丁至 5.10.260/5.15.209/6.0.10 稳定版。修复在 `nsim_drv_remove()` 中添加 `kfree(nsim_dev->fa_cookie)` 释放已分配内存。作为临时缓解措施，可卸载 netdevsim 内核模块（`rmmod netdevsim`）避免触发内存泄漏。"
score = 5.5
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux Kernel netdevsim 内存泄漏漏洞"
updated = "2026-07-04T12:16:51.650"

