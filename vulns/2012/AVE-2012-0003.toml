[basic]
description = "WordPress Count Per Day 插件（版本 3.1.1 之前）的 download.php 文件中存在绝对路径遍历漏洞（CWE-22）。远程攻击者无需身份认证即可通过向 f 参数传递包含 ../ 等路径遍历序列的特制请求，绕过目录限制读取服务器上的任意文件（如 /etc/passwd 等敏感文件），导致敏感信息泄露。该漏洞 CVSS 评分 5.0，危害等级中危，影响所有使用该插件的 WordPress 站点。"
published = "2012-01-20T17:55:01.910"
remediation = '立即将 Count Per Day 插件升级至 3.1.1 及以上版本。由于该插件已于 2019 年因违规被关闭下架且不再维护，建议彻底停用并删除此插件，改用其他受支持的访客统计插件（如 Jetpack Stats 或 Site Kit by Google）。如无法立即删除，可在 .htaccess 中添加 `<Files "download.php"> Order Allow,Deny Deny from all </Files>` 阻断对该文件的直接访问，作为临时缓解措施。'
score = 5
severity = "MEDIUM"
sources = ["nuclei"]
title = "WordPress Count Per Day 插件绝对路径遍历漏洞"
updated = "2026-06-16T23:38:27.953"

