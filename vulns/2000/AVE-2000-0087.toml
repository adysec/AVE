[basic]
description = "SmartCart 购物车应用程序存在不安全设计漏洞，远程攻击者可通过修改网页表单中的隐藏字段（hidden form fields）来篡改敏感的购买信息（如商品价格、数量等），从而以低于实际价格的金额完成订单结算。该漏洞源于服务器端对客户端提交的数据缺乏充分的校验与过滤，攻击者无需身份认证即可利用。影响所有使用 SmartCart 的在线商店系统，CVSS 评分 7.5，危害等级高。"
published = "2000-02-01T05:00:00.000"
remediation = "此漏洞因应用程序依赖客户端隐藏表单域传输敏感数据（如价格、数量）且未在服务端校验导致。修复方法：1) 立即升级 SmartCart 至最新版本或迁移至受支持的购物车系统；2) 所有交易数据必须在服务端会话中维护和校验，禁止信任客户端提交的价格、折扣等敏感字段；3) 对隐藏表单域提交的数据实施 HMAC 签名校验以防篡改。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "SmartCart 购物车应用隐藏表单域远程信息修改漏洞"
updated = "2026-06-16T21:51:00.427"

