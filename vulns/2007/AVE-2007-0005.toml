[basic]
description = "Apache Struts2 框架 2.0.9 及更早版本存在 OGNL 表达式注入漏洞（S2-001）。攻击者无需身份认证即可通过向目标服务器发送特制的 HTTP 请求，在表单字段中注入恶意 OGNL 表达式。由于框架在处理用户提交的表单参数时未对输入进行充分过滤，导致 OGNL 表达式被服务器解析执行，最终造成远程代码执行。攻击者可借此完全控制目标服务器，执行任意系统命令。该漏洞影响范围广泛，危害严重。"
published = "2007-08-28"
remediation = "升级 Apache Struts2 至 2.0.11.1 或更高版本。该漏洞源于 XWork 的 OGNL 表达式解析器未正确过滤用户输入，攻击者可通过构造特殊参数执行任意系统命令。临时缓解措施：在应用中禁用对 OGNL 表达式的直接解析，或在 Web 服务器层面过滤包含 OGNL 特征（如 %{、#{} 等）的请求参数。"
score = 5
severity = "MEDIUM"
sources = ["nuclei"]
title = "Apache Struts2 远程命令执行漏洞"
updated = "2007-08-28"

