[info]
author = "AVE"
description = "通过 HTTP 服务向目标 IE5 发送含有超长 file:// URL 的 HTML 页面，触发 Windows 95/98 网络组件 UNC 路径处理缓冲区溢出，验证远程代码执行漏洞存在。"
id = "POC-AVE-2000-0274"
name = "Microsoft Windows 95/98 UNC Buffer Overflow PoC"
severity = "high"
tags = [
    "cve-2000-0330",
    "unc",
    "buffer-overflow",
    "windows",
]
vuln_id = [
    "CVE-2000-0330",
    "AVE-2000-0274",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/"
protocol = "http"

[[poc.requests.matchers]]
expect = false
part = "body"
type = "word"
words = ["file://test"]
