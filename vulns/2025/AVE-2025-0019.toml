[basic]
description = "致远 OA（Seeyon）平台的 `wpsAssistServlet` 接口存在任意文件上传漏洞。攻击者可在无需认证的情况下，通过 multipart 上传请求中构造 `realFileType` 参数进行路径遍历（CWE-22），将恶意 JSP 文件写入 web 服务器可访问目录，从而直接访问该文件导致远程代码执行。Shadowserver 基金会已于 2025-02-01 观测到野外利用，CVSS 评分 10.0，危害等级严重。建议立即升级至官方修复版本。"
published = "2025-06-24T02:15:22.673"
remediation = "立即升级致远OA至官方发布的安全版本（≥V8.1SP2或联系厂商获取补丁）。如无法升级，在Nginx/反向代理层配置规则拦截路径包含`/seeyon/wpsAssistServlet`的请求，并限制上传目录不可执行脚本文件。同时部署WAF规则过滤`realFileType`参数中的`../`路径穿越字符。"
score = 10
severity = "CRITICAL"
sources = ["hwpoc"]
title = "致远 OA 任意文件上传漏洞"
updated = "2026-06-17T09:13:21.587"

