[basic]
description = "Pirelli (ADB) P.DGA4001N 路由器存在权限控制不当漏洞，其 Web 管理接口未对敏感页面进行有效的访问限制。远程攻击者无需认证即可直接访问 wlsecurity.html 或 resetrouter.html 等关键页面，导致敏感信息泄露或设备重启拒绝服务。该漏洞影响固件版本 PDG_TEF_SP_4.06L.6，CVSS 评分 9.4，危害严重。攻击者只需知道目标路由器 IP 地址即可发起攻击，利用门槛极低。"
published = "2015-01-21T18:59:50.917"
remediation = "该设备为2015年固件PDG_TEF_SP_4.06L.6的Pirelli/ADB P.DGA4001N路由器，厂商已停止支持，无官方补丁。建议立即将设备置于防火墙后方，禁止从WAN侧访问管理界面（默认80/443端口），并在内网通过ACL限制仅信任IP可访问路由器Web管理页面。长期缓解措施为更换仍在安全更新支持期内的路由器设备。"
score = 9.4
severity = "CRITICAL"
sources = ["nuclei"]
title = "Pirelli P.DGA4001N 路由器 Web 接口信息泄露与拒绝服务漏洞"
updated = "2026-06-17T00:20:30.983"

