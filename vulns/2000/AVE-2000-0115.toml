[basic]
description = "Progress WebSpeed配置程序未正确禁用对WSMadmin实用程序的访问控制，远程攻击者可通过调用wsisa.dll组件绕过权限限制，从而获得系统提升权限。该漏洞影响Progress WebSpeed应用服务器相关版本，CVSS评分7.5分（高危），攻击者无需认证即可远程利用wsisa.dll漏洞获取系统提升权限，Progress Software已发布补丁修复该权限提升漏洞。"
published = "2000-02-03T05:00:00.000"
remediation = "建议升级到 Webspeed 厂商发布的修复版本（4.1 及以上），并通过 Web 服务器配置禁用对 wsisa.dll 及 WSMadmin 实用程序的远程访问，将相关 CGI/ISAPI 路径限制为仅本地回环地址访问；同时在边界防火墙或反向代理上阻断对 /scripts/wsisa.dll 等路径的外部请求，作为无法立即升级时的临时缓解措施。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "Webspeed 权限提升漏洞"
updated = "2026-06-16T21:51:03.400"

