[basic]
description = "XCmail 0.99.6 邮件客户端在启用自动引用（autoquote）功能时存在缓冲区溢出漏洞。远程攻击者可通过发送一封包含超长邮件主题行的邮件，当 XCmail 自动将邮件主题写入缓冲区时触发溢出，进而在目标系统上执行任意命令。该漏洞影响安装了 XCmail 0.99.6 版本且开启了 autoquote 选项的 Linux/Unix 系统，攻击者无需身份认证即可通过网络远程利用，CVSS v2 评分为满分 10.0，危害等级为严重。开发者在收到漏洞报告后已在后续版本 0.99.7 中修复了此问题，建议用户升级至 0.99.7 或更高版本。"
published = "1999-05-01T04:00:00.000"
remediation = "建议将 XCmail 升级至 0.99.6 之后修复缓冲区溢出的版本；若暂无法升级，请在客户端配置中关闭 autoquote（自动引用）功能以消除长主题行触发溢出的攻击面，并对接收邮件的 subject 字段长度进行限制过滤。"
score = 10
severity = "CRITICAL"
sources = ["cve"]
title = "XCmail 邮件客户端缓冲区溢出远程代码执行漏洞"
updated = "2026-06-16T21:50:42.237"

