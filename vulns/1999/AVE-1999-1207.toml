[basic]
description = 'wwwcount（Count.cgi）2.3 版本存在目录遍历漏洞，远程攻击者无需身份认证，通过在 image 参数中构造 ".." 序列绕过路径限制，可读取服务器上任意 GIF 文件。CVSS 评分 3.5，危害等级低。该漏洞区别于 CVE-1999-0021，仅影响 GIF 文件读取，无法执行代码或读取其他类型文件。'
published = "1999-12-31T05:00:00.000"
remediation = '立即升级至 wwwcount 2.3 以上版本，该漏洞仅存在于 2.3 版本。若厂商已停止维护，建议迁移至受支持的替代计数器方案（如 Matomo 或自研计数器）。在 cgi 脚本中严格过滤 image 参数中的 ".." 目录穿越序列，并对可读取文件路径做白名单校验，限制只允许访问指定目录下的 GIF 文件。此外，将 CGI 程序置于 chroot 环境或使用 Web 服务器沙箱隔离作为纵深防御。'
score = 3.5
severity = "LOW"
sources = ["avd"]
title = "Muhammad A. Muquit wwwcount 目录遍历漏洞"
updated = "2026-06-16T21:50:47.250"

