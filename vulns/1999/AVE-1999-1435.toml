[basic]
description = "rsh 守护进程（rshd）在处理用户登录请求时，对有效用户名和无效用户名返回不同的错误提示信息，导致远程攻击者可通过枚举用户名的方式探测系统上的有效用户账户。该漏洞属于信息泄露类型，攻击者无需身份认证即可利用，为后续暴力破解或针对性攻击提供前提条件。受影响系统包括各类运行 rshd 服务的 Unix/Linux 系统。"
published = "1997-06-13T04:00:00.000"
remediation = "建议立即禁用 rsh 服务（/etc/inetd.conf 注释掉 rsh 行并重启 inetd/xinetd），改用 SSH 协议替代。若必须保留 rsh，请在 /etc/hosts.allow 限制仅信任 IP 访问，并在 /etc/pam.d/rsh 添加 pam_securetty.so 防止根用户远程登录。推荐升级至 OpenSSH 8.0+ 并强制使用密钥认证。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "UNIX rsh守护程序 用户信息泄露漏洞"
updated = "2026-06-16T21:50:04.320"

