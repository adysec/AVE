[basic]
description = "lpd（行式打印机守护进程）在 lpr 软件包中存在认证绕过漏洞。该漏洞源于 lpd 通过将本地机器的反向解析主机名与 gethostname 返回的打印服务器主机名进行比对来验证客户端身份，攻击者可修改攻击 IP 的 DNS 解析记录，使反向解析结果与打印服务器主机名一致，从而绕过访问控制。成功利用此漏洞可导致远程命令执行，影响 RedHat 6.1 及 IRIX 6.5.18 等系统，CVSS 评分 10.0，危害等级严重。"
published = "2000-01-08T05:00:00.000"
remediation = "Red Hat 6.1 用户应升级至 lpr-0.48-2 及以上版本；IRIX 6.5.18 用户应安装 SGI 安全补丁 4729。如无法升级，可在 /etc/inetd.conf 中注释 lpd 行并重启 inetd 以禁用 lpd 服务，或在防火墙层面限制 TCP 515 端口的入站访问。"
score = 10
severity = "CRITICAL"
sources = ["osv"]
title = "Red Hat IRIX lpd 远程命令执行漏洞"
updated = "2026-06-16T21:53:24.660"

