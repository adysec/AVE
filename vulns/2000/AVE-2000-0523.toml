[basic]
description = "Novell NetWare 5.0 的 SMDR.NLM 模块存在拒绝服务漏洞，远程攻击者无需身份认证即可通过向目标系统的 40193 端口发送大量随机数据包，导致 SMDR 服务因无法正确处理异常流量而崩溃，造成目标系统拒绝服务。该漏洞影响 Novell NetWare 5.0 SP5 及 6.0 SP1 版本，攻击手段简单，利用难度低，目前已有公开的 PoC 验证代码。官方尚未发布补丁，建议通过访问控制限制 40193 端口的访问。"
published = "2000-07-11T04:00:00.000"
remediation = "安装 Novell NetWare 5.0 最新支持包（Support Pack 6 及后续累积补丁），或在服务器控制台执行 UNLOAD SMDR.NLM 卸载该模块（如 SMDR 服务非必需）。在网络层面于边界防火墙阻断对 TCP 40193 端口的入站访问，限制仅受信任管理网段可连接。鉴于 NetWare 5.0 已停止技术支持，建议尽快迁移至受支持的现代平台。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Novell NetWare 5.0 SMDR.NLM 拒绝服务漏洞"
updated = "2026-06-16T21:52:13.830"

