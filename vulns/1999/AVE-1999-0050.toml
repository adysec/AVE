[basic]
description = "Lsof 4.0.4 及之前版本存在本地缓冲区溢出漏洞，当以 setuid root 或 setgid kmem 权限运行时，本地攻击者可通过向 lsof 的 -u 参数传递特制超长字符串触发缓冲区溢出，从而获得目标系统的 root 权限。该漏洞影响 Debian 2.0/2.0 r5、FreeBSD 3.2、OpenBSD 2.4、RedHat 5.2 i386 及 S.u.S.E. 6.1 等多个操作系统版本。利用该漏洞需要本地用户身份，攻击者成功利用后可完全控制受影响的系统。"
published = "1999-02-18"
remediation = "升级 lsof 至 4.0.5 或更高版本；Debian/FreeBSD/OpenBSD/RedHat/S.u.S.E 用户应安装对应发行版安全更新补丁，限制 lsof 的 setuid 权限以降低风险"
score = 7.2
severity = "HIGH"
sources = ["cve"]
title = "多款操作系统 lsof 本地缓冲区溢出漏洞"
updated = "2026-06-16"

