[basic]
description = "Savant WebServer 2.0 在处理包含空字符（%00）的 URL 请求时，未能正确解析和过滤该字符，导致服务器在对请求路径进行字符串处理时发生异常，进而引发崩溃或拒绝服务。攻击者可通过向受影响服务发送特制的 HTTP 请求即可触发该漏洞，无需身份认证，且可远程利用，影响服务器可用性。"
published = "2000-01-12"
remediation = "升级到 Savant WebServer 3.0 或更高版本，该版本已修复对包含空字符 URL 的解析处理。若暂无法升级，可在前端代理或防火墙处过滤包含 %00 的请求。"
score = 5.0
severity = "MEDIUM"
sources = ["cve"]
title = "Michael Lamont Savant WebServer 2.0 URL 空字符拒绝服务漏洞"
updated = "2000-01-12"

