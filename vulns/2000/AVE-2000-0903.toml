[basic]
description = "Lyris List Manager 3 和 4 版本的 Web 管理界面存在隐藏表单字段操纵漏洞。列表订阅者可通过修改页面中 `list_admin` 隐藏表单字段的值来获取管理员访问权限，本质上是服务端未对前端提交的敏感参数进行充分校验。攻击者只需拥有合法订阅者账号即可利用，无需身份认证绕过，成功后可完全控制邮件列表管理系统，包括修改配置、管理用户及查看敏感信息。该漏洞 CVSS 评分 4.6，危害等级中危。"
published = "2000-10-20T04:00:00.000"
remediation = "升级到 Lyris ListManager 5.0 或更高版本（厂商已修复该问题）。如无法升级，需修改 Web 应用代码，在服务端对 list_admin 字段进行权限校验，禁止普通订阅者提交该字段；同时移除 HTML 表单中所有隐藏的管理员权限字段，改为服务端 session 鉴权。鉴于该产品已停止维护，建议迁移至受支持的邮件列表管理平台（如 Mailman、Sympa 或 L-Soft LISTSERV）。"
score = 4.6
severity = "MEDIUM"
sources = ["cve"]
title = "Lyris List Manager 权限提升漏洞"
updated = "2026-06-16T21:52:25.193"

