[basic]
description = "Solaris 7 和 8 系统中 kcsSUNWIOsolf.so 库存在缓冲区溢出漏洞，本地攻击者可通过设置 KCMS_PROFILES 环境变量触发该漏洞，导致任意命令执行。该漏洞影响 Solaris 2.5/2.6/7.0/8 等多个版本，CVSS 评分 4.6，危害等级中危。攻击者需拥有本地系统访问权限，利用 kcms_configure 程序传递超长环境变量即可触发溢出，进而以进程权限执行任意代码。"
published = "2001-08-02T04:00:00.000"
remediation = "建议立即安装 Sun 官方补丁：Solaris 7 安装补丁 108652-xx，Solaris 8 安装补丁 108653-xx（可通过 Oracle 支持门户下载）。如无法安装补丁，可执行 `chmod 0 /usr/openwin/bin/kcms_configure` 移除 setuid root 权限，或卸载 KCMS 软件包 `pkgrm SUNWkcs`。作为临时缓解措施，在系统环境变量中过滤 KCMS_PROFILES 的异常长度输入。"
score = 4.6
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Sun Solaris kcms_configure KCMS_PROFILES 环境变量缓冲区溢出漏洞"
updated = "2026-06-16T21:54:36.060"

