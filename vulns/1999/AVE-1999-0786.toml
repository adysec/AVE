[basic]
description = "Windows NT 4.0 的 Service Control Manager（服务控制管理器）在处理资源枚举请求时，对畸形参数的验证不充分，导致远程攻击者可通过发送包含异常参数的资源枚举请求触发服务故障。该漏洞会使命名管道及其他系统服务停止响应，但不会导致系统崩溃，受影响计算机可通过重启恢复正常。攻击者无需认证即可通过网络向目标系统发起攻击，主要影响 Windows NT Workstation 4.0、Server 4.0、Enterprise Edition 及 Terminal Server Edition，可造成部分系统服务不可用，属于中等严重程度的远程拒绝服务漏洞。"
published = "1999-12-09"
remediation = "安装微软 MS99-055 安全公告发布的官方补丁，Windows NT Workstation 4.0、Server 4.0 及 Enterprise Edition 需下载对应架构的补丁程序，Terminal Server Edition 需升级至 Service Pack 6；同时在边界防火墙拦截 NetBIOS 入站请求以阻止远程资源枚举攻击，并在注册表中设置 RestrictAnonymous 键禁止匿名会话提交资源枚举请求作为临时缓解措施。"
score = 5.0
severity = "MEDIUM"
sources = ["cve"]
title = "Windows NT Service Control Manager 畸形资源枚举参数拒绝服务漏洞"
updated = "2026-06-16"

