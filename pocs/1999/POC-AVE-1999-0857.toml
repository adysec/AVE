[info]
author = "ave"
description = "验证 Disney Go Express Search 组件在用户系统上运行的 HTTP 服务是否存在未授权访问漏洞，通过连接目标主机 HTTP 端口检测是否可访问和篡改搜索信息。"
id = "POC-AVE-1999-0857"
name = "Disney Go Express Search 远程攻击漏洞 PoC"
severity = "low"
tags = ["ave-1999-0857"]
vuln_id = [
    "CVE-1999-1009",
    "AVE-1999-0857",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/"
protocol = "http"

[[poc.requests.matchers]]
expect = true
status = [200]
type = "status"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "Express",
    "Search",
]
