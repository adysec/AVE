[basic]
description = "PerlCal 2.x 的 cal_make.pl 脚本存在目录遍历漏洞，远程攻击者无需身份认证即可通过向 p0 参数传入 `../` 等路径遍历序列，绕过路径限制读取服务器上的任意文件。该漏洞影响 PerlCal 2.x 版本，攻击复杂度低，可导致敏感信息泄露（如配置文件、系统文件等）。目前已有公开 PoC 利用代码。"
published = "2001-06-27T04:00:00.000"
remediation = "PerlCal 已停止维护，无官方补丁。建议立即替换为其他仍在维护的 CGI 日历程序（如 WebCalendar）。如无法替换，可手动修改 cal_make.pl，在 p0 参数处理前添加路径过滤：移除 `../` 及空字节编码，仅允许字母数字文件名。同时在 Web 服务器（Apache/Nginx）配置中增加重写规则，拦截包含 `..` 的请求 URI。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "PerlCal 目录遍历漏洞"
updated = "2026-06-16T21:54:21.277"

