[basic]
description = "统信 UOS Desktop 20 Professional 存在本地提权漏洞，由于系统权限管控机制不完善，低权限攻击者可通过向特定系统组件发送特制请求或利用不安全的文件权限提升至 root 权限。成功利用该漏洞的攻击者可完全控制受影响系统，安装程序、查看/更改/删除数据或创建新账户。该漏洞影响统信 UOS Desktop 20 Professional 版本，需拥有本地访问权限方可利用。"
published = "20260713"
remediation = "立即通过统信 UOS 更新管理器（控制中心 → 更新设置）或命令行执行 `sudo apt update && sudo apt upgrade -y` 安装最新系统补丁，将统信 UOS Desktop 20 内核及关键系统组件更新至 CNVD-2026-23981 修复版本。如无法立即更新，可在 `/etc/security/limits.conf` 中限制非授信用户的本地登录，并启用 SELinux/AppArmor 强制模式以缓解提权风险。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "统信 UOS Desktop 20 Professional 本地提权漏洞"
updated = "20260713"

