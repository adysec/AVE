[basic]
description = "SSH协议守护进程sshd存在安全漏洞，本地无shell访问权限的用户可利用该漏洞将TCP连接重定向至使用标准系统密码数据库进行认证的服务（如POP、FTP），导致未授权访问。攻击者需具备本地账户权限，利用sshd的端口转发功能绕过访问控制，实现认证绕过与权限提升。"
published = "2000-02-11T05:00:00.000"
remediation = "升级 SSH 服务器至 1.2.31 或更高版本（官方补丁已修复 TCP 连接重定向漏洞），或迁移至 OpenSSH（不受此漏洞影响）。作为临时缓解措施，可在 /etc/ssh/sshd_config 中设置 PermitEmptyPasswords no 并限制可登录用户列表。由于该漏洞年代久远，强烈建议升级到当前仍受支持的 OpenSSH 版本。"
score = 4.6
severity = "MEDIUM"
sources = ["avd"]
title = "SSH sshd 本地 TCP 连接重定向漏洞"
updated = "2026-06-16T21:51:05.360"

