[info]
author = "AVE"
description = "检测 Hughes Technologies Mini SQL (mSQL) 2.0.4.1-2.0.11 中 w3-msql CGI 程序是否存在。该 CGI 在解析 Content-Length 字段时存在栈缓冲区溢出漏洞（scanf() 调用），远程攻击者可发送特制 POST 请求触发溢出执行任意命令，CVSS 10.0 严重级别。"
id = "POC-AVE-2000-0033"
name = "CVE-2000-0012 PoC"
severity = "critical"
tags = ["cve-2000-0012"]
vuln_id = [
    "CVE-2000-0012",
    "AVE-2000-0033",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/cgi-bin/w3-msql"
protocol = "http"

[poc.requests.headers]
User-Agent = "AVE/1.0"

[[poc.requests.matchers]]
expect = true
status = [200]
type = "status"

[[poc.requests]]
method = "POST"
path = "/{{BaseURL}}/cgi-bin/w3-msql/index.html"
protocol = "http"

[poc.requests.body]
content = "A=1"
type = "raw"

[poc.requests.headers]
Content-Type = "multipart/form-data"
User-Agent = "AVE/1.0"

[[poc.requests.matchers]]
expect = true
status = [200]
type = "status"
