[basic]
description = "Cisco Secure PIX Firewall 5.2(2) 在处理 FTP 被动模式（PASV）请求时，未将 PASV 响应报文中的内部私有 IP 地址转换为外部公网地址，导致远程攻击者可通过向目标 FTP 服务器发送大量 PASV 请求，从响应中获取 FTP 服务器的真实内部 IP 地址。该漏洞属于信息泄露类型，攻击者无需认证即可利用，泄露内网拓扑信息后可为进一步渗透攻击提供基础。"
published = "2000-12-11"
remediation = "升级 Cisco PIX Firewall 至 5.2(4) 或更高版本，该版本已修复 PASV 响应中内部地址泄露问题。临时缓解措施：在 PIX 配置中启用 fixup protocol ftp strict 21 以严格校验 FTP PASV 命令，防止内部地址泄露。"
score = 5.0
severity = "MEDIUM"
sources = [
    "cve",
    "exploitdb",
]
title = "Cisco PIX Firewall 5.2 PASV 模式 FTP 内部地址泄露漏洞"
updated = "2000-12-11"

