[basic]
description = "Trend Micro OfficeScan 管理通信协议存在认证缺陷，远程攻击者无需身份认证即可重放管理命令，进而修改 OfficeScan 客户端的配置信息，导致服务异常或拒绝服务。该漏洞源于管理通信缺乏有效的时间戳和会话验证机制，攻击者通过捕获并重放合法管理流量即可触发，影响 OfficeScan 服务端的正常管理功能。"
published = "2000-03-03T05:00:00.000"
remediation = "立即安装 Trend Micro 官方补丁 ofce_patch_35（下载地址参见厂商公告），补丁修复了管理命令重放漏洞。由于 OfficeScan 3.5 已停止维护，建议升级至最新受支持版本（如 Apex One），同时在防火墙上限制 OfficeScan 管理端口的访问来源 IP 作为临时缓解措施。"
score = 6.4
severity = "MEDIUM"
sources = ["epss"]
title = "Trend Micro OfficeScan 远程命令重放与配置篡改漏洞"
updated = "2026-06-16T21:51:13.267"

