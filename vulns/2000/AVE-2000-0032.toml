[basic]
description = "Majordomo 1.94.4 及更早版本的 resend 命令存在 shell 元字符注入漏洞，本地攻击者可通过向该命令传递包含特殊字符的参数，利用 shell 元字符注入以 Majordomo 进程权限执行任意命令。此漏洞影响 Great Circle Associates 开发的邮件列表管理软件 Majordomo，CVSS 评分 4.6，危害等级中危。攻击前提是攻击者拥有目标系统的本地 shell 访问权限。"
published = "1999-12-28T05:00:00.000"
remediation = "立即升级 Majordomo 至 2.0 及以上版本，该版本已修复 resend 命令中 shell 元字符过滤不严的问题。如无法升级，可手动编辑 Majordomo 源码中的 resend 脚本，对用户输入中的 `;`、`|`、`` ` ``、`$` 等 shell 特殊字符进行转义过滤，并限制 resend 命令仅允许授权用户通过 wrapper 调用，避免本地普通用户直接执行。"
score = 4.6
severity = "MEDIUM"
sources = ["redhat"]
title = "Great Circle Associates Majordomo resend 命令本地权限提升漏洞"
updated = "2026-06-16T21:50:52.027"

