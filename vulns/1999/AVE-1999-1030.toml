[basic]
description = "AS/400 共享文件夹功能与 Microsoft SNA Server 3.0 及更早版本的交互存在信息泄露漏洞。当多个用户共享同一个本地 APPC 逻辑单元（LU）时，由于会话隔离机制不完善，用户可越权查看彼此共享文件夹内容。该漏洞无需特殊权限，攻击者只需与目标共享同一 Local APPC LU 即可触发，导致敏感信息泄露。"
published = "1999-12-31T05:00:00.000"
remediation = "升级 Microsoft SNA Server 至 4.0 或更高版本以修复该交互问题；在 AS/400 端为每个用户分配独立的 Local APPC LU，避免共享同一 LU 导致文件夹互访；如无需共享文件夹功能，可在 AS/400 上禁用该特性作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "IBM AS/400 与 Microsoft SNA Server 共享文件夹信息泄露漏洞"
updated = "2026-06-16T21:50:05.937"

