[basic]
description = "Texas A&M University (TAMU) Tiger 安全审计工具中的脚本存在代码执行漏洞，本地攻击者可利用脚本处理逻辑缺陷，以 Tiger 进程权限（通常为 root 权限）执行任意命令。该漏洞影响 Tiger 早期版本，攻击者需具备本地系统访问权限，通过构造恶意输入触发脚本执行任意代码，导致权限提升至 root 权限，CVSS 评分 7.2，属高危本地提权漏洞。TAMU 已在后续版本中修复该脚本逻辑缺陷。"
published = "1999-07-20T04:00:00.000"
remediation = "立即从 ftp://net.tamu.edu/pub/security/TAMU/ 下载并安装 Tiger 安全补丁，或升级到包含该补丁的最新版本。如无法升级，应限制不可信用户对系统的本地访问权限，并审查 Tiger 脚本中对用户输入的校验逻辑，确保所有外部参数经过正确过滤后再执行命令。"
score = 7.2
severity = "HIGH"
sources = ["cve"]
title = "Texas A&M University Tiger 代码执行漏洞"
updated = "2026-06-16T21:50:43.110"

