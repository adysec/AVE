[basic]
description = "Red Hat Linux 系统中 Xconq 7.2.2 及 cconq 游戏程序存在缓冲区溢出漏洞，本地攻击者可通过向 USER 环境变量提交超长字符串触发缓冲区溢出，从而获取额外的系统权限。该漏洞影响 Red Hat Linux 系统上运行的 Xconq 7.2.2 版本，CVSS 评分 4.6，危害等级中危。利用该漏洞需要本地访问权限，无法远程利用。"
published = "2000-06-22T04:00:00.000"
remediation = "升级 xconq 至 7.3 或更高版本，或应用 Red Hat 当时发布的对应安全 erratum。如无法升级，立即移除 xconq/cconq 二进制文件的 setuid 权限（chmod u-s /usr/games/xconq /usr/games/cconq），防止本地普通用户通过 USER 环境变量触发缓冲区溢出提权。若无需使用该游戏，直接卸载 xconq 软件包（rpm -e xconq）。"
score = 4.6
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Red Hat Linux xconq 缓冲区溢出漏洞"
updated = "2026-06-16T21:52:07.173"

