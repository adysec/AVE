[basic]
description = "Big Brother (BB) 网络监控系统 1.5d3 之前版本的 bb-hist.sh、bb-histlog.sh、bb-hostsvc.sh、bb-rep.sh、bb-replog.sh、bb-ack.sh 等 CGI 脚本存在文件存在性泄露漏洞。远程攻击者可通过向 HISTFILE 参数注入目标文件路径，利用该漏洞探测服务器上任意文件是否存在以及获取系统用户 ID 信息。攻击者无需认证即可发起探测，有助于后续针对性攻击的展开。该漏洞影响 Big Brother 1.5d2 及更早版本。"
published = "2001-01-09T05:00:00.000"
remediation = "升级 Big Brother 至 1.5d3 或更高版本，该版本修复了 bb-hist.sh 等脚本对 HISTFILE 参数未做过滤的问题。如无法升级，可在 Web 服务器层面限制对 bb-hist.sh、bb-histlog.sh、bb-hostsvc.sh、bb-rep.sh、bb-replog.sh、bb-ack.sh 的访问，仅允许受信任 IP 或通过防火墙阻止外部对 CGI 目录的访问作为临时缓解。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "BB4 Big Brother Network Monitor 文件存在性泄露漏洞"
updated = "2026-06-16T21:53:19.280"

