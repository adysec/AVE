[basic]
description = "Oracle 8.1.5 Connection Manager Control 组件中的 cmctl 程序存在栈缓冲区溢出漏洞。cmctl 在将用户提供的命令行参数复制到固定长度栈缓冲区前未进行长度检查，超长参数可覆盖栈上的返回地址。本地攻击者通过提交特制的超长命令行参数可触发缓冲区溢出，执行任意 shellcode，从而将权限提升至 oracle 用户（euid=oracle, egid=dba）。该漏洞影响 Oracle 8.1.5 for Linux 平台，攻击者需具有本地系统访问权限。"
published = "2001-01-09"
remediation = "移除 cmctl 程序的 setuid/setgid 权限位：以 root 身份执行 chmod -s $ORACLE_HOME/bin/cmctl，阻止普通用户通过此漏洞提升权限。如业务允许，限制可执行 cmctl 的用户组或直接删除该程序的 setuid 位。"
score = 4.6
severity = "MEDIUM"
sources = [
    "cve",
    "exploitdb",
]
title = "Oracle 8.1.5 Connection Manager Control cmctl 缓冲区溢出漏洞"
updated = "2026-06-16"

