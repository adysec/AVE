[basic]
description = "Featurific For WordPress 插件 1.6.2 版本的 cached_image.php 文件中存在跨站脚本（XSS）漏洞。由于未能正确过滤 snum 参数，远程攻击者可通过构造包含恶意脚本代码的 URL 诱使用户访问，导致在用户浏览器上下文中执行任意 HTML 或 JavaScript 脚本。该漏洞影响启用该插件的 WordPress 站点，攻击者可借此窃取会话凭证或实施钓鱼攻击，CVSS 评分 4.3，危害等级中危。"
published = "2013-02-12T20:55:04.200"
remediation = "升级 Featurific For WordPress 插件至最新版本，或停用并从 WordPress 安装中彻底删除该插件作为永久缓解措施。如仍需使用，可在 Web 应用防火墙 (WAF) 层面添加针对 `snum` 参数的输入过滤规则，拦截恶意 HTML/JavaScript 载荷。"
score = 4.3
severity = "MEDIUM"
sources = ["nuclei"]
title = "WordPress Featurific For WordPress 插件 1.6.2 跨站脚本漏洞"
updated = "2026-06-16T23:36:15.110"

