[basic]
description = "Zope 2.2.0至2.2.4版本中存在安全绕过漏洞，由于对DTML方法对象等旧式对象构造器名称的安全注册处理不当，导致攻击者可通过构造特制的请求绕过权限检查，执行未授权操作。该漏洞影响Zope Web应用服务器，攻击者无需认证即可远程利用，CVSS评分7.5，危害等级高。建议升级至2.2.5及以上版本修复。"
published = "2000-12-16T05:00:00.000"
remediation = "升级 Zope 至 2.2.5 及以上版本，或安装 Zope 官方发布的 Hotfix_2000-12-08 安全补丁。Red Hat Linux 用户可安装 RHSA-2000-125 提供的更新包，Mandrake Linux 用户可安装 MDKSA-2000-083 提供的更新包。如无法立即升级，建议限制对 Zope 管理接口的访问，仅允许可信 IP 连接。"
score = 7.5
severity = "HIGH"
sources = ["redhat"]
title = "Zope Zope 安全绕过漏洞"
updated = "2026-06-16T21:53:23.463"

