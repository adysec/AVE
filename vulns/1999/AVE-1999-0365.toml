[basic]
description = "Netscape Enterprise Server 及 FastTrack Server 存在缓冲区溢出漏洞。远程攻击者可通过向目标服务器发送特制的超长 HTTP GET 请求触发该漏洞，导致缓冲区溢出，进而可能造成服务崩溃或以服务器进程权限执行任意代码。该漏洞影响 Netscape Enterprise Server 3.6 SP2/4.0 及 FastTrack Server 2.0.1 等版本，CVSS 评分 7.5，危害等级高。攻击无需身份认证，仅需目标开放 HTTP 服务即可远程利用。"
published = "2000-01-04T05:00:00.000"
remediation = "升级 Netscape Enterprise Server 至 4.1 及以上版本，或升级 FastTrack Server 至 2.0.2 及以上版本以修复缓冲区溢出。鉴于该产品已停止维护（原 Netscape/Sun/Oracle iPlanet 产品线已退役），建议迁移至受支持的现代 Web 服务器（如 Apache HTTP Server 或 Nginx）。临时缓解措施可在反向代理或 WAF 层面限制 HTTP GET 请求 URI 长度不超过 4096 字节。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "Netscape Enterprise Server 及 FastTrack Server 远程缓冲区溢出漏洞"
updated = "2026-06-16T21:48:57.993"

