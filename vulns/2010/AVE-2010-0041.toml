[basic]
description = "Joomla! 的 Jfeedback 组件 1.2 版本存在目录遍历漏洞，远程攻击者无需身份认证即可通过在 controller 参数中注入 `../` 序列，进而读取服务器上的任意文件。该漏洞影响使用该组件的所有 Joomla! 站点，CVSS 评分 6.8，危害等级中危。由于缺少对用户输入的充分过滤，攻击者可获取敏感配置文件或系统文件，可能导致进一步的信息泄露或攻击。"
published = "2010-04-19T19:30:01.007"
remediation = "建议立即在 Joomla! 后台扩展管理器中卸载 com_jfeedback 组件，或从服务器删除该组件目录。如无法卸载，修改 PHP 代码在 controller 参数入口处过滤 ../ 和 %00 字符，仅允许字母数字和白名单值；同时在 Apache/Nginx 层添加 RewriteRule/location 规则拦截包含目录遍历特征的请求，并将 PHP 配置 open_basedir 限制到站点根目录以阻止读取系统文件。"
score = 6.8
severity = "MEDIUM"
sources = ["nuclei"]
title = "Joomla! Jfeedback 组件目录遍历漏洞"
updated = "2026-06-16T23:18:28.283"

