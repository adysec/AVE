[basic]
description = "Apache Struts2 的 Showcase 示例应用存在远程命令执行漏洞（S2-012），攻击者可通过向参数重定向功能提交特制的恶意参数名，触发 OGNL 表达式注入，从而在服务器端执行任意系统命令。该漏洞影响 Struts 2.0.0 至 2.3.13 版本（部分来源称至 2.3.14.2），CVSS 评分 9.3，危害等级严重。攻击者无需身份认证，仅需向受影响应用发送特制 HTTP 请求即可利用，可能导致服务器被完全控制。"
published = "2013-07-10T19:55:04.683"
remediation = "将 Apache Struts2 升级至 2.3.14.3 或更高版本。如无法立即升级，可在 struts.xml 中禁用动态方法调用（设置 struts.enable.DynamicMethodInvocation=false）并严格校验用户输入参数名，避免包含 OGNL 特殊字符。"
score = 9.3
severity = "CRITICAL"
sources = ["nuclei"]
title = "Apache Struts2 远程命令执行漏洞"
updated = "2026-06-16T23:52:29.303"

