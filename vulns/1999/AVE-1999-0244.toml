[basic]
description = "Netscape Communicator 4.06至4.61版本在处理HTML的EMBED标签中的pluginspage选项时存在缓冲区溢出漏洞。远程攻击者可构造恶意网页，诱使用户访问后触发缓冲区溢出，导致浏览器崩溃或执行任意代码。该漏洞影响Netscape Communicator 4.x系列多个版本，CVSS评分5.1，危害等级中等。建议用户升级至不受影响的版本或更换其他浏览器。"
published = "1999-09-02T04:00:00.000"
remediation = "Netscape Communicator 已停止维护多年，建议立即卸载该软件，改用 Mozilla Firefox、Google Chrome 等现代浏览器。如因遗留系统必须使用，可在浏览器设置中禁用插件加载功能，或通过注册表禁用 EMBED 标签的 pluginspage 参数解析，同时避免访问不可信网站。"
score = 5.1
severity = "MEDIUM"
sources = ["epss"]
title = "Netscape Communicator EMBED 标签缓冲区溢出漏洞"
updated = "2026-06-16T21:48:50.657"

