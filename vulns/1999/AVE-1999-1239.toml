[basic]
description = "NeXT NetInfo 的 _writers 属性存在本地权限提升与拒绝服务漏洞。拥有本地普通用户权限的攻击者可通过滥用 _writers 属性以 root 身份执行任意操作，或触发拒绝服务。该漏洞影响 NeXTSTEP 和 OPENSTEP 操作系统，攻击条件简单，仅需具备本地用户账户即可完成利用，CVSS v2 评分为 7.2，对系统的机密性、完整性和可用性均造成完全损害。"
published = "1997-09-19"
remediation = "该漏洞影响已停止支持的 NeXTSTEP/OPENSTEP 操作系统，无官方补丁。应将系统迁移至受支持的现代操作系统（如 macOS、Linux）；短期内应禁用不必要的本地用户账户、限制物理接触、通过防火墙禁止远程登录以降低本地利用风险。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "NeXT NetInfo _writers 属性本地权限提升与拒绝服务漏洞"
updated = "2026-07-18"

