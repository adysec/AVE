[basic]
description = 'Jana WebServer 1.0/1.45/1.46 版本存在目录遍历漏洞。远程攻击者无需身份认证即可通过向服务器发送特制的 "......"（变形点点）攻击字符串，绕过路径限制，读取服务器上任意文件，包括配置文件、系统文件等敏感信息。该漏洞源于服务器对用户输入路径过滤不严，未能正确处理特殊字符序列。CVSS 评分 5.0，危害等级中危。'
published = "1999-10-08T04:00:00.000"
remediation = '建议立即升级至 Jana WebServer 1.46 以上版本，该版本已修复目录遍历漏洞。如厂商已停止维护，应迁移至活跃维护的 Web 服务器（如 Apache httpd、Nginx），并在反向代理层配置路径规范化过滤，拒绝包含 ".." 及变体编码的 URL 请求。同时限制 Web 服务进程以低权限用户运行，防止读取敏感系统文件。'
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Hauck Jana WebServer 目录遍历漏洞"
updated = "2026-06-16T21:49:41.017"

