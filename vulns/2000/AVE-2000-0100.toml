[basic]
description = "BroadGun Software CamShot WebCam 2.5 内置的 HTTP 服务器存在缓冲区溢出漏洞，未经身份认证的远程攻击者可通过向目标服务发送超长 GET 请求触发溢出，从而在受影响系统上执行任意命令。该漏洞影响 CamShot WebCam 2.5 版本，CVSS 评分 7.5，危害等级高。攻击者只需能够访问运行 CamShot WebCam 服务的网络端口即可利用此漏洞，无需任何凭据或交互，利用方式简单直接，存在远程代码执行风险。"
published = "1999-12-30T05:00:00.000"
remediation = "升级 BroadGun Software CamShot WebCam 至官方修复版本 2.6 或更高版本（该版本修复了 HTTP 服务端的 GET 请求缓冲区溢出）。如无法立即升级，可在网络边界防火墙/路由器上限制仅允许受信任 IP 访问 CamShot 的 Web 服务端口（默认 8080/80），或使用反向代理限制请求行长度，以临时缓解远程溢出风险。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "BroadGun Software CamShot WebCam GET请求缓冲区溢出漏洞"
updated = "2026-06-16T21:50:53.007"

