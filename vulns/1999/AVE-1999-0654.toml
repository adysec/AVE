[basic]
description = "FreeBSD 3.3 系统自带的 gdc 程序存在本地缓冲区溢出漏洞。该程序在处理用户输入参数时未对长度进行有效边界检查，导致攻击者可通过构造超长的命令行参数或环境数据溢出缓冲区，进而覆盖返回地址并执行任意代码。该漏洞属于本地漏洞，影响范围为运行 FreeBSD 3.3 版本的系统的本地用户，攻击条件为攻击者需先在目标系统上获得普通用户权限并能够执行 gdc 程序，利用方式是通过传递特制超长输入触发溢出以提升至 root 权限。"
published = "1999-12-01T05:00:00.000"
remediation = "升级到 FreeBSD 5.0 或更高版本，该版本已修复 gdc 程序的缓冲区溢出漏洞。如无法立即升级，可通过限制用户权限和应用安全补丁来缓解风险。"
score = 7.2
severity = "HIGH"
sources = ["exploitdb"]
title = "FreeBSD gdc 本地缓冲区溢出漏洞"
updated = "2026-06-16T21:49:11.897"

