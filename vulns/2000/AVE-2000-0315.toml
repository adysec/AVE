[basic]
description = 'Cisco IOS 系统的 HTTP 服务组件存在输入验证不当漏洞。运行 IOS 11.1 至 12.1 版本的 Cisco 路由器和交换机中，远程攻击者无需身份认证即可通过向目标设备的 HTTP 服务发送包含 "%%" 特殊字符的畸形 URL 请求，触发服务组件输入验证缺陷，导致目标设备拒绝服务。该漏洞影响大量 Cisco 路由器与交换机设备，CVSS 评分 7.1，危害等级高危。'
published = "2000-04-26T04:00:00.000"
remediation = "建议将 Cisco IOS 升级至 12.0.8 或更新版本（如 12.1.1 及以上），修复 HTTP 服务对 `%%` 请求的处理缺陷。如无需 Web 管理，使用全局配置命令 `no ip http server` 关闭 HTTP 服务；如需保留，通过 `ip http access-class` ACL 限制仅允许管理网段访问。可在入方向 ACL 添加 `deny tcp any any eq 80` 作为临时缓解措施。"
score = 7.1
severity = "HIGH"
sources = ["cve"]
title = "Cisco IOS HTTP 拒绝服务漏洞"
updated = "2026-06-16T21:51:35.753"

