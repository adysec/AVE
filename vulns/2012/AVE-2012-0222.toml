[basic]
description = "Microsoft Internet Explorer 6至9版本的mshtml.dll组件中的CMshtmlEd::Exec函数存在释放后使用（Use-After-Free）漏洞。当用户访问特制网站时，攻击者可利用该漏洞触发已释放内存对象的非法引用，从而在当前用户上下文中执行任意代码。该漏洞已在2012年9月被野外利用，影响范围广泛，CVSS评分8.1，危害等级高。Microsoft已在安全公告MS12-063中发布修复补丁。"
published = "2012-09-18T10:39:14.147"
remediation = "立即安装 Microsoft 安全公告 MS12-063 提供的累积更新 KB2744842，将 Internet Explorer 升级至已修复版本（IE6~9 对应补丁）。如无法安装补丁，可启用 EMET 工具或配置 IE 安全级别为「高」并禁用 ActiveX 控件和活动脚本作为临时缓解措施。由于该漏洞已被 CISA 列入已知被利用漏洞目录，建议优先通过 Windows Update 部署更新。"
score = 8.1
severity = "HIGH"
sources = ["kev"]
title = "Microsoft Internet Explorer execCommand 释放后使用漏洞"
updated = "2026-06-16T23:45:58.897"

