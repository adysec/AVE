[basic]
description = "金和OA-C6系统的ActionDataSet接口存在XML外部实体注入（XXE）漏洞。攻击者可通过向/jc6/servlet/ActionDataSet接口发送特制的XML请求包，利用服务器端XML解析器对外部实体的处理缺陷，实现任意文件读取、内网探测或SSRF攻击。该漏洞影响金和OA-C6系统，无需身份认证即可远程利用，危害较大。"
published = "2025-07-08"
remediation = "联系金和厂商获取 C6 系统最新安全补丁，或升级至官方修复版本。如无法立即升级，修改 Tomcat 下 /jc6/WEB-INF/web.xml 中 ActionDataSet 相关 XML 解析器配置，禁止外部实体解析（关闭 DocumentBuilderFactory 的 expandEntityReferences 和 external-general-entities 特性）；同时部署 WAF 规则拦截含 <!ENTITY 和 <!DOCTYPE 的外部实体声明请求作为临时缓解措施。"
score = 5.0
severity = "MEDIUM"
sources = ["hwpoc"]
title = "金和 OA-C6 系统 ActionDataSet 接口 XML 外部实体注入漏洞"
updated = "2025-07-08"

