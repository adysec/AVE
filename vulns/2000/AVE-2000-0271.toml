[basic]
description = "Microsoft JET 数据库引擎（3.5/3.51/4.0 版本）在处理数据库查询时存在 VBA Shell 命令执行漏洞。攻击者在拥有本地访问权限的条件下，可通过构造包含恶意 VBA Shell 命令的数据库查询语句，利用 JET 引擎对 VBA 函数的不当调用机制，在目标系统上以当前用户权限执行任意系统命令。该漏洞影响使用 Microsoft JET 数据库引擎的多种应用程序，攻击者可通过诱导用户打开特制数据库文件等方式触发。"
published = "1999-08-20T04:00:00.000"
remediation = '安装 Microsoft 安全公告 MS99-033 对应补丁，或升级至 MDAC 2.1 SP1 及以上版本。如无法打补丁，可通过注册表禁用 Jet 数据库引擎中的 VBA 函数调用：将 `HKEY_LOCAL_MACHINE\SOFTWARE\Microsoft\Jet\4.0\Engines\SandBoxMode` 设置为 3（完全沙盒模式）。建议升级至受支持的操作系统版本，因旧版 JET 引擎已停止安全更新。'
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "Microsoft JET 数据库引擎 VBA Shell命令执行漏洞"
updated = "2026-06-16T21:51:28.873"

