[basic]
description = "Quake 1.9 客户端存在缓冲区溢出漏洞，远程恶意服务器可通过向客户端发送超长的预缓存路径、服务器名称、服务器地址或 map 控制台命令参数触发该漏洞，导致任意代码执行。该漏洞影响 Quake 1.9 及更早版本，CVSS 评分 7.5，危害等级高危。建议用户升级至 QuakeWorld 或使用官方补丁修复。"
published = "1998-04-08T04:00:00.000"
remediation = "升级到 QuakeWorld 或使用 QuakeSpasm、FTE QuakeWorld 等现代开源客户端，这些版本已修复缓冲区溢出问题。如无法升级，仅连接受信任的 Quake 服务器，避免连接不明来源的服务器，并在防火墙规则中限制 Quake 客户端（端口 26000-27000）仅向白名单 IP 发起连接。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "id Software Quake 客户端缓冲区溢出远程代码执行漏洞"
updated = "2026-06-16T21:50:34.727"

