[basic]
description = "Sun Solaris 7及更早版本中的arp命令存在缓冲区溢出漏洞。本地攻击者可通过向arp命令传递超长的-f参数触发缓冲区溢出，进而执行任意代码，获取系统最高权限。该漏洞影响Solaris 7、Solaris 2.6及更早版本，CVSS评分7.2，危害等级高。攻击者需要拥有本地系统访问权限才能利用此漏洞，漏洞已公开多年且有明确的利用方法，建议用户升级到Solaris 8或安装Sun安全公告200号提供的补丁进行修复。"
published = "2001-03-12T05:00:00.000"
remediation = "安装 Sun Security Bulletin #200 提供的 Solaris 7 补丁 106980 或更新至 Solaris 8 以上版本。如无法升级，临时缓解措施为移除 arp 命令的 setuid 权限：chmod u-s /usr/sbin/arp，仅允许 root 用户执行 arp 操作。"
score = 7.2
severity = "HIGH"
sources = ["exploitdb"]
title = "Sun Solaris arp 本地缓冲区溢出漏洞"
updated = "2026-06-16T21:53:41.017"

