[basic]
description = "SunOS 4.1.1 及更早版本系统中的 /bin/mail 程序存在安全漏洞，本地攻击者可通过向该程序传递特制的命令行参数触发漏洞，从而获取 root 权限。该漏洞源于 /bin/mail 对用户输入的参数处理不当，未进行充分的权限检查和输入验证，导致低权限用户可利用该程序以 root 身份执行任意操作。该漏洞影响 SunOS 4.1.1 及其早期版本，CVSS 评分 7.2，危害等级高。"
published = "1991-02-22T05:00:00.000"
remediation = "升级 SunOS 至 4.1.2 或更高版本，该漏洞已在后续版本中修复。如无法升级，可移除 /bin/mail 的 setuid 位（chmod u-s /bin/mail）以消除本地提权风险，但会导致普通用户无法使用 mail 命令。建议迁移至受支持的 Solaris 版本以获得持续安全更新。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "Sun SunOS /bin/mail 本地权限提升漏洞"
updated = "2026-06-16T21:50:26.483"

