[basic]
description = "Gitea 在启用 [oauth2_client] UPDATE_AVATAR = true 时，会使用 Go 默认 HTTP 客户端从 OAuth2/OIDC 提供商获取头像 URL。该 URL 来源于用户 OIDC 的 picture 声明。受影响代码路径调用 http.Get(url) 时未对出站主机或 IP 进行限制。低权限用户通过控制自己的 picture 声明，可诱导 Gitea 服务器向任意地址发起 HTTP GET 请求，包括回环地址、RFC 1918 私有网络地址及链路本地地址（如 169.254.169.254），导致盲 SSRF 攻击。"
published = "2026-07-21"
remediation = "升级到 Gitea v1.27.0 或更高版本，该版本在 OAuth2 头像同步路径中增加了出站请求的主机/IP 限制。如无法立即升级，可临时禁用 [oauth2_client] UPDATE_AVATAR 配置项以缓解风险。"
score = 3.1
severity = "LOW"
sources = [
    "ghsa",
    "cve",
]
title = "Gitea OAuth2头像同步功能中的盲SSRF漏洞"
updated = "2026-07-21"

