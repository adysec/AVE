[basic]
description = "Texas Imperial Software 出品的 WFTPD 及 WFTPD Pro 2.41 及更早版本（包括 2.34、2.40、2.4.1、2.4.1 RC11）存在拒绝服务漏洞。该漏洞源于 FTP 服务在处理命令时的竞争条件缺陷：当 LIST 命令尚未执行完毕时，远程攻击者可未经身份认证向目标 FTP 服务器发送 STAT 命令，导致服务器进程崩溃，造成拒绝服务。攻击者无需任何权限即可发起攻击，影响服务的可用性。"
published = "2000-07-21T04:00:00.000"
remediation = "升级 WFTPD 至 2.42 及以上版本，该版本已修复并发 STAT/LIST 命令导致的拒绝服务问题。如无法升级，可考虑在防火墙或 WAF 层面限制 FTP 控制连接中的 STAT 命令，或迁移至更现代且持续维护的 FTP 服务器软件（如 FileZilla Server）。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Texas Imperial Software WFTPD 拒绝服务漏洞"
updated = "2026-06-16T21:52:10.607"

