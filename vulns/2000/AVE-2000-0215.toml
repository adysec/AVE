[basic]
description = "Netscape Enterprise Server 在启用 Web Publishing 功能时存在目录遍历漏洞。远程攻击者无需身份认证，只需向目标服务器发送特制的 GET 请求访问 /publisher 目录，即可通过该目录提供的 Java applet 浏览服务器上的任意目录内容，导致敏感信息泄露。该漏洞影响启用 Web Publishing 功能的 Netscape Enterprise Server 版本，CVSS 评分 6.4，危害等级中危。建议禁用 Web Publishing 功能或升级至修复版本。"
published = "2000-03-11T05:00:00.000"
remediation = '立即禁用 Netscape Enterprise Server 的 Web Publishing 功能（在管理界面取消勾选 "Enable Web Publishing"），或升级至 iPlanet Web Server 6.0+ (SP5) 版本。如无法升级，应在 Web 服务器配置中限制 /publisher 目录访问权限，拒绝匿名 GET 请求。该产品已停止维护，建议迁移至 Oracle iPlanet Web Server 7.0+ 或 Apache httpd。'
score = 6.4
severity = "MEDIUM"
sources = ["cve"]
title = "Netscape Enterprise Server 目录遍历漏洞"
updated = "2026-06-16T21:51:17.547"

