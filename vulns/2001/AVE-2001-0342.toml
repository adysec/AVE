[basic]
description = "Apache 1.3.14 在 MacOS X Client 10.0.3 系统（使用 HFS+ 文件系统）上存在漏洞。由于 HFS+ 文件系统不区分大小写，而 Apache 的过滤器未正确处理 URL 中字符的大小写差异，远程攻击者可通过发送包含特定大小写变体字符的 URL 请求，绕过 Apache 的访问控制限制，访问受保护的文件资源。攻击条件为：目标运行 Apache 1.3.14 且基于 MacOS X 10.0.3 HFS+ 文件系统，攻击者可远程构造恶意 URL 绕过访问控制，CVSS 9.8 级严重漏洞。"
published = "2001-10-18T04:00:00.000"
remediation = '建议立即升级 Apache HTTP Server 至 1.3.15 或更高版本（已修复 HFS+ 大小写不敏感绕过问题），或升级 MacOS X Client 至 10.0.4 及以上版本。若暂时无法升级，可在 httpd.conf 中添加 "CheckCaseOnly on" 和 "CheckSpelling Off" 指令禁用大小写不敏感匹配，或在 Apache 配置中显式设置文件系统大小写敏感选项。临时缓解措施：在 Web 应用防火墙层面拦截包含大小写变体的恶意 URL 请求。'
score = 9.8
severity = "CRITICAL"
sources = ["exploitdb"]
title = "Apache HTTP Server 1.3.14 Mac OS X 文件保护绕过漏洞"
updated = "2026-06-16T21:54:55.077"

