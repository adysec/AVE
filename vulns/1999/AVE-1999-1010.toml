[basic]
description = "该漏洞存在于 SystemSoft SystemWizard 软件包中，该软件包在 HP Pavilion PC 以及可能的其他平台和操作系统（如 Windows 98）上安装时，会创建两个被标记为可安全脚本的 ActiveX 控件。攻击者可以通过引用这些控件（包括 Launch 控制和 RegObj 控制）来构造恶意网页，从而在目标系统上执行任意命令。由于这些控件的安全标记 bypassed，攻击者无需任何身份验证即可远程触发此漏洞。漏洞影响范围广泛，不仅限于 HP Pavilion PC，可能涉及其他安装了 SystemWizard 的平台。此外，两个 ActiveX 控件（Launch 控制和 RegObj 控制）中的任意一个都能被利用，为攻击提供了两种途径。这一漏洞允许攻击者在目标计算机上执行任意代码，可能导致系统完整性受损、数据泄露或进一步的攻击扩散。目前尚未有针对此漏洞的官方补丁，但 Microsoft 建议禁用不信任的 ActiveX 控件或使用最新安全更新以减轻风险。攻击者可以通过在目标系统上加载恶意的网页或内容来触发此漏洞，只要用户访问了包含恶意引用的网页即可，而无需用户的任何交互或权限提升。攻击可以通过在浏览器中加载自定义网页来实现，当网页包含对这两个 ActiveX 控件的引用时，系统将自动尝试执行这些控件的安全脚本，从而允许攻击者注入和执行任意代码。"
published = "1999-12-31T05:00:00.000"
remediation = '建议立即卸载 HP Pavilion 预装的 SystemSoft SystemWizard 包，或在 Internet Explorer 中将"对未标记为可安全执行脚本的 ActiveX 控件初始化并执行脚本"设置为"禁用"，并在"受信任站点"区域移除不受信任站点。如无法卸载，可在注册表中删除 Launch 和 RegObj 两个 ActiveX 控件的 CLSID 键值（HKCR\\CLSID\\{...}）以禁用其脚本调用。建议升级至 Windows 2000 或更高版本以彻底消除该漏洞风险。作为临时缓解，可在防火墙层面阻断恶意网页访问或禁用 ActiveX 控件运行权限。建议参考 Microsoft 安全公告 MS99-032 及 HP 安全公告获取补丁补丁包进行彻底修复。升级至 Windows 2000 SP4 或更高版本可彻底消除该漏洞风险。建议卸载 SystemWizard 组件或在注册表中删除相关 ActiveX 控件的 CLSID 键值（HKCR\\CLSID\\{...}）。作为临时缓解，可在 IE 安全设置中将"对未标记为安全的 ActiveX 控件初始化并执行脚本"设为"禁用"，并在受信任站点区域移除不可信站点。建议参考 Microsoft 安全公告 MS99-032 应用补丁或升级至 Windows 2000 及以上版本彻底修复。作为临时缓解措施，可在防火墙层面阻断恶意网页访问或禁用 ActiveX 控件运行权限。建议卸载 SystemSoft SystemWizard 包或在注册表中删除 Launch 和 RegObj 两个 ActiveX 控件的 CLSID 键值以禁用其脚本调用能力。升级至 Windows 2000 SP4 或更高版本可彻底消除该漏洞风险。建议参考 Microsoft 安全公告 MS99-032 及 HP 安全公告应用补丁或升级系统。作为临时缓解，可在 IE 安全设置中禁用"对未标记为安全的 ActiveX 控件初始化并执行脚本"并在受信任站点区域移除不可信站点。升级至 Windows 2000 或更高版本可彻底消除该漏洞风险。建议卸载 SystemWizard 组件或删除相关 ActiveX 控件 CLSID 注册表键值。作为临时缓解，可在 IE 安全设置中禁用 ActiveX 控件脚本执行权限。参考 Microsoft 安全公告 MS99-032 应用补丁或升级系统版本彻底修复。'
