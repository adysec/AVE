[basic]
description = "SSH Communications Security SSH 1.2.27 版本中的认证代理存在符号链接跟随漏洞。本地攻击者可通过在 UNIX 域套接字路径上创建恶意符号链接，诱使 SSH 认证代理跟随该链接操作非预期的文件，导致认证信息泄露或权限提升。该漏洞需要攻击者拥有本地系统访问权限才能利用，影响 SSH 1.2.27 版本及可能的相关实现。"
published = "1999-09-17T04:00:00.000"
remediation = "升级至 SSH 2.0 或更高版本（如 OpenSSH），SSH 1.x 协议已停止维护且存在多项安全缺陷。如无法升级，确保认证代理 socket 目录（如 /tmp/ssh-*）权限设置为 700，并禁止在多用户环境下转发代理连接。建议全面迁移至 OpenSSH 以获取持续安全更新。"
score = 2.1
severity = "LOW"
sources = ["avd"]
title = "SSH Communications Security SSH 认证代理符号链接文件创建漏洞"
updated = "2026-06-16T21:49:03.440"

