[basic]
description = "Jgaa WarFTPd 1.66 x4s 及 1.67-3 版本在处理 CWD 与 MKD 这两个 FTP 命令时存在缓冲区溢出缺陷，由于程序未对传入的路径名参数长度做边界检查，远程攻击者在已登录 FTP 服务的情况下发送超长路径名即可触发溢出，导致服务器进程崩溃并造成拒绝服务。攻击者仅需普通 FTP 登录权限即可利用，无需管理员权限，CVSS 2.0 基础评分为 5.0（中危），主要影响服务可用性。"
published = "2000-02-01"
remediation = "建议升级 WarFTPd 至 1.67-4 或更高版本以修复该缓冲区溢出问题。若暂时无法升级，可在防火墙层面限制 FTP 服务仅允许受信任 IP 访问，并通过 FTP 服务器配置限制 CWD/MKD 命令路径参数长度（建议不超过 256 字符）作为临时缓解措施。"
score = 5.0
severity = "MEDIUM"
sources = ["cve"]
title = "Jgaa WarFTPd CWD/MKD 命令缓冲区溢出拒绝服务漏洞"
updated = "2026-07-18"

