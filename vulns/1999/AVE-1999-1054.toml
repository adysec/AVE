[basic]
description = "Delegate proxy 5.9.3 及之前版本在 DGROOT 目录下创建的文件和目录设置了全局可写权限，导致本地攻击者可利用该权限许可漏洞修改或删除这些文件，进而可能提升权限或破坏系统完整性。该漏洞影响 Delegate proxy 全系列版本，攻击者需具备本地访问权限，CVSS 评分 5.0，危害等级中等。建议升级到 5.9.4 或更高版本修复此漏洞。"
published = "1999-07-21T04:00:00.000"
remediation = "升级 Delegate 至 5.9.3 以上版本，该漏洞已在后续版本中修复。如无法升级，可在启动脚本中手动设置 umask 077，并在 delegated 启动后对 DGROOT 目录执行 chmod -R o-w 修正权限，同时避免将 DGROOT 设为 /tmp 等公共目录。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Delegate proxy 权限许可漏洞"
updated = "2026-06-16T21:50:13.700"

