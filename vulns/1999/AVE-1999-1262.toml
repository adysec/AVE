[basic]
description = "SGI IRIX 6.4 系统中的 xfsdump 工具存在本地权限提升漏洞。由于 xfsdump 在处理日志文件 bck.log 时未对符号链接进行充分验证，本地攻击者可通过构造恶意符号链接指向系统关键文件（如 /etc/passwd），诱导 xfsdump 以 root 权限覆写目标文件，从而获得超级用户权限。该漏洞利用条件要求攻击者拥有本地用户权限，攻击复杂度较低，影响 SGI IRIX 6.4 版本。"
published = "1997-05-07T04:00:00.000"
remediation = "立即移除 xfsdump 的 setuid 权限（chmod u-s /usr/sbin/xfsdump），防止本地普通用户通过符号链接攻击 bck.log 日志文件提权。如业务允许，建议升级至 IRIX 6.5.2 或更高版本并安装 SGI 官方补丁。临时缓解措施可将 xfsdump 限制为仅 root 用户可执行，并启用系统日志文件的粘滞位保护。"
score = 6.2
severity = "MEDIUM"
sources = ["avd"]
title = "SGI IRIX xfsdump 本地权限提升漏洞"
updated = "2026-06-16T21:50:21.323"

