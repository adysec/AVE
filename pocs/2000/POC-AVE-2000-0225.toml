[info]
author = "ave"
description = "检测 AIX FRCA 系统中的任意文件访问权限漏洞。通过测试访问权限以验证是否存在权限篡改风险。"
id = "POC-AVE-2000-0225"
name = "AIX FRCA frcactrl 本地任意文件篡改漏洞 PoC"
severity = "high"
tags = ["ave-2000-0225"]
vuln_id = [
    "CVE-2000-0249",
    "AVE-2000-0225",
]

[poc]
logic = "all"

[[poc.requests]]
path = "/etc/passwd"
protocol = "file"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["root:"]
