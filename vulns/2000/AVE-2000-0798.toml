[basic]
description = 'Microsoft Indexing Service 中的 ixsso.query ActiveX 控件被错误标记为"对脚本安全"，远程攻击者可通过诱导用户访问恶意网页，利用该控件执行客户端脚本探测目标 Windows 2000 系统上任意文件是否存在，导致敏感信息泄露。该漏洞影响启用了 Indexing Services 的 Windows 2000 系统，攻击者无需身份认证，仅需用户使用 IE 浏览器访问恶意站点即可触发，危害程度中等。'
published = "2001-01-09T05:00:00.000"
remediation = "Windows 2000 已停止支持，建议升级至 Windows 10/11 或 Windows Server 2019+ 受支持版本。如无法升级，可通过注册表为 ixsso.query 控件设置 Kill Bit（CLSID: {C1B8BF2E-0AC3-11D1-8C71-00AA00BCC6B1}，Compatibility Flags 设为 0x400），禁用 Indexing Service（服务管理器 → Indexing Service → 启动类型设为禁用），并将 IE 安全区域中 ActiveX 控件和 Active Scripting 均设为禁用。"
score = 4.3
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Microsoft Windows 2000 Indexing Service ixsso.query ActiveX 跨站脚本漏洞"
updated = "2026-06-16T21:53:09.463"

