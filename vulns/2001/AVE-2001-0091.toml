[basic]
description = "ja-xklock 2.7.1 及更早版本存在缓冲区溢出漏洞，本地攻击者可通过向 xklock 程序提交特制输入触发该漏洞，导致权限提升至 root。该漏洞影响 FreeBSD 3.5.1 和 4.2 系统，利用条件为攻击者需拥有本地账户，CVSS 评分 7.2，危害等级高。建议用户升级至最新版本或应用补丁进行修复。"
published = "2001-06-02T04:00:00.000"
remediation = "升级 ja-xklock 至 2.7.1 以上版本，可通过 FreeBSD ports tree 执行 `portsnap fetch update && cd /usr/ports/ja/xklock && make install clean` 更新；如无法立即升级，使用 `pkg_delete xklock-2.7.1` 移除该软件包，或限制本地非授信用户登录系统作为临时缓解措施。"
score = 7.2
severity = "HIGH"
sources = ["exploitdb"]
title = "ja-xklock 缓冲区溢出本地权限提升漏洞"
updated = "2026-06-16T21:53:54.553"

