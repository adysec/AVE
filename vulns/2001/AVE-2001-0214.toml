[basic]
description = '这是一个针对 wu-ftpd 2.6.1 的远程命令执行漏洞。该漏洞源于 FTP 服务器的 glob 函数（ftpglob）在处理特定的“~{"”字符串时出现缺陷，攻击者可以构造恶意输入绕过验证直接执行系统命令。影响范围包括所有运行 wu-ftpd 2.6.1 的 FTP 服务器，攻击者无需身份验证即可远程触发，从网络连接开始，通过精心构造的参数触发堆溢出或直接执行命令，以达到完全控制服务器的目的。导致服务器被入侵、数据泄露或进一步横向移动。该漏洞 CVSS 评分 7.5，反映其网络可达性低、攻击复杂性低、无需认证、并可能引发局部完整性泄露和破坏。'
published = "2001-11-30T05:00:00.000"
remediation = "升级 Wu-FTPD 服务到 2.6.2 或更高版本，从源代码重新编译以应用所有安全补丁并关闭危险的 glob 功能。编辑 /etc/inetd.conf 或ftp服务器的配置文件，禁用不必要的高危命令（如 CWD、PASSIVE 模式）并限制服务网络访问权限。如无法立即升级，可配置防火墙规则阻止对FTP端口的异常连接，并限制用户权限以降低攻击面。"
score = 7.5
severity = "HIGH"
sources = ["redhat"]
title = "WU-FTPD 2.6.1 远程命令执行漏洞"
updated = "2026-06-16T21:54:30.757"

