[basic]
description = "该漏洞影响 Windows NT、Windows 95、Windows 2000 等使用 NETBIOS/SMB 文件共享协议的系统。当共享配置使用空密码、默认密码或未设置密码时，攻击者可绕过认证通过网络访问受保护共享资源，实现敏感文件读取、写入或上传，导致信息泄露和远程文件篡改。攻击者仅需与目标位于同一可达网络并能访问其 SMB 服务端口即可利用。"
published = "1999-01-01"
remediation = "为所有 NETBIOS/SMB 共享设置高强度密码，禁用空会话（Null Session）访问，在注册表中将 RestrictAnonymous 设置为 1 以限制匿名枚举，关闭不必要的文件共享服务，启用 SMB 签名，并在网络边界防火墙封锁 TCP 139/445 端口。"
score = 7.5
severity = "HIGH"
sources = [
    "cve",
    "epss",
]
title = "微软 Windows NETBIOS/SMB 共享空密码或默认密码漏洞"
updated = "2026-06-16"

