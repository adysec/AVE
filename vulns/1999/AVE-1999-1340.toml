[basic]
description = "AIX 操作系统中的 FTP 安装脚本 anon.ftp 存在不安全配置漏洞，该脚本在配置匿名 FTP 服务时未正确设置权限和访问控制，导致远程攻击者可在无需认证的情况下利用默认配置缺陷，通过匿名 FTP 登录后执行任意系统命令。此漏洞影响 IBM AIX 多个版本，CVSS 评分 10.0，危害等级严重。建议用户手动修复 anon.ftp 脚本配置或应用 IBM 官方安全补丁。"
published = "1992-04-27T04:00:00.000"
remediation = "立即检查 AIX 系统中 /etc/ftpusers 和 /etc/inetd.conf 配置，禁用匿名 FTP 访问（注释或删除 anon.ftp 相关行）。升级 AIX 至最新维护级别，或安装 IBM 针对此漏洞发布的 APAR 补丁（如 IX12345）。如无法升级，在 /etc/ftpusers 中添加 anonymous 和 ftp 用户禁止匿名登录，并限制 FTP 根目录权限为 555。"
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "IBM AIX 匿名 FTP 不安全配置远程代码执行漏洞"
updated = "2026-06-16T21:49:45.643"

