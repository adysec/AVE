[basic]
description = "Sun Solaris snoop print_domain_name 缓冲区溢出漏洞"
published = "1999-12-07T05:00:00.000"
remediation = "立即停止对 untrusted 网络使用 snoop -v 模式，或升级至 Sun 官方补丁版本（Solaris 7 或更高版本）。如无法立即升级，可临时将 snoop 设置为仅 root 可执行、禁用 verbose 模式，并在网络边界限制向 untrusted 域发送 DNS 响应，同时部署 IPS 检测超长域名 DNS 数据包。该漏洞年代久远，长期修复方案为迁移至受支持的 Solaris 11 或其它现代操作系统。"
