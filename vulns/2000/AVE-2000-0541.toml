[basic]
description = "CGI Script Center Auction Weaver 1.0.2 及更早版本的 CGI 脚本存在命令注入漏洞，远程攻击者可通过向 fromfile 参数传递包含 shell 元字符的特制请求，利用 Web 服务器权限执行任意系统命令。该漏洞无需身份认证即可利用，攻击者可直接获取服务器控制权，危害严重。受影响版本为 Auction Weaver 1.0.2 及之前版本。"
published = "2000-10-20"
remediation = "升级 Auction Weaver CGI 脚本至 1.03 或更高版本（如厂商已发布修复版本）；若无法升级，立即从 Web 服务器移除 auctionweaver.cgi 或禁用该 CGI 脚本。作为临时缓解措施，在 Web 服务器层过滤 fromfile 参数中的 shell 元字符（如 ; | & ` $），或启用 Perl 的 taint 模式（-T 参数）并严格校验用户输入。由于该软件已停止维护，建议迁移至其他仍在维护的拍卖系统。"
score = 10.0
severity = "CRITICAL"
sources = ["cve"]
title = "CGI Script Center Auction Weaver 远程命令执行漏洞"
updated = "2026-06-16"

