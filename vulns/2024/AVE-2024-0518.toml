[basic]
description = "GNU GRUB2 的 BFS 文件系统解析器存在整数溢出漏洞（CWE-190），当解析特制的 BFS 文件系统时，整数溢出导致栈上出现无限循环，最终引发栈溢出使 GRUB2 崩溃。攻击者需具备本地高权限访问，通过挂载恶意构造的 BFS 文件系统触发该漏洞，造成系统引导阶段拒绝服务。该漏洞影响所有使用受影响版本 GRUB2 的 Linux 发行版，CVSS 评分 4.1，危害等级中危。"
published = "2025-03-03T17:15:12.700"
remediation = "升级 GRUB2 至包含修复的版本：Ubuntu 24.04 升级至 grub2-unsigned 2.12-1ubuntu7.3 及以上，Ubuntu 20.04/22.04 升级至 2.06-2ubuntu14.8 及以上；RHEL 系列等待厂商安全更新。如无法立即更新，限制仅受信任用户访问系统引导加载程序，避免加载恶意构造的 BFS 文件系统镜像。"
score = 4.1
severity = "MEDIUM"
sources = ["msrc"]
title = "GNU GRUB2 BFS文件系统解析器整数溢出漏洞"
updated = "2026-06-29T23:16:41.177"

