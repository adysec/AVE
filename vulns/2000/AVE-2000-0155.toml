[basic]
description = "Serv-U FTP 服务器 2.5d 及之前版本的默认配置存在路径泄漏漏洞。远程攻击者可通过向服务器请求不存在的目录或文件 URL，利用默认错误响应获取服务器真实文件系统路径。该漏洞攻击复杂度低，无需认证即可触发，泄漏的路径信息可辅助攻击者进一步探测目录结构、定位敏感文件，为后续攻击提供信息支撑，危害等级中等。"
published = "2000-02-29T05:00:00.000"
remediation = '升级 Serv-U 至 2.5e 或更高版本以修复路径泄漏缺陷；若无法升级，在 Serv-U 配置中将默认错误提示信息修改为固定通用提示（如 "File not found"），避免返回真实路径；同时在 FTP 根目录限制用户访问权限，避免 web 目录与系统目录交叉。'
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Serv-U FTP 服务器路径泄漏漏洞"
updated = "2026-06-16T21:51:09.550"

