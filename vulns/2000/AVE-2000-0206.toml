[basic]
description = "A-V Tronics InetServ 3.0 WebMail 组件存在缓冲区溢出漏洞，远程攻击者可通过向目标服务发送超长 GET 请求触发缓冲区溢出，导致任意命令执行。该漏洞影响 InetServ 3.0 版本，攻击者无需身份认证即可利用，危害严重。目前官方已停止维护，建议用户迁移至其他替代产品。"
published = "2000-01-17T05:00:00.000"
remediation = "建议立即升级 InetServ 至 3.0 以上已修复该缓冲区溢出漏洞的版本；若厂商已停止维护，应彻底替换为其他受支持的 Web 邮件服务软件（如 Roundcube、SquirrelMail 等）。临时缓解措施：在防火墙或反向代理层面限制对 WebMail 端口的访问，仅允许可信 IP 连接，并对 HTTP GET 请求长度进行限制（如 nginx 的 client_header_buffer_size 指令）。"
score = 10
severity = "CRITICAL"
sources = ["exploitdb"]
title = "A-V Tronics InetServ 3.0 WebMail 远程缓冲区溢出漏洞"
updated = "2026-06-16T21:50:55.723"

