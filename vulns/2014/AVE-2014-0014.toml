[basic]
description = "Drupal 核心 7.31 及之前版本的数据库抽象层 API 中的 expandArguments 函数未能正确构建预处理语句，导致远程攻击者可通过向参数传递包含恶意键名的数组触发 SQL 注入漏洞（Drupalgeddon）。攻击者无需身份认证即可利用该漏洞执行任意 SQL 语句，进而添加管理员账户或窃取敏感数据。该漏洞影响 Drupal 7.x 全系列版本，CVSS 评分 7.5，危害等级高。官方已在 7.32 版本中修复此漏洞。"
published = "2014-10-16T00:55:06.653"
remediation = "立即将 Drupal 核心升级到 7.32 或更高版本（官方于 2014 年 10 月发布安全更新 SA-CORE-2014-005）。升级命令：`drush up drupal -y` 或通过管理后台「可用更新」页面在线升级。若无法立即升级，可临时禁用所有未打补丁的自定义数据库查询，并配置 Web 应用防火墙（WAF）拦截包含 SQL 注入特征的请求作为临时缓解措施。"
score = 7.5
severity = "HIGH"
sources = ["nuclei"]
title = "Drupal Core SQL注入漏洞"
updated = "2026-06-17T00:08:47.197"

