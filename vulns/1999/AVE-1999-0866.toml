[basic]
description = "微软 Internet Explorer 5.0 内置的 HTML 控件（同时影响 FrontPage Express、Outlook Express 5 及 Eudora 等调用该控件的程序）存在拒绝服务漏洞。当远程攻击者构造包含超大 HTML 表单字段（如位于表格单元格中的巨大文本输入框）的恶意网页或 HTML 邮件时，受害者在浏览器或邮件客户端中渲染该内容会触发控件异常，导致 CPU 占用率飙升至 100% 并造成应用程序无响应或崩溃。攻击条件为受害者需使用受影响软件打开攻击者控制的网页或邮件，利用方式是通过发送特制 HTML 内容即可远程发起，无需身份认证或用户交互之外的特殊权限。"
published = "1999-08-27T04:00:00.000"
remediation = "该漏洞影响已停止支持的 Internet Explorer 5 及旧版 Outlook Express/FrontPage Express，微软已不再提供安全更新。建议立即升级到受支持的现代浏览器（如 Microsoft Edge 或最新版 Internet Explorer 11），并升级到最新版 Microsoft Office/Outlook。临时缓解措施：在邮件客户端中禁用 HTML 邮件渲染，改为纯文本格式阅读邮件；在 IE 中禁用 Active Scripting 和 ActiveX 控件。对于 Eudora 用户，建议迁移到受支持的邮件客户端。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
