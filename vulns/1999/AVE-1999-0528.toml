[basic]
description = "CVE-1999-0793 是微软 Internet Explorer 中存在的一个安全特性缺陷。该漏洞源于浏览器在处理 Java 小程序（Java Applet）与活动脚本（如 JScript/VBScript）的交互时，未能正确强制执行安全区域与脚本执行限制。远程攻击者可通过构造特制的网页，在用户访问时利用此缺陷绕过原本应阻止的脚本或 Java 代码执行限制，从而在用户的安全上下文中执行非预期操作、读取敏感信息或发起进一步攻击。攻击需诱使用户使用受影响版本的 Internet Explorer 访问恶意网页，属于客户端被动触发型漏洞，实际危害与利用条件相对有限。"
published = "1999-11-17"
remediation = "安装微软 1999 年 11 月发布的安全公告 MS99-043 对应补丁；如暂无法更新，可在 Internet Explorer「Internet 选项 → 安全 → 自定义级别」中将「Java 小程序脚本」与「活动脚本」设为禁用，并避免访问不可信网页。"
score = 2.6
severity = "LOW"
sources = ["exploitdb"]
title = "微软 Internet Explorer 活动脚本 Java 小程序安全限制绕过漏洞"
updated = "2026-07-17"

