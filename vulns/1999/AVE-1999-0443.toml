[basic]
description = "Microsoft Windows 95 及 Windows NT 4.0 在处理 IP 分片数据包时存在拒绝服务漏洞。远程攻击者无需身份认证，可通过向目标系统发送特制的 IP 分片报文（Bonk 攻击变种，为 teardrop 拒绝服务攻击的衍生类型），导致目标系统在重组分片时发生缓冲区溢出或系统崩溃，从而引发拒绝服务。该漏洞影响 Windows 95 和 Windows NT 4.0 操作系统。"
published = "1998-02-13T05:00:00.000"
remediation = "安装 Windows NT 4.0 Service Pack 4 (SP4) 或更高版本，该更新修复了 IP 分片重组过程中的边界检查缺陷；Windows 95 用户需安装 Microsoft 提供的 Winsock 更新补丁 (IP Fragmentation Fix)。由于 Windows 95/NT 4.0 均已停止支持，建议升级至仍受支持的 Windows 版本（如 Windows 10/11），并在边界防火墙上配置规则丢弃异常的 IP 分片包作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Microsoft Windows 95/NT 4.0 IP 碎片 Bonk 拒绝服务漏洞"
updated = "2026-06-16T21:48:01.117"

