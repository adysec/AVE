[basic]
description = "FTP 服务器启用了匿名登录功能，远程攻击者无需身份认证即可使用 anonymous 或 ftp 账号连接目标 FTP 服务，导致服务器上的文件被任意读取、下载或上传。该漏洞允许未授权访问敏感数据，若结合写权限还可用于上传恶意文件。攻击条件仅需目标开放 21 端口且允许匿名登录，利用门槛极低。"
published = "1999-01-01T05:00:00.000"
remediation = "禁止匿名 FTP 登录：在 FTP 服务器配置中将 anonymous 用户禁用，或设置 /etc/ftpusers 文件禁止匿名访问；若业务需要保留匿名服务，应使用 chroot 限制文件系统访问范围、设置只读权限并启用日志审计；建议用 SFTP/FTPS 替代明文 FTP 协议。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "FTP服务 匿名登录配置不当漏洞"
updated = "2026-06-16T21:48:31.483"

