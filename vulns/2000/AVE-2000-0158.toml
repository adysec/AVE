[basic]
description = "Sojourn 2.0 搜索引擎的 sojourn.cgi CGI 脚本存在路径遍历漏洞。该脚本通过 cat 参数接收分类名称并拼接 .txt 后缀读取对应文件，但未对 ../ 序列进行过滤，远程攻击者可通过发送包含 ../ 的特制 URL 绕过目录限制读取服务器上任意 .txt 文件。结合空字节截断攻击（在文件名后添加 %00），可绕过 .txt 后缀限制读取任意类型文件，如 /etc/passwd。攻击者无需身份认证即可利用，导致敏感信息泄露。"
published = "2000-03-14"
remediation = "Sojourn 2.0 已停止维护，建议立即移除或禁用服务器上的 sojourn.cgi 脚本。如仍需使用搜索引擎功能，应替换为其他受支持的搜索引擎软件。临时缓解措施包括在 Web 服务器层面对 sojourn.cgi 的 cat 参数进行输入过滤，拒绝包含 ../ 或 %00 的请求。"
score = 5.0
severity = "MEDIUM"
sources = ["cve"]
title = "Generation Terrorists Designs & Concepts Sojourn 2.0 目录遍历漏洞"
updated = "2026-06-16"

