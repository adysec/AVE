[basic]
description = "FORE PowerHub 5.0.0 及更早版本存在拒绝服务漏洞，远程攻击者可通过 nmap 等工具发送特制的 TCP SYN 扫描包并结合 TCP/IP 操作系统指纹探测技术，导致目标设备响应异常并陷入挂起状态，无法正常提供服务。该漏洞影响 PowerHub 5.0.0 及之前版本，攻击者无需认证即可远程触发，危害等级中等。"
published = "2005-01-05T05:00:00.000"
remediation = "升级 FORE PowerHub 至 5.0.1 或更高版本以修复该拒绝服务漏洞。如无法升级，可在网络边界防火墙配置规则，限制对 PowerHub 管理端口的 SYN 扫描探测，或部署入侵检测系统拦截 nmap 等扫描工具的特征流量。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
