[basic]
description = "明源云 ERP 文档服务系统存在任意文件上传漏洞，攻击者无需身份认证即可通过构造特制的 HTTP 请求向系统上传恶意文件。由于系统未对上传文件类型进行有效校验，攻击者可上传 WebShell 等恶意脚本文件，进而获取服务器控制权，实现远程代码执行。该漏洞影响明源云 ERP 系统的多个版本，危害严重，建议用户尽快升级至安全版本或部署 WAF 防护规则。"
published = "0703"
remediation = "立即联系明源云官方获取文档服务系统安全补丁，升级至最新稳定版本。如无法升级，在应用服务器中间件（如 Nginx/Tomcat）中对 /myReport/ 上传接口添加扩展名白名单校验，仅允许 jpg/png/pdf/doc 等非脚本类型文件上传，同时限制上传目录的执行权限（去掉 +x 权限），并部署 WAF 规则拦截包含 JSP/PHP/ASP 文件扩展名的上传请求。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "明源云 ERP 文档服务系统任意文件上传漏洞"
updated = "0703"

