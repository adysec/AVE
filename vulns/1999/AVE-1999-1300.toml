[basic]
description = "Network Security Wizards 公司开发的 Dragon-Fire IDS 1.0 版本中的 dfire.cgi 脚本存在命令执行漏洞。远程攻击者可通过向该 CGI 脚本发送包含 shell 元字符的特制请求，在目标系统上以 Web 服务器权限执行任意系统命令。该漏洞影响 Dragon-Fire IDS 1.0 版本，CVSS 评分 10.0，危害等级严重。攻击者无需身份认证即可利用，可导致服务器完全受控。"
published = "1999-08-05T04:00:00.000"
remediation = '立即从服务器 cgi-bin 目录中删除或禁用存在漏洞的 dfire.cgi 脚本，阻断远程命令执行入口。由于 Dragon-Fire IDS 1.0 已停止维护无官方补丁，建议升级至受支持的入侵检测系统替代产品；如需临时保留，应在 Web 服务器或 WAF 层过滤请求参数中的 shell 元字符（如 `; | & $ \` > <`），并对 CGI 参数做严格白名单校验。'
