[basic]
description = "Internet Anywhere Mail Server 2.3.1 存在密码明文存储漏洞，该软件将用户密码以明文形式保存在 msgboxes.dbf 文件中，本地攻击者可读取该文件并直接获取明文密码，进而提升权限。此漏洞源于对敏感数据缺乏加密保护，属于本地利用，攻击者需拥有系统本地访问权限。影响 Internet Anywhere Mail Server 2.3.1 版本。"
published = "1999-10-01T04:00:00.000"
remediation = "Internet Anywhere Mail Server 2.3.1 已将停止维护，无法通过官方补丁修复。建议立即迁移至受支持的邮件服务器（如 Postfix、Exim 或 Exchange Online），同时将 msgboxes.dbf 文件权限收紧为仅管理员可读（chmod 600），并排查已被本地低权限用户窃取的明文口令，及时修改关联账户密码。"
score = 4.6
severity = "MEDIUM"
sources = ["avd"]
title = "Internet Anywhere Mail Server 明文密码存储权限提升漏洞"
updated = "2026-06-16T21:50:00.530"

