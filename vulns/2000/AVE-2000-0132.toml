[basic]
description = "SCO OpenServer 操作系统中的 SNMPD 守护进程默认配置存在安全隐患，其 SNMP 团体字符串（community string）被设置为可写权限，导致本地攻击者可通过该默认团体字符串连接到目标系统的 SNMP 服务，进而修改系统 SNMP 配置信息。该漏洞影响 SCO OpenServer 多个版本，CVSS 评分 2.1，危害等级较低，攻击者需具备本地访问权限才能利用此漏洞。"
published = "2000-02-08T05:00:00.000"
remediation = "建议立即从 SCO 官方 FTP 获取并安装安全公告 SB-00.04a 对应的补丁。作为临时缓解措施，编辑 /etc/snmpd.conf，将默认 SNMP community 字符串从 writable 改为 read-only，并在防火墙层面限制对 UDP 161 端口的访问，仅允许受信管理主机连接。"
score = 2.1
severity = "LOW"
sources = ["avd"]
title = "SCO OpenServer SNMPD 默认写入权限漏洞"
updated = "2026-06-16T21:51:05.877"

