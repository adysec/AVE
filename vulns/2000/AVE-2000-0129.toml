[basic]
description = "Axis 700 Network Scanner 网络文档扫描服务器存在安全绕过漏洞，其管理员 URL 的访问权限未正确限制，远程攻击者可通过在 URL 路径中构造 `..`（点点）目录遍历序列绕过密码认证机制，从而未经授权访问设备管理界面及敏感配置信息。该漏洞影响 Axis 700 网络文档服务器设备，CVSS 评分 7.5，危害等级高危。"
published = "2000-02-07T05:00:00.000"
remediation = "升级 Axis 700 Network Scanner 固件至最新版本（Axis 在漏洞报告后发布了修复固件），通过设备 Web 管理界面或 Axis 官方 FTP 获取更新。如无法升级，在防火墙或路由器上限制仅允许受信任 IP 访问设备管理端口（默认 80/443），禁用公网直接访问，并将设备隔离在管理 VLAN 中。Web 管理界面中开启 IP 访问控制列表功能，仅允许管理员 IP 段访问。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "Axis 700 Network Scanner 安全绕过漏洞"
updated = "2026-06-16T21:51:05.503"

