[basic]
description = "HP-UX sysdiag 实用程序在创建日志文件时存在符号链接竞争条件漏洞，本地攻击者可利用竞争条件创建指向敏感系统文件的符号链接，诱使 sysdiag 以 root 权限写入任意文件，从而实现本地权限提升至 root 权限。该漏洞影响包含 sysdiag 组件的 HP-UX 操作系统版本，攻击者需具备本地访问权限，通过预先创建指向关键系统文件的符号链接，诱导 sysdiag 在日志创建过程中跟随链接并以 root 权限覆盖关键文件，实现权限提升。CVSS 评分 6.2，属于中等严重程度本地提权漏洞。"
published = "1996-09-21T04:00:00.000"
remediation = "立即移除 sysdiag 相关程序的 setuid root 权限：执行 `chmod u-s /bin/sysdiag /usr/bin/sysdiag`。安装 HP 官方补丁 PHSS_7587（HP-UX 9.05）及对应 9.04 补丁。如无法打补丁，限制只有授权管理员可执行诊断工具，并监控 /tmp 目录下的符号链接攻击行为。"
score = 6.2
severity = "MEDIUM"
sources = ["avd"]
title = "惠普 HPUX sysdiag 本地权限提升漏洞"
updated = "2026-06-16T21:49:24.853"

