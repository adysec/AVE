[basic]
description = "标签中。<value>用友U8+ sync接口存在任意文件上传漏洞，攻击者无需身份认证即可通过该接口上传恶意文件至服务器，可能导致远程代码执行或服务器权限被窃取。该漏洞影响使用用友U8+企业管理软件的企业用户，攻击者只需构造特制的文件上传请求即可将webshell等恶意代码写入服务器，进而获取服务器控制权限，造成数据泄露或系统沦陷。建议升级至官方安全版本并加强接口访问控制。"
published = "08.08"
remediation = "立即升级用友U8+至官方发布的最新安全补丁版本，并登录系统管理后台在应用服务配置中关闭或限制sync接口的外部访问权限，仅允许受信任内网IP调用；同时在Web服务器（如IIS）层面对sync上传路径配置严格的文件类型白名单与可执行权限禁用，禁止上传asp/jsp/php等脚本文件，并将上传目录设置为不可执行，作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "用友 U8+ sync接口任意文件上传漏洞"
updated = "08.08"

