[basic]
description = "FileMaker Pro 5 的 Web Companion 组件存在开放邮件中继漏洞，未经认证的远程攻击者可利用该组件发送匿名或伪造电子邮件。攻击者无需任何权限，只需向目标 Web Companion 端口（默认 80 端口）发送特制的 SMTP 请求，即可绕过身份验证直接中继邮件，导致邮件欺骗、垃圾邮件传播及发送者身份伪造等安全问题。该漏洞影响 FileMaker Pro 5 版本，CVSS 评分 7.5，危害等级高，且利用复杂度低。"
published = "2000-05-02T04:00:00.000"
remediation = "升级至 FileMaker Pro 6 及以上版本，该漏洞已在后续版本中修复。若无法升级，在 Web Companion 配置中禁用 SMTP 中继功能，并在服务器防火墙层面限制对 5003 端口的访问，仅允许可信 IP，同时移除 Web Companion 不必要的网络目录权限。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "FileMaker Pro Web Companion 匿名邮件发送漏洞"
updated = "2026-06-16T21:51:36.493"

