[basic]
description = "Gitea 在 Git LFS 对象复用功能中存在授权绕过漏洞（CWE-639）。由于源代码对象授权检查仅依赖仓库级别的访问权限，而未要求对拥有 LFS 对象的源仓库具有 Code 单元访问权限，导致拥有一个仓库 Code 写入权限的攻击者可将私有源仓库中的 Git LFS 对象关联到目标仓库，从而越权访问本无权限的私有源代码对象。该漏洞影响 Gitea 1.26.2 及之前版本，CVSS 评分 7.1，危害等级高。建议升级至 1.26.3 或更高版本修复。"
published = "2026-07-03T21:16:59.890"
remediation = "修复说明：Gitea ≤1.26.2 中跨仓库 LFS 对象复用时仅检查仓库级别的访问权限而未验证 Code 单元权限，导致无 Code 访问权限的用户可借用 LFS 对象获取私有源仓库内容。官方在 v1.26.3 中通过 PR #38050 修复，但 v1.26.3 存在页面加载回归问题，请直接升级到 v1.26.4（2026-06-21 发布）；从 https://dl.gitea.com/gitea/1.26.4/ 下载对应平台的二进制替换后重启服务。如无法立即升级，可在仓库设置中移除非必要用户的仓库访问权限，并严格审查所有对私有仓库有读取权限的用户的 Code 单元授权。"
score = 7.1
severity = "HIGH"
sources = ["ghsa"]
title = "Gitea Git LFS 对象重用授权绕过漏洞"
updated = "2026-07-07T18:16:38.327"

