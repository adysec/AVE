[basic]
description = "SGI IRIX 6.3 系统中的 pset 命令存在缓冲区溢出漏洞，本地攻击者可通过向该命令提交特制输入触发缓冲区溢出，从而获取 root 权限。该漏洞需要攻击者拥有本地系统访问权限，利用门槛较低，成功利用后可完全控制受影响系统。CVSS 评分 4.6，危害等级中危。"
published = "1997-07-16T04:00:00.000"
remediation = "立即升级到 IRIX 6.5 及以上版本（该系列已修复此漏洞）；如无法升级，可移除 /usr/sbin/pset 的 setuid 位作为临时缓解措施，执行 chmod u-s /usr/sbin/pset 禁止普通用户提权；严格限制本地用户的交互式 shell 访问权限，仅允许受信用户登录。由于 SGI IRIX 已于 2006 年终止支持且厂商已破产，建议将关键业务系统迁移到仍受支持的操作系统平台。"
score = 4.6
severity = "MEDIUM"
sources = ["exploitdb"]
title = "SGI IRIX pset 命令缓冲区溢出本地权限提升漏洞"
updated = "2026-06-16T21:47:22.857"

