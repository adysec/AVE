[basic]
description = "Netscape Communicator 4.7 之前版本在处理动态字体时存在缓冲区溢出漏洞。当字体长度字段值小于实际字体大小时，程序未能正确验证字体数据长度，导致堆或栈缓冲区溢出。远程攻击者可通过构造特制的动态字体文件，诱使用户在受影响浏览器中打开恶意网页触发该漏洞，可能导致拒绝服务或任意代码执行。该漏洞影响 Netscape Communicator 4.7 之前的所有版本，CVSS 评分 4.6，危害等级中危。"
published = "1999-12-24T05:00:00.000"
remediation = '建议立即升级 Netscape Communicator 至 4.7 或更高版本（如 Netscape 6.x/7.x 或 Mozilla Suite）。若无法立即升级，可在浏览器设置中禁用动态字体下载功能（Edit → Preferences → Fonts → 取消勾选 "Allow documents to use other fonts"），或通过防火墙/代理层面拦截 .pfr/.eot 字体文件下载作为临时缓解措施。建议尽快迁移至现代浏览器（Firefox/Chrome/Edge）彻底规避该漏洞。'
score = 4.6
severity = "MEDIUM"
sources = ["avd"]
title = "Netscape Communicator 缓冲区溢出漏洞"
updated = "2026-06-16T21:49:16.440"

