[basic]
description = "Perdition 0.1.8 中 libvanessa_logger 0.0.1 的 __vanessa_logger_log 函数存在格式化字符串漏洞，远程攻击者可通过向该函数传递特制的格式化字符串参数触发漏洞，导致任意代码执行。攻击者无需身份认证即可利用此漏洞，CVSS 评分 7.5，危害等级高。受影响的软件版本为 Perdition 0.1.8 及之前版本。"
published = "2001-12-31"
remediation = "升级 Perdition 至 0.1.9 或更高版本，该版本已修复 libvanessa_logger 中的格式化字符串漏洞。如无法升级，可在代理配置中禁用 __vanessa_logger_log 函数的用户可控参数传递，并在网络层面限制对 Perdition 服务的访问来源。"
score = 7.5
severity = "HIGH"
sources = [
    "cve",
    "nvd",
]
title = "Perdition libvanessa_logger 格式化字符串远程代码执行漏洞"
updated = "2026-06-16"

