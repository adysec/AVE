[basic]
description = "Titan FTP Server 6.03 及 6.0.5.549 版本中存在多处基于堆的缓冲区溢出漏洞，远程攻击者可通过向 USER 或 PASS 命令发送超长参数触发该漏洞，导致服务进程崩溃或挂起，甚至可能执行任意代码。攻击无需身份认证，仅需目标开放 FTP 服务端口，可实现远程拒绝服务或代码执行。该漏洞与 CVE-2004-1641 属于不同的攻击向量，危害严重。"
published = "2008-02-12T01:00:00.000"
remediation = "立即升级 Titan FTP Server 至 6.10 及以上版本（South River Technologies 已于 2008 年发布修复版本）。当前仍在使用的应迁移至受支持的 Titan MFT 或 Titan SFTP 产品线。临时缓解措施：在防火墙层面限制对 TCP 端口 21 的访问，仅允许白名单 IP 连接；同时在 IPS/IDS 设备上添加规则，检测并拦截长度超过 1024 字节的 USER 或 PASS 命令参数。"
score = 9.3
severity = "CRITICAL"
sources = ["nuclei"]
title = "Titan FTP Server USER/PASS 命令远程堆溢出漏洞"
updated = "2026-06-16T22:50:10.213"

