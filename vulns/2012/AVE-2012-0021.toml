[basic]
description = "FlatnuX CMS 2011 08.09.2 版本的 controlcenter.php 中存在绝对路径遍历漏洞，远程管理员可通过 contents/Files 操作中的 dir 参数传入完整路径名，读取服务器上的任意文件，导致敏感信息泄露。"
published = "2012-09-06"
remediation = "将 FlatnuX CMS 升级到最新版本，或在 controlcenter.php 中对 dir 参数进行严格的路径过滤，禁止包含绝对路径和 .. 目录跳转序列。"
score = 5.0
severity = "MEDIUM"
