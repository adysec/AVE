[info]
author = "ave"
description = "验证Internet Explorer 5.5/6.0中First Cookie Handling漏洞，通过构造包含about: URL JavaScript的恶意页面尝试跨域读取用户Cookie"
id = "POC-AVE-2001-0316"
name = "CVE-2001-0722 PoC"
severity = "medium"
tags = ["ave-2001-0316"]
vuln_id = [
    "CVE-2001-0722",
    "AVE-2001-0316",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "about:blank",
    "document.cookie",
]
