[basic]
description = "Hotmail 邮件系统未正确过滤用户邮箱中的 JavaScript 代码，导致存在跨站脚本攻击漏洞。远程攻击者可通过向受害者发送包含恶意 IMG 标签的邮件，利用 LOWSRC 或 DYNRC 参数注入并执行任意 JavaScript 脚本，从而窃取用户会话 Cookie、篡改页面内容或发起进一步攻击。该漏洞影响早期 Hotmail 版本，攻击者仅需诱使用户在浏览器中查看恶意邮件即可触发，无需额外认证。CVSS 评分 7.5，危害等级高。"
published = "2000-01-04T05:00:00.000"
remediation = "Microsoft 已于 2000 年初修复该漏洞，建议用户确保使用最新版本的 Outlook.com（原 Hotmail）Web 邮件服务。作为缓解措施，在邮件客户端中禁用 HTML 渲染和 JavaScript 执行，设置仅以纯文本格式阅读邮件，并在邮件网关过滤含有 LOWSRC/DYNRC 参数的 IMG 标签。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "Microsoft Hotmail JavaScript 过滤不当远程代码执行漏洞"
updated = "2026-06-16T21:50:58.153"

