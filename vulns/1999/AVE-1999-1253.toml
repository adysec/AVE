[basic]
description = "Windows NT 4.0 RPC 服务存在拒绝服务漏洞（Snork），远程攻击者可通过向目标系统发送特制的伪造畸形 RPC 数据包触发错误响应，该响应被发送回伪造源地址，形成循环反射放大攻击，导致目标系统 RPC 服务崩溃或资源耗尽。该漏洞影响 Windows NT 4.0 系统，攻击者无需身份认证即可远程利用，危害等级中等。"
published = "1998-09-29T04:00:00.000"
remediation = "安装 Microsoft 安全公告 MS99-014 提供的补丁程序，或升级至 Windows 2000 及以上版本。如无法升级，可在防火墙层面过滤 UDP 135、137、138、445 端口及 TCP 135、139、445 端口，阻止外部未授权 RPC 流量访问。同时限制匿名用户对 RPC 服务的访问权限。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Microsoft Windows NT 4.0 RPC 服务拒绝服务漏洞"
updated = "2026-06-16T21:49:25.843"

