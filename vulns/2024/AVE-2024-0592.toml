[basic]
description = "Das U-Boot 引导加载程序中的 sqfs_inode_size 函数在处理 squashfs 文件系统时存在整数溢出漏洞，具体发生在符号链接大小计算过程中。攻击者通过物理方式访问目标设备并挂载特制的 squashfs 文件系统镜像，可触发该整数溢出，导致内存破坏，最终实现任意代码执行。该漏洞影响 Das U-Boot 2025.01-rc1 之前的所有版本，CVSS 评分 7.1，危害等级高。由于需要物理访问且攻击复杂度较高，实际利用门槛较高，但仍对嵌入式设备和 IoT 系统构成严重安全威胁。"
published = "2025-02-18T23:15:09.523"
remediation = "升级 Das U-Boot 至 2025.01-rc1 或更高版本，该版本已修复 sqfs_inode_size 中符号链接大小计算的整数溢出问题。Debian 11 用户可安装 DLA-4150 安全更新（apt update && apt upgrade u-boot）。如无法立即升级，避免在 U-Boot 中加载或挂载来源不可信的 squashfs 镜像文件。"
score = 7.1
severity = "HIGH"
sources = ["msrc"]
title = "DENX Das U-Boot squashfs 文件系统符号链接大小计算整数溢出漏洞"
updated = "2026-06-17T08:13:27.810"

