[basic]
description = "FTPx FTP Explorer 1.0.00.10 版本在存储 FTP 站点用户名、密码及配置文件时采用弱加密算法，攻击者可通过获取本地存储的加密凭证文件，利用逆向工程或暴力破解手段还原明文密码。该漏洞允许已获得本地访问权限的攻击者窃取存储的所有 FTP 账户凭证，进而横向渗透目标服务器，危害机密性。CVSS 评分 4.6，危害等级中危。"
published = "2000-02-24T05:00:00.000"
remediation = "建议立即升级 FTP Explorer 至最新版本（如有），或改用 FileZilla、WinSCP 等活跃维护的 FTP 客户端替代 FTPx FTP Explorer。避免在软件中保存 FTP 站点密码，改用密码管理器存储凭据。如必须继续使用，手动删除本地存储的配置文件中的明文/弱加密密码字段。"
score = 4.6
severity = "MEDIUM"
sources = ["epss"]
title = "FTPx FTP Explorer 弱密码加密漏洞"
updated = "2026-06-16T21:51:14.457"

