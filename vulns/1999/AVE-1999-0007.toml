[basic]
description = "UNIX 系统的 in.comsat（通信卫星）服务用于邮件到达通知，该服务存在拒绝服务漏洞。远程攻击者无需身份认证即可向目标主机的 comsat 服务端口发送特制的畸零消息包，触发服务进程崩溃或资源耗尽，导致系统无法正常接收邮件通知。该漏洞影响运行 in.comsat 服务的各类 UNIX 变体系统，攻击条件低，只需网络可达即可发起攻击。"
published = "1999-05-01T04:00:00.000"
remediation = "建议立即禁用 in.comsat（biff）服务（执行 killall comsat 并删除 inetd.conf 中 comsat 行），如通过 xinetd 管理则注释相关配置并重启 xinetd。在防火墙层面禁止外部对 UDP 512 端口的访问作为深度防御。如必须使用 comsat 功能，升级操作系统至厂商已修复版本（各 BSD 发行版已于 1999-2000 年发布补丁）。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "UNIX in.comsat 拒绝服务漏洞"
updated = "2026-06-16T21:47:53.103"

