[basic]
description = "CVE-1999-0938 是 MBone SDR（Session Directory Tool）软件包中存在的一处命令注入漏洞。其原理是 SDR 在处理会话初始化协议（SIP）消息时，未对消息内容进行安全过滤，导致攻击者可在 SIP 消息中插入 Shell 元字符（如分号、管道符等）。当受影响系统解析这些恶意构造的 SIP 消息时，会直接调用系统 Shell 执行攻击者注入的命令，从而造成远程命令执行。该漏洞影响部署了 MBone SDR 软件包的 IPv4/IPv6 多媒体会议相关系统，攻击条件为攻击者能够向目标发送特制的 SIP 消息（通常经由组播或网络可达的会话目录服务），无需身份认证即可远程触发，CVSS 评分 7.5，危害等级为高。"
published = "1999-06-28T04:00:00.000"
remediation = "建议将 MBone SDR (Session Directory) 软件升级至 2.7 及以上版本，其中已修复对 SIP 消息中 shell 元字符的处理缺陷。如无法立即升级，应在网络边界过滤或阻断不可信来源的 SDP/SIP 组播流量，并对含有 `;`、`|`、`` ` ``、`$()` 等 shell 元字符的会话公告进行严格校验或丢弃，同时以最低权限运行 sdr 进程以限制命令执行影响。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "MBone SDR 远程命令执行漏洞"
updated = "2026-06-16T21:49:22.043"

