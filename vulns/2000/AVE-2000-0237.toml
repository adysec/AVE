[basic]
description = "Panda Security 3.0 存在安全配置绕过漏洞。尽管软件启用了注册表编辑禁用功能，本地用户仍可通过直接执行 .reg 注册表文件或其他方式绕过限制修改系统注册表，从而获取更高权限。该漏洞影响 Panda Security 3.0 版本，攻击者需拥有本地访问权限，CVSS 评分 2.1，危害等级低。"
published = "2000-04-17T04:00:00.000"
remediation = "立即升级 Panda Security 至 3.0 以上版本，官方已发布补丁包 Avoidvulnerability.zip 修复此问题。如无法升级，可在系统层面通过组策略限制普通用户执行 .reg 文件，并移除用户对注册表的写入权限作为临时缓解措施。"
score = 2.1
severity = "LOW"
sources = ["avd"]
title = "Panda Security 3.0 注册表编辑限制绕过权限提升漏洞"
updated = "2026-06-16T21:51:21.143"

