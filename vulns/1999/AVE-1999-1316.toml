[basic]
description = "SGI MachineInfo CGI 程序默认安装在部分 SGI IRIX Web 服务器上，该程序未对访问权限进行限制，导致远程攻击者可直接通过 HTTP 请求获取目标主机的系统状态信息，包括进程列表、网络连接、系统负载等敏感数据，从而为后续渗透攻击提供情报支撑。该漏洞攻击门槛低，仅需网络可达即可利用。"
published = "1997-05-07"
remediation = "删除或重命名 SGI Web 服务器上的 MachineInfo CGI 脚本（通常位于 /cgi-bin/machineinfo），或通过 Web 服务器配置限制仅允许可信任 IP 访问；升级 SGI IRIX 操作系统至 6.5 以上版本以移除默认安装的该 CGI 程序；如业务不需要此功能，直接移除该脚本文件以彻底消除信息泄露风险。"
score = 5.0
severity = "MEDIUM"
sources = ["cve"]
title = "SGI MachineInfo CGI 信息泄露漏洞"
updated = "2026-06-16"

