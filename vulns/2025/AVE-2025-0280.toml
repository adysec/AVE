[basic]
description = "汉王管理后台的 queryAlarmEvent.do 接口存在 SQL 注入漏洞，攻击者可在未经授权的情况下向 order 和 columnKey 参数注入恶意 SQL 语句，利用 UPDATEXML 等函数进行报错注入，可导致数据库敏感信息泄露。该漏洞影响汉王相关管理系统的报警查询模块，攻击条件低，仅需目标开放管理后台且存在该接口即可利用。"
published = "0704"
remediation = "建议联系汉王官方获取最新固件版本升级，该漏洞源于 `/manage/alarm/queryAlarmEvent.do` 接口的 `order` 和 `columnKey` 参数未做输入过滤导致 SQL 注入。临时缓解措施：在 WAF/防火墙中配置规则拦截包含 `UPDATEXML`、`CONCAT`、`ELT` 等 SQL 函数的关键词请求，或限制管理后台仅允许可信 IP 访问。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "汉王 告警管理系统 SQL注入漏洞"
updated = "0704"

