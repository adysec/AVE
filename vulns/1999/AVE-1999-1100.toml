[basic]
description = "该漏洞影响 Microsoft Windows 98a/98b/98SE 以及 Solaris 2.6 操作系统。DHCP 客户端在启用 ICMP Router Discovery Protocol (IRDP) 时存在安全漏洞，攻击者无需身份验证即可远程修改受害者的默认路由。攻击者只需向目标发送定制的 IRDP 数据包，即可非法篡改网络路由配置，导致网络流量重定向、数据劫持或服务中断。该漏洞利用网络协议设计缺陷，存在于旧版 Windows 和 Solaris 系统中，可能被攻击者用于实施网络劫持攻击。配备漏洞攻击工具的攻击者可以通过简单的网络请求触发此漏洞，对目标网络造成严重破坏。攻击者无需用户交互即可远程执行，攻击成本极低，影响范围广泛，尤其在局域网或存在 IRDP 配置的环境中风险极大。漏洞存在于操作系统网络协议栈中，攻击者可通过构造恶意路由器发现协议报文来篡改目标系统的路由表，进而控制网络流量的走向。攻击条件较低，只要目标系统启用了 IRDP 功能即可，此类系统在旧版操作系统中较为常见。该漏洞的安全影响级别为高危，可导致网络控制权被篡改、特定服务被劫持、网络访问被拦截等多方面安全问题，攻击者可利用此漏洞实现中间人攻击、数据窃取或进一步深入攻击。"
published = "1999-08-11T04:00:00.000"
remediation = "立即安装 Microsoft Windows 98 的 IRDP 相关安全补丁（如 Windows 98 SE 的更新汇总），或升级到不受影响的 Windows 2000/XP 及更高版本；Solaris 2.6 用户应安装 Sun 官方推荐的补丁簇。如暂无法升级，可在注册表或系统配置中禁用 ICMP Router Discovery Protocol（IRDP），并在边界防火墙/路由器上过滤外来的 ICMP Router Advertisement 报文，阻止远端攻击者伪造默认路由。"
score = 7.5
severity = "HIGH"
