[basic]
description = "PDG 购物车的 CGI 程序 shopper.cgi 由于配置不当，在特定请求下会把购物车系统中存储的私人订单信息、用户账户资料等机密数据返回给未授权访问者。该漏洞可通过网络远程触发，攻击无需认证，仅需向存在缺陷的 shopper.cgi 发送构造请求即可读取敏感内容，影响部署了错误配置 PDG Shopping Cart 的 Web 站点。"
published = "1999-04-01"
remediation = "修正 shopper.cgi 的配置文件，禁用调试或信息展示选项，限制该 CGI 仅对授权会话返回数据，并在 Web 服务器层面（如 .htaccess 或访问控制列表）对 shopper.cgi 增加访问控制与输入校验，避免未授权用户读取敏感订单与账户信息。"
score = 5.0
severity = "MEDIUM"
sources = ["epss"]
title = "PDG Shopping Cart shopper.cgi 配置错误导致敏感信息泄露漏洞"
updated = "2026-07-17"

