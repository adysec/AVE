[basic]
description = "Eicon Technology Diva LAN ISDN 调制解调器的 HTTP 服务中，login.htm 文件存在输入验证缺陷。远程攻击者通过向 password 参数提交超长字符串，可导致设备 HTTP 服务崩溃或挂起，造成拒绝服务。攻击无需身份认证，利用难度低。"
published = "1999-11-07"
remediation = "该设备已停止技术支持，建议升级到支持安全认证的现代设备；如无法更换，限制对调制解调器 HTTP 管理接口的网络访问，仅允许受信任 IP 访问。"
score = 7.5
severity = "HIGH"
