[basic]
description = "INN (InterNetNews) 新闻服务器中的 nnrpd 程序存在栈缓冲区溢出漏洞，版本 1.6 及之前版本受影响。远程攻击者无需身份认证即可向目标系统发送特制的新闻组请求，触发缓冲区溢出，从而在服务器上以 nnrpd 进程权限执行任意代码。该漏洞影响广泛部署的 INN 新闻服务器系统，CVSS 评分 7.5，危害等级高。建议升级至 INN 1.6 以上版本修复。"
published = "1997-07-21T04:00:00.000"
remediation = "升级 INN 至 2.0 或更高版本，该漏洞在 INN 1.7 及后续版本中已被修复。如无法升级，可在 innd 配置中限制 nnrpd 服务的远程访问来源 IP，或禁用 nnrpd 的远程连接功能作为临时缓解措施。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "INN nnrpd 缓冲区溢出远程代码执行漏洞"
updated = "2026-06-16T21:47:59.740"

