[basic]
description = "@Retail 购物车应用程序存在安全漏洞，由于未能对隐藏表单字段进行适当验证，导致远程攻击者能够通过精心构造的网络请求注入恶意数据并篡改敏感的购买信息。该漏洞使得攻击者无需身份验证即可访问应用，修改用户的购物车中的关键数据，如价格、数量和支付信息等，严重威胁了电子商务系统的交易安全和数据完整性。攻击过程包括发送包含隐藏字段的恶意请求，绕过应用的正常验证机制，直接操控购物车中的敏感信息，可能导致经济损失和用户隐私泄露。攻击者利用该漏洞可以进行价格欺诈、数量篡改和支付信息盗用等多种恶意行为，破坏电子商务系统的可信赖度。因此，需要在应用开发中加强对所有用户输入和隐藏字段的严格验证，实施服务端数据完整性检查，并建立完整的审计日志，以有效防范此类安全风险。"
published = "2000-02-01T05:00:00.000"
remediation = "升级 @Retail 购物车应用到官方已修复版本（2000 年 2 月后发布的安全补丁），并修改服务器端校验逻辑，禁止信任客户端提交的隐藏表单字段；对订单金额、数量等敏感字段改为服务端计算与二次校验，临时缓解可在前端移除敏感隐藏字段并增加服务端会话校验。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "Atretail @Retail Shopping Cart 购物车隐藏表单字段篡改漏洞"
updated = "2026-06-16T21:51:04.387"

