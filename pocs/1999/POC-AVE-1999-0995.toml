[info]
author = "AVE"
description = "检测目标系统是否为 Linux Kernel 2.0.37 版本，该版本存在 Custom segment limit 编码缺陷，本地用户可访问并修改内核内存导致权限提升"
id = "POC-AVE-1999-0995"
name = "Linux Kernel 2.0.37 Segment Limit 权限提升漏洞 PoC"
severity = "high"
tags = [
    "cve-1999-1166",
    "kernel",
    "privilege-escalation",
]
vuln_id = [
    "CVE-1999-1166",
    "AVE-1999-0995",
]

[poc]
logic = "all"

[[poc.requests]]
path = "/proc/version"
protocol = "file"

[[poc.requests.matchers]]
expect = true
part = "body"
regex = 'Linux version \d+\.\d+\.\d+'
type = "regex"
