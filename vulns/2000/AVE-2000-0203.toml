[basic]
description = "Linux 2.2.x内核未正确限制Unix域套接字的数量，wmem_max参数未能对Unix域套接字生效，导致本地攻击者可以通过请求大量套接字消耗系统资源，造成拒绝服务。该漏洞影响Linux Kernel 2.2.12、2.2.14、2.3.99及RedHat 6.x系统。"
published = "2000-03-23"
remediation = "升级到Linux Kernel 2.2.15及以上版本，该版本已修复Unix域套接字数量限制问题。"
score = 2.1
severity = "LOW"
sources = ["cve"]
title = "Linux Kernel 2.2.x Unix域套接字数量限制缺失导致拒绝服务漏洞"
updated = "2000-03-23"

