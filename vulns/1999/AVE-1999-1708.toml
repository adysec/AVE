[basic]
description = 'Internet Explorer 4.01 及更早版本中存在缓冲区溢出漏洞，远程攻击者可通过向用户发送包含特制长 URL 的链接（使用 "mk:" 协议）并诱使用户点击，触发缓冲区溢出，从而在用户系统上执行任意命令。该漏洞影响范围较广，攻击门槛较低，危害等级高危。'
published = "1999-12-31T05:00:00.000"
remediation = "安装 Microsoft KB Q176697 补丁，或将 Internet Explorer 升级至 4.01 Service Pack 1 及以上版本（如 IE 5.01 SP2）。对于现代系统，建议迁移至 Microsoft Edge 等受支持的浏览器，旧版 IE 已停止安全更新且不再接收补丁。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "微软 Internet Explorer MK协议缓冲区溢出远程代码执行漏洞"
updated = "2026-06-16T21:49:42.553"

