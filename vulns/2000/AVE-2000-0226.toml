[basic]
description = "QNX 4.25 操作系统中的 crypt() 密码加密函数采用了安全性极弱的加密算法，无法提供足够的密码保护强度。已登录系统的本地用户可利用该弱加密机制的缺陷，对系统中存储的密码哈希进行解密还原，从而获取其他用户（包括特权用户）的明文口令。该漏洞影响运行 QNX 4.25 A 版本的系统，攻击前提是攻击者需先获得目标主机的本地访问权限（如低权限用户账户），通过本地执行解密操作即可实现权限提升，危害系统账户安全。"
published = "2000-04-14T04:00:00.000"
remediation = "建议升级至 QNX 4.25 B 或更高版本（QSSL 已发布修复补丁），或应用 QSSL 官方发布的 crypt() 补丁包。若暂时无法升级，可通过限制本地账号登录权限、启用影子密码文件、配置更强的密码策略（如最小长度 12 位、复杂度要求）作为临时缓解措施。"
score = 7.2
severity = "HIGH"
sources = ["exploitdb"]
title = "QSSL QNX 4.25 A crypt() 弱加密本地权限提升漏洞"
updated = "2026-06-16T21:51:19.307"

