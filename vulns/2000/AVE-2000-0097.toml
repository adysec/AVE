[basic]
description = "SyGate 远程管理服务存在访问控制缺陷，未对管理服务进行适当的访问权限限制，导致远程攻击者无需认证即可向目标系统发送恶意请求，从而引发拒绝服务或非法获取网络流量统计数据。该漏洞影响 SyGate 系列产品，CVSS 评分 7.5，危害等级高。建议用户升级至安全版本或配置防火墙规则限制对管理服务的访问。"
published = "2000-01-27T05:00:00.000"
remediation = '升级至 SyGate 3.11 build 562 或更高版本，该版本已修复远程管理服务无认证访问漏洞。如无法升级，启用 SyGate 的"Enhanced Security"增强安全模式以限制远程管理端口 7323 仅接受来自内部网络的连接。同时建议在外部防火墙层面禁用对 TCP 7323 端口的入站访问。注意 build 562 与旧版 SyShield (build 177) 存在兼容问题，需同步更新 Secure Desktop。该产品已停止支持，建议迁移至受支持的替代方案。'
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "Sygate Remote Management 拒绝服务漏洞"
updated = "2026-06-16T21:51:01.660"

