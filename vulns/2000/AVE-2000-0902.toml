[basic]
description = 'ISC BIND 8.2 至 8.2.2-P6 版本的 named 守护进程在处理 SRV 资源记录查询时存在缺陷，远程未认证攻击者可通过向 DNS 服务器发送特制的 SRV 记录查询请求，触发 named 进程崩溃导致拒绝服务，该漏洞被称为 "srv bug"。影响范围涵盖 ISC BIND 8.2 至 8.2.2-P6 所有版本，攻击者只需网络可达 DNS 服务器的 53 端口，无需身份认证即可发起攻击，利用方式为构造恶意 SRV 记录查询包直接发送至目标 DNS 服务器导致服务崩溃拒绝服务，CVSS 评分 5.0（AV:N/AC:L/Au:N/C:N/I:N/A:P），属于网络远程拒绝服务漏洞，影响 DNS 服务可用性。'
published = "2000-12-19T05:00:00.000"
remediation = "建议立即升级 ISC BIND 到 8.2.3 或更高版本（如 9.x 系列），或应用 ISC 官方发布的针对 SRV 记录拒绝服务漏洞的补丁补丁。若暂时无法升级，可在防火墙层面限制 DNS 服务器仅允许受信任源 IP 访问 53 端口（TCP/UDP），并在 named.conf 中添加 allow-query { trusted_nets; }; 限制递归查询来源，作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "ISC BIND SRV记录拒绝服务漏洞"
updated = "2026-06-16T21:52:40.820"

