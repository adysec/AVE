[basic]
description = "AnalogX SimpleServer:WWW HTTP 服务器在 cgi-bin 目录下对畸形的短 GET 请求（请求路径后跟 8 个字符）不做有效验证，导致服务器进程崩溃并拒绝服务。攻击者无需认证即可远程触发漏洞，只需向目标服务器发送特制的 GET 请求即可导致服务器停止响应正常请求。该漏洞影响 AnalogX SimpleServer:WWW 1.0.3 版本及更早版本，CVSS 评分 5.0，危害等级中等。"
published = "2000-03-25"
remediation = "立即升级 AnalogX SimpleServer:WWW 到 1.16 或更高版本（当前版本 1.24，支持 Windows 7 等系统），以获取 cgi-bin 目录处理 bug 的修复。如无法立即升级，可在服务器前部署反向代理过滤异常短 GET 请求，或在防火墙层限制仅允许可信 IP 访问 Web 端口。"
score = 5.0
severity = "MEDIUM"
sources = ["cve"]
title = "AnalogX SimpleServer:WWW cgi-bin 目录短 GET 请求导致拒绝服务漏洞"
updated = "2026-06-16T21:51:18.377"

