[basic]
description = "SuSE Linux 6.3/6.4 中 Apache HTTP Server 的默认配置文件 httpd.conf 将 /usr/doc 目录设为别名映射，导致远程攻击者可通过 HTTP 请求访问 /doc/packages 路径，直接读取系统已安装软件的文档及配置信息，造成敏感信息泄露。该漏洞影响 SuSE Linux 6.3/6.4 版本，攻击者无需认证即可利用，CVSS 评分 5.0，危害等级中等。建议修改 Apache 配置移除该别名映射或限制访问权限。"
published = "2000-12-11T05:00:00.000"
remediation = "编辑 Apache 配置文件 httpd.conf，删除或注释掉 `Alias /doc/packages /usr/doc` 行，或添加 `<Directory /usr/doc>` 权限限制块拒绝外部访问。同时建议升级到 SuSE 7.0 或更高版本，该版本已默认移除该别名配置。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "SuSE Linux Apache httpd 默认配置信息泄露漏洞"
updated = "2026-06-16T21:52:58.657"

