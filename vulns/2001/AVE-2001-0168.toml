[basic]
description = "Vim 5.x 的备份文件与交换文件存在竞争条件漏洞，属于本地利用的符号链接攻击。当用户在全局可写目录中编辑文件时，本地攻击者可通过预先创建符号链接指向目标文件，诱使 victim 的 Vim 在保存或备份时覆盖其他用户文件，导致非授权修改。该漏洞影响 Vim 5.x 版本及 gvim，攻击者需具有本地系统账户权限，CVSS 评分 2.1，危害等级低。"
published = "2001-06-18T04:00:00.000"
remediation = "升级至 Vim 6.0 及以上版本，该版本已修复 swap 文件的竞争条件问题。如无法升级，设置 `set backupcopy=yes` 避免符号链接攻击，并将 swap 和 backup 目录改为私有路径（如 `set dir=~/.vim/swap//` 和 `set backupdir=~/.vim/backup//`），同时避免在有其他用户的共享目录（如 `/tmp`）中编辑文件。"
score = 2.1
severity = "LOW"
sources = ["exploitdb"]
title = "Vim 5.x Swap文件竞争条件漏洞"
updated = "2026-06-16T21:54:15.247"

