[basic]
description = "CyberCash Merchant Connection Kit（MCK）存在本地提权漏洞，本地攻击者可通过符号链接攻击（symlink attack）修改系统文件，获取更高权限或造成数据篡改。该漏洞影响 CyberCash MCK 组件，攻击者需要拥有本地系统访问权限，CVSS 评分 2.1，危害等级低。"
published = "2000-01-11"
remediation = "CyberCash MCK 已停止维护且不再受支持，建议迁移至受支持的支付处理方案。作为临时缓解措施，确保 MCK 运行目录的粘滞位（sticky bit）已设置，限制非信任用户访问。"
score = 2.1
severity = "LOW"
sources = ["cve"]
title = "CyberCash Merchant Connection Kit 本地符号链接攻击漏洞"
updated = "2026-06-16"

