[basic]
description = "SGI IRIX 5.x 至 6.3 版本的 systour（Indigo Magic System Tour）功能包中存在本地权限提升漏洞。当 RemoveSystemTour 程序执行 inst 命令时，会调用 .exitops 程序；本地攻击者可通过植入特洛伊木马化的 .exitops 程序，诱使该流程以 root 权限执行恶意代码，从而获取系统最高权限。该漏洞影响 IRIX 5.x 至 6.3 版本，CVSS 评分 7.2，危害等级高，且已有公开的利用代码。"
published = "1996-10-30T05:00:00.000"
remediation = "已停产的 SGI IRIX 不再接收安全更新，建议立即卸载 systour 软件包（`versions remove systour`），或将包含的 RemoveSystemTour 脚本中 .exitops 的调用删除并设置正确的文件权限（`chmod 000`），同时将系统升级至 IRIX 6.5 以上版本以消除该漏洞。"
score = 7.2
severity = "HIGH"
sources = ["epss"]
title = "SGI IRIX Systour/OutOfBox 本地权限提升漏洞"
updated = "2026-06-16T21:50:19.480"

