[basic]
description = "Internet Explorer 4.01 SP1 及更早版本的 JScript 脚本引擎中的 Window.External 函数存在缓冲区溢出漏洞。远程攻击者可通过诱导用户访问特制恶意网页触发该漏洞，利用缓冲区溢出执行任意命令。该漏洞影响 IE 4.01 SP1 及更早版本，CVSS 评分 5.1，危害等级中危。用户应升级浏览器版本或避免访问不可信网页以降低风险。"
published = "1999-12-31T05:00:00.000"
remediation = "升级 Internet Explorer 至 4.01 SP2 或更高版本，该漏洞已在后续版本中修复。建议将浏览器升级至 IE 5.01 SP4 或 IE 6.0 SP1 以彻底消除风险。如已停止使用 IE 老旧版本，应迁移至 Edge 或 Chrome 等现代浏览器。"
score = 5.1
severity = "MEDIUM"
sources = ["cve"]
title = "Microsoft Internet Explorer JScript 脚本引擎缓冲区溢出远程代码执行漏洞"
updated = "2026-06-16T21:49:42.420"

