[basic]
description = "Microsoft IIS 1.0、Netscape Server 1.0/1.12、O'Reilly WebSite Professional 1.1b 等多款早期 Web 服务器软件未能正确过滤 .cmd 和 .bat 文件扩展名，导致远程攻击者可通过 HTTP 请求直接访问并执行服务器上的命令脚本，从而在目标系统上以 Web 服务器进程权限执行任意命令。该漏洞无需身份认证，利用门槛低，可导致服务器完全受控。"
published = "1996-02-25T05:00:00.000"
remediation = "立即停止使用 IIS 1.0/Netscape 1.0 等已停止支持的版本，升级至 IIS 6.0 或更高版本。在 IIS 管理器中移除 .bat/.cmd 扩展名的应用程序映射，禁止通过 Web 执行命令行脚本。同时设置 Web 站点目录仅允许静态文件访问，禁用父路径和脚本映射执行权限。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "Microsoft IIS 及多款 Web 服务器 .cmd/.bat 文件远程命令执行漏洞"
updated = "2026-06-16T21:47:58.010"

