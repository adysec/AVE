[basic]
description = "Internet Explorer 4.01、5.0 及 5.01 版本中存在服务端页面引用重定向漏洞。当 Web 服务器执行服务端重定向时，IE 安全模型会检查新页面的权限，但在特定时机条件下，攻击者可创建对客户端窗口的引用，然后利用服务端重定向到客户端本地文件，绕过安全限制，导致恶意网站运营者能够读取访问者计算机上已知路径的本地文件。"
published = "1999-12-08"
remediation = "安装 Microsoft 安全公告 MS99-050 提供的安全补丁，或升级到 Internet Explorer 5.01 Service Pack 1 及以上版本。该补丁同时修复了此前 ImportExportFavorites 漏洞。"
score = 5.1
severity = "MEDIUM"
sources = ["cve"]
title = "Microsoft Internet Explorer 4.01/5.0/5.01 服务端页面引用重定向漏洞"
updated = "2026-06-16"

