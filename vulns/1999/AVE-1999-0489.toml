[basic]
description = "Vixie Cron 是 Linux 系统中广泛使用的定时任务守护进程。该漏洞源于 Vixie Cron 在处理 MAILTO 环境变量时未对输入参数进行充分验证，本地用户可通过构造特制的 MAILTO 环境变量值，向系统 sendmail 命令注入恶意参数，进而执行任意命令。该漏洞影响 Caldera OpenLinux 2.2、Debian 2.1/2.2 以及 RedHat 6.0 等早期 Linux 发行版，CVSS 评分 7.2。攻击者需具备本地登录权限，通过在 crontab 配置或环境变量中设置恶意 MAILTO 值即可触发，导致权限提升或系统被进一步控制。建议用户升级至修正后的 Vixie Cron 版本，或通过限制本地用户环境变量写入权限来缓解风险。"
published = "1999-08-25T04:00:00.000"
remediation = "建议升级 Vixie Cron 至各发行版已修复版本：Debian 用户升级至 cron 3.0pl1-57 及以上，RedHat 用户安装 vixie-cron 更新包，Caldera 用户应用对应的安全补丁。升级后 MAILTO 环境变量将不再被用于拼接 sendmail 命令参数。如无法立即升级，可临时限制普通用户对 crontab 的使用权限（通过 /etc/cron.allow 和 /etc/cron.deny 控制），并加强对 crontab 提交内容的审计。"
score = 7.2
severity = "HIGH"
sources = ["epss"]
title = "Linux Vixie Cron 计划任务 MAILTO 环境变量注入漏洞"
updated = "2026-06-16T21:49:01.193"

