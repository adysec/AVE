[basic]
description = "Microsoft Internet Explorer 5 的下载行为（Download Behavior）功能在处理服务器侧重定向时存在安全缺陷，远程攻击者可通过诱使用户访问特制网页，利用重定向跨域读取目标系统上的任意本地文件。该漏洞无需身份认证，仅需受害者浏览恶意页面即可触发，影响运行 IE5 的 Windows 平台系统，可导致敏感信息泄露。"
published = "1999-09-01"
remediation = "立即通过 Windows Update 安装 Microsoft 安全公告 MS99-040（知识库 KB242542）提供的 Internet Explorer 5 修复补丁。在无法及时打补丁的情况下，可在 IE5 的 Internet 选项→安全→自定义级别中将下载行为设为禁用，并避免访问不受信任的网站作为临时缓解；受影响的 IE5 已停止支持，建议升级到受支持的现代浏览器版本。"
score = 5.0
severity = "MEDIUM"
sources = [
    "cve",
    "exploitdb",
]
title = "微软 Internet Explorer 5 下载行为文件读取漏洞"
updated = "2026-07-17"

