[basic]
description = "nmh 邮件处理套件中的 mhshow 组件存在缓冲区溢出漏洞，远程攻击者可通过向目标用户发送包含恶意构造 MIME 头部的电子邮件来触发该漏洞，成功利用可导致在受影响的 Linux 系统上以目标用户权限执行任意代码。该漏洞影响多个 Linux 发行版中的 nmh 包。"
published = "2000-02-28T05:00:00.000"
remediation = "建议立即安装 Red Hat 安全公告 RHSA-2000-006 中提供的 nmh 修补包（对应 nmh 版本 0.27 或更高版本），或通过系统包管理器更新 nmh 软件包。该公告针对 mhshow 在处理畸形 MIME 邮件头时的缓冲区溢出问题进行了修复。如无法立即更新，可在邮件服务器层面过滤含有异常 MIME 头结构的邮件作为临时缓解措施，同时避免使用 nmh 套件中的 mhshow 命令查看不可信来源的邮件。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "Linux nmh mhshow MIME头处理缓冲区溢出远程代码执行漏洞"
updated = "2026-06-16T21:51:12.113"

