[info]
author = "AVE"
description = "检测 Adobe Reader/Acrobat 缓冲区溢出漏洞，通过构造特制 PDF 文件触发远程代码执行"
id = "POC-AVE-2013-0100"
name = "CVE-2013-0641 PoC"
severity = "high"
tags = [
    "cve-2013-0641",
    "adobe",
    "pdf",
    "rce",
]
vuln_id = [
    "CVE-2013-0641",
    "AVE-2013-0100",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "Adobe Reader",
    "Adobe Acrobat",
]
