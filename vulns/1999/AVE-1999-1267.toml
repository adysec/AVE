[basic]
description = "SGI IRIX 操作系统 5.3 及 6.2 版本中的 addnetpr（/usr/lib/netaddpr）工具存在任意文件写入漏洞。本地攻击者可通过符号链接攻击方式，在打印机临时文件创建过程中将目标文件链接为系统关键文件，导致任意文件覆盖，进而实现本地权限提升获取 root 权限。该漏洞利用条件为拥有本地 shell 访问权限，无需额外认证。"
published = "1997-05-09T04:00:00.000"
remediation = "升级 IRIX 至 6.5 或更高版本，或安装 SGI 提供的安全补丁 4841。如无法升级，可移除 addnetpr 的 setuid 权限（chmod u-s /usr/lib/netaddpr）并限制可执行用户组，作为临时缓解措施。由于 IRIX 已停止维护，建议迁移至受支持的操作系统。"
score = 6.2
severity = "MEDIUM"
sources = ["epss"]
title = "SGI IRIX addnetpr 本地提权漏洞"
updated = "2026-06-16T21:50:22.870"

