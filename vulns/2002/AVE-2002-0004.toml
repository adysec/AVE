[basic]
description = "在 SunRPC 及其衍生实现（如 GNU glibc、dietlibc）的 XDR 库 xdr_array() 函数中存在整数溢出漏洞。远程攻击者可通过向运行 RPC 服务的系统（如 rpc.cmsd、dmispd 等服务）发送包含大量参数的特制 RPC 请求，触发整数溢出导致堆破坏，最终实现远程代码执行。该漏洞影响所有基于 SunRPC 代码的操作系统，CVSS 评分 9.8，危害等级严重。"
published = "2002-08-12T04:00:00.000"
remediation = "建议升级 glibc 至 2.2.5 及以上版本（Red Hat Linux 升级至 7.2 对应更新包），或安装各厂商 2002 年发布的 libc 安全补丁。临时缓解措施：在防火墙上屏蔽 RPC 端口（135/TCP、135/UDP）并禁用不必要的 RPC 服务（rpc.cmsd、dmispd、rpc.statd 等）。"
score = 9.8
severity = "CRITICAL"
sources = ["osv"]
title = "Sun RPC XDR库xdr_array函数整数溢出远程代码执行漏洞"
updated = "2026-06-16T21:57:20.673"

