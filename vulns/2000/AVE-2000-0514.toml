[basic]
description = "BSD 系统内核中未公开文档的 semconfig 系统调用存在设计缺陷，由于未对调用者权限进行充分限制，本地攻击者可利用该调用冻结系统中所有信号量的状态，导致信号量子系统无法响应任何操作而陷入拒绝服务状态。该漏洞影响 BSD 系列操作系统，包括 NetBSD 等衍生版本。攻击者需要有本地系统访问权限才能利用此漏洞，无法远程触发，但一旦成功将直接导致系统信号量功能瘫痪，影响依赖信号量机制的应用正常运行。"
published = "2000-05-29T04:00:00.000"
remediation = "FreeBSD 用户应立即应用 FreeBSD-SA-00:19 安全公告中的内核补丁；NetBSD 用户应安装 NetBSD-SA2000-004 公告提供的补丁；OpenBSD 2.6 用户需应用 errata 024 号内核补丁，移除未文档化的 semconfig 系统调用。如无法立即打补丁，可通过内核配置禁用 System V 信号量支持作为临时缓解措施。"
score = 2.1
severity = "LOW"
sources = ["cve"]
title = "NetBSD semconfig 系统调用拒绝服务漏洞"
updated = "2026-06-16T21:51:47.067"

