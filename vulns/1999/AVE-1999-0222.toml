[basic]
description = "GNU Ffingerd 1.19 存在用户名有效性信息泄露漏洞。远程攻击者无需认证即可向目标系统的 finger 服务发送查询请求，通过分析服务端对不同用户名的响应差异（如返回信息的有无或内容不同），可枚举出系统上存在的有效用户名。该漏洞为信息泄露类型，虽不直接导致代码执行，但可为后续针对性攻击（如密码爆破、社会工程学）提供情报支撑，影响运行 GNU Ffingerd 1.19 的 Unix/Linux 系统。"
published = "1999-04-23T04:00:00.000"
remediation = "建议立即升级 ffingerd 至 1.20 或更高版本，或直接禁用 ffingerd 服务（finger 协议已过时且存在信息泄露风险）。如必须使用，可在 /etc/inetd.conf 中注释 finger 行并重启 inetd 服务，同时在防火墙层面限制对 79/TCP 端口的访问仅允许可信 IP。"
score = 10
severity = "CRITICAL"
sources = ["exploitdb"]
title = "GNU Ffingerd 1.19 用户名有效性信息泄露漏洞"
updated = "2026-06-16T21:48:30.767"

