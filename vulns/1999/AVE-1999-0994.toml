[basic]
description = "GNU fingerd 1.37 存在权限管理缺陷，程序在访问用户信息前未正确放弃特权。本地攻击者可利用该漏洞通过两种方式实施攻击：一是在 .fingerrc 文件中放置恶意程序以获取 root 权限；二是利用 .plan、.forward 或 .project 文件中的符号链接读取系统任意文件。该漏洞影响运行 GNU fingerd 1.37 的系统，CVSS 评分 7.2，危害等级高。建议升级至最新版本或禁用 finger 服务。"
published = "1999-07-21T04:00:00.000"
remediation = "建议立即禁用或卸载 finger 服务（如 `systemctl disable fingerd` 或 `apt remove fingerd`），该服务已过时且存在权限提升风险。如业务必须使用，应升级至修复了提权问题的版本，并确保 .fingerrc/.plan/.forward/.project 文件仅属主可写，同时以非 root 用户运行 fingerd 进程。作为临时缓解，可通过 `chmod 0 /usr/sbin/fingerd` 移除执行权限。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "GNU fingerd 任意文件读取漏洞"
updated = "2026-06-16T21:49:51.533"

