[basic]
description = "Solaris snoop 程序中的 print_domain_name 函数存在缓冲区溢出漏洞。当 snoop 以详细模式运行时，未经身份认证的远程攻击者可通过向目标网络发送包含超长域名（domain name）的特制网络数据包，触发缓冲区溢出，进而获得目标系统的 root 权限。该漏洞影响 Solaris 2.3/2.4/2.5/2.5.1/2.6/7.0 等多个版本，CVSS 评分为 10.0，危害等级严重。攻击者需确保目标系统正在运行 snoop 程序并开启详细模式方可成功利用此漏洞，利用后可完全控制受影响系统。"
published = "1999-12-07T05:00:00.000"
remediation = "建议立即升级到已修复该漏洞的 Solaris 补丁版本（Solaris 7 安装 Sun 官方补丁 105530-05 及以上，Solaris 2.6 安装 105531-05 及以上，其余受影响版本升级至对应 Sun 安全补丁）。如无法立即打补丁，应以非 root 权限运行 snoop，并避免以 verbose 模式监听网络流量，同时在网络边界防火墙限制对受影响主机的嗅探端口访问，作为临时缓解措施。"
score = 10
severity = "CRITICAL"
