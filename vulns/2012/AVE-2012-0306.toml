[basic]
description = "Oracle Java SE 的 Java 运行时环境（JRE）组件中的 JAX-WS 存在未指定的安全漏洞，远程攻击者可通过诱导用户访问恶意网页或运行特制的 Java Applet 触发该漏洞，成功利用可在目标系统上实现远程代码执行，完全控制受影响的系统，导致机密性、完整性和可用性丧失。该漏洞影响 Oracle Java SE 7 Update 7 及更早版本，CVSS 评分 9.8，危害等级严重。Metasploit 框架已集成该漏洞的利用模块，攻击门槛较低，且已被 CISA 列入已知被利用漏洞目录（KEV），需尽快修复。"
published = "2012-10-16T21:55:02.073"
remediation = '立即升级 Oracle Java SE 至 7 Update 9（7u9）或更高版本，该版本已修复 JAX-WS 组件的远程代码执行漏洞。如无法立即升级，可在浏览器中禁用 Java Applet 执行（通过 Java 控制面板取消勾选"启用 Java 内容"），或在 Web 服务器层面过滤对 JAX-WS 端点的外部访问请求作为临时缓解措施。'
score = 9.8
severity = "CRITICAL"
sources = ["kev"]
title = "Oracle Java SE JAX-WS 远程代码执行漏洞"
updated = "2026-06-16T23:46:10.790"

