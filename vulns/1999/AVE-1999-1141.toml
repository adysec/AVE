[basic]
description = "Etype Eserv 2.50 Web 服务器存在目录遍历漏洞。远程攻击者可在 URL 中通过构造包含 `../` 的路径序列绕过访问限制，读取文件系统中的任意文件，导致敏感信息泄露。攻击无需身份认证，仅需向目标 Web 服务器发送特制 HTTP 请求即可触发，利用难度较低。"
published = "1999-11-04T05:00:00.000"
remediation = "升级 Eserv 至 2.50 以上版本（如厂商后续发布过修复版本），或迁移至其他仍在维护的 Web 服务器软件（如 Apache、Nginx）。若无法升级，可在反向代理或 WAF 层面拦截包含 `../` 的 URL 请求路径，并限制 Web 服务运行账户的文件系统权限，避免读取敏感配置文件。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Etype Eserv 2.50 目录遍历漏洞"
updated = "2026-06-16T21:50:35.603"

