[basic]
description = "Microsoft IIS 4.0 存在分块传输编码缓冲区溢出漏洞，远程攻击者可通过向目标服务器发送包含超大数据块的 POST 或 PUT 请求触发该漏洞，导致服务器内存耗尽并造成拒绝服务。该漏洞影响 IIS 4.0 版本，攻击者无需认证即可利用，但无法实现远程代码执行。Microsoft 已在后续安全更新中修复此漏洞。"
published = "2000-03-20T05:00:00.000"
remediation = "升级 IIS 4.0 至 Service Pack 6 (SP6) 或更高版本，或升级至 IIS 5.0/6.0 及以上版本。如无法升级，安装 Microsoft 安全公告 MS00-005 对应修补程序 (Q248319)，或在 IIS 管理器中禁用 Chunked Transfer Encoding 支持作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Microsoft IIS 4.0 分块传输编码缓冲区溢出拒绝服务漏洞"
updated = "2026-06-16T21:51:16.057"

