[basic]
description = 'Tech-Source Raptor GFX PGX32 配置工具中的 pgxconfig 程序在调用系统命令 "cp" 时使用了相对路径而非绝对路径，导致本地攻击者可通过修改 PATH 环境变量指向恶意的 "cp" 程序来劫持该调用，从而以配置工具的权限执行任意命令。该漏洞影响 Raptor GFX PGX32 2.3.1 版本，CVSS 评分 7.2，危害等级高。攻击者需拥有本地系统访问权限方可利用。'
published = "2000-10-20T04:00:00.000"
remediation = "使用绝对路径调用系统命令（如将 `cp` 改为 `/bin/cp`）即可修复此漏洞。临时缓解措施：限制 `pgxconfig` 的执行权限（仅授予受信任用户），并确保 `PATH` 环境变量中不含未授权的可写目录。该产品已停止维护，建议迁移至替代方案。"
score = 7.2
severity = "HIGH"
sources = ["cve"]
title = "Tech-Source Raptor GFX PGX32 Config Tool 本地任意命令执行漏洞"
updated = "2026-06-16T21:52:16.943"

