[basic]
description = "NBase 公司生产的 NH208 及 NH215 系列交换机默认运行 TFTP 服务，由于固件更新文件名使用可预测的默认名称，远程攻击者无需认证即可通过猜测文件名向目标设备发送恶意软件更新包，从而修改交换机配置或导致设备崩溃，造成拒绝服务。该漏洞影响 NBase NH208 与 NH215 型号交换机，CVSS 评分 6.4，危害等级中危。"
published = "1998-07-20T04:00:00.000"
remediation = "立即在交换机管理界面禁用 TFTP 服务（若支持），或在网络边界防火墙/ACL 中限制对交换机 UDP 69 端口的访问，仅允许受信任的管理 IP 连接。由于该产品已停产且厂商不再提供固件更新，建议将设备替换为支持安全固件签名验证的现代交换机，从根本上消除未授权 TFTP 固件写入风险。"
score = 6.4
severity = "MEDIUM"
sources = ["avd"]
title = "NBase NH208 和 NH215 交换机 TFTP 服务器拒绝服务漏洞"
updated = "2026-06-16T21:50:24.300"

