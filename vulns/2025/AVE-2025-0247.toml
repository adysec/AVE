[basic]
description = "数字通移动办公系统 `/mobile/document/update` 接口中 `parase` 参数存在 SQL 注入漏洞，攻击者可在未经身份认证的情况下向该参数注入恶意 SQL 语句，实现对后台数据库的任意查询与篡改，可能导致敏感数据泄露甚至获取管理员权限。该漏洞利用难度低，无需特殊权限，影响范围较广，建议厂商对用户输入进行严格过滤。"
published = "0714"
remediation = "升级数字通移动办公系统至最新安全版本，厂商已修复 /mobile/document/update 接口中 parase 参数存在的 SQL 注入漏洞。如无法立即升级，在 Web 应用防火墙（WAF）中配置规则对 parase 参数进行严格过滤，禁止特殊字符和 SQL 关键字传入；同时代码层对 parase 参数实施预编译绑定参数查询，避免拼接 SQL 语句。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "数字通 移动端文档更新接口SQL注入漏洞"
updated = "0714"

