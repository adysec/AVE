[basic]
description = "满客宝后台管理系统 downloadProviderFile 接口存在任意文件读取漏洞，未授权攻击者可通过构造特制的文件路径参数，绕过权限验证直接读取服务器上的敏感文件（如数据库配置文件、系统密钥等），导致敏感信息泄露。该漏洞无需身份认证即可利用，攻击门槛低，危害较大。"
published = "0719"
remediation = "该漏洞位于满客宝后台管理系统的 /warehouse/api/v1/provider/swagger/../downloadProviderFile 接口，通过路径遍历可实现未授权任意文件读取。建议立即联系满客宝厂商获取安全更新，或自行修复：在 downloadProviderFile 方法中对 filePath 参数做目录约束校验，禁止包含 ../ 等路径遍历字符，仅允许读取指定上传目录内的文件；同时在接口层添加身份认证与鉴权逻辑，确保未登录用户无法访问该接口；临时缓解措施可在 WAF/反向代理层面拦截包含 ../ 及 /downloadProviderFile 的请求路径，并关闭生产环境的 Swagger 接口文档暴露。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "满客宝后台管理系统任意文件读取漏洞"
updated = "0719"

