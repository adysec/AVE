[basic]
description = "Samba 2.0.7 中的 Web 管理工具（SWAT）存在符号链接漏洞，本地攻击者可通过创建指向系统任意文件的恶意符号链接，当 SWAT 向 cgi.log 写入日志时，日志内容会被重定向写入被链接的目标文件，从而实现任意文件覆盖。该漏洞影响 Samba 2.0.7 版本，需要攻击者具有本地系统访问权限，CVSS 评分 7.2，危害等级高。"
published = "2000-12-19T05:00:00.000"
remediation = "升级 Samba 至 2.0.8 或更高版本。如无法升级，可禁用 SWAT 服务（注释 swat 相关 xinetd 配置），并限制 /tmp 目录的粘滞位权限（chmod +t /tmp），防止本地用户通过符号链接攻击覆盖任意文件。"
score = 7.2
severity = "HIGH"
sources = ["exploitdb"]
title = "Samba SWAT cgi.log 符号链接本地文件覆盖漏洞"
updated = "2026-06-16T21:52:48.227"

