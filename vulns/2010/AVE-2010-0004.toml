[basic]
description = "JoomlaWorks 开发的 Joomla! 组件 AllVideos (Jw_allVideos) 3.0 至 3.2 版本中的 includes/download.php 存在目录遍历漏洞。远程攻击者可通过向 file 参数传递经过特殊构造的 `./../.../` 序列绕过路径限制，实现任意文件读取。该漏洞允许未授权攻击者读取服务器上任意敏感文件（如配置文件、数据库凭据等），危害较大。CVSS 评分 5.0，属于中危漏洞，建议用户立即升级或停用受影响组件。"
published = "2010-02-23T18:30:00.717"
remediation = "升级 JoomlaWorks AllVideos 插件至 3.3 及以上版本，或在 Joomla 后台卸载该插件并更换为官方维护的替代插件。若无升级条件，可删除 `includes/download.php` 文件中的 `file` 参数处理逻辑，或在 Web 服务器层（如 .htaccess）限制 `download.php` 的直接访问。"
score = 5
severity = "MEDIUM"
sources = ["nuclei"]
title = "JoomlaWorks AllVideos Joomla 插件目录遍历漏洞"
updated = "2026-06-16T23:16:40.280"

