[basic]
description = "Elixir Tesla HTTP 客户端库的 Mint 适配器在 `Tesla.Adapter.Mint.open_conn/2` 函数中，将每个出站请求的 URL 协议方案直接传入 `String.to_atom/1` 转换为 BEAM 原子，且未进行任何白名单校验。由于 BEAM 原子永不回收且原子表上限约为 1,048,576 个条目，攻击者可通过向应用程序提交大量不同协议方案的恶意请求（或利用 FollowRedirects 中间件由攻击者控制的服务器返回新协议方案的 Location 头），每次请求创建一个永久原子，最终耗尽原子表导致 BEAM 虚拟机崩溃，造成拒绝服务。该漏洞影响 tesla 1.3.0 至 1.18.2 版本，CVSS 评分 8.2，危害等级高，已在 1.18.3 版本中修复。"
published = "2026-06-02T20:16:38.710"
remediation = '立即将 elixir-tesla/tesla 升级到 1.18.3 或更高版本（`mix.exs` 中 `{:tesla, "~> 1.18.3"}` 后执行 `mix deps.update tesla`）。如无法升级，在调用 `Tesla.get/2` 等函数前对用户输入的 URL 做 scheme 白名单校验（仅允许 `http`/`https`），并移除 `Tesla.Middleware.FollowRedirects` 中间件以防止重定向攻击。'
score = 8.2
severity = "HIGH"
sources = ["ghsa"]
title = "elixir-tesla tesla Mint适配器原子表耗尽拒绝服务漏洞"
updated = "2026-07-22T19:10:00.120"

