[basic]
description = "Cisco Resource Manager (CRM) 1.0 和 1.1 版本存在信息泄露漏洞。由于程序创建的日志文件及临时文件权限设置为全局可读，本地攻击者可利用该缺陷读取这些文件，从而获取用户ID、密码及SNMP团体字符串等敏感凭据信息。此漏洞影响CRM 1.0和1.1版本，攻击者需拥有本地系统访问权限，CVSS评分1.2，危害等级低。"
published = "1999-12-31T05:00:00.000"
remediation = "升级 Cisco Resource Manager 至 1.2 或更高版本以修复默认文件权限问题；对手动创建的日志目录和临时文件目录执行 chmod 600 或 640，仅允许 CRM 服务账户读写；通过文件系统 ACL 限制本地非授权用户访问 /var/log/crm 及临时目录；定期审计日志文件权限配置。"
score = 1.2
severity = "LOW"
sources = ["cve"]
title = "Cisco Resource Manager 信息泄露漏洞"
updated = "2026-06-16T21:49:35.067"

