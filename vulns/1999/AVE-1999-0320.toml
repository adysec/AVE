[basic]
description = "glibc 2.1.1 及之前版本中的 pt_chown 辅助程序被安装为 setuid root，本地普通用户可利用该程序在伪终端（PTY）设备上修改属主与权限，从而获取其他用户的控制终端访问权限，实现本地权限提升。攻击者需具备本地登录权限，通过精心构造的请求使 pt_chown 错误地将 TTY 设备归属到攻击者的 UID，进而读取或注入其他用户的终端会话内容。"
published = "1999-08-23"
remediation = "将系统 glibc 升级至 2.1.2 或更高版本，该版本已移除 pt_chown 的 setuid 权限，消除本地用户借由 pt_chown 篡改其他用户 TTY 设备进而提权的风险。如短期内无法升级，应立即执行 chmod u-s /usr/lib/pt_chown 去掉 setuid 位，或在确认无依赖后删除该二进制文件作为临时缓解措施。"
score = 4.6
severity = "MEDIUM"
sources = ["epss"]
title = "glibc pt_chown 权限提升漏洞"
updated = "2026-06-16"

