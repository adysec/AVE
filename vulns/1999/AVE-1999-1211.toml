[basic]
description = "ucbmail 在处理 INN (InterNetNews) 传递的输入时未对 shell 元字符进行过滤，存在命令注入漏洞。远程攻击者可通过构造包含 shell 元字符的恶意新闻组消息或邮件，经 INN 传递给 ucbmail 处理，从而在目标系统上以 ucbmail 进程权限执行任意命令。该漏洞影响配置了 ucbmail 并与 INN 交互的 Unix/Linux 系统，CVSS 评分 7.2，属高危漏洞。攻击无需身份认证，仅需能向 INN 发布消息的权限即可触发。"
published = "1997-02-20T05:00:00.000"
remediation = "升级 INN 至 1.5.1 版本，并从 ftp://ftp.isc.org/isc/inn/patches/security-patch.04 获取并应用安全补丁。如无法升级，根据当前版本（1.5/1.4sec/1.4unoff3/1.4unoff4）依次应用对应补丁（security-patch.01/02/03）后再应用 security-patch.04。安装后务必重启 INN 服务。同时检查 ucbmail 配置，确保 shell 元字符被正确过滤。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "BSD ucbmail 远程代码执行漏洞"
updated = "2026-06-16T21:49:13.473"

