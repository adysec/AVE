[basic]
description = "Kerberos 5 中的远程 shell 服务 krshd 存在缓冲区溢出漏洞，远程攻击者无需身份认证即可向目标系统发送特制的网络请求，触发缓冲区溢出，从而以 root 权限在目标系统上执行任意代码。该漏洞影响 Kerberos 5 相关部署环境，CVSS 评分 10.0，危害等级严重，攻击复杂度低且无需用户交互。"
published = "2000-05-16T04:00:00.000"
remediation = "立即升级 MIT Kerberos 5 至 1.2 及以上版本，该版本已修复 krshd 缓冲区溢出漏洞。Red Hat 用户应安装 RHSA-2000-025 提供的更新包。如无法升级，可在 inetd 配置中禁用 krshd 服务（注释掉 kshell 行）并重启 inetd，同时通过防火墙限制对 544 端口（krb5-shell）的访问。"
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "MIT Kerberos 5 krshd 远程缓冲区溢出漏洞"
updated = "2026-06-16T21:51:37.100"

