[basic]
description = "Adobe Reader 和 Acrobat 在处理 BMP/RLE 图像格式时存在整数溢出漏洞，攻击者可构造特制的 PDF 文档，诱导用户打开后触发堆损坏，导致远程代码执行。该漏洞影响 Adobe Reader/Acrobat 9.5.5 之前、10.1.7 之前及 11.0.03 之前的版本，无需用户交互即可触发，CVSS 评分 9.8，危害等级严重。该漏洞已被 CISA 列入已知被利用漏洞目录，建议用户立即升级至修复版本。"
published = "2013-05-16T11:45:31.263"
remediation = "升级 Adobe Reader/Acrobat 至 9.5.5、10.1.7 或 11.0.03 及以上版本（对应 APSB13-15 安全公告）。如无法立即升级，可在组策略中禁用 PDF 中 BMP/RLE 图像解析功能，或使用受信查看器（如 Chrome 内置 PDF 阅读器）替代 Adobe Reader 打开 PDF 文件作为临时缓解措施。"
score = 9.8
severity = "CRITICAL"
sources = ["kev"]
title = "Adobe Reader/Acrobat 整数溢出远程代码执行漏洞"
updated = "2026-06-16T23:53:52.700"

