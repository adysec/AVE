[basic]
description = "该漏洞存在于英特尔Express 500系列交换机的ICMP协议栈处理中，当设备接收到特制的畸形ICMP数据包时，会触发核心网络协议栈的异常处理，导致交换机系统内核中的CPU资源耗尽或完全崩溃，进而使整个设备无法正常工作。受影响的设备型号包括Intel Express Switch 2.63和2.64版本，攻击者无需任何身份验证即可远程发送这类畸形ICMP数据包，攻击过程非常隐蔽，一旦被利用，整个交换机设备将陷入瘫痪状态，导致所有连接到该交换机的终端设备失去网络连通性，严重影响企业网络的稳定性。该漏洞适用于大多数网络环境，只要存在运行Windows Server操作系统的英特尔Express 500系列交换机，即使是简单的网络攻击也能导致设备崩溃，无法提供任何网络服务，对企业的日常运营和网络安全构成严重威胁。微软和英特尔公司已发布安全公告，建议用户升级到最新固件版本以获取补丁修复。"
published = "2000-11-14T05:00:00.000"
remediation = "立即将 Intel Express 500 系列交换机固件升级至最新版本 3.0.x 或更高版本，这包含完整的 ICMP 包处理修复和 CPU Crash 保护机制。如需紧急修复，可通过命令行临时禁用交换机上的所有 ICMP 入战机制（使用全局命令 `no ip icmp rate-limit`），并在防火墙层面部署 ACL 拒绝包含畸形 ICMP 载荷的流量，直到正式升级完成。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Intel Express Switch ICMP包拒绝服务漏洞"
updated = "2026-06-16T21:52:39.990"

