[basic]
description = "Solaris 2.5 x86 系统中的 aspppd 守护进程（AppleTalk 会话协议点对点服务）以不安全的方式创建临时文件 /tmp/.asppp.fifo。本地低权限用户可利用符号链接（symlink）攻击，将该临时文件链接至系统中的任意文件，进而对目标文件进行任意修改，最终提权至 root 权限。该漏洞攻击条件简单，无需身份认证，攻击者仅需具备本地基本用户访问权限即可完成利用。受影响版本为运行在 x86 平台上的 Solaris 2.5 系统，CVSSv2 评分为 7.2，危害等级为高。Sun Microsystems 已通过安全补丁修复该问题，建议受影响用户尽快升级至修复版本。"
published = "1996-12-20"
remediation = "应用 Sun/Oracle 官方补丁：Solaris 2.5.1 x86 安装补丁 104222-08 或 105710-01，Solaris 2.5 x86 安装补丁 105710-01，补丁将修复 aspppd 创建 /tmp/.asppp.fifo 时以不安全权限（0666）开放的问题，使其改为 0600 权限并由 aspppd 进程自身在安全目录下创建，阻断符号链接攻击路径。同时升级至 Solaris 8 或更高版本以获得完整修复。作为临时缓解措施：关闭 PPP 服务后立即删除 /tmp/.asppp.fifo；在 aspppd 启动脚本中添加检查，若发现该文件为符号链接或存在异常则拒绝启动；通过文件系统挂载选项限制 /tmp 下 FIFO 文件的创建权限；在 /etc/rhosts 上设置严格访问控制，仅允许 root 读写。每次启动 aspppd 前执行 ls -l /tmp/.asppp.fifo 确认其为普通 FIFO 而非符号链接。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
