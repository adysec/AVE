[basic]
description = "WordPress Firebase Support & Chat Management 插件（版本 ≤ 3.1.1）中存在权限提升漏洞。该插件在 `firebase_auth()` 函数处理认证请求时，仅通过 `user_email` POST 参数获取邮箱地址即登录对应用户，但未验证 Firebase ID 令牌的签名、签发方和受众等关键信息，导致攻击者无需持有目标用户的 Firebase 身份凭证即可伪装认证。已认证的攻击者（拥有订阅者及以上权限）可向 `acb_firebase_auth` AJAX 接口提交任意已存在用户的邮箱地址，从而实现账户接管，包括管理员账户。CVSS 评分 8.8，危害等级高。"
published = "2026-05-27T07:16:15.060"
remediation = "立即升级 WordPress Firebase Support & Chat Management 插件至 3.1.1 以上版本。检查 `acb_firebase_auth` AJAX 函数中对 Firebase ID Token 的签名、颁发者、受众验证逻辑是否完整，确保 `user_email` 参数不可直接用于身份认证。如无法升级，临时禁用该 AJAX 动作或移除 `firebase_auth()` 函数中的邮箱直传逻辑作为缓解措施。"
score = 8.8
severity = "HIGH"
sources = ["hwpoc"]
title = "WordPress Firebase Support & Chat Management 插件权限提升漏洞"
updated = "2026-06-17T11:04:28.310"

