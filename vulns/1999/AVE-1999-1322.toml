[basic]
description = "IBM AIX 4.1.5 的 inetd 服务在启动 ToolTalk（ttdbserver）时动态分配端口 N，但同时会错误地在端口 N-1 上监听而不将控制权交给 ttdbserver。远程攻击者可向端口 N-1 发送大量连接请求，由于 inetd 无法正常关闭这些连接，导致系统资源耗尽进而引发拒绝服务。此漏洞影响 IBM AIX 4.1.5 版本，CVSS 评分 5.0，危害等级中等。"
published = "1998-03-18T05:00:00.000"
remediation = "建议安装 IBM inetd 补丁 IX70400（文件集 bos.net.tcp.client 4.1.5.12）修复该问题。如无法立即更新，可停止并禁用 ttdbserver（ToolTalk）服务来消除攻击面：执行 `stopsrc -s ttdbserver` 并注释 `/etc/inittab` 中的 ttdbserver 启动项。此外，可在防火墙或路由器上限制对 AIX 主机高端口（≥1024）的外部访问作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "IBM AIX 4.1.5 inetd ttdbserver 端口连接拒绝服务漏洞"
updated = "2026-06-16T21:49:40.153"

