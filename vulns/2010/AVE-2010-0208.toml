[basic]
description = "Microsoft Internet Explorer 的 Peer Objects 组件（iepeers.dll）中存在释放后使用（Use-After-Free）漏洞。远程攻击者可构造特制网页，诱使用户访问后触发对已删除对象的无效指针访问，进而实现远程代码执行。该漏洞影响 IE 6、6 SP1 及 IE 7 版本，CVSS 评分 8.8，危害等级高危。微软已于 MS10-018 安全公告中发布修复补丁，且该漏洞在 2010 年 3 月已被在野利用。"
published = "2010-03-10T22:30:01.323"
remediation = "立即安装 Microsoft 2010 年 4 月安全公告 MS10-018 (KB980182) 补丁，或通过 Windows Update 自动更新。对于无法立即打补丁的系统，可配置 Internet Explorer 将 Internet 区域安全级别设为「高」以禁用 ActiveX 控件和 Active Scripting，或使用 EMET 工具缓解利用风险。"
score = 8.8
severity = "HIGH"
sources = ["kev"]
title = "Microsoft Internet Explorer Peer Objects 组件释放后使用漏洞"
updated = "2026-06-16T23:16:52.753"

