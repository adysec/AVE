[basic]
description = 'Atrium Mercur Mail Server 3.2 存在目录遍历漏洞，本地攻击者可通过在邮件操作路径中插入"../"目录跳转序列，突破文件访问限制，越权读取其他用户的电子邮件内容，并可在服务器任意目录创建恶意文件。该漏洞源于程序未对用户输入的文件路径进行充分过滤与规范化处理，影响邮件数据机密性与系统完整性。攻击者需具有服务器本地访问权限才能触发。CVSS v2.0 评分为 7.5，危害等级高。'
published = "2000-04-21T04:00:00.000"
remediation = 'Atrium Technologies 已停止运营，Mercur Mail Server 已无官方补丁。建议立即迁移至仍受支持的邮件服务器（如 hMailServer、MailEnable 或 Postfix/Dovecot）。如无法立即迁移，可将服务运行于低权限账户下，禁止非授信用户本地登录，对邮件存储目录（默认 C:\Program Files\Mercur\Mail\）设置严格的 NTFS ACL 权限，防止路径遍历。'
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "Atrium Mercur Mail Server 目录遍历漏洞"
updated = "2026-06-16T21:51:27.977"

