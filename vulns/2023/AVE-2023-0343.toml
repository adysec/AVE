[basic]
description = "Linux 内核 netfilter 子系统中 nf_ct_find_expectation() 函数存在释放后使用漏洞。当该函数调用时会从哈希表中移除连接追踪期望条目，但在 OVS（Open vSwitch）和 TC（流量控制）等场景中，新创建连接追踪条目可能未被确认，导致已释放的期望条目被再次访问，从而触发释放后使用。本地攻击者可利用此漏洞导致系统崩溃或权限提升，影响多个 Linux 内核版本，CVSS 评分 7.8，危害等级高危。"
published = "2025-03-14T15:15:39.253"
remediation = "立即将 Linux 内核升级至 6.1.130 或更高版本（稳定分支）或 6.6 及以上版本，对应修复 commit 为 4914109a8e1e。Debian 11 用户请安装 2025 年 5 月 LTS 安全更新。Siemens SIMATIC S7-1500 MFP 用户请参考西门子安全公告 SSA-019113/SSA-082556 升级固件。无法立即更新的场景可考虑禁用 OVS/TC conntrack 相关功能作为临时缓解措施。"
score = 7.8
severity = "HIGH"
sources = ["msrc"]
title = "Linux Kernel netfilter 释放后使用漏洞"
updated = "2026-07-14T13:17:05.277"

