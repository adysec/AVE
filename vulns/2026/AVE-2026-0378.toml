[basic]
description = "YesWiki Wiki 系统的 Bazar 表单字段计算器 (CalcField.php) 存在不安全的 eval() 代码执行漏洞。该漏洞存在于 formatValuesBeforeSave() 方法中，应用尝试通过复杂的递归正则表达式验证用户定义的数学公式后再传递给 PHP eval() 函数执行。该实现存在两大架构缺陷：一是递归正则表达式 (?1)+ 依赖 PCRE 栈处理深层嵌套，攻击者可构造数千层嵌套括号的数学公式触发 PCRE 栈溢出或 ReDoS，导致 PHP-FPM 工作进程崩溃造成拒绝服务；二是验证逻辑在 tokenization 重组后才对 $formula 进行正则校验，若底层 tokenization 函数泄露意外字符串格式，或攻击者利用 PCRE 引擎边缘情况绕过正则，恶意 PHP 代码将直接经由 eval() 执行，导致远程代码执行（RCE），攻击者可获取 Web 服务器权限（如 www-data）实现完全主机沦陷。影响范围：YesWiki 4.6.6 之前版本，影响文件 tools/bazar/fields/CalcField.php。攻击条件：攻击者需具备创建或编辑 Bazar 表单并添加 Calc 字段的权限（通常为认证用户或开放注册场景）。利用方式：1) DoS：提交形如 `((((...(1+1))...)))` 含数千层嵌套括号的公式触发 PCRE 栈溢出崩溃 PHP 进程；2) RCE：若正则校验被绕过，提交 `abs(1) + system('id')` 等 PHP 代码片段经 eval() 执行实现任意命令执行。CVSS 3.1 评分 9.8 (CRITICAL)，影响机密性/完整性/可用性均为 HIGH。YesWiki 4.6.6 版本已修复，建议升级并替换 eval() 为安全的 AST 数学表达式解析器。"
published = "2026-06-08T19:16:46.683"
remediation = "立即升级 YesWiki 至 4.6.6 或更高版本，该版本已移除 CalcField.php 中通过 eval() 执行用户公式的不安全逻辑，改用专用数学表达式解析器。如暂无法升级，可临时在 Bazar 表单配置中禁用 Calc 计算字段，并严格限制具备表单创建/编辑权限的用户范围，同时检查 Web 服务器日志中是否存在异常嵌套括号或 PHP 代码注入痕迹。"
score = 9.8
severity = "CRITICAL"
sources = ["ghsa"]
title = "YesWiki YesWiki Bazar表单计算器 不安全eval() 远程代码执行和拒绝服务漏洞"
