[basic]
description = "Microsoft Internet Explorer 5.5 和 5.01 存在安全区域欺骗漏洞，远程攻击者可通过包含无点 IP 地址的畸形 URL 绕过安全限制，欺骗 Internet Explorer 将页面处理为 Intranet 区域（内部网络区域），该区域安全限制较低，从而绕过安全限制执行恶意代码。该漏洞影响 IE 5.5 和 5.01 版本，CVSS 评分 7.5，属高危漏洞。攻击者无需身份认证即可远程利用，只需诱导用户访问包含畸形 URL 的恶意页面即可触发漏洞。Microsoft 已发布 MS01-055 安全公告修复此漏洞。"
published = "2001-10-30T05:00:00.000"
remediation = '建议立即升级至 Internet Explorer 6.0 并安装 Microsoft 安全公告 MS01-055 (KB313675) 补丁。若无法升级，可在 IE 安全设置中将"本地 Intranet 区域"安全级别设为"高"，并取消勾选"自动检测 Intranet 网络"作为临时缓解措施。强烈建议升级至现代浏览器（Edge/Chrome/Firefox）彻底规避该漏洞。'
score = 7.5
severity = "HIGH"
sources = ["exploitdb"]
title = "Microsoft Internet Explorer 5 安全区域欺骗漏洞"
updated = "2026-06-16T21:54:42.737"

