[basic]
description = "Make-a-Store OrderPage 购物车应用程序存在设计缺陷，远程攻击者可通过修改网页中隐藏表单字段（hidden form fields）来篡改订单中的敏感购买信息，如商品价格、数量等。该漏洞无需身份认证即可利用，攻击方式简单，可导致未授权修改订单数据，影响购物车应用的数据完整性与安全性。"
published = "2000-02-01T05:00:00.000"
remediation = "立即停止使用隐藏表单域存储价格等敏感交易数据，改为在服务端会话中维护购物车金额与商品信息。对 Make-a-Store OrderPage 所有表单提交进行服务端价格校验，并在 Web 服务器配置中禁用客户端提交价格/数量等关键字段的覆盖能力。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "Make-a-Store OrderPage购物车应用程序敏感信息修改漏洞"
updated = "2026-06-16T21:51:00.167"

