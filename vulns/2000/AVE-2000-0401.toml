[basic]
description = "AOL Instant Messenger（AIM）文件传输组件存在路径信息泄露漏洞。当用户通过 AIM 传输文件时，接收方能够获取发送方文件在本地文件系统中的完整物理路径，导致用户隐私信息泄露。攻击者无需特殊权限，仅需诱导目标发送文件即可获取该信息，影响使用 AIM 的广大用户群体。"
published = "2000-05-08T04:00:00.000"
remediation = "建议立即升级 AOL Instant Messenger 至 4.0 及以上版本，该版本修复了文件传输路径泄露问题。由于 AOL Instant Messenger 已于 2017 年 12 月正式停止服务，建议彻底弃用 AIM，迁移至 Signal、Telegram 等支持端到端加密且仍在维护的即时通讯软件。若因遗留系统仍需使用，应在传输文件前手动移除文件路径元数据，并避免通过 AIM 传输敏感文件。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "AOL Instant Messenger 文件传输路径泄露漏洞"
updated = "2026-06-16T21:51:36.130"

