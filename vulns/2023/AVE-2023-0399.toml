[basic]
title = "Linux Kernel btrfs 文件系统 __extent_writepage 错误处理逻辑缺陷漏洞"
description = "Linux 内核 btrfs 文件系统驱动中的 __extent_writepage 函数存在错误处理逻辑缺陷。该函数在发生 I/O 错误时设置 PageError 标记位，同时又检查该标记位来决定是否调用错误处理逻辑，导致错误处理职责不清晰。在通用写回机制中，I/O 提交后错误处理责任应委托给结束 I/O 处理程序，但如果结束 I/O 处理程序设置 PageError 位而提交者检查该位，位可能在高速 I/O 场景下泄漏到提交上下文，引发内存状态不一致。本地攻击者可通过触发特定的 btrfs 文件系统 I/O 操作利用此漏洞，可能导致系统崩溃或信息泄露。"
severity = "MEDIUM"
score = 5.5
sources = ["cve"]
published = "2025-09-18"
updated = "2026-06-17"
remediation = "升级 Linux 内核至 6.4.7 或更高版本，或 cherry-pick 提交 3e92499e3b004baffb479d61e191b41b604ece9a 和 d40be032ecd8ee1ca033bee43c7755d21fb4d72a 应用补丁修复 btrfs __extent_writepage 中错误处理竞争条件问题。如无法及时升级，可考虑在生产环境避免对 btrfs 文件系统的高并发写入操作作为临时缓解措施。"
