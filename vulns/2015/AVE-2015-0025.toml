[basic]
description = "Ruby on Rails Web Console（web-console）组件在 2.1.3 之前版本中存在访问控制绕过漏洞。该组件在处理客户端 IP 地址时未正确限制 X-Forwarded-For 请求头的使用，远程攻击者可通过构造特制的 HTTP 请求伪造 IP 地址，从而绕过 whitelisted_ips 白名单 IP 保护机制，在未经授权的情况下访问 Web Console 交互式控制台界面。成功利用后，攻击者可在 Rails 应用上下文中执行任意 Ruby 代码，导致敏感信息泄露或服务器被完全控制。攻击无需身份认证，但需要目标启用 Web Console 且攻击者能构造包含恶意 X-Forwarded-For 头的 HTTP 请求。"
published = "2015-07-26T22:59:03.023"
remediation = "将 web-console gem 升级至 2.1.3 或更高版本：在 Gemfile 中指定 `gem 'web-console', '>= 2.1.3'`，然后执行 `bundle update web-console` 并重启 Rails 应用。如无法立即升级，可在生产环境配置 `config.consider_all_requests_local = false` 禁用 Web Console，或通过反向代理/Nginx 规则限制对 `/console` 路径的外部来源访问。"
score = 4.3
severity = "MEDIUM"
sources = ["nuclei"]
title = "Ruby on Rails Web Console 白名单绕过漏洞"
updated = "2026-06-17T00:25:34.343"

