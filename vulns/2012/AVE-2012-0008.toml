[basic]
description = "WordPress 的 Mapplic 及 Mapplic Lite 插件存在服务端请求伪造（SSRF）漏洞，受影响版本分别为 6.1 及 1.0 及以下。未经认证的攻击者可利用该漏洞伪造来自目标服务器的请求，在请求 SVG 文件时进一步触发跨站脚本攻击（XSS），危害站点数据安全。CVSS 评分 8.3，危害等级高。"
published = "2024-10-16T07:15:03.920"
remediation = "立即将 Mapplic 插件升级到 6.2 或更高版本，Mapplic Lite 升级到 1.0.1 或更高版本。补丁已合并至 WordPress 插件仓库（changeset 2503447），可在插件后台直接更新。如无法立即升级，在服务器防火墙或 WAF 层面限制插件对外部域名的 HTTP 请求，并禁止直接访问 SVG 文件，作为临时缓解措施。"
score = 8.3
severity = "HIGH"
sources = ["nuclei"]
title = "WordPress Mapplic 插件服务器端请求伪造漏洞"
updated = "2026-06-16T23:38:40.810"

