[basic]
description = "GNU make 在处理从标准输入读取的 Makefile 时，会跟随符号链接（symlink）而非读取实际文件内容，本地攻击者可通过创建恶意的符号链接指向其他用户的 Makefile，诱使目标用户在受影响目录下运行 make 命令，从而以目标用户权限执行任意命令。该漏洞影响 GNU make 各版本，CVSS 评分 6.2，危害等级中危。"
published = "2000-02-01T05:00:00.000"
remediation = "升级 GNU make 至 3.79 及以上版本（3.78.1 及更早版本受影响），该版本已修复从 stdin 读取 Makefile 时错误跟随符号链接的问题。如无法立即升级，应避免在多用户共享目录中使用 `make -f-` 或类似从标准输入读取 Makefile 的方式，并确保 Makefile 所在目录的写入权限仅限受信任用户，以防止本地攻击者通过符号链接劫持 Makefile 执行任意命令。"
score = 6.2
severity = "MEDIUM"
sources = ["avd"]
title = "GNU make 符号链接漏洞"
updated = "2026-06-16T21:51:06.407"

