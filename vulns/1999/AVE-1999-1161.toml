[basic]
description = "Macromedia Shockwave 7 的自动更新功能存在信息泄露漏洞，自动更新过程中会将用户的密码和硬盘信息以明文方式传输至 Macromedia 服务器，攻击者可通过网络嗅探或中间人攻击截获这些敏感数据。此漏洞影响所有安装 Shockwave 7 的系统，由于自动更新默认开启，用户在不知情的情况下即可能泄露凭证与系统信息。CVSS 评分 5.0，危害等级中危。"
published = "1999-03-11T05:00:00.000"
remediation = "建议立即升级至 Adobe Shockwave Player 11.6 以上版本或卸载不再使用的 Shockwave 组件。在 Macromedia Shockwave 7 中，禁用自动更新功能（通过注册表或程序设置关闭 AutoUpdate 选项），并在防火墙规则中阻止 Shockwave 对外连接。鉴于该产品已停止维护，强烈建议迁移至 HTML5 等现代 Web 标准替代方案。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Macromedia Shockwave 自动更新功能信息泄露漏洞"
updated = "2026-06-16T21:50:37.780"

