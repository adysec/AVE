[basic]
description = "Linux 系统下的 mirror 2.8.x 版本存在路径遍历漏洞。远程攻击者可通过构造特制的文件名或目录名，利用 mirror 工具在处理镜像下载时未对目标路径进行充分校验的缺陷，将文件写入到本地目标目录的上一级目录中，实现目录跳转。该漏洞可导致攻击者在目标系统上任意位置创建文件，进而可能结合其他漏洞实现权限提升或执行恶意代码。攻击者无需身份认证即可通过网络远程触发，危害等级中危。"
published = "2000-09-28T04:00:00.000"
remediation = "升级 mirror 至 2.9 或更高版本（2.9 已修复目录遍历问题）。Debian 用户可通过 apt-get install mirror 更新；如不再需要 mirror 功能，建议迁移至 wget 或 rsync 替代。若无法升级，可在 mirror 配置中限制目标目录权限，确保运行 mirror 的用户无上级目录写入权限。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Linux Mirror 目录遍历文件创建漏洞"
updated = "2026-06-16T21:51:32.570"

