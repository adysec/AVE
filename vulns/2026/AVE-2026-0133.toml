[basic]
description = "深信服运维安全管理系统存在远程代码执行漏洞，该漏洞源于 save_SNMP 功能对用户输入校验不严，未经身份认证的远程攻击者可通过向系统发送特制的 HTTP 请求触发该漏洞，成功利用可在目标系统上以服务权限执行任意代码。影响凡赛科技运维安全管理系统 3.0.12 之前版本。建议用户升级至 >= 3.0.12 版本修复此漏洞。"
published = "nday"
remediation = "建议立即升级深信服运维安全管理系统至 3.0.12 或更高版本，该漏洞在 SNMP 配置模块存在输入验证缺陷，新版本已修复此问题。临时缓解措施可限制对系统管理端口的 SNMP 相关接口访问，配置防火墙只允许可信 IP 连接。"
score = 5
