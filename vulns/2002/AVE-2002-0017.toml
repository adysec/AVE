[basic]
description = "Perl 的 Digest-MD5 模块在与 Perl 解释器交互处理 UTF-8 编码数据时存在摘要计算缺陷，导致生成的 MD5 校验和与预期值不一致。攻击者可能利用此漏洞绕过数据完整性校验机制，影响依赖 MD5 摘要进行数据验证的系统。该漏洞 CVSS 评分 7.5，危害等级高，影响使用 Perl Digest-MD5 模块处理 UTF-8 数据的应用场景。"
published = "2002-07-26T04:00:00.000"
remediation = "立即升级 perl-Digest-MD5 模块至修复版本：Red Hat 用户安装 RHSA-2002:081 提供的更新包，Mandrake 用户安装 MDKSA-2002:035 更新。如无法升级，避免在涉及 UTF-8 数据的场景中使用 Digest::MD5 模块进行完整性校验，改用 SHA 系列算法替代。"
score = 7.5
severity = "HIGH"
sources = ["osv"]
title = "Perl Digest-MD5 UTF-8 摘要计算错误漏洞"
updated = "2026-06-16T21:57:58.550"

