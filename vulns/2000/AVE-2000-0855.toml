[basic]
description = "OpenSSL 0.9.6 之前版本中 crypto/rsa/rsa_gen.c 文件存在 RSA 密钥生成缺陷，在处理超过表达式大小的 C 语言位运算移位操作时发生错误，导致在 64 位 HP-UX 平台上生成的 RSA 密钥强度不足。远程攻击者可利用此漏洞更容易地破解加密保护机制，获取敏感信息。该漏洞影响所有使用受影响 OpenSSL 版本的系统，攻击者无需身份认证即可通过网络远程利用，危害较大。"
published = "2016-05-05T01:59:00.137"
remediation = "升级 OpenSSL 至 0.9.6 或更高版本。如无法升级，在 64 位 HP-UX 平台上避免使用 RSA 密钥生成功能，或改用其他加密库（如 LibreSSL）替代。同时限制对受影响服务的网络访问，仅允许可信来源连接。"
score = 7.5
severity = "HIGH"
sources = ["redhat"]
title = "OpenSSL RSA密钥生成弱漏洞"
updated = "2026-06-16T21:53:27.853"

