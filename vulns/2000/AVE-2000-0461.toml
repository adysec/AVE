[basic]
description = "Windows 2000 Server 在处理 TCP 和 UDP 端口流量时存在拒绝服务漏洞。远程攻击者无需认证即可向目标系统的大范围端口持续发送大量二进制零数据包，导致系统 CPU 占用率急剧升高，造成拒绝服务。该漏洞影响 Windows 2000 Server 系列版本，攻击条件简单，无需特殊权限即可实施。"
published = "2000-06-30"
remediation = "Windows 2000 已于 2010 年停止支持，微软未发布官方补丁。建议升级到受支持的 Windows Server 版本（如 Windows Server 2019/2022）；若无法升级，可在防火墙或边界路由器上限制对目标 TCP/UDP 端口的非授权访问，并启用 TCP 半连接限制以缓解洪水攻击。"
score = 5.0
severity = "MEDIUM"
sources = ["cve"]
title = "Microsoft Windows 2000 Server 端口洪水拒绝服务漏洞"
updated = "2026-06-16"

