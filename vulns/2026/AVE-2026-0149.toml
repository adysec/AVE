[basic]
description = "Crawl4AI 是一款 AI 驱动的网络爬虫框架，其 Docker API 端点存在远程代码执行漏洞。攻击者无需认证即可通过构造恶意请求发送至 Docker API 接口，利用该漏洞在容器内执行任意命令，完全控制目标服务。该漏洞影响 Crawl4AI 0.8.0 之前的所有版本，危害严重，建议升级至 0.8.0 及以上版本修复。"
published = "nday"
remediation = "立即升级 Crawl4AI 至最新版本（v0.8.7 及以上），执行 `pip install -U crawl4ai` 更新 Python 包；Docker 部署用户执行 `docker pull unclecode/crawl4ai:latest` 拉取最新镜像。如使用 Docker API，须在环境变量中设置强 JWT 密钥（`CRAWL4AI_JWT_SECRET`）并启用认证；同时设置 `CRAWL4AI_HOOKS_ENABLED=false` 禁用 hooks 功能，在防火墙层面限制 API 端口仅对可信 IP 开放，阻止未授权外部访问。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "Crawl4AI Docker API 远程代码执行漏洞"
updated = "nday"

