[basic]
description = "LibTIFF 4.7.0及之前版本中的 fax2ps 组件存在空指针解引用漏洞。漏洞位于 tools/tiff2pdf.c 文件的 t2p_read_tiff_init 函数中，攻击者需本地向目标系统提交特制的 TIFF 文件触发该漏洞，导致程序崩溃拒绝服务。攻击复杂度较高，利用难度较大。官方已发布补丁修复此问题。"
published = "2025-08-01T22:15:25.320"
remediation = "立即升级 LibTIFF 至 4.7.1 或更高版本，该版本已合入提交 2ebfffb0 的修复。如无法升级，可手动应用该补丁：在 tools/tiff2pdf.c 中增加对 TIFFTAG_TILELENGTH 和 TIFFTAG_TILEWIDTH 的合法性校验。临时缓解措施为避免使用 fax2ps 处理不可信的 TIFF 文件。"
score = 2
severity = "LOW"
sources = ["msrc"]
title = "LibTIFF tiff2pdf 空指针解引用漏洞"
updated = "2026-06-17T07:03:05.580"

