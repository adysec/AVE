[basic]
description = "Microsoft Access 97 存在数据库密码明文泄露漏洞。当用户在 Access 97 中创建链接表（Link Table）指向外部 MDB 数据库文件时，该外部数据库的访问密码会被以明文形式存储在当前的 .mdb 数据库文件中。攻击者若能获取到目标用户的 Access 97 数据库文件，即可通过直接读取或使用文本编辑器查看文件内容，提取出外部数据库的明文密码，从而获得对外部数据库的未授权访问权限。该漏洞影响 Microsoft Access 97 所有版本，攻击难度低，无需特殊权限即可利用。"
published = "1999-01-01T05:00:00.000"
remediation = "建议升级至 Microsoft Access 2000 或更高版本（如 Office 2000 及后续版本），这些版本不再以明文存储数据库密码。对于遗留系统，避免在共享 MDB 文件中使用数据库级密码，改用用户级安全机制（User-Level Security）或使用工作组信息文件（WID）进行访问控制作为临时缓解措施。"
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "Microsoft Access 97 数据库密码明文存储漏洞"
updated = "2026-06-16T21:48:14.247"

