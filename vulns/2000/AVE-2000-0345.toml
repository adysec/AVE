[basic]
description = "George Burgyan CGI Counter 4.0.2 及 4.0.7 版本存在输入验证漏洞，远程攻击者可通过向 CGI 程序提交包含 shell 元字符的特制请求，触发命令注入，从而在目标服务器上执行任意命令。该漏洞源于程序未对用户输入进行充分过滤，攻击者无需身份认证即可利用，CVSS 评分 7.5，危害等级高。"
published = "2000-05-15T04:00:00.000"
remediation = "该 CGI Counter 程序已停止维护且无安全更新，建议立即从 Web 服务器移除 cgicounter.cgi 脚本或将其执行权限取消。若仍需使用，需在脚本中对用户输入参数进行严格过滤，禁止 shell 元字符（如 ; | & ` $ 等）传入，或改用非 CGI 替代方案。"
score = 7.5
severity = "HIGH"
sources = ["exploitdb"]
title = "George Burgyan CGI Counter 远程命令执行漏洞"
updated = "2026-06-16T21:51:42.193"

