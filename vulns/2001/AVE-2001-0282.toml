[basic]
description = "Windows NT/2000 Terminal Server Service中存在漏洞，攻击者可远程发送无效的RDP（远程桌面协议）数据包，触发协议解析错误导致系统拒绝服务，影响 Windows NT/2000 操作系统。攻击者无需身份验证即可远程实施攻击，攻击复杂度低，可能导致系统服务不可用。漏洞影响Windows NT/2000 操作系统版本，CVSS评分5.3，危害等级中度。目前已知存在多个PoC工具，可用于测试该漏洞。"
published = "2001-12-06T05:00:00.000"
remediation = "紧急安装 Windows XP/2003 安全更新包，包括 KB825119 及后续 RDP 服务补丁，建议通过 Windows Update 自动更新。如需立即缓解，可通过防火墙禁用 3389 端口并启用网络级别 RDP 速率限制。配置策略：限制 RDP 连接数和会话超时时间至默认值 10 分钟。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Microsoft Windows NT/2000 Terminal Server RDP 拒绝服务漏洞"
updated = "2026-06-16T21:54:42.630"

