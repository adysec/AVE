[basic]
description = "kosch suid wrapper 1.1.1 版本的 su-wrapper 程序存在本地缓冲区溢出漏洞，由于对第一个命令行参数长度缺乏边界检查，本地攻击者可传入超长参数导致栈缓冲区溢出，覆盖返回地址并执行任意 Shellcode，从而以 su-wrapper 的特权（通常为 root）执行任意代码。该漏洞影响 kosch suid wrapper 1.1.1 版本，攻击条件为已获得本地普通用户权限，利用方式为构造超长参数触发溢出实现权限提升，CVSS 评分 4.6（AV:L/AC:L/Au:N/C:P/I:P/A:P），属于本地权限提升类漏洞。"
published = "2001-10-18T04:00:00.000"
remediation = "建议立即卸载或升级 kosch suid wrapper 1.1.1 至最新版本（建议迁移至 sudo 等现代 sudo 替代品），或使用 chmod u-s /usr/bin/su-wrapper 移除 suid 位禁用该程序的 setuid 权限作为临时缓解。若必须保留，请启用内核栈保护（/proc/sys/kernel/stack_guard_page=1）并开启 ASLR（echo 2 > /proc/sys/kernel/randomize_va_space）缓解缓冲区溢出利用，同时限制该程序仅允许特定用户组执行（chmod 750 /usr/bin/su-wrapper && chgrp wheel /usr/bin/su-wrapper）。建议优先迁移至维护中的 sudo 或 doas 替代该老旧 suid wrapper。"
score = 4.6
severity = "MEDIUM"
sources = ["exploitdb"]
title = "kosch suid wrapper 1.1.1 本地缓冲区溢出漏洞"
updated = "2026-06-16T21:54:54.610"

