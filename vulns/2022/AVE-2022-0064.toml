[basic]
description = "Linux 内核 ice 网卡驱动在处理虚拟功能（VF）重置时存在内存破坏漏洞。当 VF 请求复位时其 RX/TX 队列仍处于启用状态，而 PF 驱动误认为 VF 已禁用，导致 VF 提前释放 DMA 资源。此时设备仍可将数据包映射到已释放内存，造成静默内存损坏，最终可能触发内核崩溃或权限提升。攻击者可通过物理功能（PF）触发 VF 重置操作利用此漏洞，影响使用 Intel ice 系列网卡且启用 SR-IOV 的 Linux 系统，CVSS 评分 7.8，危害等级高。"
published = "2025-02-26T07:01:47.887"
remediation = "升级 Linux 内核到 5.18.6 及以上版本（包含修复 commit 1bb8253b1dd44c / efe41860008e57f）。使用发行版内核的用户请安装对应厂商安全更新：RHEL/CentOS 8 更新 kernel 到含补丁版本，Ubuntu 更新 linux-image 到最新。如无法升级内核，可在 BIOS 层面临时禁用 SR-IOV 或不在 PF/VF 间动态重置 VF 作为缓解措施。"
score = 7.8
severity = "HIGH"
sources = ["msrc"]
title = "Linux 内核 Intel ice 网卡 VF 驱动内存损坏漏洞"
updated = "2026-06-17T05:18:58.070"

