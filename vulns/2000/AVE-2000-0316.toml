[basic]
description = "Gossamer Threads DBMan 2.0.4 的 db.cgi CGI 脚本存在信息泄露漏洞。远程攻击者通过在 db 参数中引用一个不存在的数据库文件，即可触发 CGI 错误消息，该错误消息会将环境变量与系统配置信息（包括本地文档根目录路径、服务器管理员账户名、Web 服务器软件类型及操作系统平台等敏感数据）泄露给未授权用户。该漏洞利用无需身份认证，攻击者可远程发起探测，影响所有以默认配置运行 DBMan 2.0.4 的 Web 服务器，CVSS v2 评分为 6.4。"
published = "2000-05-05T04:00:00.000"
remediation = "立即升级 DBMan 至厂商发布的最新安全版本或官方补丁。如暂时无法升级，应在 Web 服务器配置中限制对 db.cgi 脚本的访问权限，仅允许受信任的 IP 地址调用，并在脚本入口处对 db 参数进行严格校验，拒绝非预期值。同时移除或修改 CGI 脚本中泄露环境变量的调试输出逻辑，可在 .htaccess 中配置认证访问或直接禁用该 CGI 脚本。"
score = 6.4
severity = "MEDIUM"
sources = [
    "cve",
    "exploitdb",
]
