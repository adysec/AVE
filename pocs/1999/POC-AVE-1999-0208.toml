[info]
author = "AVE"
description = "检测 Internet Explorer 5.0 MSHTML.DLL 不可信脚本粘贴漏洞 - 通过构造包含文件上传控件的恶意 HTML 页面，验证目标是否允许脚本化设置文件输入控件的值，从而强制上传本地文件"
id = "POC-AVE-1999-0208"
name = "CVE-1999-0489 PoC"
severity = "medium"
tags = [
    "cve-1999-0489",
    "ie",
    "microsoft",
    "mshtml",
]
vuln_id = [
    "CVE-1999-0489",
    "AVE-1999-0208",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["MSHTML.DLL"]
