[basic]
description = "TenFour TFS Gateway SMTP 邮件服务器 3.2 版本存在缓冲区溢出漏洞，攻击者通过向 SMTP 服务的 MAIL FROM 字段发送超过 128 字节的畸形数据，可触发栈缓冲区溢出，导致邮件服务崩溃或执行任意代码。该漏洞无需身份认证即可利用，影响运行 TFS Gateway 的系统，CVSS 评分 7.5，危害等级高。厂商尚未发布官方补丁。"
published = "1999-09-02T04:00:00.000"
remediation = "升级 TenFour TFS SMTP 至 4.0 或更高版本，该版本已修复 MAIL FROM 字段超 128 字节导致的缓冲区溢出漏洞。如无法立即升级，可在防火墙或边界设备上限制对 SMTP 端口 25 的访问，仅允许可信 IP 连接，并配置 TFS 启用域名验证以防止被用于垃圾邮件中继。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "TenFour TFS Gateway SMTP 缓冲区溢出远程代码执行漏洞"
updated = "2026-06-16T21:50:36.473"

