[basic]
description = "Adobe ColdFusion 存在访问控制不当漏洞（CVE-2024-20767，对应 APSB24-14）。受影响版本包括 ColdFusion 2023.6、2021.12 及更早版本。攻击者可利用此漏洞访问或修改受限制的文件系统，绕过访问控制机制实现任意文件读取或写入。攻击者无需用户交互即可实施攻击，但要求目标系统上部署的 ColdFusion 管理面板可通过互联网访问。该漏洞严重威胁企业系统数据安全，可能导致敏感信息泄露和系统安全破坏。"
published = "2024-03-18"
remediation = "建议立即升级到 Adobe 发布的安全更新版本：ColdFusion 2023 Update 7（2023.7）或 ColdFusion 2021 Update 13（2021.13），通过管理控制台「服务器更新」安装 APSB24-14 补丁。如无法立即升级，应通过防火墙限制对 /CFIDE/ 及管理控制台的访问，仅允许受信任 IP 访问，并禁用不必要的管理员 API 接口。"
score = 7.4
severity = "HIGH"
sources = ["hwpoc"]
title = "Adobe ColdFusion 访问控制不当导致任意文件读取漏洞"
updated = "2026-07-17"

