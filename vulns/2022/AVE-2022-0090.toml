[basic]
description = "Linux 内核 n_gsm 驱动（GSM 0710 终端多路复用器）在传出数据路径中存在自旋锁死锁与链路饥饿漏洞（CWE-667）。当线路规程（ldisc）发生拥塞时，上层控制包和数据包的发送处理在同一代码路径中耦合执行，导致自旋锁递归占用和死锁，同时数据通道的高负载会使控制通道因得不到调度而超时断链。本地攻击者可通过向 GSM TTY 设备写入大量数据触发此条件，造成系统拒绝服务。该漏洞影响 Linux 内核 5.18-rc2 及之前版本，CVSS 评分 5.5，危害等级中等。"
published = "2025-06-18T11:15:41.257"
remediation = "升级 Linux 内核至 5.19 或更高版本，该版本包含对 n_gsm 驱动中传出数据路径死锁与链路饥饿问题的修复。若无法立即升级，可在不需要 GSM 0710 多路复用功能的系统上禁用 n_gsm 模块（通过 blacklist n_gsm），并避免在串口设备上启用 GSMTTY 线路规程作为临时缓解措施。"
score = 5.5
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux Kernel TTY N_GSM 传出数据路径死锁与链接饥饿漏洞"
updated = "2026-06-17T05:22:47.553"

