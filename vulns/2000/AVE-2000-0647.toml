[basic]
description = "tags.<value>LPPlus 3.2.2 和 3.3 版本的 dccscan setuid 程序存在权限检查缺陷，未正确验证调用用户是否拥有打印指定文件的权限。本地攻击者无需身份认证即可通过指定任意文件路径给 dccscan，利用其 setuid 特权读取并打印系统敏感文件，造成信息泄露。该漏洞影响 LPPlus 3.2.2 及 3.3 版本，攻击条件为本地访问、低复杂度、无需认证。"
published = "2000-11-14T05:00:00.000"
remediation = "移除 LPPlus 打印系统中 dccscan 程序的 setuid 权限位，执行命令 chmod u-s $LPHOME/bin/dccscan 使该程序以普通用户权限运行，阻止root级别文件访问。立即升级至现代打印服务系统如 CUPS，彻底取代已停止维护的 LPPlus 版本。如短期内无法迁移系统，应在 /etc/passwd 和 /etc/group 中限制 dccscan 可被执行用户的范围，仅允许授权的打印操作组使用该程序。"
score = 2.1
severity = "LOW"
sources = ["cve"]
title = "LPPlus LPPlus 3.2.2/3.3 dccscan 未授权文件读取漏洞"
updated = "2026-06-16T21:52:39.873"

