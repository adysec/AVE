[basic]
description = "Axent NetProwler 3.0 存在拒绝服务漏洞，远程攻击者可通过向运行 NetProwler 的监控系统发送特制的畸形 IP 数据包，触发其中间人攻击检测签名处理逻辑异常，导致 NetProwler 服务崩溃或停止响应，从而丧失入侵检测能力。该漏洞无需认证即可远程触发，影响 NetProwler 3.0 版本。"
published = "2000-05-18T04:00:00.000"
remediation = "Axent NetProwler 3.0 已停止维护，官方未发布补丁。建议在边界防火墙上配置 ACL 规则，丢弃源 IP 非内网的畸形 IP 报文，同时升级至 Symantec 替代产品或部署现代 IDS/IPS 系统。若因业务必须保留，应将 NetProwler 置于隔离网段并严格限制管理访问来源。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Axent NetProwler 3.0 IP数据包拒绝服务漏洞"
updated = "2026-06-16T21:51:37.467"

