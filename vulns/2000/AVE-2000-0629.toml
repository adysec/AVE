[basic]
description = "MIT Kerberos 4 的 KDC（密钥分发中心）程序中的 `set_tgtkey` 函数存在缓冲区溢出漏洞，远程攻击者可通过向 `lastrealm` 变量发送特制数据触发该漏洞，导致 KDC 服务崩溃，造成拒绝服务。该漏洞影响 MIT Kerberos 4.0 至 5.1.1.1 版本，CVSS 评分 5.0，危害等级中等。建议用户升级至已修复版本或应用厂商提供的补丁。"
published = "2000-06-09T04:00:00.000"
remediation = "升级至 MIT Kerberos 5 1.2 及以上版本，该版本已修复 KDC 中 set_tgtkey 函数的缓冲区溢出漏洞。如无法升级，在 KDC 配置文件 krb5.conf 中设置 kdc_allow_kerberos4 = false 禁用 Kerberos 4 协议支持作为临时缓解措施，因为该溢出存在于 Kerberos 4 兼容代码路径中。"
score = 5
severity = "MEDIUM"
sources = ["redhat"]
title = "MIT Kerberos 4 KDC 缓冲区溢出拒绝服务漏洞"
updated = "2026-06-16T21:51:58.157"

