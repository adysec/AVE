[basic]
description = "Canna 3.5b2 及更早版本的 irw_through 函数中存在缓冲区溢出漏洞。本地攻击者可利用该漏洞向 irw_through 函数发送特制的输入数据，触发缓冲区溢出，从而以 bin 用户身份执行任意代码。该漏洞影响 Canna 3.5b2 及之前版本，CVSS 评分 7.2，危害等级高。攻击者需要拥有本地系统访问权限，无需身份认证即可利用此漏洞提升权限。"
published = "2002-12-18T05:00:00.000"
remediation = "升级 Canna 至 3.5b2-46.2 及以上版本（Debian Woody）或安装 RHSA-2002:261 提供的修复 RPM 包（Red Hat Linux Advanced Server 2.1）。如无法立即升级，可移除 Canna 软件包或限制本地用户对 Canna 服务的访问权限作为临时缓解措施。"
score = 7.2
severity = "HIGH"
sources = ["osv"]
title = "Canna irw_through 函数缓冲区溢出本地代码执行漏洞"
updated = "2026-06-16T21:58:51.370"

