[basic]
description = "Computer Associates eTrust Intrusion Detection System（原 SessionWall-3）1.4.1.13 版本使用弱 XOR 加密算法将管理员密码存储于 Windows 注册表中，本地攻击者可通过读取注册表并逆向 XOR 加密方式轻松解密获取管理员凭据，进而获得系统管理权限。该漏洞攻击复杂度低，CVSS 评分 2.1，危害等级低。"
published = "2000-06-07T04:00:00.000"
remediation = '建议立即升级至 Computer Associates eTrust Intrusion Detection 1.5 或更高版本，该版本已改用强加密算法存储管理密码。如产品已停止支持，建议迁移至受支持的替代产品，并在防火墙和主机层面严格限制本地管理访问权限。同时可配置 Windows 注册表 ACL，限制对 HKLM\SOFTWARE\ComputerAssociates\eTrust\IDS 的读取权限。'
score = 2.1
severity = "LOW"
sources = ["exploitdb"]
title = "Computer Associates eTrust Intrusion Detection 弱加密漏洞"
updated = "2026-06-16T21:51:59.910"

