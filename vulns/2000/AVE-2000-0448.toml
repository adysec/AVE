[basic]
description = "Microsoft Outlook Express 4.x 存在缓冲区溢出漏洞，远程攻击者可通过向目标用户发送包含超长文件名的 .jpg 或 .bmp 附件的邮件或新闻组消息触发该漏洞，导致 Outlook Express 崩溃并拒绝服务。该漏洞影响 Outlook Express 4.x 版本，攻击者无需身份认证即可利用，危害等级中等。"
published = "2000-05-12T04:00:00.000"
remediation = '升级至 Outlook Express 5.0 或更高版本，该版本修复了附件文件名缓冲区溢出问题。临时缓解措施：将 Outlook Express 的安全邮件区域设为"受限站点"，禁用预览窗格自动预览邮件，并通过组策略禁止自动下载和打开邮件附件。'
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Microsoft Outlook Express 缓冲区溢出拒绝服务漏洞"
updated = "2026-06-16T21:51:40.063"

