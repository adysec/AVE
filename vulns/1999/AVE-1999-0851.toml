[basic]
description = "Windows NT 域间存在单向或双向信任关系配置安全隐患，远程攻击者可在无需认证且利用复杂度低的情况下，利用域间信任机制突破访问控制边界，从已控制的受信任域向目标域横向移动，通过传递身份验证请求获取目标域资源的未授权访问权限，实现跨域渗透。CVSS v2 评分 10.0，可导致目标系统机密性、完整性和可用性完全受损。"
published = "1999-01-01T05:00:00.000"
remediation = "建议立即将 Windows NT 4.0 升级至受支持版本（Windows Server 2019/2022 或更高版本），启用 SID 筛选以防范信任提升攻击。仅在业务必要下建立域信任，并设置为单向而非双向信任，同时为每个信任配置隔离。对所有域控制器持续安装最新安全更新。"
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "Microsoft Windows NT 域信任关系安全漏洞"
updated = "2026-06-16T21:48:40.710"

