[basic]
description = "Eyedog ActiveX 控件存在缓冲区溢出漏洞，远程攻击者可通过构造特制网页诱使用户访问，触发缓冲区溢出从而执行任意命令。该漏洞影响了 Internet Explorer 浏览器中集成的 Eyedog ActiveX 控件，攻击者需要诱导用户打开恶意网页或包含恶意内容的电子邮件才能成功利用，危害较大。"
published = "1999-09-01T04:00:00.000"
remediation = '安装 Microsoft 于 1999 年 8 月发布的安全公告 MS99-032 对应补丁（KB240308），或通过 Windows Update 更新至最新版本的 Internet Explorer。该补丁为 Eyedog ActiveX 控件设置 kill bit，阻止其在 IE 中加载。作为手动缓解措施，可在注册表 HKEY_LOCAL_MACHINE\SOFTWARE\Microsoft\Internet Explorer\ActiveX Compatibility 下为 CLSID {A5ECB622-137C-11D2-B34D-00C04FB6F6E1} 创建 Compatibility Flags 值为 0x400 的 DWORD 项，同样可禁用该控件。长远建议升级至现代操作系统及浏览器，因较新版本已不再包含此控件。'
score = 4
severity = "MEDIUM"
sources = ["avd"]
title = "Eyedog ActiveX 控件缓冲区溢出远程代码执行漏洞"
updated = "2026-06-16T21:48:48.737"

