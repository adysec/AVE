[basic]
description = "Nullsoft SHOUTcast 服务器在配置文件 sc_serv.conf 中以明文存储管理员密码，导致具有本地访问权限的攻击者可读取该配置文件获取管理员凭据，进而获得服务器管理权限。该漏洞影响 SHOUTcast 服务器，利用条件为攻击者需具备本地系统访问权限，可进一步控制服务器运行环境。CVSS 评分 7.2，危害等级高。"
published = "1999-08-20T04:00:00.000"
remediation = "将 SHOUTcast 配置文件 sc_serv.conf 的权限设为仅服务器运行用户可读（chmod 600），并使用独立的低权限专用账户运行 SHOUTcast 服务，避免与管理员共用同一系统账户。若仍使用 SHOUTcast 1.x 旧版，建议升级至 SHOUTcast 2.6 或迁移至 Icecast 等持续维护的替代方案，消除明文密码存储问题。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "Nullsoft SHOUTcast 服务器管理密码明文存储漏洞"
updated = "2026-06-16T21:50:43.237"

