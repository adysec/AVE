[info]
author = "AVE"
description = "检测 GlimpseHTTP/WebGlimpse 中 aglimpse CGI 程序是否因未过滤管道符而存在远程命令注入漏洞，通过向 aglimpse 接口传递含管道符的查询参数触发系统命令执行"
id = "POC-AVE-1999-0301"
name = "Glimpse HTTP/WebGlimpse aglimpse CGI 远程命令执行 PoC"
severity = "high"
tags = ["ave-1999-0301"]
vuln_id = [
    "CVE-1999-0147",
    "AVE-1999-0301",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/cgi-bin/aglimpse"
protocol = "http"

[[poc.requests.matchers]]
expect = true
status = [200]
type = "status"
