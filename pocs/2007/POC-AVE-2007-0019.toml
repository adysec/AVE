[info]
author = "ave"
description = "检测 OpenOffice.org 对 Quattro Pro 文件的解析漏洞，验证是否存在多个基于堆的缓冲区溢出。当攻击者构造恶意的 Attribute 记录和 Font Description 记录时，可能触发堆缓冲区溢出，导致应用程序崩溃或在用户上下文中执行任意代码。检测利用只需打开精心制作的 QPRO 文件即可验证是否存在该漏洞。"
id = "POC-AVE-2007-0019"
name = "OpenOffice.org 2.4 Quattro Pro 堆缓冲区溢出漏洞 PoC"
severity = "medium"
tags = ["ave-2007-0019"]
vuln_id = [
    "CVE-2007-5745",
    "AVE-2007-0019",
]

[poc]
logic = "all"

[[poc.requests]]
path = "/etc/passwd"
protocol = "file"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["root:"]
