[info]
author = "ave"
description = "检测 Lotus Domino HTTP 服务器 cgi-bin 目录是否允许匿名访问。漏洞源于服务器未能正确限制对 cgi-bin 目录的访问权限，未经身份认证的攻击者可访问并执行目录下的 CGI 脚本。"
id = "POC-AVE-2000-0020"
name = "Lotus Domino HTTP Server CGI-BIN Anonymous Access PoC"
severity = "medium"
tags = [
    "cgi-bin",
    "anonymous-access",
    "cve-2000-0022",
]
vuln_id = [
    "CVE-2000-0022",
    "AVE-2000-0020",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/cgi-bin/"
protocol = "http"

[[poc.requests.matchers]]
expect = true
status = [
    200,
    403,
]
type = "status"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/cgi-bin/test-cgi"
protocol = "http"

[[poc.requests.matchers]]
expect = true
status = [200]
type = "status"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/cgi-bin/printenv"
protocol = "http"

[[poc.requests.matchers]]
expect = true
status = [200]
type = "status"
