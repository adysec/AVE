[basic]
description = "Linux 内核 UFS（通用闪存存储）驱动核心模块中存在设备管理命令超时处理缺陷，当链路恢复过程中发送的 NOP OUT 命令超时且 doorbell 清除失败时，ufshcd_wait_for_dev_cmd() 函数未将栈上分配的 complete 结构体置空便直接返回；若设备随后完成该命令，将触发 use-after-free 导致内核崩溃。该漏洞影响 Linux 内核各版本，本地攻击者可利用此漏洞发起拒绝服务攻击，CVSS 评分 5.5，危害等级中等。"
published = "2025-09-18T14:15:41.767"
remediation = "升级 Linux 内核至 6.1.16（6.1.x 分支）、6.2.3（6.2.x 分支）或 6.3 及以上版本，该漏洞已在 commit cf4549343270、3ffd2cd644e0、36822124f9de 中修复。如无法立即更新内核，可临时禁用 UFS 设备（如系统不使用 UFS 存储）或限制本地用户对 UFS 驱动的访问权限，但推荐尽快部署内核补丁。"
score = 5.5
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux 内核 UFS 核心模块设备管理命令超时处理不当导致释放后使用漏洞"
updated = "2026-06-17T06:45:10.900"

