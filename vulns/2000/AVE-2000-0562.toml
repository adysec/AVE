[basic]
description = "Multisoft FlagShip 4.4 中的 FSserial、FlagShip_c 和 FlagShip_p 程序安装时被设置为全局可写权限，本地攻击者可利用该漏洞将正常程序替换为特洛伊木马程序，从而在目标系统上以其他用户（包括管理员）权限执行任意代码。该漏洞需要攻击者拥有本地访问权限，CVSS 评分 6.2，危害等级中危。建议用户手动修复文件权限以防止被利用。"
published = "2000-10-20T04:00:00.000"
remediation = "建议立即移除 FSserial、FlagShip_c、FlagShip_p 三文件的全局写入权限（chmod o-w /path/to/FSserial /path/to/FlagShip_c /path/to/FlagShip_p），或升级 Multisoft 官方补丁版本重新安装；若文件以 setuid root 运行，应移除 setuid 位（chmod u-s）作为加深防御。定期检查关键系统文件权限以防篡改。"
score = 6.2
severity = "MEDIUM"
sources = ["cve"]
title = "Multisoft FlagShip 4.4 安装权限漏洞"
updated = "2026-06-16T21:52:20.517"

