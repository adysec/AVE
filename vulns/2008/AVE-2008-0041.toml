[basic]
description = "libpng 库的 pngrutil.c 文件中 png_handle_tEXt 函数存在内存泄漏漏洞，影响 libpng 1.2.33 rc02 之前版本和 1.4.0 beta36 之前版本。攻击者可通过构造包含恶意 tEXt 块的 PNG 文件，诱导受害者使用受影响版本的 libpng 解析该文件，触发 png_handle_tEXt 函数中的内存泄漏，导致内存耗尽并引发拒绝服务（内存耗尽）。攻击者需诱导用户打开或处理恶意 PNG 文件，利用条件为受害者使用受影响版本的 libpng 库处理 PNG 图片，CVSS 评分 7.1（AV:N/AC:M/Au:N/C:N/I:N/A:C），影响可用性严重。libpng 官方已在 1.2.33 rc02 和 1.4.0 beta36 版本中修复该漏洞，建议升级至修复版本或更新使用 libpng 的相关软件包。"
published = "2009-02-20T17:30:03.157"
remediation = "建议立即升级 libpng 至 1.2.33 正式版或 1.4.0 beta36 及以上版本（已修复 CVE-2008-6218 内存泄漏补丁）。若使用旧版系统无法直接升级，可应用厂商回补丁（如 OpenMandriva libpng-1.2.44-CVE-2008-6218.diff 补丁）。临时缓解措施：在应用层禁止处理不可信 PNG 文件，或部署 PNG 解析器沙箱/内存限制防止内存耗尽攻击。"
score = 7.1
severity = "HIGH"
sources = ["tenable"]
title = "libpng libpng 内存泄漏导致拒绝服务漏洞"
updated = "2026-06-16T23:01:50.007"

