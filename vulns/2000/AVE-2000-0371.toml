[basic]
description = "Omnis Studio 2.4 数据库工具在数据库字段加密时使用了弱加密算法，仅实现了简单的转码而非真正的加密保护，攻击者可以轻易绕过加密机制获取原始数据。该漏洞影响所有使用 Omnis Studio 2.4 的用户，可能泄露数据库中的敏感信息，包括用户凭据、商业机密、个人隐私等。攻击者无需任何权限即可远程利用此漏洞，完全破坏了数据库加密的安全性，攻击难度低但破坏力极强，导致系统完全保密、完整性和可用性遭到严重破坏。"
published = "2000-05-01T04:00:00.000"
remediation = "建议立即升级至 Omnis Studio 3.0 或更高版本（官方已修复弱加密问题）。如无法立即升级，建议在应用层对敏感数据库字段实施 AES-256 加密存储，或启用数据库透明加密（TDE）保护敏感字段，同时在应用层实施字段级加密作为临时缓解措施。"
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "Omnis Omnis Studio 2.4 数据库字段弱加密漏洞"
updated = "2026-06-16T21:51:45.473"

