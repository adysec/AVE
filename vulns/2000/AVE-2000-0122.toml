[basic]
description = "CartIt 购物车应用程序存在设计缺陷，远程攻击者可通过修改隐藏表单字段（hidden form fields）的值来篡改敏感交易信息，例如商品价格、数量或订单金额。该漏洞无需身份认证即可利用，攻击者仅需构造特制 HTTP 请求即可实现低价购买或信息篡改，影响使用 CartIt 的在线购物系统。"
published = "2000-02-01T05:00:00.000"
remediation = "在服务端对所有表单提交数据进行严格校验，购物车金额、数量等敏感数据应存储在服务器端会话中而非客户端隐藏表单字段。对所有客户端提交的价格/数量字段进行服务端重新计算和验证，确保与实际商品价格一致。如使用第三方购物车组件，应替换为支持服务端数据管理的方案。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "CartIt 购物车应用隐藏表单字段信息篡改漏洞"
updated = "2026-06-16T21:51:04.640"

