[basic]
description = "安博通OEM产品存在任意文件上传漏洞，攻击者可通过向设备管理后台的文件上传接口发送特制HTTP请求，绕过文件类型校验直接上传恶意脚本文件（如WebShell），进而获取服务器控制权限。该漏洞影响安博通向OEM合作伙伴提供的多款网络安全设备，攻击者需能够访问设备的管理界面方可利用，危害等级高，可能导致内网横向移动和数据泄露。"
published = "08.08"
remediation = "联系安博通厂商获取最新安全补丁或升级固件至修复版本；在Web应用层面严格限制上传文件类型为白名单机制，禁止上传脚本文件（如jsp/php/aspx）；对上传目录设置禁止执行权限；对上传文件名重命名并校验Content-Type；部署WAF规则拦截文件上传攻击载荷。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "安博通OEM产品任意文件上传漏洞"
updated = "08.08"

