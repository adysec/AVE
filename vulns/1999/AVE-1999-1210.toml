[basic]
description = "SunOS 4.1.3_U1 与 4.1.4 操作系统随附的 sendmail 5 邮件传输代理中存在多处未具体说明的安全漏洞。由于漏洞细节未公开，确切的触发机制与攻击向量尚不清晰，但 NVD 将其 CVSS 评分定为 7.5（高危）。攻击者可能通过网络向目标邮件服务发送特制请求或邮件，潜在影响包括拒绝服务或权限提升。运行上述 SunOS 版本的邮件服务器均可能受影响，建议尽快评估并部署补丁。"
published = "1999-12-31"
remediation = "升级 sendmail 至 8.x 或更高版本，或应用 Sun 提供的安全补丁（Sun Patch ID 100159 等）；若无法立即升级，应限制 sendmail 网络监听地址并关闭无关 SMTP 功能作为临时缓解措施。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "SunOS sendmail 5 未指定安全漏洞"
updated = "2026-07-17"

