[basic]
description = "TCPDump 3.6.2 及更早版本在处理畸形 NFS（网络文件系统）数据包时存在缓冲区溢出漏洞。远程攻击者可向目标系统发送特制的 NFS 网络数据包，触发缓冲区溢出，导致目标程序崩溃（拒绝服务），甚至可能执行任意代码。该漏洞影响所有运行 TCPDump 3.6.2 及之前版本的系统，CVSS 评分 7.5，危害等级高。用户需升级至 TCPDump 3.7 及以上版本以修复此漏洞。"
published = "2002-06-18T04:00:00.000"
remediation = "立即升级 tcpdump 至 3.7 及以上版本。Red Hat 用户安装 RHSA-2002-094/RHSA-2002-121 更新，Debian 用户应用 DSA-255 安全更新，Caldera OpenLinux 用户安装 CSSA-2002-025.0 补丁。如无法升级，可在防火墙上限制外部 NFS 流量进入受信网段作为临时缓解。"
score = 7.5
severity = "HIGH"
sources = ["osv"]
title = "TCPDump tcpdump NFS包缓冲区溢出漏洞"
updated = "2026-06-16T21:57:19.583"

