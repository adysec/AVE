[basic]
description = "Persits Software AspUpload 组件中的 AspUpload.dll 存在缓冲区溢出漏洞，远程攻击者可通过向 HTTP 请求中提交超长参数触发该漏洞，导致目标系统拒绝服务，甚至可能执行任意命令。该漏洞影响 AspUpload 1.4.0.2 之前版本，CVSS 评分 10.0，危害等级严重。建议用户升级至 1.4.0.2 或更高版本以修复此漏洞。"
published = "1999-07-20T04:00:00.000"
remediation = "立即升级 Persits Software AspUpload 至 1.4.0.2 或更高版本，该版本已修复 AspUpload.dll 中因 HTTP 请求参数过长导致的缓冲区溢出。如无法升级，应从 Web 服务器中移除 AspUpload.dll 组件，并在 IIS 中禁用相关的 ASP 脚本调用，以防止远程攻击者通过超长参数触发拒绝服务或执行任意命令。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "Persits Software AspUpload 缓冲区溢出漏洞"
updated = "2026-06-16T21:50:39.057"

