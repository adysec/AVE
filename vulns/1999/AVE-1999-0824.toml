[basic]
description = "GoodTech Telnet Server NT 2.2.1 存在缓冲区溢出漏洞，远程攻击者可通过向目标服务器发送超长登录名（login name）触发该漏洞，导致服务进程崩溃，造成拒绝服务。该漏洞影响 GoodTech Telnet Server NT 2.2.1 版本，攻击者无需身份认证即可利用，危害等级中等。目前官方已停止维护，建议用户迁移至其他受支持的 Telnet 服务端软件。"
published = "1999-12-06T05:00:00.000"
remediation = "GoodTech 公司已停止运营，该产品不再受支持且无官方补丁。建议立即停止使用 GoodTech Telnet Server NT 2.2.1，迁移至现代 SSH 服务（如 OpenSSH）替代 Telnet 协议；如因兼容性必须保留 Telnet 服务，可更换为受支持的 Telnet 服务器（如 Windows 内置 Telnet 服务或第三方维护的替代品），并在防火墙层面限制仅允许受信任 IP 访问 TCP 23 端口作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "GoodTech Telnet Server NT 缓冲区溢出拒绝服务漏洞"
updated = "2026-06-16T21:49:28.577"

