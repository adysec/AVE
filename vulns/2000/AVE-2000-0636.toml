[basic]
description = "MIT Kerberos 的 KDC（密钥分发中心）程序存在双重释放（double-free）内存管理漏洞，远程攻击者可通过向目标 KDC 服务发送特制的认证请求触发该漏洞，导致服务进程崩溃，造成拒绝服务。该漏洞影响 Kerberos 4.0、Kerberos 5 1.0/1.1.1/5-1.1 版本，CVSS 评分 5.0，危害等级中等。厂商已发布安全更新修复此问题。"
published = "2000-06-09T04:00:00.000"
remediation = "升级至 MIT Kerberos 5 1.2 或 Kerberos 4 0.1 及以上版本，该版本修复了 KDC 服务中的 double-free 内存释放漏洞。如无法升级，可在防火墙层面限制对 KDC 服务（默认端口 88/udp 和 749/tcp）的访问来源，仅允许可信网络段通信作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "MIT Kerberos KDC 双重释放拒绝服务漏洞"
updated = "2026-06-16T21:51:58.693"

