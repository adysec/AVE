[basic]
description = 'Check Point Software Firewall-1 3.0 存在脚本标签过滤绕过漏洞。该防火墙未能正确过滤 HTML 中的 script 标签，远程攻击者可通过在 SCRIPT 标签前额外添加一个 "<" 字符来绕过 "Strip Script Tags" 安全限制，导致恶意脚本代码可被注入并执行。攻击者无需身份认证即可利用此漏洞，影响 Check Point Firewall-1 3.0 版本。该漏洞 CVSS 评分 7.5，危害等级高。'
published = "2000-01-29T05:00:00.000"
remediation = "升级到 Check Point 官方已修复此问题的后续版本（Firewall-1 4.0 及以上），或迁移至当前受支持的 Check Point Quantum 系列防火墙。在 Security Server 的 HTTP Security Server 配置中启用严格标签过滤规则，并禁用不安全的 HTTP 协议解析选项。对于无法立即升级的环境，可在网络边界部署 WAF 或反向代理，对请求中的 `<script` 和 `<<script` 等变体进行正则过滤。"
score = 7.5
severity = "HIGH"
sources = ["exploitdb"]
title = "Check Point Firewall-1 脚本标签检查绕过漏洞"
updated = "2026-06-16T21:51:02.023"

