[basic]
description = ".NET TLS/SSL (System.Net.Security) 存在拒绝服务漏洞，源于对 TLS 握手过程中输入类型验证不当 (CWE-1287)。攻击者无需身份认证，仅需通过网络发送精心构造的畸形 TLS 握手请求，即可触发 .NET 运行时在处理 TLS 握手时的异常，导致目标应用程序崩溃或变得无响应，造成拒绝服务。该漏洞影响 .NET 8.0.0-8.0.28、.NET 9.0.0-9.0.17 及 .NET 10.0.0-10.0.9 所有受支持平台 (Linux/macOS/Windows、x64/ARM/ARM64/Musl) 的 Microsoft.NetCore.App.Runtime 运行时包，CVSS 3.1 评分 7.5 (HIGH，AV:N/AC:L/PR:N/UI:N/S:U/C:N/I:N/A:H)，攻击向)。攻击者无需任何权限或用户交互，仅通过网络发送恶意 TLS 握手包即可远程触发拒绝服务。微软已在 .NET 8.0.29、9.0.18、10.0.10 版本中修复，受影响的自包含应用需重新编译部署修复版运行时。"
published = "2026-07-14T20:17:37.000"
remediation = "建议立即升级 .NET 运行时到修复版本：.NET 10.0 升级至 10.0.10，.NET 9.0 升级至 9.0.18，.NET 8.0 升级至 8.0.29。通过运行 `dotnet --info` 检查当前版本，通过 Visual Studio 更新或下载安装最新 SDK/Runtime。引用 Microsoft.NETCore.App.Runtime 等易受攻击 NuGet 包的项目，需更新包引用至对应修复版本。更新后必须重启所有 .NET 应用程序使补丁生效。自包含部署应用需重新编译并重新部署。临时缓解措施：在网络层面限制非受信来源的 TLS 连接，或配置防火墙限制 TLS 握手来源 IP。"
score = 7.5
severity = "HIGH"
sources = ["ghsa"]
title = "微软 .NET 拒绝服务漏洞"
updated = "2026-07-22T21:17:40.643"

