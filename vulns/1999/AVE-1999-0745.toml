[basic]
description = "WinGate 代理服务器的 POP3 组件存在缓冲区溢出漏洞，远程攻击者可通过向目标系统发送特制的 POP3 请求触发该漏洞，导致代理服务崩溃，造成拒绝服务。该漏洞影响 WinGate 多个版本，攻击者无需身份认证即可远程利用，危害等级中等。厂商已发布修复版本，建议用户升级至最新版本以修复此漏洞。"
published = "1998-07-01T04:00:00.000"
remediation = "升级 WinGate 至 2.1d 或更高版本，该版本修复了 POP3 代理中的缓冲区溢出问题。如无法升级，可在 WinGate 服务配置中禁用 POP3 代理服务，或通过防火墙限制对 POP3 代理端口（默认 110）的访问，仅允许受信任 IP 连接。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Deerfield WinGate POP3 代理缓冲区溢出拒绝服务漏洞"
updated = "2026-06-16T21:48:31.030"

