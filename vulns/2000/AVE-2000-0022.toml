[basic]
description = "AnalogX SimpleServer:WWW 1.0.1 存在缓冲区溢出漏洞，远程攻击者可通过向目标 HTTP 服务发送超长 GET 请求触发该漏洞，导致任意代码执行。该漏洞影响 AnalogX SimpleServer:WWW 1.0.1 版本，攻击者无需身份认证即可远程利用，危害严重。"
published = "1999-12-31T05:00:00.000"
remediation = "建议立即升级至 AnalogX SimpleServer:WWW 1.23 或更高版本（1.23 版本已修复大字符串命令漏洞，1.06 版本修复了缓冲区溢出问题）。该软件已停止维护且仅支持至 Windows 7，如无法升级，应在防火墙层面限制对 80 端口的非信任来源访问，或迁移至仍在维护的 Web 服务器软件（如 Apache、Nginx）作为替代方案。"
score = 7.5
severity = "HIGH"
sources = ["exploitdb"]
title = "AnalogX SimpleServer:WWW 缓冲区溢出漏洞"
