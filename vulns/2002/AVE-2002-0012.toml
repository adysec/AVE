[basic]
description = "OpenSSL 0.9.7 至 0.9.7-beta3 版本在启用 Kerberos 支持时存在缓冲区溢出漏洞。当处理过长的 master key 时，程序未正确验证输入长度，导致堆栈缓冲区溢出。远程攻击者可向使用受影响 OpenSSL 版本的服务端发送特制的 Kerberos 握手请求，触发该漏洞，进而执行任意代码。该漏洞影响所有启用 Kerberos 选项编译的 OpenSSL 应用，CVSS 评分 7.5，危害等级高。"
published = "2002-08-12T04:00:00.000"
remediation = "升级 OpenSSL 至 0.9.7-beta3 或更高版本。如无法升级，可在编译时通过 --disable-kerberos 选项禁用 Kerberos 支持作为临时缓解措施。同时限制仅可信网络来源访问使用 OpenSSL 的服务端口。"
score = 7.5
severity = "HIGH"
sources = ["osv"]
title = "OpenSSL 缓冲区溢出远程代码执行漏洞"
updated = "2026-06-16T21:57:52.960"

