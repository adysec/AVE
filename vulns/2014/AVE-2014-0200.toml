[basic]
description = "Microsoft Windows 组策略首选项（Group Policy Preferences）存在密码凭据泄露漏洞。该漏洞源于 Windows 组策略实现未正确处理密码分发机制，管理员在使用组策略首选项配置本地账户时，密码以 AES-256 加密后存储在 SYSVOL 共享目录的 XML 文件中，但加密密钥已被公开泄露。域内任意经过身份认证的远程攻击者只需具备对域控制器 SYSVOL 共享的读取权限，即可获取加密的 cpassword 值，并使用公开的 AES 密钥解密得到明文密码，进而利用获取的凭据提升权限至域管理员。该漏洞影响 Windows Vista SP2、Windows Server 2008 SP2/R2 SP1、Windows 7 SP1、Windows 8/8.1 及 Windows Server 2012 Gold/R2 等多个版本，已于 2014 年 5 月在野外被积极利用（MS14-025），CVSS 评分 8.8，危害等级高。"
published = "2014-05-14T11:13:06.630"
remediation = "立即安装 Microsoft 安全公告 MS14-025 (KB2928120) 补丁，该补丁阻止通过 SYSVOL 共享读取组策略首选项中的加密密码。同时检查 SYSVOL 中所有 Groups.xml 文件，删除其中包含的 cpassword 字段，改用受保护的组策略首选项或受管理的服务帐户 (gMSA) 替代明文/可逆加密密码存储方式。"
score = 8.8
severity = "HIGH"
sources = ["kev"]
title = "Microsoft Windows 组策略首选项密码权限提升漏洞"
updated = "2026-06-17T00:05:35.860"

