[basic]
description = "Network Flight Recorder (NFR) 1.5 及 1.6 版本中存在拒绝服务漏洞。远程攻击者可通过向目标 nfrd 进程发送精心构造的空头部及空数据字段的 TCP 数据包，触发该进程崩溃，导致服务不可用。该漏洞无需身份认证即可远程利用，攻击条件简单，影响运行 NFR 1.5/1.6 的网络监控设备，可造成日志记录中断及网络流量分析功能失效。"
published = "1998-04-08T04:00:00.000"
remediation = "建议升级至 NFR 2.0 及以上版本，该漏洞已在后续版本修复。若无法升级，可在网络边界防火墙配置规则，丢弃无效 TCP 数据包（如空头部和空负载的数据包），并限制对 nfrd 服务的网络访问。同时考虑迁移至替代网络取证方案（如 Cisco Security Analytics）以消除风险。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Network Flight Recorder NFR 1.5/1.6 拒绝服务漏洞"
updated = "2026-06-16T21:50:34.853"

