[basic]
description = "飞书桌面客户端存在远程代码执行漏洞（RCE），攻击者可通过向目标用户发送特制的恶意消息或诱导用户点击精心构造的链接，利用客户端对输入内容过滤不严的问题触发任意代码执行。成功利用该漏洞可导致攻击者在受害者系统上执行任意命令，完全控制目标设备，包括窃取敏感数据、安装恶意程序等。该漏洞影响飞书桌面客户端多个版本，危害严重，用户应及时更新至最新版修复。"
published = "08.09"
remediation = "立即将飞书客户端升级至 2023 年 8 月以后的最新版本（≥7.11），同时在企业内部禁用客户端内置浏览器加载外部链接功能，避免攻击者通过恶意页面触发 RCE。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "飞书 飞书客户端 远程代码执行漏洞"
