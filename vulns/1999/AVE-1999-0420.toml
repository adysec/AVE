[basic]
description = "NCSA HTTPD 1.4.1 及更早版本存在缓冲区溢出漏洞，未经身份认证的远程攻击者可通过向目标 Web 服务器发送特制的超长 HTTP 请求触发缓冲区溢出，导致服务器进程崩溃或执行任意代码。该漏洞影响运行 NCSA HTTPD 的 Unix 系统，CVSS 评分 10.0，危害等级严重。利用该漏洞无需身份认证，攻击门槛低，可远程利用获取服务器完全控制权限。"
published = "1995-02-17T05:00:00.000"
remediation = "升级 NCSA httpd 至 1.5 及以上版本，或迁移至 Apache HTTP Server。如无法升级，禁用 HTTP 服务中的 CGI 脚本执行功能作为临时缓解措施，并限制网络访问来源 IP。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "NCSA httpd 远程缓冲区溢出漏洞"
updated = "2026-06-16T21:47:58.270"

