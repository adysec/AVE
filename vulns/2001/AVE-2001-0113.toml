[basic]
description = "KICQ IRC 客户端 1.0.0（及可能后续版本）存在任意命令执行漏洞，远程攻击者可在 URL 中注入 shell 元字符（如管道符、分号等）触发该漏洞，导致目标系统执行任意命令。该漏洞源于程序未对用户输入的 URL 进行充分过滤与转义，攻击者只需诱使目标用户点击恶意链接即可利用，影响严重。CVSS 评分 7.5，危害等级高。"
published = "2001-05-03T04:00:00.000"
remediation = "升级 KICQ 至高于 1.0.0 的修复版本；该软件已停止维护，建议迁移至其他受支持 IRC 客户端（如 HexChat、Irssi）。临时缓解措施：在客户端或代理层过滤 URL 中的 shell 元字符（如 `;`、`|`、`$`），或禁用自动 URL 解析功能。"
score = 7.5
severity = "HIGH"
sources = ["exploitdb"]
title = "KICQ IRC客户端 任意命令执行漏洞"
updated = "2026-06-16T21:54:00.500"

