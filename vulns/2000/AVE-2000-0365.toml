[basic]
description = "HP Web JetAdmin 6.0 存在拒绝服务漏洞，远程攻击者可通过向 8000 端口发送特制的畸形 URL 请求，导致服务崩溃无法响应正常请求。该漏洞源于程序对用户输入 URL 的校验不充分，攻击者无需身份认证即可利用，影响 HP Web JetAdmin 6.0 版本，CVSS 评分 5.0，危害等级中危。"
published = "2000-05-24T04:00:00.000"
remediation = "建议立即升级到 HP JetAdmin 的受支持版本（如 7.0 及以上），或迁移至 HP 当前维护的设备管理方案。如无法升级，可在防火墙上限制对 8000 端口的访问，仅允许受信任 IP 连接，并停止不必要的 Web 接口服务以缓解拒绝服务攻击风险。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "HP Web JetAdmin 6.0 拒绝服务漏洞"
updated = "2026-06-16T21:51:44.803"

