[basic]
description = "TransSoft Broker FTP Server 4.3.0.1 之前版本存在缓冲区溢出漏洞。攻击者无需认证即可通过向 FTP 服务器发送超长的用户名命令触发栈缓冲区溢出，导致服务崩溃（拒绝服务），在特定条件下可能实现远程代码执行。该漏洞影响 TransSoft Broker FTP Server 3.0.x 及 4.0 系列版本，CVSS 评分 7.5，危害等级高危。建议升级至 4.3.0.1 或更高版本以修复此漏洞。"
published = "2001-01-09T05:00:00.000"
remediation = "建议升级 TransSoft Broker FTP Server 至 4.3.0.1 或更高版本，该版本修复了用户名缓冲区溢出漏洞。如无法升级，可通过防火墙限制 FTP 端口（默认 21）仅允许可信 IP 访问，并禁用匿名登录以降低攻击面。"
score = 7.5
severity = "HIGH"
sources = ["exploitdb"]
title = "TransSoft Broker FTP Server 用户名缓冲区溢出漏洞"
updated = "2026-06-16T21:53:10.893"

