[basic]
description = "Panda Security 3.0 反病毒软件在安装时注册了“添加/删除程序”小程序（Add/Remove Programs）中的卸载入口，但未对该卸载操作进行充分的权限校验或身份认证。本地已登录的普通用户可利用操作系统自带的“添加/删除程序”小程序直接触发卸载流程，从而无需管理员授权即可移除 Panda Security 安全软件。受影响范围为运行 Panda Security 3.0 的 Windows 系统，攻击条件为攻击者需在目标主机上拥有本地登录会话及普通用户权限。成功利用后，目标系统将丧失该安全软件提供的防护能力，使主机暴露于恶意软件威胁之下，CVSS 评分为 4.6，危害等级为中。"
published = "2000-04-17T04:00:00.000"
remediation = '立即将 Panda Security 防护软件升级至官方已修复该问题的后续版本（3.0 之后的补丁版本），并通过组策略或本地安全策略限制普通用户访问"控制面板→添加/删除程序"，或使用管理员权限限制对 Panda 卸载注册表项（如 HKLM\Software\Microsoft\Windows\CurrentVersion\Uninstall 下对应项）的写入权限，防止未授权用户卸载防护软件。如暂无法升级，可对涉及 Panda 安装目录与卸载入口设置 NTFS 权限仅允许管理员操作作为临时缓解。'
score = 4.6
severity = "MEDIUM"
sources = ["cve"]
title = "Panda Security Panda Security 3.0 安全软件绕过漏洞"
updated = "2026-06-16T21:51:21.267"

