[basic]
description = "Microsoft Data Access Components (MDAC) 中的远程数据服务 (RDS) DataFactory 组件暴露了不安全的内部方法，远程攻击者可通过 IIS 发送特制的 HTTP 请求，利用该组件绕过安全限制直接执行任意系统命令。该漏洞影响 IIS 3.0/4.0、MDAC 2.1 等组件，攻击无需身份认证，CVSS 评分 10.0，危害等级严重。微软已发布安全公告及补丁修复此漏洞。"
published = "1999-07-19T04:00:00.000"
remediation = '立即安装 Microsoft 安全公告 MS99-025 提供的补丁，或升级至 Windows 2000 及以上版本（默认禁用 RDS DataFactory）。如无法升级，删除注册表键 `HKEY_LOCAL_MACHINE\SYSTEM\CurrentControlSet\Services\W3SVC\Parameters\ADCLaunch\RDSServer.DataFactory` 以禁用该危险组件，同时在 IIS 管理器中移除 `/msadc/` 虚拟目录映射。'
score = 10
severity = "CRITICAL"
sources = ["cve"]
title = "Microsoft Data Access Components (MDAC) RDS 远程代码执行漏洞"
updated = "2026-06-16T21:49:31.110"

