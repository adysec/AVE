[basic]
description = "SCO UnixWare 7.1.0 操作系统中的 Passthru 驱动程序存在安全漏洞，本地攻击者可通过向该驱动发送特制的恶意请求，触发系统拒绝服务（DoS）条件，导致目标系统崩溃或服务不可用。该漏洞影响 SCO UnixWare 7.1.0 版本，攻击者需要具有本地系统访问权限才能利用，CVSS 评分 5.0，危害等级中危。目前厂商已发布补丁修复该问题。"
published = "2001-03-12T05:00:00.000"
remediation = "安装 SCO 官方提供的 UnixWare 7.1.0 安全补丁 erg711690（如需可联系 SCO 支持获取存档），或升级到 UnixWare 7.1.1 及以上版本。如无法升级，可在系统层卸载或禁用 passthru 驱动模块（在 /etc/conf/sdevice.d/ 中将 passthru 行配置为 N），重新链接内核并重启生效。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "SCO UnixWare 7.1.0 Passthru 驱动程序拒绝服务漏洞"
updated = "2026-06-16T21:51:31.923"

