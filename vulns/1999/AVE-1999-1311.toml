[basic]
description = "VMS 4.0 至 5.3 版本中的 ANALYZE/PROCESS_DUMP DCL 命令存在权限提升漏洞，本地用户可通过执行该命令获取超出自身权限的系统访问权限。该漏洞源于系统对 DCL 命令的权限检查不充分，导致低权限用户能够利用 ANALYZE/PROCESS_DUMP 功能以更高权限执行操作，进而完全控制受影响的 VMS 系统。攻击者需要拥有本地系统访问权限才能利用此漏洞。"
published = "1990-10-25T04:00:00.000"
remediation = "升级到 VMS 5.4 或更高版本，该漏洞已在后续版本中修复。如无法升级，可通过设置 ANALYZE 命令的 ACL 权限，仅允许授权管理员执行 ANALYZE/PROCESS_DUMP，限制普通用户调用该命令以提升权限。"
score = 4.6
severity = "MEDIUM"
sources = ["avd"]
title = "VMS ANALYZE/PROCESS_DUMP 命令本地权限提升漏洞"
updated = "2026-06-16T21:49:36.917"

