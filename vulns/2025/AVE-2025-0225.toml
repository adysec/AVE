[basic]
description = "Richmail 邮件系统 openapiservice 接口存在任意文件上传漏洞，攻击者通过构造 multipart/form-data 请求向 `/webadmin/service/openapiservice?func=upload:letterImageUpload` 发送特制数据包，上传包含恶意代码的文件至服务器可写目录。上传的恶意文件可被解析执行，直接获取服务器控制权，实现远程代码执行。该漏洞无需身份认证即可利用，影响部署了 Richmail 邮件系统的服务器，危害严重。"
published = "0708"
remediation = "升级 Richmail 至官方最新版本，或联系厂商获取针对 openapiservice 接口 upload:letterImageUpload 任意文件上传漏洞的安全补丁。临时缓解措施包括：在 WAF/反向代理层限制对 /webadmin/service/openapiservice 路径的 POST 请求访问，仅允许可信 IP 调用该接口，并严格校验上传文件类型与内容。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "Richmail 邮件系统 openapiservice 任意文件上传漏洞"
updated = "0708"

