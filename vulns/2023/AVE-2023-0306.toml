[basic]
description = "傲盾信息安全管理系统前台存在远程命令执行漏洞，攻击者无需身份认证即可通过前台接口构造恶意请求，利用命令注入漏洞在服务器上以高权限执行任意系统命令。该漏洞影响傲盾信息安全管理系统多个版本，攻击者无需登录即可远程触发，通过构造特制的恶意载荷注入系统命令，可获取服务器最高权限，进而完全控制服务器、窃取敏感数据、植入恶意软件或横向移动攻击内网。攻击者仅需构造包含命令注入载荷的 HTTP 请求发送至前台接口即可触发漏洞，无需任何身份认证前置条件。厂商已发布补丁修复该漏洞，建议用户尽快升级至最新版本并加强网络边界防护。"
