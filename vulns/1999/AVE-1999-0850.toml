[basic]
description = 'Novell GroupWise 5.2/5.5 的 Web 服务器组件 GWWEB.EXE 存在目录遍历（"点点"攻击）漏洞。远程攻击者无需身份认证，即可通过向 GWWEB.EXE 的 HELP 参数中构造包含".."（点-点）序列的特制请求，绕过目录限制读取服务器上任意扩展名为 .htm 的文件。该漏洞影响运行 GroupWise Web 访问功能的系统，攻击者可借此获取敏感页面内容（如帮助文档、管理界面或可能嵌入的敏感信息），造成信息泄露。利用方式简单，只需发送带有恶意 HELP 参数的 HTTP 请求即可触发，无需特殊权限或前置条件。'
published = "1999-12-19T05:00:00.000"
remediation = '升级至 Novell GroupWise 5.5 SP1 或更高版本（已修复该目录遍历漏洞）；若无法立即升级，可在 Web 服务器层面配置 URL 重写规则拦截包含 ".." 的 HELP 参数请求，或在防火墙层面限制 GWWEB.EXE 访问源 IP 为受信任内网段'
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Netscape Enterprise Server / Novell GroupWise GWWEB.EXE 目录遍历漏洞"
updated = "2026-06-16T21:49:30.380"

