[basic]
description = "Sun Solaris 7.0 系统中的 `/usr/dt/bin/dtprintinfo` 程序存在缓冲区溢出漏洞，由于程序在处理用户输入时未进行充分的边界检查，攻击者可通过向程序提供超长的数据输入，越过预分配的缓冲区边界， corrupting 内存中的控制流信息，并可能最终劫持控制权以执行任意代码。该漏洞影响范围涵盖 Sun Solaris 7.0 及早先版本，只要攻击者具备执行 dtprintinfo 程序的权限，无论本地或远程均可能触发。利用方式为构造恶意数据包，其中包含足够长的字符串来触发缓冲区溢出漏洞。漏洞危害等级为 HIGH 级，可导致系统安全完整性完全崩溃并完全被攻陷。"
published = "1999-05-10T04:00:00.000"
remediation = "建议升级到已修复该漏洞的 Solaris 补丁版本（如 Solaris 7 的相应推荐补丁簇或后续 Solaris 8/9 版本）。如暂时无法打补丁，可移除或限制普通用户对 /usr/dt/bin/dtprintinfo 的执行权限（如 chmod 750 并归属 root:bin），或通过 RBAC 限制其调用，以减少本地缓冲区溢出提权风险。"
score = 7.2
severity = "HIGH"
sources = ["exploitdb"]
title = "Sun Solaris 7.0 dtprintinfo 本地缓冲区溢出漏洞"
updated = "2026-06-16T21:49:05.767"

