[basic]
description = "AcuShop Salesbuilder 的启动脚本 .sbstart 文件权限配置不当，被设置为全局可写（world writable），导致本地攻击者可通过向该文件中追加恶意命令来提升权限。攻击者利用此漏洞可获得目标系统的更高权限，从而执行任意操作。该漏洞影响 AcuShop Salesbuilder 相关版本，CVSS v2 评分 7.2，危害等级较高。"
published = "1999-07-30"
remediation = "将 .sbstart 启动脚本权限修改为 755（仅属主可写），确保文件属主为 root 或销售系统专用账号；同时检查并移除 .sbstart 所在目录的全局可写权限，防止普通用户追加恶意命令。建议升级到 AcuShop Salesbuilder 的修复版本或改用受权限控制的启动方式。"
score = 7.2
severity = "HIGH"
sources = [
    "cve",
    "avd",
]
title = "AcuShop Salesbuilder 启动脚本权限提升漏洞"
updated = "2026-06-16"

