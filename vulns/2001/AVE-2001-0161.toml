[basic]
description = "nph-maillist CGI 脚本（3.0/3.5 版本）对用户提交的电子邮件地址未做任何过滤处理，攻击者可在 email 字段中插入反引号等 shell 元字符，导致任意操作系统命令被注入并执行。未经身份认证的远程攻击者仅需构造恶意 HTTP 请求即可利用此漏洞，完全控制目标 Web 服务器。该漏洞利用难度低、影响严重。"
published = "2001-07-02"
remediation = "立即升级 nph-maillist 至 3.5.1 或更高版本，该版本已修复邮件地址字段中反引号等 shell 元字符的过滤缺陷。如厂商已停止维护，建议彻底移除 nph-maillist 组件，改用受支持的邮件列表软件（如 Mailman 3），并在 Web 服务器层面对 CGI 目录禁用特殊字符传递作为临时缓解。"
score = 7.5
severity = "HIGH"
sources = [
    "cve",
    "exploitdb",
]
title = "nph-maillist CGI 邮件列表管理脚本 email address 参数 shell 元字符注入漏洞"
updated = "2026-06-16"

