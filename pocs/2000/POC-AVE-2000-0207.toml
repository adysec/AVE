[info]
author = "ave"
description = "检测 imwheel-solo 脚本是否存在且以 setuid root 权限运行，以此判断系统是否存在本地提权风险。该漏洞利用 HOME 环境变量缓冲区溢出，需本地执行才能验证。"
id = "POC-AVE-2000-0207"
name = "CVE-2000-0230 imwheel Buffer Overflow PoC"
severity = "high"
tags = ["ave-2000-0207"]
vuln_id = [
    "CVE-2000-0230",
    "AVE-2000-0207",
]

[poc]
logic = "all"

[[poc.requests]]
path = "/usr/X11R6/bin/imwheel-solo"
protocol = "file"

[[poc.requests.matchers]]
expect = true
part = "body"
regex = "."
type = "regex"
