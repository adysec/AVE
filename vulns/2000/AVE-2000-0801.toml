[basic]
description = "IBM Net.Data 7.0 的 db2www 组件中存在全路径泄露漏洞。document.d2w CGI 程序未对用户输入的指令参数进行有效过滤，远程攻击者无需身份认证即可向该程序发送不存在的命令，从而触发服务器返回物理路径信息，导致 Web 服务器目录结构等敏感信息泄露。攻击者可利用泄露的路径信息进一步探测其他漏洞或实施针对性攻击。该漏洞影响 IBM Net.Data 7.0 及之前版本，CVSS 评分 5.0，危害等级中危。"
published = "2001-01-09T05:00:00.000"
remediation = "建议升级 IBM Net.Data 至 7.1 或更高版本，该版本已修复路径泄露问题。如无法升级，应修改 document.d2w 脚本，对无效命令不输出详细错误信息；同时在 Web 服务器层面（如 Apache/IBM HTTP Server）配置自定义 404/500 错误页面，关闭详细错误提示路径，并可结合 chroot 机制限制 CGI 脚本可访问的文件系统范围。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "IBM Net.Data 7.0 完整路径泄露漏洞"
updated = "2026-06-16T21:53:10.103"

