[basic]
description = "Adobe Flash Player 存在 Use-After-Free 漏洞（CVE-2015-0311），具体存在于 ByteArray 类的 UncompressViaZlibVariant 方法中。攻击者可通过构造恶意 Flash 内容，诱导用户访问嵌入恶意 SWF 文件的网页，触发内存释放后重用漏洞，实现远程代码执行。该漏洞影响 Windows/OS X 上 13.0.0.262 及 14.x、15.x、16.x 至 16.0.0.287 版本，以及 Linux 上 11.2.202.438 及之前版本。CVSS 3.1 评分 9.8（CRITICAL），攻击向量为网络、攻击复杂度低、无需权限、无需用户交互。2015 年 1 月已在野利用，CISA 已列入已知被利用漏洞目录。Adobe 已发布安全更新修复，建议升级至 Flash Player 16.0.0.305 或更高版本。Metasploit 框架已集成利用模块（ExploitDB-36360），多个公开 PoC 可在 GitHub 获取。"
published = "2015-01-23T21:59:04.897"
remediation = "立即卸载 Adobe Flash Player 并升级至现代浏览器原生 HTML5 支持。若必须保留旧版 Flash，请升级至 16.0.0.305 及以上版本（Windows/OS X）或 11.2.202.554 及以上版本（Linux），下载地址：https://get.adobe.com/cn/flashplayer/。临时缓解：浏览器禁用 Flash 插件或设置为“点击播放”，企业可通过组策略禁用 Flash ActiveX/插件。"
score = 9.8
severity = "CRITICAL"
sources = ["kev"]
title = "Adobe Flash Player 释放后使用远程代码执行漏洞"
updated = "2026-06-17T00:19:58.077"

