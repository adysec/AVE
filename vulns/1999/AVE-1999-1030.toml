[basic]
description = "AS/400 共享文件夹功能与 Microsoft SNA Server 3.0 及更早版本交互时存在权限控制缺陷。当多个用户共享相同的本地 APPC LU（逻辑单元）时，SNA Server 未能正确隔离用户之间的文件夹访问权限，导致用户可越权查看其他用户的共享文件夹内容，造成敏感信息泄露。攻击者只需在共享同一 APPC LU 的环境中拥有合法用户身份即可利用，无需额外认证或复杂操作。"
published = "1999-12-31T05:00:00.000"
remediation = "升级至 Microsoft SNA Server 4.0 或更高版本，该版本已修复共享 Local APPC LU 导致的文件夹泄露问题。如无法升级，可为每个用户配置独立的 Local APPC LU 别名，避免不同用户共享同一 LU，作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "IBM AS/400 与 Microsoft SNA Server 共享文件夹信息泄露漏洞"
updated = "2026-06-16T21:50:05.937"

