[basic]
description = "FreeBSD 3.3 系统自带的 gdc 程序在运行过程中未对符号链接进行安全校验，存在符号链接竞争（symlink attack）漏洞。本地已登录的普通用户可利用该缺陷，在程序以较高权限写入临时文件或配置文件时，预先创建指向受保护文件的符号链接，诱使 gdc 程序通过链接覆盖或修改本无权访问的系统文件或其他用户文件，从而提升本地权限或破坏系统完整性。该漏洞影响 FreeBSD 3.3 版本中默认安装的 gdc 程序，攻击前提是攻击者需在目标主机上拥有本地账户并能在程序运行期间实施符号链接操作，属于本地提权类安全问题。"
published = "1999-12-01T05:00:00.000"
remediation = "升级 FreeBSD 至 3.4 及以上版本（该漏洞已在 FreeBSD 3.4 中修复），或移除 gdc 程序的 setuid/setgid 权限位（chmod u-s /usr/bin/gdc），限制普通用户对 gdc 临时目录的写权限以防止符号链接劫持。"
score = 2.1
severity = "LOW"
sources = ["exploitdb"]
title = "FreeBSD 3.3 gdc 程序符号链接漏洞"
updated = "2026-06-16T21:49:12.140"

