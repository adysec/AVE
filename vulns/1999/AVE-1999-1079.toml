[basic]
description = "Windows NT 3.51 及 4.0 系统内核中存在非分页池资源耗尽漏洞。本地用户可通过运行恶意程序对同一文件创建大量锁操作，导致系统非分页池（NonPagedPool）内存被迅速耗尽，最终引发系统崩溃拒绝服务。该漏洞为本地利用，攻击者需具备系统本地账户权限，影响 Windows NT 3.51 和 4.0 版本，CVSS 评分 2.1，危害等级低。"
published = "1999-12-31T05:00:00.000"
remediation = "Windows NT 3.51 和 4.0 已停止支持，无官方补丁；建议升级至 Windows 2000 或更高版本。临时缓解措施：限制非授权用户的本地登录权限，监控非分页池内存使用量，避免不可信程序长时间持有大量文件锁。"
score = 2.1
severity = "LOW"
sources = ["avd"]
title = "Microsoft Windows NT 拒绝服务漏洞"
updated = "2026-06-16T21:50:16.840"

