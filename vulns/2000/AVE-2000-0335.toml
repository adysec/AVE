[basic]
description = "Microsoft IIS 4.0/5.0 存在 URL 恶意文件扩展名解析漏洞，攻击者可通过向服务器发送包含大量文件扩展名的超长复杂 URL 触发该漏洞，导致 IIS 服务崩溃并造成拒绝服务。该漏洞影响运行 IIS 4.0/5.0 的 Windows 2000/XP/2003 系统，攻击者无需身份认证即可远程利用，通过精心构造的恶意 URL 耗尽服务器资源，使 IIS 托管的网站服务完全不可用，用户无法正常访问 Web 服务。该漏洞源于 IIS 对 URL 中文件扩展名解析逻辑存在缺陷，无法正确处理异常长度的扩展名序列，导致服务进程异常终止。攻击者只需发送单个恶意 HTTP 请求即可触发拒绝服务，攻击门槛低、危害大，建议立即升级至 IIS 5.0 SP1 或更高版本，或安装微软安全公告 MS00-057 提供的补丁程序（KB269862）。"
published = "2000-05-11T04:00:00.000"
remediation = "建议立即升级 IIS 至 5.0 SP1 或更高版本，或安装 Microsoft 安全公告 MS00-057 提供的补丁程序（KB269862）。若暂无法升级，可在 IIS 服务器前部署 WAF 或应用层防火墙，配置规则拦截包含异常长文件扩展名的恶意 URL 请求（如包含大量连续点号或扩展名的请求），同时在 IIS 中禁用不必要的脚本映射扩展名以减少攻击面。建议同时在防火墙层面限制非必要的外部访问 IIS 管理端口。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "微软 IIS 4.0/5.0 文件扩展拒绝服务漏洞"
updated = "2026-06-16T21:51:39.220"

