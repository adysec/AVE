[basic]
description = "Becky! Internet Mail 客户端 1.26.03 及更早版本存在缓冲区溢出漏洞。当用户回复包含超长 Content-type MIME 头的恶意邮件时，邮件客户端在处理该头部时未正确验证输入长度，导致缓冲区溢出，造成程序崩溃拒绝服务。攻击者只需构造特制邮件并诱导用户回复即可触发，无需身份认证。该漏洞影响 Becky! Internet Mail 1.26.03 及之前所有版本，CVSS 评分 5.0，危害等级中危。"
published = "2000-10-20T04:00:00.000"
remediation = "立即升级 Becky! Internet Mail 至 1.26.04 或更高版本（当前最新版本为 2.83.03），该漏洞已在后续版本中修复。如暂时无法升级，建议在邮件客户端设置中关闭自动预览及自动回复功能，不回复来源不明的邮件，并在网络层面对可疑 SMTP/POP3 流量进行深度包检测以拦截恶意载荷。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Becky Internet Mail 客户端缓冲区溢出拒绝服务漏洞"
updated = "2026-06-16T21:52:22.417"

