[basic]
description = "Caldera 和 Mandrake Linux 发行版中 KDM（KDE 显示管理器）的默认配置存在安全漏洞，允许来自任意主机的 XDMCP（X 显示管理器控制协议）连接。未经身份认证的远程攻击者可利用此漏洞，通过 XDMCP 协议连接到目标系统，获取敏感信息或绕过额外的访问限制。该漏洞影响 Caldera、Mandrake Linux 及其他可能使用相同默认配置的 Linux 发行版，CVSS 评分 10.0，危害等级严重。"
published = "1999-08-22T04:00:00.000"
remediation = "立即修改 kdm 的 Xaccess 配置文件（通常位于 /etc/X11/xdm/Xaccess），将默认的允许任意主机连接改为仅允许受信任的 IP 地址段，或直接注释掉所有非本地的 XDMCP 条目。如无需远程图形登录功能，可在 /etc/inetd.conf 或 xdm 配置中完全禁用 XDMCP 服务。同时升级到 Caldera OpenLinux 安全公告 CSSA-1999-021 或 Mandrake MDKSA-2002:025 中指定的修复版本。"
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "Caldera Linux kdm 默认配置信息泄露漏洞"
updated = "2026-06-16T21:51:35.020"

