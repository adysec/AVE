[basic]
description = "IBM AIX 4.3.2 的 FTP 服务守护进程 ftpd 调用的 libc 标准库函数存在缓冲区溢出漏洞，未经身份认证的远程攻击者可通过向目标系统的 FTP 端口发送特制的请求数据包触发该漏洞，成功利用可导致任意代码执行，实现完全控制目标主机。该漏洞远程可利用、无需认证，CVSS 评分 10.0，危害等级严重。"
published = "1999-09-28T04:00:00.000"
remediation = "建议升级 AIX 至 4.3.3 或更高版本（如 5.3/6.1/7.x），或安装 APAR IX87162 补丁。AIX 4.3.2 已停止维护，应迁移至受支持版本。临时缓解措施：编辑 /etc/inetd.conf 注释 ftpd 行后执行 refresh -s inetd 禁用 FTP 服务，改用 SSH/SFTP 进行文件传输。"
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "IBM AIX ftpd 远程缓冲区溢出漏洞"
updated = "2026-06-16T21:49:03.690"

