[basic]
description = "MIT Kerberos 4/5 的 KDC 服务程序在处理 AUTH_MSG_KDC_REQUEST 请求时未正确校验字符串的空终止符，远程攻击者无需认证即可向目标 KDC 服务器发送特制的畸形请求报文，触发服务崩溃，导致拒绝服务。该漏洞影响 Kerberos 4.0、5 1.0、5 1.1.1 及 5-1.1 版本，CVSS 评分 5.0，危害等级中危。建议升级至修复版本。"
published = "2000-06-09T04:00:00.000"
remediation = "MIT Kerberos 5 用户应升级至 krb5-1.2 或更高版本，或应用 MIT 官方针对 krb5-1.0.x/krb5-1.1.1 提供的源码补丁。MIT Kerberos 4 用户须应用 MIT 官方补丁。KTH-krb4 用户应升级至 0.10 及以上版本（推荐 1.0.1）。Red Hat Linux 用户应安装 RHSA-2000-031 提供的更新包。Heimdal 实现不受此漏洞影响。临时缓解措施可在防火墙层面限制对 KDC UDP 88 端口的非信任来源访问。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "MIT Kerberos KDC AUTH_MSG_KDC_REQUEST 空终止符未校验拒绝服务漏洞"
updated = "2026-06-16T21:51:58.560"

