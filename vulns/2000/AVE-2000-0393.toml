[basic]
description = "Allegro RomPager 2.10 HTTP 服务器存在拒绝服务漏洞，远程攻击者可通过向目标设备发送特制的畸形认证请求（malformed authentication request），导致服务器进程崩溃或资源耗尽，无法正常响应合法用户请求。该漏洞影响运行 Allegro RomPager 2.10 版本的嵌入式设备，攻击无需身份认证，仅需网络可达即可触发，危害等级高。"
published = "2000-06-01T04:00:00.000"
remediation = "升级 Allegro RomPager 至最新版本（当前为 RomPager 4.x/5.x，支持 HTTP 1.1 完整安全特性），该漏洞在后续版本中已修复。如无法升级，在反向代理或防火墙层面对 HTTP 认证请求进行格式校验，过滤畸形认证头（malformed Authorization header），并限制对 RomPager HTTP 端口的访问来源 IP。"
score = 7.5
severity = "HIGH"
sources = ["exploitdb"]
title = "Allegro RomPager HTTP 服务器拒绝服务漏洞"
updated = "2026-06-16T21:51:48.193"

