[basic]
description = "Corel Word Perfect 8 for Linux 在运行时会在 /tmp 目录下创建临时工作目录，并将该目录权限设置为全局可写（world-writable），导致本地攻击者可利用此漏洞实施两类攻击：一是在该目录中放置恶意配置文件或修改正常文件，从而影响 Word Perfect 的执行行为；二是通过符号链接（symlink）攻击，诱导程序以高权限写入或读取其他用户文件，造成敏感信息泄露或权限提升。该漏洞影响 Linux 平台上的 Corel Word Perfect 8，攻击者需拥有本地系统访问权限，攻击门槛较低。"
published = "1998-12-18T05:00:00.000"
remediation = "立即将临时工作目录（通常为 /tmp/wp*.tmp）的手动权限改为 700：chmod 700 /tmp/wp*.tmp；或创建启动包装脚本，在运行 WordPerfect 前执行 umask 077 限制临时文件权限；同时设置 cron 定期扫描并修正 /tmp 下 WordPerfect 相关目录权限，防止符号链接劫持。如业务允许，建议迁移至仍在维护的文字处理软件。"
score = 2.1
severity = "LOW"
sources = ["avd"]
title = "Corel WordPerfect 8 for Linux 临时目录权限不当导致信息修改漏洞"
updated = "2026-06-16T21:49:52.520"

