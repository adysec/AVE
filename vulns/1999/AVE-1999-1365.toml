[basic]
description = "Compaq/Microcom 6000 Access Integrator 存在认证机制缺陷，系统未限制失败登录尝试次数，远程攻击者可对用户名和密码实施暴力破解攻击，从而获取未授权访问权限。该漏洞影响 Compaq/Microcom 6000 系列产品，攻击者无需任何身份认证，通过网络即可进行字典式暴力猜解，严重威胁系统安全。"
published = "1998-06-03T04:00:00.000"
remediation = "该产品已停止维护，建议升级至支持账户锁定策略的现代访问网关设备。如无法替换，可在网络层面限制源 IP 访问（仅允许受信任管理网段），并部署入侵检测系统监控暴力破解行为作为临时缓解措施。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "Compaq/Microcom 6000 Access Integrator 暴力破解漏洞"
updated = "2026-06-16T21:49:49.910"

