[basic]
description = "phpMyAdmin 的 setup.php 脚本存在静态代码注入漏洞，远程攻击者无需身份认证即可通过向该脚本的 save 操作发送特制请求，将任意 PHP 代码写入 config/config.inc.php 配置文件中，从而实现远程代码执行。该漏洞影响 phpMyAdmin 2.11.x 系列 2.11.9.5 之前版本及 3.x 系列 3.1.3.1 之前版本，CVSS 评分为 9.8，危害等级严重。"
published = "2009-03-26T14:30:00.267"
remediation = "立即升级 phpMyAdmin 至 2.11.9.5 及以上版本或 3.1.3.1 及以上版本。升级后删除 /config/ 目录或设置目录权限为 750。如无法升级，在 Web 服务器层面禁止访问 /setup.php 路径，并移除 config 目录的写入权限。同时建议将 phpMyAdmin 部署在需认证的路径下，避免直接暴露于公网。"
score = 9.8
severity = "CRITICAL"
sources = ["kev"]
title = "phpMyAdmin 配置文件静态代码注入漏洞"
updated = "2026-06-16T23:06:36.970"

