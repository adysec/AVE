[basic]
description = "Real Networks RealServer 7 及更早版本的管理接口存在敏感信息泄露漏洞。远程攻击者无需身份认证即可通过访问 `/admin/includes/` 路径，获取服务器内存中的部分数据内容，其中可能包含配置信息、会话凭证或其他敏感数据。该漏洞攻击复杂度较低，利用条件简单，可导致目标系统敏感信息泄露。"
published = "2001-01-09T05:00:00.000"
remediation = "立即升级 RealServer 至 8.0 及以上版本，该漏洞已在后续版本中修复。如无法升级，在 Web 服务器或反向代理层配置访问控制，禁止外部 IP 访问 /admin/ 路径；同时建议在防火墙上限制对 RealServer 管理端口 (默认 9090) 的访问仅允许受信任管理 IP。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Real Networks RealServer 远程内存内容泄露漏洞"
updated = "2026-06-16T21:53:19.747"

