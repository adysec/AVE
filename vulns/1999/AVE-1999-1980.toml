[basic]
description = "Tektronix Phaser系列网络打印机（740/750/750DP/840/930）中的PhaserLink Web服务器存在严重漏洞，攻击者可通过直接调用未记录的URL（如ncl_items.html和ncl_subjects.html）获取管理员密码，进而获得打印机完全控制权。此漏洞影响840.0及更早版本，攻击者无需身份验证即可远程利用，攻击路径简单直接。该漏洞CVSS评分达到10.0，表明其风险极其严重。补救措施包括升级到安全版本，禁用未记录URL，并加强管理员认证机制。修复后应确保所有内部功能URL都经过适当验证，并删除任何潜在的隐藏漏洞，导致目标打印机完全被攻陷。"
published = "1999-11-16T05:00:00.000"
remediation = "建议立即升级 Tektronix PhaserLink 固件至 840.1 或更高版本（联系 Tektronix 技术支持获取固件）；若无法升级，请在防火墙/ACL 限制打印机 Web 管理端口（80/443）仅允许受信管理 IP 访问，并修改默认管理员密码；建议将打印机置于隔离 VLAN，禁止直接暴露在互联网或办公网段。"
score = 10
severity = "CRITICAL"
sources = ["exploitdb"]
