[basic]
description = 'Samba 3.0.0 至 3.0.25rc3 版本的 smbd 服务中 MS-RPC 功能存在命令注入漏洞。当 smb.conf 配置中启用了 "username map script" 选项时，远程攻击者可通过向 SamrChangePassword 函数发送包含 shell 元字符（如反引号、管道符）的特制请求，在目标服务器上以 root 权限执行任意系统命令。该漏洞影响广泛部署的 Samba 文件共享服务，攻击无需认证即可触发，Metasploit 框架已集成利用模块，危害严重。厂商已发布 3.0.25rc4 及以上版本修复此漏洞。'
published = "2007-05-14T21:19:00.000"
remediation = "升级 Samba 至 3.0.25 及以上版本。如无法立即升级，在 smb.conf 中移除或注释所有外部脚本调用配置项（包括 username map script、add printer command、delete printer command、add user script、delete user script 等），并禁用未授权的匿名 MS-RPC 访问。"
score = 6
severity = "MEDIUM"
sources = ["tenable"]
title = "Samba smbd 用户名映射脚本远程命令执行漏洞"
updated = "2026-06-16T22:39:37.017"

