[basic]
description = "WWW 目录启用了自动索引（目录浏览）功能，当目录中不存在 index.html 等默认索引文件时，远程攻击者通过浏览器直接访问该目录即可获取目录内所有文件的完整列表，导致敏感信息泄露。该漏洞影响大量未正确配置的 Web 服务器（包括 Apache、Nginx、IIS 等），攻击者无需任何身份认证即可利用，CVSS 评分 10.0，危害等级严重。修复方式为关闭目录自动索引功能或在目录中添加默认索引文件。"
published = "1999-01-01T05:00:00.000"
remediation = "在 Web 服务器（Apache/Nginx/IIS）配置中禁用目录自动索引功能。Apache 需将 `Options Indexes` 改为 `Options -Indexes`；Nginx 设置 `autoindex off`；IIS 取消「目录浏览」权限。同时确保每个目录存在默认首页文件（如 index.html）。"
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "Web 服务器目录自动索引信息泄露漏洞"
updated = "2026-06-16T21:48:39.290"

