[basic]
description = "Solaris Solstice AdminSuite 2.1 及 2.2 版本存在不安全锁文件创建漏洞。由于程序在创建锁文件时未正确设置文件权限，本地攻击者可利用符号链接攻击等方式操纵锁文件，从而覆盖系统关键文件或提升权限至 root。该漏洞影响 Solaris 操作系统上的 AdminSuite 组件，攻击者需拥有本地访问权限，CVSS 评分 6.2，危害等级中危。"
published = "1997-11-10T05:00:00.000"
remediation = "升级 Solaris Solstice AdminSuite 至 2.3 及以上版本，或安装 Sun 官方补丁 106900-01（SPARC）/ 106901-01（x86）。临时缓解措施：以 root 身份运行 `chmod 1777 /var/tmp /tmp` 确保临时目录 sticky-bit 生效；在运行 AdminSuite 工具前执行 `umask 077` 限制锁文件权限；移除受影响的 AdminSuite 软件包中无需的 setuid 程序（如 `/usr/sbin/admintool`）的执行权限。"
score = 6.2
severity = "MEDIUM"
sources = ["avd"]
title = "Sun Solaris Solstice AdminSuite 不安全锁文件创建本地权限提升漏洞"
updated = "2026-06-16T21:50:25.080"

