[basic]
description = "splitvt 是一款终端分屏工具，其 1.6.5 之前版本在处理 `-rcfile` 命令行参数时存在格式字符串漏洞。本地攻击者可通过向该参数传递特制的格式化字符串，利用 printf 类函数的内存读写缺陷覆盖任意内存地址，从而以 root 权限执行任意代码，实现本地提权。该漏洞影响 Debian 2.2 及其他使用受影响版本 splitvt 的系统，CVSS 评分 7.2，危害等级高。"
published = "2001-03-12T05:00:00.000"
remediation = "立即将 splitvt 升级至 1.6.5 及以上版本。对于已停止支持的 Debian 2.2 系统，建议升级到受支持的操作系统版本。如无法升级，可移除 splitvt 的 setuid 权限并限制本地用户执行 splitvt 以降低风险。"
score = 7.2
severity = "HIGH"
sources = ["exploitdb"]
title = "Debian splitvt 格式字符串漏洞"
updated = "2026-06-16T21:53:40.580"

