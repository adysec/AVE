[basic]
description = "Netscape Enterprise Server 4.x 及更早版本中的 Web Publishing 功能存在目录列表泄露漏洞。远程攻击者无需身份认证，通过向目标服务器发送特制的 INDEX 命令即可列举 Web 根目录下的任意目录结构，从而获取敏感文件路径信息。该漏洞可被攻击者用于信息收集，为进一步攻击提供攻击面。CVSS 评分 5.0，危害等级中等。"
published = "2001-06-02T04:00:00.000"
remediation = "立即升级至 Netscape Enterprise Server 4.1 以上版本，该漏洞已在后续版本中修复。如无法升级，可禁用 Web Publishing 功能模块或通过访问控制列表限制 INDEX 命令的使用。鉴于 Netscape Enterprise Server 已停止维护，建议迁移至 Oracle iPlanet Web Server 7.0+ 或 Apache HTTP Server 等仍在安全更新期内的 Web 服务器产品。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Netscape Enterprise Server INDEX 目录遍历漏洞"
updated = "2026-06-16T21:53:57.843"

