[basic]
description = 'Internet Explorer 5.0 的 MSHTML.DLL 组件存在不可信脚本粘贴漏洞，远程攻击者可通过构造恶意网页，利用脚本将用户本地文件路径粘贴至文件上传内建控件中，从而在用户无感知的情况下强制上传任意本地文件。该漏洞属于 MS98-013 公告所述"不可信脚本粘贴"问题的变种，攻击者无需任何用户交互即可窃取敏感文件。影响 Internet Explorer 5.0 及可能更早版本，CVSS v2.0 评分为 10.0，危害严重。'
published = "1999-05-17"
remediation = "安装 Microsoft 安全公告 MS98-013 提供的补丁，将 mshtml.dll 升级至 4.72.3509.0100 及以上版本。对于 Windows 98 用户，通过 Windows Update 获取关键更新。对于已停止支持的旧系统，建议升级至受支持的 Windows 版本并使用现代浏览器，同时在 IE 中禁用活动脚本和跨域访问作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Microsoft Internet Explorer 5.0 未信任脚本粘贴漏洞"
updated = "1999-05-17"

