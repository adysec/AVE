[basic]
description = "SSH 1.2.27 在集成 Kerberos 认证支持时，会将 Kerberos 票据缓存文件创建在用户登录时的当前工作目录下，而非安全的临时目录。当用户主目录挂载在 NFS 等共享文件系统上时，远程攻击者可通过网络嗅探窃取该目录下的票据缓存文件，从而获取 Kerberos 认证凭据，实现身份伪造和越权访问。此漏洞影响 SSH 1.2.27 的 Kerberos 认证功能，CVSS 评分 7.2，危害等级高危。"
published = "2000-07-05"
remediation = "升级至 SSH 2.x 或 OpenSSH 版本，这些版本已修复票据缓存文件创建位置问题；配置 Kerberos 票据缓存路径为安全的本地临时目录，如设置 KRB5CCNAME 环境变量指向 /tmp 目录，而非使用当前工作目录；避免将用户主目录挂载在 NFS 等共享文件系统上，或启用 NFS 安全挂载选项防止远程嗅探票据缓存。"
score = 7.2
severity = "HIGH"
sources = ["cve"]
title = "SSH 1.2.27 Kerberos认证票据缓存嗅探漏洞"
updated = "2026-07-21"

