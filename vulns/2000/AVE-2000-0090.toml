[basic]
description = "Microsoft Outlook Express 5 存在 JavaScript 变量访问漏洞，攻击者可通过访问引用后续已读邮件的脚本变量，远程查看用户邮箱中的邮件内容。此漏洞导致未授权访问用户电子邮件隐私信息，影响用户数据安全。攻击者无需身份验证即可利用此漏洞获取邮箱中的邮件内容。"
published = "2000-02-01"
remediation = "建议升级至 Internet Explorer 5.01 Service Pack 1 或更高版本（含修复补丁 KB247962），或升级至 Outlook Express 6.0/Windows Live Mail 等更新版本。临时缓解措施：在 IE“Internet 选项 → 安全 → 受限站点”区域将“活动脚本”设为“禁用”，并在 Outlook Express“工具 → 选项 → 安全”选项卡勾选“限制站点区域”，禁止 HTML 邮件运行脚本。"
score = 5.0
severity = "MEDIUM"
sources = ["cve"]
title = "Microsoft Outlook Express 5 JavaScript 邮件访问漏洞"
updated = "2026-07-18"

