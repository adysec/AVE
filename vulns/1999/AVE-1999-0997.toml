[basic]
description = "Internet Security Scanner (ISS) 5.3 for Linux 版本中的 install.iss 安装脚本在处理临时文件时存在符号链接攻击漏洞。本地攻击者可通过在临时文件创建前放置符号链接，利用该脚本以运行脚本的权限（通常为 root）修改任意文件权限，导致权限提升或系统文件被篡改。攻击条件为拥有本地系统访问权限。"
published = "1999-02-20"
remediation = "该产品版本已停止维护，建议避免以 root 权限运行 install.iss 脚本；使用专用临时目录并设置粘滞位（sticky bit）防止符号链接攻击；考虑迁移至受支持的替代安全扫描方案。"
score = 7.2
severity = "HIGH"
sources = [
    "cve",
    "nvd",
]
title = "ISS Internet Security Scanner 5.3 for Linux install.iss 安装脚本符号链接漏洞"
