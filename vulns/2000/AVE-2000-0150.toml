[basic]
title = "Linux atsar 包 atsadc 权限检查不当导致本地权限提升漏洞"
description = "Linux 系统 atsar 软件包中的 atsadc 工具在写入输出文件时未正确检查文件权限，导致本地攻击者可通过符号链接攻击等方式利用该漏洞覆盖任意系统文件，从而获取 root 权限。该漏洞影响 atsar 包的所有版本，攻击者需要本地系统访问权限。"
severity = "HIGH"
score = 7.2
sources = ["cve"]
published = "2000-03-11"
updated = "2026-06-16"
remediation = "升级 atsar 软件包至包含权限检查修复的最新版本，或手动修复 atsadc 工具确保输出文件创建时使用安全权限，避免符号链接竞争条件攻击。"
[references]
urls = ["http://archives.neohapsis.com/archives/bugtraq/2000-03/0102.html", "http://www.securityfocus.com/bid/1048"]
