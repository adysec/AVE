[basic]
description = "Joomla! 的 ZiMBCore（com_zimbcore）组件 0.1 版本存在目录穿越漏洞。该组件在处理 index.php 的 controller 参数时未对用户输入进行充分过滤，远程攻击者可构造包含 `..`（点点）序列的恶意请求，绕过路径限制读取服务器上的任意文件（如配置文件、敏感源码等）。由于 Joomla! 通常部署于公开 Web 服务器，任何未经过身份认证的远程用户只要能访问目标站点即可发起攻击，无需特殊权限或前置条件，攻击门槛较低。利用方式简单，仅需向 index.php 发送带有恶意 controller 参数的 HTTP 请求即可触发，除任意文件读取外还可能造成其他未明确的影响，属于高危信息泄露类漏洞。"
published = "2010-04-29T17:30:00.683"
remediation = "建议立即卸载或禁用 Joomla! ZiMBCore 0.1 组件，或升级至 ZiMB Manager 系列最新版本。临时缓解措施：在 Web 应用防火墙层面拦截包含目录遍历序列（../）的 controller 参数请求，或在 Joomla 后台禁用 com_zimbcore 组件。"
score = 7.5
severity = "HIGH"
sources = ["nuclei"]
title = "Joomla! 组件 ZiMBCore 0.1 - 局部文件包含漏洞"
updated = "2026-06-16T23:18:41.490"

