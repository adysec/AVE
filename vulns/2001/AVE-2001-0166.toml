[basic]
description = "Samba 2.2.0 之前版本存在不安全的临时文件符号链接漏洞。本地攻击者可通过打印机队列查询、smbclient 中的 more 命令或 mput 命令，利用符号链接攻击将临时文件重定向到任意系统文件，从而覆盖目标文件内容。该漏洞需要攻击者拥有本地访问权限，CVSS 评分 2.1，危害等级低。建议升级至 Samba 2.2.0 或更高版本以修复此问题。"
published = "2001-07-02T04:00:00.000"
remediation = "升级 Samba 至 2.2.0 或更高版本，该版本修复了打印机队列查询及 smbclient 中 more/mput 命令的符号链接检查机制。如无法升级，限制本地用户对 /tmp 目录的写权限，并禁用 smbclient 的 mput/more 命令作为临时缓解措施。"
score = 2.1
severity = "LOW"
sources = ["redhat"]
title = "Samba 2.0.x 不安全临时文件符号链接攻击本地文件覆盖漏洞"
updated = "2026-06-16T21:54:14.870"

