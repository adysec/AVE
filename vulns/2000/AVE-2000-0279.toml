[basic]
description = "WebStar HTTP 服务器存在缓冲区溢出漏洞，远程攻击者无需任何身份认证，通过向目标服务器发送超长 GET 请求即可触发该漏洞，导致服务器进程崩溃并停止响应正常请求，造成拒绝服务。该漏洞影响 StarNine WebStar HTTP Server 多个版本，CVSS v2.0 评分 5.0，危害等级中等，利用难度较低。"
published = "2000-03-31T05:00:00.000"
remediation = "升级 WebSTAR HTTP Server 至 4.0 或更高版本，该版本已修复长 GET 请求导致的缓冲区溢出问题。由于 WebSTAR 已停止维护，建议迁移至 Apache HTTP Server、Nginx 等现代 Web 服务器。如在迁移前需缓解风险，可在网络层部署 IDS/IPS 拦截超长 URI 请求。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Webstar HTTP Server 缓冲区溢出拒绝服务漏洞"
updated = "2026-06-16T21:51:24.517"

