[basic]
description = "ATS Computing 的 atsar 软件包中的 atsadc 工具在 Linux 系统中未能正确检查输出文件的权限，导致本地攻击者可通过符号链接攻击等方式利用该漏洞，以 root 权限覆盖或写入任意系统文件，实现本地权限提升。该漏洞影响 atsar_linux 1.4 版本，需本地用户权限作为攻击条件。"
published = "2000-03-11T05:00:00.000"
remediation = "立即升级 atsar 软件包至 1.4 以上版本，该版本已修复 atsadc 输出文件权限检查缺失问题。如无法升级，建议移除 atsar 软件包（rpm -e atsar），改用 sysstat 或 sar 等现代系统监控工具替代。此外，限制本地非授权用户对 atsadc 二进制文件的执行权限（chmod 750 /usr/sbin/atsadc）可作为临时缓解措施。"
score = 7.2
severity = "HIGH"
sources = ["epss"]
title = "AT Computing atsar Linux atsadc 本地权限提升漏洞"
updated = "2026-06-16T21:51:08.920"

