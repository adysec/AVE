[basic]
description = "Microsoft 数据访问组件（MDAC）中远程数据服务（RDS）DataFactory 组件存在访问控制缺陷（CWE-264），运行 IIS 3.x 或 4.x 及 MDAC 2.1 的系统暴露了不安全的方法接口，未经身份认证的远程攻击者可通过构造恶意请求调用这些危险方法，从而在目标服务器上以系统权限执行任意命令。该漏洞影响 Microsoft IIS 3.0/4.0、MDAC 2.1、Microsoft Index Server 2.0 及 Microsoft Site Server Commerce Edition 3.0 等产品，CVSS v2 评分为满分 10.0，危害等级为严重。攻击者无需任何凭据即可在远程直接利用该漏洞完全控制服务器，造成数据泄露、系统被控等严重后果。Microsoft 在 MS98-004 及 MS99-025 安全公告中发布了对应补丁，建议受影响用户尽快升级修复。"
published = "1999-07-19T04:00:00.000"
remediation = "建议立即为 Microsoft Data Access Components (MDAC) 2.1 安装微软安全公告 MS99-025 提供的 RDS 安全补丁，或将 MDAC 升级至 2.1 SP2 及以上版本；在 IIS 中通过配置 URLScan 或移除 /msadc/msadcs.dll 的脚本执行权限，并禁用或删除 RDS DataFactory 组件（将其注册表或 IIS 映射移除），以阻止远程调用 unsafe 方法；若暂不能打补丁，应在边界防火墙阻断对外网暴露 80/443 端口上对 /msadc/ 路径的访问作为临时缓解措施。"
score = 10
severity = "CRITICAL"
sources = ["exploitdb"]
title = "Microsoft MDAC RDS 远程命令执行漏洞"
updated = "2026-06-16T21:49:31.110"

