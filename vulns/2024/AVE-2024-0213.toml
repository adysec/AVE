[basic]
description = "奥威亚云视频平台（AVA Cloud Video Platform）的 UploadFile.aspx 接口存在任意文件上传漏洞。该接口位于 /Services/WeikeCutOut/UploadFile.aspx，在处理文件上传时未对上传路径做充分校验，攻击者可通过构造 VideoGuid 参数为 /../../ 形式的目录穿越路径，将恶意文件（如 webshell）写入目标服务器 Web 目录。未经身份认证的远程攻击者只需向目标系统发送特制的 multipart/form-data POST 请求即可实现任意文件上传，进而上传可执行脚本造成远程代码执行（RCE）。该漏洞影响部署了存在缺陷版本奥威亚云视频平台的设备，攻击门槛低、无需登录，可导致服务器被远程控制，危害严重。"
published = "0823"
remediation = "建议立即升级奥威亚云视频平台至最新安全版本，在 Web 应用防火墙配置规则拦截包含 ../ 路径遍历的 UploadFile.aspx 请求，限制上传目录执行权限仅允许特定文件类型，禁用不必要的文件上传功能模块作为临时缓解措施"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "奥威亚云视频平台UploadFile.aspx文件上传漏洞"
updated = "0823"

