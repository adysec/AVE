[basic]
description = "GNOME 库 1.0.8 中存在缓冲区溢出漏洞，本地用户可通过向使用 espeaker 功能的程序（如 nethack）传递超长的 --espeaker 参数触发该漏洞，导致缓冲区溢出，从而获取 root 权限。该漏洞影响 Mandriva Linux Mandrake 6.0 及使用受影响 GNOME 库的 Linux 发行版，CVSS 评分 7.2，危害等级高。利用前提是攻击者拥有本地系统访问权限。"
published = "1999-09-23T04:00:00.000"
remediation = "升级 GNOME 库至 1.0.9 及以上版本，或升级操作系统至 Mandriva Linux 更高发行版。对于现代系统，避免在 setuid 程序中直接传递用户可控参数给 espeaker 程序，并在编译时启用栈保护（-fstack-protector）以缓解缓冲区溢出风险。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "GNOME Libraries espeaker 本地缓冲区溢出漏洞"
updated = "2026-06-16T21:50:31.527"

