[basic]
description = 'Ipswitch IMail Server 5.0 及 WS_FTP Server 1.0.1/1.0.2 存在本地权限提升漏洞。本地攻击者可通过将注册表中 "flags" 键值设置为 1920，从而获取额外系统权限，进而修改或添加邮件账户。该漏洞需要攻击者拥有本地访问权限，利用门槛较低，可导致未授权账户操作和数据泄露。'
published = "1999-02-02T05:00:00.000"
remediation = '限制对注册表中 `HKEY_LOCAL_MACHINE\SOFTWARE\Ipswitch\WS_FTP\flags` 键的写入权限，仅允许 Administrators 组访问。同时将 Ipswitch WS_FTP Server 升级至 2.0 及以上版本，或改用已停止支持的替代方案；对于 IMail Server，升级至 5.0 之后的安全版本并限制本地交互式登录用户范围。'
score = 4.6
severity = "MEDIUM"
sources = ["epss"]
title = "Ipswitch WS_FTP Server 本地权限提升漏洞"
updated = "2026-06-16T21:49:52.283"

