[basic]
description = "Linux gpm（通用鼠标服务器）程序在处理 /dev/gpmctl 设备时存在拒绝服务漏洞。本地攻击者可通过向 /dev/gpmctl 设备发送大量 STREAM 套接字连接，导致 gpm 程序资源耗尽或崩溃，从而无法正常处理鼠标事件，影响系统的图形界面交互功能。该漏洞影响 OpenLinux 2.3/2.4、RedHat 6.0/6.1 及 SCO eServer 2.3 等多个 Linux 发行版。"
published = "1999-11-23T05:00:00.000"
remediation = "升级 gpm 软件包至 1.20 及以上版本（如 RedHat 6.2 已修复），或安装对应厂商补丁（RHSA-2000:030、SCO 安全公告 2000-05-22）。如无法升级，可通过限制本地用户对 /dev/gpmctl 设备的访问权限作为临时缓解措施。"
score = 2.1
severity = "LOW"
sources = ["cve"]
title = "Linux gpm 本地拒绝服务漏洞"
updated = "2026-06-16T21:51:56.170"

