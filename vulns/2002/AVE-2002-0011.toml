[basic]
description = "OpenSSL 0.9.6d 及之前版本、0.9.7-beta2 及之前版本中存在缓冲区溢出漏洞。远程攻击者可通过向 SSL2 协议发送特制的大尺寸客户端主密钥（client master key），或向 SSL3 协议发送超长会话 ID（session ID），触发缓冲区溢出，进而导致远程代码执行。该漏洞影响广泛部署的 Apache mod_ssl 等使用 OpenSSL 的应用程序，CVSS 评分 7.5，危害等级高。"
published = "2002-08-12T04:00:00.000"
remediation = "立即升级 OpenSSL 至 0.9.6e 或 0.9.7-beta3 及以上版本，同时升级 Apache mod_ssl 至最新版本。如无法立即升级，可在 Apache 配置中禁用 SSLv2 协议（SSLProtocol all -SSLv2）作为临时缓解措施，并限制仅使用 TLS 协议通信。"
score = 7.5
severity = "HIGH"
sources = ["osv"]
title = "OpenSSL SSL2/SSL3 缓冲区溢出远程代码执行漏洞"
updated = "2026-06-16T21:57:52.810"

