[basic]
description = "IP-Switch IMail 与 Seattle Labs Slmail 2.6 邮件服务软件中存在缓冲区溢出漏洞。远程攻击者可通过向 SMTP 服务发送超长 VRFY 命令参数触发栈缓冲区溢出，导致服务拒绝服务，在特定条件下可进一步实现远程代码执行。该漏洞影响上述邮件系统的 SMTP 组件，利用无需认证，攻击门槛较低。"
published = "1999-01-01T05:00:00.000"
remediation = "该漏洞存在于 SLMail 2.6 及更早版本的 VRFY 命令处理中，超长参数导致栈缓冲区溢出。厂商后续版本已修复此问题，建议尽快升级至 SLMail 3.0 及以上版本，或迁移至 Ipswitch IMail 最新版本。若无法立即升级，应在 SMTP 代理或 IPS 设备上限制 VRFY 命令参数长度不超过 256 字节，并禁用 VRFY/EXPN 命令以降低攻击面。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "IP-Switch IMail 和 Seattle Labs Slmail 缓冲区溢出漏洞"
updated = "2026-06-16T21:47:57.770"

