[basic]
description = "华磊科技物流管理系统的/modifyInsurance.htm接口处存在SQL注入漏洞，攻击者无需认证即可通过构造恶意customerId参数向PostgreSQL数据库注入延时SQL语句（如AND 6269=(SELECT 6269 FROM PG_SLEEP(5))），利用时间盲注技术可逐字提取数据库中敏感信息，包括用户凭证、物流订单数据等，严重威胁系统数据安全。"
published = "2024-07-01"
remediation = "对customerId、documentCode、insuranceValue等所有输入参数使用预编译SQL语句（PreparedStatement）或参数化查询，避免直接拼接用户输入；部署WAF规则拦截含有SQL关键字（如AND、PG_SLEEP、UNION等）的请求参数，并限制数据库账户权限为最小必要原则。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "华磊科技物流管理系统modifyInsurance接口SQL注入漏洞"
updated = "2024-07-01"

