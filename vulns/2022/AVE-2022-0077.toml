[basic]
description = "Linux 内核 dma-buf/dma-resv 子系统存在释放后使用漏洞，当通过显式导出/导入 UAPI 向 dma_resv 对象添加栅栏(fence)时，内核错误地假设新栅栏一定比所有现有栅栏更新，未经此检查导致攻击者可强制内核触发释放后使用错误。本地攻击者可利用此漏洞实现权限提升或系统崩溃，影响使用该内核组件的 Linux 发行版，CVSS 评分 7.8，危害等级高。"
published = "2025-06-18T11:15:20.340"
remediation = "立即升级 Linux 内核至 5.19.8 及以上版本，或 6.0 及以上正式版本。如无法升级整个内核，可单独向后移植补丁 commit a3f7c10a269d5b77dd5822ade822643ced3057f0（稳定版后移植 ID：c4c798fe98adceb642050819cb57cbc8f5c27870），该补丁在 dma_resv 添加新 fence 时增加了时间顺序校验，防止用户态通过显式导出/导入接口触发释放后使用（Use-After-Free）。亦可限制非授权用户对 /dev/dma-heap 等 DMA-BUF 设备的访问作为临时缓解。"
score = 7.8
severity = "HIGH"
sources = ["msrc"]
title = "Linux kernel dma-buf/dma-resv 释放后使用漏洞"
updated = "2026-06-17T05:19:34.340"

