[basic]
description = "Microsoft Hotmail 在处理邮件中的 HTML STYLE 标签时未正确过滤其中的 JavaScript 代码，导致存在跨站脚本攻击（XSS）漏洞。远程攻击者可向目标用户发送特制邮件，当用户在 Hotmail 中查看邮件时，恶意的 JavaScript 代码将在用户浏览器中执行，进而可窃取用户的会话凭证、账户信息或操纵其邮箱内容。该漏洞影响 Hotmail 用户，攻击者无需任何认证。利用方式简单，仅需构造包含恶意 JavaScript 的 STYLE 标签邮件即可触发。"
published = "1999-09-13T04:00:00.000"
remediation = "升级 Internet Explorer 至 5.01 SP2 及以上版本（或 IE 6.0）。在「Internet 选项」→「安全」→「Internet 区域」中将安全级别设为「高」，并禁用「活动脚本」。推荐使用现代浏览器访问 Outlook.com。如使用 Netscape，请升级至 4.61 及以上版本。"
score = 5.1
severity = "MEDIUM"
sources = ["cve"]
title = "Microsoft Hotmail HTML STYLE 标签跨站脚本漏洞"
updated = "2026-06-16T21:48:58.727"

