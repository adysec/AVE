[basic]
description = "Unix/Linux 系统中用户权限控制基于 UID（用户 ID）而非用户名进行判断，当两个或多个系统账户被错误配置为相同的 UID 时，这些账户将共享完全相同的文件访问权限和资源所有权。此问题属于系统管理配置缺陷，攻击者可以利用共享 UID 的其他账户访问本不应授权的文件或资源，导致信息泄露或权限提升。该漏洞影响各类 Unix 发行版，需通过审计并修正账户 UID 配置进行修复。"
published = "1999-01-01T05:00:00.000"
remediation = "使用 `awk -F: '{print $3}' /etc/passwd | sort | uniq -d` 检查重复 UID，对冲突账户执行 `usermod -u 新UID 用户名` 分配唯一 UID，并用 `find / -uid 旧UID -exec chown -h 新UID {} +` 更新文件属主。同时建立用户创建流程确保自动分配不重复 UID。"
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "Unix 系统账户 UID 重复安全漏洞"
updated = "2026-06-16T21:48:38.230"

