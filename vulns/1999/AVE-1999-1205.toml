[basic]
description = "IBM AIX 3.2 操作系统中的 crontab 组件存在一处未明确说明的安全漏洞。由于该漏洞的具体成因与攻击向量在公开资料中未予披露，仅确认其属于本地权限提升类缺陷。已登录目标系统的本地用户可利用该漏洞，通过尚未公开的攻击方式将自身权限提升至 root 超级用户，从而完全控制受影响的 AIX 3.2 主机，读取、篡改或破坏系统关键数据并执行任意高权限操作。该漏洞影响范围为运行 IBM AIX 3.2 版本的系统，攻击前提条件是攻击者需先获得目标主机的本地普通用户访问权限，CVSS 评分为 7.2，危害等级为高。"
published = "1999-12-31T05:00:00.000"
remediation = "建议将 IBM AIX 升级至受支持的 5.3/6.1/7.x 版本（AIX 3.2 已停止维护，无官方补丁）；在无法立即升级时，临时将 crontab 二进制文件权限收紧为 755 属主 root，移除其他用户的 setuid 位（chmod 755 /usr/bin/crontab），并限制仅授权用户访问 /var/spool/cron/crontabs 目录以缓解本地提权风险。"
score = 7.2
severity = "HIGH"
sources = ["cve"]
