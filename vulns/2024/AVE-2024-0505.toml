[basic]
description = "QHora 路由器 QuRouter 系统存在身份认证绕过漏洞（CWE-287）。攻击者在获得本地网络访问权限后，无需有效凭证即可利用该漏洞绕过身份验证机制，进而破坏系统安全性。该漏洞影响 QuRouter 2.5.0.140 之前版本，CVSS 评分 5.2，危害等级中危。QNAP 已在 QuRouter 2.5.0.140 版本中修复此漏洞。"
published = "2025-06-06T16:15:23.323"
remediation = "立即将 QHora 设备的 QuRouter 固件升级至 2.5.0.140 或更高版本。如无法立即升级，建议在路由器管理界面中将管理端口仅绑定到内网可信接口，并启用访问控制列表（ACL）限制仅允许受信任 IP 地址访问管理后台。"
score = 5.2
severity = "MEDIUM"
sources = ["zdi"]
title = "QNAP QHora QuRouter 身份验证绕过漏洞"
updated = "2026-06-17T07:01:09.040"

