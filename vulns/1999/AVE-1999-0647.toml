[basic]
description = 'ISC BIND 8.2 及 8.2.1 版本的 named 服务在处理客户端请求时，未能正确限制单个进程所打开的文件描述符数量，存在"fdmax"文件描述符耗尽缺陷。未经身份认证的远程攻击者可向目标 DNS 服务器持续发起大量连接请求，使 named 进程消耗超过 fdmax 限制的文件描述符，导致服务无法接受新连接而拒绝服务。该漏洞影响运行 BIND 8.2/8.2.1 的 DNS 服务器（包括 IRIX 6.5.17、Solaris 7.0 等平台），攻击仅需网络可达目标 53 端口即可发起，无需任何权限，属于远程拒绝服务类漏洞。'
published = "1999-11-10T05:00:00.000"
remediation = "建议将 ISC BIND 升级至 8.2.2 或更高版本（官方已在 8.2.2 中修复 fdmax 文件描述符耗尽问题）。若无法立即升级，可在 named 配置中调低 options 块的 fdmax 限制，并通过防火墙限制仅允许受信任的递归客户端访问 53 端口，以减少被耗尽文件描述符的攻击面。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
