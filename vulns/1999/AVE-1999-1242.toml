[basic]
description = "SGI IRIX 6.4 及更早版本中的 netprint 程序在查找并执行 disable 程序时，直接信任用户可控的 PATH 环境变量，而未使用绝对路径。本地已登录的普通用户可通过在 PATH 中前置一个伪造的 disable 可执行文件，使 netprint 以更高权限运行该恶意程序，从而提升自身权限至 root。该漏洞影响运行 IRIX 6.4 及之前版本且本地存在 netprint 服务的 SGI 系统，攻击条件为攻击者需具备本地账户访问权限，利用方式是在执行 netprint 前篡改 PATH 变量植入恶意 disable 程序实现本地提权。"
published = "1997-01-04T05:00:00.000"
remediation = "升级到已修复该问题的 SGI IRIX 6.5.3 或更高版本；若无法立即升级，可移除 netprint 程序的 setuid 位（执行 chmod u-s /usr/sbin/netprint）并限制普通用户访问，或应用 SGI 官方补丁 3818 以修正其对 PATH 的信任行为，同时审查并收紧相关脚本的环境变量设置。"
score = 4.6
severity = "MEDIUM"
sources = ["exploitdb"]
title = "SGI IRIX netprint 本地权限提升漏洞"
updated = "2026-06-16T21:49:45.770"

