[basic]
description = "University of Washington 开发的 wu-ftpd FTP 服务器软件存在内存泄漏漏洞，攻击者可通过向目标 FTP 服务器发送特制的 SITE NEWER 命令，导致服务器无法正确释放已分配的内存，进而造成内存资源耗尽，最终引发拒绝服务。该漏洞影响 wu-ftpd 多个版本，远程未认证攻击者可利用此漏洞使服务崩溃，无需任何权限即可实施攻击。"
published = "1999-10-01T04:00:00.000"
remediation = "升级 wu-ftpd 至 2.6.0 及以上版本，该版本修复了 SITE NEWER 命令的内存泄漏问题。如无法升级，建议迁移至 vsftpd 或 ProFTPD 等仍在维护的 FTP 服务器软件，并在迁移前限制匿名用户的 SITE 命令执行权限作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "University of Washington wu-ftpd SITE NEWER 内存耗尽拒绝服务漏洞"
updated = "2026-06-16T21:49:14.987"

