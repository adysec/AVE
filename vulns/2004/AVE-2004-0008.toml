[basic]
description = "Microsoft Windows NT 4.0 和 Windows 2000 的 POSIX 子系统存在缓冲区溢出漏洞，本地攻击者可通过向系统传递特制参数（修改消息长度值）触发该漏洞，导致缓冲区溢出，进而实现权限提升至 SYSTEM 级别。该漏洞需攻击者具有本地系统访问权限，无法远程利用。Microsoft 已于 MS04-020 安全公告中发布补丁修复此问题。"
published = "2004-08-06T04:00:00.000"
remediation = '立即安装 Microsoft 安全公告 MS04-020 对应的更新 KB841872。Windows 2000 SP2/SP3/SP4 用户直接运行 Windows2000-kb841872-x86-enu /quiet /norestart 静默安装；Windows NT 4.0 SP6a 用户运行对应平台安装包。如无法安装补丁，可通过注册表编辑器删除 HKEY_LOCAL_MACHINE\SYSTEM\CurrentControlSet\Control\Session Manager\Subsystems\Posix 键值以禁用 POSIX 子系统，重启后生效。由于 Windows NT 4.0 和 Windows 2000 已停止支持，建议尽快升级至 Windows 10/11 或 Windows Server 2022 等受支持版本。'
score = 7.8
severity = "HIGH"
sources = ["kev"]
title = "Microsoft Windows NT 4.0/2000 POSIX 子系统本地缓冲区溢出权限提升漏洞"
updated = "2026-06-16T22:05:10.397"

