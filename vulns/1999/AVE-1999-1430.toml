[basic]
description = "SunOS 4.1.1 及更早版本中的 rpc.pwdauthd 守护进程未正确限制远程访问权限，导致未经认证的远程攻击者可直接连接该服务并获取系统敏感信息（如用户账户信息等）。该漏洞利用门槛低，无需任何认证即可远程触发，影响所有运行受影响版本 SunOS 的系统。由于 rpc.pwdauthd 默认监听网络端口，攻击者可通过发送特制 RPC 请求实现信息泄露。"
published = "1991-01-15T05:00:00.000"
remediation = "升级到 Solaris 2.0 (SunOS 5.x) 或更高版本，该问题已在后续版本中修复。如无法升级，应立即在 /etc/inetd.conf 中注释或移除 rpc.pwdauthd 条目并重启 inetd 进程以禁用该服务，同时通过防火墙限制对 RPC 端口 111/tcp 和 111/udp 的访问，仅允许可信主机连接。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Sun SunOS RPC pwdauthd 远程信息泄露漏洞"
updated = "2026-06-16T21:50:03.313"

