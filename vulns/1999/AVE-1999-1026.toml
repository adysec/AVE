[basic]
description = "Microsoft Office 98 Macintosh Edition 在创建文件时未正确初始化分配的磁盘空间，导致先前删除文件中的残留数据被嵌入到 Office 文件中，造成敏感信息泄露。攻击者可通过获取目标 Office 文件并分析其中未被擦除的磁盘残留数据，恢复出用户此前删除的敏感信息。该漏洞影响 Office 98 Mac 版本，CVSS 评分 2.1，危害等级低，利用难度较高，需物理或远程访问已生成的 Office 文件。"
published = "1999-12-31T05:00:00.000"
remediation = "该漏洞存在于 Microsoft Office 98 Macintosh Edition，官方补丁见微软知识库文章 Q189529。建议立即安装该补丁，可通过 https://support.microsoft.com/kb/189529 获取。因 Office 98 Mac 版已停止支持多年，强烈建议升级至仍在安全更新周期内的 Microsoft Office for Mac 版本（如 Office 2019 或更高），从根源上消除文件初始化时残留已删除数据导致的信息泄露风险。"
score = 2.1
severity = "LOW"
sources = ["epss"]
title = "Microsoft Office 98 Macintosh Edition 信息泄露漏洞"
updated = "2026-06-16T21:50:03.430"

