[basic]
description = 'Sun HotSpot Performance Engine VM 存在输入验证缺陷，远程攻击者无需身份认证即可通过向运行 HotSpot 的服务器发送包含 "[" 字符的特制 URL 触发该漏洞，导致 Java 虚拟机崩溃并造成拒绝服务。该漏洞影响 Microsoft IIS 4.0 等集成 Sun Java HotSpot 的 Web 服务器平台，CVSS 评分 5.0，危害等级中等。攻击者只需构造简单的恶意 URL 即可实施攻击，无需其他前置条件。'
published = "1999-07-06"
remediation = "升级至 Microsoft IIS 5.0 或更高版本，该漏洞已在后续版本中修复。如无法升级，卸载 Sun Java HotSpot Performance Engine 或禁用 IIS 对 Java 的调用。在 IIS 中配置 URL 过滤规则，拦截包含非法字符（如 `[`）的请求作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Microsoft IIS 4.0 Sun Java HotSpot 拒绝服务漏洞"
updated = "1999-07-06"

