description = "Daniel Beckham The Finger Server 0.82 Beta 版本存在命令注入漏洞，远程攻击者可通过向 Finger 服务发送包含 Shell 元字符（如管道符 |、分号 ;、反引号 ` 等）的特制查询请求，绕过输入验证并在服务器上下文中执行任意系统命令。该漏洞源于 Finger 服务在处理用户查询参数时未对特殊字符进行过滤或转义，直接拼接到 Shell 命令中执行。影响范围为 The Finger Server 0.82 Beta 版本，CVSS 评分 10.0（严重），攻击条件为网络可达 Finger 服务端口（默认 79/TCP），无需身份认证即可远程利用，攻击者可获取服务器完全控制权限。"
