[basic]
description = "Adobe Substance 3D Sampler 6.0.0及之前版本存在越界写入漏洞（CWE-787），攻击者可通过诱导用户打开特制恶意文件触发该漏洞，导致在当前用户上下文中执行任意代码。该漏洞影响 Adobe Substance 3D Sampler 系列软件，CVSS 评分 7.8，危害等级高危。建议用户尽快升级至安全版本以修复此漏洞。"
published = "2026-06-09T20:16:39.770"
remediation = "立即将 Adobe Substance 3D Sampler 升级到 6.0.1 及以上版本（参考安全公告 APSB26-60）。该版本修复了越界写入漏洞。在升级完成前，切勿在受影响版本中打开来源不明的 .sbsar 或模型文件，以防止恶意文件触发远程代码执行。"
score = 7.8
severity = "HIGH"
sources = ["hwpoc"]
title = "Adobe Substance 3D Sampler 越界写入远程代码执行漏洞"
updated = "2026-06-17T10:39:29.167"

