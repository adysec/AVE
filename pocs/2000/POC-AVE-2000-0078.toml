[info]
author = "AVE"
description = "检测 BSD 系统 /proc/pid/mem 接口权限检查缺陷，本地普通用户可通过修改 stderr 文件描述符操纵目标进程内存空间提升至 root 权限"
id = "POC-AVE-2000-0078"
name = "CVE-2000-0094 PoC"
severity = "high"
tags = ["cve-2000-0094"]
vuln_id = [
    "CVE-2000-0094",
    "AVE-2000-0078",
]

[poc]
logic = "any"

[[poc.requests]]
path = "/proc/curproc/mem"
protocol = "file"

[[poc.requests.matchers]]
expect = true
part = "body"
regex = ".+"
type = "regex"
