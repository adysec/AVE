[basic]
description = "ucd-snmp 3.52 版本的 vacm 模块存在访问控制缺陷，未正确禁用对默认 public 团体字符串的访问权限。远程攻击者无需认证即可利用该漏洞通过 SNMP 协议读取目标系统上的敏感配置信息，导致信息泄露。该漏洞影响 ucd-snmp 3.52 及更早版本，CVSS 评分 5.0，危害等级中等。"
published = "1999-04-06T04:00:00.000"
remediation = '升级 ucd-snmp 至 3.6 或更高版本（该漏洞已在 3.6 中修复），后续版本已更名为 net-snmp，建议迁移至 net-snmp 最新版。如无法升级，修改 snmpd.conf 将默认 public community 改为复杂字符串，并添加 `com2sec notConfigUser default ""` 禁用 public 访问，同时通过防火墙限制 SNMP（UDP 161/162）仅允许受信管理端 IP 访问。'
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "UCD ucd-snmp SNMP 服务器信息泄露漏洞"
updated = "2026-06-16T21:50:01.670"

