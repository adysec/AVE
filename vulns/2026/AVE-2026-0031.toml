[basic]
description = "致远互联 OA 系统存在任意文件读取漏洞，系统在处理文件读取请求时对用户传入的文件路径参数过滤不严，导致存在路径遍历缺陷。未经身份认证的远程攻击者可通过向目标系统发送特制的 HTTP 请求，利用路径遍历技术读取服务器上任意敏感文件，包括数据库配置文件、系统源代码、账户密码文件等，可能导致进一步的信息泄露和服务器被控。该漏洞影响致远 A8+/A6+ 等多个系列版本。官方已发布补丁修复此漏洞。"
published = "08.15"
remediation = "建议立即升级致远OA至最新稳定版本（A8+ V5.1 SP1 及以上或 A6 V6.0 SP2 及以上），联系致远官方获取对应安全补丁包。如无法立即升级，在 Nginx 或 WAF 侧配置规则拦截包含 `../` 路径遍历及 `/seeyon/thirdpartyController.do` 等可疑 URL，同时限制对 `WEB-INF`、`META-INF` 等敏感目录的访问权限。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "致远互联 致远OA 任意文件读取漏洞"
updated = "08.15"

