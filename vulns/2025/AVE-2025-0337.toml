[basic]
description = "金和OA系统中的 ArchivesFileTraceSearch 模块存在 SQL 注入漏洞。攻击者无需身份认证即可通过构造特制的 SQL 查询语句注入到后端数据库执行，导致数据库中的敏感信息泄露，包括管理员账号密码、用户数据等。该漏洞利用复杂度低，攻击者仅需发送恶意 HTTP 请求即可触发，对系统机密性和完整性构成严重威胁。"
published = "0723"
remediation = "升级至金和OA最新安全版本，严格过滤 ArchivesFileTraceSearch 模块的输入参数，采用参数化查询替代拼接 SQL；如暂无法升级，通过 Web 应用防火墙（WAF）拦截包含恶意 SQL 关键字的请求，并在中间件层限制对该接口的非授权访问。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "金和 金和OA ArchivesFileTraceSearch SQL注入漏洞"
updated = "0723"

