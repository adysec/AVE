[basic]
description = "Lotus Domino Server 5.0.1/5.0.2/5.0.3 的 ESMTP（扩展简单邮件传输协议）服务存在缓冲区溢出漏洞。当服务器处理 SMTP 邮件传输命令时，攻击者可向目标系统的 ESMTP 服务发送包含超长 MAIL FROM 命令的恶意请求，由于服务端未对输入长度进行充分校验，导致内部缓冲区发生溢出，进而触发拒绝服务（DoS），使邮件服务崩溃或不可用。该漏洞无需认证即可远程触发，攻击条件简单（低复杂度），仅需向目标 SMTP 端口发送特制数据包即可利用。此漏洞影响 Lotus Domino Enterprise Server 及 Mail Server 5.0.1、5.0.2、5.0.3 版本，CVSS v2 评分为 5.0（中危），主要危害为可用性损失。IBM 已在后续版本中修复该问题，建议用户升级至修复后的版本。"
published = "2000-05-18T04:00:00.000"
remediation = "立即升级 Lotus Domino Server 至 5.0.4 或更高版本，IBM 已在后续版本中修复了 ESMTP 服务的缓冲区溢出漏洞。如使用 5.0.1 版本，可通过 Domino 管理员控制台禁用 ESMTP 服务，或限制 SMTP 服务仅监听内部网络地址（修改 notes.ini 中的 smtpdcommands 参数）。建议在防火墙层面对 SMTP 端口（25）实施访问控制，仅允许可信 IP 段连接。长期方案应迁移到 IBM Domino 6.x 或更高版本，或 IBM Notes/Domino 8.5+ 版本以获得完整安全支持。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Lotus Domino Server ESMTP服务MAIL FROM缓冲区溢出漏洞"
updated = "2026-06-16T21:51:45.880"

