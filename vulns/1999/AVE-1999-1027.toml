[basic]
description = "mSQL (Mini SQL) 2.0.6 存在信息泄露漏洞，远程攻击者可通过向服务器发送 ServerStats 查询请求，获取当前登录用户列表、数据库名称及服务器版本号等敏感信息。该漏洞源于对查询接口未实施有效的访问控制，未经身份认证即可触发，CVSS 评分 7.5，危害等级高。攻击者可利用泄露的信息进一步探测系统缺陷，为后续渗透攻击提供依据。"
published = "1999-02-15T05:00:00.000"
remediation = "将 mSQL 升级至 3.x 最新版本以修复信息泄露问题，或在防火墙层面限制对 mSQL 服务端口（默认 1114/tcp）的非信任来源访问。长远建议迁移至仍受维护的数据库系统（如 MySQL 或 PostgreSQL），并关闭不必要的远程连接功能。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "Hughes Technologies mSQL 服务端敏感信息泄露漏洞"
updated = "2026-06-16T21:50:03.557"

