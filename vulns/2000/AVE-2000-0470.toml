[basic]
description = "SuSE Linux 的 aaa_base 软件包将部分系统账户（如 uucp、games 等）的家目录设置为 /tmp 临时目录，这些系统账户的 .profile、.bashrc 等启动脚本位于 /tmp 下，本地低权限用户可通过创建恶意启动脚本劫持这些系统账户的登录过程，从而获取系统账户的权限，实现本地权限提升。"
published = "2000-05-02"
remediation = "升级 SuSE Linux 的 aaa_base 软件包至 2000.5.2 或更新版本，或将系统账户的家目录从 /tmp 修改为非共享目录（如 /var/lib/<账户名>），并删除 /tmp 下对应的 .profile、.bashrc 等启动脚本文件。"
score = 4.6
severity = "MEDIUM"
sources = ["cve"]
title = "SUSE Linux aaa_base 本地权限提升漏洞"
updated = "2026-06-16"

