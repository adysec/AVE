[basic]
description = "Kerberos V 中所集成的 Kerberos IV 兼容库存在缓冲区溢出漏洞，本地用户可通过 KRB_CONF 环境变量指定包含超长内容的 kerberos 配置文件路径，造成缓冲区溢出，成功利用此漏洞可获得系统的 root 权限。该漏洞使低权限本地用户能够完全控制受影响的系统，广泛影响部署了 Kerberos V 并启用 Kerberos IV 兼容模式的网络认证环境。"
published = "1997-04-29T04:00:00.000"
remediation = "立即将 Kerberos V 升级至 1.0 patch level 1 或更高版本，可从 MIT 官网获取更新。OpenBSD 用户应更新至 OpenBSD-current 并重新编译 Kerberos 库。如无法升级，移除 setuid/setgid 的 Kerberos IV 兼容程序，并在系统层面禁用 KRB_CONF 环境变量传递。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "MIT Kerberos 缓冲区溢出漏洞"
updated = "2026-06-16T21:50:08.190"

