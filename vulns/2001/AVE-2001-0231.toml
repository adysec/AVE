[basic]
description = "ElectroSystems Engineering Inc. 出品的 ElectroComm 2.0 及更早版本的 Telnet 服务存在拒绝服务漏洞。远程攻击者无需身份认证即可通过向目标系统的 23 端口发送超过 160000 个字符的超长字符串，导致 Telnet 服务崩溃或停止响应，造成拒绝服务。该漏洞利用方式简单，攻击门槛低，影响 ElectroComm 1.0/2.0 版本。"
published = "2001-08-14T04:00:00.000"
remediation = "建议升级到 ElectroComm 2.0 以上版本（如厂商已停止支持，应迁移至替代产品）。临时缓解措施：在防火墙上限制对 TCP 端口 23 的访问，仅允许可信 IP 连接；或禁用 Telnet 服务改用 SSH 替代。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "ElectroSoft ElectroComm Telnet 服务拒绝服务漏洞"
updated = "2026-06-16T21:54:32.487"

