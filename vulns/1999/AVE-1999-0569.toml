[basic]
description = "Microsoft Internet Explorer 4.01 及 5.0.1 版本存在跨帧访问安全漏洞。远程攻击者可通过在 'about:' JavaScript URL 中插入 '%01' 特殊字符，诱使浏览器使用该字符后指定的域名解析页面，从而绕过同源策略限制，实现跨域读取本地文件内容或伪造任意网页。攻击者需诱导用户访问恶意构造的链接即可触发，无需任何身份认证，CVSS 评分 10.0，危害等级严重。"
published = "1999-01-26"
remediation = "升级到 Internet Explorer 5.5 及以上版本即可修复此漏洞。由于 Internet Explorer 已停止安全支持，强烈建议迁移到 Microsoft Edge 或其他现代浏览器（如 Chrome/Firefox），并启用 Windows 自动更新以保持系统安全。如无法升级浏览器，可在 IE 安全设置中将 Internet 区域安全级别设为高并禁用活动脚本。"
score = 10.0
severity = "CRITICAL"
sources = [
    "cve",
    "exploitdb",
]
title = "Microsoft Internet Explorer 跨框架访问安全限制绕过漏洞"
updated = "2026-06-16"

