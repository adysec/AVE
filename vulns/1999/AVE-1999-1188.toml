[basic]
description = "tags.<value>Man2html 2.1 及更早版本存在任意文件写入漏洞，原因在于程序在处理临时文件时未对文件路径进行充分的安全校验。本地攻击者可利用符号链接（symlink）攻击，将临时文件重定向到系统中的任意文件路径，从而覆盖敏感文件或写入恶意内容，最终可能导致权限提升或系统稳定性受损。该漏洞影响所有使用 man2html 2.1 及更早版本的 Linux/Unix 系统，需要具备本地访问权限才能进行利用。"
published = "1999-08-20T04:00:00.000"
remediation = "立即升级 man2html 至 2.2 或更高版本，该版本已使用 mkstemp() 等安全函数创建临时文件，修复了通过符号链接覆盖任意文件的问题。如暂时无法升级，可通过包管理器安装系统安全更新（如 Debian/Ubuntu 执行 apt upgrade man2html，RHEL/CentOS 执行 yum update man2html），或临时移除 man2html 的 setuid/setgid 权限（chmod u-s,g-s $(which man2html)）以缓解本地提权风险。"
score = 4.6
severity = "MEDIUM"
sources = ["cve"]
title = "man2html 临时文件符号链接攻击 任意文件写入漏洞"
updated = "2026-06-16T21:50:43.720"

