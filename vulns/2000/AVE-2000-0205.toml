[basic]
description = "gpm 软件包中的 gpm-root 组件存在权限管理缺陷，未能正确丢弃提升的权限（setgid），导致本地攻击者可通过在 gpm-root 中启动系统工具来获取额外的本地权限。该漏洞影响 gpm 1.18.1/1.19 版本，涉及 Debian 2.x、RedHat 6.x 及 S.u.S.E 5.3/6.x 等 Linux 发行版。攻击者需拥有本地访问权限方能利用，CVSS 评分 7.2，危害等级高危。"
published = "2000-03-22T05:00:00.000"
remediation = "升级 gpm 至 1.20 或更高版本（1.20 之后已修复 gpm-root 未正确降权的缺陷）。如无法升级，执行 `chmod g-s /usr/bin/gpm-root` 移除 gpm-root 的 setgid 权限位，或使用 `dpkg --purge gpm` / `rpm -e gpm` 卸载 gpm 软件包。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "gpm gpm-root 本地权限提升漏洞"
updated = "2026-06-16T21:51:16.460"

