[basic]
description = "网易邮件服务 3.6/3.54/3.55 版本存在 'RCPT TO' 命令解析漏洞，攻击者可通过发送大量或过长的 RCPT TO 命令导致服务器内存异常分配和泄漏，最终引发拒绝服务。该漏洞影响网易邮政服务 3.6、3.54 和 3.55 多个版本，攻击者无需身份验证即可远程触发利用，导致服务器服务不可用及资源耗尽。漏洞原因为邮件服务器对 RCPT TO 命令的长度和数量缺乏有效限制，攻击者可利用此缺陷对目标服务器发起持续的内存耗尽攻击，无法为正常邮件处理提供服务。"
published = "1999-10-29T04:00:00.000"
remediation = "建议升级 Netscape Messaging Server 至 4.x 或更高版本以彻底修复该内存耗尽漏洞。若无法升级，可在 SMTP 网关或防火墙上限制单个连接的 RCPT TO 命令数量及命令长度，并对异常 SMTP 会话设置连接速率限制和超时策略，同时启用邮件服务器进程的内存使用监控与自动重启机制以缓解拒绝服务风险。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Netscape Messaging Server 3.6/3.54/3.55 RCPT TO 拒绝服务漏洞"
updated = "2026-06-16T21:50:38.627"

