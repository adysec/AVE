[basic]
description = "Oracle Web Listener 4.0.x 的 ows-bin 目录中存在批处理文件，远程攻击者可通过向 URL 附加 '?&' 参数构造恶意请求，利用该漏洞在服务器上执行任意命令。攻击者无需身份认证即可通过网络远程触发，可能导致敏感信息泄露、系统被控制等严重后果。"
published = "2000-03-15"
remediation = "Oracle Web Listener 4.0.x 已停止维护，建议升级到 Oracle HTTP Server 或禁用 ows-bin 目录的批处理文件执行权限，限制对 ows-bin 目录的访问。"
