[basic]
description = "SGI IRIX 6.5.4 系统中的 midikeys 程序存在权限处理缺陷，本地攻击者可通过文本编辑器利用该程序以提升的权限修改任意系统文件，从而实现本地权限提升。该漏洞影响 SGI IRIX 6.5.4 及可能的相关版本，攻击者需拥有本地系统访问权限，无需网络远程即可触发，危害等级严重。"
published = "1999-05-19T04:00:00.000"
remediation = "立即安装 SGI 安全公告 19990501-01-A 提供的补丁，或从 ftp://patches.sgi.com/support/free/security/advisories/19990501-01-A 获取。如无法打补丁，可移除 midikeys 程序的 setuid 位（chmod u-s /usr/sbin/midikeys）或直接删除该程序作为临时缓解措施。SGI IRIX 已停止维护，建议迁移至受支持的操作系统。"
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "SGI IRIX midikeys 本地任意文件修改漏洞"
updated = "2026-06-16T21:49:00.710"

