[basic]
description = "GCC 2.7.2 及之前版本在编译过程中会在临时目录下创建 .i、.s、.o 等临时文件，但未能安全地处理文件名，采用可预测的临时文件名。本地攻击者可通过在临时目录中预先创建指向目标文件的符号链接，诱导 GCC 覆写任意系统文件，导致权限提升或拒绝服务。该漏洞影响 Linux/Unix 系统下的 GCC 编译器，利用前提是攻击者拥有本地用户权限，CVSS 评分 2.1，危害等级低。建议升级至 GCC 2.8.0 或更高版本修复此问题。"
published = "1998-01-02T05:00:00.000"
remediation = "升级至 gcc 2.8.0 或更高版本，新版本使用 mkstemp() 安全创建临时文件，避免可预测文件名导致的符号链接攻击。如无法升级，可通过设置环境变量 TMPDIR 指向仅当前用户可写的私有临时目录作为临时缓解措施。"
score = 2.1
severity = "LOW"
sources = ["avd"]
title = "GNU gcc 临时文件符号链接攻击漏洞"
updated = "2026-06-16T21:50:26.613"

