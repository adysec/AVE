[basic]
description = "某U挖矿质押单语言系统的 /admin/login/setpassword 接口存在未授权访问漏洞，攻击者无需任何身份认证即可直接访问该接口，通过构造恶意请求修改管理员登录密码，进而获取系统后台完全控制权限。该漏洞攻击条件低，仅需目标系统网络可达即可利用，危害严重，可能导致用户数字资产被盗、质押数据被篡改、系统配置被恶意修改等严重后果。"
published = "2024-08-29"
remediation = "在 /admin/login/setpassword 接口增加管理员身份验证和会话校验机制，禁止未登录状态下直接修改密码；同时添加操作日志记录和二次确认步骤，防止未授权请求绕过。如无法立即修复，可在 Web 服务器层面对该路径添加 IP 白名单访问控制或临时禁用该接口。"
score = 5.0
severity = "MEDIUM"
sources = ["hwpoc"]
title = "某U挖矿质押单语言系统前台未授权修改管理员密码漏洞"
updated = "2024-08-29"

