[basic]
description = "Linux 内核 bcache 子系统中存在空指针解引用漏洞。提交 028ddcac477b 移除了节点分配中的 NULL 指针检查，将 IS_ERR_OR_NULL 替换为 IS_ERR，导致在 cache_set_flush() 函数中，当 c->root 因注册流程失败而为 NULL 时，代码仍尝试访问其成员，引发空指针解引用，造成系统崩溃。本地攻击者需具备低权限即可触发此漏洞，影响系统可用性。该漏洞 CVSS 评分 5.5，危害等级中危。"
published = "2025-01-11T13:15:23.437"
remediation = "更新 Linux 内核至包含提交 028ddcac477b 回退补丁的版本（主线内核 ≥ 6.12，或各发行版已合入该修复的内核包）。Debian 11 用户升级至 linux 5.10.234-1 及以上版本（DLA-4075），Ubuntu 24.04 LTS 用户升级至 linux-image-6.11.0-1011-lowlatency 6.11.0-1011.12~24.04.1 及以上版本（USN-7381-1）。如无法立即更新内核，可通过限制本地用户对 bcache 设备的访问权限作为临时缓解措施。"
score = 5.5
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux Kernel bcache 空指针解引用漏洞"
updated = "2026-06-17T07:58:57.513"

