[basic]
description = "Trend Micro PC-Cillin 6.0 内部代理端口未做访问限制，未经身份认证的远程攻击者可直接访问该端口并向其发送特制请求，从而触发拒绝服务攻击，导致该防病毒软件的防护服务中断。该漏洞影响运行 Trend Micro PC-Cillin 6.0 的系统，攻击者无需任何凭据即可在远程完成利用，进而影响主机的安全防护能力。建议用户升级至 Trend Micro 官方发布的安全版本，并参考厂商公告配置防火墙规则限制对内部代理端口的访问，以降低被攻击的风险。"
published = "1999-12-29T05:00:00.000"
remediation = "升级 Trend Micro PC-Cillin 至官方发布的 6.02 及以上修复版本，该版本已对内部代理端口增加访问控制限制；如暂时无法升级，可在边界防火墙或本地防火墙规则中禁止外部网络访问 PC-Cillin 所用内部代理端口（默认 TCP 12345），仅允许本机回环地址 127.0.0.1 访问，以阻断远程攻击者发起的拒绝服务。"
score = 5
severity = "MEDIUM"
