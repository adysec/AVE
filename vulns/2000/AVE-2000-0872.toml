[basic]
description = "MandrakeUpdate 存在条件竞争漏洞，本地攻击者可在 RPM 文件暂存于 /tmp 目录期间对其进行恶意修改，导致系统安装被篡改的软件包。该漏洞影响 Mandrake Linux 系统，攻击者需拥有本地访问权限，利用时间窗口替换文件实现权限提升或系统控制。CVSS 评分 1.2，危害等级低。"
published = "2000-10-20T04:00:00.000"
remediation = "升级 MandrakeUpdate 至修复版本，确保 RPM 包在 /tmp 目录下载完成后使用原子操作移至安全目录再安装，避免竞争窗口期被本地用户篡改。同时启用 RPM 数字签名验证，安装前校验包完整性。如无法升级，可设置更严格的 /tmp 目录权限（如 1777）并监控异常文件修改行为。"
score = 1.2
severity = "LOW"
sources = ["cve"]
title = "MandrakeSoft MandrakeUpdate 本地条件竞争漏洞"
updated = "2026-06-16T21:52:20.137"

