[basic]
description = "Samba 2.0.5 版本的 NETBIOS 名称服务守护进程（nmbd）存在拒绝服务漏洞。该漏洞源于 nmbd 在处理特制的 NETBIOS 名称服务请求报文时，未能对输入进行充分校验，导致进程崩溃或进入异常状态。攻击者可向运行 nmbd 的服务器发送精心构造的恶意 UDP 数据包（目标端口通常为 137），远程触发服务不可用。影响范围涵盖使用 Samba 2.0.5 并启用 nmbd 进行 NetBIOS 名称解析与浏览服务的主机，攻击无需身份认证，属于远程可触发的拒绝服务。利用方式即向目标 nmbd 端口发送畸形名称服务请求，使其资源耗尽或崩溃，从而导致局域网内名称解析与浏览服务中断。"
published = "1999-07-21T04:00:00.000"
remediation = "升级到 Samba 2.0.5a 或更高版本（推荐 2.0.7）。如无法立即升级，请在防火墙中限制 UDP 137/138 端口仅对可信内网开放，并移除 smb.conf 中所有 message command 配置行，然后重启 nmbd 服务使修复生效。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "Samba 2.0.5 nmbd NETBIOS名称服务守护进程拒绝服务漏洞"
updated = "2026-06-16T21:49:06.230"

