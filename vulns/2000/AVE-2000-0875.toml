[basic]
description = "Helix GNOME Updater 的 helix-update 0.5 及更早版本在创建 /tmp 临时目录时未进行安全处理，存在不安全的临时文件创建漏洞。本地攻击者可利用此漏洞在系统关键路径中创建空配置文件（如 /etc/config.d/bashrc、/etc/config.d/csh.cshrc 及 /etc/rc.config），从而篡改系统配置。该漏洞需要攻击者拥有本地访问权限，攻击复杂度低，但影响范围限于 GNOME 环境下的 Linux 系统。"
published = "2000-10-20T04:00:00.000"
remediation = "升级 helix-update 至 0.5 以上版本。如无法升级，手动设置 /tmp 目录的 sticky bit（chmod +t /tmp），并确保系统关键配置文件（如 /etc/config.d/bashrc）的拥有者为 root 且权限为 644。同时避免在共享环境下使用 helix-update 的默认安装方式。"
score = 1.2
severity = "LOW"
sources = ["cve"]
title = "Helix GNOME Updater 系统配置文件覆盖漏洞"
updated = "2026-06-16T21:52:20.770"

