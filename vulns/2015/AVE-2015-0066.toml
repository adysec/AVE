[basic]
description = "Adobe Flash Player 存在内存地址信息泄露漏洞，攻击者可通过构造恶意的 Flash 内容（如嵌入在网页或 Office 文档中的 SWF 文件）触发该漏洞，从而绕过 Windows 系统的 ASLR 地址随机化保护机制，实现内存地址泄漏或远程代码执行。受影响版本包括 Windows 和 macOS 平台上的 13.0.0.262 及更早版本、14.x 至 16.0.0.287 之前版本，以及 Linux 平台上的 11.2.202.438 及更早版本。攻击者需诱导用户使用受影响的 Flash Player 打开恶意网页或文档，利用该漏洞可实现任意代码执行并完全控制用户系统。该漏洞于 2015 年 1 月被发现在野外活跃利用，CVSS 评分 7.8，危害等级高。Adobe 已在后续安全更新中修复此漏洞，建议用户升级至 16.0.0.287 或更高版本。"
published = "2015-01-23T21:59:00.050"
remediation = "立即升级 Adobe Flash Player 至安全版本：Windows 和 OS X 用户升级到 13.0.0.262 / 16.0.0.287，Linux 用户升级到 11.2.202.438；如无法立即升级，请在浏览器中禁用 Flash 插件作为临时缓解措施。由于 Flash Player 已于 2020 年底终止支持，建议彻底卸载该组件。"
score = 7.8
severity = "HIGH"
sources = ["kev"]
title = "Adobe Flash Player 信息泄露漏洞"
updated = "2026-06-17T00:19:57.890"

