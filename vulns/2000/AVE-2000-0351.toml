[basic]
description = "AppleShare IP 6.1 及之后版本的 Web 服务器组件存在范围请求处理缺陷，远程攻击者无需身份认证即可通过发送特制的无效范围（Invalid Range）HTTP 请求，触发服务器返回越界内存数据，从而泄露潜在的敏感信息。该漏洞影响 AppleShare IP 6.x 系列版本，CVSS 评分 5.0，危害等级中危，建议升级至修复版本或禁用 Web 服务组件。"
published = "2000-05-02T04:00:00.000"
remediation = "升级至 Apple 安全更新（原参考文章 n11670）修复版本。由于 AppleShare IP 产品线已停止技术支持（EOL），建议迁移至 macOS Server 或第三方 NAS 等受支持的替代方案。临时缓解措施可在网络边界防火墙限制对 AppleShare IP Web 服务端口（80/443）的访问，只允许可信来源连接。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Apple AppleShare IP 6.x 信息泄露漏洞"
updated = "2026-06-16T21:51:31.557"

