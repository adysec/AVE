[basic]
description = "Linux 系统的 inetd 超级服务守护进程存在拒绝服务漏洞。远程攻击者无需身份认证即可向目标系统发送特制的 TCP SYN 和 RST 数据包，导致 inetd 进程崩溃或无法正常响应请求，进而造成系统网络服务不可用。该漏洞影响多个 Linux 发行版本，CVSS v2.0 评分 5.0，危害等级中危，攻击复杂度低，且无需用户交互。"
published = "1997-11-01T05:00:00.000"
remediation = "建议将传统 inetd 替换为 xinetd（如 `apt-get install xinetd`）或升级到最新的 inetd 版本，并配置 TCP 包装器（hosts.allow/hosts.deny）限制连接来源。同时可在防火墙添加规则丢弃异常 SYN/RST 包作为缓解。现代 Linux 发行版已默认使用 xinetd 或 systemd socket 激活，不受此漏洞影响。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Linux Kernel inetd SYN/RST 数据包拒绝服务漏洞"
updated = "2026-06-16T21:47:55.917"

