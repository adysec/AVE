[basic]
description = "Matt Wright 开发的 textcounter.pl 1.2 是一款用于统计网站访问量的 Perl CGI 脚本。该脚本在处理用户输入时未对特殊字符进行安全过滤，导致远程攻击者可构造包含 shell 元字符（如分号、管道符、反引号等）的恶意请求，将任意系统命令注入到 Perl 脚本执行环境中，从而在目标 Web 服务器上以 CGI 进程权限执行任意命令。该漏洞影响所有运行 textcounter.pl 1.2 版本且将其作为 CGI 程序暴露在网络中的站点，攻击者无需身份认证，仅需向该脚本发送特制的 HTTP 请求即可完成利用，危害程度极高，可造成服务器被完全控制、敏感数据泄露或被用于进一步内网渗透。"
published = "1998-06-24T04:00:00.000"
remediation = "建议立即停用并删除 Matt Wright textcounter.pl 1.2 脚本，替换为现代计数器方案（如 JavaScript 客户端计数或服务端数据库计数）。若必须保留 CGI 计数器，请在 Web 服务器层面禁用 CGI 执行权限、配置 mod_security 规则过滤 shell 元字符（; | & $ `），并在防火墙层面限制 CGI 目录仅允许 POST/GET 方法访问。"
score = 9.8
severity = "CRITICAL"
sources = ["exploitdb"]
title = "Matt Wright textcounter.pl 1.2 任意命令执行漏洞"
updated = "2026-06-16T21:50:31.793"

