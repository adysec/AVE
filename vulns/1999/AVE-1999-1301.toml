[basic]
description = "当 Microsoft IIS 2 或 3 升级至 IIS 4 时，ism.dll 文件被遗留至 /scripts/iisadmin 目录且未正确限制访问权限。远程攻击者可通过 HTTP 请求直接访问该目录中的 ism.dll 获取敏感服务器信息，包括 Administrator 密码。该漏洞影响 Windows NT 上的 IIS 4 版本，CVSS 评分 2.1，危害等级低。通过在 IIS 管理器中删除或限制 /scripts/iisadmin 虚拟目录的访问权限即可修复。"
published = "1999-01-14T05:00:00.000"
remediation = "立即删除 /scripts/iisadmin 目录下的 ism.dll 文件，并移除该虚拟目录或限制其仅允许本地管理员 IP 访问。升级到 IIS 5.0 及以上版本可彻底修复此问题，建议迁移至受支持的 Windows Server 版本并使用 IIS 10。"
score = 2.1
severity = "LOW"
sources = ["avd"]
title = "Microsoft IIS 4 Web管理接口信息泄露漏洞"
updated = "2026-06-16T21:50:40.317"

