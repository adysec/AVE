[basic]
description = "Red Hat Linux 系统中 xconq 和 cconq 游戏程序存在缓冲区溢出漏洞。本地攻击者可通过向 DISPLAY 环境变量传入超长字符串触发缓冲区溢出，从而获取额外的系统权限。该漏洞影响 Red Hat Linux 多个版本，CVSS 评分 4.6，危害等级中危。利用该漏洞需要本地访问权限，无法远程触发，但可导致普通用户权限提升至 root 级别。"
published = "2000-06-22T04:00:00.000"
remediation = """立即升级 xconq 至 7.2.0 及以上版本（该版本已修复缓冲区溢出问题）。如无法升级，可移除 xconq 和 cconq 的 setuid 位（`chmod u-s /usr/games/xconq /usr/games/cconq`）作为临时缓解措施，或通过 env 限制 DISPLAY 变量长度（`env DISPLAY=$(printf '%.200s' "$DISPLAY") xconq`）。"""
score = 4.6
severity = "MEDIUM"
sources = ["cve"]
title = "Red Hat xconq 缓冲区溢出漏洞"
updated = "2026-06-16T21:52:07.303"

