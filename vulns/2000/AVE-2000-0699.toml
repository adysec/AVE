[basic]
description = "SapporoWorks WinProxy 2.0 及 2.0.1 版本的 HTTP 服务器组件存在拒绝服务漏洞。远程攻击者无需认证，只需向目标系统发送一个未指定 HTTP 版本号的 GET 请求，即可触发服务崩溃，导致正常用户无法访问代理服务。该漏洞影响 WinProxy 2.0 及 2.0.1 版本，CVSS 评分 5.0，危害等级中等。建议用户升级至更高版本以修复此问题。"
published = "2000-06-27T04:00:00.000"
remediation = "升级 WinProxy 至 2.0.2 或更高版本，该版本已修复缺少 HTTP 版本号的 GET 请求导致的拒绝服务问题。如无法升级，可在 WinProxy 前端部署反向代理（如 Nginx），过滤或拒绝缺少 HTTP 版本号的畸形 GET 请求。考虑到 WinProxy 已停止维护，建议迁移至仍在安全更新的代理服务器产品。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "SapporoWorks WinProxy 2.0/2.0.1 HTTP服务拒绝服务漏洞"
updated = "2026-06-16T21:52:04.187"

