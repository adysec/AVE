[info]
author = "AVE"
description = "检测 Microsoft Video ActiveX 控件 (msvidctl.dll) 栈缓冲区溢出漏洞。通过检查 CLSID {0955AC62-BF2E-4CBA-A2B9-A63F772D46CF} 对应的 MPEG2TuneRequest ActiveX 控件是否在目标系统上注册，判断漏洞攻击面是否存在。"
id = "POC-AVE-2008-0022"
name = "CVE-2008-0015 PoC"
severity = "high"
tags = [
    "cve-2008-0015",
    "ave-2008-0022",
    "activex",
    "msvidctl",
]
vuln_id = [
    "CVE-2008-0015",
    "AVE-2008-0022",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}"
protocol = "http"

[poc.requests.body]
content = ""
type = "raw"

[poc.requests.headers]
User-Agent = "AVE/1.0"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["{0955AC62-BF2E-4CBA-A2B9-A63F772D46CF}"]
