[basic]
description = "Palo Alto Networks PAN-OS 的 User-ID 认证门户（即 Captive Portal）服务存在缓冲区溢出漏洞，CVE 编号为 CVE-2026-0300。未经身份认证的远程攻击者可通过向目标防火墙的 Captive Portal 接口发送特制数据包触发该漏洞，导致在 PA-Series 和 VM-Series 防火墙上以 root 权限执行任意代码。该漏洞无需用户交互，攻击复杂度低，CVSS 评分 9.8，危害等级严重。影响 PAN-OS 10.2.x、11.1.x、11.2.x 及 12.1.x 等多个版本，Prisma Access 和 Cloud NGFW 不受影响。CISA 已将其列入已知被利用漏洞目录，表明已存在在野利用。用户应将 PAN-OS 升级至 11.1.6-h32 及以上版本或 10.2.13-h21 及以上版本，并限制 Captive Portal 仅允许受信内网 IP 访问。"
published = "nday"
remediation = "建议将 PAN-OS 升级至 11.1.6-h7 及以上版本或 10.2.13-h6 及以上版本，以修复 Captive Portal 组件中的远程代码执行漏洞。如无法立即升级，可暂时禁用 Captive Portal 功能，或在网络层面限制非信任 IP 对 Captive Portal 服务端口（默认 6082/TCP）的访问作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "Palo Alto Networks PAN-OS Captive Portal 远程代码执行漏洞"
updated = "nday"

