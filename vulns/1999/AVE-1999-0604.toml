[basic]
description = "WU-FTPD 2.4.2、SCO Open Server 5.0.5 及 ProFTPd 1.2 pre1 等 FTP 服务器软件中的 realpath 函数存在缓冲区溢出漏洞。未经身份认证的远程攻击者可通过向目标 FTP 服务发送特制的路径请求触发缓冲区溢出，成功利用此漏洞可在目标系统上以 root 权限执行任意代码，实现完全控制服务器。该漏洞 CVSS 评分 10.0，危害等级严重，且已有公开利用代码。"
published = "1999-02-09T05:00:00.000"
remediation = "升级 wu-ftpd 至 2.6.2 及以上版本，或升级 ProFTPd 至 1.2.1 及以上版本。SCO Open Server 用户应安装最新补丁包或迁移至受支持的操作系统。如无法升级，在 inetd 配置中禁用 FTP 服务或使用 TCP Wrappers 限制访问来源 IP。"
score = 10
severity = "CRITICAL"
sources = ["exploitdb"]
title = "WU-FTPD ProFTPD realpath 远程缓冲区溢出漏洞"
updated = "2026-06-16T21:48:14.780"

