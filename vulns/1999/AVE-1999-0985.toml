[basic]
description = "BisonWare FTP Server 4.1 及更早版本存在拒绝服务漏洞，远程未经身份认证的攻击者可通过向 FTP 服务器的 PORT 命令发送包含非数字字符及大量回车符的畸形数据包，导致服务器进程崩溃或停止响应，造成拒绝服务。该漏洞利用方式简单，无需认证即可触发，影响运行 BisonWare FTP Server 4.1 及之前版本的系统。"
published = "1999-05-17T04:00:00.000"
remediation = "BisonWare FTP Server 已于 2000 年代初停止维护，厂商不再发布安全更新。建议立即迁移至其他受支持的 FTP 服务器软件（如 FileZilla Server、vsftpd），并在防火墙层面限制对 FTP 端口（21/TCP）的访问来源，仅允许可信 IP 连接。如无法立即迁移，可在 FTP 服务器配置中限制 PORT 命令的使用或通过应用层防火墙过滤畸形 PORT 命令。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "BisonWare FTP Server PORT 命令拒绝服务漏洞"
updated = "2026-06-16T21:49:50.407"

