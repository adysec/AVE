[info]
author = "ave"
description = "检测目标是否运行存在缓冲区溢出漏洞的 Linuxconf 服务，通过发送超长 User-Agent 头触发溢出并观察服务异常响应。"
id = "POC-AVE-2000-0044"
name = "Linuxconf 远程缓冲区溢出漏洞 PoC"
severity = "critical"
tags = ["ave-2000-0044"]
vuln_id = [
    "CVE-2000-0017",
    "AVE-2000-0044",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/"
protocol = "http"

[poc.requests.headers]
User-Agent = "AVE-PoC-CVE-2000-0017-"

[[poc.requests.matchers]]
expect = true
part = "body"
status = [500]
type = "status"
