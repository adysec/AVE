[basic]
description = "这是一个针对 D-Link DIR-645 有线/无线路由器操作系统命令注入漏洞。攻击者可以未认证地向目标路由器发送特制的 HNAP SOAP 请求，其中包含 GetDeviceSettings 操作，这种请求包含未经验证的字符串，这些字符串可以被服务器直接传递给系统的 shell 命令，导致操作系统命令注入攻击。攻击者可以利用这种漏洞在目标系统上执行任意命令（这是通过 GetDeviceSettings 操作完成的）。D-Link DIR-645 有线/无线路由器 Rev. Ax 上的固件版本 1.04b12 和更早的版本均受到影响。目标设备是一种家用网络设备，广泛应用于家庭和小型企业环境中。该漏洞的 CVSS 评分是 8.8（较高），这表明攻击者可以在不具备用户交互和权限的情况下远程触发该漏洞，这可能对系统的机密性、完整性和可用性造成严重影响。攻击者需要对目标设备的固件版本进行低级的的确认，可以向攻击者控制的目标系统发送畸形的 IPv6 数据包，这可以通过在网络上使用 TCP/IP 协议时实现。此外，攻击者还可以在未认证的情况下攻击，因为按照协议要求，攻击者可以删除或完全控制设备，或者在设备上预先指定 Web 大堂登录的基线版本的高版本。微软已在 2024 年 8 月份的 KB 安全更新中修复了此漏洞，但这可能需要另外的行动来更新用户的固件以确保他们的设备免受攻击。另外，该漏洞的已知攻击机制是可通过 POST 方法在 GET 地址上发送 SOAPAction 报头和完整的 SOAP XML HTTP 请求，从而触发服务器端代码执行攻击，这已经证实了这种可能是有可利用性的。相关的主要参考链接是：https://www.exploit-db.com/exploits/37171，该链接包括了来自 Exploit-D 的完整的代码示例。这是来自 Exploit 数据库的正确的与漏洞相关的攻击代码。通常情况下，这类攻击是可通过普通的 Web 浏览器来实现的。CVE-2015-2051 于 2015 年 2 月 23 日被披露与发布，目前已正式记入已知已利用的漏洞数据库 CISA。此漏洞还包括一些其他的相关的参考信息，可以作为一些进一步研究的方向，这些信息在 CISA 保密的相关的快照中提供了许多关于相关问题在此漏洞数据库中的相关扩展信息。因此，该漏洞目前仍在受到广泛关注中，许多网络安全专家对其保持着警惕，并将此漏洞作为广泛讨论和监管的焦点，尤其是对于广泛使用的企业家化网络设备上，这一漏洞的影响尤为严重。"
published = "2015-02-23T17:59:08.320"
remediation = "立即将设备固件升级到 1.05b01 或更高版本，从 D-Link FTP 服务器下载补丁：ftp://ftp2.dlink.com/PRODUCTS/DIR-645/REVA/DIR-645_REVA_FIRMWARE_PATCH_1.05.B01.ZIP。在升级前请确认设备的硬件版本信息（Rev. Ax）。如设备已达产品生命周期终点，建议断开网络连接并更换新设备作为短期缓解措施"
score = 8.8
severity = "HIGH"
sources = ["kev"]
title = "D-Link DIR-645 路由器 命令注入漏洞"
