[info]
author = "AVE"
description = "检测 Bugzilla 2.8 process_bug.cgi 是否存在 shell 元字符注入漏洞，通过发送包含分号等特殊字符的请求验证远程命令执行风险"
id = "POC-AVE-2000-0454"
name = "CVE-2000-0421 PoC"
severity = "high"
tags = ["cve-2000-0421"]
vuln_id = [
    "CVE-2000-0421",
    "AVE-2000-0454",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/process_bug.cgi"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "Bugzilla",
    "process_bug",
    "bugzilla",
]
