[basic]
description = "Quake 1 游戏服务器在处理初始 UDP 游戏连接请求时，会以大量流量数据包进行回应，存在流量放大攻击漏洞。远程攻击者通过伪造源 IP 地址发送特制的 UDP 连接请求，可诱使服务器向目标主机发送大量响应数据，从而实现类似 Smurf 攻击的分布式拒绝服务放大效果。该漏洞影响 Quake 1 服务器软件，CVSS 评分 5.0，攻击者无需认证即可利用，被放大后的流量可耗尽目标带宽资源。"
published = "1999-12-22T05:00:00.000"
remediation = "建议升级至 QuakeWorld 或 FTE QuakeWorld 等现代引擎版本，其已修复放大攻击漏洞。若无法升级，在网络边界配置入向 ACL 过滤伪造源 IP 的数据包（BCP 38），并对 UDP 26000 端口实施速率限制以缓解攻击影响。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "id Software Quake 1 服务器 UDP 反射放大漏洞"
updated = "2026-06-16T21:49:38.163"

