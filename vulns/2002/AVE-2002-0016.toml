[basic]
description = "glibc 2.2.5 及更早版本的 DNS 解析器函数存在缓冲区溢出漏洞，该漏洞源自 BIND 4.9.8 中移植的用于网络名称和地址查询的子程序。远程攻击者可通过向目标系统发送特制的 DNS 响应数据包，在调用 getnetbyname 或 getnetbyaddr 等函数时触发缓冲区溢出，导致任意代码执行。该漏洞影响使用受影响 glibc 版本的 Linux 系统，CVSS 评分 7.5，危害等级高。"
published = "2002-08-12T04:00:00.000"
remediation = "将 glibc 升级至 2.3.0 及以上版本，该漏洞在 2.2.5 及更早版本中存在。对于使用 BIND 4.9.8 的系统，应升级至 BIND 8.x/9.x 系列。如暂时无法升级，可在 DNS 解析器层面限制仅向可信 DNS 服务器发起查询，或禁用不需要的 getnetbyname/getnetbyaddr 等函数调用。"
score = 7.5
severity = "HIGH"
sources = ["osv"]
title = "GNU glibc DNS解析器缓冲区溢出远程代码执行漏洞"
updated = "2026-06-16T21:57:56.450"

