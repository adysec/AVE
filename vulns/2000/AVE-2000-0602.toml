[basic]
description = "Network Associates Net Tools PKI Server 1.0 的内置 HTTP 服务器存在拒绝服务漏洞。远程攻击者无需任何身份认证，即可通过向目标服务器发送特制的超长 HTTP 请求触发该漏洞，导致服务器进程异常终止或资源耗尽，造成服务中断。该漏洞影响版本为 1.0 的 Net Tools PKI Server，只要 HTTP 服务对外开放且可被远程访问即可被利用，攻击条件简单，无需交互即可完成拒绝服务攻击。"
published = "2000-06-19"
remediation = "建议立即卸载或停止使用 Network Associates Net Tools PKI Server 1.0 HTTP Server，该产品已停止维护且无官方补丁。建议迁移至现代 PKI 解决方案（如 Microsoft AD CS、EJBCA 或 Venafi）。若无法立即迁移，请在防火墙层面禁止外部访问 HTTP 服务端口（默认 80/443），并限制仅允许受信任内网 IP 访问 PKI 管理接口。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Network Associates Net Tools PKI Server HTTP 服务器拒绝服务漏洞"
updated = "2000-06-19"

