[basic]
description = "Linux 2.2.x 内核在处理包含异常类型、代码和 IP 头长度的畸形 ICMP 数据包时存在处理缺陷，远程攻击者可发送特制 ICMP 包触发内核崩溃导致拒绝服务。该漏洞影响 Linux 2.2.x 内核及基于此内核的 Debian 2.1、RedHat 6.0、SuSE 6.1 等发行版，CVSS 评分 5.0 属中危级别。攻击者无需身份认证即可远程发送畸形 ICMP 包触发拒绝服务，导致目标系统内核崩溃拒绝服务。各大发行版已发布内核补丁修复该漏洞，建议升级至修复版本内核。"
published = "1999-06-01T04:00:00.000"
remediation = "升级 Linux 内核至 2.2.13 及以上版本，该版本修复了畸形 ICMP 报文处理中的边界检查缺陷。如无法升级内核，可在防火墙层面过滤异常 ICMP 类型和代码的入站报文作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
