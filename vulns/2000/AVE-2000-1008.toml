[basic]
description = "Kerberos 5 的 krshd 守护进程存在缓冲区溢出漏洞，远程攻击者无需身份认证即可向目标系统发送特制数据包触发该漏洞，成功利用可获取 root 权限，导致服务器完全受控。该漏洞影响 Kerberos 5 相关版本，CVSS 评分 10.0，危害等级严重。"
published = "2000-05-16"
remediation = "升级 MIT Kerberos 5 至 1.1.1 及以上版本，或应用 Red Hat RHSA-2000-025 补丁。如无法升级，建议限制对 krshd 服务的网络访问，仅允许可信主机连接。"
score = 10.0
severity = "CRITICAL"
sources = [
