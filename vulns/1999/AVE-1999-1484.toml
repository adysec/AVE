[basic]
description = "Symantec Norton Utilities 2.0 for Windows 95 中的 TUNEOCX.OCX ActiveX 控件被错误标记为对脚本安全，远程攻击者可通过诱导用户访问恶意网页，利用该控件的 run 选项执行任意命令。该漏洞影响 Internet Explorer 3.0 等浏览器，攻击者无需身份认证即可实施攻击，危害较大。建议禁用该 ActiveX 控件或升级至不受影响的版本。"
published = "1997-05-04T04:00:00.000"
remediation = "卸载 Norton Utilities 2.0 或升级至不受影响的最新版本；同时通过注册表设置 TUNEOCX.OCX 的 kill bit（CLSID 未知时可使用兼容性标志），阻止 Internet Explorer 调用该 ActiveX 控件作为临时缓解措施。"
score = 5.1
severity = "MEDIUM"
sources = ["avd"]
title = "Symantec Norton Utilities 2.0 ActiveX 控件远程代码执行漏洞"
updated = "2026-06-16T21:50:18.967"

