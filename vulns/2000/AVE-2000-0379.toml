[basic]
description = "Microsoft IIS 4.0 和 5.0 的 ISM.DLL 组件存在文件片段读取漏洞。远程攻击者可通过向目标 IIS 服务器发送特制的畸形文件名请求，在文件名后附加大量 URL 编码空格（%20）并以 .htr 扩展名结尾，从而绕过访问控制读取服务器上的任意文件内容。该漏洞无需身份认证即可远程利用，攻击复杂度低，可导致敏感信息泄露。微软已发布安全公告，建议用户安装相应补丁或禁用 .htr 映射以进行防护。"
published = "2000-05-11T04:00:00.000"
remediation = "建议立即禁用 IIS 中的 .HTR 脚本映射：打开 Internet 服务管理器 → 右键网站 → 属性 → 主属性 → WWW 服务 → 编辑 → 主目录 → 配置 → 删除 .HTR 扩展映射。如业务必须保留 .HTR 功能，则安装 Microsoft 安全公告 MS01-004 提供的累积补丁（IIS 4.0 需 Windows NT 4.0 SP5/SP6a，IIS 5.0 需 Windows 2000 Gold/SP1/SP2）。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "Microsoft IIS 4.0/5.0 .HTR文件片段读取漏洞"
updated = "2026-06-16T21:51:46.553"

