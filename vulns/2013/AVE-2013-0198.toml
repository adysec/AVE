[basic]
description = "Mozilla Firefox 22.0 之前版本、Firefox ESR 17.0.7 之前版本、Thunderbird 17.0.7 之前版本及 Thunderbird ESR 17.0.7 之前版本中存在释放后使用（Use-After-Free）漏洞。该漏洞源于浏览器在处理 onreadystatechange 事件与页面重新加载的交互时，未能正确管理 DocumentViewerImpl 对象的内存生命周期，导致已释放的内存区域被访问。远程攻击者可构造恶意网页，诱使用户访问，触发程序尝试在未映射内存位置执行数据，造成拒绝服务或任意代码执行。该漏洞已被 CISA KEV 收录，存在 Metasploit 公开利用模块，影响范围广泛。"
published = "2013-06-26T03:19:10.793"
remediation = "升级 Firefox 至 22.0 及以上版本，Firefox ESR 升级至 17.0.7 及以上版本，Thunderbird 升级至 17.0.7 及以上版本。如无法立即升级，可在浏览器中禁用 JavaScript（about:config 设置 javascript.enabled=false）作为临时缓解措施，但会严重影响正常功能。"
score = 8.8
severity = "HIGH"
sources = ["kev"]
title = "Mozilla Firefox/Thunderbird onreadystatechange事件处理释放后使用远程代码执行漏洞"
updated = "2026-06-16T23:51:55.617"

