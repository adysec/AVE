[basic]
description = "SunOS 4.1.1 系统中在安装 Sun Source (sunsrc) 磁带时，会将 /usr/release/bin/makeinstall 和 winstall 程序设置为 setuid root 权限。本地普通用户可利用这些 setuid 程序以 root 身份执行任意操作，从而获取系统最高权限。该漏洞影响 SunOS 4.1.1 版本，攻击者需要本地访问权限，CVSS 评分 7.2，危害等级高。"
published = "1991-05-20T04:00:00.000"
remediation = "立即移除 /usr/release/bin/makeinstall 和 /usr/release/bin/winstall 的 setuid 权限：chmod u-s /usr/release/bin/makeinstall /usr/release/bin/winstall。如非必要，直接卸载 Sun Source (sunsrc) 软件包。建议升级至 Solaris 2.6 及以上版本，该版本已移除存在风险的 setuid 安装工具。"
score = 7.2
severity = "HIGH"
sources = ["epss"]
title = "Sun SunOS 4.1.1 本地权限提升漏洞"
updated = "2026-06-16T21:49:46.150"

