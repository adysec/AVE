[info]
author = "ave"
description = "通过HTTP服务器返回包含超长pluginspage属性的EMBED标签HTML页面，验证Netscape Communicator 4.x缓冲区溢出漏洞"
id = "POC-AVE-1999-0244"
name = "Netscape Communicator EMBED Buffer Overflow PoC"
severity = "medium"
tags = ["ave-1999-0244"]
vuln_id = [
    "CVE-1999-0685",
    "AVE-1999-0244",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/poc.html"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["EMBED pluginspage"]
