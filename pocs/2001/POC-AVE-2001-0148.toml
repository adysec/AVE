[info]
author = "ave"
description = "检测 Microsoft FrontPage Server Extensions 中 Visual Studio RAD Support 子组件 (fp30reg.dll) 缓冲区溢出漏洞 CVE-2001-0341（MS01-035/MS03-051）。远程攻击者可通过向 fp30reg.dll 发送超长注册请求 URL 触发栈缓冲区溢出，导致任意代码执行。"
id = "POC-AVE-2001-0148"
name = "Microsoft Visual Studio RAD Support Remote Buffer Overflow PoC"
severity = "high"
tags = ["ave-2001-0148"]
vuln_id = [
    "CVE-2001-0341",
    "AVE-2001-0148",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/_vti_bin/_vti_aut/fp30reg.dll"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "Registered",
    "registration",
]
