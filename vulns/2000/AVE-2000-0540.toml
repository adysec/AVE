[basic]
description = "Zope 2.2 及更早版本的 DocumentTemplate 包存在授权绕过漏洞，远程攻击者可在未经授权的情况下修改 DTMLDocument 或 DTMLMethod 对象。该漏洞源于对模板文档和方法访问控制检查不充分，攻击者通过构造特制请求即可利用，影响 Zope 应用服务器环境。CVSS 评分 7.5，危害等级高。"
published = "2000-06-15T04:00:00.000"
remediation = "升级 Zope 至 2.2.1 或更高版本，该版本修复了 DTML 文档/方法未授权修改漏洞。如无法升级，在 Zope 管理界面中严格限制 DTML 文档和方法的写入权限，仅允许受信任的管理员用户操作，并禁用匿名用户对 DTML 对象的访问。"
score = 7.5
severity = "HIGH"
sources = ["redhat"]
title = "Zope Zope 2.2 DTML文档和DTML方法远程未授权修改漏洞"
updated = "2026-06-16T21:51:49.863"

