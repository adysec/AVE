[basic]
description = "Microsoft Windows NT 4.0 的 RPC Locator 服务（rpcss.exe）存在拒绝服务漏洞。远程攻击者无需身份认证即可向目标系统发送特制的 RPC 请求，导致 RPC Locator 服务崩溃，造成系统拒绝服务。该漏洞影响 Windows NT 4.0 操作系统，攻击条件简单，危害程度中等。"
published = "1997-02-07T05:00:00.000"
remediation = "Microsoft 已于 2004 年终止对 Windows NT 4.0 的支持，不再提供安全更新。建议立即升级至受支持版本的 Windows（如 Windows Server 2019/2022）。临时缓解措施：在防火墙层面屏蔽 UDP 135、137-139、445 及 TCP 135、139、445、593 端口，或停止并禁用 RPC Locator (Remote Procedure Call Locator) 服务。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Microsoft Windows NT 4.0 RPC Locator 拒绝服务漏洞"
updated = "2026-06-16T21:47:57.410"

