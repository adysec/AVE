[basic]
description = "Washington University 开发的 imapd（互联网消息访问协议守护进程）2000a 至 2000c 版本存在缓冲区溢出漏洞。该漏洞源于程序在处理某些输入时未对缓冲区长度进行充分边界检查，导致栈上或堆上的缓冲区可被溢写覆盖。在特定配置下，攻击者作为拥有本地账号但无 shell 访问权限的普通用户，可利用此漏洞在 imapd 进程中执行任意代码，并以自身用户身份获得部分代码执行权限。该漏洞影响运行受影响版本 imapd 的各类 Linux/Unix 服务器，CVSS 评分为 4.6（中危），攻击复杂度低，无需额外认证即可触发。成功利用可导致攻击者在服务器上获得进一步的控制能力，建议升级至补丁版本或更高稳定版本以消除安全隐患。"
published = "2001-09-20T04:00:00.000"
remediation = "建议立即将 Washington University imapd 升级至 2000d 或更高版本，以修复缓冲区溢出漏洞。Red Hat 系统可安装 RHSA-2001:094 安全更新，Mandrake 系统可应用 MDKSA-2001:054 补丁。如暂时无法升级，建议在防火墙中限制 IMAP 服务的本地访问，仅允许可信用户连接。"
score = 4.6
severity = "MEDIUM"
sources = ["redhat"]
title = "华盛顿大学 imapd 缓冲区溢出漏洞"
updated = "2026-06-16T21:54:46.733"

