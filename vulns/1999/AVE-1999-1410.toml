[basic]
description = "Netscape Enterprise Server 部分早期版本在处理 CGI 请求时存在信息泄露缺陷，攻击者可构造特殊请求获取服务器内部路径或环境变量等敏感信息，进而辅助后续攻击。该漏洞无需认证，远程即可触发，影响运行在默认配置下的 Web 服务。"
published = "1999-12-31"
remediation = "升级到 Netscape Enterprise Server 修复版本，或在服务器配置中限制 CGI 目录访问并禁用不必要的 CGI 脚本暴露。"
