[basic]
description = "Microsoft Outlook 97/98/2000 及 Outlook Express 4.0/5.0 的邮件头解析模块存在缓冲区溢出漏洞，攻击者通过构造包含超长 GMT/Date 字段的恶意电子邮件，利用邮件客户端对邮件头长度校验缺失触发栈溢出，导致未经身份认证的远程攻击者可在目标系统上下文中执行任意代码。该漏洞影响广泛使用的 Outlook 与 Outlook Express 多个版本，攻击向量为网络邮件投递，无需用户交互即可触发，属于典型的“畸形邮件头”缓冲区溢出漏洞，CVSS 5.0 中危评级。Microsoft 已发布 MS00-043 安全公告修复该漏洞，建议用户升级至 Office 2000 SR-1 或应用对应补丁。"
published = "2000-07-18T04:00:00.000"
remediation = "建议安装Microsoft 2000 年 7 月发布的Office 2000 SR-1（Service Release 1）或Outlook 2000 SR-1补丁，修复GMT字段缓冲区溢漏洞。如无法立即应用补丁，可在企业防火墙中阻止包含异常长日期字段的电子邮件头部作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Microsoft Outlook 与 Outlook Express 缓冲区溢出漏洞"
updated = "2026-06-16T21:52:00.813"

