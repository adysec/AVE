For the description in Chinese (≥50 characters):
Linux 2.0.3x 内核的 ping 命令在处理带有 -R（记录路由）选项的 ICMP 数据包时，未对 IP 记录路由选项的数据长度进行充分校验。本地攻击者可通过发送超大长度的 ICMP 数据包触发内核内存消耗，导致系统拒绝服务。该漏洞影响 2.0.34 至 2.0.38 版本的 Linux 内核，在 Debian 2.1 和 Red Hat 5.2 等发行版中也存在。
For remediation:
将 Linux 内核升级到 2.0.39 或更高版本，或应用各发行版提供的安全补丁。对于已停止维护的旧版本，建议升级到受支持的 2.2.x 或更高内核系列。升级前请确认新版内核已修复 ICMP 记录路由选项的长度校验问题。
