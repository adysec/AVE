[basic]
description = "GRUB2 的 gettext 国际化模块在处理语言 .mo 文件时存在整数溢出漏洞。函数 grub_gettext_getstr_from_position() 在计算翻译缓冲区大小时未正确校验，导致整数溢出后分配过小的堆缓冲区，进而引发堆越界写入。具有高权限的本地攻击者可通过挂载包含特制 .mo 语言文件的文件系统，在系统启动过程中触发该漏洞，覆盖 GRUB2 堆中的敏感数据，最终绕过 Secure Boot 安全启动保护机制。该漏洞影响所有使用受影响的 GRUB2 版本的 Linux 发行版，CVSS 评分 6.7，危害等级中等。"
published = "2025-02-19T18:15:23.210"
remediation = "立即将 grub2 升级至包含该修复的版本（上游 commit b970a5ed967816bbca8225994cd0ee2557bad515）。各发行版对应：Red Hat 系安装 RHSA 安全更新，Debian/Ubuntu 运行 `apt update && apt upgrade grub-pc grub-efi`，更新后执行 `update-grub` 并重启。如无法立即升级，可限制仅受信任用户拥有物理访问权限和 root 权限以缓解利用风险。"
score = 6.7
severity = "MEDIUM"
sources = ["msrc"]
title = "GNU GRUB2 gettext 整数溢出导致堆越界写入漏洞"
updated = "2026-06-29T23:16:41.050"

