[basic]
description = "Microsoft Outlook 98 及 Outlook Express 4.x 存在缓冲区溢出漏洞，远程攻击者可通过发送带有超长文件名的 .jpg 或 .bmp 附件的邮件或新闻组消息，触发目标 Outlook 客户端在处理邮件时发生缓冲区溢出，导致拒绝服务（应用程序崩溃）。该漏洞影响 Outlook 98 及 Outlook Express 4.x 版本，攻击无需认证，用户只需预览或打开邮件即可触发。"
published = "2000-05-12T04:00:00.000"
remediation = '建议升级至 Outlook Express 5.0 及以上版本（该版本已修复此缓冲区溢出漏洞）。若无法升级，可在 Outlook Express 中禁用预览窗格（视图→布局→取消勾选"显示预览窗格"），并设置以纯文本格式阅读所有邮件（工具→选项→安全→选中"在纯文本中阅读所有邮件"），同时勿打开来源不明的邮件附件作为临时缓解措施。'
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Microsoft Outlook Express 缓冲区溢出拒绝服务漏洞"
updated = "2026-06-16T21:51:40.063"

