[basic]
description = "MDaemon POP 服务器存在缓冲区溢出漏洞，远程攻击者可通过向 POP3 端口发送超长的用户名触发该漏洞，导致服务器进程崩溃，造成拒绝服务。该漏洞影响 MDaemon 系列邮件服务器软件，攻击无需身份认证，仅需网络连接即可实施，危害等级中等。厂商已发布相关安全更新修复此问题。"
published = "2000-05-24T04:00:00.000"
remediation = "升级 MDaemon 至 3.5.2 或更高版本，该版本修复了 POP3 服务在处理超长用户名时的缓冲区溢出问题。如无法立即升级，可在网络层面限制对 POP3 端口（默认 110）的访问，仅允许受信任 IP 连接作为临时缓解措施。对于仍在运行 MDaemon 老旧版本的环境，建议升级至厂商当前最新稳定版以修复所有已知安全漏洞。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Alt-N MDaemon POP服务器 缓冲区溢出拒绝服务漏洞"
updated = "2026-06-16T21:51:38.083"

