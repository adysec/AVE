[basic]
description = "Corel Linux OS 1.0 中的 buildxconfig 工具存在任意文件写入漏洞。本地攻击者可通过向 buildxconfig 传递 -x 或 -f 参数，以 root 权限修改或创建系统任意文件，从而覆盖关键配置文件或植入恶意脚本，实现本地权限提升。该漏洞影响 Corel Linux OS 1.0 版本，CVSS 评分 7.2，危害等级高。"
published = "2000-02-24T05:00:00.000"
remediation = "建议立即升级 Corel Linux OS 至 2.0 或更高版本，或移除 buildxconfig 的 setuid 权限位（chmod u-s /usr/bin/buildxconfig），限制仅 root 用户执行。如无法升级，可删除 buildxconfig 文件或限制其可执行权限为仅 root（chmod 700 /usr/bin/buildxconfig）。"
score = 7.2
severity = "HIGH"
sources = ["exploitdb"]
title = "Corel Linux OS 1.0 buildxconfig 本地任意文件修改漏洞"
updated = "2026-06-16T21:51:11.867"

