[basic]
description = "alt-N WorldClient Standard 2.1 内置的 WDaemon Web 服务器存在目录遍历漏洞，远程攻击者无需身份认证即可通过向服务器发送包含 `..`（点点）序列的恶意 HTTP 请求，突破路径限制，读取服务器上的任意敏感文件，如配置文件与系统文件等。该漏洞影响 WorldClient Standard 2.1 版本，CVSS 评分 5.0，危害等级中危。建议用户升级至更高版本或限制 Web 服务器的文件访问权限以降低风险。"
published = "2000-07-12T04:00:00.000"
remediation = '升级到 WorldClient 2.1.1 或更高版本（包含在 MDaemon 3.1.1 及以上版本中）。该补丁在 WDaemon 的 URL 路径解析中增加了对 ..\ 和 ../ 目录遍历序列的过滤校验。如无法立即升级，可在反向代理或 Web 应用防火墙层面配置规则，拦截 URL 中包含 ..\ 或 ../ 的请求，作为临时缓解措施。'
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "alt-n WorldClient 目录遍历漏洞"
updated = "2026-06-16T21:52:12.680"

