[basic]
description = "SuperProbe 是 XFree86 中用于检测显卡硬件的工具，其 TestChip 函数存在缓冲区溢出漏洞。本地攻击者可通过向 -nopr 参数传递超长字符串触发缓冲区溢出，从而以 root 权限执行任意代码。该漏洞影响 Slackware Linux 3.1 系统，攻击者需拥有本地 shell 访问权限方能利用，危害等级高。"
published = "1997-03-04T05:00:00.000"
remediation = "升级 Slackware Linux 至 4.0 或更高版本，或升级 XFree86 至 3.3.3 以上版本。临时缓解措施：移除 /usr/X11/bin/SuperProbe 的 setuid root 权限（chmod u-s /usr/X11/bin/SuperProbe），或直接删除该程序（该工具在现代 X 中已废弃）。"
score = 7.2
severity = "HIGH"
sources = ["epss"]
title = "Slackware Linux XFree86 SuperProbe 本地缓冲区溢出漏洞"
updated = "2026-06-16T21:50:33.060"

