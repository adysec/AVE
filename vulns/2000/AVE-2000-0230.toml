[basic]
description = "Nbase-Xyplex EdgeBlaster 路由器中存在拒绝服务漏洞。未经身份认证的远程攻击者可通过向目标设备发送针对 FormMail CGI 程序的扫描探测请求，触发设备处理异常，导致路由器服务崩溃或无法正常响应，造成拒绝服务。该漏洞影响 Nbase-Xyplex EdgeBlaster 系列路由器，CVSS v2 评分 5.0，危害等级中危。"
published = "2000-04-05"
remediation = "Nbase-Xyplex EdgeBlaster 路由器已停产且厂商已被收购，不再提供官方固件更新。建议用户：1）禁用路由器 Web 管理界面中不必要的 CGI 功能模块；2）配置访问控制列表（ACL），仅允许可信 IP 地址访问管理端口；3）使用防火墙规则拦截对 FormMail CGI 路径的外部扫描请求；4）将设备替换为仍在厂商支持周期内的新一代路由器产品。"
score = 5.0
severity = "MEDIUM"
sources = [
    "cve",
    "nvd",
]
title = "Nbase-Xyplex EdgeBlaster 路由器拒绝服务漏洞"
