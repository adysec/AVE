[basic]
description = "dump 软件包中的 restore 程序 0.4b17 及更早版本存在缓冲区溢出漏洞，当处理超长的磁带名称参数时，由于未对输入长度进行充分边界检查，本地攻击者可利用该漏洞覆盖栈上返回地址，从而执行任意命令以提升权限。该漏洞影响 Linux/Unix 系统上使用 dump 数据备份工具的环境，利用条件为攻击者拥有本地系统访问权限。成功利用后攻击者可获取目标系统的完全控制权，CVSS 评分 7.2，危害等级高。"
published = "2000-06-07T04:00:00.000"
remediation = "立即升级 dump 软件包至 0.4b18 或更高版本（最新版本为 0.4b46）。对基于 Red Hat/Fedora 的发行版运行 `yum update dump`，Debian/Ubuntu 运行 `apt upgrade dump`。如无法升级，可移除 restore 程序的 SUID 位作为临时缓解：`chmod u-s /sbin/restore`，并限制仅授信用户可本地登录。"
score = 7.2
severity = "HIGH"
sources = ["redhat"]
title = "dump restore 程序缓冲区溢出漏洞"
updated = "2026-06-16T21:51:54.720"

