[basic]
description = "OpenCode 项目的 content 接口存在任意文件读取漏洞，由于对用户传入的路径参数缺乏充分的安全校验，导致攻击者可通过构造包含 `../`、`..;` 等路径穿越序列的恶意请求绕过访问限制，读取服务器上任意敏感文件（如配置文件、密钥文件等）。该漏洞攻击复杂度低，无需身份认证即可远程利用，攻击者仅需向目标 content 接口发送特制的 HTTP 请求即可触发。建议对路径参数进行规范化校验，过滤路径遍历特征，并限制接口仅允许内网访问。"
published = "1day"
remediation = "建议升级至 OpenCode 最新版本，安装官方安全补丁。临时缓解措施：对 content 接口的 path 参数进行规范化校验，过滤 `../`、`..;` 等路径穿越序列；部署 WAF 规则拦截路径遍历特征；限制 content 接口仅允许内网/白名单 IP 访问；对文件读取操作使用白名单机制，禁止读取非授权目录外的文件。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "OpenCode content 接口任意文件读取漏洞"
updated = "1day"

