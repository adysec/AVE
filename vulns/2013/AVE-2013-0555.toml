[basic]
description = "Microsoft Windows 8.1及更早版本中的Microsoft.XMLDOM ActiveX控件存在信息泄露漏洞。远程攻击者可通过构造特制的res://协议URL，利用该控件处理资源标识符时返回的不同错误码，探测目标系统上本地路径、UNC共享路径、内网主机名及内网IP地址等敏感信息的存在性。该漏洞在2014年2月已被检测到在野利用，CVSS评分6.5，危害等级中危。攻击者无需身份认证即可远程利用，但仅能获取信息存在性判断，无法直接读取文件内容。"
published = "2014-02-26T14:55:08.520"
remediation = "立即安装 Microsoft 2014 年 3 月安全公告 MS14-012 提供的 Internet Explorer 累积安全更新 (KB2925418)，该更新修复了 Microsoft.XMLDOM ActiveX 控件的信息泄露漏洞。可通过 Windows Update 自动获取更新，或从 Microsoft 下载中心手动下载安装。受影响系统包括 Windows XP 至 Windows 8.1 及对应 Server 版本上的 Internet Explorer 6 至 11。如无法立即安装更新，可配置 Internet Explorer 安全区域将 ActiveX 控件禁用或设置为提示，并避免在 IE 中打开不可信的 res:// 链接。"
score = 6.5
severity = "MEDIUM"
sources = ["kev"]
title = "Microsoft XMLDOM ActiveX 控件信息泄露漏洞"
updated = "2026-06-17T00:01:46.240"

