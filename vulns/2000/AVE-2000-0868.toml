[basic]
description = "Red Hat Linux 系统中 umb-scheme 3.2-11 软件包在安装时设置了全局可写权限，导致任意本地用户均可修改其程序文件或配置文件。攻击者可通过替换或篡改这些文件植入恶意代码，当其他用户（包括 root）执行 umb-scheme 时触发权限提升，获取目标系统的高权限访问。该漏洞影响 Red Hat Linux 系统，CVSS 评分 7.2，危害等级高。"
published = "2000-10-20T04:00:00.000"
remediation = "立即执行 `chmod -R o-w /path/to/umb-scheme` 收回其他用户的写入权限，或直接使用 `rpm -e umb-scheme` 移除该软件包。如业务需要保留，应确保文件属主为 root 且权限不低于 755，并定期审计该目录的文件权限变更。"
score = 7.2
severity = "HIGH"
sources = ["cve"]
title = "Red Hat Linux umb-scheme 文件权限配置不当漏洞"
updated = "2026-06-16T21:52:19.637"

