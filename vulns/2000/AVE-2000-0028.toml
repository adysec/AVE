[basic]
description = "Solaris DMI（桌面管理接口）服务中的 dmispd 组件的 dmi_cmd 命令存在安全漏洞，本地攻击者可通过向 /var/dmi/db 数据库目录添加大量文件，耗尽受限磁盘空间，导致系统拒绝服务。该漏洞影响 Solaris 操作系统，攻击者需要拥有本地访问权限，利用门槛较低，可造成系统关键服务因磁盘空间不足而中断。"
published = "1999-12-22T05:00:00.000"
remediation = "建议立即停止并禁用 dmispd 服务（/etc/init.d/dmi stop；chkconfig dmi off），限制本地用户对 /var/dmi/db 目录的写入权限（chmod 750 /var/dmi/db），并对 /var 分区设置磁盘配额（edquota）防止单个用户耗尽磁盘空间。如运行 Solaris 7 或更早版本，建议升级至受支持的 Solaris 11 或迁移至 Oracle Solaris 最新发布版。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Sun Solaris dmispd 本地拒绝服务漏洞"
updated = "2026-06-16T21:50:51.450"

