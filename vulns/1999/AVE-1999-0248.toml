[basic]
description = "HP-UX 系统的软件分发器（Software Distributor，简称 SD）在 10.x 与 11.x 版本中存在缓冲区溢出漏洞。该漏洞源于 SD 组件在处理特定输入时未对数据长度做充分边界校验，导致攻击者可控的过长数据写入固定大小的缓冲区，进而可覆盖相邻内存并可能实现任意代码执行。影响范围为运行 HPUX 10.x 和 11.x 且启用 SD 服务的系统。攻击条件为攻击者需能够向目标系统的 SD 服务发送特制请求，通常需要一定的本地或相邻网络访问权限。利用方式为构造恶意输入触发缓冲区溢出，造成服务异常或提升权限。"
published = "1999-07-01T04:00:00.000"
remediation = "立即安装 HP-UX 11.11 或更高版本的 HP Software Distributor 补丁 HPD4365-11，或者应用 HPSBUX9907-101 安全更新。如需继续使用 HPUX 10.x，请应用 HP SD 10.20 补丁套件。立即更新系统，关闭不必要的 SD 服务以降低风险。"
score = 4.6
severity = "MEDIUM"
sources = ["avd"]
title = "HP 软件分发器 缓冲区溢出漏洞"
updated = "2026-06-16T21:48:51.047"

