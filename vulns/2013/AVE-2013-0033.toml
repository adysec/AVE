[basic]
description = "Oracle Java 7 Update 11 之前版本存在两处远程代码执行漏洞。其一，攻击者可通过 JmxMBeanServer 类的 getMBeanInstantiator 方法获取私有 MBeanInstantiator 对象引用，进而利用 findClass 方法加载任意类；其二，利用 Reflection API 递归调用绕过 java.lang.invoke.MethodHandles.Lookup.checkSecurityManager 的安全检查。远程攻击者可通过诱导用户访问恶意网页触发漏洞，在无需认证的情况下完全控制目标系统。该漏洞已在 2013 年 1 月被 Blackhole 和 Nuclear Pack 漏洞利用工具包大规模利用于野外攻击。"
published = "2013-01-10T21:55:00.777"
remediation = '立即升级 Oracle Java 7 至 Update 11 或更高版本（Java 7u11 已修复 JmxMBeanServer 反射绕过漏洞）。如无法升级，在浏览器中禁用 Java Applet 插件（控制面板 → Java → 安全 → 取消勾选"在浏览器中启用 Java 内容"），并将安全级别设为"高"。对于服务器环境，移除不必要的 JMX MBean 组件暴露。Java 6 不受此漏洞影响，可降级至 Java 6 作为临时方案。'
score = 9.8
severity = "CRITICAL"
sources = ["kev"]
title = "Oracle Java 7 远程代码执行漏洞"
updated = "2026-06-16T23:49:24.963"

