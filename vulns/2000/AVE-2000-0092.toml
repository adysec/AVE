[basic]
description = "Debian GNU/Linux 2.1 系统中 apcd（高级电源管理守护进程）存在符号链接漏洞。本地攻击者可通过在临时目录中创建符号链接，诱使 apcd 以 root 权限写入或修改任意文件，实现本地权限提升。该漏洞源于 apcd 在操作临时文件时未充分验证文件路径的真实性，攻击者无需任何认证即可利用。受影响系统为 Debian 2.1 发行版，CVSS 评分 7.2，危害等级高。"
published = "2000-02-01T05:00:00.000"
remediation = "升级 Debian 系统至 2.2 或更高版本，或安装 apcd 补丁版本。限制本地用户对 apcd 程序的执行权限，移除不必要的 setuid/setgid 位。使用 nosuid 选项挂载 /tmp 分区以防止符号链接攻击。禁用 apcd 服务（如非必要）以减小攻击面。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "Debian Linux apcd 符号链接漏洞"
updated = "2026-06-16T21:51:00.917"

