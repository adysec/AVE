[basic]
description = "用友 U8Cloud 的 XChangeServlet 接口存在 SQL 注入漏洞，攻击者可在未授权情况下向目标系统发送特制的 HTTP 请求，通过构造恶意参数绕过输入过滤，导致攻击者能够执行任意 SQL 语句，进而窃取或篡改数据库中的敏感数据。该漏洞影响用友 U8Cloud 全版本，危害严重。"
published = "1day"
remediation = "立即访问用友官方安全中心（https://security.yonyou.com）下载并安装 XChangeServlet SQL 注入漏洞的专用补丁包。如无法立即打补丁，可在 WAF 或反向代理层部署规则，拦截对 `/servlet/XChangeServlet` 路径的恶意 SQL 注入请求参数，并限制该接口仅允许可信 IP 访问作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "用友 U8Cloud XChangeServlet SQL注入漏洞（全版本）"
updated = "1day"

