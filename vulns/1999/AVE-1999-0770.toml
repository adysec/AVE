[basic]
description = "SNMP协议使用community name作为访问认证凭据，该漏洞源于目标设备的SNMP社区名可被推测（如使用默认值或弱密码），未经身份认证的远程攻击者可通过暴力破解或字典攻击的方式猜测出有效的community name。攻击成功后，攻击者可获取网络设备或主机的系统信息、接口状态、路由表等敏感SNMP管理数据，进而为进一步渗透提供情报支持。该漏洞影响所有运行SNMP服务的网络设备、服务器及打印机等终端，CVSS评分7.5，危害等级高。建议管理员将community name修改为高强度字符串并限制SNMP服务的访问来源。"
published = "1998-08-01T04:00:00.000"
remediation = "将 SNMP 设备默认的 public/private 等团体名修改为高强度随机字符串，并升级设备固件/系统至厂商修复版本（如 Cisco IOS 更新、Windows SNMP 服务补丁）。在网络层通过 ACL 或防火墙仅允许受信任的管理主机访问 UDP 161/162 端口，并优先改用 SNMPv3 启用认证与加密以彻底消除明文团体名泄露风险。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "简单网络管理协议 SNMP 社区名可猜测漏洞"
updated = "2026-06-16T21:48:33.670"

