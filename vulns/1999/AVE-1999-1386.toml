[basic]
description = 'NeXT NeXTstep 2.1 及更早版本中存在权限配置不当漏洞。系统默认创建的 "me" 用户被赋予了 wheel 组成员权限，该组成员可直接使用 su 命令切换为 root 超级用户。攻击者只需获取 "me" 用户的登录凭据（如通过弱口令猜测或社会工程学手段），即可利用该配置缺陷提升至 root 权限，完全控制目标系统。该漏洞影响 NeXT NeXTstep 2.1 及之前所有版本，CVSS 评分 10.0，危害等级严重。'
published = "1991-05-14T04:00:00.000"
remediation = "建议立即迁移至现代操作系统（如 macOS/Linux），NeXT NeXTstep 已停止维护无补丁。若必须继续使用，请编辑 /etc/group 将 me 用户从 wheel 组移除，并执行 `passwd -l me` 锁定该账户，同时限制 su 命令仅允许管理员组使用。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "NeXT NeXTstep 权限提升漏洞"
updated = "2026-06-16T21:49:54.997"

