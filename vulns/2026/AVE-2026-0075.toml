[basic]
description = "Apache Camel 存在 header 注入漏洞，该漏洞是 CVE-2025-27636 修复不完整导致：官方在 HttpHeaderFilterStrategy 中添加了 setLowerCase(true) 以过滤大小写变体头名称，但未同步应用于 JmsHeaderFilterStrategy、SjmsHeaderFilterStrategy、CoAPHeaderFilterStrategy、GooglePubsubHeaderFilterStrategy 等五个非 HTTP 协议的 HeaderFilterStrategy 实现。这些策略使用大小写敏感的 String.startsWith('Camel'/'camel') 过滤，而 Camel Exchange 以大小写不敏感的 Map 存储头信息，导致拥有 JMS/CoAP/Google PubSub 消息生产者权限的攻击者可通过注入大小写变种的 Camel 内部头，使下游组件（如 camel-exec、camel-file）解析为原始大小写的可执行头，从而实现远程代码执行和任意文件写入。该漏洞影响 Apache Camel 3.0.0 至 4.14.6 之前、4.15.0 至 4.18.2 之前、4.19.0 至 4.20.0 之前的版本，CVSS 评分 9.9，危害等级严重。"
published = "2026-04-27T09:16:01.493"
remediation = '建议升级至 Apache Camel 4.20.0（最新稳定版），LTS 用户升级至 4.14.6，4.18.x 用户升级至 4.18.2。临时缓解措施：① 自定义 HeaderFilterStrategy，覆盖 setLowerCase(true) 强制大小写折叠过滤；② 在路由入口添加 removeHeaders("Camel*", "camel*") 并设置 ignoreCase=true 清除所有 Camel 内部头；③ 限制 JMS/CoAP/Google PubSub 等协议的未授权 producer 访问消息代理；④ 审查依赖 camel-exec/camel-file 等高危组件的 consumer，避免直接消费不可信来源的协议消息。'
score = 9.9
severity = "CRITICAL"
sources = ["hwpoc"]
title = "Apache Camel 多协议消息头注入远程代码执行漏洞"
