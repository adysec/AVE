[basic]
description = "Red Hat Linux 6.1 及 6.2 版本中 rpc.lockd（NFS 文件锁守护进程）存在输入验证缺陷，远程攻击者无需认证即可向目标系统发送特制的畸形 RPC 请求，触发 lockd 进程崩溃或进入死循环，导致系统拒绝服务。该漏洞影响 Red Hat Linux 6.1/6.2/7.0 及 Debian 2.1/2.2、Mandrake 6.0/6.1/7.0 等发行版，攻击复杂度低，无需用户交互，CVSS 评分 5.0。"
published = "1994-12-19T05:00:00.000"
remediation = "建议立即升级 Red Hat Linux 至 7.0 以上版本，或安装厂商提供的 rpc.lockd 补丁。如无法升级，可在 /etc/init.d 中停止 nfslock 服务（`service nfslock stop && chkconfig nfslock off`），并在防火墙中阻断对 port 111 (portmapper) 和 rpc.lockd 动态端口的入站访问，作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Red Hat Linux rpc.lockd 远程拒绝服务漏洞"
updated = "2026-06-16T21:51:53.130"

