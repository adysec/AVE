[basic]
description = "Windows NT 4.0 内核模式地址验证存在缺陷，本地攻击者可通过向 GetThreadContext 或 SetThreadContext 函数传递非法的内核模式地址，触发系统内存访问异常，导致目标系统蓝屏崩溃，造成拒绝服务。该漏洞为本地利用，攻击者需拥有系统本地账户权限，CVSS 评分 2.1，危害等级低。受影响版本为 Windows NT 4.0。"
published = "1999-12-31T05:00:00.000"
remediation = "Windows NT 4.0 已于 2004 年终止支持，无官方补丁可用。建议升级至受支持的 Windows Server 版本（2019 及以上），并在过渡期间严格限制本地用户权限，仅允许授信管理员账户登录交互式会话，防止非授权用户调用 GetThreadContext/SetThreadContext 触发拒绝服务。"
score = 2.1
severity = "LOW"
sources = ["avd"]
title = "Microsoft Windows NT 4.0 本地拒绝服务漏洞"
updated = "2026-06-16T21:50:16.977"

