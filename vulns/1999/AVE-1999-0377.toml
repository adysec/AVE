[basic]
description = "Linux Kernel 2.6.20.1 的 RPC portmapper 组件存在源 IP 地址验证缺陷，远程攻击者可通过发送伪造源 IP 地址（如 127.0.0.1）的恶意 RPC 请求，未经授权注册或注销 RPC 服务，或伪造 RPC 服务响应，导致目标系统服务不可用（拒绝服务）。该漏洞影响 Linux Kernel 2.6.20.1 及更早版本，危害等级中危。"
published = "1997-07-01T04:00:00.000"
remediation = "升级 Linux 内核至 2.6.20.1 之后的安全版本，如 2.6.22+ 或当前受支持的长支持版内核。同时配置 iptables 限制对 RPC portmapper (端口 111) 的访问，仅允许可信 IP 段访问，并使用 TCP wrappers (/etc/hosts.allow 和 /etc/hosts.deny) 过滤源地址，防止伪造 127.0.0.1 等内部地址的欺骗请求。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Linux Kernel RPC Portmapper 源IP地址欺骗拒绝服务漏洞"
updated = "2026-06-16T21:47:53.223"

