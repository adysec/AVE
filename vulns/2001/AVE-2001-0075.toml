[basic]
description = "Icecast 1.3.8beta2 及更早版本的 print_client() 函数存在格式字符串漏洞，远程攻击者可通过向服务器发送包含恶意格式字符串特化符（如 %n、%x）的 HTTP 请求触发该漏洞，导致任意代码执行或服务崩溃。该漏洞影响运行 Icecast 流媒体服务的系统，无需身份认证即可利用，CVSS 评分 10.0，危害等级严重。"
published = "2001-03-26T05:00:00.000"
remediation = "升级 Icecast 至 1.3.9 或更高版本（推荐迁移至 Icecast 2.x 系列），该漏洞在 print_client() 函数中存在格式字符串缺陷，攻击者可远程执行任意命令。如无法升级，在防火墙或反向代理层面限制对 Icecast 服务 8000 端口的非信任来源访问作为临时缓解措施。"
score = 10
severity = "CRITICAL"
sources = ["exploitdb"]
title = "Icecast print_client() 格式字符串远程代码执行漏洞"
updated = "2026-06-16T21:53:51.830"

