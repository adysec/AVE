[basic]
description = "TenFour TFS Gateway 4.0 存在配置缺陷漏洞，该产品在处理消息时因发送方和收件人地址验证逻辑异常而导致无限循环状态。当攻击者发送包含不正确地址信息的消息时，系统会持续以 10 秒为周期尝试返回消息，导致 CPU 资源消耗激增，服务器响应变慢直至服务完全不可用。该漏洞影响范围广泛，任何未正确配置 TFS Gateway 的用户都可能成为目标，攻击者无需任何权限即可远程触发。漏洞原理在于网关未能正确识别和过滤错误地址消息的处理流程，致使程序进入无限重试状态，暴露了系统在异常输入处理方面的严重不足，为攻击者提供了利用 WSGI 协议实现服务拒绝的便利手段，影响企业的网络通讯服务稳定性和用户体验。"
published = "1999-08-31T04:00:00.000"
remediation = "升级 TenFour TFS Gateway 至修复了该问题的后续版本（4.0 之后的官方补丁版本）；若无法立即升级，可在网关配置中禁用或修正导致异常的「非默认发送方/接收方地址」处理规则，并将可疑来源 IP 在防火墙处阻断，以减少恶意消息触发网关每 10 秒持续重发所导致的拒绝服务。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "TenFour TFS Gateway 4.0 拒绝服务漏洞"
updated = "2026-06-16T21:50:36.357"

