[basic]
description = "Linux 内核 MPTCP（多路径 TCP）协议实现存在条件竞争漏洞，当 MPTCP 子流关闭过程中，数据包调度器在获取子流套接字锁之前检查子流状态，导致可能在已关闭的子流上排队或重传数据，触发空指针解引用或释放后重用，可造成内核崩溃导致拒绝服务。本地攻击者可通过构造特定网络请求触发该条件竞争。该漏洞影响 Linux 内核主线版本，CVSS 评分 7.8，危害等级高。Linux 内核社区已通过增加子流状态检查及后备 TCP 回退场景检查完成修复。"
published = "2025-06-18T11:15:35.843"
remediation = "建议立即升级 Linux 内核至 v6.0 及以上版本，或升级至包含提交 c886d70286bf 反向移植的 5.19.x 稳定版本（如 5.19.2+）。对于无法立即升级内核的系统，可通过编译内核时禁用 CONFIG_MPTCP（设置为 n）来完全规避该漏洞；若必须使用 MPTCP，则需手动 cherry-pick 提交 c886d70286bf 并重新编译内核。"
score = 7.8
severity = "HIGH"
sources = ["msrc"]
title = "Linux Kernel MPTCP 子流关闭时数据排队不当导致拒绝服务漏洞"
updated = "2026-06-17T05:22:41.860"

