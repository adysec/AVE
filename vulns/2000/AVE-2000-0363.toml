[basic]
description = "mirror 2.8.x 存在目录遍历漏洞，当用户通过该工具镜像恶意站点时，远程攻击者可在服务器上构造特制目录名/符号链接触发路径穿越，将文件写入本地目标目录的上一级目录。攻击者可在目标系统上创建任意文件（如替代系统脚本或配置文件），进而结合其他向量升级为代码执行或权限提升。"
published = "2000-09-28T04:00:00.000"
remediation = "升级 mirror 至 2.9 及以上版本，该版本修复了路径遍历问题。若无法升级，可在 mirror 配置文件中设置 `local_parent=off` 禁止文件写入上级目录，或改用替代工具如 rsync/wget 进行文件同步，避免使用不受支持的旧版 mirror。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Linux Mirror 远程路径遍历漏洞"
updated = "2026-06-16T21:51:32.570"

