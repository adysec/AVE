[basic]
description = "Compaq Insight Management Agent 服务存在拒绝服务漏洞，远程攻击者可通过向目标系统的 2301 端口发送超长字符串，触发服务组件缓冲区溢出，导致 Compaq Management Agents 及 Survey Utility 服务崩溃或无法响应。该漏洞影响 Compaq 系列服务器管理软件，攻击者无需身份认证即可利用，CVSS 评分 6.4，危害等级中危。"
published = "1999-06-01T04:00:00.000"
remediation = "立即升级 Compaq Insight Management Agent 至厂商修复版本（1999 年已发布补丁），或卸载 Compaq Survey Utility。如无法升级，在防火墙上封禁 TCP 端口 2301 的入站访问，仅允许受信任管理站点的 IP 地址连接该端口。若业务不再需要该管理服务，建议直接禁用或卸载 Compaq Management Agents 服务以彻底消除风险。"
score = 6.4
severity = "MEDIUM"
sources = ["avd"]
title = "Compaq Insight Management Agent 拒绝服务漏洞"
updated = "2026-06-16T21:49:01.590"

