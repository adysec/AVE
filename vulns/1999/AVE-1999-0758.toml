description = "WolfPack Development 开发的 XSHIPWARS 1.0 及 1.2.4 版本中存在缓冲区溢出漏洞。远程攻击者可通过向 xsw 程序发送特制的网络数据包触发缓冲区溢出，导致目标服务崩溃或执行任意代码。该漏洞无需身份认证即可远程利用，CVSS 评分 7.5，危害等级高。"
published = "1999-12-09T05:00:00.000"
remediation = "立即停止使用 XSHIPWARS 1.0/1.2.4 及更早版本，该软件已停止维护且无安全更新。建议迁移至其他活跃维护的同类游戏软件，或在无法替换时在网络边界防火墙限制对 xsw 服务端口的访问，仅允许可信 IP 连接。如为本地部署，建议在容器化隔离环境中运行以限制溢出攻击影响范围。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
