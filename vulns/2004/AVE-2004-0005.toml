[basic]
description = "Titan FTP Server 3.21 及更早版本存在基于堆的缓冲区溢出漏洞，远程攻击者无需身份认证即可向目标服务器发送特制的长 FTP 命令（如 CWD、STAT、LIST），触发堆缓冲区溢出，导致服务进程崩溃，造成拒绝服务。该漏洞影响 Titan FTP Server 3.21 及之前版本，CVSS 评分 5.0，危害等级中危。建议用户升级至最新版本以修复此漏洞。"
published = "2004-08-29T04:00:00.000"
remediation = "立即将 Titan FTP Server 升级至 3.22 或更高版本（该漏洞在后续版本中已修复）。如当前仍在运行已停产的旧版 Titan FTP Server，建议迁移至 South River Technologies 当前支持的 Titan MFT 或 Titan SFTP Server 产品线。若无法立即升级，可在防火墙或 IPS 设备上配置规则，拦截超长 FTP 命令（CWD/STAT/LIST 参数超过 20480 字节），并限制匿名用户访问权限作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["nuclei"]
title = "Titan FTP Server 长命令堆溢出漏洞"
updated = "2026-06-16T22:08:06.133"

