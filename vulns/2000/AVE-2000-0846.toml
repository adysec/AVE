[basic]
description = "RedHat 6.1 及 IRIX 6.5.18 等系统的 lpr 软件包中的行式打印机守护进程（lpd）存在认证绕过漏洞。该漏洞源于 lpd 在验证访问权限时，将本地机器反向解析的主机名与 gethostname 返回的打印服务器主机名进行比较，远程攻击者可通过修改攻击 IP 的 DNS 记录使其与目标主机名一致，从而绕过访问控制限制，实现未经授权的命令执行。CVSS 评分 10.0，危害等级严重。"
published = "2000-01-08T05:00:00.000"
remediation = "升级 RedHat 至 6.2 及以上版本，或升级 IRIX 至 6.5.19 及以上版本，或安装对应厂商的安全补丁。如无需远程打印服务，建议通过 `chkconfig lpd off` 或 `service lpd stop` 禁用 lpd 守护进程，并在 `/etc/hosts.allow` 和 `/etc/hosts.deny` 中配置 TCP Wrapper 限制仅信任的打印客户端 IP 可访问 TCP 515 端口。对于现代系统，建议迁移至 CUPS 替代传统 lpd 协议。"
score = 10
severity = "CRITICAL"
sources = ["exploitdb"]
title = "RedHat IRIX lpd 命令执行漏洞"
updated = "2026-06-16T21:53:24.660"

