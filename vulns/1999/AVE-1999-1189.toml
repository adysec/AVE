[basic]
description = "iParty Conferencing Server 1.2 及更早版本存在缓冲区溢出漏洞，远程攻击者可通过连接默认端口 6004 并发送重复的扩展字符触发该漏洞，导致服务崩溃并造成拒绝服务。该漏洞影响 iParty 会议服务器的所有受影响版本，攻击无需身份认证，仅需网络层面可达目标端口即可实施。利用方式为向服务发送特制的畸形数据包，导致缓冲区溢出使服务进程异常终止，从而使合法用户无法使用会议服务。CVSS 评分 5.0，属于中等危害级别。"
published = "1999-05-08T04:00:00.000"
remediation = "建议立即升级 iParty Conferencing Server 至 1.3 或更高版本以修复默认端口 6004 上的缓冲区溢出问题。如无法立即升级，可在防火墙或边界网关上通过 ACL 规则阻断对 TCP 6004 端口的外部访问，并仅允许受信任的内部 IP 地址连接，作为临时缓解措施。同时建议在网络边界部署入侵检测规则，拦截向该端口发送大量扩展字符的异常连接请求。"
score = 5
severity = "MEDIUM"
