[basic]
description = "SSH Communications Security SSH 1.2.27 版本的 ssh-agent 认证代理在处理 UNIX 域套接字时存在符号链接跟随漏洞。当代理启动时会创建认证套接字文件，若攻击者事先在套接字路径位置放置指向敏感文件的符号链接，代理会以自身权限跟随该链接创建或覆盖目标文件。该漏洞影响本地多用户系统，攻击者需具备在套接字目录创建符号链接的权限，利用竞争条件可实现任意文件创建或权限提升，CVSS 评分为 2.1（低危）。"
published = "1999-09-17"
remediation = "建议将 SSH 升级至 1.2.28 或更高版本，该版本已修复认证代理盲目跟随符号链接的问题。如暂时无法升级，请勿在不可信或他人可写目录下启动 ssh-agent，并将套接字目录（如 /tmp）设置为严格权限（chmod 700）以限制其他用户创建符号链接，作为临时缓解措施。"
score = 2.1
severity = "LOW"
sources = [
    "exploitdb",
    "cve",
]
title = "SSH Communications Security SSH 1.2.27 认证代理UNIX域套接字符号链接漏洞"
updated = "2026-07-17"

