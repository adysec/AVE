[basic]
description = "Windows NT 与 Windows 2000 系统在关机时未对系统页面文件（pagefile.sys）进行安全擦除，导致其中缓存的密码、密钥、文档等敏感数据以明文形式残留在磁盘上。该漏洞影响所有运行上述系统的主机，攻击者需具备本地物理或逻辑访问权限，在系统关机后读取或挂载硬盘，通过分析残留的页面文件提取敏感信息，从而造成信息泄露。此问题属于配置与数据处理缺陷，危害相对有限但可能造成凭据泄露。"
published = "2000-01-20T05:00:00.000"
remediation = "请安装 Windows NT 4.0 SP6a 或 Windows 2000 SP2 及以上官方补丁包（含 KB265117 等安全更新）彻底修复页面文件残留漏洞。若无法立即打补丁，请通过组策略“计算机配置→Windows设置→安全设置→本地策略→安全选项→关机: 清除虚拟内存页面文件”启用页面文件清零功能作为临时缓解措施。"
score = 2.1
severity = "LOW"
sources = ["epss"]
