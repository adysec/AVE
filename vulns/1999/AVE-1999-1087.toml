[basic]
description = "Solaris 2.6/2.7 系统中的 /usr/bin/write 工具存在缓冲区溢出漏洞，本地用户通过向终端名称（terminal name）参数传入超长字符串即可触发该漏洞，导致攻击者能够以 root 权限执行任意代码，实现本地权限提升。该漏洞影响 Solaris 2.6 和 7 版本，CVSS 评分 7.2，危害等级高。攻击者需拥有本地系统账号方可利用，无需用户交互。"
published = "1999-03-08T05:00:00.000"
remediation = "Sun 已于对应安全公告中发布补丁修复此漏洞，建议升级 Solaris 至受支持版本或安装对应补丁。作为临时缓解措施，可移除 /usr/bin/write 的 setuid 权限 (chmod -s /usr/bin/write)，限制非授权用户执行；同时可在访问控制列表中将该二进制文件的执行权限限定为仅授权用户，降低本地利用风险。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "Sun Solaris /usr/bin/write 本地缓冲区溢出权限提升漏洞"
updated = "2026-06-16T21:50:17.847"

