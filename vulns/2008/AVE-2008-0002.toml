[basic]
description = "WordPress 的 Sniplets 插件 1.1.2 及 1.2.2 版本中存在 PHP 远程文件包含漏洞，位于 `modules/syntax_highlight.php` 文件中。未经认证的远程攻击者可通过 `libpath` 参数传入恶意 URL，导致任意 PHP 代码执行。攻击者可利用此漏洞完全控制目标网站服务器，危害严重。受影响的用户应立即升级或禁用该插件。"
published = "2008-02-28T19:44:00.000"
remediation = "立即停用并彻底删除 Sniplets 插件（1.1.2/1.2.2 版），该插件已停止维护，无安全更新。如必须使用，修改 php.ini 中 allow_url_include 和 allow_url_fopen 为 Off，并升级 WordPress 至最新版本以减缓攻击面。"
score = 7.5
severity = "HIGH"
sources = ["nuclei"]
title = "WordPress Sniplets 插件远程文件包含漏洞"
updated = "2026-06-16T22:50:53.943"

