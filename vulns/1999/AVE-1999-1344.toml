[basic]
description = "Internet Explorer 3.01 在 Windows 95 系统上存在远程代码执行漏洞。攻击者可构造恶意的 .isp 文件并托管于攻击者控制的网站上，当用户访问该网站时，Internet Explorer 会自动下载并执行该 .isp 文件，且整个过程不会向用户弹出任何安全提示或确认对话框，从而导致未经授权的任意命令在用户系统上执行。该漏洞影响运行 Windows 95 且使用 Internet Explorer 3.01 的用户，攻击条件简单，仅需用户用受影响版本的浏览器访问恶意网站即可触发，无需额外交互或权限提升。由于 IE 3.01 年代久远，官方已不再提供安全更新，建议用户升级至现代浏览器以彻底消除此风险。"
published = "1997-03-01T05:00:00.000"
remediation = "建议立即升级 Internet Explorer 至 4.0 及以上版本，该漏洞在 IE 4.0 中已修复。对于 Windows 95 系统，可安装 Microsoft 后续发布的 IE 安全更新或升级至 Windows 98/2000/XP 等受支持的操作系统。同时配置浏览器安全区域为高等级，禁用自动下载执行 .isp 文件功能。"
score = 5.1
severity = "MEDIUM"
sources = ["epss"]
title = "Microsoft Internet Explorer .isp 文件远程代码执行漏洞"
updated = "2026-06-16T21:49:46.813"

