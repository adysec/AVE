[basic]
description = "Xerox DocuColor 4 LP 打印机的 Fiery Web 服务器（基于 Apache/1.0.3）存在拒绝服务漏洞。远程攻击者无需认证即可通过发送包含大量英文句点（约2000个）的畸形 URL 请求，导致 HTTP 服务完全挂起，打印机无法响应 ping 请求且无法执行打印任务，必须通过硬重启才能恢复正常。该漏洞源于服务器对超长 URL 中特殊字符序列的处理缺陷。"
published = "1999-10-13"
remediation = "Xerox 已停止支持该型号，建议用户：1) 在防火墙上限制对打印机 80 端口的访问，仅允许可信 IP；2) 禁用 Fiery Web 工具中的 HTTP 服务；3) 升级到受支持的打印机型号以获得安全更新。"
score = 5.0
severity = "MEDIUM"
sources = ["cve"]
title = "Xerox DocuColor 4 LP Fiery Web 服务器拒绝服务漏洞"
updated = "2026-07-16"

