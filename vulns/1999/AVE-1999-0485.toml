[basic]
description = "tags.<value>WinGate 代理服务器默认安装时未设置访问密码，远程攻击者无需任何身份认证即可连接并使用该代理服务，将网络流量重定向至任意目标主机。利用该漏洞，攻击者可绕过网络访问控制、隐藏攻击来源或转发恶意流量，导致服务器被滥用作开放代理。该漏洞影响默认配置下的早期版本 WinGate 代理软件。"
published = "1999-02-01T05:00:00.000"
remediation = '在 WinGate 管理控制台（GateKeeper）中为每个代理服务（WWW Proxy、SOCKS Proxy 等）启用密码认证，并配置绑定策略限制仅允许内网 IP 段访问；同时在防火墙层面禁止来自外网的 80/1080/8080 等代理端口入站流量。建议升级到 WinGate 4.5.1 或更高版本，该版本已修复默认无密码问题。若因兼容性无法升级，可删除 WinGate 默认安装目录中 %ProgramFiles%\WinGate\Wingate.ini 内未授权的 Proxy 服务条目，并在系统服务管理器中将 Wingate 服务禁用作为临时缓解措施。'
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "Qbik WinGate 代理未授权访问漏洞"
