[basic]
description = "Big Brother 监控系统 1.4h2 及更早版本的默认配置中缺乏适当的访问限制，远程攻击者可通过 bbd 工具上传具有可执行扩展名的文件，该文件随后被 Web 服务器作为 CGI 脚本执行，从而导致任意命令执行。该漏洞影响 Big Brother 1.0、1.3、1.4 等多个版本，CVSS 评分 7.5，危害等级高危。厂商已发布修复建议，建议用户升级至最新版本并配置严格的访问控制策略。"
published = "2000-06-11T04:00:00.000"
remediation = "立即升级 Big Brother 至 1.4h3 或更高版本，或在 bbnet.sh 和 bbd 配置中添加 `auth` 选项启用认证机制；同时配置 Web 服务器，限制 CGI 目录仅允许受信任的本地账户写入，并对 bbd 端口（默认 1984/TCP）实施防火墙白名单策略，只允许内部监控端访问。如产品已停维，建议迁移至 Zabbix、Nagios 等替代方案。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "Sean MacGuire Big Brother CGI 文件上传远程代码执行漏洞"
updated = "2026-06-16T21:52:09.987"

