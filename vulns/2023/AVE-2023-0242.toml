[basic]
description = "金山 WPS Office for Windows 文档解析组件存在远程代码执行 0day 漏洞。攻击者可构造特制的恶意文档，通过钓鱼邮件或网页分发诱导用户打开，利用文档解析过程中的内存处理缺陷实现任意代码执行，完全控制受害者系统。该漏洞影响 WPS Office for Windows 多个版本，危害严重，被积极利用于定向攻击场景。"
published = "2023-08-09"
remediation = '立即将 WPS Office for Windows 升级至官方发布的安全修复版本（2023年8月9日后推送的更新），通过软件内"检查更新"或前往金山办公官网下载最新安装包覆盖安装。如暂无法升级，应在企业边界防火墙和终端防护软件中禁用来自不可信来源文档的宏与脚本执行，并避免打开来历不明的 WPS 文档作为临时缓解措施。'
score = 5.0
