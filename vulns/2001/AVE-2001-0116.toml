[basic]
description = "Sudo 1.5 及 1.6 版本存在堆缓冲区溢出漏洞，由于程序在处理输入时未正确验证缓冲区边界，本地攻击者可通过向 sudo 发送特制请求触发堆损坏，成功利用此漏洞可将权限提升至 root，完全控制目标系统。该漏洞影响 sudo 1.6.3p6 之前的所有版本，CVSS 评分 7.2，危害等级高。"
published = "2001-05-03T04:00:00.000"
remediation = "升级 sudo 至 1.6.3p6 或更高版本（该版本已修复堆缓冲区溢出问题）。由于漏洞允许本地用户提权至 root，建议同时限制仅受信任用户拥有 sudo 权限，并在 `/etc/sudoers` 中遵循最小权限原则，移除不必要的 sudo 条目。"
score = 7.2
severity = "HIGH"
sources = ["exploitdb"]
title = "Sudo 堆缓冲区溢出本地权限提升漏洞"
updated = "2026-06-16T21:54:01.053"

