[info]
author = "ave"
description = "检测目标是否可被用于触发 Microsoft Active Setup Control (clsid:6E449683-C509-11CF-AAFA-00AA00B6015C) 加载远程 CAB 文件的漏洞。通过构造包含 ActiveX 对象的 HTML 页面，验证 ActiveX 控件能否被远程触发下载并执行 CAB 文件。"
id = "POC-AVE-2000-0272"
name = "Microsoft Internet Explorer/Outlook ActiveX CAB 文件远程执行漏洞 PoC"
severity = "medium"
tags = ["ave-2000-0272"]
vuln_id = [
    "CVE-2000-0329",
    "AVE-2000-0272",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/poc.html"
protocol = "http"

[poc.requests.body]
content = ""
type = "raw"

[[poc.requests.matchers]]
expect = false
part = "body"
type = "word"
words = [
    "ActiveX",
    "CAB",
]
