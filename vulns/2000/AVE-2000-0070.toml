[basic]
description = "CuteFTP 在存储密码信息时使用弱加密算法（XOR 掩码）将用户凭据保存在 tree.dat 文件中，攻击者可通过直接读取该文件或通过网络嗅探获取加密后的密码数据，并利用已知的弱加密算法逆向还原出明文密码。该漏洞可导致 FTP 服务器账号密码泄露，影响所有使用 CuteFTP 存储密码的用户，攻击者无需高级权限即可完成利用。"
published = "2000-01-06T05:00:00.000"
remediation = "升级至 CuteFTP 4.2 及以上版本，该版本修复了 tree.dat 文件中密码仅经 XOR 弱加密存储的问题。对于仍在使用的老旧版本，建议立即迁移至支持安全凭证存储的现代 FTP/SFTP 客户端（如 FileZilla、WinSCP），并避免在多用户共享机器上使用保存密码功能。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "GlobalSCAPE CuteFTP 密码信息弱加密存储漏洞"
updated = "2026-06-16T21:50:58.020"

