[basic]
description = "brace-expansion 是 Node.js 生态中广泛使用的字符串展开库，其 expand() 函数在处理连续非扩展 {} 组时存在指数级时间复杂度缺陷（O(2ⁿ)）。攻击者仅需构造约 90 字节（30 个分组）的短 ASCII 字符串即可触发该缺陷，导致 Node.js 单线程事件循环被长时间阻塞，轻则分钟级挂起，重则进程彻底卡死。由于 brace-expansion 被大量上层包间接依赖（如 glob、npm 等），攻击面广。该漏洞影响至 5.0.6 版本，CVSS 评分 7.7，危害等级高。max 选项仅限制输出数量而非递归计算量，无法缓解此问题。目前无官方补丁，建议停止使用或限制输入字符串长度。"
published = "2026-06-30T10:16:34.560"
remediation = "立即将 brace-expansion 升级至 5.0.7 或以上版本（npm install brace-expansion@latest），该版本已修复 expand() 函数对连续非扩展 {} 组的指数级时间复杂度问题。注意 max 选项仅限制输出数组大小而非递归深度，无法作为有效缓解措施，必须通过版本升级修复。如无法升级，可在调用 expand() 前对输入字符串中连续非扩展 {} 组的数量进行限制（建议不超过 10 组），或改用其他不依赖递归展开的 brace expansion 实现。"
score = 7.7
severity = "HIGH"
sources = ["ghsa"]
title = "brace-expansion 大括号扩展拒绝服务漏洞"
updated = "2026-07-08T12:17:20.087"

