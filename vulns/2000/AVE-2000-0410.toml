[basic]
description = "Max Feoktistov Small HTTP server 存在内存损坏漏洞，远程攻击者可通过向目标服务器发送特制的 HTTP 请求，触发缓冲区溢出并覆盖结构化异常处理程序（SEH），导致服务崩溃进而引发拒绝服务（DoS）。该漏洞影响 Small HTTP server 1.212 及 3.06 版本，无需身份认证即可远程利用，危害等级中等。"
published = "2000-06-15T04:00:00.000"
remediation = "建议立即停止使用已停止维护的 Small HTTP Server，迁移至现代 Web 服务器如 Nginx、Apache HTTP Server 或 IIS 等。如无法立即迁移，可在网络边界防火墙或反向代理层限制入站 GET 请求长度不超过 4096 字节，以缓解超长 URL 触发的缓冲区溢出拒绝服务攻击。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Max Feoktistov Small HTTP Server 缓冲区溢出漏洞"
updated = "2026-06-16T21:51:50.020"

