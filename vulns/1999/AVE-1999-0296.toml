[basic]
description = "HP Visualize Conference 的默认 FTP 配置存在授权缺陷，会议中任意参与者可在未经其他参会者授权的情况下向其发送文件。攻击者利用该默认配置，通过 FTP 协议向目标用户推送恶意文件，可能导致敏感信息泄露或进一步渗透。该漏洞影响 HP-UX 系统上的 HP Visualize Conference，无需身份认证即可远程触发，CVSS v2.0 评分 7.5，危害等级高。"
published = "1999-07-01"
remediation = "针对 HP-UX 系统上的 HP Visualize Conference，参考 HP 安全公告 HPSBUX9906-099 进行修复。建议升级 HP-UX 至最新受支持版本，并在 FTP 服务配置中禁用匿名文件传输功能，限制会议用户仅通过认证方式访问 FTP 服务。同时在系统防火墙层面限制非必要 IP 对 FTP 端口（21/TCP）的访问作为临时缓解措施。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "HP Visualize Conference FTP 未授权文件传输漏洞"
updated = "2026-06-16"

