[basic]
description = 'Microsoft Outlook、Exchange 及 Windows Messaging 等电子邮件客户端默认自动响应邮件的"已读回执"和"送达回执"标记。远程攻击者可伪造已读回执请求，并将其重定向至大型邮件列表，触发大量自动响应消息，导致目标邮件系统流量激增甚至拒绝服务。该漏洞影响 Microsoft 多个邮件客户端版本，CVSS 评分 5.0，危害等级中危。攻击者无需身份认证即可利用该漏洞，通过发送精心构造的邮件即可触发。'
published = "2000-02-29T05:00:00.000"
remediation = '建议安装 Microsoft Outlook 电子邮件安全更新（对应 MS00-009 安全公告），该更新可禁用客户端自动发送已读回执功能。同时，在 Exchange Server 上配置阻止外部发件人使用回执重定向到通讯组列表；在 Outlook 中取消勾选"工具→选项→首选参数→电子邮件选项→跟踪选项"中的"处理已读回执"和"处理送达回执"复选框。如系统已超出支持生命周期，建议升级至受支持的 Outlook/Exchange 版本。'
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Microsoft Outlook/Exchange/Windows Messaging 电子邮件自动响应漏洞"
updated = "2026-06-16T21:51:14.723"

