[basic]
description = "畅捷CRM（畅捷通）的 create_site.php 接口存在 SQL 注入漏洞。攻击者无需身份认证，可通过向该接口提交特制的 HTTP 请求参数，利用后端未对用户输入进行充分过滤及转义的缺陷，将恶意 SQL 语句注入后台数据库执行，从而导致数据库中的敏感信息泄露、数据被篡改甚至获取服务器控制权限。该漏洞影响畅捷通 CRM 多版本，危害严重，建议尽快升级修复。"
published = "08.08"
remediation = "建议立即升级至畅捷通最新产品（如 T+Cloud 19.0 或 T+Online 19.0），因畅捷CRM全系列版本已停止维护不再发布补丁。如无法升级，应对 create_site.php 所有输入参数实施参数化查询或预编译语句，同时部署 Web 应用防火墙（WAF）拦截注入攻击载荷，作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "畅捷通 畅捷CRM SQL注入漏洞"
updated = "08.08"

