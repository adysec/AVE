[basic]
description = "Mozilla Firefox 21.0 之前版本、Firefox ESR 17.x 之前 17.0.6 版本、Thunderbird 17.0.6 之前版本及 Thunderbird ESR 17.x 之前 17.0.6 版本中，nsDOMSVGZoomEvent 对象的 mPreviousScale 和 mNewScale 函数存在数据结构未正确初始化漏洞。远程攻击者可通过构造特制网站诱导用户访问，利用未初始化的内存数据获取进程中的敏感信息，导致信息泄露。该漏洞攻击复杂度低，无需特权，但需要用户交互，CVSS 评分 6.5，危害等级中危。"
published = "2013-05-16T11:45:30.877"
remediation = "将 Mozilla Firefox 升级至 21.0 及以上版本，Firefox ESR 升级至 17.0.6 及以上版本，Thunderbird 及 Thunderbird ESR 升级至 17.0.6 及以上版本。如无法立即升级，可在浏览器中禁用 JavaScript（about:config 中设置 javascript.enabled=false）以降低攻击面，或通过内容安全策略（CSP）限制 SVG 文档加载。"
score = 6.5
severity = "MEDIUM"
sources = ["kev"]
title = "Mozilla Firefox/Thunderbird nsDOMSVGZoomEvent 信息泄露漏洞"
updated = "2026-06-16T23:51:53.300"

