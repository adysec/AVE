[basic]
description = "Linux 内核 io_uring 子系统中的 IORING_OP_READ 操作在处理读取 I/O 返回负值（除 -EAGAIN 和 -EIOCBQUEUED 外）时未正确释放已提供的缓冲区列表，导致在 io_rw_done 完成回调运行于不同上下文时触发释放后使用（Use-After-Free）漏洞。本地攻击者可通过构造特制的 io_uring 请求序列利用此漏洞实现权限提升。该漏洞影响 Linux 内核多个版本，CVSS 评分 7.8，危害等级高。"
published = "2025-02-24T09:15:09.373"
remediation = '升级 Linux 内核至包含 commit 22d57f2a2e48 ("io_uring/rw: split io_read() into a helper") 的版本，对应主线内核 v6.2+、长期支持分支 v6.1.8+ 或发行版已合入该补丁的内核包。如无法立即升级，可在启动参数中添加 `io_uring.disable=1` 禁用 io_uring 子系统作为临时缓解措施（仅限非 io_uring 依赖环境）。'
score = 7.8
severity = "HIGH"
sources = ["msrc"]
title = "Linux Kernel io_uring 释放后使用漏洞"
updated = "2026-06-17T06:43:56.997"

