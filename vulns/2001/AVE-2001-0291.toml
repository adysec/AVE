[basic]
description = "Digital Creations Zope 2.3.1 b1 及更早版本中，ObjectManager、PropertyManager 与 PropertySheet 等类的部分方法返回值存在可变性缺陷。本地攻击者在具备相应访问能力的情况下，可篡改这些本应只读或受限的返回对象（如角色列表、属性集合等），从而在请求处理期间改变对象状态或越权修改数据完整性。该问题影响上述版本的 Zope 应用服务器部署环境，攻击条件为本地或已获得应用内脚本/对象操作权限，利用方式为通过可变返回值实施状态篡改。CVSS 评分为 2.1（低危），主要危害为完整性受损。"
published = "2001-08-22T04:00:00.000"
remediation = "建议立即将 Zope 升级至 2.3.2 或更高版本，该版本已修复 ObjectManager、PropertyManager、PropertySheet 类中方法返回值错误处理的安全漏洞。如暂无法升级，应通过 Zope 安全声明（Zope-Security）机制，在安全 Policy 配置中严格限制只有超级用户账户才能访问 ObjectManager 和 PropertyManager 相关管理功能，并禁止将 Zope 管理端口（如 8080）直接暴露于互联网，仅允许内网可信 IP 访问。"
score = 2.1
severity = "LOW"
sources = ["redhat"]
title = "Digital Creations Zope 越权访问漏洞"
updated = "2026-06-16T21:54:33.180"

