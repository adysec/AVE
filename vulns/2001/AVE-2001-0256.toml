[basic]
description = "Netscape Communicator 4.77 及更早版本存在 GIF 图像 JavaScript 执行漏洞，攻击者可通过在 GIF 图像注释字段中嵌入任意 JavaScript 代码构造恶意图像。当用户使用受影响版本的 Netscape Communicator 查看该图像时，浏览器在解析 GIF 格式过程中未对注释内容进行安全过滤，导致注释中的脚本被自动执行。未经身份认证的远程攻击者利用该漏洞可获取受害者当前页面的 Cookie、会话令牌及浏览历史等敏感信息，进而实施会话劫持或进一步攻击。该漏洞影响范围涵盖所有未部署安全补丁的 Netscape Communicator 4.x 版本，无需用户额外交互即可在正常浏览过程中触发。CVSSv2 评分为 7.5（高危），攻击向量为网络远程、攻击复杂度低、无需认证即可完成利用。Debian 及 RedHat 等主流 Linux 发行版均已发布安全公告（DSA-051、RHSA-2001-046）并推送修复补丁，用户应升级至 Netscape Communicator 4.77 或更高版本以彻底消除该风险。"
published = "2001-08-02T04:00:00.000"
remediation = "将 Netscape Communicator 升级至 4.77 或更高版本以修复此漏洞。由于 Netscape Communicator 已停止维护，建议迁移至受现代浏览器（如 Firefox、Chrome 或 Edge）。如短期内无法升级或更换浏览器，可暂时禁用 JavaScript 执行，并避免打开来自不可信来源的 GIF 图片作为缓解措施。Debian 用户应安装 DSA-051 安全更新，Red Hat 用户应应用 RHSA-2001-046 补丁。"
score = 7.5
severity = "HIGH"
sources = ["redhat"]
title = "Netscape Communicator GIF 图片 JavaScript 代码执行漏洞"
updated = "2026-06-16T21:54:36.167"

