[basic]
description = "MySQL 3.22.27/3.22.29/3.23.8 版本中存在权限管理漏洞，拥有 GRANT 权限的本地用户可利用 GRANT 特权修改任意 MySQL 用户的密码，导致权限提升。攻击者需先获取数据库本地访问权限及 GRANT 权限，即可通过执行 GRANT 语句覆盖其他用户（包括管理员）的密码，进而接管数据库控制权。该漏洞影响 MySQL 3.x 系列多个版本，CVSS 评分 6.4，危害等级中危。"
published = "2000-01-11T05:00:00.000"
remediation = "升级到 MySQL 3.23.9 或更高版本，该版本修复了通过 GRANT 权限修改任意用户密码的问题。如无法升级，应严格限制 GRANT 权限的授予范围，仅授予可信管理员用户，并定期审计 MySQL 用户权限配置。"
score = 6.4
severity = "MEDIUM"
sources = ["cve"]
title = "MySQL GRANT 权限密码修改漏洞"
updated = "2026-06-16T21:50:53.257"

