[basic]
description = "HP-UX 11.X 及 10.X 系统中的 shutdown 命令存在本地权限提升漏洞，由于该命令在处理用户提供的畸形输入变量时未进行充分的边界检查与过滤，导致攻击者可通过精心构造的环境变量或命令行参数触发缓冲区溢出或参数注入。本地攻击者只需拥有系统普通用户权限即可利用该漏洞，成功利用后可获取 root 权限，完全控制目标系统，造成机密性、完整性和可用性受损。"
published = "2000-05-04T04:00:00.000"
remediation = "建议升级至 HP-UX 11i v3 (11.31) 或更高版本，该漏洞已在后续版本中修复。对于仍运行 HP-UX 10.X/11.0/11.11 的系统，作为临时缓解措施，可限制 shutdown 命令的执行权限，仅允许 root 用户执行：`chmod 700 /sbin/shutdown`，并监控 `/var/adm/syslog` 中异常的 shutdown 调用记录。HP 已停止对 10.X 和 11.0 的安全支持，建议尽快迁移至受支持版本。"
score = 4.6
severity = "MEDIUM"
sources = ["avd"]
title = "HP HP-UX shutdown 命令本地权限提升漏洞"
updated = "2026-06-16T21:51:39.947"

