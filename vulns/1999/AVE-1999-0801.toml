[basic]
description = "Linux 内核 2.0.3x 版本的 ping 命令在处理带有 -R（记录路由）选项的大型数据包时存在拒绝服务漏洞。攻击者可通过发送特制的包含记录路由选项的大尺寸 ICMP 数据包，触发内核缓冲区溢出或整数溢出，导致系统崩溃或服务中断。该漏洞影响 Debian 2.1、RedHat 5.2 等基于 Linux 2.0.x 内核的系统，本地用户即可利用此漏洞造成拒绝服务。"
published = "1999-12-08T05:00:00.000"
remediation = "升级 Linux 内核至 2.0.39 或更高版本（如 2.2.x 系列），该版本已修复 ping -R 大包拒绝服务漏洞。若无法立即升级内核，可通过 iptables 限制 ICMP 包大小：`iptables -A INPUT -p icmp --icmp-type echo-request -m length --length 65535 -j DROP`，或在 sysctl 中禁用 IP 记录路由选项：`echo 0 > /proc/sys/net/ipv4/conf/all/accept_source_route`。"
score = 5.0
severity = "MEDIUM"
sources = ["avd"]
title = "Linux 内核 ping 命令记录路由选项拒绝服务漏洞"
updated = "2026-06-16T21:49:27.963"

