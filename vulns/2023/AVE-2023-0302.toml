[basic]
description = "致远互联 OA 系统 A6 版本中的 initDataAssess.isp 接口存在信息泄露漏洞。该接口未对访问进行严格的身份认证与权限校验，导致未授权的远程攻击者无需登录即可直接访问该页面，从而获取系统初始化评估相关的敏感数据（如系统配置、内部资产信息等）。攻击条件简单，仅需目标系统暴露于网络且可访问该接口路径即可，攻击者通过构造普通 HTTP 请求即可触发。该漏洞影响部署了存在缺陷版本致远 OA A6 的系统，可能被进一步利用以辅助后续渗透攻击，危害程度中等。"
published = "08.08"
remediation = "立即升级致远OA A6至最新安全版本（v6.1_SP1及以上），或删除/重命名 webapps/seeyon/目录下的 initDataAssess.jsp 文件。临时缓解措施：在 Nginx/WAF 层面添加规则拦截对 /seeyon/initDataAssess.jsp 的访问请求。"
score = 5
severity = "MEDIUM"
