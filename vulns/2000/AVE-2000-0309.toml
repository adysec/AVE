[basic]
description = "Wired Community Software WWWThreads 5.0 存在 SQL 注入漏洞，由于程序未对传递给 SQL 查询的数字型数据和表名进行有效过滤与清洗，远程攻击者可通过构造恶意的数字参数或表名注入任意 SQL 命令，进而获取论坛的管理员或高级权限。该漏洞影响 WWWThreads 5.0 版本，CVSS 评分 7.5，属高危漏洞。攻击者无需身份认证即可远程利用，通过提交包含 SQL 语句的参数实现权限提升、数据窃取或篡改。建议升级至修复版本或实施严格的输入验证与参数化查询防护。"
published = "2000-02-03T05:00:00.000"
remediation = "建议立即升级至 WWWThreads 5.0 修补版本或最新版本，修复 SQL 注入漏洞。若无法升级，需在应用层对所有数字型参数和表名参数实施严格的输入验证和参数化查询，同时在 WAF 配置拦截包含 SQL 关键字（UNION、SELECT、INSERT 等）的恶意请求，并限制数据库账户权限至最小权限原则。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "有线社区软件 WWWThreads 5.0 SQL注入漏洞"
updated = "2026-06-16T21:51:03.143"

