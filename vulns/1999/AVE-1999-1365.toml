[basic]
title = "Compaq Microcom 6000 Access Integrator 暴力破解用户名密码漏洞"
description = "Compaq/Microcom 6000 Access Integrator 在多次登录失败后不会断开客户端连接，导致远程攻击者可以通过暴力破解方式猜测用户名或密码。该漏洞属于认证机制缺陷（CWE-307），攻击者无需认证即可利用，影响系统机密性。"
severity = "HIGH"
score = 7.5
sources = ["cve", "avd"]
published = "1998-06-03"
updated = "2026-06-16"
remediation = "升级 Microcom 6000 固件至最新版本，或配置网络访问控制列表限制对管理端口的访问，并启用账户锁定策略防止暴力破解。"
