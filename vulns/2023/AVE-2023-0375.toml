[basic]
description = "Linux 内核 EROFS 文件系统的 z_erofs_decompressqueue_endio 函数中对原子上下文的检测不充分，该函数可能在 RCU 锁保护下被 blk_mq_flush_plug_list 调用，此时处于原子上下文中却执行了 mutex_lock 等可能导致休眠的操作，触发内核 BUG，系统崩溃。该漏洞位于 fs/erofs/zdata.c，CVSS 评分 5.5，危害等级中危。本地攻击者可通过对 EROFS 文件系统执行 I/O 操作（如触发 page cache 预读）来触发此条件，导致系统拒绝服务。"
published = "2025-09-15T15:15:50.063"
remediation = "升级 Linux 内核至 6.1.25 以上版本或合入该补丁提交（修复位于 fs/erofs/decompressor.c 中，将原子上下文检测由 in_atomic() 改为 !in_task() 并增加 rcu_read_lock_any_held() 判断），即可避免在 RCU 锁定上下文中触发内核态休眠操作导致的 BUG。若无法立即升级，可在 dm-verity 场景下通过内核启动参数 `erofs_async_decompress=1` 强制所有解压缩走异步 worker 路径作为临时缓解。"
score = 5.5
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux EROFS 文件系统原子上下文检测不当导致内核崩溃漏洞"
updated = "2026-06-17T06:44:34.507"

