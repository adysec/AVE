[basic]
description = "Linux 内核 F2FS 文件系统在 f2fs_remount() 函数中存在条件竞争漏洞。当系统以读写方式重新挂载 F2FS 文件系统时，default_options() 会先将挂载选项重置为默认值，随后 parse_options() 再根据参数更新，两者之间存在时间窗口。在此期间，攻击者可通过并发执行 fallocate 系统调用触发 f2fs_drop_extent_tree() 访问已释放的 extent cache 锁，导致空指针解引用，引发内核崩溃。该漏洞影响 Linux 内核使用 F2FS 文件系统的版本，本地普通用户可利用此漏洞发起拒绝服务攻击。"
published = "2025-09-18T16:15:49.067"
remediation = "升级 Linux 内核至 5.10.210、5.15.149、6.1.64、6.6.3 及以上包含 commit 3c6b5b1c2b8e 的版本，或应用对应稳定分支的补丁。临时缓解措施：避免在 f2fs 文件系统上并发执行 remount 与 fallocate 操作。"
score = 4.7
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux Kernel f2fs 竞争条件漏洞"
updated = "2026-06-17T06:45:21.877"

