[basic]
description = "WordPress 的 ultimate-weather 插件 1.0 版本存在跨站脚本（XSS）漏洞，该插件在生成天气信息页面时未对用户输入进行正确的转义处理。未经身份认证的远程攻击者可通过向目标站点发送特制的 URL，诱使用户点击后，在受害浏览器中执行任意 HTML 或 JavaScript 脚本，导致敏感信息泄露或会话劫持。攻击无需认证但需要用户交互，CVSS 评分 6.1，危害等级中危。"
published = "2020-01-10T14:15:10.247"
remediation = "立即停用并删除 WordPress 插件 ultimate-weather 1.0 版本（开发者已停止维护，无安全更新）。如业务必须使用，可选用以下缓解措施：1) 在 Web 应用防火墙 (WAF) 中配置规则拦截包含 `<script>`、`onerror=` 等 XSS 载荷的 URL 参数；2) 在 WordPress 主题的 functions.php 中添加 `add_filter('the_title', 'esc_html');` 对输出内容转义编码；3) 安装安全插件（如 Wordfence）启用 XSS 防护规则。"
score = 6.1
severity = "MEDIUM"
sources = ["nuclei"]
title = "WordPress Ultimate Weather 插件跨站脚本漏洞"
updated = "2026-06-17T00:10:14.590"

