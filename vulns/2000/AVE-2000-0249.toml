[basic]
description = "BeOS 操作系统（4.0、4.5 及 5.0 版本）在处理网络数据包时存在拒绝服务漏洞。其网络协议栈未对数据包长度字段进行充分校验，当远程攻击者向目标系统发送长度字段小于协议头实际长度的特殊畸形数据包时，系统会因解析错误而耗尽资源或崩溃。该漏洞无需身份认证，攻击者可借由网络远程发送特制报文触发，导致受影响主机无法提供正常网络服务，影响范围覆盖上述 BeOS 版本的联网设备。"
published = "2000-04-07T04:00:00.000"
remediation = "建议将受影响的 BeOS 4.0/4.0.1/4.5/5.0 升级至 Be 官方发布的 BeOS 5.0.3 或后续修复版本（可通过 BeBits/官方更新渠道获取）。如暂无法升级，可在边界防火墙或路由器上丢弃分片异常、IP 头长度字段小于实际头部的畸形数据包，并在上游网络对来源 IP 做限速与过滤，作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Be BeOS 畸形IP数据包拒绝服务漏洞"
updated = "2026-06-16T21:51:23.117"

