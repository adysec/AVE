[basic]
description = "sort 命令在创建临时文件时存在符号链接跟随漏洞。当 sort 处理数据时，会在 /tmp 等目录创建临时文件，但未检查目标文件是否为符号链接。本地攻击者可通过预先创建指向其他用户可写文件的符号链接，诱使 sort 覆盖或破坏这些文件。该漏洞在 updatedb 等调用 sort 的程序中尤为明显，影响 Unix/Linux 系统，CVSS 评分 7.2，危害等级高。修复方式包括使用安全的临时文件创建函数（如 mkstemp）或设置 O_NOFOLLOW 标志。"
published = "1997-10-06"
remediation = "使用 mkstemp() 等安全临时文件创建函数替代 mktemp()，在 open() 调用中设置 O_NOFOLLOW 或 O_EXCL 标志防止符号链接跟随。升级至包含此修复的 coreutils 版本，或应用各发行版提供的安全补丁。"
score = 7.2
severity = "HIGH"
sources = [
    "cve",
    "avd",
]
title = "GNU coreutils sort 临时文件符号链接漏洞"
updated = "2026-06-16"

