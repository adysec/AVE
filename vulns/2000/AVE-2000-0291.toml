[basic]
description = "ATRIUM Cassandra NNTP Server 1.10 存在缓冲区溢出漏洞，远程攻击者可通过向登录认证功能提交超长用户名，触发缓冲区溢出，导致服务进程崩溃，造成拒绝服务。该漏洞影响 Cassandra NNTP Server 1.10 版本，攻击无需身份认证，通过网络即可实施，危害等级中等。"
published = "2000-05-01T04:00:00.000"
remediation = "` tags.<value>升级 Atrium Software Cassandra NNTP Server 至 1.10 以上版本，或更换为仍受支持的 NNTP 服务软件（如 INN）。如无法升级，应在防火墙层面限制对 NNTPServer 端口（默认 119）的访问，仅允许受信任 IP 连接。"
score = 5
