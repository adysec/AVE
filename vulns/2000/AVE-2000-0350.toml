[basic]
description = "Aladdin Knowledge Systems eToken 3.3.3 设备存在安全漏洞。具有物理访问权限的攻击者可以通过重置设备EEPROM中存储的PIN码，绕过所有者设定的PIN保护机制，从而获取设备的敏感信息。该漏洞源于eToken设备在硬件层面未对PIN重置操作进行充分的身份验证，允许攻击者在不知道原始PIN的情况下直接通过硬件操作完成PIN重置。"
published = "2000-05-04"
remediation = "升级到修复此漏洞的eToken设备固件版本或使用更高版本的eToken设备。在无法升级的情况下，应对物理访问受限环境中的eToken设备加强物理安全防护，确保只有授权人员可以接触设备硬件，防止未经授权的PIN重置操作。"
score = 4.6
severity = "MEDIUM"
sources = ["cve"]
title = "阿拉丁知识系统 eToken 3.3.3 存在PIN重置漏洞导致敏感信息泄露"
updated = "2026-06-16"

