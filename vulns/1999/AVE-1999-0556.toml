[basic]
description = "IBM AIX 操作系统的批处理队列（bsh）在网络打印功能启用时存在权限提升漏洞。本地或远程攻击者可通过向目标系统提交恶意打印请求，利用批处理队列处理机制中的缺陷获取额外系统权限。该漏洞影响启用了网络打印功能的 AIX 系统，CVSS 评分 7.5，危害等级高。IBM 已发布安全公告建议用户禁用不必要的网络打印服务进行缓解。"
published = "1994-06-03T04:00:00.000"
remediation = "建议升级 AIX 系统至 4.3.3 或更高版本，安装 IBM 针对 bsh 队列权限提升漏洞的 APAR 补丁。临时缓解措施：在 `/etc/inetd.conf` 中注释 `printer` 服务行并重启 inetd，或通过防火墙限制 515 端口访问，禁用不必要的网络打印功能。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "IBM AIX batch queue 网络打印权限提升漏洞"
updated = "2026-06-16T21:48:10.850"

