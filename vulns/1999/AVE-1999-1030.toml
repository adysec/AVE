[basic]
description = "IBM AS/400 共享文件夹功能与 Microsoft SNA Server 3.0 及更早版本之间存在设计缺陷，当多个用户共享相同的本地 APPC LU（逻辑单元）时，AS/400 系统未能正确隔离用户之间的文件夹访问权限，导致用户能够越权查看其他用户的文件夹内容，造成敏感信息泄露。攻击者只需与目标用户共用同一 APPC LU 即可触发该漏洞，无需额外认证，影响范围涉及使用了 AS/400 共享文件夹功能的 SNA Server 环境。"
published = "1999-12-31T05:00:00.000"
remediation = "安装 Microsoft SNA Server 3.0 Service Pack 1（KB Q138001）或升级至 SNA Server 4.0 以修复该问题。若无法升级，可为每个用户或用户组分配独立的 Local APPC LU，避免不同用户共享同一 LU 导致文件夹互可见。同时在 AS/400 端对共享文件夹设置严格的 IBM i 对象级权限，限制非授权用户的文件访问。考虑到 SNA Server 已停止支持，建议迁移至 Microsoft Host Integration Server 以获得持续安全更新。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "IBM AS/400 共享文件夹与 Microsoft SNA Server 3.0 及更早版本交互存在信息泄露漏洞"
updated = "2026-06-16T21:50:05.937"

