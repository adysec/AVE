[basic]
description = "AT Computing 公司开发的 atsar Linux 系统性能监控工具包中的 atsadc 组件存在文件权限检查不当漏洞。由于 atsadc 在写入输出文件时未正确验证文件权限，本地普通用户可通过创建符号链接或利用竞争条件等方式，诱使 atsadc 以 root 权限向任意文件写入数据，从而获取 root 权限。该漏洞影响 atsar 1.4 及之前版本，攻击者需拥有本地系统访问权限，CVSS 评分 7.2，危害等级高。"
published = "2000-03-11T05:00:00.000"
remediation = "升级 atsar 至高于 1.4 的最新版本（若已不再维护，建议迁移至 sysstat/sar 替代方案）。临时缓解措施可移除 atsadc 的 setuid 位（`chmod u-s /usr/bin/atsadc`），并限制可登录系统的本地用户范围。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "AT Computing atsar_linux 1.4 本地文件权限提升漏洞"
updated = "2026-06-16T21:51:08.920"

