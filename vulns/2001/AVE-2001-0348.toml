[basic]
description = "Solaris 2.6/7/8、OpenServer 5.0.5/5.0.6 及 HP-UX 10/11 的 rpc.yppasswdd (yppasswd 服务) 存在缓冲区溢出漏洞，未经身份认证的远程攻击者可通过发送超长用户名参数触发栈溢出，进而以 root 权限执行任意代码。该漏洞 CVSS 评分 10.0 (CVSS:3.0/AV:N/AC:L/PR:N/UI:N/S:U/C:H/I:H/A:H)，属远程代码执行高危漏洞，影响多款主流 Unix 系统默认开启的 NIS 密码修改服务，攻击者无需认证即可远程获取根权限。ExploitDB (EDB-20879) 及 GitHub 多个仓库已公开 PoC 利用代码，建议升级至修复版本或禁用 rpc.yppasswdd 服务。"
published = "2001-10-18T04:00:00.000"
remediation = "立即从厂商官网获取并安装针对 CVE-2001-0779 的安全补丁：Solaris 2.6/7/8 安装 Sun Alert 209 补丁（如 106476-02、106950-04、108992-02）、OpenServer 5.0.5/5.0.6 升级至 5.0.7 并应用 SCO 安全公告补丁、HP-UX 10/11 安装 PHSS_18783/PHSS_21667 补丁。若无法立即打补丁，立即停止 rpc.yppasswdd 服务并禁用 NIS 密码修改功能，同时在防火墙上封锁 UDP/TCP 端口 635（yppasswdd 端口）阻断远程攻击面。建议迁移至受支持的现代操作系统版本彻底消除风险。"
score = 10
severity = "CRITICAL"
sources = ["exploitdb"]
title = "SCO OpenServer HP-UX Sun Solaris rpc.yppasswdd 缓冲区溢出漏洞"
updated = "2026-06-16T21:54:56.533"

