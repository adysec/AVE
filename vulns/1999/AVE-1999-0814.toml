[basic]
description = "部分路由器设备配置不当或存在权限校验缺陷，导致任意远程主机无需认证即可通过特定协议查询并获取路由器的完整路由表信息。攻击者可借此掌握目标网络的拓扑结构、子网划分及可达路径，为后续针对性网络攻击（如中间人攻击、路由劫持）提供侦察基础。该漏洞危害等级高，影响多种主流路由器设备，CVSS 评分 7.5。建议限制 SNMP 等管理协议的访问来源，配置 ACL 规则以限制路由信息查询权限。"
published = "1997-01-01T05:00:00.000"
remediation = "在路由器上配置访问控制列表（ACL），仅允许信任的管理网段访问 SNMP、Telnet/SSH 及 Web 管理端口；关闭未使用的 SNMP 服务或将 SNMP 字符串设为只读并改用复杂 community 字符串；禁用路由协议的明文邻居通告（如 Cisco 路由器使用 `no ip route-cache same-interface` 配合 `distribute-list` 过滤路由表查询）。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "路由器路由表远程信息泄露漏洞"
updated = "2026-06-16T21:48:36.973"

