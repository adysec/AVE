[basic]
description = "gix-transport crate（gitoxide 的 Git 传输组件）未对 URL 中用户名部分的特殊字符进行充分校验，导致外部 SSH 程序可将该内容解析为命令行选项。攻击者可构造特制克隆 URL（如 `ssh://-oProxyCommand=...`），利用 SSH 选项走私机制，在受害主机当前工作目录包含恶意文件时触发任意代码执行。该漏洞影响 0.35.0、0.42.0 及 0.62.0 之前的所有版本，CVSS 评分 6.4，危害等级中危。"
published = "2024-04-26T18:15:46.167"
remediation = '将 gix-transport 升级至 ≥0.35.0（v0.35 分支）、≥0.42.0（v0.42 分支）或 ≥0.62.0（v0.62 分支）。无法立即升级时，在调用 gix clone 前严格校验 URL 中 username 字段不含 "-" 开头及空格、$IFS 等特殊字符，禁止传入外部可控的克隆 URL。'
score = 6.4
severity = "MEDIUM"
sources = ["msrc"]
title = "gitoxide gix-transport 克隆URL中SSH选项注入远程代码执行漏洞"
updated = "2026-06-17T07:30:36.977"

