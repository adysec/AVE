[basic]
description = "Poll It CGI 2.0 的 pollit.cgi 管理认证模块存在设计缺陷，远程攻击者无需知道真实管理员密码，只需将 HTTP 请求参数 entered_password 和 admin_password 设置为相同值即可绕过身份验证，获取管理后台的完全访问权限，进而可对投票数据进行未授权操作。该漏洞影响 Poll It 2.01 及更早版本，CVSS 评分为 6.4，危害等级中高危。"
published = "2000-12-11T05:00:00.000"
remediation = "将 pollit.cgi 中 ReadForm() 调用移至脚本最前（第 15 行之前），确保所有内部变量声明都在 ReadForm 之后执行，防止攻击者通过 CGI 参数覆盖 $admin_password 等关键变量。同时限制 CGI 目录的 Web 访问权限，在 .htaccess 中添加 Allow/Deny 规则仅允许可信 IP 访问管理功能，并将 pollit_files/ 目录的敏感文件（如 ips.txt）配置为不可被 Web 直接访问。鉴于 cgi-world.com 已停止维护该脚本，强烈建议迁移至其他仍在更新的安全投票系统（如 LimeSurvey 或 PollDaddy）。"
score = 6.4
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Poll It CGI 2.0 后台管理权限绕过漏洞"
updated = "2026-06-16T21:53:05.270"

