[basic]
description = "Linux 内核 2.0.36 之前版本的 TCP 协议栈存在盲欺骗漏洞。远程攻击者可在未完成完整 TCP 三次握手前，通过预测 TCP 序列号向应用层注入伪造数据，绕过连接建立验证机制。该漏洞影响 Linux Kernel 2.0.30 至 2.0.37 版本，攻击者无需处于中间人位置即可实施盲注入攻击，可能导致数据篡改或会话劫持。"
published = "1999-03-01T05:00:00.000"
remediation = "升级至 Linux 内核 2.0.36 或更高版本以修复 TCP 握手机制缺陷；若无法升级内核，启用 TCP syncookies（`echo 1 > /proc/sys/net/ipv4/tcp_syncookies`）并配置 iptables 限制入站 TCP 连接速率以降低欺骗攻击风险。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Linux Kernel TCP 欺骗漏洞"
updated = "2026-06-16T21:48:20.800"

