[basic]
description = "Linux 内核内存控制组（memcg）子系统中存在空指针解引用漏洞。当硬件中毒（hwpoison）机制强制将 LRU 中毒页面注销时，folio_memcg 变为 NULL，导致 mem_cgroup_track_foreign_dirty_slowpath() 函数在执行脏页回写跟踪时出现空指针解引用，进而触发内核崩溃。本地攻击者可利用此漏洞造成拒绝服务。该漏洞影响 Linux 内核各版本，CVSS 评分 5.5，危害等级中等。"
published = "2025-03-27T17:15:43.803"
remediation = "升级 Linux 内核至包含 commit `mem_cgroup_track_foreign_dirty()` 中增加 `folio_memcg` 空指针检查的稳定版本（如 6.1.x/6.6.x LTS 系列对应修复版本），或应用对应发行版内核安全补丁。如无法立即更新，可通过内核参数 `cgroup.memory=nokmem` 禁用内核内存计量作为临时缓解措施。"
score = 5.5
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux Kernel 内存 cgroup 脏页回写跟踪空指针解引用漏洞"
updated = "2026-06-17T06:43:58.903"

