[basic]
description = "Etype Eserv 2.50 Web 服务器存在目录遍历漏洞，远程攻击者无需身份认证即可通过在 URL 中插入 `../` 序列绕过路径限制，读取文件系统中任意文件。该漏洞源于服务器对用户请求路径过滤不严，未正确规范化包含点斜杠的路径。攻击者可利用此漏洞获取敏感配置文件、密码哈希等关键信息，进而扩大攻击面。CVSS 评分 5.0，危害等级中危。"
published = "1999-11-04T05:00:00.000"
remediation = "立即将 Eserv 升级至 5.0 或更高版本（官网 http://www.eserv.ru 下载），该目录遍历漏洞已在后续版本中修复。如无法升级，在 Web 服务器配置中禁用对 `../` 序列的路径解析，并配置 Web 根目录限制，阻止访问非公开目录中的文件。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Etype Eserv 2.50 Web 服务器目录遍历漏洞"
updated = "2026-06-16T21:50:35.603"

