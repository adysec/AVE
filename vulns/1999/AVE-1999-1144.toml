[basic]
description = "Celtech ExpressFS FTP 服务器 2.x 版本存在缓冲区溢出漏洞。远程攻击者无需身份认证，可通过向 FTP 服务发送超长的 USER 命令参数触发栈缓冲区溢出，导致服务器进程崩溃造成拒绝服务，在特定条件下可进一步实现远程代码执行。攻击复杂度低，仅需目标 FTP 服务处于运行状态即可实施利用。"
published = "2001-11-28T05:00:00.000"
remediation = "该漏洞存在于已停止维护的 Celtech ExpressFS FTP Server 2.x，官方已无补丁可用。建议立即停止使用该产品，迁移至受支持的 FTP 服务器软件（如 vsftpd、FileZilla Server）。临时缓解措施：在防火墙中限制该 FTP 服务的来源 IP 白名单，仅允许信任 IP 访问端口 21。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "Celtech ExpressFS FTP 服务器缓冲区溢出漏洞"
updated = "2026-06-16T21:50:36.223"

