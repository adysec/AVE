[basic]
description = "FreeBSD 3.0 至 3.4 版本中的 asmon 和 ascpu 工具存在本地权限提升漏洞。攻击者可通过构造恶意的配置文件，诱使这些工具在处理时执行任意代码，从而获取 root 权限。该漏洞影响 FreeBSD 3.x 全系版本，需本地用户身份才能利用，CVSS 评分 4.6，危害等级中危。"
published = "2000-02-21T05:00:00.000"
remediation = "升级 FreeBSD 至 3.4 及以上版本，或删除 asmon 和 ascpu 的 setuid 权限位（chmod u-s /usr/X11R6/bin/asmon /usr/X11R6/bin/ascpu），并限制配置文件仅允许 root 用户写入。如无需使用该工具，建议直接卸载软件包。"
score = 4.6
severity = "MEDIUM"
sources = ["epss"]
title = "FreeBSD asmon/ascpu 本地权限提升漏洞"
updated = "2026-06-16T21:51:07.887"

