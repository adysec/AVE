[basic]
description = "Intel Express 8100 ISDN 路由器在处理 ICMP 数据包时存在拒绝服务漏洞。远程攻击者无需身份认证即可通过向目标路由器发送超大型或分片 ICMP 数据包，触发路由器处理异常导致服务中断。受影响的 Intel Express 8100 ISDN 路由器部署于中小企业及分支机构的拨号网络环境中，危害等级中危。厂商建议限制 ICMP 流量或升级固件缓解风险。"
published = "2000-05-19T04:00:00.000"
remediation = "Intel Express 8100 ISDN Router 已停产且不再受支持，建议立即更换为仍在安全更新周期内的现代路由器设备。如无法更换，可在网络边界防火墙配置规则丢弃超大或分片 ICMP 数据包（如 iptables 规则：iptables -A INPUT -p icmp -f -j DROP），并限制 ICMP 包速率以缓解 DoS 攻击影响。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Intel Express 8100 ISDN Router 碎片 ICMP 数据包拒绝服务漏洞"
updated = "2026-06-16T21:51:45.740"

