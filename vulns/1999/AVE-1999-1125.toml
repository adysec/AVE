[basic]
description = "Intel Pentium 处理器（MMX 和 Overdrive 型号）存在指令处理缺陷，本地攻击者可通过执行带有锁定前缀的非法 CMPXCHG8B 指令，导致处理器进入未定义状态，进而引发基于 Intel 的操作系统（如 Windows NT 和 Windows 95）挂起或崩溃，造成拒绝服务。该漏洞利用条件简单，攻击者仅需具备本地用户权限即可触发，无需特殊系统权限。"
published = "1999-12-31T05:00:00.000"
remediation = "Windows NT 4.0 用户应安装 Service Pack 4 或更高版本（含 SP4 及后续更新），该补丁通过修改 HAL 层拦截无效指令传递至处理器。Windows NT 3.51 用户需安装微软提供的 pent-fix 热修复补丁，替换 Hal.dll 和 Ntkrnlmp.exe 等内核文件。Windows 95 无官方修复，建议升级至 Windows 98 或更高版本。如无法升级，可在应用层对 CMPXCHG8B 指令进行输入校验，阻止恶意程序执行该非法操作码。"
score = 2.1
severity = "LOW"
sources = ["cve"]
title = "Intel Pentium 处理器拒绝服务漏洞"
updated = "2026-06-16T21:50:31.403"

