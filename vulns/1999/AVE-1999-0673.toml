[basic]
description = "Falcon Web 服务器在处理客户端请求时，对超长文件名的处理存在信息泄露缺陷。远程攻击者无需身份认证，只需向目标服务器发送包含超长文件名的 HTTP 请求，即可诱导服务器在错误响应中暴露 Web 根目录的绝对路径。该漏洞影响运行 Falcon Web 服务器的系统，攻击者可借此获取服务器目录结构等敏感信息，为后续进一步攻击（如路径遍历或文件读取）提供 reconnaissance 情报，属于低危的信息泄露类问题。"
published = "1999-10-28T04:00:00.000"
remediation = "升级到 Falcon Web 服务器修复版本（建议 2.0.3 及以上），或在服务器端配置对超长文件名请求进行长度限制与规范化校验，禁用错误响应中绝对路径的回显，并配置自定义错误页面以隐藏服务器内部路径信息。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Falcon Web服务器 超长文件名路径信息泄露漏洞"
updated = "2026-07-17T00:00:00Z"

