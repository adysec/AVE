[basic]
description = "FreeBSD 系统中的 brouted（路由守护进程）存在缓冲区溢出漏洞，本地攻击者可通过向该程序传递超长命令行参数触发缓冲区溢出，覆盖内存中的关键数据，从而获取 root 权限。该漏洞影响 FreeBSD 及其他可能使用该组件的操作系统，攻击者需具备本地访问权限，无需身份认证即可利用，危害等级高。"
published = "2000-10-20T04:00:00.000"
remediation = "立即升级 FreeBSD 系统至 3.5-RELEASE 或更高版本，该版本已修复 brouted 缓冲区溢出漏洞。如无法升级，可下载 FreeBSD 安全公告中的补丁文件手动修补 brouted 源码并重新编译安装。作为临时缓解措施，可移除 brouted 的 setuid 位（chmod u-s /usr/sbin/brouted）以限制本地普通用户触发提权，但此操作会影响路由守护进程的正常功能。"
score = 7.2
severity = "HIGH"
sources = ["cve"]
title = "FreeBSD brouted 本地缓冲区溢出漏洞"
updated = "2026-06-16T21:52:24.447"

