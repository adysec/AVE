[basic]
description = "CVE-1999-0902 是 NIS（网络信息服务）服务端程序 ypserv 存在的一个权限控制缺陷。该漏洞的原理是 ypserv 在处理 NIS 密码表（如 passwd）相关操作时，未能对本地用户的操作权限进行严格校验，导致具有本地系统管理员（root 或等效权限）身份的用户可以绕过正常的管理流程，直接修改或篡改 NIS 域内的密码表数据。其影响范围为部署了 ypserv 提供 NIS 服务的类 Unix 系统（如 Solaris、Linux 等使用 NIS 进行集中账号管理的服务器），攻击条件要求攻击者已获得目标主机的本地管理员权限，利用方式是本地管理员借助该缺陷直接读写 NIS 密码映射表，从而可伪造或重置其他用户的凭据，破坏账号系统的完整性与安全性。"
published = "1999-10-23T04:00:00.000"
remediation = "建议升级到包含修复的 ypserv 新版本（如 2.3 及以上，随系统发行版安全更新发布）。在无法立即升级时，限制 ypserv 守护进程仅监听受信任的内部网络接口，通过防火墙规则（如 iptables）禁止非授权主机访问 111 端口及 NIS 端口范围，并收紧本地管理员权限、启用 NIS 主从同步校验以降低被篡改密码表的风险。"
score = 7.2
severity = "HIGH"
