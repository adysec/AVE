[basic]
description = "THTTPd（Trivial HTTP Server）在处理 HTTP 请求头时存在缓冲区溢出漏洞。远程攻击者无需身份认证，通过向目标服务器发送特制的超长 If-Modified-Since 请求头，即可触发缓冲区溢出，导致服务进程崩溃造成拒绝服务，或进一步执行任意代码。该漏洞影响 THTTPd 2.x 系列版本，CVSS 评分 10.0，危害等级严重。建议升级至最新版本或限制对 THTTPd 服务的网络访问。"
published = "2000-10-20T04:00:00.000"
remediation = "升级 thttpd 至 2.21 或更高版本，该版本修复了 If-Modified-Since 头处理中的缓冲区溢出问题。如无法立即升级，可在反向代理或 WAF 层面添加规则，拦截长度超过 1024 字节的 If-Modified-Since 请求头作为临时缓解措施。对于仍在运行旧版 thttpd 的生产环境，建议迁移至 actively maintained 的 HTTP 服务器（如 Nginx 或 Apache）。"
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "thttpd If-Modified-Since 头缓冲区溢出远程代码执行漏洞"
updated = "2026-06-16T21:51:33.177"

