[basic]
description = "IRIX Performance Copilot（性能监控工具）在默认安装配置中，其 pmcd 守护进程未设置有效的访问控制机制，导致远程攻击者可通过网络直接访问该服务，获取目标系统的敏感性能数据与系统信息。该漏洞攻击复杂度低，无需认证即可利用，影响 SGI IRIX 操作系统的多个版本。"
published = "2000-04-12T04:00:00.000"
remediation = "限制 pmcd 守护进程的网络访问，在防火墙上仅允许受信主机访问 TCP 4321 端口；如无需 Performance Copilot 功能则停止并禁用 pmcd 服务；升级 SGI 官方发布的安全补丁；对于仍运行 IRIX 的系统建议迁移至受支持的操作系统平台。"
score = 6.4
severity = "MEDIUM"
sources = ["avd"]
title = "SGI IRIX Performance Copilot 敏感信息泄露漏洞"
updated = "2026-06-16T21:51:23.630"

