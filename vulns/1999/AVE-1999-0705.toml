[basic]
description = "S.u.S.E. Linux 6.2 中的 sccw 程序存在缓冲区溢出漏洞。该程序在处理 HOME 环境变量时未对长度进行正确检查，本地攻击者可通过设置过长的 HOME 环境变量触发栈缓冲区溢出，覆盖返回地址，从而获取 root 权限。攻击需要本地用户身份，无需特殊权限。"
published = "1999-09-23"
remediation = "升级到 S.u.S.E. Linux 6.2 的官方补丁版本，或限制本地用户对 sccw 程序的执行权限。由于该产品已停止支持，建议迁移到受支持的 Linux 发行版。"
score = 7.2
severity = "HIGH"
sources = [
    "cve",
    "exploitdb",
]
