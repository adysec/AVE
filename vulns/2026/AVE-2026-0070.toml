[basic]
description = "Linux 内核 FUSE 文件系统驱动在处理 page cache 中的目录项时存在越界写漏洞（CWE-787）。fuse_add_dirent_to_cache() 函数未对由 FUSE 服务器控制的 namelen 字段进行大小校验，仅检查当前页面剩余空间是否足够，忽略了目录项本身可能超过单页大小（4KiB）。攻击者可通过挂载恶意 FUSE 服务器并返回精心构造的 namelen=4095 的超长目录项，触发 memcpy 越界写入后续内核页面 24 字节，造成本地权限提升。该漏洞影响所有使用 4KiB 内存页的 Linux 系统，CVSS 评分 7.8，危害等级高。需升级内核至 6.18.25+ 或 7.0.2+ 版本修复。"
published = "2026-05-01T14:16:19.133"
remediation = "升级 Linux 内核至 6.18.25+ 或 7.0.2+ 版本（对应发行版请安装相应安全更新）。如无法立即更新，可剥离 fusermount3 的 setuid 权限并限制非特权用户命名空间创建，或在不需 FUSE 的系统上禁用 FUSE 内核模块（modprobe -r fuse），防止恶意 FUSE 服务器触发越界写。"
score = 7.8
severity = "HIGH"
sources = ["hwpoc"]
title = "Linux Kernel FUSE page cache 越界写本地提权漏洞"
updated = "2026-07-02T15:16:59.813"

