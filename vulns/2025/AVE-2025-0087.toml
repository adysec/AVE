[basic]
description = "浪潮GSP企业管理软件的 PayOrderSrv.asmx 接口存在远程代码执行漏洞，攻击者无需身份认证即可通过构造特制的 SOAP 请求包，向目标服务器发送恶意数据触发该漏洞，导致在服务器端执行任意命令。该漏洞影响浪潮 GSP 系列企业管理软件，攻击者可利用此漏洞完全控制目标服务器，获取敏感数据或植入后门，危害严重。"
published = "0708"
remediation = '立即联系浪潮官方技术支持获取 GSP 企业管理软件的最新安全补丁并升级。如无法立即升级，在 IIS 管理器中为 PayOrderSrv.asmx 添加请求筛选规则，限制仅允许可信 IP 访问该路径；同时在应用层对该接口的传入参数实施严格的输入校验与反序列化过滤，禁用 ScriptResourceHandler 等潜在危险处理程序；通过 web.config 配置 `<system.web><webServices><protocols><remove name="HttpPost"/></protocols></webServices></system.web>` 等方式限制 ASP.NET Web Service 的协议调用方式，降低攻击面。'
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "浪潮 GSP企业管理软件 PayOrderSrv.asmx 远程代码执行漏洞"
updated = "0708"

