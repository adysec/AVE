Based on the NVD information:
- It's a Linux kernel vulnerability in btrfs filesystem
- The issue is in `__extent_writepage` function
- It checks PageError bit which can lead to unclear error handling responsibility
- CVSS 5.5 (MEDIUM)
- The fix is to stop checking PageError and use the local `ret` variable instead- Affected versions: Linux kernel 3.16 to 6.4.7- Fixed in version 6.4.7
