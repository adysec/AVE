[basic]
description = "Internet Explorer 5.0 在访问未使用标准缓存控制的网站时，无法正确重置用户名/密码缓存，导致同一系统上的其他用户可通过浏览器的缓存数据访问受限网站。该漏洞利用条件为攻击者需与目标用户共用同一系统，属于本地信息泄露漏洞，CVSS 评分 4.6，危害等级中等。"
published = "1999-05-06T04:00:00.000"
remediation = "升级到 Internet Explorer 6.0 或更高版本，或改用现代浏览器（如 Edge/Chrome/Firefox）。使用 IE 时启用隐私浏览模式，避免在共享系统中保存网站密码，使用后手动清除凭据缓存。"
score = 4.6
severity = "MEDIUM"
sources = ["cve"]
title = "Microsoft Internet Explorer 5.0 受限网站凭据缓存泄漏漏洞"
updated = "2026-06-16T21:50:17.353"

