[basic]
description = "Microsoft Windows NT 4.0 系统中 AEDebug 注册表项权限设置不当，本地攻击者可修改该注册表项指向恶意调试器程序。当系统发生崩溃时，系统会自动执行该注册表项指定的调试器，从而以系统权限运行木马程序，导致机密性、完整性和可用性受损。攻击者需具备本地登录权限，无需额外认证即可利用此漏洞。Microsoft 已在安全公告 MS00-008 中发布补丁修复此问题。"
published = "1999-12-31T05:00:00.000"
remediation = '限制对注册表项 HKEY_LOCAL_MACHINE\SOFTWARE\Microsoft\Windows NT\CurrentVersion\AEDebug 的写入权限，仅保留 SYSTEM 和 Administrators 的完全控制权，移除 Users 组的写入权限。建议升级至受支持的 Windows 版本（如 Windows Server 2019/2022），NT 4.0 已停止安全更新多年。可通过组策略或 regedit 的权限设置对该注册表项应用更严格的 ACL。'
score = 4.6
severity = "MEDIUM"
sources = ["epss"]
title = "Microsoft Windows NT 4.0 AEDebug 注册表项权限设置不当本地权限提升漏洞"
updated = "2026-06-16T21:49:41.253"

