[basic]
description = "Microsoft Windows NT 4.0 与 Windows 2000 系统中默认运行 NT Alerter（警报器）与 Messenger（信使）服务，二者用于在局域网内发送弹出式管理警报与消息，且无需身份认证即可被远程或本地调用。攻击者在已获取较低权限的本地或网络账户后，可利用这些服务将特制消息发送给目标主机，借助服务以较高权限上下文执行相关操作，从而实现本地权限提升。该漏洞影响启用上述服务的 Windows NT/2000 主机，攻击条件为攻击者需先获得目标系统的有效登录凭据或局域网络访问权限，利用方式是通过调用 Alerter/Messenger 服务的接口发送恶意消息以绕过正常权限限制。"
published = "1999-01-01T05:00:00.000"
remediation = '安装 Microsoft 针对 Windows NT 4.0 和 Windows 2000 发布的安全补丁 KB189271，并将 Alerter 和 Messenger 服务启动类型设置为"已禁用"；若业务必需，可在组策略中通过"网络安全：LanMan 身份验证级别"限制远程访问，或关闭 TCP 139、445 端口阻止 net send 消息传递。'
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "Microsoft Windows 2000/NT NT Alerter 服务权限提升漏洞"
updated = "2026-06-16T21:48:45.567"

