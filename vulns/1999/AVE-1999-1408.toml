[basic]
description = "WFTPD是一款运行在Windows平台上的FTP服务器软件，版本2.34、2.40和3.0在处理MKD和CWD命令时存在缓冲区溢出漏洞。攻击者无需认证，通过构造超长目录路径即可触发缓冲区溢出，从而在受影响系统上执行任意代码并获取系统最高权限。该漏洞危害极其严重，可导致服务器被完全控制。"
published = "1999-10-28"
remediation = "立即停用WFTPD并迁移至活跃维护的FTP服务软件，推荐使用FileZilla Server（Windows）或vsftpd/ProFTPD（Linux）。如短期内无法迁移，应在防火墙上限制FTP端口（21）的访问来源，仅允许可信IP连接，同时禁用匿名访问和不必要的目录创建权限作为临时缓解措施。"
score = 10.0
severity = "CRITICAL"
sources = ["cve"]
title = "WFTPD FTP服务器缓冲区溢出漏洞"
updated = "2026-06-16"

