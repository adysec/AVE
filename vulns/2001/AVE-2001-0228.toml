[basic]
description = "diffutils 工具包中的 sdiff 2.7 版本存在符号链接（symlink）攻击漏洞。本地攻击者可通过在临时文件目录中创建恶意的符号链接，诱使 sdiff 在处理文件差异时跟随该链接，从而覆盖系统上任意文件。该漏洞利用条件较为苛刻（需要本地访问权限且攻击复杂度高），仅影响文件完整性，不涉及机密性和可用性。受影响的系统包括使用 diffutils 2.7 版本的各类 Linux/Unix 发行版。"
published = "2001-03-12T05:00:00.000"
remediation = "建议升级 diffutils 包至修复版本：Red Hat Linux 用户安装 RHSA-2001:116 提供的更新包（diffutils-2.7-6.1 及以上），Mandrake Linux 用户安装 MDKSA-2001:008 更新。修复原理是 sdiff 改用 mkstemp/mkstemps 创建临时文件而非可预测路径，消除 symlink 竞争条件。如无法升级，可移除 sdiff 的 setuid 权限或限制普通用户对临时目录的写权限作为临时缓解。"
score = 1.2
severity = "LOW"
sources = ["redhat"]
title = "GNU diffutils sdiff 本地文件覆盖漏洞"
updated = "2026-06-16T21:53:41.240"

