[info]
author = "AVE"
description = "检测 Solaris 7.0 系统中 chkperm 工具是否存在本地权限提升漏洞，通过检查 chkperm 二进制文件的存在性来判断系统是否受影响"
id = "POC-AVE-1999-0659"
name = "CVE-1999-0860 PoC"
severity = "low"
tags = [
    "cve-1999-0860",
    "solaris",
    "chkperm",
    "privilege-escalation",
]
vuln_id = [
    "CVE-1999-0860",
    "AVE-1999-0659",
]

[poc]
logic = "all"

[[poc.requests]]
path = "/usr/bin/chkperm"
protocol = "file"

[[poc.requests.matchers]]
expect = true
part = "body"
regex = ".+"
type = "regex"
