[basic]
description = "OpenClaw 工具集 tools.exec.safeBins 组件存在输入验证绕过漏洞，攻击者可通过 sort 命令的 -o 输出标志参数实现任意文件写入，或通过 grep 命令的 -R 递归标志参数实现任意文件读取，绕过原本仅允许标准输入的限制。该漏洞影响 2026.2.19 之前的所有 OpenClaw 版本，CVSS 评分 2.0，危害等级低。攻击者需具备命令执行权限方可利用。"
published = "2026-03-19T02:16:04.917"
remediation = "升级 OpenClaw 至 2026.2.19 或更新版本，该版本已修复 safeBins 的 stdin-only 检查绕过问题。如无法立即升级，可限制 tools.exec.safeBins 中允许的命令列表，禁止使用含有 -o（sort）或 -R（grep）等危险 flag 的命令，或在调用层对命令参数进行白名单校验。"
score = 2
severity = "LOW"
sources = ["hwpoc"]
title = "OpenClaw safeBins 输入验证绕过漏洞"
updated = "2026-06-17T10:34:54.223"

