[info]
author = "ave"
description = "检测目标设备是否存在 /dev/msm_acdb 设备文件，该文件对应 Code Aurora acdb 音频驱动，存在栈缓冲区溢出漏洞（CVE-2013-2597），攻击者可通过 ioctl 传入超大 size 值触发内核态权限提升"
id = "POC-AVE-2013-0019"
name = "CVE-2013-2597 PoC"
severity = "high"
tags = ["ave-2013-0019"]
vuln_id = [
    "CVE-2013-2597",
    "AVE-2013-0019",
]

[poc]
logic = "all"

[[poc.requests]]
path = "/dev/msm_acdb"
protocol = "file"

[[poc.requests.matchers]]
expect = true
part = "body"
regex = ".+"
type = "regex"
