[basic]
description = "Palo Alto Networks Cortex XDR Agent 在 Windows 平台上存在空指针解引用漏洞，低权限的本地 Windows 用户可利用该漏洞使代理程序崩溃。此外，恶意软件可利用此漏洞绕过 Cortex XDR 的检测能力执行恶意活动，影响系统安全监控的可用性。"
published = "2025-04-09"
remediation = "升级 Cortex XDR Agent 至以下修复版本：8.6.1、8.5.2、8.3.101-CE HF、7.9.103-CE HF 或更高版本。该漏洞无已知的临时规避方案，建议尽快升级。"
