[basic]
description = "Microsoft Commercial Internet System (MCIS) 的 IMAP 服务器组件存在输入验证缺陷，远程攻击者无需身份认证即可向目标服务器发送特制的畸形 IMAP 请求报文，触发服务进程崩溃或资源耗尽，导致拒绝服务。该漏洞影响 MCIS 2.0 和 2.5 版本，CVSS 评分 7.5，危害等级高危。厂商未发布官方补丁，建议通过防火墙限制 IMAP 端口访问或升级至受支持版本规避风险。"
published = "2000-01-04T05:00:00.000"
remediation = "该漏洞影响 Microsoft Commercial Internet System 2.0/2.5，该产品已停止支持且无官方补丁。建议立即停止使用 MCIS IMAP 服务，迁移至受支持的替代方案（如 Microsoft Exchange Server 或第三方 IMAP 服务）；若无法立即迁移，需在防火墙或接入层限制 IMAP 端口（143/TCP）的访问来源，仅允许可信 IP 连接，并启用入侵检测规则拦截畸形 IMAP 请求。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "Microsoft Commercial Internet System IMAP Server 拒绝服务漏洞"
updated = "2026-06-16T21:50:54.267"

