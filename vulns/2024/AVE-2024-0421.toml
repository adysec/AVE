[basic]
description = "用友 NC 系统的 oacoSchedulerEvents 接口存在 SQL 注入漏洞。攻击者可通过向 /portal/pt/oacoSchedulerEvents/isAgentLimit 接口发送特制请求，在 pk_flowagent 参数中注入恶意 SQL 语句，导致数据库信息泄露或数据被篡改。该漏洞无需身份认证即可远程利用，危害较大。"
published = "2024-06-01"
remediation = "升级用友 NC 系统至最新安全补丁版本，对用户输入参数进行严格的过滤和参数化查询处理，避免直接拼接 SQL 语句。建议部署 Web 应用防火墙（WAF）拦截 SQL 注入攻击载荷。"
score = 5.0
severity = "MEDIUM"
sources = ["hwpoc"]
title = "用友 NC oacoSchedulerEvents SQL 注入漏洞"
updated = "2026-07-19"

