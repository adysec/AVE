[basic]
description = 'WU-FTPD 2.6.1 的 glob 函数（ftpglob）在处理包含 "~{" 特殊参数的文件路径时存在堆破坏漏洞。远程攻击者无需身份认证即可通过向 FTP 命令（如 CWD）传递特制的 "~{" 参数触发堆内存损坏，进而执行任意命令。该漏洞影响 WU-FTPD 2.6.1 及更早版本，CVSS 评分 7.5，危害等级高。目前已存在公开的利用代码，建议立即升级至修复版本。'
published = "2001-11-30T05:00:00.000"
remediation = "升级 wu-ftpd 至 2.6.2 或更高版本（各发行版对应补丁：Red Hat RHSA-2001-157、Debian DSA-087、Caldera CSSA-2001-041.0、Mandrake MDKSA-2001-090）。由于 wu-ftpd 已停止维护，建议迁移至 vsftpd 或 ProFTPD 等现代 FTP 服务器，并在防火墙限制对 FTP 端口的非必要访问。"
score = 7.5
severity = "HIGH"
sources = ["exploitdb"]
title = "WU-FTPD wu-ftpd 文件通配符处理堆损坏远程命令执行漏洞"
updated = "2026-06-16T21:54:30.757"

