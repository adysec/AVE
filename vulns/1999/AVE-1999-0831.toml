[basic]
description = "Solaris rpc.admind 守护进程未以安全模式运行，导致远程攻击者可利用 RPC 服务的配置缺陷绕过权限控制，在未经身份认证的情况下执行任意代码或获取系统敏感信息。该漏洞影响运行 rpc.admind 服务的 Solaris 2.x/7/8 等版本，CVSS 评分 10.0，属于严重级别。攻击者仅需向目标主机发送特制的 RPC 请求即可触发漏洞，无需用户交互，利用门槛极低。Sun Microsystems 已发布补丁修复此问题，建议升级至修复版本或禁用不必要的 RPC 服务。"
published = "1999-01-01T05:00:00.000"
remediation = "升级到 Solaris 2.6 最新补丁簇或 Solaris 7 及以上版本，并安装 Sun 官方安全补丁（如 105396 系列）。同时修改 /etc/inetd.conf，将 rpc.admind 配置为以安全模式运行（添加 -s 参数），或通过防火墙限制 100232 端口仅允许可信内网访问，禁用不必要的 RPC 服务以缓解风险。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "Sun Solaris rpc.admind 远程代码执行漏洞"
updated = "2026-06-16T21:48:39.160"

