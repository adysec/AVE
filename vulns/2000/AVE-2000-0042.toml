[basic]
description = "Allaire Spectra 1.0 的 Webtop 组件存在访问控制缺陷，已通过身份验证的合法用户可通过在浏览器中直接构造并访问特定的显式 URL 路径，绕过 Webtop 原本的页面导航与权限校验机制，越权访问本不应由其角色可见或操作的其它 Webtop 功能模块与数据区域。该漏洞影响运行 Allaire Spectra 1.0 版本并启用 Webtop 管理界面的系统，攻击前提是攻击者必须已拥有任意一个有效的 Webtop 登录账户，利用方式即为登录后手工拼接或篡改 URL 以访问受限资源，属于权限提升类越权访问问题。"
published = "2000-01-04T05:00:00.000"
remediation = "建议立即将 Allaire Spectra 升级至 1.01 或更高版本（其中包含针对 Webtop URL 越权访问的安全补丁）。若无法立即升级，可在 Web 服务器或 Spectra 应用层配置基于角色的访问控制列表（ACL），对 Webtop 各功能模块的 URL 路径进行显式授权限制，仅允许具备对应权限的已认证用户访问；同时关闭不必要的 Webtop 模块、启用访问审计日志以监测异常 URL 访问行为。"
score = 4.6
severity = "MEDIUM"
sources = ["cve"]
