[basic]
description = "libesmtp 的 protocol.c 文件中 read_smtp_response 函数存在缓冲区溢出漏洞，远程 SMTP 服务器可通过发送特制的超长响应或特定响应数据触发该漏洞，导致缓冲区溢出，攻击者可能利用此漏洞执行任意代码或造成拒绝服务。该漏洞影响 libesmtp 0.8.11 之前的所有版本，攻击者无需认证即可远程触发，CVSS 评分 7.5，危害等级高。"
published = "2002-10-04T04:00:00.000"
remediation = "升级 libesmtp 至 0.8.11 或更高版本，该版本修复了 read_smtp_response 函数中的缓冲区溢出问题。对于基于 Red Hat 的发行版，安装 RHSA-2003-111 提供的更新包；对于基于 Debian 的发行版，通过 apt 更新 libesmtp 软件包。如无法立即升级，可在 SMTP 代理或防火墙层面限制仅与受信任的 SMTP 服务器通信，并过滤异常长度的服务器响应。"
score = 7.5
severity = "HIGH"
sources = ["osv"]
title = "libESMTP 缓冲区溢出远程代码执行漏洞"
updated = "2026-06-16T21:58:42.420"

