[basic]
description = "Windows Media Services 4.0和4.1版本在处理客户端握手数据包时存在序列错误漏洞。攻击者通过发送特定乱序的握手数据包，使服务器在资源未初始化前尝试使用，导致Windows Media Unicast Service崩溃，造成拒绝服务。攻击无需认证，可通过网络远程触发，受影响服务重启后可恢复正常运行但已有会话中断。"
published = "2000-02-23"
remediation = "安装Microsoft安全公告MS00-013提供的安全补丁。Windows NT Server 4.0用户需先升级至Windows Media Services 4.1，再安装补丁WMSU4954_NT4.EXE；Windows 2000 Server用户可直接安装补丁WMSU4954_Win2000.EXE。如无法安装补丁，可在防火墙限制对1755/TCP和1755/UDP端口的访问。长期建议升级至更高版本Windows Server。"
score = 5.0
severity = "MEDIUM"
sources = ["cve"]
title = "Microsoft Windows Media Services 4.0/4.1 Handshake 拒绝服务漏洞"
updated = "2026-06-16"

