[basic]
description = "广联达OA系统存在信息泄露漏洞，未经身份认证的远程攻击者可通过未授权访问系统特定接口或路径，直接获取敏感数据。该漏洞影响广联达OA办公自动化系统的多个版本，攻击者无需任何认证即可通过构造特定HTTP请求触发漏洞，获取系统用户信息、配置数据等敏感内容。此类信息泄露可能被用于进一步渗透攻击，对企业内部数据安全构成严重威胁。"
published = "2023-08-08"
remediation = "升级广联达OA至最新版本或联系厂商获取安全补丁；在中间件（如Nginx/Apache）或反向代理层限制 /api/、/export/ 等敏感接口路径的外部访问权限，为相关接口强制启用身份认证与鉴权校验；如无法立即升级，可在WAF上添加对未授权敏感路径请求的拦截规则，并定期审计访问日志排查异常访问。"
score = 5.0
severity = "MEDIUM"
sources = ["hwpoc"]
title = "广联达OA信息泄露漏洞"
updated = "2023-08-08"

