[basic]
description = "Red Hat Linux 6.1 的 ORBit 组件和 gnome-session 会话管理器存在远程拒绝服务漏洞。远程攻击者无需身份认证即可通过网络向目标系统发送特制请求，利用 ORBit 的 CORBA 通信处理缺陷或 gnome-session 的会话管理漏洞，导致目标程序崩溃，造成拒绝服务。该漏洞影响 Red Hat Linux 6.1 系统，CVSS 评分 5.0，危害等级中等。"
published = "1999-12-03T05:00:00.000"
remediation = "升级 Red Hat Linux 至 6.2 或更高版本，该漏洞已在 Red Hat 安全公告 RHSA-1999:058-01 中修复。具体操作：运行 `rpm -q ORBit gnome-session` 确认当前版本，若 ORBit 版本低于 0.5.0-8 或 gnome-session 版本低于 1.0.4-4，则通过 `rpm -Uvh` 安装更新包。由于 Red Hat Linux 6.x 已停止维护，建议迁移至受支持的 Red Hat Enterprise Linux 发行版。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Red Hat Linux 6.1 ORBit 和 gnome-session 远程拒绝服务漏洞"
updated = "2026-06-16T21:51:33.060"

