[basic]
description = "Cisco PIX 防火墙 515 和 520 设备运行 5.1.4 版本操作系统时，其 TACACS+ 认证模块存在拒绝服务漏洞。远程攻击者无需身份认证，通过向目标设备发送大量认证请求即可导致 CPU 资源耗尽，使防火墙无法正常处理网络流量。该漏洞影响 Cisco PIX 4.x/5.x 系列固件，CVSS 评分 5.0，危害等级中危。"
published = "2001-06-18T04:00:00.000"
remediation = '升级 Cisco PIX OS 至 5.3.1 或更新版本。5.3.1 已验证不会因认证请求洪泛而崩溃，仅记录"too many pending auths"并拒绝超量请求。同时可在 aaa-server 配置中缩短 timeout 值（如设为 3 秒），并启用审计日志监控异常认证流量作为补充缓解措施。'
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Cisco PIX 防火墙 TACACS+ 认证请求洪水拒绝服务漏洞"
updated = "2026-06-16T21:54:11.333"

