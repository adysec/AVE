[basic]
description = "泛微 e-cology 9 的 ModeDateService 接口存在 SQL 注入漏洞，其原理在于该接口在处理用户可控参数时未进行严格的过滤和参数化处理，攻击者可将恶意 SQL 语句拼接到数据库查询中执行。未经身份认证的远程攻击者可构造特制请求向该接口发送恶意载荷，从而读取、篡改数据库中的敏感信息，进而可能获取管理员权限甚至控制整个系统。该漏洞影响泛微 e-cology 9 系列版本，危害等级较高，建议及时升级至官方修复版本或部署相应补丁。"
published = "0823"
remediation = "立即升级泛微 ecology9 至最新安全补丁版本（v10.69 及以上），官方已修复 ModeDateService 接口的 SQL 注入漏洞。如无法立即升级，可在 WAF/网关层配置规则拦截对 /api/mode/ModeDateService 接口的恶意 SQL 注入 payload，同时限制该接口的访问来源 IP 白名单作为临时缓解措施。"
