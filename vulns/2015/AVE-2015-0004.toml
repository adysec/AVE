[basic]
description = "Wordpress candidate-application-form 插件 v1.0 中存在路径遍历漏洞。由于未能对用户上传的文件路径进行有效验证，攻击者可以利用不正常的目录遍历序列（如「../」）绕过安全限制，访问服务器上存储的任何敏感文件。攻击者只需发送精心构造的 HTTP 请求即可远程获取目标系统的配置文件、数据库文件、源代码及系统文件等敏感信息，严重威胁网站数据安全和系统完整性。该漏洞影响所有使用该插件的Wordpress网站，攻击无需认证即可执行，CVSS评分7.5，危害等级高。"
published = "2016-10-06T14:59:05.817"
remediation = "该插件已于 2015 年 4 月 30 日从 WordPress 官方仓库下架，不再维护更新。建议立即删除 candidate-application-form 插件，或替换为其他仍在维护的候选人申请表单插件。如暂时无法删除，可在 Web 服务器（如 Nginx/Apache）层面配置规则，阻止对 `/wp-content/plugins/candidate-application-form/downloadpdffile.php` 的访问请求作为临时缓解措施。"
score = 7.5
severity = "HIGH"
sources = ["nuclei"]
title = "Wordpress candidate-application-form 插件文件下载漏洞"
updated = "2026-06-17T00:21:15.603"

