[basic]
description = "FreeBSD 系统下的 WindowMaker 窗口管理器附属工具 wmmon（1.0 beta 2 版本）在处理用户主目录中的 .wmmonrc 配置文件时存在安全缺陷。该工具会以较高权限读取并执行该配置文件中的指令，因此本地已登录的用户可通过精心构造恶意的 .wmmonrc 文件内容，诱使 wmmon 以特权身份执行攻击者指定的命令，从而从普通用户权限提升为特权用户（如 root）。由于该漏洞仅要求攻击者在目标系统上拥有本地账户并能够写入自身主目录下的配置文件，利用门槛较低，影响所有安装并运行受影响版本 wmmon 的 FreeBSD 系统，CVSS 评分为 7.2，危害等级为高。"
published = "1999-12-22T05:00:00.000"
remediation = "建议立即升级 WindowMaker wmmon 至修复版本（1.0b3 及以上，参见 FreeBSD 安全公告），或移除 setuid 位（执行 chmod u-s /usr/X11R6/bin/wmmon）以阻止其以 root 权限运行。临时缓解措施：删除或限制用户可写的 .wmmonrc 配置文件权限（chmod 644 ~/.wmmonrc），避免本地用户注入命令提权。"
score = 7.2
severity = "HIGH"
sources = ["exploitdb"]
title = "Window Maker wmmon 本地权限提升漏洞"
updated = "2026-06-16T21:50:50.007"

