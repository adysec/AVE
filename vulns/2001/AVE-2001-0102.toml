[basic]
description = "Netscape SmartDownload 1.3 存在远程缓冲区溢出漏洞，攻击者可通过构造恶意网页并诱导用户访问，向该组件提交超长 URL 参数触发缓冲区溢出，从而在目标系统上执行任意命令。该漏洞影响 Netscape SmartDownload 1.3 版本，CVSS 评分 7.5，危害等级高。建议用户升级至最新版本或停止使用该组件。"
published = "2001-07-02T04:00:00.000"
remediation = "Netscape SmartDownload 1.3 及其依赖的 Netscape 浏览器已停止维护超过 20 年，官方不再提供安全补丁。建议立即卸载 Netscape SmartDownload 组件并升级至 Mozilla Firefox、Google Chrome 等现代浏览器。作为临时缓解措施，避免使用旧版 Netscape 浏览器访问不可信网站，并在浏览器安全设置中禁用自动下载执行插件。"
score = 7.5
severity = "HIGH"
sources = ["exploitdb"]
title = "Netscape SmartDownload 1.3 远程缓冲区溢出漏洞"
updated = "2026-06-16T21:53:59.167"

