[basic]
description = "George Burgyan CGI Counter 4.0.2 及 4.0.7 版本存在输入验证漏洞，远程攻击者可通过向 CGI 程序提交包含 shell 元字符（如 `;`、`|`、`&` 等）的特制请求触发该漏洞，成功利用可在目标服务器上以 Web 进程权限执行任意命令。该漏洞影响 CGI Counter 4.0.7 及之前版本，CVSS 评分 7.5，危害等级高，攻击者无需身份认证即可远程利用。"
published = "2000-05-15T04:00:00.000"
remediation = "立即升级至 CGI Counter 4.0.8 或更高版本，该版本已修复 shell 元字符过滤缺陷。如无法升级，建议删除或禁用该 CGI 脚本，或在 Web 服务器层面配置输入过滤规则，拦截包含 `;`、`|`、`` ` `` 等 shell 特殊字符的请求参数作为临时缓解措施。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "George Burgyan CGI Counter 远程命令执行漏洞"
updated = "2026-06-16T21:51:42.193"

