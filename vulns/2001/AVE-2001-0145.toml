[basic]
description = "Mozilla Bugzilla 2.4至2.10版本存在任意命令执行漏洞。远程攻击者可在用户名参数中注入shell元字符，通过post_bug.cgi的Bugzilla_login cookie或process_bug.cgi的who参数触发该漏洞，导致目标服务器执行任意系统命令。该漏洞影响Bugzilla 2.4/2.6/2.8/2.10等多个版本，CVSS评分7.5，危害等级高。建议升级至修复版本或对用户输入进行严格过滤。"
published = "2001-06-27T04:00:00.000"
remediation = '立即升级至 Bugzilla 2.12 或更高版本，该版本已将 system() 调用改为多参数形式以避免 shell 元字符注入。如无法升级，需手动修补 process_bug.cgi、post_bug.cgi、createattachment.cgi 和 backdoor.cgi，将形如 system("./processmail $who") 的调用改为 system("./processmail", $who) 的多参数形式；同时在 CGI.pl 中对 who 参数增加 DBname_to_id 合法性校验。此外将 MySQL 以非 root 用户运行，设置 CGI 脚本和数据目录权限为 0700，避免 umask 0 的宽松权限设置。'
score = 7.5
severity = "HIGH"
sources = ["exploitdb"]
title = "Mozilla Bugzilla 任意命令执行漏洞"
updated = "2026-06-16T21:54:06.593"

