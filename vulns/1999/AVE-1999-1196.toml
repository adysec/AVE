[basic]
description = "Internet Explorer 4.01 及 5 版本中的 Registration Wizard ActiveX 控件（regwizc.dll，InvokeRegWizard 函数）3.0.0.0 版本存在缓冲区溢出漏洞。远程攻击者可通过构造恶意网页，诱使用户访问后触发该控件中的缓冲区溢出，从而在用户系统上以当前用户权限执行任意命令。该漏洞无需身份认证，但需要用户交互（访问恶意网页），CVSS 评分 5.1，危害等级中等。"
published = "1999-09-24T04:00:00.000"
remediation = '该漏洞影响已停止支持的 Internet Explorer 4.01 和 5，建议升级到受支持的现代浏览器（如 Microsoft Edge 或最新版 IE 11）以彻底消除风险。若必须使用旧版 IE，请安装 Microsoft 安全公告 MS99-037 提供的补丁，并通过设置 kill bit 禁用存在风险的 ActiveX 控件 regwizc.dll：在注册表 `HKLM\SOFTWARE\Microsoft\Internet Explorer\ActiveX Compatibility\{50E5E3D1-C07E-11D0-B9FD-00A0249F6B00}` 下创建 Compatibility Flags DWORD 值并设为 0x400（1024），以阻止该控件的实例化。'
score = 5.1
severity = "MEDIUM"
sources = ["avd"]
title = "Microsoft Internet Explorer Registration Wizard ActiveX 控件缓冲区溢出远程代码执行漏洞"
updated = "2026-06-16T21:50:45.670"

