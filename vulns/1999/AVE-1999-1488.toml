[basic]
description = "Windows NT 4.0 SP2 的 SMB 挂载功能存在输入验证缺陷，远程攻击者可通过向目标系统发送特制的畸形数据包（例如在 Linux 2.0.29 内核编译但在 2.0.25 内核执行的 smbmount 命令所生成的数据包）触发该漏洞，导致目标系统崩溃并拒绝服务。该漏洞影响 Windows NT 4.0 SP2 及更早版本，CVSS 评分 5.0，危害等级中等。微软已发布安全更新修复此漏洞。"
published = "1997-04-02T05:00:00.000"
remediation = "Windows NT 4.0 已停止支持，官方不再提供安全更新。建议尽快升级至受支持的 Windows Server 版本（如 Windows Server 2019/2022）。临时缓解措施：在防火墙层面禁用 SMB 端口（TCP 139/445），或停止 Server 服务（net stop server）。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Microsoft Windows NT 4.0 SMB Mount 拒绝服务漏洞"
updated = "2026-06-16T21:50:19.873"

