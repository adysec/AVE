[basic]
description = "wwwboard 是一款基于 Perl 的 Web 留言板程序，存在输入验证缺陷。远程攻击者可通过向脚本提交特制的畸形参数，绕过权限检查直接删除留言板中的任意文章，导致数据完整性受损。攻击无需身份认证，利用难度低。"
published = "1998-09-03"
remediation = "wwwboard 已停止维护，建议迁移至其他受支持的留言板解决方案。如无法替换，应限制对 wwwboard 脚本的网络访问权限，仅允许可信 IP 访问，并配置 Web 服务器过滤畸形请求参数。"
score = 5.0
severity = "MEDIUM"
