[basic]
description = "Windows NT 4.0 中 NtImpersonateClientOfPort 本地过程调用（LPC）存在缺陷，允许本地攻击者通过伪造 LPC 端口请求欺骗系统，从而提升权限获取系统特权。该漏洞影响 Windows NT 4.0 系统，CVSS 评分 7.2（高危），攻击向量为本地访问，利用方式为伪造 LPC 端口请求欺骗系统提升权限。Microsoft 已发布补丁修复该漏洞。"
published = "2000-01-12T05:00:00.000"
remediation = "安装 Microsoft Security Bulletin MS00-003 提供的安全更新，或通过 Windows Update 安装最新 Service Pack。由于该漏洞为本地提权，无法通过网络层面缓解，必须通过打补丁修复。建议升级至 Windows 2000 或更高版本系统以获得长期支持。"
score = 7.2
severity = "HIGH"
sources = ["cve"]
title = "Microsoft Windows NT 4.0 本地权限提升漏洞"
updated = "2026-06-16T21:50:56.313"

