[basic]
description = "普华PowerPMS是一套项目管理信息系统，其GetFilesData接口存在SQL注入漏洞。攻击者可在未授权的情况下，通过向GetFilesData接口传入恶意构造的SQL语句，绕过前端校验直接操作后端数据库，导致敏感数据泄露、数据篡改甚至服务器被完全控制。该漏洞影响所有部署了普华PowerPMS系统的相关单位，危害等级高。厂商已发布安全更新，建议尽快升级至最新版本并加强接口访问控制。"
published = "0712"
remediation = "建议立即联系普华科技技术支持获取最新安全补丁，升级PowerPMS至最新版本。在补丁发布前，可在Web应用防火墙(WAF)层对GetFilesData接口的请求参数进行严格过滤和转义，禁止用户输入中包含SQL关键字（如SELECT、UNION、INSERT、DROP等）。同时建议对数据库账户实施最小权限原则，限制应用数据库用户的操作权限，仅授予必要的读写权限，禁止使用SA等高权限账户连接数据库。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "普华 PowerPMS GetFilesData SQL注入漏洞"
updated = "0712"

