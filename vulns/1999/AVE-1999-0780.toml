[basic]
description = "CVE-1999-0523 是指目标主机未对 ICMP 回显请求（即 ping 包）做来源限制，允许任意外部主机向该系统发送 ICMP echo 请求并获取响应。其原理在于防火墙或主机未过滤 ICMP 入站流量，导致任何可达的远程攻击者都能探测到主机存活状态、进行网络拓扑与主机发现，并为后续端口扫描、操作系统指纹识别及网络侦察提供基础。该配置缺陷影响所有开放 ICMP 回显且未做访问控制过滤的网络设备与服务器，攻击条件仅需攻击者能路由到达目标地址，无需身份认证或特殊权限，利用方式即直接发送 ping 命令即可确认目标在线并收集网络信息。"
published = "1999-01-01T05:00:00.000"
remediation = "在边界防火墙或主机防火墙上拒绝来自不受信任网络的 ICMP Echo Request（类型 8）及对应 Echo Reply（类型 0）。Linux 可用 iptables -A INPUT -p icmp --icmp-type echo-request -j DROP 或等价 nftables/firewalld 规则；Windows 可在高级安全 Windows 防火墙中禁用“文件和打印机共享（回显请求 - ICMPv4-In）”入站规则；路由器/云安全组同样关闭对公网开放的 ICMP ping。仅对运维网段白名单放行，并保留必要的 Path MTU 相关 ICMP 类型以免影响正常通信。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
