[basic]
description = "Elm 2.4 邮件客户端的 filter 命令存在多处缓冲区溢出漏洞。攻击者可通过向受害者发送包含超长 From 或 Reply-To 邮件头的恶意邮件，或诱使用户在命令行中传递超长的 -f（filterfile）参数触发缓冲区溢出，从而执行任意命令。该漏洞影响 Elm 2.4 及更早版本，CVSS 评分 7.5，危害等级高。建议升级至修复版本或禁用 filter 功能。"
published = "1999-12-31T05:00:00.000"
remediation = "升级至 Elm 2.4 Patchlevel 25 及以上版本，该版本已修复 filter 命令中对超长 From/Reply-To 头部及 -f 参数的多处缓冲区溢出。如无法升级，建议禁用 filter 命令或迁移至其他受维护的邮件客户端（如 Mutt）。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "Elm 2.4 filter 命令缓冲区溢出代码执行漏洞"
updated = "2026-06-16T21:50:13.147"

