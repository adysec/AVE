[basic]
description = "MHonArc 2.5.2 及更早版本的电子邮件归档功能未正确过滤邮件中的恶意 JavaScript 代码，存在跨站脚本（XSS）漏洞。远程攻击者可通过构造特殊邮件，利用 SCRIPT 标签拆分、IMG 标签 SRC 属性注入或 `&={script}` 语法等方式绕过过滤，当其他用户查看归档邮件时触发恶意脚本执行。该漏洞影响 MHonArc 2.5.2 及之前的所有版本，CVSS 评分 7.5，危害等级高。建议升级至更高版本。"
published = "2002-08-12T04:00:00.000"
remediation = "升级 MHonArc 至 2.5.3 或更高版本（2.5.14 为安全修复版），Debian 用户安装对应安全更新（DSA-163）。如无法升级，在 MHonArc 配置中通过 MIMEEXCS 资源禁用 text/html 邮件处理以阻止 HTML 脚本执行，同时在 Web 服务器层面设置 Content-Security-Policy 头限制脚本加载作为纵深防御。"
score = 7.5
severity = "HIGH"
sources = ["osv"]
title = "MHonArc 邮件归档跨站脚本漏洞"
updated = "2026-06-16T21:58:02.557"

