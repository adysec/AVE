[basic]
description = "Microsoft Money 的密码保护功能存在明文存储漏洞，该软件将用户设置的密码以明文形式保存在本地文件系统中，而非进行加密处理。具有物理访问权限的攻击者可通过直接访问系统文件读取明文密码，从而完全控制受害者的财务数据。该漏洞攻击复杂度低，无需身份认证，仅需本地访问即可利用，CVSS 评分 7.2，危害等级高。Microsoft 至今未发布官方补丁，用户需通过第三方加密工具或手动保护文件来缓解风险。"
published = "2000-10-20T04:00:00.000"
remediation = 'Microsoft Money 已停止维护，官方不再提供安全更新。建议立即停止使用 Microsoft Money 的密码保护功能，改用第三方密码管理器（如 KeePass、Bitwarden）存储财务密码。如仍需使用该软件，请手动删除 %APPDATA%\Microsoft\Money\ 下包含明文密码的配置文件，并避免在共享计算机上使用密码保护功能。'
score = 7.2
severity = "HIGH"
sources = ["cve"]
title = "Microsoft Money 密码泄漏漏洞"
updated = "2026-06-16T21:52:27.560"

