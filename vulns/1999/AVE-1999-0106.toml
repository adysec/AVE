[basic]
description = "XFree86 的 xfs（X 字体服务器）命令存在符号链接攻击漏洞，本地攻击者可通过在临时目录中创建恶意符号链接，诱使 xfs 以提升的权限向受限目录写入文件，从而导致权限提升或拒绝服务。该漏洞影响运行 XFree86 的 NetBSD 及其他类 Unix 系统，攻击者需具备本地系统访问权限方可利用。"
published = "1999-03-30T05:00:00.000"
remediation = "升级 XFree86 至 3.3.5 及以上版本以修复 xfs 符号链接漏洞，或应用 NetBSD 厂商发布的对应安全补丁。临时缓解措施：限制不可信用户的本地登录权限，确保 xfs 临时目录（如 /tmp/.X11-unix）具有正确权限（1777）且不可被符号链接攻击利用。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "XFree86 xfs 符号链接攻击本地权限提升漏洞"
updated = "2026-06-16T21:48:23.283"

