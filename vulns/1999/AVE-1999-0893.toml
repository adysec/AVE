remediation = "升级至 Exchange Server 5.5 Service Pack 1（含修复补丁），或为 Exchange 5.0 应用 Microsoft 发布的专用热修复补丁（KB188341、KB188369）。若无法立即打补丁，可配置 Exchange Server Monitor 自动重启故障服务以缓解影响。"
