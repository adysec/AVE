[basic]
description = "东胜物流软件存在SQL注入漏洞，攻击者可通过向CrmProxyMailListGridSource.aspx页面的TITLE参数注入恶意SQL语句，利用UNION SELECT查询获取数据库敏感信息。该漏洞无需身份认证即可远程利用，可导致用户数据泄露、数据库被篡改甚至服务器被控制。影响东胜物流软件多个版本，建议厂商及时修复。"
published = "20260401"
remediation = "建议升级至东胜物流软件最新版本，或联系厂商获取安全补丁。临时缓解措施：在 Web 应用防火墙（WAF）中添加规则拦截包含 UNION、SELECT、' 等 SQL 注入特征的请求；对 CrmProxyMailListGridSource.aspx 页面的 TITLE 参数实施严格的输入过滤与参数化查询，禁止拼接 SQL 语句。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "东胜物流软件 CrmProxyMailListGridSource.aspx SQL注入漏洞"
updated = "20260401"

