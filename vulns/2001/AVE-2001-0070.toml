[basic]
description = "eEye Iris 1.0.1 beta 版本存在拒绝服务漏洞，远程攻击者可通过向运行该软件的监控系统发送特制的畸形报文或 GET 请求触发此漏洞。当用户在界面中查看该恶意报文时，Iris 程序会崩溃退出，导致网络流量监控功能中断。该漏洞无需身份认证即可远程触发，影响 Iris 1.0.1 beta 版本。"
published = "2001-03-26T05:00:00.000"
remediation = "升级 eEye Iris 至 1.0.1 以上正式版（避开 beta 版本）。该产品已停止维护（eEye 于 2007 年被 BeyondTrust 收购），建议迁移至 Wireshark 等活跃维护的网络流量分析工具。临时缓解措施：避免在 Iris 中打开或查看来源不可信的畸形报文抓包文件。"
score = 2.6
severity = "LOW"
sources = ["exploitdb"]
title = "eEye Iris 1.0.1 拒绝服务漏洞"
updated = "2026-06-16T21:53:50.113"

