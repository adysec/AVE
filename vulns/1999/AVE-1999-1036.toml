[basic]
description = "DECnet/OSI for OpenVMS 5.8 之前版本中存在安全漏洞，DEC Alpha AXP 和 VAX/VMS 系统上的本地用户可利用该漏洞提升权限或导致拒绝服务。该漏洞源于 DECnet 网络协议栈在处理特定协议数据时存在边界条件缺陷，攻击者通过向受影响系统发送特制的 DECnet 数据包，可触发协议栈处理异常，进而造成系统服务崩溃或获取非授权访问权限。"
published = "1999-12-31T05:00:00.000"
remediation = "升级 DECnet/OSI for OpenVMS 至 5.8 或更高版本。如无法升级，在非必要系统上禁用 DECnet/OSI 协议栈，限制本地用户对敏感系统组件的访问权限，并监控系统审计日志中异常的权限提升行为。"
score = 4.6
severity = "MEDIUM"
sources = ["cve"]
title = "DEC OpenVMS DECnet/OSI 权限提升与拒绝服务漏洞"
updated = "2026-06-16T21:50:10.717"

