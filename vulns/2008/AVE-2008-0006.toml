[basic]
description = "AppServ Open Project 2.5.10 及更早版本的 index.php 中存在跨站脚本（XSS）漏洞，远程攻击者可向 appservlang 参数注入恶意 Web 脚本或 HTML 代码，在用户浏览器中执行任意脚本，窃取会话凭证或实施钓鱼攻击。攻击无需认证，仅需诱使用户访问特制链接即可触发，影响使用 AppServ 搭建的 Web 应用环境。"
published = "2008-05-21T13:24:00.000"
remediation = "AppServ 官方已停止维护该项目，建议用户迁移至其他活跃维护的 Web 服务器集成环境（如 XAMPP、WampServer）。如仍需继续使用，应在 index.php 中对 appservlang 参数进行严格的 HTML 编码过滤，使用 htmlspecialchars() 函数处理用户输入；同时在 Web 应用防火墙（WAF）层面添加规则拦截包含 <script>、onerror、onload 等 XSS 特征的请求作为临时缓解措施。"
score = 4.3
severity = "MEDIUM"
sources = ["cve"]
title = "AppServ Open Project 2.5.10 跨站脚本漏洞（XSS）"
updated = "2026-06-16T22:53:42.353"

