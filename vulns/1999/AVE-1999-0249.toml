[basic]
description = "通用桌面环境（CDE）中的 dtspcd 守护进程存在安全漏洞，该进程在处理文件操作时未对符号链接进行安全校验，导致本地攻击者可利用符号链接（symlink）攻击手段操纵目标文件。本地用户通过精心构造符号链接指向敏感文件，即可以 dtspcd 进程权限执行任意命令，实现本地权限提升。该漏洞影响 Common Desktop Environment 2.1 及运行于 Solaris 7.0 等系统上的相关版本，CVSS 评分 7.2，危害等级较高。攻击者需具备目标主机的本地访问权限方可触发，利用方式为构造恶意符号链接诱使守护进程执行受控操作。建议升级至厂商发布的修复版本或应用相应安全补丁。"
published = "1999-09-13T04:00:00.000"
remediation = "请立即安装 Solaris 7.0 的安全更新 SP3或SP4，升级 dtspcd 版本到≥5.0，使用绝对路径调用 dtspcd，并通过有限制符号链接的权限掩码或将 dtspcd 服务配置为只信任绝对路径的权限来缓解攻击。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "Sun Common Desktop Environment dtspcd 符号链接攻击本地权限提升漏洞"
updated = "2026-06-16T21:48:51.173"

