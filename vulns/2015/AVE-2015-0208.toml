[basic]
description = "Intel 网卡诊断驱动程序 IQVW32.sys (1.3.1.0 前版本) 和 IQVW64.sys (1.3.1.0 前版本) 存在 IOCTL 处理漏洞，由于对 IOCTL 码 0x80862013、0x8086200B、0x8086200F、0x80862007 的输入验证不当 (CWE-20)，本地攻击者可通过发送精心构造的 IOCTL 请求触发内核缓冲区溢出或类型混淆，导致拒绝服务或以内核权限执行任意代码。该漏洞影响安装有受影响版本 Intel 网卡诊断驱动的 Windows 系统，CVSS 3.1 评分 7.8 (HIGH)，攻击向量为本地、低攻击复杂度、低权限、无需用户交互，机密性/完整性/可用性影响均为高。攻击者需具备本地系统访问权限并能打开设备句柄发送 IOCTL，已有公开 PoC (ExploitDB-36392、GitHub 多个 PoC) 及 CISA 已知被利用漏洞目录收录，Intel 已在 1.3.1.0 版本修复，建议升级驱动程序至 1.3.1.0 或更高版本。"
published = "2017-08-09T18:29:00.933"
remediation = '将 Windows 系统上的 Intel 以太网诊断驱动 IQVW32.sys 和 IQVW64.sys 升级至 1.3.1.0 或更高版本，可通过 Intel 安全公告 INTEL-SA-00051（https://security-center.intel.com/advisory.aspx?intelid=INTEL-SA-00051）获取补丁驱动。如暂时无法安装补丁，可通过修改 \\.\Nal 设备对象的访问控制列表（DACL）限制普通用户对设备句柄的读写权限，以降低本地用户利用 IOCTL 0x80862013、0x8086200B、0x8086200F、0x80862007 发起内核态代码执行或系统崩溃的风险。'
score = 7.8
severity = "HIGH"
sources = ["kev"]
title = "Intel 网络适配器诊断驱动程序 本地权限提升漏洞"
updated = "2026-06-17T00:23:52.277"

