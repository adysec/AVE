[basic]
description = "WebTV电子邮件客户端存在安全漏洞，远程攻击者可通过精心构造的HTML邮件内容，诱导客户端在用户不知情的情况下自动发送电子邮件。该漏洞源于WebTV邮件客户端对HTML内容处理不当，攻击者无需用户交互即可触发未授权邮件发送行为，影响使用WebTV邮件客户端的用户。攻击者只需发送包含恶意HTML代码的邮件，即可在受害者不知情情况下利用其邮箱发送垃圾邮件或钓鱼邮件，CVSS评分5.0，危害等级中等。Microsoft已停止WebTV服务，受影响用户建议迁移至现代邮件客户端。"
published = "2000-01-02T05:00:00.000"
remediation = "WebTV（后更名为 MSN TV）已于 2013 年 9 月 30 日停止服务，微软不再提供安全更新。建议立即停用 WebTV/MSN TV 并迁移至受支持的电子邮件客户端（如 Outlook、Thunderbird），同时在邮件客户端中禁用 HTML 邮件的自动脚本执行和远程内容加载功能，以防范未经用户确认即自动发送邮件的攻击。"
score = 5
severity = "MEDIUM"
