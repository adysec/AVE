[basic]
description = "Elm-2.4 邮件客户端中的 filter 命令存在符号链接（symlink）攻击漏洞。本地攻击者可通过在临时目录中创建恶意符号链接，诱使 filter 命令以其他用户的权限执行任意命令或读取敏感文件。该漏洞利用条件为拥有本地账户权限，影响范围包括使用 Elm-2.4 的 Unix/Linux 系统，CVSS 评分 4.6，危害等级中危。建议升级到不受影响的版本或禁用 filter 功能。"
published = "1998-01-01T05:00:00.000"
remediation = "立即升级至 Elm 2.4 Patch Level 3 及以上版本，该版本修复了 filter 命令在处理临时文件时的竞态条件问题。若无法升级，建议禁用 filter 命令或移除 elm 的 setuid 权限位以限制 symlink 攻击。长期建议迁移至 mutt 或 alpine 等持续维护的邮件客户端。"
score = 4.6
severity = "MEDIUM"
sources = ["epss"]
title = "Elm elm-2.4 邮件系统本地符号链接攻击漏洞"
updated = "2026-06-16T21:47:37.097"

