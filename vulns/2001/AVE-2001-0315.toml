[basic]
description = "LPRng 打印守护进程在初始化降低权限时未能正确丢弃继承的补充组（supplementary groups）成员关系，导致守护进程及其所有子进程仍保留启动 LPRng 时获得的补充组权限。攻击者可在受影响系统上利用此缺陷提升本地权限。具体而言，运行权限已被降低的进程或例程仍带有补充组权限，若 LPRng 同时存在其他易受攻击的代码路径，攻击者可通过 tmp 文件处理不当等漏洞修改 lp 用户配置文件，进而将恶意代码注入由主打印过滤器执行的配置文件中，最终以 lp 用户或 root 身份执行任意命令。该漏洞影响 Red Hat Linux 7.0 和 7.1 上 LPRng 3.6.x 至 3.7.4-23 版本，攻击条件为攻击者拥有目标系统的本地访问权限，CVSS 评分 4.6，危害等级中等。"
published = "2001-10-18T04:00:00.000"
remediation = "对于 Red Hat Linux 7.0 和 7.1 系统，建议立即安装 Red Hat 官方安全公告 RHSA-2001-077 中发布的修复包，将 LPRng 升级至 LPRng-3.7.4-23 或更高版本，并将 tetex 组件升级至 tetex-1.0.7-18 或更高版本。升级前请使用 rpm -q LPRng tetex 确认当前版本，若仍为 LPRng-3.7.4-23 及更早版本或 tetex-1.0.7-7 及更早版本则存在风险。可通过 yum update LPRng tetex 完成升级，升级后重启打印服务 systemctl restart lpd。如暂时无法打补丁，可临时通过 /etc/hosts.deny 限制对 lpc（端口 515）的本地访问，或禁用 LPRng 打印服务以减少攻击面。如业务无需打印服务，可直接执行 systemctl stop lpd && systemctl disable lpd 彻底禁用。"
score = 4.6
severity = "MEDIUM"
sources = ["exploitdb"]
title = "LPRng 打印系统 本地权限提升漏洞"
updated = "2026-06-16T21:54:57.513"

