[info]
author = "AVE"
description = "检测 CVS 1.10.7 可预测临时文件名锁定漏洞，通过检查 CVS 仓库中是否存在可预测的锁目录来判断漏洞存在条件"
id = "POC-AVE-2000-0285"
name = "CVE-2000-0338 PoC"
severity = "medium"
tags = ["cve-2000-0338"]
vuln_id = [
    "CVE-2000-0338",
    "AVE-2000-0285",
]

[poc]
logic = "any"

[[poc.requests]]
path = "/tmp/cvs-servers/#cvs.lock"
protocol = "file"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [""]
