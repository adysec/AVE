[basic]
description = "SCO UnixWare 7.1.0 及更早版本中 Sendmail 配置文件 sendmail.cf 存在权限配置缺陷，本地攻击者可利用该漏洞提升至 root 权限。由于 sendmail.cf 文件权限设置不当，攻击者能够修改配置文件或利用 Sendmail 的 setuid 机制执行恶意操作，从而完全控制目标系统。该漏洞影响 SCO UnixWare 7.1.0 及之前版本，CVSS 评分 10.0，危害等级严重。"
published = "2001-03-12T05:00:00.000"
remediation = "立即应用 SCO 安全公告 SB-99.10a 提供的补丁，修改 sendmail.cf 配置文件权限为 644 并移除 setuid 位。由于 SCO UnixWare 已停止维护，建议迁移至受支持的 Linux 或现代 Unix 系统，避免继续使用已不受支持的旧版本操作系统。"
score = 10
severity = "CRITICAL"
sources = ["cve"]
title = "SCO UnixWare Sendmail 配置文件权限提升漏洞"
updated = "2026-06-16T21:51:31.803"

