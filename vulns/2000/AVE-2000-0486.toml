[basic]
description = "HP JetDirect 打印机的 FTP 服务存在拒绝服务漏洞，未经身份认证的远程攻击者可通过向目标设备的 FTP 端口发送特制的畸形 FTP QUOTE 命令，触发了服务组件对异常命令处理不当，导致打印机的 FTP 服务停止响应或崩溃。该漏洞影响 JetDirect 系列打印机固件版本 H.08.20 及更早版本，CVSS 评分 5.0，危害等级中危。厂商建议用户升级固件至最新版本以修复此问题。"
published = "2000-07-19T04:00:00.000"
remediation = "升级 HP JetDirect 固件至 H.08.21 或更高版本（HP 已发布修复固件）。如无法立即升级，可在打印机管理界面禁用 FTP 服务，或在网络防火墙上封锁 TCP 21 端口对打印机的访问作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "HP JetDirect FTP 命令拒绝服务漏洞"
updated = "2026-06-16T21:52:09.580"

