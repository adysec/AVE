[info]
author = "AVE"
description = "通过 DHTML Edit ActiveX 控件 (CLSID:2D360201-FFF5-11d1-8D03-00A0C959BC0A) 的 LoadURL 方法配合 HTTP 重定向，读取受害者本地文件。攻击者构造恶意网页，诱导 IE 4/5 用户访问后利用该控件读取任意文件。"
id = "POC-AVE-1999-0159"
name = "Microsoft Internet Explorer DHTML Edit ActiveX 控件任意文件读取漏洞 PoC"
severity = "low"
tags = [
    "cve-1999-0487",
    "activex",
    "dhtml-edit",
    "file-read",
]
vuln_id = [
    "CVE-1999-0487",
    "AVE-1999-0159",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["2D360201-FFF5-11d1-8D03-00A0C959BC0A"]
