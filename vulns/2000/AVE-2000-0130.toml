[basic]
description = "Debian GNU/Linux 系统中 gnucash 财务软件所依赖的 libguile.so 共享库文件被错误地设置了全局可写权限（world-writable）。本地攻击者可利用此权限缺陷修改该库文件，注入恶意代码，当其他用户或进程加载该库时触发执行，从而导致权限提升或敏感信息泄露。该漏洞影响 Debian GNU/Linux 发行版，CVSS v2 评分 7.5，危害等级高。"
published = "2000-02-05T05:00:00.000"
remediation = '立即以 root 身份执行 `chmod 755 /usr/lib/libguile.so` 移除全局可写权限，并确认文件属主为 root:root。使用 `find / -type f -perm -o+w -name "*.so*" 2>/dev/null` 扫描系统其他存在相同问题的共享库文件，对非预期可写的 .so 文件统一执行 `chmod 755`。同时检查该文件是否被篡改（与原始 deb 包的 md5sum 比对），如有异常应重新安装 libguile 包。'
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "Debian GNU/Linux gnucash 本地权限提升漏洞"
updated = "2026-06-16T21:51:05.630"

