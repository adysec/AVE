[basic]
description = "Microsoft Internet Explorer 9 和 10 存在释放后使用（Use-After-Free）漏洞。远程攻击者可通过构造特制的 JavaScript 代码，利用 CMarkup 对象与 script 元素的 onpropertychange 属性触发内存释放后的非法访问，进而在当前用户权限上下文中执行任意代码。该漏洞已在 2014 年 1 月至 2 月期间被野外利用，攻击者通常通过水坑攻击或恶意邮件链接诱导用户访问恶意网页触发。影响 Windows 平台上 IE 9 和 IE 10 所有版本，CVSS 评分 8.8，危害等级高。Microsoft 已在 MS14-012 安全公告中发布补丁修复此漏洞。"
published = "2014-02-14T16:55:07.500"
remediation = "安装 Microsoft 2014 年 4 月安全更新 MS14-012 (KB2925418)，该补丁修复了 Internet Explorer 9 和 10 中的 CMarkup 释放后使用漏洞。如无法立即打补丁，可启用 Enhanced Mitigation Experience Toolkit (EMET) 并配置 IE 为高安全级别，同时限制用户访问不受信任网站作为临时缓解措施。"
score = 8.8
severity = "HIGH"
sources = ["kev"]
title = "Microsoft Internet Explorer Use-After-Free远程代码执行漏洞"
updated = "2026-06-17T00:02:47.407"

