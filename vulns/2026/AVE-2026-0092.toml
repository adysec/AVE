[basic]
description = "Apache HTTP Server 的 mod_http2 模块存在内存分配大小失控漏洞（CWE-789），在处理特制 HTTP/2 请求时，未对分配的内存大小进行有效限制，导致攻击者可发送恶意构造的 HTTP/2 数据包触发拒绝服务。该漏洞影响 Apache HTTP Server 2.4.17 至 2.4.67 版本，CVSS 评分 7.5，危害等级高危。攻击者无需认证即可远程利用，建议升级至 2.4.63 及以上版本修复。"
published = "2026-06-08T16:16:44.223"
remediation = "升级 Apache HTTP Server 至 2.4.63 及以上版本，该版本修复了 mod_http2 中 HTTP/2 请求导致的内存过量分配问题。如无法立即升级，可在配置中禁用 HTTP/2 协议：在 httpd.conf 中将 Protocols 指令改为 `Protocols http/1.1`（移除 h2/h2c），或在反向代理场景中限制单个连接的最大并发流数量。对于云环境，可在 WAF 或负载均衡层面拦截过大的 HTTP/2 帧作为临时缓解。"
score = 7.5
severity = "HIGH"
sources = ["hwpoc"]
title = "Apache HTTP Server mod_http2 HTTP/2 Bomb 拒绝服务漏洞"
updated = "2026-07-15T02:22:36.720"

