[info]
author = "ave"
description = "验证是否存在未对符号链接进行安全检查的情况，通过创建指向目标文件的符号链接并触发 lit 程序操作来覆盖其内容或修改其权限。"
id = "POC-AVE-2000-0185"
name = "Sun FlexLM lit 符号链接本地文件覆盖漏洞 PoC"
severity = "medium"
tags = ["ave-2000-0185"]
vuln_id = [
    "CVE-2000-0210",
    "AVE-2000-0185",
]

[poc]
logic = "all"

[[poc.requests]]
path = "/etc/passwd"
protocol = "file"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["root:"]
