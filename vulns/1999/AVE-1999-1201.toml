[basic]
description = "Sun Solaris 2.x 系统中的 rcS 和 mountall 程序在系统引导时，若 fsck 文件系统检查失败，会在系统控制台自动启动一个具有 root 权限的特权 shell。拥有物理访问权限的攻击者可利用此漏洞，在系统启动过程中通过控制台获取 root 用户完全控制权。该漏洞影响 Solaris 2.4 之前版本，攻击条件要求物理接触目标主机。"
published = "1999-12-31T05:00:00.000"
remediation = "该漏洞影响 Sun Solaris 2.x（2.4 之前版本）。升级到 Solaris 2.4 或更高版本即可修复，或安装 Sun 补丁 100124-01（对应 SunSolve 公告 ID 100124）。如无法立即升级，应加强物理访问控制，确保服务器控制台仅授权人员可接触，同时在 /etc/default/fsck 中配置 fsck 失败时不自动派生特权 shell。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "Sun Solaris 权限许可和访问控制漏洞"
updated = "2026-06-16T21:50:46.540"

