[basic]
description = "Hyperseek 搜索工具的管理接口存在未授权访问漏洞，远程攻击者无需任何认证即可直接调用 admin.cgi 程序并传入 edit_file 动作参数，从而修改 Hyperseek 的系统配置。该漏洞影响 Hyperseek 所有版本，攻击者可利用此漏洞篡改搜索配置、重定向搜索结果或植入恶意内容，CVSS 评分 5.0，危害等级中危。建议限制 admin.cgi 的访问权限或移除该管理接口。"
published = "1999-02-19T05:00:00.000"
remediation = "Hyperseek 已停止维护，建议立即从服务器上彻底卸载该软件。如因历史原因暂时无法卸载，应通过 Web 服务器配置（如 Apache 的 .htaccess 或 Nginx 的 deny 规则）限制对 admin.cgi 的访问来源 IP，或移除 admin.cgi 文件的执行权限（chmod -x admin.cgi）作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Hyperseek 远程配置修改漏洞"
updated = "2026-06-16T21:50:02.930"

