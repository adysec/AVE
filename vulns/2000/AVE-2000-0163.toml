[basic]
description = "RealMedia RealServer 存在内部 IP 地址泄露漏洞。该漏洞源于 RealServer 在处理网络请求时未正确过滤返回信息中的内部 IP 地址，导致远程攻击者无需认证即可通过发送特定请求获取本应隐藏的服务器真实内部 IP 地址。攻击者利用此信息可为后续针对内网的渗透攻击提供网络拓扑情报。该漏洞影响 RealServer 5.0 及 7.0 版本，属于信息泄露类中危漏洞。"
published = "2000-03-08T05:00:00.000"
remediation = "升级 RealServer 至 7.0.1 及以上版本，该漏洞已在后续版本修复。如无法升级，应在防火墙或反向代理层面过滤 HTTP 响应头中的内部 IP 地址字段，并限制对 RealServer 管理接口的访问来源 IP。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "RealNetworks RealServer 内部地址泄露漏洞"
updated = "2026-06-16T21:51:10.650"

