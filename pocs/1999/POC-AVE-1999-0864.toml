[info]
author = "ave"
description = "Solaris 7.0 /usr/bin/mail 命令的 -m 参数存在本地缓冲区溢出漏洞，攻击者可通过传递超长字符串触发栈溢出，覆盖返回地址后以 mail 进程权限执行任意代码。该 PoC 通过 file 协议检测目标系统上是否存在易受攻击的二进制文件。"
id = "POC-AVE-1999-0864"
name = "Sun Solaris mail 命令本地缓冲区溢出漏洞 PoC"
severity = "medium"
tags = ["ave-1999-0864"]
vuln_id = [
    "CVE-1999-1014",
    "AVE-1999-0864",
]

[poc]
logic = "all"

[[poc.requests]]
path = "/usr/bin/mail"
protocol = "file"

[[poc.requests.matchers]]
expect = true
part = "body"
regex = ".+"
type = "regex"
