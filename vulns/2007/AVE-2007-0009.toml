[basic]
description = "Samba 3.0.23d 至 3.0.25pre2 版本的 smbd 组件中，SID/名称转换功能存在逻辑错误漏洞。本地攻击者可通过向 smbd 守护进程发送特制的 SMB/CIFS 协议请求，触发权限逻辑缺陷，使守护进程错误地切换到 root 用户执行操作，从而获取临时提升的权限。成功利用此漏洞可导致攻击者以 root 身份执行 SMB/CIFS 协议操作，实现本地权限提升。该漏洞影响 Samba 3.0.x 系列多个版本，需拥有本地访问权限才能利用。"
published = "2007-05-14T21:19:00.000"
remediation = "立即升级 Samba 至 3.0.25 或更高版本，该版本已修复此漏洞。可从 https://www.samba.org/samba/download/ 获取源码包编译升级，或通过系统包管理器（如 apt install samba=3.0.25、yum update samba）安装更新版本。由于该漏洞无有效临时缓解措施，必须尽快完成版本升级。"
score = 7.2
severity = "HIGH"
sources = ["tenable"]
title = "Samba smbd SID/Name 转换逻辑错误本地权限提升漏洞"
updated = "2026-06-16T22:39:36.143"

