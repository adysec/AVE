[basic]
description = "Windows 2000 的 SYSKEY 默认配置将系统启动密钥存储在注册表中，本地攻击者可通过读取注册表获取该密钥，进而解密受 Encrypted File System (EFS) 保护的数据。该漏洞影响 Windows 2000 所有版本，攻击者需具有本地访问权限才能利用，CVSS 评分 7.2，危害等级高。Microsoft 尚未发布官方补丁，建议用户手动启用 SYSKEY 的密码保护模式以降低风险。"
published = "2000-05-11T04:00:00.000"
remediation = "运行 Syskey.exe 将启动密钥存储方式从「注册表存储」改为「密码启动」或「软盘启动」模式，防止密钥被本地提取。同时安装 Microsoft 为 Windows 2000 发布的相关安全更新（如 MS00-032），并限制物理访问权限，确保攻击者无法获得本地登录权限。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "Microsoft Windows 2000 SYSKEY 默认密钥配置信息泄露漏洞"
updated = "2026-06-16T21:51:41.713"

