[basic]
description = "IIS 4.0 服务器在处理分块传输编码（Chunked Transfer Encoding）请求时存在缓冲区溢出漏洞，远程攻击者可通过向目标服务器发送包含大量数据的特制 POST 或 PUT 请求，消耗系统内存资源，导致目标网站服务拒绝服务。该漏洞影响 Microsoft Internet Information Server 4.0 版本，攻击者无需身份认证即可远程触发，属于中危漏洞。"
published = "2000-03-20T05:00:00.000"
remediation = "立即安装 Microsoft 安全公告 MS00-018 提供的补丁程序，从 Microsoft Download Center 获取适用于 IIS 4.0 的更新。由于该产品已停止技术支持，建议升级到受支持的 Windows Server 及 IIS 版本。若无法升级，可在 IIS 管理器中限制 POST/PUT 请求的最大数据大小作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Microsoft IIS 4.0 分块传输编码缓冲区溢出拒绝服务漏洞"
updated = "2026-06-16T21:51:16.057"

