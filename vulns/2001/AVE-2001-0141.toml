[basic]
description = "Linux 内核 2.2.18（RedHat 7.0/6.2 / 2.2.14 / 2.2.18 / 2.2.18ow4）ptrace/execve 系统调用之间的进程同步竞争导致漏洞，该漏洞利用内核在父子进程内存空间创建过程中的时间窗，在未经授权的情况下实现进程间权限提升。该漏洞影响多版本内核及红帽企业版系统，攻击者需触发 ptrace 系统调用的特殊序列，与 execve 系统调用竞争关键的内核资源状态，成功后即获得更高权限访问控制。该漏洞的危害等级严重，可能导致攻击者完全控制目标主机。"
published = "2001-05-03"
remediation = "建议将受影响的软件升级到厂商发布的最新安全版本，或根据官方安全公告应用相应的安全补丁。如暂无补丁，建议采取临时缓解措施限制攻击面。"
score = 5
severity = "MEDIUM"
sources = ["redhat"]
title = "Linux Kernel 2.2.18 ptrace/execve 竞争条件权限提升漏洞"
updated = "2001-05-03"

