[basic]
description = "UnixWare 操作系统的 rtpm 程序存在缓冲区溢出漏洞，本地用户可通过向该程序传入超长的环境变量参数触发缓冲区溢出，从而获得目标系统的 root 权限。该漏洞仅需要本地用户权限即可利用，攻击复杂度较低，成功利用后可完全控制受影响的系统。"
published = "1999-12-30T05:00:00.000"
remediation = "立即从 SCO 安全网站（原 http://www.sco.com/security）获取并安装 rtpm 补丁。由于 SCO UnixWare 已停止维护，建议迁移至受支持的操作系统（如 Linux 或现代 BSD 变体）以彻底消除安全隐患。如无法迁移，应限制本地用户对受影响系统的访问权限，确保仅授权用户可登录系统，并监控异常提权行为。"
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "SCO UnixWare rtpm 本地缓冲区溢出权限提升漏洞"
updated = "2026-06-16T21:50:48.120"

