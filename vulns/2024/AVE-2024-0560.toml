[basic]
description = "libxslt 1.1.43 之前版本中的 xsltGetInheritedNsList 函数存在释放后使用（Use-After-Free）漏洞。该漏洞源于在处理 XSLT 转换过程中排除结果命名空间前缀时，函数对已释放的内存对象进行了错误引用，导致程序在后续操作中访问已被释放的内存区域。攻击者可通过向受影响应用提交特制的 XSLT 样式表触发该漏洞，造成程序崩溃或潜在的内存数据篡改，影响系统完整性和可用性。该漏洞需本地访问且攻击复杂度较高，CVSS 评分 7.8，危害等级高。"
published = "2025-03-14T02:15:15.333"
remediation = "立即将 libxslt 升级至 1.1.43 及以上版本（1.1.43 于 2025 年 3 月 12 日发布，已修复该释放后使用问题）。Debian 用户可运行 `apt-get update && apt-get install --only-upgrade libxslt1.1` 安装安全更新。如无法立即升级，可在应用层禁用 XSLT 转换功能或使用 AppArmor/SELinux 策略限制 libxslt 进程权限作为临时缓解措施。"
score = 7.8
severity = "HIGH"
sources = ["msrc"]
title = "libxslt libxslt 释放后使用漏洞"
updated = "2026-06-17T08:11:13.393"

