[basic]
description = "Microsoft Internet Explorer 4.x 及 5.x 版本存在跨框架域验证漏洞（Frame Domain Verification）。由于浏览器未能正确验证窗口内框架的域归属，远程攻击者可通过构造恶意网页，利用 DocumentComplete() 事件处理机制绕过同源策略限制，跨域读取客户端本地文件。攻击者只需诱使用户访问特制网页即可触发，无需额外身份认证。该漏洞影响 IE 4.0/5.0/5.5 预览版及 5.0.1 等多个版本，CVSS 评分 5.1，危害等级中危。微软已在后续安全更新中修复此漏洞。"
published = "2000-05-17T04:00:00.000"
remediation = "安装 Microsoft 安全公告 MS00-033 提供的 Internet Explorer 累积安全更新，将 IE 升级至 5.01 Service Pack 1 或更高版本。该更新修复了 DocumentComplete() 事件处理中跨帧域验证不充分的问题。如无法立即升级，可在安全设置中将「跨域浏览窗口和框架」设为禁用，并将 Internet 区域安全级别设为「高」以阻止 ActiveX 脚本执行。"
score = 5.1
severity = "MEDIUM"
sources = ["epss"]
title = "Microsoft Internet Explorer 跨框架域验证漏洞"
updated = "2026-06-16T21:51:47.567"

