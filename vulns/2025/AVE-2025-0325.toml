[basic]
description = "汉王 e 脸通综合管理平台 queryMeetingFile.do 接口存在 SQL 注入漏洞，由于系统未对用户输入的参数进行充分的过滤和转义处理，导致攻击者可通过构造特制的 SQL 语句注入并操纵后台数据库查询。成功利用此漏洞的攻击者可获取数据库中的敏感信息，包括用户凭证、人员数据等，甚至可能进一步获取服务器控制权限。攻击者仅需向目标接口发送恶意构造的 HTTP 请求即可触发，无需身份认证，危害较大。"
published = "0702"
remediation = "对 queryMeetingFile.do 接口实施参数化查询或预编译语句，严格过滤用户输入的单引号/分号等 SQL 特殊字符。部署 WAF 规则拦截含 SQL 注入 payload 的请求。联系厂商获取最新安全补丁或升级到不受影响版本。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "汉王 e脸通综合管理平台 SQL 注入漏洞"
updated = "0702"

