[basic]
description = "xterm、Eterm 和 rxvt 等终端模拟器在处理特定转义序列时存在拒绝服务漏洞。远程攻击者可通过向目标系统终端窗口嵌入恶意构造的窗口大小调整转义字符，迫使终端窗口持续改变大小，导致大量内存消耗而引发拒绝服务。该漏洞影响 XFree86 X11R6 3.3.3/4.0、Eterm 0.8.10、rxvt 2.6.1 等版本，CVSS 评分 5.0，危害等级中危。攻击者无需身份认证即可通过向受害者终端输出特制转义序列触发此漏洞。"
published = "2000-06-01T04:00:00.000"
remediation = "升级 xterm 至 7.0 以上版本，升级 rxvt 至 2.7.0 以上版本，升级 PuTTY 至 0.79 以上版本。XFree86 已停止维护，建议迁移至 X.org 替代。如无法升级，在 SSH/Telnet 客户端启用转义序列过滤功能，并避免连接不可信终端服务。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "XFree86 X11r6 及多款终端模拟器拒绝服务漏洞"
updated = "2026-06-16T21:51:48.990"

