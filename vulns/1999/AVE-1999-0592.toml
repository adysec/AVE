[basic]
description = "LaserFiche for NetWare 版本以明文形式存储用户名和密码，导致邻近网络的攻击者可通过访问系统文件获取管理员凭证，造成敏感信息泄露。同时，系统允许管理员配置更改但未记录日志，使得未授权操作无法追溯审计。攻击者可利用窃取的凭证对系统进行进一步未授权访问与控制。"
published = "1999-01-01T05:00:00.000"
remediation = "升级到 LaserFiche 现代版本（如 9.0 以上）以使用加密存储和审计日志功能；若无法升级，迁移至 Hyland 或其他具备加密存储与操作审计的文档管理平台。作为临时缓解措施，在网络层限制对 LaserFiche 服务的访问来源，仅允许受信任管理 IP 连接，并在 NetWare 服务器上启用文件系统和操作审计日志。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "LaserFiche NetWare 版敏感信息泄露漏洞"
updated = "2026-06-16T21:48:13.863"

