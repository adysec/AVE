[basic]
description = "Linux 内核 AMD GPU 显示驱动（drm/amd/display）的 dcn30_internal_validate_bw 函数缺少浮点运算单元（FPU）保护。当该函数调用 populate_dml_pipes 进行浮点运算时，若同时启用 DRM 调试日志，线程上下文切换可能导致 FPU 状态损坏，触发 general protection fault 内核崩溃。本地攻击者可运行 WebGL Aquarium 等图形密集型应用导致系统拒绝服务。该漏洞影响启用 AMDGPU 驱动的 Linux 系统，CVSS 评分 5.5，危害等级中危。"
published = "2025-02-26T07:00:44.120"
remediation = "立即升级 Linux 内核至 5.16.20 / 5.17.3 / 5.18 及以上版本。对应提交为 e995c5d52ec7、76f4c5e5f99e、ca1198849ab0。若无法升级，可将 drm debug 日志级别降至 0x1f 以下作为临时缓解措施，避免在启用高等级调试日志时长时间运行 WebGL 等高负载图形应用触发 FPU 上下文切换异常。"
score = 5.5
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux AMD Display 驱动 FPU 保护缺失导致拒绝服务漏洞"
updated = "2026-06-17T05:16:59.683"

