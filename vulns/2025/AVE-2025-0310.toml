[basic]
description = "中科汇联 EasySite 内容管理系统存在 XStream 反序列化漏洞。XStream 在处理 XML 数据时未对反序列化对象进行安全过滤，未经身份认证的远程攻击者可通过向目标系统发送特制的 XML 数据包触发不安全反序列化，从而在服务器端执行任意代码，实现完全控制目标系统。该漏洞影响中科汇联 EasySite 系统的多个版本，危害严重，建议用户尽快升级修复。"
published = "0722"
remediation = "升级EasySite底层XStream组件至1.4.21及以上版本（该版本默认启用白名单安全框架，可有效阻止反序列化攻击）；若无法升级XStream，在代码中调用XStream.setupDefaultSecurity()启用白名单机制，仅允许反序列化必要类型；同时在Web应用防火墙（WAF）层面拦截包含恶意XML/JSON反序列化载荷的请求，作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = 'The user wants me to generate a title field for vulnerability HWPOC-2025-0564467b. Let me analyze the known information: - Vulnerability ID: HWPOC-2025-0564467b - Original title: 中科汇联 EasySite 系统XStream 反序列化 - Original description: 中科汇联 中科汇联 EasySite 系统XStream 反序列化 RCE - 未知 So this is about: - Vendor: 中科汇联 (Zhongke Huilian) - Product: EasySite 系统 - Vulnerability type: XStream 反序列化 (XStream deserialization) leading to RCE The format should be: "厂商 产品 漏洞类型" (Vendor Product Vulnerability Type) So: "中科汇联 EasySite 系统XStream 反序列化远程代码执行漏洞" Or simpler: "中科汇联 EasySite 系统XStream反序列化远程代码执行漏洞" Let me think about this more carefully. The example is "Microsoft Windows TCP/IP 远程代码执行漏洞". So the pattern is: Vendor Product Vulnerability Type + "漏洞" For this case: - 厂商: 中科汇联 - 产品: EasySite 系统 - 漏洞类型'
