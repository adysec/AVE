[basic]
description = "Linux Kernel 中的 IP 分片重组模块存在缺陷，远程攻击者可通过向目标系统发送特制的重叠分片 IP 数据包（Nestea 变种 Teardrop 攻击），导致内核在处理分片重组时发生内存错误，进而引发系统崩溃或重启，造成拒绝服务。该漏洞影响较早版本的 Linux Kernel，无需身份认证即可远程触发。"
published = "1998-04-01T05:00:00.000"
remediation = "建议升级 Linux 内核至 2.0.36 及以上版本（已包含 IP 分片重组校验补丁），或直接迁移至当前主流内核版本（5.x/6.x）彻底免疫。如无法升级内核，可在边界防火墙上配置丢弃非正常分片数据包（iptables -A FORWARD -f -j DROP），并在主机层面添加 iptables 规则丢弃入站分片包（iptables -A INPUT -f -j DROP）作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Linux Kernel IP Fragmentation 拒绝服务漏洞"
updated = "2026-06-16T21:48:00.990"

