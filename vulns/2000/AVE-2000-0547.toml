[basic]
description = "Solaris AnswerBook2 中的 dwhttpd Web 服务器管理接口存在远程命令执行漏洞。攻击者可通过向该接口发送包含 shell 元字符的特制 HTTP 请求，在目标系统上以 Web 服务器权限执行任意命令。该漏洞影响 Solaris 操作系统中的 AnswerBook2 组件，CVSS 评分 10.0，危害等级严重。攻击无需身份认证，利用难度较低。"
published = "2000-10-20T04:00:00.000"
remediation = "安装 Sun 安全补丁 110011-02（SPARC 平台）或 110012-02（x86 平台），并将 AnswerBook2 升级至 v1.4.2 或更高版本。如无法立即打补丁，可在防火墙上限制对 8888 端口的访问，或禁用 AnswerBook2 服务作为临时缓解措施。"
score = 10
severity = "CRITICAL"
sources = ["exploitdb"]
title = "Sun Solaris AnswerBook2 dwhttpd Web 服务器远程命令执行漏洞"
updated = "2026-06-16T21:52:17.447"

