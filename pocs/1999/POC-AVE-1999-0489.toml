[info]
author = "AVE"
description = "检测 Vixie Cron MAILTO 环境变量本地命令注入漏洞 - 通过检查系统 crontab 文件确认 cron 守护进程存在"
id = "POC-AVE-1999-0489"
name = "CVE-1999-0769 PoC"
severity = "high"
tags = ["ave-1999-0489"]
vuln_id = [
    "CVE-1999-0769",
    "AVE-1999-0489",
]

[poc]
logic = "all"

[[poc.requests]]
path = "/etc/crontab"
protocol = "file"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["crontab"]
