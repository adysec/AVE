[basic]
description = "Windows NT 本地安全认证子系统（LSA）存在输入验证不当漏洞（CWE-20），远程攻击者可通过向目标系统发送特制的 LSA 请求报文触发该漏洞，导致 LSA 服务进程崩溃，造成拒绝服务。该漏洞影响 Windows NT 4.0 及 Windows 2000 系统，攻击者无需身份认证即可发起攻击，利用难度较低。微软已发布安全更新修复此漏洞。"
published = "1999-07-20T04:00:00.000"
remediation = "立即安装 Microsoft Security Bulletin MS99-020 提供的安全更新补丁（KB Q231457），该补丁修复了 LSA 子系统对畸形请求的输入验证缺陷。如无法安装补丁，可在防火墙层面限制对 LSA 相关端口的非授权访问作为临时缓解措施。鉴于 Windows NT 4.0 和 Windows 2000 已停止支持，建议升级到受支持的 Windows 版本以获得持续安全更新。"
score = 7.8
severity = "HIGH"
sources = ["avd"]
title = "Microsoft Windows NT 4.0/2000 LSA 子系统拒绝服务漏洞"
updated = "2026-06-16T21:48:55.073"

