[basic]
description = "Cat Soft Serv-U FTP Server 2.5a 版本存在缓冲区溢出漏洞，远程攻击者无需身份认证即可通过向 FTP 服务发送特制的 SITE PASS 命令触发该漏洞，导致目标服务进程崩溃，造成拒绝服务。该漏洞影响 Serv-U FTP Server 2.5a 版本，CVSS 评分 5.0，危害等级中危。厂商已发布新版本修复此问题，建议用户升级至不受影响版本。"
published = "1999-12-01T05:00:00.000"
remediation = "建议将 Cat Soft Serv-U FTP Server 升级至 2.5b 或更高版本，该版本已修复 SITE 命令处理函数中的缓冲区溢出问题。如无法立即升级，可在 FTP 服务前端部署防火墙规则，限制仅受信任 IP 访问 21 端口，并关闭或限制 SITE 命令的使用作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Cat Soft Serv-U FTP Server 2.5a 缓冲区溢出漏洞"
updated = "2026-06-16T21:49:09.813"

