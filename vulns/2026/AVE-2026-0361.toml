[basic]
description = ".NET Framework 中的 System.Security.Cryptography.Xml 命名空间下的 XML 加密实现（EncryptedXml）存在资源未受限制分配漏洞（CWE-770）。未经身份认证的远程攻击者可通过向使用受影响版本 System.Security.Cryptography.Xml NuGet 包的 .NET 应用发送特制的加密 XML 数据，触发无限制的资源消耗，导致目标服务拒绝服务。该漏洞影响 .NET 8.0（8.0.0 至 8.0.28）、.NET 9.0（9.0.0 至 9.0.17）以及 .NET 10.0（10.0.0 至 10.0.9）的所有平台和架构，攻击向量为网络、攻击复杂度低、无需权限或用户交互即可完成利用，主要危害为系统不可用。Microsoft 已发布安全更新修复该漏洞，受影响版本的用户应将 System.Security.Cryptography.Xml 包升级至对应已修复版本（.NET 8.0.29、.NET 9.0.18 或 .NET 10.0.10）并重新编译部署应用。"
published = "2026-07-14T20:17:37.937"
remediation = "立即将 System.Security.Cryptography.Xml 包升级到补丁版本：将 .NET 8.0 升级到 8.0.29、.NET 9.0 升级到 9.0.18、.NET 10.0 升级到 10.0.10。使用 NuGet 命令行执行 `dotnet add package System.Security.Cryptography.Xml --version 8.0.29`、`dotnet add package System.Security.Cryptography.Xml --version 9.0.18`、`dotnet add package System.Security.Cryptography.Xml --version 10.0.10` 进行升级，或通过 Visual Studio 的 NuGet 包管理器进行升级，然后重新编译部署应用以彻底修复这一拒绝服务漏洞。"
score = 7.5
severity = "HIGH"
sources = ["ghsa"]
title = "微软 .NET XML 加密拒绝服务漏洞"
updated = "2026-07-22T21:17:41.733"

