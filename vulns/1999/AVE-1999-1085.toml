[basic]
description = "RealNetworks RealServer (rmserver) 6.0.3.353 版本存在敏感信息泄露漏洞。该软件将管理员密码以明文形式存储于全局可读的 rmserver.cfg 配置文件中，导致本地攻击者可通过读取该配置文件获取管理员凭据，进而实现权限提升。该漏洞影响 RealServer 6.0.3.353 及可能更早版本，CVSS 评分 4.6，危害等级中危。建议用户升级至不受影响的版本或限制配置文件访问权限。"
published = "1999-04-14T04:00:00.000"
remediation = "将 rmserver.cfg 文件权限改为仅管理员可读写（chmod 600），并升级至 RealServer 7.0 以上版本以启用加密密码存储。同时删除配置文件中明文密码字段，改用环境变量或外部认证方式。"
score = 4.6
severity = "MEDIUM"
sources = ["epss"]
title = "Real Media RealServer 密码明文存储致本地权限提升漏洞"
updated = "2026-06-16T21:50:17.603"

