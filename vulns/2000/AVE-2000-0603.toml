[basic]
description = "Linux tmpwatch 工具的 --fuser 选项在处理文件时未对文件名中的特殊字符进行转义过滤，本地攻击者可通过创建包含 shell 元字符（如反引号、$() 等）的文件名，当系统管理员或 cron 任务调用 tmpwatch --fuser 清理临时文件时，恶意文件名中的 shell 命令会被执行，从而导致本地权限提升或任意命令执行。该漏洞影响 RedHat 6.2/7.0 等发行版，CVSS 评分 2.1，危害等级低，利用条件需要本地用户权限。"
published = "2000-10-06T04:00:00.000"
remediation = "升级 tmpwatch 至修复版本（如 Red Hat 的 tmpwatch-1.2-3 或更新版本），该版本已修复 --fuser 选项对文件名中 shell 元字符的转义处理。如无法升级，应避免使用 tmpwatch --fuser 功能，改用 find 命令配合 -exec 或 -delete 参数清理临时文件，并确保临时目录权限严格限制，防止低权限用户创建含特殊字符的文件名。"
score = 2.1
severity = "LOW"
sources = ["redhat"]
title = "RedHat Tmpwatch 本地任意命令执行漏洞"
updated = "2026-06-16T21:52:32.177"

