[basic]
description = "Solaris netpr 程序存在缓冲区溢出漏洞，源于对 -p 参数（打印机名称）缺乏长度校验。本地攻击者可通过向 netpr 程序传递过长的 -p 参数触发栈溢出，覆盖返回地址并执行任意代码，从而获得 netpr 进程权限（通常为 root 或 lp 用户权限）。该漏洞影响 Solaris 2.6、7.0 和 8.0 版本，CVSS 评分 7.2（高危），攻击向量为本地，无需认证，攻击复杂度低，可完全破坏系统机密性、完整性和可用性。攻击者需拥有本地系统访问权限，通过构造超长打印机名称参数调用 netpr 程序即可触发漏洞并执行任意命令。Sun Microsystems 已发布补丁修复此漏洞，建议升级至修复版本或限制 netpr 程序执行权限。"
published = "2000-05-12T04:00:00.000"
remediation = "立即升级 Solaris 到包含安全更新的版本（如 Solaris 8 补丁集 8 月或更晚版本的 11/00 更新），或者应用特定的 netpr 补丁更新。更新系统可以修复原始的缓冲区溢出缺陷。作为紧急缓解措施，如果无法立即打补丁，可在 /etc/system 文件中添加 maxmemconsistentcheck 限制，以及通过修改 /usr/sbin/netpr 配置文件对 -p 参数启用长度验证。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "Sun Solaris netpr 缓冲区溢出漏洞"
updated = "2026-06-16T21:51:39.103"

