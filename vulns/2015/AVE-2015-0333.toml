[basic]
description = "Microsoft Internet Explorer 7 至 11 版本存在内存破坏漏洞（CVE-2015-2502，CWE-787 越界写入），源于 IE 浏览器引擎在处理特制网页内容时对内存对象的错误管理，导致越界写入破坏内存结构。远程攻击者可通过诱导用户访问精心构造的恶意网站触发该漏洞，利用用户交互（UI:R）在目标系统上下文中执行任意代码（C:H/I:H/A:H），或导致浏览器崩溃拒绝服务。该漏洞 CVSS 3.1 评分 8.8（HIGH），攻击向量为网络（AV:N）、攻击复杂度低（AC:L）、无需权限（PR:N），2015 年 8 月已在野利用，微软随即发布紧急安全更新（MS15-093）修复。影响范围覆盖 Windows 系统预装的 IE 7/8/9/10/11，用户访问恶意页面即可触发，无需额外权限，危害等级高。微软于 2015 年 8 月发布紧急补丁修复该漏洞，CISA 已将其列入已知被利用漏洞目录（KEV）。"
published = "2015-08-19T10:59:00.090"
remediation = "立即通过 Windows Update 安装 Microsoft 2015 年 8 月安全更新 MS15-093 (KB3087040)，将 IE 7-11 升级至最新版本。无法立即更新时，可暂时禁用 IE 并改用 Chrome/Firefox 替代浏览器，或在防火墙/代理层面拦截可疑网页脚本执行作为临时缓解。若无法升级 IE，建议启用 Enhanced Protected Mode (IE10/11) 并禁用 VBScript 脚本引擎作为缓解措施，同时部署网络层 IPS 规则拦截已知利用载荷特征。"
score = 8.8
severity = "HIGH"
sources = ["kev"]
title = "Microsoft Internet Explorer 内存破坏漏洞"
updated = "2026-06-17T00:24:12.337"

