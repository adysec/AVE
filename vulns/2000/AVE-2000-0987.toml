[basic]
description = "Texas Imperial Software wftpd 版本 2.41 RC12 存在处理异常字符的缺陷，当远程攻击者向服务器发送包含长串不可打印字符的数据包时，服务器在解析这些非法字符时会因缓冲区边界检查不足而引发内存溢出，导致核心组件崩溃，进而造成服务彻底不可用。该漏洞影响 Windows 和 Linux 操作系统上运行的 WFTPD 和 WFTPD Pro 服务器，攻击者无需任何身份验证即可远程触发，典型利用方式是构造包含大量不可打印 ASCII 字符的有效载荷并发送到控制端口，目标服务器在处理这些非法输入时会崩溃并停止响应。"
published = "2000-11-14T05:00:00.000"
remediation = '升级到 WFTPD Pro 2.41 RC13 或更高版本，更新 Texas Imperial Software wftpd 软件到最新稳定版本；在防火墙上配置对包含 "cmp" 或多个特殊字符的 HTTP 请求进行限制，限制有效载荷长度至 1024 字节以下；禁用 WFTPD 服务的匿名访问以减少攻击面；部署应用层防火墙规则以阻止包含异常宽字符的连串数据包；如需远程访问，请配置访问者白名单并要求强密码认证。'
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Texas Imperial Software WFTPD 拒绝服务漏洞"
updated = "2026-06-16T21:52:39.110"

