[basic]
description = "Midnight Commander（mc）4.5.11 之前版本的 FTP 客户端存在敏感信息泄露漏洞。该软件将用户访问过的站点用户名和密码以明文形式存储于全局可读的历史记录文件中，导致本地其他用户可读取该文件获取凭据，进而实现权限提升。攻击者只需拥有本地系统访问权限即可利用，无需特殊条件。受影响的系统包括所有使用受影响版本 Midnight Commander 的 Linux/Unix 发行版。"
published = "1999-08-01T04:00:00.000"
remediation = "升级 Midnight Commander 至 4.5.11 或更高版本，该版本已修复密码明文存储问题。若无法立即升级，可删除 ~/.mc/history 文件并设置该文件权限为 600（仅所有者可读写），同时建议使用支持密钥认证的 SFTP 替代明文 FTP 协议以减少密码泄露风险。"
score = 4.6
severity = "MEDIUM"
sources = ["avd"]
title = "Midnight Commander FTP客户端历史文件明文密码存储漏洞"
updated = "2026-06-16T21:50:13.573"

