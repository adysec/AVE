[basic]
description = "Linux 内核 DRM DP MST（DisplayPort 多流传输）驱动中存在竞态条件漏洞。当 MST 拓扑在接收下行回复或上行请求边带消息过程中被移除时，`drm_dp_mst_topology_mgr` 的 `up_req_recv/down_rep_recv` 状态可能在一个线程中通过 `drm_dp_mst_set_mst(false)` 被重置，同时另一线程正在通过 `drm_dp_mst_handle_down_rep()` 或 `drm_dp_mst_handle_up_req()` 读取/解析消息，且读取/解析过程未持有锁保护接收状态，导致内存损坏。本地低权限攻击者可利用此竞态条件触发内存破坏，可能导致系统崩溃或权限提升。CVSS 评分 7.0，危害等级高。"
published = "2025-01-11T15:15:07.930"
remediation = "立即将 Linux 内核升级至以下修复版本：6.1.120、6.6.66、6.12.5 或更高版本。Ubuntu 22.04 LTS 用户可通过 `apt update && apt install linux-image-$(uname -r | sed 's/.*/generic/')` 安装 USN-7381-1 或 USN-7450-1 安全更新。如无法立即升级内核，可在 BIOS/引导参数中禁用 DisplayPort MST 功能（添加 `drm.dp_mst=0` 到内核引导参数）作为临时缓解措施。"
score = 7
severity = "HIGH"
sources = ["msrc"]
title = "Linux kernel DRM DP MST 竞态条件漏洞"
updated = "2026-06-17T08:14:07.567"

