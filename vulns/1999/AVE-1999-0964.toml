[basic]
description = 'CVE-1999-0645 已被拒绝使用，原分配描述为"IRC 服务正在运行"，该条目实质描述的是系统中 IRC 服务处于启用状态的配置信息，而非本身存在安全漏洞。由于此类配置枚举更适合归入通用配置枚举（CCE）体系，NVD 已将其标记为 REJECT 状态。系统管理员应关注 IRC 服务是否确实需要运行，若无需使用建议关闭以减小攻击面。'
published = "1999-01-01T05:00:00.000"
remediation = "在服务器上禁用不必要的 IRC 服务。Linux 系统执行 systemctl disable ircd 并停止对应服务；Windows 系统通过 services.msc 将 IRC 相关服务设为禁用。在边界防火墙上封禁 IRC 默认端口 6660-6669/TCP 的出站流量，防止内网主机外连 IRC 服务器。定期使用端口扫描确认 6660-6669 端口无对外开放。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "IRC 服务运行信息泄露漏洞"
updated = "2023-11-07T01:55:00.070"

