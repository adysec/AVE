[basic]
description = "H. Nomura Tiny FTP Daemon 0.52 beta3 的多个命令处理函数存在缓冲区溢出漏洞。远程攻击者可通过向 FTP 服务器发送特制的 STOR、RNTO、MKD、XMKD、RMD、XRMD、APPE、SIZE 及 RNFR 等命令参数触发缓冲区溢出，导致目标系统以服务进程权限执行任意代码。该漏洞 CVSS 评分为 10.0，危害等级严重，影响 Tiny FTPd 0.52 beta3 版本。"
published = "2000-02-01T05:00:00.000"
remediation = "立即停止使用 Tiny FTPd 0.52 beta3，该软件已停止维护多年且无安全补丁可用。迁移至 vsftpd（Linux）或 FileZilla Server（Windows）等持续维护的 FTP 服务器软件，并确保仅对可信网络开放 FTP 服务。如在边界防火墙上阻止外部对 TCP 端口 21 的访问，可将攻击面降至最低。"
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "H. Nomura Tiny FTPd 多个缓冲区溢出漏洞"
updated = "2026-06-16T21:51:04.157"

