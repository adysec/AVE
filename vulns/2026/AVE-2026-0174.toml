[basic]
description = "Smartbi 商业智能分析平台 share.jsp 接口存在认证绕过漏洞，未经身份认证的远程攻击者可直接访问本需权限校验的后台接口，进而利用该平台的后端功能实现远程代码执行，获取服务器控制权限。攻击者无需任何凭证即可在互联网上利用该漏洞，危害严重。厂商已发布安全版本 11.0.99471.25193 修复此漏洞。"
published = "nday"
remediation = "立即升级 Smartbi 至 11.0.99471.25193 或更高版本，该版本修复了 share.jsp 认证绕过缺陷。如无法立即升级，可在 Web 服务器（如 Nginx/Apache）侧配置访问控制，限制对 /share.jsp 路径的未授权访问，或通过 WAF 规则拦截相关路径的异常请求。"
score = 5
