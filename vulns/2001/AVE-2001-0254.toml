[basic]
description = "OpenPGP 标准在处理加密私钥文件时存在密码分析攻击漏洞。本地攻击者可通过修改目标用户的加密私钥文件，并捕获一条使用该私钥签名的消息，利用密码分析手段推导出私钥签名密钥。成功利用此漏洞可导致签名密钥泄露，进而伪造签名或解密加密信息。该漏洞影响所有遵循 OpenPGP 标准的实现，攻击者需具备本地文件修改权限，攻击复杂度较低。"
published = "2001-06-27T04:00:00.000"
remediation = "升级 GnuPG 至 2.0 或更高版本（当前最新为 2.5.x），该漏洞已在 OpenPGP 标准后续修订（RFC 4880）及现代实现中修复。如使用商业 PGP 产品，联系厂商获取安全更新。无法升级时，避免在不可信环境中存储加密私钥文件，并限制对私钥文件的访问权限。"
score = 4.6
severity = "MEDIUM"
sources = ["redhat"]
title = "OpenPGP PGP 加密私钥文件篡改致私钥泄露漏洞"
updated = "2026-06-16T21:54:12.007"

