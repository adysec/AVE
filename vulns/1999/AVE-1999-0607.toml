[basic]
description = "Sun Solaris 操作系统中 OpenWindows 环境的 sdtcm_convert 日历转换工具存在缓冲区溢出漏洞。本地攻击者可向该程序发送特制的输入数据触发缓冲区溢出，从而获得 root 权限。该漏洞影响 Sun Solaris 7.0 及更早版本，需要本地系统访问权限，CVSS 评分 7.2，危害等级高。厂商已发布补丁修复此漏洞。"
published = "1997-02-01T05:00:00.000"
remediation = "立即应用 Sun 安全公告 #183 提供的补丁，升级 sdtcm_convert 至修复版本。如无法打补丁，执行 `chmod -s /usr/dt/bin/sdtcm_convert` 移除 setuid 位以消除本地提权风险，或卸载 OpenWindows 组件作为临时缓解措施。"
score = 7.2
severity = "HIGH"
sources = ["epss"]
title = "Sun Solaris OpenWindows sdtcm_convert 本地缓冲区溢出漏洞"
updated = "2026-06-16T21:48:14.910"

