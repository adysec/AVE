[basic]
description = "SGI IRIX 操作系统中的 crontab 命令在编辑计划任务时，会在 /tmp 目录下创建临时文件，但这些临时文件使用了可预测的文件名，并继承了当前用户的 umask 权限设置。本地攻击者可通过预测临时文件名，在目标用户编辑 crontab 文件期间进行符号链接攻击，从而修改其他用户的 crontab 文件内容，进而获取更高权限或执行未授权操作。该漏洞影响 IRIX 6.x 及更早版本，需要本地访问权限且满足竞争窗口条件。"
published = "2000-06-21T04:00:00.000"
remediation = "升级到 SGI IRIX 6.5.8 及以上版本，或安装 SGI 安全补丁 4310。如无法升级，将 umask 设置为 077 并确保 /tmp 目录使用粘滞位（chmod 1777 /tmp），同时限制 crontab 仅 root 用户可执行。使用非予测文件名（如 mkstemp）的替代 crontab 工具也可作为临时缓解方案。"
score = 3.7
severity = "LOW"
sources = ["cve"]
title = "SGI IRIX crontab 可预测临时文件导致本地文件修改漏洞"
updated = "2026-06-16T21:52:02.440"

