[basic]
description = 'Microsoft IIS 4.0 和 5.0 在虚拟目录映射到 UNC 共享时，未正确执行 ISAPI 扩展处理，导致远程攻击者可读取 ASP 等文件的源代码，即 "Virtualized UNC Share" 漏洞。该漏洞影响 IIS 4.0 和 5.0 版本，CVSS 评分 5.0（中等危害）。未经身份认证的远程攻击者可通过访问映射到 UNC 共享的虚拟目录下的 ASP 文件，直接获取源代码而非执行结果，导致敏感源代码泄露。'
published = "2000-03-30T05:00:00.000"
remediation = "建议安装微软 MS00-019 安全补丁修复该漏洞；IIS 4.0 用户应升级并应用 Windows NT 4.0 Service Pack 6a 及后续累积补丁，IIS 5.0 用户升级到 Windows 2000 SP1 及以上。作为临时缓解，避免将虚拟目录映射到 UNC 共享，或对映射到 UNC 共享的虚拟目录移除脚本/执行权限并限制匿名访问。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Microsoft IIS 4.0 UNC映射虚拟主机源代码泄露漏洞"
updated = "2026-06-16T21:51:18.773"

