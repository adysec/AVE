[basic]
description = "CDE Calendar Manager Service Daemon（rpc.cmsd）存在缓冲区溢出漏洞。该服务在 Sun Solaris、HP-UX、Caldera OpenUnix 和 UnixWare 等系统上以 root 权限运行并监听 RPC 请求。攻击者可通过向 rpc.cmsd 发送超长格式的 RPC 请求触发缓冲区溢出，从而在目标系统上执行任意代码或导致服务拒绝服务。该漏洞影响网络可达且运行受影响的 Unix 操作系统的服务器和工作站。"
published = "1999-07-01"
remediation = "安装厂商发布的安全补丁或升级到修复后的系统版本。Sun 系统可参考 Sun Security Bulletin #188 获取补丁；HP-UX 系统应安装 HP 安全公告 HPSBUX9908-102 对应的补丁；也可通过禁用 CDE 日历管理器服务（rpc.cmsd）来缓解该漏洞。"
score = 10.0
severity = "CRITICAL"
sources = [
    "cve",
    "exploitdb",
]
title = "CDE 日历管理器守护进程 rpc.cmsd 缓冲区溢出漏洞"
updated = "1999-07-01"

