[basic]
description = "Netscape 4.5 中的 Java 实现存在授权绕过漏洞，Java Applet 安全模型未正确限制小程序只能连接其加载来源主机，导致远程攻击者可诱导用户访问恶意网页，触发 Applet 跨主机连接，从而绕过同源策略执行未授权操作。该漏洞影响 Netscape 4.5 及可能更早版本，CVSS 评分 5.1，危害等级中危。目前该版本已停止维护，建议升级至支持现代安全模型的浏览器。"
published = "1997-08-01T04:00:00.000"
remediation = "该漏洞存在于已停止维护的 Netscape 4.5 中，最新版 Netscape 已停产。建议立即迁移至 Mozilla Firefox、Google Chrome 等现代浏览器，其安全模型已正确实现同源策略，严格限制小程序仅能与来源主机建立网络连接。如需继续使用 Java 功能，请确保浏览器和 Java 运行时均已更新至最新版本。"
score = 5.1
severity = "MEDIUM"
sources = ["epss"]
title = "Netscape Java 授权问题漏洞"
updated = "2026-06-16T21:50:03.807"

