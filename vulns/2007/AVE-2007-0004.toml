[basic]
description = "Joomla! 的 RSfiles 组件 1.0.2 版本中存在路径遍历漏洞，远程攻击者通过在请求中构造恶意的 path 参数，可利用目录遍历技术下载服务器上的任意文件，导致敏感信息泄露。该漏洞无需身份认证即可利用，攻击复杂度低，影响运行 Joomla! 及 RSfiles 组件的所有 Web 服务器。"
published = "2007-08-24"
remediation = "立即升级 RSfiles 组件至 1.0.2 以上版本，厂商 RSJoomla 已在后续版本中修复 `path` 参数路径遍历漏洞。如无法获取更新，建议彻底卸载 `com_rsfiles` 组件并换用其他文件管理扩展。临时缓解措施：在 Joomla! 根目录 .htaccess 中添加重写规则，拦截 `option=com_rsfiles&task=files.display` 请求中 path 参数包含 `..` 或 `|` 的恶意请求；同时在 PHP 层面过滤 `$_GET['path']` 中的目录遍历序列，禁止包含 `..` 的输入。"
score = 5
severity = "MEDIUM"
sources = ["nuclei"]
title = "Joomla! RSfiles 1.0.2 路径遍历文件下载漏洞"
updated = "2007-08-24"

