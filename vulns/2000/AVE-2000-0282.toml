[basic]
description = "Adtran MX2800 M13 多路复用器以太网接口存在拒绝服务漏洞，远程攻击者无需身份认证即可通过向目标设备的以太网接口发送大量 ICMP Ping 数据包实施洪水攻击，导致设备处理器过载并崩溃重启，造成网络服务中断。该漏洞影响运行特定固件版本的 Adtran MX2800 M13 多路复用器设备，CVSS 评分 5.0，危害等级中危。"
published = "2000-04-19T04:00:00.000"
remediation = "联系 Adtran 获取 MX2800 最新固件更新并安装，以修复以太网接口处理 ICMP 数据包时的缺陷。如无法升级，可在网络边界配置访问控制列表（ACL），限制对 MX2800 以太网接口的 ICMP 流量速率，或仅允许受信任管理 IP 地址访问该接口。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Adtran MX2800 M13 复用器以太网接口拒绝服务漏洞"
