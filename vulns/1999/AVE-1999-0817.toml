[basic]
description = "Unix 系统中存在用户权限配置缺陷，系统管理员在创建用户时可能将非 root 用户的 UID 设置为 0（超级用户标识），导致该用户账号拥有与 root 同等的最高系统权限。本地攻击者可通过登录或切换至该具备 root 权限的账户，实现对系统的完全控制，包括读取/修改任意文件、安装后门、提权执行任意命令等操作。该漏洞影响早期多数 Unix 及类 Unix 操作系统版本，通常由管理员配置不当或系统被植入后门账号导致。"
published = "1999-01-01T05:00:00.000"
remediation = "检查 /etc/passwd 中所有 UID 为 0 的账号，除 root 外立即删除或修改其 UID。建议使用 sudo 机制分配管理员权限，禁止共享 UID 0 账号，并定期审计系统账号权限配置。"
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "Unix 操作系统非 root 账户 UID 0 权限提升漏洞"
updated = "2026-06-16T21:48:38.127"

