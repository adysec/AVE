[basic]
description = "Infonautics 的 getdoc.cgi 脚本存在安全绕过漏洞，远程攻击者可通过修改表单变量（form variable）的值，绕过文档访问的付费验证阶段，从而未经授权获取付费文档内容。该漏洞属于参数篡改类型的认证绕过，攻击条件简单，无需身份认证即可远程利用，对文档付费系统的访问控制机制构成严重威胁。"
published = "2000-04-12T04:00:00.000"
remediation = "升级 getdoc.cgi 至最新版本，或修改脚本在服务端重新验证表单变量完整性，确保支付状态变量（如 payment_passed）不可由客户端提交修改。如厂商已停止维护，建议迁移至替代文档管理系统，并在 Web 服务器层限制对 getdoc.cgi 的访问来源。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Infonautics getdoc.cgi 安全绕过漏洞"
updated = "2026-06-16T21:51:24.260"

