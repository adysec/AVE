[basic]
description = "Spring Framework 存在远程代码执行漏洞，当应用运行在 JDK 9+ 版本并以 WAR 包形式部署在 Tomcat 容器上时，攻击者可通过数据绑定功能实现任意代码执行。该漏洞影响 Spring Framework 5.3.18 之前版本和 5.2.20 之前版本，CVSS 评分 9.8，危害等级严重。攻击者无需认证即可利用此漏洞获取服务器控制权，可能导致数据泄露、系统被完全控制等严重后果。"
published = "2022-04-01"
remediation = "升级 Spring Framework 至 5.3.18 或 5.2.20 及以上版本。如无法立即升级，可采取以下缓解措施：1) 将应用从 WAR 包部署改为 Spring Boot 可执行 jar 包部署；2) 降级 JDK 版本至 8 或更低版本；3) 配置 Tomcat 禁用数据绑定功能。"
score = 5.0
severity = "MEDIUM"
sources = ["cve"]
title = "Spring Framework 远程代码执行漏洞"
updated = "2026-07-22"

