title = "Allaire ColdFusion Administrator 未文档化 CFML 标签和函数权限提升漏洞"
description = "ColdFusion Administrator 中存在未公开的 ColdFusion Markup Language (CFML) 标签和函数，未经充分限制的特权用户可利用这些隐藏功能执行额外管理操作或获取更高系统权限。该漏洞影响 Adobe ColdFusion Server 的多个版本，攻击者需先获得 ColdFusion 管理界面的有效身份验证凭据，随后通过构造包含未文档化 CFML 标签的请求调用隐藏接口，从而绕过权限控制、获取额外特权或执行敏感管理功能。由于这些功能未在官方文档中列出，系统管理员难以察觉其存在并采取相应防护措施，可能导致内部权限提升及未授权操作风险。"
