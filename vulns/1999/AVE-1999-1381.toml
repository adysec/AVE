[basic]
description = "SGI IRIX 6.4 和 6.3 的 System Manager (sysmgr) 图形界面存在远程命令执行漏洞。攻击者可构造恶意的 runtask 或 runexec 描述文件，当用户 Mailcap 条目关联了 x-sgi-task 或 x-sgi-exec MIME 类型时，sysmgr 会执行该描述文件中指定的任意系统命令，导致攻击者以 sysmgr 权限远程执行任意命令。"
published = "1998-04-02"
remediation = "安装 SGI 安全公告 19980403-01-PX 和 19980403-02-PX 提供的补丁程序；编辑 Mailcap 配置文件删除 x-sgi-task 和 x-sgi-exec 类型处理器关联；在防火墙限制对 sysmgr 服务端口的外部访问；如不需要系统管理器远程管理功能，建议直接停止并禁用 sysmgr 服务。"
score = 7.6
severity = "HIGH"
sources = ["cve"]
title = "SGI IRIX System Manager sysmgr 远程命令执行漏洞"
updated = "2024-11-20"

