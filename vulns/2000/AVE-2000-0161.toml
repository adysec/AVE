[basic]
description = "ircII 4.4 版本 IRC 客户端存在远程缓冲区溢出漏洞，攻击者可通过向目标用户发送恶意的 DCC 聊天请求触发该漏洞，导致在客户端系统上执行任意命令。该漏洞影响 ircII 4.4 及更早版本，攻击者只需诱使用户接受 DCC 聊天连接即可完成利用，无需额外认证。CVSS 评分 5.1，危害等级中危。"
published = "2000-03-10T05:00:00.000"
remediation = "升级 ircII 至 4.4.8 或更高版本（Red Hat 已通过 RHSA-2000-008 安全公告发布修补包）。如无法立即升级，可在 IRC 客户端配置中禁用 DCC 自动接收功能，避免接受来自不可信来源的 DCC 聊天请求，并在防火墙层面限制 IRC 端口（6660-6669）的出站连接作为临时缓解措施。"
score = 5.1
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Michael Sandrof IrcII 4.4 远程缓冲区溢出漏洞"
updated = "2026-06-16T21:51:10.400"

