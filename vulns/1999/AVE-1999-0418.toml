[basic]
description = "Microsoft IIS 1.0、Netscape Enterprise Server 1.0/1.12 及 O'Reilly WebSite Professional 1.1b 等早期 Web 服务器存在 .cmd/.bat 文件远程命令执行漏洞。攻击者可通过 HTTP 请求直接调用服务器上的 .cmd 或 .bat 脚本文件，导致任意系统命令以 Web 服务器进程权限远程执行。该漏洞影响范围广泛，无需任何身份认证即可触发，CVSS 评分 10.0，危害等级严重。相关厂商已发布安全更新修复此问题。"
published = "1996-02-25T05:00:00.000"
remediation = "立即升级至 IIS 2.0 及以上版本（IIS 1.0 已停止支持且存在严重安全缺陷），Netscape 用户升级至 Enterprise Server 3.5+，WebSite Professional 用户在服务器配置中移除 .bat/.cmd 扩展名与 CGI 执行程序的关联映射。临时缓解措施：在 IIS 管理器中删除 .bat/.cmd 的应用程序映射，阻止其作为 CGI 执行。"
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "Microsoft IIS .bat/.cmd 文件远程命令执行漏洞"
updated = "2026-06-16T21:47:58.010"

