[basic]
description = "GNU userv 1.0.0 及更早版本存在文件描述符交换处理不当的安全漏洞，导致 USERV_GROUPS 和 USERV_GIDS 环境变量被错误篡改。本地攻击者可通过精心构造的调用序列触发该缺陷，绕过系统预设的访问限制，实现非授权文件读取、修改或执行操作。攻击需具备本地账户权限，无需用户交互，CVSS 评分 4.6，危害等级中危。"
published = "2000-10-20T04:00:00.000"
remediation = "立即升级 GNU userv 至 1.0.1 或更高版本，该版本已修复文件描述符交换处理不当导致的环境变量污染问题。Debian 系统用户应安装 2000-07-27 发布的对应安全更新。如无法升级，可通过限制 userv 可执行文件的 SUID 权限和仅允许可信用户调用 userv 服务来降低风险。"
score = 4.6
severity = "MEDIUM"
sources = ["cve"]
title = "GNU userv 安全绕过漏洞"
updated = "2026-06-16T21:52:28.680"

