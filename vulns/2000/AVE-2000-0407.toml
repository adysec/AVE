[basic]
description = "FreeBSD Ports Collection 中的 golddig 游戏所包含的 makelev 程序存在任意文件写入漏洞。本地攻击者可通过符号链接攻击等方式，利用该程序在处理文件时未充分验证路径的缺陷，以游戏运行权限覆盖系统任意文件，导致本地数据完整性受损。该漏洞攻击复杂度低，无需认证即可利用，但需要本地用户权限。受影响系统为运行 golddig 游戏的 FreeBSD 系统。"
published = "2000-05-09T04:00:00.000"
remediation = "删除 golddig 游戏包中 makelev 程序的 setuid 位：`chmod u-s /usr/local/bin/makelev`；如非必要，直接卸载 golddig 包：`pkg_delete golddig` 或 `pkg remove golddig`。升级 FreeBSD ports 至包含修复的版本，或从 ports 中移除 golddig 游戏。限制本地非授权用户对 makelev 的执行权限。"
score = 2.1
severity = "LOW"
sources = ["avd"]
title = "FreeBSD golddig 任意文件写入漏洞"
updated = "2026-06-16T21:51:36.613"

