[basic]
description = "Internet Explorer 4.x 和 5.x 内置的 Microsoft Java 虚拟机（VM）存在沙箱逃逸漏洞。远程攻击者可通过构造恶意的 Java Applet 程序，使其绕过 Java 安全沙箱的限制，从而在当前用户权限下读取目标系统上的任意本地文件。该漏洞影响使用 IE 4.x/5.x 且启用 Java 虚拟机的 Windows 系统，攻击条件为诱导受害者访问攻击者控制的网页并加载恶意 Applet，无需身份认证即可在客户端触发，可能导致敏感信息泄露。"
published = "2000-02-18T05:00:00.000"
remediation = "建议立即通过 Windows Update 安装微软 2000 年 4 月发布的安全更新（MS00-024，对应 VM 版本 5.0.0.3805 及以上），升级 Internet Explorer 内置的 Microsoft VM 以修补沙箱逃逸缺陷。若暂无法打补丁，应在 IE 中禁用 Java（工具→Internet 选项→安全→自定义级别→禁用 Java 小程序）或暂时禁用 Java 以阻断恶意 applet 读取本地文件。"
score = 5.1
severity = "MEDIUM"
sources = ["cve"]
title = "Microsoft Internet Explorer Virtual Machine 远程任意文件读取漏洞"
updated = "2026-06-16T21:51:07.757"

