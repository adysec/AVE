[basic]
description = "ISC BIND 8.2 及 8.2.1 版本在处理 TCP 会话时存在缺陷，当启用 so_linger 选项时，系统未能正确关闭 TCP 连接，导致大量半开连接耗尽服务器资源。远程攻击者无需认证即可通过发送特制的 TCP 请求触发此漏洞，造成 BIND 服务拒绝服务，影响 DNS 解析服务的正常运行。该漏洞 CVSS 评分 10.0，危害等级严重。"
published = "1999-11-10T05:00:00.000"
remediation = "升级 ISC BIND 到 8.2.2 或更高版本，其中修复了 so_linger 处理不当的问题。修改 /etc/bind/options 文件，添加 `options { listen-on port 53; };` 并重启服务。如无法立即升级，可通过 iptables 丢弃异常 TCP 连接作为临时缓解措施。"
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "ISC BIND 8.2/8.2.1 TCP会话拒绝服务漏洞"
updated = "2026-06-16T21:49:09.680"

