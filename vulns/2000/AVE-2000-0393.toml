[basic]
description = "Allegro RomPager 2.10 HTTP 服务器存在拒绝服务漏洞，远程攻击者可通过向目标设备发送特制的畸形认证请求（malformed authentication request），导致服务器进程崩溃或资源耗尽，从而无法正常响应合法用户请求。该漏洞影响运行 Allegro RomPager 2.10 版本的嵌入式设备（如路由器、调制解调器等），攻击无需身份认证，仅需网络可达即可触发，危害等级高危。"
published = "2000-06-01T04:00:00.000"
remediation = "该漏洞影响 Allegro RomPager 2.10 及更早版本，厂商已停止支持该版本。建议升级到 Allegro RomPager 3.0 及以上版本以修复此问题。如无法升级，可在网络边界防火墙或 ACL 中限制对设备 Web 管理端口（TCP 80/443）的访问来源，仅允许受信任管理 IP 段访问，或在内网环境中禁用设备的 HTTP 管理接口以降低攻击面。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "Allegro RomPager 2.10 HTTP服务器拒绝服务漏洞"
updated = "2026-06-16T21:51:48.193"

