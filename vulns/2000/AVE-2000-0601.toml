[basic]
description = "SGI IRIX 5.3 至 6.5.10 版本中的 InPerson 组件所包含的 inpview 工具存在条件竞争漏洞。该程序以不安全的方式创建临时文件 .ilmpAAA，本地攻击者可通过符号链接攻击（symlink attack）在文件创建与写入的时间窗口内劫持临时文件，从而实现权限提升，获得更高系统权限。该漏洞影响多个 IRIX 版本，需本地访问权限方可利用。"
published = "2000-10-20T04:00:00.000"
remediation = "建议升级到 IRIX 6.5.11 或更高版本以修复此竞态条件漏洞。若无法升级，可移除 inpview 的 setuid 权限位（chmod u-s /usr/lib/InPerson/inpview），仅允许受信用户执行，并避免在多用户共享环境中使用临时文件 .ilmpAAA 所在目录写入权限开放。"
score = 3.7
severity = "LOW"
sources = ["exploitdb"]
title = "SGI IRIX inpview 本地竞争条件漏洞"
updated = "2026-06-16T21:52:30.323"

