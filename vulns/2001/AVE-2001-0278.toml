[basic]
description = "Apple Personal Web Sharing 1.1/1.5/1.5.5 版本存在远程拒绝服务漏洞，攻击者可通过发送超长的 HTTP 请求导致服务拒绝。该漏洞源于 Web 共享服务对超长 HTTP 请求处理不当，未经身份认证的远程攻击者可发送特制的超长 HTTP 请求触发漏洞，导致服务崩溃或无响应，造成拒绝服务。影响 Apple Personal Web Sharing 1.1、1.5 及 1.5.5 版本，CVSS 评分 5.0（中等），攻击向量为网络、攻击复杂度低、无需认证、仅影响可用性。攻击者只需向目标服务发送精心构造的超长 HTTP 请求即可触发拒绝服务，无需身份验证。Apple 已在后续版本中修复此漏洞，建议用户升级至修复版本。ExploitDB 已公开 PoC（EDB-ID: 20844），攻击者可直接利用该 PoC 进行攻击验证。"
published = "2001-09-20T04:00:00.000"
remediation = "立即升级 Apple Personal Web Sharing 到最新支持的版本（如 2.0 或更高），并停用此服务如果不再需要。如果无法立即升级，可通过修改 httpd.conf 配置文件将 KeepAliveOff 设为 on，并限制 MaxRequestSize 设置为 8192 或更小，以限制 HTTP 请求长度，防止长请求导致服务崩溃。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Apple Personal Web Sharing 远程拒绝服务漏洞"
updated = "2026-06-16T21:54:41.640"

