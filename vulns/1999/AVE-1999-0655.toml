[basic]
description = "Slackware 7.0 的 login 程序存在用户枚举漏洞，当尝试登录不存在或被锁定的账户时会返回不同的加密错误提示，远程攻击者可通过观察错误消息差异枚举系统中存在的有效用户账户。该漏洞影响 Slackware 7.0 系统，CVSS 评分 5.0，属中危信息泄露漏洞。攻击者只需远程访问 login 服务即可尝试枚举用户，无需认证即可获取有效用户列表，为后续暴力破解或社会工程学攻击提供便利。"
published = "1999-12-01T05:00:00.000"
remediation = "建议将 Slackware Linux 升级至 7.1 或更高版本，并更新 login/util-linux 组件以修复该用户枚举缺陷。若无法升级，应修改 login 程序配置，使账户锁定、不存在及密码错误时返回统一的认证失败提示，避免因加密错误信息差异泄露有效用户名；同时结合防火墙限制远程登录来源、启用失败登录次数限制作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
