[basic]
description = "BSD 衍生系统（如 FreeBSD、OpenBSD）的 TCP/IP 协议栈实现中，ip_input.c 函数存在输入验证不足漏洞（CWE-20）。远程攻击者可通过向目标系统发送特制的畸形 IP 数据包，触发协议栈在解析处理时的异常状态，导致目标系统内核崩溃或服务挂起，造成拒绝服务。该漏洞影响多个 BSD 变种系统，攻击无需身份认证，危害等级中危。"
published = "1999-12-30T05:00:00.000"
remediation = "建议升级 FreeBSD 至 2.2.8 及以上版本，或升级 OpenBSD 至 2.4 及以上版本以应用内核补丁。临时缓解措施可在边界防火墙上配置规则过滤异常 IP 分片包，或禁用不必要的 RAW IP 套接字处理功能。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "FreeBSD/OpenBSD TCP/IP 实现 ip_input.c 拒绝服务漏洞"
updated = "2026-06-16T21:47:13.977"

