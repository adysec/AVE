[basic]
description = "sshd 1.2.17 认证代理机制存在竞态条件漏洞，本地攻击者可利用该漏洞在认证过程中窃取其他用户的凭据信息。由于认证代理在进行身份验证时存在时间窗口竞争问题，攻击者可通过精心构造的时序攻击获取目标用户的 SSH 认证凭据，进而实现未授权访问。该漏洞影响 sshd 1.2.17 及可能存在类似问题的版本，CVSS 评分 10.0，危害等级严重。"
published = "1999-01-01"
remediation = "升级 SSH 软件包至修复此竞态条件的后续版本。建议迁移至 OpenSSH，其认证代理实现不兼容此漏洞机制。临时缓解措施可限制 sshd 的 AgentForwarding 功能或仅在可信网络内启用 SSH 服务。"
score = 10.0
severity = "CRITICAL"
sources = ["avd"]
title = "SSH sshd 认证代理竞态条件漏洞"
updated = "2026-06-16"

