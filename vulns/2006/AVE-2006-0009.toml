[basic]
description = "Microsoft Word 在处理畸形对象指针时存在缓冲区溢出漏洞（CWE-120），攻击者可构造特制的 Word 文档并诱导用户打开，触发缓冲区溢出，进而实现远程代码执行，完全控制受影响的系统。该漏洞影响 Office 2000 SP3、Office XP SP3、Office 2003 SP1/SP2 及 Microsoft Works Suites 等版本，CVSS 评分 8.8，危害等级高危。该漏洞曾被发现在野利用作为零日攻击（2006 年 5 月），Microsoft 已在安全公告 MS06-027 中修复。"
published = "2006-05-20T00:02:00.000"
remediation = "安装 Microsoft 2006 年 6 月安全更新 MS06-027，将 Office 升级至含补丁的最新版本。如无法立即更新，建议不要打开来源不明的 Word 文档，并在邮件网关层面拦截可疑 .doc 附件作为临时缓解措施。"
score = 8.8
severity = "HIGH"
sources = ["kev"]
title = "Microsoft Word 缓冲区溢出远程代码执行漏洞"
updated = "2026-06-16T22:25:09.880"

