[basic]
description = "Linux 内核 drm/i915 显卡驱动在错误捕获（error capture）和 debugfs 调试文件系统转储功能中存在引用计数缺陷。当 GuC 提交（submission）支持被加入错误捕获后，请求对象（request object）的引用计数机制被破坏：基于上下文的搜索与基于 execlist 的请求搜索使用了不同的锁机制和引用计数需求，未能正确处理。本地攻击者可通过触发 GPU 错误捕获或读取 debugfs 调试转储来利用此漏洞，可能导致释放后使用（Use-After-Free）或空指针解引用等内存安全问题。"
published = "2025-03-27T17:15:45.313"
remediation = "升级 Linux 内核至 6.1.12+ 或 6.2+ 版本，该修复已合入主线 commit 3700e353781e。如无法升级内核，可临时禁用 GuC submission（模块参数 i915.enable_guc=0）作为缓解措施，但建议尽快完成内核更新以彻底修复引用计数缺陷。"
score = 5.5
severity = "MEDIUM"
sources = ["cve"]
title = "Linux drm/i915 错误捕获与调试文件系统转储引用计数漏洞"
updated = "2026-06-17T06:44:02.950"

