[basic]
description = "RobinHood 1.1 Web 服务器在处理超长 HTTP 请求时，其 RHConsole 组件存在缓冲区溢出漏洞。远程未经身份认证的攻击者可向目标服务器发送特制的超长 HTTP 请求，触发缓冲区溢出，导致服务进程崩溃引发拒绝服务。该漏洞影响 BeOS R5 Pro 及更早版本上运行的 RobinHood 1.1 Web 服务器。攻击者无需认证即可远程利用，危害等级中等。"
published = "2001-01-09T05:00:00.000"
remediation = "BeOS 已停止维护，RobinHood 1.1 不再有官方补丁。建议立即停用该 Web 服务器，迁移至支持的操作系统与 Web 服务器（如 Apache/Nginx）。如无法立即替换，可在防火墙层面限制对 TCP 80 端口的访问，仅允许可信来源连接。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Joe Kloss RobinHood 1.1 RHConsole 远程缓冲区溢出漏洞"
updated = "2026-06-16T21:53:16.393"

