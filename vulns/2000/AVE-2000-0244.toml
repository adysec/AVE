[basic]
description = "CRYPTOCard CryptoAdmin for PalmOS（4.1 版本）在存储用户 PIN 码时使用了弱加密算法，导致 PIN 以不安全的形式保存在设备本地数据库中。攻击者在物理接触设备或能够获取该应用生成的 .PDB 数据库文件的前提下，可对其中的加密数据进行离线破解，还原出用户 PIN 码，进而利用该 PIN 生成合法的 PT-1 一次性口令令牌，冒充合法用户进行认证。该漏洞影响使用 CRYPTOAdmin 4.1 的 PalmOS 设备用户，攻击无需远程网络访问，仅需本地文件获取权限即可完成利用，危害主要体现在凭据泄露与身份伪造风险。"
published = "2000-04-10T04:00:00.000"
remediation = "建议升级至 CRYPTOCard 官方发布修复了弱加密问题的 CRYPTOAdmin 新版本（确认移除以明文或弱算法存储 PIN 的 .PDB 文件机制）。在无法立即升级前，应避免将保存 PIN 的 .PDB 文件存放于不受信任的 PalmOS 设备或公开备份中，并对设备存储启用访问控制与加密，限制物理接触与文件导出权限以降低 PIN 被破解生成有效令牌的风险。"
score = 2.1
severity = "LOW"
sources = ["exploitdb"]
