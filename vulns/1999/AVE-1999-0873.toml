[basic]
description = "Cabletron Spectrum Enterprise Manager 5.0 的 SpectroSERVER 组件在安装目录树时设置了不安全的文件权限，允许本地用户将特权可执行文件 processd 替换为木马程序。一旦成功替换，攻击者可利用该程序以 root 或 Administrator 权限执行任意代码，从而完全控制目标系统。该漏洞影响运行 Cabletron Spectrum Enterprise Manager 5.0 的服务器，攻击者需具备本地访问权限才能利用此漏洞。建议管理员立即检查并修正目录权限设置，防止未授权文件替换。"
published = "1999-06-23T04:00:00.000"
remediation = "升级到 Cabletron Spectrum Enterprise Manager 已修复该问题的后续版本（5.0 补丁集或更高），并使用 chmod/chown 将 SpectroSERVER 安装目录及 processd 可执行文件权限收紧为仅 root/Administrator 可写（如 755 且属主为特权账户），移除其他用户的写权限；在无法立即升级时，通过文件系统 ACL 限制目录写入并定期校验 processd 完整性哈希作为临时缓解。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "Cabletron Spectrum Enterprise Manager 本地权限提升漏洞"
updated = "2026-06-16T21:49:32.087"

