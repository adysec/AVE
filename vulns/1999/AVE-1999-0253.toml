[basic]
description = "AIX 4.2 系统中的 CDE 桌面环境 dtterm 程序存在本地缓冲区溢出漏洞。未授权本地攻击者可通过向 dtterm 程序传递特制的超长参数触发缓冲区溢出，覆盖函数返回地址，从而以 root 权限执行任意代码。该漏洞要求攻击者拥有系统本地账号，影响 AIX 4.2 版本及可能更早版本，CVSS 评分 7.2，危害等级高。"
published = "1997-05-01T04:00:00.000"
remediation = "建议升级至 AIX 4.3 及以上版本，或安装 IBM 提供的相应 APAR 补丁。临时缓解措施可移除 /usr/dt/bin/dtterm 的 setuid 权限（chmod u-s /usr/dt/bin/dtterm），并限制可执行该程序的用户组，仅授权可信用户访问 CDE 环境。"
score = 7.2
severity = "HIGH"
sources = ["exploitdb"]
title = "IBM AIX CDE dtterm 本地缓冲区溢出漏洞"
updated = "2026-06-16T21:47:36.680"

