[basic]
description = "Windows NT 4.0 操作系统在生成 TCP 初始序列号（ISN）时存在可预测性漏洞，其随机数生成算法存在缺陷，导致远程攻击者可通过分析多次连接响应中的 ISN 样本，预测后续连接的序列号值。攻击者利用此预测能力，无需中间人即可实施 TCP 会话劫持和 IP 欺骗攻击，能够伪装成可信主机与目标建立虚假连接或劫持已有 TCP 会话，从而窃取或篡改传输中的数据。该漏洞影响所有 Windows NT 4.0 版本，攻击者只需具备基本的网络访问能力即可利用，无需认证，危害较大。"
published = "1999-08-24T04:00:00.000"
remediation = "立即安装 Microsoft 安全公告 MS99-046 提供的补丁，升级至 Windows NT 4.0 Service Pack 6 及以上版本以增强 TCP 初始序列号随机性至 15 位熵；若无法升级，则为 SP4/SP5 系统单独下载安装对应热修复补丁；临时缓解措施可在边界防火墙限制不受信任来源的 TCP 连接，降低会话劫持风险。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Microsoft Windows NT TCP 可预测序列号漏洞"
updated = "2026-06-16T21:51:29.250"

