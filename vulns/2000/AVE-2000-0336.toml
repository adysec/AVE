[basic]
description = "Allaire Spectra 容器编辑器预览工具存在对象安全机制不严漏洞，远程攻击者可通过向容器对象中添加带有发布规则的对象方法来绕过权限限制，执行未授权的操作。该漏洞影响 Allaire Spectra 系列产品，CVSS 评分 2.1，危害等级低。攻击者利用此漏洞可进行非预期的内容操作，但攻击条件较为受限，需要目标系统启用容器编辑器预览功能。"
published = "2000-04-24T04:00:00.000"
remediation = "建议升级至 Allaire Spectra 最新版本，并在容器编辑器中禁用预览工具（Preview Tool）的匿名访问权限，仅授予可信用户操作对象方法的权限。由于 Allaire 产品线已被 Adobe 收购并终止支持，建议迁移至 Adobe 或第三方受支持的替代内容管理系统，同时通过 Web 服务器访问控制列表限制对容器编辑器预览路径的访问。"
score = 2.1
severity = "LOW"
sources = ["cve"]
title = "Allaire Spectra Container Editor 安全限制绕过漏洞"
updated = "2026-06-16T21:51:30.020"

