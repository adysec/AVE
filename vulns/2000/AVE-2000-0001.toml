[basic]
description = "Microsoft FrontPage Server Extensions 存在信息泄露漏洞。远程攻击者可通过向 /_vti_bin/ 虚拟目录下的 shtml.dll 发送特制的 RPC POST 请求，利用该漏洞获取服务器匿名账户的名称信息。攻击无需身份认证，可为进一步的暴力破解或社会工程学攻击提供目标信息。该漏洞影响安装了 FrontPage Server Extensions 的 Windows 服务器及 IIS Web 服务器。CVSS 评分 5.0，危害等级中等。"
published = "2000-02-02T05:00:00.000"
remediation = "安装 Microsoft 为 FrontPage Server Extensions 发布的安全更新，升级至 FrontPage 2000 Server Extensions 或更高版本。如无法升级，在 IIS 管理器中限制对 /_vti_bin/ 虚拟目录的匿名访问，移除 shtml.dll 的匿名用户执行权限，并使用 URLScan 工具阻止对该文件的 RPC POST 请求。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Microsoft FrontPage 服务器扩展信息泄露漏洞"
updated = "2026-06-16T21:51:01.787"

