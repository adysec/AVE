[basic]
description = "Allaire JRun 2.3.x 的 JSP 示例文件存在访问控制缺陷，远程攻击者无需认证即可通过访问 viewsource.jsp 等示例页面读取服务器上的任意文件或获取敏感配置信息。该漏洞源于默认安装中未对示例文件设置适当权限，攻击难度较低，可导致敏感数据泄露。"
published = "2000-06-22T04:00:00.000"
remediation = "删除 JRun 安装目录下的 `/jrun/samples/` 目录及其所有文件，或升级到 Allaire JRun 3.0 及以上版本。如无法升级，在 Web 服务器层（如 IIS/Apache）配置访问控制规则，禁止外部访问 `/servlet/`、`/jsp/` 等示例路径。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Allaire JRun 2.3.x JSP文件访问控制漏洞"
updated = "2026-06-16T21:51:57.397"

