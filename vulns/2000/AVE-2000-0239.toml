[basic]
description = "Internet Explorer 5.01 存在跨框架安全策略绕过漏洞。远程攻击者可通过构造恶意 Java 小程序，利用 JSObject 接口修改 DOM 属性，将 IFRAME 元素的 src 属性设置为任意 JavaScript URL，从而绕过浏览器的跨框架安全限制，可能导致受影响用户浏览器中的敏感信息泄露。攻击者需诱使用户访问包含恶意小程序的网页。"
published = "2000-04-18"
remediation = "升级 Internet Explorer 至 5.5 或更高版本，或在浏览器安全设置中禁用 Java 小程序支持（工具 → Internet 选项 → 安全 → 自定义级别 → 禁用 Java 小程序脚本），以阻止恶意 applet 利用 JSObject 绕过跨域安全策略。"
score = 2.6
severity = "LOW"
sources = ["cve"]
title = "Microsoft Internet Explorer 跨框架安全策略绕过漏洞"
updated = "2026-06-16"

