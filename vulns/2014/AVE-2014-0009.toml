[basic]
description = "Lighttpd 的 mod_mysql_vhost 模块存在 SQL 注入漏洞（CVE-2014-2323），该模块在处理 HTTP 请求中的主机名（Host 头）时，未对用户输入进行充分过滤和转义便直接拼接至 SQL 查询语句中。远程攻击者无需身份认证，仅需向运行 lighttpd（版本低于 1.4.35）的服务器发送特制请求，即可在目标系统上执行任意 SQL 命令，可能导致数据库信息泄露、数据篡改甚至远程代码执行。CVSS 评分 9.8，危害等级严重。"
published = "2014-03-14T15:55:05.743"
remediation = "升级 lighttpd 至 1.4.35 或更高版本，该版本已修复 mod_mysql_vhost 模块中 hostname 参数导致的 SQL 注入漏洞。如无法升级，可在配置中禁用 mod_mysql_vhost 模块，或使用 WAF 规则过滤恶意 Host 请求头作为临时缓解。"
score = 9.8
severity = "CRITICAL"
sources = ["nuclei"]
title = "Lighttpd mod_mysql_vhost SQL注入漏洞"
updated = "2026-06-17T00:06:24.573"

