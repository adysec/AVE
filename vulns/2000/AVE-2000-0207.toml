[basic]
description = "imwheel 是 Linux 系统上用于鼠标滚轮支持的 X11 实用程序。该漏洞存在于 imwheel-solo 脚本中，由于对 HOME 环境变量的长度缺乏有效校验，导致本地攻击者可通过构造超长的 HOME 环境变量触发缓存区溢出。imwheel-solo 以 setuid root 权限运行，成功利用该漏洞可导致本地用户直接获取 root 权限，进而完全控制系统。该漏洞影响 Halloween Linux 4.0 以及 Red Hat Linux 6.1/6.2 等发行版。"
published = "2000-03-13"
remediation = "升级 imwheel 软件包至已修复该漏洞的版本，确保 HOME 环境变量输入得到正确边界校验。对于仍在使用受影响发行版的系统，建议尽快升级至受支持的现代 Linux 发行版。同时，如非必要，可暂时移除 imwheel-solo 的 setuid 权限设置以降低攻击面。"
score = 7.2
severity = "HIGH"
sources = [
    "exploitdb",
    "cve",
]
title = "imwheel 缓存区溢出本地提权漏洞"
updated = "2000-03-13"

