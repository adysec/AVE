[basic]
description = "用友畅捷通-TPlus 存在 SQL 注入漏洞，攻击者可在未授权情况下通过 POST 请求向 `/tplus/ajaxpro/Ufida.T.SM.UIP.MultiCompanyController,Ufida.T.SM.UIP.ashx?method=CheckMutex` 接口的 `accNum` 参数注入恶意 SQL 语句，导致数据库敏感信息泄露或服务器被控制。该漏洞危害严重，利用方式简单，无需认证即可远程利用，影响畅捷通-TPlus 全版本，建议用户尽快升级修复。"
published = "0703"
remediation = "立即升级至畅捷通 T+Cloud/T+专属云 19.0 及以上版本（2023年12月后发布），或 T+Online 19.0 及以上版本。临时缓解措施可在 WAF/IPS 中封禁对 `/tplus/ajaxpro/Ufida.T.SM.UIP.MultiCompanyController,Ufida.T.SM.UIP.ashx` 路径的 POST 请求，或对 `accNum` 参数实施严格输入过滤，限制特殊字符如单引号、SQL 关键字。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "用友 畅捷通-TPlus SQL注入漏洞"
updated = "0703"

