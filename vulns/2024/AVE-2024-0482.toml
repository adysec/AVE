[basic]
description = "Rsync 在处理符号链接时存在条件竞争漏洞（CWE-362）。攻击者可利用 rsync 默认跳过符号链接的行为，在文件被访问前将普通文件替换为符号链接，从而绕过默认限制遍历目标符号链接。根据 rsync 进程权限，攻击者可泄露敏感信息，进而可能导致权限提升。该漏洞 CVSS 评分 5.6，危害等级中危。"
published = "2025-01-14T18:15:25.830"
remediation = "将 rsync 升级至 3.4.1 或更高版本。RHEL 8 用户安装 rsync-3.1.3-21.el8_10，RHEL 9 用户安装 rsync-3.2.5-3.el9，均通过 RHSA-2025:2600 和 RHSA-2025:7050 更新。Debian 用户参照 DLA-2025-01-08 更新。临时缓解措施：避免以 root 权限在不可信目录上运行 rsync，或使用 --no-implied-dirs 参数限制符号链接遍历。"
score = 5.6
severity = "MEDIUM"
sources = ["msrc"]
title = "Rsync 符号链接处理条件竞争漏洞"
updated = "2026-06-30T00:16:48.987"

