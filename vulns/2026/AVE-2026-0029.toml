[basic]
description = "泛微 E-Office V9 的 init.php 页面存在任意文件上传漏洞，未授权攻击者可通过构造特制 HTTP 请求绕过上传限制，将恶意文件（如 WebShell）上传至服务器任意目录，从而获取服务器控制权。该漏洞影响泛微 E-Office V9 版本，CVSS 评分 9.8，危害严重。建议升级至官方最新版本或部署 WAF 规则进行防护。"
published = "08.08"
remediation = "立即升级至泛微 E-Office V10 及以上版本，该版本已对文件上传功能增加类型白名单校验。如无法升级，可采取临时缓解措施：在 Web 服务器（如 Nginx/Apache）配置规则，禁止对 `/E-Office/init.php` 路径的 POST 请求，或通过 WAF 拦截上传非图片/文档类型的文件（如 `.jsp/.php/.asp/.aspx` 脚本文件）。同时建议限制 `init.php` 的访问来源 IP，仅允许内网或可信网段访问。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "泛微 E-Office V9 任意文件上传漏洞"
updated = "08.08"

