[basic]
description = "PHP 3.0.13 版本中 safe_mode 安全模式存在过滤缺陷，程序未能正确过滤通过 popen 函数执行的命令中的 shell 元字符（如管道符 |、分号 ; 等），远程攻击者可通过向目标服务器发送精心构造的 HTTP 请求，在目标系统上以 Web 服务器权限执行任意系统命令。该漏洞影响 PHP 3.0.13 及之前版本，CVSS v2 评分 10.0，危害等级严重。"
published = "2000-01-04"
remediation = "建议立即升级至 PHP 4.0.0 或更高版本（PHP 3.x 已停止维护），该漏洞在后续版本中已修复 safe_mode 的 shell 元字符过滤缺陷。如无法升级，可在 php.ini 中禁用 popen 函数（disable_functions = popen），并开启 open_basedir 限制脚本访问路径作为临时缓解措施。"
score = 10.0
severity = "CRITICAL"
sources = ["cve"]
title = "PHP 3.0.13 Safe Mode 命令执行漏洞"
updated = "2026-06-16"

