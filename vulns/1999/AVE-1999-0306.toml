[basic]
description = "Cray UNICOS 操作系统中的 Array Services 守护进程（arrayd）存在默认配置不当漏洞。该服务在默认安装情况下关闭了身份认证机制，导致远程攻击者无需任何凭证即可直接连接 arrayd 端口，并以 root 权限在目标系统上执行任意命令。攻击条件极低——只需目标开放 arrayd 服务且使用默认配置即可完成利用。该漏洞 CVSS 评分 10.0，危害等级严重，影响 Cray UNICOS 系列操作系统。"
published = "1999-07-19T04:00:00.000"
remediation = "升级 Cray Unicos 至厂商修复版本（如 8.0 及以上补丁级别），或修改 arrayd 配置文件启用认证（设置 require_authentication=yes）。如无法升级，使用 iptables 限制仅有信任管理节点可访问 arrayd 端口（默认 TCP/1050）。"
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "Cray Unicos Array Services 守护进程默认认证绕过漏洞"
updated = "2026-06-16T21:48:51.550"

