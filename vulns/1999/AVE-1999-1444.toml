[basic]
description = "Lotus cc:Mail 8 版本存在密码明文存储漏洞，系统将邮箱服务器密码以明文形式存储于隐藏文件中，且该文件权限配置不当，本地普通用户可读取该文件获取管理员密码，进而实现权限提升。攻击者需拥有本地系统访问权限即可利用该漏洞，影响范围限于 Lotus cc:Mail 8 版本，CVSS 评分 4.6，属于中危漏洞。"
published = "1997-09-08T04:00:00.000"
remediation = "Lotus cc:Mail 8 已停止维护，无官方补丁，建议迁移至 IBM Domino 或受支持的邮件系统；暂无法迁移时，收紧 cc:Mail 隐藏口令文件（如 .cclm）权限为 600（仅属主读写），并通过系统 ACL 禁止非管理员用户读取该文件，同时使用主机防火墙限制本地非授权进程的网络访问。"
score = 4.6
severity = "MEDIUM"
sources = ["avd"]
title = "Lotus cc:Mail 明文密码存储权限提升漏洞"
updated = "2026-06-16T21:50:05.443"

