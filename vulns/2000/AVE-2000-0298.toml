[basic]
description = "OpenBSD 2.4 系统的 i386 架构跟踪陷阱处理函数中存在拒绝服务漏洞。当内核调试器（DDB）功能启用时，本地攻击者可通过触发特制的跟踪陷阱条件导致内核异常，进而造成系统崩溃或拒绝服务。该漏洞需要攻击者拥有本地用户权限且目标系统启用了 DDB 内核调试功能，攻击门槛较高，但成功利用后将严重影响系统可用性。"
published = "2001-03-12T05:00:00.000"
remediation = "升级至 OpenBSD 2.5 或更高版本。若无法升级，从 OpenBSD 官方 errata 页面获取 patch 021 并应用到内核源码树后重新编译内核：`patch -p0 < 021_trctrap.patch`，然后 `cd /usr/src/sys/arch/i386/conf && config GENERIC && cd ../compile/GENERIC && make && make install` 并重启。如 DDB 非必需，临时缓解措施可在内核配置文件中移除 `options DDB` 后重新编译内核。"
score = 2.1
severity = "LOW"
sources = ["cve"]
title = "OpenBSD DDB i386 trace-trap 处理本地拒绝服务漏洞"
updated = "2026-06-16T21:51:26.870"

