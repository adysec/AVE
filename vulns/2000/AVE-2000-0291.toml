[basic]
description = "Atrium Software Cassandra NNTP Server 1.10 存在缓冲区溢出漏洞，远程攻击者可通过向登录认证接口提交超长用户名，触发服务端缓冲区溢出，导致 NNTP 服务进程崩溃，造成拒绝服务。该漏洞无需身份认证即可远程利用，攻击条件简单，仅需发送特制超长字符串即可触发。公开的 ExploitDB 编号 19884 提供了完整的利用代码。"
published = "2000-05-01T04:00:00.000"
remediation = "该漏洞存在于 Atrium Software Cassandra NNTP Server 1.10 中，该产品已停止维护且厂商不再提供补丁。建议立即迁移至其他受支持的 NNTP 服务器软件（如 INN、Leafnode 等）。在完成迁移前，可在防火墙层面限制对 TCP 119 端口的访问，仅允许可信 IP 连接，以降低被远程利用的风险。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Atrium Software Cassandra NNTP Server 1.10 登录拒绝服务漏洞"
updated = "2026-06-16T21:51:30.910"

