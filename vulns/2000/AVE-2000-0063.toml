[basic]
description = "HP-UX 10.x及11.x系统中 aserver 程序存在路径注入漏洞（PATH Injection），由于 aserver 调用 ps 和 grep 命令时信任用户指定的 PATH 环境变量而非使用绝对路径，本地攻击者可通过在 PATH 中插入恶意路径（如包含特制恶意程序的目录）来劫持这些命令的执行，从而获取 root 权限。该漏洞影响 HP-UX 10.x/11.x 版本，CVSS 评分 7.2，危害等级高。漏洞利用无需身份认证以外的特殊条件，但需要本地访问权限。"
published = "2000-01-02T05:00:00.000"
remediation = "立即升级 HP-UX 系统至最新支持的版本（如 11i v3），并安装 HP 安全补丁 PHCO_19166 或后续累积补丁。如无法升级，可将 aserver 程序权限改为仅 root 可执行（chmod 700 /usr/sbin/aserver），并在 aserver 脚本中硬编码 PATH 为 /bin:/usr/bin 而非继承用户环境变量，防止 PATH 劫持提权。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "HP HP-UX aserver 本地权限提升漏洞"
updated = "2026-06-16T21:50:57.150"

