[basic]
description = "Windows NT 4.0 及 Windows 2000 系统的本地安全机构子系统（LSA）存在输入验证不当漏洞，远程攻击者可通过向目标系统发送特制的 LSA 请求报文，触发服务组件中的拒绝服务条件，导致 LSASS 进程崩溃、系统强制重启或域认证服务中断。该漏洞无需身份认证即可远程触发，影响 Windows NT 4.0 和 Windows 2000 全版本，CVSS 评分 7.8，危害等级高。Microsoft 已发布安全更新修复此漏洞。"
published = "1999-07-20T04:00:00.000"
remediation = "安装 Microsoft 于 1999 年发布的安全更新 KB242607（Windows NT 4.0）或升级至 Windows 2000 Service Pack 1 及以上版本。由于 Windows NT 4.0 和 Windows 2000 已停止支持，建议升级至受支持的 Windows Server 版本（如 Windows Server 2019/2022）。临时缓解措施可在防火墙层面限制对 LSA 端口的未授权访问。"
score = 7.8
severity = "HIGH"
sources = ["epss"]
title = "Microsoft Windows NT 4.0/2000 Local Security Authority Subsystem 拒绝服务漏洞"
updated = "2026-06-16T21:48:55.073"

