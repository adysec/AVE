[basic]
description = "Hybrid Networks 有线电视宽带接入系统（Cable Broadband Access System）的 HSMP 管理协议存在认证缺失缺陷，远程攻击者无需任何凭证即可通过网络访问设备的管理接口，发送特制的 HSMP 配置报文，从而读取或篡改系统配置、修改设备参数并控制宽带接入网关。攻击仅需目标设备暴露 HSMP 端口且可从网络可达即可发起，成功利用可导致大面积用户网络中断或被攻击者持久控制。"
published = "1999-10-06T04:00:00.000"
remediation = "升级到厂商发布的新版本固件以启用 HSMP 管理协议的身份认证机制；在边界防火墙限制仅允许受信任管理网段的 IP 访问 HSMP 服务端口（TCP/UDP 161/162），并将设备管理接口迁移至独立隔离的管理网络，禁止从公网直接访问设备配置服务。"
score = 10
severity = "CRITICAL"
sources = ["exploitdb"]
title = "Hybrid Networks Cable Broadband Access System 未授权远程配置漏洞"
updated = "2026-06-16T21:49:03.927"

