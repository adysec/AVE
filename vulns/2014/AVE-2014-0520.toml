[basic]
description = "tags.<value>Adobe Flash Player 存在栈溢出缓冲区漏洞。由于在处理特制数据时未对输入长度进行充分边界验证，攻击者可通过构造恶意 Flash 内容（如 SWF 文件或嵌入 Flash 的网页）触发栈溢出，进而在目标系统上执行任意代码。该漏洞影响 Windows 和 macOS 平台上的 Flash Player 13.0.0.259 之前版本、14.x 及 15.0.0.246 之前版本，以及 Linux 平台上的 11.2.202.425 之前版本。攻击者需要诱使用户使用受影响版本的 Flash Player 打开恶意网页或文件，利用过程无需身份认证。该漏洞已于 2014 年 12 月被发现在野利用，Adobe 随后发布安全更新修复此问题。"
published = "2014-12-10T21:59:35.163"
remediation = "立即升级 Adobe Flash Player 至修复版本：Windows 与 OS X 平台升级至 13.0.0.260 或 15.0.0.246 及以上版本，Linux 平台升级至 11.2.202.425。如暂时无法升级，应在所有浏览器中彻底禁用 Flash 插件，并清理浏览器缓存中的 Flash 内容；鉴于 Adobe Flash Player 已停止生命周期支持，建议寻求替代方案或直接卸载该产品。"
score = 7.8
severity = "HIGH"
sources = ["kev"]
title = "Adobe Flash Player 栈缓冲区溢出远程代码执行漏洞"
updated = "2026-06-17T00:17:51.397"

