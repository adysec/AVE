[basic]
description = "Microsoft Edge 内置的 Copilot Chat 存在 prompt 注入漏洞，源于对特殊输入元素过滤不严，未授权远程攻击者可通过构造特制提示词注入恶意指令，绕过安全限制，导致目标系统上的敏感信息被泄露。该漏洞影响 Microsoft Edge 中使用 Copilot Chat 的版本，CVSS 评分 6.5，危害等级中等。"
published = "2026-06-04T23:17:32.390"
remediation = "Microsoft 已在其云端服务端修复此 Prompt 注入漏洞，用户无需手动操作。建议确保 Microsoft Edge 更新至最新稳定版（通过 edge://settings/help 检查更新），避免在 Copilot Chat 中粘贴或输入包含敏感信息的未经验证的内容作为临时缓解措施。"
score = 6.5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "Microsoft Edge Copilot Chat 提示注入漏洞"
updated = "2026-06-17T10:54:35.937"

