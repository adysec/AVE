[basic]
description = "Sambar Server 4.2 Beta 7 在 CGI 目录下默认提供了 ECHO.BAT 和 HELLO.BAT 两个批处理文件，由于未对用户输入的参数进行有效过滤，远程攻击者可通过在 HTTP 请求中注入 shell 元字符（如管道符、重定向符等）来执行任意系统命令。该漏洞影响 Sambar Server 4.2 Beta 7 版本，CVSS 评分 5.0，危害等级中危，攻击复杂度较低且无需身份认证，但需要目标服务器开启 CGI 功能。"
published = "2000-02-23T05:00:00.000"
remediation = "删除 Sambar Server CGI 目录下的 ECHO.BAT 和 HELLO.BAT 批处理文件，或升级到已移除这些危险 CGI 脚本的 Sambar Server 更高版本，并在 Web 服务器配置中禁用批处理文件执行权限以防止 shell 元字符注入攻击。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Sambar Server 4.2 Beta 7 CGI命令执行漏洞"
updated = "2026-06-16T21:51:14.327"

