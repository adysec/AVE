[basic]
description = "Microsoft Outlook、Exchange 及 Windows Messaging 等电子邮件客户端存在自动响应邮件回执标签的设计缺陷，远程攻击者可通过伪造发往大型通讯组列表的阅读回执请求，触发大量自动应答邮件，导致目标邮件系统因响应洪泛而发生拒绝服务。该漏洞利用无需身份认证，攻击条件简单，影响范围广泛。"
published = "2000-02-29T05:00:00.000"
remediation = '建议安装 Microsoft 安全更新 MS00-009，升级 Outlook/Exchange 至已修复版本；或在客户端设置中禁用"自动发送阅读回执"选项，同时在 Exchange 服务器端限制回执请求重定向到通讯组列表，防止邮件泛洪攻击。'
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Microsoft Outlook/Exchange/Windows Messaging 邮件自动应答拒绝服务漏洞"
updated = "2026-06-16T21:51:14.723"

