[basic]
description = "Apache HTTP Server 1.2.5 及 1.3.x 早期版本在处理 HTTP 请求时未对 MIME 头部数量设置上限，仅限制单个头部大小为 8192 字节及读取超时为 300 秒。远程攻击者可通过发送大量约 8000 字节的 MIME 头部 flooding 目标服务器，导致 httpd 进程内存持续快速增长甚至耗尽，从而引发拒绝服务。攻击者只需具备向目标 Apache 服务器发送 crafted HTTP 请求的网络可达性即可实施攻击，成功后将导致服务器服务中断，需重启应用才能恢复正常功能。"
published = "1999-09-03T04:00:00.000"
remediation = "建议将 Apache HTTP Server 升级至 1.3.2 或更高版本（该版本修复了过量 MIME 头部处理缺陷）。若无法立即升级，可在配置中限制单请求头部数量，并通过前端代理或防火墙对单个连接可携带的头部条数进行上限限制，同时配置 mod_reqtimeout 缩短请求读取超时以缓解拒绝服务风险。"
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "Apache HTTP Server 1.2.5 MIME Header 拒绝服务漏洞"
updated = "2026-06-16T21:49:20.597"

