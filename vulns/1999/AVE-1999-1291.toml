[basic]
description = "Stalker Internet Mail Server 1.6 存在缓冲区溢出漏洞，远程攻击者可通过向 SMTP 服务发送超长 HELO 命令触发该漏洞，导致服务器崩溃并停止响应邮件服务。该漏洞利用方式简单，无需身份认证，攻击者构造特制的 SMTP 握手请求即可实施拒绝服务攻击，影响邮件系统的可用性。"
published = "1998-04-08T04:00:00.000"
remediation = "升级到 Stalker Internet Mail Server 1.6 以上版本，如已停止维护则建议迁移至 CommuniGate Pro 最新版本。在无法升级的情况下，可在防火墙或入侵检测系统中添加规则拦截过长的 HELO 命令（超过 512 字节），作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Stalker Internet Mail Server 1.6 远程缓冲区溢出漏洞"
updated = "2026-06-16T21:50:34.980"

