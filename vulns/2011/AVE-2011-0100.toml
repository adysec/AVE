[basic]
description = "Oracle Java SE 的 Java Runtime Environment 组件中的 Scripting 子组件存在未指定漏洞，远程攻击者可通过诱导用户访问恶意网页，触发 Java Web Start 应用程序或 Java Applet 调用 Rhino 脚本引擎，在未经沙箱授权的情况下执行任意代码，导致目标系统机密性、完整性和可用性完全丧失。该漏洞影响 Oracle Java SE JDK 和 JRE 7 及 6 Update 27 及更早版本，CVSS 评分 9.8，危害等级严重。Oracle 已在 2011 年 10 月关键补丁更新中修复此漏洞。"
published = "2011-10-19T21:55:01.097"
remediation = '立即升级 Java SE 至 JDK/JRE 6 Update 29 及以上版本，或 JDK/JRE 7 Update 1 及以上版本。从 Oracle Java Archive 下载对应平台的最新更新包进行安装。如无法立即升级，可在浏览器中禁用 Java Applet 支持（控制面板 → Java → 安全 → 取消勾选"启用 Java 内容"），并卸载不需要的 Java 运行时环境以减小攻击面。'
score = 9.8
severity = "CRITICAL"
sources = ["kev"]
title = "Oracle Java SE JDK及JRE Scripting组件远程代码执行漏洞"
updated = "2026-06-16T23:33:27.053"

