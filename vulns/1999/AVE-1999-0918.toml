[basic]
description = "CVE-1999-0625 描述的是主机上 rpc.rquotad 远程磁盘配额守护进程服务处于运行状态的安全配置问题。rpc.rquotad 是 Unix/Linux 系统上用于 NFS 网络文件系统远程磁盘配额管理的 RPC 服务，该协议设计年代较早，未对远程请求实施严格的身份认证与访问控制。当系统启用该服务并使其处于运行状态时，未经身份验证的远程攻击者可通过网络向目标主机的 rpc.rquotad 端口发送特制 RPC 请求，获取系统用户的磁盘配额信息，甚至在某些条件下利用该服务进行本地权限提升或作为后续攻击的跳板。该漏洞本质上属于安全配置缺陷而非软件代码漏洞，NVD 将其 CVSS 评分设为 0.0 分（严重级别 LOW）。受影响范围主要为启用了 NFS 服务的 Unix/Linux 主机，攻击者无需事先认证即可在低复杂度条件下完成利用。根据 NVD 评估建议，rpc.rquotad 是一种不安全且已过时的协议，用户应禁用该服务或阻止相关 RPC 端口的网络访问以消除风险。"
published = "1999-01-01T05:00:00.000"
remediation = "建议在不需要磁盘配额服务的系统上停止并禁用 rpc.rquotad 服务（如执行 `chkconfig rpc.rquotad off` 并 `kill` 相关进程），或通过防火墙/主机策略限制 111 及 1022 等 RPC 端口仅对受信任内网开放，升级到已默认关闭该服务的 Linux 发行版最新补丁版本（如 RHEL/CentOS 更新 nfs-utils 至厂商最新版）。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Unix rpc.rquotad 远程配额服务配置安全隐患漏洞"
updated = "2026-06-16T21:48:44.947"

