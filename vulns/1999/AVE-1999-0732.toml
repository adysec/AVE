[basic]
description = 'tags as requested.<value>TeamTrack 3.0 的 Web 服务器存在目录遍历漏洞。未经身份认证的远程攻击者可通过在请求路径中使用 ".."（点号）序列，绕过目录访问限制，从而读取服务器上的任意敏感文件。该漏洞影响 TeamShare TeamTrack 3.0 版本，攻击者无需登录即可利用此漏洞获取系统配置文件、密码文件或其他敏感信息，进而可能进一步渗透服务器。建议用户尽快升级至安全版本或部署 WAF 规则进行防护。'
published = "1999-10-01T04:00:00.000"
remediation = '升级 TeamShare TeamTrack 至官方修复后的 3.0 以上版本（3.1 或更高），并部署 Web 应用防火墙拦截含 "../" 及编码遍历序列的请求；同时在 Web 服务器配置中禁用对静态文件目录以外的路径访问，将 TeamTrack 服务仅监听内网地址并将上传与可访问目录设为不可越权读取的沙箱路径，作为临时缓解措施。'
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "TeamShare TeamTrack 3.0 目录遍历漏洞"
updated = "2026-06-16T21:49:21.440"

