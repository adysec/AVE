[basic]
description = "LPRng 是 Red Hat Linux 7.0/7.1 系统中广泛使用的打印服务守护进程，该软件在降低进程权限时未正确放弃补充组（supplementary groups）成员身份。正常情况下，LPRng 在完成特权操作后应从 root 降权至低权限用户运行，但由于漏洞的存在，进程仍保留了不必要的补充组权限。本地攻击者可利用此缺陷，通过与 LPRng 守护进程交互，在权限降低后的进程中继承其未释放的补充组身份，从而提升自身权限，获得对系统中敏感文件或资源的未授权访问。该漏洞攻击条件简单（AV:L/AC:L），仅需本地访问即可触发，影响范围覆盖所有使用存在缺陷版本 LPRng 的 Red Hat Linux 系统。"
published = "2001-10-18T04:00:00.000"
remediation = "升级 LPRng 到 3.6.24 或更高版本，该版本已修复降权时未正确放弃补充组成员身份的问题。Red Hat Linux 7.0/7.1 用户应执行 `up2date lprng` 或使用 `rpm -Uvh` 安装官方安全更新包。如无法立即升级，可临时将 lpd 服务配置为以专用低权限用户身份运行（在 /etc/lpd.conf 中设置 lpd_user 和 lpr_user 指令），并确保该用户不属于 wheel、root 等特权组。同时建议限制 /var/spool/lpd 目录权限为 0700，仅允许 lpd 进程访问。"
score = 4.6
severity = "MEDIUM"
sources = ["redhat"]
title = "Red Hat Linux LPRng 补充组权限提升漏洞"
updated = "2026-06-16T21:54:57.513"

