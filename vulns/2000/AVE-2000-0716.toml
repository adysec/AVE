[basic]
description = "Microsoft NetMeeting 3.0.1 的远程桌面共享功能存在拒绝服务漏洞，当启用远程桌面共享后，未经身份认证的远程攻击者可通过向 NetMeeting 服务端口发送连续的 null 字节数据包，触发目标系统 CPU 占用率飙升，导致服务不可用。该漏洞无需特殊权限即可远程利用，影响 NetMeeting 3.0.1 及 4.4.3385 版本，CVSS 评分 5.0，危害等级中危。"
published = "2000-12-19T05:00:00.000"
remediation = "微软 NetMeeting 已停止支持，建议升级到不含该组件的现代 Windows 版本（Windows 7 及以上）并卸载 NetMeeting。如仍需使用，请在防火墙层面禁用 TCP 端口 1720 和 1731，并在 NetMeeting 中关闭「桌面共享」功能。如非必要，建议直接删除 `conf.exe` 和 `nmcom.dll` 文件以彻底移除组件。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Microsoft NetMeeting 远程桌面共享拒绝服务漏洞"
updated = "2026-06-16T21:52:54.540"

