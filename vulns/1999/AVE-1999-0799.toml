[basic]
description = "DNS 服务器在处理反向查询（inverse query，即根据 IP 地址反查主机名）时存在安全配置缺陷，默认允许外部客户端发起此类查询。远程攻击者无需身份认证，只需向目标 DNS 服务器发送特制的反向查询请求，即可探测内网主机名与 IP 地址的对应关系，从而收集网络拓扑与资产信息，辅助后续定向攻击。该漏洞影响配置了 DNS 服务且未禁用反向查询功能的各类服务器，攻击条件仅为网络可达目标 53 端口，利用方式简单、无需特殊权限，可被广泛用于信息侦察。"
published = "1997-07-01T04:00:00.000"
remediation = "升级 BIND 至 8.2.2-P5 及以上版本（或迁移至 BIND 9.x），并在 named.conf 中将 allow-recursion 限制为仅可信内网、关闭 zone 反查询转发；在边界防火墙阻断外部 53/UDP 的递归与反查询请求作为临时缓解。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
