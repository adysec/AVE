[basic]
description = "OpenSSH 在启用 UseLogin 选项时未能正确降低权限，本地用户可通过向 SSH 守护进程提供恶意命令实现权限提升并执行任意代码。攻击条件为拥有系统本地账户且目标服务器启用了 UseLogin 配置。该漏洞影响 OpenSSH 2.x 及部分相关版本，CVSS 评分 10.0，危害等级严重。建议用户禁用 UseLogin 选项或升级至修复版本。"
published = "2000-06-08T04:00:00.000"
remediation = "将 OpenSSH 升级至 2.1 或更高版本，或在 /etc/ssh/sshd_config 中将 UseLogin 设置为 no 后重启 sshd 服务。作为临时缓解措施，可移除 sshd 的 SUID 权限：chmod -s /usr/sbin/sshd。"
score = 10
severity = "CRITICAL"
sources = ["cve"]
title = "OpenSSH UseLogin 选项本地权限提升漏洞"
updated = "2026-06-16T21:51:55.343"

