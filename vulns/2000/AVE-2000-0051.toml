[basic]
description = "Nortel Contivity HTTP Server 1.0 的 cgiproc CGI 脚本存在元字符注入漏洞，远程攻击者可通过向目标服务器发送包含 shell 元字符的特制 URL，导致 CGI 程序执行意外的系统命令，造成拒绝服务。该漏洞影响 Nortel Contivity 1.0 版本，无需认证即可远程触发，攻击条件简单，危害中等。"
published = "2000-01-17T05:00:00.000"
remediation = "升级 Nortel Contivity HTTP Server 至 1.0 以上已修复版本；如无法升级，建议在 Web 服务器配置中禁用或移除 cgiproc CGI 脚本，并在网络边界防火墙上限制对 HTTP 服务的访问来源 IP，同时对用户输入进行严格过滤，禁止 shell 元字符传入。该产品已停止维护，建议迁移至受支持的安全替代方案。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Nortel Contivity HTTP Server cgiproc CGI 拒绝服务漏洞"
updated = "2026-06-16T21:50:55.610"

