[basic]
description = "Allaire JRun 2.3.x 的 JSP 示例文件存在访问控制漏洞，未经身份认证的远程攻击者可通过 viewsource.jsp 等示例页面访问服务器上的任意文件或获取配置信息，从而泄露敏感数据。该漏洞影响 Allaire JRun 2.3.x 系列版本，CVSS 评分 5.0，危害等级中等，攻击者无需凭据即可在网络上远程发起攻击且利用复杂度低。"
published = "2000-06-22T04:00:00.000"
remediation = "立即升级 Allaire JRun 至 3.0 或更高版本（已修复该漏洞），或彻底删除 JRun 安装目录下的示例 JSP 文件（如 viewsource.jsp、simple.jsp 等）；若无法升级，请在 Web 服务器层面配置访问控制规则，禁止外部访问 /samples/ 目录及所有 .jsp 示例文件，并重启 JRun 服务使配置生效。建议尽快迁移至受支持的现代应用服务器（如 Apache Tomcat、WildFly 等）。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Allaire JRun JSP 演示文件信息泄露漏洞"
updated = "2026-06-16T21:51:57.397"

