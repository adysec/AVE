[basic]
description = "SLRN 软件包中的 slrnpull 组件存在缓冲区溢出漏洞。当 slrnpull 以 setuid 或 setgid 权限安装时，本地攻击者可通过向 -d（SPOOLDIR）参数传递超长字符串触发缓冲区溢出，从而获取目标系统的提升权限。该漏洞影响 SLRN 0.9.6 及之前版本，CVSS 评分 7.2，危害等级高。攻击者需拥有本地系统访问权限方可利用。"
published = "2002-08-12T04:00:00.000"
remediation = "升级 slrn 至 0.9.8.0 或更高版本（最新版为 1.0.1），可从 SourceForge 获取源码编译安装，或通过系统包管理器更新。如无法升级，执行 `chmod u-s /usr/bin/slrnpull && chmod g-s /usr/bin/slrnpull` 移除 slrnpull 的 setuid/setgid 权限位，以消除本地提权攻击路径；若无需 NNTP 拉取功能，可直接卸载 slrnpull 软件包。"
score = 7.2
severity = "HIGH"
sources = ["osv"]
title = "SLRN slrnpull SPOOLDIR 命令行参数缓冲区溢出漏洞"
updated = "2026-06-16T21:58:02.783"

