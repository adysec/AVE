[basic]
description = "Symantec pcAnywhere 8.0/9.0 版本存在登录重置拒绝服务漏洞，远程未授权攻击者可在 pcAnywhere 提供登录提示前主动终止连接，导致服务拒绝响应，导致远程控制服务不可用。该漏洞影响 Symantec pcAnywhere 8.0 和 9.0 版本，攻击者无需身份认证即可远程发起攻击，仅需在登录提示出现前中断 TCP 连接即可触发拒绝服务，导致远程控制服务停止响应，CVSS 评分 5.0，属中危级别拒绝服务漏洞。Symantec 已发布补丁修复该漏洞，建议用户升级至修复版本。"
published = "2000-04-09T04:00:00.000"
remediation = "建议升级 Symantec pcAnywhere 至 9.0.1 或更高版本（Symantec 已发布补丁修复该登录重置拒绝服务漏洞）。若暂时无法升级，可在防火墙层面限制 TCP 5631/5632 端口仅允许可信 IP 访问，或暂时禁用 pcAnywhere 服务直到应用补丁。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Symantec pcAnywhere 登录重置拒绝服务漏洞"
updated = "2026-06-16T21:51:22.387"

