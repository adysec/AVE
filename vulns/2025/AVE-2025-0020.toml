[basic]
description = "深信服终端检测响应平台（EDR）管理后台存在OS命令注入漏洞（CWE-78）。攻击者无需认证即可向`/tool/log/c.php`接口发送特制HTTP请求，通过构造`strip_slashes`、`limit`、`host`、`path`、`row`等参数注入系统命令，导致远程代码执行。该漏洞影响深信服EDR 3.2.16、3.2.17、3.2.19中文版本，CVSS评分10.0，危害等级严重。Shadowserver Foundation已于2025年2月4日观测到在野利用，建议用户立即升级修复。"
published = "2025-06-24T02:15:22.820"
remediation = "立即将深信服EDR管理平台升级至v3.2.21版本（2020年7月9日发布）。可通过管理平台在线升级功能自动安装修复包，或从深信服官方论坛下载升级安装包后在系统管理→升级管理→平台与终端升级界面手动导入。该版本已修复此RCE漏洞及已知其他问题。国际版v3.2.15EN和v3.2.22EN不受影响。如无法立即升级，可在边界防火墙上限制对EDR Manager接口（/tool/log/c.php）的访问，仅允许可信管理IP连接。"
score = 10
severity = "CRITICAL"
sources = ["hwpoc"]
title = "深信服 EDR OS命令注入漏洞"
updated = "2026-06-17T09:13:21.777"

