[basic]
description = "Inso 公司开发的 AnswerBook2 (AB2) Web 服务器 dwhttpd 3.1a4 版本存在资源耗尽型拒绝服务漏洞。远程攻击者无需身份认证，通过向目标服务器发送包含超长 Content-Length 字段的恶意 HTTP POST 请求，可导致服务器资源被迅速耗尽，无法响应正常用户请求，造成拒绝服务。该漏洞影响运行 dwhttpd 3.1a4 的 Solaris 等 UNIX 系统。"
published = "1998-08-23T04:00:00.000"
remediation = "该漏洞影响已停止维护的 Sun AnswerBook2 文档服务器组件 dwhttpd 3.1a4，官方已无补丁。建议立即停止使用该过期产品，迁移至现代文档服务器；如暂时无法下线，可在反向代理或 Web 服务器层面限制 HTTP POST 请求体大小（如nginx 的 client_max_body_size 设为 1MB），并通过防火墙限制源 IP 访问范围作为临时缓解。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Inso dwhttpd 拒绝服务漏洞"
updated = "2026-06-16T21:50:23.673"

