[basic]
description = 'Microsoft Zero Administration Kit (ZAK) 1.0 的 Appstation 模式存在安全策略绕过漏洞。本地用户可通过 Office 97 应用程序（如 Word）启动资源管理器，将恶意软件安装至 TEMP 目录，并将其重命名为允许运行的程序名称（如 Winword.exe），从而绕过"仅允许运行指定应用程序"策略限制，实现非授权软件执行。该漏洞影响 ZAK 1.0 及 Office97 环境，CVSS 评分 4.6，危害等级中危，攻击者需具备本地访问权限。'
published = "2005-01-07T05:00:00.000"
remediation = "该漏洞存在于已停止支持的 ZAK 1.0 和 Office 97 中，建议升级到受支持的 Windows 环境（如 Windows 10/11 企业版）并使用组策略或 MDM 方案替代 ZAK 实现应用程序白名单控制。若无法升级，可通过修改注册表禁用 Office 应用中的 VBA 和 Shell 调用权限，并移除 TEMP 目录的可执行权限作为临时缓解措施。"
score = 4.6
severity = "MEDIUM"
sources = ["cve"]
title = "Microsoft Zero Administration Kit (ZAK) 安全策略绕过漏洞"
updated = "2026-06-16T21:50:25.593"

