[basic]
description = "ucd-snmp 服务器 3.52 版本中存在信息泄露漏洞，其 vacm 模块未能正确禁用对 public 团体字符串的访问权限。远程攻击者可利用 SNMP 协议的默认团体字符串直接查询目标设备，获取系统配置、网络拓扑、运行进程等敏感信息，导致信息泄露。该漏洞影响 ucd-snmp 3.52 版本，CVSS 评分 5.0，危害等级中危。建议升级至更高版本或修改 SNMP 团体字符串配置以缓解风险。"
published = "1999-04-06T04:00:00.000"
remediation = "升级 ucd-snmp 至 4.0 以上版本，或迁移至其继承项目 net-snmp。在 snmpd.conf 中将 `com2sec` 的 public community 改为自定义字符串或使用 `rocommunity` 指定仅允许特定源 IP 访问，同时在防火墙层面限制 UDP 161 端口的入站流量。如无法升级，将 `community` 指令注释掉并使用 `rocommunity` 替代。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "ucd-snmp SNMP 服务默认公共团体字符串信息泄露漏洞"
updated = "2026-06-16T21:50:01.670"

