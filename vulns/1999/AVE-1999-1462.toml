[basic]
description = "FreeBSD Sysinstall 在配置匿名 FTP 服务时存在信息泄漏漏洞。当使用 sysinstall 工具配置匿名 FTP 时，系统会自动创建 ftp 用户且未设置密码，并将该用户的默认 shell 设置为 /bin/date，而非禁用登录的 /sbin/nologin。远程攻击者可通过 FTP 匿名登录获取系统访问权限，进而访问敏感系统资源。该漏洞影响 FreeBSD 2.2.1 及更早版本，CVSS 评分 7.5，危害等级高。"
published = "1997-04-07T04:00:00.000"
remediation = "升级至 FreeBSD 3.0 及以上版本以修复该问题。如无法升级，手动执行 pw usermod ftp -s /usr/sbin/nologin 将 ftp 用户的 shell 修改为 nologin，同时使用 passwd ftp 为该用户设置强密码，或执行 pw lock ftp 锁定该账户。如不需要匿名 FTP 服务，建议删除 ftp 用户以彻底消除风险。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "FreeBSD Sysinstall 信息泄漏漏洞"
updated = "2026-06-16T21:50:08.477"

