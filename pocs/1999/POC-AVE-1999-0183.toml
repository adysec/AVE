[info]
author = "AVE"
description = "检测 Webcart CGI 程序是否因配置不当导致 /webcart/orders/ 目录可被公开访问，从而泄露订单及信用卡等敏感信息"
id = "POC-AVE-1999-0183"
name = "Webcart CGI 配置不当信息泄露漏洞 PoC"
severity = "medium"
tags = ["ave-1999-0183"]
vuln_id = [
    "CVE-1999-0610",
    "AVE-1999-0183",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/webcart/orders/"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "Order",
    "order",
    "Total",
    "total",
    "Credit",
    "credit",
]
