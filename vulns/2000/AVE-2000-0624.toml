[basic]
description = "PGP Certificate Server 2.5.0 及 2.5.1 版本的命令端口（4000端口）存在拒绝服务漏洞。当远程攻击者所在主机的域名未配置反向 DNS（PTR）记录时，连接至该端口将触发服务崩溃，导致无法响应正常证书请求。攻击者无需任何认证即可远程触发，严重影响服务器的可用性。"
published = "2000-06-14T04:00:00.000"
remediation = "升级到 PGP Certificate Server 2.7 或更高版本（若仍受厂商支持）；否则在防火墙或主机层面限制端口 4000 仅允许受信任的已知 IP 访问，并确保所有连接客户端均配置正确的反向 DNS 记录，以此缓解基于反向 DNS 查询失败的拒绝服务攻击。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Network Associates PGP Certificate Server 反向DNS条目拒绝服务漏洞"
updated = "2026-06-16T21:51:57.777"

