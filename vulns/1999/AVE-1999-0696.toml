[basic]
title = "L0phtcrack 2.5 临时文件密码信息泄露漏洞"
description = "L0phtcrack 2.5 在 Windows 系统临时目录（TEMP）中存储临时文件，这些文件可能包含明文密码信息。本地攻击者若能够访问目标系统的临时目录，可读取这些未清理的临时文件，从而窃取用户的密码凭据。该漏洞影响 L0phtcrack 2.5 版本，CVSS 评分 2.1，危害等级低，攻击前提是攻击者已获得本地文件系统访问权限。"
severity = "LOW"
score = 2.1
sources = ["cve"]
published = "1999-01-06T05:00:00.000"
updated = "2026-06-16T21:48:26.313"
remediation = "升级至 L0phtcrack 最新版本，新版已在内存中处理密码哈希，不再将明文密码写入系统 TEMP 临时目录。同时应确保 TEMP 目录权限配置为仅允许当前用户访问（NTFS 权限 700），并定期清理系统临时目录。作为纵深防御措施，可在组策略中启用「清除页面文件」和「登录时清空临时文件夹」配置。"

