[basic]
description = "BMC PATROL SNMP Agent 在 3.2.07 版本之前存在本地权限提升与不安全文件创建漏洞。该漏洞源于其随附的 snmpmagt 程序以 root 权限运行，却未对参数进行充分的权限与路径校验。本地已登录的低权限用户可在执行 snmpmagt 时将目标文件路径作为第二个参数传入，从而以 root 身份在系统中创建任意文件，且所创建文件被设置为全局可写（world-writeable）权限。攻击条件为攻击者需具备目标系统的本地访问权限（无需远程网络可达），并能够执行 snmpmagt 程序。成功利用后，攻击者可借此写入关键系统文件或植入后门，进而实现本地权限提升与持久化控制，影响范围为部署了受影响的 BMC PATROL 3.2.07 之前版本 SNMP Agent 的服务器。"
published = "1999-07-13T04:00:00.000"
remediation = "升级 BMC PATROL SNMP Agent 到 3.2.07 或更高版本，这是修复该漏洞的官方安全补丁。如无法立即更新，可通过修改 snmpmagt 配置文件，限制该程序的权限并启用文件审计机制作为临时缓解措施。"
score = 7.2
severity = "HIGH"
sources = ["exploitdb"]
title = "BMC Software Patrol SNMP Agent 任意文件创建权限提升漏洞"
updated = "2026-06-16T21:50:29.277"

