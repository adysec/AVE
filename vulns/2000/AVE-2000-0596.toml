[basic]
description = "IRIX 操作系统中的 dmplay 工具存在缓冲区溢出漏洞，本地用户可通过向该程序传递超长的命令行选项参数触发缓冲区溢出，从而获得 root 权限。该漏洞影响 IRIX 6.2 和 6.3 版本，攻击者需要拥有本地系统访问权限，无需身份认证即可利用，攻击复杂度低，成功利用后可完全控制目标系统。"
published = "2000-10-20T04:00:00.000"
remediation = "立即移除 /usr/sbin/dmplay 的 setuid root 权限位：chmod u-s /usr/sbin/dmplay，或彻底删除该程序（rm -f /usr/sbin/dmplay）。如业务需要该功能，升级到 IRIX 6.5.30 及以上版本（SGI 已为此漏洞发布补丁）。由于 IRIX 已停止维护，最彻底的缓解措施是限制本地用户对 dmplay 的执行权限：chmod 700 /usr/sbin/dmplay 并仅授权可信管理员使用。"
score = 7.2
severity = "HIGH"
sources = ["cve"]
title = "SGI IRIX dmplay 本地缓冲区溢出漏洞"
updated = "2026-06-16T21:52:29.937"

