[basic]
description = "部分 Telnet 客户端存在信息泄露漏洞，远程 Telnet 服务器可通过协议中的环境变量选项向客户端请求环境变量，而某些客户端实现未对该请求进行适当限制或告警，会将本地环境变量（如 PATH、HOME、USER、DISPLAY 等）响应给远程服务器，导致敏感配置信息泄露。此外，攻击者还可通过构造包含 telnet: URL 的恶意网页，诱使用户点击后自动连接恶意 Telnet 服务器。用户只需连接到不受信任的 Telnet 服务器或访问包含 telnet: URL 的恶意页面，即可在不需身份认证的情况下泄露客户端环境中的敏感信息，进而为后续定向攻击提供辅助情报。"
published = "2001-07-21T04:00:00.000"
remediation = "禁用 Telnet 客户端的环境变量回显功能，或在 Telnet 客户端配置中关闭 REQUEST 环境变量选项。具体操作：在使用 Telnet 客户端时，通过设置环境变量 TELNET_OPTS=-E 或在客户端配置文件中添加 disable-env-request 选项，阻止远程服务器请求客户端环境变量。对于 Windows 系统，可通过组策略禁用 Telnet 客户端的远程环境变量查询功能；Linux 系统可编辑 /etc/telnet.cfg 或客户端配置文件添加相应禁用选项。"
score = 2.6
severity = "LOW"
sources = ["cve"]
title = "Telnet 客户端 信息泄露漏洞"
updated = "2026-06-16T21:52:41.357"

