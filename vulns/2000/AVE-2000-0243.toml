[basic]
description = "Cisco IOS 11.x 及 12.x 版本的 Telnet 守护进程存在拒绝服务漏洞。远程攻击者在未完成 Telnet 连接建立前，向目标设备发送特制的 ENVIRON 选项参数，可触发该守护进程崩溃并导致系统重启。攻击无需任何身份认证，且 Cisco IOS 系列设备广泛部署于企业及运营商网络，影响范围极大。"
published = "2000-04-20T04:00:00.000"
remediation = "升级 Cisco IOS 至 12.0.8 或更高版本。若无法立即升级，可在受影响设备上禁用 Telnet 服务（no service telnet），改用 SSH 远程管理，或通过访问控制列表（ACL）限制 Telnet 访问源地址作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Cisco IOS Telnet Daemon 拒绝服务漏洞"
updated = "2026-06-16T21:51:21.700"

