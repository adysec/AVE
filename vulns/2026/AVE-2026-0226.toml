[basic]
description = "万户ezOFFICE协同办公平台的checkSQL_httprequest.jsp接口存在SQL注入漏洞，攻击者可在未授权情况下通过构造恶意SQL查询参数，利用该接口绕过认证直接访问或篡改后台数据库。该漏洞可导致敏感信息泄露、系统权限被获取，影响部署了万户ezOFFICE的企事业单位。攻击者无需身份认证，通过向目标服务器发送特制HTTP请求即可触发，利用难度低、危害性高。"
published = "nday"
remediation = "升级万户 ezOFFICE 至官方最新安全版本；对 checkSQL_httprequest.jsp 接口添加身份认证校验；使用参数化查询或预编译语句替代拼接 SQL；在反向代理或 WAF 层面拦截对 /defaultroot/iWebOfficeSign/OfficeServer.jsp/ 下相关路径的未授权访问；限制该接口只能从可信 IP 访问。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "万户 ezOFFICE checkSQL_httprequest.jsp SQL注入漏洞"
updated = "nday"

