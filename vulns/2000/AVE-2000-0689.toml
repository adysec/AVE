[basic]
description = "Microsoft Indexing Service 的 CiWebHitsFile 组件存在跨站脚本（XSS）漏洞。攻击者可通过向 IIS 服务器发送带有恶意 CiRestriction 参数的 .htw 请求，在目标用户浏览器中执行任意脚本代码。该漏洞影响 Windows 2000 及 NT 4.0 上的 IIS4/5 服务器，无需身份认证即可远程触发，可能导致会话劫持、信息窃取等危害。CVSS 评分 5.1，危害等级中危。"
published = "2000-12-19T05:00:00.000"
remediation = "立即安装 Microsoft 安全公告 MS00-006 提供的补丁，Windows 2000 用户下载安装 Indexing Services 补丁（KB251170），Windows NT 4.0 用户下载安装 Index Server 2.0 补丁。若无法立即打补丁，可在 IIS 管理器中移除 .htw 脚本映射或禁用 Indexing Service 服务作为临时缓解措施。"
score = 5.1
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Microsoft Windows Indexing Service 跨站脚本漏洞"
updated = "2026-06-16T21:52:49.197"

