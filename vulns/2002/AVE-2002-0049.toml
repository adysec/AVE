[basic]
description = "Fetchmail 6.0.0 及更早版本中的 getmxrecord 函数在处理恶意 DNS 服务器返回的特制 DNS 数据包时，未正确校验数据边界，存在越界读取漏洞。远程攻击者无需身份认证即可通过控制恶意 DNS 服务器向目标 Fetchmail 客户端发送畸形 DNS 响应数据包，触发越界读取操作，导致 Fetchmail 进程崩溃，造成拒绝服务。该漏洞影响所有 Fetchmail 6.0.0 及之前版本，CVSS 评分 5.0，危害等级中危。"
published = "2002-10-11T04:00:00.000"
remediation = "升级 Fetchmail 至 6.1.0 或更高版本。各发行版用户：Red Hat 用户安装 RHSA-2002:215 提供的更新包；Debian 用户安装 DSA-171 提供的更新包；Mandrake 用户安装 MDKSA-2002:063 提供的更新包。如无法升级，可在 DNS 解析层面配置可信 DNS 服务器并过滤畸形 DNS 响应作为临时缓解。"
score = 5
severity = "MEDIUM"
sources = ["osv"]
title = "Fetchmail 6.0.0 及更早版本 DNS getmxrecord 拒绝服务漏洞"
updated = "2026-06-16T21:58:52.573"

