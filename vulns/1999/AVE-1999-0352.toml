[basic]
description = "Microsoft IIS 4.0 与 Site Server 3.0 中自带的示例文件 showcode.asp 存在任意文件读取漏洞。该脚本本用于演示 ASP 源码查看功能，但未对用户传入的文件路径参数进行有效过滤，攻击者可利用目录遍历（../）构造恶意请求。未经身份认证的远程攻击者只需向目标服务器发送特制的 HTTP 请求，即可读取服务器上任意文件（如配置文件、源代码、系统敏感文件等），从而导致敏感信息泄露。该漏洞利用条件简单，无需认证，CVSS 评分 5.0，危害等级中等。管理员应删除服务器上的 showcode.asp 等示例文件以消除风险。"
published = "1999-05-07T04:00:00.000"
remediation = "建议升级至 IIS 5.0 或更高版本，或升级 Microsoft Site Server 至 3.0 之后的版本；若无法升级，请立即删除或重命名 IIS 和 Site Server 安装目录下的 showcode.asp 样例文件，并在 IIS 管理器中禁用示例脚本映射，同时配置 NTFS 权限限制 Web 目录对敏感文件的读取权限，作为临时缓解措施可部署 URLScan 2.5 过滤可疑请求。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
