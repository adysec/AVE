[basic]
description = "FreeBSD 于 2000-01-14 发布的一个 SSH 补丁中，将 SSH 服务监听端口同时配置为 22 和 722。由于该补丁的安全配置缺陷，即便网络防火墙或过滤设备对标准 SSH 端口 22 进行了访问限制，远程攻击者仍可通过端口 722 直接连接到 SSH 服务，实现安全绕过后获得未经授权的远程 shell 访问权限。该漏洞影响安装了上述补丁的 FreeBSD 系统，攻击者无需身份认证即可利用，CVSS 评分为 7.5，危害等级为高危。攻击条件为目标系统运行了该版本的 SSH 且 22 端口被过滤但 722 端口可达，攻击者通过 SSH 客户端连接 722 端口即可绕过访问控制策略获取系统访问权。"
published = "2000-06-07T04:00:00.000"
remediation = "立即编辑 /etc/rc.conf 或 /etc/ssh/sshd_config，删除 Port 722 监听配置，将 SSH 限制为仅在 22 端口监听；执行 /etc/rc.d/sshd restart 重启 sshd 服务；通过 netstat -an | grep 722 确认 722 端口已停止监听；在 ipfw 或 pf 防火墙规则中阻断外部对 722 端口的访问作为临时缓解措施；升级到 FreeBSD 后续修正版本以彻底消除额外端口监听问题。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "FreeBSD SSH 安全绕过漏洞"
updated = "2026-06-16T21:51:56.300"

