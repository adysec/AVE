[basic]
description = "SGI IRIX 6.3 操作系统的 ipxchk 和 ipxlink 工具在调用系统执行函数时未正确清除 IFS（内部字段分隔符）环境变量，导致本地攻击者可通过操纵 IFS 变量注入恶意命令，从而实现任意命令执行。该漏洞允许拥有本地访问权限的攻击者以受陷进程的权限执行任意代码，影响 SGI IRIX 6.3 系统，CVSS 评分 4.6，危害等级中危。"
published = "1998-04-08"
remediation = "安装 SGI 官方补丁 Patch_SG0002869，该补丁移除了 ipxchk 程序并取消了 ipxlink 的 suid 权限。临时缓解措施：执行 chmod u-s /usr/etc/netware/ipxchk /usr/etc/netware/ipxlink 移除两个程序的 suid 位；如不使用 IPX 协议，建议卸载 NetWare 网络组件以彻底消除风险。"
score = 4.6
severity = "MEDIUM"
sources = ["cve"]
title = "SGI IRIX ipxchk 和 ipxlink 本地命令执行漏洞"
updated = "2026-06-16"

