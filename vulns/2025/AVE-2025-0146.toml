[basic]
description = "泛微 E-cology 9 的 /mobile/browser/WorkflowCenterTreeData.jsp 接口存在前台 SQL 注入漏洞。未经身份认证的远程攻击者可通过向该接口发送特制 POST 请求，在 node 或 scope 参数中注入恶意 SQL 语句，成功利用后可窃取数据库中的敏感信息，包括管理员账号密码及系统配置数据，严重威胁系统安全。"
published = "2025-07-17"
remediation = "立即联系泛微官方获取最新安全补丁包，升级 E-cology 9 系统至最新修复版本。若暂时无法升级，在 WAF 或反向代理层配置规则拦截对 /mobile/browser/WorkflowCenterTreeData.jsp 的请求中 node 和 scope 参数的恶意 SQL 语句，并对该接口实施严格的输入参数校验，禁止拼接用户输入到 SQL 查询中。"
score = 5.0
severity = "MEDIUM"
sources = ["hwpoc"]
title = "泛微 E-cology 9 前台 SQL 注入漏洞"
updated = "2025-07-17"

