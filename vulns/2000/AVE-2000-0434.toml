[basic]
description = "Savant Web Server 2.1 存在 CGI 源代码泄露漏洞。攻击者可通过向服务器发送不包含 HTTP 版本号的 GET 请求，绕过正常脚本执行逻辑，导致服务器直接返回 CGI 脚本的源代码而非执行结果。该漏洞可能导致敏感信息泄露，如数据库连接信息、业务逻辑等，为进一步攻击提供情报。无需身份认证即可远程利用，危害中等。"
published = "2000-06-05T04:00:00.000"
remediation = 'Savant Web Server 已停止维护，厂商未发布安全补丁。建议立即迁移至活跃维护的 Web 服务器（如 Apache HTTP Server 2.4.x、Nginx 1.24+ 或 IIS 10.0）。迁移前可在反向代理或 WAF 层面添加规则，拦截不含 HTTP 版本号的 GET 请求，例如匹配 `^GET\s+\S+\s*$`（不含 HTTP/ 前缀）的请求头直接返回 400 状态码，作为临时缓解措施。'
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Savant Web Server 2.1 CGI 源代码泄露漏洞"
updated = "2026-06-16T21:51:54.847"

