[basic]
description = 'Windows NT 4.0 SP4 及更早版本中存在符号链接表操作漏洞。本地攻击者可通过在 \?? 对象文件夹中使用大小写不同的字母修改符号链接表，将其指向不同的设备对象，从而提升自身权限至系统级别。该漏洞需要攻击者拥有本地系统访问权限，影响所有 Windows NT 4.0 SP4 及之前版本，CVSS 评分 4.6，危害等级中危。'
published = "1999-12-31T05:00:00.000"
remediation = '升级至 Windows NT 4.0 Service Pack 5 或更高版本，该漏洞已在 SP5 中修复。如无法升级，限制本地用户对 \?? 对象目录的符号链接操作权限，并移除受影响用户的交互式登录权限作为临时缓解措施。'
score = 4.6
severity = "MEDIUM"
sources = ["epss"]
title = "Microsoft Windows NT 权限提升漏洞"
updated = "2026-06-16T21:50:10.980"

