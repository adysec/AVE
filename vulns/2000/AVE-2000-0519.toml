[basic]
description = "AIX 操作系统的 cdmount 工具存在 shell 元字符注入漏洞，本地攻击者可通过在命令行参数中嵌入分号、管道符等特殊字符绕过权限检查，以 root 身份执行任意命令。该漏洞影响多个 AIX 版本，CVSS 评分 7.2。利用前提是攻击者拥有本地系统账户，通过精心构造的输入即可完成权限提升。"
published = "2000-06-20T04:00:00.000"
remediation = "立即安装 IBM AIX 对应 APAR IY06476 补丁，或升级至包含该修复的 AIX 维护版本。作为临时缓解措施，可移除 cdmount 程序的 setuid root 权限（chmod u-s /usr/sbin/cdmount），并严格限制可登录系统的本地用户范围，避免向非信任用户授予 shell 访问权限。"
score = 7.2
severity = "HIGH"
sources = ["cve"]
title = "IBM AIX cdmount 本地特权提升漏洞"
updated = "2026-06-16T21:51:47.697"

