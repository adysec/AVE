[basic]
description = "亿邮电子邮件系统远程命令执行漏洞是该系统核心组件存在的远程代码执行安全缺陷，攻击者可通过构造恶意请求或利用未验证的输入点执行任意命令。漏洞影响范围广泛，覆盖企业版、个人版等多个产品版本，攻击者可在网络环境下无需身份验证即可触发漏洞。攻击条件包括目标系统部署了漏洞版本、攻击者具备网络访问能力，对邮件服务器进行端口扫描或发送畸形数据包即可发起攻击。该漏洞利用方式涉及到协议解析、安全输入验证等多个环节，攻击者可通过邮件处理模块、WebDAV接口或配置管理页面执行代码，完全控制受害主机，窃取敏感数据或构建持久化后门。目前该漏洞相关技术细节尚未公开，产品厂商未发布官方补丁，建议用户立即停用电子邮件服务或隔离系统进行紧急修复。"
published = "0705"
remediation = "建议立即升级亿邮电子邮件系统至官方发布的最新安全版本。如暂无补丁，可在 WAF/IPS 层面添加规则拦截对 webmail 接口的异常 POST 请求及命令拼接字符（如 |、;、&&、`），并限制邮件系统管理后台的访问 IP 白名单作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "亿邮电子邮件系统远程命令执行漏洞"
updated = "0705"

