[basic]
description = "金蝶云星空企业资源管理平台 DynamicFormService 组件的 CloseForm.common.kdsvc 接口存在远程代码执行漏洞。攻击者无需身份认证即可通过向目标系统发送特制的 HTTP POST 请求，在参数中注入恶意命令，导致服务器端执行任意系统命令。该漏洞可被用于获取服务器控制权、植入后门或横向移动，危害严重。受影响版本包括金蝶云星空全系列版本，建议用户尽快升级至安全版本。"
published = "0716"
remediation = "建议立即升级金蝶云星空至官方最新安全补丁版本（对应补丁请咨询金蝶技术支持或登录金蝶官网下载中心获取）。临时缓解措施：在 WAF/NFW 层面添加规则拦截对 `/k3cloud/Kingdee.BOS.ServiceFacade.ServicesStub.DynamicForm.DynamicFormService.CloseForm.common.kdsvc` 路径的 POST 请求，或限制该路径仅允许可信 IP 访问。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "金蝶 金蝶云星空 DynamicFormService.CloseForm 远程代码执行漏洞"
updated = "0716"

