[basic]
description = "Digital Ultrix 4.0 和 4.1 系统中 /usr/bin/chroot 命令因安装权限配置不当，导致本地普通用户可利用该程序获取 root 权限。chroot 机制本用于限制进程的文件系统访问范围，但由于其可执行文件权限设置过于宽松，攻击者在获得低权限本地访问后，可通过 chroot 命令绕过隔离机制并提升至 root 权限，从而完全控制目标系统。该漏洞无需远程网络访问，仅需本地账户即可完成利用。"
published = "1991-05-01"
remediation = "修复 /usr/bin/chroot 权限配置：执行 chmod u-s /usr/bin/chroot 移除 setuid 权限位，并设置权限为 chmod 750 /usr/bin/chroot 以限制仅 root 组可执行。Digital 已发布 Ultrix 4.2 及以上版本修复该问题，建议升级至最新补丁集。在无法升级的旧系统上应严格控制本地用户访问权限。"
score = 7.2
severity = "HIGH"
sources = ["cve"]
title = "Digital Ultrix /usr/bin/chroot 本地权限提升漏洞"
updated = "2026-06-16"

