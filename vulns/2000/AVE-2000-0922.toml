[basic]
description = "Microsoft Windows 2000 本地安全策略存在 RPC 流量处理缺陷，本地攻击者可通过向目标系统发送特制的畸形 RPC 数据包，破坏本地安全策略配置，导致系统拒绝服务。该漏洞攻击复杂度低，无需身份认证即可利用，影响 Windows 2000 系统，CVSS 评分 2.1，危害等级低。Microsoft 已发布安全公告 MS00-062 修复此漏洞。"
published = "2000-10-20T04:00:00.000"
remediation = "安装 Windows 2000 Service Pack 1（SP1）即可修复此漏洞；如无法部署 SP1，请安装 Microsoft 安全公告 MS00-062 提供的独立补丁（KB269609）。临时缓解措施：在防火墙上阻止 UDP 端口 137、138、139 和 443 以阻断外部 RPC 攻击；对于不提供网络服务的机器，可禁用 RPC Listener 服务。"
score = 2.1
severity = "LOW"
sources = ["cve"]
title = "Microsoft Windows 2000 本地安全策略损坏拒绝服务漏洞"
updated = "2026-06-16T21:52:26.823"

