[basic]
description = "xosview 1.5.1 在 Red Hat Linux 5.1 中存在缓冲区溢出漏洞，本地用户可通过设置超长的 HOME 环境变量触发该漏洞，导致缓冲区溢出，从而获取 root 权限。该漏洞影响 Red Hat Linux 5.1 系统中安装了 xosview 1.5.1 的版本，攻击者需要拥有本地系统访问权限，利用难度较低，CVSS 评分 7.2，危害等级高。"
published = "1998-05-28T04:00:00.000"
remediation = "升级 xosview 至 1.5.1 以上版本，或升级 Red Hat Linux 至 6.0 及以上版本。如无法升级，可移除 xosview 的 setuid 位（chmod u-s /usr/X11R6/bin/xosview）或直接卸载该软件包（rpm -e xosview）以消除提权风险。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "RedHat xosview 本地缓冲区溢出漏洞"
updated = "2026-06-16T21:50:33.180"

