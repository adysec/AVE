[basic]
description = "Microsoft Commercial Internet System (MCIS) 2.0 及 2.5 版本中的 IMAP 服务存在输入验证缺陷，远程攻击者无需任何身份认证即可向目标服务器发送特制的畸形 IMAP 请求报文，触发服务组件在处理请求时发生异常，从而导致 IMAP 服务进程崩溃并拒绝为合法用户提供服务。该漏洞可被用于对部署了 MCIS 邮件服务的系统实施拒绝服务攻击，影响范围涉及使用 MCIS 的 Windows 服务器环境。"
published = "2000-01-04T05:00:00.000"
remediation = "立即安装微软安全公告 MS00-001 提供的补丁。Intel 平台补丁下载地址：https://www.microsoft.com/download/details.aspx?familyid=03140610-f69c-4d34-b441-32c1a2abb1ed；Alpha 平台补丁下载地址：https://www.microsoft.com/download/details.aspx?familyid=2cc2d73f-8493-4b8a-9e47-93673a522e70。由于 MCIS 已停止支持，如无法安装补丁，应在防火墙限制对 IMAP 服务（TCP 143 端口）的访问，仅允许受信 IP 范围连接，并迁移至受支持的邮件服务器产品。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "Microsoft Commercial Internet System IMAP 服务器拒绝服务漏洞"
updated = "2026-06-16T21:50:54.267"

