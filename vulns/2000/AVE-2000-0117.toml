[basic]
description = "SCO UnixWare 系统中的 scohelp 程序存在缓冲区溢出漏洞，远程攻击者无需身份认证即可向目标系统发送特制请求触发该漏洞，导致攻击者能够在受影响系统上以 root 权限执行任意命令。该漏洞影响 SCO UnixWare 多个版本，CVSS 评分 7.2，危害等级高。建议用户及时升级至厂商修复版本以消除风险。"
published = "2000-01-27T05:00:00.000"
remediation = "立即升级到 SCO UnixWare 7.1.1 或更高版本，并安装 SCO 官方安全补丁 erg711903a；同时限制 scohelp 服务的访问来源，在防火墙或 hosts.allow 中仅允许受信任 IP 连接，禁用不必要的远程管理服务以降低攻击面。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "SCO scohelp 缓冲区溢出远程代码执行漏洞"
updated = "2026-06-16T21:51:03.790"

