[basic]
description = "CGI-World Poll It 2.0 存在内部变量覆盖漏洞，远程攻击者可通过向 CGI 脚本的 data_dir 参数中注入任意文件路径，绕过输入验证，导致服务器上的任意文件被读取泄露。该漏洞影响 Poll It 2.0 版本，攻击者无需身份认证即可利用，CVSS 评分 7.5，危害等级高。建议升级至最新版本或对该参数进行严格过滤。"
published = "2000-07-04T04:00:00.000"
remediation = "立即从服务器删除或禁用 Poll It 2.0 CGI 脚本，该软件已停止维护超 20 年，无法获得官方补丁。如必须保留投票功能，请迁移至现代替代方案（如 phpSurveyor、LimeSurvey 等）。临时缓解措施可在 Web 服务器（Apache/Nginx）层面限制对 pollit.cgi 的访问，或对 data_dir 参数做严格路径白名单校验，禁止包含 `../` 等目录遍历字符。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "CGI-World Poll It 2.0 任意文件读取漏洞"
updated = "2026-06-16T21:52:03.820"

