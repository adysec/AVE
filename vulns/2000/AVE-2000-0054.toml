[basic]
description = "英特尔 InBusiness 电子邮件站的 daynad 程序存在认证缺失漏洞，远程攻击者无需任何身份验证即可直接访问该程序，进而修改设备配置、删除服务器文件或读取任意邮件内容。该漏洞影响英特尔 InBusiness 电子邮件站设备，CVSS 评分 7.5，危害等级高。由于设备未对 daynad 服务实施访问控制机制，攻击者只需网络可达即可利用，攻击复杂度低且无需用户交互。"
published = "1999-12-14T05:00:00.000"
remediation = "该产品已停产，Intel 未发布官方补丁。建议在边界防火墙上阻止 TCP 端口 244 的入站连接，禁止该设备暴露在公网；如内部仍在沿用，应将其隔离至独立 VLAN，仅允许受信任的内部管理 IP 访问，并尽快迁移至仍在安全更新支持周期内的邮件服务器方案。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "英特尔 InBusiness 电子邮件站 daynad 授权问题漏洞"
updated = "2026-06-16T21:50:56.083"

