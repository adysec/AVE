[basic]
description = "GNU Binutils 的 bfd_mach_o_get_synthetic_symtab 函数中存在未初始化变量漏洞，asymbol 结构体的 the_bfd 字段在未正确初始化的情况下被使用，导致程序崩溃。本地攻击者可利用特制的 Mach-O 文件触发此漏洞，造成拒绝服务。该漏洞影响所有受支持的 Binutils 版本，CVSS 评分 4.7，危害等级中危。"
published = "2023-09-14T21:15:10.320"
remediation = "更新 binutils 至包含 commit d12f8998d2d086f0a6606589e5aedb7147e6f2f1 的版本（≥2.40 的修复版本），或从 sourceware.org Git 仓库拉取最新源码重新编译。Red Hat 用户可通过 Red Hat Enterprise Linux 9 的 binutils 更新包获取修复，RHEL 6/7/8 用户等待厂商提供的补丁更新。NetApp 受影响产品请参考 NTAP-20231103-0003 安全通告安装对应更新。"
score = 4.7
severity = "MEDIUM"
sources = ["msrc"]
title = "GNU Binutils bfd_mach_o_get_synthetic_symtab 未初始化变量导致拒绝服务漏洞"
updated = "2026-06-17T05:41:33.280"

