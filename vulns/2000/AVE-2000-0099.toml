[basic]
description = "CSM mail server 存在缓冲区溢出漏洞，远程攻击者可通过向 SMTP 服务发送超长 HELO 命令触发该漏洞，导致目标服务拒绝服务或执行任意代码。该漏洞影响早期版本 CSM mail server，无需身份认证即可远程利用，危害严重。厂商未提供官方补丁，建议升级至不受影响版本或部署边界防护措施。"
published = "1999-12-29T05:00:00.000"
remediation = "立即升级 CSM mail server 至厂商修复版本（或安装官方提供的安全补丁），该漏洞通过超长 HELO 命令触发栈缓冲区溢出，升级后对 SMTP HELO/EHLO 参数长度进行严格校验（限制 256 字节以内）。如产品已停止维护无法升级，建议立即迁移至现代支持的邮件服务器（如 Postfix、Exim），并在网络边界防火墙限制对 SMTP 端口（25/TCP）的访问来源。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "CSM Mail Server 缓冲区溢出远程代码执行漏洞"
updated = "2026-06-16T21:50:52.883"

