[basic]
description = "CVS 1.10.8 客户端存在路径信任漏洞，由于客户端未对服务器返回的文件路径进行合法性校验，攻击者可通过搭建恶意的 CVS 服务器，向连接到的客户端发送特制的文件路径信息，强制客户端在本地创建任意文件，可能导致恶意文件植入或系统文件覆盖。该漏洞影响 CVS 1.10.8 及更早版本，危害等级较低，攻击者需诱导用户连接恶意 CVS 服务器。"
published = "2000-10-20T04:00:00.000"
remediation = "升级 CVS 客户端至 1.11 或更高版本，该版本不再盲目信任服务端返回的文件路径；仅连接可信任的 CVS 服务端；使用 SSH 隧道加密 CVS 通信，避免中间人攻击；如条件允许，建议迁移至 Git 等现代版本控制系统。如无法升级，可配置本地文件系统权限，限制 CVS 客户端运行账户的写入范围作为临时缓解。"
score = 2.1
severity = "LOW"
sources = ["cve"]
title = "CVS CVS Kit 1.10.8 创建指定文件漏洞"
updated = "2026-06-16T21:52:15.130"

