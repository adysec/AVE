[basic]
description = "HP OpenView OmniBack II 2.55/3.0/3.1 存在拒绝服务漏洞，远程攻击者可通过向端口 5555 发送大量连接请求导致服务崩溃。该漏洞影响 HP OpenView OmniBack II 2.55、3.0 及 3.1 版本，攻击者无需身份认证即可利用，CVSS 评分 5.0，危害等级中危。"
published = "2000-02-28T05:00:00.000"
remediation = "建议升级至 HP OpenView OmniBack 6.0 及以上版本，该漏洞已在后续版本修复。如无法升级，可在防火墙上限制对端口 5555 的访问，仅允许可信 IP 连接，并配置入侵检测规则监控异常连接数。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "HP OpenView OmniBack II 拒绝服务漏洞"
updated = "2026-06-16T21:51:09.917"

