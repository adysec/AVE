[basic]
description = "Soup Sieve（Beautiful Soup 4 使用的 CSS 选择器引擎）在 css_parser.py 中处理属性选择器时，其正则表达式存在灾难性回溯漏洞。当解析未闭合引号的属性值时，VALUE 正则模式进入指数级回溯，仅需约 300 字节的恶意载荷即可导致 CPU 占用超过 3 秒。未经身份认证的远程攻击者可通过向使用 soupsieve.compile() 或 Beautiful Soup 的 .select()/.select_one() 方法的 Python 应用提交特制的 CSS 选择器字符串，触发正则表达式拒绝服务（ReDoS），导致服务线程阻塞和 CPU 资源耗尽。该漏洞影响 soupsieve 2.8.4 之前的所有版本，CVSS 评分 7.5，危害等级高。由于 soupsieve 是 beautifulsoup4 的自动依赖项，广泛部署的 Python Web 应用均受影响。"
published = "2026-07-14T21:17:02.007"
remediation = "立即将 soupsieve 升级至 2.8.4 或更高版本（`pip install --upgrade soupsieve`）。如无法升级，避免将用户可控的 CSS 选择器字符串传入 `soupsieve.compile()` 或 Beautiful Soup 的 `.select()` / `.select_one()` 方法，并在应用层对输入长度和字符集做严格限制（如拒绝包含未闭合引号的输入）以降低攻击面。"
score = 7.5
severity = "HIGH"
sources = ["ghsa"]
title = "Soup Sieve CSS选择器解析器正则表达式拒绝服务漏洞"
updated = "2026-07-21T16:17:13.337"

