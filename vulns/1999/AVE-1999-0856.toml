[basic]
description = "网络服务运行在非标准端口上可能导致安全隐患，攻击者可能利用该服务绕过防火墙规则和入侵检测系统，进行未授权访问或权限提升。服务端口隐藏可被用作后门或持久化手段，增加安全监控和审计的难度。该漏洞影响使用非标准端口运行网络服务的系统，需通过端口扫描和基线核查进行检测。"
published = "1999-01-01T05:00:00.000"
remediation = "建立并维护全网资产清单，使用 Nmap 等工具定期扫描所有端口，识别运行在非标准端口的服务。对每项服务核实其业务必要性，记录责任人及用途；未经授权的服务立即停止并移除。在防火墙上配置零信任策略，只放行必要端口并对源 IP 做白名单限制。对必须使用非标准端口的服务，确保其本身经过安全加固并定期审计日志。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "多厂商 Host Service Port Handler 组件提权漏洞"
updated = "2026-06-16T21:48:41.060"

