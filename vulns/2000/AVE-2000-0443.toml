[basic]
description = "Allaire ColdFusion Server 2.0/3.x/4.x 及 4.5.1 早期版本的 ColdFusion Administrator 登录页面存在输入验证缺陷，远程攻击者无需身份认证即可通过提交超长密码字符串触发漏洞，导致 ColdFusion 服务进程崩溃或拒绝服务。该漏洞攻击条件简单，仅需向目标服务器的管理后台登录接口发送特制请求即可实施利用，影响范围覆盖多个早期版本。"
published = "2000-06-07T04:00:00.000"
remediation = "升级至 ColdFusion 4.6+（官方修复版本），或直接迁移至仍在维护的 Adobe ColdFusion（2023 及以上版本）。若无法升级，配置反向代理或 WAF 限制 /cfide/administrator/ 路径仅允许可信 IP 访问，并在代理层拦截 password 字段超过 1024 字符的 POST 请求以减少攻击面。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Allaire ColdFusion Server 管理员登录密码过长致拒绝服务漏洞"
updated = "2026-06-16T21:51:57.143"

