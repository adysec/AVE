[basic]
description = "Qualcomm Eudora Internet Mail Server (EIMS) 2.01 及更早版本在 MacOS 系统上存在缓冲区溢出漏洞。远程攻击者可通过向 106 端口发送超长的 USER 命令，触发缓冲区溢出，导致目标服务崩溃，造成拒绝服务。该漏洞影响 EIMS 2.01 及之前版本，攻击者无需身份认证即可远程触发，利用难度较低。"
published = "1998-04-14T04:00:00.000"
remediation = "受影响版本为 Eudora Internet Mail Server 2.01 及更早版本。该产品已停止维护多年，建议迁移至现代邮件服务器（如 Postfix、Microsoft Exchange、Cyrus IMAP）。若因老系统兼容性无法迁移，应在防火墙层面限制对 TCP 端口 106 的访问，只允许可信 IP 连接，以降低被远程利用的风险。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Qualcomm Eudora Internet Mail Server 缓冲区溢出漏洞"
updated = "2026-06-16T21:49:44.867"

