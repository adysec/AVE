[basic]
description = "ProFTPD 1.3.3c之前版本的netio.c中pr_netio_telnet_gets函数存在多个基于栈的缓冲区溢出漏洞，远程攻击者可通过TELNET IAC转义字符利用FTP或FTPS服务器执行任意代码"
published = "2010-11-09"
remediation = "升级ProFTPD至1.3.3c或更高版本，该版本修复了netio.c中的栈缓冲区溢出问题；同时建议禁用不必要的TELNET IAC转义处理功能"
