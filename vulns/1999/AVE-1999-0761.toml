[basic]
description = "路由器、防火墙或其他网络设备上存在具有弱口令（可猜测密码）的账户，攻击者无需身份认证即可通过远程网络尝试常见或默认凭据登录设备。该漏洞影响各类使用弱密码或默认账户配置的网络设备，攻击条件为攻击者能够与目标设备建立网络连通并访问其管理或服务端口。利用方式为通过暴力破解或字典攻击猜测账户密码，成功登录后可获取设备控制权，进而篡改路由策略、绕过防火墙规则或作为内网跳板，造成严重的安全风险。"
published = "1998-04-01T05:00:00.000"
remediation = "立即更换所有网络设备（路由器、防火墙等）上的默认/弱口令为强密码（至少12位，含大小写字母、数字和特殊字符），禁用默认管理账户（如admin/root），启用账户锁定策略（连续5次失败后锁定30分钟），并定期（每90天）更换口令。对于支持TACACS+/RADIUS的设备，建议启用集中认证。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "开源路由器弱口令漏洞"
updated = "2026-06-16T21:48:32.553"

