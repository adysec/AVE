[basic]
description = "Vixie cron 3.0.1 及更早版本中的 crontab 程序存在权限降低失败漏洞。当用户通过 crontab 命令修改计划任务时，若修改操作解析失败，程序未能正确降低特权级别，仍以高权限运行。本地攻击者可利用此漏洞，通过故意触发解析错误使编辑器以提升后的权限被调用，从而获取额外的系统权限。该漏洞影响 Linux/Unix 系统中广泛使用的 Vixie cron 任务调度组件，攻击者需具备本地访问权限，利用难度较低，可导致完全控制目标系统。"
published = "2001-08-14T04:00:00.000"
remediation = "升级 Vixie cron 至 3.0pl1-58 或更高版本（Debian 对应 DSA-054 安全更新）。如无法立即升级，限制本地用户对 crontab 命令的访问权限，仅允许受信任用户使用，并监控 /var/spool/cron 目录的异常修改行为。"
score = 7.2
severity = "HIGH"
sources = ["exploitdb"]
title = "Vixie Cron crontab 本地权限提升漏洞"
updated = "2026-06-16T21:54:32.003"

