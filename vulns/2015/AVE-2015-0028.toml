[basic]
description = "ResourceSpace 7.2.6727 之前版本的 pages/setup.php 中存在目录遍历漏洞。远程攻击者可通过向 defaultlanguage 参数传入 `../` 等路径遍历序列，绕过文件路径限制，实现任意本地 PHP 文件的包含与执行。攻击无需身份认证，仅需网络访问即可触发。成功利用可导致敏感信息泄露、远程代码执行等严重后果。厂商已在 7.2.6727 版本中修复此漏洞。"
published = "2015-06-09T14:59:04.223"
remediation = "立即升级 ResourceSpace 至 7.2.6727 或更高版本（该版本在 SVN revision 6640 中修复了 pages/setup.php 中 defaultlanguage 参数的目录遍历问题）。如无法立即升级，在 Web 服务器（Apache/Nginx）层面添加规则，过滤传入的 defaultlanguage 参数中的 `..` 序列，并限制该参数仅允许合法语言文件名（如 `en`、`zh` 等白名单值），同时确保 `allow_url_include` 和 `allow_url_fopen` 已关闭。"
score = 7.5
severity = "HIGH"
sources = ["nuclei"]
title = "Montala ResourceSpace 本地文件包含漏洞"
updated = "2026-06-17T00:26:02.460"

