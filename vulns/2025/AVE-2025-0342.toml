[basic]
description = "金和 C6 协同管理平台的 CheckPwd.aspx 页面在处理 XML 格式请求数据时未禁用外部实体引用，存在 XML 外部实体注入（XXE）漏洞。未经身份认证的远程攻击者可通过构造包含恶意外部实体的 XML 请求包，利用该漏洞读取服务器任意文件内容（如配置文件、敏感数据），或发起服务器端请求伪造（SSRF）攻击探测内网资源。该漏洞影响金和 C6 全版本，危害等级高危。"
published = "0730"
remediation = "升级金和 C6 至厂商发布的最新安全版本；如无法升级，修改 CheckPwd.aspx 后端代码，在 XmlReaderSettings 中设置 DtdProcessing = Prohibit，禁止 XML 外部实体解析。同时配置 Web 应用防火墙（WAF）拦截含外部实体的 XML 请求作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "金和 C6 XML外部实体注入漏洞"
updated = "0730"

