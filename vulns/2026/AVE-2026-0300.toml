[basic]
description = "Gitea 是一款自托管的 Git 服务，其 Composer 包源链接存在权限检查不足的漏洞（CWE-862 缺失授权）。已认证的攻击者可利用此缺陷，通过构造特定请求访问本应受限的私有或内部包源链接，导致敏感信息泄露。该漏洞影响 Gitea 1.26.1 及之前所有版本，CVSS 评分 8.2，危害等级高。建议用户升级至 1.26.2 或更高版本以修复此漏洞。"
published = "2026-07-03T21:16:59.043"
remediation = "立即将 Gitea 升级至 v1.26.2 或更高版本（最新稳定版 v1.27.0），该版本已修复 Composer 包源链接的权限检查缺失问题。如无法立即升级，可在反向代理层限制对 /api/packages/*/composer 路径的访问，仅允许授权用户访问，作为临时缓解措施。"
score = 8.2
severity = "HIGH"
sources = ["ghsa"]
title = "Gitea Composer 包源链接权限检查不足漏洞"
updated = "2026-07-07T18:16:37.980"

