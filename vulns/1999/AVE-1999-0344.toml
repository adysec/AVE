[basic]
description = "Matt Wright 开发的 FormMail 1.x CGI 程序存在跨站请求伪造漏洞，远程攻击者可以利用任意 Web 服务器而非仅限托管该 CGI 程序的服务器提交表单请求，导致 FormMail 被滥用为开放邮件中继，从而伪造邮件来源、发送垃圾邮件。该漏洞影响 FormMail 1.x 所有版本，攻击无需身份认证，仅需目标服务器部署了该 CGI 脚本。"
published = "1997-01-01T05:00:00.000"
remediation = "立即移除或禁用 FormMail 1.x CGI 脚本，改用支持 Referer 验证的替代方案（如 FormMail 2.0 或 nms-cgi-formmail）；如必须保留使用，在 Web 服务器（Apache/Nginx）层面限制仅允许本域访问该脚本，禁止外部站点调用。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Matt Wright FormMail 1.x 跨站请求伪造漏洞"
updated = "2026-06-16T21:47:45.420"

