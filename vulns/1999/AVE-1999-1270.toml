[basic]
description = "Solaris 2.4 至 2.6 系统的电源管理（Powermanagement）模块存在安全缺陷：在系统通过 sys-suspend 挂起并恢复时，xlock 屏幕锁定进程要等到恢复操作完全结束后才启动。攻击者只需在系统恢复后的短暂窗口期内拥有物理键盘访问权限，即可在锁屏生效前向最后活动的应用程序输入字符，从而绕过屏幕锁定机制，可能以提升后的权限执行操作，进而危害系统安全。"
published = "1998-07-16T04:00:00.000"
remediation = "升级到 Solaris 2.6 已发布的内核补丁（如 Sun 官方 105930 系列补丁簇）以修复电源管理恢复时序缺陷；若暂无法打补丁，可在系统挂起/恢复过程中物理锁定机房并禁用 sys-suspend 自动恢复功能，通过移除 /usr/openwin/bin/xlock 之外的自定义挂起脚本、改用需口令解锁的屏幕保护策略来降低本地提权风险。"
score = 7.5
severity = "HIGH"
sources = ["exploitdb"]
title = "Sun Solaris 2.6 电源管理漏洞"
updated = "2026-06-16T21:50:25.720"

