[basic]
description = 'morgan 日志中间件的 `:remote-user` 令牌在处理 HTTP 请求的 `Authorization` 头时，会将 Basic 认证用户名直接写入日志输出流，但未对回车（CR）和换行（LF）等控制字符进行转义或过滤。未经身份认证的远程攻击者可构造包含 CR/LF 控制字符的 `Authorization: Basic` 请求头发送给目标服务器，从而在日志流中注入伪造的日志行，破坏访问日志"一行对应一个请求"的数据结构，进而不法篡改下游日志分析系统的数据。该漏洞影响所有引用 `:remote-user` 标记的内置格式（combined、common、default、short）及自定义格式字符串，受影响版本范围为 morgan 1.2.0 至 1.10.1。攻击者仅需能够向使用受影响版本 morgan 的服务器发送 HTTP 请求即可利用，无需身份认证和用户交互。'
published = "2026-06-03T08:16:19.743"
remediation = "立即将 Node.js 项目中的 morgan npm 包升级至 1.11.0 或更高版本，新版本已对 :remote-user 令牌输出中的控制字符进行转义处理。如短期内无法升级，可修改日志配置项，使用自定义格式字符串排除 :remote-user 令牌作为临时缓解措施。"
score = 5.3
severity = "MEDIUM"
sources = ["ghsa"]
title = "expressjs morgan 日志伪造漏洞"
updated = "2026-07-22T19:10:00.120"

