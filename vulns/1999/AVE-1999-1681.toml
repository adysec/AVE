[basic]
description = "Infoseek Ultraseek 2.1 及 3.1 版本（运行于 Windows NT 平台）的搜索引擎存在缓冲区溢出漏洞。该漏洞源于程序在处理用户发起的 HTTP GET 请求时，未对请求长度进行边界校验，攻击者可通过构造超长的 GET 请求数据触发缓冲区溢出。未经身份认证的远程攻击者只需向目标服务器发送特制长请求，即可覆盖内存并远程执行任意命令。受影响的版本为 Ultraseek 2.1 与 3.1 for NT，攻击无需本地权限或用户交互，危害较大。"
published = "1999-12-15T05:00:00.000"
remediation = "升级到 Infoseek Ultraseek 2.1/3.1 for NT 的最新官方补丁版本，若无最新补丁可禁用 Ultraseek 服务或使用所有到来的入站流量进行网络层过滤以阻止攻击媒介，作为临时缓解措施。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
