[basic]
description = "rpc.ypupdated 是 NIS（网络信息服务）中用于自动更新 NIS 映射的 RPC 服务，其存在命令注入漏洞。远程攻击者无需任何身份认证即可向目标系统的 654 端口发送特制的 RPC 请求，利用 ypupdated 在处理 map 参数时未充分过滤用户输入的缺陷，以 root 权限在服务器上执行任意系统命令。该漏洞影响 HP-UX 10/11、IRIX 3/4/5/6、Solaris 8/9/10、SunOS 4.1 及 OpenSolaris 等多种 Unix 操作系统，CVSS 评分 10.0，可导致服务器被完全控制。"
published = "1995-12-12T05:00:00.000"
remediation = "立即停止 rpc.ypupdated (NIS) 服务，若无业务依赖则彻底禁用：在 HP-UX 上执行 `/sbin/init.d/nis.server stop`，Solaris 执行 `svcadm disable svc:/network/nis/server`。无法停止时，通过 tcpwrappers (`/etc/hosts.allow`/`/etc/hosts.deny`) 限制仅允许受信 IP 访问，或在防火墙层面封锁 RPC 端口 111 和 ypupdated 动态端口。建议迁移至 LDAP/Kerberos 替代 NIS 认证体系。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "HP-UX / IRIX / Solaris / SunOS NIS rpc.ypupdated 远程命令执行漏洞"
updated = "2026-06-16T21:47:54.850"

