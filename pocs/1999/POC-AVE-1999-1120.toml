[info]
author = "ave"
description = "检测 miniSQL 套件中 w3-auth CGI 程序是否存在，该程序存在缓冲区溢出漏洞（CVE-1999-1469），远程攻击者可通过发送超长 URL 或超长 User-Agent MIME 头触发缓冲区溢出导致任意命令执行"
id = "POC-AVE-1999-1120"
name = "miniSQL w3-auth CGI 缓冲区溢出漏洞检测 PoC"
severity = "high"
tags = [
    "cve-1999-1469",
    "buffer-overflow",
    "minisql",
    "cgi",
]
vuln_id = [
    "CVE-1999-1469",
    "AVE-1999-1120",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/cgi-bin/w3-auth"
protocol = "http"

[[poc.requests.matchers]]
expect = true
status = [
    200,
    401,
    403,
    500,
]
type = "status"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/cgi-bin/w3-auth"
protocol = "http"

[poc.requests.headers]
User-Agent = ""

[[poc.requests.matchers]]
expect = true
status = [
    200,
    401,
    403,
    500,
]
type = "status"
