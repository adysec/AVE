[basic]
description = "SGI IRIX 操作系统 5.x 及 6.x 版本自带的 objectserver 守护进程存在权限验证漏洞，远程攻击者无需认证即可通过网络向目标系统的 objectserver 端口发送特制请求，利用该漏洞可创建任意用户账户，进而获取系统访问权限。该漏洞影响 SGI IRIX 全系列 5.x/6.x 版本，CVSS 评分 10.0，危害等级严重。"
published = "2000-03-27T05:00:00.000"
remediation = "立即升级到 SGI IRIX 6.5.x 最新维护版本，或应用 SGI 针对 objectserver 漏洞的官方安全补丁。如无法升级，建议在 inetd 配置中禁用 objectserver 服务（注释掉 /etc/inetd.conf 中 objectserver 行并重启 inetd），同时通过防火墙限制对 7000/tcp 端口的访问，仅允许可信 IP 连接。"
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "SGI IRIX 5.x/6.x Objectserver 远程创建用户账户漏洞"
updated = "2026-06-16T21:51:18.650"

