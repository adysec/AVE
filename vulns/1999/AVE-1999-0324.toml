[basic]
description = "IBM Lotus Domino 服务器在处理特定网络请求时存在缓冲区溢出漏洞。由于服务器程序未对输入数据长度进行充分的边界校验，远程攻击者可通过向目标 Domino 服务器发送特制的畸形数据包，使数据写入缓冲区边界之外，从而触发服务崩溃并造成拒绝服务（DoS）。该漏洞影响运行 Lotus Domino 的服务器系统，攻击无需身份认证，只要网络可达目标服务端口即可发起，利用方式相对简单，可导致邮件与协作服务中断，影响业务连续性。"
published = "2001-03-12"
remediation = "升级至最新版本 HCL Domino 12.0.2 或更高版本以修复 Lotus Notes LDAP (NLDAP) 服务的缓冲区溢出漏洞。如无法立即升级，可在 Domino 服务器配置中禁用 LDAP 服务，或通过防火墙仅允许可信 IP 访问 TCP 389 端口作为临时缓解措施。同时建议定期检查服务器日志中异常的 ldap_search 请求。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Lotus Domino Server 缓冲区溢出拒绝服务漏洞"
updated = "2001-03-12"

