[info]
author = "ave"
description = "检测 BEA WebLogic 5.1.x 的 JSPServlet 是否可被未授权直接访问。该 Servlet 默认未设置访问限制，远程攻击者可直接调用其对任意源文件进行编译执行，导致远程代码执行，CVSS 10.0。"
id = "POC-AVE-2000-0536"
name = "BEA WebLogic JSPServlet 远程代码执行漏洞 PoC"
severity = "critical"
tags = ["ave-2000-0536"]
vuln_id = [
    "CVE-2000-0684",
    "AVE-2000-0536",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/servlet/JSPServlet/"
protocol = "http"

[[poc.requests.matchers]]
expect = true
status = [200]
type = "status"

[[poc.requests]]
method = "GET"
path = "/servlet/JSPServlet"
protocol = "http"

[[poc.requests.matchers]]
expect = true
status = [200]
type = "status"
