[basic]
description = "Ipswitch IMail 5.0 及 6.0 版本的 Web 服务存在缓冲区溢出漏洞。远程攻击者可通过向目标系统发送特制的超长 URL 请求触发该漏洞，导致 Web 服务进程崩溃并造成拒绝服务，在特定条件下可能执行任意代码。该漏洞无需身份认证即可利用，攻击门槛较低，影响运行 Ipswitch IMail 的相关邮件服务器。"
published = "1999-03-02T05:00:00.000"
remediation = "建议立即升级 Ipswitch IMail 至 6.1 或更高版本，该版本已修复 Web 服务中的缓冲区溢出漏洞。如无法升级，应在防火墙层面限制对 Web 服务端口（默认 8383）的访问，仅允许可信 IP 连接，并启用输入长度校验作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Ipswitch IMail Web服务缓冲区溢出漏洞"
updated = "2026-06-16T21:50:41.970"

