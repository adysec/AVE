[basic]
description = "SCO UnixWare 7.0、7.0.1、7.1 及 7.1.1 系统自带的 xauto 程序存在缓冲区溢出漏洞。该程序以 root 权限运行，由于在处理用户输入时未对边界进行有效校验，本地攻击者可通过构造超长的恶意参数触发缓冲区溢出，从而覆盖返回地址并执行任意代码，最终获取系统 root 权限。攻击需具备本地登录或已获得普通用户执行权限，成功利用后可导致本地权限提升，完全控制受影响主机。"
published = "1999-12-03T05:00:00.000"
remediation = "建议立即从 SCO 官方 FTP（ftp://ftp.sco.com/SSE/sse047.tar）下载并安装系统安全增强补丁包 SSE047，该包提供 UnixWare 7.0.0 至 7.1.1 及 UnixWare 2 的 /usr/X/bin/xauto 替换二进制文件。安装前可校验 sum -r 校验和（sse047.tar 应为 08473 240）。如暂时无法打补丁，可临时移除 xauto 的 setuid 位（执行 `chmod u-s /usr/X/bin/xauto`）或限制本地普通用户对该程序的访问权限，以避免本地用户通过缓冲区溢出提权至 root。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
