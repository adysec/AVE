[basic]
description = "Microsoft Exchange Server 的 SMTP 服务在处理邮件投递时存在拒绝服务漏洞。当 SMTP 服务向目标邮件服务器发送邮件并收到 4xx 临时错误响应码时，会快速且反复地重试投递该邮件，导致系统资源被大量消耗，最终造成邮件服务不可用。攻击者可通过配置邮件服务器返回 4xx 状态码来触发此漏洞，影响 Exchange Server 的邮件处理功能。该漏洞属于早期发现的拒绝服务类问题，利用难度较低。"
published = "1999-03-01T05:00:00.000"
remediation = "建议安装 Microsoft Exchange Server 5.5 Service Pack 2 或更高版本，该更新修复了 SMTP 服务在收到 4xx 错误码时陷入死循环导致拒绝服务的问题。临时缓解措施可在 SMTP 虚拟服务器上启用连接限制和超时设置，限制同一来源的并发连接数。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Microsoft Exchange SMTP Service 4xx 错误代码拒绝服务漏洞"
updated = "2026-06-16T21:48:21.433"

