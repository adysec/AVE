[basic]
description = "用友U9 Cloud 的 /Portal/Print/DynamaticExport.aspx 接口存在任意文件下载漏洞，由于未能对 filePath 参数进行有效的路径过滤与校验，远程攻击者无需身份认证即可通过构造包含 ../ 等目录遍历序列的请求，读取服务器上的任意敏感文件（如 /etc/passwd、Web.config 等），导致敏感信息泄露。该漏洞影响用友 U9 Cloud 全版本，危害程度高，攻击复杂度低。建议厂商及时发布补丁修复或对相关接口实施严格的路径白名单限制。"
published = "0709"
remediation = "建议升级用友U9 Cloud至官方最新安全版本，对 `filePath` 参数进行严格的路径合法性校验，禁止包含 `../` 等目录遍历字符，仅允许访问指定导出目录下的文件。同时配置 Web 应用防火墙（WAF）拦截包含路径遍历特征的请求作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "用友 U9 Cloud 任意文件下载漏洞"
updated = "0709"

