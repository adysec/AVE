[basic]
description = "Linux kernel 的 powerpc/rtas 子系统中存在空指针解引用漏洞。当 IBM Cell 架构的 Linux 系统调用 RTAS 固件时，MSR[HV]（机器状态寄存器的 Hypervisor 位）未正确传递，导致内核错误地将固件地址空间视为用户空间，触发指令访问异常和内核崩溃（Oops）。攻击者可利用此漏洞在本地造成拒绝服务（系统崩溃）。CVSS 评分 5.5，危害等级中等。修复方式为在进入 RTAS 前正确复制当前 MSR 的 HV 位值。"
published = "2025-06-18T11:15:22.630"
remediation = "将 Linux 内核升级至 5.19.8 及以上版本，或主线 6.0 及以上版本；对于 5.15/5.17/5.18 稳定分支，分别应用补丁提交 8b08d4f97233（5.15/5.17）或 91926d8b7e71（5.18）。该漏洞仅影响 IBM Cell 平台，非 Cell 平台不受影响，无需额外缓解措施。"
score = 5.5
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux Kernel powerpc/rtas 空指针解引用漏洞"
updated = "2026-06-17T05:19:37.020"

