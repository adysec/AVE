[basic]
description = "Joomla! 的 Abbreviations Manager (com_abbrev) 组件 1.1 版本存在目录遍历漏洞，远程攻击者可通过在 controller 参数中插入 `../` 序列，绕过路径限制访问并包含服务器上任意本地文件，导致敏感信息泄露或在特定条件下执行任意 PHP 代码。该漏洞利用无需身份认证，仅需目标安装受影响组件即可触发。CVSS 评分 7.5，危害等级高，建议用户立即禁用或升级该组件。"
published = "2010-03-16T19:30:00.790"
remediation = "建议立即卸载 Joomla! 的 com_abbrev 组件（Abbreviations Manager v1.1）。若业务必须保留该组件，在 index.php 中对 controller 参数进行白名单校验，仅允许预定义的有效控制器名称（如 array('edit', 'save', 'list')），拒绝包含 .. 或 / 等路径遍历字符的输入。同时确保 PHP 配置中 allow_url_fopen = Off 并设置 open_basedir 限制文件访问范围作为纵深防御。"
score = 7.5
severity = "HIGH"
sources = ["nuclei"]
title = "Joomla! Abbreviations Manager (com_abbrev) 本地文件包含漏洞"
updated = "2026-06-16T23:17:15.667"

