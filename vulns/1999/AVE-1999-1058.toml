[basic]
description = "ICQ ActiveList Server 存在拒绝服务漏洞，远程攻击者可通过向服务器 UDP 端口发送特制的畸形数据包，导致服务进程崩溃。该漏洞源于对畸形数据包的处理不当，无需身份认证即可触发，影响运行 ICQ ActiveList Server 的系统。攻击者只需具备网络访问能力即可实施攻击，危害等级中等。"
published = "1999-10-17T04:00:00.000"
remediation = "ICQ ActiveList Server 已于 2000 年代初停止维护，官方未发布任何安全补丁。建议立即停止使用该产品，迁移至受支持的即时通讯服务端方案。如因遗留系统无法立即下线，可在防火墙层面限制对服务器 UDP 端口（默认 4000）的访问，仅允许可信 IP 来源，以降低被攻击面。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "这是实际的字段内容"
updated = "2026-06-16T21:50:14.200"

