[basic]
description = "安恒明御安全网关 `/sslvpn/sslvpn_client.php` 接口存在命令注入漏洞，攻击者可通过 `client` 和 `img` 参数构造恶意请求注入系统命令，由于程序未对用户输入进行有效的过滤与转义处理，导致远程代码执行。未经身份认证的攻击者可利用该漏洞在目标设备上执行任意系统命令，获取服务器控制权限。该漏洞影响安恒明御安全网关全版本，利用方式已公开，CVSS 评分 9.8，危害等级严重，建议立即升级或部署 WAF 防护规则。"
published = "08.11"
remediation = "立即联系安恒信息获取官方固件更新包，将明御网关升级至厂商提供的最新修复版本。如无法立即升级，在设备管理界面中限制管理口仅允许可信IP访问，关闭非必要的Web管理端口对外暴露，同时在网络边界部署ACL规则阻断对网关管理端口（默认443/8443）的未授权访问作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "安恒明御网关远程代码执行漏洞"
updated = "08.11"

