[basic]
description = "Windows 2000 的 Still Image Service（静态图像服务）存在缓冲区溢出漏洞。该漏洞源于服务在处理 WM_USER 消息时未对消息长度进行有效校验，本地低权限用户可通过发送超长的 WM_USER 消息触发缓冲区溢出，从而在当前系统权限基础上进一步提升至更高权限。攻击者需先在本地具备登录权限才能利用此漏洞，成功利用后可获得 SYSTEM 级别权限，进而完全控制受影响系统。该漏洞影响 Windows 2000 系统，CVSS 评分 4.6，攻击条件为本地已登录用户环境，利用方法为向 Still Image Service 发送精心构造的长消息触发溢出并执行提权代码。"
published = "2000-11-14T05:00:00.000"
remediation = "建议立即安装 Microsoft 安全公告 MS00-065 发布的补丁 KB272736（Q272736）或升级至已集成该修复的 Windows 2000 Service Pack，该补丁修复了 Still Image Service 因处理长 WM_USER 消息引发的缓冲区溢出漏洞，可消除本地用户提权风险。如无法立即打补丁，可通过本地安全策略限制非管理员用户的本地登录权限，并阻止未授权用户将数字相机、扫描仪等外部图像设备插入主机以暂缓风险。"
score = 4.6
severity = "MEDIUM"
sources = ["cve"]
title = "Microsoft Windows 2000 Still Image Service 缓冲区溢出漏洞"
updated = "2026-06-16T21:52:36.020"

