[basic]
description = "Anaconda Partners Clipper 3.3 及更早版本存在目录遍历漏洞，远程攻击者可通过在 template 参数中传入 '..' (点点) 序列进行目录遍历攻击，读取服务器上的任意文件。该漏洞源于对用户输入的 template 参数缺乏路径遍历过滤，攻击者无需身份认证即可远程利用，仅需构造包含 '../' 序列的恶意请求即可读取服务器敏感文件（如 /etc/passwd、配置文件等），CVSS 评分 5.0（AV:N/AC:L/Au:N/C:P/I:N/A:N），影响 Anaconda Clipper 3.3 及更早版本，攻击条件为网络可达且无需认证，利用方式为构造包含目录遍历序列的 HTTP 请求发送至目标服务器。"
published = "2001-08-22T04:00:00.000"
remediation = "建议立即升级到Anaconda Partners Clipper的较新版本或可使用安全补丁。如果无法立即升级，可在web服务器层面配置URL参数验证（仅允许包含字母、数字和下划线的模板名称），并限制参数长度，防止包含路径遍历字符串的恶意请求。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Anaconda Partners Clipper 3.3 目录遍历漏洞"
updated = "2026-06-16T21:54:35.833"

