[basic]
description = "Kerberos 5 认证系统中的 ksu 工具存在缓冲区溢出漏洞，本地攻击者可通过向该程序提交特制的输入数据触发缓冲区溢出，从而覆盖内存中的关键数据以获取目标系统的 root 权限。该漏洞影响早期 Kerberos 5 发行版本，攻击者需要拥有本地系统访问权限才能利用，CVSS 评分 7.2，危害等级高。"
published = "2000-05-16T04:00:00.000"
remediation = "升级 Kerberos 5 至 1.2.1 或更高版本，该版本修复了 ksu 中的缓冲区溢出问题。如无法升级，可移除 ksu 的 setuid 位（chmod u-s /usr/bin/ksu）以消除本地提权风险，或限制可执行 ksu 的用户组。"
score = 7.2
severity = "HIGH"
sources = ["cve"]
title = "MIT Kerberos 5 ksu 本地缓冲区溢出漏洞"
updated = "2026-06-16T21:51:37.220"

