[basic]
description = "WordPress 的 Launchpad – Coming Soon & Maintenance Mode 插件（由 Obox 开发）1.0.13 及之前版本中存在存储型跨站脚本漏洞。该插件多处设置参数对用户输入过滤不严且输出转义不足，导致具有管理员及以上权限的认证攻击者可在页面中注入任意 Web 脚本。当其他用户访问被注入的页面时，恶意脚本自动执行，导致敏感信息窃取或会话劫持。该漏洞仅影响 WordPress 多站点安装以及已禁用 unfiltered_html 权限的站点。"
published = "2023-01-13"
remediation = "该插件已于 2022 年 12 月 9 日因安全问题从 WordPress 官方插件目录移除，不再提供更新修复版本。建议立即停用并删除 Launchpad 插件，迁移至其他仍在维护的 Coming Soon 或 Maintenance Mode 替代插件，同时严格限制管理员账户的授予范围。"
score = 5.5
severity = "MEDIUM"
sources = [
    "cve",
    "wordfence",
]
title = "Obox Launchpad WordPress 插件存储型跨站脚本漏洞"
updated = "2024-11-21"

