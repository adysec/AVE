[basic]
description = "Check Point Firewall-1 存在安全绕过漏洞，远程攻击者可通过向 FTP 服务器发送恶意构造的数据包，诱使服务器返回被 Firewall-1 误判为合法的 227 响应（用于 PASV 被动模式端口协商），从而绕过防火墙的端口访问限制策略，实现对受保护内部网络的非授权访问。该漏洞影响 Check Point Firewall-1 系列产品，CVSS 评分 7.5，危害等级高。攻击者可在无需认证的情况下远程利用，建议升级至厂商修复版本。"
published = "2000-02-12T05:00:00.000"
remediation = "升级 Check Point Firewall-1 至 4.1 SP2 或 NG FP1 及以上版本（厂商已于 2000 年 2 月发布修复补丁）。如无法立即升级，可临时禁用防火墙的 FTP 应用层状态检测功能，或限制来自非信任网络的匿名 FTP 访问，同时确保 FTP 服务器不回显用户输入的命令参数到控制通道响应中。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "Check Point Firewall-1 FTP 端口访问限制绕过漏洞"
updated = "2026-06-16T21:51:06.277"

