[basic]
description = "JeecgBoot 是一款基于代码生成器的 Java 企业级低代码开发平台。其 /jeecg-boot/sys/user/passwordChange 接口存在水平越权漏洞，未对当前用户身份与目标用户进行一致性校验，导致未经身份验证的远程攻击者可直接构造包含 username 和 newPassword 参数的 HTTP 请求，在无需旧密码或验证码的情况下任意修改包括管理员在内的任意用户密码，从而完全接管系统后台，造成敏感数据泄露和系统控制权丧失。"
published = "2025-01-14"
remediation = "1. 升级 JeecgBoot 至官方已修复版本（≥3.7.0），官方已在后续版本中为 passwordChange 接口添加权限校验注解，确保用户只能修改自身密码；2. 对于无法升级的版本，在 Nginx 或网关层配置访问控制，限制 /jeecg-boot/sys/user/passwordChange 接口仅允许已认证用户访问；3. 在业务代码中增加当前登录用户与会话中 username 的一致性校验，防止水平越权绕过。"
score = 9.8
severity = "CRITICAL"
sources = ["hwpoc"]
title = "JeecgBoot 框架 passwordChange 接口任意用户密码重置漏洞"
updated = "2026-07-22"

