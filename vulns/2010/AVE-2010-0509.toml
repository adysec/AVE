[basic]
description = "Windows 内核 win32k.sys 的 RtlQueryRegistryValues 函数存在栈缓冲区溢出漏洞（CWE-787），当系统处理 SystemDefaultEUDCFont 注册表项的 REG_BINARY 数据时因未正确校验长度而覆盖内存。本地低权限用户可构造特制注册表值触发溢出，绕过 User Account Control（UAC）机制并获得 SYSTEM 级权限执行任意代码。影响 Windows XP SP2/SP3、Windows Server 2003 SP2、Windows Vista SP1/SP2、Windows Server 2008 Gold/SP2/R2 以及 Windows 7 等多个版本，CVSS 评分 7.8，危害等级高。Microsoft 已通过安全更新修复该漏洞。"
published = "2010-12-06T13:44:54.863"
remediation = "安装 Microsoft 2011 年 2 月安全更新 (MS11-011, KB2393802)，或通过 Windows Update 自动更新。若无法立即打补丁，可移除受影响系统的本地用户管理员权限组作为临时缓解措施。"
score = 7.8
severity = "HIGH"
sources = ["kev"]
title = "Microsoft Windows win32k.sys 本地权限提升漏洞"
updated = "2026-06-16T23:24:42.707"

