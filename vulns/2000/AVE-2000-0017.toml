[basic]
description = "IMail POP3 守护进程使用了强度不足的加密机制来保护用户邮件数据。攻击者若已获取目标系统的本地访问权限，可利用该加密缺陷解密并读取其他用户的 POP3 邮件文件内容，造成敏感信息泄露。该漏洞影响运行 IMail Server 的 Windows 系统，CVSS 评分 2.1，危害等级较低。由于需要本地访问权限，攻击条件较为严格，仅本地恶意用户或已入侵系统的攻击者可利用此弱点获取邮件隐私数据。"
published = "1999-03-04T05:00:00.000"
remediation = "升级 Ipswitch IMail 至 5.0 或更高版本，该版本修复了 POP3 守护进程使用弱加密存储密码的问题。如无法升级，在服务器本地限制非授权用户登录，避免本地低权限用户通过读取 POP3 密码文件获取其他用户邮箱访问权限。"
score = 2.1
severity = "LOW"
sources = ["cve"]
