[basic]
description = "Joomla! Graphics 组件（com_graphics）1.0.6 和 1.5.0 版本的 graphics.php 文件存在目录遍历漏洞，攻击者可通过向 index.php 的 controller 参数传递 '..' 等目录遍历序列，包含并执行任意本地文件。该漏洞源于对用户输入的 controller 参数缺乏路径规范化校验，攻击者无需身份认证即可远程利用，通过目录遍历序列突破目录限制读取或执行服务器本地敏感文件，可能导致敏感信息泄露或远程代码执行。该漏洞影响 Joomla! 使用受影响 Graphics 组件版本的站点。"
published = "2010-05-03T13:51:53.057"
remediation = "立即将 Joomla! 的 Graphics (com_graphics) 组件升级至 1.5.1 或更高版本以获取补丁修复。若官方已停止维护，请通过后台「扩展管理」中直接卸载或禁用该组件。同时可在 Web 服务器（如 Apache/Nginx）层添加规则过滤请求路径中的 '../'、编码穿越字符，并限制 index.php 的 controller 参数仅允许白名单取值，作为临时缓解措施。"
score = 7.5
severity = "HIGH"
sources = ["nuclei"]
title = "Joomla! 组件 Graphics 1.0.6 本地文件包含漏洞"
updated = "2026-06-16T23:18:47.567"

