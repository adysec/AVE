[info]
author = "ave"
description = "Perl 4.x 和 5.x 版本中的 suidperl(sperl) 组件存在缓冲区溢出漏洞，本地攻击者可通过向 SUID 权限的 Perl 脚本传递特制参数触发溢出。检测目标系统上是否存在设置了 SUID 位的 suidperl/sperl 二进制文件。"
id = "POC-AVE-1999-0090"
name = "Perl suidperl 本地缓冲区溢出漏洞 PoC"
severity = "high"
tags = ["ave-1999-0090"]
vuln_id = [
    "CVE-1999-0034",
    "AVE-1999-0090",
]

[poc]
logic = "all"

[[poc.requests]]
path = "/usr/bin/suidperl"
protocol = "file"

[[poc.requests.matchers]]
expect = false
part = "body"
type = "word"
words = ["suidperl"]
