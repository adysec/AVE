[basic]
description = "Microsoft IIS 4 在从 IIS 2 或 IIS 3 升级后，安装目录下的 /scripts/iisadmin 路径中遗留了 ism.dll 文件，该目录未正确限制访问权限，导致未经授权的远程攻击者可通过 Web 请求直接访问该文件，进而获取服务器敏感信息，包括管理员密码等配置数据。该漏洞影响 Windows NT 平台上的 IIS 4 版本，CVSS 评分仅 2.1，危害等级低，但若成功利用可导致服务器关键凭据泄露。"
published = "1999-01-14T05:00:00.000"
remediation = '立即删除 /scripts/iisadmin 虚拟目录及其下的 ism.dll 文件，或使用 NTFS 权限将对该目录的访问限制为仅本地管理员组 (BUILTIN\Administrators)。升级至 Windows 2000 (IIS 5) 或更高版本以彻底消除该遗留组件。如无法升级，在 IIS 管理控制台中移除 /scripts/iisadmin 应用程序映射并禁用该虚拟目录的匿名访问。'
score = 2.1
severity = "LOW"
sources = ["epss"]
title = "Microsoft IIS 4 敏感信息泄露漏洞"
updated = "2026-06-16T21:50:40.317"

