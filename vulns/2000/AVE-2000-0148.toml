[basic]
description = 'Microsoft Windows 9x 系列操作系统在处理文件路径名时未能正确过滤保留的设备名称（如 CON、NUL、LPT1 等），远程攻击者可向目标系统发送包含此类设备名称的特制路径请求，导致系统资源耗尽或崩溃，造成拒绝服务。此漏洞亦称 "DOS Device in Path Name"，影响 Windows 95/98/ME 及 Windows NT 3.5x/2000 等多个版本，攻击者无需身份认证即可远程触发，CVSS 评分 5.0，危害等级中等。'
published = "2000-03-04T05:00:00.000"
remediation = "该漏洞影响 Windows 9x/NT/2000 等已停止支持的系统，建议立即升级到 Windows 10/11 或 Windows Server 2016/2019/2022 等受支持版本。对于无法升级的遗留系统，应将其隔离到独立网络段，严格限制外部访问，并通过应用层过滤器拦截包含 DOS 设备名（如 CON、NUL、AUX）的路径请求作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Microsoft Windows 设备名路径拒绝服务漏洞"
updated = "2026-06-16T21:51:08.537"

