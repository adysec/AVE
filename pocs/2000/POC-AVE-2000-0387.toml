[info]
author = "AVE"
description = "验证IE跨框架域验证漏洞：通过DocumentComplete()事件绕过同源策略，跨域读取客户端文件"
id = "POC-AVE-2000-0387"
name = "CVE-2000-0465 PoC"
severity = "medium"
tags = ["ave-2000-0387"]
vuln_id = [
    "CVE-2000-0465",
    "AVE-2000-0387",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "<frame",
    "<iframe",
]
