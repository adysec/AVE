[basic]
description = "Adobe Reader 和 Acrobat 8.1.2 之前版本存在多处未明漏洞，远程攻击者可通过向用户发送特制 PDF 文件并诱导其打开来触发漏洞。成功利用后可导致远程代码执行，造成机密性、完整性和可用性完全丧失，从而完全控制受影响系统。该漏洞影响 Windows、macOS 及 Linux 平台上的 Adobe Reader 和 Acrobat 产品，CVSS 评分 8.8，危害等级高，且已被 CISA 列入已知被利用漏洞目录（KEV），实际攻击利用已得到证实。"
published = "2008-02-07T21:00:00.000"
remediation = "升级 Adobe Reader 和 Acrobat 至 8.1.2 或更高版本。对于无法立即升级的环境，可禁用 PDF 在浏览器中的自动打开功能，并设置 Adobe Reader 的安全模式为启用状态以限制潜在攻击面。"
score = 8.8
severity = "HIGH"
sources = ["kev"]
title = "Adobe Reader 和 Acrobat 未指明漏洞"
updated = "2026-06-16T22:50:04.270"

