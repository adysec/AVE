[basic]
description = "BitchX IRC 客户端 1.0 c17 版本存在 DNS 缓冲区溢出漏洞，远程攻击者可利用恶意的 DNS 服务器，使目标 IP 地址解析为超长的主机名或域名，从而触发 IRC 客户端中的缓冲区溢出，导致拒绝服务乃至远程命令执行。该漏洞 CVSS 评分 10.0，危害等级严重，影响广泛使用的 BitchX 1.0 c17 版本。利用方式公开，已在 ExploitDB 中发布，攻击者只需诱使客户端连接至可控服务器即可触发。"
published = "2001-02-16T05:00:00.000"
remediation = "升级 BitchX IRC 客户端至 1.1 或更高版本，该版本已修复 DNS 解析时缓冲区长度检查不足的问题。若无法升级，建议停止使用已停止维护的 BitchX 1.0，迁移至 irssi、WeeChat 等仍在维护的 IRC 客户端，并在 DNS 服务器端限制域名长度。"
score = 10
severity = "CRITICAL"
sources = ["exploitdb"]
title = "BitchX IRC 客户端 DNS 缓冲区溢出漏洞"
updated = "2026-06-16T21:53:33.680"

