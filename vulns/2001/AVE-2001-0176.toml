[basic]
description = "Solaris 7.0/8 及 SGI IRIX 6.5 操作系统的 CDE 桌面环境中的 dtsession 组件存在本地缓冲区溢出漏洞。本地攻击者可通过向 LANG 环境变量传入超长字符串触发缓冲区溢出，从而获取 root 权限。该漏洞源于 dtsession 在处理环境变量时未正确检查边界，导致栈缓冲区溢出。攻击者需要拥有本地系统访问权限，无需身份认证即可利用，危害等级高。"
published = "2001-07-02T04:00:00.000"
remediation = "建议立即安装 Sun 针对 Solaris 7/8 发布的 CDE dtsession 补丁 (Patch ID 108650-xx 及后续更新)，SGI IRIX 6.5 用户应升级到安装了补丁的 IRIX 6.5.14 或更高版本。临时缓解措施：以 root 执行 `chmod -s /usr/dt/bin/dtsession` 移除 dtsession 的 setuid 位，或限制可登录本地用户的白名单。"
score = 7.2
severity = "HIGH"
sources = ["exploitdb"]
title = "Sun Solaris CDE dtsession 本地缓冲区溢出漏洞"
updated = "2026-06-16T21:54:17.250"

