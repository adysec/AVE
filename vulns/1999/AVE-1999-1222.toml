[basic]
description = "SGI IRIX 6.2 系统中的 cdplayer 程序存在本地权限提升漏洞。其原理是该程序在处理命令行选项时未对目录创建目标路径进行充分的安全校验，导致本地普通用户可通过构造特定的命令行参数，使 cdplayer 在任意指定位置（包括本应由 root 拥有的系统目录）创建目录，进而写入可控文件内容并提升至 root 权限。该漏洞影响运行 IRIX 6.2 的 SGI 工作站，攻击条件为攻击者需先获得目标系统的本地低权限账户访问权限，利用方式为在本地执行带恶意路径参数的 cdplayer 命令以触发越权目录创建，实现本地权限提升。"
published = "1998-03-20T05:00:00.000"
remediation = "升级到 SGI IRIX 6.2 的官方补丁版本并移除 setuid 位：执行 `/usr/sbin/Upgrade -r cdplayer` 安装修复包，或运行 `chmod u-s /usr/sbin/cdplayer` 取消其 setuid root 权限以消除本地提权风险；在无法打补丁前，限制普通用户对该二进制文件的访问权限作为临时缓解。"
score = 7.2
severity = "HIGH"
sources = ["exploitdb"]
