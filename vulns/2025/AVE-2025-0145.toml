[basic]
description = "JeecgBoot 是一款开源低代码开发平台，其拖拽报表模块的 `/jeecg-boot/drag/onlDragDatasetHead/getTotalData` 接口存在未授权 SQL 注入漏洞（CVE-2024-48307）。攻击者无需任何身份认证即可构造特制 POST 请求，通过指定 tableName 参数查询任意数据库表（如 sys_user）的 username、password、salt 等敏感字段，获取用户密码哈希值，进而实现任意用户密码重置。该漏洞影响 JeecgBoot v3.7.1 及更早版本，危害严重。"
published = "2024-10-31"
remediation = "升级 JeecgBoot 至 v3.9.2 或更高版本，同时对 /drag/onlDragDatasetHead/getTotalData 接口添加身份认证与权限校验，对用户输入的 tableName、fieldName 等参数进行白名单校验，禁止直接拼接 SQL 查询语句，改用参数化查询或 MyBatis Plus 安全 API 防止 SQL 注入。"
score = 8.9
severity = "HIGH"
sources = [
    "hwpoc",
    "cve",
]
title = "JeecgBoot 拖拽报表模块 getTotalData 接口未授权 SQL 注入漏洞"
updated = "2025-01-15"

