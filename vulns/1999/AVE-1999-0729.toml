[basic]
description = "Novell NetWare 4.1/4.11 中的 Novell-HTTP-Server 及 YAWN Web 服务器存在拒绝服务漏洞。远程攻击者可通过向目标服务器发送大量 HTTP GET 请求，耗尽服务器资源导致服务崩溃或无法响应正常请求。该漏洞影响 Novell NetWare 4.1 及 4.11 版本，攻击者无需认证即可发起攻击，利用难度较低。官方建议升级至修复版本或限制 HTTP 请求速率以缓解风险。"
published = "1999-06-16T04:00:00.000"
remediation = "Novell NetWare 4.1/4.11 及 Novell-HTTP-Server/YAWN 均已停止支持，官方不再提供安全更新。建议立即将 Web 服务迁移至受支持的平台（如 OES 2018 SP2 以上版本或 SUSE Linux Enterprise Server），并在迁移前通过防火墙规则限制对 HTTP 端口的来源 IP 范围，同时配置 Web 服务器连接数上限和请求速率限制以缓解 DoS 攻击。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Novell NetWare Novell-HTTP-Server/YAWN Web Server HTTP GET 请求拒绝服务漏洞"
updated = "2026-06-16T21:49:20.967"

