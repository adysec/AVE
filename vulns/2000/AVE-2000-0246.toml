[basic]
description = "BeOS 4.5 及 5.0 版本存在本地拒绝服务漏洞。本地攻击者可通过向系统发起特制的直接系统调用（使用中断向量 37），导致内核处理异常而引发系统崩溃。该漏洞影响 BeOS 4.5 和 5.0 两个版本，需本地用户权限触发，攻击复杂度低。厂商已停止支持该产品，建议用户迁移至替代操作系统。"
published = "2000-04-10T04:00:00.000"
remediation = "鉴于 BeOS 已于 2001 年停止维护（Be Inc. 被 Palm 收购），官方未发布任何安全补丁。建议立即限制非授信用户的本地登录权限，通过系统用户组策略仅保留必要账户；或将关键业务迁移至 Haiku OS（BeOS 开源后继版本）或 Linux 等仍在维护的操作系统，从根本上消除此本地拒绝服务漏洞风险。"
score = 2.1
severity = "LOW"
sources = ["epss"]
title = "Be BeOS 无效系统调用本地拒绝服务漏洞"
updated = "2026-06-16T21:51:22.743"

