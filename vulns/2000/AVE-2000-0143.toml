[basic]
description = "HP-UX 的 Ignite-UX 系统镜像工具在创建受信任系统映像时，未能正确保存 /etc/passwd 密码文件，导致生成的映像中用户密码字段被置空。攻击者可在系统恢复或部署后利用空密码直接登录系统，获取未授权的高权限访问。该漏洞影响 HP-UX 操作系统，攻击者需具备本地访问或系统镜像部署环节的介入能力，危害等级高。"
published = "2000-02-17T05:00:00.000"
remediation = "升级 HP Ignite-UX 至包含该修复的补丁版本（HP 安全公告相关补丁），确保创建受信系统镜像前 /etc/passwd 文件完整且已备份。镜像创建后立即手动验证 /etc/passwd 中所有用户密码字段非空，对发现密码为空（或空口令）的用户账户立即设置强密码。使用后的系统应执行 pwck 命令校验密码文件完整性。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "HP Ignite-UX 权限提升漏洞"
updated = "2026-06-16T21:51:07.393"

