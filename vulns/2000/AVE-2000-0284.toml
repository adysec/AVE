[basic]
description = "FreeBSD 系统中的 healthd 守护进程存在缓冲区溢出漏洞，本地攻击者可通过向该进程发送特制的输入数据触发缓冲区溢出，从而覆盖内存中的关键数据，成功利用此漏洞可获得 root 权限。该漏洞影响 FreeBSD 系统，攻击者需要拥有本地访问权限才能利用，危害等级高。"
published = "2000-04-10T04:00:00.000"
remediation = "立即升级 FreeBSD 至包含 FreeBSD-SA-00:10 安全公告补丁的版本（3.4-RELEASE 之后或 4.0-STABLE 之后），或应用 healthd 补丁修复缓冲区边界检查缺陷。如无法升级，可移除 healthd setuid 位并限制本地用户登录以降低提权风险。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "FreeBSD healthd 缓冲区溢出漏洞"
updated = "2026-06-16T21:51:25.057"

