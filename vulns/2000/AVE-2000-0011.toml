[basic]
description = "WebWho+ 1.1 的 whois.cgi 程序未对用户输入的 TLD 参数进行充分过滤，远程攻击者可通过在 TLD 参数中注入 shell 元字符（如 `;`、`|`、`` ` `` 等）实现任意命令执行。该漏洞影响运行 WebWho+ 1.1 的 Web 服务器，攻击者无需身份认证即可利用。成功利用后，攻击者可在目标服务器上以 Web 服务进程权限执行任意系统命令，造成信息泄露、系统控制等严重后果。"
published = "1999-12-26T05:00:00.000"
remediation = "建议立即删除 WebWho+ 1.1 的 whois.cgi 脚本并停用该服务，或升级至官方修复版本。如无法升级，需在 CGI 入口对 TLD 参数做严格白名单过滤（仅允许字母数字），禁用 system()/popen() 等 shell 调用函数，改用 exec() 数组参数传递方式，避免 shell 元字符注入。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "Tony Greenwood WebWho+ 1.1 远程命令执行漏洞"
updated = "2026-06-16T21:50:49.007"

