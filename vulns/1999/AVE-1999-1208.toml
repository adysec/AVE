The vulnerability is about Windows multihomed systems allowing remote attackers to bypass IP source routing restrictions via malformed packets - the "Spoofed Route Pointer" vulnerability. Microsoft released MS99-038 to address this.
- title: "Microsoft Windows 多宿主系统 IP 源路由绕过漏洞"
- description: "Windows 95/98/NT 的多宿主系统在处理带有特定 IP 选项的畸形数据包时存在安全漏洞。远程攻击者可利用特制数据包绕过 IP 源路由限制，实施 IP 地址欺骗攻击，获取对受影响系统的未授权访问权限，导致信息泄露或系统被控制。该漏洞又名'Spoofed Route Pointer'。"
