[basic]
description = "Red Hat Linux 系统自带的 screen 终端复用程序未使用 Unix98 伪终端（ptys），导致本地用户可通过向其他用户终端写入数据实现权限提升或信息窃取。攻击者需拥有本地 shell 访问权限，利用该缺陷向同一系统上其他用户的终端会话注入恶意命令或窃取敏感信息。该漏洞影响 Red Hat Linux 多个版本，CVSS 评分 10.0，危害等级严重。"
published = "2000-01-04T05:00:00.000"
remediation = "升级 screen 至 4.0.0 或更高版本（支持 Unix98 ptys），或升级 Red Hat Linux 至 7.0 及以上版本。临时缓解：将 screen 程序的 setuid 位移除（chmod u-s /usr/bin/screen），限制普通用户直接调用；或使用 tmux 等支持 Unix98 ptys 的替代终端复用器替代。"
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "Red Hat Linux screen 终端劫持漏洞"
updated = "2026-06-16T21:49:16.680"

