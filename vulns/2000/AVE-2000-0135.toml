[basic]
description = "GNU make 在处理从标准输入读取的 Makefile 时存在符号链接（symlink）跟踪漏洞，本地攻击者可通过在 Makefile 中嵌入恶意符号链接，诱使目标用户或系统以特权身份执行 make 命令，从而利用 make 进程的权限执行任意命令。该漏洞影响 GNU make 的多个版本，攻击条件为本地用户可访问目标系统，危害等级中等，需通过限制 make 对符号链接的跟踪行为或升级至修复版本进行防范。"
published = "2000-02-01T05:00:00.000"
remediation = "升级 GNU make 至 3.79 及以上版本（3.79 于 2000-04 发布，修复了从 stdin 读取 Makefile 时跟随符号链接的问题）。临时缓解措施：避免在多用户环境下使用 `make -f-` 或通过管道向 make 标准输入传递 Makefile 内容；改用 `make -f /path/to/Makefile` 指定绝对路径文件，防止符号链接劫持。"
score = 6.2
severity = "MEDIUM"
sources = ["cve"]
title = "GNU make 符号链接代码执行漏洞"
updated = "2026-06-16T21:51:06.407"

