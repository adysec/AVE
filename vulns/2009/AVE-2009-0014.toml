[basic]
description = "KR-Web 内容管理系统（又称 Kr-php Web Content Server）1.1b2 及更早版本中的 adm/krgourl.php 文件存在 PHP 远程文件包含漏洞。未经身份认证的远程攻击者可通过向 DOCUMENT_ROOT 参数传递包含恶意 PHP 代码的外部 URL，导致任意代码执行，进而完全控制目标服务器。该漏洞利用难度低且影响范围较广，危害严重。"
published = "2009-12-07T17:30:00.500"
remediation = "立即停止使用 KR-Web 1.1b2 及更早版本，该产品已长期无人维护，官方未发布安全补丁。彻底卸载 kr-php Web Content Server，改用其他受支持的内容管理系统（如 WordPress、Joomla）。若因业务原因无法替换，在 php.ini 中将 allow_url_include 设为 Off 并重启 Web 服务，同时用 Web 应用防火墙（WAF）拦截包含 DOCUMENT_ROOT 参数的异常请求。"
score = 7.5
severity = "HIGH"
sources = ["nuclei"]
title = "Gianni Tommasi KR-Web 远程文件包含漏洞"
updated = "2026-06-16T23:13:16.477"

