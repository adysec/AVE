[basic]
description = "Cyrix CPU 在 Linux 系统中存在硬件设计缺陷，本地攻击者可通过执行特定指令序列触发处理器异常，导致系统崩溃或拒绝服务。该漏洞影响使用 Cyrix 处理器的 Linux 系统，攻击者需拥有本地用户权限才能利用，无法远程触发。"
published = "1999-02-01"
remediation = "更换非 Cyrix 品牌的处理器，或升级 Linux 内核至包含 Cyrix CPU 异常处理补丁的版本。由于该漏洞为硬件设计缺陷，最彻底的修复方式是更换为 Intel 或 AMD 等主流处理器。"
score = 5.0
