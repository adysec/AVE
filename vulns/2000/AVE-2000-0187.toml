[basic]
description = "Pragma Systems InterAccess TelnetD Server 4.0 存在拒绝服务漏洞，远程攻击者可通过向目标服务器发送特制的畸形终端客户端配置文件信息，导致 TelnetD 服务崩溃或停止响应，造成拒绝服务。该漏洞影响 InterAccess TelnetD Server 4.0 版本，攻击者无需身份认证即可远程触发，CVSS 评分 5.0，危害等级中危。目前厂商已发布相关修复版本。"
published = "2000-02-24T05:00:00.000"
remediation = "建议升级到 Pragma InterAccess TelnetD Server 4.0 以上版本，或在防火墙/网络边界限制对 TelnetD 服务端口（默认 23）的访问，仅允许可信 IP 连接。如业务不需要 Telnet 服务，建议直接禁用该服务以消除风险。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Pragma Systems InterAccess TelnetD Server 4.0 拒绝服务漏洞"
updated = "2026-06-16T21:51:14.190"

