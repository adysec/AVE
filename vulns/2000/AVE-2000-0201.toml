[basic]
description = "POC32 是一款用于 Pocsag 寻呼系统的监控程序，其服务端口存在安全绕过漏洞。即使管理员在配置中禁用了服务端口选项，该端口仍然在后台保持监听状态，远程攻击者可利用此缺陷直接连接至目标主机的 POC32 服务端口，在无需任何身份认证的情况下获取系统敏感信息。该漏洞攻击复杂度低，影响使用 POC32 的寻呼系统，CVSS 评分 5.0，属于中等危害等级。"
published = "2000-03-07T05:00:00.000"
remediation = "Pocsag POC32 程序已停止维护，无官方补丁。建议在防火墙层面将 POC32 服务端口（默认 TCP 端口）加入黑名单，限制仅可信 IP 段访问；如无需远程管理功能，直接卸载或禁用 POC32 服务；若必须使用，建议将其部署在隔离网络段并配合主机防火墙仅允许本地回环地址访问。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Pocsag POC32 远程访问安全绕过漏洞"
updated = "2026-06-16T21:51:15.920"

