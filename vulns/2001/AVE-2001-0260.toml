[basic]
description = "Vim（含 gvim）在处理文件中嵌入的 VIM 控制码时存在命令执行漏洞。攻击者可将恶意 VIM 控制码嵌入普通文本文件中，当其他用户使用 Vim 打开该恶意文件时，控制码会被 Vim 解析执行，导致任意命令执行。该漏洞利用条件简单，仅需诱导受害者打开特制文件即可触发，影响范围广泛，涉及所有使用 Vim 的 Linux/Unix 系统及部分 Windows 平台。"
published = "2001-06-18T04:00:00.000"
remediation = "建议升级 vim/gvim 至 5.7 及以上版本，该版本增加了对 VIM 控制码的安全处理机制。各发行版对应补丁：Red Hat 安装 RHSA-2001:008 更新，Mandrake Linux 安装 MDKSA-2001:035 更新，Caldera OpenLinux 安装 CSSA-2001-014.0 更新，SuSE Linux 安装 2001_012_vim 更新。如无法升级，可在 vimrc 中设置 `set nomodeline` 禁用模型线功能，并避免用 vim 打开来源不可信的文件。"
score = 5.1
severity = "MEDIUM"
sources = ["redhat"]
title = "Vim vim/gvim 内嵌控制码处理任意命令执行漏洞"
updated = "2026-06-16T21:54:15.130"

