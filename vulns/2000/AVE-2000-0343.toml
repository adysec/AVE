[basic]
description = "Cayman 3220-H DSL 路由器存在 ICMP 数据包处理缺陷，远程攻击者无需认证即可向目标设备发送超大的 ICMP Echo（Ping）请求报文，触发缓冲区溢出或内存耗尽，导致路由器服务崩溃或重启，造成拒绝服务。该漏洞属于经典的 Ping of Death 攻击变种，影响 Cayman 3220-H 系列 DSL 路由器，攻击条件简单，仅需发送特制 ICMP 包即可实现。"
published = "2000-05-23T04:00:00.000"
remediation = "立即禁用路由器对 ICMP Echo 请求的响应（在访问控制列表中阻断 ICMP Type 8），或在外网入口防火墙层面丢弃入站 ICMP 报文。若设备无法进行 ACL 配置，建议将设备固件升级至最新版本（如 v5.6.8 及以后）。作为彻底解决方案，建议将已停止安全支持的路由器替换为仍在厂商维护周期内的设备。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Cayman 3220-H DSL Router ICMP报文拒绝服务漏洞"
updated = "2026-06-16T21:51:40.560"

