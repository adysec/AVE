[basic]
description = "IRIX 操作系统中的 netprint 工具存在任意共享库加载漏洞，具有 lp 组权限的本地攻击者可通过 -n 选项指定恶意共享库文件，导致以 lp 权限执行任意命令，实现本地权限提升。该漏洞影响 IRIX 5.3、6.2、6.3、6.4、6.5 及 6.5.11 等多个版本，CVSS 评分 7.2，危害等级高。攻击者需先获得 lp 组访问权限方可利用。"
published = "2001-06-27T04:00:00.000"
remediation = "立即应用 SGI 官方安全公告 20010701-01-P 提供的补丁，升级 netprint 组件。如无法打补丁，可移除 netprint 的 setuid root 权限（chmod u-s /usr/lib/print/netprint），并禁用 lp 默认无密码账户（passwd -l lp）作为临时缓解措施。"
score = 7.2
severity = "HIGH"
sources = ["exploitdb"]
title = "SGI IRIX netprint 任意共享库加载本地权限提升漏洞"
updated = "2026-06-16T21:54:23.750"

