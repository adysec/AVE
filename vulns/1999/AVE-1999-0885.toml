[basic]
description = "Behold Software Web Page Counter 2.70 版本的 counter.exe 存在拒绝服务漏洞，远程攻击者可通过发送以 %0A（换行符）结尾的恶意 HTTP 请求，导致计数器日志记录畸形条目并触发访问冲突，使计数器程序挂起从而造成拒绝服务。该漏洞影响 Behold Software Web Page Counter 2.70 版本，CVSS 评分 5.0，属于中危级别拒绝服务漏洞，攻击者无需认证即可远程发起攻击，只需发送特制 HTTP 请求即可触发漏洞导致服务不可用。"
published = "1999-05-19T04:00:00.000"
remediation = "升级 Behold Software Web Page Counter 至修复该问题的后续版本（避免使用 2.70 的 counter.exe）。如无法立即升级，可在 Web 服务器（如 IIS）中配置 URL 重写或请求过滤规则，拦截包含 %0A（换行符）的 HTTP 请求，并在前端防火墙/反向代理处丢弃此类畸形请求，防止恶意换行写入计数器日志导致 counter.exe 访问违规而挂起。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Behold Software Web Page Counter 2.70 拒绝服务漏洞"
updated = "2026-06-16T21:49:33.570"

