[basic]
description = "Id Software Quake 1 及 NetQuake 服务器存在 UDP Flooding 拒绝服务漏洞。远程攻击者可通过伪造大量 UDP 连接数据包向服务器发起洪水攻击，使服务器连接数超过设定的玩家上限，导致服务器资源耗尽或强制断开所有玩家连接。该漏洞利用无需认证，攻击门槛低，直接严重危害游戏服务可用性。"
published = "2001-07-17T04:00:00.000"
remediation = "建议立即停止使用遗留的 NetQuake 服务端，升级至 QuakeWorld 或现代开源移植版（如 QuakeSpasm、DarkPlaces、FTEQW），这些版本已从协议层修复 UDP 连接泛洪问题。如无法升级，可在防火墙层面限制 UDP 连接速率（例如 iptables 针对 26000/UDP 端口设置 `--limit 5/s`），并设置服务端 `sv_maxplayers` 参数限制最大玩家数，同时部署入侵检测规则监控异常 UDP 连接请求。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "id Software Quake 1.9 UDP 泛洪拒绝服务漏洞"
updated = "2026-06-16T21:50:44.320"

