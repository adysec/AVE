[basic]
description = "Microsoft IIS 3.0 ASP 组件存在拒绝服务漏洞。远程攻击者可通过向目标服务器发送包含大量斜杠字符（/）的特制 URL 请求，访问 ASP 页面时触发该漏洞，导致 IIS 服务进程消耗过多资源而崩溃，造成网站服务不可用。攻击者无需身份认证即可远程利用，影响 IIS 3.0 版本。"
published = "1999-12-31T05:00:00.000"
remediation = "升级至 IIS 4.0 及以上版本，IIS 3.0 已停止支持且存在此拒绝服务漏洞。如无法升级，可在 IIS 管理器中限制 URL 请求长度，并将 ASP 脚本扩展映射到较新版本的 ASP.dll。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Microsoft IIS 3.0 ASP 拒绝服务漏洞"
updated = "2026-06-16T21:49:58.883"

