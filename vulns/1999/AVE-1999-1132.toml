[basic]
description = "HP-UX 操作系统中的 SharedX recserv 组件存在拒绝服务漏洞。远程攻击者可通过向运行 recserv 服务的目标系统发送特制请求，导致该服务崩溃或停止响应，造成系统拒绝服务。该漏洞影响 HP-UX 10.01/10.10/10.20/11.00 等多个版本，CVSS 评分 5.0，危害等级中危。目前官方已发布补丁修复此漏洞，建议用户升级至最新版本。"
published = "1998-09-03"
remediation = "建议立即安装 HP 针对此漏洞发布的安全补丁（HP-UX 10.01/10.10/10.20/11.00 对应补丁号可查询 HP ITRC 安全公告 HPSBUX9810-086）。如无法打补丁，可在 inetd.conf 中注释掉 recserv 服务行并重启 inetd 以禁用该服务，同时在网络边界防火墙封禁 SharedX 相关端口（177/udp），限制仅受信任主机可访问。"
score = 5.0
severity = "MEDIUM"
sources = ["cve"]
title = "HP HP-UX SharedX recserv 拒绝服务漏洞"
updated = "2026-06-16"

