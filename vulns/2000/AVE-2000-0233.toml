[basic]
description = 'Windows NT 4.0 中 Cryptography\Offload 注册表项的默认权限设置过于宽松，本地攻击者可利用该漏洞读取并获取其他用户的加密密钥，导致敏感信息泄露和加密数据被破解。该漏洞影响 Windows NT 4.0 及 Terminal Server 版本，攻击者需拥有本地系统访问权限，无需额外认证即可利用。Microsoft 已在安全公告 MS00-024 中发布补丁修复此问题。'
published = "2000-04-12T04:00:00.000"
remediation = '立即安装 Microsoft 安全公告 MS00-024 提供的注册表权限修复工具（下载链接见 https://www.microsoft.com/download/details.aspx?FamilyId=AB792154-6BBD-4D27-9C87-8C7689BD908F），该工具将 `HKLM\System\CurrentControlSet\Control\Cryptography\Offload` 注册表项权限重置为仅允许管理员修改。如无法安装工具，可手动将该注册表项的权限设置为仅 Administrators 组完全控制，移除 Users 组的写入权限。终端服务器场景下应同时限制非信任用户的交互式登录权限。'
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "Microsoft Windows NT 4.0 加密密钥泄露漏洞"
updated = "2026-06-16T21:51:20.513"

