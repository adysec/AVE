[basic]
description = "CDE（Common Desktop Environment）的 dtspcd 守护进程存在符号链接攻击漏洞，本地攻击者可通过创建恶意符号链接诱导 dtspcd 以高权限写入文件，从而覆盖系统关键文件或执行任意命令，实现本地权限提升。该漏洞影响 CDE 2.1 及 Solaris 7.0 等版本，CVSS 评分 7.2，危害等级高。建议升级至不受影响的版本或禁用 dtspcd 服务。"
published = "1999-09-13T04:00:00.000"
remediation = "建议立即安装 Sun 官方补丁 106577-01 (Solaris 7) 或 106578-01 (Solaris 7 x86)，升级 CDE 至修复版本。如无法打补丁，可在 /etc/inetd.conf 中注释 dtspcd 行并重启 inetd 以禁用该服务，或限制 dtspcd 仅允许受信用户访问。"
score = 7.2
severity = "HIGH"
sources = ["epss"]
title = "Sun Common Desktop Environment dtspcd 本地权限提升漏洞"
updated = "2026-06-16T21:48:51.173"

