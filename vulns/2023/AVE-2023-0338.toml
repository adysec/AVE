[basic]
description = "Node.js 的 `Module._load()` 方法存在安全策略绕过漏洞。当实验性策略机制（policy mechanism）启用时，攻击者可通过特制的模块加载请求绕过 `policy.json` 中定义的模块白名单限制，进而加载并执行未授权的恶意模块，导致远程代码执行。该漏洞影响 Node.js 16.x、18.x 及 20.x 所有活跃发行版本，CVSS 评分 9.8，危害等级严重。"
published = "2023-08-21T17:15:47.000"
remediation = "升级 Node.js 至安全版本：16.x 升级到 ≥16.20.1，18.x 升级到 ≥18.17.1，20.x 升级到 ≥20.5.1。如无法立即升级，可在启动脚本中移除 `--experimental-policy` 参数以禁用实验性 policy 机制作为临时缓解措施，同时审查并加强 policy.json 的路径限制规则，避免允许加载任意模块。"
score = 9.8
severity = "CRITICAL"
sources = ["msrc"]
title = "Node.js Module._load() 策略绕过远程代码执行漏洞"
updated = "2026-06-17T05:57:49.263"

