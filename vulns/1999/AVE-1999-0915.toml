[basic]
description = "CVE-1999-0623 已被 NVD 官方拒绝使用，原因为该候选编号描述的是一个系统配置检查项（X Window 服务正在运行），而非直接构成安全漏洞的缺陷。此类配置检测更适合归入通用配置枚举（CCE）体系管理，不应作为漏洞编号使用。该条目无 CVSS 评分，无有效影响范围与攻击条件说明。"
published = "1999-01-01T05:00:00.000"
remediation = "若无需图形界面或远程 X11 功能，建议关闭 X Window 服务（如 Linux 下执行 `systemctl stop gdm` 并禁用开机启动）。如需使用 X11 转发，应限制仅监听 127.0.0.1，并通过 SSH 隧道（`ssh -X`）安全转发，避免将 TCP 端口 6000 暴露到外部网络。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "X.Org X Window System 服务配置不当"
updated = "2023-11-07T01:54:59.640"

