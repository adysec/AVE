[basic]
description = "HP-UX 9.x 操作系统中 DCE/9000 环境的 HP Camera 组件存在权限提升漏洞，攻击者利用该漏洞可获取 root 权限。漏洞成因是 Camera 组件未正确限制权限访问，导致攻击者可通过特制请求提升至超级用户权限，完全控制目标系统。"
published = "1999-02-24T05:00:00.000"
remediation = "升级 HP-UX 至 10.x 或更高版本，该漏洞已在后续版本中修复。如无法升级，可移除或禁用 HP DCE/9000 的 Camera 组件（执行 `/usr/sbin/swremove HP-Camera`），并限制本地用户对 DCE 服务的访问权限作为临时缓解措施。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "HP HP-UX DCE/9000 摄像机组件本地权限提升漏洞"
updated = "2026-06-16T21:50:01.920"

