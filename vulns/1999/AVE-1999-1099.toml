[basic]
description = "IBM AIX 4.3.2 之前版本中的 snap 命令存在不安全的临时文件创建漏洞。snap 命令在 /tmp 目录下创建 ibmsupt 临时目录后未设置严格的访问权限，且执行 snap -a 数据收集操作后不会清理该目录。本地攻击者可利用此漏洞，通过在 root 用户执行 snap -a 之前，预先在 /tmp/ibmsupt/general/ 路径下创建 passwd 文件；当 snap 以 root 权限运行时，会将系统 shadow 密码文件内容写入该预置文件，导致敏感凭据泄露。该漏洞影响 AIX 4.2.1 及更早版本，CVSS v2.0 评分 10.0，危害严重。"
published = "1999-02-17T05:00:00.000"
remediation = "升级 IBM AIX 至 4.3.2 或更高版本，该版本已修复 snap 命令的临时文件权限问题。如无法升级，可手动在运行 snap -a 前删除 /tmp/ibmsupt 目录，或限制本地用户对 /tmp 目录的写入权限作为临时缓解措施。"
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "IBM AIX snap 不安全的临时文件创建漏洞"
updated = "2026-06-16T21:50:22.220"

