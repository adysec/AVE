[basic]
description = "SuiteCRM 的 responseEntryPoint 接口存在 SQL 注入漏洞，攻击者无需身份认证即可通过构造特制的 HTTP GET 请求，向 event、delegate 等参数注入恶意 SQL 语句，利用 UNION SELECT 与时间盲注（SLEEP 函数）技术窃取数据库敏感信息。该漏洞影响 SuiteCRM 多个版本，攻击复杂度低，危害较大。"
published = "0723"
remediation = "立即升级 SuiteCRM 至最新稳定版本（7.15.1 或 7.14.9），这两个版本已修复多项安全漏洞。在升级前，可在 Web 服务器（如 Nginx/Apache）层面添加规则，拦截对 /index.php?entryPoint=responseEntryPoint 的请求中包含 UNION、SLEEP 等 SQL 注入特征的参数，作为临时缓解措施。同时建议对 entryPoint 处理函数中的输入参数实施严格的类型校验和参数化查询，防止 SQL 注入。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "SuiteCRM responseEntryPoint 存在 SQL 注入漏洞"
updated = "0723"

