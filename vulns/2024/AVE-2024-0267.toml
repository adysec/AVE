[basic]
description = "东华医疗协同办公系统存在任意文件下载漏洞，由于系统对templateFile接口的template_name参数未进行有效的路径过滤与校验，导致攻击者可通过路径遍历方式（如../../WEB-INF/web.xml）下载服务器上的任意敏感文件，包括配置文件、数据库连接信息等。攻击者无需身份认证即可利用该漏洞，攻击成本低且危害较大，可能导致服务器核心信息泄露，进而引发更深入的攻击。受影响版本包括东华医疗协同办公系统的多个历史版本，建议用户尽快升级或部署安全防护措施。"
published = "0819"
remediation = "对 template_name 参数进行路径遍历过滤，禁止包含 `../` 等目录跳转字符；采用白名单机制仅允许访问指定模板目录下的文件；建议联系厂商获取安全补丁或升级至最新版本。如无法立即修复，可在 WAF 层面拦截包含 `../` 的请求作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "东华医疗协同办公系统任意文件下载漏洞"
updated = "0819"

