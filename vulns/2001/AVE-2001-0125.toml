[basic]
description = "nvi（一款 vi 文本编辑器克隆）1.79 之前版本中存在格式化字符串漏洞。当用户使用 nvi 打开或处理包含格式化字符串占位符（如 %s、%n 等）的特制文件名时，程序未对文件名中的格式化字符串进行正确过滤，导致攻击者可利用该漏洞以当前用户权限执行任意代码。本地攻击者只需构造一个包含恶意格式化字符串的文件名并诱使目标用户（或通过自动化脚本）使用 nvi 打开该文件，即可触发漏洞，实现权限提升。该漏洞影响 nvi 1.79 之前的所有版本，CVSS v2.0 评分 7.2，危害等级高。"
published = "2001-12-31T05:00:00.000"
remediation = "升级 nvi 至 1.79 或更高版本以修复格式化字符串漏洞。如无法升级，可限制受影响用户对 nvi 的执行权限，或移除 nvi 的 setuid 位作为临时缓解措施。"
score = 7.2
severity = "HIGH"
sources = ["osv"]
title = "nvi 格式化字符串本地权限提升漏洞"
updated = "2026-06-16T21:56:30.767"

