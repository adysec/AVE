[basic]
description = "Standard & Poor's ComStock 中的 mcsp 客户端站点处理系统（MultiCSP）在安装时默认创建了多个账户，这些账户未设置密码或使用了极易猜测的默认密码。该漏洞影响 ComStock 4.2.4 版本相关部署环境，攻击者在能够访问目标系统的网络条件下，可利用这些弱凭证直接登录系统，进而获取未授权访问权限并执行命令。由于默认凭证广泛存在且无需任何技术能力即可利用，危害等级极高，CVSS 评分达到 10.0。"
published = "2000-01-31T05:00:00.000"
remediation = "立即为 MultiCSP（mcsp Client Site Processor）系统中所有默认账户设置强口令，删除或禁用无密码及使用弱默认口令的账户；升级到 Standard & Poor's ComStock 4.2.4 之后的修复版本，限制该系统仅允许受信任主机通过防火墙/ACL 访问，并定期审计账户与登录日志。"
score = 10
severity = "CRITICAL"
sources = ["cve"]
title = "标准普尔 ComStock 4.2.4 多账户默认弱口令导致命令执行漏洞"
updated = "2026-06-16T21:51:01.183"

