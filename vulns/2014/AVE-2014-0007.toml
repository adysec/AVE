[basic]
description = "Titan FTP Server 10.40 build 1829之前版本的Web界面存在目录遍历漏洞。远程攻击者可通过向src参数传递包含`..`（点点）的路径，以Properties动作访问任意主文件夹的属性信息，导致敏感信息泄露。该漏洞影响Titan FTP Server 10.40之前版本，CWE-22目录遍历类型，攻击者无需身份认证即可利用。"
published = "2014-04-29T10:37:03.810"
remediation = "升级 Titan FTP Server 至 10.40 build 1829 或更高版本，该版本已修复目录遍历漏洞。如无法立即升级，可在 Web 界面配置中限制 src 参数路径访问范围，禁止包含 `../` 的请求，或通过反向代理规则过滤包含目录遍历特征的 URL 请求作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["nuclei"]
title = "Titan FTP Server 目录遍历漏洞"
updated = "2026-06-17T00:05:38.917"

