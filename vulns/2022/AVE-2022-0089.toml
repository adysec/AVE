[basic]
description = "Linux 内核 tap 驱动中存在空指针解引用漏洞。在 tap_get_user 函数中，调用 virtio_net_hdr_to_skb 时 skb->dev 尚未赋值（该字段在调用后才设置），而该函数内部会调用 dev_parse_header_protocol 访问 skb->dev 指针，从而触发空指针解引用导致内核崩溃。攻击者可通过向受影响系统发送特制的网络数据包触发此漏洞，造成拒绝服务。该漏洞影响 Linux 内核，CVSS 评分 5.5，危害等级中等。"
published = "2025-06-18T11:15:36.173"
remediation = "立即升级 Linux 内核至 5.10.258、5.15.209 或 6.0 及以上版本，各长期支持分支均已包含该补丁。若无法升级，可手动合入补丁 4f61f133f354（将 drivers/net/tap.c 中 skb->dev 赋值移至 virtio_net_hdr_to_skb 调用前）并重新编译内核模块。作为临时缓解措施，可禁用 tap 模块（modprobe -r tap）或停止使用依赖 tap 的虚拟网络设备（如 qemu/kvm 的 virtio-net 后端）。"
score = 5.5
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux Kernel TAP 驱动空指针解引用漏洞"
updated = "2026-06-17T05:22:42.250"

