[info]
author = "AVE"
description = "Detect Apache ActiveMQ Jolokia JMX-HTTP bridge endpoint exposed at /api/jolokia/ which can be leveraged for RCE (CVE-2026-34197)"
id = "POC-AVE-2026-0099"
name = "CVE-2026-34197 PoC"
severity = "high"
tags = [
    "cve-2026-34197",
    "ave-2026-0099",
]
vuln_id = [
    "CVE-2026-34197",
    "AVE-2026-0099",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/api/jolokia/"
protocol = "http"

[poc.requests.body]
content = ""
type = "raw"

[[poc.requests.matchers]]
expect = true
status = [200]
type = "status"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["jolokia"]
