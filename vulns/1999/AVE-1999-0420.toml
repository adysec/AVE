[basic]
description = "NCSA httpd 1.4.1 及更早版本存在缓冲区溢出漏洞，远程攻击者可通过向目标 Web 服务器发送特制超长请求触发该漏洞，导致缓冲区溢出，从而远程控制目标系统。该漏洞影响大量早期互联网部署的 NCSA httpd 服务器，危害等级严重，CVSS 评分 10.0。"
published = "1995-02-17T05:00:00.000"
remediation = "立即将 NCSA httpd 升级至 v1.5 及以上版本（如仍在使用），或彻底迁移至 Apache HTTP Server 2.4.x（NCSA httpd 的继承项目，已修复该缓冲区溢出漏洞）。如暂时无法迁移，应在边界防火墙上严格限制对 80 端口的非信任源访问，并禁用 CGI 脚本执行作为临时缓解措施。"
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "NCSA httpd 缓冲区溢出漏洞"
updated = "2026-06-16T21:47:58.270"

