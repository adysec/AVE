[basic]
description = "TenFour TFS Gateway SMTP 邮件服务器 3.2 版本存在缓冲区溢出漏洞，攻击者通过向 SMTP 服务的 MAIL FROM 命令参数发送超过 128 字节的恶意数据，触发栈缓冲区溢出，可导致邮件服务崩溃甚至执行任意代码。攻击无需身份认证，仅需网络可达目标服务器的 25 端口即可实施远程利用。"
published = "1999-09-02T04:00:00.000"
remediation = "立即将 TenFour TFS SMTP Server 升级至 4.0 或更高版本。由于该产品已停止维护且 Windows NT 平台已不再受支持，建议迁移至现代邮件服务器（如 Exchange Server、Postfix 或 hMailServer）。临时缓解措施：在防火墙层面限制仅信任网络可访问 TCP 25 端口，并对 SMTP MAIL FROM 命令输入长度实施网关级过滤。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "TenFour TFS Gateway SMTP 邮件服务器缓冲区溢出漏洞"
updated = "2026-06-16T21:50:36.473"

