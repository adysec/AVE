[basic]
description = "LuaJIT 2.1 及之前版本与 OpenRusty luajit2 v2.1-20240314 之前版本中存在空指针解引用漏洞。当 JIT 编译器对 NULL metatable 执行 IR_FSTORE 指令的 unsinking 优化时，由于未正确检查空指针条件，攻击者可通过构造特制的 Lua 脚本触发该漏洞，导致目标应用程序崩溃，造成拒绝服务（DoS）。该漏洞影响广泛使用 LuaJIT 的 Web 服务器、游戏引擎及嵌入式系统，CVSS 评分 7.5，危害等级高。"
published = "2025-07-07T17:15:27.403"
remediation = "升级 OpenRusty luajit2 至 v2.1-20240314 及以上版本（该版本已修复 IR_FSTORE 对 NULL metatable 的取消下沉问题）。使用上游 LuaJIT 的项目应更新至包含该修复的最新 2.1 分支提交。无法立即升级时，可限制不可信 Lua 脚本的执行权限，避免传递 NULL metatable 触发漏洞造成服务崩溃。"
score = 7.5
severity = "HIGH"
sources = ["msrc"]
title = "LuaJIT luajit2 空指针解引用拒绝服务漏洞"
updated = "2026-06-17T07:15:39.060"

