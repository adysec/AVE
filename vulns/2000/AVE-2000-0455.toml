[basic]
description = "West Street Software 开发的 LocalWEB HTTP Server 1.2.0 存在缓冲区溢出漏洞。远程攻击者无需身份认证即可通过向目标服务器发送超长的 GET 请求，触发缓冲区溢出，导致服务进程崩溃进而造成拒绝服务。该漏洞 CVSS 评分为 6.4，危害等级中危，影响 LocalWEB HTTP Server 1.2.0 版本。目前官方已停止维护，建议用户迁移至其他受支持的 Web 服务器软件。"
published = "2000-07-05T04:00:00.000"
remediation = "该软件已停止维护且厂商不再提供更新补丁，建议立即迁移至现代活跃维护的 Web 服务器（如 Apache HTTP Server 或 Nginx）。如无法立即迁移，可在反向代理或 WAF 层面配置规则，拦截长度超过 4096 字节的 GET 请求 URI，以此缓解基于长请求的拒绝服务攻击。同时建议在防火墙层面限制仅允许可信 IP 访问该服务端口。"
score = 6.4
severity = "MEDIUM"
sources = ["cve"]
title = "West Street Software LocalWEB HTTP Server 1.2.0 缓冲区溢出漏洞"
updated = "2026-06-16T21:52:01.340"

