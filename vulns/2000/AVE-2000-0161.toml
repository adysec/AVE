[basic]
description = "ircII 4.4 版本 IRC 客户端存在缓冲区溢出漏洞，远程攻击者可通过向目标用户发送精心构造的 DCC 聊天请求触发该漏洞，导致在受害者系统上执行任意命令。该漏洞影响 Michael Sandrof 开发的 ircII 4.4 及更早版本，需目标用户接受 DCC 连接请求后方可利用，CVSS 评分 5.1，危害等级中危。"
published = "2000-03-10T05:00:00.000"
remediation = "升级 ircII 至 4.4-8 或更高版本，该漏洞已在后续版本中修复。如无法升级，可在客户端配置中禁用 DCC 功能（如设置 set dcc_chat off）作为临时缓解措施。同时建议迁移至维护更活跃的 IRC 客户端如 irssi 或 WeeChat。"
score = 5.1
severity = "MEDIUM"
sources = ["epss"]
title = "Michael Sandrof IrcII 远程缓冲区溢出漏洞"
updated = "2026-06-16T21:51:10.400"

