[basic]
description = "Netwin Netauth 4.2e 及更早版本中的 netauth.cgi 程序存在目录遍历漏洞，远程攻击者无需身份认证即可通过在 URL 中构造 `../` 序列绕过路径限制，读取服务器上的任意文件（如 `/etc/passwd` 等敏感文件）。该漏洞源于程序未对用户提交的文件路径参数进行充分过滤和规范化处理，攻击者只需向目标 Web 服务发送特制的 HTTP 请求即可利用。"
published = "2000-10-20T04:00:00.000"
remediation = "升级 Netwin Netauth 至 4.2e 之后的最新版本，修复 netauth.cgi 对用户输入路径的过滤缺陷。若无法升级，在 Web 服务器层面配置重写规则，拦截包含 `..` 的 URL 请求，或限制 netauth.cgi 的访问来源 IP 范围作为临时缓解。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Netwin Netauth 目录遍历漏洞"
updated = "2026-06-16T21:52:28.203"

