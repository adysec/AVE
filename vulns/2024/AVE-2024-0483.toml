[basic]
description = "OpenSSL 的 RFC7250 原始公钥（RPK）认证实现存在安全缺陷，当 TLS 客户端启用 SSL_VERIFY_PEER 验证模式且服务器发送的 RPK 与预期公钥不匹配时，握手未按预期中止，导致客户端无法感知服务器身份验证失败。攻击者可在中间人位置利用此缺陷绕过认证，实施中间人攻击。该漏洞影响 OpenSSL 3.2 及以上版本（FIPS 模块不受影响），CVSS 评分 6.3，危害等级中危。"
published = "2025-02-11T16:15:38.827"
remediation = "立即升级 OpenSSL 至 3.4.1（3.4 分支）、3.3.3（3.3 分支）或 3.2.4（3.2 分支）版本，其中包含针对 RPK 握手验证失败的修复。若无法立即升级，作为临时缓解措施，可禁用服务器端 Raw Public Key（RPK）功能（RPK 默认关闭，无需额外操作），或在客户端调用 SSL_get_verify_result() 手动检查验证结果。"
score = 6.3
severity = "MEDIUM"
sources = ["msrc"]
title = "OpenSSL RFC7250 原始公钥服务器认证绕过漏洞"
updated = "2026-06-17T07:00:30.890"

