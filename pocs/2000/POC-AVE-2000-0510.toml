[info]
author = "AVE"
description = "检测 Netscape Communicator 4.x JPEG 注释堆溢出漏洞。通过构造包含非法长度字段（值为1）的 JPEG 注释内容的恶意图片，诱使用户访问包含该图片的网页，触发堆内存破坏导致拒绝服务。"
id = "POC-AVE-2000-0510"
name = "Netscape Communicator JPEG Comment Heap Overflow PoC"
severity = "medium"
tags = ["cve-2000-0655"]
vuln_id = [
    "CVE-2000-0655",
    "AVE-2000-0510",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/20098.jpg"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["JFIF"]
