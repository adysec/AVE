[basic]
description = "GNOME esound（Enlightened Sound Daemon）0.2.19 及更早版本在创建 Unix 域套接字时存在竞争条件漏洞。本地攻击者可通过符号链接攻击，在套接字创建与使用的窗口期间替换目标文件，从而修改任意文件或目录的权限，实现本地权限提升。该漏洞攻击复杂度低，但需本地用户权限，CVSS 评分 6.2，危害等级中危。"
published = "2000-11-14T05:00:00.000"
remediation = "升级 GNOME esound 至 0.2.20 或更高版本，该版本修复了 Unix 域套接字创建中的 TOCTOU 竞争条件。长期解决方案是迁移至 PulseAudio 或 PipeWire 等现代音频服务，淘汰 esound 守护进程。在无法升级的环境中，可使用文件系统访问控制（如 SELinux/AppArmor 策略）限制 esound 对 /tmp/.esd 目录的访问，降低 symlink 攻击面。"
score = 6.2
severity = "MEDIUM"
sources = ["exploitdb"]
title = "GNOME esound Unix Domain Socket 竞争条件漏洞"
updated = "2026-06-16T21:52:37.687"

