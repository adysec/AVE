[basic]
description = "Palm OS 3.5.2 及更早版本使用弱加密算法（基于 XOR 的简单加密）存储用户密码，具有物理设备访问权限的攻击者可通过直接读取设备存储器中的加密密码数据，利用加密算法的弱点进行破解，从而获取解密后的密码并完全控制目标设备。该漏洞影响所有运行 Palm OS 3.5.2 及之前版本的 Palm 设备，CVSS 评分 4.6，危害等级中等。由于攻击需要物理接触设备，实际利用场景受限，但设备丢失或被盗时会导致用户数据泄露风险。"
published = "2000-12-11"
remediation = "升级 Palm OS 至 3.5.3 或更高版本，该版本采用更强的加密算法存储用户密码。对于无法升级的设备，可安装第三方加密应用对密码数据库进行二次加密保护，同时启用设备自动锁定功能并设置复杂密码以降低物理接触攻击风险。注意该漏洞于 2000 年公开，Palm 官方已停止支持相关产品。"
score = 4.6
severity = "MEDIUM"
sources = [
    "cve",
    "exploitdb",
]
title = "Palm OS 3.5.2 弱加密漏洞"
updated = "2026-06-16"

