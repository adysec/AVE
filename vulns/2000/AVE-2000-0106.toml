[basic]
description = "War FTP daemon (warftpd) 1.70 及 1.67b2 版本的宏功能存在安全缺陷，本地或远程攻击者可通过向目标 FTP 服务发送特制的宏命令，绕过权限限制读取任意文件或执行系统命令。该漏洞无需认证即可利用，攻击复杂度低，CVSS 评分 10.0，危害等级严重。目前厂商已停止维护，建议用户迁移至其他受支持的 FTP 服务器软件。"
published = "2000-01-06T05:00:00.000"
remediation = "立即升级 War FTP Daemon 至 1.72 或更高版本，该版本已修复宏功能中的输入验证缺陷。若无法升级，在服务端配置文件中禁用宏解析功能（MacrosEnabled=false），并在防火墙中限制对 21 端口的访问为仅受信任 IP 段。同时避免将 FTP 服务暴露在公网。作为进一步缓解措施，建议迁移至更活跃维护的 FTP 服务端软件如 vsftpd。"
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "War FTP 远程代码执行与任意文件读取漏洞"
updated = "2026-06-16T21:50:53.137"

