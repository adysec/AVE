[basic]
description = "Adobe Flash Player 存在 Use-After-Free 释放后使用漏洞（CVE-416），源于 ByteArray 与 Workers 组件交互时内存管理不当，攻击者可构造恶意 Flash 内容触发悬空指针引用，导致任意代码执行。影响范围覆盖 Windows/OS X 平台 13.0.0.269 之前版本、14.x 至 16.x 16.0.0.305 之前版本，以及 Linux 平台 11.2.202.442 之前版本。攻击向量为网络远程攻击（CVSS 3.1 AV:N/AC:L/PR:N/UI:N），无需认证与用户交互，CVSS 评分 9.8（CRITICAL）。该漏洞于 2015 年 2 月已在野利用（CISA KEV 目录收录），攻击者可通过诱导受害者访问嵌入恶意 Flash 的网页实现远程代码执行（RCE），Metasploit 已集成利用模块（ExploitDB-36579）。Adobe 已发布安全更新修复，建议升级至 Flash Player 16.0.0.305 或更高版本（Linux 升级至 11.2.202.442），并建议彻底卸载 Flash Player 以规避后续风险。"
published = "2015-02-02T19:59:00.053"
remediation = "建议立即升级 Adobe Flash Player 到 16.0.0.305 或更高版本（如果使用 Windows/OS X），或升级到 11.2.202.442 或更高版本（如果使用 Linux），这些版本修复了该未授权访问漏洞。如无法立即升级，可在防火墙中禁用 Flash 插件以临时缓解风险，并优先迁移到使用 HTML5 技术的现代 Web 浏览器和 Web 应用，以完全消除 Flash 攻击面。"
score = 9.8
severity = "CRITICAL"
sources = ["kev"]
title = "Adobe Flash Player 释放后使用漏洞"
updated = "2026-06-17T00:19:58.420"

