[basic]
description = "用友 NC 的 IMetaWebService4BqCloud 数据源接口存在 SQL 注入漏洞，远程攻击者可通过向 /uapws/service/uap.pubitf.ae.meta.IMetaWebService4BqCloud 端点发送特制的 POST 请求，在未授权的情况下将恶意 SQL 语句注入后端数据库执行，导致数据库敏感信息泄露、数据篡改甚至服务器被控制。该漏洞影响用友 NC 系列产品，危害严重。"
published = "0714"
remediation = "立即升级用友 NC 至官方最新安全补丁版本（NC6.5 及以上安装 2025 年安全补丁包），修复 IMetaWebService4BqCloud 接口未授权 SQL 注入问题。如无法立即升级，通过 WAF 规则拦截 POST /uapws/service/uap.pubitf.ae.meta.IMetaWebService4BqCloud 请求中的 SQL 注入特征 payload，并在网络层面限制该接口仅允许可信管理 IP 访问。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "用友 NC IMetaWebService4BqCloud 数据源 SQL 注入漏洞"
updated = "0714"

