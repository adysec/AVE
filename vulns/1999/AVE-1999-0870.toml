[basic]
description = "Windows NT 系统的 Winlogon 注册表项中 ShutdownWithoutLogon 键值默认设置为启用，允许拥有物理接触权限的未授权用户直接关闭系统而无需登录认证。该漏洞源于系统默认安全配置不当，攻击者仅需物理访问目标主机即可触发关机操作，导致系统可用性受损。影响 Windows NT 系列系统，CVSS 评分 4.9，危害等级中危。建议管理员通过注册表或组策略禁用此功能以降低风险。"
published = "1999-01-01T05:00:00.000"
remediation = '在注册表 `HKEY_LOCAL_MACHINE\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Winlogon` 中将 `ShutdownWithoutLogon` 值设为 `0`（REG_SZ），或通过组策略「计算机配置→Windows 设置→安全设置→本地策略→安全选项」启用「关闭系统：仅允许已登录的用户使用关机权限」。'
score = 4.9
severity = "MEDIUM"
sources = ["avd"]
title = "Microsoft Windows NT Winlogon 关闭系统无需登录漏洞"
updated = "2026-06-16T21:48:41.887"

