[basic]
description = "AN-HTTPd 1.2b 自带的示例 CGI 脚本（test.bat、input.bat、input2.bat、envout.bat）未对用户输入进行有效过滤，远程攻击者可通过向这些脚本提交包含 shell 元字符（如管道符、分号等）的恶意请求，在服务器端执行任意系统命令。该漏洞影响 AN-HTTPd 1.2b 版本，CVSS 评分 7.5，危害等级高，攻击无需身份认证，利用难度低。"
published = "1999-11-02T05:00:00.000"
remediation = "立即删除 AN-HTTPd 安装目录下的 test.bat、input.bat、input2.bat、envout.bat 等示例 CGI 脚本，或升级到已修复该问题的最新版本。如无法升级，在 Web 服务器配置中禁止 .bat 文件作为 CGI 执行，并限制 CGI 目录仅允许必要的脚本运行。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "AN-HTTPd 1.2b CGI 远程命令执行漏洞"
updated = "2026-06-16T21:49:23.150"

