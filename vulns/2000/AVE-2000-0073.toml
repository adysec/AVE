[basic]
description = 'Microsoft Office 套件中的文档转换工具在处理日语、韩语及中文 Word 5 格式文档时存在缓冲区溢出漏洞，即"格式转换数据异常"漏洞。未经身份验证的远程攻击者可构造特制的畸形文档，诱使用户使用 Office 或相关转换工具打开该文件，即可触发缓冲区溢出并在目标系统上执行任意命令。该漏洞影响 Word、PowerPoint 等 Office 组件及 Office 转换工具包，攻击者利用该漏洞可实现远程代码执行，完全控制受影响的系统。攻击条件为攻击者需要诱骗用户打开恶意构造的文档文件。'
published = "2000-01-20T05:00:00.000"
remediation = "安装 Microsoft 安全公告 MS00-002 补丁（KB249881），将 Microsoft Word 97/98/2000、PowerPoint 97/2000 及 Office Converter Pack 2000 的日文、韩文、中文版本升级至修复版本。建议通过 Windows Update 或 Microsoft 下载中心获取 Word 5 文档转换工具补丁程序；如无法立即安装补丁，可暂时禁用或卸载 Office 中的 Word 5 格式转换功能作为缓解措施。"
score = 7.2
severity = "HIGH"
sources = ["cve"]
title = "Microsoft Office Word/PowerPoint 文档转换器缓冲区溢出代码执行漏洞"
updated = "2026-06-16T21:50:58.527"

