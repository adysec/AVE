[basic]
description = "InoculateIT 4.53 及可能其他版本的 MS Exchange Server 防病毒选项仅扫描 Microsoft Exchange 服务器的收件箱文件夹树，当用户邮件规则将邮件移动到其他邮箱时，病毒可绕过检测。攻击者利用此设计缺陷，通过将含病毒邮件移出收件箱即可逃避扫描，导致系统被感染。该漏洞影响 InoculateIT 4.53 及可能更早版本，CVSS 评分 7.5，危害等级高。"
published = "1999-05-12T04:00:00.000"
remediation = "升级 InoculateIT 至 4.53 以上版本，确保 AV 选项配置为扫描所有 Exchange 邮箱文件夹而非仅收件箱。如厂商已停止支持，建议迁移至其他支持全邮箱扫描的防病毒方案（如 Microsoft Defender for Office 365），并禁用自动移动邮件的用户规则作为临时缓解措施。"
score = 7.5
severity = "HIGH"
sources = ["cve"]
title = "Computer Associates InoculateIT MS Exchange Server 选项病毒绕过检测漏洞"
updated = "2026-06-16T21:50:17.480"

