[basic]
description = "Microsoft Windows Script Host 5.1/5.5 中存在文件泄露漏洞。远程攻击者可通过 Internet Explorer 浏览器调用 GetObject JavaScript 函数与 htmlfile ActiveX 对象，绕过脚本宿主的安全限制，读取目标系统上的任意文件内容。该漏洞影响 Windows Script Host 5.5 及更早版本、Internet Explorer 5.5 及更早版本，攻击者无需身份认证，仅需诱导用户访问恶意网页即可触发，无需任何用户交互操作。"
published = "2001-06-02T04:00:00.000"
remediation = "安装 Microsoft 安全公告 MS01-015 提供的补丁 (2001年3月发布)，或升级至 Internet Explorer 6.0 及以上版本。如无法安装补丁，可在 Internet 安全区域中禁用 ActiveX 控件和活动脚本运行权限，或通过注册表禁用 htmlfile ActiveX 对象作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Microsoft Internet Explorer Windows Script Host 文件读取漏洞"
updated = "2026-06-16T21:53:45.903"

