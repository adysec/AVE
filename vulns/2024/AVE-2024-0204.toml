[basic]
description = "IP 网络广播服务平台的远程升级接口 /api/v2/remote-upgrade/upload 存在任意文件上传漏洞。该接口在处理 multipart/form-data 上传请求时未对上传文件的类型、路径及内容进行有效校验，攻击者可在无需身份认证的情况下，向目标系统发送特制的 HTTP POST 上传请求，将包含恶意代码的脚本文件（如 webshell）写入服务器 Web 根目录等可执行路径。成功利用后，攻击者可远程访问所上传的文件并执行任意服务端代码，从而完全控制目标服务器，造成远程代码执行（RCE）。该漏洞影响部署并暴露该广播服务平台且未修复版本的设备和系统，攻击仅需网络可达目标服务端口并构造合法格式的上传报文即可触发，危害程度高。"
published = "0812"
remediation = "该 IP 网络广播服务平台的 /api/v2/remote-upgrade/upload 接口未对上传文件做类型与路径校验，攻击者可上传恶意脚本实现远程代码执行。建议立即联系厂商获取并升级到已修复该接口鉴权与文件校验逻辑的最新固件版本；升级前可在反向代理或防火墙处临时封禁该接口路径的外网访问，并限制管理端口仅允许内网可信 IP 访问，同时关闭不必要的 remote-upgrade 功能。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
