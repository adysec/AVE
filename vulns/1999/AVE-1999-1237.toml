[basic]
description = "wu-ftpd 与 BSDI ftpd 在处理 FTP 命令时存在争用条件（race condition）漏洞。当远程攻击者向受影响 FTP 服务器发送特制的 SITE EXEC 命令时，由于程序在权限校验与命令执行之间存在时序竞争窗口，攻击者可利用该竞态条件绕过权限限制，从而在目标系统上以 root 用户身份执行任意命令。该漏洞影响部署了存在缺陷版本的 wu-ftpd 及 BSDI ftpd 的服务器，攻击仅需网络可达目标 FTP 服务且具备匿名或低权限访问能力即可发起，危害严重，可导致服务器被完全控制。"
published = "1997-09-23T04:00:00.000"
remediation = "建议升级 wu-ftpd 至 2.6.0 或更高版本，或升级 BSDI ftpd 至修补版本；若无法立即升级，可在 ftpaccess 配置中禁用 SITE EXEC 命令，或在防火墙层面限制 FTP 服务仅对可信 IP 开放，必要时暂停 FTP 服务作为临时缓解。"
score = 7.6
severity = "HIGH"
sources = ["avd"]
title = "Wu-FTPD 和 BSDI FTPD 竞争条件漏洞"
updated = "2026-06-16T21:49:24.103"

