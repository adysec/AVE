[basic]
description = "Microsoft Internet Explorer 4 中的 WebBrowser ActiveX 控件存在信息泄露漏洞，远程攻击者可通过构造恶意网页并诱导用户访问，利用该控件读取目标用户系统剪贴板中的敏感内容（如密码、文本等）。该漏洞攻击复杂度较高，需用户交互（访问恶意站点），CVSS 评分 2.6，危害等级低。"
published = "1999-02-02T05:00:00.000"
remediation = "升级到现代浏览器（如 Edge/Chrome/Firefox），IE 4 已停止支持且不再发布安全更新。如需在受限环境中使用旧版 IE，通过注册表为 WebBrowser ActiveX 控件设置 kill bit（CLSID: {8856F961-340A-11D0-A96B-00C04FD705A2}），或禁用 Internet 区域的 ActiveX 功能以阻止恶意网站读取剪贴板内容。"
score = 2.6
severity = "LOW"
sources = ["epss"]
title = "Microsoft Internet Explorer 4 剪贴板信息泄露漏洞"
updated = "2026-06-16T21:50:28.370"

