[basic]
description = "free internet chess server（FICS）所配套的 xboard 客户端程序 fics_program 存在缓冲区溢出漏洞。该程序的代码在处理来自远程服务器的棋局数据时，未对输入长度进行边界检查，将不受信任的数据直接拷贝至固定大小的栈缓冲区，从而触发缓冲区溢出。未经身份认证的远程攻击者只需在 FICS 服务器上构造并发送特制的恶意棋局或聊天消息，即可在连接该服务器的 xboard 客户端进程地址空间内覆盖返回地址或相邻内存，进而可能实现任意代码执行。该漏洞影响使用存在缺陷版本 fics_program/xboard 的客户端，攻击条件为受害者需连接恶意或被控制的 FICS 服务器，利用方式是通过网络发送超长畸形数据触发溢出。"
published = "1999-11-29T05:00:00.000"
remediation = "移除了所有用户输入的棋谱数据文件（*.pgn、*.epi文件），并删除legacy协议配置，同时确保程序运行在最低权限账户下，通过iptables配置网络防火墙限制对chess服务器的访问，仅保留允许的客户端IP地址，并使用IDS监控端口2312的异常流量。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Free Internet Chess Server (FICS) xboard 缓冲区溢出漏洞"
updated = "2026-06-16T21:49:10.930"

