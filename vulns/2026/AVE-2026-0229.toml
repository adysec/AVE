[basic]
description = "Cursor for Windows 在启动及运行过程中会自动从工作区目录解析并执行 git.exe。攻击者可在仓库根目录放置恶意的 git.exe 文件，当开发者使用 Cursor 打开该仓库时，IDE 会在无任何用户交互和提示的情况下自动执行该恶意二进制文件，导致任意代码执行。该漏洞利用了不受信任的搜索路径（CWE-426），攻击复杂度低，成功利用后可获取当前用户权限下的完整控制权限。"
published = "2026-07-17"
remediation = 'Cursor 官方尚未发布修复版本。建议在受管 Windows 系统上通过 AppLocker 或 Windows 应用程序控制策略，禁止从工作区目录（如 %USERPROFILE%\source\repos\）执行 git.exe；个人用户应在隔离环境（如 VM、Windows Sandbox）中打开不受信任的仓库。同时持续关注 Cursor 官方更新，在补丁发布后立即升级。'
score = 8.8
severity = "HIGH"
sources = [
    "hwpoc",
    "cve",
]
title = "Anysphere Cursor IDE Windows 版二进制植入远程代码执行漏洞"
updated = "2026-07-17"

