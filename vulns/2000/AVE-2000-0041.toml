[basic]
description = "NullSoft Winamp 2.10 版本的播放列表解析功能存在缓冲区溢出漏洞。该程序在读取 .pls 播放列表文件时，未对单个表项的长度进行边界校验，攻击者只需构造一个包含超长表项的恶意 .pls 文件并诱导用户打开，即可触发栈缓冲区溢出，进而在客户端上下文中执行任意命令。该漏洞影响 Winamp 2.10 客户端，攻击需依赖社会工程手段使用户加载特制播放列表，成功利用可导致远程代码执行与系统被控。"
published = "2000-01-04T05:00:00.000"
remediation = "立即将 Winamp 客户端升级到 2.10a 或更高版本，该版本已修复 .pls 播放列表文件条目长度边界检查缺陷，可防止远程攻击者通过超长条目触发缓冲区溢出执行任意命令。如短期内无法升级，切勿打开来源不明的 .pls 播放列表文件，可临时改用其他媒体播放器替代 Winamp 处理外部播放列表。"
score = 7.2
severity = "HIGH"
sources = ["cve"]
title = "NullSoft Winamp 2.10 播放列表文件缓冲区溢出漏洞"
updated = "2026-06-16T21:50:53.757"

