[basic]
description = "PHP 以 CGI 模式运行时，其 sapi/cgi/cgi_main.c 组件未能正确处理不含等号（=）的查询字符串，导致远程攻击者可通过在 URL 查询字符串中注入 PHP 命令行选项（如 -d 指定配置指令）实现任意代码执行。该漏洞影响 PHP 5.3.12 以下版本及 5.4.2 以下版本，攻击者无需认证即可远程利用，危害等级严重。官方已在 PHP 5.3.12 和 5.4.2 版本中修复此漏洞。"
published = "2012-05-11T10:15:48.043"
remediation = "立即将 PHP 升级至 5.3.12 或 5.4.2 及以上版本。如无法升级，将 PHP 运行模式从 CGI 切换为 FastCGI 或 mod_php，或在 Web 服务器层面配置 RewriteRule 拒绝包含 `-d`、`-s` 等命令行参数的 CGI 请求。同时限制 php-cgi 对外部输入的直接访问，避免将用户可控参数传递给 PHP 解释器。"
score = 9.8
severity = "CRITICAL"
sources = ["kev"]
title = "PHP PHP-CGI 远程代码执行漏洞"
updated = "2026-06-16T23:40:22.147"

