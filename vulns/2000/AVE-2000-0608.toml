[basic]
description = "Axis Communications StorPoint CD 存在身份认证绕过漏洞，远程攻击者无需任何身份验证，通过向目标设备管理 URL 中插入 `..`（点点）目录遍历序列即可绕过访问控制机制，直接获取管理员权限并对设备进行完全控制。该漏洞利用难度极低，可被远程触发，严重影响设备机密性与完整性。"
published = "2000-02-29T05:00:00.000"
remediation = "Axis StorPoint CD 产品已停止技术支持且无安全补丁，建议立即将该设备置于独立隔离网段，在防火墙上限制仅受信 IP 地址访问管理端口（80/443），同时禁用不必要的 Web 管理界面或设置 IP 访问白名单。对于仍在生产环境中使用的设备，应尽快迁移替换为受支持的现代网络存储产品，从根本上消除风险。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "Axis Communications StorPoint CD 身份认证绕过漏洞"
updated = "2026-06-16T21:51:11.463"

