[basic]
description = "OpenOffice 2.x 系列软件的 Word 文档处理功能存在整数下溢漏洞，攻击者可构造含有特殊表属性修改器的 Word 文档，利用 filter/ww8/ww8par2.cxx 文件的处理缺陷触发崩溃或执行任意代码。该漏洞影响 OpenOffice 所有 2.x 版本（尤其是 3.1 及更早版本），攻击者无需任何权限即可远程利用。攻击者通过精心构造的 Word 文档即可引发漏洞，实现对受害计算机的完全控制。该漏洞属于严重安全缺陷，已被多个安全供应商确认，并已在后续版本中修复。"
published = "2010-02-16T19:30:00.533"
remediation = "建议立即升级 OpenOffice.org 至 3.2 或更高版本（如 LibreOffice 7.x/24.x 系列）。Ubuntu 用户请执行 `sudo apt update && sudo apt upgrade openoffice.org` 升级至已修复版本；Gentoo 用户执行 `emerge -u '>=app-office/openoffice-3.2'`。无法立即升级时，建议禁用 Word 文档自动打开功能，或使用防火墙/应用层防护拦截 .doc 附件，作为临时缓解措施。"
score = 9.3
severity = "CRITICAL"
sources = ["tenable"]
title = "OpenOffice.org OpenOffice 整数下溢远程代码执行漏洞"
updated = "2026-06-16T23:11:20.433"

