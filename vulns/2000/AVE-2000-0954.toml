[basic]
description = "Check Point VPN-1/FireWall-1 4.1 及更早版本中的模块间认证机制（fwa1）存在安全漏洞，远程攻击者无需认证即可利用该机制绕过模块间通信限制，向目标系统发送特制数据包触发拒绝服务状态。该漏洞影响 Check Point Firewall-1 3.0/4.0/4.1 等版本，CVSS 评分 5.0，危害等级中等。攻击者通过网络发送恶意请求即可实施攻击，无需用户交互。"
published = "2000-11-14T05:00:00.000"
remediation = "立即升级至 Check Point 官方已修复此漏洞的后续版本（FireWall-1 4.1 SP2 及以上）。该产品版本已停止技术支持，建议迁移至受支持的 Check Point 下一代防火墙（如 R80.x 及以上版本）。临时缓解措施：在防火墙上配置访问控制策略，限制对 fwa1 模块通信端口的非信任来源访问。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Check Point VPN-1/FireWall-1 拒绝服务漏洞"
updated = "2026-06-16T21:52:31.177"

