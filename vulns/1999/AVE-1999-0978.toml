[basic]
title = "Microsoft Windows NT 4.0 源路由数据拒绝服务漏洞"
description = "Windows NT 4.0 存在远程拒绝服务漏洞，攻击者可通过发送包含超过7跳的路由信息字段（RIF）或包含重复令牌环ID的源路由数据包，导致目标系统崩溃。该漏洞无需身份验证即可远程触发，影响系统可用性。"
severity = "MEDIUM"
score = 5.0
sources = ["cve", "avd"]
published = "1999-12-31"
updated = "2026-06-16"
remediation = "安装微软官方安全补丁 KB Q179157，或升级到受支持的操作系统版本。限制对受影响系统的网络访问，过滤异常源路由数据包。"
