[basic]
description = "IBM Netfinity Remote Control（远程控制软件）的进程管理器组件以系统级权限（SYSTEM）运行，存在权限提升漏洞。本地用户可通过该进程管理器启动任意程序，导致程序以 SYSTEM 权限执行，从而获得管理员权限。攻击者只需拥有本地访问权限即可利用，无需额外认证。成功利用后可完全控制目标系统，包括读取、修改任意文件及执行任意命令。该漏洞影响 IBM Netfinity Remote Control 1.0 版本，CVSS v2.0 评分 7.2，危害等级高。"
published = "1999-05-25"
remediation = "立即升级 IBM Netfinity Remote Control 至最新版本，或迁移至受支持的远程管理方案（如 IBM Director）。限制可本地登录服务器的用户账户，仅允许管理员组成员使用该软件。在组策略中禁用进程管理器对非管理员用户的访问权限，并启用操作系统最小权限原则。由于该产品已停止维护，建议彻底替换为受支持的远程控制软件。"
score = 7.2
severity = "HIGH"
sources = [
    "cve",
    "avd",
]
title = "IBM Netfinity Remote Control 本地权限提升漏洞"
updated = "2026-06-16"

