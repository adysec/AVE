[basic]
description = "Microsoft SQL Server 6.5 的 SQLExecutiveCmdExec 账户密码使用弱加密算法进行保护，并将加密后的密码存储在注册表中可被普通用户读取的位置。本地攻击者可通过读取注册表中的 CmdExecAccount 值，利用弱加密算法的弱点进行解密，从而获取该账户的明文密码，实现权限提升。该漏洞影响 SQL Server 6.5 版本，攻击者需具备本地系统访问权限，CVSS 评分 7.2，危害等级高。"
published = "1998-06-29T04:00:00.000"
remediation = '升级到 SQL Server 7.0 或更高版本，避免将 SQLExecutiveCmdExec 账户密码以弱加密形式存储于注册表。如无法升级，通过 regedit 限制对 HKLM\SOFTWARE\Microsoft\MSSQLServer\SQLExecutive\ 注册表项的访问权限，仅允许 SYSTEM 账户读取。同时考虑改用 Windows 集成身份验证代替 SQL Server 账户认证，从根本上消除密码泄露风险。'
score = 7.2
severity = "HIGH"
sources = ["epss"]
title = "Microsoft SQL Server 6.5 权限提升漏洞"
updated = "2026-06-16T21:50:42.610"

