[basic]
description = "smbvalid/smbval SMB 认证库存在多处缓冲区溢出漏洞，远程攻击者可通过向使用该库的 Apache::AuthenSmb 等模块发送特制的超长用户名或密码参数触发缓冲区溢出，导致任意代码执行。该漏洞 CVSS 评分 10.0，危害等级严重，影响所有使用 smbval 认证库的 Web 服务。受影响的系统需升级至修复版本或禁用受影响模块。"
published = "1999-06-06T04:00:00.000"
remediation = "立即停止使用 smbvalid/smbval 认证库及 Apache::AuthenSmb 模块，升级至已修复缓冲区溢出问题的 smbvalid 2.0.3 或更高版本。如无法升级，建议迁移至 mod_auth_ntlm_winbind 或 mod_authz_smb 等替代方案，并在输入边界对用户名和密码长度进行严格校验（用户名≤64字节，密码≤128字节），同时以非特权用户运行 Apache 进程以降低利用影响。"
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "Apache smbvalid/smbval SMB 认证库缓冲区溢出远程代码执行漏洞"
updated = "2026-06-16T21:50:00.657"

