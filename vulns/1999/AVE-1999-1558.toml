[basic]
description = 'Cisco PIX 防火墙的 "established" 命令存在设计缺陷，当已经允许存在一条通道（conduit）时，该命令会允许一台主机通过任意端口连接到另一台目标主机。攻击者可在已有合法通道的基础上，绕过既定的访问控制策略，与目标主机上的任意端口建立连接。管理员若未充分理解此功能的行为机制，可能配置过于宽松的访问控制规则，导致网络安全性下降。该漏洞影响 Cisco PIX 防火墙系列产品，CVSS 评分 7.5，危害等级高。'
published = "1998-07-15T04:00:00.000"
remediation = "重新评估并严格控制 `established` 命令的使用范围，避免因理解偏差导致访问控制过于宽松。建议使用更精确的 access-list 规则替代 `established` 命令，逐条明确允许的源/目的地址和端口。若运行 PIX OS 6.x 及更早版本，请升级至 7.x 以上并迁移至基于 zone 的防火墙策略，配合 Cisco ASDM 进行可视化规则审计。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "Cisco PIX防火墙 established命令访问控制绕过漏洞"
updated = "2026-06-16T21:50:46.173"

