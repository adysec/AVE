[basic]
description = "Netopia Timbuktu Pro 2.0b650 及 5.2.1 版本的认证协议存在安全缺陷，远程攻击者无需身份认证即可通过向目标主机的 407 端口和 1417 端口建立大量连接，触发认证处理逻辑异常，导致目标服务崩溃，造成拒绝服务。该漏洞影响 Timbuktu Pro 远程控制软件，攻击者只需具备网络可达性即可发起攻击，利用成本低、攻击门槛低。"
published = "2000-02-11T05:00:00.000"
remediation = "升级到 Timbuktu Pro 2.0b650 以上版本或迁移至更高版本（如 5.2.1 之后的修复版本）。在防火墙和主机层面同时阻止对 TCP/UDP 端口 407 和 1417 的入站访问，仅允许受信任 IP 连接。若产品已停止维护，建议迁移至替代远程控制方案。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Netopia Timbuktu Pro 认证拒绝服务漏洞"
updated = "2026-06-16T21:51:05.240"

