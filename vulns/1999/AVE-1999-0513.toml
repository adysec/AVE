[basic]
description = "Oracle Database Server 7.1.4 和 7.3.3 版本的 TNSLSNR SQL*Net 监听器存在拒绝服务漏洞。攻击者可向监听器端口发送特制的畸形字符串，导致监听器进程崩溃或停止响应，从而使数据库服务不可用。该漏洞无需身份认证即可远程触发，影响范围限于上述特定 Oracle 版本。CVSS 基础评分 5.0（中等严重），主要影响可用性，不涉及机密性或完整性破坏。建议升级至修复版本或限制监听器端口的网络访问。"
published = "2001-03-12T05:00:00.000"
remediation = "升级 Oracle Database Server 至 7.3.4 或更高版本，或应用 Oracle 官方补丁补丁 NERP 补丁包。若无法立即升级，可在防火墙层面限制 TNS Listener 端口(默认 1521)仅允许受信任 IP 访问，或在 listener.ora 中配置 VALID_NODE_CHECKING_REGISTRATION=ON 并配置 INVITED_NODES 限制注册节点，作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Oracle Database Server TNSLSNR SQL*Net Listener 拒绝服务漏洞"
updated = "2026-06-16T21:49:03.073"

