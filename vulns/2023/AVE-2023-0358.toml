[basic]
description = "Linux 内核 mpi3mr 驱动在处理故障磁盘时释放了 HBA 端口数据结构的内存，但未清除相关指针引用，导致释放后使用（Use-After-Free）漏洞。当固件再次发送设备信息变更事件时，驱动会访问已释放内存，引发内存损坏和内核崩溃。本地攻击者可利用故障设备触发该漏洞实现拒绝服务，影响启用 SAS Transport Layer 支持的 Linux 系统，CVSS 评分 7.8，危害等级高。"
published = "2025-05-02T16:15:22.827"
remediation = "升级 Linux 内核至 6.1.22+、6.2.9+ 或 6.3+ 版本，或 cherry-pick 提交 1f822ae8fb2a（主线）、aa11e4b6cdb（6.1.y）、8e45183978d6（6.2.y）到当前内核并重新编译部署。如无法升级，可通过 modprobe.blacklist=mpi3mr 内核参数禁用 mpi3mr 驱动模块作为临时缓解，但将导致该 SAS HBA 不可用。"
score = 7.8
severity = "HIGH"
sources = ["msrc"]
title = "Linux 内核 mpi3mr SCSI 驱动释放后使用漏洞"
updated = "2026-06-17T06:44:10.513"

