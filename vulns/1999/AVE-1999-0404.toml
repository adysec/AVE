[basic]
description = "SunOS 操作系统的 UDP 协议栈对数据包选项的处理存在缺陷，远程攻击者可通过向目标系统发送特制的恶意 UDP 数据包触发该漏洞，导致目标系统强制重启，造成拒绝服务。该漏洞影响 SunOS 4.1psr 及更早版本，无需认证即可远程触发，危害中等。"
published = "1997-01-01"
remediation = "升级 SunOS 至 4.1.4 及以上版本即可修复此漏洞。4.1.3 用户应安装 Sun 补丁 100482-xx（4.1.3_U1 用户使用 100483-xx），补丁禁用了对恶意 UDP 选项的处理。如无法打补丁，可在边界防火墙上过滤设置了 IP 选项的入站 UDP 报文，或在主机上通过 ipfilter 规则丢弃带选项的 UDP 数据包作为临时缓解。"
score = 5.0
severity = "MEDIUM"
sources = ["avd"]
title = "Sun SunOS UDP 数据包拒绝服务漏洞"
updated = "2026-06-16"

