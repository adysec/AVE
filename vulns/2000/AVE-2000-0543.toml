[basic]
description = "Tech-Source Raptor GFX PGX32 2.3.1 的配置工具 pgxconfig 存在缓冲区溢出漏洞。本地攻击者可通过向该工具的命令行选项传递特制参数触发缓冲区溢出，从而获取目标系统的提升权限。该漏洞 CVSS 评分 7.2，危害等级高，攻击者需具有本地系统访问权限才能利用。"
published = "2000-10-20T04:00:00.000"
remediation = "该漏洞存在于 Raptor GFX PGX32 2.3.1 的 pgxconfig 配置工具中，厂商已停止维护该产品。建议立即移除 pgxconfig 的 setuid 权限（chmod u-s pgxconfig）并限制仅授权管理员可执行该程序；同时严格控制本地登录用户范围，避免向不可信用户开放系统 shell 访问权限。"
score = 7.2
severity = "HIGH"
sources = ["exploitdb"]
title = "Tech-Source Raptor GFX PGX32 配置工具缓冲区溢出权限提升漏洞"
updated = "2026-06-16T21:52:17.183"

