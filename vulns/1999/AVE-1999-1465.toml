[basic]
description = "SCO UNIX 4.2 及更早版本中的 pt_chmod 程序存在未指明安全漏洞。pt_chmod 是一个用于修改伪终端设备权限的 setuid 程序，由于对调用者权限的检查不充分，本地用户可利用该漏洞将自身权限提升至 root，从而完全控制目标系统。该漏洞 CVSS 评分 7.2，危害等级高，攻击者需具备本地访问权限，无需用户交互即可利用。"
published = "1994-11-30T05:00:00.000"
remediation = "立即应用 SCO 提供的 SSE005 安全补丁（pt_chmod Enhancement），可从 ftp.sco.com 的 /SSE/ 目录获取 sse005.tar.Z；升级至 SCO UNIX 3.2 v4.2 以上已修复版本。临时缓解措施：以 root 身份执行 chmod u-s /usr/bin/pt_chmod 移除该程序的 setuid 权限位。SCO UNIX 系列产品已停止维护，建议迁移至受支持的操作系统以保障长期安全。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "SCO UNIX pt_chmod 本地权限提升漏洞"
updated = "2026-06-16T21:50:09.070"

