[basic]
description = "该漏洞源于 Joomla!（Joomla! CMS）1.0 和 1.1 版本的 iNetLanka Multiple root 组件。攻击者可通过向 index.php 文件的控制器参数发送包含 '..' 遍历符号的恶意向请求，利用目录遍历漏洞读取目标服务器上的任意文件。由于涉及 CWE-22 目录遍历漏洞，攻击者可能获取服务器上的敏感文件（如配置文件、数据库文件等），对网站安全造成严重威胁。尽管众多 Joomla! 系统已及时打补丁，但该漏洞曾在 2010 年被广泛利用，反映了这一安全问题的影响范围和严重性。"
published = "2010-05-19T12:07:52.570"
