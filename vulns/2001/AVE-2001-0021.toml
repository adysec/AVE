[basic]
description = "Cisco Catalyst 4000/5000/6000 系列交换机 CatOS 存在内存泄漏漏洞，远程攻击者无需认证即可通过发送大量失败的 Telnet 认证请求耗尽设备内存，导致交换机拒绝服务甚至重启。该漏洞影响 CatOS 5.5.4a 及更早版本，利用方式简单，仅需重复发起 Telnet 连接并输入错误凭据即可触发。"
published = "2001-02-16T05:00:00.000"
remediation = "升级 Cisco Catalyst 交换机 CatOS 至 5.5(4b) 或更高版本（推荐 6.x 系列），以修复 Telnet 认证失败导致的内存泄漏问题。如无法升级，可在交换机上配置 ACL 限制 Telnet 访问源 IP，或改用 SSH 替代 Telnet 管理。"
score = 7.8
severity = "HIGH"
sources = ["exploitdb"]
title = "Cisco CatOS Telnet认证内存泄漏拒绝服务漏洞"
updated = "2026-06-16T21:53:32.620"

