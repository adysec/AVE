[basic]
description = "licq 是一款 Linux 平台下的 ICQ 即时通讯客户端软件，其 1.0.3 之前版本在处理 URL 时存在命令注入漏洞。远程攻击者可通过向目标用户发送包含 shell 元字符（如反引号、管道符等）的特制 URL 链接，当 licq 客户端解析并处理该恶意 URL 时，系统会执行嵌入的任意命令，导致攻击者能够在受害者主机上以 licq 进程权限执行任意代码。该漏洞无需身份认证即可远程利用，攻击复杂度低，可造成信息泄露、系统控制等严重危害。"
published = "2001-07-02T04:00:00.000"
remediation = "立即将 licq 升级到 1.0.3 或更高版本。各发行版对应操作：Red Hat Linux 用户安装 RHSA-2001-022 或 RHSA-2001-023 提供的更新包；Mandrake Linux 用户安装 MDKSA-2001-032 更新；Conectiva Linux 用户安装公告 000389 更新。如无法升级，可在 licq 配置中禁用 URL 自动解析功能，或在网络层面过滤包含 shell 元字符（如 `;` `|` `` ` `` `$`）的入站 URL 请求作为临时缓解。"
score = 7.5
severity = "HIGH"
sources = ["redhat"]
title = "licq URL shell元字符命令执行漏洞"
updated = "2026-06-16T21:54:18.700"

