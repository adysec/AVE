[basic]
description = "Microsoft Internet Explorer 5.5（Windows 98 版本）的 Web 文件夹显示功能存在特洛伊木马植入漏洞。本地用户可通过修改 Folder.htt 文件，并利用 ShellDefView ActiveX 控件中的 InvokeVerb 方法，将文件夹中列出的第一个文件指定为默认执行选项，从而植入并执行特洛伊木马程序。该漏洞影响 Windows 98 平台上的 IE 5.5，攻击者需具有本地访问权限，CVSS 评分 4.6，危害等级中危。"
published = "2000-10-20T04:00:00.000"
remediation = '升级到 Windows 2000 或更高版本操作系统，并安装 Internet Explorer 6.0 或更高版本。如无法升级系统，可手动删除或重命名 %windir%\web\Folder.htt 文件以禁用 Web 视图模式，或在文件夹选项中关闭「Web 视图」功能，改为使用传统 Windows 文件夹风格。同时建议禁用 ShellDefView ActiveX 控件的 InvokeVerb 方法，通过注册表设置相关 kill bit 来阻止该控件的调用。'
score = 4.6
severity = "MEDIUM"
sources = ["cve"]
title = "Microsoft Internet Explorer 5.5 本地木马程序植入漏洞"
updated = "2026-06-16T21:52:29.193"

