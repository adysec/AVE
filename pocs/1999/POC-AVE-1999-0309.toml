[info]
author = "AVE"
description = "检测目标是否提供利用 ImportExportFavorites 漏洞的恶意 HTML 页面"
id = "POC-AVE-1999-0309"
name = "CVE-1999-0702 PoC"
severity = "critical"
tags = ["cve-1999-0702"]
vuln_id = [
    "CVE-1999-0702",
    "AVE-1999-0309",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/poc.html"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["ImportExportFavorites"]
