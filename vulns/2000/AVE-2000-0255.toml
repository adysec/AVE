[basic]
description = "CNC Technology BizDB 1.0 的 bizdb-search.cgi 脚本存在远程命令执行漏洞。攻击者可在未经验证的情况下，通过向 dbname 参数注入 shell 元字符（如分号、管道符等）执行任意系统命令，从而完全控制目标服务器。该漏洞危害等级严重，CVSS 评分 10.0，影响 BizDB 1.0 版本，无需身份认证即可远程利用。"
published = "2000-04-12T04:00:00.000"
remediation = "立即停用 bizdb-search.cgi 脚本或限制其访问来源 IP；对 dbname 参数进行严格输入过滤，禁止 shell 元字符（; | & ` $ 等）传入；如业务需要，建议迁移至受支持的现代数据库管理应用，不再使用已停止维护的 BizDB 1.0。"
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "CNC Technology BizDB 1.0 bizdb-search.cgi 远程命令执行漏洞"
updated = "2026-06-16T21:51:24.117"

