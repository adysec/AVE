[basic]
description = "Sambar Web Server 4.2.1 存在缓冲区溢出漏洞，远程攻击者可通过向目标服务器发送超长的 HTTP GET 请求触发该漏洞，导致目标服务进程崩溃从而造成拒绝服务，在特定条件下可进一步实现远程代码执行。该漏洞无需认证即可远程利用，CVSS 评分 7.5，危害等级高。"
published = "1999-10-04T04:00:00.000"
remediation = "立即停止使用已停止维护的 Sambar Server 4.2.1，迁移至主流 Web 服务器（如 Apache HTTP Server 2.4.x、Nginx 1.x 或 Microsoft IIS）。该产品已停止更新多年，所有版本均存在已知漏洞且无官方补丁可用。迁移后需在反向代理或 WAF 层面限制 HTTP 请求长度以缓解类似缓冲区溢出风险。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "Sambar Web Server 缓冲区溢出漏洞"
updated = "2026-06-16T21:50:37.367"

