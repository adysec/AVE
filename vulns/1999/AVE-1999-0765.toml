[basic]
description = "Windows NT 和 Windows 2000 系统默认或错误配置启用了 IP 转发功能，导致非路由器或防火墙的普通主机充当网络层转发节点。远程攻击者可利用此配置缺陷，通过该主机转发数据包绕过网络访问控制策略，实现内网探测、中间人攻击或信息泄露。该漏洞影响 Windows NT 4.0 及 Windows 2000 系统，CVSS 评分 9.1，危害等级严重。修复建议为在非路由场景下禁用 IP 转发功能。"
published = "1997-01-01T05:00:00.000"
remediation = '在非路由器的 Windows NT/2000 系统上，通过注册表将 `HKEY_LOCAL_MACHINE\SYSTEM\CurrentControlSet\Services\Tcpip\Parameters\IPEnableRouter` 值设为 0，或通过网络连接属性取消勾选「启用 IP 转发」。同时建议升级至 Windows Server 2003 或更高版本以获得更完善的安全机制。'
score = 9.1
severity = "CRITICAL"
sources = ["epss"]
title = "Microsoft Windows NT 和 Windows 2000 IP 转发默认启用信息泄露漏洞"
updated = "2026-06-16T21:48:33.007"

