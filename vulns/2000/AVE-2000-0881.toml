[basic]
description = "FreeBSD 系统中 ELF 映像加载器未能正确校验 ELF 文件头格式，本地攻击者可执行精心构造的恶意 ELF 二进制程序，触发内核崩溃或资源耗尽，导致系统拒绝服务。该漏洞影响 FreeBSD 3.x/4.x/5.x 等版本，CVSS 评分 2.1，危害等级低。攻击前提是拥有本地账户权限。"
published = "2000-10-20T04:00:00.000"
remediation = "升级 FreeBSD 至 4.1.1-RELEASE 或更高版本（该版本修复了 exec_elf_imgact 函数对畸形 ELF 头部的处理），或安装 FreeBSD Security Advisory FreeBSD-SA-00:43 中提供的安全补丁。如无法升级，可通过限制本地用户执行未验证的二进制文件来缓解风险。"
score = 2.1
severity = "LOW"
sources = ["cve"]
title = "FreeBSD ELF 映像头解析本地拒绝服务漏洞"
updated = "2026-06-16T21:52:21.603"

