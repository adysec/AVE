[basic]
description = "Centrinity FirstClass Intranet Server 5.770 及 6.1 之前版本存在输入验证缺陷，远程攻击者可通过向目标邮件服务器发送包含超长 To 头部的恶意邮件，触发服务端缓冲区异常，导致邮件服务进程崩溃，造成拒绝服务。该漏洞无需认证即可利用，攻击门槛低，影响服务器可用性。"
published = "2000-06-27T04:00:00.000"
remediation = "升级 Centrinity FirstClass Intranet Server 至 6.1 或更高版本。若无法立即升级，可在邮件网关或防火墙侧设置规则过滤超长邮件头（To: 字段超过 1024 字符即拦截），以缓解拒绝服务攻击。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Centrinity FirstClass Intranet Server 长邮件头拒绝服务漏洞"
updated = "2026-06-16T21:52:01.190"

