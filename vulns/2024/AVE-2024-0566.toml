[basic]
description = "Linux 内核蓝牙子系统 btusb 驱动中，MediaTek 芯片组为 ISO 数据传输声明了一个专用 USB 中断接口，但在 USB 断开连接时未正确释放该接口即注销 HCI 设备，导致资源释放顺序错误。本地具有低权限的攻击者可通过物理移除 MediaTek 蓝牙 USB 适配器触发此缺陷，造成内核崩溃（Kernel Panic），导致拒绝服务。该漏洞影响使用 MediaTek 蓝牙芯片的 Linux 系统，CVSS 评分 5.5，危害等级中等。"
published = "2025-01-06T17:15:40.297"
remediation = "升级 Linux 内核至 6.12.8 或更高版本（6.13 已包含修复），或合入补丁 commit cc569d791ab2a / 489304e67087。Ubuntu 24.04 LTS 用户执行 `apt update && apt install linux-image-$(uname -r | sed 's/-generic//')-generic` 安装 USN-7381-1 更新。临时缓解措施：避免在蓝牙 ISO 数据传输过程中热拔插 MediaTek BT USB 适配器。"
score = 5.5
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux 内核 btusb 驱动 USB 断开时接口未释放导致内核崩溃漏洞"
updated = "2026-06-17T08:12:55.290"

