[basic]
description = "CRYPTOCard CRYPTOAdmin 4.1 中用于 PalmOS 的 CryptoAdmin 组件存在弱加密漏洞，其在存储用户的 PIN 码时采用了强度不足的加密算法。攻击者一旦获得目标设备上的 .PDB 数据库文件，即可通过破解其中的弱加密还原出用户 PIN 码，进而生成有效的 PT-1 令牌，实现对身份认证机制的绕过。该漏洞影响使用 CRYPTOCard CRYPTOAdmin 4.1 的 PalmOS 环境，攻击条件为攻击者需具备对本地 .PDB 文件的访问权限，利用方式为离线破解 PIN 后伪造合法认证令牌，CVSS 评分 2.1，危害等级为低。"
published = "2000-04-10T04:00:00.000"
remediation = "建议立即升级到 CRYPTOCard 官方发布的修复版本（4.1 之后已采用强加密的版本，联系厂商获取最新 CryptoAdmin 更新），替换使用弱加密存储 PIN 的旧版程序。在升级前，应避免将 CryptoAdmin 的 .PDB 数据文件存放于未受保护的设备上，通过 PalmOS 设备密码或文件加密对 .PDB 文件进行额外保护，并限制对设备的物理与同步访问，防止攻击者获取文件后离线破解 PIN 并伪造 PT-1 令牌。"
score = 2.1
severity = "LOW"
sources = ["cve"]
title = "CRYPTOCard CRYPTOAdmin for PalmOS PIN 弱加密漏洞"
updated = "2026-06-16T21:51:22.627"

