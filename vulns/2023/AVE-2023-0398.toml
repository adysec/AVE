[basic]
description = "Linux 内核 MediaTek 时钟驱动（clk-mtk.c）中存在内存泄漏漏洞。当 mtk_clk_simple_probe() 函数在执行过程中检测到 clk_data 不存在等错误条件时，未能释放先前通过 of_iomap() 映射的 I/O 内存（base），导致内核内存泄漏。本地攻击者可反复触发驱动探测错误路径，逐步耗尽系统内存资源，造成拒绝服务（DoS）。该漏洞影响使用 MediaTek 芯片组且运行受影响 Linux 内核版本的设备，CVSS 评分 5.5，危害等级中等。"
published = "2025-09-18T16:15:46.260"
remediation = "升级 Linux 内核至 6.5 及以上版本，或对应长期支持分支：6.1.x 升级至 6.1.164+，6.3.x 升级至 6.3.13+，6.4.x 升级至 6.4.4+。无法立即升级时，可应用内核稳定分支补丁（commit 847d5dd788ce、3db7285e0441、47234e19b008、2cae6a28d8c1），在 drivers/clk/mediatek/clk-mtk.c 的 mtk_clk_simple_probe() 错误处理路径中加入 free_base 释放 of_iomap 映射内存。"
score = 5.5
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux Kernel MediaTek 时钟驱动内存泄漏漏洞"
updated = "2026-06-17T06:45:17.593"

