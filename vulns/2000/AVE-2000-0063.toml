[basic]
title = "HP HP-UX aserver 本地权限提升漏洞"
description = "HP-UX 10.x/11.x 系统的 aserver 程序存在路径信任漏洞，该程序在执行时未对 PATH 环境变量进行安全校验，直接调用系统 ps 和 grep 命令。本地攻击者可通过修改 PATH 环境变量，将恶意程序替换为 ps 或 grep，从而以 aserver 进程的权限执行任意代码，实现本地权限提升。该漏洞影响 HP-UX 10.x 及 11.x 版本，CVSS 评分 7.2，危害等级高。HP 已发布安全公告修复此漏洞。"
