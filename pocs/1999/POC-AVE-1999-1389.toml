[info]
author = "ave"
description = "Apache HTTP Server 1.3.1 及更早版本存在资源耗尽型拒绝服务漏洞（sioux）。攻击者可通过发送大量具有相同名称的 MIME 头部触发服务器资源耗尽。本 PoC 通过构造含大量重复同名 MIME 头的 HTTP 请求，验证目标服务器是否在处理此类请求时出现异常延迟或连接挂起等拒绝服务迹象。"
id = "POC-AVE-1999-1389"
name = "CVE-1999-1199 Apache sioux DoS PoC"
severity = "high"
tags = ["ave-1999-1389"]
vuln_id = [
    "CVE-1999-1199",
    "AVE-1999-1389",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/"
protocol = "http"

