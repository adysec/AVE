[basic]
description = "NFS 服务的 mountd 组件存在缓冲区溢出漏洞，远程攻击者无需身份认证即可通过向目标系统发送特制的 RPC 请求触发该漏洞，成功利用后可获得目标系统的 root 权限。该漏洞主要影响 Linux 系统，包括 RedHat Linux 5.1 及 Caldera OpenLinux Standard 1.2 等版本，CVSS 评分 10.0，危害等级严重。"
published = "1998-10-12T04:00:00.000"
remediation = "升级 RedHat Linux 至 5.2 及以上版本，或 Caldera OpenLinux 至 2.2 及以上版本。如无法升级，在 /etc/exports 中使用 root_squash 选项限制 root 访问，并通过防火墙限制对 NFS 服务（端口 2049）的访问范围为仅受信任网段。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "Linux NFS mountd 缓冲区溢出远程代码执行漏洞"
updated = "2026-06-16T21:47:18.113"

