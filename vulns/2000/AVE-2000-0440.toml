[basic]
description = "KDE 1.1.2 中的 KApplication 类在处理配置文件时存在不安全文件操作漏洞，由于未对配置文件路径进行充分校验，本地攻击者可通过符号链接攻击等方式覆盖任意文件，从而提升权限至 root。该漏洞影响 KDE 1.1.2 及更早版本，CVSS 评分 7.2，危害等级高。攻击者需拥有本地系统访问权限，利用门槛较低，已存在公开利用代码。"
published = "2000-05-31T04:00:00.000"
remediation = "升级 KDE 至 2.0 及以上版本（KDE 1.x 已终止支持），或升级到 KDE 3.x 系列。如果无法升级，限制不可信用户的本地登录权限，并确保 KDE 配置文件目录（~/.kde）权限正确设置，防止非授权用户写入。建议迁移至现代桌面环境。"
score = 7.2
severity = "HIGH"
sources = ["cve"]
title = "KDE KApplication 配置文件任意文件覆盖漏洞"
updated = "2026-06-16T21:51:55.997"

