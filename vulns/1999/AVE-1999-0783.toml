[basic]
description = 'tags.<value>X Window System（X11）服务器存在访问控制配置不当漏洞。当管理员执行 "xhost +" 命令或类似操作禁用 X 服务器的访问控制机制后，未经身份认证的远程攻击者可直接连接至目标系统的 X 服务，进而查看屏幕内容、记录键盘输入、执行任意命令，完全控制用户桌面会话。该漏洞影响配置有 X11 服务的 Unix/Linux 工作站和服务器，攻击者无需凭据即可在图形界面下实施窃密与破坏操作。修复方案为启用 X 服务器的访问控制列表（ACL），通过 "xhost -" 恢复默认限制或使用 SSH 隧道加密 X11 转发。'
published = "1997-07-01T04:00:00.000"
remediation = "立即在 X server 所在主机执行 `xhost -` 或 `xhost -+` 撤销 `xhost +` 造成的全局开放访问控制，改用 `~/.Xauthority` 中的 MIT-MAGIC-COOKIE 密钥进行认证，对远程显示场景使用 `ssh -X` 或 `ssh -Y` 建立加密隧道并在允许列表中仅保留 `127.0.0.1`，同时执行 `chmod 600 ~/.Xauthority` 收紧密钥文件权限，杜绝无参数的 `xhost +`。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "X.Org X11 服务器未授权访问漏洞"
updated = "2026-06-16T21:48:35.033"

