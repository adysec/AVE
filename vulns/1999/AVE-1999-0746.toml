[basic]
description = 'SMB（Server Message Block）协议共享中存在路径遍历漏洞。由于服务端在处理SMB共享访问请求时未对".."（点点）目录跳转序列进行充分过滤和校验，未经身份认证的远程攻击者可通过在SMB共享路径中构造包含"../"的目录遍历序列，突破共享根目录限制，访问目标文件系统中的任意文件，导致敏感信息泄露。该漏洞影响范围广泛，CVSS v2.0评分为10.0，危害等级严重，攻击者无需认证即可通过网络远程利用。'
published = "1999-01-01T05:00:00.000"
remediation = "升级 Samba 至 2.0.6 或更高版本，该版本修复了 SMB 共享中路径遍历（..）导致文件系统越权访问的问题。如无法升级，在 smb.conf 中为每个共享设置 `valid users` 限制访问用户，并使用 `wide links = no` 和 `follow symlinks = no` 禁用符号链接跟随作为临时缓解措施。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "Microsoft Windows SMB 目录遍历漏洞"
updated = "2026-06-16T21:48:31.207"

