[basic]
description = "用友 NC 企业管理系统 baplink 接口存在 SQL 注入漏洞。攻击者可向 /portal/pt/baplink/content 发送特制 GET 请求，在 pk_funnode 参数中注入恶意 SQL 语句，在无需登录认证的情况下读取或篡改数据库敏感信息。该漏洞影响对外开放相关接口的用友 NC 部署，攻击门槛低、远程可利用，可能导致核心业务数据泄露。"
published = "2025-07-30"
remediation = "联系用友官方获取并安装针对 baplink 接口的安全补丁或升级至已修复版本。在应用代码中对 pk_funnode 等入参改为参数化查询或预编译语句，禁止字符串拼接 SQL。临时可在 WAF 或反向代理拦截 /portal/pt/baplink/content 路径中含单引号、UNION、SELECT、updatexml 等注入特征的请求，并限制该接口仅内网可信 IP 访问。"
score = 7.5
severity = "HIGH"
sources = ["hwpoc"]
title = "用友 NC baplink SQL注入漏洞"
updated = "2025-07-30"

