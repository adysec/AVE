[basic]
description = "Windows NT 上的某些 Web 服务器在处理 URL 时存在源文件泄露漏洞，远程攻击者通过在请求 URL 末尾添加空格字符，可绕过服务器对动态脚本页面的执行逻辑，直接读取 .asp 等活动页面的源代码。该漏洞无需身份认证即可远程利用，可能导致敏感信息（如数据库连接字符串、业务逻辑）泄露，影响大量基于 Windows NT 平台的 Web 服务器。"
published = "1999-01-01T05:00:00.000"
remediation = '升级至 Windows 2000 及以上版系统（Windows NT 4.0 已停止支持），并安装 IIS 最新安全更新；同时关闭 IIS 中的"允许源代码访问"选项，在 IIS 管理器中禁用不需要的脚本映射，并对 URL 请求实施严格的规范化过滤（如去除末尾空白字符）以防止信息泄露。如无法升级系统，在防火墙或反向代理层拦截含尾部空格的 URL 请求作为临时缓解。'
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "Microsoft Windows NT Web Server 源代码泄露漏洞"
updated = "2026-06-16T21:48:04.477"

