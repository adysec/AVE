[basic]
description = "Linux 2.0.3x 内核的 ping 命令在处理带有 -R（记录路由）选项的 ICMP 回显请求数据包时，未对 IP 记录路由选项的数据长度进行充分校验。本地攻击者可通过构造超大长度的 ICMP 数据包并指定 -R 选项发送给目标主机，触发内核内存资源耗尽，导致系统拒绝服务。该漏洞影响 2.0.34 至 2.0.38 版本的 Linux 内核，Debian 2.1 和 Red Hat 5.2 等发行版中的相应内核版本也受影响。攻击者需要本地系统访问权限才能利用此漏洞。"
published = "1999-12-08"
remediation = "将 Linux 内核升级至 2.0.39 或更高版本，或应用相应发行版提供的安全补丁。对于已停止维护的旧内核版本（如 2.0.x 系列），建议升级至受支持的 2.2.x 或更高内核系列，新版本内核已对 ICMP 记录路由选项的长度进行严格校验，防止超大 IP 选项数据包导致的资源耗尽。"
score = 5.0
severity = "MEDIUM"
sources = ["cve"]
title = "Linux Kernel 2.0.3x ping 命令记录路由选项拒绝服务漏洞"
updated = "1999-12-08"

