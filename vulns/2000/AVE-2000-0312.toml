[basic]
description = "Netopia R9100 路由器 SNMP 表格写入权限绕过漏洞。该设备在管理员已配置禁止修改 SNMP 表格的情况下，仍无法阻止已认证用户通过 SNMP 协议对设备 MIB 表格执行写入操作，导致 SNMP 访问控制策略被绕过。影响范围为运行 4.6.2 版本的 Netopia R 系列路由器（含 R9100 等型号）。攻击条件为攻击者需先通过 Telnet 或 SSH 等途径获得设备的本地认证权限，随后即可利用 SNMP SET 请求篡改 SNMP 表格中的配置项，造成路由器配置信息被非法修改，潜在影响网络设备的正常运行与安全管理。CVSS 评分为 3.6，危害等级低。"
published = "2000-05-16T04:00:00.000"
remediation = "Netopia R9100 路由器已于 2004 年随 Netopia 被 Motorola 收购后停止维护，厂商已不再提供固件更新。建议立即升级到最新可用固件版本（如有），并在 SNMP 配置中设置严格的访问控制列表（ACL），仅允许受信管理 IP 访问 UDP 161/162 端口；将 SNMP 默认 community 字符串从 public/private 改为强随机字符串；禁用 SNMP 写操作（set 操作）或降级为只读模式；如条件允许，建议更换为仍在厂商支持周期内的路由器设备。作为临时缓解措施，可在网络边界防火墙封禁对 SNMP 端口的外部访问。"
score = 3.6
severity = "LOW"
sources = ["exploitdb"]
title = "Netopia R9100 路由器 SNMP 配置绕过未授权修改漏洞"
updated = "2026-06-16T21:51:35.633"

