[basic]
description = "Unix 系统 locale 子系统中的 gettext、catopen 等函数未能正确过滤用户注入的格式化字符串，存在格式化字符串漏洞。本地攻击者可通过向受影响函数传递特制的格式化字符串参数，利用该漏洞以目标进程权限执行任意命令，实现本地权限提升。该漏洞影响使用 GNU C Library (glibc) 的 Unix/Linux 系统，CVSS 评分 10.0，危害等级严重。目前已存在公开的本地提权利用代码。"
published = "2000-11-14T05:00:00.000"
remediation = "升级 glibc 至 2.2 及以上版本（该漏洞已在 glibc 2.2 中修复）。对于 Red Hat Linux 6.x 及以下版本，安装 RHSA-2000:087 提供的更新包；对于 Debian 2.2 及以下版本，升级 libc6 至 2.1.97 以上。如无法升级，可移除本地用户对系统区域设置文件的写入权限，并限制不可信用户本地登录作为临时缓解措施。"
score = 10
severity = "CRITICAL"
sources = ["redhat"]
title = "GNU glibc locale 格式字符串注入本地权限提升漏洞"
updated = "2026-06-16T21:52:35.100"

