[basic]
description = "SGI IRIX 6.0.1 及更早版本中的 Desktop Permissions Tool（桌面权限工具）存在权限管理缺陷，本地攻击者可利用该工具修改任意文件的权限设置，从而获取对敏感系统文件的读写权限，最终实现权限提升。该漏洞影响 IRIX 5.2 和 6.0 系列版本，攻击者需拥有本地系统访问权限，无需额外认证即可利用。"
published = "1995-03-03T05:00:00.000"
remediation = "升级 IRIX 至 6.1 或更高版本以修复 Desktop Permissions Tool 权限提升漏洞。临时缓解措施：以 root 身份执行 `chmod 0 /usr/sbin/desktop_perms` 移除工具执行权限，或移除其 setuid 位 `chmod u-s /usr/sbin/desktop_perms`，限制本地用户任意修改文件权限的能力。"
score = 4.6
severity = "MEDIUM"
sources = ["avd"]
title = "SGI IRIX Desktop Permissions Tool 本地权限提升漏洞"
updated = "2026-06-16T21:50:01.407"

