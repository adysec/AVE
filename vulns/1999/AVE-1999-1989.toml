[basic]
description = "Oracle Web Listener 2.1 存在输入验证不当漏洞（CWE-20），远程攻击者可通过将 URL 中的特定字符替换为其 HTTP 十六进制编码等价字符，绕过服务端的访问控制限制，实现对受限资源的未授权访问。该漏洞无需认证即可利用，攻击复杂度低，影响 Oracle Web Listener 2.1 版本，根据 CVSS 评分 7.5 危害等级高。建议升级至安全版本或对 URL 输入实施严格的解码与校验机制。"
published = "1999-11-25T05:00:00.000"
remediation = "立即升级到 Oracle 官方修复此漏洞的后续版本（如 Oracle HTTP Server 或更高版本 Oracle Web Listener），该产品已停止维护，建议迁移至受支持的 Oracle 应用服务器。如无法升级，可在反向代理层（如 Apache/Nginx）添加 URL 规范化规则，将 HTTP 编码字符（%5f、%2e 等）解码后重新校验访问权限，防止绕过。同时，严格限制 owa_util 等敏感包的访问范围，通过防火墙或 Web 访问控制列表仅允许可信 IP 访问 /ows-bin/ 路径。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "Oracle Web Listener 安全绕过漏洞"
updated = "2026-06-16T21:50:41.440"

