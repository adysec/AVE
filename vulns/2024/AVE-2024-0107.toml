[basic]
description = "金和OA jc6版本中的Upload接口存在任意文件上传漏洞。攻击者可通过POST请求向/jc6/servlet/Upload接口发送特制的multipart/form-data数据包，在无需任何身份验证的情况下将任意文件（如JSP木马）上传至服务器upload目录，从而获得服务器控制权，实现远程代码执行。该漏洞利用难度低，危害严重。"
published = "2024-06-18"
remediation = "升级金和OA至官方发布的最新安全版本；在Web应用防火墙中配置规则拦截对/jc6/servlet/Upload的访问；限制上传目录的脚本执行权限，禁止JSP等可执行文件在upload目录下运行；对上传文件类型进行严格白名单校验，仅允许图片等安全格式。"
score = 7.5
severity = "HIGH"
sources = ["hwpoc"]
title = "金和OA jc6 Upload任意文件上传漏洞"
updated = "2024-06-18"

