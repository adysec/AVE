[basic]
description = 'Qualcomm Qpopper 2.53 及 3.0 版本在处理邮件消息时存在缺陷，未能正确识别标识消息文本结尾的换行符（\n），导致缓冲区处理异常。未经身份认证的远程攻击者可通过发送长度为 1023 个字符且以 \n 结尾的特制消息行触发该漏洞，从而造成拒绝服务或损坏邮箱数据。该漏洞影响使用 Qpopper 2.53/3.0 的邮件服务器，攻击者仅需向目标邮箱投递恶意邮件即可利用，CVSS 评分 5.0，危害等级中等。'
published = "2000-04-21T04:00:00.000"
remediation = '建议将 Qualcomm Qpopper 升级至 3.0.1 或更高版本（官方已修复 fgets 对 1023 字符行尾 \n 的解析缺陷）。若无法立即升级，可在邮件网关或防火墙侧限制单封邮件每行长度不超过 1022 字节，并部署反垃圾邮件网关过滤超长畸形邮件作为临时缓解措施。'
score = 5
severity = "MEDIUM"
sources = ["cve"]
