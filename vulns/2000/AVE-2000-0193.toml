[basic]
description = "Linux mount 与 umount 命令存在缓冲区溢出漏洞，本地攻击者可通过向 mount/umount 传递特制的超长相对路径名触发该漏洞，导致攻击者获取 root 权限，实现本地权限提升。该漏洞影响 BSD 及 Linux 系统，CVSS 评分 7.2，危害等级高。"
published = "2000-02-03T05:00:00.000"
remediation = "升级 util-linux 至 2.10f 或更高版本（或对应发行版安全补丁），此版本修复了 umount/mount 缓冲区溢出问题。临时缓解措施包括使用 nosuid 挂载选项限制 suid 二进制文件，以及移除不必要用户的 sudo 权限以限制本地攻击面。"
score = 7.2
severity = "HIGH"
sources = ["epss"]
title = "Linux mount/umount 本地缓冲区溢出权限提升漏洞"
updated = "2026-06-16T21:51:15.003"

