[basic]
description = "WordPress Doctreat Core 插件存在未授权权限提升漏洞，未认证的攻击者可通过向 `admin-ajax.php` 发送包含 `role=administrator` 参数的恶意请求，在未授权情况下将任意注册用户提升为管理员权限。该漏洞影响 Doctreat Core < 1.7.0 版本，CVSS 评分 8.8，危害等级高。建议升级至 1.7.0 及以上版本，或关闭用户自由注册功能并配置 WAF 规则拦截相关参数。"
published = "nday"
remediation = "立即将 Doctreat Core 插件升级至 1.7.0 或以上版本；在 WordPress 后台「设置→常规」中关闭「任何人可以注册」选项；在 WAF 中添加规则拦截 admin-ajax.php 请求中携带 role=administrator 参数的恶意请求；同时审计 wp_users 表，移除所有非预期的管理员账号。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "WordPress Doctreat Core 插件未授权权限提升漏洞"
updated = "nday"

