[basic]
description = "SCO UNIX System V/386 Release 3.2 及其他 SCO 产品（如 Open Desktop、Open Desktop Lite、OpenServer）在安装时错误地将 dos 用户的家目录设置为 /tmp、将 asg 用户的家目录设置为 /usr/tmp。由于 /tmp 与 /usr/tmp 均为允许所有用户写入的世界可写（world-writable）目录，本地其他已登录用户可借此访问这两个账户的目录与文件，进而获取 dos 或 asg 用户的权限，造成权限提升或拒绝服务等安全影响。攻击条件为攻击者需拥有目标系统的本地普通用户账户，并能够向上述世界可写目录写入文件，利用目录权限配置不当即可越权访问相关账户。"
published = "1993-09-17T04:00:00.000"
remediation = "将 dos 用户主目录由 /tmp 改为 /usr/dos 并设为 700 权限（chmod 700 /usr/dos；chown dos /usr/dos），将 asg 用户主目录由 /usr/tmp 改为 /usr/asg 并设为 700 权限（chmod 700 /usr/asg；chown asg /usr/asg），同时确保 /tmp、/usr/tmp 仅 root 可写（chmod 1777 并去除组/其他写权限）。建议升级至 SCO OpenServer 5.0.5 及以上已修正该配置的安全补丁版本，并审查 /etc/passwd 确认两账户主目录已更正。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "SCO UNIX System V/386 弱默认目录权限导致本地权限提升漏洞"
updated = "2026-06-16T21:49:48.087"

