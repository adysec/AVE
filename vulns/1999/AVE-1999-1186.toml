[basic]
description = "Nachuatec D435 与 D445 打印机存在 ICMP 重定向报文风暴拒绝服务漏洞，远程攻击者可向目标设备发送大量特制的 ICMP 重定向报文，耗尽设备资源导致打印机服务崩溃或无法正常响应打印请求。该漏洞影响 Nachuatec D435 和 D445 系列打印机设备，CVSS 评分 5.0，危害等级中危。目前厂商未提供有效修复方案，建议通过防火墙限制 ICMP 报文访问以降低风险。"
published = "2000-10-14T04:00:00.000"
remediation = "在路由器/防火墙上配置 ACL 丢弃入站 ICMP 重定向报文（type 5），阻断攻击源。将打印机隔离至独立 VLAN，限制外部访问。如设备固件存在更新，升级到最新版本；若厂商已停止维护，建议更换支持 ICMP 过滤的现代网络打印机。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Nachuatec D435/D445 打印机 ICMP 重定向消息风暴拒绝服务漏洞"
updated = "2026-06-16T21:50:43.477"

