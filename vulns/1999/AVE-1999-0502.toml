[basic]
description = "SunOS/Solaris 系统的 FTP 客户端程序存在命令注入漏洞。当用户连接至恶意的 FTP 服务器时，攻击者可利用 FTP 协议对服务器响应数据的处理缺陷，通过构造包含恶意命令的 FTP 应答消息，使客户端在本地执行任意命令。该漏洞影响 SunOS 及 Solaris 系统多个版本，CVSS 评分 7.5，危害等级高危。用户应避免连接不可信的 FTP 服务器，并及时安装厂商提供的安全补丁。"
published = "1998-09-01T04:00:00.000"
remediation = "安装 Sun Security Bulletin #00176 中提供的对应补丁：Solaris 2.3 安装补丁 101318，Solaris 2.5 安装补丁 103603，Solaris 2.5.1 安装补丁 103601。建议将系统升级到 Solaris 10 或 11 等受支持版本，或改用 sftp/OpenSSH 等加密文件传输协议替代普通 FTP 客户端，同时避免连接不可信的外部 FTP 服务器。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "Sun SunOS/Solaris FTP 客户端远程代码执行漏洞"
updated = "2026-06-16T21:48:06.490"

