[basic]
description = 'Netscape Communicator 4.x 版本存在安全绕过漏洞。当用户启用 JavaScript 且已选择"仅接受来自正浏览页面同一服务器之 Cookie"选项时，浏览器仍不会对 Cookie 设置行为发出警告。攻击者可利用恶意网页绕过 Cookie 同源策略，跨站设置或窃取用户 Cookie，导致用户隐私泄露或会话劫持。漏洞影响 Netscape Communicator 4.x 全系版本。'
published = "1999-07-09T04:00:00.000"
remediation = "停止使用 Netscape Communicator 4.x，升级至 Mozilla Firefox 或其它现代浏览器，并在浏览器设置中禁用 JavaScript 作为临时缓解措施。对于仍必须使用 Netscape 的场景，可在浏览器首选项中关闭 JavaScript 功能（Edit → Preferences → Advanced → Scripts & Plugins → 取消启用 JavaScript）。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Netscape Communicator Cookie 安全策略绕过漏洞"
updated = "2026-06-16T21:49:06.117"

