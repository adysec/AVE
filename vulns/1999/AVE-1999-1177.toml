[basic]
description = "Lynx 2.x 浏览器未能正确区分内部 HTML 与外部 HTML，本地攻击者可从临时文件中读取本应保密的隐藏表单值，进而构造特殊的 LYNXOPTIONS: URL。当受害用户在本地运行 Lynx 并访问该恶意 URL 时，Lynx 会被诱导修改用户配置文件（如 lynx.cfg）并据此执行攻击者指定的命令。该漏洞影响 Lynx 2.x 系列本地用户环境，攻击需本地访问权限及诱导用户访问恶意链接或文件，CVSS 评分 7.8，危害等级为高。"
published = "1999-11-16T05:00:00.000"
remediation = "升级 Lynx 至 2.8.2 及以上版本（修复了对内部/外部 HTML 的区分缺陷）。如无法立即升级，应限制临时文件权限避免本地用户读取 LYNXOPTIONS 相关临时文件，并在浏览器配置中禁用 LYNXOPTIONS: 协议处理，避免通过恶意 URL 修改配置文件或执行命令。"
score = 7.8
severity = "HIGH"
sources = ["cve"]
title = "Lynx 网页浏览器 LYNXOPTIONS: URL 配置篡改远程代码执行漏洞"
updated = "2026-06-16T21:50:41.687"

