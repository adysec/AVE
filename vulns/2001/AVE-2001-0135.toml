[basic]
description = "Thinking Arts ES.One 1.0 中的 store.cgi 脚本存在目录遍历漏洞。远程攻击者可通过向 StartID 参数传递 `..`（点点）序列，绕过路径限制读取服务器上的任意文件，导致敏感信息泄露。该漏洞无需身份认证即可利用，攻击复杂度低，影响 ES.One 1.0 版本。"
published = "2001-05-03T04:00:00.000"
remediation = "对 store.cgi 的 StartID 参数进行输入过滤，剔除 `../` 等目录穿越字符序列，仅允许字母数字和指定前缀路径。同时以最低权限运行 CGI 进程，限制 Web 服务器对文件系统的访问范围。建议迁移至不再存在此漏洞的更新版本或替代产品。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Thinking Arts ES.One 目录遍历漏洞"
updated = "2026-06-16T21:54:03.947"

