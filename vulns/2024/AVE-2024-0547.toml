[basic]
description = "Git 凭证助手使用基于行的协议交换凭证信息，部分生态系统（如 .NET 和 Node.js）将单个回车符（CR）视为换行符，导致针对 CVE-2020-5260 的防护措施对这类凭证助手失效。攻击者可诱导用户克隆包含恶意回车符的非受信 URL（尤其是递归克隆），利用凭证助手将回车符视为换行的特性，绕过协议解析保护并窃取凭证。该漏洞影响 Git v2.48.1、v2.47.2、v2.46.3、v2.45.3、v2.44.3、v2.43.6、v2.42.4、v2.41.3、v2.40.4 之前的版本，CVSS 4.0 评分 2.1（LOW），攻击向量为网络、攻击复杂度低、需要用户交互。Git 官方已在提交 b01b9b8 中修复，建议用户升级至修复版本或避免从非受信 URL 克隆仓库。"
published = "2025-01-14T19:15:32.330"
remediation = "建议立即升级 Git 到以下任一修复版本：v2.48.1、v2.47.2、v2.46.3、v2.45.3、v2.44.3、v2.43.6、v2.42.4、v2.41.3 或 v2.40.4。如暂时无法升级，请避免从不可信 URL 克隆仓库，特别是禁用递归克隆（git clone --recursive），并检查凭证助手配置是否使用受影响的 .NET 或 node.js 生态工具。"
score = 2.1
severity = "LOW"
sources = ["msrc"]
title = "Git Git凭证助手换行混淆致凭证泄露漏洞"
updated = "2026-06-17T08:06:47.343"

