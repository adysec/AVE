[basic]
description = "Netscape Enterprise Server 3.0/3.6/3.51 版本存在目录索引信息泄露漏洞。当服务器启用目录索引功能时，远程攻击者可通过向目标服务器发送特制的 ?wp-ver-info 和 ?wp-cs-dump 等 Web 发布标签参数，触发目录列表显示，进而获取服务器上的文件结构、目录路径等敏感信息。该漏洞可能导致攻击者进一步探测服务器配置或发现其他可利用文件。"
published = "2000-03-17"
remediation = "该产品已停止支持，建议迁移至 iPlanet Web Server 7.0 或更高版本。若暂时无法迁移，在管理界面中禁用 Directory Indexing 功能，并关闭 Web Publishing 扩展模块，同时在服务器配置中禁止 OPTIONS 方法。"
score = 5.0
severity = "MEDIUM"
sources = ["cve"]
title = "Netscape Enterprise Server 目录索引信息泄露漏洞"
updated = "2026-06-16"

