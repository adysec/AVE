[basic]
description = "CVE-1999-0651 指类 Unix 系统中 rsh（远程 shell）与 rlogin（远程登录）服务被不必要地开启所导致的安全隐患。该漏洞原理在于 rsh/rlogin 依赖基于 IP 地址或 .rhosts 文件的弱信任机制进行身份认证，缺乏强加密与口令保护。影响范围为运行 rshd、rlogind 等服务的 Unix/Linux 主机，攻击者在可网络访问目标且能通过伪造源地址或利用信任关系绕过认证的条件下，可远程以合法用户身份登录并执行命令，造成未授权访问与远程命令执行风险。建议关闭相关服务并改用 SSH 等安全协议。"
published = "1999-01-01T05:00:00.000"
remediation = "立即在 /etc/inetd.conf 或 systemd 中禁用 rsh、rlogin、rexec 服务（执行 `systemctl disable rsh.socket rlogin.socket rexec.socket` 并注释对应行后重启 inetd），改用 SSH 进行远程登录。若业务必须保留，应在边界防火墙阻断 TCP 512/513/514 端口，并配置 /etc/hosts.equiv 与 ~/.rhosts 为空以限制信任主机。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "Unix rsh/rlogin 服务远程安全漏洞"
updated = "2026-06-16T21:48:47.017"

