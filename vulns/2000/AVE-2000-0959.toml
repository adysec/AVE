[basic]
description = "Auction Weaver 1.0 至 1.04 版本存在路径遍历漏洞，远程攻击者通过在 username 或 bidfile 表单字段中注入 ..（点点）序列，可突破目录限制读取服务器上的任意文件。该漏洞源于程序未对用户输入进行充分的路径过滤与校验，攻击者无需身份认证即可通过网络远程利用，导致敏感信息泄露。CVSS 评分 5.0，危害等级中危。"
published = "2000-12-19T05:00:00.000"
remediation = "该产品已停止维护，官方不再提供安全更新。建议立即升级至其他仍在维护的拍卖系统（如 osCommerce、Magento 等）。如无法替换，需在应用层对 username 和 bidfile 表单字段进行输入过滤，拒绝包含 `..`、`../` 及空字节等路径遍历特征的请求；同时在 Web 服务器（Apache/Nginx）层面配置 URL 重写规则，拦截包含 `..` 的请求路径，并限制 Web 进程对文件系统的读取权限为仅必要目录。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Auction Weaver 路径遍历任意文件读取漏洞"
updated = "2026-06-16T21:52:31.807"

