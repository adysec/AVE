[basic]
description = "Internet Explorer 3.x 至 4.01 版本存在框架欺骗漏洞，远程攻击者可通过构造恶意网页，在受信任网站的框架中插入任意内容，从而实施钓鱼攻击或信息欺骗。该漏洞利用浏览器同源策略的缺陷，无需用户交互即可触发，影响 Windows 平台上的 IE 浏览器用户，CVSS 评分 2.6，危害等级低。"
published = "1998-12-01T05:00:00.000"
remediation = "升级到 Internet Explorer 5.5 或更高版本以修复框架欺骗漏洞。该漏洞在 IE 5.5 及后续版本中已修复。如无法升级，建议禁用 Active Scripting 功能，或更换为现代浏览器（如 Edge、Chrome）以彻底规避风险。"
score = 2.6
severity = "LOW"
sources = ["epss"]
title = "Microsoft Internet Explorer 框架欺骗漏洞"
updated = "2026-06-16T21:49:13.603"

