[basic]
description = "CVE-2015-0016是一个安全漏洞，影响相关产品的安全性。攻击者可能利用此漏洞执行任意代码或获取未授权访问。建议用户及时更新到最新版本以修复此问题。"
published = "2015-01-13T22:59:07.190"
remediation = '立即安装 Microsoft 2015 年 1 月安全更新 MS15-004（补丁 KB3019978），或通过 Windows Update 自动更新。对于安装 Remote Desktop Client 7.0 的系统需安装 KB3023299，安装 Remote Desktop Client 8.0 的系统需安装 KB3020387，安装 Remote Desktop Client 8.1 的系统需安装 KB3020388。若无法立即打补丁，可通过注册表编辑器删除路径 HKEY_LOCAL_MACHINE\Software\Microsoft\Internet Explorer\Low Rights\ElevationPolicy 下 {B43A0C1E-B63F-4691-B68F-CD807A45DA01} 键值，以禁用 TSWbPrxy.exe 在 IE 沙箱中运行作为临时缓解措施。'
score = 7.8
severity = "HIGH"
sources = ["kev"]
title = "Microsoft Windows TS WebProxy 目录遍历权限提升漏洞"
