[basic]
description = "Analog 3.0 及更早版本中存在任意文件读取漏洞，远程攻击者可通过 forms 接口向目标系统发送特制请求，利用该漏洞读取服务器上的任意文件，导致敏感信息泄露。该漏洞影响 Analog 3.0 及之前版本，攻击者无需身份认证即可利用，危害等级中等。建议用户升级至最新版本以修复此漏洞。"
published = "1999-12-31T05:00:00.000"
remediation = "立即升级 Analog 至 4.0 或更高版本（最新为 6.0），该漏洞已在 4.0 中修复 forms 接口的路径校验逻辑；若无法升级，在 Web 服务器配置中限制 analog CGI 脚本的访问来源 IP，并移除 forms 接口的执行权限作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Analog 任意文件读取漏洞"
updated = "2026-06-16T21:50:06.927"

