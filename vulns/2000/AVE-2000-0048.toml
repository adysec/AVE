[basic]
description = "Handspring Visor 掌上设备的 Network HotSync 网络同步服务缺乏认证机制，远程攻击者可在未授权的情况下通过网络连接目标设备，直接访问并窃取设备中存储的电子邮件及文件数据，导致敏感信息泄露。该漏洞影响 Handspring Visor 系列掌上设备，攻击者无需任何身份凭证，只需目标设备开启 Network HotSync 服务即可实施攻击，危害等级中危。"
published = "2000-01-05T05:00:00.000"
remediation = "Handspring Visor 已停产且不再获得安全更新。建议在 Visor 设备上关闭 Network HotSync 网络同步功能，或通过防火墙/路由器阻止 14238/TCP 端口的入站连接，仅允许受信任的本地局域网访问。对于仍在使用该设备的用户，应避免在公共网络或不受信任的 Wi-Fi 环境中启用 HotSync 网络同步，并建议迁移至有安全认证的现代设备。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Handspring Visor Network HotSync 认证缺失漏洞"
updated = "2026-06-16T21:50:54.883"

