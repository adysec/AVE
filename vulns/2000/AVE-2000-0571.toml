[basic]
description = "NAI Net Tools PKI Server 1.0 的 strong.exe 程序存在格式字符串漏洞，因未对用户输入的格式字符串进行安全过滤，远程攻击者可通过向目标服务器发送包含特制格式字符串的 .XUDA 扩展名 URL 触发该漏洞，导致任意代码执行。该漏洞影响 NAI Net Tools PKI Server 1.0 HotFix 3 之前的版本，CVSS 评分 7.5，危害等级高。"
published = "2000-10-20T04:00:00.000"
remediation = '立即安装 NAI 官方发布的 Net Tools PKI Server HotFix 3，下载地址为 http://download.nai.com/products/licensed/pgp/hf3pki10.txt。由于 HotFix 3 非累积更新，安装前必须先安装 HotFix 1。具体操作：停止 Net Tools PKI Web Server 服务，备份 WebServer\bin 目录下的 strong.exe，将补丁中的 strong.exe 覆盖至原位置，然后重新启动服务。无法立即打补丁时，可在防火墙侧限制对 PKI 服务端口（默认 80/443）的访问，仅允许受信 IP 连接作为临时缓解措施。'
score = 7.5
severity = "HIGH"
sources = ["exploitdb"]
title = "NAI Net Tools PKI Server 格式字符串漏洞"
updated = "2026-06-16T21:52:23.173"

