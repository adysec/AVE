[basic]
description = "ProFTPD 1.2 预览版（pre1 至 pre5）以及 wu-ftpd、beroftpd 中存在缓冲区溢出漏洞。远程攻击者无需身份认证，可通过向 FTP 服务连续发送 MKD（创建目录）与 CWD（切换目录）命令，构造大量嵌套目录结构，使目录路径缓冲区发生溢出。攻击成功后可覆盖内存并执行任意代码，最终以 root 权限完全控制受影响服务器。该漏洞影响运行上述脆弱版本 FTP 服务的系统，危害极大，CVSS 评分达到 10.0。"
published = "1999-08-27T04:00:00.000"
remediation = "建议将 ProFTPD 1.2 pre1 至 pre5 升级至 1.2.0 稳定正式版或更高版本，该版本已修复 MKD/CWD 命令嵌套目录创建时的缓冲区溢出漏洞。如暂时无法升级，可通过防火墙仅允许可信 IP 访问 21 端口，或在 proftpd.conf 中设置 AllowOverwrite off 并禁用匿名登录以降低风险。同时应监控 FTP 日志中是否存在异常的嵌套 MKD/CWD 命令序列。"
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "ProFTPd 1.2 远程缓冲区溢出漏洞"
updated = "2026-06-16T21:49:18.797"

