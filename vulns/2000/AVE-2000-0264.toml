[basic]
description = "SCO OpenServer 5.04 及更早版本（含 Internet FastStart）中附带的日历服务 calserver 在处理用户发送的网络请求时，未对输入缓冲区长度进行边界校验，存在远程栈缓冲区溢出缺陷。攻击者可在无需身份认证的情况下，向 calserver 监听的 TCP 端口发送特制超长数据，覆盖返回地址并执行任意指令，从而获取目标系统 root 权限实现远程代码执行。该漏洞暴露面广，只要服务对外可达即可被远程利用。"
published = "2001-03-12T05:00:00.000"
remediation = "安装 SCO 安全公告 SB-99.02a 发布的 SSE019 安全补丁（System Security Enhancement package），替换受影响系统中的 calserver 二进制文件。受影响版本为 SCO OpenServer 5.04 及更早版本（含 Internet FastStart），可从 ftp://ftp.sco.COM/SSE/sse019.tar.Z 下载补丁并依据 sse019.ltr 说明进行安装。如暂无法立即打补丁，可在防火墙层面限制对 calserver 服务端口的外部访问作为临时缓解措施，并尽快安排补丁升级。"
score = 10.0
severity = "CRITICAL"
sources = ["exploitdb"]
title = "SCO OpenServer calserver 远程缓冲区溢出漏洞"
updated = "2026-06-16T21:51:26.513"

