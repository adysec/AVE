[info]
author = "AVE"
description = "检测 Cart32 2.6/3.0 中存在的硬编码后门密码漏洞。cart32.exe 中存在内置后门密码 wemilo，远程攻击者可通过该后门无需认证直接访问管理功能并执行任意系统命令。通过 HTTP GET 请求访问 cart32.exe 验证该组件是否存在。"
id = "POC-AVE-2000-0352"
name = "Cart32 后门密码远程命令执行漏洞 PoC"
severity = "high"
tags = ["ave-2000-0352"]
vuln_id = [
    "CVE-2000-0429",
    "AVE-2000-0352",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/cart32.exe"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["cart32"]
