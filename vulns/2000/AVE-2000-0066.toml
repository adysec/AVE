[basic]
description = "Sun Solaris 7.0 的 DMI（桌面管理接口）组件中存在拒绝服务漏洞。本地攻击者可通过向 /var/dmi/db 数据库目录写入特制的恶意文件，导致 dmispd 守护进程在处理该文件时崩溃，造成系统拒绝服务。该漏洞影响 Solaris 7.0 操作系统，利用门槛低，本地用户即可触发，无需任何特权认证。攻击者可以利用此漏洞中断系统的桌面管理服务，影响系统管理功能的正常运行。"
published = "1999-12-22T05:00:00.000"
remediation = "升级到不受影响的 Solaris 版本（如 Solaris 8 及以上），或安装 Sun 官方补丁 106872-01（SPARC）/ 106873-01（x86）。临时缓解措施：限制本地用户对 /var/dmi/db 目录的写入权限，或禁用 dmispd 服务：在 /etc/init.d 中停止 dmi 并移除相应启动链接。"
score = 10
severity = "CRITICAL"
sources = ["avd"]
title = "Sun Solaris 7.0 DMI 拒绝服务漏洞"
updated = "2026-06-16T21:50:51.683"

