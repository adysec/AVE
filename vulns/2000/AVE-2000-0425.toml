[basic]
description = "Concatus IMate Web Mail Server 2.5 存在缓冲区溢出漏洞，远程攻击者无需认证即可通过向 SMTP 服务发送超长 HELO 命令触发该漏洞，导致服务崩溃拒绝服务。该漏洞影响 IMate Web Mail Server 2.5 版本，CVSS 评分 5.0，危害等级中危。厂商已停止维护，建议用户迁移至其他受支持的邮件服务器软件。"
published = "2000-06-01T04:00:00.000"
remediation = "联系 Catware 技术支持获取升级版本（厂商已在 96 小时内发布修复）。如产品已停止维护，建议迁移至其他仍在维护的 WebMail 服务器。临时缓解措施：在防火墙上限制对 SMTP 端口（25）的访问，仅允许受信任 IP 连接，并部署入侵检测规则监控超长 HELO 命令。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Concatus IMate Web Mail Server 缓冲区溢出漏洞"
updated = "2026-06-16T21:51:53.020"

