[basic]
description = "Microsoft Windows 32 位 x86 平台上，当启用 16 位应用程序访问支持时，内核未能正确验证特定 BIOS 调用。本地攻击者可在线程环境块（TEB）中构造特制的 VDM_TIB 数据结构，调用 NtVdmControl 函数启动 Windows 虚拟 DOS 机（NTVDM）子系统，触发 #GP 陷阱处理程序（nt!KiTrap0D）的异常处理不当，导致权限提升至 Ring 0 级别。该漏洞影响 Windows NT 3.1 至 Windows 7 全系 32 位版本，CVSS 评分 7.8，危害等级高。攻击者需具备本地系统访问权限，无法远程利用。"
published = "2010-01-21T19:30:00.900"
remediation = "立即安装 Microsoft 安全公告 MS10-015 提供的更新 (KB977165)，可通过 Windows Update 自动获取或从 Microsoft 下载中心手动安装。受影响系统包括 Windows 2000 SP4、XP SP2/SP3、Server 2003 SP2、Vista/SP1/SP2、Server 2008/SP2 及 Windows 7 32 位版本。如无法立即打补丁，可通过组策略启用「禁止访问 16 位应用程序」策略以禁用 NTVDM 子系统作为临时缓解措施：运行 gpedit.msc → 计算机配置 → 管理模板 → Windows 组件 → 应用程序兼容性 → 启用「禁止访问 16 位应用程序」。"
score = 7.8
severity = "HIGH"
sources = ["kev"]
title = "Microsoft Windows NTVDM 子系统内核权限提升漏洞"
updated = "2026-06-16T23:15:45.537"

