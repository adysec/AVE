[basic]
description = "xlock程序存在缓冲区溢出漏洞，该漏洞影响xlockmore xlock程序4.16及更早版本。当本地用户向程序输入过长的-mode选项参数时，会触发缓冲区溢出，导致程序试图读取超出安全边界的内存区域。此漏洞允许攻击者通过精心构造的恶意输入来读取系统内存中的敏感数据，如密码、密钥或配置文件信息。攻击者无需任何权限即可利用此漏洞进行攻击，利用过程相对简单，只需向目标程序传递包含过多字符的-mode参数即可。此外，由于漏洞位于本地权限级别，攻击者通常需要首先获得目标系统的本地访问权限。"
published = "2000-05-29T04:00:00.000"
remediation = "建议立即升级 xlockmore 到 4.17 或更高版本（修复了 -mode 参数缓冲区溢出）。若无法立即升级，可卸载 xlock 或移除其 setuid 位（chmod u-s /usr/bin/xlock），改用 xscreensaver 等替代屏幕锁定程序作为缓解措施。"
score = 2.1
severity = "LOW"
sources = ["avd"]
title = "xlockmore xlock 本地缓冲区溢出漏洞"
updated = "2026-06-16T21:51:46.287"

