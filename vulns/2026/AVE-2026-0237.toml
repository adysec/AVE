[basic]
description = "AWS Advanced JDBC Wrapper 的 GlobalDatabasePlugin 组件存在不可信搜索路径漏洞（CWE-426），低权限认证用户可通过创建特制函数，在连接集群的其他用户（包括 rds_superuser）执行该函数时触发权限提升，从而获取 rds_superuser 角色权限。该漏洞影响使用 AWS Advanced JDBC Wrapper 的 Amazon Aurora PostgreSQL 实例，CVSS 评分 8.6，危害等级高。用户需升级至 AWS Advanced JDBC Wrapper 4.0.1 版本修复此漏洞。"
published = "2026-06-05T20:17:28.733"
remediation = "升级 AWS Advanced JDBC Wrapper 至 4.0.1 或更高版本，该版本修复了 GlobalDatabasePlugin 中的不可信搜索路径问题。如无法立即升级，应限制低权限用户的函数创建权限，并审查现有自定义函数中是否存在恶意代码。"
score = 8.6
severity = "HIGH"
sources = ["ghsa"]
title = "AWS Advanced JDBC Wrapper for Amazon Aurora PostgreSQL 权限提升漏洞"
updated = "2026-06-17T10:13:59.410"

