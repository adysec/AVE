[basic]
description = "Netsweeper 4.0.5 之前版本中的 remotereporter/load_logfiles.php 存在开放重定向漏洞（CWE-601），远程攻击者可通过向 url 参数传入恶意 URL，诱使用户点击特制链接后跳转到任意外部站点，进而实施钓鱼攻击。该漏洞无需身份认证即可利用，攻击复杂度低，但需要用户交互，影响 Netsweeper 内容过滤系统的正常使用。厂商已在 4.0.5 版本中修复此问题。"
published = "2020-02-19T21:15:11.107"
remediation = "升级 Netsweeper 至 4.0.5 或更高版本，该版本已修复 remotereporter/load_logfiles.php 中 url 参数未经验证的重定向问题。如无法立即升级，可在 WAF 层面添加规则拦截包含恶意 url 参数的请求，或限制对该脚本的访问来源 IP。"
score = 6.1
severity = "MEDIUM"
sources = ["nuclei"]
title = "Netsweeper Netsweeper 开放重定向漏洞"
updated = "2026-06-17T00:18:39.237"

