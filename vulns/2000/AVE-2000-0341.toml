[basic]
description = "IIS 4.0 和 5.0 的 FrontPage 服务器扩展组件中的 shtml.exe 程序存在物理路径泄露漏洞。远程攻击者可通过请求一个不存在的 HTML、HTM、ASP 或 SHTML 文件，触发服务器返回包含完整物理路径的错误信息，从而获取网站根目录的真实路径。该漏洞无需身份认证即可利用，攻击者获取路径信息后可为进一步探测和攻击提供基础。影响 Windows NT 4.0 及 Windows 2000 上运行 IIS 4.0/5.0 并安装 FrontPage 服务器扩展的系统。"
published = "2000-05-06T04:00:00.000"
remediation = "建议立即卸载或禁用 FrontPage 服务器扩展（FrontPage Server Extensions），或升级至 Windows 2000 SP2 及以上版本。如业务必须使用，应在 IIS 管理器中为 shtml.exe 配置自定义错误页面，禁止返回详细路径信息；同时限制 shtml.exe 仅允许本地或受信 IP 访问。临时缓解措施可在 Web 服务器上配置 URLScan 工具拦截对 shtml.exe 的请求。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Microsoft IIS FrontPage 服务器扩展路径信息泄露漏洞"
updated = "2026-06-16T21:51:39.827"

