[basic]
description = "Trend Micro PC-Cillin 6.0 防病毒软件内置的代理服务器组件存在访问控制缺陷，该代理端口未对远程连接进行任何身份验证或来源限制，导致未经认证的远程攻击者可直接向代理端口发送恶意请求，耗尽系统资源或造成代理服务崩溃，从而引发拒绝服务（DoS）。攻击者无需任何权限，仅通过网络即可发起攻击，CVSS 评分 5.0，危害等级中危。受影响的 Trend Micro PC-Cillin 6.0 版本用户需升级至修复版本以消除风险。"
published = "1999-12-29T05:00:00.000"
remediation = "升级到 Trend Micro PC-Cillin 7.0 或更高版本。如无法升级，在防火墙层面限制对内部代理端口（默认 1080/tcp）的外部访问，仅允许受信 IP 连接；同时在软件设置中为代理组件添加访问认证或绑定到本地回环地址。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Trend Micro PC-Cillin 6.0 内部代理端口未授权访问导致远程拒绝服务漏洞"
updated = "2026-06-16T21:50:48.623"

