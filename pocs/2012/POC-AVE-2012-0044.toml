[info]
author = "AVE"
description = "检测 Microsoft Office MSCOMCTL.OCX 控件缓冲区溢出漏洞，通过构造特制 RTF 文档触发 MSCOMCTL.OCX 控件解析时的栈缓冲区溢出，导致远程代码执行"
id = "POC-AVE-2012-0044"
name = "CVE-2012-0158 PoC"
severity = "high"
tags = [
    "cve-2012-0158",
    "ms12-027",
    "office",
    "activex",
    "buffer-overflow",
]
vuln_id = [
    "CVE-2012-0158",
    "AVE-2012-0044",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}/exploit.rtf"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    '{\rtf',
    '\object',
    "MSCOMCTL",
]
