[basic]
description = 'Nortel Networks Optivity NETarchitect 2.0 中的 bna_pass 程序在调用"rm"命令删除文件时，直接依赖 PATH 环境变量来查找该程序路径，而未使用绝对路径。本地已登录的普通用户可通过在 PATH 环境变量前段注入包含同名恶意"rm"程序的目录，使 bna_pass 在执行清理操作时误调用攻击者控制的程序，从而以该程序运行权限执行任意命令，实现本地权限提升。该漏洞影响安装并运行 Optivity NETarchitect 2.0 的系统，攻击前提是攻击者在目标主机上拥有本地账户及可写目录权限，利用方式简单且无需远程网络访问。'
published = "1999-12-29T05:00:00.000"
remediation = "建议升级 Optivity NETarchitect 至 2.0 以上已修复版本。若无法立即升级，应修改 bna_pass 程序使其使用绝对路径调用 rm 命令，避免依赖 PATH 环境变量；同时限制该程序的 setuid 权限，仅授权可信本地用户执行，并加固系统 PATH 环境变量配置以防恶意程序注入。"
score = 7.2
severity = "HIGH"
sources = ["cve"]
