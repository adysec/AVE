[basic]
description = "Internet Explorer 10 和 11 中的 JScript 9 脚本引擎存在内存损坏漏洞。未经身份验证的远程攻击者可构造包含恶意 JavaScript 代码的网页，诱使用户使用受影响版本的 IE 浏览器访问该页面，从而触发 JScript 9 内存操作越界，导致远程代码执行或应用程序拒绝服务。该漏洞利用无需用户交互即可在浏览器进程中执行任意代码，并可进一步获取系统权限。"
published = "2015-07-14T21:59:33.283"
remediation = "立即安装 Microsoft 2015 年 7 月安全更新 MS15-065（KB3065822），运行 IE10 或 IE11 的系统还需额外安装 KB3075516。更新可通过 Windows Update 自动获取，或从 Microsoft Update Catalog 手动下载安装。如无法立即更新，可在注册表或组策略中禁用 JScript 引擎，并限制 Internet Explorer 访问外部不可信站点作为临时缓解措施。"
score = 8.8
severity = "HIGH"
sources = ["kev"]
title = "微软 Internet Explorer JavaScript远程代码执行漏洞"
updated = "2026-06-17T00:24:04.143"

