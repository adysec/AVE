[basic]
description = "Internet Explorer 4.x 及 5.x 版本在与 Word 97 集成时存在模板执行漏洞。当用户通过 IE 浏览器访问包含恶意 Visual Basic 脚本的 Word 97 模板文件时，浏览器不会弹出安全警告，导致恶意脚本在客户端自动执行。该漏洞同样影响 Outlook 用户，攻击者可通过发送特制邮件触发。CVSS 评分 7.5，危害等级高，受影响系统需安装微软安全更新修复。"
published = "1999-11-01T05:00:00.000"
remediation = "升级到受支持的 Windows 和 Internet Explorer 最新版本（IE 已停止支持，建议使用 Edge 浏览器），禁用 Office 中所有宏自动执行功能（将宏安全性设为「禁用所有宏，不通知」），在 Outlook 中配置以纯文本阅读邮件，不打开来源不明的 Word 文档或邮件附件。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "Microsoft Internet Explorer Word 97 模板远程代码执行漏洞"
updated = "2026-06-16T21:48:12.977"

