[basic]
description = "系统被植入分布式拒绝服务攻击控制端（master）、代理端（agent）或僵尸程序（zombie），涉及的工具包括 Trinoo、Tribe Flood Network (TFN)、Tribe Flood Network 2000 (TFN2K)、stacheldraht、mstream、shaft 等。攻击者通过漏洞利用、弱口令等方式获得系统控制权后，安装上述 DDoS 恶意软件，使受控主机成为僵尸网络的一部分，可接收远程指令向指定目标发起大规模流量攻击，造成目标服务不可用。该漏洞影响各类操作系统平台，检测和清除难度较大，危害等级中等。"
published = "2000-05-02T04:00:00.000"
remediation = "使用杀毒软件或安全扫描工具（如 Chkrootkit、Rkhunter）全盘扫描并清除 Trinoo、TFN/TFN2K、stacheldraht、mstream、shaft 等 DDoS 代理程序；检查系统异常连接与不明进程，关闭不必要的开放端口；配置防火墙仅放行必要流量，并限制入站 ICMP 和 UDP 流量以降低被利用风险；及时安装操作系统安全补丁并修改所有账户弱口令。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Trinoo TFN TFN2K stacheldraht mstream shaft DDoS攻击工具拒绝服务漏洞"
updated = "2026-06-16T21:51:04.757"

