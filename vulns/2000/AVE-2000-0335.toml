[basic]
description = "Microsoft IIS 4.0 及 5.0 存在畸形文件扩展名解析拒绝服务漏洞。远程攻击者无需身份认证，通过向目标服务器发送包含大量文件扩展名的超长复杂 URL，可触发 IIS 处理扩展名数据时发生异常，导致 Web 服务进程崩溃，造成拒绝服务。攻击条件简单，仅需发送特制 HTTP 请求即可实现。"
published = "2000-05-11T04:00:00.000"
remediation = "建议立即安装 Microsoft 安全公告 MS00-023 提供的补丁，或升级至 IIS 6.0 及以上版本。IIS 4.0/5.0 已停止支持，长期方案是升级到受支持的 Windows Server 版本并使用 IIS 8.0 或更高版本；临时缓解措施可在 URLScan 工具中配置拒绝包含过多文件扩展名的请求。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Microsoft IIS 4.0/5.0 文件扩展名拒绝服务漏洞"
updated = "2026-06-16T21:51:39.220"

