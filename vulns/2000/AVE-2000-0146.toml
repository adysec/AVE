[basic]
description = "太阳 Internet 邮件服务器（SIMS）在安装过程中会创建全局可读的密码文件，导致本地攻击者可读取该文件获取系统中存储的用户密码凭据。该漏洞允许已获得本地访问权限的攻击者通过简单的文件读取操作窃取凭证，进而提升权限或访问其他用户邮件数据，影响 Sun Internet Mail Server 相关版本。目前厂商已发布补丁修复此漏洞。"
published = "2000-02-20T05:00:00.000"
remediation = "立即检查并限制 SIMS 配置文件（如 /etc/mail/sims.access 等）权限为 600 或 400，仅允许 root 用户读取。同时排查是否存在其他含密码的全局可读文件，并升级到 Sun 官方发布的最新安全补丁版本。"
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "Sun Internet Mail Server 密码泄露漏洞"
updated = "2026-06-16T21:51:08.017"

