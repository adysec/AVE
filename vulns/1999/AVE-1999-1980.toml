[basic]
description = "Tektronix Phaser 系列网络打印机（包括 740/750/750DP/840/930 型号）的 PhaserLink WebServer 存在未授权访问漏洞。远程攻击者无需任何身份认证，直接访问 ncl_items.html、ncl_subjects.html 等未公开的 URL 即可获取管理员密码，从而完全控制打印机设备。该漏洞 CVSS 评分 10.0，危害等级严重，影响 PhaserLink Printer 840.0 及更早版本。"
published = "1999-11-16T05:00:00.000"
remediation = "该漏洞影响已停产的 Tektronix PhaserLink 打印机系列（740/750/840/930 等），厂商已不再提供安全更新。建议立即将受影响的打印机隔离到独立管理 VLAN，在防火墙层面限制仅信任 IP 可访问打印机的 80/443 端口，并禁用 PhaserLink Web 服务器的远程管理功能。如业务允许，建议更换为仍在厂商支持周期内的新型号打印机。临时缓解措施可修改打印机配置文件关闭未公开的调试 URL 端点（ncl_items.html、ncl_subjects.html）。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "Tektronix PhaserLink Printer Web服务器未授权访问漏洞"
updated = "2026-06-16T21:50:35.480"

