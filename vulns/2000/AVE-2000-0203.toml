[basic]
description = "Linux 2.2.x 内核未对 Unix 域套接字数量进行有效限制，未授权本地攻击者可通过不断创建大量套接字耗尽系统资源，从而触发拒绝服务。该漏洞影响 Linux Kernel 2.2.12/2.2.14/2.3.99 及 RedHat 6.x 等版本，CVSS 评分 2.1，危害等级低。攻击者需具有本地系统访问权限，属于本地提权类拒绝服务漏洞。"
published = "2000-03-23T05:00:00.000"
remediation = "升级 Linux 内核至 2.4.0 或更高版本（该漏洞已在 2.4.0 内核中修复），或安装对应发行版的安全补丁（如 RedHat 6.x 的 errata 更新）。对于无法升级内核的遗留系统，可通过 sysctl 调整 net.core.wmem_max 参数限制单进程 socket 占用上限，并监控异常 socket 创建行为作为临时缓解。"
score = 2.1
severity = "LOW"
sources = ["avd"]
title = "Linux Kernel 2.2.x Unix域套接字本地拒绝服务漏洞"
updated = "2026-06-16T21:51:16.173"

