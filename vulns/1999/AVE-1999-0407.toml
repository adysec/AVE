[basic]
description = "Cat Soft Serv-U FTP Server 2.5 存在远程缓冲区溢出漏洞。已认证的远程攻击者可通过向 FTP 服务发送超长的 CWD（切换目录）或 LS（列出文件）命令触发缓冲区溢出，导致服务进程崩溃，造成拒绝服务。该漏洞影响 Serv-U FTP Server 2.5 版本，攻击者只需拥有有效账号即可利用，无需其他特殊权限。"
published = "1997-07-01T04:00:00.000"
remediation = "升级至 Serv-U 2.5a 或更高版本可修复此缓冲区溢出漏洞。当前最新版为 SolarWinds Serv-U 15.x，建议立即升级并开启自动更新。如无法升级，可在防火墙限制 FTP 端口（21/TCP）仅对可信来源开放，并禁用匿名用户写权限作为临时缓解。"
score = 7.8
severity = "HIGH"
sources = ["exploitdb"]
title = "Cat Soft Serv-U FTP Server 远程缓冲区溢出漏洞"
updated = "2026-06-16T21:47:56.290"

