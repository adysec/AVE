[basic]
description = "Windows NT 4.0 的 SMB 登录验证服务在处理畸形登录请求时存在逻辑缺陷，远程攻击者无需身份认证即可通过发送实际数据大小与指定大小不符的特制 SMB 登录请求包，导致目标系统 LSASS 进程崩溃或系统蓝屏，造成拒绝服务。该漏洞影响 Windows NT 4.0 所有版本，攻击条件简单，无需用户交互。"
published = "1998-02-14T05:00:00.000"
remediation = "安装 Windows NT 4.0 Service Pack 6a (SP6a) 以修复 SMB 登录请求中数据大小校验缺失导致的拒绝服务漏洞。同时建议在网络防火墙层面阻断来自不可信网络的 SMB 端口（TCP 139/445）入站流量。由于 Windows NT 4.0 已终止支持超过 20 年，长期缓解措施应迁移至受支持的 Windows Server 版本。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Microsoft Windows NT 4.0 SMB 登录请求长度错误拒绝服务漏洞"
updated = "2026-06-16T21:47:57.050"

