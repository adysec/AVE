[basic]
description = "Oracle Web Listener for AIX 4.0.7.0.0 及 4.0.8.1.0 版本存在拒绝服务漏洞，远程攻击者无需认证即可向目标服务器发送特制的畸形式 URL 请求，触发 Web 监听器服务崩溃或停止响应，导致正常用户无法访问 Web 服务。该漏洞仅影响 AIX 平台上的 Oracle Web Listener，CVSS 评分 5.0，危害等级中危。"
published = "2000-07-05T04:00:00.000"
remediation = "升级 Oracle Web Listener 至 4.0.8.1.1 及以上版本，该版本已修复畸形 URL 导致的拒绝服务问题。如无法升级，应立即迁移至 Oracle HTTP Server 或 Oracle Application Server 受支持版本，旧版 Oracle Web Listener 已不再维护。临时缓解措施可在 Web 服务器前端部署反向代理或 WAF，过滤包含异常字符的畸形 URL 请求。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Oracle Web Listener for AIX 畸形 URL 拒绝服务漏洞"
updated = "2026-06-16T21:52:02.060"

