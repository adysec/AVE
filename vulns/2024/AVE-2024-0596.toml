[basic]
description = "Das U-Boot 引导加载程序在 2025.01-rc1 之前版本中存在整数溢出漏洞，源于对精心构造的 squashfs 文件系统进行内存分配时，通过 sbrk、request2size 或 x86_64 架构上 ptrdiff_t 处理不当触发。攻击者需物理接触目标设备并挂载恶意 squashfs 镜像，利用该漏洞可导致内存越界写入，进而实现任意代码执行或系统崩溃。该漏洞影响广泛使用 U-Boot 的嵌入式设备、物联网终端及开发板，CVSS 评分 7.1，危害等级高。厂商已在 2025.01-rc1 版本中修复。"
published = "2025-02-18T23:15:09.893"
remediation = "升级 Das U-Boot 到 2025.01-rc1 或更高版本。Debian 11 用户请安装 DLA-4150 安全更新（`apt install u-boot`），SUSE Linux 用户请安装 SUSE-SU-2025:0989-1 更新。如无法立即升级，避免加载来源不可信的 squashfs 文件系统镜像，并限制物理访问以降低攻击面。"
score = 7.1
severity = "HIGH"
sources = ["msrc"]
title = "DENX Das U-Boot 内存分配整数溢出漏洞"
updated = "2026-06-17T08:13:28.313"

