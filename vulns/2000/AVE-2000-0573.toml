[basic]
description = "CUPS（通用Unix打印系统）1.04及更早版本中存在IPP请求处理缺陷，远程攻击者无需身份认证即可向目标系统发送特制的IPP（互联网打印协议）请求，触发服务解析异常，导致CUPS服务进程崩溃，造成拒绝服务。该漏洞影响运行CUPS 1.04及之前版本的Unix/Linux系统，CVSS评分5.0，危害等级中等。"
published = "2000-06-21T04:00:00.000"
remediation = "建议将 CUPS 升级至 1.1.4 或更高版本（官方已于 2000 年修复此漏洞），当前任何主流 Linux 发行版中的 CUPS 均已不受影响。如无法升级，可在 /etc/cups/cupsd.conf 中限制 IPP 端口（631/tcp）的访问来源 IP 范围作为临时缓解措施，或使用防火墙规则阻止外部对 631 端口的访问。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Easy Software Products CUPS IPP请求拒绝服务漏洞"
updated = "2026-06-16T21:51:53.397"

