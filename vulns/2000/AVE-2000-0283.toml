[basic]
description = "Solaris 7.0/8 系统中的 Xsun X 服务器存在缓冲区溢出漏洞，本地攻击者可通过向 Xsun 程序传递超长的 -dev 参数触发该漏洞，由于程序未对输入长度进行充分验证，导致栈缓冲区溢出，可覆盖返回地址从而执行任意代码。成功利用此漏洞可使本地低权限用户获取 root 权限，完全控制系统。该漏洞影响 Solaris 7.0 和 8 版本，CVSS 评分 7.2，危害等级高。"
published = "2000-04-24T04:00:00.000"
remediation = "立即安装 Sun 安全公告 #188 提供的补丁（SunOS 5.7/5.8 Xsun 补丁），或升级至 Solaris 9 及以上版本。如无法打补丁，可移除 Xsun 二进制文件的 setuid root 权限（chmod u-s /usr/openwin/bin/Xsun）作为临时缓解措施，但需注意可能影响 X 窗口正常使用。"
score = 7.2
severity = "HIGH"
sources = ["exploitdb"]
title = "Solaris Xsun X 服务器缓冲区溢出漏洞"
updated = "2026-06-16T21:51:30.407"

