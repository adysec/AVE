[basic]
description = "Computalynx CProxy Server 3.3 SP2 存在缓冲区溢出漏洞。远程攻击者可通过向目标服务发送超长的 HTTP 请求触发缓冲区溢出，导致服务进程崩溃，造成拒绝服务。该漏洞影响 CProxy Server 3.3 SP2 版本，攻击者无需身份认证即可通过网络远程利用，危害等级中危。"
published = "2000-05-16T04:00:00.000"
remediation = "Computalynx CProxy Server 3.3 SP2 已停止维护，官方不再提供安全更新。建议立即升级至受支持的代理服务器软件（如 Squid、HAProxy 等）。如无法替换，可在防火墙层面限制仅允许可信 IP 访问 CProxy 监听端口（默认 8080），并配置入侵检测规则拦截超长 HTTP 请求作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Computalynx CProxy Server 缓冲区溢出拒绝服务漏洞"
updated = "2026-06-16T21:51:37.593"

