[basic]
description = "Joomla! 的 JA Comment（com_jacomment）组件存在目录遍历漏洞，其 index.php 在处理 view 参数时未对用户输入做充分校验与过滤。远程攻击者无需身份认证，只需在请求 index.php 的 view 参数中构造包含 ..（点-点）的恶意路径序列，即可越权读取目标服务器上的任意文件（如配置文件、源码、密码等敏感信息）。该漏洞影响所有安装了存在缺陷版本 JA Comment 组件的 Joomla! 站点，攻击条件仅需网络可达目标 Web 服务并发送特制 HTTP 请求即可，CVSS 评分 5.0，危害等级为中。"
published = "2010-04-29"
remediation = "建议立即升级 JA Comment 组件到官方发布的最新修复版本；若暂无法升级，可在后台扩展管理中停用或卸载 com_jacomment 组件以彻底消除风险。同时应在组件控制器中对 view 参数进行白名单校验，过滤 ../ 与空字节等非法字符，并在 Web 服务器层（如 Apache 的 .htaccess）限制对敏感路径参数的访问。"
score = 5.0
severity = "MEDIUM"
sources = ["nuclei"]
title = "Joomla! JA Comment 组件 目录遍历漏洞"
updated = "2026-07-15"

