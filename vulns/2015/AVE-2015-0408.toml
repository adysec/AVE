[basic]
description = "Oracle Java SE Libraries 组件存在未明确类型的任意代码执行漏洞（CVE-2015-2590），攻击者可通过构造恶意 Java 应用程序或 Applet，利用 Java SE Libraries 组件中的未明确漏洞实现远程代码执行。该漏洞影响 Oracle Java SE 7u80 及之前版本、Java SE 8u45 及之前版本，攻击者可通过诱导用户访问包含恶意 Java Applet 的网页，或通过部署恶意 Java Web Start 应用程序，诱导用户加载并执行恶意代码，从而在用户权限下执行任意代码，完全控制受害系统。Red Hat 将该漏洞评级为 Critical（严重），CVSS 评分较高。Oracle 已在 2015 年 7 月的关键补丁更新（CPU）中修复该漏洞，建议用户升级至 Java SE 7u85、Java SE 8u51 或更高版本。"
published = "2015-07-16"
remediation = "立即升级 Oracle Java SE 至 2015 年 7 月 CPU 修复版本：Java SE 6 升级至 6u95 及以上、Java SE 7 升级至 7u80 及以上、Java SE 8 升级至 8u45 及以上；Java SE Embedded 7 升级至 7u75 及以上、Java SE Embedded 8 升级至 8u33 及以上。通过 java.com 下载最新版或在 Windows/Mac 上启用 Java 自动更新。若暂时无法升级，请在浏览器中禁用 Java 插件（Java Applet 和 Java Web Start），并在防火墙层面限制非受信网络访问 Java RMI/JRMP 端口（默认 1099、4444 等）作为临时缓解措施。此漏洞已被列入 CISA 已知被利用漏洞目录，必须优先修补。"
score = 9.8
severity = "CRITICAL"
sources = ["kev"]
title = "Oracle Java SE 任意代码执行漏洞"
updated = "2015-07-16"

