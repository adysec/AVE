[basic]
description = "Allaire ClusterCATS 在处理 HTML 重定向时存在信息泄露漏洞，会将过期的查询字符串参数附加到重定向 URL 中，导致敏感信息（如会话令牌、认证凭据等）被泄露给第三方站点。攻击者可通过构造特制的重定向请求，诱使目标用户访问恶意站点，从而窃取 URL 中携带的敏感数据。该漏洞影响 ColdFusion ClusterCATS 相关版本，攻击复杂度较高，需用户交互配合，CVSS 评分 2.6，危害等级低。"
published = "2000-05-08T04:00:00.000"
remediation = "建议立即安装 Allaire 官方补丁（参考安全公告 ID 15697），该补丁修复了 ClusterCATS 在 HTML 重定向时附加过期查询字符串参数导致信息泄露的问题。由于 ColdFusion ClusterCATS 已停止维护，建议升级到受支持的 ColdFusion 版本，或在 Web 服务器层面对重定向 URL 进行参数过滤清理作为临时缓解措施。"
score = 2.6
severity = "LOW"
sources = ["avd"]
title = "Allaire ClusterCATS URL重定向漏洞"
updated = "2026-06-16T21:51:36.003"

