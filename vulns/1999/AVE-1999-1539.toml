[basic]
description = "Hewlett Packard Apollo Domain OS 的 crp 组件存在权限提升漏洞，远程攻击者可通过调用不安全的系统调用 pad_$dm_cmd 和 pad_$def_pfk() 未授权获取目标系统的 root 超级用户权限。该漏洞影响 Apollo Domain OS SR10 至 SR10.3 版本，攻击者无需身份认证即可远程触发，CVSS 评分 10.0，危害等级严重。由于系统调用缺乏有效权限检查，导致任意远程用户均可利用该缺陷完全控制受影响系统。"
published = "1991-12-18"
remediation = "HP Apollo Domain OS 已停止支持。CERT/CC 公告 CA-1991-23 提供了对应修补程序，建议联系 HP 获取并升级至该修补版本；若无法升级，应在网络边界限制对 crp 服务的访问。长期建议迁移至受支持的操作系统（如 HP-UX）。"
score = 10.0
severity = "CRITICAL"
sources = ["cve"]
title = "Hewlett Packard Apollo Domain OS crp 远程权限提升漏洞"
updated = "2026-06-16"

