[basic]
description = "Linux 内核网络子系统 skbuff 中的 skb_try_coalesce() 函数在执行 frag 合并时未正确传递 SKBFL_SHARED_FRAG 标记，导致后续 ESP 输入处理误判 skb 的共享 frag 状态，可能在页缓存支持的 frag 上执行就地解密，造成内存写越界。本地攻击者可利用此漏洞实现权限提升，影响 Linux 内核版本低于 6.12.15 的系统。"
published = "2026-05-23T12:17:02.660"
remediation = "升级 Linux 内核至 6.12.15 或更高版本（该版本已合入补丁 `net: skbuff: preserve shared-frag marker during coalescing`）。无法立即升级时，可通过 `sysctl -w net.core.rmem_default=262144` 等参数调优 TCP 接收缓冲区缓解风险，或在不需要 ESP（IPsec）功能的系统上卸载相关内核模块以降低攻击面。"
score = 7.8
severity = "HIGH"
sources = ["hwpoc"]
title = "Linux Linux Kernel 内存碎片化本地权限提升漏洞"
updated = "2026-07-15T02:22:13.937"

