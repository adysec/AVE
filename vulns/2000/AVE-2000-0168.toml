[basic]
description = "PHP 3.0 版本中启用了 safe_mode 安全模式，该模式本应通过 EscapeShellCmd() 函数过滤 shell 元字符来限制系统命令执行。然而 popen() 函数未正确调用 EscapeShellCmd() 过滤，导致攻击者可通过向 popen 传递包含 shell 元字符的恶意参数绕过 safe_mode 限制，在目标服务器上以 Web 服务器权限执行任意系统命令。攻击者无需身份认证即可远程利用此漏洞。"
published = "2000-01-04"
remediation = "升级 PHP 至 3.0.14 或更高版本，该版本修复了 popen 函数未过滤 shell 元字符的问题。如无法升级，应避免在 PHP 应用中使用 popen 函数处理用户输入，并严格限制 Web 服务器运行权限。"
score = 10.0
severity = "CRITICAL"
sources = [
    "cve",
    "exploitdb",
]
title = "PHP 3.0 safe_mode 模式下 popen 函数绕过 EscapeShellCmd 过滤导致远程命令执行漏洞"
updated = "2026-06-16"

