[basic]
description = "SGI IRIX 6.2 系统自带的 SpaceWare 7.3 v1.0 中的 spaceball 程序存在本地权限提升漏洞。该程序在处理 HOSTNAME 环境变量时未进行充分验证，攻击者可构造包含 shell 命令的 HOSTNAME 环境变量值，使 spaceball 程序以 root 权限执行任意命令，最终获得系统的 root 权限。此漏洞仅需本地访问权限即可利用，影响运行受影响版本 IRIX 6.2 并安装了 SpaceWare 的系统。"
published = "1997-08-20"
remediation = "删除 SpaceWare 程序，或在 $SWDIR/spaceball.sh 的 Utilities 部分将 HOSTNAME 设置为 /usr/bsd/hostname，以防止环境变量注入导致的命令执行。建议联系 SGI 获取安全补丁。"
score = 7.2
severity = "HIGH"
sources = [
    "cve",
    "exploitdb",
]
title = "SGI IRIX 6.2 SpaceWare spaceball 本地权限提升漏洞"
updated = "2024-11-20"

