[basic]
description = "PackageKitd 中存在释放后使用漏洞。在某些条件下，事务的清理机制顺序可能受到影响，导致对先前释放的内存区域进行访问。释放后的内存可能被重新分配用于其他用途，造成信息泄露或拒绝服务。攻击者需要本地低权限访问系统以利用此漏洞。"
published = "2024-01-03"
remediation = "升级 PackageKit 至 1.2.7 或更高版本。Red Hat 企业版 Linux 8/9 用户可通过 Red Hat 官方渠道获取安全更新补丁。"
