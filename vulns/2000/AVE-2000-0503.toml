[basic]
description = 'IBM WebSphere Application Server 2.0/3.0/3.0.2.1 存在源代码信息泄露漏洞。远程攻击者无需身份认证，通过向目标服务器发送包含 "/servlet/file" 路径的特殊 URL 请求，可直接调用默认 InvokerServlet，从而获取可执行 Web 文件（如 JSP、Servlet 等）的源代码。该漏洞可能导致敏感业务逻辑、数据库连接配置等关键信息泄露，为进一步攻击提供跳板。此漏洞影响范围广，利用门槛低，危害等级中等。'
published = "2000-07-24T04:00:00.000"
remediation = "升级到 IBM WebSphere 4.0 以上版本（该漏洞在 4.0 中已修复），或删除默认 InvokerServlet 映射，在 web.xml 中移除 /servlet/* 的 servlet 映射配置，并通过 Web 服务器（如 Apache/IHS）配置 URL 重写规则限制直接访问 /servlet/file 路径。如无法升级，可在应用层部署过滤器对 /servlet/* 路径进行访问控制拦截。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "IBM WebSphere Application Server 源代码泄露漏洞"
updated = "2026-06-16T21:52:11.633"

