[basic]
description = "ZBServer Pro 1.5 版本在处理客户端请求时存在缓冲区溢出漏洞。该服务在接收并解析网络输入时未对数据长度进行充分边界校验，攻击者可向目标服务器发送超长的特制数据包，使数据溢出固定大小的缓冲区并覆盖相邻内存，进而可能劫持程序执行流实现远程代码执行。该漏洞影响运行 ZBServer Pro 1.5 的服务器，攻击条件为攻击者能够与暴露的服务端口建立网络连接并发送恶意请求，无需身份认证即可远程触发。"
published = "1999-12-22"
remediation = "立即升级到 ZBServer 后续版本（如 2.x 及以上）或迁移至仍在维护的替代 Web 服务器软件；若无法立即升级，应在边界防火墙或 ACL 上限制对该服务器 TCP 80 端口的访问来源，仅允许受信任 IP 连接，并关闭不必要的 CGI/目录浏览功能以缩小攻击面。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "ZBServer Pro 1.5 远程缓冲区溢出漏洞"
updated = "1999-12-22"

