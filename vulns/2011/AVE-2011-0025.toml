[basic]
description = "D-Link DIR-300 路由器存在明文密码存储漏洞，设备在固件或配置文件中以明文形式存储管理员及用户密码，未进行任何加密或哈希处理。攻击者通过物理接触设备、访问管理后台或利用其他漏洞获取路由器文件系统访问权限后，可直接读取明文凭据，进而完全控制路由器及内网。该漏洞影响 D-Link DIR-300 系列路由器，CVSS 评分 5.7，危害等级中危。厂商未发布官方修复补丁，建议用户限制设备物理访问并升级至支持安全存储的固件版本。"
published = "2011-12-20T11:55:08.413"
remediation = "D-Link DIR-300 路由器已停止技术支持（EOL），官方不再发布固件更新。强烈建议立即停用该设备并更换为受支持的路由器产品。如无法立即更换，应将该路由器隔离在独立 VLAN 中，仅允许受信任的管理主机通过 LAN 口访问管理界面，同时在防火墙上限制对 80/443 端口的远程访问，并禁用 WAN 端管理功能以降低密码明文泄露风险。"
score = 5.7
severity = "MEDIUM"
sources = ["kev"]
title = "D-Link DIR-300 明文密码存储信息泄露漏洞"
updated = "2026-06-16T23:35:18.387"

