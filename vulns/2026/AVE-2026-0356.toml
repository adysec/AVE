[basic]
description = "这是一个针对微软 .NET 的安全功能绕过漏洞。攻击者可通过向目标系统发送特制的 TLS/SSL 网络数据包，利用 .NET 中 System.Net.Security 组件实现的授权检查缺陷绕过安全验证。当处理安全的网络通信时，攻击者能滥用未授权的权限访问 .NET 应用，这是由于安全流处理的认证逻辑存在缺陷。漏洞影响范围广泛，任何部署受影响版本 .NET 8、.NET 9 或 .NET 10 的应用程序都可能受到威胁，包括所有平台和架构。该漏洞属于高危级别，CVSS 评分为 8.2，通过网络远程攻击即可触发，攻击者无需身份验证即可发起攻击。该漏洞在 .NET 的安全通信协议上发现，通过 HTTPS 建立的网络连接中尤其容易受到攻击，攻击者能伪造合法的安全会话并绕过访问控制。该漏洞导致 .NET 安全机制失效，可能引发未经授权的数据访问或系统控制风险，已在 .NET 的安全补丁版本中修复。"
published = "2026-07-14T20:17:37.533"
remediation = "立即升级 .NET 运行时：.NET 8.0 升级至 8.0.29 或更高版本，.NET 9.0 升级至 9.0.18 或更高版本，.NET 10.0 升级至 10.0.10 或更高版本。通过运行 `dotnet --info` 确认当前版本，通过 Visual Studio Installer 或下载 .NET SDK 进行升级。引用 Microsoft.NetCore.App.Runtime.* NuGet 包的项目需更新包引用至对应修复版本。自包含部署应用需重新编译并重新部署。升级后必须重启所有 .NET 应用使补丁生效。暂无有效临时缓解措施，必须升级运行时修复此 TLS/SSL 授权绕过漏洞。"
score = 8.2
severity = "HIGH"
sources = ["ghsa"]
title = "微软 .NET TLS/SSL 安全特性绕过漏洞"
updated = "2026-07-22T21:17:41.353"

