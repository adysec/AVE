[info]
author = "ave"
description = "检测 OmniHTTPd visadmin.exe CGI 端点是否存在畸形 URL 导致的拒绝服务漏洞（CVE-1999-0970）"
id = "POC-AVE-1999-0757"
name = "CVE-1999-0970 PoC"
severity = "medium"
tags = ["ave-1999-0757"]
vuln_id = [
    "CVE-1999-0970",
    "AVE-1999-0757",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/cgi-bin/visadmin.exe?user=gu"
protocol = "http"

[poc.requests.headers]
User-Agent = "AVE/1.0"

[[poc.requests.matchers]]
expect = true
part = "status"
status = [
    200,
    400,
    404,
    500,
    503,
]
type = "status"
