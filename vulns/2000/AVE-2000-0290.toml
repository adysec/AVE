[basic]
description = "S.u.S.E. Linux 6.3 及 6.4 版本中 Gnomelib 组件存在本地缓冲区溢出漏洞。由于程序对 DISPLAY 环境变量长度缺乏充分校验，本地攻击者可向该环境变量传入超长字符串触发缓冲区溢出，从而以当前用户权限执行任意命令。该漏洞影响 S.u.S.E. Linux 6.3/6.4 系统，CVSS 评分 7.2，危害等级高。本地攻击者需拥有系统登录权限方可利用，无法远程触发。"
published = "2000-04-29T04:00:00.000"
remediation = "升级 SuSE Linux 至 7.0 及以上版本，或在 Gnomelib 调用前通过 unset DISPLAY 清除环境变量，并限制本地用户对 gnomelib 的 SUID/SGID 执行权限作为临时缓解措施。"
score = 7.2
severity = "HIGH"
sources = ["epss"]
title = "SuSE Linux Gnomelib 本地缓冲区溢出漏洞"
updated = "2026-06-16T21:51:30.770"

