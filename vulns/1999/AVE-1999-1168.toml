[basic]
description = "Windows NT 4.0 的远程访问服务管理器（RASMAN）安全描述符配置不当，允许用户通过 Windows NT 服务控制管理器将 RASMAN 指向替代位置加载恶意 DLL，导致本地攻击者以 SYSTEM 权限执行任意代码。攻击者需拥有本地登录权限。"
published = "1999-09-17"
remediation = '升级到 Windows 2000 或更高版本系统，Windows NT 4.0 已于 2004 年停止支持，不再提供安全更新。如无法升级，在注册表 HKEY_LOCAL_MACHINE\SYSTEM\CurrentControlSet\Services\RasMan 中限制仅 SYSTEM 账户拥有写入权限，并禁用 Remote Access Service 服务作为临时缓解措施。'
score = 9.0
severity = "CRITICAL"
sources = [
    "cve",
    "nvd",
]
title = "Microsoft Windows NT 4.0 RASMAN 权限提升漏洞"
updated = "2026-06-16"

