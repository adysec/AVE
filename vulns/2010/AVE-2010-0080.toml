[basic]
description = 'Joomla! 的 Joomla Flickr（com_joomlaflickr）组件 1.0.3 版本中的 joomlaflickr.php 文件存在目录遍历漏洞。由于程序未对 index.php 中的 controller 参数进行充分过滤，未经身份认证的远程攻击者可通过在该参数中注入 ".."（点点）序列进行路径穿越，从而包含并执行服务器上的任意本地文件（本地文件包含）。成功利用可导致敏感信息泄露、源码读取，甚至在特定条件下结合日志投毒等手法实现远程代码执行。该漏洞影响使用 Joomla Flickr 组件 1.0.3 的 Joomla! 站点，CVSS 评分 7.5，危害等级为高危。攻击者无需任何权限即可远程发起攻击，利用门槛较低。'
published = "2010-05-19T20:00:01.397"
remediation = "建议立即卸载或禁用 Joomla! Flickr (com_joomlaflickr) 1.0.3 组件，或升级至官方修复版本（如有）。若无法卸载，可在 Web 应用防火墙 (WAF) 或 .htaccess 中拦截包含 `..` 或 `controller=` 目录遍历特征的请求，同时限制 PHP `allow_url_include=Off` 与 `open_basedir` 限制 PHP 包含路径，防止本地文件包含攻击。"
score = 7.5
severity = "HIGH"
sources = ["nuclei"]
title = """The user wants me to generate a [title] field for CVE-2010-1980 using Chinese as "manufacturer product vulnerability type". Let me analyze the information provided: - CVE: CVE-2010-1980 - Original title: Joomla! Component Joomla Flickr 1.0 - Local File Inclusion - NVD description: Directory traversal vulnerability in joomlaflickr.php in the Joomla Flickr (com_joomlaflickr) component 1.0.3 for Joomla! allows remote attackers to include and execute arbitrary local files via a .. (dot dot) in the controller parameter to index.php. - CVSS: 7.5 - CWE: CWE-22 (which is "Improper Limitation of a Pathname to a Restricted Directory" - path traversal) - AVD: Joomla! Component Joomla Flickr 1.0 - Local File Inclusion Based on the format requirement: "manufacturer product vulnerability type" in Chinese. From the information: - Manufacturer: Joomla! (the software framework) - Product: Joomla Flickr 1.0 (com_joomlaflickr component) - Vulnerability type: 本地文件包含漏洞 (Local File Inclusion vulnerability) So the title should be: "Joomla! Joomla Flickr 1.0 本地文件包含漏洞" This is 20-100 characters long in Chinese, and follows the required format "manufacturer product vulnerability type". It's concise and accurate based on the information provided. Actually, let me reconsider. The user wants Chinese, and the format is "manufacturer product vulnerability type". Let me translate: - Manufacturer: Joomla! → Joomla! - Product: Joomla Flickr 1.0 → Joomla Flickr 1.0 - Vulnerability type: Local File Inclusion → 本地文件包含 So in Chinese: "Joomla! Joomla Flickr 1.0 本地文件包含漏洞" Wait, I should follow the example: "Microsoft Windows TCP/IP 远程代码执行漏洞" - Manufacturer: Microsoft - Product: Windows TCP/IP - Vulnerability type: 远程代码执行漏洞 I'm investigating the Joomla! vulnerability. The original description reveals a directory traversal issue in the Joomla Flickr component, which allows attackers to include and execute arbitrary files. This is a critical path traversal vulnerability that can compromise the system. The key characteristics include remote file inclusion, a path traversal weakness, and the potential for arbitrary code execution. The vulnerability specifically targets the Joomla! component's file handling mechanism, enabling an attacker to manipulate the controller parameter and trigger the inclusion of malicious files. This security flaw could lead to significant system compromise and unauthorized access.Joomla! Joomla Flickr 1.0 本地文件包含漏洞"""
