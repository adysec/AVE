[basic]
description = "Allaire ColdFusion Server 4.x 存在服务器信息泄露漏洞，远程攻击者无需身份认证即可通过向目标服务器发送特制的 HTTP 请求访问 application.cfm 或 onrequestend.cfm 文件，从而获取服务器的真实物理路径信息。该漏洞可被利用于进一步探测目标系统结构，为后续攻击提供信息支撑，影响运行 ColdFusion Server 4.x 的所有版本。"
published = "2000-03-01T05:00:00.000"
remediation = "升级至 ColdFusion 5.0 或更高版本，该漏洞已在后续版本中修复。如无法升级，在 Web 服务器（IIS/Apache）层面配置规则，拒绝外部对 `application.cfm` 和 `onrequestend.cfm` 文件的直接 HTTP 访问请求，仅允许 ColdFusion 引擎内部调用。同时禁用目录浏览功能，防止路径信息进一步泄露。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Allaire ColdFusion 远程服务器信息泄露漏洞"
updated = "2026-06-16T21:51:11.173"

