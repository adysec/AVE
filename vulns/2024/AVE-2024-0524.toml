[basic]
description = "Linux 内核 MIPI I3C HCI 驱动在 DMA 模式下存在空指针解引用漏洞。在总线清理过程中，当停止 DMA 环时可能触发 RING_OP_STAT 中断，由于环停止请求完成、中断处理程序移除与代码执行之间存在竞态条件，中断处理函数 hci_dma_irq_handler() 可能在 io_data 指针已被 hci_dma_cleanup() 置空后继续执行，导致空指针解引用，造成系统崩溃。本地低权限攻击者可利用此漏洞发起拒绝服务攻击。CVSS 评分 5.5，危害等级中等。"
published = "2025-01-11T13:15:21.450"
remediation = '立即更新 Linux 内核至修复版本：Ubuntu 24.04 LTS 安装 USN-7381-1 或 USN-7450-1 更新（`apt update && apt upgrade`），其他发行版升级内核至包含 commit `mask ring interrupts before ring stop request` 的版本（主线内核 ≥ v6.12-rc4 或对应 LTS 稳定分支）。如无法立即更新，可卸载或黑名单禁用 `mipi-i3c-hci` 内核模块（`echo "blacklist mipi_i3c_hci" > /etc/modprobe.d/blacklist-i3c.conf`）作为临时缓解。'
score = 5.5
severity = "MEDIUM"
sources = ["msrc"]
title = "Linux Kernel i3c mipi-i3c-hci 驱动空指针解引用漏洞"
updated = "2026-06-17T07:54:53.317"

