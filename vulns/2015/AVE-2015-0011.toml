[basic]
description = "WordPress Elegant Themes Divi主题存在目录遍历漏洞，远程攻击者无需身份认证即可通过向 wp-admin/admin-ajax.php 发送包含 `..` 路径遍历序列的 `img` 参数（action=revslider_show_image），实现任意文件读取，获取服务器敏感信息。该漏洞影响使用 Slider REvolution 插件 4.1.4 及之前版本的 WordPress 站点，攻击复杂度低，危害中等。"
published = "2015-02-11T19:59:06.417"
remediation = "立即将 WordPress 的 Slider Revolution (RevSlider) 插件升级至 4.2 及以上版本，或更新 Elegant Themes Divi 主题至最新版。如无法升级，可删除或重命名插件目录中的 `revslider_show_image` 相关处理函数，或在 Web 应用防火墙 (WAF) 层面拦截包含 `revslider_show_image` 及 `../` 的请求路径。"
score = 5
severity = "MEDIUM"
sources = ["nuclei"]
title = "WordPress Elegant Themes Divi主题目录遍历漏洞"
updated = "2026-06-17T00:22:38.490"

