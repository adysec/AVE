[basic]
description = "深科特 Lean MES 系统 uploadPortraits.ashx 接口存在任意文件上传漏洞，由于未对上传文件类型进行有效校验，远程攻击者可通过上传恶意脚本文件（如 Webshell）至服务器，结合服务器路径遍历可绕过目录限制，写入任意目录，最终获取服务器控制权。该漏洞影响深科特 Lean MES 系统，危害等级高危。建议厂商添加文件类型白名单校验、限制上传路径、禁止 Web 目录执行动态脚本、限制接口仅内网访问。"
published = "nday"
remediation = "联系深科特厂商获取官方安全补丁；对 uploadPortraits.ashx 接口实施文件类型白名单校验，仅允许图片类扩展名；严格限制上传路径，过滤 ../ 等目录遍历序列；将上传目录设置为禁止执行动态脚本（取消执行权限）；通过 Web 服务器或防火墙限制该接口仅允许内网 IP 访问。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "深科特 Lean MES 系统 uploadPortraits.ashx 任意文件上传漏洞"
updated = "nday"

