[basic]
description = "LotusCMS Fraise 3.0 版本的 core/lib/router.php 文件存在目录遍历（本地文件包含）漏洞。当服务器关闭 magic_quotes_gpc 安全配置时，未经过身份认证的远程攻击者可通过向 index.php 发送带有特制 system 参数的 HTTP 请求，绕过路径限制读取并包含服务器上的任意本地文件。攻击者可借此查看敏感文件内容，甚至通过包含含恶意代码的文件实现远程代码执行。该漏洞影响 LotusCMS Fraise 3.0 版本，CVSS 评分为 5.1，危害等级为中危，利用前提为目标系统未启用 magic_quotes_gpc 且可直接访问 Web 服务。"
published = "2011-01-20T19:00:12.333"
remediation = "建议升级 LotusCMS Fraise 至 3.0.1 或更高版本（已修复该目录遍历漏洞），或迁移至维护中的 CMS。临时缓解：在 php.ini 中开启 magic_quotes_gpc=On（PHP 5.4+ 已移除），或设置 open_basedir 限制文件访问范围，同时设置 allow_url_include=Off 禁用远程文件包含。建议升级 PHP 至 5.4+ 版本以移除 magic_quotes_gpc 依赖并启用 open_basedir 限制。"
score = 5.1
severity = "MEDIUM"
