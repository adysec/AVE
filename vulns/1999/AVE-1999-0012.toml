[basic]
description = "Cisco IOS 系统内置 Web 服务器存在拒绝服务漏洞，远程未经身份认证的攻击者可通过向目标路由器发送特制的超长 URL 请求，触发 Web 服务器处理异常导致进程崩溃，进而造成路由器自动重启，中断正常网络服务。该漏洞影响运行 Cisco IOS 系统的多款路由器设备，CVSS 评分 5.0，危害等级中危。Cisco 已发布安全公告建议用户禁用不必要的 HTTP 服务或限制访问来源。"
published = "1999-03-01T05:00:00.000"
remediation = "建议升级 Cisco IOS 至不受影响版本（如 12.0(5) 及以上），或在不需 Web 管理时全局禁用 HTTP 服务：`no ip http server`。如需保留 HTTP 管理，可在接口 ACL 中限制仅允许信任源 IP 访问 TCP 80 端口，并使用 `ip http access-class` 进行访问控制。"
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "Cisco IOS Web服务器长URL拒绝服务漏洞"
updated = "2026-06-16T21:47:56.680"

