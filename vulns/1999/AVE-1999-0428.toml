[basic]
description = "Linux cfingerd（可配置的 Finger 服务守护进程）存在远程权限提升漏洞，未经身份认证的攻击者可向目标系统发送特制的 Finger 请求触发该漏洞，成功利用后可获取目标系统 root 最高权限，完全控制受影响服务器。该漏洞影响多个 Linux 发行版中运行的 cfingerd 服务，攻击者无需任何认证即可远程发起攻击，危害严重。"
published = "1999-01-01T05:00:00.000"
remediation = "立即停止并卸载 cfingerd 服务（`systemctl stop cfingerd && apt-get remove cfingerd` 或 `yum remove cfingerd`）。cfingerd 已在 2000 年代初停止维护，不存在补丁修复。建议在 iptables 或防火墙中封禁 TCP 端口 79，同时禁用 finger 协议。改用现代认证机制（如 LDAP/SSSD）替代 finger 服务。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "Linux cfingerd 远程权限提升漏洞"
updated = "2026-06-16T21:47:59.250"

