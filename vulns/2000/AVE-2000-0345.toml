[basic]
description = "George Burgyan CGI Counter 4.0.2及4.0.7版本存在输入验证漏洞，远程攻击者可通过向CGI脚本提交包含shell元字符（如分号、管道符等）的特制请求，利用程序未对用户输入进行充分过滤的缺陷，在服务器端执行任意系统命令。攻击者无需身份认证即可利用该漏洞，可能导致服务器被完全控制、数据泄露或进一步横向移动。该漏洞影响广泛部署的CGI Counter应用，公开的利用代码已在ExploitDB发布，攻击门槛较低。"
published = "2000-05-15T04:00:00.000"
remediation = "立即升级 CGI Counter 至 4.0.8 或更高版本，该版本已修复输入验证缺陷。如无法升级，修改 counter.cgi 源码，对用户输入的所有参数使用 Perl 的 `quotemeta()` 函数转义 shell 元字符（如 `;` `|` `` ` `` `$`），并在脚本首行启用 Perl 的 taint 模式（`#!/usr/bin/perl -T`）。若业务不需要该功能，直接删除或禁用 counter.cgi 脚本。"
score = 7.5
severity = "HIGH"
sources = ["epss"]
title = "George Burgyan CGI Counter 远程命令执行漏洞"
updated = "2026-06-16T21:51:42.193"

