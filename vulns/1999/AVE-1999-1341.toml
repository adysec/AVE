description = "AIX 3.2 之前版本中 UUCP 的默认配置存在权限设置不当的安全漏洞。UUCP 程序在默认安装时未正确限制本地用户的访问权限，导致本地攻击者可利用 UUCP 的 setuid 机制执行任意命令，从而获取 root 权限。攻击者需要拥有本地系统账户，无需额外认证即可完全控制系统，造成机密性、完整性和可用性的完全丧失。"
