[basic]
description = "SGI IRIX 操作系统中的 midikeys 程序存在本地权限提升漏洞。由于该程序在执行文件操作时未对文件路径进行充分限制，导致本地攻击者可通过文本编辑器利用 midikeys 的权限覆盖或修改系统任意文件，从而获取 root 级别权限。该漏洞影响 SGI IRIX 6.5.4 版本，CVSS 评分 10.0，危害等级严重。攻击者需拥有本地系统访问权限方可利用，无需用户交互。"
published = "1999-05-19T04:00:00.000"
remediation = "安装 SGI 安全公告 19990501-01-A 中提供的 IRIX 补丁，或将系统升级至 IRIX 6.5.5 及以上版本。作为临时缓解措施，可移除以 root 权限运行的 midikeys 程序的 setuid 位（执行 chmod u-s /usr/sbin/midikeys），阻止本地用户利用其通过文本编辑器以 root 权限篡改任意文件。"
score = 10
severity = "CRITICAL"
sources = ["exploitdb"]
title = "SGI IRIX midikeys 本地任意文件修改漏洞"
updated = "2026-06-16T21:49:00.710"

