[basic]
description = "Carey Internet Services 旗下的 commerce.cgi 2.0.1 版本存在目录遍历漏洞。攻击者无需身份认证，仅通过向 page 参数传入 `../` 等路径穿越序列即可绕过访问限制，读取服务器上的任意文件，如配置文件、密码文件等敏感信息。该漏洞利用难度低且影响范围明确，属于经典的 Web 应用路径遍历安全问题。"
published = "2001-06-02T04:00:00.000"
remediation = '建议升级 commerce.cgi 至最新版本（如已停止维护则更换为其他受支持的购物车程序）。临时缓解措施：在 Web 服务器层面（如 Apache mod_rewrite 或 Nginx）配置规则，拦截 page 参数中包含 "../" 或 "..\" 的请求；或在 CGI 脚本入口处对 page 参数做路径规范化校验，拒绝包含 ".." 的输入。'
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
title = "Carey Internet Services commerce.cgi 目录遍历漏洞"
updated = "2026-06-16T21:53:53.323"

