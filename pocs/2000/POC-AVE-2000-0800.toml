[info]
author = "ave"
description = "检测目标服务器是否存在存在缓冲区溢出漏洞的 FrontPage 97/98 Server Extensions htimage.exe 组件。htimage.exe 在处理超长路径参数时存在缓冲区溢出，远程攻击者可通过发送特制 GET 请求导致拒绝服务或任意代码执行。"
id = "POC-AVE-2000-0800"
name = "Microsoft FrontPage 97/98 htimage.exe Buffer Overflow PoC"
severity = "high"
tags = ["ave-2000-0800"]
vuln_id = [
    "CVE-2000-0256",
    "AVE-2000-0800",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/cgi-bin/htimage.exe"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["htimage"]

[[poc.requests]]
method = "GET"
path = "/cgi-bin/htimage.exe?0,0"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["htimage"]
