[basic]
description = "xlockmore 和 xlockf 屏幕锁定程序存在格式字符串注入漏洞，程序未能正确过滤用户通过 -d 参数传入的格式字符串，导致本地攻击者可利用该漏洞以 root 权限执行任意代码。攻击者只需拥有本地系统访问权限，无需身份认证即可触发该漏洞，完全控制受影响系统。该漏洞影响 xlockmore 及 xlockf 多个版本，CVSS 评分 7.2，危害等级高。"
published = "2000-10-20T04:00:00.000"
remediation = "立即升级 xlockmore 至 4.16 以上版本，或应用 Debian 安全公告 DSA-20000816 提供的补丁。如无法升级，可移除 xlock 的 setuid 位（chmod u-s /usr/X11R6/bin/xlock）以消除本地提权风险，但会牺牲部分功能。"
score = 7.2
severity = "HIGH"
sources = ["cve"]
title = "David Bagley xlock 格式字符串本地权限提升漏洞"
updated = "2026-06-16T21:52:25.817"

