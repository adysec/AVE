[basic]
description = "Exim 邮件服务器 4.70 之前版本中的 string.c 文件的 string_vformat 函数存在堆缓冲区溢出漏洞。远程攻击者可通过 SMTP 会话发送两个 MAIL 命令，配合包含特制头部的大容量消息，触发不当的拒绝日志记录，导致堆缓冲区溢出，进而实现远程代码执行。该漏洞影响所有 Exim 4.70 之前版本，CVSS 评分 9.8，危害等级严重，建议立即升级至 4.70 或更高版本。"
published = "2010-12-14T16:00:04.163"
remediation = "升级 Exim 至 4.70 或更高版本。无法立即升级时，在 Exim 配置中限制单次 SMTP 连接允许的 MAIL 命令数量（如 acl_smtp_mail 中添加条件限制），或通过防火墙限制 SMTP 端口的源 IP 范围作为临时缓解措施。"
score = 9.8
severity = "CRITICAL"
sources = ["kev"]
title = "Exim string_vformat 堆缓冲区溢出远程代码执行漏洞"
updated = "2026-06-16T23:24:36.107"

