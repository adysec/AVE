[basic]
description = "微软 Index Server 2.0 的 WebHits 组件（null.htw）存在信息泄露漏洞。远程攻击者无需身份认证，只需在请求中通过 CiWebHitsFile 参数指定目标 ASP 文件路径，并在文件名末尾附加 %20 编码的空格，即可绕过访问限制读取 ASP 源代码的明文内容。该漏洞影响运行 Microsoft Index Server 2.0 的 IIS 服务器，攻击条件为攻击者能够向目标 Web 服务发起 HTTP 请求。成功利用可导致应用程序逻辑、数据库连接凭证等敏感信息泄露，进而引发进一步的攻击。"
published = "2000-03-31T05:00:00.000"
remediation = "安装 Microsoft 安全公告 MS00-006 发布的补丁，该补丁可修复 Index Server 2.0 中 WebHits ISAPI 过滤器对 CiWebHitsFile 参数校验不足的问题，防止攻击者通过追加 %20 读取 ASP 等服务器端文件源代码。受影响的 Windows NT 4.0 及 Windows 2000 系统请通过 Microsoft 下载中心获取并安装对应平台的最新版本补丁。如无法立即打补丁，可在 IIS 管理器中禁用 Index Server 的 WebHits 功能或移除 null.htw 文件作为临时缓解措施，并建议升级至更高版本 Windows 系统以获得完整安全保障。"
score = 5
severity = "MEDIUM"
sources = ["exploitdb"]
