[basic]
description = "汉王e脸通系统存在fastjson反序列化远程代码执行漏洞。攻击者可通过向`/manage/visitorDeviceInteraction/addVisitDeviceAppointmentInfoTest.do`接口发送特制POST请求，利用fastjson对`com.mchange.v2.c3p0.WrapperConnectionPoolDataSource`类的反序列化处理触发漏洞，在目标服务器上执行任意命令。该漏洞无需身份认证即可远程利用，可导致服务器被完全控制，危害严重。"
published = "0708"
remediation = "升级 fastjson 至 1.2.83 或更高版本，开启 safeMode 配置（ParserConfig.getGlobalInstance().setSafeMode(true)），在 Nginx/WAF 层对 /manage/visitorDeviceInteraction/ 路径添加访问认证和 IP 白名单限制，禁止非授权外部请求直接访问该接口。"
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "汉王e脸通 fastjson反序列化远程代码执行漏洞"
updated = "0708"

