[basic]
description = "IBM WebSphere ikeyman 工具使用弱加密算法存储 SSL 连接密钥数据库的密码。攻击者可通过解密存储的密码获取密钥数据库访问权限，进而窃听或篡改 SSL/TLS 加密通信，威胁数据传输安全。该漏洞影响 WebSphere 2.0 和 3.0 版本，CVSS 评分 10.0，危害等级严重。ikeyman 作为 WebSphere 的密钥管理工具，其弱加密机制使存储在密钥数据库中的密码极易被破解，导致 SSL 连接的安全性完全丧失。"
published = "1999-10-24T04:00:00.000"
remediation = "升级至 IBM WebSphere Application Server 7.0 及以上版本（推荐 Liberty 或 9.x），其中 ikeyman 已被弃用并改用更安全的 keytool 或管理控制台管理密钥库。如无法升级，手动使用 Java keytool 生成 SSL 密钥库并确保密钥库文件权限设置为仅管理员可读（如 chmod 600），同时在 ikeyman 存储密码后手动替换为强加密密码。"
score = 10
severity = "CRITICAL"
sources = ["avd"]
