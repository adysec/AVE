[basic]
description = 'Netscape Communicator 4.7 存在密码明文存储漏洞。在用户通过 IMAP 或 POP 邮件协议进行会话时，即使未启用"记住密码"功能，程序仍会将用户邮箱密码以明文形式记录在 preferences.js 配置文件中。本地攻击者或具有文件系统访问权限的恶意软件可通过读取该配置文件获取用户邮箱凭据，导致敏感信息泄露。该漏洞影响 Netscape 4.7 版本，CVSS 评分 5.0，属于中危漏洞，危害等级中等。'
published = "1999-12-22T05:00:00.000"
remediation = "升级 Netscape Communicator 至 4.73 及以上版本，该版本修复了密码强制写入 preferences.js 的问题。如无法升级，应手动删除 preferences.js 中存储的密码明文条目，并将该文件权限设为仅当前用户可读（如 chmod 600），同时避免在公共或共享计算机上使用 IMAP/POP 自动登录功能。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Netscape Communicator 4.7 密码信息泄露漏洞"
updated = "2026-06-16T21:50:51.913"

