[basic]
description = "SGI IRIX 操作系统的 object server 程序存在配置缺陷漏洞，远程攻击者无需身份认证即可利用特定配置下的服务缺陷，通过向目标系统发送特制请求触发该漏洞，从而获取 root 超级用户权限。该漏洞影响 SGI IRIX 5.2 至 6.1 版本，CVSS v2.0 评分为 10.0，危害等级严重。SGI 已发布安全公告（19960101-01-PX）提供补丁修复。"
published = "1996-01-03T05:00:00.000"
remediation = "SGI IRIX 已停止支持多年，无官方安全补丁可用。建议将系统升级至 IRIX 6.5.30 或更高版本（该系列中最新稳定版），或立即禁用 object server 程序：以 root 权限执行 `/etc/init.d/objectserver stop` 并注释 `/etc/inetd.conf` 中的 objectserver 条目。同时配置防火墙，限制 TCP 631 端口仅允许受信任主机访问。长远来看，建议将业务迁移至仍在安全维护期的 Linux/Unix 操作系统。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "SGI IRIX Object Server 配置错误漏洞"
updated = "2026-06-16T21:50:11.240"

