[basic]
description = "时空智友企业流程化管控系统存在XML外部实体注入漏洞，由于系统在处理XML数据时未对外部实体进行有效过滤，攻击者可通过POST请求向/formservice接口发送特制的XML载荷，利用XXE漏洞读取服务器敏感文件或发起内部网络请求。该漏洞影响时空智友企业流程化管控系统多个版本，攻击者无需认证即可远程利用，危害较大。建议厂商及时修复XML解析器配置，禁用外部实体解析。"
published = "2025-07-29"
remediation = '修改XML解析器配置，禁用DTD外部实体解析（在Java中设置DocumentBuilderFactory的setFeature("http://apache.org/xml/features/disallow-doctype-decl", true)或在.NET中设置XmlReaderSettings的ProhibitDtd = true）。对/formservice接口的POST请求体进行严格校验，过滤XML实体声明。联系厂商获取安全更新，限制服务器出站访问以缓解SSRF风险。'
score = 5
severity = "MEDIUM"
sources = ["hwpoc"]
title = "时空智友 企业流程化管控系统 XML外部实体注入漏洞"
updated = "2025-07-29"

