[basic]
description = "Linux Kernel 2.0.x 版本中的 ping 命令在处理带 -R（记录路由）选项的数据包时存在缺陷，本地攻击者可通过向目标系统发送特制的大尺寸 ICMP 数据包触发该漏洞，导致系统内核资源耗尽或崩溃，造成拒绝服务。该漏洞影响 Linux Kernel 2.0.38 及更早版本，攻击者拥有本地普通用户权限即可利用，无需认证。"
published = "1999-12-08T05:00:00.000"
remediation = "建议将 Linux 内核升级至 2.0.39 或更高版本（RedHat 用户升级 kernel 至 2.0.39-1 及以上 RPM 包，Debian 用户升级至 2.0.39 对应内核镜像）。如无法立即升级，可通过设置 `net.ipv4.icmp_echo_ignore_all=1`（sysctl 临时生效并写入 /etc/sysctl.conf 持久化）禁用 ICMP Echo 响应，或在防火墙/路由器上丢弃带 IP Record Route（-R）选项的 ICMP 包作为临时缓解措施。"
score = 5
severity = "MEDIUM"
sources = ["cve"]
title = "Linux Kernel ping 命令拒绝服务漏洞"
updated = "2026-06-16T21:49:27.963"

