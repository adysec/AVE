[basic]
description = "Windows NT 4.0 打印后台处理程序 (Spoolss.exe) 存在权限配置不当漏洞，由于系统未正确限制用户对打印提供程序的指定权限，本地攻击者可利用不安全的默认权限将恶意 DLL 插入为替代打印提供程序，从而以系统权限执行任意代码。该漏洞影响 Windows NT 4.0 及所有 Service Pack 版本，攻击者需拥有本地系统访问权限，CVSS 评分 7.2，危害等级高。"
published = "1999-11-04T05:00:00.000"
remediation = '建议立即安装 Microsoft 针对 Windows NT 4.0 发布的安全更新 (MS99-047)，限制 Spoolss.exe 的 DLL 搜索路径权限，仅允许系统管理员修改打印提供程序配置。如无法安装补丁，可将打印后台服务运行账户降权并移除 Everyone 组对注册表项 HKLM\SYSTEM\CurrentControlSet\Control\Print\Providers 的写入权限作为临时缓解措施。'
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "Microsoft Windows NT 4.0 打印后台处理程序 DLL 插入本地权限提升漏洞"
updated = "2026-06-16T21:49:17.310"

