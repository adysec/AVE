[basic]
description = "smbvalid/smbval SMB 认证库存在多处缓冲区溢出漏洞，远程攻击者可通过向受影响的应用程序（如 Apache::AuthenSmb）发送超长的用户名、密码或其他特制输入触发该漏洞，导致任意代码执行。该漏洞影响使用 smbval 库的多个模块，CVSS 评分 10.0，危害等级严重。"
published = "1999-06-06T04:00:00.000"
remediation = "立即停止使用已无人维护的 Apache::AuthenSmb 模块及 smbvalid/smbval 库，迁移至 mod_authnz_ldap 或 mod_authn_file 等 Apache 官方维护的认证模块替代 SMB 认证功能。如短期内无法替换，须在 Perl 应用层对所有用户输入（用户名、密码等）做严格长度限制，限制用户名不超过 32 字节、密码不超过 128 字节，并使用正则过滤非 ASCII 高危字符，同时将 Apache::AuthenSmb 运行在受限容器或沙箱环境中以降低溢出代码执行风险。"
score = 10
severity = "CRITICAL"
sources = ["epss"]
title = "smbvalid SMB 认证库缓冲区溢出远程代码执行漏洞"
updated = "2026-06-16T21:50:00.657"

