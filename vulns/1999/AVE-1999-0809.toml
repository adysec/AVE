[basic]
description = "Red Hat Linux 系统中 pump DHCP 客户端存在缓冲区溢出漏洞。当 pump 客户端向恶意 DHCP 服务器请求 IP 地址时，攻击者可构造特制的 DHCP 响应数据包触发缓冲区溢出，成功利用此漏洞可在目标系统上以 root 权限执行任意代码。该漏洞影响配置了 pump DHCP 客户端的 Red Hat Linux 6.x 系统，攻击者无需身份认证即可通过局域网远程触发，CVSS 评分 10.0，危害等级严重。"
published = "1999-08-11"
remediation = "升级 pump DHCP 客户端至 0.8.12 或更高版本，可运行 rpm -Uvh pump-0.8.12-1.i386.rpm 应用 Red Hat 官方安全公告 RHSA-1999:027 的补丁包。若无法立即升级，建议暂停使用 DHCP 客户端改用静态 IP 配置，或在交换机启用 DHCP 侦听（DHCP Snooping）阻断伪造的 DHCP 响应。"
score = 10.0
severity = "CRITICAL"
sources = [
    "cve",
    "redhat",
]
title = "Red Hat pump DHCP客户端 远程代码执行漏洞"
updated = "2026-07-18"

