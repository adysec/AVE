[basic]
description = "COPS 1.04 版本在处理临时文件时存在符号链接攻击漏洞。程序在执行 res_diff、ca.src 和 mail.chk 等组件时，以不安全的方式创建临时文件，未对文件路径进行充分验证。本地攻击者可利用符号链接攻击，在 COPS 创建临时文件前将符号链接指向目标系统文件，从而实现对任意文件的覆盖或创建操作。成功利用此漏洞可导致攻击者获取系统完全控制权限，造成机密性、完整性和可用性的全面丧失。"
published = "1998-06-26"
remediation = "升级 COPS 至修复了临时文件符号链接问题的版本，或应用厂商提供的安全补丁。临时缓解措施包括：以受限专用用户身份运行 COPS，将临时目录设置为仅该用户可写（如 chmod 700 /tmp/cops-tmp），并确保程序使用 O_EXCL 标志创建临时文件以防止符号链接攻击。"
score = 7.2
severity = "HIGH"
sources = [
    "cve",
    "avd",
]
title = "COPS 1.04 符号链接攻击致任意文件覆盖漏洞"
updated = "2026-06-16"

