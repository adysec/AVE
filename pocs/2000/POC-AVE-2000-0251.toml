[info]
author = "AVE"
description = "通过构造包含超长路径（300+字符）的URL，验证RealNetworks RealPlayer 6/7在处理Location字段时存在的缓冲区溢出漏洞。当RealPlayer打开该恶意URL时，缓冲区溢出导致程序崩溃，造成拒绝服务。攻击者可进一步利用此漏洞执行任意代码。"
id = "POC-AVE-2000-0251"
name = "RealNetworks RealPlayer 6/7 Location Buffer Overflow PoC"
severity = "low"
tags = ["ave-2000-0251"]
vuln_id = [
    "CVE-2000-0280",
    "AVE-2000-0251",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/{{BaseURL}}"
protocol = "http"

[[poc.requests.matchers]]
expect = false
part = "body"
type = "word"
words = [
    "400",
    "404",
    "500",
]
