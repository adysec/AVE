[basic]
description = 'KVIrc IRC 客户端 0.9.0 存在目录遍历漏洞。当启用"Listen to !nick \<soundname\> requests"选项时，远程攻击者可通过向目标客户端发送包含 `..`（点点）的 DCC GET 请求，利用路径遍历技术突破目录限制，实现任意文件读取。该漏洞影响 KVIrc 0.9.0 版本，攻击者无需身份认证即可利用，可能导致敏感信息泄露。'
published = "1999-09-24T04:00:00.000"
remediation = '升级 KVIrc 至 5.0.0 及以上版本，该问题已在后续版本中修复。如无法升级，请在设置中关闭"Listen to !nick &lt;soundname&gt; requests"选项，并禁止自动接受来自不可信来源的 DCC GET 请求，同时在客户端配置中过滤含有 .. 路径回溯的 DCC 文件名。'
score = 5
severity = "MEDIUM"
sources = ["avd"]
title = "KVIrc IRC客户端 目录遍历任意文件读取漏洞"
updated = "2026-06-16T21:50:15.337"

