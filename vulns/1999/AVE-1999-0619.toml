[basic]
description = "ACC Tigris 系统存在未授权访问漏洞，远程攻击者无需任何身份认证凭据即可直接访问系统管理界面及敏感功能，获取完全控制权限。该漏洞影响 ACC Tigris 全线产品，攻击复杂度低，无需特殊权限或用户交互，危害等级高危（CVSS 7.5）。建议升级至支持认证机制的版本或通过访问控制策略限制来源 IP。"
published = "1999-02-02T05:00:00.000"
remediation = "立即在所有 ACC Tigris 部署前添加反向代理认证（如 Nginx/Apache 的 Basic Auth 或 OAuth），并在防火墙层面将管理端口限制为仅可信 IP 段访问。由于该产品已停止维护，建议迁移至受支持的应用系统。如无法升级，至少配置 .htaccess 密码保护或 Web 服务器级别的访问控制列表。"
score = 7.5
severity = "HIGH"
sources = ["avd"]
title = "ACC Tigris 未授权访问漏洞"
updated = "2026-06-16T21:48:16.773"

