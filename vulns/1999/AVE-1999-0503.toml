[basic]
description = "Martin Stover 开发的 Mars NetWare Emulation（NWE，即 mars_nwe）软件包存在缓冲区溢出漏洞，其根源在于程序在处理目录名称时未对输入长度进行边界校验，将过长的目录名直接拷贝至固定大小的栈缓冲区中，从而触发缓冲区溢出。该漏洞影响 mars_nwe 0.99 及相近版本，主要危害运行该 NetWare 仿真服务的 Linux/Unix 系统。攻击者需具备在受影响系统上创建或访问含超长名称目录的权限（通常为本地用户），通过构造异常长的目录名称即可利用该漏洞改写栈内存并返回地址，实现任意代码执行或导致服务崩溃。利用方式多为本地提权，即普通用户借助溢出发起恶意载荷以获取更高权限。"
published = "1999-08-31T04:00:00.000"
remediation = "建议立即升级 Martin Stower Mars NWE 至修复版本 0.99p（或后续官方版本），从 https://www.comlab.ghg.net/mars_nwe/ 获取并重新编译安装。如无法立即升级，可限制对 NWE 服务的本地目录访问权限、移除不可信用户的本地登录权限，并仅以必要权限运行 mars_nwe 守护进程作为临时缓解。"
score = 7.2
severity = "HIGH"
sources = ["epss"]
title = "Martin Stover Mars NetWare Emulation 缓冲区溢出漏洞"
updated = "2026-06-16T21:49:01.833"

