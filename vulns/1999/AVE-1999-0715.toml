[basic]
description = "标签之间。<value>WebTrends软件存在权限许可漏洞，将账户名和密码存储在访问权限未受限制的文件中。攻击者若具备对目标系统的本地或网络访问权限，可直接读取该文件获取敏感凭据，进而实现对系统的未授权访问。该漏洞影响运行WebTrends软件的服务器平台，可能导致敏感信息泄露，CVSS评分2.1。"
published = "1999-06-29T04:00:00.000"
remediation = "升级 WebTrends 软件至官方已修复该漏洞的最新版本。将存储账户名和密码的文件访问权限修改为仅管理员可读写（如 Windows 系统设置为仅 SYSTEM 账户和 Administrators 组拥有完全控制权限，其他用户拒绝所有访问）。如暂时无法升级，可将敏感配置文件迁移至受保护目录并设置严格 ACL 访问控制，同时定期审计文件权限设置。"
score = 2.1
severity = "LOW"
