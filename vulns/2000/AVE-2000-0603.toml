[basic]
description = "RedHat Linux 6.2/7.0 系统中 tmpwatch 工具的 --fuser 选项存在任意命令执行漏洞。本地攻击者可通过创建包含 shell 元字符（如反引号、$() 等）的文件名，当 tmpwatch 处理这些文件时，元字符会被 shell 解释执行，从而导致攻击者以 tmpwatch 进程权限执行任意命令。该漏洞影响 RedHat 6.2 及 7.0 版本，需要本地用户权限，CVSS 评分 2.1，危害等级低。"
published = "2000-10-06"
remediation = "升级 tmpwatch 至安全版本（Red Hat 6.2 升级至 tmpwatch-1.3-1 及以上，Red Hat 7.0 升级至 tmpwatch-1.4-1 及以上），或安装 Red Hat 官方 RHSA-2000-080 安全更新。如无法升级，应避免使用 tmpwatch --fuser 选项处理包含特殊字符的文件名，并限制 tmpwatch 仅由受信任用户执行。"
score = 2.1
severity = "LOW"
sources = [
    "cve",
    "exploitdb",
]
title = "RedHat Tmpwatch 任意命令执行漏洞"
updated = "2026-06-16T21:52:32.177"

