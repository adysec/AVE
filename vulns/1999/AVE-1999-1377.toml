[basic]
description = "Sambar Server 4.1 beta 版本中存在信息泄露漏洞，远程攻击者无需认证即可通过向目标服务器发送特制的 HTTP 请求访问 dumpenv.pl 脚本，从而获取服务器环境变量、系统路径等敏感配置信息。该漏洞可被用于进一步的信息收集，辅助后续攻击，影响 Sambar Server 4.1 beta 版本。"
published = "1998-06-10T04:00:00.000"
remediation = "立即移除或重命名 Sambar Server 安装目录下 cgi-bin 中的 dumpenv.pl 脚本，以防止远程攻击者通过 HTTP 请求获取服务器环境变量等敏感信息。同时将 Sambar Server 升级至 4.1 以上已修复此问题的最新版本（最高至 6.x），并在 Web 服务器前端通过防火墙或反向代理限制对 cgi-bin 目录的未授权访问。"
score = 5
severity = "MEDIUM"
sources = ["epss"]
title = "Sambar Sambar Server 信息泄露漏洞"
updated = "2026-06-16T21:49:53.117"

