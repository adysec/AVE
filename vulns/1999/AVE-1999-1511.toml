[basic]
description = "Slackware Linux 3.4 及部分其他版本的默认 PATH 环境变量中包含当前目录（`.`），导致本地用户可在共享目录中放置与系统命令同名的特洛伊木马程序。当其他用户（尤其是 root）进入该目录执行命令时，木马程序将被优先执行，从而造成权限提升。此漏洞利用条件较低，需攻击者具备本地访问权限并在目标用户可能经过的目录中预置恶意程序。"
published = "1999-01-02T05:00:00.000"
remediation = '移除环境变量 PATH 中的当前目录（.），编辑 /etc/profile 或 /etc/bashrc 等系统初始化文件，将 `PATH=".:$PATH"` 或 `PATH="$PATH:."` 改为 `PATH="/usr/local/bin:/usr/bin:/bin"` 等不含点号的绝对路径；同时检查各用户家目录下的 .bashrc、.bash_profile、.profile 等文件，移除其中的点号路径项，修改后重新登录或执行 source 命令使配置生效。'
score = 7.2
severity = "HIGH"
sources = ["avd"]
title = "Slackware Slackware 默认PATH配置包含当前目录导致本地木马程序漏洞"
updated = "2026-06-16T21:50:24.433"

