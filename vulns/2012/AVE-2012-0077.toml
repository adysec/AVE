[basic]
description = "Oracle Fusion Middleware 10.1.4.3.0 中的 Oracle Application Server 单点登录（SSO）组件存在未指定的开放重定向漏洞。远程攻击者可通过向目标系统发送特制的重定向请求，利用未知向量绕过 URL 验证机制，将用户重定向至恶意站点，导致目标系统的完整性受损。该漏洞无需身份认证即可远程触发，但需要用户交互配合，CVSS 评分 4.7，危害等级中危。Oracle 已在 2012 年 10 月关键补丁更新中修复此漏洞。"
published = "2012-10-16T23:55:03.087"
remediation = "立即登录 My Oracle Support 下载并安装 Oracle Critical Patch Update October 2012 补丁（参考文档 My Oracle Support Note 1477727.1），将 Oracle Application Server Single Sign-On 组件升级至修复版本。如无法立即打补丁，可在 Web 服务器或反向代理层对重定向参数进行白名单校验，限制重定向目标仅为可信域名，作为临时缓解措施。"
score = 4.7
severity = "MEDIUM"
sources = ["kev"]
title = "Oracle Fusion Middleware Single Sign-On 开放重定向漏洞"
updated = "2026-06-16T23:37:27.830"

